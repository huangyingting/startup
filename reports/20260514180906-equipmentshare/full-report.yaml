      - number: '3.4'
        title: Capability and Pricing Analysis
        blocks:
          - type: paragraph
            body: >
              EquipmentShare's integrated model creates capability gaps that pure-rental and pure-tech competitors
              cannot

              close independently. On fleet scale, United Rentals leads with approximately $22 billion OEC versus

              EquipmentShare's $9 billion—a 2.4× advantage—though EquipmentShare's fleet is the youngest in the industry
              at

              31 months average age versus the sector's 42+ months. On technology depth, EquipmentShare leads all rental

              incumbents: T3's 357,000+ connected assets and 6 billion+ daily data points are unmatched in the rental

              segment. On geographic coverage, URI's 49-state footprint versus EquipmentShare's 45 states is a modest
              gap

              that is narrowing as EquipmentShare opens approximately 100 locations per year. On capital model,
              EquipmentShare's

              OWN Program—where third-party investors own approximately 56% of fleet OEC—creates capital efficiency
              advantages

              that traditional capex-heavy incumbents cannot easily replicate.


              Equipment rental pricing is largely opaque industry-wide. Rates are structured as day/week/month schedules

              negotiated locally for SMBs and nationally for large accounts; list pricing is rarely published.
              EquipmentShare's

              rates are broadly competitive with incumbents, with differentiation delivered through T3 bundled at no
              additional

              charge. Technology competitors charge per-asset or per-vehicle SaaS subscription fees (specific rates not

              publicly disclosed by Trackunit or Tenna) in addition to any rental cost. This means customers using
              incumbent

              rentals plus third-party telematics pay a combined cost premium versus EquipmentShare's all-in bundled
              pricing—

              a structural pricing advantage EquipmentShare should continue to exploit in sales conversations.
