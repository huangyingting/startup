  - id: TV005
    title: Thesis-break and kill triggers table
    description: Monitorable triggers that would materially change the investment thesis or require exit review.
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - T3 SaaS ARR disclosed as de minimis
        - External ARR <$100M in 10-K or earnings supplement
        - Technology premium collapses; stock re-rates to 5-7x EV/EBITDA pure-rental
        - Reduce or exit; reevaluate at rental-only multiple (~$9-11B EV)
      - - 2026 revenue guidance miss
        - Total revenue below $4.8B (>10% below midpoint)
        - EBITDA story breaks; margin expansion thesis impaired; sector read-through negative
        - Stop-loss review; downgrade to track; add to short list
      - - Construction starts structural decline
        - AGC/Dodge monthly starts declining >15% YoY for 3+ consecutive months
        - Rental demand falls; fleet utilization drops; EBITDA margin compresses 3-5 ppts
        - Exit; bear case activated; monitor quarterly for recovery signal
      - - Net leverage rises above 4.0x
        - Q-end balance sheet shows >4.0x net debt / EBITDA
        - ABL covenant stress risk; equity dilution via secondary issuance probable
        - Review capital structure; flag as margin-of-safety breach; reduce position
      - - Rental rate compression >5%
        - Observable via rental rate surveys or disclosed in earnings commentary
        - EBITDA margin contraction; competitive moat weaker than modeled
        - Re-evaluate competitive thesis; assess URI/Sunbelt market share gains
    notes: >-
      Triggers are monitorable via quarterly 10-Q filings, earnings press releases, and third-party construction data
      (AGC, Dodge, Census Bureau). Thresholds are indicative, not absolute; management commentary on trajectory matters
      as much as the single-point metric. Kill triggers are additive: two triggers firing simultaneously requires
      immediate thesis review.
    claimRefs:
      - CV035
      - CV036
      - CV030
      - CV032
      - CV042
  - id: TV006
    title: Final diligence asks table
    description: Five key diligence requests that would move conviction from medium to high for institutional investors.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - T3 External SaaS ARR
        - Segment revenue from T3 subscriptions sold to external fleet owners; customer count; NRR
        - Primary driver of technology premium; without it, 30-50% of expected valuation upside is unverifiable
        - CFO data room; request ASC 280 segment disclosure in next 10-K; ask for ARR, GRR, and NRR
      - - Fleet Utilization Rate
        - Dollar utilization by equipment category on a quarterly basis
        - Most important EBITDA sensitivity driver; standard URI/Herc disclosure; absence is anomalous
        - Management quarterly KPI supplement; benchmark against URI dollar utilization disclosure
      - - OWN Program Concentration
        - Top 10 OWN Program fleet owners by OEC; revenue-sharing rate; contract duration and termination
        - 56% of fleet OEC ($4.9B) is third-party owned; undisclosed off-balance-sheet risk
        - 'Data room: OWN Program term sheet template and concentration schedule'
      - - Gross Margin by Segment
        - Rental vs. equipment sales vs. contractor supplies gross profit separately
        - Quantify mix-shift benefit from rental growth; model margin expansion path independently
        - CFO data room; require ASC 280 segment GP line in next 10-K filing
      - - Customer Retention / NRR
        - Net revenue retention for rental and T3 customers; churn by customer cohort
        - Core quality indicator; missing for all customer cohorts; NRR materially affects software valuation
        - Sales/CRM data room; request trailing 4-quarter NRR for both rental and T3 subscriber cohorts
    notes: >-
      Diligence asks are ranked by valuation impact. Item 1 (T3 ARR) is blocking: without it, conviction cannot exceed
      medium. Items 2-5 are material but individually insufficient to move conviction on their own. Disclosure in the
      next 10-K (FY2026, due March 2027) is the most likely path to resolution for items 1 and 4.
    claimRefs:
      - CV029
      - CV044
      - CV045
