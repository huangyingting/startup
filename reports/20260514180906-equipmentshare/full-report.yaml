          - type: callout
            title: United Rentals UR One Expansion Is the Primary Moat Threat
            body: >-
              United Rentals is actively investing in its UR One digital platform to add fleet utilization analytics,
              predictive maintenance, and customer-facing service capabilities—features that directly address
              EquipmentShare's technology differentiation. URI's ~$15 billion revenue base and $22 billion fleet give it
              substantial capacity to fund this effort. If UR One achieves T3-equivalent functionality within 3–5 years,
              EquipmentShare's technology moat could commoditize among large-account customers before T3 subscriptions
              generate standalone defensible ARR.
            calloutType: risk
            claimRefs:
              - CP006
