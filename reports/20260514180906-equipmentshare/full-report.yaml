        title: Customer Segments and Market Composition
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare serves approximately 80,000 active customers across the United States construction
              industry, with its customer base concentrated in general contractors, specialty trade subcontractors,
              infrastructure project operators, and industrial users. According to the company's FY2025 10-K filing, the
              general contractor segment represents the largest revenue contributor at roughly 40 percent of rental
              revenue, driven by demand for earthmoving equipment, aerial work platforms, and telehandlers on
              multi-trade job sites. Specialty trade contractors — electricians, plumbers, HVAC technicians, and framing
              crews — constitute approximately 30 percent, primarily renting small tools and compaction equipment. The
              remaining mix spans infrastructure operators managing highway, bridge, and utility projects (~15 percent),
              and industrial and manufacturing customers (~10 percent).

              The company targets firms generating between $5 million and $500 million in annual construction revenue, a
              highly fragmented middle market that values both equipment availability and operational intelligence from
              the T3 telematics platform. Geographic concentration mirrors the company's 407-location footprint across
              45 states, with customer density highest in the Sun Belt, Southeast, and central United States where the
              company was founded and scaled earliest. Over 357,000 assets are connected to the T3 platform, including
              both EquipmentShare-owned rental equipment and third-party customer-owned equipment managed through T3
              SaaS subscriptions, indicating broad platform adoption across the active customer base.
