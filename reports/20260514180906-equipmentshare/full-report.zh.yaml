      - number: '3.3'
        title: 技术竞争对手画像
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的 T3 平台与一组面向建筑业的远程信息处理和车队管理 SaaS 厂商竞争。它们解决同样的工地可见性问题，但没有实体租赁车队。


              Trackunit 由 Goldman Sachs Capital 和 GRO Capital 支持，是最突出的全球纯技术竞争对手。Trackunit 主要在欧洲和北欧连接超过 1.3M
              台资产，为建筑业提供混合车队远程信息处理平台。2023 年，Trackunit 收购 IronSight，这是一家工地出入和门禁管理平台，把价值主张从 GPS 追踪拓展出去。Trackunit 的纯 SaaS
              模式和欧洲集中度限制了它与 EquipmentShare 在美国租赁市场的直接竞争，但其技术成熟度是重要基准。


              Tenna 服务 700 多家美国建筑客户，提供结合 GPS、RFID 和 BLE 的多技术追踪平台，覆盖重型设备、工具和附件。Hilti ON!Track 面向企业建筑工地，提供与 Hilti
              工具体系深度集成的高端资产管理。


              Samsara (NYSE: IOT) 的广义 IoT 平台覆盖车辆、工业设备和配送车队，年经常性收入超过 $1B。Samsara 不如 T3 聚焦建筑业——缺少工地专用工作流，也没有
              EquipmentShare 那种深度的 OEM 远程信息处理集成——但其品牌认知和企业销售基础设施让它成为总承包商评估时可信的替代选项。


              现状追踪——纸笔日志和电子表格——仍是少于 5 台机器的承包商细分中的主流方法，也代表 EquipmentShare
              正在积极扩张的长尾中规模最大的竞争量。大型承包商自建车队管理系统构成第三类：企业可行的内部自建路径，但需要持续工程投入。
