      - number: '5.4'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: >
              T3 部署对大多数硬件 SKU 采用自助安装模式：GPS Trackers 和 Bluetooth Tags 安装所需技术能力较低；T3 Keypad 通常需要合格技师处理 CAN-bus 和电源布线
              [CE026]。

              EquipmentShare 通过覆盖全国、超过 250 个网点的分支网络支持部署，让现场技师可在客户现场配置硬件 [CE027]。

              与现有建筑项目管理平台的集成通过公开 API 处理；平台集成库包含面向主要建筑 SaaS 厂商的文档化连接器 [CE018][CE028]。


              可靠性由 T3 Uptime Center 托底，该中心全天候监控整个连接资产网络 [CE009]。

              设备服务历史保存在 T3 云端，形成持续审计轨迹；即便设备在客户之间、甚至在不同所有权项目之间转移，该记录也能保留下来 [CE007]。

              平台路线图聚焦三条线：扩展 Bauma Munich 2022 启动的自动化机器能力 [CE029]，随着数据集增长加深 AI 驱动的预测性维护精度 [CE022]，以及把外部 T3 订阅扩展到
              EquipmentShare 自有租赁客户之外 [CE030]。


              位于 Missouri 州 Columbia 的 Technology Development Center（TDC）在 2024 年开放，投资 $100M，支撑自动化机器和 AI 路线图。

              TDC 创造了 500 个净新增技术岗位，并作为下一代 T3 能力的主要工程设施 [CE031]。

              Bauma Munich 2022 试点展示的自动化机器操作系统，是把人类操作员从常规建筑任务中移除的早期但具体一步；该能力仍处 R&D 阶段，但若大规模商业化，可能重塑重型建筑的劳动力经济性
              [CE029][CE032]。
