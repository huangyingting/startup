      - number: '4.3'
        title: 成本结构、毛利率、营运资本与资本开支
        blocks:
          - type: paragraph
            body: |
              EquipmentShare 未在公开文件中拆分分部级毛利率，这是一个重要分析缺口。按第一性原理看，
              租赁业务毛利率显著高于设备销售：租赁收入具备经常性，成本结构主要是固定性质
              （车队折旧摊销、维护、保险），而设备销售收入直接承担接近批发水平的设备价值 COGS。
              行业可比公司显示，成熟运营商的租赁毛利率约在 55–65%，设备销售则为 10–20%。
              公司整体 EBITDA 利润率约 38%（Adj. Core EBITDA $1,667M / revenue $4,379M），
              与 EquipmentShare 当前规模下偏租赁的业务组合相符。

              车队资本开支是最主要的资金流出：EquipmentShare 在 FY2025 设备支出约 $1.8B，
              高于 Adj. Core EBITDA $1,667M，使融资活动前自由现金流为负。OWN Program 通过外部化车队所有权
              缓解这一压力——约 56% 的车队 OEC（$8.78B 中的 $4.9B）由第三方所有者按收入分成安排贡献，
              意味着 EquipmentShare 可从非自有资产上产生租赁收入。这个轻资本项目从结构上降低了总资本开支需求，
              也改善了 ROIC 观感。

              租赁业务的营运资本动态较有利：租赁收入预收或按周期计费，应收账款累积受限；
              设备库存周转则通过 T3 使用率数据管理。设备销售的营运资本更复杂，因为新设备库存需要先融资再销售。
              $3B ABL 循环信贷额度专门按资产抵押结构设计，由车队资产担保，车队扩张时基本可自我融资。
              净杠杆从 2025 年 Q1 的 3.2x 改善至 2026 年 Q1 的 2.8x，反映 IPO 后 EBITDA 增长快于债务增长。
