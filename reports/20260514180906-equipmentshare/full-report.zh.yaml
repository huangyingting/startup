      - number: '6.4'
        title: 获客与扩张向量
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare 的获客策略沿三条主线运作：地理分支扩张、作为 land-and-expand 机制的 T3 telematics 平台，以及 Infrastructure Investment
              and Jobs Act 带来的顺风，该法案预计到 2032 年引导 $550 billion 建筑活动。 公司在 2024 年新开超过 40
              个分支，每个分支都由本地客户经理支撑，在明确地理半径内主攻总承包商和专业分包商关系。 全国和企业客户团队聚焦 ENR top-100 承包商，这类客户有能力承诺多分支主租赁协议，形成推动网点级成交量的大客户关系。

              T3 SaaS 组件通过签下拥有自有车队、但订阅 telematics 和车队管理的承包商，创造了单独获客渠道；这些客户与平台互动后，会自然成为租赁潜在客户。 Associated Builders and
              Contractors 的劳动力数据，以及 Census Bureau 的 construction put-in-place 估计，确认建筑支出增长持续到 2025 年，从而验证可服务市场扩张逻辑。
              Bureau of Economic Analysis 的建筑行业 GDP 数据也印证了 5% 到 7% 的年度建筑产出增长，与 EquipmentShare 租赁收入轨迹一致。
              客户集中度风险是一个关键未披露变量：缺少 top-10 客户收入占比数据，就无法定量评估单一账户依赖；该信息应向管理层 data room 索取。
