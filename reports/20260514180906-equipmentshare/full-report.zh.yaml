      - number: '6.2'
        title: 具名客户证据与参考账户
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare 的公开客户关系受设备租赁行业标准合同保密惯例限制。不过，公开记录中仍有若干高质量具名客户数据点。 Yates Construction 是 ENR 排名前 20
              的总承包商，也是美国最大的私营建筑公司之一；该公司在车队管理讨论中公开提到 EquipmentShare T3 telematics，是目前质量最高的具名参考。 Missouri Department of
              Economic Development 在 2023 年庆祝 EquipmentShare 总部扩张的新闻稿中，识别了多家 Missouri 州建筑公司为活跃 EquipmentShare 租赁客户。

              Capterra、G2 等独立第三方评论平台合计有 40 到 60 条来自自称建筑专业人士的评论，描述活跃租赁使用、调度管理和 T3 软件部署，以中等置信度提供客户证据交叉验证。 ENR Top 400
              Contractors 榜单确认，EquipmentShare 运营地区内的中大型总承包商在项目执行中通常依赖第三方设备租赁，这与公司披露的客户组合一致。 10-K 中的 T3
              订阅用户汇总数量暗示存在可观具名账户基础，但公开文件没有逐项列出单个部署。 整体具名客户证据评级为部分充分，反映的是 EquipmentShare 的保密姿态，而不是缺少真实客户关系。
