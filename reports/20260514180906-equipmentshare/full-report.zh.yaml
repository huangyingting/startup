              FY2025 10-K 承认网络安全风险，但截至 2026 年 5 月，没有 SOC 2 Type II 报告、ISO 27001 认证或独立安全审计获得公开确认。 T3
              为数千家建筑承包商持有敏感运营数据——设备位置、操作员身份、使用模式、工地生产率。 数据泄露或平台宕机会损害客户关系，并可能让公司承担重大责任。云厂商身份和数据驻留条款同样未披露。
