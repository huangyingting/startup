      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              美国设备租赁市场有两个主要规模测算视角。最权威的美国本土来源 RER Top 100 年度行业排名，按前 100 大租赁公司的汇总收入估算，2024 年美国市场约为 $70B+。商业研究机构
              MarketsandMarkets 估计，2024 年全球设备租赁市场为 $121.6B，预计到 2029 年 CAGR 约 4.5–5%，全球规模约
              $152B。这两个视角不能直接横向比较——一个只看美国且基于收入，另一个看全球并使用出货 / 收入模型——但合在一起给出了外部边界和美国锚点。


              对 EquipmentShare 来说，最能自洽的 SAM 是公司当前运营的美国 45 个州中，非住宅和基础设施设备租赁需求。粗略三角测算：如果美国租赁市场约为 $70B，住宅 / 轻商业约占
              20–25%，则非住宅和基础设施部分约为 $52–56B。再按 45 州地理覆盖和竞争重叠调整，估计 SAM 为 $40–55B。这个估计粗糙且不确定；EquipmentShare 未在公开文件中披露自己的
              SAM 测算。


              EquipmentShare FY2025 租赁业务收入 $2,724M，意味着当前市占率约为 $70B 美国 TAM 的 3.9%，或更窄定义 SAM 的约 5–7%。对比来看，United Rentals
              2025 年收入约 $15B（约占美国 TAM 的 21%），是明确的市场龙头，规模约为 EquipmentShare 租赁业务的五倍。Sunbelt Rentals（约 $8B）和 Herc
              Holdings（约 $3.5B）位居第二、第三。前四大玩家合计约占美国市场 40–42%；剩余 58% 分散在区域和本地运营商手中。这种碎片化正是 EquipmentShare 地理扩张和整合战略的核心逻辑。


              SOM 分析：EquipmentShare 2026 全年收入指引为 $5.1–$5.6B（所有业务），显示公司仍在积极抢份额。如果租赁业务到 2027 年仍以类似 30%+ 速度增长，租赁收入可能接近
              $4–5B，对应 2027 年美国市占率约 6–7%。考虑建筑周期风险和竞争对手资本可得性，这条路径合理但并不确定。
