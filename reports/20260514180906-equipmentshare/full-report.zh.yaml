  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的核心市场是美国设备租赁行业——美国建筑和工业活动中，运营方为项目执行租用而非自有资本设备的那一部分。RER Top 100 行业排名估计，2024 年美国设备租赁市场超过
              $70B，这是被引用最广的美国本土基准。在其中，EquipmentShare
              聚焦非住宅和基础设施领域——商业建筑、工业设施、数据中心、制造工厂、土木工程、公路、桥梁和公用事业；不包括单户住宅建造，后者使用更轻、更少专用化的设备，并由本地经销商而非全国租赁平台主导。


              纳入的支出包括土方设备（挖掘机、装载机、平地机、压实机）、高空作业平台（曲臂式升降机、剪叉式升降机）、起重机和物料搬运设备、移动电力和温控、专用设备（沟槽支护、拆除、铺路）以及工地工具解决方案。排除的支出包括住宅专用工具、消费者设备租赁、完全绕开租赁的业主自营车队采购，以及更广义的建筑服务市场（劳动力、材料、工程）。与
              EquipmentShare 长期野心最相关的相邻市场，是卖给自有设备承包商的车队远程信息处理软件、二手设备转售市场，以及通过 Forge & Build 品牌门店（24 个网点）覆盖的建筑材料零售。


              现状替代方案——买家不从全国供应商租赁时会怎么做——包括：直接拥有设备（大型承包商的传统主流模式）、从本地独立商租赁、从区域玩家租赁，或使用自带设备的专业分包商。全国租赁平台主要围绕可得性、地理覆盖、车队宽度、正常运行保障，以及越来越重要的技术集成竞争。EquipmentShare
              的 T3 远程信息处理平台是这个维度的核心差异化抓手。美国建筑市场在包含住宅和基础设施后总规模超过 $2T，说明租赁可服务部分虽然边界清晰，但体量可观。
