      - number: '4.4'
        title: 公开牵引力与私有指标缺口
        blocks:
          - type: paragraph
            body: |
              对一家新近上市公司而言，EquipmentShare 的公开财务牵引力记录较完整。FY2025 审计收入
              $4,379M（较 FY2024 的 $3,764M 同比 +16%）由 2026 年 3 月 19 日提交的 10-K 支撑。
              2026 年 Q1 总收入 $989M（同比 +38%）和 TTM 收入 $4,652M 见 2026 年 5 月 earnings press release。
              公司把 2026 年指引中点从此前估计上调至收入 $5,147M–$5,575M、Adj. Core EBITDA
              $1,883M–$1,995M。运营指标包括 407 个网点、357,000+ 个 T3 连接资产、车队 OEC $9,065M，
              以及 252,252 台车队设备，平均机龄 31 个月。

              未公开披露的关键私有指标包括：（a）T3 SaaS 订阅收入作为独立分部——公司管理 357,000+ 个连接资产，
              但不报告每资产订阅 ARR、外部 SaaS 客户数或软件层 NRR；（b）车队实物使用率
              （文件提到 dollar utilization 公式，但未披露实际比率）；（c）租赁、销售和其他业务的分部级毛利率；
              （d）按渠道划分的 CAC 和销售周期数据；（e）OWN Program 合同条款，包括收入分成比例和车队所有者集中度。

              T3 SaaS 指标缺失是最重要的估值缺口：即便 T3 订阅只贡献 $200–$400M 高毛利经常性 ARR，
              该软件层隐含的软件倍数也可能代表总企业价值的 30–50%；但没有披露，投资者无法验证或建模。
              随着软件分部成熟，公司是否愿意在未来 10-K/10-Q 中披露 T3 指标，将是估值重评的关键催化剂。
