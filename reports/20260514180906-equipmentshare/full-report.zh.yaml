            title: 自动化机器 OS 是选择权最高、但不确定性也最高的押注
            body: >
              $100M TDC 投资和 Bauma Munich 2022 演示，显示公司在自动化建筑设备上有真实 R&D 雄心。 若商业化，自动化机器 OS 会把 T3
              从车队监控工具变成劳动力替代平台——可能是柴油发动机以来建筑行业最重大的经济扰动。 不过，自动化重型建筑设备的监管、安全和采用时间线仍高度不确定，公司也尚未宣布商业部署。
