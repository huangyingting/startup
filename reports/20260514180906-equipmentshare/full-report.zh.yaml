  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 周期性需求与资本强度定义主要下行情景
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare 最关键的风险，是非住宅建筑支出与租赁收入之间的结构性联动。设备租赁行业在 2007–2009 年衰退中收缩约 30%，同一传导机制仍完整存在：GDP
              放缓时，建筑开工下滑、使用率受压，车队运营商同时面对收入下降和闲置资产暴露。 截至 FY2025，EquipmentShare 车队 OEC 为 $9,065
              million；若使用率持续下降，将产生大量无法吸收的折旧，并可能带来残值减值。 公司年度设备支出约 $1.8
              billion，需要持续再投资以维持车队年龄和竞争力；因此即便需求温和走弱，也会迫使公司在继续资本开支和保留现金之间作出艰难选择。

              截至 2026 年 5 月，Federal Reserve 的高利率环境引入了额外传导渠道：融资成本上升会降低建筑项目承保可行性、推迟开工，并在 GDP 收缩可见之前压低设备需求。 IIJA
              基础设施顺风部分抵消了这一压力，且 2026 年 Q1 结果强劲、指引上调，但基础设施支出不能完全替代私人非住宅建筑活动。 2.8x 净杠杆在当前商业计划下可控；若 EBITDA 明显下滑，就会成为更急迫的问题。
              ABL 信贷额度提供流动性，但与资产质量和覆盖率绑定的 covenant 会在最需要灵活性时限制管理层空间。

              OWN Program 中，EquipmentShare 约 56% 的车队由第三方而非公司自身持有；这是部分缓解资本强度风险的结构性创新，但也引入了单独的交易对手风险。 如果 OWN Program
              参与者认为经济性恶化并撤出设备，EquipmentShare 将面临产能收缩，可能放大而非缓冲需求下行。
              需求风险与交易对手风险之间的这种联动，意味着两个最大风险因素并不独立；在投资者最关心的情景下，它们是相关的。
