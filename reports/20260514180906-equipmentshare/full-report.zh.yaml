      - number: '5.6'
        title: 信任、安全、安保与合规
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的 T3 平台为数千家建筑客户处理敏感运营数据——设备位置、使用模式、操作员身份和工地生产率指标。

              平台的安全与合规姿态是重要尽调事项，尤其考虑到公司刚 IPO，已承担公众公司披露义务 [CE041][CE042]。


              FY2025 10-K 明确把网络安全列为风险因素，承认数据泄露或系统故障可能损害客户关系，并让公司承担责任 [CE042]。

              这项披露较坦诚，但也确认公司安全姿态迄今没有在公开披露中获得独立验证。

              SOC 2 Type II 认证——处理敏感运营数据的云端 SaaS 供应商面对企业客户时的标准预期——截至 2026 年 5 月尚未由 EquipmentShare 公开确认，构成重大尽调缺口 [CE043]。

              云基础设施供应商选择（AWS、Azure 或 GCP）未公开披露，因此无法从公开来源验证超大规模云厂商冗余和数据驻留条款 [CE044]。


              安全与质量方面，T3 的操作员安全模块跟踪操作员认证和培训记录，Dash Cam 则用 AI 监测不安全驾驶行为和疲劳指标 [CE015][CE045]。

              RFID 项目成本归集功能为每个机器工时创建操作员级问责轨迹 [CE005]。

              这些功能与 OSHA 建筑安全要求一致，并为承包商提供可用于安全审计的文档 [CE046]。

              National Institute of Standards and Technology（NIST）Cybersecurity Framework 和 ISO 27001
              是处理这类工业运营数据的平台可参考的相关标准，但公司是否对齐这些框架尚未公开确认 [CE043][CE047]。
            claimRefs:
