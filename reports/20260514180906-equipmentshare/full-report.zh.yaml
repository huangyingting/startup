      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: |
              EquipmentShare 的 GTM 以直销 B2B 为主，采用全国大客户关系与本地分支机构承包商关系并行的混合模式。
              截至 2026 年 Q1，407 个网点构成一张分布式销售和履约网络：每个分支服务一个本地建筑市场，
              配备专门销售人员，靠近客户建立关系，远程竞争者很难复制。
              全国大客户团队主攻大型总承包商、住宅开发商和基础设施公司；这些客户跨多个地域运营，
              能从 T3 提供的统一车队管理中受益。

              公司没有正式披露销售周期代理指标，但租赁行业模式意味着，标准设备的成交周期较短
              （从询价到交付通常为数天到数周），涉及 T3 平台集成的全国大客户合同则周期更长
              （数周到数月）。获客成本（CAC）未公开披露；用分支扩张经济性做代理估算，新开不满
              12 个月的分支会产生启动成本，且这些成本被排除在成熟 EBITDA 计算之外，说明公司内部
              跟踪爬坡经济性，但没有对外披露。

              T3 平台承担留存和增购机制：承包商一旦把 T3 数据接入工地工作流，设备数据、使用历史和维护记录
              就嵌进平台，切换成本随之上升。公开披露很难量化这一点，但它确实形成了客户留存上的结构性优势。
              OWN Program 也承担 GTM 功能，吸引第三方车队所有者与 EquipmentShare 平台形成经济绑定，
              实质上在不需要同步增加资本开支的情况下扩展了分销网络。
