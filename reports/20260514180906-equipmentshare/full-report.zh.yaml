      - number: '2.5'
        title: 规模测算尽调缺口与冲突估计
        blocks:
          - type: paragraph
            body: >
              公开市场规模证据存在几个重要缺口和矛盾。第一，RER Top 100 对美国市场的估计（约 $70B）与 MarketsandMarkets
              对全球市场的估计（$121.6B）之间有明显差异。仅靠公开信息无法直接调和这两个估计：RER 只看美国且基于收入，MarketsandMarkets 使用专有建模方法。二者比例（美国约 $70B vs 全球约
              $122B）意味着美国约占全球设备租赁市场 57%——考虑美国建筑活动在全球中的占比，这并非不合理，但两家来源都没有确认这种方法。


              第二，EquipmentShare 不公开单独披露 T3 SaaS / 远程信息处理订阅收入。这使外部无法用公开来源独立测算可服务市场中的软件部分。公司 10-K 把 T3 列为产品类别，但未拆出软件业务的
              SaaS ARR、客户数或平均合同价值。这个缺口很重要，因为公司常被定位成一家挂着租赁业务的技术公司；没有 T3 SaaS 指标，就很难验证其相对纯租赁可比公司的估值溢价。


              第三，设备租赁渗透率——估计约 55% 的建筑设备使用来自租赁——在行业讨论中被广泛引用，但从公开数据看，这一数字的原始来源并不清楚。RER 和 ARA (American Rental Association)
              发布相关数据，但具体方法并未公开记录。渗透率是在提升（有利于行业 TAM 增长）还是已经平台化，是关键尽调问题，公开数据只能部分回答。


              第四，独立研究机构对全球设备租赁市场增长率的估计不一。MarketsandMarkets 预计到 2029 年 CAGR 为
              4.5–5%；行业报告引用的其他来源给出更低增长率。投资分析应把这些冲突预测视为区间，而非点估计。缺少一份基于经验证租赁收据（而非调查或建模）的权威自下而上市场规模研究，是持续存在的数据缺口。
