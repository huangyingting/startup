      - number: '7.2'
        title: 407 个网点规模下，监管和法律风险不可忽视
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare 的监管暴露地域分散，但结构上可预测。公司在北美约有 407 个网点，必须在每个运营辖区维持设备租赁牌照，遵守要求差异很大的州和地方商业许可制度，并满足管理设备排放和处置的环保法规。
              Environmental Protection Agency 对非道路发动机排放的规定，既给 EquipmentShare 自有车队带来合规义务，也间接影响 OWN Program 参与者。
              违规可能导致设备停用、罚款，或在客户关系对可持续承诺敏感的市场造成声誉损害。

              OSHA 建筑安全规定直接适用于 EquipmentShare 约 7,700 名员工，也适用于其出租给承包商的设备。 任何涉及 EquipmentShare
              设备的安全事故，都可能触发调查、处罚通知和声誉损害，进而影响客户留存。 公司还受多个辖区就业法律约束，员工数和网点数扩大后，劳动监管复杂度随之上升。

              作为 2026 年 1 月 IPO 后的新上市公司，EquipmentShare 现在承担 SEC 披露义务，包括 Regulation S-K 风险因素要求、proxy
              和公司治理规则，以及持续重大事件报告义务。 双层股权结构中，创始人通过 Class B shares 保留不成比例的投票控制权，这给机构股东带来治理风险，也可能受到 proxy advisors
              和指数提供商审视。 公司未披露已知重大诉讼或监管执法行动，但规模、多州运营、telematics 数据收集和公众公司义务叠加，形成需要持续法律资源和监控的风险面。 适用于 T3
              收集建筑现场运营数据的隐私法规，随着州级数据保护法律扩散，构成新兴监管风险。
