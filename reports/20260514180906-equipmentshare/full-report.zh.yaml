chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与使命
        blocks:
          - type: paragraph
            body: >
              EquipmentShare.com Inc (Nasdaq: EQPT) 是一家美国建筑科技与设备解决方案公司，总部位于密苏里州哥伦比亚 Bull Run Drive 5710 号。公司于 2014
              年注册成立，在进入 Y Combinator 2015 年冬季批次后，于 2015 年 1 月 1 日开始运营。2025 年 6 月 30 日，公司注册地从特拉华州迁至得克萨斯州。EquipmentShare
              的公开使命是「用工具赋能建筑业，释放生产率的大幅提升」，并把自己定位为「建筑未来」的建设者。


              公司是一套垂直整合平台，把自研 T3 云技术、已连接设备车队和全国直营网点拼在一起。传统设备租赁公司往往把技术栈和设备运营分开，EquipmentShare
              则把远程信息处理硬件和软件智能嵌进每一台自营设备，在工地上形成持续的数据层。凭借这种一体化模式，租赁客户可以实时看到车队位置、健康状态和利用率；技术栈割裂的竞争对手通常做不到同等深度。


              EquipmentShare 有三条主要收入线：（1）设备租赁及相关服务，这是核心且增长最快的业务；（2）新 / 二手机械设备销售；（3）面向自有车队客户销售的新兴远程信息处理 SaaS 订阅。公司还通过
              Forge & Build 品牌门店零售建筑材料和五金，并运营 9 个 OEM 经销点。EquipmentShare 把硬件、软件、租赁入口和服务打包进一个平台，试图把 T3 做成建筑业的操作系统——类似 iOS
              或 Android 之于移动端。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: 创始人与管理层
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 由 Jabbok Schlacks（CEO）和 William「Willy」Schlacks（总裁）兄弟联合创立，其他联合创始人包括 Jeff Lowe、Matthew
              McDonald 和 Brad Siegler。十几岁时，Jabbok 和 Willy 就在建筑、技术和总承包领域创业，亲身踩过承包商日常运营的痛点。2014 年，他们凭一个点对点设备市场概念赢得 Startup
              Weekend Columbia；这个概念后来演化为公司现在的租赁 + 技术一体化平台。


              Jabbok Schlacks 作为 CEO 负责公司战略、增长和投资者关系。Willy Schlacks
              作为总裁负责产品、技术和运营执行。两人的创始人—市场匹配度是重要竞争资产：他们从一线理解建筑工作流，这影响了产品决策和客户关系。两位创始人在 IPO 后仍保留大额股权，与公众股东利益高度一致。公司 2025 年
              10-K 披露，Jabbok 和 Willy Schlacks 获得了 IPO Founders Awards（与 IPO 挂钩的股权授予）。


              截至 2025 年 10-K 提交时，公司拥有 7,700+ 名团队成员（LinkedIn 显示 8,000+，早期关于页面提到 8,500+）。管理团队还包括负责资本市场沟通的投资者关系副总裁 Rhett
              Butler。公司总部位于密苏里州哥伦比亚 Bull Run Drive 5710 号，邮编 65201，电话 (573) 299-5222。
