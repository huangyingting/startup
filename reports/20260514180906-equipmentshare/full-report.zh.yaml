      - number: '3.2'
        title: 租赁既有玩家画像
        blocks:
          - type: paragraph
            body: >
              United Rentals 是美国乃至全球最大的设备租赁公司。URI FY2024 收入约 $15B，在 49 个州和加拿大拥有 1,500 多个分支网点，规模优势显著。其租赁车队 OEC 约
              $22B，为行业最大，是 EquipmentShare $9B 的两倍多。URI 通过专门项目服务 Fortune 500 全国账户，并积极并购：BlueLine
              Rental（2018）、BakerCorp（2018）和 General Finance Corporation（2021）。关键在于，URI 正在扩张 UR One
              数字平台，增加车队利用率追踪、预测性维护能力和面向客户的服务门户——直接冲击 EquipmentShare 的技术护城河。URI 的财务规模让它有能力大幅加速这项投资，这是 EquipmentShare
              面临的最不利单一竞争变化。


              Sunbelt Rentals 是 Ashtead Group (LSE: AHT) 的北美业务，年收入约 $7–8B，在美国拥有 1,400 多个网点。Sunbelt
              的战略强调并购增长和专用品类扩张：温控（ClimateZone）、工业服务和脚手架租赁。根据公开证据，截至目前 Sunbelt 没有可与 T3 或 UR One 相比的自研远程信息处理平台。


              Herc Holdings (NYSE: HRI) 是美国第四大租赁公司，FY2024 收入约 $3.5B，网点超过 400 个。它以 HercRentals 品牌运营，并提供 ProContractor
              项目。其技术投入弱于 URI。H&E Equipment Services 收入约 $1B，主要在美国 Gulf Coast 和 Southeast 运营；其竞争相关性更多是区域性的，而非全国性的。
