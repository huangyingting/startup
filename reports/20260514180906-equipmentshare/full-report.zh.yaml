  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的投资逻辑有四根支柱：（1）差异化技术平台 T3 已嵌入 357,000+ 台联网资产，形成切换成本，也可能孕育尚未被股价反映的高毛利 SaaS
              层；（2）租赁收入增长在加速——FY2025 同比 34%，2026 年 Q1 同比 37%——明显跑赢 United Rentals（约 10% 增长）和 Herc Holdings（约 8%
              增长），背后是网点扩张和 IIJA 基础设施支出；（3）OWN Program 让车队模型更节省资本，OEC 达 $4.9B、占总车队 56%，在扩大可租资产基础的同时降低总资本开支需求；（4）6.3x TTM
              EV/EBITDA 的入场估值较 United Rentals 折价 50-60%，较中型同业 Herc Holdings 和 Ashtead 折价 20-35%，给执行风险留出有意义的安全边际。


              反向逻辑同样清楚。第一，T3 的技术溢价无法靠公开披露验证：任何 SEC 文件、业绩公告或 IR 材料都没有披露外部 SaaS ARR、客户数或净收入留存率。如果 T3 的外部订阅收入很小（ARR 低于 $100
              million），估值逻辑就完全回到传统设备租赁倍数，当前 6.3x 只能算合理，并不便宜。第二，建筑市场周期性仍是实质风险：EquipmentShare
              的全部收入都与美国开工量相关，若加息驱动放缓，设备需求可能下滑 10-20%，收入和 EBITDA 利润率会同时承压。第三，资本密集度压住自由现金流：FY2025 车队资本开支约 $1.8 billion，高于
              Adjusted Core EBITDA $1.667 billion，公司在高增长模式下仍为 FCF 负值。最后，OWN Program 的集中度风险不透明：56% 可租车队由第三方持有，收入分成条款未披露；若
              OWN 参与方退出或重谈条款，公司可能承担或有表外义务。


              目前证据权重仍更支持投资逻辑，而非反向逻辑，但安全垫比乐观叙事暗示的更窄。6.3x 的入场倍数提供下行保护；倍数扩张路径取决于市场还没有看到的证据。
