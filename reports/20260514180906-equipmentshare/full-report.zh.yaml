      - number: '8.3'
        title: 情景分析：乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              估值框架建立在三个情景上，锚定可观察经营指标和行业可比公司。基准情景假设：未来三年，新网点爬坡（FY2025 新开 95 个）后，收入增长回落到 15-20%；2025 年网点队列成熟后，EBITDA
              利润率向成熟网点 54-55% 的上限扩张；市场更理解 T3 的可选性后，EV/EBITDA 倍数从 6.3x 重估至 8-10x。按约 $1.78-$2.0 billion 的前瞻 EBITDA（FY2026
              指引中点）和 8-10x 计算，隐含 EV 为 $14.2-$18.0 billion，较 IPO 企业价值有 27-60% 上行空间。


              乐观情景要求 T3 外部 SaaS ARR 被披露为实质规模（ARR 高于 $200M，毛利率 70%+）、IIJA 基础设施项目活动持续推动租赁收入保持 30%+ 增长，并且投资者给予混合租赁 / SaaS
              倍数，使倍数重估至 12-14x。在这些假设下，约 $2.1 billion 的未来 12 个月 EBITDA 可支撑 $25-$28 billion EV，意味着较 IPO 价格有 120-150%
              上行。乐观触发因素包括：在业绩补充材料或 10-K 分部附注中首次披露外部 T3 ARR；连续多个季度租赁收入增长 30%+；以及进入新的邻近市场，例如专业租赁，或面向非建筑垂直行业的 T3 驱动车队管理。


              悲观情景锚定长期高利率环境触发的建筑需求放缓。如果 Federal Reserve 在 2026-2027 年维持高利率，且开工量下降超过 15%，EquipmentShare 的租赁收入增长会降至 5%
              以下。劳动力、燃油、维修等成本通胀和车队利用率不足会压缩 EBITDA 利润率，倍数也会停留在 5-6x。按这些假设，隐含 EV 为 $8.9-$10.7 billion，较 IPO 企业价值下跌 -5% 至
              -20%。悲观情景下行有限，因为 ABL 授信契约按资产基础设定（不是按利率比率），限制了契约违约风险，OWN Program 也提供了可变成本车队弹性。Moody's
              的建筑展望把高利率敏感性和信贷市场可能收紧列为 2026 年建筑行业的主要宏观风险，与悲观情景逻辑一致。


              各情景的概率分布更偏向基准情景（估计 50-60%），高于乐观情景（20-25%）和悲观情景（15-30%）。判断依据是当前宏观轨迹、IIJA 支出管线，以及 EquipmentShare 2026 年 Q1
              的强执行。不过，如果 Federal Reserve 在 2026 年释放超出当前市场预期的进一步加息信号，或 AGC、Dodge 的开工数据连续三个月或更长时间环比恶化，悲观情景概率会显著上升。
