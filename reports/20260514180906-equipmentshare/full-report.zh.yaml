      - number: '7.4'
        title: OWN Program、合作伙伴与财务模型集中度需要明确压力测试
        blocks:
          - type: paragraph
            body: >-
              OWN Program 同时是 EquipmentShare 最独特的金融创新，也是最不透明的风险因素。 约 56% 的车队由第三方参与者持有，EquipmentShare
              实质上搭建了一个可变成本车队模型，降低固定资产暴露；但该项目在压力下的韧性尚未经过公开检验。 如果 OWN Program
              参与者自身承压——许多中小设备所有者在建筑下行周期中都会如此——他们可能撤出设备、把资产卖给竞争者，或重新谈判收入分成条款。 OWN Program 参与者数量、平均车队贡献和对 EquipmentShare
              的合同义务均未披露，外部无法独立评估该群体内部集中度风险。

              $3 billion ABL 信贷额度是关键流动性资源，但它也代表一段集中的银行关系；相关条款和 covenant 可能在压力情景下限制 EquipmentShare 的运营灵活性。 ABL
              额度中的贷款人对自有车队持有担保权益，因此需求下行可能同时降低资产价值（压缩 borrowing base）并提高提款压力（提高 utilization）。
              这种动态在资产密集型贷款中很常见，但考虑到当前杠杆水平，需要被明确关注。

              United Rentals 带来的竞争动态是一项战略集中风险；该公司收入约 $15 billion，并正大举投资数字能力，包括 UR One 平台。 如果 United Rentals 通过自研或收购成功把
              telematics 和车队管理技术商品化，EquipmentShare 的 T3 差异化溢价可能被压缩。 Trackunit 和 Samsara 也瞄准建筑 telematics 市场，给软件层增加竞争压力。
              Herc Holdings 和其他中型租赁运营商也在特定地理区域争夺 EquipmentShare 客户。 因此，财务模型风险既是周期性的（需求冲击），也是竞争性的（技术商品化导致利润率压缩）。
