      - number: '3.4'
        title: 能力与定价分析
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的一体化模式制造了纯租赁和纯技术竞争对手无法独立补齐的能力缺口。车队规模上，United Rentals 以约 $22B OEC 领先 EquipmentShare 的
              $9B，优势为 2.4×；但 EquipmentShare 的车队是行业最年轻的，平均车龄 31 个月，行业为 42+ 个月。技术深度上，EquipmentShare 领先所有租赁既有玩家：T3 的
              357,000+ 台已连接资产和每天 6B+ 个数据点，在租赁细分中无人匹敌。地理覆盖上，URI 覆盖 49 个州，EquipmentShare 覆盖 45 个州，差距不大，且随着 EquipmentShare
              每年新开约 100 个网点正在收窄。资本模式上，EquipmentShare 的 OWN Program——第三方投资者持有约 56% 的车队 OEC——带来资本效率优势，传统资本开支重的既有玩家很难复制。


              设备租赁定价在全行业都相当不透明。费率按日 / 周 / 月排期制定，中小企业本地谈判，大客户全国谈判；公开标价很少。EquipmentShare 的费率整体与既有玩家相当，差异化来自免费打包的
              T3。技术竞争对手按资产或车辆收取 SaaS 订阅费（Trackunit 或 Tenna 未公开具体费率），还要叠加租赁成本。这意味着客户如果使用既有租赁商再加第三方远程信息处理，相比
              EquipmentShare 的全包捆绑定价，需要支付合并成本溢价——这是 EquipmentShare 应继续在销售对话中利用的结构性定价优势。
