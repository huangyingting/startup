        - 销售 / CRM 数据室；要求披露租赁和 T3 订阅 cohort 过去 4 个季度 NRR
    notes: >-
      尽调追问按估值影响排序。第 1 项（T3 ARR）是阻断项：没有它，信心不能超过中等。第 2-5 项重要，但单独一项不足以改变信心。下一份 10-K（FY2026，预计 2027 年 3 月提交）披露，是解决第 1 和第 4
      项最可能的路径。
    claimRefs:
      - CV029
      - CV044
      - CV045
