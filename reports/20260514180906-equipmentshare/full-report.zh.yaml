      - number: '8.2'
        title: 融资背景、估值与入场纪律
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 于 2026 年 1 月 23 日在 Nasdaq Global Select Market 完成首次公开募股（IPO），发行价为每股 $24.50，募集总额约 $747
              million。本次发行后共有 228,478,203 股 Class A 股票和 37,568,944 股 Class B 股票，合计约 266 million 股在外流通。按 IPO 价格计算，隐含市值约
              $6.5 billion。加上约 $5.0 billion 净债务（来自 $3 billion ABL 授信及其他债务），再扣除 2026 年 Q1 末 $329 million 现金，企业价值约 $11.2
              billion。按截至 2026 年 Q1 的 TTM Adjusted Core EBITDA $1,776 million 计算，IPO 隐含 EV/EBITDA 约 6.3x。


              IPO 时，优先股堆叠被大幅简化：所有在外优先股在发行时转换为 Class A 普通股，消除了通常压低 IPO 前估值的悬顶。IPO 后资本结构包括普通股（Class A 和 Class B）、Capital
              One Bank 提供的 $3 billion 资产支持循环信贷额度，以及设备票据。净杠杆从 2025 年 Q1 的 3.2x 降至 2026 年 Q1 的 2.8x；2026 年指引上调至收入
              $5,147-$5,575 million、EBITDA $1,883-$1,995 million，意味着盈利增长会进一步去杠杆。ABL 契约绑定借款基数（车队
              OEC），不是固定比率，因此在需求温和情景下违约风险更低。


              入场纪律支持当前价格。6.3x TTM EV/EBITDA 相比上市租赁同业 8-15x 区间更有吸引力。即便因 T3 指标不透明，EquipmentShare 较中型同业折价 20%（8x 倍数），隐含 EV
              也约 $14.2 billion，较 IPO 价格溢价 27%。悲观情景按 5-6x EBITDA 计算，隐含 EV 为 $8.9-$10.7 billion，较 IPO 价下跌 -5% 至 -20%；对于一个
              Q1 收入增长 38%、杠杆改善的业务，下行可控。当前价格的风险收益向上不对称。


              公开证据基本支撑 IPO 价格：经审计的 FY2025 10-K 收入和 EBITDA 得到确认，2026 年 Q1 结果超出共识，2026 年指引已上调，S-1 招股说明书披露了详细财务信息。主要证据缺口是缺少
              T3 SaaS 指标；这些指标会决定股票是否应在租赁同业倍数之上获得软件溢价。
