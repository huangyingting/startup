      - number: '2.3'
        title: 买家分层与采用路径
        blocks:
          - type: paragraph
            body: >
              设备租赁买家可按项目类型、预算归属和技术采用准备度分为四类。总承包商（GCs）是最大、也最依赖关系的买家群体，通常管理多工种项目，并由项目管理层或现场主管做租赁决策。他们看重车队可得性、跨州服务可迁移性和客户经理连续性。GCs
              按项目高频租赁，是全国平台价值最高的账户。EquipmentShare 在 45 个州布局 407 个网点，就是为了跟随 GC 工地扩张。


              专业分包商（电工、管道工、挖掘承包商、混凝土专家）是分散且价格敏感的群体。他们通常为特定作业范围租用更轻或专用设备，常由业主经营者或工长层面决策，集中采购很少。由于成本敏感且熟悉本地关系，这一群体对技术增强型租赁产品的采用最低。工业运营商——石化、制造、公用事业、数据中心——受回流制造和
              AI 基础设施顺风驱动，是 EquipmentShare 日益重要的战略客群。这些运营商往往集中采购，有经常性租赁需求（而非按项目），也更习惯 IoT 和监控工具，因此适合采用 T3。


              土木和政府承包商（公路、桥梁、公用事业）受长期项目授标驱动，资金常来自联邦和州政府。IIJA 在 10 年内投入 $1.2T
              基础设施支出，为重型土方、铺路和平整设备创造持续需求积压。政府资助项目采购复杂（现行工资、履约保证、保险），但能提供多年可见度。预算归属和采用路径因细分而异：GCs
              的决策会随着账户扩大，从项目经理转向公司采购；工业运营商由采购和工厂管理层把关；土木承包商则受项目业主和担保要求约束。


              T3 采用漏斗从租赁关系开始——客户先在租来的设备上体验 T3 远程信息处理——之后可能转为自有车队购买独立 SaaS
              订阅。不过，建筑技术采用仍处早期：多数美国承包商仍用纸笔或基础电子表格管理工地，这既是巨大转化机会，也意味着纯 SaaS 变现短期爬坡较慢。EquipmentShare 的策略是把租赁关系作为 T3
              采用的漏斗入口。
