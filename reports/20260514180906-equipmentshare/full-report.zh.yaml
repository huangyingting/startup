      - number: '5.2'
        title: 产品模块与资产地图
        blocks:
          - type: paragraph
            body: >
              T3 由四个硬件 SKU 和一套多模块云端 SaaS 组成。硬件层面向广泛 OEM 兼容而设计：所有设备都可安装在任意制造商的设备上，不需要专有总线访问或特定设备固件 [CE013][CE014]。

              T3 Keypad 是旗舰连接控制单元，把远程锁定 / 解锁、云连接和基于 RFID 卡的项目成本归集合在一起，可自动把机器工时记入具体项目和操作员 [CE005]。

              GPS Tracker 为车队内任意资产提供实时位置和历史回放，并具备电子围栏能力，在设备离开指定作业区时提醒管理者 [CE006]。

              Dash Cam 增加 AI 驱动的前向和驾驶员监控摄像头，覆盖碰撞检测、疲劳监测和事件标记 [CE015]。

              Bluetooth Tags 把资产跟踪延伸到小型工具和附件，这些资产低于 GPS 硬件经济性阈值，从而把资产跟踪生态补齐到手持工具层面 [CE016]。


              软件侧，T3 云平台按功能模块组织：车队管理仪表盘、实时 GPS 与电子围栏、维护排程和服务历史、燃油监控与消耗分析、操作员安全和认证跟踪、工地使用率分析，以及远程锁定 / 解锁命令界面
              [CE007][CE017]。

              平台开放集成 API，可连接 Procore、Viewpoint 等第三方建筑管理软件，让承包商把 T3 使用率数据推入更广泛的项目管理工作流 [CE018]。

              截至 2026 年 5 月，T3 已连接超过 357,000 个资产，每天生成超过 60 亿个数据点——这些数字确立了 T3 作为全球建筑行业最大工业 IoT 网络之一的地位 [CE019][CE020]。
