  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: T3 平台：产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              T3 是 EquipmentShare 的自研技术平台，定位为「The Operating System for Construction」。它把安装在任意品牌或型号重型建筑设备上的 IoT 硬件，与云端
              SaaS 层打通，让承包商实时看见并控制整支车队 [CE001][CE002]。

              在客户工作流中，T3 解决建筑运营商每天面对的四个相互关联的问题：计划外维护造成设备停机、工地机器闲置和使用不足、资产位置缺少实时可见性，以及无法在没有人工检查的情况下强制执行操作员安全与认证合规
              [CE003][CE004]。


              承包商的工作流从在机器上安装 T3 硬件开始——无论该机器自有，还是从 EquipmentShare 租赁。

              从那一刻起，T3 Keypad 支持远程启停和基于 RFID 的项目成本归集，GPS Tracker 提供实时位置和电子围栏提醒，Dash Cam 则提供 AI 驱动的驾驶员监控和碰撞检测
              [CE005][CE006]。

              所有传感器数据流汇入 T3 云端仪表盘，车队经理无需逐台实地查看机器，就能安排预防性维护、分析油耗、查看操作员安全评分，并生成工地使用率报告 [CE007][CE008]。

              T3 Uptime Center 由专门运营团队 24/7 监控 EquipmentShare 客户群中的连接设备，在高成本故障发生前主动介入 [CE009]。


              T3 既作为 EquipmentShare 自有 OWN 和 RENT 车队内嵌能力销售，也作为外部 SaaS 订阅销售给管理自有设备的承包商 [CE010]。

              这种双重分销创造了两条不同收入向量：平台加深 EquipmentShare 自身租赁运营，同时生成一条越来越独立于租赁周期的订阅收入流 [CE011]。

              客户验证很具体：Yates Construction 报告称，在全车队部署 T3 后，整体工地效率提升 20%；对资本密集型业务而言，这是非常突出的运营收益 [CE012]。
