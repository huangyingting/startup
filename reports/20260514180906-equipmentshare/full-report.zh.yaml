    rows:
      - - T3 SaaS 外部 ARR / 订阅收入
        - 无法独立估值技术层；软件倍数可能占 EV 的 30–50%
        - 向 CFO 索取独立 T3 分部 P&L；要求在下一份 10-K 中披露
        - 阻断
      - - 车队实物利用率
        - 无法建模需求周期下的 EBITDA 敏感性；利用率是租赁收入的主要驱动项
        - 要求在 IR 补充材料中按季度披露各设备品类利用率；对照 United Rentals 披露
        - 重大
      - - 分部毛利率（租赁 vs 销售 vs 其他）
        - 无法评估租赁增长快于销售带来的结构红利；混合利润率模型不可靠
        - 要求按 ASC 280 在 10-K 分部脚注中列示分部毛利
        - 重大
      - - 获客成本 / 销售周期数据
        - 无法计算销售效率回本期，也无法验证 GTM 杠杆逻辑
        - 要求 B2B 销售数据室包：混合 CAC、平均销售周期、全国客户 vs 本地客户拆分
        - 中等
      - - OWN Program 合同条款
        - 表外承诺未知；若 OWN 车队所有者退出，无法建模下行情景
        - 索取 OWN Program 条款清单模板；车队所有者集中度报告；续约 / 终止权
        - 中等
      - - T3 联网资产 NRR / 流失率
        - 无法评估平台粘性，也无法建模现有装机基础带来的 ARR 增长
        - 向管理层索取 T3 外部订阅的 NRR 和流失 cohort 数据
        - 中等
    notes: >-
      缺口主要集中在 T3 技术层和分部级利润率细节——这两个维度最直接影响 EquipmentShare 相比传统租赁同行的估值溢价。 车队利用率披露是上市设备租赁公司的标准做法（United Rentals
      按季度披露金额利用率），缺失这一指标，对上市公司而言是明显遗漏。
