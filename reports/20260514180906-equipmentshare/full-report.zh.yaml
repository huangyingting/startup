      - number: '1.3'
        title: 融资历史与 IPO
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 从 Y Combinator 种子期公司成长为近年规模最大的建筑科技 IPO 之一。早期融资包括 $5.5M Series A 和 $26M Series B，均在 2015 至
              2017 年间完成。之后，公司据称在 2021 年末完成 $220M Series E；2022 年 4 月又完成标志性的 $600M Series F，由 SoftBank Vision Fund 2
              领投，投后估值 $3.3B——估值扩大到此前三倍，也让公司成为当时美国最有价值的建筑科技创业公司之一。


              2023 年，公司与 Capital One Bank 达成 $3B 高级担保资产支持循环信贷额度，为按资本效率更高的 OWN Program 模式扩张车队提供充足流动性。


              EquipmentShare 于 2025 年 12 月 9 日向 SEC 提交 S-1 招股说明书（2026 年 1 月 13 日修订），并于 2026 年 1 月 23 日完成 IPO，在 Nasdaq
              Global Select Market 以股票代码 EQPT 上市，发行价 $24.50/股。IPO 募集总额约 $747M。Reuters 报道称 IPO 目标估值超过 $6B。截至 2026 年 2 月
              28 日，EquipmentShare 有 228,478,203 股 A 类股和 37,568,944 股 B 类股在外流通——合计约 266M 股，按 IPO 发行价计算，市值约 $6.5B。
