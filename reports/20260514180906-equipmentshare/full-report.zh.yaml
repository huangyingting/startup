          - type: callout
            title: 当前水平买入——6.3x EV/EBITDA 提供有吸引力的入场点
            body: >-
              EquipmentShare 6.3x TTM EV/EBITDA 的入场倍数较 United Rentals 折价 50-60%，较 Herc Holdings 和 Ashtead 折价
              20-35%。基准情景假设信息缺口收敛后重估至 8-10x，三年内股权上行 25-60%。风险收益不对称：悲观情景下行限制在 -15% 至 -20%，而 T3 SaaS 被确认后的乐观情景上行可达
              90-130%。建议以中等确信度买入；风险评级高。
            calloutType: recommendation
            claimRefs:
              - CV023
              - CV005
              - CV034
              - CV043
          - type: callout
            title: T3 SaaS ARR 缺口：没有披露，中等确信度无法升至高确信度
            body: >-
              乐观情景里的技术溢价完全取决于 T3 外部 SaaS ARR，但任何 SEC 文件、业绩公告或 IR 补充材料都未披露该指标。如果 T3 ARR 低于 $100M，技术层收入很小，股票应按 5-7x
              纯租赁倍数交易。在 ASC 280 分部披露或管理层数据室确认给出这个数字之前，确信度只能维持中等。这是阻断性的证据缺口。
            calloutType: risk
            claimRefs:
              - CV035
              - CV044
