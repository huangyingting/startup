      - number: '8.5'
        title: 退出准备度、止损触发因素与最终尽调
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 于 2026 年 1 月进入公开市场，在 Nasdaq Global Select Market
              交易，具备标准二级市场流动性。对机构投资者而言，主要退出路径是公开市场二级出售；大宗交易可由公司的投行安排（Goldman Sachs 是 IPO 主承销商）。对私募股权和战略投资者而言，潜在 M&A
              退出路径包括被 United Rentals 收购（该公司有收购小型租赁运营商的成熟记录，包括 H&E Equipment Services）、被 Ashtead Group
              收购（寻求加深北美布局），或由私募股权以高于公开市场倍数的价格私有化。


              五个破坏投资逻辑的触发因素需要持续监控。第一，T3 SaaS ARR 披露低于 $100 million：如果软件层收入很小，技术溢价会坍塌，股票应以 5-7x EV/EBITDA 交易，意味着较 IPO 下跌
              10-30%。第二，2026 年收入较指引中点（$5,361M）低逾 10%：如果总收入低于 $4.8 billion，EBITDA 增长故事就会断裂，市场可能按悲观情景倍数重估股票。第三，按 AGC 或
              Dodge 数据，美国开工量过去三个月下降超过 15%：这将提示结构性需求逆转，挑战整个设备租赁逻辑。第四，净杠杆升至 4.0x 以上：这会引入 ABL
              契约压力，并把股权缓冲压低到令机构持有人担忧的水平。第五，United Rentals 或 Sunbelt Rentals 激进价格竞争导致租赁费率压缩超过 5%：在车队固定成本基数下，EBITDA
              利润率会明显收缩。


              高确信度投资前，最终尽调需要回答五个问题：（1）T3 外部 SaaS ARR 作为独立分部指标披露，并给出客户数和 NRR；（2）按设备类别、按季度披露车队美元利用率，格式可与 United Rentals
              披露口径对比；（3）OWN Program 业主集中度（按 OEC 排名前 10
              的业主）以及合同条款，包括收入分成比例和终止条款；（4）按分部披露毛利率（租赁、设备销售、承包商用品），以量化组合迁移带来的利润率扩张路径；（5）租赁客户和 T3 订阅客户的留存 / NRR
              数据。在这五项披露之前——无论通过下一份 10-K/10-Q 文件，还是通过管理层数据室访问——确信度只能维持中等，不能升到高。
