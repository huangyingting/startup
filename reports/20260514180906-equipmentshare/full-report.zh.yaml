      - number: '7.5'
        title: 缓释因素有意义，但 kill criteria 与尽调缺口仍未关闭
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare 已为最突出的风险部署了真实缓释。OWN Program 本身是对资本强度风险的结构性对冲，把车队所有权成本转移给第三方，并把固定成本转为可变收入分成义务。 IIJA
              顺风提供多年基础设施支出可见性，让 EquipmentShare 增长与私人建筑周期部分脱钩。 多元化终端市场组合——覆盖基础设施、数据中心、能源和商业建筑——降低收入基础对单一行业的相关性。 ABL 信贷额度
              $3 billion 容量为短期需求走弱提供了实质流动性缓冲。

              2026 年 Q1 财务结果和上调后的指引确认，近期基本面强劲，降低了投资逻辑立即破裂的概率。 但增长期有效的缓释，在收缩期未必同样有效。 OWN Program 在压力下的韧性未经检验；ABL covenant
              在 borrowing base 下滑时如何运作未完全披露；T3 网络安全姿态也没有通过公开认证或审计披露得到独立验证。

              投资者在承销敞口前，应定义明确的 kill criteria。最重要的投资逻辑破裂触发因素包括：建筑支出持续同比下降超过 15%、OWN Program 参与者明显撤出并实质减少车队容量、发生大规模破坏 T3
              的网络安全事件、因 EBITDA 下滑导致净杠杆升至 4x 以上，或创始 CEO 或 President 任一离任且未宣布继任安排。 针对这些触发因素，监控指标包括：AGC 建筑支出报告、Census
              Bureau 非住宅建筑数据、EquipmentShare 季度使用率、Federal Reserve FOMC 会议纪要和利率决策，以及 T3 连接指标。 OWN Program 集中度、T3
              安全审计和继任规划缺少公开披露，是机构投资者面前最重要的尽调缺口。
