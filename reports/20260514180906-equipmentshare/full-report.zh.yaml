  - id: FE001
    title: 产品架构图
    type: stack
    caption: |
      T3 技术栈分五层，从底部的 IoT 硬件到面向客户的应用层。数据和 ML 层是主要价值创造引擎；硬件层支持跨所有设备制造商的 OEM 无关覆盖。
    data:
      layers:
        - label: 应用层
          detail: Web 和移动仪表盘：车队管理、GPS 与地理围栏、维护排程、燃油监控、操作员安全、利用率分析；远程锁定 / 解锁命令界面
        - label: 集成层
          detail: 面向第三方建筑 SaaS（Procore、Viewpoint）的公开 API；外部 T3 订阅门户；T3 Uptime Center 托管服务界面
        - label: ML / 分析层
          detail: 预测性维护模型；工地利用率 AI；燃油消耗分析；操作员安全评分；AI 驱动的 Dash Cam 事故检测
        - label: 数据层
          detail: 每天处理 6B+ 个数据点；云存储运行在未披露的超大规模云厂商上；历史车队语料覆盖 357,000+ 台不分 OEM 的资产；ML 训练流水线
        - label: 连接层
          detail: 所有硬件 SKU 通过蜂窝 LTE/4G 回传遥测数据；工具标签使用 Bluetooth LE；不绑定运营商，实时流式传输到云端摄取流水线
        - label: 硬件层
          detail: T3 Keypad（远程控制、RFID 作业成本核算）；GPS Tracker（实时位置、地理围栏）；Dash Cam（AI 司机监控、碰撞检测）；Bluetooth Tags（小型工具追踪）
