  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的竞争环境横跨两个历史上相互独立的行业：设备租赁和建筑技术软件。租赁侧，公司面对三家全国性既有玩家——United Rentals (NYSE: URI)、Sunbelt
              Rentals（Ashtead Group, LSE: AHT）和 Herc Holdings (NYSE: HRI)——以及以 H&E Equipment Services
              为代表的区域运营商。这些既有玩家拥有大得多的车队和分支网络，但过去自研技术栈有限。技术侧，EquipmentShare 的 T3 平台与建筑远程信息处理和车队管理 SaaS
              厂商竞争：Trackunit（Goldman Sachs Capital / GRO Capital 支持）、Tenna、Samsara (NYSE: IOT) 和 Hilti
              ON!Track。这些供应商提供纯软件方案，不背资本密集的租赁车队。


              还有两个不太显眼的竞争向量也很重要：一是现状竞争——小型承包商仍大量使用电子表格和纸质日志；二是内部自建路径，大型总承包商可能开发自有车队管理系统，而不采用第三方平台。EquipmentShare 的 10-K
              文件明确点名 United Rentals、Sunbelt Rentals、Herc Holdings 和 H&E Equipment Services 为直接竞争对手，并把基于技术的差异化列为关键战略优先级。


              EquipmentShare 占据一个结构上独特的象限：有可观租赁车队规模，同时拥有嵌入每台机器、而非外挂的自研技术平台。RER 100 榜单按车队规模将 EquipmentShare 列为美国第五大租赁公司，而
              FY2025 租赁业务同比增长 34%，是前五名中最快的。向前看，最重要风险是 United Rentals 持续扩张 UR One
              平台；如果投入足够，它可能把技术层商品化。短期潜在进入者可能包括资本充足、希望通过收购获取美国市场份额的国际远程信息处理玩家。
