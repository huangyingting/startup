      - number: '1.5'
        title: 关键 KPI 快照
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 作为新上市公司，当前规模有经审计财务数据支撑。2025 全年总收入达到 $4,379M，较 2024 年的 $3,764M 增长
              16%。租赁业务是利润率最高、增长最快的核心，2025 年贡献 $2,724M，同比增长 34%。Q1 2026 总收入为 $989M（同比增长 38%），截至 Q1 2026 的过去十二个月（TTM）收入为
              $4,652M。公司 2025 全年实现净利润 $40M，Adjusted Core EBITDA 为 $1,667M。


              成熟租赁网点 2025 全年 Adjusted EBITDA 利润率为 54%，截至 Q1 2026 的 TTM 口径升至 55%。成熟网点 2025 年投入资本回报率为 16.5%。截至 2026 年 3 月
              31 日，公司可用流动性合计 $1,605M，其中循环信贷可用额度 $1,276M、现金 $329M。Q1 2026 净杠杆为 2.8x，低于一年前的 3.2x。公司 2026 全年指引为总收入
              $5,147–$5,575M，Adjusted Core EBITDA 为 $1,883–$1,995M。


              关键数据缺口：公司未公开按 SaaS / 远程信息处理层拆分的细分毛利；未披露按职能划分的员工数；也未单独披露 T3 SaaS 订阅收入贡献。公司不单独披露 T3 独立订阅
              ARR，因此很难把技术层从租赁业务中拆出来单独估值。
