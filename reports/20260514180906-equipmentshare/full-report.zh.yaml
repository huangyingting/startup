      - number: '1.4'
        title: 规模与关键里程碑
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 自 2015 年开始运营以来扩张极快。到 2018–2020 年，公司开出第 100 个网点，入选 Forbes 最佳创业雇主，启动
              Link-Belt、Takeuchi、Yanmar 等品牌经销业务，成为建筑设备最大买家，推出 Tooling Solutions 设备部门，并在慕尼黑 Bauma 展示试点自动化机器操作系统。到
              2021–2023 年，公司把技术平台更名为 T3（建筑操作系统），推出 Advanced Solutions 专用设备部门，成为美国第 4 大设备租赁公司，并宣布 Forge & Build 零售五金品牌。


              2024 年，EquipmentShare 在哥伦比亚开设技术开发中心 (TDC)，这是总部 $100M 扩建项目，计划创造 500 个岗位，密苏里州州长 Mike Kehoe 出席。公司推出 Site
              Solutions 支持大型工地，并开设 Uptime Center，由 24/7 团队监控接入 T3 的设备和工地。公司也在这一阶段达到第 300 个网点里程碑。到 2025 年底，公司运营 385
              个网点（352 个全服务租赁分支、9 个经销点、24 家建筑材料门店），全年新开 95 个网点。截至 Q1 2026，EquipmentShare 运营 407 个网点。


              截至 2026 年 5 月，关键运营指标包括：357,000+ 台资产接入 T3，每天流式传输 6B+ 个数据点，覆盖 45 个州，管理的原始设备成本（OEC）超过 $8.1B。Inc. 5000 2025 将
              EquipmentShare 排在第 1,742 位，三年收入增长 251%（2021–2024）；Y Combinator 也把公司列入按收入排名的 Top 50 公司榜单。
