      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              几个结构性顺风支持未来 3–5 年美国设备租赁需求持续增长。第一，Infrastructure Investment and Jobs Act (IIJA) 承诺 10 年投入 $1.2T
              联邦基础设施资金，为公路、桥梁、铁路、水务和宽带项目创造多年积压需求，这些项目都需要重型建筑设备。第二，由 AI 基础设施投资带动的数据中心建设热潮已经抬升：Microsoft、Amazon、Google 和
              Meta 等超大规模云厂商的资本开支计划每年为新设施建设投入数百亿美元。第三，CHIPS Act 和 Inflation Reduction Act (IRA)
              加速制造业回流，带来绿地工业设施和半导体晶圆厂需求，这些项目需要专用建筑设备。第四，非住宅建筑支出持续处于高位——Census Bureau 数据显示年化超过 $1.2T——为经常性租赁需求提供了庞大基数。


              主要采用约束是结构性的，不是周期性的。建筑技术采用率仍很低：McKinsey 将建筑业列为全球生产率最低的大型行业之一，其生产率增长落后制造业数十年。多数承包商仍用非正式方法管理设备，导致远程信息处理 SaaS
              采用存在很高教育门槛。资本强度也是 EquipmentShare 车队扩张的重要约束：每个新网点需要 $15–25M 车队投资，并需 12–18 个月才能达到成熟经济性，限制了公司匹配需求扩张供给的速度。


              缺少技术集成时，设备租赁切换成本很低——承包商可以、也确实会同时从多个供应商采购。接入 T3 后，切换成本上升，因为承包商会失去远程信息处理可见性和工作流连续性，形成温和的锁定护城河。T3 远程信息处理采用的
              ROI 尚未在所有承包商细分中普遍验证；轶事证据显示车队利用率显著改善，但系统性的第三方研究仍少。建筑周期性是最重要的宏观风险：美国设备租赁需求与非住宅建筑支出高度同步，而后者在 2009 年（金融危机）和
              2020 年（COVID）都大幅下滑。10-K 明确把经济放缓、利率上升和建筑支出下降列为主要风险因素。IIJA、CHIPS、IRA 等监管顺风能部分缓冲周期性，但无法完全抵消广泛建筑下行。
