      - number: '5.3'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              T3 架构从硬件传感器到客户应用横跨五层，其中数据与分析层是主要价值创造引擎。

              硬件层中，T3 设备不受 OEM 限制，使用蜂窝和 Bluetooth 无线连接持续传输传感器数据——发动机小时数、GPS 坐标、燃油水平、操作员身份和机器诊断 [CE013]。

              连接层依赖运营商级蜂窝网络提供实时遥测；只要机器在工地作业，就能覆盖，无需本地 WiFi 基础设施 [CE021]。

              原始遥测数据汇聚到 EquipmentShare 云端数据层，该层每天处理 60 亿个数据点，并存储不断扩大的历史语料，为预测模型提供基础 [CE020]。


              应用层通过网页和移动端交付六个功能仪表盘：车队地图（实时 GPS）、维护日历、使用率热力图、燃油分析、操作员合规跟踪器，以及 uptime alerts feed [CE007][CE017]。

              基于历史车队数据集训练的机器学习模型驱动预测性维护建议——在故障发生前识别可能失效的设备，让团队提前安排维修，避免高成本的计划外停机 [CE022][CE023]。

              T3 Uptime Center 是 human-in-the-loop 组件：一支 24/7 运营团队监控连接资产的异常警报，并在预测模型标记新问题时协调维护派工 [CE009]。


              运营模式把硬件供给与 SaaS 订阅拆开：硬件设备可直接销售，也可与租赁设备打包；T3 SaaS 订阅覆盖持续数据访问、分析和平台更新 [CE010][CE024]。

              OEM 无关设计是一项实质扩大可服务市场的架构决策——T3 不只支持 EquipmentShare 自有租赁库存，也能卖给拥有任意制造商设备的承包商，把竞争对手的车队转化为 T3 订阅用户
              [CE014][CE025]。
