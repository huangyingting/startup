  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与市场构成
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare 服务美国建筑行业约 80,000 名活跃客户，客户群集中在总承包商、专业分包商、基础设施项目运营方和工业用户。 根据公司 FY2025
              10-K，总承包商是最大收入贡献分层，约占租赁收入 40%，需求来自多工种工地上的土方设备、高空作业平台和伸缩臂叉装车。 专业分包商——电工、管道工、HVAC 技师和框架施工队——约占
              30%，主要租用小型工具和压实设备。 剩余组合覆盖管理公路、桥梁和公用事业项目的基础设施运营方（约 15%），以及工业和制造客户（约 10%）。

              公司瞄准年建筑收入在 $5 million 到 $500 million 之间的企业，这是一个高度碎片化的中端市场，同时重视设备可得性和 T3 telematics 平台带来的运营智能。 地理集中度与公司横跨
              45 个州的 407 个网点足迹相对应；客户密度在 Sun Belt、Southeast 和美国中部最高，公司也在那里起步并最早规模化。 超过 357,000 个资产连接到 T3 平台，其中包括
              EquipmentShare 自有租赁设备，也包括通过 T3 SaaS 订阅管理的第三方客户自有设备，显示平台在活跃客户群中已有广泛采用。
