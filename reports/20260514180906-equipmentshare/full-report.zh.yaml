      - number: '8.6'
        title: 投资建议与确信度
        blocks:
          - type: paragraph
            body: >
              总体建议是中等确信度买入。估值逻辑有公开证据支撑：经审计的 FY2025 财务、2026 年 Q1 结果超预期、2026 年指引区间上调、净杠杆 2.8x（低于一年前 3.2x）的资本结构，以及 6.3x TTM
              EV/EBITDA 的入场倍数，相对租赁同业有明确折价。单看租赁业务——年增长 34-37%、成熟网点 EBITDA 利润率 54-55%、ROIC 16.5%——就足以支撑高于当前股价隐含水平的倍数。T3
              技术层代表尚未被市场定价的上行可选性。


              风险评级为高。建筑周期性是系统性风险，资本密集度具有结构性，技术溢价（相对纯租赁同业的主要差异化）更多依赖定性证据，而非定量证据。无法独立验证 T3 SaaS
              ARR，意味着预期估值上行的一部分取决于未来披露，而这些披露不一定出现。股票仍在建立 IPO 后交易历史，T3 披露也在演进，投资者必须准备承受持续波动。


              估值立场是当前水平有吸引力。合理的基准情景是三年内从 6.3x 重估到 8-10x，并叠加 EBITDA 增长，隐含 25-60% 的股权上行。6.3x 入场的风险收益不对称：悲观情景下行被限制在 -15% 至
              -20%（H&E Equipment M&A 可比交易和行业底部支撑 5-6x 底部倍数），而若 T3 SaaS 指标确认技术逻辑，乐观情景上行可达 120-150%。目标投资周期为三到五年，给 T3
              分部指标披露、2025 年网点队列成熟并完整贡献 EBITDA、IIJA 基础设施项目爬坡并在 2028-2030 年持续产生设备需求留出时间。


              如果下一份季度报告披露 T3 外部 ARR 高于 $200 million，建议可上调为强烈买入；如果公司 2026 年收入较指引中点低逾 10%，或开工数据提示结构性市场逆转，则下调为观察。入场纪律：在每股
              $28 或以下买入（约 7x NTM EV/EBITDA）。若股价跌破每股 $22（约 6x NTM），可逢低加仓。若破坏投资逻辑的触发因素兑现，在每股 $18 止损。
            claimRefs:
              - CV023
