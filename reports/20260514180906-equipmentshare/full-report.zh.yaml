      - number: '8.4'
        title: 可比估值与同业基准
        blocks:
          - type: paragraph
            body: >
              设备租赁行业为 EquipmentShare 提供了一组可操作的上市可比公司。四个主要公开基准是 United Rentals（NYSE: URI）、Ashtead Group/Sunbelt
              Rentals（LSE: AHT）、Herc Holdings（NYSE: HRI）和 H&E Equipment Services（Nasdaq: HEES）。United Rentals
              是北美最大的上市设备租赁公司，FY2024 收入约 $15 billion，EV 约 $22 billion，隐含 13-15x NTM EV/EBITDA。这个溢价来自 United Rentals
              的规模、Specialty 分部（更高利润率的工具、流体解决方案、电力），以及有纪律的资本配置记录。EquipmentShare 的 6.3x 倍数较 United Rentals 折价 55-60%。


              Ashtead Group（在北美以 Sunbelt Rentals 运营）是国际范围内最可比的同业，收入超过 £6.5 billion，企业价值 £17 billion（约 $21 billion
              USD），隐含 8-10x NTM EV/EBITDA。相对 United Rentals 的折价反映了 Ashtead 的英国上市地位和略低的专业租赁占比；不过，其北美业务与 EquipmentShare
              聚焦建筑的模型高度相似。Herc Holdings 是规模上最接近的同业，FY2024 收入约 $3.5 billion，EV 为 $5 billion，同样以 8-10x NTM 交易。Herc 约 3.5x
              的杠杆与 EquipmentShare 的 2.8x 接近，因此在资本结构和收入规模上都是最近的可比对象。


              H&E Equipment Services 收入约 $1 billion，United Rentals 正在通过一笔 2025 年交易收购该公司，隐含 EV/EBITDA 约
              5-7x；这为没有技术差异化的小型纯租赁运营商建立了底部倍数。该收购也确认行业正在向规模整合，这对 EquipmentShare 的竞争位置方向上有利。


              可比分析支持这一判断：EquipmentShare 6.3x TTM EV/EBITDA 是相对上市同业 8-15x 区间的折价入场点。折价部分来自 EquipmentShare 新上市公司身份、IPO
              后交易历史不足四个月、缺少 T3 SaaS 指标，以及没有像 United Rentals 那样按季度披露车队利用率。这些信息缺口收敛后，合理的市场结果是倍数逐步向 8-10x 区间重估，与基准情景一致。
