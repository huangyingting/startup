      - number: '3.5'
        title: 切换成本与锁定动态
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的主要切换成本机制来自数据积累。承包商采用 T3 后，平台开始收集资产性能历史、维护日志、燃油使用数据、GPS 轨迹和工地工作流配置。运营 12–18
              个月后，这套数据集叠加定制操作员档案、电子围栏定义和项目管理工具集成，会形成有意义的迁移摩擦。客户评估替代平台时，必须把数据导出、操作员再培训和重建工作流集成的成本，与切换带来的任何节省放在一起算。


              多供应商并用在纯设备租赁中结构性常见。承包商常从不同供应商采购不同设备品类，或在首选供应商无法交付时转向替代方。增加第二家租赁供应商的切换成本很低：只需开户，不需要迁移数据。这限制了 EquipmentShare
              在租赁部分的定价权；公司不能显著高于市场费率，否则业务量会流向 United Rentals 或 Sunbelt。


              OWN Program 在车队投资者层面形成另一条锁定路径：加入项目的设备所有者通常签有多年合同，并需遵守 EquipmentShare 管理的远程信息处理要求，形成双边黏性。


              United Rentals 的全国账户项目构成竞争性分销护城河。对希望统一一家供应商的 Fortune 500 采购团队来说，URI
              由专门全国账户团队经营数十年形成的既有关系很难撬动。EquipmentShare 要赢下企业采购决策，必须拿出技术差异化、定价和服务的强组合，才能对抗这道根深蒂固的分销优势。
            claimRefs:
              - CP026
              - CP027
              - CP028
              - CP030
              - CP031
              - CP033
      - number: '3.6'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的竞争护城河建立在三根相互强化的支柱上：车队新鲜度、T3 数据飞轮、OWN Program 资本模式创新。每根支柱都有防御性，但也面对不同威胁。


              车队新鲜度（平均车龄 31 个月 vs 行业平均 42+ 个月）能否持续，取决于 EquipmentShare 能否继续通过直接采购和 OWN Program
              主动更新车队。若周期下行迫使资本开支延后，既有玩家可能缩小差距。


              T3 数据飞轮——每天 6B+ 个数据点——是最耐久的竞争资产。竞争对手没有自己的美国建筑车队，就无法复制 EquipmentShare 的自研训练数据集。Trackunit 的 1.3M 台全球已连接资产和
              Samsara 的 IoT 装机基础，是功能上最接近的类比，但它们处在不同地理或行业。不过，OEM
              制造商（JLG、Takeuchi、Genie、Komatsu）正越来越多地在新机器中嵌入出厂远程信息处理，抬高商品化风险：如果标准化 OEM 数据馈送变得普遍，T3 的数据收集差异化可能在 5–10
              年周期内收窄。


              最直接的威胁是 United Rentals 扩张 UR One 数字平台。URI 有财务规模——约 $15B 收入和 $22B 车队——可以重金投入技术。行业与 IR
              报告记录了其持续投资数字客户工具、车队利用率分析和预测性维护能力，这些都直接竞争 T3 的核心价值主张。这个不利变化是 EquipmentShare 技术护城河耐久性的首要悲观情景。


              正面来看，EquipmentShare FY2025 租赁业务同比增长 34%，显著高于行业 4–6% 增速，说明在既有玩家补齐技术差距之前，一体化模式已经带来可衡量的市场份额获取。
