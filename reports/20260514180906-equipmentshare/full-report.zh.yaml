      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 在 2026 年 1 月 IPO 后进入公开市场，资本状况显著改善；该次 IPO 以每股 $24.50 募资约 $747M。

              截至 2026 年 Q1，可用流动性为 $1,605M：$329M 现金及现金等价物，加上 Capital One Bank 提供的 $3B ABL 循环信贷额度下 $1,276M 未提取额度（2023
              年完成）。

              净杠杆从 2025 年 Q1 的 3.2x 降至 2026 年 Q1 的 2.8x，反映公司同时偿债且 EBITDA 增长。

              ABL 额度以车队资产担保，并随车队 OEC 扩张，为车队增长提供自然借款基础。


              资本配置主要由车队投资主导。FY2025 设备支出约 $1.8B，几乎等同于 Adj. Core EBITDA $1,667M，使业务在增长模式下实质上处于 FCF 持平到小幅为负。

              对 EquipmentShare 当前增长率下的设备租赁行业而言，这是结构性特征：2026 年 Q1 从 352 个网点扩张到 407 个网点，需要部署大量新车队。

              OWN Program 降低了总资本开支需求：56% 的车队 OEC 由外部持有，EquipmentShare 不需直接出资即可使用约 $4.9B 生产性资产。


              下一次融资触发点没有明确披露，但 ABL 额度和强劲指引动能（2026 年收入 $5.1–$5.6B，EBITDA 利润率指引 36–46%）表明，公司近期不需要股权资本。

              现有 covenant 与 ABL 借款基础（车队资产价值）绑定，而非固定财务比率，降低了需求下行时触发 covenant 违约的风险。

              不过，10-K 风险因素明确列出建筑市场周期性、车队资产集中和高债务水平为重大风险，说明在压力情景下，融资依赖仍是重要考量。
