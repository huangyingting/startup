      - number: '4.6'
        title: 财务结论：收入质量、利润率路径、资本强度与尽调阻碍
        blocks:
          - type: paragraph
            body: |
              收入质量较高：租赁分部占 FY2025 收入 62%，同比增长 34%，具备经常性、资产支持，并由 T3 技术平台差异化；T3 创造切换成本和数据护城河。
              设备销售（估计约 32%）是交易型且利润率更低，但它承担车队更新和加深客户关系的功能，并非核心经济引擎。
              2026 年 Q1 收入增速同比加速至 38%（全年 2025 为 16%），说明业务重新提速，背后有 IIJA 基础设施支出、有利建筑市场条件和新网点开张支撑。

              利润率路径可信且支撑充分：成熟网点交付 54–55% Adj. EBITDA 利润率和 16.5% ROIC，为较新一批分支提供了已验证模板。
              从新网点到成熟网点的利润率爬坡，是核心价值创造逻辑；FY2025 新开 95 个网点且继续扩张，随着这些分支在 12 个月内成熟，新网点启动成本（排除在成熟指标之外）的拖累预计会缓和。

              资本强度结构性较高，但已有部分缓冲：FY2025 约 $1.8B 车队资本开支超过 EBITDA，使公司按总口径看 FCF 为负。
              OWN Program（$4.9B OEC，占车队 56%）是真实且重要的资本抵消项。
              行业同行 United Rentals 和 Herc Holdings 在杠杆与 ROIC 水平上大体可比，验证了该模式在规模化后的可行性。

              仍有三项尽调阻碍：（1）T3 SaaS ARR 未披露，无法独立估值技术层；（2）车队使用率未报告，使 EBITDA 敏感性分析困难；（3）分部级毛利率未拆分，限制了成本结构建模。
              在这些问题解决前，EquipmentShare 估值中的技术溢价更多依赖定性证据，而不是定量证据。
