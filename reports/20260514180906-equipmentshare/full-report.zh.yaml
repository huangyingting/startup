  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流、定价模型与确认
        blocks:
          - type: paragraph
            body: >
              EquipmentShare 的收入来自三个已报告分部：（1）设备租赁及相关服务（FY2025 为 $2,724M，占总收入 62.2%），即按时间计费的建筑设备租赁，并通过 T3
              平台打包交付、维护和远程信息处理；（2）新 / 二手机械设备销售（估计约 $1,400M，约占总收入 32%），包括 OEM 经销销售和车队处置；（3）承包商用品及其他（约 $255M，约占 5.8%），包括通过
              Forge & Build 门店零售五金和附属服务。新兴的第四条收入线——卖给管理自有车队的外部客户的 T3 远程信息处理 SaaS 订阅——运营上已经存在（357,000+
              台已连接资产包括第三方资产），但未单独报告，是关键的信息缺口。


              收入确认遵循 ASC 606 和 ASC 842：租赁收入在租赁期内（按日、周或月）按比例确认；设备销售在控制权转移时点（交付）确认；承包商用品收入在销售时点确认。面向外部客户的 T3
              订阅收入如发生计费，应在订阅期内按比例确认。租赁业务的按期确认特征会为预先计费期间形成递延收入负债，但相对业务规模并不大。


              租赁定价根据地理位置、设备品类、租赁时长、客户规模和车队可用性动态设定。公司不公开费率卡；价格通过报价或与大客户谈判主服务协议确定。FY2025 租赁业务同比增长 34%，明显快于总收入 16%
              增长，说明收入结构正向利润率最高的业务倾斜。租赁业务收入质量较高：合同通常周期短（按日到按月），限制长尾信用敞口；T3 平台提供按资产监控，降低盗损风险。
