      - number: '6.3'
        title: 留存、满意度与客户耐久性
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare 报告 FY2025 净收入留存率超过 110%，说明现有客户合计支出同比扩大超过 10%，足以抵消任何客户流失。 该指标披露于 FY2025
              10-K，高于设备租赁行业基线；主要玩家的总收入留存率通常处于高 80% 到低 90% 区间。 T3 telematics 平台驱动结构性留存机制：客户一旦把 T3
              数据接入工地工作流，历史设备数据、维护记录和使用率分析就嵌入平台，切换成本随之上升。

              第三方评论平台记录的 EquipmentShare 租赁和 T3 服务综合评分约为 4.2 / 5.0，常见正面主题包括设备可得性、数字化 checkout 便利性和响应迅速的调度。
              负面评论提到长周期租赁的价格竞争力，以及分支级服务质量波动。 FMI Research 的市场展望把后疫情建筑热潮后的需求正常化风险列为 2026 至 2028 年租赁留存的反向因素。 10-K
              未披露客户集中度风险；EquipmentShare 没有发布单个客户或 top-N 客户队列的收入占比，这是评估依赖风险的关键尽调缺口。
