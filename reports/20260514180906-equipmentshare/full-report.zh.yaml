    summary: 截至 2026 年 5 月，EquipmentShare 在关键评估维度上的投委会评分卡。
    data:
      items:
        - label: 市场评分：8/10 — 可触达市场大（美国租赁 $55B+）；IIJA 提供多年顺风
        - label: 收入证据：9/10 — 经审计租赁收入增长 34-38%；TTM 收入 $4.65B；指引上调
        - label: 竞争护城河：7/10 — T3 切换成本和 OWN 网络；SaaS 层尚未定价，也未验证
        - label: 财务质量：7/10 — 成熟门店 EBITDA 利润率 54-55%；ROIC 16.5%；增长期 FCF 为负
        - label: 风险画像：5/10 — 周期性强、资本密集；公开数据尚未证明 T3 技术溢价
        - label: 估值吸引力：9/10 — 6.3x EV/EBITDA，相比同行 8-15x 区间有实质折价
        - label: 证据质量：7/10 — 公开文件覆盖强；T3 ARR 和利用率缺口压低确信度
    claimRefs:
      - CV023
      - CV024
      - CV034
      - CV043
