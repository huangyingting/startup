      - number: '7.3'
        title: 运营、网络安全与供应链风险嵌在 telematics 模型中
        blocks:
          - type: paragraph
            body: >-
              T3 连接超过 357,000 个资产，形成了区别于传统设备租赁运营商的攻击面。 远程锁定和解锁能力是 T3 用于防盗和车队管理的核心价值主张之一；一旦平台被攻破，它会变成关键安全风险。 攻击者若未授权进入
              T3，可能在运行中禁用设备、在未授权地点解锁设备，或外泄建筑现场运营数据，包括基础设施位置、项目时间安排和客户商业情报。 10-K 将网络安全列为重大风险因素，但公开披露没有给出具体认证、渗透测试结果、事件响应
              playbook 或 SLA 承诺，投资者无法独立评估 EquipmentShare 安全姿态的成熟度。

              供应链风险来自 EquipmentShare 对 OEM 制造商的高度依赖，主要是 Caterpillar、John Deere、Komatsu 等大型设备制造商，用于车队采购。 在 2021–2022
              年供应链扰动期间，芯片短缺和港口延误拉长了新设备交付周期，迫使租赁公司推迟车队更新并接受老化库存。 类似扰动若再次出现，会削弱 EquipmentShare 维持车队年龄、响应客户对更新 telematics
              设备需求，以及兑现 OEM 价格锁定的能力。 OEM 涨价会直接压缩车队扩张的经济性。

              车队残值风险是第三个运营维度，在增长导向分析中常被低估。 EquipmentShare 的 $9B+ OEC 是一项资产负债表资产，其价值取决于二手设备市场健康度。
              以往下行周期中，租赁运营商同时清算过剩资产，二手重型设备价格显著下跌。 技术过时还提供了另一条风险向量：如果客户要求连接设备，缺少 T3 兼容 telematics 硬件的老旧机器折旧速度可能快于预期。 NIST
              cybersecurity framework 标准为连接设备运营商提供基准，但 EquipmentShare 没有公开披露 NIST 合规状态。
