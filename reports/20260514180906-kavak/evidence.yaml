evidenceGaps:
  - type: private-evidence-only
    severity: minor
    topic: inspection-process
    missingEvidence: >-
      Independent third-party audit or detailed description of the 240-point inspection methodology beyond company
      marketing materials.
    whyItMatters: >-
      Without independent verification, the quality and consistency of the 240-point inspection claim cannot be fully
      substantiated for due diligence purposes.
    diligencePath: Request access to Kavak's inspection manual and seek third-party automotive inspector certification documentation.
    relatedQuestionRefs:
      - QO027
  - type: enumeration-incomplete
    severity: minor
    topic: leadership-team
    missingEvidence: >-
      Full C-suite listing beyond the three co-founders; board composition, CFO, COO, CPO, and country general managers
      not publicly disclosed.
    whyItMatters: >-
      Key-person risk assessment and governance completeness require knowledge of the full leadership team, not only
      co-founders.
    diligencePath: Request Kavak management deck and corporate governance documents from the company directly.
    relatedTableRefs:
      - TO002
  - type: enumeration-incomplete
    severity: minor
    topic: investor-cap-table
    missingEvidence: >-
      Exact shareholding percentages, preference stack, anti-dilution terms, and secondary sale activity for all
      investors are not publicly available.
    whyItMatters: >-
      Investor control rights and economic alignment are critical for downside scenario analysis and future financing
      negotiations.
    diligencePath: Request Kavak capitalization table, shareholder agreement summary, and latest 409A valuation from the company.
    relatedTableRefs:
      - TO003
  - type: enumeration-incomplete
    severity: minor
    topic: milestone-internal-events
    missingEvidence: >-
      Internal product launches, technology milestones, regulatory approvals, and non-public governance events not
      captured in the press record.
    whyItMatters: >-
      A complete milestone chronology is required to assess operational continuity, regulatory compliance, and strategic
      coherence across six markets.
    diligencePath: Request internal board deck or investor update deck covering 2022–2026 operational milestones.
    relatedTableRefs:
      - TO004
  - type: conflicting-data
    severity: material
    topic: brazil-market-size
    missingEvidence: >-
      An independently audited or statistically validated figure for total annual used-car transaction volume and market
      value in Brazil.
    whyItMatters: >-
      Brazil is Kavak largest single market by investment ($500M committed) and by unit volume. The $80B to $120B range
      spans 50 percent, making SAM and penetration estimates unreliable without a validated anchor.
    diligencePath: >-
      Commission a data pull from FENABRAVE or DENATRAN, the Brazilian automotive associations that publish annual
      transaction statistics, or cross-check with public Brazilian dealer filings.
    relatedQuestionRefs:
      - QM024
  - type: private-evidence-only
    severity: material
    topic: kavak-volume-opacity
    missingEvidence: >-
      Independently verified transaction volume data for Kavak by market, enabling calculation of actual market share
