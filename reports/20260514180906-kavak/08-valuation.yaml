  - id: TV002
    title: Investment thesis and anti-thesis
    enumeration: false
    columns:
      - Dimension
      - Bull Argument
      - Bear Argument
      - What Would Change the View
    rows:
      - - Market position
        - '#1 used-car e-commerce in Mexico; 6.9M monthly web visits'
        - Informal 85-90% cash market limits addressable digital pool
        - Disclosed GMV growth demonstrating digital channel penetration gains
      - - Fintech moat
        - 70% consumer financing attach rate creates durable revenue layer
        - Kuna Capital NPL rates undisclosed; credit losses could erode margin
        - Published NPL rate below 5% with adequate loss reserves confirmed
      - - Capital and valuation
        - Tier-1 backers SoftBank, General Atlantic, a16z, Founders Fund
        - Insider-only April 2025 down round; no external clearing price at $2.2B
        - External institutional investor participation in a future round
      - - Profitability path
        - CEO targets end-2025 company-level EBITDA; some markets profitable
        - No audited confirmation; cash burn was $86M in Q1 2022 alone
        - Audited EBITDA-positive annual accounts for FY2025 published
      - - Exit pathway
        - 3-to-5-year IPO horizon stated by CEO; LatAm tech IPO window reopening
        - Multi-market complexity, debt stack, and opaque financials delay IPO
        - Filing of IPO prospectus or strategic sale announcement
      - - Macro resilience
        - Trump tariffs reduce new-car supply; pushes buyers toward used cars
        - Mexico recession reduces consumer credit demand; Argentina peso risk
        - Mexico GDP growth above 2% and used-car volumes rising through 2026
    notes: >-
      Arguments based on CEO interview (Bloomberg Lines April 2025) and public
      investor statements. Bear arguments reflect absence of evidence, not
      confirmed failure.

  - id: TV003
    title: Bull, base, and bear valuation scenarios
