  - id: SV-S002
    title: Financing context, capital structure, and preference overhang
    body: >-
      Kavak's April 2025 round is the most analytically revealing capital event
      in the company's history. The $127M raise at $2.2B post-money was
      structured as an insider-only round that closed in March 2025 — before
      the Trump tariff shock of April 2025 — with SoftBank and General Atlantic
      as the sole equity participants. The CEO explicitly described it as a
      "small exclusive round for internal investors" in which the company was
      "not very price sensitive," suggesting the valuation was set to minimise
      mark-to-market impact rather than reflect a true market clearing price.
      Contemporaneously, Goldman Sachs and HSBC each committed $200M in
      working-capital credit lines to Kuna Capital, structured as debt
      facilities rather than equity. These facilities bring total estimated
      outstanding debt to approximately $1.2B when combined with the legacy
      $810M credit facility raised in 2021 from HSBC, Goldman Sachs, and
      Santander. The equity preference overhang is material: Kavak's estimated
      $1.9B in total equity raised across all rounds includes liquidation
      preferences from multiple series. In a below-$2.2B exit scenario, common
      equity holders and later-stage employees with stock options may receive
      zero recovery. CB Insights records $3.929B in total capital raised
      including debt as of Q1 2025. The company's stated IPO preparation horizon
      of three to five years implies a 2027-2030 liquidity window — an extended
      hold period during which downside scenarios may materialise. Capital
      intensity remains high: reconditioning hubs, inventory financing, and
      credit origination all require working capital not self-funded by
      operating cash flow at this stage. The 2022 restructuring (halving
      headcount from approximately 8,800 to 4,300 employees, exiting Colombia
      and Peru) demonstrated willingness to reduce burn, but also vulnerability
      to macro tightening. The two 2025 credit lines — Goldman and HSBC, $200M
      each — signal institutional lender confidence in the Kuna Capital credit
      book, but rank senior to equity in any recovery waterfall.
    claimRefs:
