  - id: SV-S004
    title: Bull, base, and bear scenarios with valuation ranges
    body: >-
      Three scenarios capture the distribution of outcomes for Kavak equity
      over a three-to-five-year investment horizon, consistent with the CEO's
      stated IPO preparation window. The bull case assumes Kavak achieves
      company-level EBITDA profitability by end-2025 (per stated target),
      sustains double-digit GMV growth in Mexico, successfully monetises the
      Kuna Capital credit book at sub-5% NPL rates, and executes an IPO or
      strategic sale in the 2027-2028 window at 2-3x EV/Revenue, implying a
      $3.5-6B equity valuation range. This scenario requires no material NPL
      spike, continued Mexico market share gains, and a global risk-appetite
      recovery for EM growth equity. The base case assumes EBITDA break-even
      by mid-2026 (six-month slip from target), Mexico dominance maintained
      but with margin pressure from competitors, and a 2028-2029 IPO at
      approximately 1.5x EV/Revenue, implying a $1.8-3.0B valuation range
      roughly consistent with the April 2025 mark. The bear case assumes
      EBITDA break-even is not achieved through 2026, the Kuna Capital NPL
      rate spikes above 8-10%, lender covenants are triggered, a further
      equity down-round is required at sub-$1.5B valuation, and competitive
      intensity from Mercado Libre or OLX erodes Mexico pricing power. In this
      scenario, equity value could be $600M-$1.4B after additional dilution.
      The probability-weighted expected valuation across scenarios is
      approximately $2.1-2.5B, suggesting the current $2.2B mark is fair but
      with asymmetric downside risk — bear outcomes destroy significantly more
      equity than bull outcomes create. Key downside triggers include a
      Mexico macro recession, a CNBV enforcement action against Kuna Capital,
      or "autos chocolate" import competition driving used-car price deflation.
      The valuation range figure maps three scenarios with low-base-high bounds.
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
