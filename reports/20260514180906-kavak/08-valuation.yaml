  - id: SV-S005
    title: Exit readiness, thesis-break triggers, and final diligence asks
    body: >-
      Kavak's readiness for a public exit or strategic sale in the stated
      3-to-5-year window requires resolution of several structural conditions.
      First, the company must publish audited financials for at least two
      consecutive years — a minimum bar for any credible public offering on the
      Mexican BMV/BIVA, US NYSE/NASDAQ, or an emerging-market exchange. No
      audited annual report has been publicly disclosed as of May 2026. Second,
      the Kuna Capital credit book must demonstrate NPL rates and reserve
      coverage ratios that satisfy institutional fixed-income investors; the
      absence of this data is the single most blocking information gap. Third,
      the company's multi-market operational complexity across Mexico, Argentina,
      Brazil, Turkey, UAE, Saudi Arabia, and Oman must be streamlined so that
      consolidated financials are interpretable to public-market investors.
      Fourth, the debt stack of approximately $1.2B must be refinanced or
      reduced as a precondition for a clean IPO equity story. The thesis-break
      triggers table maps specific events that would invalidate the investment
      case. The most critical is a missed end-2025 profitability target paired
      with another insider-only down round, which would indicate that the
      private-market price discovery mechanism has broken down entirely. A
      secondary trigger is a CNBV supervisory action against Kuna Capital,
      which would simultaneously impair the fintech revenue stream and raise
      regulatory compliance costs. Strategic sale pathways exist — potential
      acquirers include automotive OEMs, global financial services platforms,
      or EM mobility platforms — but at $2.2B the price likely exceeds what
      a trade buyer would pay without a meaningful discount to the insider mark.
      The final diligence asks enumerate the six most critical information
      requests for any prospective investor conducting serious due diligence.
