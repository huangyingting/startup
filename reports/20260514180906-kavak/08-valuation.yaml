  - id: TV005
    title: Thesis-break and kill triggers
    enumeration: false
    columns:
      - Trigger
      - Threshold or Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Missed profitability target
        - No EBITDA break-even by Q2 2026 (6-month buffer from end-2025 target)
        - Extends cash burn; increases debt covenant risk; reduces IPO optionality
        - Reassess to 'avoid'; demand fresh secondary discount or exit
      - - Kuna Capital NPL spike
        - Disclosed or inferred NPL rate above 8% with inadequate reserves
        - Erodes fintech revenue; triggers lender covenants; raises dilution risk
        - Immediate downgrade to 'avoid'; seek structured recovery provisions
      - - Forced additional down-round
        - New equity raise below $2.0B with external investors participating
        - Confirms open-market valuation below current mark; triggers dilution
        - Re-evaluate entry only if post-dilution price reflects true trough
      - - CNBV regulatory action
        - License suspension or enforcement action against Kuna Capital
        - Eliminates 70% financing attach revenue; catastrophic for unit economics
        - Exit or hedge immediately; thesis depends on fintech monetisation
      - - CEO departure
        - Garcia Ottati stepping down without named successor disclosed
        - Key-person risk; founder-led culture; no succession plan on record
        - Pause thesis; assess successor quality and remaining investor confidence
      - - Mexico market share loss
        - Digital competitors take 10 percentage points of GMV share
        - Pricing power erodes; reconditioning hub utilisation falls below break-even
        - Downgrade to 'avoid'; market leadership assumed in bull and base cases
    notes: >-
      Trigger thresholds are indicative estimates; investors should set their
      own monitoring criteria based on deal-specific risk tolerance.

  - id: TV006
    title: Final diligence asks
    enumeration: false
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    rows:
      - - Audited financials
        - No audited annual accounts for any fiscal year since 2016
        - Required for IPO; needed to verify revenue, EBITDA, and debt covenants
        - Request from management; compare to CFO public disclosures
      - - Kuna Capital credit metrics
        - NPL rate, portfolio vintage, reserve coverage are undisclosed
        - Credit book is largest value driver and largest hidden risk
        - Third-party loan tape review; lender covenant disclosures
      - - Unit economics by market
        - No per-market GPU, take-rate, or contribution margin disclosed
        - Mexico (~60%) profitability differs from LatAm and MENA combined
        - Management data room; benchmark vs Carvana GPU of $6-7K per unit
      - - Preference stack and option pool
        - No public cap table or preference terms disclosed
        - Multi-tier overhang can wipe common equity in below-par exits
        - Obtain cap table; model waterfall at $2.2B, $1.5B, and $800M exits
      - - Debt covenant details
        - Terms of Goldman Sachs and HSBC $200M credit lines are not public
        - Covenant breaches could trigger acceleration; need headroom assessment
        - Request term sheets or indentures via legal counsel during data room
      - - IPO prospectus timeline
        - No S-1 or local prospectus filing on record with any exchange
        - Stated 3-5 year window lacks specificity; BIVA or NYSE readiness unclear
        - Track regulatory filings; monitor BIVA and SEC EDGAR for draft filings
    notes: >-
      Diligence asks are ordered by priority. Items 1-3 (audited financials,
      NPL metrics, unit economics) are blocking for any new equity commitment.

