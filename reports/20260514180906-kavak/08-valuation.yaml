    description: >-
      Sensitivity of 3-year investor IRR to entry discount applied on the
      April 2025 $2.2B mark, under base-case exit assumptions of $2.5B
      enterprise value. A 0% discount yields approximately 4% IRR; a 35%
      discount yields approximately 20% IRR — the minimum threshold for
      emerging-market risk-adjusted returns.
