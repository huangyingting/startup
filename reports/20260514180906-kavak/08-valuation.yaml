        - $3.5B-$6.0B exit value; 1.6x-2.7x return on $2.2B entry; IRR ~20-35% over 3 years
        - VC market re-freeze; tariff shock delays consumer credit; Carvana-style near-death scenario
        - Low-medium (25%); requires multiple simultaneous execution wins
      - - Base
        - EBITDA+ by mid-2026 (6-month slip); Mexico competitive pressure; IPO 2028-2029 at ~1.5x EV/Revenue
