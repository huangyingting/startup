  - id: SV-S003
    title: Comparable valuation analysis
    body: >-
      Kavak's $2.2B valuation can be assessed against a set of publicly traded
      and privately marked comparable companies across the used-car e-commerce
      and digital automotive marketplace sector. The most structurally similar
      public company is Carvana (NYSE:CVNA), a US-based online used-car
      marketplace that nearly collapsed in 2022 before a debt restructuring
      in 2023 and subsequent market cap recovery to approximately $30B by
      mid-2025. At approximately $13.7B revenue in 2024, Carvana trades at
      approximately 2.2x EV/Revenue — a premium reflecting US market scale,
      full public disclosure, and demonstrated profitability recovery.
      Applying even a 60% emerging-market discount to Carvana's multiple
      yields an implied valuation of approximately $1.3-2.5B for Kavak at a
      $1.5B revenue estimate, broadly consistent with the $2.2B mark but
      indicating minimal margin of safety. AUTO1 Group (Frankfurt: AG1),
      Europe's largest digital automotive platform, reported revenues of
      approximately EUR 6.5B in 2023 and trades at a 0.5-0.7x EV/Revenue
      multiple given sustained losses. CarMax (NYSE:KMX), the largest US
      used-car dealer with approximately $26B revenue, trades at roughly 0.5x
      revenue reflecting offline-heavy unit economics. In emerging markets,
      Spinny (India) was valued at approximately $1.8B in its 2022 Series E
      and has not disclosed a downward mark as of May 2026. Cars24 (India) was
      last marked at approximately $1.84B in 2023 following a down-round from
      a $3.3B peak — a trajectory directly comparable to Kavak's. OLX Autos,
      the classifieds-to-transactional pivot, was wound down by 2022-2023, its
      assets absorbed into AutoHero, serving as a cautionary example of margin
      compression in transactional used-car models. Kavak's $2.2B represents
      a premium to the India peers on an absolute basis, partially justified by
      Mexico's larger addressable market and Kavak's longer operating history,
      but the risk-adjusted discount should be higher for Kavak given multi-
      market complexity and opaque financials. The enumerated comparable table
      provides a row-by-row assessment of each peer.
