  evidenceGaps:
    - id: GV001
      type: private-evidence-only
      severity: blocking
      topic: audited-financials
      missingEvidence: >-
        Audited consolidated financial statements for any fiscal year since
        Kavak's 2016 founding, including revenue, EBITDA, net income, and
        cash flow.
      whyItMatters: >-
        Without audited financials, all valuation analysis rests solely on
        management statements; the $2.2B mark cannot be independently verified
        and IPO preparation cannot proceed.
      diligencePath: >-
        Request audited accounts from management; if unavailable, require
        independent accountant compilation as a precondition of any equity
        commitment.
      relatedQuestionRefs:
        - QV009
        - QV032
        - QV036

    - id: GV002
      type: private-evidence-only
      severity: blocking
      topic: Kuna-Capital-NPL
      missingEvidence: >-
        Kuna Capital NPL rate, credit vintage performance, reserve coverage
        ratio, and total loan book size as of Q1 2025 or later.
      whyItMatters: >-
        The fintech lending book is Kavak's largest moat and largest hidden
        risk simultaneously; NPL rates above 8% would materially impair the
        base-case valuation.
      diligencePath: >-
        Request a third-party loan tape review; review Goldman Sachs and HSBC
        lender covenant packages; benchmark against Cars24 disclosed NPL data.
      relatedQuestionRefs:
        - QV030
        - QV021

    - id: GV003
      type: private-evidence-only
      severity: material
      topic: preference-stack
      missingEvidence: >-
        Kavak's full cap table with liquidation preference terms, participation
        rights, and anti-dilution provisions for each investor series.
      whyItMatters: >-
        Multi-round financing from Series A through the 2024 Andreessen Horowitz
        round implies complex seniority structures that materially affect
        common equity and employee option value.
      diligencePath: >-
        Obtain cap table from management; model recovery waterfall at $2.2B,
        $1.5B, and $800M exit scenarios to determine break-even for common equity.
      relatedQuestionRefs:
        - QV012

    - id: GV004
      type: private-evidence-only
      severity: material
      topic: unit-economics
      missingEvidence: >-
        Per-market gross profit per unit (GPU), take-rate, and contribution
        margin for Mexico, Argentina, Brazil, Turkey, and MENA.
      whyItMatters: >-
        The claim that some markets are profitable has no granularity; Mexico
        at 60% of business could be profitable while other markets erode the
        consolidated result.
      diligencePath: >-
        Request management data room with market-level P&L; benchmark Mexico
        GPU against Carvana's disclosed $6-7K per unit figure.
      relatedQuestionRefs:
        - QV023
        - QV037
      relatedTableRefs:
        - TV004

    - id: GV005
      type: missing-source
      severity: minor
      topic: IPO-readiness
      missingEvidence: >-
        Any draft IPO prospectus, BIVA or BMV confidential filing, formal
        engagement letter with an investment bank underwriter, or public
        statement of specific IPO preparation milestones.
      whyItMatters: >-
        The stated 3-to-5-year IPO window is aspirational and may extend
        further if profitability milestones slip; no formal preparation signal
        is publicly available. Strategic acquirer identification (QV035) also
        requires knowledge of the exit pathway and timeline.
      diligencePath: >-
        Monitor BMV and BIVA EDGAR equivalents; track SEC EDGAR for any Kavak
        filing; follow investment bank tombstone announcements for mandates.
      relatedQuestionRefs:
        - QV010
        - QV034
        - QV035
