company:
  name: Kavak
chapter:
  number: 8
  title: Valuation
  summary: >-
    Kavak's April 2025 insider equity round of $127M at a $2.2B valuation
    crystallises a 75% decline from its September 2021 peak of $8.7B, making
    it one of Latin America's most visible down-round narratives. The round was
    led exclusively by incumbent investors SoftBank and General Atlantic, with
    no new external institutional participant — a signal of constrained
    open-market appetite for Kavak equity at the current mark. Simultaneously,
    Goldman Sachs and HSBC each extended $200M working-capital credit lines to
    Kuna Capital (Kavak's fintech lending arm), bringing total estimated
    outstanding debt to approximately $1.2B. Against this backdrop, this chapter
    delivers a 'track' recommendation at medium confidence and high risk rating,
    with a 'stretched' valuation stance. Bull-case pathways exist — Kavak holds
    dominant Mexico market share, a ~70% consumer financing attach rate, and a
    stated 3-to-5-year IPO horizon — but the combination of unpublished
    profitability, opaque credit-book metrics, and a multi-tier preference
    overhang makes near-term entry unattractive without a meaningful discount
    to the insider mark. Comparable analysis against Carvana, AUTO1 Group,
    CarMax, Spinny, and Cars24 suggests the $2.2B mark is defensible only if
    the company reaches EBITDA-positive run-rate by end-2025 as targeted.

sections:
  - id: SV-S001
    title: Investment recommendation and valuation stance
    body: >-
      Based on available public evidence as of May 2026, the recommended stance
      on Kavak is 'track' — monitor closely but refrain from committing new
      equity capital until two conditions are met: (1) audited or independently
      verified EBITDA-positive results at the company level, and (2) transparent
      disclosure of the Kuna Capital non-performing loan rate and reserve
      coverage ratio. The medium confidence reflects genuine uncertainty:
      Kavak operates in a structurally attractive market (Mexico's used-car
      penetration via digital channels remains below 2%), has demonstrated scale
      (6.9M monthly web visits, approximately 66% from Mexico), and retains the
      backing of Tier-1 global investors including SoftBank, General Atlantic,
      Andreessen Horowitz (entered 2024), Founders Fund, Tiger Global, and
      Kaszek. However, the high risk rating is justified by four compounding
      factors. First, the April 2025 round carried no external investors,
      indicating that the clearing price for new equity is meaningfully below
      $2.2B in the open market. Second, total outstanding debt of approximately
      $1.2B creates a priority claim ahead of equity holders in any adverse
      scenario. Third, the company has not published audited financials for any
      year since inception, making independent valuation highly uncertain.
      Fourth, the Argentina, Turkey, and multi-market currency exposures
      introduce structural unpredictability in returns. The valuation stance is
      'stretched': the $2.2B implicitly assumes a revenue multiple broadly
      consistent with Carvana or AUTO1 Group, yet both are publicly listed with
      transparent financials and mature regulatory standards. A fair entry for
      a sophisticated investor in a secondary or structured transaction would
      require a 20-35% discount to the April 2025 mark, or a meaningful ratchet
      tied to profitability milestones.
