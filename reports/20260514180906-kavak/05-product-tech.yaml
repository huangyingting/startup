  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: technology-stack-architecture
    missingEvidence: Kavak technology stack, engineering team size, and software architecture are not publicly documented.
      GitHub requires authentication; StackShare was rate-limited.
    whyItMatters: Cannot assess technical scalability, platform reliability risk, or engineering moat without stack visibility
    diligencePath: Request engineering architecture overview and key vendor/cloud dependencies during diligence
    relatedQuestionRefs:
    - QE015
    - QE009
  - type: missing-source
    severity: material
    topic: inspection-protocol-audit
    missingEvidence: No independent third-party audit of the 240-point inspection protocol has been publicly disclosed.
      The only external endorsement is Profeco self-regulatory certification which Tec-Check has criticized.
    whyItMatters: Inspection integrity is the core product claim; without independent audit the differentiation is unverifiable
    diligencePath: Commission independent automotive engineering firm to sample 50+ vehicles across multiple hubs
    relatedQuestionRefs:
    - QE006
    - QE011
  - type: private-evidence-only
    severity: material
    topic: kavak-credito-loan-performance
    missingEvidence: Kavak Credito actual loan approval rates, non-performing loan ratios, and CNBV/SOFOM regulatory
      classification are not publicly disclosed.
    whyItMatters: Financial services revenue quality depends on loan performance; NPL data is needed to assess tail risk
    diligencePath: Request loan tape from Kuna Capital; confirm SOFOM registration; review credit scoring methodology
    relatedQuestionRefs:
    - QE023
    - QE020
    - QE021
  - type: missing-source
    severity: minor
    topic: mobile-app-metrics
    missingEvidence: Mobile app store ratings and download counts could not be retrieved; both App Store and Play Store
      listing URLs returned 404 errors.
    whyItMatters: App quality signals are a proxy for platform user experience and engagement
    diligencePath: Use app analytics providers (Sensor Tower, data.ai) to retrieve install and rating history
    relatedQuestionRefs:
    - QE014
  - type: stale
    severity: minor
    topic: brazil-hub-throughput
    missingEvidence: Brazil reconditioning hub capacity announced in 2021 has not been updated in public sources; actual
      current throughput versus the 100,000-unit annual target is unverified.
    whyItMatters: Brazil is the second-largest market; hub capacity utilization affects unit economics
    diligencePath: Request monthly throughput data for Brazil hub for last 12 months
    relatedQuestionRefs:
    - QE019
  - type: access-blocked
    severity: minor
    topic: employee-sentiment-tech-culture
    missingEvidence: Glassdoor and Crunchbase profiles for Kavak were blocked, preventing retrieval of employee sentiment
      and engineering culture signals.
    whyItMatters: Engineering culture and attrition risk are relevant for assessing technology execution capability
    diligencePath: Use primary reference checks with former Kavak engineers; commission LinkedIn talent analytics
    relatedQuestionRefs:
    - QE015
