- id: SE-S002
  title: Vehicle inspection, reconditioning, and quality operations
  body: 'The 240-point inspection protocol is Kavak most cited operational differentiator. Each vehicle acquired by
    Kavak is subjected to a multi-stage technical check covering mechanical systems, electronics, bodywork, and legal
    status. Following inspection, vehicles are repaired and reconditioned in proprietary workshop facilities before being
    listed for resale. The company argues this process eradicates the estimated 40% fraud rate endemic to Latin American
    peer-to-peer used-car transactions.


    In Mexico, the primary reconditioning center is located in Lerma, Estado de Mexico. The facility spans more than
    14,000 square meters and has a rated capacity of more than 3,500 vehicles per month. In 2023, Mexico consumer protection
    regulator Profeco (Procuraduria Federal del Consumidor) conducted a formal on-site visit and publicly endorsed the
    facility standards. The Profeco director noted that Kavak had conciliated approximately 100% of formal consumer complaints
    registered with the regulator -- a strong metric relative to peer platforms, though the absolute complaint count
    was not disclosed.


    In Brazil, Kavak announced a $500 million investment in 2021 to build what it described as the largest vehicle reconditioning
    center in Latin America, located in Sao Paulo. The Brazil hub underpins the company goal of processing 100,000 purchased
    and 50,000 resold vehicles annually in that market. Across all markets, the reconditioning pipeline involves technical
    diagnostics, parts replacement, body work, detailing, legal title audit, and final quality certification before
    the vehicle is listed.


    Despite these strengths, independent verification of the 240-point inspection claims remains a diligence gap. El
    Economista reported in 2022 that Kavak maintained its Profeco certification despite a rising absolute number of consumer
    complaints, and consumer advocacy organization Tec-Check publicly criticized the company for prioritizing expansion
    over service quality. This creates an adverse signal that warrants independent inspection sampling during due diligence.'
