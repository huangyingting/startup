company:
  name: Kavak
chapter:
  number: 5
  title: Product & Technology
  summary: Kavak delivers an integrated used-car platform across six markets built on three interlocking pillars. The
    marketplace layer spans a web and mobile application that surfaces certified inventory with 360-degree photography,
    condition reports, and AI-generated pricing. The operations layer is anchored by proprietary reconditioning centers
    -- the Mexico State of Mexico hub processes 3,500 vehicles per month; the Sao Paulo facility, backed by a $500 million
    investment, is the largest in Latin America. The financial layer expanded in November 2025 with Kavak Credito, offering
    auto loans (Meses) from MXN $2,499/month at 14.99% and equity-release loans (Prestamo) at up to 60% LTV. A 240-point
    inspection protocol, Profeco Distintivo Digital certification in Mexico, and near-100% complaint conciliation provide
    quality assurance. Adverse signals include persistent customer complaints about vehicle defects and post-sale service
    quality, and criticism from consumer advocacy group Tec-Check that rapid expansion transferred quality costs to buyers.
    Key diligence gaps include independent audits of the inspection protocol, actual approval rates for Kavak Credito,
    and disclosed technology-stack architecture.
sections:
- id: SE-S001
  title: Product suite and customer workflow
  body: 'Kavak positions itself as a full-stack automotive platform that replaces the fragmented, fraud-prone informal
    used-car market. The product suite covers four customer jobs: selling a vehicle, buying a vehicle, financing a purchase,
    and managing post-sale services. Each job is handled end-to-end by Kavak without transferring the customer to a third
    party, which is the structural moat the company cites versus classified-ad platforms such as OLX Autos and Mercado
    Libre.


    For sellers, the workflow begins with an online price quote powered by the AI pricing algorithm. The seller brings
    the vehicle to a Kavak hub, where a 240-point physical inspection is completed in approximately 30 minutes. Kavak
    presents a non-negotiable final offer; if accepted, 80% of the payment is transferred within 24 hours and the remainder
    after legal title verification, typically within five business days. In Argentina, Kavak also offers a 30-day consignment
    option where Kavak guarantees full payment regardless of whether the vehicle sells, a model that accounted for 23%
    of Argentine sales as of late 2024.


    For buyers, Kavak surfaces a catalog of inspected, reconditioned vehicles on its web platform and mobile app. Each
    listing includes 360-degree photography, a full inspection report, and pricing transparency. Buyers can finance directly
    through Kavak Credito or visit a physical hub for a test drive. In Argentina, a 7-day no-questions-asked return window
    reduces purchase anxiety. Mexico offers a separate mechanical warranty period on sold vehicles. Kavak claims the
    platform enables a 100% digital purchase without any in-person visit, although physical hubs and reconditioning
    centers remain central to the quality-assurance infrastructure that underpins buyer trust.'
