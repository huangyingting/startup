- id: SE-S005
  title: Multi-market deployment and geographic product coverage
  body: 'Kavak operates its platform across six active markets as of 2026: Mexico, Brazil, Argentina, Chile, Turkey (under
    the Carvak brand), and the UAE cluster comprising the United Arab Emirates, Oman, and Saudi Arabia. Each market
    deployment requires a minimum viable reconditioning footprint and localized data training for the pricing algorithm,
    creating meaningful capital and time barriers to entry.


    Mexico remains the flagship market with the longest operational history (since 2016), the largest reconditioning
    center, and the most mature product offering including Kavak Credito. Brazil is the second-largest deployment with
    a $500 million capital commitment and the continent largest single reconditioning facility. Argentina, Chile, and
    Turkey operate with more limited physical footprints but full digital platform functionality. Turkey Carvak brand
    launched in 2021 and uses a locally adapted Turkish-language interface. The UAE cluster, expanded in April 2025
    to include Oman and Saudi Arabia, provides a bilingual Arabic/English experience and represents Kavak first non-emerging-market
    deployment targeting Gulf high-income consumers.


    Peru and Colombia were attempted but subsequently exited -- Peru in 2024 and Colombia in January 2025. These exits
    illustrate the capital intensity of the multi-market model: each launch requires reconditioning infrastructure, local
    regulatory compliance, and market-specific data training before reaching unit economics that justify continued investment.
    The Chile platform received a dedicated $40 million investment commitment after one year of operations, suggesting
    that data-driven reinvestment decisions follow initial market validation. Chile operations reportedly exceeded initial
    expectations in year one per Contxto reporting.'
