- id: SE-S006
  title: Trust, safety, compliance, and quality controls
  body: 'Trust infrastructure is central to Kavak value proposition in markets where the traditional used-car trade
    carries a 40% fraud rate. The company has built a multi-layer quality and compliance architecture covering the physical
    inspection and reconditioning process, legal title verification, post-sale warranty obligations, consumer protection
    certifications, and digital security.


    In Mexico, Kavak holds the Profeco Distintivo Digital -- a certification granted by Mexico Federal Consumer Protection
    Agency. This certification requires adherence to a digital commerce ethics code, attendance at all consumer conciliation
    hearings, absence of outstanding Profeco fines, and a valid website security certificate. Importantly, the Distintivo
    Digital is based on self-regulation: Profeco has no mechanism to continuously monitor compliance. El Economista reported
    in 2022 that Kavak retained this certification while facing a rising absolute count of consumer complaints, a tension
    that Tec-Check director called an ethics concern. Consumer advocacy critics argue Kavak was aware of service quality
    problems driven by rapid expansion but continued scaling rather than consolidating.


    Despite the adverse signals, Kavak achieved a near-100% conciliation rate on formal Profeco complaints -- recognized
    in a public 2023 Profeco endorsement as one of the best conciliation records in Mexico. The Profeco director on-site
    visit and endorsement of the Lerma facility represented an unusual public alignment between regulator and private
    platform.


    Post-sale protections vary by market: Argentina offers a 7-day no-questions return window plus mechanical warranty
    options; Mexico offers a mechanical warranty period on sold vehicles. Trustpilot reviews for kavak.com show a mixed
    picture, with multiple 2024 reviews citing frustration with vehicle quality after purchase and financing disputes,
    particularly from UAE and Turkey customers. Independent certification of the 240-point inspection by a third-party
    automotive engineering firm has not been publicly disclosed and represents a key diligence gap.'
