company:
  name: Kavak
chapter:
  number: 3
  title: Competitors
  summary: 'Kavak operates in a competitive landscape with no single dominant rival across its six markets. Direct certified
    used-car peers (Carvana in the US, AutoHero in Europe) are geographically absent from Latin America, leaving fragmented
    incumbents as Kavak primary competition: traditional dealerships, classifieds platforms such as Seminuevos and Mercado
    Libre Autos, and OLX Autos. The dominant substitute is the informal peer-to-peer market representing roughly 90 percent
    of used-car transactions in Latin America. Kavak moat rests on a 240-point certified inspection, a 70 percent financing
    attach rate through Kuna Capital, AI-driven pricing, and over $2.3 billion deployed in reconditioning infrastructure.
    Capital intensity risk is validated by Carvana near-bankruptcy in 2022 and by Kavak own exits from Colombia and Peru.
    AutoHero (AUTO1 Group) EBITDA profitability in the EU is the clearest external proof the model works at scale. Key risks
    include commoditization of inspection standards, well-capitalized classifieds incumbents adding certification layers,
    and Kuna Capital regulatory or credit-quality exposure.'
sections:
- id: SP-S001
  title: 'Competitive landscape: direct peers, incumbents, adjacents, substitutes, and potential entrants'
  body: 'Kavak competes simultaneously in multiple layers of the used-car ecosystem across six markets. The direct certified
    used-car marketplace peers are Carvana (US, NYSE: CVNA) and AutoHero (pan-European, subsidiary of publicly traded AUTO1
    Group). Neither has Latin American presence, meaning Kavak faces no direct full-stack certified peer in its home region.
    Incumbent adjacents include Seminuevos in Mexico (listing-only classifieds), Mercado Libre Autos across LatAm (classifieds
    within a dominant e-commerce platform), OLX Autos in Brazil (classifieds plus light inspection, less vertically integrated),
    and fragmented independent and franchise dealerships. The principal substitute is the informal peer-to-peer market consisting
    of Facebook Marketplace, WhatsApp groups, and word-of-mouth networks, which accounts for roughly 90 percent of used-car
    transactions in Latin America. Likely new entrants with sufficient capital include regional super-apps (Rappi, iFood)
    and pan-LatAm fintech platforms, though none has announced a certified used-car vertical as of 2026. In Turkey, incumbent
    classifieds platforms Sahibinden and Arabam.com play the same role as Seminuevos in Mexico. In the UAE cluster, Dubicars
    and CarSwitch.com serve as primary classifieds substitutes.'
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP004
  - CP005
  - CP006
  - CP007
  tableRefs:
