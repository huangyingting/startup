  figureRefs: []
- id: SP-S004
  title: Switching costs, lock-in, multi-homing, distribution power, and supply/partner access
  body: 'Kavak benefits from several sources of buyer switching costs. Buyers who finance through Kuna Capital are administratively
    locked to Kavak for the duration of their loan. The 7-day return guarantee and 3-month warranty tie the buyer relationship
    to Kavak post-purchase. Supply-side lock-in arises from Kavak proprietary reconditioning infrastructure: sellers who want
    the Kavak guaranteed buy price must use Kavak inspection process, creating a habit loop for repeat sellers. Multi-homing
    is easy for casual buyers browsing multiple platforms but functionally constrained once financing is initiated because
    the credit application ties buyers to a specific vehicle and lender. Distribution power is skewed toward classifieds incumbents
    in raw traffic and brand awareness, but Kavak is the only player with end-to-end transactional infrastructure. Supply
    advantages include Kavak reconditioning capacity enabling bulk vehicle sourcing and its banking license enabling instant
    credit decisions unavailable to classifieds platforms. Competitors who wish to replicate Kavak financing and inspection
    capabilities face multi-year capital deployment timelines and regulatory licensing hurdles.'
  claimRefs:
  - CP023
  - CP024
  - CP025
  - CP026
  - CP027
  - CP028
  tableRefs:
  - TP004
  figureRefs:
  - FP003
- id: SP-S005
  title: Moat durability, commoditization risk, displacement risk, and adverse competitor evidence
  body: 'Kavak moat is real but not unassailable. The 240-point inspection creates an anchored trust signal but can in principle
    be copied by well-capitalized incumbents. Mercado Libre or OLX could partner with third-party inspection services to narrow
    the certification gap, though replicating Kavak reconditioning depth would require capital commitments neither has announced.
    The Carvana near-bankruptcy in 2022 is the most direct adverse evidence: even in the mature US market, the vertically
    integrated model nearly collapsed under high interest rates and inventory mismanagement. This signals elevated capital
    intensity risk for Kavak if LatAm interest rates rise materially or GMV growth slows while fixed reconditioning costs
    remain elevated. OLX Autos retreat from LatAm auto verticals demonstrates that platform profitability without Kavak-level
    vertical integration is not guaranteed. Kavak own exits from Colombia and Peru show the model has minimum viable scale
    requirements. AutoHero (AUTO1 Group) profitability in the EU is a durability proof point. Displacement risk from AI-driven
    super-apps is low near-term because the reconditioning and financing infrastructure cannot be replicated digitally. The
    principal commoditization risk is in inspection standards if regulation mandates certification for all used-car sales.'
  claimRefs:
