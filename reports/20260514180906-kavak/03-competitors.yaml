- id: SP-S003
  title: Capability, pricing, GTM, and trust/regulatory comparisons
  body: 'On capability, Kavak differentiates through its 240-point inspection standard, exceeding Carvana approximately 150-point
    certification and far exceeding the effectively zero-point standard of classifieds platforms. Kavak offers a 3-month/3,000
    km warranty and a 7-day/300 km return guarantee, capabilities absent from classifieds and informal substitutes. On financing,
    Kavak offers in-house credit through Kuna Capital with a claimed 70 percent financing attach rate versus an industry average
    of roughly 5 percent in formal LatAm channels. This financing integration is a major differentiator: classifieds platforms
    and traditional dealers depend on third-party bank financing with lower approval rates and slower processes. On pricing,
    Kavak uses AI-driven non-negotiable prices to reduce adverse selection and accelerate the purchase funnel. Carvana also
    uses algorithm-based pricing but only in the US market. On GTM/distribution, Kavak operates physical reconditioning hubs
    as anchor assets for inventory sourcing and distributes through digital channels and physical showrooms. On trust and
    regulatory posture, Kavak holds financial services licenses in Mexico through Kuna Capital enabling direct lending, while
    classifieds competitors have no lending license requirement. This creates a meaningful regulatory barrier to replication.'
  claimRefs:
  - CP016
  - CP017
  - CP018
  - CP019
