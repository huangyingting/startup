  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: competitor-financials
    missingEvidence: Independently audited revenue, gross margin, and unit economics for Carvana post-2023 restructuring and
      for AUTO1 Group (AutoHero) at the business-unit level, enabling direct peer benchmarking for Kavak.
    whyItMatters: Carvana and AutoHero are the closest business-model analogs to Kavak. Without verifiable unit economics
      from these peers, benchmarking Kavak per-unit gross margin and reconditioning cost efficiency is speculative, weakening
      the valuation anchor.
    diligencePath: Pull Carvana 10-K/10-Q filings from SEC EDGAR for 2023-2025; pull AUTO1 Group annual reports from Frankfurt
      Stock Exchange disclosures. Request Kavak management to provide a direct peer comparison in the data room using audited
      figures.
  - type: missing-source
    severity: material
    topic: kuna-capital-financials
    missingEvidence: Kuna Capital non-performing loan ratio, cost of funds, regulatory capital ratio, and loan portfolio composition
      by market are not publicly available.
    whyItMatters: The 70 percent financing attach rate is Kavak primary moat claim. If Kuna Capital credit quality is poor,
      the financing advantage becomes a liability. Carvana 2022 stress was partly driven by captive auto loan book quality
      deteriorating under rising rates.
    diligencePath: Request Kuna Capital audited financial statements, CNBV regulatory filings, and NPL data as part of the
      data room. Cross-reference with CNBV fintech registry for license standing and capital requirements.
  - type: stale
    severity: minor
    topic: olx-autos-latam-status
    missingEvidence: Current OLX Autos operational status in Brazil and Mexico as of 2026, including whether the inspection
      service is still active.
    whyItMatters: OLX Autos is cited as an adjacent competitor in Brazil, but its LatAm auto vertical has been reducing investment.
      If OLX has fully exited Brazil autos, the competitive landscape is cleaner for Kavak.
    diligencePath: Check OLX Autos Brazil product pages directly; search for recent press releases on OLX Group auto vertical
      investment decisions; request confirmation from Kavak management on active Brazil competitors.
  - type: missing-source
    severity: minor
    topic: turkey-mena-competitor-detail
    missingEvidence: Detailed competitor mapping for Kavak Turkey (Carvak) and UAE/Saudi Arabia markets, including traffic
      share and product capability of Sahibinden, Arabam.com, and Dubicars.
    whyItMatters: Turkey and MENA are Kavak highest-growth and potentially most profitable markets given higher per-unit vehicle
      prices. Competitive intensity in these markets is less publicly documented than in Mexico or Brazil.
    diligencePath: Obtain SimilarWeb traffic data for Sahibinden, Arabam.com, and Dubicars; review Kavak Turkey investor materials
      for market share disclosures; request management commentary on competitive dynamics in Turkey and UAE during diligence
      calls.
