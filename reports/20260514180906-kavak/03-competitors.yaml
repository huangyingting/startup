callouts:
- calloutType: strength
  title: Kavak is the only full-stack certified used-car platform with LatAm/MENA multi-market reach
  body: No direct certified peer (Carvana, AutoHero) operates in Latin America as of 2026. Combined with in-house financing
    through Kuna Capital, Kavak occupies a structurally differentiated position versus all classifieds incumbents and the
    informal substitute.
  claimRefs:
  - CP001
  - CP002
  - CP016
  - CP017
- calloutType: risk
  title: Capital intensity risk is validated by Carvana near-bankruptcy and Kavak own market exits
  body: Carvana 2022 near-bankruptcy demonstrates that even a mature US-market certified used-car platform is highly vulnerable
    to interest rate increases and inventory cycle mismanagement. Kavak exits from Colombia and Peru confirm that minimum
    viable scale is non-trivial to achieve. These are concrete adverse precedents that should anchor diligence on Kuna Capital
    cost of funds and reconditioning center utilization rates.
  claimRefs:
  - CP029
  - CP030
  - CP031
  - CP032
- calloutType: insight
  title: AutoHero (AUTO1 Group) EU profitability is the best external model validation data point
  body: AUTO1 Group reaching adjusted EBITDA profitability in 2023-2024 while operating a certified digital used-car marketplace
    is the clearest public proof that the model can reach operational viability. The key structural difference from Kavak
    is the absence of in-house consumer financing; Kavak financing integration should provide higher revenue per unit but
    also higher credit risk concentration.
  claimRefs:
  - CP033
  - CP034
  - CP035
