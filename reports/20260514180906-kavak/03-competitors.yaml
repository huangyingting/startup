- id: SP-S002
  title: 'Competitor profiles: scale, funding, target customer, product scope, pricing, and strategic direction'
  body: 'Carvana is the closest business-model analog: vertically integrated, digital-first, with in-house financing and an
    approximately 150-point certification process. It is US-only, NYSE-listed, and reported approximately $6-7 billion revenue
    in 2024 after restructuring its debt through a significant exchange in 2023 following near-bankruptcy in 2022. Carvana
    has no LatAm operations and its near-bankruptcy illustrates the capital intensity and debt risk inherent to the vertically
    integrated model. AutoHero, operated by AUTO1 Group, is the pan-European equivalent with certified used cars sold online
    and in-house warranty but without Kavak-style in-house consumer financing. AUTO1 Group reached adjusted EBITDA profitability
    in 2023-2024, providing evidence that the certified digital used-car model is viable at scale. OLX Autos in Brazil offers
    classifieds plus light inspection services but lacks reconditioning centers and integrated financing; OLX Group has reduced
    its auto vertical investment in several LatAm markets. Seminuevos is the dominant listing platform in Mexico with high
    brand awareness but provides no certification, warranty, or financing. Mercado Libre Autos benefits from the dominant
    LatAm e-commerce trust brand but offers no certification or in-house auto financing. Traditional dealerships are fragmented,
    own reconditioning capabilities, and rely on bank partner financing, but lack digital-first scale. The informal P2P market
    represents the largest competitor segment by unit volume with no certification, no warranty, and extreme fraud risk for
    buyers.'
  claimRefs:
  - CP008
  - CP009
  - CP010
