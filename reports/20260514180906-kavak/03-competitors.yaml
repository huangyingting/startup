- id: TP004
  title: Moat durability / competitive risk register
  slug: moat-durability-competitive-risk-register
  columns:
  - moat claim
  - threat / erosion vector
  - severity
  - adverse evidence
  - diligence / mitigation path
  rows:
  - - 240-point certified inspection is the primary trust anchor
    - Classifieds incumbents add third-party inspection partnerships; regulation mandates certification for all
    - medium
    - Mercado Libre and OLX have not announced certification parity programs as of 2026
    - Track inspection standard adoption by classifieds rivals; monitor Mexican/Brazilian regulatory proposals
  - - 70% financing attach rate via Kuna Capital creates buyer lock-in
    - Rising LatAm interest rates or regulatory capital requirements constrain Kuna Capital lending growth
    - high
    - Carvana near-bankruptcy 2022 was partly driven by rising US interest rates on captive auto loans
    - Request Kuna Capital NPL ratios, cost of funds, and regulatory capital adequacy; compare to BANXICO trajectory
  - - AI non-negotiable pricing reduces adverse selection
    - Competitors build similar pricing algorithms; price discovery improves across platforms via data aggregation
    - low
    - No public evidence of direct pricing algorithm replication by Kavak rivals
    - 'Assess proprietary data moat: transaction volume, years of pricing data, reconditioning cost feedback loop'
  - - $2.3B+ in reconditioning infrastructure creates capital barrier to entry
    - Super-app or OEM with large balance sheet invests in LatAm certified auto at scale
    - medium
    - No announced new entrant with comparable capital commitment as of 2026
    - Monitor Amazon, Rappi, and MercadoLibre M&A signals; assess Kavak infrastructure depreciation and utilization
  - - Multi-market first-mover advantage across 6 LatAm/MENA markets
    - New entrant replicates model in single high-income market (UAE or Chile) with lighter cost base
    - medium
    - Kavak itself exited Colombia and Peru, showing market-entry risk is not zero
    - Validate unit economics per market; request breakeven timelines by country
  - - Banking license (Kuna Capital) enables instant credit decisions
    - Regulatory tightening, loss of fintech license, or requirement to partner with commercial bank
    - high
    - LatAm fintech licensing is evolving; CNBV in Mexico has tightened fintech regulation post-2023
    - Request Kuna Capital regulatory standing, capital reserves, and compliance audit results
  - - No certified used-car peer present in LatAm as of 2026
    - Carvana or AutoHero announces LatAm expansion; OEM-backed certified program scales
    - low
    - Neither Carvana nor AutoHero has announced LatAm entry as of 2026
    - Monitor Carvana and AUTO1 investor calls and geographic expansion disclosures quarterly
  notes: Severity ratings (high / medium / low) are ordinal judgments based on publicly available competitive intelligence
    as of 2026-05-14. High severity indicates the threat could materially impair Kavak unit economics or market position if
    realized. Register focuses on most consequential durability risks.
