      - number: '5.2'
        title: 车辆检测、整备与质量运营
        blocks:
          - type: paragraph
            body: >-
              240 项检测流程是 Kavak 最常被提及的运营差异点。Kavak
              收购的每辆车都要经过多阶段技术检查，覆盖机械系统、电子设备、车身和法定状态。检测完成后，车辆会在自有维修车间修理和整备，再上架转售。公司认为，这套流程可以清除拉美个人对个人二手车交易中估计高达 40% 的欺诈率。


              墨西哥的主要整备中心位于墨西哥州 Lerma。该设施面积超过 14,000 平方米，额定月处理能力超过 3,500 辆车。2023 年，墨西哥消费者保护监管机构 Profeco（Procuraduria
              Federal del Consumidor）正式到场检查，并公开认可该设施标准。Profeco 负责人指出，Kavak 已调解约 100%
              登记在该监管机构的正式消费者投诉；相对同业平台，这是强指标，但绝对投诉数量并未披露。


              在巴西，Kavak 于 2021 年宣布投入 $500 million，在 Sao Paulo 建设其所称的拉美最大车辆整备中心。巴西网点支撑公司的目标：在该市场每年处理 100,000 辆收购车辆、50,000
              辆转售车辆。横跨所有市场，整备流水线包括技术诊断、零部件更换、钣喷、精洗、法定车权审计，以及上架前的最终质量认证。


              尽管有这些优势，240 项检测主张仍缺少独立验证，这是尽调缺口。El Economista 2022 年报道称，尽管消费者投诉绝对数量上升，Kavak 仍保留 Profeco 认证；消费者倡议组织
              Tec-Check 也公开批评公司把扩张置于服务质量之上。这构成反向信号，尽调中应独立抽样检测车辆。
