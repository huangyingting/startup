      - number: '4.2'
        title: GTM 动作和销售效率代理指标
        blocks:
          - type: paragraph
            body: >-
              Kavak 的进入市场动作是数字优先，并以实体整备枢纽作为锚定基础设施。需求生成依赖数字渠道（SEO、效果营销、社交媒体），加上高曝光体育赞助：Kavak 是 Argentine Football
              Association（AFA）国家队球衣赞助商，也赞助过 Mexican Football Federation（FMF）和 NFL
              合作。这些赞助服务于大众消费市场的品牌建设；二手车购买在这些市场仍主要由关系和非正式渠道驱动。获客成本未公开披露。Kavak 不可议价 AI 定价压缩了销售周期：AI 算法给出即时报价，减少来回谈判。管理层称
              AI 模型用公开汽车数据和自有交易历史训练。根据公司表述，截至 2025 年 4 月，库存周转速度比上一年快 3.5x，显示重组后 CAC / 库存持有成本效率有所改善。Mexico 约 70%
              的融资附加率可作为客户粘性和自营贷款产品打包效率的代理指标。Mexico 正规二手车市场每年约 1 million 笔交易，而非正式点对点交易估计为 5–6 million 笔；这意味着 Kavak
              可触达的正规份额有限，渠道经济性受非正式市场替代约束。
