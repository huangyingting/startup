            body: >-
              Kavak 总业务活动估计有 60% 或以上集中在墨西哥。墨西哥车权转移流程的任何监管变化、削弱可选消费的宏观冲击，或竞争对手打入非正式市场，都可能不成比例地损害客户基础。哥伦比亚和秘鲁退出说明，Kavak
              的客户密度模型需要持续高交易量，才能支撑固定整备基础设施。
