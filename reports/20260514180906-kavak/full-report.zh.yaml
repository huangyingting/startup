      - number: '4.4'
        title: 公开牵引指标和私有指标缺口
        blocks:
          - type: paragraph
            body: >-
              Kavak 只披露运营指标，不披露财务指标。截至 2025 年 4 月，公司称销量同比增长 60%。同一公告称库存周转较上年提升 3.5x。2023 年 Q4 运营环比增长 70%。根据公司披露，Kuna
              Capital 自成立以来累计发放约 $1 billion。Kavak 位于墨西哥州的 Mexico 整备中心每月可处理 3,500
              辆车。公司称其在六个市场运营——Mexico、Brazil、Argentina、Chile、Turkey（Carvak 品牌）和 UAE 集群（Oman 和 Saudi Arabia）——并于 2022 年扩张至
              Dubai 和 Saudi Arabia。公司从未公开披露收入、ARR、GMV、EBITDA、毛利率或净利润。任何时期都没有可获得的审计财务。承销所需但不可获得的关键私有指标包括：按市场收入、单车毛利、Kuna
              Capital NPL 率、利差、单市场 EBITDA，以及截至 2026 年 Q1 的在手现金。唯一可作为财务健康状况代理的，是 2025 年 4 月内部人轮估值 $2.2B，较 2021 年 $8.7B
              峰值下降 75%。拉美二手车市场整体在增长，提供结构性顺风；但按 Statista 数据，正规成交部分仍只占总车辆存量的一小部分。
