  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与估值立场
        blocks:
          - type: paragraph
            body: >-
              基于截至 2026 年 5 月可获得的公开证据，对 Kavak 的建议立场是「观察」——密切跟踪，但在两个条件满足前，不投入新的股权资本：（1）公司层面经审计或独立验证的 EBITDA 转正结果；（2）透明披露
              Kuna Capital 不良贷款率和拨备覆盖率。中等置信度反映真实不确定性：Kavak 所在市场结构性有吸引力（墨西哥二手车数字渠道渗透率仍低于 2%），已经显示规模（6.9M 月网页访问量，其中约 66%
              来自墨西哥），并保有 SoftBank、General Atlantic、Andreessen Horowitz（2024 年进入）、Founders Fund、Tiger Global 和 Kaszek
              等一线全球投资者支持。不过，高风险评级由四个叠加因素支撑。第一，2025 年 4 月融资没有外部投资者，说明公开市场中新股的出清价格明显低于 $2.2B。第二，约 $1.2B
              总未偿债务在任何不利情景下都优先于股权持有人。第三，公司自成立以来没有发布任何年度经审计财务报表，使独立估值高度不确定。第四，阿根廷、土耳其和多市场货币敞口给回报带来结构性不可预测性。估值立场为「偏高」：$2.2B
              隐含收入倍数大体与 Carvana 或 AUTO1 Group 一致，但二者都是上市公司，财务透明且监管标准成熟。成熟投资者若通过老股或结构化交易进入，合理入场价需要较 2025 年 4 月标记折让
              20-35%，或设置与盈利里程碑挂钩的实质性 ratchet。
