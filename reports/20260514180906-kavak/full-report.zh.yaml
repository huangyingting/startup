      - number: '7.5'
        title: 人员、技术、安全与缓释
        blocks:
          - type: paragraph
            body: >-
              关键人风险很高：Carlos García Ottati 是 Kavak 联合创始人、CEO，也是主要公开发言人。公开记录中没有继任计划，2025 年 4 月 down round 后也没有管理层连续性披露。基于
              AI 的车辆定价模型是公司核心技术差异点；2022 年裁员后，构建和维护该系统的工程师与数据科学家是否留任，外部尚未验证。数据安全风险潜伏但重大：Kavak 从 10+ 个司法辖区的数十万用户收集高度敏感
              PII——身份证件、收入数据、信贷申请——但截至 2026 年 5 月，公司没有披露 SOC 2、ISO 27001 或同等公开安全认证。拉美非正式二手车行业在车权和里程文件上存在 40%+
              的结构性异常率；Kavak 的 240 项检测是缓释措施，但不能绝对保证不会采购到文件欺诈车辆。缓释方面，Kavak 2022–2025 年重组显示管理层有能力降本并聚焦核心市场；巴西投资（2021 年承诺
              $500M）被低调缩减而非继续扩张，说明公司在压力下有资本纪律。缓释与否决标准表（TR005）定义了可监控的投资逻辑失效触发器，并给出量化阈值。依赖关系图（FR003）展示 Kavak 对 Goldman
              Sachs / HSBC 信贷额度、SoftBank / General Atlantic 股权背书，以及 CNBV 金融科技牌照的结构性依赖。
