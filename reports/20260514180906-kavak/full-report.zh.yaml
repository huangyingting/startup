  - id: FE001
    title: Kavak 产品与技术架构（技术栈）
    type: stack
    description: 五层架构从面向客户的数字渠道，延伸到实体车辆运营，再到数据和金融服务底座。各层互相咬合——AI 定价引擎同时供给交易市场和信贷引擎；整备中心则为交易市场补充库存。
    data:
      layers:
        - label: 客户渠道
          modules:
            - Web 平台（kavak.com 和各市场子域）
            - 移动 App（iOS 和 Android）
            - 实体枢纽和整备中心
          note: 6 active market domains; mobile app store listings returned 404 suggesting recent URL change
        - label: 平台核心
          modules:
            - 车辆交易市场（买 / 卖挂牌）
            - 搜索与发现引擎
            - 用户账户与交易管理
          note: Core marketplace operational since 2016; exact tech stack undisclosed
        - label: 数据与 AI
          modules:
            - AI 定价算法（市场 + 内部数据）
            - 信用评分与承保引擎
            - 市场分析与需求预测
          note: Algorithm trained on thousands of iterations; feeds both vehicle pricing and loan decisions
        - label: 车辆运营
          modules:
            - 240 点检测系统
            - 整备车间网络（Lerma MX 3500 辆/月；Sao Paulo BR）
            - 物流与枢纽间运输
          note: Primary physical moat; capital-intensive; Mexico hub endorsed by Profeco in 2023
        - label: 金融服务
          modules:
            - Kavak Credito -- Meses 汽车贷款（2025 年 11 月推出）
            - Kavak Credito -- Prestamo 车辆权益释放贷款（2025 年 11 月推出）
            - Kuna Capital 后端与资金债务管理
          note: Goldman Sachs and HSBC each extended $200M credit lines to Kuna Capital in Apr 2025
    notes: 技术栈架构依据公开表态、新闻稿和博客内容推断。直接技术文档未公开。
