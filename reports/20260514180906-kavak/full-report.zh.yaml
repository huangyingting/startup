      - number: '6.4'
        title: 留存、满意度与忠诚度信号
        blocks:
          - type: paragraph
            body: >-
              Kavak 的留存和满意度证据偏定性，且主要来自公司。最强的独立验证是墨西哥消费者保护机构 PROFECO 的正面提及；该机构因 Kavak
              的客户调解流程点名认可公司——在二手车欺诈和纠纷常见的市场里，这是有意义的信号。阿根廷媒体（Infobae 2024 年 12 月、2025 年 6 月）的客户证言描述了对 Dólar Kavak
              美元挂钩付款模式和交易速度的满意。墨西哥 70% 的融资附着率构成结构性留存机制：通过 Kavak Crédito 融资的买家在贷款期内被锚定在平台上，通常为 24–60
              个月，并形成持续服务关系。阿根廷融资渗透率从 2024 年 6 月至 2025 年初的约 20–25% 升至 Kavak 销售额约 50%，说明二级市场客户参与更深。Kavak 的 permuta（置换 /
              换购）功能让既有买家回到平台换车，形成结构性复购机制。Kavak Crédito 申请人约 70% 获得预批，形成高转化的入门漏斗。不过，公司没有公开披露 NRR、GRR、流失率、队列留存数据、NPS
              分数或合同续约数字。缺少经审计留存指标，是评估客户基础可持续性和复利价值的重大尽调缺口。7 天退车政策和质保计划提供购后信心，但属于市场标准配置，而非差异化忠诚工具。
