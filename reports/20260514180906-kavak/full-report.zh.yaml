        - 在分类网站挂牌；与陌生人议价；办理产权过户；承担欺诈风险
        - 线上报价，到枢纽检查（30 分钟），再到不可议价报价，并在 24–120 小时内付款
        - 消除欺诈敞口；相比 C2C 到账更快
        - Kavak 报价可能低于私人出售市值；价差未公开
      - - 购买二手车
        - 搜索分类信息；自行检查；议价；核验产权；承担机械故障风险
        - 浏览认证库存；查看 360 度照片和检查报告；线上或到枢纽购买
        - 质量保障；质保；法律产权已核验；定价透明
        - 库存限于 Kavak 收购车辆；没有 C2C 库存
      - - 为购车融资
        - 找银行或经销商；提交大量文件；等待数天或数周
        - 通过 Kavak Credito 100% 线上申请；MXN $2,499 / 月；预批准目标 7/10
        - 速度快；信用薄档借款人更容易获得；无需到网点
        - 利率（14.99% 及以上）相对传统银行基准尚未公开披露
      - - 释放自有车辆权益
        - 卖车，或以高利率借个人贷款
        - Kavak Credito Prestamo -- LTV 最高 60%，利率 21.99%；最长 60 个月
        - 不卖车也能获得流动性；结构化还款
        - 利率显著高于优质贷款利率；Kuna Capital 的 NPL 风险未披露
      - - 跨多个国家买卖
        - 各国都面对同样的非正规市场风险
        - 6 个市场共用同一套 Kavak 平台；检测和产权流程标准化
        - 信任模型可跨市场迁移；品牌能跨市场识别
        - 各市场监管要求不同；已退出 Peru / Colombia
    notes: 工作流对比基于公开报道的 Kavak 流程描述和区域行业数据。竞品工作流来自第 3 章研究。
