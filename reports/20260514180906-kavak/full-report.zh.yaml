      - number: '1.4'
        title: 产品平台、金融科技层和品牌合作
        blocks:
          - type: paragraph
            body: >-
              Kavak 的产品栈有三层。交易层让消费者发布车辆出售（Kavak 提供即时收购、置换或 30 天挂牌选项）、搜索并购买库存、完成融资，全部在同一个数字界面上完成。运营层由实体整备中心构成，每辆车上架前都完成
              240 点检测，并配套车辆取送物流。金融层 Kuna Capital 四年内已发放约 $1 billion 汽车贷款；在 Mexico，70% 销售包含自营融资，而行业平均为 5%。


              2025 年 11 月，Kavak 推出独立金融科技产品 Kavak Crédito，提供「Meses」（月供分期：每月 MXN $2,499 起，首付 15%，最长 72 个月，10 名申请者中 7
              名可获预批准）和「Préstamo」（车辆权益释放：最高为车辆价值 60%，最长 60 个月）。Kavak Crédito 申请者中 40% 没有既往信用记录，体现公司正在扩大拉美正规金融可得性；当地每 10
              人中只有 1.5 人拥有汽车，而美国为每 10 人中 7 人。


              品牌合作包括赞助 Mexican Football Federation、Argentine Football Association（AFA）、2022 年 2 月 CONCACAF Champions Cup
              赞助，以及 2025 年 12 月宣布的 NFL 商业合作。Kavak 于 2020 年收购阿根廷创业公司 Checkars，又在 Turkey 收购 Garaj Serpeti（更名为 Carvak），并收购
              Oman 的 Carzaty 以扩张中东。
