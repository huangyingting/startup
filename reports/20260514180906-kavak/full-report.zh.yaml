        - label: 进入平台（web / app）
          detail: 浏览车辆库存或发起卖车表单；AI 搜索和定价引擎启动
        - label: 收到 AI 报价
          detail: 卖家即时收到报价；买家看到认证车辆价格；无议价——算法定价
        - label: 交易决策
          detail: 确认买入或卖出；提供 Kavak Crédito 融资（Mexico 70% 附加率）；身份与产权文件
        - label: 交付 / 枢纽交接
          detail: 实体整备枢纽自提或送车上门；240 点检测证书；7 天退车窗口
        - label: 售后服务
          detail: Kavak Crédito 服务（24–60 个月贷款）；permuta 置换重新入场；维修保养转介；复购触发
  - id: FU002
    title: 采用 / 部署漏斗
    slug: adoption-deployment-funnel
    type: funnel
    summary: 从二手车总可用市场逐步收窄到 Kavak Mexico 融资交易，展示相对规模和渗透深度。
    approximationNotes: 所有数值均根据市场份额声明和媒体报道估算；Mexico 年交易 5M 是行业估计；Kavak Mexico ~50K 由 1% 市场份额声明推断。为保持单位口径一致，美元市场规模未纳入。
    claimRefs:
      - CU006
      - CU011
      - CU012
    data:
      items:
        - label: 二手车总交易量（Kavak 6 个市场，估计辆 / 年）
          value: 28000000
          detail: 墨西哥 ~5M，巴西 ~13M，土耳其 ~7M，UAE ~1.9M，阿根廷 ~1.2M，智利 ~400K
          tone: neutral
        - label: 形式上可触达（产权正规 + 数字发现）
          value: 5000000
          detail: 拥有产权文件且可通过数字渠道触达的子集；排除仅现金的 P2P（约占总量 15%）
          tone: neutral
        - label: Kavak Mexico 估计年交易量
          value: 50000
          detail: 由公司声称在 Mexico 年 5M 交易中约有 1% 市场份额推断
          tone: neutral
        - label: 使用 Kavak Crédito 融资的 Kavak Mexico 交易
          value: 35000
          detail: 估计 Mexico Kavak 交易中 70% 使用融资；假设绝对基数为 50K
          tone: neutral
  - id: FU003
    title: 客户证据矩阵
    slug: customer-proof-matrix
    type: matrix
    summary: Kavak 四个活跃地理集群的证据质量和客群覆盖，展示首次购车者渗透、未被银行覆盖人群触达、卖方主张和中产客群存在感。
    approximationNotes: 单元格为基于媒体和公司表态的定性证据评估；没有按地域-客群组合拆分的独立量化数据。
    claimRefs:
      - CU001
      - CU002
      - CU017
      - CU025
    data:
      columns:
        - label: 首次购车者证据
        - label: 未被银行覆盖 / 服务不足证据
        - label: 卖方主张证据
        - label: 中产客群证据
      rows:
        - label: Mexico
          values:
            - 买家 40% 为首次购车（公司声明）
            - Crédito 用户 40% 无信用记录
            - <30 min 在线卖车（公司声明）
            - 核心客群；有受抚养人比例 36→45%（2023）
        - label: Argentina
          values:
            - 增长中；未披露百分比
            - 服务不足；无征信覆盖率数据
            - Dólar Kavak 美元支付（媒体已确认）
            - 核心客群；融资渗透率升至 50%
        - label: Brazil
          values:
            - 增长中；公开数据有限
            - 服务不足；未给出指标
            - 是，数字平台；无速度声明
            - 核心客群；披露数据有限
        - label: Turkey / UAE 集群
          values:
            - 部分；市场背景不同
            - 未知；信用基础设施不一
            - 是；GCC 区域发布时有 500 辆库存
            - 增长中；披露数据有限
  - id: FU004
    title: 留存 / 复购队列
    slug: retention-repeat-cohort
    type: matrix
    summary: 三个主要市场的定性留存和复用信号，覆盖复购交易模式、融资使用率、售后参与和推荐指标。留存百分比未公开。
    approximationNotes: 单元格为定性评估；Kavak 未披露净留存率（NRR）、总留存率（GRR）或队列留存百分比。需通过数据室索取经审计留存数据。
    claimRefs:
      - CU021
      - CU022
      - CU024
    data:
      columns:
        - label: 复购交易信号
        - label: 融资使用率
        - label: 售后参与
        - label: 推荐 / 品牌信号
      rows:
        - label: Mexico（估计）
          values:
            - 公司声称为正；无公开数据
            - 70% 交易通过 Kavak Crédito 融资
            - 数据有限；permuta 功能可用
            - NFL/FMF 赞助营销；PROFECO 正面提及
        - label: Argentina（估计）
          values:
            - 增长中；无公开复购数据
            - 升至 Kavak AR 销售约 50%（2025 年 Q1）
            - 数据有限；Dólar Kavak 可能带来重复使用
            - AFA 球衣赞助；Infobae 合作报道
        - label: Brazil（估计）
          values:
            - 公开数据有限
            - 未知；未披露
            - 数据有限；未披露
            - 未披露
  - id: FR001
    title: 风险热力图
    slug: risk-heatmap
    type: matrix
    layout: wide
    summary: 按发生可能性（Y 轴）和影响（X 轴）映射 Kavak 风险暴露；信贷 / 不良贷款和货币贬值落在最关键象限。
    approximationNotes: 可能性和影响评级由作者依据媒体报道、交易公告和行业可比公司推断。Kavak 未披露官方风险量化。
    claimRefs:
      - CR001
      - CR009
      - CR011
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 关键影响
        - 生存级影响
      rows:
        - label: 极不可能
          values:
            - label: 地缘政治（Gulf）
              tone: neutral
            - null
            - null
            - null
            - null
        - label: 不太可能
          values:
            - null
            - label: 数据泄露
              tone: warning
            - label: 枢纽中断
              tone: warning
            - null
            - null
        - label: 可能
          values:
            - null
            - label: 产权欺诈
              tone: warning
            - label: 市场退出（新增）
              tone: risk
            - null
            - null
        - label: 可能性高
          values:
            - null
            - label: autos chocolate 定价
              tone: warning
            - label: 信贷 / 不良贷款风险
              tone: risk
            - label: 货币贬值
              tone: critical
            - null
        - label: 几乎确定
          values:
            - null
            - null
            - label: 盈利延迟
              tone: critical
            - label: 债务契约压力
              tone: critical
            - label: 资不抵债（若无法融资）
              tone: critical
  - id: FR002
    title: 风险传导图
    slug: risk-transmission-map
    type: dag
    layout: wide
    summary: 因果链展示 LatAm 货币贬值、不良贷款恶化和股权融资通道收紧如何共同推高 Kavak 资不抵债风险。
    approximationNotes: 边标签是依据分析师报道和行业动态推断的定性因果机制；作为私营公司，Kavak 没有可用的量化传导系数。
    claimRefs:
      - CR003
      - CR009
      - CR011
      - CR040
      - CR044
    data:
      nodes:
        - id: r1
          label: LatAm 货币贬值
        - id: r2
          label: VC / 股权胃纳下降
        - id: r3
          label: 借款成本上升（美元债）
        - id: r4
          label: 不良贷款增加（Kuna Capital）
        - id: r5
          label: 库存价值下降
        - id: r6
          label: Kavak 资不抵债风险
      edges:
        - from: r1
          to: r2
          label: 压低美国 / 新兴市场投资者风险偏好
        - from: r1
          to: r4
          label: 借款人对比索计价贷款违约
        - from: r1
          to: r5
          label: 汽车价值以本币计下跌
        - from: r2
          to: r6
          label: 股权资本缺口风险
        - from: r3
          to: r6
          label: 债务服务负担抬升
        - from: r4
          to: r6
          label: 信贷损失叠加经营亏损
  - id: FR003
    title: 依赖图
    slug: dependency-map
    type: flow
    layout: standard
    summary: Kavak 的关键结构性依赖：Goldman Sachs/HSBC 信贷、SoftBank/General Atlantic 股权、CNBV 牌照，以及政府产权过户基础设施。
    approximationNotes: 依赖关系依据公开交易公告和媒体报道推断。具体合同条款未公开披露。
    claimRefs:
      - CR017
      - CR021
      - CR035
    data:
      nodes:
        - id: f1
          label: Goldman Sachs / HSBC 信贷额度（合计约 $1.2B）
          detail: 高级债融资；受契约约束
        - id: f2
          label: SoftBank / General Atlantic（股权）
          detail: 长期持有人；参与 2025 年内部下行轮
        - id: f3
          label: Kavak 运营（核心平台和枢纽）
          detail: 墨西哥（~60%）、阿根廷、巴西、土耳其、中东、智利
        - id: f4
          label: Kuna Capital / Kavak Crédito（放贷）
          detail: 已发放超 $1B；受 CNBV 监管；Mexico 附加率 70%
        - id: f5
          label: CNBV / Mexico 政府（监管牌照）
          detail: Ley Fintech 牌照支撑消费信贷
      edges:
        - from: f1
          to: f3
          label: 库存收购所需营运资本
        - from: f2
          to: f3
          label: 股权资本和战略背书
        - from: f3
          to: f4
          label: 平台交易生成放贷机会
        - from: f5
          to: f4
          label: 牌照支撑 FinTech 放贷业务
  - id: FV001
    title: 建议逻辑流
    type: flow
    description: 决策树把关键分析输入映射到「观察」建议，展示市场地位、fintech 护城河、资本结构和披露缺口如何共同形成整体投资立场。
    data:
      nodes:
        - id: n1
          label: 'Mexico #1 市场份额（主导地位）'
        - id: n2
          label: ~70% 融资附加率（Kuna Capital 护城河）
        - id: n3
          label: 一线支持者：SoftBank、GA、a16z、Founders Fund
        - id: n4
          label: 未披露经审计财务（阻断性缺口）
        - id: n5
          label: 仅内部参与的下行轮（较峰值低 75%）
        - id: n6
          label: $1.2B 债务优先于股权持有人
        - id: n7
          label: 乐观信号合并（n1 + n2 + n3）
        - id: n8
          label: 悲观信号合并（n4 + n5 + n6）
        - id: n9
          label: 建议：观察（中等置信度）
        - id: n10
          label: 上调路径：EBITDA+ 得到确认且 NPL 披露
        - id: n11
          label: 下调路径：再次下行轮或 NPL 飙升
    notes: 边：n1-n3 汇入 n7；n4-n6 汇入 n8；n7 和 n8 在 n9 合并；n9 分叉到 n10（上调）和 n11（下调）。
  - id: FV002
    title: 估值敏感性——入场折价 vs IRR
    type: bar
    description: >-
      在基准退出假设为企业价值 $2.5B 的情况下，测算 2025 年 4 月 $2.2B 标记上不同入场折价对应的 3 年投资者 IRR。0% 折价约产生 4% IRR；35% 折价约产生 20%
      IRR——这是新兴市场风险调整回报的最低门槛。
    data:
      items:
        - label: 0% 折价（$2.2B 入场）
          value: 4
          detail: 低于新兴市场门槛收益率；当前标记没有安全边际
          tone: negative
        - label: 10% 折价（$1.98B 入场）
          value: 8
          detail: 仍低于典型新兴市场 VC 门槛；边际改善
          tone: warning
        - label: 20% 折价（$1.76B 入场）
          value: 12
          detail: 接近新兴市场门槛收益率；仍低于多数 LP 目标
          tone: warning
        - label: 25% 折价（$1.65B 入场）
          value: 15
          detail: 高风险新兴市场成长股权的最低可接受水平
          tone: neutral
        - label: 30% 折价（$1.54B 入场）
          value: 17
          detail: 落在成熟老股买家的可接受区间
          tone: positive
        - label: 35% 折价（$1.43B 入场）
          value: 20
          detail: 达到典型新兴市场门槛；补偿不透明度和债务风险
          tone: positive
    notes: IRR 数字为示意性估算，假设基准情景退出价值 $2.5B、持有 3 年，未假设杠杆。实际回报取决于优先权悬挂和稀释路径。
  - id: FV003
    title: 估值区间——乐观、基准和悲观情景
    type: range
    description: Kavak 未来 3 到 5 年在乐观、基准和悲观情景下的股权估值区间，以 $M 表示。区间反映各情景内基于退出倍数和增长假设的低位、基准和高位估计。
    data:
      items:
        - label: 乐观情景（2027-2028 IPO，2025 年底前 EBITDA+）
          low: 3500
          base: 4500
          high: 6000
          unit: $M
        - label: 基准情景（2028-2029 IPO，2026 年中前 EBITDA+）
          low: 1800
          base: 2300
          high: 3000
          unit: $M
        - label: 悲观情景（盈利未达标，被迫下行轮）
          low: 600
          base: 950
          high: 1400
          unit: $M
    notes: 估值区间代表优先权瀑布之后的股权价值。悲观情景假设追加下行轮显著稀释普通股。当前内部标记（2025 年 4 月）：$2.2B。
  - id: FV004
    title: 关键投资 KPI
    type: kpi
    description: 汇总投资决策最关键的量化数据点，来源包括公开披露和分析师估计。
    data:
      items:
        - label: 当前估值（2025 年 4 月）
          value: 2200
          unit: $M
        - label: 峰值估值（2021 年 9 月）
          value: 8700
          unit: $M
        - label: 较峰值估值下跌
          value: 75
          unit: '%'
        - label: 2025 年 4 月股权融资
          value: 127
          unit: $M
        - label: 2025 年新增信贷额度（Goldman + HSBC）
          value: 400
          unit: $M
        - label: 估计未偿债务总额
          value: 1200
          unit: $M
        - label: 累计股权融资（所有轮次估计）
          value: 1900
          unit: $M
        - label: 融资附加率（Kuna Capital）
          value: 70
          unit: '%'
        - label: Mexico 收入占比
          value: 60
          unit: '%'
        - label: 月 Web 访问量
          value: 6.9
          unit: M
        - label: 员工数（重组后）
          value: 4300
          unit: employees
        - label: 已表述 IPO 时间窗口（年）
          value: 3
          unit: to 5 yrs
    notes: >-
      估值数据来自 Bloomberg Lines 和 TechCrunch 2025 年 4 月报道。总债务为合并 2021 年信贷工具和 2025 年额度后的估计。融资附加率来自 CEO 公开表态（Bloomberg 2025 年
      4 月）。
