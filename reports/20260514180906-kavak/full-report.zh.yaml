      - number: '3.4'
        title: 切换成本、锁定效应、多平台使用、分销权力和供给 / 合作伙伴获取
        blocks:
          - type: paragraph
            body: >-
              Kavak 受益于几类买方切换成本。通过 Kuna Capital 融资的买家，在贷款期限内被行政流程锁定在 Kavak。7 天退货保证和 3 个月质保，把购后买家关系继续绑定到 Kavak。供给侧锁定来自
              Kavak 自有整备基础设施：卖家若想获得 Kavak 保证买入价，就必须使用 Kavak
              检测流程，从而为重复卖家形成习惯循环。随意浏览多平台的买家可以轻松多平台使用，但一旦启动融资，功能上就受到约束，因为信贷申请把买家绑定到特定车辆和贷款方。原始流量和品牌认知度上，分销权力偏向分类广告既有玩家，但
              Kavak 是唯一拥有端到端交易基础设施的参与者。供给优势包括 Kavak 整备产能，可支持批量车辆获取；以及其银行牌照，可做出分类广告平台无法提供的即时信贷决策。希望复制 Kavak
              融资和检测能力的竞争者，将面对多年资本部署周期和监管牌照门槛。
