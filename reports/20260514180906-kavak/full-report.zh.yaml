      - number: '6.5'
        title: 反向信号、客户投诉与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Kavak 的客户基础存在显著集中度风险，也有服务失败的记录。地域集中度很高：墨西哥估计贡献总活动量的 60% 或以上，使整体客户牵引力取决于单一市场的监管、宏观和竞争环境。2022
              年，疫情相关政府办公室限制影响车权转移处理，导致交付延迟最长达数月，服务质量问题浮出水面。该期间线上客户投诉记录显示交付缓慢；公司承认运营挑战，并表示「必须补上我们如何管理公司、如何分配资源的课」。Kavak
              估值从 2021 年 9 月的 $8.7 billion 降至 2025 年 4 月的 $2.2 billion，跌幅
              75%，反映投资者层面的反向情绪，部分源于运营执行失败和市场退出。公司退出哥伦比亚和秘鲁，确认这些市场客户量不足以支撑资本密集型整备模式。Bloomberg Línea
              将估值折价报道为基本面重估的确认。Restofworld.org（2022）系统记录了运营困境，包括交付延迟和劳动力重组。没有公开的具名个人客户数据、经审计客户数或独立客户满意度调查，带来集中验证风险：如果
              Kavak 退出更多市场，或墨西哥非正式向正式转化停滞，所谓客户基础规模将无法独立核验，也不能作为可靠依据。
