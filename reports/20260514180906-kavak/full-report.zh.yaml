      - number: '2.4'
        title: 增长驱动因素和采用约束
        blocks:
          - type: paragraph
            body: >-
              Kavak 的核心需求驱动是结构性且长期的。拉丁美洲、Turkey 和海湾地区中产阶层持续形成，带来一批稳定增长的首车买家；他们需要融资，却无法通过传统银行渠道获得。Kavak 重点城市——Mexico
              City、Sao Paulo、Buenos Aires、Istanbul 和
              Dubai——公共交通不足，使私人汽车拥有从可选升级变成功能性必需。拉美电商快速增长，让高价值数字交易正常化，也降低线上购车摩擦。正规融资缺口——拉美渗透率 5%，美国为
              90%+——或许是最耐久的结构性驱动：Kavak
              可以面向被锁定的受众提供贷款，在缺少替代方案的情况下获得可解释利率，同时承保首次信用借款人，把金融忠诚度锚定在车辆生命周期内。非正式市场的信任赤字也在制造认证平台的价格溢价；点对点交易中超过 40%
              涉及欺诈或产权异常，品牌资产复利后，这一溢价会随时间扩大。


              采用约束同样实质，必须与上述驱动因素一起权衡。整备中心模式要求每个市场前期资本开支约 USD 50 million 或以上，限制 Kavak 进入新地区并达到盈亏平衡的速度。2024 年初退出 Colombia
              和 Peru 说明，交易密度不足的市场撑不起整备枢纽固定成本结构。Mexico 和 Brazil 基准利率高，挤压汽车贷款利差并抬高违约风险。Argentina 反复货币贬值和比索复杂性，构成不同于 Kavak
              其他市场的特殊运营风险。一些市场细分仍存在数字信任赤字，需要实体检测触点；因此 Kavak 若没有大规模实体基础设施网络，很难作为纯电商平台运营。
