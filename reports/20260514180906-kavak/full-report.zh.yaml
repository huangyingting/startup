      - number: '7.4'
        title: 运营、执行与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Kavak 的执行风险已有记录：公司在哥伦比亚和秘鲁投入资本后，分别于 2022 年和 2024 年退出，且未披露投资回收价值。哥伦比亚退出发生在 2022 年更大范围重组之后，重组包括员工数从约 8,800
              人减至 4,300 人，降幅 50%。人员减半带来双重运营风险：留下的团队要用更少资源交付盈利，离职员工带走的组织知识也未必能恢复。库存风险是被低估的二阶风险：Kavak 按 AI
              生成价格收购二手车，整备后再上架；如果出现阿根廷、土耳其式剧烈宏观贬值，库存账面价值可能高于可实现售价，迫使公司减记。Kavak 墨西哥整备网点每月处理约 3,500
              辆车；该设施一旦中断，会直接损害墨西哥库存供给。来自数字分类广告（OLX、Mercado Libre）和个人对个人平台的竞争风险持续存在，不过「autos chocolate」动态较特殊：García
              Ottati 认为，美国关税压缩墨西哥新车供给，会把消费者推向二手车，从而利好 Kavak。运营和人员风险登记表（TR002、TR004）列出了具体失败模式、概率 - 严重性映射，以及每项未解证据缺口。
