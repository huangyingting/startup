      - number: '6.3'
        title: 客户采用证据与牵引力
        blocks:
          - type: paragraph
            body: >-
              Kavak 的客户牵引力证据更偏方向性，而非精确量化。公司称已在所有市场服务「数十万」客户，但没有按期间或地域披露经审计交易量。最强的规模代理指标是墨西哥市场份额：估计 Kavak 占墨西哥每年 5
              million 笔二手车交易的约 1%，意味着其旗舰市场每年约 50,000 笔交易。阿根廷 2025 年第一季度数据显示，二手车市场总交易量达到 620,000 笔（同比 +30%），Kavak
              自身销售的融资附着率升至约 50%（高于 2024 年 6 月的 20–25%），说明二级市场出现了有意义的量增。供给侧，公司每月通过墨西哥整备设施处理约 3,500 辆车。Kavak Crédito
              申请人预批率约 70%，意味着承保姿态有意更包容。公司没有公开披露具名个人客户案例；阿根廷媒体报道（Infobae，2024 年 12 月和 2025 年 6
              月）引用的是平台采用指标和经过筛选的用户情绪。这些采用信号由公司筛选或合作方归因，而不是独立审计；对需要可验证单位经济的投资者来说，这是关键尽调限制。非正式市场转正规化仍是最强需求顺风：即便只让墨西哥每年 5M
              笔交易中的 2% 转为正规，也会让 Kavak 估计交易量翻倍。
