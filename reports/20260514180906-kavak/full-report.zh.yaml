      - number: '6.2'
        title: 获客与市场进入打法
        blocks:
          - type: paragraph
            body: >-
              Kavak 采取数字优先的大众市场获客策略，以体育赞助和效果营销为支点。核心渠道包括 kavak.com 平台、移动应用和定向数字广告。高曝光体育合作强化了品牌可见度：Kavak
              赞助阿根廷足球协会（AFA）国家队球衣、墨西哥足球联合会（FMF）、CONCACAF 赛事，并在 2025 年 12 月签署 NFL 合作，瞄准墨西哥快速增长的美式橄榄球受众。在阿根廷，Kavak
              推出与美元挂钩的卖家付款机制「Dólar Kavak」——在比索持续贬值的市场里，这是强获客钩子。即时 AI
              生成价格（面向卖家和买家）降低摩擦和决策延迟，把通常持续多天的非正式议价压缩到几分钟。实体整备网点承担双重角色：后台运营设施和到店客户触点。Kavak 在墨西哥的融资附着率为 70%，而行业平均只有
              5%，说明客户获取很大程度由信贷产品驱动，而不只是车辆市场。在中东集群（阿联酋、沙特阿拉伯、阿曼），Kavak 起步时有 500 名员工和 500 辆库存，沿用数字优先打法，并按 GCC
              市场偏好调整。体育品牌投入和金融科技产品结合后形成飞轮：通过 Kavak Crédito 融资的客户会在贷款期内留在平台，形成初次交易之外的服务关系。
