      - number: '2.3'
        title: 买方、用户和付款方分层及采用路径
        blocks:
          - type: paragraph
            body: >-
              Kavak 客户基础由两类主要买家支撑。首车买家——从未拥有过汽车的个人——约占 Kavak 客户组合 40%。这些买家通常需要自营融资，其中约 40%
              没有既往信用记录；他们主要通过数字渠道发现车辆，动机是从不足的公共交通转向个人汽车拥有。首车买家的采用路径从数字搜索开始，经过价格保证，到 Kavak Crédito
              融资申请，再到车辆交付，全程没有强制线下经销商摩擦。第二大客群是升级买家，即已有车辆、准备换更新或更大车型的买家。升级买家约占 Kavak 交易量 35%，融资需求较低但并非无关紧要，常用通过 Kavak
              卖家渠道出售现有车辆所得的置换资金，部分支付新车款。


              卖家——出售车辆的个人——构成 Kavak 必须与买家同时获取的供给侧输入，用来维持库存深度。Kavak AI
              定价算法给出不可议价的即时现金报价，竞争对象是分类广告挂牌的不确定性，以及个人点对点出售的时间成本。车队和商业买家占 Kavak 交易量不到 5%；商业模式主要面向消费者。超过 95%
              案例中，预算所有权在个人消费者家庭手中。Kavak Crédito 在 Mexico 约 40% 申请者没有既往信用记录，说明 Kavak
              正在规模化承保首次信用买家，建立征信足迹和多年客户关系，把初始车辆交易之后的客户终身价值继续复利。
