      - number: '7.2'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >-
              墨西哥约占 Kavak 业务活动的 60%，因此墨西哥监管变化是最高优先级风险向量。Kuna Capital 是 Kavak Crédito 背后的 FinTech 放贷实体，受墨西哥 Ley
              Fintech（金融科技机构法）和 CNBV 监管。公开记录中没有执法行动或牌照暂停，但信贷账簿规模和 NPL 率均未披露，外部无法独立核验监管合规指标。2022 年「autos
              chocolate」规则自由化——允许美国进口车辆以折扣价格在墨西哥登记——持续威胁 Kavak 库存定价。墨西哥 LFPDPPP（联邦个人数据保护法）适用于 Kavak 大量收集的客户
              PII（信贷申请、身份证件、收入核验）；公司尚未披露第三方数据隐私审计。在阿根廷，Banco Central de la República Argentina（BCRA）资本管制限制资金汇回，使「Dólar
              Kavak」机制下的美元 - 比索资金流更复杂。在土耳其，2022 年超过 78.6% 的结构性通胀，以及到 2025 年仍持续的货币不稳定，构成实质不利经营环境；Kavak
              土耳其实体（kavak.com/tr）暴露于里拉贬值风险，且未披露对冲安排。监管风险登记表（TR001）映射这些司法辖区级义务、估计严重性，以及未解决事项对应的尽调路径。
