      - number: '4.6'
        title: 财务结论：收入质量、利润率路径、资本强度和尽调阻塞项
        blocks:
          - type: paragraph
            body: >-
              收入质量不确定。车辆销售收入可从单位量和市场定价中看到方向，但单车毛利未披露。来自 Kuna Capital 利息收入的金融服务收入，可能是质量更高、可持续的利润率来源；但未偿贷款账簿、NPL
              率和债务成本全部私有。Mexico 70% 融资附加率强烈显示收入正向金融服务多元化，但利差质量取决于 NPL 表现——尤其关键的是，Kavak 称 ~40% 借款人没有既往信用记录。利润率路径未验证。CEO
              声称部分市场 EBITDA 盈利，但这是公司说法，没有独立审计或投资者声明佐证。2025 年底全面盈利是目标，不是已确认事实。资本强度非常高。整备模式要求每个市场都建设 CAPEX 密集的实体基础设施；这导致
              Colombia 和 Peru 退出，也限制国际扩张速度。可比上市公司 Carvana 在 2022 年濒临破产重组后，才实现可持续 GPU；Kavak
              面临相同结构性风险，却没有公开指标可追踪。尽调阻塞项：（1）任何时期都没有审计财务。（2）未披露收入、GMV 或 EBITDA。（3）没有 Kuna Capital 贷款账簿质量数据（NPL
              率、加权平均利率、债务成本）。（4）没有单位经济性（GPU、单车整备成本、CAC）。（5）CEO 盈利说法未验证。任何仅基于公开披露信息的承销决定，都会带有很高财务不确定性。AUTO1 Group EBITDA
              盈利（记录在其投资者关系网站）提供了最接近的外部概念验证，证明该模式可行，但拉美语境存在实质差异。
