      - - 单车毛利率（GPU）
        - 决定当前销量下车辆销售是否盈利；核心单位经济
        - 据 SEC 10-K，Carvana 重组后可比 GPU 约 $3,000–$4,000；Kavak 在拉美可能不同
        - 要求提供销售成本拆分：单车采购、整备、物流、质保
        - 关键
      - - Kuna Capital 贷款账簿（未偿余额）
        - 建模利息收入、资本要求和信用风险集中度必须用到
        - 累计放款约 $1B；未偿余额更低（还款 / 提前还款）；粗略估计 $400M–$1.1B
        - 要求提供贷款明细汇总：未偿余额、平均贷款账龄、产品组合、市场拆分
        - 关键
      - - Kuna Capital NPL 率
        - 决定拨备是否充足、监管风险和真实净息差；约 40% 借款人为信用薄档
        - 无；没有可比拉美二手车金融科技公司公开 NPL 数据
        - 要求提供 NPL 数据：30/60/90 DPD 比率；历史核销；拨备方法
        - 关键
      - - 按市场披露 EBITDA 或经营利润
        - 验证 CEO 盈利说法、评估经营杠杆必须用到
        - 无；CEO 称“部分市场盈利”，但未说明哪些市场
        - 要求提供按市场 P&L；至少确认哪些市场 EBITDA 为正以及持续多久
        - 关键
      - - 在手现金和当前烧钱速度
        - 评估现金跑道和融资依赖必须用到；没有该数据无法建模资本充足性
        - 无；最后披露数字为 2022 年 Q1 峰值烧钱 $86M / 季度
        - 要求提供经审计资产负债表中的现金头寸，以及最近 4 个季度现金流量表
        - 关键
      - - 车辆采购成本和 AI 定价价差
        - 买入价（AI 报价）与卖出价（标价）的价差决定整备前毛利
        - 无；不可议价定价模型不透明
        - 要求按车辆类别提供平均采购价、平均售价和毛价差
        - 高
      - - Kuna Capital 债务成本（Goldman/HSBC 额度）
        - 决定扣除借款成本后的净息差；评估 fintech 盈利能力的关键
        - Goldman/HSBC 面向拉美金融科技公司的高级担保额度通常为 SOFR + 3–6%；粗略估计
        - 要求提供信贷额度条款清单：利率、契约、到期日、已提款余额
        - 高
      - - 退出 Colombia 和 Peru 的财务成本
        - 退出损失影响累计 P&L，也提示当前市场未来类似退出的风险
        - 无；未披露资产减记或退出成本
        - 要求披露市场退出的财务影响（核销、遣散、租约终止、库存清算）
        - 中
      - - 整备产能利用率
        - 整备枢纽固定 CAPEX 高，必须有高利用率才划算
        - 墨西哥州：3,500 辆 / 月产能；实际利用率未披露
        - 要求按枢纽披露产能利用率；每个枢纽销量；当前利用率下单车成本
        - 高
