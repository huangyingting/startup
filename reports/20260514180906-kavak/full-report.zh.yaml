  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件与客户流程
        blocks:
          - type: paragraph
            body: >-
              Kavak 把自己定位为全栈汽车平台，目标是替代碎片化、欺诈高发的非正式二手车市场。产品套件覆盖四类客户任务：卖车、买车、购车融资和售后服务。每个任务都由 Kavak
              端到端承接，不把客户转交给第三方；公司称，这正是它相对 OLX Autos、Mercado Libre 等分类广告平台的结构性护城河。


              卖车流程从线上报价开始，报价由 AI 定价算法驱动。卖家把车开到 Kavak 网点，平台在大约 30 分钟内完成 240 项实车检测。Kavak 随后给出不可议价的最终报价；卖家接受后，80% 款项会在 24
              小时内到账，余款在法定车权核验后支付，通常为五个工作日内。在阿根廷，Kavak 还提供 30 天寄售选项：无论车辆是否售出，Kavak 都保证全额付款。截至 2024 年底，该模式贡献了阿根廷销售额的 23%。


              买车端，Kavak 在网页平台和移动 App 上展示已检测、已整备车辆目录。每条车源都包含 360 度照片、完整检测报告和透明定价。买家可以通过 Kavak Credito
              直接融资，也可以到线下网点试驾。在阿根廷，7 天无理由退车窗口降低了购买焦虑。墨西哥对已售车辆另设机械质保期。Kavak 称平台支持 100%
              数字化购车、无需任何线下到访；不过，线下网点和整备中心仍是质量保障基础设施的核心，也是买家信任的底座。
