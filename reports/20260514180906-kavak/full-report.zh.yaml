      - number: '5.5'
        title: 多市场部署与地域产品覆盖
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年，Kavak 在六个活跃市场运营平台：墨西哥、巴西、阿根廷、智利、土耳其（使用 Carvak 品牌），以及由阿联酋、阿曼和沙特阿拉伯组成的 UAE
              集群。每个市场部署都需要最低可行的整备网络和本地化数据训练来支持定价算法，由此形成显著的资本和时间进入壁垒。


              墨西哥仍是旗舰市场，运营历史最长（始于 2016 年）、整备中心最大，产品也最成熟，包括 Kavak Credito。巴西是第二大部署，资本承诺为 $500
              million，并拥有该大陆最大的单体整备设施。阿根廷、智利和土耳其线下足迹更有限，但具备完整数字平台功能。土耳其 Carvak 品牌于 2021 年上线，使用本地化土耳其语界面。UAE 集群在 2025 年 4
              月扩展至阿曼和沙特阿拉伯，提供阿拉伯语 / 英语双语体验，也是 Kavak 首次进入非新兴市场，瞄准海湾高收入消费者。


              秘鲁和哥伦比亚曾经试水，但随后退出——秘鲁在 2024 年退出，哥伦比亚在 2025 年 1
              月退出。这些退出说明多市场模式资本密集：每次上线都要先投入整备基础设施、本地监管合规和市场专属数据训练，之后才可能达到足以支撑继续投资的单位经济。智利平台运营一年后获得专门 $40 million
              投资承诺，表明初步市场验证后，公司会按数据决定再投入。据 Contxto 报道，智利业务第一年表现超过最初预期。
