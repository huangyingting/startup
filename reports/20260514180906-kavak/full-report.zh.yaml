  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入和排除支出、现状替代方案
        blocks:
          - type: paragraph
            body: >-
              Kavak 在六个国家的消费者二手车交易市场运营：Mexico、Brazil、Argentina、Chile、Turkey 和 UAE 集群。可触达市场定义为：符合 Kavak
              按车龄、里程和车况设定的车辆接受标准，且 Kavak 愿意融资或转售的各价格带二手车消费者购买。新车销售、重型商用车队车辆，以及约 USD 80,000
              以上的超豪华车辆被明确排除在市场边界之外。纯非正式现金点对点交易——没有数字平台参与、产权转移也未登记——即便构成拉美总单位量最大部分，也不计入可服务市场。


              主导性的现状替代方案因市场而异，但包括分类广告平台，例如 Mexico 的 Mercado Libre、OLX Autos 和 Seminuevos；Brazil 的 Webmotors 和 OLX
              Autos；Argentina 的 ZonaCar 和 MercadoLibre；Turkey 的 Arabam.com 和 Sahibinden；以及 UAE 的
              Dubicars。传统品牌经销商和独立经销商在所有市场仍是现状替代方案，尤其面向需要试驾或在销售点获得置换抵扣的买家。没有数字中介安排的个人点对点交易，是拉美按单位量计算最大的单一类别，约占全部交易
              90%。相邻市场机会——汽车保险、延保、汽车零部件以及第三方购买的车辆融资——尚未成为 Kavak 核心收入，但中期存在扩张邻接空间。精确定义边界很重要，因为 90%
              非正式份额既是最大竞争者板块，也是最主要的市场教育机会：每一笔从非正式交易转化为认证平台交易，都是 Kavak 的单位增量，并强化投资逻辑背后的广义正规化命题。
