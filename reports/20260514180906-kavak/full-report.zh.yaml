  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险分类与概览
        blocks:
          - type: paragraph
            body: >-
              Kavak 的风险图谱包含五类相互嵌套的风险，投资者必须合并权衡。财务和资本风险最紧迫：公司 2025 年 4 月以 $2.2B 估值融资 $127M，较 2021 年 9 月 $8.7B 峰值下跌
              75%，同时背负约 $1.2B 总债务，且公司层面仍未盈利。监管和法律风险结构性偏高，因为 Kavak 的 FinTech 放贷业务（Kuna Capital/Kavak Crédito）在墨西哥受 CNBV
              监管，并在阿根廷、土耳其、智利和海湾国家面临类似监管框架。运营风险已有证据：公司分别在 2022 年和 2024 年退出哥伦比亚和秘鲁，员工数从约 8,800 人减半至 4,300 人，并在 2022
              年出现有记录的客户服务失败。竞争和宏观风险来自墨西哥 85–90% 现金交易的非正式二手车市场、数字分类广告竞争者进入，以及「autos
              chocolate」进口自由化造成的结构性扭曲。技术和人员风险集中在单一创始人 CEO、未披露安全状态，以及对自研 AI 定价模型的依赖。风险热力图（FR001）按严重性与发生概率映射这五类风险，其中信用 /
              NPL 风险和货币贬值风险落在最关键象限。
