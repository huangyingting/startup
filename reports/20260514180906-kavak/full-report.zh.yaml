              - CP016
              - CP017
          - type: callout
            title: Carvana 濒临破产和 Kavak 自身市场退出验证了资本强度风险
            body: >-
              Carvana 2022 年濒临破产说明，即便是成熟美国市场的认证二手车平台，也高度易受利率上升和库存周期管理失误影响。Kavak 退出 Colombia 和 Peru
              进一步确认，达到最低可行规模并不容易。这些都是具体反向先例，应锚定对 Kuna Capital 资金成本和整备中心利用率的尽调。
            calloutType: risk
            claimRefs:
              - CP029
              - CP030
              - CP031
              - CP032
          - type: callout
            title: AutoHero（AUTO1 Group）欧盟盈利是最好的外部模式验证数据点
            body: >-
              AUTO1 Group 运营认证数字二手车市场，并在 2023-2024 年达到调整后 EBITDA 盈利，这是该模式可达到运营可行性的最清晰公开证明。它与 Kavak
              的关键结构差异在于没有自营消费融资；Kavak 的融资集成应带来更高单车收入，但也带来更高信用风险集中度。
            calloutType: insight
            claimRefs:
              - CP033
              - CP034
              - CP035
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源、定价模式和收入组合
        blocks:
          - type: paragraph
            body: >-
              Kavak 的主要收入来源是二手车销售。公司直接向消费者买车，经自有 240 点检测中心整备后加价转售。单车精确毛利未公开披露；可比上市公司 Carvana 在 2023–2024 年重组后报告
              GPU（单车毛利）约 $3,000–$4,000，披露见可通过 SEC EDGAR 访问的 Carvana SEC 10-K 文件。根据 Kavak 自身披露，Mexico 是最大市场，约占总业务
              60%；Brazil 次之，之后是 Argentina、Chile、Turkey 和 UAE 集群。第二项收入来源是通过 Kuna Capital 提供金融服务（2025 年 11 月更名为 Kavak
              Crédito）。Mexico 约 70% 销售包含自营融资，年利率 14–20%。Kuna Capital 自成立以来累计发放约 $1 billion
              贷款。利息收入和贷款组合潜在证券化构成有意义收入，但未偿贷款余额、NPL
              率和利差均未公开披露。第三项较小收入来源是向第三方卖家收取车辆检测和认证费，这项面向消费者的检测服务曾见于阿根廷媒体报道。车辆交易收入可能在销售时点确认，利息收入可能按权责发生制确认，但公司未披露经审计的收入确认政策。车辆销售和金融服务之间的收入组合没有公开拆分。
