      - number: '3.3'
        title: 能力、定价、GTM、信任和监管对比
        blocks:
          - type: paragraph
            body: >-
              能力上，Kavak 通过 240 点检测标准拉开差异，高于 Carvana 约 150 点认证，也远高于分类广告平台近乎零点标准。Kavak 提供 3 个月 / 3,000 km 质保和 7 天 / 300 km
              退货保证，这些能力在分类广告和非正式替代方案中不存在。融资上，Kavak 通过 Kuna Capital 提供自营信贷，声称融资附加率为 70%，而拉美正规渠道行业平均约
              5%。融资集成是重大差异点：分类广告平台和传统经销商依赖第三方银行融资，批准率更低、流程更慢。定价上，Kavak 使用 AI 驱动的不可议价价格，降低逆向选择并加速购买漏斗。Carvana
              也使用算法定价，但仅在美国市场。GTM / 分销上，Kavak 运营实体整备枢纽，将其作为库存获取的锚定资产，并通过数字渠道和实体展厅分销。信任和监管姿态上，Kavak 通过 Kuna Capital 持有
              Mexico 金融服务牌照，可直接放贷，而分类广告竞争者没有放贷牌照要求。这构成了有意义的监管复制壁垒。
