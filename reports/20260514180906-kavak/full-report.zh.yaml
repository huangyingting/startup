      - number: '1.2'
        title: 创始人、领导层和组织背景
        blocks:
          - type: paragraph
            body: >-
              Kavak 由 Carlos García Ottati（CEO）、其姐姐 Loreanne García Ottati 和 Roger Laughlin Carvallo 共同创立，三人都曾在 Linio
              Marketplace 任职。Carlos 拥有 Oxford MBA，此前在 McKinsey 工作；Loreanne 拥有 Universidad Simón Bolívar 工程学位和 Stanford
              MBA，此前任职于 Coca-Cola FEMSA；Roger 曾运营 Groupon Brazil 和 Linio Mexico。公司在 2016 年 10 月凌晨 3
              点完成第一笔车辆销售，当时平台上大约只有七辆车。


              2021–2022 年高增长阶段激进扩员后，Kavak 员工数峰值约 8,800 人。重组计划将员工数裁减约 50%，降至约 4,300 人。公司对 CEO Carlos García Ottati
              的关键人物依赖仍然显著：他是六个市场的主要公开发言人、融资人和战略决策者。Carlos 和 Loreanne 继续担任运营角色，创始家族仍保有实质影响力。更广泛的领导团队分布在墨西哥城总部以及 São
              Paulo、Buenos Aires、Santiago、Istanbul 和 Dubai 等区域枢纽。
