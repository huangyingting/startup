      - number: '6.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: 70% 融资附着率是结构性客户留存护城河
            body: >-
              Kavak 在墨西哥的融资附着率为 70%，而行业平均只有 5%，这是最强的公开可验证客户牵引力信号。通过 Kavak Crédito 融资的买家会在贷款期内继续作为平台活跃客户（通常为 24–60
              个月），由此产生服务关系，并通过 permuta 触发复购。阿根廷附着率增长（20–25% → 2025 年约 50%）说明该模式可在二级市场复制。
