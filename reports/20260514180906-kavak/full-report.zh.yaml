        - 分类信息转交易模式利润率压力的警示案例
        - 不再独立；没有可直接对比的当前估值
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
      - CV026
      - CV027
    notes: >-
      Carvana 和 CarMax 财务来自 SEC 文件和公开披露。AUTO1 Group 来自法兰克福证券交易所文件。Cars24 和 Spinny 来自新闻稿和分析师报告。OLX Autos 来自覆盖 2022–2023
      年关闭过程的公开新闻来源。
  - id: TV005
    title: 投资逻辑破裂与否决触发项
    enumeration: false
    columns:
      - 触发项
      - 阈值或事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 盈利目标落空
        - 到 2026 年 Q2 仍未 EBITDA 盈亏平衡（相对 2025 年底目标留出 6 个月缓冲）
        - 拉长现金消耗；提高债务契约风险；削弱 IPO 可选性
        - 重评为「回避」；要求新的二级折价或退出
      - - Kuna Capital NPL 飙升
        - 披露或推断 NPL 率高于 8%，且准备金不足
        - 侵蚀金融科技收入；触发贷款人契约；抬高稀释风险
        - 立即下调为「回避」；寻求结构化回收条款
      - - 被迫追加降估值轮
        - 有外部投资人参与的新股权融资低于 $2.0B
        - 确认公开市场估值低于当前账面标记；触发稀释
        - 只有稀释后价格反映真实底部时，才重新评估入场
      - - CNBV 监管行动
        - 暂停 Kuna Capital 牌照或采取执法行动
        - 抹去 70% 融资附着收入；对单车经济性是灾难性打击
        - 立即退出或对冲；投资逻辑依赖金融科技变现
      - - CEO 离任
        - Garcia Ottati 卸任且未披露指定继任者
        - 关键人风险；创始人主导文化；没有在案继任计划
        - 暂停投资逻辑；评估继任者质量和剩余投资人信心
      - - 墨西哥市场份额流失
        - 数字竞争对手拿走 10 个百分点 GMV 份额
        - 定价权被侵蚀；整备枢纽利用率跌破盈亏平衡
        - 下调为「回避」；乐观和基准情景都假设市场领导地位
    notes: 触发阈值只是指示性估计；投资人应根据具体交易的风险容忍度设定自己的监测标准。
  - id: TV006
    title: 最终尽调追问
    enumeration: false
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - 经审计财务报表
        - 2016 年以来任何财年都没有经审计的年度账目
        - IPO 需要；也用于核验收入、EBITDA 和债务契约
        - 向管理层索取；与 CFO 公开披露交叉核对
      - - Kuna Capital 信贷指标
        - NPL 率、资产组合账龄、准备金覆盖率均未披露
        - 信贷账本是最大价值驱动项，也是最大隐藏风险
        - 第三方审阅贷款明细；查看贷款方契约披露
      - - 分市场单位经济
        - 未披露按市场拆分的 GPU、抽成率或贡献利润率
        - Mexico（约 60%）盈利状况不同于 LatAm 与 MENA 合计
        - 管理层资料室；对标 Carvana 每车 $6-7K 的 GPU
      - - 优先股堆叠和期权池
        - 未公开股权结构表或优先权条款
        - 多层悬顶压力可能在低于票面估值的退出中抹掉普通股
        - 获取股权结构表；按 $2.2B、$1.5B、$800M 退出估值建清算瀑布模型
      - - 债务契约细节
        - Goldman Sachs 和 HSBC $200M 信贷额度条款未公开
        - 契约违约可能触发加速到期；需要评估缓冲空间
        - 资料室期间通过法律顾问索取条款清单或债务契约
      - - IPO 招股书时间表
        - 未见任何交易所记录中的 S-1 或本地招股书申报
        - 公司所称 3-5 年窗口缺乏具体性；BIVA 或 NYSE 准备度不清楚
        - 跟踪监管申报；监测 BIVA 和 SEC EDGAR 的草稿申报
    notes: 尽调追问按优先级排序。第 1-3 项（经审计财务报表、NPL 指标、单位经济）会卡住任何新的股权投入。
