      - number: '8.4'
        title: 乐观、基准与悲观情景及估值区间
        blocks:
          - type: paragraph
            body: >-
              三种情景概括了未来三到五年 Kavak 股权结果分布，并与 CEO 所称 IPO 准备窗口一致。乐观情景假设 Kavak 到 2025 年底实现公司层面 EBITDA 盈利（符合既定目标），墨西哥 GMV
              保持双位数增长，Kuna Capital 信贷账簿以低于 5% 的 NPL 率成功变现，并在 2027-2028 年窗口以 2-3x EV/Revenue 完成 IPO 或战略出售，对应 $3.5-6B
              股权估值区间。该情景要求 NPL 不出现实质飙升、墨西哥市场份额继续增长，并且全球对 EM 增长股权的风险偏好恢复。基准情景假设 EBITDA 到 2026
              年中达到盈亏平衡（较目标推迟六个月），墨西哥主导地位保持但受到竞争者带来的利润率压力，并在 2028-2029 年以约 1.5x EV/Revenue IPO，对应 $1.8-3.0B 估值区间，大致与 2025
              年 4 月标记一致。悲观情景假设到 2026 年仍未实现 EBITDA 盈亏平衡，Kuna Capital NPL 率飙升至 8-10% 以上，触发贷款方 covenants，需要以低于 $1.5B
              估值再次进行股权 down round，且 Mercado Libre 或 OLX 带来的竞争强度侵蚀墨西哥定价权。在该情景下，追加稀释后股权价值可能为 $600M-$1.4B。跨情景概率加权预期估值约为
              $2.1-2.5B，说明当前 $2.2B 标记合理，但下行风险不对称——悲观结果毁掉的股权显著多于乐观结果创造的股权。关键下行触发器包括墨西哥宏观衰退、CNBV 对 Kuna Capital
              采取执法行动，或「autos chocolate」进口竞争推动二手车价格通缩。估值区间图映射了三种情景的低 - 基准 - 高边界。
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
          - type: table
            tableRef: TV003
            claimRefs: []
          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.5'
        title: 退出准备度、投资逻辑失效触发器与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              Kavak 若要在所称 3 到 5 年窗口内公开上市或战略出售，必须先解决几项结构性条件。第一，公司必须至少连续两年发布经审计财务报表——这是在墨西哥 BMV / BIVA、美国 NYSE / NASDAQ
              或新兴市场交易所进行可信公开发行的最低门槛。截至 2026 年 5 月，公司没有公开披露经审计年报。第二，Kuna Capital 信贷账簿必须给出让机构固定收益投资者满意的 NPL
              率和拨备覆盖率；缺少这项数据是最卡脖子的信息缺口。第三，公司横跨墨西哥、阿根廷、巴西、土耳其、UAE、沙特阿拉伯和阿曼的多市场运营复杂性必须被简化，公共市场投资者才能读懂合并财务。第四，约 $1.2B
              债务栈必须再融资或压降，才能支撑干净的 IPO 股权故事。投资逻辑失效触发器表列出了会推翻投资判断的具体事件。最关键的是错过 2025 年底盈利目标，同时再次出现仅内部投资者参与的 down
              round；这将表明私募市场价格发现机制已彻底失灵。第二个触发器是 CNBV 对 Kuna Capital 采取监管行动，这会同时损害金融科技收入流，并抬高监管合规成本。战略出售路径存在——潜在收购方包括汽车
              OEM、全球金融服务平台或 EM 出行平台——但在 $2.2B 价格下，如果没有相对内部标记的实质折扣，产业买家大概率不会支付。最终尽调问题列出了任何潜在投资者开展严肃尽调时最关键的六项信息请求。
            claimRefs:
              - CV039
              - CV040
              - CV041
              - CV042
              - CV043
              - CV044
              - CV045
