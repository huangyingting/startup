      - number: '4.5'
        title: 资本充足性和融资依赖
        blocks:
          - type: paragraph
            body: >-
              Kavak 的资本轨迹以大额股权融资和随后显著下调估值轮为标志。2025 年 4 月内部人轮由 SoftBank 和 General Atlantic 领投，以 $2.2B 估值融资
              $127M；领投方仍是同一批既有投资者，说明当前条款缺少新的外部验证。同一时期，Goldman Sachs 向 Kuna Capital 提供 $200M 授信额度，HSBC 另提供 $200M
              授信额度，合计新增 $400M 债务能力用于贷款发放。更早在 2022 年 9 月，Kavak 从 HSBC、Goldman Sachs 和 Santander 获得 $810M
              债务融资，用于车辆库存和放贷运营。季度现金消耗峰值在 2022 年 Q1 达到 $86M；之后重组裁员 ~50% 并退出 Colombia 和 Peru，显著降低烧钱轨迹。公司公开表示目标是在 2025
              年底前盈利，并声称部分市场已经 EBITDA 为正；两项说法都没有独立验证。在手现金、当前月度烧钱和剩余现金跑道月数均未披露。下一轮触发因素似乎是 IPO（CEO 表述为 3–5 年周期），或在贷款账簿扩张时为
              Kuna Capital 进一步举债。融资依赖很高：如果没有 Goldman / HSBC 授信额度，Kuna Capital
              无法按当前规模发放贷款。历史融资轮时间线详见公司概况章节；资本充足性所需的关键财务事实在此独立列示。General Atlantic 和 SoftBank 是在下调估值轮后仍保持敞口的主要投资者。
