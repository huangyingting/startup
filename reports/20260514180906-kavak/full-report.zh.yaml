      - number: '5.4'
        title: Kavak Credito 与金融产品架构
        blocks:
          - type: paragraph
            body: >-
              Kavak 进入金融服务，是公司成立以来最重要的产品演进。金融业务最初以 Kavak Capital 形式出现——这是一个内部工具，为无法获得传统银行信贷的买家提供自有融资。随后，该业务被正式化为专门实体
              Kuna Capital，并扩展为面向消费者的 Kavak Credito 平台，于 2025 年 11 月上线。

               Kavak Credito 在墨西哥上线时有两款初始产品。第一款 Meses（分期）是购车贷款，月供从 MXN $2,499 起，强制首付 15%，期限最长 72 个月，年利率从 14.99% 起。公司目标是预批 10 名申请人中的 7 名，且全流程在线完成，无需到访实体网点。第二款 Prestamo（贷款）允许现有车主释放最高 60% 的车辆评估价值为现金，最长 60 个月偿还，起始年利率为 21.99%。

               战略逻辑直接指向拉美的结构性融资缺口。Kavak CEO 曾称，美国每 10 人中有 7 人能获得汽车信贷，而拉美只有 2 人。墨西哥传统银行汽车贷款组合在 2025 年第三季度末达到 MXN 269.9 billion，不良贷款率为 1.1%，为 Kavak 入场提供了健康背景。Kuna Capital 自成立以来累计发放贷款约 $1 billion，融资覆盖了 Kavak 墨西哥销售额约 70%。2025 年 4 月，Goldman Sachs 和 HSBC 分别向 Kuna Capital 提供 $200 million 信贷额度，为 Kavak Credito 规模化推出提供了债务资金能力。

               关键未解尽调问题包括：Kavak Credito 的实际批准率（相对 7/10 目标）、不良贷款率、Kuna Capital 在 CNBV 框架下的监管分类（SOFOM 或银行牌照），以及 Kavak Credito 产品是否已进入墨西哥以外市场。
