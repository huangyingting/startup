chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部和运营模式
        blocks:
          - type: paragraph
            body: >-
              Kavak 于 2016 年 10 月在墨西哥城注册成立，法律实体为 Uvi Tech, S.A.P.I. de C.V.，注册地址为 Carretera Amomolulco - Capulhuac, No.
              1 Col. El Panteón, Lerma de Villada, Estado de México。公司作为垂直整合的二手车市场运营：直接向消费者买车，经自有检测中心整备后转售，并提供可选自营融资。截至
              2026 年，Kavak 是一家后期私营公司，目标是在所有市场盈利，并在三到五年内 IPO。


              核心产品围绕三个结构性差异化点搭建。第一，Kavak 每辆上架车辆都先完成 240 点检测；拉美约 90% 二手车交易发生在非正式点对点市场，欺诈和质量不确定性普遍存在，这一步直接消除了这类风险。第二，Kavak
              自研 AI 定价算法利用公开汽车数据和内部交易历史生成不可议价报价，降低谈判摩擦。第三，集成金融臂 Kuna Capital 于 2025 年 11 月扩展为 Kavak Crédito，在墨西哥约 70%
              销售中提供自营融资，而区域行业平均仅约 5%。三者叠加，形成全栈模式；既有玩家若没有匹配资本和运营基础设施，很难复制。


              Kavak 总部和主要运营在 Mexico，约占总业务 60%。公司位于墨西哥州的墨西哥整备中心每月可处理 3,500 辆车。Brazil 在 São Paulo 承载拉美最大整备中心，由 $500
              million 投资支持。截至 2026 年，Kavak 的六个活跃市场是 Mexico、Brazil、Argentina、Chile、Turkey（以 Carvak 品牌运营）以及 UAE 集群（Oman 和
              Saudi Arabia）。
