      - number: '7.3'
        title: 财务、资本与信用风险
        blocks:
          - type: paragraph
            body: >-
              Kavak 合并债务约为 $1.2B，包括截至 2022 年通过融资工具筹集的估计 $810M，以及 2025 年 Goldman Sachs / HSBC 信贷包提供的约 $400M。截至 2025 年 4
              月，公司层面尚未实现 EBITDA 盈利，并公开把 2025 年底定为达成该里程碑的目标。如果未能达成，贷款方 covenant 审查和股权融资压力会加速。Kuna Capital
              放贷账簿中的信用风险是一项独立嵌入风险：贷款发放给无既往信用记录的借款人，这类申请人约占申请量 40%；公司既未披露 NPL 率，也未披露减记准备。货币贬值会同时通过三条渠道传导：（1）阿根廷比索贬值推高美元挂钩
              Dólar Kavak 付款成本；（2）土耳其里拉贬值侵蚀土耳其网点经济性；（3）美国 Federal Reserve 高利率压低全球 VC 风险偏好，并提高 Kavak 的美元计价借款成本。2025 年 4
              月仅内部投资者参与的 down round——没有新外部投资者入场——表明机构市场对 Kavak 股权的风险偏好已明显收窄。风险传导图（FR002）追踪拉美货币贬值如何级联为 NPL
              上升、库存价值下降、股权融资可得性降低，最终推高资不抵债风险。合作伙伴 / 依赖风险登记表（TR003）记录了这一关键资本节点上的贷款方和股权投资者集中度。
