      - number: '2.2'
        title: 用多重视角测算 TAM/SAM/SOM
        blocks:
          - type: paragraph
            body: >-
              Kavak 的总可用市场（TAM）横跨六个国家，各国交易量和单车价格差异显著。Mexico 是本土市场，每年约 5 至 6 million 笔二手车交易，估计均价为 USD 10,000 至 12,000，对应
              TAM 约 USD 60 billion。Brazil 按单位量是最大市场，每年约 13 至 14 million 笔交易，TAM 估计为 USD 100
              billion；但缺少独立审计数据，这一估计不确定性很大。Turkey 按估计美元 TAM 是 Kavak 最大市场，每年约 7 million 笔交易且均价更高，对应估计 USD 120 billion
              TAM，并声称按交易量位列全球第三。UAE 和中东集群每年贡献约 1.9 million 笔交易，但价格约为拉美平均的三倍，尽管单位数更小，单车收入机会明显更高。Argentina 和 Chile
              是较小市场，每年交易量分别约 1 至 1.5 million 笔和 400,000 笔，TAM 约 USD 15 billion 和 USD 8 billion。


              六个市场合计 TAM 超过 USD 320 billion。不过，可服务市场（SAM）代表正规、可数字触达且位于 Kavak 运营地理范围内的交易；扣除拉美交易中约 85% 至 90% 仅非正式部分后，估计为
              USD 35 至 52 billion。拉美汽车保有密度约为每 1,000 人 150 辆，美国约为 700 辆，显示首车拥有仍有显著潜在需求空间。拉美正规融资渗透率约 5%，美国为
              90%+，进一步说明正规化和信贷渗透机会仍是结构性的。按当前运行率估算，Kavak 可获取市场（SOM）低于 USD 1 billion GMV，依据是 Mexico 约 1% 份额以及其他所有市场低于 1%
              份额；若能突破整备基础设施和信任采用障碍，后续空间仍大。
