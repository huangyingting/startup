      - number: '4.3'
        title: 成本结构、毛利驱动因素、营运资本和资本开支
        blocks:
          - type: paragraph
            body: >-
              Kavak 销货成本主要包括车辆收购成本、单车整备支出、物流和质保准备金。这些项目均未以绝对金额公开披露。行业整备成本基准因车况和市场不同而在每车 $1,000 到 $3,000 之间。Kavak
              墨西哥设施每月处理 3,500 辆车，São Paulo 有一个大型枢纽，由 Brazil $500 million 投资支持。SG&A 包括约 4,300 名员工成本（重组后从峰值 ~8,800
              人下降）、数字营销和体育赞助费。资本开支结构性偏高：每个新市场都需要整备中心、物流网络和监管牌照。Brazil 枢纽单独就需要 $500 million 承诺资本。资本强度是退出 Colombia 和 Peru
              的直接原因，当地单位量不足以支撑固定基础设施。营运资本需求显著：Kavak 通常在转售前 30–90 天为车辆库存融资。$810 million 债务融资（HSBC、Goldman
              Sachs、Santander，2022 年 9 月）主要用于车辆库存和 Kuna Capital 贷款发放。2025 年 4 月又宣布 $400 million 授信额度（$200M Goldman、$200M
              HSBC），专门用于 Kuna Capital 贷款账簿扩张。季度烧钱峰值为 2022 年 Q1 的 $86 million；重组大幅降低烧钱，但当前烧钱速度未公开披露。
