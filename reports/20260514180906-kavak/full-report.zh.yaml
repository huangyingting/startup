      - number: '5.6'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >-
              在传统二手车交易欺诈率达 40% 的市场里，信任基础设施是 Kavak 价值主张的核心。公司搭建了多层质量与合规架构，覆盖实车检测和整备流程、法定车权核验、售后质保义务、消费者保护认证和数字安全。


              在墨西哥，Kavak 持有 Profeco Distintivo Digital——这是墨西哥联邦消费者保护机构授予的认证。该认证要求企业遵守数字商务伦理准则、参加所有消费者调解听证、没有未结 Profeco
              罚款，并持有有效的网站安全证书。关键在于，Distintivo Digital 依赖自律：Profeco 没有机制持续监控合规。El Economista 2022 年报道称，Kavak
              在消费者投诉绝对数量上升的同时仍保留该认证；Tec-Check 负责人称这是伦理问题。消费者倡议批评者认为，Kavak 明知快速扩张带来服务质量问题，却继续扩张而非先巩固。


              尽管存在反向信号，Kavak 在正式 Profeco 投诉中的调解率接近 100%——Profeco 在 2023 年公开背书中称其是墨西哥最佳调解记录之一。Profeco 负责人到 Lerma
              设施现场访问并予以认可，意味着监管者和私营平台之间出现了少见的公开站队。


              售后保护因市场而异：阿根廷提供 7 天无理由退车窗口和机械质保选项；墨西哥对已售车辆提供机械质保期。kavak.com 的 Trustpilot 评价呈现分化，多条 2024
              年评价提到购后车辆质量和融资争议带来的挫败感，尤其来自阿联酋和土耳其客户。Kavak 尚未公开披露由第三方汽车工程机构对 240 项检测进行的独立认证，这是关键尽调缺口。
            claimRefs:
              - CE014
              - CE015
              - CE021
              - CE022
              - CE025
              - CE026
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与可服务市场
        blocks:
          - type: paragraph
            body: >-
              Kavak 在拉美市场服务三类主要客户。第一类是首次购车者，即此前从未拥有过车辆的人：公司披露显示，Kavak 墨西哥买家中约 40% 是人生第一次买车。第二类是无银行账户或金融服务不足的借款人：Kavak
              Crédito 申请人中约 40% 没有既往信用记录，体现了公司有意推进金融普惠。第三类是中产向上型买家，他们想在墨西哥以个人对个人为主、非正式程度很高的二手车市场之外，找到一个正规、认证过的替代方案；该市场约
              85–90% 的交易仍以现金完成且缺少记录。卖方一侧，Kavak 瞄准追求速度和透明度的私人车主——公司称卖家可通过数字平台在 30 分钟内完成交易。客户群偏 30
              岁以下：年轻城市消费者具备数字原生习惯，却长期被银行发放的汽车贷款排除在外。可服务人群规模很大：墨西哥每 10 人中只有约 1.5 人拥有汽车，而美国为 7 人，说明结构性需求远未饱和。Kavak 2023
              年数据显示，有家庭被抚养人的融资买家占比从 36% 升至 45%，表明家庭阶段中产消费者渗透正在加速。
