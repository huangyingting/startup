companyProfile:
  summary: >
    Kavak 是一家总部位于墨西哥城的二手车交易平台和金融科技平台，在拉丁美洲、Turkey 和中东买入、整备并转售二手车，同时提供自营融资。公司由 Carlos García Ottati（CEO）、Loreanne García
    Ottati 和 Roger Laughlin Carvallo 于 2016 年 10 月创立；2021 年 9 月估值达到 $8.7 billion，是拉美创办公司有史以来最高估值，随后在 2025 年 4 月估值下调 75%
    至 $2.2 billion。Kavak 的差异化模式把车辆检测、整备和自研融资整合进同一平台，服务无法获得传统汽车信贷的银行服务不足消费者。截至 2026 年，Kavak 在
    Mexico、Brazil、Argentina、Chile、Turkey、UAE、Oman 和 Saudi Arabia 运营，并已于 2024 年 1 月退出 Colombia 和 Peru。公司目标是在 2025
    年底前所有市场盈利，并在 3–5 年内 IPO。
