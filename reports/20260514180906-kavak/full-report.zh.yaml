      - 重要性
      - 最佳可用代理指标
      - 尽调路径
      - 严重程度
    rows:
      - - 年收入（总额及按市场）
        - 没有收入端数据，就无法判断业务规模、评估增长或建立估值模型
        - 销量 × 平均成交价；估计粗略区间 $700M–$1.8B（未确认）
        - 要求提供经审计损益表；至少提供过去 3 个财年的管理账
