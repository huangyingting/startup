      - number: '8.2'
        title: 融资背景、资本结构与优先权压力
        blocks:
          - type: paragraph
            body: >-
              Kavak 2025 年 4 月融资是公司历史上最有分析价值的资本事件。该轮融资 $127M、投后估值 $2.2B，结构为仅内部投资者参与，并于 2025 年 3 月完成——早于 2025 年 4 月 Trump
              关税冲击——唯一股权参与方为 SoftBank 和 General Atlantic。CEO
              明确称其为一轮「面向内部投资者的小型独家融资」，公司「对价格不太敏感」；这说明估值更可能是为了尽量降低按市值重估影响，而不是真实市场出清价格。同期，Goldman Sachs 和 HSBC 各向 Kuna
              Capital 承诺 $200M 营运资本信贷额度，结构为债务融资而非股权。这些融资与 2021 年由 HSBC、Goldman Sachs 和 Santander 提供的历史 $810M
              信贷额度合并后，估计总未偿债务约为 $1.2B。股权优先权压力很重：Kavak 估计跨所有轮次累计股权融资 $1.9B，其中包含多个系列的清算优先权。在低于 $2.2B
              的退出情景下，普通股持有人和持有期权的后期员工可能没有任何回收。CB Insights 记录显示，截至 2025 年第一季度，公司累计融资（含债务）为 $3.929B。公司所称 IPO 准备期为三到五年，意味着
              2027-2030 年流动性窗口——持有期很长，期间下行情景可能落地。资本强度仍高：整备网点、库存融资和信贷发放都需要营运资本，而现阶段经营现金流无法自给。2022 年重组（员工数从约 8,800 人减半至
              4,300 人，退出哥伦比亚和秘鲁）显示公司愿意压降烧钱，但也暴露出对宏观收紧的脆弱性。2025 年两条信贷额度——Goldman 和 HSBC 各 $200M——显示机构贷款方对 Kuna Capital
              信贷账簿有信心，但在任何回收 waterfall 中都优先于股权。
