      - number: '1.3'
        title: 融资历史、估值轨迹和投资者基础
        blocks:
          - type: paragraph
            body: >-
              Kavak 的资本轨迹是拉美创业史上最剧烈的案例之一。2016 年底 Mountain Nazca 投入的 $3 million 种子轮，当时被称为拉美创业公司有史以来最大种子轮。2021 年 4 月
              Series D（$485M，估值 $4B）和 2021 年 9 月 Series E（$700M，估值 $8.7B）让 Kavak 成为拉美创办公司中估值最高的创业公司，并坐实其品类定义者地位。$8.7B
              峰值既反映全球 ZIRP 时代风险投资泡沫，也反映市场对拉美消费科技机会的真实兴奋。


              随后的回调很重。2022 年 9 月，Kavak 从 HSBC、Goldman Sachs 和 Santander 获得 $810 million 债务融资，这是创立不满十年的拉美创业公司中最大债务融资；但到
              2022 年 Q1，公司已经在单季烧掉 $86 million，资金流向激进体育赞助合同和快速扩员。到 2025 年 4 月，Kavak 以 $2.2 billion 估值融资 $127
              million，这一内部人轮由 SoftBank 和 General Atlantic 联合领投，相比 $8.7B 峰值估值折价 75%。Goldman Sachs 和 HSBC 同时分别向 Kuna
              Capital 提供 $200 million 授信额度。累计风险股权融资约 $1.5–1.6 billion；加上 $810M 债务融资，总融资超过 $2.3 billion。


              个人投资者包括阿根廷篮球传奇 Manu Ginóbili 和 Formula 1 车手 Sergio 'Checo' Pérez，说明资本结构中嵌入了体育营销协同。CEO 2025 年 4
              月表态称，公司目标是在三到五年内 IPO。
