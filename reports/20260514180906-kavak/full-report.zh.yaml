      - number: '3.2'
        title: 竞争对手画像：规模、融资、目标客户、产品范围、定价和战略方向
        blocks:
          - type: paragraph
            body: >-
              Carvana 是最接近的商业模式类比：垂直整合、数字优先、提供自营融资，并有约 150 点认证流程。它只在美国运营，NYSE 上市，2022 年濒临破产后于 2023 年通过重大债务交换重组债务，2024
              年报告收入约 $6-7 billion。Carvana 没有拉美业务，其濒临破产也说明垂直整合模式自带资本强度和债务风险。AUTO1 Group 运营的 AutoHero
              是泛欧洲对应物，线上销售认证二手车并提供自营质保，但没有 Kavak 式自营消费融资。AUTO1 Group 于 2023-2024 年实现调整后 EBITDA
              盈利，证明认证数字二手车模式在规模化后可行。Brazil 的 OLX Autos 提供分类广告和轻检测服务，但缺少整备中心和集成融资；OLX Group 已在多个拉美市场削减汽车垂直投入。Seminuevos 是
              Mexico 主导挂牌平台，品牌认知度高，但不提供认证、质保或融资。Mercado Libre Autos
              受益于拉美主导电商品牌的信任，但没有认证或自营汽车融资。传统经销商碎片化，拥有整备能力，并依赖银行合作伙伴融资，但缺少数字优先规模。非正式 P2P
              市场按单位量是最大竞争板块，没有认证、没有质保，买方面临极高欺诈风险。
