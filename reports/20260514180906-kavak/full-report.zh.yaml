      - number: '2.5'
        title: 规模测算和采用尽调缺口及相互矛盾估计
        blocks:
          - type: paragraph
            body: >-
              若干关键市场规模和采用数据缺口仍未解决，必须作为分析置信度的约束标出。第一，Brazil 二手车总市场没有独立审计数据。Brazil 是 Kavak 按单位量计算的最大市场，也是单笔最大资本承诺——USD 500
              million——的接收方，但分析师 TAM 估计从 USD 80 到 120 billion 不等，50% 区间差异会实质影响 SAM 和市场份额预测。第二，Kavak 不按市场披露交易量或收入。CEO 声称
              Mexico 市场份额为 1%，但未获独立验证；没有审计数据，就无法构建有证据锚定的 SOM。第三，Turkey 全球第三大排名见于多个二级来源，但都追溯到单一行业机构估计，且没有拆分正规与非正式交易；2022
              年后土耳其经济扰动可能已显著改变交易量。


              第四，中东市场规模测算依赖行业协会对 UAE、Oman 和 Saudi Arabia 的汇总数据，缺少一手来源独立验证。第五，Argentina 2023 年后贬值很可能已把实际 USD
              等值市场规模压到危机前估计以下，但公开来源没有当前调整后数据。这些缺口是证据约束，而不是否定因素；但任何锚定市场渗透里程碑的投资逻辑，都必须先委托获取一手数据：Brazil 的 FENABRAVE、Mexico
              正规数字份额确认的 AMDA，以及土耳其汽车协会数据。只有这样，TAM 和 SAM 输入才能带着充分信心进入量化估值模型。
            claimRefs:
              - CM037
              - CM038
              - CM039
              - CM040
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图：直接同业、既有玩家、邻近玩家、替代方案和潜在进入者
        blocks:
          - type: paragraph
            body: >-
              Kavak 同时在六个市场的二手车生态多个层面竞争。直接的认证二手车市场同业是 Carvana（美国，NYSE: CVNA）和 AutoHero（泛欧洲，上市公司 AUTO1 Group
              子公司）。两者均无拉美业务，意味着 Kavak 在本土区域没有直接的全栈认证同业。既有邻近玩家包括 Mexico 的 Seminuevos（仅挂牌分类广告）、覆盖拉美的 Mercado Libre
              Autos（主导电商平台内的分类广告）、Brazil 的 OLX Autos（分类广告加轻检测，垂直整合较弱），以及碎片化的独立经销商和品牌经销商。主要替代方案是非正式点对点市场，由 Facebook
              Marketplace、WhatsApp 群组和口碑网络构成，约占拉美二手车交易 90%。资金实力足够的新进入者可能包括区域超级应用（Rappi、iFood）和泛拉美金融科技平台，但截至 2026
              年，没有一家宣布进入认证二手车垂直。在 Turkey，既有分类广告平台 Sahibinden 和 Arabam.com 扮演着与 Mexico 的 Seminuevos 相同的角色。在 UAE
              集群，Dubicars 和 CarSwitch.com 是主要分类广告替代方案。
