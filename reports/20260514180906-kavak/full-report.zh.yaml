      - number: '5.3'
        title: 技术平台、AI 与数字架构
        blocks:
          - type: paragraph
            body: >-
              Kavak 的技术栈围绕网页市场和 iOS、Android 原生移动应用搭建。公司的 GitHub 组织（kavak-tech）公开存在，但访问受限；外部无法评估具体代码仓库、工程团队规模或开源贡献。截至
              2026 年，StackShare 没有 Kavak 的已确认公开资料，因此第三方技术情报有限。


              核心技术资产是 AI 定价算法。根据公司和第三方描述，该算法同时摄取公开汽车市场数据和 Kavak
              自有内部交易历史。经过数千次训练迭代，算法学会预测市场价格趋势、评估具体车辆公允价值，并通过建模买家支付能力生成个性化融资方案。定价输出不可议价——Kavak
              给卖家一个数据驱动的单一报价——从而消除砍价并维持利润纪律。同一套数据基础设施也供 Kavak Credito 使用，驱动信用评分引擎，在无需到访网点的情况下承保贷款申请。


              平台还把 360 度车辆照片、车况报告和检测证书作为结构化数据呈现在每个车源页面。这些数字化资料替代了个人对个人交易中常见的主观、议价式信息交换。Kavak 曾在智利专门投入 $40
              million，以加速技术和数据基础设施部署；这说明核心平台是按市场重新部署并用本地数据训练，而不是一个单一全球实例。


              在土耳其，平台以 Carvak 品牌运营，界面做了本地化适配，反映了按市场制定品牌的决策。阿联酋、阿曼和沙特阿拉伯使用 Kavak 品牌，并提供英语 /
              阿拉伯语双语界面。这种多品牌打法带来潜在技术碎片化风险：品牌专属分支可能随时间分化。
