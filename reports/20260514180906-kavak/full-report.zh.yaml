      - number: '3.5'
        title: 护城河耐久性、商品化风险、替代风险和反向竞争证据
        blocks:
          - type: paragraph
            body: >-
              Kavak 的护城河真实存在，但并非不可攻破。240 点检测建立了锚定信任信号，但原则上资金充足的既有玩家可以复制。Mercado Libre 或 OLX 可以与第三方检测服务合作，缩小认证差距；不过若要复制
              Kavak 整备深度，需要做出它们尚未宣布的资本承诺。Carvana 2022 年濒临破产是最直接的反向证据：即便在成熟美国市场，垂直整合模式也几乎在高利率和库存管理失误下崩塌。这提示 Kavak
              的资本强度风险较高；若拉美利率显著上行，或 GMV 增长放缓而固定整备成本仍高，风险会放大。OLX Autos 退出拉美汽车垂直，说明没有 Kavak 级垂直整合的平台盈利并不确定。Kavak 自身退出
              Colombia 和 Peru，也说明该模式存在最低可行规模要求。AutoHero（AUTO1 Group）在欧盟盈利，是耐久性的正向证据。AI
              驱动超级应用带来的替代风险短期较低，因为整备和融资基础设施无法纯数字化复制。主要商品化风险在检测标准：若监管强制所有二手车销售认证，差异会被削弱。
            claimRefs:
              - CP029
              - CP030
              - CP031
              - CP032
              - CP033
              - CP034
              - CP035
      - number: '3.6'
        title: 图表要点
        blocks:
          - type: callout
            title: Kavak 是唯一具备拉美 / MENA 多市场覆盖的全栈认证二手车平台
            body: 截至 2026 年，没有直接认证同业（Carvana、AutoHero）在拉丁美洲运营。叠加 Kuna Capital 自营融资，Kavak 相比所有分类广告既有玩家和非正式替代方案，处在结构性差异化位置。
            calloutType: strength
            claimRefs:
              - CP001
