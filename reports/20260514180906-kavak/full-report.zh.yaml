      - number: '8.3'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >-
              Kavak 的 $2.2B 估值可对照二手车电商和数字汽车市场板块的一组上市与私人标记可比公司来评估。结构上最相似的上市公司是 Carvana（NYSE:CVNA），这是一家美国在线二手车市场，2022
              年几近崩溃，2023 年完成债务重组，随后市值到 2025 年中恢复至约 $30B。Carvana 2024 年收入约 $13.7B，交易倍数约为 2.2x
              EV/Revenue——这一溢价反映美国市场规模、完整公开披露和已证明的盈利修复。即便对 Carvana 倍数施加 60% 新兴市场折扣，在 Kavak $1.5B 收入估计下也得到约 $1.3-2.5B
              的隐含估值，大体与 $2.2B 标记一致，但安全边际很薄。AUTO1 Group（Frankfurt: AG1）是欧洲最大数字汽车平台，2023 年收入约 EUR 6.5B，因持续亏损，以 0.5-0.7x
              EV/Revenue 交易。CarMax（NYSE:KMX）是美国最大二手车经销商，收入约 $26B，因线下重资产单位经济，以约 0.5x 收入交易。在新兴市场，Spinny（印度）2022 年 Series E
              估值约 $1.8B，截至 2026 年 5 月没有披露下调标记。Cars24（印度）在从 $3.3B 峰值 down round 后，2023 年最近标记约 $1.84B——轨迹与 Kavak 直接可比。OLX
              Autos 从分类广告转向交易的尝试已在 2022-2023 年关闭，资产并入 AutoHero，成为交易型二手车模式利润压缩的警示案例。Kavak 的 $2.2B
              绝对值高于印度同业，部分可由墨西哥更大的可服务市场和 Kavak 更长运营历史解释，但考虑多市场复杂性和不透明财务，Kavak 的风险调整折扣应更高。列举的可比公司表逐行评估了每个同业。
