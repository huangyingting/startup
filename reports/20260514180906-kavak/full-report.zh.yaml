      - number: '1.5'
        title: 里程碑、地域扩张和盈利路径
        blocks:
          - type: paragraph
            body: >-
              Kavak 的里程碑时间线记录了拉美创业史上最快的估值上升和回调之一。公司从 2016 年创立，到 2020 年 10 月首次成为独角兽，再到 2021 年 9 月达到 $8.7B 峰值，14 个月内价值增长
              7.5x。2022 年重组以及 2024 年 1 月退出 Colombia 和 Peru，反映整备中心模式的运营现实：每个市场都需要最低可行交易量，小市场撑不住。


              到 2023 年 Q4，Kavak 报告季度运营增长较上一季度达 70%。2025 年 4 月，公司报告销量较 2024 全年增长 60%，库存周转速度比上年快 3.5x。CEO
              表示，公司在若干市场「几个月内」实现盈利，并按计划在 2025 年底前所有市场全面盈利。这些说法均来自公司陈述，尚未通过公开披露的审计财务独立验证。


              截至 2026 年，地域策略转向深耕六个核心市场，而不是继续扩张。Turkey 是全球第三大二手车市场，规模约 $120 billion，每年 7 million 笔交易。中东集群（UAE、Oman、Saudi
              Arabia）规模约 $34 billion，每年 1.9 million 笔交易，Dubai 价格约为拉美的三倍。Mexico 在每年 5–6 million 笔二手车交易中约占 1%
              市场份额，在需要进一步进入新市场前，仍有可观自然增长空间。
