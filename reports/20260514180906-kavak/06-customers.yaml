- id: SU-S002
  title: Customer acquisition and go-to-market motion
  body: "Kavak deploys a digital-first, mass-market acquisition strategy anchored by\
    \ sports sponsorships and performance marketing. Core channels include the kavak.com\
    \ platform, mobile application, and targeted digital advertising. Brand visibility\
    \ is reinforced through high-profile sports partnerships: Kavak sponsors the Argentine\
    \ Football Association (AFA) national team jersey, the Mexican Football Federation\
    \ (FMF), CONCACAF tournaments, and signed an NFL partnership in December 2025 targeting\
    \ Mexico's rapidly growing American football audience. In Argentina, Kavak introduced\
    \ the 'Dólar Kavak' USD-linked payout for sellers — a potent acquisition hook in\
    \ a market with persistent peso devaluation. The instant AI-generated price offer\
    \ (for both sellers and buyers) reduces friction and decision latency, compressing\
    \ the typical informal multi-day negotiation into minutes. Physical reconditioning\
    \ hubs serve dual purposes: back-office operations and walk-in customer touchpoints.\
    \ Kavak's 70% financing attach rate in Mexico versus the 5% industry average suggests\
    \ that customer acquisition is substantially driven by the credit product, not just\
    \ the vehicle marketplace. In the Middle East cluster (UAE, Saudi Arabia, Oman), Kavak\
    \ launched with 500 employees and 500-unit inventory, deploying the same digital-first\
    \ playbook adapted for GCC market preferences. The combination of sports brand investment\
    \ and fintech product creates a flywheel: a customer who finances through Kavak Crédito\
    \ is retained for the loan duration, generating servicing relationships beyond the\
    \ initial transaction."
  claimRefs:
  - CU013
  - CU014
  - CU015
  - CU016
  - CU017
  - CU019
  - CU032
  tableRefs:
  - TU002
  figureRefs:
  - FU002
- id: SU-S003
  title: Customer adoption evidence and traction
  body: "Customer traction evidence for Kavak is directional rather than precise. The\
    \ company claims to have served 'hundreds of thousands' of total customers across\
    \ all markets but does not disclose audited transaction counts by period or geography.\
    \ The strongest proxy for scale is Mexico market share: Kavak is estimated to account\
    \ for approximately 1% of Mexico's annual 5 million used-car transactions, implying\
    \ roughly 50,000 transactions per year in its flagship market. In Argentina, Q1 2025\
    \ data shows total used-car market transactions reaching 620,000 (+30% year-over-year),\
    \ with Kavak's financing attach rate rising to approximately 50% of its own sales\
    \ (up from 20–25% in June 2024), suggesting meaningful volume growth in secondary\
    \ markets. Supply-side, the company processes approximately 3,500 vehicles per month\
    \ through its Mexico reconditioning facility. Kavak Crédito pre-approval rate is\
    \ approximately 70% for applicants, implying an intentionally inclusive underwriting\
    \ posture. Named individual customer references are not publicly disclosed; the Argentine\
    \ press coverage (Infobae, December 2024 and June 2025) cites platform adoption metrics\
    \ and curated user sentiment. These adoption signals are company-curated or partner-attributed\
    \ rather than independently audited, representing a key diligence limitation for\
    \ investors requiring verifiable unit economics. The informal-to-formal transition\
    \ dynamic remains the most powerful demand tailwind: formalizing even 2% of Mexico's\
    \ 5M annual transactions would double Kavak's estimated volume."
  claimRefs:
  - CU006
  - CU007
  - CU008
  - CU011
  - CU012
  - CU018
  - CU020
  tableRefs:
  - TU003
  figureRefs:
  - FU003
- id: SU-S004
  title: Retention, satisfaction, and loyalty signals
  body: "Kavak's retention and satisfaction evidence is qualitative and largely company-sourced.\
    \ The strongest independent validation is a positive mention from Mexico's consumer\
    \ protection agency PROFECO, which cited Kavak for its customer conciliation processes\
    \ — a meaningful signal in a market where used-car fraud and disputes are common.\
    \ Customer testimonials in Argentine media (Infobae December 2024, June 2025) describe\
    \ satisfaction with the Dólar Kavak USD-linked payout model and the speed of transactions.\
    \ The 70% financing attach rate in Mexico creates a structural retention mechanism:\
    \ buyers who finance through Kavak Crédito are anchored to the platform for the\
    \ loan duration, typically 24–60 months, generating an ongoing service relationship.\
    \ In Argentina, financing penetration grew from approximately 20–25% to approximately\
    \ 50% of Kavak sales between June 2024 and early 2025, suggesting deepening customer\
    \ engagement in secondary markets. Kavak's permuta (trade-in/swap) functionality\
    \ allows existing buyers to return and exchange vehicles, creating a structural\
    \ repeat-purchase mechanism. Approximately 70% of Kavak Crédito applicants are\
    \ pre-approved, creating a high-conversion onboarding funnel. However, no NRR, GRR,\
    \ churn rate, cohort retention data, NPS score, or contract renewal figures have\
    \ been publicly disclosed. The absence of audited retention metrics is a material\
    \ diligence gap for assessing the sustainability and compounding value of the customer\
    \ base. The 7-day return policy and warranty program provide post-purchase confidence\
    \ but are standard market features rather than differentiated loyalty instruments."
  claimRefs:
  - CU011
  - CU021
  - CU022
  - CU023
  - CU024
  - CU034
  tableRefs:
  - TU004
  figureRefs:
  - FU004
- id: SU-S005
  title: Adverse signals, customer complaints, and concentration risk
  body: "Kavak's customer base carries meaningful concentration risk and a documented\
    \ history of service failures. Geographic concentration is severe: Mexico accounts\
    \ for an estimated 60% or more of total activity, making aggregate customer traction\
    \ a function of a single market's regulatory, macroeconomic, and competitive environment.\
    \ Service quality issues emerged in 2022 when pandemic-related government office\
    \ restrictions (required for title transfer processing) caused delivery delays of\
    \ up to several months. Online customer complaints about slow delivery were documented\
    \ during this period; the company acknowledged the operational challenges, stating\
    \ it 'had to catch up on how we managed the company, how we allocated resources.'\
    \ Kavak's 75% valuation decline from $8.7 billion in September 2021 to $2.2 billion\
    \ in April 2025 reflects investor-level adverse sentiment driven partly by operational\
    \ execution failures and market exits. The company exited Colombia and Peru, confirming\
    \ that customer volumes in those markets were insufficient to sustain the capital-intensive\
    \ reconditioning model. Bloomberg Línea reported on the valuation haircut as a confirmation\
    \ of fundamental re-rating. Restofworld.org (2022) documented operational troubles\
    \ comprehensively, including delivery delays and workforce restructuring. No individual\
    \ named customer data, audited customer count, or independent customer satisfaction\
    \ survey has been made public, creating a concentrated verification risk: if Kavak\
    \ exits additional markets or Mexico's informal-to-formal transition stalls, the\
    \ claimed customer-base scale cannot be independently verified or relied upon."
