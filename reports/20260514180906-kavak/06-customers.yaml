callouts:
- calloutType: strength
  title: 70% financing attach rate is a structural customer retention moat
  body: Kavak's 70% financing attach rate in Mexico versus a 5% industry average is
    the single strongest publicly verifiable customer traction signal. Buyers who finance
    through Kavak Crédito remain active platform customers for the duration of the loan
    (typically 24–60 months), generating servicing relationships and repeat-purchase
    triggers through permuta. The growing Argentina attach rate (20–25% → ~50% in 2025)
    suggests the model is replicable in secondary markets.
  claimRefs:
  - CU011
  - CU012
- calloutType: risk
  title: Mexico concentration makes aggregate customer traction fragile
  body: An estimated 60% or more of Kavak's total business activity is concentrated
    in Mexico. Any regulatory change to Mexico's vehicle title-transfer process, a macroeconomic
    shock reducing discretionary spending, or a competitor gaining informal-market access
    could disproportionately impair the customer base. The Colombia and Peru exits demonstrate
    that Kavak's customer-density model requires sustained high volume to justify fixed
    reconditioning infrastructure.
  claimRefs:
  - CU025
  - CU028
  - CU030
- calloutType: risk
  title: No audited customer count or retention data creates verification risk
  body: Kavak has not publicly disclosed an audited transaction count, NPS score, NRR,
    GRR, or cohort retention data. The "hundreds of thousands" claim is unverifiable
    without a data room. For institutional diligence, this absence means customer-base
    scale and durability must be treated as unverified until confirmed by independent
    audit or management accounts.
  claimRefs:
  - CU024
  - CU033
  - CU038
- calloutType: insight
  title: PROFECO recognition provides the only independent satisfaction signal
  body: Mexico's consumer protection agency PROFECO cited Kavak positively for its
    customer conciliation processes, providing a thin but genuine third-party signal
    that post-sale customer service is functional. This is meaningful in a market where
    used-car fraud and disputes are endemic. It does not substitute for systematic NPS
    or satisfaction data but is the only non-company-sourced satisfaction reference available.
  claimRefs:
  - CU021
