company:
  name: Kavak
chapter:
  number: 6
  title: Customers
  summary: "Kavak's customer base centers on first-time car buyers and unbanked borrowers\
    \ in Latin America — 40% of Mexico buyers purchasing their first car ever and 40%\
    \ of Kavak Crédito applicants holding no credit history — with a 70% financing attach\
    \ rate in Mexico versus a 5% industry average as the primary evidence of product-market\
    \ fit. Adoption signals are directional: the company claims 'hundreds of thousands'\
    \ served but has disclosed no audited transaction counts, and individual named customers\
    \ are not publicly referenced. Adverse signals include 2022 delivery complaints, Colombia\
    \ and Peru market exits, and a 75% valuation decline from $8.7B to $2.2B, together\
    \ indicating customer-base durability depends heavily on Mexico's continued growth\
    \ and Kavak Crédito's credit quality."
sections:
- id: SU-S001
  title: Customer segmentation and addressable market
  body: "Kavak serves three primary customer archetypes across its Latin American markets.\
    \ The first is the first-time car buyer who has never previously owned a vehicle:\
    \ company statements report that approximately 40% of Kavak Mexico buyers are making\
    \ their first-ever car purchase. The second is the unbanked or underbanked borrower:\
    \ approximately 40% of Kavak Crédito applicants have no prior credit history, reflecting\
    \ a deliberate financial-inclusion mandate. The third is the middle-class aspirational\
    \ buyer seeking a formal, certified alternative to Mexico's predominantly informal\
    \ peer-to-peer used-car market, where roughly 85–90% of transactions remain cash-based\
    \ and undocumented. On the sell side, Kavak targets private vehicle owners seeking\
    \ speed and transparency — the company claims sellers can complete a transaction in\
    \ under 30 minutes via its digital platform. The customer population skews under-30:\
    \ younger urban consumers who are digitally native but historically excluded from\
    \ bank-originated auto loans. The addressable population is large: only approximately\
    \ 1.5 of every 10 Mexicans own a car compared with 7 of 10 in the United States,\
    \ indicating structural demand far from saturation. Kavak's 2023 data showed the\
    \ share of financed buyers with financial dependents rose from 36% to 45%, signaling\
    \ penetration of family-stage middle-class consumers is accelerating."
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU009
  - CU010
  tableRefs:
  - TU001
  figureRefs:
