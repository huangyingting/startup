- id: SI-S004
  title: Public traction metrics and private-metric gaps
  body: 'Kavak discloses only operational metrics, not financial ones. Volume growth was stated at 60% year-over-year as of
    April 2025. Inventory turnover improved 3.5x versus the prior year per the same announcement. Q4 2023 saw 70% quarter-on-quarter
    operational growth. Kuna Capital has disbursed approximately $1 billion cumulatively since inception, per company disclosures.
    Kavak Mexico reconditioning center in the State of Mexico can process 3,500 vehicles per month. The company claims to
    operate in six markets — Mexico, Brazil, Argentina, Chile, Turkey (Carvak brand), and the UAE cluster (Oman and Saudi
    Arabia) — and expanded into Dubai and Saudi Arabia in 2022. No revenue figure, ARR, GMV, EBITDA, gross margin, or net
    income has ever been publicly disclosed. There are no audited financials available for any period. Specific private metrics
    that are critical for underwriting but unavailable include: revenue by market, gross margin per vehicle, Kuna Capital
    NPL rate, interest margin, EBITDA per market, and cash on hand as of Q1 2026. The only proxy for financial health is the
    April 2025 insider round at $2.2B valuation, down from the $8.7B peak in 2021 — a 75% down-round. The Latin American used-car
    market as a whole is growing, providing structural tailwind, but per Statista data the formal transacted segment remains
    a small share of total vehicle inventory.'
  claimRefs:
  - CI022
  - CI023
