- id: TI005
  title: Public financial gaps table
  slug: public-financial-gaps-table
  columns:
  - missing metric
  - why it matters
  - best available proxy
  - diligence path
  - severity
  rows:
  - - Annual revenue (total and by market)
    - Cannot size the business, assess growth, or model valuation without top-line revenue
    - Unit volume × avg transaction price; rough range $700M–$1.8B est. (not confirmed)
    - Request audited income statements; at minimum management accounts for last 3 fiscal years
    - Critical
  - - Gross margin per vehicle (GPU)
    - Determines whether vehicle sales are profitable at current volumes; core unit economics
    - Carvana comp ~$3,000–$4,000 GPU post-restructuring per SEC 10-K; Kavak may differ in LatAm
    - 'Request cost of sales breakdown: acquisition, reconditioning, logistics, warranty per vehicle'
    - Critical
  - - Kuna Capital loan book (outstanding balance)
    - Required to model interest income, capital requirements, and credit risk concentration
    - ~$1B cumulative disbursed; outstanding is less (repayments/prepayments); rough est. $400M–$1.1B
    - 'Request loan tape summary: outstanding balance, average loan age, product mix, market breakdown'
    - Critical
  - - Kuna Capital NPL rate
    - Determines provisioning adequacy, regulatory risk, and true interest margin; ~40% are credit-thin
    - None; no analogous LatAm used-car fintech has public NPL data
    - 'Request NPL data: 30/60/90 DPD rates; historical write-offs; provisioning methodology'
    - Critical
  - - EBITDA or operating profit by market
    - Required to verify CEO profitability claim and assess operating leverage
    - None; CEO stated "some markets profitable" without specifying which
    - Request per-market P&L; at minimum confirm which markets are EBITDA-positive and for how long
    - Critical
  - - Cash on hand and current burn rate
    - Required to assess runway and financing dependency; cannot model capital adequacy without this
    - None; last disclosed figure was $86M/quarter peak burn in Q1 2022
    - Request audited balance sheet with cash position and last 4 quarters of cash flow statement
    - Critical
  - - Vehicle acquisition cost and AI pricing spread
    - Spread between buy price (AI offer) and sell price (list) determines gross margin before reconditioning
    - None; non-negotiable pricing model opaque
    - Request average acquisition price, average sell price, and gross spread by vehicle class
    - High
  - - Kuna Capital cost of debt (Goldman/HSBC lines)
    - Determines net interest margin after borrowing cost; critical for assessing fintech profitability
    - Goldman/HSBC senior secured lines to LatAm fintechs typically SOFR + 3–6%; rough estimate
    - 'Request credit facility term sheets: rate, covenants, maturity, drawn balance'
    - High
  - - Colombia and Peru exit financial cost
    - Exit losses affect cumulative P&L and indicate risk of similar exits in current markets
    - None; no asset write-downs or exit costs disclosed
    - Request financial impact of market exits (write-offs, severance, lease termination, inventory liquidation)
    - Medium
  - - Reconditioning capacity utilization
    - High fixed CAPEX on reconditioning hubs requires high utilization to be economical
    - 'State of Mexico: 3,500 vehicles/month capacity; actual utilization not disclosed'
    - Request capacity utilization by hub; volume per hub; cost per vehicle at current utilization
    - High
  claimRefs:
