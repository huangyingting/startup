company:
  name: Kavak
chapter:
  number: 4
  title: Financials
  summary: 'Kavak generates revenue primarily through used-car sales across six markets, with a growing financial-services
    stream via Kuna Capital / Kavak Crédito. Mexico accounts for roughly 60% of activity; Brazil, Argentina, Chile, Turkey,
    and the UAE make up the rest. No audited financials are publicly available. Volume grew 60% YoY as of April 2025 and Kuna
    Capital has disbursed approximately $1 billion in cumulative loans since inception. Capital intensity is very high: the
    reconditioning model requires large upfront CAPEX per market, evidenced by a $500M Brazil hub investment and the company''s
    $810M debt facility. Peak quarterly cash burn reached $86M in Q1 2022 before restructuring; current burn rate is undisclosed.
    An April 2025 insider round of $127M at a $2.2B valuation — down from a $8.7B peak — alongside $400M in new Kuna Capital
    credit lines from Goldman Sachs and HSBC, signal continued financing dependency. Key diligence blockers: no disclosed
    revenue, no unit economics, no loan-book quality data, and no independent audit of the CEO profitability claim.'
sections:
- id: SI-S001
  title: Revenue streams, pricing model, and revenue mix
  body: Kavak primary revenue stream is used-car sales. The company buys vehicles directly from consumers, reconditions them
    through proprietary 240-point inspection centers, and resells them at a markup. The exact gross margin per vehicle is
    not publicly disclosed; comparable public company Carvana reported GPU (gross profit per unit) of approximately $3,000–$4,000
    in 2023–2024 after its restructuring, as disclosed in Carvana SEC 10-K filings accessible via SEC EDGAR. Mexico is the
    largest market at approximately 60% of total business based on Kavak own disclosures, with Brazil second, followed by
    Argentina, Chile, Turkey, and the UAE cluster. The second revenue stream is financial services through Kuna Capital (rebranded
    Kavak Crédito in November 2025). Approximately 70% of Mexico sales include in-house financing at 14–20% annual interest
    rates. Kuna Capital has disbursed approximately $1 billion in cumulative loans since inception. Interest income and potential
    securitization of loan portfolios represent meaningful revenue, but neither the loan book outstanding, NPL rate, nor interest
    margin is publicly disclosed. A third, smaller revenue stream is vehicle inspection and certification fees charged to
    third-party sellers through a consumer-facing inspection service mentioned in Argentine press coverage. Revenue recognition
    is likely recognized at point of sale for vehicle transactions and on an accrual basis for interest income, though no
    audited revenue recognition policy has been disclosed. The revenue mix between vehicle sales and financial services is
    not publicly broken out.
