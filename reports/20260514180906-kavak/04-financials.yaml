  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: annual-revenue
    missingEvidence: Kavak has never disclosed total revenue, GMV, or any equivalent top-line metric for any period
    whyItMatters: Cannot assess business scale, growth quality, or valuation basis without revenue data
    diligencePath: Request audited income statements for fiscal years 2022–2025; at minimum management accounts; confirm revenue
      recognition policy
    relatedQuestionRefs:
    - QI001
    - QI005
    - QI027
  - type: private-evidence-only
    severity: material
    topic: unit-economics
    missingEvidence: Gross profit per vehicle, reconditioning cost, CAC, and vehicle acquisition cost are all undisclosed
    whyItMatters: Impossible to model path to profitability or validate CEO EBITDA-positive claims without unit economics
    diligencePath: 'Request cost of sales breakdown per vehicle: acquisition, reconditioning, logistics, warranty; request
      CAC by channel and market'
    relatedQuestionRefs:
    - QI006
    - QI009
    - QI010
  - type: private-evidence-only
    severity: material
    topic: kuna-capital-loan-book
    missingEvidence: Kuna Capital outstanding loan book, NPL rate, weighted average interest rate, and cost of debt are all
      undisclosed
    whyItMatters: Financial services revenue quality depends entirely on loan performance; ~40% of borrowers have no prior
      credit history
    diligencePath: 'Request loan tape summary: outstanding balance, DPD distribution, write-off history, provisioning methodology,
      credit line terms (Goldman/HSBC)'
    relatedQuestionRefs:
    - QI014
    - QI020
  - type: private-evidence-only
    severity: material
    topic: cash-burn-runway
    missingEvidence: Current cash on hand and monthly burn rate are undisclosed; last public data point was $86M/quarter peak
      in Q1 2022
    whyItMatters: Cannot assess financing dependency, runway, or next-round triggers without current burn and cash data
    diligencePath: Request cash flow statements for last 8 quarters; monthly burn by market; projected runway under base/bear
      scenarios
    relatedQuestionRefs:
    - QI019
    - QI021
    - QI023
  - type: company-claimed-only
    severity: material
    topic: profitability-claim
    missingEvidence: CEO states "some markets profitable" (Apr 2025) and targets full profitability end-2025; no independent
      audit corroborates this
    whyItMatters: Profitability status directly affects IPO timeline, next-round need, and valuation multiples
    diligencePath: Request per-market P&L; independent auditor confirmation of EBITDA-positive markets; define profitability
      metric used (EBITDA? operating income? contribution margin?)
    relatedQuestionRefs:
    - QI021
