- id: SI-S002
  title: GTM motion and sales efficiency proxies
  body: 'Kavak go-to-market motion is digital-first with physical reconditioning hubs as anchor infrastructure. Demand generation
    relies on digital channels (SEO, performance marketing, social media), plus high-visibility sports sponsorships: Kavak
    is the shirt sponsor of the Argentine Football Association (AFA) national team and has sponsored the Mexican Football
    Federation (FMF) and NFL partnerships. These sponsorships serve brand-building in mass consumer markets where used-car
    purchasing is still primarily relationship-driven and informal. Customer acquisition cost is not publicly disclosed. Sales
    cycle is compressed by Kavak non-negotiable AI pricing: the AI algorithm issues an instant offer, reducing back-and-forth
    negotiation. Management has stated that the AI model was trained on public automotive data and proprietary transaction
    history. Inventory turnover improved to 3.5x faster than the prior year as of April 2025, according to company statements,
    suggesting CAC/inventory carrying cost efficiency has improved post-restructuring. Financing attach rate of approximately
    70% in Mexico is a proxy for customer stickiness and the bundling efficiency of the in-house lending product. The formal
    used-car market in Mexico represents roughly 1 million transactions annually versus an estimated 5–6 million informal
    peer-to-peer transactions, meaning Kavak addressable formal share is limited and channel economics are constrained by
    the informal market substitute.'
  claimRefs:
  - CI008
  - CI009
  - CI010
  - CI011
  - CI012
  - CI013
  tableRefs: []
  figureRefs: []
- id: SI-S003
  title: Cost structure, gross margin drivers, working capital, and capex
  body: 'Kavak cost of goods sold consists primarily of vehicle acquisition cost, reconditioning spend per unit, logistics,
    and warranty reserves. None of these line items are publicly disclosed as absolute figures. Industry benchmarks for reconditioning
    cost range from $1,000 to $3,000 per vehicle depending on condition and market. Kavak processes 3,500 vehicles per month
    through its Mexico facility and has a large São Paulo hub funded by a $500 million investment in Brazil. SG&A includes
    headcount costs for approximately 4,300 employees (down from a peak of ~8,800 post-restructuring), digital marketing,
    and sports sponsorship fees. Capital expenditure is structurally high: each new market requires a reconditioning center,
    logistics network, and regulatory licensing. The Brazil hub alone required $500 million in committed capital. This capital
    intensity was the proximate driver of exits from Colombia and Peru, where unit volumes were insufficient to justify fixed
    infrastructure. Working capital is significant: Kavak finances its vehicle inventory typically 30–90 days before resale.
    The $810 million debt facility (HSBC, Goldman Sachs, Santander, September 2022) primarily funds vehicle inventory and
    Kuna Capital loan origination. An additional $400 million in credit lines was announced in April 2025 ($200M Goldman,
    $200M HSBC) specifically for Kuna Capital loan book expansion. Peak quarterly burn was $86 million in Q1 2022; restructuring
    reduced this materially, but current burn rate is not publicly disclosed.'
  claimRefs:
