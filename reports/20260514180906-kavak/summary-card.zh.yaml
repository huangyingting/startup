summary:
  headline: |
    Kavak 用融资一体化模式率先做出 LatAm 正规二手车市场，但估值从高点打 75% 折、持续亏损、债务沉重以及退出市场，暴露出深层执行问题；公司必须先解决这些问题，才配得上最初的独角兽溢价。
