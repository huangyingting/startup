  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, included and excluded spend, and status-quo substitutes
        blocks:
          - type: paragraph
            body: >-
              Kavak operates in the consumer used-car transaction market across six countries: Mexico, Brazil,
              Argentina, Chile, Turkey, and the UAE cluster. The addressable market is defined as consumer purchases of
              used vehicles meeting Kavak vehicle acceptance criteria by age, mileage, and condition, spanning all price
              bands Kavak will finance or resell. New car sales, heavy commercial fleet vehicles, and ultra-luxury
              vehicles above approximately USD 80,000 are explicitly excluded from the market boundary. Purely informal
              cash peer-to-peer deals—where no digital platform is involved and title transfer is unrecorded—are
              excluded from the serviceable addressable market even though they represent the largest share of total
              unit volume in Latin America.


              The dominant status-quo substitutes vary by market but include classified ad platforms such as Mercado
              Libre, OLX Autos, and Seminuevos in Mexico; Webmotors and OLX Autos in Brazil; ZonaCar and MercadoLibre in
              Argentina; Arabam.com and Sahibinden in Turkey; and Dubicars in the UAE. Traditional franchise and
              independent dealerships remain a status-quo substitute across all markets, particularly for buyers who
              require test drives or trade-in credit at the point of sale. Private peer-to-peer deals arranged without a
              digital intermediary represent the largest single category by unit volume in Latin America, accounting for
              roughly 90 percent of all transactions. Adjacent market opportunities—auto insurance, extended warranties,
              auto parts, and vehicle financing for third-party purchases—are not yet core to Kavak revenue but
              represent potential expansion adjacencies over the medium term. Mapping these boundaries precisely matters
              because the 90 percent informal share is simultaneously the largest competitor segment and the primary
              market education opportunity: every informal deal converted to a certified platform transaction is a unit
              gain for Kavak and reinforces the broader formalization thesis underlying the investment case.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM043
