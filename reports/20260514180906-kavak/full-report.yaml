      - number: '3.5'
        title: Moat durability, commoditization risk, displacement risk, and adverse competitor evidence
        blocks:
          - type: paragraph
            body: >-
              Kavak moat is real but not unassailable. The 240-point inspection creates an anchored trust signal but can
              in principle be copied by well-capitalized incumbents. Mercado Libre or OLX could partner with third-party
              inspection services to narrow the certification gap, though replicating Kavak reconditioning depth would
              require capital commitments neither has announced. The Carvana near-bankruptcy in 2022 is the most direct
              adverse evidence: even in the mature US market, the vertically integrated model nearly collapsed under
              high interest rates and inventory mismanagement. This signals elevated capital intensity risk for Kavak if
              LatAm interest rates rise materially or GMV growth slows while fixed reconditioning costs remain elevated.
              OLX Autos retreat from LatAm auto verticals demonstrates that platform profitability without Kavak-level
              vertical integration is not guaranteed. Kavak own exits from Colombia and Peru show the model has minimum
              viable scale requirements. AutoHero (AUTO1 Group) profitability in the EU is a durability proof point.
              Displacement risk from AI-driven super-apps is low near-term because the reconditioning and financing
              infrastructure cannot be replicated digitally. The principal commoditization risk is in inspection
              standards if regulation mandates certification for all used-car sales.
