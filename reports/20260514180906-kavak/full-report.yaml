  - id: FV001
    title: Recommendation logic flow
    type: flow
    description: >-
      Decision tree mapping the key analytical inputs to the 'track' recommendation, showing how market position,
      fintech moat, capital structure, and disclosure gaps combine to produce the overall investment stance.
    data:
      nodes:
        - id: n1
          label: 'Mexico #1 market share (dominant position)'
        - id: n2
          label: ~70% financing attach rate (Kuna Capital moat)
        - id: n3
          label: 'Tier-1 backers: SoftBank, GA, a16z, Founders Fund'
        - id: n4
          label: No audited financials disclosed (blocking gap)
        - id: n5
          label: Insider-only down-round (75% below peak)
        - id: n6
          label: $1.2B debt senior to equity holders
        - id: n7
          label: Bull signals combined (n1 + n2 + n3)
        - id: n8
          label: Bear signals combined (n4 + n5 + n6)
        - id: n9
          label: 'Recommendation: TRACK (medium confidence)'
        - id: n10
          label: 'Upgrade path: EBITDA+ confirmed and NPL disclosed'
        - id: n11
          label: 'Downgrade path: another down-round or NPL spike'
    notes: >-
      Edges: n1-n3 feed into n7; n4-n6 feed into n8; n7 and n8 combine at n9; n9 branches to n10 (upgrade) and n11
      (downgrade).
  - id: FV002
    title: Valuation sensitivity — entry discount vs IRR
    type: bar
    description: >-
      Sensitivity of 3-year investor IRR to entry discount applied on the April 2025 $2.2B mark, under base-case exit
      assumptions of $2.5B enterprise value. A 0% discount yields approximately 4% IRR; a 35% discount yields
      approximately 20% IRR — the minimum threshold for emerging-market risk-adjusted returns.
    data:
      items:
        - label: 0% discount ($2.2B entry)
          value: 4
          detail: Below EM hurdle rate; no margin of safety at current mark
          tone: negative
        - label: 10% discount ($1.98B entry)
          value: 8
          detail: Still below typical EM VC hurdle; marginal improvement
          tone: warning
        - label: 20% discount ($1.76B entry)
          value: 12
          detail: Approaching EM hurdle rate; still below most LP targets
          tone: warning
        - label: 25% discount ($1.65B entry)
          value: 15
          detail: Minimum acceptable for high-risk EM growth equity
          tone: neutral
        - label: 30% discount ($1.54B entry)
          value: 17
          detail: Within acceptable range for sophisticated secondary buyers
          tone: positive
        - label: 35% discount ($1.43B entry)
          value: 20
          detail: Meets typical EM hurdle; compensates for opacity and debt risk
          tone: positive
    notes: >-
      IRR figures are illustrative estimates assuming $2.5B base-case exit value and 3-year hold. No leverage assumed.
      Actual returns depend on preference overhang and dilution path.
  - id: FV003
    title: Valuation range — bull, base, and bear cases
    type: range
    description: >-
      Bull, base, and bear equity valuation ranges for Kavak over a 3-to-5-year horizon, expressed in $M. Ranges reflect
      low, base, and high estimates within each scenario based on exit multiple and growth assumptions.
    data:
      items:
        - label: Bull Case (IPO 2027-2028, EBITDA+ by end-2025)
          low: 3500
          base: 4500
          high: 6000
          unit: $M
        - label: Base Case (IPO 2028-2029, EBITDA+ by mid-2026)
          low: 1800
          base: 2300
          high: 3000
          unit: $M
        - label: Bear Case (profitability miss, forced down-round)
          low: 600
          base: 950
          high: 1400
          unit: $M
    notes: >-
      Valuation ranges represent equity value post-preference waterfall. Bear case assumes additional down-round
      diluting common equity significantly. Current insider mark (April 2025): $2.2B.
  - id: FV004
    title: Key investment KPIs
    type: kpi
    description: >-
      Summary of the quantitative data points most critical to the investment decision, sourced from public disclosures
      and analyst estimates.
    data:
