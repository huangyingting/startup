      - number: '5.4'
        title: Kavak Credito and financial product architecture
        blocks:
          - type: paragraph
            body: >-
              Kavak entry into financial services represents the most significant product evolution since the company
              founding. The financial arm originated as Kavak Capital -- an internal vehicle used to provide in-house
              financing to buyers without access to traditional bank credit. This was formalized into Kuna Capital as a
              dedicated entity, and expanded into the consumer-facing Kavak Credito platform launched in November 2025.

               Kavak Credito launched in Mexico with two initial products. The first product, Meses (installments), is an auto purchase loan with payments starting at MXN $2,499 per month, a mandatory 15% down payment, terms of up to 72 months, and an annual interest rate starting at 14.99%. The company targets pre-approving 7 of 10 applicants, and the entire application process is executed online without a physical branch visit. The second product, Prestamo (loan), allows existing vehicle owners to unlock up to 60% of their vehicle appraised value as cash, repayable over up to 60 months at a starting rate of 21.99% per annum.

               The strategic rationale is directly tied to the structural financing gap in Latin America. Kavak CEO cited that while 7 of 10 people in the United States have access to auto credit, only 2 of 10 do in Latin America. In Mexico, the traditional bank auto-loan portfolio reached MXN 269.9 billion at end of Q3 2025, with a 1.1% non-performing loan rate -- a healthy backdrop for Kavak entry. Kuna Capital has disbursed approximately $1 billion in cumulative loans since inception, financing approximately 70% of Kavak Mexico sales. Goldman Sachs and HSBC each extended $200 million credit lines to Kuna Capital in April 2025, providing the debt-of-funds capacity for the scaled Kavak Credito rollout.

               Key unresolved diligence questions include actual Kavak Credito approval rates (versus the 7/10 target), non-performing loan ratios, the regulatory classification of Kuna Capital under CNBV framework (SOFOM or bank charter), and whether Kavak Credito products are available in markets outside Mexico.
            claimRefs:
              - CE006
              - CE007
