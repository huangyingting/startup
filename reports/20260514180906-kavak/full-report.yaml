              Kavak has not publicly disclosed an audited transaction count, NPS score, NRR, GRR, or cohort retention
              data. The "hundreds of thousands" claim is unverifiable without a data room. For institutional diligence,
              this absence means customer-base scale and durability must be treated as unverified until confirmed by
              independent audit or management accounts.
            calloutType: risk
            claimRefs:
              - CU024
              - CU033
              - CU038
