          value: 8700
          unit: $M
        - label: Valuation Decline from Peak
          value: 75
          unit: '%'
        - label: April 2025 Equity Raise
          value: 127
          unit: $M
        - label: 2025 New Credit Lines (Goldman + HSBC)
          value: 400
          unit: $M
        - label: Estimated Total Debt Outstanding
          value: 1200
          unit: $M
        - label: Total Equity Raised (all rounds est.)
          value: 1900
          unit: $M
        - label: Financing Attach Rate (Kuna Capital)
          value: 70
          unit: '%'
        - label: Mexico Share of Revenue
          value: 60
          unit: '%'
        - label: Monthly Web Visits
          value: 6.9
          unit: M
        - label: Workforce (post-restructuring)
          value: 4300
          unit: employees
        - label: Stated IPO Horizon (years)
          value: 3
          unit: to 5 yrs
    notes: >-
      Valuation data from Bloomberg Lines and TechCrunch April 2025 coverage. Total debt is an estimate combining 2021
      credit facility and 2025 lines. Financing attach rate from CEO public statements (Bloomberg April 2025).
