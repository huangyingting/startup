      - number: '2.2'
        title: TAM/SAM/SOM sizing using multiple lenses
        blocks:
          - type: paragraph
            body: >-
              The total addressable market for Kavak spans six countries with meaningfully different transaction volumes
              and per-unit prices. Mexico is the home market with approximately 5 to 6 million used-car transactions
              annually at an estimated average price of USD 10,000 to 12,000, yielding a TAM of approximately USD 60
              billion. Brazil is the largest market by unit volume at approximately 13 to 14 million transactions
              annually and a TAM estimated at USD 100 billion, though this estimate carries wide uncertainty in the
              absence of independent audit data. Turkey, Kavak largest market by estimated dollar TAM, transacts
              approximately 7 million units annually at higher average prices, yielding an estimated USD 120 billion TAM
              and a claimed world third-largest ranking by volume. The UAE and Middle East cluster contributes
              approximately 1.9 million annual transactions but at prices roughly three times higher than Latin American
              averages, making the per-unit revenue opportunity materially higher despite smaller unit count. Argentina
              and Chile are smaller markets at approximately 1 to 1.5 million and 400,000 annual transactions
              respectively, with TAMs of approximately USD 15 billion and USD 8 billion.


              The combined TAM across all six markets exceeds USD 320 billion. However, the serviceable addressable
              market represents transactions that are formal, digitally accessible, and within Kavak operational
              geography—estimated at USD 35 to 52 billion after excluding the approximately 85 to 90 percent
              informal-only share of Latin American transactions. Car ownership density in Latin America stands at
              approximately 150 vehicles per 1,000 people versus approximately 700 in the United States, indicating
              significant latent demand headroom for first-car ownership. Formal financing penetration of approximately
              5 percent in LatAm versus 90-plus percent in the US further illustrates how structural the formalization
              and credit penetration opportunity remains. Kavak serviceable obtainable market is estimated at under USD
              1 billion GMV at the current run rate, based on approximately 1 percent Mexico share and sub-1 percent in
              all other markets, leaving substantial runway if reconditioning infrastructure and trust adoption barriers
              can be overcome.
