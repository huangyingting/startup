      - number: '1.5'
        title: Milestones, geographic expansion, and profitability path
        blocks:
          - type: paragraph
            body: >-
              Kavak's milestone chronology documents one of the fastest valuations rises and corrections in LatAm
              startup history. The company progressed from founding in 2016 to first unicorn status in October 2020,
              then to the $8.7B peak in September 2021—a 7.5x increase in value in under 14 months. The 2022
              restructuring and market exit from Colombia and Peru in January 2024 reflect the operating reality that
              the reconditioning-center model requires minimum viable transaction volumes per market that smaller
              markets could not sustain.


              By Q4 2023, Kavak reported quarterly operational growth of 70% versus the prior quarter. In April 2025,
              the company reported 60% volume growth versus full-year 2024 and inventory turnover 3.5x faster than the
              prior year. The CEO stated that the company achieved profitability in some markets 'in a few months' and
              was on track for full profitability across all markets by end of 2025. These claims are company-stated and
              have not been independently verified through publicly disclosed audited financials.


              The geographic strategy as of 2026 focuses on depth in six core markets rather than further expansion.
              Turkey is the third-largest used-car market globally at approximately $120 billion and 7 million
              transactions annually. The Middle East cluster (UAE, Oman, Saudi Arabia) represents approximately $34
              billion and 1.9 million annual transactions, with Dubai prices approximately three times those in Latin
              America. Mexico holds approximately 1% market share of 5–6 million annual used-car transactions, leaving
              substantial runway for organic growth before needing further market entry.
