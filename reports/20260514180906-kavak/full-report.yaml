companyProfile:
  summary: >
    Kavak is a Mexico City-based used-car marketplace and fintech platform that buys, reconditions, and resells  used
    cars with in-house financing across Latin America, Turkey, and the Middle East. Founded in October 2016  by Carlos
    García Ottati (CEO), Loreanne García Ottati, and Roger Laughlin Carvallo, the company reached  a $8.7 billion
    valuation in September 2021 — the highest ever for a LatAm-founded startup — before a 75%  valuation cut in April
    2025 to $2.2 billion. Kavak's differentiated model integrates vehicle inspection,  reconditioning, and proprietary
    financing into a single platform serving under-banked consumers who lack  access to traditional auto credit. As of
    2026, Kavak operates in Mexico, Brazil, Argentina, Chile, Turkey,  UAE, Oman, and Saudi Arabia, after exiting
    Colombia and Peru in January 2024. The company targets profitability  in all markets by end of 2025 and an IPO in
    3–5 years.
