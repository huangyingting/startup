  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Competitive landscape: direct peers, incumbents, adjacents, substitutes, and potential entrants'
        blocks:
          - type: paragraph
            body: >-
              Kavak competes simultaneously in multiple layers of the used-car ecosystem across six markets. The direct
              certified used-car marketplace peers are Carvana (US, NYSE: CVNA) and AutoHero (pan-European, subsidiary
              of publicly traded AUTO1 Group). Neither has Latin American presence, meaning Kavak faces no direct
              full-stack certified peer in its home region. Incumbent adjacents include Seminuevos in Mexico
              (listing-only classifieds), Mercado Libre Autos across LatAm (classifieds within a dominant e-commerce
              platform), OLX Autos in Brazil (classifieds plus light inspection, less vertically integrated), and
              fragmented independent and franchise dealerships. The principal substitute is the informal peer-to-peer
              market consisting of Facebook Marketplace, WhatsApp groups, and word-of-mouth networks, which accounts for
              roughly 90 percent of used-car transactions in Latin America. Likely new entrants with sufficient capital
              include regional super-apps (Rappi, iFood) and pan-LatAm fintech platforms, though none has announced a
              certified used-car vertical as of 2026. In Turkey, incumbent classifieds platforms Sahibinden and
              Arabam.com play the same role as Seminuevos in Mexico. In the UAE cluster, Dubicars and CarSwitch.com
              serve as primary classifieds substitutes.
            claimRefs:
