      - number: '6.3'
        title: Customer adoption evidence and traction
        blocks:
          - type: paragraph
            body: >-
              Customer traction evidence for Kavak is directional rather than precise. The company claims to have served
              'hundreds of thousands' of total customers across all markets but does not disclose audited transaction
              counts by period or geography. The strongest proxy for scale is Mexico market share: Kavak is estimated to
              account for approximately 1% of Mexico's annual 5 million used-car transactions, implying roughly 50,000
              transactions per year in its flagship market. In Argentina, Q1 2025 data shows total used-car market
              transactions reaching 620,000 (+30% year-over-year), with Kavak's financing attach rate rising to
              approximately 50% of its own sales (up from 20–25% in June 2024), suggesting meaningful volume growth in
              secondary markets. Supply-side, the company processes approximately 3,500 vehicles per month through its
              Mexico reconditioning facility. Kavak Crédito pre-approval rate is approximately 70% for applicants,
              implying an intentionally inclusive underwriting posture. Named individual customer references are not
              publicly disclosed; the Argentine press coverage (Infobae, December 2024 and June 2025) cites platform
              adoption metrics and curated user sentiment. These adoption signals are company-curated or
              partner-attributed rather than independently audited, representing a key diligence limitation for
              investors requiring verifiable unit economics. The informal-to-formal transition dynamic remains the most
              powerful demand tailwind: formalizing even 2% of Mexico's 5M annual transactions would double Kavak's
              estimated volume.
