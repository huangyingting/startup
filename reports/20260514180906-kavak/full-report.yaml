        - Informal 85-90% cash market limits addressable digital pool
        - Disclosed GMV growth demonstrating digital channel penetration gains
      - - Fintech moat
        - 70% consumer financing attach rate creates durable revenue layer
        - Kuna Capital NPL rates undisclosed; credit losses could erode margin
        - Published NPL rate below 5% with adequate loss reserves confirmed
      - - Capital and valuation
