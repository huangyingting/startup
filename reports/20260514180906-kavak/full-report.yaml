      - number: '1.4'
        title: Product platform, fintech layer, and brand partnerships
        blocks:
          - type: paragraph
            body: >-
              Kavak's product stack has three layers. The transaction layer enables consumers to list their vehicle for
              sale (Kavak offers instant purchase, swap, or 30-day listing options), search and purchase inventory, and
              complete financing—all on a single digital interface. The operations layer consists of physical
              reconditioning centers where every vehicle undergoes a 240-point inspection before listing, combined with
              logistics for vehicle pick-up and delivery. The financial layer—Kuna Capital—has disbursed approximately
              $1 billion in auto loans over four years; in Mexico, 70% of sales include in-house financing versus a 5%
              industry average.


              In November 2025, Kavak launched Kavak Crédito, a standalone fintech product offering 'Meses' (monthly
              installment plan: from MXN $2,499/month, 15% down payment, up to 72 months, 7 of 10 applicants
              pre-approved) and 'Préstamo' (equity release: up to 60% of vehicle value, up to 60 months). Forty percent
              of Kavak Crédito applicants have no prior credit history, reflecting the company's role in expanding
              formal financial access in Latin America where only 1.5 of 10 people own a car versus 7 of 10 in the
              United States.


              Brand partnerships include sponsorship of the Mexican Football Federation, the Argentine Football
              Association (AFA), a CONCACAF Champions Cup sponsorship in February 2022, and an NFL commercial
              partnership announced in December 2025. Kavak acquired Argentine startup Checkars in 2020, Garaj Serpeti
              in Turkey (rebranded as Carvak), and Carzaty in Oman for Middle East expansion.
