        - Audited EBITDA-positive annual accounts for FY2025 published
      - - Exit pathway
        - 3-to-5-year IPO horizon stated by CEO; LatAm tech IPO window reopening
        - Multi-market complexity, debt stack, and opaque financials delay IPO
        - Filing of IPO prospectus or strategic sale announcement
      - - Macro resilience
        - Trump tariffs reduce new-car supply; pushes buyers toward used cars
        - Mexico recession reduces consumer credit demand; Argentina peso risk
