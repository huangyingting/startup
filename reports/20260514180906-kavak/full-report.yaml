            title: Mexico concentration makes aggregate customer traction fragile
            body: >-
              An estimated 60% or more of Kavak's total business activity is concentrated in Mexico. Any regulatory
              change to Mexico's vehicle title-transfer process, a macroeconomic shock reducing discretionary spending,
              or a competitor gaining informal-market access could disproportionately impair the customer base. The
              Colombia and Peru exits demonstrate that Kavak's customer-density model requires sustained high volume to
