  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product suite and customer workflow
        blocks:
          - type: paragraph
            body: >-
              Kavak positions itself as a full-stack automotive platform that replaces the fragmented, fraud-prone
              informal used-car market. The product suite covers four customer jobs: selling a vehicle, buying a
              vehicle, financing a purchase, and managing post-sale services. Each job is handled end-to-end by Kavak
              without transferring the customer to a third party, which is the structural moat the company cites versus
              classified-ad platforms such as OLX Autos and Mercado Libre.


              For sellers, the workflow begins with an online price quote powered by the AI pricing algorithm. The
              seller brings the vehicle to a Kavak hub, where a 240-point physical inspection is completed in
              approximately 30 minutes. Kavak presents a non-negotiable final offer; if accepted, 80% of the payment is
              transferred within 24 hours and the remainder after legal title verification, typically within five
              business days. In Argentina, Kavak also offers a 30-day consignment option where Kavak guarantees full
              payment regardless of whether the vehicle sells, a model that accounted for 23% of Argentine sales as of
              late 2024.


              For buyers, Kavak surfaces a catalog of inspected, reconditioned vehicles on its web platform and mobile
              app. Each listing includes 360-degree photography, a full inspection report, and pricing transparency.
              Buyers can finance directly through Kavak Credito or visit a physical hub for a test drive. In Argentina,
              a 7-day no-questions-asked return window reduces purchase anxiety. Mexico offers a separate mechanical
              warranty period on sold vehicles. Kavak claims the platform enables a 100% digital purchase without any
              in-person visit, although physical hubs and reconditioning centers remain central to the quality-assurance
              infrastructure that underpins buyer trust.
            claimRefs:
              - CE001
              - CE002
              - CE018
              - CE021
              - CE024
              - CE027
              - CE034
              - CE035
          - type: table
            tableRef: TE001
            claimRefs: []
          - type: table
            tableRef: TE002
            claimRefs: []
          - type: figure
            figureRef: FE002
            claimRefs: []
      - number: '5.2'
        title: Vehicle inspection, reconditioning, and quality operations
        blocks:
          - type: paragraph
            body: >-
              The 240-point inspection protocol is Kavak most cited operational differentiator. Each vehicle acquired by
              Kavak is subjected to a multi-stage technical check covering mechanical systems, electronics, bodywork,
              and legal status. Following inspection, vehicles are repaired and reconditioned in proprietary workshop
              facilities before being listed for resale. The company argues this process eradicates the estimated 40%
              fraud rate endemic to Latin American peer-to-peer used-car transactions.


              In Mexico, the primary reconditioning center is located in Lerma, Estado de Mexico. The facility spans
              more than 14,000 square meters and has a rated capacity of more than 3,500 vehicles per month. In 2023,
              Mexico consumer protection regulator Profeco (Procuraduria Federal del Consumidor) conducted a formal
              on-site visit and publicly endorsed the facility standards. The Profeco director noted that Kavak had
              conciliated approximately 100% of formal consumer complaints registered with the regulator -- a strong
              metric relative to peer platforms, though the absolute complaint count was not disclosed.


              In Brazil, Kavak announced a $500 million investment in 2021 to build what it described as the largest
              vehicle reconditioning center in Latin America, located in Sao Paulo. The Brazil hub underpins the company
              goal of processing 100,000 purchased and 50,000 resold vehicles annually in that market. Across all
              markets, the reconditioning pipeline involves technical diagnostics, parts replacement, body work,
              detailing, legal title audit, and final quality certification before the vehicle is listed.


              Despite these strengths, independent verification of the 240-point inspection claims remains a diligence
              gap. El Economista reported in 2022 that Kavak maintained its Profeco certification despite a rising
              absolute number of consumer complaints, and consumer advocacy organization Tec-Check publicly criticized
              the company for prioritizing expansion over service quality. This creates an adverse signal that warrants
              independent inspection sampling during due diligence.
            claimRefs:
              - CE002
              - CE003
              - CE004
              - CE015
              - CE022
              - CE023
              - CE025
              - CE026
              - CE034
      - number: '5.3'
        title: Technology platform, AI, and digital architecture
        blocks:
          - type: paragraph
            body: >-
              Kavak technology stack is built around a web marketplace and native mobile applications for iOS and
              Android. The company GitHub organization (kavak-tech) exists publicly but is access-restricted, making it
              impossible to assess specific repositories, engineering headcount, or open-source contributions from
              external vantage points. StackShare does not have a confirmed public profile for Kavak as of 2026, so
              third-party tech intelligence is limited.


              The central technology asset is the AI pricing algorithm. According to company and third-party
              descriptions, the algorithm ingests publicly available automotive market data alongside Kavak proprietary
              internal transaction history. Through thousands of training iterations, the algorithm learned to project
              market price trends, assess a given vehicle fair value, and generate personalized financing offers by
              modeling a buyer payment capacity. The pricing output is non-negotiable -- Kavak presents a single
              data-driven offer to sellers -- which eliminates haggling and maintains margin discipline. The same data
              infrastructure feeds the credit-scoring engine used by Kavak Credito to underwrite loan applications
              without requiring branch visits.


              The platform also incorporates 360-degree vehicle photography, condition reports, and inspection
              certificates presented as structured data on each vehicle listing page. These digital artifacts replace
              the subjective, negotiated information exchange typical of peer-to-peer transactions. Kavak invested $40
              million in Chile specifically to accelerate technology and data infrastructure deployment, signalling that
              the core platform is re-deployed market-by-market with local data training rather than as a single global
              instance.


              In Turkey, the platform operates under the Carvak brand with a locally adapted interface, reflecting
              market-specific branding decisions. The UAE, Oman, and Saudi Arabia operate under the Kavak brand with an
              English/Arabic bilingual interface. This multi-brand approach creates potential technology fragmentation
              risk, as brand-specific forks may diverge over time.
