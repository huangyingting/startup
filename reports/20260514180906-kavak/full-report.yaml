      - number: '2.3'
        title: Buyer, user, and payer segmentation with adoption path
        blocks:
          - type: paragraph
            body: >-
              Kavak customer base is anchored by two primary buyer segments. First-time car buyers—individuals who have
              never owned a vehicle—represent approximately 40 percent of Kavak customer mix. These buyers typically
              require in-house financing, with approximately 40 percent having no prior credit history, engage primarily
              through digital discovery, and are motivated by the transition from inadequate public transit to personal
              vehicle ownership. The adoption path for first-time buyers runs from digital search through price
              guarantee to Kavak Credito financing application and then vehicle delivery, with no mandatory in-person
              dealership friction. The second major segment is upgraders—buyers who already own a vehicle and are
              replacing it with a newer or larger one. Upgraders represent approximately 35 percent of Kavak volume and
              have a lower but non-trivial financing need, often using trade-in proceeds from selling their current
              vehicle through Kavak seller channel to partially fund the new purchase.


              Sellers—individuals offloading vehicles—form the supply-side input that Kavak must acquire alongside
              buyers to maintain inventory depth. Kavak AI pricing algorithm provides a non-negotiable instant cash
              offer, competing against classified-ad listing uncertainty and the time cost of private peer-to-peer sale.
              Fleet and commercial buyers represent less than 5 percent of Kavak volume; the business model is
              predominantly consumer-directed. Budget ownership rests with the individual consumer household in over 95
              percent of cases. Kavak Credito—with approximately 40 percent of Mexico applicants having no prior credit
              history—illustrates that Kavak is underwriting first-credit buyers at scale, creating a credit bureau
              footprint and multi-year customer relationship that compounds lifetime value beyond the initial vehicle
              transaction.
            claimRefs:
