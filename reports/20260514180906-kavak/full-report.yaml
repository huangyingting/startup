      - number: '3.4'
        title: Switching costs, lock-in, multi-homing, distribution power, and supply/partner access
        blocks:
          - type: paragraph
            body: >-
              Kavak benefits from several sources of buyer switching costs. Buyers who finance through Kuna Capital are
              administratively locked to Kavak for the duration of their loan. The 7-day return guarantee and 3-month
              warranty tie the buyer relationship to Kavak post-purchase. Supply-side lock-in arises from Kavak
              proprietary reconditioning infrastructure: sellers who want the Kavak guaranteed buy price must use Kavak
              inspection process, creating a habit loop for repeat sellers. Multi-homing is easy for casual buyers
              browsing multiple platforms but functionally constrained once financing is initiated because the credit
              application ties buyers to a specific vehicle and lender. Distribution power is skewed toward classifieds
              incumbents in raw traffic and brand awareness, but Kavak is the only player with end-to-end transactional
              infrastructure. Supply advantages include Kavak reconditioning capacity enabling bulk vehicle sourcing and
              its banking license enabling instant credit decisions unavailable to classifieds platforms. Competitors
              who wish to replicate Kavak financing and inspection capabilities face multi-year capital deployment
              timelines and regulatory licensing hurdles.
