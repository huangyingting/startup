      - number: '6.2'
        title: Customer acquisition and go-to-market motion
        blocks:
          - type: paragraph
            body: >-
              Kavak deploys a digital-first, mass-market acquisition strategy anchored by sports sponsorships and
              performance marketing. Core channels include the kavak.com platform, mobile application, and targeted
              digital advertising. Brand visibility is reinforced through high-profile sports partnerships: Kavak
              sponsors the Argentine Football Association (AFA) national team jersey, the Mexican Football Federation
              (FMF), CONCACAF tournaments, and signed an NFL partnership in December 2025 targeting Mexico's rapidly
              growing American football audience. In Argentina, Kavak introduced the 'Dólar Kavak' USD-linked payout for
              sellers — a potent acquisition hook in a market with persistent peso devaluation. The instant AI-generated
              price offer (for both sellers and buyers) reduces friction and decision latency, compressing the typical
              informal multi-day negotiation into minutes. Physical reconditioning hubs serve dual purposes: back-office
              operations and walk-in customer touchpoints. Kavak's 70% financing attach rate in Mexico versus the 5%
              industry average suggests that customer acquisition is substantially driven by the credit product, not
              just the vehicle marketplace. In the Middle East cluster (UAE, Saudi Arabia, Oman), Kavak launched with
              500 employees and 500-unit inventory, deploying the same digital-first playbook adapted for GCC market
              preferences. The combination of sports brand investment and fintech product creates a flywheel: a customer
              who finances through Kavak Crédito is retained for the loan duration, generating servicing relationships
              beyond the initial transaction.
