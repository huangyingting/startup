      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 70% financing attach rate is a structural customer retention moat
            body: >-
              Kavak's 70% financing attach rate in Mexico versus a 5% industry average is the single strongest publicly
              verifiable customer traction signal. Buyers who finance through Kavak Crédito remain active platform
              customers for the duration of the loan (typically 24–60 months), generating servicing relationships and
              repeat-purchase triggers through permuta. The growing Argentina attach rate (20–25% → ~50% in 2025)
              suggests the model is replicable in secondary markets.
            calloutType: strength
