            title: PROFECO recognition provides the only independent satisfaction signal
            body: >-
              Mexico's consumer protection agency PROFECO cited Kavak positively for its customer conciliation
              processes, providing a thin but genuine third-party signal that post-sale customer service is functional.
              This is meaningful in a market where used-car fraud and disputes are endemic. It does not substitute for
              systematic NPS or satisfaction data but is the only non-company-sourced satisfaction reference available.
