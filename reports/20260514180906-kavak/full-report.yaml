        - Request market-level org chart, management tenure, and voluntary attrition rates
      - - Morale and culture after 50% headcount reduction
        - Mass layoffs (8,800→4,300) create retention risk for remaining employees
        - Likely
        - Medium
        - No disclosed retention program or morale initiative following restructuring
