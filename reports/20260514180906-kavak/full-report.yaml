      - threshold / event
      - action implication
    claimRefs:
      - CR004
      - CR031
      - CR039
      - CR045
    rows:
      - - Valuation / down-round risk
        - Implied enterprise value at next fundraise or secondary transaction
        - Valuation at or below $1.5B or inability to raise fresh equity by Q4 2026
        - Thesis break — equity write-down probable; exit or debt-restructuring scenario
      - - NPL / credit loss risk (Kuna Capital)
        - Kuna Capital default rate quarter-over-quarter as disclosed in data room
        - NPL rate exceeds 5% or disclosed write-downs exceed $50M in any single quarter
        - Thesis break — credit arm impairs core business; reassess as vehicle marketplace without FinTech multiple
      - - Mexico regulatory disruption
        - CNBV enforcement action, license review, or Ley Fintech amendment
        - Any adverse ruling affecting Kuna Capital lending license or operating scope
        - Thesis break — Mexico FinTech revenue at risk; may divert to pure marketplace model
      - - Profitability timeline miss
        - Company EBITDA as reported in management accounts or audited financials
        - EBITDA still negative by end of Q1 2026 (six months after targeted milestone)
        - Monitoring signal — capital raise timeline likely accelerates; covenant risk increases substantially
