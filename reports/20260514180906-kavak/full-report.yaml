            body: >-
              Kavak's execution risk is documented: the company exited Colombia in 2022 and Peru in 2024 after
              committing capital to both markets, writing off those investments without disclosed recovery values. The
              Colombia exit followed broader 2022 restructuring including a 50% workforce reduction from approximately
              8,800 to 4,300 employees. The headcount halving creates dual operational risk: the surviving team is under
              heightened pressure to deliver profitability with fewer resources, and institutional knowledge from
              departed employees may not be recoverable. Inventory risk is an underappreciated second-order risk: Kavak
              acquires used vehicles at AI-generated prices and reconditions them before listing; a sharp macro
              devaluation — as seen in Argentina and Turkey — can push inventory carrying values above achievable sale
              prices, forcing write-downs. Kavak's Mexico reconditioning hub processes approximately 3,500 vehicles per
