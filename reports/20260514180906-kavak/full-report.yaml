            body: >-
              Kavak go-to-market motion is digital-first with physical reconditioning hubs as anchor infrastructure.
              Demand generation relies on digital channels (SEO, performance marketing, social media), plus
              high-visibility sports sponsorships: Kavak is the shirt sponsor of the Argentine Football Association
              (AFA) national team and has sponsored the Mexican Football Federation (FMF) and NFL partnerships. These
              sponsorships serve brand-building in mass consumer markets where used-car purchasing is still primarily
              relationship-driven and informal. Customer acquisition cost is not publicly disclosed. Sales cycle is
              compressed by Kavak non-negotiable AI pricing: the AI algorithm issues an instant offer, reducing
              back-and-forth negotiation. Management has stated that the AI model was trained on public automotive data
              and proprietary transaction history. Inventory turnover improved to 3.5x faster than the prior year as of
              April 2025, according to company statements, suggesting CAC/inventory carrying cost efficiency has
              improved post-restructuring. Financing attach rate of approximately 70% in Mexico is a proxy for customer
              stickiness and the bundling efficiency of the in-house lending product. The formal used-car market in
              Mexico represents roughly 1 million transactions annually versus an estimated 5–6 million informal
              peer-to-peer transactions, meaning Kavak addressable formal share is limited and channel economics are
              constrained by the informal market substitute.
