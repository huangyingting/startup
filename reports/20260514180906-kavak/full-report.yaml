  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue streams, pricing model, and revenue mix
        blocks:
          - type: paragraph
            body: >-
              Kavak primary revenue stream is used-car sales. The company buys vehicles directly from consumers,
              reconditions them through proprietary 240-point inspection centers, and resells them at a markup. The
              exact gross margin per vehicle is not publicly disclosed; comparable public company Carvana reported GPU
              (gross profit per unit) of approximately $3,000–$4,000 in 2023–2024 after its restructuring, as disclosed
              in Carvana SEC 10-K filings accessible via SEC EDGAR. Mexico is the largest market at approximately 60% of
              total business based on Kavak own disclosures, with Brazil second, followed by Argentina, Chile, Turkey,
              and the UAE cluster. The second revenue stream is financial services through Kuna Capital (rebranded Kavak
              Crédito in November 2025). Approximately 70% of Mexico sales include in-house financing at 14–20% annual
              interest rates. Kuna Capital has disbursed approximately $1 billion in cumulative loans since inception.
              Interest income and potential securitization of loan portfolios represent meaningful revenue, but neither
              the loan book outstanding, NPL rate, nor interest margin is publicly disclosed. A third, smaller revenue
              stream is vehicle inspection and certification fees charged to third-party sellers through a
              consumer-facing inspection service mentioned in Argentine press coverage. Revenue recognition is likely
              recognized at point of sale for vehicle transactions and on an accrual basis for interest income, though
              no audited revenue recognition policy has been disclosed. The revenue mix between vehicle sales and
              financial services is not publicly broken out.
            claimRefs:
