      - number: '6.5'
        title: Adverse signals, customer complaints, and concentration risk
        blocks:
          - type: paragraph
            body: >-
              Kavak's customer base carries meaningful concentration risk and a documented history of service failures.
              Geographic concentration is severe: Mexico accounts for an estimated 60% or more of total activity, making
              aggregate customer traction a function of a single market's regulatory, macroeconomic, and competitive
              environment. Service quality issues emerged in 2022 when pandemic-related government office restrictions
              (required for title transfer processing) caused delivery delays of up to several months. Online customer
              complaints about slow delivery were documented during this period; the company acknowledged the
              operational challenges, stating it 'had to catch up on how we managed the company, how we allocated
              resources.' Kavak's 75% valuation decline from $8.7 billion in September 2021 to $2.2 billion in April
              2025 reflects investor-level adverse sentiment driven partly by operational execution failures and market
              exits. The company exited Colombia and Peru, confirming that customer volumes in those markets were
              insufficient to sustain the capital-intensive reconditioning model. Bloomberg Línea reported on the
              valuation haircut as a confirmation of fundamental re-rating. Restofworld.org (2022) documented
              operational troubles comprehensively, including delivery delays and workforce restructuring. No individual
              named customer data, audited customer count, or independent customer satisfaction survey has been made
              public, creating a concentrated verification risk: if Kavak exits additional markets or Mexico's
              informal-to-formal transition stalls, the claimed customer-base scale cannot be independently verified or
              relied upon.
