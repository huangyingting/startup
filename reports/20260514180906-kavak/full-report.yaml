      - number: '4.6'
        title: 'Financial verdict: revenue quality, margin path, capital intensity, and diligence blockers'
        blocks:
          - type: paragraph
            body: >-
              Revenue quality is UNCERTAIN. Vehicle-sales revenue is directionally visible from unit volumes and market
              pricing, but gross margin per vehicle is not disclosed. Financial-services revenue from Kuna Capital
              interest income could be the higher-quality sustainable margin stream, but the loan book outstanding, NPL
              rate, and cost of debt are all private. The 70% financing attach rate in Mexico is a strong indicator of
              revenue diversification into financial services, but interest margin quality depends on NPL performance —
              especially critical given that Kavak states ~40% of borrowers have no prior credit history. Margin path is
              UNVERIFIED. CEO-stated EBITDA profitability in some markets is a company claim with no independent audit
              or investor statement corroborating it. Full profitability by end-2025 is a target, not confirmed fact.
              Capital intensity is VERY HIGH. The reconditioning model requires CAPEX-heavy physical infrastructure per
              market; this caused Colombia and Peru exits and constrains the pace of international expansion. Comparable
              public company Carvana required a near-bankruptcy restructuring in 2022 before achieving sustainable GPU;
              Kavak faces the same structural risk without public metrics to track. Diligence blockers: (1) No audited
              financials for any period. (2) No disclosed revenue, GMV, or EBITDA. (3) No Kuna Capital loan book quality
              data (NPL rate, weighted average interest rate, cost of debt). (4) No unit economics (GPU, reconditioning
              cost per vehicle, CAC). (5) CEO profitability claims are unverified. Any underwriting decision based
              solely on disclosed public information would carry very high financial uncertainty. AUTO1 Group EBITDA
              profitability (documented on their investor relations site) provides the closest external proof-of-concept
              that the model works, but the LatAm context differs materially.
