  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk taxonomy and overview
        blocks:
          - type: paragraph
            body: >-
              Kavak's risk landscape encompasses five interlocking categories that investors must weigh jointly.
              Financial and capital risk is the most immediately pressing: the company raised $127M at a $2.2B valuation
              in April 2025, a 75% decline from its September 2021 peak of $8.7B, while carrying approximately $1.2B in
              aggregate debt and remaining unprofitable at the company level. Regulatory and legal risk is structurally
              elevated because Kavak's FinTech lending arm (Kuna Capital/Kavak Crédito) operates under CNBV supervision
              in Mexico and faces analogous regulatory frameworks in Argentina, Turkey, Chile, and the Gulf states.
              Operational risk is evidenced by the 2022 and 2024 market exits from Colombia and Peru respectively, the
              halving of the workforce from approximately 8,800 to 4,300 employees, and documented customer-service
              failures in 2022. Competitive and macro risk persists from the informal 85–90% cash-based Mexican used-car
              market, the entry of digital classifieds competitors, and the structural distortions caused by the "autos
              chocolate" import liberalization. Technology and people risk is concentrated around a single founder-CEO,
              undisclosed security posture, and reliance on a proprietary AI pricing model. The risk heatmap (FR001)
              provides a severity-versus-likelihood mapping across these five categories, with credit/NPL risk and
              currency devaluation risk falling in the most critical quadrant.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR006
              - CR007
