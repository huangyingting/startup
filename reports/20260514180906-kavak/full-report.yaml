      - number: '5.6'
        title: Trust, safety, compliance, and quality controls
        blocks:
          - type: paragraph
            body: >-
              Trust infrastructure is central to Kavak value proposition in markets where the traditional used-car trade
              carries a 40% fraud rate. The company has built a multi-layer quality and compliance architecture covering
              the physical inspection and reconditioning process, legal title verification, post-sale warranty
              obligations, consumer protection certifications, and digital security.


              In Mexico, Kavak holds the Profeco Distintivo Digital -- a certification granted by Mexico Federal
              Consumer Protection Agency. This certification requires adherence to a digital commerce ethics code,
              attendance at all consumer conciliation hearings, absence of outstanding Profeco fines, and a valid
              website security certificate. Importantly, the Distintivo Digital is based on self-regulation: Profeco has
              no mechanism to continuously monitor compliance. El Economista reported in 2022 that Kavak retained this
              certification while facing a rising absolute count of consumer complaints, a tension that Tec-Check
              director called an ethics concern. Consumer advocacy critics argue Kavak was aware of service quality
              problems driven by rapid expansion but continued scaling rather than consolidating.


              Despite the adverse signals, Kavak achieved a near-100% conciliation rate on formal Profeco complaints --
              recognized in a public 2023 Profeco endorsement as one of the best conciliation records in Mexico. The
              Profeco director on-site visit and endorsement of the Lerma facility represented an unusual public
              alignment between regulator and private platform.


              Post-sale protections vary by market: Argentina offers a 7-day no-questions return window plus mechanical
              warranty options; Mexico offers a mechanical warranty period on sold vehicles. Trustpilot reviews for
              kavak.com show a mixed picture, with multiple 2024 reviews citing frustration with vehicle quality after
              purchase and financing disputes, particularly from UAE and Turkey customers. Independent certification of
              the 240-point inspection by a third-party automotive engineering firm has not been publicly disclosed and
              represents a key diligence gap.
            claimRefs:
              - CE014
              - CE015
              - CE021
              - CE022
              - CE025
              - CE026
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer segmentation and addressable market
        blocks:
          - type: paragraph
            body: >-
              Kavak serves three primary customer archetypes across its Latin American markets. The first is the
              first-time car buyer who has never previously owned a vehicle: company statements report that
              approximately 40% of Kavak Mexico buyers are making their first-ever car purchase. The second is the
              unbanked or underbanked borrower: approximately 40% of Kavak Crédito applicants have no prior credit
              history, reflecting a deliberate financial-inclusion mandate. The third is the middle-class aspirational
              buyer seeking a formal, certified alternative to Mexico's predominantly informal peer-to-peer used-car
              market, where roughly 85–90% of transactions remain cash-based and undocumented. On the sell side, Kavak
              targets private vehicle owners seeking speed and transparency — the company claims sellers can complete a
              transaction in under 30 minutes via its digital platform. The customer population skews under-30: younger
              urban consumers who are digitally native but historically excluded from bank-originated auto loans. The
              addressable population is large: only approximately 1.5 of every 10 Mexicans own a car compared with 7 of
              10 in the United States, indicating structural demand far from saturation. Kavak's 2023 data showed the
              share of financed buyers with financial dependents rose from 36% to 45%, signaling penetration of
              family-stage middle-class consumers is accelerating.
