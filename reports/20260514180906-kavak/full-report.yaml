              - CR003
              - CR004
              - CR040
          - type: callout
            title: Mexico concentration is both the greatest asset and the greatest risk
            body: >-
              Approximately 60% of Kavak's business is concentrated in Mexico, where its 70% financing attach rate and
              certified reconditioning model are genuinely differentiated. But this concentration means any adverse
              regulatory development (CNBV action, Ley Fintech amendment, "autos chocolate" price pressure) or macro
              event (peso devaluation, Banxico rate hike) disproportionately impairs the total business. Investors
              should monitor Mexico quarterly as a leading indicator for the entire portfolio.
            calloutType: insight
            claimRefs:
              - CR008
              - CR021
              - CR024
              - CR026
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment recommendation and valuation stance
        blocks:
          - type: paragraph
            body: >-
              Based on available public evidence as of May 2026, the recommended stance on Kavak is 'track' — monitor
              closely but refrain from committing new equity capital until two conditions are met: (1) audited or
              independently verified EBITDA-positive results at the company level, and (2) transparent disclosure of the
              Kuna Capital non-performing loan rate and reserve coverage ratio. The medium confidence reflects genuine
              uncertainty: Kavak operates in a structurally attractive market (Mexico's used-car penetration via digital
              channels remains below 2%), has demonstrated scale (6.9M monthly web visits, approximately 66% from
              Mexico), and retains the backing of Tier-1 global investors including SoftBank, General Atlantic,
              Andreessen Horowitz (entered 2024), Founders Fund, Tiger Global, and Kaszek. However, the high risk rating
              is justified by four compounding factors. First, the April 2025 round carried no external investors,
              indicating that the clearing price for new equity is meaningfully below $2.2B in the open market. Second,
              total outstanding debt of approximately $1.2B creates a priority claim ahead of equity holders in any
              adverse scenario. Third, the company has not published audited financials for any year since inception,
              making independent valuation highly uncertain. Fourth, the Argentina, Turkey, and multi-market currency
              exposures introduce structural unpredictability in returns. The valuation stance is 'stretched': the $2.2B
              implicitly assumes a revenue multiple broadly consistent with Carvana or AUTO1 Group, yet both are
              publicly listed with transparent financials and mature regulatory standards. A fair entry for a
              sophisticated investor in a secondary or structured transaction would require a 20-35% discount to the
              April 2025 mark, or a meaningful ratchet tied to profitability milestones.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
          - type: table
            tableRef: TV001
            claimRefs: []
          - type: figure
            figureRef: FV001
            claimRefs: []
      - number: '8.2'
        title: Financing context, capital structure, and preference overhang
        blocks:
          - type: paragraph
            body: >-
              Kavak's April 2025 round is the most analytically revealing capital event in the company's history. The
              $127M raise at $2.2B post-money was structured as an insider-only round that closed in March 2025 — before
              the Trump tariff shock of April 2025 — with SoftBank and General Atlantic as the sole equity participants.
              The CEO explicitly described it as a "small exclusive round for internal investors" in which the company
              was "not very price sensitive," suggesting the valuation was set to minimise mark-to-market impact rather
              than reflect a true market clearing price. Contemporaneously, Goldman Sachs and HSBC each committed $200M
              in working-capital credit lines to Kuna Capital, structured as debt facilities rather than equity. These
              facilities bring total estimated outstanding debt to approximately $1.2B when combined with the legacy
              $810M credit facility raised in 2021 from HSBC, Goldman Sachs, and Santander. The equity preference
              overhang is material: Kavak's estimated $1.9B in total equity raised across all rounds includes
              liquidation preferences from multiple series. In a below-$2.2B exit scenario, common equity holders and
              later-stage employees with stock options may receive zero recovery. CB Insights records $3.929B in total
              capital raised including debt as of Q1 2025. The company's stated IPO preparation horizon of three to five
              years implies a 2027-2030 liquidity window — an extended hold period during which downside scenarios may
              materialise. Capital intensity remains high: reconditioning hubs, inventory financing, and credit
              origination all require working capital not self-funded by operating cash flow at this stage. The 2022
              restructuring (halving headcount from approximately 8,800 to 4,300 employees, exiting Colombia and Peru)
              demonstrated willingness to reduce burn, but also vulnerability to macro tightening. The two 2025 credit
              lines — Goldman and HSBC, $200M each — signal institutional lender confidence in the Kuna Capital credit
              book, but rank senior to equity in any recovery waterfall.
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
          - type: table
            tableRef: TV002
            claimRefs: []
          - type: figure
            figureRef: FV004
            claimRefs: []
      - number: '8.3'
        title: Comparable valuation analysis
        blocks:
          - type: paragraph
            body: >-
              Kavak's $2.2B valuation can be assessed against a set of publicly traded and privately marked comparable
              companies across the used-car e-commerce and digital automotive marketplace sector. The most structurally
              similar public company is Carvana (NYSE:CVNA), a US-based online used-car marketplace that nearly
              collapsed in 2022 before a debt restructuring in 2023 and subsequent market cap recovery to approximately
              $30B by mid-2025. At approximately $13.7B revenue in 2024, Carvana trades at approximately 2.2x EV/Revenue
              — a premium reflecting US market scale, full public disclosure, and demonstrated profitability recovery.
              Applying even a 60% emerging-market discount to Carvana's multiple yields an implied valuation of
              approximately $1.3-2.5B for Kavak at a $1.5B revenue estimate, broadly consistent with the $2.2B mark but
              indicating minimal margin of safety. AUTO1 Group (Frankfurt: AG1), Europe's largest digital automotive
              platform, reported revenues of approximately EUR 6.5B in 2023 and trades at a 0.5-0.7x EV/Revenue multiple
              given sustained losses. CarMax (NYSE:KMX), the largest US used-car dealer with approximately $26B revenue,
              trades at roughly 0.5x revenue reflecting offline-heavy unit economics. In emerging markets, Spinny
              (India) was valued at approximately $1.8B in its 2022 Series E and has not disclosed a downward mark as of
              May 2026. Cars24 (India) was last marked at approximately $1.84B in 2023 following a down-round from a
              $3.3B peak — a trajectory directly comparable to Kavak's. OLX Autos, the classifieds-to-transactional
              pivot, was wound down by 2022-2023, its assets absorbed into AutoHero, serving as a cautionary example of
              margin compression in transactional used-car models. Kavak's $2.2B represents a premium to the India peers
              on an absolute basis, partially justified by Mexico's larger addressable market and Kavak's longer
              operating history, but the risk-adjusted discount should be higher for Kavak given multi- market
              complexity and opaque financials. The enumerated comparable table provides a row-by-row assessment of each
              peer.
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
            tableRef: TV004
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV026
              - CV027
          - type: figure
            figureRef: FV002
            claimRefs: []
      - number: '8.4'
        title: Bull, base, and bear scenarios with valuation ranges
        blocks:
          - type: paragraph
            body: >-
              Three scenarios capture the distribution of outcomes for Kavak equity over a three-to-five-year investment
              horizon, consistent with the CEO's stated IPO preparation window. The bull case assumes Kavak achieves
              company-level EBITDA profitability by end-2025 (per stated target), sustains double-digit GMV growth in
              Mexico, successfully monetises the Kuna Capital credit book at sub-5% NPL rates, and executes an IPO or
              strategic sale in the 2027-2028 window at 2-3x EV/Revenue, implying a $3.5-6B equity valuation range. This
              scenario requires no material NPL spike, continued Mexico market share gains, and a global risk-appetite
              recovery for EM growth equity. The base case assumes EBITDA break-even by mid-2026 (six-month slip from
              target), Mexico dominance maintained but with margin pressure from competitors, and a 2028-2029 IPO at
              approximately 1.5x EV/Revenue, implying a $1.8-3.0B valuation range roughly consistent with the April 2025
              mark. The bear case assumes EBITDA break-even is not achieved through 2026, the Kuna Capital NPL rate
              spikes above 8-10%, lender covenants are triggered, a further equity down-round is required at sub-$1.5B
              valuation, and competitive intensity from Mercado Libre or OLX erodes Mexico pricing power. In this
              scenario, equity value could be $600M-$1.4B after additional dilution. The probability-weighted expected
              valuation across scenarios is approximately $2.1-2.5B, suggesting the current $2.2B mark is fair but with
              asymmetric downside risk — bear outcomes destroy significantly more equity than bull outcomes create. Key
              downside triggers include a Mexico macro recession, a CNBV enforcement action against Kuna Capital, or
              "autos chocolate" import competition driving used-car price deflation. The valuation range figure maps
              three scenarios with low-base-high bounds.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
          - type: table
            tableRef: TV003
            claimRefs: []
          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.5'
        title: Exit readiness, thesis-break triggers, and final diligence asks
        blocks:
          - type: paragraph
            body: >-
              Kavak's readiness for a public exit or strategic sale in the stated 3-to-5-year window requires resolution
              of several structural conditions. First, the company must publish audited financials for at least two
              consecutive years — a minimum bar for any credible public offering on the Mexican BMV/BIVA, US
              NYSE/NASDAQ, or an emerging-market exchange. No audited annual report has been publicly disclosed as of
              May 2026. Second, the Kuna Capital credit book must demonstrate NPL rates and reserve coverage ratios that
              satisfy institutional fixed-income investors; the absence of this data is the single most blocking
              information gap. Third, the company's multi-market operational complexity across Mexico, Argentina,
              Brazil, Turkey, UAE, Saudi Arabia, and Oman must be streamlined so that consolidated financials are
              interpretable to public-market investors. Fourth, the debt stack of approximately $1.2B must be refinanced
              or reduced as a precondition for a clean IPO equity story. The thesis-break triggers table maps specific
              events that would invalidate the investment case. The most critical is a missed end-2025 profitability
              target paired with another insider-only down round, which would indicate that the private-market price
              discovery mechanism has broken down entirely. A secondary trigger is a CNBV supervisory action against
              Kuna Capital, which would simultaneously impair the fintech revenue stream and raise regulatory compliance
              costs. Strategic sale pathways exist — potential acquirers include automotive OEMs, global financial
              services platforms, or EM mobility platforms — but at $2.2B the price likely exceeds what a trade buyer
              would pay without a meaningful discount to the insider mark. The final diligence asks enumerate the six
              most critical information requests for any prospective investor conducting serious due diligence.
            claimRefs:
              - CV039
              - CV040
              - CV041
              - CV042
              - CV043
              - CV044
              - CV045
          - type: table
            tableRef: TV005
            claimRefs: []
          - type: table
            tableRef: TV006
            claimRefs: []
