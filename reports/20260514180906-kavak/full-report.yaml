      - number: '7.2'
        title: Regulatory, legal, and compliance risks
        blocks:
          - type: paragraph
            body: >-
              Mexico represents approximately 60% of Kavak's business activity, making Mexican regulatory developments
              the highest-priority risk vector. Kuna Capital, the FinTech lending entity behind Kavak Crédito, is
              subject to Mexico's Ley Fintech (Financial Technology Institutions Law) and CNBV oversight. While no
              enforcement action or license suspension is on public record, the credit book size and NPL rates are
              undisclosed, preventing independent verification of regulatory compliance metrics. The 2022 liberalization
              of "autos chocolate" rules — allowing US-imported vehicles to be registered in Mexico at discounted prices
              — creates an ongoing competitive pricing threat for Kavak's inventory. Mexico's LFPDPPP (Federal Law on
              Personal Data Protection) applies to Kavak's extensive collection of customer PII (credit applications,
              identity documents, income verification); no third-party data-privacy audit has been disclosed. In
              Argentina, Banco Central de la República Argentina (BCRA) capital controls restrict the repatriation of
              funds, complicating USD-peso financial flows from the "Dólar Kavak" mechanism. In Turkey, structural
              inflation exceeding 78.6% in 2022 and continued currency instability through 2025 create a materially
              adverse operating environment; Kavak's Turkey entity (kavak.com/tr) is exposed to lira devaluation without
              disclosed hedging. The regulatory risk register (TR001) maps these jurisdiction-level obligations,
              estimated severity, and the corresponding diligence paths for unresolved items.
