      - number: '6.4'
        title: Retention, satisfaction, and loyalty signals
        blocks:
          - type: paragraph
            body: >-
              Kavak's retention and satisfaction evidence is qualitative and largely company-sourced. The strongest
              independent validation is a positive mention from Mexico's consumer protection agency PROFECO, which cited
              Kavak for its customer conciliation processes — a meaningful signal in a market where used-car fraud and
              disputes are common. Customer testimonials in Argentine media (Infobae December 2024, June 2025) describe
              satisfaction with the Dólar Kavak USD-linked payout model and the speed of transactions. The 70% financing
              attach rate in Mexico creates a structural retention mechanism: buyers who finance through Kavak Crédito
              are anchored to the platform for the loan duration, typically 24–60 months, generating an ongoing service
              relationship. In Argentina, financing penetration grew from approximately 20–25% to approximately 50% of
              Kavak sales between June 2024 and early 2025, suggesting deepening customer engagement in secondary
              markets. Kavak's permuta (trade-in/swap) functionality allows existing buyers to return and exchange
              vehicles, creating a structural repeat-purchase mechanism. Approximately 70% of Kavak Crédito applicants
              are pre-approved, creating a high-conversion onboarding funnel. However, no NRR, GRR, churn rate, cohort
              retention data, NPS score, or contract renewal figures have been publicly disclosed. The absence of
              audited retention metrics is a material diligence gap for assessing the sustainability and compounding
              value of the customer base. The 7-day return policy and warranty program provide post-purchase confidence
              but are standard market features rather than differentiated loyalty instruments.
