      - number: '4.3'
        title: Cost structure, gross margin drivers, working capital, and capex
        blocks:
          - type: paragraph
            body: >-
              Kavak cost of goods sold consists primarily of vehicle acquisition cost, reconditioning spend per unit,
              logistics, and warranty reserves. None of these line items are publicly disclosed as absolute figures.
              Industry benchmarks for reconditioning cost range from $1,000 to $3,000 per vehicle depending on condition
              and market. Kavak processes 3,500 vehicles per month through its Mexico facility and has a large São Paulo
              hub funded by a $500 million investment in Brazil. SG&A includes headcount costs for approximately 4,300
              employees (down from a peak of ~8,800 post-restructuring), digital marketing, and sports sponsorship fees.
              Capital expenditure is structurally high: each new market requires a reconditioning center, logistics
              network, and regulatory licensing. The Brazil hub alone required $500 million in committed capital. This
              capital intensity was the proximate driver of exits from Colombia and Peru, where unit volumes were
              insufficient to justify fixed infrastructure. Working capital is significant: Kavak finances its vehicle
              inventory typically 30–90 days before resale. The $810 million debt facility (HSBC, Goldman Sachs,
              Santander, September 2022) primarily funds vehicle inventory and Kuna Capital loan origination. An
              additional $400 million in credit lines was announced in April 2025 ($200M Goldman, $200M HSBC)
              specifically for Kuna Capital loan book expansion. Peak quarterly burn was $86 million in Q1 2022;
              restructuring reduced this materially, but current burn rate is not publicly disclosed.
