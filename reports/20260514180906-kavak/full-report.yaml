  - id: FE001
    title: Kavak product and technology architecture (stack)
    type: stack
    description: >-
      Five-layer architecture from customer-facing digital channels through physical vehicle operations to the data and
      financial services backbone. Each layer is interdependent -- the AI pricing engine feeds both the marketplace and
      the credit engine; reconditioning centers feed the marketplace inventory.
    data:
      layers:
        - label: Customer Channels
          modules:
            - Web Platform (kavak.com and market subdomains)
            - Mobile App (iOS and Android)
            - Physical Hubs and Reconditioning Centers
          note: 6 active market domains; mobile app store listings returned 404 suggesting recent URL change
        - label: Platform Core
          modules:
            - Vehicle Marketplace (buy/sell listings)
            - Search and Discovery Engine
            - User Accounts and Transaction Management
          note: Core marketplace operational since 2016; exact tech stack undisclosed
        - label: Data and AI
          modules:
            - AI Pricing Algorithm (market plus internal data)
            - Credit Scoring and Underwriting Engine
            - Market Analytics and Demand Forecasting
          note: Algorithm trained on thousands of iterations; feeds both vehicle pricing and loan decisions
        - label: Vehicle Operations
          modules:
            - 240-Point Inspection System
            - Reconditioning Workshop Network (Lerma MX 3500 units/mo; Sao Paulo BR)
            - Logistics and Hub-to-Hub Transport
          note: Primary physical moat; capital-intensive; Mexico hub endorsed by Profeco in 2023
        - label: Financial Services
          modules:
            - Kavak Credito -- Meses auto loan (launched Nov 2025)
            - Kavak Credito -- Prestamo equity release (launched Nov 2025)
            - Kuna Capital Backend and Debt-of-Funds Management
          note: Goldman Sachs and HSBC each extended $200M credit lines to Kuna Capital in Apr 2025
    notes: >-
      Stack architecture inferred from public statements, press releases, and blog content. Direct technical
      documentation not publicly available.
