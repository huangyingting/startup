            body: >-
              Kavak's consolidated debt position is approximately $1.2B, comprising an estimated $810M raised through
              2022 facilities and approximately $400M from the 2025 Goldman Sachs/HSBC credit package. The company has
              not achieved EBITDA profitability at the company level as of April 2025 and has publicly targeted end-2025
              for this milestone. Failure to reach that milestone would accelerate lender covenant scrutiny and
              equity-round pressure. Credit risk in the Kuna Capital lending book is a distinct embedded exposure: loans
              are originated to borrowers with no prior credit history at approximately 40% of applicant volume, and
              neither NPL rates nor write-down provisions have been publicly disclosed. Currency devaluation transmits
              across three risk channels simultaneously: (1) Argentine peso devaluation increases USD-linked Dólar Kavak
              payout costs; (2) Turkish lira devaluation erodes Turkey hub economics; and (3) elevated US Federal
              Reserve rates reduce global VC risk appetite and increase Kavak's dollar-denominated borrowing costs. The
              April 2025 insider-only down round — with no new external investor participating — signals that
              institutional risk appetite for Kavak equity has narrowed materially. The risk transmission map (FR002)
              traces how LatAm currency devaluation cascades into NPL increase, inventory value decline, reduced equity
              access, and ultimately heightened insolvency risk. The partner/dependency risk register (TR003) captures
