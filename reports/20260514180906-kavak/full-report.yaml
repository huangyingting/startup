      - number: '4.5'
        title: Capital adequacy and financing dependency
        blocks:
          - type: paragraph
            body: >-
              Kavak capital trajectory has been marked by large equity raises followed by a significant down-round. The
              April 2025 insider round raised $127M at a $2.2B valuation, led by SoftBank and General Atlantic — the
              same existing investors, indicating limited new external validation at current terms. Simultaneously,
              Goldman Sachs extended a $200M credit line to Kuna Capital and HSBC extended a separate $200M credit line,
              together adding $400M in debt capacity for loan origination. Earlier, in September 2022, Kavak secured an
              $810M debt facility from HSBC, Goldman Sachs, and Santander to fund vehicle inventory and lending
              operations. Peak quarterly cash burn reached $86M in Q1 2022; subsequent restructuring cut headcount by
              ~50% and exited Colombia and Peru, materially reducing the burn trajectory. The company has publicly
              stated a target of achieving profitability by end-2025, and claims some markets are already
              EBITDA-positive; neither claim has been independently verified. Cash on hand, current monthly burn, and
              runway in months are all undisclosed. The next-round trigger appears to be either an IPO (3–5 year horizon
              per CEO statements) or further debt for Kuna Capital as the loan book scales. Financing dependency is
              high: without the Goldman/HSBC credit lines, Kuna Capital cannot fund loan origination at current volumes.
              For details on historical round chronology see the Company Overview chapter; the key financial facts for
              capital adequacy purposes are independently sourced here. General Atlantic and SoftBank are among the
              major investors maintaining exposure through the down-round.
