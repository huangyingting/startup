callouts:
- calloutType: strength
  title: First-mover advantage in LatAm certified used-car market
  body: Kavak's integrated model—online buying/selling, reconditioning centers, and in-house financing—has no equivalent at
    scale in Latin America. The 70% financing attach rate in Mexico versus a 5% industry average is a durable competitive
    differentiator that also generates recurring lending revenue through Kuna Capital.
  claimRefs:
  - CO004
  - CO007
  - CO028
- calloutType: risk
  title: Valuation down-round and profitability timing uncertainty
  body: The April 2025 round at $2.2B was a 75% discount to the $8.7B peak. The company remains unprofitable annually on a
    consolidated basis, with CEO-stated target profitability across all markets by end of 2025. Investors should treat the
    profitability timeline as company-claimed and subject to independent verification.
  claimRefs:
  - CO015
  - CO018
  - CO038
- calloutType: risk
  title: Market exit precedent and reconditioning model scalability limits
  body: Kavak's January 2024 exits from Colombia and Peru demonstrate that the reconditioning-center model has significant
    fixed costs per market, limiting geographic scalability to markets where minimum viable transaction volumes can be achieved
    within a reasonable capital horizon.
  claimRefs:
  - CO024
  - CO025
- calloutType: insight
  title: Structural financing gap creates durable Kuna Capital moat
  body: With only 5% of LatAm used-car transactions financed (versus 90%+ in the US), Kavak's financial services arm addresses
    a structural credit gap. The 40% of Kavak Crédito applicants with no prior credit history illustrates the size of the
    underserved addressable market for in-house auto lending.
  claimRefs:
  - CO004
  - CO029
  - CO031
