- id: SO003
  title: Funding history, valuation trajectory, and investor base
  body: 'Kavak''s capital trajectory is among the most dramatic in Latin American startup history. The initial $3 million
    seed from Mountain Nazca in late 2016 was described as the largest seed round ever raised by a Latin American startup
    at the time. The Series D in April 2021 ($485M at $4B) and Series E in September 2021 ($700M at $8.7B) made Kavak the
    most valuable startup ever founded in Latin America and cemented its status as a category-defining company. The $8.7B
    peak reflected both the global ZIRP-era venture froth and genuine market excitement around the LatAm consumer technology
    opportunity.


    The subsequent correction has been severe. In September 2022, Kavak secured an $810 million debt facility from HSBC, Goldman
    Sachs, and Santander—the largest debt financing for a Latin American startup under ten years old—but by Q1 2022, the company
    had already burned $86 million in a single quarter through aggressive sports sponsorship contracts and rapid headcount
    scaling. By April 2025, Kavak raised $127 million at a $2.2 billion valuation, an insider round co-led by SoftBank and
    General Atlantic that represented a 75% valuation haircut from the $8.7B peak. Goldman Sachs and HSBC each provided separate
    $200 million credit lines to Kuna Capital at the same time. Total venture equity raised is approximately $1.5–1.6 billion;
    combined with the $810M debt facility, total financing exceeds $2.3 billion.


    Individual investors include Argentine basketball legend Manu Ginóbili and Formula 1 driver Sergio ''Checo'' Pérez, illustrating
    the sports-marketing alignment embedded in the capital structure. An IPO is targeted within a three-to-five year horizon
    per CEO statements in April 2025.'
