company:
  name: Kavak
chapter:
  number: 1
  title: Company Overview
  summary: Kavak is a Mexican used-car e-commerce platform founded in October 2016 that became Latin America's most valuable
    startup at its $8.7 billion peak valuation in September 2021. The company operates an integrated model covering online
    buying, selling, reconditioning, and financing across Mexico, Brazil, Argentina, Chile, Turkey, and the UAE, but saw its
    valuation cut to $2.2 billion in April 2025 amid disciplined cost reduction and a push toward profitability.
sections:
- id: SO001
  title: Identity, headquarters, and operating model
  body: 'Kavak was incorporated in October 2016 in Mexico City under the legal entity Uvi Tech, S.A.P.I. de C.V., with its
    registered address at Carretera Amomolulco - Capulhuac, No. 1 Col. El Panteón, Lerma de Villada, Estado de México. The
    company operates as a vertically integrated used-car marketplace: it buys vehicles directly from consumers, reconditions
    them through proprietary inspection centers, and resells them with optional in-house financing. As of 2026, Kavak is a
    late-stage private company targeting profitability across all markets and an IPO within three to five years.


    The core product is built around three structural differentiation points. First, every vehicle sold by Kavak undergoes
    a 240-point inspection before listing; this eliminates the fraud and quality uncertainty endemic to informal peer-to-peer
    markets that represent approximately 90% of used-car transactions in Latin America. Second, Kavak''s proprietary AI pricing
    algorithm generates non-negotiable offer prices using publicly available automotive data and internal transaction history,
    reducing negotiation friction. Third, the integrated financial arm—Kuna Capital, expanded into Kavak Crédito in November
    2025—provides in-house financing to approximately 70% of Mexico sales, versus a regional industry average of approximately
    5%. These three elements together create a full-stack model that incumbents cannot easily replicate without matching capital
    and operational infrastructure.


    Kavak''s headquarters and primary operations are in Mexico, which accounts for approximately 60% of total business. The
    company''s Mexican reconditioning center in the State of Mexico can process 3,500 vehicles per month. Brazil hosts the
    largest Latin American reconditioning center in São Paulo, funded by a $500 million investment. As of 2026, Kavak''s six
    active markets are Mexico, Brazil, Argentina, Chile, Turkey (as Carvak), and the UAE cluster (Oman and Saudi Arabia).'
