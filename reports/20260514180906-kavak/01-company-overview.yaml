- id: SO002
  title: Founders, leadership, and organizational context
  body: 'Kavak was co-founded by Carlos García Ottati (CEO), his sister Loreanne García Ottati, and Roger Laughlin Carvallo—all
    former operators at Linio Marketplace. Carlos holds an MBA from Oxford and has prior experience at McKinsey; Loreanne
    has an engineering degree from Universidad Simón Bolívar and an MBA from Stanford with prior experience at Coca-Cola FEMSA;
    Roger previously operated Groupon Brazil and Linio Mexico. The company made its first vehicle sale in October 2016 at
    3am with roughly seven cars on the platform.


    After aggressive headcount scaling during the 2021–2022 high-growth phase, Kavak''s workforce peaked at approximately
    8,800 employees. A restructuring program cut headcount by approximately 50% to around 4,300 employees. Key-person dependence
    on CEO Carlos García Ottati remains significant: he is the primary public spokesperson, fundraiser, and strategic decision-maker
    across all six markets. The founding family retains meaningful influence through Carlos and Loreanne''s continued operating
    roles. The broader leadership team operates across Mexico City headquarters and regional hubs in São Paulo, Buenos Aires,
    Santiago, Istanbul, and Dubai.'
  claimRefs:
