  evidenceGaps:
    - type: missing-source
      severity: minor
      topic: April-2025-round-external-investors
      missingEvidence: >-
        No independent source confirms whether any new external institutional
        investor participated in the April 2025 $127M round, beyond the
        known insider participants (SoftBank, General Atlantic).
      whyItMatters: >-
        The absence of new external investors would confirm that broad
        institutional appetite for Kavak equity has closed, materially
        strengthening the risk thesis.
      diligencePath: >-
        Request cap table update and investor list from Kavak's investor
        relations; cross-reference with PitchBook investor transaction log.
      relatedQuestionRefs:
        - QR023

    - type: stale
      severity: minor
      topic: regulatory-developments-Mexico-2026
      missingEvidence: >-
        No 2026-dated source confirms the current status of Ley Fintech
        amendments, CNBV regulatory guidance changes, or "autos chocolate"
        SAT rule modifications as of the report date.
      whyItMatters: >-
        Mexican FinTech and automotive-import regulation evolves rapidly;
        a new CNBV circular or SAT amendment in 2025–2026 could materially
        alter Kavak's regulatory exposure.
      diligencePath: >-
        Monitor CNBV official communications (cnbv.gob.mx), SAT press
        releases, and El Economista regulatory beat for Q1–Q2 2026 updates.
      relatedQuestionRefs:
        - QR025
      relatedTableRefs:
        - TR001

    - type: missing-source
      severity: minor
      topic: comparative-LatAm-fintech-regulatory-risk
      missingEvidence: >-
        No comparative analysis of CNBV or equivalent enforcement actions
        against LatAm FinTech lenders (Konfío, Kueski, Creditas) in public
        sources was identified during research.
      whyItMatters: >-
        Understanding the regulatory risk environment for LatAm FinTech
        credit operators would contextualize Kavak's exposure relative to
        peers who have faced enforcement actions.
      diligencePath: >-
        Search CNBV enforcement register; review Konfío, Kueski, and
        Creditas press coverage for any license-related regulatory actions.
      relatedQuestionRefs:
        - QR030

    - type: private-evidence-only
      severity: material
      topic: Kuna-Capital-NPL-credit-quality
      missingEvidence: >-
        No NPL rate, default rate, credit loss provision, or portfolio-
        vintage data for the Kuna Capital loan book has been publicly
        disclosed by Kavak in any market or language.
      whyItMatters: >-
        With over $1B disbursed to subprime borrowers, even a 5% NPL rate
        implies $50M+ in credit losses that are fully opaque from the outside.
        The credit arm's health is the most critical missing variable in
        Kavak's risk profile.
      diligencePath: >-
        Request Kuna Capital management accounts with NPL vintage data by
        cohort (2021–2025), write-down policy, and cost-of-funds breakdown
        as a prerequisite for any investment commitment.
      relatedQuestionRefs:
        - QR017
      relatedTableRefs:
        - TR003

    - type: private-evidence-only
      severity: material
      topic: audited-financial-statements-absent
      missingEvidence: >-
        Kavak does not publish audited financials, quarterly management
        accounts, or any EBITDA/revenue disclosures accessible to external
        stakeholders.
      whyItMatters: >-
        Without financial disclosure, investors cannot verify the
        profitability trajectory, debt covenant compliance, or cash runway
        independently; all claims about end-2025 profitability are
        unverifiable from public sources alone.
      diligencePath: >-
        Request audited financial statements (2022–2025) for Kavak
        consolidated entity and Kuna Capital separately as a minimum
        data-room requirement before any funding decision.

