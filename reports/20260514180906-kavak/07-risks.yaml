company:
  name: Kavak
chapter:
  number: 7
  title: Risks
  summary: >-
    Kavak's risk profile is anchored by three compounding exposures: a 75%
    valuation haircut ($8.7B → $2.2B), approximately $1.2B in total debt
    outstanding, and unachieved company-level profitability as of April 2025.
    Regulatory risk is material — Mexico's CNBV oversight of Kuna Capital,
    evolving "autos chocolate" import rules, and capital-control regimes in
    Argentina all threaten core economics. Operational risk is evidenced by
    the Colombia and Peru market exits and a 50% workforce reduction. Mitigation
    is underway through a strategic retreat to core markets and a targeted
    end-2025 profitability push, but residual financial and execution risk
    remains high without audited disclosure of NPL rates or a credible
    de-leveraging timeline.
sections:
  - id: SR-S001
    title: Risk taxonomy and overview
    body: >-
      Kavak's risk landscape encompasses five interlocking categories that
      investors must weigh jointly. Financial and capital risk is the most
      immediately pressing: the company raised $127M at a $2.2B valuation in
      April 2025, a 75% decline from its September 2021 peak of $8.7B, while
      carrying approximately $1.2B in aggregate debt and remaining unprofitable
      at the company level. Regulatory and legal risk is structurally elevated
      because Kavak's FinTech lending arm (Kuna Capital/Kavak Crédito) operates
      under CNBV supervision in Mexico and faces analogous regulatory frameworks
      in Argentina, Turkey, Chile, and the Gulf states. Operational risk is
      evidenced by the 2022 and 2024 market exits from Colombia and Peru
      respectively, the halving of the workforce from approximately 8,800 to
      4,300 employees, and documented customer-service failures in 2022.
      Competitive and macro risk persists from the informal 85–90% cash-based
      Mexican used-car market, the entry of digital classifieds competitors,
      and the structural distortions caused by the "autos chocolate" import
      liberalization. Technology and people risk is concentrated around a
      single founder-CEO, undisclosed security posture, and reliance on a
      proprietary AI pricing model. The risk heatmap (FR001) provides a
      severity-versus-likelihood mapping across these five categories, with
      credit/NPL risk and currency devaluation risk falling in the most
      critical quadrant.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR006
      - CR007
      - CR020
    figureRefs:
      - FR001

  - id: SR-S002
    title: Regulatory, legal, and compliance risks
    body: >-
      Mexico represents approximately 60% of Kavak's business activity, making
      Mexican regulatory developments the highest-priority risk vector.
      Kuna Capital, the FinTech lending entity behind Kavak Crédito, is
      subject to Mexico's Ley Fintech (Financial Technology Institutions Law)
      and CNBV oversight. While no enforcement action or license suspension is
      on public record, the credit book size and NPL rates are undisclosed,
      preventing independent verification of regulatory compliance metrics.
      The 2022 liberalization of "autos chocolate" rules — allowing US-imported
      vehicles to be registered in Mexico at discounted prices — creates an
      ongoing competitive pricing threat for Kavak's inventory. Mexico's
      LFPDPPP (Federal Law on Personal Data Protection) applies to Kavak's
      extensive collection of customer PII (credit applications, identity
      documents, income verification); no third-party data-privacy audit
      has been disclosed. In Argentina, Banco Central de la República Argentina
      (BCRA) capital controls restrict the repatriation of funds, complicating
      USD-peso financial flows from the "Dólar Kavak" mechanism. In Turkey,
      structural inflation exceeding 78.6% in 2022 and continued currency
      instability through 2025 create a materially adverse operating
      environment; Kavak's Turkey entity (kavak.com/tr) is exposed to lira
      devaluation without disclosed hedging. The regulatory risk register
      (TR001) maps these jurisdiction-level obligations, estimated severity,
      and the corresponding diligence paths for unresolved items.
    claimRefs:
      - CR008
      - CR009
      - CR010
      - CR014
      - CR021
      - CR026
      - CR033
      - CR034
      - CR044
    tableRefs:
      - TR001

  - id: SR-S003
    title: Financial, capital, and credit risks
    body: >-
      Kavak's consolidated debt position is approximately $1.2B, comprising
      an estimated $810M raised through 2022 facilities and approximately
      $400M from the 2025 Goldman Sachs/HSBC credit package. The company
      has not achieved EBITDA profitability at the company level as of April
      2025 and has publicly targeted end-2025 for this milestone. Failure to
      reach that milestone would accelerate lender covenant scrutiny and
      equity-round pressure. Credit risk in the Kuna Capital lending book is
      a distinct embedded exposure: loans are originated to borrowers with
      no prior credit history at approximately 40% of applicant volume, and
      neither NPL rates nor write-down provisions have been publicly disclosed.
      Currency devaluation transmits across three risk channels simultaneously:
      (1) Argentine peso devaluation increases USD-linked Dólar Kavak payout
      costs; (2) Turkish lira devaluation erodes Turkey hub economics; and
      (3) elevated US Federal Reserve rates reduce global VC risk appetite and
      increase Kavak's dollar-denominated borrowing costs. The April 2025
      insider-only down round — with no new external investor participating —
      signals that institutional risk appetite for Kavak equity has narrowed
      materially. The risk transmission map (FR002) traces how LatAm currency
      devaluation cascades into NPL increase, inventory value decline,
      reduced equity access, and ultimately heightened insolvency risk.
      The partner/dependency risk register (TR003) captures the lender and
      equity-investor concentration at this critical capital juncture.
    claimRefs:
      - CR002
      - CR003
      - CR004
      - CR005
      - CR011
      - CR012
      - CR017
      - CR023
      - CR025
      - CR026
      - CR027
      - CR035
      - CR039
      - CR040
      - CR043
      - CR045
    tableRefs:
      - TR003
    figureRefs:
      - FR002

  - id: SR-S004
    title: Operational, execution, and competitive risks
    body: >-
      Kavak's execution risk is documented: the company exited Colombia in 2022
      and Peru in 2024 after committing capital to both markets, writing off
      those investments without disclosed recovery values. The Colombia exit
      followed broader 2022 restructuring including a 50% workforce reduction
      from approximately 8,800 to 4,300 employees. The headcount halving
      creates dual operational risk: the surviving team is under heightened
      pressure to deliver profitability with fewer resources, and institutional
      knowledge from departed employees may not be recoverable. Inventory risk
      is an underappreciated second-order risk: Kavak acquires used vehicles
      at AI-generated prices and reconditions them before listing; a sharp
      macro devaluation — as seen in Argentina and Turkey — can push inventory
      carrying values above achievable sale prices, forcing write-downs.
      Kavak's Mexico reconditioning hub processes approximately 3,500 vehicles
      per month; a disruption to that facility would directly impair Mexico
      inventory supply. Competitive risk from digital classifieds (OLX, Mercado
      Libre) and peer-to-peer platforms is persistent, though the "autos
      chocolate" dynamic is unusual: García Ottati argues that US tariffs
      reducing new-car supply in Mexico push consumers toward used cars,
      benefiting Kavak. The operational and people risk registers (TR002, TR004)
      enumerate the specific failure modes, their likelihood-severity mapping,
      and the unresolved evidence gaps for each.
    claimRefs:
      - CR006
      - CR007
      - CR019
      - CR022
      - CR029
      - CR030
      - CR032
      - CR036
      - CR037
      - CR041
      - CR042
    tableRefs:
      - TR002
      - TR004

  - id: SR-S005
    title: People, technology, security, and mitigation
    body: >-
      Key-person risk is acute: Carlos García Ottati is Kavak's co-founder,
      CEO, and primary public spokesperson. No succession plan is on public
      record, and the April 2025 down round has not been accompanied by
      management-continuity disclosures. The AI-based vehicle pricing model
      is the company's core technical differentiator; the retention of the
      engineers and data scientists who built and maintain this system after
      the 2022 layoffs has not been verified externally. Data security risk
      is a latent but material exposure: Kavak collects highly sensitive PII
      — identity documents, income data, credit applications — from hundreds
      of thousands of users across 10+ jurisdictions, yet no SOC 2, ISO 27001,
      or equivalent public security certification has been disclosed as of
      May 2026. Latin America's informal used-car sector carries a structural
      40%+ irregularity rate in title and mileage documentation; Kavak's
      240-point inspection is a mitigation but not an absolute guarantee
      against sourcing fraudulently documented vehicles. On the mitigation
      side, Kavak's 2022–2025 restructuring demonstrates management's ability
      to cut costs and focus on core markets; the Brazil investment ($500M
      committed in 2021) was quietly scaled back rather than expanded,
      indicating capital discipline under pressure. The mitigation and kill
      criteria table (TR005) defines monitorable thesis-break triggers with
      quantified thresholds. The dependency map (FR003) illustrates Kavak's
      structural reliance on Goldman Sachs/HSBC credit lines, SoftBank/General
      Atlantic equity sponsorship, and CNBV licensing for its fintech operations.
    claimRefs:
      - CR013
      - CR015
      - CR016
      - CR018
      - CR024
      - CR028
      - CR031
      - CR033
      - CR038
    tableRefs:
      - TR005
    figureRefs:
      - FR003

