callouts:
  - calloutType: risk
    title: >-
      75% valuation haircut and $1.2B debt with no profitability is the
      primary investment risk
    body: >-
      The April 2025 down round at $2.2B — versus a September 2021 peak of
      $8.7B — is not merely a market repricing. It occurred as an insider-only
      round with no new external investor, signalling that the broader
      institutional market does not support the prior thesis at any discount
      to book. Combined with approximately $1.2B in total debt and continuing
      losses, this creates a narrow path: Kavak must achieve EBITDA
      profitability in 2025 and demonstrate declining NPLs to justify a
      refinancing or IPO in the 2026–2028 window.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR040
  - calloutType: insight
    title: Mexico concentration is both the greatest asset and the greatest risk
    body: >-
      Approximately 60% of Kavak's business is concentrated in Mexico, where
      its 70% financing attach rate and certified reconditioning model are
      genuinely differentiated. But this concentration means any adverse
      regulatory development (CNBV action, Ley Fintech amendment, "autos
      chocolate" price pressure) or macro event (peso devaluation, Banxico
      rate hike) disproportionately impairs the total business. Investors
      should monitor Mexico quarterly as a leading indicator for the entire
      portfolio.
    claimRefs:
      - CR008
      - CR021
      - CR024
      - CR026

