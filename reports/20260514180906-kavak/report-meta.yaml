  foundingLocation: "Mexico City, Mexico"
  headquarters: "Mexico City, Mexico"
  productSummary: >
    Kavak operates an integrated used-car marketplace combining (1) vehicle acquisition from private sellers using 
    AI-driven pricing, (2) a 240-point inspection and reconditioning process, (3) online and physical resale to 
    consumers, (4) in-house auto financing through Kuna Capital / Kavak Crédito, and (5) after-sales maintenance 
    and repair services. The platform uses machine learning to set fair, non-negotiable prices and assess credit 
    risk for borrowers typically excluded from traditional banking.
  customerFocus: "Lower- and middle-income used-car buyers and sellers in Latin America and emerging markets who lack access to formal auto credit and safe, transparent car transactions."
  businessModel: >
    Revenue from used-car sales margin (buy-recondition-sell spread) plus interest income from auto loans (Kuna 
    Capital / Kavak Crédito) at 14%–20% annual rates. Supplementary revenues from after-sales services and 
    vehicle maintenance. Approximately 70% of Kavak Mexico sales include company financing.
