  topStrengths:
    - >-
      First-mover and dominant brand in LatAm formal used-car market with integrated financing — a combination no
      competitor has replicated at scale.
    - >-
      Kuna Capital / Kavak Crédito creates a unique credit underwriting advantage using car-marketplace transaction data
      to approve borrowers excluded by traditional banks.
    - >-
      Asset-light reconditioning model with proprietary AI pricing drives quality assurance and margin protection
      relative to informal peer-to-peer market.
    - >-
      Strong investor backing: SoftBank and General Atlantic led the April 2025 insider round, signaling continued
      institutional commitment.
    - International footprint in 8 countries gives geographic diversification and emerging-market growth optionality.
  topRisks:
    - >-
      Sustained unprofitability: The company has not achieved consolidated annual profitability as of April 2025 and
      carries substantial debt (~$1.2B+).
    - >-
      75% valuation haircut to $2.2B from $8.7B peak signals severe overvaluation in 2021 and raises fundamental
      questions about the business's intrinsic value.
    - >-
      Credit/NPL risk: Lending to under-banked, first-time borrowers in volatile LatAm economies without disclosed
      default rate data is a black-box risk.
    - >-
      Currency and macro volatility: Mexican peso, Argentine peso, Brazilian real, and Turkish lira all subject to
      significant depreciation risk.
    - >-
      Competitive pressure from OLX Autos, Mercado Libre Autos, Seminuevos, and digital-first traditional dealers
      accelerating platform adoption.
  unresolvedGaps:
    - >-
      Revenue and gross margin figures are not publicly disclosed — key to assessing unit economics and path to
      profitability.
    - NPL/default rate on Kuna Capital / Kavak Crédito loan book is unknown — critical for credit risk assessment.
    - Exact headcount post-2023 restructuring and current burn rate remain undisclosed.
    - Competitive market share data for Mexico, Brazil, and Turkey is not independently verified.
    - IPO timeline and exit pathway remain speculative given current $2.2B valuation vs. peak.
