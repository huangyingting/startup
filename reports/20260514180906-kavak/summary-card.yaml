summary:
  headline: >
    Kavak pioneered formal used-car markets across LatAm with a unique financing-integrated model, but a 75%  valuation
    haircut, continued losses, heavy debt, and market exits reveal deep execution challenges that must  be resolved
    before the company can justify its original unicorn premium.
