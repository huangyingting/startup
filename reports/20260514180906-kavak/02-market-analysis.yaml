- id: SM005
  title: Sizing and adoption diligence gaps and contradictory estimates
  body: 'Several critical market sizing and adoption data gaps remain unresolved and must be flagged as constraints on analytical
    confidence. First, no independently audited figure exists for Brazil total used-car market. Brazil is Kavak largest market
    by unit volume and the recipient of the single largest capital commitment—USD 500 million—yet analyst TAM estimates span
    a range of USD 80 to 120 billion, a 50 percent spread that materially affects SAM and market-share projections. Second,
    Kavak does not disclose transaction volumes or revenue by market. The claimed 1 percent Mexico market share is stated
    by the CEO but is not independently verified, making it impossible to construct an evidence-anchored SOM without audited
    data. Third, Turkey world third-largest ranking appears in multiple secondary sources but traces to single industry-body
    estimates without formal and informal transaction disaggregation; post-2022 Turkish economic disruption may have altered
    the volume meaningfully.


    Fourth, Middle East market sizing relies on industry association aggregates across UAE, Oman, and Saudi Arabia without
    primary-source independent validation. Fifth, Argentina post-2023 devaluation has likely reduced the real USD-equivalent
    market size below pre-crisis estimates, but current adjusted figures are not available in public sources. These gaps are
    noted as evidence constraints rather than disqualifying factors, but any investment thesis anchored on market penetration
    milestones must commission primary data sourcing from FENABRAVE in Brazil, AMDA for formal digital share confirmation
    in Mexico, and Turkish automotive association data before the TAM and SAM inputs can be used with full confidence in quantitative
    valuation models.'
