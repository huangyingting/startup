chapter:
  number: 2
  title: Market Analysis
  summary: Kavak addresses a combined used-car TAM exceeding USD 320 billion across six active markets—Mexico (~$60B), Brazil
    (~$100B), Turkey (~$120B), Argentina (~$15B), Chile (~$8B), and the UAE cluster (~$34B)—anchored by the structural thesis
    that over 90 percent of Latin American transactions are informal, underfinanced, and fraud-prone. The digitally-accessible
    formal segment (SAM) is estimated at USD 35 to 52 billion, with Kavak current serviceable obtainable market estimated
    at under USD 1 billion GMV, reflecting approximately 1 percent Mexico share and sub-1 percent elsewhere; material runway
    exists if reconditioning-center capital intensity, minimum viable volume thresholds, and trust adoption barriers can be
    systematically overcome. Key diligence gaps include the absence of independently audited Brazil TAM data, unverified claimed
    market share figures, and limited formal or informal decomposition for Turkey and the Middle East.
sections:
- id: SM001
  title: Market boundary, included and excluded spend, and status-quo substitutes
  body: 'Kavak operates in the consumer used-car transaction market across six countries: Mexico, Brazil, Argentina, Chile,
    Turkey, and the UAE cluster. The addressable market is defined as consumer purchases of used vehicles meeting Kavak vehicle
    acceptance criteria by age, mileage, and condition, spanning all price bands Kavak will finance or resell. New car sales,
    heavy commercial fleet vehicles, and ultra-luxury vehicles above approximately USD 80,000 are explicitly excluded from
    the market boundary. Purely informal cash peer-to-peer deals—where no digital platform is involved and title transfer
    is unrecorded—are excluded from the serviceable addressable market even though they represent the largest share of total
    unit volume in Latin America.


    The dominant status-quo substitutes vary by market but include classified ad platforms such as Mercado Libre, OLX Autos,
    and Seminuevos in Mexico; Webmotors and OLX Autos in Brazil; ZonaCar and MercadoLibre in Argentina; Arabam.com and Sahibinden
    in Turkey; and Dubicars in the UAE. Traditional franchise and independent dealerships remain a status-quo substitute across
    all markets, particularly for buyers who require test drives or trade-in credit at the point of sale. Private peer-to-peer
    deals arranged without a digital intermediary represent the largest single category by unit volume in Latin America, accounting
    for roughly 90 percent of all transactions. Adjacent market opportunities—auto insurance, extended warranties, auto parts,
    and vehicle financing for third-party purchases—are not yet core to Kavak revenue but represent potential expansion adjacencies
    over the medium term. Mapping these boundaries precisely matters because the 90 percent informal share is simultaneously
    the largest competitor segment and the primary market education opportunity: every informal deal converted to a certified
    platform transaction is a unit gain for Kavak and reinforces the broader formalization thesis underlying the investment
    case.'
