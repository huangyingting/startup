  evidenceGaps:
  - type: conflicting-data
    severity: material
    topic: brazil-market-size
    missingEvidence: An independently audited or statistically validated figure for total annual used-car transaction volume
      and market value in Brazil.
    whyItMatters: Brazil is Kavak largest single market by investment ($500M committed) and by unit volume. The $80B to $120B
      range spans 50 percent, making SAM and penetration estimates unreliable without a validated anchor.
    diligencePath: Commission a data pull from FENABRAVE or DENATRAN, the Brazilian automotive associations that publish annual
      transaction statistics, or cross-check with public Brazilian dealer filings.
    relatedQuestionRefs:
    - QM024
  - type: private-evidence-only
    severity: material
    topic: kavak-volume-opacity
    missingEvidence: Independently verified transaction volume data for Kavak by market, enabling calculation of actual market
      share versus company-claimed 1 percent.
    whyItMatters: Without audited transaction volume, the claimed 1 percent Mexico share cannot be independently verified,
      making SOM estimates speculative and complicating valuation anchoring to market penetration milestones.
    diligencePath: Request audited financial statements or independent transaction volume data from management during diligence;
      alternatively cross-check with AMDA reported formal channel volumes.
    relatedQuestionRefs:
    - QM025
  - type: stale
    severity: minor
    topic: turkey-market-size
