      severity: material
      topic: Independent B2B-only cross-border payments revenue pool sizing
      missingEvidence: >-
        No analyst report independently sizes the B2B-only cross-border payments revenue pool (as distinct from total
        cross-border or total B2B payments). This makes TAM triangulation imprecise for Airwallex's specific
        opportunity.
      whyItMatters: >-
        Without a B2B-only cross-border revenue pool estimate, market penetration calculations are subject to
        significant scope error. Investors should seek updated market sizing from McKinsey or Accenture payments teams
        with B2B-specific methodology.
      diligencePath: >-
        Request McKinsey Global Payments Report (paywalled), Boston Consulting Group payments research, or commission a
        primary market-sizing exercise from a payments-focused analyst.
      relatedQuestionRefs:
        - QM001
        - QM003
        - QM004
      relatedTableRefs:
        - TM002
    - type: missing-source
      severity: material
      topic: Airwallex geographic revenue breakdown (APAC vs US vs EMEA)
      missingEvidence: >-
        Airwallex does not disclose geographic revenue breakdown. APAC is likely a majority given founding history, but
        this is unconfirmed. The US opportunity framing in Series G may imply US revenue is currently small.
      whyItMatters: >-
        Regional revenue concentration affects growth assumptions. Heavy APAC concentration creates dependence on APAC
        macro conditions and regulatory frameworks.
