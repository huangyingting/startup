summary:
  headline: Airwallex 以 $1B+ ARR、90% 增速、$8B 估值和 80+ 牌照支撑当前阶段的有条件观察；正式承诺前，美国扩张执行、财务透明度和治理成熟度是验证投资逻辑的关键里程碑。
