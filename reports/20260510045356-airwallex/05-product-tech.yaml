      status: answered
      answerSummary: >-
        Airwallex holds 20+ licenses including FCA EMI authorisation (UK confirmed via FCA register), APRA-related
        payment authorization (Australia), US state money transmitter licenses, and equivalent authorizations in the EU,
        Hong Kong, and Singapore.
    - id: QE011
