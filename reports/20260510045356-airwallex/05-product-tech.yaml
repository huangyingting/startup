  researchQuestions:
    - id: QE001
      question: What is Airwallex's core product definition and how does it fit into business financial workflows?
      type: enumeration
      targets:
        - contentRequirements/0
        - plannedTables/product-module-asset-matrix
      status: answered
      answerSummary: >-
        Airwallex is a global financial operating system with five modules: multi-currency accounts, cross-border
        payments, corporate cards, spend management, and embedded finance API. It serves businesses transacting across
        currencies and geographies, embedding into accounting workflows via native integrations.
    - id: QE002
      question: What are the specific product modules, their users, and their current maturity stage?
      type: enumeration
      targets:
        - contentRequirements/1
        - plannedTables/product-module-asset-matrix
      status: answered
      answerSummary: >-
        Five modules confirmed: multi-currency accounts (GA mature), cross-border payments (GA mature), Visa corporate
        cards (GA growing), spend management (GA growing), embedded finance API (GA scaling). All generally available
        with varying maturity.
    - id: QE003
      question: How does Airwallex's payment infrastructure work and how does it differ from correspondent banking?
      type: mechanism
      targets:
        - contentRequirements/2
        - plannedTables/technology-operating-architecture-table
      status: answered
      answerSummary: >-
        Airwallex built direct settlement relationships with local clearing networks across 150+ countries, bypassing
        correspondent bank intermediaries. This enables same-day or next-day settlement and lowers FX spreads from 2-4%
        (banks) to 0.5-1.5%.
    - id: QE004
      question: What integrations does Airwallex offer and how do they create customer workflow lock-in?
      type: mechanism
      targets:
        - contentRequirements/3
        - plannedTables/workflow-use-case-table
      status: answered
      answerSummary: >-
        Airwallex integrates with Xero, NetSuite, QuickBooks, Slack, and 20+ tools. These embed it into the financial
        close process; switching costs include recreating entity structures, FX policies, approval workflows, and
        accounting mappings.
    - id: QE005
      question: What is the current product profitability status and what does it indicate about infrastructure economics?
      type: verification
      targets:
        - contentRequirements/2
        - plannedTables/technology-operating-architecture-table
      status: answered
      answerSummary: >-
        Airwallex achieved monthly product profitability in late 2023. Infrastructure capex has been absorbed and
        marginal cost of incremental payment volume is low, supporting positive operating leverage as revenue scales.
    - id: QE006
      question: How does Airwallex's embedded finance API work and who are its primary API customers?
      type: mechanism
      targets:
        - contentRequirements/1
        - plannedTables/product-module-asset-matrix
      status: answered
      answerSummary: >-
        The embedded finance API enables multi-tenant sub-account creation, card issuance via Visa BIN sponsorship, and
        white-labeling of payments and accounts. Brex and Rippling are confirmed production API customers.
    - id: QE007
      question: What is the technical architecture of Airwallex's API platform, including API standards and developer tooling?
      type: mechanism
      targets:
        - contentRequirements/2
        - plannedFigures/product-architecture-map
      status: answered
      answerSummary: >-
        Airwallex exposes REST APIs with webhook event streams and SDKs for web and mobile. Architecture includes
        multi-tenancy, API gateway, and developer documentation. Specific API versioning strategy is not fully publicly
        detailed.
    - id: QE008
      question: What is Airwallex's product roadmap and what new capabilities are planned for 2025-2026?
      type: freshness
      targets:
        - contentRequirements/3
        - plannedTables/roadmap-release-development-stage-table
      status: answered
      answerSummary: >-
        Series G announcements indicate US market expansion as dual HQ, enterprise treasury management features, and
        North America banking-as-a-service. Deeper ERP integrations are ongoing. Exact roadmap timeline is not fully
        publicly documented.
    - id: QE009
      question: How does Airwallex's integration with Xero, NetSuite, and QuickBooks work technically?
      type: mechanism
      targets:
        - contentRequirements/3
        - plannedTables/workflow-use-case-table
      status: answered
      answerSummary: >-
        Airwallex offers native integrations that automatically sync transactions and expenses to Xero, NetSuite, and
        QuickBooks. Technical implementation details are not publicly disclosed; G2 reviews note occasional integration
        bugs.
    - id: QE010
      question: What regulatory licenses does Airwallex hold and in which jurisdictions?
      type: enumeration
