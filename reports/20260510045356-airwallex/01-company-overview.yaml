  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "Audited financial statements and revenue breakdown by product line"
      missingEvidence: >-
        Airwallex is private and has not published audited financial statements. Revenue breakdown by
        product line (payments, FX, cards, embedded finance), gross margin, operating margin, and net
        income/loss are not publicly available. The $1B+ ARR is company-reported and unaudited.
      whyItMatters: >-
        Without audited financials, revenue quality, margin structure, and true profitability cannot
        be independently verified. Revenue concentration risk and unit economics are unknown.
      diligencePath: >-
        Request audited financial statements, management accounts, and segment revenue from Airwallex
        in formal diligence. Check ASIC filings for Australian entity disclosures.
      relatedQuestionRefs: [QO004, QO005, QO009]
      relatedTableRefs: [TO001]
    - type: private-evidence-only
      severity: material
      topic: "Cap table, equity stakes, investor rights, and board composition"
      missingEvidence: >-
        Exact ownership by co-founders, Tencent, Sequoia, Addition, DST Global, and other investors
        is not publicly disclosed. Voting rights structure, anti-dilution provisions, liquidation
        preferences, and board composition are unknown.
      whyItMatters: >-
        Investor protections and founder control directly affect downside scenarios and IPO optionality.
        Liquidation preference stack could significantly affect common equity value. Board quality
        determines oversight of key-person risk (Jack Zhang dependency).
      diligencePath: >-
        Request full cap table, shareholders agreement, investor rights agreements, and board
        composition documents in formal diligence.
      relatedQuestionRefs: [QO006, QO011, QO024]
      relatedTableRefs: [TO003]
    - type: missing-source
      severity: minor
      topic: "Revenue share by geography and product"
      missingEvidence: >-
        No public source discloses Airwallex's revenue breakdown by geography (US, APAC, Europe) or
        by product (payments, FX, cards, embedded finance). This limits assessment of concentration
        risk and growth trajectory by market.
      whyItMatters: >-
        Geographic and product revenue concentration affects risk assessment. If APAC represents
        80%+ of revenue, the US expansion is a speculative bet with no current validation.
      diligencePath: >-
        Request management reporting with geographic and product segment breakdowns.
      relatedQuestionRefs: [QO005, QO021, QO018]
      relatedTableRefs: [TO001]
    - type: missing-source
      severity: minor
      topic: "Net revenue retention rate and customer churn data"
      missingEvidence: >-
        No public source discloses Airwallex's NRR, gross revenue retention, or churn rate. The
        50% multi-product adoption statistic is a positive signal but does not quantify retention.
      whyItMatters: >-
        NRR is a critical SaaS and fintech platform quality metric. Without NRR, it is impossible
        to assess whether growth is driven by new customer acquisition or expansion within existing customers.
      diligencePath: >-
        Request NRR, GRR, and customer cohort data from management.
      relatedQuestionRefs: [QO016, QO013]
      relatedTableRefs: []
    - type: missing-source
      severity: minor
      topic: "Details of CTIN Pay and OpenPay acquisitions"
      missingEvidence: >-
        Acquisition prices, integration status, headcount absorbed, license portfolios obtained,
        and financial contributions of CTIN Pay and OpenPay acquisitions are not publicly disclosed.
      whyItMatters: >-
        Acquisition quality and integration risk could affect near-term growth and operating cost.
        If OpenPay's US licenses are critical for the US strategy, integration delay would be material.
      diligencePath: >-
        Request integration status, financial contribution, and license transfer documentation.
      relatedQuestionRefs: [QO014, QO023, QO025]
      relatedTableRefs: [TO004]
    - type: private-evidence-only
      severity: minor
      topic: "Secondary liquidity realized by founders and early investors"
      missingEvidence: >-
        Amount and timing of any secondary transactions where founders, employees, or early investors
        sold shares are not publicly disclosed.
      whyItMatters: >-
        Founder selling in secondaries can signal reduced conviction. Understanding secondary history
        contextualizes alignment of interests between founders and future investors.
      diligencePath: >-
        Request secondary transaction history from company or lead investors.
      relatedQuestionRefs: [QO024, QO006]
      relatedTableRefs: []
    - type: missing-source
      severity: minor
      topic: "Visa partnership strategic terms beyond investment"
      missingEvidence: >-
        Specific partnership terms between Visa and Airwallex beyond the investment amount are not
        publicly disclosed (distribution agreements, exclusivity, network access, product integrations).
      whyItMatters: >-
        A deep Visa partnership could significantly accelerate Airwallex's network reach and
        enterprise sales. Without details, the strategic value is unclear.
      diligencePath: >-
        Request partnership agreement terms and roadmap with Visa in formal diligence.
      relatedQuestionRefs: [QO014]
      relatedTableRefs: []
