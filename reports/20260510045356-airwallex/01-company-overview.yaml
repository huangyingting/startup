chapter:
  number: 1
  title: Company Overview
  summary: >
    Airwallex is a Melbourne-founded (2015) global B2B financial infrastructure platform that
    crossed $1B in annualized revenue in October 2025, doubled annualized transaction volume to
    $235B+, and raised $330M at an $8B valuation in a December 2025 Series G led by Addition.
    With 80+ licenses, 200,000+ business customers, 2,000+ employees across 26 offices, and
    dual headquarters in San Francisco and Singapore, Airwallex has evolved from a cross-border
    payments specialist into a comprehensive global banking platform for modern businesses.

sections:
  - id: s1
    title: Identity and Business Model
    body: >
      Airwallex is a global financial platform providing business banking infrastructure to modern
      enterprises. Founded in Melbourne, Australia in January 2015, the company emerged from the
      founders' firsthand experience with costly and slow cross-border payments while operating an
      international café importing goods from abroad. The founders encountered high FX fees, opaque
      correspondent banking charges, and multi-day settlement delays when sourcing products across
      borders—pain points they chose to solve rather than accept.

      Airwallex's value proposition is the replacement of fragmented legacy banking with a single
      integrated platform covering payments, global accounts, FX management, corporate cards, expense
      management, billing, and treasury—accessible via dashboard or API. Unlike consumer-facing
      fintechs, Airwallex exclusively targets businesses from early-stage startups to large public
      enterprises. The company's mission is "building the future of global banking for a borderless,
      real-time, intelligent economy."

      Revenue is generated from transaction fees on cross-border payments, FX spread on currency
      conversions, subscription and software licensing fees from embedded finance customers, and
      interchange on corporate card programs. The infrastructure architecture is a key differentiator:
      Airwallex bypasses traditional correspondent banking by connecting directly to local payment
      systems in 70+ countries, enabling same-day settlement in 120+ markets, with 93% of transfers
      settling same-day and 50% processed instantly. Airwallex operates a dual go-to-market: direct
      sales to businesses using the platform, and an embedded finance API layer enabling technology
      platforms to integrate Airwallex's financial infrastructure into their own products (B2B2B).
      By December 2025, approximately half of the 200,000+ customers used multiple products.
    claimRefs: [CO001, CO002, CO003, CO004, CO005]

  - id: s2
    title: Founders, Leadership, and Governance
    body: >
      Airwallex was co-founded in 2015 by five individuals with complementary expertise in software
      engineering, finance, and technology architecture. Jack Zhang (CEO) is the primary strategic
      leader; a former software engineer with experience at major financial institutions, he identified
      the cross-border payment problem firsthand while running the Melbourne café. Lucy Liu (President)
      brings banking and accounting expertise and oversees global operations and commercial strategy.
      Xijing Dai (CTO) leads engineering and infrastructure teams. Max Li (CPO) shapes the product
      roadmap and user experience. Ki-lok Wong (Principal Architect) oversees core platform architecture.

      All five original co-founders appear to remain with the company through 2025—exceptional founding
      team retention for a 10-year-old company at this scale. Jack Zhang's centralized strategic role
      creates meaningful key-person dependency and governance concentration risk. The company has not
      publicly disclosed a full board composition or governance structure, which is standard for private
      companies at this stage but represents a diligence gap.

      By late 2025, Airwallex employed more than 2,000 people across 26 global offices. The company
      plans to grow headcount by more than 50% by end of 2026 and to double its US headcount to 400+
      within 12 months of the December 2025 Series G. The dual-headquarters model—San Francisco and
      Singapore—positions product, engineering, and go-to-market teams at the centers of AI innovation
      and APAC commerce respectively.
    claimRefs: [CO006, CO007, CO008, CO009, CO010, CO011]

  - id: s3
    title: Funding History, Valuation, and Investors
    body: >
      Airwallex has raised approximately $1.58 billion across 14 funding rounds from seed through
      Series G. The seed ($3M, July 2016 from Gobi Partners) was followed by Series A rounds totaling
      $19M from Tencent, Sequoia Capital, and Mastercard in 2017. The Series B in July 2018 raised
      $80M at a $450M valuation. The pivotal Series C in March 2019 raised $100M at a $1B+ valuation,
      making Airwallex Australia's third tech unicorn.

      The Series C followed Airwallex's refusal of a reported $1B acquisition offer from Stripe in
      2018—a defining strategic decision. Series D (2020-2021) raised $300M total across three
      tranches. Series E (September 2021 through October 2022) raised $400M total at valuations
      reaching $5.5B with Lone Pine Capital as lead investor. Series F raised $200M in March 2023,
      then $300M in May 2025 at $6.2B valuation with Visa Ventures and Salesforce Ventures as
      strategic investors. The December 2025 Series G raised $330M at $8B valuation—a roughly 30%
      increase from the Series F six months earlier—led by Addition (Lee Fixel) with T. Rowe Price,
      Activant, Lingotto, Robinhood Ventures, and TIAA Ventures.

      Strategic investors include Tencent (all early rounds), Sequoia Capital, DST Global, Salesforce
      Ventures, and Visa, which bring distribution relationships beyond capital. The Salesforce and
      Visa investments suggest embedded product integrations and enterprise sales channel alignment.
      Lee Fixel of Addition stated: "Airwallex is reshaping the global business banking landscape.
      The traditional financial system wasn't built for borderless businesses."
    claimRefs: [CO012, CO013, CO014, CO015, CO016, CO017, CO018, CO019]

  - id: s4
    title: Scale, Operating Metrics, and Key Milestones
    body: >
      As of late 2025, Airwallex has achieved operating metrics that mark it as one of the highest-
      growth fintech platforms globally. The company crossed $1 billion in annualized recurring
      revenue in October 2025, representing approximately 90% year-over-year growth. Annualized
      transaction volume doubled year-over-year to $235 billion+. The company serves 200,000+
      business customers globally, with approximately half using multiple products.

      The geographic footprint spans 200+ countries and regions. Airwallex holds approximately
      80 regulatory licenses across North America, Europe, the Middle East, and Asia-Pacific—one
      of the most comprehensive regulatory footprints among private fintech companies globally. In
      2025 alone, Airwallex expanded into 12 new markets including France, Canada, Japan, Brazil,
      Mexico, the UAE, Korea, New Zealand, Malaysia, Vietnam, Netherlands, and Israel.

      Airwallex achieved monthly profitability in late 2023—a significant milestone reached while
      continuing heavy geographic and product investment. Strategic acquisitions accelerated market
      entry: CTIN Pay in Vietnam and OpenPay in the United States in 2025. The company also obtained
      one of only two foreign-company Chinese payments licenses in 2022. Key enterprise customers
      include TikTok, Canva, Brex, Rippling, and Deel—technology companies validating enterprise-
      grade product quality and compliance capability. With 26 offices including Melbourne, Singapore,
      San Francisco, Hong Kong, London, and Shanghai, Airwallex has the operational footprint of a
      company significantly larger than its headcount suggests.
    claimRefs: [CO020, CO021, CO022, CO023, CO024, CO025, CO026, CO027]

  - id: s5
    title: Strategic Direction and Competitive Positioning
    body: >
      Airwallex's strategy from 2025 onward is defined by three themes: US market penetration,
      AI-driven financial automation, and evolution from payments provider to comprehensive global
      banking platform. The $1B+ investment commitment in the US from 2026-2029 is the largest
      geographic bet the company has made since founding, anchored by the San Francisco dual-
      headquarters announced in December 2025.

      The AI strategy centers on "agentic finance"—specialized AI agents that autonomously execute
      complex financial workflows using contextual data from Airwallex's platform. CEO Jack Zhang:
      "As AI lowers software costs, infrastructure and data become the ultimate differentiator."
      The first AI agents launched within spend management in late 2025 (Expense Submission Agent
      and Expense Policy Agent), with hundreds more planned across the platform. This positions
      Airwallex's proprietary transaction and treasury data as a durable competitive moat.

      Airwallex differentiates from Wise, Revolut, Stripe, Adyen, and Payoneer through exclusive
      focus on business (not consumer) customers, ownership of local payment rails, comprehensive
      regulatory licensing, and an API-first embedded finance layer enabling third-party distribution.
      The company faces challenges including sustaining 90%+ revenue growth from a $1B+ base,
      competing in the highly competitive US market where incumbents are well-entrenched, and navigating
      increasingly complex global regulation. No IPO timeline has been communicated as of May 2026,
      though at $8B valuation and $1B+ ARR, Airwallex would be a credible public market candidate
      as early as 2027-2028 depending on market conditions and profitability trajectory.
    claimRefs: [CO028, CO029, CO030, CO031, CO032]

