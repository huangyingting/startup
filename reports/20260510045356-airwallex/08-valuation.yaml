  - id: TV002
    title: Thesis / anti-thesis table
    slug: thesis-antithesis-table
    columns:
      - Dimension
      - Thesis (Bull)
      - Anti-Thesis (Bear)
      - Current Verdict
    rows:
      - - Market
        - Cross-border B2B payments is a $150T+ market digitalising rapidly; Airwallex has APAC-first advantage
        - Market is winner-take-most; Stripe and Adyen have stronger brand and larger balance sheets for the same market
        - Thesis holds if Airwallex targets APAC-first and embedded finance niches; risk if US strategy stalls
      - - Product
        - >-
          Full-stack multi-currency platform (accounts, FX, cards, APIs) is harder to replicate than a single-product
          competitor
        - Stripe Treasury and Adyen for Platforms can replicate multi-currency accounts if prioritised; IP moat limited
        - Partial thesis; Airwallex has a 2-3yr infrastructure lead but this lead is not permanent
      - - Customers
        - 200K+ businesses across 180 countries; enterprise platform API momentum in embedded finance
        - Customer concentration in SMB; NRR not disclosed; enterprise pipeline unverified in public sources
        - Partial; verification required on NRR and enterprise ARR mix before concluding
      - - Financials
        - Monthly profitability since 2023; $630M raised in F+G; diversifying revenue into higher-margin software
        - Unaudited financials; take rate compressing; credit and FX risks undisclosed; preference-stack opaque
        - Anti-thesis holds until audited P&L confirms profitability narrative and preference waterfall is clear
      - - Valuation
        - 8x revenue at a company with 30-40% growth and a path to 20%+ EBITDA is fair vs public fintech peers
        - Preference-stack overhang; IPO market unreliable; base case IRR requires a 15-18x exit multiple
        - Challenging; secondary entry at discount improves risk-return substantially; current price has limited upside
    notes: Thesis vs anti-thesis framed across five diligence dimensions.
    claimRefs:
      - CV006
      - CV007
      - CV008
      - CV009
