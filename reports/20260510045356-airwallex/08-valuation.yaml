      - - Bear
        - $0.8-1.0B
        - Break-even to -5%
        - 5-7x forward
        - $4-8B
        - '-5% to +5%'
        - Take-rate compression; regulatory disruption in Tier-1 market; US fails to scale materially
    notes: >-
      IRR calculated from $8B entry valuation; 5-year hold; assumes 30% dilution in next 2 rounds before exit. Scenarios
      are illustrative.
