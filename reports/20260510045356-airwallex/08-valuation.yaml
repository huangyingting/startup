  - id: TV005
    title: Thesis-break and kill triggers table
    slug: thesisbreak-and-kill-triggers-table
    columns:
      - Thesis Component
      - Break Condition
      - Kill Trigger
      - Monitoring Metric
    rows:
      - - Market leadership in cross-border B2B
        - >-
          Stripe or Adyen launches a competing multi-currency product with equivalent global licence coverage within 18
          months
        - >-
          Material confirmed customer churn to a competitor within a 12-month window verified via data-room win/loss
          data
        - Competitor product launches; customer win/loss rate; take-rate trend vs peer set
      - - Profitability trajectory
        - Audited financials reveal sustained EBITDA losses beyond 2024; burn rate exceeds $150M per year post-2024
        - Confirmed need for a down-round at or below Series G entry valuation; EBITDA margin negative after 2026
        - Monthly burn rate; audited management accounts; operating leverage trend by product line
      - - Regulatory standing
        - FCA or APRA or MAS opens a formal investigation into Airwallex AML/CFT compliance or governance
        - Licence suspension or revocation in Australia, UK, or Singapore requiring business restructuring
        - Regulator correspondence; public enforcement register; quarterly compliance certification from CCO
      - - US market execution
        - >-
          US ARR contribution remains below 10% of total revenue after 24 months of intensive investment and dual-HQ
          move
        - US market identified as structurally unwinnable given MSB licence constraints and Stripe market dominance
        - US customer acquisition rate; US ARR as % of total; US banking partner count and stability
    notes: >-
      Kill triggers require board review and independent legal opinion before exit. Thresholds calibrated to protect
      base-case return.
    claimRefs:
      - CV014
      - CV015
      - CV016
  - id: TV006
    title: Final diligence asks table
    slug: final-diligence-asks-table
    columns:
      - Priority
      - Diligence Ask
      - Why It Matters
      - Data Source
    rows:
      - - P1 — Blocker
        - Audited financial statements (FY2023, FY2024)
        - Self-reported profitability cannot be verified; P&L structure and unit economics are opaque without an audit
        - 'Data room: CFO package; Big 4 audit engagement letter'
      - - P1 — Blocker
        - Full preference-stack waterfall and cap table
        - Overhang from 9 rounds could materially impair common equity return in base and bear scenarios
        - 'Data room: cap table; legal counsel liquidation preference waterfall analysis'
      - - P1 — Blocker
        - Net Revenue Retention and Gross Revenue Retention by customer cohort
        - NRR is the primary signal of customer health; unverifiable without data-room access to revenue bridge
        - 'Data room: customer cohort analysis; CFO revenue bridge by cohort vintage'
      - - P2 — Important
        - Full regulatory licence register and regulator correspondence log
        - >-
          Completeness of licence portfolio and absence of informal regulator inquiry are critical to the regulatory
          thesis
        - 'Data room: legal and compliance register; external regulatory counsel jurisdiction-by-jurisdiction review'
      - - P2 — Important
        - Banking settlement partner list per corridor and redundancy test plan
        - Partner concentration risk cannot be assessed without knowing the identity of settlement partners per corridor
        - 'Data room: treasury operations; banking agreements; corridor coverage map with named bank per corridor'
    notes: >-
      P1 blockers are required before investment commitment. P2 items should be resolved within 30 days of term-sheet
      execution.
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
