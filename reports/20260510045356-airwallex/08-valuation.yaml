        - $3.0-3.5B
        - 25-30%
        - 8-10x forward
        - $18-25B
        - 20-35%
        - US breakthrough; embedded finance dominance; IPO window opens at Wise-comparable multiple
      - - Base
        - $1.5-2.0B
        - 15-20%
        - 8-12x forward
        - $10-16B
        - 10-18%
