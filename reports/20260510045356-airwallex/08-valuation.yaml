  evidenceGaps:
    - type: missing-data
      severity: high
      topic: Audited financial statements, unit economics, and revenue mix
      missingEvidence: >-
        Airwallex has not published audited financial statements; revenue breakdown by product line (FX vs embedded
        finance vs cards), NRR/GRR by cohort, and take-rate by product are unavailable in public sources.
      whyItMatters: >-
        Without audited financials, the profitability narrative is unverifiable and the revenue multiple analysis rests
        on estimated or self-reported figures with a wide confidence interval that cannot be narrowed without data-room
        access.
      diligencePath: >-
        Request audited FY2023 and FY2024 P&L, NRR/GRR cohort analysis, and take-rate by product from the data room as
        P1 blocker conditions. Insist on a Big 4 audit engagement letter before committing capital.
      relatedQuestionRefs:
        - QV028
        - QV029
      relatedTableRefs:
        - TV006
    - type: missing-data
      severity: medium
      topic: Full comparable valuation set and private fintech transaction data
      missingEvidence: >-
        The comparable valuation table (TV004) covers only selected public companies and partial private comparables;
        private fintech M&A transaction data and secondary round pricing are not publicly available for the full
        comparable set.
      whyItMatters: >-
        A complete comparable set is needed to validate the $8B entry price; private-round data would narrow the
        confidence interval on the bull and base case valuation ranges materially.
      diligencePath: >-
        Engage a specialist investment bank to provide a private-company M&A and secondary transaction database for
        cross-border payment fintechs as part of investment committee preparation.
      relatedQuestionRefs:
        - QV024
      relatedTableRefs:
        - TV004
