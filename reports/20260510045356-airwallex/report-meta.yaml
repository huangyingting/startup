companyProfile:
  summary: >-
    Airwallex is a Melbourne-founded (January 2015) global B2B financial infrastructure platform
    built by four co-founders: Jack Zhang (CEO), Lucy Liu (President), Xijing Dai, and Ki-lok Wong.
    The company crossed $1B in annualized revenue in October 2025, with 90% YoY growth and
    $235B+ in annualized transaction volume. In December 2025, Airwallex raised $330M in a Series G
    at an $8B valuation led by Addition (Lee Fixel), with participation from DST Global, Lone Pine,
    and Salesforce Ventures, bringing total funding to ~$1.58B. The company serves 200,000+
    businesses across 60+ countries via cross-border payments, multi-currency accounts, FX
    management, corporate cards, expense management, and embedded finance APIs. Airwallex holds 80+
    regulatory licenses and achieved monthly profitability in late 2023. Major enterprise customers
    include TikTok, Canva, Brex, Rippling, and Deel.
  foundedDate: "2015-01-01"
  founders:
    - name: Jack Zhang
      role: CEO and co-founder
      background: >-
        Studied electrical engineering and commerce at Melbourne University. Founded Airwallex
        after experiencing costly FX fees while importing café supplies from China. Primary
        strategic decision-maker and external spokesperson. Key-person risk identified.
      claimRefs: [CO006]
    - name: Lucy Liu
      role: President and co-founder
      background: >-
        Former roles in finance and operations. Leads global operations, customer success,
        and growth. Co-founder and board member.
      claimRefs: [CO006]
    - name: Xijing Dai
      role: Co-founder and CTO (former)
      background: >-
        Engineering co-founder responsible for early technology architecture. Background in
        computer science and distributed systems.
      claimRefs: [CO007]
    - name: Ki-lok Wong
      role: Co-founder
      background: >-
        Product and operations co-founder. Background in product management and financial
        services.
      claimRefs: [CO007]
  foundingLocation: Melbourne, Australia
  headquarters: Melbourne, Australia (+ San Francisco co-HQ as of Dec 2025)
  productSummary: >-
    Airwallex's product suite includes: cross-border payments (send/receive in 60+ countries),
    multi-currency accounts (hold, convert, pay in 23+ currencies), FX management (spot FX,
    competitive exchange rates), global corporate cards (physical and virtual, multi-currency),
    expense management (real-time tracking, approvals, reimbursements), and embedded finance APIs
    enabling B2B2B distribution through software platforms. AI agents for expense management
    launched in late 2025 as the first of a planned broader AI rollout.
  customerFocus: >-
    SMEs expanding internationally (primary PLG acquisition funnel), mid-market corporates
    managing multi-currency treasury, enterprise technology platforms embedding financial
    infrastructure (TikTok, Canva, Brex, Rippling, Deel), marketplace operators running
    cross-border multi-party payouts, and VC-backed startups hiring globally.
  businessModel: >-
    Revenue from FX spread (primary; bid-ask margin on currency conversion), payment processing
    fees, SaaS subscription fees (expense management, premium accounts), corporate card
    interchange, and interest income on customer balances held. Approximately 50% of customers
    use multiple products. Monthly profitability achieved late 2023; no audited financials
    publicly available.
  stage: late-stage private
  fundingStatus: >-
    Total primary capital raised approximately $1.58B across 14 rounds from seed (2016, $3M)
    through Series G (December 2025, $330M at $8B valuation). Key investors: Tencent, Sequoia
    Capital (China), DST Global, Lone Pine Capital, Addition, Visa Ventures, Square Peg Capital.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CO004, CO006, CO007, CO008, CO009, CO014, CO018, CO019]

summary:
  headline: >-
    Airwallex's $1B+ ARR at 90% growth, $8B valuation, and 80+ licenses represent a CONDITIONAL
    WATCH at current stage; US expansion execution, financial transparency, and governance
    maturity are the key thesis-validation milestones before a formal commitment.
