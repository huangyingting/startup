  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 8000
    revenueRunRateUsdM: 1000
    arrUsdM: 1000
    revenueGrowthYoYPct: 90
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 1580
