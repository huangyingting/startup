summary:
  headline: >-
    Airwallex's $1B+ ARR at 90% growth, $8B valuation, and 80+ licenses represent a CONDITIONAL WATCH at current stage;
    US expansion execution, financial transparency, and governance maturity are the key thesis-validation milestones
    before a formal commitment.
