  evidenceGaps:
    - type: missing-data
      severity: high
      topic: Emerging-market regulatory licence completeness
      missingEvidence: >-
        Public sources do not enumerate Airwallex's full licence set in Africa, Southeast Asia, and the Middle East; the
        regulatory risk register (TR001) covers only Tier-1 jurisdictions.
      whyItMatters: >-
        Emerging-market licences carry higher enforcement risk; the completeness of coverage is material to the overall
        regulatory risk assessment.
      diligencePath: >-
        Request the full licence register from the data room; obtain regulatory counsel's jurisdiction-by-jurisdiction
        risk assessment; verify currency of each licence.
      relatedQuestionRefs:
        - QR029
      relatedTableRefs:
        - TR001
    - type: missing-data
      severity: medium
      topic: Succession planning and preference-stack structure
      missingEvidence: >-
        Airwallex does not publicly disclose formal succession plans for co-founders; the preference-stack waterfall
        across all Series A-G rounds is also not in public sources.
      whyItMatters: >-
        Succession planning and dilution/preference overhang are two of the most investor-material risk dimensions for a
        pre-IPO company at this stage.
      diligencePath: >-
        Request the full preference-stack waterfall, co-founder equity schedules, and succession planning documentation
        from the data room; conduct reference calls with board members.
      relatedQuestionRefs:
        - QR030
      relatedTableRefs:
        - TR004
