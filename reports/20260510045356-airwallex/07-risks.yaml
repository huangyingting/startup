      - CR014
      - CR015
  - id: TR004
    title: People / execution risk register
    slug: people-execution-risk-register
    columns:
      - Risk Event
      - Severity
      - Key Person(s)
      - Likelihood
      - Mitigation
    rows:
      - - CEO departure (Jack Zhang)
        - High
        - Jack Zhang (co-founder, CEO)
        - Low
        - Experienced co-founder bench; board oversight; Series G governance rights for investors
      - - CTO or engineering leadership turnover
        - Medium
        - Max Li (co-founder, CTO)
        - Low
        - Engineering team depth; competitive compensation; equity vesting schedules
      - - Rapid growth execution gap in new markets
        - Medium
        - Senior management across regions
        - Medium
        - Regional MD model; phased market entry; OKR framework; board monitoring of expansion KPIs
    notes: All four co-founders remain active as of research date. Board includes experienced fintech and VC operators.
    claimRefs:
      - CR016
      - CR017
  - id: TR005
    title: Mitigation and kill criteria table
    slug: mitigation-and-kill-criteria-table
    columns:
      - Risk Theme
      - Monitoring Indicator
      - Amber Trigger
      - Kill Trigger
      - Priority Diligence Ask
    rows:
      - - Regulatory / licensing
        - Regulator correspondence; public enforcement register; licence status
        - FCA, APRA, or MAS informal inquiry or information request
        - Licence suspension or revocation in any Tier-1 market
        - Request all regulator correspondence in data room; jurisdiction-by-jurisdiction risk assessment
      - - Operational / security
        - Uptime SLA reports; public incident disclosures; support-ticket volume
        - Outage lasting >4 hours in any quarter; unresolved critical vulnerability
        - Confirmed material data breach with regulator notification obligation
        - Audited uptime reports; SOC 2 Type II report; penetration-test results
      - - Banking partner concentration
        - Settlement partner count per corridor; IBAN availability
        - Loss of a banking partner in a Tier-1 corridor with no immediate replacement
        - Settlement failure impacting >10% of monthly transaction volume
        - List settlement banking partners per corridor; test redundancy with a simulated partner loss scenario
      - - People and key person
        - C-suite tenure; equity vesting schedule; executive recruiting velocity
        - Co-founder departure or public leadership dispute signalled in press
        - CEO and CTO simultaneous departure without a named and credible successor
        - Succession plan documentation; key-man insurance policy; vesting cliff data per co-founder
      - - Financial and model risk
        - Monthly burn rate; take-rate trend by product; fraud loss rate
        - Take-rate compression >10% year-on-year or fraud losses exceeding 0.5% of TPV
        - Sustained EBITDA loss after the stated 2023 monthly profitability inflection
        - Audited P&L; cohort revenue waterfall; take-rate trend; credit loss reserve schedule
    notes: >-
      Kill triggers require board review rather than automatic exit; thresholds should be calibrated against entry
      thesis.
    claimRefs:
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
