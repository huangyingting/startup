  - id: TR003
    title: Partner / dependency risk register
    slug: partner-dependency-risk-register
    columns:
      - Dependency
      - Type
      - Concentration Level
      - Risk if Lost
      - Current Mitigation
    rows:
      - - Primary banking settlement partners
        - Banking / Settlement
        - High (estimated 2-3 key partners)
        - Settlement impairment in affected corridors; customer disruption
        - Multi-bank strategy; own-licence strategy reduces reliance over time
      - - Amazon Web Services (AWS)
        - Cloud Infrastructure
        - High (primary cloud provider)
        - Platform downtime on regional AWS failure
        - Multi-region AWS deployment; disaster recovery plan; potential multi-cloud roadmap
      - - SWIFT and SEPA payment rails
        - Payment Rails
        - High (no alternative for certain corridors)
        - Cross-border transfer delays for corporate clients
        - Local payment rails in key markets; FPS and FASTER alternative routing
      - - Visa and Mastercard card networks
        - Card Issuance
        - Medium (dual network)
        - Card issuance disruption for spend management product
        - Dual network programme manager agreements; backup network access
    notes: Airwallex's own licensing strategy gradually reduces banking partner dependency, but the transition is multi-year.
    claimRefs:
