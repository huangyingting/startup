      - number: '2.2'
        title: 市场规模与测算口径分析
        blocks:
          - type: paragraph
            body: >-
              Airwallex 机会的市场规模高度依赖范围定义。多家独立分析机构给出的结果差异很大。Mordor Intelligence 的 $1.42 trillion（2025）估算覆盖完整全球 B2B
              支付市场，包括本地交易，给出最宽口径 TAM。Allied Market Research 的 $206.5
              billion（2024）估算只覆盖所有细分里的跨境支付（B2B、B2C、C2C），口径更窄，但可以说与 Airwallex 更直接相关。两者都没有精确隔离 B2B 跨境收入池，也就是 Airwallex
              主要服务的具体市场。若以 Airwallex 的 $1B+ ARR 作为渗透参照，并假设可寻址交易量 take rate 为 0.5–2%，再加 SaaS 费用，则服务化可寻址市场约为 $50–200
              billion 年收入机会。这与跨境支付市场细分估算一致，但由于 take rate、货币组合和产品挂载率等假设依赖度高，不确定性也高。按交易额算，市场渗透估计低于整体 B2B 支付的
              0.1%；但在已服务地域的可寻址收入池中，估计为 0.5–2%。Crunchbase、Tracxn 等分析数据库没有单独量化 Airwallex 市占率，这与其成长期定位一致。
