      - number: '4.3'
        title: 单位经济与财务尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的单位经济可从公开数据部分估算，但用于投资判断仍大体需要管理层披露。毛利率未公开；不过参照 Adyen、Stripe、Wise Business 等金融科技基础设施同业，它们报告的毛利率在
              50% 到 70% 区间，Airwallex 这种重基础设施模式可能在 45% 到 65%
              区间运行。相比通过代理行转接的竞争者，公司专有支付通道降低了可变基础设施成本，交易量扩张后应会持续改善毛利率。获客成本无法从公开数据推导。公司直销企业客户与嵌入式金融 API 分发的双 GTM 策略，意味着各渠道
              CAC 结构不同；嵌入式金融可能直接 CAC 更低，但平台收入分成成本更高。NRR 是评估客户扩张和账户增长的关键指标，尤其在多产品战略下，200,000
              个客户中约一半已经使用一个以上产品。这个留存指标尚未确认。对 Airwallex
              的财务判断是谨慎正面：公司已经展示强劲收入端增长、实现早期产品盈利，并锁定充足资本。关键尽调问题集中在按收入流拆分的毛利率、收入结构、按客户细分的单位经济，以及 NRR 趋势。
