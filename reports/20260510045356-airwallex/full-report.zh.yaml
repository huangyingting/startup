  - id: TV002
    title: 投资论点 / 反向论点表
    slug: thesis-antithesis-table
    columns:
      - 维度
      - 正向论点（牛市）
      - 反向论点（熊市）
      - 当前判断
    rows:
      - - 市场
        - 跨境 B2B 支付是 $150T+ 市场，正在快速数字化；Airwallex 有 APAC 优先优势
        - 市场由少数赢家拿走大半；Stripe 和 Adyen 在同一市场品牌更强、资产负债表更大
        - 若 Airwallex 聚焦 APAC 优先和嵌入式金融细分场景，论点成立；若美国策略停滞，风险上升
      - - 产品
        - 全栈多币种平台（账户、FX、卡、API）比单品竞争者更难复制
        - 若优先投入，Stripe Treasury 和 Adyen for Platforms 可以复制多币种账户；IP 护城河有限
        - 论点部分成立；Airwallex 有 2-3 年基础设施领先，但领先不具永久性
      - - 客户
        - 覆盖 180 个国家的 200K+ 企业；企业平台 API 在嵌入式金融中有动能
        - 客户集中在 SMB；NRR 未披露；公开来源无法验证企业管线
        - 部分成立；下结论前必须验证 NRR 和企业 ARR 占比
      - - 财务
        - 2023 年起月度盈利；F+G 轮融资 $630M；收入向更高毛利软件多元化
        - 财务未经审计；抽成率压缩；信用和 FX 风险未披露；优先权堆栈不透明
        - 在经审计 P&L 证实盈利叙事、优先权瀑布清晰之前，反向论点成立
      - - 估值
        - 若公司增长 30-40%，且有路径做到 20%+ EBITDA，8x 收入相对上市金融科技同业算公允
        - 优先权堆栈形成压制；IPO 市场不可靠；基准情境 IRR 需要 15-18x 退出倍数
        - 有挑战；若以折价二级市场入场，风险回报显著改善；当前价格上行有限
    notes: 按五个尽调维度框定投资论点与反向论点。
