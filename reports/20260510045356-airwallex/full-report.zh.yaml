  - id: TV006
    title: 最终尽调要求表
    slug: final-diligence-asks-table
    columns:
      - 优先级
      - 尽调要求
      - 重要性
      - 数据来源
    rows:
      - - P1 — 阻断项
        - 经审计财务报表（FY2023、FY2024）
        - 公司自报盈利无法验证；没有审计，P&L 结构和单位经济不透明
        - 资料室：CFO 材料包；Big 4 审计委任书
      - - P1 — 阻断项
        - 完整优先权堆栈瀑布和股本结构表
        - 9 轮融资留下的压制可能在基准和熊市场景中显著侵蚀普通股回报
        - 资料室：股本结构表；法律顾问清算优先权瀑布分析
      - - P1 — 阻断项
        - 按客户队列拆分的净收入留存和总收入留存
        - NRR 是客户健康度的核心信号；没有资料室收入桥，无法验证
        - 资料室：客户队列分析；CFO 按队列年份拆分的收入桥
      - - P2 — 重要
        - 完整监管牌照登记册和监管往来函件日志
        - 牌照组合完整且没有非正式监管问询，是监管论点的关键
        - 资料室：法律与合规登记册；外部监管律师逐辖区审阅
      - - P2 — 重要
        - 按支付通道列出的银行结算伙伴清单和冗余测试计划
        - 不知道每条支付通道的结算伙伴身份，就无法评估伙伴集中度风险
        - 资料室：资金运营；银行协议；标明每条支付通道对应银行的覆盖图
    notes: 投资承诺前必须解决 P1 阻断项。P2 项应在投资条款书签署后 30 天内解决。
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
