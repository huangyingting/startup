  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与定价结构
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的收入模式建立在五条主要变现流上，截至 2025 年 10 月合计交付超过 $1 billion 年化经常性收入。最大收入流是 FX 价差收入，Airwallex
              在货币兑换中收取高于银行间汇率 0.5% 到 1% 的费用。年化交易量超过 $235 billion，即便 FX 利差不高，也能产生可观收入。第二条是出境国际支付的交易处理费，在美国市场每笔出境转账约 $15
              起。第三，SaaS 和 API 订阅费向嵌入式金融客户和使用 Airwallex 平台 API 层构建金融产品的企业客户收取。第四，企业卡消费产生卡交换费收入，Airwallex
              捕获每笔交易中的发卡方部分。第五，2022-2024 年利率上升后，所持客户存款的利息收入实质增长。公司的定价策略，是在对传统银行保持成本竞争力的同时，通过基础设施部署产生有吸引力的利润率。Airwallex
              不向持有余额的客户收取月度账户费，与重订阅的竞争者形成差异。FX 价差和交易费的收入质量较高，因为它们是交易型收入，直接与企业活动量绑定。SaaS
              费用切换成本更高，但占总收入比例较小。这五条收入流的精确结构尚未公开披露，是判断收入模式的关键尽调阻碍。
