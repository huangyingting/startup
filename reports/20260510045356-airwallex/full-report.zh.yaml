          label: 客户：200K+ 家企业，嵌入式金融已有牵引力
          type: input
        - id: f4
          label: 财务不确定性：未经审计，优先权结构不透明
          type: risk
        - id: f5
          label: 竞争风险：Stripe 与 Adyen 复制威胁
          type: risk
