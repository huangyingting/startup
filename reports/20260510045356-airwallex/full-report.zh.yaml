    title: 论点破裂与终止触发条件表
    slug: thesisbreak-and-kill-triggers-table
    columns:
      - 论点组件
      - 破裂条件
      - 终止触发条件
      - 监控指标
    rows:
      - - 跨境 B2B 市场领导地位
        - Stripe 或 Adyen 在 18 个月内推出竞品多币种产品，且全球牌照覆盖相当
        - 资料室输赢数据证实，12 个月窗口内客户实质性流失至竞争对手
        - 竞争对手产品发布；客户赢单 / 输单率；抽成率相对同业趋势
      - - 盈利轨迹
        - 经审计财务显示 2024 年后 EBITDA 持续亏损；2024 年后现金消耗率超过每年 $150M
        - 确认需要以 Series G 入场估值或更低估值进行降价轮融资；2026 年后 EBITDA 利润率为负
        - 月度现金消耗率；经审计管理账；分产品线经营杠杆趋势
      - - 监管状态
        - FCA、APRA 或 MAS 对 Airwallex AML/CFT 合规或治理启动正式调查
        - 澳大利亚、英国或新加坡牌照被暂停或吊销，导致业务必须重组
        - 监管往来函件；公开执法登记；CCO 季度合规认证
      - - 美国市场执行
        - 在密集投入和双总部迁移 24 个月后，美国 ARR 贡献仍低于总收入 10%
        - 若受 MSB 牌照约束和 Stripe 市场主导地位影响，美国市场被判定为结构性无法取胜
        - 美国客户获取率；美国 ARR 占总额比例；美国银行合作伙伴数量和稳定性
    notes: 触发终止条件后，退出前必须经董事会复核并取得独立法律意见。阈值按保护基准情境回报校准。
