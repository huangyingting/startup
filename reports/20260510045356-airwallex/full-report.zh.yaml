      - number: '8.2'
        title: 投资论点、牛市、基准与熊市情形
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的投资论点靠三根支柱：跨境 B2B 支付市场规模大且仍在增长（估算年流量 $150T+，结构性数字化顺风）； 平台把多币种账户、FX、卡和嵌入式金融 API
              放进同一套牌照基础设施，全球范围内尚无任何纯支付竞争者完全复制； 公司愿意前置投入监管基础设施，在新市场筑起多年准入壁垒。反论点同样清楚：如果 Stripe 和 Adyen 优先推进，
              它们有工程人才和资产负债表复制 Airwallex 的多币种功能；FX 抽佣率结构性下行；Airwallex 的 IPO 路径不确定， 也没有公布时间表。牛市情形下，Airwallex 到 2028-2029
              年实现 $3B+ ARR 和 25%+ EBITDA 利润率， 嵌入式金融渗透和美国突破驱动增长；按 8-10x 远期收入，可支撑 $20-25B 退出估值，IRR 为 20-35%。 基准情形下，ARR 达到
              $1.5-2B，EBITDA 利润率为 15-20%，支撑 $10-16B 估值和 10-18% IRR。 熊市情形下，竞争压力和监管扰动把 ARR 增长限制在 $800M-$1B，相对 Series G
              入场价格几乎没有回报。 美国市场是牛市情形的关键摇摆因素：Airwallex 已重金投入 San Francisco 双总部，但没有披露美国 ARR 贡献或获客率。 拿到这些数据，是以当前估值出资的前置条件。
