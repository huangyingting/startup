      - number: '6.2'
        title: 具名客户证明、满意度与留存
        blocks:
          - type: paragraph
            body: >-
              公开材料中的具名客户背书较少。Airwallex 新闻中心和新闻报道会提到技术公司、电商平台和平台型市场是客户，但通常不附收入归因或结果数据。Trustpilot 在 3,000+ 条评论中显示
              4.2/5，正面主题集中在有竞争力的 FX 费率、快速开通和多币种账户便利性。G2 评论（企业和中型市场用户）高度评价 API 可靠性和文档，但反复指出 KYC
              摩擦、账户验证延迟和客户支持质量不稳定，尤其在新兴市场。两个平台的评论数量轨迹都显示客户群仍在增长。NerdWallet 的独立分析将 Airwallex 评为国际企业的有竞争力选项，但指出美国 FDIC
              保险覆盖有限，且核心市场之外功能可用性受限。未公开披露 NRR、GRR 或 cohort 留存数据，是客户章节最大的单一缺口；达到这一规模的金融科技公司通常披露 120–140%
              NRR，以传递企业客户健康度。Contrary 和 Sacra research 指出，一旦 API 集成进资金管理运营，Airwallex 具备强企业粘性，但中型 SMB
              流失率仍未知。合同期限数据也缺失；不同于 Stripe，Airwallex 并不公开年度合同条款或锁定结构。PYMNTS 和 GlobeNewswire 报道确认，B2B 支付市场仍持续关注 Airwallex
              的产品和融资里程碑。
