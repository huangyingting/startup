      - number: '3.2'
        title: 主要竞争对手深度拆解
        blocks:
          - type: paragraph
            body: >-
              按收入规模和开发者心智看，Stripe 是 Airwallex 最强的竞争对手；其年收入估计超过 $15 billion，开发者优先的产品哲学使其成为全球技术公司的默认支付基础设施。Stripe
              产品集主要集中在支付处理、平台付款和 API 集成，而不是商业银行，因此原生缺乏强健的多币种账户管理、企业 FX 风险工具或综合费用管理。Wise Business 在 2025 财年产生 $1.06
              billion 收入，服务 4 million 企业客户，主要以中间市场汇率模式的价格透明度竞争，对 SMEs 和自由职业者很有吸引力。Wise 相对 Airwallex
              的主要限制，是企业产品深度较窄，嵌入式金融能力有限。Adyen 净收入约 $2.5 billion，并在 Euronext Amsterdam 上市，在企业收单和 POS 终端上竞争力强。Brex
              专注美国市场，为高增长初创公司提供支出管理，ARR 超过 $500 million，但地理覆盖明显窄于 Airwallex 的 60+ 国家足迹。Payoneer 2024 年收入 $980 million，服务
              200+ 个国家，主要面向自由职业者和小企业。Rippling 结合 HR、薪资和支出管理，在企业公司的企业卡和费用管理上竞争。Mercury 以银行即服务服务美国技术初创公司，ARR 估计 $200
              million。WorldFirst 和 OFX 为中型国际企业提供有竞争力的 FX 兑换服务，是 Airwallex 主要竞争集合之外的小规模替代方案。
