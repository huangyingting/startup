    title: 估值敏感性
    slug: valuation-sensitivity
    type: bar
    caption: 退出时普通股权益价值对五项关键假设变化的敏感性，以相对基准情形的百分比影响表示。负值代表下行。
    claimRefs:
      - CV033
      - CV034
      - CV035
    data:
      items:
        - label: 牌照暂停（一线市场）
          value: -35
        - label: IPO 退出（较 M&A 退出）
          value: 18
        - label: 收入倍数压缩（-2x）
          value: -15
        - label: 抽成率下降（-0.5pp）
          value: -12
        - label: 追加稀释（+10%）
          value: -8
  - id: FV003
    title: 估值 / 回报区间
    slug: valuation-return-range
    type: range
    caption: 在 5-7 年持有期、Series G 入场价基础上建模，给出关键指标的低（熊市）、基准和高（牛市）估值结果及隐含回报。
    claimRefs:
      - CV036
      - CV037
      - CV038
    data:
      items:
        - label: 退出估值（$B）
          low: 4
          mid: 13
          high: 22
          note: 熊市 / 基准 / 牛市；从 Series G 入场持有 5-7 年
        - label: 隐含 IRR（%）
          low: -3
          mid: 14
          high: 28
          note: 基于 $8B Series G 入场；假设后续 2 轮合计稀释 30%
        - label: 普通股权益回收（%）
          low: 30
          mid: 65
          high: 85
          note: 不同情景下的优先权结构敏感性
        - label: 退出时收入倍数（x）
          low: 5
          mid: 9
          high: 14
          note: 牛市 / 基准 / 熊市情景下的远期收入倍数区间
  - id: FV004
    title: 投资 KPI
    slug: investment-kpis
    type: kpi
    caption: 投资委员会按六个尽调维度打分：市场、产品、客户、财务透明度、风险画像和估值纪律。
