      - number: '7.3'
        title: 财务、模型与系统性风险
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的财务风险画像符合其阶段：一家高速增长、私人持有的金融科技公司，正在大规模管理多币种浮存资金。FX 波动是内生风险； 作为 FX 兑换和多币种账户提供商，公司持有多币种头寸，极端 FX
              事件中可能承受按市值计价损失。公司称 2023 年已实现月度盈利， 但这是自我披露且未经独立审计，模型风险因此偏高。抽佣率压缩是结构性威胁：Stripe、Adyen、Wise 在跨境支付定价上竞争激烈，
              随着行业成熟，市场混合抽佣率预计会下降。Airwallex 向软件型收入（支出管理、嵌入式金融）多元化，部分对冲这一压力，
              但转型尚未完成。信用风险来自多币种浮存资金管理，以及带延期结算的虚拟卡发行；这些敞口的损失率未公开披露。 全球衰退或跨境贸易量收缩会直接压低交易量和 FX 点差收入。公司集中于 SMB
              客群，意味着若输给更低成本的提供商， 或 SMB 板块整体下行，收入受到的冲击会比更偏企业客户的同行更大。Series A 到 Series G 多轮融资累计稀释，
              给普通股股东带来优先权堆栈风险。合起来看，任何投资承诺前，都需要在资料室细查 FX 对冲政策、信用损失准备、 经审计财务报表，以及各产品线单元经济模型。没有经审计财务报表，模型风险仍是重要未解尽调项。
