      - number: '4.2'
        title: 财务牵引力与资本充足性
        blocks:
          - type: paragraph
            body: >-
              Airwallex 公开财务牵引指标有限，但收入端很清楚。公司在 2025 年 10 月跨过 $1 billion 年化经常性收入，约 90% 年同比增长，并处理超过 $235 billion
              年化交易量，同比翻倍。这些指标使 Airwallex 成为全球增长最快的金融科技基础设施公司之一。2025 年 12 月 Series G 以 $8 billion 估值融资 $330
              million，关键投资者包括 Addition（Lee Fixel）、Lone Pine Capital，以及既有投资者 Tencent 和 DST Global。融资后，14 轮累计投入资本约 $1.58
              billion。基于 Series G 资金和现有现金，若月度现金消耗与当前员工规模和市场扩张轨迹一致，Airwallex 估计有 24 到 48 个月资金续航。公司在 2023
              年末实现月度产品盈利，降低了现金消耗风险，但鉴于仍在投入新市场进入和产品开发，风险并未消失。资本正投向 San Francisco
              双总部宣布后的美国市场扩张、六大产品类别的产品路线图推进，以及新市场的持续监管牌照获取。公司 18 到 36 个月视角下资本充足性评估为强，不过持续美国市场投入将要求高效 CAC
              管理。鉴于投资者结构和增长轨迹，未来 IPO 或进一步战略融资轮仍是可能的流动性路径。
