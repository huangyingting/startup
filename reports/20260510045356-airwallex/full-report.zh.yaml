chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Airwallex 是一家全球金融平台，为现代企业提供商业银行基础设施。公司 2015 年 1 月创立于澳大利亚
              Melbourne，起点是创始人在经营一家国际咖啡馆、从海外进口商品时，亲身踩到跨境支付又贵又慢的问题。跨境采购时，他们遇到高昂 FX
              费用、不透明的代理行收费和多日结算延迟；这些痛点没有被接受，而是被他们选为要解决的问题。

              Airwallex 的价值主张，是用一个整合平台取代碎片化的传统银行体系，覆盖支付、全球账户、FX 管理、企业卡、费用管理、账单和资金管理，可通过控制台或 API
              使用。不同于面向消费者的金融科技公司，Airwallex 只服务企业，从早期初创公司到大型上市企业。公司的使命是「为一个无边界、实时、智能的经济体，建设全球银行业的未来」。

              收入来自跨境支付交易费、货币兑换 FX 价差、嵌入式金融客户的订阅与软件授权费，以及企业卡项目的交换费。基础设施架构是关键差异点：Airwallex 绕开传统代理行，直接连接 70+ 个国家的本地支付系统，在
              120+ 个市场实现当日结算，93% 的转账当日结算，50% 即时处理。Airwallex 采用双重 GTM：一端直接向使用平台的企业销售，另一端提供嵌入式金融 API 层，让技术平台把 Airwallex
              的金融基础设施整合进自己的产品（B2B2B）。截至 2025 年 12 月，200,000+ 客户中约一半使用多个产品。
