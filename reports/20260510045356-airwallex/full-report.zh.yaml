    title: 投资建议逻辑
    slug: recommendation-logic
    type: flow
    caption: 从市场机会、产品差异化、客户证据、财务不确定性、竞争风险和监管风险，推导到 Series G 入场价下投资建议的逻辑链。
    claimRefs:
      - CV030
      - CV031
      - CV032
    data:
      nodes:
