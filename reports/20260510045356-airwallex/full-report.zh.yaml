      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Airwallex 由五位联合创始人在 2015 年共同创立，能力覆盖软件工程、金融和技术架构。Jack Zhang（CEO）是主要战略领导者；他曾任软件工程师，在大型金融机构有工作经验，并在经营
              Melbourne 咖啡馆时亲身识别跨境支付问题。Lucy Liu（President）带来银行和会计经验，负责全球运营和商业战略。Xijing Dai（CTO）领导工程和基础设施团队。Max
              Li（CPO）塑造产品路线图和用户体验。Ki-lok Wong（Principal Architect）负责核心平台架构。

              截至 2025 年，五位原始联合创始人似乎都仍在公司；对于一家已有 10 年历史、且规模达到这一层级的公司，这种创始团队留存很少见。Jack Zhang
              集中的战略角色，带来实质性的关键人物依赖和治理集中风险。公司尚未公开完整董事会构成或治理结构；这符合现阶段私营公司的常态，但仍是尽调缺口。

              到 2025 年末，Airwallex 在全球 26 个办公室拥有超过 2,000 名员工。公司计划到 2026 年底将员工数增长超过 50%，并在 2025 年 12 月 Series G 后 12
              个月内把美国员工数翻倍至 400+。San Francisco 与 Singapore 双总部模式，把产品、工程和 GTM 团队分别放在 AI 创新与 APAC 商业中心。
