      - number: '7.2'
        title: 运营、合作伙伴与人员风险
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的基础设施每天处理数百万笔交易，覆盖 23+ 条货币走廊，带来可观的运营敞口。若 API 在结算高峰窗口宕机，数千家 平台 API
              客户的收入可能同时停摆；在高度依赖信任的行业里，声誉损伤很难逆转。开发者门户写有较高可用性承诺， 但公开来源看不到独立审计的 SLA 或 SOC 2 Type II 报告。跨境支付天然带有欺诈和金融犯罪风险：FX
              操纵、结算欺诈、 APP 授权推送支付欺诈都是真实风险。Airwallex 提到 AI 驱动的交易监控，但没有披露效果指标。合作伙伴集中度是关键子风险：
              平台在关键走廊依赖少数持牌银行伙伴完成法币结算；若主要银行伙伴因监管行动或商业分歧流失，结算能力可能短期受损。 云基础设施集中在
              AWS；即便假定已做多区域部署，区域性故障也会检验这些故障切换假设。嵌入式金融客户把 Airwallex 接进自己的产品， Airwallex
              的宕机就会变成这些客户的宕机——运营风险因此被放大。人员风险也不轻：创始人 CEO Jack Zhang 的战略判断和监管关系是 Airwallex
              增长的核心，若其离任，会带来显著领导层不确定性。四位联合创始人仍活跃在公司，相比单一创始人同行，领导梯队更厚； 但公开资料没有记录正式继任计划。Trustpilot
              等评论平台出现账户冻结和转账延迟投诉，说明运营摩擦仍会实质影响用户满意度和留存。 总体运营风险评级为中高；公司已运营八年且没有重大公开事故，使该评级略有改善。
