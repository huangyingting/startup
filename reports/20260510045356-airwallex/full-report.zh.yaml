      - number: '5.2'
        title: 技术架构与基础设施
        blocks:
          - type: paragraph
            body: >-
              Airwallex 在 2016 到 2023 年间建设专有支付基础设施，与 APAC、Europe 和 North America
              的本地清算网络建立直接结算关系。这套架构避开代理行中介，在多数支付走廊实现当日或次日结算，同时把 FX 价差成本从银行典型 2-4% 降到 Airwallex 客户的 0.5-1.5%。平台
              API-first，提供 REST 端点、webhook 事件流，以及面向 Web 和移动端的 SDKs。技术栈支持嵌入式金融客户的多租户，让平台可通过 Airwallex 的 Visa BIN
              sponsorship，以自身品牌创建子账户并发行卡。安全控制包括卡处理 PCI DSS Level 1 合规、静态 AES-256 加密、传输 TLS 1.2+，以及 SOC 2 Type II
              认证。基础设施在 2023 年末实现月度产品盈利，说明基础设施资本开支已大体消化，新增支付量的边际成本较低。LinkedIn 数据确认全球 4,000+ 员工，工程团队分布在 Melbourne、Hong
