      - number: '3.3'
        title: Airwallex 竞争护城河与战略定位
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的竞争护城河建立在五个主要支柱上，合在一起构成可防守的战略位置。第一，专有支付基础设施所有权：Airwallex 拥有支付通道，直接连接 70+ 个国家的本地支付系统，在 120+
              个市场支持当日结算，93% 的转账当日结算，50% 即时处理。这套基础设施绕过代理行网络，相比传统机构和多数通过银行中介转接的金融科技竞争者，降低费用并提升结算速度。第二，监管牌照深度：Airwallex 在
              Australia、United Kingdom、European Union、Singapore、Hong Kong 和 United States 等主要金融司法辖区持有 80+
              张牌照，合规覆盖代表多年重大投入，新进入者无法快速复制。第三，多产品平台广度：整合平台覆盖跨境支付、FX 管理、多币种账户、企业卡、费用管理和嵌入式金融
              API，降低客户切换成本，并随时间提高每账户收入。第四，开发者与嵌入式金融生态：API 层让技术平台把 Airwallex 基础设施整合进自己的产品，形成 B2B2B
              分发模式，放大直销之外的覆盖范围。第五，APAC 专长：创始团队在 Australia、Hong Kong 和 Southeast Asia
              的运营根基，带来更强的本地支付连接、监管关系和客户信任，这些都发生在全球增长最快的经济区域。关键弱点包括：在 North America 相比 Stripe 品牌认知较低；因私营状态公开财务披露有限；以及
              Trustpilot 和 G2 上记录的客户服务摩擦，用户反复提到入驻复杂和支持响应不足。
