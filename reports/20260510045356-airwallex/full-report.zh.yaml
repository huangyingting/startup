      - number: '1.3'
        title: 融资历史、估值与投资者
        blocks:
          - type: paragraph
            body: >
              Airwallex 从种子轮到 Series G，14 轮累计融资约 $1.58B。种子轮（$3M，2016 年 7 月，来自 Gobi Partners）之后，2017 年 Tencent、Sequoia
              Capital 和 Mastercard 参与的 Series A 合计融资 $19M。2018 年 7 月 Series B 融资 $80M，估值 $450M。2019 年 3 月的关键 Series C 融资
              $100M，估值 $1B+，使 Airwallex 成为澳大利亚第三家科技独角兽。

              Series C 之前，Airwallex 拒绝了 2018 年 Stripe 据称 $1B 的收购要约；这是一次定调战略选择。Series D（2020-2021）分三批合计融资 $300M。Series
              E（2021 年 9 月至 2022 年 10 月）合计融资 $400M，估值最高达 $5.5B，Lone Pine Capital 领投。Series F 在 2023 年 3 月融资 $200M，随后
              2025 年 5 月在 $6.2B 估值下融资 $300M，Visa Ventures 和 Salesforce Ventures 作为战略投资者参与。2025 年 12 月 Series G 融资
              $330M，估值 $8B，较六个月前的 Series F 约提升 30%；Addition（Lee Fixel）领投，T. Rowe Price、Activant、Lingotto、Robinhood
              Ventures 和 TIAA Ventures 参与。

              战略投资者包括 Tencent（所有早期轮次）、Sequoia Capital、DST Global、Salesforce Ventures 和 Visa，带来的不仅是资本，也包括分发关系。Salesforce
              和 Visa 的投资表明，嵌入式产品整合与企业销售渠道可能正在对齐。Addition 的 Lee Fixel 表示：「Airwallex 正在重塑全球商业银行格局。传统金融系统并不是为无边界企业而建。」
