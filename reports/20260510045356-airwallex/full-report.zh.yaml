companyProfile:
  summary: >-
    Airwallex 是 2015 年 1 月创立于 Melbourne 的全球 B2B 金融基础设施平台，由四位联合创始人 Jack Zhang（CEO）、Lucy Liu（President）、Xijing Dai 和
    Ki-lok Wong 搭建。公司在 2025 年 10 月跨过 $1B 年化收入，同比增长 90%，年化交易量超过 $235B。2025 年 12 月，Airwallex 完成 $330M Series G 轮融资，估值
    $8B，由 Addition（Lee Fixel）领投，DST Global、Lone Pine 和 Salesforce Ventures 参与，累计融资约 $1.58B。公司通过跨境支付、多币种账户、FX
    管理、企业卡、费用管理和嵌入式金融 API，服务 60+ 个国家的 200,000+ 家企业。Airwallex 持有 80+ 张监管牌照，并在 2023 年末实现月度盈利。主要企业客户包括
    TikTok、Canva、Brex、Rippling 和 Deel。
