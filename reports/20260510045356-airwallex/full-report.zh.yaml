          - type: paragraph
            body: >-
              Airwallex 在全球持有 20+ 张支付机构牌照，包括英国 FCA EMI authorisation（经 FCA register 确认）、Australia 的 APRA 监管授权、美国各州 money
              transmitter licenses，以及 EU、Hong Kong 和 Singapore
              的同等授权。多司法辖区牌照组合是显著进入壁垒，也向有跨境合规要求的企业客户发出信任信号。关键产品差异包括：货币支持广度（60+ 种货币，而竞争者为 30-50）、专有通道带来的 0.5-1.5% FX
              价差（银行为 2-4%），以及在一个平台中组合支付、卡、支出管理和嵌入式金融。Trustpilot 给 Airwallex 4.2/5 评分，G2 评论将 API 可靠性标为强项。负面信号包括：KYC 入驻摩擦是
              G2 和 Trustpilot 上最常见客户投诉；随着各司法辖区更新 AML 和支付规则，维护 20+ 张牌照的监管复杂度也在上升。Series G 路线图把更深的企业资金管理、North American
              BaaS 能力和更广 ERP 集成列为近期产品优先事项。从竞争差异看，Airwallex
              的统一多产品平台形成复利优势：客户添加模块后，支付、卡和支出管理之间的数据集成，让财务报告更准确，也减少手工工作。这一数据飞轮会随着客户把 Airwallex 嵌入核心财务运营而强化留存。缺少公开 API
              SLA、事故历史透明度有限、KYC 摩擦，是尽调在交易完成前应重点追问的主要产品体验缺口。总体看，产品组合在技术上可信，监管锚定充分，并在多币种深度和嵌入式金融灵活性上有差异；但 Stripe、Wise
              Business 和 Adyen 在所有产品维度上的竞争压力都在加剧，仍需持续跟踪。
