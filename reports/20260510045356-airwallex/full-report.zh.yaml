  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与可比框架
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的 Series G 估值为 $8 billion，在 December 2024 的 $330 million 融资中确定；按估算 ARR $800M-$1B+ 计算， 投后资本化约等于
              8-10x 往绩收入。可比口径下，Wise 当前公开市场估值约为 9-12x 远期收入； Adyen 在 2023 年回调前，历史峰值倍数曾达
              20-30x。调整后——考虑缺少经审计财务报表、九轮融资留下的优先权堆栈压力， 以及 50+ 张牌照全球布局带来的监管复杂度溢价——8-10x 隐含倍数看起来合理，但不便宜。Ripple
              隐含估值、Payoneer 公开市场表现等 私人市场可比样本显示，跨境支付金融科技公司的交易区间约为 6-15x 远期收入，取决于增长率、利润率轨迹和监管风险。
              收入质量是估值摇摆的关键：嵌入式金融和支出管理若继续增长（更高毛利、更经常性、软件属性更强），倍数有上修空间； 若 FX 仍占主导且抽佣率继续压缩，倍数会被压在 10x 以下。投资者应同时建模 IPO 和 M&A
              退出路径——若按 Wise 可比倍数 IPO， 估值可支撑 $15-20B；若由银行或支付存量机构战略并购，可能拿到更高溢价，但优先权堆栈摩擦也更大。 估值框架必须同时用牛市和熊市情形做压力测试，再决定是否出资。
