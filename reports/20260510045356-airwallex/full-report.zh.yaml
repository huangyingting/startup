  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层与采用轨迹
        blocks:
          - type: paragraph
            body: >-
              Airwallex 面向四类主要 B2B 客户：电商和平台型市场（跨境支付使用最重）、管理全球薪资和供应商付款的技术公司及 SaaS 企业、拥有 50–500 名员工并向国际扩张的中型企业，以及使用 API
              层的嵌入式金融平台构建者。按地域看，Airwallex 装机客户群偏向 Asia-Pacific（Australia、Hong
              Kong、Singapore），这是公司的创立地；Europe（UK、EU）渗透正在增长，North America 在 2025 年 12 月被指定为 San Francisco
              双总部后也出现早期进展。$330M Series G 新闻报道确认全球有 100,000+ 活跃企业。第三方分析师估计 2024–2025 年客户数同比增长 35–50%，与 ARR 从约 $500M 到
              $1B+ 的轨迹一致。采用信号包括集成深度（20+ 个 ERP 和会计工具连接器）带来的切换成本，以及多产品先落地再扩张模式：客户通常先从
              FX/支付起步，随后启用企业卡和支出管理。客户集中度是尽调关注点：公司未披露 top-10 客户收入占比，意味着大型平台客户可能带来超额收入风险，而这一点无法从总 ARR 数据或投资者沟通中看出。
