  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              全球 B2B 支付和金融基础设施市场竞争极其激烈，Airwallex 同时面对多个产品维度的挑战者。竞争格局可分为五类：Wise Business、OFX、WorldFirst
              等跨境支付专家；Stripe、Adyen 等全栈支付基础设施提供商；Brex、Mercury、Rippling 等支出管理和新银行平台；HSBC、Standard Chartered
              等拥有既有贸易金融能力的传统银行网络；以及以 Airwallex 自身为锚的多产品全球基础设施平台。每个竞争者在特定市场细分都有不同强项。Stripe 以估计超过 $15 billion 的年收入和覆盖 100
              个国家的深度集成，主导开发者工具。Wise Business 使用中间市场汇率，提供行业领先的费用透明度，并在 London Stock Exchange 上市。Adyen
              为全球零售商提供企业级全栈收单和终端支付平台。Brex 和 Mercury 专注美国市场，为高增长技术公司提供支出管理和银行基础设施。Airwallex 的多产品战略、专有基础设施所有权、80+ 张监管牌照和
              APAC 运营根基，使其位置独特；不过在 North America 和 Europe 的品牌认知与企业销售挑战，仍是需要持续投入补齐的重要竞争缺口。
