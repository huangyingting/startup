      - number: '1.4'
        title: 规模、运营指标与关键里程碑
        blocks:
          - type: paragraph
            body: >
              截至 2025 年末，Airwallex 的运营指标已进入全球增长最快的金融科技平台之列。公司在 2025 年 10 月跨过 $1B 年化经常性收入，约为 90% 年同比增长。年化交易量同比翻倍至
              $235B+。公司在全球服务 200,000+ 家企业客户，其中约一半使用多个产品。

              地理覆盖横跨 200+ 个国家和地区。Airwallex 在 North America、Europe、the Middle East 和 Asia-Pacific 持有约 80
              张监管牌照，是全球私营金融科技公司中监管覆盖最全面的公司之一。仅 2025 年，Airwallex 就进入 12 个新市场，包括 France、Canada、Japan、Brazil、Mexico、the
              UAE、Korea、New Zealand、Malaysia、Vietnam、Netherlands 和 Israel。

              Airwallex 在 2023 年末实现月度盈利；在继续大力投入地理扩张和产品的同时达到这一里程碑，意义不小。战略收购加速了市场进入：2025 年在 Vietnam 收购 CTIN Pay，在 United
              States 收购 OpenPay。公司还在 2022 年获得中国仅有两张外资公司支付牌照之一。关键企业客户包括 TikTok、Canva、Brex、Rippling 和
              Deel；这些技术公司验证了企业级产品质量和合规能力。Airwallex 拥有 26 个办公室，包括 Melbourne、Singapore、San Francisco、Hong Kong、London 和
              Shanghai；其运营足迹明显大于员工规模表面所示。
