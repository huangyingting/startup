      - number: '6.3'
        title: 扩张、集中度风险与渠道依赖
        blocks:
          - type: paragraph
            body: >-
              先落地再扩张是 Airwallex 的主要增长动作：企业先启用支付，再加入企业卡、支出管理和嵌入式金融 API。这种多产品扩张会随时间提高 ARPU 和切换成本，因为财务工作流变得深度嵌入。平台 API /
              嵌入式金融细分具有战略重要性，因为它实际上让 Airwallex 对终端用户不可见；如果平台客户增长，这就是结构性护城河。客户集中度风险未量化：Airwallex
              不披露头部客户的收入占比。如果少数高交易量平台客户（例如大型平台型市场）占 GMV 的 20%+，风险画像会显著上升。渠道依赖是次要关注点：Airwallex 依靠直销、伙伴推荐网络和 API
              开发者采用，但似乎不使用可能引入毛利率风险的转售商或分销商。Nuvei 的可比嵌入式支付定位说明，即便规模已大，平台中心型收入模式也可能制造隐藏集中度风险。SMBs
              的采购摩擦低（自助入驻），但需要合规审查的企业交易摩擦更高，会限制大客户成交速度。按地域看，Asia-Pacific 集中仍是风险。North American
              市场开发对降低这种集中度至关重要。整体而言，客户群证据大体正面，但对 pre-IPO 尽调而言仍明显不完整；任何投资承诺最终落定前，都强烈建议直接访谈客户。访问已验证数据室，并进行 3–5
              次直接企业客户访谈，是必要下一步。
