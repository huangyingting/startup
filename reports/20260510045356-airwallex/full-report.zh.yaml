      - 监控指标
      - 黄色触发
      - 否决触发
      - 优先尽调请求
    rows:
      - - 监管 / 牌照
        - 监管往来函件；公开执法登记；牌照状态
        - FCA、APRA 或 MAS 非正式问询或信息请求
        - 任何 Tier-1 市场牌照暂停或吊销
        - 要求数据室提供全部监管往来；逐管辖区风险评估
      - - 运营 / 安全
        - 正常运行时间 SLA 报告；公开事件披露；支持工单量
        - 任一季度故障持续 >4 小时；未解决的严重漏洞
        - 确认发生重大数据泄露，且触发监管通知义务
        - 经审计的正常运行时间报告；SOC 2 Type II 报告；渗透测试结果
      - - 银行伙伴集中
        - 各通道结算伙伴数量；IBAN 可用性
        - Tier-1 通道失去银行伙伴且无即时替代
        - 结算失败影响月交易量 >10%
        - 列出各通道结算银行伙伴；用模拟伙伴流失场景测试冗余
      - - 人员与关键人物
        - C-suite 任期；股权归属安排；高管招聘速度
        - 联合创始人离职，或媒体显示公开领导层争议
        - CEO 和 CTO 同时离职，且无具名可信继任者
        - 继任计划文件；key-man 保险政策；各联合创始人归属 cliff 数据
      - - 财务与模型风险
        - 月度 burn rate；按产品 take-rate 趋势；欺诈损失率
        - take-rate 同比压缩 >10%，或欺诈损失超过 TPV 的 0.5%
        - 在所称 2023 年月度盈利拐点之后，EBITDA 持续亏损
        - 经审计 P&L；分客户队列收入瀑布；抽成率趋势；信用损失准备表
    notes: 触发终止条件后应由董事会复核，而不是自动退出；阈值应按入场投资论点校准。
