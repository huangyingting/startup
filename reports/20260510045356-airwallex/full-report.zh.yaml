      - number: '1.5'
        title: 战略方向与竞争定位
        blocks:
          - type: paragraph
            body: >
              Airwallex 从 2025 年往后的战略由三条主线定义：打入美国市场、AI 驱动的财务自动化，以及从支付提供商演进为综合全球银行平台。2026-2029 年在美国投入
              $1B+，是公司成立以来最大的地理押注，锚点是 2025 年 12 月宣布的 San Francisco 双总部。

              AI 战略围绕「智能体金融」展开：专门化 AI 智能体利用 Airwallex 平台的上下文数据，自主执行复杂财务流程。CEO Jack Zhang 表示：「当 AI
              降低软件成本时，基础设施和数据会成为最终差异点。」首批 AI 智能体在 2025 年末随支出管理推出（Expense Submission Agent 和 Expense Policy
              Agent），平台上还规划了数百个。由此，Airwallex 的专有交易和资金管理数据被定位为更耐久的竞争护城河。

              Airwallex 相比 Wise、Revolut、Stripe、Adyen 和 Payoneer 的差异，在于只聚焦企业客户（非消费者）、拥有本地支付通道、监管牌照全面，以及 API-first
              嵌入式金融层支持第三方分发。公司面临的挑战包括：在 $1B+ 收入基数上维持 90%+ 增长；进入竞争高度激烈、既有玩家根基深的美国市场；以及应对日益复杂的全球监管。截至 2026 年 5 月，公司尚未沟通
              IPO 时间表；不过以 $8B 估值和 $1B+ ARR 看，Airwallex 最早可在 2027-2028 年成为可信的公开市场候选，具体取决于市场环境和盈利轨迹。
            claimRefs:
