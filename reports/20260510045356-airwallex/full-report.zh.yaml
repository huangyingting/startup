      - number: '8.3'
        title: 建议、尽调问题与入场纪律
        blocks:
          - type: paragraph
            body: >-
              基于公开信息，建议为有条件兴趣——前提是资料室尽调能够令人满意，重点包括经审计财务报表、客户留存指标（NRR/GRR）、 完整优先权堆栈分配瀑布，以及监管牌照完整性。Airwallex
              是一家高质量业务，市场位置可防守，监管能力已被验证， 也有可信的盈利路径。但 $8 billion 入场价格在基准情形下安全边际有限；缺少经审计财务报表，也意味着仅靠公开来源无法验证盈利叙事。
              必须守住入场纪律：若二级交易能较 Series G 价格折让 20-30%，基准和熊市情形下的风险调整回报会显著改善。
              优先投资条款包括下一轮有实质按比例跟投权、董事会观察员权利，以及信息权，至少包含季度经审计管理账。 投资授权应嵌入否决触发条件——监管牌照暂停、CEO 离任或 2024 年后持续 EBITDA
              亏损——并按季度监控。 P1（blocker）投前尽调问题为：(1) FY2023 和 FY2024 经审计财务报表，(2) 完整优先权堆栈分配瀑布和股权结构表， (3)
              按客户群组拆分的净收入留存和总收入留存。P2 问题包括完整监管牌照清单， 以及按走廊拆分的银行结算伙伴名单。若资料室尽调结果令人满意，对有 5-7 年周期且仓位控制合适的耐心资本投资者而言， 风险调整后基准情形
              IRR 10-18% 是合理的。
