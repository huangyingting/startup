      - number: '2.4'
        title: 增长驱动、采用约束与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Airwallex 市场的主要结构性顺风包括：关键市场实时支付通道采用（美国 FedNow、Brazil PIX、India UPI、英国 Faster
              Payments），由此催生多通道连接中间件需求；Europe 和 LATAM 的电子发票与结构化报告强制要求，迫使企业 AP/AR 工作流升级；以及跨境电商持续增长，把 SME
              卖家拉入国际支付基础设施。数字支付通道以 17.31% CAGR 推进，超过整体市场，因为传统电汇和支票的份额在下降。抵消这些驱动的，是限制市场渗透速度的结构性约束。190+
              个司法辖区的监管牌照碎片化，是最耗资本的约束：取得支付机构牌照通常需要 12–36 个月，并且每个市场都需要实质监管资本。SMEs 对非银行金融运营商的信任，短期仍是挑战，需要品牌投入和客户教育；在
              Airwallex 缺乏既有关系的新地域尤其如此。高切换成本来自 ERP 集成和嵌入银行的资金管理工具，即使 Airwallex 提供更好经济性，也会制造惯性。LATAM 和 MENA
              虽然是跨境支付增长最快地区，也承载最高监管复杂度和 FX 波动。关键未解决尽调缺口包括：（1）独立 B2B-only 收入池估算，（2）Airwallex 在 APAC、North America 和 EMEA
              之间的地域收入拆分，（3）各细分市场相对 Stripe、Wise 和 Adyen 的定价与竞争胜率数据。
