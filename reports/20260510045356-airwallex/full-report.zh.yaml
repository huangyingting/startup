  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流整合
        blocks:
          - type: paragraph
            body: >-
              Airwallex 是一个建立在统一 API-first 平台上的全球金融操作系统，服务 150+ 个国家的 SMBs 和企业。产品组合横跨五个核心模块：多币种账户，可在 30+ 个市场提供本地账户信息，并支持
              60+ 种货币；通过专有和本地支付通道进行跨境支付，绕过代理行银行；团队支出的企业 Visa 卡（虚拟和实体）；费用管理，覆盖票据采集、政策执行和会计集成；以及嵌入式金融 API
              层，让第三方平台白标金融服务。Brex 和 Rippling 等客户使用 API 层驱动自己的金融产品。平台原生集成 Xero、NetSuite、QuickBooks 和 Slack，减少手工对账，并把
              Airwallex 嵌入客户财务工作流。这种深度工作流整合制造切换成本，因为客户会配置实体结构、FX 政策、审批流程和会计映射，在竞争平台上复制成本高、耗时长。统一产品套件把 Airwallex
              定位为一站式金融操作系统，而不是单点解决方案。
