      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >-
              Airwallex 服务五类主要客户，每类客户的买方画像、工作流和采用触发点不同。国际化 SMEs 是数量最高的获客细分，平均合同价值最低；通常是创始人或 CEO
              牵头、正在国际扩张的公司，在第一张国际发票上遇到银行高 FX 价差（1–3%）。中型企业客户通过销售驱动动作进入，主题多是资金管理现代化或多币种 AP/AR 工作流，由追求运营效率的 CFO
              推动。企业技术平台（Canva、TikTok、Brex、Rippling）是 ACV 最高的客户细分，通过 API 嵌入 Airwallex 基础设施，以 B2B2B
              模式向自身客户提供金融产品。平台型市场运营方用 Airwallex 向国际卖家或承包商进行多方跨境付款。VC
              支持初创公司是战略上重要的获客漏斗，因为它们有国际增长导向，也愿意采用金融科技导向的银行服务。Mordor Intelligence 预计 SME 细分将以 16.23% CAGR
              增长，略快于整体市场；大型企业目前占 60.31% 收入份额。Airwallex 的 PLG 动作先以低 CAC 优化 SME 获客，再通过企业卡、费用管理、FX
              对冲和嵌入式金融产品的交叉销售，系统性扩大中型和企业客户的钱包份额。
