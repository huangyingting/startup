  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Airwallex 位于三个重叠市场的交叉点：全球 B2B 跨境支付、60+ 个国家的本地 B2B 支付通道，以及通过 API 销售给软件平台的嵌入式金融基础设施。Mordor Intelligence
              估算，2025 年整体 B2B 支付市场规模约 $1.42 trillion，并将以 15.48% CAGR 增长至 2031 年。这个大市场里的跨境流量增长更快，CAGR 为 16.52%，驱动来自 SME
              供应链全球化、跨境电商和代理行银行体系数字化。Airwallex 的相关可服务市场不包括消费者汇款、零售 FX
              投机、消费信贷和仅面向企业的机构银行业务；这些领域需要不同的监管框架和分发模式。嵌入式金融（FinTech-as-a-Service）是一个快速增长的邻近机会；Airwallex 把自己的 API
              层定位为软件平台的基础设施，让平台无需自建底层金融基础设施，也能向自身企业客户提供支付、卡和账户。随着 Airwallex 产品越来越覆盖三个市场，边界正在变模糊，也让公司同时捕获直接客户收入和 B2B2B
              平台分发收入。
