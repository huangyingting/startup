  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险格局
        blocks:
          - type: paragraph
            body: >-
              Airwallex 的全球优先战略要求在 50+ 个司法辖区持有有效金融牌照，因此监管风险是严重性最高的单一威胁类别。公司持有 Australian Financial Services License
              (AFSL)，并受 APRA 和 ASIC 监管；持有英国 Financial Conduct Authority (FCA) 的 Electronic Money Institution (EMI)
              licence；并由 Monetary Authority of Singapore (MAS) 作为 Major Payment Institution
              监管。每个监管机构都施加不同的资本充足、客户资金保护、AML/CFT
              和报告要求。单一执法行动——即便只是临时暂停——发生在一个核心司法辖区，也可能触发跨境信心效应，因为企业客户和银行合作伙伴会对基础设施提供商进行多司法辖区尽调。Airwallex
              的合规姿态一直主动管理：公司保留专业监管律师，在其受监管市场发布合规文档，并且截至研究日期没有遭遇重大公开执法行动。不过风险不是零：全球金融科技监管环境正在收紧，BIS CPMI
              对多币种支付提供商设定更高标准，UK 和 EU 监管机构也在加强对嵌入式金融提供商的 AML/CFT 审查。来自数据隐私执法（GDPR、Australian Privacy Act）、IP
              争议和第三方合同责任的法律风险真实存在，但目前低于直接监管风险。Airwallex 进入碎片化的美国州级牌照体系，进一步增加复杂度。监管风险登记（TR001）覆盖主要司法辖区；新兴市场牌照只记录了部分。
