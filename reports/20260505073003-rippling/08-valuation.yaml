  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Preference stack and structured financing terms
      missingEvidence: >-
        Liquidation preferences, participation, ratchets, and any senior securities created in the 2024 and 2025
        financings are not public.
      whyItMatters: >-
        Headline valuation can materially overstate common-equity value if later rounds carry downside protection or
        preferred economics.
      diligencePath: Obtain the cap table, charter, financing docs, and a fully diluted waterfall before underwriting entry price.
      relatedQuestionRefs:
        - RQ826
    - type: private-evidence-only
      severity: blocking
      topic: Blended gross margin and free-cash-flow profile
      missingEvidence: >-
        Public sources do not disclose audited gross margin, burn, or free-cash-flow generation by software, payments,
        or EOR lines.
      whyItMatters: >-
        Premium software multiples require evidence that unit economics improve with scale rather than merely high
        top-line growth.
      diligencePath: Request board reporting or audited management accounts with margin and cash-flow cuts by major product family.
      relatedQuestionRefs:
        - RQ827
    - type: private-evidence-only
      severity: material
      topic: Retention and expansion outside the PEO cohort
      missingEvidence: >-
        The retained public retention proof is specific to the PEO cohort and does not disclose net dollar retention or
        multi-product expansion for the broader platform.
      whyItMatters: The valuation premium depends on broader platform stickiness, not just one subset of customers.
      diligencePath: Ask for logo retention, NDR, module attach, and cohort expansion by customer size and product family.
      relatedQuestionRefs:
        - RQ828
    - type: private-evidence-only
      severity: material
      topic: Customer, geography, and payments concentration
      missingEvidence: >-
        Public evidence does not reveal whether ARR, EOR activity, or payments volume is concentrated in a few
        customers, industries, or countries.
      whyItMatters: Hidden concentration could magnify downside in a downturn, regulatory shock, or customer-loss event.
      diligencePath: Review top-customer, country, and payment-volume concentration schedules plus churn data.
      relatedQuestionRefs:
        - RQ829
    - type: private-evidence-only
      severity: material
      topic: Litigation reserve and probable loss range
      missingEvidence: >-
        Public complaints and press reports do not quantify reserves, insurance recoveries, or the likely settlement
        range of the Deel dispute.
      whyItMatters: The legal fight could affect both valuation discount and exit timing even without a final merits loss.
      diligencePath: Request outside-counsel assessment, insurance coverage, reserve memos, and the current discovery calendar.
      relatedQuestionRefs:
        - RQ830
    - type: enumeration-incomplete
      severity: minor
      topic: Comparable valuation table coverage
      missingEvidence: >-
        The retained comp set covers the most decision-useful public payroll and HCM names, but it does not exhaust
        every private round, M&A analogue, or global peer in HR tech.
      whyItMatters: >-
        A broader private-market comp sweep could modestly tighten the bull and base ranges, especially if secondary
        marks or M&A comps become available.
      diligencePath: >-
        Expand the comp set with broker secondary marks, private financing docs, and M&A precedents once access is
        available.
      relatedTableRefs:
        - T804
