company:
  name: Rippling
chapter:
  number: 8
  title: Valuation
  summary: >-
    Recommendation stays at research-more because Rippling shows premium-quality signals, but the public evidence is
    still too thin to endorse the $16.8 billion mark.
sections:
  - id: S801
    title: Recommendation and present valuation anchor
    body: >-
      Rippling looks like a high-quality private software asset, but the public evidence does not clear the bar for a
      buy at the May 2025 price. The company has clearly preserved access to premium capital: management announced a
      $450 million primary round, a parallel $200 million repurchase program, and a $16.8 billion mark. The same
      retained source set also says management is not preparing for a near-term IPO and would prefer to be closer to
      profitability first. That matters because current price discovery still comes from private investors, not from a
      public market willing to continuously validate the mark. Public revenue evidence is also split between a reported
      $570 million annualized run rate in 2025 and analyst-style estimates that revenue may have reached roughly $1.0
      billion by March 2026. At the lower anchor, the round implies roughly 29x annualized revenue; even at the more
      optimistic estimate, the mark is still about 16.8x. Against public payroll and HCM comps that mostly sit in the
      3x-7x EV/Revenue range, the present valuation only works if diligence confirms that Rippling is already behaving
      more like a durable multi-product platform than a fast-growing but still opaque private payroll company. That is
      enough for a research-more call, not enough for a buy.
    claimRefs:
      - CV001
      - CV002
      - CV007
      - CV008
      - CV010
      - CV011
      - CV012
      - CV033
      - CV034
      - CV046
      - CV048
  - id: S802
    title: Thesis, anti-thesis, and scenario logic
    body: >-
      The thesis is straightforward. Rippling appears to be building a unified system around employee data, with more
      than two dozen products across HR, IT, and spend; official materials and third-party reporting both support a real
      land-and-expand platform story. More than 20,000 customers, 4,000-plus employees, and unusually strong disclosed
      PEO retention are all consistent with a business that has escape velocity and some switching-cost durability. If
      Sacra's estimate that annualized revenue was already near $1 billion by March 2026 is directionally right, the
      2025 round may prove merely expensive rather than reckless. The anti-thesis is just as important. Official pricing
      is still largely quote based, audited profitability is unavailable, and even core underwriting metrics such as
      gross margin, net dollar retention, customer concentration, and liquidation terms remain private. At the same
      time, the company and Deel are now locked in a sprawling legal fight with dueling espionage allegations, a
      Delaware amended complaint, motions attacking the California case, and later RICO allegations from Rippling. That
      combination means current valuation support is evidence sensitive: bull outcomes need both continued 30%+ growth
      and cleaner diligence proof, while bear outcomes arrive quickly if growth slows before profitability or if the
      legal dispute expands the discount rate.
    claimRefs:
      - CV015
      - CV016
      - CV017
      - CV018
      - CV020
      - CV021
      - CV022
      - CV012
      - CV037
      - CV038
      - CV039
      - CV040
      - CV041
      - CV042
      - CV045
      - CV050
  - id: S803
    title: Comparable context and price discipline
    body: >-
      Comparable context does not make Rippling uninvestable; it does make the current mark hard to call attractive.
      Public market references remain much cheaper: Multiples.vc shows Paychex near 6.5x EV/Revenue, Workday around
      3.3x, Paylocity around 3.7x, and Paycom around 2.9x. Those are imperfect comps because Rippling is earlier, faster
      growing, and broader across HR, IT, payroll, and spend than most mature payroll vendors. Finro's 2025 framing
      helps explain why the premium exists at all: payroll and HRIS businesses tend to hold stronger multiples than many
      other HR-tech categories because they combine recurring revenue with high retention and workflow criticality. But
      Finro also stresses that public markets price profitability expectations more aggressively than private investors
      do. That is the central discipline point here. If Rippling is already near $1 billion in annualized revenue, the
      premium may be defensible for a scarce category leader with blue-chip backing and recurring employee liquidity. If
      the more durable anchor is still closer to the reported $570 million run rate, then investors are paying a
      multiple far outside public precedent and betting that private execution will close the gap before the next
      price-setting event. Public evidence does not yet prove that leap.
    claimRefs:
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV033
      - CV034
      - CV043
      - CV046
      - CV052
  - id: S804
    title: Downside triggers, exit readiness, and what still blocks underwriting
    body: >-
      The main downside triggers are measurable. First, if growth falls below the high-20s before the company shows a
      credible profitability path, the current premium compresses toward public software ranges quickly. Second, if
      diligence reveals that gross margins, attach economics, or net retention are materially weaker than the public
      platform story implies, the entry case for common equity deteriorates immediately. Third, the legal battle with
      Deel is now broad enough that even a non-fatal outcome can slow an IPO or strategic sale, increase governance
      scrutiny, and force more diligence work around reserves, insurance, and management conduct. Fourth, current public
      sources do not describe the cap-table preference stack, structured financing protections, or the real economics of
      the employee liquidity programs, so a common-equity investor cannot yet tell whether the headline mark is also the
      true risk-adjusted entry price. Those gaps are fixable in diligence, but until they are fixed the right posture is
      research-more with strict entry discipline. A lower price in the low-to-mid teens, or audited proof that revenue
      is already close to the optimistic range with resilient margins and contained litigation exposure, would likely
      move the recommendation toward track. Without that, public evidence supports caution.
    claimRefs:
      - CV007
      - CV008
      - CV035
      - CV043
      - CV047
      - CV048
      - CV049
      - CV050
