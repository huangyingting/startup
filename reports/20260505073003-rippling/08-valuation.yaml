      - C387
      - C398
      - C401
      - C403
      - C404
  - id: T806
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner or diligence path
    rows:
      - - Revenue bridge
        - >-
          Audited 2025 revenue / ARR, monthly exit rate, and definition reconciliation across management and secondary
          sources
        - Current valuation swings dramatically depending on whether the real anchor is ~$570M or closer to ~$1B.
        - Request CFO revenue bridge and board materials used for the 2025 round.
      - - Margin quality
        - Blended gross margin, software margin, payments / EOR margin, burn, and free-cash-flow profile
        - Premium SaaS pricing is hard to defend without evidence that economics improve with scale.
        - Obtain product-level P&L or at least segment contribution margin cuts.
      - - Retention and expansion
        - Net dollar retention, logo retention outside PEO, attach by cohort, and churn by product family
        - Public 99.5% retention is only for the PEO cohort and may not describe the whole platform.
        - Ask for cohort analyses by customer size, geography, and module count.
      - - Cap-table economics
        - Liquidation preferences, participation, ratchets, and employee tender mechanics
        - Headline valuation may overstate common-equity value if structured protections sit ahead of new investors.
        - Review financing docs and fully diluted waterfall.
      - - Legal exposure
        - Reserve, insurance, counsel view, discovery posture, and probable loss range for Deel litigation
        - Even a winnable case can slow exit timing and expand the discount rate.
        - Review outside-counsel memo plus insurance and reserve schedules.
      - - Concentration
        - Top customers, geographic mix, EOR exposure, payments volume concentration, and regulated-country mix
        - Hidden concentration can break the platform premium quickly in a downturn or regulatory shock.
        - Request top-20 customer, country, and payments concentration schedules.
    notes: null
    claimRefs:
