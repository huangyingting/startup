  - id: TV004
    title: Comparable valuation table
    columns:
      - Comparable
      - Metric
      - Multiple / valuation / status
      - Relevance
      - Limitation
    rows:
      - - Paychex
        - EV/Revenue; mature payroll + PEO incumbent
        - 6.5x EV/Revenue; ~800k clients and ~2.5M worksite employees
        - Closest mature payroll / PEO reference for sticky compliance workflows and outsourcing revenue.
        - Far more mature and profitable than Rippling; growth profile is much lower.
      - - Workday
        - EV/Revenue; enterprise HCM platform
        - 3.3x EV/Revenue
        - Relevant for long-term platform ambition beyond payroll.
        - Enterprise buyer base and scale differ materially from Rippling's current mix.
      - - Paylocity
        - EV/Revenue; midmarket payroll + HCM
        - 3.7x EV/Revenue; >41k customers and >$1.5B fiscal 2025 revenue in Multiples.vc profile
        - Useful midmarket SaaS comparator for payroll-led expansion.
        - Still a public, more mature, narrower platform with lower growth assumptions.
      - - Paycom
        - EV/Revenue; payroll + HCM software
        - 2.9x EV/Revenue
        - Shows where high-quality but maturing HCM software can trade in public markets.
        - Does not capture Rippling's IT and spend adjacencies.
      - - Rippling (implied)
        - Valuation / annualized revenue
        - $16.8B mark implies ~29x on $570M or ~16.8x on $1.0B
        - Frames the premium investors are underwriting for private growth, breadth, and optionality.
        - Depends heavily on private metrics and non-audited analyst estimates.
    notes: >-
      Selected public references are the most relevant payroll/HCM anchors from retained sources, but they are not an
      exhaustive set of every public, private, or M&A analogue.
    enumerationScope:
      coverage: partial
      basis: >-
        This table intentionally focuses on the most decision-useful public payroll and HCM anchors plus Rippling's
        implied multiple, rather than every HR-tech name shown in the market-data source.
