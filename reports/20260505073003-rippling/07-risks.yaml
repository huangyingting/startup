  - id: section-4
    title: Mitigations are visible but the thesis still needs explicit thesis-break triggers
    body: >-
      The right read on Rippling is not that controls are absent; it is that the public mitigations are substantial but
      incomplete for underwriting downside with confidence. The company has done many of the right things in public:
      distinct regulated subsidiaries, annual compliance reviews, annual audits, explicit DPA and privacy framing, daily
      sanctions screening, vendor reviews, and visible incident reporting. Those signals lower the probability that risk
      is unmanaged. They do not answer the questions that matter most to downside protection: which countries are still
      in licensing transition, how large the biggest customers and rails are, what payroll-error indemnities actually
      look like, and whether enterprise support or service commitments are strong enough when payroll or identity issues
      hit a deadline. That is why the thesis-break triggers need to be explicit. An adverse injunction or merits loss in
      the Deel matter, a material privacy or payroll enforcement action, repeated payroll or login incidents near
      approval deadlines, or evidence that support bottlenecks are driving customer churn would all break the broad
      platform with manageable execution risk thesis. Conversely, if management can produce a clean licensing ledger,
      contract pack, concentration schedules, and low-severity incident metrics, residual risk should compress
      materially.
    claimRefs:
      - C311
      - C315
      - C318
