  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Public SLA indemnity and liability caps for payroll or privacy failures remain unavailable
      missingEvidence: >-
        No retained public customer contract pack exposed negotiated indemnity carve-outs, service credits,
        payroll-error remedies, or privacy-specific liability caps.
      whyItMatters: >-
        Without those terms, downside from a payroll outage, data incident, or compliance miss cannot be priced from
        public artifacts alone.
      diligencePath: >-
        Obtain enterprise MSA, payroll terms, DPA, incident-response commitments, and any negotiated indemnity or
        service-credit side letters from management.
      relatedQuestionRefs:
        - RQ728
    - type: missing-source
      severity: material
      topic: Customer and counterparty concentration is not publicly quantified
      missingEvidence: >-
        Public materials do not disclose top-customer exposure, payroll volume concentration, payment-rail dependence,
        or partner revenue mix.
      whyItMatters: >-
        A few large customers or rails could amplify outage, compliance, pricing, or churn shocks beyond what the public
        customer count suggests.
      diligencePath: >-
        Request top-20 customer list by ARR and payroll volume, payment-rail mix, major partner contracts, and churn by
        segment.
      relatedQuestionRefs:
        - RQ729
    - type: enumeration-incomplete
      severity: material
      topic: Country-by-country pending payments licensing map is incomplete
      missingEvidence: >-
        Rippling discloses that additional money-transmitter and e-money authorizations are being sought, but not the
        full jurisdiction-by-jurisdiction pending list.
      whyItMatters: >-
        Investors cannot verify where payroll or payments may still depend on partner structures or transitional
        licensing arrangements.
      diligencePath: >-
        Request the full licensing ledger by entity and jurisdiction, including pending applications, temporary
        permissions, and fallback operating models.
      relatedQuestionRefs:
        - RQ730
    - type: enumeration-incomplete
      severity: minor
      topic: Regulatory and legal risk register is severity-ranked but not globally exhaustive
      missingEvidence: >-
        The retained public record is strong on Deel litigation, privacy, licensing, and payroll-compliance obligations,
        but not on every local inquiry or customer dispute.
      whyItMatters: >-
        The highest-severity legal stack can be ranked, yet small local matters could still affect implementation
        timelines or enterprise procurement diligence.
      diligencePath: >-
        Ask management and outside counsel for a complete litigation, regulatory inquiry, and claims schedule by
        jurisdiction.
      relatedTableRefs:
        - T701
