  - id: section-3
    title: Dependency customer-friction and financial-model risk can transmit into growth and valuation
    body: >-
      Rippling's product breadth creates both moat and concentration risk. The company says EOR runs through affiliates,
      partners, and local counsel in every country, while payroll and payments rely on regulated entities, fraud
      controls, external vendors, and AWS infrastructure. That means dependency risk is not confined to one cloud bill;
      it sits across local employment partners, identity integrations, browsers, payment compliance workflows, and
      third-party services that can block login or slow payroll. Customer-facing evidence points in the same direction.
      Public review sources do not overturn Rippling's strong aggregate ratings, but they repeatedly surface
      mission-critical pain points: payroll errors, slow support, opaque pricing as modules accumulate, integration sync
      problems, and mobile or usability friction. Those are exactly the complaints that can increase churn or expansion
      resistance when the product is sold as an all-in-one control plane. Financially, Reuters reported Rippling was
      still unprofitable in May 2025 and had no specific IPO plans, while TechCrunch tied the company to a much larger
      execution footprint at private scale. That does not mean Rippling is fragile, but it does mean investors are
      underwriting a large, complex platform that still depends on private capital flexibility, rapid execution, and
      continued customer willingness to tolerate complexity in exchange for consolidation.
    claimRefs:
      - C314
