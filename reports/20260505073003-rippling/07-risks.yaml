  - id: T705
    title: Mitigation and thesis-break criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold/event
      - action implication
    rows:
      - - Deel litigation / espionage matter
        - Court posture
        - Injunction adverse merits ruling or discovery revealing broader misconduct than the public record suggests
        - Pause underwriting or reset downside case until legal exposure is re-modeled.
      - - Payments / licensing posture
        - Regulatory approvals and exceptions
        - Denial suspension or delayed renewal of a material payments PEO or EOR authorization
        - Treat as thesis break for the seamless global payroll narrative in affected corridors.
      - - Payroll reliability
        - Payroll incident cadence
        - >-
          Two or more deadline-affecting payroll incidents in a quarter or one material payroll miss without contractual
          remediation
        - Escalate churn support-cost and brand-damage assumptions.
      - - Identity / third-party dependence
        - Login or SSO outage severity
        - One multi-hour third-party outage or repeated SSO failures near payroll or onboarding deadlines
        - Require evidence of redundancy failover and vendor remedies before proceeding.
      - - Customer support / pricing friction
        - Support and renewal signals
        - Enterprise churn or NRR weakness tied to support delays pricing surprises or module complexity
        - Cut expansion assumptions and re-rate sales-efficiency durability.
      - - Private-capital dependence
        - Funding versus profitability trajectory
        - Material growth slowdown without a path to profitability and no clean liquidity window
        - Reframe Rippling as capital-dependent rather than compounding and compress valuation support.
    notes: These triggers are deliberately measurable so a future valuation chapter can turn them into scenario breaks.
