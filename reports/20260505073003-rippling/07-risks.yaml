chapter:
  number: 7
  title: Risks
  summary: >-
    Rippling's highest residual risks are the live Deel litigation stack, expanding payroll, payments, and privacy
    compliance burden, and operational dependencies that can hit payroll, access, and customer trust. Public mitigations
    are meaningful, but private evidence is still needed on contracts, concentration, and licensing completeness before
    downside can be underwritten confidently.
sections:
  - id: section-1
    title: Legal and regulatory risk is the primary residual overhang
    body: >-
      Rippling's top residual risk is not ordinary SaaS churn; it is a combined legal-and-regulatory stack that now
      spans live competitor litigation, payroll-and-payments licensing, and privacy obligations tied to employee data.
      The Deel matter is material because it is no longer a one-way allegation. Rippling's March 2025 federal complaint
      pleaded RICO and trade-secret claims, but Deel answered with a Delaware countersuit, adverse allegations that
      Rippling infiltrated Deel's platform 58 times, and later a public statement that fraud and RICO counts against
      Deel were dismissed. Even if many of those facts remain disputed or competitor-sourced, the existence of
      multi-front litigation means legal spend, management distraction, reputational damage, and discovery risk are
      already real. Separately, Rippling's own compliance materials show why regulation matters here: insurance, PEO,
      EOR, payroll, and payments sit inside different licensing, bonding, tax, and privacy regimes. The company
      discloses an Insurance and Regulatory Committee plus dedicated subsidiaries, which is a real mitigation, but it
      also discloses that new payments licenses are still being pursued in multiple countries. For investors, that
      combination means the base case is not lawsuit noise; it is a platform whose core products operate inside an
      expanding compliance perimeter.
    claimRefs:
