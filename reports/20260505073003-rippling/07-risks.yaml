  - id: section-2
    title: Operational reliability and privacy posture matter because payroll and identity failures are customer-critical
    body: >-
      Rippling's public mitigation stack is stronger than many private HR-tech peers, but the operational evidence shows
      why buyers still need to underwrite residual risk conservatively. On the positive side, Rippling publicly cites
      annual SOC audits, CSA STAR, ISO 27001, ISO 27018, ISO 42001, penetration testing, a bug bounty, vendor security
      reviews, background checks, and automated offboarding controls. Those are meaningful controls for a system that
      touches payroll, benefits, devices, identity, and spend. The problem is that the company's own status feed also
      shows a recurring incident pattern across login, payroll, search, reports, notifications, time-and-attendance, and
      device-trust surfaces. Two incidents are especially relevant for diligence: a May 2026 payroll visibility issue
      that required extending an approval deadline, and an April 2026 Google Workspace metadata deletion that
      temporarily broke SSO and routed some messages to personal email accounts. The November 2025 login outage
      attributed to a third-party provider and the Chrome-142 Device Trust disruption reinforce the same point:
      Rippling's architecture is broad enough that seemingly narrow failures can propagate into identity,
      communications, payroll timing, and compliance-sensitive workflows. In a product managing wages and employee data,
      resolved quickly does not remove customer-criticality.
    claimRefs:
      - C332
      - C333
      - C334
      - C335
      - C336
      - C337
      - C338
      - C339
      - C340
      - C341
