  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: Named customer proof table sample coverage
      missingEvidence: >-
        The public web contains many named Rippling stories, but this chapter only retained a representative subset with
        quantifiable outcomes and corroborating mirrors.
      whyItMatters: >-
        Enumeration without a scope note could imply exhaustive customer coverage when the retained table is
        intentionally selective.
      diligencePath: >-
        If customer concentration becomes an underwriting issue, build a larger customer ledger with customer name,
        industry, module set, go-live date, and independent corroboration per logo.
      relatedQuestionRefs: []
      relatedTableRefs:
        - TU003
    - type: private-evidence-only
      severity: blocking
      topic: Suite-wide non-PEO retention and cohort data
      missingEvidence: >-
        No retained public source discloses Rippling-wide NRR, GRR, churn, renewal rate, or module-level cohort
        percentages outside the PEO retention blog.
      whyItMatters: >-
        Without suite-wide retention data, public adoption and satisfaction evidence cannot be translated into durable
        recurring-revenue quality.
      diligencePath: >-
        Request logo and revenue retention by module, geography, customer size, and cohort month, plus churn reasons and
        renewal term structure.
      relatedQuestionRefs:
        - QU018
        - QU021
        - QU022
      relatedTableRefs:
        - TU004
    - type: enumeration-incomplete
      severity: material
      topic: Retention cohort figure substitution
      missingEvidence: >-
        The retained source set does not provide a public time-bucket retention matrix with 0-100 cohort percentages
        suitable for the planned cohort figure.
      whyItMatters: >-
        A cohort chart would overstate precision because the public record has one PEO retention statistic and review
        scores, not a true cohort dataset.
      diligencePath: >-
        Request monthly or quarterly retention cohorts by product line and revenue band, then rebuild the figure with
        real percentages.
      relatedQuestionRefs:
        - QU021
        - QU022
      relatedTableRefs:
        - TU004
    - type: private-evidence-only
      severity: blocking
      topic: Top-customer concentration and channel mix
      missingEvidence: >-
        No retained public source discloses top-customer revenue share, top-10 account concentration, or the share of
        pipeline and revenue coming through brokers, partners, or direct sales.
      whyItMatters: >-
        Expansion upside is easier to see than downside concentration risk, so missing concentration data leaves an
        underwriting blind spot.
      diligencePath: >-
        Request customer concentration by ARR and gross profit, industry/geography concentration, and channel-sourced
        pipeline / bookings by quarter.
      relatedQuestionRefs:
        - QU025
      relatedTableRefs:
        - TU005
