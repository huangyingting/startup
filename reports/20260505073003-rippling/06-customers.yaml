  - id: S602
    title: Named deployment evidence is strong on production use and operational outcomes, but weaker on cohort durability
    body: >-
      Rippling clears the “named customer proof” bar because the retained evidence goes well beyond logo walls. Barry’s
      describes concrete workflow improvements at 53 US locations, including new-hire setup falling from roughly 15
      minutes to three-to-five minutes and status changes dropping from 10–15 minutes to about three minutes. Clay says
      it automated 80% of onboarding tasks while growing from 20 to 100 employees over 18 months. Morning Consult says
      it added more than 300 employees in under two years, ran payroll, benefits, and devices for 500 employees with a
      two-person admin team, and saved 500 hours per year. Ethical Energy says it converted 40 contractors into
      employees in one day, eliminated five software tools, and automated spend-card issuance. Compass Coffee reports a
      96% reduction in HR and IT admin time and a 6x faster onboarding process. NinjaTech AI describes a one-person HR
      team running three-country payroll and producing a verified investor report in roughly 100 seconds.


      Those outcomes are consistent enough across multiple named customers to support a production-maturity conclusion:
      Rippling is being used to run live payroll, onboarding, offboarding, IT provisioning, benefits, spend, and
      reporting workflows, not just pilots. What is missing is broad public retention transparency. Rippling’s own blog
      provides a strong 99.5% year-over-year retention statistic for the PEO product, and independent review sources
      show high satisfaction, but public non-PEO NRR, GRR, churn, and cohort tables remain unavailable. So the
      durability case is positive but incomplete: the company has compelling production proof and favorable satisfaction
      markers, yet investors still cannot validate retention quality across the broader suite from public evidence
      alone.
