        - People ops + payroll admins / studio managers / corporate finance
        - Payroll, onboarding, transfers, offboarding, retention reporting
        - 'Barry''s: 53 US locations with frequent entity changes'
        - Proves Rippling can handle multi-entity hourly operations, a sticky operational wedge
        - No public ACV or renewal term disclosed
      - - High-growth software / tech
        - People leader or ops admin / managers / CFO
        - Onboarding automation, payroll, compliance, reporting
        - 'Clay: 20 to 100 employees in 18 months; Morning Consult: 500 employees with two admins'
        - Shows fit for scaling tech companies that want to add headcount without adding back-office headcount
        - Public evidence does not break out module attach by cohort
      - - Retail / restaurant / hospitality
        - Founders or HR leads / store managers and employees / finance
        - Payroll, benefits enrollment, HR and IT admin, hourly workforce support
        - 'Compass Coffee: 50-99 employees and 12 stores; Blank Street: 430 employees across US and UK'
        - Shows Rippling can serve labor-intensive, distributed operators where admin minutes matter
        - No public churn data for hospitality-heavy cohorts
      - - Manufacturing / field operations
        - CFO/COO / field employees / finance
        - Contractor-to-employee conversion, spend controls, card automation
        - 'Ethical Energy: 40 worker conversion in one day, 50 employees total'
        - Demonstrates Rippling can expand from HR into spend and card controls in operational businesses
        - No public evidence on renewal economics after the emergency onboarding event
      - - Global distributed startup teams
        - Solo people ops leader / executives and employees / finance
        - Multi-country payroll, reporting, AI-assisted workforce analytics
        - 'NinjaTech AI: 24 employees across three countries and currencies'
        - Shows Rippling can win where cross-border reporting speed matters even with lean teams
        - Single case study; no public benchmark for broader global cohort retention
    notes: Named stories imply Rippling resonates most where HR, payroll, IT, finance, and global workflows intersect.
