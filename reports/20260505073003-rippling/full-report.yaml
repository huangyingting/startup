      - number: '1.3'
        title: Capital formation, investor base, and employee-liquidity signals
        blocks:
          - type: paragraph
            body: >-
              Rippling's public financing record now supports a clear late-stage growth profile. The official Series B
              announcement disclosed a $145 million round led by Founders Fund with a heavyweight syndicate that also
              included Greenoaks, Coatue, Bedrock, Kleiner Perkins, Initialized, and Y Combinator. By September 2023,
              IDA Ireland described Rippling's latest Series E as a $500 million raise at an $11.25 billion valuation.
              TechCrunch then described a 2024 Series F of $200 million at a $13.4 billion valuation, paired with a $590
              million tender offer, while Reuters and TechCrunch reported a May 2025 Series G of $450 million at a $16.8
              billion valuation plus a fresh $200 million employee tender. The 2025 round also surfaced a broader
              investor set including Y Combinator, Elad Gil, Sands Capital, GIC, Goldman Sachs Growth, and Baillie
              Gifford. Those repeated tender structures matter because they show Rippling using private-market
              mechanisms to provide liquidity without committing to an IPO timeline.
