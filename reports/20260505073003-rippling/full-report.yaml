          - type: callout
            title: Competitive pricing pressure is visible in litigation
            body: >-
              The Deel dispute centers on customer-switch discussions, quotes, demos, and pricing material, implying
              that pricing competition in global payroll and EOR is active enough to matter financially even while
              Rippling scales.
