    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: >-
      The largest swing factors are revenue confirmation, legal exposure, and the public comp discount applied to a
      private mark.
    data:
      items:
        - label: ARR confirmed near $1B
          value: 3
        - label: Gross margin validates software-like profile
          value: 2
        - label: Public comp rerating / compression
          value: -4
