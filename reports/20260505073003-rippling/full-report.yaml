companyProfile:
  summary: >-
    Rippling is a private compound-software company that uses a single employee and company data model to connect HR,
    payroll, benefits, identity, device management, spend controls, and global employment workflows. The product has
    real category breadth and increasingly looks like an operating system for workforce operations rather than a point
    HRIS vendor. Public evidence supports strong product execution, customer proof, and continuing investor support, but
    it still leaves too many underwriting questions unanswered for a high-conviction price call at the latest valuation.
  foundedDate: '2016-01-01'
  founders:
    - name: Parker Conrad
      role: Co-founder, CEO
      background: >-
        Former Zenefits chief executive who rebuilt the workforce stack around a unified data model and automation
        layer.
      claimRefs: []
    - name: Prasanna Sankar
      role: Co-founder
      background: Engineering co-founder who helped shape the product and systems architecture in Rippling's early years.
      claimRefs: []
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California, USA
  productSummary: >-
    Rippling sells modular software across HR, payroll, benefits, identity, app and device management, spend, bill pay,
    corporate cards, and global employment. Its core differentiator is that all modules share the same underlying
    workforce graph, letting one system drive permissions, workflows, compliance logic, and reporting across functions
    that most buyers still manage with separate vendors.
  customerFocus: >-
    SMB, mid-market, and increasingly enterprise employers that want to consolidate workforce operations, compliance,
    and employee lifecycle management.
  businessModel: >-
    Modular subscription software with add-on monetization across product families, plus service-heavy revenue in
    products such as PEO, EOR, payroll operations, and device logistics.
  stage: Series G private / late-stage compound software
  fundingStatus: >-
    $450M Series G in May 2025 at a $16.8B valuation, with roughly $1.85B of publicly attributed cumulative capital and
    a concurrent employee-liquidity tender.
  disclosureProfile: private-undisclosed
  claimRefs: []
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, product scope, and current operating footprint
        blocks:
          - type: paragraph
            body: >-
              Rippling currently presents itself as a workforce management platform that unifies HR, IT, finance, and
              global payroll rather than as a single-point HR tool. The company-owned homepage and About page both
              emphasize one system of record for employee data and a workflow layer that propagates changes across
              payroll, benefits, devices, permissions, expenses, and other business systems. That positioning is
              reinforced by the product catalog, which shows HR, payroll, IT, finance, global employment products, and
              more than 600 integrations. The safest canonical location fact is the current San Francisco headquarters
              address shown on the About page, while the same page also shows a broader operating footprint across New
              York, Austin, London, Dublin, Bengaluru, and Sydney. Taken together, the public identity evidence supports
              treating Rippling as a broad, multi-product workforce platform with meaningful international presence, not
              a narrow domestic payroll vendor.
            claimRefs:
              - C001
              - C002
              - C003
              - C004
              - C005
              - C006
      - number: '1.2'
        title: Founders, leadership bench, and governance posture
        blocks:
          - type: paragraph
            body: >-
              Public founder attribution is consistent enough for reuse. Rippling and Y Combinator both tie the company
              to 2016, while Rippling's own Series B post states that Parker Conrad and Prasanna Sankar started the
              business. The current About page identifies Parker Conrad as co-founder and CEO and names Matt MacInnis,
              Albert Strasheim, Adam Swiecicki, Bridget Abraham, and Martin White in major product, technology, finance,
              compliance, and legal roles. That creates a credible public picture of functional bench depth, especially
              compared with earlier founder-centric coverage. Governance disclosure is less complete. Rippling currently
              exposes an executive roster, but not a public board roster, so investors should not treat current board
              composition, committee membership, or control rights as settled from public sources alone. The clearest
              governance detail the company does disclose is operational: an Insurance and Regulatory Committee oversees
              licensed insurance, PEO, and payments subsidiaries, which indicates a formal compliance structure around
              regulated activities even though broader board visibility remains limited.
