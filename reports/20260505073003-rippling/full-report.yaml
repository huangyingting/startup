  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, included spend, and status-quo substitutes
        blocks:
          - type: paragraph
            body: >-
              Rippling’s public positioning makes the market boundary broader than payroll software but narrower than
              every dollar spent on HR or enterprise security. The company’s own platform, payroll, HRIS,
              device-management, spend-management, and global-workforce pages repeatedly present one employee system
              spanning HR, payroll, IT, finance, and global operations. That means the included spend is software that
              sits directly on the employee record: HRIS, payroll processing, tax and compliance workflows, benefits
              administration, global hiring and payroll, employee onboarding and offboarding, app and device
              provisioning, and selected finance controls such as reimbursements, cards, and spend visibility. The
              excluded spend is equally important. Rippling is not an ERP replacement, a staffing agency, a pure
              cybersecurity vendor, or a generic BPO provider. The closest substitutes are suite vendors for core HCM
              and payroll — ADP, Paychex, Workday, Dayforce — plus separate identity or device tools such as Okta and
              Jamf. Public review sources reinforce the same point: Rippling’s wedge is not just payroll plus add-ons,
              but a workforce control plane that tries to eliminate the patchwork of HR, payroll, EOR, device, and
              finance point products.
            claimRefs:
