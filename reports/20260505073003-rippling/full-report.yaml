              - C252
      - number: '5.3'
        title: >-
          Integrations, reliability, and trust: public evidence supports strong control-plane maturity, but not full
          technical transparency
        blocks:
          - type: paragraph
            body: >-
              Rippling’s public trust and integration evidence is strong enough to underwrite a mature control plane.
              Official pages say the company operates under GDPR and CCPA and carries SOC 1 Type II, SOC 2 Type II, SOC
              3, CSA STAR Level 2, and ISO 27001, ISO 27018, and ISO 42001 certifications; the trust center separately
              lists additional 2026 artifacts such as a penetration-test document and subprocessor inventory. The
              security page also discloses US-based AWS hosting across multiple availability zones, resilient cloud
              configuration, and automated offboarding controls that disable departing employees’ devices, apps, and
              access through Rippling IAM/MDM. Operational transparency is better than many private SaaS peers because
              Rippling runs a public status page with component-level uptime and subscription options over email, SMS,
              Slack, webhook, Atom, and RSS. As fetched on 2026-05-05, that page showed 99.97% uptime for the main app
              and 100.0% uptime across Identity & App Management, SSO, Platform API, Third-party Integrations, and
              Device & Inventory Management over the prior 90 days, while also showing a resolved May 1, 2026 incident
              labeled “US Payroll Runs Not Visible.” That is useful evidence, but it still falls short of full
              diligence-grade transparency: the page does not expose formal public SLAs or detailed postmortems, and the
              API docs state that rate limits exist without giving numeric ceilings in the retained extracts.
            claimRefs:
              - C226
              - C227
              - C228
              - C229
              - C230
              - C231
              - C232
              - C252
              - C256
      - number: '5.4'
        title: >-
          Maturity and roadmap: Rippling is extending the platform outward into identity, custom apps, AI, and
          compliance
        blocks:
          - type: paragraph
            body: >-
              Rippling’s release cadence shows a product organization still broadening the same core platform rather
              than layering disconnected acquisitions onto a static HCM base. The late-2024 release set added headcount
              analytics, auto-generated timesheets, retro-pay automation, weighted review scores, Microsoft Active
              Directory sync, device-trust controls, an IT management workspace, remote device logistics, zero-touch
              deployment, new EOR coverage, native global payroll countries, Bill Pay, and field-level permissions. The
              January 2025 release then deepened platform automation with the new Workflow Studio, delegated permissions
              by role, iPad ordering via ABM-backed zero-touch enrollment, additional EOR countries, and linked
              travel/spend workflows with Lyft. By 2026, the roadmap had clearly moved beyond classic HCM breadth into
              higher-order platform monetization: Rippling Solutions offered engineer-built custom apps and automations
              on customer data and permissions; Rippling AI introduced company-aware reporting and staged actions across
              HR, IT, and Finance; and Automated Compliance brought evidence collection and remediation for SOC 2 into
              the same system. Partner commentary from Merge and Finch reinforces the same thesis: approved developers
              can access Rippling data through the App Shop and map external apps into Rippling’s governed identity and
              workflow model. The remaining diligence question is not whether Rippling is shipping, because it clearly
              is. It is whether customers adopt these newer layers widely enough to sustain durable multi-module
              expansion, a datapoint the public record still does not provide.
            claimRefs:
