      - number: '3.3'
        title: Moat durability, switching cost, and displacement risk
        blocks:
          - type: paragraph
            body: >-
              The strongest public case for Rippling is architectural: it is one of the few vendors clearly marketing a
              common operating layer for employee data, payroll actions, access/device controls, and spend workflows.
              That should increase switching friction when customers want fewer handoffs between HR, IT, and finance.
              But the moat is not cleanly durable. First, incumbent distribution remains formidable, so many enterprise
              deals can still be won by vendors with bigger installed bases and procurement familiarity. Second, the
              price umbrella is vulnerable because finance specialists and global-employment specialists publish more
              concrete list pricing than Rippling does, giving cost-conscious buyers easier alternatives. Third, public
              adverse evidence suggests imitation risk is real. Semafor reported allegations that information gathered
              on Deel pricing, benefits, and hiring templates was used to help build copycat products, which shows how
              fast feature boundaries can move in this category even if the legal claims remain contested. Finally,
              review data shows buyer pain around opaque pricing, fee friction, and support delays for both Rippling and
              Deel, reinforcing that multi-homing or partial replacement can persist. Overall, Rippling looks
              differentiated, but the likely failure mode is bundling and modular substitution rather than an outright
              lack of product quality. The diligence burden is therefore to prove that unified data and workflow
              automation drive measurable expansion or retention beyond what a mixed stack can already deliver.
            claimRefs:
              - C118
              - C147
              - C148
              - C149
              - C151
              - C152
              - C153
              - C154
              - C155
              - C156
      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
