  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Landscape and competitor classes
        blocks:
          - type: paragraph
            body: >-
              Rippling does not face a single competitor class. Its closest direct overlap comes from vendors that try
              to own employment operations end to end: Deel and Remote both combine global hiring, compliance, payroll,
              contractor management, and some device or workflow tooling, while Gusto and Justworks remain strong
              substitutes for SMB payroll, HR, and benefits buyers. Incumbents still matter because ADP, Workday, SAP
              SuccessFactors, and Paylocity already sit inside large installed bases and can sell broader suites into
              buyers that prefer fewer systems or already trust an existing vendor relationship. Adjacent finance
              specialists such as Ramp, Brex, and Airbase by Paylocity pressure Rippling’s spend modules specifically,
              even when they do not replace the HR or payroll control plane. The status quo alternative is also real:
              many buyers can still assemble local payroll, HR, identity/device, and spend tools into a stitched stack
              rather than adopt one all-in-one suite. That means Rippling’s market is not just “modern HR software”; it
              is a competitive bundle decision across payroll, IT operations, finance automation, and global employment
              compliance. In practice, the decision often turns on whether the buyer wants one employee-data system of
              record or is comfortable orchestrating several vendors and internal admin workflows around the same
              employee lifecycle.
            claimRefs:
              - C115
              - C119
              - C125
              - C127
