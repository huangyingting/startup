  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'Product definition and module map: Rippling sells a workforce operating platform, not a single payroll SKU'
        blocks:
          - type: paragraph
            body: >-
              Rippling’s own product catalog makes the company’s product definition unusually explicit: the business is
              organized into HCM, Finance, Payroll, Global, IT, and Platform suites, all presented as products that
              become stronger when they run on one shared system. The core message is not merely “HR software.” Rippling
              argues that the buyer is choosing the operating infrastructure the business runs on, with one platform
              meant to replace duplicate tools, handoffs, and manual work across onboarding, payroll, performance,
              devices, cards, and approvals. That framing is supported by the platform and products pages, which
              repeatedly tie permissions, workflow automation, analytics, policies, integrations, and App Studio to the
              same data model. In practice, the product map looks like eight commercially relevant layers: core platform
              controls; HCM and workforce management; payroll and global payroll; IT identity/device operations; finance
              and spend; global employment services; AI and custom-app layers; and the developer/App Shop surface for
              partners and internal builders. The breadth is real and well evidenced publicly. The trade-off is that
              Rippling still does not disclose public attach rates, deployment footprints, or customer penetration by
              module, so investors can verify scope and shipping velocity but not the exact maturity mix of every line
              item.
            claimRefs:
              - C207
              - C208
              - C209
              - C210
              - C211
              - C212
              - C253
              - C254
      - number: '5.2'
        title: >-
          Operating model: shared data, policy, workflow, and developer surfaces connect HR, IT, finance, and global
          operations
        blocks:
          - type: paragraph
            body: >-
              The strongest public technical evidence is not a low-level infrastructure diagram; it is the operating
              model exposed in Rippling’s developer and product documentation. The common pattern is a system-of-record
              layer for people, company, group, and work-location data; a control layer of permissions, policies, and
              Supergroups; and an execution layer spanning workflows, app listings, APIs, webhooks, identity, device,
              and finance actions. The REST API docs describe resource-based JSON endpoints with bearer authentication,
              cursor pagination, versioned releases, and a broad object catalog that reaches from departments and teams
              to custom objects, entitlements, workers, and work locations. Partner documentation makes the model more
              concrete: app listings live in the Rippling App Shop, require customer consent to scopes, and by default
              must support SSO, user management, a webhook listener, and at least a daily full sync. That means Rippling
              treats integrations as governed lifecycle products rather than loose one-off connectors. The Microsoft
              Entra/on-prem Active Directory launch is the clearest public example of this operating model in action:
              HRIS events become automated joiner-mover-leaver identity actions, with downstream access and attribute
              changes driven from Rippling. This is a differentiated architecture story, but it is still mostly
              documented at the application/workflow layer; exact rate-limit ceilings, retry semantics, and lower-level
              service topology remain undisclosed in the retained public set.
            claimRefs:
              - C213
              - C214
              - C215
              - C216
              - C217
              - C218
              - C219
              - C220
              - C221
              - C225
              - C237
