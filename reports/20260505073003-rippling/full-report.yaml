  - id: F702
    title: Risk transmission map
    type: dag
    layout: wide
    summary: >-
      Rippling's top risks transmit through a few channels; litigation and compliance burden platform incidents and
      dependency failures all roll into customer trust margin financing need and valuation support.
    data:
      nodes:
        - id: legal
          label: Deel litigation / legal burden
          detail: Live claims countersuit and reputational spillover can raise spend and distract management.
          tone: warning
        - id: reg
          label: Licensing / privacy obligations
          detail: Payroll payments PEO EOR and employee-data rules raise operating overhead and procurement friction.
          tone: warning
        - id: ops
          label: Payroll and identity incidents
          detail: Deadline-sensitive outages or privacy-sensitive routing mistakes hit customer-critical workflows.
          tone: warning
        - id: deps
          label: Partner / platform dependencies
          detail: AWS Google Workspace local EOR partners and payment rails shape uptime and compliance execution.
          tone: warning
        - id: trust
          label: Customer trust and renewals
          detail: Buyers deepen usage only if payroll privacy and support feel dependable.
          tone: warning
        - id: margin
          label: Margin and remediation cost
          detail: Legal spend support load credits and compliance staffing can compress economics.
          tone: negative
        - id: financing
          label: Financing need
          detail: If growth stays prioritized over profitability shocks can increase capital dependence.
          tone: negative
        - id: valuation
          label: Valuation support
          detail: Higher residual risk lowers downside support and stretches private-market assumptions.
          tone: negative
      edges:
        - from: legal
          to: trust
        - from: legal
          to: margin
        - from: reg
          to: trust
        - from: reg
          to: margin
        - from: ops
          to: trust
        - from: ops
          to: margin
        - from: deps
          to: ops
        - from: deps
          to: margin
        - from: trust
          to: valuation
        - from: margin
          to: financing
        - from: financing
          to: valuation
    approximationNotes: The graph is qualitative; it encodes causal direction and coupling, not modeled probabilities.
    claimRefs:
      - C307
      - C313
      - C317
      - C318
      - C334
      - C339
