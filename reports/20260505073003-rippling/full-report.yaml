  - id: T803
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Assumptions
      - Valuation / return logic
      - Key risks
      - Probability signal
    rows:
      - - Bull
        - >-
          Revenue already ~1.0B annualized, 30%+ growth persists, retention stays elite, litigation contained, and no
          punitive preference overhang.
        - >-
          Supportable range about $17B-$22B; current mark can work, but upside still depends on clean diligence and
          sustained compounding.
        - Execution still must outrun public multiple compression.
        - Requires diligence confirmation of optimistic analyst estimates and clean governance findings.
      - - Base
        - >-
          Revenue is between $750M and $950M annualized, growth decelerates but remains healthy, and profitability is
          still a future milestone.
        - Supportable range about $10B-$15B; current mark looks full and better suited to watching than buying.
        - Limited room for error if IPO window stays shut.
        - Best fit with mixed public evidence and missing private metrics.
      - - Bear
        - >-
          Confirmed revenue stays much closer to the 2025 run-rate anchor, growth drops below high-20s, or litigation /
          structured terms widen the discount rate.
        - >-
          Supportable range about $6B-$9B; downside is substantial because public comps do not protect the current entry
          price.
        - Down round risk, delayed liquidity, and pressure on employee/early investor expectations.
        - Triggered by weak diligence or adverse legal and market developments.
    notes: >-
      Ranges are deliberately broad because public evidence does not include audited margins, cap-table terms, or
      management guidance.
