        - Request module attach curves, realized discounting, and multi-product ACV by segment
      - - Integration-led expansion (Okta, Sequoia, broader ecosystem)
        - Reliance on partner integrations can create implementation dependency or support complexity
        - Integrations help win complex accounts, but they also widen failure surfaces and accountability debates
        - Review top integration dependencies, partner SLAs, and support ownership in escalations
      - - Strong fit for 50-1,000 employee multi-tool operators
        - May be overbuilt or expensive for small businesses with basic HR needs
        - Customer mix may skew toward mid-market complexity rather than the broadest SMB base
        - Request customer count, ARR, and churn by employee band and product breadth
      - - AI/reporting and admin-efficiency use cases deepen share of wallet
        - Support, setup, and training burden can rise with broader platform usage
        - Net expansion can be offset if implementation pain slows deployment or renewals
        - Pull implementation timelines, services attach, and health scores for multi-module accounts
      - - Named customer proof is strong across several segments
        - No public disclosure of top-customer revenue share, top-10 concentration, or channel mix
        - Investors cannot yet quantify concentration downside from public sources
        - Request customer revenue concentration, broker/channel share, and revenue by industry / geography
