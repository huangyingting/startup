      - number: '6.3'
        title: >-
          Expansion logic is visible; the main public risks are pricing friction, implementation burden, and undisclosed
          concentration
        blocks:
          - type: paragraph
            body: >-
              The most credible expansion signal is module depth inside named accounts. Ethical Energy explicitly says
              it adopted Benefits, Spend, Payroll, HCM, and Performance Management, and Blank Street describes Rippling
              as a permanent operating tab for payroll, documentation, retention, compensation, and benefits-adjacent
              workflows via Sequoia integration. Morning Consult chose Rippling over Paylocity because the integration
              set was broader, while NinjaTech AI shows Rippling stretching beyond transactional HR into cross-country
              reporting and AI-assisted analysis. In other words, the public story is not only “Rippling wins payroll,”
              but “Rippling can widen share of wallet once the employee graph is in place.”


              The downside is that expansion proof is much clearer than concentration proof. Software Advice, HR
              Technology Advice, Employ Borderless, SoftwareConnect, and other independent reviews consistently praise
              breadth and automation, but they also repeat the same friction themes: pricing becomes harder to predict
              as modules are added, support can slow under pressure, implementations can be more complex than a
              lightweight SMB HRIS, and international tax/EOR workflows can feel expensive or cumbersome. CNBC’s
              reporting on the Deel lawsuit adds another adverse angle by showing how intensely competitive customer
              account data, quotes, demos, and support requests have become in global payroll and EOR. Public evidence
              therefore supports a balanced customer verdict: Rippling appears able to expand successfully inside
              operationally complex accounts, but procurement friction and switching competition are real, and public
              disclosures still do not reveal top-customer concentration, channel share, or suite-wide cohort health.
