      - number: '1.4'
        title: Scale signals, compliance strength, and disclosure limits
        blocks:
          - type: paragraph
            body: >-
              Rippling's current public scale evidence is strongest on customers, product breadth, and compliance
              posture, and weakest on precise headcount and revenue. Reuters said the company served more than 20,000
              customers by May 2025, while the company's own pages support broad product breadth through more than 20
              products and 600-plus integrations. Headcount is directionally large but not cleanly disclosed: TechCrunch
              reported more than 4,000 employees in May 2025, Y Combinator still listed 2,500 on its directory page, and
              Kleiner Perkins had earlier described more than 2,000 employees. Revenue is similarly noisy, with Reuters
              reporting ARR well above $100 million, TechCrunch citing sources for roughly $570 million in annualized
              revenue, and Sacra estimating $1.0 billion in annualized revenue by March 2026. Governance and trust
              signals are better documented. Rippling publicly describes AML, sanctions screening, and licensing
              controls for payroll and payments, and its security pages cite annual SOC audits plus CSA STAR, ISO 27001,
              ISO 27018, and ISO 42001 certifications, alongside a trust center and public status page.
