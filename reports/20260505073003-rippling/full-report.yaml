      - number: '4.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Platform breadth supports multi-axis expansion
            body: >-
              Rippling is no longer monetizing as standalone payroll. Official surfaces and Sacra both show attach
              across HR, IT, finance, and global employment, which improves expansion potential and revenue diversity
              versus a single-module vendor.
            calloutType: insight
            claimRefs:
              - C160
              - C185
              - C204
          - type: callout
            title: Capital looks available, but runway is still opaque
            body: >-
              The 2025 financing materially improves short-term capital access, yet public sources still do not expose
              cash, burn, gross margin, or CAC. That means the company may be well funded, but external underwriting
              cannot verify how long that funding lasts.
            calloutType: risk
            claimRefs:
              - C167
