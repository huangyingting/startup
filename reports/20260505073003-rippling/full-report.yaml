  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer segments are broad, but the clearest proof clusters around scaling operational complexity
        blocks:
          - type: paragraph
            body: >-
              Rippling’s public customer proof is not confined to one narrow buyer archetype. The official customer hub
              explicitly organizes stories by startups, small businesses, mid-sized businesses, and enterprise, and it
              also highlights industries such as fitness, healthcare, manufacturing, nonprofit, restaurants, retail,
              financial services, and technology. Third-party customer databases and case-study aggregators reinforce
              that breadth: Apps Run The World says it tracks Rippling wins across 21 verticals and multiple product
              families, while CaseStudies.com and FeaturedCustomers each surface more than 100 named success stories.
              That is enough to conclude that Rippling has real cross-vertical adoption rather than a single-logo
              marketing page.


              The stronger pattern, though, is not “everyone uses Rippling equally”; it is that Rippling’s most detailed
              proofs come from buyers facing messy people-ops complexity. Barry’s needed one system for a multi-location
              hourly workforce with entity transfers. Morning Consult wanted to add hundreds of employees without
              bloating admin headcount. Ethical Energy needed to convert 40 contractors into W-2 employees in one day
              while linking cards, payroll, and HR. Blank Street Coffee needed benefits administration across a
              430-person US/UK workforce without building an internal benefits team. Employ Borderless and
              SoftwareConnect independently point in the same direction by framing Rippling as strongest for
              organizations with multiple operational systems, heavier scaling needs, or mid-market complexity, not for
              the smallest “basic HR only” buyer.
            claimRefs:
              - C257
              - C258
              - C259
              - C260
              - C261
              - C262
              - C263
              - C271
              - C277
              - C285
              - C297
              - C299
              - C300
              - C303
      - number: '6.2'
        title: >-
          Named deployment evidence is strong on production use and operational outcomes, but weaker on cohort
          durability
        blocks:
          - type: paragraph
            body: >-
              Rippling clears the “named customer proof” bar because the retained evidence goes well beyond logo walls.
              Barry’s describes concrete workflow improvements at 53 US locations, including new-hire setup falling from
              roughly 15 minutes to three-to-five minutes and status changes dropping from 10–15 minutes to about three
              minutes. Clay says it automated 80% of onboarding tasks while growing from 20 to 100 employees over 18
              months. Morning Consult says it added more than 300 employees in under two years, ran payroll, benefits,
              and devices for 500 employees with a two-person admin team, and saved 500 hours per year. Ethical Energy
              says it converted 40 contractors into employees in one day, eliminated five software tools, and automated
              spend-card issuance. Compass Coffee reports a 96% reduction in HR and IT admin time and a 6x faster
              onboarding process. NinjaTech AI describes a one-person HR team running three-country payroll and
              producing a verified investor report in roughly 100 seconds.


              Those outcomes are consistent enough across multiple named customers to support a production-maturity
              conclusion: Rippling is being used to run live payroll, onboarding, offboarding, IT provisioning,
              benefits, spend, and reporting workflows, not just pilots. What is missing is broad public retention
              transparency. Rippling’s own blog provides a strong 99.5% year-over-year retention statistic for the PEO
              product, and independent review sources show high satisfaction, but public non-PEO NRR, GRR, churn, and
              cohort tables remain unavailable. So the durability case is positive but incomplete: the company has
              compelling production proof and favorable satisfaction markers, yet investors still cannot validate
              retention quality across the broader suite from public evidence alone.
