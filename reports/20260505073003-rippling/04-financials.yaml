callouts:
  - calloutType: insight
    title: Platform breadth supports multi-axis expansion
    body: >-
      Rippling is no longer monetizing as standalone payroll. Official surfaces and Sacra both show attach across HR,
      IT, finance, and global employment, which improves expansion potential and revenue diversity versus a
      single-module vendor.
    claimRefs:
      - C160
      - C185
      - C204
  - calloutType: risk
    title: Capital looks available, but runway is still opaque
    body: >-
      The 2025 financing materially improves short-term capital access, yet public sources still do not expose cash,
      burn, gross margin, or CAC. That means the company may be well funded, but external underwriting cannot verify how
      long that funding lasts.
    claimRefs:
      - C167
      - C169
      - C200
      - C203
  - calloutType: risk
    title: Competitive pricing pressure is visible in litigation
    body: >-
      The Deel dispute centers on customer-switch discussions, quotes, demos, and pricing material, implying that
      pricing competition in global payroll and EOR is active enough to matter financially even while Rippling scales.
    claimRefs:
      - C194
      - C195
