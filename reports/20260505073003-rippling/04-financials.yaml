  - id: S402
    title: Public traction, unit-economics proxies, and cost-structure signals
    body: >-
      Public traction markers are strong enough to show scale, but not strong enough to underwrite efficiency. In 2025,
      multiple outlets reported a $16.8B financing and annualized revenue around $570M. SiliconANGLE cited prior ARR of
      more than $350M in 2023 and said growth remained well over 30%; Sacra later estimated $850M exiting 2025 and $1B
      annualized by March 2026, plus 99.5% PEO retention and more than 10 product lines already above $1M ARR. Taken
      together, those disclosures support a high-growth, multi-product expansion narrative rather than a stagnant
      payroll processor. Rippling’s startup page also claims 1–3 week implementation and a free first payroll run, which
      suggests sales conversion can happen without the months-long deployment burden typical of legacy HCM suites.


      The margin story is less settled. Official EOR, expense, bill pay, spend, and device-management pages show
      meaningful service-delivery work inside the product: local compliance experts, payroll operations, device
      provisioning and retrieval, reimbursements in 100+ countries, and bill-payment orchestration across payment rails.
      Those features can deepen customer value and justify higher ACV, but they also imply labor, payment, and logistics
      costs that a pure SaaS benchmark would miss. To bound the category, the retained filing set uses public
      payroll/HCM comparables: ADP reported 7% revenue growth and nearly $1.3B of R&D spend in fiscal 2024, while
      Paychex reported 41.2% operating margin, $1.6B of cash plus investments, and distinct revenue pools for management
      solutions and PEO. Those filings show the category can be highly cash generative at scale. Still, Rippling’s own
      mix appears more services-heavy than those mature peers, so public comparables are only an upper bound until
      private gross-margin, CAC, and payback data are produced.
    claimRefs:
