  - id: T405
    title: Public financial gaps table
    columns:
      - Missing private metric
      - Impact on underwriting
      - Exact diligence path
    rows:
      - - Cash balance and monthly burn
        - Blocks runway, dilution, and downside solvency analysis
        - Request 24 months of monthly cash bridge, operating cash flow, capex, and financing sources
      - - Gross margin by product family
        - Cannot test whether software mix improves economics as scale rises
        - Provide audited gross margin by software, payroll/EOR services, and finance/transaction products
      - - CAC, sales cycle, and payback
        - Cannot tell whether >30% growth is efficient or subsidy-driven
        - Provide funnel conversion, sales capacity, CAC by segment, and payback by cohort
      - - Realized PEPM by segment and discounting
        - List prices and advisor estimates may overstate net revenue quality
        - Provide signed pricing schedules, standard discount policy, and realized ASP by module and geography
      - - Net revenue retention, churn, and customer concentration
        - Expansion story and durability remain unproven without cohort data
        - Provide logo retention, NRR, gross retention, and top-20 customer exposure by ARR
      - - Working-capital exposure from cards, wage flows, and FX
        - Finance features can create prefunding, fraud, or settlement risk beyond software hosting
        - Provide customer-funds balances, loss rates, chargeback rates, and settlement timing by product
    notes: These gaps are the minimum package required to move from narrative diligence to financial underwriting.
    claimRefs:
      - C200
      - C202
