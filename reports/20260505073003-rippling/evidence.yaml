evidenceGaps:
  - type: missing-source
    severity: material
    topic: Current board composition and governance rights remain under-disclosed
    missingEvidence: >-
      No current public board roster, committee charter pack, or cap-table rights disclosure was found on Rippling's
      corporate pages or retained public sources.
    whyItMatters: >-
      Later underwriting needs to know who controls strategy, financing approvals, litigation posture, and any founder
      or investor veto rights.
    diligencePath: >-
      Request the current board list, observer rights, voting agreements, and committee memberships directly from
      company materials or financing documents.
    relatedQuestionRefs:
      - QO007
    relatedTableRefs:
      - TO002
      - TO003
  - type: missing-source
    severity: minor
    topic: Public debt or credit facility disclosure for Rippling was not found
    missingEvidence: >-
      No retained public source established a current debt facility, warehouse line, or other non-equity financing
      obligation.
    whyItMatters: >-
      Debt can affect downside protection, liquidity planning, and later financial-risk analysis even in otherwise
      equity-funded software companies.
    diligencePath: >-
      Ask management for debt schedules, covenant summaries, bank facilities, and any off-balance-sheet financing
      exposures.
    relatedQuestionRefs:
      - QO014
    relatedTableRefs: []
  - type: conflicting-data
    severity: material
    topic: Public headcount figures conflict across retained 2024-2025 sources
    missingEvidence: >-
      TechCrunch reported 4,000+ employees, Y Combinator still showed 2,500, and Kleiner Perkins described 2,000+
      earlier, leaving no canonical current total.
    whyItMatters: >-
      Headcount is a core cover metric and operating-leverage proxy that later chapters may otherwise overstate or
      understate.
    diligencePath: Request current employee count by region and function, plus a dated org snapshot or audited HRIS export.
    relatedQuestionRefs:
      - QO016
    relatedTableRefs:
      - TO001
  - type: conflicting-data
    severity: material
    topic: Public revenue and ARR metrics are not canonical for Rippling
    missingEvidence: >-
      Reuters cited ARR above $100M, TechCrunch cited sources for $570M annualized revenue, and Sacra estimated $1.0B
      annualized revenue, but the company has not disclosed a reconciled metric set.
    whyItMatters: >-
      Revenue and ARR are core cover metrics and later valuation inputs, so inconsistent public figures would create
      drift across chapters.
    diligencePath: >-
      Request a current ARR definition, trailing-twelve-month revenue, audited revenue bridge, and reconciliation
      between revenue, ARR, and annualized run-rate.
    relatedQuestionRefs:
      - QO018
    relatedTableRefs:
      - TO001
  - type: enumeration-incomplete
    severity: material
    topic: Leadership and founder table remains a partial public roster
    missingEvidence: >-
      Public sources identify founders and the executive bench, but not the full board, all direct reports, or any
      director-level governance structure.
    whyItMatters: Key-person dependence and governance quality cannot be assessed cleanly from a partial leadership view.
    diligencePath: Request a current org chart, board roster, and executive committee description.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs: []
  - type: enumeration-incomplete
    severity: material
    topic: Stakeholder or investor map is a public approximation rather than a cap table
    missingEvidence: >-
      Public financing coverage identifies investor names but not ownership percentages, liquidation stack, secondary
      allocations, or voting rights.
    whyItMatters: >-
      Without private financing documents, stakeholder influence and economic control can only be inferred loosely from
      financing visibility.
    diligencePath: >-
      Request the current cap table, SAFEs or convertibles, board rights, tender allocations, and major investor side
      letters.
    relatedTableRefs:
      - TO003
    relatedQuestionRefs: []
  - type: enumeration-incomplete
    severity: minor
    topic: Milestone table likely omits unpublished internal product and governance events
    missingEvidence: >-
      The chronology is built from externally visible announcements and coverage, so private launches, board actions,
      and non-public commercial milestones are absent.
    whyItMatters: >-
      Later diligence may need a fuller chronology to test execution pace, governance decisions, and operational
      inflection points.
    diligencePath: >-
      Request an internal corporate timeline covering financings, launches, expansions, reorganizations, and legal
      milestones.
    relatedTableRefs:
      - TO004
    relatedQuestionRefs: []
  - type: conflicting-data
    severity: material
    topic: HCM market-shell dispersion
    missingEvidence: >-
      Public HCM estimates from major publishers differ materially and do not disclose a one-to-one reconciliation of
      scope or revenue inclusions.
    whyItMatters: Overstating or averaging incompatible market shells can inflate Rippling TAM and distort valuation multiples.
    diligencePath: >-
      Ask management for the internal market taxonomy that reconciles payroll, HCM, global, finance, and IT modules
      without double counting.
    relatedQuestionRefs:
      - QM005
    relatedTableRefs:
      - TM002
  - type: missing-source
    severity: material
    topic: Rippling-specific SAM or SOM
    missingEvidence: >-
      No retained public source isolates a Rippling-specific SAM or SOM for unified HR-payroll-IT-finance control-plane
      spend.
    whyItMatters: Without a company-specific SAM, penetration and market-share assumptions stay highly judgmental.
    diligencePath: Request segmented TAM and SAM views by module family, customer size, geography, and initial buyer function.
    relatedQuestionRefs:
      - QM023
    relatedTableRefs:
      - TM002
      - TM005
  - type: private-evidence-only
    severity: material
    topic: Module attach rates and ACV by buyer type
    missingEvidence: >-
      Public sources do not provide attach-order, attach-rate, or blended ACV data across HR, finance, and IT buying
      motions.
    whyItMatters: >-
      Rippling valuation depends on whether payroll land deals reliably expand into device, identity, finance, or global
      products.
    diligencePath: >-
      Request cohort data showing first product sold, subsequent module expansion, ACV ranges, and retention by buyer
      segment.
    relatedQuestionRefs:
      - QM024
    relatedTableRefs:
      - TM003
      - TM005
  - type: private-evidence-only
    severity: material
    topic: Direct payroll versus EOR economics
    missingEvidence: >-
      Public review sources discuss country coverage and pricing opacity but do not disclose country-level revenue mix,
      margin, or service cost by global product line.
    whyItMatters: Global growth quality depends on margin and service intensity, not just country count.
    diligencePath: >-
      Request revenue, gross margin, and service-delivery cost split across domestic payroll, global payroll, contractor
      pay, and EOR.
    relatedQuestionRefs:
      - QM025
    relatedTableRefs:
      - TM002
      - TM005
  - type: access-blocked
    severity: material
    topic: Papaya Global current public product and pricing verification
    missingEvidence: Readable official Papaya Global product and pricing pages with current package details and terms.
    whyItMatters: >-
      Papaya remains a recognizable global payroll competitor, so inability to verify official packaging limits precise
      price ranking against Deel, Remote, and Rippling.
    diligencePath: >-
      Refetch from an alternate region or browser profile, or request Papaya sales collateral / current pricing deck
      directly during diligence.
    relatedQuestionRefs:
      - QP015
    relatedTableRefs:
      - TP003
  - type: private-evidence-only
    severity: material
    topic: Realized enterprise discount curves across Rippling, ADP, Workday, and Brex
    missingEvidence: >-
      Executed contract data or buyer-side procurement benchmarks showing real seat, module, or bundle discounts versus
      headline packaging.
    whyItMatters: >-
      Quote-led pricing can change competitive outcomes materially, especially when suite consolidation is used to beat
      specialist list pricing.
    diligencePath: >-
      Request anonymized contract samples, procurement benchmark data, or at least sales-approved discount bands by
      company size and module bundle.
    relatedQuestionRefs:
      - QP024
    relatedTableRefs:
      - TP003
  - type: missing-source
    severity: material
    topic: Public win-loss and multi-homing data for Rippling by module
    missingEvidence: >-
      A public dataset or management disclosure showing how often Rippling displaces Deel, ADP, Remote, Ramp, or Workday
      at module level.
    whyItMatters: >-
      Without win-loss and multi-homing data, moat durability must be inferred from packaging, scale, and buyer-review
      evidence rather than hard conversion outcomes.
    diligencePath: >-
      Request win-loss dashboards split by HR, payroll, IT, finance, and global products plus post-sale attach and
      multi-homing rates.
    relatedQuestionRefs:
      - QP025
    relatedTableRefs:
      - TP004
  - type: private-evidence-only
    severity: blocking
    topic: Cash balance after Series G and current monthly burn
    missingEvidence: No retained public source discloses Rippling’s post-close cash balance, monthly net burn, or modeled runway.
    whyItMatters: Without cash and burn, the headline financing size cannot be translated into solvency or dilution risk.
    diligencePath: >-
      Request 24 months of monthly cash balances, operating cash flow, capex, debt draws/repayments, and management
      runway cases.
    relatedQuestionRefs:
      - QI018
      - QI019
    relatedTableRefs:
      - TI004
      - TI005
  - type: private-evidence-only
    severity: material
    topic: Gross margin by product family
    missingEvidence: >-
      No public source reviewed breaks out consolidated or module-level gross margin for software, payroll/EOR, or
      finance products.
    whyItMatters: >-
      Margin mix determines whether Rippling’s platform breadth creates operating leverage or simply adds services
      burden.
    diligencePath: >-
      Obtain audited gross margin by product family plus direct labor, payment-processing, FX, and logistics cost
      allocations.
    relatedQuestionRefs:
      - QI020
    relatedTableRefs:
      - TI003
      - TI005
  - type: private-evidence-only
    severity: material
    topic: CAC, sales cycle, and payback
    missingEvidence: The retained public set does not provide CAC, sales-cycle length by segment, or payback periods.
    whyItMatters: Revenue growth above 30% cannot be judged for efficiency without acquisition and payback metrics.
    diligencePath: >-
      Request funnel conversion, ramped rep counts, CAC by segment, payback by cohort, and enterprise implementation
      hours.
    relatedQuestionRefs:
      - QI021
    relatedTableRefs:
      - TI003
      - TI005
  - type: missing-source
    severity: material
    topic: Realized pricing, discounting, and module mix by cohort
    missingEvidence: >-
      Public evidence is limited to list-price anchors and consultant estimates, not signed order forms or realized
      ASPs.
    whyItMatters: >-
      Underwriting revenue quality requires knowing whether expansion and discounts offset the apparent breadth of
      monetization.
    diligencePath: >-
      Review current rate card, discount policy, 10 sample contracts, and realized ASP by product, geography, and
      customer size.
    relatedTableRefs:
      - TI002
      - TI005
    relatedQuestionRefs: []
  - type: missing-source
    severity: material
    topic: Customer concentration, NRR, and churn by segment
    missingEvidence: >-
      Outside of one Sacra retention datapoint for PEO, there is no public cohort data for logo retention, NRR, or
