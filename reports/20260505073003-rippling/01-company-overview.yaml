company:
  name: Rippling
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Rippling is a private San Francisco-founded workforce software company spanning HR, IT, finance, and global payroll.
    Public evidence supports a 2016 founding, Winter 2017 YC batch, a May 2025 Series G at a $16.8 billion valuation,
    and more than 20,000 customers. The strongest current caveats are conflicting public headcount and revenue signals,
    incomplete public board disclosure, and active litigation with Deel.
sections:
  - id: section-1
    title: Identity, product scope, and current operating footprint
    body: >-
      Rippling currently presents itself as a workforce management platform that unifies HR, IT, finance, and global
      payroll rather than as a single-point HR tool. The company-owned homepage and About page both emphasize one system
      of record for employee data and a workflow layer that propagates changes across payroll, benefits, devices,
      permissions, expenses, and other business systems. That positioning is reinforced by the product catalog, which
      shows HR, payroll, IT, finance, global employment products, and more than 600 integrations. The safest canonical
      location fact is the current San Francisco headquarters address shown on the About page, while the same page also
      shows a broader operating footprint across New York, Austin, London, Dublin, Bengaluru, and Sydney. Taken
      together, the public identity evidence supports treating Rippling as a broad, multi-product workforce platform
      with meaningful international presence, not a narrow domestic payroll vendor.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
      - C006
  - id: section-2
    title: Founders, leadership bench, and governance posture
    body: >-
      Public founder attribution is consistent enough for reuse. Rippling and Y Combinator both tie the company to 2016,
      while Rippling's own Series B post states that Parker Conrad and Prasanna Sankar started the business. The current
      About page identifies Parker Conrad as co-founder and CEO and names Matt MacInnis, Albert Strasheim, Adam
      Swiecicki, Bridget Abraham, and Martin White in major product, technology, finance, compliance, and legal roles.
      That creates a credible public picture of functional bench depth, especially compared with earlier founder-centric
      coverage. Governance disclosure is less complete. Rippling currently exposes an executive roster, but not a public
      board roster, so investors should not treat current board composition, committee membership, or control rights as
      settled from public sources alone. The clearest governance detail the company does disclose is operational: an
      Insurance and Regulatory Committee oversees licensed insurance, PEO, and payments subsidiaries, which indicates a
      formal compliance structure around regulated activities even though broader board visibility remains limited.
    claimRefs:
      - C007
      - C008
      - C009
      - C010
      - C011
      - C012
      - C013
      - C014
      - C015
      - C016
      - C017
      - C018
  - id: section-3
    title: Capital formation, investor base, and employee-liquidity signals
    body: >-
      Rippling's public financing record now supports a clear late-stage growth profile. The official Series B
      announcement disclosed a $145 million round led by Founders Fund with a heavyweight syndicate that also included
      Greenoaks, Coatue, Bedrock, Kleiner Perkins, Initialized, and Y Combinator. By September 2023, IDA Ireland
      described Rippling's latest Series E as a $500 million raise at an $11.25 billion valuation. TechCrunch then
      described a 2024 Series F of $200 million at a $13.4 billion valuation, paired with a $590 million tender offer,
      while Reuters and TechCrunch reported a May 2025 Series G of $450 million at a $16.8 billion valuation plus a
      fresh $200 million employee tender. The 2025 round also surfaced a broader investor set including Y Combinator,
      Elad Gil, Sands Capital, GIC, Goldman Sachs Growth, and Baillie Gifford. Those repeated tender structures matter
      because they show Rippling using private-market mechanisms to provide liquidity without committing to an IPO
      timeline.
    claimRefs:
      - C019
      - C020
      - C021
      - C026
      - C027
      - C028
      - C029
      - C030
      - C031
      - C050
      - C056
      - C058
  - id: section-4
    title: Scale signals, compliance strength, and disclosure limits
    body: >-
      Rippling's current public scale evidence is strongest on customers, product breadth, and compliance posture, and
      weakest on precise headcount and revenue. Reuters said the company served more than 20,000 customers by May 2025,
      while the company's own pages support broad product breadth through more than 20 products and 600-plus
      integrations. Headcount is directionally large but not cleanly disclosed: TechCrunch reported more than 4,000
      employees in May 2025, Y Combinator still listed 2,500 on its directory page, and Kleiner Perkins had earlier
      described more than 2,000 employees. Revenue is similarly noisy, with Reuters reporting ARR well above $100
      million, TechCrunch citing sources for roughly $570 million in annualized revenue, and Sacra estimating $1.0
      billion in annualized revenue by March 2026. Governance and trust signals are better documented. Rippling publicly
      describes AML, sanctions screening, and licensing controls for payroll and payments, and its security pages cite
      annual SOC audits plus CSA STAR, ISO 27001, ISO 27018, and ISO 42001 certifications, alongside a trust center and
      public status page.
    claimRefs:
      - C003
      - C017
      - C018
      - C022
      - C023
      - C032
