  - id: section-5
    title: Milestones of record and the live adverse overhang
    body: >-
      The reusable public chronology starts with a 2016 founding and Winter 2017 Y Combinator affiliation, moves through
      the 2020 Series B, the 2023 Dublin EU-headquarters announcement, the 2024 Sydney APAC-headquarters opening, the
      2024 Series F financing and tender, and the January 2025 release that expanded EOR coverage into five additional
      countries. The most important current milestone is the May 2025 Series G, which reset the valuation to $16.8
      billion and extended employee liquidity. But the company overview also needs to preserve the adverse record.
      Reuters said the 2025 financing occurred amid legal disputes with Deel, and TechCrunch reported Rippling had sued
      Deel over alleged spying on trade secrets. Deel then publicly stated that it filed a Delaware suit on April 25,
      2025, alleging Rippling infiltrated its platform 58 times and responding with dismissal and anti-SLAPP motions.
      Those counter-allegations are unproven competitor statements, not settled facts, but they are material enough to
      carry forward into later risk work.
    claimRefs:
      - C007
      - C009
      - C019
      - C021
