  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Current board composition and governance rights remain under-disclosed
      missingEvidence: >-
        No current public board roster, committee charter pack, or cap-table rights disclosure was found on Rippling's
        corporate pages or retained public sources.
      whyItMatters: >-
        Later underwriting needs to know who controls strategy, financing approvals, litigation posture, and any founder
        or investor veto rights.
      diligencePath: >-
        Request the current board list, observer rights, voting agreements, and committee memberships directly from
        company materials or financing documents.
      relatedQuestionRefs:
        - RQ107
      relatedTableRefs:
        - T102
        - T103
    - type: missing-source
      severity: minor
      topic: Public debt or credit facility disclosure for Rippling was not found
      missingEvidence: >-
        No retained public source established a current debt facility, warehouse line, or other non-equity financing
        obligation.
      whyItMatters: >-
        Debt can affect downside protection, liquidity planning, and later financial-risk analysis even in otherwise
        equity-funded software companies.
      diligencePath: >-
        Ask management for debt schedules, covenant summaries, bank facilities, and any off-balance-sheet financing
        exposures.
      relatedQuestionRefs:
        - RQ114
    - type: conflicting-data
      severity: material
      topic: Public headcount figures conflict across retained 2024-2025 sources
      missingEvidence: >-
        TechCrunch reported 4,000+ employees, Y Combinator still showed 2,500, and Kleiner Perkins described 2,000+
        earlier, leaving no canonical current total.
      whyItMatters: >-
        Headcount is a core cover metric and operating-leverage proxy that later chapters may otherwise overstate or
        understate.
      diligencePath: Request current employee count by region and function, plus a dated org snapshot or audited HRIS export.
      relatedQuestionRefs:
        - RQ116
      relatedTableRefs:
        - T101
    - type: conflicting-data
      severity: material
      topic: Public revenue and ARR metrics are not canonical for Rippling
      missingEvidence: >-
        Reuters cited ARR above $100M, TechCrunch cited sources for $570M annualized revenue, and Sacra estimated $1.0B
        annualized revenue, but the company has not disclosed a reconciled metric set.
      whyItMatters: >-
        Revenue and ARR are core cover metrics and later valuation inputs, so inconsistent public figures would create
        drift across chapters.
      diligencePath: >-
        Request a current ARR definition, trailing-twelve-month revenue, audited revenue bridge, and reconciliation
        between revenue, ARR, and annualized run-rate.
      relatedQuestionRefs:
        - RQ118
      relatedTableRefs:
        - T101
    - type: enumeration-incomplete
      severity: material
      topic: Leadership and founder table remains a partial public roster
      missingEvidence: >-
        Public sources identify founders and the executive bench, but not the full board, all direct reports, or any
        director-level governance structure.
      whyItMatters: Key-person dependence and governance quality cannot be assessed cleanly from a partial leadership view.
      diligencePath: Request a current org chart, board roster, and executive committee description.
      relatedTableRefs:
        - T102
    - type: enumeration-incomplete
      severity: material
      topic: Stakeholder or investor map is a public approximation rather than a cap table
      missingEvidence: >-
        Public financing coverage identifies investor names but not ownership percentages, liquidation stack, secondary
        allocations, or voting rights.
      whyItMatters: >-
        Without private financing documents, stakeholder influence and economic control can only be inferred loosely
        from financing visibility.
      diligencePath: >-
        Request the current cap table, SAFEs or convertibles, board rights, tender allocations, and major investor side
        letters.
      relatedTableRefs:
        - T103
    - type: enumeration-incomplete
      severity: minor
      topic: Milestone table likely omits unpublished internal product and governance events
      missingEvidence: >-
        The chronology is built from externally visible announcements and coverage, so private launches, board actions,
        and non-public commercial milestones are absent.
      whyItMatters: >-
        Later diligence may need a fuller chronology to test execution pace, governance decisions, and operational
        inflection points.
      diligencePath: >-
        Request an internal corporate timeline covering financings, launches, expansions, reorganizations, and legal
        milestones.
      relatedTableRefs:
        - T104
