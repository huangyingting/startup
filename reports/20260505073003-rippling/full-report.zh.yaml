      - number: '8.2'
        title: 投资逻辑、反向逻辑与情景逻辑
        blocks:
          - type: paragraph
            body: >-
              投资逻辑很直接。Rippling 似乎正围绕员工数据搭建统一系统，HR、IT 和支出领域有二十多个产品；官方材料和第三方报道都支撑真实的先落地、再扩张平台叙事。超过 20,000 名客户、4,000
              多名员工，以及披露中异常强劲的 PEO 留存，都符合一家已经具备逃逸速度和一定切换成本耐久性的公司。如果 Sacra 关于 2026 年 3 月年化收入已接近 $1 billion 的估计方向正确，2025
              年这轮融资或许只是偏贵，而非鲁莽。反向逻辑同样重要。官方定价仍大多基于报价，审计后盈利情况缺失，毛利率、净美元留存、客户集中度、清算条款等核心承销指标也仍未公开。同时，公司和 Deel
              已陷入大范围法律战：双方间谍指控对打，Delaware 修订诉状，攻击 California 案件的动议，以及 Rippling 后续提出的 RICO 指控。组合起来，当前估值支撑高度依赖证据：乐观结果需要持续
              30%+ 增长和更干净的尽调证明；如果盈利前增长放缓，或法律争议推高折现率，悲观结果会很快到来。
