            title: 资本看起来可得，但现金跑道仍不透明
            body: 2025 年融资显著改善了短期资本入口，但公开来源仍没有披露现金、烧钱、毛利率或 CAC。这意味着公司可能资金充足，但外部承保无法验证这笔钱能撑多久。
            calloutType: risk
