        - label: 控制层
          detail: 权限、政策、Supergroups、审批和字段级访问规则，决定谁能查看、操作和访问哪些内容。
        - label: 自动化 / 构建层
          detail: Workflow Studio、App Studio、Rippling Solutions、分析和 AI 都作用在同一套底层数据与权限之上。
        - label: 集成层
          detail: REST API、webhooks、App Shop 列表、GitHub 示例和获批合作伙伴路径，把 Rippling 接入内部与第三方系统。
        - label: 执行层
          detail: HCM、薪资、全球化、IT 身份 / 设备、财务 / 支出和合规工作流，在同一平台上运行，而不是散在孤立的点工具里。
