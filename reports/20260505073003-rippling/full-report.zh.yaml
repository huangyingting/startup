        - 索取按客群划分的模块附加顺序和附加率。
      - - 云薪资现代化与自动化
        - 驱动因素
        - 当前到中期
        - 支撑客户替换手工或本地部署薪资栈的意愿
        - 按队列索取实施时间和回本周期。
      - - BYOD、零信任与设备治理需求
        - 驱动因素
        - 当前到中期
        - 员工数据集中后，IT 会打开第二个预算入口
        - 索取设备或身份模块进入初始交易时的赢单率。
      - - 中小企业云优先采用
        - 驱动因素
        - 中期
        - 说明没有传统企业负担的成长型公司中，潜在装机基础很大
        - 按员工数区间索取客户数和 NRR。
      - - 切换成本与迁移负担
        - 约束
        - 当前
        - 带定制配置的旧薪资和 HR 栈会拖慢整体替换，拉长销售周期
        - 索取实施工作量、上线时间和输单原因。
      - - 定价不透明与附加率披露缺失
        - 约束
        - 当前
        - 投资者和谨慎买家从外部测算 ROI、ACV 与 SAM 时，模型会偏弱
        - 索取价格卡、附加率队列，以及按模块组合划分的实际 ACV。
      - - 信任、隐私与诉讼噪音
        - 约束
        - 当前
        - 即便法律主张仍有争议，受监管或合规敏感客户的尽调也可能拉长
        - 索取与信任顾虑相关的安全异议、法律红线、流失或延期数据。
    notes: 这张表把每个驱动因素或约束连接到采用时间和投资判断所需的具体尽调问题， 而不只停留在抽象市场叙事。
