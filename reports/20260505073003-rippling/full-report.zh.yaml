chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品范围和当前运营足迹
        blocks:
          - type: paragraph
            body: >-
              Rippling 目前把自己定位为劳动力管理平台，统一 HR、IT、财务和全球薪资，而不是单点 HR 工具。公司自有首页和 About
              页面都强调一套员工数据记录系统，以及一个能把变更传导到薪资、福利、设备、权限、费用和其他业务系统的工作流层。产品目录进一步强化了这一定位：它展示了 HR、薪资、IT、财务、全球雇佣产品，以及超过 600
              个集成。最稳妥的标准地点事实，是 About 页面列出的当前旧金山总部地址；同一页面还显示其更广的运营足迹覆盖纽约、奥斯汀、伦敦、都柏林、班加罗尔和悉尼。合在一起，公开定位证据支持把 Rippling
              视为一个宽产品、多产品的劳动力平台，且已有有意义的国际存在，而不是狭窄的美国国内薪资供应商。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
      - number: '1.2'
        title: 创始人、领导团队纵深和治理姿态
        blocks:
          - type: paragraph
            body: >-
              公开创始人归因足够一致，可以复用。Rippling 和 Y Combinator 都把公司与 2016 年关联起来，Rippling 自己的 Series B 文章则称 Parker Conrad 和
              Prasanna Sankar 创办了这家公司。当前 About 页面列出 Parker Conrad 为联合创始人兼 CEO，并点名 Matt MacInnis、Albert Strasheim、Adam
              Swiecicki、Bridget Abraham 和 Martin White
              分别承担主要产品、技术、财务、合规和法务角色。相比早期以创始人为中心的报道，这形成了可信的职能团队纵深图景。治理披露没有那么完整。Rippling
              目前披露高管名单，但不披露公开董事会名单，因此投资人不能仅凭公开来源，就把当前董事会构成、委员会成员或控制权安排视为已确定。公司披露得最清楚的治理细节是运营层面的：一个 Insurance and
              Regulatory Committee 监督持牌保险、PEO 和支付子公司，说明受监管活动周围已有正式合规结构，尽管更广的董事会可见度仍有限。
