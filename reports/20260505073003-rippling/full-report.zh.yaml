  headquarters: San Francisco, California, USA
  productSummary: >-
    Rippling 销售模块化软件，覆盖
    HR、薪资、福利、身份、应用与设备管理、支出、账单支付、企业卡和全球雇佣。核心差异在于所有模块共享同一底层劳动力图谱，让一个系统跨职能驱动权限、工作流、合规逻辑和报告；多数买家仍用多个供应商分别管理这些职能。
  customerFocus: SMB、中型市场以及越来越多的企业雇主；这些客户希望整合劳动力运营、合规和员工生命周期管理。
  businessModel: 模块化订阅软件，并在多个产品族中通过附加模块变现；PEO、EOR、薪资运营和设备物流等产品还带有较重服务收入。
  stage: Series G private / late-stage compound software
