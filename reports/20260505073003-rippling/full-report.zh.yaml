  - id: TM001
    title: 市场定义表
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 付款方
      - 相关性
    rows:
      - - 广义 HCM 套件
        - 核心 HR、劳动力管理、分析、招聘、入职、工资、福利和员工数据工作流
        - ERP、人员配置服务和无关后台软件
        - CHRO、CFO、HR 运营、工资负责人
        - Rippling 可用的外层口径，因为它与套件厂商竞争
      - - 工资和合规核心
        - 工资处理、税务申报、多辖区工资、员工自助发放、与工时联动的工资准确性
        - 不执行工资发放的通用会计软件
        - 工资负责人，带财务控制和 HR 参与
        - Rippling 最接近直接货币化的核心
      - - 全球工资 / EOR 动作
        - 跨境工资、承包商付款、轻实体招聘、本地合规、多币种运营
        - 本地法人设立服务和通用外包劳动力
        - 人力运营、CFO、COO、全球雇佣负责人
        - 客户出海招聘后的关键扩张楔子
      - - 身份和设备管理邻接
        - SSO、MFA、生命周期管理、设备访问、MDM、端点策略、离职擦除和访问移除
        - 独立 SOC 工具和广义安全运营平台
        - IT、安全、CIO 预算
        - 重要，因为 Rippling 把这些控制与员工生命周期事件绑定
      - - 财务和支出邻接
        - 费用跟踪、报销、公司卡、与工资联动的支出可见性、GL 同步
        - 核心 AP 自动化和完整 ERP 会计套件
        - CFO、财务总监、财务运营
        - 可用于交叉销售，但不是整个支出管理市场
      - - 现状替代栈
        - ADP 或 Paychex 或 Workday 或 Dayforce，加上独立 Okta 或 Jamf，再加手工表格和本地流程
        - 买方今天实际并不使用的虚构单供应商基准
        - 多个预算负责人；财务和 HR，加上 IT 审查
        - 用于流失、赢单 / 输单和迁移建模的最现实对照集
    notes: 纳入和排除支出以触及员工记录或生命周期的产品为锚。邻接 IT 和财务类别只有在流经劳动力工作流时才重要。
