  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议与当前估值锚点
        blocks:
          - type: paragraph
            body: >-
              Rippling 看起来是高质量私营软件资产，但公开证据还不足以支持按 2025 年 5 月价格买入。公司显然守住了高端资本通道：管理层宣布 $450 million 新股融资、并行 $200 million
              回购计划，以及 $16.8 billion 估值。同一组保留来源还显示，管理层并未准备近期
              IPO，更希望先接近盈利。关键在于，当前价格发现仍来自私募投资人，而不是愿意持续验证估值的公开市场。公开收入证据也分裂：一边是 2025 年据报道 $570 million 年化运行率，另一边是分析师式估计称，到
              2026 年 3 月收入可能已大约达到 $1.0 billion。按较低锚点，这轮约等于 29x 年化收入；即便按更乐观估计，估值仍约 16.8x。对照公开薪资和 HCM 可比公司大多 3x-7x
              EV/Revenue 的区间，当前估值只有在尽调确认 Rippling 已经更像一个耐久多产品平台，而不是高增长但仍不透明的私营工资公司时才站得住。这足以给出继续研究，不足以买入。
