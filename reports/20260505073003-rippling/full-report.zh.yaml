        - from: trust
          to: valuation
        - from: margin
          to: financing
        - from: financing
          to: valuation
    approximationNotes: 该图是定性的；它编码因果方向和耦合关系，不是建模概率。
    claimRefs:
      - CR001
      - CR007
      - CR011
      - CR012
      - CR028
      - CR033
      - CR035
      - CR039
      - CR045
      - CR046
  - id: FR003
    title: 依赖图
    type: dag
    layout: wide
    summary: Rippling 的依赖网络横跨基础设施、集成、本地用工对手方和受监管的资金流转；多个节点都可能打断薪资或访问，但没有一个是唯一单点故障。
    data:
      nodes:
        - id: aws
          label: AWS
          detail: 客户数据和核心服务的具名托管骨干。
          tone: warning
        - id: google
          label: Google Workspace
          detail: 集成和身份查找依赖，有过经证实的事故历史。
          tone: warning
        - id: eor
          label: EOR 关联方 / 合作伙伴
          detail: 美国之外的本地雇主和合规执行。
          tone: warning
        - id: counsel
          label: 本地用工法律顾问
          detail: 逐国解释监管要求并办理申报。
          tone: neutral
        - id: payments
          label: 支付 / 牌照栈
          detail: Rippling Payments 加上制裁、欺诈和牌照工作流。
          tone: warning
        - id: browser
          label: 浏览器 / 终端生态
          detail: Chrome 和设备行为可能影响 Device Trust。
          tone: warning
        - id: core
          label: Rippling 运营核心
          detail: 统一的 HR、薪资、IT 和财务控制平面。
          tone: positive
        - id: customer
          label: 客户关键工作流
          detail: 薪资截止时间、入职、访问和通知。
          tone: warning
      edges:
        - from: aws
          to: core
        - from: google
          to: core
        - from: eor
          to: core
        - from: counsel
          to: eor
        - from: payments
          to: core
        - from: browser
          to: core
        - from: core
          to: customer
        - from: google
          to: customer
        - from: payments
          to: customer
        - from: browser
          to: customer
    approximationNotes: 这是定性依赖图，不是网络流量图，也不是按支出加权的供应商模型。
    claimRefs:
      - CR011
      - CR018
      - CR028
      - CR030
      - CR034
      - CR035
      - CR037
      - CR043
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 强平台证据遇上偏薄的承销数据和高溢价私募估值标记，建议因此保持谨慎。
    data:
      nodes:
        - label: 平台广度覆盖 HR、IT、薪资和支出
        - label: 20k+ 客户和披露较强的 PEO 留存
        - label: 高溢价私募资本和反复出现的老股要约
        - label: 缺少经审计利润率、股权结构表和 NDR 细节
        - label: 仍在进行的 Deel 诉讼和治理阴影
        - label: 在 $16.8B 继续研究；需要更干净的证据或更低入场价
    approximationNotes: null
    claimRefs:
      - CV001
      - CV002
      - CV015
      - CV018
      - CV043
      - CV047
      - CV048
      - CV049
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 摆动最大的因素是收入确认、法律风险敞口，以及把上市可比公司折价套到私募估值标记上的幅度。
    data:
      items:
        - label: ARR 确认接近 $1B
          value: 3
        - label: 毛利率验证类软件画像
          value: 2
        - label: 上市可比公司重估 / 压缩
          value: -4
        - label: 诉讼准备金或治理冲击
          value: -3
    approximationNotes: 这些值是相对于当前估值标记的方向性估值影响分数，单位为 USD billions，基于公开情景范围，而不是管理层指引。
    claimRefs:
      - CV012
      - CV033
      - CV034
      - CV046
      - CV048
      - CV049
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 公开证据支持很宽的承销区间；2025 年估值标记要成立，需要执行接近区间上沿。
    data:
      items:
        - label: 悲观
          low: 6
          mid: 7.5
          high: 9
        - label: 基准
          low: 10
          mid: 12.5
          high: 15
        - label: 乐观
          low: 17
          mid: 19.5
          high: 22
    approximationNotes: 这些值是以 USD billions 计的宽口径企业价值区间，由观察到的收入锚点和上市可比公司折价 / 溢价逻辑推导；它们不是 DCF，也不是管理层预测。
    claimRefs:
      - CV011
      - CV012
      - CV023
      - CV024
      - CV025
      - CV026
      - CV033
      - CV034
      - CV046
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: compact
    summary: Rippling 在市场关键性和平台广度上得分高，但证据质量和当前入场估值偏弱。
    data:
      items:
        - label: 市场关键性
          value: 8
        - label: 产品广度
          value: 8
        - label: 客户证明
          value: 7
        - label: 财务可见性
          value: 4
        - label: 法律 / 治理风险
          value: 3
        - label: 当前估值吸引力
          value: 3
    approximationNotes: 分数是 0-10 的序数尽调判断，由保留证据综合得出，不是管理层提供的 KPI。
    claimRefs:
      - CV015
      - CV017
      - CV018
      - CV020
      - CV046
      - CV048
      - CV049
