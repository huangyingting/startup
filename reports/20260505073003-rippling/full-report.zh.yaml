  - id: TV005
    title: 投资逻辑破裂与叫停触发因素表
    columns:
      - 触发因素
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 盈利前增长放缓
        - 增长持续低于约 25%-30%，且利润率没有改善
        - 相对上市薪资 / HCM 可比公司，溢价倍数失去支撑。
        - 不要按 2025 标记价追加投资；只有入场价更低或利润率更好后再重新评估。
      - - 收入质量落空
        - 经审计 ARR / 收入明显低于乐观尽调情景
        - 乐观情景坍塌，隐含倍数仍远高于上市先例。
        - 按悲观区间重新测算，并将当前标记价视为偏高。
      - - 法律升级
        - 不利禁令、破坏性证据开示，或准备金 / 和解敞口显著提高
        - 退出时间和治理折价恶化。
        - 暂停投资流程，直至责任区间量化。
      - - 结构化条款压力
        - 优先股堆叠或棘轮条款使普通股劣后程度超出预期
        - 账面估值不再反映普通股入场经济性。
        - 任何价格讨论前，必须拿到投资条款清单细节。
    notes: null
    claimRefs:
      - CV008
      - CV033
      - CV044
      - CV047
      - CV049
      - CV050
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - 收入桥接
        - 经审计 2025 收入 / ARR、月度退出运行率，以及管理层和二级市场来源之间的定义口径调节
        - 当前估值会随真实锚点是约 $570M 还是更接近 $1B 而剧烈摆动。
        - 向 CFO 索取收入桥接和 2025 轮融资使用的董事会材料。
      - - 利润率质量
        - 混合毛利率、软件毛利率、支付 / EOR 毛利率、烧钱速度和自由现金流画像
        - 如果没有经济性随规模改善的证据，溢价 SaaS 定价很难站得住。
        - 获取产品级 P&L，或至少拿到分部贡献利润率切片。
      - - 留存与扩张
        - 净美元留存、PEO 之外的 Logo 留存、按队列的附加购买，以及按产品家族的流失
        - 公开的 99.5% 留存仅适用于 PEO 队列，未必能代表整个平台。
        - 要求按客户规模、地域和模块数量拆分的队列分析。
      - - 股权结构经济性
        - 清算优先权、参与权、棘轮条款和员工要约收购机制
        - 如果结构化保护排在新投资者之前，账面估值可能高估普通股价值。
        - 审阅融资文件和完全稀释瀑布表。
      - - 法律敞口
        - Deel 诉讼的准备金、保险、律师意见、证据开示状态和可能损失区间
        - 即便有望胜诉，案件也可能拖慢退出时间并推高折现率。
        - 审阅外部律师备忘录，以及保险和准备金明细。
      - - 集中度
        - 大客户、地域组合、EOR 敞口、支付量集中度和受监管国家组合
        - 下行周期或监管冲击中，隐性集中度可能快速打破平台溢价。
        - 索取前 20 大客户、国家和支付集中度明细。
    notes: null
    claimRefs:
      - CV020
      - CV047
      - CV048
      - CV049
