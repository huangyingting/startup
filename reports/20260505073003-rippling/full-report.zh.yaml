  - id: TP003
    title: 定价 / 打包对比
    columns:
      - 竞品
      - 价格 / 单位 / 合同模式
      - 包含能力
      - 折扣或未知项
      - 含义
    rows:
      - - Rippling
        - 需要核心平台；多数产品按每名员工每月计费；部分有月度基础费
        - 平台之上可单独购买薪资、费用、福利、设备管理和全球模块
        - 主要标价大多未公开
        - 捆绑灵活，但比专业厂商更难摸清价格
      - - Deel
        - $599 EOR；$49 承包商；设备层级为每台设备每月 $18 / $14 / $12 起
        - 全球雇佣、承包商、薪资和 IT / 设备运营
        - 企业层级和部分全球薪资条款按报价而变
        - 全球雇佣买方会把 Deel 视为非常透明的直接竞品
      - - Gusto
        - 官方对比页显示每月 $40 + 每人 $6
        - SMB 薪资主导套餐，包含 HR 和承包商支持
        - 已审阅来源中，高层级和更广的国际套餐尚未完全标准化
        - SMB 薪资交易的强低端价格锚
      - - Justworks
        - EOR 每名员工每月 $599；打包薪资 / PEO 定价另加附加项
        - 薪资、福利、合规、PEO 支持、全球 EOR
        - 雇主总成本仍随福利和计划选择而变
        - 买方若更想要外包合规而不是宽控制平面，Justworks 可替代
      - - Remote
        - $599 EOR；$29 薪资；$29 承包商管理
        - 全球雇佣、薪资、承包商、HR 核心和部分设备管理
        - 部分实施费或经常性薪资交付费取决于设置
        - 透明的国际替代方案，会让 Rippling 的报价流程显得不够开放
      - - Papaya Global
        - 未知（抓取时官方定价页被阻止）
        - 可推定其全球薪资 / EOR 专业厂商定位，但当前套餐细节未验证
        - 当前标价无法独立留存
        - 放在竞争图谱中，但不要夸大定价确定性
      - - Ramp
        - 免费层；Plus 每用户每月 $15 + 平台费；Enterprise 定制
        - 卡、费用、AP、差旅、资金管理、AI 报表、采购附加项
        - Enterprise 和附加项经济性仍按报价
        - 对 Rippling Finance 形成明确入门价格压力
      - - Brex
        - Essentials / Premium 自助层级，加上定制报价的企业级 / Smart Card 方案
        - 全球卡、账单支付、差旅、采购、多实体控制
        - 精确企业级定价为定制
        - 强邻近支出竞品，尤其面向全球卡买方
      - - Airbase by Paylocity（Paylocity 旗下）
        - 整合进 Paylocity for Finance 后需联系销售
        - 与 Paylocity HR / 财务 / IT 整合的支出管理
        - 收购前独立定价未留存
        - 通过并购进入的厂商，可把支出打包进 HR 账户
      - - ADP
        - 定制报价
        - 薪资、福利、PEO / 外包、合规、AI、应用市场
        - 已审阅企业页面未留存公开标价
        - 在位厂商广度真实存在，但价格发现更有利于专业挑战者
      - - Workday
        - 定制报价
        - HCM、薪资、财务、支出管理、AI / 智能体
        - 未保留公开标价
        - 企业套件买家可以整合供应商，但报价驱动采购更慢
    notes: 公开价格缺失或被拦截时，该行明确标为未知，而不是估算。
