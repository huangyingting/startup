  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出和现状替代方案
        blocks:
          - type: paragraph
            body: >-
              Rippling 的公开定位使市场边界宽于薪资软件，但窄于 HR 或企业安全的所有支出。公司自有平台、薪资、HRIS、设备管理、支出管理和全球劳动力页面反复呈现一个覆盖
              HR、薪资、IT、财务和全球运营的员工系统。因此，纳入支出是直接落在员工记录上的软件：HRIS、薪资处理、税务与合规工作流、福利管理、全球招聘和薪资、员工入职和离职、应用和设备开通，以及报销、卡和支出可视性等部分财务控制。排除支出同样重要。Rippling
              不是 ERP 替代品，不是人力派遣机构，不是纯网络安全供应商，也不是通用 BPO 供应商。最接近的替代方案是核心 HCM 和薪资套件供应商——ADP、Paychex、Workday、Dayforce——再加上
              Okta 和 Jamf 等单独的身份或设备工具。公开评论来源强化了同一点：Rippling 的切入口不只是薪资加附加模块，而是一个劳动力控制平面，试图消除
              HR、薪资、EOR、设备和财务点状产品拼接出来的补丁式架构。
