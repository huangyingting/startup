      - number: '6.3'
        title: 扩张逻辑可见；主要公开风险是定价摩擦、实施负担和未披露集中度
        blocks:
          - type: paragraph
            body: >-
              最可信的扩张信号，是具名账户内的模块深度。Ethical Energy 明确称其采用了 Benefits、Spend、Payroll、HCM 和 Performance Management；Blank
              Street 把 Rippling 描述为一个永久运营标签页，用于薪资、文档、留存、薪酬，以及通过 Sequoia 集成实现的福利相邻工作流。Morning Consult 选择 Rippling 而非
              Paylocity，是因为集成集合更广；NinjaTech AI 则显示 Rippling 从交易型 HR 延伸到跨国报告和 AI 辅助分析。换句话说，公开故事不只是「Rippling
              赢下薪资」，而是「员工图谱落地后，Rippling 可以扩大钱包份额」。


              下行在于，扩张证明远比集中度证明清晰。Software Advice、HR Technology Advice、Employ Borderless、SoftwareConnect
              和其他独立评论持续赞赏宽度和自动化，但也重复同样的摩擦主题：随着模块增加，定价更难预测；压力下支持会变慢；实施可能比轻量 SMB HRIS 更复杂；国际税务 / EOR 工作流会让人觉得贵或笨重。CNBC 对
              Deel 诉讼的报道又增加了一个反向角度，显示在全球薪资和 EOR 中，客户账户数据、报价、演示和支持请求的竞争有多激烈。因此，公开证据支持一个平衡的客户结论：Rippling
              似乎能在运营复杂账户内成功扩张，但采购摩擦和切换竞争真实存在，公开披露仍没有揭示头部客户集中度、渠道占比或全套件队列健康。
            claimRefs:
              - CU023
              - CU024
