        - 参照公司
        - 私营公司；公开页面主打一套平台覆盖 HR、薪资、IT、财务和全球产品
        - 从 SMB 到企业级、希望拥有单一员工控制平面的团队
        - 统一员工数据模型，横跨薪资、访问 / 设备和支出
        - 定价大多按报价，随模块加购而上升
      - - Deel
        - 直接套件竞品
        - $17.3B 估值；$1B+ ARR；35,000+ 客户；覆盖 150+ 个国家的 1.5M 名劳动者
        - 使用 EOR、承包商和跨境薪资的全球优先公司
        - 深厚全球合规层，加上工作流和设备运营
        - 已审阅页面未证明其原生支出管理同样宽
      - - Gusto
        - 直接薪资竞品
        - 官方页面展示透明的 SMB 薪资入门价
        - SMB 薪资和 HR 买方
        - 简单的薪资主导路径，支持 120+ 个国家的承包商
        - 已审阅页面未证明其有实质 IT 或支出广度
      - - Justworks
        - 直接替代 / PEO
        - 公开 EOR 价格和打包的 PEO / 薪资方案
        - 需要薪资、福利、合规和支持的小企业
        - PEO 结构与打包合规 / 福利支持
        - 已审阅来源中，IT 和财务控制平面的广度不够可见
      - - Remote
        - 直接全球雇佣竞品
        - 透明的 EOR、薪资和承包商标价
        - 跨国招聘的分布式公司
        - 强 EOR / 薪资 / 承包商范围，加上设备管理
        - 比 Rippling 少一些美国薪资加财务广度的证据
      - - Papaya Global
        - 邻近专业厂商
        - 未知（抓取时官方产品和定价页面被阻止）
        - 多国薪资和 EOR 买方
        - 全球薪资品类声誉仍会进入交叉比选名单
        - 当前官方产品 / 定价细节无法独立验证
      - - ADP
        - 在位薪资 / HCM 厂商
        - 1,000,000+ 客户；140+ 个国家；入市 75+ 年
        - 从 SMB 到企业级薪资和 HCM 买方
        - 分销能力巨大，外包、PEO 和薪资可信度强
        - 已审阅页面未证明有类似 Rippling 的 IT + 支出叙事
      - - Workday
        - 在位企业套件
        - 全球 10,000+ 客户
        - 中型市场和企业级 HR / 财务买方
        - 一套企业套件内含 HCM、薪资、财务、支出和 AI
        - 定价和实施更不透明，也可能更重
      - - SAP SuccessFactors
        - 在位全球 HR 套件
        - 200+ 个国家 / 地区的 10,000+ 客户
        - 大型全球企业
        - 全球 HR / 薪资、人才、员工管理和 AI 智能体
        - 已审阅来源未证明整合了支出或 IT 运营
      - - Paylocity / Airbase
        - 在位厂商邻近进入者
        - 41,650 名客户；6,700 名员工；5,500+ 合作伙伴
        - 从 HR / 薪资向财务和 IT 扩展的 SMB 与中型市场买方
        - 收购 Airbase 帮助把支出与 Paylocity 的 HR / IT 平台统一
        - 财务和 IT 扩展看起来比 Rippling 核心叙事更新
      - - Ramp
        - 邻近支出专业厂商
        - 公开免费层和付费 Plus 层
        - 寻求卡、AP、差旅和报表自动化的财务团队
        - 进攻性入门定价，支出自动化重点强
        - 没有 HR / 薪资员工记录系统
      - - Brex
        - 邻近支出专业厂商
        - 210+ 个国家 / 地区的全球卡；企业层级定制报价
        - 全球初创公司和财务团队
        - 差旅、采购、卡、多实体和全球发卡
        - 没有 HR / 薪资员工记录系统
    notes: 现状替代方案还包括拼接式工具栈，例如薪资 + HRIS + 身份 / 设备 + 支出工具； 当前私营公司收入或折扣数据通常不公开。
