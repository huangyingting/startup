  - id: TM005
    title: 规模测算 / 采用尽调缺口表
    columns:
      - 缺口
      - 当前公开状态
      - 为什么重要
      - 具体尽调路径
    rows:
      - - Rippling 专属 SAM 或 SOM
        - 已保留公开来源没有单独拆出一个统一的 HR-薪资-IT-财务支出池，能干净映射到 Rippling。
        - 没有公司专属 SAM，渗透率假设容易变得随意。
        - 向管理层索取按客户规模、模块族、地域和初始购买职能划分的分段数据。
      - - 按买方类型划分的附加率与 ACV
        - 公开来源没有显示薪资客户追加 IT、EOR 或财务模块的频率， 也没有显示混合合同价值长什么样。
        - 扩张测算是 Rippling 估值和回本分析的核心。
        - 按初始模块索取附加顺序、附加率队列、ACV 分布和赢输单数据。
      - - 直接薪资与 EOR 经济性
        - 公开评测来源讨论地域和定价不透明，但没有给出国家级利润率， 也没有拆分直接薪资与 EOR 的收入结构。
        - 跨境增长质量取决于利润率和运营强度，不只是国家数量。
        - 按本土薪资、全球薪资和 EOR 索取收入结构、毛利率和服务成本。
      - - HCM 与 IT 邻近类别重叠
        - 公开的 HCM、薪资、MDM 与移动身份估算描述的是相互重叠的外壳， 而不是单一嵌套漏斗。
        - 重叠外壳可能造成重复计算，抬高 TAM 叙事。
        - 索取内部 TAM 框架，调和薪资、全球、IT 和财务模块且不重复计算。
    notes: 这些市场模型输入最可能改变估值信心，却也最难只靠公开来源补齐。
