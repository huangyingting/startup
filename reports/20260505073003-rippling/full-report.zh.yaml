        - 暂停投资测算，或在重新建模法律敞口前重设下行情景。
      - - 支付 / 牌照状态
        - 监管批准与例外
        - 重大支付、PEO 或 EOR 授权被拒、暂停或续期延误
        - 在受影响通道，将无缝全球薪资叙事视为投资逻辑破裂。
      - - 薪资发放可靠性
        - 薪资事件频率
        - 单季度出现两起或以上影响截止期限的薪资事件，或一次重大薪资漏发且没有合同补救
        - 上调流失、支持成本和品牌损害假设。
      - - 身份 / 第三方依赖
        - 登录或 SSO 中断严重程度
        - 薪资或入职截止期前后，出现一次持续数小时的第三方中断或反复 SSO 故障
        - 继续前，要求拿到冗余故障切换和供应商补救证据。
      - - 客户支持 / 定价摩擦
        - 支持与续约信号
        - 企业客户流失或 NRR 走弱，且与支持延误、定价意外或模块复杂度相关
        - 下调扩张假设，并重新评估销售效率的可持续性。
