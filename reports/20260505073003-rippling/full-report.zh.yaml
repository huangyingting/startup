companyProfile:
  summary: >-
    Rippling 是一家私有复合软件公司，用同一套员工和公司数据模型，把 HR、薪资、福利、身份、设备管理、支出控制和全球雇佣工作流连起来。产品品类宽度真实，越来越像劳动力运营的操作系统，而不是单点 HRIS
    供应商。公开证据支持其产品执行力、客户验证和持续投资人支持，但在最新估值下，要做出高确信度价格判断，仍有太多承保问题没有答案。
  foundedDate: '2016-01-01'
  founders:
