  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律和监管风险是最主要的剩余悬置
        blocks:
          - type: paragraph
            body: >-
              Rippling 最大的残余风险不是普通 SaaS 流失，而是一整套法律与监管风险：正在进行的竞争对手诉讼、工资与支付牌照、员工数据相关隐私义务已经叠在一起。Deel
              事项很重要，因为它不再是单向指控。Rippling 2025 年 3 月的联邦诉状提出 RICO 和商业秘密主张，但 Deel 随后在 Delaware 反诉，提出 Rippling 58 次渗透 Deel
              平台等反向指控，之后又公开称针对 Deel 的欺诈和 RICO 指控已被驳回。即便其中许多事实仍有争议，或来自竞争对手，多线诉讼本身已经让法律开支、管理层分心、声誉损害和证据开示风险变成现实。另一个监管原因来自
              Rippling 自己的合规材料：保险、PEO、EOR、工资和支付分别落在不同的牌照、保证金、税务和隐私制度里。公司披露了 Insurance and Regulatory Committee
              和专门子公司，这是实质缓释；但公司也披露，多国支付牌照仍在申请。投资人面对的基准情景不是诉讼噪音，而是一家核心产品运行在不断扩大的合规边界内的平台。
