            body: >-
              可复用的公开时间线始于 2016 年创立和 Winter 2017 Y Combinator 身份，随后经过 2020 年 Series B、2023 年都柏林欧盟总部公告、2024 年悉尼 APAC
              总部开设、2024 年 Series F 融资和要约，以及 2025 年 1 月把 EOR 覆盖扩展到另外五个国家的发布。当前最重要的里程碑是 2025 年 5 月 Series G，它把估值重置到 $16.8
              billion，并延续了员工流动性。但公司概况也需要保留反向记录。Reuters 称，2025 年融资发生时，Rippling 正与 Deel 存在法律纠纷；TechCrunch 报道 Rippling 已起诉
              Deel，指控其涉嫌窃取商业机密。随后 Deel 公开表示，它在 2025 年 4 月 25 日提起 Delaware 诉讼，指控 Rippling 58 次渗透其平台，并以驳回动议和 anti-SLAPP
              动议回应。这些反控是未经证实的竞争对手陈述，不是已确定事实，但重要性足以进入后续风险工作。
