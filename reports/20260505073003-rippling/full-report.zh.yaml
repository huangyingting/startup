      - number: '6.2'
        title: 具名部署证据在生产使用和运营结果上很强，但在队列耐久性上较弱
        blocks:
          - type: paragraph
            body: >-
              Rippling 越过了「具名客户验证」门槛，因为留存证据远不止 logo 墙。Barry’s 描述了 53 个美国地点的具体工作流改善，包括新员工设置从约 15 分钟降到 3–5 分钟，状态变更从 10–15
              分钟降到约 3 分钟。Clay 称其在 18 个月内从 20 人增长到 100 人，同时自动化了 80% 入职任务。Morning Consult 称其不到两年增加超过 300 名员工，用 2 人管理团队为
              500 名员工运行薪资、福利和设备，并每年节省 500 小时。Ethical Energy 称其一天内把 40 名承包商转为员工，淘汰五个软件工具，并自动化支出卡发放。Compass Coffee 报告 HR 和
              IT 管理时间减少 96%，入职速度快 6x。NinjaTech AI 描述一个人力团队一人运行三国薪资，并在约 100 秒内生成经验证的投资人报告。


              多个具名客户的结果足够一致，可以支持生产成熟度结论：Rippling 被用于运行真实薪资、入职、离职、IT 开通、福利、支出和报告工作流，而不只是试点。缺失的是广泛公开的留存透明度。Rippling 自己博客给出
              PEO 产品 99.5% 年同比留存这一强指标，独立评论来源也显示满意度高，但公开非 PEO
              NRR、GRR、流失和队列表仍不可得。因此，耐久性案例正面但不完整：公司有有力的生产验证和有利满意度标记，但投资人仍无法仅凭公开证据验证更广套件的留存质量。
