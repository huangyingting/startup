  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 格局和竞争者类别
        blocks:
          - type: paragraph
            body: >-
              Rippling 面对的不是单一竞争者类别。最直接的重叠来自试图端到端掌握雇佣运营的供应商：Deel 和 Remote 都把全球招聘、合规、薪资、承包商管理以及部分设备或工作流工具组合在一起；Gusto 和
              Justworks 则仍是 SMB 薪资、HR 和福利买家的强替代品。在位厂商仍然重要，因为 ADP、Workday、SAP SuccessFactors 和 Paylocity
              已经扎进大型安装基础，并能向偏好更少系统、或已经信任既有供应商关系的买家销售更广套件。Ramp、Brex 和 Airbase by Paylocity 等相邻财务专家，专门给 Rippling
              的支出模块施压，即便它们不能替代 HR 或薪资控制平面。现状替代方案也真实存在：很多买家仍能把本地薪资、HR、身份 / 设备和支出工具拼成一套缝合技术栈，而不是采用一体化套件。因此，Rippling
              的市场不只是「现代 HR 软件」，而是横跨薪资、IT
              运营、财务自动化和全球雇佣合规的一次竞争性打包决策。实践中，决策往往取决于买家是想要一套员工数据记录系统，还是愿意围绕同一员工生命周期编排多个供应商和内部管理工作流。
