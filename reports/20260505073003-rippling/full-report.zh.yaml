        - 模块叠加后，价格更难预测
        - 扩张上行空间真实存在，但报价不透明会拖慢采购和预算审批
        - 按分群要求提供模块附加曲线、实际折扣和多产品 ACV
      - - 集成驱动扩张（Okta、Sequoia 和更广生态）
        - 依赖合作伙伴集成，可能制造实施依赖或支持复杂度
        - 集成有助于拿下复杂账户，但也扩大故障面和责任归属争议
        - 审查最重要的集成依赖、合作伙伴 SLA，以及升级事件中的支持归属
      - - 适合 50-1,000 名员工、多工具并行的运营团队
        - 只有基础 HR 需求的小企业可能觉得产品过重或过贵
        - 客户结构可能偏向复杂中端市场，而不是最广泛的 SMB 客群
        - 按员工规模段和产品宽度要求提供客户数、ARR 和流失率
      - - AI / 报告和行政提效场景提升钱包份额
        - 支持、设置和培训负担会随平台使用范围扩大而上升
        - 如果实施痛点拖慢部署或续约，净扩张可能被抵消
        - 调取多模块账户的实施时间表、服务附加率和健康分
      - - 多个分群都有很强的具名客户证据
        - 未公开披露大客户收入占比、前 10 客户集中度或渠道组合
        - 投资者还无法基于公开资料量化集中度下行风险
        - 要求提供客户收入集中度、经纪人 / 渠道占比，以及按行业 / 地域拆分的收入
    notes: 公开记录支持扩张逻辑，但集中度披露不足，还无法清楚承销客户集中度风险。
