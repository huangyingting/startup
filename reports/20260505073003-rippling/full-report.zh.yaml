            body: 下行风险不是 Rippling 质量不够，而是外部人还看不到审计后经济性、股权结构表条款或最终法律敞口时，就要支付高溢价私募估值。
            calloutType: risk
            claimRefs:
              - CV046
              - CV047
              - CV048
              - CV049
          - type: callout
            title: 什么会改善判断
            body: 更干净的尽调包如果显示收入已接近乐观区间、毛利率具备软件属性，且没有重大优先权或诉讼悬顶，观点会转向观察。
            calloutType: assumption
            claimRefs:
              - CV012
              - CV044
              - CV047
              - CV048
