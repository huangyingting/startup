      - number: '5.3'
        title: 集成、可靠性和信任：公开证据支持较成熟的控制平面，但不支持完整技术透明度
        blocks:
          - type: paragraph
            body: >-
              Rippling 的公开信任和集成证据足以承保一个成熟控制平面。官方页面称，公司遵循 GDPR 和 CCPA，并持有 SOC 1 Type II、SOC 2 Type II、SOC 3、CSA STAR
              Level 2，以及 ISO 27001、ISO 27018 和 ISO 42001 认证；信任中心还单独列出渗透测试文件和子处理方清单等 2026 年新增材料。安全页面还披露，美国境内 AWS
              托管覆盖多个可用区、弹性云配置，以及通过 Rippling IAM / MDM 禁用离职员工设备、应用和访问的自动离职控制。运营透明度好于许多私有 SaaS 同业，因为 Rippling
              运营公开状态页，按组件展示 uptime，并支持通过 email、SMS、Slack、webhook、Atom 和 RSS 订阅。截至 2026-05-05 抓取时，该页面显示过去 90 天主应用 uptime
              为 99.97%，Identity & App Management、SSO、Platform API、Third-party Integrations 和 Device & Inventory
              Management 均为 100.0% uptime，同时还显示一个已解决的 2026 年 5 月 1 日事件，标签为「US Payroll Runs Not
              Visible」。这是有用证据，但仍达不到尽调级完整透明度：页面不披露正式公开 SLA 或详细事后复盘，API 文档也只说存在速率限制，却没有在留存摘录中给出数字上限。
