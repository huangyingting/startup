  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户细分很宽，但最清楚的证据集中在扩张中的运营复杂度
        blocks:
          - type: paragraph
            body: >-
              Rippling
              的公开客户验证并不局限于单一狭窄买家画像。官方客户中心明确按创业公司、小企业、中型企业和企业组织案例，也突出健身、医疗、制造、非营利、餐厅、零售、金融服务和科技等行业。第三方客户数据库和案例聚合器进一步强化了这种宽度：Apps
              Run The World 称其追踪到 Rippling 在 21 个垂直行业和多个产品族中的赢单，CaseStudies.com 和 FeaturedCustomers 各自浮现超过 100
              个具名成功案例。这足以判断，Rippling 有真实的跨垂直采用，而不是只有一页 logo 墙营销。


              更强的模式不是「所有人同等使用 Rippling」，而是 Rippling 最详细的证明来自面对棘手人力运营复杂度的买家。Barry’s 需要一个系统来服务多地点小时工，并处理实体间转移。Morning
              Consult 希望增加数百名员工，同时不膨胀管理人手。Ethical Energy 需要在一天内把 40 名承包商转成 W-2 员工，并打通卡、薪资和 HR。Blank Street Coffee 需要给
              430 人的美国 / 英国员工队伍做福利管理，而不组建内部福利团队。Employ Borderless 和 SoftwareConnect 也独立指向同一方向：Rippling
              最适合有多个运营系统、更重扩张需求或中型市场复杂度的组织，而不是最小的「只有基础 HR」买家。
