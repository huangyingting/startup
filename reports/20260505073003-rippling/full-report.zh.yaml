      - number: '4.2'
        title: 公开牵引、单位经济代理指标和成本结构信号
        blocks:
          - type: paragraph
            body: >-
              公开牵引标记足以证明规模，但不足以承保效率。2025 年，多家媒体报道 $16.8B 融资，以及约 $570M 年化收入。SiliconANGLE 引用此前 2023 年超过 $350M 的
              ARR，并称增长仍远高于 30%；Sacra 后来估计 2025 年退出时收入为 $850M，2026 年 3 月年化为 $1B，另有 99.5% PEO 留存率和超过 10 条产品线 ARR 已超过
              $1M。合在一起，这些披露支持的是高增长、多产品扩张叙事，而不是停滞的薪资处理商。Rippling 的创业公司页面还声称实施周期为 1–3 周，并免费运行第一次薪资，这说明销售转化可以不背负传统 HCM
              套件常见的数月部署负担。


              利润率故事没那么确定。官方 EOR、费用、账单支付、支出和设备管理页面显示，产品里包含有意义的服务交付工作：本地合规专家、薪资运营、设备开通与回收、100+
              个国家的报销，以及跨支付轨道的账单支付编排。这些功能可以加深客户价值并支撑更高 ACV，但也意味着纯 SaaS 基准会漏掉劳动力、支付和物流成本。为界定品类，留存文件集使用公开薪资 / HCM 可比公司：ADP
              报告 2024 财年收入增长 7%，研发支出近 $1.3B；Paychex 报告经营利润率 41.2%、现金加投资 $1.6B，并有管理解决方案和 PEO
              两个不同收入池。这些文件说明，该品类规模化后可以高度产生现金。即便如此，Rippling 自身组合看起来比这些成熟同业更偏服务重，因此在拿到私有毛利率、CAC 和回本周期数据前，公开可比公司只能作为上限。
