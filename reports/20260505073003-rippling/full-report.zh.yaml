      - number: '2.4'
        title: 增长驱动、采用约束和估值相关性
        blocks:
          - type: paragraph
            body: >-
              留存来源里反复出现几项耐久驱动。HCM 和薪资研究者把云采用、分析、AI 驱动自动化、分布式工作和合规复杂度上升视为结构性需求支撑。Rippling
              自己的全球薪资页面进一步强化了这个故事：本地实体复杂度、多国运营和碎片化系统，都是软件可以压缩进一个工作流的问题。Strategic 的 MDM 研究又加了一层：BYOD、Zero Trust
              和合规驱动的设备治理，为能够搭在员工生命周期事件上的 IT 控制创造真实需求。但刹车也同样清楚。切换成本真实存在，因为传统薪资和 HR
              环境积累了自定义字段、工时系统、报告绕路和安全审查，使替换变难。公开评论来源还突出价格不透明，尤其是 EOR；而公开附加采用率和 ACV 数据缺失，让外部 ROI
              建模很粗。竞争压力不小，因为薪资仍由在位厂商主导；Apps Run The World 的 2024 年薪资数据集中，前十大供应商占有 60.4% 市场。最后，Deel
              诉讼本身不是一个投资逻辑，但它是信任逆风，可能拉长受监管或合规敏感买家的尽调。估值上，正确姿态是把 Rippling 承保为跨职能扩张故事，承认其真实多模块顺风，但也要因外壳式 TAM
              数学、切换摩擦，以及细分经济性未披露缺口打折。
