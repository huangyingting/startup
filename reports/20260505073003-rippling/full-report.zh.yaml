  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 假设
      - 估值 / 回报逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 乐观
        - 收入年化已约 $1.0B，30%+ 增长延续，留存保持顶尖，诉讼可控，也没有惩罚性优先权压力。
        - 可支撑区间约 $17B-$22B；当前标记价可以成立，但上行仍取决于干净尽调和持续复合增长。
        - 执行仍必须跑赢上市公司倍数压缩。
        - 需要尽调确认乐观的分析师估计和干净的治理结论。
      - - 基准
        - 年化收入在 $750M 至 $950M 之间，增长放缓但仍健康，盈利仍是未来里程碑。
        - 可支撑区间约 $10B-$15B；当前标记价显得偏满，更适合观察而不是买入。
        - 如果 IPO 窗口继续关闭，容错空间有限。
        - 最符合公开证据喜忧参半、私人指标缺失的现状。
      - - 悲观
        - 经确认收入仍更接近 2025 运行率锚点，增长降至高二十区间以下，或诉讼 / 结构化条款推高折现率。
        - 可支撑区间约 $6B-$9B；下行空间很大，因为上市可比公司无法保护当前入场价。
        - 降轮风险、流动性延迟，以及员工 / 早期投资者预期受压。
        - 由疲弱尽调或不利的法律和市场进展触发。
    notes: 区间刻意拉宽，因为公开证据不包含经审计利润率、股权结构条款或管理层指引。
    claimRefs:
      - CV011
      - CV012
      - CV014
      - CV033
