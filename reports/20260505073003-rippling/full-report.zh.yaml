  - id: TE003
    title: 技术 / 运营架构表
    columns:
      - 层 / 流程 / 组件
      - 角色
      - 依赖
      - 风险
    rows:
      - - 统一员工 + 公司数据模型
        - 作为整个套件的人、公司、群组、员工、地点和自定义对象记录事实源
        - 依赖完整的 HR / 管理数据采集和权限卫生
        - 公开文档展示对象族，但没有低层服务拆分或区域数据拓扑
      - - 权限、政策和 Supergroups
        - 把属性转成 Rippling 及连接应用中的动态访问控制、治理和审批
        - 依赖 IAM 套件和准确的员工属性
        - 公开材料看不到误配置和例外处理
      - - 工作流层：Workflow Studio / App Studio / Solutions
        - 用同一套数据和权限自动化内部流程与自定义应用
        - 依赖共享数据模型、工作流逻辑，有些场景还依赖前线部署工程师
        - 复杂工作流的客户采用和维护负担未公开
      - - REST API
        - 程序化读写接口，使用 bearer 认证、分页和版本控制，面向合作伙伴或内部集成
        - 依赖 token / 权限范围，以及开发者门户中的合作伙伴治理
        - 公开文档提到速率限制，但没有披露具体上限
      - - Webhooks + 定时同步
        - 事件驱动变更向外推送，同时合作伙伴应用至少保持每日全量同步
        - 依赖合作伙伴基础设施、webhook 监听器和 token 刷新处理
        - 除约 5 分钟延迟说明外，重试语义和延迟保证未公开
      - - App Shop 合作伙伴层
        - 控制第三方应用的上架创建、能力、审核、测试和生产部署
        - 依赖 Rippling 审批流程和客户对权限范围的同意
        - 审核时间、拒绝率和生产故障率未公开
      - - 与 Microsoft AD / Entra 的混合身份集成
        - 把 HR 事件映射到本地 AD 账户创建、更新、禁用和 Entra 生命周期工作流
        - 依赖 Microsoft 预配组件和混合目录配置
        - 非 Microsoft 身份栈没有保留到同等公开深度
      - - 信任、状态和保障层
        - 提供审计、认证、AWS / 多可用区托管声明、渗透测试 / 子处理方文档和状态透明度
        - 依赖内部安全运营和第三方审计
        - 公开保障仍未给出完整 SLA 条款和详细事后复盘
    notes: 由于 Rippling 是私营公司，公开架构更像应用运营模型视图，不是低层基础设施蓝图。
