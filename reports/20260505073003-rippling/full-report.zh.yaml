  - id: TV004
    title: 可比估值表
    columns:
      - 可比公司
      - 指标
      - 倍数 / 估值 / 状态
      - 参考意义
      - 局限
    rows:
      - - Paychex
        - EV/Revenue；成熟薪资 + PEO 龙头
        - 6.5x EV/Revenue；约 800k 客户和约 2.5M 工作场所员工
        - 粘性合规工作流和外包收入需要参照成熟公司时，Paychex 是最接近的薪资 / PEO 样本。
        - 成熟度和盈利能力远高于 Rippling；增长画像低得多。
      - - Workday
        - EV/Revenue；企业 HCM 平台
        - 3.3x EV/Revenue（企业价值 / 收入）
        - 可为薪资之外的长期平台野心提供参考。
        - 企业买家基底和规模与 Rippling 当前组合差异很大。
      - - Paylocity
        - EV/Revenue；中端市场薪资 + HCM
        - 3.7x EV/Revenue；Multiples.vc 资料中披露 >41k 客户和 2025 财年收入 >$1.5B
        - 可作为薪资驱动扩张的中端市场 SaaS 可比公司。
        - 仍是上市、更成熟、平台更窄的公司，增长假设更低。
      - - Paycom
        - EV/Revenue；薪资 + HCM 软件
        - 2.9x EV/Revenue（企业价值 / 收入）
        - 显示高质量但走向成熟的 HCM 软件在公开市场可能交易在哪个位置。
        - 无法体现 Rippling 的 IT 和支出邻近业务。
      - - Rippling（隐含）
        - 估值 / 年化收入
        - $16.8B 标记价意味着基于 $570M 约 29x，或基于 $1.0B 约 16.8x
        - 框定投资者愿意为私募增长、业务广度和可选性买单的溢价。
        - 高度依赖私人指标和未经审计的分析师估计。
    notes: 选取的上市参考是保留来源中最相关的薪资 / HCM 锚点，但并未穷尽所有上市、私营或 M&A 类比。
    enumerationScope:
      coverage: partial
      basis: >-
        This table intentionally focuses on the most decision-useful public payroll and HCM anchors plus Rippling's
        implied multiple, rather than every HR-tech name shown in the market-data source.
