      - - 投资逻辑
        - 多产品 HR + IT + 支出平台、>20k 客户、披露的 PEO 留存很强，且仍能获得优质私募资本。
        - 经审计的收入质量、模块附加购买和利润率证明达到或高于乐观区间，足以把 Rippling 推成可跟踪的优质溢价资产。
      - - 反向逻辑
        - 当前价格依赖私募市场标记价、询价式定价，以及缺失的利润率 / 股权结构数据；相比便宜得多的上市可比公司，未解决诉讼仍是压力。
        - 如果尽调显示 PEO 之外留存更弱、增长更慢、结构化优先权压顶，或法律敞口扩大，推荐应转向回避。
    notes: null
