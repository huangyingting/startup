      - number: '5.4'
        title: 成熟度和路线图：Rippling 正把平台向身份、自定义应用、AI 和合规外扩
        blocks:
          - type: paragraph
            body: >-
              Rippling 的发布节奏显示，产品组织仍在围绕同一核心平台拓宽，而不是把不相干收购叠到静态 HCM 底座上。2024
              年末发布集新增了员工数分析、自动生成工时表、追溯薪资自动化、加权评审分数、Microsoft Active Directory 同步、设备信任控制、IT 管理工作区、远程设备物流、零接触部署、新 EOR
              覆盖、本地全球薪资国家、Bill Pay 和字段级权限。2025 年 1 月发布则用新的 Workflow Studio、按角色委托权限、通过 ABM 支持的零接触注册订购 iPad、更多 EOR 国家，以及与
              Lyft 打通的差旅 / 支出工作流，进一步加深平台自动化。到 2026 年，路线图已明显越过经典 HCM 宽度，进入更高阶的平台变现：Rippling Solutions
              在客户数据和权限之上提供工程师构建的自定义应用和自动化；Rippling AI 引入公司感知的报告，以及跨 HR、IT 和 Finance 的分阶段动作；Automated Compliance 则把 SOC 2
              证据收集和整改带入同一个系统。Merge 和 Finch 的合作伙伴评论强化了同一投资逻辑：获批开发者可以通过 App Shop 访问 Rippling 数据，并把外部应用映射进 Rippling
              受治理的身份和工作流模型。剩下的尽调问题不是 Rippling 有没有发货，因为它显然在发货；问题是客户是否足够广泛采用这些新层，从而支撑耐久的多模块扩张，而公开记录仍不给出这个数据点。
