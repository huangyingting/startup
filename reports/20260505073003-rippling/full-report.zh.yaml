      - number: '7.3'
        title: 依赖、客户摩擦和财务模型风险可能传导到增长与估值
        blocks:
          - type: paragraph
            body: >-
              Rippling 的产品宽度既创造护城河，也带来集中风险。公司称 EOR 通过各国关联方、合作伙伴和当地律师运行；工资和支付则依赖受监管实体、欺诈控制、外部供应商和 AWS
              基础设施。因此，依赖风险不是一张云账单，而是分布在本地雇佣伙伴、身份集成、浏览器、支付合规流程和第三方服务中；这些环节都可能挡住登录或拖慢发薪。面向客户的证据也指向同一方向。公开评论来源没有推翻 Rippling
              强劲的整体评分，但反复暴露任务关键痛点：工资错误、支持慢、模块叠加后定价不透明、集成同步问题、移动端或易用性摩擦。产品卖点是一体化控制平面，这些投诉正会推高流失或扩张阻力。财务上，Reuters 报道
              Rippling 2025 年 5 月仍未盈利且没有具体 IPO 计划；TechCrunch 则把公司与私营规模下更大的执行足迹联系起来。这不说明 Rippling
              脆弱，但说明投资人在承销的是一个庞大复杂的平台，它仍依赖私募资本灵活性、快速执行，以及客户为了整合继续容忍复杂性的意愿。
