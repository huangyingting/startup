      - number: '1.4'
        title: 规模信号、合规强度和披露边界
        blocks:
          - type: paragraph
            body: >-
              Rippling 当前公开规模证据在客户数、产品宽度和合规姿态上最强，在精确员工数和收入上最弱。Reuters 称，截至 2025 年 5 月，公司服务超过 20,000 名客户；公司自有页面则通过超过 20
              个产品和 600 多个集成，支撑其广泛产品宽度。员工数方向上很大，但披露不干净：TechCrunch 在 2025 年 5 月报道超过 4,000 名员工，Y Combinator 目录页仍列 2,500
              人，Kleiner Perkins 早前则称超过 2,000 人。收入同样噪声很大：Reuters 报道 ARR 远高于 $100 million，TechCrunch 引用消息源称年化收入约 $570
              million，Sacra 则估计到 2026 年 3 月年化收入为 $1.0 billion。治理和信任信号记录更好。Rippling 公开描述了薪资和支付的 AML、制裁筛查和牌照控制；安全页面提到年度
              SOC 审计，以及 CSA STAR、ISO 27001、ISO 27018 和 ISO 42001 认证，并配有信任中心和公开状态页。
