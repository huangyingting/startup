  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型、定价姿态和变现宽度
        blocks:
          - type: paragraph
            body: >-
              Rippling 的公开材料描述的是平台优先的收入模型，而不是单一薪资 SKU。官方定价页把潜在客户导入个性化报价流程，平台目录则显示
              HR、薪资、IT、财务和全球雇佣产品都围绕同一套记录系统销售。留存材料里最清楚的官方标价锚点，是全球劳动力页面的「每用户每月 $8
              起」信息，但即便如此，它也只是底价，不是实际合同价值。第三方定价指南方向一致：People Managing People 重申每用户每月 $8 的入口点和基于报价的附加模块；OutSail 估算典型核心 HR
              套餐为 $21–29 PEPM，IT 模块另加 $5–20 PEPM；FinancesOnline
              也把该套件描述为基于报价、模块化部署。结果是一种有意保持灵活、由销售主导的定价姿态，可以支撑增购，但让实际折扣和每名员工净收入保持不透明。


              更重要的财务结论是变现宽度。官方 Rippling 页面和 2025 年 5 月融资公告显示，公司销售覆盖薪资、福利、SSO、身份、设备、账单支付、卡、费用和名义雇主工作流。Sacra
              更进一步，把收入不仅归因于订阅，还归因于外汇点差、即时工资转账和卡交换费。这很重要，因为它意味着每条客户记录上有多个变现向量：以薪资或 HR 切入，叠加 IT
              和财务自动化，再随着员工基础扩大，叠加全球雇佣或支付流。尽调视角下，这个模型在扩张潜力上有吸引力，但公开证据仍只能区分标价和外部估算，不能区分按模块、地域或队列计算的实际变现。
