  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义和模块图：Rippling 卖的是劳动力运营平台，不是单一薪资 SKU
        blocks:
          - type: paragraph
            body: >-
              Rippling 自己的产品目录把公司产品定义说得异常明确：业务组织成 HCM、Finance、Payroll、Global、IT 和 Platform
              几个套件，并且都被描述为在同一共享系统上运行时更强的产品。核心信息不只是「HR 软件」。Rippling
              认为，买家是在选择业务运行所依托的运营基础设施；这个平台要替代入职、薪资、绩效、设备、卡和审批中的重复工具、交接和手工工作。平台页和产品页也支撑这一叙事，反复把权限、工作流自动化、分析、政策、集成和 App
              Studio 连接到同一数据模型。实践中，产品地图看起来有八个具备商业相关性的层：核心平台控制；HCM 和劳动力管理；薪资和全球薪资；IT 身份 / 设备运营；财务和支出；全球雇佣服务；AI
              和自定义应用层；以及面向合作伙伴和内部构建者的开发者 / App Shop 界面。宽度真实，公开证据也充分。取舍在于，Rippling
              仍不公开附加采用率、部署足迹或按模块划分的客户渗透率，因此投资人可以验证范围和发版速度，却无法验证每条产品线的精确成熟度组合。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE047
              - CE048
      - number: '5.2'
        title: 运营模型：共享数据、政策、工作流和开发者界面连接 HR、IT、财务和全球运营
        blocks:
          - type: paragraph
            body: >-
              最强的公开技术证据不是底层基础设施图，而是 Rippling 开发者和产品文档里呈现出的运营模型。共同模式是：以人员、公司、群组和工作地点数据为记录系统层；以权限、政策和 Supergroups
              为控制层；执行层则横跨工作流、应用列表、API、webhook、身份、设备和财务动作。REST API 文档描述了基于资源的 JSON 端点、bearer
              认证、游标分页、版本化发布，以及一个从部门、团队延伸到自定义对象、entitlements、workers 和工作地点的广泛对象目录。合作伙伴文档让这个模型更具体：应用列表存在于 Rippling App
              Shop，需要客户同意 scopes，默认必须支持 SSO、用户管理、webhook 监听器，以及至少每日一次的全量同步。这意味着 Rippling
              把集成当作受治理的生命周期产品，而不是松散的一次性连接器。Microsoft Entra / on-prem Active Directory 发布，是这个运营模型公开层面最清楚的落地案例：HRIS
              事件会转成自动化入职-调岗-离职 身份动作，下游访问和属性变更由 Rippling 驱动。这是一个差异化架构故事，但留存公开材料仍主要停留在应用 / 工作流层；精确速率限制
              上限、重试语义和更底层服务拓扑仍未披露。
