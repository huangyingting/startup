      - number: '2.2'
        title: 测算视角：相邻外壳很大，但没有干净的 Rippling 专属 SAM
        blocks:
          - type: paragraph
            body: >-
              留存证据支持多种市场测算视角，但这些是外壳，不是嵌套的 TAM-SAM-SOM 堆栈。MarketsandMarkets 把全球 HCM 规模列为 2024 年 USD 27.5 billion，并在 2029
              年增至 USD 41.3 billion；Apps Run The World 对 HCM 应用的口径明显更高，2024 年为 USD 58.7 billion，2029 年为 USD 81.1
              billion。这个差距不是四舍五入误差，而是说明不同发布方采用了不同的收入纳入口径和品类边界。薪资专项视角更窄，也更直接相关。Apps Run The World 把 2024 年薪资软件规模定为 USD
              8.4 billion；Strategic Market Research 把 2024 年云薪资规模定为 USD 9.8 billion，并围绕合规、跨境扩张以及与 HCM 和 ERP
              系统集成来定义该品类。Rippling 的 IT 邻接也重要，但只应作为辅助视角。Strategic 测算 2024 年 MDM 规模为 USD 8.6 billion，Grand View 测算 2023
              年移动身份规模为 USD 3.25 billion，这有助于解释为什么原生设备和身份控制能拓宽预算入口。这些数字都不能隔离出统一 HR、薪资、财务和 IT 工作流的精确支出池。诚实结论是：Rippling
              参与了多个增长市场，但没有内部细分数据时，公开证据无法支撑精确的 Rippling 专属 SAM 或 SOM。
