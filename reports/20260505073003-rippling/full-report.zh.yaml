      - number: '1.3'
        title: 融资形成、投资人基础和员工流动性信号
        blocks:
          - type: paragraph
            body: >-
              Rippling 的公开融资记录已经呈现出清晰的后期增长画像。官方 Series B 公告披露了一轮 $145 million 融资，由 Founders Fund 领投，重磅财团还包括
              Greenoaks、Coatue、Bedrock、Kleiner Perkins、Initialized 和 Y Combinator。到 2023 年 9 月，IDA Ireland 将 Rippling 最新
              Series E 描述为一轮 $500 million 融资，估值 $11.25 billion。随后 TechCrunch 称 2024 年 Series F 融资 $200 million，估值 $13.4
              billion，并配套 $590 million 要约收购；Reuters 和 TechCrunch 则报道 2025 年 5 月 Series G 融资 $450 million，估值 $16.8
              billion，另有新的 $200 million 员工流动性要约。2025 年这一轮还浮现了更广的投资人组合，包括 Y Combinator、Elad Gil、Sands Capital、GIC、Goldman
              Sachs Growth 和 Baillie Gifford。这些反复出现的要约结构很重要，因为它们说明 Rippling 正在利用私有市场机制提供流动性，而不承诺 IPO 时间表。
