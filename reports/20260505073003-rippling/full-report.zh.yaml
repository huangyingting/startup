      - number: '8.4'
        title: 下行触发条件、退出准备度和尚未完成的承销事项
        blocks:
          - type: paragraph
            body: >-
              主要下行触发条件是可量化的。第一，如果公司证明可信盈利路径前，增长跌到 20%
              高段以下，当前溢价会迅速向公开软件区间压缩。第二，如果尽调显示毛利率、附加销售经济性或净留存明显弱于公开平台故事暗示的水平，普通股入场逻辑会立刻恶化。第三，与 Deel
              的法律战已经足够宽，即便结果不致命，也可能拖慢 IPO
              或战略出售，增加治理审查，并迫使围绕准备金、保险和管理层行为做更多尽调。第四，当前公开来源没有描述股权结构表中的优先权堆叠、结构化融资保护，或员工流动性计划的真实经济性，因此普通股投资人还无法判断，名义估值是否也是真正的风险调整后入场价。这些缺口可以在尽调中修复；但在修复前，正确姿态是继续研究，并严格守住入场纪律。估值若降到
              $10B-$15B 附近，或者审计证明收入已接近乐观区间且毛利率有韧性、诉讼敞口受控，可能会把建议推向观察。没有这些，公开证据支持谨慎。
