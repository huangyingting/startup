  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: Rippling 的主要风险沿少数通道传导；诉讼和合规负担、平台事件、依赖故障，最终都会进入客户信任、利润率、融资需求和估值支撑。
    data:
      nodes:
        - id: legal
          label: Deel 诉讼 / 法律负担
          detail: 进行中的索赔、反诉和声誉外溢可能抬高支出，并分散管理层精力。
          tone: warning
        - id: reg
          label: 牌照 / 隐私义务
          detail: 薪资、支付、PEO、EOR 和员工数据规则抬高运营开销，也增加采购摩擦。
          tone: warning
        - id: ops
          label: 薪资和身份事件
          detail: 对截止时间敏感的故障，或牵涉隐私的路由错误，会打中客户关键工作流。
          tone: warning
        - id: deps
          label: 合作伙伴 / 平台依赖
          detail: AWS、Google Workspace、本地 EOR 合作伙伴和支付轨道，都会影响可用性和合规执行。
          tone: warning
        - id: trust
          label: 客户信任和续约
          detail: 只有薪资、隐私和支持让买方觉得可靠，买方才会加深使用。
          tone: warning
        - id: margin
          label: 利润率和补救成本
          detail: 法律支出、支持负载、补偿额度和合规人员配置都可能挤压经济性。
          tone: negative
        - id: financing
          label: 融资需求
          detail: 如果增长继续优先于盈利，冲击可能提高对外部资本的依赖。
          tone: negative
        - id: valuation
          label: 估值支撑
          detail: 更高的剩余风险会削弱下行支撑，并拉伸私募市场假设。
          tone: negative
      edges:
        - from: legal
          to: trust
        - from: legal
          to: margin
        - from: reg
          to: trust
        - from: reg
          to: margin
        - from: ops
          to: trust
        - from: ops
