      - number: '8.3'
        title: 可比参照与价格纪律
        blocks:
          - type: paragraph
            body: >-
              可比参照并不会让 Rippling 不能投；但它让当前估值很难称得上有吸引力。公开市场参照便宜得多：Multiples.vc 显示 Paychex 约 6.5x EV/Revenue、Workday 约
              3.3x、Paylocity 约 3.7x、Paycom 约 2.9x。这些可比并不完美，因为相较多数成熟薪资厂商，Rippling 更早期、增长更快，也横跨 HR、IT、工资和支出。Finro 2025
              年的框架解释了溢价为何存在：工资和 HRIS 业务往往比许多其他 HR 科技类别拿到更强倍数，因为它们同时有经常性收入、高留存和工作流关键性。但 Finro
              也强调，公开市场比私募投资人更激进地给盈利预期定价。这是本案的核心纪律点。如果 Rippling 年化收入已接近 $1
              billion，这个溢价或许可以用稀缺品类领导者、蓝筹股东背书和持续员工流动性来辩护。如果更耐久的锚点仍接近据报道的 $570 million
              运行率，投资人就在支付一个远超公开先例的倍数，并押注私营执行能在下一次定价事件前填平差距。公开证据尚未证明这一步。
