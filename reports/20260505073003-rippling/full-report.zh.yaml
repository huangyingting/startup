      - number: '7.2'
        title: 运营可靠性和隐私状态很关键，工资和身份故障会打中客户命门
        blocks:
          - type: paragraph
            body: >-
              Rippling 公开的缓释体系强于许多私营 HR 科技同行，但运营证据说明，买方仍要保守承销残余风险。好的一面是，Rippling 公开列举年度 SOC 审计、CSA STAR、ISO 27001、ISO
              27018、ISO
              42001、渗透测试、漏洞赏金、供应商安全审查、背景调查和自动离职控制。系统触及工资、福利、设备、身份和支出，这些控制有分量。问题在于，公司自己的状态信息流也显示，登录、工资、搜索、报表、通知、工时考勤和设备信任等界面反复出现事故。尽调中特别相关的有两起：2026
              年 5 月工资可见性问题迫使公司延长审批截止时间；2026 年 4 月 Google Workspace 元数据删除短暂破坏 SSO，并把部分消息路由到个人邮箱。2025 年 11
              月归因于第三方提供商的登录中断，以及 Chrome-142 Device Trust 中断，都强化了同一点：Rippling
              架构足够宽，看似狭窄的故障也可能传导到身份、通信、工资时点和合规敏感工作流。一个管理工资和员工数据的产品，即便事故很快解决，也不等于客户关键性消失。
