companyProfile:
  summary: Rippling is a private compound-software company that uses a single employee and company data model to connect HR, payroll, benefits, identity, device management, spend controls, and global employment workflows. The product has real category breadth and increasingly looks like an operating system for workforce operations rather than a point HRIS vendor. Public evidence supports strong product execution, customer proof, and continuing investor support, but it still leaves too many underwriting questions unanswered for a high-conviction price call at the latest valuation.
  foundedDate: '2016-01-01'
  founders:
    - name: Parker Conrad
      role: Co-founder, CEO
      background: Former Zenefits chief executive who rebuilt the workforce stack around a unified data model and automation layer.
      claimRefs: []
    - name: Prasanna Sankar
      role: Co-founder
      background: Engineering co-founder who helped shape the product and systems architecture in Rippling's early years.
      claimRefs: []
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California, USA
  productSummary: Rippling sells modular software across HR, payroll, benefits, identity, app and device management, spend, bill pay, corporate cards, and global employment. Its core differentiator is that all modules share the same underlying workforce graph, letting one system drive permissions, workflows, compliance logic, and reporting across functions that most buyers still manage with separate vendors.
  customerFocus: SMB, mid-market, and increasingly enterprise employers that want to consolidate workforce operations, compliance, and employee lifecycle management.
  businessModel: Modular subscription software with add-on monetization across product families, plus service-heavy revenue in products such as PEO, EOR, payroll operations, and device logistics.
  stage: Series G private / late-stage compound software
  fundingStatus: $450M Series G in May 2025 at a $16.8B valuation, with roughly $1.85B of publicly attributed cumulative capital and a concurrent employee-liquidity tender.
  disclosureProfile: private-undisclosed
  claimRefs: []
