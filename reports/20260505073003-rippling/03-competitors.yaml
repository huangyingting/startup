  - id: T303
    title: Pricing / packaging comparison
    columns:
      - Competitor
      - Price / unit / contract model
      - Included capabilities
      - Discount or unknowns
      - Implication
    rows:
      - - Rippling
        - Core platform required; most products per employee per month; some monthly base fees
        - >-
          Payroll, expenses, benefits, device management, and global modules can be bought separately on top of the
          platform
        - Exact headline list prices mostly not published
        - Flexible bundle, but price discovery is harder than with specialists
      - - Deel
        - $599 EOR; $49 contractor; device tiers from $18 / $14 / $12 per device per month
        - Global employment, contractors, payroll, and IT/device operations
        - Enterprise tier and some global payroll terms vary by quote
        - Very transparent direct rival for global employment buyers
      - - Gusto
        - $40 per month + $6 per person on official compare page
        - SMB payroll-led package with HR and contractor support
        - Upper tiers and broader international packaging are less fully normalized in reviewed source
        - Strong low-end pricing anchor for SMB payroll deals
      - - Justworks
        - $599 per employee per month for EOR; bundled payroll/PEO pricing plus add-ons
        - Payroll, benefits, compliance, PEO support, global EOR
        - Total employer cost still varies by benefits and plan choices
        - Substitute for buyers who want outsourced compliance more than a broad control plane
      - - Remote
        - $599 EOR; $29 payroll; $29 contractor management
        - Global employment, payroll, contractors, HR core, and some device management
        - Some implementation or recurring payroll delivery fees depend on setup
        - Transparent international alternative that makes Rippling’s quote flow look less open
      - - Papaya Global
        - Unknown (official pricing page blocked during fetch)
        - Global payroll / EOR specialist position presumed, but current package details unverified
        - Current list pricing could not be independently retained
        - Keep in landscape, but do not overstate pricing certainty
      - - Ramp
        - Free tier; Plus $15 per user per month + platform fee; Enterprise custom
        - Cards, expense, AP, travel, treasury, AI reporting, procurement add-on
        - Enterprise and add-on economics still quote-based
        - Clear entry-price pressure on Rippling Finance
      - - Brex
        - Essentials/Premium self-serve tiers plus custom-priced enterprise / Smart Card plans
        - Global cards, bill pay, travel, procurement, multi-entity controls
        - Precise enterprise pricing is custom
        - Strong adjacent spend rival, especially for global-card buyers
      - - Airbase by Paylocity
        - Contact sales after integration into Paylocity for Finance
        - Spend management integrated with Paylocity HR/finance/IT
        - Standalone pre-acquisition pricing not retained
        - M&A-based entrant that can bundle spend into HR accounts
      - - ADP
        - Custom quote
        - Payroll, benefits, PEO/outsourcing, compliance, AI, app marketplace
        - Public list pricing not retained for the reviewed enterprise surfaces
        - Incumbent breadth is real, but pricing discovery favors specialist challengers
      - - Workday
        - Custom quote
        - HCM, payroll, finance, spend management, AI/agents
        - Public list pricing not retained
        - Enterprise suite buyer can consolidate, but with slower quote-led procurement
    notes: Where public pricing is absent or blocked, the row is explicitly marked unknown rather than estimated.
