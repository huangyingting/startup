  - id: SEC302
    title: Capability, pricing, and distribution comparison
    body: >-
      Rippling’s most important commercial trade-off is breadth versus transparency. On breadth, very few challengers
      match its public message of one system spanning HR, payroll, IT devices/access, finance spend controls, and global
      products. Deel and Remote come closest on employment, compliance, contractor, and device-adjacent workflows, but
      neither reviewed surface showed equivalent finance depth. On the other side, Ramp and Brex are sharper finance
      specialists with clearer entry packaging, while ADP, Workday, and Paylocity bring major installed bases, channel
      relationships, and broader enterprise buying power. Pricing transparency cuts against Rippling. Its pricing page
      says products are bought alongside a required core platform and are usually priced per employee per month, but it
      does not publish a simple headline grid comparable to Deel, Remote, Justworks, Ramp, or even Gusto’s SMB-oriented
      payroll entry pricing. That matters because buyers can cross-shop direct module costs more easily against the
      specialists than against Rippling’s bundled quote flow. Distribution also favors incumbents: ADP cites more than
      1,000,000 clients in 140+ countries, Workday says it surpassed 10,000 customers, and Paylocity combines 41,650
      clients with 5,500+ partners.
    claimRefs:
      - C116
