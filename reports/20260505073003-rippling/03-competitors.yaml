  evidenceGaps:
    - type: access-blocked
      severity: material
      topic: Papaya Global current public product and pricing verification
      missingEvidence: Readable official Papaya Global product and pricing pages with current package details and terms.
      whyItMatters: >-
        Papaya remains a recognizable global payroll competitor, so inability to verify official packaging limits
        precise price ranking against Deel, Remote, and Rippling.
      diligencePath: >-
        Refetch from an alternate region or browser profile, or request Papaya sales collateral / current pricing deck
        directly during diligence.
      relatedQuestionRefs:
        - RQ315
      relatedTableRefs:
        - T303
    - type: private-evidence-only
      severity: material
      topic: Realized enterprise discount curves across Rippling, ADP, Workday, and Brex
      missingEvidence: >-
        Executed contract data or buyer-side procurement benchmarks showing real seat, module, or bundle discounts
        versus headline packaging.
      whyItMatters: >-
        Quote-led pricing can change competitive outcomes materially, especially when suite consolidation is used to
        beat specialist list pricing.
      diligencePath: >-
        Request anonymized contract samples, procurement benchmark data, or at least sales-approved discount bands by
        company size and module bundle.
      relatedQuestionRefs:
        - RQ324
      relatedTableRefs:
        - T303
    - type: missing-source
      severity: material
      topic: Public win-loss and multi-homing data for Rippling by module
      missingEvidence: >-
        A public dataset or management disclosure showing how often Rippling displaces Deel, ADP, Remote, Ramp, or
        Workday at module level.
      whyItMatters: >-
        Without win-loss and multi-homing data, moat durability must be inferred from packaging, scale, and buyer-review
        evidence rather than hard conversion outcomes.
      diligencePath: >-
        Request win-loss dashboards split by HR, payroll, IT, finance, and global products plus post-sale attach and
        multi-homing rates.
      relatedQuestionRefs:
        - RQ325
      relatedTableRefs:
        - T304
