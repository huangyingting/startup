  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - Moat claim
      - Threat
      - Severity
      - Evidence-backed rationale
      - Mitigation / diligence ask
    rows:
      - - Unified employee-data control plane
        - Deel, Paylocity, and Workday keep broadening adjacent modules
        - High
        - >-
          Rippling’s integration across HR, payroll, IT, and finance is differentiated, but several rivals now market
          multi-product suites rather than point tools
        - Ask for module attach rates and the share of customers using HR + IT + finance together
      - - Global employment moat
        - Deel and Remote publish transparent global list pricing and strong compliance messaging
        - High
        - >-
          Both vendors directly overlap on EOR, payroll, contractors, and compliance, making global employment the most
          crowded direct front
        - Review competitive win-loss data by EOR and global payroll segment
      - - Finance expansion moat
        - Ramp, Brex, and Airbase by Paylocity attack finance modules with specialist packaging or bundle leverage
        - High
        - Ramp and Brex have clearer public finance packaging, while Airbase can now be sold inside Paylocity accounts
        - Segment finance win rates versus standalone spend tools
      - - Incumbent displacement thesis
        - ADP, Workday, and Paylocity retain installed-base and partner/channel leverage
        - High
        - ADP cites 1,000,000+ clients, Workday 10,000+ customers, and Paylocity 5,500+ partners
        - Request migration proof and enterprise replacement case studies by incumbent
      - - Pricing flexibility supports expansion
        - Opaque pricing can slow evaluation and make specialists appear cheaper
        - Medium
        - Rippling does not publish a clean headline grid like Deel, Remote, Ramp, or Gusto
        - Request realized discount curves and proof that bundle ROI offsets quote friction
      - - Fast product iteration protects moat
        - Imitation and intelligence disputes suggest features can be copied quickly
        - Medium
        - >-
          Semafor reported allegations that competitor intelligence was used to help build copycat products,
          highlighting boundary blur in this market
        - Review product lead times, defensible data/workflow advantages, and legal exposure
    notes: >-
      The dominant risks are bundling and modular substitution, not lack of credible demand for Rippling’s broader
      suite.
