callouts:
  - calloutType: strength
    title: The differentiator is the shared control plane, not any single module
    body: >-
      Rippling’s most defensible public story is that permissions, policies, workflows, app listings, devices, payroll,
      and spend all sit on one employee-centered operating layer. That makes the company meaningfully different from
      vendors that integrate point products after the fact.
    claimRefs:
      - C207
      - C208
      - C209
      - C210
      - C233
      - C237
      - C249
  - calloutType: risk
    title: Public technical transparency is strongest at the workflow layer, weaker at the infrastructure layer
    body: >-
      The retained sources are rich on API/App Shop mechanics, certifications, and release shipping, but they still do
      not expose numeric API ceilings, low-level service topology, detailed public postmortems, or module attach by
      suite. That limits how precisely an investor can separate durable architecture from marketing breadth.
    claimRefs:
      - C226
      - C230
      - C232
      - C252
      - C253
      - C254
  - calloutType: insight
    title: The roadmap is pushing Rippling from system-of-record software toward a programmable operating layer
    body: >-
      Workflow Studio, Rippling AI, Solutions, Automated Compliance, and the Microsoft hybrid identity launch all point
      in the same direction: Rippling wants the customer’s people data, permissions, and workflows to become the control
      plane for adjacent admin and security work, not just HR back office recordkeeping.
    claimRefs:
      - C237
      - C243
      - C244
      - C249
      - C250
      - C251
