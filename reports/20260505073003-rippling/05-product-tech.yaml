  - id: S503
    title: >-
      Integrations, reliability, and trust: public evidence supports strong control-plane maturity, but not full
      technical transparency
    body: >-
      Rippling’s public trust and integration evidence is strong enough to underwrite a mature control plane. Official
      pages say the company operates under GDPR and CCPA and carries SOC 1 Type II, SOC 2 Type II, SOC 3, CSA STAR Level
      2, and ISO 27001, ISO 27018, and ISO 42001 certifications; the trust center separately lists additional 2026
      artifacts such as a penetration-test document and subprocessor inventory. The security page also discloses
      US-based AWS hosting across multiple availability zones, resilient cloud configuration, and automated offboarding
      controls that disable departing employees’ devices, apps, and access through Rippling IAM/MDM. Operational
      transparency is better than many private SaaS peers because Rippling runs a public status page with
      component-level uptime and subscription options over email, SMS, Slack, webhook, Atom, and RSS. As fetched on
      2026-05-05, that page showed 99.97% uptime for the main app and 100.0% uptime across Identity & App Management,
      SSO, Platform API, Third-party Integrations, and Device & Inventory Management over the prior 90 days, while also
      showing a resolved May 1, 2026 incident labeled “US Payroll Runs Not Visible.” That is useful evidence, but it
      still falls short of full diligence-grade transparency: the page does not expose formal public SLAs or detailed
      postmortems, and the API docs state that rate limits exist without giving numeric ceilings in the retained
      extracts.
    claimRefs:
      - C226
      - C227
      - C228
      - C229
      - C230
