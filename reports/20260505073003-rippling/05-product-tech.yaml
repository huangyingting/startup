  - id: S504
    title: 'Maturity and roadmap: Rippling is extending the platform outward into identity, custom apps, AI, and compliance'
    body: >-
      Rippling’s release cadence shows a product organization still broadening the same core platform rather than
      layering disconnected acquisitions onto a static HCM base. The late-2024 release set added headcount analytics,
      auto-generated timesheets, retro-pay automation, weighted review scores, Microsoft Active Directory sync,
      device-trust controls, an IT management workspace, remote device logistics, zero-touch deployment, new EOR
      coverage, native global payroll countries, Bill Pay, and field-level permissions. The January 2025 release then
      deepened platform automation with the new Workflow Studio, delegated permissions by role, iPad ordering via
      ABM-backed zero-touch enrollment, additional EOR countries, and linked travel/spend workflows with Lyft. By 2026,
      the roadmap had clearly moved beyond classic HCM breadth into higher-order platform monetization: Rippling
      Solutions offered engineer-built custom apps and automations on customer data and permissions; Rippling AI
      introduced company-aware reporting and staged actions across HR, IT, and Finance; and Automated Compliance brought
      evidence collection and remediation for SOC 2 into the same system. Partner commentary from Merge and Finch
      reinforces the same thesis: approved developers can access Rippling data through the App Shop and map external
      apps into Rippling’s governed identity and workflow model. The remaining diligence question is not whether
      Rippling is shipping, because it clearly is. It is whether customers adopt these newer layers widely enough to
      sustain durable multi-module expansion, a datapoint the public record still does not provide.
    claimRefs:
