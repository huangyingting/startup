  - id: T502
    title: Workflow / use-case table
    columns:
      - User job
      - Current workflow
      - Rippling solution
      - Measurable / public benefit
      - Limitation
    rows:
      - - Onboard / offboard employees
        - HR, IT, payroll, and finance handoffs across separate systems
        - >-
          One system can onboard hires, run payroll, manage performance, issue devices, and control access/cards without
          switching systems
        - Official platform page explicitly positions cross-functional automation on one platform
        - Public sources do not quantify time saved or error-rate reduction
      - - Install and run partner applications
        - Custom connector work, manual permissions, and inconsistent app setup
        - >-
          App Shop listings standardize install, scopes, SSO, user management, webhooks, and testing for approved
          partners
        - Partner docs specify default SSO/user-management support plus daily sync and webhook expectations
        - Requires Rippling approval and the customer IAM package
      - - Run hybrid identity lifecycle
        - Manual AD/Entra provisioning and delayed HR-to-IT communication
        - >-
          Rippling HRIS events can create, update, and disable on-prem AD accounts and flow into Entra ID lifecycle
          workflows
        - Public Microsoft and Rippling docs describe automated joiner-mover-leaver provisioning
        - Public evidence is strongest for Microsoft, not a full cross-vendor directory matrix
      - - Provision and secure devices
        - Manual ordering, shipping, enrollment, and access gating
        - >-
          Rippling device store, remote warehousing/retrieval, Device Trust, and zero-touch deployment tie device
          posture to identity rules
        - >-
          2024/2025 releases show ABM-backed iPad ordering, certificate-backed device trust, and remote device
          operations
        - No public device-fleet SLA, loss-rate, or unit-economics data
      - - Coordinate global hiring and payroll
        - Separate local payroll, EOR, contractor, and HR systems by country
        - Rippling continues expanding EOR and native payroll coverage inside one global workflow stack
        - >-
          Public release notes show 22 new EOR countries in 2024, five more in January 2025, and three new native
          payroll countries
        - Country-level service depth and economics remain opaque
      - - Control spend and travel
        - Standalone expense, AP, travel, and approval tooling
        - Bill Pay, cards, reimbursements, approval routing, and Lyft-linked travel controls sit inside Rippling Spend
        - Release notes show Bill Pay, local Canadian cards, approval-chain customization, and Lyft travel integration
        - Realized ROI and attach by spend module are not public
      - - Build internal or external extensions
        - Spreadsheets, custom scripts, and brittle side tools
        - >-
          Workflow Studio, App Studio, Solutions, REST API, and webhooks let customers and partners automate or build
          around the same data/permissions model
        - >-
          2025/2026 releases show new Workflow Studio, FDE-built Solutions, and public GitHub examples for partner
          development
        - Numeric API limits and adoption of custom-app layers are not public
    notes: >-
      The strongest public evidence is for control-plane workflow unification; cost, deployment effort, and attach-rate
      outcomes still require private diligence.
