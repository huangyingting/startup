    title: Product architecture map
    type: stack
    layout: wide
    summary: >-
      Stack view of the public Rippling operating model: a shared people/company data layer feeds permissions and
      policies, then workflows and apps, then partner/API surfaces, and finally execution modules across HR, payroll,
      IT, finance, global, AI, and compliance.
    data:
      layers:
        - label: System-of-record layer
          detail: >-
            HRIS, payroll, global, company, group, worker, location, and custom-object records anchor Rippling’s
            employee-centric data model.
        - label: Control layer
          detail: >-
            Permissions, policies, Supergroups, approvals, and field-level access rules govern who can see, do, and
            access what.
        - label: Automation / build layer
          detail: >-
            Workflow Studio, App Studio, Rippling Solutions, analytics, and AI act on the same underlying data and
            permissions.
        - label: Integration layer
          detail: >-
            REST API, webhooks, App Shop listings, GitHub examples, and approved partner pathways connect Rippling to
            internal and third-party systems.
        - label: Execution layer
          detail: >-
            HCM, payroll, global, IT identity/device, finance/spend, and compliance workflows execute against one
            platform rather than isolated point tools.
