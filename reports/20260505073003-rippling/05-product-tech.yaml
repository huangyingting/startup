  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Numeric API rate limits and webhook retry guarantees
      missingEvidence: >-
        Exact request ceilings, burst limits, backoff rules, retry counts, and webhook redelivery SLAs were not exposed
        in the retained public API pages.
      whyItMatters: >-
        Integration scale, failure handling, and partner operational burden depend on concrete API and event-delivery
        limits, not just the existence of an API surface.
      diligencePath: >-
        Request the current public or partner-facing rate-limit policy, webhook retry documentation, and sandbox test
        guidance from Rippling developer relations.
      relatedQuestionRefs:
        - RQ014
        - RQ026
    - type: missing-source
      severity: material
      topic: Low-level infrastructure topology and regional data residency architecture
      missingEvidence: >-
        Public materials disclosed AWS multi-AZ hosting and security controls, but not service boundaries,
        control-plane/data-plane separation, or regional data-residency implementation details.
      whyItMatters: >-
        Technical diligence on availability, isolation, disaster recovery, and enterprise privacy commitments requires
        more than a high-level cloud-hosting statement.
      diligencePath: >-
        Ask for the security architecture whitepaper, regional hosting map, DR/RTO-RPO summary, and a technical briefing
        on core service boundaries.
      relatedQuestionRefs:
        - RQ001
        - RQ014
        - RQ026
    - type: private-evidence-only
      severity: material
      topic: Module attach rates, adoption by suite, and realized deployment effort
      missingEvidence: >-
        No retained public source disclosed customer penetration, retention, or deployment effort by HCM, payroll, IT,
        finance, global, AI, or compliance module.
      whyItMatters: >-
        The investment case depends on whether Rippling’s breadth translates into repeatable multi-module expansion
        rather than a long product menu with uneven adoption.
      diligencePath: >-
        Request module attach by customer size and cohort, implementation timelines by module set, and admin-effort
        benchmarks from recent enterprise and mid-market deployments.
      relatedQuestionRefs:
        - RQ001
        - RQ026
    - type: missing-source
      severity: minor
      topic: Detailed public postmortems and SLA commitments
      missingEvidence: >-
        The public status page exposes a 90-day uptime window and incident labels but not detailed postmortems or a
        public SLA term sheet in the retained set.
      whyItMatters: >-
        Enterprise diligence needs to understand not only whether incidents happened, but how quickly they were resolved
        and what contractual uptime obligations exist.
      diligencePath: >-
        Request uptime SLA language, incident-response metrics, and recent incident review or postmortem examples for
        payroll, API, and identity outages.
      relatedQuestionRefs:
        - RQ017
        - RQ018
