    title: Market sizing lens — concentric opportunity shells
    type: pyramid
    layout: standard
    summary: >-
      The most defensible public view is a set of concentric shells: broad HCM, narrower payroll core, and a smaller
      identity-control adjacency that helps explain Rippling’s differentiation but not a clean SAM.
    data:
      nodes:
        - level: 1
          label: Broad HCM shell
          value: 27.5
          unit: USD B (2024)
          detail: MarketsandMarkets HCM market estimate for the broader workforce-suite category.
        - level: 2
          label: Direct payroll core
          value: 8.4
          unit: USD B (2024)
          detail: Apps Run The World payroll software estimate for processing, tax, compliance, and self-service payroll.
        - level: 3
          label: Identity-control adjacency
          value: 3.25
          unit: USD B (2023)
          detail: >-
            Grand View mobile identity management estimate, relevant where Rippling’s IT modules pull budget through
            employee workflows.
        - level: 4
          label: Rippling-specific SAM or SOM
          value: null
          unit: USD B — not publicly isolated
          detail: >-
            No retained source publishes a clean Rippling-specific SAM or SOM for unified HR, payroll, finance, and IT
            control-plane spend.
    approximationNotes: >-
      The layers are not strictly nested and should not be summed. They are concentric public shells used to bound
      Rippling’s opportunity while explicitly showing that the final company-specific SAM or SOM is unavailable.
