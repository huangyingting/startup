  - id: TM005
    title: Sizing / adoption diligence gaps table
    columns:
      - Gap
      - Current public state
      - Why it matters
      - Exact diligence path
    rows:
      - - Rippling-specific SAM or SOM
        - No retained public source isolates a unified HR-payroll-IT-finance spend pool that maps cleanly to Rippling.
        - Without a company-specific SAM, penetration assumptions can become arbitrary.
        - Request management segmentation by customer size, module family, geography, and initial buying function.
      - - Attach rates and ACV by buyer type
        - >-
          Public sources do not show how often payroll accounts add IT, EOR, or finance modules or what blended contract
          values look like.
        - Expansion math is central to Rippling valuation and payback analysis.
        - Request attach order, attach-rate cohorts, ACV distribution, and win-loss data by initial module.
      - - Direct payroll versus EOR economics
        - >-
          Public review sources discuss geography and pricing opacity, but not country-level margin or direct-payroll
          versus EOR revenue mix.
        - Cross-border growth quality depends on margin and operational intensity, not just country count.
        - Request revenue mix, gross margin, and service cost by domestic payroll, global payroll, and EOR.
      - - Category overlap between HCM and IT adjacencies
        - >-
          Public HCM, payroll, MDM, and mobile-identity estimates describe overlapping shells rather than a single
          nested funnel.
        - Overlapping shells can lead to double counting and inflated TAM claims.
        - Request internal TAM framework that reconciles payroll, global, IT, and finance modules without overlap.
    notes: >-
      These are the market-model inputs most likely to move valuation confidence but least likely to be recoverable from
      public sources alone.
    claimRefs:
      - CM046
      - CM047
      - CM051
      - CM052
