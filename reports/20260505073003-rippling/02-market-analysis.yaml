  evidenceGaps:
    - type: conflicting-data
      severity: material
      topic: HCM market-shell dispersion
      missingEvidence: >-
        Public HCM estimates from major publishers differ materially and do not disclose a one-to-one reconciliation of
        scope or revenue inclusions.
      whyItMatters: Overstating or averaging incompatible market shells can inflate Rippling TAM and distort valuation multiples.
      diligencePath: >-
        Ask management for the internal market taxonomy that reconciles payroll, HCM, global, finance, and IT modules
        without double counting.
      relatedQuestionRefs:
        - QM005
      relatedTableRefs:
        - TM002
    - type: missing-source
      severity: material
      topic: Rippling-specific SAM or SOM
      missingEvidence: >-
        No retained public source isolates a Rippling-specific SAM or SOM for unified HR-payroll-IT-finance
        control-plane spend.
      whyItMatters: Without a company-specific SAM, penetration and market-share assumptions stay highly judgmental.
      diligencePath: Request segmented TAM and SAM views by module family, customer size, geography, and initial buyer function.
      relatedQuestionRefs:
        - QM023
      relatedTableRefs:
        - TM002
        - TM005
    - type: private-evidence-only
      severity: material
      topic: Module attach rates and ACV by buyer type
      missingEvidence: >-
        Public sources do not provide attach-order, attach-rate, or blended ACV data across HR, finance, and IT buying
        motions.
      whyItMatters: >-
        Rippling valuation depends on whether payroll land deals reliably expand into device, identity, finance, or
        global products.
      diligencePath: >-
        Request cohort data showing first product sold, subsequent module expansion, ACV ranges, and retention by buyer
        segment.
      relatedQuestionRefs:
        - QM024
      relatedTableRefs:
        - TM003
        - TM005
    - type: private-evidence-only
      severity: material
      topic: Direct payroll versus EOR economics
      missingEvidence: >-
        Public review sources discuss country coverage and pricing opacity but do not disclose country-level revenue
        mix, margin, or service cost by global product line.
      whyItMatters: Global growth quality depends on margin and service intensity, not just country count.
      diligencePath: >-
        Request revenue, gross margin, and service-delivery cost split across domestic payroll, global payroll,
        contractor pay, and EOR.
      relatedQuestionRefs:
        - QM025
      relatedTableRefs:
        - TM002
        - TM005
