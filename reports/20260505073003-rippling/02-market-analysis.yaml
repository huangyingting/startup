    rows:
      - - Broad HCM suite
        - >-
          Core HR, workforce management, analytics, recruiting, onboarding, payroll, benefits, and employee data
          workflows
        - ERP, staffing services, and unrelated back-office software
        - CHRO, CFO, HR operations, payroll leaders
        - Useful outer shell for Rippling because it competes with suite vendors
      - - Payroll and compliance core
        - >-
          Payroll processing, tax filing, multi-jurisdiction payroll, employee self-service payouts, time-linked payroll
          accuracy
        - General accounting software without payroll execution
        - Payroll leader with finance control and HR participation
        - Closest directly monetized core for Rippling
      - - Global payroll / EOR motion
        - Cross-border payroll, contractor payments, entity-light hiring, local compliance, multi-currency operations
        - Local legal entity formation services and generic outsourcing labor
        - People operations, CFO, COO, global employment owners
        - Key expansion wedge once customers hire abroad
      - - Identity and device administration adjacency
        - SSO, MFA, lifecycle management, device access, MDM, endpoint policy, offboarding wipe and access removal
        - Standalone SOC tooling and broad security operations platforms
        - IT, security, CIO budget
        - Important because Rippling ties these controls to employee lifecycle events
      - - Finance and spend adjacency
        - Expense tracking, reimbursements, corporate cards, payroll-linked spend visibility, GL sync
        - Core AP automation and full ERP accounting suites
        - CFO, controller, finance operations
        - Relevant cross-sell but not the whole spend-management market
      - - Status-quo substitute stack
        - ADP or Paychex or Workday or Dayforce plus separate Okta or Jamf plus manual spreadsheets and local process
        - A fictional one-vendor baseline that buyers do not actually use today
        - Multiple budget owners; finance and HR plus IT review
        - Most realistic comparison set for churn, win-loss, and migration modeling
    notes: >-
      Included and excluded spend are anchored on products that touch the employee record or lifecycle. Adjacent IT and
      finance categories matter only when they flow through workforce workflows.
