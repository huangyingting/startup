  - id: section-2
    title: 'Sizing lenses: large adjacent shells, but no clean Rippling-specific SAM'
    body: >-
      The retained evidence supports multiple sizing lenses, but they are shells, not a nested TAM-SAM-SOM stack.
      MarketsandMarkets puts global HCM at USD 27.5 billion in 2024 growing to USD 41.3 billion by 2029, while Apps Run
      The World places HCM applications materially higher at USD 58.7 billion in 2024 and USD 81.1 billion by 2029. That
      difference is not a rounding error; it shows that publishers are using different revenue inclusions and category
      edges. Payroll-specific lenses are narrower and more directly relevant. Apps Run The World sizes payroll software
      at USD 8.4 billion in 2024, while Strategic Market Research sizes cloud payroll at USD 9.8 billion in 2024 and
      frames the category around compliance, cross-border scaling, and integration with HCM and ERP systems. Rippling’s
      IT adjacency also matters, but only as a supporting lens. Strategic sizes MDM at USD 8.6 billion in 2024 and Grand
      View sizes mobile identity at USD 3.25 billion in 2023, which helps explain why native device and identity
      controls can expand budget access. None of these figures isolate the exact spend pool for unified HR, payroll,
      finance, and IT workflows. The honest conclusion is that Rippling participates in several growing markets, but
      public evidence does not support a precise Rippling-specific SAM or SOM without internal segment data.
    claimRefs:
      - CM016
      - CM018
      - CM019
      - CM021
      - CM024
      - CM026
      - CM046
      - CM047
      - CM051
      - CM055
      - CM056
  - id: section-3
    title: Buyer, user, payer, and adoption path
    body: >-
      The buyer map is cross-functional from the start. Workday’s buyer guide explicitly tells evaluators to build a
      project team from finance, payroll, HR, and IT, and then to evaluate vendors through the offices of the CFO, CHRO,
      and CIO. That matches Rippling’s actual workflow surface. Domestic payroll or HRIS pain usually starts with people
      operations, HR admins, payroll leaders, or controllers who want a cleaner employee system of record, fewer manual
      reconciliations, and better compliance. Finance becomes the economic validator because payroll accuracy, tax
      remittance, reimbursement controls, and general-ledger sync all hit financial reporting and internal controls. IT
      becomes a formal buyer or co-buyer when the account wants identity, device management, access control, or secure
      offboarding. Review sources suggest Rippling is particularly resonant with growing teams in roughly the 50-200
      employee range and with US-based companies that want one place to run payroll, benefits, compliance, device
      management, and global hiring. In practice, that means the user set spans HR admins, payroll specialists, finance
      operators, IT admins, managers, and employees, while the payer can move from CHRO-led budgets toward CFO or COO
      budgets as the scope widens beyond core payroll.
    claimRefs:
      - CM029
      - CM030
      - CM031
      - CM032
      - CM034
      - CM036
      - CM037
      - CM042
      - CM048
  - id: section-4
    title: Growth drivers, adoption constraints, and valuation relevance
    body: >-
      Several durable drivers show up across retained sources. HCM and payroll researchers point to cloud adoption,
      analytics, AI-enabled automation, distributed work, and rising compliance complexity as structural demand
      supports. Rippling’s own global payroll page strengthens that story by presenting local-entity complexity,
      multi-country operations, and fragmented systems as problems that software can compress into one workflow.
      Strategic’s MDM research adds another layer: BYOD, Zero Trust, and compliance-driven device governance create real
      demand for IT controls that can piggyback on employee lifecycle events. But the brakes are just as visible.
      Switching cost is real because legacy payroll and HR environments accumulate custom fields, time systems,
      reporting workarounds, and security reviews that make rip-and-replace hard. Public review sources also highlight
      pricing opacity, especially around EOR, while the lack of public attach-rate and ACV data makes outside-in ROI
      modeling rough. Competitive pressure is non-trivial because payroll remains incumbent-heavy, with the top ten
      vendors holding 60.4% of the market in Apps Run The World’s 2024 payroll dataset. Finally, the Deel litigation is
      not a thesis by itself, but it is a trust headwind that can lengthen diligence for regulated or
      compliance-sensitive buyers. For valuation, the right stance is to underwrite Rippling as a cross-functional
      expansion story with real multi-module tailwinds, but to discount for shell-based TAM math, switching friction,
      and unresolved disclosure gaps on segment economics.
    claimRefs:
      - CM017
      - CM023
      - CM025
      - CM028
      - CM038
      - CM039
      - CM041
