callouts:
  - calloutType: insight
    title: Underwrite Rippling against control-plane budgets, not the entire HCM or cybersecurity universe
    body: >-
      The public evidence supports several adjacent market shells, but none justifies adding HCM, payroll, MDM, and
      identity TAMs together. Rippling’s differentiator is pulling HR, payroll, finance, and IT budgets through one
      employee record.
    claimRefs:
      - CM001
      - CM016
      - CM018
      - CM024
      - CM046
      - CM051
  - calloutType: strength
    title: Cross-functional expansion is the strategic upside
    body: >-
      Rippling’s strongest public differentiation is not payroll alone; it is the ability to turn employee lifecycle
      events into payroll, access, device, and spend actions inside the same system.
    claimRefs:
