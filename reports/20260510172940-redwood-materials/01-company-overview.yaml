- id: redwood-energy-and-pivot
  title: Redwood Energy, Strategic Pivot, and Key Risks
  body: 'Redwood''s most significant 2025-2026 development is the launch of Redwood
    Energy, a division dedicated to repurposing retired EV battery packs as second-life
    grid-scale energy storage systems. Rather than fully recycling all incoming batteries
    to raw materials, Redwood Energy evaluates packs using its proprietary Pack Manager
    technology, selects those with sufficient remaining capacity, and deploys them
    as modular, low-cost energy storage units at industrial sites and AI data centers.
    The company announced a partnership with Rivian to deploy Redwood Energy storage
    systems at Rivian''s Normal, Illinois manufacturing campus, and has disclosed
    a partnership with Crusoe Energy—an AI infrastructure company—for data center
    power. A March 2026 report from ESS-News documented a US data center operator
    adopting second-life EV batteries for on-site power, indicating nascent commercial
    adoption. The Redwood Energy announcement described a target of "fast, low-cost
    storage to power the age of AI and a changing grid."

    However, Redwood''s April 2026 restructuring—eliminating approximately 10% of
    its workforce and resulting in the COO''s departure—raises near-term execution
    concerns. Multiple news sources, including TechCrunch, Electrive, and American
    Bazaar Online, reported the restructuring explicitly as a cost rationalization
    to redirect resources toward the energy storage pivot. Critics note that Redwood
    faces execution risk in simultaneously managing a capital-intensive recycling
    and materials manufacturing business with a nascent energy storage startup. Competition
    from lower-cost Chinese battery recyclers, policy uncertainty around the Inflation
    Reduction Act''s EV tax credits, and the broader EV adoption slowdown in 2024-2025
    all create headwinds. Li-Cycle''s 2023 pause of its Rochester Hub construction
    (due to cost overruns) serves as a cautionary data point for the sector''s capital
    intensity.

    The most critical near-term question is whether Redwood''s energy storage pivot
    can generate meaningful revenue before the EV recycling business reaches profitability
    on its own—a dual-path funding challenge that the $425M Series E is intended to
    bridge.

    '
