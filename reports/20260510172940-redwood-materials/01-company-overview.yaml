- id: founders-and-leadership
  title: Founders, Leadership, and Governance
  body: 'JB Straubel (born December 20, 1975 in Des Moines, Iowa) holds both a BS
    and MS in Energy Engineering from Stanford University and is one of the most recognized
    figures in the global electric vehicle industry. At Tesla, he was employee number
    five and a co-founder, overseeing battery systems, powertrain architecture, and
    the Gigafactory concept across a 15-year tenure. He transitioned from an executive
    role to an advisory position at Tesla in July 2019 and was subsequently elected
    to Tesla''s board of directors in 2023. Straubel effectively began Redwood Materials
    in 2017 while still at Tesla—positioning the company to solve end-of-life battery
    management before widespread adoption of EVs made the problem acute. His background
    provides exceptional founder-market fit: the battery supply chain problem Redwood
    addresses is precisely what he spent 15 years trying to build at Tesla.

    The current Redwood Materials leadership team, as publicly disclosed, includes
    Colin Campbell as Chief Technology Officer (a Tesla battery veteran who joined
    in August 2023), Cal Lankton as Chief Commercial Officer, Mandy Clark as Chief
    People Officer, Alexis Georgeson as VP of External Affairs, and Alma Chao as General
    Counsel. Redwood opened a 15,000-square-foot R&D center in San Francisco''s Design
    District in April 2025 to attract Bay Area engineering and materials science talent.
    An April 2026 restructuring resulted in approximately 10% of the workforce being
    laid off and the departure of the company''s COO—signaling that Redwood is pivoting
    resources toward the energy storage business and rationalizing its EV recycling
    cost structure.

    As a private company, Redwood does not publicly disclose its board composition
    or investor governance rights. Strategic investors—Eclipse Ventures, NVIDIA''s
    NVentures, Goldman Sachs, and others—are likely represented at board or observer
    level. No material litigation, regulatory violations, or governance disputes have
    been publicly reported as of the runDate.

    '
