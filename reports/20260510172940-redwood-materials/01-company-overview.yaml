      subsidiary since its 2024 acquisition—volumes processed, revenue contributed,
      integration status.
    whyItMatters: International expansion adds complexity to an already capital-intensive
      business; performance of the European subsidiary is unknown.
    diligencePath: Review German commercial registry (Handelsregister) for Redux Recycling
      entity filings; request subsidiary financials in due diligence.
    relatedQuestionRefs:
    - QO024
