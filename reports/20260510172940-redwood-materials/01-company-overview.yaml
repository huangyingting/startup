company:
  name: Redwood Materials
chapter:
  number: 1
  title: Company Overview
  summary: 'Redwood Materials, founded in 2017 by former Tesla CTO JB Straubel, is
    the dominant US battery recycling and critical-materials company. Headquartered
    in McCarran, Nevada, it collects end-of-life lithium-ion batteries, recovers nickel,
    cobalt, lithium, and copper at 95%+ efficiency, and manufactures cathode active
    material (CAM) and anode copper foil (ACF) that feed back into new battery cells.
    The company raised a $350M Series E initial tranche in October 2025—with a final
    close at $425M in January 2026—at a reported ~$6B post-money valuation, led by
    Eclipse Ventures and NVIDIA''s NVentures. Including a $2B DoE loan conditional
    commitment (2023) and prior equity rounds totaling ~$2.3B, Redwood has secured
    more financing than any other US battery recycler. A 2025 strategic expansion
    into stationary energy storage (Redwood Energy) for AI data centers is promising
    but nascent. An April 2026 restructuring involving ~10% workforce reduction and
    COO departure introduces execution risk.

    '
sections:
- id: identity-and-mission
  title: Identity, Mission, and Products
  body: 'Redwood Materials, Inc. is a privately held American advanced materials and
    energy technology company headquartered in McCarran, Nevada (within the Reno-Sparks
    metro area). The company was founded in 2017 by Jeffrey Brian "JB" Straubel, who
    co-founded Tesla and served as its Chief Technology Officer for approximately
    15 years before departing in July 2019. Straubel''s founding insight was that
    the most cost-effective and environmentally resilient path to a domestic battery
    supply chain was not to mine new critical minerals, but to recover them from the
    growing inventory of end-of-life lithium-ion battery packs already deployed in
    EVs and consumer electronics.

    Redwood''s mission is to create a fully circular battery economy. Its four-stage
    model encompasses: (1) collection and logistics of end-of-life batteries sourced
    from automotive OEMs, electronics manufacturers, and consumer recycling programs;
    (2) hydrometallurgical and pyrometallurgical recycling to extract nickel, cobalt,
    lithium, copper, and manganese; (3) refining and manufacturing of cathode active
    material (CAM) and anode copper foil (ACF)—the two most value-dense battery components—at
    commercial scale; and (4) since 2025, deployment of second-life EV battery packs
    as grid-scale energy storage systems for data centers and industrial sites via
    the Redwood Energy division. Redwood claims to recover more than 95% of critical
    minerals and to process approximately 20 GWh of battery capacity annually, representing
    roughly 90% of all lithium-ion batteries and battery materials recycled in North
    America as of 2025.

    '
