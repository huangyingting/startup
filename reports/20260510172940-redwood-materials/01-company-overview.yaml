  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: financial opacity
    missingEvidence: Actual revenue, gross margin, cash position, and burn rate for
      Redwood Materials as of 2025-2026.
    whyItMatters: Without financial data it is impossible to assess commercial traction,
      unit economics, or path to profitability for this capital-intensive business.
    diligencePath: Request audited financials or management accounts in formal due
      diligence. Revenue can be partially triangulated from known CAM/ACF supply contract
      volumes if OEM partners disclose purchasing.
    relatedQuestionRefs:
    - QO007
  - type: missing-source
    severity: material
    topic: DoE loan status
    missingEvidence: Current draw status of the $2B DoE conditional loan—how much
      has been drawn, what milestones triggered each draw, and what conditions remain
      outstanding.
    whyItMatters: The DoE loan is the single largest financing commitment to Redwood;
      its availability directly affects production scale plans and capital adequacy.
    diligencePath: Request DoE LPO loan agreement and draw schedule. Check DoE LPO
      public disclosures for milestone certification updates.
    relatedQuestionRefs:
    - QO006
  - type: missing-source
    severity: material
    topic: supply agreement terms
    missingEvidence: Specific pricing, volume, and duration terms of Redwood's OEM
      supply agreements for CAM and ACF with Ford, Toyota, Panasonic, and others.
    whyItMatters: Supply agreement terms determine revenue visibility and gross margin;
      without this, the claimed revenue of ~$200M cannot be verified or projected
      forward.
    diligencePath: Request supply agreement summaries in formal due diligence; cross-reference
      with OEM earnings call disclosures that may reference domestic material sourcing.
    relatedQuestionRefs:
    - QO009
  - type: missing-source
    severity: material
    topic: governance
    missingEvidence: Board composition, governance structure, and investor rights
      (pro-rata, anti-dilution, board seats) for Redwood Materials as of 2026.
    whyItMatters: Board composition and governance rights affect strategic direction,
      founder control, and alignment between Redwood and its OEM partners who are
      also investors.
    diligencePath: Review Delaware corporate filings. Request cap table, shareholder
      agreement, and voting rights schedule in formal due diligence.
    relatedQuestionRefs:
    - QO018
  - type: enumeration-incomplete
    severity: minor
    topic: leadership
    missingEvidence: 'The identity and background of the departed COO, and whether
      a replacement has been named. Also: full VP-level and below roster.'
    whyItMatters: A vacant COO role during a strategic pivot to energy storage creates
      a meaningful organizational gap; succession planning is unclear.
    diligencePath: LinkedIn search; monitor company press releases; request org chart
      in formal due diligence.
    relatedTableRefs:
    - TO002
    relatedQuestionRefs:
    - QO005
