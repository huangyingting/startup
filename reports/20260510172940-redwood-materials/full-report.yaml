      - number: '3.2'
        title: Direct Competitor and Incumbent Profiles
        blocks:
          - type: paragraph
            body: >-
              Li-Cycle Holdings was the leading North American pure-play lithium-ion battery recycler before pausing
              construction on its Rochester Hub hydrometallurgical processing facility in 2023 and filing for Chapter 11
              bankruptcy protection in 2024. At its peak, Li-Cycle processed approximately 5-6 GWh equivalent of battery
              materials annually using a spoke-hub model: shredding at distributed spokes feeding a central hub for
              hydrometallurgical processing. The Rochester Hub failure, attributed to construction cost overruns and
              insufficient feedstock, validates the capital and timing risk of battery recycling at scale. Ascend
              Elements (formerly Battery Resources) focused on producing recycled cathode active material and filed for
              Chapter 11 in April 2026. Its model most closely resembled Redwood's integrated recycling-to-CAM approach.
              Cirba Solutions, formed from the merger of Retriev Technologies and Battery Solutions, is the most
              relevant surviving North American alternative. It processes multiple battery chemistries including Li-ion,
              NiMH, and lead-acid but does not produce CAM, making it a recycling-only competitor. Umicore is the
              dominant global incumbent, operating large-scale pyrometallurgical recycling in Belgium and Korea,
              producing CAM at scale, and holding long-term supply agreements with major battery manufacturers.
              Umicore's revenue exceeded €4 billion in recent years. CATL, the world's largest battery manufacturer,
              operates BRUNP Recycling as its battery recycling affiliate in China and is expanding recycling capacity.
              CATL's integrated model across battery manufacturing and recycling in China is the most formidable
              potential long-run competitor, but faces regulatory and geopolitical barriers to North American market
              access.
