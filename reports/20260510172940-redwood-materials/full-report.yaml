      - number: '5.5'
        title: Technology Scale-Up Risks and Chemistry Transition
        blocks:
          - type: paragraph
            body: >-
              Redwood's primary near-term technology risk is scale-up from demonstrated pilot volumes to the 100 GWh per
              year target capacity at the Nevada campus. The hydrometallurgical process involves dozens of
              interdependent unit operations (crushing, leaching, solvent extraction, crystallization, sintering) where
              process performance at commercial scale often differs from pilot results due to heat management, residence
              time, reagent mixing, and equipment reliability. Li-Cycle's Rochester Hub—which used a similar hydromet
              approach—encountered precisely these scale-up challenges, with construction cost overruns attributed in
              part to process engineering complications at commercial scale. Redwood's most significant medium-term
              technology risk is chemistry transition: if the battery cell chemistry mix shifts rapidly toward LFP
              (lithium iron phosphate), which contains no cobalt or nickel, the economic model for battery recycling
              changes fundamentally. LFP black mass contains lithium and iron but none of the high-value cobalt and
              nickel that make NMC recycling economically attractive. Industry analysts project LFP's share of global EV
              battery installations could reach 40-50% by 2030, which would reduce the average recoverable value per kWh
              of battery recycled. Redwood has acknowledged this risk and has invested in process chemistry for LFP
              recycling, but the unit economics of LFP recycling remain significantly below NMC recycling.
