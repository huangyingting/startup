chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Products
        blocks:
          - type: paragraph
            body: >
              Redwood Materials, Inc. is a privately held American advanced materials and energy technology company
              headquartered in McCarran, Nevada (within the Reno-Sparks metro area). The company was founded in 2017 by
              Jeffrey Brian "JB" Straubel, who co-founded Tesla and served as its Chief Technology Officer for
              approximately 15 years before departing in July 2019. Straubel's founding insight was that the most
              cost-effective and environmentally resilient path to a domestic battery supply chain was not to mine new
              critical minerals, but to recover them from the growing inventory of end-of-life lithium-ion battery packs
              already deployed in EVs and consumer electronics.

              Redwood's mission is to create a fully circular battery economy. Its four-stage model encompasses: (1)
              collection and logistics of end-of-life batteries sourced from automotive OEMs, electronics manufacturers,
              and consumer recycling programs; (2) hydrometallurgical and pyrometallurgical recycling to extract nickel,
              cobalt, lithium, copper, and manganese; (3) refining and manufacturing of cathode active material (CAM)
              and anode copper foil (ACF)—the two most value-dense battery components—at commercial scale; and (4) since
              2025, deployment of second-life EV battery packs as grid-scale energy storage systems for data centers and
              industrial sites via the Redwood Energy division. Redwood claims to recover more than 95% of critical
              minerals and to process approximately 20 GWh of battery capacity annually, representing roughly 90% of all
              lithium-ion batteries and battery materials recycled in North America as of 2025.
