      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Unmatched Founder-Market Fit and First-Mover Scale Advantage
            body: >
              JB Straubel spent 15 years building Tesla's battery supply chain and Gigafactory—making him arguably the
              world's most operationally experienced person in EV battery materials. Redwood's first-mover position
              means it processes approximately 90% of all lithium-ion batteries and battery materials recycled in North
              America. This creates a structural flywheel: more batteries collected → more material to process → more
              supply agreements with OEMs → more end-of-life batteries returned. No other US recycler has approached
              Redwood's collection volumes or manufacturing scale. The $2B DoE loan commitment—the largest US government
              financing for any battery recycler—signals institutional validation of the domestic supply chain thesis
              and provides a structural competitive moat against under-capitalized rivals.
            calloutType: strength
            claimRefs:
              - CO001
              - CO007
              - CO008
              - CO016
          - type: callout
            title: April 2026 Restructuring and COO Departure Elevate Execution Risk
            body: >
              The April 2026 workforce reduction of approximately 10% and the concurrent COO departure occurred at a
              pivotal moment: Redwood is simultaneously managing a capital-intensive recycling and materials
              manufacturing business while launching Redwood Energy (stationary storage for data centers). The
              restructuring press coverage from TechCrunch, Electrive, and American Bazaar Online characterized this
              explicitly as a cost rationalization driven by challenges in the EV recycling business, including
              lower-than-expected EV battery return volumes, Chinese cost competition in CAM/ACF markets, and
              uncertainty around US IRA subsidy continuity. Li-Cycle's 2023 pause of its Rochester Hub (due to cost
              overruns on a similar hydrometallurgical facility) offers a cautionary precedent for the capital intensity
              of at-scale battery recycling. The energy storage pivot, while strategically sensible, adds execution
              complexity to an already difficult core business.
            calloutType: risk
            claimRefs:
              - CO031
              - CO032
              - CO033
              - CO035
              - CO036
          - type: callout
            title: Redwood Energy Targets High-Growth AI Data Center Market with Differentiated Low-Cost Supply
            body: >
              Redwood Energy's thesis is compelling: second-life EV battery packs (which retain 70-80% of original
              capacity) can be deployed as grid-scale storage at dramatically lower cost than new battery cells,
              precisely when the AI data center market is creating unprecedented demand for on-site power storage. The
              Rivian manufacturing campus partnership and the Crusoe Energy data center partnership provide initial
              proof-of-concept customer validation. As the EV fleet matures through 2027-2030, the supply of retired
              packs will grow exponentially—creating a proprietary feedstock advantage for Redwood over any competitor
              trying to enter the second-life storage market without the collection infrastructure Redwood has already
              built. The $350M+ Series E was partly framed around this energy storage opportunity, and NVIDIA's
              participation as a strategic investor may reflect interest in Redwood Energy as a future power-supply
              partner for NVIDIA's data center ecosystem.
            calloutType: insight
            claimRefs:
              - CO029
              - CO030
              - CO033
              - CO034
          - type: callout
            title: Financial Health, Profitability Path, and DoE Loan Status Are Opaque
            body: >
              Redwood Materials does not disclose revenue, gross margins, EBITDA, cash position, or burn rate. The DoE
              $2B conditional loan commitment—the company's largest financing instrument—has undisclosed draw
              conditions, and it is unknown whether any portion has been drawn or when it will be. Analysts estimate
              2024 revenue at approximately $200M, but this figure is unverified. The company has not indicated when it
              expects to reach profitability on either its recycling or energy storage business. Investors must treat
              all commercial and financial claims as company-asserted and unverified until independent data, regulatory
              filings, or a future IPO/acquisition provides external validation.
            calloutType: assumption
            claimRefs:
