companyProfile:
  summary: >-
    Redwood Materials is a battery recycling and critical materials company founded in 2017 by JB Straubel, co-founder
    and former CTO of Tesla. The company operates a vertically integrated model: collecting end-of-life lithium-ion
    batteries, processing them through a proprietary hydrometallurgical recycling process, and manufacturing
    battery-grade copper foil (anode) and cathode active materials from the recovered metals. Headquartered in Carson
    City, Nevada, with a major manufacturing campus there and a second facility under development in South Carolina,
    Redwood is building domestic supply chain infrastructure for the EV industry under IRA incentives. The company
    raised a $350M Series E at a $6B valuation in October 2025 (final close $425M in January 2026), bringing total
    funding to approximately $2.3B.
