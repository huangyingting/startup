      - number: '7.4'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >-
              Redwood's most concentrated dependency is Panasonic Energy, which appears to represent the majority of
              current CAM output volume based on the Nevada campus colocation. Any Panasonic volume reduction would
              propagate immediately to Redwood's output utilization and DOE loan milestone compliance. Take-or-pay
              terms, pricing mechanisms, and contract duration are not publicly disclosed; force majeure invocations in
              a demand shortfall could leave Redwood with unutilized production capacity and fixed cost overhang. The
              DOE is a critical financial dependency: the conditional two billion dollar ATVM loan has not been
              confirmed to final close as of the first quarter of 2026. Analysts estimate that approximately thirty
              percent of DOE conditional commitments do not progress to final close or experience material
              restructuring; a DOE restructure at Redwood would force equity bridges at potentially compressed
              valuations, comparable to Li-Cycle's collapse or Northvolt's Chapter 11 filing. Ford Motor Company and
              Amazon serve dual roles as equity investors and feedstock and customer partners, creating governance
              conflicts if business terms need renegotiation. POSCO Future M and EcoPro BM represent a growing
              competitive dependency risk: if OEMs redirect CAM demand to FEOC-compliant Korean joint ventures at lower
              cost, Redwood's addressable market would contract materially. The dependency on Nevada and South Carolina
              regulatory approvals for capacity expansion creates localized permitting risk that compounds capital
              deployment uncertainty.
