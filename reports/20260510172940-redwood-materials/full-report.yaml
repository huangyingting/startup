      - number: '7.3'
        title: Operational and Technology Risk
        blocks:
          - type: paragraph
            body: >-
              The most distinctive operational risk for Redwood is CAM manufacturing yield at gigawatt-hour scale. NMC
              811 cathode material requires purity above 99.95 percent and consistent particle size distribution.
              Recycled precursor CAM introduces compositional variability from varying Ni:Mn:Co ratios in incoming
              feedstock, which must be corrected upstream in the hydrometallurgical refining step. No independent
              third-party validation of Redwood's yield rates or defect rates has been published; all production
              performance claims originate from company communications. ACF manufacturing adds a second operational
              risk: anode copper foil is a thin-margin commodity requiring stringent surface quality; customer
              qualification failures at any OEM partner could delay South Carolina revenue ramp and violate DOE loan
              milestones. Feedstock supply is a growing structural risk: manufacturing scrap rates at battery
              gigafactories have declined from approximately eight to twelve percent in 2020-2021 to three to five
              percent in 2024 as cell manufacturing efficiency improves. End-of-life battery volumes remain limited
              through at least 2027 due to fleet recency. LFP chemistry transition risk is elevated: if LFP share of the
              US battery market exceeds forty percent, Redwood's NMC-centric CAM roadmap would require costly retooling,
              and Redwood has not disclosed an LFP recycling or CAM manufacturing roadmap. RCRA hazardous waste
              regulations apply to battery recyclers; no public violation record has been found for Redwood.
              Cybersecurity risk exists for process control systems at both campuses as battery manufacturing relies
              increasingly on digitally controlled hydromet and cathode synthesis equipment.
            claimRefs:
              - CR012
              - CR013
              - CR014
              - CR015
              - CR016
              - CR017
          - type: table
            tableRef: TR002
            claimRefs:
