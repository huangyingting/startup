  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials operates a dual-sided industrial revenue model with two primary streams: (1) processing
              fees or material credits from OEM and battery manufacturer customers for battery collection and recycling
              services, and (2) cathode active material sales to cell manufacturers who incorporate recycled CAM into
              new battery production. A third emerging stream — second-life battery storage leasing or sale under the
              Redwood Energy brand launched in June 2025 — is early-stage and not yet financially material. Revenue
              recognition for processing services is straightforward: fees are charged per kilogram of material
              processed and recognized as batteries arrive at Redwood facilities. CAM sale revenue is recognized at
              delivery to cell manufacturer customers including Panasonic Energy of North America and Samsung SDI. CEO
              JB Straubel disclosed approximately $200 million in annual revenue for 2024, representing approximately
              $10 per GWh equivalent processed at the claimed 20 GWh processing run rate — though the figure mixes
              processing fee and CAM revenue and the split between streams is not publicly disclosed. Revenue quality is
              constrained by commodity price exposure on both streams: processing fees may be indexed to recovered
              material value, and CAM selling prices track lithium carbonate, cobalt, and nickel spot markets. Lithium
              prices declined approximately 80 percent from 2022 peaks by 2024, compressing revenue per unit processed
              for processors with commodity-linked pricing.
