      - number: '7.5'
        title: Financial, Execution, and People Risk
        blocks:
          - type: paragraph
            body: >-
              Redwood's financial risk profile is dominated by capital intensity. The Nevada campus build-out requires
              multi-billion dollar investment funded primarily by the conditional DOE ATVM loan and Series C through E
              equity. Without public financials, burn rate, cash runway, and working capital position are not
              independently verifiable. Revenue concentration in Panasonic creates top-line fragility; margin
              compression from declining NMC 811 prices, which fell approximately thirty percent from the 2022 peak, and
              falling manufacturing scrap commodity prices compounds unit economics pressure. Without the 45X credit,
              Redwood's cost structure widens versus Korean producers by an estimated eight to fifteen dollars per
              kilowatt-hour based on analyst modeling. Execution risk is elevated by capex scale: comparable projects
              including Northvolt and LG Chem US plants regularly overran budgets by twenty to fifty percent. Key man
              risk is material: CEO JB Straubel has foundational credibility with DOE, Series E investors, and OEM
              partners; departure or incapacity would significantly impair government relations and investor confidence.
              The April 2026 workforce reduction of approximately ten percent and the departure of the COO introduce
              near-term execution risk and raise questions about organizational capacity for the South Carolina ramp.
              Nevada operations require specialized electrochemical and battery processing talent competing directly
              with Tesla and Panasonic in the Reno labor market. As a private company, Redwood cannot easily provide
              investor liquidity, creating eventual pressure for an IPO or strategic sale on a timeline that may not
              optimize for value if macroeconomic or EV market conditions deteriorate.
