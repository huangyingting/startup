  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Framework and Recommendation Summary
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials occupies a structurally important position in the US domestic battery supply chain: it
              is the best-capitalized, most technically advanced, and most customer-validated battery recycler in the
              country, backed by JB Straubel's Tesla-era credibility and three confirmed OEM supply agreements with
              Ford, Panasonic, and Toyota. The $5.5B post-money valuation from the 2023 Series C reflects these
              strategic advantages but also embeds a substantial execution premium. At 12-18x estimated 2025 revenue,
              investors are paying for a 2028-2030 outcome, not a 2025 reality. The investment recommendation is
              CONDITIONAL WATCH. The thesis is real: IRA Section 45X manufacturing credits provide $35/kWh structural
              cost advantage over Chinese imports; the DOE $2B conditional loan, if drawn, would fund SC Phase 2 without
              dilutive equity; and the long-term feedstock supply security from OEM collection agreements anchors the
              business model. The anti-thesis is equally real: the battery recycling sector has produced two major US
              bankruptcies in under 18 months, Li-Cycle's Chapter 11 in October 2024 consuming $1.7B and Ascend
              Elements' April 2026 filing consuming $542M, demonstrating that scale execution in this sector is harder
              and more capital- intensive than business plans project. Redwood's valuation is only justified if DOE loan
              closure, SC campus ramp, and lithium price recovery all occur on schedule. The probability-weighted
              expected value at $5.5B entry ranges from modestly below entry in the base case at 50% probability to
              significantly below entry in the bear case at 30% probability, suggesting the entry price is demanding
              even for a high-conviction investor. Confidence is medium: sources confirm strategic positioning and
              capital structure, but audited financials, DOE loan milestone terms, and supply agreement details are not
              publicly available. Risk rating is high, driven by capital intensity demonstrated by peer failures, DOE
              loan binary dependency, and sustained lithium price headwinds.
            claimRefs:
              - CV001
              - CV007
              - CV008
              - CV012
              - CV015
              - CV016
              - CV021
              - CV022
              - CV023
