      - number: '2.3'
        title: Growth Drivers and Demand Catalysts
        blocks:
          - type: paragraph
            body: >
              Six structural drivers underpin demand for Redwood's integrated offering. First, the Inflation Reduction
              Act (IRA) of 2022 is the single most important US policy catalyst. Section 30D required 40%+ domestic
              critical mineral content rising to 100% by 2028. Section 45X provides Advanced Manufacturing Production
              Credits for US-manufactured cathode and anode materials— directly monetizing Redwood's CAM and ACF output.
              Section 48C extends investment tax credits to advanced energy manufacturing. Although the EV consumer tax
              credit (30D) was terminated September 30, 2025 under the current administration, manufacturing incentives
              (45X, 48C) remain in force.

              Second, EV adoption in the US has created a growing installed base generating recycling feedstock. The IEA
              projects 26M EVs on US roads by 2030, up from ~6.5M through 2023. BloombergNEF estimates ~2M EV battery
              packs will require recycling in the US by 2030, with volume surging after 2027 as the first mass-market EV
              wave reaches end-of-life. Consumer electronics remain an important near-term feedstock bridge—EPA
              estimates 15 billion Li-ion cells are discarded in the US annually.

              Third, China decoupling policy has made supply chain resilience a national security imperative. The US
              currently imports 70%+ of cathode active material and 90%+ of anode materials from China. Fourth, OEM
              battery sustainability mandates have created committed offtake demand. Ford, GM, Toyota, BMW, and
              Panasonic have all made battery circularity commitments and signed supply or take-back agreements with
              Redwood—creating recurring feedstock supply and material demand simultaneously. Fifth, the EU Battery
              Regulation (effective 2027) mandates minimum recycled content (16% cobalt, 6% lithium, 6% nickel by 2031).
              Sixth, the AI data center storage boom is an emerging demand catalyst for Redwood Energy—second-life EV
              packs offer 40–60% cost savings versus new LFP systems on a per-kWh basis.
            claimRefs:
              - CM012
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
          - type: figure
            figureRef: FM001
            claimRefs:
              - CM013
      - number: '2.4'
        title: Adoption Constraints and Market Headwinds
        blocks:
          - type: paragraph
            body: >
              Several structural constraints limit the speed and certainty of Redwood's market capture. Supply scarcity
              before 2028 is the most immediate operational constraint. EV batteries have a typical lifespan of 8–15
              years; the first mass-market EVs sold in 2015–2017 are only now reaching retirement age. BloombergNEF
              estimates that sufficient feedstock for large-scale US recycling operations may not materialize until
              2027–2028. Until then, Redwood must rely on manufacturing scrap and consumer electronics—lower-margin
              feedstock with less consistent chemistry.

              Lithium price volatility has severely compressed recycling economics. Lithium carbonate prices peaked near
              $80,000/MT in late 2022 before collapsing to under $15,000/MT by early 2024—an 80%+ decline. This
              dramatically reduced the value of the recovered lithium stream, which had been a primary margin driver in
              recycling economics. Nickel and cobalt prices also declined. The lower price environment favors virgin
              mining over recycled material on pure cost basis, requiring Redwood to compete on supply security and
              regulatory compliance rather than pure price.

              Capital intensity creates both a barrier to entry and a constraint on Redwood itself. The South Carolina
              campus phase 1 alone required approximately $3.5B in investment. Scaling to full capacity requires the DOE
              ATVM $2B loan to be drawn on schedule, contingent on construction milestones that may face delays given
              the April 2026 restructuring and workforce reduction.

              IRA headwinds, chemistry transition risk, and Chinese competition compound these challenges. The LFP
              chemistry transition is a multi-year threat—LFP contains no cobalt or nickel, dramatically changing the
              recycled material value profile. CATL (via Brunp Recycling) and GEM Co. operate at massive scale with
              lower cost structures. Competitor failures (Li-Cycle, Ascend Elements) demonstrate the capital and
              feedstock risks at pre-commercial scale.
            claimRefs:
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
          - type: figure
            figureRef: FM002
            claimRefs:
              - CM008
      - number: '2.5'
        title: Buyer Segmentation, Budget Ownership, and Adoption Path
        blocks:
          - type: paragraph
            body: >
              Redwood's buyer landscape is segmented into five distinct personas with different budget ownership,
              procurement cycles, and adoption motivations.

              OEM and Tier 1 automotive buyers (Ford, GM, Toyota, BMW, Rivian, Panasonic) are the most strategically
              important. These organizations own two separate buying decisions: battery take-back contracts and material
              supply agreements purchasing Redwood's CAM and ACF for new battery production. Budget ownership sits in
              supply chain and procurement, with sustainability teams holding strong influence. Decision cycles are
              12–24 months for multi-year offtake, with IRA domestic content compliance acting as a forcing function.
              Ford's ACF supply agreement and Panasonic's CAM offtake are the clearest public examples.

              Cell manufacturers (Panasonic, Samsung SDI, LG Energy Solution, SK Innovation) purchase CAM and ACF as
              direct manufacturing inputs. These buyers have long procurement cycles (18–36 months for qualification).
              Their IRA 45X credit eligibility depends partly on sourcing materials from US producers like
              Redwood—creating financial alignment. Consumer electronics brands (Apple, Amazon, Dell) are battery
              take-back participants with ESG reporting obligations. Data center operators represent an emerging segment
              for Redwood Energy; Crusoe Energy's multi-year agreement for second-life battery packs demonstrates
              commercial validation. The DOE and national labs function as policy-driven financing partners providing
              capital at below-market cost.
            claimRefs:
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
          - type: table
            tableRef: TM003
            claimRefs:
