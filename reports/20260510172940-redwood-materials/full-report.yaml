      - number: '5.3'
        title: CAM and ACF Product Specifications and Customer Requirements
        blocks:
          - type: paragraph
            body: >-
              Redwood's two finished product lines—cathode active material (CAM) and anode copper foil (ACF)—are the
              highest-value outputs of the integrated process. For CAM, Redwood primarily produces NMC 811
              (nickel-manganese-cobalt in 80-10-10 ratio), which is the dominant chemistry for high-energy-density EV
              applications including Tesla's 2170 cells and Panasonic's cells for the Model Y and Model 3. NMC 811 CAM
              must meet battery-grade specifications including particle size distribution (D50 of 10-12 microns),
              specific surface area (0.2-0.5 m2/g), and electrochemical performance (capacity > 185 mAh/g, capacity
              retention > 80% at 100 cycles). Redwood's commercial CAM deliveries to Panasonic Energy represent
              validation of its ability to meet these specifications at commercial volumes. For ACF, Redwood produces
              copper foil at 6, 7, and 8 micron thicknesses for anode applications, competing with established Korean
              and Japanese ACF producers (Iljin Materials, SKC, Furukawa Electric). ACF requires exceptional dimensional
              uniformity and tensile strength at ultra-thin gauges, which requires proprietary electrodeposition process
              control. Redwood's differentiation in ACF is the use of recycled copper as feedstock, which provides the
              IRA domestic content advantage and potentially a cost advantage if recycled copper is cheaper than virgin
              copper on a net basis after refining costs.
