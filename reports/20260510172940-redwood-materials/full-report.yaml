  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Severity-Ranked Risk Overview and Investment Implications
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials confronts five interconnected high-severity risk categories that investors must evaluate
              before commitment. First, IRA 45X advanced manufacturing production credit erosion represents the single
              largest policy risk, since the thirty-five dollar per kilowatt- hour CAM credit is Redwood's primary
              margin buffer against Korean producers. Second, FEOC guidance narrowing by Treasury could restrict
              downstream OEM EV tax credit eligibility for vehicles using Redwood CAM, reducing willingness to pay a
              domestic premium. Third, CAM technology scale-up at NMC 811 gigawatt-hour volumes remains unvalidated by
              independent third parties. Fourth, DOE ATVM loan covenant compliance requires meeting undisclosed
              production milestones; historical data suggest roughly thirty percent of conditional commitments do not
              progress to final close. Fifth, customer concentration in the Panasonic and Tesla nexus amplifies EV
              market and DOE execution risks simultaneously. A thesis-break trigger occurs when 45X credit reduction
              exceeds ten dollars per kilowatt- hour AND the DOE loan final-close fails concurrently; either event alone
              is manageable with model adjustment, but both together require complete re-underwriting. Investors must
              negotiate factory access rights, DOE milestone transparency, and Panasonic contract review as conditions
              of commitment. The risk-adjusted return at the Series E entry valuation of approximately five point five
              billion dollars is attractive only if 45X remains substantially intact and the South Carolina campus ramp
              proceeds on schedule.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
