  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition, Boundaries, and Substitutes
        blocks:
          - type: paragraph
            body: >
              Redwood Materials does not operate in a single discrete market but rather in an integrated stack of five
              adjacent segments: (1) Li-ion battery collection and processing (black-mass production); (2) critical
              mineral refining (lithium, nickel, cobalt, manganese intermediates); (3) cathode active material (CAM)
              manufacturing for NMC/NCA chemistry cells; (4) anode copper foil (ACF) manufacturing; and (5) second-life
              energy storage deployment via Redwood Energy. Included spend spans OEM battery take-back contracts,
              long-term materials supply offtake agreements with cell manufacturers, and energy storage project
              revenues. Excluded are primary mining of virgin critical minerals, EV battery cell manufacturing (which is
              Redwood's customer, not its business), and conventional grid storage using new chemistry (flow batteries,
              sodium-ion).

              Status-quo substitutes differ by segment. For battery recycling, the pre-Redwood US default was landfill
              disposal or low-value pyrometallurgical smelting—primarily overseas at plants in Belgium and South
              Korea—which recovered only cobalt and copper but discarded lithium and nickel into slag. For domestic
              cathode material, substitutes are imports predominantly from Chinese suppliers (CNGR, Hunan Shanshan) and
              Korean producers (EcoPro, L&F). For anode copper foil, the domestic market was essentially non-existent
              before Redwood's South Carolina campus; all supply came from South Korean and Japanese producers.
              Second-life energy storage competes with new LFP battery systems from CATL and BYD and domestic new-build
              storage projects.

              Adjacencies include direct lithium extraction (DLE) from brines, solid-state battery precursor supply, and
              battery-grade lithium carbonate/hydroxide production—areas where Redwood has made technical investments
              but not yet reached commercial scale. The European market (post-EU Battery Regulation 2027) represents a
              regulatory-driven adjacency that Redwood entered with its Redux acquisition but is treated as outside the
              primary North American SAM for this chapter.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Multiple independent sizing lenses converge on a large but contested market opportunity. The broadest
              framing—total global battery materials manufacturing—is estimated at $120–150B annually by 2030
              (BloombergNEF), but this TAM is largely irrelevant to Redwood's current capacity. A more relevant global
              figure is the lithium-ion battery recycling market alone: SNE Research estimates it reaches ~$22B by 2030
              from ~$3B in 2022; MarketsandMarkets placed it at ~$17.6B by 2030 (CAGR ~23%); IDTechEx projects a more
              conservative $14.5B by 2033. These figures are not reconciled because they use different scope
              definitions—some include only collection and processing, while others extend through refined material
              sales.

              For North America specifically, the SAM is more tractable. Combining the recycled battery materials market
              (~$5–7B by 2030, North America) with domestic CAM demand from US gigafactories (~$8–12B annually by 2030)
              and ACF demand (~$2–3B by 2030) yields a North American battery materials SAM of roughly $15–25B. The
              DOE's National Blueprint for Lithium Batteries projects that the US will need 650,000 MT of lithium and
              300,000 MT of nickel for domestic EV production through 2030, creating direct demand for the critical
              minerals Redwood recovers and refines.

              Redwood's SOM is bounded by its physical capacity: the Nevada campus (target ~100 GWh/yr CAM) plus the
              South Carolina campus (target ~100 GWh/yr ACF) imply potential revenues of $2–5B annually at full
              build-out and current pricing—though lithium carbonate price declines of 80% from 2022 peaks compress this
              range materially. Conflicting estimates and the private nature of Redwood's financials prevent precise SOM
              validation.
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
              - CM010
              - CM011
          - type: table
            tableRef: TM002
            claimRefs:
              - CM006
              - CM007
