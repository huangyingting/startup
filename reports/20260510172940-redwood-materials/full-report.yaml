  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: End-to-End Hydrometallurgical Process Stack
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials' technology architecture is best understood as five sequential process steps that
              together convert end-of-life batteries and manufacturing scrap into battery-grade materials ready for cell
              manufacturing. Step 1 is collection and logistics: Redwood operates a take-back network that aggregates
              batteries from EV OEMs, consumer electronics brands, and battery manufacturers, processing over 20 GWh
              equivalent of material annually as of 2024. Step 2 is mechanical processing and black-mass production:
              batteries are discharged, disassembled, shredded, and processed to produce black mass (the mixed powder
              containing cathode and anode active materials, copper foil, and electrolyte residues). Step 3 is
              hydrometallurgical refining: black mass is dissolved in acid solutions, and lithium, nickel, cobalt,
              manganese, and copper are selectively separated and purified using solvent extraction, ion exchange, and
              direct lithium recovery (DLR) proprietary processes. Step 4 is CAM synthesis: purified nickel, cobalt, and
              manganese sulfates are combined with lithium to produce cathode precursor (pCAM) and then sintered to
              produce finished NMC 811 cathode active material at battery grade. Step 5 is ACF production: recycled
              copper recovered in the refining stage is further purified and electrodeposited to produce anode copper
              foil at the required 6-8 micron thickness for battery cells. The integration of all five steps on the
              Nevada campus eliminates the logistics cost and material loss between process steps, which Redwood
              estimates provides a 15-20% yield advantage over disaggregated supply chains.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
