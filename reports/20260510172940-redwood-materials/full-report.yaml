      - number: '5.2'
        title: Hydrometallurgical Process Differentiation vs. Pyrometallurgy
        blocks:
          - type: paragraph
            body: >-
              The fundamental technology choice in battery recycling is between pyrometallurgical (pyro) and
              hydrometallurgical (hydromet) processing. Pyrometallurgical processes smelt battery materials at high
              temperatures, recovering cobalt and nickel as alloys but losing lithium (which volatilizes) and requiring
              energy-intensive acid leaching to recover other metals. Hydrometallurgical processes dissolve battery
              materials in aqueous solutions and use chemical separation to recover each metal individually. Redwood's
              process is hydromet-first: it achieves greater than 95% lithium recovery, which is critical as lithium
              becomes the key cost driver in NMC 811 and LNMO cathode chemistries. The company's direct lithium recovery
              (DLR) technology, which selectively extracts lithium from the leachate without the traditional lime
              precipitation step, is a key proprietary innovation that reduces reagent cost and improves lithium purity.
              Redwood's chemistry is also chemistry-agnostic: it can process NMC (111, 532, 622, 811), LFP, NCA, and
              cobalt oxide chemistries in the same facility, providing a feedstock flexibility advantage over
              competitors optimized for specific cathode types. This matters because the battery chemistry mix is
              shifting: LFP is growing rapidly (from near-zero to over 30% of global EV battery production by 2024) and
              sodium-ion is emerging, creating uncertainty about future feedstock chemistry profiles.
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
          - type: table
            tableRef: TE002
            claimRefs:
