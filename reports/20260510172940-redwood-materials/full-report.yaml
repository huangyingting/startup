      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Greater Than 95% Lithium Recovery Creates Structural Cost Advantage
            body: >-
              Redwood's hydromet DLR process recovers greater than 95% of lithium from battery feedstock, versus less
              than 5% for pyrometallurgical alternatives. As NMC 811's lithium content becomes the primary cost driver
              at current battery-grade lithium carbonate prices, this recovery rate creates a structural input cost
              advantage over pyro competitors and reduces the feedstock cost per kg of CAM produced.
            calloutType: strength
