            body: >-
              The key capability dimensions in battery recycling differentiation are: collection network and logistics,
              processing technology and recovery efficiency, downstream CAM production, geographic coverage, OEM
              partnership depth, and regulatory/environmental compliance track record. Redwood leads on recovery
              efficiency (95% claimed), CAM production integration, North American geographic coverage aligned with U.S.
              automotive OEM locations, and OEM partnership breadth (Ford, Toyota, GM, VW, BMW, Volvo, Rivian, Amazon).
