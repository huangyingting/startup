  - id: FM001
    title: Key Regulatory and Market Events Driving US Battery Recycling Demand
    type: timeline
    layout: standard
    summary: >-
      Chronological timeline of regulatory, technology, and market events driving demand for Redwood's battery circular
      economy business.
    data:
      items:
        - label: IRA Signed (Inflation Reduction Act)
          detail: Sections 30D, 45X, 48C create domestic content requirements and manufacturing credits for battery materials.
          date: '2022-08-16'
          tone: positive
        - label: DOE ATVM $2B Loan Conditional Commitment
          detail: >-
            US DOE commits $2B loan to Redwood under Advanced Technology Vehicles Manufacturing program for Nevada + SC
            expansion.
          date: '2023-02-09'
          tone: positive
        - label: Lithium Carbonate Price Collapse
          detail: >-
            Lithium carbonate falls 80%+ from $80K/MT peak, compressing recycling economics and challenging near-term
            margins.
          date: '2023-06-01'
          tone: negative
        - label: Li-Cycle Halts Rochester Hub Construction
          detail: >-
            Battery recycler Li-Cycle pauses flagship hub build after cash shortage; signals capital risk for US
            recyclers pre-scale.
          date: '2023-10-23'
          tone: negative
        - label: Ford ACF Supply Agreement Activated
          detail: >-
            Redwood begins supplying anode copper foil from South Carolina campus to Ford; first domestic ACF supply
            relationship.
          date: '2024-01-01'
          tone: positive
        - label: IRA 30D EV Tax Credit Terminated
          detail: >-
            Administration ends EV consumer credit, slowing EV adoption growth and reducing near-term battery retirement
            feedstock projections.
          date: '2025-09-30'
          tone: negative
        - label: EU Battery Regulation Effective
          detail: >-
            EU mandates minimum recycled content in batteries (16% Co, 6% Li, 6% Ni by 2031), creating global standard
            pressure.
          date: '2027-01-01'
          tone: positive
        - label: EV Battery Retirement Wave Begins
          detail: >-
            First-generation mass-market EVs reach 8-10 year lifespan; US recycling feedstock volumes expected to surge
            significantly.
          date: '2027-06-01'
          tone: positive
        - label: IRA Domestic Content 100% Critical Minerals Required
          detail: >-
            Full 100% domestic-or-FTA critical mineral sourcing requirement for IRA 30D eligibility reaches maximum
            threshold.
          date: '2028-01-01'
          tone: positive
    claimRefs:
      - CM013
