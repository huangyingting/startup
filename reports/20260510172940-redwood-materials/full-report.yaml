        - Technical due diligence with independent process chemistry expert; management roadmap discussion under NDA
    notes: >-
      Items 1 through 3 including audited financials, DOE loan terms, and OEM contract terms are threshold requirements.
      Without all three, investment commitment at $5.5B is not analytically supportable at medium or higher confidence.
      Items 4 and 5 improve conviction materially but are not independently blocking if items 1-3 are satisfied.
    claimRefs:
      - CV005
      - CV006
      - CV036
      - CV041
