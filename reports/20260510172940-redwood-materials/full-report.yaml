  - id: FM003
    title: 'Battery Recycling Value Chain: Segment Margins and Competitive Position'
    type: flow
    layout: standard
    summary: >-
      Flow of materials and value through the battery recycling and manufacturing stack, showing Redwood's position
      across all five segments.
    data:
      nodes:
        - id: collection
          label: Battery Collection & Logistics
          description: >-
            OEM take-back, consumer electronics drop-off, manufacturing scrap. Thin or negative margin. Redwood:
            dominant NA position.
        - id: blackmass
          label: Black Mass Processing
          description: >-
            Shredding, thermal treatment, hydrometallurgical separation. 10-20% gross margin. Redwood: primary NA
            processor.
        - id: refining
          label: Critical Mineral Refining
          description: >-
            Li, Ni, Co, Mn, Cu intermediates. Margin compressed by commodity prices. Redwood: differentiator vs.
            overseas smelting.
        - id: cam
          label: Cathode Active Material (CAM)
          description: >-
            NMC/NCA cathode precursors and finished CAM. 15-30% gross margin. Sold to Panasonic, Toyota. IRA 45X credit
            applies.
        - id: acf
          label: Anode Copper Foil (ACF)
          description: >-
            Battery-grade copper foil substrate. 20-35% gross margin. SC campus. Sold to Ford. Only US domestic
            producer.
        - id: secondlife
          label: Second-Life Energy Storage
          description: >-
            Repurposed EV packs for grid/data center storage. Emerging segment. Crusoe, Rivian partnerships. Redwood
            Energy division.
        - id: oem
          label: OEM Cell Manufacturers
          description: Panasonic, Samsung SDI, LG Energy Solution. Buy CAM + ACF as manufacturing inputs. IRA 45X motivation.
        - id: end-markets
          label: 'End Markets: EVs and Data Centers'
          description: >-
            EVs consuming new batteries from recycled materials (circular); AI data centers consuming second-life
            storage.
      edges:
        - from: collection
          to: blackmass
          label: processed at Nevada + SC campuses
        - from: blackmass
          to: refining
          label: 95%+ mineral recovery claimed
        - from: refining
          to: cam
          label: Ni, Co, Mn, Li to CAM precursor
        - from: refining
          to: acf
          label: Cu to anode copper foil
        - from: cam
          to: oem
          label: supply agreement (Panasonic, Toyota)
        - from: acf
          to: oem
          label: supply agreement (Ford)
        - from: oem
          to: end-markets
          label: new EV batteries (circular economy)
        - from: collection
          to: secondlife
          label: viable packs routed to Redwood Energy
        - from: secondlife
          to: end-markets
          label: deployed as grid storage (Crusoe, Rivian)
    claimRefs:
      - CM032
  - id: FM004
    title: 'Buyer Adoption Path: IRA Policy Forcing Functions by Segment'
    type: timeline
    layout: standard
    summary: Timeline of IRA policy milestones that force adoption decisions for buyer segments procuring from Redwood.
    data:
      items:
        - label: IRA 45X CAM/ACF Production Credits Activate
          detail: >-
            Cell manufacturers and OEMs sourcing from US producers like Redwood qualify for per-kWh production credits,
            creating immediate financial incentive for domestic sourcing.
          date: '2023-01-01'
          tone: positive
        - label: '30D: 40% Critical Mineral Domestic Content Threshold'
          detail: >-
            OEMs selling EVs with IRA tax credit must source 40%+ of critical minerals from US/FTA partners. Redwood
            recycled materials qualify. Procurement decisions accelerate.
          date: '2024-01-01'
          tone: positive
        - label: '30D: 50% Critical Mineral Domestic Content Threshold'
          detail: >-
            Domestic content threshold rises to 50%, tightening OEM supply chain sourcing requirements and reinforcing
            Redwood's value proposition to automotive buyers.
          date: '2025-01-01'
          tone: positive
        - label: 30D EV Credit Terminated by Administration
          detail: >-
            Consumer EV tax credit eliminated September 2025. Near-term OEM volume growth slows. 45X manufacturing
            credits remain intact for Redwood's CAM/ACF business.
          date: '2025-09-30'
          tone: negative
        - label: 'EU Battery Regulation: Recycled Content Certification Required'
          detail: >-
            EU mandates recycled content certification for all batteries sold in EU. OEMs with global supply chains must
            establish certified recycling partnerships globally.
          date: '2027-01-01'
          tone: positive
        - label: '30D: 100% Critical Mineral Threshold (if reinstated)'
          detail: >-
            Full domestic-or-FTA critical mineral sourcing required by 2028 under IRA 30D schedule. Data center and
            storage buyers unaffected but EV supply chain fully reshored.
          date: '2028-01-01'
          tone: positive
    claimRefs:
      - CM012
