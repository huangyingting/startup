      - number: '8.3'
        title: Comparable Transaction and Peer Analysis
        blocks:
          - type: paragraph
            body: >-
              The battery recycling comparable universe is thin, distressed, and cautionary as of May 2026. Li-Cycle
              Holdings provides the most important data point: a SPAC valuation of $1.7B in 2021 that resulted in
              near-total equity destruction by 2024. The Li-Cycle failure illustrates that hydrometallurgical battery
              recycling at scale requires substantially more capital than initial estimates, and that cost overruns can
              be fatal even for a well-funded public company with blue-chip investors. Ascend Elements' April 2026
              Chapter 11 filing is the closest domestic competitor comparable, a company with identical ambitions
              including CAM production, OEM partnerships, and DOE support that burned $542M before filing, with DOE
              withdrawing the $480M conditional grant upon the adverse material event disclosure. These failures are not
              idiosyncratic. They reflect the structural economics of building hydrometallurgical recycling
              infrastructure at giga-scale, where capex intensity exceeds initial models and commodity price volatility
              can turn positive EBITDA projections negative. Umicore, the only profitable comparable public company, is
              a 100-plus year Belgian materials company with fully depreciated infrastructure and decades of operational
              refinement. It is a target state for Redwood, not a near-term comparable. VW's Battery Resources
              acquisition at $200-400M implies an OEM strategic acquisition multiple of 15-30x forward revenue,
              suggesting trade sale value for Redwood of $4-8B in a 2028-2030 strategic acquisition scenario assuming SC
              campus is operational at scale. Northvolt's restructuring at a peak valuation of $12B provides a
              cautionary parallel from adjacent cell manufacturing: even well-capitalized battery companies with strong
              OEM partnerships fail when capex discipline and yield ramp do not match projections.
            claimRefs:
              - CV004
              - CV005
              - CV017
              - CV025
              - CV026
              - CV038
              - CV040
          - type: table
            tableRef: TV004
            claimRefs:
              - CV017
              - CV018
              - CV025
              - CV035
              - CV042
      - number: '8.4'
        title: Scenario Analysis and Capital Return Framework
        blocks:
          - type: paragraph
            body: >-
              The bull case at 20% probability requires simultaneous occurrence of five favorable outcomes: DOE loan
              final close in H1 2026, SC Phase 1 ramp to 45 GWh/yr or more by 2027, SC Phase 2 groundbreaking without
              cost overruns, lithium price recovery above $15,000/MT, and IRA 45X credits intact through 2032. Under
              these conditions, Redwood's 2028E revenue could reach $1.2-1.8B and at a 7-8x multiple yields $8.4-14.4B
              equity value representing 50-160% upside from the 2023 Series C entry. This is a real but demanding
              outcome that requires no major adverse events over a four-year horizon, which is exceptional for a
              capital-intensive infrastructure company. The base case at 50% probability reflects partial success: DOE
              loan converts but possibly on modified terms, SC Phase 1 reaches 30 GWh/yr by 2028 one year behind plan,
              and lithium remains $10,000-14,000/MT. At this performance, 2028E revenue is $700M-1.1B and valuation
              $4.5-7.5B, suggesting flat to modest upside from $5.5B entry before considering cost of capital on a 4-5
              year hold. The bear case at 30% probability is materially adverse: DOE loan delayed to 2028 or reduced,
              lithium below $8,000/MT for two consecutive quarters, and SC Phase 2 requires a distressed equity bridge.
              Comparable scenarios in Li-Cycle and Northvolt produced 50-80% valuation haircuts, implying a 2028 equity
              value of $1.5-3.0B, representing a 45-73% loss from $5.5B entry. The probability-weighted expected value
              across all scenarios is approximately $4.9-6.2B, representing modest positive expected value that does not
              adequately compensate for binary downside risk at this price point without audited financials or DOE loan
              closure confirmation. Lithium price recovery above $15,000/MT and SC campus operational throughput data
              are the two highest-leverage publicly observable indicators for tracking thesis progress.
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV027
              - CV028
              - CV030
              - CV031
          - type: table
            tableRef: TV005
            claimRefs:
              - CV003
              - CV004
              - CV030
              - CV039
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV002
              - CV013
              - CV014
              - CV031
      - number: '8.5'
        title: Exit Readiness and Final Diligence Priorities
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials is not currently exit-ready for public markets. IPO conditions for capital- intensive,
              pre-profitability infrastructure companies remain constrained in 2026 as evidenced by the poor performance
              of comparable public offerings in the cleantech sector. The most realistic exit scenario is a strategic
              trade sale to an OEM including Toyota, GM, or Volkswagen, or a large battery materials company including
              BASF, Umicore, or POSCO, between 2028 and 2030, once SC campus reaches meaningful scale and EBITDA
              approaches breakeven. JB Straubel's OEM relationships from his Tesla tenure make a negotiated trade sale
              more feasible than for a typical industrial company. The DOE loan, if drawn, creates a government lender
              relationship that could complicate or condition any trade sale requiring change-of-control consent from
              the DOE. Five diligence items are threshold requirements before any investment commitment at the $5.5B
              level. First, audited financial statements for FY2023-FY2025 providing revenue, EBITDA, capex, and cash
              position by segment. Second, the DOE ATVM conditional loan term sheet with milestone conditions and cure
              periods. Third, OEM supply agreement terms confirming duration, volume commitments, and pricing mechanisms
              for at least one of the three OEM contracts. Fourth, SC campus capex schedule and Phase 2 funding plan.
              Fifth, Redwood's LFP chemistry adaptation roadmap. Items one, two, and three are independently blocking:
              without all three, the valuation framework relies on too many unverified assumptions to support investment
              commitment at $5.5B. The most actionable immediate diligence step is requesting management access under
              NDA for data room review, as all five priority items require direct company engagement.
            claimRefs:
              - CV003
              - CV033
              - CV036
              - CV037
              - CV039
              - CV040
              - CV041
          - type: table
            tableRef: TV006
            claimRefs:
              - CV005
              - CV006
              - CV036
              - CV041
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Sector-Level Capital Destruction Risk
            body: >-
              Two of the three significant US battery recyclers have filed for Chapter 11 within 18 months of this
              report: Li-Cycle in October 2024 and Ascend Elements in April 2026. The capital destruction patterns in
              both cases, including cost overruns on hydrometallurgical facilities, DOE grant dependency, and lithium
              price sensitivity, directly mirror Redwood Materials risk profile. This is not an idiosyncratic peer
              failure; it is a structural sector warning about capital-intensive battery recycling at scale.
            calloutType: insight
            claimRefs:
              - CV004
              - CV005
              - CV026
          - type: callout
            title: Entry Price Discipline
            body: >-
              Any investment at or above the 2023 Series C price of $5.5B post-money requires confirmation of two
              threshold events before commitment: first, DOE ATVM loan formal close with milestone terms reviewed under
              NDA, and second, access to audited FY2024 financials confirming revenue scale. Without these two data
              points, the valuation framework rests on unverified revenue assumptions and conditional capital that may
              not materialize.
            calloutType: insight
            claimRefs:
              - CV001
              - CV003
