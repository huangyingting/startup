          - type: callout
            title: LFP Chemistry Growth Reduces Recoverable Metal Value per kWh
            body: >-
              LFP batteries contain no cobalt or nickel—only lithium and iron. As LFP grows toward 40-50% of global EV
              battery installations by 2030, the average recoverable value per kWh of battery processed by Redwood will
              decline materially. The company has invested in LFP process chemistry but has not publicly disclosed LFP
              recycling economics, which are expected to be significantly below NMC economics.
            calloutType: risk
            claimRefs:
              - CE023
              - CE024
              - CE025
          - type: callout
            title: Process Know-How is More Defensible Than Patent Portfolio
            body: >-
              Redwood's formal patent portfolio covers specific process configurations, but the fundamental
              hydrometallurgical chemistry is well-established in mining. The company's most defensible competitive
              asset is accumulated process know-how from processing over 20 GWh of batteries at scale—a learning curve
              that requires years to replicate and encompasses impurity management, equipment reliability, and yield
              optimization that are difficult to patent but equally difficult to reproduce.
            calloutType: insight
            claimRefs:
              - CE018
              - CE019
              - CE020
          - type: callout
            title: Commercial CAM Quality Assumed to Meet Panasonic Specifications
            body: >-
              This chapter assumes that Redwood's commercial CAM deliveries to Panasonic Energy meet battery-grade NMC
              811 specifications based on the continuation of the supply relationship. No independent third-party
              quality verification or electrochemical characterization of Redwood's commercial CAM output has been
              publicly published. Investors should request quality control data and customer acceptance certificates
