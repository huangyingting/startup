      - number: '1.4'
        title: Operations, Facilities, and Scale
        blocks:
          - type: paragraph
            body: >
              Redwood Materials' primary campus is a large-scale recycling and manufacturing complex in McCarran, Nevada
              (adjacent to the Tesla Gigafactory). As of 2025, the Nevada campus handles the bulk of end-of-life battery
              collection, processing, and cathode and anode manufacturing. In 2022, Redwood announced a second major
              campus in the Charleston, South Carolina region to process batteries from East Coast OEM
              partners—particularly Ford and Volkswagen—and to manufacture battery materials near East Coast cell
              production facilities. Redwood also acquired Redux Recycling, a European battery recycler based in
              Germany, in 2024, marking its first international manufacturing presence. A 15,000-square-foot R&D center
              in San Francisco's Design District was opened in April 2025.

              On the production side, Redwood claims to receive more than 20 GWh of batteries annually—equivalent to
              approximately 250,000 electric vehicles—representing roughly 90% of all lithium-ion batteries and battery
              materials recycled in North America. The company's hydrometallurgical process achieves 95%+ mineral
              recovery rates, verified in a 2023 Electrek-reported pilot program. Battery materials produced include CAM
              and ACF that are sold under supply agreements to cell manufacturers and OEM partners. The Bloomberg
              Businessweek longform feature (April 2024) documented the Nevada facility's operational scale and noted
              the challenge of achieving cost parity with Chinese-processed materials, which remains a key competitive
              concern.

              Employment was approximately 1,100 full-time employees as of early 2025 per company-disclosed figures,
              declining to approximately 1,000 following the April 2026 10% reduction in force.
