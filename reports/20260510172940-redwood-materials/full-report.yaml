  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The competitive landscape for Redwood Materials spans five categories: (1) direct North American Li-ion
              battery recyclers — Cirba Solutions, Li-Cycle (Chapter 11), and Ascend Elements (Chapter 11); (2)
              incumbent global battery material suppliers — Umicore, BASF, Sumitomo Metal Mining — who provide the
              primary status-quo substitute via virgin-mined or pyrometallurgically processed materials; (3) Chinese
              integrated players — CATL's BRUNP Recycling affiliate and GEM Co. — who dominate Asian recycling and are
              expanding globally; (4) potential in-house recyclers — battery manufacturers including Panasonic, Samsung
              SDI, and LG Energy Solution who currently supply scrap to Redwood but could internalize recycling as
              volumes grow; and (5) the status quo of landfill and export, which remains legal in many jurisdictions and
              requires no capital investment. Redwood is differentiated by its integrated model from collection through
              CAM production, its scale (20+ GWh processed annually), and its OEM partnership network that creates
              bilateral supply security. The two North American direct competitors that attempted a similar approach
              (Ascend Elements and Li-Cycle) have both entered bankruptcy proceedings, suggesting that Redwood's early
              mover advantage and capital access have created a structural separation from followers.
