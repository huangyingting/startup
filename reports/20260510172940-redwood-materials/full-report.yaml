              a significant near-term feedstock, providing predictable high-quality input while end-of-life volumes
              grow. The take-back collection network represents a strategic asset because it creates bilateral
              dependency: OEMs need Redwood's recycling capacity to meet battery end-of-life regulations, and Redwood
