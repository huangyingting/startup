      - number: '7.2'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >-
              Redwood operates in a heavily regulated environment spanning federal energy law, environmental permitting,
              trade regulation, intellectual property, and workplace safety. The primary regulatory risk is the IRA 45X
              advanced manufacturing production credit, which is permanent in statute but subject to legislative
              amendment and Treasury/IRS interpretive guidance on recycled content eligibility. Congressional proposals
              in 2025 specifically targeted recycled battery material credits, citing double-counting concerns about
              subsidizing materials already incentivized at the mining stage. FEOC final rules effective 2025 introduce
              interpretive risk: if Treasury narrowly defines the recycled content pathway's FEOC status, OEM customers'
              clean vehicle credit eligibility could be impaired. Environmental permitting is a secondary legal risk:
              Nevada DEQ issued an air quality permit for Churchill County in 2023; any capacity expansion requires
              additional environmental review under NEPA and Nevada state law. OSHA regulations covering battery
              recycling hazardous materials handling apply to Redwood's Nevada and South Carolina operations. The
              battery recycling patent landscape has thickened significantly since 2020, with aggressive POSCO, Samsung
              SDI, and Chinese firm filings in hydrometallurgical processing and precursor CAM synthesis, increasing IP
              challenge risk for Redwood. No material litigation appears in public court records for Redwood Materials,
              though private company exposure cannot be fully verified without NDA document requests.
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR009
              - CR010
              - CR011
          - type: table
            tableRef: TR001
            claimRefs:
