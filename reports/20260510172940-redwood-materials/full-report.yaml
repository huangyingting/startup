      - number: '8.2'
        title: Valuation Methodology and Context
        blocks:
          - type: paragraph
            body: >-
              Three valuation approaches inform the $5.5B assessment of Redwood Materials. First, a revenue multiple
              approach: using analyst-estimated 2025 revenue of $300-500M derived from public evidence, Redwood trades
              at 11-18x trailing revenue. The most comparable at-scale public company, Umicore with EUR 2.9B revenue in
              2023, trades at 0.8-1.5x revenue and 6-10x EBITDA, a fraction of Redwood's implied multiple. The revenue
              premium is justified primarily by growth trajectory and strategic asset value, not current profitability.
              Second, a NAV approach summing Nevada campus replacement value of $800M-1.2B, SC Phase 1 infrastructure of
              $1.8-2.5B at cost, supply agreement value of $500M-1.5B, technology IP value of $500M-1.0B, and DOE
              strategic relationship option value of $1.5-3.0B implies a total range of $5.1-9.2B, bracketing the Series
              C valuation. This approach is most supportive of the current price but depends critically on SC Phase 1
              capex assumptions. Third, a comparable transaction approach shows Li-Cycle's SPAC at $1.7B now bankrupt,
              VW's Battery Resources acquisition at $200-400M, and Ascend Elements' funded scale at $542M now bankrupt,
              all implying Redwood commands a strategic premium reflecting OEM relationship quality and founder premium.
              The current financing context is unfavorable: sector bankruptcies have increased risk perception, lithium
              prices remain depressed at approximately $12,000/MT versus 2022 peaks, and public markets for
              pre-profitability infrastructure companies are constrained. Entry discipline requires either a price
              discount from $5.5B or confirmation of DOE loan closure before committing new capital. Dilution from SC
              Phase 2 equity needs estimated at $1.5-2.5B represents significant incremental dilution risk if the DOE
              loan is delayed beyond 2027.
