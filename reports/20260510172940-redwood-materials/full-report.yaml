      - number: '3.4'
        title: Switching Costs and Lock-in Mechanisms
        blocks:
          - type: paragraph
            body: >-
              Switching costs in battery recycling are significant and multi-dimensional. For OEM customers supplying
              end-of-life batteries, switching requires: (1) establishing new logistics infrastructure (geographically
              optimized collection routes are capital-intensive to replicate); (2) regulatory compliance
              re-certification under the Uniform Hazardous Waste Manifest system for a new vendor; (3) renegotiation of
              supply agreements and potentially restructuring sustainability-reporting commitments tied to specific
              recycler partnerships; and (4) uncertainty about alternative processors' capacity, reliability, and
              material quality. The bilateral nature of OEM agreements deepens lock-in: OEMs provide battery volume
              guarantees in exchange for processing and material return commitments, creating mutual dependencies that
              are costly to unwind. Geographic proximity is a structural switching cost: Redwood's Nevada campus is
              strategically positioned near California EV concentration and its South Carolina campus is near Southeast
              automotive manufacturing. Any replacement processor would need comparable proximity, requiring comparable
              capital investment. For CAM customers (cell manufacturers buying recycled CAM), switching costs include
              qualification re-certification of new CAM chemistry in cell production lines, which can take 18-24 months.
              Redwood has supply agreements with Panasonic, Samsung SDI, and others for CAM, creating qualified-vendor
              relationships that are difficult to replace quickly. The DoE loan conditional commitment adds another
              dimension: Redwood's access to $2 billion in low-cost project financing at rates unavailable to most
              competitors is a structural advantage that increases the opportunity cost of not using Redwood.
