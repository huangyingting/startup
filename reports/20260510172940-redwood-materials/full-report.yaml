      - number: '1.3'
        title: Funding History, Valuation, and Investors
        blocks:
          - type: paragraph
            body: >
              Redwood Materials has raised approximately $2.3 billion in private equity capital since its founding, plus
              a $2 billion conditional loan commitment from the US Department of Energy, making it the most heavily
              capitalized US battery recycler by a wide margin. The Series E had an initial close of $350M in October
              2025 at a reported post-money valuation of approximately $6 billion, led by Eclipse Ventures and NVIDIA's
              NVentures. A final close in January 2026 brought the Series E total to $425M with additional investors.
              Wilson Sonsini Goodrich & Rosati advised Redwood on the legal aspects of the Series E. Prior rounds
              include a Series D of $1 billion raised in August 2023 at an implied valuation of approximately $3.7
              billion, a Series C of approximately $700M in 2021-2022, and earlier seed and Series A/B rounds. The DoE
              conditional commitment (February 2023) was for a $2B loan guarantee tied to construction of domestic
              battery materials manufacturing capacity in Nevada and South Carolina.

              The investor base spans prominent venture capital (Eclipse Ventures, Andreessen Horowitz), technology
              strategics (NVIDIA's NVentures), financial institutions (Goldman Sachs), and climate-focused funds.
              Partnerships with Ford Motor Company, Rivian, Toyota, Panasonic, GM, Volkswagen, and Caterpillar provide
              off-take revenue and supply chain integration. Key OEM investors and partners represent potential
              conflicts if they compete for battery supply in a tighter market.

              Revenue and financial metrics remain undisclosed publicly. Industry analysts at BatteryIndustry.net
              estimated 2024 revenue at approximately $200M annually, consistent with the scale of reported production
              contracts. Redwood has not disclosed profitability, cash burn, or remaining runway.
