callouts:
  - calloutType: risk
    title: "Tesla Is Not a Redwood Customer Despite Being the Largest US EV Battery Source"
    body: >-
      Tesla is the largest producer of end-of-life EV batteries in the US market by volume,
      yet it is not a publicly confirmed Redwood Materials recycling partner. Tesla recycles
      batteries in-house at its Gigafactories and has not disclosed a third-party recycling
      relationship with Redwood. This absence is the most significant undisclosed feedstock
      risk in the Redwood customer picture and warrants specific diligence.
    claimRefs: [CU017, CU018]
    sourceRefs: [SU011, SU012]

  - calloutType: risk
    title: "Revenue Concentration: Panasonic Is the Only Confirmed CAM Buyer"
    body: >-
      Panasonic Energy is the only publicly confirmed commercial buyer of Redwood Materials'
      NMC 811 cathode active material. This creates extreme revenue concentration risk: if
      Panasonic diversifies its CAM supply, reduces order volumes, or renegotiates pricing
      downward in response to IRA credit changes, Redwood's CAM revenue would be materially
      affected in the 2025-2027 timeframe.
    claimRefs: [CU007, CU008, CU016]
    sourceRefs: [SU007, SU014]

  - calloutType: insight
    title: "Bilateral Dependencies Create Switching Cost Moats in OEM Partnerships"
    body: >-
      Redwood's most strategically durable customer relationships involve bilateral
      dependencies: OEMs need Redwood's collection network to meet battery end-of-life
      regulations (EPR compliance), while Redwood needs OEM feedstock to maintain
      processing volumes. Ford and Amazon's equity investments add a third layer of
      alignment. This structure creates genuine switching costs on both sides, reducing
      the risk of partner attrition once relationships are established.
    claimRefs: [CU011, CU012, CU013]
    sourceRefs: [SU001, SU002, SU003]

  - calloutType: assumption
    title: "EV Adoption Trajectory Assumption: 2027-2028 Feedstock Inflection Intact"
    body: >-
      This chapter's analysis of Redwood's customer pipeline assumes that US EV adoption
      continues to grow toward the volumes needed for a 2027-2028 feedstock inflection
      point. The Trump administration's rollback of EV purchase incentives in 2025 creates
      downside risk to this assumption. Wood Mackenzie's 10-15% reduction in US EV adoption
      forecasts would correspondingly delay Redwood's recycling volume growth and push back
      the economics of full gigafactory utilization.
    claimRefs: [CU019, CU020]
    sourceRefs: [SU015, SU013]

