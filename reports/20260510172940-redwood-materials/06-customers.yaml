company:
  name: Redwood Materials
chapter:
  number: 6
  title: Customers & Partnerships
  summary: >-
    Redwood Materials operates a two-sided customer model: on the input side, it
    collects end-of-life batteries and manufacturing scrap from OEMs, battery
    manufacturers, and consumer electronics brands; on the output side, it sells
    processed materials (CAM and ACF) to battery cell manufacturers and OEMs. The
    most significant commercial relationship is the Panasonic Energy Nevada CAM
    supply partnership, which represents the first validation of Redwood's ability
    to sell battery-grade CAM at commercial volumes. Ford Motor Company, Amazon,
    and Toyota are publicly confirmed recycling supply partners. On the CAM/ACF
    output side, Panasonic is the only publicly confirmed commercial buyer.
    The customer base is highly concentrated: one customer (Panasonic) anchors
    CAM revenue, and the top three recycling input suppliers likely account for
    the majority of battery feedstock volume. Key adverse considerations include
    the risk of OEM backward integration into recycling, Panasonic's own supplier
    diversification strategy, and the possibility that reduced EV sales (in a
    Trump administration pro-ICE policy environment) delays recycling feedstock
    volume growth.

sections:
  - id: SU-input-customers
    title: Battery Feedstock Supply Partners (Input Customers)
    body: >-
      Redwood Materials operates a battery collection and take-back network that
      processes end-of-life EV batteries, battery manufacturing scrap, and consumer
      electronics batteries. Confirmed publicly disclosed input supply relationships
      include: Ford Motor Company (EV battery take-back partnership announced in 2021,
      covering end-of-life Ford F-150 Lightning and Mustang Mach-E batteries);
      Volkswagen Group of America (battery return logistics partnership for Audi and
      Volkswagen EV customers); Toyota (battery recycling partnership for US-market
      vehicles); Amazon (consumer electronics battery take-back, particularly for
      Ring and Alexa device batteries); Volvo Cars; and several battery cell
      manufacturers including Panasonic Energy and Envision AESC (which contributes
      manufacturing scrap). The collection network is particularly valuable in the
      current period because consumer EV batteries are only beginning to reach
      end-of-life at volume—the first wave of 2012-2015 Nissan Leaf batteries and
      2015-2018 Tesla Model S/X packs are now reaching recycling age. Redwood
      processes manufacturing scrap (cell rejects from Panasonic's Nevada Gigafactory)
      as a significant near-term feedstock, providing predictable high-quality input
      while end-of-life volumes grow. The take-back collection network represents a
      strategic asset because it creates bilateral dependency: OEMs need Redwood's
      recycling capacity to meet battery end-of-life regulations, and Redwood needs
      OEM feedstock to maintain processing volumes.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
    tableRefs:
      - TU001
    figureRefs:
      - FU001

  - id: SU-output-customers
    title: CAM and ACF Output Customers
    body: >-
      Redwood Materials sells its two primary finished products—NMC 811 cathode
      active material (CAM) and anode copper foil (ACF)—to US battery cell
      manufacturers under commercial supply agreements. The only publicly confirmed
      CAM output customer is Panasonic Energy, which operates the Nevada Gigafactory
      in partnership with Toyota and supplies cells to multiple OEMs. The Panasonic
      relationship is strategic: Panasonic's Gigafactory is located adjacent to
      Redwood's Nevada campus, enabling just-in-time CAM delivery without the
      logistics costs of long-haul transportation. Panasonic also contributes
      manufacturing scrap (battery rejects and off-spec cells) as recycling feedstock,
      creating a circular bilateral relationship. For ACF, Redwood has not publicly
      disclosed commercial customers beyond stating that its South Carolina facility
      is selling into the US battery supply chain. Potential ACF customers include
      Panasonic Energy (for its Nevada cells), Samsung SDI America (Blue Oval City
      in Tennessee), and LG Energy Solution (multiple US facilities). The lack of
      disclosed ACF customers is a diligence gap: it is unknown whether Redwood is
      selling commercial volumes of ACF or is still in qualification stages with
      prospective buyers. The revenue concentration risk is significant: if Panasonic
      Energy diversifies its CAM supply to Korean producers (POSCO Future M, EcoPro
      BM) or builds in-house CAM capability, Redwood's near-term CAM revenue would
      be materially affected.
    claimRefs:
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
    tableRefs:
      - TU002
    figureRefs:
      - FU002

  - id: SU-strategic-partnerships
    title: Strategic Partnerships and OEM Integration Depth
    body: >-
      Beyond transactional customer relationships, Redwood Materials has established
      strategic partnerships that create deeper integration and switching cost moats.
      The Ford Motor Company partnership is the most strategically significant: Ford
      invested in Redwood's Series C and signed a battery recycling partnership that
      includes supply of Ford EV battery scrap and a framework for North American
      battery materials supply. This investment-plus-supply structure creates aligned
      incentives that extend beyond a simple vendor relationship. Amazon's partnership
      includes both battery supply (consumer electronics) and a stated intention to
      use Redwood-sourced materials in Amazon's commercial fleet electrification
      program. The Toyota partnership covers both EV battery take-back and Toyota's
      stated interest in domestic battery materials supply for its US manufacturing
      operations. Redwood has also signed a partnership with Volkswagen Group of
      America covering battery return logistics for the Audi e-tron, Q4 e-tron, and
      ID.4 models. These OEM partnerships collectively create a network effect:
      each additional OEM partner strengthens the feedstock supply position, which
      in turn strengthens the case for additional CAM and ACF output customers,
      which in turn attracts additional OEM partners seeking domestic materials supply.
      The risk is that this network effect operates in reverse if OEM EV volumes
      disappoint: fewer batteries mean less recycling feedstock, which delays the
      feedstock volume growth needed to justify full gigafactory utilization.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
    tableRefs:
      - TU003
    figureRefs:
      - FU003

  - id: SU-adverse-risks
    title: Customer Concentration Risk and Adverse Scenarios
    body: >-
      Redwood Materials' customer base exhibits two forms of concentration risk that
      diligence investors must assess. First, CAM revenue concentration: Panasonic
      Energy is the only disclosed commercial CAM buyer, and the terms, volume, and
      duration of the supply agreement are not public. If Panasonic diversifies its
      CAM supply, reduces order volumes, or renegotiates pricing downward following
      any reduction in IRA 45X credits, Redwood's CAM revenue could decline materially
      in the 2025-2027 timeframe. Second, feedstock input concentration: while multiple
      OEMs are named as battery supply partners, the volume contribution of each is
      not disclosed. Industry observers note that Tesla—which is the largest US EV
      maker and the source of the most end-of-life batteries—is not a publicly confirmed
      Redwood recycling partner, despite JB Straubel's Tesla history. Tesla recycles
      batteries in-house at its Gigafactories and has not disclosed a third-party
      recycling partnership with Redwood. This is a material gap in the feedstock
      picture. Additionally, the Trump administration's hostile stance toward EV
      mandates and reduced EV purchase incentives has slowed EV adoption rates in
      early 2026, potentially delaying the 2027-2028 feedstock inflection point that
      Redwood's capacity planning assumes. Analysts at Wood Mackenzie have revised
      downward their US EV adoption forecasts by 10-15% for 2025-2028 in response to
      policy changes, which would correspondingly reduce Redwood's recycling volume
      growth trajectory.
    claimRefs:
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
    tableRefs:
      - TU004
      - TU006
    figureRefs:
      - FU004

  - id: SU-customer-pipeline
    title: Customer Pipeline and Market Development
    body: >-
      Redwood Materials is in active customer acquisition for both CAM and ACF product
      lines. For CAM, potential additional customers include: Samsung SDI America
      (which supplies Ford and Stellantis cell packs), LG Energy Solution (supplies
      GM, Honda, Hyundai), and Stellantis battery operations. Each of these requires
      a CAM qualification process—typically 12-18 months of technical testing and
      approval—before commercial volumes can begin. For ACF, the same qualification
      timeline applies, with the additional complexity that ACF specifications are
      cell-chemistry and equipment-specific. The CAM and ACF qualification pipeline
      is not publicly disclosed. However, Redwood's Nevada gigafactory location is
      strategically positioned relative to major US battery manufacturing clusters
      (Nevada, Tennessee, Ohio, Michigan), providing logistics advantages in customer
      proximity. The customer pipeline's realization speed depends heavily on the
      continuation of IRA 45X credits, which create a price advantage for
      domestically-produced CAM and ACF; if credits are modified, the economic case
      for domestic sourcing is weakened and customer qualification velocity may slow
      as OEMs reassess their supply chain strategies.
    claimRefs:
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
    tableRefs:
      - TU005
    figureRefs:
      - FU005

