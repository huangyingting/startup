company:
  name: Redwood Materials
chapter:
  number: 2
  title: Market Analysis
  summary: 'Redwood Materials operates at the intersection of five overlapping market
    segments—battery recycling, critical mineral refining, cathode active material
    (CAM) manufacturing, anode copper foil (ACF) manufacturing, and second-life energy
    storage—collectively addressable at $15–25B in North America by 2030. The IRA''s
    domestic content mandates, accelerating EV adoption, and a structurally dependent
    US supply chain (70%+ of cathode materials imported from China) create powerful
    tailwinds, while lithium price volatility, capital-intensive manufacturing, and
    a pre-2028 scrap shortage constrain near-term recycling economics. Redwood''s
    dominant 90% share of North American Li-ion recycling volume positions it to capture
    significant SOM as feedstock volumes surge after 2027, but several sizing estimates
    remain contested and private commercial terms limit external corroboration.

    '
sections:
- id: market-definition
  title: Market Definition, Boundaries, and Substitutes
  body: 'Redwood Materials does not operate in a single discrete market but rather
    in an integrated stack of five adjacent segments: (1) Li-ion battery collection
    and processing (black-mass production); (2) critical mineral refining (lithium,
    nickel, cobalt, manganese intermediates); (3) cathode active material (CAM) manufacturing
    for NMC/NCA chemistry cells; (4) anode copper foil (ACF) manufacturing; and (5)
    second-life energy storage deployment via Redwood Energy. Included spend spans
    OEM battery take-back contracts, long-term materials supply offtake agreements
    with cell manufacturers, and energy storage project revenues. Excluded are primary
    mining of virgin critical minerals, EV battery cell manufacturing (which is Redwood''s
    customer, not its business), and conventional grid storage using new chemistry
    (flow batteries, sodium-ion).

    Status-quo substitutes differ by segment. For battery recycling, the pre-Redwood
    US default was landfill disposal or low-value pyrometallurgical smelting—primarily
    overseas at plants in Belgium and South Korea—which recovered only cobalt and
    copper but discarded lithium and nickel into slag. For domestic cathode material,
    substitutes are imports predominantly from Chinese suppliers (CNGR, Hunan Shanshan)
    and Korean producers (EcoPro, L&F). For anode copper foil, the domestic market
    was essentially non-existent before Redwood''s South Carolina campus; all supply
    came from South Korean and Japanese producers. Second-life energy storage competes
    with new LFP battery systems from CATL and BYD and domestic new-build storage
    projects.

    Adjacencies include direct lithium extraction (DLE) from brines, solid-state battery
    precursor supply, and battery-grade lithium carbonate/hydroxide production—areas
    where Redwood has made technical investments but not yet reached commercial scale.
    The European market (post-EU Battery Regulation 2027) represents a regulatory-driven
    adjacency that Redwood entered with its Redux acquisition but is treated as outside
    the primary North American SAM for this chapter.

    '
