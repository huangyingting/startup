- id: sizing-gaps
  title: Sizing and Adoption Diligence Gaps
  body: 'Multiple evidence gaps limit the precision of this market analysis. Redwood
    is private and does not disclose granular revenue, volume, or margin data by segment.
    Published analyst estimates for the North American battery recycling and materials
    market vary by 2–3x depending on scope and methodology. SNE Research''s $22B global
    figure by 2030 and IDTechEx''s more conservative $14.5B by 2033 cannot be directly
    reconciled without access to underlying models.

    The true long-run SOM for Redwood at full Nevada + South Carolina capacity depends
    on variables that are currently unknowable: the trajectory of lithium and nickel
    prices, the pace of OEM chemistry transitions from NMC to LFP, and the DOE ATVM
    loan draw-down schedule. The $2–5B annual revenue range for full capacity is directionally
    useful but carries wide uncertainty. The split of Redwood''s current revenue across
    business segments is not publicly disclosed; multiple secondary sources suggest
    ~$200M/year total but provide no segment breakdown.

    The specific recycled content percentages in Redwood''s current cathode output
    have not been independently verified—a key claim for circular economy marketing
    and customer certification. The impact of LFP battery growth on Redwood''s process
    economics is a material unresolved question: LFP cells contain no cobalt or nickel
    and require different hydrometallurgical processing. Conflicting market estimates
    are preserved in TM002 and should not be averaged without understanding scope
    differences. Diligence should prioritize direct access to Redwood''s segment-level
    financial projections and independent audits of material recovery rates.

    '
