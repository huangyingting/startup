- id: market-sizing
  title: 'Market Sizing: TAM, SAM, and SOM'
  body: 'Multiple independent sizing lenses converge on a large but contested market
    opportunity. The broadest framing—total global battery materials manufacturing—is
    estimated at $120–150B annually by 2030 (BloombergNEF), but this TAM is largely
    irrelevant to Redwood''s current capacity. A more relevant global figure is the
    lithium-ion battery recycling market alone: SNE Research estimates it reaches
    ~$22B by 2030 from ~$3B in 2022; MarketsandMarkets placed it at ~$17.6B by 2030
    (CAGR ~23%); IDTechEx projects a more conservative $14.5B by 2033. These figures
    are not reconciled because they use different scope definitions—some include only
    collection and processing, while others extend through refined material sales.

    For North America specifically, the SAM is more tractable. Combining the recycled
    battery materials market (~$5–7B by 2030, North America) with domestic CAM demand
    from US gigafactories (~$8–12B annually by 2030) and ACF demand (~$2–3B by 2030)
    yields a North American battery materials SAM of roughly $15–25B. The DOE''s National
    Blueprint for Lithium Batteries projects that the US will need 650,000 MT of lithium
    and 300,000 MT of nickel for domestic EV production through 2030, creating direct
    demand for the critical minerals Redwood recovers and refines.

    Redwood''s SOM is bounded by its physical capacity: the Nevada campus (target
    ~100 GWh/yr CAM) plus the South Carolina campus (target ~100 GWh/yr ACF) imply
    potential revenues of $2–5B annually at full build-out and current pricing—though
    lithium carbonate price declines of 80% from 2022 peaks compress this range materially.
    Conflicting estimates and the private nature of Redwood''s financials prevent
    precise SOM validation.

    '
