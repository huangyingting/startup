- id: growth-drivers
  title: Growth Drivers and Demand Catalysts
  body: 'Six structural drivers underpin demand for Redwood''s integrated offering.
    First, the Inflation Reduction Act (IRA) of 2022 is the single most important
    US policy catalyst. Section 30D required 40%+ domestic critical mineral content
    rising to 100% by 2028. Section 45X provides Advanced Manufacturing Production
    Credits for US-manufactured cathode and anode materials— directly monetizing Redwood''s
    CAM and ACF output. Section 48C extends investment tax credits to advanced energy
    manufacturing. Although the EV consumer tax credit (30D) was terminated September
    30, 2025 under the current administration, manufacturing incentives (45X, 48C)
    remain in force.

    Second, EV adoption in the US has created a growing installed base generating
    recycling feedstock. The IEA projects 26M EVs on US roads by 2030, up from ~6.5M
    through 2023. BloombergNEF estimates ~2M EV battery packs will require recycling
    in the US by 2030, with volume surging after 2027 as the first mass-market EV
    wave reaches end-of-life. Consumer electronics remain an important near-term feedstock
    bridge—EPA estimates 15 billion Li-ion cells are discarded in the US annually.

    Third, China decoupling policy has made supply chain resilience a national security
    imperative. The US currently imports 70%+ of cathode active material and 90%+
    of anode materials from China. Fourth, OEM battery sustainability mandates have
    created committed offtake demand. Ford, GM, Toyota, BMW, and Panasonic have all
    made battery circularity commitments and signed supply or take-back agreements
    with Redwood—creating recurring feedstock supply and material demand simultaneously.
    Fifth, the EU Battery Regulation (effective 2027) mandates minimum recycled content
    (16% cobalt, 6% lithium, 6% nickel by 2031). Sixth, the AI data center storage
    boom is an emerging demand catalyst for Redwood Energy—second-life EV packs offer
    40–60% cost savings versus new LFP systems on a per-kWh basis.

    '
