- id: buyer-segmentation
  title: Buyer Segmentation, Budget Ownership, and Adoption Path
  body: 'Redwood''s buyer landscape is segmented into five distinct personas with
    different budget ownership, procurement cycles, and adoption motivations.

    OEM and Tier 1 automotive buyers (Ford, GM, Toyota, BMW, Rivian, Panasonic) are
    the most strategically important. These organizations own two separate buying
    decisions: battery take-back contracts and material supply agreements purchasing
    Redwood''s CAM and ACF for new battery production. Budget ownership sits in supply
    chain and procurement, with sustainability teams holding strong influence. Decision
    cycles are 12–24 months for multi-year offtake, with IRA domestic content compliance
    acting as a forcing function. Ford''s ACF supply agreement and Panasonic''s CAM
    offtake are the clearest public examples.

    Cell manufacturers (Panasonic, Samsung SDI, LG Energy Solution, SK Innovation)
    purchase CAM and ACF as direct manufacturing inputs. These buyers have long procurement
    cycles (18–36 months for qualification). Their IRA 45X credit eligibility depends
    partly on sourcing materials from US producers like Redwood—creating financial
    alignment. Consumer electronics brands (Apple, Amazon, Dell) are battery take-back
    participants with ESG reporting obligations. Data center operators represent an
    emerging segment for Redwood Energy; Crusoe Energy''s multi-year agreement for
    second-life battery packs demonstrates commercial validation. The DOE and national
    labs function as policy-driven financing partners providing capital at below-market
    cost.

    '
