  evidenceGaps:
  - id: EGM001
    topic: segment-revenue-split
    type: private-evidence-only
    severity: material
    missingEvidence: Redwood's revenue breakdown by business segment is not publicly
      disclosed. Secondary sources provide total revenue estimates of approximately
      $200M per year but no segment-level attribution.
    whyItMatters: Without segment-level revenue, it is impossible to determine which
      product lines are margin-accretive and whether the integration thesis is economically
      sound.
    diligencePath: Request segment-level P&L from Redwood during diligence; cross-reference
      with DOE loan drawdown schedules which may have milestone-based revenue requirements.
    relatedQuestionRefs:
    - QM021
  - id: EGM002
    topic: offtake-agreement-terms
    type: private-evidence-only
    severity: blocking
    missingEvidence: Specific volumes, pricing formulas, and minimum take-or-pay commitments
      in Redwood's supply agreements with Ford, Panasonic, Toyota, and GM are not
      publicly available. Existence of agreements is confirmed; economics are not.
    whyItMatters: Offtake terms are the primary revenue visibility mechanism for a
      capital-intensive manufacturer. Without volume and price floors, SOM estimates
      are speculative and the company's ability to service DOE debt is unverifiable.
    diligencePath: Obtain redacted copies of material supply agreements; confirm whether
      any contain variable pricing tied to lithium spot market which would compound
      price risk.
    relatedQuestionRefs:
    - QM022
  - id: EGM003
    topic: som-at-full-capacity
    type: conflicting-data
    severity: material
    missingEvidence: The $2-5B annual revenue range at full Nevada plus SC capacity
      relies on commodity price and volume assumptions that are contested. Lithium
      carbonate's 80% price decline from 2022 peaks compresses the upper bound materially.
      No independent model reconciling capacity, chemistry mix, pricing, and yield
      has been published.
    whyItMatters: SOM is the key metric for evaluating whether Redwood's $6B+ valuation
      is supportable. A 2-3x range in SOM estimates reflects genuine uncertainty about
      the business at scale, not just analyst disagreement.
    diligencePath: Build bottom-up model using Nevada/SC nameplate capacity, current
      commodity prices, and comparable CAM/ACF producer margins such as EcoPro and
      L&F financials as proxies.
    relatedQuestionRefs:
    - QM023
  - id: EGM004
    topic: lfp-chemistry-transition-impact
    type: missing-source
    severity: material
    missingEvidence: No independent technical study quantifies the capital cost and
      process yield changes Redwood's hydrometallurgical process would require as
      LFP feedstock increases. LFP cells have no cobalt or nickel. Redwood has publicly
      acknowledged adapting its process but has not disclosed the economics.
    whyItMatters: If LFP reaches 40-50% of US EV batteries by 2030, Redwood's NMC-optimized
      process may require significant re-investment to maintain margins, and the value
      of recovered materials changes substantially.
    diligencePath: Commission independent process engineering assessment; review NREL
      and Argonne LFP recycling techno-economic analyses; request Redwood's internal
      LFP roadmap.
    relatedQuestionRefs:
    - QM024
  - id: EGM005
    topic: cathode-recycled-content-verification
    type: missing-source
    severity: minor
    missingEvidence: Redwood claims 95%+ mineral recovery rate from input batteries,
      but the fraction of recycled content in its CAM output as a percentage of total
      cathode material by mass has not been independently audited. This distinction
      matters for OEM certification under IRA and EU Battery Regulation.
    whyItMatters: OEM and cell manufacturer customers making public sustainability
      claims about recycled content percentages require audited figures. If Redwood's
      recycled content fraction is lower than implied, customer certification claims
      could face challenge.
    diligencePath: Request third-party material audit reports; verify whether any
      OEM customer has conducted independent material traceability audits of Redwood's
      cathode supply.
    relatedQuestionRefs:
    - QM025
  - type: private-evidence-only
    severity: minor
    topic: market-research
    missingEvidence: Table enumeration is partial due to limited public market data.
    whyItMatters: Incomplete market enumeration may miss emerging players.
    diligencePath: Industry reports and primary research can supplement public data.
    relatedTableRefs:
    - TM003
