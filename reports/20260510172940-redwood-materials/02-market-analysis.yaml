- id: adoption-constraints
  title: Adoption Constraints and Market Headwinds
  body: 'Several structural constraints limit the speed and certainty of Redwood''s
    market capture. Supply scarcity before 2028 is the most immediate operational
    constraint. EV batteries have a typical lifespan of 8–15 years; the first mass-market
    EVs sold in 2015–2017 are only now reaching retirement age. BloombergNEF estimates
    that sufficient feedstock for large-scale US recycling operations may not materialize
    until 2027–2028. Until then, Redwood must rely on manufacturing scrap and consumer
    electronics—lower-margin feedstock with less consistent chemistry.

    Lithium price volatility has severely compressed recycling economics. Lithium
    carbonate prices peaked near $80,000/MT in late 2022 before collapsing to under
    $15,000/MT by early 2024—an 80%+ decline. This dramatically reduced the value
    of the recovered lithium stream, which had been a primary margin driver in recycling
    economics. Nickel and cobalt prices also declined. The lower price environment
    favors virgin mining over recycled material on pure cost basis, requiring Redwood
    to compete on supply security and regulatory compliance rather than pure price.

    Capital intensity creates both a barrier to entry and a constraint on Redwood
    itself. The South Carolina campus phase 1 alone required approximately $3.5B in
    investment. Scaling to full capacity requires the DOE ATVM $2B loan to be drawn
    on schedule, contingent on construction milestones that may face delays given
    the April 2026 restructuring and workforce reduction.

    IRA headwinds, chemistry transition risk, and Chinese competition compound these
    challenges. The LFP chemistry transition is a multi-year threat—LFP contains no
    cobalt or nickel, dramatically changing the recycled material value profile. CATL
    (via Brunp Recycling) and GEM Co. operate at massive scale with lower cost structures.
    Competitor failures (Li-Cycle, Ascend Elements) demonstrate the capital and feedstock
    risks at pre-commercial scale.

    '
