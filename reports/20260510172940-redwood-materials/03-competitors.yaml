company:
  name: "Redwood Materials"
chapter:
  number: 3
  title: "Competitors"
  summary: >-
    Redwood Materials operates with claimed approximately 90% North American Li-ion battery
    recycling share and faces a fragmented competitive landscape. Direct North American peers
    (Li-Cycle, Ascend Elements) have both filed for bankruptcy protection in 2023 and 2026
    respectively, validating capital intensity and timing risk. The dominant incumbent is Umicore
    (Belgium), which operates at global scale via pyrometallurgy and produces CAM but focuses on
    Europe and Korea. CATL and affiliated Chinese entities are the most credible long-term threat
    but face regulatory and geopolitical barriers to North American competition. Cirba Solutions
    is the most relevant surviving North American alternative, though it focuses on recycling
    without downstream CAM integration. Redwood's moat rests on scale, OEM supply agreements,
    integration from recycling to CAM, and the DoE loan and regulatory relationship. The moat is
    meaningful but not invincible: technology shifts, Chinese cost competition, and regulatory
    policy risk all pose material displacement threats.

sections:
  - id: landscape-overview
    title: Competitive Landscape Overview
    body: >-
      The competitive landscape for Redwood Materials spans five categories: (1) direct North American
      Li-ion battery recyclers — Cirba Solutions, Li-Cycle (Chapter 11), and Ascend Elements (Chapter 11);
      (2) incumbent global battery material suppliers — Umicore, BASF, Sumitomo Metal Mining — who
      provide the primary status-quo substitute via virgin-mined or pyrometallurgically processed materials;
      (3) Chinese integrated players — CATL's BRUNP Recycling affiliate and GEM Co. — who dominate Asian
      recycling and are expanding globally; (4) potential in-house recyclers — battery manufacturers
      including Panasonic, Samsung SDI, and LG Energy Solution who currently supply scrap to Redwood but
      could internalize recycling as volumes grow; and (5) the status quo of landfill and export, which
      remains legal in many jurisdictions and requires no capital investment. Redwood is differentiated by
      its integrated model from collection through CAM production, its scale (20+ GWh processed annually),
      and its OEM partnership network that creates bilateral supply security. The two North American direct
      competitors that attempted a similar approach (Ascend Elements and Li-Cycle) have both entered
      bankruptcy proceedings, suggesting that Redwood's early mover advantage and capital access have
      created a structural separation from followers.
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
      - CP005
      - CP006
      - CP007
    tableRefs:
      - TP001
    figureRefs:
