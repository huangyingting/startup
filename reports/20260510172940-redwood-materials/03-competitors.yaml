tables:
  - id: TP001
    title: Competitor profile table
    notes: >-
      Li-Cycle and Ascend Elements data reflects pre-bankruptcy status. Pricing data is not publicly
      disclosed for any competitor. CATL/BRUNP data reflects Chinese operations primarily.
    columns:
      - Competitor
      - Category
      - Scale and Funding
      - Target Segment
      - Key Differentiation
      - Limitation vs Redwood
    rows:
      - - Redwood Materials (reference)
        - Integrated recycler and CAM producer
        - ">20 GWh/yr; $2.3B+ raised; DoE $2B conditional loan; valuation ~$6B"
        - NA auto OEMs; cell manufacturers; energy storage
        - Full loop from EOL battery to recycled CAM; 90% claimed NA share; 95% recovery efficiency
        - Dual layoff rounds in 2025-2026; COO exit; EV demand slowdown exposure
      - - Cirba Solutions
        - Pure recycler; multi-chemistry
        - Private; operates in 10+ North American facilities; no public revenue
        - Multi-chemistry battery recyclers; waste management; OEMs
        - Multi-chemistry coverage including lead-acid; established collection network
        - No CAM production; lower Li-ion integration; limited public transparency
      - - Li-Cycle Holdings
        - Pure Li-ion hydromet recycler (Chapter 11)
        - Raised ~$600M; NYSE listed; Chapter 11 filed October 2023; Rochester Hub paused
        - North American OEMs; Li-ion manufacturers
        - Spoke-hub model for logistics efficiency; hydrometallurgical processing
        - Chapter 11; Rochester Hub paused; demonstrated capital and timing risk
      - - Ascend Elements
        - Recycler and cathode precursor producer (Chapter 11)
        - Raised ~$300-400M; Chapter 11 filed April 2026
        - Cell manufacturers; battery material buyers
        - Cathode precursor production from recycled materials; similar model to Redwood
        - Chapter 11; failed to reach scale; demonstrates execution and capital risk
      - - Umicore
        - Global incumbent; pyrometallurgical recycler and CAM producer
        - Revenue ~$4B+; publicly listed (Euronext Brussels); decades of operations
        - European and Korean OEMs; global cell manufacturers
        - Scale; established CAM customer relationships; EU regulatory track record
        - Pyrometallurgy limits recovery efficiency vs hydromet; European focus
      - - CATL and BRUNP Recycling
        - Integrated battery manufacturer and recycler (Chinese)
        - CATL revenue >$40B; BRUNP is majority CATL-affiliated; massive scale in China
        - Chinese EV OEMs; Chinese cell manufacturers; expanding globally
        - Full vertical integration from recycling to cell manufacturing; cost leadership
        - Primarily China-based; regulatory and geopolitical barriers to NA market
      - - Virgin Material Suppliers (status quo)
        - Upstream miners and refiners
        - Albemarle, SQM (lithium); Glencore (cobalt); Vale, Norilsk Nickel (nickel); massive scale
        - Cell manufacturers; battery material buyers globally
        - Established supply chains; no EOL battery logistics complexity; known quality
        - No recycling economics; China-dependent refining; supply-chain security concern

