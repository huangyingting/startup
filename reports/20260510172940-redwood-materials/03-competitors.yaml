  claims:
    - id: CP001
      statement: >-
        The competitive landscape for Redwood Materials spans five categories: direct North American
        Li-ion battery recyclers, incumbent global battery material suppliers representing the status-quo
        substitute, Chinese integrated players, potential in-house recyclers among battery manufacturers,
        and the status quo of landfill and export.
      type: inferred
      confidence: medium
      freshness: current
      topic: competitive-landscape
      sourceRefs:
        - SP001
        - SP018
      answersQuestionRefs:
        - QP001
    - id: CP002
      statement: >-
        Direct North American Li-ion battery recycling competitors include Cirba Solutions (the most
        relevant surviving competitor), Li-Cycle Holdings (filed Chapter 11 in October 2023 after
        pausing its Rochester Hub), and Ascend Elements (filed Chapter 11 in April 2026). As of May
        2026, only Cirba Solutions remains operationally active among Redwood's direct North American peers.
      type: third-party-reported
      confidence: high
      freshness: current
      topic: competitive-landscape
      sourceRefs:
        - SP002
        - SP003
        - SP011
      answersQuestionRefs:
        - QP002
        - QP018
    - id: CP003
      statement: >-
        The primary status-quo substitutes for Redwood's recycled battery materials are virgin-mined and
        refined critical minerals from Albemarle and SQM (lithium), Glencore (cobalt), Vale and Norilsk
        Nickel (nickel), and processed CAM from Umicore, BASF, and Sumitomo Metal Mining. These companies
        represent decades of established supply-chain relationships with cell manufacturers.
      type: third-party-reported
      confidence: medium
      freshness: current
      topic: substitutes
      sourceRefs:
        - SP001
        - SP019
      answersQuestionRefs:
        - QP003
    - id: CP004
      statement: >-
        Chinese competitors including CATL's BRUNP Recycling affiliate and GEM Co. operate large-scale
        battery recycling in China, benefiting from integrated battery manufacturing-to-recycling supply
        chains. CATL is the world's largest battery manufacturer with revenue exceeding $40 billion,
        making BRUNP the most formidable potential long-run competitive threat globally.
      type: third-party-reported
      confidence: medium
      freshness: recent
      topic: chinese-competitors
      sourceRefs:
        - SP013
        - SP019
      answersQuestionRefs:
        - QP017
    - id: CP005
      statement: >-
        The status-quo substitute of landfilling and exporting end-of-life batteries remains legally
        available in many jurisdictions and requires no capital investment, representing the lowest-cost
        short-term option for OEMs without EPR mandates or ESG commitments requiring responsible disposal.
      type: inferred
      confidence: medium
      freshness: current
      topic: substitutes
      sourceRefs:
        - SP019
        - SP025
      answersQuestionRefs:
        - QP003
        - QP018
    - id: CP006
      statement: >-
        Battery manufacturers including Panasonic, Samsung SDI, and LG Energy Solution currently supply
        manufacturing scrap to Redwood under processing agreements, but could internalize recycling as
        volumes grow and the economics improve. These manufacturers are potential entrants who already
        have the chemistry expertise and supply-chain relationships.
      type: inferred
      confidence: medium
      freshness: current
      topic: likely-entrants
      sourceRefs:
        - SP015
        - SP016
      answersQuestionRefs:
        - QP001
    - id: CP007
      statement: >-
        Redwood claims approximately 90% of North American lithium-ion battery recycling volume as of
        2025. The Chapter 11 filings of Li-Cycle and Ascend Elements have reduced the number of credible
        funded competitors to one (Cirba Solutions), potentially increasing this concentration further.
      type: company-claimed
      confidence: medium
      freshness: recent
      topic: market-position
      sourceRefs:
        - SP015
        - SP025
      answersQuestionRefs:
        - QP025
        - QP002
    - id: CP008
      statement: >-
        Li-Cycle Holdings, once the leading North American pure-play lithium-ion battery recycler, paused
        construction on its Rochester Hub hydrometallurgical processing facility in 2023 after cost overruns
        and insufficient feedstock committed, and filed for Chapter 11 bankruptcy protection in October 2023.
        Li-Cycle was publicly listed on NYSE, raising approximately $600 million total, making its failure
        a validated data point on capital intensity and timing risk.
      type: third-party-reported
      confidence: high
      freshness: current
      topic: competitor-profiles
      sourceRefs:
        - SP003
        - SP002
      answersQuestionRefs:
        - QP005
        - QP016
    - id: CP009
      statement: >-
        Ascend Elements, formerly Battery Resources, focused on producing recycled cathode active material
        — the model most similar to Redwood's integrated recycling-to-CAM approach — and filed for Chapter
        11 bankruptcy protection in April 2026 despite having raised approximately $300-400 million in venture
        and project financing. Its failure directly validates capital intensity and timing risk for Redwood's
        business model.
      type: third-party-reported
      confidence: high
      freshness: current
      topic: competitor-profiles
      sourceRefs:
        - SP009
        - SP011
      answersQuestionRefs:
        - QP007
        - QP016
    - id: CP010
      statement: >-
        Cirba Solutions, formed from the merger of Retriev Technologies and Battery Solutions, is the most
        relevant surviving North American battery recycling competitor. It operates across 10+ North American
        facilities and processes multiple battery chemistries including Li-ion, NiMH, and lead-acid. It does
        not produce CAM, making it a recycling-only competitor that does not replicate Redwood's full model.
      type: third-party-reported
      confidence: medium
      freshness: current
      topic: competitor-profiles
      sourceRefs:
        - SP010
        - SP018
      answersQuestionRefs:
        - QP004
        - QP008
    - id: CP011
      statement: >-
        Umicore is the dominant global incumbent in battery recycling and CAM production, operating large-scale
        pyrometallurgical recycling in Belgium and Korea, producing CAM at global scale, and holding long-term
        supply agreements with major battery manufacturers. Umicore's revenue exceeds €4 billion annually,
        dwarfing Redwood's current $200 million, though Umicore's primary market is Europe and Korea rather
        than North America.
      type: third-party-reported
      confidence: medium
      freshness: recent
      topic: competitor-profiles
      sourceRefs:
        - SP001
        - SP013
      answersQuestionRefs:
        - QP006
        - QP009
    - id: CP012
      statement: >-
        CATL's BRUNP Recycling affiliate operates large-scale battery recycling in China, integrated with
        CATL's cell manufacturing at massive scale. CATL is the world's largest battery manufacturer by
        volume; BRUNP's integration into CATL's supply chain gives it structural cost advantages unavailable
        to standalone recyclers. CATL has stated ambitions to expand globally.
      type: third-party-reported
      confidence: medium
      freshness: recent
      topic: competitor-profiles
      sourceRefs:
        - SP013
        - SP004
      answersQuestionRefs:
        - QP017
    - id: CP013
      statement: >-
        Redwood's integrated model from EOL battery collection through CAM production and back to cell
        manufacturers is its primary competitive differentiator. No other North American competitor
        currently operates this full value chain at commercial scale. Umicore operates a comparable
        model but primarily in Europe.
      type: inferred
      confidence: medium
      freshness: current
      topic: differentiation
      sourceRefs:
        - SP015
        - SP016
      answersQuestionRefs:
        - QP013
        - QP009
    - id: CP014
      statement: >-
        Virgin-mined battery materials from established suppliers including Albemarle (lithium), Glencore
        (cobalt), and Vale (nickel) represent the economic baseline against which recycled materials are
        priced. With lithium prices having fallen approximately 80% from 2022 peaks, the cost advantage
        of recycling versus virgin mining has compressed, reducing one of the economic motivations for
        choosing recycled materials.
      type: third-party-reported
      confidence: medium
      freshness: recent
      topic: substitutes
      sourceRefs:
        - SP018
        - SP019
      answersQuestionRefs:
        - QP003
        - QP015
    - id: CP015
      statement: >-
        Li-Cycle's Rochester Hub failure illustrates the specific failure mode of battery recycling at
        scale: a hub-and-spoke model requires sufficient committed feedstock at the hub before construction
        begins, and construction cost overruns compound the risk. Li-Cycle raised approximately $600 million
        before Chapter 11, underscoring the capital intensity.
      type: third-party-reported
      confidence: high
      freshness: current
      topic: competitor-profiles
      sourceRefs:
        - SP003
        - SP002
      answersQuestionRefs:
        - QP005
        - QP016
    - id: CP016
      statement: >-
        Hydrometallurgical processing, used by Redwood and (pre-Chapter 11) Li-Cycle, achieves approximately
        70-95% material recovery depending on process maturity, versus approximately 50-70% for pyrometallurgical
        processing used by Umicore. The recovery gap creates a meaningful per-unit economics advantage at
        scale for hydromet processors, though hydromet requires higher capital investment per unit of capacity.
      type: third-party-reported
      confidence: medium
      freshness: current
      topic: technology-comparison
      sourceRefs:
        - SP001
        - SP002
      answersQuestionRefs:
        - QP021
        - QP008
    - id: CP017
      statement: >-
        CAM production capability is the key downstream differentiator among battery recyclers. Cirba
        Solutions, Li-Cycle, and most other North American recyclers stop at recovered minerals or black
        mass sale. Redwood and Umicore produce CAM directly, capturing the higher-value downstream margin
        and creating stronger customer lock-in through product qualification cycles.
      type: inferred
      confidence: medium
      freshness: current
      topic: differentiation
      sourceRefs:
        - SP001
        - SP010
      answersQuestionRefs:
        - QP017
        - QP008
    - id: CP018
      statement: >-
        Cirba Solutions' advantage over Redwood is its multi-chemistry collection network, which handles
        lead-acid, NiMH, and Li-ion batteries from consumer electronics and automotive segments. This
        breadth gives Cirba a larger absolute collection network and established relationships with waste
        management companies, but does not translate to the high-value automotive Li-ion segment.
      type: inferred
      confidence: medium
      freshness: current
      topic: competitor-profiles
      sourceRefs:
        - SP010
        - SP018
      answersQuestionRefs:
        - QP008
    - id: CP019
      statement: >-
        Umicore has decades of established regulatory relationships in Europe and Korea, holds process
        patents for battery recycling and CAM production, and has deep customer relationships with major
        European and Korean battery manufacturers. Its established position in the EU regulatory environment
        is a competitive advantage for European market access that Redwood would need time and capital to
        replicate if it expanded to Europe beyond Redux.
      type: third-party-reported
      confidence: medium
      freshness: current
      topic: competitor-profiles
      sourceRefs:
        - SP001
        - SP019
      answersQuestionRefs:
        - QP009
        - QP019
    - id: CP020
      statement: >-
        Redwood claims approximately 95% material recovery efficiency in its hydrometallurgical process,
        compared to approximately 60-70% for pyrometallurgical processes used by Umicore. This recovery
        gap translates to significant per-unit economics advantage at scale: if Redwood processes 20 GWh
        at 95% vs a pyromet competitor at 65%, the recovered material revenue difference is approximately
        30% per unit processed. The 95% figure is company-claimed and has not been independently audited.
      type: estimated
      confidence: medium
