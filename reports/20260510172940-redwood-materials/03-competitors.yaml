  - id: moat-durability
    title: Moat Durability and Displacement Risks
    body: >-
      Redwood's competitive moat rests on five pillars: scale economies (20+ GWh/yr with $4B+ deployed
      capital), OEM supply agreements, CAM integration, regulatory relationships and DoE loan, and
      geographic positioning. Each pillar has associated displacement risks. Scale moat is validated by
      the Chapter 11 filings of Li-Cycle and Ascend Elements — competitors who attempted similar models
      with less capital and timing advantages failed to reach breakeven. However, scale moats require
      continued volume growth; if EV demand remains suppressed (as in 2025-2026), fixed costs become
      a burden rather than an advantage. The COO exit and dual layoff rounds in 2025-2026 are adverse
      signals suggesting the company is operating below its planned utilization. Technology displacement
      risk is real but medium-term: solid-state batteries and LFP chemistry shifts could require capital
      reinvestment in process adaptation. Chinese cost competition from CATL and GEM Co. is the most
      significant long-run threat; Chinese recyclers benefit from integrated supply chains and lower
      capital and labor costs, but face regulatory and geopolitical barriers to North American market
      access that may persist for a decade. Commoditization risk in recycling processing itself —
      where the technology becomes standardized and margins compress as more players enter — is a
      structural risk over a 5-10 year horizon as feedstock volumes grow and new capital enters.
      Redwood's most durable competitive advantages are (1) the OEM partnership network with bilateral
      volume commitments, (2) the CAM qualification relationships with cell manufacturers, and (3) the
      physical assets and environmental permits already in place — all of which take years to replicate.
    claimRefs:
      - CP030
      - CP031
      - CP032
      - CP033
      - CP034
