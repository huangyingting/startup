  - id: capability-comparison
    title: Capability and Feature Comparison
    body: >-
      The key capability dimensions in battery recycling differentiation are: collection network
      and logistics, processing technology and recovery efficiency, downstream CAM production,
      geographic coverage, OEM partnership depth, and regulatory/environmental compliance track
      record. Redwood leads on recovery efficiency (95% claimed), CAM production integration,
      North American geographic coverage aligned with U.S. automotive OEM locations, and OEM
      partnership breadth (Ford, Toyota, GM, VW, BMW, Volvo, Rivian, Amazon). Umicore leads on
      global scale, established regulatory relationships in Europe, and deep CAM production
      history with decades of customer relationships. Cirba Solutions leads on collection
      network breadth and multi-chemistry capability (including lead-acid) but lags on
      recovery efficiency and has no CAM production. Li-Cycle's spoke-hub model demonstrated
      efficient logistics but failed at the central hub processing stage. CATL/BRUNP has the
      deepest vertical integration globally but operates primarily in China. The most critical
      differentiator for Redwood's OEM customers is the ability to provide a closed-loop
      domestic supply solution: collect EOL batteries, recover minerals, and return recycled
      CAM to the same customer for new battery production. Only Redwood and Umicore currently
      operate this full loop at meaningful scale, and Umicore's loop is primarily European.
      Redwood's 95% claimed recovery efficiency versus approximately 60-70% for pyrometallurgical
      processes used by Umicore and others is a meaningful economic advantage at scale, though the
      95% figure has not been independently audited.
    claimRefs:
      - CP016
      - CP017
      - CP018
      - CP019
