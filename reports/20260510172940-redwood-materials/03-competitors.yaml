  - id: TP003
    title: Pricing / packaging comparison
    notes: >-
      No competitor publicly discloses processing fees or contract terms. Pricing data is either
      company-claimed without verification or estimated from industry context. Actual contract
      terms are trade secrets in all cases.
    columns:
      - Competitor
      - Revenue Model
      - Pricing Mechanism
      - Key Unknown
      - Implication
    rows:
      - - Redwood Materials
        - Dual-sided — processing fee from OEMs for collection; material sale revenue from CAM customers
        - Processing fee (or material credit) per kg; CAM sale at spot-adjacent price
        - Actual processing fee rates and CAM pricing are not publicly disclosed
        - Full value-chain capture; exposed to commodity price on both revenue streams
      - - Cirba Solutions
        - Service fee model — charges OEMs and waste generators per kg or per unit
        - Processing fee per kg battery material; no downstream material sale publicly disclosed
        - Total revenue, processing fee rates, and margin are not public
        - Simpler model but leaves downstream material margin on table vs Redwood
      - - Umicore
        - Material sale model — charges for processing (smelting fee) but earns primary revenue from metal sale
        - Smelting fee plus metal revenue at LME prices; published in annual reports
        - North American pricing and contract terms not disclosed (European market focus)
        - Well-established but margin compressed by pyromet vs hydromet efficiency gap
      - - Li-Cycle (pre-Chapter 11)
        - Service and material model — processing fee plus recovered metal sale
        - Spoke fee per kg plus hub metal revenue; disclosed in SEC filings before pause
        - Model failed due to insufficient feedstock at Rochester Hub and construction overruns
        - Chapter 11 demonstrates that fee-plus-metal model requires sufficient feedstock and hub cost discipline
      - - Virgin Material Suppliers
        - Commodity sale model — sell at spot LME prices for Li, Co, Ni, Mn
        - Spot or long-term contract at LME-linked price; Albemarle and SQM are publicly traded
        - Refining margin not relevant to buyer; buyer cares about delivered price vs recycled material
        - Domestic recycled material must price at or below comparable refined imported material

  - id: TP004
    title: Moat durability / competitive risk register
    notes: >-
      Moat assessments are evidence-based but partially inferred. Severity ratings are analyst
      judgment based on available information. Diligence asks highlight gaps requiring primary research.
    columns:
      - Moat Claim
      - Threat
      - Severity
      - Mitigation or Diligence Ask
    rows:
      - - Scale and first-mover advantage in North American Li-ion recycling
        - New entrants with lower capital cost or government support (e.g. EU or allied-nation programs)
        - Medium
        - Assess barriers to entry and time to replicate 20+ GWh capacity; model greenfield cost
      - - OEM supply agreements creating bilateral lock-in
        - OEMs internalize recycling or switch to vertically integrated cell manufacturers
        - Medium
        - Obtain agreement terms and durations; assess renewal risk as EV fleet matures
      - - Integration from recycling to CAM production
        - Direct recycling technology achieves commercial scale; reduces need for full hydromet
        - Medium
        - Track direct recycling commercial progress; assess Redwood's process adaptability
      - - DoE ATVM loan competitive advantage on capital cost
        - Policy change, loan condition failure, or DoE cancellation of conditional commitment
        - High
        - Confirm DoE loan current status and conditions; assess political and execution risk
      - - Regulatory and environmental permit accumulation
        - Regulatory change or compliance failure; permitting delays for expansion
        - Low
        - Review Redwood's environmental compliance record and permit status for SC expansion
      - - Chinese cost competition from CATL and GEM Co.
        - CATL establishes North American recycling facility or acquires a competitor
        - High (long-term)
        - Monitor CATL North American investment activity; assess geopolitical restriction durability

