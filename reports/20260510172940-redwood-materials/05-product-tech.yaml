  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "Independent verification of Redwood CAM electrochemical performance"
      missingEvidence: >-
        No independent third-party characterization or electrochemical performance testing
        of Redwood Materials' commercial NMC 811 CAM product has been publicly published.
        The only validation is the continuation of the Panasonic supply relationship.
      whyItMatters: >-
        Without independent performance data, it is impossible to assess whether Redwood's
        CAM meets the full range of battery cell manufacturer specifications for cycle life,
        thermal stability, and rate capability—not just the initial quality gate.
      diligencePath: >-
        Request quality control records, customer acceptance certificates, and independent
        laboratory characterization data from Redwood under NDA. Commission an independent
        electrochemical evaluation of commercial product samples.
      relatedQuestionRefs:
        - QE011
        - QE026

    - type: missing-source
      severity: material
      topic: "Panasonic CAM supply agreement volume and pricing terms"
      missingEvidence: >-
        The commercial terms of the Redwood-Panasonic CAM supply agreement—including volume
        commitments, pricing mechanisms, and contract duration—have not been publicly disclosed.
        This is the company's primary commercial CAM revenue relationship.
      whyItMatters: >-
        Without pricing and volume terms, it is impossible to assess the revenue contribution
        of the Panasonic relationship, the pricing power Redwood holds, or the revenue risk
        if Panasonic diversifies its CAM supply.
      diligencePath: >-
        Request supply agreement commercial terms under NDA. Review Panasonic Energy US
        SEC filings and annual reports for any disclosed supply relationship details.
      relatedQuestionRefs:
        - QE012
        - QE014

