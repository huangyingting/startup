company:
  name: Redwood Materials
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Redwood Materials has built a vertically integrated battery materials technology stack
    spanning collection logistics, hydrometallurgical processing, critical mineral refining,
    cathode active material (CAM) manufacturing, and anode copper foil (ACF) production.
    The core technology differentiator is its end-to-end hydrometallurgical process that
    achieves greater than 95% recovery of lithium, nickel, cobalt, and copper from
    mixed battery chemistries without the pre-sorting required by pyrometallurgical
    competitors. Redwood holds over 300 patents and patent applications covering
    specific process innovations in leaching chemistry, direct lithium recovery, and
    CAM precursor synthesis. The Nevada campus integrates all five production steps
    on a single site, creating logistics and yield advantages. Key technology risks
    include: scale-up from pilot to gigafactory volumes (often where proprietary
    processes encounter unforeseen engineering challenges), chemistry transition risk
    as battery cells shift from NMC to LFP and sodium-ion, and process IP defensibility
    as the hydromet process becomes more widely understood.

sections:
  - id: SE-process-overview
    title: End-to-End Hydrometallurgical Process Stack
    body: >-
      Redwood Materials' technology architecture is best understood as five sequential
      process steps that together convert end-of-life batteries and manufacturing scrap
      into battery-grade materials ready for cell manufacturing. Step 1 is collection and
      logistics: Redwood operates a take-back network that aggregates batteries from EV OEMs,
      consumer electronics brands, and battery manufacturers, processing over 20 GWh
      equivalent of material annually as of 2024. Step 2 is mechanical processing and
      black-mass production: batteries are discharged, disassembled, shredded, and processed
      to produce black mass (the mixed powder containing cathode and anode active materials,
      copper foil, and electrolyte residues). Step 3 is hydrometallurgical refining: black
      mass is dissolved in acid solutions, and lithium, nickel, cobalt, manganese, and copper
      are selectively separated and purified using solvent extraction, ion exchange, and
      direct lithium recovery (DLR) proprietary processes. Step 4 is CAM synthesis: purified
      nickel, cobalt, and manganese sulfates are combined with lithium to produce cathode
      precursor (pCAM) and then sintered to produce finished NMC 811 cathode active material
      at battery grade. Step 5 is ACF production: recycled copper recovered in the refining
      stage is further purified and electrodeposited to produce anode copper foil at the
      required 6-8 micron thickness for battery cells. The integration of all five steps
      on the Nevada campus eliminates the logistics cost and material loss between process
      steps, which Redwood estimates provides a 15-20% yield advantage over disaggregated
      supply chains.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
    tableRefs:
      - TE001
    figureRefs:
      - FE001

  - id: SE-hydromet-differentiation
    title: Hydrometallurgical Process Differentiation vs. Pyrometallurgy
    body: >-
      The fundamental technology choice in battery recycling is between pyrometallurgical
      (pyro) and hydrometallurgical (hydromet) processing. Pyrometallurgical processes
      smelt battery materials at high temperatures, recovering cobalt and nickel as alloys
      but losing lithium (which volatilizes) and requiring energy-intensive acid leaching
      to recover other metals. Hydrometallurgical processes dissolve battery materials in
      aqueous solutions and use chemical separation to recover each metal individually.
      Redwood's process is hydromet-first: it achieves greater than 95% lithium recovery,
      which is critical as lithium becomes the key cost driver in NMC 811 and LNMO
      cathode chemistries. The company's direct lithium recovery (DLR) technology, which
      selectively extracts lithium from the leachate without the traditional lime precipitation
      step, is a key proprietary innovation that reduces reagent cost and improves lithium
      purity. Redwood's chemistry is also chemistry-agnostic: it can process NMC (111,
      532, 622, 811), LFP, NCA, and cobalt oxide chemistries in the same facility, providing
      a feedstock flexibility advantage over competitors optimized for specific cathode types.
      This matters because the battery chemistry mix is shifting: LFP is growing rapidly
      (from near-zero to over 30% of global EV battery production by 2024) and sodium-ion
      is emerging, creating uncertainty about future feedstock chemistry profiles.
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
    tableRefs:
      - TE002
    figureRefs:
      - FE002

  - id: SE-cam-acf-products
    title: CAM and ACF Product Specifications and Customer Requirements
    body: >-
      Redwood's two finished product lines—cathode active material (CAM) and anode copper
      foil (ACF)—are the highest-value outputs of the integrated process. For CAM, Redwood
      primarily produces NMC 811 (nickel-manganese-cobalt in 80-10-10 ratio), which is the
      dominant chemistry for high-energy-density EV applications including Tesla's 2170 cells
      and Panasonic's cells for the Model Y and Model 3. NMC 811 CAM must meet battery-grade
      specifications including particle size distribution (D50 of 10-12 microns), specific
      surface area (0.2-0.5 m2/g), and electrochemical performance (capacity > 185 mAh/g,
      capacity retention > 80% at 100 cycles). Redwood's commercial CAM deliveries to
      Panasonic Energy represent validation of its ability to meet these specifications at
      commercial volumes. For ACF, Redwood produces copper foil at 6, 7, and 8 micron
      thicknesses for anode applications, competing with established Korean and Japanese
      ACF producers (Iljin Materials, SKC, Furukawa Electric). ACF requires exceptional
      dimensional uniformity and tensile strength at ultra-thin gauges, which requires
      proprietary electrodeposition process control. Redwood's differentiation in ACF is
      the use of recycled copper as feedstock, which provides the IRA domestic content
      advantage and potentially a cost advantage if recycled copper is cheaper than virgin
      copper on a net basis after refining costs.
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015
    tableRefs:
      - TE003
    figureRefs:
      - FE003

  - id: SE-ip-portfolio
    title: Intellectual Property Portfolio and Defensibility
    body: >-
      Redwood Materials holds over 300 patents and patent applications covering specific
      innovations across its process stack. Key patent clusters include: (1) direct lithium
      recovery from battery leachate solutions; (2) multi-chemistry black-mass processing
      without pre-sorting; (3) CAM precursor synthesis from mixed-metal sulfate solutions
      with specific morphology control; and (4) ACF electrodeposition process parameters for
      thin-gauge foil with controlled crystallographic texture. The company has also filed
      patents on specific process optimizations developed during the scale-up from pilot to
      commercial operations at the Nevada campus. IP defensibility for hydrometallurgical
      battery recycling is challenging: the fundamental chemistry (acid leaching, solvent
      extraction) is well-established in mining and has been used for decades in cobalt and
      lithium refining. Redwood's IP advantage lies in the specific process configurations
      and optimizations for battery-origin feedstocks, which differ from virgin ore in
      impurity profiles, particle size, and oxidation state. Academic groups at Argonne
      National Laboratory (ReCell Center), Oak Ridge National Laboratory, and several
      universities have published extensively on battery recycling chemistry, creating a
      growing body of prior art that could constrain the scope of Redwood's future patent
      claims. The company's most defensible IP position is arguably its process know-how
      (accumulated learning from processing over 20 GWh of batteries) rather than its
      formal patent portfolio.
    claimRefs:
      - CE016
      - CE017
      - CE018
      - CE019
      - CE020
    tableRefs:
      - TE004
    figureRefs:
      - FE004

  - id: SE-scale-tech-risks
    title: Technology Scale-Up Risks and Chemistry Transition
    body: >-
      Redwood's primary near-term technology risk is scale-up from demonstrated pilot volumes
      to the 100 GWh per year target capacity at the Nevada campus. The hydrometallurgical
      process involves dozens of interdependent unit operations (crushing, leaching, solvent
      extraction, crystallization, sintering) where process performance at commercial scale
      often differs from pilot results due to heat management, residence time, reagent mixing,
      and equipment reliability. Li-Cycle's Rochester Hub—which used a similar hydromet
      approach—encountered precisely these scale-up challenges, with construction cost
      overruns attributed in part to process engineering complications at commercial scale.
      Redwood's most significant medium-term technology risk is chemistry transition: if the
      battery cell chemistry mix shifts rapidly toward LFP (lithium iron phosphate), which
      contains no cobalt or nickel, the economic model for battery recycling changes
      fundamentally. LFP black mass contains lithium and iron but none of the high-value
      cobalt and nickel that make NMC recycling economically attractive. Industry analysts
      project LFP's share of global EV battery installations could reach 40-50% by 2030,
      which would reduce the average recoverable value per kWh of battery recycled. Redwood
      has acknowledged this risk and has invested in process chemistry for LFP recycling,
      but the unit economics of LFP recycling remain significantly below NMC recycling.
    claimRefs:
      - CE021
      - CE022
      - CE023
      - CE024
      - CE025
    tableRefs:
      - TE005
    figureRefs:
      - FE005

