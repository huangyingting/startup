tables:
  - id: TI001
    title: Revenue streams table
    notes: >-
      All revenue figures and splits are company estimates or analyst estimates from public
      sources; Redwood has not published audited financial statements. CAM pricing tracks
      battery-grade commodity markets and fluctuates with lithium, cobalt, and nickel spot prices.
    columns:
      - Revenue Stream
      - Mechanism
      - Unit
      - Current Value or Status
      - Quality
      - Diligence Ask
    rows:
      - - Battery processing fees
        - OEMs and battery manufacturers pay per kg processed for collection and recycling services
        - Processing fee per kg battery material
        - "Active — rate not disclosed; implied ~$200M/yr combined with CAM revenue"
        - Company-claimed (CEO $200M total 2024 revenue; stream split unknown)
        - Obtain processing fee rate per kg; determine if indexed to recovered material commodity price
      - - Cathode active material sales
        - Recycled CAM sold to cell manufacturers (Panasonic, Samsung SDI) at spot-adjacent price
        - USD per kg CAM delivered
        - Active — volumes not disclosed; pricing tracks lithium carbonate and NMC market
        - Estimated; no public CAM pricing or volume data
        - Obtain CAM volume sold; pricing terms; spot vs long-term contracted; margin per kg
      - - Redwood Energy second-life storage
        - Second-life EV battery packs deployed for AI data center and grid storage
        - Lease or PPA agreement per site or per MWh capacity deployed
        - Early-stage — launched June 2025; deployed at undisclosed data center sites
        - Early-stage; pre-revenue scale; model not fully disclosed
        - Confirm revenue model (PPA vs lease vs sale); pipeline and MWh deployed as of 2026
      - - IRA 45X production tax credit
        - Federal credit for domestically produced cathode active materials if applicable
        - Per kg CAM produced under IRA Section 45X schedule
        - "Anticipated — eligibility for recycled CAM not confirmed; IRS guidance evolving"
        - Regulatory; subject to IRS implementation and eligibility determination
        - Confirm 45X CAM PTC eligibility; estimate potential annual credit value at full scale

  - id: TI002
    title: Pricing / monetization table
    notes: >-
      No pricing is publicly disclosed by Redwood. Figures below are estimates or proxies
      from comparable companies and analyst commentary. All pricing requires primary verification.
    columns:
      - Pricing Item
      - List vs Realized
      - Estimated Range
      - Discount or Unknown
      - Source Basis
    rows:
      - - Battery recycling processing fee
        - Implied realized (no list price available)
        - "$0.10–$0.30 per kg battery mass (industry estimate)"
        - Unknown — not disclosed; may include material credit offset against fee
        - Industry analyst estimates; Li-Cycle pre-Chapter 11 spoke fee SEC disclosures
      - - Cathode active material sale price
        - Spot-adjacent market price for battery-grade NMC or NCA precursor
        - "$8–$20 per kg NMC precursor (Q1 2025 battery-grade market range)"
        - Significant compression from 2022 peak; linked to lithium carbonate and cobalt spot
        - Bloomberg NEF battery material market data; public producers Albemarle and Livent
      - - Redwood Energy storage lease or PPA
        - Not disclosed — estimated PPA for second-life battery storage
        - "$30–$60 per MWh capacity per year (estimated from second-life storage comps)"
        - Unknown — model and pricing not publicly confirmed; early-stage product
        - Industry analogy from second-life storage comparable transactions
      - - IRA 45X CAM production tax credit
        - Federal list credit if applicable
        - "$35 per kg for cathode active materials produced domestically (IRA schedule)"
        - Applicability to recycled CAM not confirmed; IRS guidance still evolving
        - IRA Section 45X Advanced Manufacturing Production Credit published rate

  - id: TI003
    title: Unit economics table
    notes: >-
      All unit economics are estimated or unavailable due to Redwood's private status. Values
      are analyst estimates based on public analogies. All metrics require primary diligence.
    columns:
      - Metric
      - Value or Null
      - Confidence
      - Why It Matters
      - Diligence Ask
    rows:
      - - Revenue per GWh processed
        - "~$10M per GWh (implied from $200M / 20 GWh)"
        - Low — CEO estimate only; stream split unknown
        - Drives top-line revenue sensitivity to processing volume and commodity pricing
        - Obtain actual processing revenue and CAM revenue split; verify processing volume
      - - Gross margin on processing fees
        - Not disclosed
        - None — not public; sensitive to commodity pricing
        - Determines whether core recycling business covers variable costs
        - Obtain audited gross margin; separate processing vs CAM margins
      - - Gross margin on CAM sales
        - "Not disclosed — estimated 5–25% depending on commodity cycle"
        - Very low — estimated from public comparables; Redwood margin unknown
        - Core measure of downstream value-add versus commodity pass-through
        - Obtain CAM production cost per kg vs selling price
      - - Operating cost per GWh processed
        - "Not disclosed — estimated $5–$9M per GWh"
        - Very low — estimated from capex and labor data
        - Determines operating leverage and path to profitability
        - Obtain COGS breakdown by category; compare to revenue per GWh
      - - Capital intensity (capex per GWh per year capacity)
        - "~$200M per GWh/yr (implied from $4B deployed / 20 GWh capacity)"
        - Low — estimated from public figures; actual allocation not disclosed
        - Determines return on invested capital and expansion financing needs
        - Obtain Nevada and SC capex by phase; verify processing capacity vs utilization
      - - Headcount per GWh processed
        - "~55 employees per GWh (1,100 employees / 20 GWh)"
        - Low — estimated from public headcount and capacity figures
        - Labor intensity benchmark for manufacturing scale-up
        - Obtain headcount by function; assess post-layoff capacity impact
      - - Payback period on capital deployed
        - Not calculable — insufficient gross margin data
        - None — private metric
        - Key return metric for project finance and equity underwriting
        - Requires audited financial statements and capex schedule

  - id: TI004
    title: Capital adequacy table
    notes: >-
      Cash on hand and burn rate are private. The DoE ATVM loan conditional commitment has
      not been formally closed to public knowledge. SC total capital commitment includes
      third-party financing whose structure is not fully disclosed. All estimates require verification.
    columns:
      - Item
      - Value or Status
      - Confidence
      - Risk or Dependency
      - Diligence Ask
    rows:
      - - Estimated cash on hand post-Series E
        - ">$350M (initial Series E Oct 2025); final close Jan 2026 at $425M total Series E"
        - Low — gross raise only; cash burn since close not known
        - Cash burn since Jan 2026 reduces actual on-hand balance
        - Obtain cash and equivalents balance from most recent management accounts
      - - Monthly operating burn rate
        - Not disclosed
        - None — private metric
        - Determines runway from last known cash position
        - Request monthly P&L and cash flow statement from management
      - - DoE ATVM loan status
        - "$2B conditional commitment February 2023; drawdown status unknown"
        - Low — conditional commitment is public; drawdown not confirmed
        - Political risk; condition failure risk; timing uncertainty
        - Confirm DoE loan closing documents; drawdown schedule and conditions
      - - South Carolina campus capital deployed
        - "$3.5B total planned; Phase 1 opened Nov 2025; deployed amount not disclosed"
        - Low — total budget is public; Phase 1 cost and deployed not disclosed
        - SC buildout is multi-billion capex commitment without confirmed financing
        - Obtain SC capex-to-date; committed financing and drawdown schedule
      - - Total private equity raised
        - "~$2.3B across Seed through Series E (Series E final close $425M Jan 2026)"
        - Medium — individual round disclosures support cumulative estimate
        - Represents total equity dilution to date
        - Obtain capitalization table and investor economics from company
      - - Estimated runway
        - ">12 months from Jan 2026 close (estimate only)"
        - Very low — estimated; burn rate and drawdown schedule unknown
        - IPO or next financing need depends on burn vs DoE loan timing
        - Obtain management guidance on runway; DoE loan drawdown trigger date

  - id: TI005
    title: Public financial gaps table
    notes: >-
      This table enumerates the most material financial metrics unavailable from public sources
      as of May 2026. Each gap represents a required diligence item before financial underwriting.
    columns:
      - Missing Metric
      - Impact on Underwriting
      - Exact Diligence Path
    rows:
      - - Gross margin by revenue stream (processing vs CAM)
        - Without gross margin, impossible to determine whether unit economics are sustainable
        - Request audited income statement with revenue and COGS disaggregated by stream
      - - Monthly operating cash flow and burn rate
        - Without burn rate, runway is unquantifiable and capital adequacy cannot be assessed
        - Request trailing 12-month monthly P&L and cash flow statements
      - - DoE ATVM loan closing and drawdown schedule
        - $2B loan represents 45%+ of total deployed capital; status is a first-order event
        - Obtain DoE ATVM loan closing documents or written DoE status confirmation
      - - CAM production volume and sell-through rate
        - Revenue quality and inventory risk depend on actual CAM produced vs sold
        - Request quarterly CAM production volumes, inventory balance, and customer schedule
      - - South Carolina campus total capex committed and deployed
        - SC represents the largest unfunded capital obligation
        - Obtain SC project finance term sheet, equity committed, debt committed, capex-to-date
      - - Customer concentration by revenue
        - Concentration in one or two OEMs creates revenue cliff risk
        - Request revenue concentration disclosure or top-5 customer revenue percentage
      - - IRA 45X credit eligibility for recycled CAM
        - "$35/kg PTC on CAM could be material to economics at full scale"
        - Obtain IRS private letter ruling or tax counsel opinion on 45X for recycled CAM

