  claims:
    - id: CI001
      statement: >-
        Redwood Materials operates a dual-sided industrial revenue model with two primary streams:
        (1) processing fees or material credits charged to OEM and battery manufacturer customers for
        battery collection and recycling, and (2) cathode active material sales to cell manufacturers
        including Panasonic Energy of North America and Samsung SDI. A third stream — second-life
        battery storage deployment under Redwood Energy — launched in June 2025.
      type: company-claimed
      confidence: high
      freshness: current
      topic: revenue-model
      sourceRefs:
        - SI001
        - SI002
        - SI021
      answersQuestionRefs:
        - QI001
    - id: CI002
      statement: >-
        CEO JB Straubel disclosed that Redwood Materials is on pace to generate approximately $200
        million in annual revenue, attributed to 2024 performance. This is the only public revenue
        disclosure by the company. The split between processing fee revenue and CAM sale revenue is
        not publicly known; the $200 million figure represents the total.
      type: company-claimed
      confidence: medium
      freshness: recent
      topic: revenue
      sourceRefs:
        - SI003
        - SI004
      answersQuestionRefs:
        - QI002
        - QI003
    - id: CI003
      statement: >-
        Redwood Energy, the company's second-life battery storage service, launched in June 2025,
        targeting AI data center operators and grid storage applications. A U.S. data center operator
        confirmed deployment of second-life EV battery systems by March 2026. Revenue from this
        stream is early-stage and not publicly quantified as of May 2026.
      type: third-party-reported
      confidence: medium
      freshness: current
      topic: new-revenue-stream
      sourceRefs:
        - SI021
        - SI022
      answersQuestionRefs:
        - QI006
    - id: CI004
      statement: >-
        CAM pricing is commodity-linked, tracking lithium carbonate, cobalt, and nickel spot prices.
        Lithium carbonate declined approximately 80 percent from its late-2022 peak of approximately
        $70-80 per kilogram to under $15 per kilogram by early 2025, compressing revenue per unit
        processed for recyclers with commodity-linked CAM or processing fee pricing.
      type: third-party-reported
      confidence: high
      freshness: recent
      topic: commodity-pricing
      sourceRefs:
        - SI024
        - SI025
      answersQuestionRefs:
        - QI005
        - QI016
    - id: CI005
      statement: >-
        Implied revenue per GWh processed is approximately $10 million, derived from the disclosed
        $200 million annual revenue figure and the claimed 20-plus GWh annual processing capacity.
        This is a rough estimate; the actual per-GWh revenue depends on the commodity price
        environment, contract structure, and actual utilization versus claimed capacity.
      type: estimated
      confidence: low
      freshness: recent
      topic: unit-economics
      sourceRefs:
        - SI003
        - SI001
      answersQuestionRefs:
        - QI009
    - id: CI006
      statement: >-
        IRA Section 45X Advanced Manufacturing Production Credit provides a $35 per kilogram credit
        for domestically produced cathode active materials. Whether recycled CAM produced by Redwood
        qualifies for the 45X credit is not publicly confirmed; IRS guidance on applicability to
        recycled versus mined feedstock is still evolving as of May 2026.
      type: inferred
      confidence: low
      freshness: current
      topic: tax-incentives
      sourceRefs:
        - SI024
      answersQuestionRefs:
        - QI018
    - id: CI007
      statement: >-
        Redwood Materials has not publicly disclosed audited financial statements, SEC-registered
        filings, or income statement metrics beyond the CEO's $200 million annual revenue estimate.
        As a private company not registered with the SEC, Redwood has no public filing obligation.
        The absence of audited financials is a material diligence gap for any financial underwriting.
      type: observed
      confidence: high
      freshness: current
      topic: financial-transparency
      sourceRefs:
        - SI003
        - SI012
        - SI019
      answersQuestionRefs:
        - QI020
        - QI007
    - id: CI008
      statement: >-
        Redwood's cost structure is dominated by capital depreciation and amortization on the Nevada
        campus, labor (approximately 1,100 employees at peak before 2026 layoffs), hydrometallurgical
        processing energy and chemical inputs, and South Carolina Phase 1 ramp costs. Gross margin
        and operating cost per GWh are not publicly disclosed.
      type: inferred
      confidence: low
      freshness: current
      topic: cost-structure
      sourceRefs:
        - SI015
        - SI002
      answersQuestionRefs:
        - QI008
    - id: CI009
      statement: >-
        Redwood's hydrometallurgical processing model requires higher operational intensity than
        pyrometallurgical alternatives but achieves approximately 95 percent material recovery versus
        60-70 percent for pyrometallurgical processes. This recovery advantage creates higher recovered
        material revenue per unit processed, partially offsetting higher operating costs.
      type: inferred
      confidence: medium
      freshness: current
      topic: unit-economics
      sourceRefs:
        - SI016
      answersQuestionRefs:
        - QI008
    - id: CI010
      statement: >-
        The South Carolina campus is planned at $3.5 billion total capital investment, with Phase 1
        entering operations in November 2025. Total capital committed versus deployed and the
        financing structure for the SC campus beyond Redwood's private equity are not publicly
        disclosed, representing a multi-year unfunded capital obligation.
      type: third-party-reported
      confidence: medium
      freshness: current
      topic: capital-adequacy
      sourceRefs:
        - SI011
        - SI015
