      - number: '4.3'
        title: 资本充足性与融资
        blocks:
          - type: paragraph
            body: >-
              Redwood 的资本结构很厚。公司已通过多轮私募股权融资约 $2.3B。最近一轮是 2025 年 10 月首次关账 $350M 的 Series E，由 Eclipse Ventures 领投，NVIDIA
              NVentures 参与，估值超过 $6B。最终 $425M 于 2026 年 1 月关账。美国能源部在 2023 年 2 月有条件承诺一笔 $2B ATVM 贷款，用于内华达园区电池材料生产设施。截至 2026
              年 5 月，DOE 贷款提款状态尚未公开确认；Redwood 未宣布贷款正式关闭或首笔资金到账，这仍是重大不确定性。手头现金未公开披露；2025 年底最新 $350–425M
              融资提供了重要现金跑道，但月度烧钱速度和南卡罗来纳建设资本开支节奏不公开。南卡罗来纳园区总预算 $3.5B；2025 年 11 月一期投产说明已有部分资本部署，但完整建设时间表和资金来源不清楚。2026 年 4
              月裁员显示，在低于计划利用率下，公司正主动管理经营现金流出，但不能直接说明烧钱速度或现金跑道。IPO 自 2022 年以来一直是公开讨论的战略路径；截至 2026 年中，市场环境和收入轨迹很可能决定时点。DOE
              贷款关闭是关键融资事件：若正式关闭，它将为内华达园区提供 $2B 低于市场成本的融资，显著降低股权资本需求。
