      - number: '3.2'
        title: 直接竞争者与现有玩家画像
        blocks:
          - type: paragraph
            body: >-
              Li-Cycle Holdings 曾是北美领先的纯锂离子电池回收商，直到 2023 年暂停 Rochester Hub 湿法冶金处理设施建设，并在 2024 年申请 Chapter 11
              破产保护。高峰期，Li-Cycle 每年处理约 5–6 GWh 等效电池材料，采用 spoke-hub 模式：分布式辐条站点负责破碎，再把物料送入中央枢纽做湿法冶金处理。Rochester Hub
              失败被归因于建设成本超支和原料不足，印证了规模化电池回收的资本和时点风险。Ascend Elements（原 Battery Resources）专注生产回收正极活性材料，并于 2026 年 4 月申请
              Chapter 11。它的模式最接近 Redwood 的回收至 CAM 一体化路径。Cirba Solutions 由 Retriev Technologies 和 Battery Solutions
              合并而来，是仍存活的北美替代者中最相关的一家。它处理包括锂离子、NiMH 和铅酸在内的多种电池化学体系，但不生产 CAM，因此只是回收型竞争者。Umicore
              是全球主导的现有玩家，在比利时和韩国运营大型火法冶金回收，规模化生产 CAM，并与主要电池制造商签有长期供应协议。Umicore 近年收入超过 €4B。CATL 是全球最大电池制造商，在中国运营电池回收附属公司
              BRUNP Recycling，并在扩张回收产能。CATL 在中国横跨电池制造和回收的一体化模式，是长期最强的潜在竞争者，但进入北美市场会遇到监管和地缘政治壁垒。
            claimRefs:
              - CP008
              - CP009
              - CP010
              - CP011
              - CP012
              - CP013
              - CP014
              - CP015
      - number: '3.3'
        title: 能力与功能对比
        blocks:
          - type: paragraph
            body: >-
              电池回收差异化的关键能力维度包括：收集网络和物流、处理技术和回收效率、下游 CAM 生产、地理覆盖、OEM 伙伴深度，以及监管 / 环境合规记录。Redwood 在回收效率（声称 95%）、CAM
              生产整合、与美国汽车 OEM 位置匹配的北美地理覆盖，以及 OEM 伙伴广度（Ford、Toyota、GM、VW、BMW、Volvo、Rivian、Amazon）上领先。Umicore
              在全球规模、欧洲成熟监管关系，以及几十年客户关系支撑的深厚 CAM 生产历史上领先。Cirba Solutions 在收集网络广度和多化学体系能力（包括铅酸）上领先，但回收效率落后，也没有 CAM
              生产。Li-Cycle 的 spoke-hub 模式展示了高效物流，但在中央 hub 处理阶段失败。CATL/BRUNP 拥有全球最深的垂直整合，但主要在中国运营。对 Redwood 的 OEM
              客户来说，最关键的差异点，是能提供美国本土闭环供应方案：收集退役电池、回收矿物，再把回收 CAM 返还给同一客户用于新电池生产。目前只有 Redwood 和 Umicore 能在有意义规模上跑通完整闭环，而
              Umicore 的闭环主要在欧洲。Redwood 声称 95% 的回收效率，相比 Umicore 等采用火法冶金流程约 60–70% 的水平，在规模化后是有意义的经济优势；但 95% 尚未经过独立审计。
