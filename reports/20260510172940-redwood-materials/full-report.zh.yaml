      - number: '2.5'
        title: 买方分层、预算归属与采用路径
        blocks:
          - type: paragraph
            body: >
              Redwood 的买方版图可分为五类角色，它们的预算归属、采购周期和采用动机各不相同。

              OEM 和一级汽车买方（Ford、GM、Toyota、BMW、Rivian、Panasonic）最具战略重要性。这些组织拥有两个不同采购决策：电池回收合同，以及采购 Redwood 的 CAM 和 ACF
              用于新电池生产的材料供应协议。预算归属在供应链和采购部门，可持续团队有强影响力。多年承购的决策周期为 12–24 个月，IRA 本土内容合规是硬约束。Ford 的 ACF 供应协议和 Panasonic 的
              CAM 承购，是最清晰的公开案例。

              电芯制造商（Panasonic、Samsung SDI、LG Energy Solution、SK Innovation）把 CAM 和 ACF 作为直接制造投入采购。这类买方采购周期长，资质认证需要 18–36
              个月。它们能否获得 IRA 45X 税收抵免，部分取决于是否从 Redwood 这类美国生产商采购材料，因此财务上有一致性。消费电子品牌（Apple、Amazon、Dell）是承担 ESG
              报告义务的电池回收参与者。数据中心运营商是 Redwood Energy 的新兴客群；Crusoe Energy 关于二次寿命电池包的多年协议证明了商业验证。DOE
              和国家实验室则是政策驱动的融资伙伴，以低于市场的成本提供资本。
