      - number: '8.6'
        title: 图表
        blocks:
          - type: callout
            title: 行业层面资本毁灭风险
            body: >-
              截至本报告，三家重要美国电池回收商中已有两家在 18 个月内申请 Chapter 11：Li-Cycle 于 2024 年 10 月，Ascend Elements 于 2026 年 4
              月。两案中的资本毁灭模式，包括湿法冶金设施成本超支、DOE 拨款依赖和锂价敏感度，都直接映射 Redwood Materials 的风险画像。这不是同业个体失败，而是关于规模化资本密集型电池回收的结构性行业警示。
            calloutType: insight
            claimRefs:
              - CV004
              - CV005
              - CV026
          - type: callout
            title: 入场价格纪律
            body: >-
              任何以 2023 年 Series C 投后 $5.5B 价格或更高价格投资的决定，在承诺前都需要确认两项门槛事件：第一，DOE ATVM 贷款正式关闭，且在 NDA 下审阅里程碑条款；第二，获得经审计
              FY2024 财务，确认收入规模。缺少这两个数据点，估值框架就建立在未经验证的收入假设和可能无法兑现的有条件资本之上。
            calloutType: insight
            claimRefs:
              - CV001
              - CV003
