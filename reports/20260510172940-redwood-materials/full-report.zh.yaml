  summary: >-
    Redwood Materials 是一家电池回收与关键材料公司，由 Tesla 联合创始人、前 CTO JB Straubel 于 2017
    年创立。公司采用垂直整合模式：回收退役锂离子电池，借助自研湿法冶金回收流程处理，再用回收金属制造电池级阳极铜箔和正极活性材料。公司总部位于内华达州 Carson
    City，在当地拥有主要制造园区，南卡罗来纳州第二座设施仍在建设中。借助 IRA 激励，Redwood 正在为 EV 产业搭建美国本土供应链基础设施。公司 2025 年 10 月以 $6B 估值完成 $350M Series E
    融资（2026 年 1 月最终关账 $425M），累计融资约 $2.3B。
