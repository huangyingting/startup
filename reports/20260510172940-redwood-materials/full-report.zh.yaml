  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 采用双边工业收入模式，主要有两条收入流：（1）向 OEM 和电池制造商客户提供电池收集与回收服务，获得处理费或材料抵扣；（2）向把回收 CAM
              用于新电池生产的电芯制造商销售正极活性材料。第三条新兴收入流，是 2025 年 6 月以 Redwood Energy
              品牌推出的二次寿命电池储能租赁或销售；它仍处早期，财务上尚不重要。处理服务的收入确认相对直接：按处理材料的每公斤收费，并在电池到达 Redwood 设施时确认收入。CAM 销售收入在交付给 Panasonic
              Energy of North America、Samsung SDI 等电芯制造商客户时确认。CEO JB Straubel 披露 2024 年年收入约 $200M，按公司声称的 20 GWh
              处理运行率计算，相当于每 GWh 等效处理量约 $10；但该数字混合了处理费和 CAM 收入，收入流拆分未公开。两条收入流都受大宗商品价格暴露约束，影响收入质量：处理费可能与回收材料价值挂钩，CAM
              销售价跟随碳酸锂、钴和镍现货市场。到 2024 年，锂价较 2022 年高点下跌约 80%，压缩了采用大宗商品挂钩定价处理商的单位处理收入。
