      - number: '8.4'
        title: 情景分析与资本回报框架
        blocks:
          - type: paragraph
            body: >-
              20% 概率的乐观情景需要五个有利结果同时发生：DOE 贷款在 2026 年上半年最终关闭；SC Phase 1 到 2027 年爬坡至 45 GWh/yr 或更高；SC Phase 2
              开工且无成本超支；锂价回升至 $15,000/MT 以上；IRA 45X 抵免完整延续到 2032 年。在这些条件下，Redwood 2028E 收入可达 $1.2-1.8B，以 7-8 倍倍数计算，股权价值为
              $8.4-14.4B，较 2023 年 Series C 入场价上行 50-160%。这是一个真实但要求很高的结果，四年内不能出现重大不利事件；对资本密集型基础设施公司而言，这并不常见。50%
              概率的基准情景反映部分成功：DOE 贷款转换，但条款可能修改；SC Phase 1 到 2028 年达到 30 GWh/yr，比计划晚一年；锂价维持在 $10,000-14,000/MT。按这一表现，2028E
              收入为 $700M-1.1B，估值 $4.5-7.5B；在 4-5 年持有期资本成本前，相比 $5.5B 入场价仅持平至小幅上行。30% 概率的悲观情景明显不利：DOE 贷款推迟到 2028
              年或被削减，锂价连续两个季度低于 $8,000/MT，SC Phase 2 需要困境股权桥接。Li-Cycle 和 Northvolt 的可比情景带来 50-80% 估值折价，意味着 2028 年股权价值为
              $1.5-3.0B，较 $5.5B 入场价亏损 45-73%。所有情景的概率加权预期价值约为 $4.9-6.2B，虽有小幅正期望，但在没有审计财务或 DOE
              贷款关闭确认时，无法充分补偿这一价格点的二元下行风险。锂价回升至 $15,000/MT 以上，以及 SC 园区实际运营吞吐数据，是跟踪投资逻辑进展的两个最高杠杆公开指标。
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
