      - number: '1.4'
        title: 运营、设施与规模
        blocks:
          - type: paragraph
            body: >
              Redwood Materials 的主园区是位于内华达州 McCarran 的大型回收与制造综合体，毗邻 Tesla Gigafactory。截至 2025
              年，内华达园区承担大部分退役电池收集、处理，以及正极和负极制造。2022 年，Redwood 宣布在南卡罗来纳州 Charleston 区域建设第二个大型园区，用于处理东海岸 OEM 伙伴的电池，尤其是 Ford
              和 Volkswagen，并在东海岸电芯生产设施附近制造电池材料。Redwood 还在 2024 年收购了德国欧洲电池回收商 Redux Recycling，拿到首个国际制造据点。2025 年 4 月，公司在
              San Francisco Design District 开设 15,000 平方英尺 R&D 中心。

              生产端，Redwood 声称每年接收超过 20 GWh 电池，相当于约 250,000 辆电动汽车；这大约占北美全部回收锂离子电池和电池材料的 90%。公司湿法冶金流程实现 95%+ 的矿物回收率，这一点在
              2023 年 Electrek 报道的试点项目中得到验证。产出的电池材料包括 CAM 和 ACF，通过供应协议卖给电芯制造商和 OEM 伙伴。Bloomberg Businessweek 2024 年 4
              月长篇报道记录了内华达设施的运营规模，也指出公司仍需面对与中国加工材料实现成本平价的挑战；这仍是关键竞争担忧。

              按公司披露数据，2025 年初全职员工约 1,100 人；2026 年 4 月裁员 10% 后降至约 1,000 人。
