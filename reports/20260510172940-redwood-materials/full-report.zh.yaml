        title: 战略合作与 OEM 整合深度
        blocks:
          - type: paragraph
            body: >-
              除交易型客户关系外，Redwood Materials 已建立战略合作，形成更深的整合和切换成本护城河。Ford Motor Company 合作最具战略意义：Ford 投资了 Redwood 的 Series
              C，并签署电池回收合作，内容包括供应 Ford EV 电池废料以及北美电池材料供应框架。这种投资加供货结构，让双方激励一致，超出简单供应商关系。Amazon 合作既包括电池供应（消费电子），也包括其明确意向：在
              Amazon 商用车队电动化项目中使用来自 Redwood 的材料。Toyota 合作覆盖 EV 电池返还，也包括 Toyota 对美国制造业务本土电池材料供应的明确兴趣。Redwood 还与
              Volkswagen Group of America 签署合作，覆盖 Audi e-tron、Q4 e-tron 和 ID.4 车型的电池返还物流。这些 OEM 合作共同形成网络效应：每新增一个 OEM
              伙伴，原料供应位置就更强；原料供应越强，新增 CAM 和 ACF 输出端客户的理由越强；继而又吸引更多寻求本土材料供应的 OEM。风险在于，如果 OEM EV
