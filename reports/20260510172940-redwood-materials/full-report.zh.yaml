  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 的竞争格局分为五类：（1）北美直接锂离子电池回收商——Cirba Solutions、Li-Cycle（Chapter 11）和 Ascend Elements（Chapter
              11）；（2）全球现有电池材料供应商——Umicore、BASF、Sumitomo Metal Mining——它们通过原生矿或火法冶金处理材料，提供主要的存量替代方案；（3）中国一体化玩家——CATL 旗下
              BRUNP Recycling 和 GEM Co.——主导亚洲回收并向全球扩张；（4）潜在内部化回收者——Panasonic、Samsung SDI、LG Energy Solution 等电池制造商目前向
              Redwood 供应废料，但随规模增长可能把回收内部化；（5）填埋和出口的存量做法，在许多司法辖区仍合法，也不需要资本投入。Redwood 的差异化来自从收集到 CAM 生产的一体化模式、规模（每年处理 20+
              GWh），以及创造双边供应安全的 OEM 伙伴网络。两个曾尝试类似路线的北美直接竞争者（Ascend Elements 和 Li-Cycle）都已进入破产程序，说明 Redwood
              的先发优势和资本获取能力已经与追随者拉开结构性距离。
