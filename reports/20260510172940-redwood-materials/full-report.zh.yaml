  - id: FM001
    title: 推动美国电池回收需求的关键监管与市场事件
    type: timeline
    layout: standard
    summary: 按时间顺序列出推动 Redwood 电池循环经济业务需求的监管、技术和市场事件。
    data:
      items:
        - label: IRA 签署（Inflation Reduction Act）
          detail: 第 30D、45X、48C 条为电池材料设立本土内容要求和制造抵免。
          date: '2022-08-16'
          tone: positive
        - label: DOE ATVM $2B 贷款有条件承诺
          detail: 美国 DOE 根据 Advanced Technology Vehicles Manufacturing 项目向 Redwood 承诺 $2B 贷款，用于 Nevada + SC 扩张。
          date: '2023-02-09'
          tone: positive
        - label: 碳酸锂价格暴跌
          detail: 碳酸锂较 $80K/MT 峰值下跌 80%+，挤压回收经济性，并挑战近期利润率。
          date: '2023-06-01'
          tone: negative
        - label: Li-Cycle 暂停 Rochester Hub 建设
          detail: 电池回收商 Li-Cycle 现金短缺后暂停旗舰枢纽建设；给规模化前的美国回收商释放资本风险信号。
          date: '2023-10-23'
          tone: negative
        - label: Ford ACF 供应协议启动
          detail: Redwood 开始从 South Carolina 园区向 Ford 供应负极铜箔；这是首个本土 ACF 供应关系。
          date: '2024-01-01'
          tone: positive
        - label: IRA 30D EV 税收抵免终止
          detail: 政府结束 EV 消费者抵免，放慢 EV 渗透增长，也下调近期电池退役原料预测。
          date: '2025-09-30'
          tone: negative
        - label: EU Battery Regulation 生效
          detail: EU 要求电池使用最低再生含量（到 2031 年 Co 16%、Li 6%、Ni 6%），形成全球标准压力。
          date: '2027-01-01'
          tone: positive
        - label: EV 电池退役潮开始
          detail: 第一代大众市场 EV 进入 8-10 年寿命末期；美国回收原料量预计大幅上升。
          date: '2027-06-01'
          tone: positive
        - label: IRA 本土内容要求达到 100% 关键矿物
          detail: IRA 30D 资格要求的 100% 本土或 FTA 关键矿物采购门槛达到最高值。
          date: '2028-01-01'
          tone: positive
    claimRefs:
