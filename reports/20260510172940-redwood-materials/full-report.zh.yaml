      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多个独立测算口径都指向一个很大、但竞争激烈的市场机会。最宽口径——全球电池材料制造总市场——BloombergNEF 估计到 2030 年每年 $120–150B，但这个 TAM 与 Redwood
              当前产能大多无关。更有参考价值的全球口径，是单独看锂离子电池回收市场：SNE Research 估计它将从 2022 年约 $3B 增至 2030 年约 $22B；MarketsandMarkets 给出的
              2030 年规模约 $17.6B（CAGR 约 23%）；IDTechEx 更保守，预计 2033 年 $14.5B。这些数字不强行对齐，因为口径不同——有的只包括收集和处理，有的延伸到精炼材料销售。

              具体到北美，SAM 更可测。把北美回收电池材料市场（2030 年约 $5–7B）、美国 gigafactory 带来的本土 CAM 需求（2030 年约 $8–12B/年）和 ACF 需求（2030 年约
              $2–3B）合并，可得到约 $15–25B 的北美电池材料 SAM。DOE 的 National Blueprint for Lithium Batteries 预计，到 2030 年，美国本土 EV 生产将需要
              650,000 MT 锂和 300,000 MT 镍，直接拉动 Redwood 回收并精炼的关键矿物需求。

              Redwood 的 SOM 受物理产能约束：内华达园区（目标约 100 GWh/年 CAM）加南卡罗来纳园区（目标约 100 GWh/年 ACF），在完全建成并按当前价格计算时，意味着潜在年收入
              $2–5B；但碳酸锂价格较 2022 年高点下跌 80%，会显著压缩这一范围。估算彼此冲突，加上 Redwood 财务不透明，导致 SOM 无法精确验证。
