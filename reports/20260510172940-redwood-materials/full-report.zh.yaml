  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资框架与建议摘要
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 在美国本土电池供应链中占据结构性重要位置：它是全美资本最充足、技术最先进、客户验证最充分的电池回收商，背后有 JB Straubel 的 Tesla 时期信誉，以及
              Ford、Panasonic、Toyota 三份已确认 OEM 供应协议。2023 年 Series C 后 $5.5B 投后估值反映了这些战略优势，但也嵌入了很高的执行溢价。以 2025 年估计收入 12-18
              倍计价，投资人买的是 2028-2030 年结果，不是 2025 年现实。投资建议是有条件观察。正向逻辑真实存在：IRA Section 45X 制造抵免相对中国进口提供 $35/kWh 的结构性成本优势；若
              DOE $2B 有条件贷款提款，可在不稀释股权的情况下资助 SC Phase 2；OEM 回收协议带来的长期原料安全性支撑商业模式。反向逻辑同样真实：不到 18
              个月内，美国电池回收行业已出现两起重大破产，Li-Cycle 2024 年 10 月申请 Chapter 11、消耗 $1.7B，Ascend Elements 2026 年 4 月申请破产、消耗
              $542M；这说明该行业的规模化执行比商业计划预测更难，也更资本密集。只有 DOE 贷款关闭、SC 园区爬坡和锂价回升都按计划发生，Redwood 的估值才站得住。以 $5.5B 入场价计算，概率加权预期价值在
              50% 概率基准情景下略低于入场价，在 30% 概率悲观情景下明显低于入场价；即便高确信度投资人，也会觉得入场价格要求很高。置信度为中：来源确认了战略定位和资本结构，但经审计财务、DOE
              贷款里程碑条款和供应协议细节都未公开。风险评级为高，主要由同业失败证明的资本强度、DOE 贷款二元依赖，以及持续锂价逆风驱动。
            claimRefs:
