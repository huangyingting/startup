      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Redwood 最有辨识度的运营风险，是 GWh 级 CAM 制造收率。NMC 811 正极材料要求纯度高于 99.95%，且粒径分布稳定。再生前驱体 CAM 会因输入原料 Ni:Mn:Co
              比例不同带来成分波动，必须在上游湿法冶金精炼步骤中纠正。没有独立第三方发布过 Redwood 收率或缺陷率验证；所有生产表现说法都来自公司沟通。ACF
              制造带来第二项运营风险：负极铜箔是低毛利商品，对表面质量要求严格；任何 OEM 伙伴认证失败，都可能推迟 South Carolina 收入爬坡，并触发 DOE
              贷款里程碑违约。原料供应是不断加大的结构性风险：随着电芯制造效率提升，电池 Gigafactory 的制造废料率已从 2020-2021 年约 8-12% 降至 2024 年的 3-5%。退役电池量至少到
              2027 年仍有限，因为车队还很新。LFP 化学体系迁移风险较高：如果 LFP 在美国电池市场份额超过 40%，Redwood 以 NMC 为中心的 CAM 路线图将需要昂贵改造，而 Redwood 尚未披露
              LFP 回收或 CAM 制造路线图。RCRA 危险废物法规适用于电池回收商；尚未发现 Redwood
              的公开违规记录。两大园区的工艺控制系统也存在网络安全风险，因为电池制造越来越依赖数字化控制的湿法冶金和正极合成设备。
