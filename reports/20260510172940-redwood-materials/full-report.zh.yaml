      - number: '2.4'
        title: 采用约束与市场逆风
        blocks:
          - type: paragraph
            body: >
              几个结构性约束限制 Redwood 抢占市场的速度和确定性。2028 年前的供应稀缺是最直接的运营约束。EV 电池典型寿命为 8–15 年；2015–2017 年售出的第一批大众市场 EV
              现在才刚到退役年龄。BloombergNEF 估计，大规模美国回收运营所需的足够原料可能要到 2027–2028 年才会出现。在此之前，Redwood
              必须依赖制造废料和消费电子；这些原料毛利更低，化学体系也不够稳定。

              锂价波动严重压缩了回收经济性。碳酸锂价格在 2022 年底接近 $80,000/MT 的高点，到 2024 年初跌至 $15,000/MT 以下，跌幅超过
              80%。这大幅降低了回收锂流的价值，而锂原本是回收经济性的重要利润驱动因素。镍和钴价格也下跌。低价环境下，单看成本，原生矿比回收材料更有利，Redwood 因此必须靠供应安全和监管合规竞争，而不是单纯靠价格。

              资本强度既是进入壁垒，也是 Redwood 自身的约束。仅南卡罗来纳园区一期就需要约 $3.5B 投资。扩到满产需要 DOE ATVM $2B 贷款按计划提款，而提款取决于建设里程碑；考虑到 2026 年 4
              月重组和裁员，里程碑可能延迟。

              IRA 逆风、化学体系转向风险和中国竞争叠加在一起。LFP 化学体系转向是多年期威胁；LFP 不含钴或镍，会显著改变回收材料的价值结构。CATL（通过 Brunp Recycling）和 GEM Co.
              规模巨大，成本结构更低。竞争者失败（Li-Cycle、Ascend Elements）说明，商业化前阶段同时存在资本和原料风险。
