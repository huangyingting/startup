  - id: FM004
    title: 买方采用路径：按分部划分的 IRA 政策强制因素
    type: timeline
    layout: standard
    summary: 从 Redwood 采购的买方分部，受 IRA 政策里程碑驱动作出采用决策的时间线。
    data:
      items:
        - label: IRA 45X CAM/ACF 生产抵免启动
          detail: 电芯制造商和 OEM 从 Redwood 这类美国生产商采购，可获得按 kWh 计算的生产抵免，给本土采购创造直接财务激励。
          date: '2023-01-01'
          tone: positive
        - label: 30D：40% 关键矿物本土内容门槛
          detail: OEM 销售享受 IRA 税收抵免的 EV，必须从美国 / FTA 伙伴采购 40%+ 关键矿物。Redwood 再生材料符合资格，采购决策提速。
          date: '2024-01-01'
          tone: positive
        - label: 30D：50% 关键矿物本土内容门槛
          detail: 本土内容门槛升至 50%，收紧 OEM 供应链采购要求，并强化 Redwood 对汽车买家的价值主张。
          date: '2025-01-01'
          tone: positive
        - label: 政府终止 30D EV 抵免
          detail: 消费者 EV 税收抵免在 2025 年 9 月取消。近期 OEM 量增长放慢。Redwood 的 CAM/ACF 业务仍保留 45X 制造抵免。
          date: '2025-09-30'
          tone: negative
        - label: EU Battery Regulation：要求再生含量认证
          detail: EU 要求所有在 EU 销售的电池都做再生含量认证。拥有全球供应链的 OEM 必须在全球建立认证回收合作。
          date: '2027-01-01'
          tone: positive
        - label: 30D：100% 关键矿物门槛（如恢复）
          detail: 按 IRA 30D 时间表，到 2028 年需完全采用本土或 FTA 关键矿物。数据中心和储能买方不受影响，但 EV 供应链完全回流本土。
          date: '2028-01-01'
