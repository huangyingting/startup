  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重程度排序的风险概览与投资含义
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 面临五类相互牵连的高严重度风险，投资人承诺出资前必须评估。第一，IRA 45X 先进制造生产抵免被削弱，是最大的单一政策风险，因为每 kWh $35 的 CAM 抵免，是
              Redwood 面对韩国厂商时最主要的利润缓冲。第二，Treasury 若收窄 FEOC 指引，使用 Redwood CAM 的车辆可能失去下游 OEM EV
              税收抵免资格，从而降低客户支付本土溢价的意愿。第三，NMC 811 达到 GWh 级 CAM 技术放大仍未获得独立第三方验证。第四，DOE ATVM 贷款契约合规要求达到未披露的生产里程碑；历史数据表明，约
              30% 的有条件承诺无法推进到最终关闭。第五，客户集中在 Panasonic 与 Tesla 纽带上，同时放大 EV 市场和 DOE 执行风险。当 45X 抵免削减超过 $10/kWh 且 DOE
              贷款最终关闭同时失败时，投资逻辑触发破裂；任一事件单独发生，还可以通过模型调整消化，但两者叠加就需要完全重新承销。投资人必须把工厂访问权、DOE 里程碑透明度和 Panasonic 合同审阅作为承诺出资条件。以约
              $5.5B 的 Series E 入场估值计算，风险调整后回报只有在 45X 大体保持完整且 South Carolina 园区按计划爬坡时才有吸引力。
