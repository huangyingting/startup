      - number: '4.4'
        title: 财务透明度缺口与尽调障碍
        blocks:
          - type: paragraph
            body: >-
              Redwood 最大的财务尽调障碍全部来自私营公司披露缺口。公司从未发布经审计财务报表，也没有作为报告公司向 SEC 备案；除 CEO 对 2024 年 $200M
              年收入的估计外，未披露利润表指标。具体未知项包括两条收入流的毛利率、经营现金流和 EBITDA、月度烧钱速度、DOE 贷款当前提款状态和条件、南卡罗来纳园区已承诺资本总额与已部署资本、按每公斤和每 GWh
              计算的单位处理成本、CAM 定价条款以及定价是现货还是长期合约、按收入计算的客户集中度。大宗商品价格暴露是双向风险：截至 2025 年初，碳酸锂低于 $15/kg，相比 2022 年底 $70–80/kg
              高点压缩了单位处理收入。如果处理费与回收锂价值挂钩，尽管处理量更高，Redwood 2025 年每 GWh 处理有效收入也可能显著低于 2022
              年水平。低于计划利用率（从裁员推断）叠加压缩的大宗商品价格，形成无法在没有私有财务数据时量化的单位收入逆风。任何对 Redwood 的财务承销，都需要直接查看月度管理账、DOE
              贷款关闭文件和南卡罗来纳资本开支时间表。
