  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 端到端湿法冶金工艺栈
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 的技术架构最好拆成五个顺序工艺步骤：它们合起来把退役电池和制造废料转成可直接用于电芯制造的电池级材料。第一步是回收与物流：Redwood 运营回收网络，汇集 EV
              OEM、消费电子品牌和电池制造商的电池；截至 2024 年，每年处理超过 20 GWh
              等效材料。第二步是机械处理和黑粉生产：电池经放电、拆解、破碎和处理，产出黑粉（混合粉末，含正极和负极活性材料、铜箔以及电解液残留）。第三步是湿法冶金精炼：黑粉溶解在酸性溶液中，再借助溶剂萃取、离子交换和自研直接锂回收（DLR）工艺，选择性分离并提纯锂、镍、钴、锰和铜。第四步是
              CAM 合成：提纯后的镍、钴、锰硫酸盐与锂结合，先制成正极前驱体（pCAM），再烧结成电池级成品 NMC 811 正极活性材料。第五步是 ACF 生产：精炼环节回收的再生铜继续提纯并电沉积，形成电芯所需 6-8
              微米厚度的负极铜箔。Nevada 园区把五步整合在一起，消除工艺步骤之间的物流成本和材料损耗；Redwood 估计，相比拆分式供应链，这带来 15-20% 的收率优势。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
