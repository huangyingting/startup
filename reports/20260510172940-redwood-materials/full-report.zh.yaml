    title: 投资逻辑击穿与止损触发表
    columns:
      - 触发因素
      - 阈值或事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - DOE ATVM 贷款撤回或大幅削减
        - DOE 正式发出撤回函，或承诺金额降至低于 $1B
        - 立刻给 SC 二期制造 $2B 以上融资缺口；迫使公司用稀释性股权融资；Ascend Elements 先例显示，困境融资可能带来 60-80% 股权折价
        - 退出或大幅减仓；只有在悲观情景估值下才重新启动；触发紧急 NDA 审查
      - - IRA 第 45X 条制造抵免被废止或逐步取消
        - 立法行动在 2032 年前移除或逐步取消电池组件 45X 抵免
        - $35/kWh 结构性护城河消失；没有本土成本缓冲后，中国进口品变得有竞争力；EBITDA 率被压到负区间
        - 暂停新增投资；评估剩余关税保护，以及客户定价权能否维持
      - - 锂价连续两个或更多季度低于 $8,000/MT
        - LME 碳酸锂现货价格连续两个完整日历季度低于 $8,000/MT
        - 即便有镍、钴抵消，回收单元经济也转为现金亏损；烧钱增加，下轮融资估值落入悲观情景区间的概率上升
        - 按季度跟踪并重新评估；在 NDA 下要求管理层更新；考虑减仓
      - - SC 园区建设超支超过一期预算 30%
        - 一期总 capex 超过 $3.0B，相比隐含 $2.0-2.5B 一期预算
        - Li-Cycle Rochester Hub 先例：超支会层层传导，导致 DOE 里程碑失败，并迫使公司折价股权融资
        - 投资逻辑击穿程度可比 Li-Cycle Rochester 情景；退出，或在场外观察，等待管理层纠偏计划
      - - JB Straubel 未经有序交接便卸任 CEO
        - 公开宣布离任或交接，但没有 3 个月以上的计划性交接时间线
        - 关键人风险落地；融资关系和 DOE 战略关系可能受损；估值中的创始人溢价被削弱
        - 持有并等待继任清晰；重新评估归因于 Straubel 创始人领导力和人脉的 $200-500M 溢价
    notes: 触发阈值由分析师基于公开证据和可比板块先例定义。管理层级数据会提高精度。监控需要持续跟踪 DOE LPO 沟通、SC 园区建设披露、锂现货价格，以及任何可能提供 Redwood 侧面信号的上市公司 SEC 8-K 文件。
    claimRefs:
      - CV003
      - CV004
      - CV030
      - CV039
  - id: TV006
    title: 最终尽调索取事项表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - FY2023-FY2025 经审计财务报表
        - 按分部拆分的收入，包括处理费、CAM、ACF 和废料；EBITDA；capex 计划；营运资本；现金和流动性跑道
        - 没有财务数据，就无法验证 12-18x 收入倍数或资本充足性；整个估值都压在未经确认的分析师估计上
        - NDA 下由管理层提供；向 CFO 索取数据室资料；Big Four 审计确认
      - - DOE ATVM 有条件贷款条款清单
        - 具体建设里程碑、财务契约、违约触发、补救期和控制权变更条款
        - 贷款撤销会击穿投资逻辑；里程碑决定真实可用资本；Ascend Elements 先例显示，有条件拨款并不等于确定到账
        - DOE Loan Programs Office；NDA 下由法律顾问审查；并行审阅 Ascend Elements 的 DOE 沟通披露
      - - OEM 供应协议合同条款
        - Ford、Panasonic、Toyota 的合同期限、数量承诺、最低采购义务、价格上调机制和独家条款
        - 客户集中度和收入可见度取决于合同韧性；Panasonic 单独可能贡献 50% 以上 CAM 收入
        - NDA 下由管理层提供；与 Ford 和 Panasonic 采购团队做客户访谈；数据室合同摘要
      - - SC 园区 capex 计划和二期融资方案
        - 一期已承诺 capex 与预计剩余 capex；二期总预算和时间线；股权与 DOE 贷款提款分配方案
        - 投资人的资本充足性和股权稀释取决于二期融资方案；Li-Cycle 超支先例让独立 capex 验证变得关键
        - NDA 下由管理层提供；如有则取得独立工程报告；DOE 有条件贷款二期承诺文件
      - - LFP 化学体系适配路线图
        - Redwood 针对 LFP 电池回收经济性的技术方案；LFP 优化工艺时间线；LFP 与 NMC 输入下的单元经济
        - 2024 年 LFP 已超过全球 EV 电池出货量 50%；如果 LFP 到 2028 年提升至 65% 或以上，Redwood 针对 NMC 优化的工艺将面临结构性逆风
        - 由独立工艺化学专家做技术尽调；NDA 下与管理层讨论路线图
    notes: >-
      第 1 至第 3 项——经审计财务、DOE 贷款条款、OEM 合同条款——都是门槛要求。三项不齐，在 $5.5B 估值下作出投资承诺，无法达到中等或更高置信度的分析支撑。第 4 和第 5 项会显著提高确信度；如果第 1-3
      项满足，它们本身不构成阻断项。
    claimRefs:
      - CV005
      - CV006
      - CV036
      - CV041
