      - number: '8.5'
        title: 退出准备度与最终尽调重点
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 目前尚未具备公开市场退出条件。2026 年，资本密集、尚未盈利的基础设施公司 IPO 条件仍受限，可比清洁技术上市公司的糟糕表现就是证据。最现实的退出路径，是 2028 至
              2030 年间，在 SC 园区达到有意义规模且 EBITDA 接近盈亏平衡后，卖给 Toyota、GM、Volkswagen 等 OEM，或 BASF、Umicore、POSCO 等大型电池材料公司。JB
              Straubel 在 Tesla 任职期间积累的 OEM 关系，让协商式战略出售比普通工业公司更可行。若 DOE 贷款提款，政府贷款人关系可能让任何需要 DOE 变更控制同意的交易变复杂，甚至附加条件。在
              $5.5B 估值水平出资前，有五项尽调是门槛要求。第一，FY2023-FY2025 经审计财务报表，按业务分部提供收入、EBITDA、capex 和现金状况。第二，DOE ATVM
              有条件贷款条款清单，包括里程碑条件和补救期。第三，OEM 供应协议条款，确认至少三份 OEM 合同中一份的期限、数量承诺和定价机制。第四，SC 园区 capex 进度和 Phase 2
              资金计划。第五，Redwood 的 LFP 化学体系适配路线图。第一、第二、第三项均可单独构成阻断：缺少三项中的任一项，估值框架都依赖过多未经验证假设，无法支撑以 $5.5B
              承诺投资。最可执行的近期尽调动作，是在 NDA 下请求管理层开放数据室审阅，因为五项优先事项都需要直接接触公司。
            claimRefs:
