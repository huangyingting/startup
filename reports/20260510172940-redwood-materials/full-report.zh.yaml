      - number: '3.4'
        title: 切换成本与锁定机制
        blocks:
          - type: paragraph
            body: >-
              电池回收的切换成本很高，且维度很多。向 Redwood 供应退役电池的 OEM
              客户若要切换，需要：（1）建立新的物流基础设施（按地理优化的收集路线复制起来资本密集）；（2）在美国危险废物转移联单制度下为新供应商重新完成监管合规认证；（3）重新谈判供应协议，并可能重构与特定回收伙伴绑定的可持续报告承诺；（4）承受替代处理商在产能、可靠性和材料质量上的不确定性。OEM
              协议的双边性质加深锁定：OEM 用电池量保证换取处理和材料返还承诺，形成相互依赖，拆解成本高。地理邻近也是结构性切换成本：Redwood 内华达园区战略性靠近加州 EV
              集中地，南卡罗来纳园区靠近美国东南汽车制造。任何替代处理商都需要相当的地理位置，也就需要相当的资本投入。对于 CAM 客户（采购回收 CAM 的电芯制造商），切换成本包括在电芯生产线上重新认证新的 CAM
              化学体系资质，可能需要 18–24 个月。Redwood 与 Panasonic、Samsung SDI 等签有 CAM
              供应协议，形成合格供应商关系，短期内很难替代。美国能源部条件性贷款承诺增加了另一层：Redwood 可以获得 $2B 低成本项目融资，利率是多数竞争者拿不到的，这一结构性优势提高了不使用 Redwood
              的机会成本。
