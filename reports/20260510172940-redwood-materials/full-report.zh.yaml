      - number: '7.5'
        title: 财务、执行与人员风险
        blocks:
          - type: paragraph
            body: >-
              Redwood 的财务风险画像由资本强度主导。Nevada 园区建设需要数十亿美元投资，资金主要来自有条件 DOE ATVM 贷款以及 Series C 到 E
              轮股权融资。缺少公开财务报表，烧钱速度、现金跑道和营运资本状况都无法独立核验。Panasonic 收入集中让收入端脆弱；NMC 811 价格从 2022 年高点下跌约
              30%，制造废料商品价格也下跌，两者共同挤压单位经济。若没有 45X 抵免，根据分析师模型，Redwood 相对韩国厂商的成本结构会扩大约 $8-15/kWh 差距。Capex
              规模抬高执行风险：Northvolt 和 LG Chem 美国工厂等可比项目经常超预算 20-50%。关键人风险重大：CEO JB Straubel 对 DOE、Series E 投资人和 OEM
              伙伴具备基础信誉；如果离任或无法履职，政府关系和投资人信心都会明显受损。2026 年 4 月约 10% 的裁员以及 COO 离职，引入近期执行风险，并让人质疑组织是否有能力支撑 South Carolina
              爬坡。Nevada 运营需要专业电化学和电池处理人才，而 Reno 劳动力市场上直接竞争者就是 Tesla 和 Panasonic。作为私营公司，Redwood 不易为投资人提供流动性；未来会面临 IPO
              或战略出售压力，而如果宏观或 EV 市场状况恶化，退出时间线未必最有利于价值最大化。
            claimRefs:
              - CR023
              - CR024
              - CR025
