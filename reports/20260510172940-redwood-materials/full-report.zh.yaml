      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Redwood 运营环境受到联邦能源法、环境许可、贸易监管、知识产权和工作场所安全多重监管。首要监管风险是 IRA 45X 先进制造生产抵免；该抵免在法律中为永久性，但仍可能被立法修订，也受
              Treasury/IRS 对再生内容资格的解释指引影响。2025 年的国会提案明确瞄准再生电池材料抵免，理由是担心已在采矿环节获得激励的材料被重复补贴。2025 年生效的 FEOC 最终规则引入解释风险：如果
              Treasury 狭义界定再生内容路径的 FEOC 状态，OEM 客户的清洁车辆抵免资格可能受损。环境许可是第二类法律风险：Nevada DEQ 在 2023 年为 Churchill County
              发放空气质量许可；任何产能扩张都需要依据 NEPA 和 Nevada 州法接受额外环境审查。OSHA 关于电池回收危险材料处理的规定，适用于 Redwood 的 Nevada 和 South Carolina
              运营。自 2020 年以来，电池回收专利格局明显变厚；POSCO、Samsung SDI 和中国企业在湿法冶金处理和 CAM 前驱体合成上积极提交专利，增加了 Redwood 的 IP
              挑战风险。公开法院记录中未见 Redwood Materials 的重大诉讼，不过私营公司风险敞口若无 NDA 文件请求，无法完全核验。
