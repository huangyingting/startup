  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义、边界与替代方案
        blocks:
          - type: paragraph
            body: >
              Redwood Materials 并不处在单一离散市场，而是站在五个相邻环节组成的一体化堆栈里：（1）锂离子电池收集和处理（黑粉生产）；（2）关键矿物精炼（锂、镍、钴、锰中间品）；（3）面向 NMC/NCA
              化学体系电芯的正极活性材料（CAM）制造；（4）阳极铜箔（ACF）制造；（5）通过 Redwood Energy 部署二次寿命储能。纳入口径的支出包括 OEM
              电池回收合同、与电芯制造商签订的长期材料供应承购协议，以及储能项目收入。不纳入的是原生关键矿物开采、EV 电池电芯制造（这是 Redwood
              的客户，不是它的业务），以及使用新化学体系的常规电网储能（液流电池、钠离子）。

              存量替代方案因环节而异。电池回收方面，Redwood
              之前美国的默认做法是填埋或低价值火法冶金熔炼，主要送往比利时和韩国工厂；这种方式只回收钴和铜，却把锂和镍丢进炉渣。美国本土正极材料的替代品主要是进口，来源以中国供应商（CNGR、Hunan
              Shanshan）和韩国生产商（EcoPro、L&F）为主。阳极铜箔方面，在 Redwood 南卡罗来纳园区之前，美国本土市场基本不存在，全部供应来自韩国和日本生产商。二次寿命储能则与 CATL、BYD 的新
              LFP 电池系统和美国本土新建储能项目竞争。

              相邻机会包括盐湖卤水直接提锂（DLE）、固态电池前驱体供应，以及电池级碳酸锂 / 氢氧化锂生产；Redwood 已在这些领域投入技术，但尚未达到商业化规模。欧洲市场（2027
              年欧盟电池法规生效后）是监管驱动的相邻机会，Redwood 通过收购 Redux 进入该市场，但本章把它放在北美核心 SAM 之外。
