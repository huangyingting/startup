      - number: '4.5'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 是一家尚未盈利、资本开支很重的工业公司，正在押注用数十亿美元搭建美国本土电池回收和材料生产体系。它的财务画像有三个强项：（1）收入已经跑出来，运行率约 $200
              million；（2）已获得可观股权融资（私募超过 $2.3B），并拿到 $2 billion
              政府贷款有条件承诺，资本跑道可信；（3）收入模式绑定双边供应链合同，在当前规模下降低了销量风险。三项主要财务风险是：（1）大宗商品价格敏感——两条收入流都暴露在锂、钴、镍现货价格中，而这些价格已从 2022
              年高点大幅下跌；（2）资本强度与利用率——已投入超过 $4 billion，需要高利用率才能跑正单位经济，裁员节奏暗示利用率低于计划；（3）DOE 贷款不确定——公开信息中，$2 billion
              有条件承诺尚未正式关闭，任何条件或贷款项目政治风险都会构成重大的资本充足性风险。若 EV 车队增长恢复、大宗商品价格企稳或回升、South Carolina 园区满负荷运转，且 DOE
              贷款以有利条款关闭，盈利路径有可能跑通。每个依赖都增加执行风险。若投资人以 $6 billion 估值出资，承诺前必须对所有私有指标做完整财务尽调；仅靠公开信息，不足以支撑这个规模的承销判断。
