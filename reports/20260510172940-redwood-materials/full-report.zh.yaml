      - number: '5.4'
        title: 知识产权组合与可防御性
        blocks:
          - type: paragraph
            body: >-
              Redwood Materials 拥有 300 多项专利和专利申请，覆盖工艺栈中的具体创新。关键专利簇包括：（1）从电池浸出液中直接回收锂；（2）无需预分选的多化学体系黑粉处理；（3）用混合金属硫酸盐溶液合成
              CAM 前驱体并控制特定形貌；（4）薄规格铜箔 ACF 电沉积工艺参数与受控晶体织构。公司还围绕 Nevada 园区从试点放大到商业化运行过程中形成的具体工艺优化提交了专利。湿法冶金电池回收的 IP
              防御并不容易：基础化学（酸浸、溶剂萃取）在采矿业已很成熟，并在钴和锂精炼中使用了数十年。Redwood 的 IP
              优势在于面向电池来源原料的具体工艺配置和优化；这类原料在杂质谱、粒径和氧化态上不同于原生矿石。Argonne National Laboratory（ReCell Center）、Oak Ridge
              National Laboratory 以及多所大学的学术团队，已大量发表电池回收化学研究，形成越来越多的既有技术，可能限制 Redwood 未来专利权利要求范围。公司最可防御的 IP
              位置，或许不是正式专利组合，而是工艺 know-how：来自处理超过 20 GWh 电池的累积学习。
