      - number: '2.3'
        title: 增长驱动因素与需求催化剂
        blocks:
          - type: paragraph
            body: >
              六个结构性因素支撑 Redwood 一体化产品的需求。第一，2022 年《通胀削减法案》（IRA）是美国最重要的政策催化剂。Section 30D 要求本土关键矿物含量从 40%+ 提升到 2028 年的
              100%。Section 45X 为美国制造的正极和负极材料提供先进制造生产税收抵免，直接把 Redwood 的 CAM 和 ACF 产出变现为税收抵免。Section 48C
              将投资税收抵免扩展到先进能源制造。虽然现任政府已在 2025 年 9 月 30 日终止 EV 消费者税收抵免（30D），制造业激励（45X、48C）仍然有效。

              第二，美国 EV 采用带来了不断扩大的保有量，也在生成回收原料。IEA 预计美国道路上的 EV 数量将从截至 2023 年约 6.5M 辆增至 2030 年 26M 辆。BloombergNEF 估计，到
              2030 年美国约 2M 个 EV 电池包需要回收，第一波大众市场 EV 进入寿命终点后，2027 年之后量会快速上升。消费电子仍是近期重要的原料桥梁；EPA 估计美国每年丢弃 15 billion
              颗锂离子电芯。

              第三，对华脱钩政策把供应链韧性变成国家安全必需品。美国目前从中国进口 70%+ 的正极活性材料和 90%+ 的负极材料。第四，OEM 电池可持续性要求已经创造承诺性承购需求。Ford、GM、Toyota、BMW
              和 Panasonic 都做出电池循环承诺，并与 Redwood 签署供应或回收协议；这同时创造了可重复的原料供应和材料需求。第五，欧盟电池法规（2027 年生效）要求最低回收含量（到 2031 年钴 16%、锂
              6%、镍 6%）。第六，AI 数据中心储能热潮正在成为 Redwood Energy 的新需求催化剂；二次寿命 EV 电池包按每 kWh 计算，相比新 LFP 系统可节省 40–60% 成本。
            claimRefs:
