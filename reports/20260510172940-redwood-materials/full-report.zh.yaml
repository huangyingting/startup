              Energy、Envision AESC 等几家电池制造商（提供制造废料）。当前阶段，回收网络尤其有价值，因为消费端 EV 电池才刚开始批量进入寿命终点——第一波 2012-2015 年 Nissan Leaf
              电池和 2015-2018 年 Tesla Model S/X 电池包如今进入回收年龄。Redwood 将制造废料（Panasonic Nevada Gigafactory
