      - number: '4.2'
        title: 成本结构与单位经济
        blocks:
          - type: paragraph
            body: >-
              Redwood 的成本结构主要由内华达园区的资本折旧与摊销（已部署 $2.35B+）、人工（峰值约 1,100 名员工）、湿法冶金处理能耗和化学品投入主导。公司未公开披露毛利率或
              EBITDA，因此单位经济分析只能依赖估算和类比。Livent、Albemarle 等可比上市电池材料处理商，在有利大宗商品环境中报告 20–40% 毛利率，在当前低迷锂价环境中压缩至 5–15%。Redwood
              的湿法冶金流程比火法冶金替代方案运营强度更高，但材料回收率显著更高，部分用更高回收材料产出抵消更高运营成本。南卡罗来纳园区总规划 $3.5B，于 2025 年 11
              月进入一期运营，在尚未达到满运行率收入前，带来显著新增折旧和爬坡成本。营运资本由电池原料库存、化学品，以及电池收集到 CAM 交付客户之间的时间差驱动。2025 年 11 月裁员约 5%、2026 年 4
              月裁员约 10%（约 135 名员工），是降本动作，符合低于计划利用率运行的状态。
