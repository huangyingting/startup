      - number: '5.5'
        title: 技术放大风险与化学体系迁移
        blocks:
          - type: paragraph
            body: >-
              Redwood 近期最大的技术风险，是从已验证的试点规模放大到 Nevada 园区每年 100 GWh
              目标产能。湿法冶金流程包含数十个相互依赖的单元操作（破碎、浸出、溶剂萃取、结晶、烧结）；一到商业规模，热管理、停留时间、试剂混合和设备可靠性都会让工艺表现偏离试点结果。Li-Cycle 的 Rochester
              Hub 使用类似湿法路线，正是遇到了这些放大难题；其建设成本超支，部分归因于商业规模下的工艺工程复杂性。Redwood 中期最重大的技术风险，是化学体系迁移：如果电芯化学组合快速转向
              LFP（磷酸铁锂），其中不含钴和镍，电池回收经济模型会根本改变。LFP 黑粉含锂和铁，却没有让 NMC 回收具备经济吸引力的高价值钴和镍。行业分析师预计，到 2030 年 LFP 在全球 EV
              电池装机中的份额可能达到 40-50%，这会降低每 kWh 回收电池的平均可回收价值。Redwood 已承认这一风险，并投资 LFP 回收工艺化学，但 LFP 回收的单位经济仍显著低于 NMC 回收。
