      - number: '8.3'
        title: 可比交易与同业分析
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，电池回收可比公司样本很薄、承压且具有警示意义。Li-Cycle Holdings 是最重要的数据点：2021 年 SPAC 估值 $1.7B，到 2024
              年几乎让股权价值归零。Li-Cycle 失败说明，规模化湿法冶金电池回收所需资本远超初始估计；即便是拥有蓝筹投资人的资金充足上市公司，成本超支也可能致命。Ascend Elements 2026 年 4 月
              Chapter 11 是最接近的本土竞品可比案例；这家公司拥有相同雄心，包括 CAM 生产、OEM 合作和 DOE 支持，在申请破产前烧掉 $542M，并在披露重大不利事件后被 DOE 撤回 $480M
              有条件拨款。这些失败不是个例，而是 GWh 级湿法冶金回收基础设施结构性经济的反映：capex 强度超过初始模型，商品价格波动可让正 EBITDA 预测转负。Umicore 是唯一盈利的可比上市公司，但它是一家
              100 多年历史的比利时材料公司，拥有已充分折旧的基础设施和数十年运营打磨。它是 Redwood 的目标状态，不是近期可比对象。VW 以 $200-400M 收购 Battery Resources，意味着
              OEM 战略收购倍数为未来收入 15-30 倍；若 SC 园区在 2028-2030 年战略收购情景中实现规模化运营，Redwood 的出售价值可能为 $4-8B。Northvolt 峰值估值 $12B
              后重组，为相邻电芯制造领域提供警示：即便资金充足、OEM 合作强劲，capex 纪律和收率爬坡若赶不上预测，电池公司仍会失败。
            claimRefs:
              - CV004
              - CV005
              - CV017
              - CV025
