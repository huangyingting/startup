      - number: '1.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 创始人-市场匹配难以复制，先发规模优势突出
            body: >
              JB Straubel 花 15 年搭建 Tesla 的电池供应链和 Gigafactory；可以说，他是全球在 EV 电池材料运营上经验最深的人之一。Redwood 的先发位置意味着，它处理了北美约 90%
              的回收锂离子电池和电池材料。这形成结构性飞轮：收集更多电池 → 拥有更多可处理材料 → 与 OEM 签更多供应协议 → 回流更多退役电池。美国没有其他回收商接近 Redwood 的收集量或制造规模。美国能源部
              $2B 贷款承诺是任何电池回收商获得的最大美国政府融资，显示机构层面对美国本土供应链逻辑的认可，也为 Redwood 相对资本不足的对手提供了结构性竞争护城河。
            calloutType: strength
            claimRefs:
              - CO001
              - CO007
              - CO008
              - CO016
          - type: callout
            title: 2026 年 4 月重组和 COO 离职抬高执行风险
            body: >
              2026 年 4 月约 10% 的裁员和同时发生的 COO 离职，出现在一个关键节点：Redwood 一边管理资本密集的回收和材料制造业务，一边推出 Redwood
              Energy（面向数据中心的固定式储能）。TechCrunch、Electrive 和 American Bazaar Online 对重组的报道明确把它定性为降本，背后是 EV 回收业务面临挑战，包括 EV
              电池回流量低于预期、CAM/ACF 市场中的中国成本竞争，以及美国 IRA 补贴连续性不确定。Li-Cycle 2023 年暂停 Rochester
              Hub（类似湿法冶金设施因成本超支停摆）为规模化电池回收的资本强度提供了警示先例。储能转向在战略上合理，但也给已经很难的核心业务增加执行复杂度。
            calloutType: risk
            claimRefs:
              - CO031
              - CO032
              - CO033
              - CO035
              - CO036
          - type: callout
            title: Redwood Energy 以差异化低成本供给切入高增长 AI 数据中心市场
            body: >
              Redwood Energy 的逻辑有吸引力：二次寿命 EV 电池包仍保留原始容量的 70–80%，可以用远低于新电芯的成本部署为电网级储能，而 AI 数据中心市场正创造前所未有的现场储能需求。Rivian
              制造园区合作和 Crusoe Energy 数据中心合作，提供了早期概念验证客户认可。随着 EV 车队在 2027–2030 年成熟，退役电池包供应将呈指数级增长；Redwood
              已经建成收集基础设施，因此相对任何想进入二次寿命储能市场的竞争者，都拥有专属原料优势。$350M+ Series E 部分围绕这个储能机会来讲，NVIDIA 作为战略投资人参与，可能反映其对 Redwood
              Energy 未来成为 NVIDIA 数据中心生态供电伙伴的兴趣。
