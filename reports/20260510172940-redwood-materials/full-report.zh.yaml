chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与产品
        blocks:
          - type: paragraph
            body: >
              Redwood Materials, Inc. 是一家美国非上市先进材料与能源技术公司，总部位于内华达州 McCarran（Reno-Sparks 都市区内）。公司由 Jeffrey Brian “JB”
              Straubel 于 2017 年创立；他是 Tesla 联合创始人，并在 2019 年 7 月离开前担任 Tesla 首席技术官约 15 年。Straubel
              创业时的判断是，美国本土电池供应链最具成本效率、也更有环境韧性的路径，不是继续开采新的关键矿物，而是从 EV 和消费电子产品中已经投入使用、且规模不断增长的退役锂离子电池包里回收。

              Redwood 的使命是打造完全循环的电池经济。它的四阶段模式包括：（1）从汽车
              OEM、电子制造商和消费者回收计划收集退役电池并做物流；（2）通过湿法冶金和火法冶金回收提取镍、钴、锂、铜和锰；（3）以商业化规模精炼并制造正极活性材料（CAM）和阳极铜箔（ACF）这两个价值密度最高的电池部件；（4）自
              2025 年起，通过 Redwood Energy 部门把二次寿命 EV 电池包部署为面向数据中心和工业场地的电网级储能系统。Redwood 声称关键矿物回收率超过 95%，每年处理约 20 GWh
              电池容量；截至 2025 年，这大约占北美全部回收锂离子电池和电池材料的 90%。
