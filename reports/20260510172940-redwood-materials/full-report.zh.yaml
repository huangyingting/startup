      - number: '2.6'
        title: 市场规模与采用尽调缺口
        blocks:
          - type: paragraph
            body: >
              多个证据缺口限制了本市场分析的精度。Redwood 是私营公司，不按业务分部披露细粒度收入、产量或利润率数据。关于北美电池回收和材料市场的公开分析师估算，会因口径和方法不同出现 2–3x
              差异。没有底层模型，SNE Research 对 2030 年全球 $22B 的估算，与 IDTechEx 对 2033 年 $14.5B 的更保守估算无法直接对齐。

              Redwood 在内华达 + 南卡罗来纳满产后的真实长期 SOM，取决于目前无法知道的变量：锂和镍价格路径、OEM 从 NMC 转向 LFP 的化学体系转换速度，以及 DOE ATVM 贷款提款节奏。满产下
              $2–5B 的年收入区间有方向参考价值，但不确定性很大。Redwood 当前收入在不同业务分部之间如何拆分并未公开；多个二手来源暗示总收入约 $200M/年，但没有分部拆分。

              Redwood 当前正极产出中具体的回收含量比例尚未得到独立验证；这是循环经济营销和客户认证的关键主张。LFP 电池增长对 Redwood 工艺经济性的影响，是一个重大未解问题：LFP
              电芯不含钴或镍，需要不同的湿法冶金处理。TM002 保留了彼此冲突的市场估算；在理解口径差异前，不应取平均。尽调应优先争取 Redwood 分业务财务预测的直接访问权，以及材料回收率的独立审计。
