  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: >-
      以 $5.5B 基准情景为起点，估算 Redwood Materials
      隐含股权估值在八个关键情景驱动下的变动，单位为十亿美元。正值代表相对基准的估值上行，负值代表下行。所有数值均为基于公开证据的分析师估算，只能作为方向性参考。
    approximationNotes: 敏感性数值由分析师根据公开证据和可比交易分析估算，不反映经审计财务数据或管理层指引。实际敏感性可能显著不同。正值和负值分别代表相对 $5.5B 基准股权估值的估算增量或减量影响。
    data:
      items:
        - label: DOE 贷款在 2026 H1 正式关闭
          value: 2.5
        - label: SC 园区到 2027 年全面爬坡至每年 45 GWh
          value: 3.8
        - label: IRA 45X 抵免维持至 2032 年
          value: 2.1
        - label: 锂价回升至每 MT $15,000
          value: 1.4
        - label: OEM 扩张并新增两家合作伙伴
          value: 1.2
        - label: LFP 份额到 2028 年超过 65%
          value: -1.8
        - label: DOE 贷款撤回或削减超过 50%
          value: -2.2
        - label: 30% 概率的降估值融资情景
          value: -3.5
    claimRefs:
      - CV019
      - CV020
      - CV027
      - CV028
  - id: FV003
    title: 估值回报区间
    type: range
    layout: standard
    summary: >-
      Redwood Materials 在六种情景下的低、中、高股权估值区间，单位为十亿美元；情景包括熊市情景、基准情景、牛市情景、战略出售、IPO 路径和困境融资。数值代表 2028-2030
      年相应退出窗口的估算股权价值。所有数字均以十亿美元计，数值中不嵌入单位。
    approximationNotes: >-
      所有数值均为基于公开证据的分析师估算。经审计财务数据和 DOE 贷款条款会显著提升精度。以 $5.5B 进入估值计算，各情景概率加权预期价值约为
      $4.9-6.2B，代表温和正预期价值，但不足以补偿该价格点下二元熊市下行情景风险。
    data:
      items:
        - label: 熊市情景 30% 概率：DOE 延迟，锂价低迷
          low: 1.5
          base: 2.3
          high: 3
        - label: 基准情景 50% 概率：DOE 贷款关闭，SC 按计划推进
          low: 4
          base: 5.8
          high: 7.5
        - label: 牛市情景 20% 概率：全面爬坡，锂价回升
          low: 8
          base: 11
          high: 15
        - label: 战略出售给 OEM：2028-2030 年窗口
          low: 4.5
          base: 8
          high: 14
        - label: EBITDA 损益平衡后 IPO：若达成，窗口为 2030 年
          low: 5.5
          base: 9.5
          high: 14
        - label: 困境融资或降估值融资：熊市情景子集
          low: 1
          base: 2
          high: 3.5
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV032
      - CV033
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 截至 2026 年 5 月，面向 IC 的 Redwood Materials 关键投资指标快照，覆盖市场地位、经济性、资本结构、风险和证据质量。
    data:
