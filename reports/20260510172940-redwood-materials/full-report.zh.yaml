      - number: '5.3'
        title: CAM 和 ACF 产品规格与客户要求
        blocks:
          - type: paragraph
            body: >-
              Redwood 的两条成品线——正极活性材料（CAM）和负极铜箔（ACF）——是整合工艺中价值最高的产出。CAM 方面，Redwood 主要生产 NMC 811（镍锰钴比例 80-10-10），这是高能量密度
              EV 应用的主流化学体系，包括 Tesla 2170 电芯以及 Panasonic 供 Model Y 和 Model 3 的电芯。NMC 811 CAM 必须达到电池级规格，包括粒径分布（D50 为 10-12
              微米）、比表面积（0.2-0.5 m2/g）和电化学性能（容量 > 185 mAh/g，100 次循环后容量保持率 > 80%）。Redwood 向 Panasonic Energy 商业交付
              CAM，验证了其以商业化产量满足这些规格的能力。ACF 方面，Redwood 为负极应用生产 6、7、8 微米厚度铜箔，与 Iljin Materials、SKC、Furukawa Electric
              等成熟韩国和日本 ACF 厂商竞争。ACF 在超薄规格下要求极高的尺寸一致性和抗拉强度，需要自研电沉积工艺控制。Redwood 在 ACF
              上的差异化，是以再生铜作为原料；如果扣除精炼成本后再生铜净成本低于原生铜，这既带来 IRA 本土含量优势，也可能带来成本优势。
            claimRefs:
