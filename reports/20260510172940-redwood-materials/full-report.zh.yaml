      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              JB Straubel（1975 年 12 月 20 日生于爱荷华州 Des Moines）拥有 Stanford University 能源工程 BS 和 MS 学位，是全球电动汽车产业最受认可的人物之一。在
              Tesla，他是第 5 号员工和联合创始人，15 年任期中负责电池系统、动力总成架构和 Gigafactory 概念。他在 2019 年 7 月从 Tesla 高管转为顾问，并于 2023 年当选 Tesla
              董事。Straubel 实际上在仍任职 Tesla 时就于 2017 年启动 Redwood Materials，让公司在 EV
              大规模普及、退役电池管理问题变得尖锐之前先卡位。他的履历带来异常强的创始人-市场匹配：Redwood 要解决的电池供应链问题，正是他在 Tesla 花 15 年试图搭起来的那套系统。

              按公开披露，Redwood Materials 现任领导层包括首席技术官 Colin Campbell（Tesla 电池老兵，2023 年 8 月加入）、首席商务官 Cal Lankton、首席人力官 Mandy
              Clark、外部事务副总裁 Alexis Georgeson，以及总法律顾问 Alma Chao。Redwood 2025 年 4 月在 San Francisco Design District 开设
              15,000 平方英尺 R&D 中心，以吸引 Bay Area 工程和材料科学人才。2026 年 4 月重组导致约 10% 员工被裁，COO 离职；这表明 Redwood 正把资源转向储能业务，并在理顺 EV
              回收成本结构。

              作为私营公司，Redwood 不公开披露董事会构成或投资人治理权。战略投资者——Eclipse Ventures、NVIDIA 的 NVentures、Goldman Sachs
              等——很可能拥有董事席位或观察员席位。截至 runDate，公开信息中未见重大诉讼、监管违规或治理争议。
