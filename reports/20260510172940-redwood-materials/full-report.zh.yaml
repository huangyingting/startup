      - number: '1.3'
        title: 融资历史、估值与投资人
        blocks:
          - type: paragraph
            body: >
              Redwood Materials 自成立以来已融资约 $2.3B 私募股权资本，另有美国能源部 $2B 条件性贷款承诺；按资本规模看，它远高于其他美国电池回收商。Series E 于 2025 年 10
              月首次关账 $350M，据报道投后估值约 $6B，由 Eclipse Ventures 和 NVIDIA 的 NVentures 领投。2026 年 1 月最终关账后，更多投资人加入，Series E 总额升至
              $425M。Wilson Sonsini Goodrich & Rosati 为 Redwood 的 Series E 提供法律顾问。此前轮次包括 2023 年 8 月以约 $3.7B 隐含估值融资 $1B 的
              Series D、2021–2022 年约 $700M 的 Series C，以及更早的种子轮和 Series A/B。美国能源部 2023 年 2 月的条件性承诺，是一笔 $2B
              贷款担保，用于内华达州和南卡罗来纳州的美国本土电池材料制造产能建设。

              投资人覆盖头部 VC（Eclipse Ventures、Andreessen Horowitz）、技术战略投资方（NVIDIA 的 NVentures）、金融机构（Goldman Sachs）和气候基金。Ford
              Motor Company、Rivian、Toyota、Panasonic、GM、Volkswagen 和 Caterpillar 等伙伴关系带来承购收入和供应链整合。如果电池供应趋紧，主要 OEM
              投资人和合作伙伴彼此争夺电池供应，可能产生利益冲突。

              收入和财务指标仍未公开披露。BatteryIndustry.net 行业分析师估计，2024 年收入约 $200M/年，与已报道生产合同的规模相符。Redwood 尚未披露盈利能力、烧钱速度或剩余现金跑道。
