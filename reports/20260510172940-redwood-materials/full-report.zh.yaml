      - number: '1.5'
        title: Redwood Energy、战略转向与关键风险
        blocks:
          - type: paragraph
            body: >
              Redwood 在 2025–2026 年最重要的进展，是推出 Redwood Energy：该部门专门把退役 EV 电池包再利用为二次寿命电网级储能系统。Redwood Energy
              不把所有流入电池都彻底回收成原材料，而是用自研 Pack Manager 技术评估电池包，挑出剩余容量足够的包，再以模块化、低成本储能单元部署到工业场地和 AI 数据中心。公司宣布与 Rivian 合作，在
              Rivian 位于伊利诺伊州 Normal 的制造园区部署 Redwood Energy 储能系统，也披露了与 AI 基础设施公司 Crusoe Energy 的数据中心供电合作。ESS-News 2026 年
              3 月报道显示，一家美国数据中心运营商采用二次寿命 EV 电池做现场供电，说明商业采用刚起步。Redwood Energy 公告把目标描述为“用快速、低成本储能为 AI 时代和变化中的电网供电”。

              但 Redwood 2026 年 4 月重组——裁撤约 10% 员工并导致 COO 离职——抬高了近期执行担忧。TechCrunch、Electrive 和 American Bazaar Online
              等多家媒体明确把这次重组称为降本动作，目的是把资源转向储能。批评者指出，Redwood 需要同时管理资本密集的回收和材料制造业务，又要孵化早期储能业务，执行风险并不低。成本更低的中国电池回收商、《通胀削减法案》下
              EV 税收抵免的政策不确定性，以及 2024–2025 年更广泛的 EV 采用放缓，都构成逆风。Li-Cycle 2023 年因成本超支暂停 Rochester Hub 建设，是这个行业资本强度的警示样本。

              近期最关键的问题是：Redwood 的储能转向能否在 EV 回收业务自行盈利前贡献有意义的收入；这是双路径融资难题，$425M Series E 正是用来架桥的。
