      - number: '3.5'
        title: 护城河耐久性与被替代风险
        blocks:
          - type: paragraph
            body: >-
              Redwood 的竞争护城河建立在五根支柱上：规模经济（20+ GWh/年，已部署资本 $4B+）、OEM 供应协议、CAM 整合、监管关系和 DOE 贷款、地理位置。每根支柱都有相应被替代风险。Li-Cycle
              和 Ascend Elements 的 Chapter 11 申请验证了规模护城河——资本和时点优势不足、尝试类似模式的竞争者没能达到盈亏平衡。但规模护城河需要持续增长的处理量；如果 EV 需求像
              2025–2026 年那样低迷，固定成本会从优势变成负担。COO 离职和 2025–2026 年两轮裁员是反向信号，暗示公司运行低于计划利用率。技术替代风险真实存在，但属于中期：固态电池和 LFP
              化学体系转向，可能要求在工艺适配上重新投入资本。来自 CATL 和 GEM Co.
              的中国成本竞争，是最重要的长期威胁；中国回收商受益于一体化供应链和更低资本、劳动力成本，但进入北美市场会受到监管和地缘政治壁垒，这些壁垒可能持续十年。回收处理本身的商品化风险——技术标准化、更多玩家进入后利润率被压缩——是
              5–10 年维度的结构性风险，尤其当原料量增长、新资本进入时。Redwood 最耐久的竞争优势是：（1）有双边量承诺的 OEM 伙伴网络，（2）与电芯制造商的 CAM
              资质认证关系，（3）已经落地的实物资产和环保许可；这些都需要多年才能复制。
