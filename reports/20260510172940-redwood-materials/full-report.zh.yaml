      - number: '5.6'
        title: 图表
        blocks:
          - type: callout
            title: 超过 95% 的锂回收率形成结构性成本优势
            body: >-
              Redwood 的湿法 DLR 工艺从电池原料中回收超过 95% 的锂，而火法替代路线不到 5%。在当前电池级碳酸锂价格下，NMC 811
              的锂含量正成为主要成本驱动因素；这一回收率形成了相对于火法竞争者的结构性投入成本优势，并降低每 kg CAM 成品的原料成本。
            calloutType: strength
            claimRefs:
              - CE006
              - CE007
          - type: callout
            title: LFP 化学体系增长压低每 kWh 可回收金属价值
            body: >-
              LFP 电池不含钴或镍，只有锂和铁。随着 LFP 到 2030 年向全球 EV 电池装机 40-50% 份额增长，Redwood 每处理 1 kWh 电池的平均可回收价值将明显下降。公司已投资 LFP
              工艺化学，但尚未公开披露 LFP 回收经济性；外界预期其显著低于 NMC 经济性。
            calloutType: risk
            claimRefs:
              - CE023
              - CE024
              - CE025
          - type: callout
            title: 工艺 know-how 比专利组合更可防御
            body: >-
              Redwood 的正式专利组合覆盖具体工艺配置，但基础湿法冶金化学在采矿业已很成熟。公司最可防御的竞争资产，是规模化处理超过 20 GWh 电池积累的工艺
              know-how——这条学习曲线需要数年才能复制，涵盖杂质管理、设备可靠性和收率优化；这些能力很难申请专利，也同样难以复现。
            calloutType: insight
            claimRefs:
              - CE018
              - CE019
              - CE020
          - type: callout
            title: 商业化 CAM 质量假定满足 Panasonic 规格
            body: >-
              本章基于供货关系仍在延续，假定 Redwood 对 Panasonic Energy 的商业化 CAM 交付满足电池级 NMC 811 规格。公开信息中，没有独立第三方质量验证或电化学表征结果证明 Redwood
              商业化 CAM 产出。投资人应在 NDA 下索取质量控制数据和客户验收证书。
            calloutType: assumption
            claimRefs:
              - CE011
              - CE012
