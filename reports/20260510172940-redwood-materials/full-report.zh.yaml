      - number: '5.2'
        title: 湿法冶金工艺相对火法冶金的差异化
        blocks:
          - type: paragraph
            body: >-
              电池回收的底层技术选择，是火法冶金（pyro）还是湿法冶金（hydromet）。火法工艺在高温下熔炼电池材料，以合金形式回收钴和镍，但会损失挥发的锂，并且要靠高能耗酸浸才能回收其他金属。湿法工艺把电池材料溶解在水溶液中，再用化学分离逐一回收各类金属。Redwood
              的路线以湿法为先：锂回收率超过 95%，而随着锂成为 NMC 811 和 LNMO
              正极化学体系的关键成本项，这一点很重要。公司的直接锂回收（DLR）技术不走传统石灰沉淀步骤，而是从浸出液中选择性提取锂，这是关键自研创新，降低试剂成本并提高锂纯度。Redwood
              的化学体系也不挑料：同一设施可处理 NMC（111、532、622、811）、LFP、NCA 和氧化钴体系，相比为特定正极类型优化的竞争对手，拥有原料灵活性。电池化学组合正在变化，这一点很重要：LFP
              快速增长（到 2024 年，已从接近零增至全球 EV 电池产量的 30% 以上），钠离子也在出现，未来原料化学构成存在不确定性。
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
