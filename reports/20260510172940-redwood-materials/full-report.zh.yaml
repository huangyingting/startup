      - number: '8.2'
        title: 估值方法与背景
        blocks:
          - type: paragraph
            body: >-
              三种估值方法支撑对 Redwood Materials 的 $5.5B 评估。第一，收入倍数法：采用分析师从公开证据推导的 2025 年收入估计 $300-500M，Redwood 对应 11-18
              倍追踪收入。最可比的规模化上市公司 Umicore 2023 年收入 EUR 2.9B，交易倍数为 0.8-1.5 倍收入和 6-10 倍 EBITDA，只有 Redwood
              隐含倍数的一小部分。收入溢价主要由增长轨迹和战略资产价值支撑，而不是当前盈利能力。第二，NAV 法：Nevada 园区重置价值 $800M-1.2B，SC Phase 1 基础设施按成本
              $1.8-2.5B，供应协议价值 $500M-1.5B，技术 IP 价值 $500M-1.0B，以及 DOE 战略关系期权价值 $1.5-3.0B，合计隐含 $5.1-9.2B 区间，覆盖 Series C
              估值。这一方法最支持当前价格，但关键取决于 SC Phase 1 capex 假设。第三，可比交易法显示：Li-Cycle 以 $1.7B SPAC 上市后现已破产，VW 收购 Battery Resources
              价格为 $200-400M，Ascend Elements 获资扩张至 $542M 后现已破产；这些都说明 Redwood 享有战略溢价，来自 OEM
              关系质量和创始人溢价。当前融资环境不利：行业破产提高了风险感知，锂价约 $12,000/MT、仍低于 2022 年高点，公开市场对尚未盈利的基础设施公司也受限。入场纪律要求：要么相对 $5.5B
              打折，要么在投入新资本前确认 DOE 贷款关闭。若 DOE 贷款延至 2027 年之后，SC Phase 2 估计 $1.5-2.5B 的股权资金需求会带来显著增量稀释风险。
            claimRefs:
