          value: ~$2.4B seed plus Series B plus Series C
          status: strong
        - label: DOE ATVM 有条件贷款
          value: $2.0B not yet formally closed
          status: conditional
        - label: 已确认 OEM 合作伙伴
          value: 3 Ford Panasonic Toyota
          status: strong
        - label: 估算 2025 年收入倍数
          value: 12-18x 2025E revenue analyst estimate
          status: demanding
        - label: 2024-2026 年美国同业结果
          value: '2 of 3 major US recyclers in distress: Li-Cycle and Ascend Chapter 11'
          status: adverse
    claimRefs:
      - CV002
      - CV013
      - CV014
      - CV031
