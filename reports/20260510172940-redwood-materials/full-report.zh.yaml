          - type: paragraph
            body: >-
              Redwood 最集中的依赖是 Panasonic Energy；基于 Nevada 园区共址关系，Panasonic 似乎占当前 CAM 输出量的大部分。Panasonic 任何减量都会立即传导至
              Redwood 产出利用率和 DOE 贷款里程碑合规。Take-or-pay 条款、定价机制和合同期限均未公开；需求不足时若触发不可抗力，Redwood 可能留下闲置产能和固定成本包袱。DOE
              是关键财务依赖：截至 2026 年一季度，$2B 有条件 ATVM 贷款尚未确认最终关闭。分析师估计，约 30% 的 DOE 有条件承诺无法进入最终关闭，或经历重大重组；如果 DOE 对 Redwood
              重组，将迫使公司以可能压缩的估值桥接股权融资，可类比 Li-Cycle 崩盘或 Northvolt 申请 Chapter 11。Ford Motor Company 和 Amazon
              同时是股权投资人、原料伙伴和客户伙伴；若业务条款需要重谈，会形成治理冲突。POSCO Future M 和 EcoPro BM 代表不断增长的竞争性依赖风险：如果 OEM 以更低成本把 CAM 需求转向符合
              FEOC 的韩国合资企业，Redwood 的可服务市场会大幅收缩。Nevada 和 South Carolina 产能扩张还依赖当地监管批准，这带来本地许可风险，并叠加资本部署不确定性。
