        - from: acf
          to: oem
          label: 供应协议（Ford）
        - from: oem
          to: end-markets
          label: 新 EV 电池（循环经济）
        - from: collection
          to: secondlife
          label: 可用电池包转入 Redwood Energy
        - from: secondlife
          to: end-markets
