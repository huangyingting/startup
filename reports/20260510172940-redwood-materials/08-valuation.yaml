  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Revenue and burn rate by segment (QV003 and QV005)
      missingEvidence: >-
        Redwood Materials does not publicly disclose audited financial statements, revenue by segment
        including processing fees versus CAM/ACF product sales, EBITDA, or cash burn rate. The estimated
        $300-500M revenue range for 2025 is analyst-derived without public confirmation. Annual capital
        expenditure run rate is estimated at $200-400M but cannot be verified without management access.
      whyItMatters: >-
        Without revenue confirmation, the 12-18x revenue multiple cannot be validated. Burn rate uncertainty
        means capital adequacy for SC Phase 2 without DOE loan cannot be independently assessed. This is
        the single largest analytical gap in the valuation framework.
      diligencePath: >-
        Request audited financial statements for FY2023-FY2025 from management under NDA. Obtain segment
        revenue breakdown and capex schedule from data room.
      relatedQuestionRefs: [QV003, QV005]

    - type: private-evidence-only
      severity: material
      topic: DOE ATVM loan milestone and covenant terms
      missingEvidence: >-
        The specific milestone conditions, construction benchmarks, financial covenants, default triggers,
        and cure periods attached to Redwood's DOE ATVM conditional loan commitment are not publicly
        disclosed. Only the total amount of $2B and the conditional nature of the commitment are public.
      whyItMatters: >-
        The DOE loan is Redwood's most important non-dilutive capital source and the largest single
        thesis-break trigger. Without knowing milestones, investors cannot assess the probability of loan
        revocation, model capital adequacy under adverse scenarios, or understand conditions that would
        trigger an Ascend-Elements-type withdrawal.
      diligencePath: >-
        Request conditional commitment letter and full term sheet from Redwood management under NDA.
        Cross-reference with DOE Loan Programs Office public communications and FY2025 portfolio review.
      relatedQuestionRefs: [QV006]

    - type: missing-source
      severity: moderate
      topic: Independent verification of US market share claim
      missingEvidence: >-
        Redwood Materials claim of approximately 50% US recycled battery market share is company-stated
        and not corroborated by independent market research with public methodology disclosure. No third-party
        firm including BloombergNEF, Wood Mackenzie, or S&P Global has published a detailed US battery
        recycling market share table with Redwood specifically cited at this level.
      whyItMatters: >-
        If Redwood's market position is significantly lower, the strategic moat and pricing power arguments
        would be weakened, and the valuation premium versus comparable recyclers would be harder to justify.
      diligencePath: >-
        Commission independent battery recycling market share analysis from Benchmark Mineral Intelligence
        or Wood Mackenzie. Cross-check against publicly reported processing volumes from major OEM take-back
        programs.
      relatedQuestionRefs: [QV009]

    - type: missing-source
      severity: moderate
      topic: LFP battery chemistry disruption probability and timeline
      missingEvidence: >-
        No public source quantifies the probability and specific timeline under which LFP battery chemistry
        dominance in the US market would reach a level that materially impairs Redwood's NMC-optimized
        hydrometallurgical process economics. LFP share data above 50% globally in 2024 exists but
        US-specific OEM chemistry adoption for 2027-2030 is uncertain.
      whyItMatters: >-
        LFP disruption is the primary technology risk that could structurally impair Redwood's long-term
        per-tonne economics without requiring any execution failure. It is a slow-moving but potentially
        thesis-breaking risk on a 3-5 year horizon.
      diligencePath: >-
        Request Redwood LFP-compatible process adaptation roadmap under NDA. Obtain OEM battery chemistry
        mix forecasts from BNEF or Wood Mackenzie for US-specific applications through 2030.
      relatedQuestionRefs: [QV017]

    - type: missing-source
      severity: moderate
      topic: Secondary market valuation marks since Series C
      missingEvidence: >-
        No publicly disclosed secondary market transactions, fund marks, or LP communications have been
        identified that would indicate how Redwood's implied valuation has moved since the August 2023
        Series C. Given sector-level distress from Li-Cycle and Ascend bankruptcies and the April 2026
        restructuring, the current fair market value may differ materially from the $5.5B Series C mark.
      whyItMatters: >-
        If institutional LPs have marked Redwood down in portfolio valuations, this would be a leading
        indicator of down-round risk and would change entry price discipline for any new investor.
      diligencePath: >-
        Monitor LP disclosure reports from T. Rowe Price, CPPIB, and Baillie Gifford for any public fund
        marks. Review secondary market platforms for seller indications.
      relatedQuestionRefs: [QV024]

    - type: partial-evidence
      severity: moderate
      topic: Comparable valuation table coverage gap
      missingEvidence: >-
        The comparable valuation table covers primary public and private battery recycling transactions
        available in public records but does not include confidential M&A deal terms for VW/Battery
        Resources, undisclosed secondary transactions, non-US battery recyclers without publicly available
        financial data, or most recent private round valuations for Cirba Solutions and Call2Recycle.
      whyItMatters: >-
        A broader comparable set could expand the multiple range and improve calibration of the $5.5B
        valuation. Chinese battery recycler economics are particularly relevant given CATL recycling
        subsidiary scale and cost structure.
      diligencePath: >-
        Obtain PitchBook or CB Insights comprehensive battery recycling M&A transaction data. Commission
        Wood Mackenzie or S&P Global comparable transaction analysis covering non-US recyclers.
      relatedTableRefs: [TV004]

