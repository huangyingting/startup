        Chinese battery materials processors including CATL-linked producers, CNGR Advanced Material, and
        Huayou Cobalt produce battery-grade CAM at 20-40% lower cost than domestic US equivalents, driven
        by lower labor costs, existing at-scale infrastructure, and Chinese government subsidies. IRA FEOC
        rules are the primary structural moat protecting Redwood's pricing power in the domestic US market.
      type: observed
      topic: Chinese competitive cost gap
      confidence: medium
      freshness: current
      sourceRefs: [SV009, SV010]
      answersQuestionRefs: [QV018]

    - id: CV039
      statement: >-
        The DOE ATVM conditional loan to Redwood creates a binary capital availability risk through
        milestone-triggered draw conditions. DOE's revocation of Ascend Elements' $480M conditional grant
        in April 2026 following its Chapter 11 filing demonstrates that DOE loan programs are not guaranteed
        and can be withdrawn upon material adverse events, undisclosed covenant breaches, or construction
        underperformance against milestones.
      type: inferred
      topic: DOE loan binary risk
      confidence: medium
      freshness: current
      sourceRefs: [SV004, SV026]
      answersQuestionRefs: [QV006]

    - id: CV040
      statement: >-
        Redwood Materials' most realistic exit scenarios by 2028-2030 are a trade sale to a major OEM such
        as Toyota, GM, or Volkswagen seeking domestic battery supply chain security, a strategic acquisition
        by a large battery materials company such as BASF, Umicore, or POSCO, or an IPO if revenue exceeds
        $1B and EBITDA approaches breakeven. Public markets for pre-profitability capital-intensive
        infrastructure companies remain structurally difficult in 2026.
      type: inferred
      topic: exit readiness
      confidence: medium
      freshness: current
      sourceRefs: [SV019, SV010]

    - id: CV041
      statement: >-
        Benchmark Mineral Intelligence data shows lithium iron phosphate batteries exceeded 50% of global
        EV battery shipments in 2024. Redwood's hydrometallurgical process is optimized for NMC and NCA
        chemistries containing high-value cobalt and nickel. LFP recycling recovers primarily lithium and
        iron phosphate with significantly lower per-tonne economic value, creating a structural threat to
        Redwood's recycling unit economics if LFP share continues expanding toward 65% or more by 2028.
      type: observed
      topic: LFP chemistry risk
      confidence: medium
      freshness: current
      sourceRefs: [SV018, SV009]
      answersQuestionRefs: [QV017, QV031]

    - id: CV042
      statement: >-
        At a $5.5B post-money valuation and combined Nevada plus SC Phase 1 capacity of approximately
        45-75 GWh/yr, Redwood's implied valuation per GWh of processing capacity is approximately
        $73-120/GWh. This compares to public market pricing of battery cell capacity at $30-80/GWh for
