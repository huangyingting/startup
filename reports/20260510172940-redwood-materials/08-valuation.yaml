        materially, lithium prices remain below $8,000/MT for two consecutive quarters, and SC campus ramp
        trails by two or more years. Redwood is forced to raise distressed equity at a compressed multiple,
        resulting in a valuation of $1.5-3.0B. This would represent a 45-73% decline from the 2023 Series C
        price of $5.5B and mirrors Li-Cycle and Ascend precedents.
      type: inferred
      topic: bear case valuation
      confidence: low
      freshness: current
      sourceRefs: [SV006, SV007]
      answersQuestionRefs: [QV016, QV003]

