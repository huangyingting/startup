        Redwood Materials' revenue is primarily driven by two streams: processing fees charged per tonne of
        battery scrap received for recycling, and product sales of CAM, ACF, black mass, and refined materials
        to OEM and battery manufacturer customers. As the SC campus scales, product sales are expected to
