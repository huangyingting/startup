  - id: exit-readiness-diligence
    title: Exit Readiness and Final Diligence Priorities
    body: >-
      Redwood Materials is not currently exit-ready for public markets. IPO conditions for capital-
      intensive, pre-profitability infrastructure companies remain constrained in 2026 as evidenced by
      the poor performance of comparable public offerings in the cleantech sector. The most realistic
      exit scenario is a strategic trade sale to an OEM including Toyota, GM, or Volkswagen, or a large
      battery materials company including BASF, Umicore, or POSCO, between 2028 and 2030, once SC campus
      reaches meaningful scale and EBITDA approaches breakeven. JB Straubel's OEM relationships from his
      Tesla tenure make a negotiated trade sale more feasible than for a typical industrial company. The
      DOE loan, if drawn, creates a government lender relationship that could complicate or condition any
      trade sale requiring change-of-control consent from the DOE. Five diligence items are threshold
      requirements before any investment commitment at the $5.5B level. First, audited financial statements
      for FY2023-FY2025 providing revenue, EBITDA, capex, and cash position by segment. Second, the DOE
      ATVM conditional loan term sheet with milestone conditions and cure periods. Third, OEM supply
      agreement terms confirming duration, volume commitments, and pricing mechanisms for at least one of
      the three OEM contracts. Fourth, SC campus capex schedule and Phase 2 funding plan. Fifth, Redwood's
      LFP chemistry adaptation roadmap. Items one, two, and three are independently blocking: without all
      three, the valuation framework relies on too many unverified assumptions to support investment
      commitment at $5.5B. The most actionable immediate diligence step is requesting management access
      under NDA for data room review, as all five priority items require direct company engagement.
