      topic: Ascend Elements comparable
      confidence: high
      freshness: current
      sourceRefs: [SV007, SV019]
      answersQuestionRefs: [QV015]

    - id: CV027
      statement: >-
        Redwood's IRA 45X credits at approximately $35/kWh applied to 45-75 GWh/yr of combined Nevada and
