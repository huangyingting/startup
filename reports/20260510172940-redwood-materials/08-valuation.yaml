callouts:
  - type: warning
    title: Sector-Level Capital Destruction Risk
    body: >-
      Two of the three significant US battery recyclers have filed for Chapter 11 within 18 months of this
      report: Li-Cycle in October 2024 and Ascend Elements in April 2026. The capital destruction patterns
      in both cases, including cost overruns on hydrometallurgical facilities, DOE grant dependency, and
      lithium price sensitivity, directly mirror Redwood Materials risk profile. This is not an idiosyncratic
      peer failure; it is a structural sector warning about capital-intensive battery recycling at scale.
    claimRefs:
      - CV004
      - CV005
      - CV026

  - type: info
    title: Entry Price Discipline
    body: >-
      Any investment at or above the 2023 Series C price of $5.5B post-money requires confirmation of two
      threshold events before commitment: first, DOE ATVM loan formal close with milestone terms reviewed
      under NDA, and second, access to audited FY2024 financials confirming revenue scale. Without these
      two data points, the valuation framework rests on unverified revenue assumptions and conditional
      capital that may not materialize.
    claimRefs:
      - CV001
      - CV003

