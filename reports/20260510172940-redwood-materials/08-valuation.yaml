      statement: >-
        A NAV-based valuation of Redwood Materials would sum Nevada campus replacement value of $800M-1.2B,
        SC campus Phase 1 infrastructure of $1.8-2.5B at cost, supply agreement and customer contract value
        of $500M-1.5B, technology IP value of $500M-1.0B, and the DOE strategic relationship embedded option
        value of approximately $1.5-3.0B. This sum-of-parts approach implies a range of $5.1-9.2B, which
        brackets the $5.5B Series C valuation but depends critically on SC Phase 1 capex and DOE option value
        assumptions.
      type: inferred
      topic: NAV valuation approach
      confidence: low
      freshness: current
      sourceRefs: [SV004, SV015]
      answersQuestionRefs: [QV004]

