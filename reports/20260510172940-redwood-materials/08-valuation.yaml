        The IRA Section 30D consumer EV tax credit ended September 30, 2025, eliminating up to $7,500 per
        vehicle in consumer incentives. This policy change reduces near-term EV adoption rates, which
        directly impacts the rate at which new EV batteries enter the market and slows the long-term
