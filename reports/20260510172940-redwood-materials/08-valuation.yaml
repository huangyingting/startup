      topic: SC campus Phase 1
      confidence: medium
      freshness: current
      sourceRefs: [SV015, SV025]
      answersQuestionRefs: [QV007, QV025]

    - id: CV015
      statement: >-
        IRA Section 45X advanced manufacturing tax credits provide approximately $35/kWh for qualifying
        domestic battery cell and component production, including cathode active materials and anode copper
        foil. These credits remain in force as of May 2026 and represent a structural cost advantage for
        Redwood versus imported Chinese battery materials that carry no equivalent US production subsidy.
      type: observed
      topic: IRA 45X credit
      confidence: high
      freshness: current
      sourceRefs: [SV005, SV030]
      answersQuestionRefs: [QV014, QV029]

    - id: CV016
      statement: >-
        At a $5.5B post-money valuation and estimated 2025 revenues of approximately $300-500M based on
        analyst estimates from public evidence, Redwood Materials trades at approximately 11-18x trailing
        revenue. This is a substantial premium relative to public-market battery materials producers such
        as Umicore at 0.8-1.5x revenue, reflecting growth expectations, strategic value, and private
        market illiquidity premium.
      type: inferred
      topic: revenue multiple
      confidence: medium
      freshness: current
      sourceRefs: [SV001, SV009]
      answersQuestionRefs: [QV019]

    - id: CV017
      statement: >-
        Li-Cycle Holdings went public via SPAC merger in August 2021 at an implied valuation of approximately
        $1.7B. The stock subsequently declined approximately 95% by late 2023 as the Rochester Hub facility
        experienced massive cost overruns and was paused. Li-Cycle filed for Chapter 11 in October 2024,
        representing a near-total destruction of equity value for SPAC investors on a $1.7B starting price.
      type: observed
      topic: Li-Cycle SPAC valuation
      confidence: high
      freshness: historical
      sourceRefs: [SV016, SV017]
      answersQuestionRefs: [QV020]

    - id: CV018
      statement: >-
        Umicore, the Belgian battery materials and recycling giant, trades at approximately 0.8-1.5x revenue
        and 6-10x EBITDA based on 2023-2024 financials showing EUR 3.3B in 2023 revenue and approximately
        EUR 350M EBITDA. Umicore is the most directly comparable public company to Redwood's cathode
        materials and recycling business, though Umicore operates at full commercial scale and sustained
        profitability that Redwood has not yet achieved.
      type: observed
      topic: Umicore comparable multiple
      confidence: medium
      freshness: recent
      sourceRefs: [SV023, SV010]
      answersQuestionRefs: [QV021]

    - id: CV019
      statement: >-
        Benchmark Mineral Intelligence data shows lithium carbonate prices at approximately $12,000/MT in
        Q1 2026, down approximately 85% from the November 2022 peak of approximately $81,000/MT. This
        sustained price decline materially compresses battery recycling unit economics and remains the
        primary commodity risk factor for Redwood's recycling business margins.
      type: observed
      topic: lithium price Q1 2026
      confidence: high
      freshness: current
      sourceRefs: [SV018, SV024]
      answersQuestionRefs: [QV026]

    - id: CV020
      statement: >-
        Wood Mackenzie projects battery-grade lithium demand to grow 8-12x by 2030 driven by EV adoption,
        but projects lithium supply additions in South America and Australia will keep prices in the
        $10,000-20,000/MT range through 2027. Below $10,000/MT, hydrometallurgical battery recycling
