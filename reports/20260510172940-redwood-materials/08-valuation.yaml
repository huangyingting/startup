  - id: comparable-analysis
    title: Comparable Transaction and Peer Analysis
    body: >-
      The battery recycling comparable universe is thin, distressed, and cautionary as of May 2026.
      Li-Cycle Holdings provides the most important data point: a SPAC valuation of $1.7B in 2021 that
      resulted in near-total equity destruction by 2024. The Li-Cycle failure illustrates that
      hydrometallurgical battery recycling at scale requires substantially more capital than initial
      estimates, and that cost overruns can be fatal even for a well-funded public company with
      blue-chip investors. Ascend Elements' April 2026 Chapter 11 filing is the closest domestic
      competitor comparable, a company with identical ambitions including CAM production, OEM
      partnerships, and DOE support that burned $542M before filing, with DOE withdrawing the $480M
      conditional grant upon the adverse material event disclosure. These failures are not idiosyncratic.
      They reflect the structural economics of building hydrometallurgical recycling infrastructure at
      giga-scale, where capex intensity exceeds initial models and commodity price volatility can turn
      positive EBITDA projections negative. Umicore, the only profitable comparable public company, is
      a 100-plus year Belgian materials company with fully depreciated infrastructure and decades of
      operational refinement. It is a target state for Redwood, not a near-term comparable. VW's Battery
      Resources acquisition at $200-400M implies an OEM strategic acquisition multiple of 15-30x forward
      revenue, suggesting trade sale value for Redwood of $4-8B in a 2028-2030 strategic acquisition
      scenario assuming SC campus is operational at scale. Northvolt's restructuring at a peak valuation
      of $12B provides a cautionary parallel from adjacent cell manufacturing: even well-capitalized
      battery companies with strong OEM partnerships fail when capex discipline and yield ramp do not
      match projections.
