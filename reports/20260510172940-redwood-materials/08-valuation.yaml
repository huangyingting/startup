  claims:
    - id: CV001
      statement: >-
        Redwood Materials raised approximately $1B in its Series C funding round in 2023, led by Goldman
        Sachs Asset Management with participation from T. Rowe Price. Based on industry-standard venture
        dilution assumptions and prior rounds, the implied post-money valuation is approximately $5.5B.
        No official valuation figure has been publicly disclosed by the company.
      type: inferred
      topic: Series C valuation
      confidence: medium
      freshness: recent
      sourceRefs: [SV001, SV002]
      answersQuestionRefs: [QV001]

    - id: CV002
      statement: >-
        Redwood Materials has raised approximately $2.4B in total equity funding since its founding in 2017,
        including a $40M seed round (2020), a $700M Series B (2022), and approximately $1B in Series C (2023).
        This makes it the best-capitalized private battery recycler in the United States.
      type: observed
      topic: total capital raised
      confidence: high
      freshness: recent
      sourceRefs: [SV001, SV003]
      answersQuestionRefs: [QV002, QV027]

    - id: CV003
      statement: >-
        The US Department of Energy Loan Programs Office issued a conditional commitment for a $2B ATVM
        loan to Redwood Materials for its South Carolina campus expansion. This is the largest single
        conditional DOE loan commitment to a battery recycling company and represents a critical capital
        dependency in Redwood's long-term financing plan.
      type: observed
      topic: DOE ATVM conditional loan
      confidence: high
      freshness: current
      sourceRefs: [SV004, SV026]
      answersQuestionRefs: [QV010]

    - id: CV004
      statement: >-
        Li-Cycle Holdings filed for Chapter 11 voluntary bankruptcy protection in October 2024 after burning
        through approximately $1.7B in equity and debt financing. The company's Rochester Hub battery
        recycling facility experienced severe cost overruns, growing from a $250M original budget to an
        estimated $800M or more, before construction was paused and the company entered insolvency.
      type: observed
      topic: Li-Cycle bankruptcy
      confidence: high
      freshness: recent
      sourceRefs: [SV006, SV017]
      answersQuestionRefs: [QV015]

    - id: CV005
      statement: >-
        Ascend Elements, Redwood Materials' closest US domestic competitor in cathode material production,
