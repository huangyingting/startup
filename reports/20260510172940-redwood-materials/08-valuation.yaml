      type: third-party-reported
      topic: lithium price outlook
      confidence: medium
      freshness: current
      sourceRefs: [SV009, SV008]
      answersQuestionRefs: [QV026]

    - id: CV021
      statement: >-
        In the bull case with probability of 20%, the DOE ATVM loan closes in H1 2026, the SC campus ramps
        to 45 GWh/yr or more by 2027, lithium recovers above $15,000/MT, and LFP share stabilizes below
        55% of global EV batteries. In this scenario, Redwood achieves estimated 2028 revenues of $1.2-1.8B,
