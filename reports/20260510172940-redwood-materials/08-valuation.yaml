        - 'Immediately creates $2B or more SC Phase 2 financing gap; forces dilutive equity raise; Ascend Elements precedent suggests 60-80% equity haircut in distressed financing'
        - 'Exit or materially reduce position; re-initiate only at bear-case valuation; trigger for emergency NDA review'
      - - IRA Section 45X manufacturing credit repeal or phase-out
        - 'Legislative action removing or phasing out 45X for battery components before 2032'
        - 'Removes $35/kWh structural moat; Chinese imports become competitive without domestic cost buffer; EBITDA margin compresses to negative territory'
        - 'Put new investment on hold; assess remaining tariff protection and customer pricing power sustainability'
      - - Lithium price sustained below $8,000/MT for two or more consecutive quarters
        - 'LME spot lithium carbonate below $8,000/MT for two full calendar quarters'
        - 'Recycling unit economics turn cash-negative even with nickel and cobalt offset; increases burn and down-round probability to bear case range'
