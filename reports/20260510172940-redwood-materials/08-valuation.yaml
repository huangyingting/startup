        Redwood faces down-round risk if the DOE ATVM loan is delayed or reduced and SC Phase 2 requires a
        bridge equity raise. Comparable scenarios in the battery sector including Li-Cycle's attempted
        emergency financing in 2023 and Northvolt's 2024 restructuring resulted in equity valuation haircuts
