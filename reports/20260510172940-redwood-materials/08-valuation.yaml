        policy conditions over a four-year horizon.
      type: inferred
      topic: bull case valuation
      confidence: low
      freshness: current
      sourceRefs: [SV008, SV004]
      answersQuestionRefs: [QV016, QV003]

    - id: CV022
      statement: >-
        In the base case with probability of 50%, the DOE conditional loan converts to final commitment in
        2026, SC Phase 1 ramps to 30 GWh/yr by 2028 approximately one year behind plan, and lithium prices
        remain in the $10,000-14,000/MT range. Revenue reaches $700M-1.1B by 2028, supporting a valuation
