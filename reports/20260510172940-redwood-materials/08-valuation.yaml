  - id: scenario-analysis
    title: Scenario Analysis and Capital Return Framework
    body: >-
      The bull case at 20% probability requires simultaneous occurrence of five favorable outcomes: DOE
      loan final close in H1 2026, SC Phase 1 ramp to 45 GWh/yr or more by 2027, SC Phase 2 groundbreaking
      without cost overruns, lithium price recovery above $15,000/MT, and IRA 45X credits intact through
      2032. Under these conditions, Redwood's 2028E revenue could reach $1.2-1.8B and at a 7-8x multiple
      yields $8.4-14.4B equity value representing 50-160% upside from the 2023 Series C entry. This is a
      real but demanding outcome that requires no major adverse events over a four-year horizon, which is
      exceptional for a capital-intensive infrastructure company. The base case at 50% probability reflects
      partial success: DOE loan converts but possibly on modified terms, SC Phase 1 reaches 30 GWh/yr by
      2028 one year behind plan, and lithium remains $10,000-14,000/MT. At this performance, 2028E revenue
      is $700M-1.1B and valuation $4.5-7.5B, suggesting flat to modest upside from $5.5B entry before
      considering cost of capital on a 4-5 year hold. The bear case at 30% probability is materially
      adverse: DOE loan delayed to 2028 or reduced, lithium below $8,000/MT for two consecutive quarters,
      and SC Phase 2 requires a distressed equity bridge. Comparable scenarios in Li-Cycle and Northvolt
      produced 50-80% valuation haircuts, implying a 2028 equity value of $1.5-3.0B, representing a
      45-73% loss from $5.5B entry. The probability-weighted expected value across all scenarios is
      approximately $4.9-6.2B, representing modest positive expected value that does not adequately
      compensate for binary downside risk at this price point without audited financials or DOE loan
      closure confirmation. Lithium price recovery above $15,000/MT and SC campus operational throughput
      data are the two highest-leverage publicly observable indicators for tracking thesis progress.
