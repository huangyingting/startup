      type: inferred
      topic: 'key man risk'
      sourceRefs: [SR007, SR029, SR030]
      confidence: medium
      freshness: current

    - id: CR027
      statement: >-
        Redwood Materials reduced its workforce by approximately 10 percent in April 2026 and
