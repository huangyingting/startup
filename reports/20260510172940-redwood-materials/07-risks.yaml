  claims:
    - id: CR001
      statement: >-
        The IRA Section 45X advanced manufacturing production credit provides $35/kWh for
        cathode active material production and is the primary margin buffer enabling domestic
        CAM producers to compete with Korean manufacturers on unit cost.
      type: observed
      topic: '45X credit regulatory risk'
      sourceRefs: [SR001, SR003]
      confidence: high
      freshness: current

    - id: CR002
      statement: >-
        Congressional proposals emerged in 2025 during reconciliation proceedings that
        specifically targeted recycled battery material credits under IRA 45X, citing
        potential double-counting of subsidies for materials already incentivized at the
        mining or processing stage.
      type: observed
      topic: '45X credit legislative risk'
      sourceRefs: [SR003, SR025, SR028]
      confidence: high
      freshness: current

    - id: CR003
      statement: >-
        The DOE Loan Programs Office issued a conditional commitment for a $2 billion ATVM
        loan to Redwood Materials for Nevada campus expansion; final close has not been
        confirmed as of Q1 2026, and approximately 30 percent of DOE conditional commitments
        historically do not progress to final close or undergo material restructuring.
      type: third-party-reported
      topic: 'DOE loan risk'
      sourceRefs: [SR006, SR022, SR023]
      confidence: high
      freshness: current

    - id: CR004
      statement: >-
        A thesis-break trigger for Redwood Materials occurs when IRA 45X credit reduction
        exceeds $10/kWh AND the DOE ATVM loan final-close fails concurrently; either event
        alone is manageable with business model adjustment, but both together require complete
        re-underwriting of the investment case.
      type: inferred
      topic: 'thesis-break trigger'
      sourceRefs: [SR001, SR006, SR022]
      confidence: medium
      freshness: current

    - id: CR005
      statement: >-
        Investors entering Redwood Materials at the Series E should require factory access
        rights, DOE milestone transparency, and Panasonic contract review as preconditions
        to commitment, based on the materiality of each dependency to the investment thesis.
      type: inferred
      topic: 'diligence conditions'
      sourceRefs: [SR022, SR029]
      confidence: medium
      freshness: current

    - id: CR006
      statement: >-
        The FEOC final rule effective January 2025 requires that for vehicles to qualify for
        clean vehicle tax credits their battery components and critical minerals must not have
        been produced by a Foreign Entity of Concern; Treasury interpretive guidance on the
        recycled content pathway introduces risk that Redwood-sourced CAM could be treated
        less favorably than virgin-mined CAM from allied nations.
      type: observed
      topic: 'FEOC regulatory risk'
      sourceRefs: [SR002, SR003, SR011]
      confidence: high
      freshness: current

    - id: CR007
      statement: >-
        Environmental permitting for Redwood's Nevada operations requires compliance with
        Nevada DEQ air quality standards and any capacity expansion beyond current licensed
        volumes at Churchill County would require new NEPA review and additional state permits.
      type: observed
      topic: 'environmental permitting risk'
      sourceRefs: [SR004, SR023]
      confidence: medium
      freshness: current

    - id: CR008
      statement: >-
        OSHA workplace safety regulations apply to Redwood Materials' battery recycling and
        manufacturing operations at both the Nevada and South Carolina campuses; hazardous
        materials handling requirements for lithium-ion battery electrolytes and nickel and
        cobalt compounds impose compliance obligations that expand as production capacity grows.
      type: observed
      topic: 'OSHA compliance risk'
      sourceRefs: [SR005, SR004]
      confidence: medium
      freshness: current

    - id: CR009
      statement: >-
        The battery recycling and cathode material patent landscape has thickened significantly
        since 2020, with aggressive USPTO filings from POSCO Future M, Samsung SDI, and Chinese
        manufacturers in hydrometallurgical processing and precursor cathode material synthesis,
        increasing the risk of IP challenge against Redwood's process patents.
      type: third-party-reported
      topic: 'IP litigation risk'
      sourceRefs: [SR011, SR026]
      confidence: medium
      freshness: current

    - id: CR010
      statement: >-
        No material litigation against Redwood Materials, Inc. has been identified in public
        court record databases as of May 2026; however, private company litigation exposure
        is not fully verifiable without document requests and legal representations under NDA.
      type: observed
      topic: 'litigation risk'
      sourceRefs: [SR003, SR030]
      confidence: medium
      freshness: current

    - id: CR011
      statement: >-
        IRS guidance on 45X eligibility for recycled-content CAM requires careful process
        documentation to establish that recycled materials satisfy domestic production
        requirements; eligibility is supportable but subject to interpretive risk in
        ongoing Treasury rulemaking.
      type: third-party-reported
      topic: '45X eligibility legal risk'
      sourceRefs: [SR001, SR002]
      confidence: medium
      freshness: current

    - id: CR012
      statement: >-
        NMC 811 cathode active material requires purity above 99.95 percent and consistent
        particle size distribution; recycled precursor CAM introduces compositional variability
        from varying Ni:Mn:Co ratios in incoming feedstock, creating a manufacturing quality
        challenge that has not been independently validated at gigawatt-hour scale for Redwood.
      type: third-party-reported
      topic: 'CAM yield operational risk'
      sourceRefs: [SR024, SR011]
      confidence: medium
      freshness: current

    - id: CR013
      statement: >-
        Manufacturing scrap rates at battery gigafactories have declined from approximately
        8-12 percent in 2020-2021 to 3-5 percent in 2024 as cell manufacturing efficiency
        has improved, structurally reducing Redwood's primary near-term feedstock supply
        source from Panasonic's Nevada Gigafactory.
      type: third-party-reported
      topic: 'feedstock supply risk'
      sourceRefs: [SR011, SR014, SR019]
      confidence: medium
      freshness: current

    - id: CR014
      statement: >-
        End-of-life lithium-ion battery volumes suitable for Redwood's recycling operations
        are expected to remain limited through at least 2027 due to fleet recency; the first
        wave of 2012-2015 Nissan Leaf and 2015-2018 Tesla Model S/X packs represent the
        primary near-term EOL volume but are insufficient to fill a multi-GWh facility.
      type: third-party-reported
      topic: 'EOL feedstock timing risk'
      sourceRefs: [SR011, SR027]
      confidence: medium
      freshness: current

    - id: CR015
      statement: >-
        LFP chemistry transition risk is elevated for Redwood: if LFP share of the US battery
        market exceeds 40 percent, Redwood's NMC-centric CAM roadmap would require costly
        retooling; Redwood has not publicly disclosed an LFP recycling or LFP CAM manufacturing
        roadmap as of Q1 2026.
      type: observed
      topic: 'LFP transition risk'
      sourceRefs: [SR014, SR019, SR027]
      confidence: medium
      freshness: current

    - id: CR016
      statement: >-
        Anode copper foil manufactured at Redwood's South Carolina facility is a commodity
        requiring stringent surface quality; customer qualification failures at any OEM partner
        could delay South Carolina revenue ramp and potentially trigger DOE loan milestone
        covenants tied to commercial production targets.
      type: inferred
      topic: 'ACF qualification risk'
      sourceRefs: [SR010, SR022]
      confidence: medium
      freshness: current

    - id: CR017
      statement: >-
        Cybersecurity risk exists for process control systems at Redwood's Nevada and South
        Carolina campuses; battery manufacturing increasingly relies on digitally controlled
        hydrometallurgical and cathode synthesis equipment, and Redwood has not publicly
        disclosed operational technology security certifications or incident response protocols.
      type: inferred
      topic: 'cybersecurity risk'
      sourceRefs: [SR024, SR030]
      confidence: low
      freshness: unknown

    - id: CR018
      statement: >-
        Panasonic Energy appears to represent the majority of Redwood Materials' current CAM
        output volume based on the colocation of Redwood's Nevada campus with Panasonic's
        Gigafactory and the absence of any other publicly confirmed commercial CAM output buyer.
      type: inferred
      topic: 'Panasonic concentration risk'
      sourceRefs: [SR017, SR022, SR029]
      confidence: medium
      freshness: current

    - id: CR019
      statement: >-
        The DOE ATVM conditional loan of $2 billion to Redwood Materials has not been
        confirmed to final close as of Q1 2026; industry analysts estimate approximately
        30 percent of DOE conditional commitments do not progress to final close or undergo
        material restructuring terms that increase the effective cost of capital.
      type: third-party-reported
      topic: 'DOE loan final-close risk'
      sourceRefs: [SR006, SR022, SR023]
      confidence: medium
      freshness: current

    - id: CR020
      statement: >-
        Li-Cycle Holdings' bankruptcy in 2024 and Northvolt AB's Chapter 11 filing in 2024
        illustrate that capital-intensive battery materials businesses with single-customer
        concentration and unvalidated production processes are subject to acute liquidity
        crises when technical or commercial milestones are missed, providing cautionary
        comparables for Redwood Materials investors.
      type: observed
      topic: 'comparable failure cases'
      sourceRefs: [SR009, SR015, SR016]
      confidence: high
      freshness: current

    - id: CR021
      statement: >-
        Ford Motor Company and Amazon serve dual roles as equity investors in Redwood Materials
        and as battery feedstock supply partners; this creates governance conflicts if business
        terms on either dimension need renegotiation, particularly in a stress scenario where
        feedstock pricing, volume commitments, or equity valuation are in tension.
      type: inferred
      topic: 'governance conflict risk'
      sourceRefs: [SR018, SR022]
      confidence: medium
      freshness: current

    - id: CR022
      statement: >-
        POSCO Future M and EcoPro BM announced FEOC-compliant cathode active material joint
        ventures in the United States in 2024-2025; if OEMs redirect CAM demand to Korean
        producers at lower cost once FEOC compliance is certified, Redwood's addressable
        market would contract materially unless 45X credits maintain the domestic cost advantage.
      type: third-party-reported
      topic: 'Korean CAM competitive displacement'
      sourceRefs: [SR011, SR021, SR022]
      confidence: medium
      freshness: current

    - id: CR023
      statement: >-
        Redwood Materials does not publish public financial statements; burn rate, cash runway,
        and working capital position are not independently verifiable, creating a diligence gap
        that investors must address through NDA-protected financial data review before commitment.
      type: observed
      topic: 'financial transparency gap'
      sourceRefs: [SR022, SR029, SR030]
      confidence: medium
      freshness: current

    - id: CR024
      statement: >-
        NMC 811 cathode material prices fell approximately 30 percent from the 2022 peak by
        end of 2024, driven by Chinese overcapacity and declining lithium carbonate prices;
        Redwood's unit economics are directly exposed to this compression if the 45X credit
        does not fully offset the price decline relative to Korean producer costs.
      type: third-party-reported
      topic: 'margin compression risk'
      sourceRefs: [SR019, SR021, SR027]
      confidence: medium
      freshness: current

    - id: CR025
      statement: >-
        Comparable capital-intensive battery manufacturing projects including Northvolt's
        Swedish gigafactory and LG Chem US battery material plants regularly overran initial
        capital budgets by 20-50 percent; Redwood's Nevada expansion faces analogous execution
        risk given the complexity of integrating hydrometallurgical refining with CAM synthesis.
      type: third-party-reported
      topic: 'capex execution risk'
      sourceRefs: [SR015, SR016, SR024]
      confidence: medium
      freshness: current

    - id: CR026
      statement: >-
        CEO JB Straubel is a Key Man risk for Redwood Materials: his foundational relationships
        with DOE loan program staff, Series E investors, and OEM partners are unique and would
