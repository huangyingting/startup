  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: 'DOE ATVM loan covenant conditions'
      missingEvidence: >-
        The specific financial and operational covenant conditions attached to the DOE ATVM
        conditional loan commitment to Redwood Materials are not public. Milestone thresholds
        for final close, production ramp requirements, and early termination triggers are
        unknown from any public source.
      whyItMatters: >-
        Without covenant details, investors cannot model the probability of default, the
        conditions under which DOE might restructure the loan, or the equity dilution impact
        of a bridge financing requirement before final close. This is the single most material
        financial diligence gap for any investment commitment.
      diligencePath: >-
        Request conditional commitment letter and full term sheet under NDA from Redwood
        management. Consult with DOE Loan Programs Office on permissible disclosures. Review
        any public FOIA request responses covering Redwood's ATVM application history.
      relatedQuestionRefs: [QR022]

    - type: missing-source
      severity: material
      topic: 'Adverse regulatory proceedings and undisclosed IP disputes involving Redwood'
      missingEvidence: >-
        No public record of OSHA citations, EPA violations, or IP litigation against Redwood
        Materials has been found in publicly searchable databases, but private company exposure
        to regulatory proceedings, patent challenges, and undisclosed legal disputes cannot
        be verified from public databases alone without court record searches.
      whyItMatters: >-
        Undisclosed legal exposure could materially affect the valuation and investment thesis.
        A pending IP challenge from POSCO or Samsung SDI in hydrometallurgical CAM synthesis
        could restrict Redwood's ability to commercialize its technology or require license fees
        that impair unit economics.
      diligencePath: >-
        Conduct comprehensive litigation search through PACER, Nevada state court records,
        USPTO PTAB proceedings, and ITC Section 337 investigation database. Request legal
        representations and warranties from management under NDA. Engage IP counsel for
        freedom-to-operate analysis.
      relatedQuestionRefs: [QR029]

    - type: missing-source
      severity: material
      topic: 'DOE loan concern raised after April 2026 restructuring event'
      missingEvidence: >-
        No public statement has been found from any investor, DOE official, or analyst
        specifically raising concerns about Redwood Materials' DOE loan final-close prospects
        following the April 2026 workforce reduction and COO departure. This absence could
        mean no concern exists or could reflect limited public attention to the event.
      whyItMatters: >-
        If the DOE privately flagged concerns about management depth or operational stability
        following the restructuring, the conditional commitment terms might be at risk of
        renegotiation or additional conditions that are not publicly disclosed.
      diligencePath: >-
        Direct inquiry with DOE Loan Programs Office public communications. Review any public
        DOE statements about the Redwood ATVM loan since April 2026. Request investor relations
        update on DOE relationship status from Redwood management under NDA.
      relatedQuestionRefs: [QR028]

    - type: missing-source
      severity: material
      topic: 'Regulatory / Legal Risk Register partial coverage gap'
      missingEvidence: >-
        The regulatory risk register captures only the five publicly identifiable regulatory
        and legal risk vectors from IRS, Federal Register, EPA, OSHA, and Nevada DEQ databases.
        State-level permits beyond Nevada, international trade compliance under ITAR for battery
        technology exports, and any undisclosed state or federal SEC correspondence are not captured.
      whyItMatters: >-
        Full regulatory coverage is required to assess the complete legal surface area of
        Redwood's operations across multiple jurisdictions. Missing state permits or regulatory
