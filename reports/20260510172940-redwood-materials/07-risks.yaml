        challenges that are unlikely to abate as Tesla's Gigafactory 1 continues to expand.
      type: inferred
      topic: 'talent competition risk'
      sourceRefs: [SR007, SR010, SR024]
      confidence: medium
      freshness: current

    - id: CR029
      statement: >-
        Redwood Materials is a private company with no public liquidity event scheduled;
        Series E investors at approximately $5.5 billion post-money valuation face execution
        risk tied to a multi-year timeline to IPO or strategic acquisition that may not optimize
        for value if macroeconomic or EV market conditions deteriorate before an exit window opens.
      type: inferred
      topic: 'liquidity and exit risk'
      sourceRefs: [SR022, SR029]
      confidence: medium
      freshness: current

    - id: CR030
      statement: >-
        The IRA 45X credit is economically permanent in statute under current law but is
        subject to reversal through budget reconciliation that requires only a simple Senate
        majority; the 2025 reconciliation debate demonstrated that recycled battery material
        credits are a specific legislative target due to double-counting concerns.
      type: observed
      topic: '45X credit political risk'
      sourceRefs: [SR003, SR025, SR028]
      confidence: high
      freshness: current

    - id: CR031
      statement: >-
        Treasury may interpret FEOC rules to conclude that CAM produced from recycled materials
        retains the FEOC taint of the original battery's country of origin if the processing
        entity was itself a FEOC; this interpretation would effectively exclude recycled-content
        CAM from clean vehicle credit qualification entirely.
      type: inferred
      topic: 'FEOC interpretive risk'
      sourceRefs: [SR002, SR003, SR011]
      confidence: medium
      freshness: current

