  - id: SP004
    title: "Competitive Outlook and Diligence Questions"
    body: |
      The competitive outlook for Isomorphic is favorable in the near term due to its structural biology
      moat and capital advantage, but is materially dependent on ISM8969 Phase I outcomes expected in
      late 2026. A Phase I failure would disproportionately harm Isomorphic's positioning relative to
      Recursion, which already has clinical validation data from its FAP program.

      Isomorphic's decision to remain private while raising $2.7B total allows it to avoid public quarterly
      reporting of program updates, a structural advantage versus publicly listed competitors (Recursion,
      Schrödinger) that must disclose milestone setbacks promptly. However, this opacity also makes it
      harder for partners to independently verify progress.

      From a competitive strategy standpoint, Isomorphic should be expected to widen its pharma
      collaboration base beyond three disclosed partners. Failure to add a fourth collaboration within
      the next 12-18 months would be a meaningful competitive signal. The sector-wide observation that
      no AI drug discovery company has yet produced an approved drug—including Isomorphic—means that
      the competitive advantage claimed by any player rests on pre-validation promise rather than
      demonstrated outcomes.
    claimRefs:
      - CP031
      - CP032
      - CP033
      - CP034
      - CP035

