  - id: SP003
    title: "Moat Durability and Competitive Risk"
    body: |
      Isomorphic's moat has three components: (1) exclusive rights to the commercial application of
      AlphaFold3 in drug discovery—a barrier no competitor can replicate—(2) proprietary training data
      generated from its three pharma collaborations (Lilly, Novartis, J&J), and (3) talent concentration
      via its Google DeepMind heritage.

      The durability of these moats faces three material threats. First, AF3 exclusivity may erode if
      Google DeepMind broadens AlphaFold licensing, as happened with AF2 (released open source in 2021).
      Second, Xaira Therapeutics, launched in April 2024 with $1B in seed/Series A capital, is building
      an independently trained generative AI platform for antibody and small-molecule design with a similar
      "from-scratch" philosophy, without AF3 dependency. Third, Recursion's combined entity (post-Exscientia
      merger) offers a more complete integrated discovery stack than any pre-merger predecessor, covering
      phenomics, computational chemistry, and molecule design.

      Isomorphic's collaboration deal terms—Lilly ($45M upfront + up to $1.7B milestones) and Novartis
      ($37.5M + up to $1.2B)—are among the largest disclosed for AI-only drug discovery deals before human
      trial validation, confirming strong negotiating power relative to peers. The J&J collaboration
      (January 2026) has not disclosed financial terms. Schrödinger's software ARR (~$130-150M in 2024)
      represents a fundamentally different monetization model built on industry-wide tool penetration.

      The most critical moat risk is ISM8969 Phase I: a failure would disproportionately harm Isomorphic's
      credibility relative to Recursion, which already has clinical validation data, and Insilico, which
      has a Phase II program.
