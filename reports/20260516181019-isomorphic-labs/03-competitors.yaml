  - id: SP002
    title: "Feature and Capability Comparison"
    body: |
      Across the competitive landscape, AI drug discovery companies differ substantially in scientific depth,
      pipeline maturity, revenue model, and modality coverage. Isomorphic's core differentiation rests on
      structural biology prediction (AlphaFold3 + IsoDDE), multi-modality design (small molecules and
      biologics), and proprietary drug design models trained on internal datasets from three pharma partnerships.
      However, it lacks the clinical-stage pipeline track record of Recursion and lacks the physics-based
      FEP+ rigor of Schrödinger for lead optimization.

      The capability matrix shows that no single competitor matches Isomorphic across all dimensions.
      Recursion leads in phenotypic screening scale (petabytes of cellular imaging data) but lacks structural
      biology depth. Schrödinger leads in physics-based accuracy and software penetration but is not
      purely AI-native. Insilico leads in pipeline advancement for a private company, with 13 INDs approved
      from its Pharma.AI platform. BenevolentAI, despite an early knowledge graph advantage, has undergone
      a strategic overhaul (December 2024) and proposed delisting from Euronext Amsterdam (February 2025),
      representing a competitive setback. Xaira Therapeutics remains pre-clinical despite launching with
      $1B in capital in April 2024.

      Isomorphic's highest-rated features are structural prediction and pharma partner quality. Its weakest
      areas relative to competitors are phenotypic screening, clinical track record, and software licensing
      breadth. All major players rely on pharma partnership milestone revenue and none has a standalone
      product revenue model sufficient to sustain operations independently.
