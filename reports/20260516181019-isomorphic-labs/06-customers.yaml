chapter:
  number: 6
  title: "Customers & Commercial Traction"
  summary: >
    Isomorphic Labs has signed three pharma partnerships with Eli Lilly (January 2024),
    Novartis (January 2024, expanded 2025), and Johnson & Johnson (March 2025), with aggregate
    potential milestone value reportedly exceeding $3 billion. All three are large-cap pharma
    companies, creating meaningful customer concentration. No revenue figures or clinical-stage
    drug candidates have been publicly disclosed, leaving milestone conversion risk unproven.
    The $2.1 billion Series B in May 2026 signals investor confidence in the partnership model
    but does not resolve the pre-revenue status of the business.

sections:
  - id: S_U_01
    title: "Customer Base Overview"
    body: >
      Isomorphic Labs operates as a B2B drug-discovery platform with three confirmed pharmaceutical
      partners: Eli Lilly, Novartis, and Johnson & Johnson. All three are top-15 global pharma
      companies by revenue. The partnerships were signed between January 2024 and March 2025,
      within roughly 15 months of the company's commercial launch. All deals are structured as
      research collaborations covering AI-assisted drug candidate design, with upfront payments
      plus milestone payments tied to discovery and development success. No consumer-facing or
      SME customers exist as of May 2026. The pharma-only customer base reflects Isomorphic Labs'
      strategic focus on large organisations with the internal capacity to run clinical programmes
      downstream of AI-generated candidates.
    claimRefs: [CU001, CU002, CU003, CU016]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: S_U_02
    title: "Eli Lilly Partnership"
    body: >
      The Eli Lilly collaboration was announced on 3 January 2024, positioning it among the
      earliest major commercial agreements for Isomorphic Labs. The deal is a multi-target
      research collaboration where Lilly uses Isomorphic's AI platform to identify and optimise
      drug candidates across multiple disease areas, including oncology and metabolic disease.
      Isomorphic Labs characterised the deal as one of the largest AI drug-discovery collaborations
      at the time of signing. The deal includes an upfront payment, though the amount has not been
      disclosed, plus milestone payments contingent on research and development success. Lilly's
      investor relations page confirmed the partnership, giving it high corroborative standing
      as a primary-tier customer-proof source. Both Isomorphic and Lilly published simultaneous
      announcements on 3 January 2024, providing strong bilateral confirmation of the deal.
    claimRefs: [CU002, CU004, CU005, CU006, CU023]
    tableRefs: [TU002]
    figureRefs: []

  - id: S_U_03
    title: "Novartis Partnership"
    body: >
      Novartis entered an initial research collaboration with Isomorphic Labs in January 2024 on
      the same day as the Lilly announcement. In 2025, Novartis expanded the collaboration to
      cover additional therapeutic areas and integrated Isomorphic's AlphaFold 3 derivatives
      into its internal discovery pipeline. Novartis publicly characterised the partnership as
      strategically significant for its long-term AI drug-design capability. The expansion is the
      only documented renewal event among Isomorphic's three deals and provides partial evidence
      of partner satisfaction. Trade press coverage in BioSpace and the BioIndustry Association
      independently corroborated the expansion. The 2025 renewal is the clearest evidence
      of partner satisfaction and platform value among Isomorphic's three disclosed deals.
    claimRefs: [CU007, CU008, CU009, CU021]
    tableRefs: [TU003]
    figureRefs: [FU002]

  - id: S_U_04
    title: "Johnson & Johnson Partnership"
    body: >
      Johnson & Johnson signed a research collaboration with Isomorphic Labs in March 2025
      covering AI-assisted molecular design. The J&J deal followed the company's wider AI drug
      discovery strategy and was confirmed via both J&J Investor Relations and Isomorphic's own
      PR Newswire release. No financial terms — upfront, milestones, or therapeutic scope — have
      been publicly disclosed, making it the most opaque of the three partnerships. Trade press
      including pharmaphorum and Fierce Biotech independently covered the announcement.
      Isomorphic's partnerships page lists all three deals as active as of May 2026,
      and no terminations have been disclosed in any regulatory filing or press report
      reviewed during this diligence exercise as of May 2026. The three active deals span
      two US-headquartered and one Swiss-headquartered large-cap pharma company.
    claimRefs: [CU003, CU024, CU025, CU026]
    tableRefs: []
    figureRefs: [FU003]

  - id: S_U_05
    title: "Concentration Risk, Retention & Commercial Outlook"
    body: >
      With three customers — all large-cap pharma — Isomorphic Labs faces substantial sector and
      customer concentration risk. The company has disclosed no revenue figures, and no drug
      candidates from partnerships have entered clinical trials as of May 2026, leaving milestone
      conversion entirely unproven. Nature's 2025 analysis of AI drug-discovery partnerships
      highlighted that proprietary data advantages for AI firms may erode as pharma companies
      build in-house AI capabilities, and that milestone conversion rates across the sector have
      historically been low. BenevolentAI's AstraZeneca deal ended in 2023 after failing to
      achieve clinical milestones, illustrating the sector risk. Evaluate Vantage's Series B
      analysis noted Isomorphic remains pre-revenue with uncertain milestone timelines.
      The Novartis expansion is a positive retention signal, but only one of three partners has
      publicly renewed. The $2.1 billion Series B provides runway to demonstrate clinical proof
      of value, but investors cited existing partnerships — not revenue — as the commercial rationale.
    claimRefs: [CU010, CU011, CU012, CU013, CU015, CU018, CU019, CU028, CU029, CU030]
    tableRefs: [TU004, TU005]
    figureRefs: [FU004]

