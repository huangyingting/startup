callouts:
  - calloutType: "strength"
    title: "Three Big-Pharma Partnerships in 15 Months"
    body: >
      Isomorphic Labs signed landmark deals with Eli Lilly, Novartis, and Johnson & Johnson —
      three of the world's top-15 pharma companies — within 15 months of commercial launch.
      The Novartis expansion in 2025 provides early evidence of partner retention.
    claimRefs: [CU001, CU007, CU021]

  - calloutType: "risk"
    title: "Pre-Revenue With No Clinical Validation"
    body: >
      Despite landmark announcements, Isomorphic Labs has disclosed no revenue and no drug
      candidates from partnerships have entered clinical trials. The company's commercial model
      depends entirely on future milestone conversions that are not yet proven.
    claimRefs: [CU010, CU011, CU030]

