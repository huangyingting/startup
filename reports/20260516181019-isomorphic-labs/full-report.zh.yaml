      - number: '1.4'
        title: 关键里程碑与战略进展
        blocks:
          - type: paragraph
            body: >-
              Isomorphic Labs 已从创立时的 AI 研究公司，推进为多阶段、面向临床的药物设计引擎。公司以 AlphaFold 2 在 2020 年 CASP 竞赛中的胜利为科学基础；该成果解决了长达 50
              年的蛋白质结构预测问题。AlphaFold 3 于 2024 年 5 月 8 日发表于 Nature（doi:10.1038/s41586-024-07487-w），将预测范围扩展到
              DNA、RNA、小分子和蛋白相互作用，并在 PoseBusters 基准上比传统方法准确 50%。免费开放的 AlphaFold 服务器已服务 190+ 个国家的 3+ million 研究人员。

              与 Eli Lilly（首付款 $45M，里程碑最高 $1.7B）和 Novartis（首付款 $37.5M，里程碑最高 $1.2B）的两项标志性药企合作于 2024 年 1 月宣布。Novartis 于
              2025 年 2 月将合作扩展至 3 个新增项目。与 Johnson & Johnson 的第三项合作于 2026 年 1 月宣布。IsoDDE（Isomorphic Drug Design Engine）平台于
              2026 年 2 月 10 日宣布，是一次重大技术升级——公司称其在蛋白-配体泛化基准上的准确性比 AlphaFold 3 提升逾一倍，并在结合亲和力预测上超越基于物理的方法。

              ISM8969 是公司内部产出的首个 AI 设计候选药物，于 2026 年 1 月 28 日获得 FDA IND 放行。临床试验原定 2025 年底启动，但在 2026 年 1 月达沃斯世界经济论坛上宣布推迟
              12 个月至 2026 年底。这一延迟削弱了公司关于 AI 能压缩药物发现周期的叙事，是一个实质性挫折。
