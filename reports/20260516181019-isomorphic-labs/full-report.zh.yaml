  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图与品类分层
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 所在市场拥挤但分层清晰。直接竞争对手分为四类：（1）拥有自有管线并追求药企合作收入的全栈 AI 药物发现公司（Recursion/Exscientia、Insilico
              Medicine、BenevolentAI），

              （2）授权计算工具、同时运营自有药物项目的平台软件公司（Schrödinger），（3）聚焦生物药或抗体的模态特定生成式 AI 公司（AbSci、Xaira
              Therapeutics），以及（4）瞄准不可成药蛋白的结构 / 构象生物学平台（Relay Therapeutics、Atomwise）。


              Isomorphic 位于第 1 类和第 4 类的交叉处：它以 AlphaFold3
              衍生结构预测作为多模态药物设计引擎的核心，通过大型药企合作（Lilly、Novartis、J&J）而非软件授权取得收入。其差异化特征包括：（a）从 Alphabet/Google DeepMind 独家授权
              AlphaFold3 用于商业药物发现，（b）约 $2.7B 资本基础且无强制性公开季度报告义务，（c）明确的“纯 AI”设计理念，但仍未在人类试验中验证（ISM8969 Phase I 目标为 2026
              年底）。


              主要竞争威胁是 Recursion Pharmaceuticals，其于 2025 年 1 月完成对 Exscientia 的收购。Recursion 是上市公司（NASDAQ:
              RXRX），拥有临床阶段项目，包括其 AI Operating System 于 2026 年初在 FAP（familial adenomatous
              polyposis，家族性腺瘤性息肉病）中的首个临床验证。Schrödinger 仍是基于物理的平台提供商，在药企中渗透广泛。Insilico Medicine 在非上市 AI
              药物发现公司中拥有最先进的自有管线，其 INX-020 化合物治疗肺纤维化已进入 Phase II。
