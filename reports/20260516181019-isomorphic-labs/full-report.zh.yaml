      - number: '5.2'
        title: 平台架构与基础设施
        blocks:
          - type: paragraph
            body: >
              IsoDDE 作为五层一体化 AI 栈运行。底层是数据层：RCSB Protein Data Bank（230K+ 个实验测定结构）、EMBL-EBI AlphaFold Database（200M+ 个 AI
              预测结构）、用于配体数据的 Chemical Component Dictionary（CCD），以及来自持续合作项目的自有湿实验室反馈。核心 AI 模型层包含三个模块：AlphaFold 3，一个扩散
              transformer 架构，可联合生成蛋白、配体、DNA 和 RNA 的全原子坐标预测；AlphaProteo，一个生成式蛋白结合分子设计模型；以及用于小分子提案的生成式化学引擎。所有训练和大规模推理都运行在
              Alphabet 基础设施提供的 Google Cloud TPU 和 GPU 集群上。工作流编排层管理药物发现管线步骤——命中物生成、虚拟筛选、先导化合物优化和 ADMET 预测。合作伙伴集成层提供 API
              和数据交换机制，药企合作方（Lilly、Novartis、J&J）通过该机制在 NDA 下提交靶点，并接收 AI 生成的候选物包。AlphaFold 3 GitHub 仓库已累计超过 12,000
              个星标，反映开发者社区对底层方法的高度参与。关键在于，Alphabet 算力基础设施是核心运营依赖；真实独立算力成本未被独立披露。
