  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 处在 AI 与药物发现的交叉地带，监管审查正在加码。EU AI Act（Regulation 2024/1689）自 2024 年 8 月生效，将用于医疗和药物开发的 AI
              系统列为高风险，要求开展合规评估、履行透明度义务，并保留扎实文档。Isomorphic Labs 注册于英格兰和威尔士，但其药企合作伙伴——Lilly（美国）、Novartis（瑞士）和
              J&J（美国）——会在欧盟和美国监管机构均有权监管医疗 AI 应用的司法辖区使用平台输出。英国 Information Commissioner's Office（ICO）也单独发布了健康数据相关 AI
              使用指南，指出即使数据在模型训练前已去标识化，GDPR 义务仍然适用。FTC 在 2024 年启动对 AI 基础模型的广泛调查，可能波及 Isomorphic 这类平台公司。知识产权风险同样重要：AI
              生成药物候选物的所有权尚无明确法律先例；Isomorphic 依赖的训练数据来源未公开披露，可能带来类似 AI 内容生成诉讼中的版权和 IP 挑战。Companies House 文件显示，Isomorphic
              Labs Ltd（company 13036082）是一家私人有限公司，未公开披露诉讼；但没有披露并不等于没有风险。
