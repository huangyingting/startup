  - id: FV001
    title: 推荐逻辑
    type: flow
    insight: |
      这一有条件正面建议来自三项输入的汇合：平台实力、机构验证和财务稳定性，同时受临床缺口风险约束。只有在 Series B 入场价或以下入场才合理，且必须设置 24 个月里程碑关口。
    claimRefs:
      - CV004
      - CV007
    data:
      nodes:
        - id: f1
          label: AlphaFold3 平台实力
          description: 同行评议的蛋白结构预测；CASP15 获胜；DeepMind 算力优势
        - id: f2
          label: 药企机构验证
          description: $2.7B 名义合作组合，涵盖 Lilly、Novartis 和 J&J；一线交易对手
        - id: f3
          label: 财务稳定性（$2.1B Series B）
          description: 按同行烧钱水平可支撑 6-8 年现金跑道；Thrive Capital 加 Alphabet 支持
        - id: f4
          label: 临床缺口风险
          description: 零确认临床项目；未披露 IND 时间表；所有合作均处临床前
        - id: f5
          label: 有条件正面信号
          description: 以 Series B 估值入场，并设置 24 个月 IND 里程碑关口；5-8 年时间跨度
        - id: f6
          label: 上调或下调触发条件
          description: 确认 IND 申报则上调；合作方退出则下调至回避
      edges:
        - from: f1
          to: f5
        - from: f2
          to: f5
        - from: f3
          to: f5
        - from: f4
          to: f5
        - from: f5
          to: f6
  - id: FV002
    title: 估值敏感性
    type: bar
    insight: >
      估值对临床里程碑转化率高度敏感。若里程碑转化为零，隐含企业价值会跌破 $5B 的 Series B 入场价。基准情景下， 50% 里程碑转化可把价值推至约 $10B-$15B。只有在乐观情景中，转化率达到 80%
      或更高，估值才会到 $20B-$50B。
    claimRefs:
      - CV013
      - CV014
    data:
      items:
        - label: 悲观：0% 里程碑转化，无临床数据
          value: 3.5
          unit: $B enterprise value
        - label: 基准：50% 里程碑转化，2028 年前提交 IND
          value: 11
          unit: $B enterprise value
        - label: Series B 入场（隐含中点估计）
          value: 6.5
          unit: $B
        - label: 乐观：80% 里程碑转化，2030 年前取得 Phase 2 疗效
          value: 35
          unit: $B enterprise value
        - label: 药企合作方按乐观估值战略收购
          value: 50
          unit: $B (6x Series B implied)
  - id: FV003
    title: 估值 / 回报区间
    type: range
    insight: >
      悲观情景退出价值（$1B-$4B）相对 Series B 入场价意味着资本亏损。基准情景（$8B-$15B）对应 7-10 年 1.2-2.3x 回报倍数。乐观情景（$20B-$50B）意味着从 Series B 入场可获得
      3-8x 回报。区间很宽，反映临床药物发现结果高度二元。
    claimRefs:
      - CV009
      - CV010
      - CV015
    data:
      items:
        - label: 悲观情景退出价值
          low: 1
          high: 4
          mid: 2
          unit: $B
        - label: 基准情景退出价值
          low: 8
          high: 15
          mid: 11
          unit: $B
        - label: 乐观情景退出价值
          low: 20
          high: 50
          mid: 35
          unit: $B
        - label: Series B 隐含估值（估计）
          low: 5
          high: 8
          mid: 6.5
          unit: $B
  - id: FV004
    title: 投资 KPI
    type: kpi
    insight: |
      关键投资 KPI 证实 Isomorphic Labs 在规模和机构背书上的领先，同时凸显临床项目披露和财务指标的关键缺失。
    claimRefs:
      - CV002
      - CV040
    data:
      items:
        - label: Series B 融资
          value: $2.1B
          status: confirmed
          note: 2026 年 5 月，由 Thrive Capital 领投
        - label: 隐含投后估值
          value: $5B-$8B est.
          status: estimated
          note: PitchBook 和 Dealroom；未公开披露
        - label: 合作组合名义价值
          value: $2.7B+
          status: confirmed
          note: Lilly $1.7B 加 Novartis $1.0B，另有 J&J 未披露
        - label: 已确认临床项目
          value: '0'
          status: confirmed
          note: 截至 2026 年 5 月，所有合作均处研究阶段
        - label: 主要投资方
          value: Thrive Capital, Alphabet
          status: confirmed
          note: Series B 领投方；Alphabet 保留多数股权
        - label: 年烧钱速度
          value: Undisclosed
          status: unconfirmed
          note: 代理指标：Recursion 每年约 $280M；Isomorphic 可能更高
        - label: 建议
          value: Conditional Positive
          status: confirmed
          note: 隐含估值不高于 $8B 时入场；要求设置 24 个月里程碑关口
