              通稿共同确认。财务条款没有公开披露，包括首付款、里程碑或治疗范围，因此它是三项合作中最不透明的一项。pharmaphorum 和 Fierce Biotech 等行业媒体也独立报道了公告。截至 2026 年 5
              月，Isomorphic 的合作伙伴页面列出三笔交易均仍在进行；截至 2026 年 5 月，本次尽调审阅的任何监管文件或新闻报道中都没有披露终止。三笔活跃交易覆盖两家总部在美国、一家总部在瑞士的大型药企。
