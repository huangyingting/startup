      - number: '5.3'
        title: 差异化、IP 与数据优势
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 结构上最可防守的优势，是 AlphaFold 3 在药物设计中的商业独占性。AlphaFold 3 的 Nature 论文（2024 年 5 月）明确将商业药物设计用途限制给
              Isomorphic Labs；这意味着任何药企若不与 Isomorphic 合作，就不能在自有发现项目中使用 AF3，从而把强制合作机制嵌入竞争格局。OpenFold 和 Meta 的 ESMFold
              等开源替代方案能复制部分 AlphaFold 2 能力，但缺少 AF3 的多分子复合物和配体预测能力，而这正是药物设计的核心差异化。AlphaProteo（2024 年 9
              月）在头对头基准中，相比此前领先的蛋白设计方法，展示出结合亲和力和特异性的中位数 3–4× 提升，并在 deepmind.google 和 Science
              上作为能力证据发布。这个一体化全栈平台把结构预测、蛋白结合分子设计和生成式化学放入一个连贯工作流；相比之下，Schrödinger 等单模块竞争对手依赖基于物理的分子对接和
              FEP+，且需要实验结构作为输入；Recursion 则侧重表型筛选，而非结构驱动。来自每个合作伙伴湿实验室反馈的数据飞轮，会逐步提升模型准确性。AF3 限制构成结构性竞争壁垒：药企若不与 Isomorphic
              Labs 签约，就无法独立使用 AF3 做药物设计。
