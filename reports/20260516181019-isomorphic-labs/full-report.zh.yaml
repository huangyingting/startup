chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >-
              Isomorphic Labs Limited 是 Alphabet Inc. 子公司，于 2021 年 2 月 24 日在英国注册成立（UK Companies House 编号 13223825），并于
              2021 年 11 月 4 日公开宣布。公司总部位于英国伦敦，并在瑞士洛桑（2022 年 12 月开设）和美国马萨诸塞州剑桥（2025 年中开设）设有办公室。“isomorphic”
              这个名字体现了创始人对生物学与信息科学之间深层对称性的判断——形态相同、来源不同——也把公司定位为计算 AI 与湿实验室药物发现之间的桥梁。

              商业模式由研究合作驱动。Isomorphic Labs 通过合作向大型药企授权其 AI 药物设计能力，交易结构包括首付款、与临床和监管进展挂钩的里程碑付款，以及商业化药物的特许权使用费。截至 2026 年 5
              月，公司与 Eli Lilly、Novartis、Johnson & Johnson 保持活跃合作。公司内部也在建设自有管线，聚焦肿瘤、免疫和炎症；截至 2026 年 5
              月，这些项目均仍处于临床前阶段。公司的首个 AI 设计候选药物 ISM8969 于 2026 年 1 月 28 日获得 FDA IND 放行，使 Isomorphic Labs
              成为首家将内部生成分子推进人体临床试验的 AI 原生公司。

              Isomorphic Labs 将其总可用市场（TAM）定义为全球药物发现和开发行业的计算层，2025 年估计为 $2.58B，并以约 25-30% 的 CAGR 增长。公司所在环节是临床前 AI
              设计阶段，通过在 DeepMind 十年 AlphaFold 研究基础上训练的自有结构生物学模型，建立竞争护城河。
