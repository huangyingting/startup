      - number: '2.3'
        title: 市场细分与买方分析
        blocks:
          - type: paragraph
            body: >-
              AI 药物发现市场可沿三条主轴切分：（1）目标药物开发阶段（靶点识别、命中物识别、先导化合物优化、ADMET
              预测、临床设计）；（2）治疗模态（小分子、生物药、核酸、细胞疗法、多特异性抗体）；（3）买方类型（大型药企、中型药企、生物科技公司、学术研究）。

              Isomorphic Labs 主要服务小分子药物设计中的先导化合物优化和命中物识别阶段。其与 Eli Lilly 和 Novartis 的合作明确聚焦小分子。Johnson & Johnson 合作（2026
              年 1 月）扩展到跨模态药物设计，包括生物药和其他模态。这一扩展具有战略意义：近年来，生物药在药企研发中所占份额高于小分子；掌握多模态设计，会显著扩大 Isomorphic 的可服务市场（SAM）。

              AI 药物发现服务的买方格局高度集中在头部。全球 Top-20 药企估计占全球药企研发支出的 65-70%，是主要买方群体。具体到 Isomorphic
              Labs，其合作模式要求伙伴具备足够大的管线规模，能够吸收多靶点 AI 设计项目，并有财务能力为单个合作支付 $1-2B 里程碑款。现实上，这将短期买方池限制在 15-25
              家全球药企和大型生物科技公司。学术研究通过免费 AlphaFold 服务器服务，能带来生态价值，但没有直接收入。
