        title: 图表
        blocks:
          - type: callout
            title: 有条件正面：按 Series B 条款或以下进入
            body: >
              证据支持在 Series B 进入价格（隐含估值 $5B-$8B）下，对 Isomorphic Labs 采取有条件正面的投资观点。平台的 AlphaFold3 差异化、$2.7B 药企合作账面和
              Alphabet 背书，支撑其相对上市同行的溢价。进入条件是里程碑门槛：只有在 24 个月内确认 IND 申报后，建议才上调为无条件正面。
            calloutType: recommendation
            claimRefs:
              - CV039
          - type: callout
            title: 临床前投资逻辑风险：已披露临床项目为零
            body: >
              最重要的单一风险是，截至 2026 年 5 月，三项药企合作全部仍处于研究阶段。公司未公开披露任何临床项目、IND 时间线或湿实验验证数据。BenevolentAI 先例表明，AI
              药物发现平台可以维持多年研究合作，却无法把合作转化为临床项目。投资者必须对名义价值施加实质临床执行折价。
            calloutType: risk
            claimRefs:
              - CV003
              - CV023
          - type: callout
            title: Alphabet 背书是一把双刃剑
            body: >
              Google DeepMind 的算力和模型接入是主要竞争护城河，但也是最大的单点失效风险。如果 Alphabet 重组 Other Bets 组合，Isomorphic Labs
              将失去基础设施优势。Series B 共同投资决定敲定前，必须用合同缓释这种依赖。
            calloutType: insight
            claimRefs:
              - CV004
              - CV036
          - type: callout
            title: 估值估计来自分析师代理值，不是披露数据
            body: >
              所有企业价值估计（投后 $5B-$8B）都来自 PitchBook、Dealroom 和 Compworth
              的分析师模型，而不是公开披露的股权结构数据。实际优先股结构、稀释事件和认股权证，可能在任何低于乐观情景的结果中显著改变普通股价值。
            calloutType: assumption
            claimRefs:
              - CV010
              - CV030
