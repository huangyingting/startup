  - id: FE001
    title: IsoDDE 产品架构栈
    type: stack
    layout: standard
    summary: 从数据到合作伙伴集成的五层架构，由 AlphaFold 3、AlphaProteo 和生成式化学驱动。
    data:
      layers:
        - id: partner-layer
          label: 合作伙伴集成层
          detail: 为 Lilly、Novartis 和 J&J 提供制药合作 API、受 NDA 约束的数据交换和合作伙伴项目报告。
          modules:
            - 制药合作 API（Lilly、Novartis、J&J）
            - 受 NDA 约束的数据交换
            - 合作伙伴项目报告
        - id: workflow-layer
          label: 药物发现工作流编排
          detail: 在合作伙伴项目中编排命中生成、虚拟筛选、先导优化和 ADMET 预测。
          modules:
            - 命中生成管线
            - 虚拟筛选工作流
            - 先导化合物优化引擎
            - ADMET 预测模块
        - id: ai-model-layer
          label: 核心 AI 模型层
          detail: AlphaFold 3 负责结构预测，AlphaProteo 负责蛋白结合体设计，生成式化学引擎用于小分子。
          modules:
            - AlphaFold 3（全原子结构预测）
            - AlphaProteo（蛋白结合体设计）
            - 生成式化学引擎（小分子）
        - id: compute-layer
          label: 算力基础设施
          detail: Alphabet 提供 Google Cloud TPU 集群和 GPU 推理机群，支撑大规模模型训练与推理。
          modules:
            - Google Cloud TPU 集群（Alphabet）
            - GPU 推理机群
        - id: data-layer
          label: 数据层
          detail: 实验结构数据、AI 预测结构数据、化学数据库和合作方湿实验室反馈，共同构成训练与设计输入。
          modules:
            - Protein Data Bank（230K+ 实验结构）
            - EMBL-EBI AlphaFold DB（200M+ 预测结构）
            - CCD/CSD 化学数据库
            - 合作方湿实验室反馈
    approximationNotes: 架构依据公开 AlphaFold 3/AlphaProteo 论文和公司公告推断；内部系统边界并未公开披露。
