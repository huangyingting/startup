      - number: '8.4'
        title: 可比公司与相对价值
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 没有完全对应的上市可比公司。它是一家私人、AI 原生、收入前药物发现平台，背靠 Google，拥有 $2.7B
              名义药企合作账面。因此，可比集合必须横跨上市的软件赋能药物发现公司，以及私人 AI 药物发现队列。在上市可比中，Recursion Pharmaceuticals（RXRX）是主要基准：它是一家 AI
              优先的药物发现公司，披露财务，采用平台合作模型，并有上市市值。Recursion 2026 年 Q1 每季度现金消耗约 $70M、季度收入运行率约 $65M，对应 $2.5B-$3.5B 市值和 10-15x
              收入倍数。Schrodinger SDGR 提供计算药物发现 SaaS 基准，交易倍数为收入的 9-15x。两家上市同行相较 Isomorphic Labs
              估计估值都有显著折价，反映私人市场溢价、AlphaFold3 差异化和 Alphabet 背书。私人可比中，Xaira Therapeutics 在 2024 年作为收入前平台融资 $1.0B；AbSci
              Corp 公开交易，收入倍数较低；Insilico Medicine 走临床优先策略。没有一家在药企合作规模或计算优势深度上与 Isomorphic 直接匹配。BCG 对 AI 制药行业的分析和
              PitchBook 私人市场数据确认，AI 药物发现平台溢价高度集中在两三家计算差异化最清晰的公司；如果临床缺口按计划补上，Isomorphic Labs 的溢价具备合理性。
            claimRefs:
