      - number: '3.4'
        title: 竞争前景与尽调问题
        blocks:
          - type: paragraph
            body: >
              由于结构生物学护城河和资本优势，Isomorphic 近期竞争前景有利，但实质上取决于预计 2026 年底出炉的 ISM8969 Phase I 结果。一旦 Phase I 失败，相比已经从 FAP
              项目取得临床验证数据的 Recursion，Isomorphic 的定位会受到更大冲击。


              Isomorphic 选择保持私营身份，同时累计融资
              $2.7B，使其无需像上市竞争对手（Recursion、Schrödinger）那样按季度公开项目进展；后者必须及时披露里程碑挫折。这是结构性优势。不过，这种不透明也让合作伙伴更难独立核验进展。


              从竞争策略看，应预期 Isomorphic 会把药企合作基础扩展到已披露的 3 家之外。如果未来 12-18 个月不能新增第四项合作，将是一个有意义的竞争信号。全行业尚无任何 AI
              药物发现公司产出获批药物——包括 Isomorphic——这意味着任何玩家声称的竞争优势，都仍建立在验证前承诺上，而非已证明结果。
