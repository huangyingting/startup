            body: >
              Isomorphic Labs 的成本基础符合投资阶段 AI 研究公司特征：人员密集、算力密集，且没有实体制造的销售成本。公司截至 2026 年 4 月有 371 名员工，人员是主要支出项。按伦敦市场 AI
              和计算生物学研究人员全口径薪酬每人 $200-250K 估算（含福利、工资税和管理费用），年度人员成本接近 $75-90M。训练和运行大规模药物发现 AI 模型的算力基础设施，在可比公司每年估计增加
              $50-80M；不过 Isomorphic 的成本部分由 Alphabet 的 Google Cloud 基础设施补贴，真实独立算力成本难以独立验证。伦敦、洛桑和美国的办公设施，以及 ISM8969 接近
              Phase I 后增长的临床和监管运营，会进一步增加开销。年度现金消耗估计为 $150-250M；公司近期仍会深度亏损。一旦触发里程碑，毛利率预计较高（60-85%），因为 AI
