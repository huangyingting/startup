      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              在整个竞争版图中，AI 药物发现公司在科学深度、管线成熟度、收入模式和模态覆盖上差异很大。Isomorphic 的核心差异化来自结构生物学预测（AlphaFold3 +
              IsoDDE）、多模态设计（小分子和生物药），以及基于三项药企合作内部数据集训练的自有药物设计模型。

              不过，它缺少 Recursion 那样的临床阶段管线记录，也缺少 Schrödinger 在先导化合物优化中基于物理的 FEP+ 严谨性。


              能力矩阵显示，没有单一竞争对手能在所有维度匹配 Isomorphic。Recursion 在表型筛选规模上领先（PB 级细胞成像数据），但结构生物学深度不足。Schrödinger
              在基于物理的准确性和软件渗透上领先，但并非纯 AI 原生。Insilico 作为私营公司在管线推进上领先，其 Pharma.AI 平台已有 13 个 IND 获批。BenevolentAI
              虽然早期拥有知识图谱优势，但已经历战略重组（2024 年 12 月），并提议从 Euronext Amsterdam 退市（2025 年 2 月），代表一次竞争挫折。Xaira Therapeutics 虽在
              2024 年 4 月以 $1B 资本成立，但仍处于临床前阶段。


              Isomorphic
              评分最高的功能是结构预测和药企合作伙伴质量。相对竞争对手，其最弱环节是表型筛选、临床记录和软件授权广度。所有主要玩家都依赖药企合作里程碑收入，没有哪家公司拥有足以独立支撑运营的独立产品收入模式。
