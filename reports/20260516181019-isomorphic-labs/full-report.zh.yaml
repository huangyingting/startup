      - number: '5.4'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 受到多层合规义务约束。ISM8969 获得 FDA IND 放行（2026 年 1 月），是公司监管层面合规状态最强的外部验证：FDA 审查了 ISM8969
              的临床前材料，并放行其进入 Phase I 人体试验，意味着公司可以生成可用于 IND 申报的文档。不过，这只适用于单一候选物；IsoDDE 本身并未独立认证或审计。截至 2026 年 5 月，IsoDDE
              平台没有公开披露任何 GxP（Good Practice）或 ISO 13485 软件质量认证；对于一个生成临床开发候选药物的系统，这是重大缺口。公司内部维护生物安全控制，以防止 AlphaFold 3 和
              AlphaProteo 被滥用于设计有害生物制剂；EMBL-EBI AlphaFold Server 执行非商业服务条款，限制服务器输出。EU AI Act（2024 年 8 月生效）可能将用于临床决策支持的
              AI 系统归为高风险，从而为 Isomorphic 的欧盟活动带来未来合格评定义务。公司未公开披露第三方 AI 审计记录。作为一家英国注册公司，处理合作伙伴数据时可假定需要遵守
              GDPR；但向美国云基础设施跨境传输数据的条款尚未独立确认。这些缺口对投资阶段 AI 药物设计公司而言并不罕见，但在全面监管部署前都属于尽调事项。
