      - number: '1.2'
        title: 领导层与关键人分析
        blocks:
          - type: paragraph
            body: >-
              Demis Hassabis 爵士同时担任 Isomorphic Labs 首席执行官兼创始人，也担任 Google DeepMind 首席执行官兼创始人。这一双重角色既带来显著竞争优势——Isomorphic
              Labs 能优先获取 DeepMind 的基础研究，包括 AlphaFold——也带来重大关键人集中风险。Hassabis 的思想领导力和科学信誉，是公司合作可信度和投资逻辑的核心。如果 Hassabis
              离开或减少投入，合作关系和研究路线图都可能承压。

              公司成立以来，高管团队已经明显补厚。Max Jaderberg 原任首席 AI 官，后升任总裁，显示组织成熟度提升。首席科学官 Miles Congreve 带来深厚的药物化学经验。Sergei Yakneen
              担任 CTO，Pamela Carroll 担任 COO，Sarah Korman 担任首席商务与法务官。关键变化是 Dr. Ben Wolf 于 2025
              年中出任首席医疗官，反映公司正从纯计算研究转向临床转化。这一临床领导层任命，指向公司有意管理首个人体临床试验 ISM8969；该试验已从 2025 年底推迟至 2026 年底。

              领导团队主要来自 DeepMind、顶级药企研发和计算化学。截至 2026 年 4 月 30 日，公司员工数为 371 人（据 Tracxn 数据），并持续招聘 AI
              研究、药物设计和临床运营岗位。董事会治理结构未在公开文件中完整披露，这与公司的私营状态一致；不过，Alphabet 的监督角色已由 UK Companies House 记录确认。
