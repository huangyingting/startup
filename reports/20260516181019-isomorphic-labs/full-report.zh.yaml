      - number: '2.4'
        title: 监管环境与竞争强度
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年，AI 药物发现的监管环境仍在变化。FDA 尚未发布针对 AI 生成 IND 申报的具体指引，不过其已于 2026 年 1 月 28 日放行 ISM8969，标志着首个 AI 设计候选药物获得
              IND 放行。FDA 的 Computer-Assisted Drug Design 指引框架提供了一定结构，但 AI
              生成分子的具体验证要求仍未定义。这种监管模糊性既带来风险（验证路径不清），也构成进入壁垒（只有最成熟、资本最充足的公司才能穿越不确定性）。

              AI 药物发现赛道的竞争强度中高，并且还在上升。Recursion-Exscientia 合并（2025 年底完成）催生了最大的纯 AI 药物发现上市公司，合并市值超过
              $4B。Schrödinger（NASDAQ: SDGR）在基于物理的计算药物设计中占据主导地位，持有 $500M+ 现金。BenevolentAI、Insilico Medicine，以及 Xaira
              Therapeutics（2024 年成立，初始资本 $1B）和 Nabla Bio 等新进入者都在该赛道活跃。重要的是，2024 年 11 月 CASP16 基准结果显示，在竞赛环境下，基于 AlphaFold
              3 的模型在蛋白-配体相互作用上并未显著优于旧方法，说明在结合亲和力预测上，Isomorphic 的结构生物学领先可能不如纯蛋白折叠领域那样决定性。

              ISM8969 获得 IND 放行，说明市场监管正在成熟；AI 药物发现正从基于承诺的竞争市场，转向基于证据的竞争市场，临床结果会越来越决定哪些平台能吸引药企合作。这一转向有利于
              Isomorphic、Recursion 等拥有临床阶段资产且资本充足的玩家，而不是纯计算阶段竞争者。
            claimRefs:
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
