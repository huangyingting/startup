      - number: '5.5'
        title: 路线图、部署与集成
        blocks:
          - type: paragraph
            body: >
              IsoDDE 的部署模式完全定制化：没有自助 API、应用市场或开放访问的商业端点。每项药企合作都是多年定制项目，Isomorphic
              科学家与合作伙伴团队并肩工作，把平台应用到具体靶点上。这带来高切换成本和深度集成，但也限制了可扩展性和快速签约。公开披露的平台路线图以 ISM8969 在 2026 年底启动 Phase I
              临床试验为中心，这将是 Isomorphic Labs 的 AI 设计候选药物首次获得人体临床读数。除 ISM8969 外，公司没有公开披露额外内部管线资产或重大平台能力发布路线图。2025 年 2 月
              Novartis 合作扩展和 2026 年 1 月 J&J 交易，显示商业动能延续；IsoDDE 数据飞轮会随着每个新增合作项目而改善。接入药企合作伙伴工作流需要深度 IT、数据治理和科学协同，这些通过 NDA
              约束的数据交换协议处理。Alphabet 持续提供基础设施和 IP 合作，带来连续性；但如果 Alphabet 战略优先级明显偏离当前 AI 药物发现重点，这一依赖也会形成治理风险。
