      - number: '4.3'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              以所处开发阶段看，Isomorphic Labs 资本极其充足。2026 年 5 月的 $2.1B Series B 轮，加上 2025 年 4 月的 $600M Series A 轮，提供约 $2.7B
              外部资本；已确认的 $82.5M 首付款和任何留存的 Series A 前 Alphabet 资金又增加了缓冲。按年烧钱 $150-250M 估计，Series B 后现金跑道约 8-17 年，足以将
              ISM8969 推进 Phase I，并产出多个新增候选药物。Series B 由复投方 Thrive Capital 领投，并由 UK Sovereign AI Fund、Temasek 和 MGX
              等战略投资者共同锚定，在追求财务回报之外也提供地缘政治背书。Alphabet 仍是控股股东，并参与两轮融资，实际上为短期资本风险托底。公司没有公开披露债务，不过未披露的 Alphabet
