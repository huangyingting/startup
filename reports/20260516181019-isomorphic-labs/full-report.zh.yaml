      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Isomorphic Labs 已通过两轮融资筹集约 $2.7B 外部资本。Series A 轮为 $600M，于 2025 年 4 月 1 日完成，由 Thrive Capital 领投，GV（Google
              Ventures）和 Alphabet 等共同投资。Series B 轮为 $2.1B，于 2026 年 5 月 12 日宣布，Thrive Capital 再次领投，共同投资方包括
              Alphabet、GV、MGX（阿联酋主权科技基金）、Temasek（新加坡主权财富）、CapitalG（Alphabet 独立成长基金）和 UK Sovereign AI Fund。Thrive Capital
              CEO Joshua Kushner 主导了两轮融资。Alphabet 总裁兼 CIO Ruth Porat 公开背书 Series B 轮。以 $2.1B 规模计，Series B
              轮是历史上第二大单笔生物科技融资，仅次于 Altos Labs 的 $3B 融资。

              两轮估值均未披露。公司拒绝公开提供投后估值，因此无法计算早期股东的精确持股比例或隐含回报。这种不透明与 Alphabet 报告子公司财务的偏好一致，也是一个明显尽调缺口。分析师曾猜测估值区间在
              $5-10B，但截至 2026 年 5 月没有官方确认。

              资本结构显示 Alphabet 仍保持控制性持股，Thrive Capital 和 GV 是主要财务共同投资方。来自阿联酋（MGX）、新加坡（Temasek）和英国的主权财富资金参与，释放出对英国 AI
              基础设施投资的强地缘政治支持信号。累计外部融资约 $2.7B，不包括 Series A 之前 Alphabet 提供的任何企业资金；其条款未披露。
