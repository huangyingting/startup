  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              进入 2026 年，Isomorphic Labs 已成为全球资本最充足的私人 AI 药物发现平台，并在 2026 年 5 月获得 Thrive Capital 领投的 $2.1 billion Series B
              融资。投资逻辑建立在三根收敛支柱上。第一，平台底座 AlphaFold3 在蛋白质结构和分子相互作用预测上展现出经过同行评审的科学优势，而这是早期药物发现的主要瓶颈。第二，Eli Lilly（最高
              $1.7B）、Novartis（$1.0B）和 Johnson and Johnson（条款未披露）构成的 $2.7 billion 名义合作组合，证明顶级药企确实赋予该平台实质价值。第三，Google
              DeepMind 持续提供战略和算力支持，让 Isomorphic Labs 获得基础设施优势，包括前沿模型接入、TPU
              配额和人才网络；独立竞争者很难在相近规模上复制。反向逻辑同样扎实。截至报告日，三项药企合作全部仍处于研究阶段；公司未公开披露任何临床项目、IND 申报时间线或 Phase 1
              准备度。缺少临床证据时，合作名义价值只是附条件的履约义务，而不是已赚收入。Isomorphic Labs 不披露收入、烧钱速度或运营费用，无法开展常规估值分析。PitchBook 和 Dealroom 估计，其
              Series B 投后估值为 $5B-$8B；相较财务已披露的上市同行，这代表结构性溢价。建议观点为有条件正面：在隐含 Series B 条款或以下进入，并设置明确里程碑门槛，投资期限为 5-8
              年。BenevolentAI 在 AstraZeneca 合作失败后于 2024 年重组，构成行业层面的警示先例，说明 AI 药物发现平台可以维持多年研究合作，却无法把合作转化为临床项目。
