      - number: '8.5'
        title: 退出、终止触发条件与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              最可能的退出路径，是由 Isomorphic Labs 的三家药企合作伙伴之一进行战略收购：Eli Lilly（市值约 $500B）、Johnson and Johnson（约 $400B）或
              Novartis（约 $250B）。三家公司都有能力按乐观情景估值收购；合作结构也可能产生平台合作协议中常见的优先购买权动态。鉴于目前没有披露收入，且数十亿美元估值的临床前生物技术平台在公开市场环境中承压，在
              Phase 2 临床数据前 IPO 退出可能性不高。三项打破投资逻辑的触发条件会促使立即退出。第一，Series B 交割后 24 个月内任何重大药企合作中止或重组，说明平台验证失败。第二，AlphaFold
              生成的分子设计无法以临床有意义的比例完成湿实验验证，而这正是平台全部价值主张的底层机制。第三，有证据显示 Alphabet 下调战略承诺：削减 DeepMind 算力分配、关键技术领导离职，或在 Other
              Bets 组合中重新分类。共同投资决定前必须解决的尽调事项包括：完整股权结构表和优先股结构、运营烧钱速度和现金跑道模型、最先进研究项目的 IND 申报时间线，以及约束 Alphabet
              算力支持承诺的合同条款。此外，合作首付款的收入确认政策也需要澄清。经风险调整后，建议仍是在 Series B 进入价格下有条件正面，并在 IND 申报确认前采取持有并监控姿态。
