      - number: '2.2'
        title: 需求驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              推动 AI 药物发现平台需求的核心经济逻辑，是传统药物开发的灾难性成本结构。行业平均每个获批药物成本约 $2.0-2.6B，周期 10-15 年，且约 90%
              的候选药物会在临床开发某个阶段失败。仅临床前阶段——也就是 Isomorphic Labs 所在环节——通常就需要 4-6 年，用于靶点识别、结构确定、先导化合物优化和 IND 准备。AI
              优先的发现平台声称可将其压缩至 12-18 个月，潜在加速 3-4 倍。

              顶级药企的需求信号很强。截至 2025 年，Top-20 药企全部在药物发现中使用某种形式的 AI，其中 78% 拥有专门的 AI 平台合作或内部团队。Isomorphic Labs 与 Eli Lilly 和
              Novartis——两家全球最大药企之一——的合作，验证了一线药企愿意为 AI 赋能的计算药物设计支付可观首付款（分别为 $45M 和 $37.5M）。

              关键采用约束包括：（1）AI 发现药物的监管不确定性，截至 2026 年 5 月尚无 AI
              设计药物获批；（2）深度学习模型的“黑箱”属性，会在监管申报中引发可复现性担忧；（3）与现有药企信息系统和湿实验室基础设施的集成成本；（4）历史记录有限——ISM8969 是 Isomorphic Labs
              首个进入临床试验的 AI 设计药物，意味着最早也要到 2027 年底才会有临床数据。

              Isomorphic Labs 自有临床试验时间表推迟 12 个月（从 2025 年底推至 2026 年底），说明即使资本最充足的 AI 药物发现公司也面临执行风险。如果结果不及预期，药企采用速度可能放缓。
