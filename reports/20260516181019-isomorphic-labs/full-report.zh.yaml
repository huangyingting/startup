  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: IsoDDE 平台定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 的 IsoDDE 平台切入药企药物发现的核心瓶颈：找到并优化一种药物分子，使其以高特异性、安全性和成药性结合目标蛋白。在传统药企工作流中，通过 X
              射线晶体学确定靶点结构可能需要数月至数年，每个结构成本达数十万美元；高通量筛选（HTS）化合物库则要测试数十万至数百万个化合物，时间和成本都很高。IsoDDE 用 AI 预测替代或增强这些步骤。AlphaFold
              3 可在数小时而非数月内预测目标蛋白的三维结构及其与候选药物分子的相互作用，并利用 EMBL-EBI AlphaFold 数据库中 200M+ 个结构。AlphaProteo
              随后直接根据预测靶点结构设计新型蛋白结合分子（抗体替代物、肽、分子胶）。生成式化学模块则在预测结合口袋几何约束下设计新型小分子。公司内部领先候选物 ISM8969 于 2026 年 1 月获得 FDA IND
              放行，是首个完全通过这一 AI 管线设计的药物，证明平台能在没有传统 HTS 或实验结构确定的情况下交付监管级候选物。
