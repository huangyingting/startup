  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与合作经济性
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 的收入完全来自与大型药企签署的多年、多靶点研究合作协议。模式按里程碑设计：每项合作在签约时收到首付款，随后在候选物选择、IND 申报、Phase I/II/III
              入组、监管批准等明确药物发现和开发事件触发里程碑付款，最终从任何商业获批药物中收取特许权使用费。截至 2026 年 5 月，已有 3 项合作公开披露：Eli Lilly（2024 年 1 月，首付款
              $45M，里程碑最高 $1.745B）、Novartis（2024 年 1 月，首付款 $37.5M，里程碑最高 $1.2B，2025 年 2 月扩展）和 Johnson & Johnson（2026 年 1
              月，财务条款未披露）。已确认收到的首付款现金合计 $82.5M；两笔已披露交易的最高潜在里程碑超过 $2.9B。自候选药物 ISM8969 于 2026 年 1 月获得 FDA IND 放行、Phase I 预计
              2026 年底启动以来，尚未触发任何特许权使用费收入。Isomorphic 不收取 SaaS、API 或按次查询费用。全部收入来自定制化长期合作协议，导致收入确认不均匀、依赖里程碑，可能需要 10-15
              年才达到峰值。24 个月内达成 3 项合作，按行业标准看交易节奏快且可重复；但合作价值超过 97% 仍取决于临床结果。
