        title: 融资背景与估值纪律
        blocks:
          - type: paragraph
            body: >
              2026 年 5 月的 Series B（$2.1B）由 Thrive Capital 领投，Alphabet 继续参与，使 Isomorphic Labs 成为全球单轮规模最大的 AI
              药物发现融资之一。关键是，公司没有披露优先股堆叠、清算优先权或股权结构表拆分，仅靠公开数据无法判断普通股价值。所有企业价值估计都依赖 PitchBook、Dealroom 和 Compworth
              的分析师模型，而不是公司公开披露。PitchBook 估计 Series B 投后估值为 $5B-$8B。Dealroom 和 Compworth 的估计大体一致，上端反映 Google
              母公司溢价。作为参照，Recursion Pharmaceuticals 是唯一披露财务的上市纯 AI 药物发现公司；截至 2026 年 Q1，其市值为 $2.5B-$3.5B，季度收入约
              $65M。Schrodinger Inc. 2024 年收入约 $170M，交易倍数约为收入的 9-15x。Isomorphic Labs 没有任何披露收入，却隐含 $5B-$8B 估值；只有在平台未来 3-5
              年内拿到临床阶段概念验证时，这一结构性溢价才站得住。Alphabet Other Bets 部门没有单独披露 Isomorphic Labs 的烧钱速度或财务数据。可比阶段 AI
              药物发现公司的基准现金消耗（Recursion：每年约 $280M）显示，$2.1B 现金跑道若按同行水平支出，可支撑 6-8 年运营，为公司延长临床准备时间提供财务稳定性。Series B
              优先股结构带来的稀释风险未知但重要，必须在任何共同投资决定前的正式尽调中解决。
