              单个药物成本约 $2B，且 90% 在临床试验中失败，药企面临必须寻找效率的生存压力。AI 药物发现正面回应这一问题。Lilly 和 Novartis 愿意在没有任何临床验证前就分别承诺 $45M 和
              $37.5M 首付款，说明顶级药企已经在证明点出现前购买这一前提。
