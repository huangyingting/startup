      - number: '8.3'
        title: 情景分析：乐观、基准与悲观
        blocks:
          - type: paragraph
            body: >
              鉴于公司没有披露财务，且临床阶段药物发现结果具有二元性，情景分析是估值评估的核心。三个情景不以收入倍数锚定，而是以合作经济性、里程碑转化概率和竞争动态为锚。在乐观情景（概率信号：20-25%）下，Isomorphic
              Labs 到 2029-2030 年至少推进一个化合物取得 Phase 2 疗效数据。这将验证平台转化能力，引发现有合作伙伴（Lilly、J&J、Novartis）的收购兴趣，并支撑 $20B-$50B
              的企业价值。乐观情景假设名义合作价值中有 60-80% 转化为里程碑，并且 Google DeepMind 在整个临床时间线内持续提供战略承诺。在基准情景（概率信号：50-55%）下，二到三个治疗项目到 2028
              年从研究推进到 IND 申报。合作经济性维持在名义交易价值的 40-50%。Alphabet 维持战略持股，但不加速整合。该情景下企业价值为 $8B-$15B，意味着按 Series B
              条款进入后的升值幅度有限，退出时间为 7-10 年。在悲观情景（概率信号：20-25%）下，到 2029 年没有临床项目完成 IND 申报。一项或多项药企合作被重组，经济性显著降低。Xaira
              Therapeutics、AbSci 这类资金充足的竞争者，或药企内部 AI 团队率先拿到临床证据，削弱 Isomorphic 的平台溢价。退出价值跌破 Series B 进入价格，Series B
              投资者遭受资本损失。Recursion 季度烧钱数据和 PitchBook 关于临床前平台结果的基准概率数据，都支持至少给该情景分配 20% 概率。
