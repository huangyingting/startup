companyProfile:
  summary: >-
    Isomorphic Labs 由 Demis Hassabis 与 Google DeepMind 同事于 2021 年初在伦敦创立，开发 IsoDDE——一个整合 AlphaFold 3 结构预测和 AlphaProteo
    蛋白结合分子设计的 AI 药物设计与工程平台。公司作为 Alphabet 独立子公司运营。截至 2026 年 5 月，公司拥有 3 个活跃药企合作（Eli Lilly、Novartis、Johnson &
    Johnson），两笔已披露交易的合计里程碑潜力最高达 $3.945B；首个全资临床候选物 ISM8969 已获 IND 放行；并在 2026 年 5 月完成由 Thrive Capital 领投的 $2.1B Series B
    轮。公司尚未报告任何里程碑收入，也没有获批药物；所有未来收入都取决于合作项目推进。
