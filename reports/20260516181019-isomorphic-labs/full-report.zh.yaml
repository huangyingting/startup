  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场规模、边界与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Mordor Intelligence 估计，全球 AI 药物发现市场在 2025 年约为 $2.58B，并将在 2030 年前以约 25-30% 的复合年增长率增长。这个市场不同于更广义的药企研发支出（2025
              年全球约 $230B），只代表药物发现价值链中的 AI 专用计算层。边界很重要：Isomorphic Labs 不参与湿实验室合成、临床开发或制造；它竞争的是 in silico
              靶点识别、结构预测和先导化合物优化，这些环节只占临床前研发投资的一小部分，但增长很快。

              Axis Intelligence 的 2026 年分析认为，AI 药物发现市场规模会随方法不同而变化——自下而上的方法若纳入所有带里程碑的药企 AI 授权交易，市场到 2027 年可能显著更大，潜在达到
              $5-8B。Mordor Intelligence 的 2025 年 $2.58B 基准情景，可能代表直接 AI 平台合同收入，并排除了大型药企研发组织内部的内嵌 AI 支出。Excelra 2026 年 AI
              状态报告指出，Top-20 药企中已有 78% 拥有活跃 AI 药物发现项目，说明市场渗透正快于此前预测。

              2025 年，投向 AI 药物发现的风险投资达到 $4.1B，同比增长 38%，显示金融市场需求已明显领先于当前商业市场规模。这种错配——大额 VC 押注与不到 $3B 的现有市场并存——反映出行业预期 AI
              会快速替代传统临床前方法。Isomorphic Labs 累计融资 $2.7B，使其按融资规模成为最大的私营 AI 药物发现公司，领先于 Recursion（累计 $900M+）和
              Schrödinger（$500M+）。
