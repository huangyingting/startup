      - number: '7.2'
        title: 运营与关键人物风险
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs 的运营风险主要集中在关键人物依赖和计算基础设施集中度。Demis Hassabis 同时领导 Google DeepMind，并担任 Isomorphic Labs
              的战略旗帜人物。无论是 DeepMind 领导层交接、个人情况变化，还是优先事项竞争，只要他的可投入度发生变化，都可能显著损害 Isomorphic 的科学信誉和合作伙伴信任。关键人物之外，Isomorphic
              也深度依赖 Google DeepMind 的计算基础设施和 AlphaFold 产品线；公司没有公开披露自己是使用独立算力，还是完全依赖云端资源。AI
              药物发现系统的运营风险还包括模型幻觉和可靠性失效：模型信心很高地预测某个分子结构，但湿实验验证证明错误，从而浪费合作伙伴资源并损害信任。BenevolentAI 在 AstraZeneca 交易失败后于 2023
              年进行战略重组，说明运营和科学可靠性失效可以迫使公司快速重构。人才风险也较高：AI 药物发现研究员薪酬溢价明显，Isomorphic 要与 Google DeepMind、OpenAI 和大型药企内部 AI
              团队争夺同一批人才。
