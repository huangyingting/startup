      - number: '3.3'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Isomorphic 的护城河有三部分：（1）AlphaFold3
              在药物发现商业应用中的独家权利——这是竞争对手无法复制的壁垒；（2）来自三项药企合作（Lilly、Novartis、J&J）的自有训练数据；（3）Google DeepMind 背景带来的人才集中。


              这些护城河的耐久性面临三项重大威胁。第一，如果 Google DeepMind 扩大 AlphaFold 授权，AF3 独占性可能被削弱，就像 AF2 在 2021 年开源发布一样。第二，Xaira
              Therapeutics 于 2024 年 4 月以 $1B 种子 / Series A 资本成立，正在构建独立训练的生成式 AI 平台，用于抗体和小分子设计，理念同样接近“从零开始”，且不依赖
              AF3。第三，Recursion 与 Exscientia 合并后的实体，提供了比任何合并前单一公司都更完整的一体化发现栈，覆盖表型组学、计算化学和分子设计。


              Isomorphic 的合作交易条款——Lilly（首付款 $45M + 最高 $1.7B 里程碑）和 Novartis（$37.5M + 最高 $1.2B）——在人类试验验证之前披露的纯 AI
              药物发现交易中位居前列，确认其相对同业具有强议价能力。J&J 合作（2026 年 1 月）未披露财务条款。Schrödinger 的软件 ARR（2024 年约
              $130-150M）代表一种完全不同的商业化模式，建立在行业范围工具渗透之上。


              最关键的护城河风险是 ISM8969 Phase I：一旦失败，Isomorphic 的信誉受损程度会明显高于已有临床验证数据的 Recursion，以及拥有 Phase II 项目的 Insilico。
