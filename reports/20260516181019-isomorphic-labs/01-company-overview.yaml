callouts:
  - calloutType: strength
    title: "AlphaFold as Foundational IP Moat"
    body: >-
      The AlphaFold franchise, from AF2's 2020 CASP win through AF3's 2024 Nature paper to IsoDDE's 2026
      announcement, gives Isomorphic Labs a durable scientific IP moat that competitors cannot easily replicate.
      With 3+ million researchers using the free server, the ecosystem lock-in and trust signal are substantial.
    claimRefs:
      - CO026
      - CO027
      - CO028
      - CO034

  - calloutType: risk
    title: "Key-Person Concentration: Demis Hassabis"
    body: >-
      Hassabis simultaneously leads Google DeepMind and Isomorphic Labs. If his attention, time, or availability
      changes — whether through a leadership transition at DeepMind, personal circumstances, or competing
      priorities — Isomorphic Labs' scientific credibility and partner trust could be materially impacted.
    claimRefs:
      - CO009
      - CO010

  - calloutType: risk
    title: "Clinical Trial Delay and Execution Risk"
    body: >-
      The 12-month delay in ISM8969's clinical trial timeline, from end-2025 to end-2026, is the first material
      adverse disclosure for the company. It raises questions about whether AI-accelerated drug discovery timelines
      are as compressible as claimed, and whether $2.7B in capital can be efficiently deployed without clinical proof
      points. No AI-designed drug has received regulatory approval as of May 2026.
    claimRefs:
      - CO033
      - CO035

