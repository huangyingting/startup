  - id: section-funding
    title: "Funding History and Capital Structure"
    body: >-
      Isomorphic Labs has raised approximately $2.7 billion in external capital across two rounds. The Series A was
      a $600 million round closed on April 1, 2025, led by Thrive Capital with co-investors including GV (Google
      Ventures) and Alphabet. The Series B was a $2.1 billion round announced on May 12, 2026, led again by
      Thrive Capital with co-investors including Alphabet, GV, MGX (UAE sovereign tech fund), Temasek (Singapore
      sovereign wealth), CapitalG (Alphabet's independent growth fund), and the UK Sovereign AI Fund. Joshua
      Kushner, CEO of Thrive Capital, led both rounds. Ruth Porat, President and CIO of Alphabet, publicly
      endorsed the Series B. At $2.1 billion, the Series B represents the second-largest single biotech financing
      in history, surpassed only by Altos Labs' $3 billion round.

      Valuation has not been disclosed for either round. The company has declined to provide post-money valuation
      figures publicly, making it impossible to calculate precise ownership stakes or implied returns for early
      shareholders. This opacity is consistent with Alphabet's preferred approach to reporting subsidiary
      financials and is a notable diligence gap. Analysts have speculated about valuations in the range of
      $5-10 billion, but no official confirmation exists as of May 2026.

      The capital structure suggests Alphabet maintains a controlling position, with Thrive Capital and GV as
      the dominant financial co-investors. The participation of sovereign wealth funds from the UAE (MGX),
      Singapore (Temasek), and the UK signals strong geopolitical support for UK-based AI infrastructure
      investment. Total external capital raised is approximately $2.7 billion, which does not include any
      Alphabet corporate funding provided before the Series A, the terms of which were not disclosed.
