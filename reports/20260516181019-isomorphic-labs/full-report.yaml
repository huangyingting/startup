companyProfile:
  summary: >-
    Isomorphic Labs, founded in early 2021 in London by Demis Hassabis and colleagues from Google DeepMind, is the
    developer of IsoDDE—an integrated AI drug design and engineering platform built on AlphaFold 3 structure prediction
    and AlphaProteo protein binder design. The company operates as an independent Alphabet subsidiary. As of May 2026,
    it holds three active pharma partnerships (Eli Lilly, Novartis, Johnson & Johnson) representing up to $3.945 billion
    in combined milestone potential on the two disclosed deals, has cleared IND for its first wholly owned clinical
    candidate ISM8969, and raised $2.1 billion in a Series B led by Thrive Capital (May 2026). No milestone revenue has
    yet been reported and the company has no approved drugs; all forward revenue is contingent on partner program
    progression.
  foundedDate: '2021-01-01'
  founders:
    - name: Demis Hassabis
      role: Co-Founder and Chairman
      background: >-
        Co-founded DeepMind (2010, acquired by Google 2014); CEO of Google DeepMind; Nobel Prize in Chemistry
        co-recipient (2024) for AlphaFold protein structure prediction; PhD Neuroscience Cambridge; chess prodigy and
        game designer.
    - name: Pushmeet Kohli
      role: CEO
      background: >-
