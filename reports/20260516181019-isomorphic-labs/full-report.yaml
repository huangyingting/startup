  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory & Legal Risk
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs operates at the intersection of AI and pharmaceutical drug discovery, a domain subject to
              intensifying regulatory scrutiny. The EU AI Act (Regulation 2024/1689), in force from August 2024,
              classifies AI systems used in healthcare and drug development as high-risk, requiring conformity
              assessments, transparency obligations, and robust documentation. While Isomorphic Labs is incorporated in
              England and Wales, its pharma partners — Lilly (US), Novartis (Switzerland), and J&J (US) — deploy the
              platform's outputs in jurisdictions where both EU and US regulators have authority over AI in medical
              applications. The UK Information Commissioner's Office (ICO) has separately published guidance on AI use
              involving health data, noting GDPR obligations apply even when data is de-identified for model training.
              The FTC launched a broad inquiry into AI foundation models in 2024, with implications for platform
              companies like Isomorphic. Intellectual property risk is also material: there is no settled legal
              precedent on AI-generated drug candidate ownership, and Isomorphic's reliance on training data whose
              provenance is not publicly disclosed creates potential copyright and IP challenges analogous to those seen
              in AI content generation lawsuits. Companies House filings show Isomorphic Labs Ltd (company 13036082) as
              a private limited company with no publicly disclosed litigations, but this absence of disclosure does not
              indicate absence of risk.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
      - number: '7.2'
        title: Operational & Key-Person Risk
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs faces significant operational risk centred on key-person dependency and compute
              infrastructure concentration. Demis Hassabis simultaneously leads Google DeepMind and serves as a
              strategic figurehead for Isomorphic Labs. Any change in his availability — through DeepMind leadership
              transition, personal circumstances, or competing priorities — could materially impair Isomorphic's
              scientific credibility and partner trust. Beyond key-person risk, Isomorphic is deeply dependent on Google
              DeepMind's compute infrastructure and the AlphaFold franchise; the company has not publicly disclosed
              whether it operates on independent compute or fully cloud-sourced resources. Operational risks in AI
              drug-discovery systems include model hallucination and reliability failures, where a confidently-predicted
              molecular structure proves incorrect in wet-lab validation, wasting partner resources and damaging trust.
              BenevolentAI's 2023 strategic overhaul following AstraZeneca deal failure illustrates how operational and
              scientific reliability failures can force rapid restructuring. Talent risk is also elevated: AI
              drug-discovery researchers command premium compensation, and Isomorphic competes for talent against Google
              DeepMind, OpenAI, and large pharma internal AI teams.
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR009
              - CR010
