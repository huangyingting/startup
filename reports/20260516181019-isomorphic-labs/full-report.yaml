    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Isomorphic Labs Limited is an Alphabet Inc. subsidiary incorporated in the United Kingdom on February 24,
              2021 (UK Companies House number 13223825), and publicly announced on November 4, 2021. The company is
              headquartered in London, United Kingdom, with additional offices in Lausanne, Switzerland (opened December
              2022) and Cambridge, Massachusetts (opened mid-2025). The name "isomorphic" reflects the founders' belief
              in a deep symmetry between biology and information science — identical in shape but arising from different
              origins — positioning the company as a bridge between computational AI and wet-lab drug discovery.

              The business model is research-partnership driven. Isomorphic Labs licenses its AI drug design
              capabilities to large pharmaceutical companies through collaborations featuring upfront payments,
              milestone-based payments tied to clinical and regulatory progress, and royalties on commercialized drugs.
              As of May 2026, the company has active collaborations with Eli Lilly, Novartis, and Johnson & Johnson.
              Internally, the company is also building a proprietary pipeline focused on oncology, immunology, and
              inflammation, all of which remain pre-clinical as of May 2026. The company's first AI-designed drug
              candidate, ISM8969, received IND clearance from the FDA on January 28, 2026, positioning Isomorphic Labs
              as the first AI-native company to advance an internally generated molecule toward human clinical trials.

              Isomorphic Labs defines its total addressable market as the computational layer of the global drug
              discovery and development industry, estimated at $2.58 billion in 2025 and growing at approximately 25-30%
              CAGR. The company occupies the pre-clinical AI design phase, creating a competitive moat through
              proprietary structural biology models trained on AlphaFold's decade-long research foundation at DeepMind.
