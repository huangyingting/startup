      - number: '2.2'
        title: Demand Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The core economic thesis driving demand for AI drug discovery platforms is the catastrophic cost structure
              of traditional drug development. The industry average cost per approved drug is approximately $2.0-2.6
              billion over a 10-15 year timeline, with approximately 90% of drug candidates failing at some point in
              clinical development. The pre-clinical phase alone — the segment where Isomorphic Labs operates —
              typically takes 4-6 years for target identification, structure determination, lead optimization, and IND
              preparation. AI-first discovery platforms claim to compress this to 12-18 months, representing a
              potentially 3-4x acceleration.

              The demand signal from top pharmaceutical companies is strong. All of the top 20 pharma companies use some
              form of AI for drug discovery as of 2025, with 78% having dedicated AI platform partnerships or internal
              teams. Isomorphic Labs' partnerships with Eli Lilly and Novartis — two of the largest global
              pharmaceutical companies — validate that tier-1 pharma is willing to pay substantial upfront fees ($45M
              and $37.5M respectively) for AI-enabled computational drug design.

              Key adoption constraints include: (1) regulatory uncertainty around AI-discovered drugs, as no AI-designed
              drug has received approval as of May 2026; (2) the "black box" nature of deep learning models, which
              raises reproducibility concerns for regulatory submissions; (3) integration costs with existing pharma
              informatics and wet-lab infrastructure; and (4) limited track record — ISM8969 is the first AI-designed
              drug to enter clinical trials at Isomorphic Labs, meaning clinical data won't exist until late 2027 at
              earliest.

              The 12-month delay in Isomorphic Labs' own clinical trial timeline (pushed from end-2025 to end-2026)
              illustrates that even the most capitalized AI drug discovery company faces execution risk, which may
              dampen pharma adoption rates if results disappoint.
