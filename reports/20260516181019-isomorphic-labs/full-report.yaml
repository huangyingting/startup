  foundingLocation: London, UK
  headquarters: London, UK
  productSummary: >-
    IsoDDE platform: AlphaFold 3 structure prediction (commercial-exclusive access), AlphaProteo protein binder design,
    AI-guided generative chemistry, and ADMET profiling. Delivered as a full-stack bespoke research collaboration
    integrating with pharma partner biology teams. AlphaFold Server provides non-commercial public access to structure
    prediction for academic and government researchers globally.
  customerFocus: >-
    Top-20 global pharmaceutical companies by R&D spend requiring AI acceleration of complex multi-target small-molecule
    and biologic drug discovery programs; near-term addressable universe is 10-15 tier-1 pharma entities with the
    wet-lab capacity to advance AI-designed candidates into the clinic.
  businessModel: >-
    Bespoke multi-year research collaboration: upfront payment at signing, milestone payments at defined drug discovery
    and development events (candidate selection, IND, Phase I entry, etc.), and royalties on approved drug
    commercialisation. No SaaS or per-seat licensing model; all revenue is deal-and-program-driven.
