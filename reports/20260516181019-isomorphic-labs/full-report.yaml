  - id: TE002
    title: IsoDDE Workflow and Use-Case Coverage
    columns:
      - User Job
      - Current Workflow
      - IsoDDE Solution
      - Measurable Benefit
      - Limitation
    rows:
      - - Target structure determination
        - Experimental X-ray crystallography (months to years; $200K–$1M+ per structure)
        - AlphaFold 3 structure prediction (hours; 200M+ pre-computed structures in database)
        - Weeks vs. years; near-zero marginal cost per additional structure
        - AF3 confidence varies by protein family; not a replacement for confirmatory experiment
      - - Hit generation from known target
        - HTS against 100K–1M compound libraries (months; expensive)
        - AF3-guided virtual screening plus generative chemistry module
        - 10–100× claimed hit rate improvement; novel AI-generated chemotypes outside known library
        - Independent hit-rate benchmarks vs. HTS not publicly published for IsoDDE
      - - Protein binder and antibody-alternative design
        - Phage display / yeast display (6–18 months; low throughput)
        - AlphaProteo generative binder design (days; high throughput)
        - 3–4× benchmark improvement in binder affinity; novel scaffold diversity
        - Benchmark results do not guarantee clinical translation; wet-lab failure rate undisclosed
      - - Lead optimization for small molecules
        - Iterative medicinal chemistry plus Schrödinger FEP (months per round)
        - Structure-aware AI-guided generative optimization using IsoDDE
        - Faster design-make-test cycle; structure-guided proposals reduce off-target risk
        - No published direct comparison vs. Schrödinger FEP+ on real partner programs
      - - Candidate ADMET profiling
        - Wet-lab ADMET assays (weeks per batch; costly)
        - AI-augmented ADMET prediction integrated into IsoDDE pipeline
        - Reduced projected attrition; faster multi-parameter optimization
        - IsoDDE ADMET prediction accuracy not independently validated or published
    notes: >-
      Workflow descriptions based on public product descriptions, partnership announcements, and drug discovery industry
      norms. Measurable benefits are company-claimed or benchmark-derived; real-world program outcomes are not
      independently verified.
    enumerationScope:
