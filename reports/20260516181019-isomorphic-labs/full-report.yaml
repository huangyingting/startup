              April 2026, personnel constitutes the dominant expense line. Assuming London-market AI and computational
              biology researcher all-in compensation of $200-250K per employee (including benefits, payroll taxes, and
              overhead), annual personnel costs approach $75-90M. Compute infrastructure for training and running
