  - id: FV001
    title: Recommendation logic
    type: flow
    insight: >
      The conditional positive recommendation flows from three converging inputs: platform strength, institutional
      validation, and financial stability, moderated by the clinical gap risk. Entry is warranted only at or below
      Series B entry price, with a mandatory milestone gate at 24 months.
    claimRefs:
      - CV004
      - CV007
    data:
      nodes:
        - id: f1
          label: AlphaFold3 Platform Strength
          description: Peer-reviewed protein-structure prediction; CASP15 winner; DeepMind compute advantage
        - id: f2
          label: Pharma Institutional Validation
          description: $2.7B headline partnership book with Lilly, Novartis, and J&J; tier-1 counterparties
        - id: f3
          label: Financial Stability ($2.1B Series B)
          description: 6-8 year runway at peer-level burn; Thrive Capital plus Alphabet backing
        - id: f4
          label: Clinical Gap Risk
          description: Zero confirmed clinical programmes; no IND timeline disclosed; all partnerships pre-clinical
        - id: f5
          label: Conditional Positive Signal
          description: Entry at Series B valuation with 24-month IND milestone gate; 5-8 year time horizon
        - id: f6
          label: Upgrade or Downgrade Trigger
          description: IND filing confirmed means upgrade; partner exit means downgrade to avoid
      edges:
        - from: f1
          to: f5
        - from: f2
          to: f5
        - from: f3
          to: f5
        - from: f4
          to: f5
        - from: f5
          to: f6
  - id: FV002
    title: Valuation sensitivity
    type: bar
    insight: >
      The valuation is highly sensitive to clinical milestone conversion rate. At zero milestone conversion the implied
      enterprise value falls below the $5B Series B entry price. At 50% milestones in the base case, value reaches
      approximately $10B-$15B. Only in the bull scenario with 80% or higher milestone conversion does the valuation
      reach $20B-$50B.
    claimRefs:
      - CV013
      - CV014
    data:
      items:
        - label: 'Bear: 0% milestone conversion, no clinical data'
          value: 3.5
          unit: $B enterprise value
        - label: 'Base: 50% milestone conversion, IND filings by 2028'
          value: 11
          unit: $B enterprise value
        - label: Series B Entry (Implied Midpoint Estimate)
          value: 6.5
          unit: $B
        - label: 'Bull: 80% milestone conversion, Phase 2 efficacy by 2030'
          value: 35
          unit: $B enterprise value
        - label: Strategic acquisition by pharma partner at bull valuation
          value: 50
          unit: $B (6x Series B implied)
  - id: FV003
    title: Valuation / return range
    type: range
    insight: >
      Bear case exit values ($1B-$4B) represent a capital loss versus the Series B entry price. Base case ($8B-$15B)
      implies a 1.2-2.3x return multiple over 7-10 years. Bull case ($20B-$50B) implies 3-8x return from Series B entry.
      The wide range reflects the binary nature of clinical drug discovery outcomes.
