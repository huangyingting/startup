      - number: '7.5'
        title: Financial, Model & Mitigation
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs is pre-revenue in the conventional sense: no revenue figures have been disclosed despite
              three active pharma partnerships. The company's financial risk centres on burn rate opacity, milestone
              dependency, and capital intensity of AI compute. The $2.1 billion Series B closed in May 2026 provides
              multi-year runway, but if milestone conversions fail to materialise within three to four years, a further
              dilutive raise or strategic partnership with Alphabet may be required. The company's open-source adjacent
              strategy — AlphaFold is publicly available as a research tool — creates a paradox: broad scientific
              adoption strengthens the brand but reduces the uniqueness of the underlying model, eroding pricing power.
              Nature's coverage in 2025 warned that proprietary data advantages for AI drug-discovery firms may erode as
              pharma companies build in-house AI teams, directly challenging Isomorphic's long-term value proposition.
              Mitigants include the Novartis expansion (demonstrating some retention), the $2.1B runway, and Alphabet's
              reputational backing. Kill criteria for this investment thesis would include termination of two or more
              pharma partnerships, failure to disclose any IND-stage candidate by 2028, or departure of Demis Hassabis
              from Isomorphic's governance structure.
