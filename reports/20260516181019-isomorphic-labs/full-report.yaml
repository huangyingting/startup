      - number: '7.3'
        title: Partner & Dependency Risk
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs' revenue model is entirely dependent on three pharma partners — Eli Lilly, Novartis, and
              J&J — converting research milestones into payments. This creates a cliff-edge concentration risk: the
              failure or termination of any one deal would eliminate a substantial proportion of potential milestone
              value. The Recursion-Exscientia merger in 2024 illustrates how AI drug-discovery firms under commercial
              pressure may consolidate rather than sustain partner programmes. Alphabet dependency is a further
              structural risk: Isomorphic's AlphaFold franchise, compute access, and DeepMind talent pipeline all flow
              through Alphabet. If Alphabet deprioritises drug discovery — whether through strategic refocus, regulatory
              action, or antitrust remedies — Isomorphic's core technical assets could be impaired. Cloud infrastructure
              dependency adds a further layer: any disruption to Google Cloud services would directly affect
              Isomorphic's AI platform operations and partner commitments. No public information suggests a multi-cloud
              or on-premise redundancy strategy.
