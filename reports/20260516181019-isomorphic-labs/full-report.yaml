  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Partnership Economics
        blocks:
          - type: paragraph
            body: >
              Isomorphic Labs generates revenue exclusively through multi-year, multi-target research collaboration
              agreements with large pharmaceutical companies. The model is milestone-structured: each partnership
              delivers an upfront fee at signing followed by milestone payments triggered by defined drug discovery and
              development events (candidate selection, IND filing, Phase I/II/III entry, regulatory approval), and
              ultimately royalties on any commercially approved drug. As of May 2026, three collaborations have been
              publicly disclosed: Eli Lilly (January 2024, $45M upfront, up to $1.745B in milestones), Novartis (January
              2024, $37.5M upfront, up to $1.2B in milestones, expanded February 2025), and Johnson & Johnson (January
              2026, financial terms not disclosed). Total confirmed upfront cash received is $82.5M; maximum potential
              milestones from the two disclosed deals exceed $2.9B. No royalty revenue has been triggered since the lead
              drug candidate ISM8969 received FDA IND clearance in January 2026 with Phase I expected by end-2026.
              Isomorphic does not charge SaaS, API, or per-query fees. All revenue is through bespoke long-term
              partnership agreements, creating lumpy, milestone-contingent recognition that could take 10-15 years to
              peak. Three partnerships in 24 months represents a fast and repeatable deal-making cadence by industry
              standards, though over 97% of partnership value remains contingent on clinical outcomes.
