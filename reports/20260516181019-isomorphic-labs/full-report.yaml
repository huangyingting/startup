              AI drug discovery market estimates range from $2.6B to $6B+ depending on whether milestones, embedded AI
              spend, and venture investment are included. This ambiguity makes TAM-based valuation unreliable. The
              sector's current revenue base is small relative to capital deployed (~$2.7B to Isomorphic alone), raising
              concerns about capital efficiency and return timeline if market growth disappoints.
