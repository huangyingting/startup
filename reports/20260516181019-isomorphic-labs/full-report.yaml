      - number: '2.3'
        title: Market Segments and Buyer Analysis
        blocks:
          - type: paragraph
            body: >-
              The AI in drug discovery market can be segmented along three primary axes: (1) the stage of drug
              development targeted (target identification, hit identification, lead optimization, ADMET prediction,
              clinical design); (2) the therapeutic modality (small molecules, biologics, nucleic acids, cell therapies,
              multi-specific antibodies); and (3) the buyer type (Big Pharma, mid-cap pharma, biotech, academic
              research).

              Isomorphic Labs primarily addresses the small molecule drug design segment in the lead optimization and
              hit identification phases. Its Eli Lilly and Novartis collaborations are explicitly small
              molecule-focused. The Johnson & Johnson collaboration (January 2026) expanded into cross-modality drug
              design, including biologics and other modalities. This expansion is strategically significant: the
              biologics segment represents a larger share of pharma R&D than small molecules in recent years, and
              mastering multi-modality design substantially expands Isomorphic's serviceable addressable market.

              The buyer landscape for AI drug discovery services is concentrated at the top. The top 20 global
              pharmaceutical companies account for an estimated 65-70% of global pharmaceutical R&D spending, making
              them the primary buyer segment. For Isomorphic Labs specifically, the collaboration model requires
              partners with sufficient pipeline scale to absorb multi-target AI-design programs and the financial
              capacity to fund milestone payments of $1-2 billion per collaboration. This realistically limits the
              near-term buyer pool to 15-25 global pharma and large biotech companies. Academic research is served
              through the free AlphaFold server, which provides ecosystem value but no direct revenue.
