      - number: '7.4'
        title: People & Execution Risk
        blocks:
          - type: paragraph
            body: >
              As an AI-first drug-discovery company, Isomorphic Labs' execution risk is concentrated in a small number
              of world-class AI researchers whose expertise directly underpins the platform's differentiation. The
              company competes against Google DeepMind, Microsoft Research, and well-funded AI pharma peers for the same
              talent pool. Compensation expectations for top AI researchers have risen sharply since 2022, and
              Isomorphic Labs — as a private company — faces challenges in competing with public-company equity
              packages. Execution risk also includes the complexity of translating AI-predicted structures into
              validated drug candidates: computational predictions must survive wet-lab testing, ADMET profiling, and
              clinical safety screens before any milestone is triggered. The company has not disclosed a roadmap for
              internal clinical programmes, suggesting current execution is focused on the research phase rather than
              translational delivery. If partner drug candidates fail at wet-lab validation, milestone conversions stall
              and renewal probability declines.
            claimRefs:
              - CR016
