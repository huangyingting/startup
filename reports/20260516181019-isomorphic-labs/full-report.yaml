  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Size, Scope, and Growth Trajectory
        blocks:
          - type: paragraph
            body: >-
              The global AI in drug discovery market is estimated at approximately $2.58 billion in 2025 by Mordor
              Intelligence, growing at a compound annual growth rate of approximately 25-30% through 2030. This market
              is distinct from broader pharmaceutical R&D spending (~$230 billion globally in 2025) and represents only
              the AI-specific computational layer of the drug discovery value chain. The boundaries matter for analysis:
              Isomorphic Labs does not compete in wet-lab synthesis, clinical development, or manufacturing — it
              competes in the in silico target identification, structure prediction, and lead optimization phases that
              constitute a small but rapidly growing share of pre-clinical R&D investment.

              Axis Intelligence's 2026 analysis pegs the AI drug discovery market at a different size depending on
              methodology — bottom-up approaches using pharma AI licensing deal volumes suggest the market could be
              significantly larger if all milestone-bearing contracts are included, potentially $5-8 billion by 2027.
              The Mordor Intelligence base case of $2.58 billion in 2025 likely represents direct AI platform contract
              revenue and excludes embedded AI spend within larger pharma R&D organizations. The Excelra 2026 state-of-
              AI report notes that 78% of top-20 pharma companies now have active AI drug discovery programs, suggesting
              the market penetration is accelerating ahead of prior forecasts.

              Venture investment into AI drug discovery reached $4.1 billion in 2025, up 38% year-on-year, demonstrating
              that financial market demand is well ahead of current commercial market size. This compression — large VC
              bets against a sub-$3B current market — reflects the sector's expectation that AI will rapidly displace
              traditional pre-clinical methods. Isomorphic Labs' $2.7 billion in total capital raised makes it the
              largest private AI drug discovery company by financing, ahead of Recursion ($900M+ total) and Schrödinger
              ($500M+).
