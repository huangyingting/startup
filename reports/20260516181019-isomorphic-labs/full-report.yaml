      - number: '1.4'
        title: Key Milestones and Strategic Progress
        blocks:
          - type: paragraph
            body: >-
              Isomorphic Labs has progressed from its founding as an AI research company toward a multi-stage,
              clinically-oriented drug design engine. The company built on AlphaFold 2's 2020 CASP competition win —
              which solved the 50-year protein structure prediction problem — as its foundational scientific
              achievement. AlphaFold 3, published in Nature on May 8, 2024 (doi:10.1038/s41586-024-07487-w), extended
              predictions to DNA, RNA, small molecules, and protein interactions, and was shown to be 50% more accurate
              than traditional methods on the PoseBusters benchmark. The AlphaFold server, made freely available, serves
              3+ million researchers in 190+ countries.

              Two landmark pharma collaborations with Eli Lilly ($45M upfront, up to $1.7B in milestones) and Novartis
              ($37.5M upfront, up to $1.2B in milestones) were announced in January 2024. Novartis expanded the
              collaboration in February 2025 with three additional programs. A third collaboration with Johnson &
              Johnson was announced in January 2026. The IsoDDE (Isomorphic Drug Design Engine) platform, announced
              February 10, 2026, represents a major technical upgrade — described as more than doubling AlphaFold 3's
              accuracy on protein-ligand generalization benchmarks and surpassing physics-based methods in binding
              affinity prediction.

              ISM8969, the first AI-designed drug candidate produced internally, received FDA IND-enabling clearance on
              January 28, 2026. The clinical trial timeline was originally set for end-2025 but was delayed by 12 months
              to end-2026, announced at the World Economic Forum in Davos in January 2026. This delay represents a
              meaningful setback in the company's narrative of AI accelerating drug discovery timelines.
