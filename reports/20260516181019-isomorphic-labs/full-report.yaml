      - number: '5.2'
        title: Platform Architecture and Infrastructure
        blocks:
          - type: paragraph
            body: >
              IsoDDE operates as a five-layer integrated AI stack. At the base sits the data layer: the RCSB Protein
              Data Bank (230K+ experimentally determined structures), the EMBL-EBI AlphaFold Database (200M+
              AI-predicted structures), the Chemical Component Dictionary (CCD) for ligand data, and proprietary wet-lab
              feedback from ongoing partner programs. The core AI model layer comprises three modules: AlphaFold 3, a
              diffusion transformer architecture that generates all-atom coordinate predictions for proteins, ligands,
              DNA, and RNA jointly; AlphaProteo, a generative protein binder design model; and the generative chemistry
              engine for small molecule proposals. All training and large-scale inference runs on Google Cloud TPU and
              GPU clusters provided via Alphabet's infrastructure. A workflow orchestration layer manages the drug
              discovery pipeline steps—hit generation, virtual screening, lead optimization, and ADMET prediction. The
              partner integration layer provides the API and data exchange mechanism through which pharma collaborators
              (Lilly, Novartis, J&J) submit targets and receive AI-generated candidate packages under NDA. The AlphaFold
              3 GitHub repository has accumulated over 12,000 stars, reflecting substantial developer community
              engagement with the underlying methods. Critically, Alphabet's compute infrastructure represents a core
              operational dependency; the true standalone compute cost is not independently disclosed.
