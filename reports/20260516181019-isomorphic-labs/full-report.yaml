            body: |
              The competitive outlook for Isomorphic is favorable in the near term due to its structural biology
              moat and capital advantage, but is materially dependent on ISM8969 Phase I outcomes expected in
              late 2026. A Phase I failure would disproportionately harm Isomorphic's positioning relative to
