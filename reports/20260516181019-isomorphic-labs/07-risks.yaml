callouts:
  - calloutType: "risk"
    title: "EU AI Act Applies to Isomorphic's Core Use Case"
    body: >
      The EU AI Act classifies AI systems used in drug design and clinical decision
      support as high-risk, triggering conformity assessments and documentation
      requirements. Isomorphic's pharma partners deploy platform outputs in EU
      jurisdictions, creating indirect regulatory exposure regardless of where
      Isomorphic Labs itself is incorporated.
    claimRefs: [CR001, CR002]

  - calloutType: "risk"
    title: "Zero Disclosed Revenue With $2.1B Burn Clock Running"
    body: >
      The Series B provides runway, but with no disclosed revenue, no IND-stage
      drug candidates, and three pharma partners whose milestone conversions are
      unproven, Isomorphic faces a structural risk: the thesis depends entirely
      on future milestones that have not yet been triggered.
    claimRefs: [CR021, CR022, CR023]

