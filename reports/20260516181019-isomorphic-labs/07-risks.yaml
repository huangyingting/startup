chapter:
  number: 7
  title: "Risks"
  summary: >
    Isomorphic Labs faces a multi-dimensional risk profile spanning regulatory,
    legal, operational, partner/dependency, and financial dimensions. Regulatory
    risk is substantial and growing: the EU AI Act (2024) classifies high-risk
    AI uses in medicine, and UK ICO GDPR obligations apply to clinical-data
    processing. Legal risk includes Alphabet antitrust scrutiny and potential
    IP disputes over AI-generated drug candidates. Operationally, the company
    is heavily dependent on Demis Hassabis and Google DeepMind infrastructure.
    Partner concentration — three customers, all big pharma — creates a
    cliff-edge dependency on milestone conversion. Financial risk centres on
    pre-revenue status and uncertain burn rate. Mitigants exist: the $2.1B
    Series B provides multi-year runway, and the Novartis expansion signals
    at least partial retention. However, no clinical-stage drug candidate has
    been publicly validated, and every major revenue source remains contingent.

sections:
  - id: S_R_01
    title: "Regulatory & Legal Risk"
    body: >
      Isomorphic Labs operates at the intersection of AI and pharmaceutical drug
      discovery, a domain subject to intensifying regulatory scrutiny. The EU AI Act
      (Regulation 2024/1689), in force from August 2024, classifies AI systems used
      in healthcare and drug development as high-risk, requiring conformity assessments,
      transparency obligations, and robust documentation. While Isomorphic Labs is
      incorporated in England and Wales, its pharma partners — Lilly (US), Novartis
      (Switzerland), and J&J (US) — deploy the platform's outputs in jurisdictions
      where both EU and US regulators have authority over AI in medical applications.
      The UK Information Commissioner's Office (ICO) has separately published guidance
      on AI use involving health data, noting GDPR obligations apply even when data is
      de-identified for model training. The FTC launched a broad inquiry into AI
      foundation models in 2024, with implications for platform companies like
      Isomorphic. Intellectual property risk is also material: there is no settled
      legal precedent on AI-generated drug candidate ownership, and Isomorphic's
      reliance on training data whose provenance is not publicly disclosed creates
      potential copyright and IP challenges analogous to those seen in AI content
      generation lawsuits. Companies House filings show Isomorphic Labs Ltd
      (company 13036082) as a private limited company with no publicly disclosed
      litigations, but this absence of disclosure does not indicate absence of risk.
    claimRefs: [CR001, CR002, CR003, CR004, CR005]
    tableRefs: [TR001]
    figureRefs: []

  - id: S_R_02
    title: "Operational & Key-Person Risk"
    body: >
      Isomorphic Labs faces significant operational risk centred on key-person
      dependency and compute infrastructure concentration. Demis Hassabis simultaneously
      leads Google DeepMind and serves as a strategic figurehead for Isomorphic Labs.
      Any change in his availability — through DeepMind leadership transition, personal
      circumstances, or competing priorities — could materially impair Isomorphic's
      scientific credibility and partner trust. Beyond key-person risk, Isomorphic is
      deeply dependent on Google DeepMind's compute infrastructure and the AlphaFold
      franchise; the company has not publicly disclosed whether it operates on
      independent compute or fully cloud-sourced resources. Operational risks in
      AI drug-discovery systems include model hallucination and reliability failures,
      where a confidently-predicted molecular structure proves incorrect in wet-lab
      validation, wasting partner resources and damaging trust. BenevolentAI's 2023
      strategic overhaul following AstraZeneca deal failure illustrates how operational
      and scientific reliability failures can force rapid restructuring. Talent risk
      is also elevated: AI drug-discovery researchers command premium compensation,
      and Isomorphic competes for talent against Google DeepMind, OpenAI, and large
      pharma internal AI teams.
    claimRefs: [CR006, CR007, CR008, CR009, CR010]
    tableRefs: [TR002]
    figureRefs: [FR001]

  - id: S_R_03
    title: "Partner & Dependency Risk"
    body: >
      Isomorphic Labs' revenue model is entirely dependent on three pharma partners —
      Eli Lilly, Novartis, and J&J — converting research milestones into payments.
      This creates a cliff-edge concentration risk: the failure or termination of any
      one deal would eliminate a substantial proportion of potential milestone value.
      The Recursion-Exscientia merger in 2024 illustrates how AI drug-discovery firms
      under commercial pressure may consolidate rather than sustain partner programmes.
      Alphabet dependency is a further structural risk: Isomorphic's AlphaFold franchise,
      compute access, and DeepMind talent pipeline all flow through Alphabet. If Alphabet
      deprioritises drug discovery — whether through strategic refocus, regulatory action,
      or antitrust remedies — Isomorphic's core technical assets could be impaired.
      Cloud infrastructure dependency adds a further layer: any disruption to Google
      Cloud services would directly affect Isomorphic's AI platform operations and
      partner commitments. No public information suggests a multi-cloud or on-premise
      redundancy strategy.
    claimRefs: [CR011, CR012, CR013, CR014, CR015]
    tableRefs: [TR003]
    figureRefs: [FR002]

  - id: S_R_04
    title: "People & Execution Risk"
    body: >
      As an AI-first drug-discovery company, Isomorphic Labs' execution risk is
      concentrated in a small number of world-class AI researchers whose expertise
      directly underpins the platform's differentiation. The company competes against
      Google DeepMind, Microsoft Research, and well-funded AI pharma peers for the
      same talent pool. Compensation expectations for top AI researchers have risen
      sharply since 2022, and Isomorphic Labs — as a private company — faces challenges
      in competing with public-company equity packages. Execution risk also includes the
      complexity of translating AI-predicted structures into validated drug candidates:
      computational predictions must survive wet-lab testing, ADMET profiling, and
      clinical safety screens before any milestone is triggered. The company has not
      disclosed a roadmap for internal clinical programmes, suggesting current execution
      is focused on the research phase rather than translational delivery. If partner
      drug candidates fail at wet-lab validation, milestone conversions stall and
      renewal probability declines.
    claimRefs: [CR016, CR017, CR018, CR019, CR020]
    tableRefs: [TR004]
    figureRefs: []

  - id: S_R_05
    title: "Financial, Model & Mitigation"
    body: >
      Isomorphic Labs is pre-revenue in the conventional sense: no revenue figures have
      been disclosed despite three active pharma partnerships. The company's financial
      risk centres on burn rate opacity, milestone dependency, and capital intensity of
      AI compute. The $2.1 billion Series B closed in May 2026 provides multi-year
      runway, but if milestone conversions fail to materialise within three to four
      years, a further dilutive raise or strategic partnership with Alphabet may be
      required. The company's open-source adjacent strategy — AlphaFold is publicly
      available as a research tool — creates a paradox: broad scientific adoption
      strengthens the brand but reduces the uniqueness of the underlying model, eroding
      pricing power. Nature's coverage in 2025 warned that proprietary data advantages
      for AI drug-discovery firms may erode as pharma companies build in-house AI teams,
      directly challenging Isomorphic's long-term value proposition. Mitigants include
      the Novartis expansion (demonstrating some retention), the $2.1B runway, and
      Alphabet's reputational backing. Kill criteria for this investment thesis would
      include termination of two or more pharma partnerships, failure to disclose any
      IND-stage candidate by 2028, or departure of Demis Hassabis from Isomorphic's
      governance structure.
    claimRefs: [CR021, CR022, CR023, CR024, CR025, CR026, CR027]
    tableRefs: [TR005]
    figureRefs: [FR003]

