callouts:
  - calloutType: strength
    title: "Demand Pull from Pharma's Cost Crisis"
    body: >-
      With each drug costing ~$2 billion and 90% failing in clinical trials, pharma companies face existential
      pressure to find efficiencies. AI drug discovery addresses this directly. The willingness of Lilly and
      Novartis to commit $45M and $37.5M upfront — before any clinical validation — demonstrates that top-tier
      pharma is buying the premise even ahead of proof points.
    claimRefs:
      - CM007
      - CM008
      - CM009

  - calloutType: risk
    title: "Market Sizing Uncertainty and Scope Inflation"
    body: >-
      AI drug discovery market estimates range from $2.6B to $6B+ depending on whether milestones, embedded AI
      spend, and venture investment are included. This ambiguity makes TAM-based valuation unreliable. The
      sector's current revenue base is small relative to capital deployed (~$2.7B to Isomorphic alone), raising
      concerns about capital efficiency and return timeline if market growth disappoints.
    claimRefs:
      - CM001
      - CM002
      - CM003

