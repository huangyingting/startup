callouts:
  - calloutType: strength
    title: "AlphaFold 3 Commercial Exclusivity Creates Structural Moat"
    body: >
      The restriction of AlphaFold 3 commercial drug design use to Isomorphic Labs is a unique
      structural competitive barrier: pharma companies cannot independently deploy AF3 for their
      discovery programs, making Isomorphic the only channel for AF3-based drug design at scale.
      Open-source alternatives do not replicate AF3's protein-ligand complex prediction capability.
    claimRefs:
      - CE004
      - CE019
      - CE040

  - calloutType: risk
    title: "ISM8969 Preclinical Data Undisclosed: Platform Efficacy Rests on Unverified Claims"
    body: >
      No peer-reviewed publication discloses ISM8969's structure, mechanism of action, or
      preclinical efficacy and safety data. The AI-designed IND candidate's clinical translation
      remains unproven; if Phase I reveals safety or efficacy issues, it would constitute the
      first public test of IsoDDE's clinical validity. GxP and ISO 13485 certifications for
      IsoDDE software are not publicly confirmed.
    claimRefs:
      - CE027
      - CE032

  - calloutType: insight
    title: "AlphaProteo Expands IsoDDE Beyond Small Molecules"
    body: >
      The addition of AlphaProteo (September 2024) extends IsoDDE's addressable modality
      from small molecule SBDD to protein binder design—covering antibody alternatives,
      peptides, and molecular glues. Benchmark results showing 3–4× affinity improvement
      over prior leading methods position Isomorphic to address biologics programs that
      could triple the addressable partnership value per deal.
    claimRefs:
      - CE006
      - CE007
      - CE038

