  - id: trust-safety-compliance
    title: "Trust, Safety, and Compliance"
    body: >
      Isomorphic Labs operates under several layers of compliance obligation. The FDA IND
      clearance for ISM8969 (January 2026) is the strongest external validation of the
      company's compliance posture at the regulatory level: FDA reviewed ISM8969's preclinical
      package and cleared it for Phase I human trials, implying the company can generate
      IND-ready documentation. However, this is for a single candidate; IsoDDE itself is not
      independently certified or audited. As of May 2026, no GxP (Good Practice) or ISO 13485
      software quality certification has been publicly disclosed for the IsoDDE platform,
      which is a material gap for a system generating drug candidates intended for clinical
      development. Biosecurity controls are maintained internally to prevent misuse of
      AlphaFold 3 and AlphaProteo for designing harmful biological agents; the EMBL-EBI
      AlphaFold Server enforces non-commercial terms of service to restrict server outputs.
      The EU AI Act (effective August 2024) may classify AI systems used in clinical decision
      support as high-risk, creating prospective conformity assessment obligations for
      Isomorphic's EU activities. No third-party AI audit record has been publicly disclosed.
      GDPR compliance is assumed for a UK-registered company processing partner data, but
      cross-border data transfer terms to US cloud infrastructure have not been independently
      confirmed. These gaps are standard for an investment-stage AI drug design company but
      represent diligence items before full regulatory deployment.
    claimRefs:
