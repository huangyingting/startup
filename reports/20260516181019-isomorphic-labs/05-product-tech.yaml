  - id: roadmap-deployment
    title: "Roadmap, Deployment, and Integration"
    body: >
      IsoDDE's deployment model is fully bespoke: there is no self-serve API, marketplace, or
      open-access commercial endpoint. Each pharma collaboration is a multi-year, customized
      engagement in which Isomorphic's scientists work alongside partner teams to apply the
      platform to their specific targets. This creates high switching costs and deep integration
      but also limits scalability and rapid deal closing. The platform roadmap as publicly
      disclosed centers on ISM8969 Phase I clinical trial initiation by end-2026, representing
      the first human-in-the-loop clinical read on an AI-designed drug candidate from Isomorphic
      Labs. Beyond ISM8969, no public roadmap exists for additional internal pipeline assets or
      major platform capability releases. The February 2025 expansion of the Novartis partnership
      and the January 2026 J&J deal suggest continued commercial momentum, with the IsoDDE
      data flywheel improving with each additional partner program. Integration into pharma
      partner workflows requires deep IT, data governance, and scientific coordination, which
      are handled through NDA-governed data exchange agreements. Alphabet's ongoing infrastructure
      and IP partnership provides continuity, though this dependency creates governance risk if
      Alphabet's strategic priorities shift materially from the current AI drug discovery focus.
    claimRefs:
      - CE012
      - CE013
      - CE023
      - CE030
      - CE031
