company:
  name: "Isomorphic Labs"
chapter:
  number: 5
  title: "Product and Technology"
  summary: >
    IsoDDE is Isomorphic Labs' proprietary AI-powered drug design platform integrating AlphaFold 3
    for protein-ligand structure prediction, AlphaProteo for novel protein binder generation, and
    a generative chemistry module for small molecule design. Commercial use of AlphaFold 3 outputs
    in drug design is restricted exclusively to Isomorphic Labs, creating a structural competitive
    barrier. ISM8969's January 2026 FDA IND clearance—the first from an entirely AI-designed
    internal pipeline—represents the strongest external validation of the platform's clinical
    relevance to date, though preclinical data and mechanism of action remain undisclosed.

sections:
  - id: platform-definition
    title: "IsoDDE Platform Definition and Customer Workflow"
    body: >
      Isomorphic Labs' IsoDDE platform addresses the core bottleneck in pharmaceutical drug
      discovery: identifying and optimizing a drug molecule that binds its target protein with
      high specificity, safety, and druggability. In the conventional pharma workflow, target
      structure determination via X-ray crystallography can take months to years and cost hundreds
      of thousands of dollars per structure; high-throughput screening (HTS) of compound libraries
      involves testing hundreds of thousands to millions of compounds at significant cost and time.
      IsoDDE replaces or augments these steps with AI predictions. AlphaFold 3 predicts the
      three-dimensional structure of the target protein—and its interaction with candidate
      drug molecules—in hours rather than months, drawing on the 200M+ structures in the
      EMBL-EBI AlphaFold database. AlphaProteo then designs novel protein binders (antibody
      alternatives, peptides, molecular glues) directly from the predicted target structure.
      The generative chemistry module designs novel small molecules constrained by the predicted
      binding pocket geometry. ISM8969, the company's lead internal candidate, received FDA IND
      clearance in January 2026 as the first drug designed entirely through this AI pipeline,
      demonstrating the platform's ability to deliver regulatory-grade candidates without
      traditional HTS or experimental structure determination.
