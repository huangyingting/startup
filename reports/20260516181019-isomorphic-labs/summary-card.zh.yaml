  shortDescription: >-
    Isomorphic Labs is an Alphabet-backed AI drug discovery company that applies AlphaFold 3 structure prediction and
    generative AI to design novel drug candidates. Founded in 2021 as a Google DeepMind spin-out, it operates IsoDDE—an
    end-to-end AI drug design platform—under commercial research partnerships with Eli Lilly, Novartis, and Johnson &
    Johnson. Its first wholly owned IND-cleared candidate (ISM8969) is entering Phase I clinical trials in late 2026.
