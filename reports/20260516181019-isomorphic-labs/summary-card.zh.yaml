  headline: >-
    Isomorphic Labs 凭 AlphaFold 3 商业独占权和三项已签药企合作，拿住 AI 药物设计最强 IP 位置；但 $16 billion 私募估值押注里程碑转化，公开临床证据尚未支撑，需等待 ISM8969 I
