          note: "Entry at or below $8B implied valuation; 24-month milestone gate required"

callouts:
  - calloutType: "recommendation"
    title: "Conditional Positive: Entry at or Below Series B Terms"
    body: >
      The evidence supports a conditional positive investment view on Isomorphic Labs at the
      Series B entry price ($5B-$8B implied valuation). The platform AlphaFold3 differentiation,
      $2.7B pharma partnership book, and Alphabet backing justify a premium over listed peers.
      Entry is conditioned on milestone gating: the recommendation upgrades to unconditional
      positive only upon IND filing confirmation within 24 months.
    claimRefs: [CV039]

  - calloutType: "risk"
    title: "Pre-Clinical Thesis Risk: Zero Disclosed Clinical Programmes"
    body: >
      The single most important risk is that all three pharma partnerships remain in research
      phase as of May 2026. No clinical programme, IND timeline, or wet-lab validation data
      has been publicly disclosed. The BenevolentAI precedent demonstrates that AI drug-discovery
      platforms can sustain research partnerships for years without translating them into clinical
      programmes. Investors must apply a material clinical execution discount to headline values.
    claimRefs: [CV003, CV023]

  - calloutType: "insight"
    title: "Alphabet Backing is a Double-Edged Factor"
    body: >
      Google DeepMind compute and model access is the primary competitive moat but it is also
      the primary single-point-of-failure risk. If Alphabet restructures its Other Bets portfolio,
      Isomorphic Labs loses its foundational infrastructure advantage. This dependency must be
      contractually mitigated before a Series B co-investment decision is finalised.
    claimRefs: [CV004, CV036]

  - calloutType: "assumption"
    title: "Valuation Estimates Are Analyst Proxies, Not Disclosed Figures"
    body: >
      All enterprise value estimates ($5B-$8B post-money) are derived from PitchBook, Dealroom,
      and Compworth analyst models, not from publicly disclosed cap table data. Actual preference
      structures, dilution events, and warrants could materially alter common equity value in
      any scenario below the bull case.
    claimRefs: [CV010, CV030]

