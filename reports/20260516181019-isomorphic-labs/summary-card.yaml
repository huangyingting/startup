  topStrengths:
    - >-
      Sole commercial access to AlphaFold 3 structure prediction creates a structural moat unavailable to any competitor
      as of May 2026
    - >-
      Three signed tier-1 pharma partnerships (Lilly, Novartis, J&J) with up to $3.945B combined milestone potential on
      two disclosed deals
    - >-
      Novartis expansion (February 2025, 13 months post-signing) is the strongest available retention signal; no partner
      terminations reported
    - >-
      $2.1B Series B led by Thrive Capital funds an estimated 6-17 year runway; ISM8969 IND clearance (January 2026)
      validates internal pipeline execution
    - >-
      Alphabet parentage provides near-unlimited compute and talent access; Demis Hassabis (Nobel, 2024) provides
      unmatched scientific credibility
  topRisks:
    - >-
      No milestone payment received to date; all future revenue contingent on partner program clinical progression
      through undefined trigger conditions
    - Extreme customer concentration (3 pharma partners = 100% known revenue; J&J deal terms undisclosed)
    - >-
      AlphaFold 3 non-commercial license exposes platform moat to open-source replication; commercial exclusivity not
      legally ring-fenced beyond 12 months
    - >-
      FDA/EMA regulatory uncertainty: no AI-generated drug candidate has completed Phase II; regulatory pathway for
      AI-designed molecules is undefined
    - >-
      $16B valuation at ~194× confirmed upfront revenue; Recursion (closest comparable) trades at ~$3.5B market cap with
      a broader clinical portfolio
  unresolvedGaps:
    - >-
      J&J partnership financial terms (upfront, milestone schedule) not publicly disclosed; true portfolio revenue
      potential cannot be assessed
    - >-
      ISM8969 Phase I safety and efficacy data not yet available; target indication and mechanism of action not publicly
      disclosed
    - Post-money Series B valuation not officially confirmed; all $16B estimates are third-party sourced
    - >-
      No pharma partner has reported program performance data (hit rates, cycle time, candidate selection events) from
      IsoDDE collaboration
    - AlphaFold 3 commercial exclusivity duration not publicly confirmed beyond initial announcement language
