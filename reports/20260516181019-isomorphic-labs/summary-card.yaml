summary:
  headline: >-
    Isomorphic Labs holds the strongest IP position in AI drug design via AlphaFold 3 commercial exclusivity and three
    signed pharma partnerships, but its $16 billion private valuation embeds milestone-conversion assumptions
    unsupported by any public clinical evidence; TRACK pending ISM8969 Phase I data and first milestone payment.
