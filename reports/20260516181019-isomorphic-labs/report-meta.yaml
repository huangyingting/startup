companyProfile:
  summary: >-
    Isomorphic Labs, founded in early 2021 in London by Demis Hassabis and colleagues from
    Google DeepMind, is the developer of IsoDDE—an integrated AI drug design and engineering
    platform built on AlphaFold 3 structure prediction and AlphaProteo protein binder design.
    The company operates as an independent Alphabet subsidiary. As of May 2026, it holds three
    active pharma partnerships (Eli Lilly, Novartis, Johnson & Johnson) representing up to
    $3.945 billion in combined milestone potential on the two disclosed deals, has cleared IND
    for its first wholly owned clinical candidate ISM8969, and raised $2.1 billion in a Series B
    led by Thrive Capital (May 2026). No milestone revenue has yet been reported and the company
    has no approved drugs; all forward revenue is contingent on partner program progression.
  foundedDate: "2021-01-01"
  founders:
    - name: Demis Hassabis
      role: Co-Founder and Chairman
      background: >-
        Co-founded DeepMind (2010, acquired by Google 2014); CEO of Google DeepMind; Nobel
        Prize in Chemistry co-recipient (2024) for AlphaFold protein structure prediction;
        PhD Neuroscience Cambridge; chess prodigy and game designer.
    - name: Pushmeet Kohli
      role: CEO
      background: >-
        Previously VP of Research at Isomorphic Labs and Research Director at DeepMind;
        PhD machine learning; expert in probabilistic reasoning and AI for science.
  foundingLocation: London, UK
  headquarters: London, UK
  productSummary: >-
    IsoDDE platform: AlphaFold 3 structure prediction (commercial-exclusive access), AlphaProteo
    protein binder design, AI-guided generative chemistry, and ADMET profiling. Delivered as a
    full-stack bespoke research collaboration integrating with pharma partner biology teams.
    AlphaFold Server provides non-commercial public access to structure prediction for academic
    and government researchers globally.
  customerFocus: >-
    Top-20 global pharmaceutical companies by R&D spend requiring AI acceleration of complex
    multi-target small-molecule and biologic drug discovery programs; near-term addressable
    universe is 10-15 tier-1 pharma entities with the wet-lab capacity to advance AI-designed
    candidates into the clinic.
  businessModel: >-
    Bespoke multi-year research collaboration: upfront payment at signing, milestone payments at
    defined drug discovery and development events (candidate selection, IND, Phase I entry, etc.),
    and royalties on approved drug commercialisation. No SaaS or per-seat licensing model; all
    revenue is deal-and-program-driven.
  stage: Private (Series B, May 2026)
  fundingStatus: >-
    Total raised ~$2.7B: $600M Series A (April 2025, led by unspecified investor with Alphabet
    participation); $2.1B Series B (May 2026, led by Thrive Capital, co-investors Alphabet, GV,
    MGX, Temasek, CapitalG, UK Sovereign AI Fund). Neither round's post-money valuation has been
    officially disclosed; third-party estimates place Series B post-money at approximately $16B.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CI008, CI009]

