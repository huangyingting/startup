callouts:
  - calloutType: strength
    title: "Record-breaking capitalization anchors multi-year runway"
    body: >
      The $2.7B total external capital raised positions Isomorphic Labs as one of the best-funded
      private AI drug discovery companies globally. The post-Series B runway of 8-17 years is
      sufficient to fund multiple clinical programs through Phase I and generate second-generation
      IsoDDE model iterations, substantially reducing near-term financing risk.
    claimRefs: [CI007, CI008, CI009]

  - calloutType: risk
    title: "Revenue quality is pre-commercial: over 97% of partnership value is milestone-contingent"
    body: >
      Only $82.5M in confirmed cash has been received from pharma partnerships; the remaining
      $2.9B+ in potential milestones depends on clinical and regulatory outcomes that may
      take 10-15 years to materialize or may never be triggered. Until Phase I readouts from
      ISM8969 and additional clinical data emerge, Isomorphic Labs' financial model remains
      structurally dependent on capital markets rather than product revenue.
    claimRefs: [CI026, CI040]

  - calloutType: risk
    title: "Alphabet compute subsidy obscures true standalone economics"
    body: >
      As an Alphabet Other Bets subsidiary, Isomorphic Labs likely receives preferential access
      to Google Cloud compute infrastructure at below-market transfer pricing. This subsidy, if
      unwound, would materially increase the true cost of operating the IsoDDE platform and reduce
      reported gross margins. Until intercompany agreements are reviewed, burn rate and capital
      intensity estimates carry significant uncertainty.
    claimRefs: [CI036, CI014, CI024]

