  title: Market Sizing & Macro Analysis
  summary: >-
    OpenAI sells into one of the fastest-scaling software categories ever, but its realistic opportunity is narrower
    than headline AI TAMs because enterprise budgets, governance, and workflow readiness still determine monetizable
    demand.
callouts:
  - type: key-insight
    title: The addressable market is already very large without assuming AGI-scale upside
    body: >-
      Reviewed market sources show enterprise generative AI spend already reached meaningful commercial scale in 2025,
      with OpenAI participating across consumer subscriptions, horizontal copilots, developer APIs, and departmental
      automation.
    claimRefs:
      - C013
      - C014
      - C016
  - type: risk-alert
    title: OpenAI does not capture the whole AI budget pool
    body: >-
      OpenAI benefits from category expansion, but enterprise LLM spend is already fragmenting across Anthropic, Google,
      Microsoft, coding-native tools, and open-source options. Procurement friction and governance still slow
      conversion.
    claimRefs:
      - C016
      - C019
      - C022
