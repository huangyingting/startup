sections:
  - number: '2.1'
    title: Market definition and budget boundaries
    body: >-
      OpenAI is exposed to several overlapping but distinct budget pools: consumer AI subscriptions, horizontal
      enterprise copilots, foundation-model API usage, and departmental automation software. The relevant market is
      therefore not “all AI,” but the subset of knowledge-work, software-development, and workflow budgets where buyers
      are willing to pay either for a branded assistant or for model access embedded in applications.
    claimRefs:
      - C013
      - C014
  - number: '2.2'
    title: Sizing, growth, and category maturity
    body: >-
      The strongest reviewed third-party signal is Menlo Ventures, which pegs enterprise generative AI spend at $37B in
      2025, up from $11.5B in 2024, with $19B already sitting in the application layer and $12.5B in foundation-model
      APIs. IDC provides the broader macro frame, with worldwide AI spend near $235B in 2024 and forecast above $631B by
      2028. OpenAI therefore operates inside a category that is already large enough to support hyperscale
      private-company revenues.
    claimRefs:
      - C014
      - C015
  - number: '2.3'
    title: Buyers, adoption drivers, and monetization routes
    body: >-
      OpenAI's strongest adoption wedge is still ease of use: consumers discover value quickly, developers embed models
      without training one themselves, and enterprises can expand from employee familiarity into governed workspace
      deployments. The business pages show OpenAI is now explicitly selling admin controls, integrations, retention
      choices, and no-training-on-business-data commitments because the monetization bottleneck has moved from
      capability discovery to governed deployment.
    claimRefs:
      - C013
      - C017
  - number: '2.4'
    title: Constraints and market-attractiveness verdict
    body: >-
      The market remains attractive because growth, buyer urgency, and workflow breadth are all real. The constraint is
      not category demand but share durability. Menlo already shows OpenAI losing enterprise LLM share relative to
      Anthropic and Google in some lanes, while privacy and legal disputes make regulated buyers more cautious. Net: the
      market is large and still expanding fast, but OpenAI cannot assume it captures the whole category simply because
      it created the initial demand spike.
    claimRefs:
      - C016
      - C018
      - C019
