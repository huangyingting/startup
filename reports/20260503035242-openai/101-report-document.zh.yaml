              - C073
      - number: '8.3'
        title: 运营与依赖风险
        blocks:
          - type: paragraph
            title: null
            body: >-
              在运营层面，OpenAI
              与融资驱动的算力扩张深度绑定。融资文章与微软协议修订都表明，云、芯片与数据中心伙伴不只是供应商，而是交付经济性与产品发布节奏的核心变量。公司已通过扩大基础设施组合来缓释这一风险，但规模依赖仍是其商业模式的内生特征。
            claimRefs:
              - C070
              - C072
          - type: table
            title: null
            tableRef: T703
            claimRefs:
              - C068
              - C069
