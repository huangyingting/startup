  - number: 8
    title: 风险与监管
    sections:
      - number: '8.1'
        title: 风险总览与承销视角
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 的主要风险之所以特殊，是因为它们同时位于法律、治理、基础设施与公众信任的交叉点。其 downside case
              不是需求突然消失，而是诉讼、隐私冲突、算力依赖或治理摩擦拖慢企业采用、抬升成本结构，或迫使估值压缩。 这也是为什么 OpenAI
              的风控不能只看单点事件，而必须看风险如何跨越产品、法律与基础设施三条链路同时传导。
            claimRefs:
              - C067
              - C068
          - type: callout
            title: 版权与隐私争议仍是一阶风险
            body: 纽约时报诉讼及相关版权争议同时带来法律、产品与信任后果。即便 OpenAI 在关键诉点上胜诉，过程本身也会影响留存、数据政策与监管关注。
            calloutType: risk-alert
            claimRefs:
              - C067
              - C068
              - C069
          - type: table
            title: null
            tableRef: T701
            claimRefs:
              - C067
              - C068
              - C070
              - C073
          - type: figure
            title: null
            figureRef: F701
            claimRefs:
              - C067
              - C068
              - C070
      - number: '8.2'
        title: 监管、法律、安全与隐私敞口
        blocks:
          - type: paragraph
            title: null
            body: >-
              当前最显性的法律风险是围绕训练数据与模型输出展开的版权诉讼及出版商/作者诉讼群。与之紧密相连的是隐私维度：NYT 取证争议迫使 OpenAI 公开解释
              retention、deletion 与 legal hold。美国版权局的 AI 工作也表明，更广泛的政策环境仍在演化，因此 OpenAI
              面临的不仅是个案风险，也是制度性不确定性。
            claimRefs:
              - C067
              - C068
              - C069
          - type: callout
            title: 缓释能力在提升，但并未消除风险
            body: OpenAI 确实加强了治理结构、安全流程与安全/合规姿态，但这些缓释措施只能降低风险，而不能消除风险。
            calloutType: key-insight
            claimRefs:
              - C070
              - C071
              - C072
          - type: table
            title: null
            tableRef: T702
            claimRefs:
