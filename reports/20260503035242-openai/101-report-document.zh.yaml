              - C047
              - C049
      - number: '6.3'
        title: 信任、合规与部署就绪度
        blocks:
          - type: paragraph
            title: null
            body: >-
              安全与隐私页面是关键产品证据，因为它们展示了 OpenAI 如何把信任控制转化为 adoption 促进器。SAML、数据保留控制、数据驻留、SOC 2、ISO
              认证以及默认不使用企业数据训练，都被摆在产品价值主张的核心位置。在企业 AI 中，这些能力决定软件能否从试验进入生产。 反过来看，若 admin
              controls、auditability 或 connector 质量不到位，企业落地就会被卡在试点阶段，因此这部分能力本身就是商业化的前提条件。
            claimRefs:
              - C045
              - C047
