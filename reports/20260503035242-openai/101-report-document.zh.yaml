        title: 具名证明、工作流与引用质量
        blocks:
          - type: paragraph
            title: null
            body: >-
              企业页面与主页展示了 Choco、CyberAgent 等客户案例，也包括 Gradient Labs、Harvey 这类更偏合作伙伴或平台构建者的证明。这些案例说明
              OpenAI 已在软件工程、运营与面向客户的场景中支持真实工作流。但它们都是公司主动挑选的引用，因此更适合作为“已进入生产”的证据，而不是独立的 ROI 或续约证明。
            claimRefs:
              - C056
              - C058
          - type: callout
            title: 留存质量的公开可见性明显落后于采用可见性
            body: 公开材料更清楚地展示了使用和案例，却很少展示续约、流失、NRR 或客户集中度。一旦估值开始依赖“可持续性”而非“新鲜感”，这个缺口就很关键。
