              本报告的建议是 track。OpenAI 在战略上极其重要，但已审阅的 $852B post-money
              估值、对利润率与留存的公开可见性不足，以及仍然显著的系统级风险，使得新增 primary 资金难以高置信度承销。更合理的立场是持续覆盖与严格入场纪律，而不是情绪化追价。
