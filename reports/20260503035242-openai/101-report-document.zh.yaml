        title: 当前规模与商业姿态
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 在 2026 年融资文章中声称其周活用户已超过 9 亿、订阅用户超过 5,000 万、月收入达到 20 亿美元，而且企业收入占比已超过 40%。CNBC
              对融资事件提供了方向性佐证，但公司仍未披露公开市场投资者通常会要求的细项数据。因此，我们对规模方向的判断置信度较高，但对盈利质量的判断只有中等置信度。
