              - C048
      - number: '6.2'
        title: 技术成熟度、架构与依赖
        blocks:
          - type: paragraph
            title: null
            body: >-
              从技术上看，OpenAI 更像是同一模型与算力底座之上的多界面、多 API
              平台。已审阅材料显示其明确支持多模态、工具、容器、集成以及多云基础设施。这种广度增强了产品杠杆，但也意味着产品质量高度依赖模型稳定性、推理成本以及
              connector/admin 深度，而不只是模型本身。 同时，API、ChatGPT 与 agents
              之间的复用还会强化产品学习效应：新能力可以在多个商业表面快速复用，这对发布速度和客户感知价值都很关键。
            claimRefs:
              - C045
              - C046
              - C048
          - type: callout
            title: 信任与部署能力不是附属政策，而是产品要求
            body: 安全控制、数据保留、system cards 与安全治理已成为大客户是否会部署 OpenAI 的核心条件。仅靠技术栈本身并不足以赢单。
            calloutType: risk-alert
            claimRefs:
              - C045
              - C047
              - C049
          - type: table
            title: null
