            title: null
            body: >-
              2026 年的融资极大改变了快照。OpenAI 以 8,520 亿美元投后估值完成 1,220 亿美元承诺资本融资，并同步扩大循环信贷额度。2025 年 10
              月的结构重组把运营主体改为 OpenAI Group PBC，同时让基金会继续掌握治理控制权。这意味着它在不完全放弃使命治理的前提下，获得了异常强的融资能力。
            claimRefs:
