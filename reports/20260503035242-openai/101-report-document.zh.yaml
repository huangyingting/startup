              - C002
          - type: callout
            title: 市场规模已不再是争议焦点，治理与诉讼才是
            body: OpenAI 已明确证明需求存在，但尽调焦点已转向治理韧性、版权与隐私诉讼，以及算力融资能否在不压缩利润的情况下继续复利。
