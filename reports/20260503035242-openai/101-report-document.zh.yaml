        title: 客户结论与集中度风险
        blocks:
          - type: paragraph
            title: null
            body: >-
              综合来看，OpenAI
              在客户采用质量与广度上较强，在参考案例深度上中等，在公开留存透明度上偏弱。客户集中度可能温和，也可能重要；公开记录无法回答这个问题。因此，本章结论是“条件性正面”：客户需求毋庸置疑，但最关键的尽调问题已转向留存、扩张与合同集中度，而不是
              logo 数量。
