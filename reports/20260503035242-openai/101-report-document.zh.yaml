        title: 快照风险与尽调缺口
        blocks:
          - type: paragraph
            title: null
            body: >-
              后续章节的基准判断是：OpenAI
              已无需证明需求存在，而需要证明这种需求是否可持续、是否具备可防守性。当前最重要的快照级风险是治理复杂性、版权/隐私诉讼、对高强度算力扩张的依赖，以及估值本身。最大的剩余尽调缺口则是客户集中度、利润结构、优先权条款与使命治理对未来资本市场灵活性的约束。
