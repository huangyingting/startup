      - number: '7.3'
        title: 留存与扩张的可见性
        blocks:
          - type: paragraph
            title: null
            body: >-
              公开材料对留存的可见性明显弱于对采用的可见性。已审阅来源没有披露 NRR、GRR、续约率，或按 cohort
              拆分的席位扩张数据。因此，当前证据足以支持“客户质量不错”的论点，但不足以在 8,520
              亿美元估值下，以应有置信度承销企业留存的耐久性。消费者流失与付费转化结构也存在同样问题。
