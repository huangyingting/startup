        - >-
          Consumer distribution can keep feeding workplace adoption and lower enterprise
          customer-acquisition friction
        - OpenAI 明确将消费者熟悉程度视为企业楔子
        - 从消费者到企业的薄弱转化的证据将削弱飞轮理论
      - - Anti-thesis
        - 估值已经反映了未来品类领导地位的很大一部分
        - $852B 投后估值与不完全的公开透明度
        - A materially better entry price or secondary liquidity discount would soften this
      - - Anti-thesis
        - >-
          Legal/privacy and compute dependencies can reprice the business even if demand stays
          strong
        - NYT/privacy disputes, unsettled copyright environment, compute-heavy strategy
        - 更清晰的法律先例和更有力的成本杠杆证据将降低这种风险
      - - Anti-thesis
        - Enterprise share is not locked in and can fragment by workflow
        - Menlo shows share pressure from Anthropic/Google plus strong incumbent bundling
        - >-
          Workflow-level win-rate data could prove better defensibility than current evidence
          suggests
