  - number: 7
    title: 客户与留存
    sections:
      - number: '7.1'
        title: 客户质量与采用锚点
        blocks:
          - type: paragraph
            title: null
            body: >-
              对一家私营软件公司而言，OpenAI 的采用广度极不寻常。已审阅材料支持其拥有庞大的消费者触达、可观的订阅用户、超过 500 万的 business
              users，以及一组可见的企业案例。因此，“采用”本身不是问题。真正的问题在于，这些用户中有多少能够转化为持久、可扩张、且高毛利的客户关系。
            claimRefs:
              - C055
              - C056
          - type: callout
            title: 客户证明是真实且广泛的，不只是 logo 堆砌
            body: OpenAI 现在在消费者、SMB、企业与开发者四个表面都展示出有意义的客户证据，企业页面与 business stories 中也给出了具体案例。
            calloutType: key-insight
            claimRefs:
              - C055
              - C056
              - C058
