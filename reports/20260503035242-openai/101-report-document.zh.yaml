            title: null
            body: >-
              OpenAI 现在对外呈现的不再只是研究实验室，而是一家 AI 研究与部署公司。官方页面强调其使命是确保 AGI 造福全人类，而当前产品面覆盖
              ChatGPT、企业工作流、API、Codex 与多模态接口。这一点重要，因为 OpenAI 同时具备消费者产品公司、横向企业平台以及基础模型基础设施供应商三重属性。
            claimRefs:
              - C001
              - C005
          - type: callout
            title: 使命治理与超大规模商业经济体并存
            body: 2025-2026 年的结构重组后，基金会仍保留使命控制权，但 OpenAI 在运营上已经是一家覆盖消费者、企业与开发者的全球 AI 基础设施平台。
