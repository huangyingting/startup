              - C072
      - number: '8.4'
        title: 缓释、止损信号与风险结论
        blocks:
          - type: paragraph
            title: null
            body: >-
              缓释措施是有意义的：更清晰的董事会结构、基金会控制的治理模式、安全委员会、system cards、安全认证，以及明确的企业数据控制。但剩余风险仍属
              significant，因为每个顶级风险都具有系统级后果。投资论点被打破更可能来自不利版权/隐私先例、重大安全/信任事件，或算力强度明显跑赢变现改善。
              换言之，只要法律、隐私、信任与算力四条主线中任意一条明显失稳，投资结论就可能迅速恶化。
