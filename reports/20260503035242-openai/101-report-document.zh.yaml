            body: >-
              Sam Altman 仍是运营重心，但官方结构页明确说明治理权掌握在由 Bret Taylor 领衔、以独立董事为主的董事会手中。微软仍是主云伙伴和大股东，而
              SoftBank、Amazon、NVIDIA 等新一轮大额投资者进一步强化了 OpenAI 的算力与生态杠杆。与 2023 年危机时期相比，治理更清晰，但结构依旧非常规。
