  - number: 3
    title: 市场规模与宏观分析
    sections:
      - number: '3.1'
        title: 市场定义与预算边界
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 所对应的是多个重叠但不同的预算池：消费者 AI 订阅、横向企业 copilots、基础模型 API 调用，以及部门级自动化软件。因此，相关市场不是“全部
              AI”，而是那些愿意为品牌助手或模型能力付费的知识工作、软件开发与工作流预算。
            claimRefs:
              - C013
              - C014
          - type: callout
            title: 即使不假设 AGI 级别上行，市场也已经足够大
            body: 已审阅市场资料显示，企业生成式 AI 支出在 2025 年已进入有意义的商业规模；OpenAI 同时覆盖消费者订阅、横向 copilots、开发者 API 与部门级自动化。
            calloutType: key-insight
            claimRefs:
              - C013
              - C014
              - C016
          - type: table
            title: null
            tableRef: T201
            claimRefs:
              - C013
              - C014
          - type: figure
            title: null
            figureRef: F201
            claimRefs:
              - C013
              - C014
              - C015
      - number: '3.2'
        title: 规模、增长与品类成熟度
        blocks:
          - type: paragraph
            title: null
            body: >-
              最强的第三方信号来自 Menlo Ventures：其估算 2025 年企业生成式 AI 支出达到 370 亿美元，高于 2024 年的 115 亿美元，其中 190
              亿美元已位于应用层，125 亿美元位于基础模型 API。IDC 则提供更宏观的框架：2024 年全球 AI 支出接近 2,350 亿美元，到 2028 年有望超过
              6,310 亿美元。对 OpenAI 而言，这意味着其所在品类已足以支撑超大规模私营公司收入。
            claimRefs:
              - C014
              - C015
          - type: callout
            title: OpenAI 并不会拿走全部 AI 预算池
            body: >-
              OpenAI 受益于品类扩张，但企业 LLM 支出已经分散到 Anthropic、Google、Microsoft、coding
              工具与开源模型。采购与治理摩擦仍会拖慢转化。
            calloutType: risk-alert
            claimRefs:
              - C016
              - C019
              - C022
          - type: table
            title: null
            tableRef: T202
            claimRefs:
              - C013
              - C014
              - C015
          - type: figure
            title: null
            figureRef: F202
            claimRefs:
              - C016
              - C017
              - C018
      - number: '3.3'
        title: 买方、采用驱动与变现路径
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 最强的采用切入口仍是易用性：消费者能快速感知价值，开发者无需自建模型即可嵌入能力，企业则可把员工熟悉度转化为受治理约束的工作区部署。其业务页面之所以突出
              admin controls、retention、SSO 与不使用企业数据训练，是因为当前商业化瓶颈已从“能力是否存在”转向“能否在受控环境下部署”。
            claimRefs:
              - C013
              - C017
          - type: table
            title: null
            tableRef: T203
            claimRefs:
              - C013
              - C016
              - C017
      - number: '3.4'
        title: 约束与市场吸引力结论
        blocks:
          - type: paragraph
            title: null
            body: >-
              该市场依然极具吸引力，因为增长、买方紧迫性与工作流广度都是真实存在的。真正的约束不是品类需求，而是份额的可持续性。Menlo 已显示 OpenAI
              在部分企业场景中的份额正被 Anthropic 与 Google 挤压，而隐私与法律争议也让受监管买家更谨慎。结论是：市场很大且仍在高速扩张，但 OpenAI
              不能因为创造了初始需求就默认自己能吃下全部增量。
            claimRefs:
              - C016
              - C018
              - C019
          - type: table
            title: null
            tableRef: T204
            claimRefs:
              - C013
              - C014
              - C015
              - C016
              - C018
              - C019
  - number: 4
    title: 竞争基准分析
    sections:
      - number: '4.1'
        title: 竞争格局与替代集合
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 已不再只是与“其他模型”竞争。它面对的是 Anthropic、Google 这类模型/平台对手，Microsoft/GitHub 这类工作流
              incumbents，以及开源自托管或内部自建这类替代路径。市场叙事已经从单一前沿竞赛，转向按工作流细分的采购竞争。
            claimRefs:
              - C023
              - C024
          - type: callout
            title: OpenAI 的护城河来自广度与分发，而非无争议的模型领先
            body: OpenAI 拥有最强的消费者流量入口、广泛的企业包装能力以及开发者触达，但第三方企业支出数据表明，能力领先已经变成“按赛道分化”，而非普遍领先。
            calloutType: key-insight
            claimRefs:
              - C023
              - C024
              - C026
          - type: table
            title: null
            tableRef: T301
            claimRefs:
              - C023
              - C024
              - C025
              - C026
          - type: figure
            title: null
            figureRef: F301
            claimRefs:
              - C023
              - C024
              - C025
      - number: '4.2'
        title: 定位、产品广度与包装能力
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 最明显的优势是广度：消费者助手、企业工作区、开发者 API、coding
              工具、多模态接口与智能体工作流都在同一品牌下。这种广度对想要单一战略供应商的买家很有吸引力。但 Microsoft 与 Google 可依附既有 suite 预算分发
              AI，而 Anthropic 在 coding 或偏好 vendor neutrality 的场景中也能拿下高价值工作负载。
            claimRefs:
              - C023
              - C025
          - type: callout
            title: 最危险的竞争对手是工作流原生玩家，而不只是模型原生玩家
            body: >-
              Anthropic 在 coding 与企业 API 份额上施压，Microsoft 借 suite 分发施压，Google 借 Workspace
              与云生态施压，GitHub Copilot 则在开发者席位上拥有天然锚点。
            calloutType: risk-alert
            claimRefs:
              - C024
              - C025
              - C028
          - type: table
            title: null
            tableRef: T302
            claimRefs:
              - C023
              - C024
              - C025
              - C027
          - type: figure
            title: null
            figureRef: F302
            claimRefs:
              - C023
              - C024
              - C028
      - number: '4.3'
        title: 定价、GTM 与切换摩擦
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 的 API 定价高度透明且颗粒化，但企业席位价格仍较不透明。竞争对手则各有优势：Anthropic 以高阶使用层级与灵活企业包装切入，Microsoft 借
              Microsoft 365 add-on 降低采购摩擦，GitHub 以清晰的开发者席位价格建立基准。
              这一点很重要，因为即使功能深度较弱，采购团队也会优先比较那些价格更容易 benchmark 的供应商。
            claimRefs:
              - C026
              - C027
              - C028
          - type: table
            title: null
            tableRef: T303
            claimRefs:
              - C025
              - C027
              - C028
              - C029
      - number: '4.4'
        title: 护城河持续性与竞争结论
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 仍像是前沿 AI
              中最广的商业平台，但护城河已不再是“最好模型赢下一切”。真正的护城河是跨场景分发与资本驱动的产品迭代速度。这种优势是耐久的，但并非牢不可破。最尖锐的威胁来自 API
              份额流失、coding 场景被替代，以及 incumbents 的 bundling。结论是：OpenAI 仍是领导者，但必须在多条赛道同时防守份额。
            claimRefs:
              - C024
              - C026
              - C029
          - type: table
            title: null
            tableRef: T304
            claimRefs:
              - C024
              - C025
              - C026
              - C029
  - number: 5
    title: 财务与单位经济
    sections:
      - number: '5.1'
        title: 收入模型与变现质量
        blocks:
          - type: paragraph
            title: null
            body: >-
              以私营公司标准看，OpenAI 的收入结构已经相当多元。消费者订阅带来直接变现与品牌渗透，Business/Enterprise 席位把工作场景使用转成经常性合同，API
              则提供使用量驱动的基础设施经济性。这种组合降低了单一销售路径的依赖，但公开记录仍不足以说明哪条收入线利润最高、也不足以说明哪条收入线最耐久。
            claimRefs:
              - C033
              - C034
          - type: callout
            title: 收入质量强于多数私营 AI 同业
            body: OpenAI 已不再是 pre-revenue 或试验性平台。其同时拥有消费者订阅、企业席位与按量计费 API，形成多元变现路径。
            calloutType: key-insight
            claimRefs:
              - C033
              - C034
              - C035
          - type: table
            title: null
            tableRef: T401
            claimRefs:
              - C033
              - C034
              - C035
          - type: figure
            title: null
            figureRef: F401
            claimRefs:
              - C033
              - C035
              - C036
      - number: '5.2'
        title: 资本强度与融资姿态
        blocks:
          - type: paragraph
            title: null
            body: >-
              其融资画像即使放在超晚期公司中也极为特殊。已审阅的 2026 年 3 月融资为 OpenAI 带来 1,220
              亿美元承诺资本与更大的循环授信额度。这笔钱不仅是增长资金，更是算力、云灵活性、芯片合作与产品广度的战略弹药。反过来看，在模型效率明显快于需求增速之前，这门生意都可能维持高资本强度。
            claimRefs:
              - C034
              - C036
          - type: callout
            title: 资本强度与估值可能跑在经济性前面
            body: 即便月收入已达 20 亿美元，OpenAI 仍是高度依赖算力投入的业务，而盈利能力、营运资本与融资条款在公开资料中依然不透明。
            calloutType: risk-alert
            claimRefs:
              - C034
              - C036
              - C039
          - type: table
            title: null
            tableRef: T402
            claimRefs:
              - C034
              - C035
          - type: figure
            title: null
            figureRef: F402
            claimRefs:
              - C034
              - C035
              - C039
      - number: '5.3'
        title: 单位经济可见性与盲区
        blocks:
          - type: paragraph
            title: null
            body: >-
              公开资料足以说明 OpenAI
              已形成真实变现并且企业收入占比不低，但仍不足以让投资者有把握地承销单位经济。已审阅材料没有披露毛利率、获客回收期、合同留存或席位扩张。OpenAI
              自身叙事强调效率改善与规模杠杆，但投资人仍需要内部数据来区分“真实经营杠杆”和“资本堆出来的规模”。
            claimRefs:
              - C035
              - C037
          - type: table
            title: null
            tableRef: T403
            claimRefs:
              - C034
              - C036
      - number: '5.4'
        title: 财务结论
        blocks:
          - type: paragraph
            title: null
            body: >-
              相较多数前沿 AI 私营公司，OpenAI 的财务姿态明显更强，因为收入、资本获取能力与定价体系都已经真实存在。但在 8,520
              亿美元估值下，剩余的不确定性更重要。如果企业收入占比继续提升、留存强、推理成本持续下降，商业模式可能逐步呈现基础设施级质量；如果算力强度、 bundling
              压力或价格压缩占上风，则估值重定价风险也会非常直接。
            claimRefs:
              - C034
              - C038
              - C039
          - type: table
            title: null
            tableRef: T404
            claimRefs:
              - C034
              - C036
              - C039
  - number: 6
    title: 产品与技术
    sections:
      - number: '6.1'
        title: 产品平台与工作流范围
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI 的产品表面早已不只是聊天助手。官网与 business 页面显示，其已形成消费者 ChatGPT、企业工作区、开发者 API、Codex 编程工作流与
              workspace agents 的分层组合。这一点重要，因为买家可以从一个表面切入，再向其他表面扩张，而无需更换供应商或模型家族。
            claimRefs:
              - C043
              - C044
          - type: callout
            title: 产品广度已经成为平台优势
            body: OpenAI 在同一模型与算力底座上同时交付模型、应用、企业工作区、API、编码智能体与多模态能力，这种跨表面协同正在成为产品护城河。
            calloutType: key-insight
            claimRefs:
              - C043
              - C044
              - C046
          - type: table
            title: null
            tableRef: T501
