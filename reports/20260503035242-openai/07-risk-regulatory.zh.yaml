sections:
- number: '7.1'
  title: 风险总览与承销视角
  body: OpenAI 的主要风险之所以特殊，是因为它们同时位于法律、治理、基础设施与公众信任的交叉点。其 downside case 不是需求突然消失，而是诉讼、隐私冲突、算力依赖或治理摩擦拖慢企业采用、抬升成本结构，或迫使估值压缩。
    这也是为什么 OpenAI 的风控不能只看单点事件，而必须看风险如何跨越产品、法律与基础设施三条链路同时传导。
  claimRefs:
  - C067
  - C068
- number: '7.2'
  title: 监管、法律、安全与隐私敞口
  body: 当前最显性的法律风险是围绕训练数据与模型输出展开的版权诉讼及出版商/作者诉讼群。与之紧密相连的是隐私维度：NYT 取证争议迫使 OpenAI 公开解释 retention、deletion
    与 legal hold。美国版权局的 AI 工作也表明，更广泛的政策环境仍在演化，因此 OpenAI 面临的不仅是个案风险，也是制度性不确定性。
  claimRefs:
  - C067
  - C068
  - C069
- number: '7.3'
  title: 运营与依赖风险
  body: 在运营层面，OpenAI 与融资驱动的算力扩张深度绑定。融资文章与微软协议修订都表明，云、芯片与数据中心伙伴不只是供应商，而是交付经济性与产品发布节奏的核心变量。公司已通过扩大基础设施组合来缓释这一风险，但规模依赖仍是其商业模式的内生特征。
  claimRefs:
  - C070
  - C072
- number: '7.4'
  title: 缓释、止损信号与风险结论
  body: 缓释措施是有意义的：更清晰的董事会结构、基金会控制的治理模式、安全委员会、system cards、安全认证，以及明确的企业数据控制。但剩余风险仍属 significant，因为每个顶级风险都具有系统级后果。投资论点被打破更可能来自不利版权/隐私先例、重大安全/信任事件，或算力强度明显跑赢变现改善。
    换言之，只要法律、隐私、信任与算力四条主线中任意一条明显失稳，投资结论就可能迅速恶化。
  claimRefs:
  - C071
  - C073
