sections:
- number: '2.1'
  title: 市场定义与预算边界
  body: OpenAI 所对应的是多个重叠但不同的预算池：消费者 AI 订阅、横向企业 copilots、基础模型 API 调用，以及部门级自动化软件。因此，相关市场不是“全部 AI”，而是那些愿意为品牌助手或模型能力付费的知识工作、软件开发与工作流预算。
  claimRefs:
  - C013
  - C014
- number: '2.2'
  title: 规模、增长与品类成熟度
  body: 最强的第三方信号来自 Menlo Ventures：其估算 2025 年企业生成式 AI 支出达到 370 亿美元，高于 2024 年的 115 亿美元，其中 190 亿美元已位于应用层，125
    亿美元位于基础模型 API。IDC 则提供更宏观的框架：2024 年全球 AI 支出接近 2,350 亿美元，到 2028 年有望超过 6,310 亿美元。对 OpenAI 而言，这意味着其所在品类已足以支撑超大规模私营公司收入。
  claimRefs:
  - C014
  - C015
- number: '2.3'
  title: 买方、采用驱动与变现路径
  body: OpenAI 最强的采用切入口仍是易用性：消费者能快速感知价值，开发者无需自建模型即可嵌入能力，企业则可把员工熟悉度转化为受治理约束的工作区部署。其业务页面之所以突出 admin controls、retention、SSO
    与不使用企业数据训练，是因为当前商业化瓶颈已从“能力是否存在”转向“能否在受控环境下部署”。
  claimRefs:
  - C013
  - C017
- number: '2.4'
  title: 约束与市场吸引力结论
  body: 该市场依然极具吸引力，因为增长、买方紧迫性与工作流广度都是真实存在的。真正的约束不是品类需求，而是份额的可持续性。Menlo 已显示 OpenAI 在部分企业场景中的份额正被 Anthropic
    与 Google 挤压，而隐私与法律争议也让受监管买家更谨慎。结论是：市场很大且仍在高速扩张，但 OpenAI 不能因为创造了初始需求就默认自己能吃下全部增量。
  claimRefs:
  - C016
  - C018
  - C019
