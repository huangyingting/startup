evidenceGaps:
  - gap: >-
      Exact liquidation preferences, employee option refresh terms, and any unusual rights in the 2026 financing are not
      disclosed in reviewed sources.
    impact: high
    diligencePath: Request financing documents, preference stack, board consents, and latest cap table.
  - gap: >-
      Reviewed public sources do not provide audited segment margins, customer concentration, or enterprise cohort
      retention.
    impact: high
    diligencePath: >-
      Request management reporting on revenue mix, gross margin by surface, top-customer exposure, and seat
      retention/expansion.
  - gap: >-
      Reviewed sources do not provide a clean OpenAI-specific SAM/SOM split between consumer subscriptions, enterprise
      seats, and direct API monetization.
    impact: medium
    diligencePath: Request internal revenue mix by product family, geography, and channel.
  - gap: Regulated-industry adoption is observable from product positioning but not quantified in reviewed public sources.
    impact: medium
    diligencePath: Request win/loss data and pipeline by healthcare, finance, government, and legal verticals.
  - gap: >-
      Reviewed sources do not provide standardized head-to-head benchmark results on the exact workflows that drive
      OpenAI's enterprise contracts.
    impact: medium
    diligencePath: >-
      Run customer-specific workflow evaluations across OpenAI, Anthropic, Gemini, and Copilot before any major
      deployment decision.
  - gap: >-
      OpenAI public sources do not disclose enterprise discounting or realized seat pricing, limiting precision in
      win-rate underwriting.
    impact: medium
    diligencePath: Request top-deal pricing waterfalls, discount bands, and competitive takeout analysis.
  - gap: No reviewed public source discloses OpenAI gross margin, contribution margin, or product-level profitability.
    impact: high
    diligencePath: Request audited management accounts with revenue and gross margin by consumer, enterprise, and API products.
  - gap: Reviewed public sources do not disclose enterprise ACV, NRR/GRR, customer concentration, or average discounting.
    impact: high
    diligencePath: Request cohort retention, average contract size, top-20 customer concentration, and discount waterfall analysis.
  - gap: Reviewed public sources do not quantify uptime, incident frequency, or reliability by product surface.
    impact: medium
    diligencePath: Request SLA attainment, outage history, and severity metrics for ChatGPT, Enterprise, and API products.
  - gap: >-
      Public evidence on enterprise production depth for workspace agents and Codex is still mostly directional rather
      than cohort-level.
    impact: medium
    diligencePath: Request customer deployment counts, workflow categories, and retention/expansion data for agent products.
  - gap: No reviewed public evidence discloses enterprise retention, expansion, or churn by cohort.
    impact: high
    diligencePath: Request GRR/NRR, renewal, and seat-expansion dashboards for Business and Enterprise customers.
  - gap: Customer concentration and top-account exposure are not available in reviewed public sources.
    impact: high
    diligencePath: Request top-customer revenue concentration, channel concentration, and contract-renewal calendar.
  - gap: >-
      Reviewed sources do not quantify potential litigation reserve size, licensing cost pass-through, or downside
      economics under adverse rulings.
    impact: high
    diligencePath: Obtain legal memo, reserve analysis, and downside model for settlements, injunctions, or licensing requirements.
  - gap: >-
      Public sources do not disclose uptime incidents, major safety events, or regulator escalations in a way that
      allows probability-weighted operational modeling.
    impact: medium
    diligencePath: Request incident history, severity grading, postmortems, and regulator correspondence logs.
  - gap: >-
      Reviewed public evidence is insufficient to build a credible intrinsic-value model with margin, dilution, and
      cash-flow assumptions.
    impact: high
    diligencePath: >-
      Request audited financial model, cap table, preference terms, and scenario assumptions before underwriting price
      targets.
  - gap: >-
      No reviewed public source provides current secondary-market clearing prices or transaction structure for OpenAI
      paper.
    impact: medium
    diligencePath: >-
      Gather secondary market indications, transfer restrictions, and investor-rights details before any position is
      considered.
