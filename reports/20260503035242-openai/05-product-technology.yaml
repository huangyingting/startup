      - - Workspace agents
        - Enterprise teams
        - Workspace agents product page and business page
        - Shared automations that run across tools and company data
        - Moves OpenAI from assistant to workflow orchestrator
        - Need proof of production-scale deployment beyond early case studies
    notes: null
    claimRefs:
      - C043
      - C044
      - C046
  - id: T502
