schemaVersion: startup-diligence-report-v2
artifact: product-technology
slug: openai
runDate: '2026-05-03'
company:
  name: OpenAI
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    OpenAI's product story is no longer just “best model.” It is a layered platform spanning consumer assistant UX,
    enterprise workflow software, and developer infrastructure, with trust, security, and deployment controls
    increasingly acting as product features.
callouts:
  - type: key-insight
    title: Product breadth is now a platform advantage
    body: >-
      OpenAI is shipping models, apps, business workspaces, APIs, coding agents, and multimodal capabilities on a common
      model/compute backbone. That breadth makes cross-surface reinforcement a product moat.
    claimRefs:
      - C043
      - C044
      - C046
  - type: risk-alert
    title: Trust and deployment are product requirements, not side policies
    body: >-
      Security controls, data retention, system cards, and safety governance are now central to whether OpenAI can win
      large deployments. The technology stack alone is not enough.
    claimRefs:
      - C045
      - C047
      - C049
tables:
