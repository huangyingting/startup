        - API pricing and business pages
        - Text, image, audio, realtime, tools, and containerized execution access
        - Granular usage pricing plus broad modality coverage
        - Need channel split and support burden by customer tier
      - - Codex and coding workflows
        - Developers and engineering teams
        - Homepage, business page, GPT-5.5 / Codex references
        - Coding assistance, task delegation, and agentic software workflows
        - Cross-surface integration with enterprise workspace and API stack
