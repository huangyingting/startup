  - id: T503
    title: Technology / operating architecture table
    columns:
      - layer/dependency
      - role
      - evidence
      - risk
      - diligence ask
    rows:
      - - Frontier model layer
        - Core intelligence for ChatGPT, API, Codex, and agents
        - Homepage, GPT-5.5 page, API pricing
        - Model leadership is contestable and expensive
        - Need benchmark and inference-cost trend by model family
      - - Application layer
        - Consumer app, enterprise workspace, and workflow surfaces
        - Homepage and business pages
        - UX quality and workflow depth determine monetization durability
        - Need usage split by product surface
      - - Integration layer
        - Apps and enterprise data connectors
        - Business and Enterprise pages
        - Security, permissions, and IT friction can block rollout
        - Need connector usage and admin-failure metrics
      - - Safety / policy layer
        - System cards, preparedness, policy controls, committees
        - Safety page and principles page
        - Policy failures could slow launches or trigger scrutiny
        - Need launch gating process and incident response metrics
      - - Infrastructure layer
        - Multi-cloud, silicon, and data-center portfolio
        - Funding post and Microsoft partnership page
        - Compute availability and cost remain strategic bottlenecks
        - Need committed capacity, cost curve, and redundancy plan
    notes: null
    claimRefs:
      - C045
      - C047
      - C048
      - C049
  - id: T504
    title: Trust / quality / compliance table
    columns:
      - control/certification
      - status
      - evidence
      - limitation
      - diligence ask
    rows:
      - - No training on business data by default
        - Publicly stated
        - Business page and security/privacy page
        - Statement does not replace contract review
        - Need data-processing terms by product
      - - SAML SSO / admin controls
        - Publicly stated
        - Business and Enterprise pages
        - Feature depth by tier not fully disclosed
        - Need role model and audit-log detail
      - - SOC 2 Type 2
        - Publicly stated
        - Security & privacy page
        - Scope is business/API services, not proof of product safety
        - Need report period and exceptions
      - - ISO/IEC 27001, 27701, 42001
        - Publicly stated
        - Security & privacy page
        - Certifications do not eliminate model misuse risk
        - Need scope boundaries and surveillance findings
      - - HIPAA / GDPR / CCPA support
        - Publicly stated
        - Security & privacy page and business page
        - Support language is not the same as universal customer compliance
        - Need exact covered products, BAAs, and exclusions
    notes: null
    claimRefs:
      - C045
      - C047
