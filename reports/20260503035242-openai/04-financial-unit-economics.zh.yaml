sections:
- number: '4.1'
  title: 收入模型与变现质量
  body: 以私营公司标准看，OpenAI 的收入结构已经相当多元。消费者订阅带来直接变现与品牌渗透，Business/Enterprise 席位把工作场景使用转成经常性合同，API 则提供使用量驱动的基础设施经济性。这种组合降低了单一销售路径的依赖，但公开记录仍不足以说明哪条收入线利润最高、也不足以说明哪条收入线最耐久。
  claimRefs:
  - C033
  - C034
- number: '4.2'
  title: 资本强度与融资姿态
  body: 其融资画像即使放在超晚期公司中也极为特殊。已审阅的 2026 年 3 月融资为 OpenAI 带来 1,220 亿美元承诺资本与更大的循环授信额度。这笔钱不仅是增长资金，更是算力、云灵活性、芯片合作与产品广度的战略弹药。反过来看，在模型效率明显快于需求增速之前，这门生意都可能维持高资本强度。
  claimRefs:
  - C034
  - C036
- number: '4.3'
  title: 单位经济可见性与盲区
  body: 公开资料足以说明 OpenAI 已形成真实变现并且企业收入占比不低，但仍不足以让投资者有把握地承销单位经济。已审阅材料没有披露毛利率、获客回收期、合同留存或席位扩张。OpenAI 自身叙事强调效率改善与规模杠杆，但投资人仍需要内部数据来区分“真实经营杠杆”和“资本堆出来的规模”。
  claimRefs:
  - C035
  - C037
- number: '4.4'
  title: 财务结论
  body: 相较多数前沿 AI 私营公司，OpenAI 的财务姿态明显更强，因为收入、资本获取能力与定价体系都已经真实存在。但在 8,520 亿美元估值下，剩余的不确定性更重要。如果企业收入占比继续提升、留存强、推理成本持续下降，商业模式可能逐步呈现基础设施级质量；如果算力强度、
    bundling 压力或价格压缩占上风，则估值重定价风险也会非常直接。
  claimRefs:
  - C034
  - C038
  - C039
