schemaVersion: startup-diligence-report-v2
artifact: product-technology
slug: openai
runDate: '2026-05-03'
company:
  name: OpenAI
chapter:
  number: 5
  title: 产品与技术
  summary: OpenAI 的产品故事早已不只是“模型最好”。它已经形成覆盖消费者助手、企业工作流软件与开发者基础设施的分层平台，而信任、安全与部署控制正日益成为产品功能本身。
callouts:
- type: key-insight
  title: 产品广度已经成为平台优势
  body: OpenAI 在同一模型与算力底座上同时交付模型、应用、企业工作区、API、编码智能体与多模态能力，这种跨表面协同正在成为产品护城河。
  claimRefs:
  - C043
  - C044
  - C046
- type: risk-alert
  title: 信任与部署能力不是附属政策，而是产品要求
  body: 安全控制、数据保留、system cards 与安全治理已成为大客户是否会部署 OpenAI 的核心条件。仅靠技术栈本身并不足以赢单。
  claimRefs:
  - C045
  - C047
  - C049
tables:
- id: T501
  title: 产品模块 / 资产矩阵
  columns:
  - module
  - primary user
  - availability evidence
  - core capability
  - differentiation
  - diligence gap
  rows:
  - - ChatGPT consumer app
    - Individual user
    - 主页、定价页面、融资帖子
    - 具有搜索、记忆、图像、语音和深度研究功能的通用助手
    - 无与伦比的直接消费者分布和习惯循环
    - 需要计划级别的保留和使用强度
  - - ChatGPT Business / Enterprise
    - 知识工作者和管理员
    - Business and Enterprise pages
    - 具有集成、管理控制、分析和企业支持的受管工作区
    - 将熟悉的助理用户体验连接到企业控件
    - 需要按工作流程和更新数据进行部署深度
  - - API platform
    - 开发者和AI产品团队
    - API定价和业务页面
    - 文本、图像、音频、实时、工具和容器化执行访问
    - 精细的使用定价加上广泛的模式覆盖
    - 需要按客户层划分渠道和支持负担
  - - Codex and coding workflows
    - 开发人员和工程团队
    - 主页、商业页面、GPT-5.5 / Codex 参考文献
    - 编码协助、任务委派和代理软件工作流程
    - 与企业工作区和 API 堆栈的跨表面集成
    - 需要持续编码市场份额的直接证据
  - - Workspace agents
    - Enterprise teams
    - Workspace 代理产品页面和业务页面
    - 跨工具和公司数据运行的共享自动化
    - 将 OpenAI 从助手转变为工作流程协调器
    - 需要超出早期案例研究的生产规模部署证明
  notes: null
  claimRefs:
  - C043
  - C044
  - C046
- id: T502
  title: 工作流 / 用例表
