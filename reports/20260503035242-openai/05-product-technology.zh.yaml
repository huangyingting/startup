- id: T503
  title: 技术 / 运营架构表
  columns:
  - layer/dependency
  - role
  - evidence
  - risk
  - diligence ask
  rows:
  - - Frontier model layer
    - ChatGPT、API、Codex 和代理的核心智能
    - 主页、GPT-5.5 页面、API 定价
    - 模范领导力是有争议的且昂贵的
    - 需要模型系列的基准和推理成本趋势
  - - Application layer
    - 消费者应用程序、企业工作区和工作流程界面
    - 主页和企业页面
    - 用户体验质量和工作流程深度决定货币化的持久性
    - 需要按产品表面划分使用量
  - - Integration layer
    - 应用程序和企业数据连接器
    - Business and Enterprise pages
    - 安全、权限和 IT 摩擦可能会阻碍部署
    - 需要连接器使用情况和管理失败指标
  - - Safety / policy layer
    - 系统卡、准备、政策控制、委员会
    - 安全页面和原则页面
    - Policy failures could slow launches or trigger scrutiny
    - 需要启动门控流程和事件响应指标
  - - Infrastructure layer
    - 多云、芯片和数据中心产品组合
    - 资助帖子和 Microsoft 合作伙伴页面
    - 计算可用性和成本仍然是战略瓶颈
    - 需要承诺容量、成本曲线和冗余计划
  notes: null
  claimRefs:
  - C045
  - C047
  - C048
  - C049
- id: T504
  title: 信任 / 质量 / 合规表
  columns:
  - control/certification
  - status
  - evidence
  - limitation
  - diligence ask
  rows:
  - - 默认不对业务数据进行训练
    - Publicly stated
    - 业务页面和安全/隐私页面
    - Statement does not replace contract review
    - 需要按产品分类的数据处理条款
  - - SAML SSO/管理控制
    - Publicly stated
    - Business and Enterprise pages
    - Feature depth by tier not fully disclosed
    - 需要角色模型和审核日志详细信息
  - - SOC 2 Type 2
    - Publicly stated
    - Security & privacy page
    - 范围是业务/API服务，而不是产品安全证明
    - 需要报告期限和例外情况
  - - ISO/IEC 27001, 27701, 42001
    - Publicly stated
    - Security & privacy page
    - 认证并不能消除模型误用风险
    - 需要范围边界和监测结果
  - - HIPAA / GDPR / CCPA support
    - Publicly stated
    - 安全和隐私页面和业务页面
    - 支持语言与通用客户合规性不同
    - 需要准确的承保产品、BAA 和排除项
  notes: null
  claimRefs:
  - C045
  - C047
