sections:
  - number: '3.1'
    title: Competitive landscape and substitute set
    body: >-
      OpenAI no longer competes only with “other models.” It faces direct model-platform rivals such as Anthropic and
      Google, workflow incumbents such as Microsoft/GitHub, and substitute routes such as self-hosted open models or
      internal builds. The market has shifted from a single-frontier-race narrative to a workflow-by-workflow buying
      contest.
    claimRefs:
      - C023
      - C024
  - number: '3.2'
    title: Positioning, product breadth, and packaging
    body: >-
      OpenAI's clearest advantage is breadth: consumer assistant, enterprise workspace, developer API, coding tools,
      multimodal endpoints, and agent workflows all sit under one brand. That breadth matters because many buyers want
      one strategic vendor. However, Microsoft and Google can attach AI to pre-existing suite spend, while Anthropic can
      win narrower but high-value workloads where coding quality or vendor neutrality matter more than consumer
      distribution.
    claimRefs:
      - C023
      - C025
  - number: '3.3'
    title: Pricing, GTM, and switching friction
    body: >-
      OpenAI's API pricing is explicit and sophisticated, with flagship models, cached-input discounts, and enterprise
      overlays. Seat-based enterprise packaging is broader than many peers, but public enterprise pricing remains
      custom. Competitors exploit different GTM advantages: Anthropic with premium usage tiers and flexible enterprise
      packaging, Microsoft with add-on pricing inside Microsoft 365, and GitHub with highly legible developer-seat
      economics. That asymmetry matters because procurement teams compare OpenAI against vendors whose pricing is
      simpler to benchmark even when product depth is lower.
    claimRefs:
      - C026
      - C027
      - C028
  - number: '3.4'
    title: Moat durability and competitive verdict
    body: >-
      OpenAI still looks like the broadest commercial platform in frontier AI, but the moat is no longer “best model
      wins everything.” The real moat is cross-surface distribution plus capital-funded product velocity. That is
      durable, but not impregnable. The sharpest threats are API-share erosion, coding-specific displacement, and
      incumbent bundling. Net: OpenAI remains a leader, but one whose share must be actively defended in multiple lanes
      at once.
    claimRefs:
      - C024
      - C026
      - C029
