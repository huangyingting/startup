schemaVersion: startup-diligence-report-v2
artifact: company-snapshot
slug: openai
runDate: '2026-05-03'
company:
  name: OpenAI
chapter:
  number: 1
  title: Startup Introduction & Company Snapshot
  summary: >-
    OpenAI is the category-defining frontier AI platform, but its investability now hinges less on product-market fit
    than on governance durability, legal exposure, and whether an $852B valuation still leaves room for venture-style
    returns.
startupIntroduction:
  summary: >-
    OpenAI is an AI research and deployment company that now combines a mission-governed foundation with a
    public-benefit-corporation operating arm. Its consumer, enterprise, and developer products create a powerful
    flywheel between adoption, compute scale, and monetization.
  foundedDate: '2015-12-08'
  foundedYear: 2015
  founders:
    - name: Sam Altman
      role: Co-founder and CEO
      background: >-
        Co-founder and CEO; former Y Combinator president and the primary public steward of OpenAI's commercialization
        and governance reset.
      claimRefs:
        - C001
        - C004
    - name: Greg Brockman
      role: Co-founder and President
      background: Co-founder and long-time technical/operating leader; central to OpenAI's product and engineering scale-up.
      claimRefs:
        - C004
    - name: Ilya Sutskever
      role: Co-founder; former Chief Scientist
      background: Co-founder associated with the research-led period of OpenAI and its early frontier-model credibility.
      claimRefs:
        - C004
    - name: Wojciech Zaremba
      role: Co-founder
      background: Co-founder associated with OpenAI's early research identity.
      claimRefs:
        - C004
  foundingLocation: San Francisco, California, U.S.
  headquarters: San Francisco, California, U.S.
  website: https://openai.com/
  productSummary: >-
    OpenAI sells consumer AI via ChatGPT, enterprise productivity/agent workflows via ChatGPT Business and Enterprise,
    and developer infrastructure via API access, Codex, and multimodal model endpoints.
  customerFocus: Consumers, enterprise knowledge workers, developers, and software companies embedding foundation-model APIs.
  businessModel: Subscription, enterprise seat licenses, usage-based API pricing, and emerging advertising/agent monetization.
  stage: Late-stage private frontier AI platform
  fundingStatus: >-
    Privately held; latest reviewed financing closed on 2026-03-31 at an $852B post-money valuation with $122B of
    committed capital.
  claimRefs:
    - C001
    - C002
    - C003
    - C005
callouts:
  - type: key-insight
    title: Mission-governed structure now coexists with very large-scale commercial economics
    body: >-
      The 2025-2026 structure reset keeps mission control at the foundation level, but OpenAI now behaves operationally
      like a global AI infrastructure platform with consumer, enterprise, and developer monetization.
    claimRefs:
      - C001
      - C002
      - C003
  - type: risk-alert
    title: Scale is no longer the main debate; governance and litigation are
    body: >-
      OpenAI has clear commercial traction, but the underwriting debate has shifted toward governance durability,
      copyright/privacy litigation, and whether compute financing can compound without margin compression.
    claimRefs:
      - C002
      - C008
      - C010
