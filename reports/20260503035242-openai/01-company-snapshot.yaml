sections:
  - number: '1.1'
    title: Identity, mission, and product context
    body: >-
      OpenAI now presents itself as an AI research and deployment company, not just a lab. The official company pages
      frame the mission as ensuring AGI benefits all of humanity, while the current product surface spans ChatGPT,
      enterprise workflows, API access, Codex, and multimodal endpoints. That combination matters because OpenAI is
      simultaneously a consumer product company, a horizontal enterprise platform, and a foundation-model infrastructure
      vendor.
    claimRefs:
      - C001
      - C005
  - number: '1.2'
    title: Funding, governance, and scale signals
    body: >-
      The reviewed 2026 financing materially changes the snapshot. OpenAI closed $122B of committed capital at an $852B
      post-money valuation, while also expanding a revolving credit facility. The October 2025 structure reset turned
      the operating arm into OpenAI Group PBC, with the OpenAI Foundation retaining governance control. This gives
      OpenAI unusual access to capital without fully abandoning mission control.
    claimRefs:
      - C001
      - C002
  - number: '1.3'
    title: Leadership and stakeholder map
    body: >-
      Sam Altman remains the operating center of gravity, but the official structure page makes clear that governance
      now sits with a board chaired by Bret Taylor and populated largely by independent directors. Microsoft remains
      both a primary cloud partner and a major shareholder, while newer scale-capital backers such as SoftBank, Amazon,
      and NVIDIA deepen OpenAI's compute and ecosystem leverage. Governance is more legible than during the 2023 crisis,
      but still structurally atypical.
    claimRefs:
      - C001
      - C003
      - C004
  - number: '1.4'
    title: Current scale and commercial posture
    body: >-
      OpenAI's own 2026 financing post claims more than 900M weekly active users, over 50M subscribers, $2B of monthly
      revenue, and enterprise revenue already above 40% of the total. Those claims are directionally corroborated by
      CNBC on the funding event, but the company still does not provide the line-item disclosures a public-market
      investor would expect. The snapshot is therefore high-conviction on scale direction and only medium-conviction on
      quality of earnings.
    claimRefs:
      - C002
      - C007
  - number: '1.5'
    title: Snapshot risks and diligence gaps
    body: >-
      For later chapters, the ground-truth takeaway is that OpenAI no longer needs to prove demand; it needs to prove
      durability and defendability. The material snapshot risks are governance complexity, copyright/privacy litigation,
      dependence on financed compute expansion, and valuation. The biggest remaining diligence gaps are customer
      concentration, margin structure, exact liquidation preferences, and whether mission governance will constrain
      future capital markets flexibility.
    claimRefs:
      - C003
      - C008
      - C010
