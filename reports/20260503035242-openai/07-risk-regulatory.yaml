sections:
  - number: '7.1'
    title: Risk overview and underwriting view
    body: >-
      OpenAI's principal risks are unusual because they sit at the intersection of law, governance, infrastructure, and
      public trust. The downside case is not demand collapse; it is that litigation, privacy conflict, compute
      dependence, or governance friction could slow enterprise adoption, raise cost structure, or force valuation
      compression. That is why underwriting OpenAI requires looking at risk transmission across product, legal, and
      infrastructure channels rather than treating each issue as isolated.
    claimRefs:
      - C067
      - C068
  - number: '7.2'
    title: Regulatory, legal, security, and privacy exposure
    body: >-
      The most visible legal risk is the copyright and publisher-author litigation complex around training data and
      model outputs. Closely related is the privacy dimension, where the NYT discovery fight pushed OpenAI into public
      explanations of retention, deletion, and legal holds. The Copyright Office's AI initiative reinforces that the
      broader policy environment is still moving, meaning OpenAI faces both case-by-case and systemic legal uncertainty.
    claimRefs:
      - C067
      - C068
      - C069
  - number: '7.3'
    title: Operational and dependency risk
    body: >-
      Operationally, OpenAI is tied to a financed compute build-out. The funding post and Microsoft amendment make clear
      that cloud, chips, and data-center partners are not just vendors; they are central to delivery economics and
      launch cadence. The company has responded by broadening its infrastructure portfolio, but scale dependence remains
      intrinsic to the model.
    claimRefs:
      - C070
      - C072
  - number: '7.4'
    title: Mitigations, stop-loss signals, and risk verdict
    body: >-
      Mitigations are meaningful: stronger board structure, a foundation-controlled governance model, safety committees,
      system cards, security certifications, and explicit business-data controls. But the residual risk remains
      significant because each top risk has system-wide consequences. A thesis-break would likely come from adverse
      copyright/privacy precedent, a major safety/trust event, or evidence that compute intensity is outrunning
      monetization gains. Put differently, if any one of the four main lines—legal, privacy, trust, or
      compute—deteriorates materially, the investment posture can worsen quickly.
    claimRefs:
      - C071
      - C073
