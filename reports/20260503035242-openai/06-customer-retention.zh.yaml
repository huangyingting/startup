sections:
- number: '6.1'
  title: 客户质量与采用锚点
  body: 对一家私营软件公司而言，OpenAI 的采用广度极不寻常。已审阅材料支持其拥有庞大的消费者触达、可观的订阅用户、超过 500 万的 business users，以及一组可见的企业案例。因此，“采用”本身不是问题。真正的问题在于，这些用户中有多少能够转化为持久、可扩张、且高毛利的客户关系。
  claimRefs:
  - C055
  - C056
- number: '6.2'
  title: 具名证明、工作流与引用质量
  body: 企业页面与主页展示了 Choco、CyberAgent 等客户案例，也包括 Gradient Labs、Harvey 这类更偏合作伙伴或平台构建者的证明。这些案例说明 OpenAI 已在软件工程、运营与面向客户的场景中支持真实工作流。但它们都是公司主动挑选的引用，因此更适合作为“已进入生产”的证据，而不是独立的
    ROI 或续约证明。
  claimRefs:
  - C056
  - C058
- number: '6.3'
  title: 留存与扩张的可见性
  body: 公开材料对留存的可见性明显弱于对采用的可见性。已审阅来源没有披露 NRR、GRR、续约率，或按 cohort 拆分的席位扩张数据。因此，当前证据足以支持“客户质量不错”的论点，但不足以在
    8,520 亿美元估值下，以应有置信度承销企业留存的耐久性。消费者流失与付费转化结构也存在同样问题。
  claimRefs:
  - C057
  - C059
- number: '6.4'
  title: 客户结论与集中度风险
  body: 综合来看，OpenAI 在客户采用质量与广度上较强，在参考案例深度上中等，在公开留存透明度上偏弱。客户集中度可能温和，也可能重要；公开记录无法回答这个问题。因此，本章结论是“条件性正面”：客户需求毋庸置疑，但最关键的尽调问题已转向留存、扩张与合同集中度，而不是
    logo 数量。
  claimRefs:
  - C060
  - C061
