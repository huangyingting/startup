  - number: 4
    title: Competitive Benchmarking
    sections:
      - number: '4.1'
        title: Competitive landscape and substitute set
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI no longer competes only with “other models.” It faces direct model-platform
              rivals such as Anthropic and Google, workflow incumbents such as Microsoft/GitHub, and
              substitute routes such as self-hosted open models or internal builds. The market has
              shifted from a single-frontier-race narrative to a workflow-by-workflow buying
              contest.
            claimRefs:
              - C023
              - C024
          - type: callout
            title: OpenAI's moat is breadth plus distribution, not uncontested model leadership
            body: >-
              OpenAI benefits from the strongest consumer funnel, broad enterprise packaging, and
              developer reach. But third-party enterprise-spend data shows that capability
              leadership has become lane-specific rather than universal.
            calloutType: key-insight
            claimRefs:
              - C023
              - C024
              - C026
          - type: table
            title: null
            tableRef: T301
            claimRefs:
