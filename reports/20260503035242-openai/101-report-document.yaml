  - number: 3
    title: Market Sizing & Macro Analysis
    sections:
      - number: '3.1'
        title: Market definition and budget boundaries
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI is exposed to several overlapping but distinct budget pools: consumer AI
              subscriptions, horizontal enterprise copilots, foundation-model API usage, and
              departmental automation software. The relevant market is therefore not “all AI,” but
              the subset of knowledge-work, software-development, and workflow budgets where buyers
              are willing to pay either for a branded assistant or for model access embedded in
              applications.
            claimRefs:
              - C013
              - C014
          - type: callout
            title: The addressable market is already very large without assuming AGI-scale upside
            body: >-
              Reviewed market sources show enterprise generative AI spend already reached meaningful
              commercial scale in 2025, with OpenAI participating across consumer subscriptions,
              horizontal copilots, developer APIs, and departmental automation.
            calloutType: key-insight
            claimRefs:
              - C013
              - C014
              - C016
          - type: table
            title: null
            tableRef: T201
            claimRefs:
