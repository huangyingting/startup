              - C014
              - C015
      - number: '3.2'
        title: Sizing, growth, and category maturity
        blocks:
          - type: paragraph
            title: null
            body: >-
              The strongest reviewed third-party signal is Menlo Ventures, which pegs enterprise
              generative AI spend at $37B in 2025, up from $11.5B in 2024, with $19B already sitting
              in the application layer and $12.5B in foundation-model APIs. IDC provides the broader
              macro frame, with worldwide AI spend near $235B in 2024 and forecast above $631B by
              2028. OpenAI therefore operates inside a category that is already large enough to
              support hyperscale private-company revenues.
            claimRefs:
              - C014
              - C015
          - type: callout
            title: OpenAI does not capture the whole AI budget pool
            body: >-
              OpenAI benefits from category expansion, but enterprise LLM spend is already
              fragmenting across Anthropic, Google, Microsoft, coding-native tools, and open-source
              options. Procurement friction and governance still slow conversion.
            calloutType: risk-alert
            claimRefs:
              - C016
              - C019
              - C022
          - type: table
            title: null
            tableRef: T202
            claimRefs:
              - C013
              - C014
              - C015
          - type: figure
            title: null
            figureRef: F202
            claimRefs:
              - C016
              - C017
              - C018
      - number: '3.3'
        title: Buyers, adoption drivers, and monetization routes
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI's strongest adoption wedge is still ease of use: consumers discover value
              quickly, developers embed models without training one themselves, and enterprises can
              expand from employee familiarity into governed workspace deployments. The business
              pages show OpenAI is now explicitly selling admin controls, integrations, retention
              choices, and no-training-on-business-data commitments because the monetization
              bottleneck has moved from capability discovery to governed deployment.
            claimRefs:
              - C013
              - C017
          - type: table
            title: null
            tableRef: T203
            claimRefs:
              - C013
              - C016
              - C017
      - number: '3.4'
        title: Constraints and market-attractiveness verdict
        blocks:
          - type: paragraph
            title: null
            body: >-
              The market remains attractive because growth, buyer urgency, and workflow breadth are
              all real. The constraint is not category demand but share durability. Menlo already
              shows OpenAI losing enterprise LLM share relative to Anthropic and Google in some
              lanes, while privacy and legal disputes make regulated buyers more cautious. Net: the
              market is large and still expanding fast, but OpenAI cannot assume it captures the
              whole category simply because it created the initial demand spike.
            claimRefs:
              - C016
              - C018
              - C019
          - type: table
            title: null
            tableRef: T204
            claimRefs:
