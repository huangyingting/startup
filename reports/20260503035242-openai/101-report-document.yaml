  - number: 2
    title: Startup Introduction & Company Snapshot
    sections:
      - number: '2.1'
        title: Identity, mission, and product context
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI now presents itself as an AI research and deployment company, not just a lab.
              The official company pages frame the mission as ensuring AGI benefits all of humanity,
              while the current product surface spans ChatGPT, enterprise workflows, API access,
              Codex, and multimodal endpoints. That combination matters because OpenAI is
              simultaneously a consumer product company, a horizontal enterprise platform, and a
              foundation-model infrastructure vendor.
            claimRefs:
              - C001
              - C005
          - type: callout
            title: Mission-governed structure now coexists with very large-scale commercial economics
            body: >-
              The 2025-2026 structure reset keeps mission control at the foundation level, but
              OpenAI now behaves operationally like a global AI infrastructure platform with
              consumer, enterprise, and developer monetization.
