    title: 建议摘要表
    columns:
      - dimension
      - assessment
      - evidence
      - decision implication
    rows:
      - - Recommendation
        - track
        - Scale is exceptional but valuation is stretched
        - Maintain coverage; avoid assuming upside without better entry terms
      - - Confidence
        - medium
        - 许多战略优势是明确的，但核心财务和法律仍然未知
