sections:
  - number: '8.1'
    title: 投资论点、反向论点与建议
    body: >-
      投资论点并不复杂：OpenAI 是全球最重要的私营科技资产之一，既有真实产品广度，也有真实变现与品类塑造能力。反向论点同样直接：在 8,520
      亿美元估值下，价格已经预支了很大一部分战略重要性，而关键经济变量与法律变量仍不透明。因此，本报告给出的建议是 track，而非 buy。
    claimRefs:
      - C079
      - C080
  - number: '8.2'
    title: 估值框架与情景
    body: >-
      单纯用收入倍数框架并不足够，因为 OpenAI
      同时是消费者平台、企业软件公司、开发者基础设施供应商，以及高算力投入的前沿实验室。更合理的公开立场应是情景分析，而不是伪精确。在牛市情景下，企业留存强、单位算力成本下降、平台地位巩固；在基准情景下，基本面依然强，但份额分散与估值饱和限制上行；在熊市情景下，法律或算力冲击会比收入增长更快地重估公司。
    claimRefs:
      - C081
      - C082
  - number: '8.3'
    title: 退出就绪度与入场纪律
    body: >-
      规模与品牌使 IPO 成为 plausible 路径，但并不等于现在就已具备可投资性。公司仍需在利润率、业务分部、法律敞口等方面提供更强披露，才更接近正常公共市场资产。对新投资者而言，二级市场折价流动性或更优结构化条款，远比在
      headline mark 追逐 primary 更有吸引力。即使要建仓，也应反映“公司优秀”与“价格合理”是两回事。
    claimRefs:
      - C080
      - C083
  - number: '8.4'
    title: 最终结论与 thesis-break 触发器
    body: >-
      OpenAI 值得持续高强度覆盖，因为它确实可能成为这个时代定义性的 AI 平台。但 stretched valuation、不完整的经济性可见度以及系统级风险，仍不足以支持 outright buy。最清晰的
      thesis-break 触发器是：版权/隐私结果恶化、重大信任/安全事故，或企业留存明显弱于当前采用信号。在这些风险尚未收敛、或入场条件尚未改善之前，纪律性的立场应是 track。
    claimRefs:
      - C084
      - C085
