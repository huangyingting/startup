        - medium
        - 收入和使用情况可见；利润、保留和融资条款不
        - Do not underwrite with false precision
    notes: null
    claimRefs:
      - C079
      - C080
      - C081
  - id: T802
    title: 正反投资论点表
    columns:
      - side
      - argument
      - evidence
      - what would change the view
    rows:
      - - Thesis
        - OpenAI拥有最广泛的前沿人工智能商业平台，涵盖消费者、企业和开发者层面
        - 规模索赔、业务页面、API 广度、企业组合和资本准入
        - 持续的企业保留加上更好的利润率披露将强化这一点
      - - Thesis
        - 消费者分销可以持续促进工作场所采用并降低企业客户获取摩擦
        - OpenAI 明确将消费者熟悉程度视为企业楔子
        - 从消费者到企业的薄弱转化的证据将削弱飞轮理论
      - - Anti-thesis
        - 估值已经反映了未来品类领导地位的很大一部分
        - $852B 投后估值与不完全的公开透明度
        - A materially better entry price or secondary liquidity discount would soften this
      - - Anti-thesis
        - 即使需求保持强劲，法律/隐私和计算依赖性也可能会重新定价业务
        - NYT/privacy disputes, unsettled copyright environment, compute-heavy strategy
        - 更清晰的法律先例和更有力的成本杠杆证据将降低这种风险
      - - Anti-thesis
        - Enterprise share is not locked in and can fragment by workflow
        - Menlo shows share pressure from Anthropic/Google plus strong incumbent bundling
        - 工作流程级别的胜率数据可能比当前证据表明的更具防御性
    notes: null
    claimRefs:
      - C079
      - C082
      - C083
  - id: T803
    title: 牛/基/熊情景表
    columns:
      - scenario
      - assumption
      - output/range
      - evidence basis
      - implication
    rows:
      - - Bull
        - 企业保留率很高，API 经济效益得到改善，OpenAI 保持平台领先地位
        - 估值仍可在非常大的基础上复合
        - 需要比以往更好的保证金杠杆和持久份额
        - Upside exists but likely looks more like infrastructure compounding than classic VC multiple expansion
      - - Base
        - OpenAI 保持快速增长，但份额碎片和估值增长慢于基本面
        - 仅在严格进入或二次折扣的情况下才可接受退货
        - 与当前的实力证据以及日益激烈的竞争相一致
        - Best-fit case for continued tracking
      - - Bear
        - 版权/隐私结果恶化，计算成本居高不下，企业定价压缩
        - 估值倍数和私人市场胃口均萎缩
        - 受到当前法律和股权竞争不确定性的支持
        - Downside can be severe despite product quality
      - - Comparable lens
        - 私有前沿人工智能平台和超大规模软件基础设施
        - No clean public comp set matches OpenAI exactly
        - 证据来自商业模式的形状，而不是严格的同行数学
        - 支持使用范围和记分卡而不是错误精度倍数
      - - Entry discipline
        - Fresh primary capital at headline marks is unattractive without superior terms
        - Valuation and disclosure gap dominate
        - Current public evidence set
        - Seek better terms, secondary discounts, or wait for more transparency
    notes: null
    claimRefs:
      - C080
      - C081
      - C084
  - id: T804
    title: 退出路径 / 仓位表
    columns:
      - path
      - requirement
      - current evidence
      - gap
      - diligence ask
    rows:
      - - IPO / public listing
        - Audited disclosures, governance stability, legal clarity
        - Scale and brand support plausibility
        - 利润率、分部报告和法律悬而未决的问题仍然不够明显
        - 请求 IPO 准备路线图和审计的细分指标
      - - Strategic M&A
        - Regulatory feasibility and buyer concentration
        - Very unlikely at current scale
        - Antitrust and mission-governance issues make this low-probability
        - Treat as non-core exit path
      - - Secondary liquidity
        - Access to discounted paper or structured transactions
        - Most realistic way to improve entry discipline
        - Need visibility into secondary clearing levels and rights
        - Request current secondary market terms
      - - Position sizing
        - High strategic quality but limited pricing cushion
        - Supports small tracking exposure at most
        - Need better downside asymmetry before larger position
        - 定义任何资本部署的估值和法律触发因素
      - - Thesis-break trigger
        - 不利判例、重大信托事件或企业耐久性较弱
        - All remain plausible and insufficiently quantified
        - Need monitorable thresholds
        - Set stop-loss criteria before investing
    notes: null
    claimRefs:
      - C079
      - C081
      - C085
