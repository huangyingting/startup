company:
  name: OpenAI
chapter:
  number: 8
  title: 投资与估值
  summary: OpenAI 是高质量的战略资产，但在 8,520 亿美元的私营估值下，投资结论更多取决于入场纪律与 downside 不对称，而不是对公司本身的赞叹。
callouts:
  - type: final-recommendation
    title: 投资建议：track
    body: OpenAI 在战略上极其重要，但以当前已审阅估值作为新增 primary 投资，很难严谨承销。它值得持续覆盖，但不值得“任何价格都投”。
    claimRefs:
      - C079
      - C080
      - C084
  - type: risk-alert
    title: 估值才是主要门槛，而不是公司质量
    body: 这家公司拥有真实规模、强产品广度与耐久战略意义。真正的问题在于，在如此高的估值、且缺乏公开市场级透明度的前提下，新投资者是否还能获得 VC 风格上行。
    claimRefs:
      - C080
      - C081
      - C085
tables:
