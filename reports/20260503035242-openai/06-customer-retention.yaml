sections:
  - number: '6.1'
    title: Customer quality and adoption anchors
    body: >-
      OpenAI has unusually strong adoption breadth for a private software company. The reviewed materials support mass
      consumer reach, a large subscriber base, over 5M business users, and a visible set of enterprise examples. The
      adoption signal is therefore real. The question is no longer whether customers use OpenAI, but how many of those
      users convert into durable, expanding, high-margin relationships.
    claimRefs:
      - C055
      - C056
  - number: '6.2'
    title: Named proof, workflows, and reference quality
    body: >-
      The enterprise pages and homepage showcase customers such as Choco and CyberAgent, plus partner-style stories such
      as Gradient Labs and Harvey. These references show OpenAI is supporting real workflows in software engineering,
      operations, and customer-facing environments. However, they are curated references chosen by the company, so they
      are best used as evidence of production use rather than as independent proof of ROI or renewal durability.
    claimRefs:
      - C056
      - C058
  - number: '6.3'
    title: Retention and expansion visibility
    body: >-
      Public visibility into retention is far weaker than visibility into adoption. The reviewed sources do not disclose
      NRR, GRR, renewal rates, or seat expansion by cohort. That means the current evidence base is enough to support a
      customer-quality argument, but not enough to underwrite enterprise durability with the confidence expected at an
      $852B valuation. The same issue applies to consumer churn and paid conversion mix.
    claimRefs:
      - C057
      - C059
  - number: '6.4'
    title: Customer verdict and concentration risk
    body: >-
      Net, OpenAI looks strong on adoption quality and breadth, medium on reference depth, and low on public retention
      transparency. Customer concentration could be benign or material; the public record does not let us know. That
      makes the customer chapter a conditional positive: customer demand is obvious, but the most valuable diligence
      questions now sit in retention, expansion, and contract concentration rather than logo count.
    claimRefs:
      - C060
      - C061
