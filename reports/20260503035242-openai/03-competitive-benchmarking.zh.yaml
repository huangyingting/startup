  - C027
  - C028
  - C029
- id: T304
  title: 护城河与竞争风险登记表
  columns:
  - risk
  - why it matters
  - current evidence
  - mitigant or diligence ask
  rows:
  - - Enterprise API share erosion
    - OpenAI 可以快速增长，但仍然会失去最有价值的开发人员工作负载
    - Menlo estimates OpenAI fell to 27% of enterprise LLM spend in 2025
    - 需要 2026 个直接 API 共享以及按工作流程划分的赢/输原因
  - - Coding specialization elsewhere
    - 编码是最大的部门人工智能预算池
    - Menlo 表示 Anthropic 主导着编码份额，GitHub 保留了强大的席位分配
    - 跟踪 Codex 采用情况、存储库深度使用情况以及竞争替代情况
  - - Suite-native bundling by incumbents
    - 微软和谷歌可以通过预先存在的席位关系来引导人工智能
    - Copilot 是一个 Microsoft 365 附加组件；双子座位于工作空间和云中
    - 需要有关人工智能捆绑时的更新和替代的证据
  - - Open-source substitution
    - Some buyers may self-host for cost or sovereignty
    - Menlo 显示开源份额仍然较小但持续存在
    - 需要将每任务成本与自托管堆栈进行比较
  - - 企业定价不透明
    - 如果采购无法明确衡量投资回报率，OpenAI 可能会失去交易
    - 企业定价是定制的，而一些竞争对手则暴露出更清晰的座位锚
    - 需要实际折扣、平均合同规模和投资回收数据
