sections:
- number: '3.1'
  title: 竞争格局与替代集合
  body: OpenAI 已不再只是与“其他模型”竞争。它面对的是 Anthropic、Google 这类模型/平台对手，Microsoft/GitHub 这类工作流 incumbents，以及开源自托管或内部自建这类替代路径。市场叙事已经从单一前沿竞赛，转向按工作流细分的采购竞争。
  claimRefs:
  - C023
  - C024
- number: '3.2'
  title: 定位、产品广度与包装能力
  body: OpenAI 最明显的优势是广度：消费者助手、企业工作区、开发者 API、coding 工具、多模态接口与智能体工作流都在同一品牌下。这种广度对想要单一战略供应商的买家很有吸引力。但 Microsoft
    与 Google 可依附既有 suite 预算分发 AI，而 Anthropic 在 coding 或偏好 vendor neutrality 的场景中也能拿下高价值工作负载。
  claimRefs:
  - C023
  - C025
- number: '3.3'
  title: 定价、GTM 与切换摩擦
  body: OpenAI 的 API 定价高度透明且颗粒化，但企业席位价格仍较不透明。竞争对手则各有优势：Anthropic 以高阶使用层级与灵活企业包装切入，Microsoft 借 Microsoft
    365 add-on 降低采购摩擦，GitHub 以清晰的开发者席位价格建立基准。 这一点很重要，因为即使功能深度较弱，采购团队也会优先比较那些价格更容易 benchmark 的供应商。
  claimRefs:
  - C026
  - C027
  - C028
- number: '3.4'
  title: 护城河持续性与竞争结论
  body: OpenAI 仍像是前沿 AI 中最广的商业平台，但护城河已不再是“最好模型赢下一切”。真正的护城河是跨场景分发与资本驱动的产品迭代速度。这种优势是耐久的，但并非牢不可破。最尖锐的威胁来自
    API 份额流失、coding 场景被替代，以及 incumbents 的 bundling。结论是：OpenAI 仍是领导者，但必须在多条赛道同时防守份额。
  claimRefs:
  - C024
  - C026
  - C029
