- id: T303
  title: 定价与包装对比
  columns:
  - product
  - 公开价格信号
  - 企业包装信号
  - competitive implication
  rows:
  - - OpenAI ChatGPT Business
    - 公共页面显示/用户/月；审阅的文本导出中未明确捕获确切的金额
    - 协作工作空间；企业定制定价
    - 包装广度强，但企业定价仍不透明
  - - OpenAI API flagship models
    - GPT-5.5 $5 / 1M 输入和 $30 / 1M 输出代币； GPT-5.4 2.5 美元/15 美元
    - 预留容量、居住地、企业销售叠加
    - 开发者盈利是明确且高度精细的
  - - Anthropic Pro / Max / Enterprise
    - 专业文字显示每月或每年 20 美元折扣；最高 100 美元起；企业通过销售
    - 企业自助服务和销售辅助路径可见
    - 人为定价高级使用层，同时保持企业包装灵活性
  - - Microsoft 365 Copilot
    - Microsoft 页面显示符合资格的 Microsoft 365 订阅可附加 30 美元
    - Sold as an add-on to existing suite spend
    - Lower procurement friction inside Microsoft estates
  - - GitHub Copilot
    - GitHub 计划页面显示每用户每月 10 美元和 39 美元的公共主播
    - 开发者席位的经济性很容易比较
    - Copilot remains a strong incumbent benchmark for coding seats
  notes: null
