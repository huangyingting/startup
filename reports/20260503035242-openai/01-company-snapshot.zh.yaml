callouts:
- type: key-insight
  title: 使命治理与超大规模商业经济体并存
  body: 2025-2026 年的结构重组后，基金会仍保留使命控制权，但 OpenAI 在运营上已经是一家覆盖消费者、企业与开发者的全球 AI 基础设施平台。
  claimRefs:
  - C001
  - C002
  - C003
- type: risk-alert
  title: 市场规模已不再是争议焦点，治理与诉讼才是
  body: OpenAI 已明确证明需求存在，但尽调焦点已转向治理韧性、版权与隐私诉讼，以及算力融资能否在不压缩利润的情况下继续复利。
  claimRefs:
  - C002
  - C008
  - C010
