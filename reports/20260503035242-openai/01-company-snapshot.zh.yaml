  title: 公司概览与创业公司快照
  summary: OpenAI 是前沿 AI 平台的定义者，但其投资可行性如今主要取决于治理稳定性、法律敞口，以及 8,520 亿美元估值是否仍留有风险回报空间。
startupIntroduction:
  summary: OpenAI 现由使命导向的基金会与公益公司（PBC）运营主体共同构成。其消费者、企业与开发者产品形成了 adoption、算力规模与变现之间的飞轮。
  foundedDate: '2015-12-08'
  foundedYear: 2015
  founders:
  - name: Sam Altman
    role: 联合创始人兼 CEO
    background: 联合创始人兼 CEO；曾任 Y Combinator 总裁，也是 OpenAI 商业化与治理重组的主要对外推动者。
    claimRefs:
    - C001
    - C004
  - name: Greg Brockman
    role: 联合创始人与总裁
    background: 长期负责产品与工程扩张的核心领导者。
    claimRefs:
    - C004
  - name: Ilya Sutskever
    role: 联合创始人；前首席科学家
    background: 代表 OpenAI 早期研究导向与前沿模型公信力。
    claimRefs:
    - C004
  - name: Wojciech Zaremba
    role: 联合创始人
    background: 与 OpenAI 早期研究定位紧密相关的创始成员。
    claimRefs:
    - C004
  foundingLocation: 美国加利福尼亚州旧金山
  headquarters: 美国加利福尼亚州旧金山
  website: https://openai.com/
  productSummary: OpenAI 通过 ChatGPT 提供消费者 AI，通过 ChatGPT Business/Enterprise 提供企业效率与智能体工作流，并通过 API、Codex
    与多模态模型接口提供开发者基础设施。
  customerFocus: 消费者、企业知识工作者、开发者，以及嵌入基础模型 API 的软件公司。
  businessModel: 订阅、企业席位授权、按量计费 API，以及新兴的广告与智能体变现。
  stage: 前沿 AI 领域的超晚期私营平台公司
  fundingStatus: 仍为私营公司；最新已审阅融资于 2026-03-31 完成，投后估值 8,520 亿美元，承诺资本 1,220 亿美元。
