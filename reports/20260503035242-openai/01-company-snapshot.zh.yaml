sections:
- number: '1.1'
  title: 身份、使命与产品背景
  body: OpenAI 现在对外呈现的不再只是研究实验室，而是一家 AI 研究与部署公司。官方页面强调其使命是确保 AGI 造福全人类，而当前产品面覆盖 ChatGPT、企业工作流、API、Codex
    与多模态接口。这一点重要，因为 OpenAI 同时具备消费者产品公司、横向企业平台以及基础模型基础设施供应商三重属性。
  claimRefs:
  - C001
  - C005
- number: '1.2'
  title: 融资、治理与规模信号
  body: 2026 年的融资极大改变了快照。OpenAI 以 8,520 亿美元投后估值完成 1,220 亿美元承诺资本融资，并同步扩大循环信贷额度。2025 年 10 月的结构重组把运营主体改为
    OpenAI Group PBC，同时让基金会继续掌握治理控制权。这意味着它在不完全放弃使命治理的前提下，获得了异常强的融资能力。
  claimRefs:
  - C001
  - C002
- number: '1.3'
  title: 领导层与利益相关方地图
  body: Sam Altman 仍是运营重心，但官方结构页明确说明治理权掌握在由 Bret Taylor 领衔、以独立董事为主的董事会手中。微软仍是主云伙伴和大股东，而 SoftBank、Amazon、NVIDIA
    等新一轮大额投资者进一步强化了 OpenAI 的算力与生态杠杆。与 2023 年危机时期相比，治理更清晰，但结构依旧非常规。
  claimRefs:
  - C001
  - C003
  - C004
- number: '1.4'
  title: 当前规模与商业姿态
  body: OpenAI 在 2026 年融资文章中声称其周活用户已超过 9 亿、订阅用户超过 5,000 万、月收入达到 20 亿美元，而且企业收入占比已超过 40%。CNBC 对融资事件提供了方向性佐证，但公司仍未披露公开市场投资者通常会要求的细项数据。因此，我们对规模方向的判断置信度较高，但对盈利质量的判断只有中等置信度。
  claimRefs:
  - C002
  - C007
- number: '1.5'
  title: 快照风险与尽调缺口
  body: 后续章节的基准判断是：OpenAI 已无需证明需求存在，而需要证明这种需求是否可持续、是否具备可防守性。当前最重要的快照级风险是治理复杂性、版权/隐私诉讼、对高强度算力扩张的依赖，以及估值本身。最大的剩余尽调缺口则是客户集中度、利润结构、优先权条款与使命治理对未来资本市场灵活性的约束。
  claimRefs:
  - C003
  - C008
  - C010
