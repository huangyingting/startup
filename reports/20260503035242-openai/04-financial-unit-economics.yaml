  title: Financial & Unit Economics
  summary: >-
    OpenAI has already crossed into hyperscale revenue territory, but public underwriting is still constrained by opaque
    margins, unclear seat economics, and the capital intensity of a multi-cloud compute build-out.
callouts:
  - type: key-insight
    title: Revenue quality is stronger than typical private AI peers
    body: >-
      OpenAI is no longer a pre-revenue or experimental platform. It combines consumer subscriptions, enterprise seats,
      and usage-based API pricing, giving it multiple monetization vectors.
    claimRefs:
      - C033
      - C034
      - C035
  - type: risk-alert
    title: Capital intensity and valuation can outrun economics
    body: >-
      Even with $2B of monthly revenue, OpenAI remains a compute-heavy business whose profitability, working capital,
      and financing terms remain largely opaque in public sources.
    claimRefs:
      - C034
      - C036
      - C039
tables:
