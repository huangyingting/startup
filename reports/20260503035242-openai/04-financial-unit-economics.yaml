sections:
  - number: '4.1'
    title: Revenue model and monetization quality
    body: >-
      OpenAI now has a diversified revenue model by private-company standards. Consumer subscriptions create direct
      monetization and brand reach, Business and Enterprise seats convert workplace usage into recurring contracts, and
      the API provides usage-based infrastructure economics. This mix is important because it reduces dependence on any
      one go-to-market motion, but the public record is still thin on which lane is most profitable or most durable.
    claimRefs:
      - C033
      - C034
  - number: '4.2'
    title: Capital intensity and financing posture
    body: >-
      The company's financing profile is extraordinary even by late-stage standards. The reviewed March 2026 financing
      brought in $122B of committed capital at an $852B valuation, alongside an expanded revolving credit facility. That
      capital is not just growth fuel; it is strategic ammunition for compute, cloud flexibility, silicon partnerships,
      and product breadth. The flip side is that the business appears structurally capital intensive until model
      efficiency meaningfully outruns demand growth.
    claimRefs:
      - C034
      - C036
  - number: '4.3'
    title: Unit-economics visibility and blind spots
    body: >-
      Public sources provide enough evidence to say OpenAI has real monetization and enterprise mix, but not enough to
      underwrite unit economics confidently. There is no reviewed public disclosure for gross margin, customer
      acquisition payback, contract retention, or seat expansion. OpenAI's own narrative points to improving efficiency
      and scale leverage, but investors still need internal reporting to separate real operating leverage from scale
      purchased with capital.
    claimRefs:
      - C035
      - C037
  - number: '4.4'
    title: Financial verdict
    body: >-
      OpenAI's financial posture is much stronger than the average frontier-AI private company because revenue, capital
      access, and pricing sophistication are all already real. However, at an $852B valuation, the remaining uncertainty
      matters more than usual. If enterprise mix rises, retention is strong, and inference costs keep falling, the model
      can justify infrastructure-like quality. If compute intensity, bundling pressure, or pricing compression dominate,
      public-market style re-rating risk is obvious.
    claimRefs:
      - C034
      - C038
      - C039
