      - key diligence gap
    rows:
      - - Consumer subscriptions
        - ChatGPT pricing page lists Free, Go, Plus, Pro and related plan benefits
        - Recurring consumer subscription
        - High demand signal but potentially promotional / usage-sensitive
        - Need plan mix, churn, and contribution margin by plan
      - - Business seats
        - ChatGPT pricing and business pages show Business workspace sold per user per month
        - Seat-based enterprise/SMB pricing
        - Potentially durable if admin controls increase stickiness
        - Need realized ASP and seat expansion data
      - - Enterprise contracts
        - Enterprise page shows custom pricing with security, residency, analytics, and advisor support
        - Custom annual / multi-year enterprise contracts
        - Higher-value and likely stickier than consumer plans
        - Need ACV, renewal, concentration, and discount data
      - - Developer APIs
        - API pricing page exposes explicit token pricing across flagship and multimodal models
        - Usage-based infrastructure pricing
        - Highly scalable and transparent monetization lane
        - Need channel split, gross margin, and Azure overlap
      - - Emerging surfaces
        - OpenAI says ads pilot exceeded $100M ARR in under six weeks
        - Early-stage monetization experiment
        - Interesting optionality but too early to underwrite
        - Need sustainability and margin profile
