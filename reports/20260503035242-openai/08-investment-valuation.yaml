chapter:
  number: 8
  title: Investment & Valuation
  summary: >-
    OpenAI is a high-quality strategic asset with extraordinary scale, but at an $852B private valuation the investment
    case is governed more by entry discipline and downside asymmetry than by admiration for the company itself.
callouts:
  - type: final-recommendation
    title: 'Recommendation: track'
    body: >-
      OpenAI is strategically exceptional but financially difficult to underwrite as a fresh primary investment at the
      reviewed valuation. The company deserves active coverage, not automatic deployment of new capital at any price.
    claimRefs:
      - C079
      - C080
      - C084
  - type: risk-alert
    title: Valuation is the main gating issue, not company quality
    body: >-
      The business has real scale, strong product breadth, and durable strategic relevance. The question is whether new
      investors can still earn venture-style upside after such a large mark-up and before public-market transparency
      exists.
    claimRefs:
      - C080
      - C081
      - C085
