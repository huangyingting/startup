  - id: T803
    title: Bull / base / bear scenario table
    columns:
      - scenario
      - assumption
      - output/range
      - evidence basis
      - implication
    rows:
      - - Bull
        - Enterprise retention is strong, API economics improve, and OpenAI sustains platform leadership
        - Valuation can still compound from a very large base
        - Requires better-than-seen margin leverage plus durable share
        - Upside exists but likely looks more like infrastructure compounding than classic VC multiple expansion
      - - Base
        - OpenAI keeps growing quickly but share fragments and valuation grows more slowly than fundamentals
        - Returns are acceptable only with disciplined entry or secondary discounts
        - Consistent with current evidence of strength plus rising competition
        - Best-fit case for continued tracking
      - - Bear
        - Copyright/privacy outcomes worsen, compute costs stay elevated, and enterprise pricing compresses
        - Valuation multiple and private-market appetite both contract
        - Supported by current legal and share-competition uncertainties
        - Downside can be severe despite product quality
      - - Comparable lens
        - Private frontier AI platforms and hyperscale-like software infrastructure
        - No clean public comp set matches OpenAI exactly
        - Evidence comes from business model shape rather than strict peer math
        - Supports using ranges and scorecards instead of false-precision multiples
      - - Entry discipline
        - Fresh primary capital at headline marks is unattractive without superior terms
        - Valuation and disclosure gap dominate
        - Current public evidence set
        - Seek better terms, secondary discounts, or wait for more transparency
    notes: null
    claimRefs:
      - C080
      - C081
      - C084
  - id: T804
    title: Exit readiness / position sizing table
    columns:
      - path
      - requirement
      - current evidence
      - gap
      - diligence ask
    rows:
      - - IPO / public listing
        - Audited disclosures, governance stability, legal clarity
        - Scale and brand support plausibility
        - Margins, segment reporting, and legal overhang remain insufficiently visible
        - Request IPO-readiness roadmap and audited segment metrics
      - - Strategic M&A
        - Regulatory feasibility and buyer concentration
        - Very unlikely at current scale
        - Antitrust and mission-governance issues make this low-probability
        - Treat as non-core exit path
      - - Secondary liquidity
        - Access to discounted paper or structured transactions
        - Most realistic way to improve entry discipline
        - Need visibility into secondary clearing levels and rights
        - Request current secondary market terms
      - - Position sizing
        - High strategic quality but limited pricing cushion
        - Supports small tracking exposure at most
        - Need better downside asymmetry before larger position
        - Define valuation and legal triggers for any capital deployment
      - - Thesis-break trigger
        - Adverse legal precedent, major trust event, or weak enterprise durability
        - All remain plausible and insufficiently quantified
        - Need monitorable thresholds
        - Set stop-loss criteria before investing
