sections:
  - number: '8.1'
    title: Investment thesis, anti-thesis, and recommendation
    body: >-
      The investment thesis is straightforward: OpenAI is one of the most strategically important private technology
      assets in the world, with real product breadth, real monetization, and a category-shaping role. The anti-thesis is
      just as straightforward: at an $852B valuation, the price already embeds a large portion of that strategic
      importance while key economic and legal variables remain opaque. That combination leads to a recommendation of
      track rather than buy.
    claimRefs:
      - C079
      - C080
  - number: '8.2'
    title: Valuation framework and scenarios
    body: >-
      A traditional revenue-multiple framework is not enough because OpenAI is simultaneously a consumer platform,
      enterprise software company, developer-infrastructure vendor, and compute-heavy frontier lab. The right public
      stance is therefore scenario-based rather than false-precision. In the bull case, OpenAI compounds through
      enterprise durability and falling cost-per-unit intelligence. In the base case, fundamentals stay strong but share
      fragmentation and valuation saturation cap upside. In the bear case, legal or compute shocks reprice the business
      faster than revenue can compensate.
    claimRefs:
      - C081
      - C082
  - number: '8.3'
    title: Exit readiness and entry discipline
    body: >-
      Scale and brand make an eventual IPO plausible, but not automatically attractive. The company still needs better
      disclosure on margins, segment mix, and legal exposure before it resembles a normal public-market asset. For new
      investors, secondary liquidity or better-structured entry terms are more compelling than chasing fresh capital at
      the headline mark. Position sizing, if any, should reflect that OpenAI is a great company but not necessarily a
      great investment at any price.
    claimRefs:
      - C080
      - C083
  - number: '8.4'
    title: Final verdict and thesis-break triggers
    body: >-
      OpenAI deserves close coverage because it could become the defining AI platform of the era. But the combination of
      stretched valuation, incomplete economic visibility, and system-level risk argues against an outright buy stance.
      The cleanest thesis-break triggers are adverse copyright/privacy outcomes, major trust or safety failures, or
      evidence that enterprise durability is weaker than current adoption signals imply. Until those risks compress or
      entry terms improve, the disciplined stance is track.
    claimRefs:
      - C084
      - C085
