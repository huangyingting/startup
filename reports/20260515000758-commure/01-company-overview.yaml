company:
  name: Commure
chapter:
  number: 1
  title: Company Overview
  summary: |
    Commure is a Mountain View, California-headquartered enterprise healthcare AI infrastructure
    company formed by the October 2023 merger of Commure (a General Catalyst-incubated developer
    platform built with Jefferson Health) and Athelas (a Tanay Tandon / Deepika Bodapati point-of-care
    diagnostics and revenue cycle company), in a transaction that valued the combined business at
    approximately $6 billion. The merged entity, led by CEO Tanay Tandon, COO Deepika Bodapati, and
    CTO Dhruv Parthasarathy, has since become one of the most heavily capitalized clinical AI vendors
    in the United States, raising $200 million from General Catalyst's Customer Value Fund in June
    2025 and acquiring Augmedix ($139M, October 2024), Memora Health (February 2025), Rx.Health
    (November 2023, now Commure Engage), and PatientKeeper (from HCA Healthcare, August 2021).
    Commure says its annual recurring revenue has doubled in each of the past three years and it now
    serves more than 130 enterprise health systems and approximately 350,000 clinicians across
    integrations with 60-plus EHRs, processing tens of billions of dollars in annual claims. The
    company's history is not without controversy: in April 2025 a federal judge in the Northern
    District of California granted Canopy a preliminary injunction finding Commure had likely
    breached its reseller contract and reverse-engineered Canopy's RTLS staff-safety platform to
    build the competing Strongline Pro product; the dispute was subsequently settled and converted
    into a July 2025 strategic partnership.
sections:
  - id: identity
    title: Identity, Headquarters and Business Model
    body: |
      Commure, Inc. is a privately held healthcare technology company headquartered in Mountain
      View, California. It positions itself as an "AI-native enterprise platform" for revenue cycle
      management, ambient clinical documentation, autonomous coding, and agentic workflow
      automation deployed across enterprise health systems and large physician groups. Commure's
      product website describes the company as the operator of "the only platform purpose-built
      for healthcare's most complex workflows," with deployments spanning 130 to 150 health
      systems, approximately 2,000 sites of care, and integrations with more than 60 electronic
      health record systems including Epic, Oracle Cerner, MEDITECH Expanse, athenahealth and
      eClinicalWorks. The corporate identity reflects two distinct origin stories. Commure
      itself was incubated by venture firm General Catalyst with Jefferson Health beginning in
      2017–2018 as a developer platform aimed at standardizing healthcare APIs (the name is a
      portmanteau of "common architecture"). Athelas was founded in 2016 by Stanford computer
      science dropouts Tanay Tandon and Deepika Bodapati to commercialize a low-cost,
      point-of-care complete blood count (CBC) device — the Athelas One — and grew laterally into
      remote patient monitoring and outsourced revenue cycle services for small specialty
      practices. The October 23, 2023 merger united Commure's enterprise developer platform and
      installed base (anchored by HCA Healthcare via PatientKeeper) with Athelas's RCM and AI
      operating muscle and Tandon's leadership team. Commure's monetization is enterprise SaaS
      plus services: per-clinician subscriptions for Ambient AI and Dictation; per-encounter or
      contingency-fee pricing for autonomous coding and end-to-end RCM; per-bed pricing for
      Strongline staff-safety hardware; and outcomes-tied gain-share contracts that have become
      central to General Catalyst's "Customer Value Fund" growth-financing thesis.
