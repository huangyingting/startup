callouts:
  - calloutType: strength
    title: Capital depth and General Catalyst alignment is structural
    body: |
      No other clinical AI vendor has the depth of structural capital alignment that Commure
      enjoys with General Catalyst. Hemant Taneja chairs the board, GC incubated the original
      Commure entity, and the June 2025 Customer Value Fund commitment of $200M is explicitly
      structured as non-dilutive performance-tied capital. That gives Commure pricing power and
      a runway story that competitors (Abridge, Suki, DeepScribe, Nabla) must counter on equity
      terms.
    claimRefs:
      - CO009
      - CO014
      - CO015
  - calloutType: strength
    title: HCA deployment is the largest reference in U.S. ambient AI
    body: |
      The HCA Healthcare partnership — encompassing the 2021 PatientKeeper sale, an HCA equity
      investment in Commure, and the largest disclosed enterprise ambient AI rollout in the
      United States — is a defensible commercial moat. HCA operates ~188 hospitals and ~2,000
      sites of care, giving Commure a single-customer footprint that no peer can match.
    claimRefs:
      - CO017
      - CO018
      - CO019
  - calloutType: risk
    title: Canopy preliminary injunction surfaced material IP-misappropriation risk
    body: |
      A federal court found Commure was likely to be liable for breach of contract and reverse
      engineering of a partner's RTLS staff-safety platform. Although the matter was settled and
      converted into a partnership in July 2025, the underlying judicial findings (likelihood of
      success on the merits, irreparable harm) are unusual for a $6B-valued company and merit
      serious diligence into product-development controls and partner-data governance.
    claimRefs:
      - CO026
      - CO027
      - CO028
  - calloutType: insight
    title: M&A pace is unusually aggressive even among well-funded AI startups
    body: |
      Within roughly 30 months of the merger, Commure absorbed PatientKeeper (2021),
      Rx.Health (2023), Augmedix ($139M, 2024) and Memora Health (2024–2025). That cadence
      gives the company breadth (RCM, ambient, agents, engagement, navigation) but also
      meaningful integration debt; investors should validate whether ARR is durable across
      acquired books or dependent on legacy contracts.
    claimRefs:
      - CO019
      - CO020
      - CO021
      - CO022
