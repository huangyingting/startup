  - id: leadership-and-funding
    title: Founders, Leadership, Governance and Capital
    body: |
      Tanay Tandon serves as Chief Executive Officer of the combined company. He co-founded
      Athelas in 2016 with Deepika Bodapati while both were undergraduates at Stanford and
      previously worked on AI/computer vision projects honored by Intel and the Davidson
      Institute. Bodapati is Chief Operating Officer; Dhruv Parthasarathy, an MIT-trained
      computer scientist who joined Athelas as Chief Technology Officer, holds the same title for
      the merged company. The board is chaired by Hemant Taneja, Chief Executive Officer and
      Managing Director of General Catalyst, who has positioned Commure as the lead operating
      asset of GC's "Health Assurance" investment thesis. Other named board members and active
      backers identified in the merger announcement include Quentin Clark (former SAP/SVP at
      Dropbox, now General Catalyst), Qasar Younis (CEO of Applied Intuition), and a senior
      digital-health representative from anchor strategic investor HCA Healthcare. Sequoia
      Capital, Greylock, Y Combinator, 8VC, Tribe Capital and Initialized Capital are disclosed
      Athelas-side investors who became Commure shareholders through the merger. Brent Dover
      served as Commure CEO during the PatientKeeper acquisition in 2021 and stepped aside as
      part of the leadership transition tied to the merger. The most consequential financing
      event of the past 24 months was the June 19, 2025 announcement of a $200 million growth
      investment from General Catalyst's Customer Value Fund — a non-dilutive, performance-tied
      capital vehicle — explicitly intended to fund go-to-market expansion without re-pricing the
      cap table. Commure has also disclosed that its annual recurring revenue, "already in the
      hundreds of millions," has doubled for three consecutive years, but it has not published an
      audited revenue figure and the post-2023 primary valuation mark has not been formally
      reset.
