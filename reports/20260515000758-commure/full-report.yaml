      - number: '5.3'
        title: Differentiation, Trust, Compliance and Roadmap
        blocks:
          - type: paragraph
            body: |
              Differentiation is fivefold. (1) Platform breadth: only Commure spans Ambient + Coding
              + Agents + Engagement + Strongline on a shared OS, and the GC Customer Value Fund
              backs that breadth with non-dilutive growth capital. (2) EHR breadth: 60+ EHR
              integrations including a deep MEDITECH Expanse Now embed gives Commure a non-Epic
              distribution path that ambient-only competitors lack. (3) Customer scale: HCA
              Healthcare anchor is described by Hospitalogy as the nation's largest ambient AI
              rollout; 130–150 systems and 350K+ clinicians validate operational maturity. (4)
              Validated outcomes: KLAS 93.3 / 100% would-buy-again on ambient; OBHG 85% AI-coded /
              83% charge-time reduction on autonomous coding. (5) Developer signal: the public
              Commure GitHub organization is an uncommon trust-building move in healthcare AI.
              Trust, safety, and compliance posture covers HIPAA (federal), state PHI laws (50-
              state patchwork), state two-party-consent statutes for ambient capture (the April
              2026 N.D. Cal. class action highlights sector exposure), SOC 2 Type II (industry
              standard for enterprise SaaS), HITRUST (commonly required by health systems), and
              the FDA AI/ML SaMD framework for any device-classified component. The FDA's running
              AI/ML-enabled medical-devices list now exceeds 1,000 entries, providing an
              authoritative baseline for what is and is not a medical device — Commure's ambient
              and coding products are non-device clinical-decision-support workflows and operate
              outside FDA SaMD obligations as currently positioned. The 2025–2026 roadmap focuses
              on (a) expanding Commure Agents into operational autonomy, (b) deepening MEDITECH
              and Cerner / Oracle Health integration, (c) reducing HITL QA cost, (d) adding
              specialty templates (pediatrics, oncology, behavioral health), and (e) extending the
              Memora-powered care-navigation surface. Risks: integration debt across acquired
              stacks, foundation-model dependency, hyperscaler price exposure, and sector-wide
              consent litigation. Each risk is itemized in TE004 with a mitigation / diligence ask.
