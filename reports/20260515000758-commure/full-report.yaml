      - number: '2.2'
        title: Sizing — Six Lenses on Commure's Addressable Opportunity
        blocks:
          - type: paragraph
            body: |
              No single TAM number is supportable for Commure because the company sells across four
              categories. Triangulating across six independent lenses produces a range of $4.5B to
              $11B of currently addressable software opportunity (SAM) and a near-term reachable
              market (SOM) of approximately $1.5–2.5B given Commure's existing footprint and EHR
              relationships. Lens 1 (top-down ACI): Menlo Ventures' 2025 healthcare AI report sizes
              the ambient AI sub-market at ~$600M of recurring revenue with the top two vendors
              capturing ~two-thirds; the same report projects ~3x growth by 2027 driven by Epic-
              embedded distribution. Lens 2 (bottom-up clinician seats): the U.S. has roughly 1.1
              million active physicians and 4 million nurses; assuming $1,800–$3,600 per-clinician
              annual ambient-AI ACV at full saturation yields a $2.0B–$3.6B steady-state ACI seat
              market for physicians alone and many multiples for nurses. Lens 3 (RCM automation):
              KLAS and Waystar/R1 disclosures place enterprise RCM software at $20B+ globally with
              autonomous coding as a $1B+ greenfield slice. Lens 4 (provider IT capex): CMS national
              health expenditure data ($4.9T total spend in 2024, ~$240B on administration); even
              a 2% AI-software take rate on administrative spend implies a $4.8B addressable pool.
              Lens 5 (vertical-AI peer triangulation): Menlo's report notes healthcare hosts more
              AI unicorns ($500M–$1B-plus) than any other vertical — eight as of 2025 — implying
              an aggregate enterprise value of $40B+ that itself prices in a multi-billion ARR
              addressable pool. Lens 6 (Commure-disclosed): Commure says it serves 130–150 health
              systems and 350K+ clinicians; if average revenue per system reaches $1.5–3M (consistent
              with public Abridge UPMC pricing), the embedded book alone implies a $200–450M ARR
              ceiling on current customers, with multiples of upside as additional product lines
              attach. Net: Commure's near-term reachable market is large enough to support a $6B
              valuation only if it can sustain seat-license expansion AND attach autonomous coding
              across the same accounts.
