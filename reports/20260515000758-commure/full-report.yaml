      - number: '1.3'
        title: Milestones, M&A and Adverse Events
        blocks:
          - type: paragraph
            body: |
              Commure's milestone arc is dominated by aggressive M&A and capital deployment. PatientKeeper
              — a 25-year-old hospital charge-capture and physician documentation platform — was carved
              out of HCA Healthcare in August 2021 and folded into Commure's portfolio as part of a
              broader strategic collaboration that also brought HCA in as a Commure equity investor and
              reference customer. Rx.Health, a Mount Sinai-spinout patient-engagement and digital
              therapeutics platform serving Yale New Haven, UnitedHealthcare and others, was acquired in
              November 2023 (one month after the merger close) and re-launched as Commure Engage. The
              company's largest disclosed acquisition is Augmedix: announced July 19, 2024 at $2.35 per
              share for a $139 million all-cash transaction, the deal closed October 2, 2024, took the
              Nasdaq-listed pioneer of remote scribing private, and rebranded its ambient documentation
              product as Commure Scribe. In December 2024 Commure agreed to acquire AI clinical
              navigation vendor Memora Health (founded by Kunaal Naik and previously backed by
              Andreessen Horowitz, General Catalyst and Transformation Capital); the deal closed in early
              2025 and was publicly confirmed on February 14, 2025. Other milestones include the
              original Strongline staff-safety acquisition (RTLS hardware/software for clinical duress
              alerting), the November 2024 enterprise-wide ambient AI rollout to Tenet Physician
              Resources, the November 2025 Hughston Clinic deal for orthopedic enterprise AI, the OBHG
              autonomous-coding deployment to ~2,000 OB/GYN clinicians (December 2025) and the April
              2026 launch of Commure Dictation. The most significant adverse event in the company's
              history was the Canopy preliminary injunction. On April 25, 2025 Judge Noël Wise of the
              Northern District of California (Case No. 5:24-cv-02592-NW) granted Canopy a preliminary
              injunction finding it was likely to succeed on the merits of its claim that Commure had
              breached its reseller agreement and improperly used Canopy's confidential information to
              build a "copycat" Strongline Pro device through reverse engineering. The dispute was
              subsequently settled and on July 10, 2025 the parties announced a "strategic partnership"
              under which Canopy assumed support for Commure Strongline customers — an unusual structural
              remedy that effectively transferred the disputed product line to the plaintiff while
              preserving customer continuity.
