          - type: callout
            title: Sector-wide consent litigation undercuts the moat narrative
            body: |
              The April 2026 class action filed in the N.D. Cal. against health systems using
              ambient AI (and the prior 2025 Sharp HealthCare case) signal that patient consent
              and audio-retention practices are a sector-wide legal vulnerability. Even though
              Commure is not (yet) named, every Commure deal now requires negotiated
              indemnification and a consent-capture work-stream — slowing deployments.
