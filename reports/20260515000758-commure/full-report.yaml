      - number: '4.2'
        title: Unit Economics, Margin and Cost Structure
        blocks:
          - type: paragraph
            body: |
              Without audited financials, unit economics must be triangulated from peer benchmarks
              and the small set of public outcome metrics Commure has disclosed. On the ambient AI
              pillar, the cost structure is dominated by (a) inference compute (LLM token costs;
              Commure has stated relationships with major foundation models and a hybrid stack) and
              (b) the human-in-the-loop QA workflow inherited from Augmedix (which historically
              operated a global review center; the post-merger automation roadmap is to reduce that
              labor cost). Industry analyst commentary at HIMSS 2026 explicitly framed enterprise
              AI as moving from "aspirational innovation to operational necessity" — i.e., gross-
              margin discipline is now table-stakes. On autonomous coding, the OBHG result (85%
              AI-coded charges, 83% time reduction) is consistent with high incremental gross
              margin per coded charge once the model is trained; the cost line is per-encounter
              compute plus a smaller human review tail. On engagement and Strongline, revenue
              includes services and hardware components that dilute software gross margin. CAC is
              not disclosed; using Becker's panel commentary that 9 in 10 health systems are
              already piloting ambient AI implies a relatively short top-of-funnel discovery cost
              but long bottom-of-funnel implementation cost. Payback periods at large IDNs are
              believed to be 12–24 months (consistent with HIT Consultant industry commentary).
              Working capital pressure comes from delayed health-system payment cycles and from
              Augmedix-era global delivery operations. Capex is light (Commure does not run its
              own data centers; it is an enterprise SaaS on hyperscaler infrastructure). The
              gating question for unit economics is what proportion of revenue is value-share /
              outcomes-tied through the GC CVF — that mix shapes both gross margin and revenue
              quality.
