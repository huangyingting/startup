  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Surface, Modules and Workflow
        blocks:
          - type: paragraph
            body: |
              Commure delivers five product pillars stitched together through a shared CommureOS
              platform layer. (1) Commure Ambient AI / Scribe / Dictation captures the patient–
              clinician conversation in real time, generates a draft note structured to specialty
              templates, and writes back to the EHR. KLAS First Look scored Commure Ambient AI 93.3
              / 100 with 100% would-buy-again — a top-tier independent benchmark. Commure Dictation
              launched April 2 2026 as a complementary fast-dictation modality. (2) Commure
              Autonomous Coding (formerly Athelas RCM) ingests the encounter note, EHR data, and
              coding rules to auto-generate billable codes; the OBHG case shows 85% of charges AI-
              coded with an 83% reduction in clinician charge-time within three months across 200+
              sites and 2,000 clinicians. (3) Commure Engage combines Rx.Health (acquired Nov 2023
              and rebranded) with Memora Health (acquired Feb 2025) to deliver patient outreach,
              care navigation, scheduling, and prior-authorization orchestration. (4) Commure Agents
              is sold as agent-as-a-service starting at $5 per hour, automating call centers, care
              navigation, and back-office workflows; this is Commure's most explicit consumption-
              pricing surface. (5) Strongline is the workforce-safety RTLS / duress-badge product
              acquired pre-merger; following the April 2025 Canopy v. Commure preliminary
              injunction (settled via the July 10 2025 partnership), Canopy now powers Strongline
              customer support. Customer workflow proceeds: vendor evaluation → 50–200-clinician
              ambient pilot → enterprise contract → cross-sell autonomous coding → engage / agents
              → operationalize Strongline. The cross-sell motion is the strategic centerpiece: every
              additional pillar attached at an existing account compounds ARPU.
