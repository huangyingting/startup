              - CP014
          - type: callout
            title: Microsoft Dragon Copilot bundling is the under-priced threat
            body: |
              Microsoft has folded Nuance DAX into Dragon Copilot inside the Microsoft 365 / Azure
              stack, which means health systems already paying Microsoft for productivity and
              cloud can add ambient documentation as a line-item rather than a standalone
              contract. This bundling pressure is the single most likely catalyst for ACI per-seat
              ACV compression industry-wide, and Commure's standalone-priced ambient business is
              directly exposed.
            calloutType: risk
            claimRefs:
              - CP002
              - CP013
