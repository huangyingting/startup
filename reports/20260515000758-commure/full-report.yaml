  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary, Adjacencies and Substitutes
        blocks:
          - type: paragraph
            body: |
              Commure straddles four distinct healthcare technology categories that all sell into the
              same enterprise health-system buyer but compete on different vendor lists. The first is
              Ambient Clinical Intelligence (ACI) — generative-AI products that capture and structure
              the patient–clinician conversation. Menlo Ventures and Becker's Hospital Review put the
              U.S. ACI software market at roughly $600 million of recurring revenue in 2025, with
              Microsoft/Nuance DAX (~33% share), Abridge (~30% share), and a long tail (Suki,
              DeepScribe, Nabla, Ambience Healthcare, Commure Scribe, Sunoh, Freed) splitting the
              remainder. The second is Revenue Cycle Management (RCM) software and services — a much
              larger, slower-growing pool atop $4.9 trillion of U.S. national health expenditure;
              Commure's autonomous-coding and end-to-end RCM offer competes against R1 RCM, Waystar,
              Optum, athenaCollector, and the in-house RCM operations of large IDNs. The third is
              Patient Engagement / Care Navigation (Commure Engage and Memora) — a fragmented sub-
              $2 billion segment shared with WELL Health, Notable, Memora-pre-acquisition, Vivify,
              and consumer "front door" players. The fourth is Healthcare Workforce Safety / RTLS
              (Strongline, now powered by Canopy) — a sub-$500M hardware-plus-software niche
              dominated by Canopy, Vocera (Stryker), Cognosos and CenTrak. Excluded from Commure's
              addressable boundary: clinical decision support, drug-discovery AI, payer-side
              utilization-management AI, consumer wellness, telehealth video infrastructure, and
              device manufacturing. The status-quo substitute that Commure is actually displacing in
              most enterprise sales cycles is not a competing AI product but a combination of human
              medical scribes (a $5–8 billion U.S. labor pool), in-house RCM staff, and physician
              after-hours charting time — which is why ROI cases lean heavily on labor savings rather
              than revenue lift.
