      - number: '5.2'
        title: Architecture, Integration and Operating Model
        blocks:
          - type: paragraph
            body: |
              CommureOS is a multi-tenant cloud-native platform hosted on hyperscaler infrastructure
              (AWS-first, consistent with Commure's positioning in the AWS for Healthcare & Life
              Sciences ecosystem). Data exchange uses HL7 FHIR R4 (the dominant U.S. interoperability
              standard) plus EHR-vendor-specific APIs: Epic Workshop / Smart-on-FHIR for Epic,
              MEDITECH Expanse Now embed (announced Sep 16 2025) for MEDITECH, native Oracle Health
              / Cerner integration, and 60+ EHRs in total per Commure homepage. The ambient AI
              pipeline is a hybrid stack: real-time audio capture (mobile / web), automatic speech
              recognition (mix of in-house and foundation-model partners), large-language-model
              inference for note structuring (Commure has stated relationships with major
              foundation-model vendors), specialty-template post-processing, and HITL QA inherited
              from Augmedix's pre-acquisition global delivery operations — with the post-merger
              automation roadmap aimed at reducing that human-review tail. Autonomous coding adds
              a coding-rule engine, payer-specific edits, and a write-back to EHR billing modules.
              Engage and Agents leverage CommureOS event streams, EHR write-back, and outbound
              notification channels (SMS, voice, MyChart-style portals). Strongline is a hardware
              + software RTLS deployment. Developer surface is exposed via the Commure GitHub
              organization (publicly visible as github.com/commure with multiple repositories, an
              uncommon move for healthcare AI vendors and a meaningful developer-trust signal).
              Reliability and support follow enterprise SaaS norms: 24×7 NOC, defined SLAs for
              enterprise contracts, and field-engineering teams attached to large IDN deployments
              (HCA, Tenet, Providence). Critical dependencies are: foundation-model vendors,
              hyperscaler availability, EHR-vendor partner programs, and Canopy-supplied Strongline
              operations.
