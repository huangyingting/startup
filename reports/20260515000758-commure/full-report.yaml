              liability → re-rate category and bear-case-only exposure. (3) HHS-OCR Resolution
              Agreement against Commure → re-rate compliance posture and apply Y discount. (4)
              FDA SaMD reclassification of ambient or coding products → trigger product /
              regulatory pivot review. (5) ARR YoY growth slowdown below 30% YoY for two
              consecutive periods → reassess valuation; cut new-money. (6) GC CVF capacity
              reduction or restructuring → reassess capital runway. (7) Key-person departure
              (Tandon / Parthasarathy / Taneja) within 12 months → trigger anti-thesis review.
              Final diligence asks (TV006): top-5 customer revenue share; NRR / GRR / churn /
              contract length; SOC 2 Type II report vintage and HITRUST CSF cert level; pen-test
              summary; foundation-model vendor mix and BAAs; sub-processor list; active legal
              docket detail (consent class action, any state AG investigation); GC CVF deployment
              mechanics and outstanding commitments; FDA SaMD scoping memo; CMS payment-rule
              sensitivity for autonomous coding; Memora customer book post-close scale; Augmedix
              HITL cost-reduction roadmap milestones; international roadmap. Exit readiness: the
              secondary market for late-stage healthcare AI is increasingly active; strategic
              buyers (Optum, Microsoft, Oracle Health) have demonstrated appetite for category
              consolidation; the IPO window for healthcare AI in 2027–2028 will be condition-
