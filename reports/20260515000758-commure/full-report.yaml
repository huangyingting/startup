      - number: '4.3'
        title: Capital Stack, Traction and Adequacy
        blocks:
          - type: paragraph
            body: |
              Commure's capital stack rests on three pillars: (1) primary venture financing led by
              General Catalyst (Hemant Taneja chairs the board) with co-investors including HCA
              Healthcare (strategic), Sequoia, Greylock, 8VC, Y Combinator, Tribe Capital, and
              Initialized Capital; (2) the merger consideration that combined Athelas (which
              closed a $132M Series C at $1.5B in May 2022) with Commure into a $6B implied
              post-merger entity in October 2023; and (3) the June 19 2025 General Catalyst
              Customer Value Fund commitment of $200M in non-dilutive growth financing, structured
              to underwrite enterprise GTM and customer expansion without re-pricing equity. The
              Augmedix acquisition added public-company financial transparency for a window in 2024
              — Augmedix's SEC filings (CIK 0001769804) document the merger consideration of $2.35
              per share in cash for an aggregate $139M deal value, closed October 2, 2024, with
              filings index 0001193125-24-230765. Public traction markers are limited but
              consistent: ARR has doubled three years in a row per company commentary; 130–150
              health systems served; 350K+ clinicians on platform; 40M+ ambient appointments
              processed; $25B+ annual claims handled; and OBHG / DRH Health customer wins through
              late 2025 and early 2026. Capital adequacy looks strong over a 24-36 month horizon:
              the GC CVF supplies enterprise GTM funding; HCA underwrites volume; the Augmedix /
              Memora / Rx.Health integrations are largely paid for; and there is no public signal
              that Commure must immediately raise primary equity. The principal blockers to a
              decision-grade financial underwrite are (a) absent audited revenue and gross margin,
