              案例是标准的多支柱参考。渠道依赖有四类：（1）EHR 合作伙伴计划——Epic Workshop / App Orchard、MEDITECH Expanse Now、Oracle Health
              合作伙伴计划、athenahealth Marketplace；（2）超大规模云厂商联合销售（AWS Healthcare 生态）；（3）GC Customer Value Fund
              以非稀释性增长资本共同出资客户部署；（4）承自 Augmedix 的经销 / 合作伙伴网络。集中度风险聚焦于具名锚定客户 HCA Healthcare。Commure 未公开披露最大客户收入集中度；投资媒体评论将
              HCA 描述为有意义但并非多数份额。采购摩擦体现在 IDN AI 治理审查（临床、法律、安全、合规）；Commure 用 KLAS 验证、GitHub 开发者信号、HCA 参考客户和 GC Customer
              Value Fund 的收益共担结构来缓释。国际扩张尚未公开形成规模；Commure 客户账本以美国为中心。反向信号：Canopy v. Commure 初步禁令（April 25 2025，已在 July 10
              2025 和解）是一次合作伙伴关系负面事件；April 2026 N.D. Cal. 针对医疗系统的环境式 AI 患者同意集体诉讼是全行业阴云。集中度 / 依赖尽调：在 NDA 下验证 top-5
