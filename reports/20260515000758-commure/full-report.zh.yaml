chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              Commure, Inc. 是一家总部位于 Mountain View, California 的私营医疗技术公司。公司把自己定位为面向收入周期管理、环境式临床文档、自主医疗编码和智能体工作流自动化的

              “AI 原生企业平台”，部署在企业级医疗系统和大型医生集团中。Commure 的产品网站称，公司运营着

              “唯一专为医疗最复杂工作流打造的平台”，已覆盖 130 到 150 个医疗系统、

              约 2,000 个护理站点，并集成 60 多个电子健康记录系统，包括 Epic、Oracle Cerner、MEDITECH Expanse、

              athenahealth 和 eClinicalWorks。公司身份背后有两条起源线。Commure 本体由风险投资机构 General Catalyst 与

              Jefferson Health 于 2017–2018 年开始孵化，最初是一个旨在标准化医疗 API 的开发者平台（名称是“共同架构”的合成词）。Athelas 由 Stanford 计算机科学辍学生
              Tanay Tandon 和 Deepika Bodapati 于

              2016 年创立，最初商业化一款低成本、床旁全血细胞计数（CBC）设备——Athelas One——随后横向扩展到远程患者监测和面向小型专科诊所的外包收入周期服务。October 23, 2023

              的合并，把 Commure 的企业开发者平台和既有装机基础（通过 PatientKeeper 锚定 HCA Healthcare）与 Athelas 的

              RCM、AI 运营能力以及 Tandon 的领导团队合在一起。Commure 的变现是企业 SaaS 加服务：Ambient AI 和

              Dictation 按临床医生订阅；自主编码和端到端 RCM 按就诊或成功费计价；Strongline 员工安全硬件按床位收费；与成效挂钩的收益分享合同也已成为

              General Catalyst “Customer Value Fund” 增长融资逻辑的核心。
