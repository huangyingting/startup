      - number: '2.2'
        title: 规模测算——从六个视角看 Commure 的可触达机会
        blocks:
          - type: paragraph
            body: >
              Commure 横跨四个品类销售，因此没有一个单一 TAM 数字站得住。用六个独立视角交叉测算，目前可触达软件机会（SAM）落在 $4.5B 到

              $11B，考虑 Commure 既有足迹和 EHR 关系，近期可获取市场（SOM）约为 $1.5–2.5B。视角 1（自上而下 ACI）：Menlo Ventures

              2025 医疗 AI 报告将环境式 AI 子市场估为约 $600M 经常性收入，头部两家拿走约三分之二；同一报告预计，到 2027 年，在 Epic 嵌入式分发带动下增长约

              3x。视角 2（自下而上临床医生席位）：美国约有 1.1 million 名活跃医生和 4 million 名护士；假设完全渗透后每名临床医生年度环境式 AI ACV 为

              $1,800–$3,600，仅医生席位就对应 $2.0B–$3.6B 的稳态 ACI 市场，护士侧还有多倍空间。视角 3（RCM 自动化）：KLAS 和 Waystar / R1 披露显示，企业

              RCM 软件全球规模超过 $20B，其中自主编码是 $1B+ 的绿地切片。视角 4（医疗机构 IT 资本开支）：CMS 国家医疗支出数据（2024 年总支出 $4.9T，约 $240B 用于行政）；即便 AI
              软件只拿走行政支出的

              2%，也意味着 $4.8B 可触达池子。视角 5（垂直 AI 同行交叉验证）：Menlo 报告指出，医疗拥有的 AI 独角兽（$500M–$1B-plus）数量超过任何其他垂直行业——截至

              2025 年共有八家——合计企业价值 $40B+，本身就隐含了数十亿美元 ARR 的可触达池子。视角 6（Commure 披露）：Commure 称其服务 130–150 个医疗系统和

              350K+ 名临床医生；如果每个系统平均收入达到 $1.5–3M（与公开 Abridge UPMC 定价一致），仅既有客户账本就暗示当前客户 ARR 上限为

              $200–450M，随着更多产品线附着还有多倍上行。结论：Commure 近期可获取市场足够大，只有在它能持续扩大席位授权并在同一账户中附着自主编码时，才支撑 $6B 估值。
