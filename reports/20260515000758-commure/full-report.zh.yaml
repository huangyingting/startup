      - number: '4.2'
        title: 单位经济性、利润率与成本结构
        blocks:
          - type: paragraph
            body: >
              没有经审计财务，单位经济性只能由同行基准和 Commure 披露的少量公开成效指标交叉推断。环境式 AI 支柱的成本结构主要由两部分主导：(a) 推理算力（LLM token 成本；Commure

              称其与主要基础模型存在合作关系，并采用混合技术栈）；(b) 从 Augmedix 继承的人在回路 QA 工作流（Augmedix 历史上运营全球审阅中心；合并后的自动化路线图是降低这部分人工成本）。HIMSS

              2026 的行业分析师评论明确把企业 AI 描述为从“愿景式创新走向运营必需品”——也就是说，毛利率纪律现在是入场券。自主编码侧，OBHG 结果（85%

              AI 编码收费、时间减少 83%）与模型训练完成后每笔编码收费的高增量毛利率一致；成本线是每次就诊的算力，加上一条更小的人工审阅长尾。互动和 Strongline

              侧，收入包含服务和硬件成分，会稀释软件毛利率。获客成本（CAC）未披露；Becker's 圆桌评论称 10 个医疗系统里有 9 个已在试点环境式
              AI，这意味着漏斗顶部发现成本相对较短，但漏斗底部实施成本很长。大型

              IDN 回本周期据信为 12–24 个月（与 HIT Consultant 行业评论一致）。营运资本压力来自医疗系统付款周期延迟，以及 Augmedix 时代的全球交付运营。资本开支很轻（Commure

              不运营自有数据中心；它是在超大规模云基础设施上的企业 SaaS）。单位经济性的闸门问题是：有多少收入通过 GC CVF 采用价值分享 / 成效挂钩形式——这个组合同时塑造毛利率和收入质量。
