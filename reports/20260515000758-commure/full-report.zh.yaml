  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: standard
    summary: 从公开证据包、反向逻辑折价，到买入建议和目标估值区间的端到端逻辑。
    data:
      nodes:
        - id: proof
          label: 公开证据包（KLAS + OBHG + HCA + GC CVF）
        - id: anti
          label: 反向逻辑折价（HCA 集中度；同意权诉讼；整合欠账）
        - id: scenarios
          label: 乐观 / 基准 / 悲观 / 尾部情景
        - id: comps
          label: 可比公司组（Microsoft Nuance；Oracle Cerner；Abridge；Suki）
        - id: range
          label: 合理价值区间：投后 $6–10B
        - id: rec
          label: 买入（中高置信度）
        - id: kill
          label: 否决触发条件（前 5 大客户流失；HCA 缩量；诉讼不利）
      edges:
        - from: proof
          to: scenarios
          label: 支撑乐观 / 基准
        - from: anti
          to: scenarios
          label: 推向悲观 / 尾部
        - from: scenarios
          to: range
          label: 按概率加权
        - from: comps
          to: range
          label: 锚定区间
        - from: range
          to: rec
          label: 合理价值区间内买入
        - from: rec
          to: kill
          label: 监控触发条件
    claimRefs:
