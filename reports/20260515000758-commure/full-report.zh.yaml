      - number: '7.3'
        title: 团队、执行、缓释措施与否决标准
        blocks:
          - type: paragraph
            body: >
              团队 / 执行风险中等但真实存在。创始人主导的管理层——Tanay Tandon（CEO）、Deepika Bodapati（COO）、Ashutosh Parthasarathy（CTO）、Hemant
              Taneja（Chair）——带来很强连续性，也造成关键人集中。多支被收购团队的整合（Athelas、原 Commure、PatientKeeper
              时代人才、Rx.Health、Augmedix、Memora、Strongline）是主要执行风险；被收购公司领导层流失是需要跟踪的指标。销售执行风险包括 IDN 客户的 AI 治理采购周期较长，以及环境式 AI
              走过 First Look 阶段后 KLAS 表现可能下滑。缓释框架分三层运行：（a）产品 / 客户缓释——KLAS 验证、OBHG 量化结果、GitHub 开发者信号、GC CVF
              收益共担；（b）监管缓释——同意采集工作流、HIPAA 控制、FDA SaMD 适用范围界定、考虑 FCA 的编码审计；（c）合作伙伴 / 资本缓释——多 EHR 广度、多 LLM 广度、GC CVF
              非稀释性资本、Canopy 的 Strongline 合作关系。投资逻辑否决标准（按 TR005）：（i）具名客户流失在 12 个月内超过个位数；（ii）HCA 关系恶化；（iii）April 2026 环境式
              AI 患者同意集体诉讼出现不利裁决或实质性和解，并穿透到供应商侧责任；（iv）HHS-OCR 对 Commure 执法；（v）FDA 将环境式 AI 或编码产品重新归类为 SaMD；（vi）ARR
              同比增长连续两个期间放缓至 30% YoY 以下；（vii）CEO / CTO / Chair 在 12 个月内离任。尽调问题集中在只能靠私有证据回答的事项：top-5 客户占比、NRR / GRR /
              流失率、分处理方清单、基础模型供应商组合、SOC 2 / HITRUST 证书版本、渗透测试摘要，以及活跃法律案卷（患者同意集体诉讼、任何州总检察长调查）。
