      - number: '8.3'
        title: 否决标准、最终尽调问题与退出准备度
        blocks:
          - type: paragraph
            body: >
              否决标准沿用第 7 章（TR005），但估值视角更收紧。（1）top-5 客户流失在 12 个月内超过个位数，或 HCA 范围缩减 → 下调信心；重估公允价值区间。（2）April 2026 N.D. Cal.
              环境式 AI 患者同意集体诉讼出现刺穿供应商责任的不利简易判决 → 重估品类，只保留悲观情景敞口。（3）HHS-OCR 与 Commure 达成 Resolution Agreement → 重估合规姿态并施加
              Y 折价。（4）FDA 将环境式 AI 或编码产品重新归类为 SaMD → 触发产品 / 监管转向复核。（5）ARR YoY 增长连续两个期间低于 30% YoY → 重估估值；削减新钱投入。（6）GC CVF
              容量下降或重组 → 重估资本跑道。（7）关键人（Tandon / Parthasarathy / Taneja）在 12 个月内离任 → 触发反向逻辑复核。最终尽调问题（TV006）：top-5
              客户收入占比；NRR / GRR / 流失率 / 合同期限；SOC 2 Type II 报告版本和 HITRUST CSF 证书级别；渗透测试摘要；基础模型供应商组合和
              BAAs；分处理方清单；活跃法律案卷细节（患者同意集体诉讼、任何州 AG 调查）；GC CVF 部署机制和未履行承诺；FDA SaMD 适用范围备忘录；CMS 支付规则对自主编码的敏感度；Memora
              交割后客户账本规模；Augmedix HITL 成本下降路线图里程碑；国际路线图。退出准备度：后期医疗 AI 的二级市场越来越活跃；战略买家（Optum、Microsoft、Oracle
              Health）已显示出品类整合意愿；2027–2028 医疗 AI 的 IPO 窗口取决于条件。TV001 的建议摘要给出买入评级，TV003 的乐观 / 基准 / 悲观情景框定结果范围。
