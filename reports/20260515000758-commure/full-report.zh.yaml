  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品面、模块与工作流
        blocks:
          - type: paragraph
            body: >
              Commure 通过共享的 CommureOS 平台层，把五个产品支柱缝合在一起。(1) Commure Ambient AI / Scribe / Dictation
              实时捕捉患者与临床医生对话，生成按专科模板结构化的病历草稿，并写回

              EHR。KLAS First Look 给 Commure Ambient AI 打出 93.3 / 100 和 100% 会再次购买——这是第一梯队独立基准。Commure Dictation 于

              April 2 2026 推出，作为补充性的快速听写模式。(2) Commure Autonomous Coding（前身为 Athelas RCM）摄取就诊记录、EHR
              数据和编码规则，自动生成可计费代码；OBHG

              案例显示，三个月内、覆盖 200+ 站点和 2,000 名临床医生，85% 收费由 AI 编码，临床医生收费时间减少 83%。(3) Commure Engage 将 Rx.Health（Nov 2023

              收购并更名）与 Memora Health（Feb 2025 收购）结合，提供患者触达、护理导航、排班和事先授权编排。(4) Commure Agents 以智能体即服务模式

              出售，起价 $5 / 小时，自动化呼叫中心、护理导航和后台工作流；这是 Commure 最明确的消耗型定价界面。(5) Strongline 是合并前收购的员工安全 RTLS / 胁迫徽章产品；April

              2025 Canopy v. Commure 初步禁令之后（通过 July 10 2025 合作和解），Strongline 客户支持现在由 Canopy 驱动。客户工作流推进方式是：供应商评估 →

              50–200 名临床医生环境式试点 → 企业合同 → 交叉销售自主编码 → 互动 / 智能体 → 将 Strongline 运营化。交叉销售动作是战略核心：既有账户每附着一个额外支柱，ARPU 都会复合。
