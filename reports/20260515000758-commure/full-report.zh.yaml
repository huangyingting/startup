  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              近期最实质的法律风险，是全行业的环境式 AI 患者同意诉讼。April 2026 N.D. Cal. 针对医疗系统的集体诉讼称，医疗系统在未事先取得患者同意的情况下使用环境式 AI
              工具录音——这一主张可能沿下游波及每一家环境式 AI 供应商。Commure 的缓释手段是供应商侧同意采集工作流加合同赔偿，但威胁覆盖整个品类。更早的 Canopy v. Commure 初步禁令（N.D.
              Cal. Apr 25 2025，Case 5:24-cv-02592-NW；Judge Noël Wise）是一起合作伙伴关系负面事件，涉及 Strongline 客户支持；该事件已通过 July 10
              2025 合作关系和解，现在由 Canopy 支撑 Strongline 客户支持——缓释成功，但也为类似合作伙伴纠纷提供了模板。联邦机构风险包括 HHS Office for Civil Rights 的
              HIPAA 执法（Commure 是每个客户的 Business Associate）、FDA AI/ML SaMD 适用范围界定（Commure 当前被定位在 SaMD 义务之外，因为环境式 AI 和编码属于
              CDS 工作流，而非按设备归类的组件；但 FDA 最新更新于 December 30 2025 的 1,000+ 个获批 AI/ML 设备滚动清单，是衡量适用范围的监管基线）、任何自主编码错误导致
              Medicare / Medicaid 错误计费所带来的 DOJ False Claims Act 敞口、FTC 根据 Section 5 对 AI 宣称执法，以及 Federal Register / CMS
              规则制定管线（CMS 支付规则变化会改变自主编码经济性）。州法又叠加了 50 州 PHI / 同意 / 窃听规则拼图。IP 风险中等——Augmedix 专利组合已在交割时转移，Commure
              未释放对竞争对手发起外向 IP 执法的信号。缓释成熟度：HIPAA / SOC 2 / HITRUST 控制符合行业标准；环境式 AI 同意工作流已存在；FDA SaMD 适用范围界定仍可争辩，需要持续法律监控。
