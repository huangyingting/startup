      - number: '1.3'
        title: 里程碑、并购与不利事件
        blocks:
          - type: paragraph
            body: >
              Commure 的里程碑主线由激进并购和资本投放主导。PatientKeeper

              是一家有 25 年历史的医院收费捕获和医生文档平台，August 2021 从 HCA Healthcare 剥离并纳入 Commure 组合；这也是更大范围战略合作的一部分，HCA 同时成为

              Commure 股权投资方和参考客户。Rx.Health 是 Mount Sinai 孵化的患者互动和数字疗法平台，服务 Yale New Haven、UnitedHealthcare

              等客户，于 November 2023（合并完成一个月后）被收购，并重新发布为 Commure Engage。公司披露过的最大收购是 Augmedix：交易于

              July 19, 2024 公布，每股 $2.35、全现金 $139 million；October 2, 2024 交割后，这家 Nasdaq 上市的远程书写先行者私有化，其环境式文档产品更名为

              Commure Scribe。December 2024，Commure 同意收购 AI 临床导航供应商 Memora Health（由 Kunaal Naik 创立，此前获得 Andreessen

              Horowitz、General Catalyst 和 Transformation Capital 支持）；交易于 2025 年初完成，并在 February 14, 2025 公开确认。其他里程碑包括早期收购

              Strongline 员工安全资产（面向临床胁迫报警的 RTLS 硬件 / 软件）、November 2024 面向 Tenet Physician Resources

              的企业级环境式 AI 全面推广、November 2025 与 Hughston Clinic 达成骨科企业 AI 交易、December 2025 向约 2,000 名 OB/GYN 临床医生部署

              OBHG 自主编码，以及 April 2026 推出 Commure Dictation。公司史上最重大的不利事件是 Canopy 初步禁令。April 25, 2025，Northern

              District of California 法官 Noël Wise（Case No. 5:24-cv-02592-NW）批准 Canopy 的初步禁令，认定 Canopy
              很可能在其主张的实体问题上胜诉：Commure

              违反经销商协议，并不当使用 Canopy 机密信息，通过逆向工程打造“仿冒” Strongline Pro 设备。争议随后和解；July 10, 2025，双方宣布建立

              “战略合作”，由 Canopy 接手 Commure Strongline 客户支持——这一结构性补救并不常见，实质上把争议产品线转给原告，同时保住客户连续性。
