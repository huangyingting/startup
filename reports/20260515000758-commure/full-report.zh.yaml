  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式、定价与 GTM
        blocks:
          - type: paragraph
            body: >
              Commure 从四条产品线变现，每条线的货币化形态不同。(1) 环境式 AI（Commure Scribe / Ambient AI / Dictation）：按临床医生年度席位授权收费，公开同行锚点为

              $1,800–$3,600 / 年（Abridge UPMC）和约 $2,400 / 年（Suki）；Commure 单席费率未公开披露，但 Hospitalogy 深度拆解称，HCA

              和类似大型 IDN 存在价值分享和企业定价安排。(2) 自主编码 / RCM（前身为 Athelas RCM）：按就诊或按已编码收费计价；OBHG 公开证据点显示 85%

              收费由 AI 编码，临床医生收费时间减少 83%，指向实质性单次收费经济性。(3) 患者互动（Commure Engage = Rx.Health 收购；Memora Health 于

              Feb 2025 被收购）：按患者触达或模块订阅收费，Memora 收购前客户群提供启动收入。(4) Strongline 员工安全 / RTLS：按徽章硬件 + 软件订阅收费；July 2025

              Canopy 合作后，该收入现在共同运营，当时初步禁令和解后由 Canopy 接管客户支持。GTM 动作以企业为主导：大型 IDN 机会从 KLAS 感知的供应商评估开始，经过

              50–200 名临床医生试点，再在 12–36 个月内升级为多产品企业合同。销售周期很长；Commure 的竞争回答是 GC Customer Value Fund，用 $200M 非稀释增长资本为企业 GTM
              背书——这是

              Commure 最有辨识度的融资结构，也只适用于与 General Catalyst 做战略交易的医疗系统。渠道以直销为主，EHR 集成合作（Epic Workshop、MEDITECH Expanse
              Now）扮演分发倍增器，而不是经销渠道。
