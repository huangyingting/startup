      - number: '5.3'
        title: 差异化、信任、合规与路线图
        blocks:
          - type: paragraph
            body: >
              差异化有五点。(1) 平台宽度：只有 Commure 在共享 OS 上覆盖环境式 + 编码 + 智能体 + 互动 + Strongline，GC Customer Value Fund

              又用非稀释增长资本支撑这份宽度。(2) EHR 宽度：60+ EHR 集成，包括深度 MEDITECH Expanse Now 嵌入，让 Commure 拥有环境式单点竞争对手缺少的非 Epic

              分发路径。(3) 客户规模：HCA Healthcare 锚定客户被 Hospitalogy 称为全国最大环境式 AI 推广；130–150 个系统和 350K+ 名临床医生验证了运营成熟度。(4)

              已验证成效：环境式 KLAS 93.3 / 100% 会再次购买；自主编码 OBHG 85% AI 编码 / 收费时间减少 83%。(5) 开发者信号：公开的 Commure GitHub

              组织，是医疗 AI 中罕见的建立信任动作。信任、安全与合规姿态覆盖 HIPAA（联邦）、州级 PHI 法律（50 州拼图）、环境式采集的州级双方同意法规（April 2026 N.D. Cal.
              集体诉讼凸显行业暴露）、SOC

              2 Type II（企业 SaaS 行业标准）、HITRUST（医疗系统常见要求），以及任何被归类为设备的组件所适用的 FDA AI/ML SaMD 框架。FDA 的 AI/ML 赋能医疗设备

              滚动清单已超过 1,000 项，为哪些属于、哪些不属于医疗设备提供了权威基线——Commure 当前定位下，环境式和编码产品属于非设备类临床决策支持工作流，在 FDA SaMD

              义务之外运营。2025–2026 路线图聚焦于：(a) 将 Commure Agents 扩展到运营自主性，(b) 加深 MEDITECH 和 Cerner / Oracle Health 集成，(c)
              降低人在回路

              QA 成本，(d) 增加专科模板（儿科、肿瘤、行为健康），以及 (e) 扩展由 Memora
              驱动的护理导航界面。风险包括：被收购技术栈之间的整合负债、基础模型依赖、超大规模云价格暴露，以及全行业同意权诉讼。每项风险都在

              TE004 中列出，并配有缓释 / 尽调要求。
