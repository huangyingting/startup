            title: 每临床医生 ACV 基准使用 Abridge / 公开锚点
            body: |
              自下而上规模测算使用 $1,800–$3,600 每临床医生 ACV 作为稳态基准，来源于公开 Abridge / Suki 合同标记和 Becker's 分析师评论。Commure
              实际单席经济性未披露，且可能有重大差异；该假设的敏感性很高。
