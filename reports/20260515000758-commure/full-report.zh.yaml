      - number: '3.2'
        title: 差异化、定价与能力
        blocks:
          - type: paragraph
            body: >
              Commure 自称的差异化在于平台宽度：同一个操作系统上覆盖环境式 AI、自主编码、智能体、互动和 Strongline（现由 Canopy 驱动），并配以 General Catalyst Customer
              Value Fund

              的非稀释增长资本。独立验证呈现“偏正面但不完全一致”：KLAS First Look 给 Commure Ambient AI 打出 93.3 / 100 和 100%

              会再次购买，客户满意度位于 ACI 厂商第一梯队；自主编码侧，OBHG 案例数据显示收费时间减少 83%，85% 收费由 AI 编码。但在准确性和 Epic 原生深度上，Abridge

              仍然拥有决定性领先——Becker's 分析师评论反复把 Abridge 识别为 Epic 首选环境式合作伙伴，Abridge 在 UPMC、Kaiser 和 Sutter
              的胜利也让它成为事实上的蓝筹选择。Microsoft

              Dragon Copilot 的定价捆入 Microsoft 365 / Azure 协议，从下方攻击独立 ACI ACV；公开每临床医生锚点从 $1,800–$3,600 / 年（Abridge

              UPMC）到约 $2,400（Suki 捆绑评论）不等。Commure 单席价格未披露，但 Hospitalogy 深度拆解和 GC CVF 结构显示，它更可能采用价值分享 /
              与成效挂钩的模式，而非固定按临床医生席位收费。RCM

              侧，Waystar 和 R1 是拥有数十亿 ARR 的规模型既有厂商；Commure 的自主编码更窄，但增长更快，并可从环境式 AI 席位授权切入可信的交叉销售。能力分析显示，Commure

              在平台宽度和 HCA 级运营上领先，在 EHR 集成数量（60+）上与同行相当，在 Epic 原生深度上落后 Abridge，在企业 RCM 规模上落后 Waystar /
              R1。下方买方标准矩阵针对七项标准，对七个最相关同行打分；没有公开证据的单元格标为未知，而不是猜测。
