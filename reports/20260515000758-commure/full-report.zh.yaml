      - number: '2.3'
        title: 买方、采用路径、驱动因素与约束
        blocks:
          - type: paragraph
            body: >
              在美国医疗系统内部，Commure 的经济买方通常是 CIO / CMIO、CFO / RCM Vice President，以及越来越多的 Chief Digital Officer 或 AI Officer
              三方组合。大型 IDN（≥10 家医院）的最终批准需要

              CEO，且通常需要董事会数字战略委员会；HCA 的企业级推广由高管层批准，并由 Hemant Taneja 的 General Catalyst
              明确背书。最终用户是医生、高级执业临床医生、护士（环境式场景）和收入周期员工（自主编码场景）。采用路径呈典型漏斗：供应商展会 / KLAS

              评审 → 50–200 名临床医生试点（3–6 个月）→ 企业合同（12–36 个月）→ 平台扩张（RCM、智能体、导航）。增长驱动很强：临床医生倦怠（Mayo Clinic Proceedings

              发现，下班后 EHR 时间对应倦怠翻倍）；KLAS First Look 研究展示 11–25% 生产率提升；持续的劳动力通胀和收紧的 Medicare 利润率给 CFO 施压；Epic

              接纳 Workshop 合作伙伴；Menlo 发现医疗采用速度已是更广泛经济体的 2.2x。约束同样重要：(1) April 2026 N.D. Cal. 集体诉讼（Washington v. health

              systems）指控未事先同意就非法录音——这是全行业同意 / 双方同意法律风险；(2) HIPAA、州级 PHI 法律和 FDA AI/ML-enabled device 指引，且 FDA 的 AI/ML
              SaMD 授权滚动清单已超过

              1,000 项；(3) Epic 和 MEDITECH 把守入口，迫使供应商在原生嵌入和 EHR 无关定位之间取舍；(4) 切换成本——一旦医院投入文书模板、计费规则和

              MyChart 类集成，替换就很痛；(5) 资本强度——企业销售周期会先消耗现金再产生收入，这也是 General Catalyst Customer Value Fund 结构对 Commure
              增长如此重要的原因。
