      - 假设
      - 估值区间（投后）
      - 概率信号
    rows:
      - - 乐观
        - HCA 扩张 + 每年签下 5 个多支柱 IDN + ARR 再连续 2 年翻倍 + KLAS 守住 + 行业同意风险受控
