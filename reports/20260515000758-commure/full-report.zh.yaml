  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图——五个桶，一个买方
        blocks:
          - type: paragraph
            body: >
              美国医疗系统买方面对五种不同路径，来解决 Commure 覆盖的工作。第一桶——直接环境式 AI——最拥挤。Abridge 拥有 $5.3B Series E 资金支持和

              UPMC 的 $1B+ 企业级胜利，是 Epic 嵌入式环境文档的共识领导者。Microsoft / Nuance Dragon Copilot 把 DAX 折入 Microsoft

              365 技术栈，并与 Microsoft Cloud for Healthcare 捆绑；Menlo Ventures 估计 Microsoft / Nuance 在 ACI 收入池中份额约

              33%。Suki 横跨 100+ 专科，在 iOS / Android 上销售，定位为 EHR 无关。DeepScribe 聚焦专科护理，强调工作流编码。Ambience

              Healthcare 是最近成为独角兽的厂商，完成 $243M Series C / $1B+ 估值，宣称“竞争性评选第一”、80% 使用率和病历记录时间减少

              45%。Nabla 是欧洲起家的多模态玩家，在美国企业市场已有牵引。第二桶——RCM 与自主编码——由 Waystar（上市公司；“智能体 AI、生成式 AI 和高级自动化”）、R1 RCM（2024 年由
              TowerBrook + Clayton Dubilier & Rice 私有化后重新变为私有公司）以及 Optum

              垂直整合的 UnitedHealth 产品主导；Epic 原生计费规则和 Cerner / Oracle Health 则构成嵌入式选项。第三桶——诊所管理和工作流 OS 挑战者——包括 Notable

              的 AI 平台、athenahealth 的 athenaCollector、Tebra（Kareo + PatientPop）以及面向患者互动的 Phreesia。第四桶——替代品——按收入最大：内部

              RCM 员工（美国 $20B 医疗机构 RCM 软件机会的大头目前仍在内部消耗）、人工医疗文书（$5–8B 劳动力池）和医生下班后文档工作。第五桶——自建还是购买——是 Commure

              最有战略意义的风险：Epic Workshop 原生厂商和大型 IDN 内部 AI 团队（Mayo Clinic Platform、Cleveland
              Clinic、Kaiser-Abridge）可能通过优待竞争供应商（Abridge

              在 UPMC 和 Kaiser、Suki 在 MedStar）或自建专有技术栈，侵蚀 Commure 的价值主张。在小型社区医院中，维持现状、“什么都不做”仍是概率最高的结果。
