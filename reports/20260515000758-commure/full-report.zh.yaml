    title: 风险传导图
    type: dag
    layout: standard
    summary: 上游监管与合作伙伴风险如何沿 Commure 产品面传导，最终影响财务表现和客户信任。
    data:
      nodes:
        - id: consent
          label: Apr 2026 Ambient AI 同意权集体诉讼（行业）
        - id: hhs
          label: HHS-OCR HIPAA 执法
        - id: fda
          label: FDA AI/ML SaMD 范围界定
        - id: cms
          label: CMS 支付规则变化
        - id: doj
          label: DOJ FCA 风险敞口
        - id: ambient
          label: Commure Ambient AI
        - id: coding
          label: Commure Autonomous Coding
        - id: customer
          label: 客户信任 / 采购
        - id: revenue
          label: 收入 / 利润率
      edges:
        - from: consent
          to: ambient
          label: 若穿透隔离，供应商侧责任
        - from: ambient
          to: customer
          label: 信任受损
        - from: hhs
          to: ambient
          label: BAA / 泄露风险敞口
        - from: hhs
          to: coding
          label: BAA / 泄露风险敞口
        - from: fda
          to: ambient
          label: 范围界定与重新分类风险
        - from: cms
          to: coding
          label: 支付规则改变利润率
        - from: doj
          to: coding
          label: FCA 单项索赔风险敞口
        - from: customer
          to: revenue
          label: 采购速度
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR007
