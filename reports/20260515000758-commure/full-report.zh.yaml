  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、相邻领域与替代品
        blocks:
          - type: paragraph
            body: >
              Commure 横跨四个不同医疗技术品类。它们都卖给同一个企业级医疗系统买方，却出现在不同供应商清单上。第一类是环境式临床智能（ACI）——用生成式 AI 捕捉并结构化患者与临床医生对话的产品。Menlo

              Ventures 和 Becker's Hospital Review 估计，2025 年美国 ACI 软件市场的经常性收入约为 $600 million，其中 Microsoft / Nuance DAX（约
              33%

              份额）、Abridge（约 30% 份额）占据头部，剩余部分由长尾厂商（Suki、DeepScribe、Nabla、Ambience Healthcare、Commure

              Scribe、Sunoh、Freed）瓜分。第二类是收入周期管理（RCM）软件和服务——这是建立在 $4.9 trillion 美国国家医疗支出之上的更大、更慢增长的池子；Commure

              的自主编码和端到端 RCM 产品与 R1 RCM、Waystar、Optum、athenaCollector 以及大型 IDN 的内部 RCM 运营竞争。第三类是患者互动 / 护理导航（Commure

              Engage 和 Memora）——这是一个分散、低于 $2 billion 的细分市场，与 WELL Health、Notable、收购前的 Memora、Vivify
              以及消费者“前门”玩家共用。第四类是医疗员工安全 / RTLS（Strongline，现在由 Canopy 驱动）——一个低于 $500M 的硬件加软件利基市场，由
              Canopy、Vocera（Stryker）、Cognosos

              和 CenTrak 主导。Commure 的可触达边界不包括：临床决策支持、药物发现 AI、支付方利用率管理 AI、消费者健康、远程医疗视频基础设施和设备制造。Commure
              在多数企业销售周期中真正替代的现状，并不是某个竞争性 AI 产品，而是人工医疗文书（美国 $5–8

              billion 劳动力池）、内部 RCM 员工和医生下班后补病历时间的组合——这也是为什么 ROI 案例高度依赖节省人力，而不是拉动收入。
