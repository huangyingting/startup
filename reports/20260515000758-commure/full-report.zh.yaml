        title: 运营、安全、财务与合作伙伴风险
        blocks:
          - type: paragraph
            body: >
              运营和安全风险集中在多租户云 HIPAA 范围（优先 AWS 部署）、基础模型 BAAs（多供应商降低单一 LLM 供应商集中度）、分处理方合规纪律，以及未公开披露的渗透测试节奏。质量风险包括环境式 AI
              幻觉控制和自主编码准确率——二者都有公开失败模式（病历内容错误、费用编码错误），需要 HITL 审核和审计日志。可靠性风险来自超大规模云厂商宕机敞口和 EHR 供应商 API 可用性。财务 /
              模型风险反映了并购驱动增长：PatientKeeper（Aug 19 2021）、Rx.Health（Nov 21 2023）、Augmedix（$139M 现金交割 Oct 2 2024）和 Memora
              Health（Feb 14 2025）带来整合债，CommureOS 平台层意在消化这笔债，但尚未得到独立验证。$200M General Catalyst Customer Value Fund 融资（Jun
              19 2025）是最近披露的资本事件，结构是为共同出资客户部署而设的非稀释性增长资本。环境式 AI 毛利结构取决于 HITL QA 成本下降（承自 Augmedix 的全球审核中心）。合作伙伴 /
              依赖风险高度集中：HCA Healthcare 锚定客户、EHR 合作伙伴计划（Epic Workshop、MEDITECH Expanse Now、Oracle Health）、AWS
              超大规模云厂商、Canopy 供应的 Strongline 运营（Jul 2025 之后）、GC CVF 资本，以及承自 Augmedix 的经销 /
              合作伙伴网络。每一项都靠有意多元化缓释，但每一项仍是结构性单点敞口。监管监控（CMS、ONC、HHS-OCR）是一项持续运营纪律，不是一次性控制。
