      - number: '4.3'
        title: 资本结构、牵引与充足性
        blocks:
          - type: paragraph
            body: >
              Commure 的资本结构由三根支柱构成：(1) General Catalyst 领投的新股融资（Hemant Taneja 担任董事长），共同投资方包括 HCA
              Healthcare（战略方）、Sequoia、Greylock、8VC、Y

              Combinator、Tribe Capital 和 Initialized Capital；(2) 合并对价，将 Athelas（May 2022 以 $1.5B 完成 $132M Series C）与

              Commure 在 October 2023 合并为 $6B 隐含投后实体；(3) June 19 2025 General Catalyst Customer Value Fund 的 $200M
              非稀释增长融资承诺，结构上为企业 GTM

              和客户扩张背书，同时不重估股权。Augmedix 收购在 2024 年短暂带来上市公司财务透明度——Augmedix 的 SEC 文件（CIK 0001769804）记录了每股

              $2.35 现金、合计 $139M 交易价值的合并对价，October 2, 2024 交割，文件索引 0001193125-24-230765。公开牵引指标有限但一致：公司评论称

              ARR 连续三年翻倍；服务 130–150 个医疗系统；平台上有 350K+ 名临床医生；处理 40M+ 次环境式就诊；每年处理 $25B+ 索赔；并在 2025 后期和 2026

              初期拿下 OBHG / DRH Health 客户。未来 24-36 个月资本充足性看起来很强：GC CVF 提供企业 GTM 资金；HCA 承担量；Augmedix / Memora / Rx.Health

              整合大体已付清；没有公开信号显示 Commure 必须马上进行新股融资。能达到投资决策级财务承保的主要阻碍是：(a) 缺少经审计收入和毛利率，(b) 缺少客户队列留存数据，(c) 2023 年以来没有合并后重估。
