              0001193125-24-230765，Augmedix Inc. CIK 0001769804）。June 19 2025 的 $200M General Catalyst Customer Value
              Fund 融资是最近披露的资本事件，结构为非稀释性增长资本，共同出资客户部署。Hospitalogy 和 HIT Consultant 称 Commure 的 ARR 已连续三年翻倍。我们没有 June 2025
              融资公开披露的投后估值或收入倍数；分析师评论把该轮视为标杆 CVF 配置。入场纪律：二级 / 后期成长型投资应锚定 $6–10B 投后公允价值区间，并在 NDA 下验证 top-5 客户占比、NRR / GRR
              / 流失率和合同期限后再定仓。TV003 的乐观 / 基准 / 悲观情景框定结果范围。可比集合（TV004）：公开环境式 AI 参考包括 Microsoft Nuance（$19.7B 2022
              收购，并购参考）；Oracle Health（Cerner $28.3B 2022 收购）；私有同业轮次包括 Abridge（分析师评论称 2024–2025 多轮投后估值 $2B+），合并前 Athelas
              提出的 $4.5T 行政成本框架仍是宏观锚。可比分析把 Commure 视为相对仅做环境式 AI 的同业有溢价的平台型标的。退出准备度：后期轮次可提供二级流动性；战略退出对象包括 Optum /
              Microsoft / Oracle Health；2027–2028 医疗 AI 公开市场条件将决定 IPO 情景。
