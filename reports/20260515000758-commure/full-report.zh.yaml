      - number: '3.3'
        title: 护城河耐久性、切换成本与反向证据
        blocks:
          - type: paragraph
            body: >
              护城河分析必须同时处理 Commure 的三股强顺风和三项结构性风险。顺风：(1) General Catalyst Customer Value Fund 提供 $200M
              非稀释增长资本，竞争对手很难复制；GC 通过

              Hemant Taneja 主持董事会，并为企业 GTM 周期背书。(2) HCA Healthcare 锚定合作（Hospitalogy 称其为美国最大环境式 AI 推广）创造了规模化参考客户，Abridge
              / Suki / Microsoft

              在社区医院细分中难以匹配。(3) 平台宽度让 Commure 能从环境式席位授权落地后，继续扩到自主编码、智能体和互动——叠加每个系统的 ARPU。风险：(1) Epic

              Workshop 在环境式场景偏向 Abridge，迫使 Commure 依赖 MEDITECH 合作和 EHR 无关定位；Becker's 指出，约三分之二 Epic 医院使用环境式 AI 工具，其中

              Abridge 是主导合作伙伴。(2) 超大规模云厂商捆绑——Microsoft Dragon Copilot 内置于 Microsoft 365——可能把环境式定价商品化，挤压 Commure
              的独立席位授权业务。(3)

              法律暴露重大且正在显化：Canopy v. Commure（Case 5:24-cv-02592-NW）在 April 2025 产生初步禁令，迫使 Commure 从 Strongline 中移除 Canopy

              代码（随后通过 July 10 2025 合作和解，由 Canopy 接管 Strongline 客户支持）；April 2026 N.D. Cal. 针对医疗系统的环境式 AI
              同意权集体诉讼，是可能放慢新部署的全行业阴影。切换成本分析显示，一旦医院投入环境式模板、计费规则、MyChart

              类集成以及企业 SSO / FHIR 管线，替换就很痛——DRH Health 决定在其 MEDITECH 基础上切换到 Commure 环境式
              AI，就花费了有意义的试点时间。下方护城河耐久性登记表把每项护城河主张、威胁严重度和尽调要求逐项列出。
