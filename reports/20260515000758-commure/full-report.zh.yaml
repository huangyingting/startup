  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 支柱
      - 投资逻辑
      - 反向逻辑
    rows:
      - - 平台广度
        - 五大支柱 OS 覆盖环境式 AI + 编码 + Engage + Agents + Strongline
        - 被收购技术栈的整合债可能侵蚀单位经济
      - - EHR 覆盖
        - 60+ 个 EHR 集成，包括 MEDITECH Expanse Now 嵌入和 Oracle Health 合作
        - 合作伙伴计划变化可能压缩利润率或分发
      - - 客户规模
        - HCA 锚定 + 130–150 个系统 + 350K 临床医生；40M+ 次环境式 AI 预约
        - HCA 单一锚定客户集中，但未公布占比；长尾流失未知
      - - 已验证结果
        - KLAS 93.3 / 100% 愿再次购买；OBHG 85% AI 编码 / 时间减少 83%
        - 环境式 AI 走过 First Look 阶段后，KLAS / 品类满意度可能下滑
      - - 资本与治理
        - $200M GC CVF（Jun 19 2025）非稀释增长资本 + Taneja 任董事长
        - GC CVF 容量下调，或赞助方治理压力悬顶
      - - M&A 整合
        - PatientKeeper、Rx.Health、Augmedix（$139M Oct 2024）、Memora（Feb 2025）全部并入 CommureOS
        - 整合债；交割后经销商生产力未获公开验证
      - - 监管姿态
        - 非设备 CDS 定位；同意捕获工作流；HITL 审计
        - Apr 2026 N.D. Cal. 环境式 AI 同意集体诉讼；FDA SaMD 重新分类风险
      - - 基础模型策略
        - 多供应商 LLM 组合缓解单一供应商锁定
        - 基础模型商品化可能侵蚀环境式 AI 溢价
      - - 开发者信号
        - 公开的 github.com/commure 组织是少见的信任信号
        - 开源姿态尚未验证到深度成熟
      - - 宏观背景
        - $4.5T 医疗；每年 $500B 行政开支（Athelas YC W17 框架）
        - 宏观预算压力可能拖慢 AI 采购周期
    notes: 支柱清单反映投资逻辑的主要证据输入。
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Ten thesis / anti-thesis pillars covering platform, EHR, customer, outcomes, capital, M&A, regulatory, model,
        developer, and macro.
