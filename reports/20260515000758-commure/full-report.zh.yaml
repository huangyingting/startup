      - number: '2.4'
        title: 图表
        blocks:
          - type: callout
            title: ACI 前两大供应商集中度限制 Commure 定价权
            body: >
              Menlo Ventures 的分析（Becker's Hospital Review 亦有佐证）发现，Microsoft / Nuance 与 Abridge 合计持有约三分之二的

              $600M 环境式 AI 收入池。Commure 的战略回答，是靠平台宽度（RCM + 智能体 + 互动）竞争，而不是只靠环境式席位授权；因为正面迎战 Abridge 的 Epic
              原生分发，环境式定价在结构上不利。
            calloutType: insight
            claimRefs:
              - CM007
              - CM008
              - CM010
          - type: callout
            title: 全行业同意权诉讼可能放慢新部署
            body: >
              April 2026，使用环境式 AI 文书的医疗系统在 Northern District of California 遭遇 Washington 集体诉讼；这是继 late 2025 年 Sharp
              Healthcare 之后第二起高关注度同意权诉讼，显示全行业法律暴露。即便

              Commure 尚未被列名，每个医疗系统买方现在都会更尖锐地追问同意采集和音频留存政策——试点因此放慢，采购周期也被拉长。
            calloutType: risk
            claimRefs:
              - CM024
              - CM025
          - type: callout
            title: 医疗 AI 采用速度是十年一遇的顺风
            body: |
              Menlo 发现，医疗 AI 采用率在 24 个月内从 3% 提升到 27%（已在医疗系统生产环境中使用）——9x 爬坡，速度是更广泛经济体的
              2.2x。这是任何垂直软件品类多年未见的最强需求背景，也是多个医疗 AI 独角兽诞生的主要原因。
            calloutType: strength
            claimRefs:
              - CM019
              - CM020
