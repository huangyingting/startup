  - id: FR001
    title: 风险热力图
    type: matrix
    layout: standard
    summary: 按可能性（行）和影响（列）绘制主要风险，最重的风险簇是全行业同意权诉讼，以及自主编码上的 FCA 风险敞口。
    data:
      columns:
        - 高影响
        - 中影响
        - 低影响
      rows:
        - label: 高可能性
          values:
            - Apr 2026 Ambient AI 同意权集体诉讼；CMS 支付规则变化；州级双方同意法规
            - AI 治理导致采购周期延迟；KLAS 下滑
            - ONC 信息阻断执法
        - label: 中等可能性
          values:
            - 自动编码的 DOJ FCA 风险敞口；HHS-OCR HIPAA 执法；子处理方导致 PHI 泄露
            - 被收购团队管理层流失；基础模型供应商宕机
            - Strongline 硬件可靠性
        - label: 低可能性
          values:
            - FDA SaMD 重新分类；关键人离职（CEO）
            - 专利 / IP 侵权；多租户隔离失效
            - AWS 区域故障；SSO 失陷
    claimRefs:
      - CR001
      - CR003
      - CR004
      - CR007
      - CR013
      - CR026
