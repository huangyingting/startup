      - number: '5.2'
        title: 架构、集成与运营模式
        blocks:
          - type: paragraph
            body: >
              CommureOS 是托管在超大规模云基础设施上的多租户云原生平台（AWS 优先，与 Commure 在 AWS for Healthcare & Life Sciences 生态中的定位一致）。数据交换使用
              HL7 FHIR

              R4（美国主导互操作标准）加上 EHR 厂商专有 API：面向 Epic 的 Epic Workshop / Smart-on-FHIR、面向 MEDITECH 的 MEDITECH Expanse Now
              嵌入（Sep

              16 2025 公布）、原生 Oracle Health / Cerner 集成，以及 Commure 首页所称共 60+ 个 EHR。环境式 AI 管线是混合技术栈：实时音频捕捉（移动 /
              Web）、自动语音识别（内部与基础模型合作伙伴混合）、大语言模型推理用于病历结构化（Commure

              称其与主要基础模型供应商有合作关系）、专科模板后处理，以及从 Augmedix 收购前全球交付运营继承的人在回路
              QA——合并后的自动化路线图旨在降低这条人工审阅长尾。自主编码增加编码规则引擎、支付方特定编辑，以及向

              EHR 计费模块写回。Engage 和 Agents 利用 CommureOS 事件流、EHR 写回和外呼通知渠道（SMS、语音、MyChart 式门户）。Strongline

              是硬件 + 软件 RTLS 部署。开发者界面通过 Commure GitHub 组织公开（github.com/commure 可见，拥有多个仓库；这在医疗 AI
              供应商中并不常见，也是有意义的开发者信任信号）。可靠性和支持遵循企业 SaaS

              常规：24×7 NOC、企业合同中的明确 SLA，以及挂靠大型 IDN 部署（HCA、Tenet、Providence）的现场工程团队。关键依赖包括：基础模型供应商、超大规模云可用性、EHR

              厂商合作伙伴计划，以及 Canopy 提供的 Strongline 运营。
