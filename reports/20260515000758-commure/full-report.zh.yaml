            title: 资本厚度与 General Catalyst 绑定是结构性的
            body: >
              在临床 AI 供应商中，没有谁像 Commure 一样与 General Catalyst 形成如此深的结构性资本绑定。Hemant Taneja 担任董事长，GC 孵化了最初的

              Commure 实体，June 2025 Customer Value Fund 的 $200M 承诺明确设计为非稀释、与绩效挂钩的资本。这给了 Commure
              定价权和现金跑道叙事；竞争对手（Abridge、Suki、DeepScribe、Nabla）只能用股权融资条件来对抗。
