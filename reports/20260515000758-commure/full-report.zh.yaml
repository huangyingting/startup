      - number: '1.2'
        title: 创始人、领导层、治理与资本
        blocks:
          - type: paragraph
            body: >
              Tanay Tandon 担任合并后公司的 CEO。2016 年，他与 Deepika Bodapati 在 Stanford 本科期间共同创立

              Athelas；二人此前参与的 AI / 计算机视觉项目曾获得 Intel 和 Davidson Institute 认可。Bodapati 是 COO；

              Dhruv Parthasarathy 是 MIT 训练出的计算机科学家，加入 Athelas 时担任 CTO，合并后继续担任同一职位。董事会由

              General Catalyst 的 CEO 兼董事总经理 Hemant Taneja 担任主席；他把 Commure 定位为 GC “Health

              Assurance” 投资逻辑中的核心运营资产。合并公告中披露的其他具名董事和活跃支持者包括 Quentin Clark（曾任 SAP 高管 / Dropbox

              SVP，现 General Catalyst）、Qasar Younis（Applied Intuition CEO），以及锚定战略投资方 HCA Healthcare 的一名资深数字医疗代表。Sequoia

              Capital、Greylock、Y Combinator、8VC、Tribe Capital 和 Initialized Capital 是已披露的 Athelas 侧投资人，并通过合并成为

              Commure 股东。2021 年收购 PatientKeeper 时，Brent Dover 曾担任 Commure CEO；与合并相关的领导层交接中，他退到一边。过去 24 个月最关键的融资事件，是

              June 19, 2025 宣布 General Catalyst Customer Value Fund 投入 $200 million
              增长投资——这是非稀释、与绩效挂钩的资本工具，明确用于在不重估股权结构表的情况下支持市场拓展。Commure

              还披露，其年经常性收入（ARR）“已达数亿美元规模”，已连续三年翻倍，但公司没有发布经审计收入数字，2023 年之后的新股估值标记也未正式重置。
