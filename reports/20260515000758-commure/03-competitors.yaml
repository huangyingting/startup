  - id: differentiation
    title: Differentiation, Pricing and Capability
    body: |
      Commure's stated differentiation is platform breadth: ambient AI, autonomous coding,
      agents, engagement, and Strongline (now Canopy-powered) on one operating system, sold
      with non-dilutive growth capital from General Catalyst's Customer Value Fund. Independent
      validation is mixed-positive: KLAS First Look scored Commure Ambient AI 93.3 / 100 with
      100% would-buy-again, placing Commure in the top tier of ACI vendors on customer
      satisfaction; OBHG case data shows 83% charge-time reduction and 85% AI-coded charges
      on the autonomous-coding side. On accuracy and Epic-native depth, however, Abridge
      retains a decisive lead — Becker's analyst commentary repeatedly identifies Abridge as
      Epic's preferred ambient partner, and Abridge's UPMC, Kaiser, and Sutter wins establish
      it as the de-facto blue-chip choice. Microsoft Dragon Copilot's pricing is bundled
      into Microsoft 365 / Azure agreements, attacking the standalone ACI ACV from below;
      published per-clinician public anchors range from $1,800–$3,600/year (Abridge UPMC) to
      ~$2,400 (Suki bundle commentary). Commure's per-seat pricing is not disclosed, but the
      Hospitalogy deep-dive and the GC CVF structure suggest a value-share / outcomes-tied
      model rather than fixed per-clinician seat pricing. On RCM, Waystar and R1 are scale
      incumbents with multi-billion ARR; Commure's autonomous coding is narrower but faster-
      growing, with a credible cross-sell motion off the ambient AI seat-license. Capability
      analysis shows Commure leading on platform breadth and HCA-scale operations, on parity
      with peers on EHR integration count (60+), and behind Abridge on Epic-native depth and
      behind Waystar/R1 on enterprise RCM scale. The buying-criteria matrix below scores
      seven criteria across the seven most-relevant peers; cells without published proof are
      flagged as unknowns rather than guessed.
    claimRefs:
