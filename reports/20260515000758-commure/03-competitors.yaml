  - id: moat-and-risks
    title: Moat Durability, Switching Cost and Adverse Evidence
    body: |
      Moat analysis must reconcile three powerful Commure tailwinds with three structural
      risks. Tailwinds: (1) the General Catalyst Customer Value Fund supplies $200M of non-
      dilutive growth capital that competitors cannot easily replicate; GC chairs the board
      via Hemant Taneja and underwrites enterprise GTM cycles. (2) HCA Healthcare anchor
      partnership (the largest ambient AI rollout in the U.S. per Hospitalogy) creates a
      reference customer at scale that Abridge / Suki / Microsoft cannot match in the
      community-hospital segment. (3) Platform breadth lets Commure expand land-and-expand
      from ambient seat-licenses into autonomous coding, agents, and engagement —
      compounding ARPU per system. Risks: (1) Epic Workshop privileges Abridge for ambient
      and forces Commure to rely on MEDITECH partnership and EHR-agnostic positioning;
      Becker's notes that ~two-thirds of Epic hospitals use ambient AI tools, with Abridge
      as the dominant partner. (2) Hyperscaler bundling — Microsoft Dragon Copilot inside
      Microsoft 365 — could commoditize ambient pricing and squeeze Commure on the
      standalone seat-license business. (3) Legal exposure is material and crystalizing:
      Canopy v. Commure (Case 5:24-cv-02592-NW) produced a preliminary injunction in
      April 2025 forcing Commure to remove Canopy code from Strongline (settled via the
      July 10 2025 partnership where Canopy assumed Strongline customer support); the
      April 2026 N.D. Cal. ambient-AI consent class action against health systems is a
      sector-wide overhang that could slow new deployments. Switching cost analysis shows
      that once a hospital invests in ambient templates, billing rules, MyChart-equivalent
      integrations, and enterprise SSO / FHIR plumbing, swap-out is painful — DRH Health's
      decision to switch to Commure ambient AI on its MEDITECH base took meaningful pilot
      time. The moat-durability register below catalogs each moat claim against its
      threat severity and a diligence ask.
