callouts:
  - calloutType: insight
    title: Commure wins on breadth, loses on Epic-native ambient depth
    body: |
      Across the seven peer comparison, Commure is the only vendor with material capability
      across all four pillars (Ambient + Coding + Agents + Engagement) plus a workforce-safety
      bolt-on. But on the single most important ambient AI buying criterion — Epic-native
      accuracy and reference customers — Abridge is the consensus leader (UPMC, Kaiser,
      Sutter). The strategic implication is that Commure must keep cross-selling RCM and
      agents into ambient accounts to preserve ARPU as Microsoft Dragon Copilot bundling
      and Abridge's Epic-native advantage compress standalone ambient pricing.
    claimRefs:
      - CP011
      - CP013
      - CP014
  - calloutType: risk
    title: Microsoft Dragon Copilot bundling is the under-priced threat
    body: |
      Microsoft has folded Nuance DAX into Dragon Copilot inside the Microsoft 365 / Azure
      stack, which means health systems already paying Microsoft for productivity and
      cloud can add ambient documentation as a line-item rather than a standalone
      contract. This bundling pressure is the single most likely catalyst for ACI per-seat
      ACV compression industry-wide, and Commure's standalone-priced ambient business is
      directly exposed.
    claimRefs:
      - CP002
      - CP013
      - CP027
  - calloutType: risk
    title: Sector-wide consent litigation undercuts the moat narrative
    body: |
      The April 2026 class action filed in the N.D. Cal. against health systems using
      ambient AI (and the prior 2025 Sharp HealthCare case) signal that patient consent
      and audio-retention practices are a sector-wide legal vulnerability. Even though
      Commure is not (yet) named, every Commure deal now requires negotiated
      indemnification and a consent-capture work-stream — slowing deployments.
    claimRefs:
      - CP024
      - CP029
  - calloutType: assumption
    title: Cells marked "Not disclosed" / "Limited" reflect actual evidence gaps
    body: |
      Multiple cells in the capability matrix and pricing comparison are marked "Not
      disclosed" or "Limited" because vendor pricing and full capability surfaces are
      private. These are flagged as evidence gaps rather than guessed; an enterprise
      diligence engagement would request mutual NDAs and price-list disclosures.
    claimRefs:
      - CP018
      - CP019
