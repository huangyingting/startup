  topStrengths:
    - HCA Healthcare 锚定合作，叠加平台上 130–150 家医疗系统和 350,000+ 名临床医生。
    - KLAS Ambient AI First Look 得分 93.3 / 100，100% 客户愿意再次购买——这是该类别最强的独立满意度信号。
    - OBHG（2025 年 12 月 4 日）——200+ 个站点、2,000 名临床医生、85% 费用由 AI 编码、三个月内收费耗时下降 83%——验证多支柱交叉销售。
    - $200M General Catalyst Customer Value Fund 于 2025 年 6 月 19 日完成募集，为客户部署提供非稀释增长资本共同融资。
    - 五支柱 OS（ambient + coding + engagement + agents + Strongline）跑在共享 CommureOS 上，在 ambient AI 同行中产品表面积少见地宽。
    - 60+ 个 EHR 集成，包括 MEDITECH Expanse Now 嵌入（2025 年 9 月 16 日）和 Oracle Health 合作。
    - 并购驱动整合（PatientKeeper、Rx.Health、2024 年 10 月 2 日以 $139M 收购 Augmedix、2025 年 2 月 14 日收购 Memora Health），扩展支柱表面积和客户簿。
    - Hospitalogy 和 HIT Consultant 分析师评论称，ARR 已连续三年翻倍。
  topRisks:
    - 2026 年 4 月，加州北区针对医疗系统的 ambient AI 同意权集体诉讼，为全行业供应商责任带来悬顶风险。
    - HCA Healthcare 单一锚定客户集中度高，但前五大客户占比未公开，形成收入集中风险。
    - PatientKeeper、Rx.Health、Augmedix 和 Memora 的并购整合债如果不能快速收拢到 CommureOS 下，可能侵蚀单位经济性。
    - 随着技术成熟并越过 KLAS First Look 阶段，基础模型商品化可能挤压 ambient AI 类别溢价。
    - Canopy v. Commure 初步禁令案（2025 年 4 月 25 日，加州北区，案号 5:24-cv-02592-NW）已于 2025 年 7 月 10 日以合作方式和解；IP 诉讼敞口仍是风险向量。
  unresolvedGaps:
    - 前五大客户收入占比和单客户 ARR 区间（HCA 集中度未验证）。
    - NRR / GRR / 流失率 / 队列留存曲线和平均合同期限。
    - 基础模型供应商组合、子处理方清单、BAA，以及 12 个月渗透测试摘要。
    - 2025 年 6 月 GC Customer Value Fund 轮的投后估值和收入倍数。
    - SOC 2 Type II 报告年份、HITRUST CSF 认证级别，以及 FDA SaMD 范围备忘录 + 律师意见。
