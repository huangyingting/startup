  - id: financing-context-and-scenarios
    title: Financing Context, Scenarios, and Comparables
    body: |
      Financing context: October 23 2023 merger closed at $6B implied valuation with Tandon
      CEO, Bodapati COO, Parthasarathy CTO, and Hemant Taneja (GC) chair. Augmedix close
      on October 2 2024 at $2.35/share / $139M cash (per SEC EDGAR filing 0001193125-24-
      230765, Augmedix Inc. CIK 0001769804). The $200M General Catalyst Customer Value
      Fund financing on June 19 2025 is the most recent disclosed capital event and is
      structured as non-dilutive growth capital co-financing customer deployments.
      Commure's ARR has doubled in three consecutive years per Hospitalogy and HIT
      Consultant. We do not have a publicly disclosed post-money or revenue multiple from
      the June 2025 financing; analyst commentary treats the round as a marquee CVF
      placement. Entry discipline: secondary / late-stage growth tickets should anchor to
      $6–10B post-money fair-value range and require a verified top-5 customer share, NRR
      / GRR / churn, and contract length under NDA before sizing. Bull / base / bear cases
      in TV003 frame the outcome range. Comparable set (TV004): public ambient AI
      references include Microsoft Nuance ($19.7B 2022 acquisition, M&A reference);
      Oracle Health (Cerner $28.3B 2022 acquisition); private peer rounds include
      Abridge (post-money $2B+ rounds across 2024–2025 per analyst commentary), and the
      pre-merger Athelas $4.5T administrative-cost framing remains the macro anchor.
      Comparable analysis treats Commure as a Premium platform play vs ambient-only
      peers. Exit readiness: secondary liquidity via late-stage rounds; strategic exit via
      Optum / Microsoft / Oracle Health; IPO scenario subject to public-market conditions
      for healthcare AI in 2027–2028.
