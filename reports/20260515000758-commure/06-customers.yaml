      - TU002
    figureRefs:
      - FU001
  - id: named-proof-and-retention
    title: Named Customer Proof and Retention Signals
    body: |
      Named customer proof is led by HCA Healthcare (August 15 2024 Becker's: "Commure to
      Partner with HCA Healthcare on Ambient AI Platform"; Hospitalogy October 2025
      describes the deployment as the nation's largest ambient AI rollout). OBHG is the
      multi-pillar deep-deployment reference: 200+ sites, 2,000 clinicians, 85% AI-coded
      charges, 83% reduction in charge-time within three months — quantified in HIT
      Consultant's December 4 2025 piece. DRH Health is the MEDITECH-segment community-
      hospital reference (HIT Consultant November 6 2025). Tenet Healthcare appears in
      Hospitalogy's October 2025 deep-dive as an investor-operator customer. Independent
      satisfaction validation comes from KLAS First Look (August 2025) which scored
      Commure Ambient AI 93.3 / 100 with 100% would-buy-again across the responding
      customer panel — a top-tier ambient-AI benchmark and the strongest publicly available
      retention proxy. Renewal / NRR / GRR / churn percentages are not publicly disclosed;
      we therefore treat would-buy-again as a forward-looking renewal proxy and an open
      diligence ask. Reference-quality assessment: HCA, OBHG, and DRH Health are
      production-grade references documented by independent press; Tenet is publicly
      named but with less operational disclosure; the wider 130–150 health-system claim is
      vendor-asserted. Customer-trust headwinds: the April 2026 N.D. Cal. ambient-AI
      consent class action against health systems is sector-wide and could slow procurement
      cycles; Commure's mitigation is consent-capture workflow plus contractual indemnity.
      Renewal cadence in clinical AI typically follows enterprise IT norms (1–3 year
      initial, multi-year renewal); this chapter reports those norms but flags that
      Commure-specific contract-length data is not publicly disclosed.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU014
