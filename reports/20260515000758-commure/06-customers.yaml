  - id: expansion-and-concentration
    title: Expansion Motion and Concentration Risk
    body: |
      Expansion is built on a documented land-and-expand motion: ambient AI is the wedge,
      autonomous coding is the dollar-up-sell, Engage / Memora is the patient-side
      attachment, Agents is the operations-side cross-sell, and Strongline is the safety
      attachment. The OBHG case is the canonical multi-pillar reference. Channel
      dependencies are fourfold: (1) EHR partner programs — Epic Workshop / App Orchard,
      MEDITECH Expanse Now, Oracle Health partner program, athenahealth Marketplace; (2)
      hyperscaler co-sell (AWS Healthcare ecosystem); (3) GC Customer Value Fund non-
      dilutive growth-capital co-financing of customer deployments; and (4) Augmedix-
      inherited reseller / partner network. Concentration risk centers on HCA Healthcare
      as the named anchor. Commure has not publicly disclosed top-customer revenue
      concentration; investor-press commentary frames HCA as a meaningful but not
      majority share. Procurement friction shows up as IDN AI governance reviews (clinical,
      legal, security, compliance) which Commure mitigates with KLAS validation, the
      developer-signal GitHub presence, HCA reference, and the GC Customer Value Fund's
      shared-economics structure. International expansion is not publicly documented at
      scale; Commure's customer book is U.S.-centric. Adverse signals: the Canopy v.
      Commure preliminary injunction (April 25 2025, since settled July 10 2025) was a
      partner-relationship adverse event; the April 2026 N.D. Cal. ambient AI consent class
      action against health systems is the sector-wide overhang. Concentration / dependency
      diligence: validate top-5 customer revenue share, geographic diversification of book,
      and renewal mechanics under NDA.
    claimRefs:
