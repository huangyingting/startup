chapter:
  number: 6
  title: Customers and Traction
  summary: |
    Commure's customer book is institutional health-system enterprise: 130–150 U.S. health
    systems, 350,000+ clinicians, and 2,000+ care sites, anchored by a public partnership
    with HCA Healthcare (described by independent commentators as the nation's largest
    ambient AI rollout) and a multi-pillar deployment at Ob Hospitalist Group (OBHG: 200+
    sites, 2,000 clinicians, 85% AI-coded charges, 83% charge-time reduction in three
    months). The base spans investor-operator IDNs (HCA, Tenet, Providence, CommonSpirit,
    Banner, NewYork-Presbyterian via published commentary), specialty-clinician groups
    (OBHG), and community hospitals adopting MEDITECH-embedded ambient AI (DRH Health
    Nov 6 2025). Traction proof-points include the KLAS First Look Ambient AI score of
    93.3 / 100 with 100% would-buy-again — a top-tier independent satisfaction benchmark —
    and 40M+ ambient appointments and $25B+ annual claims processed (per Commure homepage,
    confirmed in Hospitalogy's October 2025 deep-dive). Concentration risk centers on HCA
    Healthcare as the named anchor; Commure has not publicly disclosed customer-concentration
    percentages, so this remains a private-evidence-only diligence ask. Renewal /
    retention metrics (NRR / GRR / churn) are not publicly disclosed; KLAS would-buy-again
    is the strongest publicly-available proxy. The April 2026 sector-wide N.D. Cal.
    consent class action against ambient AI users is the most material near-term legal /
    customer-trust overhang. This chapter maps customer segmentation, the named-customer
    proof book, retention proxies, and concentration risk — calling out gaps requiring
    NDA-backed disclosure.
sections:
  - id: segmentation-and-trajectory
    title: Customer Segmentation and Adoption Trajectory
    body: |
      Commure's customer base segments four ways. (1) Investor-operator IDNs: HCA Healthcare
      (anchor, publicly disclosed via the August 2024 partnership announcement and described
      by Hospitalogy as the nation's largest ambient AI rollout); Tenet Healthcare; and the
      large multi-state systems (Providence, CommonSpirit, Banner, NewYork-Presbyterian)
      where ambient AI is a board-level priority. (2) Specialty clinician groups: OBHG (Ob
      Hospitalist Group, 200+ sites, 2,000 clinicians; multi-product ambient + autonomous
      coding deployment confirmed by HIT Consultant December 2025). (3) Community hospitals
      via MEDITECH integration: DRH Health is a public reference for the MEDITECH Expanse
      Now embed (HIT Consultant November 6 2025). (4) Long-tail ambulatory and FQHC
      operators reached via Commure's 60+ EHR integrations. Aggregate scale markers: 130–
      150 health systems, 350,000+ clinicians, 2,000+ care sites, 40M+ ambient appointments,
      $25B+ annual claims, per the Commure homepage and Hospitalogy's October 2025 inside-
      Commure feature. Adoption trajectory shows the company moved from pre-merger Athelas /
      Commure customer base (2017–2023) → post-merger consolidation (October 2023) →
      Augmedix close adds the public-company ambient book (October 2024) → Memora close
      adds care-navigation customers (February 2025) → KLAS validation (August 2025) →
      MEDITECH and OBHG breadth in late 2025 → Commure Dictation launch April 2026. ARR has
      doubled in three consecutive years (Hospitalogy and HIT Consultant), implying
      compounding net-new-logo plus expansion within the existing book. The post-merger
      cross-sell motion — ambient → autonomous coding → engage / agents — is Commure's
      principal expansion lever and is visible in the OBHG multi-pillar deployment.
    claimRefs:
