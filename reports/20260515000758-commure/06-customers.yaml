callouts:
  - calloutType: insight
    title: HCA + OBHG + KLAS together form an unusually strong public proof book
    body: |
      Most clinical AI vendors point to a single anchor reference; Commure points to HCA
      (largest IDN ambient rollout), OBHG (multi-pillar with quantified outcomes), and KLAS
      (independent panel scoring 93.3 / 100% would-buy-again). The combination is
      unusually strong for an early-stage ambient AI category.
    claimRefs:
      - CU011
      - CU012
      - CU017
  - calloutType: strength
    title: Multi-pillar OBHG case validates the cross-sell motion
    body: |
      The OBHG rollout (200+ sites, ambient + autonomous coding, 85% AI-coded charges, 83%
      charge-time reduction in three months) is the canonical proof that ambient is the
      wedge and autonomous coding is the up-sell. This is the model Commure intends to
      replicate across its 130–150 system book.
    claimRefs:
      - CU012
      - CU021
  - calloutType: risk
    title: HCA concentration and consent litigation are the customer-trust risks
    body: |
      HCA is the named anchor and Commure has not publicly disclosed top-5 customer share.
      Add to that the April 2026 N.D. Cal. ambient AI consent class action against health
      systems, which is the most material near-term customer-trust overhang for the
      category. Both are diligence-actionable.
    claimRefs:
      - CU021
      - CU025
  - calloutType: assumption
    title: NRR / GRR / churn / contract length data is private
    body: |
      Commure has not publicly disclosed NRR, GRR, churn, or contract length. KLAS would-
      buy-again and the OBHG case are the strongest public retention proxies. Decision-
      grade renewal diligence requires NDA-backed disclosure.
    claimRefs:
      - CU019
      - CU020
