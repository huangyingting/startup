callouts:
  - calloutType: insight
    title: Top-two ACI vendor concentration constrains Commure pricing power
    body: |
      Menlo Ventures' analysis (corroborated by Becker's Hospital Review) finds Microsoft/
      Nuance and Abridge together hold roughly two-thirds of the $600M ambient-AI revenue
      pool. Commure's strategic answer is to compete on platform breadth (RCM + agents +
      engagement) rather than ambient seat-licenses alone, since head-on ambient pricing
      against Abridge's Epic-native distribution is structurally unfavorable.
    claimRefs:
      - CM007
      - CM008
      - CM010
  - calloutType: risk
    title: Sector-wide consent litigation could slow new deployments
    body: |
      The April 2026 Washington class action filed in the Northern District of California
      against health systems using ambient-AI scribes is the second high-profile consent
      lawsuit (after Sharp Healthcare in late 2025) and signals a sector-wide legal
      exposure. Even though Commure is not (yet) named, every health-system buyer is now
      asking harder questions about consent capture and audio-retention policies — which
      slows pilots and lengthens procurement.
    claimRefs:
      - CM024
      - CM025
  - calloutType: strength
    title: Healthcare's AI adoption velocity is a once-in-a-decade tailwind
    body: |
      Menlo finds healthcare went from 3% AI adoption to 27% (in production at health
      systems) in 24 months — a 9x ramp at 2.2x the pace of the broader economy. That is
      the strongest demand backdrop any vertical software category has enjoyed in years and
      is the principal reason multiple healthcare AI unicorns have been minted.
    claimRefs:
      - CM019
      - CM020
  - calloutType: assumption
    title: Per-clinician ACV benchmark uses Abridge / public anchors
    body: |
      The bottom-up sizing lens uses $1,800–$3,600 per-clinician ACV as the steady-state
      benchmark, derived from public Abridge / Suki contract markers and Becker's analyst
      commentary. Commure's actual per-seat economics are not disclosed and may differ
      materially; sensitivity to this assumption is high.
    claimRefs:
      - CM009
      - CM013
