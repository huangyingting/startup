  - id: buyers-and-drivers
    title: Buyers, Adoption Path, Drivers and Constraints
    body: |
      The economic buyer for Commure inside a U.S. health system is typically a triad of CIO /
      CMIO, CFO / RCM Vice President, and increasingly the Chief Digital Officer or AI Officer.
      Final approval at large IDNs (≥10 hospitals) requires the CEO and often the board's
      digital-strategy committee; HCA's enterprise rollout was approved at the C-suite and
      explicitly underwritten by Hemant Taneja's General Catalyst. End users are physicians,
      advanced-practice clinicians, nurses (for ambient), and revenue-cycle staff (for
      autonomous coding). Adoption proceeds through a stylized funnel: vendor-fair / KLAS
      review → 50–200 clinician pilot (3–6 months) → enterprise contract (12–36 months) →
      platform expansion (RCM, agents, navigation). Growth drivers are powerful: clinician
      burnout (Mayo Clinic Proceedings doubling-of-burnout finding for after-hours EHR
      time); 11–25% productivity gains demonstrated in KLAS First Look studies; CFO pressure
      from continued labor inflation and tightening Medicare margins; Epic's embrace of
      Workshop partners; and the Menlo finding that healthcare adoption is now 2.2x the
      broader economy. Constraints are equally material: (1) a April 2026 N.D. Cal. class
      action (Washington v. health systems) alleging unlawful audio recording without prior
      consent — sector-wide consent / two-party-consent legal risk; (2) HIPAA, state PHI
      laws, and FDA AI/ML-enabled device guidance, with the FDA's running list of AI/ML SaMD
      authorizations now exceeding 1,000 entries; (3) Epic and MEDITECH gatekeeping that
      forces vendors to choose between native embedding and EHR-agnostic positioning; (4)
      switching cost — once a hospital invests in scribe templates, billing rules and
      MyChart-equivalent integrations, swap-out is painful; and (5) capital intensity —
      enterprise sales cycles consume cash before revenue, which is why General Catalyst's
      Customer Value Fund structure has been so important to Commure's growth.
