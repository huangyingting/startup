company:
  name: Commure
chapter:
  number: 5
  title: Product and Technology
  summary: |
    Commure ships a cloud-native, EHR-agnostic clinical AI operating system whose product
    surface is organized into five interoperable pillars — Commure Ambient AI / Scribe /
    Dictation, Commure Autonomous Coding (formerly Athelas RCM), Commure Engage (Rx.Health
    + Memora Health), Commure Agents, and Strongline workforce safety / RTLS — all sitting
    on a shared CommureOS platform layer that integrates with 60+ EHRs (Epic via Workshop,
    MEDITECH via Expanse Now, Cerner / Oracle Health, athenahealth, and the long tail).
    Commure has processed 40M+ ambient appointments and $25B+ annual claims, and the
    Commure Agents standalone offering publicly markets agent-as-a-service starting at
    $5/hour. Architecture is hyperscaler-hosted (AWS-first per AWS for Healthcare &
    Life Sciences positioning), built on FHIR-conformant data exchange (HL7 FHIR R4),
    and exposes a developer surface via the Commure GitHub organization. Differentiation
    is platform breadth + EHR breadth, validated by KLAS Ambient AI 93.3 / 100 (100%
    would-buy-again), the OBHG autonomous-coding outcome (85% AI-coded charges, 83%
    charge-time reduction in three months), and HCA Healthcare's enterprise rollout
    described as the nation's largest. Trust posture rests on HIPAA, SOC 2 (industry-
    standard for enterprise SaaS), state two-party-consent compliance for ambient
    capture, and the FDA AI/ML SaMD framework for any device-classified component (~1,000+
    AI/ML SaMD authorizations on the FDA list as of late 2025). Risk surface includes
    consent capture (per the April 2026 N.D. Cal. class action), Augmedix-era global
    HITL QA cost reduction, and integration debt across the Athelas / Augmedix / Memora /
    Rx.Health / Strongline stacks. This chapter maps modules, architecture, deployment,
    differentiation, and trust controls — flagging where evidence is genuinely thin.
sections:
  - id: product-map
    title: Product Surface, Modules and Workflow
    body: |
      Commure delivers five product pillars stitched together through a shared CommureOS
      platform layer. (1) Commure Ambient AI / Scribe / Dictation captures the patient–
      clinician conversation in real time, generates a draft note structured to specialty
      templates, and writes back to the EHR. KLAS First Look scored Commure Ambient AI 93.3
      / 100 with 100% would-buy-again — a top-tier independent benchmark. Commure Dictation
      launched April 2 2026 as a complementary fast-dictation modality. (2) Commure
      Autonomous Coding (formerly Athelas RCM) ingests the encounter note, EHR data, and
      coding rules to auto-generate billable codes; the OBHG case shows 85% of charges AI-
      coded with an 83% reduction in clinician charge-time within three months across 200+
      sites and 2,000 clinicians. (3) Commure Engage combines Rx.Health (acquired Nov 2023
      and rebranded) with Memora Health (acquired Feb 2025) to deliver patient outreach,
      care navigation, scheduling, and prior-authorization orchestration. (4) Commure Agents
      is sold as agent-as-a-service starting at $5 per hour, automating call centers, care
      navigation, and back-office workflows; this is Commure's most explicit consumption-
      pricing surface. (5) Strongline is the workforce-safety RTLS / duress-badge product
      acquired pre-merger; following the April 2025 Canopy v. Commure preliminary
      injunction (settled via the July 10 2025 partnership), Canopy now powers Strongline
      customer support. Customer workflow proceeds: vendor evaluation → 50–200-clinician
      ambient pilot → enterprise contract → cross-sell autonomous coding → engage / agents
      → operationalize Strongline. The cross-sell motion is the strategic centerpiece: every
      additional pillar attached at an existing account compounds ARPU.
