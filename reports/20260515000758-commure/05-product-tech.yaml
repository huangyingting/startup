callouts:
  - calloutType: insight
    title: Five-pillar OS plus 60+ EHR integrations is the structural moat
    body: |
      Only Commure spans Ambient + Coding + Agents + Engagement + Strongline on a shared
      OS, and only Commure has both Epic and MEDITECH-deep distribution. That breadth is
      Commure's principal answer to ambient-only competitors (Abridge, Microsoft Dragon
      Copilot, Suki) and to RCM-only incumbents (Waystar, R1).
    claimRefs:
      - CE001
      - CE018
      - CE019
  - calloutType: strength
    title: Public developer surface and KLAS validation are uncommon trust signals
    body: |
      The publicly visible Commure GitHub organization (github.com/commure) and the KLAS
      First Look score of 93.3 / 100 with 100% would-buy-again are uncommon trust-building
      moves in healthcare AI. Together they make Commure easier to trust at the IDN AI-
      governance committee level.
    claimRefs:
      - CE017
      - CE021
  - calloutType: risk
    title: Foundation-model dependency and consent litigation are the top product risks
    body: |
      Multi-foundation-model architecture mitigates single-vendor LLM lock-in but does not
      eliminate hyperscaler bill exposure. The April 2026 N.D. Cal. ambient-AI consent
      class action against health systems is the most material near-term legal overhang
      for the entire ambient AI category. Commure's mitigation is consent-capture workflow
      and contractual indemnification, but the threat remains material.
    claimRefs:
      - CE015
      - CE026
      - CE027
  - calloutType: assumption
    title: Architecture and compliance details are inferred where vendor-private
    body: |
      Specific micro-service architecture, HITRUST certification level, SOC 2 report
      vintage, foundation-model vendor mix, and pen-test cadence are not publicly disclosed.
      The architecture, trust, and compliance tables reflect industry-standard inference
      and Commure's public statements; decision-grade diligence requires NDA-backed
      disclosure.
    claimRefs:
      - CE020
      - CE026
