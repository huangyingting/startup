companyProfile:
  summary: Commure is the post-merger combination of Athelas (YC W17, founded 2016 by Tanay Tandon and Deepika Bodapati) and Commure (2017–2018), formed at a $6B implied valuation on Oct 23 2023 and built into a five-pillar clinical AI operating system spanning ambient documentation, autonomous coding, engagement, agents, and Strongline workforce safety. The platform anchors the HCA Healthcare ambient AI rollout, serves 130–150 health systems and 350,000+ clinicians, has been independently validated by KLAS Ambient AI (93.3 / 100; 100% would-buy-again), and is consolidating the category through M&A (PatientKeeper Aug 19 2021, Rx.Health Nov 21 2023, Augmedix Oct 2 2024 close at $139M, Memora Health Feb 14 2025).
  foundedDate: '2016-01-01'
