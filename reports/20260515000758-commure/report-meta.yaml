  foundingLocation: Athelas (YC W17 Mountain View) + Commure (General Catalyst incubated 2017–2018); merged Oct 23 2023.
  headquarters: Mountain View, California
  productSummary: Five-pillar clinical AI operating system — Commure Scribe (ambient documentation), Commure Coding (autonomous medical coding), Commure Engage (patient engagement, post-Memora), Commure Agents (AI assistants), and Strongline (clinical workforce safety) — built on the shared CommureOS platform with 60+ EHR integrations including the MEDITECH Expanse Now embed and Oracle Health partnership.
  customerFocus: Health systems and IDNs (HCA Healthcare anchor; 130–150 health systems; 350,000+ clinicians; 2,000+ care sites; 40M+ ambient appointments; $25B+ annual claims processed).
  businessModel: Subscription / per-clinician / per-encounter SaaS across ambient + coding + engagement + agents + Strongline pillars with multi-pillar cross-sell economics, partly co-financed by the General Catalyst Customer Value Fund.
  stage: Late-stage private (post-merger; GC Customer Value Fund-backed)
  fundingStatus: October 23 2023 Athelas + Commure merger closed at $6B implied valuation; most recent disclosed financing is the $200M General Catalyst Customer Value Fund close on Jun 19 2025, structured as non-dilutive growth capital co-financing customer deployments.
