company:
  name: Commure
chapter:
  number: 4
  title: Financials and Funding
  summary: |
    Commure is a privately held, venture-backed clinical AI company whose disclosed financials
    are limited to ARR-growth commentary, customer-count milestones, and the public terms of
    its M&A and primary-financing transactions. The most credible quantitative anchors are
    (1) the company's own statement that ARR has doubled three years in a row, (2) the
    $200M General Catalyst Customer Value Fund commitment announced June 19 2025, (3) the
    $139M cash purchase of Augmedix (closed Oct 2 2024 at $2.35 per share, sourced from
    Augmedix's SEC DEFM14A and Aug-2024 8-K filings), (4) the implied $6B post-merger
    valuation at the Athelas-Commure combination in October 2023, and (5) Commure's
    public homepage scale markers (40M+ ambient appointments, $25B+ annual claims, 60+
    EHR integrations, 130–150 health systems, 350K+ clinicians). Revenue model is mostly
    enterprise SaaS subscription with a growing outcomes-tied / value-share component
    inside the GC CVF structure; pricing is per-seat for ambient AI, per-encounter or
    per-coded-charge for autonomous coding, and per-system / module-based for engagement
    and Strongline. Capital adequacy looks strong: GC underwrites the GTM, HCA anchors
    revenue, and the CVF structure means Commure does not need to re-price equity to fund
    growth. Material gaps remain — Commure has never published a financial statement, has
    no audited revenue or burn disclosure, and the $6B valuation has not been reset
    publicly since the merger. This chapter triangulates revenue model, unit economics,
    cost structure, traction, and capital adequacy from the public record and clearly
    flags the underwriting blockers that only management disclosure could resolve.
sections:
  - id: revenue-model
    title: Revenue Model, Pricing and GTM
    body: |
      Commure earns revenue across four product lines, each with a distinct monetization
      shape. (1) Ambient AI (Commure Scribe / Ambient AI / Dictation): per-clinician annual
      seat-license, with public peer anchors of $1,800–$3,600/year (Abridge UPMC) and
      ~$2,400/year (Suki); Commure's per-seat rate is not publicly disclosed but the
      Hospitalogy deep-dive describes value-share and enterprise-pricing arrangements with
      HCA and similar large IDNs. (2) Autonomous coding / RCM (formerly Athelas RCM):
      per-encounter or per-coded-charge, with the OBHG public proof-point of 85% AI-coded
      charges and an 83% reduction in clinician charge-time signaling material per-charge
      economics. (3) Patient engagement (Commure Engage = Rx.Health acquisition; Memora
      Health acquired Feb 2025): per-patient-touch or module subscription, with Memora's
      pre-acquisition customer base providing the launch revenue. (4) Strongline workforce
      safety / RTLS: per-badge hardware + software subscription; revenue is now jointly
      operated under the July 2025 Canopy partnership where Canopy assumed customer
      support after the preliminary injunction settled. The GTM motion is enterprise-led:
      large IDN pursuits begin with KLAS-aware vendor evaluation, progress through 50–200-
      clinician pilots, and graduate to multi-product enterprise contracts over 12–36
      months. Sales cycles are long; Commure's competitive answer is the GC Customer
      Value Fund, which underwrites enterprise GTM with $200M of non-dilutive growth
      capital — this is Commure's most distinctive financing structure and is unique to
      health systems doing strategic deals with General Catalyst. Channel is largely
      direct, with EHR-integration partnerships (Epic Workshop, MEDITECH Expanse Now)
      acting as distribution multipliers rather than reseller channels.
