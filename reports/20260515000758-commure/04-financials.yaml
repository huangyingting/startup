callouts:
  - calloutType: insight
    title: GC Customer Value Fund is the single most distinctive capital structure
    body: |
      Commure's June 19 2025 $200M draw on General Catalyst's Customer Value Fund supplies
      non-dilutive growth financing tied to enterprise customer outcomes. No direct competitor
      has an equivalent capital structure. This is what enables Commure to underwrite long
      enterprise sales cycles without re-pricing equity, and is why the company can claim
      "ARR doubled three years in a row" without commensurate primary fundraising.
    claimRefs:
      - CI008
      - CI021
      - CI023
  - calloutType: risk
    title: No audited revenue or burn disclosure prevents decision-grade underwriting
    body: |
      Commure has never published an audited financial statement. The "ARR doubled three
      years" claim is company-asserted and not independently verifiable; gross margin by
      product line, cohort retention, and burn rate are all undisclosed. Any decision-grade
      diligence requires an NDA-backed data-room request covering at minimum P&L by product
      pillar, cohort retention, top-10 customer ARR, and 24-month cash plan.
    claimRefs:
      - CI024
      - CI025
      - CI026
      - CI027
  - calloutType: risk
    title: $6B post-merger valuation has not been publicly reset since October 2023
    body: |
      The $6B implied post-merger valuation has not been refreshed by a publicly disclosed
      primary round since October 2023. Industry comp marks (Abridge $5.3B Series E,
      Ambience $1B+ Series C) suggest a higher mark is plausible, but the GC CVF is non-
      dilutive and so does not reset. A material valuation re-mark is the next financing
      event to watch.
    claimRefs:
      - CI018
      - CI021
      - CI026
  - calloutType: assumption
    title: Unit economics estimates are triangulated, not audited
    body: |
      Per-clinician ARPU, per-system ARPU, NRR, gross margin, CAC payback and burn estimates
      in TI003 and FI003 are triangulated from public peer benchmarks and Commure's
      qualitative scale claims. These are explicitly low-confidence and should not be relied
      on without management corroboration.
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
      - CI015
