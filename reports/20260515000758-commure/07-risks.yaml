chapter:
  number: 7
  title: Risks
  summary: |
    Commure's principal risks group into six categories. (1) Sector-wide ambient AI consent
    litigation — most material is the April 2026 N.D. Cal. class action against health
    systems for unconsented audio recording (Becker's Apr 15 2026); the older Canopy v.
    Commure preliminary injunction (N.D. Cal. Apr 25 2025, Case 5:24-cv-02592-NW, Judge
    Noël Wise) was settled by the July 10 2025 partnership but established a partner-
    relationship adverse-event template. (2) Federal regulatory exposure — HHS/OCR HIPAA
    enforcement, the FDA AI/ML SaMD framework (1,000+ authorized devices on the FDA
    running list), and DOJ False Claims Act exposure for any autonomous-coding error that
    bills CMS programs incorrectly. (3) Operational and security — multi-tenant cloud
    HIPAA scope, foundation-model BAAs, sub-processor compliance, and pen-test posture
    not publicly disclosed. (4) Partner / dependency — single-anchor HCA Healthcare
    concentration, Epic Workshop / MEDITECH / Oracle Health partner-program dependency,
    AWS hyperscaler, Canopy-supplied Strongline operations, GC Customer Value Fund
    capital. (5) Financial / model — capital intensity (M&A-led growth: PatientKeeper
    Aug 2021, Rx.Health Nov 2023, Augmedix Oct 2024, Memora Feb 2025), $200M GC CVF
    closed Jun 19 2025, integration debt across acquired stacks. (6) People / execution —
    founder-led management, key-person risk on Tandon / Bodapati / Parthasarathy /
    Taneja, integration of multiple acquired teams. This chapter ranks each risk by
    likelihood and impact, maps mitigation maturity, and lists the diligence asks and
    thesis-break triggers that decide go / no-go.
sections:
  - id: regulatory-and-legal-risk
    title: Regulatory and Legal Risk
    body: |
      The most material near-term legal risk is sector-wide ambient AI consent litigation.
      The April 2026 N.D. Cal. class action against health systems alleges they used
      ambient AI tools to record audio without prior patient consent — a claim with
      potential application to every ambient-AI vendor downstream. Commure's mitigation is
      vendor-side consent-capture workflow plus contractual indemnity, but the threat is
      category-wide. The earlier Canopy v. Commure preliminary injunction (N.D. Cal. Apr
      25 2025, Case 5:24-cv-02592-NW; Judge Noël Wise) was a partner-relationship
      adverse event covering Strongline customer support; it was settled via the July 10
      2025 partnership where Canopy now powers Strongline customer support — a successful
      mitigation but a template for similar partner disputes. Federal-agency risk includes
      HHS Office for Civil Rights HIPAA enforcement (where Commure is a Business
      Associate to every customer), FDA AI/ML SaMD scoping (Commure is currently
      positioned outside SaMD obligations because ambient and coding are CDS workflows
      rather than device-classified components, but the FDA's running list of 1,000+
      authorized AI/ML devices — last updated December 30 2025 — is the regulatory
      baseline that scoping is measured against), DOJ False Claims Act exposure for any
      autonomous-coding error that bills Medicare / Medicaid incorrectly, FTC AI-claims
      enforcement under Section 5, and the Federal Register / CMS rulemaking pipeline
      (CMS payment-rule changes can shift autonomous-coding economics). State law adds the
      50-state PHI / consent / wiretap patchwork. IP risk is moderate — the Augmedix
      patent estate transferred at close and Commure has not signaled outbound IP
      enforcement against competitors. Mitigation maturity: HIPAA / SOC 2 / HITRUST
      controls are industry-standard; ambient consent workflow exists; FDA SaMD scoping is
      a contestable position requiring ongoing legal monitoring.
