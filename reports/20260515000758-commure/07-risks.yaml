  - id: people-execution-mitigations-and-kill-criteria
    title: People, Execution, Mitigations, and Kill Criteria
    body: |
      People / execution risk is moderate but real. Founder-led management — Tanay Tandon
      (CEO), Deepika Bodapati (COO), Ashutosh Parthasarathy (CTO), Hemant Taneja (Chair) —
      offers strong continuity but creates key-person concentration. Integration of
      multiple acquired teams (Athelas, original Commure, PatientKeeper-era talent,
      Rx.Health, Augmedix, Memora, Strongline) is the principal execution risk; turnover
      at acquired-company leadership is a tracked indicator. Sales-execution risk includes
      AI-governance procurement-cycle length at IDN customers and KLAS slippage as
      ambient AI matures past First Look. The mitigation framework operates at three
      levels: (a) product / customer mitigations — KLAS validation, OBHG quantified
      outcomes, GitHub developer signal, GC CVF shared economics; (b) regulatory
      mitigations — consent-capture workflow, HIPAA controls, FDA SaMD scoping, FCA-aware
      coding audit; (c) partner / capital mitigations — multi-EHR breadth, multi-LLM
      breadth, GC CVF non-dilutive capital, Canopy partnership for Strongline. Kill
      criteria for the investment thesis (per TR005): (i) named-customer churn beyond
      single-digits within 12 months; (ii) HCA-relationship deterioration; (iii) adverse
      ruling or material settlement in the April 2026 ambient consent class action that
      pierces vendor-side liability; (iv) HHS-OCR enforcement against Commure; (v) FDA
      SaMD reclassification of ambient or coding products; (vi) ARR-doubling slowdown
      below 30% YoY for two consecutive periods; (vii) key-person departure of CEO / CTO
      / Chair within 12 months. Diligence asks centre on private-evidence-only items:
      top-5 customer share, NRR / GRR / churn, sub-processor list, foundation-model
      vendor mix, SOC 2 / HITRUST cert vintage, pen-test summary, and the active legal
      docket (consent class action, any state-AG investigation).
