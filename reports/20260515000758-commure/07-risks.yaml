    title: Mitigation and kill criteria table
    columns:
      - Trigger
      - Threshold
      - Decision
    rows:
      - - Named-customer churn (top-5)
        - Single-digit % within 12 months
        - Reduce conviction; reassess top-customer concentration
      - - HCA Healthcare relationship deterioration
        - Public scope reduction or partner downgrade
        - Trigger anti-thesis review
      - - Adverse ruling in Apr 2026 ambient consent class action piercing vendor liability
        - Class certification + adverse summary judgment
        - Re-rate category-wide risk
      - - HHS-OCR enforcement against Commure
        - Public Resolution Agreement
        - Re-rate compliance posture
      - - FDA SaMD reclassification of ambient or coding
        - FDA letter or guidance change
        - Trigger product / regulatory pivot
      - - ARR YoY growth slowdown
        - Below 30% YoY for 2 consecutive periods
        - Reassess valuation; cut new-money exposure
      - - Key-person departure (CEO / CTO / Chair)
        - Departure within 12 months
        - Trigger anti-thesis review
      - - Foundation-model vendor concentration > 75%
        - Single-vendor share > 75% of LLM compute
        - Push multi-vendor strategy verification
      - - GC CVF capacity reduction
        - Public CVF restructuring or pause
        - Reassess capital runway
      - - DOJ FCA action on autonomous coding
        - DOJ filing or settlement
        - Re-rate coding-pillar risk; adjust valuation
      - - State AG action on ambient consent
        - Multi-state enforcement
        - Re-rate consent posture; adjust valuation
      - - Material RIF or restructuring
        - '>10% headcount in 6 months'
        - Trigger management-review; reassess execution
    notes: >-
