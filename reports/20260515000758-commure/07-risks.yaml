  - id: operational-financial-and-partner-risk
    title: Operational, Security, Financial, and Partner Risk
    body: |
      Operational and security risk centers on multi-tenant cloud HIPAA scope (AWS-first
      deployment), foundation-model BAAs (multi-vendor mitigates single-LLM-vendor
      concentration), sub-processor compliance discipline, and pen-test cadence that is
      not publicly disclosed. Quality risk includes ambient-AI hallucination control and
      autonomous-coding accuracy — both have public failure modes (incorrect note content,
      mis-coded charges) that require HITL review and audit logging. Reliability risk is
      hyperscaler outage exposure plus EHR-vendor API availability. Financial / model risk
      reflects M&A-led growth: PatientKeeper (Aug 19 2021), Rx.Health (Nov 21 2023),
      Augmedix ($139M cash close Oct 2 2024), and Memora Health (Feb 14 2025) created
      integration debt that the CommureOS platform layer is designed to absorb but that
      has not been independently verified. The $200M General Catalyst Customer Value Fund
      financing (Jun 19 2025) is the most recent disclosed capital event and is non-
      dilutive growth-capital structured to co-finance customer deployments. Margin
      structure for ambient depends on HITL QA cost reduction (Augmedix-inherited global
      review center). Partner / dependency risk is concentrated: HCA Healthcare anchor,
      EHR partner programs (Epic Workshop, MEDITECH Expanse Now, Oracle Health), AWS
      hyperscaler, Canopy-supplied Strongline operations (post Jul 2025), GC CVF capital,
      and Augmedix-inherited reseller / partner network. Each is mitigated by deliberate
      diversification but each remains a structural single-point exposure. Regulator
      monitoring (CMS, ONC, HHS-OCR) is an ongoing operational discipline rather than a
      one-time control.
