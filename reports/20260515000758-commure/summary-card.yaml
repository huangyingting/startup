  topStrengths:
    - HCA Healthcare anchor partnership plus 130–150 health systems and 350,000+ clinicians on the platform.
    - >-
      KLAS Ambient AI First Look 93.3 / 100 with 100% would-buy-again — the strongest independent satisfaction signal in
      the category.
    - >-
      OBHG (Dec 4 2025) — 200+ sites, 2,000 clinicians, 85% AI-coded charges, 83% charge-time reduction in three months
      — multi-pillar cross-sell proof.
    - >-
      $200M General Catalyst Customer Value Fund close on Jun 19 2025 — non-dilutive growth capital co-financing
      customer deployments.
    - >-
      Five-pillar OS (ambient + coding + engagement + agents + Strongline) on shared CommureOS — uniquely broad surface
      area among ambient AI peers.
    - 60+ EHR integrations including MEDITECH Expanse Now embed (Sep 16 2025) and the Oracle Health partnership.
    - >-
      M&A-led consolidation (PatientKeeper, Rx.Health, Augmedix Oct 2 2024 at $139M, Memora Health Feb 14 2025) extends
      pillar surface and customer book.
    - ARR has doubled in three consecutive years per Hospitalogy and HIT Consultant analyst commentary.
  topRisks:
    - >-
      April 2026 N.D. Cal. ambient AI consent class action against health systems creates sector-wide vendor liability
      overhang.
    - >-
      HCA Healthcare single-anchor concentration without publicly disclosed top-5 share creates revenue-concentration
      risk.
    - >-
      M&A integration debt across PatientKeeper, Rx.Health, Augmedix, and Memora could erode unit economics if not
      consolidated under CommureOS quickly.
    - >-
      Foundation-model commoditization could erode the ambient AI category premium as the technology matures past KLAS
      First Look.
    - >-
      Canopy v. Commure preliminary injunction (Apr 25 2025 N.D. Cal., Case 5:24-cv-02592-NW) settled to partnership on
      Jul 10 2025 — IP-litigation exposure remains a risk vector.
  unresolvedGaps:
