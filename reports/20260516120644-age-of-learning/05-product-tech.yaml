chapter:
  number: 5
  title: Product and Technology
  letter: E
  summary: >-
    Age of Learning's product portfolio spans five distinct subscription products covering ages 2-13:
    ABCmouse (flagship, 10,000+ activities, 850+ structured lessons), Adventure Academy (MMO-style,
    ages 8-13), ReadingIQ (digital books), My Math Academy (AI-adaptive math, ages 4-8), and My
    Reading Academy (AI-adaptive reading, ages 4-8). The adaptive learning engine personalizes
    content sequencing to each child's proficiency level, and a 2022 WestEd randomized controlled
    trial found My Math Academy students gained 1.3 grade levels in 12 weeks. The platform is
    cross-device (iOS, Android, browser) and Common Core-aligned. COPPA compliance and a 2020 FTC
    consent decree shape the trust and safety posture. Key technology diligence gaps include the
    proprietary adaptive algorithm architecture, AI model governance, and third-party cloud/vendor
    dependency disclosures.

