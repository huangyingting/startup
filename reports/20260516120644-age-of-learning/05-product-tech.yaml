callouts:
  - calloutType: strength
    title: WestEd RCT provides rare AI-efficacy proof in EdTech
    body: >-
      My Math Academy's randomized controlled trial, conducted by independent research organization
      WestEd, demonstrated a 1.3 grade-level gain for kindergarteners in 12 weeks of use. This is
      among the strongest publicly available efficacy evidence for any AI-adaptive K-8 product and
      is a material advantage in school district procurement cycles requiring outcome evidence.
    claimRefs:
      - CE008
      - CE017
      - CE025

  - calloutType: risk
    title: Proprietary adaptive engine has no public technical disclosure
    body: >-
      Age of Learning's adaptive learning algorithm is entirely proprietary and undisclosed. There
      are no public white papers, academic publications, GitHub repositories, or technical
      documentation. This creates a diligence blind spot: investors cannot independently verify
      the algorithmic sophistication, data-retention practices, model governance, or AI bias
      mitigation. The lack of developer signal is atypical for a company claiming AI-leadership
      positioning.
    claimRefs:
      - CE015
      - CE031

  - calloutType: insight
    title: Product portfolio spans ages 2-13 with intentional brand extensions
    body: >-
      The five-product lineup (ABCmouse, Adventure Academy, ReadingIQ, My Math Academy, My
      Reading Academy) creates a logical age-progression ladder from ages 2 through 13. This
      reduces subscriber attrition as children age out of ABCmouse by offering an in-family
      upgrade path to Adventure Academy, and allows the B2B school channel to be addressed at
      multiple grade levels with distinct products and evidence bases.
    claimRefs:
      - CE001
      - CE006
      - CE007
      - CE010
      - CE027

