      reporting in the ABCmouse and My Math Academy platforms.
    data:
      nodes:
        - id: n1
          label: Child logs in (browser, iOS, or Android)
          detail: >-
            Cross-device access with progress sync; supports iOS 13+ and Android 5.0+ minimum.
            Parental account required for COPPA compliance.
          tone: neutral
        - id: n2
          label: Adaptive engine assesses baseline proficiency
          detail: >-
            My Math Academy and My Reading Academy run diagnostic assessments on first use;
            ABCmouse uses guided learning path waypoints as a structured progression.
          tone: positive
        - id: n3
          label: Personalized content activity selected
