  - id: section-differentiation-trust
    title: Differentiation, Trust, Safety, and Compliance
    body: >-
      Age of Learning's primary differentiators in the consumer EdTech market are its content
      breadth, efficacy evidence base, and brand recognition. ABCmouse's 10,000+ activity library
      and 850+ structured lesson count substantially exceeds comparable free competitors: Khan Academy
      Kids offers roughly 3,000 activities and Duolingo ABC targets early reading only. The only
      close comparator in depth-of-curriculum is IXL, which covers K-12 skills broadly but does not
      focus specifically on the 2-8 early childhood segment. My Math Academy's WestEd-validated
      efficacy outcomes are a rare public proof point in the AI-EdTech space and represent a
      meaningful procurement advantage in school-district sales cycles that require evidence of
      student learning gains.

      Trust and safety are central to Age of Learning's product design given its under-13 user
      base. The company asserts COPPA compliance across all products, which requires verifiable
      parental consent, limits on personal data collection from children, and prohibits behavioral
      advertising. The 2020 FTC $10M settlement for deceptive cancellation practices (covering
      2015-2018) is a prior adverse event, but it focused on subscription cancellation flows rather
      than child data privacy specifically. The consent decree required a compliance program rebuild
      and ongoing FTC reporting; the company has not faced a repeat enforcement action as of May
      2026. FERPA compliance is required for any product deployed in school settings, and Age of
      Learning's school products incorporate standard FERPA safeguards. Common Sense Media's
      Privacy evaluation for ABCmouse provides additional third-party validation of the company's
      data practices. No external security audit or SOC 2 certification is publicly disclosed.
    claimRefs:
      - CE021
      - CE022
      - CE028
      - CE032
      - CE033
      - CE034
      - CE035
