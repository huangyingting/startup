        - "ABCmouse has 994K+ App Store reviews, 4.5-star rating, 15+ years brand building"
        - Subscriber count below 3M confirmed; competitor surpasses on rating and usage
      - - Large addressable market
        - "US K-12 EdTech market $15B+; early childhood segment growing"
        - Market growth below 5% CAGR; AI tutors displace subscription model at scale
