  - id: section-recommendation
    title: Recommendation, Entry Discipline, and Thesis Break Conditions
    body: >-
      The overall recommendation is Track / Research-More. The investment is not actionable at the
      $3B 2021 last-round mark given structural multiple compression, subscriber attrition, and
      complete absence of audited financial disclosure. At current market comparables of 3-8x revenue,
      Age of Learning's fair value range is $450M-$1.6B, implying a 47-85% write-down from the 2021
      entry for existing investors. For a new investor, entry at approximately $1.2-1.5B (50-60%
      discount to last round) represents the range where base case returns are marginally positive
      and bull case returns of 3-4x become achievable.

      Entry discipline requires: (1) data room access with audited financial statements FY2022-FY2025,
      (2) verified ARR and subscriber cohort data showing at minimum stable churn and moderate growth,
      (3) cap table and liquidation preference waterfall disclosure to confirm common equity distribution,
      (4) FTC consent order compliance documentation with third-party audit, and (5) a concrete plan
      for addressing Tencent ownership in the context of any IPO or US-government-adjacent acquisition.

      Risk rating is High. The FTC history, subscriber attrition trajectory, AI displacement risk,
      valuation multiple compression, and financial opacity collectively represent above-average
      diligence burden. Preference overhang from $480M in preferred financing creates significant
      compression on common equity exit proceeds in below-$2B exit scenarios. A participating
      preferred structure with standard liquidation preferences would absorb the majority of proceeds
      in a $1.0-1.5B exit, leaving common equity with minimal distribution. Thesis-break conditions:
      any confirmed subscriber count below 3M for 2023-2025, any new FTC enforcement action or contact,
      any down-round financing below $1.5B implied valuation, AI tutor DAU surpassing 20M in the 2-8
      age range, or disclosure of EBITDA losses greater than 15% of revenue in the most recent fiscal year.
