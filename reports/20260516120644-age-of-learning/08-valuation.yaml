  - id: section-scenarios
    title: Bull, Base, and Bear Valuation Scenarios
    body: >-
      Three scenarios bound the valuation outcome for Age of Learning under current market conditions.
      All scenarios assume entry by a new investor at a price below the $3B 2021 mark; return analysis
      at $1.2B entry is provided for reference.

      The bull case (20% probability) assumes 25% ARR growth, a demonstrated path to profitability,
      successful integration of AI capabilities, and a strategic acquirer or growth equity recap at
      8-10x revenue exit multiple. Under these assumptions, implied enterprise value of $3.5-5.0B is
      achievable, generating 3-4x return at $1.2B entry. The bull case requires subscriber reacceleration,
      revenue transparency via an S-1 or data room, and resolution of the Tencent ownership question.

      The base case (50% probability) assumes 10-15% ARR growth, flat or modestly improving free cash
      flow margins, and exit via strategic M&A or secondary sale at 4-6x revenue. This yields $1.2-2.0B
      implied enterprise value and 1.0-1.7x return at $1.2B entry. The base case requires verified ARR
      and stable churn absent any new FTC enforcement action.

      The bear case (30% probability) assumes 0-5% ARR growth from AI erosion and subscriber stagnation,
      leading to a distressed exit or down-round at 2-3x revenue, implying $400-600M enterprise value and
      0.3-0.5x return. Bear triggers include AI tutoring surpassing 10M K-8 users, FTC recurrence, or
      subscriber decline below 3M. The investment thesis and anti-thesis table in this section maps each
      key argument to evidence and to the condition that would change the view.
    claimRefs:
