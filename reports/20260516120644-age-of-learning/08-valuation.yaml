  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: audited financial statements
      missingEvidence: >-
        Revenue, ARR, gross margin, EBITDA, and cash flow are not publicly available for Age of
        Learning. All financial metrics used in this chapter are third-party estimates or inferred
        from industry benchmarks.
      whyItMatters: >-
        No reliable valuation model can be constructed without revenue data; all estimates carry
        wide uncertainty bands. Revenue trajectory, margin profile, and subscriber retention are
        all critical inputs to valuation and cannot be assessed from public sources.
      diligencePath: >-
        Request audited financial statements FY2022-FY2025 and current ARR/subscriber dashboard
        via data room access.
      relatedQuestionRefs:
        - QV002
        - QV019
      relatedTableRefs:
        - TV002

    - type: private-evidence-only
      severity: blocking
      topic: cap table and preference waterfall
      missingEvidence: >-
        Post-$480M raise cap table, liquidation preference terms, participating preferred structure,
        and ROFR are undisclosed. No public source confirms the structure of Age of Learning's
        investor rights agreement.
      whyItMatters: >-
        Common equity exit proceeds in sub-$2B scenarios may be negligible; the waterfall
        determines actual investor returns. This is a blocking item for any entry price calculation.
      diligencePath: >-
        Request full cap table, investor rights agreement, and legal opinion on preference stack.

    - type: private-evidence-only
      severity: material
      topic: subscriber metrics and cohort retention
      missingEvidence: >-
        Active subscribers, 12-month churn, cohort LTV, and CAC are not publicly available for
        Age of Learning. All subscriber estimates rely on third-party industry analysis.
      whyItMatters: >-
        Revenue quality and growth sustainability cannot be assessed without subscriber cohort data.
        Gross margin estimates for comparable analysis depend on the subscriber and channel mix.
      diligencePath: >-
        Request subscriber dashboard with monthly actives, cohort retention curves, CAC by channel.
      relatedQuestionRefs:
        - QV022

    - type: missing-source
      severity: material
      topic: secondary market pricing
      missingEvidence: >-
        No public evidence of actual secondary transactions in Age of Learning shares or confirmed
        clearing prices exists. The 30-60% discount assumption is based on sector comparables only.
      whyItMatters: >-
        Without transaction evidence, secondary pricing assumptions cannot be validated at the
        company-specific level, creating uncertainty in the base case entry price range.
      diligencePath: >-
        Contact Hamilton Lane, Setter Capital, or similar intermediaries for any Age of Learning
        position pricing or secondary market interest.
      relatedQuestionRefs:
        - QV025

    - type: private-evidence-only
      severity: minor
      topic: management equity and IPO timeline intentions
      missingEvidence: >-
        Management option pool size, vesting schedules, and any disclosed liquidity event planning
        are unavailable. No board-level discussion of IPO or exit timing has been publicly reported.
      whyItMatters: >-
        Dilution from management equity affects investor return calculations; IPO timeline affects
        discount rate assumptions in the DCF model.
      diligencePath: >-
        Request management equity plan and any board-level liquidity event discussion documentation.
