  - id: section-comparable-analysis
    title: Comparable Company and Transaction Analysis
    body: >-
      The comparable set for Age of Learning spans public consumer EdTech companies, private platform
      estimates, and subscription EdTech M&A transactions. Duolingo (DUOL) is the most visible public
      EdTech peer: it reported approximately $748M in revenue for fiscal year 2024, representing 41%
      year-over-year growth, with a market capitalization of approximately $8-9B in early 2026, implying
      an EV/revenue multiple of 10-12x. Duolingo's premium is explicitly tied to profitability, high
      growth, and the freemium model that generates 97M daily active users — characteristics not shared
      by Age of Learning's paywall subscription model. Duolingo should therefore be treated as a ceiling
      comp, not a peer, and its multiple is not reproducible for a slower-growth, subscription-gated
      platform.

      Chegg (CHGG) provides the cautionary comparable: approximately $510M in fiscal year 2023 revenue
      with a market cap of approximately $500M in 2024-2026, implying a 1x revenue multiple. Chegg's
      collapse from $115 per share in 2021 to below $5 per share in 2024 was driven by AI competition
      that eroded subscriber growth and reversed the platform's core value proposition. Age of Learning
      faces analogous AI displacement risk from Khanmigo, ChatGPT, and other AI tutoring products.

      EdTech M&A transactions from 2022 to 2024 occurred at 2-6x revenue multiples for subscription
      platforms, with median approximately 3.5x. IXL Learning is estimated to generate over $1B in
      annual revenue with no publicly disclosed equity valuation. Coursera and Nerdy Inc. trade at 3-4x
      and 1-2x revenue respectively, reflecting challenges in adjacent markets. The EdTech M&A median
      of approximately 3.5x is the most applicable benchmark for a strategic acquisition scenario.
      Private secondary market data from Hamilton Lane and PitchBook indicates that late-stage private
      consumer tech positions have cleared at 30-60% discounts to last-round marks since 2022, consistent
      with the mark-to-market range derived from comparable multiples. Valuation scenario ranges are
      shown in the adjacent range figure, with the base case implying $1.2-2.0B.
    claimRefs:
