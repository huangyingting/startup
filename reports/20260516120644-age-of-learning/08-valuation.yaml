        - No IPO filed; secondary market at significant discount; Tencent stake complicates IPO
        - IPO filing or strategic acquisition announcement at meaningful premium
      - - Absence of financial transparency
        - No audited financials; growth rate and margin profile unknown
        - Revenue disclosure showing ARR growth above 15% and positive EBITDA margin
