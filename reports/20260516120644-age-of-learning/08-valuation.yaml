  - id: section-diligence-asks
    title: Exit Readiness and Required Diligence Asks
    body: >-
      Age of Learning's exit readiness is constrained by several unresolved structural factors. The
      Tencent shareholding creates CFIUS national security review risk for any US IPO or US
      government-sensitive strategic acquisition. The FTC consent order complicates disclosure
      requirements in a public offering context. The absence of audited financial statements means
      the company could not file an S-1 without a substantial preparation runway of 12-24 months.

      Required diligence before any investment decision: audited financial statements FY2022-FY2025
      covering revenue, ARR, gross margin, EBITDA, and operating cash flow; current subscriber count,
      12-month churn rate, cohort LTV by acquisition vintage, and CAC by channel; full cap table with
      post-financing preference stack, ROFR/ROFO terms, and pro-rata rights; board composition, voting
      rights, and any investor consent rights; FTC consent order compliance documentation including
      third-party audit reports; and legal opinion on Tencent ownership and any CFIUS exposure.

      Nice-to-have diligence: product roadmap and AI integration strategy including any partnership or
      licensing agreements with AI infrastructure providers; distribution channel economics showing
      mobile vs. web vs. B2B revenue split and margin by channel; ESSER-funded school revenue
      contribution and post-ESSER renewal pipeline; and any ongoing or pending litigation, regulatory
      inquiry, or consumer complaint proceedings beyond the disclosed FTC matter.

      Strategic exit paths in priority order: strategic acquisition by a media or education platform
      such as Pearson, Google, Amazon, or Apple is the most likely liquidity event given brand and
      content IP value; secondary sale to a PE sponsor or sovereign wealth co-investor at a meaningful
      discount to last round is the most likely near-term path; IPO requires 3-5 years of preparation
      including audited financial history, Tencent ownership remediation, and demonstration of a
      profitable growth trajectory consistent with post-2021 public EdTech standards.
    claimRefs:
