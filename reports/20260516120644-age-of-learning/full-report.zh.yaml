    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、创立与企业沿革
        blocks:
          - type: paragraph
            body: >
              Age of Learning, Inc. 是一家总部位于加州 Glendale 的私营教育科技公司。Doug Dohring 于 2007 年创立公司；他此前共同创办了虚拟宠物网站 Neopets，并最终在
              2005 年将其出售给 Viacom。这笔交易给 Dohring 带来了资金，也带来了消费者互联网经验，让他得以从零搭建儿童学习平台。Age of Learning 的旗舰产品 ABCmouse.com 于
              2010 年 11 月上线，把公司定位成面向 2-8 岁儿童的直接面向消费者订阅学习服务。


              随后十年，公司把产品组合从 ABCmouse 大幅外扩，加入 Adventure Academy（2019 年 4 月，8-13 岁）、ReadingIQ（数字图书，2-12 岁）、My Math
              Academy（2021 年，面向 4-8 岁的 AI 自适应数学）和 My Reading Academy（2022 年，4-8 岁）。Age of Learning
              打出了知名消费者品牌，也融入了大量机构资本，但相对自身规模仍异常低调；公司成为独角兽时，行业观察者曾明确点出这一点。公司一直以私营实体运营，截至 2026 年 5 月报告日期尚未提交公开发行申请。
