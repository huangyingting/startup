      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >
              Age of Learning 未披露获客成本（CAC）、客户终身价值（LTV）、毛利率或订阅用户流失。可用代理信号来自公司的广告足迹、FTC 执法历史，以及可比消费者教育科技基准。ABCmouse
              被广泛报道为电视和数字广告重度投放者，说明消费者渠道 CAC 较高。这符合直接面向消费者教育科技订阅业务的结构特征，该类业务常见 CAC 回本周期为 12–24 个月。2020 年 $10 million 的
              FTC 和解——源自欺骗性订阅取消做法——既是负面财务信号，也说明公司历史上依赖摩擦型留存，而非有机 LTV。消费者软件订阅业务的毛利率通常较高（60–80%），但 ABCmouse 的内容制作开销（维护和更新
              9,000+ 项活动）、自适应学习云成本，以及 AI 产品（My Math Academy、My Reading
              Academy）的持续研发都会压缩经营利润率。对课程业务而言，内容开发和授权本质上是资本支出；内容资产的经济寿命并不清楚。因此，公司资本开支强度显著高于典型纯 SaaS
              同业，但低于硬件或实体媒介业务。员工数未公开披露，但基于 LinkedIn 信号和新闻稿中的公司规模描述，估计公司在 2021 年融资时有 300–600 名员工。
