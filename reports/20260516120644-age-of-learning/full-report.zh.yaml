    title: 平台与分销依赖风险评分
    type: bar
    summary: Age of Learning 五项主要平台和分销依赖的风险评分（1-10），反映集中度、费用拖累和政策变化暴露。
    data:
      items:
        - label: Apple App Store（iOS 渠道）
          value: 8
        - label: Google Play Store（Android）
          value: 7
        - label: Web / 浏览器直达
          value: 3
        - label: 学校学区渠道
          value: 6
        - label: Amazon Kids+ 生态
          value: 5
    approximationNotes: 风险评分是定性评估（1-10），基于公开证据中的收入集中度、费用结构和政策变化暴露。 实际平台收入拆分未披露。
    claimRefs:
      - CR034
      - CR035
  - id: FV001
    title: 可比 EV/收入倍数 — EdTech 同业组
    type: bar
    summary: >-
      关键 EdTech 可比公司的 EV/收入倍数，与 Age of Learning 2021 年最后一轮融资隐含的约 17x 倍数对比。 当前消费 EdTech 订阅平台市场环境为 3-5x，远低于 2021
      年入场点。Duolingo 是估值天花板，不是同业可比。
    data:
      items:
        - label: Duolingo（2026）
          value: 11
        - label: Chegg（2026）
          value: 1
        - label: Age of Learning（2021 年最后一轮）
          value: 17
        - label: EdTech M&A 中位数（2022-24）
          value: 3.5
        - label: Coursera（2026）
          value: 3.5
        - label: Nerdy Inc.（2026）
          value: 1.5
        - label: 当前 EdTech 平均值
          value: 4
    approximationNotes: >-
      倍数为近似值，基于截至 2026 年 5 月的公开市场数据和第三方分析师估计。 Age of Learning 2021 年倍数由 $3B 估值和估计 $150-200M ARR 区间中点推断。 Duolingo 和 Chegg
      倍数基于分析师共识和公开文件。
    claimRefs:
      - CV005
      - CV006
      - CV007
      - CV024
  - id: FV002
    title: 估值情景区间 — 乐观 / 基准 / 悲观 vs. 上轮
    type: range
    summary: Age of Learning 在乐观、基准、悲观情景下的企业价值区间，并与 2021 年最后一轮 $3B 标记对比。 区间很宽，反映财务不透明和市场倍数压缩。所有数值单位为十亿美元。
    data:
      items:
        - label: 悲观情景
          low: 0.4
          high: 0.6
          mid: 0.5
        - label: 基准情景
          low: 1.2
          high: 2
          mid: 1.6
        - label: 乐观情景
          low: 3.5
          high: 5
          mid: 4.2
        - label: 2021 年最后一轮标记
          low: 3
          high: 3
          mid: 3
    approximationNotes: 区间是基于 DCF 和可比分析的定性估计。实际结果取决于未披露的收入、利润率和订户数据。 概率权重为 20% 乐观、50% 基准、30% 悲观，如情景章节所述。
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
  - id: FV003
    title: 估值 KPI 记分卡
    type: kpi
    summary: 截至 2026 年 5 月，基于公开证据、第三方估计和可比公司分析的 Age of Learning 关键估值指标。 标记为估计的项目因缺少经审计财务披露，不确定性区间很宽。
    data:
      items:
        - label: 上轮估值
          value: $3.0B
          note: Bloomberg、TechCrunch 对 2021 年融资轮的报道确认
        - label: 累计融资额
          value: $480M
          note: 估计值，包含截至 2021 年所有已知融资轮
        - label: 估计 ARR
          value: $150-200M
          note: 第三方估计；无公开确认
        - label: 隐含收入倍数（2021）
          value: 15-20x
          note: 由 $3B 估值和估计 ARR 区间推断
        - label: 按市值重估区间
          value: $450M-$1.6B
          note: 基于当前 3-8x 可比倍数应用于估计 ARR
        - label: 建议
          value: Track / Research-More
          note: $3B 不具备操作性；若可进资料室且入场价 $1.2-1.5B，可重新评估
    approximationNotes: 除上轮估值外，所有数字都是基于第三方数据和可比公司分析的估计。没有公开财务确认。 所有估计指标都有很宽的不确定性区间。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV009
  - id: FV004
    title: 建议逻辑流程
    type: flow
    summary: 从公开市场证据和公司特定因素，推导出 Age of Learning 的观察 / 继续研究建议的决策路径。 每个节点代表一个独立证据类别，汇入估值缺口评估和有条件建议。
    data:
      nodes:
        - id: n1
          label: 市场证据
          description: EdTech 倍数压缩至 3-8x；2021 年峰值为 10-15x
        - id: n2
          label: 产品与品牌证据
          description: 品牌护城河强；后疫情订户流失；AI 颠覆风险
        - id: n3
          label: 财务不透明
          description: 无经审计财务；无公开 ARR 或流失数据
        - id: n4
          label: 风险评估
          description: 风险高；有 FTC 过往记录；Tencent 持股；优先股压力
        - id: n5
          label: 估值缺口
          description: $3B 标记 vs. $450M-$1.6B 按市值重估；隐含 47-85% 减记
        - id: n6
          label: 观察 / 继续研究
          description: 有资料室时，$1.2-1.5B 可作为有条件入场；$3B 不具备操作性
      edges:
        - from: n1
          to: n5
          label: 可比倍数压缩退出价值
        - from: n2
          to: n4
          label: 品牌护城河被订户流失和 AI 风险抵消
        - from: n3
          to: n4
          label: 不透明使可靠承保无法落地
        - from: n4
          to: n5
          label: 高风险要求相对公允价值打折
        - from: n5
          to: n6
          label: 估值缺口定义有条件入场投资逻辑
    approximationNotes: 逻辑流程仅基于公开证据；资料室访问会实质改变决策路径。 如果 ARR 增长和订户稳定得到确认，建议可能上调。
    claimRefs:
      - CV009
      - CV010
      - CV023
  - id: FV005
    title: 估值桥 — 从 2021 年最后一轮到当前基准情景
    type: waterfall
    summary: 瀑布图拆解从 2021 年最后一轮 $3B 估值，到估计 $1.2B 基准情景隐含价值的下行： 倍数压缩、订户流失、风险 / 不透明折价，以及优先股压力折价。数值单位为十亿美元。
    data:
      items:
        - label: 2021 年最后一轮入场
          value: 3
        - label: 倍数压缩（3-8x 市场 vs 15-20x 入场）
          value: -1
        - label: 后疫情订户流失折价
          value: -0.3
        - label: 财务不透明与风险溢价
          value: -0.3
        - label: 优先股压力折价
          value: -0.2
    approximationNotes: 瀑布图各项是对整体倍数压缩的定性拆解。单项归因均为估计； 实际价值驱动因素取决于未披露的财务数据。调整项合计隐含约 $1.2B 的剩余基准情景价值， 与可比分析一致。所有数值单位为十亿美元。
    claimRefs:
      - CV009
      - CV010
      - CV026
