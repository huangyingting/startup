      - number: '3.5'
        title: 竞争展望与尽调重点
        blocks:
          - type: paragraph
            body: >
              Age of Learning 的竞争格局稳定但在收紧。免费替代品的质量和广度持续提升，压缩了支撑 ABCmouse
              订阅费的价值差距。公司最可防守的位置在机构（B2B）渠道，那里切换成本更高，数据共享带来锁定效应，免费与付费的张力也没有消费者渠道那么尖锐。消费者渠道的竞争耐久性，取决于 ABCmouse
              的游戏化和课程深度是否足以在 Khan Academy Kids 与 Prodigy 免费层面前维持转化和留存。关键尽调重点包括：拿到真实订阅用户数和月度留存数据；理解学校采购中相对 IXL 和 Epic!
              的竞争赢 / 输动态；评估 Duolingo 未来向低龄儿童读写扩张的深度（截至研究日期尚未推出）可能如何影响 ABCmouse 的语言和自然拼读模块。公开对比留存数据缺失，是本次竞争评估的主要盲点。
