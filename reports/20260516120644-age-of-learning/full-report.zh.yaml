  - id: FM002
    title: 市场估计区间
    type: range
    layout: standard
    summary: 2030 年前全球在线学习 CAGR 的低 / 基准 / 高三档估计，反映各家分析师在 Age of Learning 增长轨迹最相关时期的预测差异。
    data:
      items:
        - label: 低端 CAGR 估计
          low: 8
          high: 12
          unit: '%'
          detail: 保守分析师观点，反映后疫情需求正常化、订阅疲劳和 ESSER 预算到期的逆风；大体符合疫情前的历史增速。
          source: Multiple analysts
          tone: neutral
        - label: 基准 CAGR 估计（GVR）
          low: 12
          mid: 13
          high: 15
          unit: '%'
          detail: Grand View Research 对 2022-2030 年全球在线学习 CAGR 的基准情景；反映移动端渗透率持续提升，以及 AI 个性化带来的溢价。
          source: Grand View Research 2022
          tone: positive
        - label: 高端 CAGR 估计（MarketsandMarkets）
          low: 18
          mid: 21
          high: 25
          unit: '%'
          detail: MarketsandMarkets 的高端估计，纳入 AI 驱动扩张、全球新兴市场接入和企业 LMS 板块增长。
          source: MarketsandMarkets 2023
          tone: positive
        - label: 后疫情修正影响
          low: -20
          mid: -10
          high: -5
          unit: '%'
          detail: 估计 2022-2023 年疫情红利消退后，消费级 EdTech 公司从峰值到低谷的收入收缩；EdSurge 记录了大范围裁员和融资下滑。
          source: EdSurge 2023
          tone: adverse
        - label: GSV EdTech 融资 CAGR（2018-2021）
          low: 35
          high: 50
          unit: '%'
          detail: 疫情投资高峰期 GSV EdTech 融资增速；不是可持续长期增速；代表融资周期峰值。
