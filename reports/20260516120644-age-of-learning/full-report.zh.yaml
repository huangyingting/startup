  - id: FE002
    title: ABCmouse 自适应学习工作流
    type: flow
    summary: 从儿童登录，到 ABCmouse 和 My Math Academy 平台交付自适应内容、再到教师 / 家长报告的端到端流程。
    data:
      nodes:
        - id: n1
          label: 儿童登录（浏览器、iOS 或 Android）
          detail: 跨设备访问并同步进度；最低支持 iOS 13+ 和 Android 5.0+。为遵守 COPPA，需要家长账户。
          tone: neutral
        - id: n2
          label: 自适应引擎评估基线能力
          detail: My Math Academy 和 My Reading Academy 在首次使用时先诊断学生水平；ABCmouse 用引导式学习路径节点推进结构化进阶。
          tone: positive
        - id: n3
          label: 选择个性化内容活动
          detail: 算法根据学生表现历史和目标标准，选择活动类型（视觉、互动、听觉）、难度和学科。
          tone: positive
        - id: n4
          label: 儿童完成活动；采集表现数据
          detail: 记录答题准确率、任务用时和互动模式；数据回流到自适应模型，用于选择下一项活动。
          tone: neutral
