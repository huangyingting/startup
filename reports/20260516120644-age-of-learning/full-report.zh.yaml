      - number: '2.4'
        title: 增长驱动因素与市场顺风
        blocks:
          - type: paragraph
            body: >
              多个结构性顺风支撑 Age of Learning 所生产的早期学习数字内容需求。第一，美国有 13 岁以下儿童的家庭中，智能手机和平板电脑渗透率已接近饱和，移动应用采用的硬件门槛基本消失。第二，COVID-19
              疫情永久改变了家长对教育技术的态度：数百万家庭在 2020
              年停课期间首次采用教育科技工具，学校重开后仍保留了一部分数字学习习惯。第三，家长对早期读写和数学准备度的焦虑上升；广泛报道的疫情后学习损失数据放大了这种焦虑，也带来超出学校课程之外的补充数字学习工具需求。第四，AI
              自适应学习技术自 2021 年以来明显改善，使用机器学习为单个儿童个性化内容节奏的平台，正在获得静态课程产品无法匹配的循证有效性论据。Edutopia 和 EdTech Evidence
              都记录了设计良好的教育技术在早教场景中的有效性案例。
            claimRefs:
