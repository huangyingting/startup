companyProfile:
  summary: >-
    Age of Learning, Inc. 是一家私营教育科技公司，2007 年由 Doug Dohring 在加州 Glendale 创立。旗舰产品 ABCmouse.com 于 2010 年上线，面向 2-8
    岁儿童，提供覆盖阅读、数学、科学和社会研究的 10,000+ 项学习活动。产品组合后来扩展到 Adventure Academy（MMO 式，8-13 岁）、ReadingIQ（数字图书，2-12 岁）、My Math
    Academy（AI 自适应数学，4-8 岁）和 My Reading Academy（AI 自适应阅读，4-8 岁）。公司在 2021 年 10 月以 $3B 投后估值融资 $300M（由 TPG Growth
    领投，QIA、Madrone Capital Partners 和 Tencent 参投），使已知累计融资约 $480M。截至 2026 年 5 月报告日期，公司未披露审计财务报表，也未提交 IPO 申请。
