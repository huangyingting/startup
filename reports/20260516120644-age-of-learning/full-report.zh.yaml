      - number: '8.6'
        title: 图表
        blocks:
          - type: callout
            title: 估值差距与高价买入风险
            body: >-
              Age of Learning 2021 年上一轮 $3B 估值，意味着在估计 $150-200M ARR 上对应 15-20x 收入倍数；当前 EdTech 公开市场 3-8x
              可比倍数并不支持这一水平。任何以接近 2021 年标记入场的新投资人，根据可比分析都会立即面对 47-85% 的按市值重估损失。除非 ARR 增长显著超出估计，2021
              年投资队列（TPG、QIA）也面临类似未实现损失。Chegg 类比——股价从每股 $115 峰值跌至低于 $5——显示，当 AI 竞争反转消费者 EdTech
              订阅者轨迹时，下行风险可以有多大。投资人必须用当前可比倍数，而不是 2021 年标记，作为估值锚。
            calloutType: risk
            claimRefs:
              - CV004
              - CV007
              - CV008
              - CV009
              - CV010
              - CV036
          - type: callout
            title: 倍数压缩是结构性的，不是周期性的
            body: >-
              2021 至 2024 年消费者 EdTech 收入倍数压缩 50-70%，反映投资人对订阅教育平台框架的结构性变化：COVID 队列大多已经流失，免费替代品在质量和规模上变强，AI
              辅导在许多使用场景中正接近付费课程的功能等价，机构投资人也重置了消费者软件回报预期。Morningstar 和 S&P Global 数据显示，软件倍数中位数在 2024 年部分恢复到
              4-7x，但溢价留给高增长、盈利公司。Age of Learning 尚未证明盈利能力，且订阅者轨迹在流失，更接近可比区间低端，而非 Duolingo 溢价层。除非公司证明盈利并重新加速增长，否则周期性回到
              2021 年倍数的可能性很低。
            calloutType: insight
            claimRefs:
              - CV008
              - CV022
              - CV030
              - CV033
          - type: callout
            title: 投资入场价格与条件
            body: >-
              $1.2-1.5B 入场（较 2021 年上一轮大约折价 50-60%）是基准情景回报开始略为正向、乐观情景 3-4x 回报变得可实现的区间。该入场价要求数据室至少确认：（1）ARR 高于 $150M
              且趋势为正；（2）年流失率低于 40%；（3）毛利率高于 60%；（4）股权结构瀑布显示在 $2B+ 退出中普通股为正。满足这些条件前，投资不可执行。投资人应通过二级市场定价信号、任何 IPO
              准备活动，以及监管文件中出现的任何财务披露，持续跟踪 Age of Learning。投资逻辑破裂监控应聚焦 AI tutor 采用曲线和任何 FTC 再接触。
            calloutType: recommendation
            claimRefs:
              - CV009
              - CV015
              - CV027
              - CV028
              - CV029
