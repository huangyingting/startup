      - number: '5.4'
        title: 差异化、信任、安全与合规
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 在消费者教育科技市场的主要差异化，来自内容广度、有效性证据基础和品牌认知。ABCmouse 的 10,000+ 项活动库和 850+
              节结构化课程，显著超过可比免费竞争对手：Khan Academy Kids 约有 3,000 项活动，Duolingo ABC 只面向早期阅读。课程深度上唯一接近的比较对象是 IXL；它广泛覆盖 K-12
              技能，但并不专门聚焦 2-8 岁早教细分。My Math Academy 经 WestEd 验证的有效性结果，是 AI 教育科技领域少见的公开证明点，也在要求学生学习增益证据的学区销售周期中构成有意义的采购优势。

              鉴于用户群体在 13 岁以下，信任与安全是 Age of Learning 产品设计的核心。公司声称所有产品均符合 COPPA，要求可验证的家长同意、限制收集儿童个人数据，并禁止行为广告。2020 年 FTC
              因欺骗性取消做法达成的 $10M 和解（覆盖 2015-2018 年）是既往负面事件，但焦点是订阅取消流程，而非儿童数据隐私本身。同意令要求重建合规体系并持续向 FTC 报告；截至 2026 年 5
              月，公司未再次遭遇执法行动。任何部署在学校场景的产品都需要 FERPA 合规，Age of Learning 的学校产品纳入了标准 FERPA 保护。Common Sense Media 对 ABCmouse
              的隐私评估，为公司数据实践提供了额外第三方验证。公司未公开披露外部安全审计或 SOC 2 认证。
