      - number: '8.3'
        title: 乐观、基准与悲观估值情景
        blocks:
          - type: paragraph
            body: >-
              在当前市场条件下，三个情景界定 Age of Learning 的估值结果。所有情景都假设新投资人以低于 2021 年 $3B 标记的价格进入；以 $1.2B 入场的回报分析仅供参考。

              乐观情景（20% 概率）假设 ARR 增长 25%、盈利路径得到证明、AI 能力成功整合，并由战略收购方或成长股权资本重组以 8-10x 收入倍数退出。在这些假设下，$3.5-5.0B
              的隐含企业价值可以实现，并在 $1.2B 入场价下产生 3-4x 回报。乐观情景要求订阅者重新加速、通过 S-1 或数据室实现收入透明，并解决 Tencent 持股问题。

              基准情景（50% 概率）假设 ARR 增长 10-15%、自由现金流率持平或温和改善，并通过战略 M&A 或老股出售以 4-6x 收入退出。这会产生 $1.2-2.0B 的隐含企业价值，以及 $1.2B 入场价下
              1.0-1.7x 回报。基准情景要求已验证 ARR 和稳定流失，且没有新的 FTC 执法行动。

              悲观情景（30% 概率）假设 AI 侵蚀和订阅者停滞使 ARR 仅增长 0-5%，最终以 2-3x 收入倍数困境退出或 down-round，对应 $400-600M 企业价值和 0.3-0.5x
              回报。悲观触发因素包括 AI 辅导 K-8 用户超过 10M、FTC 复发，或订阅者降至 3M 以下。本节的投资逻辑与反向逻辑表，将每项关键论点映射到证据和会改变判断的条件。
