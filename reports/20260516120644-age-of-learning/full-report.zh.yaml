      - number: '2.3'
        title: 买方与客户分层
        blocks:
          - type: paragraph
            body: >
              Age of Learning 面向两类不同买方：为订阅付费的直接面向消费者父母和监护人，以及购买站点授权的 K-12
              学校和学区机构买方。两个细分的获客成本（CAC）画像、留存经济性和竞争动态都不同。家长消费者细分贡献 ABCmouse 收入的大多数，对
              $7.99-$12.99/月价格点高度敏感，并在返校季和家长担忧入学准备时出现季节性高峰。服务该细分的教育科技平台，主要围绕品牌认知、App Store 可见度和家长社群推荐展开竞争。


              机构 B2B 细分——学校和学区——转化更慢，但买方黏性更高，通常需要课程对齐文件、隐私合规认证（COPPA、FERPA、SOPIPA）和学区 IT 审批流程。ABCmouse for Schools 宣称已落地
              10,000+ 间教室，相对于美国 K-2 教室基础约 6 million 间，渗透率仍不高。机构买方按年度采购周期编预算，一旦上线往往形成多年续约模式，对定价的反应也不同于消费者市场。GSV EdTech
              Index 和 EdTech Magazine 都将混合消费者 / 机构平台识别为 Age of Learning 这类公司的结构性优势，因为双渠道模式降低了对单一付费方类型的依赖。
