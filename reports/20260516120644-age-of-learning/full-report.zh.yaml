      - CV024
      - CV028
      - CV039
  - id: TV005
    title: 击穿投资逻辑的触发项与必做尽调要求
    notes: 这些尽调事项会阻断投资执行。若至少拿不到财务报表和订阅用户指标，投资建议不可能上调。项目按阻断程度从高到低排序。
    columns:
      - 主题
      - 缺失证据 / 触发项
      - 重要性
      - 尽调路径
    rows:
      - - 经审计财务报表
        - FY2022-FY2025 收入、ARR、毛利率、EBITDA
        - 没有收入数据，无法测算增长、盈利能力或 DCF
        - 数据室：索取经审计 P&L、现金流量表、ARR 看板
      - - 订阅用户指标
        - ABCmouse 活跃订阅用户、队列留存、12 个月流失率
        - 收入质量和可持续性取决于订阅用户走势
        - 数据室：月度订阅用户数、LTV、CAC、队列留存曲线
      - - 股权结构表和优先权瀑布
        - $480M 融资后的优先股堆叠；参与型优先股条款
        - 若以 $1-2B 退出，普通股退出所得可能微不足道
        - 索取股权结构表、ROFR/ROFO/pro-rata、清算优先权条款
      - - FTC 同意令合规
        - 当前合规状态和监测安排
        - 重大复发风险；新的 FTC 介入会击穿投资逻辑
        - 索取合规负责人声明和 FTC 往来函件记录
      - - Tencent 持股和 CFIUS 状态
        - Tencent 精确持股比例以及任何 CFIUS 审查状态
        - 若不补救，会阻碍美国 IPO 或涉美国政府的 M&A
        - 索取国家安全风险法律意见；Tencent 持股缓释计划
    claimRefs:
      - CV013
      - CV020
      - CV023
      - CV028
      - CV039
figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: standard
    summary: 按时间记录 Age of Learning 从 2005 年到 2023 年 9 月的创立、产品发布、融资事件、监管行动和领导层更替。
    data:
      items:
        - date: '2007'
          label: 公司创立
          detail: Doug Dohring 将 Neopets 出售给 Viacom 后，在 California 州 Glendale 创立 Age of Learning。
          tone: positive
        - date: Nov 2010
          label: ABCmouse 发布
          detail: 旗舰产品 ABCmouse.com 发布，面向 2-8 岁儿童，提供覆盖阅读、数学、科学和艺术的订阅制学习课程。
          tone: positive
        - date: May 2016
          label: $150M 独角兽轮
          detail: 从 ICONIQ Capital 融资 $150M，估值 $1B；ABCmouse for Schools 同时上线。公司在保持低公开曝光的同时跻身独角兽。
          tone: positive
        - date: Apr 2019
          label: Adventure Academy 发布
          detail: 面向 8-13 岁儿童的 MMO 教育游戏于 2019 年 4 月 30 日上线；定位为首款儿童教育大型多人在线游戏。
          tone: positive
        - date: Mar 2020
          label: COVID 免费访问活动
          detail: COVID-19 停课期间，ABCmouse 向所有美国家庭免费开放；在 EdTech 采用高峰期带来一轮大规模用户获取。
          tone: neutral
        - date: Sep 2020
          label: FTC $10M 和解
          detail: FTC 就 2015-2018 年期间的欺骗性订阅和取消做法，与 Age of Learning 达成 $10M 和解；这是 EdTech 最大的监管行动之一。
          tone: adverse
        - date: Nov 2021
          label: 以约 $3B 估值融资 $300M
          detail: TPG Growth、Qatar Investment Authority、Madrone Capital Partners 和 Tencent 共同投资 $300M；公司估值约 $3B。
          tone: positive
        - date: Sep 2023
          label: Alex Galvagni 出任 CEO
          detail: 公司史上第三任 CEO；Paul Candland 离任；Dohring 转为非执行角色。
          tone: neutral
    approximationNotes: null
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO008
      - CO009
      - CO010
      - CO013
