      - number: '5.2'
        title: 自适应学习技术与 AI 架构
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 的核心技术差异化，来自其自适应学习引擎；该引擎基于单个学生的表现数据，个性化安排内容顺序。公司将该系统称为 AI 驱动，其中 My Math Academy 和 My
              Reading Academy 是自适应层最先进的落地。在 My Math Academy 中，算法持续评估学生回答，并调整学习活动的难度、节奏和类型——在视觉、听觉和互动模式之间选择——以优化个人学习路径。旗舰
              ABCmouse 平台使用带有 850+ 个节点的引导式学习路径，按学科和难度排列内容；但与 My Math / Reading Academy 产品相比，它的动态自适应程度较低。

              AI 驱动有效性的最清晰公开证据，来自独立教育研究机构 WestEd 在 2022 年开展的一项随机对照试验。研究发现，幼儿园学生使用 My Math Academy 约 12 周后，数学熟练度相较对照组学生提升
              1.3 个年级水平；结果被描述为在 95% 置信水平上具有统计显著性。WestEd 后续研究把类似发现扩展到一年级和二年级学生。在这一规模上，My Math Academy
              属于少数拥有同行评审或独立审计有效性主张的 AI 自适应教育科技产品。公司还称其课程与 Common Core State Standards 和 ISTE
              学生标准对齐，使其可被要求标准证据作为采购前提的学区采用。

              自适应架构本身是自研且未公开记录。Age of Learning 不发布 API 规格、学习模型技术白皮书，也不披露底层 ML 框架信息。工程人才集中在加州 Glendale，LinkedIn 和
              Glassdoor 上可见少量二级招聘信号。公司没有维护公开 GitHub，也没有发布与核心平台相关的开源贡献。
