      - number: '6.2'
        title: 采用轨迹与使用指标
        blocks:
          - type: paragraph
            body: >-
              ABCmouse 的订阅者轨迹呈现出典型的消费者 EdTech 模式：COVID-19 疫情期间在 2020-2021 年大幅增长，随后进入疫后常态化。公司在 2021 年新闻报道中称，ABCmouse
              自上线以来累计服务全球超过 35 million 名儿童。活跃付费订阅者估计在 2020-2021 年疫情期间接近 10 million 的峰值，这是公司历史最高点。Sensortower、SimilarWeb
              流量数据以及第三方分析师估计显示，活跃订阅者基数在 2023-2024 年回落到约 4-6 million，但仍显著高于疫情前基础，说明一部分需求被永久留住。

              学校渠道中，ABCmouse for Schools 的数量是最稳定被引用的牵引指标：多个公开来源都提到 10,000+ 个课堂落地。My Math Academy 和 My Reading Academy
              在学校渠道的采用更新（自 2021-2022 年起），公开记录也更少，学区合作公告是主要牵引证据。Age of Learning 已宣布与 Title I 学区和 Head Start 项目合作，这与
              EdTech 用具备有效性证据的 AI 自适应产品切入联邦资助学校渠道的趋势一致。

              公开证据里最大的缺口，是公司没有披露官方订阅者数量、月活用户或按产品线拆分的收入。作为私人公司，Age of Learning 不定期发布财务或经营指标。Sensortower 和 SimilarWeb
              的第三方应用下载数据只能提供方向性判断，无法替代一手订阅数据。公司 2021 年以约 $3B 估值融资 $300M，意味着投资人曾看到支撑该估值的指标，但这些指标没有进入公开记录。
