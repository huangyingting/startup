            title: FTC 同意令复发是概率最高的监管触发点
            body: >-
              2020 年 FTC $10 million 和解和仍有效的同意令，是 Age of Learning 最重大的单一负面法律事实。任何复发——哪怕只是违反该命令中订阅取消或披露要求的技术性违规——都会触发 FTC
              藐视法庭程序或新的执法行动，并带来最高 $50,120 / 每项违规 / 每天的 COPPA 民事罚款暴露。FTC 自 2022 年以来加大了 COPPA 执法，Age of Learning
              仍是具名的既往违规者。投资人在交割任何头寸前，必须取得完整合规项目文档和第三方审计确认。
            calloutType: risk
