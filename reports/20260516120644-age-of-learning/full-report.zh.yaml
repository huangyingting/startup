      - number: '8.2'
        title: 可比公司与交易分析
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 的可比对象横跨上市消费者 EdTech 公司、私人平台估计和订阅 EdTech M&A 交易。Duolingo（DUOL）是最显眼的上市 EdTech 同行：它报告 2024
              财年收入约 $748M，同比增长 41%；2026 年初市值约 $8-9B，意味着 EV/revenue 倍数为 10-12x。Duolingo 的溢价明确来自盈利能力、高增长，以及能产生 97M 日活用户的
              freemium 模式——这些特征并不属于 Age of Learning 的付费墙订阅模式。因此，Duolingo 应作为天花板可比，而不是同行；其倍数无法被增长更慢、由订阅门槛限制的平台复制。

              Chegg（CHGG）提供了警示性可比：2023 财年收入约 $510M，2024-2026 年市值约 $500M，对应 1x 收入倍数。Chegg 股价从 2021 年每股 $115 跌到 2024 年每股低于
              $5，根源是 AI 竞争侵蚀订阅者增长，并反转了平台的核心价值主张。Age of Learning 面临来自 Khanmigo、ChatGPT 和其他 AI 辅导产品的类似 AI 替代风险。

              2022-2024 年 EdTech M&A 交易中，订阅平台收入倍数为 2-6x，中位数约 3.5x。IXL Learning 估计年收入超过 $1B，但未公开披露股权估值。Coursera 和 Nerdy
              Inc. 分别交易在 3-4x 和 1-2x 收入，反映邻近市场挑战。EdTech M&A 约 3.5x 的中位数，是战略收购情景下最适用的基准。Hamilton Lane 和 PitchBook
              的私人二级市场数据表明，2022 年以来后期私人消费者科技头寸较上一轮标记折价 30-60% 成交，与从可比倍数推导出的按市值重估区间一致。估值情景区间见旁边的范围图；基准情景意味着 $1.2-2.0B。
