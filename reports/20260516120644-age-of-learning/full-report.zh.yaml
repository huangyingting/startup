      - number: '8.4'
        title: 建议、入场纪律与投资逻辑破裂条件
        blocks:
          - type: paragraph
            body: >-
              总体建议是观察 / 继续研究。按 2021 年上一轮 $3B 标记看，这笔投资不可执行，因为结构性倍数压缩、订阅者流失，以及完全缺乏经审计财务披露。按当前市场 3-8x 收入可比倍数，Age of
              Learning 的公允价值区间为 $450M-$1.6B，意味着既有投资人较 2021 年入场价格减记 47-85%。对新投资人而言，约 $1.2-1.5B 入场（较上一轮折价
              50-60%）是基准情景回报略为正向、且乐观情景 3-4x 回报变得可实现的区间。

              入场纪律要求：（1）数据室提供 FY2022-FY2025 经审计财务报表；（2）已验证 ARR
              和订阅者队列数据，至少显示流失稳定且温和增长；（3）披露股权结构表和清算优先权瀑布，以确认普通股分配；（4）提供带第三方审计的 FTC 同意令合规文档；（5）在任何 IPO 或与美国政府相邻的收购背景下，给出处理
              Tencent 持股的具体计划。

              风险评级为高。FTC 历史、订阅者流失轨迹、AI 替代风险、估值倍数压缩和财务不透明，合起来构成高于平均的尽调负担。$480M 优先股融资带来的优先权悬置，会在低于 $2B
              的退出情景中显著压缩普通股退出所得。如果采用带参与权优先股和标准清算优先权的结构，在 $1.0-1.5B 退出中，大部分收益会被优先股吸收，普通股分配极少。投资逻辑破裂条件包括：确认 2023-2025
              年订阅者低于 3M；任何新的 FTC 执法行动或接触；任何低于 $1.5B 隐含估值的 down-round 融资；2-8 岁年龄段 AI tutor DAU 超过 20M；或披露最近财年 EBITDA
              亏损超过收入的 15%。
