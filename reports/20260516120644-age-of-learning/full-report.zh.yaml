  - id: FM001
    title: 市场规模测算视角
    type: pyramid
    layout: standard
    summary: 从最宽的全球在线学习 TAM，到 Age of Learning 主要竞争的美国早教消费者 EdTech 可服务市场，逐层拆分嵌套市场。
    data:
      items:
        - label: 全球在线学习 TAM
          value: ~$200-315B (2022 estimates)
          detail: 全球在线学习总量，包括企业 LMS、职业认证、高等教育、K-12 和早教；来源为 Grand View Research 和 MarketsandMarkets。
          tone: neutral
        - label: 全球 K-12 与消费者 EdTech
          value: ~$50-100B estimated
          detail: 全球在线学习中的 K-12 细分；不含企业培训和高等教育；包括消费者应用、学校授权、补充课程；团队基于细分拆解估计；没有单一权威来源。
          tone: neutral
        - label: 北美早教学习应用
          value: ~$5-15B estimated
          detail: 美国和加拿大面向 2-13 岁儿童、由家长购买的消费者数字学习；团队基于入学数据和渗透率假设估计；高度近似。
          tone: neutral
        - label: 美国早教订阅（2-8 岁）
          value: ~$1.5-3B estimated
          detail: 美国学前至小学低年级 DTC 订阅市场；Age of Learning 的核心 B2C 市场；自下而上估计；无一手分析师来源。
          tone: neutral
        - label: ABCmouse 竞争细分市场
          value: Several hundred $M to ~$1B+ (speculative)
          detail: 早教订阅应用现有玩家的收入池（ABCmouse、Khan Academy Kids、LeapFrog、Duolingo for Kids 同类产品）；公开数据中没有可靠估计。
          tone: neutral
    approximationNotes: 所有规模估计来自公开第三方分析师报告，或团队自下而上测算。面向美国 2-8 岁儿童的消费级 EdTech 订阅市场，没有公开、经审计的分部收入数据。
