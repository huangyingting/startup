      - number: '2.2'
        title: 市场规模与增长预测
        blocks:
          - type: paragraph
            body: >
              多家市场研究机构给出了相关可触达市场估计，但方法差异很大。Grand View Research 对 2021 年全球在线学习的 $210 billion 估计覆盖全部数字学习，而 Age of Learning
              的可服务可触达市场更窄。基于可得研究拆分，面向 K-12 的消费者教育科技细分（应用、订阅、补充课程）通常被估计为全球 $20-50 billion，其中北美早教细分是 ARPU 最高的子集。GSV
              Ventures 的 EdTech 指数跟踪公私教育科技投资流，称教育科技在 2021 年这个疫情峰值年份全球融资超过 $20 billion；随后 2022-2023 年急剧收缩，私募融资降回疫情前水平。


              对美国直接面向消费者早期学习订阅市场，公开来源没有单一权威规模估计。NCES 入学数据（约 56.6 million 名 K-12 学生）提供了天花板参照；若付费学前至 6 年级学习应用的家庭渗透率为
              5%，每户平均订阅 $100/year，则美国消费者细分隐含年收入池约 $1.5-3 billion。这是约束性估算，不是一级分析师报告。Statista 和 iSpring 发布的在线学习细分统计，与
              Grand View Research 的自上而下数字大体一致。
