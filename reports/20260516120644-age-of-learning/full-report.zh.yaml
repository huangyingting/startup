          low: 150
          high: 600
          mid: 300
          detail: 由 $3B 估值和 5x–20x ARR 倍数推导；中点假设 10x 倍数，符合 2021 年定价下的 EdTech SaaS 同行；高度不确定。
        - label: 估计月度烧钱（百万美元）
          low: 5
          high: 25
          mid: 12
          detail: 基于估计 300–600 名员工、每人约 $150K 全包成本 + 内容 + 基础设施；中点假设约 $12M/month，符合该规模内容密集型 EdTech。
        - label: 估计剩余现金跑道（月，自 2021 年融资起）
          low: 18
          high: 60
          mid: 36
          detail: 假设 2021 年融资中有 $300M–$600M 被动用，月烧钱为 $5M–$25M；实际跑道完全取决于未披露的现金头寸和烧钱速度。
        - label: 估计毛利率（%）
          low: 45
          high: 72
          mid: 60
          detail: 以 Duolingo（72%）、IXL 和可比消费级 EdTech 为基准；因内容开发和自适应 AI 基础设施，相比纯 SaaS 被压缩。
        - label: 估计消费者 ARR（百万美元）
          low: 50
          high: 250
          mid: 120
          detail: 仅消费者收入估计；假设 1M–5M 订阅用户，混合 ARPU 为 $5–$7/month；机构 ARR 叠加在外，但没有合同数据无法估算。
