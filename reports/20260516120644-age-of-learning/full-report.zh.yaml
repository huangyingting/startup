      - number: '3.3'
        title: 定价动态与包装
        blocks:
          - type: paragraph
            body: >
              消费者早期学习应用市场定价跨度很大，从免费（Khan Academy Kids、PBS Kids、Starfall、Duolingo ABC），到免费增值（Prodigy 基础功能免费，付费约
              ~$8/月），再到付费订阅（$7.99– $19.99/月）。ABCmouse 当前标价为 $7.99/月或 $59.99/年，位于付费层中段，高于 Prodigy 的付费增购，低于 IXL 的
              $19.99。资金充足的免费替代品压低了付费意愿，也持续压迫 ABCmouse 的订阅转化和留存。Epic! 的学校免费模式（教师免费使用，家庭为居家访问支付 $9.99/月）与 ABCmouse
              结构不同，但在家庭场景争夺同一预算。IXL 的更高价格由其在 K-12 技能练习中的主导地位和学校渠道背书支撑。ABCmouse 的定价历史并不完全公开，但 FTC
              和解显示，订阅取消摩擦曾被用于留住订阅者，这是有机留存质量的负面信号。
