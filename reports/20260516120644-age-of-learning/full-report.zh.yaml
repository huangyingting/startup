      - number: '6.3'
        title: 具名客户证明与学区合作
        blocks:
          - type: paragraph
            body: >-
              相比公司关于学校部署规模的表述，Age of Learning 公开记录中的机构客户基础有限。ABCmouse for Schools 是最成熟的 B2B 产品；eSchoolNews、EdTech Digest
              和公司新闻稿自 2016 年以来持续引用 10,000+ 个课堂落地。不过，公开材料很少披露具体具名学区客户；学校合作通常按总量或资助项目类型描述，而不是列出机构名称。这符合 EdTech
              公司的常见做法，但削弱了第三方验证能力。

              My Math Academy 和 My Reading Academy 的公开证据更稀疏，但正在改善。公司已宣布与 Title I 学区合作，意在把具备有效性证据的产品放入联邦资助学校项目。关于早教 AI
              学习在 Head Start 项目的采用，新闻报道也有所提及。Age of Learning 还通过州级读写能力计划服务政府项目客户，不过具体州名和项目规模披露并不稳定。2024-2025
              年，公司新闻稿和新闻报道中的学区合作公告节奏加快，与 B2B 学校业务增长相符。

              最具体的具名部署证据，来自 ABCmouse
