      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Age of Learning 的已知融资历史分三阶段展开。早期资本约 $30M，通过 2011 年和 2012 年 SEC Form D 文件向未具名投资者募集；此后公司才获得更广泛的机构关注。2016 年 5
              月，公司由 ICONIQ Capital 领投融资 $150M，投后估值达到 $1 billion，跻身独角兽，市场形象明显改变。EdSurge 将 Age of Learning 称为「quiet
              giant」，此前其规模基本未被科技媒体注意。更大的一轮出现在 2021 年 11 月，Age of Learning 从 TPG Growth、Qatar Investment
              Authority、Madrone Capital Partners 和 Tencent 等投资方融资 $300M，据报道估值约 $3 billion。


              三个阶段合计带来约 $480M 已知股权融资。公司未上市，未发行公开债务，也没有公开可得的审计财务报表。SEC EDGAR 记录通过 Form D
              文件确认了股权发行，但不披露重要财务条款。因此，具体股权结构表、投资者权利、当前现金状况、烧钱速度和收入画像仍完全私有。任何关于资本充足性或利润率结构的充分尽调，都需要直接进入资料室。Tencent
              共同投资也给未来任何控制权变更交易带来潜在 CFIUS 审查问题。
