      - number: '7.4'
        title: 运营与人员风险
        blocks:
          - type: paragraph
            body: >-
              Doug Dohring 自 2007 年创立 Age of Learning 起一直担任 CEO，任期 18 年；对一家由机构成长股权支持、估值 $3 billion
              的公司而言，这并不常见。创始人连续性可以体现文化一致和产品信念，但也带来集中的关键人依赖。公司没有公开披露接班计划。Raeanne Yamamoto（COO）是 Age of Learning
              公开识别出的另一位高级管理者，公开高管梯队偏薄，带来治理担忧。公司位于 California 的 Glendale 市场；大洛杉矶地区 Google、Apple、Meta
              等大型科技雇主带来的竞争，构成持续工程人才留存风险。

              治理风险来自成长股权支持公司中的创始人控制：机构投资人如果寻求退出流动性或战略方向变化，可能在创始人 CEO 保留重大控制权时遇到摩擦。Age of Learning 自 2021
              年融资以来没有披露任何组织重组、裁员或员工数变化，外部难以评估当前运营健康度和成本结构。来自大型科技公司的软件工程人才竞争带来持续留存风险，尤其在 Age of Learning 需要把 AI
              能力整合进平台时，可能影响产品速度。关键人依赖、公开高管披露稀薄和缺乏治理透明度叠加，使运营风险高于典型后期消费者软件公司。
