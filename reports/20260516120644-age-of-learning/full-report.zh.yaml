    title: 公司快照逻辑
    type: flow
    layout: standard
    summary: Age of Learning 的品牌、多产品平台和资本基础如何连到订阅收入模型，以及监管风险如何限制增长杠杆。
    data:
      nodes:
        - id: brand
          label: ABCmouse 品牌资产
          detail: ABCmouse 是有辨识度的消费者品牌，App Store 评分 4.5/5，并获 Common Sense Media 5/5 背书；在学前和小学低年级家庭中认知度强。
          tone: positive
        - id: platform
          label: 多产品平台
          detail: ABCmouse、Adventure Academy、ReadingIQ、My Math Academy、My Reading Academy；覆盖 2-13 岁；B2C 订阅加 B2B 学校渠道。
          tone: positive
        - id: capital
          label: 累计融资约 $480M
          detail: ICONIQ Capital、TPG Growth、Qatar Investment Authority、Madrone Capital 和 Tencent 的资金支持运营、产品开发和市场扩张。
          tone: positive
