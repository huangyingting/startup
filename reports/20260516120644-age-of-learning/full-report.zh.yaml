  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与基础概览
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 面向三类客户：面向家长订阅者的直接消费者业务（B2C）；包括学区和课堂教师在内的机构买方（B2B）；以及通过 Title I 学校、Head Start
              项目和州级读写能力计划触达的政府资助项目参与者。按订阅者数量看，B2C 最大，也是 ABCmouse 历史业务核心。家长每月支付 $9.99，即可让一名儿童访问 ABCmouse 全内容库，并可使用 7
              天免费试用。目标家长人群偏向年收入 $50,000-$150,000、且至少有一名 2-8 岁儿童的家庭。平台主要在美国，估计收入超过 80% 来自北美订阅者；加拿大、墨西哥、英国和日本是主要国际市场。

              B2B 学校渠道通过 ABCmouse for Schools、My Math Academy 和 My Reading Academy 服务 K-2 到 Grade 6 课堂。ABCmouse for
              Schools 已在公开资料中被引用为落地超过 10,000 个课堂。My Math Academy 和 My Reading Academy 是较新的 B2B 产品，重点面向有资格获得联邦教育资金的 Title
              I 学区。学校销售周期为 6-18 个月，学区级采用通常签多年合同。政府项目买方包括 Head Start 运营方和州级读写能力补助接受者，是第三条渠道；它受益于联邦拨款，但也承担与 ESSER
              到期和年度拨款挂钩的预算周期风险。

              对一家私人公司而言，应用商店评分是少数独立消费者满意度信号之一。ABCmouse 在 Apple App Store 约 994,000 条评价中获得 4.5 星，在 Google Play 约 35,000
              条评价中获得 4.0 星——这些信号与大规模消费者满意度相符。Common Sense Media 给 ABCmouse 的学习评分为 5/5，并推荐给 2-8 岁儿童。
