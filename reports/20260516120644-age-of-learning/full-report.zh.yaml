  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 最具体的不利法律事实，是 2020 年 9 月 FTC 和解：公司支付 $10
              million，并接受一项同意令，要求清晰的订阅取消流程，并禁止向消费者未经授权收费。该同意令仍然有效，给公司带来持续合规义务；对这一阶段的消费者软件公司来说并不常见。未来任何违规——即便是无意违规——都可能触发藐视法庭程序或新的执法行动，并在当前执行口径下带来最高
              $50,120 / 每项违规 / 每天的 COPPA 民事罚款风险。

              COPPA 要求面向儿童的数字服务运营商，在收集 13 岁以下儿童个人信息前取得可验证的父母同意。对 ABCmouse 来说，这涵盖账户注册、学习进度数据、设备标识符和行为信号——这些都是 FTC 密切监控的
              COPPA 合规类别。FERPA 禁止教育机构在未经父母同意的情况下披露学生教育记录；Age of Learning 的学校合作（ABCmouse for Schools，10,000+
              个课堂）使其在学校收集数据上进入 FERPA 范围。SOPIPA 进一步禁止将学校合作中的学生数据用于定向广告或画像。

              联邦立法风险正在上升：Kids Online Safety Act（KOSA）于 2024
              年在美国参议院重新提出；如果通过，将对服务未成年人的平台施加新的内容推荐限制、数据最小化要求和注意义务。California、Virginia 和 Colorado 等多个州已经颁布或正在推进儿童在线隐私法，在
              COPPA 之外叠加合规义务。Age of Learning 的累计监管暴露相当高：每一部新法都可能要求产品改动、与学校合作伙伴签署新的 DPA 协议，并对数据流做法律审查，且这些成本会持续发生。App
              Store 反垄断维度——Epic v. Apple 诉讼和 EU Digital Markets Act——可能改变 Age of Learning 依赖的移动收入订阅费率和分发框架，不过相比
              COPPA/FTC 这条风险轴，运营影响更间接。
