      - number: '6.4'
        title: 留存、流失、满意度与消费者体验
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 没有公开披露订阅流失率、净留存率（NRR）或总留存率（GRR）。2020 年 FTC 执法行动是记录中最重要的负面客户体验事件：公司因欺骗性订阅取消做法达成 $10 million
              和解。FTC 认定，Age of Learning 在 2015-2018 年让订阅者取消 ABCmouse 订阅变得不合理地困难，导致未经授权扣费。公司随后重建了取消流程；截至 May
              2026，未记录后续执法行动。不过，Trustpilot 和 Better Business Bureau 上的持续消费者评价显示，仍有一部分订阅者不满取消和计费做法。

              应用商店评分是最显眼的满意度代理指标。ABCmouse 在 Apple App Store 约 994,000 条评价中获得 4.5 星，在 Google Play 约 35,000 条评价中获得 4.0
              星，说明消费者普遍认可学习内容。Common Sense Media 的 5/5 学习评分，以及 Parents Magazine、Today's Parent
              等独立家长媒体推荐，进一步验证了强品牌背书。高应用商店评分与 Trustpilot、BBB 上持续的计费 / 取消投诉并存，说明产品体验（内容质量）很强，但订阅管理体验尚未完全从 FTC
              记录的问题中恢复。对学区客户而言，多年合同和较低流失（相对消费者订阅）带来更耐久的收入，但公司没有公开披露留存数据。
