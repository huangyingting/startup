  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与学习平台概览
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 在同一公司伞下运营五个不同的订阅学习产品，每个产品面向特定年龄段和学习目标。ABCmouse 是 2010 年 11 月上线的旗舰产品，服务 2-8 岁儿童，提供 10,000+
              项学习活动和 850+ 节结构化课程，覆盖六个学科：阅读与语言艺术、数学、科学、社会研究、艺术与颜色、音乐。平台以浏览器订阅形式运行，并可在 iOS 和 Android 使用；在 Apple App Store
              上，约 994,000 条用户评价给出 4.5 星评分，是评论数最多的儿童教育应用之一。Common Sense Media 给 ABCmouse 的学习评分为 5/5，并推荐给 2-8
              岁儿童，提供了强第三方课程背书。

              Adventure Academy 于 2019 年 4 月上线，是面向 8-13 岁儿童的大型多人在线（MMO）式教育游戏，价格为
              $9.99/月，在沉浸式虚拟世界中覆盖语言艺术、数学、科学和社会研究。ReadingIQ 以精选数字图书库服务 2-12 岁儿童。My Math Academy（2021 年上线）和 My Reading
              Academy（2022 年上线）构成公司的 AI 驱动自适应学习层，面向 4-8 岁儿童，提供基于学习科学的个性化教学。两个 Academy 产品都已部署在学区场景中，除直接面向消费者订阅外，也通过 B2B
              渠道销售。五个产品均列在公司官网上，体现出公司有意从学前班覆盖到初中入学前的年龄段策略。
