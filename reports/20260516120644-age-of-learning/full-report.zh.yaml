  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Age of Learning 处在消费者教育科技市场与 K-12 数字学习市场的交汇处。本分析将相关市场定义为数字化交付的早教和 K-12 学习内容细分市场，覆盖主要向家长和学校销售、服务 2-13
              岁儿童的订阅式和授权式产品。范围包括浏览器和移动应用课程平台、教育游戏、数字图书库以及 AI 自适应辅导工具，但不包括企业 LMS 平台、企业培训和高等教育 SaaS。


              全球在线学习市场是最宽的相关大盘。Grand View Research 估计，2021 年全球在线学习市场约 $210 billion，并预测到 2030 年 CAGR 为
              13%。MarketsandMarkets 给出的重叠估计为 2028 年达到 $315 billion，CAGR 为 21%。K-12
              和早教子细分显著小于整体在线学习大盘，后者还包括企业培训、职业认证和高等教育。Age of Learning 的直接可服务市场，应理解为面向 2-13
              岁、面向家长订阅的教育科技细分市场，覆盖英语市场和部分全球市场；另加面向 K-2 至 6 年级课堂工具的 B2B 学校 / 学区授权市场。
            claimRefs:
              - CM001
              - CM002
              - CM003
