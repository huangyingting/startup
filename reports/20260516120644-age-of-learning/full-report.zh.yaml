  - id: TV004
    title: 投资逻辑与反向逻辑
    notes: 投资逻辑与反向逻辑仅基于公开信息。缺少经审计财务是本分析最重大的约束。每项论点都是方向性信号，任何投资承诺前都需要数据室确认。
