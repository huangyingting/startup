          - type: callout
            title: 疫后订阅者流失轨迹与更广泛 EdTech 调整一致
            body: >-
              ABCmouse 在 COVID-19 疫情期间的订阅者峰值约 10 million，到 2023 年估计收缩至 4-6 million，下降 40-60%，与行业范围内的疫后队列衰减一致。这条轨迹类似
              Chegg 因订阅者流失和 AI 竞争导致股价下跌 95%。该模式显示，ABCmouse 的疫情时期队列结构性留存低于疫情前用户；除非公司能与免费替代品拉开差异，或把 AI
              能力转化为可衡量的学习优势，否则平台可能进入持续流失阶段。2-8 岁年龄段最多 6 年的客户生命周期，进一步限制 LTV 计算，并造成持续获客跑步机。
            calloutType: insight
            claimRefs:
              - CR011
              - CR012
              - CR016
              - CR018
              - CR042
          - type: callout
            title: 投入资本前先设定投资尽调否决标准
            body: >-
              FTC 监管历史、疫后订阅者流失、以 15-20x 当前估计收入支撑的 $3B 隐含估值、未披露财务指标，以及创始人 CEO 关键人集中，叠加后使这笔投资需要高于平均水平的尽调。任何承诺前，投资人应取得带订阅者和
              ARR 趋势的经审计财务、SOC 2 Type II 认证或等效证明、FTC 同意令合规文档，以及董事会层面的接班计划。投资逻辑破裂触发条件应写入文件：任何新的 FTC 接触、订阅者低于 3 million、低于
