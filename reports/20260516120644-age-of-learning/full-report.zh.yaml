  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Age of Learning 所处的数字早期学习内容市场拥挤，但结构上分层明显。竞争集合覆盖多类替代品：由公共资金支持的免费应用（Khan Academy Kids、PBS
              Kids）、免费增值游戏化平台（Prodigy、Starfall）、窄学科订阅服务（Homer、ReadingIQ）、广技能付费订阅（IXL、ABCmouse）以及数字阅读库（Epic!）。没有单一竞争对手能在面向
              2–8 岁儿童的一体化环境中，复制 ABCmouse 的完整课程广度（预读写、数学、科学、艺术、社会研究和音乐）。最接近的广课程竞争对手是 Khan Academy
              Kids；它完全免费，并在同一年龄段直接争夺家长注意力。免费与付费的张力是主导性竞争矛盾：ABCmouse
              的价值主张建立在教学深度、游戏化和超过十五年积累的品牌信任上，但它必须在资金充足的免费替代品面前证明经常性订阅费合理。下方定位图展示了竞争位置。可能的新进入者包括以 AI 为先的初创公司，以及 Google 或
              Apple 的潜在产品延伸；截至当前，二者都没有运营专门的订阅式早期学习平台。
