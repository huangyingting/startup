      - 论点
      - 证据
      - 改变判断的条件
    rows:
      - - 早教品牌护城河
        - ABCmouse 有 994K+ 条 App Store 评论、4.5 星评分，品牌建设超过 15 年
        - 确认订阅用户数低于 3M；竞争对手在评分和使用量上超过它
      - - 可触达市场大
        - 美国 K-12 EdTech 市场 $15B+；早教细分仍在增长
        - 市场 CAGR 低于 5%；AI 导师规模化替代订阅模式
      - - 多收入渠道（B2C 加 B2B）
        - ABCmouse 消费版、学校版和国际业务并行
        - 学校收入贡献低于 10%，且没有增长轨迹
      - - COVID 后订阅用户正常化
        - 从 10M 回落是 COVID 队列出清；基数可能稳定在 4-6M
        - 任何显示 2023-2025 年订阅用户跌破 3M 的证据
      - - 当前估值下退出路径不清晰
        - 未提交 IPO；老股市场大幅折价；Tencent 持股增加 IPO 复杂度
        - 提交 IPO 或宣布以显著溢价战略收购
      - - 缺乏财务透明度
        - 无经审计财务；增长率和利润率结构未知
        - 收入披露显示 ARR 增长超过 15%，EBITDA 利润率为正
