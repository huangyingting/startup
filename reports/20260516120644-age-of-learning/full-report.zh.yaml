  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价
        blocks:
          - type: paragraph
            body: >
              Age of Learning 主要通过两个渠道产生收入：消费者订阅和机构（B2B）合同。消费者渠道以 ABCmouse Early Learning Academy 为核心，家庭定价为 $7.99/月或
              $59.99/年；Adventure Academy 是面向 8–13 岁儿童的大型多人教育游戏，消费者定价未公开披露。ReadingIQ 是面向 2–12 岁儿童的数字图书订阅，是第三个消费者产品，约
              $7.99/月；它被低调并入 Age of Learning 产品组合，独立定价在公开渠道上很少更新。机构渠道包括 ABCmouse for Schools（面向学区的 B2B 授权）、My Math
              Academy（面向 K-2 的 AI 自适应数学，销售给学区和学校）以及 My Reading Academy（面向 K-2 的 AI
              自适应阅读）。机构定价直接谈判，未公开披露。订阅产品的收入确认很直接：递延收入在订阅期内按比例确认。机构合同可能涉及多年协议、预付款或按里程碑拨款，因此会带来收入确认时点差异。公司未公开披露消费者与机构渠道之间的收入结构；按产品历史看，ABCmouse
              消费者订阅历来是主要收入驱动，机构和国际业务则是增长方向。
