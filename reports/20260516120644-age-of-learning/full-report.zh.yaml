      - number: '3.2'
        title: 直接消费者应用竞争对手
        blocks:
          - type: paragraph
            body: >
              消费者应用竞争集合可分为四层。第一层是完全免费的广课程应用：Khan Academy Kids（2–8 岁，免费，资源充足的非营利组织）和 PBS Kids（免费，品牌认知强，2–8
              岁）。它们替代风险最高，因为家长可以零增量成本切换。第二层是免费增值游戏化应用：Prodigy（聚焦数学，基础层免费，付费增购）、Starfall（聚焦读写，基本免费）和 Duolingo ABC（自然拼读 /
              读写，免费）。这些产品争夺心智和使用时间，但课程通常比 ABCmouse 更窄。第三层是付费窄学科应用：Homer（早期阅读，$9.99/月）、ReadingIQ（数字图书，由 Age of Learning
              自有）和 Epic!（数字图书，家庭 $9.99/月，学校免费）。第四层是付费广课程应用：IXL Learning（K-12 技能练习，$19.99/月，学校渠道强）和 ABCmouse（2–8
              岁，$7.99-$12.99/月）。ABCmouse 相对 Tier 1 和 Tier 2 的差异化，来自课程密度和游戏化整合；相对 Tier 3，来自广度；相对 IXL，则来自低龄儿童 UX
              和家长参与设计。下方能力图展示了各竞争对手的功能覆盖。
