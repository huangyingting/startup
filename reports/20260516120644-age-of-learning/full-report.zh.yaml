      - number: '4.4'
        title: 财务透明度与公开缺口
        blocks:
          - type: paragraph
            body: >
              Age of Learning
              是私营公司，从未在任何公开文件中发布收入、EBITDA、毛利率、订阅用户数或现金流信息。公开来源能获得的财务信息只有：（1）披露的融资轮和估值；（2）消费者产品标价；（3）确认豁免发行登记的 SEC Form D
              文件；（4）$10 million FTC 和解金额。这种不透明对私营教育科技公司来说并不罕见，但造成了重大尽调缺口。Consumer Reports 曾对 ABCmouse 的订阅做法和透明度提出担忧，这与
              FTC 和解历史一致。$3 billion 估值（2021 年）与疫情后教育科技市场修正之间的落差，引出一个问题：隐含当前估值究竟仍被支撑，还是已经在内部下调。公司研究页发布了 My Math Academy 和
              My Reading Academy 的 ESSA 级有效性证据，说明公司在投入机构级产品验证，但这些发布没有附带收入或财务表现数据。SEC EDGAR 系统中的 Form D
              文件确认了带日期和金额的豁免发行登记，但文件本身极其简略，不披露经营指标。公开财务图景实际上只限于融资历史和产品定价。
