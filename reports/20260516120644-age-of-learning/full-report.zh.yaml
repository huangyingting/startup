      - number: '7.5'
        title: 技术、平台与网络安全风险
        blocks:
          - type: paragraph
            body: >-
              Apple App Store 和 Google Play 对首年应用内订阅收取 30% 佣金，一年后续订收取 15%；这对 Age of Learning
              的移动收入形成结构性平台费用拖累。面向价格敏感家长的订阅业务中，这种费率结构会显著压缩移动获客订阅者的毛利率。Epic Games v. Apple 诉讼和 EU Digital Markets Act 引发的
              App Store 政策变化，可能改变费率结构，但也可能给 Age of Learning 的移动分发模式带来监管合规义务。公司依赖 Apple 和 Google 平台，意味着任何政策变化、算法调整或被 App
              Store 下架，都会直接影响订阅者获取和留存。

              CISA 已将 K-12 教育行业列为勒索软件攻击、数据泄露和钓鱼活动最常被瞄准的行业之一。对 Age of Learning 来说，网络安全事件会带来更高监管暴露：如果泄露涉及儿童个人数据，将触发 COPPA
              执法、州总检察长根据儿童隐私法采取行动，并严重损害一个向家长销售信任的品牌。截至 May 2026，Age of Learning 没有公开披露 SOC 2 Type II
              认证或等效独立网络安全评估。缺少正式第三方安全认证证据，意味着网络安全风险无法从公开来源评估——这是阻塞性尽调缺口。

              生成式 AI 对订阅课程模式构成技术层面的颠覆。AI 模型越来越能为特定年龄段生成个性化教育内容，让家庭可以用接近零边际成本的 AI 生成辅导替代订阅平台。American Academy of
              Pediatrics 建议 2-5 岁儿童每天屏幕时间不超过 1 小时；71% 的美国家长担心屏幕时间过长。这是一个结构性采用障碍，限制了服务该人群的任何订阅 EdTech 平台的天花板。
