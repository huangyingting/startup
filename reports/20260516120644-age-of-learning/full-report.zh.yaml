      - number: '4.3'
        title: 资本充足性与融资历史
        blocks:
          - type: paragraph
            body: >
              Age of Learning 已披露外部融资至少 $450 million。第一笔主要机构轮是 2016 年 5 月 ICONIQ Capital 领投、TPG Growth 参投的 $150 million
              融资，确立 $1 billion 估值（独角兽地位）。第二笔也是最近披露的一轮由两笔组成：2021 年 6 月，TPG 领投 $300 million，估值 $3 billion；随后在 2021 年 11
              月以同一报道估值追加完成 $300 million。两笔合计为 2021 年融资披露 $600 million；部分报道将它们描述为独立事件，因此全口径总额取决于来源。公司未公开披露 IPO
              时间表或任何债务融资工具。2021 年后没有公开信号显示下轮融资或承压融资。2021
              年后（2022–2026），疫情期顺风逆转，整体消费者教育科技市场显著收缩；这一宏观背景可能影响了订阅用户增长和烧钱轨迹。手头现金、月度烧钱速度和剩余现金跑道均未公开披露。2021
              年融资新闻稿显示，资金将用于全球扩张、AI 自适应产品开发和人才招聘——这些用途都消耗资本。公司将「AI Learning」称为增长方向，意味着 R&D 投入会持续。投资者包括 TPG（私募股权）、ICONIQ
              Capital（财富管理 / 直接投资平台）和未披露共同投资者。这些工具的性质和条款（优先股、可转债或其他）不在公开文件中。公司历史上的 SEC Form D 文件确认了多次豁免发行事件，与公开报道的融资轮一致。
