      - number: '1.2'
        title: 产品与学习平台
        blocks:
          - type: paragraph
            body: >
              Age of Learning 的产品组合以 ABCmouse.com 为中心，这是公司面向 2-8 岁儿童的旗舰订阅课程。ABCmouse 提供 10,000+ 项学习活动、850+
              节结构化课程，覆盖六个学科：阅读与语言艺术、数学、科学、社会研究、艺术与颜色、音乐。平台以浏览器端订阅服务运行，也可在 iOS 和 Android 上使用；在 Apple App Store 上，约
              994,000 条用户评价给出 4.5 星评分，在儿童教育应用中属于参与度最高的一档。ABCmouse 在 App Store 的定价为 $7.99-$12.99/月。


              ABCmouse for Schools 于 2016 年 7 月上线，把平台延伸到 K-2 课堂场景；据 EdTech Digest 和 eSchoolNews 报道，使用教室超过 10,000
              间。学校版包含供教师使用的 Assessment Center 功能。Adventure Academy 于 2019 年 4 月 30 日上线，是公司面向 8-13
              岁儿童的大型多人在线教育游戏（MMO），Common Sense Media 显示其定价为 $9.99/月或 $79.99/年。ReadingIQ 为 2-12 岁儿童提供数字图书库。My Math
              Academy 和 My Reading Academy 均在 2021-2022 年推出，把 AI 驱动的自适应学习用于 4-8 岁儿童的早期数学和阅读。Common Sense Media 给
              ABCmouse 的学习评分为 5/5，并推荐给 2-8 岁年龄段，这确认了核心产品获得了强第三方背书。
