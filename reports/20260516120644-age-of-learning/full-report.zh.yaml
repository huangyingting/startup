        - 公开报道或数据室显示较 2023 年基数下降 40% 或以上
        - 重新测算收入增长；大幅下调入场价格或退出
      - - AI 辅导替代
        - Khanmigo 或 GPT-4 免费辅导的 K-8 用户超过 10 million
        - 大型免费 AI 导师规模化覆盖 ABCmouse 可触达年龄段
        - 触发对收入增长假设的重写；压力测试流失模型
      - - 财务困境或降价融资
        - 新一轮融资隐含估值低于 $1.5 billion
        - 任何隐含估值低于 $1.5B 的老股或新股交易
        - 投资逻辑被击穿；在进一步稀释前退出或重组持仓
      - - COPPA 或数据泄露事件
        - 涉及 Age of Learning 数据的新闻报道或监管问询
        - 任何重大数据泄露或 COPPA 违规指控被公开
        - 立即开展法律审查；若后续出现执法行动，可能击穿投资逻辑
