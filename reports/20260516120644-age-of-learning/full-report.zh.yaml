  - id: FI002
    title: 单位经济模型桥接图
    type: flow
    approximationNotes: >-
      该流程图描绘从订阅用户获取到 LTV 兑现的定性单位经济链条。所有数值都是方向性描述；实际 CAC、LTV 和流失率为私有数据。FTC 和解（2020 年）在留存节点被标为护城河风险。公开 EdTech
      基准仅在适用处作为近似引用。
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI011
      - CI029
    data:
      nodes:
        - label: 订阅用户获取（CAC 未披露）
          detail: 电视广告和数字渠道意味着 CAC 较高；可比消费级 EdTech 的付费获客渠道 CAC 基准为每位订阅用户 $30–$150。
        - label: 试用转化率（未披露）
          detail: 免费试用转付费是关键单位经济驱动因素；无公开数据；FTC 背景意味着转化和留存此前受到摩擦助推。
        - label: 活跃订阅（$7.99/month 标价）
          detail: 月度订阅价是每单位每周期收入。年度方案（$59.99/year = 等效 $5/month）提高 LTV，但降低短期现金。
        - label: 月度流失率（未披露；FTC 信号）
          detail: 流失是 LTV 的主导杠杆；消费级 EdTech 基准显示，非高粘性订阅产品月流失率为 5–15%。FTC 和解意味着历史流失高于基准，但被取消摩擦掩盖。
        - label: 每订阅用户毛利贡献
          detail: 在 $7.99/month、估计毛利率 50–70% 下，每位订阅用户每月毛利约 $4–$5.60；LTV 取决于订阅时长。
        - label: CAC 回本与 LTV 比率
          detail: 在估计 CAC 为 $50–$150、月毛利 $4–$5.60 时，回本周期为 9–37 个月；LTV/CAC 高于 3x 是健康订阅业务的标准基准。
  - id: FI003
    title: 财务估算区间
    type: range
    approximationNotes: >-
      所有区间均为分析师根据公开信息推导的估计：融资轮规模、隐含估值倍数、行业基准和定价。它们不是公司提供的数据。收入区间将 5x–20x ARR 倍数套用于 $3B 估值，这是 2021 年融资时消费 SaaS
      的常见区间。烧钱区间基于估计员工数和行业惯例。现金跑道假设 2021 年资本全部投入使用。所有数值单位为百万美元。
