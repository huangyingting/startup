        title: 证据要点
        blocks:
          - type: callout
            title: 双边市场对应不同买方经济性
            body: >-
              Age of Learning 的 B2C/B2B 双模式同时服务高频消费者订阅用户和流失更低的机构买方。家长消费者细分切换成本更低，但市场触达更广；学校渠道黏性更高，但转化更慢，并受采购周期、隐私认证要求和
              ESSER 预算逆风约束。
            calloutType: insight
            claimRefs:
              - CM007
              - CM008
              - CM011
              - CM014
          - type: callout
            title: 后 COVID 教育科技修正是品类层面逆风
            body: 疫情期顺风逆转后，消费者教育科技在 2022-2023 年经历了融资和收入的显著收缩。停课期间推动 ABCmouse 大规模采用的同一结构性变化，也可能创造了长期留存低于疫情前用户的一次性用户队列。
            calloutType: risk
            claimRefs:
              - CM023
              - CM024
              - CM025
          - type: callout
            title: 早期读写需求不随品类周期消失
            body: 家长对早期读写和数学干预工具的需求，来自对入学准备和疫情后学习损失的持续焦虑，不只是技术可得性驱动。这里的市场动态比一般教育科技投资趋势更不周期化。
