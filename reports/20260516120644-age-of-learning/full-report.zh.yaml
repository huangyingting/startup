      - number: '7.2'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 的结构性竞争风险在于，免费数字内容平台已经成为付费订阅课程的可信替代品。YouTube Kids 提供免费的教育和娱乐视频内容，瞄准与 ABCmouse 相同的 2-8
              岁年龄段，不需要订阅，也不需要家长付费。Khan Academy 提供免费的 K-12 课程，并报告全球注册用户超过 130 million；其 Khanmigo AI
              辅导产品能以接近零边际成本提供个性化学习体验。这些平台拥有巨大规模、零价格定位和家长中的品牌认知，正好击中 ABCmouse 必须留住的价格敏感买方群体。

              2020 年 COVID-19 疫情期间，学校关闭推动家庭采用居家学习平台，ABCmouse 订阅者数量达到约 10 million 的峰值。学校重新开放后，流失明显：行业估计显示，到 2023 年活跃订阅者降至
              4-6 million，较峰值收缩 40-60%。这条轨迹与更广泛的消费者 EdTech 一致；该领域年订阅流失率平均为 40-60%，驱动因素包括儿童离开 2-8 岁目标年龄段、经济敏感性，以及免费替代品可得。

              疫后 EdTech 估值倍数压缩同时是财务信号和竞争风险信号。同行公司的收入倍数中位数从 2021 年约 10x 压缩到 2023-2024 年的 3-5x。Chegg 股价较 2021 年峰值下跌超过
              95%，由订阅者流失和 AI 竞争驱动；如果 AI 辅导规模化，Age of Learning 可能走上类似警示轨迹。Amazon Kids+ 以每月 $6.99 打包教育和娱乐内容，低于 ABCmouse
              独立定价，并形成捆绑式竞争压力。ESSER 资金在 2024 年 9 月到期，移除了支撑学校渠道 EdTech 采购的联邦顺风，给 B2B 业务带来近期逆风。2-8 岁年龄段天然只有 6
              年最长客户生命周期，进一步限制客户终身价值，并要求公司持续获取新订阅者才能保持收入稳定。
