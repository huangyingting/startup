      - number: '5.3'
        title: 平台架构、部署与基础设施
        blocks:
          - type: paragraph
            body: >-
              ABCmouse 和更广泛的 Age of Learning 产品套件，是云托管、多设备平台，可通过台式机和笔记本电脑的标准网页浏览器访问，也可作为 iOS 和 Android
              原生应用使用。根据应用商店技术规格，公司支持 iOS 13+ 和 Android 5.0+
              作为最低要求。跨平台内容同步让儿童可以在平板上开始一项活动，再到网页浏览器上继续且不丢失进度；对于家庭使用多台设备的学前和小学低年级人群，这是非常重要的 UX 功能。

              平台内容交付依赖云基础设施，符合标准教育科技部署模式。Age of Learning 未公开披露具体云供应商或 CDN 提供商，但向数百万并发会话提供 10,000+ 项活动的规模，与 AWS、GCP 或
              Azure 架构相符。公司不发布状态页，不公开可靠性 SLA 文件，也不披露正常运行时间指标。面向儿童的平台需要 COPPA 合规的数据处理，包括家长同意流程、数据最小化，以及对行为广告的限制。公司的 COPPA
              合规状态受 2020 年 FTC 同意令塑造，该同意令施加了持续合规报告义务。

              在学校渠道中，ABCmouse for Schools 包含 Assessment Center 功能，为教师提供班级层面的进度仪表盘和单个学生表现报告。学校版支持通过标准学区 IT 系统做名册同步，但 Age
              of Learning 未公开列出具体 SSO 或 SIS 集成伙伴。Adventure Academy 需要有效互联网连接，并非为离线使用设计，这限制了它在低连接性学校环境中的部署。
