      - number: '2.5'
        title: 市场逆风与后 COVID 修正
        blocks:
          - type: paragraph
            body: >
              尽管存在结构性顺风，几项重大逆风仍限制 Age of Learning 所处消费者教育科技细分的近期前景。最重要的是后 COVID 的估值和增长修正。EdSurge 报道，2022 至 2023
              年间，疫情期顺风逆转后，消费者教育科技公司经历了大规模裁员、收入减速和融资困难。许多按疫情假设扩张的公司大幅裁员。就 Age of Learning
              而言，公开证据没有显示裁员，但更大品类的修正，是评估公司当前经营状态时的相关背景。


              隐私监管是第二个结构性逆风。COPPA（Children's Online Privacy Protection Act）和 FERPA（Family Educational Rights and Privacy
              Act）要求任何服务 13 岁以下儿童的平台承担合规成本和数据治理义务。Age of Learning 的 FTC
              和解历史，在这一领域叠加了特定监管风险溢价。第三，消费者订阅市场整体出现订阅疲劳，家庭同时管理多个订阅服务。第四，2024-2026 年学校预算环境受到 ESSER 疫情救助资金到期限制；对于此前用 ESSER
              资助合同扩展 B2B 渠道的教育科技公司，这形成逆风。
            claimRefs:
              - CM023
              - CM024
              - CM025
              - CM028
              - CM029
              - CM030
