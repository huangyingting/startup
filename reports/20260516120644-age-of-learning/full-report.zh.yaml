      - number: '8.5'
        title: 退出准备度与必要尽调要求
        blocks:
          - type: paragraph
            body: >-
              Age of Learning 的退出准备度受几项未解决的结构性因素限制。Tencent 持股给任何美国 IPO 或涉及美国政府敏感业务的战略收购带来 CFIUS 国家安全审查风险。FTC
              同意令会让公开发行背景下的披露要求更加复杂。没有经审计财务报表，意味着公司无法在没有 12-24 个月实质准备期的情况下提交 S-1。

              做任何投资决定前，必要尽调包括：覆盖收入、ARR、毛利率、EBITDA 和经营现金流的 FY2022-FY2025 经审计财务报表；当前订阅者数量、12 个月流失率、按获客年份拆分的队列 LTV，以及按渠道拆分的
              CAC；完整股权结构表，包括融资后优先权堆叠、ROFR/ROFO 条款和 pro-rata 权利；董事会构成、投票权和任何投资人同意权；FTC 同意令合规文档，包括第三方审计报告；以及关于 Tencent
              持股和任何 CFIUS 暴露的法律意见。

              加分尽调包括：产品路线图和 AI 整合策略，包括与 AI 基础设施提供商的任何合作或授权协议；分发渠道经济性，展示移动、web、B2B 收入拆分和各渠道利润率；ESSER 资助的学校收入贡献和后 ESSER
              续约管线；以及已披露 FTC 事项之外任何正在进行或待决的诉讼、监管问询或消费者投诉程序。

              战略退出路径按优先顺序为：由 Pearson、Google、Amazon 或 Apple 等媒体或教育平台战略收购，考虑到品牌和内容 IP 价值，这是最可能的流动性事件；以较上一轮显著折价向 PE
              机构或主权财富共同投资人做老股出售，是最可能的近期路径；IPO 需要 3-5 年准备，包括经审计财务历史、Tencent 持股整改，以及证明符合 2021 年后上市 EdTech 标准的盈利增长轨迹。
