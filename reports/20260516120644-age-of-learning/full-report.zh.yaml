      - number: '1.4'
        title: 监管历史与 FTC 执法行动
        blocks:
          - type: paragraph
            body: >
              Age of Learning 历史上最重要的负面事件，是 2020 年 9 月的 FTC 和解。FTC 指控，约 2015 至 2018 年间，Age of Learning
              存在三类欺骗性做法：设置旨在阻止订阅用户取消的取消流程（暗黑模式）；在用户提交或尝试取消后继续向其信用卡扣费；以及投放 FTC 认定为以欺骗方式针对儿童的广告。Age of Learning 同意支付 $10
              million 以解决指控，但不承认不当行为。Washington Post、Education Week Market Brief 和多家媒体报道了该和解，并将其描述为当时 FTC
              针对服务儿童的消费者订阅产品采取的较大型执法行动之一。


              从尽调角度看，和解说明公司在扩大订阅用户基础的同一时期，面向消费者的计费和取消基础设施存在系统性合规失败。FTC 将该案作为面向更广泛教育科技订阅市场的公开震慑信号。任何承销都必须评估 Age of
              Learning 此后是否重建消费者保护合规体系、更新取消 UX，并建立持续计费监控。和解并未说明公司当前状态，但公司规模叠加既往执法记录，使持续消费者保护审查成为可信的长期风险因素。
            claimRefs:
              - CO004
              - CO013
              - CO021
              - CO031
              - CO040
      - number: '1.5'
        title: 领导层、治理与战略方向
        blocks:
          - type: paragraph
            body: >
              Age of Learning 的领导层历史显示，公司从创始人运营转向职业管理。Doug Dohring 于 2007 年创立公司，并在初始增长阶段打造 ABCmouse。Paul Candland 此后担任
              CEO，随后 Alex Galvagni 于 2023 年 9 月接任。公司官网发布了 Galvagni 任命，但公开资料并未充分记录其过往高管背景。由于 Age of Learning
              是私营公司，且未披露董事会构成、治理结构或投资者权利协议，CEO 层面的关键人物依赖仍是一个无法仅凭公开材料充分评估的活跃尽调事项。


              2021 年融资后的战略方向，主要只能从产品上线动作推断。2021-2022 年 My Math Academy 和 My Reading Academy 上线，显示公司向 AI
              驱动的自适应学习推进，这与更广泛的教育科技投资主题一致。ABCmouse for Schools 仍在维护和营销，说明 B2B 学校渠道在直接面向消费者订阅业务之外仍具战略重要性。RAND Corporation
              研究支持面向 K-12 学生的技术型辅导干预有效性前提，为产品逻辑提供第三方学术基础。治理深度、董事会独立性、管理层股权安排和当前战略计划仍完全私有。美国约有 56.6 million 名 K-12
              学生，其中最低龄群体构成公司直接可触达基础。
