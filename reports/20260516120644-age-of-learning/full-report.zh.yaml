      - number: '3.4'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Age of Learning 的竞争护城河建立在四项主张上：（1）十五年以上打造的大型、适龄课程库，从零复制需要大量资本；（2）通过大规模效果广告建立的学前和小学低年级家长品牌认知；（3）通过 ABCmouse
              for Schools 建立的机构关系，包括宣称 10,000+ 间教室落地，以及学区层面的学生参与数据；（4）嵌入 My Math Academy 和 My Reading Academy 的 AI
              自适应学习技术，可产生自有使用数据和增量有效性证据。主要威胁包括：（a）Khan Academy Kids 继续借助 Google 和捐赠资金扩展课程，可能抹平免费与付费差距；（b）IXL
              根深蒂固的学校渠道向更低年级侵入；（c）AI
              原生初创公司以更低边际成本交付个性化早期学习；（d）家长对订阅产品疲劳，导致多栖使用或切换。内容库护城河在五年视角下较稳固；随着竞争加剧，品牌护城河更脆弱。关键护城河指标和竞争耐久性指标见下方汇总。
