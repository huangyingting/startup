  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: US early childhood subscription market size
      missingEvidence: >-
        No primary analyst report provides a dedicated TAM estimate for the US parent-consumer
        subscription EdTech market for ages 2-8 as a standalone segment. All available estimates
        include the full e-learning market (enterprise, HE, K-12 combined).
      whyItMatters: >-
        Without a credible primary TAM estimate, the addressable market sizing for Age of Learning's
        core DTC product cannot be grounded in analyst data, limiting the precision of any
        market penetration or revenue potential analysis.
      diligencePath: >-
        Engage a specialist EdTech research firm (e.g., HolonIQ, Technavio) for a custom segment
        sizing report, or use company-provided market data if available in the data room.
      relatedQuestionRefs:
        - QM022
        - QM024
    - type: private-evidence-only
      severity: material
      topic: post-ESSER school channel impact on Age of Learning
      missingEvidence: >-
        There is no public data on whether Age of Learning's ABCmouse for Schools contracts
        were funded through ESSER pandemic relief and how the 2024-2025 ESSER expiration
        affected its school-channel revenue.
      whyItMatters: >-
        If a material share of school-channel revenue was ESSER-dependent, the 2024-2025
        expiration would be a significant revenue headwind not visible in public sources.
      diligencePath: >-
        Request B2B school channel revenue breakdown and analysis of ESSER-funded vs.
        recurring-district-budget contract mix from the company via data room.
      relatedQuestionRefs:
        - QM023
    - type: private-evidence-only
      severity: material
      topic: paid subscriber count and churn data
      missingEvidence: >-
        Total paid subscriber base across all Age of Learning products is not public. No
        third-party source provides a credible estimate of current subscriber count or churn rate.
      whyItMatters: >-
        Subscriber count and retention are the primary leading indicators for DTC subscription
        revenue quality; without them, the commercial health of the core business cannot
        be assessed from public data.
      diligencePath: >-
        Request product-level monthly active subscribers, monthly churn rates, and cohort
        retention curves segmented by acquisition year via the data room.
      relatedQuestionRefs:
        - QM024
    - type: stale
      severity: minor
      topic: post-2023 EdTech market recovery data
      missingEvidence: >-
        Most available market research data is from 2021-2023. The 2024-2026 EdTech market
        recovery trajectory is not yet captured in credible published analyst reports.
      whyItMatters: >-
        Market conditions in 2024-2026 are directly relevant to current investment thesis;
        stale 2021-2022 growth projections may overstate or understate current market dynamics.
      diligencePath: >-
        Source 2024-2025 EdTech market research from HolonIQ, GSV, or Education Week market
        brief for post-correction market data.
      relatedQuestionRefs: []
    - type: missing-source
      severity: minor
      topic: ABCmouse efficacy research studies
      missingEvidence: >-
        The EdTech Evidence database lists ABCmouse but the underlying research studies are
        not readily accessible; independent third-party efficacy studies are not publicly
        available as full papers.
      whyItMatters: >-
        Efficacy evidence is a key differentiator for premium pricing in the school channel
        and for parent justification of subscription costs; thin public efficacy evidence
        weakens the premium product thesis.
      diligencePath: >-
        Request all internal and commissioned efficacy research reports for ABCmouse and
        My Math Academy from Age of Learning via the data room.
      relatedQuestionRefs: []
