figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Nested market layers from the broadest global e-learning TAM to the specific US early childhood
      consumer EdTech serviceable addressable market where Age of Learning primarily competes.
    data:
      items:
        - label: Global e-learning TAM
          value: ~$200-315B (2022 estimates)
          detail: >-
            Total global e-learning including enterprise LMS, professional certification, higher
            education, K-12, and early childhood; Grand View Research and MarketsandMarkets.
          tone: neutral
        - label: Global K-12 and consumer EdTech
          value: ~$50-100B estimated
          detail: >-
            K-12 segment of global e-learning; excludes enterprise training and HE; includes
            consumer apps, school licensing, supplemental curriculum; team estimate from segment
            decompositions; no single authoritative source.
          tone: neutral
        - label: North America early childhood learning apps
          value: ~$5-15B estimated
          detail: >-
            Consumer parent-purchased digital learning for ages 2-13 in US and Canada; team
            estimate based on enrollment data and penetration assumptions; highly approximate.
          tone: neutral
        - label: US early learning subscription (ages 2-8)
          value: ~$1.5-3B estimated
          detail: >-
            US DTC subscription market for preschool through early elementary; Age of Learning's
            core B2C market; bottom-up estimate; no primary analyst source.
          tone: neutral
        - label: ABCmouse competitive segment
          value: Several hundred $M to ~$1B+ (speculative)
          detail: >-
            Revenue pool for incumbent early learning subscription apps (ABCmouse, Khan Academy
            Kids, LeapFrog, Duolingo for Kids equivalents); no reliable estimate from public data.
          tone: neutral
    approximationNotes: >-
      All size estimates from public third-party analyst reports or team bottom-up approximations.
      No audited segment revenue data is publicly available for the ages-2-8 US consumer EdTech
