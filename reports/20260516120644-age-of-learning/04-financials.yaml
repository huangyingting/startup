  key: financials
  letter: I
  title: Financials
  summary: >-
    Age of Learning is a private company and discloses no public revenue, margin, or cash-flow data;
    analysis rests on publicly reported funding rounds ($450M+ total), disclosed pricing, regulatory
    filings, and analogous consumer EdTech benchmarks. The $10M FTC settlement in 2020 for deceptive
    subscription cancellation practices is a direct financial and reputational adverse signal requiring
    diligence on current retention quality and unit economics.
