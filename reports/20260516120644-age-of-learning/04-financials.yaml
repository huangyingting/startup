  evidenceGaps:
    - id: EGI001
      type: private-evidence-only
      severity: material
      topic: Age of Learning ARR and revenue breakdown
      missingEvidence: >-
        Management accounts showing annual recurring revenue by product line
        (ABCmouse consumer, institutional, Adventure Academy, ReadingIQ), revenue
        growth rate, and consumer vs institutional revenue mix; none of this data
        is publicly available for a private company.
      whyItMatters: >-
        Without revenue data, the valuation multiple implied by the 2021 round cannot
        be validated, and the financial verdict on revenue quality and growth trajectory
        is entirely speculative; this is the foundational financial diligence gap.
      diligencePath: >-
        Request audited financial statements or board-level management accounts from the
        data room; cross-validate reported ARR against app intelligence data from
        Sensor Tower or data.ai for the consumer channel.
      relatedQuestionRefs:
        - QI021

    - id: EGI002
      type: private-evidence-only
      severity: material
      topic: Post-FTC subscriber retention and cohort data
      missingEvidence: >-
        12-month subscriber cohort survival curves by acquisition vintage, segmented into
        pre- and post-FTC settlement periods, to assess whether ABCmouse's subscription
        retention has recovered to a natural/organic baseline following the cancellation
        practice changes required by the 2020 consent decree.
      whyItMatters: >-
        The FTC settlement implies that pre-settlement retention was artificially elevated
        by friction; post-settlement organic retention is the correct input for LTV
        modeling, and without it, the subscriber LTV estimate is ungrounded.
      diligencePath: >-
        Request subscriber cohort data segmented by 2018–2019 (pre-FTC), 2020 (transition),
        and 2021–2026 (post-settlement) vintages; compute 3-, 6-, and 12-month cohort
        retention curves and compare to consumer EdTech benchmarks.
      relatedQuestionRefs:
        - QI022

    - id: EGI003
      type: private-evidence-only
      severity: material
      topic: CAC by channel and blended LTV/CAC ratio
      missingEvidence: >-
        Customer acquisition cost disaggregated by channel (TV, paid digital, organic
        search, app store, school referral) and the resulting blended LTV/CAC ratio;
        without CAC data the payback period and marketing efficiency cannot be assessed.
      whyItMatters: >-
        At $7.99/month with probable FTC-informed churn improvement, CAC payback period
        is the critical variable determining whether the consumer channel is a value-creating
        or value-destroying growth engine at current scale.
      diligencePath: >-
        Request marketing attribution data from the data room; independently verify
        against Google/Meta advertising spend proxies from SimilarWeb or Pathmatics;
        cross-validate with sales team win/loss analysis for the institutional channel.
      relatedQuestionRefs:
        - QI023

    - id: EGI004
      type: private-evidence-only
      severity: blocking
      topic: Cash position, burn rate, and runway
      missingEvidence: >-
        Balance sheet as of the most recent quarter showing cash and cash equivalents,
        combined with a monthly cash flow statement to compute current burn rate and
        remaining runway; the last confirmed capital event was November 2021, and
        four-plus years of post-raise activity is unverifiable from public sources.
      whyItMatters: >-
        Capital adequacy is a blocking diligence question; if the company is within
        12 months of needing additional financing, deal structure and valuation discussions
        are materially affected; without this data, no underwriting judgment can be made.
      diligencePath: >-
        Request most recent audited balance sheet and 12-month cash flow statement;
        request management's own runway projection; independently validate against
        headcount signals and disclosed investment priorities.
      relatedQuestionRefs:
        - QI024

    - id: EGI005
      type: missing-source
      severity: material
      topic: Post-2021 financial performance and any restructuring events
      missingEvidence: >-
        Any public or private evidence of valuation markdowns, forced restructuring,
        employee layoffs, or materially adverse financing events in the 2022–2026 period;
        the post-pandemic EdTech correction (2022–2024) is well-documented for public peers
        but Age of Learning's private status prevents external verification.
      whyItMatters: >-
        If the company experienced significant revenue contraction or restructuring
        consistent with broader EdTech peers, the 2021 $3B valuation is materially
        impaired and deal pricing must account for the gap between stated and current value.
      diligencePath: >-
        Conduct reference checks with former employees via LinkedIn; review job posting
        trends on LinkedIn and Glassdoor for layoff signals; request investor update
        materials and board presentations covering the 2022–2026 period from data room.
      relatedQuestionRefs:
        - QI025
