        - Request blended CAC by channel (organic, paid digital, TV, retail)
      - - Gross margin
        - Not disclosed; estimated 50-70% (content-heavy SaaS benchmark)
        - Low (benchmark estimate)
        - Determines operating leverage; content capex and cloud hosting are margin headwinds
        - "Request cost of goods sold breakdown: hosting, content, support, curriculum updates"
      - - R&D spend (% revenue)
        - Not disclosed; My Math Academy / My Reading Academy imply elevated R&D
        - Not assessable
        - AI adaptive learning requires ongoing model training and content alignment investment
        - Request R&D headcount and annual spend as percentage of revenue
      - - Sales and marketing spend (% revenue)
        - Not disclosed; TV brand historically signals high S&M ratio
        - Not assessable
        - High S&M spend reduces operating leverage; CAC payback is S&M-driven
        - Request channel-level S&M spend and attributable new subscriber volumes
      - - Estimated headcount
        - ~300–600 (press release inference, LinkedIn proxy)
        - Very low (proxy estimate only)
        - Revenue per employee ratio provides rough efficiency benchmark
        - Confirm headcount and employee cost as percentage of operating expense

