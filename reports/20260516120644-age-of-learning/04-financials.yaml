      - Value / Estimate
      - Confidence
      - Why It Matters
      - Diligence Ask
    claimRefs:
      - CI007
      - CI008
      - CI009
      - CI010
    rows:
      - - Annual Recurring Revenue (ARR)
        - Not disclosed
        - Not assessable
        - Top-line revenue is the foundation of all valuation and capital adequacy analysis
        - Request audited financials or board-level management accounts from data room
      - - Subscriber count (ABCmouse consumer)
        - Not disclosed; estimated 1-5 million (analyst proxy only)
        - Very low (estimate only)
        - Determines revenue at list pricing; essential for LTV/CAC ratio computation
        - Request monthly active subscribers by cohort; verify against app store proxy data
      - - Monthly / annual churn rate
        - Not disclosed; FTC settlement implies above-benchmark churn
