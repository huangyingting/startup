  - id: TI003
    title: Unit Economics Table
    notes: >-
      All metrics are either null (private, not publicly disclosed) or estimated from analogous
      benchmarks. Estimates are labeled clearly; do not treat as company-confirmed data.
      Primary reference benchmarks are publicly traded consumer EdTech and subscription software peers.
    columns:
