  claims:
    - id: CI001
      statement: >-
        ABCmouse Early Learning Academy is priced at $7.99 per month or $59.99 per year
        for consumer subscribers as of the research date, positioning it at the middle tier
        of the consumer early learning subscription market.
      type: observed
      topic: pricing
      sourceRefs:
        - SI001
        - SI005
      confidence: medium
      freshness: recent

    - id: CI002
      statement: >-
        ABCmouse for Schools uses a B2B contract model for school and district licensing;
        pricing is not publicly disclosed and is determined through direct sales negotiation,
        preventing external revenue modeling of the institutional channel.
      type: observed
      topic: revenue model
      sourceRefs:
        - SI001
        - SI003
      confidence: medium
      freshness: recent

    - id: CI003
      statement: >-
        My Math Academy and My Reading Academy are AI-adaptive learning products for K-2
        students sold to schools and districts under institutional licensing; the company
        has published ESSA-aligned efficacy evidence for both products, supporting premium
        institutional pricing positioning.
      type: observed
      topic: institutional revenue
      sourceRefs:
        - SI002
        - SI018
      confidence: medium
      freshness: recent

    - id: CI004
      statement: >-
        Adventure Academy, Age of Learning's massively multiplayer educational game for
        ages 8–13, was launched in 2019; its current consumer pricing is not publicly
        disclosed, limiting the ability to model its contribution to overall consumer revenue.
      type: observed
      topic: revenue model
      sourceRefs:
        - SI001
        - SI021
      confidence: medium
      freshness: recent

    - id: CI005
      statement: >-
        Age of Learning offered free ABCmouse subscriptions to US families during the
        COVID-19 school shutdowns in March 2020, indicating willingness to sacrifice
        near-term subscription revenue for subscriber acquisition and brand goodwill;
        the long-term conversion impact of this cohort is not publicly reported.
      type: observed
      topic: pricing decisions
      sourceRefs:
        - SI024
        - SI001
      confidence: medium
      freshness: historical

    - id: CI006
      statement: >-
        ReadingIQ, a digital book subscription for ages 2–12 owned by Age of Learning,
        is priced at approximately $7.99/month; its revenue contribution is not separately
        reported and the product appears to receive limited marketing investment relative
        to ABCmouse.
      type: observed
      topic: revenue model
      sourceRefs:
        - SI001
        - SI021
      confidence: medium
      freshness: recent

    - id: CI007
      statement: >-
        Age of Learning is well-documented as a significant television and digital advertising
        spender for ABCmouse, indicating an elevated customer acquisition cost structure;
        heavy TV spend is typical for consumer subscription brands targeting parents with
        young children, where CAC payback requires multi-month subscription retention.
      type: inferred
      topic: unit economics
      sourceRefs:
        - SI014
        - SI016
      confidence: medium
      freshness: recent

    - id: CI008
      statement: >-
        The Federal Trade Commission settled a complaint against Age of Learning in September
        2020 for $10 million, finding the company used deceptive practices to prevent
        subscribers from cancelling ABCmouse subscriptions; this is a direct adverse indicator
        that prior retention metrics were artificially inflated by cancellation friction.
      type: third-party-reported
      topic: FTC settlement
      sourceRefs:
        - SI007
        - SI023
      confidence: high
      freshness: historical

    - id: CI009
      statement: >-
        Consumer Reports investigated ABCmouse's subscription practices around the time of
        the FTC settlement, raising questions about transparency and cancellation difficulty;
        this independent review reinforces the FTC's adverse findings on subscription quality.
      type: third-party-reported
      topic: subscription practices
      sourceRefs:
        - SI022
        - SI007
      confidence: high
      freshness: historical

    - id: CI010
      statement: >-
        ABCmouse's content library of 9,000+ learning activities represents a recurring
        capital expenditure burden; content requires ongoing creation, localization, and
        accessibility updating, creating above-average cost of goods sold relative to
        a pure-software SaaS business at comparable scale.
      type: inferred
      topic: cost structure
      sourceRefs:
        - SI001
        - SI005
      confidence: medium
      freshness: recent

    - id: CI011
      statement: >-
        The post-pandemic period (2022–2024) saw broad consumer EdTech market contraction
        as pandemic-era subscriber growth reversed; Bloomberg reported that EdTech apps
        faced significant headwinds post-pandemic, suggesting Age of Learning's consumer
        subscriber base may have experienced above-trend churn during this period.
      type: third-party-reported
      topic: market context
      sourceRefs:
        - SI016
        - SI025
      confidence: medium
      freshness: recent

    - id: CI012
      statement: >-
        Age of Learning's gross margin is not publicly disclosed; benchmarking against
        comparable consumer EdTech and content subscription businesses (Duolingo at ~72%,
        other curriculum SaaS peers at 55–70%) suggests a plausible gross margin range
        of 45–72%, with content creation and adaptive AI infrastructure as the primary
        margin headwinds.
      type: estimated
      topic: cost structure
      sourceRefs:
        - SI014
        - SI016
      confidence: medium
      freshness: recent

    - id: CI013
      statement: >-
        Age of Learning raised $150 million in May 2016 in a round led by ICONIQ Capital
        and joined by TPG Growth, establishing the company at a $1 billion post-money
        valuation — unicorn status — at that time; the round was described as growth equity
        financing to accelerate product development and expand the school channel.
      type: third-party-reported
      topic: fundraising history
      sourceRefs:
        - SI006
        - SI015
      confidence: high
      freshness: historical

    - id: CI014
      statement: >-
        Age of Learning raised $300 million in June 2021 in a round led by TPG at a
        $3 billion post-money valuation, representing a 3x step-up in valuation from
        the 2016 round; this was the first publicly confirmed use of external capital
        by the company since 2016.
      type: third-party-reported
      topic: fundraising history
      sourceRefs:
        - SI014
        - SI015
      confidence: high
      freshness: historical

    - id: CI015
      statement: >-
        Age of Learning announced a second $300 million financing tranche in November 2021
        at the same $3 billion valuation; some sources describe this as the completion
        of a single larger round while others characterize it as a separate fundraise,
        making the all-in 2021 capital figure ambiguous across sources.
      type: third-party-reported
      topic: fundraising history
      sourceRefs:
        - SI004
        - SI005
      confidence: medium
      freshness: historical

    - id: CI016
      statement: >-
        The stated use of funds in the 2021 financing rounds was to accelerate global
        expansion, develop AI-adaptive learning products, and acquire talent; all three
        are capital-intensive initiatives that increase burn rate without immediate
        revenue return, implying elevated cash consumption in the 2021–2024 period.
      type: observed
      topic: capital adequacy
      sourceRefs:
        - SI005
        - SI004
      confidence: high
      freshness: historical

    - id: CI017
      statement: >-
        At the $3 billion valuation established in 2021, applying typical consumer SaaS
        revenue multiples of 5x–20x ARR (common for EdTech SaaS at the time) implies an
        estimated ARR range of $150 million to $600 million; this estimate is highly
        uncertain and depends on which multiple is assumed.
      type: estimated
      topic: revenue estimate
      sourceRefs:
        - SI014
        - SI017
      confidence: medium
      freshness: historical

    - id: CI018
      statement: >-
        SEC EDGAR Form D filings for Age of Learning Inc. (CIK 1557265) confirm multiple
