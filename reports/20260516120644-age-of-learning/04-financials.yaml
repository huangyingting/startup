figures:
  - id: FI001
    title: Revenue Model Bridge
    type: flow
    approximationNotes: >-
      This flow diagram maps the qualitative customer journey from initial acquisition
      through subscription revenue and gross profit. Node values are directional descriptions,
      not quantitative amounts, as the company does not disclose financial metrics.
      The diagram reflects publicly observable product and pricing structure only.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
    data:
      nodes:
        - label: Parent / educator discovers ABCmouse
          detail: >-
            Via TV advertising, organic search, app store, school referral, or word of mouth.
            Consumer channel acquisition cost is elevated; institutional driven by direct sales.
        - label: Free trial or direct subscription conversion
          detail: >-
            ABCmouse offers limited-time trials; there is no free tier. Conversion rates
            are private; FTC history implies prior friction-based retention practices.
        - label: Monthly or annual subscription ($7.99/mo or $59.99/yr)
          detail: >-
            List price is the consumer price; actual ARPU depends on promotional pricing
            and annual vs monthly mix. Annual subscribers are more economically valuable
            due to lower servicing cost and higher retention implied.
        - label: Multi-product cross-sell (Adventure Academy, ReadingIQ)
          detail: >-
            Age of Learning offers multiple subscription products that could be bundled;
            public evidence of cross-sell rates is absent.
        - label: Gross revenue after refunds and chargebacks
          detail: >-
            Consumer subscription businesses face chargeback and refund risks; the FTC
            settlement context implies historically elevated refund activity.
        - label: "Less: content, hosting, and support costs → Gross profit"
          detail: >-
            Content development (9,000+ activities), cloud hosting, and customer support
            are primary COGS drivers; gross margin estimated at 50–70% based on SaaS peers.
      edges:
        - source: Parent / educator discovers ABCmouse
          target: Free trial or direct subscription conversion
        - source: Free trial or direct subscription conversion
          target: Monthly or annual subscription ($7.99/mo or $59.99/yr)
        - source: Monthly or annual subscription ($7.99/mo or $59.99/yr)
          target: Multi-product cross-sell (Adventure Academy, ReadingIQ)
        - source: Multi-product cross-sell (Adventure Academy, ReadingIQ)
          target: Gross revenue after refunds and chargebacks
        - source: Gross revenue after refunds and chargebacks
          target: "Less: content, hosting, and support costs → Gross profit"

  - id: FI002
    title: Unit Economics Bridge
    type: flow
    approximationNotes: >-
      This flow diagram maps the qualitative unit economics chain from subscriber acquisition
      through LTV realization. All values are directional; actual CAC, LTV, and churn rates
      are private. The FTC settlement (2020) is noted as a moat risk in the retention node.
      Public EdTech benchmarks are cited where applicable as approximations only.
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI011
      - CI029
    data:
      nodes:
        - label: Subscriber acquisition (CAC not disclosed)
          detail: >-
            TV advertising and digital channels imply elevated CAC; comparable consumer
            EdTech CAC benchmarks range $30–$150 per subscriber for paid acquisition channels.
        - label: Trial conversion rate (not disclosed)
          detail: >-
            Free trial conversion to paid is a key unit economics driver; no public data;
            FTC context implies conversion and retention were previously friction-assisted.
        - label: Active subscription ($7.99/month list)
          detail: >-
            Monthly subscription price is the revenue per unit per period. Annual plan
            ($59.99/year = $5/month equivalent) improves LTV but reduces short-term cash.
        - label: Monthly churn rate (not disclosed; FTC signal)
          detail: >-
            Churn is the dominant LTV lever; consumer EdTech benchmarks suggest 5–15%/month
            for non-sticky subscription products. FTC settlement implies historically
            above-benchmark churn masked by cancellation friction.
        - label: Gross profit contribution per subscriber
          detail: >-
            At $7.99/month with estimated 50–70% gross margin, gross profit is ~$4–$5.60
            per subscriber per month; LTV depends on duration of subscription.
        - label: CAC payback and LTV ratio
          detail: >-
            At estimated CAC of $50–$150 and $4–$5.60 gross profit/month, payback is 9–37
            months; LTV/CAC above 3x is the standard benchmark for healthy subscription businesses.

  - id: FI003
    title: Financial Estimate Range
    type: range
    approximationNotes: >-
      All ranges are analyst estimates derived from public information: round sizes, implied
      valuation multiples, industry benchmarks, and pricing. These are NOT company-provided
      figures. Revenue range applies a 5x–20x ARR multiple to the $3B valuation, common for
      consumer SaaS at time of 2021 raise. Burn range is based on estimated headcount and
      industry norms. Runway assumes full deployment of 2021 capital. All figures in USD millions.
    claimRefs:
      - CI017
      - CI025
      - CI026
      - CI027
    data:
      items:
        - label: Estimated annual revenue (USD millions)
          low: 150
          high: 600
          mid: 300
          detail: >-
            Derived from $3B valuation at 5x–20x ARR multiple; mid-point assumes 10x multiple
            consistent with EdTech SaaS peers at 2021 pricing; highly uncertain.
        - label: Estimated monthly burn (USD millions)
          low: 5
          high: 25
          mid: 12
          detail: >-
            Based on estimated 300–600 headcount at ~$150K all-in cost + content + infra;
            mid assumes ~$12M/month consistent with content-heavy EdTech at this scale.
        - label: Estimated runway remaining (months, from 2021 raise)
          low: 18
          high: 60
          mid: 36
          detail: >-
            Assumes $300M–$600M drawn from 2021 rounds at $5M–$25M/month burn; actual
            runway depends entirely on undisclosed cash position and burn rate.
        - label: Estimated gross margin (%)
          low: 45
          high: 72
          mid: 60
          detail: >-
            Benchmarked against Duolingo (72%), IXL, and comparable consumer EdTech;
            compressed vs pure SaaS due to content development and adaptive AI infrastructure.
        - label: Estimated consumer ARR (USD millions)
          low: 50
          high: 250
          mid: 120
          detail: >-
            Consumer-only revenue estimate; assumes 1M–5M subscribers at blended $5–$7/month
            ARPU; institutional ARR is additive but unestimatable without contract data.

  - id: FI004
    title: Capital Intensity / Cash-Flow Map
    type: flow
    approximationNotes: >-
      This diagram maps the primary uses of capital for Age of Learning based on disclosed
      strategic priorities and industry norms. No specific dollar amounts are attributed to
      any node; all flows are qualitative. The 2021 press releases explicitly cited global
      expansion, AI learning product development, and talent acquisition as use-of-funds categories.
    claimRefs:
      - CI013
      - CI016
      - CI018
      - CI028
    data:
      nodes:
        - label: Capital raised ($450M+ disclosed, 2016 and 2021)
          detail: >-
            $150M (2016, ICONIQ/TPG) + $300M+ (2021, TPG-led); total capitalization
            including undisclosed co-investors is not public.
        - label: Content creation and curriculum maintenance
          detail: >-
            9,000+ learning activities require ongoing creation, update, and accessibility
            maintenance; this is effectively a recurring capex burden, not a one-time investment.
        - label: AI R&D — My Math Academy and My Reading Academy
          detail: >-
            AI-adaptive learning model development, efficacy trials, ESSA evidence generation,
            and ongoing model training are high-cost investment areas.
        - label: Sales and marketing (consumer and institutional)
          detail: >-
            TV advertising, digital performance marketing, and B2B sales force for school
            and district sales; historically the largest operating expense category.
        - label: International expansion
          detail: >-
            Disclosed as a use of 2021 funds; localization, content translation, and market
            entry into non-US geographies; revenue contribution from international is not public.
      edges:
        - source: Capital raised ($450M+ disclosed, 2016 and 2021)
          target: Content creation and curriculum maintenance
        - source: Capital raised ($450M+ disclosed, 2016 and 2021)
          target: AI R&D — My Math Academy and My Reading Academy
        - source: Capital raised ($450M+ disclosed, 2016 and 2021)
          target: Sales and marketing (consumer and institutional)
        - source: Capital raised ($450M+ disclosed, 2016 and 2021)
          target: International expansion

