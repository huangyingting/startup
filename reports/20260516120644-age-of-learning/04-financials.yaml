      freshness: historical

    - id: CI025
      statement: >-
        The post-pandemic EdTech market correction (2022–2024) is a material risk factor
        for Age of Learning's financial trajectory; companies including Byju's, Chegg, and
        multiple consumer EdTech peers experienced significant revenue contraction or
        restructuring during this period, and the risk to ABCmouse's consumer subscription
        base is analogous even if Age of Learning's private status prevents direct comparison.
      type: inferred
      topic: financial verdict
      sourceRefs:
        - SI016
        - SI025
      confidence: medium
      freshness: recent

    - id: CI026
      statement: >-
        Revenue quality for the consumer subscription business cannot be assessed without
