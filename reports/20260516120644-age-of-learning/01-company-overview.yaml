  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: financial metrics
      missingEvidence: >-
        Revenue, ARR, gross margin, operating burn, and net income are not available in any public source.
        Age of Learning does not publish audited financial statements.
      whyItMatters: >-
        Without revenue data, no underwriting of profitability, margin profile, or capital adequacy is
        possible. This is a blocking gap for investment analysis.
      diligencePath: >-
        Request audited financial statements for FY2021-FY2025 and a current management forecast plus
        board-approved operating plan via data room.
      relatedQuestionRefs:
        - QO022
    - type: private-evidence-only
      severity: material
      topic: subscriber base and retention
      missingEvidence: >-
        Total active subscriber count, monthly active users, cohort retention curves, and churn rates
        are not publicly available for any Age of Learning product.
      whyItMatters: >-
        User metrics are the primary proof of product-market fit and revenue sustainability; without
        them, subscription revenue quality cannot be assessed.
      diligencePath: >-
        Request subscription dashboard exports, cohort retention data, and product-level monthly active
        users segmented by age band and channel.
      relatedQuestionRefs:
        - QO022
    - type: private-evidence-only
      severity: material
      topic: governance and board composition
      missingEvidence: >-
        Board of directors composition, investor rights agreements, voting control structure, preference
        waterfall, and cap table are entirely absent from public records.
      whyItMatters: >-
        Governance structure affects exit alignment, investor control, management independence, and
        downside protection for any new investor.
      diligencePath: >-
        Request board composition disclosure, investor rights agreement, current cap table, and any
        management equity or incentive plan documentation.
      relatedQuestionRefs:
        - QO021
    - type: private-evidence-only
      severity: material
      topic: headcount and organizational structure
      missingEvidence: >-
        Current employee count, organizational structure, and workforce changes since the 2021 fundraise
        are not publicly disclosed by Age of Learning.
      whyItMatters: >-
        Headcount and organizational health signal investment level, burn trajectory, and operational
        capacity relative to the company's product portfolio ambitions.
      diligencePath: >-
        Request headcount by function, current organization chart, and any workforce reduction or
        restructuring documentation since 2021.
      relatedQuestionRefs:
        - QO024
    - type: missing-source
      severity: minor
      topic: post-2021 fundraising activity
      missingEvidence: >-
        No public source confirms whether Age of Learning raised additional capital or conducted any
        secondary transactions after the November 2021 round.
      whyItMatters: >-
        A subsequent round or secondary sale would materially change the current capitalization and
        investor composition, affecting valuation anchoring.
      diligencePath: >-
        Search SEC EDGAR for new Form D filings post-November 2021 and request a current cap table
        and funding history from the company directly.
      relatedQuestionRefs: []
