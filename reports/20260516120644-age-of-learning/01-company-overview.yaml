company:
  name: Age of Learning
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Age of Learning, Inc. is a Glendale, California-based educational technology company founded in 2007 by Doug
    Dohring, whose prior venture was selling Neopets to Viacom in 2005. The company's flagship product ABCmouse.com
    launched in November 2010 and serves children ages 2-8 with 10,000+ learning activities. Age of Learning reached
    unicorn status in 2016 ($150M from ICONIQ Capital at $1B valuation) and most recently raised $300M in 2021 at a
    ~$3B valuation from TPG Growth, Qatar Investment Authority, Madrone Capital Partners, and Tencent, bringing total
    known funding to approximately $480M. A 2020 FTC $10M settlement for deceptive subscription practices is the
    most significant adverse event and a live diligence concern; the company remains private with no public audited
    financials.
sections:
  - id: section-1
    title: Company Identity, Founding, and Corporate History
    body: >
      Age of Learning, Inc. is a private educational technology company headquartered in Glendale, California.
      The company was founded in 2007 by Doug Dohring, an entrepreneur whose prior venture was Neopets, a virtual
      pet website he co-founded and ultimately sold to Viacom in 2005. That transaction gave Dohring both the capital
      and the consumer-internet expertise to build a children's learning platform from scratch. Age of Learning's
      flagship product, ABCmouse.com, launched in November 2010 and positioned the company as a direct-to-consumer
      subscription learning service for children ages two through eight.


      Over the following decade, the company expanded its product portfolio well beyond ABCmouse to include
      Adventure Academy (April 2019, ages 8-13), ReadingIQ (digital books, ages 2-12), My Math Academy (2021,
      AI-adaptive math for ages 4-8), and My Reading Academy (2022, ages 4-8). Despite building a recognized
      consumer brand and raising substantial institutional capital, Age of Learning has maintained an unusually low
      public profile relative to its scale—a characteristic that industry observers noted explicitly when the company
      achieved unicorn status. The company operates entirely as a private entity and has not filed for a public
      offering as of the May 2026 report date.
    claimRefs:
      - CO001
      - CO002
      - CO011
      - CO015
      - CO022
      - CO023
      - CO024
      - CO028
      - CO033
      - CO034
    tableRefs:
      - TO004
    figureRefs:
      - FO001

  - id: section-2
    title: Products and Learning Platform
    body: >
      Age of Learning's product portfolio centers on ABCmouse.com, the company's flagship subscription curriculum
      for children ages two through eight. ABCmouse provides over 10,000 learning activities and more than 850
      structured lessons across six subject areas: reading and language arts, mathematics, science, social studies,
      art and colors, and music. The platform operates as a browser-based subscription service available on iOS and
      Android, and carries a 4.5-star rating from approximately 994,000 user reviews on the Apple App Store—one of
      the highest engagement profiles among children's educational apps. ABCmouse is priced at $7.99 to $12.99 per
      month on the App Store.


      ABCmouse for Schools, launched in July 2016, extends the platform to K-2 classroom settings and is reportedly
      used in over 10,000 classrooms according to EdTech Digest and eSchoolNews. The school edition includes an
      Assessment Center feature designed for teacher use. Adventure Academy, launched April 30, 2019, is the
      company's massively multiplayer educational online game (MMO) for children ages 8-13, priced at $9.99 per
      month or $79.99 annually per Common Sense Media. ReadingIQ provides a digital book library for ages 2-12.
      My Math Academy and My Reading Academy, both launched 2021-2022, apply AI-powered adaptive learning to early
      mathematics and reading for ages 4-8. Common Sense Media rates ABCmouse at 5/5 for learning and recommends
      it for the 2-8 age bracket, confirming strong third-party endorsement across the core product.
    claimRefs:
      - CO005
      - CO006
      - CO007
      - CO008
      - CO014
