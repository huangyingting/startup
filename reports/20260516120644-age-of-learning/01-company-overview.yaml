  - calloutType: risk
    title: FTC enforcement history is a live diligence flag
    body: >-
      The 2020 FTC $10M settlement for deceptive subscription and cancellation practices covering 2015-2018 is
      material. Consumer protection regulators continue to scrutinize EdTech subscription products. Evidence
      of compliance program rebuild must be obtained through the diligence process before any investment.
    claimRefs:
      - CO004
      - CO021
      - CO031
      - CO040
  - calloutType: insight
    title: Private-company opacity limits financial underwriting
    body: >-
      With approximately $480M raised and a last-known ~$3B valuation, Age of Learning operates at significant
      scale, but the complete absence of public audited financials means revenue, margin, burn, and capital
      adequacy can only be assessed through the data room. This is a hard diligence blocker for any investment
      process.
    claimRefs:
      - CO012
      - CO016
      - CO028

