        - Multi-homing; free alternatives; subscription fatigue
        - High
        - Request actual churn, LTV, and CAC data; compare to public consumer EdTech benchmarks
      - - Curriculum breadth (9,000+ activities)
        - Khan Academy Kids expanding with donor capital; AI content generation tools
        - Medium
        - Verify curriculum update cadence vs competitors; assess AI content generation risk
      - - Brand recognition with parents (15+ years)
        - Well-resourced free competitors improving quality; parent trust in public media
        - Medium
        - Analyze NPS, review trends, and parent survey data over time; compare to KAK brand metrics
      - - Institutional reach (10,000+ classrooms)
        - Epic! free educator model; IXL entrenched school channel in upper elementary
