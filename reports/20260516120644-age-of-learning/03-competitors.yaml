  evidenceGaps:
    - id: EGP001
      type: missing-source
      severity: material
      topic: Competitor subscriber base estimates
      missingEvidence: >-
        Independent third-party measurement of subscriber counts and active user bases for
        Khan Academy Kids, Epic!, IXL, and Prodigy; these figures are not publicly disclosed
        and only app store review counts and press releases provide proxy signals.
      whyItMatters: >-
        Without subscriber scale data for competitors, the relative market share and
        competitive intensity assessment is based on proxies that may overstate or understate
        each platform's reach and displacement risk to ABCmouse.
      diligencePath: >-
        Request proprietary data from Sensor Tower, App Annie/data.ai, or similar app
        intelligence platforms; alternatively, obtain NielsenIQ consumer panel data
        for the education app category targeting ages 2-8.
      relatedQuestionRefs:
        - QP021

    - id: EGP002
      type: missing-source
      severity: minor
      topic: Content library comparative sizes
      missingEvidence: >-
        Standardized content count data for competing apps; Epic! claims 40,000+ titles
        but activity counts for Khan Academy Kids and Prodigy are not directly comparable
        to ABCmouse's activity metric, making library breadth comparison imprecise.
      whyItMatters: >-
        Content library size is cited as a primary moat but cannot be rigorously ranked
        against competitors without consistent counting methodology across platforms.
      diligencePath: >-
        Request standardized content counts from each competitor's public API, investor
        materials, or through direct inquiry; alternatively conduct an activity audit
        of each app's public curriculum map.
      relatedQuestionRefs:
        - QP022

    - id: EGP003
      type: missing-source
      severity: material
      topic: IXL school district K-2 penetration
      missingEvidence: >-
        IXL's school district penetration specifically in Grades K-2 broken out separately;
        company filings are private and third-party data is unavailable, making a head-to-head
        school channel comparison with ABCmouse for Schools difficult.
      whyItMatters: >-
        IXL is expanding into younger grades and its school channel endorsement could
        accelerate displacement of ABCmouse for Schools; without K-2 penetration data the
        competitive threat from below cannot be accurately sized.
      diligencePath: >-
        Request district-level procurement data from state education agency procurement
        databases or EdTech market research firms (e.g., LearnPlatform, EdSurge); conduct
        win/loss interviews with school district technology coordinators.
      relatedQuestionRefs:
        - QP023

    - id: EGP004
      type: private-evidence-only
      severity: minor
      topic: Prodigy freemium conversion rate
      missingEvidence: >-
        Prodigy's freemium-to-paid conversion rate and premium subscription count;
        these are not disclosed publicly and the competitive sustainability of the
        freemium model cannot be independently assessed without this data.
      whyItMatters: >-
        If Prodigy's conversion rate is very low, the freemium competitive threat to
        ABCmouse's math segment is limited; if high, it signals that the freemium model
        is a viable displacement mechanism that ABCmouse could face from other competitors.
      diligencePath: >-
        Request conversion rate data through secondary sources such as SimilarWeb
        subscription tier analysis; alternatively, contact former Prodigy employees
        through LinkedIn for background reference checks.
      relatedQuestionRefs:
        - QP024

    - id: EGP005
      type: private-evidence-only
      severity: material
      topic: ABCmouse subscriber churn and retention
      missingEvidence: >-
        Age of Learning's actual subscriber churn rate, 12-month renewal rate, and
        cohort-level retention data; the FTC settlement (2020) related to subscription
        cancellation practices makes this a diligence priority but the current state
        is not observable from public sources.
      whyItMatters: >-
        Subscriber retention is the single most important metric for assessing the
        durability of ABCmouse's competitive position in the consumer channel; without
        this data, the moat durability assessment is based on indirect signals (app
        store ratings, review volume) rather than actual retention economics.
      diligencePath: >-
        Request management-provided cohort retention data in the due diligence data
        room; compare to public consumer EdTech benchmarks from Sensor Tower and
        internal benchmarks from similar subscription businesses.
      relatedQuestionRefs:
        - QP025
