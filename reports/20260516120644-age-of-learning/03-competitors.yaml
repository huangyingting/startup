localEvidence:
  searchQueries:
    - query: "ABCmouse competitors early learning apps market 2026"
      rationale: >-
        Identifies the current direct and adjacent competitive set for ABCmouse in the
        pre-K to Grade 3 consumer digital learning segment.
    - query: "Khan Academy Kids free curriculum ages 2 to 8 features 2026"
      rationale: >-
        Khan Academy Kids is the primary free-tier displacement risk; query verifies
        current product scope and age targeting.
    - query: "Duolingo ABC literacy phonics early childhood app 2026"
      rationale: >-
        Duolingo ABC is a narrow but high-engagement literacy competitor; query checks
        current product positioning.
    - query: "Epic digital reading platform school educator free 2026"
      rationale: >-
        Epic! competes in the reading segment and has a school free model that could
        affect ABCmouse for Schools positioning.
    - query: "Prodigy Math adaptive gamified education freemium 2026"
      rationale: >-
        Prodigy is the leading freemium math game for early grades; query confirms
        current product scope and model.
    - query: "IXL skills practice math english grade subscription 2026"
      rationale: >-
        IXL has the strongest school channel in skills practice; query confirms
        current pricing and product breadth.
    - query: "educational app subscription pricing model children 2026"
      rationale: >-
        Pricing landscape across competitors is a key competitive dimension; includes
        volatile token pricing, covered by 2026.
    - query: "ABCmouse content library depth breadth comparison 2026"
      rationale: >-
        Content library size is the primary stated moat; query seeks comparative
        evidence for curriculum breadth claims.
    - query: "children digital learning platform moat switching cost 2026"
      rationale: >-
        Switching cost and lock-in dynamics in consumer EdTech are underresearched;
        query seeks structural analysis.
    - query: "Starfall free literacy reading PBS Kids early learning 2026"
      rationale: >-
        Starfall and PBS Kids are free-tier alternatives in literacy; query checks
        current product and competitive positioning.
    - query: "abcmouse adventure academy age of learning 2026"
      rationale: >-
        Checks current competitive product portfolio for Age of Learning including
        Adventure Academy (8-13); includes volatile substring, covered by 2026.
    - query: "early childhood edtech brand trust reputation review 2026"
      rationale: >-
        Parent trust and brand recognition are key moat elements; query seeks
        review evidence for competitive brand standing.
    - query: "COPPA children app compliance education technology 2026"
      rationale: >-
        COPPA compliance posture is a trust-and-regulatory dimension of competition;
        query checks public compliance signals.
    - query: "Homer reading app early literacy 2026"
      rationale: >-
        Homer is a direct paid literacy competitor; query confirms current product
        and pricing scope.
    - query: "consumer edtech competitive displacement risk free alternatives 2026"
      rationale: >-
        Free-tier displacement is the primary competitive risk; query seeks adverse
        evidence on consumer willingness to pay.

