      - - AI-adaptive learning (My Math Academy, My Reading Academy)
        - AI-native startups; open-source LLM tools enabling faster competitive builds
        - Low
        - Validate ESSA efficacy evidence; compare to IXL Diagnostic and similar adaptive products

