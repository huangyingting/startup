  claims:
    - id: CP001
      statement: >-
        Khan Academy Kids is available as a completely free mobile app for iOS and Android,
        targeting children ages 2–8 with a curriculum covering reading, math, and social-emotional
        learning, making it the primary zero-cost alternative to ABCmouse in the same age band.
      type: observed
      topic: competitive landscape
      sourceRefs:
        - SP001
        - SP021
      confidence: high
      freshness: recent

    - id: CP002
      statement: >-
        Khan Academy Kids is backed by Khan Academy, a non-profit supported by major funders
        including the Bill and Melinda Gates Foundation and Google, giving it access to
        sustained capital to expand curriculum without requiring subscription revenue.
      type: observed
      topic: competitive landscape
      sourceRefs:
        - SP001
        - SP021
      confidence: high
      freshness: recent

    - id: CP003
      statement: >-
        Duolingo ABC is a free phonics and early literacy app by Duolingo, targeting ages 3-6;
        it focuses on letter recognition, phonics, and early reading but does not cover
        mathematics or science, making it a narrow-curriculum competitor to ABCmouse.
      type: observed
      topic: competitive landscape
      sourceRefs:
        - SP003
        - SP013
      confidence: medium
      freshness: recent

    - id: CP004
      statement: >-
        Epic! (Epic Creations) raised $500 million at a $1.7 billion valuation in September 2021
        and offers a digital library of 40,000+ books and educational videos, with free access
        for classroom teachers and a $9.99/month family subscription for home access.
      type: third-party-reported
      topic: competitive landscape
      sourceRefs:
