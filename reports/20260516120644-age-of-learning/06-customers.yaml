company:
  name: Age of Learning
chapter:
  number: 6
  title: Customers and Market Traction
  letter: U
  summary: >-
    Age of Learning's consumer subscriber base peaked at approximately 10 million during
    the COVID-19 pandemic and is estimated at 4-6 million active subscribers in 2023-2024.
    ABCmouse targets parents of children ages 2-8 at $9.99/month, with the core demographic
    skewing toward households with incomes of $50K-$150K. The school channel serves 10,000+
    classroom implementations through ABCmouse for Schools, and My Math Academy and My
    Reading Academy are expanding into Title I and Head Start district partnerships. A 2020
    FTC enforcement action for deceptive cancellation practices and ongoing Trustpilot/BBB
    complaints indicate meaningful consumer friction. International revenue is estimated at
    less than 20% of total, with the US as the dominant market. Named district-level
    customers are limited in public disclosure, creating a key diligence gap for B2B revenue
    quality assessment.

