figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    summary: >-
      Customer adoption path from initial awareness through subscription conversion, active
      usage, and renewal or churn decision for the ABCmouse consumer segment and the school
      district B2B segment.
    data:
      items:
        - id: stage-awareness
          label: Awareness
          actor: Parent (B2C) or District Curriculum Director (B2B)
          description: >-
            B2C: Parent discovers ABCmouse through App Store search, word-of-mouth, social
            media, or school recommendation. B2B: District administrator encounters ABCmouse
            for Schools or My Math Academy through EdTech trade press or state program listing.
          channels:
            - App Store search
            - Word of mouth
            - Google search
            - EdTech conferences
        - id: stage-trial
          label: Trial or Evaluation
          actor: Parent or District Pilot Administrator
          description: >-
            B2C: 7-day free trial initiates the subscription; parent can cancel before charge.
            B2B: Pilot deployment in 1-3 classrooms over one semester; teacher and student
            feedback collected; WestEd efficacy data used in district evaluation process.
          channels:
            - ABCmouse 7-day free trial
            - School pilot program
            - EdTech procurement RFP
        - id: stage-conversion
          label: Subscription / Contract Start
          actor: Parent (credit card) or District IT / Finance
          description: >-
            B2C: Auto-convert to $9.99/month subscription after trial; annual option available.
            B2B: District contract executed (6-18 month sales cycle); multi-year terms typical;
            PO issued through district procurement.
          channels:
            - ABCmouse.com checkout
            - App Store in-app purchase
            - District contract
        - id: stage-active-use
          label: Active Learning Usage
          actor: Child (primary user); Parent or Teacher (supervisor)
          description: >-
            Child engages with adaptive activities; parent receives progress emails; teacher
            uses Assessment Center dashboard for class-level monitoring; learning path advances
            through 850+ lessons.
          channels:
            - ABCmouse app (iOS/Android/browser)
            - Assessment Center (teacher)
            - Parent progress emails
        - id: stage-renewal-or-churn
          label: Renewal or Churn Decision
          actor: Parent or District Procurement
          description: >-
            B2C: Auto-renewal at $9.99/month; churn if child ages out (ages 8+), parent
            cancels, or billing issue occurs. B2B: Multi-year district renewal at contract
            expiry; lower churn than consumer; renewal driven by student outcome evidence.
          channels:
            - Auto-renewal billing
            - District renewal negotiation
            - Account cancellation flow
    approximationNotes: >-
      Journey stages inferred from public product documentation, FTC consent decree details,
      and EdTech industry standard sales cycle data. B2B sales cycle duration (6-18 months)
      is an industry estimate, not company-disclosed.
    claimRefs:
      - CU001
      - CU004
      - CU012
      - CU025

