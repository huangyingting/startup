  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: subscriber counts and churn data
      missingEvidence: >-
        Active subscriber count, monthly active users, cohort-level churn rates, and net
        revenue retention for both the consumer and school district channels are entirely
        private. No public disclosure exists. Third-party app-download data provides a
        directional proxy but cannot substitute for primary subscription metrics.
      whyItMatters: >-
        Without subscriber count and churn data, revenue sustainability, unit economics, and
        customer lifetime value cannot be assessed. These are fundamental inputs for any
        investment underwriting model.
      diligencePath: >-
        Request subscriber count by product, monthly active users, cohort churn curves,
        and net revenue retention by channel from the company data room.
      relatedQuestionRefs:
        - QU024

    - type: private-evidence-only
      severity: material
      topic: named customer proof table completeness
      missingEvidence: >-
        Age of Learning does not publicly disclose its list of named school district customers,
        Head Start program partners, or government program clients. The customer proof table
        covers segment categories but no individually named institutions.
      whyItMatters: >-
        Named customer proof is essential for verifying B2B customer quality, contract values,
        and renewal history. The gap between claimed 10,000+ classroom deployments and zero
        named districts is a material diligence concern.
      diligencePath: >-
        Request complete list of current active district and government program contracts,
        including contract start dates, values, renewal history, and student/classroom counts.
      relatedTableRefs:
        - TU003
      relatedQuestionRefs: []

    - type: missing-source
      severity: minor
      topic: trial conversion and acquisition rates
      missingEvidence: >-
        No public source discloses ABCmouse's free-trial-to-paid-subscription conversion rate,
        customer acquisition cost (CAC), or payback period. Pew Research and CNBC parent
        spending surveys provide demographic context but not conversion metrics.
      whyItMatters: >-
        Conversion rate and CAC are key unit economics inputs for assessing the efficiency
        and scalability of the consumer subscription growth model.
      diligencePath: >-
        Request trial conversion rates, CAC by channel (organic, paid, school-referral),
        and LTV:CAC ratio from the data room.
      relatedQuestionRefs:
        - QU024
