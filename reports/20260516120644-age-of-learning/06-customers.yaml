  - id: section-customer-proof
    title: Named Customer Proof and District Partnerships
    body: >-
      Age of Learning's publicly documented institutional customer base is limited relative
      to the scale of company claims about school deployment. ABCmouse for Schools is the
      most established B2B product, with eSchoolNews, EdTech Digest, and company press
      releases consistently citing 10,000+ classroom implementations since 2016. However,
      specific named district customers are rarely disclosed in public materials; school
      partnerships are typically described by aggregate count or funding-program type
      rather than by institution name. This is consistent with typical EdTech company
      practice but limits third-party verification.

      For My Math Academy and My Reading Academy, the publicly documented evidence is more
      sparse but improving. The company has announced partnerships with Title I school
      districts as part of a push to position efficacy-evidenced products in federally-funded
      school programs. Head Start program adoption for early childhood AI learning has been
      mentioned in press coverage. Age of Learning also has government program customers
      through state literacy initiatives, though specific state names and program sizes are
      not consistently disclosed. The 2024-2025 period shows an accelerating cadence of
      district partnership announcements in company press releases and news coverage,
      consistent with a growing B2B school business.

      The most concrete named deployment evidence comes from ABCmouse's history with
      large urban school districts and military family education programs, both cited in
      company marketing materials, though full deployment sizes and outcome data are not
      publicly available. For institutional diligence, investors should request a complete
      list of current active district contracts, contract values, and renewal history.
    claimRefs:
      - CU012
      - CU013
      - CU014
      - CU015
      - CU020
      - CU021
      - CU022
      - CU023
