    - name: Doug Dohring
      role: Founder and CEO
      background: >-
        Prior venture was Neopets, a virtual-pet platform co-founded and sold to Viacom in 2005,
        providing capital and consumer-internet expertise for Age of Learning.
      claimRefs: []
  foundingLocation: Glendale, California
  headquarters: Glendale, California
  productSummary: >-
    Age of Learning sells subscription-based digital learning platforms for children ages 2-13:
    ABCmouse.com (flagship, 10,000+ activities, $7.99-$12.99/month), Adventure Academy (MMO-style,
    ages 8-13), ReadingIQ (digital books), My Math Academy (AI-adaptive math), and My Reading
    Academy (AI-adaptive reading). An institutional school edition (ABCmouse for Schools) serves
    110,000+ classrooms.
  customerFocus: >-
    Parents of children ages 2-13 (direct-to-consumer subscriptions) and K-2 schools and
