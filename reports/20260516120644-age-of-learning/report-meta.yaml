companyProfile:
  summary: >-
    Age of Learning, Inc. is a private educational technology company founded in 2007 by Doug Dohring
    in Glendale, California. Its flagship product ABCmouse.com launched in 2010 and serves children
    ages 2-8 with 10,000+ learning activities across reading, math, science, and social studies.
    The portfolio has expanded to include Adventure Academy (MMO-style, ages 8-13), ReadingIQ
    (digital books, ages 2-12), My Math Academy (AI-adaptive math, ages 4-8), and My Reading Academy
    (AI-adaptive reading, ages 4-8). The company raised $300M at a $3B post-money valuation in October
    2021 (led by TPG Growth, with QIA, Madrone Capital Partners, and Tencent), bringing total known
    funding to approximately $480M. It has not disclosed audited financials or filed for an IPO as
    of the May 2026 report date.
  foundedDate: '2007-01-01'
