          label: ABCmouse brand equity
          detail: >-
            Recognized consumer brand with 4.5/5 App Store rating and Common Sense Media 5/5 endorsement; strong
            household recognition in preschool and early-elementary segments.
          tone: positive
        - id: platform
          label: Multi-product platform
          detail: >-
            ABCmouse, Adventure Academy, ReadingIQ, My Math Academy, My Reading Academy; ages 2-13; B2C subscription
