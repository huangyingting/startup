      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Age of Learning's known funding history unfolds in three phases. Early-stage capital of approximately $30M
              was raised through SEC Form D filings in 2011 and 2012 with unnamed investors before the company attracted
              wider institutional attention. The company's profile changed materially in May 2016 when it raised $150M
              led by ICONIQ Capital at a $1 billion post-money valuation, achieving unicorn status. EdSurge described
              Age of Learning as a "quiet giant" whose scale had previously gone largely unnoticed by the technology
              press. A much larger third round followed in November 2021 when Age of Learning raised $300M from a group
              including TPG Growth, Qatar Investment Authority, Madrone Capital Partners, and Tencent at a reported
              valuation of approximately $3 billion.


              These three phases bring total known equity funding to approximately $480M. The company has not gone
              public, has not issued public debt, and there are no publicly available audited financial statements. SEC
              EDGAR records confirm equity issuances via Form D filings but do not disclose material financial terms. As
              a result, the specific cap table, investor rights, current cash position, burn rate, and revenue profile
              remain entirely private. Any thorough diligence on capital adequacy or margin profile requires direct
              data-room access. The Tencent co-investment also raises a potential CFIUS review question for any future
              change-of-control transaction.
