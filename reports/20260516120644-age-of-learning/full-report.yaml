  - id: FR001
    title: Composite Risk Severity Scores — Key Risk Categories
    type: bar
    summary: >-
      Severity scores (1-10) for seven key risk categories facing Age of Learning, combining regulatory exposure,
      competitive displacement, financial valuation gap, and operational concentration risks.
    data:
      items:
        - label: FTC Regulatory Recurrence
          value: 9
        - label: AI Tutoring Disruption
          value: 8
        - label: Consumer Subscriber Attrition
          value: 8
        - label: Valuation Multiple Compression
          value: 9
        - label: Founder CEO Key-Person Risk
          value: 7
        - label: Cybersecurity Breach (Children's Data)
          value: 8
        - label: KOSA / State Privacy Legislation
          value: 6
    approximationNotes: >-
      Severity scores are qualitative composite assessments (1-10) combining likelihood, impact, and mitigation maturity
      from public evidence only; not actuarial. Scores are not comparable across companies or sectors.
    claimRefs:
      - CR001
      - CR016
      - CR036
      - CR037
  - id: FR002
    title: Risk Heat Map — Likelihood vs. Severity
    type: matrix
    summary: >-
      Heat map placing Age of Learning's five primary risk categories across likelihood and severity dimensions to
      prioritize diligence and monitoring effort.
    data:
      columns:
        - Low Likelihood
        - Medium Likelihood
        - High Likelihood
      rows:
        - label: Critical Severity
          values:
            - Cybersecurity Breach (children's data)
            - FTC Consent Order Recurrence
            - Post-COVID Valuation Compression
        - label: High Severity
          values:
            - KOSA Federal Legislation
            - COPPA Non-Compliance Penalty
            - Consumer Subscriber Attrition
        - label: Medium Severity
          values:
            - App Store Antitrust Shift
            - Talent Retention Risk
            - ESSER Fund Expiration Impact
        - label: Low-Medium Severity
          values:
            - EU DMA Platform Change
            - State Privacy Law Compliance
            - Free Content Competitive Pressure
        - label: Low Severity
          values:
            - FERPA Minor Technical Breach
            - Amazon Kids+ Pricing Pressure
            - Governance Friction (founder control)
    approximationNotes: >-
      Placement reflects qualitative likelihood and severity assessments from public evidence as of May 2026. Internal
      risk registers, audit findings, or regulatory correspondence may alter placement.
    claimRefs:
      - CR001
      - CR011
      - CR028
      - CR036
  - id: FR003
    title: Risk Transmission Map — Cascade Pathways to Revenue and Valuation
    type: dag
    summary: >-
      Directed acyclic graph showing how primary risk events cascade through regulatory, competitive, and operational
      channels to affect Age of Learning's revenue and enterprise valuation.
    data:
