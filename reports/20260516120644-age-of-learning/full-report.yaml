  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Financing History and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Age of Learning's most recent external financing was a $300M round in October 2021, led by TPG Growth and
              including the Qatar Investment Authority, Madrone Capital Partners, and Tencent. The round established a
              post-money valuation of $3 billion, bringing total known funding to approximately $480M including earlier
              rounds from ICONIQ Capital and other investors. The 2021 round was executed at the peak of the EdTech
              market cycle, when comparable consumer platforms commanded 10-15x revenue multiples driven by COVID-19
              lockdown demand, elevated digital engagement, and institutional investor enthusiasm for consumer
              subscription technology.

              Age of Learning has disclosed no audited financial statements, revenue figures, or ARR metrics publicly.
              Third-party analysts and secondary market researchers estimate the company's ARR at approximately
              $150-200M as of 2023-2024, implying a last-round revenue multiple of 15-20x. Current consumer EdTech
              public company comparables trade at 3-8x revenue, a compression of 50-70% from 2021 peak multiples.
              Applying current market multiples to the same estimated ARR range yields a mark-to-market enterprise value
              of approximately $450M-$1.6B, a decline of 47-85% from the $3B last-round mark.

              ESSER fund expiration in September 2024 removed a key federal subsidy for school-channel EdTech adoption,
              creating near-term headwind for the B2B segment. Subscriber attrition from the 2020 COVID peak (estimated
              10M subscribers) to an estimated 4-6M in 2023 further weighs on ARR trajectory. Secondary market
              transactions in comparable late-stage private consumer technology companies have cleared at 30-60%
              discounts to last-round marks since 2022, providing additional evidence of mark-to-market deterioration.
              No IPO filing or S-1 registration has been announced as of May 2026. The combination of multiple
              compression, subscriber attrition, ESSER expiration, and financial opacity creates a wide but
              asymmetrically negative valuation distribution.
