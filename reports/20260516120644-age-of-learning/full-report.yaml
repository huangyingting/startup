  - id: FI001
    title: Revenue Model Bridge
    type: flow
    approximationNotes: >-
      This flow diagram maps the qualitative customer journey from initial acquisition through subscription revenue and
      gross profit. Node values are directional descriptions, not quantitative amounts, as the company does not disclose
      financial metrics. The diagram reflects publicly observable product and pricing structure only.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
    data:
      nodes:
        - label: Parent / educator discovers ABCmouse
          detail: >-
            Via TV advertising, organic search, app store, school referral, or word of mouth. Consumer channel
            acquisition cost is elevated; institutional driven by direct sales.
        - label: Free trial or direct subscription conversion
          detail: >-
            ABCmouse offers limited-time trials; there is no free tier. Conversion rates are private; FTC history
            implies prior friction-based retention practices.
        - label: Monthly or annual subscription ($7.99/mo or $59.99/yr)
          detail: >-
            List price is the consumer price; actual ARPU depends on promotional pricing and annual vs monthly mix.
            Annual subscribers are more economically valuable due to lower servicing cost and higher retention implied.
        - label: Multi-product cross-sell (Adventure Academy, ReadingIQ)
          detail: >-
            Age of Learning offers multiple subscription products that could be bundled; public evidence of cross-sell
            rates is absent.
        - label: Gross revenue after refunds and chargebacks
          detail: >-
            Consumer subscription businesses face chargeback and refund risks; the FTC settlement context implies
            historically elevated refund activity.
        - label: 'Less: content, hosting, and support costs → Gross profit'
          detail: >-
            Content development (9,000+ activities), cloud hosting, and customer support are primary COGS drivers; gross
            margin estimated at 50–70% based on SaaS peers.
      edges:
        - source: Parent / educator discovers ABCmouse
          target: Free trial or direct subscription conversion
        - source: Free trial or direct subscription conversion
          target: Monthly or annual subscription ($7.99/mo or $59.99/yr)
        - source: Monthly or annual subscription ($7.99/mo or $59.99/yr)
          target: Multi-product cross-sell (Adventure Academy, ReadingIQ)
        - source: Multi-product cross-sell (Adventure Academy, ReadingIQ)
          target: Gross revenue after refunds and chargebacks
        - source: Gross revenue after refunds and chargebacks
          target: 'Less: content, hosting, and support costs → Gross profit'
  - id: FI002
    title: Unit Economics Bridge
    type: flow
    approximationNotes: >-
      This flow diagram maps the qualitative unit economics chain from subscriber acquisition through LTV realization.
      All values are directional; actual CAC, LTV, and churn rates are private. The FTC settlement (2020) is noted as a
      moat risk in the retention node. Public EdTech benchmarks are cited where applicable as approximations only.
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI011
      - CI029
    data:
      nodes:
        - label: Subscriber acquisition (CAC not disclosed)
          detail: >-
            TV advertising and digital channels imply elevated CAC; comparable consumer EdTech CAC benchmarks range
            $30–$150 per subscriber for paid acquisition channels.
        - label: Trial conversion rate (not disclosed)
          detail: >-
            Free trial conversion to paid is a key unit economics driver; no public data; FTC context implies conversion
            and retention were previously friction-assisted.
        - label: Active subscription ($7.99/month list)
          detail: >-
            Monthly subscription price is the revenue per unit per period. Annual plan ($59.99/year = $5/month
            equivalent) improves LTV but reduces short-term cash.
        - label: Monthly churn rate (not disclosed; FTC signal)
          detail: >-
            Churn is the dominant LTV lever; consumer EdTech benchmarks suggest 5–15%/month for non-sticky subscription
            products. FTC settlement implies historically above-benchmark churn masked by cancellation friction.
        - label: Gross profit contribution per subscriber
          detail: >-
            At $7.99/month with estimated 50–70% gross margin, gross profit is ~$4–$5.60 per subscriber per month; LTV
            depends on duration of subscription.
        - label: CAC payback and LTV ratio
          detail: >-
            At estimated CAC of $50–$150 and $4–$5.60 gross profit/month, payback is 9–37 months; LTV/CAC above 3x is
            the standard benchmark for healthy subscription businesses.
