      - number: '5.3'
        title: Platform Architecture, Deployment, and Infrastructure
        blocks:
          - type: paragraph
            body: >-
              ABCmouse and the broader Age of Learning product suite operate as cloud-hosted, multi-device platforms
              accessible through standard web browsers on desktop and laptop computers, and as native applications on
              iOS and Android. The company supports iOS 13+ and Android 5.0+ as minimum requirements based on app store
              technical specifications. Cross-platform content synchronization enables children to start an activity on
              a tablet and continue on a web browser without losing progress, which is a materially important UX feature
              for the preschool and early-elementary demographic where families use multiple devices.

              The platform's content delivery relies on cloud infrastructure, consistent with standard EdTech deployment
              patterns. While Age of Learning does not publicly disclose its specific cloud vendor or CDN provider, the
              scale of serving 10,000+ activities to millions of concurrent sessions is consistent with AWS, GCP, or
              Azure architectures. The company does not publish a status page, publicly document its reliability SLA, or
              disclose uptime metrics. Content security for child-facing platforms requires COPPA-compliant data
              handling, including parental consent flows, data minimization, and restrictions on behavioral advertising.
              The company's COPPA compliance posture is shaped by the 2020 FTC consent decree, which imposes ongoing
              compliance reporting obligations.

              For the school channel, ABCmouse for Schools includes an Assessment Center feature providing teachers with
              class-level progress dashboards and individual student performance reports. The school edition supports
              rostering through standard district IT systems, though Age of Learning does not publicly list specific SSO
              or SIS integration partners. Adventure Academy requires an active internet connection and is not designed
              for offline use, which limits deployment in lower-connectivity school environments.
