  - id: FV001
    title: Comparable EV/Revenue Multiples — EdTech Peer Set
    type: bar
    summary: >-
      EV/revenue multiples for key EdTech comparables versus Age of Learning's 2021 last-round implied multiple of
      approximately 17x. Current market context for consumer EdTech subscription platforms is 3-5x, well below the 2021
      entry point. Duolingo is a ceiling, not a peer.
    data:
      items:
        - label: Duolingo (2026)
          value: 11
        - label: Chegg (2026)
          value: 1
        - label: Age of Learning (2021 last round)
          value: 17
        - label: EdTech M&A Median (2022-24)
          value: 3.5
        - label: Coursera (2026)
          value: 3.5
        - label: Nerdy Inc. (2026)
          value: 1.5
        - label: Current EdTech Avg
          value: 4
    approximationNotes: >-
      Multiples are approximate and based on public market data and third-party analyst estimates as of May 2026. Age of
      Learning 2021 multiple is inferred from $3B valuation and estimated $150-200M ARR midpoint. Duolingo and Chegg
      multiples based on analyst consensus and public filings.
    claimRefs:
      - CV005
      - CV006
      - CV007
      - CV024
  - id: FV002
    title: Valuation Scenario Range — Bull / Base / Bear vs. Last Round
    type: range
    summary: >-
      Enterprise value range across bull, base, and bear scenarios for Age of Learning compared to the $3B 2021
      last-round mark. The wide range reflects financial opacity and market multiple compression. All values in billions
      USD.
    data:
      items:
        - label: Bear Case
          low: 0.4
          high: 0.6
          mid: 0.5
        - label: Base Case
          low: 1.2
          high: 2
          mid: 1.6
        - label: Bull Case
          low: 3.5
          high: 5
          mid: 4.2
        - label: 2021 Last Round Mark
          low: 3
          high: 3
          mid: 3
    approximationNotes: >-
      Ranges are qualitative estimates based on DCF and comparable analysis. Actual outcomes depend on undisclosed
      revenue, margin, and subscriber data. Probability weights are 20% bull, 50% base, 30% bear as described in the
      scenarios section.
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
  - id: FV003
    title: Valuation KPI Scorecard
    type: kpi
    summary: >-
      Key valuation metrics for Age of Learning based on public evidence, third-party estimates, and comparable company
      analysis as of May 2026. Items marked as estimated carry wide uncertainty bands due to the absence of audited
      financial disclosure.
    data:
      items:
        - label: Last Round Valuation
          value: $3.0B
          note: Confirmed via Bloomberg, TechCrunch reporting on 2021 round
        - label: Total Funding Raised
          value: $480M
          note: Estimated including all known rounds through 2021
        - label: Estimated ARR
          value: $150-200M
          note: Third-party estimate; no public confirmation available
        - label: Implied Revenue Multiple (2021)
          value: 15-20x
          note: Inferred from $3B valuation and estimated ARR range
        - label: Mark-to-Market Range
          value: $450M-$1.6B
          note: Based on current comparable multiples of 3-8x applied to estimated ARR
        - label: Recommendation
          value: Track / Research-More
          note: Not actionable at $3B; revisit at $1.2-1.5B entry with data room access
    approximationNotes: >-
      All figures except last round valuation are estimates based on third-party data and comparable company analysis.
      No public financial confirmation is available. Wide uncertainty bands apply to all estimated metrics.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV009
  - id: FV004
    title: Recommendation Logic Flow
    type: flow
    summary: >-
      Decision pathway from public market evidence and company-specific factors to the Track / Research-More
      recommendation for Age of Learning. Each node represents a discrete evidence category that feeds into the
      valuation gap assessment and conditional recommendation.
    data:
      nodes:
        - id: n1
          label: Market Evidence
          description: EdTech multiple compression to 3-8x; 2021 peak was 10-15x
        - id: n2
          label: Product and Brand Evidence
          description: Strong brand moat; subscriber attrition post-COVID; AI disruption risk
        - id: n3
          label: Financial Opacity
          description: No audited financials; no public ARR or churn data available
        - id: n4
          label: Risk Assessment
          description: High risk; FTC history; Tencent ownership; preference overhang
        - id: n5
          label: Valuation Gap
          description: $3B mark vs. $450M-$1.6B mark-to-market; 47-85% markdown implied
        - id: n6
          label: Track / Research-More
          description: Conditional entry at $1.2-1.5B with data room; not actionable at $3B
      edges:
        - from: n1
          to: n5
          label: Comparable multiples compress exit value
        - from: n2
          to: n4
          label: Brand moat offset by subscriber attrition and AI risk
        - from: n3
          to: n4
          label: Opacity prevents reliable underwriting
        - from: n4
          to: n5
          label: High risk demands discount to fair value
        - from: n5
          to: n6
          label: Valuation gap defines conditional entry thesis
    approximationNotes: >-
      Logic flow is based on public evidence only; data room access would materially change the decision pathway and
      potentially upgrade the recommendation if ARR growth and subscriber stabilization are confirmed.
    claimRefs:
      - CV009
      - CV010
      - CV023
  - id: FV005
    title: Valuation Bridge — 2021 Last Round to Current Base Case
    type: waterfall
    summary: >-
      Waterfall decomposing the decline from the $3B 2021 last-round valuation to the estimated $1.2B base case implied
      value, through multiple compression, subscriber attrition, risk/opacity discount, and preference overhang haircut.
      Values in billions USD.
    data:
      items:
        - label: 2021 Last-Round Entry
          value: 3
        - label: Multiple Compression (3-8x market vs 15-20x entry)
          value: -1
        - label: Post-COVID Subscriber Attrition Discount
          value: -0.3
        - label: Financial Opacity and Risk Premium
          value: -0.3
        - label: Preference Overhang Haircut
          value: -0.2
    approximationNotes: >-
      Waterfall components are qualitative decompositions of overall multiple compression. Individual component
      attributions are estimates; actual value drivers depend on undisclosed financial data. Summed adjustments imply a
      residual base case value of approximately $1.2B, consistent with comparable analysis. All figures are in billions
      USD.
    claimRefs:
      - CV009
      - CV010
      - CV026
