chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Founding, and Corporate History
        blocks:
          - type: paragraph
            body: >
              Age of Learning, Inc. is a private educational technology company headquartered in Glendale, California.
              The company was founded in 2007 by Doug Dohring, an entrepreneur whose prior venture was Neopets, a
              virtual pet website he co-founded and ultimately sold to Viacom in 2005. That transaction gave Dohring
              both the capital and the consumer-internet expertise to build a children's learning platform from scratch.
              Age of Learning's flagship product, ABCmouse.com, launched in November 2010 and positioned the company as
              a direct-to-consumer subscription learning service for children ages two through eight.


              Over the following decade, the company expanded its product portfolio well beyond ABCmouse to include
              Adventure Academy (April 2019, ages 8-13), ReadingIQ (digital books, ages 2-12), My Math Academy (2021,
              AI-adaptive math for ages 4-8), and My Reading Academy (2022, ages 4-8). Despite building a recognized
              consumer brand and raising substantial institutional capital, Age of Learning has maintained an unusually
              low public profile relative to its scale—a characteristic that industry observers noted explicitly when
              the company achieved unicorn status. The company operates entirely as a private entity and has not filed
              for a public offering as of the May 2026 report date.
