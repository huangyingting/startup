      - number: '7.4'
        title: Operational and People Risk
        blocks:
          - type: paragraph
            body: >-
              Doug Dohring has served as CEO of Age of Learning since founding the company in 2007—an 18-year tenure
              that is unusual for a $3 billion-valued company backed by institutional growth equity. While founder
              continuity can signal cultural alignment and product conviction, it also creates concentrated key-person
              dependency. No succession plan has been publicly disclosed. Raeanne Yamamoto (COO) is the only other
              senior executive publicly identified at Age of Learning, indicating a thin public executive bench that
              raises governance concerns. The company operates in the Glendale, California market, where competition
              from major technology employers—Google, Apple, Meta, and others in the greater Los Angeles area—creates
              ongoing engineering talent retention risk.

              Governance risk arises from founder control at a growth equity-backed company: institutional investors
              seeking exit liquidity or strategic direction changes may encounter friction when a founder-CEO retains
              significant control. Age of Learning has not disclosed any organizational restructuring, layoffs, or
              headcount changes since the 2021 funding round, limiting the ability to assess current operational health
              and cost structure. Software engineering talent competition from major technology companies creates
              ongoing retention risk that may affect product velocity, particularly as Age of Learning competes to
              integrate AI capabilities into its platform. The combination of key-person dependency, thin executive
              disclosure, and absence of governance transparency collectively elevates the operational risk profile
              above that of a typical late-stage consumer software company.
