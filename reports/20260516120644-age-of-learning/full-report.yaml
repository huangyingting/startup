            body: >-
              Age of Learning does not publicly disclose subscription churn rates, net revenue retention (NRR), or gross
              revenue retention (GRR). The 2020 FTC enforcement action, which resulted in a $10 million settlement for
              deceptive subscription cancellation practices, is the most significant adverse customer experience event
              on record. The FTC found that Age of Learning made it unreasonably difficult for subscribers to cancel
              their ABCmouse subscriptions between 2015 and 2018, resulting in unauthorized charges. The company has
              since rebuilt its cancellation flow, and no subsequent enforcement action has been recorded as of May
              2026. However, ongoing consumer reviews on Trustpilot and the Better Business Bureau reflect continued
              dissatisfaction with cancellation and billing practices from a subset of subscribers.

              App store ratings are the most widely visible satisfaction proxy. ABCmouse's 4.5-star Apple App Store
              rating from approximately 994,000 reviews and 4.0-star Google Play rating from approximately 35,000
              reviews reflect broad consumer satisfaction with the learning content. Common Sense Media's 5/5 learning
              rating and independent parent publication endorsements (Parents Magazine, Today's Parent) confirm strong
              third-party brand validation. The tension between high app store ratings and ongoing billing/ cancellation
              complaints on Trustpilot and BBB suggests the product experience (content quality) is strong while the
              subscription management experience has not fully recovered from the FTC-documented issues. For school
              district customers, multi-year contracts and lower churn (vs consumer subscriptions) provide more durable
