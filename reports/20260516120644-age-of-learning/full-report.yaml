      - number: '6.2'
        title: Adoption Trajectory and Usage Metrics
        blocks:
          - type: paragraph
            body: >-
              ABCmouse's subscriber trajectory reflects a consumer EdTech pattern defined by the COVID-19 pandemic: a
              large surge in 2020-2021 followed by post-pandemic normalization. The company stated in 2021 press
              coverage that ABCmouse had served over 35 million children globally as a cumulative figure since launch.
              The subscriber base is estimated to have peaked near 10 million active paid subscribers during the
              2020-2021 pandemic period, representing the highest point in the company's history. Sensortower and
              SimilarWeb traffic data, alongside third-party analyst estimates, suggest the active subscriber base
              normalized to approximately 4-6 million in 2023-2024, still representing a significant permanent retention
              above the pre-pandemic base.

              For the school channel, ABCmouse for Schools counts are the most consistently cited traction figure:
              10,000+ classroom implementations across multiple published sources. My Math Academy and My Reading
              Academy adoption in the school channel is newer (since 2021-2022) and less publicly documented, with
              district partnership announcements the primary evidence of traction. Age of Learning has announced
              partnerships with Title I districts and Head Start programs, consistent with the EdTech trend of targeting
              federally-funded school channels for AI-adaptive products with efficacy evidence.

              The absence of official subscriber counts, monthly active user disclosures, or revenue by product line is
              the most significant gap in the public evidence record. As a private company, Age of Learning does not
              publish periodic financial or operational metrics. Third-party app download data from Sensortower and
              SimilarWeb provides directional insight but cannot substitute for primary subscription data. The company's
              $300M 2021 fundraise at a ~$3B valuation implies investor-visible metrics that support that valuation, but
              those metrics are not available in public records.
