        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: >
              Age of Learning generates revenue through two primary channels: consumer subscriptions and institutional
              (B2B) contracts. The consumer channel is anchored by ABCmouse Early Learning Academy, priced at
              $7.99/month or $59.99/year for families, and Adventure Academy, a massively multiplayer educational game
              for ages 8–13 whose consumer pricing is not publicly disclosed. ReadingIQ, a digital book subscription for
              children ages 2–12, is a third consumer product at approximately $7.99/month; it was quietly absorbed into
              the Age of Learning portfolio and its standalone pricing is infrequently updated on public channels. The
              institutional channel includes ABCmouse for Schools (B2B licensing to school districts), My Math Academy
              (AI-adaptive math for K-2, sold to districts and schools), and My Reading Academy (AI-adaptive reading for
              K-2). Institutional pricing is negotiated directly and not publicly disclosed. Revenue recognition for
              subscription products is straightforward: deferred revenue recognized ratably over the subscription
              period. Institutional contracts likely involve multi-year agreements with upfront payments or
              milestone-based disbursements, which could create revenue timing differences. The company's revenue mix
              between consumer and institutional channels is not publicly disclosed; based on product history, ABCmouse
              consumer subscriptions have historically been the dominant revenue driver, with institutional and
              international as growth vectors.
