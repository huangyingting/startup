      - number: '7.5'
        title: Technology, Platform, and Cybersecurity Risk
        blocks:
          - type: paragraph
            body: >-
              Apple App Store and Google Play charge a 30% commission on first-year in-app subscriptions and 15% on
              renewals after one year, representing a structural platform fee drag on Age of Learning's mobile revenue.
              For a subscription business targeting cost-conscious parents, this fee structure meaningfully compresses
              gross margin on mobile-acquired subscribers. App Store policy changes stemming from the Epic Games v.
              Apple litigation and the EU Digital Markets Act could alter this fee structure, but may also create
              regulatory compliance obligations for Age of Learning's mobile distribution model. The company's platform
              dependency on Apple and Google means that a policy change, algorithm shift, or removal from the App Store
              would directly impact subscriber acquisition and retention.

              CISA has identified the K-12 education sector as one of the highest-targeted sectors for ransomware
              attacks, data breaches, and phishing campaigns. For Age of Learning, a cybersecurity incident carries
              heightened regulatory exposure: a breach involving children's personal data would trigger COPPA
              enforcement, state AG actions under children's privacy laws, and significant reputational damage to a
              brand that sells trust to parents. Age of Learning has not publicly disclosed a SOC 2 Type II
              certification or equivalent independent cybersecurity assessment as of May 2026. Without evidence of
              formal third-party security certification, the cybersecurity risk cannot be assessed from public sources—a
              blocking diligence gap.

              Generative AI represents a technology-level disruption to the subscription curriculum model. AI models are
              increasingly capable of producing personalized educational content for specific age groups, enabling
              families to substitute AI-generated tutoring for subscription platforms at near-zero marginal cost. The
              American Academy of Pediatrics recommends no more than one hour of screen time per day for children ages
              2-5, and 71% of US parents express concern about excessive screen time—a structural adoption barrier that
              limits the ceiling for any subscription EdTech platform serving this demographic.
