      - number: '8.5'
        title: Exit Readiness and Required Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Age of Learning's exit readiness is constrained by several unresolved structural factors. The Tencent
              shareholding creates CFIUS national security review risk for any US IPO or US government-sensitive
              strategic acquisition. The FTC consent order complicates disclosure requirements in a public offering
              context. The absence of audited financial statements means the company could not file an S-1 without a
              substantial preparation runway of 12-24 months.

              Required diligence before any investment decision: audited financial statements FY2022-FY2025 covering
              revenue, ARR, gross margin, EBITDA, and operating cash flow; current subscriber count, 12-month churn
              rate, cohort LTV by acquisition vintage, and CAC by channel; full cap table with post-financing preference
              stack, ROFR/ROFO terms, and pro-rata rights; board composition, voting rights, and any investor consent
              rights; FTC consent order compliance documentation including third-party audit reports; and legal opinion
              on Tencent ownership and any CFIUS exposure.

              Nice-to-have diligence: product roadmap and AI integration strategy including any partnership or licensing
              agreements with AI infrastructure providers; distribution channel economics showing mobile vs. web vs. B2B
              revenue split and margin by channel; ESSER-funded school revenue contribution and post-ESSER renewal
              pipeline; and any ongoing or pending litigation, regulatory inquiry, or consumer complaint proceedings
              beyond the disclosed FTC matter.

              Strategic exit paths in priority order: strategic acquisition by a media or education platform such as
              Pearson, Google, Amazon, or Apple is the most likely liquidity event given brand and content IP value;
              secondary sale to a PE sponsor or sovereign wealth co-investor at a meaningful discount to last round is
              the most likely near-term path; IPO requires 3-5 years of preparation including audited financial history,
              Tencent ownership remediation, and demonstration of a profitable growth trajectory consistent with
              post-2021 public EdTech standards.
            claimRefs:
              - CV013
              - CV019
              - CV020
              - CV029
              - CV032
              - CV038
              - CV039
              - CV040
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Valuation Gap and Overpayment Risk
            body: >-
              Age of Learning's $3B 2021 last-round valuation implies a 15-20x revenue multiple on estimated $150-200M
              ARR, a level that current EdTech public market comparables of 3-8x do not support. Any new investor
              entering at or near the 2021 mark faces an immediate mark-to-market loss of 47-85% based on comparable
              analysis. The 2021 investment cohort (TPG, QIA) faces similar unrealized losses unless ARR growth has
              significantly exceeded estimates. The Chegg analogue — a $115 per share peak declining to below $5 —
              demonstrates maximum downside risk when AI competition reverses subscriber trajectories in consumer
              EdTech. Investors must apply current comparable multiples, not the 2021 mark, as their valuation anchor.
            calloutType: risk
            claimRefs:
              - CV004
              - CV007
              - CV008
              - CV009
              - CV010
              - CV036
          - type: callout
            title: Multiple Compression Is Structural, Not Cyclical
            body: >-
              The 50-70% compression in consumer EdTech revenue multiples from 2021 to 2024 reflects structural changes
              in the investor framework for subscription education platforms: the COVID cohort has largely churned, free
              alternatives have improved in quality and scale, AI tutoring is approaching functional parity with paid
              curriculum for many use cases, and institutional investors have reset return expectations for consumer
              software. Morningstar and S&P Global data indicate that median software multiples partially recovered to
              4-7x in 2024, with premium reserved for high-growth, profitable companies. Age of Learning's
              undemonstrated profitability and subscriber attrition trajectory place it in the lower end of the
              comparable range rather than the Duolingo premium tier. A cyclical recovery to 2021 multiples is unlikely
              absent demonstrated profitability and growth reacceleration.
            calloutType: insight
            claimRefs:
              - CV008
              - CV022
              - CV030
              - CV033
          - type: callout
            title: Entry Price and Conditions for Investment
            body: >-
              An entry at $1.2-1.5B (approximately 50-60% discount to the 2021 last round) represents the range where
              base case returns become marginally positive and bull case returns of 3-4x become achievable. This entry
              requires data room confirmation of at minimum: (1) ARR above $150M with positive trend, (2) churn rate
              below 40% annually, (3) gross margin above 60%, and (4) cap table waterfall showing positive common equity
              in a $2B+ exit. Until these conditions are met, the investment is not actionable. Investors should track
              Age of Learning via secondary market pricing signals, any IPO preparatory activity, and any financial
              disclosure that emerges from regulatory filings. Thesis-break monitoring should focus on AI tutor adoption
              curves and any FTC re-engagement.
            calloutType: recommendation
            claimRefs:
              - CV009
              - CV015
              - CV027
              - CV028
              - CV029
