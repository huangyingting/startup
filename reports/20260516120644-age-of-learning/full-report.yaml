      - number: '3.5'
        title: Competitive Outlook and Diligence Priorities
        blocks:
          - type: paragraph
            body: >
              The competitive landscape for Age of Learning is stable but tightening. Free alternatives continue to
              improve in quality and breadth, compressing the value gap that justifies ABCmouse's subscription fee. The
              company's most defensible position is in the institutional (B2B) channel, where switching costs are
              higher, data sharing creates lock-in, and the free-versus-paid dynamic is less acute. In the consumer
              channel, competitive durability depends on whether ABCmouse's gamification and curriculum depth are
              sufficient to sustain conversion and retention against Khan Academy Kids and Prodigy's free tiers. Key
              diligence priorities include: obtaining actual subscriber count and monthly retention data; understanding
              the competitive win/loss dynamics in school procurement against IXL and Epic!; and assessing how deeply
              Duolingo's potential expansion into literacy for young children (not yet launched as of the research date)
              could affect ABCmouse's language and phonics modules. The absence of public comparative retention data is
              the principal blind spot in this competitive assessment.
