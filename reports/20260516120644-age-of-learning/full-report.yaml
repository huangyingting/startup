      - number: '3.3'
        title: Pricing Dynamics and Packaging
        blocks:
          - type: paragraph
            body: >
              Pricing in the consumer early learning app market exhibits a wide range from free (Khan Academy Kids, PBS
              Kids, Starfall, Duolingo ABC) through freemium (Prodigy at no cost for base features, premium at
              ~$8/month) to premium subscriptions ($7.99– $19.99/month). ABCmouse's current list pricing of $7.99/month
              or $59.99/year occupies the middle of the premium tier, above Prodigy's premium upsell but below IXL's
              $19.99. The existence of well-resourced free alternatives suppresses willingness to pay and creates
              ongoing pressure on ABCmouse's subscription conversion and retention. Epic!'s school free model (teachers
              get free access, families pay $9.99/month for home access) is structurally different from ABCmouse's but
              competes for the same household budget in the home segment. IXL's higher price point is sustained by its
              dominant position in K-12 skills practice with school channel endorsement. ABCmouse's pricing history is
              not fully public, but the FTC settlement indicates that subscription cancellation friction was previously
              used to retain subscribers, which is a negative signal for organic retention quality.
