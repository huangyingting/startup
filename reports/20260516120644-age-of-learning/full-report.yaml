      - number: '3.2'
        title: Direct Consumer App Competitors
        blocks:
          - type: paragraph
            body: >
              The consumer app competitive set can be organized into four tiers. First, fully free broad-curriculum
              apps: Khan Academy Kids (ages 2–8, free, well-resourced non-profit) and PBS Kids (free, brand-recognized,
              ages 2–8). These are the highest-displacement-risk competitors because parents can substitute them at zero
              incremental cost. Second, freemium gamified apps: Prodigy (math focus, free base tier with premium
              upsell), Starfall (literacy focus, mostly free), and Duolingo ABC (phonics/literacy, free). These compete
              for mindshare and time but typically serve narrower curricula than ABCmouse. Third, premium narrow-subject
              apps: Homer (early reading, $9.99/month), ReadingIQ (digital books, owned by Age of Learning itself), and
              Epic! (digital books, $9.99/month for families, free for schools). Fourth, broad-curriculum premium apps:
              IXL Learning (K-12 skills practice, $19.99/month, strong school channel) and ABCmouse (Ages 2–8,
              $7.99-$12.99/month). ABCmouse's differentiation against Tier 1 and Tier 2 rests on the density and
              gamified integration of its curriculum; against Tier 3 on breadth; and against IXL on younger-child UX and
              parental engagement design. Feature coverage by competitor is shown in the capability map below.
            claimRefs:
