          description: >-
            B2C: Auto-renewal at $9.99/month; churn if child ages out (ages 8+), parent cancels, or billing issue
            occurs. B2B: Multi-year district renewal at contract expiry; lower churn than consumer; renewal driven by
            student outcome evidence.
          channels:
