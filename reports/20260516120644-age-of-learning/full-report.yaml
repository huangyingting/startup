      - number: '4.3'
        title: Capital Adequacy and Funding History
        blocks:
          - type: paragraph
            body: >
              Age of Learning has raised at least $450 million in disclosed external financing. The first major
              institutional round was $150 million in May 2016 led by ICONIQ Capital and joined by TPG Growth,
              establishing a $1 billion valuation (unicorn status). The second and most recent disclosed round comprises
              two tranches: a June 2021 round of $300 million led by TPG at a $3 billion valuation, later supplemented
              by an additional $300 million closing in November 2021 at the same reported valuation. Combined, these two
              tranches total $600 million disclosed for the 2021 fundraise; some reporting characterizes them as
              separate events, so the all-in total reported depends on source. The company has not disclosed an IPO
              timeline or any debt financing instruments publicly. There are no public signals of down-round activity or
              stressed financing since 2021. The post-2021 period (2022–2026) saw the broader consumer EdTech market
              contract significantly after pandemic-era tailwinds reversed; this macroeconomic backdrop may have
              affected subscriber growth and burn trajectory. Cash on hand, monthly burn rate, and remaining runway are
              not publicly disclosed. The 2021 fundraise press releases indicate the funds were earmarked for global
              expansion, development of AI-adaptive products, and talent acquisition — all capital-intensive uses. The
              company references 'AI Learning' as a growth vector, which implies continued R&D investment. Investors
              include TPG (private equity), ICONIQ Capital (wealth management / direct investment platform), and
              undisclosed co-investors. The nature and terms of these instruments (preferred equity, convertible notes,
              or otherwise) are not in public filings. Form D filings with the SEC confirm multiple exempt offering
