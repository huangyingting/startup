figures:
  - id: FO001
    title: Company Milestone Timeline
    type: timeline
    layout: standard
    summary: >-
      A chronological record of Age of Learning's founding, product launches, financing events, regulatory action, and
      leadership transitions from 2005 through September 2023.
    data:
      items:
        - date: '2007'
          label: Company founded
          detail: Doug Dohring founds Age of Learning in Glendale, California after selling Neopets to Viacom.
          tone: positive
        - date: Nov 2010
          label: ABCmouse launched
          detail: >-
            Flagship product ABCmouse.com launches, targeting ages 2-8 with a subscription learning curriculum covering
            reading, math, science, and arts.
          tone: positive
        - date: May 2016
          label: $150M unicorn round
          detail: >-
            $150M raised from ICONIQ Capital at $1B valuation; ABCmouse for Schools also launched. Company achieves
            unicorn status while maintaining low public profile.
          tone: positive
        - date: Apr 2019
          label: Adventure Academy launched
          detail: >-
            MMO educational game for ages 8-13 launched April 30, 2019; positioned as first educational massively
            multiplayer game for children.
          tone: positive
        - date: Mar 2020
          label: COVID free access campaign
          detail: >-
            ABCmouse offered free to all US families during COVID-19 school shutdowns; major user acquisition surge
            during EdTech adoption peak.
          tone: neutral
        - date: Sep 2020
          label: FTC $10M settlement
          detail: >-
            FTC settles with Age of Learning for $10M over deceptive subscription and cancellation practices from
            2015-2018 period; one of the largest EdTech regulatory actions.
          tone: adverse
        - date: Nov 2021
          label: $300M raise at ~$3B valuation
          detail: >-
            TPG Growth, Qatar Investment Authority, Madrone Capital Partners, and Tencent co-invest $300M; company
            valued at approximately $3B.
          tone: positive
        - date: Sep 2023
          label: Alex Galvagni becomes CEO
          detail: Third CEO in company history; Paul Candland departs; Dohring remains in non-executive role.
          tone: neutral
    approximationNotes: null
    claimRefs:
