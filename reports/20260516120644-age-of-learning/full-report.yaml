  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Learning Platform Overview
        blocks:
          - type: paragraph
            body: >-
              Age of Learning operates five distinct subscription learning products under a single corporate umbrella,
              each targeting a specific age band and learning objective. ABCmouse, the flagship product launched in
              November 2010, serves children ages 2-8 with over 10,000 learning activities and 850+ structured lessons
              across six subject areas: reading and language arts, mathematics, science, social studies, art and colors,
              and music. The platform operates as a browser-based subscription and is available on iOS and Android,
              carrying a 4.5-star rating from approximately 994,000 user reviews on the Apple App Store—one of the most
              reviewed children's educational apps available. Common Sense Media rates ABCmouse 5/5 for learning and
              recommends it for ages 2-8, providing strong third-party curriculum endorsement.

              Adventure Academy, launched April 2019, is a massively multiplayer online (MMO)-style educational game for
              ages 8-13 priced at $9.99/month that covers language arts, math, science, and social studies in an
              immersive virtual world format. ReadingIQ serves ages 2-12 with a curated digital book library. My Math
              Academy (launched 2021) and My Reading Academy (launched 2022) represent the company's AI-powered adaptive
              learning tier, targeting ages 4-8 with personalized instruction grounded in learning science. Both Academy
              products have been deployed in school district settings and are sold through a B2B channel in addition to
              direct-to-consumer subscriptions. All five products are listed on the company's official website and
              represent an intentional age-band coverage strategy from pre-K through middle school entry.
