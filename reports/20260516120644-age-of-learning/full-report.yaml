      - number: '1.2'
        title: Products and Learning Platform
        blocks:
          - type: paragraph
            body: >
              Age of Learning's product portfolio centers on ABCmouse.com, the company's flagship subscription
              curriculum for children ages two through eight. ABCmouse provides over 10,000 learning activities and more
              than 850 structured lessons across six subject areas: reading and language arts, mathematics, science,
              social studies, art and colors, and music. The platform operates as a browser-based subscription service
              available on iOS and Android, and carries a 4.5-star rating from approximately 994,000 user reviews on the
              Apple App Store—one of the highest engagement profiles among children's educational apps. ABCmouse is
              priced at $7.99 to $12.99 per month on the App Store.


              ABCmouse for Schools, launched in July 2016, extends the platform to K-2 classroom settings and is
              reportedly used in over 10,000 classrooms according to EdTech Digest and eSchoolNews. The school edition
              includes an Assessment Center feature designed for teacher use. Adventure Academy, launched April 30,
              2019, is the company's massively multiplayer educational online game (MMO) for children ages 8-13, priced
              at $9.99 per month or $79.99 annually per Common Sense Media. ReadingIQ provides a digital book library
              for ages 2-12. My Math Academy and My Reading Academy, both launched 2021-2022, apply AI-powered adaptive
              learning to early mathematics and reading for ages 4-8. Common Sense Media rates ABCmouse at 5/5 for
              learning and recommends it for the 2-8 age bracket, confirming strong third-party endorsement across the
              core product.
