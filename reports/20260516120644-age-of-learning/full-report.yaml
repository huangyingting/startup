  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Base Overview
        blocks:
          - type: paragraph
            body: >-
              Age of Learning addresses three distinct customer segments: direct-to-consumer (B2C) parent subscribers,
              institutional buyers (B2B) including school districts and classroom teachers, and government-funded
              program participants through Title I schools, Head Start programs, and state literacy initiatives. The B2C
              segment is the largest by subscriber count and represents the historical core of ABCmouse's business.
              Parent subscribers pay $9.99/month for access to the full ABCmouse library for one child, with a 7-day
              free trial available. The target parent demographic skews toward households with incomes of
              $50,000-$150,000 with at least one child ages 2-8. The platform is primarily US-based, with over 80% of
              estimated revenue coming from North American subscribers; Canada, Mexico, the United Kingdom, and Japan
              represent the primary international markets.

              The B2B school channel serves K-2 through Grade 6 classrooms through ABCmouse for Schools, My Math
              Academy, and My Reading Academy. ABCmouse for Schools has been cited in over 10,000 classroom
              implementations. My Math Academy and My Reading Academy are newer B2B products with a focus on Title I
              school districts that qualify for federal education funding. The school sales cycle is 6-18 months, with
              multi-year contracts typical for district-level adoptions. Government-program buyers, including Head Start
              operators and state literacy grant recipients, represent a third channel that benefits from federal
              funding appropriations but also carries budget-cycle risk tied to ESSER expiration and annual
              appropriations.

              App store ratings provide one of the few independent consumer satisfaction signals for a private company.
              ABCmouse holds a 4.5-star rating from approximately 994,000 reviews on the Apple App Store, and a 4.0-star
              rating from approximately 35,000 reviews on Google Play—signals consistent with broad consumer
              satisfaction at scale. Common Sense Media rates ABCmouse 5/5 for learning and highlights it as recommended
              for ages 2-8.
