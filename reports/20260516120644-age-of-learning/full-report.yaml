      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >
              Age of Learning has not disclosed customer acquisition cost (CAC), lifetime value (LTV), gross margin, or
              subscriber churn. Proxy signals are available from the company's advertising footprint, FTC enforcement
              history, and comparable consumer EdTech benchmarks. ABCmouse is widely reported to be a heavy TV and
              digital ad spender, suggesting high CAC in the consumer channel. This is structurally typical for
              direct-to-consumer EdTech subscription businesses, where CAC payback periods of 12–24 months are common.
              The 2020 FTC settlement for $10 million — attributable to deceptive subscription cancellation practices —
              is both an adverse financial signal and a proxy indicator that the company historically relied on
              friction-based retention rather than organic LTV. Gross margin in consumer software subscription
              businesses is typically high (60–80%), but ABCmouse's content creation overhead (9,000+ activities
              maintained and updated), cloud costs for adaptive learning, and ongoing R&D for AI products (My Math
              Academy, My Reading Academy) compress operating margins. Content development and licensing are effectively
              capital expenditures for a curriculum business; the economic life of content assets is unclear. The
              company's capex intensity is therefore meaningfully above a typical pure-SaaS peer but below a hardware or
              physical media business. Headcount is not publicly disclosed but the company is estimated to have had
              300–600 employees at the time of the 2021 funding round, based on LinkedIn signals and company size
              descriptions in press releases.
