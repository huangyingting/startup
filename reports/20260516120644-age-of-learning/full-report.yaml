            recommendation. B2B: District administrator encounters ABCmouse for Schools or My Math Academy through
            EdTech trade press or state program listing.
          channels:
            - App Store search
            - Word of mouth
            - Google search
            - EdTech conferences
        - id: stage-trial
          label: Trial or Evaluation
          actor: Parent or District Pilot Administrator
          description: >-
            B2C: 7-day free trial initiates the subscription; parent can cancel before charge. B2B: Pilot deployment in
            1-3 classrooms over one semester; teacher and student feedback collected; WestEd efficacy data used in
            district evaluation process.
          channels:
            - ABCmouse 7-day free trial
            - School pilot program
            - EdTech procurement RFP
        - id: stage-conversion
          label: Subscription / Contract Start
