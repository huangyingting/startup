      - number: '2.3'
        title: Buyer and Customer Segmentation
        blocks:
          - type: paragraph
            body: >
              Age of Learning addresses two distinct buyer groups: direct-to-consumer parents and guardians who pay for
              subscriptions, and institutional buyers in K-12 schools and districts who purchase site licenses. These
              segments have different CAC profiles, retention economics, and competitive dynamics. The parent-consumer
              segment drives the majority of ABCmouse revenue, is highly price-sensitive at the $7.99-$12.99/month price
              point, and exhibits seasonal peaks aligned with back-to-school periods and parental concerns about school
              readiness. EdTech platforms serving this segment compete primarily on brand recognition, App Store
              visibility, and parent community recommendations.


              The institutional B2B segment—schools and districts—is a slower-to-convert but stickier buyer that
              typically requires curriculum alignment documentation, privacy compliance certifications (COPPA, FERPA,
              SOPIPA), and district IT approval processes. ABCmouse for Schools claims over 10,000 classroom
              implementations, which represents a modest penetration of the US K-2 classroom base of approximately 6
              million classrooms. Institutional buyers budget through annual procurement cycles, have multi-year renewal
              patterns when onboarded, and respond differently to pricing versus the consumer market. The GSV EdTech
              Index and EdTech Magazine both identified hybrid consumer-institutional platforms as a distinct structural
              advantage for companies like Age of Learning, as the dual-channel model reduces dependence on any single
              payer type.
            claimRefs:
              - CM007
              - CM008
              - CM011
              - CM012
              - CM013
              - CM014
              - CM019
              - CM020
