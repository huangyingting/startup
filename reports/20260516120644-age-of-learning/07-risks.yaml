  - id: TR004
    title: Risk Mitigation and Kill Criteria
    notes: >-
      Kill criteria represent thesis-breaking events, not normal operating risk. Thresholds are illustrative
      and should be calibrated with portfolio monitoring tools. Trigger monitoring should commence immediately
      upon investment close and be reviewed quarterly with the company's board observer seat.
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Action Implication
    rows:
      - - FTC Regulatory Recurrence
        - FTC investigation notice or new consumer complaint filing
        - Any formal FTC contact post-consent order expiration
        - Pause investment process; engage regulatory counsel immediately
      - - Consumer Subscriber Attrition
        - ABCmouse active subscriber count falls below 3 million
        - Public reporting or data room showing 40% or greater decline from 2023 base
        - Re-underwrite revenue growth; reduce entry price materially or exit
      - - AI Tutoring Displacement
        - Khanmigo or GPT-4 free tutoring exceeds 10 million K-8 users
        - Major free AI tutor reaches ABCmouse addressable age range at scale
        - Trigger re-underwrite of revenue growth assumptions; stress test churn model
      - - Financial Distress or Down Round
        - New funding at valuation below $1.5 billion implied
        - Any secondary or primary transaction below $1.5B implied valuation
        - Thesis break; exit or restructure position before further dilution
      - - COPPA or Data Breach Event
        - News report or regulatory inquiry involving Age of Learning data
        - Any material data breach or COPPA violation allegation published
        - Immediate legal review; potential thesis break if enforcement action follows
    claimRefs:
      - CR001
      - CR016
      - CR022
