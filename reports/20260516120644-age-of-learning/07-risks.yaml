company:
  name: Age of Learning
chapter:
  number: 7
  title: Risk Assessment
  letter: R
  summary: >-
    Age of Learning faces a layered risk profile anchored by a 2020 FTC $10M consent order that remains a live
    compliance obligation, COPPA/FERPA/SOPIPA data-privacy requirements for child-directed platforms, and rapidly
    evolving federal and state children's privacy legislation. Competitive displacement by free platforms (YouTube
    Kids, Khan Academy) and emerging AI tutors (Khanmigo, ChatGPT) threatens the subscription model at its core,
    compounded by post-COVID subscriber attrition and a $3B 2021 valuation that implies 15-20x revenue multiples
    far above current 3-8x market comparables. Operational risk concentrates in founder-CEO key-person dependency,
    undisclosed cybersecurity certifications, and Apple/Google App Store platform fee drag; combined, these factors
    establish material diligence gaps that must be resolved before any investment decision can be underwritten with
    confidence.

sections:
  - id: section-regulatory-legal
    title: Regulatory and Legal Risk
    body: >-
      Age of Learning's most concrete adverse legal fact is the September 2020 FTC settlement: the company paid
      $10 million and entered a consent order requiring clear subscription cancellation flows and prohibiting
      unauthorized charges to consumers. The consent order remains active and creates ongoing compliance obligations
      that are unusual for a consumer software company at this stage. Any future violation—even inadvertent—would
      trigger a contempt proceeding or new enforcement action, potentially carrying civil penalties of up to
      $50,120 per violation per day under COPPA as currently enforced.

      COPPA requires operators of child-directed digital services to obtain verifiable parental consent before
      collecting personal information from children under age 13. For ABCmouse, this encompasses account
      registration, learning progress data, device identifiers, and behavioral signals—all categories that the
      FTC closely monitors for COPPA compliance. FERPA prohibits educational agencies from disclosing student
      education records without parental consent, and Age of Learning's school partnerships (ABCmouse for Schools,
      10,000+ classrooms) place it within FERPA's orbit for school-collected data. SOPIPA further prohibits using
      student data from school partnerships for targeted advertising or profiling.

      Federal legislative risk is rising: the Kids Online Safety Act (KOSA) was reintroduced in the US Senate in
      2024 and, if passed, would impose new content recommendation restrictions, data minimization requirements,
      and duty-of-care obligations on platforms serving minors. Several states—California, Virginia, and Colorado—
      have enacted or are advancing children's online privacy laws that layer compliance obligations beyond COPPA.
      The cumulative regulatory exposure for Age of Learning is substantial: each new law potentially requires
      product changes, new DPA agreements with school partners, and legal review of data flows, all at ongoing cost.
      The App Store antitrust dimension—Epic v. Apple litigation and EU Digital Markets Act—could alter the
      subscription fee and distribution framework Age of Learning depends on for mobile revenue, though the
      operational impact is indirect compared to the COPPA/FTC risk axis.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
