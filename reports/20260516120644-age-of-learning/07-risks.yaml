  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: financial metrics and subscriber data
      missingEvidence: >-
        Age of Learning does not publicly disclose audited financial statements, revenue, ARR,
        gross margin, subscriber counts, or churn rates. All financial metrics used in this
        chapter are third-party estimates or inferred from industry benchmarks.
      whyItMatters: >-
        Without verified financial data, the investment thesis cannot be underwritten with
        confidence. Revenue trajectory, margin profile, and subscriber retention are all
        critical inputs to valuation and cannot be assessed from public sources.
      diligencePath: >-
        Request data room access including audited financials for the past three fiscal years,
        monthly subscriber cohort data, ARR and net revenue retention, gross margin by product
        line, and churn rates by channel (consumer vs. school).
      relatedQuestionRefs:
        - QR010

    - type: private-evidence-only
      severity: material
      topic: FTC consent order compliance status
      missingEvidence: >-
        The current status of Age of Learning's FTC consent order compliance program, including
        third-party compliance audits, cancellation flow testing, and FTC correspondence, has
        not been publicly disclosed.
      whyItMatters: >-
        The 2020 FTC consent order is the most material adverse legal fact about Age of Learning.
        Any violation or near-violation would constitute a thesis-breaking event. Investors cannot
        assess compliance quality without accessing the company's internal compliance documentation.
      diligencePath: >-
        Request consent order compliance audit reports, FTC correspondence log since 2020,
        cancellation flow testing records, and documentation of any FTC inquiries or
        communications since the settlement date.
      relatedTableRefs:
        - TR001
      relatedQuestionRefs:
        - QR001

    - type: missing-source
      severity: material
      topic: cybersecurity certifications and incident history
      missingEvidence: >-
        No public SOC 2 Type II certification, penetration test results, or independent
        cybersecurity assessment has been disclosed for Age of Learning. No history of prior
        cybersecurity incidents at the company is publicly available.
      whyItMatters: >-
        Age of Learning holds children's personal data under COPPA, creating heightened
        breach exposure. Without third-party security certification, the cybersecurity risk
        posture cannot be assessed and the probability of a COPPA-aggravated breach event
        cannot be reduced to an acceptable level for investment.
      diligencePath: >-
        Request SOC 2 Type II Type report, most recent penetration test executive summary,
        incident response plan, and disclosure of any security incidents since 2020 that
        required COPPA notification or regulatory disclosure.
      relatedQuestionRefs:
        - QR014
        - QR030

    - type: enumeration-incomplete
      severity: material
      topic: COPPA and FERPA compliance documentation
      missingEvidence: >-
