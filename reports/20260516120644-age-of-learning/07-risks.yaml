        school DPA templates, SOPIPA compliance processes, or FERPA data use restriction
        policies for school-collected data. A comprehensive compliance comparison with peer
        EdTech companies is not possible from public sources alone.
      whyItMatters: >-
        The regulatory risk chapter cannot be fully underwritten without documentation of
        compliance controls, DPA agreement terms, and the scope of data collection practices
        across ABCmouse, Adventure Academy, and school partnerships.
      diligencePath: >-
        Request COPPA compliance program documentation, school DPA agreement template,
        SOPIPA compliance policy, data use restriction policies, and any state AG
        correspondence regarding children's privacy compliance.
      relatedQuestionRefs:
        - QR025

    - type: private-evidence-only
      severity: minor
      topic: executive succession planning
      missingEvidence: >-
        No board-level CEO succession plan, executive retention program, or governance framework
        for founder transition has been publicly disclosed by Age of Learning.
      whyItMatters: >-
        Doug Dohring's 18-year founding CEO tenure creates concentrated key-person dependency.
        The absence of a disclosed succession plan makes it impossible to assess the company's
        continuity planning or governance maturity relative to institutional investor expectations.
      diligencePath: >-
        Request board succession plan documentation, executive retention agreements, and
        governance framework including board composition, committee structure, and
