callouts:
  - calloutType: risk
    title: FTC Consent Order Recurrence Is the Highest-Probability Regulatory Trigger
    body: >-
      The 2020 FTC $10 million settlement and active consent order represent the single most material
      adverse legal fact about Age of Learning. Any recurrence—even a technical violation of the order's
      subscription cancellation or disclosure requirements—would trigger FTC contempt proceedings or a
      new enforcement action with COPPA civil penalty exposure of up to $50,120 per violation per day.
      The FTC has increased COPPA enforcement activity since 2022, and Age of Learning remains a named
      prior violator. Investors must obtain full compliance program documentation and third-party audit
      confirmation before closing any position.
    claimRefs:
      - CR001
      - CR002
      - CR004
      - CR005
  - calloutType: insight
    title: Post-COVID Subscriber Attrition Trajectory Mirrors Broader EdTech Correction
    body: >-
      ABCmouse's subscriber peak of approximately 10 million during the COVID-19 pandemic has contracted
      to an estimated 4-6 million by 2023—a 40-60% decline consistent with industry-wide post-pandemic
      cohort decay. This trajectory mirrors Chegg's 95% stock decline driven by subscriber loss and AI
      competition. The pattern suggests that ABCmouse's COVID-era cohort had lower structural retention
      than pre-pandemic users, and that the platform may be entering a sustained attrition phase unless
      it can differentiate from free alternatives or convert AI capabilities into measurable learning
      advantage. The 6-year maximum customer lifetime in the 2-8 age range further constrains LTV math
      and creates a continuous acquisition treadmill.
    claimRefs:
      - CR011
      - CR012
      - CR016
      - CR018
      - CR042
  - calloutType: recommendation
    title: Establish Investment Diligence Kill Criteria Before Committing Capital
    body: >-
      Given the combination of FTC regulatory history, post-COVID subscriber attrition, $3B implied
      valuation at 15-20x current estimated revenue, undisclosed financial metrics, and founder CEO
      key-person concentration, this investment carries above-average diligence requirements. Before
      any commitment, investors should obtain audited financials with subscriber and ARR trends,
      SOC 2 Type II certification or equivalent, FTC consent order compliance documentation, and
      a board-level succession plan. Thesis-break triggers should be codified: any new FTC contact,
      subscriber count below 3 million, new primary funding below $1.5B implied valuation, or confirmed
      data breach involving children's data should trigger immediate investment thesis re-evaluation.
    claimRefs:
      - CR001
      - CR022
      - CR024
      - CR036
      - CR037

