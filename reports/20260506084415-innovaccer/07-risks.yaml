callouts:
  - title: Epic Cosmos Is the Dominant Long-Term Risk
    body: >-
      No single competitive or regulatory risk is more consequential than Epic Cosmos's expanding native analytics
      capabilities. For the 38% of US hospitals on Epic, Innovaccer faces structural disintermediation unless it can
      continuously demonstrate AI and multi-vendor capabilities that Epic cannot match. The KLAS Best in KLAS score and
      switching cost moat provide 3-5 years of runway, but the trajectory is adverse.
    calloutType: risk
    claimRefs:
      - CR012
      - CR009
  - title: CMS PA Rule Is Both Opportunity and Threat
    body: >-
      The January 2026 CMS Prior Authorization Rule creates immediate tailwind for Sara PA adoption while simultaneously
      mandating baseline PA automation as a standard EHR feature. Innovaccer must use the compliance deadline to win
      deals before the commodity floor eliminates the premium, then differentiate Sara PA on analytics depth and
      multi-payer integration that EHR-native tools cannot match.
    calloutType: recommendation
    claimRefs:
      - CR004
      - CR005
      - CR029
  - title: The Change Healthcare Lesson Applies Directly to Innovaccer
    body: >-
      The 2024 Change Healthcare cyberattack demonstrated that healthcare data intermediaries are systemic attack
      targets. Innovaccer's PHI custody for 130+ health systems creates an analogous risk profile. HITRUST certification
      and SOC 2 Type II are necessary but not sufficient — the company must demonstrate response readiness and business
      continuity planning equivalent to the sector's highest cybersecurity standards.
    calloutType: risk
    claimRefs:
      - CR020
      - CR021
