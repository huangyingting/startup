      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
      status: answered
    - id: QR003
      question: >-
        What are the litigation risks Innovaccer faces as a healthcare data platform processing PHI for 130+ health
        systems?
