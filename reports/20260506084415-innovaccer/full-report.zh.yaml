      - number: '3.3'
        title: Epic Cosmos 竞争威胁与护城河分析
        blocks:
          - type: paragraph
            body: >-
              对 Innovaccer 来说，结构上最重要的竞争威胁是 Epic Cosmos：这是一个覆盖 260M+ 患者的去标识化患者数据网络，可原生提供给 Epic 在美国医院市场 38% 份额的客户
              [CP005][CP007]。医疗 IT 分析师认为，Epic Cosmos 对独立分析厂商构成生存级威胁，因为 Epic 医疗系统越来越能在不签单独数据平台合同的情况下处理 PHM 用例
              [CP006][CP030]。


              Innovaccer 的反制是多 EHR 价值主张——美国 62% 使用非 Epic EHR 的医院（Cerner/Oracle、MEDITECH、Allscripts）是 Innovaccer
              集成优先路线最自然的目标 [CP007]。此外，横跨多个 EHR 厂商的多 EHR 整合交付网络（IDNs）不能只依赖 Epic Cosmos，因为后者要求源系统是 Epic [CP010][CP011]。


              Innovaccer 抵御 Epic 和其他去中介化者的护城河包括：高转换成本（KLAS 估计每次迁移成本 $500K-$2M）、Innovaccer 数据湖中累积的专有纵向患者数据、KLAS Best in
              KLAS 品牌资产，以及随规模提升 AI 模型质量的数据飞轮 [CP017][CP018][CP032][CP033]。Sara AI copilot 细分市场的保护显著更弱——Sara Scribe 所处的
              AI 文档市场中，Epic 集成的 Abridge 和 Nuance DAX 有结构性优势，转换成本也更低 [CP019][CP020][CP034]。
            claimRefs: []
