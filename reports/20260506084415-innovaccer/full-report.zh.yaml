      - number: '3.4'
        title: 竞争定位总结
        blocks:
          - type: paragraph
            body: >-
              截至 May 2026，Innovaccer 的竞争位置可以概括为：（1）品类内最强的临床 KLAS 分数 [CP009][CP033]；（2）最适合多 EHR IDNs 和非 Epic 医疗系统；（3）在
              Epic 主导的医疗系统中，最暴露于 Epic Cosmos 去中介化 [CP030]；（4）药房分析（PQS）提供几乎无人争夺的细分市场；（5）CRM / 触达与 Salesforce 有重叠，但
              Innovaccer 的临床数据深度优势使风险可控 [CP011][CP023]。


              客户评价显示，实施复杂度和高成本是主要竞争软肋——Health Catalyst 和 Arcadia 在竞争销售周期中会主动使用这些话术 [CP015][CP016]。Innovaccer 典型企业销售周期为
              9-18 个月，合同规模 $5-15M；这为较小竞争对手设置了明显门槛，但也拖慢 Innovaccer 自身在中端市场的增长 [CP013][CP027]。
