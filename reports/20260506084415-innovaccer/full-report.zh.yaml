              仅以 $130M ARR 在 Q4 2024 实现现金流转正，是医疗 SaaS 的前 10% 成绩。多数可比公司需要 $250M+ ARR
              才能盈亏平衡。这说明公司要么具备高效离岸成本结构，要么优化了营运资本（递延收入加速），也会成为有意义的 IPO 叙事差异点。
