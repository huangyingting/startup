  foundingLocation: San Francisco, CA
  headquarters: San Francisco, CA
  productSummary: >
    Innovaccer 的核心产品是 Data Activation Platform（DAP），这是一层 FHIR 原生数据基础设施，可从 50+ EHR 连接器摄取、标准化并去重患者数据，覆盖 Epic、Oracle Cerner
    和 athenahealth 等系统。DAP 之上是 Sara AI 套件——2024 推出的四个 AI 工具：Analytics Copilot（基于患者数据的 NLQ）、Scribe（环境式临床文档）、Care
    Manager（AI 护理缺口优先级排序）和 Prior Authorization（自动化 PA 流程）。2024 的两笔收购扩展了平台：Cured（患者触达 CRM）和 PQS（药房质量分析）。这套全栈平台靠深度 EHR
    集成和难以复制的纵向数据建立转换成本。
  customerFocus: >
    美国大型医疗系统、整合交付网络（IDNs）、联邦合格健康中心（FQHCs）和价值医疗组织。关键客户包括美国前 10 大医疗系统中的 6 家、Kaiser Permanente、Banner Health、San Mateo 和
    Alameda 县医疗系统，以及 Abu Dhabi DoH。
  businessModel: >
    DAP 平台采用 SaaS 订阅，按 per-member-per-month（PMPM）或床位定价；Sara AI 工具和收购产品（Cured CRM、PQS
    药房分析）按模块定价。实施带来专业服务收入；多年期企业合同形成高转换成本。
  stage: Series F
  fundingStatus: Series A–F 累计融资 $675M；Series F 后估值 $3.45B（Jan 2025）；Q4 2024 现金流转正。
