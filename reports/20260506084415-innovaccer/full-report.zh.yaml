  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与数据底座
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 的技术判断建立在 Data Activation Platform（DAP）之上：这是一层 FHIR R4 原生医疗数据集成层，可把来自异构
              EHR、理赔、实验室、药房和设备来源的患者记录统一起来 [CE001]。Unified Patient Record（UPR）位于核心，使用概率匹配和确定性匹配算法，在 150+ EHR
              连接器之间去重患者身份，形成不依赖任何单一 EHR 系统的纵向患者记录 [CE002]。相比 Epic Cosmos 这类 EHR 原生方案——只能从 Epic 装机系统取数——这种多源数据聚合是
              Innovaccer 最主要的技术差异化 [CE019]。


              DAP 数据模型同时处理结构化数据（FHIR 资源、HL7 CCD/CDA、理赔数据）和非结构化临床笔记；后者通过专有 NLP 管线处理约 15-20 种文档类型，并使用基于 transformer
              的临床语言模型 [CE003][CE014]。主要 EHR 集成（Epic、Oracle Health）上的 FHIR 数据完整度估计为 80-90%，2025 目标为 95% [CE019]。平台部署在 AWS
              上，提供 99.9% 可用性 SLA、HITRUST 认证、SOC 2 Type II，以及面向企业数据隔离要求的多区域部署能力 [CE007][CE008][CE020]。
            claimRefs: []
