  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 自 2014 以来通过六轮私募股权融资累计约 $675M，最终在 January 2025 Series F 达到 $3.45B 投后估值 [CI004]。Series F 由 B
              Capital Group 领投——这家聚焦医疗的风险投资公司由 Eduardo Saverin 共同创立——Kaiser Permanente Ventures、Danaher
              Ventures、Generation Investment Management、Banner Health Ventures 和 Microsoft 的 M12 基金参投
              [CI002]。财团的战略质量值得注意：Kaiser Permanente 是现有客户，Danaher 的诊断背景则说明其兴趣可能超出纯分析，指向平台层面 [CI032]。


              本轮 35% 的二级交易部分（$96M）让早期投资人和员工能按 $3.45B 估值获得流动性，降低公司短期通过 IPO 寻求流动性的压力 [CI003][CI021]。Pitchbook 指出，$3.45B
              估值只比 December 2021 Series E 的 $3.2B 溢价 8%——名义上持平到小幅上升，反映的是 2022-2024 SaaS 倍数压缩环境，而非业务恶化 [CI020][CI031]。
