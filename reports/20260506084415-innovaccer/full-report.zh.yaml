  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 面临多层监管风险：联邦 HIPAA/HHS 要求、FDA 对 AI/ML 医疗器械的监管、CMS 互操作性强制要求，以及州级隐私法。近期最具结构性影响的监管事件是 CMS Prior
              Authorization Final Rule（2026 年 1 月生效）：它一方面为 Sara PA 创造顺风需求，另一方面，一旦 EHR 厂商落地强制电子 PA 标准，基础 PA 自动化就可能被商品化
              [CR004][CR005][CR029]。


              围绕 Sara AI 的 FDA 监管风险目前可控。Innovaccer 的人群健康分析和护理缺口工具，大概率符合 21st Century Cures Act 豁免下的非器械 CDS 定义；但正在成形的 FDA
              SaMD 框架可能把直接影响治疗决策的 AI 工具重新归类，触发需要上市前提交的监管路径，并显著抬高合规开销 [CR001][CR002]。AI 幻觉责任是全行业风险，对 Sara Scribe
              这类临床文档工具尤其尖锐：错误可能导致不良患者结局，并带来医疗过失风险 [CR010]。


              HIPAA 执法风险通过 HITRUST CSF 认证和已记录的 BAA 框架管理，目前没有已知执法行动 [CR003][CR015]。但 2024 年 Change Healthcare
              网络攻击说明，医疗数据中介是高价值勒索软件目标；Innovaccer 为 130+ 家医疗健康系统托管 PHI，形成了系统性目标画像 [CR020][CR021]。HHS 在 2024 年 12
              月发布医疗行业新的网络安全绩效目标，标准自愿但影响力强；即便没有正式执法，不达标也会带来采购风险 [CR007]。2024 年泄露趋势显示，医疗勒索软件事件同比增加 30%，因此网络风险是 Innovaccer
              近期最可能遭遇的不利事件 [CR021]。


              California CMIA 和新兴州级 AI 透明度法律，在联邦 HIPAA 底线之上叠加了多州合规复杂度。Innovaccer 的客户版图正在向美国各州扩展，每个州独特的医疗隐私法规都会增加合规开销
              [CR008][CR024]。HHS 的 HIPAA 商业伙伴要求完全适用于 Innovaccer 位于印度的工程和数据运营团队；处理 PHI 的离岸人员必须达到与美国等同的保护标准
              [CR015][CR031]。
