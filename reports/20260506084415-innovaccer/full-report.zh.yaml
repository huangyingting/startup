      - number: '1.4'
        title: 规模、收入与关键里程碑
        blocks:
          - type: paragraph
            body: >-
              截至 2025 初，Innovaccer 的量化规模包括：服务 130+ 家医疗机构，其中包括美国前 10 大医疗系统中的 6 家 [CO015]；约 1,700–1,800 名员工 [CO016]；ARR
              有望在 2025 年底达到 $250 million [CO013][CO014]；并从 Q4 2024 起现金流转正 [CO017]。公司在五年里维持 50% 的复合年增长率，已经进入全球增长最快的医疗
              SaaS 平台行列 [CO013]。


              2023–2025 的关键里程碑包括：Data Activation Platform 风险分析获 KLAS Best in KLAS 2025（95.9/100 分）[CO024]；Kaiser
              Permanente 战略合作（April 2024）[CO021]；收购 Cured（数字营销 / CRM，2024）和 Pharmacy Quality
              Solutions（药房分析，2024）[CO019][CO020]；推出 Sara AI assistant（HIMSS 2023）和 Sara Scribe 医疗 AI（2024）[CO023]。CEO
              曾表示，公司将在 ARR 达到 $400–$500 million 时 IPO——按当前增速，约对应 2027 [CO018]。
