      - number: '1.5'
        title: 竞争位置与关键风险
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 所处的医疗数据平台市场里，EHR 既有厂商正在加速建设原生分析能力。Epic 的 Cosmos analytics 和 Salesforce Health Cloud（CRM）是
              Innovaccer 关键产品品类中最直接的竞争威胁 [CO028]。Health Catalyst 和 Arcadia 是最接近的全平台竞争对手，但 EHR 集成覆盖更窄
              [CO027]。公司的多垂直战略（医疗服务提供方、支付方、药企、政府）意在降低单一细分市场暴露，不过同时服务四类买方角色，也增加了销售和产品复杂度 [CO033]。


              最主要的长期风险是 EHR 厂商侵蚀：如果 Epic 继续把 Cosmos 扩展到人群健康和分析，已经使用 Epic 的医疗系统可能降低第三方平台优先级。Innovaccer 在 EHR 集成上投入
              $100M+，目前构成护城河；但 Epic 控制源 EHR 数据，理论上可以搭出同等连接能力 [CO006][CO028]。印度离岸工程带来的治理风险，也要求公司持续管理 HIPAA 合规和数据主权
              [CO030]。
            claimRefs:
