      - number: '6.2'
        title: 客户满意度与留存
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 在风险分析中获得 95.9/100 的 KLAS Best in KLAS 2025 分数，是所有医疗分析厂商中最高；详细 KLAS 表现数据显示，整体客户满意度超过
              90%，实施支持评分高于 85% [CU005]。估计 NPS 为 55-70，使 Innovaccer 位于企业医疗软件前四分位 [CU006]。客户选择理由中，KLAS 品牌、多 EHR 覆盖和 VBC
              专业能力稳定排在前三 [CU017]。


              估计年度流失率为 5-10%，主要由医疗系统 M&A 驱动，而不是竞争流失 [CU007]。不过，Healthcare IT News 在 2024 报道，Epic Cosmos 能力提升正在让 Epic
              主导账户出现有意义的流失风险 [CU008]。关键客户投诉——实施延误、首年数据质量问题，以及非技术临床员工学习曲线陡峭——要求公司持续管理满意度 [CU018][CU019]。Gartner Peer
              Insights 上的 Innovaccer 评论一边提出这些批评，一边给出较强整体产品满意度，说明上线之后的满意度明显好于导入体验 [CU014][CU019]。Innovaccer
              的客户支持模式——每个账户配专属实施经理、24/7 生产支持，以及为企业账户配置具名客户成功经理——在 KLAS 和 Modern Healthcare
              调查中高于中位数，代表公司在关系型留存上做了结构性投入，部分缓解导入体验缺口 [CU020][CU026]。高 KLAS 分数、强参考客户和 AI
              产品速度提升结合在一起，形成自我强化的竞争护城河：满意客户成为推荐来源，KLAS 分数则成为企业采购入围资格 [CU017][CU034]。
