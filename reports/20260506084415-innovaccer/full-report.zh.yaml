  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 竞争的是医疗数据平台和人群健康分析市场——这是一个边界较宽的空间，覆盖数据集成基础设施（ETL、数据湖）、分析应用（人群健康、风险分层）、AI 临床工作流工具（事前授权、医疗
              scribe）和患者触达软件 [CM024]。与 Innovaccer 核心业务最相关的市场边界，应定义为健康数据激活与分析：把分散来源的患者数据聚合起来，并支撑下游分析、临床决策支持和 AI 驱动的工作流自动化
              [CM024]。


              Innovaccer 正在扩展的相邻市场包括：（1）医疗 CRM 和患者触达（通过收购 Cured），（2）药房分析（通过收购 PQS），以及（3）临床工作流 AI copilot（Sara
              Scribe、prior authorization 自动化）。这些邻近领域有意义地扩展 TAM，但目前仍次于核心 DAP 业务 [CM012][CM033]。


              Innovaccer 替代的主要现状方案包括 EHR 原生分析（Epic Cogito、Oracle Health）、把数据送入企业 BI 工具（Tableau、Power BI）的手工 ETL
              管线，以及自建数据仓库 [CM024]。从这些替代方案迁移的转换成本很高——通常要 12-24 个月的集成工作——因此 Innovaccer 必须清楚证明 ROI，才能挤掉既有系统 [CM015][CM034]。
