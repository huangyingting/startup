      - number: '7.3'
        title: 战略与运营风险
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 最尖锐的运营风险，是双线 M&A 整合：2024 年同时整合 Cured（CRM）和 PQS（药房分析），还要维持核心平台 R&D 速度并冲击 $250M ARR 目标
              [CR013]。Modern Healthcare 将其标为重大执行风险；整合延误可能拖慢上市协同和客户交叉销售，而这些正是 NRR 扩张论证的基础 [CR013][CR006]。


              关键人风险集中在创始 CEO Abhinav Shashank 和 CTO Sandeep Gupta：两人分别对企业销售可信度和技术路线图执行至关重要 [CR019]。工资通胀和报销压力造成医院财务吃紧，给
              Innovaccer 昂贵的企业合同带来需求侧风险 [CR017]。IPO 估值风险不对称：当前远期 ARR 26x 的倍数下，增长一旦降到 30% 以下，就会触发严重倍数压缩，IPO
              叙事高度依赖收入增长能否守住 [CR016]。投资者与客户重叠（Kaiser、Banner）短期有利于留存，但会制造治理复杂度，IPO 前机构投资者会仔细审视 [CR018]。
