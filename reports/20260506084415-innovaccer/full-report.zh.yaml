              - CV030
              - CV031
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV020
              - CV022
              - CV023
              - CV024
      - number: '8.4'
        title: 附录
        blocks:
          - type: callout
            title: $250M ARR 关口是成败分水岭
            body: >-
              Innovaccer 整个 IPO 论证和 Series F 回报计算，都取决于 2025 年底能否达到 $250M ARR。达到该 ARR 后，估值倍数会从 26.5x（偏高）降至 13.8x（对 50% 增长
              SaaS 来说合理）。若目标缺口超过 20%，熊市情景就会被触发，Series F 会变成水下投资。投资者应把季度 ARR 更新作为持续投入的条件。
            calloutType: risk
            claimRefs:
              - CV001
              - CV002
              - CV008
          - type: callout
            title: KLAS
            body: >-
              KLAS Best in KLAS 2025（95.9/100）与 115-130% NRR 的组合，把 Innovaccer 放在全球企业 SaaS 公司的前十分位。NRR 高于
              115%，意味着在新增客户之前，现有客户的有机扩张每年就能贡献 15%+ ARR 增长。这个复合留存引擎，是溢价倍数的核心理由；在新增客户增长暂时放慢的情景下，它也提供下行保护。
            calloutType: strength
            claimRefs:
              - CV009
              - CV027
          - type: callout
            title: 战略收购是可行退出路径，且有显著溢价
            body: >-
              Microsoft（Nuance 为 10x）、Oracle（Cerner 为 3.7x）和 Salesforce 都完成过大型医疗数据收购。Innovaccer 覆盖 190M+ 名患者的纵向数据集，叠加临床
              AI 技术栈，对任何要搭建医疗垂直的云平台来说，都是有吸引力的战略收购标的。$5-8B 区间的战略退出具备可行性，可降低对 IPO 市场条件作为唯一流动性路径的依赖。
            calloutType: recommendation
            claimRefs:
              - CV012
              - CV028
