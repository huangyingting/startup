              - CV027
              - CV030
      - number: '8.2'
        title: 牛市 / 基准 / 熊市情景分析
        blocks:
          - type: paragraph
            body: >-
              牛市情景（$6-7.5B IPO 估值、Series F 回报 1.7-2.2x、IRR 约 35-48%）要求 Innovaccer 在 2025 年底达到 $250M ARR，并在 2027 年前维持
              30%+ 增长、做到 $400M+ ARR，IPO 定价按 12-15x 远期 ARR [CV006]。这一情景取决于 Sara AI 采用加速成功、Cured/PQS 交叉销售协同兑现，以及 2027 年
              IPO 市场条件有利 [CV024]。Morgan Stanley 和 Goldman Sachs 认为 Innovaccer 符合强势 2026-2027 IPO 候选公司的条件：AI 原生、现金流为正、NRR
              高于 115% [CV023]。


              基准情景（$5B IPO、1.4x 回报、IRR 约 18%）假设 2025 年 ARR 为 $230M，到 2027 年增长至 $350M，并按 10x 远期 ARR 倍数定价，反映更温和的 IPO 市场定价
              [CV007]。熊市情景会让 Series F 投资者亏损：Epic 去中介化导致增长同比降至 20%，2027 年 ARR 为 $290M，6-8x 倍数对应 $2.3-3.1B IPO 价值，低于
              $3.45B 入场价 [CV008]。


              各情景的期望值略偏正面：牛市情景 IRR 为 30-48%，基准情景 18%，熊市情景为负；对高确信度、持有期 2-3 年的医疗 AI 投资者来说，风险 /
              回报匹配，但情景区间很宽，反映执行高度集中——Innovaccer 的增长率轨迹是唯一主导价值驱动因素 [CV032]。Innovaccer 在 2024 年 Q4
              实现现金流为正，是重要的正面信号；它消除了被迫稀释风险，显著降低最差情景发生概率 [CV014]。
            claimRefs: []
          - type: table
            tableRef: TV002
