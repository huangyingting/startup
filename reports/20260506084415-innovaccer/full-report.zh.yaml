              $3.45B Series F 估值只比 2021 Series E 的 $3.2B 高 8%——但这反映的是 2022-2024 SaaS 倍数压缩 30-50%，而不是业务表现不佳。同期 Innovaccer
              ARR 从约 $65M 翻倍至约 $130M，但倍数从约 49x 收缩至约 26x。如果倍数稳定在 15-20x，持续 50% 增长将在 IPO 时对应 $4-8B 估值。
