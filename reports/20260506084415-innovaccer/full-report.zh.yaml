      - number: '4.3'
        title: 单位经济与盈利路径
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 估计毛利率为 60-70%，低于纯软件基准，但符合实施较重的企业医疗 SaaS 平台特征 [CI011][CI012]。工程团队重度离岸（约 70% 的 1,700-1,800 名员工在
              India），使绝对成本基数更低，也推动公司在 Q4 2024 达成现金流转正里程碑 [CI014][CI005]。这一成就很重要——在 $100-150M ARR 阶段实现盈利的数字医疗公司不到
              10%，多数要到 $200M 规模之后 [CI033]。


              大型医疗系统交易的估计 LTV/CAC（15-25x）很强，受高转换成本和新模块采用带来的扩张收入驱动 [CI015]。净收入留存估计为 115-130%，与平台交叉销售动能一致（AI
              copilot、CRM、药房）[CI013]。运营成本结构——R&D 约 35-40%，S&M 约 30-35%，G&A 约 10-15%——意味着在 $130-150M ARR 规模上，基于 ARR
              的运营费用覆盖可能接近盈亏平衡 [CI029]。
