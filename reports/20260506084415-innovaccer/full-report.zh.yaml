  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户规模与增长
        blocks:
          - type: paragraph
            body: >-
              截至 2025 初，Innovaccer 服务 130+ 家医疗机构，客户中包括按患者量计美国前 10 大医疗系统中的 6 家 [CU001]。客户数量从 2024 初的约 100 家增至 January
              2025 的 130+ 家，12 个月内净客户数增长约 30% [CU022]。美国 400-600 家 200 床以上医疗系统构成可触达企业市场，意味着 Innovaccer 已拿下其中
              20-30%，仍留下有意义的空白可继续增长 [CU028]。


              2024 重要客户赢单包括 Banner Health（30+ 家医院，同时也是 Series F 投资人），以及 Abu Dhabi Department of Health 国际部署扩展，覆盖 3
              million 名居民 [CU002][CU013]。获客主要靠直销团队面向 C-suite 医疗系统领导者，20-30% 管线来自客户转介绍 [CU016]。公司的客户成功职能通过专属实施经理，以及为 $2M
              ACV 以上账户配置客户成功经理来支持留存 [CU020]。
