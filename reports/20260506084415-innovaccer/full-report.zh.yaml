      - number: '2.2'
        title: 市场规模与增速分析
        blocks:
          - type: paragraph
            body: >-
              多家分析机构估计，2024 全球医疗分析市场规模为 $45–53 billion，并预计到 2028-2033 达到 $93–193 billion；区间很宽，反映各家对市场范围的假设差异巨大
              [CM001][CM016]。MarketsandMarkets 的估计（$44.8B，24.6% CAGR）隐含更乐观的 AI 驱动扩张；Grand View Research 的估计（$53B，14.85%
              CAGR）则更保守 [CM002][CM003]。市场规模估算差异较大，应作为方向性判断：Innovaccer 将数据激活、人群健康和 AI copilots 组合起来，其真实 TAM 很可能落在这些极端值之间
              [EG202]。


              美国特定的人群健康管理市场在 2024 约为 $26–30 billion，CAGR 为 15-20% [CM004]。McKinsey 估计医疗 AI 在美国每年最高可创造 $1 trillion
              潜在价值，但其中很大一部分来自更长周期的自主临床 AI，而非近期分析平台 [CM005]。


              Innovaccer 的可服务可得市场（SAM）集中在美国医疗系统、ACOs、支付方、药企和政府，估计为 $8–12 billion [CM011]。这一 SAM 有结构性顺风支撑：ACO 项目覆盖 13
              million 人群，带来 PHM 分析需求 [CM008][CM035]；64% 医疗领导者预计 2025 VBC 收入上升 [CM009]；prior authorization 自动化强制要求于
              January 2026 生效 [CM020]。美国医疗 IT 分析和 AI 支出每年增长 18-22%，而整体医疗 IT 为 7-9% [CM010]。
