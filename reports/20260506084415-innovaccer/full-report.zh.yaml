      - number: '1.3'
        title: 融资、估值与投资人格局
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 于 January 9, 2025 宣布 Series F，融资 $275 million，结构包含一级资本和给早期投资人的二级流动性 [CO007]。该轮约 35% 用于为种子轮和
              Series A 投资人提供退出——这种结构说明公司尚未准备好完整 IPO，但希望兑现早期利益相关方承诺 [CO007]。一级投资对应的投后估值约为 $3.45 billion [CO008]。


              自 December 2021 Series E（$3.2 billion）以来，估值轨迹基本持平，这一点值得关注：尽管收入年增长 50%，Innovaccer 的企业价值在 37 个月里名义上几乎没有变化
              [CO012]。这更多反映 2022–2024 医疗 SaaS 倍数在高利率和成长股重估下普遍压缩，而不是公司自身表现不佳。Modern Healthcare 在 December 2024
              提到这一动态，也提出医疗数据平台品类能否在更友好的宏观环境里重新定价的问题 [CO029]。


              Series F 投资人带来的战略背书与资金同样重要：Kaiser Permanente（美国头部医疗系统和保险方）与 Danaher Corporation（生命科学仪器）提供分销触达和商业可信度
              [CO009][CO021][CO022]。公司累计融资约 $675 million，历轮投资人包括 Tiger Global、Mubadala、OMERS、B Capital 和 Microsoft M12
              等机构 [CO010][CO034]。
