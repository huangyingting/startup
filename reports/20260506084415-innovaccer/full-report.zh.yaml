      - number: '5.2'
        title: AI 产品套件——Sara 与智能体路线图
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 的 AI 战略通过 Sara 产品家族展开：Sara Analytics Copilot（由 LLM 驱动的自然语言人群健康查询）、Sara Scribe（环境式 AI 医疗文档，May
              2024 推出）、Sara Care Manager（AI 优先级排序的护理缺口触达）和 Sara PA（事前授权 AI 自动化，August 2024 推出）[CE004][CE006][CE025]。2024
              的五个重大产品发布显示出很高的产品速度 [CE025]。


              2025 在 HIMSS 展示的路线图以智能体 AI 为中心——AI agent 可主动识别高风险患者、发起触达并在无人触发下升级处理 [CE018]。这比当前 copilot
              辅助范式前进了一大步，但也带来临床风险，以及围绕护理场景中自主 AI 行动的监管复杂度。相较 Epic 原生 Abridge，Sara Scribe 有一个关键结构劣势：Innovaccer 的 scribe
              作为外部应用运行，需要切换上下文；Abridge 则嵌在 Epic EHR UI 中 [CE023]。更宽的 AI 套件相较 Microsoft 支持的 Nuance DAX，没有披露技术锁定差异化
              [CE024]。
