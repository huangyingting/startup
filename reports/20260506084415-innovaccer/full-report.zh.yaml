      - number: '6.3'
        title: 客户扩张与收入集中度
        blocks:
          - type: paragraph
            body: >-
              KLAS 数据显示，40-50% Innovaccer 客户已扩展到初始模块之外，多模块客户的满意度和留存显著更高 [CU015]。典型扩张路径是从 DAP
              核心分析出发，走向护理管理、CRM（Cured），最后在 3-5 年旅程中扩展到 AI copilot——每一步扩张都会增加 $500K-$3M 年合同价值 [CU014]。NRR 115-130%
              主要由模块扩张、患者人群增长触发（PMPM 定价）和新增 ACO 项目驱动，而不是现有模块涨价 [CU032]。五阶段客户旅程（RFP、签约、EHR 连接、上线、扩张）从最初询问到完整企业部署通常跨越 12-24
              个月 [CU027]。


              客户集中度风险中等：估计没有单一客户超过总收入 10%，130+ 账户基础提供了分布 [CU021]。战略投资人和客户重叠（Kaiser Permanente、Banner Health、Generation
              IM）让关键账户激励一致，降低这些账户的短期商业流失暴露 [CU035]。国际收入（Abu Dhabi DoH）目前占 ARR 不到 5%，但也是政府医疗细分市场的增长向量
              [CU024]。医疗服务提供方与支付方比例（85-90% 医疗服务提供方、10-15% 支付方）意味着 Innovaccer 最大的扩张上行来自其已经站稳脚跟的企业医疗服务提供方市场，其次是通过 PQS
              进入药房质量项目 [CU033]。
