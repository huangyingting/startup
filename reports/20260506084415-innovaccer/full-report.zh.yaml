      - number: '4.4'
        title: IPO 路径与估值语境
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 目标在 $400-500M ARR 时 IPO；管理层估计，如果当前增速延续，公司将在约 2027 达到这一水平 [CI006]。投行共识（Goldman Sachs、Morgan
              Stanley）认为，2026-2027 成功的医疗 SaaS IPO 门槛是 $300M+ ARR 且增长 30%+ [CI023]。以 $3.45B 估值和 $250M ARR 计算，远期倍数约
              13.8x，落在高增长医疗 SaaS 10-20x 基准区间内 [CI016][CI028]。


              关键估值风险是增长放缓：Health Catalyst（最接近的上市可比公司）因增速较慢，仅按 1-2x 收入交易，说明市场会严厉折价无法维持 >30% 增长的医疗分析公司 [CI017]。如果
              Innovaccer 在 $250M ARR 规模后增速降至 30-40%，当前 26x 历史 ARR 的私募倍数会显著压缩 [CI016][CI019]。
