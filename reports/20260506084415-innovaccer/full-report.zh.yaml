      - number: '7.2'
        title: 竞争与技术风险
        blocks:
          - type: paragraph
            body: >-
              Epic Cosmos 去中介化，是概率最高的结构性竞争风险。Epic 原生去标识化分析网络覆盖 260M+ 名患者；对使用 Epic 的 38% 美国医院来说，第三方分析因此变得可选 [CR012]。KLAS
              数据证实，这是真实且正在扩大的市场迁移，不是假设情景 [CR012]。Epic 收紧 API 的动作进一步放大风险，可能降低 Innovaccer 在 Epic 客户中的数据完整性 [CR009]。


              技术集中度风险包括：依赖 AWS 基础设施（一次重大 AWS 宕机会同时影响全部 130+ 个客户环境）、Sara AI 依赖 OpenAI/Azure API（模型提供商变更可能打断产品功能），以及 EHR
              API 政策风险（Epic 或 Oracle 限制 API）[CR028][CR009]。Databricks、Snowflake 和 Microsoft Fabric
              带来的横向云平台商品化，眼下还不是直接威胁；但在 5-10 年尺度上，如果医疗系统把通用云基础设施上的自有数据工程能力建起来，它会成为结构性风险 [CR032]。
