      - number: '5.4'
        title: 安全、合规与技术风险
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 的合规姿态——HIPAA、SOC 2 Type II、HITRUST CSF——满足企业医疗买方要求 [CE007]。平台访问 PHI 的范围很广，确实会给医疗系统 IT 团队带来持续
              HIPAA 审计负担，这是一项已知运营复杂度 [CE021]。AWS 基础设施集中构成技术依赖风险；公司没有公开阐述多云战略 [CE008][CE024]。


              关键技术风险包括 Sara AI 功能依赖外部 LLM 供应商（OpenAI/Azure OpenAI）——模型供应商变化、成本上升或 API 弃用，都可能冲击 AI 产品套件 [CE024]。EHR 厂商（尤其
              Epic）可能限制第三方 API 访问，过去行业争议中已经发生过类似情况，这会威胁平台的数据完整度基础 [CE019]。800-1,000 名位于 India
              的工程师带来成本优势，但也为美国医疗系统客户引入时区协同负担 [CE022]。
