      - number: '4.2'
        title: 收入模型与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 的收入模型以多年期企业 SaaS 订阅为核心；人群健康模块按 per-member-per-month（PMPM）定价，并辅以年度平台许可和专业服务 [CI008]。公司五年来维持约 50%
              的 ARR 同比增长，2024 初 ARR 约 $130M [CI001]。5 年 ARR CAGR 约 54%（从 2020 的约 $15M 到 2024 的 $130M），使 Innovaccer 进入医疗
              SaaS 增长公司的前 10% [CI030]。


              2025 年底的 $250M ARR 目标要求公司在 12 个月内新增约 $120M 净 ARR——隐含增长加速至约 92% YoY，高于此前稳定轨迹 [CI007][CI018]。Cured 和 PQS
              两笔收购估计合计贡献 $25-45M ARR，这意味着内生 ARR 需要从 $85-105M 增长到至少 $205M（按内生口径）才能达到总目标——仍然是一个有压力的目标
              [CI010][CI007]。收入高度偏向医疗服务提供方侧（医疗系统、IDNs），披露的支付方侧贡献有限 [CI025]。公司离岸工程模式（1,700-1,800 名员工中多数在
              India）带来结构性成本优势，支撑规模化后的利润率改善 [CI014]。
