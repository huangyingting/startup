companyProfile:
  summary: >
    Innovaccer 是一家总部位于 San Francisco 的医疗 AI 公司，由 Abhinav Shashank（CEO）、Kanav Hasija（总裁 / CPO）和 Sandeep Gupta（CTO）于 2014
    创立，三位创始人都曾与 Indian Institutes of Technology（IIT）校友网络有联系。公司切入的是医疗行业长期未解的痛点：患者数据分散在互相竞争的 EHR 系统里。Innovaccer 用 FHIR
    原生统一数据平台（DAP）架在 EHR 层之上，为美国大型医疗系统提供人群健康管理、护理协同和 AI 驱动的临床运营能力。Innovaccer 主要服务美国价值医疗市场，同时在 Middle East（Abu Dhabi DoH）和
    India 扩张。
  foundedDate: '2014-01-01'
  founders:
    - name: Abhinav Shashank
