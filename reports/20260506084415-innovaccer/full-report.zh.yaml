chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与创立历程
        blocks:
          - type: paragraph
            body: >-
              Innovaccer 是一家总部位于 San Francisco 的医疗技术公司，由来自印度顶尖院校的三位联合创始人于 2014 创立：Abhinav Shashank（CEO，IIT
              Kharagpur）、Kanav Hasija（总裁 / CPO，IIT Kharagpur）和 Sandeep Gupta（CTO，IIM
              Ahmedabad）[CO001]。创始团队最初做的是通用企业数据分析平台，卖给美国大学；这段经历沉淀了早期分析能力，后来迁移到医疗场景 [CO005]。


              2017 前后，创始人意识到医疗行业仍处于 Shashank 所说的「前互联网时代」——患者数据锁在互不兼容的 EHR、支付方数据库、实验室系统和药房网络里——于是将整个业务完全转向医疗
              [CO005]。这一步并不常规：公司主动放弃其他垂直行业，去复杂且受强监管的市场里积累深度领域能力。转型需要巨额前置投入：超过 $100 million，并用大约两年与所有主要 EHR
              系统（Epic、Cerner、Athena）做原生集成 [CO006]。这笔基础设施投入形成了竞争对手很难复制的持久护城河。


              公司自 2017 以来的核心判断没有变：AI 改善临床结果之前，医疗机构先需要一层统一、干净、纵向的数据层。Innovaccer 的 Data Activation Platform（DAP）就是这层底座，连接
              EHR、支付方、实验室和药房，拼出单一患者记录 [CO025]。所有分析、人群健康和 AI 应用都跑在 DAP 之上。
            claimRefs:
              - CO001
              - CO005
              - CO006
              - CO025
      - number: '1.2'
        title: 管理团队与治理
        blocks:
          - type: paragraph
            body: >-
              三位创始人——Shashank（CEO）、Hasija（总裁 / CPO）和 Gupta（CTO）——仍在领导公司。对于一家经历过市场波动、已经 10 年的创业公司，这种稳定性并不多见
              [CO001][CO002][CO003][CO004]。Shashank 是主要对外面孔，经常出现在 HIMSS 和 J.P. Morgan Healthcare Conference，也入选过 Inc.
              Magazine 的 35 Under 35 榜单 [CO031]。他在 Wharton 和 Harvard 做数据分析研究的经历，塑造了公司对循证医疗干预设计的重视。


              三位联合创始人的能力互补：Hasija 推动产品路线图和平台战略；Gupta 负责工程，并在 San Francisco、Delhi、Bengaluru 和 Abu Dhabi 的分布式团队中把住技术质量
              [CO016]。公司全球约有 1,700–1,800 名员工 [CO016]。印度工程团队带来显著成本优势，但也需要更严密治理，才能满足美国医疗客户对 HIPAA 合规和数据主权的要求 [CO030]。


              Kaiser Permanente（April 2024 合作）和 Danaher Ventures（Series F）等关键战略投资人不仅提供资本，也带来董事会层面的战略指导，可能降低公司对创始团队的关键人依赖
              [CO021][CO022]。
