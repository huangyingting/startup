callouts:
  - title: The $250M ARR Gate Is the Make-or-Break Milestone
    body: >-
      Innovaccer's entire IPO thesis and Series F return calculation pivots on achieving $250M ARR by end of 2025. At
      that ARR, the valuation multiple drops from 26.5x (stretched) to 13.8x (reasonable for 50% growth SaaS). Missing
      this target by more than 20% activates the bear case and turns Series F into a below-water investment. Investors
      should require quarterly ARR updates as a condition of ongoing commitment.
    calloutType: risk
    claimRefs:
      - CV001
      - CV002
      - CV008
  - title: KLAS
    body: >-
      The combination of KLAS Best in KLAS 2025 (95.9/100) and 115-130% NRR puts Innovaccer in the top decile of
      enterprise SaaS companies globally. NRR above 115% means organic expansion from existing customers contributes
      15%+ ARR growth annually before new logo addition. This compounding retention engine is the core justification for
      the premium multiple and provides downside protection in a scenario where new logo growth temporarily slows.
    calloutType: strength
    claimRefs:
      - CV009
      - CV027
  - title: Strategic Acquisition Is a Viable Exit at Meaningful Premium
    body: >-
      Microsoft (Nuance at 10x), Oracle (Cerner at 3.7x), and Salesforce have all made major healthcare data
      acquisitions. Innovaccer's 190M+ patient longitudinal dataset combined with its clinical AI stack represents an
      attractive strategic acquisition target for any cloud platform building a healthcare vertical. A strategic exit in
      the $5-8B range is plausible and reduces reliance on IPO market conditions as the sole liquidity path.
    calloutType: recommendation
    claimRefs:
      - CV012
      - CV028
