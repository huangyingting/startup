  claims:
    - id: CE001
      statement: >-
        Innovaccer's Data Activation Platform (DAP) is built on a FHIR R4-native architecture that aggregates patient
        data from disparate EHR, claims, lab, and device sources into a unified patient record using 150+ pre-built data
        connectors.
      type: company-claimed
      topic: dap-architecture
      sourceRefs:
        - SE001
        - SE002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
        - QE002
      contradictsClaimRefs: []
    - id: CE002
      statement: >-
        Innovaccer's Unified Patient Record (UPR) uses a proprietary master patient index (MPI) with probabilistic and
        deterministic matching algorithms to de-duplicate patient records across multiple EHR systems, enabling a
        longitudinal patient view across care settings.
      type: company-claimed
      topic: unified-patient-record
      sourceRefs:
        - SE018
        - SE002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QE006
      contradictsClaimRefs: []
    - id: CE003
      statement: >-
        The DAP data model supports both structured clinical data (HL7 FHIR resources, CCD, CDA documents) and
        unstructured clinical notes processed through Innovaccer's NLP pipeline, which extracts clinical concepts,
        problem lists, medications, and risk factors from free-text documentation.
      type: company-claimed
      topic: data-model
      sourceRefs:
        - SE002
        - SE010
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QE013
        - QE019
      contradictsClaimRefs: []
    - id: CE004
      statement: >-
        Innovaccer's Sara AI suite comprises three primary products - Sara Analytics Copilot (natural language querying
        of population health data), Sara Scribe (ambient clinical documentation via AI), and Sara Care Manager
        (AI-assisted care gap prioritization and outreach recommendation).
      type: company-claimed
      topic: sara-ai-products
      sourceRefs:
        - SE003
        - SE004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE004
      contradictsClaimRefs: []
    - id: CE005
      statement: >-
        Sara Analytics Copilot uses large language models (LLMs) to enable natural language queries over population
        health data, allowing care managers to ask plain-English questions (e.g., 'Show me diabetic patients overdue for
        HbA1c in the last 90 days') and receive structured analytics responses.
      type: company-claimed
      topic: sara-analytics-copilot
      sourceRefs:
        - SE003
        - SE019
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QE004
        - QE024
      contradictsClaimRefs: []
    - id: CE006
      statement: >-
        Sara Scribe is Innovaccer's ambient AI medical documentation product that records patient-physician
        conversations, generates structured clinical notes in real time, and allows physician review/editing before EHR
        submission; it launched in commercial availability in May 2024.
      type: observed
      topic: sara-scribe-launch
      sourceRefs:
