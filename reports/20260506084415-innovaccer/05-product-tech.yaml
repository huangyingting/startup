callouts:
  - title: FHIR-Native Multi-EHR Integration Is Innovaccer's Core Technical Moat
    body: >-
      The 150+ EHR connector library and UPR de-duplication engine are the hardest technical assets to replicate — built
      over 10 years of real-world integration work. Data completeness at 80-90% for major EHRs is competitive but not
      perfect; the roadmap toward 95% by 2025 is achievable and important for maintaining the integration quality edge.
    calloutType: strength
    claimRefs:
      - CE001
      - CE002
      - CE019
  - title: Sara AI Scribe Lacks Epic EHR UI Embedding — A Structural Gap
    body: >-
      Sara Scribe competes in a market where Epic-native Abridge has an inherent UI integration advantage. Unless
      Innovaccer achieves a deep Epic EHR embedding (in development), Sara Scribe will remain a context-switching
      application for physicians at Epic-installed health systems, limiting adoption in Innovaccer's largest addressable
      segment.
    calloutType: risk
    claimRefs:
      - CE023
      - CE006
  - title: Agentic AI Roadmap Is Ambitious but Carries Clinical Risk
    body: >-
      Innovaccer's 2025 agentic AI roadmap represents genuine product vision — autonomous AI agents for proactive care
      management could be a significant differentiator. However, autonomous clinical AI actions require FDA regulatory
      clarity (AI/ML-based medical devices), clinical validation, and health system buy-in, all of which will extend the
      timeline to meaningful commercial deployment.
    calloutType: assumption
    claimRefs:
      - CE018
      - CE025
