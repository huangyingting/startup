      topic: nps
      sourceRefs:
        - SU005
        - SU014
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU006
      contradictsClaimRefs: []
    - id: CU007
      statement: >-
        PitchBook and industry analysis suggests Innovaccer's annual customer churn rate is in the range of 5-10% —
        consistent with enterprise healthcare SaaS benchmarks — and is driven primarily by health system
        mergers/consolidations rather than competitive losses.
      type: estimated
      topic: churn-rate
      sourceRefs:
        - SU007
        - SU006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU004
      contradictsClaimRefs: []
