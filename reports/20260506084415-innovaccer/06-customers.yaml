      statement: >-
        Based on KLAS and Gartner Peer Insights data, Innovaccer's estimated Net Promoter Score (NPS) is in the range of
        55-70, placing it in the top quartile of enterprise healthcare software vendors; specific NPS is not publicly
        disclosed.
