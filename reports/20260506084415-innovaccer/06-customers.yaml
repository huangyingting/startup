localEvidence:
  researchQuestions:
    - id: QU001
      question: How many total customers does Innovaccer have as of 2024-2025, and how has that number grown year over year?
      type: quantification
      targets:
        - contentRequirements/0
        - plannedTables/customer-growth-adoption-trajectory-table
      status: answered
    - id: QU002
      question: Which named large health systems (top 10 US) are confirmed Innovaccer customers as of 2024?
      type: enumeration
      targets:
        - contentRequirements/1
        - plannedTables/named-customer-proof-table
      status: answered
    - id: QU003
      question: What is the customer segmentation breakdown by organization type (IDNs, payers, ACOs, government, pharmacy)?
      type: enumeration
      targets:
        - contentRequirements/0
        - plannedTables/customer-segmentation-table
      status: answered
    - id: QU004
      question: What is Innovaccer's estimated customer retention rate and are there known churned or lost accounts?
      type: adverse
      targets:
        - contentRequirements/2
        - plannedTables/retention-repeat-usage-satisfaction-table
      status: answered
    - id: QU005
      question: What specific clinical and financial outcomes have Innovaccer customers achieved that are publicly documented?
      type: verification
      targets:
        - contentRequirements/1
        - plannedTables/named-customer-proof-table
      status: answered
    - id: QU006
      question: >-
        What is the Net Promoter Score (NPS) or equivalent satisfaction metric for Innovaccer from KLAS or third-party
        surveys?
      type: quantification
      targets:
        - contentRequirements/2
        - plannedTables/retention-repeat-usage-satisfaction-table
      status: answered
    - id: QU007
      question: What is Innovaccer's customer concentration risk — what percentage of revenue comes from the top 10 customers?
      type: quantification
      targets:
        - contentRequirements/3
        - plannedTables/expansion-and-concentration-risk-table
      status: answered
    - id: QU008
      question: Is Kaiser Permanente both an investor and a customer of Innovaccer, and what is the scope of the deployment?
      type: verification
      targets:
        - contentRequirements/1
        - plannedTables/named-customer-proof-table
      status: answered
    - id: QU009
      question: >-
        What government or public health agency customers does Innovaccer serve, including Medicaid programs and county
        health systems?
      type: enumeration
      targets:
        - contentRequirements/0
        - plannedTables/customer-segmentation-table
      status: answered
    - id: QU010
      question: >-
        What was the outcome of Innovaccer's deployment at San Mateo County Health and Alameda County, as cited in
        public case studies?
      type: verification
      targets:
        - contentRequirements/1
        - plannedTables/named-customer-proof-table
      status: answered
    - id: QU011
      question: >-
        How does Innovaccer expand revenue within existing customer accounts — what is the typical upsell path from
        initial DAP to full platform?
      type: mechanism
      targets:
        - contentRequirements/3
        - plannedTables/expansion-and-concentration-risk-table
      status: answered
    - id: QU012
      question: What is the typical customer journey and timeline from initial pilot to enterprise-wide deployment?
      type: mechanism
      targets:
        - contentRequirements/4
        - plannedFigures/customer-journey-map
      status: answered
    - id: QU013
      question: >-
        What KLAS data is available on Innovaccer customer satisfaction scores and how do these compare to industry
        norms?
      type: comparison
      targets:
        - contentRequirements/2
        - plannedTables/retention-repeat-usage-satisfaction-table
      status: answered
    - id: QU014
      question: What are the primary reasons customers cite for choosing Innovaccer over competing platforms in RFP processes?
      type: verification
      targets:
        - contentRequirements/4
        - plannedFigures/customer-proof-matrix
      status: answered
    - id: QU015
      question: >-
        What is Innovaccer's go-to-market strategy for customer acquisition — direct enterprise sales, channel partners,
        or health system referral networks?
      type: mechanism
      targets:
        - contentRequirements/3
        - plannedTables/customer-growth-adoption-trajectory-table
      status: answered
    - id: QU016
      question: What is the profile of Innovaccer's most recent notable customer wins (2024-2025)?
      type: freshness
      targets:
        - contentRequirements/0
        - plannedTables/named-customer-proof-table
      status: answered
    - id: QU017
      question: >-
        Are there documented cases where health systems have churned from Innovaccer or expressed public
        dissatisfaction?
      type: adverse
      targets:
        - contentRequirements/2
        - plannedTables/retention-repeat-usage-satisfaction-table
      status: answered
    - id: QU018
      question: >-
        What is the ACO/value-based care customer base breakdown for Innovaccer — MSSP vs Next Generation ACO vs
        commercial VBC?
      type: enumeration
      targets:
        - contentRequirements/0
        - plannedTables/customer-segmentation-table
      status: answered
    - id: QU019
      question: >-
        How many Innovaccer customers have expanded from DAP-only to multi-module deployments including CRM, AI
        copilots, or pharmacy analytics?
      type: quantification
      targets:
        - contentRequirements/3
        - plannedTables/expansion-and-concentration-risk-table
      status: answered
    - id: QU020
      question: What is Innovaccer's customer support model and how does it rate against KLAS and customer review benchmarks?
      type: verification
      targets:
        - contentRequirements/2
        - plannedTables/retention-repeat-usage-satisfaction-table
      status: answered
    - id: QU021
      question: >-
        What percentage of Innovaccer's customers are in states with strong Medicaid managed care analytics requirements
        versus states without?
      type: quantification
      targets:
        - contentRequirements/0
        - plannedTables/customer-segmentation-table
      status: answered
    - id: QU022
      question: >-
        What are the most common reasons health systems delay or cancel an Innovaccer implementation after contract
        signing?
      type: adverse
      targets:
        - contentRequirements/2
        - plannedTables/retention-repeat-usage-satisfaction-table
      status: answered
    - id: QU023
      question: What international customers does Innovaccer serve and what is the international revenue mix?
      type: quantification
      targets:
        - contentRequirements/0
        - plannedTables/customer-segmentation-table
      status: answered
    - id: QU024
      question: >-
        What clinical quality improvements have banner customer deployments demonstrated in the VBC programs supported
        by Innovaccer?
      type: verification
      targets:
        - contentRequirements/1
        - plannedTables/named-customer-proof-table
      status: answered
    - id: QU025
      question: >-
        What are the most common expansion triggers that cause an existing Innovaccer customer to add new modules or
        expand seats?
      type: mechanism
      targets:
        - contentRequirements/3
        - plannedTables/expansion-and-concentration-risk-table
      status: answered
