  claims:
    - id: CU001
      statement: >-
        Innovaccer serves 130+ healthcare organizations as of January 2025, including 6 of the top 10 US health systems
        by patient volume; this represents growth from approximately 100 customers in early 2024.
      type: company-claimed
      topic: customer-count
      sourceRefs:
        - SU001
        - SU002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU001
      contradictsClaimRefs: []
    - id: CU002
      statement: >-
        Banner Health (Arizona-based, 30+ hospitals, 1M+ patients) became a named Innovaccer customer in 2024, signing
        an enterprise data activation platform contract and joining the Series F investor syndicate as Banner Health
        Ventures.
      type: observed
      topic: banner-health-customer
      sourceRefs:
        - SU019
        - SU002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU002
        - QU016
      contradictsClaimRefs: []
