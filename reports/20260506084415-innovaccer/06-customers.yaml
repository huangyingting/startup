callouts:
  - title: 6 of Top 10 US Health Systems Is a Powerful Reference Floor
    body: >-
      Having flagship health systems as reference accounts dramatically shortens evaluation cycles for new enterprise
      prospects. Health system procurement teams heavily rely on peer references, and KLAS survey data confirms that
      peer references are the most cited decision factor. This customer quality advantage compounds as each new top-tier
      customer win becomes a reference for the next.
    calloutType: strength
    claimRefs:
      - CU001
      - CU017
      - CU034
  - title: Epic Cosmos Churn Risk Is Concentrated but Real
    body: >-
      Healthcare IT News and analyst coverage confirm that Epic health systems are increasingly reconsidering
      third-party analytics as Cosmos matures. Innovaccer's exposure is bounded to Epic-installed accounts (~38% of US
      hospitals), but a 5-15% revenue risk from this segment over 3-5 years is a material consideration for IPO
      investors.
    calloutType: risk
    claimRefs:
      - CU008
      - CU022
  - title: Customer-Investor Overlap Creates Aligned Incentives
    body: >-
      The pattern of Innovaccer's largest customers (Kaiser Permanente, Banner Health) participating as equity investors
      creates unusual alignment — these accounts are unlikely to churn while they hold equity stakes. However, this
      structure also raises governance questions about preferential treatment and arm's-length commercial terms.
    calloutType: insight
    claimRefs:
      - CU003
      - CU035
