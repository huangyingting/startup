callouts:
  - title: Epic Cosmos Disintermediation Risk Is Real But Bounded
    body: >-
      Epic Cosmos represents the highest long-term structural risk to Innovaccer's core market. However, the risk is
      bounded to Epic's ~38% installed base, and multi-EHR health systems remain strongly dependent on third-party data
      activation. Innovaccer's risk mitigation lies in deepening its AI layer and expanding to non-Epic segments where
      Epic Cosmos provides no advantage.
    calloutType: risk
    claimRefs:
      - CP005
      - CP006
      - CP007
      - CP030
  - title: KLAS Best in KLAS Score Is a Durable Sales Moat
    body: >-
      Innovaccer's 95.9/100 KLAS score is a 10+ point lead over Health Catalyst and a meaningful enterprise evaluation
      filter. KLAS certification is cited by over 70% of health systems as a primary selection criterion, and a Best in
      KLAS designation typically triggers shortlisting automatically in enterprise RFP processes.
    calloutType: strength
    claimRefs:
      - CP009
      - CP033
  - title: Sara AI Scribe Is Innovaccer's Most Exposed Competitive Flank
    body: >-
      Unlike the data activation platform where switching costs protect Innovaccer, the AI medical scribe market has low
      lock-in. Epic-native Abridge and Microsoft-backed Nuance DAX have structural advantages. Sara Scribe's long-term
      defensibility requires deep integration into Innovaccer's data lake to create unique clinical insights that
      competitors cannot match.
    calloutType: risk
    claimRefs:
      - CP019
      - CP020
      - CP034
