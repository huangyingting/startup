  claims:
    - id: CP001
      statement: >-
        Health Catalyst reported full-year 2024 revenue of approximately $300M, primarily from technology and
        professional services, with a publicly traded stock (HCAT) and a market capitalization of approximately
        $400-500M as of early 2025.
      type: observed
      topic: health-catalyst-financials
      sourceRefs:
        - SP001
        - SP002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP002
      contradictsClaimRefs: []
    - id: CP002
      statement: >-
        Health Catalyst's Data Operating System (DOS) is a healthcare-specific data architecture that aggregates
        clinical, financial, and operational data from EHR, claims, and lab systems; the platform serves 500+ acute care
        facilities and 1,000+ community hospitals globally.
      type: company-claimed
      topic: health-catalyst-product
      sourceRefs:
        - SP002
        - SP024
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP002
        - QP016
      contradictsClaimRefs: []
    - id: CP003
      statement: >-
        Arcadia raised a $150M growth equity round in October 2022 at an estimated valuation of approximately $700M,
        focused on accelerating value-based care analytics and ACO reporting capabilities.
      type: observed
      topic: arcadia-funding
      sourceRefs:
        - SP003
        - SP025
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QP003
      contradictsClaimRefs: []
    - id: CP004
      statement: >-
        Arcadia serves over 200 ACO and value-based care organizations across the US, primarily mid-market health
        systems and physician groups, with KLAS scores in the 83-87 range for ACO/VBC analytics tools as of 2024.
      type: third-party-reported
      topic: arcadia-customers
      sourceRefs:
        - SP007
        - SP025
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP003
        - QP014
      contradictsClaimRefs: []
    - id: CP005
      statement: >-
        Epic Cosmos is Epic's native de-identified patient data network containing over 260 million patients from Epic
        client health systems; it enables population analytics and benchmarking entirely within the Epic ecosystem
        without requiring a third-party platform.
      type: observed
      topic: epic-cosmos-scale
      sourceRefs:
        - SP004
        - SP005
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP004
        - QP012
      contradictsClaimRefs: []
    - id: CP006
      statement: >-
        Healthcare IT analysts have identified Epic Cosmos as an existential threat to independent analytics vendors
        like Innovaccer and Health Catalyst, as health systems already on Epic can access native analytics without
        paying separately for a third-party data activation platform.
      type: third-party-reported
      topic: epic-threat
      sourceRefs:
        - SP004
        - SP014
      confidence: high
