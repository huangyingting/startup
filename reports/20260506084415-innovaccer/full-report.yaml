companyProfile:
  summary: |
    Innovaccer is a San Francisco–based healthcare AI company founded in 2014 by Abhinav Shashank (CEO),
    Kanav Hasija (President/CPO), and Sandeep Gupta (CTO), all formerly affiliated with Indian Institutes
    of Technology (IIT) alumni networks. The company was built to solve the chronic problem of fragmented
    patient data across competing EHR systems by creating a FHIR-native unified data platform (DAP) that
    sits above the EHR layer and enables population health management, care coordination, and AI-driven
    clinical operations for large US health systems. Innovaccer operates primarily in the US
    value-based care market, with a growing presence in the Middle East (Abu Dhabi DoH) and India.
  foundedDate: '2014-01-01'
  founders:
    - name: Abhinav Shashank
      role: CEO
      background: IIT Roorkee alumni; healthcare AI entrepreneur; primary enterprise sales leader
      claimRefs:
        - C102
    - name: Kanav Hasija
      role: President and CPO
      background: IIT alumnus; product and go-to-market leader; oversees Sara AI product strategy
      claimRefs:
        - C102
    - name: Sandeep Gupta
      role: CTO
      background: IIT alumnus; heads FHIR architecture and Sara AI engineering; AWS partnership lead
      claimRefs:
        - C102
  foundingLocation: San Francisco, CA
  headquarters: San Francisco, CA
  productSummary: |
    Innovaccer's core product is the Data Activation Platform (DAP), a FHIR-native data infrastructure
    layer that ingests, normalizes, and de-duplicates patient data from 50+ EHR connectors including
    Epic, Oracle Cerner, and athenahealth. On top of the DAP sits the Sara AI suite — four AI tools
    launched 2024: Analytics Copilot (NLQ on patient data), Scribe (ambient clinical documentation),
    Care Manager (AI care gap prioritization), and Prior Authorization (automated PA workflows). Two
    acquisitions in 2024 extended the platform: Cured (CRM for patient engagement) and PQS (pharmacy
    quality analytics). The full-stack platform creates switching costs through deep EHR integration and
    longitudinal data that cannot be easily replicated.
  customerFocus: |
    Large US health systems, integrated delivery networks (IDNs), Federally Qualified Health Centers
    (FQHCs), and value-based care organizations. Key customers include 6 of the top 10 US health systems,
    Kaiser Permanente, Banner Health, San Mateo and Alameda county health systems, and Abu Dhabi DoH.
  businessModel: |
    SaaS subscription with per-member-per-month (PMPM) or per-bed pricing for the DAP platform;
    module-based pricing for Sara AI tools and acquired products (Cured CRM, PQS pharmacy analytics).
    Professional services revenue for implementation; multi-year enterprise contracts with high
    switching costs.
  stage: Series F
  fundingStatus: $675M total raised across Series A–F; $3.45B valuation at Series F (Jan 2025); cash flow positive Q4 2024.
