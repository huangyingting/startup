  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Size and Growth
        blocks:
          - type: paragraph
            body: >-
              Innovaccer serves 130+ healthcare organizations as of early 2025, with 6 of the top 10 US health systems
              by patient volume in its customer base [CU001]. Customer count grew from approximately 100 in early 2024
              to 130+ in January 2025 — representing approximately 30% net customer count growth in 12 months [CU022].
              The addressable enterprise market of 400-600 US health systems over 200 beds implies Innovaccer has
              captured 20-30% of its reachable market, leaving meaningful whitespace for continued growth [CU028].


              Notable 2024 customer wins include Banner Health (30+ hospitals, also a Series F investor) and expansion
              of the Abu Dhabi Department of Health international deployment covering 3 million residents
              [CU002][CU013]. Customer acquisition is primarily direct enterprise sales targeting C-suite health system
              leaders, with 20-30% of pipeline from customer referrals [CU016]. The company's customer success function
              supports retention through dedicated implementation managers and customer success managers for accounts
              over $2M ACV [CU020].
            claimRefs: []
      - number: '6.2'
        title: Customer Satisfaction and Retention
        blocks:
          - type: paragraph
            body: >-
              Innovaccer's KLAS Best in KLAS 2025 score of 95.9/100 in Risk Analytics is the highest for any healthcare
              analytics vendor, and detailed KLAS performance data shows above-90% overall customer satisfaction with
              implementation support rated above 85% [CU005]. Estimated NPS of 55-70 places Innovaccer in the top
              quartile of enterprise healthcare software [CU006]. The customer selection rationale consistently cites
              KLAS brand, multi-EHR breadth, and VBC expertise as top three reasons [CU017].


              Estimated annual churn is 5-10%, driven primarily by health system M&A rather than competitive losses
              [CU007]. However, Epic Cosmos's improving capabilities present a meaningful churn risk specifically in
              Epic-dominant customer accounts, as reported by Healthcare IT News in 2024 [CU008]. Key customer
              complaints — implementation delays, first-year data quality issues, and steep learning curves for
              non-technical clinical staff — create ongoing satisfaction management requirements [CU018][CU019]. Gartner
              Peer Insights reviews for Innovaccer reflect these criticisms alongside strong overall product
              satisfaction, indicating that post-go-live satisfaction is materially better than the onboarding
              experience [CU014][CU019]. Innovaccer's customer support model — dedicated implementation managers per
              account, 24/7 production support, and named customer success managers for enterprise accounts — is rated
              above-median by KLAS and Modern Healthcare surveys, representing a structural investment in
              relationship-based retention that partially mitigates the onboarding experience gap [CU020][CU026]. The
              combination of high KLAS scores, strong reference customers, and improving AI product velocity creates a
              self-reinforcing competitive moat where satisfied customers become referral sources and the KLAS score
              functions as an enterprise procurement shortlist qualifier [CU017][CU034].
            claimRefs: []
      - number: '6.3'
        title: Customer Expansion and Revenue Concentration
        blocks:
          - type: paragraph
            body: >-
              KLAS data suggests 40-50% of Innovaccer customers have expanded beyond the initial module, and
              multi-module customers show significantly higher satisfaction and retention [CU015]. The typical expansion
              path proceeds from DAP core analytics to care management, CRM (Cured), and finally AI copilots over a 3-5
              year journey — each expansion step adding $500K-$3M in additional annual contract value [CU014]. NRR of
              115-130% is driven primarily by module expansion, patient population growth triggers (PMPM pricing), and
              new ACO program additions, rather than price increases on existing modules [CU032]. The five-stage
              customer journey (RFP, contracting, EHR connectivity, go-live, expansion) typically spans 12-24 months
              from initial inquiry to full enterprise deployment [CU027].


              Customer concentration risk is moderate: no single customer exceeds an estimated 10% of total revenue, and
              the 130+ account base provides distribution [CU021]. The strategic investor-customer overlap (Kaiser
              Permanente, Banner Health, Generation IM) aligns incentives for key accounts and reduces near-term
              commercial churn exposure for these accounts [CU035]. International revenue (Abu Dhabi DoH) represents
              less than 5% of ARR today but is a growth vector for the government health segment [CU024]. The
              provider-to-payer ratio (85-90% provider, 10-15% payer) means Innovaccer's expansion upside is largest in
              the enterprise provider market where it is already well-established, and secondarily in pharmacy quality
              programs via PQS [CU033].
            claimRefs: []
      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 6 of Top 10 US Health Systems Is a Powerful Reference Floor
            body: >-
              Having flagship health systems as reference accounts dramatically shortens evaluation cycles for new
              enterprise prospects. Health system procurement teams heavily rely on peer references, and KLAS survey
              data confirms that peer references are the most cited decision factor. This customer quality advantage
              compounds as each new top-tier customer win becomes a reference for the next.
            calloutType: strength
            claimRefs:
              - CU001
              - CU017
              - CU034
          - type: callout
            title: Epic Cosmos Churn Risk Is Concentrated but Real
            body: >-
              Healthcare IT News and analyst coverage confirm that Epic health systems are increasingly reconsidering
              third-party analytics as Cosmos matures. Innovaccer's exposure is bounded to Epic-installed accounts (~38%
              of US hospitals), but a 5-15% revenue risk from this segment over 3-5 years is a material consideration
              for IPO investors.
            calloutType: risk
            claimRefs:
              - CU008
              - CU022
          - type: callout
            title: Customer-Investor Overlap Creates Aligned Incentives
            body: >-
              The pattern of Innovaccer's largest customers (Kaiser Permanente, Banner Health) participating as equity
              investors creates unusual alignment — these accounts are unlikely to churn while they hold equity stakes.
              However, this structure also raises governance questions about preferential treatment and arm's-length
              commercial terms.
            calloutType: insight
            claimRefs:
              - CU003
              - CU035
