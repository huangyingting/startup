      - number: '6.3'
        title: 企业采用路径与采购动态
        blocks:
          - type: paragraph
            body: >
              工业场景中的人形机器人采购通常遵循多阶段企业销售周期，从初始供应商评估到商业合同一般需要 18 到 36 个月。六个阶段分别是：（1）CIO 和自动化 VP 层面的研究认知；（2）通过 RFI 和 RFP
              流程进行正式供应商评估；（3）概念验证试点，覆盖 1 到 5 台、持续 3 到 6 个月；（4）扩大试点，覆盖 10 到 50 台、持续 6 到 12 个月；（5）首个 50
              台以上商业合同；（6）扩展部署至数百或数千台。截至 2026 年 5 月，Apptronik 已知客户处于第三和第四阶段。


              与协作机器人、自主移动机器人（AMR）等传统工业自动化相比，人形机器人的企业采购摩擦明显更高，原因是监管和认证标准尚未解决。通用人形机器人没有统一安全标准；Texas Instruments 在
              Apptronik 案例研究中指出，尽管这一机器人类别尚无官方安全标准，Apollo 仍使用 TI 安全认证硬件。因此，买方在概念验证之后继续扩展前，需要大量现场安全验证。EU Machinery
              Regulation 2023/1230（2027 年 1 月生效）和美国 OSHA 标准，是客户需要应对的主要监管框架，但二者都没有专门覆盖通用人形机器人。


              汽车工会敏感性是近期最大垂直领域的主要采购摩擦。United Auto Workers 和类似工会历来反对会替代装配线工人的自动化，并曾通过集体谈判协议限制或放慢新自动化技术采用。若 Apollo
              在有工会的汽车工厂规模化部署，将需要 CBA 谈判，可能在技术验证周期之外再增加 12 到 24 个月部署延迟。这是独立于产品质量的系统性逆风。


              Apptronik 任何关系中的 RaaS 人形机器人部署典型企业合同结构都尚未公开披露。关键未知采购条款包括最低台数承诺、合同期限、正常运行时间和任务完成的
              SLA、覆盖机器人生成运营数据的数据所有权条款，以及机器人导致工作场所事故时的赔偿条款。这些未披露条款，是每一项具名试点关系的关键尽调缺口。
            claimRefs:
              - CU017
              - CU018
              - CU019
              - CU020
              - CU021
              - CU022
      - number: '6.4'
        title: 客户经济性与买方 ROI 逻辑
        blocks:
          - type: paragraph
            body: >
              Apollo 采用的基础经济理由，建立在劳动力成本平价和运营时长延长之上。美国劳工统计局报告称，2024 年 12 月，商品生产行业工人的雇主总薪酬成本平均约为每小时
              $44.84，包括工资、薪金和雇主支付的福利。按每年 2,080 个工时（每周 40 小时 × 52 周）计算，单个制造业全职等效员工（FTE）的全口径年成本约为 $72,800 到
              $93,600；若加上培训、HR、安全合规和监督等额外开销，在高劳动力成本市场，每名工人的总成本会升至 $90,000 到 $110,000。


              B Capital 普通合伙人 Howard Morgan 披露，Apollo 的 RaaS 定价约为每台每年 $80,000；按名义成本口径看，一台机器人接近一名制造业 FTE
              的成本平价。不过，计入运营时长后，经济性会明显改善：Apollo 通过热插拔电池可每天运行 24 小时，班次之间没有空闲时间，等于提供单个人类工人 2 到 3
              倍的有效工时，且没有加班溢价。若机器人对人类有效工时比为 2:1，则单位劳动力有效成本降至每 FTE 等效 $40,000 到 $50,000——相较人类劳动力基线降低 45% 到 55%。


              B Capital 的 Howard Morgan 公开预计，从 2027 年开始客户订单将达到 $1 billion。按每台机器人每年 $80,000 计算，这意味着约 12,500 台机器人部署，并产生 $1
              billion 年经常性收入。这一预测带有愿景性质，尚未由任何客户订单披露确认。CEO Jeff Cardenas 在 Series A 前称，Apptronik 当时产生的收入超过已融资资本（约 $14.6
              million 种子轮），意味着试点收入在 $14 million 到 $30 million 区间——可能来自研发合同和有限试点费用，而不是商业 RaaS 部署。


              在 RaaS 模式下，买方相对雇佣人力的盈亏平衡分析，高度取决于利用率、任务适配度和被替代的边际任务。Goldman Sachs 分析预测，到 2035 年人形机器人市场将达到 $38
              billion，制造业是近期主要应用垂直领域。McKinsey 分析显示，对于重复性高、环境可预测的制造任务，如果按 24 小时运营口径计算总劳动力成本替代，机器人回本周期可低于 18 个月。买方的风险在于，当前
              Apollo 能力可能尚不足以覆盖完全替代一名人类 FTE 所需的全部任务；如果只能部分替代，回本周期会更长。
            claimRefs:
              - CU023
              - CU024
              - CU025
              - CU026
              - CU027
              - CU028
      - number: '6.5'
        title: 留存、满意度、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Apptronik 未公开披露任何客户留存指标、净收入留存率、总收入留存率、客户满意度评分、NPS
              数据或复购证据。三家具名企业试点客户同时也是战略投资方或制造合作伙伴，这使外界很难判断持续接触究竟反映产品价值，还是财务关系维护。没有任何试点公开披露已从概念验证扩展到更高台数，也没有任何试点升级为商业合同。试点超过两年后，仍没有披露任何转化、扩展或留存证据，这是公开客户证明基础中最重要的缺口。


              按传统标准看，Apptronik 的客户集中度风险极高。三家具名试点客户——全部属于重工业垂直领域——构成了公司披露客户基础的全部。对私人科技公司而言，任何收入占比超过 10%
              的客户都会被视为集中度风险；按这一标准，Apptronik 披露客户基础完全集中在三段关系上。若三项试点中的任何一项无法转化为商业条款，近期收入爬坡都可能受到实质性损害。


              投资人基础释放出的扩张信号，暗示当前试点之外的未来客户细分市场。John Deere 2026 年 2 月投资，指向农业和建筑设备市场兴趣。AT&T Ventures
              的参与，暗示潜在电信基础设施维护应用。Japan Post Capital 参与 Series A，透露出日本邮政和物流部署兴趣。Ryder Ventures
              同样暗示运输和车队管理领域兴趣。这些投资人信号不等同于客户承诺，但它们是三家具名试点之外，管线发展的最可见先行指标。


              投资方与客户重叠模式——每一家具名企业试点客户同时也是财务投资方或制造合作伙伴——带来一个具体反向担忧：这些试点可能是在维护受财务激励驱动的关系，而不是独立第三方产品评估。独立客户证据——一家非投资方企业部署
              Apollo——仍是最有价值、尚未出现且没有任何公开披露提供的验证事件。IEEE Spectrum 2025 年报道称，截至 2025
              年末，尚无人形机器人公司公开披露试点转化为商业合同，并把整个行业的能力—可靠性缺口描述为显著。
