      - number: '1.3'
        title: 融资历史与投资人构成
        blocks:
          - type: paragraph
            body: >
              自成立以来，Apptronik 已通过多轮融资累计募集约 $1 billion。最早披露的机构轮次是 2022 年约 $14.6 million 种子轮，由 Grit Ventures 和 Perot Jain
              领投。2025 年 2 月，公司完成首笔 $350 million Series A，由 B Capital Group 和 Capital Factory 共同领投，Google/DeepMind
              参与；当时员工约 170 人。一个月后，也就是 2025 年 3 月，Series A 扩展至约 $415 million，并引入 Mercedes-Benz、Japan Post Capital、ARK
              Invest、 Helium-3、Magnetar Capital、RyderVentures 和 Korea Investment Partners。2025 年 11 月，SEC Form D
              文件披露公司新增融资 $331 million，并确认 $5 billion 估值。2026 年 2 月，Apptronik 宣布 $520 million Series A-X 延展轮，既有投资人（B
              Capital、Google、Mercedes-Benz、PEAK6）和新投资人 AT&T Ventures、 John Deere、Qatar Investment Authority 均参与，使 Series
              A 总融资超过 $935 million，累计融资接近 $1 billion。Series A-X 的定价是原始 Series A 估值的 3x。


              B Capital 的 Howard Morgan 公开预计，从 2027 年开始客户订单将达到 $1 billion。Mercedes-Benz、John Deere、 AT&T Ventures 和
              Jabil 等战略投资人既提供资本，也可能带来优先客户或制造关系。Google/DeepMind 的投资 直接绑定 Gemini Robotics AI 合作。结合 CEO 公开评论，John Deere
              参与也暗示未来可能进入农业科技应用。
