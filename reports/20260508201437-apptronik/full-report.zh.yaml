        - 确认认证范围覆盖完整商业部署，而不只是电机控制子集
      - - Google DeepMind Gemini Robotics AI 合作
        - 合作伙伴 / 技术
        - '3'
        - Google 可将 Gemini Robotics 扩展到竞品硬件；OpenAI/FSD 同样有能力
        - 重大
        - 谈排他或优先合作伙伴条款；加深自有训练数据管线
        - DeepMind 协议的排他性和数据所有权条款是什么？
