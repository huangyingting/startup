      - number: '4.2'
        title: 收入模式与变现
        blocks:
          - type: paragraph
            body: >
              Apptronik 计划采用的商业收入模式是机器人即服务（RaaS）：客户不再一次性投入大额资本购买硬件，而是按每台机器人支付年度订阅费，覆盖硬件、软件更新、维护和支持。外界常引用的价格约为每台机器人每年
              $80,000，来源是 B Capital 普通合伙人 Howard Morgan 的公开表述；他预计 2027 年起客户订单将达到 $1 billion，并以这一价格推算，届时约对应 12,500
              台部署量。Apptronik 尚未发布官方价目表，也没有在自有新闻材料中确认 $80,000 这个数字。


              公司披露的长期目标是把单台成本降到 $50,000 以下，CEO Jeff Cardenas 在 2025 年接受 TechCrunch 采访时提到过这一点。若该成本目标能在制造规模化后兑现，Apollo
              相比美国工业工人 $40,000–$80,000 的全口径年成本会具备经济吸引力；这还没有计入 24/7 运行带来的生产率倍数。目前公司的收入基础包括 NASA 研发合同（Apptronik 曾在
              NASA-DARPA Robotics Challenge 传承项目中开发系统，并持续维系 NASA 关系）、Mercedes-Benz、GXO Logistics、Jabil
              的试点费用，以及早期商业服务工作。公司未披露 ARR、合同价值或收入拆分。CEO Cardenas 在 Series A 前称，公司“产生的收入超过已融资金额”，意味着当时收入约超过 $14.6 million。


              RaaS 模式对现金流可预测性有关键结构优势：它把收入从一次性、波动较大的硬件采购转为年度经常性收入，也让 Apptronik
              有动力持续维护和升级在现场运行的机器人。但这一模式也意味着，相比资本密集型制造销售模式，收入确认更慢；客户需要按年承诺，而不是一次性购买。核心风险在于，试点客户要么无法转化为商业合同，要么会把价格谈到显著低于
              $80,000 参考价。
