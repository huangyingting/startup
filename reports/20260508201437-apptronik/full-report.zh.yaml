        - Apollo 以不低于人工的速度自主分拣、转运和码垛物品
        - 降低人工支出；无需加班即可灵活覆盖班次
        - 相比熟练人工分拣员，任务多样性有限
      - - 制造产线支持和套件备料（Jabil）
        - 人类操作员装卸零部件、运输套件并监控产线
        - Apollo 负责物料运输、零件套件备料和产线补料
        - 释放人类工人，让其处理更高价值的检验和 QA 任务
        - 与现有 MES/ERP 系统的集成未公开详述
      - - 机器人训练数据采集（Apptronik 内部）
        - 人类机器人训练师以有限规模手工采集演示数据
        - Texas 设施中的 Apollo 机队为 Gemini Robotics 规模化生成机器人训练数据
        - 加速 AI 模型改进和任务泛化
        - 截至 2026 年 5 月，Texas 训练设施尚未投运
      - - 24/7 电池管理（客户运营团队）
        - 现场运营人员手工安排电池充电和换电
        - 热插拔系统预先放置已充电电池包，支持近连续运行
        - 机器人持续利用，无需预留停机窗口
        - 每个站点都需要投入电池存储和充电基础设施
      - - 重工业自动化（Elevate Robotics 子公司）
