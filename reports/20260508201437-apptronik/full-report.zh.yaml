      - number: '8.3'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >
              Apptronik 的乐观情景建立在三项叠加优势上：Google DeepMind Vision-Language-Action（VLA）模型集成带来通用能力护城河；NASA / UT Austin
              背景在人形机器人 IP 上提供十年以上先发；Mercedes-Benz、GXO Logistics 和 Jabil 的企业关系带来先发客户。如果 Apptronik 到 2035 年拿下 Goldman
              Sachs 预测 $38B 人形机器人市场的 10%，对应约 $3.8B ARR。按 10x ARR 倍数，退出估值为 $38B，相当于当前 $5B 入场价格的 7.6x
              回报。该情景要求试点全部转为商业合同、Jabil 将制造扩至数千台，并且 Google DeepMind 的 AI 能力带来有意义差异化。


              基准情景假设到 2030 年，在 $15B 可服务市场中拿到更温和的 3-5% 份额，生成 $450-$750M ARR。按适合资本密集型硬件订阅业务的 8x ARR 倍数，退出估值为
              $3.6-$6B，大致与当前 $5B 入场价持平。考虑可能的 Series B 带来的进一步股权稀释，基准情景意味着 Series A-X 投资人在当前定价下回报接近零或略为负。该情景只要求部分试点转化，并在
              Tesla 和 Figure AI 竞争压力下活下来。


              悲观情景设想商业试点失败——转化率低于 30%、Google DeepMind 合作丢失，或破坏性安全事故导致部署停摆。估值可能重置到 $1-$2B，较当前水平回撤 60-80%。如果中国厂商做到每机器人年
              $16,000-$30,000 的成本竞争型 RaaS 等价方案，将从结构上削弱 $80,000 RaaS 定价假设。$2-$5B 的收购情景（由 Google、Amazon、Hyundai 或 John
              Deere 收购）仍有可能，对当前投资人对应 0.4-1.0x 结果。
