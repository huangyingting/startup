      - number: '4.5'
        title: 公开财务缺口与尽调优先级
        blocks:
          - type: paragraph
            body: >
              Apptronik 是一家私人公司，登记股东少于 500 名，不受 SEC 公开财务报告要求约束。因此，完整尽调所需的大量关键财务数据仍未披露。最重要的缺口包括：（1）实际 ARR 和收入构成——公司称
              Series A 前收入超过种子资金，但没有提供 ARR 数字、按客户或类别拆分的收入，也没有给出任何前瞻收入指引；（2）毛利率——外界无法看到机器人制造成本与 RaaS
              订阅收入之间的关系，而这是分析单位经济的核心；（3）净烧钱速度——根据员工数估计为 $100–200M/year，但未经确认；（4）试点合同条款——外界不知道 Mercedes-Benz、GXO
              Logistics 或 Jabil
              是否支付试点费用，是否按成本获得试用部署，或是否采用延期付款模式；（5）股权结构表和稀释——虽已披露主要投资方，但股份类别、反稀释条款、清算优先权和总股本并未公开；（6）债务——未披露债务融资、可转票据或收入分成融资信息。


              对任何机构尽调流程而言，这些缺口都需要通过直接访问数据室、经审计财务报表和商业合同条款确认来补齐。缺少这些数据并不表示公司财务承压；对这一阶段的私人公司来说，这是正常情况。但这也意味着，本章财务建模必须依赖估算、比较和公开披露的定性锚点，而不是已确认的财务表现。
            claimRefs:
