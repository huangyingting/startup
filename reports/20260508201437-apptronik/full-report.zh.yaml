      - number: '4.4'
        title: 估值与资本充足性
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 2 月，Apptronik 估值为 $5 billion；按外界理解的商业化前收入计算，这一估值隐含了很高的收入倍数。作为背景：若公司收入为 $15–30 million（由 CEO 的
              Series A 前收入说法和后续试点费用推算），收入倍数约为过去 12 个月收入的 167–333×——这是极高的投机性倍数，符合风险投资阶段深科技公司的定价方式：看重未来商业潜力，而不是当前财务数据。


              与公开同行和先例交易相比，这一估值更容易理解。Boston Dynamics 在 2021 年商业收入有限时被 Hyundai 以约 $1.1 billion 收购，此后 Hyundai 对其估值达到
              $16.25 billion。Figure AI 已融资 $2.6B+，据报道估值 $39 billion——约为 Apptronik 估值的 8×，资本规模约为后者的两倍。Agility Robotics 被
              Amazon 以约 $375 million 收购。在人形机器人同行中，2024–2025 周期每家公司平均总融资为 $300–600 million；Apptronik 的 $1.28B 使其位居全球前三。


              从原 Series A 到 Series A-X 估值提升 3×，反映的是强劲投资者需求和市场动能，不一定代表已有收入进展得到记录。Goldman Sachs Research 预测，到 2035
              年全球人形机器人市场将达到 $38 billion，年出货量约 1.4 million 台——这一市场需要 Apptronik 这类主要商业玩家跑出来。ARK Invest
              作为投资方加入，也为长期技术信念提供了一个公开市场信号。主 Apptronik 实体（2026 年 4 月）和 Apptronik I 系列（2025 年 9 月）的 SEC Form D
              文件，从监管层面确认了融资，提供了关于融资规模和结构条款的一级证据。
            claimRefs:
              - CI021
              - CI022
              - CI023
              - CI024
              - CI025
