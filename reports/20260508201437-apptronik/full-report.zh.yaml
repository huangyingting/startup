      - number: '7.4'
        title: 团队与执行风险
        blocks:
          - type: paragraph
            body: >
              CEO Jeff Cardenas 是 Apptronik
              最核心的融资人、公开代言人、战略决策者和技术愿景制定者。公司没有公开披露接班计划或董事会治理细节。无论是主动离职、健康原因还是投资人压力，Cardenas
              一旦离开，都将是公司可能遭遇的单一最高影响人事事件；客户会担忧，投资人会紧张，公司也需要长时间寻找一位兼具人形机器人可信度和融资履历的接替者。


              Cardenas、Paine、Helmsing、Sentis 等多位联合创始人仍在公司，Apptronik
              从研发文化转向商业化规模运营时，联合创始人之间的协同风险会浮出水面。创始人之间的股权和决策结构尚未披露。机器人工程师争夺已明显升温：Figure AI、Tesla、Boston Dynamics、Physical
              Intelligence 和 NVIDIA 都在争夺同一小撮人才——有具身 AI 经验的机器学习工程师、机器人机械工程师，以及安全关键型嵌入式系统工程师。Apptronik 位于 Texas 州
              Austin，生活成本有一定优势，但纯工程人才密度不如 Bay Area 竞争对手。


              员工数从约 170 人（2025 年 2 月）快速增至约 350 人（2026 年 4 月），带来快速扩张深科技公司常见的文化、流程和执行风险。2026 年 4 月从 Waymo、Boston Dynamics
              和 Amazon 招来的高管补上了商业化规模经验，但新任高管要在创始团队旁边建立权威和流程，也带来整合风险。VP Software Chirag Shah 于 2026 年 4
              月加入；在产品开发强度高、新机器人即将发布的阶段，让他上手安全关键型软件岗位，会进一步叠加风险。
