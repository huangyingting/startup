  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Apollo 硬件平台与物理规格
        blocks:
          - type: paragraph
            body: >
              Apollo 身高 5 feet 8 inches（1.73 m），重量 160 pounds（72.5 kg），可承载 55-pound（25 kg）负载。每个热插拔电池包提供 4
              小时续航；只要现场配好电池更换基础设施，Apollo 就能在生产环境中连续 24/7 运行。计算平台采用 NVIDIA Jetson AGX Orin，这是一款最初面向自主机器和机器人设计的高性能嵌入式 AI
              SoC，可在边缘侧为感知和规划提供实时推理。电机控制依赖 Texas Instruments 芯片；该芯片已由全球认可的安全测试机构 TÜV SÜD
              独立认证符合功能安全标准。在尚无已发布的人形机器人系统级标准时，这为 Apollo 提供了组件级安全凭证。


              Apollo 的传感器套件包括带集成力 / 扭矩传感器的五指灵巧手、用于视觉感知的 RGB 和深度相机、用于环境建图的 LiDAR，以及用于本体状态估计的惯性测量单元（IMU）。连接选项包括 Wi-Fi
              6、Gigabit Ethernet 和可选 5G；其中 5G 由 AT&T 的战略投资推动。混合移动系统是 Apollo
              的独特设计：它可以用两条关节腿处理楼梯、坡道和复杂地形，也可以切换为轮式移动，在室内更快、更省电地导航。CEO Jeff Cardenas
              提到，早期工业客户出于安全和效率考虑，主要偏好轮式配置；保留腿式能力，是为了长期通用性。整机采用力控串联弹性执行器，遇到意外外力会顺从让位，从而在高工业循环频率下同时提升人机协作安全性和机械寿命。
