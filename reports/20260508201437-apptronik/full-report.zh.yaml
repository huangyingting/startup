      - number: '2.5'
        title: 竞争定位与地理动态
        blocks:
          - type: paragraph
            body: >
              人形机器人竞争格局正快速向少数资本充足玩家集中。美国主要竞争者包括 Figure AI（融资 $675M；BMW 合作；OpenAI 关系）、Tesla Optimus（仅内部部署；据报道 2025 年在
              Tesla 工厂部署 1,000+ 台）、Boston Dynamics（Atlas， Hyundai 支持；现场可信度强）、Agility Robotics（Digit；Amazon 合作；据报道有
              10,000 台订单）和 1X Technologies （挪威创业公司；OpenAI 投资）。国际上，中国 Unitree Robotics 以 $16,000 提供 G1，是市场上最低价的人形机器人；
              UBTECH（上市公司）和 Fourier Intelligence 也很活跃。IFR 报告称，2023 年中国约占全球工业机器人安装量的 70%， 中国政府补贴（数十亿 CNY）也明确瞄准人形机器人发展。


              从地理维度看，美国在 AI 软件和基础模型上领先，这给人形机器人平台的 AI 层带来有意义的优势。欧洲近期企业需求最强 （Mercedes-Benz、BMW、Volkswagen
              汽车试点），安全监管也更严格，可能让 Apptronik 这类拥有 TÜV SÜD 认证的公司受益。 日本有人口老龄化、强机器人文化和本土玩家（SoftBank、Fanuc），但 AI 集成落后。中东（Qatar
              Investment Authority 投资 Apptronik）体现主权财富基金对科技多元化的兴趣。CHIPS Act 和 IRA 推动的美国制造业回流，则带来增量本土需求。


              Apptronik 的差异化定位建立在五点上：（1）来自 UT Austin HCRL 的十年以上人形 R&D 积累；（2）已有 TÜV SÜD 功能安全认证； （3）与 Google DeepMind 合作集成
              VLA 模型；（4）三个垂直场景已有试点关系；（5）Jabil 合同制造合作支持产能扩张。 主要风险在于，资金更足或营销更强的竞争者（Tesla Optimus、Figure AI）率先完成规模验证，在
              Apptronik 下一代产品出货前 先锚定企业采购关系。
            claimRefs:
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
      - number: '2.6'
        title: 展示项
        blocks:
          - type: callout
            title: 劳动力短缺是结构性驱动，不是周期性驱动
            body: >-
              US BLS 预计，到 2032 年美国制造业将有数十万个岗位空缺。德国、日本、韩国这三个全球最大工业机器人市场也面临人口老龄化；
              合在一起，劳动力稀缺就是结构性驱动，不会随短期经济周期消失。这为人形机器人创造了不依赖 GDP 增长假设的持久需求信号。
            calloutType: insight
            claimRefs:
              - CM021
              - CM022
          - type: callout
            title: 市场规模估算因定义不同相差 3–10x
            body: >-
              Goldman Sachs（2035 年 $38B）和 MarketsandMarkets（2030 年 $15B）使用的市场定义并不兼容。ARK Invest 的 $24T
              数字带有投机性。若更窄定义（仅双足人形机器人、仅结构化工业场景）被证明更准确，基于这些估算的投资人和管理层预测可能被高估。 Apptronik 应发布自己的自下而上 SAM 模型。
            calloutType: risk
            claimRefs:
              - CM006
              - CM007
              - CM008
          - type: callout
            title: 中国制造商威胁价格底线
            body: >-
              Unitree 的 G1 人形机器人售价为 $16,000，大约只有美国 / 欧洲竞争者隐含硬件成本的十分之一。尽管能力差距仍然显著， 成本曲线可能比预期更快压缩；在 Apptronik
              达到规模之前，物流和制造中的低复杂度场景可能先被商品化。
            calloutType: risk
            claimRefs:
              - CM033
              - CM034
          - type: callout
            title: RaaS 模式把 CapEx 门槛转为 OpEx 决策
            body: >-
              Apollo 的 RaaS 价格为 $80K/year，与单名美国制造业工人的全负担年成本（含福利和管理费用约 ~$55–80K）相当。 这消除了传统机器人采购中 $150K–$250K
              的前期硬件门槛，让中型企业也能负担，显著扩大了可触达买方范围。
            calloutType: strength
            claimRefs:
