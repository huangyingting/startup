  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Apptronik 的资本形成轨迹呈阶梯式跃升：从规模不大的种子轮，走到人形机器人历史上最大的 Series A 资金池之一。公司第一笔机构融资是 2022 年约 $14.6 million 种子轮，由 Grit
              Ventures 和 Perot Jain 领投，为早期 Apollo 硬件开发和团队搭建提供资金。2025 年 2 月， 公司宣布首笔 $350 million Series A，由 B Capital
              Group 和 Capital Factory 共同领投，Google/DeepMind 参与；当时公司约有 170 名员工。这轮融资很快在 2025 年 3 月扩展至约 $415 million，并加入
              Mercedes-Benz、Japan Post Capital、ARK Invest、 Helium-3、Magnetar Capital、RyderVentures 和 Korea Investment
              Partners。


              2025 年 9–11 月，公司通过 Apptronik I entity（CGF2021 LLC 的一个 series）额外募集 $331 million，并向美国证券交易委员会（SEC） 提交 Form
              D，披露该轮融资并确认 $5 billion 估值。2026 年 2 月，Apptronik 宣布 $520 million Series A-X 延展轮，新投资人包括 AT&T Ventures、John
              Deere 和 Qatar Investment Authority，使 Series A 总融资超过 $935 million。所有轮次累计 融资约 $1.28 billion（约 $14.6M 种子轮 +
              $415M 初始 Series A + $331M 过桥轮 + $520M A-X）。Series A-X 按原始 Series A 估值的 3× 执行，意味着原始 Series A 定价估值约为 $1.67
              billion。公司没有公开报告债务融资或收入型融资，也未发生股权众筹或公开市场交易。


              投资人财团混合了财务 VC（B Capital、Capital Factory、Magnetar Capital、PEAK6、Helium-3、ARK Invest、Korea Investment
              Partners）、 与商业化直接相关的战略企业投资人（Mercedes-Benz、John Deere、AT&T Ventures、Jabil、RyderVentures、Japan Post
              Capital）、 主权财富（Qatar Investment Authority）以及技术战略方（Google/DeepMind）。这种财团构成在战略上很重要：它既提供资本，也可能带来
              优先客户和制造渠道，降低公司对纯企业销售的依赖。
