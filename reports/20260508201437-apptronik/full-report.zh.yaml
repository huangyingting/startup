            title: 终止标准已经明确
            body: >-
              投资逻辑可被以下情况明确证伪：(1) 到 2026 年底，试点转商业合同率低于 30%；(2) 新款 Apollo 未显示实质能力提升；(3) 竞争对手对外商业部署超过 1,000 台；(4) Jeff
