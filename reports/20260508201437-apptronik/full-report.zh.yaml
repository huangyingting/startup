      - number: '6.2'
        title: 具名客户画像与试点证据
        blocks:
          - type: paragraph
            body: >
              Mercedes-Benz 于 2024 年 3 月开始在其制造设施中试点部署 Apollo 机器人，成为 Apptronik
              第一家、也是运行时间最长的具名企业客户。试点聚焦装配线辅助——包括零件转运、组件配送，以及车身车间或总装区域的重复性体力劳动。截至 2026 年 5
              月，该试点已运行两年多，但尚未公开披露已转化为商业合同。Mercedes-Benz 作为战略投资方参与了 Series A 扩展轮（2025 年 3
              月），形成投资方与客户重叠。公司未发布客户满意度声明，未披露试点表现 KPI，也未宣布扩展到更多设施或更高台数。


              GXO Logistics 是按收入计算全球最大的纯合同物流服务商（2023 年约 $9.8 billion），正在评估 Apollo 用于仓库自动化，包括拣选、分拣、箱体搬运和装载作业。GXO
              试点的确切开始日期尚未公开披露，但大体与 Mercedes-Benz 合作同期或在其之后。GXO 未披露机器人台数、仓库位置、具体任务表现数据，也未说明扩展部署计划。GXO
              未出现在公开融资轮披露的投资方名单中，因此在三家具名企业试点客户中，它的独立性最强。


              Jabil 是一家收入 $29 billion 的电子制造服务公司，在全球运营 100 多个设施；2025 年 2 月，它与 Apptronik 建立了试点客户和制造双重合作。根据制造协议，一旦 Apollo
              被认定具备商业可行性，Jabil 将在自有工厂生产 Apollo 机器人。这给 Jabil 带来希望 Apollo
              商业成功的合同激励——因此，它作为试点评估方的位置并不完全独立于其成为合同制造商的战略利益。Jabil 也参与了 Series A 融资，进一步强化了具名企业客户中的投资方与客户重叠模式。


              NASA 与 Apptronik 的关系可追溯至创始团队在 UT Austin Human Centered Robotics Lab 参与 NASA-DARPA Robotics
              Challenge（2013）期间开发 Valkyrie 人形机器人的工作。持续合作被归类为研发伙伴关系，不是创收型商业客户关系。NASA 的参与带来技术可信度和品牌认知，但不构成企业商业销售证明。NASA
              关系的收入价值尚未公开披露。
