          - type: callout
            title: RaaS 与劳动力成本平价
            body: >-
              按每台机器人 $80K/year 计算，Apollo 的 RaaS 定价大致相当于一名美国工业工人的全口径年成本。若单台成本降至 <$50K 目标，Apollo 将提供成本平价加生产率倍数（24/7
              运行、无需福利）。这为制造和物流客户创造了可信的近中期经济理由。
