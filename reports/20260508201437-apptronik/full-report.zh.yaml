      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Apptronik 由 Jeff Cardenas（CEO）、Nick Paine（CTO）、Bill Helmsing 和 Dr. Luis Sentis（首席科学家） 在 2016 年共同创立，四人均出自
              UT Austin HCRL。Jeff Cardenas 是公司最主要的公开发言人、融资推动者和 战略决策者。Dr. Luis Sentis 是 UT Austin 终身教授、HCRL
              主任，担任首席科学家的同时保留学术职位， 为公司持续带来机器人学研究深度。Nick Paine 以 CTO 身份负责技术开发。Bill Helmsing 是联合创始工程师。


              2024 年至 2026 年，公司大幅扩充高管团队。Greg Steele 在 2024 年 4 月加入并担任 COO，此前有 Boston Dynamics 运营背景。Kay Sheils Kingsbury
              担任 CFO，Barry Phillips 担任 CCO。Steven Riddle 是工程副总裁。 2026 年 4 月，Apptronik 宣布一轮重要高管任命：Daniel Chu
              加入担任首席产品官，此前曾任 Waymo CPO （参与推出全球首个完全自动驾驶网约车服务）和 23andMe CPO；Kevin Garell 加入担任服务与支持高级副总裁， 此前负责 Boston
              Dynamics 的全球服务；Chirag Shah 加入担任软件副总裁，此前是 Amazon Kindle 和 Alexa+ 的软件高管。


              关键人物风险集中在 CEO Jeff Cardenas 身上。他是公司最主要的公众面孔，也推动了所有重要融资。董事会构成和 治理结构尚未公开披露。领投方 B Capital 的 Howard Morgan
              一直是积极的外部背书者。2026 年 4 月从 Waymo、 Boston Dynamics 和 Amazon 引入的高管潮，说明公司有意从 R&D 组织转向商业化规模运营。
