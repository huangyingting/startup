      - number: '7.6'
        title: 附录
        blocks:
          - type: callout
            title: 人形机器人缺少安全标准，责任敞口无法量化
            body: >-
              工业协作场景下，完整系统级人形机器人还没有 ISO 或 IEC 标准。Apollo 的 TÜV SÜD 认证覆盖的是电机控制部件，不是整套 160
              磅系统。监管空白让产品责任敞口无法量化，也会让企业客户在采购时犹豫。
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
          - type: callout
            title: AI 单一依赖 Google DeepMind
            body: >-
              Apollo 的 AI 差异化完全建立在 Google DeepMind 的 Gemini Robotics VLA 之上。公司未披露备用 AI 供应商。一旦合作终止或模型被弃用，Apptronik 需要
              12-24 个月重建 AI 栈，商业势头相当于被重置。
            calloutType: risk
            claimRefs:
              - CR015
              - CR016
          - type: callout
            title: Jabil 利益冲突
            body: >-
              Jabil 同时是 Apollo 的合同制造商，也是已披露的三家试点客户之一。作为制造商，Jabil 能直接看到 Apollo 的生产成本结构，并可在作为客户谈判 RaaS
              定价时利用这一信息。这个结构性利益冲突仍未解决，也未披露。
            calloutType: risk
            claimRefs:
              - CR018
              - CR019
          - type: callout
            title: Tesla Optimus 商品化威胁
            body: >-
              Tesla 正以接近零边际成本在内部部署 1,000+ 台 Optimus 机器人，积累真实世界训练数据的速度没有任何外部人形机器人公司能追上。如果 Optimus 以不高于 Apptronik $50K
              目标价的价格对外商业化，企业人形机器人市场可能在 Apptronik 达到盈利规模前就被商品化。
