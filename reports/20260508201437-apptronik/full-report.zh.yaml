      - number: '3.3'
        title: 中国入局者与价格竞争
        blocks:
          - type: paragraph
            body: >
              对 Apptronik 和所有美国竞争者而言，中国人形机器人公司是最具颠覆性的长期价格威胁。中国政府已将人形机器人列为 国家战略重点，提供直接补贴、优先采购和低成本制造基础设施。Unitree
              Robotics（深圳）按销量增长最快，其 G1 人形机器人 零售价为 $16,000–$30,000，这个价格低于所有美国竞争者的目标价和当前定价。Unitree 的 G1（1.32 m、35 kg）和 H1
              研究机器人可通过直销广泛购买。虽然 Unitree 机器人比美国对手抓手更简单、灵巧操作能力更弱，但它的价格攻势会比多数 西方预测者预期更快压缩市场。


              Agibot（SoftBank 支持）计划在 2025–2026 年量产，并获得政府成本补贴。UBTech Robotics（HKEX: 9880）是商业部署最多的 中国人形机器人公司，Walker X
              已在中国汽车生产线运行。DEEP Robotics 正从腿式平台扩展到人形机器人。中国国家资本、 本土制造规模和激进定价叠加在一起，让必须支付美国劳动力和组件成本的美国竞争者处于结构性成本劣势。Apptronik
              当前 低于 $50,000 的目标价已经高于 Unitree 当前市场价；即便在中国厂商达到质量平价之前，这也是近期脆弱点，而质量平价通常会在 初始规模部署后出现。
