chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Apptronik 是一家位于 Austin, Texas 的人形机器人公司，2016 年作为 University of Texas at Austin 的 Human Centered Robotics
              Lab（HCRL）商业化孵化项目成立。公司开发 AI 驱动的通用人形机器人，目标是在 工业环境中与人协同作业。旗舰产品 Apollo 是一台身高 5-foot-8-inch、体重 160-pound
              的人形机器人， 可搬运 55-pound 负载，每块电池可运行四小时。Apollo 配备 NVIDIA Jetson AGX Orin 计算硬件、带 TÜV SÜD 功能安全认证的 TI
              电机控制方案、热插拔电池，以及可配置的 Perimeter Zone 和 Impact Zone 安全系统。 机器人提供腿式和轮式两种配置。CEO Jeff Cardenas
              指出，早期工业需求更偏向轮式版本，因为成本更低、 在人附近运行更安全；腿式系统的长期上限更高。


              Apptronik 的商业模式是 Robotics-as-a-Service（RaaS），Apollo 定价约为每台每年 $80,000，覆盖机器人硬件、
              软件更新，以及持续服务和支持。公司先瞄准制造、物流和仓储三个商业垂直场景，长期再进入零售、医疗和养老。 Apptronik 将 Apollo 定位为「一台机器人，完成数千种任务」，而不是部署单一任务机器；灵活性、
              安全性和以人为中心的设计是它强调的核心差异。公司的长期目标单价低于 $50,000。总部位于 11701 Stonehollow Dr, Suite 150, Austin, TX 78758，并计划设立
              California 办公室。
