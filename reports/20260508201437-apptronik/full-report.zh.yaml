      - number: '7.2'
        title: 运营、质量与网络安全风险
        blocks:
          - type: paragraph
            body: >
              Apptronik 没有自有制造设施，生产依赖 Jabil。对任何人形机器人公司来说，从试点批量单位扩至 10,000+ 台商业单位，运营上都尚未被证明。NVIDIA Jetson AGX Orin
              计算硬件的供应链瓶颈——该硬件受半导体市场波动和美中出口管制制度影响——以及锂离子电池电芯瓶颈（EV 制造商正激烈争夺供应），都是关键生产风险。任一投入中断，都可能让 Apollo 生产停摆，且替代来源有限。


              AI 可靠性风险对生产环境部署十分重要。Apptronik 集成 Google DeepMind 的 Gemini Robotics VLA，引入了模型幻觉或在精密制造场景中错误推断动作的可能。一旦 Apollo
              机器人造成生产线错误或伤及同场工人，并成为高关注度事件，企业客户信心会受到实质打击，也可能触发整个行业的监管审查。机器人 160-pound 的重量和关节力量意味着，一旦安全系统失效，伤害潜力不可忽视。


              长时间工业运行中的机械磨损和关节可靠性，是尚未被任何人形机器人公司通过长期商业部署验证的工程挑战。连续工业运行下的散热、执行器可靠性，以及多年 RaaS 合同期间的电池衰减，都是运营质量未知数。Apollo
              为支持远程监控、软件更新和远程操作，设计为可联网（WiFi、5G），因此网络安全风险更高。部署在关键制造基础设施中的联网人形机器人机群，构成高价值攻击面；若成功网络攻击导致机器人在工厂环境中异常动作，将对
              Apptronik 的商业化轨迹造成灾难性影响。
