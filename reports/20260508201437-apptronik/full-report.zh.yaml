  - id: TV006
    title: 最终尽调问题表
    columns:
      - 尽调事项
      - 优先级
      - 所需信息
      - 回答问题
      - 预期来源
    rows:
      - - 经审计财务或管理账
        - 关键
        - 收入、毛利率、烧钱速度、现金头寸、每台已部署机器人的单位经济性
        - QV003, QV023
        - CFO 或审计师；核实 CEO 关于 Series A 前收入超过 $14.6M 的说法
      - - 商业管线细节
        - 关键
        - 所有活跃机会：阶段、规模、转化概率、预计签约时间线
        - QV017
        - CCO 或销售团队；确认 B Capital 对 2027 年 $1B 预测的依据
      - - 股权结构表与投资人权利
        - 关键
        - 完整股权结构表、优先股与普通股比例、反稀释条款、董事会控制权
        - QV001
        - CFO 或法务；评估治理和未来稀释影响
      - - Jabil 制造协议条款
        - 高
        - 产量承诺、规模化单价、排他性、里程碑触发条件、IP 归属
        - QV004
        - COO 或法务；验证乐观情景中的制造规模假设
      - - 客户合同红线（RaaS 条款）
        - 高
        - 定价结构、SLA 义务、IP 归属、终止权、最低承诺
        - QV003
        - 法务或 CCO；验证 $80K/年定价和续约经济性
      - - IP 归属清单（UT Austin HCRL 拆分）
        - 高
        - 许可还是完全转让；持续版税或保留权利；UT Austin 共同所有风险
        - QV022
        - 法务；这是评估核心 IP 护城河可防御性和排他性的关键
      - - RaaS 定价模型与单位经济性
        - 高
        - 每台机器人 COGS、单机服务成本、规模化毛利率、盈亏平衡台数
        - QV004, QV023
        - CFO 或工程团队；验证 $80K/年可行性和长期利润率结构
      - - Figure AI 商业条款竞争情报
        - 中
        - Figure AI 商业合同结构、单机定价、客户名称、部署数量
        - QV006
        - 外部渠道核查；对标 Apptronik 在市场中的定价竞争力
      - - Series B 规划时间线与资金用途
        - 中
        - 下一轮预计融资时间、目标金额、资金用途、当前资本隐含跑道
        - QV025
        - CEO 或 CFO；在 2027 年收入里程碑前评估稀释风险和跑道是否充足
    notes: “关键”表示缺少该信息就不能做买入决定；“高”表示交割前必须拿到；“中”表示投资后 90 天内必须拿到。
    claimRefs:
      - CV029
      - CV036
      - CV043
