      - number: '8.5'
        title: 终止触发条件、风险因素与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              已识别六项主要终止触发条件。第一，到 2026 年 12 月，三家试点客户整体的试点转商业合同率低于 30%，说明技术还不能以可接受单台经济性实现商业可行。第二，Google DeepMind Gemini
              Robotics 合作正式终止，将实质削弱乐观逻辑核心的 AI 原生定位。第三，如果竞争对手在 Apptronik 达到有意义规模前完成超过 10,000
              台外部商业机器人部署，可服务窗口可能关闭。第四，重大安全事故导致试点停摆——尤其是在截至 2026 年仍没有官方人形机器人安全标准的背景下——会触发监管风险并摧毁客户信心。第五，CEO Jeff Cardenas
              离职将构成关键人风险事件。第六，在 ARR 可见性出现前需要降价融资，将显示投资人信心被侵蚀。


              在当前或更高定价下做任何买入决定前，需要完成九项最终尽调问题。最高优先级问题包括：获取经审计财务报表或管理账，验证收入说法并建立收入倍数基线；获取三项活跃试点的商业管线细节、阶段和转化标准；获取股权结构表和投资人权利，理解稀释与董事会控制。高优先级问题包括：Jabil
              制造协议条款、RaaS 客户合同关键条款红线、记录 UT Austin HCRL spinout 条款的 IP 所有权清单，以及包含每台机器人 COGS、服务成本和规模化利润率的 RaaS
              定价模型。中优先级问题包括：Figure AI 商业合同结构的竞争情报，以及 Series B 规划时间表，用于评估现金跑道和稀释风险。
