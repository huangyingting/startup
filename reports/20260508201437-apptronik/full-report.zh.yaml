      - number: '4.3'
        title: 成本结构与烧钱速度估算
        blocks:
          - type: paragraph
            body: >
              Apptronik 未披露成本结构、毛利率或烧钱速度。以下估算来自公开员工数和行业基准。截至 2026 年 4 月，公司约有 350 名员工；若按每名工程人员 $150,000–$200,000
              的平均全口径年成本计算（与 Austin 地区机器人和 AI 人才市场相符），年度总薪酬约为 $52–70 million。加上管理开销、场地、研发硬件成本和 G&A，年度总运营支出估计约为 $100–200
              million。公司目前根据合同制造协议把制造外包给 Jabil，因此无需自建工厂；相较垂直整合的同行，这大幅降低了资本开支需求。


              资本结构提供了估算现金跑道。按 Series A 周期（2025–2026）约 $935 million 融资、每年 $100–200 million 的估算烧钱速度计算，公司在当前支出水平下约有 4–9
              年现金跑道；若考虑商业化加速带来的持续扩招，现金跑道更可能是 4–7 年。主要烧钱驱动项包括：（1）下一代 Apollo 平台和 Gemini AI 集成的研发；（2）工程团队扩张；（3）与 Jabil
              配套的制造认证和质量投入；（4）客户部署和支持基础设施。外包制造减少了资本开支，但公司向商业化运营扩张时，员工成本会继续上升。


              相比 Figure AI（估值 $39B、融资 $2.6B+），Apptronik 的资本效率看起来更有利：公司以约 $1.28B 融资达到 $5B 估值，CEO 关于 Series A
              前收入超过种子资金的说法也显示出早期商业牵引力。不过，在缺少经审计财务和确认毛利率数据的情况下，这些比较仍只是方向性估算。
