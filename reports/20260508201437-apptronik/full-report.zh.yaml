        - 规模更小、融资更少、阶段相近——Apptronik 溢价有合理性
      - - Sanctuary AI
        - ~$750M（估算）
        - ~$100M+
        - 试点阶段；Phoenix 机器人；Magna 合作
        - AI 优先；加拿大公司；与 Magna 推通用人形机器人
