      - number: '1.4'
        title: 规模、员工数与关键里程碑
        blocks:
          - type: paragraph
            body: >
              Apptronik 的员工数随着融资进程大幅增长：从 2025 年 2 月 Series A 公告时约 170 人，到 2026 年 2 月约 300 人，再到 2026 年 4 月约 350
              人。公司的人形机器人工作始于 2013 年，当时 UT Austin HCRL 创始团队 参加 NASA-DARPA Robotics Challenge，使用 Valkyrie
              人形机器人。发展至今，Apptronik 已开发超过 15 套 机器人系统，包括外骨骼、人形机器人躯干、双足平台和机械臂。


              第一款商业产品 Apollo 在 2023 年公开亮相。关键部署里程碑包括：2024 年 3 月启动的 Mercedes-Benz 试点、 GXO Logistics 仓库试点，以及 2025 年 2 月宣布的
              Jabil 试点和制造合作。2024 年 12 月，公司宣布与 Google DeepMind 达成战略 AI 合作。新一代 Apollo 自 2025 年以来一直在内部测试，原本预计 2026
              年公开首发；CEO Jeff Cardenas 承认亮相已从原定 2025 年计划推迟，并强调他的标准是，视频中展示的任何能力都必须能在线下演示。 CEO Cardenas 称，在 Series A
              之前，Apptronik 产生的收入高于已募集资本，但公司没有披露具体 ARR。到 2026 年中，没有任何客户试点被公开宣布已转为完整商业部署。
