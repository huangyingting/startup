      - number: '7.5'
        title: 竞争与财务风险
        blocks:
          - type: paragraph
            body: >
              Apptronik 的竞争风险随对手类型不同而高度不对称。Tesla 的 Optimus 项目受益于垂直整合（自研执行器、芯片、制造）和自有部署试验场，在 Tesla 工厂内部已有 1,000+
              台，能拿到外部对手难以匹敌的真实世界训练数据。如果 Tesla 即便亏损也将 Optimus 大规模商业化，可能在 Apptronik 做出有意义商业出货前就把 RaaS
              市场商品化。中国人形机器人厂商（Unitree、UBTECH、Fourier Intelligence）靠政府补贴和更低人工成本，能以低于 Apptronik 目标 $50K 单价 60-70%
              的价格竞争；Unitree G1 价格约 $16K。Figure AI 以 $39.5B 估值融资，拥有 OpenAI AI 合作和最初的 BMW 制造业试点，资本市场可信度约为 Apptronik 的 8
              倍，可以在企业人才和企业订单上出更高价。Amazon 旗下 Agility Robotics（Digit 机器人）可借 Amazon 全球履约网络获得自有部署路径，因此安装基数占优。


              Apptronik 尚未商业化，财务风险很尖锐。公司未披露年经常性收入（ARR）；CEO Cardenas 称 Series A 之前收入超过累计融资（意味着历史总收入低于 $15M）。按 350
              名员工和持续硬件 / AI 开发估算，年烧钱速度约 $100-200M，$935M Series A 按当前开支可支撑约三到五年，前提是商业收入没有爬坡。$5B 估值要求 Apptronik 做到约 $500M
              或更高 ARR，按 10x 收入倍数才撑得住本轮投资人的成本。RaaS 模型按每台每年 $80K 预测，要达到 $500M ARR，需要满负荷部署约 6,250
              台——没有任何人形机器人公司在商业上接近过这一规模。Series B 资本市场风险真实存在：AI / 机器人投资情绪反转、重大人形机器人事故或竞争对手突破，都可能让下一轮难以以有利条款完成。
