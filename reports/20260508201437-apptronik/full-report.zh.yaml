      - number: '2.3'
        title: 细分市场与买方分析
        blocks:
          - type: paragraph
            body: >
              Apptronik 当前的主要买方，是三类工业垂直场景中的大型企业：汽车制造、电子 / 合同制造，以及物流 / 仓储。 每个细分市场的购买动态、决策者、采购周期和技术成熟度要求都不同。


              汽车制造是声誉最高的早期采用场景。Mercedes-Benz、BMW 和 Volkswagen 都已公开试点或宣布计划部署人形机器人。 Mercedes-Benz 与 Apptronik Apollo
              的试点瞄准现有工厂中的重复装配任务（轮胎安装、零件搬运）。决策者通常是 VP 级制造运营和创新负责人；采购通常要求 12–24 个月的供应商资格认证和安全认证。全球汽车制造市场约为 $2.5
              trillion，在多数装配作业中，直接人工成本约占可变成本的 20–30%。


              电子和合同制造（EMS）是高产量、高重复性的场景。Jabil 是全球第三大 EMS 公司，既是 Apptronik 的试点客户， 也是合同制造合作伙伴。电子制造需要高精度和快速任务切换，这些能力与
              Apptronik 的 Apollo 平台及其 Google DeepMind AI 集成相匹配。全球 EMS 市场约为 $600B。


              物流和仓储因长期招工难、高工伤率，以及电商推动的柔性履约需求，提供了近期最大的量级机会。GXO Logistics 是 Apptronik 的试点客户之一，也是全球最大的纯物流公司。Amazon 已在仓库部署
              Agility Robotics Digit。物流决策周期 比汽车更快（6–12 个月），但 RaaS 定价必须与更便宜、更成熟、风险更低的 AMR 替代方案（Locus、6 River、Geek+）
              竞争。全球物流 / 仓储市场年支出超过 $10 trillion。


              医疗、国防 / 政府、零售和农业是更长期的细分市场。NASA 和 DARPA 关系给 Apptronik 带来政府渠道，但国防采购 周期长，预算周期难以预测。John Deere
              的投资指向农业相邻机会，但农业专用能力尚未得到展示。医疗面临最高的 监管和责任门槛。
