            body: >-
              Apptronik 已知的三家试点客户——Mercedes-Benz、GXO Logistics 和
              Jabil——也全都是公司投资人。这带来结构性需求独立性疑虑：战略投资可能影响试点决策；没有独立交易的商业承诺，就无法确认在每年 $80,000 的 RaaS 价格点上存在真实市场需求。
            calloutType: risk
            claimRefs:
              - CV028
          - type: callout
            title: 相对 Figure AI 折价带来显著上行空间
            body: >-
              Apptronik $5B 估值比 Figure AI 的 $39B 低 87%，尽管两家公司累计融资接近（~$1B vs. $2.6B），商业化阶段相近，且 Apptronik 可说拥有更强运营传承。如果
              Apptronik 达到 Figure AI 可比的商业里程碑，重估空间很大——一旦商业转化得到验证，当前折价可能提供有吸引力的入场点。
            calloutType: strength
            claimRefs:
              - CV009
              - CV015
              - CV034
              - CV045
