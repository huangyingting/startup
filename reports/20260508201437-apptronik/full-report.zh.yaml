  - id: TM004
    title: 增长驱动因素和约束表
    description: >-
      Catalogues the primary forces accelerating and decelerating humanoid robot market adoption, with evidence
      references, magnitude assessment, and strategic implications for Apptronik.
    columns:
      - 因素
      - 类型
      - 影响程度
      - 时间范围
      - 证据
      - 对 Apptronik 的含义
    enumerationScope:
      coverage: partial
      basis: >-
        Based on public analyst reports, regulatory filings, and industry commentary through May 2026. Not exhaustive
        across all regional and micro-segment factors.
    rows:
      - - 制造业结构性劳动力短缺
        - 驱动因素
        - 高
        - 近期（2024–2030）
        - BLS 预计到 2032 年制造业将有数十万个岗位空缺
        - 需求信号持续；降低客户 ROI 门槛
      - - AI VLA 突破（Gemini Robotics、GR00T）
        - 驱动因素
        - 高
        - 近期（2024–2027）
        - Google DeepMind Gemini Robotics、NVIDIA Project GR00T 于 2024–2025 发布
        - 缩小软件能力差距；Apptronik 受益于 Google 合作关系
      - - 组件成本下降（执行器、算力）
        - 驱动因素
        - 高
        - 持续
        - ARK Invest：执行器成本每年 -30–40%；NVIDIA Orin 价格曲线下行
        - 硬件经济性逐年改善；加快客户 ROI 跑通
      - - RaaS 模式降低前期 CapEx
        - 驱动因素
        - 中
        - 近期
        - Apptronik 约 $80K/年 vs $150K+ 采购价；运营费用 vs 资本开支
        - 将可触达买方扩大到中小制造企业
      - - 政府政策（CHIPS Act、IRA、制造业回流）
        - 驱动因素
        - 中
        - 近期（2022–2030）
        - 美国 CHIPS Act $52.7B、IRA 清洁能源制造激励
        - 本土制造增长带来增量人形机器人需求
      - - EV 电池制造扩张
        - 驱动因素
        - 中
        - 近期（2025–2030）
        - IEA：美国和欧洲 EV 制造产能快速扩张
        - 结构化 EV 装配线是理想早期部署环境
      - - 缺少人形机器人安全标准（ISO/IEC）
        - 约束
        - 高
        - 近期
        - ISO/TS 15066 广泛覆盖协作机器人；截至 2026 年尚无人形机器人附录定稿
        - 拖慢企业采购；限制汽车 / 医疗采用
      - - 尚无竞争对手证明 >10K 台规模
        - 约束
        - 高
        - 近期
        - Tesla：1,000+ 台 Optimus 内部使用；尚无规模化商业部署
        - 企业采购会因缺少规模验证而犹豫
      - - 中国价格竞争（Unitree G1 售价 $16K）
        - 约束
        - 高
        - 近期
        - Unitree G1 售价 $16,000；中国 MIIT 补贴；UBTECH、Fourier
        - 低复杂度用例承压；可能走向商品化
      - - 汽车和物流工会阻力
        - 约束
        - 中
        - 近期
        - UAW 正式反对 Ford / GM 工厂部署机器人
        - 拖慢有工会设施的企业推广
      - - OSHA 监管滞后
        - 约束
        - 中
        - 近期
        - 截至 2024 年 OSHA 尚无人形机器人专项指南
        - 给企业客户带来责任不确定性
      - - 盈亏平衡分析高度不确定
        - 约束
        - 中
        - 近期
        - 没有规模化后单台 P&L 公开数据；RaaS 经济性尚未在批量下验证
        - 企业 CFO 可能等到单位经济性被验证后再承诺
