  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Apptronik 所处监管环境尚未形成专门针对工业场景中与人类并肩工作的人形机器人的标准。IEC 61508（电气 / 电子 / 可编程系统功能安全）和 ISO
              13849（机械安全）适用于组件级安全，Apollo 的电机控制系统已在这些标准下获得 TÜV SÜD 功能安全认证。不过，尚无 ISO 或 IEC
              标准覆盖在共享人机工作空间中作为同事运行的完整系统级人形机器人。这一缺口带来两类相互关联的责任：企业采购团队不确定合规义务，采购决策会放慢；Apptronik
              则在尚未形成成熟人形机器人伤害判例法的司法辖区，面临产品责任风险敞口。


              OSHA 尚未发布针对人形协作机器人同事的专门规定。现有 OSHA 工业机器人框架（29 CFR 1910.217 及相关一般责任条款）写给固定、加围栏的工业机械臂，而不是移动的 160-pound
              双足机器人。未来任何 OSHA 规则制定，都可能要求已部署 Apollo 设备改造，给 Apptronik 和客户带来意外成本负担。包括 UAW 和 Teamsters
              在内的工会公开强烈反对自动化；劳工组织的监管倡议可能加速 OSHA 制定更具规定性的规则。


              来自 UT Austin HCRL 的 IP 传承带来潜在许可风险。Apptronik 以衍生公司形式成立，但 HCRL 开发的 IP 以何种条款转移给这家私人公司，尚未公开披露。任何与 UT Austin
              之间未解决的 IP 归属争议，都可能给 Apptronik 的 IP 组合蒙上阴影，并使许可或收购讨论复杂化。美国出口管制制度，以及潜在国防应用的军民两用机器人系统可能接近 ITAR
              管制分类，又增加了一层监管风险，尤其是 NVIDIA Jetson AGX Orin 计算平台受不断变化的 BIS 出口规则约束。鉴于 $935M Series A
              结构复杂，涉及多个批次和多元投资人类别，证券合规风险也存在；Reg D 文件中的任何误述都会带来 SEC 风险敞口。
