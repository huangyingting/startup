  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与分类
        blocks:
          - type: paragraph
            body: >
              本报告将人形机器人市场定义为：已经商业部署或处于商业化管线中的双足与轮式通用机器人，它们设计用于以人为中心的 环境，与工人协同作业。该定义排除固定臂工业机器人（如
              FANUC、ABB、Kuka）、没有人形形态的自主移动机器人 （AMR，如 Locus、6 River），以及纯软件驱动的自动化。它包括完整双足平台（Figure 02、Boston Dynamics
              Atlas、 Tesla Optimus、Agility Robotics Digit、Unitree G1），也包括轮式 / 腿式混合系统（Apptronik Apollo 轮式配置）。
              这个边界很重要，因为分析师是否纳入所有服务机器人，或仅限双足人形机器人，会让市场规模测算相差 3–10x。


              相关市场分类分三层：第一层是人形机器人硬件和软件市场，这是核心板块；第二层是更广的服务机器人市场，覆盖在 人类环境中运行的非人形平台；第三层是大型相邻空间——工业自动化市场。Apptronik 的 Apollo
              位于第一层与第二层 工业子集的交汇处。公司争夺预算时，既要面对专做人形机器人的竞争者，也要面对特定任务自动化替代方案。


              关键定义争议如下：Goldman Sachs Research（2024 年 1 月）采用更宽的「humanoid robot」定义，把制造、 物流、零售和医疗中的劳动力替代都纳入，得出 2035 年
              $38B、年出货 1.4 million 台的结论。MarketsandMarkets 范围更窄，聚焦当前商业部署和短期可触达的工厂 / 仓库场景，测算结果为 2030 年 $15.26B，基于 2024 年
              $2.0B 基数的 CAGR 为 39.2%。两项估算都是分析师预测，不是经审计市场测量；截至 2026 年初，全球商业部署的人形机器人 不足 2,000 台，因此不确定性很高。
