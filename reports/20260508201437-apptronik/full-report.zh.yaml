      - number: '5.4'
        title: 产品组合、路线图与开发阶段
        blocks:
          - type: paragraph
            body: >
              Apptronik 当前商业产品是 Apollo Gen 1，自 2024 年起已在 Mercedes-Benz、GXO Logistics 和 Jabil 的试点项目中部署。Apollo Gen 1
              针对制造和仓储环境中的重复性结构化任务优化：装配辅助、拣取与放置、物料搬运和分拣。公司此前开发过 15+ 套机器人系统，时间跨度为 2013 年至 2022
              年，覆盖外骨骼、人形躯干平台、双足行走器和机械臂；这些系统沉淀了深厚的自有 IP 和组件技术诀窍，支撑 Apollo 的设计。


              第二代 Apollo 机型自 2025 年起在内部测试，产量已超过上一版。CEO Jeff Cardenas 预计新机型将在 2026 年公开亮相；原目标是 2025
              年，但为进一步打磨硬件而推迟。长期价格目标是单台低于 $50,000，前提是通过 Jabil 的规模化量产实现。除 Apollo 人形机器人产品线外，Apptronik 还运营子公司 Elevate
              Robotics，聚焦非人形重工业自动化，采用轮式机械臂和混合机器人平台，面向超过 Apollo 55-pound 上限的超人类负载任务。截至 2026 年中，California AI 办公室和 Texas
              训练设施均处于规划或建设中，反映出公司正有意从研发组织转向商业化规模运营。
