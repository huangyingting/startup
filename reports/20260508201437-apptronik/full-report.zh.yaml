      - number: '5.5'
        title: 技术风险与关键依赖
        blocks:
          - type: paragraph
            body: >
              Apollo 的技术画像存在多项重大风险。第一，每个电池包 4 小时续航，使每个部署场地都依赖热插拔电池基础设施；若没有预先摆放的满电电池包，机器人利用率就会低于与人类劳动力成本竞争所需的 24/7
              门槛。第二，NVIDIA Jetson AGX Orin 虽是能力不错的嵌入式 AI SoC，但属于消费级和汽车级平台，并非航天认证平台，也受 NVIDIA
              供应链动态和地缘政治出口管制风险影响。第三，Apptronik 目前依赖单一 AI 供应商 Google DeepMind 提供核心 VLA 能力；如果合作关系恶化、出现 IP 归属争议，或 Google
              施加竞争限制，Apollo 的任务泛化路线图可能严重受损。


              第四，包括 Gemini Robotics 在内的当前 VLA 模型存在概率性失效模式；这些失效在研究场景可接受，但在精密制造或误差容忍度接近零的制药装配中，可能直接失去资格。第五，Apollo 重 160
              pounds，跌倒和碰撞风险不可忽视；即使有 Impact Zone 安全功能，机器人在同场人类附近跌倒或掉落负载，仍会带来监管和责任问题。第六，Texas Instruments 的电机控制 IC
              是安全关键执行系统的单一来源；任何供应中断都会迫使公司高成本重新认证替代组件。第七，如果 NVIDIA 芯片出口限制延伸到 Jetson 平台或类似
              SoC，国际部署可能受阻。上述风险共同构成了高度集中的技术依赖画像，需要在公开信息之外对供应商和供应链做深入尽调。
            claimRefs:
              - CE028
              - CE029
              - CE030
              - CE031
              - CE032
              - CE033
              - CE034
      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: TÜV SÜD 安全认证：企业采购敲门砖
            body: >-
              Apollo 的 TI 电机控制系统获得 TÜV SÜD 功能安全认证，是有意义的竞争护城河。Fortune 500 制造商的企业采购团队在把机器人部署到人类工人附近前，需要经认证的安全文件。这项认证让
              Apptronik 相比缺少认证的竞争对手拥有更快销售周期；在正式 ISO/IEC 人形机器人系统级安全标准缺位时，也提供了监管兜底。
            calloutType: strength
            claimRefs:
              - CE003
              - CE026
          - type: callout
            title: Google DeepMind Gemini Robotics VLA：前沿任务泛化
            body: >-
              集成 Google DeepMind 的 Gemini Robotics VLA，让 Apollo 站在任务泛化前沿。不同于需要逐任务重新编程的固定程序机器人，VLA
              驱动平台可以从演示中学习新任务，有可能把部署准备周期从数月缩短到数天。这是相较依赖自研 AI 栈或能力较弱规划模型的人形机器人竞争对手的关键差异点。
            calloutType: strength
            claimRefs:
              - CE010
              - CE011
          - type: callout
            title: 4 小时电池上限与热插拔基础设施依赖
            body: >-
              每个电池包只有 4 小时续航，Apollo 需要在每个工位预先放置满电电池，才能 24/7
              运行。这给客户设施端增加了隐性投资要求，提高初始部署摩擦，也让单纯用机器人成本对比人力成本的算法更复杂，尤其是对规模较小或资本投入较轻的制造场地。
            calloutType: risk
            claimRefs:
              - CE009
              - CE028
          - type: callout
            title: VLA 可靠性缺口与工业制造容错
            body: >-
              包括 Gemini Robotics 在内的当前 VLA 模型存在概率性失效模式；在消费或研究场景可接受，但在精密制造中可能直接失去资格。汽车装配或半导体制造环境，对今天 VLA
              模型所谓“当前最先进水平”的错误率可能接近零容忍。除非机器人错误率在这些环境中追平或优于人类工人，否则 VLA 可靠性会限制任务范围和可服务市场。
            calloutType: risk
            claimRefs:
              - CE030
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户版图与垂直行业划分
        blocks:
          - type: paragraph
            body: >
              Apptronik 的目标客户覆盖多个工业垂直领域：这些场景由人类工人在结构化或半结构化环境中执行重复、体力要求高的任务。公司公开披露了三家试点客户——Mercedes-Benz（汽车制造）、GXO
              Logistics（物流与仓储）和 Jabil（电子制造服务）——以及与 NASA
              的持续研究合作；后者早于公司的商业化转向，并不是创收关系。按近期商业化概率粗略排序，公司内部优先考虑六个垂直领域：（1）一线汽车制造，（2）大规模物流与仓储，（3）电子制造服务（EMS），（4）航空航天与国防，（5）农业，（6）建筑。


              汽车制造是近期优先级最高的垂直领域，因为工厂高度结构化，平面布局可预测，任务需求重复（装配、零件转运、质量检测），且已有稳健安全流程可容纳人机协作。Apollo 的 55-pound
              负载能力和人类尺度形态，匹配常见汽车装配的人体工学需求。Mercedes-Benz 既是试点客户，又是 Series A
              投资方；这既证明了产品兴趣，也可能带来选择偏差——客户关系可能部分由财务纽带维系，而不完全来自运营价值。


              物流与仓储的数量潜力最高，因为全球配送中心数量庞大，且行业存在结构性劳动力短缺。GXO Logistics 是全球最大的第三方物流运营商之一，全球拥有 970 多个设施，2023 年收入约 $9.8
              billion。Apollo 的 RaaS 定价约为每年 $80,000，在美国高生活成本市场可直接与仓库员工的总成本竞争；即便尚未计入通过电池热插拔实现 24/7 运行，部署经济性也相对直观。


              电子制造服务（以收入 $29B 的 Jabil 为代表）需要更高的灵巧度、精度和 ESD（静电放电）安全合规。Jabil 的关系很特殊：它既是试点客户，又是 Apollo
              机器人未来的合同制造商；这一双重角色把客户采纳与供应链合作混在一起，也会在评估试点成功时引入潜在利益冲突。John Deere 于 2026 年 2 月参与 Series A-X
              投资，说明农业是长期战略垂直领域，尽管公司尚未宣布任何农业客户试点。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
              - CU006
              - CU007
