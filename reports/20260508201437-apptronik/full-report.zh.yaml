      - - 失去 Google DeepMind 合作
        - 正式宣布终止或不续签 Gemini Robotics 协议
        - 任何时候
        - 10%
        - 立即下调至放弃；AI 护城河结构性受损
      - - 竞争对手达到商业规模
        - Figure AI 或 Tesla Optimus 外部商业部署超过 10,000 台机器人
        - '2027'
        - 25%
        - 修订 TAM 与市场份额假设；重新评估单位经济性和竞争位置
      - - 安全事故导致试点停摆
        - 重大机器人安全事件触发 OSHA 调查或客户暂停试点
        - 任何时候
        - 15%
        - 持有并监控；行动前先评估监管响应时间线
      - - CEO 离任（Jeff Cardenas）
        - 宣布辞职、被替换或离开高管岗位
        - 任何时候
        - 10%
