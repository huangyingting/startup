  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年的人形机器人市场仍处在早期形成阶段，但很可能是赢家拿走大部分的市场。未来五年，资本集中度、AI 平台访问权
              和制造规模，可能决定最后剩下的两三家公司。可触达市场覆盖汽车制造、物流、仓储、半导体制造、零售补货，以及长期养老。 Goldman Sachs Research 估计，全球人形机器人市场到 2035 年可能达到
              $38 billion，规模化后年出货 1.4 million 台。 International Federation of Robotics 记录的先进制造机器人密度提升，是该市场的宏观顺风。


              竞争者可以分为五类：（1）美国资本充足的纯人形机器人公司（Figure AI、Agility Robotics、1X Technologies、 Sanctuary
              AI）；（2）转向人形机器人的既有机器人平台（Boston Dynamics Atlas）；（3）拥有内部项目的汽车 / 科技巨头 （Tesla
              Optimus）；（4）中国政府支持的挑战者（Unitree、Agibot、UBTech、DEEP Robotics）；（5）既有状态——人工劳动叠加 传统固定自动化。Apptronik
              主要在美国纯人形机器人梯队竞争，但估值低于 Figure AI，也面临来自中国入局者的生存级价格压力。 除 Tesla 内部 Gigafactory 部署和 Amazon 的 Agility Digit
              仓库试点外，还没有人形机器人在商业规模上替代人工。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
      - number: '3.2'
        title: 美国人形机器人竞争者
        blocks:
          - type: paragraph
            body: >
              Figure AI 是 Apptronik 最可比的美国对手。Figure 成立于 2022 年，截至 2025 年 2 月已按 $39 billion 估值融资超过 $2.6 billion，相比
              Apptronik 的 $5 billion 估值，拥有资本和市场认知优势。旗舰 Figure 02 机器人高 5'6"（168 cm）、 重 70 kg、负载 20 kg。其关键 AI 合作伙伴是
              OpenAI，用于视觉-语言-动作（VLA）模型开发；主要工业客户是 BMW， 后者正在 South Carolina Spartanburg 进行试点。Figure 还与 Microsoft Azure
              合作提供推理基础设施。Jeff Beck 担任 CEO。


              Boston Dynamics 由 Hyundai 在 2021 年以约 $1.1 billion 收购（当时据报道估值 $16.25 billion），在所有竞争者中拥有 最深的机器人工程积累。其 Atlas
              人形机器人（1.5 m、89 kg）是动态能力最强的平台，但没有披露商业定价，也没有广泛商业部署。 Boston Dynamics 的商业收入主要来自 Spot（四足机器人，购买价 $75K，部署 1,000+
              台）和 Stretch（物流移动操作机器人）。 据报道，IPO 讨论曾将公司潜在估值定为 $85 billion，但尚未提交文件。


              Tesla Optimus 是最大的单一竞争威胁。截至 2026 年 Q1，Elon Musk 已在 Gigafactory Texas 内部部署 1,000 多台，用于
              电池单元分拣，代表全球唯一确认的商业规模人形机器人部署。Optimus 身高 5'8"、重 57 kg，借用 Tesla 的 FSD/Autopilot AI 栈和庞大的自有训练数据。Musk
              已公开将长期购买价目标设为低于 $20,000，并预计到 2030 年达到 1 million 台。Tesla 在芯片、AI、能源和制造上的纵向一体化，形成了任何创业公司都难以复制的结构性成本优势。


              Agility Robotics 及其 Digit 机器人在 2023 年被 Amazon 以约 $375 million 收购，此前累计融资 $641 million。Digit （5'9"、65 kg、16
              kg 负载、4 小时电池）已部署在 Amazon 履约中心，并瞄准 2026 年 10,000+ 台。CEO Peggy Johnson 正在推动商业化。Amazon 关系带来无可匹敌的部署规模、物流数据和云
              AI（AWS）基础设施。1X Technologies（挪威， OpenAI 支持，融资 $125 million）和 Sanctuary AI（加拿大，Microsoft 支持，融资约 ~$100
              million）仍处于更早阶段， 分别瞄准家庭护理和通用工业任务。
