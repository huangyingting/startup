  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与当前指标
        blocks:
          - type: paragraph
            body: >
              Apptronik 当前约 $5B 的投后估值来自 2026 年 2 月 Series A-X 延展轮，定价为原 Series A 估值的 3 倍。累计融资约 $1B（$14.6M 种子轮，加上 Series A
              各批次超过 $935M），让 Apptronik 跻身全球资本最充足的前三家人形机器人公司，与 Figure AI 和 Tesla Optimus 并列。Reuters 报道中一位知情人士确认了这一估值，SEC
              Form D 文件也提供了佐证。


              公司未公开披露经审计财务报表或正式年经常性收入（ARR）。CEO Jeff Cardenas 称 Series A 前公司创造的收入超过累计融资，意味着 Series A 前收入超过约 $14.6M ——
              但这只是公司说法，缺少独立验证。$5B 估值纯属投资人条款单估值，没有收入倍数锚。按 B Capital 预测的每年 $80,000 RaaS 定价，若要实现 $1B ARR，需要部署约 12,500 台
              Apollo 机器人。B Capital 的 Howard Morgan 预计从 2027 年开始将有 $1B 客户订单，但客户承诺尚未证实这一点。


              风投市场背景支撑了溢价定价：AI 机器人赛道仅 2025 年就融资 $6.1B，较上一年增长 300%，为收入前高估值提供了流动性充裕的背景。Goldman Sachs Research 预计全球人形机器人市场到
              2035 年将达到 $38B，MarketsandMarkets 预计 2030 年达到 $15.26B、CAGR 39.2%。这些 TAM 预测，是投资人愿意给 Apptronik
              这类收入前人形机器人公司数十亿美元估值的基础。
