      - number: '2.2'
        title: 市场规模测算：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              人形机器人的总可用市场（TAM）本质上是劳动力替代逻辑：ILO 估计全球约有 1.4 billion 制造业工人，即使在自动化 程度最高的经济体中，机器人渗透率也低于 5%。Goldman Sachs
              Research（2024 年 1 月）将长期 TAM 描述为到 2035 年达到 $38 billion、年出货 1.4 million 台人形机器人。ARK Invest（2023 Big
              Ideas）把全面普及下的人形 机器人机会建模为 2030 年 $24 trillion——即便乐观者也认为这一数字偏投机。更保守、也更贴近近期的 TAM，是人形机器人 专用硬件 / 软件市场：Grand
              View Research 估计 2024 年为 $2.0B；MarketsandMarkets 预计 2030 年为 $15.26B （CAGR 39.2%）；Goldman Sachs 则给出 2035 年
              $38B。


              Apptronik 的可服务市场（SAM）是今天或未来 3 年内能安全部署人形机器人的结构化工业环境，包括汽车制造装配线 （如轮胎安装、零件搬运）、电子制造（如 PCB 处理、EV 电池组装），以及物流 /
              仓库中的订单履约和货到人作业。 IFR（International Federation of Robotics）估计，全球汽车机器人安装量约为每年 ~130,000 台，物流自动化到 2026 年将是
              $20B+ 的全球市场。按试点垂直场景自下而上拆分，并仅限早期人形机器人部署可行的结构化工业环境， Apptronik 的 SAM 预计到 2030 年为 $5–10B。


              到 2030 年，Apptronik 的可获取市场（SOM）高度取决于试点转商业、产能爬坡和竞争强度。按每台每年 $80K 的 RaaS 价格、2030 年部署 1,000–5,000 台计算，Apptronik
              隐含收入运行率为 $80M–$400M。在 Figure、Tesla Optimus、 Boston Dynamics、1X、Agility/Amazon、Unitree 等竞争强度下，乐观的 5–10% SAM
              份额对应 $250M–$1B SOM， 保守的 1–2% 则对应 $50M–$200M。B Capital 的 Howard Morgan 公开预测，从 2027 年开始客户订单将达到 $1 billion，
              这意味着现有试点需要迅速转向规模化部署。


              VC 投资趋势也印证了市场机会：2025 年，人形机器人公司在 139 笔交易中融资 $6.1B，较 2024 年增长 300%， 说明投资人普遍相信该板块近期商业化潜力。Apptronik 自己在 2026 年
              2 月完成 $520M 融资，也让它成为该领域资本最充足的公司之一。
