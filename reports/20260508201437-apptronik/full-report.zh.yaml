    title: 产品架构图
    summary: Apollo 技术栈自上而下：顶部是 AI 任务规划，中间是边缘计算、安全认证电机控制，底部是机械平台；5G/Wi-Fi 连接贯穿所有软件层。
    approximationNotes: 层级边界为概念划分；实际固件架构是专有技术，未公开记录。层级顺序反映逻辑依赖，不代表物理硬件位置。
    data:
      layers:
        - id: ai-vla
          label: AI / 任务规划 — Gemini Robotics VLA（Google DeepMind / Gemini 3）
          detail: 视觉-语言-动作模型；处理摄像头、LiDAR、力反馈输入和自然语言指令；输出电机指令序列，支撑任务泛化
        - id: perception
          label: 感知 — RGB 摄像头、深度摄像头、LiDAR、IMU、力矩传感器
          detail: 多模态传感套件向 AI 规划层和底层控制输入数据；五指手集成力矩传感器
        - id: motion-planning
          label: 运动控制软件 — 分层规划器 + 关节轨迹生成
          detail: 把 VLA 高层计划桥接为实时关节控制指令；Apptronik 专有固件；sim-to-real、模仿学习和 RL 训练流水线
        - id: compute
          label: 边缘计算 — NVIDIA Jetson AGX Orin（AI SoC）
          detail: 在边缘运行 VLA 和感知模型 AI 推理，不依赖云端；支持 Wi-Fi 6、Gigabit Ethernet、可选 5G 连接
        - id: safety-fw
          label: 安全固件 — TI 电机控制 IC（TÜV SÜD 认证）
          detail: 通过安全认证的实时执行控制，毫秒级响应；用硬件执行 Perimeter Zone 和 Impact Zone 安全约束
        - id: mechanical
          label: 机械平台 — 腿 + 轮、串联弹性执行器、五指手、4 小时热插拔电池
          detail: 5'8"、160 lb、55 lb 载荷；腿轮混合移动适配结构化地面和复杂地形；力控柔顺关节
