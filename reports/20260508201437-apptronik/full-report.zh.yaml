      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              人形机器人可比公司集合仍在早期，估值参照被压缩：多数同行要么仍是私有公司，要么估值来自战略收购，而非独立市场交易。最直接可比对象是 Figure AI：它 2025 年 2 月达到 $39B 估值，累计融资
              $2.6B，拥有 BMW 汽车制造试点和 Microsoft/OpenAI 合作；结构上与 Apptronik 相似（企业试点、AI 合作、商业化阶段接近），但估值是 Apptronik $5B 的 7.8
              倍。这个差距说明，要么 Figure AI 明显高估，要么 Apptronik 随商业化推进有显著上行空间。


              Boston Dynamics 是一个有用先例：公司用二十年从研究走到商业产品。Hyundai 2021 年收购隐含约 $1.1B 企业价值，不过后续估值讨论到 2024 年已把公司放在 $16B
              以上，说明人形机器人资产一旦证明商业表现，估值可大幅抬升。Agility Robotics 2023 年被 Amazon 以估计 $375M
              收购——倍数较低，反映其产品聚焦较窄，且部署主要是自有内部场景，而非外部 RaaS。


              较小的可比对象包括 1X Technologies（挪威；估值约 $500M，融资 $125M，OpenAI 支持）和 Sanctuary AI（加拿大；估计估值约 $750M，融资约
              $100M）。两者商业阶段相近，但估值明显更低，反映 Apptronik 的资本基础和投资人质量更强。UBTech Robotics（香港上市）提供公开市场参照，市值约 HKD $2B（~USD
              $255M）；Unitree 等中国厂商采用产品销售模式，机器人价格为 $16,000-$70,000，对 RaaS 模型形成结构性价格压力，而不是直接股权可比。


              总体看，Apptronik 的 $5B 估值处在可辩护的中间位置：显著低于 Figure AI 的离群估值，明显高于收购阶段同行，并相对公开市场 UBTech 锚点享有溢价——这反映了 AI
              原生定位和顶级投资人背书。
