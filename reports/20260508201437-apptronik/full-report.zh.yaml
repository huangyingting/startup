      - number: '5.2'
        title: AI 与软件架构
        blocks:
          - type: paragraph
            body: >
              Apptronik 的 AI 策略以 2024 年 12 月宣布的 Google DeepMind 战略合作为锚点。该合作把 DeepMind 的 Gemini Robotics
              视觉-语言-动作（VLA）模型，以及更广泛的 Gemini 3 多模态 AI 平台，集成进 Apollo 的软件栈。Gemini Robotics 是大规模 VLA
              模型，可处理视觉观察和自然语言指令，并直接生成电机控制命令，让 Apollo 无需为每项任务重新编程，也能在多样任务之间泛化。相比每项新任务都需要显式编码的固定程序工业机器人，这是有意义的架构优势。


              控制架构采用分层设计：高层规划模块——VLA 层——解析任务指令，拆解成子目标序列，并向中层运动规划器发出命令。运行在 TI 安全认证子系统上的底层电机控制器，以毫秒级精度执行关节轨迹。这种分层设计让 AI
              推理层可以独立于安全关键电机控制固件更新，在 AI 改进过程中保留认证完整性。学习方法包括仿真到现实迁移（先在物理精确的仿真中训练，再部署到硬件）、从人类演示中进行模仿学习，以及强化学习微调。Apptronik
              计划在 Texas 建设先进机器人训练和数据采集设施，加速真实世界数据飞轮，持续改进面向 Apollo 特定任务的 Gemini Robotics。California 办公室是主要 AI 和软件工程中心。
            claimRefs:
              - CE010
              - CE011
              - CE012
              - CE013
              - CE014
              - CE038
      - number: '5.3'
        title: 安全、认证与质量体系
        blocks:
          - type: paragraph
            body: >
              Apollo 的电机控制系统使用 Texas Instruments 芯片，并由 TÜV SÜD 独立认证符合功能安全要求。TÜV SÜD
              是全球领先的技术检验和认证机构之一，其认证在欧洲和全球制造安全审计中被广泛接受。截至 2026 年，工业场景下与人协作的人形机器人尚无正式发布的 ISO 或 IEC 安全标准；相关 IEC
              工作组标准仍在推进，最终完成时间尚未确认。Apptronik 的做法是在组件层面套用功能安全方法，而不是等待顶层系统标准。这一务实路径已帮助公司进入 Mercedes-Benz、GXO Logistics 和
              Jabil 的企业采购流程。


              Apollo 内置两层硬件安全机制：Perimeter Zone 是可配置的软件定义排除边界，当系统在设定半径内检测到人或物体时，机器人会暂停移动；Impact Zone
              是接触力限制系统，检测到意外接触力时会停止或反向运动，防止伤及同场工作的人员。Apollo 按美国 OSHA
              制造环境标准设计，并已在试点部署中验证可与人类协作。公司内部质量标准要求，任何以视频形式公开展示的能力，在披露前都必须能现场、当面、可靠地完整复现。
            claimRefs:
