            body: >-
              $80K/year 的 RaaS 定价来自投资人 Howard Morgan，而不是 Apptronik 官方材料。公司未披露毛利率、合同价值或
              ARR。这是最重要的单一财务尽调缺口——没有毛利数据，就无法评估资本效率、单位经济可持续性或盈利路径。
            calloutType: risk
            claimRefs:
              - CI009
              - CI028
              - CI029
          - type: callout
            title: 顶级投资人集团提供商业验证
            body: >-
              战略投资方 Mercedes-Benz、John Deere、AT&T Ventures、Jabil、Japan Post Capital 和 RyderVentures
              同时代表资本和潜在优先客户渠道。Qatar Investment Authority 与 Goldman Sachs 的研究覆盖，则传递出超越纯风险资本的机构级财务验证信号。
            calloutType: strength
            claimRefs:
              - CI004
