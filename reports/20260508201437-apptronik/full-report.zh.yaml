      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Apptronik 的技术栈集中在少数单一来源或单一供应商关系上。最关键依赖是 Google DeepMind 的 Gemini Robotics VLA，它提供了让 Apollo 区别于上一代机器人的 AI
              能力。如果 Google DeepMind 合作终止、Google 调整机器人 AI 战略，或 Gemini Robotics 模型线停用，Apptronik 将需要从零重建 AI
              栈，或集成尚未验证的替代方案，造成 12-24 个月倒退。公司未披露任何备用 AI 供应商。


              NVIDIA 是 Apollo 的唯一计算平台供应商（Jetson AGX Orin）。作为主导 AI 芯片供应商，NVIDIA 拥有显著定价权，并可单方面调整价格、分配或条款。Texas Instruments
              提供支撑 Apollo 功能安全认证的电机控制解决方案；TI 是该安全关键系统披露的单一来源供应商，意味着任何供应中断，或 TI 战略性退出该市场，都可能让 Apollo 生产停摆。Jabil
              兼具制造合作伙伴和试点客户双重角色，形成结构性利益冲突：作为客户，Jabil 有动力谈到尽可能低的 RaaS 费率；作为合同制造商，Jabil 又能看到 Apollo 成本结构，并可能在谈判中利用这一信息。


              客户集中度风险重大：三家已知试点客户（Mercedes-Benz、GXO Logistics、Jabil）基本代表了 Apptronik
              披露商业关系的全部。失去任一单一关系——尤其是试点无法转化为商业部署——都会抹去近期收入潜力的重要部分，并损害市场信心。Apptronik 仍处于商业化前，依赖持续 VC
              融资；若资本市场整体收缩，或机器人投资者情绪逆转，公司为 2027 年商业化爬坡目标提供运营资金的能力可能受限。
