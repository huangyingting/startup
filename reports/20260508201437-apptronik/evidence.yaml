      Burn rate directly determines runway from the $935M+ capital base. Underestimating burn creates risk of an
      earlier-than-anticipated capital need, potentially triggering a down round or dilutive bridge.
    diligencePath: >-
      Request monthly burn rate data, P&L, and cash flow statements in data room. Validate against payroll confirmations
      and vendor spend.
    relatedQuestionRefs:
