company:
  name: Apptronik
chapter:
  number: 1
  title: "Company Overview"
  summary: |
    Apptronik is an Austin, Texas-based humanoid robotics company founded in 2016 as a spinout from the University of Texas at Austin's Human Centered Robotics Lab. Its flagship product, Apollo, is a commercial general-purpose humanoid robot targeting manufacturing and logistics via a Robotics-as-a-Service (RaaS) model. The company has raised approximately $1 billion across a seed round and Series A, reaching a ~$5 billion valuation in February 2026. With approximately 350 employees as of April 2026, three active pilot customers (Mercedes-Benz, GXO Logistics, Jabil), and a strategic AI partnership with Google DeepMind, Apptronik is positioned as one of the best-capitalized humanoid robotics companies in the world. No pilots have yet converted to disclosed commercial contracts.

sections:
  - id: S01
    title: "Company Identity and Business Model"
    body: |
      Apptronik is an Austin, Texas-based humanoid robotics company founded in 2016 as a commercial spinout from the Human Centered Robotics Lab (HCRL) at the University of Texas at Austin. The company develops AI-powered general-purpose humanoid robots intended to operate in industrial environments alongside humans. Its flagship product, Apollo, is a 5-foot-8-inch, 160-pound humanoid robot capable of carrying 55-pound payloads and operating for four hours per battery pack. Apollo features NVIDIA Jetson AGX Orin compute hardware, TI motor-control solutions with TÜV SÜD functional safety certification, hot-swappable batteries, and a configurable Perimeter Zone and Impact Zone safety system. The robot is available in both legged and wheeled configurations, with CEO Jeff Cardenas noting that early industrial demand favors wheeled variants for their lower cost and safer operation near humans, while legged systems have a higher long-term ceiling.

      Apptronik's business model is Robotics-as-a-Service (RaaS), pricing Apollo at approximately $80,000 per year per unit, which encompasses robot hardware, software updates, and ongoing service and support. The company targets manufacturing, logistics, and warehousing as its initial commercial verticals, with longer-term plans for retail, healthcare, and eldercare applications. Apptronik frames Apollo as "one robot to do thousands of tasks" rather than deploying task-specific machines, emphasizing flexibility, safety, and human-centered design as core differentiators. The company's target long-term unit price is below $50,000. Headquarters are at 11701 Stonehollow Dr, Suite 150, Austin, TX 78758, with a California office planned.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]

  - id: S02
    title: "Founders, Leadership, and Governance"
    body: |
      Apptronik was co-founded in 2016 by Jeff Cardenas (CEO), Nick Paine (CTO), Bill Helmsing, and Dr. Luis Sentis (Chief Scientist), all emerging from the UT Austin HCRL. Jeff Cardenas is the primary public spokesperson, fundraising driver, and strategic decision-maker. Dr. Luis Sentis, a tenured professor at UT Austin and HCRL director, contributes ongoing academic robotics research depth as Chief Scientist while maintaining his academic role. Nick Paine leads technical development as CTO. Bill Helmsing is a co-founding engineer.

      The company has significantly expanded its executive team in 2024 through 2026. Greg Steele joined as COO in April 2024 with Boston Dynamics operational background. Kay Sheils Kingsbury serves as CFO and Barry Phillips as CCO. Steven Riddle is VP of Engineering. In April 2026, Apptronik announced a major wave of executive hires: Daniel Chu joined as Chief Product Officer, having previously served as CPO at Waymo (where he helped launch the world's first fully autonomous ride-hailing service) and CPO at 23andMe; Kevin Garell joined as SVP of Services and Support, previously having led global services at Boston Dynamics; Chirag Shah joined as VP of Software, previously a software executive at Amazon for Kindle and Alexa+.

      Key-person risk is concentrated around CEO Jeff Cardenas, who is the company's primary public face and has driven all major fundraising. The board composition and governance structure have not been publicly disclosed. Howard Morgan of B Capital, the lead investor, has been an active external champion. The wave of April 2026 senior hires from Waymo, Boston Dynamics, and Amazon signals a deliberate transition from an R&D organization to a commercial-scale operation.
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012]

  - id: S03
    title: "Funding History and Investor Composition"
    body: |
      Apptronik has raised approximately $1 billion in total capital across multiple rounds since its founding. The earliest disclosed institutional round was a seed of approximately $14.6 million in 2022, led by Grit Ventures and Perot Jain. In February 2025, the company closed an initial $350 million Series A co-led by B Capital Group and Capital Factory, with Google/DeepMind participation and approximately 170 employees. One month later, in March 2025, the Series A was extended to approximately $415 million, adding Mercedes-Benz, Japan Post Capital, ARK Invest, Helium-3, Magnetar Capital, RyderVentures, and Korea Investment Partners. In November 2025, SEC Form D filings disclosed an additional $331 million raise, confirming a $5 billion valuation. In February 2026, Apptronik announced a $520 million Series A-X extension with participation from existing investors (B Capital, Google, Mercedes-Benz, PEAK6) and new investors AT&T Ventures, John Deere, and the Qatar Investment Authority, bringing total Series A funding to over $935 million and total capital raised to nearly $1 billion. The Series A-X was priced at a 3x multiple of the original Series A valuation.

      Howard Morgan of B Capital publicly projected $1 billion in customer orders starting 2027. Strategic investors including Mercedes-Benz, John Deere, AT&T Ventures, and Jabil represent both capital and potential preferred customer or manufacturing relationships. Google/DeepMind's investment ties directly to the Gemini Robotics AI partnership. John Deere's participation hints at future ag-tech applications per the CEO's public comments.
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO029]

  - id: S04
    title: "Scale, Headcount, and Key Milestones"
    body: |
      Apptronik's workforce has grown substantially alongside its fundraising trajectory, from approximately 170 employees at the February 2025 Series A announcement to approximately 300 by February 2026 and approximately 350 by April 2026. The company began its humanoid robotics work in 2013 when the founding team at UT Austin's HCRL participated in the NASA-DARPA Robotics Challenge with the Valkyrie humanoid robot. Over its history, Apptronik has developed more than 15 robotic systems, including exoskeletons, humanoid torsos, bipedal platforms, and robotic arms.

      Apollo, the first commercial product, was publicly unveiled in 2023. Key deployment milestones include a Mercedes-Benz pilot launched in March 2024, a GXO Logistics warehouse pilot, and a Jabil pilot plus manufacturing partnership announced in February 2025. In December 2024, a strategic Google DeepMind AI partnership was announced. A new Apollo model has been under internal testing since 2025 and was anticipated for public debut in 2026; CEO Jeff Cardenas acknowledged the reveal was delayed from the original 2025 plan, emphasizing his standard that anything shown in a video must be demonstrable in person. CEO Cardenas stated that prior to the Series A, Apptronik generated more revenue than capital raised, though no specific ARR figures have been disclosed. As of mid-2026, no customer pilot has been publicly announced as graduating to full commercial deployment.
    claimRefs: [CO019, CO020, CO021, CO022, CO031, CO032, CO037]

callouts:
  - calloutType: insight
    title: "RaaS Economics vs. Labor Costs"
    body: "At approximately $80K per year, Apollo's RaaS pricing is roughly comparable to a single industrial worker's fully-loaded annual cost, making the economics potentially compelling for labor-constrained customers in manufacturing and logistics without requiring large upfront capital expenditure."
    claimRefs: [CO006]
  - calloutType: strength
    title: "Decade-Plus Humanoid Heritage"
    body: "NASA DARPA Robotics Challenge origins (2013) and 15+ prior robotic systems give Apptronik substantially more humanoid robotics IP and real-world engineering experience than most newer market entrants, including Figure AI (founded 2022) and 1X Technologies."
    claimRefs: [CO031]
  - calloutType: risk
    title: "Pilots Not Yet Converted to Commercial Contracts"
    body: "As of February 2025 reporting, all three known customer relationships (Mercedes-Benz, GXO Logistics, Jabil) remain at the pilot stage. No pilot-to-commercial conversion has been publicly announced. This is a material commercial execution risk as the company targets scaling in 2026-2027."
    claimRefs: [CO022]
  - calloutType: risk
    title: "Key-Person Concentration"
    body: "CEO Jeff Cardenas is the company's primary fundraiser, public spokesperson, and strategic decision-maker. No succession plan or board governance details have been disclosed publicly."
    claimRefs: [CO008]
  - calloutType: strength
    title: "Elite Executive Team Built for Scale"
    body: "The April 2026 executive hires from Waymo (CPO Daniel Chu), Boston Dynamics (SVP Services Kevin Garell), and Amazon (VP Software Chirag Shah) signal the company has deliberately assembled a world-class commercialization team with deep experience in autonomous systems, field deployment, and AI platforms."
    claimRefs: [CO010, CO011, CO012]

