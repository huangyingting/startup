callouts:
  - calloutType: strength
    title: 'TÜV SÜD Safety Certification: Enterprise Procurement Enabler'
    body: >-
      Apollo's TI motor-control system's TÜV SÜD functional safety certification is a meaningful competitive moat.
      Enterprise procurement teams at Fortune 500 manufacturers require certified safety documentation before deploying
      robots near human workers. This certification gives Apptronik a faster sales cycle than competitors who lack it,
      and provides regulatory cover in the absence of a formal ISO/IEC humanoid robot system-level safety standard.
    claimRefs:
      - CE003
      - CE026
  - calloutType: strength
    title: 'Google DeepMind Gemini Robotics VLA: State-of-the-Art Task Generalization'
    body: >-
      The integration of Google DeepMind's Gemini Robotics VLA positions Apollo at the frontier of task generalization.
      Unlike fixed-program robots requiring per-task reprogramming, a VLA-powered platform can learn new tasks from
      demonstrations, potentially reducing deployment lead time from months to days. This is a key differentiator versus
      humanoid competitors relying on proprietary in-house AI stacks or less capable planning models.
    claimRefs:
      - CE010
      - CE011
  - calloutType: risk
    title: 4-Hour Battery Ceiling and Hot-Swap Infrastructure Dependency
    body: >-
      At 4 hours per battery pack, Apollo requires pre-positioned charged batteries at every workstation for 24/7
      operation. This creates a hidden customer facility investment requirement that adds friction to initial
      deployments and complicates the pure cost-of-robot comparison with human labor, particularly for smaller or less
      capital-intensive manufacturing sites.
    claimRefs:
      - CE009
      - CE028
  - calloutType: risk
    title: VLA Reliability Gap vs. Industrial Manufacturing Tolerance
    body: >-
      Current VLA models, including Gemini Robotics, exhibit probabilistic failure modes that are acceptable in consumer
      or research settings but potentially disqualifying in precision manufacturing. An automotive assembly or
      semiconductor fabrication environment may have near-zero tolerance for the error rates that are 'state of the art'
      for a VLA model today. Until robot error rates match or exceed human worker error rates in these environments, VLA
      reliability is a commercial ceiling on task scope and addressable market.
    claimRefs:
      - CE030
