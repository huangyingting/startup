  - id: SE03
    title: Safety, Certification, and Quality Systems
    body: >
      Apollo's motor-control system uses Texas Instruments silicon independently certified by TÜV SÜD for functional
      safety. TÜV SÜD is one of the world's leading technical inspection and certification bodies, and its certification
      is widely accepted in European and global manufacturing safety audits. No official ISO or IEC safety standard for
      co-working humanoid robots in industrial settings has been published as of 2026; a relevant IEC working group
      standard is in process but without a confirmed finalization date. Apptronik addresses this gap by applying
      functional safety methodologies at the component level rather than waiting for a top-level system standard, a
      pragmatic approach that has enabled enterprise procurement at Mercedes-Benz, GXO Logistics, and Jabil.


      Two hardware safety layers are built into Apollo: the Perimeter Zone is a configurable software-defined exclusion
      boundary that pauses robot movement when humans or objects are detected within a set radius; the Impact Zone is a
      contact force-limiting system that stops or reverses motion when unexpected contact forces are detected,
      preventing injury to co-workers. Apollo is designed to U.S. OSHA standards for manufacturing environments and has
      been validated for co-working with humans across its pilot deployments. An internal quality standard mandates that
      any capability demonstrated publicly in video form must be fully reproducible live, in person, and reliably before
      disclosure.
    claimRefs:
