  - id: SE02
    title: AI and Software Architecture
    body: >
      Apptronik's AI strategy is anchored by a strategic partnership with Google DeepMind announced in December 2024.
      The partnership integrates DeepMind's Gemini Robotics Vision-Language-Action (VLA) model and the broader Gemini 3
      multimodal AI platform into Apollo's software stack. Gemini Robotics is a large-scale VLA model capable of
      processing visual observations and natural language instructions to generate motor control commands directly,
      enabling Apollo to generalize across diverse tasks without per-task reprogramming. This is a meaningful
      architectural advantage over fixed-program industrial robots that require explicit coding for each new task.


      The control architecture is hierarchical: a high-level planning module—the VLA layer—interprets task instructions,
      decomposes them into sub-goal sequences, and issues commands to a mid-level motion planner. A low-level motor
      controller running on the TI safety-certified subsystem executes joint trajectories with millisecond precision.
      This layered design allows the AI reasoning layer to be updated independently of the safety-critical motor control
      firmware, preserving certification integrity during AI improvements. Learning methods include simulation-to-real
      transfer (training in physics-accurate simulation before hardware deployment), imitation learning from human
      demonstrations, and reinforcement learning fine-tuning. Apptronik plans a state-of-the-art robot training and data
      collection facility in Texas to accelerate the real-world data flywheel that continuously improves Gemini Robotics
      for Apollo-specific tasks. A California office serves as the primary AI and software engineering hub.
    claimRefs:
      - CE010
      - CE011
      - CE012
      - CE013
      - CE014
