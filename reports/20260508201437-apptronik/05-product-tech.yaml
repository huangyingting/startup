  evidenceGaps:
    - id: EE001
      type: private-evidence-only
      severity: material
      topic: pilot reliability metrics
      missingEvidence: >-
        No quantitative reliability, uptime, or task error-rate statistics from any Apollo pilot deployment have been
        publicly disclosed. Performance data from Mercedes-Benz, GXO Logistics, and Jabil pilots is not publicly
        available.
      whyItMatters: >-
        Robot uptime and error rates are the primary metrics determining whether the RaaS model is economically
        competitive with human labor. Without them, the commercial case for Apollo at scale is unverifiable from public
        evidence.
      diligencePath: >-
        Request pilot performance dashboards, MTBF/MTTR data, and task completion rate logs from Apptronik under NDA.
        Cross-check with pilot customer references.
      relatedQuestionRefs:
        - QE023
      relatedTableRefs:
        - TE002
    - id: EE002
      type: missing-source
      severity: minor
      topic: IEC humanoid safety standard timeline
      missingEvidence: >-
        The IEC working group developing a co-working humanoid robot safety standard has not published a draft, public
        ballot schedule, or confirmed finalization timeline as of May 2026.
      whyItMatters: >-
        The absence of a system-level safety standard creates regulatory uncertainty for enterprise procurement in
        regulated industries. A finalized standard could either validate Apptronik's component-level approach or require
        product modifications and re-certification.
      diligencePath: >-
        Monitor IEEE Spectrum, TÜV SÜD publications, and IEC TC62/SC62E for draft standard releases. Contact working
        group directly for scope and timeline.
      relatedQuestionRefs:
        - QE024
      relatedTableRefs:
        - TE004
    - id: EE003
      type: missing-source
      severity: minor
      topic: Apollo cybersecurity posture
      missingEvidence: >-
        No public security audit, CVE disclosures, penetration testing results, or SOC 2 Type II equivalent attestation
        for Apollo's network connectivity stack, remote management interface, or AI inference pipeline has been
        published.
      whyItMatters: >-
        A connected 160-pound industrial robot is a high-value target for cyber-physical attack in high-security
        manufacturing environments. Unaddressed vulnerabilities create product liability and customer trust risks,
        especially for automotive and defense-adjacent deployments.
