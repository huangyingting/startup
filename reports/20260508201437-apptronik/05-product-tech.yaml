  - id: FE004
    type: matrix
    layout: wide
    title: Product maturity / capability map
    summary: >-
      Technology readiness of Apollo's core capability areas on a 1–9 TRL scale, with current status, 2026 target, key
      dependency, and primary risk noted for each capability dimension.
    approximationNotes: >-
      TRL ratings are analyst estimates based on public pilot evidence and company disclosures. Apptronik has not
      published internal TRL assessments. Ratings reflect operational readiness, not theoretical development stage.
    data:
      columns:
        - Current TRL (1-9)
        - Current Status
        - 2026 Target TRL
        - Key Dependency
        - Primary Risk
      rows:
        - label: Basic Manipulation — Pick & Place, Material Handling
          values:
            - '7'
            - Pilot-ready; active automotive and logistics deployments
            - '8'
            - Gemini Robotics VLA fine motor commands
            - VLA error rate at production-grade precision tolerance
        - label: Wheeled Navigation (Indoor Structured Environments)
          values:
            - '8'
            - Production-ready; preferred configuration across all pilots
            - '9'
            - TI motor control ICs; NVIDIA Jetson Orin
            - NVIDIA supply chain and export control exposure
        - label: Bipedal Locomotion (Stairs, Ramps, Uneven Terrain)
          values:
            - '6'
            - Active development; limited use in current pilots
            - '7'
            - Custom series-elastic actuators; balance control firmware
            - Higher energy consumption and fall risk vs. wheeled mode
        - label: Task Generalization via VLA (New Tasks from Demos)
          values:
            - '5'
            - Beta integration; limited to piloted task categories; hallucination risk
            - '7'
            - Google DeepMind Gemini Robotics partnership continuity
            - Single-vendor AI lock-in; VLA reliability gap at industrial tolerance
        - label: Human Co-work Safety (TÜV SÜD Certified Component)
          values:
            - '7'
            - Component-level certified; system-level standard pending
            - '8'
            - IEC working group standard (not yet published)
            - No system-level ISO/IEC humanoid standard; procurement uncertainty
        - label: 24/7 Continuous Operation (Hot-Swap Battery)
          values:
            - '7'
            - Available; requires pre-positioned battery infrastructure at site
            - '8'
            - Jabil manufacturing scale for battery packs
            - Customer facility investment requirement adds deployment friction
        - label: Dexterous Manipulation (5-Finger Fine Motor Tasks)
          values:
            - '6'
            - Active in pilots; limited task scope vs. specialized end-effectors
            - '7'
            - Force-torque sensors; VLA fine motor control models
            - Mean time between repairs at sustained industrial cycle rates
        - label: Fleet Management and Remote Monitoring
          values:
            - '5'
            - Early stage; Wi-Fi and optional 5G connectivity enabled
            - '7'
            - AT&T 5G partnership; Apptronik software platform maturity
            - Network reliability in electromagnetically noisy industrial plants
