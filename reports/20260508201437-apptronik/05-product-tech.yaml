  - id: SE04
    title: Product Portfolio, Roadmap, and Development Stage
    body: >
      Apptronik's current commercial product is Apollo Gen 1, actively deployed in pilot programs at Mercedes-Benz, GXO
      Logistics, and Jabil since 2024. Apollo Gen 1 is optimized for repetitive structured tasks in manufacturing and
      warehouse environments: assembly assistance, pick-and-place, material transport, and sorting. The company's 15+
      prior robotic systems—developed between 2013 and 2022—span exoskeletons, humanoid torso platforms, bipedal
      walkers, and robotic arms, providing deep proprietary IP and component know-how that underpins Apollo's design.


      A second-generation Apollo model has been under internal testing since 2025, with more units produced than the
      prior version. CEO Jeff Cardenas expects the new model's public debut in 2026, having delayed from an original
      2025 target to allow additional hardware refinement. The long-term price target is below $50,000 per unit,
      achievable through Jabil volume manufacturing at scale. Alongside the Apollo humanoid line, Apptronik operates
      Elevate Robotics, a subsidiary focused on non-humanoid heavy industrial automation using wheeled arms and hybrid
      robotic platforms suited to superhuman payload tasks that exceed Apollo's 55-pound limit. The California AI office
      and Texas training facility, both planned or in development as of mid-2026, reflect the company's deliberate shift
      from R&D organization to commercialization-scale operation.
