    type: stack
    layout: wide
    title: Product architecture map
    summary: >-
      Apollo's technology stack from AI task planning at the top through edge compute, safety-certified motor control,
      and the mechanical platform at the base, with 5G/Wi-Fi connectivity spanning all software layers.
    approximationNotes: >-
      Layer boundaries are conceptual; actual firmware architecture is proprietary and not publicly documented. Layer
      ordering reflects logical dependency, not physical hardware placement.
