chapter:
  number: 5
  title: Product & Technology
  summary: >
    Apollo, Apptronik's flagship humanoid robot, is a 5-foot-8-inch, 160-pound general-purpose platform featuring NVIDIA
    Jetson AGX Orin compute, Texas Instruments motor-control ICs certified by TÜV SÜD for functional safety, dexterous
    five-fingered hands, and a unique hybrid leg-plus-wheel mobility system. The AI stack centers on Google DeepMind's
    Gemini Robotics Vision-Language-Action (VLA) model integrated through a hierarchical control architecture combining
    high-level task planning with low-level motor control. A configurable Perimeter Zone and Impact Zone safety system
    enables co-working with humans in automotive, logistics, and manufacturing environments. Key technology risks
    include a 4-hour battery ceiling, single-vendor AI dependence on Google DeepMind, NVIDIA Jetson supply-chain
    exposure, and the reliability gap between current VLA models and the near-zero error tolerance of industrial
    manufacturing. The 2026 roadmap targets a second-generation Apollo at higher production volumes, a long-term unit
    price below $50K, and a parallel Elevate Robotics subsidiary for non-humanoid heavy industrial automation.
sections:
  - id: SE01
    title: Apollo Hardware Platform and Physical Specifications
    body: >
      Apollo stands 5 feet 8 inches tall (1.73 m), weighs 160 pounds (72.5 kg), and carries a 55-pound (25 kg) payload.
      Each hot-swappable battery pack delivers 4 hours of runtime, enabling continuous 24/7 operation in production
      environments with an appropriate battery-swap infrastructure in place. Compute is provided by NVIDIA Jetson AGX
      Orin, a high-performance embedded AI SoC originally designed for autonomous machines and robotics, enabling
      real-time inference for perception and planning at the edge. Motor control relies on Texas Instruments silicon
      that has been independently certified to functional safety standards by TÜV SÜD, a globally recognized safety
      testing organization, providing a component-level safety credential in the absence of a published system-level
      humanoid standard.


      Apollo's sensor suite includes five-fingered dexterous hands with integrated force-torque sensors, RGB and depth
      cameras for visual perception, LiDAR for environment mapping, and inertial measurement units (IMUs) for
      proprioceptive state estimation. Connectivity options include Wi-Fi 6, Gigabit Ethernet, and optional 5G, the last
      enabled by AT&T's strategic investment. A unique design feature is the hybrid mobility system: Apollo can operate
      on two articulated legs for stairs, ramps, and complex terrain, or switch to wheeled locomotion for faster, more
      energy-efficient indoor navigation. CEO Jeff Cardenas has noted that early industrial customers predominantly
      favor the wheeled configuration for safety and efficiency reasons, while legged capability is retained for
      long-term versatility. Force-controlled series-elastic actuators throughout the frame yield under unexpected
      external forces, improving both human co-working safety and mechanical longevity at high industrial cycle rates.
