callouts:
  - id: KI001
    calloutType: risk
    title: Speculative Valuation Multiple
    body: >-
      At $5B with estimated pre-commercial revenue of $15–30M, Apptronik's implied revenue multiple of 167–333× is
      extremely high even for deep-tech robotics. While comparable to venture-stage AI companies, this multiple leaves
      almost no margin for commercial execution slippage. Any delay in pilot-to-contract conversion, RaaS pricing
      pressure, or manufacturing scale challenges could trigger a down round.
    claimRefs:
      - CI021
      - CI022
  - id: KI002
    calloutType: risk
    title: No Confirmed Revenue Terms or Gross Margin Data
    body: >-
      The $80K/year RaaS pricing is attributed to investor Howard Morgan, not Apptronik's official materials. No gross
      margin, contract values, or ARR are disclosed. This is the single most material financial diligence gap — without
      margin data, it is impossible to assess capital efficiency, unit economics sustainability, or path to
      profitability.
    claimRefs:
      - CI009
      - CI028
      - CI029
  - id: KI003
    calloutType: strength
    title: Elite Investor Syndicate Provides Commercial Validation
    body: >-
      Strategic investors Mercedes-Benz, John Deere, AT&T Ventures, Jabil, Japan Post Capital, and RyderVentures
      represent both capital and potential preferred customer channels. Qatar Investment Authority and Goldman Sachs
      research coverage signal institutional-grade financial validation beyond pure venture capital.
    claimRefs:
      - CI004
      - CI005
      - CI006
      - CI024
  - id: KI004
    calloutType: insight
    title: RaaS vs. Labor Cost Parity
    body: >-
      At $80K/year per robot, Apollo's RaaS pricing is roughly equivalent to the fully-loaded annual cost of one U.S.
      industrial worker. If unit costs decline to the <$50K target, Apollo would offer cost parity plus productivity
      multipliers (24/7 operation, no benefits). This creates a credible, near-term economic rationale for manufacturing
      and logistics customers.
    claimRefs:
      - CI011
      - CI012
