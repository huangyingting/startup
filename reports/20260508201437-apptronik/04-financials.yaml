  - id: SI04
    title: Valuation and Capital Adequacy
    body: >
      At $5 billion as of February 2026, Apptronik's valuation implies a substantial revenue multiple on what is
      understood to be pre-commercial revenue. For context: if the company is generating $15–30 million in revenue
      (implied by the CEO's pre-Series A revenue claim and any subsequent pilot fees), the revenue multiple is
      approximately 167–333× trailing revenue — an extremely high speculative multiple consistent with venture-stage
      deep-tech companies that are valued on future commercial potential rather than current financials.


      The valuation can be better contextualized by comparing to public peers and precedent transactions. Boston
      Dynamics was acquired by Hyundai for approximately $1.1 billion in 2021 when it had limited commercial revenue,
      and has since been valued at $16.25 billion by Hyundai. Figure AI, which has raised $2.6B+, carries a reported $39
      billion valuation — approximately 8× Apptronik's valuation on roughly twice the capital. Agility Robotics was
      acquired by Amazon for approximately $375 million. Among humanoid robotics peers, the average total funding per
      company was $300–600 million in the 2024–2025 cycle; Apptronik's $1.28B positions it in the top 3 globally.


      The 3× step-up from original Series A to Series A-X valuation reflects strong investor demand and market momentum,
      not necessarily documented revenue progress. Goldman Sachs Research forecasts the global humanoid robot market at
      $38 billion by 2035 with approximately 1.4 million annual shipments — a market that would require major commercial
      players like Apptronik to succeed. ARK Invest's inclusion as an investor provides an additional public-market
      signal of long-term technology conviction. SEC Form D filings for both the main Apptronik entity (April 2026) and
      the Apptronik I series (September 2025) provide regulatory confirmation of the capital raises, offering
      primary-tier evidence of the funding quantum and structural terms.
    claimRefs:
      - CI021
      - CI022
      - CI023
      - CI024
      - CI025
