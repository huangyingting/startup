    layout: wide
    title: Revenue model bridge
    summary: >-
      How Apptronik moves from current revenue sources (NASA contracts, pilot fees, R&D services) through RaaS pilot
      conversion to projected full commercial RaaS revenue at scale, illustrating the commercial model progression.
    approximationNotes: >-
      Revenue figures at each node are analyst estimates based on CEO public statements and investor projections; not
      company-confirmed. The $1B orders projection is Howard Morgan's (B Capital) public forecast for 2027, not
      Apptronik guidance.
