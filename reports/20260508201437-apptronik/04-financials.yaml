company:
  name: Apptronik
chapter:
  number: 4
  title: Financials
  summary: >
    Apptronik has raised approximately $1.28 billion in total capital across a ~$14.6M seed round (2022) and a Series A
    cycle totaling over $935M (February 2025 – February 2026), achieving a $5 billion valuation as of February 2026. The
    company's planned revenue model is Robotics-as-a-Service (RaaS) at ~$80,000 per robot per year — a projection
    publicly attributed to lead investor B Capital's Howard Morgan rather than disclosed in official pricing materials.
    CEO Jeff Cardenas stated that Apptronik generated more revenue than capital raised prior to the Series A (implying
    >~$14.6M), but no ARR, gross margin, EBITDA, or audited financials have been publicly disclosed. Current revenue
    derives from NASA R&D contracts, pilot fees, and early deployments; no pilot has converted to a disclosed commercial
    contract. Estimated annual burn rate of $100–200M and runway of approximately 4–7 years based on headcount and
    engineering intensity. At a $5B valuation with pre-commercial revenue, Apptronik carries a highly speculative
    multiple, though institutional validator signals (QIA, John Deere, ARK Invest, Goldman Sachs research coverage)
    provide market credibility. Key unresolved financial data gaps include gross margin, confirmed contract values,
    manufacturing unit cost, and precise burn rate.
sections:
  - id: SI01
    title: Funding History and Capital Structure
    body: >
      Apptronik's capital formation reflects a step-function trajectory from a modest seed round to one of the largest
      Series A pools in humanoid robotics history. The company's first institutional round was a seed of approximately
      $14.6 million in 2022 led by Grit Ventures and Perot Jain, providing capital for early Apollo hardware development
      and team formation. In February 2025, the company announced an initial $350 million Series A co-led by B Capital
      Group and Capital Factory, with Google/DeepMind participation, at a time when the company had approximately 170
      employees. This round was quickly extended in March 2025 to approximately $415 million with the addition of
      Mercedes-Benz, Japan Post Capital, ARK Invest, Helium-3, Magnetar Capital, RyderVentures, and Korea Investment
      Partners.


      In September–November 2025, an additional $331 million tranche was raised through an Apptronik I entity (a series
      of CGF2021 LLC), with a Form D filed with the U.S. Securities and Exchange Commission disclosing the round and
      confirming the $5 billion valuation. In February 2026, Apptronik announced a $520 million Series A-X extension
      with new investors including AT&T Ventures, John Deere, and the Qatar Investment Authority, bringing total Series
      A funding to over $935 million. Total capital raised across all rounds is approximately $1.28 billion (~$14.6M
      seed + $415M initial Series A + $331M bridge + $520M A-X). The Series A-X was executed at a 3× multiple of the
      original Series A valuation, implying the original Series A round was priced at approximately $1.67 billion
      valuation. No debt financing or revenue-based financing has been publicly reported. No equity crowdfunding or
      public market transactions have occurred.


      The investor syndicate blends financial VCs (B Capital, Capital Factory, Magnetar Capital, PEAK6, Helium-3, ARK
      Invest, Korea Investment Partners), strategic corporate investors with direct commercial relevance (Mercedes-Benz,
      John Deere, AT&T Ventures, Jabil, RyderVentures, Japan Post Capital), sovereign wealth (Qatar Investment
      Authority), and a technology strategic (Google/DeepMind). This syndicate composition is strategically important:
      it provides both capital and potential preferred customer and manufacturing channels, reducing dependence on pure
      enterprise sales.
