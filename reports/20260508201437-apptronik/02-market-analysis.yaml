  evidenceGaps:
    - id: EM001
      type: conflicting-data
      severity: material
      topic: "market sizing methodology"
      missingEvidence: "Goldman Sachs ($38B by 2035), MarketsandMarkets ($15B by 2030), and ARK Invest ($24T by 2030) use incompatible market definitions and methodologies, making TAM comparisons unreliable. No industry-standard definition or measurement body exists for humanoid robots."
      whyItMatters: "Investor and management projections built on analyst TAMs may overstate addressable opportunity if narrower definitions (bipedal humanoid only, structured industrial only) prove more accurate. A 3–10x overstatement of TAM would materially affect Apptronik's SOM and growth narrative."
      diligencePath: "Request Apptronik's own bottom-up SAM model with explicit definition of included/excluded segments, priced from customer order discussions. Compare to IFR-verified industrial automation spend data."
      relatedQuestionRefs: [QM001, QM002, QM003]
      relatedTableRefs: [TM002]

    - id: EM002
      type: missing-source
      severity: material
      topic: "Apptronik SOM validation"
      missingEvidence: "No public data exists on Apptronik's internal revenue forecast, unit economics at scale, or bottom-up SAM model. The $1B order forecast from B Capital's Howard Morgan is an investor projection, not a customer commitment or audited forecast."
      whyItMatters: "Without Apptronik's own market sizing model, SOM estimates in this chapter are derived from public analyst data and scenario modeling, not from company-verified demand data. This creates material uncertainty in commercial viability assessment."
      diligencePath: "Request Apptronik management to share: (1) internal TAM/SAM/SOM model with customer-level granularity; (2) pipeline of qualified enterprise opportunities; (3) conversion rate assumptions from pilot to commercial contract."
      relatedQuestionRefs: [QM005, QM006]
      relatedTableRefs: [TM002]

    - id: EM003
      type: private-evidence-only
      severity: material
      topic: "pilot-to-commercial conversion data"
      missingEvidence: "No humanoid robot company has publicly disclosed a pilot-to-commercial conversion; all known deployments (Apptronik, Figure AI, Agility) remain at the pilot stage as of early 2026. There is no industry benchmark for humanoid robot pilot conversion rates."
      whyItMatters: "The SOM and revenue forecasts for Apptronik are entirely dependent on successful conversion of Mercedes-Benz, GXO, and Jabil pilots to commercial contracts. Without industry conversion rate data, the uncertainty band on Apptronik's 2027–2030 revenue is very wide."
      diligencePath: "Conduct reference calls with Mercedes-Benz, GXO, and Jabil procurement and operations leaders to assess pilot satisfaction, intent to scale, and timeline for conversion decisions. Compare to analogous AMR pilot conversion data from Locus, 6 River, or Geek+ deployments."
      relatedQuestionRefs: [QM006, QM011]

    - id: EM004
      type: missing-source
      severity: minor
      topic: "Chinese competitor capability gap assessment"
      missingEvidence: "While Unitree G1 pricing ($16,000) is documented, no independent head-to-head capability comparison between Unitree G1/H1 and Apptronik Apollo exists in the public domain. The capability gap claimed by US competitors is unverified by third parties."
      whyItMatters: "If the capability gap is smaller than assumed, Chinese robots may capture market share in logistics and electronics manufacturing faster than the SOM model projects, compressing Apptronik's addressable opportunity."
      diligencePath: "Commission or source an independent technical benchmark comparing Apptronik Apollo, Unitree G1/H1, and Figure 02 on key industrial metrics (payload, dexterity, uptime, task success rate, MTBF)."
      relatedQuestionRefs: [QM022]

    - id: EM005
      type: conflicting-data
      severity: minor
      topic: "competitive differentiation vs. Figure AI and Tesla Optimus"
      missingEvidence: "No independent third-party assessment of Apptronik's competitive differentiation relative to Figure AI and Tesla Optimus exists. Differentiation claims (TÜV SÜD certification, Google partnership, UT Austin heritage) are Apptronik-sourced and have not been validated by customer procurement evaluators."
      whyItMatters: "If Figure AI or Tesla Optimus achieves proof-of-scale first and anchors enterprise procurement relationships, Apptronik's competitive moat may be insufficient to prevent market share loss in its core SAM segments."
      diligencePath: "Conduct customer reference interviews with Mercedes-Benz and Jabil procurement teams. Obtain competitive bid information where available. Request Apptronik's competitive analysis deck."
