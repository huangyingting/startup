company:
  name: Apptronik
chapter:
  number: 6
  title: "Customers"
  summary: |
    Apptronik's customer base consists of three publicly identified pilot customers—Mercedes-Benz, GXO Logistics, and Jabil—plus NASA as an R&D government partner, as of May 2026. None of the pilots has converted to a disclosed commercial contract, representing a material commercial execution risk. All three enterprise customers are simultaneously strategic investors, creating potential conflicts of interest and raising questions about whether adoption is driven by product merit or financial relationships. The company targets six customer verticals: automotive manufacturing, logistics/warehousing, electronics manufacturing, aerospace/defense, agriculture, and construction—in roughly that near-term priority order. Howard Morgan of B Capital projects $1 billion in orders starting 2027, implying approximately 12,500 robot deployments at Apollo's $80K/year RaaS price. Customer concentration is extreme—three named pilots across related heavy-industry verticals—and no retention metrics, NPS scores, or repeat-order data have been publicly disclosed. The economic rationale for buyers is compelling: Apollo at approximately $80K/year approaches human labor parity while delivering 2–3× the working hours via hot-swap batteries. Enterprise adoption is still in the proof-of-concept and expanded-pilot stages across the entire industry. The conversion of at least one pilot to a commercial contract is the single most important near-term inflection point for validating Apptronik's commercial thesis.

sections:
  - id: SU01
    title: "Customer Landscape and Vertical Segmentation"
    body: |
      Apptronik's target customer universe spans industrial verticals where repetitive, physically demanding tasks are performed by human workers in structured or semi-structured environments. The company has publicly disclosed three pilot customers—Mercedes-Benz (automotive manufacturing), GXO Logistics (logistics and warehousing), and Jabil (electronics manufacturing services)—along with an ongoing research partnership with NASA, which predates the company's commercial pivot and is not a revenue-generating relationship. The company's internal segmentation prioritizes six verticals in rough order of near-term commercial probability: (1) Tier-1 automotive manufacturing, (2) large-scale logistics and warehousing, (3) electronics manufacturing services (EMS), (4) aerospace and defense, (5) agriculture, and (6) construction.

      Automotive manufacturing is the highest-priority near-term vertical because plants are highly structured environments with predictable floor plans, repetitive task requirements (assembly, part transfer, quality inspection), and robust existing safety protocols that accommodate human-robot collaboration. Apollo's 55-pound payload capacity and human-scale form factor match common automotive assembly ergonomics. Mercedes-Benz's dual status as a pilot customer and Series A investor is both evidence of product interest and a potential source of selection bias—the customer relationship may be sustained partly by financial ties rather than purely by operational merit.

      Logistics and warehousing represent the highest volume potential because of the sheer number of distribution centers globally and the structural labor shortage in the sector. GXO Logistics is one of the world's largest third-party logistics operators, with over 970 facilities globally and approximately $9.8 billion in 2023 revenue. Apollo's RaaS pricing at approximately $80,000 per year is directly competitive with the total cost of a warehouse associate in high-cost-of-living US markets, making the economic case for deployment straightforward even before accounting for 24/7 operation via battery hot-swap.

      Electronics manufacturing services (represented by Jabil, a $29B revenue company) require higher dexterity precision and ESD (electrostatic discharge) safety compliance. Jabil's relationship is unique in that it is simultaneously a pilot customer and a contracted future manufacturer of Apollo robots—a dual role that conflates customer adoption with supply chain partnership and introduces potential conflicts of interest in assessing pilot success. John Deere's February 2026 investment in the Series A-X signals that agriculture is a strategic long-term vertical, though no agricultural customer pilots have been announced.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007]

  - id: SU02
    title: "Named Customer Profiles and Pilot Evidence"
    body: |
      Mercedes-Benz began a pilot deployment of Apollo robots in its manufacturing facilities in March 2024, making it Apptronik's first and longest-running named enterprise customer. The pilot focuses on assembly line assistance—tasks such as part transfer, component delivery, and repetitive physical labor in body shop or general assembly areas. As of May 2026, the pilot has been running for over two years without a publicly disclosed conversion to a commercial contract. Mercedes-Benz participated in the Series A extension (March 2025) as a strategic investor, creating an investor-customer overlap. The company has not issued a customer satisfaction statement, disclosed pilot performance KPIs, or announced expansion to additional facilities or a higher unit count.

      GXO Logistics, the world's largest pure-play contract logistics provider by revenue (approximately $9.8 billion in 2023), is evaluating Apollo for warehouse automation including picking, sorting, box handling, and loading operations. No precise start date for the GXO pilot has been publicly disclosed, though it is broadly contemporaneous with or following the Mercedes-Benz engagement. GXO has not disclosed robot unit counts, warehouse locations, specific task performance data, or plans for expanded deployment. GXO is not listed as an investor in public round disclosures, making it the most independently positioned of the three named enterprise pilot customers.

      Jabil, a $29 billion revenue electronics manufacturing services company operating 100-plus facilities worldwide, entered a dual pilot-customer and manufacturing partnership with Apptronik in February 2025. Under the manufacturing agreement, once Apollo is determined to be commercially viable, Jabil will produce Apollo robots in its own factories. This creates a contractual incentive for Jabil to want Apollo to succeed commercially—its position as pilot evaluator is therefore not fully independent of its strategic interest in becoming the contract manufacturer. Jabil also participated in the Series A funding, reinforcing the investor-customer overlap pattern across named enterprise customers.

      NASA's relationship with Apptronik traces to the founding team's work on the Valkyrie humanoid at UT Austin's Human Centered Robotics Lab under the NASA-DARPA Robotics Challenge (2013). The ongoing collaboration is classified as an R&D partnership and is not a revenue-generating commercial customer relationship. NASA's involvement lends technical credibility and brand recognition but does not constitute enterprise commercial sales proof. The revenue value of the NASA relationship has not been publicly disclosed.
    claimRefs: [CU008, CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016]

  - id: SU03
    title: "Enterprise Adoption Journey and Procurement Dynamics"
    body: |
      Humanoid robot procurement in industrial settings follows a multi-stage enterprise sales cycle that typically spans 18 to 36 months from initial vendor evaluation to commercial contract. The six stages are: (1) research awareness at the CIO and automation VP level; (2) formal vendor evaluation via RFI and RFP processes; (3) proof-of-concept pilot covering one to five units over three to six months; (4) expanded pilot covering 10 to 50 units over 6 to 12 months; (5) first commercial contract for 50-plus units; and (6) scale-up deployment to hundreds or thousands of units. Apptronik's known customers are operating in stages three and four as of May 2026.

      Enterprise procurement friction for humanoid robots is meaningfully higher than for conventional industrial automation such as cobots and autonomous mobile robots (AMRs) because of unresolved regulatory and certification standards. No unified safety standard exists for general-purpose humanoid robots; Texas Instruments notes in its Apptronik case study that Apollo uses TI safety-certified hardware even though no official safety standard has been published for this category of robot. Buyers therefore require extensive on-site safety validation before expansion beyond proof-of-concept. EU Machinery Regulation 2023/1230 (effective January 2027) and US OSHA standards are the primary regulatory frameworks customers must navigate, but neither specifically addresses general-purpose humanoid robots.

      Automotive union sensitivity is a major procurement friction factor for the largest near-term vertical. The United Auto Workers and similar unions have historically opposed automation that displaces assembly-line workers and have used collective bargaining agreements to limit or slow adoption of new automation technologies. At scale, Apollo deployment in unionized automotive plants would require CBA negotiation, which could impose deployment delays of 12 to 24 months on top of technical validation timelines. This is a systemic headwind that is independent of product quality.

      The typical enterprise contract structure for RaaS humanoid deployment has not been publicly disclosed for any Apptronik relationship. Key unknown procurement terms include minimum unit commitments, contract duration, SLAs for uptime and task completion, data ownership provisions covering robot-generated operational data, and indemnification provisions for robot-caused workplace incidents. These undisclosed terms represent a critical diligence gap for every named pilot relationship.
    claimRefs: [CU017, CU018, CU019, CU020, CU021, CU022]

  - id: SU04
    title: "Customer Economics and Buyer ROI Rationale"
    body: |
      The fundamental economic case for Apollo adoption rests on labor cost parity and operational hour extension. The US Bureau of Labor Statistics reports that total employer compensation costs for workers in goods-producing industries averaged approximately $44.84 per hour in December 2024, including wages, salaries, and employer-paid benefits. At 2,080 annual work hours (40 hours per week times 52 weeks), the fully loaded annual cost per manufacturing FTE ranges from approximately $72,800 to $93,600, with additional overhead for training, HR, safety compliance, and supervision pushing all-in costs to $90,000 to $110,000 per worker in high-labor-cost markets.

      Apollo's RaaS pricing of approximately $80,000 per year per unit, as disclosed by B Capital General Partner Howard Morgan, positions a single robot near parity with a single manufacturing FTE on a headline cost basis. However, the economics improve substantially when operational hours are considered: Apollo can operate 24 hours per day with hot-swap battery replacements delivering no idle time between shifts, effectively providing two to three times the productive hours of a single human worker without overtime premium. At a two-to-one robot-to-human productive-hour ratio, the effective cost per unit of labor falls to $40,000 to $50,000 per FTE-equivalent—a 45 to 55 percent reduction against the human labor baseline.

      B Capital's Howard Morgan publicly projected $1 billion in customer orders beginning in 2027. At $80,000 per year per robot, this implies approximately 12,500 robot deployments generating $1 billion in annual recurring revenue. This projection is aspirational and has not been confirmed by any customer order disclosure. CEO Jeff Cardenas stated prior to the Series A that Apptronik had generated more revenue than capital raised at that time (approximately $14.6 million seed), implying pilot revenue in the range of $14 million to $30 million—likely from R&D contracts and limited pilot fees, not commercial RaaS deployments.

      The break-even analysis for a buyer under a RaaS model versus employing human labor depends heavily on utilization rate, task suitability, and the marginal tasks displaced. Goldman Sachs analysis projects the humanoid robot market reaching $38 billion by 2035, with manufacturing as the primary near-term application vertical. McKinsey analysis indicates that for manufacturing tasks with high repetition and predictable environments, robot payback periods can fall below 18 months when total labor cost displacement is calculated on a 24-hour operational basis. The risk for buyers is that current Apollo capabilities may not yet support the full scope of tasks needed to fully displace a human FTE, meaning partial displacement yields a longer payback period.
    claimRefs: [CU023, CU024, CU025, CU026, CU027, CU028]

  - id: SU05
    title: "Retention, Satisfaction, Expansion, and Concentration Risk"
    body: |
      Apptronik has not publicly disclosed any customer retention metrics, net revenue retention rates, gross revenue retention rates, customer satisfaction scores, NPS data, or repeat order evidence as of May 2026. All three named enterprise pilot customers are simultaneously strategic investors or manufacturing partners, which creates significant ambiguity about whether continued engagement reflects product merit or financial relationship maintenance. No pilot has been publicly disclosed as having expanded from proof-of-concept to a higher unit count, and no pilot has graduated to a commercial contract. The absence of any disclosed conversion, expansion, or retention evidence after more than two years of piloting is the most material gap in the public customer proof base.

      Customer concentration risk for Apptronik is extreme by conventional standards. Three named pilot customers—all in heavy industrial verticals—constitute the entirety of the disclosed customer base. Across private technology companies, any customer constituting more than 10 percent of revenue is considered a concentration risk; by that standard, Apptronik's disclosed customer base is fully concentrated across three relationships. If any of the three pilots fails to convert to commercial terms, the near-term revenue ramp could be materially impaired.

      Expansion signals from the investor base suggest future customer segments beyond current pilots. John Deere's February 2026 investment signals agricultural and construction equipment market interest. AT&T Ventures' participation suggests potential telecom infrastructure maintenance applications. Japan Post Capital's Series A participation hints at postal and logistics deployment interest in Japan. Ryder Ventures similarly suggests interest from the transportation and fleet management sector. These investor signals are not equivalent to customer commitments but represent the most visible leading indicators of pipeline development beyond the three named pilots.

      The investor-customer overlap pattern—where every named enterprise pilot customer is also a financial investor or manufacturing partner—raises a specific adverse concern: the pilots may be financially motivated relationship maintenance rather than arm's-length product evaluations. Independent customer evidence—a non-investor enterprise deploying Apollo—is the highest-value validation event that remains outstanding and that no public disclosure has yet provided. IEEE Spectrum reported in 2025 that no humanoid robot company had publicly disclosed a pilot converting to a commercial contract as of late 2025, characterizing the capability-reliability gap as significant across the entire industry.
    claimRefs: [CU029, CU030, CU031, CU032, CU033, CU034, CU035]

callouts:
  - calloutType: risk
    severity: blocking
    title: "No Pilot Has Converted to a Commercial Contract"
    body: "As of May 2026, all three named enterprise pilot customers—Mercedes-Benz (2+ years), GXO Logistics, and Jabil—remain at the pilot stage. No commercial contract, expanded unit commitment, or disclosed conversion timeline has been publicly announced. This is the single most important commercial execution risk in the Apptronik thesis."
    claimRefs: [CU009, CU011, CU013]

  - calloutType: risk
    severity: material
    title: "Investor-Customer Overlap Compromises Proof Quality"
    body: "All three named enterprise pilot customers (Mercedes-Benz, Jabil) are also strategic investors in Apptronik's Series A. GXO Logistics is the only named pilot without confirmed investor ties. This overlap means pilot relationships may be sustained partly by financial incentives, reducing the evidential weight of continued pilot engagement as proof of product-market fit."
    claimRefs: [CU010, CU014, CU030]

  - calloutType: risk
    severity: material
    title: "Extreme Customer Concentration"
    body: "Three named pilot customers—all in overlapping heavy industrial verticals—constitute Apptronik's entire disclosed customer base. Loss of any single pilot relationship would represent a disproportionate setback to commercial validation momentum and near-term revenue ramp."
    claimRefs: [CU031, CU032]

  - calloutType: insight
    title: "Labor Economics Make the Buyer Case Compelling on Paper"
    body: "At approximately $80K/year, Apollo's RaaS price is near parity with a single US manufacturing FTE on a headline basis. With 24/7 hot-swap battery operation delivering 2–3× human productive hours, the effective per-unit labor cost drops to $40–50K/year equivalent—a 45–55% reduction against the human labor baseline, making the buyer ROI case analytically compelling pending performance validation."
    claimRefs: [CU023, CU024, CU025]

  - calloutType: strength
    title: "Investor Signals as Pipeline Leading Indicators"
    body: "John Deere (agricultural equipment), AT&T Ventures (telecom infrastructure), Japan Post Capital (postal logistics), and Ryder Ventures (transportation) investments are the strongest available leading indicators of future customer verticals—each strategic investor is betting on an eventual supplier-customer relationship even before commercial contracts exist."
    claimRefs: [CU033, CU034]

