      severity: blocking
      relatedQuestionRefs: [QU028, QU030]
      diligencePath: "Request from Apptronik a list of pipeline customers who are not investors; seek non-NDA customer references willing to speak independently about Apollo pilot experience; monitor press releases for new pilot announcements."

    - id: EU005
      title: "NASA R&D Revenue Contribution Undisclosed"
      topic: "what is the dollar value or revenue contribution of the nasa r&d partnership to apptronik's historical revenue"
      description: "The dollar value or revenue contribution of Apptronik's ongoing NASA research partnership is not publicly disclosed. While CEO Cardenas' pre-Series A revenue claim implies meaningful R&D contract revenue, the NASA component versus other pilot revenue cannot be disaggregated from public information."
