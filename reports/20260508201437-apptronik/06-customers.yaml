  evidenceGaps:
    - id: EU001
      title: "Total Robot Unit Deployment Count Not Disclosed"
      topic: "what is the total estimated number of apollo robots deployed across all pilots"
      description: "Apptronik has never disclosed the number of Apollo units deployed across its three pilot customers. Estimates suggest fewer than 50 units based on the PoC stage characterization, but no company, customer, or media source has confirmed any number. This gap prevents assessment of actual deployment scale versus capital raised."
      evidenceGapType: private-evidence-only
      severity: material
      relatedQuestionRefs: [QU006]
      diligencePath: "Request unit deployment counts from Apptronik investor relations; query GXO Logistics and Mercedes-Benz investor relations for any disclosed pilot scope; review SEC or regulatory filings that may reference deployment scale."

    - id: EU002
      title: "Pilot Contract Terms Entirely Undisclosed"
      topic: "what contract terms govern the current pilot agreements including duration, unit commitments, slas, and data ownership"
      description: "The legal and commercial terms of all three pilot agreements—including contract duration, minimum unit commitments, performance benchmarks, SLAs, data ownership, indemnification, and renewal rights—have not been disclosed by Apptronik or any of its pilot customers. Without this information, it is impossible to assess the commercial seriousness of the pilot relationships or the likelihood and timeline of conversion to commercial contracts."
      evidenceGapType: private-evidence-only
      severity: blocking
      relatedQuestionRefs: [QU018]
      diligencePath: "Request pilot agreement term sheets or summary commercial terms from Apptronik directly; obtain from counsel if NDA required; ask Mercedes-Benz IR whether the pilot terms include any purchase option or right of first refusal."

    - id: EU003
      title: "Howard Morgan $1B Order Projection Lacks Disclosed Methodology"
      topic: "what is howard morgan's evidential basis for projecting $1 billion in customer orders starting 2027"
      description: "B Capital General Partner Howard Morgan publicly projected $1 billion in customer orders starting 2027, but the basis for this projection—whether from a signed order backlog, binding LOIs, informal customer conversations, or purely a bottom-up demand model—has not been disclosed. This makes it impossible to assess whether the projection reflects real commercial commitment or investor optimism."
      evidenceGapType: missing-source
      severity: material
      relatedQuestionRefs: [QU019]
      diligencePath: "Request B Capital's customer pipeline model or any supporting order backlog data from Apptronik; verify whether any customer has signed a letter of intent or non-binding order agreement."

    - id: EU004
      title: "Non-Investor Enterprise Customer Proof Entirely Absent"
      topic: "does apptronik have any non-investor enterprise customers in its pipeline that have not been publicly disclosed"
      description: "As of May 2026, all named enterprise pilot customers are also strategic investors in Apptronik (Mercedes-Benz, Jabil) or in an exclusive manufacturing partnership (Jabil). No independent, non-investor enterprise customer has been publicly disclosed as a pilot or contract customer. This is the single most material evidence gap in the commercial proof base."
