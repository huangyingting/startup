chapter:
  number: 8
  title: Valuation
  summary: >
    Apptronik's $5 billion post-money valuation (February 2026, Series A-X at a 3x multiple of the original Series A) is
    characterized as stretched relative to its pre-ARR status, with no publicly disclosed commercial contracts and all
    three known pilot customers also being investors. The current valuation implies deployment of approximately 12,500
    Apollo robots at $80,000/year RaaS pricing to reach $1 billion in ARR. Comparable analysis places Apptronik between
    Agility Robotics ($375M acquisition) and Figure AI ($39B). The recommended investor action is "track" — monitoring
    H2 2026 pilot-to-commercial conversion signals before committing capital at current pricing. Bull case (10% of
    Goldman Sachs' $38B TAM by 2035) implies a 7.6x return; base case (3-5% of $15B SAM by 2030) implies near parity;
    bear case (pilot failure, competitor dominance) implies a 60-80% drawdown. Six kill triggers and nine final
    diligence asks are identified.
sections:
  - id: SV01
    title: Valuation Framework and Current Metrics
    body: >
      Apptronik's current post-money valuation of approximately $5 billion was established in February 2026 through the
      Series A-X extension round, priced at a 3x multiple of the original Series A valuation. Total capital raised
      stands at approximately $1 billion ($14.6 million seed plus over $935 million across Series A tranches), placing
      Apptronik among the top-three best-capitalized humanoid robotics companies globally alongside Figure AI and Tesla
      Optimus. The valuation was confirmed by a source familiar with the matter in Reuters coverage and is corroborated
      by SEC Form D filings.


      No audited financial statements or formal annual recurring revenue (ARR) figures have been publicly disclosed. CEO
      Jeff Cardenas stated that prior to the Series A, the company generated more revenue than capital raised, implying
      pre-Series A revenue exceeding approximately $14.6 million — but this is a company claim without independent
      verification. The $5 billion valuation is a pure investor-term-sheet valuation with no revenue multiple anchor. At
      B Capital's projected $80,000 per year RaaS pricing, achieving $1 billion in ARR would require deployment of
      approximately 12,500 Apollo robots. Howard Morgan of B Capital has projected $1 billion in customer orders
      beginning 2027, but this has not been corroborated by customer commitments.


      The venture capital market context supports the premium pricing environment: the AI robotics sector raised $6.1
      billion in 2025 alone, a 300% increase from the prior year, creating a liquidity-rich backdrop for elevated
      pre-revenue valuations. Goldman Sachs Research projects the global humanoid robotics market will reach $38 billion
      by 2035, and MarketsandMarkets projects $15.26 billion by 2030 at a 39.2% CAGR. These TAM projections form the
      basis for investor willingness to assign multi-billion-dollar valuations to pre-revenue humanoid robotics
      companies, including Apptronik.
