  - id: SV03
    title: Bull, Base, and Bear Scenario Analysis
    body: >
      The bull case for Apptronik rests on three compounding advantages: the Google DeepMind Vision-Language-Action
      (VLA) model integration creating a generalist capability moat, the NASA/UT Austin heritage providing a decade-plus
      head start in humanoid robotics IP, and first-mover enterprise relationships with Mercedes-Benz, GXO Logistics,
      and Jabil. If Apptronik captures 10% of Goldman Sachs' projected $38 billion humanoid market by 2035, this implies
      approximately $3.8 billion in ARR. At a 10x ARR multiple, the exit valuation would be $38 billion — a 7.6x return
      on the current $5 billion entry price. This scenario requires full pilot-to-commercial conversion, Jabil scaling
      manufacturing to thousands of units, and Google DeepMind's AI capabilities delivering meaningful differentiation.


      The base case projects a more modest 3-5% market share of a $15 billion addressable market by 2030, generating
      $450-$750 million in ARR. At an 8x ARR multiple, appropriate for capital-intensive hardware subscription
      businesses, this implies an exit valuation of $3.6-$6 billion, roughly at parity with the current $5 billion
      entry. Accounting for further equity dilution from a likely Series B, the base case implies a near-zero or
      modestly negative return for Series A-X investors at current pricing. The base case requires only partial pilot
      conversion and survival amid competitive pressure from Tesla and Figure AI.


      The bear case envisions commercial pilot failure — conversion rates below 30%, loss of Google DeepMind
      partnership, or a disruptive safety incident that grounds deployments. Valuation could reset to $1-$2 billion,
      representing a 60-80% drawdown from current levels. Chinese manufacturers achieving cost-competitive RaaS
      equivalents at $16,000-$30,000 per robot-year would structurally undermine the $80,000 RaaS pricing assumption. An
      acquisition scenario at $2-$5 billion (by Google, Amazon, Hyundai, or John Deere) remains possible and would offer
      0.4-1.0x outcomes for current investors.
