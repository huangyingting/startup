  - id: SV05
    title: Kill Triggers, Risk Factors, and Final Diligence Asks
    body: >
      Six primary kill triggers have been identified. First, a pilot-to-commercial conversion rate below 30% across all
      three pilot customers by December 2026 would indicate technology not yet commercially viable at acceptable unit
      economics. Second, formal termination of the Google DeepMind Gemini Robotics partnership would materially impair
      the AI-native positioning central to the bull thesis. Third, if a competitor achieves more than 10,000 external
      commercial robot deployments before Apptronik reaches meaningful scale, the addressable window may close. Fourth,
      a material safety incident grounding pilots — particularly consequential given the absence of an official humanoid
      robot safety standard as of 2026 — would trigger regulatory risk and customer confidence collapse. Fifth, CEO Jeff
      Cardenas' departure would represent a key-person risk event. Sixth, a down-round financing requirement before ARR
      visibility would signal investor confidence erosion.


      Nine final diligence asks are required before any buy decision at current or higher pricing. Priority critical
      asks include audited financials or management accounts to verify revenue claims and establish a revenue multiple
      baseline, commercial pipeline details with stages and conversion criteria for the three active pilots, and the
      capitalization table with investor rights to understand dilution and board control. High-priority asks include the
      Jabil manufacturing agreement terms, customer contract redlines for RaaS terms, the IP ownership schedule
      documenting the UT Austin HCRL spinout terms, and the RaaS pricing model with full unit economics including COGS
      per robot, service cost, and margin at scale. Medium-priority asks include competitive intelligence on Figure AI's
      commercial contract structure and the Series B planning timeline to assess runway and dilution risk.
