  evidenceGaps:
    - id: EV001
      type: private-evidence-only
      severity: blocking
      topic: revenue and ARR
      missingEvidence: >-
        No audited financial statements or formal ARR figures have been publicly disclosed. CEO Cardenas claimed
        pre-Series A revenue exceeded approximately $14.6M raised but this is unverified company-claimed information
        only.
      whyItMatters: >-
        The $5B valuation has no revenue multiple anchor. Without verifiable ARR, investors cannot assess whether the
        valuation is justified or what level of execution is required to earn it back over a 5-7 year horizon.
      diligencePath: >-
        Request audited financials or management accounts from CFO. Validate CEO revenue claim against actuals.
        Establish revenue run rate and gross margin before any buy decision is considered.
      relatedQuestionRefs:
        - QV003
      relatedTableRefs:
        - TV006
    - id: EV002
      type: missing-source
      severity: material
      topic: implied revenue multiple
      missingEvidence: >-
        The revenue multiple implied by the $5B valuation cannot be calculated because Apptronik has not disclosed ARR,
        revenue run rate, or any financial metric serving as a denominator for the multiple.
      whyItMatters: >-
        Without a calculable revenue multiple, it is impossible to benchmark the $5B valuation against comparable
        company multiples or determine the margin of safety for current investors evaluating entry.
      diligencePath: >-
        Obtain management accounts. Cross-reference with customer contract data to estimate implied RaaS revenue.
        Request independent financial model with unit economics assumptions clearly stated.
      relatedQuestionRefs:
        - QV023
        - QV029
      relatedTableRefs:
        - TV004
    - id: EV003
      type: private-evidence-only
      severity: material
      topic: ARR visibility timeline
      missingEvidence: >-
        No public guidance on when Apptronik expects to achieve ARR visibility, disclose commercial revenue, or reach
        any financial milestone has been provided. B Capital's $1B orders by 2027 is the only data point, and it is an
        investor projection without underlying evidence.
      whyItMatters: >-
        The timeline to ARR visibility determines the funding runway needed, dilution risk from Series B, and the
        discount rate applicable to future cash flows — all critical inputs for any valuation model.
      diligencePath: >-
        Request CEO and CFO guidance on revenue recognition timeline. Obtain Series B planning materials. Validate B
        Capital 2027 $1B projection against internal commercial pipeline data.
      relatedQuestionRefs:
        - QV025
      relatedTableRefs:
        - TV006
    - id: EV004
      type: private-evidence-only
      severity: material
      topic: pilot commercial terms and demand independence
      missingEvidence: >-
        No pilot-to-commercial conversion criteria, economic terms, or customer commitment letters have been publicly
        disclosed for any of the three active pilots. The investor-customer overlap makes arm's-length pricing
        validation impossible without direct access to contract terms.
      whyItMatters: >-
        Pilot terms determine whether demand is genuine and at what economics. Without independent customer validation,
        the $5B valuation cannot be grounded in demonstrated commercial demand distinct from investor relationships.
      diligencePath: >-
        Request customer contract redlines, RaaS pricing agreement templates, SLA terms, and pilot milestone criteria as
        part of buy-side diligence. Seek channel checks with non-investor potential customers.
      relatedQuestionRefs:
        - QV018
        - QV019
      relatedTableRefs:
        - TV006
    - id: EV005
      type: missing-source
      severity: minor
      topic: Figure AI comparable commercial evidence
      missingEvidence: >-
        Figure AI's commercial contract terms, actual customer names beyond BMW, and deployment volumes are not publicly
        disclosed, making the $39B valuation comparison directionally useful but imprecise.
      whyItMatters: >-
        Without Figure AI's unit economics and commercial details, it is difficult to determine whether Figure AI's $39B
        is itself justified or inflated, affecting the value of the Apptronik discount as an investment signal.
      diligencePath: >-
        Conduct channel checks on Figure AI commercial activity. Request competitive intelligence as part of final
        diligence asks for Apptronik.
      relatedQuestionRefs:
        - QV006
      relatedTableRefs:
        - TV004
    - id: EV006
      type: missing-source
      severity: minor
      topic: RaaS official pricing confirmation
      missingEvidence: >-
        The $80,000/year RaaS figure originates from B Capital investor Howard Morgan, not official Apptronik pricing
        materials. No customer-facing pricing sheet or signed contract pricing has been publicly disclosed.
      whyItMatters: >-
        If actual pricing differs from $80K/year — lower due to competitive pressure or structured differently with
        minimum commitments — it materially changes the unit economics and robot count needed to justify the $5B
        valuation.
      diligencePath: >-
        Request official pricing schedule and at least one customer contract redline to confirm pricing, escalation
        clauses, and minimum commitment terms before any buy decision.
      relatedQuestionRefs:
        - QV003
        - QV023
      relatedTableRefs:
        - TV006
