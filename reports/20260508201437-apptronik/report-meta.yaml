  productSummary: "Apollo humanoid robot: 5'8\", 160 lbs, 55 lb payload, 4-hour hot-swappable battery, NVIDIA Jetson AGX Orin compute, TI motor-control (TÜV SÜD certified), five-fingered dexterous hands, legs and wheels hybrid mobility, Gemini Robotics VLA AI stack. Also operates Elevate Robotics subsidiary for non-humanoid heavy industrial automation."
  customerFocus: "Tier-1 automotive manufacturers (Mercedes-Benz), logistics operators (GXO Logistics), electronics manufacturing services (Jabil), and government/aerospace (NASA). Target segments include warehouse automation, automotive assembly, electronics manufacturing, and eventually agriculture and construction."
