companyProfile:
  summary: "Apptronik is an Austin, Texas-based humanoid robotics company founded in 2016 as a spinout from the Human Centered Robotics Lab (HCRL) at the University of Texas at Austin. The company develops AI-powered general-purpose humanoid robots designed to operate alongside humans in structured industrial environments. Its flagship product, the Apollo robot, is deployed in pilot programs with Mercedes-Benz, GXO Logistics, and Jabil. Apptronik operates on a Robot-as-a-Service (RaaS) model, targeting ~$80,000 per robot per year, and has partnered with Google DeepMind for Gemini Robotics VLA integration."
