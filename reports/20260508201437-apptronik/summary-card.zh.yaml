summary:
  headline: >-
    Apptronik 是 AI 原生人形机器人公司，继承深厚 NASA 技术积累，拥有 Google DeepMind 合作和 $1.28B 融资——但公司仍处商业化前，没有确认试点转商业订单，$5B
    估值偏紧，竞争和规模化风险都很重。
