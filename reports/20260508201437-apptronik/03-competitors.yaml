callouts:
  - calloutType: risk
    title: Tesla Internal Deployment Gap Is Existential
    body: >-
      Tesla's confirmed 1,000+ Optimus units deployed internally at Gigafactory Texas (Q1 2026) represents the only true
      commercial-scale humanoid deployment globally. Apptronik has three pilots. The gap in proof-points is not
      incremental—it is structural. Tesla's long-term target of <$20K/unit, if achieved at scale, would price
      Apptronik's sub-$50K target out of most industrial use cases.
    claimRefs:
      - CP009
      - CP010
      - CP033
  - calloutType: risk
    title: Chinese Price Compression Threatens Unit Economics
    body: >-
      Unitree G1 is currently available at $16,000–$30,000—below Apptronik's long-term target price of under $50,000. As
      Chinese producers move up the quality curve with government-subsidized R&D and manufacturing, the
      price-performance gap will narrow. Enterprise buyers already comparing vendors will use Chinese pricing as a
      negotiating lever against US providers.
    claimRefs:
      - CP015
      - CP016
      - CP032
  - calloutType: strength
    title: Unique Legs+Wheels Hybrid and TÜV SÜD Safety Cert
    body: >-
      Apollo is the only commercial humanoid with a legs+wheels mobility hybrid and TÜV SÜD motor-control functional
      safety certification. In regulated manufacturing environments (automotive, pharmaceutical, food), the safety cert
      is a procurement gate that currently excludes most competitors. The wheeled configuration also lowers floor-level
      operating costs for tasks that do not require stair climbing.
    claimRefs:
      - CP021
      - CP024
      - CP025
  - calloutType: insight
    title: Google DeepMind AI Stack Matches Figure/OpenAI Quality
    body: >-
      Apptronik's Gemini Robotics partnership provides AI capability parity with Figure AI's OpenAI integration—arguably
      the two best VLA model stacks available. Both companies have top-tier AI partners. This neutralizes what would
      otherwise be a decisive AI moat for Figure.
    claimRefs:
      - CP026
      - CP007
  - calloutType: strength
    title: Payload and Safety Specs Outperform Closest Peers
    body: >-
      Apollo's 25 kg payload capacity exceeds Figure 02 (20 kg) by 25% and Digit (16 kg) by 56%. In warehouse and
      manufacturing use cases where payload capacity directly drives economic throughput per robot-hour, this is a
      material spec advantage that is already source-backed and not matched by any commercial US competitor as of Q2
      2026.
    claimRefs:
      - CP022
      - CP008
      - CP013
