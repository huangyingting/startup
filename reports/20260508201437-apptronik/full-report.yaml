      - number: '7.2'
        title: Operational, Quality, and Cybersecurity Risk
        blocks:
          - type: paragraph
            body: >
              Apptronik has no owned manufacturing facility and is dependent on Jabil for production. Scaling from
              pilot-volume units to 10,000+ commercial units is operationally unproven for any humanoid robotics
              company. Supply chain bottlenecks in NVIDIA Jetson AGX Orin compute hardware—which is subject to
              semiconductor market volatility and US-China export-control regimes—and in lithium-ion battery cells
              (where EV manufacturers compete aggressively for supply) represent key production risks. A disruption in
              either input could halt Apollo production with limited alternative sourcing options.


              AI reliability risk is material for production-environment deployment. Apptronik's integration of Google
              DeepMind's Gemini Robotics VLA introduces the possibility of model hallucinations or incorrect action
              inference in precision manufacturing contexts. A single high-profile incident in which an Apollo robot
              causes a production-line error or injures a co-worker would materially damage enterprise customer
              confidence and could trigger regulatory scrutiny across the industry. The robot's 160-pound weight and
              joint forces create meaningful injury potential if safety systems fail.


              Mechanical wear and joint reliability over extended industrial operations are engineering challenges that
              have not been validated in long-term commercial deployments by any humanoid company. Heat dissipation
              under continuous industrial operation, actuator reliability, and battery degradation over multi-year RaaS
              contracts all represent operational quality unknowns. Cybersecurity risk is elevated because Apollo is
              designed for network connectivity (WiFi, 5G) to enable remote monitoring, software updates, and
              teleoperation capabilities. A networked fleet of humanoid robots in critical manufacturing infrastructure
              constitutes a high-value attack surface; a successful cyberattack causing a robot to behave erratically in
              a factory environment would be a catastrophic event for Apptronik's commercial trajectory.
