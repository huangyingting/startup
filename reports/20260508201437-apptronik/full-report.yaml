      - number: '5.2'
        title: AI and Software Architecture
        blocks:
          - type: paragraph
            body: >
              Apptronik's AI strategy is anchored by a strategic partnership with Google DeepMind announced in December
              2024. The partnership integrates DeepMind's Gemini Robotics Vision-Language-Action (VLA) model and the
              broader Gemini 3 multimodal AI platform into Apollo's software stack. Gemini Robotics is a large-scale VLA
              model capable of processing visual observations and natural language instructions to generate motor
              control commands directly, enabling Apollo to generalize across diverse tasks without per-task
              reprogramming. This is a meaningful architectural advantage over fixed-program industrial robots that
              require explicit coding for each new task.


              The control architecture is hierarchical: a high-level planning module—the VLA layer—interprets task
              instructions, decomposes them into sub-goal sequences, and issues commands to a mid-level motion planner.
              A low-level motor controller running on the TI safety-certified subsystem executes joint trajectories with
              millisecond precision. This layered design allows the AI reasoning layer to be updated independently of
              the safety-critical motor control firmware, preserving certification integrity during AI improvements.
              Learning methods include simulation-to-real transfer (training in physics-accurate simulation before
              hardware deployment), imitation learning from human demonstrations, and reinforcement learning
              fine-tuning. Apptronik plans a state-of-the-art robot training and data collection facility in Texas to
              accelerate the real-world data flywheel that continuously improves Gemini Robotics for Apollo-specific
              tasks. A California office serves as the primary AI and software engineering hub.
            claimRefs:
              - CE010
              - CE011
              - CE012
              - CE013
              - CE014
              - CE038
      - number: '5.3'
        title: Safety, Certification, and Quality Systems
        blocks:
          - type: paragraph
            body: >
              Apollo's motor-control system uses Texas Instruments silicon independently certified by TÜV SÜD for
              functional safety. TÜV SÜD is one of the world's leading technical inspection and certification bodies,
              and its certification is widely accepted in European and global manufacturing safety audits. No official
              ISO or IEC safety standard for co-working humanoid robots in industrial settings has been published as of
              2026; a relevant IEC working group standard is in process but without a confirmed finalization date.
              Apptronik addresses this gap by applying functional safety methodologies at the component level rather
              than waiting for a top-level system standard, a pragmatic approach that has enabled enterprise procurement
              at Mercedes-Benz, GXO Logistics, and Jabil.


              Two hardware safety layers are built into Apollo: the Perimeter Zone is a configurable software-defined
              exclusion boundary that pauses robot movement when humans or objects are detected within a set radius; the
              Impact Zone is a contact force-limiting system that stops or reverses motion when unexpected contact
              forces are detected, preventing injury to co-workers. Apollo is designed to U.S. OSHA standards for
              manufacturing environments and has been validated for co-working with humans across its pilot deployments.
              An internal quality standard mandates that any capability demonstrated publicly in video form must be
              fully reproducible live, in person, and reliably before disclosure.
            claimRefs:
