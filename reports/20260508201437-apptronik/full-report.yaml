  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Taxonomy
        blocks:
          - type: paragraph
            body: >
              The humanoid robotics market is defined here as commercially deployed or commercially pipeline bipedal and
              wheeled general-purpose robots designed to operate in human-centric environments alongside workers. This
              definition excludes fixed-arm industrial robots (e.g., FANUC, ABB, Kuka), autonomous mobile robots (AMRs)
              without humanoid form (e.g., Locus, 6 River), and purely software-driven automation. It includes both
              fully bipedal platforms (Figure 02, Boston Dynamics Atlas, Tesla Optimus, Agility Robotics Digit, Unitree
              G1) and hybrid wheeled/legged systems (Apptronik Apollo wheeled configuration). The distinction matters
              because market sizing varies 3–10x depending on whether analysts include all service robots or restrict to
              bipedal humanoids.


              The relevant market taxonomy spans three layers: (1) the Humanoid Robot Hardware and Software market,
              which is the core segment; (2) the broader Service Robot market that includes non-humanoid platforms
              operating in human environments; and (3) the Industrial Automation market as a large adjacent space.
              Apptronik's Apollo is positioned in the intersection of segments (1) and the industrial subset of (2). The
              company competes directly for budget with both humanoid-specific competitors and with task-specific
              automation alternatives.


              Key definitional disputes: Goldman Sachs Research (January 2024) uses a broader "humanoid robot"
              definition that captures labor substitution across manufacturing, logistics, retail, and
              healthcare—arriving at $38B by 2035 with 1.4 million annual shipments. MarketsandMarkets uses a narrower
              scope focused on current commercial deployments and near-term addressable factory/warehouse use cases,
              arriving at $15.26B by 2030 at a 39.2% CAGR from a $2.0B 2024 base. Both estimates are analyst
              projections, not audited market measurements, and carry material uncertainty as the market has fewer than
              2,000 humanoid robots deployed commercially worldwide as of early 2026.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
