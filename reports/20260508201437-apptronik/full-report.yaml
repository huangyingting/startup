      - number: '1.3'
        title: Funding History and Investor Composition
        blocks:
          - type: paragraph
            body: >
              Apptronik has raised approximately $1 billion in total capital across multiple rounds since its founding.
              The earliest disclosed institutional round was a seed of approximately $14.6 million in 2022, led by Grit
              Ventures and Perot Jain. In February 2025, the company closed an initial $350 million Series A co-led by B
              Capital Group and Capital Factory, with Google/DeepMind participation and approximately 170 employees. One
              month later, in March 2025, the Series A was extended to approximately $415 million, adding Mercedes-Benz,
              Japan Post Capital, ARK Invest, Helium-3, Magnetar Capital, RyderVentures, and Korea Investment Partners.
              In November 2025, SEC Form D filings disclosed an additional $331 million raise, confirming a $5 billion
              valuation. In February 2026, Apptronik announced a $520 million Series A-X extension with participation
              from existing investors (B Capital, Google, Mercedes-Benz, PEAK6) and new investors AT&T Ventures, John
              Deere, and the Qatar Investment Authority, bringing total Series A funding to over $935 million and total
              capital raised to nearly $1 billion. The Series A-X was priced at a 3x multiple of the original Series A
              valuation.


              Howard Morgan of B Capital publicly projected $1 billion in customer orders starting 2027. Strategic
              investors including Mercedes-Benz, John Deere, AT&T Ventures, and Jabil represent both capital and
              potential preferred customer or manufacturing relationships. Google/DeepMind's investment ties directly to
              the Gemini Robotics AI partnership. John Deere's participation hints at future ag-tech applications per
              the CEO's public comments.
