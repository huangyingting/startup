      - number: '1.4'
        title: Scale, Headcount, and Key Milestones
        blocks:
          - type: paragraph
            body: >
              Apptronik's workforce has grown substantially alongside its fundraising trajectory, from approximately 170
              employees at the February 2025 Series A announcement to approximately 300 by February 2026 and
              approximately 350 by April 2026. The company began its humanoid robotics work in 2013 when the founding
              team at UT Austin's HCRL participated in the NASA-DARPA Robotics Challenge with the Valkyrie humanoid
              robot. Over its history, Apptronik has developed more than 15 robotic systems, including exoskeletons,
              humanoid torsos, bipedal platforms, and robotic arms.


              Apollo, the first commercial product, was publicly unveiled in 2023. Key deployment milestones include a
              Mercedes-Benz pilot launched in March 2024, a GXO Logistics warehouse pilot, and a Jabil pilot plus
              manufacturing partnership announced in February 2025. In December 2024, a strategic Google DeepMind AI
              partnership was announced. A new Apollo model has been under internal testing since 2025 and was
              anticipated for public debut in 2026; CEO Jeff Cardenas acknowledged the reveal was delayed from the
              original 2025 plan, emphasizing his standard that anything shown in a video must be demonstrable in
              person. CEO Cardenas stated that prior to the Series A, Apptronik generated more revenue than capital
              raised, though no specific ARR figures have been disclosed. As of mid-2026, no customer pilot has been
              publicly announced as graduating to full commercial deployment.
