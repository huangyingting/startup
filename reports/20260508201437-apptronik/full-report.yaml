      - number: '4.3'
        title: Cost Structure and Burn Rate Estimates
        blocks:
          - type: paragraph
            body: >
              Apptronik has not disclosed its cost structure, gross margin, or burn rate. The following estimates are
              derived from public headcount data and industry benchmarks. As of April 2026, the company employs
              approximately 350 people; at an average fully-loaded engineering cost of $150,000–$200,000 per year
              (consistent with Austin-area robotics and AI talent markets), total annual payroll is estimated at $52–70
              million. Adding overhead, facilities, R&D hardware costs, and G&A, total operating expenditure is
              estimated at approximately $100–200 million per year. The company's manufacturing is currently outsourced
              to Jabil under a contract manufacturing agreement, removing the need for Apptronik to own factories, which
              substantially reduces capital expenditure requirements relative to vertically integrated peers.


              The capital structure provides estimated runway. With approximately $935 million raised in the Series A
              cycle (2025–2026) and estimated burn of $100–200 million per year, the company has approximately 4–9 years
              of runway at current burn — likely 4–7 years when accounting for continued headcount growth as
              commercialization accelerates. The primary burn drivers are: (1) R&D for the next-generation Apollo
              platform and Gemini AI integration; (2) engineering headcount scaling; (3) manufacturing qualification and
              quality investment with Jabil; and (4) customer deployment and support infrastructure. The company
              benefits from outsourced manufacturing reducing capex, but faces rising headcount costs as it scales
              toward commercial operations.


              Compared to Figure AI ($39B valuation, $2.6B+ raised), Apptronik's capital efficiency appears favorable:
              the company reached a $5B valuation on approximately $1.28B raised, and the CEO's claim of pre-Series A
              revenues exceeding seed capital suggests early commercial traction. However, without audited financials or
              confirmed gross margin data, these comparisons remain directional estimates.
