  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Apollo Hardware Platform and Physical Specifications
        blocks:
          - type: paragraph
            body: >
              Apollo stands 5 feet 8 inches tall (1.73 m), weighs 160 pounds (72.5 kg), and carries a 55-pound (25 kg)
              payload. Each hot-swappable battery pack delivers 4 hours of runtime, enabling continuous 24/7 operation
              in production environments with an appropriate battery-swap infrastructure in place. Compute is provided
              by NVIDIA Jetson AGX Orin, a high-performance embedded AI SoC originally designed for autonomous machines
              and robotics, enabling real-time inference for perception and planning at the edge. Motor control relies
              on Texas Instruments silicon that has been independently certified to functional safety standards by TÜV
              SÜD, a globally recognized safety testing organization, providing a component-level safety credential in
              the absence of a published system-level humanoid standard.


              Apollo's sensor suite includes five-fingered dexterous hands with integrated force-torque sensors, RGB and
              depth cameras for visual perception, LiDAR for environment mapping, and inertial measurement units (IMUs)
              for proprioceptive state estimation. Connectivity options include Wi-Fi 6, Gigabit Ethernet, and optional
              5G, the last enabled by AT&T's strategic investment. A unique design feature is the hybrid mobility
              system: Apollo can operate on two articulated legs for stairs, ramps, and complex terrain, or switch to
              wheeled locomotion for faster, more energy-efficient indoor navigation. CEO Jeff Cardenas has noted that
              early industrial customers predominantly favor the wheeled configuration for safety and efficiency
              reasons, while legged capability is retained for long-term versatility. Force-controlled series-elastic
              actuators throughout the frame yield under unexpected external forces, improving both human co-working
              safety and mechanical longevity at high industrial cycle rates.
