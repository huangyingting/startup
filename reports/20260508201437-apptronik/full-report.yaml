      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Apptronik was co-founded in 2016 by Jeff Cardenas (CEO), Nick Paine (CTO), Bill Helmsing, and Dr. Luis
              Sentis (Chief Scientist), all emerging from the UT Austin HCRL. Jeff Cardenas is the primary public
              spokesperson, fundraising driver, and strategic decision-maker. Dr. Luis Sentis, a tenured professor at UT
              Austin and HCRL director, contributes ongoing academic robotics research depth as Chief Scientist while
              maintaining his academic role. Nick Paine leads technical development as CTO. Bill Helmsing is a
              co-founding engineer.


              The company has significantly expanded its executive team in 2024 through 2026. Greg Steele joined as COO
              in April 2024 with Boston Dynamics operational background. Kay Sheils Kingsbury serves as CFO and Barry
              Phillips as CCO. Steven Riddle is VP of Engineering. In April 2026, Apptronik announced a major wave of
              executive hires: Daniel Chu joined as Chief Product Officer, having previously served as CPO at Waymo
              (where he helped launch the world's first fully autonomous ride-hailing service) and CPO at 23andMe; Kevin
              Garell joined as SVP of Services and Support, previously having led global services at Boston Dynamics;
              Chirag Shah joined as VP of Software, previously a software executive at Amazon for Kindle and Alexa+.


              Key-person risk is concentrated around CEO Jeff Cardenas, who is the company's primary public face and has
              driven all major fundraising. The board composition and governance structure have not been publicly
              disclosed. Howard Morgan of B Capital, the lead investor, has been an active external champion. The wave
              of April 2026 senior hires from Waymo, Boston Dynamics, and Amazon signals a deliberate transition from an
              R&D organization to a commercial-scale operation.
