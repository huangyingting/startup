      - number: '6.2'
        title: Named Customer Profiles and Pilot Evidence
        blocks:
          - type: paragraph
            body: >
              Mercedes-Benz began a pilot deployment of Apollo robots in its manufacturing facilities in March 2024,
              making it Apptronik's first and longest-running named enterprise customer. The pilot focuses on assembly
              line assistance—tasks such as part transfer, component delivery, and repetitive physical labor in body
              shop or general assembly areas. As of May 2026, the pilot has been running for over two years without a
              publicly disclosed conversion to a commercial contract. Mercedes-Benz participated in the Series A
              extension (March 2025) as a strategic investor, creating an investor-customer overlap. The company has not
              issued a customer satisfaction statement, disclosed pilot performance KPIs, or announced expansion to
              additional facilities or a higher unit count.


              GXO Logistics, the world's largest pure-play contract logistics provider by revenue (approximately $9.8
              billion in 2023), is evaluating Apollo for warehouse automation including picking, sorting, box handling,
              and loading operations. No precise start date for the GXO pilot has been publicly disclosed, though it is
              broadly contemporaneous with or following the Mercedes-Benz engagement. GXO has not disclosed robot unit
              counts, warehouse locations, specific task performance data, or plans for expanded deployment. GXO is not
              listed as an investor in public round disclosures, making it the most independently positioned of the
              three named enterprise pilot customers.


              Jabil, a $29 billion revenue electronics manufacturing services company operating 100-plus facilities
              worldwide, entered a dual pilot-customer and manufacturing partnership with Apptronik in February 2025.
              Under the manufacturing agreement, once Apollo is determined to be commercially viable, Jabil will produce
              Apollo robots in its own factories. This creates a contractual incentive for Jabil to want Apollo to
              succeed commercially—its position as pilot evaluator is therefore not fully independent of its strategic
              interest in becoming the contract manufacturer. Jabil also participated in the Series A funding,
              reinforcing the investor-customer overlap pattern across named enterprise customers.


              NASA's relationship with Apptronik traces to the founding team's work on the Valkyrie humanoid at UT
              Austin's Human Centered Robotics Lab under the NASA-DARPA Robotics Challenge (2013). The ongoing
              collaboration is classified as an R&D partnership and is not a revenue-generating commercial customer
