      - number: '5.5'
        title: Technology Risks and Critical Dependencies
        blocks:
          - type: paragraph
            body: >
              Apollo's technology profile carries several material risks. First, the 4-hour battery runtime per pack
              creates a logistical dependency on hot-swap battery infrastructure at every deployment site; without
              pre-positioned charged packs, robot utilization drops below the 24/7 threshold required to compete
              economically with human labor costs. Second, NVIDIA Jetson AGX Orin—while a capable embedded AI SoC—is a
              consumer and automotive-grade platform, not aerospace-certified, and is subject to NVIDIA's supply chain
              dynamics and geopolitical export control risk. Third, Apptronik is currently dependent on a single AI
              vendor, Google DeepMind, for its core VLA capability; any deterioration of that partnership, IP ownership
              dispute, or competitive restriction from Google could significantly impair Apollo's task generalization
              roadmap.


              Fourth, current VLA models including Gemini Robotics exhibit probabilistic failure modes that are
              acceptable in research settings but potentially disqualifying in precision manufacturing or pharmaceutical
              assembly where error tolerance is near zero. Fifth, at 160 pounds, Apollo poses a non-trivial fall and
              collision risk; even with the Impact Zone safety feature, a robot falling or dropping payload near a human
              co-worker is a regulatory and liability concern. Sixth, Texas Instruments' motor control ICs are
              sole-sourced for safety-critical actuation; any supply disruption would require costly recertification of
              alternative components. Seventh, NVIDIA chip export restrictions, if extended to the Jetson platform or
              comparable SoCs, could impair international deployments. These risks collectively represent a concentrated
              technology dependency profile that warrants deep vendor and supply chain diligence beyond what is publicly
              available.
            claimRefs:
              - CE028
              - CE029
              - CE030
              - CE031
              - CE032
              - CE033
              - CE034
