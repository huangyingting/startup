chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Apptronik is an Austin, Texas-based humanoid robotics company founded in 2016 as a commercial spinout from
              the Human Centered Robotics Lab (HCRL) at the University of Texas at Austin. The company develops
              AI-powered general-purpose humanoid robots intended to operate in industrial environments alongside
              humans. Its flagship product, Apollo, is a 5-foot-8-inch, 160-pound humanoid robot capable of carrying
              55-pound payloads and operating for four hours per battery pack. Apollo features NVIDIA Jetson AGX Orin
              compute hardware, TI motor-control solutions with TÜV SÜD functional safety certification, hot-swappable
              batteries, and a configurable Perimeter Zone and Impact Zone safety system. The robot is available in both
              legged and wheeled configurations, with CEO Jeff Cardenas noting that early industrial demand favors
              wheeled variants for their lower cost and safer operation near humans, while legged systems have a higher
              long-term ceiling.


              Apptronik's business model is Robotics-as-a-Service (RaaS), pricing Apollo at approximately $80,000 per
              year per unit, which encompasses robot hardware, software updates, and ongoing service and support. The
              company targets manufacturing, logistics, and warehousing as its initial commercial verticals, with
              longer-term plans for retail, healthcare, and eldercare applications. Apptronik frames Apollo as "one
              robot to do thousands of tasks" rather than deploying task-specific machines, emphasizing flexibility,
              safety, and human-centered design as core differentiators. The company's target long-term unit price is
              below $50,000. Headquarters are at 11701 Stonehollow Dr, Suite 150, Austin, TX 78758, with a California
              office planned.
