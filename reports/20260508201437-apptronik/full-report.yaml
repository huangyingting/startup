  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Framework and Current Metrics
        blocks:
          - type: paragraph
            body: >
              Apptronik's current post-money valuation of approximately $5 billion was established in February 2026
              through the Series A-X extension round, priced at a 3x multiple of the original Series A valuation. Total
              capital raised stands at approximately $1 billion ($14.6 million seed plus over $935 million across Series
              A tranches), placing Apptronik among the top-three best-capitalized humanoid robotics companies globally
              alongside Figure AI and Tesla Optimus. The valuation was confirmed by a source familiar with the matter in
              Reuters coverage and is corroborated by SEC Form D filings.


              No audited financial statements or formal annual recurring revenue (ARR) figures have been publicly
              disclosed. CEO Jeff Cardenas stated that prior to the Series A, the company generated more revenue than
              capital raised, implying pre-Series A revenue exceeding approximately $14.6 million — but this is a
              company claim without independent verification. The $5 billion valuation is a pure investor-term-sheet
              valuation with no revenue multiple anchor. At B Capital's projected $80,000 per year RaaS pricing,
              achieving $1 billion in ARR would require deployment of approximately 12,500 Apollo robots. Howard Morgan
              of B Capital has projected $1 billion in customer orders beginning 2027, but this has not been
              corroborated by customer commitments.


              The venture capital market context supports the premium pricing environment: the AI robotics sector raised
              $6.1 billion in 2025 alone, a 300% increase from the prior year, creating a liquidity-rich backdrop for
              elevated pre-revenue valuations. Goldman Sachs Research projects the global humanoid robotics market will
              reach $38 billion by 2035, and MarketsandMarkets projects $15.26 billion by 2030 at a 39.2% CAGR. These
              TAM projections form the basis for investor willingness to assign multi-billion-dollar valuations to
              pre-revenue humanoid robotics companies, including Apptronik.
