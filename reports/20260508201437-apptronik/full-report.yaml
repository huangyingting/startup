      - number: '8.2'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >
              The humanoid robotics comparable set is nascent and valuation-compressed, with most peers either privately
              held or valued through strategic acquisitions rather than arm's-length market transactions. The most
              direct comparable is Figure AI, which achieved a $39 billion valuation in February 2025 with $2.6 billion
              raised, a BMW automotive manufacturing pilot, and a partnership with Microsoft/OpenAI — structurally
              similar to Apptronik (enterprise pilot, AI partnership, comparable commercial stage) but valued at 7.8x
              Apptronik's $5 billion. This gap suggests either that Figure AI is substantially overvalued or that
              Apptronik has significant upside potential as commercialization progresses.


              Boston Dynamics provides a useful precedent as a company that navigated from research to commercial
              product over two decades. Hyundai's 2021 acquisition implied approximately $1.1 billion in enterprise
              value, though subsequent valuation discussions placed the company above $16 billion by 2024, demonstrating
              that humanoid robotics assets can appreciate materially with demonstrated commercial performance. Agility
              Robotics was acquired by Amazon in 2023 for an estimated $375 million — a lower multiple reflecting a
              narrowly focused product and captive internal deployment rather than external RaaS.


              Smaller comparables include 1X Technologies (Norwegian; approximately $500 million valuation, $125 million
              raised, OpenAI-backed) and Sanctuary AI (Canadian; approximately $750 million estimated valuation,
              approximately $100 million raised). Both are at similar commercial stages but command substantially lower
              valuations, reflecting Apptronik's superior capital base and investor quality. UBTech Robotics (HK-listed)
              provides a public-market reference at approximately HKD $2 billion (~USD $255 million), while Chinese
              manufacturers like Unitree operate a product sales model with robots priced at $16,000-$70,000, creating
              structural pricing pressure on the RaaS model rather than a direct equity comparable.


              Overall, Apptronik's $5 billion valuation sits in a defensible middle position: substantially below Figure
              AI's outlier valuation, materially above acquisition-stage peers, and commanding a premium over the
              public-market UBTech anchor — reflecting AI-native positioning and top-tier investor validation.
