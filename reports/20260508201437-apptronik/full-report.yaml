      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              The Total Addressable Market (TAM) for humanoid robots is a labor substitution thesis: the ILO estimates
              approximately 1.4 billion manufacturing workers globally, with robotic penetration under 5% even in the
              most automated economies. Goldman Sachs Research (January 2024) framed the long-run TAM at $38 billion by
              2035 and 1.4 million humanoid robots shipped annually. ARK Invest (2023 Big Ideas) modeled humanoid robots
              as a $24 trillion opportunity by 2030 at full adoption—a figure viewed as speculative even by optimists.
              The more conservative and near-term relevant TAM is the humanoid-specific hardware/software market: Grand
              View Research put this at $2.0B in 2024, with MarketsandMarkets projecting $15.26B by 2030 (CAGR 39.2%)
              and $38B by 2035 per Goldman Sachs.


              The Serviceable Addressable Market (SAM) for Apptronik is structured industrial environments where
              humanoid robots can be deployed safely today or within a 3-year horizon. These include automotive
              manufacturing assembly lines (e.g., tire mounting, part carry), electronics manufacturing (e.g., PCB
              handling, EV battery assembly), and logistics/warehouse order fulfillment and goods-to-person operations.
              The IFR (International Federation of Robotics) estimates global automotive robot installations at
              ~130,000/year and logistics automation at a $20B+ global market by 2026. Apptronik's SAM, scoped to
              structured industrial environments where early humanoid deployments are feasible, is estimated at $5–10B
              by 2030, based on a bottom-up composition of its pilot verticals.


              The Serviceable Obtainable Market (SOM) for Apptronik through 2030 depends heavily on pilot-to-commercial
              conversion, production ramp, and competitive intensity. At a $80K/year RaaS price and 1,000–5,000 deployed
              units by 2030, Apptronik's implied revenue run-rate is $80M–$400M. Given the competitive intensity
              (Figure, Tesla Optimus, Boston Dynamics, 1X, Agility/Amazon, Unitree), an optimistic 5–10% SAM share
              implies $250M–$1B SOM, while a conservative 1–2% implies $50M–$200M. B Capital's Howard Morgan publicly
              forecast $1 billion in customer orders starting 2027, which implies a rapid conversion from existing
              pilots to volume deployment.


              VC investment trends corroborate the market opportunity: humanoid robotics companies raised $6.1B across
              139 deals in 2025—a 300% increase from 2024—signaling broad investor confidence in the sector's near-term
              commercialization potential. Apptronik's own $520M raise in February 2026 makes it one of the
              best-capitalized players in the sector.
            claimRefs:
              - CM006
              - CM007
              - CM008
              - CM009
