  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Apptronik operates in a regulatory environment that has not yet produced standards specific to humanoid
              robots working alongside humans in industrial settings. IEC 61508 (functional safety of
              electrical/electronic/programmable systems) and ISO 13849 (safety of machinery) apply to component-level
              safety, and Apollo's motor-control system has achieved TÜV SÜD functional safety certification under these
              standards. However, no ISO or IEC standard yet addresses a full-system humanoid robot operating as a
              co-worker in a shared human-robot workspace. This gap creates two interconnected liabilities: enterprise
              procurement teams face uncertainty about compliance obligations, slowing purchase decisions; and Apptronik
              faces product-liability exposure in jurisdictions with undeveloped case law for humanoid robot injuries.


              OSHA has issued no regulation specific to humanoid co-worker robots. The existing OSHA framework for
              industrial robots (29 CFR 1910.217 and related general duty provisions) was written for fixed, caged
              industrial arms, not mobile 160-pound bipeds. Any future OSHA rulemaking could impose retrofit
              requirements on deployed Apollo units, creating unexpected cost burdens for both Apptronik and its
              customers. Labor unions including the UAW and Teamsters have vocally opposed automation, and regulatory
              advocacy from labor groups could accelerate prescriptive OSHA rulemaking.


              IP lineage from UT Austin's HCRL creates a potential licensing risk. Apptronik was incorporated as a
              spinout, and the terms under which HCRL-developed IP was transferred to the private company have not been
              publicly disclosed. Any unresolved IP ownership dispute with UT Austin could cloud Apptronik's IP
              portfolio and complicate licensing or acquisition discussions. US export-control regimes and ITAR-adjacent
              classification of dual-use robotic systems for potential defense applications add another regulatory
              layer, particularly as NVIDIA's Jetson AGX Orin compute platform is subject to evolving BIS export rules.
              Securities compliance risk is present given the complexity of the $935M Series A structure with multiple
              tranches and diverse investor categories; any misrepresentation in Reg D filings creates SEC exposure.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
