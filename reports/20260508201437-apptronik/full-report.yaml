      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Investment Recommendation: Track at $5B'
            body: >-
              Recommend track — no buy at current $5 billion valuation until at least one of three pilots publicly
              converts to a disclosed commercial contract with unit economics. Re-evaluate in H2 2026 when the new
              Apollo model debut and pilot commercial decisions provide the first genuine evidence of commercial
              viability. The bull case (7.6x return to 2035) is compelling but premature to price in at current
              valuation given pre-ARR status and demand-independence concerns.
            calloutType: recommendation
            claimRefs:
              - CV019
              - CV020
              - CV028
          - type: callout
            title: 'Demand Independence Risk: All Three Customers Are Also Investors'
            body: >-
              All three of Apptronik's known pilot customers — Mercedes-Benz, GXO Logistics, and Jabil — are also
              investors in the company. This creates a structural demand-independence concern: strategic investments may
              be influencing pilot decisions, and the absence of arm's-length commercial commitments makes it impossible
              to confirm genuine market demand exists at the $80,000/year RaaS price point.
            calloutType: risk
            claimRefs:
              - CV028
          - type: callout
            title: Significant Upside Potential Relative to Figure AI Discount
            body: >-
              Apptronik's $5 billion valuation is 87% below Figure AI's $39 billion despite raising comparable total
              capital (~$1B vs. $2.6B) and operating at a similar commercialization stage with arguably stronger
              operational heritage. If Apptronik achieves comparable commercial milestones to Figure AI, the re-rating
              potential is substantial — the current discount may represent an attractive entry point once commercial
              conversion is demonstrated.
            calloutType: strength
            claimRefs:
              - CV009
