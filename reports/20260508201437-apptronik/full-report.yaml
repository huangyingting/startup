      - number: '7.3'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >
              Apptronik's technology stack is concentrated in a small number of sole-source or single-vendor
              relationships. The most critical dependency is Google DeepMind's Gemini Robotics VLA, which provides the
              AI capabilities that differentiate Apollo from prior-generation robots. If the Google DeepMind partnership
              dissolves, Google redirects its robotics AI strategy, or the Gemini Robotics model line is deprecated,
              Apptronik would need to rebuild its AI stack from scratch or integrate an unproven alternative, a 12-24
              month setback. There is no disclosed fallback AI vendor.


              NVIDIA is the sole compute platform provider for Apollo (Jetson AGX Orin). NVIDIA has significant pricing
              power as the dominant AI chip supplier and can adjust pricing, allocation, or terms unilaterally. Texas
              Instruments provides the motor-control solutions that underpin Apollo's functional safety certification;
              TI is the disclosed sole-source supplier for this safety-critical system, meaning any supply disruption or
              TI strategic decision to exit the market could ground Apollo production. Jabil's dual role as
              manufacturing partner and pilot customer creates a structural conflict of interest: as a customer, Jabil
              has incentive to negotiate the lowest possible RaaS rate, while as the contract manufacturer, Jabil has
              visibility into Apollo's cost structure that could be used in negotiations.


              Customer concentration risk is material: three known pilot customers (Mercedes-Benz, GXO Logistics, Jabil)
              represent essentially all of Apptronik's disclosed commercial relationships. The loss of any single
              relationship—particularly if a pilot fails to convert to commercial deployment—would eliminate a
              significant portion of near-term revenue potential and damage market confidence. Apptronik remains
              pre-commercial and dependent on ongoing VC funding; a broader capital markets contraction or a reversal in
              robotics investor sentiment could constrain the company's ability to fund operations through the 2027
