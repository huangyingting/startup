      - number: '4.5'
        title: Public Financial Gaps and Diligence Priorities
        blocks:
          - type: paragraph
            body: >
              Apptronik is a private company with fewer than 500 shareholders of record and is not subject to SEC public
              financial reporting requirements. As a result, a substantial set of financial data points critical to full
              diligence remain undisclosed. The most material gaps are: (1) actual ARR and revenue composition — the
              company has claimed pre-Series A revenue exceeded seed capital but has not provided ARR figures, revenue
              breakdown by customer or category, or any forward revenue guidance; (2) gross margin — no information is
              available on robot manufacturing cost versus RaaS subscription revenue, which is essential for unit
              economics analysis; (3) net burn rate — estimated at $100–200M/year from headcount data but unconfirmed;
              (4) pilot contract terms — it is unknown whether Mercedes-Benz, GXO Logistics, or Jabil are paying pilot
              fees, receiving trial deployments at cost, or operating under deferred payment models; (5) equity cap
              table and dilution — while major investors are named, share classes, anti-dilution provisions, liquidation
              preferences, and total share count are not public; (6) debt — no information on debt financing,
              convertible notes, or revenue-based financing.


              For any institutional due diligence process, these gaps would need to be addressed through direct data
              room access, audited financial statements, and confirmation of commercial contract terms. The absence of
              this data does not indicate financial distress; it is normal for a private company at this stage. However,
              it means that financial modeling for this chapter must rely on estimates, comparisons, and publicly
              disclosed qualitative anchors rather than confirmed financial performance.
