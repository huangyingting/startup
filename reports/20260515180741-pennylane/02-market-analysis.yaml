        Pennylane's current position.
      diligencePath: >-
        Request management accounts or unaudited revenue figures from Pennylane's
        investor relations; review any future prospectus or IPO filing disclosures.
      relatedQuestionRefs: [QM020]

    - type: missing-source
      severity: minor
      topic: data-sovereignty
      missingEvidence: >-
        No primary regulatory guidance or legal opinion was located on the specific
        cross-border data sovereignty implications for French financial data processed
        by foreign-owned PDPs operating in France under GDPR and the DGFiP framework.
      whyItMatters: >-
        GDPR and national financial data rules could affect Pennylane's ability to
        store data in EU but non-France infrastructure, which may constrain its
        European expansion cost structure and compliance posture.
      diligencePath: >-
        Consult CNIL guidance on financial data residency; review DGFiP PDP certification
        requirements for data localisation; obtain legal opinion on German Steuerberater
        data rules for cross-border processing.
