  - id: regulatory-and-macro
    title: Regulatory and Macro Environment
    body: >-
      The dominant regulatory catalyst is the DGFiP Facturation Électronique reform.
      Under this legislation, all French B2B transactions must be processed through
      certified platforms (PDPs — Plateformes de Dématérialisation Partenaires) or
      the government's own clearinghouse (PPF — Portail Public de Facturation). The
      DGFiP launched a pilot program with a select group of certified PDPs, of which
      Pennylane is an approved participant. Reception obligations apply from September
      2026 for all companies; emission obligations are phased — large enterprises
      first, mid-size by early 2027, and micro-enterprises by late 2027. This creates
      a multi-year compliance wave. Digital identity and GDPR compliance are
      prerequisites for PDP certification, representing a significant barrier to entry
      that protects Pennylane's approved status.

      Beyond e-invoicing, relevant regulatory context includes: GDPR (data
      residency expectations that favour French-domiciled platforms); the France
      2030 SMB digitalisation investment programme (potential co-investment subsidies);
      and evolving DSP2/PSD2 open-banking standards that enable Pennylane's
      bank-connectivity features. Macro conditions in France in 2026 are mixed —
      SMB formation rates have moderated since the post-COVID surge, but the regulatory
      compliance imperative creates software spend that is insulated from economic
      cycles. German regulatory context (the e-Rechnung mandate for B2G transactions
      already active, and B2B obligations under discussion) mirrors the French trajectory
      and validates Pennylane's European expansion timing.
