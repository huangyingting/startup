  - id: market-sizing
    title: Market Sizing — France and European TAM
    body: >-
      No single authoritative published study sizes the French cloud accounting
      software market in isolation; estimates are constructed from multiple lenses.
      The bottom-up approach: France's approximately 5 million SMBs spending an
      average of €300–500 per year on financial management software yields a total
      French SMB financial software TAM of approximately €1.5–2.5 billion annually.
      This range is consistent with Sage's publicly stated 2 million+ French customers
      generating implied average revenue per account in the €500–800 range across
      mixed product tiers. Extending to Europe, the SMB accounting software market
      is broadly estimated at €8–12 billion, with France representing 15–20% of
      the total.

      The SAM (serviceable addressable market) for cloud-native solutions narrows
      significantly: applying France's current cloud accounting penetration rate of
      approximately 35–40% (vs ≈70% in the UK) yields a current SAM of approximately
      €525M–1.0B. However, the September 2026 e-invoicing mandate is expected to
      act as a full-market forcing function, pulling forward cloud migration among
      the remaining 60–65% of non-cloud SMBs over 2025–2028 and expanding the
      effective cloud SAM toward the full TAM over that horizon. Market growth is
      estimated at 8–12% CAGR through 2028, primarily driven by regulatory compliance
      demand rather than organic digitization velocity. Pennylane's estimated SOM —
      implied by its 1 million+ SMB clients and pricing of approximately €24–120+
      per month — represents a current French revenue run-rate in the range of
      €35–100 million annually, equating to roughly 2–7% of the France-only TAM.
