chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Pennylane addresses the French SMB financial-management software market, estimated
    at €1.5–2.5 billion annually for France alone and €8–12 billion across Europe.
    Approximately 5 million French B2B SMBs (TPE/PME) must comply with the DGFiP
    e-invoicing mandate (Facturation Électronique) taking effect September 2026,
    creating the largest single structural catalyst in the market's history. Cloud
    accounting penetration in France (≈35–40%) lags the UK (≈70%), confirming
    substantial greenfield migration opportunity. Pennylane's accountant-first GTM
    — reaching 6,000+ accounting firms and 1 million+ SMBs — delivers embedded
    switching costs that legacy incumbents (Sage, Cegid) cannot easily replicate.
    Key headwinds include Sage's 2M+ French customer installed base, freemium
    competition from Indy in the micro-enterprise segment, and AI-driven
    commoditization risk. The e-invoicing mandate, the exit of QuickBooks France,
    and a German expansion signal strong market timing in 2026.

sections:
  - id: market-definition
    title: Market Definition and Boundaries
    body: >-
      Pennylane's primary addressable market is the financial-management software
      layer for French TPE/PME (très petites entreprises / petites et moyennes
      entreprises). The French Code de Commerce mandates statutory accounting and
      tax reporting for all commercial entities, creating universal demand for
      compliant bookkeeping tools. INSEE estimates approximately 4.8–5.2 million
      active SMBs in France, of which roughly 3.7 million are micro-enterprises
      (auto-entrepreneurs and sole traders) and the remainder are formal commercial
      entities with full accounting obligations.

      Included spend in Pennylane's addressable market covers: cloud accounting and
      bookkeeping (journal, TVA, statutory accounts), electronic invoicing and AP/AR
      automation, financial management dashboards, cash-flow monitoring, and PSD2
      banking connectivity for transaction categorisation. Excluded spend includes
      full ERP systems (SAP, Oracle), dedicated payroll (Silae, Sage Paie),
      standalone expense management, pure CRM/billing tools, and large corporate
      treasury management. Adjacent spend — document-capture tools (Dext), freelancer
      neobanks (Indy, Qonto, Shine), and accounting practice management — represents
      complementary rather than competitive market territory in most buyer segments.

      Status-quo substitutes that Pennylane must displace include desktop-installed
      legacy software (EBP, Ciel), server-hosted Sage and Cegid deployments, and
      Excel-based bookkeeping for micro-enterprises. The September 2026 e-invoicing
      mandate is the single most powerful forcing function for substitute displacement
      since the introduction of electronic TVA declarations. Pennylane has also
      expanded its addressable boundary into Germany (Steuerberatung segment),
      evidenced by German-language pages on its website and sitemap, extending the
      TAM definition beyond France.
