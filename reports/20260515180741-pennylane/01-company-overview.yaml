  - id: s4
    title: Scale, Customers, and Traction
    body: >-
      As of May 2026, Pennylane self-reports more than 1,000,000 business customers using the
      platform, and more than 6,000 accounting firms (cabinets d'expertise comptable) as
      professional users. These two metrics define Pennylane's dual-sided market position: it
      has achieved meaningful scale on both the SMB side (businesses that need financial
      management) and the professional side (accountants who serve those businesses). [CO023]
      [CO024]

      Pricing on the public tarifs page starts at €14/month (Basique plan: invoicing + purchase
      management) and €24/month (Essentiel plan: full financial management). A Premium plan
      includes accounting module capabilities at pricing not publicly displayed. This per-seat
      SaaS model, combined with a corporate bank account and Mastercard card product, creates
      multiple revenue streams per customer: software subscription revenue, banking interchange
      income, and potentially interest income on deposits held. [CO025] [CO026]

      The 300+ integrations listed on the Pennylane integrations page cover popular SMB tools
      across e-commerce (Shopify, WooCommerce), payments (Stripe, PayPal), payroll (Silae,
      Lucca), and other categories. This breadth signals a platform strategy: Pennylane aims to
      be the financial data hub for SMBs rather than a point product. The company's ISO 27001
      certification and RGPD compliance are relevant trust signals for French enterprises and
      regulated accounting workflows. [CO027] [CO028]
    claimRefs:
      - CO023
      - CO024
      - CO025
