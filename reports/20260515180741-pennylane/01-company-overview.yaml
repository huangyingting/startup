  - id: s3
    title: Funding History, Valuation, and Key Investors
    body: >-
      Pennylane has raised over €410M in primary funding since its 2020 founding, achieving
      unicorn status in October 2024 with a €1B valuation and doubling to €2B by April 2025 and
      again reaching €3.6B in January 2026. The funding trajectory is one of the fastest in
      European fintech history: from founding to a €3.6B valuation in under six years.

      In 2021, Pennylane raised two rounds totaling approximately €30M (roughly €15M each),
      establishing the initial institutional investor base. In January 2022, the company raised
      €50M, as reported by Maddyness. The Series C round in October 2024 raised €80M at a €1B
      valuation and was led by Sequoia Capital (via partner Luciana Lixandru), confirming
      Pennylane as a unicorn — France's newest at the time. In April 2025, Pennylane raised
      €75M at a €2B valuation, doubling its valuation in six months. In January 2026, the company
      raised €175M at a €3.6B valuation with US growth equity fund TCV entering the cap table
      for the first time alongside existing investors. [CO016] [CO017] [CO018] [CO019] [CO020]

      Key investors include Sequoia Capital (led the Series C at €1B; partner Luciana Lixandru
      leads the investment), Partech (longstanding European fintech VC and early backer), Global
      Founders Capital (GFC, early-stage backer), and TCV (US growth equity fund, entered in the
      January 2026 round). This investor mix — a top-tier US VC (Sequoia), a leading European
      fintech specialist (Partech), and a US growth equity fund (TCV) — mirrors the cap table
      compositions of European fintech category leaders such as Revolut and Klarna. [CO021]
      [CO022]
