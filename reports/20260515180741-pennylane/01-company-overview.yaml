chapter:
  number: 1
  title: Company Overview
  summary: >-
    Pennylane is a French fintech and accounting SaaS company founded in 2020 in Paris by Arthur
    Waller and co-founders. The company offers an all-in-one cloud platform connecting SMBs and
    their accountants, covering invoicing, purchase management, expense management, treasury,
    full accounting, and a corporate bank account with Mastercard cards. Pennylane serves
    1,000,000+ business customers and 6,000+ accounting firms (cabinets d'expertise comptable)
    and employs approximately 900 people including 300+ engineers. In January 2026 the company
    raised €175M at a €3.6B valuation — its highest to date — bringing total capital raised to
    over €410M. It is an approved Plateforme de Dématérialisation Partenaire (PDP) for the French
    e-invoicing reform (Facturation Électronique) scheduled for September 2026, and is expanding
    into Germany. Key investors include Sequoia Capital, Partech, Global Founders Capital (GFC),
    and TCV.

sections:
  - id: s1
    title: Identity, Business Model, and Market Position
    body: >-
      Pennylane was founded in 2020 in Paris, France by Arthur Waller (CEO) and co-founders. The
      company builds an all-in-one cloud-based financial management and accounting platform that
      serves two distinct but interconnected customer segments: SMBs (small and medium-sized
      businesses) and accounting professionals (experts-comptables). Rather than offering
      siloed point solutions, Pennylane integrates invoicing, purchase management, expense
      management, treasury, full accounting (grand-livre, FEC), and a native corporate bank
      account with Mastercard-branded cards into a single platform where accountants and their
      business clients share real-time financial data. [CO001] [CO002] [CO003]

      Pennylane's core value proposition is the elimination of the information asymmetry between
      SMBs and their accountants. Prior to Pennylane, accountants typically received data from
      clients weeks or months after the fact via paper documents or disconnected export files.
      Pennylane places both parties on the same platform — the accountant can see client bank
      transactions, categorize expenses, validate invoices, and close the books without waiting
      for client uploads. This "real-time accounting" model is structurally different from legacy
      desktop software like Cegid or Sage, which primarily target accounting professionals
      rather than the dual SMB-accountant workflow. [CO004] [CO005]

      The platform supports 300+ third-party integrations including payment processors, e-commerce
      platforms, and payroll software, extending its utility across the SMB technology stack.
      Pennylane holds ISO 27001 certification for information security and complies with RGPD
      (GDPR equivalent under French law). As of the 2026 run date the company is headquartered
      at Paris, France and has begun geographic expansion into Germany with German-language
      product pages live for accountants (Steuerberater), e-invoicing (E-Rechnung), and
      integrations. [CO006] [CO007] [CO008]
    claimRefs:
