  evidenceGaps:
    - type: missing-source
      severity: minor
      topic: co-founders
      missingEvidence: >-
        Names, roles, and professional backgrounds of Pennylane's co-founders other than Arthur
        Waller (CEO). Public sources consistently reference "Arthur Waller and co-founders" without
        naming the other founders. Their current roles within the company are also unknown.
      whyItMatters: >-
        Unnamed co-founders are a governance gap; understanding the full founding team composition
        is standard for company overview diligence and affects leadership continuity assessment.
      diligencePath: >-
        Review Pennylane's LinkedIn company page and Arthur Waller's LinkedIn connections; check
        early Maddyness and TechCrunch founding stories for co-founder names; review Infogreffe
        (French corporate registry) for officer filings.
      relatedQuestionRefs:
        - QO009
      relatedTableRefs:
        - TO002

    - type: private-evidence-only
      severity: material
      topic: financial-transparency
      missingEvidence: >-
        Pennylane has not publicly disclosed revenue figures, revenue growth rate, gross margin,
        or operating cash flow. As a French private company (SAS), it is not required to file
        public detailed accounts. Analyst estimates (a la Sacra.com for US companies) have not
        been published for Pennylane. No ARR, MRR, or unit economics data is available in the
        public domain.
      whyItMatters: >-
        Without revenue data, investors and analysts cannot derive an EV/ARR multiple from the
        €3.6B valuation, assess capital efficiency, or compare financial trajectory to European
        fintech peers like Revolut or Qonto. The €3.6B valuation is entirely confidence-driven
        with no financial anchor.
      diligencePath: >-
        Request management accounts in private due diligence; monitor Pennylane's French corporate
        filings at Infogreffe (annual comptes annuels) for disclosed turnover; track press
        interviews with Arthur Waller for any disclosed revenue metrics.
      relatedQuestionRefs:
        - QO018
        - QO026

    - type: missing-source
      severity: minor
      topic: banking-license
      missingEvidence: >-
        The regulatory authorization underpinning Pennylane's corporate bank account (Compte Pro)
        is not disclosed on product pages. It is unclear whether Pennylane holds its own payment
        institution license (établissement de paiement, regulated by ACPR) or relies on a
        banking partner white-labeling the account infrastructure.
      whyItMatters: >-
        Regulatory licensing status affects Pennylane's revenue model (interchange share vs.
        partner arrangement), customer protections (deposit insurance eligibility), and competitive
        moat (own license vs. partner-dependent). If Pennylane relies on a banking partner,
        that partner relationship is a key risk factor.
      diligencePath: >-
        Search ACPR (Autorité de Contrôle Prudentiel et de Résolution) public registry for
        Pennylane payment institution registration; review Pennylane general terms and conditions
        for banking partner disclosures; request licensing documentation in private due diligence.
      relatedQuestionRefs:
        - QO025

    - type: enumeration-incomplete
      severity: minor
      topic: investor-base
      missingEvidence: >-
        Full cap table with investor names, ownership percentages, and preferred liquidation
        preferences is not publicly available. Individual investor names for some rounds (January
        2022, April 2025) are not explicitly disclosed in press coverage. The exact lead investor
        for the April 2025 round has not been confirmed by name. Board seat holders from Partech,
        GFC, and TCV are not individually named.
      whyItMatters: >-
        Without a full investor list, assessing investor alignment, governance concentration,
        and liquidation waterfall mechanics in a potential exit or IPO scenario is not possible.
        The identity of co-investors in later rounds (beyond Sequoia and TCV) affects governance
        analysis.
      diligencePath: >-
        Request cap table in private due diligence; review French corporate registry (Infogreffe)
        for shareholder filings; cross-reference TechCrunch, Maddyness, and Sifted for investor
        name disclosures; contact Partech and GFC investor relations for confirmation of board
        seat holders.
      relatedQuestionRefs:
        - QO008
      relatedTableRefs:
        - TO003

