  - id: FR002
    title: Competitive Threat Flow -- Sage and Cegid Attack Vectors
    description: >-
      Directed graph mapping how Sage Active and Cegid exert competitive pressure on
      Pennylane's dual-sided accountant-SMB platform, showing the pathways through
      which each competitor could erode Pennylane's market position by 2026-2027.
    type: dag
    layout: wide
    summary: >-
      Sage Active and Cegid represent structurally different but compounding competitive
      threats. Sage attacks via price (EUR 12.50/mo vs EUR 24/mo) and installed base
      migration (2M+ customers). Cegid attacks via downmarket extension to mid-tier firms.
      Both converge on the accounting firm channel, which is Pennylane's primary CAC lever.
    claimRefs:
      - CR009
      - CR010
      - CR012
      - CR013
    data:
      nodes:
        - id: n1
          label: Sage Active (EUR 12.50/mo; PDP-pursuing)
          type: competitor
        - id: n2
          label: Cegid Loop (mid-to-large accounting firms)
          type: competitor
        - id: n3
          label: Accounting Firm Channel (6,000+ firms)
          type: channel
        - id: n4
          label: SMB Customer Base (1M+)
          type: target
        - id: n5
          label: Pennylane Entry Tier (EUR 24/mo)
          type: product
        - id: n6
          label: Dext (platform-agnostic document capture)
          type: competitor
        - id: n7
          label: PDP Certification Moat
          type: advantage
      edges:
        - from: n1
          to: n5
          label: Price undercutting (-48% vs Pennylane entry)
        - from: n1
          to: n3
          label: Sage for Accountants channel conflict
        - from: n2
          to: n3
          label: Downmarket extension to small accounting firms
        - from: n6
          to: n3
          label: Reduces switching cost for accountant workflow
        - from: n7
          to: n5
          label: Regulatory moat partially offsets price gap
        - from: n3
          to: n4
          label: Accountant-led SMB referrals (primary CAC)

  - id: FR003
    title: Financial Risk Cascade -- Valuation, Burn, and ARR Growth Dependency
    description: >-
      Directed graph showing how Pennylane's EUR 3.6B valuation and EUR 175M January 2026
      fundraise create a chain of financial risk dependencies: sustained ARR growth is
      required to justify the multiple, which in turn depends on e-invoicing mandate
      execution and competitive pricing position.
    type: dag
    layout: wide
    summary: >-
      The EUR 3.6B valuation at ~36x ARR creates a compounding risk chain: if ARR growth
      decelerates, the exit multiple is not achievable; if burn rate exceeds EUR 130M/year,
      the EUR 175M raise provides less than 18 months of runway; if the e-invoicing mandate
      is delayed again, the ARR growth narrative that drove the January 2026 raise collapses.
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR025
      - CR034
      - CR037
    data:
      nodes:
        - id: n1
          label: EUR 3.6B Valuation (Jan 2026, ~36x ARR)
          type: financial
        - id: n2
          label: EUR 175M Raise (TCV-led, Jan 2026)
          type: financial
        - id: n3
          label: Required ARR Growth (40-60% YoY sustained)
          type: requirement
        - id: n4
          label: E-invoicing Mandate (Sept 2026 trigger)
          type: dependency
        - id: n5
          label: Estimated Burn Rate (EUR 90-130M/yr)
          type: risk
        - id: n6
          label: Runway Risk (<18 months at max burn)
          type: risk
        - id: n7
          label: Investor Preference Stack (compression risk)
          type: risk
      edges:
        - from: n1
          to: n3
          label: 36x ARR multiple requires sustained 40-60% growth
        - from: n2
          to: n5
          label: Runway funded by raise
        - from: n5
          to: n6
          label: High burn at lower ARR range creates runway risk
        - from: n4
          to: n3
          label: Mandate delay = ARR growth narrative collapse
        - from: n3
          to: n1
          label: ARR deceleration reprices valuation downward
        - from: n1
          to: n7
          label: High entry valuation amplifies downside preference compression

