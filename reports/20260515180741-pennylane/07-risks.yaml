  evidenceGaps:
  - type: enumeration-incomplete
    severity: minor
    topic: regulatory-framework-enumeration-completeness
    missingEvidence: Additional local or sector-specific regulatory frameworks may apply to Pennylane beyond the six enumerated
      in TR001. Sector-specific fintech regulations (ACPR supervisory guidelines, FATCA/CRS reporting for financial data processors,
      DSP2 additional requirements) were not exhaustively surveyed across all applicable jurisdictions.
    whyItMatters: Unidentified compliance obligations could create regulatory gaps that expose Pennylane to enforcement action
      without prior warning; the partial coverage designation is appropriate given the scope of cross-border financial data
      processing.
    diligencePath: Review Pennylane's published legal terms, privacy policy, and applicable fintech regulation lists with
      French regulatory counsel; conduct a compliance gap assessment covering ACPR supervisory guidelines and EU digital finance
      regulations.
    relatedQuestionRefs:
    - QR003
    relatedTableRefs:
    - TR001
  - type: private-evidence-only
    severity: minor
    topic: GDPR-DPO-designation-status
    missingEvidence: Pennylane's GDPR Data Protection Officer identity and formal designation status are not confirmed in
      any public source. The CNIL public DPO registry was not accessed during research to confirm Pennylane's registration
      as a large-scale financial data processor.
    whyItMatters: DPO designation is mandatory under GDPR Article 37 for entities processing personal data at large scale;
      absence of a confirmed DPO could itself constitute a compliance violation and trigger CNIL scrutiny independent of any
      breach.
    diligencePath: Search CNIL public DPO registry for Pennylane registration; confirm DPO identity, appointment date, and
      reporting structure directly with Pennylane legal team; verify DPO independence and scope of mandate.
    relatedQuestionRefs:
    - QR009
  - type: missing-source
    severity: minor
    topic: Cegid-competitive-downmarket-strategy
    missingEvidence: No public announcement from Cegid regarding extending Cegid Loop or equivalent product to small accounting
      practices below its current mid-market target segment has been identified. Cegid's strategic product roadmap below the
      current 10-50 person practice segment is not publicly documented.
    whyItMatters: Cegid's intentions regarding Pennylane's core market segment remain unconfirmed; the downmarket risk is
      assessed as a credible future scenario rather than an active threat, but absence of evidence does not confirm absence
      of intent.
    diligencePath: Monitor Cegid press releases and product announcements; attend French accountant trade fairs (Congrès de
      l'Ordre des Experts-Comptables) where Cegid presents roadmaps; review Cegid investor communications for any mention
      of SMB accounting expansion.
    relatedQuestionRefs:
    - QR011
  - type: missing-source
    severity: material
    topic: Pennylane-security-incident-history
    missingEvidence: Pennylane's status page retains only 90 days of incident history; no comprehensive public breach disclosure,
      incident postmortem archive, or SOC 2 Type II audit report is available for external assessment of the platform's security
      track record.
    whyItMatters: Absence of disclosed incidents does not confirm absence of incidents; for a platform holding 1M+ SMB financial
      records, bank feeds, and FEC data, this is a material due diligence gap. A historical breach not yet publicly disclosed
      would represent a significant unquantified liability.
    diligencePath: Request full incident log from Pennylane security team covering minimum 36 months; review CNIL mandatory
      breach notification submissions; assess SOC 2 Type II or equivalent audit report; review DGFiP PDP audit results.
    relatedQuestionRefs:
    - QR017
  - type: missing-source
    severity: material
    topic: PDP-SLA-availability-commitment
    missingEvidence: Pennylane has not published a formal SLA or uptime commitment for its PDP e-invoicing service; DGFiP
      technical specifications for minimum PDP availability standards are not publicly confirmed. No contractual SLA for the
      PDP service is discoverable from public sources.
    whyItMatters: As part of critical financial infrastructure routing invoices for 1M+ businesses, service failures carry
      regulatory and legal consequences distinct from standard SaaS outages; inability to quantify residual availability exposure
      from public sources is a material diligence gap.
    diligencePath: Request Pennylane's PDP service agreement terms and uptime SLA; review DGFiP PDP technical specification
      for mandatory availability and security requirements; assess contractual penalty framework with accounting firm clients
      for platform unavailability.
    relatedQuestionRefs:
    - QR019
  - type: private-evidence-only
    severity: material
    topic: liquidation-preference-terms-across-six-rounds
    missingEvidence: The specific liquidation preference stack, anti-dilution provisions, participation rights, and ratchet
      mechanisms across Pennylane's six institutional financing rounds (including Sequoia, April 2025 round, and January 2026
      TCV-led Series E) are not disclosed in any public source.
    whyItMatters: In a downside exit below EUR 3.6B, preference compression can eliminate BSPCE and founder equity value entirely;
      quantifying downside protection for management and employees requires the full capitalisation table with preference
      terms.
    diligencePath: Request capitalisation table and shareholder agreements from Pennylane CFO or legal counsel; review investment
      agreements for liquidation preference multipliers, participation caps, anti-dilution mechanics, and conversion triggers.
    relatedQuestionRefs:
    - QR022
