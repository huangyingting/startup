      statement: >-
        Pennylane's PDP designation transforms it from a SaaS platform into critical financial
        infrastructure; routing e-invoices for 1M+ businesses makes Pennylane a priority target
        for ransomware, invoice fraud, and nation-state interference, attracting a categorically
        higher threat profile than a standard SaaS platform.
      type: inferred
      topic: pdp-infrastructure-threat
      sourceRefs: [SR009, SR010, SR001]
