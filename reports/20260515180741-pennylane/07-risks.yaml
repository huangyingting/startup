  claims:
    - id: CR001
      statement: >-
        The French e-invoicing mandate (Facturation Electronique) requires all B2B SMBs to
        route invoices via a certified PDP or the government PPF portal from September 2026;
        this deadline has already been postponed twice from original 2024 and 2025 targets.
      type: observed
      topic: e-invoicing-mandate-delay-risk
      sourceRefs: [SR001, SR002, SR003, SR004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR001, QR005, QR010, QR023]

    - id: CR002
      statement: >-
        Pennylane holds confirmed DGFiP PDP designation as of early 2026, enabling it to
        transmit and receive e-invoices on behalf of French B2B SMB clients as an approved
        Plateforme de Dematerialisation Partenaire.
      type: observed
      topic: pdp-certification-status
      sourceRefs: [SR009, SR001]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR008, QR011, QR016]

    - id: CR003
      statement: >-
        If the September 2026 e-invoicing deadline is delayed again, the primary near-term
        growth catalyst for Pennylane adoption disappears, extending the return timeline on
        the January 2026 EUR 175M fundraise and widening the gap between the EUR 3.6B
        valuation and demonstrated ARR.
      type: inferred
      topic: mandate-delay-financial-impact
      sourceRefs: [SR018, SR020, SR004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR005, QR013, QR023]

    - id: CR004
      statement: >-
        The DGFiP's free Portail Public de Facturation (PPF) is a government-operated alternative
        to commercial PDP platforms; widespread SMB adoption of the free PPF would reduce the
        commercial advantage of Pennylane's PDP certification.
      type: inferred
      topic: ppf-vs-pdp-risk
      sourceRefs: [SR001, SR003]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR001, QR016, QR029]

    - id: CR005
      statement: >-
        GDPR/RGPD exposure from holding financial records of 1M+ French businesses creates
        material regulatory liability: a serious processing violation could result in CNIL fines
        of up to 4% of global annual turnover under GDPR Article 83.
      type: observed
      topic: gdpr-liability
      sourceRefs: [SR005, SR006]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR001, QR014, QR026]

    - id: CR006
      statement: >-
        FEC (Fichier des Ecritures Comptables) compliance is mandatory under French tax law;
        any platform-level error producing non-compliant FEC exports would expose Pennylane's
        6,000+ accounting firm clients to penalties and professional liability.
      type: observed
      topic: fec-compliance-risk
      sourceRefs: [SR001, SR002, SR009]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR001, QR015]

    - id: CR007
      statement: >-
        Pennylane's expansion into Germany introduces GoBD compliance requirements (10-year
        data retention, revision-protected records) and HGB accounting standards, which differ
        materially from French Plan Comptable General and require significant localisation
        investment.
      type: observed
      topic: germany-regulatory-complexity
      sourceRefs: [SR025, SR020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR001, QR007, QR021]

    - id: CR008
      statement: >-
        France's CNIL has enforcement authority over GDPR violations and has previously fined
        major French technology companies (Google France EUR 150M, Amazon France EUR 35M in
        2021); Pennylane's financial data custody scope places it within CNIL's high-priority
        supervisory universe.
      type: observed
      topic: cnil-enforcement-risk
      sourceRefs: [SR005, SR006]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR014, QR026]

    - id: CR009
      statement: >-
        Sage operates with a 2M+ French customer installed base and has launched Sage Active,
        its cloud-first accounting product for French SMBs priced from approximately EUR 12.50
        per month -- substantially below Pennylane's EUR 24/month entry tier.
      type: observed
      topic: sage-pricing-threat
      sourceRefs: [SR014, SR031]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR002, QR017, QR025]

    - id: CR010
      statement: >-
        Cegid holds dominant position in large French accounting firms (10+ staff) and its
        Cegid Loop and Quadratus suite could be extended downmarket to threaten Pennylane's
        mid-market accounting firm clients if Cegid elects to compete in the small accounting
        firm segment.
      type: inferred
      topic: cegid-downmarket-risk
      sourceRefs: [SR015, SR016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR002, QR017]

    - id: CR011
      statement: >-
        AI-native conversational accounting tools powered by large language models could disrupt
        Pennylane's real-time collaboration UX moat if LLM-based bookkeeping automation replaces
        the structured workflow integration Pennylane has built over four years.
      type: inferred
      topic: ai-disruption-risk
      sourceRefs: [SR030, SR031]
      confidence: low
      freshness: current
      answersQuestionRefs: [QR002, QR003]

    - id: CR012
      statement: >-
        Dext's simultaneous integration with Sage, Xero, and Pennylane creates a platform-agnostic
        capture layer that reduces accountant switching costs, potentially eroding the accountant
        lock-in that underlies Pennylane's two-sided platform strategy.
      type: inferred
      topic: dext-switching-cost-risk
      sourceRefs: [SR017]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR002]

