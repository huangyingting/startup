    - id: CR016
      statement: >-
        Financial records of 1M+ SMBs -- including bank transaction feeds, FEC ledgers, invoice
        archives, and Compte Pro data -- represent a high-value target for cyberattacks; a breach
        would trigger mandatory CNIL breach notification, potential GDPR fines, and significant
