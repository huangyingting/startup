  evidenceGaps:
    - id: EGR001
      type: missing-source
      severity: material
      topic: PDP-competitor-certification
      missingEvidence: >-
        The complete and current list of DGFiP-approved PDP platforms competing with
        Pennylane as of May 2026 is not confirmed in public sources. Whether Sage has
        received PDP designation as of the research date is not independently verified
        beyond press reporting that Sage is pursuing certification. The DGFiP does not
        publish a real-time PDP registry accessible for research purposes.
      whyItMatters: >-
        If Sage or another large incumbent (Cegid, SAP) has already obtained PDP
        certification, Pennylane's regulatory first-mover advantage is already partially
        eroded. The number and identity of certified PDPs directly determines whether
        Pennylane's e-invoicing mandate thesis remains intact or is already contested.
      diligencePath: >-
        Check DGFiP's official list of PDP designations at impots.gouv.fr for the
        current certified PDP registry; confirm directly with Pennylane whether Sage,
        Cegid, or other incumbents have received PDP designation; monitor DGFiP official
        communications for new PDP announcements.
      relatedQuestionRefs:
        - QR007
        - QR017

    - id: EGR002
      type: private-evidence-only
      severity: material
      topic: burn-rate-runway
      missingEvidence: >-
        Pennylane's actual burn rate, gross margins, and ARR are entirely private.
        The EUR 90-130M annual operating cost estimate is derived from headcount and
        French tech market benchmarks and has not been confirmed. Actual cash reserves
        post-January 2026 raise, gross margin by product line, and EBITDA are not
        disclosed in any public source.
      whyItMatters: >-
        Without confirmed burn rate and runway data, the financial risk analysis
        cannot determine whether the EUR 175M raise provides 18 months or 36 months
        of runway. At the lower ARR range (EUR 100M) with high burn (EUR 130M/yr),
        Pennylane could require another raise before achieving profitability, which
        at EUR 3.6B valuation would be highly dilutive.
      diligencePath: >-
        Request audited P&L statements for FY2024 and FY2025; confirm ARR by product
        line (accounting SaaS vs Compte Pro); confirm monthly burn rate trend for
        last 8 quarters; request board-approved budget and runway projection for 2026-2028.
      relatedQuestionRefs:
        - QR024
        - QR029

    - id: EGR003
      type: partial-coverage
      severity: minor
      topic: ISO-27001-scope
      missingEvidence: >-
        The exact scope boundaries of Pennylane's ISO 27001 certification are not
        publicly documented. Specifically, whether Compte Pro banking services,
        PDP e-invoicing infrastructure, and Germany localisation environments are
        within the certified scope is not confirmed in any public source. The
        certification body and most recent audit date are also not disclosed.
      whyItMatters: >-
        ISO 27001 certification is a key mitigant for Pennylane's security risk
        narrative; if the scope excludes PDP infrastructure or Compte Pro, the
        certification provides materially weaker assurance than assumed. PDP
        infrastructure in particular handles critical national financial flows.
      diligencePath: >-
        Request ISO 27001 certificate with explicit scope description; confirm
        certifying body and most recent surveillance audit date; confirm PDP
        and Compte Pro infrastructure are within certified scope.
      relatedQuestionRefs:
        - QR015
        - QR031

    - id: EGR004
      type: partial-coverage
      severity: minor
      topic: DPO-designation
      missingEvidence: >-
        Pennylane's DPO (Data Protection Officer) designation status, required
        under GDPR Article 37 for large-scale processing of personal financial data,
        is not confirmed in any public source. The DPO name, role, and reporting
        structure are not publicly disclosed. The CNIL public DPO register was not
        accessed during research to confirm Pennylane's registration.
      whyItMatters: >-
        Absence of a confirmed DPO for an entity processing 1M+ business financial
        records at scale would itself constitute a GDPR violation under Article 37.
        CNIL could initiate an enforcement action based on DPO absence alone before
        any breach occurs, creating a self-inflicted regulatory risk.
      diligencePath: >-
        Search CNIL public DPO register for Pennylane designation; confirm DPO
        identity, appointment date, and CNIL registration status directly with
        Pennylane; verify DPO independence and reporting structure.
      relatedQuestionRefs:
        - QR018

    - id: EGR005
      type: missing-source
      severity: material
      topic: Germany-market-traction
      missingEvidence: >-
        No confirmed German customer count, accounting firm (Steuerberater) partnership
        count, or ARR contribution from Germany has been published as of May 2026.
        German-language product pages are live (confirmed via Pennylane website), but
        actual market traction -- the critical leading indicator for whether the Germany
        entry is working -- is entirely absent from public sources.
      whyItMatters: >-
        Germany is the only disclosed international expansion market and represents
        Pennylane's primary geographic diversification path. If Germany entry is
        generating no measurable traction after 12+ months of localisation effort,
        the geographic concentration risk is not being addressed and the capital
        allocated to Germany expansion is at risk.
      diligencePath: >-
        Request Germany-specific metrics: number of signed Steuerberater partnerships,
        German SMB customers, German ARR or pipeline; timeline for first commercial
        milestone in Germany; assess DATEV partnership or competitive response strategy.
      relatedQuestionRefs:
        - QR021
        - QR027
