  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: burn-rate-and-margins
      missingEvidence: >-
        Pennylane's actual annual burn rate, gross margin, and path-to-profitability timeline
        are not publicly disclosed. All financial risk analysis is based on headcount benchmarks,
        published ARR milestones, and comparable-company estimates. The difference between a
        EUR 5M/month and EUR 15M/month burn rate represents a 3x difference in runway on the
        EUR 175M raise, making this the single largest unconfirmed variable in the financial
        risk assessment.
      whyItMatters: >-
        Without confirmed burn rate data, the runway analysis is a wide-range estimate (1.5-4+
        years). Actual burn determines whether the company needs to raise again before the
        e-invoicing mandate creates breakeven leverage.
      diligencePath: >-
        Request audited or management-account P&L from Pennylane in due diligence. Request
        management presentation on path to profitability, unit economics by segment, and
        gross margin by product line (SaaS vs. Compte Pro banking).
      relatedQuestionRefs: [QR006, QR019, QR022]

    - type: private-evidence-only
      severity: material
      topic: pdp-mandate-third-delay-probability
      missingEvidence: >-
        No official DGFiP communication confirming the September 2026 deadline as final and
        unambiguous has been identified; prior delays were announced on relatively short notice.
        The current confirmation is based on official DGFiP guidance pages, but these have been
        updated before with revised timelines.
      whyItMatters: >-
        The probability of a third mandate delay is the single most impactful risk scenario
        for Pennylane's 2026 ARR growth story. Without a confirmed DGFiP implementation
        progress report, this risk remains materially unresolved.
      diligencePath: >-
        Monitor DGFiP official communications through mid-2026; consult French accounting
        industry associations (OEC, IFEC) for practitioner-level intelligence on mandate
        readiness; review DGFiP PDP-certified platform list for evidence of broad ecosystem
        readiness.
      relatedQuestionRefs: [QR005, QR010, QR023, QR031]

    - type: private-evidence-only
      severity: high
      topic: leadership-bench-depth
      missingEvidence: >-
        The identities, backgrounds, and ownership stakes of Pennylane's CTO, CFO, CPO, and
        co-founders beyond Arthur Waller are not publicly confirmed. External diligence on
        key-person risk is therefore limited to the CEO layer. A departure risk assessment
        requires knowing who the No. 2 to No. 5 executives are and whether they have the
        investor relationships and operational authority to continue the company's trajectory.
      whyItMatters: >-
        At a EUR 3.6B valuation with simultaneous execution on PDP mandate delivery and German
        expansion, the depth of the senior leadership team is a material risk factor that the
        current public evidence base cannot resolve.
      diligencePath: >-
        Request an org chart and senior leadership biographies in due diligence; assess vesting
        schedules and retention package adequacy for the top 10 executives; verify whether
        Arthur Waller is the sole named signatory on major regulatory filings.
      relatedQuestionRefs: [QR024]

    - type: unresolvable-without-access
      severity: high
      topic: preference-stack-terms
      missingEvidence: >-
        The precise liquidation preference terms, anti-dilution provisions, and participation
        rights associated with Sequoia's Series C, the April 2025 round, and TCV's January
        2026 entry are not publicly disclosed. French SAS company statutes and shareholder
        agreements are not subject to US-style public disclosure, leaving the downside
        distribution stack entirely opaque.
      whyItMatters: >-
        In a scenario where Pennylane exits below the EUR 3.6B entry valuation, the distribution
        to employees (BSPCE holders), founders, and later-stage investors is entirely determined
        by undisclosed preference terms.
      diligencePath: >-
        Request investor rights agreements, SHA, and statuts in due diligence; model waterfall
        scenarios under 1x non-participating, 1x participating, and 2x participating preference
        structures across the full capitalisation table.
      relatedQuestionRefs: [QR022, QR025]

    - type: unresolvable-without-access
      severity: medium
      topic: iso-27001-scope-and-pdp-security-certification
      missingEvidence: >-
        Pennylane's ISO 27001 certification scope certificate is not publicly disclosed; it is
        not confirmed whether the Compte Pro banking product, the PDP e-invoicing infrastructure,
        and third-party integration connectors are all within certified scope. The DGFiP PDP
        approval process has its own security requirements separate from ISO 27001.
      whyItMatters: >-
        A narrow ISO 27001 scope that excludes the banking and PDP infrastructure would mean
        that Pennylane's most sensitive and regulated data flows are operating without third-party
        security attestation, creating a compliance gap that could be exploited in regulatory
        scrutiny following an incident.
      diligencePath: >-
        Request ISO 27001 certificate and scope statement from Pennylane; request DGFiP PDP
        security assessment documentation; review third-party penetration testing schedules
        and most recent pen test reports.
      relatedQuestionRefs: [QR009, QR028]
