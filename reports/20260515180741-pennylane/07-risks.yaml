tables:
- id: TR001
  title: Regulatory / legal risk register
  description: Regulatory and legal risk register for Pennylane across French and German compliance frameworks as of May 2026.
    Enumeration is partial; six primary frameworks are documented.
  columns:
  - rule/license/case
  - jurisdiction
  - status
  - likelihood
  - severity
  - mitigation
  - residual exposure
  - diligence path
  rows:
  - - Facturation Electronique PDP mandate (September 2026)
    - France (DGFiP)
    - PDP designated; mandate effective September 2026
    - Likely (4)
    - Existential if delayed third time
    - DGFiP PDP designation achieved; product independent of mandate timing
    - High -- third delay would undermine EUR 175M raise thesis
    - Verify DGFiP publication of final implementation timeline; monitor impots.gouv.fr PDP registry for new designations
  - - FEC (Fichier des Ecritures Comptables) compliance
    - France (DGFiP)
    - Compliant -- FEC native export confirmed on product pages
    - Possible (3)
    - Critical -- client tax penalties and accountant liability
    - FEC export built into platform; confirmed on product documentation
    - Medium -- error in FEC generation would expose 6,000+ accountant clients to DGFiP penalties
    - Audit FEC output against current DGFiP technical specification; confirm error-rate benchmarks in production
  - - GDPR / RGPD (data protection, 1M+ SMB records)
    - EU/France (CNIL)
    - Partial -- ISO 27001 certified; DPO designation unconfirmed
    - Unlikely (2)
    - Critical -- CNIL fine up to 4% global ARR
    - ISO 27001 certification; RGPD compliance program; reported DPO function
    - High -- 1M+ SMB financial records in scope; CNIL enforcement track record against French tech firms
    - Confirm DPO designation with CNIL registry; review data processing agreements and lawful basis documentation
  - - GoBD (German data retention -- 10-year requirement)
    - Germany (BMF)
    - In progress -- German product pages live; GoBD compliance not confirmed
    - Possible (3)
    - High -- non-compliance bars Pennylane from serving German commercial clients
    - German product localisation underway; GoBD-compliant archive capability not publicly confirmed
    - High -- without GoBD certification, Pennylane cannot serve German accounting firm clients
    - Confirm revision-protected 10-year archiving capability; obtain independent GoBD compliance assessment
  - - HGB (German Commercial Code accounting standards)
    - Germany
    - In progress -- German accounting module in localisation
    - Possible (3)
    - Moderate -- product ineligible for mid-market German accountants without HGB support
    - German product localisation investment confirmed; HGB-native feature set not publicly confirmed
    - Medium -- without HGB support, addressable German market limited to micro-enterprises
    - Confirm HGB-native chart of accounts and double-entry compliance in German product version
  - - PSD2 / Payment Services Directive (Compte Pro banking)
    - EU (ACPR France)
    - Compliant -- payment institution licence confirmed
    - Unlikely (2)
    - High -- ACPR suspension would eliminate banking product
    - Payment institution licence under ACPR; Banque de France supervised
    - Medium -- licence revocation or ACPR sanction would disable Compte Pro entirely
    - Verify current ACPR licence status and scope; confirm card issuance authorisation; review PSD2 compliance reports
  - - ISO 27001 certification scope (PDP and Compte Pro)
    - France (certification body)
    - Partial -- certification confirmed; scope boundaries unconfirmed
    - Possible (3)
    - High -- uncertified critical infrastructure is a material security risk
    - ISO 27001 certified per company security page; scope boundaries not public
    - High -- if PDP or Compte Pro outside scope, critical infrastructure unaudited
    - Request ISO 27001 certificate with explicit scope description; confirm certifying body and last audit date
  notes: 'Likelihood scores: Likely (4), Possible (3), Unlikely (2), Rare (1). Severity: Existential, Critical, High, Moderate,
    Low. Enumeration is partial; GoBD and HGB entries are based on early-stage German market entry evidence. GDPR DPO status
    and ISO 27001 scope are inference-based.'
  enumerationScope:
