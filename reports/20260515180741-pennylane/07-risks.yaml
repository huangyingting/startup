  - FR003
- id: s-technology
  title: Technology and Security Risks
  body: 'Pennylane''s ISO 27001 certification provides a framework-level assurance of information security management, but
    the certification scope and reassessment cadence are not publicly disclosed. Specifically, whether Pennylane''s Compte
    Pro banking product and PDP infrastructure are within the certified ISO 27001 scope is not confirmed in any public source.
    Certification without continuous scope expansion as the platform grows could leave material functionality unaudited.


    The financial data custody profile -- 1M+ business bank feeds, full accounting ledgers (FEC), invoice archives, payroll
    integrations, and corporate Mastercard account data -- makes Pennylane a high-value target for cybercriminals. A breach
    affecting FEC records or bank transaction data would trigger CNIL mandatory breach notification, potential GDPR fines,
    contractual liability to accountants and SMBs, and severe reputational damage driving churn. Pennylane''s public status
    page exists but retains historical incident data only for 90 days, limiting external assessment of incident frequency
    and severity.


    Pennylane''s new role as a PDP operator fundamentally changes its attack surface profile. Post-PDP designation, Pennylane
    becomes part of France''s critical financial infrastructure, responsible for routing e-invoices for 1M+ businesses. This
    creates heightened scrutiny from both French regulatory authorities (ANSSI, DGFiP) and adversarial actors who may target
    e-invoicing infrastructure for fraud (invoice manipulation), ransomware, or nation-state interference. PDP operators are
    expected to meet elevated availability and security standards, and any failure will attract regulatory and media attention
    disproportionate to a standard SaaS outage.


    AI-powered automated accounting categorisation introduces a novel liability vector. If categorisation errors propagate
    into FEC exports, TVA declarations, or audit trails submitted to the DGFiP, the resulting tax errors could create legal
    liability for SMB clients and their accounting firms -- with Pennylane as the platform that generated the error. Large
    language models are known to hallucinate numerical values; without robust human-in-the-loop review processes and clear
    contractual disclaimers, this represents an unhedged liability. Pennylane''s 300+ third-party integrations also create
    a broad software supply-chain attack surface that ISO 27001 alone cannot fully mitigate.'
  claimRefs:
