- id: TR002
  title: Operational / quality / security risk register
  description: Operational, quality, and security risks for Pennylane as of May 2026, focused on technology failures, cybersecurity
    threats, and AI-related liabilities. Rows ordered by residual exposure.
  columns:
  - failure mode
  - likelihood
  - severity
  - mitigation maturity
  - residual exposure
  - unresolved gap
  rows:
  - - PDP infrastructure cyberattack or sustained outage during mandate window
    - Unlikely (2)
    - Existential -- DGFiP licence risk; 1M+ businesses unable to invoice
    - Medium -- ISO 27001; DGFiP oversight
    - High -- critical infrastructure designation elevates attacker motivation
    - ISO 27001 scope for PDP infrastructure not publicly confirmed; ANSSI assessment not disclosed
  - - GDPR data breach -- bank feeds, FEC records, and Mastercard data
    - Unlikely (2)
    - Critical -- CNIL mandatory notification; fine up to 4% ARR; severe churn
    - Medium -- ISO 27001; CNIL compliance program
    - High -- 1M+ SMB financial records; high-value target for cybercriminals
    - DPO designation unconfirmed; last security audit date not public; no public breach history beyond 90-day window
  - - AI categorisation errors propagating into FEC exports and TVA declarations
    - Possible (3)
    - High -- unhedged legal liability for SMB clients and accountant firms
    - Low-medium -- human review workflows exist; contractual disclaimers unclear
    - High -- hallucination in financial categorisation creates direct tax liability without robust review gates
    - No published error-rate benchmarks; AI categorisation disclaimer scope not confirmed; no public accuracy data
  - - Third-party integration supply-chain compromise (300+ integrations)
    - Possible (3)
    - High -- compromised integration could expose all connected SMB financial data
    - Low -- ISO 27001 may not cover all integration partners
    - Medium-high -- 300+ integration attack surface exceeds typical SaaS scope
    - No public integration security audit framework; third-party SOC2 requirements for integrations not disclosed
  - - Platform availability failure during e-invoicing mandate adoption window
    - Possible (3)
    - Critical -- routing failures during mandate window create regulatory exposure
    - Medium -- status page; inferred redundancy
    - High -- SLA obligations to PDP clients and DGFiP not publicly confirmed
    - No public SLA for PDP service availability; uptime commitment to accounting firms not disclosed; DGFiP SLA requirements
      for PDP operators not public
  - - Pennylane status page 90-day history limits external incident assessment
    - Almost Certain (5)
    - Minor -- data gap rather than operational risk
    - Low -- 90-day window is a structural limitation
    - Low -- no evidence of past incidents outside 90-day window
    - Full incident history not available; no third-party audit or SOC2 report to supplement limited status page history
  notes: Likelihood and severity are qualitative assessments based on public evidence. Mitigation maturity reflects observed
    public controls only; private security measures may exist. Residual exposure accounts for known mitigations.
