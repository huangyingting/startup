    - Immediate reforecast of 2026 ARR growth model; require updated ARR trajectory and mandate-independent revenue bridge
      from Pennylane management before proceeding
  - - Sage Active achieves PDP designation
    - DGFiP official PDP list update; Sage press release
    - Sage appears on DGFiP certified PDP operator list
    - Commission independent competitive analysis; survey 50+ accounting firms on switching intent; reassess Pennylane's regulatory
      first-mover advantage and PDP pricing premium
  - - ARR growth decelerates below 30% year-on-year
    - Company press release, investor letter, or Crunchbase-sourced data
    - ARR below EUR 130M by end-2026 (estimated 30% growth from EUR 100M)
    - Require management accounts and audited financials; stress-test EUR 3.6B valuation at 10-15x ARR; assess competitive
      and pricing dynamics driving deceleration
  - - GDPR breach or CNIL formal investigation
    - CNIL publication; press coverage; Pennylane investor communication
    - CNIL opens formal investigation or issues preliminary decision against Pennylane
    - Legal review of maximum fine exposure (4% of global ARR); quantify customer churn scenario; assess DPO designation status;
      review ISO 27001 scope adequacy
  - - CEO Arthur Waller departure or incapacity
    - Press announcement; LinkedIn update; investor communication
    - Arthur Waller announces resignation, incapacity, or board removal
    - Immediate board engagement to assess succession depth; identify interim CEO candidate; evaluate impact on investor confidence
      and covenant compliance before proceeding
  - - Germany market entry fails to generate accountant channel
    - Pennylane investor update; press coverage; direct inquiry
    - Fewer than 100 German Steuerberater partnerships confirmed after 18 months of localised operation
    - Reassess European expansion thesis; revise timeline for non-French revenue contribution; evaluate whether DATEV competitive
      barrier is structural or addressable
  - - Burn rate exceeds EUR 15M per month
    - Management accounts; Pennylane investor letter
    - Monthly cash outflow confirmed above EUR 15M for two consecutive quarters
    - Require audited P&L for FY2025 and FY2026; assess path to cash breakeven; evaluate bridge financing likelihood at EUR
      3.6B valuation; stress-test preference stack impact on equity value
  - - PDP infrastructure security breach or sustained outage
    - Pennylane status page; ANSSI disclosure; DGFiP communication
    - More than 24-hour confirmed PDP outage or confirmed data breach
    - Mandatory security audit review; assess DGFiP regulatory response; evaluate customer churn and accountant trust impact;
      quantify potential CNIL fine exposure under GDPR Article 83
  notes: Triggers are designed to be monitorable from public sources (DGFiP registry, press releases, Pennylane communications)
    or via private diligence access. Kill criteria should be confirmed with Pennylane management at due diligence stage.
