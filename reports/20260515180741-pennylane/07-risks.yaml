  rows:
  - - PDP designation authority
    - DGFiP (French government)
    - Sole authority to grant and revoke PDP operator status
    - Critical -- single point of authority, no alternative
    - DGFiP revokes PDP designation for non-compliance or mandate cancellation
    - Existential -- entire e-invoicing mandate strategy would collapse
    - PDP compliance program; ongoing regulatory engagement
    - High -- any DGFiP policy reversal eliminates core mandate-driven growth thesis
  - - Banking infrastructure for Compte Pro
    - ACPR-licensed banking partner
    - Provides banking rails, IBAN issuance, and card settlement infrastructure
    - Critical -- Compte Pro not independently licenced for core banking
    - Banking partner exits, loses licence, or terminates relationship
    - Critical -- Compte Pro feature lost; SMB banking product discontinued
    - Payment institution licence under ACPR; partner relationship management
    - High -- full banking feature dependency on third-party infrastructure; no disclosed backup
  - - Accounting firm channel (6,000+ expert-comptables)
    - Expert-comptable network (France)
    - Primary SMB customer acquisition and retention channel
    - High -- dominant acquisition channel; bilateral platform dependency
    - Accounting firms migrate to Sage Active or Cegid in response to price competition
    - Critical -- loss of accountant channel would strand direct SMB acquisition capacity
    - Two-sided platform loyalty; API integrations; real-time collaboration moat
    - Medium -- switching costs increase with adoption depth but Sage price advantage is structural
