  - id: s-gtm
    title: Go-to-Market, Acquisition Channels, and Accountant-Led Growth
    body: >-
      Pennylane's primary go-to-market channel is accountant-led growth: the 6,000+ accounting
      firms on the platform actively recommend and onboard their SMB clients to Pennylane.
      This channel is capital-efficient because the accounting firm bears the relationship-
      building and trust costs, and an accountant's recommendation carries higher credibility
      than advertising to SMB owners who typically defer to their accountant on software
      decisions. Pennylane targets accounting firms as its first-priority acquisition motion,
      and the firms then function as a distributed, self-replicating distribution network for
      the SMB base. This B2B2C model creates a structural advantage: the accounting firm
      acts as a customer success manager for each SMB client, reducing churn-inducing
      confusion during onboarding and ensuring the platform is used to its full potential.
      [CU016] [CU028]

      Secondary acquisition channels include direct digital (SEO and content marketing via
      the Pennylane blog, French-language accounting how-to resources, and product feature
      pages targeting specific personas), event marketing (attendance and sponsorship at the
      Congrès de l'Ordre des Experts-Comptables, the major annual French accounting
      professional conference), and the DAFtech event series which targets CFOs and
      Directeurs Administratifs et Financiers in the mid-market. The 300+ software
      integrations (Stripe, Shopify, WooCommerce, Silae, Lucca, PayPal) serve as
      co-marketing and distribution vectors: each integration partner has incentive to
      reference Pennylane as a connected accounting platform to their own SMB user bases,
      extending top-of-funnel reach to audiences who are already signaling financial
      management software intent through their integration partner usage. [CU024] [CU037]
      [CU038]

      Customer onboarding involves three sequential activation steps that each compound
      retention probability. The first is connecting the business bank account, which
      populates historical transaction data automatically and delivers immediate value
      through auto-categorization. The second is setting up invoicing templates and
      configuring recurring billing. The third is inviting the accounting firm to the
      shared platform, which transforms a single-user tool into a collaborative
      accountant-client workspace. The accountant invitation step is both a product
      activation event and a bilateral retention mechanism — once the accountant is
      connected, the platform's dual-sided value proposition is fully realized and the
      switching cost for both parties rises sharply. Pennylane's product-led onboarding
      flow is designed to maximize completion of all three activation steps, which
      explains the strong retention implied by the structural drivers. [CU039]
    claimRefs:
      - CU016
      - CU024
      - CU028
      - CU037
      - CU038
      - CU039
