  evidenceGaps:
    - id: EGU001
      type: private-evidence-only
      severity: material
      topic: customer-count-definition
      missingEvidence: >-
        Pennylane's "1,000,000+ customers" figure is a marketing metric without a publicly
        stated definition distinguishing active paying subscribers from free-trial users,
        registered accounts with no paid subscription, or inactive accounts. Year-over-year
        growth rate from 2023 through 2026, segment-level customer counts (freelancer vs.
        TPE vs. PME), ARPU by segment, and the ratio of accountant-referred to direct-acquired
        customers are all absent from the public record.
      whyItMatters: >-
        Without a verified paying-subscriber count and ARPU, the €3.6B valuation cannot be
        anchored to a defensible ARR multiple. If "1M+ customers" includes a large number of
        inactive or free-tier accounts, the true paying base and associated ARR could be
        materially lower than the headline implies. Segment-level ARPU is critical to
        modeling future revenue from upsell (Pro account) and international expansion.
      diligencePath: >-
        Request from management: (1) definition of "customer" with distinction between paid
        vs. free/trial vs. churned-but-retained accounts; (2) monthly active customer count
        for the trailing four quarters; (3) ARPU by segment (freelancer, TPE, PME, expert-
        comptable); (4) accountant-referred vs. direct acquisition split by customer count
        and by ARR.
      relatedQuestionRefs:
        - QU001
        - QU019
        - QU023
        - QU027
      relatedTableRefs:
        - TU001
        - TU002

    - id: EGU002
      type: private-evidence-only
      severity: material
      topic: NPS-satisfaction
      missingEvidence: >-
        No formal NPS, CSAT, or customer effort score (CES) has been disclosed publicly
        by Pennylane. The 4.7/5 and 4.5/5 ratings on the homepage have no disclosed
        platform attribution, review count, or time period. G2 and Capterra scores were
        not confirmed at time of research. Trustpilot fetch was unsuccessful.
        Competitor satisfaction benchmarks (Sage, Indy, Cegid) are not available for
        direct comparison.
      whyItMatters: >-
        NPS is a leading indicator of churn and word-of-mouth growth at scale. A formal
        NPS below 30 would suggest that Pennylane's high customer count is not translating
        into high-quality user experiences, increasing the risk of churn when competitive
        alternatives improve. Without it, adverse review signals on G2/AppVizer cannot
        be placed in quantitative context.
      diligencePath: >-
        Request NPS by customer segment and plan tier for the last four quarters; confirm
        mobile app rating platforms and review counts directly with Pennylane; independently
        access G2, Capterra, and Trustpilot for current scores and trend; request customer
        satisfaction trend report from management.
      relatedQuestionRefs:
        - QU005
        - QU010
        - QU014
      relatedTableRefs:
        - TU004

    - id: EGU003
      type: private-evidence-only
      severity: material
      topic: NRR-churn
      missingEvidence: >-
        NRR, GRR, and cohort-level churn are entirely absent from public sources. The
        structural switching-cost arguments are compelling but cannot be validated without
        observed retention data. The cohort figure in this chapter is estimated from
        structural analysis and has not been disclosed or confirmed by Pennylane.
      whyItMatters: >-
        NRR is the single most important unit-economics metric for a SaaS company at the
        €3.6B valuation stage. NRR above 110% would confirm the land-and-expand thesis
        (Pro account upsell + plan upgrades) and imply compounding ARR without requiring
        new customer acquisition. NRR below 90% would suggest churn is offsetting growth
        and structurally undermining the business case for the accountant-channel model.
      diligencePath: >-
        Request NRR and GRR by customer segment and plan tier for each of the last eight
        quarters; request cohort retention curves for each annual acquisition cohort since
        2021; request annual logo churn rate (percentage of customers not renewing) and
        net churn rate (including expansion MRR).
      relatedQuestionRefs:
        - QU006
      relatedTableRefs:
        - TU004

    - id: EGU004
      type: missing-source
      severity: minor
      topic: independent-customer-verification
      missingEvidence: >-
        No independent verification of production deployment status, contract scope, or
        actual platform usage exists for any named Pennylane customer (Yuka, happn, Fleet,
        Offishall, etc.). All named customer evidence is sourced from Pennylane's own
        marketing materials (testimonials page, DAFtech event). The 6,000+ accounting firm
        count is self-reported with no independent registry corroboration. Competitor customer
        count comparisons (Sage France, Indy) are not available.
      whyItMatters: >-
        Without independent proof of production deployments, named customer testimonials
        cannot be treated as evidence of adoption depth — they are marketing collateral.
        If Pennylane's most prominent named customers (Yuka, Fleet) are light users rather
        than deeply embedded production accounts, the retention thesis is weakened.
      diligencePath: >-
        Request independent case study documentation (contracts, usage data, outcome
        metrics) for at least three named customers; contact Martin Leveau (Fleet),
        Audrey Barbier-Litvak (Offishall) directly for reference interviews; search
        LinkedIn for Pennylane user job listings and posts from named customers' finance
        teams; cross-reference the Ordre des Experts-Comptables member directory to
        validate the 6,000+ accounting firm claim.
      relatedQuestionRefs:
        - QU015
        - QU022
        - QU024
        - QU026
      relatedTableRefs:
        - TU003

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      Three sources have restricted accessStatus: pennylane.com/fr/temoignages (404),
      maddyness.com/2023/03/06/pennylane-40000-clients-sequoia/ (404 at run date), and
      trustpilot.com/review/pennylane.com (fetch status 0). The 3/28 broken-source ratio
      (10.7%) is below the chapter paywall warning threshold. The 3,000-to-40,000 growth
      figure from the broken Maddyness article is independently corroborated by the
      Maddyness search aggregator page (status 200) and the Sifted centaur coverage
      which confirms the growth trajectory. The temoignages testimonials are corroborated
      by the DAFtech 2026 page (status 200) and the homepage (status 200). Trustpilot
      is referenced only as a partial signal and the broken fetch is noted explicitly in
      the claim (CU014) and satisfaction table (TU004).
  - dimension: unverifiedSource
    reason: >-
      Source SU011 (Capterra France — capterra.fr/software/1024617/pennylane) was not
      fetched through the fetch-url skill during this research session. Capterra is a
      widely-known Gartner-subsidiary B2B software review platform, and the Pennylane
      listing is a publicly accessible page. It is cited in claim CU015 only to assert
      that Pennylane exists as a listed product on the platform; the claim explicitly
      notes that the specific score and review count were not confirmed. The absence of
      a fetch trail record is acknowledged; the citation makes no quantitative claim
      that depends on direct page access.
