    figureRefs: []

  - id: s-concentration
    title: Expansion Potential and Concentration Risk
    body: >-
      Customer concentration risk at the individual account level is negligible. With
      1,000,000+ customers, no single customer can plausibly represent more than approximately
      0.01% of the total base. The largest recognizable named customers (Yuka, happn, Fleet)
      are French SMEs and growth-stage startups — not large enterprises with nine-figure
      software budgets. From a revenue concentration standpoint, the SaaS pricing model
      (€14–24+/month for the primary tiers) implies that even Pennylane's highest-value
      accounts are unlikely to exceed a few thousand euros per year in subscription ARR,
      making top-customer revenue concentration structurally impossible at current price
      points. The 1M+ distributed base provides inherent diversification against any single
      customer loss. [CU026] [CU033]

      Geographic concentration, however, is a genuine structural risk. As of May 2026,
      Pennylane operates primarily in France. Germany is the only disclosed international
      market, with German-language product pages live for Steuerberater (accountants) and
      E-Rechnung (e-invoicing), but commercial scale in Germany is not publicly confirmed.
      Any macroeconomic disruption in France — a recession, a change to the e-invoicing
      mandate timeline, or a structural decline in French SMB formation rates — would
      affect the entire customer base without a geographic hedge. France accounts for
      effectively 100% of confirmed revenue as of the run date. [CU025]

      Expansion potential within the existing French market is significant. The 30,000
      Compte Pro subscribers versus 1M+ total customers implies that approximately 97% of
      customers have not yet adopted the higher-ARPU banking product — a major land-and-
      expand opportunity. The 6,000 accounting firms on platform represent roughly 25% of
      France's approximately 24,000 registered accounting firms (Ordre des Experts-
      Comptables), leaving 75% as an addressable expansion pool within the existing model
      and geography. International expansion into other EU markets with active e-invoicing
      mandates — Belgium, Italy, Spain — represents TAM extension available with the
      existing PDP-and-accountant model adapted to local regulatory frameworks. [CU003]
      [CU025] [CU036]
    claimRefs:
      - CU003
      - CU025
      - CU026
      - CU033
      - CU036
