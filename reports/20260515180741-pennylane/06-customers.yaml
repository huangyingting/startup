      are author estimates derived from the 6,000 confirmed firm count against the approximately
      24,000 registered accounting firms in France (Ordre des Experts-Comptables). The 97%
      Pro account headroom is calculated as (1M − 30K) / 1M. All estimates are approximate and
      have not been independently verified. Acknowledge tableNotes.
