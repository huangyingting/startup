      - CU001
      - CU002
      - CU003
      - CU025
      - CU026
      - CU035
      - CU036
    columns:
      - Risk or Opportunity
      - Type
      - Current Status
      - Impact Level
      - Mitigation / Expansion Path
    rows:
      - - Geographic concentration (France-only)
        - Concentration risk
        - Material — France-only operating scale as of May 2026; Germany nascent but unconfirmed
        - High — French macro or regulatory shock affects effectively 100% of revenue
        - Germany expansion underway; EU e-invoicing mandates (Belgium, Italy, Spain) open future markets
      - - Single-customer concentration
        - Concentration risk
        - Negligible — 1M+ customers, no named enterprise accounts; no single customer >0.01%
        - Low — no single customer loss is material
        - No action required; monitor as customer mix evolves toward mid-market
      - - Accountant-channel dependency
        - Concentration / channel risk
        - Moderate — 6,000 accounting firms are primary SMB distribution channel
        - Medium — if a significant fraction of accounting firms defect to a competitor
        - Deep data integration and bilateral lock-in reduce defection risk; direct SMB channel as hedge
      - - Pro account (banking) expansion headroom
        - Expansion opportunity
        - High — ~97% of customers have not yet adopted the Compte Pro banking product
        - High positive — 2–3× ARPU uplift per conversion; banking interchange is an incremental revenue layer
        - Product-led upsell; banking is a natural upgrade for SMBs already active on the accounting platform
      - - Accounting firm market penetration
        - Expansion opportunity
        - ~25% of French registered accounting firms on platform (est. 6K of ~24K)
        - High positive — adding 18K remaining French firms at same SMB-per-firm ratio would add ~3M SMB customers
        - Continuing congress/event marketing; direct accounting firm outreach; referral program expansion
      - - E-invoicing SMB compliance wave (Sep 2026)
        - Expansion opportunity
        - PDP certification held; SMB mandate approaching; QuickBooks France exit frees migrating customers
        - High positive — regulatory forcing function for French SMBs to adopt compliant platforms by Sep 2026
        - Pennylane is one of few PDP-approved platforms; targeted migration campaigns for QuickBooks ex-users

figures:
  - id: FU001
    type: journey-map
    title: Customer journey map
    subtitle: Pennylane SMB and accountant customer journeys from discovery through retention
    approximationNotes: >-
      Journey stages are reconstructed from Pennylane's official product pages (pennylane.com/fr,
      expert-comptable, tarifs), the DAFtech 2026 event content, AppVizer editorial review, and
      structural analysis of the platform's dual-sided model. Specific conversion rates between
      stages are not disclosed by Pennylane and are not represented here; the map reflects
      qualitative stage sequencing only. The SMB-via-accountant path and the direct SMB path
      are treated as parallel journeys rather than sequential alternatives.
    claimRefs:
      - CU016
      - CU028
      - CU039
      - CU037
      - CU038
    data:
      items:
        - id: jm-awareness-direct
          label: Awareness (Direct)
          actor: SMB owner / DAF / freelancer
          description: >-
            Discovers Pennylane through SEO search ("logiciel comptabilité France"), content
            marketing (pennylane.com/fr/blog), product advertising, or word of mouth from
            a peer SMB. May also discover through the app stores (4.7/5 and 4.5/5 ratings).
          channels:
            - Google/SEO (French-language accounting queries)
            - Content marketing and blog
            - App Store / Google Play
            - Social media
        - id: jm-awareness-accountant
          label: Awareness (Accountant-led)
          actor: SMB owner — referred by accounting firm
          description: >-
            The accountant (one of 6,000+ on Pennylane) proactively recommends Pennylane
            to their SMB client, who follows the accountant's instruction to sign up.
            This is the primary acquisition path for the majority of SMB customers.
          channels:
            - Accounting firm recommendation
            - Accounting firm congress / industry events
            - DAFtech event (mid-market DAF/CFO segment)
        - id: jm-trial
          label: Sign-up and Trial
          actor: SMB owner / freelancer
          description: >-
            SMB signs up for a free trial or paid plan. Begins with basic invoicing setup.
            Some SMBs sign up directly; accountant-referred SMBs have a shorter trial-to-paid
            conversion cycle due to higher intent and accountant guidance.
          channels:
            - pennylane.com/fr direct sign-up
            - Accountant-provided onboarding link
        - id: jm-activation
          label: Activation (Bank + Accountant)
          actor: SMB owner + accounting firm
          description: >-
            Three-step activation: (1) connect business bank account (auto-imports transactions);
            (2) configure invoicing templates; (3) invite the accounting firm to the shared
            platform. Full activation is the key retention milestone — once the accountant
            is connected, bilateral lock-in is established and time-to-value is fully delivered.
          channels:
            - In-product onboarding flow
            - Accountant invitation email
            - Bank API connection (open banking)
        - id: jm-expansion
          label: Expansion (Upsell and Deepening)
          actor: SMB owner / DAF
          description: >-
            Customers expand from basic invoicing to full accounting, then to treasury management,
            expense management, or the Compte Pro corporate bank account (30,000+ subscribers).
            DAFs and PME CFOs may be onboarded directly into the Premium tier. E-invoicing
            compliance (PDP mandate) deepens usage as the September 2026 deadline approaches.
          channels:
            - In-product upsell prompts
            - DAFtech event for DAF/CFO upgrade
            - E-invoicing mandate compliance pressure
        - id: jm-retention
          label: Long-term Retention
          actor: SMB owner + accounting firm (bilateral)
          description: >-
            Retention is driven by three structural anchors: (1) accumulated accounting data
            creates migration cost that grows with tenure; (2) bilateral accountant lock-in
            means switching requires the accounting firm to migrate its entire client book;
            (3) PDP mandate compliance becomes an additional switching barrier from Sep 2026.
            Named customers (Yuka, happn, Fleet, Offishall) represent the retention outcome.
          channels:
            - Accounting data depth (automated monthly close)
            - Accountant co-dependency
            - PDP-compliant e-invoicing integration

