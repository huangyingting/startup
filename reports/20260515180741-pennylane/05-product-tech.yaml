figures:
  - id: FE001
    title: Pennylane Platform Architecture Map
    type: stack
    layout: wide
    summary: >-
      Layered architecture of the Pennylane platform from the data acquisition foundation
      through the compliance and presentation layers, showing how financial data flows from
      raw inputs to accountant-SMB collaboration surfaces.
    approximationNotes: >-
      Architecture layers inferred from public product pages, integration marketplace, security
      documentation, and API documentation. Pennylane has not published a formal architecture
      diagram; layer boundaries are analyst-derived from observable product capabilities.
    claimRefs:
      - CE001
      - CE007
      - CE009
      - CE013
      - CE014
      - CE015
      - CE019
      - CE020
    data:
      layers:
        - label: Data Acquisition Layer
          detail: >-
            Bank feeds (Compte Pro + open banking), payment events (Stripe, Mollie),
            payroll journals (PayFit, Silae), POS sales (6XPOS, AddicTill), e-commerce
            receipts (Amazon Business), uploaded invoice PDFs and expense receipts
        - label: Integration and API Layer
          detail: >-
            300+ marketplace integrations (API-based), public REST API for enterprise/ISV
            connections, no-code automation via Albato; Pennylane functions as financial
            data hub — all flows converge to the accounting ledger
        - label: AI / Processing Engine
          detail: >-
            ML transaction categorization engine, AI document extraction (invoice PDF →
            structured fields), smart automation rules, bank reconciliation matching,
            real-time cash flow calculation and forecasting
        - label: Core Product Modules
          detail: >-
            Invoicing (quotes, invoices, subscriptions, payment links), Purchase Management
            (supplier invoices, 1-click payment), Expense Management (Mastercard cards,
            expense reports), Treasury (cash flow, prévisionnel), Accounting/Revision
            (FEC, reconciliation, revision workspace)
        - label: Compliance and Regulatory Layer
          detail: >-
            FEC generation (DGFiP-compliant accounting file), EDI transmission (TVA + liasse
            fiscale to DGFiP), PDP relay (e-invoice routing to DGFiP PPF for Sep 2026 mandate),
            ISO 27001 ISMS, RGPD access control framework
        - label: Collaboration and Presentation Layer
          detail: >-
            Shared SMB-accountant workspace (dual real-time access, role-based permissions),
            accountant portfolio dashboard (multiple client firms), SMB financial dashboard,
            mobile app (iOS/Android), notifications and approval workflows

