  evidenceGaps:
    - type: access-blocked
      severity: material
      topic: developer-api-documentation
      missingEvidence: >-
        Full public API documentation for Pennylane's REST API (developer.pennylane.com) was
        not accessible via web crawl as of May 2026. The API endpoint list, authentication
        mechanism, rate limits, and data schema are unknown from public sources.
      whyItMatters: >-
        Without accessible API documentation, it is impossible to independently verify the
        scope of Pennylane's developer ecosystem claims or assess the ease of building
        third-party integrations. A closed or immature API limits the platform's extensibility
        and reduces the competitive moat from integration breadth.
      diligencePath: >-
        Request API documentation access directly from Pennylane; review API reference via a
        partner/developer account; search developer community forums or GitHub issues for API
        usage examples.
      relatedQuestionRefs: [QE006, QE012, QE015, QE025]

    - type: private-evidence-only
      severity: material
      topic: ai-architecture
      missingEvidence: >-
        The underlying technical stack for Pennylane's AI document extraction and transaction
        categorization is not publicly documented. Whether these capabilities are proprietary
        (data moat) or third-party-supplied (replicable) is unknown.
      whyItMatters: >-
        If Pennylane's AI capabilities are primarily third-party-supplied, the competitive
        differentiation from AI automation is weaker than presented, and competitors can
        source equivalent capabilities from the same providers. Conversely, if the models
        are trained on Pennylane's proprietary transaction dataset, the data moat is
        structurally significant and defensible.
      diligencePath: >-
        Review PennylaneAI GitHub organization for model development activity; request
        technical architecture briefing from management; check job descriptions for ML
        engineer roles specifying in-house model training vs. API integration.
      relatedQuestionRefs: [QE023, QE028]

    - type: missing-source
      severity: material
      topic: reliability-and-uptime
      missingEvidence: >-
        Pennylane does not publish a public status page, uptime history, or SLA commitments
        as of May 2026. No historical incident data is available from public sources.
      whyItMatters: >-
        For a platform serving as an active PDP relay for 1M+ customers' e-invoicing and as
        the primary accounting system for 6,000+ accounting firms, reliability and SLA
        commitments are material due diligence items. Undisclosed downtime history or absent
        SLA contractual protections represent operational risk.
      diligencePath: >-
        Request historical uptime data and SLA documentation from management; check if a
        status page or Trust Center incident log has been published; review Pennylane's
        standard customer agreement for uptime guarantees.
      relatedQuestionRefs: [QE026, QE029]

    - type: missing-source
      severity: minor
      topic: onboarding-benchmarks
      missingEvidence: >-
        Pennylane does not publish a documented time-to-onboard benchmark for accountants
        migrating SMB clients onto the platform. The onboarding workflow is described at a
        high level (invite client, connect bank via open banking, historical import), but no
        SLA, typical duration, or completion rate data is publicly available.
      whyItMatters: >-
        For accounting firms evaluating a migration from legacy desktop software, onboarding
        speed and effort per client file is a material switching-cost consideration. A fast
        onboarding workflow reduces the payback period for the firm; an opaque or slow
        onboarding process increases migration risk and could reduce adoption velocity.
      diligencePath: >-
        Request onboarding benchmark data and client migration case studies from Pennylane;
        review accounting firm testimonials on the expert-comptable page for onboarding
        time references; check WTTJ or LinkedIn reviews from accounting firm employees.
      relatedQuestionRefs: [QE011]

    - type: private-evidence-only
      severity: minor
      topic: iso-27001-certification-details
      missingEvidence: >-
        The certifying body name, certificate number, ISO 27001 scope boundary definition,
        and most recent surveillance audit date for Pennylane's ISO 27001 certification are
        not publicly disclosed. The company states certification without linking to a
        verifiable certificate or naming the accredited auditor.
      whyItMatters: >-
        ISO 27001 certification quality depends on the scope boundary: a narrow scope
        (covering only one product) differs materially from the company's claim of
        "sans exception à la norme" (covering all products, operations, and sites). Without
        the certificate details, independent verification is not possible.
      diligencePath: >-
        Request the ISO 27001 certificate from Pennylane management; verify with the
        certifying body's public registry (e.g., AFNOR, Bureau Veritas, SGS, DNV);
        review the Statement of Applicability if disclosed.
      relatedQuestionRefs: [QE013]

    - type: enumeration-incomplete
      severity: minor
      topic: integration-count-breakdown
      missingEvidence: >-
        The Pennylane integration marketplace lists individual tool names but does not provide
        a machine-readable or auditable per-category breakdown of the 300+ integrations.
        The 300+ figure is company-stated and cannot be independently verified from the
        public marketplace page.
      whyItMatters: >-
        Integration count is a competitive claim (used in marketing against Sage and Xero).
        If a significant portion of the 300+ are inactive, poorly maintained, or redundant,
        the effective integration ecosystem is smaller than claimed. Active vs. inactive
        integration status is not disclosed.
      diligencePath: >-
        Scrape or programmatically enumerate the integration marketplace; request from
