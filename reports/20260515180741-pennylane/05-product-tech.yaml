  - id: TE002
    title: Workflow and Use-Case Table
    notes: >-
      Workflows derived from Pennylane product pages, expert-comptable page, and integration
      marketplace. Measurable benefits are company-stated unless noted as estimated/inferred.
      Limitations reflect public evidence gaps and user review signals from G2 and Appvizer.
