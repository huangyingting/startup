      - Current Workflow (Legacy)
      - Pennylane Solution
      - Measurable Benefit
      - Limitation
    rows:
      - - Monthly bookkeeping close (accountant)
        - Client emails PDFs/scans; accountant manually categorizes in desktop software; month-end batch
        - Shared real-time ledger; auto-categorization; revision module; no document exchange
        - "27% productivity gain (company-stated); 1h12 saved per client file per month"
        - Benefit is company-claimed; no independent audit of the methodology
      - - Invoice creation and client billing (SMB)
        - Manual invoice in Word/Excel; email delivery; manual follow-up
        - Create and send invoices in-platform; auto-reminders; payment link for card/SEPA
        - Eliminates manual invoice tracking; payment link reduces DSO
        - Advanced multi-currency or project-based invoicing not confirmed
      - - Supplier invoice processing (SMB / accountant)
        - Manual data entry from PDF invoices; separate AP tool or spreadsheet
        - AI extraction from PDF; 1-click supplier payment from Compte Pro
        - Reduces manual data entry; AP and accounting in one system
        - Bulk invoice processing capacity and OCR accuracy rate not disclosed
      - - VAT declaration filing (accountant)
        - Export from accounting software; manual EDI upload via impots.gouv.fr portal
        - Native EDI transmission to DGFiP from within Pennylane
        - Eliminates export-and-upload step; reduces DGFiP submission errors
        - EDI error handling and resubmission SLA not publicly documented
      - - Expense management (SMB employees)
        - Paper receipts; manual expense report; reimbursement via payroll
        - Mastercard card spend auto-captured; digital receipt; expense report in-app
        - Eliminates paper; receipt matched to card transaction automatically
        - Card spend policies and multi-currency card support not fully documented
      - - Client onboarding (accountant)
        - Document collection from new client; manual data entry into desktop software
        - Invite SMB client to platform; bank connection via open banking; historical import
        - Faster onboarding; accountant can see live data from day 1
        - Bank connection coverage for all French banks not confirmed
