      - - Purchase Management
        - SMB / Accountant
        - Supplier invoice ingestion, 1-click payment, purchase order approval workflows
        - Production — 2023+
        - Auto-import of supplier invoices; AP workflow embedded in accounting close
        - Volume limits and multi-approver workflows not documented publicly
      - - Expense Management
        - SMB employees
