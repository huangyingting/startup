  - id: ai-ml-capabilities-automation
    title: AI/ML Capabilities and Automation
    body: >-
      Pennylane incorporates AI/ML capabilities at multiple points in the accounting workflow,
      with the stated goal of compressing the time accountants spend on routine data processing
      tasks. Three published AI feature categories are documented: automated transaction
      categorization, AI document extraction, and smart automation rules.

      Automated categorization applies machine-learning classification to bank transactions as
      they are imported from connected bank accounts and payment tools. The model assigns
      accounting categories based on transaction descriptions, amounts, counterparty names, and
      historical patterns, reducing the manual categorization burden for both SMBs and accountants.
      AI document extraction processes unstructured documents — supplier invoice PDFs, expense
      receipts, scanned documents — and extracts structured fields (supplier name, amount, date,
      VAT rate, line items) into the accounting system. Smart rules allow users and accountants to
      define conditional automation rules ("if counterparty = X and amount > Y, categorize as Z")
      that apply consistently to recurring transactions, providing a configurable automation layer
      on top of the ML models. [CE027] [CE028] [CE029]

      The measurable outcome Pennylane cites is a 27% productivity gain for accountants and
      1 hour 12 minutes saved per client file per month. These are company-stated figures without
      independent audit, but they are consistent with the structural efficiency gains achievable
      by eliminating manual transaction categorization and month-end document collection from the
      accountant workflow. The figures are plausible given the degree of automation built into
      the reconciliation and categorization modules. [CE030] [CE031]

      The underlying technical architecture for AI document extraction is not publicly documented.
      Whether Pennylane builds these models in-house using its proprietary transaction dataset
      (which would represent a data moat) or purchases capabilities from third-party AI providers
      (e.g., Google Document AI, AWS Textract, Azure Form Recognizer) is not disclosed on the
      product pages or in public technical documentation. The PennylaneAI GitHub organization
      suggests some in-house ML work, but the scope and production readiness are unverified.
      This opacity is an evidence gap: if the AI capabilities are third-party-supplied,
      competitive differentiation may be smaller than presented. [CE044]
    claimRefs:
      - CE027
      - CE028
      - CE029
      - CE030
      - CE031
      - CE044

  - id: security-compliance-data-handling
    title: Security, Compliance, and Data Handling
    body: >-
      Pennylane's security posture is one of its most explicitly documented technical
      differentiators. The company structures its published security stance around six principles:
      ISO 27001 certification, data security, access control, RGPD compliance, continuous employee
      security training, and operational resilience. Each principle corresponds to a documented
      program described on pennylane.com/fr/securite and in a publicly available Trust Center.
      [CE011] [CE012] [CE016]

      ISO 27001 certification is the most significant external validation. Pennylane states the
      certification covers all products, operations, and sites "sans exception à la norme" (without
      exception to the standard) — meaning the scope boundary of the certification includes the
      full platform stack, not just isolated components. ISO 27001 is an internationally recognized
      information security management system standard whose certification requires annual
      surveillance audits by an accredited third-party certification body. Pennylane also states
      it conducts annual independent security audits by external specialists, and publishes an AI
      security white paper documenting how AI-related data handling is governed. [CE011] [CE017]
      [CE018]

      RGPD/GDPR compliance is mandatory for any platform processing personal data of EU residents
      and is not in itself a differentiator — but the implementation specifics matter. Pennylane
      describes data residency and access control measures consistent with RGPD requirements.
      An access control framework governs which roles (SMB owner, accountant, Pennylane staff)
      can access which data, and role-based permissions are enforced at the application layer.
      This is particularly important given the dual-sided architecture: the accountant can access
      client financial data only to the extent the SMB has authorized, and vice versa. [CE012]
      [CE016]

      FEC compliance and EDI connectivity to DGFiP are not optional compliance features — they are
      legal requirements for accounting software operating in France. FEC (Fichier des Écritures
      Comptables) is the machine-readable accounting file format required by DGFiP for tax audits
      of French companies. EDI transmission of TVA declarations and the liasse fiscale requires
      an active technical connection agreement with DGFiP. Maintaining both requires ongoing
      technical investment as DGFiP updates its specifications, and represents a meaningful
      barrier to entry for international platforms without France-specific engineering resources.
      [CE013] [CE014] [CE015]

      Uptime, SLA, and historical incident rate data are not publicly disclosed on a status page
      or in Pennylane's public documentation as of May 2026. This is a gap: for a platform
      processing live financial data for 1M+ customers and serving as an active PDP relay for
      e-invoicing, operational resilience metrics are material due diligence information that
      cannot be sourced from public documentation. [CE045]
