  - id: FE004
    title: Accountant-SMB Real-Time Collaboration Workflow
    type: flow
    layout: wide
    summary: >-
      Step-by-step flow showing how the Pennylane platform eliminates the traditional month-end
      batch accounting cycle by enabling continuous, real-time collaboration between SMBs and
      their accountants — from financial event capture through compliance output.
    approximationNotes: >-
      Workflow steps derived from Pennylane product pages, expert-comptable page, and integration
      marketplace descriptions. Step sequence is analyst-derived from observable platform
      capabilities; Pennylane does not publish a formal process diagram.
    claimRefs:
      - CE009
      - CE010
      - CE027
      - CE031
      - CE042
    data:
      nodes:
        - id: s1
          label: SMB financial event
          detail: >-
            SMB creates invoice, logs expense on Mastercard card, processes supplier invoice
            PDF, or triggers bank transaction via Compte Pro — all within the Pennylane app
            or mobile client
          type: input
        - id: s2
          label: AI auto-processing
          detail: >-
            Platform applies ML transaction categorization (assigns accounting category from
            description, amount, counterparty), AI document extraction (supplier name, amount,
            date, VAT from PDF), and smart-rule application — immediately, without manual trigger
          type: process
        - id: s3
          label: Real-time ledger update
          detail: >-
            Processed transaction posts directly to the shared accounting ledger with correct
            category, counterparty, and amount — no month-end batch upload, no file export,
            no manual re-entry by the accountant
          type: process
        - id: s4
          label: Accountant live review
          detail: >-
            Accountant accesses the live ledger from the multi-client portfolio workspace;
            sees the SMB's current balances, uncategorized items, and outstanding invoices
            in real time; can review, adjust categories, or flag issues without waiting for
            a document package from the client
          type: review
        - id: s5
          label: Revision and close
          detail: >-
            Accountant completes bank reconciliation and the revision close process directly
            in the shared workspace; FEC (Fichier des Écritures Comptables) is generated
            on demand in DGFiP-compliant format for tax audit readiness
          type: process
        - id: s6
          label: Compliance output
          detail: >-
            Platform transmits TVA declarations and liasse fiscale via direct EDI to DGFiP;
            e-invoices are routed through the PDP relay to DGFiP's Portail Public de
            Facturation (PPF) for the September 2026 mandate; FEC archived for audit
          type: output
      edges:
        - from: s1
          to: s2
          label: Auto-triggers on event capture
        - from: s2
          to: s3
          label: Categorized entry posts to ledger
        - from: s3
          to: s4
          label: Accountant sees update in real time
        - from: s4
          to: s5
          label: Accountant initiates revision
        - from: s5
          to: s6
          label: Compliance outputs generated

callouts:
  - type: strength
    title: PDP First-Mover Advantage
    body: >-
      Pennylane's confirmed DGFiP PDP certification for the September 2026 French e-invoicing
      mandate — alongside FEC, EDI, and ISO 27001 compliance — creates a regulatory compliance
      moat that international platforms (Xero, QuickBooks) structurally cannot close in the
      12–24 months before the mandate deadline. This positions Pennylane as the natural migration
      destination for the ~5.5 million French SMBs that must comply.
    claimRefs:
      - CE015
      - CE039
      - CE040

  - type: risk
    title: Developer Portal Access Gap
    body: >-
      Pennylane's developer portal (developer.pennylane.com) was not accessible via public web
      crawl as of May 2026, and the API documentation page at pennylane.com/fr/api-documentation
      returned a broken response. This suggests the developer ecosystem is not fully open,
      limiting Pennylane's ability to attract independent integration builders and potentially
      slowing the 300+ integration count growth compared to platforms with fully public
      developer hubs (Xero, QuickBooks Online).
    claimRefs:
      - CE020
      - CE037
      - CE038

  - type: insight
    title: Embedded Finance Creates Structural Data Gravity
    body: >-
      The native Compte Pro bank account is not merely a feature — it is an architectural
      choice that positions Pennylane as the data-of-record system for all financial events:
      card spend, bank transfers, and account balances post directly to the accounting ledger
      without a manual step. This data gravity is the structural basis for automated cash flow
      forecasting and makes the platform significantly harder to displace once adopted compared
      to a pure-play accounting tool that relies on third-party bank connections.
    claimRefs:
      - CE007
      - CE043
      - CE042

