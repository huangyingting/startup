        - Card spend controls and per-user limits not published
      - - Treasury Management
        - SMB / CFO
        - Real-time cash flow view, forecasting (prévisionnel) based on receivables and payables
        - Production — 2023+
        - Forecast based on live data (invoices + bank); no manual export required
        - Forecast model accuracy and lookahead window not publicly benchmarked
      - - Accounting / Revision
        - Accountant
        - Bank reconciliation, revision workspace, FEC export, EDI TVA + liasse fiscale, annual close
