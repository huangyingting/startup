  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: ARR
      missingEvidence: >-
        Confirmed ARR, ARR growth rate, revenue mix by segment (SaaS vs. banking), and ARR
        waterfall by cohort quarter are all absent from public sources. The centaur milestone
        (≥€100M ARR, December 2025) is the only indirect public ARR anchor.
      whyItMatters: >-
        Without confirmed ARR and growth rate, the €3.6B valuation cannot be grounded in a
        defensible revenue multiple. At €100M ARR the implied 36× multiple is aggressive even
        for high-growth European SaaS; at €300M ARR the 12× multiple is defensible. The
        difference spans a full investment thesis.
      diligencePath: >-
        Request ARR waterfall (opening ARR, new ARR, expansion ARR, churn ARR, closing ARR)
        for the last four quarters from the management data room. Confirm ARR growth rate YoY
        and by customer segment.
      relatedQuestionRefs: [QI002, QI013]

    - type: private-evidence-only
      severity: material
      topic: NRR
      missingEvidence: >-
        Net revenue retention (NRR), gross revenue retention (GRR), and cohort-level churn
        data are entirely absent from public sources. No proxy from product reviews, investor
        commentary, or official disclosures is available.
      whyItMatters: >-
        NRR is the single most important unit-economics metric for a SaaS company at this
        stage. NRR above 110% would confirm the accountant-channel upsell thesis and imply
        self-compounding ARR without new logo acquisition. NRR below 100% would signal churn
        exceeding expansion and undermine the valuation premium.
      diligencePath: >-
        Request NRR and GRR by customer segment (SMB vs. accounting firm) and by plan tier
        (Basique/Essentiel/Premium) for the last eight quarters. Request cohort retention
        curves for each annual acquisition cohort since 2021.
      relatedQuestionRefs: [QI014]

    - type: private-evidence-only
      severity: material
      topic: CAC
      missingEvidence: >-
        Customer acquisition cost by channel (accountant-referred vs. direct digital vs.
        inside sales), average sales cycle length, and ACV at first contract are not disclosed.
        The accountant-channel CAC advantage is qualitatively described but not quantified.
      whyItMatters: >-
        Without confirmed CAC, LTV/CAC ratio cannot be computed. If the accountant-channel
        CAC is €50–100 (as estimated for referral-driven models), LTV/CAC of 25–60× is
        exceptional; if CAC is €300–500 (closer to direct SMB SaaS), LTV/CAC of 6–15× is
        adequate but not exceptional.
      diligencePath: >-
        Request CAC by acquisition channel with definition (fully-loaded S&M cost per net
        new customer). Request average ACV at first contract by channel and plan tier. Confirm
        whether accountant firms receive referral compensation or SLA benefits.
      relatedQuestionRefs: [QI012]

    - type: private-evidence-only
      severity: minor
      topic: cap-table
      missingEvidence: >-
        Preferred share classes, liquidation preferences, anti-dilution provisions, option
        pool size, and individual investor ownership percentages are not publicly disclosed for
        any round.
      whyItMatters: >-
        Preference stack and liquidation waterfall affect new investor return profiles at exit.
        Full-ratchet anti-dilution or aggressive liquidation preferences in earlier rounds
        could compress new investor returns even at a strong exit multiple.
      diligencePath: >-
        Request full cap table with preference stack, liquidation waterfall, and option pool
        from the legal data room. Review shareholder agreement for anti-dilution provisions
        and drag/tag-along rights.
      relatedQuestionRefs: [QI006]

