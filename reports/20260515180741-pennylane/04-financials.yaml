  name: Pennylane

chapter:
  number: 4
  title: Financials
  summary: >-
    Pennylane is a privately held French SaaS company that does not publicly disclose revenue,
    margins, or profitability. Confirmed evidence points to centaur status (approaching €100M ARR)
    as of December 2025, a published per-user pricing model starting at €14/month, approximately
    1,000,000 SMB customers and 6,000+ accounting firms on platform, and over €410M in total
    capital raised across six rounds from 2021 through January 2026—most recently €175M at a €3.6B
    valuation led by TCV. With ~900 employees, an accountant-led go-to-market channel, and a
    mandatory French e-invoicing reform driving structural SMB adoption from September 2026,
    Pennylane's financial profile is compelling but opaque: revenue, burn rate, gross margin, CAC,
    and path-to-profitability timeline all remain private. The three funding rounds completed in
    15 months (October 2024 through January 2026) totalling €330M signal exceptional investor
    conviction but also a significant ongoing capital dependency.

sections:
  - id: revenue-model-and-pricing
    title: Revenue Model and Pricing Structure
    body: >-
      Pennylane operates a per-user SaaS subscription model targeting two interconnected customer
      segments: SMBs (small and medium-sized businesses) and accounting professionals
      (experts-comptables). Revenue is generated through recurring monthly or annual per-user fees
      across tiered platform plans, supplemented by a native corporate banking product (Compte Pro)
      that earns interchange and account-related fees. Published pricing on pennylane.com/fr/tarifs
      lists the Basique plan at from €14 per user per month and the Essentiel plan at from €24 per
      user per month. A Premium plan covering advanced accounting modules is available but priced
      on request; no list price is displayed publicly, consistent with enterprise deal structures.
      The Compte Pro (integrated banking account with Mastercard card) carries separate pricing
      not fully disclosed on the public tarif page. All pricing is quoted in EUR, reflecting
      Pennylane's current primary market concentration in France.

      The dual-segment model is structurally efficient: accounting firms (cabinets d'expertise
      comptable) act as a distribution channel for SMB adoption, reducing direct customer
      acquisition cost. When a firm recommends Pennylane to its SMB clients, the SMBs join at
      standard per-user rates while the accounting firm operates on the accountant-facing plan.
      This network effect—6,000+ accounting firms each referring multiple SMB clients—compresses
      blended CAC relative to pure-direct SaaS models. Pennylane's website also confirms 300+
      third-party software integrations (payroll, e-commerce, payment processors), suggesting
      upsell opportunity through module attachment and data connectivity value. The company does
      not publicly disclose pricing for its accounting firm tiers, enterprise contracts, or volume
      discounts; realized ARPU therefore cannot be precisely derived from list prices alone.
