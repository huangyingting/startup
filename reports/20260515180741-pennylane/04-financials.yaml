  - id: funding-history-and-capital-structure
    title: Funding History and Capital Structure
    body: >-
      Pennylane has completed six confirmed funding rounds since its 2020 founding, raising a
      cumulative total of approximately €410M. The funding trajectory is one of the most
      aggressive in the French tech ecosystem, compressing €330M across three rounds in just
      15 months (October 2024 through January 2026) and delivering a 3.6× valuation step from
      €1B to €3.6B in the same period.

      The first two tranches of approximately €15M each were raised in 2021, followed by a €50M
      round in January 2022 that established Pennylane as a high-growth fintech. The landmark
      October 2024 Series C of €80M at a €1B valuation was led by Sequoia Capital, with Partech
      and Global Founders Capital (GFC) participating—marking Pennylane as France's newest
      unicorn. In April 2025, Pennylane raised a further €75M at a €2B valuation (doubling the
      €1B unicorn mark in six months). In January 2026, TCV (Technology Crossover Ventures)
      entered as lead investor in a €175M round at a €3.6B valuation, the largest single round
      to date. The investor base—Sequoia Capital, Partech, GFC, and TCV—represents four of the
      most active and reputable growth-stage technology investors globally, providing strong
      downstream financing capacity.

      Capital structure details (preference stack, liquidation preferences, anti-dilution terms,
      option pool size, and co-investor stakes) are not publicly disclosed, as Pennylane is a
      French SAS (société par actions simplifiée) not subject to US-style public disclosure
      requirements. Sequoia partner Luciana Lixandru is a confirmed board member following the
      Series C investment. The January 2026 round's use of proceeds is not formally disclosed,
      though Maddyness and Sifted report the context of international expansion (Germany) and
      the French e-invoicing reform (PDP mandate).
