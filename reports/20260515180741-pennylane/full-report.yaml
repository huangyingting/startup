      - number: '3.2'
        title: Legacy Incumbents — Sage and Cegid
        blocks:
          - type: paragraph
            body: >-
              Sage is Pennylane's most consequential competitor in the French market. With 2 million+ French business
              customers and the Sage brand woven into the accounting and finance fabric of French businesses since the
              1990s, Sage has unmatched installed base density. Its global revenue reached £2.2 billion in FY2025, with
              France representing one of its largest single markets. Sage has responded to cloud disruption with the
              launch of Sage Active, a cloud-first accounting product for French SMBs priced from approximately €12.50
              per month, and a dedicated "Sage for Accountants" suite targeting the expert-comptable segment. Sage's
              weakness is architectural: its legacy codebase requires structural rethinking to match Pennylane's native
              real-time collaboration features, and its go-to-market historically focused on the accountant-as-client
              rather than the accountant-as-distribution-channel model that Pennylane has monetised. Sage has a PDP
              certification pathway in progress for the 2026 e-invoicing mandate. [CP009] [CP010] [CP011] [CP012]

              Cegid is the dominant accounting software vendor for large French accounting firms (cabinets d'expertise
              comptable with 10+ staff) and mid-market enterprises. Its flagship products — Cegid Quadratus for
              accounting professionals and Cegid Loop for collaborative accounting — are well-established in the upper
              segment of the market. Cegid has been investing in its cloud transition, offering hosted and SaaS options
              alongside its legacy server-installed products. However, Cegid's enterprise focus, pricing model, and UX
              complexity make it poorly suited for the small accounting firm and TPE/micro-enterprise segment where
              Pennylane is strongest. Cegid is also pursuing PDP certification for the e-invoicing mandate. The key
              competitive risk from Cegid is that it could use its large firm relationships to expand down-market if
              Pennylane begins capturing medium-sized accounting firms, triggering a competitive collision in the 5–50
              person accounting practice segment. [CP013] [CP014] [CP015]
            claimRefs:
