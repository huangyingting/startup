companyProfile:
  summary: >-
    Pennylane is a Paris-based SaaS company founded in 2020 that provides an integrated cloud accounting and financial
    management suite for French SMBs and the accounting firms that serve them. The platform combines bookkeeping
    automation, invoicing, expense management, treasury, and payroll prep into a single interface, differentiated by
    AI-driven categorisation and native connectivity between accountant and client workspaces. As of May 2026 Pennylane
    has over one million SMB customers, more than 6,000 accounting firm partners, and has been designated a PDP
    (Plateforme de Dématérialisation Partenaire) by the French tax authority DGFiP ahead of the mandatory e-invoicing
    reform due in September 2026. A January 2026 Series D round of €175M led by TCV valued the company at €3.6B, making
    it one of France's most highly valued private fintechs.
  foundedDate: '2020-01-01'
  founders:
    - name: Arthur Waller
      role: CEO & Co-founder
      background: >-
        Previously a fintech operator with investment banking background; founded Pennylane after observing the
        fragmented tooling used by French SMBs and their accountants.
      claimRefs:
        - CO001
  foundingLocation: Paris, France
  headquarters: Paris, France
  productSummary: >-
    Cloud accounting platform covering invoicing, expense capture, bank reconciliation, bookkeeping, financial
    dashboards, and accountant collaboration tools. Available via web and mobile apps with 300+ integrations (Shopify,
    Stripe, Salesforce, etc.). ISO 27001 certified and RGPD compliant. Pricing tiers range from ~€26/month (SMB
    self-serve) to enterprise plans for accounting firms.
  customerFocus: >-
    French SMBs (self-serve, primarily micro and small enterprises) and the accounting professionals that serve them
    (6,000+ cabinet partnerships). Early expansion into Germany targeting SMB accountants.
  businessModel: >-
    Subscription SaaS with dual GTM: direct SMB acquisition (freemium/trial funnel) and accountant-led distribution
    through firm partnerships. SMB pricing is usage-tiered; firm pricing is per-client-seat. The accountant channel
    creates embedded distribution and high switching costs.
  stage: Series D+ / Pre-IPO
  fundingStatus: >-
