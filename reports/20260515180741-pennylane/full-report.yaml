      - number: '2.3'
        title: Buyer and Market Segmentation
        blocks:
          - type: paragraph
            body: >-
              Pennylane operates in a two-sided market: accounting firms (cabinets d'expertise comptable) on one side
              and SMBs on the other. France has approximately 24,000 registered accounting practices, serving
              collectively as the dominant distribution channel for accounting software. Pennylane has captured
              approximately 6,000+ of these practices — roughly 25% of the market — within six years of launch, making
              accountants the primary economic buyer and referrer for SMB subscriptions. This structure means the SMB
              end-user is often influenced or directly onboarded by their accountant, creating a significantly lower
              customer acquisition cost than direct B2SMB outreach.

              Within the SMB segment, Pennylane's product is best suited to formal commercial entities (SARL, SAS, SA)
              with 1–249 employees requiring professional-grade accounting. The micro-enterprise segment
              (auto-entrepreneurs) is contested by Indy, which offers free pro-accounting accounts and has amassed over
              13,000 user reviews. Larger SMEs (ETI, 250+ employees) represent upsell territory where Cegid holds strong
              incumbent positions in medium-to-large accounting practices. Geographically, France dominates current
              revenue; the German market (Steuerberatung segment) is in early expansion. Sector mix is largely
              generalist, with notable concentration in professional services, retail, and hospitality where cash-flow
              monitoring tools are most valued.
