    title: Thesis-Break and Kill Triggers Table
    notes: >-
      Trigger probabilities are qualitative expert estimates; actual timing depends on French government mandate
      implementation schedule, Pennylane fundraising cadence, and competitive developments in the French accounting SaaS
      market.
    columns:
      - Trigger
      - Metric / Threshold
      - Probability
      - Action
      - Monitoring Frequency
    rows:
      - - E-invoicing mandate delayed 12+ months beyond September 2026
        - Government announcement of mandate postponement or phase-out
        - Medium
        - Reassess immediately — primary adoption catalyst removed; adjust base-case ARR trajectory down 30–40%
        - Monitor DGFIP and government announcements monthly
      - - Cegid or Sage achieves PDP/OD certification before Pennylane
        - Regulatory gazette listing a direct competitor as certified PDP operator before Pennylane
        - Low-Medium
        - Reassess — first-mover mandate channel advantage is the key thesis differentiator; re-model competitive CAC
        - Monitor DGFIP certification registry quarterly
      - - Burn rate signals runway below 12 months without new raise
        - Any data point — press, employee disclosure, or company — indicating capital exhaustion risk
        - Low-Medium
        - Exit / Stop-loss — capital crisis scenario triggers down-round or fire-sale acquisition at severe discount
        - Monitor press, LinkedIn hiring freeze signals, and funding announcements quarterly
      - - ARR growth slows below 25% on independently reported or inferred data
        - Press-reported or inferred ARR below €125M by December 2026 (implies under 25% growth from €100M base)
        - Medium
        - Reassess aggressively — thesis depends on 35%+ CAGR; sub-25% suggests saturation or competitive displacement
        - Monitor funding announcements, headcount trends, and press quarterly
      - - Down-round financing event below €3.6B post-money
        - Announced round at valuation below January 2026 €3.6B post-money
        - Low
        - Exit — adverse signal; thesis depends on continued VC conviction at or above current entry valuation
        - Monitor funding announcements continuously
