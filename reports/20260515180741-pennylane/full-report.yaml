  - id: FE004
    title: Accountant-SMB Real-Time Collaboration Workflow
    type: flow
    layout: wide
    summary: >-
      Step-by-step flow showing how the Pennylane platform eliminates the traditional month-end batch accounting cycle
      by enabling continuous, real-time collaboration between SMBs and their accountants — from financial event capture
      through compliance output.
    approximationNotes: >-
      Workflow steps derived from Pennylane product pages, expert-comptable page, and integration marketplace
      descriptions. Step sequence is analyst-derived from observable platform capabilities; Pennylane does not publish a
      formal process diagram.
    claimRefs:
      - CE009
      - CE010
      - CE027
      - CE031
      - CE042
    data:
      nodes:
        - id: s1
          label: SMB financial event
          detail: >-
            SMB creates invoice, logs expense on Mastercard card, processes supplier invoice PDF, or triggers bank
            transaction via Compte Pro — all within the Pennylane app or mobile client
          type: input
        - id: s2
          label: AI auto-processing
          detail: >-
            Platform applies ML transaction categorization (assigns accounting category from description, amount,
            counterparty), AI document extraction (supplier name, amount, date, VAT from PDF), and smart-rule
            application — immediately, without manual trigger
          type: process
        - id: s3
          label: Real-time ledger update
          detail: >-
            Processed transaction posts directly to the shared accounting ledger with correct category, counterparty,
            and amount — no month-end batch upload, no file export, no manual re-entry by the accountant
          type: process
        - id: s4
          label: Accountant live review
          detail: >-
            Accountant accesses the live ledger from the multi-client portfolio workspace; sees the SMB's current
            balances, uncategorized items, and outstanding invoices in real time; can review, adjust categories, or flag
            issues without waiting for a document package from the client
          type: review
        - id: s5
          label: Revision and close
          detail: >-
            Accountant completes bank reconciliation and the revision close process directly in the shared workspace;
            FEC (Fichier des Écritures Comptables) is generated on demand in DGFiP-compliant format for tax audit
            readiness
          type: process
        - id: s6
          label: Compliance output
          detail: >-
            Platform transmits TVA declarations and liasse fiscale via direct EDI to DGFiP; e-invoices are routed
            through the PDP relay to DGFiP's Portail Public de Facturation (PPF) for the September 2026 mandate; FEC
            archived for audit
          type: output
      edges:
        - from: s1
          to: s2
          label: Auto-triggers on event capture
        - from: s2
          to: s3
          label: Categorized entry posts to ledger
        - from: s3
          to: s4
          label: Accountant sees update in real time
        - from: s4
          to: s5
          label: Accountant initiates revision
        - from: s5
          to: s6
          label: Compliance outputs generated
  - id: FU001
    type: journey-map
    title: Customer journey map
    subtitle: Pennylane SMB and accountant customer journeys from discovery through retention
    approximationNotes: >-
      Journey stages are reconstructed from Pennylane's official product pages (pennylane.com/fr, expert-comptable,
      tarifs), the DAFtech 2026 event content, AppVizer editorial review, and structural analysis of the platform's
      dual-sided model. Specific conversion rates between stages are not disclosed by Pennylane and are not represented
      here; the map reflects qualitative stage sequencing only. The SMB-via-accountant path and the direct SMB path are
      treated as parallel journeys rather than sequential alternatives.
    claimRefs:
      - CU016
      - CU028
      - CU039
      - CU037
      - CU038
    data:
      items:
        - id: jm-awareness-direct
          label: Awareness (Direct)
          actor: SMB owner / DAF / freelancer
          description: >-
            Discovers Pennylane through SEO search ("logiciel comptabilité France"), content marketing
            (pennylane.com/fr/blog), product advertising, or word of mouth from a peer SMB. May also discover through
            the app stores (4.7/5 and 4.5/5 ratings).
          channels:
            - Google/SEO (French-language accounting queries)
            - Content marketing and blog
            - App Store / Google Play
            - Social media
        - id: jm-awareness-accountant
          label: Awareness (Accountant-led)
          actor: SMB owner — referred by accounting firm
          description: >-
            The accountant (one of 6,000+ on Pennylane) proactively recommends Pennylane to their SMB client, who
            follows the accountant's instruction to sign up. This is the primary acquisition path for the majority of
            SMB customers.
          channels:
            - Accounting firm recommendation
            - Accounting firm congress / industry events
            - DAFtech event (mid-market DAF/CFO segment)
        - id: jm-trial
          label: Sign-up and Trial
          actor: SMB owner / freelancer
          description: >-
            SMB signs up for a free trial or paid plan. Begins with basic invoicing setup. Some SMBs sign up directly;
            accountant-referred SMBs have a shorter trial-to-paid conversion cycle due to higher intent and accountant
            guidance.
          channels:
            - pennylane.com/fr direct sign-up
            - Accountant-provided onboarding link
        - id: jm-activation
          label: Activation (Bank + Accountant)
          actor: SMB owner + accounting firm
          description: >-
            Three-step activation: (1) connect business bank account (auto-imports transactions); (2) configure
            invoicing templates; (3) invite the accounting firm to the shared platform. Full activation is the key
            retention milestone — once the accountant is connected, bilateral lock-in is established and time-to-value
            is fully delivered.
          channels:
            - In-product onboarding flow
            - Accountant invitation email
            - Bank API connection (open banking)
        - id: jm-expansion
          label: Expansion (Upsell and Deepening)
          actor: SMB owner / DAF
          description: >-
            Customers expand from basic invoicing to full accounting, then to treasury management, expense management,
            or the Compte Pro corporate bank account (30,000+ subscribers). DAFs and PME CFOs may be onboarded directly
            into the Premium tier. E-invoicing compliance (PDP mandate) deepens usage as the September 2026 deadline
            approaches.
          channels:
            - In-product upsell prompts
            - DAFtech event for DAF/CFO upgrade
            - E-invoicing mandate compliance pressure
        - id: jm-retention
          label: Long-term Retention
          actor: SMB owner + accounting firm (bilateral)
          description: >-
            Retention is driven by three structural anchors: (1) accumulated accounting data creates migration cost that
            grows with tenure; (2) bilateral accountant lock-in means switching requires the accounting firm to migrate
            its entire client book; (3) PDP mandate compliance becomes an additional switching barrier from Sep 2026.
            Named customers (Yuka, happn, Fleet, Offishall) represent the retention outcome.
          channels:
            - Accounting data depth (automated monthly close)
            - Accountant co-dependency
            - PDP-compliant e-invoicing integration
