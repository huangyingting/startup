      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: PDP approval and e-invoicing mandate create a regulatory tailwind for 2026 growth
            body: >-
              Pennylane's approval as a Plateforme de Dématérialisation Partenaire (PDP) by the French tax authority
              (DGFiP) positions it as a structural beneficiary of the September 2026 French Facturation Électronique
              e-invoicing mandate. Unlike most software competitors, PDP status is a government-issued certification
              from a limited approved list, creating a meaningful barrier to entry. The simultaneous exit of QuickBooks
              from the French market (Intuit's decision to shut down QuickBooks France rather than invest in PDP
              compliance) removes one of the best-known international accounting software brands from the competitive
              landscape, directly opening customer migration opportunities. Pennylane is positioned as one of the few
              platforms offering both PDP-compliant e-invoicing and full SMB accounting in an integrated package.
            calloutType: strength
