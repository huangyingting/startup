  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Architecture and Core Modules
        blocks:
          - type: paragraph
            body: >-
              Pennylane's platform is structured as a unified cloud application serving two distinct user roles — SMBs
              (small and medium-sized businesses) and their accountants (experts-comptables) — from a single shared
              real-time data layer. Rather than offering isolated point solutions, the platform integrates seven
              functional modules that operate on the same underlying financial data set, eliminating the information
              transfer lag that characterizes legacy desktop accounting workflows where month-end document exchange was
              the norm.

              The invoicing module (Facturation) supports the full document lifecycle: quotes (devis), invoices
              (factures), proformas, purchase orders (bons de commande), delivery notes (bons de livraison),
              subscriptions with automatic renewal, automatic payment reminders (relances automatiques), and direct
              payment links via Mastercard or SEPA bank transfer. The purchase management module handles supplier
              invoice ingestion, one-click supplier payment, and purchase order workflows. Expense management integrates
              Mastercard physical and virtual cards with expense report filing and receipt (justificatif) capture. The
              treasury module provides real-time cash flow tracking and forecasting (prévisionnel) against live bank
              balances and outstanding receivables.

              The accounting and revision module is the deepest part of the stack: it covers bank reconciliation, a full
              revision workspace for the accountant's close process, FEC (Fichier des Écritures Comptables) generation
              compliant with the DGFiP legal format, and EDI transmission of TVA declarations and the annual liasse
              fiscale directly to French tax authorities. The embedded corporate bank account (Compte Pro) provides a
              native IBAN français, physical and virtual Mastercard cards, and SEPA payments — embedding banking data
              directly into accounting without a manual import step. A mobile application rounds out the SMB experience
              for on-the-go invoicing and expense capture. [CE001] [CE002] [CE003] [CE004] [CE005] [CE006] [CE007]
              [CE008] [CE009]

              The architectural decision to place both the SMB and the accountant on the same platform — rather than
              separate products exchanging files — is the structural core of Pennylane's differentiation. The accountant
              sees the same live transaction data, bank feeds, and invoice status that the SMB sees, enabling the
              accountant to work continuously rather than in batch mode at month-end. This "real-time accounting" design
              requires a multi-tenant permission model where an accountant can manage hundreds of client portfolios from
              a single workspace, with role-based access controlling each party's visibility and editing rights. [CE009]
              [CE010] [CE042]
