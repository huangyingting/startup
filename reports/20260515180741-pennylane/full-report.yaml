      - number: '4.2'
        title: Unit Economics and Sales Efficiency
        blocks:
          - type: paragraph
            body: >-
              Pennylane's unit economics are partially constructable from public data but remain substantially
              unconfirmed due to private-company opacity. On the revenue side, a blended ARPU estimate of €15–30 per
              user per month (based on the Basique €14 floor and Essentiel €24 midpoint, adjusted for Premium and
              accounting-firm plan uplift) implies annualized ARPU of €180–360 per user. With 1,000,000+ SMB customers
              reported on pennylane.com, the low-end ARR estimate is approximately €180M if all customers are on the
              entry plan with a single user; the centaur milestone reported by Maddyness in December 2025 (≥€100M ARR)
              anchors the lower bound more firmly. True ARR depends on the mix of single-user vs. multi-user accounts
              and the share of clients on higher-tier plans.

              The accounting-channel go-to-market creates a structural CAC advantage. Rather than acquiring 1,000,000
              SMBs through direct marketing at typical SaaS SMB CAC (€200–800 per customer), Pennylane's accountant
              referral model allows the accounting firm relationship to substitute as a trust-based distribution
              channel. The effective blended CAC is not disclosed; analyst estimates for accountant-channel-driven SaaS
              suggest a 3–5x CAC reduction vs. pure direct. Customer lifetime value (LTV) is also not disclosed; at a
              median ARPU of €220/year and an assumed SMB churn rate of 5–10%, implied LTV ranges from €2,200 to €4,400
              per SMB customer—reasonable for the segment but dependent on churn assumptions that are entirely private.
              Gross margin for cloud-native SaaS accounting software is typically 70–80%; Pennylane's specific gross
              margin is not disclosed.
