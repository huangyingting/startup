  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Structure
        blocks:
          - type: paragraph
            body: >-
              Pennylane operates a per-user SaaS subscription model targeting two interconnected customer segments: SMBs
              (small and medium-sized businesses) and accounting professionals (experts-comptables). Revenue is
              generated through recurring monthly or annual per-user fees across tiered platform plans, supplemented by
              a native corporate banking product (Compte Pro) that earns interchange and account-related fees. Published
              pricing on pennylane.com/fr/tarifs lists the Basique plan at from €14 per user per month and the Essentiel
              plan at from €24 per user per month. A Premium plan covering advanced accounting modules is available but
              priced on request; no list price is displayed publicly, consistent with enterprise deal structures. The
              Compte Pro (integrated banking account with Mastercard card) carries separate pricing not fully disclosed
              on the public tarif page. All pricing is quoted in EUR, reflecting Pennylane's current primary market
              concentration in France.

              The dual-segment model is structurally efficient: accounting firms (cabinets d'expertise comptable) act as
              a distribution channel for SMB adoption, reducing direct customer acquisition cost. When a firm recommends
              Pennylane to its SMB clients, the SMBs join at standard per-user rates while the accounting firm operates
              on the accountant-facing plan. This network effect—6,000+ accounting firms each referring multiple SMB
              clients—compresses blended CAC relative to pure-direct SaaS models. Pennylane's website also confirms 300+
              third-party software integrations (payroll, e-commerce, payment processors), suggesting upsell opportunity
              through module attachment and data connectivity value. The company does not publicly disclose pricing for
              its accounting firm tiers, enterprise contracts, or volume discounts; realized ARPU therefore cannot be
              precisely derived from list prices alone.
