  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >-
              Pennylane's primary addressable market is the financial-management software layer for French TPE/PME (très
              petites entreprises / petites et moyennes entreprises). The French Code de Commerce mandates statutory
              accounting and tax reporting for all commercial entities, creating universal demand for compliant
              bookkeeping tools. INSEE estimates approximately 4.8–5.2 million active SMBs in France, of which roughly
              3.7 million are micro-enterprises (auto-entrepreneurs and sole traders) and the remainder are formal
              commercial entities with full accounting obligations.

              Included spend in Pennylane's addressable market covers: cloud accounting and bookkeeping (journal, TVA,
              statutory accounts), electronic invoicing and AP/AR automation, financial management dashboards, cash-flow
              monitoring, and PSD2 banking connectivity for transaction categorisation. Excluded spend includes full ERP
              systems (SAP, Oracle), dedicated payroll (Silae, Sage Paie), standalone expense management, pure
              CRM/billing tools, and large corporate treasury management. Adjacent spend — document-capture tools
              (Dext), freelancer neobanks (Indy, Qonto, Shine), and accounting practice management — represents
              complementary rather than competitive market territory in most buyer segments.

              Status-quo substitutes that Pennylane must displace include desktop-installed legacy software (EBP, Ciel),
              server-hosted Sage and Cegid deployments, and Excel-based bookkeeping for micro-enterprises. The September
              2026 e-invoicing mandate is the single most powerful forcing function for substitute displacement since
              the introduction of electronic TVA declarations. Pennylane has also expanded its addressable boundary into
              Germany (Steuerberatung segment), evidenced by German-language pages on its website and sitemap, extending
              the TAM definition beyond France.
