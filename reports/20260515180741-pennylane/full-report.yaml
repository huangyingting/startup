            title: PDP Certification as First-Mover Compliance Advantage
            body: >-
              Pennylane's DGFiP-certified PDP status is the most durable near-term competitive moat in the French SMB
              accounting market. The September 2026 e-invoicing mandate makes PDP compliance a legal necessity for any
              platform processing French B2B invoices — not a feature choice. While Sage and Cegid are both pursuing PDP
              certification, the timeline gap matters: each quarter of PDP lead time allows Pennylane to convert
              accounting firms and their client books before legacy alternatives achieve compliance. Because the
              accountant network effect compounds (each converted firm brings its full client portfolio), the
              first-mover advantage in PDP-compliant accounting is multiplicative, not additive. A 6–12 month lead
              translates into a 1–2 cohort advantage that may take Sage 3–5 years to fully erode.
