          type: competitor
        - id: n3
          label: Accounting Firm Channel (6,000+ firms)
          type: channel
        - id: n4
          label: SMB Customer Base (1M+)
          type: target
        - id: n5
          label: Pennylane Entry Tier (EUR 24/mo)
          type: product
        - id: n6
