  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Compliance Risks
        blocks:
          - type: paragraph
            body: >-
              Pennylane's single largest growth catalyst -- the French e-invoicing mandate (Facturation Electronique) --
              is simultaneously its most material regulatory risk. The DGFiP initially targeted a 2024 launch date for
              mandatory B2B e-invoicing, then pushed it to September 2025, and subsequently to September 2026. A third
              delay would fundamentally alter the urgency of SMB and accounting firm adoption decisions in 2026 and
              would directly compress the return timeline on Pennylane's January 2026 EUR 175M fundraise, which press
              coverage in Maddyness and Sifted explicitly linked to the e-invoicing reform opportunity. The mandate's
              political sensitivity -- it touches 4.3M+ French businesses -- means any fiscal or political disruption
              could trigger further postponement without operational recourse for Pennylane. [CR001] [CR003] [CR034]

              The DGFiP's Portail Public de Facturation (PPF) is a government-operated free alternative to commercial
              PDP platforms. Should SMBs and accountants default to the PPF rather than subscribing to a PDP platform
              like Pennylane, the commercial advantage of PDP certification is substantially reduced. The PPF is
              available at zero additional cost; while it lacks Pennylane's full-suite accounting and collaboration
              features, the smallest SMBs may find it adequate, capping the addressable mandate-driven adoption market.
              [CR004] [CR039]

              GDPR/RGPD liability is a material unhedged risk. Pennylane holds financial records for 1,000,000+ French
              businesses -- including bank transactions, invoice archives, payroll integrations, and full accounting
              ledgers (FEC). Under GDPR Article 83, a serious data breach or processing violation could result in CNIL
              fines of up to 4% of global annual turnover. The CNIL has actively enforced GDPR against major French
              technology companies (Google France fined EUR 150M, Amazon France fined EUR 35M in 2021 for cookie consent
              violations), and Pennylane's financial data custody scope places it within CNIL's high-priority
              supervisory universe. ISO 27001 certification mitigates but does not eliminate this risk. [CR005] [CR008]
              [CR040]

              FEC (Fichier des Ecritures Comptables) compliance is mandatory under French tax law; any platform-level
              error producing non-compliant FEC exports would expose Pennylane's 6,000+ accounting firm clients to
              penalties and professional liability, triggering mass churn and reputational destruction. Germany
              introduces a parallel regulatory layer: GoBD requires 10-year data retention with strict auditability
              rules, and HGB accounting standards differ materially from the French Plan Comptable General, requiring
              significant localisation investment. [CR006] [CR007]
