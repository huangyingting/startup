            title: Self-reported customer metrics and absent retention data limit diligence quality
            body: >-
              Pennylane's most important customer metrics — the 1M+ business customer count and 6,000+ accounting firm
              count — are company self-reported on marketing pages without independent verification, audit disclosure,
              or definition of "customer" (active paying user vs. free trial vs. registered account). The growth
              trajectory from 3,000 to 40,000 to 1,000,000+ is directionally credible but has no independently audited
              anchor. More critically, NRR, GRR, churn rates, cohort retention curves, NPS, and formal CSAT scores are
              all absent from the public record. In the absence of retention data, the accountant-lock-in thesis —
              however logically compelling — cannot be quantitatively verified. Investors and analysts must rely
              entirely on structural reasoning about switching costs rather than observed churn outcomes. The December
              2025 centaur milestone (≥€100M ARR) is the only indirect revenue anchor available publicly. All retention
