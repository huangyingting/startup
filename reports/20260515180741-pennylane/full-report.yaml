          type: financial
        - id: n2
          label: EUR 175M Raise (TCV-led, Jan 2026)
          type: financial
        - id: n3
          label: Required ARR Growth (40-60% YoY sustained)
          type: requirement
        - id: n4
          label: E-invoicing Mandate (Sept 2026 trigger)
          type: dependency
        - id: n5
          label: Estimated Burn Rate (EUR 90-130M/yr)
          type: risk
        - id: n6
          label: Runway Risk (<18 months at max burn)
          type: risk
        - id: n7
          label: Investor Preference Stack (compression risk)
          type: risk
      edges:
