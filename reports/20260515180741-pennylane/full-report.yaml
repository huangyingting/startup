  - id: FR002
    title: Competitive Threat Flow -- Sage and Cegid Attack Vectors
    description: >-
      Directed graph mapping how Sage Active and Cegid exert competitive pressure on Pennylane's dual-sided
      accountant-SMB platform, showing the pathways through which each competitor could erode Pennylane's market
      position by 2026-2027.
    type: dag
    layout: wide
    summary: >-
      Sage Active and Cegid represent structurally different but compounding competitive threats. Sage attacks via price
      (EUR 12.50/mo vs EUR 24/mo) and installed base migration (2M+ customers). Cegid attacks via downmarket extension
      to mid-tier firms. Both converge on the accounting firm channel, which is Pennylane's primary CAC lever.
    claimRefs:
      - CR009
      - CR010
      - CR012
      - CR013
