            title: 'Sage''s Installed Base: The 2-Million-Customer Threat'
            body: >-
              Sage's 2 million+ French customer installed base is the single largest competitive risk to Pennylane's
              growth trajectory. If Sage successfully delivers a cloud product (Sage Active) with PDP compliance and
              native accountant collaboration at feature parity, it can offer existing customers a "compliant upgrade"
