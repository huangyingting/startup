      - number: '5.7'
        title: Exhibits
        blocks:
          - type: callout
            title: PDP First-Mover Advantage
            body: >-
              Pennylane's confirmed DGFiP PDP certification for the September 2026 French e-invoicing mandate —
              alongside FEC, EDI, and ISO 27001 compliance — creates a regulatory compliance moat that international
              platforms (Xero, QuickBooks) structurally cannot close in the 12–24 months before the mandate deadline.
              This positions Pennylane as the natural migration destination for the ~5.5 million French SMBs that must
              comply.
