      - number: '6.2'
        title: Named Customer Proof and Use Cases
        blocks:
          - type: paragraph
            body: >-
              Pennylane's testimonials page (pennylane.com/fr/temoignages, returned 404 at time of research) and DAFtech
              2026 event materials provide named customer proof across multiple industries. The most prominent named
              customers are Yuka (the widely known French food transparency app), happn (the Paris-based location-based
              dating app with millions of global users), Gens de confiance (a curated peer-to-peer holiday rental
              platform), Lunettes pour tous (an optical retail chain), Fleet (a vehicle fleet management SaaS for SMBs),
              Offishall (a workplace experience SaaS), Caval (a direct-to-consumer sneaker brand), Nouvelle Garde (a
              fashion retail company), and Klox. These are recognizable French SME and growth-stage brands spanning
              consumer tech, retail, SaaS, and services — indicating broad cross-sector adoption rather than
              concentration in a single vertical. [CU008] [CU027]

              Customer testimonials quoted on the Pennylane website and DAFtech 2026 materials provide use-case context
              and named endorsements. Audrey Barbier-Litvak, CEO of Offishall, provides a named CEO endorsement for
              Pennylane's business management capabilities. Martin Leveau, VP Finance of Fleet, is cited as a named
              finance leader endorser. Alexandra Mulliez, Co-fondatrice of ADRESSE (a property and services business),
              provides a testimonial representing the real-estate services vertical. Nicolas Roux (CFO) and Charles
              Bonnevie (Business Development) are also cited as named contacts in Pennylane's customer profiles.
              Pennylane's headline customer value proposition — "Divide time spent on accounting by 3" — is the primary
              outcome claim deployed in marketing, attributed to automated bank-reconciliation and AI-assisted
              bookkeeping features. The DAFtech 2026 event, a Pennylane-hosted gathering for CFOs and finance directors,
              demonstrates penetration into the mid-market finance function beyond basic SMB use. [CU009] [CU010]
              [CU011] [CU012] [CU023]

              Named customer evidence quality must be calibrated: these are marketing testimonials rather than
              independently verified case studies with quantified outcome metrics. The absence of documented ARR
              contribution, contract term, deployment scope, or pre/post comparison data from named customers limits the
              analytical value. Nevertheless, the presence of recognizable brand names — particularly Yuka, which is one
              of France's most downloaded consumer apps and has high brand recognition — elevates the testimonial signal
              above typical SMB marketing collateral. Independent verification of production deployment status for all
              named customers is a remaining diligence step.
