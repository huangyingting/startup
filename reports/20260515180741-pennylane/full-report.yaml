      - number: '1.2'
        title: Founders, Leadership, and Team
        blocks:
          - type: paragraph
            body: >-
              Arthur Waller is CEO and co-founder of Pennylane. He holds a background in finance and engineering and
              previously worked in investment banking before founding Pennylane in 2020. The company's leadership team
              includes a Chief Technology Officer and senior product and engineering leads. As of 2025, Pennylane
              employs approximately 900 people total, including more than 300 engineers — a ratio that reflects the
              company's technical depth and product-led growth model. The average employee age is 33, with 35% women and
              65% men across the workforce. Pennylane scored 73/100 on the French gender equality index (Index Égalité
              Professionnelle) for 2025. [CO009] [CO010] [CO011]

              The company has built a strong employer brand on Welcome to the Jungle (a French tech recruiting
              platform), where its profile highlights rapid scaling from founding in 2020 to 900 employees and more than
              1 million business customers within five years. Pennylane recruits heavily in Paris and has engineering
              offices in the same location. The 300+ engineer count reflects significant investment in product
              development, consistent with a Series C-stage fintech competing against both legacy incumbents and
              well-funded challengers. [CO012] [CO013]

              Sequoia Capital partner Luciana Lixandru sits on the board as a result of Sequoia's Series C investment
              leadership. Sequoia's description of the investment — "Pennylane is becoming the key financial management
              platform for SMEs in Europe. We are thrilled to partner with their exceptional team to ensure businesses
              of any size can have a single, up-to-date source for their financial data and improve how they collaborate
              with their accountants" — reflects board-level conviction in Pennylane's dual-market strategy. [CO014]
              [CO015]
