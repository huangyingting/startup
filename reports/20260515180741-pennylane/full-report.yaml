  - id: FR003
    title: Financial Risk Cascade -- Valuation, Burn, and ARR Growth Dependency
    description: >-
      Directed graph showing how Pennylane's EUR 3.6B valuation and EUR 175M January 2026 fundraise create a chain of
      financial risk dependencies: sustained ARR growth is required to justify the multiple, which in turn depends on
      e-invoicing mandate execution and competitive pricing position.
    type: dag
    layout: wide
    summary: >-
      The EUR 3.6B valuation at ~36x ARR creates a compounding risk chain: if ARR growth decelerates, the exit multiple
      is not achievable; if burn rate exceeds EUR 130M/year, the EUR 175M raise provides less than 18 months of runway;
      if the e-invoicing mandate is delayed again, the ARR growth narrative that drove the January 2026 raise collapses.
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR025
      - CR034
      - CR037
