      - number: '6.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Accountant-led B2B2C distribution creates capital-efficient, high-retention growth
            body: >-
              Pennylane's decision to target accounting firms as primary distribution rather than acquiring SMBs
              directly through advertising is a structurally superior go-to-market strategy for the French market.
              Accounting firms carry pre-existing trust relationships with SMB owners that no amount of digital
              marketing can replicate. The 6,000+ accounting firms on the platform function simultaneously as a low-cost
              acquisition channel (the accountant recommends Pennylane to its client portfolio) and as a high-value
              retention mechanism (the client is co-locked with the accountant on the platform). This dual role means
              the same asset — the accountant relationship — drives both customer acquisition cost compression and churn
              rate reduction. The structural parallel to Xero's accountant-partner model in the UK, which supported
              Xero's industry-leading ~95% annual gross retention, suggests that Pennylane could achieve similar
              retention outcomes if the bilateral lock-in is as deep as Xero's. The 75% remaining French accounting firm
              penetration opportunity (est. 18,000 firms not yet on platform) provides a long organic growth runway
              without requiring additional market entry cost.
