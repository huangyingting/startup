      - number: '8.5'
        title: Comparable Valuation Set
        blocks:
          - type: paragraph
            body: >-
              The comparable valuation set for Pennylane spans three categories: public European accounting SaaS
              platforms (Xero, Sage), private European SMB SaaS and strategic acquirers (Visma Group, Cegid), and
              strategic M&A reference transactions (Visma/Holded). The most directly relevant public comparables are
              Xero (NZX/ASX: XRO, 4.2M subscribers, NZ$1.9B FY2025 revenue, approximately NZ$18B market cap = ~7x ARR)
              and Sage (LSE: SGE, £2.25B FY2024 revenue, ~£12B market cap = ~5x revenue). Both trade at 5–7x trailing
              revenue/ARR, a substantial discount to Pennylane's 36x ARR multiple at the January 2026 valuation. The
              private-market premium is partially justified by Pennylane's superior growth rate (~70–100% ARR CAGR
              versus Xero's ~15% and Sage's ~8%), but the gap remains extreme by historical SaaS valuation standards.

              For private-market context: the BVP State of the Cloud 2024 report documents that median ARR multiples for
              growth-stage cloud companies normalised to 8–12x ARR in 2024, down from 30–50x peak in 2021. Pennylane's
              36x ARR multiple is at the high end of the current market, consistent with top-decile European SaaS at the
              mandate-catalyst inflection point. The Visma Group/Holded acquisition in 2024 (Spain-based SMB accounting
              SaaS) at an estimated €100–150M (approximately 5–8x ARR) provides a strategic M&A reference — well below
              Pennylane's current multiple, suggesting strategic acquirers would need to apply a significant growth-rate
              premium. Dealroom and PitchBook confirm the €3.6B valuation and funding history but do not provide
              independently verified ARR, confirming that the 36x multiple rests on self-reported and press-inferred ARR
              of approximately €100M.
            claimRefs:
              - CV049
              - CV050
              - CV051
              - CV052
              - CV053
              - CV054
              - CV055
              - CV056
              - CV057
          - type: table
            tableRef: TV004
            claimRefs:
              - CV049
              - CV050
              - CV051
              - CV052
              - CV053
              - CV054
      - number: '8.6'
        title: Thesis-Break Criteria, Exit Readiness, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Five thesis-break triggers would cause immediate re-evaluation or exit from any Pennylane position. First:
              e-invoicing mandate delayed by more than 12 months past September 2026, removing the primary near-term
              adoption catalyst and lengthening the payback horizon by 18–24 months. Second: a major incumbent (Cegid or
              Sage) achieving PDP/OD regulatory certification for the e-invoicing mandate before Pennylane, removing the
              first-mover advantage. Third: disclosed evidence of burn rate indicating runway below 12 months without a
              new raise, signalling capital crisis. Fourth: ARR growth slowing below 25% CAGR on any independently
              reported data, suggesting market saturation or competitive displacement earlier than expected. Fifth: a
              down-round financing event below €3.6B post-money, signalling VC conviction failure.

              Exit readiness assessment: Pennylane is approximately 3–5 years from IPO readiness on Euronext Paris or
              Amsterdam. The company requires €400–500M ARR, a visible path to profitability, and international revenue
              contribution before a sustainable public listing. More likely nearer-term exit paths are: strategic
              acquisition by Sage, Visma, MYOB/KKR, or a large French financial software group at €4–8B (approximately
              15% probability); secondary transaction or GP-led continuation fund providing partial liquidity; or a
              post-mandate IPO if ARR exceeds €300M by 2028. The final diligence asks before any incremental commitment
              focus on the six most critical unknown variables: actual ARR with quarterly cadence, gross margin by
              product line, burn rate and runway duration post-Series E, e-invoicing PDP/OD certification status and
              competitive pipeline, customer churn rate by segment, and any governance provisions in the Series E that
              affect future financing flexibility.
            claimRefs:
