      - number: '6.3'
        title: Customer Satisfaction and NPS Signals
        blocks:
          - type: paragraph
            body: >-
              Pennylane displays two mobile application ratings on its homepage: 4.7/5 and 4.5/5, which are consistent
              with Apple App Store and Google Play ratings respectively for a well-regarded consumer-grade app. The
              specific rating counts (number of reviews) are not displayed alongside the scores, so statistical weight
              is unknown. Independently, AppVizer — a French B2B software review aggregator — carries Pennylane reviews
              with an editorial headline stating "Grâce à Pennylane, il n'a jamais été aussi simple de gérer son
              entreprise" (roughly: "Thanks to Pennylane, it has never been so simple to manage your company"). This
              editorial sentiment is confirming but not a quantified satisfaction score. [CU006] [CU007] [CU013]

              Capterra France (capterra.fr) and G2 both list Pennylane as a reviewed product in their accounting
              software categories, with user-generated ratings accessible on their platforms. Trustpilot
              (trustpilot.com) also carries reviews for pennylane.com, though an independent fetch of the Trustpilot
              page was unsuccessful at time of research. These third-party review platforms collectively confirm that
              Pennylane has sufficient user adoption to generate organic community review coverage across multiple
              channels, a proxy indicator of market penetration that competitors with lower user counts would not
              achieve. [CU014] [CU015]

              Adverse satisfaction signals exist and should not be dismissed. AppVizer user reviews include reports of
              difficulties with customer support response times and a notable learning curve during onboarding. G2
              reviews carry mixed feedback on support quality alongside positive usability comments. These signals are
              consistent with a fast-growing SaaS company that has scaled to over 1 million users faster than its
              support and customer success infrastructure has matured. A recurring theme is that accounting software
              onboarding is inherently friction-heavy — requiring full data migration, bank account connection, and
              accountant invitation — which creates disproportionate early-stage dissatisfaction even among users who
              ultimately derive high value from the platform. No formal NPS disclosure has been made by Pennylane; NPS
              must be treated as a material diligence gap. [CU031] [CU032]
