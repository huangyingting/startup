  headline: >-
    Pennylane is the category leader in French cloud accounting with a defensible dual-channel model and a regulatory
    tailwind, but the €3.6B valuation at centaur ARR implies a 30-35x revenue multiple that demands sustained 40%+
    growth and successful international expansion.
