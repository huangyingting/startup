    - id: CP001
      statement: >-
        Pennylane is a cloud-native all-in-one financial management platform for French SMBs
        and accounting firms, holding DGFiP PDP certification for the September 2026
        e-invoicing mandate, 300+ integrations, and ISO 27001 security certification.
      type: observed
      topic: competitive-positioning
