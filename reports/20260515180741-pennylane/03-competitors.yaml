callouts:
  - calloutType: strength
    title: "PDP Certification as First-Mover Compliance Advantage"
    body: >-
      Pennylane's DGFiP-certified PDP status is the most durable near-term competitive
      moat in the French SMB accounting market. The September 2026 e-invoicing mandate makes
      PDP compliance a legal necessity for any platform processing French B2B invoices — not
      a feature choice. While Sage and Cegid are both pursuing PDP certification, the timeline
      gap matters: each quarter of PDP lead time allows Pennylane to convert accounting firms
      and their client books before legacy alternatives achieve compliance. Because the
      accountant network effect compounds (each converted firm brings its full client
      portfolio), the first-mover advantage in PDP-compliant accounting is multiplicative,
      not additive. A 6–12 month lead translates into a 1–2 cohort advantage that may
      take Sage 3–5 years to fully erode.
    claimRefs:
      - CP031
      - CP032
      - CP033
      - CP034
      - CP039

  - calloutType: risk
    title: "Sage's Installed Base: The 2-Million-Customer Threat"
    body: >-
      Sage's 2 million+ French customer installed base is the single largest competitive
      risk to Pennylane's growth trajectory. If Sage successfully delivers a cloud product
      (Sage Active) with PDP compliance and native accountant collaboration at feature
      parity, it can offer existing customers a "compliant upgrade" rather than a "platform
      migration." French SMB owners and accounting professionals are risk-averse about
      switching their compliance-critical tools; Sage can exploit this inertia to retain
      its base even if Pennylane's product is technically superior. The critical unknown
      is whether Sage Active can achieve PDP certification and accountant-collaboration
      depth before the September 2026 mandate creates a forced re-evaluation moment for
      every SMB and accounting firm in France.
    claimRefs:
      - CP009
      - CP011
      - CP012
      - CP039
      - CP040

