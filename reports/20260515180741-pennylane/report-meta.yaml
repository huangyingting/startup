appendices:
  - id: A
    title: Funding History Timeline
    blocks:
      - type: paragraph
        body: >-
          Pennylane has raised approximately €410M across five institutional rounds
          since founding in 2020, with each round accompanied by a substantial
          valuation step-up: 2021 (€30M in two tranches), January 2022 (€50M
          Series B, Sequoia lead), October 2024 (€80M Series C, €1B valuation),
          April 2025 (€75M, €2B valuation), January 2026 (€175M Series D, TCV
          lead, €3.6B valuation). The compounding step-up of 3.6× from October
          2024 to January 2026 is aggressive relative to disclosed ARR growth.
        claimRefs: [CI001, CI002, CI003, CI004]
  - id: B
    title: Competitive Positioning Summary
    blocks:
      - type: paragraph
        body: >-
          Pennylane's primary direct competitors are Sage (Sage Active, Sage 50,
          ~2M French users), Cegid (mid-market accounting software), and Indy
          (micro-business self-serve). QuickBooks France's exit in early 2023
          removed one major competitor and created an estimated 100,000-user
          migration opportunity. The broader TAM includes legacy desktop accounting
          tools (EBP, Quadratus) that represent the long-term churn pool for cloud
          migration, estimated at 3-4 million French SMBs not yet on cloud
          accounting. Pennylane's dual-channel model (direct SMB + accountant-led)
          is structurally superior to single-channel competitors.
        claimRefs: [CO001, CO003]

