  - id: scenarios-and-sensitivity-analysis
    title: Scenarios and Sensitivity Analysis
    body: >-
      Three scenarios bracket the Pennylane investment from the current €3.6B post-money entry.
      Bull case (€8–12B exit, 25% probability): the French mandatory e-invoicing reform drives an
      accelerated adoption wave, with Pennylane adding 2,000–3,000 accounting firms and 300,000–
      500,000 new SMB accounts through 2026–2027. ARR reaches €300M+ by 2028 driven by volume and
      per-user monetisation increases. The Compte Pro banking product contributes €30–50M incremental
      ARR by 2028. Pennylane successfully internationalises to at least one additional European
      market, adding a platform-premium growth vector. IPO or strategic exit at 25–30x forward ARR
      implies €8–12B enterprise value. Key enabling conditions: mandate executes on September 2026
      schedule, gross margin sustains at or above 70%, and CAC remains disciplined via the
      accountant channel.

      Base case (€5–8B exit, 50% probability): ARR compounds at approximately 35% CAGR from
      €100M (December 2025) to €200M by 2027 and €270M by 2028. E-invoicing mandate drives
      moderate incremental adoption but also intensifies competition from Cegid, Sage, and
      international SaaS entrants. Pennylane maintains its accounting firm channel leadership but
      faces pricing pressure in the SMB segment. IPO in 2029–2030 at 18–22x forward ARR implies
      €7–9B enterprise value; or strategic acquisition by a tier-1 financial software company (Sage,
      Visma, MYOB/KKR) at a 20–30% premium. Base-case return from current €3.6B: approximately
      2–2.5x in 5–7 years (approximately 15–20% IRR).

      Bear case (down-round or distressed outcome, 25% probability): the e-invoicing mandate faces
      delay past 2027, reducing adoption urgency and extending the loss-making period. Incumbent
      SaaS players (Cegid, Sage) build mandate-compliant products faster than expected, eroding
      Pennylane's first-mover advantage. Capital intensity proves unsustainable: the €175M Series E
      runway is consumed before profitable growth is achieved, requiring a down-round at flat or
      below the current €3.6B. Distressed scenario most likely outcome: acqui-hire or strategic
      sale at €1–2B, approximately 50–70% below the current entry. The probability-weighted
      expected exit: (25% × €10B) + (50% × €6.5B) + (25% × €1.75B) = €6.19B, implying
      approximately 1.7x expected return from the €3.6B entry.
