  - id: comparable-valuation-set
    title: Comparable Valuation Set
    body: >-
      The comparable valuation set for Pennylane spans three categories: public European accounting
      SaaS platforms (Xero, Sage), private European SMB SaaS and strategic acquirers (Visma Group,
      Cegid), and strategic M&A reference transactions (Visma/Holded). The most directly relevant
      public comparables are Xero (NZX/ASX: XRO, 4.2M subscribers, NZ$1.9B FY2025 revenue,
      approximately NZ$18B market cap = ~7x ARR) and Sage (LSE: SGE, £2.25B FY2024 revenue,
      ~£12B market cap = ~5x revenue). Both trade at 5–7x trailing revenue/ARR, a substantial
      discount to Pennylane's 36x ARR multiple at the January 2026 valuation. The private-market
      premium is partially justified by Pennylane's superior growth rate (~70–100% ARR CAGR versus
      Xero's ~15% and Sage's ~8%), but the gap remains extreme by historical SaaS valuation
      standards.

      For private-market context: the BVP State of the Cloud 2024 report documents that median ARR
      multiples for growth-stage cloud companies normalised to 8–12x ARR in 2024, down from 30–50x
      peak in 2021. Pennylane's 36x ARR multiple is at the high end of the current market,
      consistent with top-decile European SaaS at the mandate-catalyst inflection point. The Visma
      Group/Holded acquisition in 2024 (Spain-based SMB accounting SaaS) at an estimated €100–150M
      (approximately 5–8x ARR) provides a strategic M&A reference — well below Pennylane's current
      multiple, suggesting strategic acquirers would need to apply a significant growth-rate premium.
      Dealroom and PitchBook confirm the €3.6B valuation and funding history but do not provide
      independently verified ARR, confirming that the 36x multiple rests on self-reported and
      press-inferred ARR of approximately €100M.
