  evidenceGaps:
    - id: pennylane-arr-not-independently-audited
      title: Pennylane ARR of Approximately €100M Is Self-Reported and Not Independently Audited
      type: private-evidence-only
      severity: material
      topic: arr-verification
      missingEvidence: >-
        The approximately €100M ARR centaur-status figure was first disclosed in December 2025 via
        Maddyness press coverage and reiterated in the January 2026 Series E announcement; no
        independent audit, public financial filing, or third-party verification of this ARR figure
        exists; the 36x ARR multiple rests entirely on an unverified revenue estimate.
      whyItMatters: >-
        If actual ARR is €70–80M rather than €100M, the implied multiple at the €3.6B entry increases
        to 45–51x, making the investment significantly less attractive; if ARR is €120–130M, the
        multiple is 28–30x, more consistent with the BVP top-decile range.
      diligencePath: >-
        Request ARR by quarter with contracted, recognised, and deferred revenue breakdowns in data
        room; validate against bank statements or deferred revenue balance sheet; cross-check with
        GetLatka, Dealroom, and PitchBook subscriber databases for triangulation.
      relatedQuestionRefs:
        - QV002

    - id: gross-margin-and-unit-economics-unknown
      title: Gross Margin, Burn Rate, and Unit Economics Are Entirely Undisclosed
      type: private-evidence-only
      severity: material
      topic: financial-fundamentals
      missingEvidence: >-
        Pennylane does not publicly disclose gross margin by product line, blended operating margins,
        burn rate, CAC, LTV, or payback period; all financial sustainability claims are inferred from
        funding trajectory and headcount estimates rather than actual P&L data.
      whyItMatters: >-
        A gross margin below 60% (possible if the Compte Pro banking product has significant payment
        processing costs) would fundamentally change the scalability thesis; high burn rate could
        indicate runway of 18–24 months rather than 3+ years assumed, materially increasing down-round
        risk.
      diligencePath: >-
        CFO data room request for P&L and unit economics dashboard; compare gross margin to Xero (~80%)
        and Sage (~70%) as accounting SaaS benchmarks; request cohort LTV/CAC analysis by channel
        (direct, accounting-firm-referred, enterprise).
      relatedQuestionRefs:
        - QV023

    - id: series-e-governance-terms-undisclosed
      title: Series E Governance Terms and Liquidation Preferences Not Publicly Available
      type: private-evidence-only
      severity: material
      topic: governance-terms
      missingEvidence: >-
        The full terms of the January 2026 Series E (liquidation preference, anti-dilution provisions,
        IPO ratchet, participating preferred vs non-participating, change-of-control, and governance
        rights) are not publicly disclosed; TCV-led growth rounds typically include investor-protective
        provisions that can significantly affect common shareholder returns in downside scenarios.
      whyItMatters: >-
        Full-ratchet anti-dilution provisions triggered in a down-round scenario could severely dilute
        common shareholders; IPO ratchet provisions could require higher IPO pricing to satisfy preferred
        return targets, reducing secondary market float and common equity value.
      diligencePath: >-
        Request full term sheet and shareholder agreement in legal data room; model liquidation waterfall
        under bear, base, and bull exit scenarios at different valuations; assess impact on founders and
        common equity holders.
      relatedQuestionRefs:
        - QV026

    - id: comparable-valuation-table-partial-coverage
      title: Comparable Valuation Table Uses Estimated Private Company Metrics Not Independently Audited
      type: private-evidence-only
      severity: minor
      topic: comparable-valuation-data-gaps
      missingEvidence: >-
        Cegid revenue of approximately €600M+ and Visma revenue of approximately €2B+ are based on
        third-party database estimates and press reports, not audited financials; Holded ARR at the
        Visma acquisition is an estimate, not a publicly confirmed figure; these limitations affect
        the precision of the comparable multiple analysis.
      whyItMatters: >-
        Unaudited private-company comparables may overstate or understate true ARR multiples if revenue
        definitions differ; the comparable set's partial coverage means the 36x multiple comparison is
        directionally valid but not precisely calibrated.
      diligencePath: >-
        Request Cegid ARR confirmation from channel partners or secondary research firms; verify Holded
        ARR at acquisition from Visma investor disclosures; build sensitivity around private comp
        multiples in the ±30% range.
      relatedTableRefs:
        - TV004
      relatedQuestionRefs:
        - QV011

    - id: mandate-adoption-rate-unquantified
      title: French E-Invoicing Mandate Adoption Rate and Pennylane Market Share Not Independently Verified
      type: missing-source
      severity: material
      topic: mandate-adoption-quantification
      missingEvidence: >-
        No public source provides an independent estimate of the number of SMBs or accounting firms
        that will use Pennylane's platform specifically for e-invoicing compliance; all mandate ARR
        opportunity estimates are author-constructed from total SMB population and assumed penetration
        rates, not verified by analyst reports or government projections.
      whyItMatters: >-
        The bull case depends critically on Pennylane capturing a meaningful share of the mandate-driven
        adoption wave; if competing platforms (Cegid, Sage, Evoliz) capture 80%+ of the mandate-driven
        volume, the incremental ARR contribution falls below the bull-case assumptions.
      diligencePath: >-
        Monitor DGFIP certification registry for competing PDP operators; track accounting firm
        adoption surveys from professional bodies (Conseil Supérieur de l'Ordre des Experts-Comptables);
        request Pennylane management projection of mandate-wave ARR contribution for 2026–2027.
      relatedQuestionRefs:
        - QV020

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      Multiple sources in this chapter are either broken (Sifted and Maddyness article URLs returning
      404 due to URL restructuring) or behind paywalls (Financial Times, Dealroom, PitchBook, GetLatka).
      All material factual claims — round amounts, valuations, investor names, centaur milestone, and
      comparable multiples — are confirmed via OK-status sources: Les Echos primary articles (SV009,
      SV010), Sifted search aggregator (SV001), Maddyness search aggregator (SV018), Bloomberg (SV017),
      Crunchbase (SV012), Sequoia portfolio page (SV013), TCV portfolio page (SV022), Xero IR (SV020),
      Sage IR (SV021), BVP State of the Cloud (SV023), and Visma press release (SV027). The broken-URL
      and paywall sources are cited for provenance and URL traceability; the adverse FT source (SV026)
      is cited despite paywall to document that credible media has raised valuation-stretch concerns.
      Source access limitations reflect the structural barrier of French financial media and institutional
      data providers, not an absence of verification.
