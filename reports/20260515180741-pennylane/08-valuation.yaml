        - 36x ARR exceeds public SaaS comps by 5–7x; multiple compression at exit will materially reduce IRR
      - - Competition
        - No direct French competitor at scale; incumbents (Sage, Cegid) are slower SaaS movers; Sequoia and TCV backing signals competitive moat
        - Intuit, Xero international expansion; Cegid SaaS acceleration; international VCs funding French challengers

