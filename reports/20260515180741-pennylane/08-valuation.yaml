  - id: financing-history-and-entry-valuation-context
    title: Financing History and Entry Valuation Context
    body: >-
      Pennylane has executed six disclosed funding rounds from 2021 through January 2026, totalling
      approximately €410M in primary capital raised. The October 2024 Series C of €80M at €1B
      valuation was led by Sequoia Capital — Pennylane's first tier-1 global VC participation —
      establishing the unicorn anchor. Six months later, in April 2025, Pennylane raised €75M at
      €2B, a 100% step-up in approximately 180 days. The January 2026 Series E of €175M at €3.6B,
      led by TCV with Sequoia and Partech co-investing, represented an 80% step-up from April 2025
      and confirmed centaur status (approximately €100M ARR) simultaneously disclosed via Maddyness
      in December 2025.

      The speed of valuation escalation from €1B (October 2024) to €3.6B (January 2026) in
      15 months is exceptional even by European VC standards, reflecting both the e-invoicing
      mandate narrative and intense competition among tier-1 VCs for access to the leading French
      B2B SaaS company. Each round's price step-up was driven primarily by forward-looking growth
      expectations rather than trailing financial performance, as Pennylane does not publicly
      disclose revenue, margins, or profitability. The entry valuation context for any current
      investor is therefore the €3.6B post-money anchor from January 2026. Upside requires an exit
      at materially higher valuation — implying Pennylane must scale ARR to at least €300–500M to
      justify a €5–10B exit at reasonable public SaaS multiples of 15–20x. TCV's track record with
      Airbnb, Spotify, and Nubank provides an important credibility signal for the platform-scale
      ambition, and Partech's continued participation from early rounds signals sustained conviction
      from the leading French VC.
