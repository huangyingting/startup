  - id: thesis-break-criteria-exit-readiness-and-final-diligence-asks
    title: Thesis-Break Criteria, Exit Readiness, and Final Diligence Asks
    body: >-
      Five thesis-break triggers would cause immediate re-evaluation or exit from any Pennylane
      position. First: e-invoicing mandate delayed by more than 12 months past September 2026,
      removing the primary near-term adoption catalyst and lengthening the payback horizon by
      18–24 months. Second: a major incumbent (Cegid or Sage) achieving PDP/OD regulatory
      certification for the e-invoicing mandate before Pennylane, removing the first-mover
      advantage. Third: disclosed evidence of burn rate indicating runway below 12 months without
      a new raise, signalling capital crisis. Fourth: ARR growth slowing below 25% CAGR on any
      independently reported data, suggesting market saturation or competitive displacement earlier
      than expected. Fifth: a down-round financing event below €3.6B post-money, signalling VC
      conviction failure.

      Exit readiness assessment: Pennylane is approximately 3–5 years from IPO readiness on
      Euronext Paris or Amsterdam. The company requires €400–500M ARR, a visible path to
      profitability, and international revenue contribution before a sustainable public listing.
      More likely nearer-term exit paths are: strategic acquisition by Sage, Visma, MYOB/KKR, or
      a large French financial software group at €4–8B (approximately 15% probability); secondary
      transaction or GP-led continuation fund providing partial liquidity; or a post-mandate IPO
      if ARR exceeds €300M by 2028. The final diligence asks before any incremental commitment
      focus on the six most critical unknown variables: actual ARR with quarterly cadence, gross
      margin by product line, burn rate and runway duration post-Series E, e-invoicing PDP/OD
      certification status and competitive pipeline, customer churn rate by segment, and any
      governance provisions in the Series E that affect future financing flexibility.
