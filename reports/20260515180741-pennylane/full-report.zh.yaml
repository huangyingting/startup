      - number: '2.3'
        title: 买方与市场细分
        blocks:
          - type: paragraph
            body: >-
              Pennylane 处在双边市场：一边是会计师事务所（cabinets d'expertise comptable），另一边是 SMB。法国约有 24,000
              家注册会计事务所，它们共同构成会计软件的主导分销渠道。Pennylane 在六年内拿下其中约 6,000+ 家，约占市场 25%，使会计师成为 SMB 订阅的主要经济买方和推荐方。这个结构意味着 SMB
              终端用户往往由自己的会计师影响或直接导入，获客成本显著低于直接 B2SMB 触达。

              在 SMB 细分中，Pennylane 产品最适合 1–249 名员工、需要专业级会计的正式商业实体（SARL、SAS、SA）。微型企业（auto-entrepreneurs）细分由 Indy 竞争；Indy
              提供免费的专业会计账户，并积累了 13,000+ 条用户评论。更大的 SME（ETI，250+ 名员工）属于增购空间，Cegid
              在中大型会计事务所中拥有强势存量位置。地域上，法国主导当前收入；德国市场（Steuerberatung
              细分）仍处早期扩张。行业组合基本是通用型，但在专业服务、零售和酒店餐饮等最看重现金流监控工具的行业有明显集中。
