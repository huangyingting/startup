      - number: '3.7'
        title: 图表与证据
        blocks:
          - type: callout
            title: PDP 认证构成先发合规优势
            body: >-
              Pennylane 的 DGFiP 认证 PDP 资质，是法国 SMB 会计市场中最持久的近期竞争护城河。2026 年 9 月电子发票强制令让 PDP 合规成为任何处理法国 B2B
              发票的平台的法律必要条件，而不是功能选择。虽然 Sage 和 Cegid 都在推进 PDP 认证，但时间差很重要：每提前一个季度取得 PDP 领先，Pennylane
              就能在传统替代方案合规前转化更多会计事务所及其客户簿。由于会计师网络效应会复利（每家转化事务所都会带来完整客户组合），PDP 合规会计的先发优势是乘法，不是加法。6–12 个月领先可转化为 1–2
              个队列优势，Sage 可能需要 3–5 年才能完全侵蚀。
            calloutType: strength
