      - number: '6.2'
        title: 具名客户证明和使用场景
        blocks:
          - type: paragraph
            body: >-
              Pennylane 的客户证言页面（pennylane.com/fr/temoignages，研究时返回 404）和 DAFtech 2026 活动材料，提供了跨多个行业的具名客户证明。最突出的具名客户包括
              Yuka（知名法国食品透明度应用）、happn（总部在巴黎、拥有数百万全球用户的基于位置的交友应用）、Gens de confiance（精选 P2P 度假租赁平台）、Lunettes pour
              tous（眼镜零售连锁）、Fleet（面向 SMB 的车队管理 SaaS）、Offishall（职场体验 SaaS）、Caval（DTC 运动鞋品牌）、Nouvelle Garde（时尚零售公司）和
              Klox。这些都是有识别度的法国 SME 和成长期品牌，覆盖消费科技、零售、SaaS 和服务业，说明采用面横跨多个行业，而不是集中在单一垂直。[CU008] [CU027]

              Pennylane 网站和 DAFtech 2026 材料引用的客户证言，提供使用场景背景和具名背书。Offishall CEO Audrey Barbier-Litvak 为 Pennylane
              的企业管理能力提供具名 CEO 背书。Fleet VP Finance Martin Leveau 被列为具名财务负责人背书。ADRESSE（地产和服务业务）联合创始人 Alexandra Mulliez
              的证言代表房地产服务垂直。Nicolas Roux（CFO）和 Charles Bonnevie（业务拓展）也作为 Pennylane 客户档案中的具名联系人出现。Pennylane
              的核心客户价值主张——「把花在会计上的时间缩短到三分之一」——是营销中最主要的结果主张，归因于自动银行对账和 AI 辅助记账功能。DAFtech 2026 是 Pennylane 面向 CFO
              和财务总监举办的活动，显示公司已进入中端市场财务职能，而不只是基础 SMB 使用场景。[CU009] [CU010] [CU011] [CU012] [CU023]

              具名客户证据质量需要校准：这些是营销证言，不是带有量化结果指标且经独立验证的案例研究。具名客户没有披露 ARR 贡献、合同期限、部署范围或前后对比数据，限制了分析价值。即便如此，可识别品牌名称的存在——尤其是
              Yuka，它是法国下载量最高的消费应用之一，品牌认知度高——让证言信号强于典型 SMB 营销材料。独立验证所有具名客户的生产部署状态，仍是剩余尽调步骤。
