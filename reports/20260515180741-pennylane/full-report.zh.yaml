      - number: '3.6'
        title: 竞争威胁、风险与胜败单动态
        blocks:
          - type: paragraph
            body: >-
              Pennylane 面临的最实质竞争威胁，是 Sage 加速转云。Sage Active 是 Sage 对云挑战者的战略回应，但更深的威胁来自 Sage 的 2 million+ 法国客户安装基础。如果 Sage
              成功交付一款具备 PDP 合规和原生会计师协作功能的云产品——即便只是功能平价而非更优——它也能利用品牌信任、定价灵活性和既有客户关系，放慢 Pennylane 的市场渗透。2026 年电子发票强制令让包括
              Sage 在内的所有供应商都必须尽快交付合规云产品。Pennylane 在云原生合规上的先发优势窗口估计只有 12–24 个月，之后 Sage Active 可能补上功能差距。 [CP039] [CP040]

              Pennylane 的胜单模式集中在：（1）从传统 Sage 或 Cegid 桌面 / 服务器安装迁出的会计事务所——会计师正主动寻找能降低客户管理负担的云原生工具；（2）QuickBooks France
              2024 年退出后转移的 SMB，对它们而言，Pennylane 是天然的云端合规接替者；（3）新设企业——auto-entrepreneurs 和新注册公司没有传统软件惯性，会从 Day 1 起按会计师推荐采用
              Pennylane。败单模式集中在：（1）与 Cegid 深度集成的大型会计事务所，它们需要 Pennylane 当前产品尚未完全支持的多实体合并和审计级报告；（2）微型企业，Indy
              的免费模式形成有力价格论点；（3）寻求完整 ERP 级能力的大型企业，Pennylane 聚焦 SMB 的产品无法匹配。 [CP041] [CP042] [CP043]

              多归属风险存在但有限。理论上，SMB 可以同时使用 Pennylane 和 Sage（例如用 Sage 做薪资，用 Pennylane 做开票），但 Pennylane
              实时会计架构产生的数据重力会让这种做法效率低下。管理多个客户的会计事务所如果让客户分散在不同平台，会面临越来越高的摩擦——把所有客户集中到 Pennylane 带来的效率收益，会形成全平台采用激励。只有当
              Pennylane 的会计功能无法扩展到更大客户，迫使会计事务所为大型委托维持双平台运营时，多归属风险才会实质化。 [CP044]
