  - id: FE004
    title: 会计师-SMB 实时协作工作流
    type: flow
    layout: wide
    summary: 分步骤展示 Pennylane 平台如何从财务事件捕获到合规输出，靠 SMB 与会计师之间的持续实时协作，消除传统月末批量会计周期。
    approximationNotes: 工作流步骤来自 Pennylane 产品页面、expert-comptable 页面和集成市场描述。步骤顺序由分析师根据可观察平台能力推导；Pennylane 未发布正式流程图。
    claimRefs:
      - CE009
      - CE010
      - CE027
      - CE031
      - CE042
    data:
      nodes:
        - id: s1
          label: SMB 财务事件
          detail: SMB 创建发票、用 Mastercard 卡记录费用、处理供应商发票 PDF，或通过 Compte Pro 触发银行交易 —— 全部在 Pennylane 应用或移动端完成
          type: input
        - id: s2
          label: AI 自动处理
          detail: 平台立即应用 ML 交易分类（从描述、金额、交易对手分配会计类别）、AI 文档抽取（从 PDF 抽取供应商名称、金额、日期、VAT）和智能规则，无需人工触发
          type: process
        - id: s3
          label: 实时总账更新
          detail: 处理后的交易直接入账到共享会计总账，带有正确类别、交易对手和金额 —— 没有月末批量上传、文件导出，也无需会计师手工重录
          type: process
        - id: s4
          label: 会计师实时复核
          detail: 会计师从多客户组合工作区访问实时总账；实时看到 SMB 当前余额、未分类项目和未收发票；无需等待客户文件包即可复核、调整类别或标记问题
          type: review
        - id: s5
          label: 复核与关账
          detail: 会计师直接在共享工作区完成银行对账和复核关账；按需生成 DGFiP 合规格式的 FEC（Fichier des Écritures Comptables），用于税务审计准备
          type: process
        - id: s6
          label: 合规输出
          detail: >-
            平台通过直接 EDI 向 DGFiP 传输 TVA 申报和 liasse fiscale；电子发票通过 PDP 中继路由至 DGFiP 的 Portail Public de Facturation（PPF），以满足
            2026 年 9 月强制要求；FEC 归档备审
          type: output
      edges:
        - from: s1
          to: s2
          label: 事件捕获后自动触发
        - from: s2
          to: s3
          label: 分类分录入账到总账
        - from: s3
          to: s4
          label: 会计师实时看到更新
        - from: s4
          to: s5
          label: 会计师发起复核
        - from: s5
          to: s6
          label: 生成合规输出
  - id: FU001
    type: journey-map
    title: 客户旅程图
    subtitle: Pennylane SMB 和会计师客户从发现到留存的旅程
    approximationNotes: >-
      旅程阶段由 Pennylane 官方产品页面（pennylane.com/fr、expert-comptable、tarifs）、DAFtech 2026 活动内容、AppVizer
      编辑评论，以及平台双边模型的结构性分析重建。Pennylane 未披露各阶段之间的具体转化率，图中也不表示转化率；地图仅反映定性阶段顺序。经会计师进入的 SMB 路径和直接 SMB 路径被视为并行旅程，而非顺序替代。
    claimRefs:
      - CU016
      - CU028
      - CU039
      - CU037
      - CU038
    data:
      items:
        - id: jm-awareness-direct
          label: 认知（直接）
          actor: SMB 业主 / DAF / 自由职业者
          description: >-
            通过 SEO 搜索（"logiciel comptabilité France"）、内容营销（pennylane.com/fr/blog）、产品广告或同行 SMB 口碑发现
            Pennylane。也可能通过应用商店发现（4.7/5 和 4.5/5 评分）。
          channels:
            - Google/SEO（法语会计查询）
            - 内容营销和博客
            - App Store / Google Play
            - 社交媒体
        - id: jm-awareness-accountant
          label: 认知（会计师主导）
          actor: SMB 业主 — 由会计事务所推荐
          description: 会计师（Pennylane 上 6,000+ 之一）主动向其 SMB 客户推荐 Pennylane，客户按会计师指引注册。这是大多数 SMB 客户的主要获客路径。
          channels:
            - 会计事务所推荐
            - 会计事务所大会 / 行业活动
            - DAFtech 活动（中端市场 DAF/CFO 客群）
        - id: jm-trial
          label: 注册与试用
          actor: SMB 业主 / 自由职业者
          description: SMB 注册免费试用或付费套餐。从基础开票设置开始。部分 SMB 直接注册；由会计师推荐的 SMB 意图更强且有会计师指导，试用到付费转化周期更短。
          channels:
            - pennylane.com/fr 直接注册
            - 会计师提供的上手链接
        - id: jm-activation
          label: 激活（银行 + 会计师）
          actor: SMB 业主 + 会计事务所
          description: 三步激活：（1）连接企业银行账户（自动导入交易）；（2）配置开票模板；（3）邀请会计事务所进入共享平台。完整激活是关键留存里程碑 —— 会计师一旦连接，双边锁定成立，价值实现完整交付。
          channels:
            - 产品内上手流程
            - 会计师邀请邮件
            - 银行 API 连接（开放银行）
        - id: jm-expansion
          label: 扩张（加购与加深）
          actor: SMB 业主 / DAF
          description: >-
            客户从基础开票扩展到完整会计，再到资金管理、费用管理或 Compte Pro 企业银行账户（30,000+ 订阅者）。DAF 和 PME CFO 可能直接进入 Premium 层级。2026 年 9
            月截止期临近时，电子发票合规（PDP 强制要求）会加深使用。
          channels:
            - 产品内加购提示
            - 面向 DAF/CFO 升级的 DAFtech 活动
            - 电子发票强制要求合规压力
        - id: jm-retention
          label: 长期留存
          actor: SMB 业主 + 会计事务所（双边）
          description: >-
            留存由三个结构性锚点驱动：（1）累积会计数据制造迁移成本，且随使用年限增长；（2）双边会计师锁定意味着切换需要会计事务所迁移其全部客户账本；（3）从 2026 年 9 月起，PDP
            强制要求合规成为额外切换壁垒。具名客户（Yuka、happn、Fleet、Offishall）代表留存结果。
          channels:
            - 会计数据深度（自动化月度关账）
            - 会计师共同依赖
            - PDP 合规电子发票集成
