      - number: '1.3'
        title: 融资历史、估值与主要投资者
        blocks:
          - type: paragraph
            body: >-
              Pennylane 自 2020 年创立以来已获得超过 €410M 新股融资，2024 年 10 月以 €1B 估值成为独角兽，2025 年 4 月翻倍至 €2B，2026 年 1 月又升至
              €3.6B。这条融资曲线是欧洲金融科技史上最快之一：从创立到估值 €3.6B 不到六年。

              2021 年，Pennylane 完成两轮融资合计约 €30M（每轮约 €15M），建立起最初的机构投资者基础。2022 年 1 月，Maddyness 报道公司融资 €50M。2024 年 10 月
              Series C 融资 €80M，估值 €1B，由 Sequoia Capital（通过合伙人 Luciana Lixandru）领投，确认 Pennylane 成为当时法国最新的独角兽。2025 年 4
              月，Pennylane 以 €2B 估值融资 €75M，六个月内估值翻倍。2026 年 1 月，公司以 €3.6B 估值融资 €175M，美国成长股权基金 TCV 首次进入股权结构表，既有投资者继续参与。
              [CO016] [CO017] [CO018] [CO019] [CO020]

              主要投资者包括 Sequoia Capital（领投 €1B 估值的 Series C；合伙人 Luciana Lixandru 负责该投资）、Partech（长期布局欧洲金融科技的 VC
              和早期支持者）、Global Founders Capital（GFC，早期投资者），以及 TCV（美国成长股权基金，在 2026 年 1 月进入）。这种投资者组合——顶级美国
              VC（Sequoia）、欧洲领先金融科技专门基金（Partech）和美国成长股权基金（TCV）——与 Revolut、Klarna 等欧洲金融科技品类龙头的股权结构相似。 [CO021] [CO022]
