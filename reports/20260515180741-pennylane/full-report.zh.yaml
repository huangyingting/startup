          - type: callout
            title: Sage 的安装基础：2 million 客户威胁
            body: >-
              Sage 的 2 million+ 法国客户安装基础，是 Pennylane 增长轨迹面临的最大单一竞争风险。如果 Sage 成功交付带 PDP 合规和原生会计师协作、达到功能平价的云产品（Sage
              Active），它可以向既有客户提供「合规升级」，而不是「平台迁移」。法国 SMB 业主和会计专业人士在切换合规关键工具时风险偏好很低；即便 Pennylane 产品在技术上更优，Sage
              也能利用这种惯性留住客户基础。关键未知数在于，Sage Active 能否在 2026 年 9 月强制令让法国每家 SMB 和会计事务所被迫重新评估之前，取得 PDP 认证并做深会计师协作。
