      - number: '1.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: PDP 批准和电子发票强制令为 2026 年增长带来监管顺风
            body: >-
              Pennylane 获法国税务机关（DGFiP）批准成为 Plateforme de Dématérialisation Partenaire（PDP），使其成为 2026 年 9 月法国 Facturation
              Électronique 电子发票强制令的结构性受益者。不同于大多数软件竞争对手，PDP 资质是政府从有限获批名单中发放的认证，形成了有意义的进入壁垒。QuickBooks 同步退出法国市场（Intuit
              决定关闭 QuickBooks France，而不是投入 PDP 合规）移除了竞争格局中最知名的国际会计软件品牌之一，直接打开客户迁移机会。Pennylane 是少数同时提供 PDP 合规电子发票和完整 SMB
              会计的一体化平台之一。
            calloutType: strength
            claimRefs:
