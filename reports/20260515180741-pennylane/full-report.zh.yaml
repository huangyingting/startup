      - number: '1.4'
        title: 规模、客户与牵引力
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Pennylane 自称有超过 1,000,000 家企业客户使用平台，并有超过 6,000 家会计师事务所（cabinets d'expertise
              comptable）作为专业用户。这两个指标界定了 Pennylane 的双边市场位置：它在 SMB 侧（需要财务管理的企业）和专业侧（服务这些企业的会计师）都形成了有意义的规模。 [CO023] [CO024]

              公开 tarifs 页面显示，价格从 €14/月（Basique 方案：开票 + 采购管理）和 €24/月（Essentiel 方案：完整财务管理）起。Premium
              方案包含会计模块能力，但未公开显示价格。按席位计费的 SaaS 模式，加上企业银行账户和 Mastercard 卡产品，使每个客户可贡献多条收入线：软件订阅收入、银行卡交换费收入，以及可能来自持有存款的利息收入。
              [CO025] [CO026]

              Pennylane 集成页面列出的 300+ 个集成覆盖常用 SMB
              工具，包括电子商务（Shopify、WooCommerce）、支付（Stripe、PayPal）、薪资（Silae、Lucca）等类别。这个广度释放出平台策略信号：Pennylane 想成为 SMB
              的财务数据中枢，而不是单点产品。公司的 ISO 27001 认证和 RGPD 合规，是法国企业和受监管会计工作流看重的信任信号。 [CO027] [CO028]
            claimRefs:
