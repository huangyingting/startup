      - number: '7.2'
        title: 竞争风险
        blocks:
          - type: paragraph
            body: >-
              Sage 是结构上威胁最大的竞争对手，体现在三个维度：规模（2M+ 法国客户）、价格（Sage Active 约 EUR 12.50/月，低于 Pennylane 的 EUR 24 入门档）和渠道（Sage
              for Accountants 瞄准与 Pennylane 主要分发渠道相同的 expert-comptable 群体）。Sage 在法国的 2M+ 企业装机基础远大于 Pennylane 的 1M+
              SMB；如果 Sage 成功把其中哪怕 10–20% 迁移到云原生 Sage Active 产品，同时推进 PDP 认证，它不用新增一个客户也能缩小竞争差距。Sage FY2025 全球收入 GBP 2.2
              billion，足以支撑长期价格竞争；Pennylane 仍在烧钱，打持久消耗战时很难匹配。


              Cegid 的竞争威胁集中在中大型会计师事务所细分（10–50 人事务所）。如果 Cegid 为回应 Pennylane 的增长，把 Cegid Loop 协作产品向下延伸，就会直接争夺 Pennylane
              正在上探的中型会计师事务所市场。Cegid 的反击会在 Pennylane 需要放大平均合同金额的增长阶段，挤压其中端市场空间。


              AI 原生会计工具构成中期但战略上重要的威胁。大型语言模型已经越来越能自动处理发票、归类费用，并给出会计分录建议，不一定需要 Pennylane 已搭建的传统 SaaS 工作流基础设施。如果一家资金充足的 AI
              原生创业公司推出能替代 Pennylane 工作流的对话式会计产品，Pennylane 的实时协作护城河可能被侵蚀，却未必能换来对应的合规优势。Pennylane 正在投入 AI 功能，但竞争应对时间线仍不确定。


              Dext 的多平台策略带来间接但会累积的风险。Dext 同时集成 Sage、Xero 和 Pennylane，会训练会计师形成平台无关的工作流。把 Dext 用作文档采集层的会计师，在 Pennylane
              与竞争性会计后端之间切换成本更低，从而削弱 Pennylane 双边平台策略所依赖的会计师锁定效应。
