chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、商业模式与市场定位
        blocks:
          - type: paragraph
            body: >-
              Pennylane 于 2020 年由 Arthur
              Waller（CEO）和联合创始人在法国巴黎创立。公司做的是一体化云财务管理和会计平台，服务两个不同但相互连接的客户群：SMB（中小企业）和会计专业人士（experts-comptables）。Pennylane
              不做割裂的单点工具，而是把开票、采购管理、费用管理、资金管理、全套会计（grand-livre、FEC），以及带 Mastercard 品牌卡的原生企业银行账户整合到一个平台，让会计师和企业客户共享实时财务数据。
              [CO001] [CO002] [CO003]

              Pennylane 的核心价值主张，是消除 SMB 与会计师之间的信息不对称。Pennylane 出现之前，会计师通常要等客户在数周甚至数月后通过纸质单据或互不打通的导出文件传来数据。Pennylane
              把双方放到同一平台：会计师可以查看客户银行交易、分类费用、验证发票、结账，不必再等客户上传文件。这种「实时会计」模式，与 Cegid、Sage 等传统桌面软件结构上不同；后者主要面向会计专业人士，而不是 SMB
              与会计师双向协作的工作流。 [CO004] [CO005]

              平台支持 300+ 个第三方集成，包括支付处理、电子商务平台和薪资软件，覆盖 SMB 技术栈更多场景。Pennylane 拥有 ISO 27001 信息安全认证，并符合 RGPD（法国法下的 GDPR
              对应制度）。截至 2026
              年报告日期，公司总部位于法国巴黎，并已开始向德国扩张，面向会计师（Steuerberater）、电子发票（E-Rechnung）和集成（Integrationen）的德语产品页已经上线。 [CO006]
              [CO007] [CO008]
