      - number: '2.5'
        title: 监管与宏观环境
        blocks:
          - type: paragraph
            body: >-
              主导性监管催化剂是 DGFiP Facturation Électronique 改革。根据该法规，所有法国 B2B 交易必须通过认证平台（PDPs — Plateformes de
              Dématérialisation Partenaires）或政府自有清算中心（PPF — Portail Public de Facturation）处理。DGFiP 与一组精选认证 PDP
              启动试点，Pennylane 是获批参与者之一。所有公司从 2026 年 9 月开始承担接收义务；开具义务分阶段推进——大型企业先行，中型企业到 2027 年初，微型企业到 2027
              年末。这会形成多年合规浪潮。数字身份和 GDPR 合规是 PDP 认证的前置条件，构成显著进入壁垒，并保护 Pennylane 的获批地位。

              除电子发票外，监管背景还包括：GDPR（有利于法国注册平台的数据驻留预期）；France 2030 SMB 数字化投资计划（潜在共同投资补贴）；以及不断演进的 DSP2/PSD2 开放银行标准，支撑
              Pennylane 的银行连接功能。2026 年法国宏观环境喜忧参半——后疫情激增后 SMB 新设速度放缓，但监管合规刚性带来的软件支出不易受经济周期影响。德国监管背景（面向 B2G 交易的 e-Rechnung
              强制令已生效，B2B 义务正在讨论）与法国路径相似，也验证了 Pennylane 的欧洲扩张时点。
            claimRefs:
              - CM002
              - CM003
              - CM004
              - CM005
              - CM022
              - CM030
              - CM032
              - CM037
      - number: '2.6'
        title: 市场时点与战略窗口
        blocks:
          - type: paragraph
            body: >-
              2026 年 9 月电子发票接收义务形成明确的市场时间闸口：每家法国 B2B 公司都必须在此日期前部署 PDP 兼容软件方案，因此 2025–2026 年是云会计软件供应商的关键抢占窗口。Pennylane 的
              PDP 认证和会计师分销渠道，使其能直接受益于这波合规浪潮；会计事务所在为 SMB 客户建议平台选择时，会默认推荐自己已经在事务所内使用的方案。

              QuickBooks France 退出（2024 年）已经加速了入站需求；QuickBooks 约 30,000–50,000 名法国用户构成迁移池，考虑到 Pennylane 的法国监管合规和双语（法语 /
              英语）界面，它是位置最好的云原生替代者。德国提供第二个时间窗口：德国面向 B2G 发票的 e-Rechnung 强制令在 2025 年生效，Pennylane 的德国布局（由面向 Steuerberatung
              的网站版块确认）显示，公司有意在 DATEV、Lexware 等在位者完成客户基础云迁移之前，复制法国的会计师优先策略。合在一起，这些窗口说明 2026–2028 年是最佳扩张期，之后 Sage、Cegid 和
              DATEV 的竞争反应可能完全落地。TCV、Sequoia 等投资者已在逐轮更高估值上投入大量资本，押注这一时点判断。
