      - number: '3.2'
        title: 传统在位者——Sage 与 Cegid
        blocks:
          - type: paragraph
            body: >-
              Sage 是 Pennylane 在法国市场最重要的竞争对手。Sage 拥有 2 million+ 法国企业客户，自 1990s 起品牌就嵌入法国企业的会计和财务肌理，安装基础密度无人能比。其全球收入在
              FY2025 达到 £2.2 billion，法国是最大单一市场之一。面对云端冲击，Sage 推出 Sage Active，这是一款面向法国 SMB、价格约 €12.50/月起的云优先会计产品，并提供针对
              expert-comptable 细分的 “Sage for Accountants” 套件。Sage 的弱点在架构：传统代码库需要结构性重做，才能匹配 Pennylane 原生实时协作功能；其 GTM
              历史上也更侧重「会计师作为客户」，而不是 Pennylane 已经货币化的「会计师作为分销渠道」模式。Sage 正在为 2026 年电子发票强制令推进 PDP 认证路径。 [CP009] [CP010]
              [CP011] [CP012]

              Cegid 是大型法国会计事务所（10+ 名员工的 cabinets d'expertise comptable）和中端企业的主导会计软件供应商。其旗舰产品——面向会计专业人士的 Cegid Quadratus
              和协作会计产品 Cegid Loop——在市场高端细分站稳脚跟。Cegid 一直投入云转型，在传统服务器安装产品之外提供托管和 SaaS 选项。不过，Cegid 的企业重点、定价模型和 UX 复杂度，使其不适合
              Pennylane 最强的小型会计事务所和 TPE/微型企业细分。Cegid 也在为电子发票强制令推进 PDP 认证。来自 Cegid 的关键竞争风险在于，如果 Pennylane
              开始拿下中型会计事务所，Cegid 可能利用大型事务所关系向下扩张，引发 5–50 人会计事务所细分的正面竞争。 [CP013] [CP014] [CP015]
