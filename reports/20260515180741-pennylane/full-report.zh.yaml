      items:
        - label: 悲观退出（€200M ARR 上 8x）
          value: 1.6
          detail: ~€1.6B；增长不及预期；倍数压缩至上市公司底部；相对 €3.6B 进入估值为负回报
        - label: 悲观中位（€200M ARR 上 10x）
          value: 2
