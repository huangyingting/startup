        - 要求 FY2025 和 FY2026 审计 P&L；评估现金盈亏平衡路径；评估以 EUR 3.6B 估值桥接融资的可能性；压测优先股结构对股权价值的影响
      - - PDP 基础设施安全泄露或持续中断
