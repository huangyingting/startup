      - number: '5.7'
        title: 展示材料
        blocks:
          - type: callout
            title: PDP 先发优势
            body: >-
              Pennylane 已确认取得 DGFiP PDP 认证，可应对 2026 年 9 月法国电子发票强制要求；再叠加 FEC、EDI 和 ISO 27001
              合规，形成监管合规护城河。国际平台（Xero、QuickBooks）在强制要求截止前的 12–24 个月里，结构上很难补齐这条差距。这让 Pennylane 成为约 5.5 million 家必须合规的法国
              SMB 的自然迁移目的地。
            calloutType: insight
            claimRefs:
              - CE015
              - CE039
              - CE040
          - type: callout
            title: 开发者门户访问缺口
            body: >-
              截至 2026 年 5 月，Pennylane 开发者门户（developer.pennylane.com）无法通过公开网页抓取访问，pennylane.com/fr/api-documentation 的
              API 文档页也返回异常响应。这说明开发者生态尚未完全开放，限制 Pennylane 吸引独立集成开发者的能力；相比拥有完全公开开发者中心的平台（Xero、QuickBooks Online），300+
              集成数量增长也可能更慢。
            calloutType: insight
