  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础、客群和增长轨迹
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Pennylane 在首页自称拥有超过 1,000,000 家企业客户，使其成为法国最大的 SMB 会计和财务管理平台之一。公司还披露有 6,000+ 家会计师事务所（cabinets
              d'expertise comptable）作为专业用户，在平台上管理客户组合。第三个披露指标是 Compte Pro（集成企业银行账户，配 Mastercard 卡）拥有 30,000+
              名订阅者；这是资费页上的更高意向、更高 ARPU 产品队列。三组数据共同显示一个多层级基础：顶部是广泛订阅者群体，中间是活跃 SMB
              用户层，最高阶则是更深嵌入的银行客户客群。三组数据均为公司自报，且「客户」定义未公开明确。[CU001] [CU002] [CU003] [CU035]

              增长非常突出。Maddyness 2023 年 3 月一篇题为「De 3,000 à 40,000 clients en l'espace d'un an : c'est l'effet
              Sequoia」的文章记录了公司 2022 年融资 €50M 后的爆发式采用——一年内从约 3,000 名客户增至 40,000 名。更早的 AppVizer 编辑部引用提到约 50,000 名企业主，很可能反映
              2022–2023 年数据点，与当前 1M+ 轨迹一致。到 2025 年 12 月，公司达到 Centaur 状态（≥€100M ARR），该里程碑由 Maddyness 和 Sifted
              报道，确认客户数已转化为规模化的实质经常性收入。[CU004] [CU034] [CU040]

              Pennylane 的客户基础覆盖四类主要画像。自由职业者和独立工作者（indépendants）主要使用 Basique 或 Essentiel 层级做开票和费用管理。TPE 业主（1–9
              名员工的极小企业）使用开票加基础记账，即 comptabilité TPE/PME 模块。PME 财务经理和 DAF（Directeurs Administratifs et
              Financiers）使用完整平台，包括资金管理、采购管理和多实体分析，通常签约 Premium 或更高层级。第四类、也是结构上不同的一类是 expert-comptable（注册会计师），他们使用
              production comptable 模块同时管理数十或数百个 SMB 客户组合。这四类画像对应不同价格点、留存动态和增长杠杆——其中 expert-comptable 更像 B2B2C
              分销渠道，而不是传统意义上的直接终端客户。[CU005] [CU019] [CU020] [CU021] [CU022]
