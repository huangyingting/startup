  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Pennylane 的主要可服务市场，是面向法国 TPE/PME（très petites entreprises / petites et moyennes entreprises）的财务管理软件层。法国
              Code de Commerce 要求所有商业实体进行法定会计和税务申报，因此合规记账工具存在普遍需求。INSEE 估计法国约有 4.8–5.2 million 家活跃 SMB，其中约 3.7 million
              家是微型企业（auto-entrepreneurs 和个体经营者），其余是承担完整会计义务的正式商业实体。

              Pennylane 可触达市场中的支出包括：云会计和记账（journal、TVA、法定账目）、电子发票和 AP/AR 自动化、财务管理仪表盘、现金流监控，以及用于交易分类的 PSD2 银行连接。不包括完整 ERP
              系统（SAP、Oracle）、专用薪资（Silae、Sage Paie）、独立费用管理、纯
              CRM/账单工具和大型企业资金管理。相邻支出——单据采集工具（Dext）、自由职业者新银行（Indy、Qonto、Shine）和会计事务所管理——在大多数买方细分中是互补而非竞争市场。

              应替代的现状方案包括桌面安装的传统软件（EBP、Ciel）、服务器托管的 Sage 和 Cegid 部署，以及微型企业基于 Excel 的记账。2026 年 9 月电子发票强制令，是自电子 TVA
              申报推出以来，推动替代方案迁移的最强单一力量。Pennylane 也已把可触达边界扩至德国（Steuerberatung 细分），证据是其网站和站点地图上的德语页面，TAM 定义因此超出法国。
