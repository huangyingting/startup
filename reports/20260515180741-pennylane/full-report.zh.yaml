      - number: '1.5'
        title: 监管催化剂与德国扩张
        blocks:
          - type: paragraph
            body: >-
              Pennylane 增长的一个重大外部催化剂，是法国 Facturation Électronique（电子发票）改革。该改革由法国政府强制推行，并由 Direction Générale des
              Finances Publiques（DGFiP）管理。改革要求所有法国 B2B 公司到 2026 年 9 月（大型企业先行，SMB 分阶段推进）通过获批平台电子化开具和接收发票。Pennylane 已获
              DGFiP 批准成为 Plateforme de Dématérialisation Partenaire（PDP），成为少数能按强制要求传输并归档电子发票的授权平台之一。 [CO029] [CO030]

              这项 PDP 资质是重要竞争差异点：它给法国 SMB 和会计师事务所制造了监管驱动的评估和采用压力。Pennylane 既是 SMB 会计平台，又是获批 PDP，因此自然站在转型候选名单前列。没有 PDP
              资质，或更晚取得资质的竞争对手，在 2026 年 9 月强制周期中面临结构性劣势。QuickBooks France 选择完全退出法国市场，而不是投入 PDP 认证；这一决定直接为 Pennylane
              打开客户迁移机会。 [CO031] [CO032]

              德国是 Pennylane
              的首次国际扩张。公司已发布面向会计师（Steuerberater）、电子发票（E-Rechnung）和集成（Integrationen）的德语产品页，符合软启动或试点阶段特征。德国有自己的电子发票强制要求（ZUGFeRD/XRechnung
              标准，2025 年 1 月起用于 B2B 交易），提供了相似的监管驱动力。德国扩张紧随 2026 年 1 月融资之后，说明 €175M 部分用于支持国际扩张。 [CO033] [CO034]
