      - number: '5.4'
        title: AI/ML 能力和自动化
        blocks:
          - type: paragraph
            body: >-
              Pennylane 在会计工作流多个节点引入 AI/ML 能力，公开目标是压缩会计师花在常规数据处理任务上的时间。已披露的 AI 功能分三类：自动交易分类、AI 文档抽取和智能自动化规则。

              自动分类在银行交易从已连接银行账户和支付工具导入时，用机器学习做分类。模型根据交易描述、金额、交易对手名称和历史模式分配会计类别，降低 SMB 和会计师的手工分类负担。AI 文档抽取处理非结构化文档——供应商发票
              PDF、费用收据、扫描件——并将结构化字段（供应商名称、金额、日期、VAT 税率、行项目）抽取进会计系统。智能规则允许用户和会计师定义条件自动化规则（「如果交易对手 = X 且金额 > Y，则归类为
              Z」），并一致应用于重复交易，在 ML 模型之上提供可配置自动化层。[CE027] [CE028] [CE029]

              Pennylane 引用的可量化结果是：会计师生产力提升 27%，每个客户档案每月节省 1 小时 12
              分钟。这些是公司口径数据，未经过独立审计，但与结构性效率提升方向一致：从会计师工作流中拿掉手工交易分类和月末文档收集。考虑到对账和分类模块内置的自动化程度，这些数字具备可信度。[CE030] [CE031]

              AI 文档抽取的底层技术架构未公开说明。Pennylane 是用自有交易数据集自研模型（这会构成数据护城河），还是采购第三方 AI 供应商能力（例如 Google Document AI、AWS
              Textract、Azure Form Recognizer），产品页面和公开技术文档都没有披露。PennylaneAI GitHub 组织暗示公司有部分内部 ML
              工作，但范围和生产就绪度未经验证。这种不透明本身就是证据缺口：如果 AI 能力来自第三方，竞争差异化可能小于公司呈现的程度。[CE044]
            claimRefs:
              - CE027
              - CE028
              - CE029
              - CE030
              - CE031
              - CE044
      - number: '5.5'
        title: 安全、合规和数据处理
        blocks:
          - type: paragraph
            body: >-
              Pennylane 的安全态势是其公开文档中最明确的技术差异化之一。公司围绕六项原则组织公开安全立场：ISO 27001 认证、数据安全、访问控制、RGPD 合规、持续员工安全培训和运营韧性。每项原则都对应
              pennylane.com/fr/securite 和公开 Trust Center 中描述的项目。[CE011] [CE012] [CE016]

              ISO 27001 认证是最重要的外部验证。Pennylane 称认证覆盖所有产品、运营和地点，「sans exception à la
              norme」（不对标准设例外）——也就是说，认证范围边界覆盖完整平台技术栈，而非孤立组件。ISO 27001 是国际公认的信息安全管理体系标准，获得认证需要由受认可第三方认证机构每年做监督审计。Pennylane
              还称会由外部专家开展年度独立安全审计，并发布 AI 安全白皮书，说明 AI 相关数据处理如何治理。[CE011] [CE017] [CE018]

              任何处理欧盟居民个人数据的平台都必须遵守 RGPD/GDPR，这本身不是差异化；关键在落地细节。Pennylane 描述的数据驻留和访问控制措施与 RGPD 要求一致。访问控制框架管理哪些角色（SMB
              业主、会计师、Pennylane 员工）可以访问哪些数据，并在应用层执行基于角色的权限。考虑到双边架构，这一点尤其重要：会计师只能在 SMB 授权范围内访问客户财务数据，反之亦然。[CE012] [CE016]

              FEC 合规和通向 DGFiP 的 EDI 连接不是可选合规功能，而是在法国运营的会计软件必须满足的法律要求。FEC（Fichier des Écritures Comptables）是 DGFiP
              要求法国公司在税务审计中提供的机器可读会计文件格式。通过 EDI 传输 TVA 申报和 liasse fiscale，需要与 DGFiP 签署有效技术连接协议。随着 DGFiP
              更新规范，维持两者都需要持续技术投入；对缺少法国本地工程资源的国际平台而言，这是有意义的进入壁垒。[CE013] [CE014] [CE015]

              截至 2026 年 5 月，Pennylane 未在状态页或公开文档中披露 uptime、SLA 和历史事故率数据。这是一个缺口：平台为 1M+ 客户处理实时财务数据，并作为电子发票的活跃 PDP
              中继，运营韧性指标属于重要尽调信息，却无法从公开文档取得。[CE045]
