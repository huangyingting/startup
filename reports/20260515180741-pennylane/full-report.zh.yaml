  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览与定位
        blocks:
          - type: paragraph
            body: >-
              2026 年 Pennylane 的竞争格局分三层：（1）正在转云的法国传统在位者，主要是 Sage 和 Cegid，它们庞大的安装基础既是主要增长机会，也是主要防御性威胁；（2）占据相邻利基的云原生挑战者，包括
              Indy（面向自由职业者的免费模式）、Dext（AI 单据采集）和 Xero（全球云会计，但法国存在感有限）；（3）现状替代方案——桌面软件（EBP、Ciel）、手工流程和 Excel
              记账——仍覆盖尚未迁移到云工具的 60–65% 法国 SMB。2026 年 9 月 DGFiP 电子发票强制令（Facturation Électronique）是最强的单一市场驱动力：每家法国 B2B SMB
              都必须通过认证的 Plateforme de Dématérialisation Partenaire（PDP）或政府 PPF 门户传输发票。Pennylane 是获批 PDP，Sage 和 Cegid
              正在申请或已取得 PDP 资质，Xero 没有 PDP 认证，因此在结构上被挡在合规关键细分之外。 [CP001] [CP002] [CP003]

              Pennylane 创立以来最重要的竞争事件，是 Intuit 在 2024 年决定关闭法国所有 QuickBooks 产品。QuickBooks 曾是法国 SMB
              市场的主要国际云挑战者；它的退出说明，从法国之外补齐法国监管合规（FEC 格式、DGFiP 集成、EDI TVA 申报、会计师工作流惯例）极其困难。这既创造了 30,000–50,000
              名流失用户的直接迁移池，也从结构上验证了 Pennylane 的法国原生判断。Pennylane 成为 QuickBooks 腾出的云会计细分的天然接任者。 [CP004] [CP005] [CP006]

              从竞争位置看，Pennylane 处在「云原生 UX + 深度法国监管合规」的右上象限。Sage 从传统合规侧接近这一位置（把在位产品改造成云），Xero 则从云 UX 侧接近（把国际产品适配法国规则）。Dext
              和 Indy 分别占据专业化利基（单据采集和自由职业者银行），更多是 Pennylane 全套产品的互补工具，而非替代者。 [CP007] [CP008]
