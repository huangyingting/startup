      - number: '6.7'
        title: 展示材料
        blocks:
          - type: callout
            title: 会计师驱动的 B2B2C 分销创造资本高效、高留存增长
            body: >-
              Pennylane 选择把会计师事务所作为主要分发渠道，而不是靠广告直接获取 SMB，这一做法更适合法国市场结构。会计师事务所本来就和 SMB 业主有信任关系，数字营销投入再多也复制不了。平台上的 6,000+
              家会计师事务所同时扮演低成本获客渠道（会计师向自己的客户组合推荐 Pennylane）和高价值留存机制（客户与会计师一起被锁在平台上）。这意味着同一项资产——会计师关系——同时压低获客成本、降低流失率。Xero
              在英国的会计师伙伴模型曾支撑行业领先的约 95% 年度总留存率；如果 Pennylane 的双边锁定深度接近 Xero，它也可能拿到类似留存结果。法国仍有 75% 会计师事务所尚未渗透（估计 18,000
              家尚未上平台），给公司留下很长的有机增长跑道，不需要额外市场进入成本。
            calloutType: strength
            claimRefs:
              - CU002
              - CU016
              - CU017
              - CU028
          - type: callout
            title: 自报客户指标且缺少留存数据，限制尽调质量
            body: >-
              Pennylane 最重要的客户指标——1M+ 企业客户数和 6,000+ 会计师事务所数——来自公司营销页面自报，缺少独立验证、审计披露，也没有定义“客户”（活跃付费用户、免费试用还是注册账户）。从 3,000
              到 40,000 再到 1,000,000+ 的增长轨迹方向上可信，但没有独立审计锚点。更关键的是，NRR、GRR、流失率、队列留存曲线、NPS 和正式 CSAT
              分数都未见公开记录。没有留存数据时，会计师锁定逻辑即便在结构上说得通，也无法定量验证。投资者和分析师只能依赖对切换成本的结构性推理，而不是已观察到的流失结果。2025 年 12 月的半人马里程碑（≥€100M
              ARR）是公开可得的唯一间接收入锚点。在 €3.6B 估值下做任何投资决策前，都必须向管理层数据室索取所有留存和财务指标。
            calloutType: risk
