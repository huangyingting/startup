      - 尽调问题
      - 优先级
      - 数据来源
      - 理由
    rows:
      - - 2024Q4 至 2026Q1 的实际 ARR 及季度增长节奏
        - 关键
        - 数据室 / CFO 访谈
        - €100M ARR 通过媒体自报；实际季度增长轨迹决定基准情景置信区间
      - - 按产品线拆分毛利率（SaaS 订阅 vs Compte Pro 银行）
        - 关键
        - 数据室 / 管理层演示
        - 如果银行产品毛利低，混合毛利可能低于 70%，削弱可扩展性论点
      - - 2026 年 1 月 Series E（€175M）后的烧钱率和 runway 月数
        - 关键
        - CFO 访谈 / 数据室
        - 15 个月三轮共 €330M 融资显示烧钱高；runway 决定下一轮融资风险和 down-round 概率
      - - 电子发票 PDP/OD 认证状态，以及面向强制要求的会计事务所渠道签约管线
        - 高
        - 产品 / 监管团队
        - 主要乐观情景催化剂；认证时点和渠道伙伴管线决定强制要求采用潮的 ARR 贡献
      - - 按客群（SMB 直客、会计事务所推荐、企业）拆分客户流失率
        - 高
        - 数据室 / 客户成功团队
        - 高 SMB 流失会削弱 €100M ARR 基础；客群流失决定总收入留存底线
      - - Series E 治理条款 — 清算优先权、反稀释、IPO ratchet 条款
        - 高
        - 法务数据室
        - TCV 领投的成长轮常含保护投资人的条款，会影响下行情景中普通股股东回报
