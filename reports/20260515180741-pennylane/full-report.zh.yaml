      - number: '5.2'
        title: 技术差异化和平台深度
        blocks:
          - type: paragraph
            body: >-
              Pennylane 的技术差异化建立在四层相互强化的能力上；合在一起，比任何单一功能都更难被竞争对手复制。

              第一层是法国监管合规深度。Pennylane 原生生成符合 DGFiP 官方规范的 FEC 输出——这是接受税务审计的法国企业必须满足的法定要求。它把 TVA 和 liasse fiscale 的 EDI
              申报直接传输给法国税务机关（DGFiP），免去多数国际竞争对手要求的导出再上传步骤。这层合规不是装饰：它需要在 DGFiP 更新技术格式时持续维护，需要有效的 EDI
              连接协议，也需要愿意认证输出的会计师。[CE013] [CE014]

              第二层是 PDP 认证。Pennylane 已获 DGFiP 批准成为 Plateforme de Dématérialisation Partenaire（PDP）——少数获得认证的平台之一，可在 2026 年
              9 月强制 Facturation Électronique 改革中代表法国企业路由并归档电子发票。认证覆盖完整电子发票中继架构：接收企业发出的结构化电子发票，将其路由到 DGFiP 的 Portail
              Public de Facturation（PPF），并为审计目的归档发票生命周期。[CE015] [CE039] [CE040]

              第三层是双边数据架构。SMB-会计师共享工作区并不是在单用户会计产品上叠一层权限；它需要多租户协作模型，让账本数据、银行流水、发票状态和对账状态同时对不同角色的各方可见、可编辑。相比带导出功能的单用户产品，这在架构上复杂得多；而其运营价值——消除月末批处理——取决于在并发用户之间保持数据新鲜和一致。[CE009]
              [CE010] [CE042]

              第四层是嵌入式金融。Compte Pro 银行账户不是第三方集成，而是原生产品，意味着卡消费、银行转账和账户余额会自动流入会计账本，不需要人工对账步骤。所有财务事件都发生在 Pennylane
              生态内，这种数据重力构成自动现金流预测的结构基础，也压缩了竞争工具去中介化会计工作流的空间。[CE007] [CE043] [CE019]
