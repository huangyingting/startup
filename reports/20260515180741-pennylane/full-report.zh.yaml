      - number: '5.6'
        title: 工程组织和路线图
        blocks:
          - type: paragraph
            body: >-
              相对公司总规模，Pennylane 的工程组织是法国金融科技中最大的之一。约 900 名员工中有 300+ 名工程师，工程约占总人数三分之一——高于同等规模 SaaS 公司常见的
              20–25%，说明公司仍在持续投入产品，而不是在产品市场契合后转向销售主导。welcometothejungle.com 和 Lever
              ATS（lever.co/pennylane）上的活跃招聘显示，公司仍在后端工程、前端、平台基础设施、数据科学和安全岗位招聘。工程团队主要在法国（「Made in
              France」），符合公司巴黎总部和法国监管专业能力要求。[CE032] [CE033] [CE034]

              Pennylane 将发布节奏描述为「rythme soutenu」（持续 / 高速节奏），但未发布带日期功能交付的正式路线图。结合产品和监管背景，可推导出近期已知里程碑：（1）2026 年 9
              月法国电子发票强制要求上线，Pennylane 的 PDP
              认证已确认；（2）继续推进德国市场扩张，证据是德语产品页已上线，覆盖电子发票（e-Rechnung）、会计师事务所（Steuerberatung）和集成；（3）持续增强 AI/ML 自动化，信号包括
              PennylaneAI GitHub 组织，以及 DafTech 2026 大会聚焦产品创新。[CE015] [CE035] [CE036]

              工程团队通过 Medium 技术博客（medium.com/pennylane-tech）对外发布架构和运营内容，并在 pennylane-tech 与 PennylaneAI 两个组织下维护公开 GitHub
              仓库。这些开发者界面说明其工程文化倾向透明和社区参与，不过与更大平台（例如 Xero 开发者计划或 QuickBooks API
              生态）相比，外部技术内容数量仍然有限。工程人才集中在法国也引入地理集中风险：监管扰动、巴黎科技公司（Criteo、Doctolib、BlaBlaCar）的人才竞争，或工程招聘经济性变化，都可能影响公司维持当前开发节奏的能力。[CE032]
