              法国 35–40% 的云会计渗透率——Pennylane 称之为绿地机会——假设传统在位者保持静止。Sage 已推出 Sage Active 作为云端应对；Cegid 正在为其会计事务所客户基础投入 SaaS
              迁移。如果 Sage 的品牌认知和 2 million+ 客户关系加速其自身云迁移，Pennylane 的绿地窗口可能比融资材料暗示的更短。2026 年电子发票强制令让所有供应商——不只是
              Pennylane——都必须尽快交付合规云方案；在传统云替代方案达到功能平价之前，Pennylane 的先发优势可能缩短到 12–18 个月窗口。
