      - number: '4.2'
        title: 单位经济模型和销售效率
        blocks:
          - type: paragraph
            body: >-
              公开数据只能拼出 Pennylane 单位经济模型的一部分；作为私营公司，它的信息不透明，关键结论仍大幅未证实。收入端，按 Basique €14 底价和 Essentiel €24 中位价估算，并对
              Premium 及会计师事务所方案上浮做调整，混合 ARPU 约为每用户每月 €15–30，对应年化 ARPU 为每用户 €180–360。pennylane.com 披露 SMB 客户超过 1,000,000
              个；如果所有客户都只用单用户入门方案，低端 ARR 估计约为 €180M；Maddyness 2025 年 12 月报道的 Centaur 里程碑（≥€100M ARR）更牢地锚定了下限。真实 ARR
              取决于单用户与多用户账户的组合，以及高阶方案客户占比。

              会计师渠道的 GTM 带来结构性 CAC 优势。Pennylane 不必按典型 SMB SaaS 获客成本（每客户 €200–800）用直销营销获取 1,000,000 家
              SMB，而是让会计师事务所关系替代为基于信任的分销渠道。有效混合 CAC 未披露；针对会计师渠道驱动 SaaS 的分析师估计显示，相比纯直销，CAC 可降低 3–5 倍。客户终身价值（LTV）同样未披露；若年
              ARPU 中位数为 €220，并假设 SMB 流失率为 5–10%，隐含 LTV 为每个 SMB 客户 €2,200–€4,400——对该客群合理，但完全依赖私有的流失假设。云原生 SaaS
              会计软件的毛利率通常为 70–80%；Pennylane 的具体毛利率未披露。
