  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构和核心模块
        blocks:
          - type: paragraph
            body: >-
              Pennylane
              平台是一个统一的云应用，在同一个共享实时数据层上服务两个不同用户角色——SMB（中小企业）及其会计师（experts-comptables）。平台不是提供孤立的点状工具，而是整合七个功能模块，让它们运行在同一套底层财务数据上，消除传统桌面会计流程中的信息传递滞后；后者通常依赖月末交换文档。

              发票模块（Facturation）覆盖完整文档生命周期：报价（devis）、发票（factures）、形式发票、采购订单（bons de commande）、送货单（bons de
              livraison）、自动续订订阅、自动付款提醒（relances automatiques），以及通过 Mastercard 或 SEPA
              银行转账生成直接付款链接。采购管理模块处理供应商发票导入、一键供应商付款和采购订单流程。费用管理把 Mastercard
              实体卡和虚拟卡与报销单提交、收据（justificatif）采集打通。资金模块基于实时银行余额和未收应收款，提供实时现金流跟踪和预测（prévisionnel）。

              会计和复核模块是整个技术栈最深的一层：覆盖银行对账、会计师结账流程的完整复核工作区、符合 DGFiP 法定格式的 FEC（Fichier des Écritures Comptables）生成，以及将 TVA
              申报和年度 liasse fiscale 通过 EDI 直接传输给法国税务机关。嵌入式企业银行账户（Compte Pro）提供原生 IBAN français、实体和虚拟 Mastercard 卡以及 SEPA
              支付——无需手工导入，就把银行数据直接嵌进会计流程。移动应用补齐 SMB 在移动场景下开票和采集费用的体验。[CE001] [CE002] [CE003] [CE004] [CE005] [CE006]
              [CE007] [CE008] [CE009]

              Pennylane 差异化的结构核心，是把 SMB 和会计师放在同一个平台上，而不是让两个独立产品交换文件。会计师看到的实时交易数据、银行流水和发票状态，与 SMB
              看到的是同一套，因此会计师可以持续作业，而不必等到月末批处理。这种「实时会计」设计需要多租户权限模型：会计师可在一个工作区管理数百个客户组合，并用基于角色的访问控制管理各方可见范围和编辑权限。[CE009]
              [CE010] [CE042]
