      - number: '8.6'
        title: 投资逻辑破裂标准、退出就绪度与最终尽调事项
        blocks:
          - type: paragraph
            body: >-
              五个投资逻辑破裂触发点会导致 Pennylane 持仓被立即重估或退出。第一：电子发票强制要求较 2026 年 9 月延迟超过 12 个月，移除近期主要采用催化剂，并把回本周期拉长 18–24
              个月。第二：主要现有玩家（Cegid 或 Sage）先于 Pennylane 获得电子发票强制要求所需的 PDP/OD 监管认证，移除先发优势。第三：披露的烧钱速度显示在没有新融资的情况下现金跑道不足 12
              个月，释放资本危机信号。第四：任何独立报道数据显示 ARR 增速低于 25% CAGR，暗示市场饱和或竞争替代早于预期出现。第五：发生低于 €3.6B 投后估值的降估值融资，说明 VC 信念失效。

              退出就绪度评估：Pennylane 距离在 Euronext Paris 或 Amsterdam 达到 IPO 就绪大约还有 3–5 年。公司需要 €400–500M
              ARR、清晰可见的盈利路径，以及国际收入贡献，才能支撑可持续上市。更可能的近期退出路径包括：由 Sage、Visma、MYOB/KKR 或大型法国金融软件集团以 €4–8B 战略收购（约 15%
              概率）；二级交易或 GP 主导的续期基金提供部分流动性；或如果 ARR 到 2028 年超过 €300M，则在强制要求周期后 IPO。任何增量投入前，最终尽调应聚焦六个最关键未知变量：真实 ARR
              及季度节奏、按产品线拆分的毛利率、Series E 后烧钱速度和现金跑道时长、电子发票 PDP/OD 认证状态与竞争管线、按细分市场拆分的客户流失率，以及 Series E 中任何影响未来融资灵活性的治理条款。
