      - number: '7.3'
        title: 技术与安全风险
        blocks:
          - type: paragraph
            body: >-
              Pennylane 的 ISO 27001 认证为信息安全管理提供框架层面的背书，但认证范围和复评节奏没有公开披露。具体来说，Pennylane 的 Compte Pro 银行产品和 PDP 基础设施是否纳入
              ISO 27001 认证范围，任何公开来源都未确认。平台增长时，如果认证范围没有持续扩展，重要功能可能留在审计之外。


              Pennylane 托管的财务数据画像——1M+ 企业银行流水、完整会计账簿（FEC）、发票档案、薪资集成和企业 Mastercard 账户数据——使其成为网络犯罪的高价值目标。若 FEC
              记录或银行交易数据被攻破，将触发 CNIL 强制泄露通知、潜在 GDPR 罚款、对会计师和 SMB 的合同责任，以及足以推动客户流失的严重声誉损害。Pennylane 有公开状态页，但历史事故数据只保留 90
              天，限制外部评估事故频率和严重程度。


              Pennylane 作为 PDP 运营方的新角色，根本改变了其攻击面。获得 PDP 资格后，Pennylane 成为法国关键金融基础设施的一部分，负责为 1M+
              家企业路由电子发票。这会引来法国监管机构（ANSSI、DGFiP）和对抗性行为体的更高关注；后者可能把电子发票基础设施作为欺诈（发票篡改）、勒索软件或国家级干扰的目标。PDP
              运营方预计要满足更高的可用性和安全标准，任何故障都会招致与普通 SaaS 宕机不成比例的监管和媒体关注。


              AI 驱动的自动会计分类引入了新的责任向量。如果分类错误传导到提交给 DGFiP 的 FEC 导出、TVA 申报或审计轨迹，产生的税务错误可能让 SMB 客户及其会计师事务所承担法律责任，而 Pennylane
              正是生成错误的平台。大型语言模型已知会幻觉数值；如果缺少稳健的人机复核流程和清晰合同免责声明，这就是未对冲责任。Pennylane 的 300+ 个第三方集成也扩大了软件供应链攻击面，仅靠 ISO 27001
              无法完全缓释。
