      - number: '6.3'
        title: 客户满意度和 NPS 信号
        blocks:
          - type: paragraph
            body: >-
              Pennylane 在首页展示两个移动应用评分：4.7/5 和 4.5/5，分别与 Apple App Store 和 Google Play
              上口碑较好的消费级应用评分一致。具体评分数量（评论数）未随分数展示，因此统计权重未知。独立来看，法国 B2B 软件评论聚合平台 AppVizer 收录了 Pennylane 评论，编辑部标题称「Grâce à
              Pennylane, il n'a jamais été aussi simple de gérer son entreprise」（大意：「有了
              Pennylane，管理公司从未如此简单」）。这类编辑部情绪是证实信号，但不是量化满意度分数。[CU006] [CU007] [CU013]

              Capterra France（capterra.fr）和 G2 都在会计软件类别中将 Pennylane 列为被评论产品，平台上可访问用户生成评分。Trustpilot（trustpilot.com）也有
              pennylane.com 的评论，不过研究时独立抓取 Trustpilot 页面未成功。这些第三方评论平台合在一起，确认 Pennylane
              已有足够用户采用，能够在多个渠道自然产生社区评论覆盖；这是市场渗透的代理指标，低用户数竞争对手难以做到。[CU014] [CU015]

              反向满意度信号也存在，不应忽视。AppVizer 用户评论提到客户支持响应时间困难，以及入门过程中学习曲线明显。G2 评论在肯定易用性的同时，也对支持质量给出混合反馈。这些信号符合一家快速增长 SaaS
              公司的状态：用户数扩至超过 1 million
              的速度快于支持和客户成功基础设施成熟的速度。反复出现的主题是，会计软件上手天然摩擦较重——需要完整数据迁移、连接银行账户、邀请会计师——即便用户最终能从平台获得高价值，早期不满也会被放大。Pennylane
              未正式披露 NPS；NPS 必须视为重大尽调缺口。[CU031] [CU032]
