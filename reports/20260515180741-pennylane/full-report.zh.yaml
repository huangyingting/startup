      - number: '2.7'
        title: 图表与证据
        blocks:
          - type: callout
            title: 电子发票强制令是非自由裁量的市场催化剂
            body: >-
              2026 年 9 月 DGFiP 电子发票强制令，可能是法国 SMB 软件史上最强的监管驱动力。不同于自然发生的数字化转型需求，这是一项法律合规要求：每家法国 B2B SMB 都必须部署 PDP
              兼容基础设施，否则存在 TVA 不合规风险。Pennylane 早期获得 PDP 认证，使其成为 6,000+ 家会计师事务所向客户推荐软件时的默认选项。Pennylane 不需要创造这个市场，而是必须在
              Sage 和 Cegid 完成自身云迁移前把市场拿下。
