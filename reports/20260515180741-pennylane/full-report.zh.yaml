  - id: TV006
    title: 最终尽调问题表
    notes: 鉴于 Pennylane 为私营公司，尽调数据可得性有限；所有事项都需要直接管理层沟通或数据室访问，公开市场尽调无法获取。优先级反映在当前不透明度下对投资信心的影响。
