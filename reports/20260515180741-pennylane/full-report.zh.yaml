      - number: '2.2'
        title: 市场规模——法国与欧洲 TAM
        blocks:
          - type: paragraph
            body: >-
              没有单一权威公开研究单独测算法国云会计软件市场；估计需要从多个视角拼出。自下而上看：法国约 5 million 家 SMB，平均每年在财务管理软件上花 €300–500，对应法国 SMB
              财务软件总可用市场（TAM）约 €1.5–2.5 billion/年。这个区间与 Sage 公开称拥有 2 million+ 法国客户相一致；按混合产品层级倒推，单账户平均收入约
              €500–800。扩展到欧洲，SMB 会计软件市场通常估计为 €8–12 billion，法国占总量的 15–20%。

              云原生方案的可服务市场（SAM）明显收窄：按法国当前云会计渗透率约 35–40%（英国约 ≈70%）计算，当前 SAM 约为 €525M–1.0B。不过，2026 年 9
              月电子发票强制令预计会成为全市场驱动力，在 2025–2028 年把剩余 60–65% 非云 SMB 的云迁移提前，并推动有效云 SAM 在这一时期接近完整 TAM。预计到 2028 年市场 CAGR 为
              8–12%，主要由监管合规需求拉动，而不是自然数字化速度。Pennylane 的估计 SOM——由 1 million+ SMB 客户和约 €24–120+/月定价推算——对应法国当前收入运行率约 €35–100
              million/年，约占法国 TAM 的 2–7%。
