          - type: callout
            title: 客户数和收入数据均为自报，缺乏独立验证
            body: >-
              Pennylane 的关键规模指标——1,000,000+ 企业客户和 6,000+ 家会计师事务所——完全来自公司控制的营销材料，尚未由独立方验证，也未在经审计财务文件中披露（Pennylane
              是未上市公司，不需要像上市公司一样详细提交公开账目）。「客户」的定义（活跃付费用户、免费试用还是注册账户）没有公开说明，因此真实付费规模存在模糊性。收入和增长率数据尚未公开披露。投资者和分析师在商业尽调中必须依赖公司提供的数据。
