companyProfile:
  summary: >-
    Pennylane 是一家总部位于巴黎的 SaaS 公司，创立于 2020 年，为法国 SMB 及服务它们的会计师事务所提供一体化云会计和财务管理套件。平台把记账自动化、开票、费用管理、资金管理和薪资预处理整合到一个界面，靠 AI
    驱动的分类能力，以及会计师与客户工作区之间的原生连接形成差异化。截至 2026 年 5 月，Pennylane 拥有超过 1 million SMB 客户、超过 6,000 家会计师事务所合作伙伴，并在 2026 年 9
    月强制电子发票改革前获得法国税务机关 DGFiP 的 PDP（Plateforme de Dématérialisation Partenaire）资质。2026 年 1 月，TCV 领投的 €175M Series D
    将公司估值推至 €3.6B，使 Pennylane 成为法国估值最高的未上市金融科技公司之一。
