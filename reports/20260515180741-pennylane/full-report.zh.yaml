        - 增长驱动
        - 2026 年 9 月（接收）→ 2027 年（开具）
        - 很高 — 影响全部 5M 家法国 B2B SMB
        - 非可选升级周期；Pennylane 的 PDP 认证是直接竞争优势
        - 核实 Pennylane 的 PDP 认证范围，以及 2026 年 9 月上线准备度；跟踪客户电子开票上线率
      - - QuickBooks 退出法国市场（2024）
        - 增长驱动
        - 2024 年完成；迁移潮 2024–2026
        - 中 — 30–50K 名用户被迫迁移
        - 为云原生、满足法国合规要求的替代方案带来一批主动迁移用户；Pennylane 凭合规站位最有利
        - 跟踪 QuickBooks 迁移用户转化率；评估 Intuit 重返欧盟的风险
      - - 云采用率与英国差距（35–40% 对 70%）
        - 增长驱动
        - 结构性；多年期
        - 高 — 60–65% 的法国 SMB 仍未上云
        - 大片空白市场；监管强制带来的拉力，比主动销售更低 CAC
        - 逐年监测云渗透率数据；评估强制令是否让差距收敛快于基准情景
      - - 会计师分销网络（6,000+ 家事务所）
        - 增长驱动
        - 持续、累积
        - 很高 — 会计师影响 70–80% 的 SMB 软件决策
        - 自我强化的网络效应：每新增一家会计师事务所，都会带来其客户池；切换成本随之抬升
        - 跟踪每季度新增会计师事务所总数；衡量事务所来源账户的 NRR
      - - France 2030 SMB 数字化补贴
        - 增长驱动
        - 2025–2030
        - 低到中 — 间接需求拉动
        - 补贴可能资助软件采用；降低受补贴 SMB 的价格敏感度
        - 确认 France 2030 资格标准是否覆盖会计软件；跟踪客户补贴领取情况
      - - Sage 2M+ 法国客户装机基础
        - 采用阻力
        - 结构性；长期
        - 高 — 在位厂商切换成本横跨整个市场
