  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价结构
        blocks:
          - type: paragraph
            body: >-
              Pennylane 采用按用户计费的 SaaS
              订阅模式，服务两个相互连接的客群：SMB（中小企业）和会计专业人士（experts-comptables）。收入主要来自分层平台方案的月付或年付按用户经常性费用，另有原生企业银行产品 Compte
              Pro，贡献银行卡交换费和账户相关费用。pennylane.com/fr/tarifs 公布的价格显示，Basique 方案起价为每用户每月 €14，Essentiel 方案起价为每用户每月
              €24。覆盖高级会计模块的 Premium 方案可购买，但需询价，公开页面不展示标价，符合企业级交易结构。Compte Pro（集成银行账户，配 Mastercard
              卡）的独立定价未在公开资费页完整披露。所有价格均以 EUR 报价，反映 Pennylane 当前主市场仍集中在法国。

              双客群模型在结构上效率很高：会计师事务所（cabinets d'expertise comptable）承担 SMB 采用的分销渠道，降低直接获客成本。事务所向 SMB 客户推荐 Pennylane 后，SMB
              按标准按用户价格加入，会计师事务所则使用面向会计师的方案。这个网络效应——6,000+ 家会计师事务所分别推荐多个 SMB 客户——相较纯直销 SaaS 模型压低了混合 CAC。Pennylane 网站还确认有
              300+ 个第三方软件集成（薪资、电商、支付处理），说明公司可通过模块附加和数据连接价值做增购。公司未公开会计师事务所层级、企业合同或批量折扣的价格；因此，实际 ARPU 不能仅靠标价精确推导。
