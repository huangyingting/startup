      - - 客户支持扩容（1M 到 2M+ SMB）
        - SMB 基数快速扩张，在强制采用窗口期带来支持量和质量风险
        - 可能性高（4）
        - 中等 -- 电子发票强制要求上手期间支持体验差，可能推动早期流失
        - 推断有人员增长；产品文档投入
        - 核实支持 CSAT 分数和平均解决时间指标；确认 2026 年前支持人员增长计划
    notes: 可能性和严重性是基于公开证据的定性评估。CEO 继任深度反映公开披露缺失；私有继任计划可能存在。所有条目都需要私下尽调才能充分评估。
