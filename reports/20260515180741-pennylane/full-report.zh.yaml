      - number: '4.3'
        title: 融资历史和资本结构
        blocks:
          - type: paragraph
            body: >-
              Pennylane 自 2020 年创立以来已完成六轮已确认融资，累计融资约 €410M。它的融资轨迹是法国科技生态中最激进的一类：从 2024 年 10 月到 2026 年 1 月，仅 15 个月就在三轮中融资
              €330M，同期估值从 €1B 跳到 €3.6B，提升 3.6 倍。

              前两笔约 €15M 融资均发生在 2021 年，随后 2022 年 1 月完成 €50M 轮，确立 Pennylane 作为高增长金融科技公司的位置。标志性的 2024 年 10 月 Series C 融资
              €80M、估值 €1B，由 Sequoia Capital 领投，Partech 和 Global Founders Capital（GFC）参投——Pennylane 因此成为法国最新独角兽。2025 年 4
              月，Pennylane 又以 €2B 估值融资 €75M（六个月内将 €1B 独角兽估值翻倍）。2026 年 1 月，TCV（Technology Crossover Ventures）作为领投方进入，完成
              €175M 融资、估值 €3.6B，这是截至目前最大单轮融资。投资人阵容——Sequoia Capital、Partech、GFC 和
              TCV——覆盖全球最活跃、声誉最强的四家成长期科技投资机构，为后续融资能力提供了强背书。

              资本结构细节（优先股堆叠、清算优先权、反稀释条款、期权池规模及共同投资人持股）未公开披露，因为 Pennylane 是法国 SAS（société par actions
              simplifiée），不受美国式公开披露要求约束。Series C 投资后，Sequoia 合伙人 Luciana Lixandru 已确认进入董事会。2026 年 1 月融资的资金用途未正式披露，不过
              Maddyness 和 Sifted 报道的背景指向国际扩张（德国）和法国电子发票改革（PDP 强制要求）。
