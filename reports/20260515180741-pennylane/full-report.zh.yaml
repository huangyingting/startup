        - 核心 ARR 驱动；在 1M 客户基数下，ARPU 小幅变化会带来 €180–360M 的 ARR 变化
        - 索取按档位和账单周期拆分的实际平均 ARPU；确认年付与月付方案占比
      - - 估计 ARR（低 / 中 / 高）
        - 低：€100M（centaur 里程碑）/ 中：€150M / 高：€300M
        - 低——centaur 阈值有锚点；中 / 高为估计
        - 驱动估值倍数分析；€3.6B / €100M ARR = 36× ARR 倍数
        - 确认实际 ARR；索取按队列和套餐档位拆分的 ARR 瀑布
      - - 毛利率（估计）
        - 70–80%（SaaS 会计软件行业基准）
        - 低——未披露；仅为基准
        - 毛利率决定对固定成本的贡献和 EBITDA 盈亏平衡路径
        - 索取按业务拆分的实际毛利率（SaaS 订阅与银行产品）
      - - 混合 CAC（估计）
        - 未披露；会计师渠道可能将直接 CAC 压低 3–5×
        - 低——由渠道模型推断；未确认
        - CAC 决定回本周期；若证实，会计师渠道分销是结构性优势
        - 索取按获客渠道拆分的 CAC（会计师推荐 / 直接数字渠道 / 内部销售）
      - - 估计客户 LTV（中小企业）
        - €2,200–€4,400（按中位数 €220/year ARPU 和 5–10% 流失假设）
        - 低——ARPU 和流失输入均未确认
        - LTV/CAC 比率是单位经济模型的核心基准；两个输入均为估计
        - 索取按队列拆分的 LTV；索取按套餐档位拆分的实际年度流失率
      - - 净留存率（NRR）
        - 未披露
        - 低——完全为私有指标
        - NRR >100% 意味着 ARR 可自我扩张；来自会计师增购的 NRR 是关键投资逻辑测试
        - 索取按客户分群（中小企业 / 会计师事务所）和套餐档位拆分的 NRR
      - - CAC 回本周期（估计）
        - 未披露；若 CAC = €100–300 且 ARPU = €220/year，粗略估计为 12–24 个月
        - 低——完全由基准构造
        - 早期中小企业 SaaS 若回本 >24 个月是红旗；会计师渠道可能缩短周期
        - 索取从获客到首个 12 个月经常性收入的平均时间；按渠道确认回本周期
    notes: >-
      所有标注为“估计”或“低置信度”的指标，均为分析师根据公开定价（pennylane.com/fr/tarifs）、客户数量（公司官方页面）、SaaS 会计软件行业基准，以及 Maddyness 报道的 2025 年 12 月
