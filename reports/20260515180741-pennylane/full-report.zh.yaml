      - number: '1.2'
        title: 创始人、领导层与团队
        blocks:
          - type: paragraph
            body: >-
              Arthur Waller 是 Pennylane CEO 和联合创始人。他有金融和工程背景，2020 年创立 Pennylane 前曾在投行工作。公司领导团队包括 CTO，以及资深产品和工程负责人。截至
              2025 年，Pennylane 员工总数约 900 人，其中工程师超过 300 人；这个比例体现了公司的技术厚度和产品驱动增长模式。员工平均年龄 33 岁，全员性别结构为 35% 女性、65%
              男性。Pennylane 在 2025 年法国职业性别平等指数（Index Égalité Professionnelle）中得分 73/100。 [CO009] [CO010] [CO011]

              公司在 Welcome to the Jungle（法国科技招聘平台）上建立了很强的雇主品牌；其页面强调，公司从 2020 年创立到五年内扩张至 900 名员工、超过 1 million
              企业客户。Pennylane 在巴黎大力招聘，并在同城设有工程办公室。300+ 名工程师说明公司在产品开发上投入很重，也符合一家 Series C 阶段金融科技公司同时对抗传统龙头和融资充足挑战者的竞争状态。
              [CO012] [CO013]

              Sequoia Capital 合伙人 Luciana Lixandru 因 Sequoia 领投 Series C 进入董事会。Sequoia 对该笔投资的描述——「Pennylane
              正在成为欧洲中小企业关键的财务管理平台。我们很高兴能与他们出色的团队合作，确保任何规模的企业都能拥有一个单一、最新的财务数据来源，并改善它们与会计师的协作方式」——反映了董事会层面对 Pennylane
              双市场策略的信念。 [CO014] [CO015]
