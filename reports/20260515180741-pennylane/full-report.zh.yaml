        - label: 乐观低位（€300M ARR 上 25x）
          value: 7.5
          detail: ~€7.5B；较当前进入价约 ~2x；强制要求顺风加 Compte Pro ARR；以增长溢价 IPO
        - label: 乐观高位（€400M ARR 上 30x）
          value: 12
          detail: ~€12.0B；较当前进入价约 ~3.3x；完整强制要求采用潮加国际化；欧洲 SaaS 前十分位结果
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: >-
      区间图展示四种结果情景下的低 / 中 / 高退出估值：悲观情景（€1.5–2B）、基准情景（€5–8B）、乐观情景（€8–12B）和战略收购情景（€4–7B）。当前 €3.6B
      进入价高于悲观情景中点、低于基准情景底部，体现偏高进入倍数下不对称下行风险。
    claimRefs:
      - CV036
      - CV040
      - CV044
      - CV048
    data:
      items:
        - label: 悲观情景
          low: 1.5
          mid: 1.75
          high: 2
          note: €120–140M ARR 上 8–12x ARR；强制要求延期或竞争替代；可能 down-round 或困境出售
        - label: 基准情景
          low: 5
          mid: 6.5
          high: 8
          note: 2027 年 €200M ARR 上 18–22x ARR；中等强制要求顺风；到 2028 年仍仅法国；2029–2030 年 IPO
        - label: 乐观情景
          low: 8
          mid: 10
          high: 12
          note: 2028 年 €300M+ ARR 上 25–30x ARR；完整强制要求采用潮；Compte Pro 放量；国际扩张启动
        - label: 战略收购
          low: 4
          mid: 5.5
          high: 7
          note: 较基准情景 NAV 溢价 20–30%；Sage、Visma 或大型法国软件集团作为收购方；概率约 15%
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: >-
      Pennylane 六个可供投委会使用的 KPI：隐含 ARR 倍数（36x）、累计融资（€410M+）、估算 ARR（~€100M）、Series D 到 Series E 轮次估值跃升（9 个月
      +80%）、会计事务所渠道规模（6,000+），以及强制要求催化日期（2026 年 9 月）。这些 KPI 勾勒投资论点，也突出关键监控变量。
    claimRefs:
      - CV016
      - CV026
      - CV027
      - CV028
    data:
      items:
        - label: 隐含 ARR 倍数
          value: ~36x
          detail: €3.6B 估值（2026 年 1 月）/ ~€100M ARR（2025 年 12 月）；对比 Xero ~7x ARR 和 Sage ~5x 收入
        - label: 累计融资
          value: ~€410M
          detail: 2021–2026 年 1 月六轮融资；最新 €175M Series E 由 TCV 领投，投后估值 €3.6B
        - label: 估算 ARR
          value: ~€100M
          detail: 2025 年 12 月通过 Maddyness 自报 centaur 状态；未独立审计；隐含 ~70–100% CAGR
        - label: 轮次估值跃升
          value: +80% in 9 months
          detail: €2B（2025 年 4 月 Series D）到 €3.6B（2026 年 1 月 Series E）；反映强制要求催化剂定价
        - label: 会计事务所渠道
          value: 6,000+
          detail: 截至 2026 年初平台上的 cabinets d'expertise comptable；主要 SMB 分销渠道，CAC 近零
        - label: 强制要求催化日期
          value: September 2026
          detail: 法国强制电子发票（facturation électronique）大型企业截止期；SMB 合规滚动持续到 2027 年
appendices:
  - id: A
    title: 融资历史时间线
    blocks:
      - type: paragraph
        body: >-
          Pennylane 自 2020 年创立以来，已通过五轮机构融资累计募集约 €410M，每一轮都伴随显著估值跃升：2021 年（两批合计 €30M）、2022 年 1 月（€50M Series B，Sequoia
          领投）、2024 年 10 月（€80M Series C，€1B 估值）、2025 年 4 月（€75M，€2B 估值）、2026 年 1 月（€175M Series D，TCV 领投，€3.6B 估值）。2024
          年 10 月至 2026 年 1 月估值复合跃升 3.6×，相对披露 ARR 增长显得激进。
        claimRefs:
          - CI001
          - CI002
          - CI003
          - CI004
  - id: B
    title: 竞争定位摘要
    blocks:
      - type: paragraph
        body: >-
          Pennylane 的主要直接竞争者是 Sage（Sage Active、Sage 50、约 2M 法国用户）、Cegid（中端市场会计软件）和 Indy（微型企业自助）。QuickBooks France 2023
          年初退出，移除了一家主要竞争者，并创造了估算 100,000 用户迁移机会。更广泛 TAM 包括传统桌面会计工具（EBP、Quadratus），这是云迁移的长期流失池，估算有 3-4 million 家法国 SMB
          尚未使用云会计。Pennylane 的双渠道模型（直接 SMB + 会计师主导）在结构上优于单渠道竞争者。
        claimRefs:
          - CO001
          - CO003
