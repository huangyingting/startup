      - number: '5.3'
        title: API 和集成生态
        blocks:
          - type: paragraph
            body: >-
              Pennylane 的 300+ 个集成，是法国云会计软件中覆盖最广的第三方连接生态之一。pennylane.com/fr/integrations 上的集成市场将集成按功能归类，包括金融科技 /
              银行（Qonto、Airwallex、Aria、PayFit）、支付处理（Stripe）、电商（Amazon Business）、POS
              系统（6XPOS、AddicTill、Atilla）和无代码自动化（Albato）。每类集成的战略逻辑都是把财务交易数据自动拉入 Pennylane 的会计引擎，减少人工录入，并提升平台数据完整性。[CE019]
              [CE021] [CE025] [CE026]

              公开 API 已上线，文档位于 pennylane.com/fr/api-documentation 和 developer.pennylane.com。API 让第三方开发者和企业客户可以用程序访问
              Pennylane 的会计、开票和财务数据能力。专门的 GitHub 组织（PennylaneAI）托管与 AI/ML 工具和数据抽取相关的公开仓库；Medium
              上的工程技术博客（medium.com/pennylane-tech）向外部开发者发布架构和运营内容。这些开发者界面——公开 API、GitHub
              存在和工程博客——满足本章对开发者信号的要求，也说明公司有意构建平台生态，而不是封闭产品。[CE020] [CE022] [CE023] [CE024]

              集成生态并不对称：Pennylane 扮演记录系统（所有财务数据最终进入 Pennylane 账本），第三方工具则是数据源。Qonto 提供银行交易数据；Stripe 提供支付事件数据；PayFit
              提供薪资分录；Amazon Business 提供采购收据。每一种集成都减少会计师或 SMB 记账人员的手工工作，同时提高 Pennylane
              的数据重力：启用的集成越多，会计账本越完整、越及时，切换成本也越高。[CE019] [CE025] [CE026] [CE042]

              一个重要但书：虽然 pennylane.com/fr/api-documentation 有公开链接，但截至 2026 年 5 月，developer.pennylane.com
              的开发者门户无法通过公开网页抓取访问，说明详细 API 文档可能需要认证。这限制了外部开发者在没有合作协议时独立评估 API 范围和完整性的能力；相较 Xero 或 QuickBooks Online
              这类拥有完全公开开发者中心的平台，这也是 Pennylane 开发者生态开放度的缺口。[CE037] [CE038]
