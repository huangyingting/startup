- id: TU005
  title: Expansion and concentration risk table
  columns:
  - Expansion Driver
  - Concentration Risk
  - Impact
  - Diligence Path
  rows:
  - - Alliance landlord expansion (add more REITs and property managers)
    - Top-5 Alliance landlords may represent 50%+ of addressable units
    - Loss of one large REIT reduces consumer acquisition pipeline materially
    - Map revenue contribution per Alliance partner; negotiate multi-year exclusivity
  - - Geographic diversification into Sunbelt and secondary markets
    - Current footprint skews toward coastal metros (NYC, SF, LA, Boston)
    - Geographic concentration creates macro-cyclical risk
    - Track Alliance property distribution by metro; identify top-5 market exposure
  - - Homebuyer conversion path (rent-to-own)
    - Single product extension; requires mortgage partner integrations
    - Delays or failed mortgage partnerships limit expansion flywheel
    - Request roadmap timeline and status of mortgage partner negotiations
  - - Merchant network growth (Neighborhood Commerce)
    - 40,000+ partners; no single partner dominant
    - Low single-merchant concentration risk; moderate sector concentration (dining)
    - Obtain top-10 merchants by GMV; assess dining sector dependency
  - - Card network (Mastercard exclusivity)
    - Single network provider; no disclosed multi-network strategy
    - Mastercard fee increase or partnership termination would be operationally disruptive
    - Review Mastercard contract terms and exclusivity duration
  - - Issuing bank (Cardless/Column N.A.)
    - Single issuing relationship; prior Wells Fargo exit demonstrates migration risk
    - Future issuer exit could trigger another 12–18 month migration and cardholder attrition
    - Assess Cardless contractual term and exit provisions; evaluate backup issuer strategy
  notes: Impact ratings are qualitative analyst assessments based on publicly available information.

