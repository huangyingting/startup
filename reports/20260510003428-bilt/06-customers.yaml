  - Buyer/User/Payer
  - Use Case
  - Scale
  - Revenue/Strategic Value
  - Evidence Gap
  rows:
  - - Individual renter (B2C cardholder)
    - User + payer (interchange revenue)
    - Pay rent on credit card; earn rewards; build credit
    - "~46M US renter HH TAM; Bilt penetration unconfirmed"
    - Primary revenue source via interchange; lifetime value tied to rent tenure
    - Cardholder count and active user metrics not disclosed
  - - Landlord / property manager (B2B Alliance)
    - Partner + demand-side customer
    - Attract renters, streamline ACH rent collection, reduce payment friction
    - "4,000+ Alliance properties; ~5M units"
    - Acquisition flywheel; organic cardholder growth; no direct fee revenue
    - Churn rate among landlords; outcome metrics not disclosed
  - - Merchant partner (Neighborhood Commerce)
    - Merchant advertiser
    - Drive foot traffic and spend from Alliance residents and cardholders
    - "40,000+ partners across dining, retail, travel"
    - Incremental revenue via merchant-funded rewards; reduces interchange cost to Bilt
    - Revenue contribution per merchant and merchant churn not disclosed
  - - Transfer / redemption partner (airlines, hotels)
    - Distribution partner
    - Accept Bilt points as loyalty currency; drive travel revenue
    - "14 partners (AA, United, Hyatt, Marriott, etc.)"
    - Brand differentiation; partners attract premium cardholder demographic
    - Transfer volume by partner not disclosed; average redemption rate unknown
  - - Homebuyer prospect (emerging segment)
    - Future payer + user
    - Convert long-term renters to Bilt-assisted homebuyers
    - US first-time buyer pipeline (estimated 3–4M/yr)
    - Long-term loyalty and fee revenue from mortgage origination partnerships
    - Product not yet launched at scale; no customer proof
  notes: Revenue/strategic value and evidence gaps are analyst estimates where not disclosed.

