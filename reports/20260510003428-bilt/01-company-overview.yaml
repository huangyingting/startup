  - type: access-restricted
    severity: material
    topic: financial
    missingEvidence: Bilt Rewards' revenue run rate, gross margin, and profitability have not been publicly disclosed or audited.
    whyItMatters: Without revenue and margin data, it is impossible to assess whether the $10.75B valuation implies a reasonable
      revenue multiple or whether the business model is economically sustainable.
    diligencePath: Request audited financials from Bilt's investor relations team or seek data from investors with board access.
    relatedQuestionRefs:
    - QO017
