- id: overview-adverse
  title: 'Adverse Findings: Wells Fargo Partnership Economics and Transition'
  body: 'The most significant adverse finding in Bilt Rewards'' company history concerns the economics of its original partnership
    with Wells Fargo. Multiple credible sources, including Bloomberg, Bisnow, and loyalty industry reporters, documented in
    2024 that Wells Fargo was losing approximately $10 million per month—or roughly $120 million per year—from the Bilt Mastercard
    partnership.


    The losses stemmed from a structurally unfavorable partnership arrangement: Wells Fargo paid Bilt approximately 0.8% on
    every rent transaction processed and approximately $200 for each new card account opened, while the bank earned minimal
    interest revenue because a high proportion of Bilt cardholders paid their balances in full each month. The traditional
    credit card profitability model requires a combination of interest income from revolving balances and interchange revenue.
    Bilt''s cardholder base—which skews toward financially savvy urban renters who primarily use the card for rent and pay
    balances immediately—generated insufficient interest income to offset the fees Wells Fargo paid to Bilt. Furthermore,
    rent transactions do not generate the same merchant interchange income as typical retail transactions.


    Wells Fargo exited the partnership before its originally intended 2029 end date. Applications for the Wells Fargo Bilt
    Mastercard ceased in November 2025, and the card was fully discontinued on February 6, 2026. While the transition to Cardless
    was positioned as a product upgrade, the Wells Fargo exit raises a critical question for diligence: can Bilt''s economic
    model generate sustainable economics for its banking partners? If not, the $10.75B valuation may rest on a business model
    whose unit economics are structurally challenged beyond the initial Wells Fargo context.

    '
