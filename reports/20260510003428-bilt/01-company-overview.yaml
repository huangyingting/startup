chapter:
  number: 1
  title: Company Overview
  summary: Bilt Rewards is a New York-based fintech and loyalty platform founded in 2021 by Ankur Jain that created the first
    credit card allowing renters to earn rewards on rent payments with no transaction fees. The Bilt Mastercard, originally
    issued by Wells Fargo and transitioning to Cardless in February 2026, operates alongside the Bilt Alliance network covering
    1 in 4 US apartment buildings. Bilt raised $250M at a $10.75B valuation in July 2025 but faces scrutiny over the Wells
    Fargo partnership losses of ~$10M/month and an unclear path to profitability.
sections:
- id: overview-identity
  title: Company Identity and Foundation
  body: 'Bilt Rewards is a New York City-based fintech and loyalty platform company founded in 2021 by Ankur Jain. The company
    identified a critical gap in the US consumer rewards market: rent is typically the largest monthly expense for most households—averaging
    over $1,370/month as of 2025—yet it generated no credit card rewards because landlords historically refused to pay the
    card processing fees associated with credit card acceptance. Bilt''s core innovation was creating a loyalty program and
    credit card that allowed renters to earn rewards points on rent payments without passing transaction fees to landlords.


    Ankur Jain, the CEO and founder, previously founded Kairos, an entrepreneurship and networking community for young leaders,
    and worked at Tinder. He is the son of Naveen Jain, a tech entrepreneur and investor who became an early backer of Bilt.
    The company''s headquarters are in New York, NY, and it operates at the intersection of fintech, proptech, and loyalty
    rewards.


    The mechanism for no-fee rent payment works by having Bilt process the transaction: the renter uses their Bilt Mastercard
    to initiate payment, and Bilt then disburses funds to the landlord via ACH transfer or paper check at no cost to the property
    owner. The renter earns points while the landlord receives their payment via traditional banking channels, sidestepping
    card acceptance fees entirely.


    By 2025, Bilt had evolved from a single rent-focused credit card into a broader housing lifecycle loyalty platform. The
    company covers 1 in 4 US apartment buildings through its Bilt Alliance property network, partners with over 40,000 merchants,
    and launched Bilt Home—a product enabling renters to apply accumulated points toward home down payments. The July 2025
    strategic investment from United Wholesale Mortgage formalized the company''s expansion into mortgage payment rewards.

    '
