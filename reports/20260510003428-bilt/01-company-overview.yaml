- id: overview-funding
  title: Funding History and Investor Base
  body: 'Bilt Rewards has raised approximately $400 million in total funding across multiple rounds, achieving a valuation
    of $10.75 billion as of July 2025. The company''s fundraising trajectory demonstrates accelerating investor conviction
    despite the absence of publicly disclosed revenue or profitability figures.


    The most recent Series D round—$250 million in July 2025—was led by General Catalyst and Global Investment Dynamics (GID),
    with a notable $100 million strategic investment from United Wholesale Mortgage (UWM) reflecting a partnership to build
    mortgage payment rewards infrastructure. Prior to this, in August 2024, Bilt raised $150 million led by Ontario Teachers''
    Pension Plan Venture Growth arm at a $3.25 billion valuation, with new institutional investors including Vanderbilt University
    Endowment and the University of Illinois Foundation. An earlier Series B round (approximately $200M at ~$3.1B valuation
    in January 2023) provided the capital for national Bilt Alliance expansion.


    Key early and strategic investors include Camber Creek, a proptech-focused venture fund that contributed real estate industry
    connections, and Naveen Jain, the technology entrepreneur and Ankur Jain''s father. The investor mix—spanning fintech
    VCs, real estate funds, pension funds, and strategic corporate investors—reflects Bilt''s multi-sector positioning.


    The valuation increased 3.3x in approximately 11 months from $3.25 billion (August 2024) to $10.75 billion (July 2025),
    signaling strong investor conviction in Bilt''s growth story. The company publicly targeted $1 billion in revenue by Q1
    2026 and reported processing over $100 billion annually in housing spend by end of 2025. Neither revenue figure nor profitability
    data has been independently verified.

    '
