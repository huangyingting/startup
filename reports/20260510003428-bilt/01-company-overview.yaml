    severity: material
    topic: cardholders
    missingEvidence: The total number of active Bilt Mastercard cardholders has not been publicly confirmed.
    whyItMatters: Cardholder count is a key unit economics driver—it determines interchange revenue base and growth trajectory.
    diligencePath: Seek company disclosure or industry estimates from credit card data providers.
    relatedQuestionRefs:
    - QO016
  - type: no-data-found
    severity: material
    topic: wells-fargo-successor
    missingEvidence: The economics of Bilt's arrangement with Cardless, Fidem Financial, and Column N.A. (the Bilt 2.0 banking
      partners) are not publicly disclosed.
    whyItMatters: Given Wells Fargo lost ~$10M/month, understanding the new economics is critical to assessing whether Bilt's
      model is structurally viable for banking partners.
    diligencePath: Review Cardless partnership terms and request economic modeling from Bilt.
    relatedQuestionRefs:
    - QO008
