- id: overview-product
  title: 'Core Products: Bilt Mastercard, Bilt 2.0, and the Bilt Wallet'
  body: 'Bilt Rewards'' core product is the Bilt Mastercard, originally issued by Wells Fargo, which allowed renters to pay
    rent and earn points with no annual fee and no transaction fees to landlords. The original card earned 1x points on rent
    (requiring at least 5 monthly transactions to unlock rent rewards), 3x on dining, 2x on travel, and 1x on all other purchases.
    A monthly "Rent Day" promotion on the first of each month doubled points on non-rent purchases, incentivizing cardholders
    to use Bilt for everyday spending beyond rent.


    The Bilt Wallet mobile application (available on iOS and Android) serves as the central hub for the loyalty program, enabling
    renters to pay rent, track points, browse merchant offers, manage travel partner transfers, and access fitness partner
    discounts. As of 2025, the Bilt Wallet app maintained a 4.6+ star rating on the Apple App Store.


    In February 2026, Bilt launched Bilt Card 2.0 in partnership with Cardless (with banking via Fidem Financial and Column
    N.A.), replacing the Wells Fargo-issued card. The new card suite introduced three tiers: a no-annual-fee card, a $95 annual
    fee card, and a $495 premium card. The most significant innovation was extending rewards to mortgage payments—the first
    card in the industry to do so broadly—enabling Bilt''s expansion from a renter-focused company to a housing lifecycle
    loyalty platform covering rent, mortgage, and the transition to homeownership.


    The Bilt Home product allows renters to apply accumulated Bilt points toward home purchase down payments. The partnership
    with United Wholesale Mortgage, which invested $100M in the July 2025 round, provides institutional mortgage infrastructure
    to support this product line. The card also offers free rent and mortgage payment reporting to major credit bureaus, helping
    renters and homeowners build credit history through their housing payments.

    '
