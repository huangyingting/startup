  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards operates as a housing-centric loyalty and fintech platform. For the end consumer, the Bilt
              product manifests as: (1) a World Elite Mastercard credit card, (2) a mobile application (iOS and
              Android), and (3) a rewards redemption ecosystem spanning airline transfers, Bilt Home real estate
              services, and local merchant offers.


              The primary customer workflow is: (a) renter signs up for Bilt card and downloads the app; (b) renter
              links their bank account and sets up rent payment via Bilt; (c) each month, Bilt processes the rent
              payment via ACH to the landlord at no fee; (d) the renter earns 1 Bilt point per dollar of rent and
              additional points on dining, travel, and everyday spend; (e) points accumulate and can be transferred to
              14 airline/hotel partners, used for Bilt home down payments, or redeemed for statement credit.


              The landlord workflow (Bilt Alliance) is separate: property managers sign an Alliance agreement, configure
              their property management software (Yardi, RealPage, Entrata, etc.) to accept Bilt-routed payments, and
              display Bilt program materials to tenants. Landlords receive ACH payments identical to standard ACH rent
              transfers with no additional steps or fees.


              With Bilt Card 2.0 (launched February 2026 via Cardless), the product expanded to include: three card
              tiers (Bilt Base $0, Bilt $95/yr, Bilt Elite $495/yr); mortgage payment rewards (the first card to offer
              this broadly); 2x-4x earning rates on higher-tier cards; and enhanced travel perks on the Elite tier.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
      - number: '5.2'
        title: Product Module and Asset Map
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards consists of five discrete product modules, each with distinct technology dependencies and
              maturity levels:


              Module 1 - Bilt Mastercard (Credit Card): The physical and virtual card issued under the Mastercard World
              Elite program. Cards were issued by Wells Fargo Bank N.A. until the Bilt 2.0 transition; now issued by
              Fidem Financial (a subsidiary of Column N.A.) via Cardless. The card product includes: standard credit
              card features (credit line, billing, interest if carried), World Elite Mastercard benefits (travel
              insurance, purchase protection), and Bilt-specific earn rates.


              Module 2 - Bilt Mobile App (iOS and Android): The consumer interface for everything Bilt. Key features
              include: rent payment portal and ACH payment scheduling, rewards dashboard and point balance tracking,
              Bilt neighborhood map (merchant discovery near Alliance buildings), Bilt Home real estate search
              integration, transfer portal to partner loyalty programs, and credit score monitoring. App ratings are
              4.8/5 on Apple App Store (as of 2025 per public data) with 100,000+ downloads per available metrics.


              Module 3 - Bilt Alliance Property Integration Layer: The B2B integration connecting Alliance landlords to
              Bilt's payment routing system. Technical touchpoints include APIs and webhook integrations with property
              management software platforms (Yardi, RealPage, Entrata, Buildium, MRI Software). Each Alliance building
              is enrolled and configured to receive ACH payments via Bilt routing.


              Module 4 - Bilt Home Real Estate Marketplace: A homebuying and home search service enabling Bilt
              cardholders to use accumulated points toward home purchases, mortgage down payments (in partnership with
              UWM), and real estate agent referrals. Bilt Home is integrated with the main Bilt app.


              Module 5 - Neighborhood Commerce Platform: A merchant discovery and rewards ecosystem with 40,000+
              merchant partners. Cardholders earn bonus points at participating restaurants, fitness studios, and
              retailers near Alliance buildings. Merchants are enrolled through a B2B sales process and pay co-marketing
              fees.
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
      - number: '5.3'
        title: Technology Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >-
              Bilt's core technical architecture is a cloud-based fintech stack built on top of Banking-as-a-Service
              (BaaS) and network infrastructure from third parties.


              Core Infrastructure Layer: Mastercard network provides the card payment rails, authorization, and
              settlement. Column N.A. (via Cardless partner Fidem Financial) provides the bank charter, regulatory
              licensing, and ledger infrastructure. Plaid or similar bank linking tools connect consumer bank accounts
              for ACH debit. AWS or similar cloud provider hosts Bilt's application layer.


              ACH Rent Routing (Proprietary Core): Bilt's most distinctive technical component is the ACH payment
              routing system that processes rent payments. When a cardholder initiates rent payment in the Bilt app, the
              system: (1) debits the cardholder via the Bilt card as a credit card transaction; (2) routes payment via
              ACH to the landlord's designated bank account; (3) credits the cardholder's Bilt points account for the
              rent amount. This creates the appearance of a card transaction for rewards purposes while delivering an
              ACH payment to the landlord (who pays no card processing fee). The exact mechanics of how the interchange
              economics work in this ACH-card hybrid structure are not publicly documented and represent a key business
              model secret.


              Alliance Integration Layer: Bilt maintains API integrations with major property management software
              vendors. Yardi and RealPage together serve over 50% of the US multifamily market; Bilt Alliance
              integration with these platforms enables automatic rent payment capture.


              Data Assets: Bilt processes rent payment data for millions of tenants, creating a proprietary dataset of
              housing expenditure patterns, tenant creditworthiness signals, and neighborhood commerce spending. This
              data is a potential long-term competitive asset for credit underwriting, real estate decisions, and
              merchant targeting.


              AI/ML: Bilt has not disclosed AI/ML capabilities beyond standard fraud detection and rewards optimization.
              No generative AI or major ML differentiation is publicly documented.


              Technical Debt and Risks: The Wells Fargo to Cardless migration is a major technical transition affecting
              all existing cardholder accounts. Card number migration, billing system integration, and rewards point
              transfer from one bank ledger to another are complex operations with data integrity and downtime risk.
            claimRefs:
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
      - number: '5.4'
        title: Trust, Security, and Compliance
        blocks:
          - type: paragraph
            body: >-
              Bilt operates at the intersection of banking (card issuer), payments (ACH routing), and consumer data
              (housing expenditure), creating a multi-dimensional compliance profile.


              Payment Card Compliance: As a Mastercard World Elite program, Bilt must comply with PCI-DSS (Payment Card
              Industry Data Security Standard) for cardholder data protection. PCI-DSS compliance is mandatory for
              card-accepting merchants and card program operators; Bilt's compliance is assumed via its Mastercard
              network participation and Cardless/Column N.A. issuer relationships.


              Banking Regulation: Column N.A. (the Bilt 2.0 issuer via Cardless) is a nationally chartered bank
              regulated by the OCC. Column N.A. compliance covers: Bank Secrecy Act (BSA), anti-money laundering (AML),
              Know Your Customer (KYC), credit card consumer protection laws (CARD Act, Truth in Lending Act), and fair
              lending laws (ECOA).


              Consumer Data Privacy: Bilt collects sensitive housing and financial data. Compliance requirements
              include: CCPA (California Consumer Privacy Act) for California renters, GLBA (Gramm-Leach-Bliley Act) for
              financial data privacy, and potentially GDPR for any international operations.


              Consumer Financial Protection: The CFPB has authority over large credit card issuers and has increased
              scrutiny of rewards programs that devalue points or engage in bait-and-switch practices. Bilt's 2025-2026
              rewards structure changes (transition from Wells Fargo to Bilt 2.0) carry CFPB enforcement risk if
              perceived as point devaluation.


              Credit Reporting: Bilt offers rent payment credit reporting to all three major bureaus (Experian, Equifax,
              TransUnion) as a cardholder benefit. This requires compliance with the Fair Credit Reporting Act (FCRA)
              and credit bureau reporting standards.


              Security: No major security breaches involving Bilt cardholder data have been publicly reported as of May
              2026. Security posture is inferred from Mastercard network membership and Cardless/Column N.A. oversight.
            claimRefs:
              - CE016
              - CE017
              - CE018
              - CE019
              - CE020
      - number: '5.5'
        title: Product Roadmap and Differentiation
        blocks:
          - type: paragraph
            body: >-
              Bilt's publicly disclosed roadmap following the Bilt 2.0 launch centers on three priorities: mortgage
              rewards expansion, neighborhood commerce growth, and Bilt Home real estate services scale.


              Roadmap Item 1 - Mortgage Rewards Expansion: Bilt Card 2.0 introduced the industry's first broad mortgage
              payment rewards feature in partnership with United Wholesale Mortgage. The roadmap includes expanding to
              additional mortgage lender partners and simplifying the mortgage earning setup process. This is a
              greenfield opportunity since no other card earns on mortgage payments.


              Roadmap Item 2 - Bilt Elite Card Benefits Enhancement: The $495/yr Bilt Elite card is positioned as a
              premium travel card competing with the Amex Platinum ($695/yr). Roadmap enhancements likely include
              additional travel credits, lounge access, and premium transfer ratios to attract high-value cardholders.


              Roadmap Item 3 - Neighborhood Commerce Scale: Expanding from 40,000 to 100,000+ merchant partners. This
              requires a B2B sales operation and technology to onboard, manage, and track merchant performance at scale.


              Roadmap Item 4 - Bilt Home Platform: Full mortgage origination capabilities through UWM and potentially
              additional lenders. The vision is to convert renters to homeowners through Bilt's loyalty ecosystem.


              Key Differentiation: (1) ACH rent routing with zero landlord fee is the core technical moat; (2) The Bilt
              Alliance property integration layer creates distribution lock-in; (3) Transfer partners across both
              airline and hotel programs give Bilt a redemption ecosystem comparable to Chase UR and Amex MR; (4) The
              nascent mortgage rewards feature is a genuine first-mover position in an untapped market.


              IP and Trade Secrets: Bilt has not disclosed a patent portfolio. The ACH-card hybrid rent routing
              mechanism may be protectable as a business method patent but no patent filings are publicly known. The
              Bilt Alliance enrollment process, merchant co-marketing agreements, and banking partner terms are likely
              protected as trade secrets.
            claimRefs:
              - CE021
              - CE022
              - CE023
              - CE024
              - CE025
