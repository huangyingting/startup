  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - Risk Category
      - Monitoring Indicator
      - Thesis-Break Trigger
      - Diligence Ask
    rows:
      - - Regulatory (CCCA)
        - CCCA legislative progress; committee hearings; banking lobby status
        - CCCA passes Senate committee vote; Mastercard exclusivity no longer viable
        - Request Bilt internal CCCA scenario modeling and contingency plan
      - - Regulatory (CFPB)
        - CFPB reward supervision report; complaint volume trend
        - CFPB issues civil investigative demand or consent order targeting Bilt
        - Review complaint log; assess rewards disclosure documentation quality
      - - Partner (issuer exit)
        - Cardless financial health; Column N.A. regulatory standing
        - Cardless announces inability to continue or seeks new ownership
        - Assess Cardless balance sheet; review issuing agreement term and exit clauses
      - - Financial (unit economics)
        - Per-cardholder interchange vs. reward cost trend
        - Demonstrated negative unit economics after 24 months of Cardless partnership
        - Request cohort P&L; validate interchange vs. reward cost per cardholder
      - - Consumer attrition (migration)
        - Post-Feb 2026 complaint volume; card cancellation rate
        - '>25% cardholder attrition within 12 months post-migration'
        - Request monthly cardholder count before and after migration cutover
      - - Key-person (CEO)
        - Ankur Jain public activity; board announcements; leadership tenure
        - Jain departure announced without identified successor
        - Assess management team depth; request board succession plan
    notes: Criteria are conditions that would make continued investment support unviable.
    enumerationScope:
      coverage: partial
      basis: >-
        Key risk categories identified from public regulatory filings, news reports, and industry analysis; full Bilt
        internal risk register is not publicly available.
  - id: TV001
    title: Recommendation summary table
    columns:
      - Dimension
      - Rating
      - Notes
    rows:
      - - Recommendation
        - Conditional Positive (Monitor)
        - Compelling strategic moat; unit economics unproven
      - - Confidence
        - Medium
        - No audited financials; reliant on management representation
      - - Risk Rating
        - High
        - Regulatory, issuer dependency, and key-person risks are material
      - - Valuation Stance
        - Expensive at ~24x estimated revenue
        - Requires 30%+ CAGR and margin improvement to justify $10.75B
      - - Exit Horizon
        - 4-7 years
        - Earliest IPO 2027-2028 pending revenue visibility and margin proof
      - - Diligence Threshold
        - Full data room required
        - Unit economics, program cost, and issuer terms must be verified
    claimRefs:
      - CV040
      - CV001
      - CV007
      - CV031
    notes: Recommendation based on public signals only; full data room required to upgrade confidence from Medium to High.
  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - Thesis Pillar
      - Anti-Thesis Counter
    rows:
      - - Alliance = proprietary renter acquisition moat (5M+ units)
        - Alliance is voluntary; any top-5 REIT exit triggers negative flywheel
      - - 14 transfer partners at 1:1 create durable loyalty currency
        - Partners can exit or devalue; Bilt points alterable unilaterally by ToS
      - - Rent flywheel generates monthly top-of-app engagement
        - LoyaltyOne collapsed with similar cross-subsidy structure at scale
      - - Ankur Jain network accelerates Alliance and investor relationships
        - Founder-CEO concentration is the single largest execution risk
      - - TAM expansion into mortgage, insurance, and moving
        - Adjacent products add complexity before core unit economics are proven
    claimRefs:
      - CV021
      - CV023
      - CV026
      - CV028
      - CV022
    notes: >-
      Thesis and anti-thesis derived from public reporting, analyst commentary, and comparable precedent (LoyaltyOne);
      not based on data room access.
