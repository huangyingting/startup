  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >-
              Bilt operates at the intersection of banking, credit card issuance, payments, and rewards. The Credit Card
              Competition Act (CCCA), if enacted, would require card networks to enable routing competition, potentially
              eliminating the Mastercard exclusivity underpinning Bilt interchange model. The CFPB issued supervisory
              guidance in 2024 examining credit card rewards programs for devaluation and opacity; Bilt complex
              earn/burn rules and Trustpilot complaint volume make it a potential enforcement target. The CARD Act
              requires clear disclosure of fee structures under Regulation Z. State money-transmission licensing is
              partially mitigated by Column N.A. federal bank charter preemption. Privacy risks under CCPA/CPRA apply to
              Bilt consumer data aggregation. No material class action litigation identified as of Q1 2026, but exposure
              grows with scale.
            claimRefs: []
      - number: '7.2'
        title: Operational, Technical, and Security Risk
        blocks:
          - type: paragraph
            body: >-
              Bilt core value proposition depends on seamless ACH rent payment routing. A failure on the 1st of the
              month, when Rent Day and monthly rent coincide, could result in missed rent payments for millions of
              renters, immediate landlord relationship damage, and regulatory scrutiny under Regulation E. Dependence on
              Cardless and Column N.A. for card issuance creates technical concentration: any platform outage propagates
              to all Bilt cardholders simultaneously with no disclosed failover path. PCI-DSS compliance is essential
              for cardholder data security; a breach would trigger multi-state notification obligations within 72 hours,
              potential FTC enforcement, and severe brand damage estimated at M+ in direct costs. Fraud via
              fake-landlord collusion to earn rent rewards is a novel attack vector without historical loss benchmarks.
              The February 2026 Wells Fargo to Cardless migration involved complex cardholder data transfer and card
              reissuance; any data integrity error could trigger Regulation E violations and CFPB scrutiny. App
              reliability during peak usage (Rent Day spikes) is an ongoing operational challenge with no public SLA
              disclosed.
            claimRefs: []
      - number: '7.3'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >-
              Bilt business model is deeply dependent on a small number of critical partners across issuing, network,
              and distribution layers. The issuing bank (Cardless/Column N.A.) is a single point of failure for all card
              operations; the Wells Fargo exit at ~20M annual losses demonstrates that issuing bank relationships
              deteriorate rapidly when program economics misalign. Cardless replaces one concentration with another and
              has not disclosed backup issuer arrangements. Mastercard is the sole card network; any renegotiation of
              interchange rates, World Elite benefit requirements, or exclusivity terms could materially alter Bilt
              economics, and there is no disclosed multi-network strategy. The Bilt Alliance depends on continued
              participation from large REITs; exit of a top-3 landlord (Equity Residential, AvalonBay, or Greystar)
              would significantly reduce the consumer acquisition flywheel and may trigger a negative flywheel effect as
              cardholder growth slows. Airline and hotel transfer partners (14 total) are critical to rewards
              proposition value; loss of United or American Airlines would trigger point devaluation and cardholder
              churn. RealPage, Yardi, and MRI Software integrations for rent collection in Alliance buildings are
              additional third-party dependencies with API change and exclusivity risks.
            claimRefs: []
      - number: '7.4'
        title: Financial and Business Model Risk
        blocks:
          - type: paragraph
            body: >-
              Bilt financial model is unproven at scale. Rent transactions generate no interchange revenue for the
              issuing bank, yet Bilt credits 1x points per dollar of rent paid - subsidized by non-rent interchange from
              dining (3x), travel (2x), and other spend (1x). Wells Fargo ~20M annual loss shows the cross-subsidy model
              has not closed at current cardholder spend levels; the estimated program cost of 50M/yr far exceeds
              publicly discernible revenue. Bilt 0.75B valuation implies ~24x estimated 2025 revenue, requiring dramatic
              growth to justify premium; any slowdown in cardholder acquisition or regulatory setback could trigger a
              down-round. Card-level margin compression could worsen if CCCA passes, reducing interchange by 25-50%, or
              if transfer partner programs raise point redemption costs. Fraud losses on the rent-payment channel are an
              emerging financial risk without historical benchmarks in the credit card industry. Bilt has no disclosed
              public financial statements, making burn rate, runway, and unit economics impossible to independently
              verify without data room access. The 50M Series D provides runway but does not resolve the structural
              question of whether rent rewards can ever be self-funding.
            claimRefs: []
      - number: '7.5'
        title: People, Execution, and Governance Risk
        blocks:
          - type: paragraph
            body: >-
              Bilt founder and CEO Ankur Jain is the singular face of the brand and the central holder of investor,
              landlord, and media relationships. No COO, President, or clearly identified successor has been announced
              publicly. This key-person concentration is rated as Very High impact: a Jain departure without succession
              planning would create immediate uncertainty for investors, Alliance landlords evaluating contract
              renewals, and transfer partners assessing multi-year commitments. Rapid growth from concept to 0.75B
              valuation in under 5 years creates organizational scaling risks across engineering, compliance, Alliance
              sales, and operations. Fintech compliance talent (BSA/AML, CARD Act, CFPB regulatory relations) is scarce
              and expensive in the current market. The February 2026 issuing bank migration from Wells Fargo to Cardless
              was the largest operational project in Bilt history; execution quality cannot be independently verified
              from public disclosures. Board composition, audit committee, and governance documents are not publicly
              available, limiting assessment of risk oversight maturity. Investor concentration with General Catalyst as
              Series D lead creates alignment risk if growth targets are missed.
            claimRefs: []
