      - number: '1.3'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards has raised approximately $400 million in total funding across multiple rounds, achieving a
              valuation of $10.75 billion as of July 2025. The company's fundraising trajectory demonstrates
              accelerating investor conviction despite the absence of publicly disclosed revenue or profitability
              figures.


              The most recent Series D round—$250 million in July 2025—was led by General Catalyst and Global Investment
              Dynamics (GID), with a notable $100 million strategic investment from United Wholesale Mortgage (UWM)
              reflecting a partnership to build mortgage payment rewards infrastructure. Prior to this, in August 2024,
              Bilt raised $150 million led by Ontario Teachers' Pension Plan Venture Growth arm at a $3.25 billion
              valuation, with new institutional investors including Vanderbilt University Endowment and the University
              of Illinois Foundation. An earlier Series B round (approximately $200M at ~$3.1B valuation in January
              2023) provided the capital for national Bilt Alliance expansion.


              Key early and strategic investors include Camber Creek, a proptech-focused venture fund that contributed
              real estate industry connections, and Naveen Jain, the technology entrepreneur and Ankur Jain's father.
              The investor mix—spanning fintech VCs, real estate funds, pension funds, and strategic corporate
              investors—reflects Bilt's multi-sector positioning.


              The valuation increased 3.3x in approximately 11 months from $3.25 billion (August 2024) to $10.75 billion
              (July 2025), signaling strong investor conviction in Bilt's growth story. The company publicly targeted $1
              billion in revenue by Q1 2026 and reported processing over $100 billion annually in housing spend by end
              of 2025. Neither revenue figure nor profitability data has been independently verified.
            claimRefs:
              - CO005
              - CO006
              - CO007
              - CO008
              - CO009
              - CO022
              - CO023
              - CO026
              - CO032
      - number: '1.4'
        title: 'Adverse Findings: Wells Fargo Partnership Economics and Transition'
        blocks:
          - type: paragraph
            body: >
              The most significant adverse finding in Bilt Rewards' company history concerns the economics of its
              original partnership with Wells Fargo. Multiple credible sources, including Bloomberg, Bisnow, and loyalty
              industry reporters, documented in 2024 that Wells Fargo was losing approximately $10 million per month—or
              roughly $120 million per year—from the Bilt Mastercard partnership.


              The losses stemmed from a structurally unfavorable partnership arrangement: Wells Fargo paid Bilt
              approximately 0.8% on every rent transaction processed and approximately $200 for each new card account
              opened, while the bank earned minimal interest revenue because a high proportion of Bilt cardholders paid
              their balances in full each month. The traditional credit card profitability model requires a combination
              of interest income from revolving balances and interchange revenue. Bilt's cardholder base—which skews
              toward financially savvy urban renters who primarily use the card for rent and pay balances
              immediately—generated insufficient interest income to offset the fees Wells Fargo paid to Bilt.
              Furthermore, rent transactions do not generate the same merchant interchange income as typical retail
              transactions.


              Wells Fargo exited the partnership before its originally intended 2029 end date. Applications for the
              Wells Fargo Bilt Mastercard ceased in November 2025, and the card was fully discontinued on February 6,
              2026. While the transition to Cardless was positioned as a product upgrade, the Wells Fargo exit raises a
              critical question for diligence: can Bilt's economic model generate sustainable economics for its banking
              partners? If not, the $10.75B valuation may rest on a business model whose unit economics are structurally
              challenged beyond the initial Wells Fargo context.
            claimRefs:
              - CO010
              - CO011
              - CO021
              - CO033
              - CO035
