  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards competes across three distinct competitive arenas: (1) the premium travel credit card market
              where Chase, Amex, Capital One, and Citi dominate; (2) the rent payment processing market where Plastiq,
              Flex, Till Financial, and ACH-based landlord platforms operate; and (3) the emerging housing-loyalty and
              fintech-for-renters space where startups like RentTrack, Rental Kharma, and Beem operate.


              In the travel credit card arena, Bilt faces formidable incumbents with enormous cardholder bases and
              established rewards ecosystems. Chase Ultimate Rewards has approximately 35 million cardholders across the
              Sapphire, Freedom, and Ink product families. American Express Membership Rewards powers 70 million+ cards
              globally. These programs offer 60,000-100,000 point sign-up bonuses that Bilt historically could not match
              because it offered no traditional sign-up bonus on its base card. However, Bilt 2.0 (launched February
              2026) introduces tiered annual fee cards that may include sign-up offers.


              In the rent payment processing arena, Plastiq allows renters to pay rent via credit card using any card
              but charges a 2.5-3% processing fee to the renter, which negates the value of most rewards programs and is
              prohibited by many landlords. Flex (a BNPL fintech) and Till Financial charge installment-style fees. None
              of these services offer a true free-to-landlord, points-earning model. Bilt's zero-fee model for landlords
              is structurally superior and has driven Alliance building enrollment.


              In the housing-loyalty fintech arena, competitors include: RentTrack (credit reporting via rent); Rental
              Kharma (credit building); Beem (rent payment app); Dwolla and Zego (landlord payment processors). None
              offer consumer rewards programs comparable to Bilt.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: >-
              Chase Sapphire Preferred and Reserve are the dominant travel rewards cards in the US. Chase has
              approximately 35 million credit card customers. The Sapphire Preferred earns 3x on dining and 2x on travel
              with a $95 annual fee and 60,000-point sign-up bonus ($750 travel value). The Reserve earns 3x on dining
              and travel, a $550 annual fee, $300 travel credit, and 100,000-point sign-up bonus. Neither card earns
              points on rent, and Chase has no publicly disclosed plans to enter the rent rewards market. Chase is part
              of JPMorgan Chase, with 2024 consumer banking revenue of $74 billion.


              American Express Gold and Platinum cards compete in the premium rewards segment. Amex Gold earns 4x on
              dining and 3x on US groceries with a $250 annual fee and 90,000-point sign-up bonus. Amex Platinum earns
              5x on flights and has a $695 annual fee with extensive travel benefits. Neither earns on rent. American
              Express had approximately 140 million cards-in-force globally in 2024 with consumer card revenues of $19.2
              billion.


              Capital One Venture and Venture X offer simple 2x miles on all purchases with a $95 annual fee (Venture)
              or $395 annual fee (Venture X). No rent earning is available. Capital One had approximately $15 billion in
              domestic credit card revenue in 2024. The simplicity of the 2x-everywhere model is a competitive threat to
              Bilt for the everyday-spending category.


              Plastiq is a payment service that enables renters and businesses to pay bills via credit card even when
              the recipient does not accept cards. Plastiq charges renters 2.9% per transaction. While this enables
              rent-earning on any card, the fee typically exceeds the rewards earned (unless using a 3x-on-rent card),
              making it economically inferior to Bilt for most renters. Plastiq filed for Chapter 11 bankruptcy in May
              2023 and was acquired by Priority Technology Holdings; it continues to operate under restructured
              ownership.


              Flex is a BNPL (buy now, pay later) fintech that allows renters to split rent into two installment
              payments, charging a 1% monthly fee (approximately $12-15 per month on $1,200 rent). Flex raised $120
              million in a Series B round at an undisclosed valuation in 2023. Flex targets renters who are cash-flow
              constrained rather than rewards-seeking, representing a different buyer motivation from Bilt.


              RealPage, Yardi, and Zego are enterprise property management software platforms with integrated payment
              modules. These serve landlords and property managers rather than renters directly. They process billions
              in rent annually but offer no consumer rewards. As landlord-side infrastructure, they are potential
              distribution partners or incumbents that Bilt must navigate in its Alliance enrollment process.
            claimRefs:
              - CP005
              - CP006
              - CP007
              - CP008
              - CP009
              - CP010
              - CP011
              - CP012
      - number: '3.3'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >-
              The key competitive differentiator for Bilt is rent earning with no fee to landlord. No major credit card
              issuer offers this. Plastiq enables rent earning on any card but imposes a 2.9% payer fee that erodes
              rewards value. The Bilt model is structurally superior for landlords (zero cost) and renters (zero fee,
              1x-2x points on rent).


              Bilt earns 1x points per dollar on rent (up to $50,000/year), 3x on dining, 2x on travel, and 1x
              everywhere else on the base World Elite Mastercard. Bilt 2.0 cards earn up to 2x everywhere on a premium
              tier. This compares unfavorably to Chase Sapphire (3x dining) and Amex Gold (4x dining) on spend
              categories, but favorably when rent is factored in: a renter paying $2,000/month earns 24,000 Bilt
              points/year on rent alone, worth approximately $312-$432 in travel value (at 1.3-1.8 cents/point).


              Transfer partners: Bilt offers 14 airline and hotel transfer partners including American Airlines
              (AAdvantage), United (MileagePlus), Air Canada (Aeroplan), and Hyatt. This transfer partner roster is
              competitive with Chase Ultimate Rewards (14 partners) and less comprehensive than American Express
              Membership Rewards (22 partners).


              No sign-up bonus: Historically, Bilt offered no sign-up bonus, a significant competitive disadvantage in
              acquiring card churners who drive early spend volume. Bilt 2.0 may introduce sign-up offers on higher-tier
              cards, but this has not been confirmed as of May 2026.


              The Bilt Alliance property network represents a distribution capability with no direct equivalent: 5
              million units enrolled creates a captive pipeline of rent-paying cardholders that Chase, Amex, or Capital
              One cannot easily replicate without matching landlord outreach.


              The one-card, five-uses-a-month activation requirement is a unique constraint: Bilt requires cardholders
              to make at least 5 transactions per month to earn rent rewards. This creates a friction point not present
              in competing cards.
            claimRefs:
              - CP013
              - CP014
              - CP015
              - CP016
              - CP017
              - CP018
      - number: '3.4'
        title: Moat Durability and Competitive Risk
        blocks:
          - type: paragraph
            body: >-
              Bilt has two durable competitive advantages: (1) the Bilt Alliance landlord network (enrollment moat) and
              (2) first-mover positioning in rent rewards (perception moat). Both are real but neither is impregnable.


              The Alliance enrollment moat is meaningful because signing up large property management companies (Equity
              Residential, AvalonBay, Greystar) requires dedicated enterprise sales relationships and integration with
              property management software. A new entrant would need 12-24 months to replicate the Alliance at
              comparable scale. However, this moat is not legally protected: a competing card issuer could offer
              equivalent ACH-based rent routing and approach the same property managers directly. The landlord switching
              cost from Bilt Alliance to a competing program is low if the competitor also charges zero landlord fees.


              The perception moat stems from Bilt being the first and most recognized brand in rent rewards. Consumer
              credit card brand switching is low once a card is set up on autopay. Bilt cardholders who route rent
              through Bilt have a natural anchor. However, if a competing issuer (Chase, Amex, or a fintech challenger)
              launched a comparable product with a stronger sign-up bonus, Bilt would face cardholder acquisition
              competition.


              The Wells Fargo partnership transition (announced 2025) to Cardless (Fidem Financial + Column N.A.) is a
              material operational risk. The transition of all existing Bilt World Elite Mastercards to new Bilt 2.0
              cards adds churn risk and potential cardholder attrition. Wells Fargo reportedly lost $10-$12 million per
              month on the Bilt partnership, suggesting the economics were unsustainable from the bank's perspective,
              which is adversarial to Bilt's incumbent moat story.


              The five-transactions-per-month requirement is a structural quirk of Bilt's historic interchange model. If
              Bilt 2.0 eliminates or relaxes this requirement, it improves the user experience and competitive
              positioning but may indicate a shift in the unit economics model that could affect long-term
              profitability.


              Overall moat durability is rated medium: Bilt has meaningful first-mover advantages and network effects in
              the Alliance, but the lack of legally protected IP, the bank partner transition risk, and the theoretical
              ease of competitors entering the rent rewards market warrant caution.
            claimRefs:
              - CP019
              - CP020
              - CP021
              - CP022
              - CP023
              - CP024
              - CP025
