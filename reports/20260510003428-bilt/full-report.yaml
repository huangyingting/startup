  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards operates across three overlapping market segments, each with distinct boundaries, buyers, and
              competitive dynamics. Understanding the market boundary is essential before sizing the opportunity.


              The first and most direct market is the US rent payment market: the aggregate annual flow of rent paid by
              US renters to landlords. As of 2025, approximately 46 million US households rent their homes (35% of all
              US households), paying a median of $1,370 per month, yielding an estimated $756 billion in total annual
              rent payments. This market was historically inaccessible to credit card rewards programs because landlords
              refused to pay card acceptance fees (typically 2.35% of transaction value). Bilt's innovation was to route
              payments via ACH and eliminate fees for landlords while earning rewards through alternative interchange
              structures.


              The second market is the broader US consumer credit card purchase volume and interchange fee economy.
              Total US credit card purchase volume reached $5.92 trillion in 2024, generating approximately $148.5
              billion in interchange fees. Bilt earns from this market when cardholders use Bilt cards for non-rent
              purchases such as dining, travel, and everyday spending.


              The third emerging market—formalized via the July 2025 United Wholesale Mortgage partnership—is the US
              mortgage payment market. An estimated $11 trillion in outstanding mortgage debt services approximately 80
              million homeowners. Bilt Card 2.0 (launched February 2026) is the first card to earn rewards on mortgage
              payments broadly, opening this market for the first time.


              Key excluded spend in Bilt's model includes: landlord-side fees (landlords pay nothing), commercial/office
              rent, vacation rentals, and rent paid through third-party services like Plastiq (where a 2.5-3% fee
              applies to the renter directly, making Bilt structurally superior for landlords who want to avoid
              processing costs).
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
      - number: '2.2'
        title: TAM/SAM/SOM and Market Sizing
        blocks:
          - type: paragraph
            body: >
              Bilt's addressable market can be estimated through three distinct lenses: the rent payment TAM, the
              interchange revenue TAM, and the emerging housing loyalty platform opportunity.


              Lens 1 - Rent Payment TAM: Approximately $756 billion in annual US rent payments as of 2025 (46M
              households x $1,370/month median x 12 months). Bilt's SAM is constrained to renter households where
              payment can be routed through Bilt. With the Bilt Alliance covering 1 in 4 US apartment buildings
              (approximately 5 million of 20 million total US apartment units per NMHC data), and assuming Bilt Alliance
              renters pay an average of $1,500/month, the SAM is approximately $90-100 billion in annual rent payment
              volume. The SOM—actual spend routed through Bilt—is not independently confirmed; Bilt claimed processing
              over $100 billion in total housing spend by end of 2025, which appears to include adjacent non-rent
              categories.


              Lens 2 - Interchange Revenue TAM: Total US credit card interchange revenues were approximately $148.5
              billion in 2024 (up from $136 billion in 2023), growing at 5-8% annually. At an average blended
              interchange rate of 1.5-2.35% on non-rent spend, Bilt participates in a fraction of this pool. The
              rent-specific interchange earned by Bilt is likely lower than standard retail since landlords are not
              traditional card-accepting merchants.


              Lens 3 - Housing Loyalty Platform: With mortgage reward expansion and 40,000+ merchant partners, Bilt
              positions itself as a housing lifecycle loyalty platform. The total US consumer spending on
              housing-related goods and services is measured in the trillions, though only a fraction generates card
              interchange. Market sizing for this lens remains highly uncertain and company-aspiration-driven.


              Multiple estimates for the rental TAM range from $576B (conservative: 40M households x $1,200/month) to
              $828B (high: 46M households x $1,500/month average for urban markets), reflecting genuine uncertainty in
              both household count and average rent paid by the target demographic.
            claimRefs:
              - CM002
              - CM003
              - CM005
              - CM006
              - CM007
              - CM008
              - CM022
              - CM036
              - CM037
      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              Bilt serves a multi-sided market with distinct buyer/user/payer relationships across its primary segments.


              Primary Segment - Urban Renter (25-40 years old): The core Bilt Rewards cardholder is an urban
              professional aged 25-40 who rents an apartment in a Bilt Alliance building or any property accepting
              ACH/check payments. This renter is financially engaged, credit-conscious, and interested in travel or
              lifestyle rewards. They are simultaneously the user, buyer, and payer: they apply for the Bilt card, spend
              on it, and pay the monthly bill. Key adoption triggers include earning rewards on rent (their largest
              expense), free credit building through rent payment reporting, and accumulating travel points.
              Approximately 52% of US renter households are cost-burdened (spending >30% of income on rent), creating
              strong financial motivation to extract value from rent payments.


              Secondary Segment - Landlords and Property Managers (Bilt Alliance): Landlords and property management
              companies are the distribution partners in Bilt's model, not direct revenue payers. They adopt the Bilt
              Alliance because it reduces rent collection friction and attracts quality tenants seeking financial
              benefits. Landlords pay zero fees to participate, creating low adoption friction.


              Tertiary Segment - Homebuyers and Mortgage Holders (Bilt Home / Bilt 2.0): With the mortgage rewards
              expansion, the target user extends to homeowners aged 30-50 who carry mortgages and are willing to pay
              premium annual fees ($95-$495) for mortgage payment rewards.


              Merchant Partners (Bilt Commerce): 40,000+ merchant partners (restaurants, fitness studios, retailers near
              Alliance buildings) participate in the neighborhood commerce platform and pay co-marketing fees, creating
              a local loyalty flywheel. These partners drive additional cardholder spending beyond rent and core
              purchases.
            claimRefs:
              - CM009
              - CM010
              - CM011
              - CM012
              - CM013
              - CM021
      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              Bilt's market growth is driven by several structural tailwinds but faces material headwinds from
              regulatory and competitive forces.


              Key Growth Drivers: (1) Rising renter population - US renter households grew from approximately 40 million
              in 2015 to 46 million in 2025 and are expected to continue growing as housing affordability pressures
              delay homeownership. (2) Millennial/Gen-Z renter engagement - renters aged 25-40 are financially engaged,
              loyalty-program-savvy, and represent high lifetime value credit card customers. (3) Mortgage market
              expansion - Bilt Card 2.0 opens the $3T/year US mortgage payment market as a greenfield opportunity. (4)
              Network effects in the Bilt Alliance - as 1 in 4 US apartments are now in the Alliance, the card offers
              value to a significant portion of all US renters. (5) Platform expansion to 40,000+ merchants creates
              additional spending occasions.


              Key Adoption Constraints: (1) Interchange fee regulation risk - the Credit Card Competition Act and
              Visa/Mastercard interchange fee settlement (~0.1% reduction) could compress Bilt's revenue per
              transaction. At least 13 states are considering interchange fee legislation following Illinois' 2025 law.
              (2) CFPB oversight has increased scrutiny of credit card rewards programs, targeting devaluation of points
              and bait-and-switch tactics. (3) Low switching costs for renters mean competitors can enter the space
              without significant friction. (4) Landlord adoption requires active Bilt Alliance enrollment, creating a
              managed sales process. (5) No traditional sign-up bonus has historically limited Bilt's ability to acquire
              card-churning consumers who drive volume.
            claimRefs:
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
