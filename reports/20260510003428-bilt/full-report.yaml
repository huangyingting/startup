chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Foundation
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards is a New York City-based fintech and loyalty platform company founded in 2021 by Ankur Jain.
              The company identified a critical gap in the US consumer rewards market: rent is typically the largest
              monthly expense for most households—averaging over $1,370/month as of 2025—yet it generated no credit card
              rewards because landlords historically refused to pay the card processing fees associated with credit card
              acceptance. Bilt's core innovation was creating a loyalty program and credit card that allowed renters to
              earn rewards points on rent payments without passing transaction fees to landlords.


              Ankur Jain, the CEO and founder, previously founded Kairos, an entrepreneurship and networking community
              for young leaders, and worked at Tinder. He is the son of Naveen Jain, a tech entrepreneur and investor
              who became an early backer of Bilt. The company's headquarters are in New York, NY, and it operates at the
              intersection of fintech, proptech, and loyalty rewards.


              The mechanism for no-fee rent payment works by having Bilt process the transaction: the renter uses their
              Bilt Mastercard to initiate payment, and Bilt then disburses funds to the landlord via ACH transfer or
              paper check at no cost to the property owner. The renter earns points while the landlord receives their
              payment via traditional banking channels, sidestepping card acceptance fees entirely.


              By 2025, Bilt had evolved from a single rent-focused credit card into a broader housing lifecycle loyalty
              platform. The company covers 1 in 4 US apartment buildings through its Bilt Alliance property network,
              partners with over 40,000 merchants, and launched Bilt Home—a product enabling renters to apply
              accumulated points toward home down payments. The July 2025 strategic investment from United Wholesale
              Mortgage formalized the company's expansion into mortgage payment rewards.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO028
      - number: '1.2'
        title: 'Core Products: Bilt Mastercard, Bilt 2.0, and the Bilt Wallet'
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards' core product is the Bilt Mastercard, originally issued by Wells Fargo, which allowed renters
              to pay rent and earn points with no annual fee and no transaction fees to landlords. The original card
              earned 1x points on rent (requiring at least 5 monthly transactions to unlock rent rewards), 3x on dining,
              2x on travel, and 1x on all other purchases. A monthly "Rent Day" promotion on the first of each month
              doubled points on non-rent purchases, incentivizing cardholders to use Bilt for everyday spending beyond
              rent.


              The Bilt Wallet mobile application (available on iOS and Android) serves as the central hub for the
              loyalty program, enabling renters to pay rent, track points, browse merchant offers, manage travel partner
              transfers, and access fitness partner discounts. As of 2025, the Bilt Wallet app maintained a 4.6+ star
              rating on the Apple App Store.


              In February 2026, Bilt launched Bilt Card 2.0 in partnership with Cardless (with banking via Fidem
              Financial and Column N.A.), replacing the Wells Fargo-issued card. The new card suite introduced three
              tiers: a no-annual-fee card, a $95 annual fee card, and a $495 premium card. The most significant
              innovation was extending rewards to mortgage payments—the first card in the industry to do so
              broadly—enabling Bilt's expansion from a renter-focused company to a housing lifecycle loyalty platform
              covering rent, mortgage, and the transition to homeownership.


              The Bilt Home product allows renters to apply accumulated Bilt points toward home purchase down payments.
              The partnership with United Wholesale Mortgage, which invested $100M in the July 2025 round, provides
              institutional mortgage infrastructure to support this product line. The card also offers free rent and
              mortgage payment reporting to major credit bureaus, helping renters and homeowners build credit history
              through their housing payments.
            claimRefs:
              - CO003
              - CO004
              - CO012
              - CO018
              - CO019
