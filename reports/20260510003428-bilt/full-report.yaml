  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards operates a multi-sided business model with at least five identifiable revenue streams, though
              the company does not publicly disclose financial statements or revenue breakdowns.


              Revenue Stream 1 - Interchange Fees (Primary): When a Bilt cardholder makes a purchase, Bilt earns a share
              of the interchange fee charged to the merchant. The standard World Elite Mastercard interchange rate is
              approximately 2.0-2.35% on non-rent purchases. For rent payments, the effective interchange is lower or
              structured differently since landlords are not traditional card-accepting merchants. The Wells Fargo
              partnership reported losses suggest that rent-specific interchange revenues were significantly below the
              cost of funding the rewards program, which was a key factor in Wells Fargo's exit.


              Revenue Stream 2 - Co-brand Card Economics: Under the Wells Fargo partnership (now transitioning to
              Cardless), Bilt earned revenue from the co-branded card arrangement. Co-branded card economics typically
              include a share of interchange, annual fees (on premium tiers), and potentially a per-account fee. The
              exact terms of the Bilt-Wells Fargo agreement were never disclosed publicly. The transition to Cardless
              may restructure this revenue stream significantly.


              Revenue Stream 3 - Merchant Co-Marketing Fees: Bilt charges its 40,000+ merchant partners co-marketing
              fees to be featured in the Bilt app and to offer bonus points to cardholders. This is a direct revenue
              stream from the merchant network and is similar to the DoorDash, Uber, or Lyft merchant partnership model.


              Revenue Stream 4 - Bilt Home (Real Estate Referral): Bilt earns referral fees and potentially revenue
              share from real estate transactions facilitated through the Bilt Home platform, where users convert
              accumulated points toward home purchase services or mortgage down payments.


              Revenue Stream 5 - Premium Card Annual Fees: Bilt 2.0 introduces tiered annual fee cards ($95 and $495
              tiers). Annual fee revenue is direct revenue from cardholders and a known quantum for modeling.


              Revenue Mix: The exact revenue mix is unknown. Interchange economics are the largest theoretical driver,
              but the Wells Fargo partnership losses suggest the rent-interchange economics are insufficient to cover
              rewards program costs without supplemental revenue. Merchant co-marketing fees and annual fees may be
              growing contributors as the company scales Bilt 2.0.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >-
              Bilt's unit economics are under scrutiny following multiple reports that Wells Fargo lost approximately
              $10-$12 million per month (approximately $120-$144 million annually) on the Bilt Mastercard partnership.
              This adverse evidence is the most material financial data point available about Bilt's card program
              economics.


              Mechanics of the Wells Fargo Losses: The reported losses arise from the structural challenge of the
              rent-rewards model. When a renter pays rent via the Bilt card:

              - Bilt routes the payment via ACH to the landlord (landlord pays no processing fee)

              - The card network processes the transaction but earns little or no interchange since landlords are not
              standard card-accepting merchants

              - Yet Bilt is obligated to fund the cardholder's points (1 Bilt point per dollar of rent, worth
              approximately $0.013-$0.018 when redeemed for travel)

              - On a $1,500 rent payment, Bilt owes the cardholder approximately 1,500 points worth $19.50-$27.00 in
              travel value

              - If little or no interchange is earned on this transaction, the bank funding the rewards has a direct
              loss


              Estimated Revenue Gap: At $10 million/month loss and assuming Wells Fargo funded the rewards program, the
              cumulative losses were approximately $120-$144 million annually. This suggests that non-rent interchange,
              annual fees, and merchant co-marketing fees were insufficient to offset the cost of funding rent rewards.


              Post-Bilt 2.0 Unit Economics: The transition to Cardless (Fidem Financial + Column N.A.) and the new
              tiered annual fee structure ($95/$495) is a deliberate attempt to shift unit economics by:

              (a) Capturing direct annual fee revenue to offset rewards program costs

              (b) Possibly restructuring the rent-interchange mechanics under a new banking framework

              (c) Potentially reducing the per-point cost of redemptions


              Gross Margin Uncertainty: Without audited financials, gross margin is unknown. Credit card program gross
              margins in co-brand arrangements typically range from 15-40% depending on interchange structure, rewards
              funding, and partner economics. Bilt's margins are likely lower given rent-interchange limitations.


              The $250 million annual funding requirement is reported in industry media as the amount Bilt reportedly
              needs to sustain the rewards program. This is approximately $20-$21 million per month in capital
              deployment, supporting a hypothesis of continuing operating losses during this growth phase.
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
              - CI013
      - number: '4.3'
        title: Capital Raised and Public Financial Traction
        blocks:
          - type: paragraph
            body: >-
              Bilt has raised approximately $400 million in total equity since 2019, growing through two 2024-2025
              funding rounds:


              August 2024 - $150 Million at $3.25 Billion: Led by Ontario Teachers' Pension Plan with participation from
              existing investors. This round was used to fund Bilt's expansion of the Alliance network, merchant
              commerce platform, and Bilt Home real estate services.


              July 2025 - $250 Million at $10.75 Billion: Led by General Catalyst with participation from GID Investment
              Advisers and United Wholesale Mortgage. This round tripled Bilt's valuation in approximately 11 months and
              was used to accelerate the mortgage rewards expansion (Bilt Card 2.0) and fund housing ecosystem growth.
              The valuation of $10.75 billion implies 3.3x growth from the August 2024 round.


              Total Cumulative Raise: Bilt has not disclosed its pre-2024 total funding, but press reports suggest
              approximately $200-300 million was raised prior to 2024, bringing the total to approximately $550-700
              million.


              Financial Traction Indicators: Bilt does not disclose revenue, ARR, GMV, or net income. The following
              traction signals are the only publicly available data:

              - Processing over $100 billion annually in housing spend (company claimed, July 2025)

              - 40,000+ merchant partners (company claimed)

              - 1 in 4 US apartment buildings in the Alliance


              Housing spend of $100B/year at average interchange rates of 0.5-1.5% on non-rent spend (with rent portion
              earning minimal interchange) would theoretically yield $500M-$1.5B in gross interchange volume. However,
              the split between rent and non-rent spend is unknown, making revenue estimation highly uncertain.


              Capitalization Adequacy: At $10.75B valuation and $250M raised in July 2025, Bilt has significant capital
              to fund growth. However, if the annual funding requirement is approximately $250M (as reported), the July
              2025 raise provides approximately 12 months of runway before additional capital would be needed, assuming
              no material change in unit economics from Bilt 2.0.
            claimRefs:
              - CI014
              - CI015
              - CI016
              - CI017
