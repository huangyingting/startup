  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Bilt's customer ecosystem spans three distinct groups. First, individual renters who apply for the Bilt
              World Elite Mastercard and pay rent through the app; this B2C segment encompasses all US renter
              demographics but Bilt's marketing and Alliance footprint skew toward urban, higher-income renters aged
              25–45. Second, landlords and property management companies who join the Bilt Alliance to offer the card as
              a tenant benefit—Bilt handles payments, they receive standard ACH with zero processing fees. Third,
              merchant partners (dining, travel, retail) who participate in the Neighborhood Commerce platform, offering
              3x–6x bonus points to cardholders. Bilt's revenue accrues primarily from interchange on cardholder spend,
              while landlords and merchants act as a supply-side acquisition and retention flywheel. The 46 million US
              renter households represent the total addressable consumer pool; Bilt's Alliance penetration (~11% of
              renter households if one person per unit) constitutes a meaningful but early-stage beachhead.
            claimRefs: []
      - number: '6.2'
        title: Adoption Trajectory and Growth Metrics
        blocks:
          - type: paragraph
            body: >
              Bilt has not publicly disclosed total cardholder count or active monthly users, limiting quantitative
              analysis. Proxy indicators include: the company claims $100B+ in annual housing spend processed
              (unverified by third parties); 4,000+ Alliance properties covering ~5 million apartment units across the
              US; 40,000+ merchant partners in the Neighborhood Commerce network; and Series D funding of $250M at a
              $10.75B valuation (July 2025) implying investor confidence in growth trajectory. Wells Fargo's $10–12M
              monthly program losses (equivalent to ~$120M annually) are driven by interchange deficits on rent
              transactions—this figure implies substantial rent transaction volume and indicates a meaningfully large
              and active cardholder base. The Bilt App Store rating of 4.8/5 with 100,000+ ratings suggests strong
              organic consumer engagement. Rent Day (1st of each month, double points on all non-rent purchases) drives
              elevated monthly engagement spikes visible in social media discussions. Cardholder growth rate, active
              user cohorts, and monthly transaction volume are all confidential and constitute a core diligence gap
              requiring direct data room access.
            claimRefs: []
      - number: '6.3'
        title: Named Customer Proof (Landlords and Property Managers)
        blocks:
          - type: paragraph
            body: >
              The Bilt Alliance includes some of the largest institutional apartment operators in the US, providing
              strong named B2B customer proof. Equity Residential, a publicly traded REIT with 93,600 apartment units,
              is a production Alliance participant. AvalonBay Communities (88,000+ units) joined the Alliance and
              promotes the Bilt card to residents. Greystar Real Estate Partners, the largest US apartment manager with
              750,000 units under management, participates in the Alliance, providing substantial scale. GID Investment
              Group (~40,000 units), which also invested in Bilt's Series D, represents a combined investor-customer
              relationship. Camden Property Trust (~58,000 units) and other large multifamily REITs round out the
              Alliance roster. These represent production deployments—landlords actively recommend the Bilt card during
              lease signing and via in-portal payment options. No publicly disclosed outcome metrics (e.g., tenant
              retention lift, payment default reduction) have been shared by these customers, limiting outcome evidence
              quality.
            claimRefs: []
      - number: '6.4'
        title: Retention, Satisfaction, and Durability
        blocks:
          - type: paragraph
            body: >
              Consumer retention signals are mixed. The Bilt Mastercard has no annual fee, lowering churn propensity but
              also reducing switching cost. Monthly Rent Day engagement creates habitual app usage patterns. Trustpilot
              shows 1.8/5 stars (1.8 average from 100+ reviews as of Q1 2026), with complaints clustering around
              customer service response times, points valuation opacity, and card application denials. The Apple App
              Store shows 4.8/5 from 100,000+ ratings—a substantial divergence that may reflect selection bias (happy
              users rate more frequently) or moderation differences. CFPB complaint data shows a moderate volume of
              complaints for a card program of this size, mostly related to billing and rewards redemption. No publicly
              disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR), annual churn rate, or cohort data
              exists. The February 2026 migration from Wells Fargo to Cardless/Column N.A. represents the largest
              retention risk event to date; historical card migration attrition rates of 15–25% (industry benchmark)
              suggest material cardholder loss is possible during the transition period.
            claimRefs: []
      - number: '6.5'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Bilt's land-and-expand model operates on two axes: B2B Alliance expansion (adding more buildings) and B2C
              product depth (adding mortgage/homebuying, neighborhood commerce, credit building). Alliance expansion is
              paced by sales capacity and property management company RFP cycles. Cardholder expansion opportunities
              include: (1) geographic diversification from coastal metros into Sunbelt and secondary markets; (2)
              demographic expansion to older renters and higher-income segments via premium card variants; (3) product
              line extension to homebuyers (Bilt is developing a mortgage rewards path). Concentration risks include:
              heavy reliance on Wells Fargo (now being mitigated via Cardless), dependence on Mastercard for card
              network infrastructure, and the top-10 Alliance landlords representing a disproportionate share of
              eligible renter units. If a major REIT (e.g., Equity Residential) exits the Alliance, it would reduce the
              addressable tenants and weaken the consumer acquisition flywheel.
            claimRefs: []
