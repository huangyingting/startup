companyProfile:
  summary: >-
    Bilt Rewards is a New York-based fintech founded in 2021 by Ankur Jain that enables renters to earn loyalty points
    on rent payments without transaction fees — a structural first in the US credit card market. The Bilt Alliance
    enrolls 1-in-4 US apartments (~5 million units across 4,000+ buildings) as distribution partners; renters earn 1x
    points on rent (processed via ACH at zero cost to landlords), 3x on dining, and 2x on travel. Points transfer at 1:1
    to 14 airline and hotel programs including United, American, and Hyatt. The Bilt Mastercard was originally issued by
    Wells Fargo; in February 2026, Bilt migrated to Cardless (Fidem Financial / Column N.A.) as issuing partner. Wells
    Fargo was reported to have lost ~$10-12M/month on the partnership. Bilt raised $250M at a $10.75B Series D valuation
    in July 2025 (General Catalyst, GID, UWM), following a $150M Series C at $3.25B in August 2024 (Ontario Teachers).
    The $10.75B valuation implies ~24x estimated 2025 revenue — a premium requiring 30%+ CAGR and demonstrable unit
    economics improvement to justify. Bilt's strategic moat is the Alliance distribution flywheel; the anti-thesis is
    the structural similarity to LoyaltyOne, which collapsed under unsustainable issuer subsidy economics.
