  productSummary: >-
    Bilt Rewards' core product is the Bilt Mastercard World Elite credit card, which enables rent points accrual via ACH
    routing (zero transaction fee to landlords and renters). The technical architecture uses a real-time ACH payment
    wrapper that routes rent from tenant to landlord while crediting 1x points to the cardholder. Non-rent spend earns
    3x dining, 2x travel, and 1x other. Points transfer at 1:1 to 14 airline and hotel partners (United, American,
    British Airways, Air Canada, Hyatt, Marriott, etc.). The Bilt Alliance onboards residential buildings and REITs onto
    the platform; Alliance landlords provide in-building marketing, enabling renter acquisition at near-zero CAC. Rent
    Day (1st of each month) is a monthly engagement event with bonus multipliers and lifestyle content. World Elite
    benefits include trip cancellation, cell phone protection, and no annual fee. Card 2.0 (February 2026) launched with
    Cardless as the new issuing platform, replacing Wells Fargo.
  customerFocus: >-
    B2C: US renters (46M renter households), especially high-income, travel-oriented demographics in urban markets. B2B
    Alliance: 4,000+ residential buildings and REITs (Equity Residential, AvalonBay, Greystar, GID, Camden) that
    distribute the Bilt card to residents. Merchant partners: 40,000+ dining and lifestyle merchants in the rewards
    network.
  businessModel: >-
    Revenue from credit card interchange (non-rent spend at 1-3% interchange rates) and potential future enterprise
    Alliance fees. Rent transactions generate zero interchange. Program costs include: rewards liability (1-3x points on
    spend), World Elite Mastercard benefits, and customer acquisition. Estimated annual program cost of ~$250M/yr is
    substantially offset by interchange from non-rent spend; unit economics are not publicly disclosed. No annual fee
    for cardholders.
