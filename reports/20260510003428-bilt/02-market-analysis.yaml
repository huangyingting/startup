      whyItMatters: "International expansion could significantly expand the TAM but introduces regulatory and operational complexity."
      diligencePath: "Monitor Bilt investor announcements and track international property management software integrations."
      relatedQuestionRefs: [QM020]
    - type: no-data-found
      severity: material
      topic: alliance-penetration
      missingEvidence: "The share of Bilt Alliance buildings in large multifamily portfolios (100+ units) accessible to institutional Bilt Alliance enrollment is not known."
      whyItMatters: "Affects the pace of Bilt Alliance growth and the quality of the distribution channel."
      diligencePath: "Cross-reference NMHC data with Bilt Alliance public partner announcements."
      relatedQuestionRefs: [QM019]
    - type: conflicting-estimates
      severity: minor
      topic: market-size
      missingEvidence: "Multiple methodologies yield different rental TAM estimates: $576B to $828B depending on inputs. Bilt claims $100B in housing spend processed, which is far below the TAM but includes non-rent categories."
      whyItMatters: "Overconfidence in the TAM could lead to overestimating Bilt revenue potential; the gap between TAM and actual processed volume is material for SAM/SOM modeling."
      diligencePath: "Triangulate using CFPB, Census, and NMHC data with Bilt processing volume disclosures."
      relatedQuestionRefs: [QM022, QM025]
