- id: TR005
  title: Mitigation and kill criteria table
  columns:
  - Risk Category
  - Monitoring Indicator
  - Thesis-Break Trigger
  - Diligence Ask
  rows:
  - - Regulatory (CCCA)
    - CCCA legislative progress; committee hearings; banking lobby status
    - CCCA passes Senate committee vote; Mastercard exclusivity no longer viable
    - Request Bilt internal CCCA scenario modeling and contingency plan
  - - Regulatory (CFPB)
    - CFPB reward supervision report; complaint volume trend
    - CFPB issues civil investigative demand or consent order targeting Bilt
    - Review complaint log; assess rewards disclosure documentation quality
  - - Partner (issuer exit)
    - Cardless financial health; Column N.A. regulatory standing
    - Cardless announces inability to continue or seeks new ownership
    - Assess Cardless balance sheet; review issuing agreement term and exit clauses
  - - Financial (unit economics)
    - Per-cardholder interchange vs. reward cost trend
    - Demonstrated negative unit economics after 24 months of Cardless partnership
    - Request cohort P&L; validate interchange vs. reward cost per cardholder
  - - Consumer attrition (migration)
    - Post-Feb 2026 complaint volume; card cancellation rate
    - '>25% cardholder attrition within 12 months post-migration'
    - Request monthly cardholder count before and after migration cutover
  - - Key-person (CEO)
    - Ankur Jain public activity; board announcements; leadership tenure
    - Jain departure announced without identified successor
    - Assess management team depth; request board succession plan
  notes: Criteria are conditions that would make continued investment support unviable.
