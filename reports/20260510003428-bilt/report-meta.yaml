  topStrengths:
  - 'Bilt Alliance distribution moat: 1-in-4 US apartments (~5M units) enrolled, providing renter acquisition at near-zero
    CAC with no direct analog at comparable stage.'
  - 14 airline and hotel transfer partners at 1:1 parity, creating earned loyalty currency value that takes 2-3 years minimum
    to replicate competitively.
  - Rent Day monthly engagement flywheel generates top-of-app presence that outperforms traditional credit card activation
    rates.
  - GID co-led Series D as both investor and Alliance landlord, creating strategic alignment between investor and distribution
    partner.
  - $756B US rent market provides a structural TAM with significant underpenetration, offering vertical expansion into mortgage,
    insurance, and moving services.
  topRisks:
  - 'Unit economics unproven: Wells Fargo lost an estimated $120M/yr on the Bilt program; structural rent-interchange deficit
    has not been publicly resolved.'
  - 'CCCA legislative risk: passage would reduce interchange by 25-50%, materially impairing the cross-subsidy model and triggering
    a bear-case valuation of ~$3.5B.'
  - 'Single-issuer concentration: Cardless replaces Wells Fargo as the sole issuing bank; any deterioration in issuer economics
    replicates the Wells Fargo exit scenario.'
  - 'Key-person risk: Bilt brand and Alliance relationships are inseparable from Ankur Jain; no succession plan is publicly
    disclosed.'
  - Valuation premium of ~24x estimated revenue significantly exceeds public fintech comps (Affirm 3.7x, SoFi 3.9x); requires
    30%+ CAGR to justify at exit.
  unresolvedGaps:
  - Per-cardholder unit economics (CAC, LTV, monthly net revenue) are not publicly disclosed; cannot assess whether program
    is self-sustaining.
  - Cardless issuer agreement terms (fee sharing, termination rights, IP) are not public; concentration risk cannot be fully
    quantified.
  - Series D preference stack, anti-dilution provisions, and cap table are not filed publicly; preference overhang is unquantifiable.
  - Alliance renewal rates and landlord NPS by building tier are not disclosed; cannot confirm the distribution flywheel is
    self-reinforcing.
  - Annual program cost model and interchange subsidy structure are estimated; actual Bilt income statement is not available.
