companyProfile:
  summary: Bilt Rewards is a New York-based fintech founded in 2021 by Ankur Jain that enables renters to earn loyalty points
    on rent payments without transaction fees — a structural first in the US credit card market. The Bilt Alliance enrolls
    1-in-4 US apartments (~5 million units across 4,000+ buildings) as distribution partners; renters earn 1x points on rent
    (processed via ACH at zero cost to landlords), 3x on dining, and 2x on travel. Points transfer at 1:1 to 14 airline and
    hotel programs including United, American, and Hyatt. The Bilt Mastercard was originally issued by Wells Fargo; in February
    2026, Bilt migrated to Cardless (Fidem Financial / Column N.A.) as issuing partner. Wells Fargo was reported to have lost
    ~$10-12M/month on the partnership. Bilt raised $250M at a $10.75B Series D valuation in July 2025 (General Catalyst, GID,
    UWM), following a $150M Series C at $3.25B in August 2024 (Ontario Teachers). The $10.75B valuation implies ~24x estimated
    2025 revenue — a premium requiring 30%+ CAGR and demonstrable unit economics improvement to justify. Bilt's strategic
    moat is the Alliance distribution flywheel; the anti-thesis is the structural similarity to LoyaltyOne, which collapsed
    under unsustainable issuer subsidy economics.
  foundedDate: '2021-01-01'
  founders:
  - name: Ankur Jain
    role: Founder & CEO
    background: Former Tinder CPO; son of Naveen Jain (Moon Express); entrepreneur with prior startup exits; primary relationship
      holder for Bilt Alliance and investor network.
    claimRefs:
    - CO002
  foundingLocation: New York, NY, USA
  headquarters: New York, NY, USA
  productSummary: Bilt Rewards' core product is the Bilt Mastercard World Elite credit card, which enables rent points accrual
    via ACH routing (zero transaction fee to landlords and renters). The technical architecture uses a real-time ACH payment
    wrapper that routes rent from tenant to landlord while crediting 1x points to the cardholder. Non-rent spend earns 3x
    dining, 2x travel, and 1x other. Points transfer at 1:1 to 14 airline and hotel partners (United, American, British Airways,
    Air Canada, Hyatt, Marriott, etc.). The Bilt Alliance onboards residential buildings and REITs onto the platform; Alliance
    landlords provide in-building marketing, enabling renter acquisition at near-zero CAC. Rent Day (1st of each month) is
    a monthly engagement event with bonus multipliers and lifestyle content. World Elite benefits include trip cancellation,
    cell phone protection, and no annual fee. Card 2.0 (February 2026) launched with Cardless as the new issuing platform,
    replacing Wells Fargo.
  customerFocus: 'B2C: US renters (46M renter households), especially high-income, travel-oriented demographics in urban markets.
    B2B Alliance: 4,000+ residential buildings and REITs (Equity Residential, AvalonBay, Greystar, GID, Camden) that distribute
    the Bilt card to residents. Merchant partners: 40,000+ dining and lifestyle merchants in the rewards network.'
  businessModel: 'Revenue from credit card interchange (non-rent spend at 1-3% interchange rates) and potential future enterprise
    Alliance fees. Rent transactions generate zero interchange. Program costs include: rewards liability (1-3x points on spend),
    World Elite Mastercard benefits, and customer acquisition. Estimated annual program cost of ~$250M/yr is substantially
    offset by interchange from non-rent spend; unit economics are not publicly disclosed. No annual fee for cardholders.'
  stage: late-stage private
  fundingStatus: '$250M Series D at $10.75B valuation (July 2025, General Catalyst + GID + UWM); $150M Series C at $3.25B
    valuation (August 2024, Ontario Teachers). Total funding: ~$450M+.'
