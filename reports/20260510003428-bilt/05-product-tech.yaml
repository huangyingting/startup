- id: roadmap
  title: Product Roadmap and Differentiation
  body: 'Bilt''s publicly disclosed roadmap following the Bilt 2.0 launch centers on three priorities: mortgage rewards expansion,
    neighborhood commerce growth, and Bilt Home real estate services scale.


    Roadmap Item 1 - Mortgage Rewards Expansion: Bilt Card 2.0 introduced the industry''s first broad mortgage payment rewards
    feature in partnership with United Wholesale Mortgage. The roadmap includes expanding to additional mortgage lender partners
    and simplifying the mortgage earning setup process. This is a greenfield opportunity since no other card earns on mortgage
    payments.


    Roadmap Item 2 - Bilt Elite Card Benefits Enhancement: The $495/yr Bilt Elite card is positioned as a premium travel card
    competing with the Amex Platinum ($695/yr). Roadmap enhancements likely include additional travel credits, lounge access,
    and premium transfer ratios to attract high-value cardholders.


    Roadmap Item 3 - Neighborhood Commerce Scale: Expanding from 40,000 to 100,000+ merchant partners. This requires a B2B
    sales operation and technology to onboard, manage, and track merchant performance at scale.


    Roadmap Item 4 - Bilt Home Platform: Full mortgage origination capabilities through UWM and potentially additional lenders.
    The vision is to convert renters to homeowners through Bilt''s loyalty ecosystem.


    Key Differentiation: (1) ACH rent routing with zero landlord fee is the core technical moat; (2) The Bilt Alliance property
    integration layer creates distribution lock-in; (3) Transfer partners across both airline and hotel programs give Bilt
    a redemption ecosystem comparable to Chase UR and Amex MR; (4) The nascent mortgage rewards feature is a genuine first-mover
    position in an untapped market.


    IP and Trade Secrets: Bilt has not disclosed a patent portfolio. The ACH-card hybrid rent routing mechanism may be protectable
    as a business method patent but no patent filings are publicly known. The Bilt Alliance enrollment process, merchant co-marketing
    agreements, and banking partner terms are likely protected as trade secrets.'
