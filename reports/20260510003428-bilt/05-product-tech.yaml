chapter:
  number: 5
  title: Product & Technology
  summary: Bilt Rewards is a multi-sided fintech platform built on a credit card and mobile app core, with proprietary ACH-based
    rent routing as its key technical differentiator. The product stack includes the Bilt Mastercard (now issued via Cardless/Fidem
    Financial), a mobile app (iOS and Android), the Bilt Alliance property integration layer, the Bilt Home real estate marketplace,
    and the Neighborhood Commerce merchant platform. The core technical moat is the ACH rent routing system that enables zero-fee
    rent payment while maintaining rewards accrual. Key risks include the bank partner transition from Wells Fargo to Cardless,
    no disclosed patent portfolio, and high dependency on Mastercard network and third-party BaaS infrastructure.
sections:
- id: product-definition
  title: Product Definition and Customer Workflow
  body: 'Bilt Rewards operates as a housing-centric loyalty and fintech platform. For the end consumer, the Bilt product manifests
    as: (1) a World Elite Mastercard credit card, (2) a mobile application (iOS and Android), and (3) a rewards redemption
    ecosystem spanning airline transfers, Bilt Home real estate services, and local merchant offers.


    The primary customer workflow is: (a) renter signs up for Bilt card and downloads the app; (b) renter links their bank
    account and sets up rent payment via Bilt; (c) each month, Bilt processes the rent payment via ACH to the landlord at
    no fee; (d) the renter earns 1 Bilt point per dollar of rent and additional points on dining, travel, and everyday spend;
    (e) points accumulate and can be transferred to 14 airline/hotel partners, used for Bilt home down payments, or redeemed
    for statement credit.


    The landlord workflow (Bilt Alliance) is separate: property managers sign an Alliance agreement, configure their property
    management software (Yardi, RealPage, Entrata, etc.) to accept Bilt-routed payments, and display Bilt program materials
    to tenants. Landlords receive ACH payments identical to standard ACH rent transfers with no additional steps or fees.


    With Bilt Card 2.0 (launched February 2026 via Cardless), the product expanded to include: three card tiers (Bilt Base
    $0, Bilt $95/yr, Bilt Elite $495/yr); mortgage payment rewards (the first card to offer this broadly); 2x-4x earning rates
    on higher-tier cards; and enhanced travel perks on the Elite tier.'
