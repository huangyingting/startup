tables:
- id: TE001
  title: Product module / asset matrix
  type: enumeration
  columns:
  - Module
  - Description
  - Primary User
  - Technology Dependencies
  - Maturity
  - Revenue Link
  rows:
  - - Bilt Mastercard
    - World Elite Mastercard credit card with rent and everyday spend rewards
    - Renter cardholder
    - Mastercard network; Cardless/Fidem Financial; Column N.A.
    - Mature (relaunched Feb 2026)
    - Interchange fees; annual card fees
  - - Bilt Mobile App (iOS/Android)
    - Consumer interface for rent payment, rewards, Bilt Home, and commerce
    - Renter cardholder
    - iOS/Android SDKs; Plaid (bank linking); API to Bilt backend
    - Mature (4.8/5 rating)
    - Driver of engagement; no direct revenue
  - - Bilt Alliance Integration Layer
    - B2B API layer connecting landlords to Bilt ACH payment routing
    - Landlord / property manager
    - Yardi API; RealPage API; Entrata; MRI Software
    - Mature (5M+ units enrolled)
    - Enables rent earning (indirect revenue)
  - - Bilt Home Marketplace
    - Real estate search and referral for rent-to-own journey
    - Renter transitioning to homeownership
    - UWM mortgage API; real estate data feeds
    - Growing (launched 2024)
    - Real estate referral fees
  - - Neighborhood Commerce Platform
    - Merchant discovery and co-marketing rewards for cardholders
    - Cardholder + merchant partner
    - Bilt merchant CMS; location services; rewards API
    - Growing (40,000+ merchants)
    - Merchant co-marketing fees
  notes: Module maturity assessed from public product launch dates and app ratings. Revenue link is inferred, not confirmed.
  claimRefs:
  - CE005
  - CE007
  - CE008
