- id: trust-compliance
  title: Trust, Security, and Compliance
  body: 'Bilt operates at the intersection of banking (card issuer), payments (ACH routing), and consumer data (housing expenditure),
    creating a multi-dimensional compliance profile.


    Payment Card Compliance: As a Mastercard World Elite program, Bilt must comply with PCI-DSS (Payment Card Industry Data
    Security Standard) for cardholder data protection. PCI-DSS compliance is mandatory for card-accepting merchants and card
    program operators; Bilt''s compliance is assumed via its Mastercard network participation and Cardless/Column N.A. issuer
    relationships.


    Banking Regulation: Column N.A. (the Bilt 2.0 issuer via Cardless) is a nationally chartered bank regulated by the OCC.
    Column N.A. compliance covers: Bank Secrecy Act (BSA), anti-money laundering (AML), Know Your Customer (KYC), credit card
    consumer protection laws (CARD Act, Truth in Lending Act), and fair lending laws (ECOA).


    Consumer Data Privacy: Bilt collects sensitive housing and financial data. Compliance requirements include: CCPA (California
    Consumer Privacy Act) for California renters, GLBA (Gramm-Leach-Bliley Act) for financial data privacy, and potentially
    GDPR for any international operations.


    Consumer Financial Protection: The CFPB has authority over large credit card issuers and has increased scrutiny of rewards
    programs that devalue points or engage in bait-and-switch practices. Bilt''s 2025-2026 rewards structure changes (transition
    from Wells Fargo to Bilt 2.0) carry CFPB enforcement risk if perceived as point devaluation.


    Credit Reporting: Bilt offers rent payment credit reporting to all three major bureaus (Experian, Equifax, TransUnion)
    as a cardholder benefit. This requires compliance with the Fair Credit Reporting Act (FCRA) and credit bureau reporting
    standards.


    Security: No major security breaches involving Bilt cardholder data have been publicly reported as of May 2026. Security
    posture is inferred from Mastercard network membership and Cardless/Column N.A. oversight.'
