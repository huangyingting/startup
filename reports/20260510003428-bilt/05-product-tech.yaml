- id: product-modules
  title: Product Module and Asset Map
  body: 'Bilt Rewards consists of five discrete product modules, each with distinct technology dependencies and maturity levels:


    Module 1 - Bilt Mastercard (Credit Card): The physical and virtual card issued under the Mastercard World Elite program.
    Cards were issued by Wells Fargo Bank N.A. until the Bilt 2.0 transition; now issued by Fidem Financial (a subsidiary
    of Column N.A.) via Cardless. The card product includes: standard credit card features (credit line, billing, interest
    if carried), World Elite Mastercard benefits (travel insurance, purchase protection), and Bilt-specific earn rates.


    Module 2 - Bilt Mobile App (iOS and Android): The consumer interface for everything Bilt. Key features include: rent payment
    portal and ACH payment scheduling, rewards dashboard and point balance tracking, Bilt neighborhood map (merchant discovery
    near Alliance buildings), Bilt Home real estate search integration, transfer portal to partner loyalty programs, and credit
    score monitoring. App ratings are 4.8/5 on Apple App Store (as of 2025 per public data) with 100,000+ downloads per available
    metrics.


    Module 3 - Bilt Alliance Property Integration Layer: The B2B integration connecting Alliance landlords to Bilt''s payment
    routing system. Technical touchpoints include APIs and webhook integrations with property management software platforms
    (Yardi, RealPage, Entrata, Buildium, MRI Software). Each Alliance building is enrolled and configured to receive ACH payments
    via Bilt routing.


    Module 4 - Bilt Home Real Estate Marketplace: A homebuying and home search service enabling Bilt cardholders to use accumulated
    points toward home purchases, mortgage down payments (in partnership with UWM), and real estate agent referrals. Bilt
    Home is integrated with the main Bilt app.


    Module 5 - Neighborhood Commerce Platform: A merchant discovery and rewards ecosystem with 40,000+ merchant partners.
    Cardholders earn bonus points at participating restaurants, fitness studios, and retailers near Alliance buildings. Merchants
    are enrolled through a B2B sales process and pay co-marketing fees.'
