- id: architecture
  title: Technology Architecture and Operating Model
  body: 'Bilt''s core technical architecture is a cloud-based fintech stack built on top of Banking-as-a-Service (BaaS) and
    network infrastructure from third parties.


    Core Infrastructure Layer: Mastercard network provides the card payment rails, authorization, and settlement. Column N.A.
    (via Cardless partner Fidem Financial) provides the bank charter, regulatory licensing, and ledger infrastructure. Plaid
    or similar bank linking tools connect consumer bank accounts for ACH debit. AWS or similar cloud provider hosts Bilt''s
    application layer.


    ACH Rent Routing (Proprietary Core): Bilt''s most distinctive technical component is the ACH payment routing system that
    processes rent payments. When a cardholder initiates rent payment in the Bilt app, the system: (1) debits the cardholder
    via the Bilt card as a credit card transaction; (2) routes payment via ACH to the landlord''s designated bank account;
    (3) credits the cardholder''s Bilt points account for the rent amount. This creates the appearance of a card transaction
    for rewards purposes while delivering an ACH payment to the landlord (who pays no card processing fee). The exact mechanics
    of how the interchange economics work in this ACH-card hybrid structure are not publicly documented and represent a key
    business model secret.


    Alliance Integration Layer: Bilt maintains API integrations with major property management software vendors. Yardi and
    RealPage together serve over 50% of the US multifamily market; Bilt Alliance integration with these platforms enables
    automatic rent payment capture.


    Data Assets: Bilt processes rent payment data for millions of tenants, creating a proprietary dataset of housing expenditure
    patterns, tenant creditworthiness signals, and neighborhood commerce spending. This data is a potential long-term competitive
    asset for credit underwriting, real estate decisions, and merchant targeting.


    AI/ML: Bilt has not disclosed AI/ML capabilities beyond standard fraud detection and rewards optimization. No generative
    AI or major ML differentiation is publicly documented.


    Technical Debt and Risks: The Wells Fargo to Cardless migration is a major technical transition affecting all existing
    cardholder accounts. Card number migration, billing system integration, and rewards point transfer from one bank ledger
    to another are complex operations with data integrity and downtime risk.'
  claimRefs:
  - CE011
  - CE012
  - CE013
  - CE014
  - CE015
