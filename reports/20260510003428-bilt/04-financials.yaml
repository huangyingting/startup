    - Fees charged to 40,000+ merchant partners for Bilt app featuring and bonus-point offers
    - Fixed or variable co-marketing fee
    - Merchant partners
    - Not disclosed; likely growing
    - Medium
  - - Annual card fees (Bilt 2.0)
    - Direct cardholder fees from $95 (Bilt) and $495 (Bilt Elite) tier cards
    - $95 or $495 per year per cardholder
    - Cardholder
    - New as of Feb 2026; no historical data
    - High
  - - Bilt Home real estate referral
    - Revenue share or referral fees from home purchase services and mortgage processing via Bilt Home
    - Transaction-based referral fee or revenue share
    - Real estate agents, mortgage lenders (UWM)
    - Nascent; launched 2025-2026
    - Low
