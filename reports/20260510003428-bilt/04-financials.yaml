- id: unit-economics
  title: Unit Economics and Cost Structure
  body: 'Bilt''s unit economics are under scrutiny following multiple reports that Wells Fargo lost approximately $10-$12
    million per month (approximately $120-$144 million annually) on the Bilt Mastercard partnership. This adverse evidence
    is the most material financial data point available about Bilt''s card program economics.


    Mechanics of the Wells Fargo Losses: The reported losses arise from the structural challenge of the rent-rewards model.
    When a renter pays rent via the Bilt card:

    - Bilt routes the payment via ACH to the landlord (landlord pays no processing fee)

    - The card network processes the transaction but earns little or no interchange since landlords are not standard card-accepting
    merchants

    - Yet Bilt is obligated to fund the cardholder''s points (1 Bilt point per dollar of rent, worth approximately $0.013-$0.018
    when redeemed for travel)

    - On a $1,500 rent payment, Bilt owes the cardholder approximately 1,500 points worth $19.50-$27.00 in travel value

    - If little or no interchange is earned on this transaction, the bank funding the rewards has a direct loss


    Estimated Revenue Gap: At $10 million/month loss and assuming Wells Fargo funded the rewards program, the cumulative losses
    were approximately $120-$144 million annually. This suggests that non-rent interchange, annual fees, and merchant co-marketing
    fees were insufficient to offset the cost of funding rent rewards.


    Post-Bilt 2.0 Unit Economics: The transition to Cardless (Fidem Financial + Column N.A.) and the new tiered annual fee
    structure ($95/$495) is a deliberate attempt to shift unit economics by:

    (a) Capturing direct annual fee revenue to offset rewards program costs

    (b) Possibly restructuring the rent-interchange mechanics under a new banking framework

    (c) Potentially reducing the per-point cost of redemptions


    Gross Margin Uncertainty: Without audited financials, gross margin is unknown. Credit card program gross margins in co-brand
    arrangements typically range from 15-40% depending on interchange structure, rewards funding, and partner economics. Bilt''s
    margins are likely lower given rent-interchange limitations.


    The $250 million annual funding requirement is reported in industry media as the amount Bilt reportedly needs to sustain
    the rewards program. This is approximately $20-$21 million per month in capital deployment, supporting a hypothesis of
    continuing operating losses during this growth phase.'
