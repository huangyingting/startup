company:
  name: Bilt Rewards
chapter:
  number: 4
  title: Financials
  summary: Bilt Rewards has not disclosed financial statements. Revenue is generated through credit card interchange fees,
    co-branded card economics from Wells Fargo (transitioning to Cardless), merchant co-marketing fees, and points program
    economics. The adverse evidence that Wells Fargo reportedly lost $10-$12 million per month on the Bilt partnership raises
    material questions about Bilt's unit economics and whether the card model is sustainably profitable for banking partners.
    Bilt has raised $400 million in equity ($250M at $10.75B in July 2025; $150M at $3.25B in August 2024) and reportedly
    needs $250 million annually to fund rewards program costs. Capital adequacy and near-term funding requirements are significant
    diligence gaps.
sections:
- id: revenue-model
  title: Revenue Streams and Pricing Model
  body: 'Bilt Rewards operates a multi-sided business model with at least five identifiable revenue streams, though the company
    does not publicly disclose financial statements or revenue breakdowns.


    Revenue Stream 1 - Interchange Fees (Primary): When a Bilt cardholder makes a purchase, Bilt earns a share of the interchange
    fee charged to the merchant. The standard World Elite Mastercard interchange rate is approximately 2.0-2.35% on non-rent
    purchases. For rent payments, the effective interchange is lower or structured differently since landlords are not traditional
    card-accepting merchants. The Wells Fargo partnership reported losses suggest that rent-specific interchange revenues
    were significantly below the cost of funding the rewards program, which was a key factor in Wells Fargo''s exit.


    Revenue Stream 2 - Co-brand Card Economics: Under the Wells Fargo partnership (now transitioning to Cardless), Bilt earned
    revenue from the co-branded card arrangement. Co-branded card economics typically include a share of interchange, annual
    fees (on premium tiers), and potentially a per-account fee. The exact terms of the Bilt-Wells Fargo agreement were never
    disclosed publicly. The transition to Cardless may restructure this revenue stream significantly.


    Revenue Stream 3 - Merchant Co-Marketing Fees: Bilt charges its 40,000+ merchant partners co-marketing fees to be featured
    in the Bilt app and to offer bonus points to cardholders. This is a direct revenue stream from the merchant network and
    is similar to the DoorDash, Uber, or Lyft merchant partnership model.


    Revenue Stream 4 - Bilt Home (Real Estate Referral): Bilt earns referral fees and potentially revenue share from real
    estate transactions facilitated through the Bilt Home platform, where users convert accumulated points toward home purchase
    services or mortgage down payments.


    Revenue Stream 5 - Premium Card Annual Fees: Bilt 2.0 introduces tiered annual fee cards ($95 and $495 tiers). Annual
    fee revenue is direct revenue from cardholders and a known quantum for modeling.


    Revenue Mix: The exact revenue mix is unknown. Interchange economics are the largest theoretical driver, but the Wells
    Fargo partnership losses suggest the rent-interchange economics are insufficient to cover rewards program costs without
    supplemental revenue. Merchant co-marketing fees and annual fees may be growing contributors as the company scales Bilt
    2.0.'
