  - - Rent-linked interchange (ACH)
    - Structured interchange on rent payments routed via ACH from Bilt Alliance buildings
    - Custom rate; likely below standard interchange
    - Unknown; likely renegotiated in Bilt 2.0
    - Insufficient alone to cover rewards program costs (per WF losses)
