- id: capital-traction
  title: Capital Raised and Public Financial Traction
  body: 'Bilt has raised approximately $400 million in total equity since 2019, growing through two 2024-2025 funding rounds:


    August 2024 - $150 Million at $3.25 Billion: Led by Ontario Teachers'' Pension Plan with participation from existing investors.
    This round was used to fund Bilt''s expansion of the Alliance network, merchant commerce platform, and Bilt Home real
    estate services.


    July 2025 - $250 Million at $10.75 Billion: Led by General Catalyst with participation from GID Investment Advisers and
    United Wholesale Mortgage. This round tripled Bilt''s valuation in approximately 11 months and was used to accelerate
    the mortgage rewards expansion (Bilt Card 2.0) and fund housing ecosystem growth. The valuation of $10.75 billion implies
    3.3x growth from the August 2024 round.


    Total Cumulative Raise: Bilt has not disclosed its pre-2024 total funding, but press reports suggest approximately $200-300
    million was raised prior to 2024, bringing the total to approximately $550-700 million.


    Financial Traction Indicators: Bilt does not disclose revenue, ARR, GMV, or net income. The following traction signals
    are the only publicly available data:

    - Processing over $100 billion annually in housing spend (company claimed, July 2025)

    - 40,000+ merchant partners (company claimed)

    - 1 in 4 US apartment buildings in the Alliance


    Housing spend of $100B/year at average interchange rates of 0.5-1.5% on non-rent spend (with rent portion earning minimal
    interchange) would theoretically yield $500M-$1.5B in gross interchange volume. However, the split between rent and non-rent
    spend is unknown, making revenue estimation highly uncertain.


    Capitalization Adequacy: At $10.75B valuation and $250M raised in July 2025, Bilt has significant capital to fund growth.
    However, if the annual funding requirement is approximately $250M (as reported), the July 2025 raise provides approximately
    12 months of runway before additional capital would be needed, assuming no material change in unit economics from Bilt
    2.0.'
