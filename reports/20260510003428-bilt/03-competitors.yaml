company:
  name: Bilt Rewards
chapter:
  number: 3
  title: Competitors
  summary: 'Bilt Rewards occupies a structurally unique position: it is the only credit card that earns rewards on rent payments
    without charging landlords or renters any processing fee. Direct competitors (Chase Sapphire, Amex Gold, Capital One Venture)
    are powerful travel rewards cards but do not earn on rent. Adjacent rent-payment services (Plastiq, Flex) let renters
    charge rent to cards but charge a 2.5-3% fee, making them economically inferior. Landlord-side payment platforms (Yardi,
    RealPage, Zego) serve property managers but offer no consumer rewards. The moat durability is moderate: Bilt has first-mover
    advantage in Alliance building enrollment, but major issuers could enter the market with bank-direct rent products if
    interchange economics allow.'
sections:
- id: competitive-landscape
  title: Competitive Landscape Overview
  body: 'Bilt Rewards competes across three distinct competitive arenas: (1) the premium travel credit card market where Chase,
    Amex, Capital One, and Citi dominate; (2) the rent payment processing market where Plastiq, Flex, Till Financial, and
    ACH-based landlord platforms operate; and (3) the emerging housing-loyalty and fintech-for-renters space where startups
    like RentTrack, Rental Kharma, and Beem operate.


    In the travel credit card arena, Bilt faces formidable incumbents with enormous cardholder bases and established rewards
    ecosystems. Chase Ultimate Rewards has approximately 35 million cardholders across the Sapphire, Freedom, and Ink product
    families. American Express Membership Rewards powers 70 million+ cards globally. These programs offer 60,000-100,000 point
    sign-up bonuses that Bilt historically could not match because it offered no traditional sign-up bonus on its base card.
    However, Bilt 2.0 (launched February 2026) introduces tiered annual fee cards that may include sign-up offers.


    In the rent payment processing arena, Plastiq allows renters to pay rent via credit card using any card but charges a
    2.5-3% processing fee to the renter, which negates the value of most rewards programs and is prohibited by many landlords.
    Flex (a BNPL fintech) and Till Financial charge installment-style fees. None of these services offer a true free-to-landlord,
    points-earning model. Bilt''s zero-fee model for landlords is structurally superior and has driven Alliance building enrollment.


    In the housing-loyalty fintech arena, competitors include: RentTrack (credit reporting via rent); Rental Kharma (credit
    building); Beem (rent payment app); Dwolla and Zego (landlord payment processors). None offer consumer rewards programs
    comparable to Bilt.'
