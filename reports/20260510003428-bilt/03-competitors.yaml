- id: competitor-profiles
  title: Competitor Profiles
  body: 'Chase Sapphire Preferred and Reserve are the dominant travel rewards cards in the US. Chase has approximately 35
    million credit card customers. The Sapphire Preferred earns 3x on dining and 2x on travel with a $95 annual fee and 60,000-point
    sign-up bonus ($750 travel value). The Reserve earns 3x on dining and travel, a $550 annual fee, $300 travel credit, and
    100,000-point sign-up bonus. Neither card earns points on rent, and Chase has no publicly disclosed plans to enter the
    rent rewards market. Chase is part of JPMorgan Chase, with 2024 consumer banking revenue of $74 billion.


    American Express Gold and Platinum cards compete in the premium rewards segment. Amex Gold earns 4x on dining and 3x on
    US groceries with a $250 annual fee and 90,000-point sign-up bonus. Amex Platinum earns 5x on flights and has a $695 annual
    fee with extensive travel benefits. Neither earns on rent. American Express had approximately 140 million cards-in-force
    globally in 2024 with consumer card revenues of $19.2 billion.


    Capital One Venture and Venture X offer simple 2x miles on all purchases with a $95 annual fee (Venture) or $395 annual
    fee (Venture X). No rent earning is available. Capital One had approximately $15 billion in domestic credit card revenue
    in 2024. The simplicity of the 2x-everywhere model is a competitive threat to Bilt for the everyday-spending category.


    Plastiq is a payment service that enables renters and businesses to pay bills via credit card even when the recipient
    does not accept cards. Plastiq charges renters 2.9% per transaction. While this enables rent-earning on any card, the
    fee typically exceeds the rewards earned (unless using a 3x-on-rent card), making it economically inferior to Bilt for
    most renters. Plastiq filed for Chapter 11 bankruptcy in May 2023 and was acquired by Priority Technology Holdings; it
    continues to operate under restructured ownership.


    Flex is a BNPL (buy now, pay later) fintech that allows renters to split rent into two installment payments, charging
    a 1% monthly fee (approximately $12-15 per month on $1,200 rent). Flex raised $120 million in a Series B round at an undisclosed
    valuation in 2023. Flex targets renters who are cash-flow constrained rather than rewards-seeking, representing a different
    buyer motivation from Bilt.


    RealPage, Yardi, and Zego are enterprise property management software platforms with integrated payment modules. These
    serve landlords and property managers rather than renters directly. They process billions in rent annually but offer no
    consumer rewards. As landlord-side infrastructure, they are potential distribution partners or incumbents that Bilt must
    navigate in its Alliance enrollment process.'
