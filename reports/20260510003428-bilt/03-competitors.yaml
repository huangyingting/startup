- id: feature-comparison
  title: Feature and Capability Comparison
  body: 'The key competitive differentiator for Bilt is rent earning with no fee to landlord. No major credit card issuer
    offers this. Plastiq enables rent earning on any card but imposes a 2.9% payer fee that erodes rewards value. The Bilt
    model is structurally superior for landlords (zero cost) and renters (zero fee, 1x-2x points on rent).


    Bilt earns 1x points per dollar on rent (up to $50,000/year), 3x on dining, 2x on travel, and 1x everywhere else on the
    base World Elite Mastercard. Bilt 2.0 cards earn up to 2x everywhere on a premium tier. This compares unfavorably to Chase
    Sapphire (3x dining) and Amex Gold (4x dining) on spend categories, but favorably when rent is factored in: a renter paying
    $2,000/month earns 24,000 Bilt points/year on rent alone, worth approximately $312-$432 in travel value (at 1.3-1.8 cents/point).


    Transfer partners: Bilt offers 14 airline and hotel transfer partners including American Airlines (AAdvantage), United
    (MileagePlus), Air Canada (Aeroplan), and Hyatt. This transfer partner roster is competitive with Chase Ultimate Rewards
    (14 partners) and less comprehensive than American Express Membership Rewards (22 partners).


    No sign-up bonus: Historically, Bilt offered no sign-up bonus, a significant competitive disadvantage in acquiring card
    churners who drive early spend volume. Bilt 2.0 may introduce sign-up offers on higher-tier cards, but this has not been
    confirmed as of May 2026.


    The Bilt Alliance property network represents a distribution capability with no direct equivalent: 5 million units enrolled
    creates a captive pipeline of rent-paying cardholders that Chase, Amex, or Capital One cannot easily replicate without
    matching landlord outreach.


    The one-card, five-uses-a-month activation requirement is a unique constraint: Bilt requires cardholders to make at least
    5 transactions per month to earn rent rewards. This creates a friction point not present in competing cards.'
