- id: TP004
  title: Moat durability / competitive risk register
  type: enumeration
  columns:
  - Moat / Risk
  - Type
  - Durability
  - Implication
  - Diligence Ask
  rows:
  - - Bilt Alliance landlord network (5M units)
    - Distribution moat
    - Medium - no legal protection; replicable by well-funded competitor in 12-24 months
    - First-mover advantage with institutional landlords; hard to displace if integrated into lease workflow
    - Track Alliance expansion rate and exclusivity terms with major property managers
  - - Rent rewards brand (first mover)
    - Perception moat
    - Medium - brand recall is strong but credit card loyalty is low for non-primary cards
    - Bilt is synonymous with rent rewards in consumer media; marketing moat vs. new entrants
    - Monitor brand awareness surveys among US renters aged 25-40
  - - Cardless bank transition (Wells Fargo exit)
    - Operational risk
    - High severity - card migration introduces churn risk
    - New card issuance and account migration risks attrition of existing Bilt Wells Fargo cardholders
    - Track Bilt 2.0 migration completion rate and cardholder complaints
  - - Major issuer entering rent rewards
    - Competitive risk
    - Medium-Low likelihood but High impact if it occurs
    - Chase or Amex could launch a rent rewards card with massive cardholder acquisition budgets
    - Monitor card program announcements from Chase, Amex, and Capital One
  - - Interchange fee regulation (CCCA or settlement)
    - Regulatory risk
    - Current - CCCA pending, Visa/Mastercard settlement approved
    - Could reduce Bilt per-transaction economics; especially impactful on rent transactions with no landlord fee
    - Track CCCA vote timeline and settlement effective date
  - - No sign-up bonus (Bilt base card)
    - Competitive disadvantage
    - Historical; Bilt 2.0 may address
    - Limits Bilt acquisition of rewards-maximizing cardholders who drive early spend volume
    - Monitor Bilt 2.0 promotional offers and sign-up bonus announcements
  - - Five transaction activation requirement
    - User friction
    - Low severity; may be relaxed in Bilt 2.0
    - Creates activation friction not present in competing cards; reduces casual cardholder engagement
    - Monitor if Bilt 2.0 eliminates or relaxes the requirement
  - - 14 transfer partners vs Amex 22
    - Feature gap
    - Moderate - Bilt has most important partners but not all
    - Amex has broader ecosystem for ultra-premium travel redemptions; attracts high-value travel consumers
    - Monitor Bilt transfer partner additions over 2026-2027
  notes: Moat durability ratings are qualitative assessments based on competitive analysis and industry research.
  claimRefs:
