  - CP020
  - CP022
  - CP023
  - CP025
  - CP030
  enumerationScope:
    coverage: partial
    basis: Competitive moats and risks identified from industry research, press coverage, and Bilt company disclosures through
      May 2026. Not exhaustive of all competitive risk factors.
