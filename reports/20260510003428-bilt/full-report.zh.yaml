chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与创立背景
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards 是一家总部位于纽约市的金融科技与忠诚度平台公司，由 Ankur Jain 于 2021 年创立。公司抓住美国消费者奖励市场的一个关键空白：房租通常是多数家庭最大的月度开支——截至
              2025 年平均每月超过 $1,370——但几乎拿不到信用卡奖励，因为房东长期拒绝承担信用卡受理手续费。Bilt 的核心创新，是打造一套忠诚度计划和信用卡，让租客支付房租也能赚奖励积分，同时不把交易费转嫁给房东。


              CEO 兼创始人 Ankur Jain 此前创立 Kairos，这是一个面向年轻领袖的创业与社交社区；他也曾在 Tinder 任职。他是科技创业者、投资人 Naveen Jain 之子，后者也是 Bilt
              的早期支持者。公司总部位于 New York, NY，业务处在金融科技、房地产科技和忠诚度奖励的交叉点。


              免手续费租金支付由 Bilt 处理交易：租客用 Bilt Mastercard 发起付款，Bilt 再通过 ACH
              转账或纸质支票把资金付给房东，业主无需成本。租客获得积分，房东通过传统银行渠道收款，完全绕开信用卡受理费。


              到 2025 年，Bilt 已从一张聚焦租金的信用卡，演进为覆盖更广住房生命周期的忠诚度平台。公司通过 Bilt Alliance 物业网络覆盖美国 1/4 公寓楼，拥有 40,000+ 商户伙伴，并推出
              Bilt Home——租客可把累积积分用于购房首付。United Wholesale Mortgage 在 2025 年 7 月的战略投资，使公司向房贷支付奖励扩张正式落地。
