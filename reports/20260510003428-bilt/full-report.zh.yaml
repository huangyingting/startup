      - number: '3.2'
        title: 竞争者画像
        blocks:
          - type: paragraph
            body: >-
              Chase Sapphire Preferred 和 Reserve 是美国主导性的旅行奖励卡。Chase 约有 35M 信用卡客户。Sapphire Preferred 年费 $95，餐饮 3x、旅行
              2x，并提供 60,000 积分注册送礼（$750 旅行价值）。Reserve 餐饮和旅行 3x，年费 $550，提供 $300 旅行抵扣和 100,000 积分注册送礼。两张卡都不在租金上赚积分，Chase
              也没有公开披露进入租金奖励市场的计划。Chase 隶属于 JPMorgan Chase，2024 年消费者银行收入为 $74B。


              American Express Gold 和 Platinum 卡竞争高端奖励细分。Amex Gold 年费 $250，餐饮 4x、美国超市 3x，并提供 90,000 积分注册送礼。Amex Platinum
              航班 5x，年费 $695，并配有广泛旅行权益。两者都不在租金上赚积分。2024 年，American Express 全球流通卡约 140M 张，消费者卡收入 $19.2B。


              Capital One Venture 和 Venture X 提供简单的全消费 2x 里程，年费分别为 $95（Venture）和 $395（Venture X）。它们不支持租金赚取。Capital One
              2024 年国内信用卡收入约 $15B。全场景 2x 模型足够简单，对 Bilt 的日常消费类别构成竞争威胁。


              Plastiq 是一项支付服务，即使收款方不收卡，也让租客和企业用信用卡支付账单。Plastiq 每笔交易向租客收取 2.9%。这确实让任意卡都能在租金上赚取奖励，但费用通常高于获得的奖励（除非使用租金 3x
              卡），因此对大多数租客而言经济性不如 Bilt。Plastiq 于 2023 年 5 月申请 Chapter 11 破产保护，随后被 Priority Technology Holdings
              收购；重组后的所有权下仍继续运营。


              Flex 是一家先买后付（BNPL）金融科技公司，让租客把房租拆成两期支付，并收取 1% 月费（$1,200 房租对应每月约 $12-15）。Flex 2023 年完成 $120M Series
              B，估值未披露。Flex 瞄准的是现金流受限的租客，而不是追求奖励的租客，买方动机与 Bilt 不同。


              RealPage、Yardi 和 Zego
              是带集成支付模块的企业物业管理软件平台。它们服务房东和物业管理方，而不是直接服务租客。它们每年处理数十亿美元级租金，但不提供消费者奖励。作为房东侧基础设施，它们可能成为分发伙伴，也可能成为 Bilt 在
              Alliance 入网过程中必须处理的既有平台。
