      - number: '5.5'
        title: 产品路线图与差异化
        blocks:
          - type: paragraph
            body: >-
              Bilt 2.0 发布后，Bilt 公开披露的路线图围绕三件事：抵押贷款奖励扩张、Neighborhood Commerce 增长，以及 Bilt Home 房地产服务规模化。


              路线图事项 1——抵押贷款奖励扩张：Bilt Card 2.0 与 United Wholesale Mortgage
              合作，推出业内首个广覆盖的抵押贷款支付奖励功能。路线图包括拓展更多抵押贷款机构合作伙伴，并简化抵押贷款赚积分的设置流程。由于没有其他信用卡可在抵押贷款支付上赚取奖励，这是一个空白市场机会。


              路线图事项 2——Bilt Elite 卡权益增强：年费 $495 的 Bilt Elite 卡定位为高端旅行卡，与 Amex Platinum（年费
              $695）竞争。路线图增强项可能包括更多旅行抵扣、休息室权益，以及更高端的转点比例，以吸引高价值持卡人。


              路线图事项 3——Neighborhood Commerce 规模化：商户合作伙伴从 40,000 家扩到 100,000+ 家。Bilt 需要 B2B 销售体系和技术能力，才能规模化接入、管理并追踪商户表现。


              路线图事项 4——Bilt Home 平台：通过 UWM 以及潜在的更多贷款机构，提供完整抵押贷款发起能力。愿景是借助 Bilt 的忠诚度生态，把租户转化为房主。


              关键差异化：（1）零房东费用的 ACH 房租路由是核心技术护城河；（2）Bilt Alliance 的物业集成层带来分发锁定；（3）航空和酒店项目的转点合作伙伴让 Bilt 拥有可比 Chase UR 与
              Amex MR 的兑换生态；（4）刚起步的抵押贷款奖励功能是真正的先发位置，切入了尚未开发的市场。


              知识产权和商业秘密：Bilt 未披露专利组合。ACH 与信用卡混合的房租路由机制可能作为商业方法专利受到保护，但公开渠道未显示已知专利申请。Bilt Alliance
              的入驻流程、商户联合营销协议和银行合作伙伴条款，很可能以商业秘密形式保护。
