      - number: '8.4'
        title: 情景、可比倍数与估值区间
        blocks:
          - type: paragraph
            body: >-
              三种估值情景框定这笔投资。悲观情景（CCCA 通过、交换费压缩 25-50%、发卡方重新谈判）下，2026E 收入约 ~$350M，以 10x 计算对应 $3.5B 估值——相对 $10.75B
              入场价大幅回撤。基准情景（Cardless 迁移稳定、持卡人温和增长、CCCA 未通过）下，2026E 收入约 ~$550M，以 20x 计算对应 ~$11B，与入场价大致持平。乐观情景（Alliance 达到
              8M+ 房源、商户费收入兑现、CCCA 未通过）下，2026E 收入约 ~$700M，以 30x 计算对应 $21B，约为当前估值 2 倍。可比交易包括 LoyaltyOne（约 $1B
              被收购，随后破产）、Epsilon（$4.4B，2.4x 收入）和 Points.com（$366M，3.7x）。上市可比公司 Affirm（3.7x）和 SoFi（3.9x）的交易倍数远低于 Bilt
              隐含倍数，反映投资人为 Alliance 分发和增长可选性支付溢价。如果 Bilt 到 2026 年证明 30%+ CAGR，战略收购方（Mastercard、Visa、American Express、大型
              REIT）的溢价可能支撑高于公开市场区间的倍数。
            claimRefs: []
