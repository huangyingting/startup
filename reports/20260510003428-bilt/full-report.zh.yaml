      - number: '1.4'
        title: 反向发现：Wells Fargo 合作经济模型与迁移
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards 公司历史中最重要的反向发现，是其与 Wells Fargo 原始合作的经济模型。Bloomberg、Bisnow 和忠诚度行业记者等多个可信来源在 2024 年记录，Wells
              Fargo 因 Bilt Mastercard 合作每月亏损约 $10M——约 $120M/yr。


              亏损来自结构性不利的合作安排：Wells Fargo 为每笔处理的租金交易向 Bilt 支付约 0.8%，每开立一个新卡账户约 $200；但 Bilt
              持卡人中很高比例每月全额还款，银行利息收入很少。传统信用卡盈利模式需要循环余额利息收入和交换费收入共同支撑。Bilt 持卡人偏向精明的城市租客，主要用卡付租金并立即还清余额，产生的利息收入不足以覆盖 Wells
              Fargo 支付给 Bilt 的费用。此外，租金交易不会像典型零售交易那样产生商户交换费。


              Wells Fargo 在原定 2029 年结束日之前退出合作。Wells Fargo Bilt Mastercard 申请于 2025 年 11 月停止，该卡在 2026 年 2 月 6 日完全停用。虽然迁移到
              Cardless 被包装为产品升级，但 Wells Fargo 退出提出了一个关键尽调问题：Bilt 的经济模型能否为银行合作伙伴带来可持续经济性？如果不能，$10.75B
              估值可能建立在一种商业模式上，其单位经济模型的问题并不只存在于最初 Wells Fargo 场景。
