  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >
              Bilt 的客户生态覆盖三类人群。第一类是个人租户：他们申请 Bilt World Elite Mastercard，并通过 App 支付房租；这个 B2C 客群覆盖美国所有租户人口，但 Bilt 的营销和
              Alliance 覆盖更偏向城市、高收入、25–45 岁租户。第二类是加入 Bilt Alliance 的房东和物业管理公司：他们把该卡作为租户权益提供，Bilt 处理支付，房东收到标准 ACH
              款项且不承担处理费。第三类是参与 Neighborhood Commerce 平台的商户伙伴（餐饮、旅行、零售），向持卡人提供 3x–6x 额外积分。Bilt
              的收入主要来自持卡人消费产生的交换费；房东和商户则构成供给侧获客与留存飞轮。美国 4600 万租户家庭是总可触达消费者池；如果按每套房源一名用户计算，Bilt Alliance 渗透率约为租户家庭的
              ~11%，已经是有意义但仍处早期的滩头阵地。
