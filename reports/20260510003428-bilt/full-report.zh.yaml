              - CU028
              - CU030
      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              Bilt 的先落地再扩张模式沿两条轴推进：B2B Alliance 扩张（增加更多楼宇）和 B2C 产品深度（增加抵押贷款 / 购房、Neighborhood Commerce、信用建设）。Alliance
              扩张节奏受销售产能和物业管理公司 RFP 周期约束。持卡人扩张机会包括：（1）从沿海都会区向 Sunbelt
              和二线市场做地域多元化；（2）通过高端卡变体扩展到年龄更高的租户和更高收入客群；（3）将产品线延伸到购房者（Bilt 正在开发抵押贷款奖励路径）。集中度风险包括：高度依赖 Wells Fargo（目前正通过
              Cardless 缓解）、依赖 Mastercard 卡网络基础设施，以及前 10 大 Alliance 房东占合格租户房源的比例过高。如果某家大型 REIT（如 Equity Residential）退出
              Alliance，可触达租户会减少，消费者获客飞轮也会变弱。
            claimRefs: []
          - type: table
            tableRef: TU005
            claimRefs: []
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Bilt 位于银行、信用卡发行、支付和奖励的交汇处。Credit Card Competition Act（CCCA）如果通过，将要求卡网络开放路由竞争，可能消除支撑 Bilt 交换费模式的 Mastercard
              独家性。CFPB 在 2024 年发布监管指导，审查信用卡奖励项目的贬值和不透明问题；Bilt 复杂的赚取 / 兑换规则和 Trustpilot 投诉量，使其可能成为执法目标。CARD Act 要求按
              Regulation Z 清晰披露费用结构。州级汇款牌照风险部分被 Column N.A. 的联邦银行牌照优先权缓解。CCPA / CPRA 下的隐私风险适用于 Bilt 的消费者数据聚合。截至 2026 年
              Q1，未发现重大集体诉讼，但随着规模扩大，敞口也会增加。
            claimRefs: []
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
