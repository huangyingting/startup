      - number: '8.5'
        title: 退出准备度与最终尽调事项
        blocks:
          - type: paragraph
            body: >-
              Bilt 最早可信 IPO 窗口是 2027-2028 年，前提包括：（a）证明每名持卡人的正贡献利润（或在交换费结构下实现盈利的可信路径）；（b）收入可见度超过 $600M，且同比增长 ≥25%；（c）CCCA
              立法风险得到解决。可比金融科技 IPO（Affirm 2021、SoFi 2021）按 15-25x 往绩收入定价；如果增长持续，Bilt 可在 2027-2028 年瞄准 $12-15B IPO 区间。出售给
              Mastercard、Visa、Amex 或多元化 REIT 平台的 M&A 退出仍可行，可比交易规模为 $8-15B+。Ontario Teachers 的长期资本属性说明，至少一名机构投资人可接受 8-10
              年回报周期。任何投资承诺前，最终尽调必须解决六项优先事项：完整按队列拆分的单位经济性、Cardless 发卡协议条款、项目成本模型、Alliance 续约率、CCCA
              情景模型，以及包含治理文件的股权结构表。没有数据室访问，投资逻辑只能建立在公开信号和推断上——以 $10.75B 入场价看，不足以支持高信心承诺。
            claimRefs: []
