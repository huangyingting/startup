        - 跟踪 25–40 岁美国租客的品牌认知调查
      - - Cardless 银行切换（Wells Fargo 退出）
        - 运营风险
        - 严重度高 - 迁卡带来流失风险
        - 新卡发行和账户迁移可能造成现有 Bilt Wells Fargo 持卡人流失
        - 跟踪 Bilt 2.0 迁移完成率和持卡人投诉
      - - 大型发卡机构进入房租奖励
        - 竞争风险
        - 中低概率，但一旦发生影响高
        - Chase 或 Amex 可凭巨额持卡人获客预算推出房租奖励卡
        - 跟踪 Chase、Amex 和 Capital One 的信用卡项目公告
      - - 交换费监管（CCCA 或和解）
        - 监管风险
        - 当前 - CCCA 待审，Visa/Mastercard 和解已获批
        - 可能削弱 Bilt 单笔交易经济性；对不向房东收费的租金交易影响尤其大
        - 跟踪 CCCA 投票时间表和和解生效日期
      - - 无开卡奖励（Bilt 基础卡）
        - 竞争劣势
        - 历史如此；Bilt 2.0 可能补足
        - 限制 Bilt 获取奖励最大化持卡人；这类用户能拉动早期消费额
        - 跟踪 Bilt 2.0 促销优惠与注册奖励公告
      - - 五笔交易激活要求
        - 用户阻力
        - 严重性低；Bilt 2.0 可能放宽
        - 增加竞品卡没有的激活阻力；降低轻度持卡人参与度
        - 跟踪 Bilt 2.0 是否取消或放宽该要求
      - - 14 个转点伙伴，对比 Amex 22 个
        - 功能差距
        - 中等——Bilt 覆盖多数关键伙伴，但不完整
        - Amex 生态更广，覆盖超高端旅行兑换；吸引高价值旅行消费者
        - 跟踪 Bilt 在 2026-2027 年新增转点伙伴情况
    notes: 护城河耐久性评级是基于竞争分析和行业研究给出的定性评估。
