      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >-
              多份报道称 Wells Fargo 在 Bilt Mastercard 合作中每月亏损约 $10-$12M（每年约 $120-$144M）后，Bilt 的单位经济模型受到审视。这一反向证据是目前关于 Bilt
              卡项目经济模型最重要的财务数据点。


              Wells Fargo 亏损机制：据报道的亏损源于租金奖励模型的结构性挑战。租客通过 Bilt 卡支付房租时：

              - Bilt 通过 ACH 将付款路由给房东（房东不支付处理费）

              - 卡组织处理交易，但由于房东不是标准收卡商户，几乎不赚或不赚交换费

              - 但 Bilt 仍有义务为持卡人积分出资（每美元租金 1 个 Bilt 积分，用于旅行兑换时价值约 $0.013-$0.018）

              - 一笔 $1,500 租金支付中，Bilt 需给持卡人约 1,500 积分，对应 $19.50-$27.00 旅行价值

              - 如果该交易几乎不产生或不产生交换费，为奖励出资的银行就会直接亏损


              估计收入缺口：若每月亏损 $10M，且假设 Wells Fargo 为奖励计划出资，累计亏损约 $120-$144M/yr。这说明非租金交换费、年费和商户联合营销费不足以抵消租金奖励的资金成本。


              Bilt 2.0 之后的单位经济模型：迁移到 Cardless（Fidem Financial + Column N.A.）以及新的分层年费结构（$95/$495），是一次有意调整单位经济模型的尝试，路径包括：

              (a) 捕获直接年费收入，抵消奖励计划成本

              (b) 可能在新的银行框架下重构租金交换费机制

              (c) 可能降低每积分兑换成本


              毛利率不确定性：没有审计财务，毛利率未知。联名安排下的信用卡项目毛利率通常为 15-40%，取决于交换费结构、奖励资金来源和伙伴经济模型。考虑到租金交换费限制，Bilt 毛利率可能更低。


              行业媒体报道的 $250M 年度资金需求，是据称 Bilt 维持奖励计划所需的金额。这意味着每月约 $20-$21M 资本投入，支持了公司在当前增长阶段持续经营亏损的假设。
