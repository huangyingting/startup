      - number: '1.2'
        title: 核心产品：Bilt Mastercard、Bilt 2.0 与 Bilt Wallet
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards 的核心产品是 Bilt Mastercard，最初由 Wells Fargo 发行，让租客无需年费、也无需向房东支付交易费，就能付房租并赚积分。原卡在租金上赚 1x 积分（每月至少完成
              5 笔交易才解锁租金奖励），餐饮 3x，旅行 2x，其他所有消费 1x。每月 1 日的 “Rent Day” 促销会让非租金消费积分翻倍，推动持卡人在房租之外把 Bilt 用于日常消费。


              Bilt Wallet 移动应用（iOS 和 Android）是忠诚度计划的中枢，让租客支付房租、跟踪积分、浏览商户优惠、管理旅行伙伴转点，并使用健身伙伴折扣。截至 2025 年，Bilt Wallet 应用在
              Apple App Store 保持 4.6+ 星评分。


              2026 年 2 月，Bilt 与 Cardless 合作推出 Bilt Card 2.0（银行服务由 Fidem Financial 和 Column N.A. 提供），取代 Wells Fargo
              发行的卡。新卡组推出三档：无年费卡、$95 年费卡和 $495 高端卡。最重要的创新是把奖励扩展到房贷支付——行业内首张广泛支持这一能力的信用卡——让 Bilt
              从面向租客的公司扩张为住房生命周期忠诚度平台，覆盖租房、房贷以及迈向自有住房的过渡。


              Bilt Home 产品让租客把累积的 Bilt 积分用于购房首付。United Wholesale Mortgage 在 2025 年 7 月轮次投资
              $100M，双方合作提供支撑该产品线的机构级房贷基础设施。该卡还向主要征信机构免费上报房租和房贷支付，帮助租客和房主用住房支付记录建立信用历史。
