  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards 横跨三个相互重叠的市场，每个市场的边界、买方和竞争动态都不同。测算机会前，必须先界定市场边界。


              第一、最直接的市场是美国租金支付市场：美国租客每年向房东支付的总租金流。截至 2025 年，美国约 46M 个家庭租房（占全部美国家庭 35%），中位月租 $1,370，估计全年租金支付总额
              $756B。这个市场过去基本进不了信用卡奖励计划，因为房东拒绝支付收单费（通常为交易额 2.35%）。Bilt 的创新，是通过 ACH 路由付款、免除房东费用，同时靠替代交换费结构赚取奖励。


              第二个市场是更广泛的美国消费者信用卡购买额和交换费经济。2024 年，美国信用卡购买总额达到 $5.92T，产生约 $148.5B 交换费。持卡人用 Bilt
              卡进行非租金消费——如餐饮、旅行和日常支出——时，Bilt 从这个市场获得收入。


              第三个新兴市场是美国房贷支付市场，2025 年 7 月与 United Wholesale Mortgage 的合作让这一方向正式成型。美国未偿房贷债务估计为 $11T，覆盖约 80M 房主。Bilt Card
              2.0（2026 年 2 月上线）是第一张广泛支持房贷支付赚奖励的信用卡，首次打开这个市场。


              Bilt 模型排除的关键支出包括：房东侧费用（房东不付任何费用）、商业 / 办公租金、度假租赁，以及通过 Plastiq 等第三方服务支付的租金（租客直接承担 2.5-3%
              费用；对想避免处理成本的房东而言，Bilt 在结构上更优）。
