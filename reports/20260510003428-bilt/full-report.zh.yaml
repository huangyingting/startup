      - number: '4.3'
        title: 融资额与公开财务牵引力
        blocks:
          - type: paragraph
            body: >-
              自 2019 年以来，Bilt 已累计募集约 $400M 股权资金，增长主要来自 2024-2025 年两轮融资：


              2024 年 8 月 - $3.25B 估值下融资 $150M：由 Ontario Teachers' Pension Plan 领投，现有投资人参与。本轮资金用于 Bilt 扩张 Alliance
              网络、商户商业平台和 Bilt Home 房地产服务。


              2025 年 7 月 - $10.75B 估值下融资 $250M：由 General Catalyst 领投，GID Investment Advisers 和 United Wholesale Mortgage
              参与。本轮让 Bilt 估值在约 11 个月内翻了三倍，并用于加速房贷奖励扩张（Bilt Card 2.0）以及资助住房生态增长。$10.75B 估值意味着较 2024 年 8 月轮增长 3.3x。


              累计融资总额：Bilt 未披露 2024 年前累计融资，但媒体报道显示 2024 年前约融资 $200-300M，使总额达到约 $550-700M。


              财务牵引力指标：Bilt 不披露收入、ARR、GMV 或净利润。以下牵引力信号是唯一公开可得数据：

              - 每年处理超过 $100B 住房支出（公司声称，2025 年 7 月）

              - 40,000+ 商户伙伴（公司声称）

              - 美国 1/4 公寓楼纳入 Alliance


              每年 $100B 住房支出若按非租金消费 0.5-1.5% 的平均交换费率计算（租金部分交换费极低），理论上会产生 $500M-$1.5B 总交换费规模。不过，租金和非租金支出的拆分未知，使收入估算高度不确定。


              资本充足性：以 $10.75B 估值和 2025 年 7 月募集 $250M 计，Bilt 拥有可观资本支持增长。但如果年度资金需求约为 $250M（如报道所称），且 Bilt 2.0
              未带来单位经济模型的重大变化，那么 2025 年 7 月融资在需要追加资本前大约只提供 12 个月现金跑道。
