      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Bilt 商业模式深度依赖少数关键合作伙伴，覆盖发卡、网络和分发层。发卡银行（Cardless / Column N.A.）是所有卡业务的单点故障；Wells Fargo 在约 20M
              年亏损下退出，说明当项目经济性错配时，发卡银行关系会迅速恶化。Cardless 只是把一个集中点换成另一个集中点，且未披露备用发卡安排。Mastercard 是唯一卡网络；任何交换费率、World Elite
              权益要求或独家条款的重新谈判，都可能实质改变 Bilt 经济性，且公司未披露多网络策略。Bilt Alliance 依赖大型 REIT 持续参与；如果前三大房东（Equity
              Residential、AvalonBay 或 Greystar）之一退出，消费者获客飞轮会明显缩小，并可能在持卡人增长放缓后触发负向飞轮。航空和酒店转点合作伙伴（合计 14 家）对奖励价值主张至关重要；失去
              United 或 American Airlines 会触发积分贬值和持卡人流失。Alliance 楼宇收租依赖 RealPage、Yardi 和 MRI Software 集成，这些也是第三方依赖，存在 API
              变更和独家性风险。
            claimRefs: []
          - type: table
            tableRef: TR003
            claimRefs: []
