  - id: TV005
    title: 投资逻辑破裂和放弃触发点表
    columns:
      - 投资逻辑破裂触发点
      - 阈值 / 事件
      - 行动含义
      - 监测来源
    rows:
      - - CCCA 法案通过
        - 法案签署成法
        - 退出持仓，或争取深度重构经济条款
        - 国会跟踪；法案状态更新
      - - 发卡方迁移失败
        - Cardless 上线后持卡人流失率 >5%
        - 紧急尽调电话；重新评估发卡方风险
        - Trustpilot、CFPB 投诉追踪、应用商店评价
      - - 前三大房东退出
        - Equity Residential 或 AvalonBay 退出 Bilt Alliance
        - 退出；飞轮逆转可能引发负向动能
        - 上市 REIT 季度披露
      - - 创始人离任
        - 宣布 CEO 辞任或长期病假
        - 暂停部署；重新评估管理层风险
        - SEC 8-K 同等披露；媒体监测
      - - CFPB 执法行动
        - 收到同意令或民事调查要求
        - 退出，或持有等待解决
        - CFPB 执法追踪；公开文件
      - - 转点合作伙伴流失
        - United 或 American Airlines 退出 1:1 转点
        - 积分贬值担忧立刻升温；流失率可能陡升
        - 合作伙伴计划公告
    claimRefs:
      - CV015
      - CV028
      - CV029
      - CV036
    notes: 触发条件定义为可从公开披露观察到的事件；内部阈值可能与管理层定义不同。
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 具体要求
      - 优先级
      - 来源 / 方法
    rows:
