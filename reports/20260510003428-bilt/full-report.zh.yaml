      - number: '8.2'
        title: 估值背景与融资历史
        blocks:
          - type: paragraph
            body: >-
              Bilt 在 2024 年 8 月以 $3.25B 估值融资 $150M（Series C，由 Ontario Teachers' Pension Plan 领投），随后在 2025 年 7 月完成 $250M
              Series D，估值 $10.75B（General Catalyst 领投，GID 和 UWM 参与）。不到 12 个月估值提升 3.3 倍，意味着投资人相信 Alliance 规模化速度，也相信
              Cardless 迁移相对 Wells Fargo 关系是结构性改善。迄今公开披露融资总额约 $450M+。SEC Form D 文件确认了与这些轮次条款一致的豁免证券发行。$10.75B 估值意味着约 24x
              的 2025 年估计收入（~$450M）——这一倍数显著高于上市金融科技可比公司（Affirm：~3.7x，SoFi：~3.9x），更接近顶级分位 SaaS 或忠诚度平台的战略溢价。若以 $10.75B
              进入，纪律性要求模型中至少有 30% 收入 CAGR，并伴随利润率改善，才能在 4-7 年持有期内达到可辩护的退出区间。
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs:
              - CV021
              - CV023
              - CV026
              - CV028
              - CV022
