      - number: '2.2'
        title: TAM/SAM/SOM 与市场规模测算
        blocks:
          - type: paragraph
            body: >
              Bilt 的可触达市场可以从三个视角估算：租金支付 TAM、交换费收入 TAM，以及新兴住房忠诚度平台机会。


              视角 1 - 租金支付 TAM：截至 2025 年，美国年租金支付约 $756B（46M 户 x $1,370/月中位数 x 12 个月）。Bilt 的 SAM 受限于可通过 Bilt
              路由付款的租房家庭。Bilt Alliance 覆盖美国 1/4 公寓楼（按 NMHC 数据，美国 20M 套公寓单元中约 5M 套），若假设 Bilt Alliance 租客平均月租 $1,500，SAM
              约为每年 $90-100B 租金支付额。SOM——实际通过 Bilt 路由的支出——未获独立确认；Bilt 称截至 2025 年底处理超过 $100B 总住房支出，看起来包含相邻的非租金类别。


              视角 2 - 交换费收入 TAM：2024 年美国信用卡交换费总收入约 $148.5B（高于 2023 年的 $136B），年增速 5-8%。非租金消费的平均混合交换费率为 1.5-2.35%，Bilt
              只参与其中一小部分。由于房东不是传统收卡商户，Bilt 从租金中获得的专项交换费很可能低于标准零售场景。


              视角 3 - 住房忠诚度平台：随着房贷奖励扩张和 40,000+ 商户伙伴加入，Bilt
              把自己定位为住房生命周期忠诚度平台。美国消费者在住房相关商品和服务上的总支出以万亿美元级计，但只有一部分产生银行卡交换费。这个视角下的市场规模仍高度不确定，更多由公司愿景驱动。


              对租赁 TAM 的多个估算从 $576B（保守：40M 户 x $1,200/月）到 $828B（高位：46M 户 x 城市市场平均 $1,500/月）不等，反映目标客群的家庭数量和平均租金都存在真实不确定性。
