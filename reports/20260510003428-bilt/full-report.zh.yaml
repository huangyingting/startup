      - number: '6.4'
        title: 留存、满意度与持久性
        blocks:
          - type: paragraph
            body: >
              消费者留存信号好坏参半。Bilt Mastercard 没有年费，降低流失倾向，但也降低切换成本。每月 Rent Day 参与形成习惯性 App 使用。Trustpilot 为 1.8/5 星（截至 2026 年
              Q1，100+ 条评价平均 1.8），投诉集中在客服响应时间、积分估值不透明和信用卡申请被拒。Apple App Store 评分为 4.8/5，来自 100,000+
              条评价——差异很大，可能反映选择偏差（满意用户更常评分）或平台审核差异。CFPB
              投诉数据显示，以该规模的卡项目而言，投诉量中等，主要涉及账单和奖励兑换。公开渠道没有净留存率（NRR）、总留存率（GRR）、年度流失率或队列数据。2026 年 2 月从 Wells Fargo 迁移到
              Cardless / Column N.A. 是迄今最大的留存风险事件；行业基准显示历史卡迁移流失率为 15–25%，说明迁移期可能出现实质性持卡人流失。
            claimRefs: []
          - type: table
            tableRef: TU004
            claimRefs: []
