  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户流程
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards 是一个以住房为中心的忠诚度和金融科技平台。对终端消费者而言，Bilt 产品体现为：(1) 一张 World Elite Mastercard 信用卡，(2) 一个移动应用（iOS 和
              Android），以及 (3) 一个奖励兑换生态，覆盖航司转点、Bilt Home 房地产服务和本地商户优惠。


              主要客户流程是：(a) 租客注册 Bilt 卡并下载应用；(b) 租客绑定银行账户，并通过 Bilt 设置租金支付；(c) 每月，Bilt 通过 ACH 免费把租金支付给房东；(d) 租客每美元租金赚 1 个
              Bilt 积分，并在餐饮、旅行和日常消费上赚取额外积分；(e) 积分累积后，可转入 14 个航司 / 酒店伙伴，用于 Bilt Home 首付，或兑换账单抵扣。


              房东流程（Bilt Alliance）是另一条线：物业管理方签署 Alliance 协议，配置其物业管理软件（Yardi、RealPage、Entrata 等）以接受 Bilt 路由付款，并向租户展示 Bilt
              计划材料。房东收到的 ACH 付款与标准 ACH 租金转账相同，没有额外步骤或费用。


              Bilt Card 2.0（2026 年 2 月通过 Cardless 上线）让产品扩展到：三档卡（Bilt Base $0、Bilt $95/yr、Bilt Elite
              $495/yr）；房贷支付奖励（第一张广泛提供这一能力的卡）；高端档 2x-4x 赚取率；以及 Elite 档增强旅行权益。
