      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              Bilt 的市场增长有几股结构性顺风推动，但监管和竞争力量也构成实质逆风。


              关键增长驱动：(1) 租房人口上升 - 美国租房家庭从 2015 年约 40M 增至 2025 年 46M，住房可负担性压力推迟购房，租房家庭预计继续增长。(2) Millennial / Gen-Z 租客参与度
              - 25-40 岁租客关注财务、熟悉忠诚度计划，是高 LTV 信用卡客户。(3) 房贷市场扩张 - Bilt Card 2.0 打开每年 $3T 的美国房贷支付市场，属于绿地机会。(4) Bilt
              Alliance 的网络效应 - 如今美国 1/4 公寓纳入 Alliance，该卡对相当大比例的美国租客有价值。(5) 平台扩展到 40,000+ 商户，创造更多消费场景。


              关键采用约束：(1) 交换费监管风险 - Credit Card Competition Act 以及 Visa/Mastercard 交换费和解（约下调 0.1%）可能压缩 Bilt 单笔交易收入。继
              Illinois 2025 年立法后，至少 13 个州正在考虑交换费立法。(2) CFPB 监管加强了对信用卡奖励计划的审查，重点针对积分贬值和诱导后变更条款。(3)
              租客切换成本低，竞争者进入这一领域不会遇到显著摩擦。(4) 房东采用需要主动加入 Bilt Alliance，形成受管理的销售流程。(5) 传统注册送礼历史上缺位，限制了 Bilt
              获取推动交易量的刷卡套利型消费者。
