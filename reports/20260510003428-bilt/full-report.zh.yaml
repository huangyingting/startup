      - number: '5.4'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >-
              Bilt 横跨银行（发卡行）、支付（ACH 路由）和消费者数据（住房支出）三层，合规画像是多维度的。


              支付卡合规：作为 Mastercard World Elite 项目，Bilt 必须遵守 PCI-DSS（Payment Card Industry Data Security
              Standard，支付卡行业数据安全标准），保护持卡人数据。收单商户和卡项目运营方都必须满足 PCI-DSS；鉴于 Bilt 参与 Mastercard 网络，并与 Cardless / Column N.A.
              建立发卡关系，可推定其需满足该合规要求。


              银行监管：Column N.A.（通过 Cardless 承接 Bilt 2.0 的发卡行）是一家全国性特许银行，受 OCC 监管。Column N.A. 的合规范围包括：Bank Secrecy
              Act（BSA）、反洗钱（AML）、了解你的客户（KYC）、信用卡消费者保护法律（CARD Act、Truth in Lending Act）以及公平信贷法律（ECOA）。


              消费者数据隐私：Bilt 收集敏感的住房和金融数据。合规要求包括：面向加州租户的 CCPA（California Consumer Privacy Act）、面向金融数据隐私的
              GLBA（Gramm-Leach-Bliley Act），以及任何国际业务可能触发的 GDPR。


              消费者金融保护：CFPB 对大型信用卡发卡机构有管辖权，并加强了对奖励计划的审查，重点是积分贬值和诱导后变更等做法。Bilt 2025–2026 年奖励结构调整（从 Wells Fargo 迁移到 Bilt
              2.0）如果被视为积分贬值，可能触发 CFPB 执法风险。


              信用报告：Bilt 向三大征信机构（Experian、Equifax、TransUnion）提供房租支付信用报告，作为持卡人权益。这要求其遵守 Fair Credit Reporting
              Act（FCRA）和征信机构报告标准。


              安全：截至 2026 年 5 月，公开渠道未披露涉及 Bilt 持卡人数据的重大安全泄露。其安全状态只能从 Mastercard 网络成员身份以及 Cardless / Column N.A. 的监督中推断。
