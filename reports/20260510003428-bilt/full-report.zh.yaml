      - number: '1.3'
        title: 融资历史与投资人基础
        blocks:
          - type: paragraph
            body: >
              Bilt Rewards 已在多轮融资中累计募集约 $400M，截至 2025 年 7 月估值达到 $10.75B。尽管收入和盈利数字未公开披露，公司的融资轨迹仍显示投资人信心在加速增强。


              最近一轮 Series D 于 2025 年 7 月完成，规模 $250M，由 General Catalyst 和 Global Investment Dynamics（GID）领投；United
              Wholesale Mortgage（UWM）投入 $100M 战略资金，体现双方将共建房贷支付奖励基础设施。在此之前，Bilt 于 2024 年 8 月以 $3.25B 估值融资 $150M，由 Ontario
              Teachers' Pension Plan 的 Venture Growth 部门领投，新机构投资人包括 Vanderbilt University Endowment 和 University of
              Illinois Foundation。更早的 Series B（2023 年 1 月，约 $200M、估值约 $3.1B）为 Bilt Alliance 全国扩张提供了资金。


              关键早期和战略投资人包括 Camber Creek，这是一家聚焦房地产科技的风险基金，带来了房地产行业关系；还包括科技创业者、Ankur Jain 之父 Naveen Jain。投资人组合横跨金融科技
              VC、房地产基金、养老金基金和战略企业投资人，映射出 Bilt 的多行业定位。


              估值在约 11 个月内从 $3.25B（2024 年 8 月）升至 $10.75B（2025 年 7 月），上涨 3.3x，显示投资人强烈押注 Bilt 的增长叙事。公司公开目标是在 2026 年 Q1 实现
              $1B 收入，并称截至 2025 年底每年处理超过 $100B 住房支出。收入数字和盈利数据均未获独立验证。
