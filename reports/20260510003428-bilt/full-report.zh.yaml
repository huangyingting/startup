      - number: '7.4'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >-
              Bilt 财务模型尚未在规模化状态下得到验证。房租交易不给发卡银行带来交换费收入，但 Bilt 仍按每美元房租 1x 积分返还——补贴来自餐饮（3x）、旅行（2x）和其他消费（1x）的非房租交换费。Wells
              Fargo 约 20M 年亏损说明，在当前持卡人消费水平下，交叉补贴模型尚未闭合；估计项目成本 50M/yr，远高于公开可辨识收入。Bilt 0.75B 估值意味着约 24x 估计 2025
              年收入，需要大幅增长才能支撑溢价；任何持卡人获客放缓或监管挫折都可能触发降轮。若 CCCA 通过、交换费下降
              25-50%，或转点合作项目提高积分兑换成本，卡级利润率压缩可能加剧。房租支付通道上的欺诈损失是新兴财务风险，信用卡行业没有历史基准。Bilt
              未披露公开财务报表，在没有数据室访问的情况下，烧钱速度、现金跑道和单位经济性无法独立验证。50M Series D 提供了现金跑道，但没有回答房租奖励能否自我供血这一结构性问题。
            claimRefs: []
          - type: table
            tableRef: TR004
            claimRefs: []
      - number: '7.5'
        title: 人员、执行与治理风险
        blocks:
          - type: paragraph
            body: >-
              Bilt 创始人兼 CEO Ankur Jain 是品牌的单一面孔，也是投资人、房东和媒体关系的核心承载者。公司未公开宣布 COO、President 或明确继任者。这种关键人物集中度的影响评级为极高：如果
              Jain 在没有继任规划的情况下离开，投资人、评估续约的 Alliance 房东，以及评估多年承诺的转点合作伙伴都会立刻面对不确定性。公司不到 5 年便从概念发展到 0.75B 估值，工程、合规、Alliance
              销售和运营都面临组织规模化风险。金融科技合规人才（BSA/AML、CARD Act、CFPB 监管关系）在当前市场稀缺且昂贵。2026 年 2 月从 Wells Fargo 到 Cardless
              的发卡银行迁移，是 Bilt 历史上最大的运营项目；仅靠公开披露无法独立验证执行质量。董事会构成、审计委员会和治理文件均未公开，风险监督成熟度评估受限。General Catalyst 作为 Series D
              领投方的投资人集中度，如果增长目标落空，可能带来一致性风险。
            claimRefs: []
          - type: table
            tableRef: TR005
            claimRefs: []
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与信心
        blocks:
          - type: paragraph
            body: >-
              以 $10.75B 的 Series D 估值看，Bilt Rewards 享有高溢价，必须严格审视。总体建议为有条件正向（观察）：Bilt 通过 Alliance
              分发、转点合作伙伴深度和房租飞轮机制，拥有真实战略护城河；但单位经济性、发卡银行项目成本和监管敞口仍是重大风险，仅靠公开来源无法验证。信心评级为中——战略逻辑有吸引力，但缺少经审计财务、披露的 CAC / LTV
              指标或发卡协议条款，无法给出高确信买入评级。由于 CCCA 监管敞口、单一发卡方集中度以及对 Ankur Jain 的关键人物依赖，风险评级为高。若未完整审阅数据室中的单位经济性、项目成本模型、发卡方条款和
              Alliance 续约率，不建议作出投资决策。
            claimRefs: []
