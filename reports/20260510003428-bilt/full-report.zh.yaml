      - number: '5.2'
        title: 产品模块与资产地图
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards 由五个独立产品模块构成，每个模块都有不同的技术依赖和成熟度：


              模块 1 - Bilt Mastercard（信用卡）：Mastercard World Elite 计划下发行的实体卡和虚拟卡。Bilt 2.0 迁移前，卡由 Wells Fargo Bank N.A.
              发行；现在通过 Cardless，由 Fidem Financial（Column N.A. 子公司）发行。卡产品包括：标准信用卡功能（信用额度、账单、循环余额利息）、World Elite Mastercard
              权益（旅行保险、购买保障）和 Bilt 专属赚取率。


              模块 2 - Bilt 移动应用（iOS 和 Android）：消费者使用 Bilt 一切功能的界面。关键功能包括：租金支付门户和 ACH 支付排程、奖励仪表盘和积分余额跟踪、Bilt 社区地图（发现
              Alliance 楼宇附近商户）、Bilt Home 房地产搜索集成、伙伴忠诚度计划转点门户，以及信用分监控。公开数据显示，截至 2025 年，应用在 Apple App Store 评分为
              4.8/5；可得指标显示下载量 100,000+。


              模块 3 - Bilt Alliance 物业集成层：把 Alliance 房东连接到 Bilt 支付路由系统的 B2B
              集成。技术触点包括与物业管理软件平台（Yardi、RealPage、Entrata、Buildium、MRI Software）的 API 和 webhook 集成。每栋 Alliance
              楼宇都需入网并配置为通过 Bilt 路由接收 ACH 付款。


              模块 4 - Bilt Home 房地产市场：购房和找房服务，让 Bilt 持卡人把累积积分用于购房、房贷首付（与 UWM 合作）以及房地产经纪人转介。Bilt Home 集成在主 Bilt 应用中。


              模块 5 - 社区商业平台：拥有 40,000+ 商户伙伴的商户发现和奖励生态。持卡人在 Alliance 楼宇附近的参与餐厅、健身工作室和零售商消费时赚取奖励积分。商户通过 B2B
              销售流程入网，并支付联合营销费。
