      - number: '8.3'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              核心投资逻辑建立在四根结构性支柱上：（1）Bilt Alliance 覆盖 4,000+ 楼宇、约 500 万套房源，提供专有租户获客渠道，在金融科技中没有直接类比；（2）14 个航空和酒店转点合作伙伴按 1:1
              平价兑换，形成真正有消费者价值、结构上难以复制的忠诚度货币；（3）房租飞轮带来每月持卡人参与峰值（Rent Day），表现优于典型信用卡激活率；（4）美国 $756B 房租市场被金融服务渗透不足，既提供 TAM
              扩张，也提供向抵押贷款、租客保险和搬家服务垂直延伸的机会。反向逻辑集中在三项结构性脆弱点：（a）LoyaltyOne
              先例显示，当发卡方经济性无法闭合时，交叉补贴型联盟忠诚度模型可能在规模化后惨烈失败；（b）Wells Fargo 报告的约 ~$120M/yr 亏损证明 Bilt 项目成本结构性偏高；（c）Bilt 品牌资产和
              Alliance 关系与创始人 Ankur Jain 高度绑定，形成关键人物集中风险。投资逻辑取决于 Bilt 能否从发卡方补贴模型，成功转向由企业 Alliance
              费用、商户合作或相邻产品收入抵消房租交换费缺口的模型——这一转型尚未得到公开验证。
            claimRefs: []
