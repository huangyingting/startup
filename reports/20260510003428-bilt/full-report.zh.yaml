      - number: '3.3'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >-
              Bilt 的关键差异化，是房东无需付费且租金可赚奖励。主要信用卡发卡方都没有提供这一点。Plastiq 让任意卡都能在租金上赚奖励，但向付款方收取 2.9% 费用，侵蚀奖励价值。Bilt
              模型对房东（零成本）和租客（零费用、租金 1x-2x 积分）都在结构上更优。


              基础 World Elite Mastercard 上，Bilt 租金每美元赚 1x 积分（最高 $50,000/year），餐饮 3x，旅行 2x，其他 1x。Bilt 2.0 高端档全场景最高
              2x。按消费类别看，它弱于 Chase Sapphire（餐饮 3x）和 Amex Gold（餐饮 4x）；但把租金纳入后，比较转为有利：每月付 $2,000 租金的租客，仅租金一年就能赚 24,000 Bilt
              积分，按 1.3-1.8 cents/point 估算，旅行价值约 $312-$432。


              转点伙伴：Bilt 提供 14 个航司和酒店转点伙伴，包括 American Airlines（AAdvantage）、United（MileagePlus）、Air Canada（Aeroplan）和
              Hyatt。这个转点伙伴阵容可与 Chase Ultimate Rewards（14 个伙伴）竞争，但不如 American Express Membership Rewards（22 个伙伴）全面。


              无注册送礼：历史上，Bilt 没有提供注册送礼，在获取推动早期消费量的刷卡套利型用户时处于明显劣势。Bilt 2.0 可能在更高档卡上推出注册优惠，但截至 2026 年 5 月尚未确认。


              Bilt Alliance 物业网络代表一种没有直接对标物的分发能力：5M 套单元入网，形成一条捕获租金付款持卡人的管道。Chase、Amex 或 Capital One 若不复制同等房东触达，难以轻易复刻。


              “一卡、每月使用五次”的激活要求是一项独特约束：Bilt 要求持卡人每月至少完成 5 笔交易，才能赚取租金奖励。这带来了竞争卡不存在的摩擦点。
