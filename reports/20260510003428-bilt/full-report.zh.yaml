      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              Bilt 服务的是多边市场，主要细分之间的买方、用户和付款方关系各不相同。


              主要细分 - 城市租客（25-40 岁）：Bilt Rewards 的核心持卡人是 25-40 岁城市专业人士，他们住在 Bilt Alliance 楼宇，或任何接受 ACH /
              支票付款的物业。这类租客关注财务、重视信用，也对旅行或生活方式奖励感兴趣。他们同时是用户、买方和付款方：申请 Bilt
              卡、用卡消费，并支付每月账单。关键采用触发点包括：在最大开支房租上赚奖励、通过房租支付上报免费建立信用，以及累积旅行积分。约 52% 美租房家庭租金负担过重（租金支出 >30%
              收入），因此有强烈动力从租金支付中榨出价值。


              次要细分 - 房东和物业管理方（Bilt Alliance）：在 Bilt 模型中，房东和物业管理公司是分发伙伴，不是直接收入付款方。他们加入 Bilt
              Alliance，是因为它降低收租摩擦，并吸引寻求财务收益的优质租客。房东参与零费用，采用摩擦很低。


              第三细分 - 购房者和房贷持有人（Bilt Home / Bilt 2.0）：房贷奖励扩张后，目标用户延伸到 30-50 岁、背负房贷且愿意为房贷支付奖励缴纳高端年费（$95-$495）的房主。


              商户伙伴（Bilt Commerce）：40,000+ 商户伙伴（餐厅、健身工作室、Alliance
              楼宇附近零售商）参与社区商业平台并支付联合营销费，形成本地忠诚度飞轮。这些伙伴推动持卡人在房租和核心消费之外增加支出。
