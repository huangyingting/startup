      - number: '7.2'
        title: 运营、技术与安全风险
        blocks:
          - type: paragraph
            body: >-
              Bilt 核心价值主张依赖无缝的 ACH 房租支付路由。每月 1 日 Rent Day 与月租到期叠加，一旦系统失效，可能导致数百万租户错过房租支付，立刻伤害房东关系，并引发 Regulation E
              下的监管审查。发卡依赖 Cardless 和 Column N.A. 带来技术集中度：任何平台故障都会同时传导至所有 Bilt 持卡人，且没有披露的故障切换路径。PCI-DSS
              合规对持卡人数据安全至关重要；一旦泄露，将在 72 小时内触发多州通知义务、潜在 FTC 执法，并造成严重品牌损害，直接成本估计达
              M+。假房东合谋骗取房租奖励是一种新的攻击向量，信用卡行业没有历史损失基准。2026 年 2 月 Wells Fargo 到 Cardless
              的迁移涉及复杂的持卡人数据转移和卡片重发；任何数据完整性错误都可能触发 Regulation E 违规和 CFPB 审查。高峰使用期（Rent Day 峰值）的 App 可靠性仍是持续运营挑战，且没有公开披露
              SLA。
            claimRefs: []
          - type: table
            tableRef: TR002
            claimRefs: []
          - type: figure
            figureRef: FR002
            claimRefs:
              - CR001
              - CR004
