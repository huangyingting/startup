companyProfile:
  summary: >-
    Bilt Rewards 是一家纽约金融科技公司，由 Ankur Jain 于 2021 年创立，让租客付房租也能赚忠诚度积分且无需交易费——这是美国信用卡市场的结构性首创。Bilt Alliance 将美国 1/4
    公寓（4,000+ 栋楼、约 500 万套）纳入分发伙伴；租客在租金上赚 1x 积分（通过 ACH 处理，房东零成本），餐饮 3x，旅行 2x。积分可按 1:1 转入 14 个航司和酒店计划，包括 United、American 和
    Hyatt。Bilt Mastercard 最初由 Wells Fargo 发行；2026 年 2 月，Bilt 将发卡伙伴迁至 Cardless（Fidem Financial / Column N.A.）。据报道，Wells
    Fargo 在该合作上每月亏损约 $10-12M。Bilt 2025 年 7 月以 $10.75B Series D 估值融资 $250M（General Catalyst、GID、UWM），此前 2024 年 8 月以
    $3.25B Series C 估值融资 $150M（Ontario Teachers）。$10.75B 估值约为估计 2025 年收入的 24x——要撑住这一溢价，需要 30%+ CAGR 和可验证的单位经济模型改善。Bilt
    的战略护城河是 Alliance 分发飞轮；反向逻辑是它与 LoyaltyOne 结构相似，后者因不可持续的发卡方补贴经济模型而崩塌。
