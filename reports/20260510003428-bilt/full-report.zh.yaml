      - number: '3.4'
        title: 护城河耐久度与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Bilt 有两项耐久竞争优势：(1) Bilt Alliance 房东网络（入网护城河），以及 (2) 租金奖励的先发定位（认知护城河）。两者都真实存在，但都不是牢不可破。


              Alliance 入网护城河有意义，因为签下大型物业管理公司（Equity Residential、AvalonBay、Greystar）需要专门的企业销售关系，并与物业管理软件集成。新进入者要复制相近规模的
              Alliance，可能需要 12-24 个月。不过，这条护城河没有法律保护：竞争性发卡方可以提供等效的 ACH 租金路由，并直接接触同一批物业管理方。若竞争者同样对房东零收费，房东从 Bilt Alliance
              切到竞争计划的成本很低。


              认知护城河来自 Bilt 是租金奖励中第一个、也是认知度最高的品牌。消费者信用卡一旦设成自动扣款，品牌切换意愿会降低。通过 Bilt 路由房租的持卡人有天然锚点。但如果竞争发卡方（Chase、Amex
              或金融科技挑战者）推出类似产品，并配上更强注册送礼，Bilt 将面临持卡人获客竞争。


              从 Wells Fargo 迁移到 Cardless（Fidem Financial + Column N.A.，2025 年宣布）是重大运营风险。所有现有 Bilt World Elite Mastercard
              迁移到新的 Bilt 2.0 卡，增加流失风险和潜在持卡人流失。据报道，Wells Fargo 在 Bilt 合作上每月亏损 $10-$12M，说明从银行视角看经济模型不可持续，这与 Bilt
              既有护城河叙事相冲突。


              每月五笔交易要求是 Bilt 历史交换费模型中的结构性异点。如果 Bilt 2.0 取消或放宽这一要求，用户体验和竞争定位会改善，但也可能表明单位经济模型发生变化，进而影响长期盈利能力。


              整体护城河耐久度评为中等：Bilt 在 Alliance 中拥有有意义的先发优势和网络效应，但缺乏受法律保护的 IP、银行伙伴迁移风险，以及竞争者理论上进入租金奖励市场并不困难，都要求保持谨慎。
