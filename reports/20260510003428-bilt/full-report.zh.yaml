      - number: '5.3'
        title: 技术架构与运营模型
        blocks:
          - type: paragraph
            body: >-
              Bilt 的核心技术架构是一套云端金融科技栈，搭在第三方银行即服务（Banking-as-a-Service，BaaS）和网络基础设施之上。


              核心基础设施层：Mastercard 网络提供卡支付轨道、授权和清算。Column N.A.（通过 Cardless 伙伴 Fidem Financial）提供银行牌照、监管许可和账本基础设施。Plaid
              或类似银行连接工具接入消费者银行账户，用于 ACH 借记。AWS 或类似云服务商托管 Bilt 应用层。


              ACH 租金路由（专有核心）：Bilt 最有辨识度的技术组件，是处理租金支付的 ACH 支付路由系统。持卡人在 Bilt 应用发起租金支付时，系统：(1) 通过 Bilt 卡按信用卡交易借记持卡人；(2) 通过
              ACH 将付款路由到房东指定银行账户；(3) 按租金金额记入持卡人的 Bilt 积分账户。这样既为了奖励目的制造出卡交易形态，又向房东交付 ACH 付款（房东不支付卡处理费）。这种
              ACH-卡混合结构中的交换费经济模型具体如何运作，并未公开记录，是关键商业模式秘密。


              Alliance 集成层：Bilt 与主要物业管理软件供应商保持 API 集成。Yardi 和 RealPage 合计服务美国多户住宅市场 50% 以上；Bilt Alliance
              与这些平台集成后，可自动捕获租金支付。


              数据资产：Bilt 处理数百万租户的租金支付数据，形成一套关于住房支出模式、租户信用可靠性信号和社区商业消费的专有数据集。这些数据可能成为信用承销、房地产决策和商户定向的长期竞争资产。


              AI/ML：除标准欺诈检测和奖励优化外，Bilt 未披露 AI/ML 能力。没有公开资料记录生成式 AI 或重大 ML 差异化。


              技术债与风险：从 Wells Fargo 迁移到 Cardless
              是一次重大技术迁移，影响所有现有持卡人账户。卡号迁移、账单系统集成，以及奖励积分从一个银行账本转到另一个银行账本，都是复杂操作，存在数据完整性和停机风险。
