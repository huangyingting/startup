  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards 同时面对三个不同竞技场：(1) 高端旅行信用卡市场，Chase、Amex、Capital One 和 Citi 占据主导；(2) 租金支付处理市场，Plastiq、Flex、Till
              Financial 以及基于 ACH 的房东平台在此运营；(3) 新兴住房忠诚度和面向租客的金融科技领域，RentTrack、Rental Kharma、Beem 等初创公司在此活动。


              在旅行信用卡领域，Bilt 面对的是既有巨头：持卡人基数庞大，奖励生态成熟。Chase Ultimate Rewards 横跨 Sapphire、Freedom 和 Ink 产品家族，约有 35M
              持卡人。American Express Membership Rewards 在全球支撑 70M+ 张卡。这些计划提供 60,000-100,000 积分的注册送礼；Bilt
              基础卡历史上没有传统注册送礼，因此难以匹配。不过，Bilt 2.0（2026 年 2 月上线）推出分层年费卡，可能包含注册送礼。


              在租金支付处理领域，Plastiq 允许租客用任意信用卡付房租，但向租客收取 2.5-3% 处理费，抵消大多数奖励计划的价值，也被许多房东禁止。Flex（先买后付金融科技）和 Till Financial
              收取分期式费用。这些服务都没有真正做到房东免费且租客赚积分。Bilt 对房东零费用的模型在结构上更优，也推动了 Alliance 楼宇入网。


              在住房忠诚度金融科技领域，竞争者包括：RentTrack（通过房租上报信用）；Rental Kharma（信用建设）；Beem（租金支付应用）；Dwolla 和 Zego（房东支付处理商）。它们都没有提供可与
              Bilt 相比的消费者奖励计划。
