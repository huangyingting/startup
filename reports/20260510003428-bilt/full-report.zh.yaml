  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >-
              Bilt Rewards 运营多边商业模式，至少可识别五类收入来源，但公司不公开披露财务报表或收入拆分。


              收入来源 1 - 交换费（主要）：Bilt 持卡人消费时，Bilt 从向商户收取的交换费中分成。World Elite Mastercard 在非租金消费上的标准交换费率约为
              2.0-2.35%。租金支付中，由于房东不是传统收卡商户，有效交换费更低或结构不同。Wells Fargo 合作中披露的亏损说明，租金专项交换费收入显著低于奖励计划资金成本，这是 Wells Fargo
              退出的关键因素。


              收入来源 2 - 联名卡经济模型：在 Wells Fargo 合作（现正迁移到 Cardless）下，Bilt
              从联名卡安排中获得收入。联名卡经济模型通常包括交换费分成、年费（高端档）以及潜在的按账户收费。Bilt-Wells Fargo 协议的具体条款从未公开披露。迁移到 Cardless 可能显著重构这一收入来源。


              收入来源 3 - 商户联合营销费：Bilt 向 40,000+ 商户伙伴收取联合营销费，让商户在 Bilt 应用中获得展示，并向持卡人提供奖励积分。这是来自商户网络的直接收入来源，类似 DoorDash、Uber
              或 Lyft 的商户合作模式。


              收入来源 4 - Bilt Home（房地产转介）：用户通过 Bilt Home 平台把累积积分用于购房服务或房贷首付，Bilt 从促成的房地产交易中赚取转介费，并可能获得收入分成。


              收入来源 5 - 高端卡年费：Bilt 2.0 推出分层年费卡（$95 和 $495 档）。年费收入直接来自持卡人，是建模中已知的收入量。


              收入结构：确切收入结构未知。交换费经济模型是理论上最大的驱动因素，但 Wells Fargo 合作亏损说明，如果没有补充收入，租金交换费经济模型不足以覆盖奖励计划成本。随着公司放大 Bilt
              2.0，商户联合营销费和年费可能成为增长中的贡献项。
