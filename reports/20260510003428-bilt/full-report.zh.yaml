      - number: '6.3'
        title: 具名客户验证（房东和物业管理公司）
        blocks:
          - type: paragraph
            body: >
              Bilt Alliance 包含美国最大的一批机构公寓运营商，形成强有力的具名 B2B 客户验证。Equity Residential 是上市 REIT，拥有 93,600 套公寓，也是已落地的 Alliance
              参与方。AvalonBay Communities（88,000+ 套）加入 Alliance，并向住户推广 Bilt 卡。Greystar Real Estate Partners 是美国最大的公寓管理方，管理
              750,000 套房源，也参与 Alliance，带来相当规模。GID Investment Group（约 40,000 套）同时投资了 Bilt 的 Series D，构成投资人兼客户关系。Camden
              Property Trust（约 58,000 套）和其他大型多户住宅 REIT 补足 Alliance 名单。这些都是生产环境部署——房东在签约时以及门户支付选项中主动推荐 Bilt
              卡。上述客户未公开披露结果指标（如租户留存提升、支付违约下降），因此结果证据质量有限。
