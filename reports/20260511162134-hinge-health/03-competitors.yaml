      relatedQuestionRefs: [QP021]

    - type: private-evidence-only
      severity: material
      topic: sword-health-revenue-scale
      missingEvidence: "Sword Health's actual annual revenue, client count, and health plan distribution breadth; company is private and does not disclose these metrics"
      whyItMatters: "Without Sword's revenue and distribution scale, it is impossible to independently assess whether it is a near-term or medium-term threat to Hinge Health's enterprise market share"
      diligencePath: "Review Sword Health job postings for headcount signals; survey benefits consultants; request Sword Health pitch deck through broker relationships; monitor for IPO or M&A disclosures"
