      severity: material
      topic: customer-acquisition-cost
      missingEvidence: "CAC by channel (employer direct vs. health plan facilitated); average selling price per contract; sales force headcount by channel; CAC payback period"
      whyItMatters: "LTV/CAC analysis is a core institutional underwriting criterion for subscription businesses; without CAC, the efficiency of the health plan channel flywheel cannot be assessed against direct sales cost"
      diligencePath: "Model implied CAC from new logo count (19 in Q1 2026) and S&M expense from 10-Q; request management disclosure of blended CAC at Series-level precision"
