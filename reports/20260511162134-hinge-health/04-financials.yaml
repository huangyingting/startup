artifact: financials
slug: hinge-health
runDate: "2026-05-11"
company:
  name: Hinge Health
chapter:
  number: 4
  title: Financials
  summary: >
    Hinge Health has demonstrated a rapid and credible transition to financial health: from a $108M net loss in 2023 to a $11.9M net loss in 2024 to non-GAAP operating income of $119.5M in 2025, with Q1 2026 delivering $32.1M GAAP operating income—the first sustained GAAP profitability. Revenue grew from $293M (2023) to $390M (2024) to $588M (2025), with 2026 guidance of $798–804M implying 36% growth. Gross margin reached 85% in Q1 2026, among the highest in healthcare SaaS. The company ended Q1 2026 with $407M in cash and generated $179.6M in free cash flow for full-year 2025. The PMPM per-engaged-member model drives 3.9% yield from contracted lives and produces high-quality recurring revenue with 117% NDR and 97–98% client retention. Key financial gaps include private-metric details: exact PMPM pricing, CAC/payback, and cost-of-care breakdown by program are not publicly disclosed. Capital adequacy is strong given $407M cash, no debt disclosed, and an authorized $250M buyback program ($170M deployed).

sections:
  - id: revenue-model
    title: Revenue Model and Revenue Streams
    body: >
      Hinge Health generates revenue through a single primary stream: per-member-per-month (PMPM) subscription fees paid by self-insured employers and health plans on behalf of their employees and members. The company does not charge individual users; all revenue is enterprise B2B. PMPM fees are recognized as services are delivered to active members, creating a revenue model that is directly tied to member engagement rather than contracted lives. This "pay-for-engagement" structure aligns incentives between Hinge Health and its employer/health plan customers—clients pay only for members who are actively using the platform.

      Revenue is recognized monthly based on the number of members engaged in the applicable reporting period, which means revenue is somewhat usage-dependent and not entirely contractually guaranteed at the point of signing. However, the high retention rates (97–98% client retention) and expanding per-client revenue (117% NDR) indicate that revenue quality is high: existing contracts consistently generate more revenue over time as more members enroll and as clients add programs.

      Secondary revenue components include hardware-related revenue from Enso device shipments (included in the subscription bundle for eligible members) and HingeSelect in-person provider network fees (charged as professional services through employer or health plan contracts). These secondary streams are not separately disclosed but are embedded in total PMPM revenue recognition. The company does not operate a consumer DTC subscription model; there is no meaningful direct-to-consumer revenue. Hinge Health's revenue mix is approximately 84% from health plan distribution and 16% from direct employer contracts as of Q1 2026. Revenue concentration in the top three health plan partners (HCSC ~16%, Elevance ~13%, Aetna ~10%) represents approximately 39% of total revenue—a concentration risk documented in the S-1 and acknowledged in earnings disclosures.

      FY2025 GAAP revenue was $587.9 million (+51% YoY from $390.4M in FY2024). Q1 2026 GAAP revenue was $182.3 million (+47% YoY from Q1 2025's $123.8M). FY2026 guidance of $798–804 million at the midpoint implies 36% growth. LTM calculated billings as of Q1 2026 were $769.9 million (+52% YoY), which is a leading indicator of forward revenue given the nature of PMPM contracts.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: unit-economics
    title: Unit Economics, Gross Margin, and Cost Structure
    body: >
      Hinge Health's gross margin has expanded consistently, reaching 85% in Q1 2026—among the highest in healthcare software. GAAP gross margin for FY2025 was 80% (non-GAAP 83%), up from 77% GAAP and 78% non-GAAP in FY2024. The gross margin expansion is driven by the company's claim that AI automation (TrueMotion, Robin AI assistant) has reduced human clinical therapist hours by 97%, dramatically lowering the cost of clinical service delivery as member volume scales. Enso device cost-of-goods also decreases as manufacturing volumes increase under the hardware supply relationship, though device cost is not separately disclosed.

      Operating expenses include research and development (AI and product development), sales and marketing (enterprise direct and health plan channel sales), and general and administrative. The company's 2025 GAAP operating loss of $546.4 million was almost entirely driven by one-time stock-based compensation charges related to the May 2025 IPO (RSU vesting and option exercises); non-GAAP operating income for 2025 was $119.5 million, representing a 20.3% non-GAAP operating margin. Q1 2026 GAAP operating income was $32.1 million (17.6% GAAP margin) and non-GAAP operating income was $46.2 million (25.4% non-GAAP margin). The company's Rule of 40 score (revenue growth rate + non-GAAP FCF margin) was 81 in FY2025, well above the 40-point benchmark for high-quality SaaS businesses.

      Key private metrics that are not publicly disclosed include: exact PMPM pricing by contract type (employer vs. health plan vs. Medicare Advantage), customer acquisition cost (CAC), sales efficiency (CAC payback period), cost-of-care breakdown by clinical program, and Enso device gross margin. The company provides annual yield (3.9% in 2025, trending north of 4% in 2026) as a proxy for engagement depth but does not provide complete unit economics for a fully loaded PMPM cost or per-member profitability analysis. Per-member economics can be partially inferred: with ~$588M revenue and ~783K active members (Dec 2025), implied average revenue per active member was approximately $750/year or $63/month, though this blends different PMPM rates and contract structures.
    claimRefs: [CI007, CI008, CI009, CI010, CI011, CI012, CI013]
    tableRefs: [TI002, TI003]
    figureRefs: [FI002]

  - id: capital-structure
    title: Capital Adequacy, Cash, and Capital Structure
    body: >
      Hinge Health's balance sheet is strong relative to its operating profile. As of March 31, 2026, the company held $407.1 million in cash, cash equivalents, and marketable securities. Free cash flow for FY2025 was $179.6 million (30.5% FCF margin on $588M revenue), and Q1 2026 FCF was $41.6 million (22.9% margin). The company has no publicly disclosed debt, credit facility, or project finance obligations that would create near-term liquidity risk. Runway at current operating cash generation is effectively indefinite given positive FCF and a strong cash balance.

      The company's May 2025 IPO raised $437 million total ($237 million primary proceeds to the company from 8.5 million new shares at $32/share, and $200 million in secondary proceeds to selling shareholders). The primary proceeds were added to the balance sheet and supplement operating cash generation. Post-IPO capital allocation priorities include the $250 million share repurchase authorization (November 2025), of which $65 million was deployed in Q4 2025 and $105 million in Q1 2026—$170 million total as of March 2026. The repurchase program signals management's confidence in intrinsic value and absorbs the dilutive effect of ongoing RSU and option grants.

      Working capital dynamics are favorable for a PMPM subscription business: revenue is paid monthly by employers and health plans (often in advance or net-30), Enso device inventory is pre-purchased for active members (modest capex requirement), and PT session costs are variable with engagement. The company does not have significant capex requirements typical of hardware manufacturers; the Enso device is manufactured by a third-party contract manufacturer. Capital intensity is therefore low, and the FCF conversion rate (free cash flow as a percentage of non-GAAP operating income) should remain high as the business scales. The primary capital allocation risk is whether the $250M buyback program has absorbed shares efficiently at current valuations following the stock's partial post-IPO recovery above $32.
    claimRefs: [CI014, CI015, CI016, CI017, CI018, CI019]
    tableRefs: [TI004]
    figureRefs: [FI003, FI004]

  - id: gtm-efficiency
    title: GTM Motion and Sales Efficiency Proxies
    body: >
      Hinge Health's go-to-market efficiency is not fully disclosable through public metrics—customer acquisition cost, sales cycle length, and CAC payback period are private. However, several proxy metrics are visible. The client base grew from 2,830 (December 2025) to 2,849 (March 2026), implying relatively slow net new logo addition in Q1 2026 (~19 net new clients), which is expected for an enterprise subscription business with long sales cycles and high existing-base revenue expansion. Most revenue growth comes from the 117% NDR—expansion within the existing client base—rather than from new logo acquisition.

      The health plan distribution channel (84% of revenue) functions as a force multiplier for employer outreach: health plans bring Hinge Health's benefits to thousands of employer groups within their network at relatively low incremental sales cost per employer, compared to direct employer-by-employer sales. This channel economics model reduces CAC dramatically for the health plan-mediated segment. The company reports that all five largest national health plans and 60+ total health plan partners are active distribution channels, providing broad reach without proportional sales cost.

      Hinge Health's enterprise sales cycle for new health plan relationships is estimated at 12–18 months for initial integration (compliance audits, data sharing, eligibility file configuration). For direct employer contracts, cycles may be 6–18 months depending on employer size and broker intermediary involvement. These long cycles are consistent with enterprise healthcare software benchmarks and mean that revenue from new relationships signed in 2026 will be recognized primarily in 2027 and beyond. The implication for 2026 guidance reliability is positive: the guidance range of $798–804M is largely supported by existing enrolled clients, not new logo conversion.
    claimRefs: [CI020, CI021, CI022, CI023]
    tableRefs: []
    figureRefs: []

  - id: financial-gaps
    title: Financial Gaps, Evidence Conflicts, and Diligence Blockers
    body: >
      Several financial metrics critical for underwriting remain private or insufficiently disclosed. First, PMPM pricing: the company has never disclosed list PMPM pricing or average contract PMPM rates by segment (self-insured vs. health plan vs. Medicare Advantage). Industry estimates ($15–$50 PMPM) are derived from market intelligence and secondary analysis, not primary disclosure. Without confirmed PMPM pricing, investors cannot independently model revenue per contracted life or assess the impact of pricing pressure from health plan negotiation.

      Second, customer acquisition cost and payback period: Hinge Health's 10-K and 10-Q filings do not disclose CAC, sales force size by segment, or commission structure. The company's sales and marketing expense as a percentage of revenue has declined over time, suggesting improving efficiency, but precise CAC payback cannot be calculated without average contract value and average selling cycle length.

      Third, Enso device economics: the cost to manufacture, ship, and support each Enso device is not disclosed. Since Enso is bundled with PMPM subscriptions for eligible members, the device subsidy embedded in PMPM pricing affects gross margin quality. Understanding whether Enso is margin-accretive or margin-dilutive at current volumes is a material diligence question.

      Fourth, the 2025 GAAP net loss (approximately $546M) and operating loss were primarily driven by IPO-related stock compensation charges. The company's financial statements prior to the IPO (private entity) are on a different cost recognition basis than post-IPO public company statements. Investors must rely on non-GAAP metrics for 2025 performance comparison, and the 2025 GAAP figures are not representative of ongoing operating performance. Q1 2026 GAAP operating income of $32.1M provides the first clean post-IPO comparable period and confirms the non-GAAP trajectory was real, not fabricated. However, ongoing RSU grants will continue to add SBC to GAAP expenses even as the one-time IPO charge recedes.
    claimRefs: [CI024, CI025, CI026, CI027, CI028]
    tableRefs: [TI005]
    figureRefs: []

