  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: pmpm-pricing-by-segment
      missingEvidence: "PMPM list and realized pricing by buyer type (self-insured employer, commercial health plan, Medicare Advantage); volume discount schedule; Enso device COGS and subsidy per device"
      whyItMatters: "Without pricing visibility, it is impossible to independently model revenue per contracted life, pricing trajectory, or compression risk from health plan negotiation"
      diligencePath: "Request pricing schedule from IR; survey benefits consultants (Aon, Mercer) and health plan procurement for market pricing intelligence; model implied PMPM from disclosed revenue and member metrics by cohort"
      relatedQuestionRefs: [QI012, QI020, QI024]

