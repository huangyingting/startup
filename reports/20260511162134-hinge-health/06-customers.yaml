slug: hinge-health
runDate: "2026-05-11"
company:
  name: Hinge Health
chapter:
  number: 6
  title: Customers
  summary: >
    Hinge Health serves 2,849 enterprise clients as of Q1 2026—primarily Fortune 500 self-insured employers and large commercial health plans—covering 25+ million contracted lives and approximately 783,000 active members. The customer base is diversified across sectors (aerospace, government, retail, technology, healthcare) with named production deployments including Boeing, the City of Los Angeles, and Amazon. All five largest national health plans distribute Hinge Health to their employer groups, making the health plan channel the dominant go-to-market with 84% of revenue. Key customer quality metrics include 97–98% client retention, 117% net dollar retention, and an NPS of ~70 reported as of 2024. Revenue concentration is a risk: the top three health plan partners (HCSC ~16%, Elevance ~13%, Aetna ~10%) represent ~39% of total revenue. Named employer case studies demonstrate triple-digit ROI, but rely on self-selected high-engagement cohorts and are not independently audited. The primary diligence gaps are absence of independently verifiable per-client revenue data, limited transparency in health plan contract terms, and the unknown concentration of active members within a small subset of large employer deployments.

sections:
  - id: customer-segments
    title: Customer Segmentation by Buyer and Use Case
    body: >
      Hinge Health's customer base divides into two primary buyer segments: self-insured employers (direct enterprise sales) and health plans (distribution channel for employer groups within their networks). As of Q1 2026, the company serves 2,849 unique client accounts. The approximate revenue split is 84% from health plan distribution and 16% from direct self-insured employer contracts—reflecting the strategic shift since 2021 toward health plan partners as the primary go-to-market channel.

      Within the employer segment, Hinge Health predominantly targets large self-insured employers with 500+ employees, particularly Fortune 500 companies and state/municipal governments. Confirmed named employer clients include Boeing (aerospace manufacturing, confirmed 2021 case study), the City of Los Angeles (municipal government, confirmed 2024 case study), and Amazon (through the Amazon Health Services integration announced 2025). The company discloses serving 50 of the Fortune 500, which represents 10% penetration of the Fortune 500 base—a credible statement of enterprise reach. Employer clients across sectors include manufacturing, technology, retail, healthcare systems, and government.

      Within the health plan segment, confirmed national health plan distribution partners include HCSC (Blue Cross Blue Shield of Illinois and affiliates, ~16% of revenue), Elevance Health/Anthem (~13% of revenue), and Aetna/CVS Health (~10% of revenue). Together, these three represent ~39% of total company revenue as disclosed in the S-1. The company also distributes through Cigna, UnitedHealth Group (UHC/Optum), and 60+ regional health plans. The Medicare Advantage channel is a growing segment, though specific MA client names and revenue contribution are not publicly disclosed.

      A third buyer segment is hospital systems and integrated delivery networks (IDNs), though this segment is not separately highlighted in Hinge Health's investor disclosures. Kaiser Permanente has been discussed in press as a potential partner, though no confirmed enterprise contract is documented. The HingeSelect in-person PT network (4,100 locations) requires IDN-adjacent provider relationships but does not imply IDN enterprise contracts.

      The geographic coverage of Hinge Health is national (U.S. focused). The company serves employers and health plans across all 50 states. International expansion is not currently disclosed as a business priority; the S-1 and earnings materials contain no non-U.S. revenue component or expansion plan.
    claimRefs: [CU001, CU002, CU003, CU004, CU005]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-trajectory
    title: Adoption Trajectory and Active Member Growth
    body: >
      Hinge Health's adoption is best measured through three linked metrics: contracted lives (total lives covered under enterprise contracts), active members (members with meaningful platform engagement in any given period), and annual yield (active members / contracted lives). All three metrics have been on a positive trajectory through 2025 and into Q1 2026.

      Contracted lives grew to approximately 25 million as of December 2025 (per FY2025 annual disclosure), up from approximately 20 million in December 2024. This growth reflects both new health plan contract additions and expansion of existing plan coverage to additional employer groups within health plan networks. Active members—the monetizable subset of contracted lives—reached approximately 783,000 as of December 2025, implying an annual yield rate of 3.9% for FY2025. The yield rate improved modestly from approximately 3.7% in FY2024, indicating that Hinge Health is making progress on member activation but has vast whitespace: 96.1% of contracted lives have never engaged with the platform.

      Client count has grown steadily: from approximately 2,600 in December 2023 to 2,830 in December 2025 to 2,849 in March 2026. The Q1 2026 net new client addition of only 19 accounts suggests that the enterprise sales pipeline is selective and focused on high-value logos rather than volume. The primary growth driver is expansion within existing clients (117% NDR), not net new logo addition. This is consistent with the health plan distribution model, where new employer groups within an existing health plan contract are automatically covered without requiring individual employer-by-employer sales.

      Member engagement depth, as measured by average exercise sessions per active member, is not publicly disclosed. The company does report outcomes (pain reduction, surgery avoidance) but does not provide average sessions per member, dropout rates after first session, or completion rates for the full 12-week program. These metrics are critical for assessing whether the 3.9% yield represents deeply engaged members or shallow one-time users—an open diligence gap.
    claimRefs: [CU006, CU007, CU008, CU009, CU010]
    tableRefs: [TU002]
    figureRefs: []

  - id: named-customers
    title: Named Customer Proof and Production Deployment Evidence
    body: >
      Hinge Health has published several named customer case studies that provide concrete deployment evidence. The Boeing case study (aerospace manufacturing, self-insured employer) documents deployment to Boeing's U.S. employee population with outcomes including claimed triple-digit ROI on healthcare spend (surgeries avoided, PT visit reductions). The specific ROI metrics cited by Hinge Health are company-published and not independently audited; however, the Boeing deployment itself is a confirmed production-scale reference. Boeing's self-insured employee health spend is substantial given ~150,000 U.S. employees—the scale of the Hinge Health program within that population is not disclosed.

      The City of Los Angeles case study (municipal government, self-insured public employee plan) documents deployment to city workers with outcomes including pain reduction and physical function improvement, reported via NRS and EQ-5D instruments. The City of LA deployment demonstrates Hinge Health's penetration into public sector employer plans, which often have different procurement processes (RFP-based, union negotiation) compared to private sector employers. Public sector deployments signal program quality durability under political and union scrutiny.

      The Amazon Health Services integration (announced 2025) represents a new type of customer proof: distribution through Amazon's employer health benefits infrastructure to Amazon's approximately 1.5 million U.S. employees. This is not a direct employer contract—it flows through Amazon Health Services as a health benefit provider—and the actual Hinge Health active member count from the Amazon channel is not disclosed. The strategic significance is high: Amazon's brand halo effect and distribution scale make this one of the most visible employer endorsements in the digital health space.

      In aggregate, the company's customer proof consists of high-quality named employer references (Boeing, City of LA, Amazon channel), strong aggregate outcome statistics (68% pain reduction, 58% surgery avoidance), and a robust NPS (~70) that places Hinge Health among the highest-rated enterprise health benefit vendors. The NPS figure (disclosed as of 2024 in Fierce Healthcare) is a meaningful quality signal for employer purchasers but is measured among active members, not among the broader contracted lives population.
    claimRefs: [CU011, CU012, CU013, CU014, CU015]
    tableRefs: [TU003]
    figureRefs: [FU002]

  - id: retention-expansion
    title: Retention, NRR, and Client Durability
    body: >
      Hinge Health reports client retention of 97–98% as of the most recent disclosure, and net dollar retention (NDR) of 117% as of December 2024. These are among the strongest retention metrics in the enterprise digital health segment and are comparable to best-in-class enterprise software companies. The mechanics of the 97–98% retention rate reflect two dynamics: health plans rarely terminate vendor relationships mid-contract cycle (12–36 month contracts typical), and the cost and disruption of migrating members to a competing MSK platform is high for both the health plan and the employer groups within the plan.

      The 117% NDR is driven primarily by three expansion mechanisms within existing client relationships: (1) increasing yield—more contracted lives becoming active members over time as employer wellness programs promote Hinge Health enrollment; (2) program expansion—existing clients adding pelvic health, fall prevention, or migraine programs on top of the core MSK program; and (3) contracted life growth—as employer groups within a health plan's network add more employees or as the health plan expands its covered employer base, more lives are added to the Hinge Health contract at the same PMPM rate.

      Client retention at 97–98% implies a gross revenue retention (GRR) approximately equal to the retention rate (97–98%), with the NDR uplift of 17 percentage points driven by expansion. This structure confirms that Hinge Health's growth strategy is primarily an expansion play within a locked-in client base rather than a new logo acquisition engine. The implication for long-term revenue visibility is positive: given the high cost of switching (member data migration, clinical continuity risk, procurement complexity), clients that survive the first renewal cycle are unlikely to churn unless a competitor offers dramatically superior outcomes at lower cost.

      An important gap: the 117% NDR figure was last disclosed as of December 2024 and has not been updated in Q3 2025, Q4 2025, or Q1 2026 earnings materials. The Q1 2026 billings growth of 52% YoY implies NDR is holding or improving, but the lack of a freshly disclosed NDR metric is a minor diligence concern. The company also does not disclose GRR separately from NDR, which would help distinguish churn-driven headwinds from expansion tailwinds within the retention metric.
    claimRefs: [CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU004]
    figureRefs: [FU003]

  - id: concentration-gaps
    title: Customer Concentration Risks and Evidence Gaps
    body: >
      Revenue concentration in health plan partners is the primary customer risk for Hinge Health. Three health plans (HCSC, Elevance, Aetna) represent approximately 39% of total revenue. Theoretically, a non-renewal or rate renegotiation by HCSC (the largest at ~16%) would create an immediate $126M annual revenue headwind (based on FY2026 guidance midpoint of $801M). Health plan contracts typically have 12–36 month terms and require regulatory approval for significant changes. However, if HCSC were to shift to a competing MSK vendor, the transition would take 12–18 months—providing time for Hinge Health to replace the revenue. The real risk is a cumulative negotiation by multiple health plans pushing for lower PMPM rates, especially as Sword Health, Omada, and other digital MSK vendors compete aggressively on price.

      Member concentration within employer accounts is a second-order risk that is not publicly disclosed. The 783,000 active members spread across 2,849 clients implies an average of approximately 275 active members per client. However, if a handful of large employers (Boeing, Amazon, City of LA) account for a disproportionate share of active members, then client retention metrics at the account level may understate the concentration of engaged member revenue.

      Evidence gaps that limit confidence in customer quality assessment include: (1) the absence of independently audited case study ROI figures; Hinge Health's Boeing, City of LA, and Amazon-channel outcomes are self-reported and not verified by third-party actuaries; (2) the NPS (~70) is measured among active members only—not among the broader contracted lives population, which would likely show lower satisfaction given the low yield rate; (3) health plan contract terms (length, PMPM rate, exclusivity provisions) are not disclosed; and (4) no customer satisfaction data from health plan procurement teams (as opposed to end-member NPS) is available in public filings or press.

      The Kaiser Health News independent analysis (2024) of digital PT apps including Hinge Health and Sword Health noted that employer and plan buyers have difficulty independently verifying outcome claims and often rely on Hinge Health's own case studies—a conflict of interest in the commercial evidence base. This is a systemic limitation of the digital health evidence ecosystem, not unique to Hinge Health, but it is relevant to the quality assessment of named customer proof.
    claimRefs: [CU021, CU022, CU023, CU024, CU025]
    tableRefs: [TU005]
    figureRefs: [FU004]

