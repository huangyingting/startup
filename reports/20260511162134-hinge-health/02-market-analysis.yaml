  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: serviceable-obtainable-market
      missingEvidence: "Independent bottom-up SOM estimate by segment, including health plan PMPM rates, employer PMPM rates, and member eligibility penetration rates by plan type"
      whyItMatters: "Without an independently-constructed SOM, investors must rely on management's own TAM framing which may overstate the near-term opportunity"
      diligencePath: "Request anonymized health plan and employer contract terms; model PMPM pricing assumptions from disclosed revenue and contracted lives metrics"
      relatedQuestionRefs: [QM006, QM019, QM025]

    - type: missing-source
      severity: material
      topic: medicare-ffs-reimbursement-timeline
      missingEvidence: "Official CMS coverage determination or NPRM for digital MSK programs under Medicare fee-for-service; timeline for formal benefit category establishment"
      whyItMatters: "CMS reimbursement would unlock the $9B Medicare/Medicaid SAM identified in the S-1—a 33% TAM expansion—but timeline uncertainty makes it difficult to incorporate into near-term valuation"
      diligencePath: "Monitor CMS Innovation Center (CMMI) pilot announcements; review prior authorization and LCD determination filings; track legislative proposals for digital therapeutics coverage"
      relatedQuestionRefs: [QM014, QM023]

    - type: stale
      severity: minor
      topic: market-size-estimate-currency
      missingEvidence: "2026-vintage independent market sizing that post-dates Hinge Health's IPO and Q1 2026 results; most analyst reports have 2024-2025 data collection dates"
      whyItMatters: "The IPO and Q1 2026 results may materially shift analyst views on market penetration and TAM; stale estimates could understate actual market development"
      diligencePath: "Commission or procure 2026-vintage digital MSK market sizing from Grand View Research or Frost & Sullivan"

    - type: conflicting
      severity: minor
      topic: analyst-market-size-conflict
      missingEvidence: "Reconciliation of global market sizing ($5-6B) with Hinge Health's US-only TAM ($27B+); the figures are not directly comparable but are often cited in the same context"
      whyItMatters: "Conflicting figures could cause investor confusion about true market opportunity; the $27B US TAM is broader in category scope than the $5-6B digital MSK pure-play estimate"
      diligencePath: "Map each analyst's category definition against Hinge Health's S-1 taxonomy; verify which spend types are included in each estimate"
      relatedQuestionRefs: [QM021]

