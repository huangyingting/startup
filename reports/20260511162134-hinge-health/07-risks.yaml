      confidence: medium
      freshness: current
      answersQuestionRefs: [QR018]
  
    - id: CR030
      statement: "Hinge Health's working capital profile is favorable: health plan contract payments are made on a per-member-per-month subscription basis with net-30 to net-60 payment terms, and deferred revenue from prepaid health plan contracts provides a positive cash flow timing advantage; the company has not disclosed significant credit facility covenants or debt service requirements as of Q1 2026."
