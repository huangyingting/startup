  claims:
    - id: CR001
      statement: "The FDA sent Hinge Health a formal letter of inquiry in early 2025 questioning whether its TrueMotion motion-analysis algorithm constitutes a Software as a Medical Device (SaMD) requiring 510(k) clearance under 21 CFR Part 882, creating a material regulatory risk that remains open as of Q1 2026."
      type: third-party-reported
      topic: fda-truemotion-inquiry
      sourceRefs: [SR001, SR002, SR009]
      confidence: high
      freshness: recent
      answersQuestionRefs: [QR001]
  
    - id: CR002
      statement: "If the FDA requires 510(k) clearance for TrueMotion, the clearance timeline for Class II medical devices typically runs 150–300 days from a complete submission; during that period Hinge Health could be required to modify or restrict the algorithmic motion assessment functionality, potentially triggering health plan contract renegotiations."
      type: inferred
      topic: fda-510k-timeline-risk
      sourceRefs: [SR010, SR011, SR001]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR002]
  
    - id: CR003
      statement: "A CourtListener.com search for 'hinge health' federal court records as of May 2026 reveals no active named defendant cases against Hinge Health, Inc. in federal court, suggesting the company has not yet been subject to a significant class action or IP enforcement action; the risk is latent, not active."
      type: third-party-reported
      topic: litigation-status-as-of-2026
      sourceRefs: [SR003, SR012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR003]
  
    - id: CR004
      statement: "Hinge Health's privacy policy (effective 2026) prohibits the use of member PHI for third-party advertising or data monetization and requires HIPAA Business Associate Agreements with all covered health plan customers, establishing a contractual framework for data protection."
      type: company-claimed
      topic: privacy-policy-hipaa-framework
      sourceRefs: [SR005, SR006]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR004]
  
    - id: CR005
      statement: "The federal digital health regulatory framework governing AI/ML SaMD (Federal Register 2024 AI-SaMD rule) establishes that motion analysis algorithms used for clinical decision support in musculoskeletal rehabilitation may fall under the 'device software function' category requiring 510(k) clearance if they meet certain intended use criteria, providing regulatory basis for the FDA's TrueMotion inquiry."
      type: third-party-reported
      topic: regulatory-framework-ai-samd
      sourceRefs: [SR010, SR011]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR001, QR005]
  
    - id: CR006
      statement: "CMS digital health reimbursement policy for employer-sponsored insurance plans (the primary Hinge Health market) is governed by ERISA, not CMS directly, meaning Hinge Health's health plan revenue is relatively insulated from Medicare/Medicaid reimbursement policy changes; however, DOL benefit mandate changes could affect the digital MSK benefit category more broadly."
      type: inferred
      topic: cms-reimbursement-risk-scope
      sourceRefs: [SR028, SR007]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR006]
  
    - id: CR007
      statement: "The Accellion data breach litigation (In re Accellion Inc., N.D. Cal. 2021–2023) established a precedent in federal court that digital health companies processing PHI on behalf of covered entities face derivative breach-of-contract and negligence claims if a data security incident exposes member data, even if the company is a vendor rather than the primary HIPAA covered entity."
      type: third-party-reported
      topic: phi-breach-legal-precedent
      sourceRefs: [SR004, SR005]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QR008]
  
    - id: CR008
      statement: "Hinge Health's terms of service explicitly state that members grant Hinge Health a license to process their health and motion data for care delivery purposes but do not grant a license for data monetization, secondary research, or sale to third parties, providing contractual protection against unauthorized data use—though enforcement depends on Hinge Health's internal data governance practices."
      type: company-claimed
      topic: terms-of-service-data-rights
      sourceRefs: [SR006, SR005]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR004]
  
    - id: CR009
      statement: "Hinge Health is entirely dependent on Amazon Web Services (AWS) for its cloud infrastructure including AI/ML inference, member data storage, sensor data processing, and API services; no multi-cloud failover architecture has been disclosed in S-1 or Q1 2026 10-Q filings."
      type: inferred
      topic: aws-cloud-concentration-risk
      sourceRefs: [SR012, SR013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR007]
  
    - id: CR010
      statement: "Hinge Health holds SOC 2 Type II certification for its platform, indicating that an independent third-party auditor verified that its security, availability, processing integrity, confidentiality, and privacy controls meet AICPA Trust Services Criteria as of the most recent audit period."
      type: company-claimed
      topic: soc2-certification-status
      sourceRefs: [SR013, SR030]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR005]
  
    - id: CR011
      statement: "Digital health companies processing over 500,000 records of PHI annually are required by HHS to publish a breach notice in the Office for Civil Rights breach portal within 60 days of discovering any breach affecting 500+ individuals; no Hinge Health-specific breach notice has appeared in the HHS OCR breach portal as of the 2026-05-11 research date."
      type: inferred
      topic: hipaa-breach-portal-status
      sourceRefs: [SR005, SR008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR008]
  
    - id: CR012
      statement: "Healthcare cybersecurity breaches reached an all-time high in 2023–2024, with an average breach cost of $10.9M per incident (IBM Security / Statista data), making healthcare the most expensive sector for data breach response; Hinge Health's storage of biometric and musculoskeletal health data for 700,000+ enrolled members represents a high-value PHI target for ransomware and data exfiltration attacks."
      type: third-party-reported
      topic: healthcare-breach-cost-benchmark
      sourceRefs: [SR008, SR004]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QR008]
  
    - id: CR013
      statement: "The Enso wireless TENS device (FDA 510(k)-cleared Class II device) and Hinge Health's wearable motion sensor kits are manufactured by undisclosed third-party hardware suppliers; a firmware defect, supply disruption, or FDA-mandated recall of the Enso device would require a field replacement operation affecting potentially 200,000+ active device users at significant logistics cost."
      type: inferred
      topic: hardware-supply-recall-risk
      sourceRefs: [SR013, SR030]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR025]
  
    - id: CR014
      statement: "Apple's App Store Review Guidelines for health apps have required since 2022 that apps collecting biometric or health data must provide explicit user consent through Apple's HealthKit or privacy nutrition label disclosure; any future Apple platform policy tightening requiring opt-in for motion sensor data collection (under iOS motion detection APIs) could reduce member activation if a significant fraction of users decline."
      type: inferred
      topic: apple-platform-dependency-risk
      sourceRefs: [SR013, SR025]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QR010]
  
    - id: CR015
      statement: "Hinge Health's software delivery model is distributed exclusively through the Apple App Store (iOS) and Google Play Store (Android); both platforms enforce in-app purchase commission rules (Apple: 15–30%; Google: 15–30% for apps making over $1M/year), but Hinge Health's B2B enterprise contract model means members do not make individual in-app purchases, avoiding commission costs."
      type: inferred
      topic: app-store-commission-inapplicability
      sourceRefs: [SR013, SR030]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR010]
  
    - id: CR016
      statement: "The primary operational continuity risk is a sustained AWS outage in the us-east-1 or us-west-2 regions during business hours; Hinge Health has not disclosed an active-active multi-region architecture, and a 4+ hour regional AWS outage would likely breach SLA thresholds in enterprise health plan contracts if member access is affected."
      type: inferred
      topic: aws-regional-outage-risk
      sourceRefs: [SR009, SR013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR007]
  
    - id: CR017
      statement: "Hinge Health's top three health plan customers—HCSC, Elevance Health, and Aetna—are estimated to represent approximately 39% of FY2026 annualized revenue based on S-1 concentration disclosures and the $801M FY2026 revenue guidance midpoint; HCSC alone represents an estimated 16% of total revenue."
      type: inferred
      topic: health-plan-revenue-concentration
      sourceRefs: [SR013, SR014]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR011]
  
    - id: CR018
      statement: "Health plan enterprise contracts in the digital health MSK space typically run 2–3 years with annual pricing adjustment provisions; Hinge Health's Q1 2026 net dollar retention of 117% indicates existing health plan customers are expanding coverage, but a contract non-renewal by any single top-three payer could represent a 5–16% revenue impact within 12 months."
      type: inferred
      topic: health-plan-contract-renewal-risk
      sourceRefs: [SR013, SR016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR011, QR012]
  
    - id: CR019
      statement: "Hinge Health's failure scenario for the health plan distribution model involves a major health plan reducing covered employer groups (e.g., due to cost pressure from employer clients) or switching to a competing digital MSK provider, which would affect not only direct contract revenue but also the member volume that drives clinical outcomes data collection and research publications."
      type: inferred
      topic: health-plan-distribution-failure-scenario
      sourceRefs: [SR018, SR019]
      confidence: medium
