  evidenceGaps:
    - id: EGR001
      description: "FDA inquiry correspondence and Hinge Health's formal response to the FDA are not public; the status of the TrueMotion inquiry can only be tracked via quarterly 10-Q risk factor disclosures. The exact scope of what the FDA is questioning and Hinge Health's proposed remediation approach are not disclosed."
      relatedQuestionRefs: [QR001]
  
    - id: EGR002
      description: "Hinge Health's AWS infrastructure architecture (multi-region redundancy, active-active failover, RTO/RPO commitments) is not publicly disclosed. Business continuity plan details are only available through direct management inquiry."
      relatedQuestionRefs: [QR007]
  
    - id: EGR003
      description: "Hardware supplier identities, supply chain geography, and hardware cost per unit are not publicly disclosed. Recall preparedness and field replacement process are not described in public filings."
      relatedQuestionRefs: [QR009]
  
    - id: EGR004
      description: "Hinge Health's patent portfolio size, key patent families covering TrueMotion algorithm and sensor integration, and any freedom-to-operate analyses are not publicly available. IP risk cannot be fully quantified without reviewing undisclosed internal IP counsel assessments."
      relatedQuestionRefs: [QR019]
  
    - id: EGR005
      description: "Whether Hinge Health has conducted algorithmic bias or fairness audits of TrueMotion motion analysis across diverse user populations (age, BMI, ethnicity, prior injury) is not publicly disclosed. No public algorithmic fairness report or third-party AI audit has been identified."
      relatedQuestionRefs: [QR027]
  
    - id: EGR006
      description: "Internal control over financial reporting material weakness findings for the first year as a public company will only be known after the first annual 10-K audit attestation (expected Q1 2027 filing). The Q1 2026 10-Q does not include a full SOX 404 assessment."
      relatedQuestionRefs: [QR023]
  
    - id: EGR007
      description: "Specific clinical adjacency (migraine, women's pelvic health) execution risk is difficult to quantify without internal roadmap, clinical evidence timelines, and head count allocation data. Public disclosures provide program existence but not investment scale or risk profile."
      relatedQuestionRefs: [QR026]
  
    - id: EGR008
      description: "The regulatory / legal risk register is a partial enumeration of identified risks based on public SEC filings, CourtListener, and regulatory databases. Undisclosed administrative proceedings, private arbitration, or pre-litigation demands are not captured and may exist."
