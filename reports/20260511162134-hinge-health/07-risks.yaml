    - id: CR020
      statement: "Sword Health's acquisition of Kaia Health (2024–2025) combines Sword's computer vision-based exercise platform with Kaia's digital CBT and mindfulness content library, creating a potential competitor with expanded clinical scope (MSK + mental health) and European market presence that could challenge Hinge Health's differentiation in health plan RFPs."
