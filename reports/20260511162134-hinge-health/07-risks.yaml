      sourceRefs: [SR021, SR029]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR022]
  
    - id: CR037
      statement: "The operational risk monitoring indicators for cybersecurity include: HHS OCR breach portal updates, any SOC 2 Type II recertification gap (annual recertification is standard), and media reports of Hinge Health-related data incidents; the kill criterion is a breach of 10,000+ PHI records that requires public disclosure and triggers FTC or HHS enforcement proceedings."
      type: inferred
      topic: cybersecurity-monitoring-trigger
      sourceRefs: [SR008, SR005]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR008]
  
    - id: CR038
      statement: "The financial model risk monitoring indicator is the quarterly gross margin trend; if gross margin declines two consecutive quarters below 70% (implying hardware mix is increasing as a share of revenue), this signals that the software-only transition is stalling and that unit economics are deteriorating contrary to the investment thesis."
      type: inferred
      topic: gross-margin-monitoring-trigger
      sourceRefs: [SR013, SR020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR016]
  
    - id: CR039
      statement: "Hinge Health's board of directors includes investor-nominated directors from Coatue Management, Tiger Global, and Insight Partners (per S-1 disclosures); the governance risk is that investor-nominated directors may have economic incentives to accelerate liquidity (secondary sales, M&A) that are not aligned with public minority shareholder interests in the first 12–24 months post-IPO."
