      sourceRefs: [SR013, SR018]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR011, QR012]
  
    - id: CR034
      statement: "The monitoring trigger for competitive displacement risk is the win/loss rate disclosed in Hinge Health earnings calls (management typically references competitive RFP win rates); the kill criterion is a win rate declining below 50% in health plan RFPs combined with two consecutive quarters of negative net new client additions."
