      confidence: medium
      freshness: current
      answersQuestionRefs: [QR020]
  
    - id: CR032
      statement: "The primary thesis-break trigger for the FDA/regulatory risk dimension is an FDA warning letter or mandatory 510(k) clearance demand requiring product modification while pending clearance; the monitoring indicator is any 8-K filed by Hinge Health describing an FDA enforcement action or material development in the TrueMotion inquiry."
