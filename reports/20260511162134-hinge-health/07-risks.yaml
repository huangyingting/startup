      sourceRefs: [SR013, SR030]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR013]
  
    - id: CR022
      statement: "Hinge Health disclosed in its S-1 that it relies on a small number of key scientific and clinical personnel for its outcomes research program; the loss of its Chief Medical Officer or Head of Research could delay ongoing clinical studies and undermine its evidence-based value proposition with health plan customers who conduct annual clinical evidence reviews."
