      confidence: medium
      freshness: current
      answersQuestionRefs: [QR017]
  
    - id: CR029
      statement: "Hinge Health's anti-kickback and self-referral compliance posture in its employer-plan relationships requires careful structuring: the company cannot compensate health plan sales representatives on a per-member-enrolled basis if those representatives are employees of a federally-funded health plan, as this could constitute an Anti-Kickback Statute violation; the company discloses this risk in the S-1 risk factors section."
