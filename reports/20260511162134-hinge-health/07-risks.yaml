      sourceRefs: [SR001, SR009]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR001, QR002]
  
    - id: CR033
      statement: "The thesis-break trigger for health plan concentration risk is any single top-three payer announcing a contract non-renewal at the next renewal window, which would manifest as guidance reduction (>8% below consensus) at the next earnings event and would likely trigger analyst downgrades given the revenue concentration."
