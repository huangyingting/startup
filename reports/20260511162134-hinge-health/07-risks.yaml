      topic: financial-runway-profitability-path
      sourceRefs: [SR013, SR020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR015]
  
    - id: CR026
      statement: "Hinge Health's FY2026 revenue guidance midpoint of $801M (upgraded from prior $732M guidance) represents 12–14% YoY revenue growth, a significant deceleration from the 26–28% growth rates achieved in FY2024 and FY2025; a further deceleration below 10% would pressure the revenue multiple and could make it difficult to achieve breakeven without additional cost actions."
