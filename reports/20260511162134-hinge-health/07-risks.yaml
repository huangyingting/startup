      topic: sword-kaia-competitive-threat
      sourceRefs: [SR025, SR019]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QR029]
  
    - id: CR021
      statement: "Hinge Health's co-CEO structure (Daniel Perez, CEO; Gabriel Mecklenburg, President) distributes founder authority but creates key-person dependency: both co-founders must remain engaged for the product-commercial partnership to function; the departure of either within 18 months post-IPO would be perceived as a significant negative signal by institutional investors."
