      confidence: medium
      freshness: current
      answersQuestionRefs: [QR017]
  
    - id: CR031
      statement: "CCPA compliance and the emerging patchwork of state consumer health privacy laws (Washington My Health My Data Act, Nevada SB 370, Illinois BIOMETRIC Information Privacy Act) create a compliance burden for Hinge Health as a collector of biometric and health data; the company's privacy policy acknowledges California resident rights but does not separately address Washington or Illinois biometric privacy laws."
