      topic: executive-monitoring-trigger
      sourceRefs: [SR013, SR018]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR013]
  
    - id: CR036
      statement: "The clinical evidence risk monitoring indicator is the publication of a large-scale RCT or meta-analysis of digital MSK care tools with head-to-head comparison; the kill criterion is a study finding no statistically significant clinical benefit vs. usual care in the primary MSK pain reduction endpoint, as this would undermine contract renewal justification for health plan medical directors."
