      topic: board-governance-investor-alignment-risk
      sourceRefs: [SR007, SR022]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR030]
  
    - id: CR040
      statement: "The TrueMotion algorithm risk has a highest-severity residual exposure: if the FDA ultimately determines that TrueMotion requires 510(k) clearance and Hinge Health must disable the algorithm during clearance review, the company would need to rebuild the program around exercise coaching without motion assessment — a fundamentally different product that would likely reduce clinical outcome claims and member engagement metrics."
      type: inferred
      topic: truemotion-worst-case-scenario
      sourceRefs: [SR001, SR002, SR009, SR010]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR001, QR002]
  
