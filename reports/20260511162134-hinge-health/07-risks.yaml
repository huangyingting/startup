      sourceRefs: [SR018, SR007]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QR013]
  
    - id: CR023
      statement: "The digital health and AI/ML engineering talent market remains competitive in San Francisco; Hinge Health competes for talent with Sword Health, Hims & Hers, Apple Health, and hyperscaler AI labs (Google DeepMind, Anthropic); engineering compensation is a significant expense, and the post-IPO stock option repricing environment affects retention for employees with pre-IPO option grants that may be underwater at current share prices."
