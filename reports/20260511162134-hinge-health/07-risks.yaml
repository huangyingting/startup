      confidence: medium
      freshness: current
      answersQuestionRefs: [QR029]
  
    - id: CR035
      statement: "Executive and founder key-person risk monitoring should track: (1) SEC Form 4 insider selling activity in the post-lock-up period, (2) any Form 8-K disclosing executive departures, and (3) LinkedIn/public signals of senior engineering leadership changes; the kill criterion is co-founder departure within 18 months post-IPO combined with replacement by a non-founder executive without a transition period."
