      topic: revenue-growth-deceleration-risk
      sourceRefs: [SR013, SR020]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR016]
  
    - id: CR027
      statement: "Gross margin compression risk is driven by: (1) the hardware-software mix (if health plans demand device-inclusive programs for activation, hardware economics suppress blended margin), (2) sensor hardware cost inflation, and (3) the clinical adjacency expansion program (migraine, pelvic health) which requires new hardware/software development investment with low near-term revenue contribution."
      type: inferred
      topic: gross-margin-compression-vectors
      sourceRefs: [SR016, SR018]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR016]
  
    - id: CR028
      statement: "Post-IPO public company compliance costs (SEC reporting, SOX internal controls, D&O insurance, Board governance) are estimated at $15–25M annually incremental to pre-IPO G&A based on comparable digital health IPOs (Doximity, Phreesia, Definitive Healthcare); these costs are embedded in Hinge Health's FY2026 G&A guidance and reduce the effective path to EBITDA breakeven."
