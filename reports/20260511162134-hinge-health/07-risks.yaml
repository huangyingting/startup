      topic: clinical-evidence-challenge-risk
      sourceRefs: [SR021, SR029]
      confidence: high
      freshness: recent
      answersQuestionRefs: [QR022]
  
    - id: CR025
      statement: "Hinge Health reported a net loss of approximately $88M in FY2025 and guided to operating loss improvement in FY2026 through gross margin expansion (software-only delivery model providing ~85% gross margin vs. ~60% for hardware-inclusive programs); cash post-IPO is estimated at $350–450M, providing a multi-year runway at current burn rates."
