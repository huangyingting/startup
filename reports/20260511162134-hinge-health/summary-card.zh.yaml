summary:
  headline: >
    Hinge Health 是数字 MSK 护理里的 AI 原生品类龙头，上市后仍交出行业领先的收入增速（同比 +47%）、85% 毛利率和正自由现金流；对 3–5 年持有期投资人，这是强买入标的，主要观察项是 FDA 对
    TrueMotion 的问询。
