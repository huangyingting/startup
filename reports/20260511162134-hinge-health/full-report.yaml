        - Sword Health + Kaia Health merger creates a well-capitalized challenger with AI-first PT approach
        - Monitor Sword's enterprise contract wins; if Hinge loses >3 top-50 clients it is a signal
      - - Path to Profitability
        - $407M cash, improving operating leverage, $250M buyback authorized
        - Company still pre-EBITDA-positive; R&D and G&A burden remains high relative to cohort
        - EBITDA break-even before FY2028 would validate margin expansion thesis
