      - number: '6.5'
        title: Customer Concentration Risks and Evidence Gaps
        blocks:
          - type: paragraph
            body: >
              Revenue concentration in health plan partners is the primary customer risk for Hinge Health. Three health
              plans (HCSC, Elevance, Aetna) represent approximately 39% of total revenue. Theoretically, a non-renewal
              or rate renegotiation by HCSC (the largest at ~16%) would create an immediate $126M annual revenue
              headwind (based on FY2026 guidance midpoint of $801M). Health plan contracts typically have 12–36 month
              terms and require regulatory approval for significant changes. However, if HCSC were to shift to a
              competing MSK vendor, the transition would take 12–18 months—providing time for Hinge Health to replace
              the revenue. The real risk is a cumulative negotiation by multiple health plans pushing for lower PMPM
              rates, especially as Sword Health, Omada, and other digital MSK vendors compete aggressively on price.

              Member concentration within employer accounts is a second-order risk that is not publicly disclosed. The
              783,000 active members spread across 2,849 clients implies an average of approximately 275 active members
              per client. However, if a handful of large employers (Boeing, Amazon, City of LA) account for a
              disproportionate share of active members, then client retention metrics at the account level may
              understate the concentration of engaged member revenue.

              Evidence gaps that limit confidence in customer quality assessment include: (1) the absence of
              independently audited case study ROI figures; Hinge Health's Boeing, City of LA, and Amazon-channel
              outcomes are self-reported and not verified by third-party actuaries; (2) the NPS (~70) is measured among
              active members only—not among the broader contracted lives population, which would likely show lower
              satisfaction given the low yield rate; (3) health plan contract terms (length, PMPM rate, exclusivity
              provisions) are not disclosed; and (4) no customer satisfaction data from health plan procurement teams
              (as opposed to end-member NPS) is available in public filings or press.

              The Kaiser Health News independent analysis (2024) of digital PT apps including Hinge Health and Sword
              Health noted that employer and plan buyers have difficulty independently verifying outcome claims and
              often rely on Hinge Health's own case studies—a conflict of interest in the commercial evidence base. This
              is a systemic limitation of the digital health evidence ecosystem, not unique to Hinge Health, but it is
              relevant to the quality assessment of named customer proof.
