  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation by Buyer and Use Case
        blocks:
          - type: paragraph
            body: >
              Hinge Health's customer base divides into two primary buyer segments: self-insured employers (direct
              enterprise sales) and health plans (distribution channel for employer groups within their networks). As of
              Q1 2026, the company serves 2,849 unique client accounts. The approximate revenue split is 84% from health
              plan distribution and 16% from direct self-insured employer contracts—reflecting the strategic shift since
              2021 toward health plan partners as the primary go-to-market channel.

              Within the employer segment, Hinge Health predominantly targets large self-insured employers with 500+
              employees, particularly Fortune 500 companies and state/municipal governments. Confirmed named employer
              clients include Boeing (aerospace manufacturing, confirmed 2021 case study), the City of Los Angeles
              (municipal government, confirmed 2024 case study), and Amazon (through the Amazon Health Services
              integration announced 2025). The company discloses serving 50 of the Fortune 500, which represents 10%
              penetration of the Fortune 500 base—a credible statement of enterprise reach. Employer clients across
              sectors include manufacturing, technology, retail, healthcare systems, and government.

              Within the health plan segment, confirmed national health plan distribution partners include HCSC (Blue
              Cross Blue Shield of Illinois and affiliates, ~16% of revenue), Elevance Health/Anthem (~13% of revenue),
              and Aetna/CVS Health (~10% of revenue). Together, these three represent ~39% of total company revenue as
              disclosed in the S-1. The company also distributes through Cigna, UnitedHealth Group (UHC/Optum), and 60+
              regional health plans. The Medicare Advantage channel is a growing segment, though specific MA client
              names and revenue contribution are not publicly disclosed.

              A third buyer segment is hospital systems and integrated delivery networks (IDNs), though this segment is
              not separately highlighted in Hinge Health's investor disclosures. Kaiser Permanente has been discussed in
              press as a potential partner, though no confirmed enterprise contract is documented. The HingeSelect
              in-person PT network (4,100 locations) requires IDN-adjacent provider relationships but does not imply IDN
              enterprise contracts.

              The geographic coverage of Hinge Health is national (U.S. focused). The company serves employers and
              health plans across all 50 states. International expansion is not currently disclosed as a business
              priority; the S-1 and earnings materials contain no non-U.S. revenue component or expansion plan.
