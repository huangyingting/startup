      - number: '5.2'
        title: TrueMotion AI, Robin, and AI-Enabled Clinical Delivery
        blocks:
          - type: paragraph
            body: >
              The technology differentiation at the core of Hinge Health's product strategy is AI-enabled clinical
              automation. Two distinct AI systems underpin the platform: TrueMotion and Robin. TrueMotion is a computer
              vision and motion sensing system that uses the mobile device camera and accelerometer/gyroscope sensors to
              track patient body position during therapeutic exercises. TrueMotion provides real-time form guidance
              (audio and visual cues during the exercise session), rep counting, range-of-motion measurement, and
              post-session feedback on movement quality. The company claims that TrueMotion now guides approximately 97%
              of exercise sessions without active human physical therapist oversight, compared to a 2019 baseline where
              most sessions required a human PT check-in. This ratio is central to the gross margin expansion thesis:
              replacing PT hours with AI-guided sessions dramatically reduces the cost of clinical delivery at scale.
              However, the 97% figure has not been independently verified, and the claim assumes a definition of "active
              PT oversight" that may exclude asynchronous review by therapists after each session.

              Robin is Hinge Health's AI clinical care navigator, introduced in 2024 and expanded through 2025. Robin
              handles clinical triage (routing members to appropriate care levels—virtual or in-person), automated
              check-in messaging, symptom escalation alerts, and educational content delivery. Robin is designed to
              reduce the burden on human health coaches and physical therapists by handling routine clinical
              communication at scale. The company's GPT-4-class AI models are fine-tuned on clinical MSK datasets and
              are integrated with the member's longitudinal health record within the platform. Robin interactions are
              monitored by human clinicians for quality assurance, though the ratio of supervised to unsupervised
              interactions is not disclosed.

              A critical regulatory risk around TrueMotion: the FDA's Digital Health Center of Excellence (DHCoE) sent
              an inquiry letter to Hinge Health in August 2025 suggesting that TrueMotion may need to be classified as a
              Class II medical device (de novo pathway), which would require clinical validation studies and 510(k)
              clearance or PMA approval beyond the current SaMD framework. The company has disclosed this inquiry in SEC
              filings and is engaged with the FDA on the reclassification question. A TrueMotion reclassification would
              not necessarily require pulling the product from the market, but it would impose regulatory overhead and
              could delay feature updates. The outcome remains uncertain and represents a material technology risk.
            claimRefs:
