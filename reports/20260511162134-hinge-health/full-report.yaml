      - number: '3.4'
        title: Switching Costs, Lock-In, and Moat Assessment
        blocks:
          - type: paragraph
            body: >
              Hinge Health's competitive moats can be analyzed across five dimensions: distribution depth, data and AI
              flywheel, hardware integration, clinical evidence, and enterprise switching cost. Distribution depth—all 5
              national health plans plus 60+ plan partners—is the most defensible moat because it requires years of
              compliance audits, technical integration, and contractual negotiation to replicate. A new entrant cannot
              shortcut health plan integration: each plan requires separate credentialing, data sharing agreements, and
              claims reconciliation workflows. Hinge's 97% client retention rate (2025) demonstrates that employers do
              not easily switch once integrated.

              The data and AI flywheel creates a self-reinforcing advantage: more members generate more motion and
              outcomes data, which trains more accurate AI models, which improve clinical outcomes, which attract more
              health plan and employer clients. With 25 million contracted lives and hundreds of thousands of active
              members over multiple years, Hinge Health has an accumulated clinical dataset that competitors cannot
              replicate without comparable scale and time. TrueMotion's accuracy improves with more data, creating a
              compounding advantage.

              Hardware integration via Enso creates an additional switching cost: employers who distribute Enso devices
              to employees develop a physical-device support and logistics relationship with Hinge Health that is
              difficult to transfer to a software-only competitor. Enso's FDA clearance for new indications (migraine
              neuromodulation, 510(k) 2026) extends the device moat to new clinical areas. The primary moat
              vulnerability is the FDA inquiry into TrueMotion (April 2025): if TrueMotion is reclassified as a medical
              device requiring 510(k) clearance, both the regulatory burden and timeline would create operational risk.
              Additionally, Sword Health's Kaia Health acquisition directly addresses the AI motion-coaching gap, and if
              Sword succeeds in replicating the health plan distribution model, the moat on distribution depth could
              narrow.

              The NDR of 117% (Dec 2024) is strong evidence that existing clients expand their Hinge Health usage over
              time—a hallmark of a sticky platform with genuine buyer satisfaction rather than simple lock-in. The
              employer NPS of 87 (company-reported) supports this reading.
            claimRefs:
              - CP021
