      - number: '6.3'
        title: Named Customer Proof and Production Deployment Evidence
        blocks:
          - type: paragraph
            body: >
              Hinge Health has published several named customer case studies that provide concrete deployment evidence.
              The Boeing case study (aerospace manufacturing, self-insured employer) documents deployment to Boeing's
              U.S. employee population with outcomes including claimed triple-digit ROI on healthcare spend (surgeries
              avoided, PT visit reductions). The specific ROI metrics cited by Hinge Health are company-published and
              not independently audited; however, the Boeing deployment itself is a confirmed production-scale
              reference. Boeing's self-insured employee health spend is substantial given ~150,000 U.S. employees—the
              scale of the Hinge Health program within that population is not disclosed.

              The City of Los Angeles case study (municipal government, self-insured public employee plan) documents
              deployment to city workers with outcomes including pain reduction and physical function improvement,
              reported via NRS and EQ-5D instruments. The City of LA deployment demonstrates Hinge Health's penetration
              into public sector employer plans, which often have different procurement processes (RFP-based, union
              negotiation) compared to private sector employers. Public sector deployments signal program quality
              durability under political and union scrutiny.

              The Amazon Health Services integration (announced 2025) represents a new type of customer proof:
              distribution through Amazon's employer health benefits infrastructure to Amazon's approximately 1.5
              million U.S. employees. This is not a direct employer contract—it flows through Amazon Health Services as
              a health benefit provider—and the actual Hinge Health active member count from the Amazon channel is not
              disclosed. The strategic significance is high: Amazon's brand halo effect and distribution scale make this
              one of the most visible employer endorsements in the digital health space.

              In aggregate, the company's customer proof consists of high-quality named employer references (Boeing,
              City of LA, Amazon channel), strong aggregate outcome statistics (68% pain reduction, 58% surgery
              avoidance), and a robust NPS (~70) that places Hinge Health among the highest-rated enterprise health
              benefit vendors. The NPS figure (disclosed as of 2024 in Fierce Healthcare) is a meaningful quality signal
              for employer purchasers but is measured among active members, not among the broader contracted lives
              population.
