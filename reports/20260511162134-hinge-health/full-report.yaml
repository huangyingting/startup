      - number: '7.2'
        title: Operational and Cybersecurity Risk
        blocks:
          - type: paragraph
            body: >
              Hinge Health's operational risk profile is shaped by three categories: (1) cloud infrastructure
              concentration, (2) cybersecurity and PHI protection, and (3) hardware supply chain and device reliability.
              All three represent residual risks that are partially mitigated but not eliminated.

              Cloud infrastructure: Hinge Health is entirely dependent on Amazon Web Services (AWS) for its backend
              infrastructure, including the AI/ML model inference pipeline, member data storage, real-time sensor data
              processing, and API services. The company has not disclosed a multi-cloud deployment or active-active
              failover architecture in its S-1 or Q1 2026 10-Q. An AWS regional outage (e.g., us-east-1 sustained
              disruption) would take the member-facing application offline. The practical mitigation is that AWS offers
              99.99% uptime SLAs on core services and Hinge Health's B2B contract model (health plans and employers, not
              direct consumer) means that a multi-hour outage during weekday business hours would generate member
              complaints but is unlikely to trigger immediate contract termination. The materiality threshold for a
              business continuity breach in a typical health plan contract is not publicly disclosed.

              Cybersecurity: Hinge Health processes protected health information (PHI) for approximately 783,000 active
              members and biometric motion data for a substantially larger number of enrolled members. The company is a
              HIPAA-covered entity for its health plan contracts. A PHI breach of this scale (>500 records) triggers
              mandatory HHS notification and public breach disclosure under the HIPAA Breach Notification Rule. Hinge
              Health has achieved SOC 2 Type II certification (disclosed in S-1 and corporate website), indicating
              third-party audit of security controls. However, SOC 2 certification does not guarantee breach prevention;
              it certifies process maturity. The digital health sector has experienced several high-profile PHI breaches
              in 2023–2025 (Accellion, Change Healthcare), and Hinge Health's concentration of sensitive biometric and
              mental health-adjacent data makes it a high-value target.

              Hardware supply chain: The Enso wireless TENS device and the wearable motion sensor kits used in Hinge
              Health's exercise programs rely on hardware suppliers not publicly disclosed by name. A firmware defect,
              hardware recall, or supply disruption could affect member experience and require field replacements at
              significant cost. The Enso device has FDA clearance as a Class II medical device (510(k)); any post-market
              safety issue could trigger a mandatory FDA recall process. The operational footprint of shipping,
              replacing, and managing returned hardware at scale (700,000+ active members) represents a logistics burden
              without visible operational disclosures about process efficiency or cost per return.
