      - number: '2.4'
        title: Growth Drivers, Adoption Constraints, and Competitive Catalysts
        blocks:
          - type: paragraph
            body: >
              The fundamental demand driver for digital MSK care is the magnitude of the MSK burden itself. The World
              Health Organization identifies MSK conditions as the leading cause of disability worldwide, affecting more
              than 1.71 billion people globally as of 2021. In the United States, approximately 40% of adults
              experienced an MSK condition in 2021. The Pew Trusts has documented that MSK disorders cost the US economy
              $874 billion annually (2017 data, likely higher today). An updated assessment citing direct and indirect
              costs places total US MSK costs at approximately $1.285 trillion per year—comprising $661 billion in
              direct healthcare costs and $624 billion in indirect costs including lost productivity.

              Supply-side constraints in traditional physical therapy amplify demand for digital substitutes. The Bureau
              of Labor Statistics projects physical therapist employment to grow 19% from 2023 to 2033—the fastest
              growth of any major healthcare profession—yet this growth will not eliminate the existing geographic and
              scheduling access gap. The American Physical Therapy Association notes that MSK conditions are the primary
              driver of PT referrals and that demand consistently outpaces licensed PT capacity in rural and underserved
              areas. This mismatch creates a structural opening for digital platforms to deliver high-volume,
              AI-automated PT at scale.

              Employer adoption is further catalyzed by demonstrated cost savings. Hinge Health claims 2.4× average ROI
              for employers, and the company's employer NPS of 87 (as reported in filings) suggests strong buyer
              satisfaction. The KFF 2024 Employer Health Benefits Survey documents continued employer focus on
              musculoskeletal and specialty spend, a top-three cost category for self-insured employers. Constraints
              include: (1) long enterprise sales cycles (6–18 months for large employers), (2) health plan contract
              lock-in periods that slow switching and adoption, (3) employer cost pressures that can deprioritize point
              solutions in recessionary environments, and (4) skepticism from some clinical and media observers about
              the evidence quality for digital MSK programs—as documented by Healio and other clinical outlets.
            claimRefs:
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
          - type: table
            tableRef: TM004
            claimRefs:
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
      - number: '2.5'
        title: Sizing Gaps, Evidence Conflicts, and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Market sizing for digital MSK care carries significant uncertainty that analysts and investors should
              acknowledge. First, no single analyst provides a rigorous bottom-up SAM that matches Hinge Health's own
              channel-specific segmentation. Analyst estimates (Coherent, InsightAce, Grand View, Statista) use top-down
              global market sizing that bundles digital MSK care with adjacent digital therapeutics categories, making
              apples-to-apples comparison difficult. The Hinge Health S-1 TAM of $27 billion is management-estimated and
              not independently verified.

              Second, the serviceable obtainable market (SOM) for Hinge Health cannot be independently calculated
              without access to health plan contract terms, PMPM pricing assumptions, and member eligibility data that
              remain private. At 25 million contracted lives and a 3.9% annual yield rate (active member share), Hinge
              Health's 2025 active membership of ~783,000 represents approximately 3% of contracted lives—suggesting
              substantial headroom for engagement improvement, but also that most contracted lives never actively
              enroll.

              Third, there is a meaningful clinical evidence debate. Healio reported in August 2023 that digital MSK
              care tools show only "moderate evidence" for chronic pain—a characterization that challenges
              company-claimed outcomes superiority. The CMS has not established a formal covered benefit category for
              digital MSK programs, creating reimbursement uncertainty that constrains growth into the Medicare
              fee-for-service segment. The BIV report on the Hinge Health IPO and the broader healthcare IT analyst
              community have noted that clinical validation for AI-augmented PT remains nascent compared to FDA-cleared
              devices, and Hinge Health's ongoing FDA inquiry into TrueMotion (April 2025) adds regulatory dimension to
              the evidence gap.

              Finally, macro conditions present risk: employers under cost pressure during economic downturns may delay
              or reduce point-solution spending, and health plan administrative budget scrutiny could slow renewal at
              current PMPM rates. These diligence gaps are documented in the evidence gap section and should be
              addressed through direct diligence with Hinge Health's commercial team and independent clinical literature
              review.
            claimRefs:
