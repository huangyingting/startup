      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Hinge Health's leadership team combines deep clinical expertise with enterprise software and healthcare
              operations experience. Daniel Perez, Co-Founder and CEO, holds a B.S. in Biology from Westminster
              University and attended a PhD program in Biochemistry at the University of Oxford, where he met Gabriel
              Mecklenburg. Perez has led the company since its founding and owns approximately 18.9% of shares post-IPO.
              Gabriel Mecklenburg, Co-Founder and Executive Chairman, holds an M.Sc. in Materials Science from the
              University of Cambridge and an M.Phil. in Bioengineering from Imperial College London. Mecklenburg
              previously served as COO and retains approximately 8.2% of shares.

              James Budge joined as Chief Financial Officer in March 2023, bringing experience from Automation Anywhere,
              Pluralsight, Anaplan, and Genesys Cloud Services. Jim Pursley serves as President, joining in 2021 after
              serving as Chief Commercial Officer at Livongo Health, bringing deep enterprise healthcare sales
              expertise. Lex Annison serves as Chief Operating Officer, joining from Google where he was Global Director
              of Strategy and Operations. Dr. Jeffrey Krauss joined as Chief Medical Officer in 2018 and is
              board-certified in Physical Medicine and Rehabilitation (PM&R) and Lifestyle Medicine, with affiliations
              at Stanford and the VA Palo Alto.

              The Board of Directors expanded in March 2026 with the appointment of Tyler Sloat, CFO and COO of
              Freshworks Inc., who brings decades of experience scaling public SaaS companies. Hinge Health's governance
              structure includes a dual-class share structure common for founder-led public technology companies, with
              founders retaining meaningful voting influence. Key-person dependency is a material risk given that Perez
              is the public face of the company, a major shareholder, and the architect of the company's long-term
              strategy and culture. The departure of Perez would likely be viewed negatively by investors and customers.
