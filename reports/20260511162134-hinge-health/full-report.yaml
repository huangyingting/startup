companyProfile:
  summary: >
    Hinge Health is the market-leading digital musculoskeletal (MSK) care company, founded in 2014 by Daniel Perez (CEO)
    and Gabriel Mecklenburg (Executive Chairman) and headquartered in San Francisco, California. The company provides
    AI-powered virtual physical therapy and MSK care programs—including the proprietary TrueMotion motion-tracking AI
    and the FDA-cleared Enso wearable device—to self-insured employers and health plans via a B2B2C engagement model.
    Clients pay only for actively engaged members on a per-member-per-month basis, aligning incentives and driving an
    85% gross margin in Q1 2026. Listed on the NYSE (HNGE) since May 22, 2025, Hinge Health reported Q1 2026 revenue of
    $182.3 million (+47% YoY) and raised full-year 2026 guidance to $798–804 million. The company serves 2,849
    enterprise clients covering 25 million contracted lives as of March 2026, with partnerships covering all five of the
    largest US national health plans.
