      - number: '3.3'
        title: Capability Comparison, Pricing, and GTM Analysis
        blocks:
          - type: paragraph
            body: >
              Hinge Health's core technical differentiators are the Enso wearable FDA-cleared electrical nerve
              stimulation device and TrueMotion AI motion tracking technology. Enso provides drug-free pain relief via
              transcutaneous electrical nerve stimulation (TENS); FDA 510(k) clearance gives Hinge a regulatory moat
              that software-only competitors lack. TrueMotion uses smartphone camera-based 3D motion analysis to assess
              exercise form and guide therapeutic movements without specialized sensors—enabling high-volume,
              low-marginal-cost delivery of PT-quality motion feedback. No direct competitor as of 2026 offers an
              equivalent combination of FDA-cleared device hardware plus AI motion coaching.

              On health plan distribution, Hinge Health's integration with all five largest national health plans
              (Aetna, Elevance/Anthem, HCSC, Cigna, United Health Group) and 60+ health plan partners is the most
              decisive commercial moat. Sword Health and Omada Health have health plan relationships but at smaller
              scale and depth. For self-insured employers, Hinge commands 2,849 clients, the majority of whom are
              Fortune 100 and 500 companies, giving it an installed base that creates switching cost through claims
              integration, data analytics, and multi-year contract structure.

              Pricing for digital MSK care across competitors is not publicly disclosed. Hinge Health charges a PMPM fee
              paid by the employer or health plan; industry sources estimate PMPM rates in the $15–$50 range depending
              on program design, contract volume, and level of device integration. Sword Health and Omada Health are
              believed to operate on similar PMPM structures. DarioHealth reportedly operates with lower PMPM pricing to
              address mid-market employers. Actual pricing varies materially based on contract negotiation, and list
              pricing is not a reliable proxy for realized PMPM rates. The lack of public pricing disclosure is a gap
              that limits independent pricing comparison.

              On GTM approach, Hinge Health's 84% health plan channel revenue makes it the most distribution-leveraged
              player in the market, effectively using health plan billing relationships as a flywheel for
              employer-facing sales. This is structurally different from Sword's historically more direct
              employer-facing GTM. Omada Health's health plan channel is its historical strength, and its MSK program
              entry will likely leverage those same relationships.
