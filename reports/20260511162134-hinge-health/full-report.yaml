      - number: '4.2'
        title: Unit Economics, Gross Margin, and Cost Structure
        blocks:
          - type: paragraph
            body: >
              Hinge Health's gross margin has expanded consistently, reaching 85% in Q1 2026—among the highest in
              healthcare software. GAAP gross margin for FY2025 was 80% (non-GAAP 83%), up from 77% GAAP and 78%
              non-GAAP in FY2024. The gross margin expansion is driven by the company's claim that AI automation
              (TrueMotion, Robin AI assistant) has reduced human clinical therapist hours by 97%, dramatically lowering
              the cost of clinical service delivery as member volume scales. Enso device cost-of-goods also decreases as
              manufacturing volumes increase under the hardware supply relationship, though device cost is not
              separately disclosed.

              Operating expenses include research and development (AI and product development), sales and marketing
              (enterprise direct and health plan channel sales), and general and administrative. The company's 2025 GAAP
              operating loss of $546.4 million was almost entirely driven by one-time stock-based compensation charges
              related to the May 2025 IPO (RSU vesting and option exercises); non-GAAP operating income for 2025 was
              $119.5 million, representing a 20.3% non-GAAP operating margin. Q1 2026 GAAP operating income was $32.1
              million (17.6% GAAP margin) and non-GAAP operating income was $46.2 million (25.4% non-GAAP margin). The
              company's Rule of 40 score (revenue growth rate + non-GAAP FCF margin) was 81 in FY2025, well above the
              40-point benchmark for high-quality SaaS businesses.

              Key private metrics that are not publicly disclosed include: exact PMPM pricing by contract type (employer
              vs. health plan vs. Medicare Advantage), customer acquisition cost (CAC), sales efficiency (CAC payback
              period), cost-of-care breakdown by clinical program, and Enso device gross margin. The company provides
              annual yield (3.9% in 2025, trending north of 4% in 2026) as a proxy for engagement depth but does not
              provide complete unit economics for a fully loaded PMPM cost or per-member profitability analysis.
              Per-member economics can be partially inferred: with ~$588M revenue and ~783K active members (Dec 2025),
              implied average revenue per active member was approximately $750/year or $63/month, though this blends
              different PMPM rates and contract structures.
