      - number: '4.4'
        title: GTM Motion and Sales Efficiency Proxies
        blocks:
          - type: paragraph
            body: >
              Hinge Health's go-to-market efficiency is not fully disclosable through public metrics—customer
              acquisition cost, sales cycle length, and CAC payback period are private. However, several proxy metrics
              are visible. The client base grew from 2,830 (December 2025) to 2,849 (March 2026), implying relatively
              slow net new logo addition in Q1 2026 (~19 net new clients), which is expected for an enterprise
              subscription business with long sales cycles and high existing-base revenue expansion. Most revenue growth
              comes from the 117% NDR—expansion within the existing client base—rather than from new logo acquisition.

              The health plan distribution channel (84% of revenue) functions as a force multiplier for employer
              outreach: health plans bring Hinge Health's benefits to thousands of employer groups within their network
              at relatively low incremental sales cost per employer, compared to direct employer-by-employer sales. This
              channel economics model reduces CAC dramatically for the health plan-mediated segment. The company reports
              that all five largest national health plans and 60+ total health plan partners are active distribution
              channels, providing broad reach without proportional sales cost.

              Hinge Health's enterprise sales cycle for new health plan relationships is estimated at 12–18 months for
              initial integration (compliance audits, data sharing, eligibility file configuration). For direct employer
              contracts, cycles may be 6–18 months depending on employer size and broker intermediary involvement. These
              long cycles are consistent with enterprise healthcare software benchmarks and mean that revenue from new
              relationships signed in 2026 will be recognized primarily in 2027 and beyond. The implication for 2026
              guidance reliability is positive: the guidance range of $798–804M is largely supported by existing
              enrolled clients, not new logo conversion.
            claimRefs:
              - CI020
              - CI021
              - CI022
              - CI023
      - number: '4.5'
        title: Financial Gaps, Evidence Conflicts, and Diligence Blockers
        blocks:
          - type: paragraph
            body: >
              Several financial metrics critical for underwriting remain private or insufficiently disclosed. First,
              PMPM pricing: the company has never disclosed list PMPM pricing or average contract PMPM rates by segment
              (self-insured vs. health plan vs. Medicare Advantage). Industry estimates ($15–$50 PMPM) are derived from
              market intelligence and secondary analysis, not primary disclosure. Without confirmed PMPM pricing,
              investors cannot independently model revenue per contracted life or assess the impact of pricing pressure
              from health plan negotiation.

              Second, customer acquisition cost and payback period: Hinge Health's 10-K and 10-Q filings do not disclose
              CAC, sales force size by segment, or commission structure. The company's sales and marketing expense as a
              percentage of revenue has declined over time, suggesting improving efficiency, but precise CAC payback
              cannot be calculated without average contract value and average selling cycle length.

              Third, Enso device economics: the cost to manufacture, ship, and support each Enso device is not
              disclosed. Since Enso is bundled with PMPM subscriptions for eligible members, the device subsidy embedded
              in PMPM pricing affects gross margin quality. Understanding whether Enso is margin-accretive or
              margin-dilutive at current volumes is a material diligence question.

              Fourth, the 2025 GAAP net loss (approximately $546M) and operating loss were primarily driven by
              IPO-related stock compensation charges. The company's financial statements prior to the IPO (private
              entity) are on a different cost recognition basis than post-IPO public company statements. Investors must
              rely on non-GAAP metrics for 2025 performance comparison, and the 2025 GAAP figures are not representative
              of ongoing operating performance. Q1 2026 GAAP operating income of $32.1M provides the first clean
              post-IPO comparable period and confirms the non-GAAP trajectory was real, not fabricated. However, ongoing
              RSU grants will continue to add SBC to GAAP expenses even as the one-time IPO charge recedes.
