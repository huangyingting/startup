      - number: '2.2'
        title: Market Sizing and Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Multiple analyst estimates place the global digital MSK care market in a wide range, reflecting
              differences in market definition, geographic scope, and methodology. Coherent Market Insights estimates
              the market at approximately $6 billion in 2026, growing at a 17.8% CAGR to reach $18.96 billion by 2033.
              InsightAce Analytics places the 2025 market at $5.19 billion, projecting $26.87 billion by 2035 at an 18%
              CAGR. Statista's data tracks the market from smaller baseline estimates. Grand View Research publishes a
              similar trajectory. These figures are internally consistent in direction but diverge meaningfully in
              absolute size due to definitional differences—some analysts include adjacent chronic pain or mental health
              markets, while others restrict to direct MSK digital programs.

              Hinge Health's own S-1 filing defines the total US addressable market as $27 billion or more, decomposed
              as: self-insured employers ($10 billion), fully-insured commercial and Medicare Advantage and federal ($8
              billion), and Medicare and Medicaid ($9 billion). This bottom-up segmentation is more conservative than
              the global digital MSK analyst figures because it focuses on the US employer-and-payer channel that Hinge
              Health actually addresses, rather than the entire global digital therapeutics TAM. The S-1 methodology is
              more rigorous for competitive underwriting purposes: it starts from the number of covered lives
              addressable through enterprise sales channels and applies a PMPM yield assumption.

              At Hinge Health's own Q1 2026 annualized billings run-rate of approximately $770 million (LTM), the
              company represents approximately 3–8% penetration of its own stated $10 billion self-insured employer
              SAM—indicating the market is early in its adoption curve. The McKinsey analysis of employer healthcare
              benefits projects continued growth in digital point solutions as benefit design evolves toward value-based
              arrangements with demonstrated ROI. Rock Health's 2025 digital health funding review confirms that
              MSK/musculoskeletal remains among the top-funded digital health verticals, validating continued investor
              conviction.
