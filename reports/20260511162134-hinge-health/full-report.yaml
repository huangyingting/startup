      - number: '6.4'
        title: Retention, NRR, and Client Durability
        blocks:
          - type: paragraph
            body: >
              Hinge Health reports client retention of 97–98% as of the most recent disclosure, and net dollar retention
              (NDR) of 117% as of December 2024. These are among the strongest retention metrics in the enterprise
              digital health segment and are comparable to best-in-class enterprise software companies. The mechanics of
              the 97–98% retention rate reflect two dynamics: health plans rarely terminate vendor relationships
              mid-contract cycle (12–36 month contracts typical), and the cost and disruption of migrating members to a
              competing MSK platform is high for both the health plan and the employer groups within the plan.

              The 117% NDR is driven primarily by three expansion mechanisms within existing client relationships: (1)
              increasing yield—more contracted lives becoming active members over time as employer wellness programs
              promote Hinge Health enrollment; (2) program expansion—existing clients adding pelvic health, fall
              prevention, or migraine programs on top of the core MSK program; and (3) contracted life growth—as
              employer groups within a health plan's network add more employees or as the health plan expands its
              covered employer base, more lives are added to the Hinge Health contract at the same PMPM rate.

              Client retention at 97–98% implies a gross revenue retention (GRR) approximately equal to the retention
              rate (97–98%), with the NDR uplift of 17 percentage points driven by expansion. This structure confirms
              that Hinge Health's growth strategy is primarily an expansion play within a locked-in client base rather
              than a new logo acquisition engine. The implication for long-term revenue visibility is positive: given
              the high cost of switching (member data migration, clinical continuity risk, procurement complexity),
              clients that survive the first renewal cycle are unlikely to churn unless a competitor offers dramatically
              superior outcomes at lower cost.

              An important gap: the 117% NDR figure was last disclosed as of December 2024 and has not been updated in
              Q3 2025, Q4 2025, or Q1 2026 earnings materials. The Q1 2026 billings growth of 52% YoY implies NDR is
              holding or improving, but the lack of a freshly disclosed NDR metric is a minor diligence concern. The
              company also does not disclose GRR separately from NDR, which would help distinguish churn-driven
              headwinds from expansion tailwinds within the retention metric.
            claimRefs:
