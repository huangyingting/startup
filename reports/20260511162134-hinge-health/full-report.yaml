      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              Hinge Health's go-to-market concentrates on enterprise buyers—self-insured employers and health
              plans—rather than individual consumers. Self-insured employers (typically 500+ employees) purchase Hinge
              Health as a point solution embedded in their employee benefits package, paying a PMPM fee for each
              employee enrolled in the program. This segment represents the largest near-term opportunity: approximately
              158 million US workers are covered by employer-sponsored health insurance, and Fortune 500 companies
              account for a disproportionate share of MSK spend given older, more physically active or sedentary
              workforces.

              Health plan distribution has become Hinge Health's primary growth engine, representing 84% of revenue by
              Q1 2026. Health plans bundle Hinge Health as a value-add benefit for their fully-insured and Medicare
              Advantage members, absorbing the cost into administrative and quality budgets rather than claims. This
              dynamic has expanded Hinge Health's reach to smaller employers (via health plans) and government-sponsored
              populations (via Medicare Advantage). All five largest national health plans are partners, and more than
              60 health plans have integrated Hinge Health as of early 2026.

              The federal and government payer segment (Medicare, Medicaid, VA, TRICARE, federal employee health benefit
              programs) represents the $9 billion SAM extension identified in the S-1 but is currently addressable only
              through Medicare Advantage and limited VA pilots. Direct Medicare Fee-for-Service reimbursement for
              digital MSK programs does not yet exist as a defined benefit category, making this a medium-term
              opportunity contingent on CMS coverage determination. Individual DTC users represent a small fraction of
              the market and are not a meaningful revenue segment for Hinge Health today. Budget ownership is almost
              entirely institutional—HR and benefits directors at employers, medical directors and VP/SVPs of network
              management at health plans—with no meaningful individual consumer purchase decision.
            claimRefs:
