      - number: '4.3'
        title: Capital Adequacy, Cash, and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Hinge Health's balance sheet is strong relative to its operating profile. As of March 31, 2026, the
              company held $407.1 million in cash, cash equivalents, and marketable securities. Free cash flow for
              FY2025 was $179.6 million (30.5% FCF margin on $588M revenue), and Q1 2026 FCF was $41.6 million (22.9%
              margin). The company has no publicly disclosed debt, credit facility, or project finance obligations that
              would create near-term liquidity risk. Runway at current operating cash generation is effectively
              indefinite given positive FCF and a strong cash balance.

              The company's May 2025 IPO raised $437 million total ($237 million primary proceeds to the company from
              8.5 million new shares at $32/share, and $200 million in secondary proceeds to selling shareholders). The
              primary proceeds were added to the balance sheet and supplement operating cash generation. Post-IPO
              capital allocation priorities include the $250 million share repurchase authorization (November 2025), of
              which $65 million was deployed in Q4 2025 and $105 million in Q1 2026—$170 million total as of March 2026.
              The repurchase program signals management's confidence in intrinsic value and absorbs the dilutive effect
              of ongoing RSU and option grants.

              Working capital dynamics are favorable for a PMPM subscription business: revenue is paid monthly by
              employers and health plans (often in advance or net-30), Enso device inventory is pre-purchased for active
              members (modest capex requirement), and PT session costs are variable with engagement. The company does
              not have significant capex requirements typical of hardware manufacturers; the Enso device is manufactured
              by a third-party contract manufacturer. Capital intensity is therefore low, and the FCF conversion rate
              (free cash flow as a percentage of non-GAAP operating income) should remain high as the business scales.
              The primary capital allocation risk is whether the $250M buyback program has absorbed shares efficiently
              at current valuations following the stock's partial post-IPO recovery above $32.
