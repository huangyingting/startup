  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Architecture and Product Pillars
        blocks:
          - type: paragraph
            body: >
              Hinge Health operates a vertically integrated digital musculoskeletal (MSK) care platform that combines
              hardware, AI software, clinical care management, and in-person network services into a unified experience.
              The platform is delivered through a mobile application (iOS and Android) with an integrated wearable
              device (Enso) and AI-mediated clinical pathways. The company's product strategy has evolved from a simple
              digital physical therapy app (2014–2019) to an AI-first, multi-program care platform targeting MSK, pelvic
              health, fall prevention, and migraine conditions.

              The five core product pillars are: First, the Hinge Health mobile application—a smartphone app for guided
              exercise, educational content, pain tracking, and clinician communication. The app received 4.7-star
              ratings on Apple's App Store and 4.5 stars on the Google Play Store as of Q1 2026, with over 500,000
              downloads. It supports structured therapeutic exercise programs, motion-guided exercises using the phone's
              camera (via TrueMotion), and symptom and mood tracking. Second, TrueMotion AI—the proprietary computer
              vision and motion sensing technology embedded in the app that provides real-time form guidance, rep
              counting, and biomechanical feedback during exercise sessions. Third, the Enso device—a wearable
              electrical nerve stimulation (ENS) device cleared by the FDA for pain management; Enso is a
              consumer-facing device with a companion Enso app, shipped to members as part of the MSK program bundle.
              Fourth, Robin AI—the company's AI care navigator, which handles clinical triage, member outreach,
              condition-specific communication, and clinician support. Fifth, HingeSelect—an in-person hybrid care
              network with 4,100 physical therapy locations across the U.S. as of Q1 2026, enabling members to see
              in-network physical therapists when virtual care is insufficient.

              The four clinical programs—MSK (encompassing back pain, joint pain, and neck/shoulder pain), pelvic
              health, fall prevention, and migraine—each have dedicated care pathways with evidence-based exercise
              protocols, clinical outcome tracking, and member-specific customization. The MSK program is the original
              and largest by member volume; the pelvic health, fall prevention, and migraine programs were added through
              internal development and the Enso 3 device expansion (migraine via Enso's cephalgic stimulation
              capability). The platform's unified member experience means a member enrolled in multiple programs (e.g.,
              MSK + pelvic health) has a single app and integrated care team.
