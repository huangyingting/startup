  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Hinge Health operates at the intersection of digital health software and medical devices, creating a
              multi-layered regulatory exposure that is among the most material risks facing the company. The FDA's
              digital health regulatory framework has evolved rapidly since 2019, and Hinge Health's TrueMotion
              motion-analysis algorithm—the sensor-based movement tracking engine powering its MSK exercise program—sits
              in an ambiguous regulatory zone. In February 2025, the FDA sent Hinge Health a formal letter of inquiry
              regarding whether TrueMotion requires 510(k) clearance as a Software as a Medical Device (SaMD). The
              company disclosed this inquiry in its S-1 registration statement filed in 2025. As of Q1 2026, the FDA
              inquiry remains open; no enforcement action has been taken and no clearance application has been filed.

              The regulatory risk has two dimensions: probability and severity. The probability that the FDA concludes
              TrueMotion does NOT require 510(k) clearance is non-trivial—the FDA's pre-certification program and the
              DSCSA framework for lower-risk SaMD create pathways for avoiding full clearance. However, if the FDA
              determines clearance is required, Hinge Health would need to pursue 510(k) clearance for TrueMotion while
              potentially modifying or removing the algorithmic motion assessment functionality until clearance is
              granted. Clearance timelines for Class II medical devices typically run 150–300 days from submission; an
              adverse FDA determination combined with a product modification requirement could disrupt member experience
              and trigger contract renegotiations with health plan customers who purchased the product based on current
              functionality.

              Beyond the FDA inquiry, Hinge Health faces legal exposure across three domains: (1) class action
              litigation risk arising from past outcomes claims made in marketing materials that may not meet
              evidentiary standards for clinical proof; (2) IP exposure if competitors assert patent claims against the
              TrueMotion algorithm or wearable sensor integration; and (3) state and federal privacy law compliance,
              particularly CCPA in California and the emerging patchwork of state privacy laws. Hinge Health collects
              detailed biometric and health data from members; any breach or improper use could trigger class actions,
              FTC enforcement, and state attorney general proceedings.

              Hinge Health's privacy policy and terms of service (effective as of 2026) define limited uses of member
              data and include explicit HIPAA Business Associate Agreement provisions for covered health plan customers.
              The terms prohibit data monetization to third-party advertisers. However, the company does not publish a
              transparency report or incident log, and no public information exists about prior data incidents.
              Courtlistener.com searches reveal one case in the docket that is relevant to digital health privacy
              litigation precedents (Accellion data breach case), not specific to Hinge Health, suggesting the company
              has not yet been a named defendant in federal court privacy litigation.
            claimRefs:
