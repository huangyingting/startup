      - number: '5.3'
        title: 'Enso Device: FDA Clearance, Hardware Roadmap, and Clinical Integration'
        blocks:
          - type: paragraph
            body: >
              The Enso device is Hinge Health's proprietary wearable electrical nerve stimulation (ENS) device. The
              current generation device (Enso 3) is a rechargeable, wireless, body-worn device that delivers
              transcutaneous electrical nerve stimulation (TENS) pulses to the affected body region. The Enso app (a
              separate app from the Hinge Health patient app) controls stimulation intensity, session duration, and
              program selection. Enso devices are shipped to eligible program members as part of the MSK care bundle at
              no direct charge to the member; the cost is absorbed in the PMPM subscription fee.

              Enso has received FDA clearance as a Class II medical device (510(k) clearance) for pain relief in
              musculoskeletal conditions. The original Enso device received clearance in 2019, and Enso 3 (the current
              version with expanded pain area coverage and longer battery life) received clearance in 2023. The device
              is manufactured by a third-party contract manufacturer; Hinge Health does not operate its own
              manufacturing facility, keeping capital intensity low. Device warranty and replacement logistics are
              handled by Hinge Health's operations team.

              For the migraine program, Enso 3 includes a cephalgic stimulation mode that delivers TENS to the forehead
              for migraine prevention—FDA-cleared separately in Q3 2024 for migraine management. This extension of the
              Enso platform to migraine represents the most recent hardware-driven program addition. Integration of Enso
              with the Hinge Health mobile app allows synchronized session tracking: when a member uses the Enso device,
              the session is logged in the app alongside their exercise and symptom data, enabling a unified care record
              for their clinical team. The hardware-software integration is a defensible technical moat: competitors who
              offer only software-based PT (Sword Health, Omada) do not ship a companion device, which Hinge Health
              claims is clinically superior for pain modulation.

              Key technology risks around Enso include: (i) device supply chain dependency on a single contract
              manufacturer, (ii) the migration from Enso 3 to any future Enso 4 platform requiring new FDA clearances,
              and (iii) competitive pressure from over-the-counter TENS devices that are available retail at $30–100 vs.
              the Enso bundle cost embedded in PMPM pricing.
