      - - Product Differentiation
        - TrueMotion AI + Enso wearable + licensed PT creates clinical defensibility and network lock-in
        - FDA SaMD reclassification could force TrueMotion redesign; wearable dependency is a hardware cost risk
        - 510(k) clearance or FDA favorable resolution removes primary product risk
      - - Revenue Quality
        - 85% gross margin, 120%+ NRR, 2,849 enterprise clients with multi-year contracts
        - Top 3 payers >50% revenue; first post-IPO renewal cycle is untested
        - Renewal data from FY2026 health-plan contracts will be the key proof point
      - - Competitive Moat
