  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Hinge Health operates in a competitive market that spans direct digital MSK peers, adjacent chronic
              disease platforms expanding into MSK, traditional physical therapy incumbents, and internal-build
              alternatives. The competitive landscape can be segmented into five categories: (1) direct digital MSK care
              platforms (Sword Health, Kaia Health—now acquired by Sword, Vori Health, RecoveryOne, Joint Academy,
              Limber Health, IncludeHealth); (2) adjacent chronic care platforms adding MSK (Omada Health, DarioHealth,
              Novu Health); (3) traditional in-person physical therapy (ATI Physical Therapy, Select Medical, individual
              PT practices representing the $60–70B US market); (4) employer/health plan internal-build or preferred
              provider organizations; and (5) pharmaceutical and surgical alternatives that digital MSK care aims to
              displace.

              Sword Health is Hinge Health's most comparable direct competitor. Founded in 2020 in the United States
              (with origins in Portugal), Sword has raised significant venture capital and achieved a private valuation
              estimated at approximately $3 billion as of its 2022 Series D. In 2025, Sword acquired Kaia Health—a
              Munich-based AI motion coaching startup that had previously been considered a separate digital MSK
              competitor—expanding its capability set and European presence. Sword operates on a similar PMPM employer
              model but has historically lacked Hinge Health's depth of health plan distribution. Kaia Health had been
              backed by Munich Re and other European institutional investors, and its AI-based motion tracking product
              directly competed with Hinge Health's TrueMotion technology. The acquisition signals Sword's intent to
              accelerate.

              Omada Health took a different path: it went public in 2024 focused on chronic disease management (diabetes
              and hypertension), then announced the launch of an MSK care program in 2025, directly entering Hinge
              Health's core market. Omada's existing health plan and employer distribution network—built over a decade
              in chronic disease management—gives it an existing channel to cross-sell MSK services, making it a
              credible adjacent entrant rather than a pure-play digital MSK newcomer. DarioHealth is a smaller public
              company offering a combined digital MSK and chronic condition management platform, with approximately $50
              million in annual revenue and a more limited distribution footprint than either Hinge or Sword.
