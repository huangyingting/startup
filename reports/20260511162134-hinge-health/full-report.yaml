  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >
              Hinge Health generates revenue through a single primary stream: per-member-per-month (PMPM) subscription
              fees paid by self-insured employers and health plans on behalf of their employees and members. The company
              does not charge individual users; all revenue is enterprise B2B. PMPM fees are recognized as services are
              delivered to active members, creating a revenue model that is directly tied to member engagement rather
              than contracted lives. This "pay-for-engagement" structure aligns incentives between Hinge Health and its
              employer/health plan customers—clients pay only for members who are actively using the platform.

              Revenue is recognized monthly based on the number of members engaged in the applicable reporting period,
              which means revenue is somewhat usage-dependent and not entirely contractually guaranteed at the point of
              signing. However, the high retention rates (97–98% client retention) and expanding per-client revenue
              (117% NDR) indicate that revenue quality is high: existing contracts consistently generate more revenue
              over time as more members enroll and as clients add programs.

              Secondary revenue components include hardware-related revenue from Enso device shipments (included in the
              subscription bundle for eligible members) and HingeSelect in-person provider network fees (charged as
              professional services through employer or health plan contracts). These secondary streams are not
              separately disclosed but are embedded in total PMPM revenue recognition. The company does not operate a
              consumer DTC subscription model; there is no meaningful direct-to-consumer revenue. Hinge Health's revenue
              mix is approximately 84% from health plan distribution and 16% from direct employer contracts as of Q1
              2026. Revenue concentration in the top three health plan partners (HCSC ~16%, Elevance ~13%, Aetna ~10%)
              represents approximately 39% of total revenue—a concentration risk documented in the S-1 and acknowledged
              in earnings disclosures.

              FY2025 GAAP revenue was $587.9 million (+51% YoY from $390.4M in FY2024). Q1 2026 GAAP revenue was $182.3
              million (+47% YoY from Q1 2025's $123.8M). FY2026 guidance of $798–804 million at the midpoint implies 36%
              growth. LTM calculated billings as of Q1 2026 were $769.9 million (+52% YoY), which is a leading indicator
              of forward revenue given the nature of PMPM contracts.
