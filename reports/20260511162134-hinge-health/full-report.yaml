      - number: '5.4'
        title: Clinical Evidence Base and Outcomes
        blocks:
          - type: paragraph
            body: >
              Hinge Health has published 11+ peer-reviewed clinical studies as of Q1 2026, making it one of the most
              clinically validated digital MSK companies in the market. The company's clinical evidence portfolio spans
              randomized controlled trials (RCTs), retrospective cohort studies, and employer outcomes analyses. Key
              published outcomes include: a 2020 RCT published in JMIR mHealth and uHealth showing 68% reduction in pain
              severity (Numeric Rating Scale) versus usual care at 12 weeks for low back pain; a retrospective cohort
              study showing 58% reduction in MSK-related surgeries among Hinge Health members vs. matched controls; and
              a 2023 pelvic health cohort study showing significant improvement in pelvic floor symptom scores (PISQ-12)
              in members completing the pelvic health program.

              The clinical pathway uses validated outcome instruments (NRS pain scale, EQ-5D quality-of-life score,
              KOOS/HOOS for joint programs, and PISQ-12 for pelvic health) embedded in the app at standardized
              measurement intervals (weeks 2, 6, 12, and 26 of enrollment). These outcomes are shared with employer and
              health plan clients in the form of quarterly outcomes reports that demonstrate per-employer pain
              reduction, surgery avoidance, and cost savings. The outcomes data feed the ROI calculator that supports
              the commercial conversation for new contract renewal and expansion.

              An important nuance in interpreting Hinge Health's clinical evidence is selection bias: members who enroll
              in a digital MSK program and complete 12 weeks of exercises may not be representative of the general MSK
              population covered under employer or health plan contracts. The 3.9% yield rate (97.6% of contracted lives
              never becoming active members) suggests that the published outcomes reflect a self-selected, highly
              motivated cohort. Whether equivalent outcomes would accrue to the broader contracted population if
              engagement rates increased is an open clinical question. This concern has been raised in academic
              literature reviewing digital PT programs but has not been addressed in Hinge Health's published studies.

              The company also cites evidence from a study published in NCBI PMC (2020) supporting the efficacy of
              digital exercise therapy for chronic musculoskeletal pain conditions, which is consistent with the broader
              literature on telehealth-delivered PT. The FDA's current SaMD framework for digital PT programs does not
              require clinical RCT submission for Class I/II wellness applications, which allows Hinge Health to market
              its clinical evidence independently without FDA pre-market approval of the software itself (separate from
              Enso's hardware clearance).
