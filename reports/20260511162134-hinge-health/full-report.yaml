chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Hinge Health was founded in late 2014 by Daniel Perez and Gabriel Mecklenburg in the United Kingdom, with
              both founders personally motivated by difficult MSK injury recoveries. Perez suffered multiple fractures
              in a bicycle accident and Mecklenburg tore his ACL in a judo match; both spent more than 12 months in
              rehabilitation and experienced the limitations of traditional physical therapy firsthand. The company
              initially operated in the UK before relocating its headquarters to San Francisco, California in 2017,
              where it is based at 455 Market Street, Suite 700, San Francisco, CA 94105.

              The core product is an AI-powered virtual MSK care platform that delivers personalized exercise therapy,
              access to licensed physical therapists and health coaches, remote monitoring, and the FDA-cleared Enso
              wearable device for drug-free pain relief. Hinge Health operates a business-to-business-to-consumer
              (B2B2C) model: it signs multi-year contracts with large employers, health plans, and public-sector
              organizations, who then offer Hinge Health programs to their employees or members at zero out-of-pocket
              cost. Revenue is generated on a per-member-per-month (PMPM) engagement basis, with clients paying only for
              members who actively use the platform, aligning incentives between the company and its customers.

              As of May 2026, Hinge Health operates as a fully public company on the New York Stock Exchange under the
              ticker symbol HNGE, having completed its IPO in May 2025. The company serves 2,849 enterprise clients and
              covers approximately 25 million contracted lives. Its platform addresses a broad range of MSK conditions
              including back, knee, hip, shoulder, and neck pain, as well as pelvic health and fall prevention. The
              company describes its mission as "scaling and automating the delivery of health care," starting with
              musculoskeletal conditions but with aspirations to expand to other health areas.
