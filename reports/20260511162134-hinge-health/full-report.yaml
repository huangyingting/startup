  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Observable Threshold
      - Transmission to Thesis
      - Recommended Action
    rows:
      - - FDA adverse TrueMotion ruling
        - FDA issues 510(k) requirement letter or Warning Letter for TrueMotion
        - >-
          Product modification required; 150–300 day clearance timeline; contract renegotiation risk with health plans;
          multiple compressed to 3–4x
        - Exit or reduce materially; re-enter only after clearance obtained
      - - Top-3 payer non-renewal
        - Any of top-3 payers publicly declines renewal or materially reprices at contract anniversary
        - Revenue concentration creates disproportionate impact; signals pricing power erosion; NRR falls below 110%
        - Reduce position; evaluate if concentrated or idiosyncratic
      - - Revenue growth below 20%
        - Any two consecutive quarters with YoY growth <20% without management explanation
        - Multiple compression to <4x; cash runway concerns accelerate; buyback program deprioritized
        - Exit or reduce; growth rate is the primary valuation driver
      - - EBITDA miss and guidance cut
        - Management guides FY EBITDA margin below prior guidance by >500bps
        - Signals operating leverage thesis impaired; market will reprice operating risk
        - Review assumptions; likely reduce
      - - Sword wins >3 top-50 clients from Hinge
        - Disclosed in Hinge quarterly filings as client count stagnation or Sword announces named wins
        - Competitive moat thesis weakens; pricing pressure increases; NRR risk
        - Negative signal; monitor closely for pattern
    notes: >-
      Triggers are diligence monitoring indicators, not sell rules. Context and management response should inform any
      portfolio action.
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - FDA TrueMotion 510(k) risk
        - FDA correspondence, scope of inquiry, Hinge's submitted response, regulatory counsel opinion
        - Binary risk; determines product viability of core differentiation layer
        - Obtain through management meeting (NDA); review 10-K risk factor detail language for directional signal
      - - Top-3 payer renewal terms
        - Specific renewal pricing, contract duration, renewal timing relative to IPO lock-up expiry
        - First post-IPO renewal cycle is untested; payer leverage may have changed since pre-IPO contracts
        - Investor Q&A on next earnings call; channel checks with benefit consultants who advise these payers
      - - Enso hardware BOM and margins
        - Per-unit COGS, warranty claims rate, supply chain concentration (specific ODM partners)
        - Hardware revenue is low-margin drag; understanding trajectory is critical to gross margin model
        - Discuss in management meeting; review supplier diversity disclosures in 10-K
      - - NRR by cohort vintage
        - >-
          Gross and net revenue retention stratified by customer vintage, channel (employer vs. health plan), and size
          tier
        - Aggregate 120%+ NRR masks potential deterioration in older cohorts as market saturates
        - Request in investor data room; look for disclosure in upcoming S-11 amendment or proxy
      - - GLP-1 impact on MSK member engagement
        - Data on whether members using GLP-1 drugs have different MSK engagement and outcomes vs. non-GLP-1 cohort
        - >-
          GLP-1 adoption is changing employer benefit priorities; MSK-GLP-1 comorbidity opportunity vs. displacement
          risk
        - 'Primary research: discuss with Hinge health coaches or published clinical studies'
      - - Cap table / insider selling schedule
        - Lock-up expiry dates, secondary sale plans, insider transaction history since IPO
        - Investor overhang from pre-IPO holders distributing shares creates technical pressure on stock price
        - Proxy statement; Form 4 filings on EDGAR; track 10b5-1 plan activations
    notes: Diligence asks prioritized by materiality to valuation thesis. Items 1 and 2 are prerequisite for upgrade to BUY.
