      - number: '1.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Category Leadership with Durable Competitive Moat
            body: >
              Hinge Health is the clear category leader in digital MSK care with 2,849 enterprise clients covering 25
              million contracted lives, partnerships with all five of the largest national health plans, and contracts
              representing 53% of Fortune 100 companies. Its combination of proprietary clinical data (100M+ lifetime
              member activity sessions), FDA-cleared hardware (Enso), AI motion tracking (TrueMotion), and a validated
              2.4x ROI creates a "double-walled moat" that is difficult for health tech incumbents or pure-software
              startups to replicate.
            calloutType: strength
            claimRefs:
              - CO034
              - CO035
              - CO036
          - type: callout
            title: FDA Inquiry into TrueMotion Creates Regulatory Overhang
            body: >
              In April 2025, the FDA issued an inquiry letter regarding the marketing and classification of Hinge
              Health's TrueMotion AI-powered motion-tracking technology. TrueMotion is central to the platform's cost
              efficiency, having automated approximately 97% of human therapist hours. A reclassification of TrueMotion
              as a regulated medical device could require costly product modifications, limit marketing claims, or force
              a return to higher-cost human-led care models, potentially eroding the 85% gross margin that underpins the
              company's profitability narrative.
            calloutType: risk
            claimRefs:
              - CO039
              - CO040
          - type: callout
            title: Down-Round IPO Signals Private Valuation Excess
            body: >
              Hinge Health's May 2025 IPO at $32/share valued the company at approximately $3 billion—less than half the
              $6.2 billion it attained in its October 2021 Series E. While the down-round IPO reflects broader market
              conditions and is not unique to Hinge, it illustrates the risk that late-stage private investors acquired
              stakes at valuations that did not fully account for normalization in technology and digital health
              multiples.
            calloutType: risk
            claimRefs:
