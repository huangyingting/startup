  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Scope and Boundary
        blocks:
          - type: paragraph
            body: >
              The digital musculoskeletal (MSK) care market encompasses software-enabled platforms that deliver physical
              therapy, pain management, rehabilitation, and preventive MSK programs via remote or hybrid
              modalities—distinct from traditional in-person physical therapy ($60–70 billion US market), MSK surgery,
              and pharmaceutical pain management. The core product category includes: (1) employer-facing virtual
              physical therapy and exercise therapy applications, (2) wearable-integrated remote monitoring and pain
              relief devices, (3) care coordination platforms connecting patients to providers, and (4) AI-augmented
              clinical pathways that replace or extend in-person PT visits.

              Hinge Health competes primarily in segment (1) and (2), with HingeConnect addressing (3) and its AI
              assistant "Robin" addressing (4). Excluded from the addressable market definition are direct-to-consumer
              (DTC) pain apps sold at retail, employer wellness apps without clinical pathways, and traditional physical
              therapy clinics operating without digital augmentation. Adjacent markets include occupational health,
              behavioral health (which intersects with chronic pain), women's pelvic health (Hinge entered in 2022),
              fall prevention (2023), and migraine care (2026)—each representing expansion vectors.

              The status-quo substitute is in-person physical therapy combined with prescription painkillers, which
              fails on access (average wait time 3–4 weeks), cost (uninsured PT session $75–$150), adherence (average 7
              of 12 prescribed sessions completed), and MSK surgery spend that is often preventable. Digital MSK care
              must demonstrate equivalent or superior clinical outcomes at lower total cost-of-care to justify the PMPM
              subscription model. Evidence reviewed in this chapter supports the clinical case while also surfacing
              skeptical third-party assessments of the strength of digital MSK evidence.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
