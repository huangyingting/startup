            $25–30B US MSK TAM; employer and health plan structural pressure to reduce costs; Hinge has ~2% revenue
            penetration
        - label: Proof of Traction
          value: 5 / 5
          detail: >-
            51% revenue growth; 85% gross margin; 2,849 enterprise clients; all 5 largest national health plans; 120%+
            NRR
        - label: Competitive Moat
          value: 3 / 5
          detail: Scale and clinical data advantages; Sword+Kaia creates well-capitalized challenger; moat partially weakened
        - label: Unit Economics
          value: 4 / 5
          detail: 85% gross margin; improving CAC payback; NRR >120% drives efficient expansion; pre-EBITDA positive
        - label: Regulatory / Legal Risk
          value: 2 / 5
          detail: FDA TrueMotion SaMD inquiry open; HIPAA SOC2 strong; no active litigation material; FDA risk is binary
        - label: Valuation vs. Peers
          value: 3 / 5
          detail: >-
            5–6x 2026E revenue; not cheap vs. Teladoc/Accolade (1–2x); not as expensive as Doximity (15–18x); fairly
            valued
        - label: Evidence Quality
          value: 4 / 5
          detail: >-
            Strong public filings (S-1, 10-K, 10-Q); analyst coverage growing post-IPO; key gaps in FDA details and
            payer renewal terms
        - label: Exit / Liquidity
          value: 4 / 5
          detail: >-
            Publicly traded; $250M buyback; strategic buyer pool (UnitedHealth, CVS, Amazon Health); lock-up overhang a
            12-month headwind
