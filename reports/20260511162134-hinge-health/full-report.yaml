      - number: '3.2'
        title: Competitor Profiles and Scale Assessment
        blocks:
          - type: paragraph
            body: >
              Sword Health's funding history reflects its ambition to rival Hinge Health at scale. The company raised a
              $163 million Series D in 2022, achieving a $2.6 billion valuation. Combined with earlier rounds, Sword has
              raised over $300 million total in private capital as of 2026. While Sword does not disclose annual revenue
              publicly, market sources estimate its revenue in the range of $100–200 million annually. The Kaia Health
              acquisition in 2025—acquired by Sword from its Series B investor base—brought AI computer vision
              technology for motion assessment that competes directly with Hinge Health's TrueMotion AI. Sword's
              clinical validation page documents peer-reviewed studies but with a smaller published evidence base than
              Hinge Health's 14+ clinical studies cited in its S-1.

              Omada Health's MSK program launch in 2025 represents a strategic expansion from its
              diabetes-and-hypertension digital therapeutics base. Omada had approximately $83 million in revenue for
              2024 before announcing MSK expansion and has distribution agreements with major health plans through its
              chronic disease business, providing an existing channel for cross-selling. Unlike Hinge Health's PMPM
              model centered on exercise therapy and wearables, Omada's MSK program is expected to emphasize behavioral
              change and care coordination with less hardware dependence. DarioHealth generates approximately $50
              million in annual revenue from its combined MSK and chronic condition platform, targeting smaller
              employers and health plans that may be priced out of Hinge Health's premium positioning.

              Vori Health is a smaller digital MSK startup focused on "whole-person" MSK care that combines virtual PT
              with nutrition and mental health. It targets a premium employer segment but lacks the scale, health plan
              distribution, and device differentiation of Hinge Health. Traditional physical therapy (in-person
              clinics—ATI, Select Medical, Concentra, independent practices) remains the dominant status-quo
              alternative: it captures the majority of the $60–70 billion US PT market but is constrained by geographic
              access, scheduling bottlenecks, co-pay burden, and inconsistent adherence. Hinge Health positions itself
              as cost-complementary to, rather than wholly replacing, in-person PT.
