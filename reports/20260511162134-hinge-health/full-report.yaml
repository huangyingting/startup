      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Hinge Health raised over $825 million in private financing across multiple rounds before its May 2025 IPO.
              The company's Series B round in 2018 was led by Insight Partners. The Series D round in January 2021
              raised $300 million, led by Coatue Management and Tiger Global Management, at a post-money valuation of $3
              billion, reflecting revenue that quadrupled in 2020 and a customer base that tripled. The landmark Series
              E round in October 2021 comprised $400 million in primary equity and a $200 million secondary investment
              by Alkeon Capital and Whale Rock Capital, totaling $600 million and valuing the company at $6.2
              billion—its peak private valuation.

              The May 2025 IPO raised $437 million total: approximately $237 million in primary proceeds to the company
              (8.5 million new shares) and approximately $200 million from existing shareholders selling 5.1 million
              shares. The IPO priced at $32 per share—the top of the $28–$32 range—and shares opened at $39.25 and
              closed the first trading day at $37.56, a 17% premium to the IPO price. The post-IPO market capitalization
              was approximately $3 billion, representing a significant down-round relative to the 2021 private valuation
              of $6.2 billion, reflecting the broader contraction in technology and digital health valuations since
              2021.

              Post-IPO, the largest institutional shareholders are Insight Partners (approximately 19% of outstanding
              shares) and Atomico (approximately 15%). Tiger Global, Coatue Management, 11.2 Capital, and Bessemer
              Venture Partners each hold approximately 8%. The company's share repurchase program, authorized at $250
              million in November 2025, demonstrates confidence in intrinsic value; $65 million was repurchased in Q4
              2025 and $105 million in Q1 2026. As of March 31, 2026, the company holds $407 million in cash, cash
              equivalents, and marketable securities.
