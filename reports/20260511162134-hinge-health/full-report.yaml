      - number: '6.2'
        title: Adoption Trajectory and Active Member Growth
        blocks:
          - type: paragraph
            body: >
              Hinge Health's adoption is best measured through three linked metrics: contracted lives (total lives
              covered under enterprise contracts), active members (members with meaningful platform engagement in any
              given period), and annual yield (active members / contracted lives). All three metrics have been on a
              positive trajectory through 2025 and into Q1 2026.

              Contracted lives grew to approximately 25 million as of December 2025 (per FY2025 annual disclosure), up
              from approximately 20 million in December 2024. This growth reflects both new health plan contract
              additions and expansion of existing plan coverage to additional employer groups within health plan
              networks. Active members—the monetizable subset of contracted lives—reached approximately 783,000 as of
              December 2025, implying an annual yield rate of 3.9% for FY2025. The yield rate improved modestly from
              approximately 3.7% in FY2024, indicating that Hinge Health is making progress on member activation but has
              vast whitespace: 96.1% of contracted lives have never engaged with the platform.

              Client count has grown steadily: from approximately 2,600 in December 2023 to 2,830 in December 2025 to
              2,849 in March 2026. The Q1 2026 net new client addition of only 19 accounts suggests that the enterprise
              sales pipeline is selective and focused on high-value logos rather than volume. The primary growth driver
              is expansion within existing clients (117% NDR), not net new logo addition. This is consistent with the
              health plan distribution model, where new employer groups within an existing health plan contract are
              automatically covered without requiring individual employer-by-employer sales.

              Member engagement depth, as measured by average exercise sessions per active member, is not publicly
              disclosed. The company does report outcomes (pain reduction, surgery avoidance) but does not provide
              average sessions per member, dropout rates after first session, or completion rates for the full 12-week
              program. These metrics are critical for assessing whether the 3.9% yield represents deeply engaged members
              or shallow one-time users—an open diligence gap.
            claimRefs:
