      - number: '1.4'
        title: Corporate Milestones
        blocks:
          - type: paragraph
            body: >
              Hinge Health's history spans a decade of product innovation, clinical validation, commercial scaling, and
              corporate governance evolution. From founding in 2014 through the 2025 IPO, the company progressed from a
              small UK-based startup to the public category leader in digital MSK care. Key inflection points include
              the 2021 dual financing rounds that provided the capital for rapid expansion, the acquisition of the Enso
              wearable device, the launch of multiple clinical programs, and the 2025 IPO. The company's trajectory is
              marked by consistent revenue growth that accelerated post-IPO: from $293 million in 2023 to $390 million
              in 2024 to $588 million in 2025, with 2026 guidance of approximately $801 million at the midpoint.

              Notable product milestones include the March 2021 acquisition of the Enso FDA-cleared electrical nerve
              stimulation device, the April 2022 launch of the Women's Pelvic Health program, the 2023 launch of the
              Fall Prevention program, the 2024 launch of the HingeSelect in-person provider network and the
              Global/International MSK program, and the May 2026 launch of the Migraine Care Program with FDA
              510(k)-cleared Enso neuromodulation technology. Partnership milestones include agreements with Amazon
              Health Services (December 2024), Cigna Healthcare (April 2025), and integration with all five of the
              largest national health plans. An FDA inquiry into TrueMotion technology in April 2025 represents an
              important regulatory checkpoint that remains partially unresolved.
