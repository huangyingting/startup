  claims:
    - id: CE001
      statement: "Hinge Health's platform integrates five core pillars: TrueMotion AI-guided exercise app, Enso FDA-cleared wearable device, Robin AI care navigator, HingeSelect in-person PT network (4,100 locations Q1 2026), and four clinical programs (MSK, pelvic health, fall prevention, migraine)."
      type: observed
      topic: platform-architecture
      sourceRefs: [SE001, SE003]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001, QE002]

    - id: CE002
