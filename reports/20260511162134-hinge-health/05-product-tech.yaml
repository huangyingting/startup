      type: observed
      topic: app-ratings
      sourceRefs: [SE012, SE013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE001, QE007]

    - id: CE003
      statement: "Hinge Health's product strategy has evolved from a simple digital PT app (2014–2019) to an AI-first, multi-program care platform, with each clinical program (MSK, pelvic, fall, migraine) having dedicated evidence-based care pathways."
      type: observed
      topic: product-evolution
      sourceRefs: [SE002, SE001]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001, QE005]

    - id: CE004
      statement: "HingeSelect is an in-person physical therapy network integrated into the Hinge Health platform, offering 4,100 locations as of Q1 2026; this hybrid care capability is unique among major digital MSK-only competitors (Sword Health, Omada, Kaia)."
      type: observed
      topic: hingeselect
      sourceRefs: [SE003, SE007]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE003, QE005]

    - id: CE005
      statement: "Hinge Health's four clinical programs—MSK (back, joint, neck/shoulder), pelvic health, fall prevention, and migraine—each use validated outcome instruments (NRS, EQ-5D, KOOS/HOOS, PISQ-12) embedded in the app for standardized measurement across the care pathway."
      type: observed
      topic: clinical-programs-outcomes
      sourceRefs: [SE001, SE010]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE009, QE010]

    - id: CE006
      statement: "TrueMotion is Hinge Health's proprietary computer vision and motion sensing AI system that provides real-time form guidance, rep counting, and biomechanical feedback during exercise sessions using the mobile device camera and sensors."
