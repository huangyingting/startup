      statement: "Risk rating for Hinge Health is HIGH: FDA regulatory binary risk, payer concentration above 50% for top-3 payers, pre-EBITDA-positive operating profile, and a well-capitalized competitor (Sword+Kaia) all create compound downside scenarios where EV could compress to $2.2–2.9B under bear conditions."
