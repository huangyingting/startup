    - id: CV007
      statement: "RECOMMENDATION: TRACK (conditional BUY). Current EV/2026E revenue of approximately 5–6x is fair but not compelling given the open FDA TrueMotion regulatory inquiry. A BUY upgrade would require either: (a) FDA favorable resolution of the TrueMotion 510(k) question, or (b) stock declining to approximately 4x 2026E revenue (~$2.9B EV), providing a margin of safety against the bear scenario."
      type: inferred
      topic: investment-recommendation-track
      sourceRefs: [SV001, SV008, SV009]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QV007]

