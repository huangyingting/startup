runDate: "2026-05-11"
company:
  name: Hinge Health
  legalName: Hinge Health, Inc.
  founded: "2014"
  hq: San Francisco, CA
  stage: public
  ticker: HNGE
  exchange: NYSE

chapter:
  number: 8
  title: Valuation
  summary: >
    Hinge Health's May 2026 valuation analysis places the company in a contested but
    structurally compelling position. FY2025 revenue of $588M (+51% YoY) and Q1 2026
    gross margin of 85% demonstrate high-quality unit economics for an employer-facing
    B2B SaaS model. The IPO (May 2025) priced below the 2021 Series E $6.2B peak;
    as of May 2026, EV/2026E revenue of ~5–6x reflects a market pricing in both
    sustained growth and open-ended regulatory risk from the FDA TrueMotion inquiry.
    The investment thesis rests on digital MSK market TAM of $25–30B, payer-funded
    reimbursement visibility, and accelerating gross margin leverage toward
    eventual profitability. Anti-thesis risk centers on FDA SaMD reclassification,
    payer concentration (top 3 payers >50% of revenue), and multiple compression
    if growth moderates below 30% YoY. Recommendation: TRACK — revisit at buy on
    FDA inquiry resolution or meaningful valuation pullback to sub-4x 2026E revenue.

sections:
  - id: investment-thesis
    title: Investment Thesis and Anti-thesis
    body: >
      Hinge Health has constructed the dominant digital musculoskeletal care platform
      in the US employer and commercial health-plan channel. The investment thesis
      rests on three pillars: (1) a $25–30B addressable MSK cost burden
      that self-insured employers and health plans are under structural pressure to
      reduce; (2) a product architecture combining AI motion analysis (TrueMotion),
      wearable hardware (Enso), and licensed physical therapist oversight that
      generates clinically defensible outcomes claims; and (3) a flywheel of 2,849
      enterprise contracts and 25M contracted lives creating high switching costs
      and net revenue retention above 120%.

      The anti-thesis is equally specific: Hinge Health has not cleared a 510(k)
      for TrueMotion; an adverse FDA determination would require product modification
      or regulatory clearance (150–300+ days), creating contract renegotiation risk
      with health plans. Payer concentration leaves the company exposed to top-3
      payer repricing. Gross margin of 85% is exceptional but the company remains
      pre-EBITDA-positive, relying on continued revenue growth to fund G&A and R&D.
      Sword Health's acquisition of Kaia Health in late 2024 has materially upgraded
      the competitive threat in the enterprise segment.
    sectionRefs: [CV001, CV002, CV003, CV004, CV005, CV006]
    tableRefs: [TV002]
    figureRefs: [FV004]

  - id: recommendation-stance
    title: Recommendation, Confidence, and Risk Rating
    body: >
      RECOMMENDATION: TRACK (conditional buy). Current EV/2026E revenue of ~5.5x
      is not a screaming entry point given open regulatory risk and payer
      concentration. We would upgrade to BUY if: (a) FDA resolves TrueMotion
      inquiry favorably (or company obtains 510(k)) and (b) stock trades at or
      below 4x forward revenue. Confidence: MEDIUM. Risk Rating: HIGH.

      The company's trajectory—51% revenue growth in FY2025, 85% gross margin,
      $407M cash, and $250M authorized buyback—supports a view that Hinge Health
      is structurally sound. However, a negative FDA ruling, which cannot be
      probability-weighted precisely, could meaningfully impair intrinsic value.
      We therefore prefer a margin-of-safety entry before committing full position size.
    sectionRefs: [CV007, CV008, CV009, CV010, CV011, CV012]
    tableRefs: [TV001]
    figureRefs: [FV001]

  - id: valuation-context
    title: Financing, Valuation Context, and Entry Discipline
    body: >
      Hinge Health raised $300M Series D (Jan 2021) and $400M Series E (Oct 2021)
      at a peak valuation of $6.2B, representing 12–15x then-forward revenue.
      The May 2025 IPO priced below that peak (a down-round relative to 2021 marks),
      with TechCrunch reporting the stock opened +17% on day one—suggesting the
      IPO price was well below intrinsic value consensus even at IPO.

      As of May 2026, with FY2025 actual revenue of $588M and FY2026 guidance
      of ~$732M, the implied EV at current market prices is approximately
      $3.5–4.5B, translating to 5–6x 2026E revenue. For a profitable-margin
      digital health SaaS at 85% gross margin with 30%+ growth, this multiple
      is defensible but not compelling relative to Doximity's 15–18x. The
      Teladoc cautionary tale (multiple compression from 20x to 1x over 2021–2025)
      illustrates the downside if growth decelerates or the market narrative shifts.

      Dilution/preference overhang: The company completed its IPO with significant
      VC-held preference structures converting to common. Legacy investors (Coatue,
      Tiger Global, Atomico, 11.2 Capital) hold substantial positions whose orderly
      distribution creates technical overhang through 2026–2027 as lock-up periods
      expire and block trades clear.
    sectionRefs: [CV013, CV014, CV015, CV016, CV017, CV018, CV019]
    tableRefs: []
    figureRefs: [FV003]

  - id: scenario-analysis
    title: Bull / Base / Bear Scenario Analysis
    body: >
      BULL (25% probability): FDA resolves favorably, Sword/Kaia integration delays
      enterprise expansion, Hinge extends into migraine and pelvic health, GLP-1
      comorbidity partnerships accelerate member volumes. FY2027E revenue reaches
      $1.1B at 87% gross margin; adjusted EBITDA turns positive by H2 2027. Market
      re-rates to 7–9x 2026E revenue → EV $5.1–6.6B.

      BASE (50% probability): FDA inquiry lingers as a disclosed risk through 2027
      with no adverse ruling; revenue growth moderates to 28–35% YoY; gross margin
      holds at 85–86%; company reaches EBITDA break-even in FY2028. Multiple holds
      at 5–7x 2026E revenue → EV $3.7–5.1B.

      BEAR (25% probability): FDA issues adverse TrueMotion determination requiring
      product redesign; one or two top-3 payers decline renewal or reprice at IPO
      anniversary; revenue growth falls below 20% YoY; multiple compresses to
      3–4x 2026E revenue → EV $2.2–2.9B.

      Downside triggers: (1) FDA adverse ruling published, (2) any top-3 payer
      non-renewal announcement, (3) quarterly revenue miss >10% vs. consensus.
    sectionRefs: [CV020, CV021, CV022, CV023, CV024, CV025]
    tableRefs: [TV003]
    figureRefs: [FV002]

  - id: comparable-set
    title: Comparable Valuation Analysis
    body: >
      The comparables set spans pure-play digital health SaaS and B2B employer
      benefit platforms. No perfect comparable exists: Doximity is the closest
      margin analog (physician SaaS, 85%+ GM) but lacks the MSK/clinical focus;
      Teladoc is the cautionary tale for telehealth multiple compression; Accolade
      and Health Catalyst anchor the lower-multiple end of employer-benefits tech.
      Omada Health (pre-IPO) is the most direct competitive analog by product
      category but lacks public valuation data.

      Blending the comparable set on EV/NTM Revenue, Hinge Health's 5–6x
      2026E multiple is roughly in line with mid-tier health SaaS at its growth
      rate, reflecting neither a quality premium (Doximity's 15–18x) nor a
      distress multiple (Teladoc's ~1x). The key variable differentiating Hinge
      from mid-tier comps is gross margin (85% vs. 60–70% for most comps) and
      growth rate (30%+ vs. 10–20%), which argues for multiple expansion if
      operational leverage drives EBITDA inflection.
    sectionRefs: [CV026, CV027, CV028, CV029, CV030, CV031]
    tableRefs: [TV004]
    figureRefs: []

  - id: exit-diligence
    title: Exit Readiness and Final Diligence Asks
    body: >
      Exit routes: (1) Strategic acquisition — large health insurer (UnitedHealth,
      CVS/Aetna, Elevance) or large tech player (Amazon Health, Microsoft/Nuance)
      could acquire at 8–12x revenue; however, anti-trust review risk has increased
      post-2025; (2) Continued public market appreciation as EBITDA inflection
      materializes; (3) Buyback programs ($250M authorized, $66M deployed as of
      Q1 2026) provide share count reduction tailwind.

      The most critical diligence asks before upgrading to BUY are: (1) FDA
      correspondence and internal regulatory counsel assessment of TrueMotion 510(k)
      risk; (2) top-3 payer contract renewal status and pricing terms at first
      renewal post-IPO; (3) Enso hardware BOM and supply chain cost trajectory as
      volume scales.
    sectionRefs: [CV032, CV033, CV034, CV035, CV036, CV037, CV038, CV039, CV040]
    tableRefs: [TV005, TV006]
    figureRefs: []

tables:
