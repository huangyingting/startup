company:
  name: Hinge Health
chapter:
  number: 1
  title: Company Overview
  summary: >
    Hinge Health is a San Francisco-based digital musculoskeletal (MSK) care company founded in 2014 by Daniel Perez (CEO) and Gabriel Mecklenburg (Executive Chairman) that went public on the NYSE (HNGE) in May 2025. The company operates a B2B2C model, selling subscription-based virtual physical therapy and MSK care programs to self-insured employers and health plans, who offer them to employees and members at zero out-of-pocket cost. With 2,849 employer and health plan clients, 25 million contracted lives, and Q1 2026 revenue of $182 million (+47% YoY), Hinge Health is the category leader in digital MSK care and has demonstrated a clear path to durable, high-margin growth.

sections:
  - id: company-identity
    title: Company Identity and Business Model
    body: >
      Hinge Health was founded in late 2014 by Daniel Perez and Gabriel Mecklenburg in the United Kingdom, with both founders personally motivated by difficult MSK injury recoveries. Perez suffered multiple fractures in a bicycle accident and Mecklenburg tore his ACL in a judo match; both spent more than 12 months in rehabilitation and experienced the limitations of traditional physical therapy firsthand. The company initially operated in the UK before relocating its headquarters to San Francisco, California in 2017, where it is based at 455 Market Street, Suite 700, San Francisco, CA 94105.

      The core product is an AI-powered virtual MSK care platform that delivers personalized exercise therapy, access to licensed physical therapists and health coaches, remote monitoring, and the FDA-cleared Enso wearable device for drug-free pain relief. Hinge Health operates a business-to-business-to-consumer (B2B2C) model: it signs multi-year contracts with large employers, health plans, and public-sector organizations, who then offer Hinge Health programs to their employees or members at zero out-of-pocket cost. Revenue is generated on a per-member-per-month (PMPM) engagement basis, with clients paying only for members who actively use the platform, aligning incentives between the company and its customers.

      As of May 2026, Hinge Health operates as a fully public company on the New York Stock Exchange under the ticker symbol HNGE, having completed its IPO in May 2025. The company serves 2,849 enterprise clients and covers approximately 25 million contracted lives. Its platform addresses a broad range of MSK conditions including back, knee, hip, shoulder, and neck pain, as well as pelvic health and fall prevention. The company describes its mission as "scaling and automating the delivery of health care," starting with musculoskeletal conditions but with aspirations to expand to other health areas.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008]
    tableRefs: [TO001]
    figureRefs: [FO002, FO003]

  - id: founders-and-leadership
    title: Founders, Leadership, and Governance
    body: >
      Hinge Health's leadership team combines deep clinical expertise with enterprise software and healthcare operations experience. Daniel Perez, Co-Founder and CEO, holds a B.S. in Biology from Westminster University and attended a PhD program in Biochemistry at the University of Oxford, where he met Gabriel Mecklenburg. Perez has led the company since its founding and owns approximately 18.9% of shares post-IPO. Gabriel Mecklenburg, Co-Founder and Executive Chairman, holds an M.Sc. in Materials Science from the University of Cambridge and an M.Phil. in Bioengineering from Imperial College London. Mecklenburg previously served as COO and retains approximately 8.2% of shares.

      James Budge joined as Chief Financial Officer in March 2023, bringing experience from Automation Anywhere, Pluralsight, Anaplan, and Genesys Cloud Services. Jim Pursley serves as President, joining in 2021 after serving as Chief Commercial Officer at Livongo Health, bringing deep enterprise healthcare sales expertise. Lex Annison serves as Chief Operating Officer, joining from Google where he was Global Director of Strategy and Operations. Dr. Jeffrey Krauss joined as Chief Medical Officer in 2018 and is board-certified in Physical Medicine and Rehabilitation (PM&R) and Lifestyle Medicine, with affiliations at Stanford and the VA Palo Alto.

      The Board of Directors expanded in March 2026 with the appointment of Tyler Sloat, CFO and COO of Freshworks Inc., who brings decades of experience scaling public SaaS companies. Hinge Health's governance structure includes a dual-class share structure common for founder-led public technology companies, with founders retaining meaningful voting influence. Key-person dependency is a material risk given that Perez is the public face of the company, a major shareholder, and the architect of the company's long-term strategy and culture. The departure of Perez would likely be viewed negatively by investors and customers.
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO016]
    tableRefs: [TO002]

  - id: funding-and-capital
    title: Funding History and Capital Structure
    body: >
      Hinge Health raised over $825 million in private financing across multiple rounds before its May 2025 IPO. The company's Series B round in 2018 was led by Insight Partners. The Series D round in January 2021 raised $300 million, led by Coatue Management and Tiger Global Management, at a post-money valuation of $3 billion, reflecting revenue that quadrupled in 2020 and a customer base that tripled. The landmark Series E round in October 2021 comprised $400 million in primary equity and a $200 million secondary investment by Alkeon Capital and Whale Rock Capital, totaling $600 million and valuing the company at $6.2 billion—its peak private valuation.

      The May 2025 IPO raised $437 million total: approximately $237 million in primary proceeds to the company (8.5 million new shares) and approximately $200 million from existing shareholders selling 5.1 million shares. The IPO priced at $32 per share—the top of the $28–$32 range—and shares opened at $39.25 and closed the first trading day at $37.56, a 17% premium to the IPO price. The post-IPO market capitalization was approximately $3 billion, representing a significant down-round relative to the 2021 private valuation of $6.2 billion, reflecting the broader contraction in technology and digital health valuations since 2021.

      Post-IPO, the largest institutional shareholders are Insight Partners (approximately 19% of outstanding shares) and Atomico (approximately 15%). Tiger Global, Coatue Management, 11.2 Capital, and Bessemer Venture Partners each hold approximately 8%. The company's share repurchase program, authorized at $250 million in November 2025, demonstrates confidence in intrinsic value; $65 million was repurchased in Q4 2025 and $105 million in Q1 2026. As of March 31, 2026, the company holds $407 million in cash, cash equivalents, and marketable securities.
    claimRefs: [CO017, CO018, CO019, CO020, CO021, CO022, CO023, CO024, CO025]
    tableRefs: [TO003]

  - id: milestones
    title: Corporate Milestones
    body: >
      Hinge Health's history spans a decade of product innovation, clinical validation, commercial scaling, and corporate governance evolution. From founding in 2014 through the 2025 IPO, the company progressed from a small UK-based startup to the public category leader in digital MSK care. Key inflection points include the 2021 dual financing rounds that provided the capital for rapid expansion, the acquisition of the Enso wearable device, the launch of multiple clinical programs, and the 2025 IPO. The company's trajectory is marked by consistent revenue growth that accelerated post-IPO: from $293 million in 2023 to $390 million in 2024 to $588 million in 2025, with 2026 guidance of approximately $801 million at the midpoint.

      Notable product milestones include the March 2021 acquisition of the Enso FDA-cleared electrical nerve stimulation device, the April 2022 launch of the Women's Pelvic Health program, the 2023 launch of the Fall Prevention program, the 2024 launch of the HingeSelect in-person provider network and the Global/International MSK program, and the May 2026 launch of the Migraine Care Program with FDA 510(k)-cleared Enso neuromodulation technology. Partnership milestones include agreements with Amazon Health Services (December 2024), Cigna Healthcare (April 2025), and integration with all five of the largest national health plans. An FDA inquiry into TrueMotion technology in April 2025 represents an important regulatory checkpoint that remains partially unresolved.
    claimRefs: [CO026, CO027, CO028, CO029, CO030, CO031, CO032, CO033]
    tableRefs: [TO004]
    figureRefs: [FO001]

