  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Hinge Health 通过单一主收入流创收：自保雇主和健康计划代表员工和成员支付 PMPM 订阅费。公司不向个人用户收费；全部收入都是企业端 B2B。PMPM
              费用在向活跃成员交付服务时确认，因此收入模型直接绑定成员参与度，而不是合约覆盖人群。这种「按参与付费」结构使 Hinge Health 与雇主 / 健康计划客户激励一致——客户只为活跃使用平台的成员付费。

              收入按适用报告期内参与成员数量逐月确认，这意味着收入在一定程度上依赖使用量，并非签约时就完全合同保证。不过，高留存率（97–98% 客户留存率）和单客户收入扩张（117%
              NDR）显示收入质量较高：随着更多成员注册以及客户增加项目，现有合同会持续产生更多收入。

              次要收入组成包括 Enso 设备出货带来的硬件相关收入（纳入符合条件成员的订阅包）和 HingeSelect 线下服务方网络费用（通过雇主或健康计划合同作为专业服务收取）。这些次要收入流未单独披露，而是嵌入总
              PMPM 收入确认。公司不运营消费者 DTC 订阅模式；没有重要直接面向消费者收入。截至 Q1 2026，Hinge Health 收入组合约 84% 来自健康计划分销，16%
              来自直接雇主合同。前三大健康计划合作伙伴收入集中度（HCSC ~16%、Elevance ~13%、Aetna ~10%）合计约占总收入 39%——这是 S-1 记录并在财报披露中承认的集中风险。

              FY2025 GAAP 收入为 $587.9 million（较 FY2024 的 $390.4M +51% YoY）。Q1 2026 GAAP 收入为 $182.3 million（较 Q1 2025 的
              $123.8M +47% YoY）。FY2026 指引 $798–804 million，中点意味着 36% 增长。截至 Q1 2026，LTM 计算账单额为 $769.9 million（+52%
              YoY）；鉴于 PMPM 合同性质，它是未来收入的领先指标。
