companyProfile:
  summary: >
    Hinge Health 是数字肌肉骨骼（MSK）护理的市场领导者，2014 年由 Daniel Perez（CEO）和 Gabriel Mecklenburg（执行董事长）创立，总部位于 San Francisco,
    California。公司通过 B2B2C 参与模型，向自保雇主和健康计划提供 AI 驱动的虚拟物理治疗与 MSK 护理项目，包括专有 TrueMotion 运动追踪 AI 和 获 FDA 许可的 Enso 可穿戴设备。客户按
    PMPM 仅为活跃使用成员付费，激励一致，也在 Q1 2026 推动 85% 毛利率。公司自 May 22, 2025 起在 NYSE（HNGE）上市；Q1 2026 收入 $182.3 million（+47% YoY），并将
    FY2026 指引上调至 $798–804 million。截至 March 2026，公司服务 2,849 家企业客户，覆盖 25 million 合约人群，合作覆盖美国五大全国性健康计划。
