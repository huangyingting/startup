  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与产品支柱
        blocks:
          - type: paragraph
            body: >
              Hinge Health 运营一个垂直整合的数字化肌肉骨骼（MSK）护理平台，把硬件、AI 软件、临床护理管理和线下网络服务合成一个统一体验。平台通过移动应用（iOS 和 Android）交付，并集成可穿戴设备
              Enso 和 AI 介导的临床路径。公司的产品策略已从简单的数字物理治疗应用（2014–2019），演进为 AI 优先、多项目护理平台，覆盖 MSK、盆底健康、跌倒预防和偏头痛。

              五个核心产品支柱是：第一，Hinge Health 移动应用——一款智能手机应用，用于指导性运动、教育内容、疼痛追踪和临床人员沟通。截至 Q1 2026，该应用在 Apple App Store 评分 4.7
              星、Google Play Store 评分 4.5 星，下载量超过 500,000。它支持结构化治疗性运动项目、用手机摄像头完成的动作指导练习（通过
              TrueMotion），以及症状和情绪追踪。第二，TrueMotion AI——嵌在应用里的专有计算机视觉和动作感知技术，在运动过程中提供实时姿势指导、次数计数和生物力学反馈。第三，Enso 设备——一款获得
              FDA 批准、用于疼痛管理的可穿戴电神经刺激（ENS）设备；Enso 是面向消费者的设备，配套 Enso app，作为 MSK 项目捆绑的一部分寄给会员。第四，Robin AI——公司的 AI
              护理导航员，处理临床分诊、会员触达、特定病种沟通和临床人员支持。第五，HingeSelect——一个线下混合护理网络，截至 Q1 2026 在美国拥有 4,100
              个物理治疗地点，让虚拟护理不足时会员可以见到网络内物理治疗师。

              四个临床项目——MSK（覆盖背痛、关节痛和颈 / 肩痛）、盆底健康、跌倒预防和偏头痛——各自有专门护理路径，包含循证运动方案、临床结果追踪和会员级定制。MSK
              项目最早推出，也是按会员量计算最大的项目；盆底健康、跌倒预防和偏头痛项目来自内部开发以及 Enso 3 设备扩展（偏头痛借助 Enso 的头部刺激能力）。平台统一会员体验意味着，一个加入多个项目的会员（例如
              MSK + 盆底健康）使用同一个应用，并由整合护理团队服务。
            claimRefs:
