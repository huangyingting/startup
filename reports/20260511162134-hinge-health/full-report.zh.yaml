      - number: '2.4'
        title: 增长驱动、采用约束与竞争催化剂
        blocks:
          - type: paragraph
            body: >
              数字 MSK 护理的根本需求驱动是 MSK 负担本身的规模。World Health Organization 将 MSK 疾病列为全球致残首因；截至 2021，全球受影响人口超过 1.71
              billion。在美国，约 40% 成年人在 2021 经历过 MSK 疾病。Pew Trusts 记录，MSK 疾病每年给美国经济造成 $874 billion 成本（2017
              数据，今天很可能更高）。一项引用直接和间接成本的更新评估将美国 MSK 总成本置于每年约 $1.285 trillion——包括 $661 billion 直接医疗成本，以及 $624 billion
              间接成本（含生产率损失）。

              传统物理治疗供给端瓶颈放大了对数字替代品的需求。Bureau of Labor Statistics 预计物理治疗师就业人数 在 2023 到 2033 增长
              19%，是所有主要医疗职业中增速最快的；但这仍无法消除现有地理和排期可及性缺口。American Physical Therapy Association 指出，MSK 疾病是 PT
              转诊的主要驱动，且在农村和服务不足地区，需求持续超过持证 PT 产能。这个错配为数字平台规模化交付高吞吐、AI 自动化 PT 打开结构性窗口。

              雇主采用还受到已证明成本节约的催化。Hinge Health 声称雇主平均 ROI 为 2.4×，公司申报文件披露的 employer NPS 为 87，说明买方满意度强。KFF 2024 Employer
              Health Benefits Survey 显示，雇主持续关注 musculoskeletal 和专科支出，这是自保雇主前三大成本类别之一。约束包括：（1）企业销售周期长（大型雇主 6–18
              months）；（2）健康计划合同锁定期拖慢切换和采用；（3）衰退环境下雇主成本压力可能让点状解决方案 被降级；（4）部分临床和媒体观察者质疑数字 MSK 项目的证据质量——Healio 和其他临床媒体已有记录。
