      - number: '2.5'
        title: 规模测算缺口、证据冲突与尽调问题
        blocks:
          - type: paragraph
            body: >
              数字 MSK 护理的市场规模测算存在显著不确定性，分析师和投资者都应承认。第一，没有单一分析机构提供严谨的自下而上 SAM，并与 Hinge Health
              自身按渠道划分的分层相匹配。Coherent、InsightAce、Grand View、Statista 等分析师估计采用自上而下的全球市场规模，将数字 MSK 护理与相邻数字疗法类别打包，难以同口径
              比较。Hinge Health S-1 的 $27 billion TAM 是管理层估计，未经过独立验证。

              第二，如果拿不到仍为私有的健康计划合同条款、PMPM 定价假设和成员资格数据，外部无法独立计算 Hinge Health 的可获取服务市场（SOM）。在 25 million 合约人群和 3.9%
              年度转化率（活跃成员占比）下，Hinge Health 2025 活跃会员约 ~783,000，约占合约人群 3%——这说明参与度提升仍有很大空间，也说明多数合约人群从未主动注册。

              第三，临床证据存在实质争议。Healio 在 August 2023 报道称，数字 MSK 护理工具对慢性疼痛只有「中等证据」；这种表述挑战了公司声称的效果优越性。CMS 尚未为数字 MSK
              项目建立正式覆盖福利类别，带来报销不确定性，限制其进入 Medicare fee-for-service 分层。BIV 关于 Hinge Health IPO 的报告，以及更广泛的 healthcare IT
              分析师群体都指出，相比获 FDA 许可的 设备，AI 增强 PT 的临床验证仍处萌芽阶段；Hinge Health 针对 TrueMotion 的持续 FDA 问询（April
              2025）又为证据缺口增加监管维度。

              最后，宏观环境构成风险：经济下行中成本承压的雇主可能推迟或减少点状解决方案 支出，健康计划对行政预算的审查也可能拖慢按当前 PMPM 费率续约。这些尽调缺口已在证据缺口部分记录，应通过与 Hinge Health
              商业团队的直接尽调和独立临床文献审查来解决。
            claimRefs:
              - CM027
