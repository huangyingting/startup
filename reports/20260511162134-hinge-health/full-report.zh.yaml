      - number: '6.5'
        title: 客户集中风险与证据缺口
        blocks:
          - type: paragraph
            body: >
              健康险计划伙伴中的收入集中，是 Hinge Health 最主要的客户风险。三家健康险计划（HCSC、Elevance、Aetna）约占总收入 39%。理论上，HCSC（最大客户，约
              16%）若不续约或重新谈判费率，会立即造成 $126M 年化收入逆风（基于 FY2026 指引中点 $801M）。健康险计划合同通常期限为 12–36 个月，重大变更需要监管批准。不过，若 HCSC 转向竞争
              MSK 供应商，迁移需要 12–18 个月——这给 Hinge Health 留出替代收入的时间。真正风险在于多家健康险计划累计施压，要求降低 PMPM 费率，尤其是在 Sword Health、Omada
              和其他数字 MSK 供应商积极价格竞争时。

              雇主账户内的会员集中是二阶风险，公开披露中没有说明。783,000 名活跃会员分布在 2,849 个客户，意味着平均每个客户约 275 名活跃会员。不过，如果少数大型雇主（Boeing、Amazon、City
              of LA）贡献了不成比例的活跃会员，那么账户层面的客户留存指标可能低估了已参与会员收入的集中度。

              限制客户质量评估信心的证据缺口包括：（1）缺少独立审计的案例研究 ROI 数据；Hinge Health 的 Boeing、City of LA 和 Amazon
              渠道结果均为自报，未由第三方精算师验证；（2）NPS（约 70）只在活跃会员中测量——不是在更广泛的签约覆盖人群中测量，鉴于低转化率，后者满意度可能更低；（3）健康险计划合同条款（期限、PMPM
              费率、排他性条款）未披露；以及（4）公开文件或媒体中没有来自健康险计划采购团队的客户满意度数据（区别于终端会员 NPS）。

              Kaiser Health News 在 2024 年对包括 Hinge Health 和 Sword Health 在内的数字 PT 应用所做独立分析指出，雇主和计划买方很难独立验证结果主张，往往依赖
              Hinge Health 自己的案例研究——这是商业证据基础中的利益冲突。这是数字健康证据生态的系统性限制，并非 Hinge Health 独有，但与具名客户背书的质量评估相关。
