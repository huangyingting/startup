      - number: '5.4'
        title: 临床证据基础与结果
        blocks:
          - type: paragraph
            body: >
              截至 Q1 2026，Hinge Health 已发表 11+ 篇同行评审临床研究，是市场上临床验证最充分的数字 MSK
              公司之一。公司的临床证据组合覆盖随机对照试验（RCT）、回顾性队列研究和雇主结果分析。关键已发表结果包括：2020 年发表于 JMIR mHealth and uHealth 的一项 RCT 显示，低背痛患者在
              12 周时，相比常规护理，疼痛严重度（Numeric Rating Scale）下降 68%；一项回顾性队列研究显示，Hinge Health 会员的 MSK 相关手术较匹配对照组减少 58%；以及一项 2023
              盆底健康队列研究显示，完成盆底健康项目的会员在盆底症状评分（PISQ-12）上显著改善。

              临床路径使用经过验证的结果工具（NRS 疼痛量表、EQ-5D 生活质量评分、关节项目的 KOOS/HOOS，以及盆底健康的 PISQ-12），并在标准化测量节点嵌入应用（入组第 2、6、12 和 26
              周）。这些结果以季度结果报告形式分享给雇主和健康险计划客户，展示每个雇主的疼痛减轻、手术避免和成本节约。结果数据会进入 ROI 计算器，支撑新合同续约和扩张时的商务沟通。

              解读 Hinge Health 临床证据时，一个重要细节是选择偏差：加入数字 MSK 项目并完成 12 周运动的会员，可能不能代表雇主或健康险计划合同覆盖的一般 MSK 人群。3.9% 的转化率（97.6%
              的签约覆盖人群从未成为活跃会员）表明，已发表结果反映的是自我选择且高度自驱的队列。如果参与率提高，更广泛的签约覆盖人群能否获得同等结果，仍是一个开放临床问题。审视数字 PT 项目的学术文献已经提出这一担忧，但
              Hinge Health 已发表研究尚未回应。

              公司还引用了一项发表于 NCBI PMC（2020）的研究证据，支持数字运动疗法对慢性肌肉骨骼疼痛病症的有效性；这与远程医疗交付 PT 的更广泛文献一致。FDA 当前针对数字 PT 项目的 SaMD 框架，不要求
              Class I/II wellness applications 提交临床 RCT，因此 Hinge Health 可以独立营销其临床证据，而不需要软件本身获得 FDA 上市前批准（这与 Enso
              的硬件批准分开）。
