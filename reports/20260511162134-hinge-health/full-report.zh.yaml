      - number: '2.3'
        title: 买方、用户与支付方分层
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的 GTM 聚焦企业买方——自保雇主和健康计划——而非个人消费者。自保雇主（通常 500+ 名员工）把 Hinge Health
              作为嵌入员工福利包的点状解决方案采购，并为参加项目的每名员工支付 PMPM 费用。该分层代表最大的近期开口：美国约 158 million 工作者由雇主赞助健康保险覆盖；Fortune 500
              公司由于员工年龄更高、体力活动或久坐人群更多，在 MSK 支出中占比不成比例。

              健康计划分销已成为 Hinge Health 主要增长引擎，到 Q1 2026 占收入 84%。健康计划将 Hinge Health 打包为全保和 Medicare Advantage
              成员的增值福利，把成本吸收到行政和质量预算，而不是理赔。该动态把 Hinge Health 触达扩展到更小雇主（通过健康计划）和政府赞助人群（通过 Medicare
              Advantage）。五大全国性健康计划全部是合作伙伴，截至 2026 年初，超过 60 个健康计划已接入 Hinge Health。

              联邦和政府支付方分层（Medicare、Medicaid、VA、TRICARE、联邦雇员健康福利计划）是 S-1 确定的 $9 billion SAM 延伸，但目前只能通过 Medicare Advantage
              和有限 VA 试点触达。Direct Medicare Fee-for-Service 报销还没有把数字 MSK 项目确立为明确福利类别，因此这是一个取决于 CMS 覆盖决定的中期机会。个人 DTC
              用户只占市场小部分，今天不是 Hinge Health 的重要收入分层。预算所有权几乎完全在机构端——雇主的 HR 和福利负责人、健康计划的医疗总监和网络管理 VP/SVP——个人消费者购买决策并不重要。
