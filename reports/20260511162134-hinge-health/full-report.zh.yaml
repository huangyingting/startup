      - number: '3.5'
        title: 反向竞争证据与替代风险
        blocks:
          - type: paragraph
            body: >
              竞争格局中有几项反向信号，Hinge Health 投资者应仔细权衡。第一，Sword Health 在 2025 收购 Kaia Health，代表直接能力升级。Kaia 的 AI 动作指导与
              TrueMotion 直接竞争，Sword 现在拥有更完整产品套件。如果 Sword 借 Kaia 的欧洲网络和新的美国投资，成功复制 Hinge Health 的健康计划分销策略，可能在 2–4 年窗口内侵蚀
              Hinge 的企业级护城河。

              第二，Omada Health 的 MSK 扩张具有战略意义，因为 Omada 已有健康计划关系和临床品牌认知。已经信任 Omada 糖尿病管理的健康计划医疗总监，可能更偏好打包的 Omada 慢病 + MSK
              方案，而不是单独的 Hinge Health 合同；尤其在支付方推动供应商整合时。这个交叉销售威胁不是 Hinge Health 仅靠临床差异化就能完全抵消的。

              第三，CB Insights 识别出多个「Hinge Health 替代方案」，它们受益于同样市场顺风——这说明市场并非赢家通吃，多归属（雇主和健康计划同时使用多个数字 MSK
              供应商）也有可能。买方整合压力有两面：它可能有利于 Hinge 作为领先平台，也可能有利于更大型整合型 玩家（United Health Group 的 Optum、Aetna/CVS
              Health、Elevance）开发内部 MSK 数字 项目，从而绕开第三方供应商。

              第四，商品化风险：随着 AI 驱动的运动治疗 对更多开发者变得技术可及（例如通过开源姿态估计模型），且 FDA 监管清晰度提高，新的数字 MSK 竞争者进入门槛可能下降。Hinge Health
              的设备护城河（Enso）和数据飞轮（TrueMotion 训练数据）提供有时限保护，但医疗科技存量玩家常在市场成熟后看到利润率被压缩，因为更大玩家（健康计划、药品福利管理方）会把数字项目能力内化。
