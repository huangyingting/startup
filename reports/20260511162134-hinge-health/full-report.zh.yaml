chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: >
              Hinge Health 于 2014 年末由 Daniel Perez 和 Gabriel Mecklenburg 在英国创立，两位创始人的出发点都来自艰难的 MSK 伤后恢复经历。Perez
              在自行车事故中多处骨折，Mecklenburg 在柔道比赛中撕裂 ACL；两人康复都超过 12 个月，亲身感受了传统物理治疗的局限。公司早期在英国运营，2017 将总部迁至 San Francisco,
              California，目前位于 455 Market Street, Suite 700, San Francisco, CA 94105。

              核心产品是 AI 驱动的虚拟 MSK 护理平台，提供个性化运动治疗、持证物理治疗师和健康教练接入、远程监测，以及 获 FDA 许可的 Enso 可穿戴设备带来的无药物止痛。Hinge Health 采用
              B2B2C 模式：与大型雇主、健康计划和公共部门组织签多年期合同，再由这些客户以零自付成本向员工或成员开放 Hinge Health 项目。收入按 PMPM
              参与度计费，客户只为活跃使用平台的成员付费，公司与客户的激励由此对齐。

              截至 May 2026，Hinge Health 已是完全上市公司，在 NYSE 以 HNGE 交易，IPO 于 May 2025 完成。公司服务 2,849 家企业客户，覆盖约 25 million
              合约人群。平台覆盖广泛 MSK 病症，包括背部、膝部、髋部、肩部和颈部疼痛，也覆盖盆底健康和跌倒预防。公司把使命表述为「扩大并自动化医疗服务交付」，从肌肉骨骼疾病切入，同时希望扩展到其他健康领域。
