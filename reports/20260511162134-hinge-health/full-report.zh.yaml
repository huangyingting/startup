      - number: '3.2'
        title: 竞争对手画像与规模评估
        blocks:
          - type: paragraph
            body: >
              Sword Health 的融资历史显示其要在规模上对标 Hinge Health 的野心。公司在 2022 完成 $163 million Series D，估值 $2.6 billion。加上更早轮次，截至
              2026，Sword 私募资本累计融资超过 $300 million。Sword 不公开披露年收入，但市场来源估计其年收入在 $100–200 million 区间。2025 Kaia Health
              收购——Sword 从其 Series B 投资方手中收购——带来用于动作评估的 AI 计算机视觉 技术，与 Hinge Health TrueMotion AI 直接竞争。Sword 的临床验证页面
              记录了同行评议研究，但已发表证据基础小于 Hinge Health 在 S-1 中引用的 14+ 临床研究。

              Omada Health 在 2025 推出 MSK 项目，代表其从糖尿病和高血压数字疗法 基地的战略扩张。宣布 MSK 扩张前，Omada 2024 收入约 $83
              million，并已通过慢病业务与大型健康计划签有分销协议，提供交叉销售现成渠道。不同于 Hinge Health 以运动治疗和可穿戴设备为中心的 PMPM 模式，Omada 的 MSK 项目
              预计更强调行为改变和护理协调，对硬件依赖更低。DarioHealth 的组合 MSK 和慢病平台年收入约 $50 million，目标是可能承担不起 Hinge Health 高端定位的中型雇主和健康计划。

              Vori Health 是一家规模较小的数字 MSK 创业公司，聚焦「全人」MSK 护理，把虚拟 PT 与营养和心理健康结合。它瞄准高端雇主分层，但缺少 Hinge Health
              的规模、健康计划分销和设备差异化。传统物理治疗（线下诊所——ATI、Select Medical、Concentra、独立诊所）仍是占主导的现状替代方案：它拿走美国 $60–70 billion PT
              市场的大部分，但受制于地理可及性、排期瓶颈、共付负担和依从性不稳定。Hinge Health 将自己定位为线下 PT 的成本互补，而不是完全替代。
