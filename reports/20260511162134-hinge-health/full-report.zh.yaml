      - number: '7.4'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的财务风险画像由四个因素塑造：（1）在当前经营亏损下走向盈利的路径，（2）规模化后的毛利压缩向量，（3）收入集中和合同续约风险，以及（4）新上市公司成本负担。

              盈利路径：Hinge Health 报告 FY2025 净亏损约 $88M，并指引 FY2026 经营亏损改善，驱动因素是毛利率扩张（纯软件会员贡献约 85% 毛利率，而含硬件会员约 60%）。公司 IPO
              后现金充足（按上市时约 $32/share 估算，IPO 募资总额 $400–500M，部分用于偿债和交易成本）。按 Q1 2026 现金消耗率约
              $15–20M/quarter（从经营亏损轨迹推断），无需额外稀释的现金续航期为 5–8 年，足以覆盖大多数机构股东的投资期限。不过，如果收入增长因健康险计划合同不续约或竞争替代而显著放缓（例如从 FY2026
              指引的 12–14% 增长降至 <15% YoY），亏损扩大的情景可能压迫现金。

              毛利压缩：硬件软件组合是主要毛利杠杆。Hinge Health 推动会员转向纯软件交付（“Enso-light”
              模式）时，毛利率会扩张；但如果健康险计划为了会员激活要求包含设备的项目（因为纯软件完成率更低），设备经济性会继续压在毛利上。硬件层面的单位经济性未披露；Hinge Health 没有披露 COGS
              在设备成本、履约和软件基础设施之间的拆分。新临床邻接领域（偏头痛、女性盆底健康）的 R&D 投入，将在每个新项目领域压低 EBITDA 利润率 2–4 年。

              公众公司成本负担：IPO 后，Hinge Health 面临 SEC 合规、Sarbanes-Oxley 内部控制、董事会治理要求和 D&O 保险带来的运营费用上升。参考可比数字健康
              IPO（Doximity、Definitive Healthcare、Phreesia），Hinge Health 这一规模公司的公众公司增量年成本（不含股票薪酬）估计为 $15–25M。FY2026
              指引没有单独拆出这项成本，但它嵌在 G&A 中。IPO 后前 18 个月内，任何重述风险或重大缺陷发现，都会特别损害机构可信度。
