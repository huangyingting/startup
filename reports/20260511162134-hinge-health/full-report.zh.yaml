      - number: '4.3'
        title: 资本充足性、现金与资本结构
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的资产负债表相对其经营画像较强。截至 March 31, 2026，公司持有 $407.1 million 现金、现金等价物和可出售证券。FY2025 自由现金流为 $179.6
              million（基于 $588M 收入的 30.5% FCF 利润率），Q1 2026 FCF 为 $41.6 million（22.9% 利润率）。公司没有公开披露的债务、授信额度
              或项目融资义务，不会形成近期流动性风险。在当前经营现金生成能力下，跑道实际上没有期限，因为 FCF 为正且现金余额充足。

              公司 May 2025 IPO 总募资 $437 million（以 $32/share 发行 8.5 million 新股，公司获得 $237 million 新股发行所得；出售股东获得 $200
              million 二级出售所得）。新股发行所得 进入资产负债表，并补充经营现金生成。IPO 后资本配置重点包括 November 2025 授权的 $250 million 股票回购计划；其中 Q4 2025 使用
              $65 million，Q1 2026 使用 $105 million，截至 March 2026 合计 $170 million。回购计划释放管理层对内在价值的信心，并吸收持续 RSU 和期权授予的摊薄影响。

              营运资本动态对 PMPM 订阅业务有利：雇主和健康计划每月支付收入（常为预付或 net-30），Enso 设备库存为活跃成员预先采购（资本开支要求适中），PT 课程成本
              随参与度变动。公司没有硬件制造商典型的重大资本开支要求；Enso 设备由第三方合约制造商 制造。因此资本强度低，随着业务扩张，FCF 转化率（自由现金流占 non-GAAP 经营利润
              比例）应保持较高。主要资本配置风险在于：股价从 IPO 后部分回升至 $32 以上后，$250M 回购计划 是否在当前估值下高效吸收股份。
