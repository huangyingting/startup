  - id: FE001
    title: 平台架构流
    type: flow
    description: 高层系统架构图展示 Hinge Health 五大核心平台组件如何贯穿会员旅程，从注册到结果追踪相互协作。
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE030
    approximationNotes: 架构图为定性，来自公开产品文档和应用商店描述。内部 API 和数据管道拓扑未公开披露。
    data:
      nodes:
        - id: enrollment
          label: 会员注册
          description: 雇主 / 计划合同激活资格；会员通过 Hinge Health 应用注册
        - id: assessment
          label: 临床评估
          description: 数字初诊表 + Robin AI 分诊，为会员分配病种和护理路径（MSK、盆底、跌倒、偏头痛）
        - id: exercise-program
          label: AI 运动项目
          description: TrueMotion 引导的治疗性运动；个性化引擎按进展调整项目
        - id: enso-device
          label: Enso 设备（止痛）
          description: 寄送给符合条件的 MSK 会员；ENS 刺激场次记录在应用中，进入整合护理档案
        - id: health-coach
          label: 健康教练 + 物理治疗师
          description: 人类临床触点处理升级案例；约 ~3% 的训练场次需要 PT 主动监督
        - id: hingeselect
          label: HingeSelect 线下 PT
          description: 为需要线下 PT 的会员提供 4,100 个地点；由应用或临床团队发起转诊
        - id: outcomes
          label: 结果与雇主报告
          description: 在第 2、6、12、26 周追踪 NRS pain、EQ-5D、KOOS / HOOS；向雇主提供季度结果报告
      edges:
        - from: enrollment
          to: assessment
          label: 资格触发
        - from: assessment
          to: exercise-program
          label: Robin AI 路径分配
        - from: assessment
          to: enso-device
          label: MSK / 偏头痛设备资格
        - from: exercise-program
          to: health-coach
          label: 升级触发（高疼痛、进展差）
        - from: health-coach
          to: hingeselect
          label: 复杂病例线下 PT 转诊
        - from: exercise-program
          to: outcomes
          label: 持续症状与依从性追踪
        - from: enso-device
          to: outcomes
          label: 设备场次数据并入结果记录
