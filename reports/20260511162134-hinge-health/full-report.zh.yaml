            title: FDA 对 TrueMotion 的问询造成监管阴影
            body: >
              April 2025，FDA 就 Hinge Health 的 TrueMotion AI 驱动运动追踪技术 的营销和分类发出问询函。TrueMotion 是平台成本效率的核心，已自动化约 97% 的人工治疗师
              工时。如果 TrueMotion 被重新归类为受监管医疗设备，公司可能需要代价高昂的产品修改、营销主张受限，或被迫回到成本更高的人力主导护理模式，从而可能侵蚀支撑其盈利叙事的 85% 毛利率。
