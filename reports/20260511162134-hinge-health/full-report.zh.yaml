      - number: '8.3'
        title: 融资、估值语境与入场纪律
        blocks:
          - type: paragraph
            body: >
              Hinge Health 在 Series D（2021 年 1 月）融资 $300M，在 Series E（2021 年 10 月）融资 $400M，峰值估值 $6.2B，约为当时未来收入的
              12–15x。2025 年 5 月 IPO 定价低于这一峰值（相对 2021 年估值是下轮），TechCrunch 报道首日开盘涨幅为 +17%——这说明即便在 IPO 时，发行价也明显低于市场对内在价值的共识。

              截至 2026 年 5 月，FY2025 实际收入 $588M，FY2026 指引约 $732M；按当前市场价格，隐含 EV 约为 $3.5–4.5B，对应 2026E 收入 5–6x。对一家毛利率 85%、增长
              30%+ 且利润率结构良好的数字健康 SaaS 来说，这一倍数说得过去，但相对 Doximity 的 15–18x 并不诱人。Teladoc 的警示案例（2021–2025 年倍数从 20x 压缩到
              1x）说明，一旦增长放缓或市场叙事转向，下行空间会很大。

              稀释 / 优先权悬顶：公司 IPO 时，大量 VC 持有的优先股结构转换为普通股。存量投资者（Coatue、Tiger Global、Atomico、11.2
              Capital）持仓很大；随着锁定期到期、大宗交易出清，其有序减持会在 2026–2027 年形成技术性悬顶。
            claimRefs: []
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
      - number: '8.4'
        title: 牛市 / 基准 / 熊市场景分析
        blocks:
          - type: paragraph
            body: >
              牛市（25% 概率）：FDA 给出有利结果；Sword/Kaia 整合拖慢企业端扩张；Hinge 切入偏头痛和盆底健康；GLP-1 共病合作带动会员量加速。FY2027E 收入达到 $1.1B，毛利率
              87%；调整后 EBITDA 到 2027 年 H2 转正。市场重估至 2026E 收入 7–9x → EV $5.1–6.6B。

              基准（50% 概率）：FDA 问询作为已披露风险延续到 2027 年，但没有不利裁定；收入增速放缓至 28–35% YoY；毛利率维持在 85–86%；公司在 FY2028 达到 EBITDA
              盈亏平衡。倍数维持在 2026E 收入 5–7x → EV $3.7–5.1B。

              熊市（25% 概率）：FDA 对 TrueMotion 作出不利认定，要求产品重做；前三大付款方中一两家在 IPO 周年节点拒绝续约或重新定价；收入增速降至 20% YoY 以下；倍数压缩至 2026E 收入
              3–4x → EV $2.2–2.9B。

              下行触发因素：（1）FDA 发布不利裁定；（2）任何前三大付款方宣布不续约；（3）季度收入低于一致预期 >10%。
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs: []
          - type: figure
            figureRef: FV002
            claimRefs:
              - CV020
              - CV021
              - CV022
              - CV023
      - number: '8.5'
        title: 可比公司估值分析
        blocks:
          - type: paragraph
            body: >
              可比公司覆盖纯数字健康 SaaS 和 B2B 雇主福利平台。没有完美可比：Doximity 是最接近的利润率参照（医生 SaaS，85%+ GM），但缺少 MSK/临床聚焦；Teladoc
              是远程医疗倍数压缩的反面教材；Accolade 和 Health Catalyst 锚定雇主福利技术的低倍数端。按产品类别看，Omada Health（IPO 前）是最直接的竞争参照，但缺少公开估值数据。

              按 EV/NTM 收入混合可比组，Hinge Health 的 2026E 5–6x 倍数大体匹配同等增速的中档健康 SaaS；它既没有体现质量溢价（Doximity 的
              15–18x），也不是困境倍数（Teladoc 的约 1x）。Hinge 与中档可比公司的关键差异在毛利率（85%，多数可比为 60–70%）和增速（30%+ 对 10–20%）。若经营杠杆推动 EBITDA
              拐点，这两点支持倍数扩张。
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs:
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
      - number: '8.6'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              退出路径：（1）战略收购——大型健康险公司（UnitedHealth、CVS/Aetna、Elevance）或大型科技公司（Amazon Health、Microsoft/Nuance）可能以收入 8–12x
              收购；但 2025 年后，反垄断审查风险上升；（2）随着 EBITDA 拐点兑现，公开市场继续重估；（3）回购计划（授权 $250M，截至 Q1 2026 已执行 $66M）带来股本数量下降的顺风。

              升级至买入前，最关键的尽调问题是：（1）FDA 往来函件，以及内部监管律师对 TrueMotion 510(k) 风险的评估；（2）前三大付款方合同续约状态，以及 IPO
              后首次续约的定价条款；（3）随着出货放量，Enso 硬件 BOM 和供应链成本轨迹如何变化。
            claimRefs: []
          - type: table
            tableRef: TV005
            claimRefs: []
          - type: table
            tableRef: TV006
            claimRefs: []
