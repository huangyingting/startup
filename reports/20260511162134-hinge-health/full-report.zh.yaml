      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >
              多家分析机构对全球数字 MSK 护理市场给出宽区间估计，差异来自市场定义、地理范围和方法。Coherent Market Insights 估计 2026 市场约 $6 billion，以 17.8% CAGR
              增长，到 2033 达到 $18.96 billion。InsightAce Analytics 估计 2025 市场为 $5.19 billion，预计到 2035 达到 $26.87 billion，对应
              18% CAGR。Statista 的数据从更小基线追踪该市场。Grand View Research
              发布了相似轨迹。这些数字在方向上内部一致，但由于定义差异，绝对规模分歧明显——一些分析师纳入相邻慢性疼痛或心理健康市场，另一些则限定在直接 MSK 数字项目。

              Hinge Health 自身 S-1 文件将美国总可服务市场定义为 $27 billion 以上，分解为：自保雇主（$10 billion）、全保商业保险和 Medicare Advantage
              及联邦渠道（$8 billion）、Medicare 和 Medicaid（$9 billion）。这种自下而上的分层比全球数字 MSK 分析师口径更保守，因为它聚焦 Hinge Health
              实际触达的美国雇主和支付方渠道，而不是整个全球数字疗法 TAM。S-1 方法更适合投资判断：它从可通过企业销售渠道触达的覆盖人群数量出发，再套用 PMPM 转化率假设。

              按 Hinge Health 自身 Q1 2026 账单年化规模约 $770 million（LTM）计算，公司对其宣称的 $10 billion 自保雇主 SAM 渗透率约
              3–8%，说明市场仍处在采纳曲线早期。McKinsey 对雇主医疗福利的分析预计，随着福利设计向有 ROI 证明的价值型安排演进，数字点状解决方案将持续增长。Rock Health 2025
              数字健康融资回顾证实，MSK / musculoskeletal 仍是融资最多的数字健康垂直领域之一，验证投资人信心仍在。
