      - number: '1.5'
        title: 展示项
        blocks:
          - type: callout
            title: 品类领导地位与持久竞争护城河
            body: >
              Hinge Health 是数字 MSK 护理中明确的品类领导者，拥有 2,849 家企业客户、覆盖 25 million 合约人群，与五大全国性健康计划全部建立合作，合同覆盖 Fortune 100 公司中的
              53%。专有临床数据（100M+ 累计会员活动次数）、获 FDA 许可的硬件（Enso）、AI 运动追踪（TrueMotion）和经验证的 2.4x ROI
              叠加，形成健康科技存量玩家或纯软件创业公司都难复制的「双墙护城河」。
