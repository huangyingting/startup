      - number: '4.4'
        title: GTM 模式与销售效率代理指标
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的商业化效率，无法完全靠公开指标拆清——获客成本、销售周期长度和 CAC 回收期都未公开。不过，几个代理指标可见。客户数从 2,830（December 2025）增至
              2,849（March 2026），意味着 Q1 2026 净新增 logo 相对缓慢（约 19 个净新增客户）；考虑到企业订阅业务销售周期长、存量收入扩张高，这一节奏符合预期。收入增长主要来自 117%
              NDR——存量客户内部扩张——而不是新增 logo 获取。

              健康险计划分销渠道（收入占比 84%）是雇主触达的放大器：相比逐个雇主直销，健康险计划能把 Hinge Health
              的福利带给其网络内数千个雇主群体，每个雇主对应的增量销售成本更低。这种渠道经济模型大幅降低了健康险计划中介细分市场的 CAC。公司称，美国五大全国性健康险计划以及总计 60+
              个健康险计划合作伙伴都是活跃分销渠道，带来广覆盖，而销售成本不必同比例增加。

              Hinge Health 与新健康险计划建立关系的企业销售周期，初始整合估计为 12–18 个月（合规审计、数据共享、资格文件配置）。直签雇主合同的周期可能为 6–18
              个月，取决于雇主规模和经纪中介参与度。这些长周期符合企业医疗软件基准，也意味着 2026 年签下的新关系，收入主要会在 2027 年及以后确认。对 2026 年指引可靠性的含义偏正面：$798–804M
              的指引区间，大体由现有已入组客户支撑，而不是靠新 logo 转化。
            claimRefs:
              - CI020
              - CI021
              - CI022
              - CI023
      - number: '4.5'
        title: 财务缺口、证据冲突与尽调阻断点
        blocks:
          - type: paragraph
            body: >
              几项关系到投资判断的财务指标仍未公开或披露不足。第一，PMPM 定价：公司从未披露按细分市场（自保雇主 / 健康险计划 / Medicare Advantage）划分的 PMPM 标价或平均合同 PMPM
              费率。行业估算（$15–$50 PMPM）来自市场情报和二级分析，而不是公司一手披露。缺少经确认的 PMPM 定价，投资者无法独立建模每个签约覆盖人群的收入，也无法评估健康险计划谈判带来的定价压力。

              第二，获客成本和回收期：Hinge Health 的 10-K 和 10-Q 文件没有披露
              CAC、按细分市场划分的销售团队规模，也没有披露佣金结构。公司销售与营销费用占收入比例已随时间下降，显示效率在改善；但没有平均合同价值和平均销售周期长度，精确 CAC 回收期无法计算。

              第三，Enso 设备经济性：每台 Enso 设备的制造、运输和支持成本未披露。Enso 与符合条件会员的 PMPM 订阅捆绑，嵌在 PMPM 定价中的设备补贴会影响毛利质量。按当前出货规模，Enso
              到底增厚还是稀释毛利率，是一个实质性尽调问题。

              第四，2025 GAAP 净亏损（约 $546M）和经营亏损，主要由 IPO 相关股票薪酬费用推动。公司 IPO 前（私有实体）的财务报表，与 IPO 后公众公司报表采用不同成本确认基础。投资者必须依赖
              non-GAAP 指标比较 2025 年业绩，2025 GAAP 数据不能代表持续经营表现。Q1 2026 GAAP 经营利润 $32.1M 提供了 IPO 后第一个干净的可比期间，也确认 non-GAAP
              轨迹是真实的，并非拼出来的。不过，即使一次性 IPO 费用退潮，持续 RSU 授予仍会把 SBC 加入 GAAP 费用。
