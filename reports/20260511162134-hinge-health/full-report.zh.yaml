  - id: FV001
    type: flow
    title: 建议逻辑
    description: 从市场地位、证据质量、财务画像、风险叠加和估值背景出发，串成 TRACK 建议的决策链。
    claimRefs:
      - CV001
      - CV007
      - CV008
      - CV014
      - CV020
    approximationNotes: null
    data:
      nodes:
        - id: market
          label: 市场地位
          detail: 占主导的 B2B2C MSK 平台；2,849 家企业客户；25M 签约覆盖人数；覆盖全部 5 大全国性健康险计划
        - id: evidence
          label: 证据质量
          detail: 85% 毛利率；120%+ NRR；临床结果主张来自 1,000+ 篇已发表研究；客户满意度高
        - id: financials
          label: 财务画像
          detail: FY2025 收入 $588M（+51%）；现金 $407M；回购 $250M；EBITDA 为负，但利润率轨迹改善
        - id: risks
          label: 风险叠加
          detail: FDA TrueMotion 调查（未结）；前三大支付方集中度（>50%）；Sword+Kaia 竞争威胁；EBITDA 不盈利
        - id: valuation
          label: 估值背景
          detail: EV 约为 2026E 收入的 5.5x；降轮 IPO；Doximity 溢价为 15–18x；Teladoc 在 ~1x，构成警示
        - id: recommendation
          label: TRACK（有条件 BUY）
          detail: 入场点在 2026E 收入低于 ~4x，或 FDA 问题解决后；中等信心；高风险评级
      edges:
        - source: market
          target: evidence
        - source: evidence
          target: financials
        - source: financials
          target: risks
        - source: risks
          target: valuation
        - source: valuation
          target: recommendation
  - id: FV002
    type: bar
    title: 估值敏感性
    description: 在基准、牛市和熊市情景下，变动 2026E 收入增长假设与 EV/Revenue 倍数所隐含的 EV。
    claimRefs:
      - CV020
      - CV021
      - CV022
      - CV023
    approximationNotes: 收入估算基于 FY2025 实际收入 $588M 和管理层对 FY2026E 的 ~$732M 指引。EV 倍数来自可比公司分析。
    data:
      items:
        - label: 熊市（3x × $730M）
          value: 2.2
          detail: $2.2B EV；FDA 不利裁定、支付方流失、增长 <20%
        - label: 低基准（4x × $732M）
          value: 2.9
          detail: $2.9B EV；严守目标入场价
        - label: 基准（5.5x × $732M）
          value: 4
          detail: $4.0B EV；当前市场定价估算
        - label: 高基准（7x × $732M）
          value: 5.1
          detail: $5.1B EV；FDA 问题解决，30%+ 增长延续
        - label: 牛市（9x × $732M）
          value: 6.6
          detail: $6.6B EV；接近此前 Series E 峰值；需要溢价重估
  - id: FV003
    type: range
    title: 估值 / 回报区间
    description: 围绕 FY2026E 和 FY2027E 收入，在熊市、基准、牛市情景下给出低 / 基准 / 高企业价值估算，并测算以当前 ~$4B EV 入场的隐含回报。
    claimRefs:
      - CV020
      - CV021
      - CV022
      - CV023
      - CV024
    approximationNotes: 基于 FY2025 实际收入（$588M）和 FY2026 指引（~$732M）。FY2027E 假设在 $732M 基础上按基准情景同比增长 30%。EV 估算为近似值；实际市场价格可能不同。
    data:
      items:
        - label: 熊市 EV（2026E）
          low: 2.2
          base: 2.5
          high: 2.9
          unit: $B
          note: 在 $730M 上按 3–4x EV/Rev；FDA 不利裁定或支付方流失情景
        - label: 基准 EV（2026E）
          low: 3.7
          base: 4
          high: 5.1
          unit: $B
          note: 在 $732M 上按 5–7x EV/Rev；无重大不利事件
        - label: 牛市 EV（2026E）
          low: 5.1
          base: 5.8
          high: 6.6
          unit: $B
          note: 7–9x EV/Rev；FDA 问题解决；MSK 市场扩张加速
        - label: 基准 EV（2027E）
          low: 3.8
          base: 4.8
          high: 6.3
          unit: $B
          note: 基准增长轨迹下，2027E 收入 $950M，按 4–6x EV/Rev
  - id: FV004
    type: kpi
    title: 投资 KPI
    description: 截至 May 2026，按八个维度给出 IC 可用评分，评估 Hinge Health 的可投资性。
    claimRefs:
      - CV001
      - CV007
      - CV008
      - CV014
      - CV015
      - CV026
      - CV027
    approximationNotes: null
    data:
      items:
        - label: 市场机会
          value: 4 / 5
          detail: $25–30B 美国 MSK TAM；雇主和健康险计划面临降低成本的结构性压力；Hinge 收入渗透率 ~2%
        - label: 牵引力验证
          value: 5 / 5
          detail: 收入增长 51%；毛利率 85%；2,849 家企业客户；覆盖全部 5 大全国性健康险计划；120%+ NRR
        - label: 竞争护城河
          value: 3 / 5
          detail: 规模和临床数据优势；Sword+Kaia 打造资本充足的挑战者；护城河部分削弱
        - label: 单位经济模型
          value: 4 / 5
          detail: 毛利率 85%；CAC 回收期改善；NRR >120% 驱动高效扩张；EBITDA 未转正
        - label: 监管 / 法律风险
          value: 2 / 5
          detail: FDA TrueMotion SaMD 调查未结；HIPAA SOC2 强；无重大在审诉讼；FDA 风险是二元结果
        - label: 相对同业估值
          value: 3 / 5
          detail: 2026E 收入的 5–6x；相较 Teladoc/Accolade（1–2x）不便宜；不及 Doximity（15–18x）昂贵；估值公允
        - label: 证据质量
          value: 4 / 5
          detail: 公开申报材料扎实（S-1、10-K、10-Q）；IPO 后分析师覆盖增加；关键缺口在 FDA 细节和支付方续约条款
        - label: 退出 / 流动性
          value: 4 / 5
          detail: 已上市交易；$250M 回购；战略买家池（UnitedHealth、CVS、Amazon Health）；锁定期压力是 12 个月逆风
