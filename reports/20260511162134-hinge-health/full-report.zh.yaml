      - - 收入增长低于 20%
        - 任意连续两个季度 YoY 增长 <20%，且管理层未解释
        - 倍数压缩至 <4x；现金跑道担忧加速；回购计划优先级下降
        - 退出或减仓；增长率是主要估值驱动因素
      - - EBITDA 不及预期且指引下调
        - 管理层给出的 FY EBITDA 利润率指引较此前指引低 >500bps
        - 表明经营杠杆论点受损；市场会重估经营风险
        - 复核假设；可能减仓
      - - Sword 从 Hinge 手中赢得 >3 个前 50 大客户
        - Hinge 季报披露客户数停滞，或 Sword 宣布具名赢单
        - 竞争护城河论点走弱；定价压力上升；NRR 风险
        - 负面信号；密切跟踪是否形成模式
    notes: 触发项是尽调监控指标，不是卖出规则。任何组合行动都应结合背景和管理层回应。
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 为何重要
      - 尽调路径
    rows:
      - - FDA TrueMotion 510(k) 风险
        - FDA 往来函件、询问范围、Hinge 已提交回复、监管律师意见
        - 二元风险；决定核心差异化层的产品可行性
        - 通过管理层会议获取（NDA）；复核 10-K 风险因素细节措辞，寻找方向性信号
      - - 前 3 大支付方续约条款
        - 具体续约价格、合同期限、续约时间相对 IPO 锁定期届满的关系
        - IPO 后首个续约周期未经检验；自 IPO 前合同签订以来，支付方议价力可能已变化
        - 下次业绩会投资者问答；向服务这些支付方的福利顾问做渠道核查
      - - Enso 硬件 BOM 与利润率
        - 单位 COGS、保修索赔率、供应链集中度（具体 ODM 伙伴）
        - 硬件收入拖累利润率；理解趋势对毛利率模型至关重要
        - 在管理层会议讨论；复核 10-K 供应商多元化披露
      - - 按客户批次年份拆分的 NRR
        - 按客户年份、渠道（雇主与健康计划）和规模层级分层的总收入留存与净收入留存
        - 汇总 120%+ NRR 可能掩盖市场饱和后老客群恶化
        - 向投资者资料室索取；关注即将发布的 S-11 修订或委托书中的披露
      - - GLP-1 对 MSK 会员参与度的影响
        - 使用 GLP-1 药物的会员与非 GLP-1 客群在 MSK 参与度和结果上是否不同的数据
        - GLP-1 普及正在改变雇主福利优先级；MSK-GLP-1 共病机会与替代风险并存
        - 一手研究：与 Hinge 健康教练讨论，或查阅已发表临床研究
      - - 股本结构 / 内部人出售时间表
        - 锁定期到期日、二级出售计划、IPO 以来内部人交易历史
        - IPO 前持有人分配股份带来的投资者抛压，会对股价形成技术性压力
        - 委托书；EDGAR 上的 Form 4 文件；跟踪 10b5-1 计划启动
    notes: 尽调要求按对估值论点的重要性排序。第 1 和第 2 项是上调至买入的前提。
