      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              May 2025 IPO 前，Hinge Health 通过多轮私募融资累计募资超过 $825 million。公司 2018 Series B 由 Insight Partners 领投。January
              2021 Series D 融资 $300 million，由 Coatue Management 和 Tiger Global Management 领投，投后估值 $3 billion；当时收入在 2020
              翻了两番，客户基数增至 3 倍。标志性的 October 2021 Series E 包括 $400 million 新股融资和 Alkeon Capital、Whale Rock Capital 的 $200
              million 二级投资，总额 $600 million，公司估值 $6.2 billion——这是其私有市场峰值估值。

              May 2025 IPO 总募资 $437 million：其中公司获得约 $237 million 新股发行所得（8.5 million 新股），现有股东出售 5.1 million 股获得约 $200
              million。IPO 定价 $32 per share，位于 $28–$32 区间顶部；股票开盘 $39.25，首日收于 $37.56，较 IPO 价溢价 17%。IPO 后市值约 $3 billion，相比
              2021 私募估值 $6.2 billion 构成显著降估值轮，反映 2021 以来科技和数字健康估值整体收缩。

              IPO 后，最大机构股东是 Insight Partners（约 19% 已发行股份）和 Atomico（约 15%）。Tiger Global、Coatue Management、11.2 Capital 和
              Bessemer Venture Partners 各持股约 8%。公司在 November 2025 授权 $250 million 股票回购计划，显示管理层对内在价值有信心；Q4 2025 回购 $65
              million，Q1 2026 回购 $105 million。截至 March 31, 2026，公司持有 $407 million 现金、现金等价物和可出售证券。
