      - number: '5.3'
        title: Enso 设备：FDA 批准、硬件路线图与临床整合
        blocks:
          - type: paragraph
            body: >
              Enso 设备是 Hinge Health 的专有可穿戴电神经刺激（ENS）设备。当前一代设备（Enso 3）可充电、无线、佩戴在身体上，向受影响身体部位输送经皮电神经刺激（TENS）脉冲。Enso
              app（不同于 Hinge Health 患者应用）控制刺激强度、疗程时长和项目选择。Enso 设备会作为 MSK 护理包的一部分寄给符合条件的项目会员，会员无需直接付费；成本吸收在 PMPM 订阅费中。

              Enso 已获得 FDA 批准，作为 Class II 医疗器械（510(k) clearance）用于肌肉骨骼病症的疼痛缓解。最初的 Enso 设备在 2019 年获批，Enso
              3（当前版本，扩大疼痛区域覆盖并延长电池寿命）在 2023 年获批。设备由第三方合同制造商生产；Hinge Health 不运营自有制造设施，因此资本强度保持较低。设备保修和更换物流由 Hinge Health
              运营团队处理。

              对偏头痛项目，Enso 3 包含头部刺激模式，可向前额输送 TENS 用于偏头痛预防——该能力在 Q3 2024 为偏头痛管理单独获得 FDA 批准。Enso
              平台延伸到偏头痛，是最近一次由硬件驱动的新项目扩展。Enso 与 Hinge Health 移动应用的整合支持同步疗程追踪：会员使用 Enso
              设备时，该疗程会与其运动和症状数据一起记录在应用中，为临床团队形成统一护理记录。硬件和软件的整合是一道可防守的技术护城河：只提供软件 PT 的竞争对手（Sword Health、Omada）不会寄送配套设备，而
              Hinge Health 声称该设备在疼痛调节上临床效果更优。

              Enso 周边的关键技术风险包括：（i）设备供应链依赖单一合同制造商，（ii）从 Enso 3 迁移到任何未来 Enso 4 平台都需要新的 FDA 批准，以及（iii）非处方 TENS
              设备带来的竞争压力——零售价格 $30–100，而 Enso 捆绑成本嵌在 PMPM 定价中。
