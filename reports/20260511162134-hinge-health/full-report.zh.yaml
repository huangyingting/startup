      - number: '7.5'
        title: 缓解措施、监测指标与否决标准
        blocks:
          - type: paragraph
            body: >
              本章识别的每项实质风险，都有对应监测触发器，以及投资论点被实质损害时的阈值（“否决标准”）。以下框架按风险类别组织缓解措施，列出可观察指标、监测节奏和论点破裂阈值。

              FDA / 监管风险缓解：主要监测项是 FDA TrueMotion 询问的状态；如果进入执法阶段，Hinge Health 有义务在季度 SEC
              文件中作为重大法律程序披露。执法行动（警告信、禁令，或带产品暂停要求的强制 510(k) clearance 要求）将构成高严重度论点损害。否决标准是 FDA 不利裁定要求 Hinge Health 在
              clearance 前暂停 TrueMotion 功能，同时健康险计划客户以临床功能下降为由要求重新谈判定价。监测节奏：每季度 10-Q 披露，以及任何有关监管事项的 8-K。

              客户集中否决标准：如果任何代表年收入 >10% 的单一健康险计划客户宣布不续约，或在续约时降价 >30%，相对指引的收入缺口可能达到 5–12%，因为完整影响发生前有 90
              天通知期。否决标准是健康险计划集中失败，同时净收入留存连续两个季度低于 100%，表明首次出现净客户收缩。

              技术 / 竞争否决标准：如果健康险计划渠道中出现一个在规模化下拥有临床等效结果数据，并具备 20%+ 价格优势（按每会员每年计算）的竞争对手，Hinge Health
              的定价权会受到威胁。监测指标是业绩电话中披露的竞争胜负率，以及健康险计划采购决策（通过行业顾问追踪）。否决标准是连续两个季度有机净新增客户数下降（即新增 logo 低于流失），同时披露的 RFP
              流程中竞争胜率低于 50%。

              执行风险缓解：Hinge Health 的 co-CEO 模式（Daniel Perez 和 Gabriel Mecklenburg）形成关键人物依赖；任一联合创始人在 IPO 后 18
              个月内离职，都会是破坏稳定的信号。监测指标是限售期届满前后的内部人出售，以及任何高管接班披露。否决标准是联合创始人离职，同时员工参与度分数恶化，或高级工程领导层出走。
