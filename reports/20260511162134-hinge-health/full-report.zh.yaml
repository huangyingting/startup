      - number: '5.5'
        title: 技术护城河评估与关键缺口
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的技术护城河有三层。第一，专有数据：来自数百万会员、跨 10+ 年的纵向 MSK 运动、疼痛和结果数据，形成新进入者难以复制的数据集，并持续用于重新训练 TrueMotion 和
              Robin 模型。第二，硬件软件整合：Enso 设备形成独特护理包（PT + 疼痛缓解 + AI 指导），没有硬件产品的软件型竞争对手无法提供。第三，监管位置：Enso 的 FDA 批准（Class II
              医疗器械）以及 TrueMotion 既有 SaMD 框架，代表多年时间和大量临床投入才建立起来的监管资本，为硬件功能形成合规护城河。

              关键技术缺口和风险包括：（i）TrueMotion 的计算机视觉准确性尚未在同行评审环境中被独立验证；公司已发表准确性主张依赖内部结果与治疗师评分的姿势评估对比；（ii）Robin
              的临床决策质量尚未接受第三方审计；会员对 AI 介导护理与真人护理的满意度通过 NPS 衡量，但没有用临床结果对比衡量；（iii）GitHub
              组织（github.com/hingehealth）显示公开开源贡献有限，也没有让外部看到 AI 基础设施、模型架构或数据管线工程实践；（iv）公司没有公开披露企业 AI 治理框架（偏差测试、模型漂移监控、AI
              升级失败的临床安全协议）；以及（v）FDA 对 TrueMotion 设备分类的询问带来监管不确定性，可能要求平台做架构调整。

              从开发者信号看，Hinge Health 的 GitHub 公开仓库有限，无法提供具体技术栈、开源投入或 AI 研究发表活动的信号。iOS App Store 列表显示应用持续每周更新（最近一次更新见 Q1
              2026 发布说明），说明产品开发周期活跃。公司的工程博客和技术发表稀少，限制了外部对 AI 平台架构复杂度的评估。考虑到竞争强度（Sword Health、Omada），没有公开 AI
              模型性能基准是尽调缺口，而不是结构性弱点。
