      - number: '4.2'
        title: 单位经济、毛利率与成本结构
        blocks:
          - type: paragraph
            body: >
              Hinge Health 毛利率持续提升，Q1 2026 达到 85%，位列医疗软件最高水平。FY2025 GAAP 毛利率为 80%（non-GAAP 83%），高于 FY2024 的 77% GAAP 和
              78% non-GAAP。毛利率扩张来自公司声称的 AI 自动化（TrueMotion、Robin AI 助手）：人类临床治疗师工时已减少
              97%，成员规模扩大时，临床服务交付成本大幅下降。随着硬件供应关系下制造量提升，Enso 设备销货成本也下降，不过设备成本未单独披露。

              运营费用包括研发（AI 和产品开发）、销售与营销（企业直销和健康计划渠道销售）以及一般与行政。公司 2025 GAAP 经营亏损为 $546.4 million，几乎完全由 May 2025 IPO
              相关一次性股权激励费用 驱动（RSU 归属和期权行权）；2025 non-GAAP 经营利润为 $119.5 million，对应 20.3% non-GAAP 经营利润率。Q1 2026 GAAP 经营利润为
              $32.1 million（17.6% GAAP 利润率），non-GAAP 经营利润为 $46.2 million（25.4% non-GAAP 利润率）。公司 Rule of 40 得分（收入增长率 +
              non-GAAP FCF 利润率）在 FY2025 为 81，远高于高质量 SaaS 企业的 40-point 基准。

              未公开披露的关键私有指标包括：按合同类型划分的确切 PMPM 定价（雇主 vs. 健康计划 vs. Medicare Advantage）、客户获取成本（CAC）、销售效率（CAC
              回收期）、按临床项目划分的护理成本拆分，以及 Enso 设备毛利率。公司提供年度转化率（2025 为 3.9%，2026 趋势高于 4%）作为参与深度代理指标，但未给出完整单位经济，包括全负荷 PMPM
              成本或单成员盈利能力分析。单成员经济可部分推断：以 ~$588M 收入和 ~783K 活跃成员（Dec 2025）计算，隐含每名活跃成员平均收入约 $750/year 或 $63/month，但其中混合了不同
              PMPM 费率和合同结构。
