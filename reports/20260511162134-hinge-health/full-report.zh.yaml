  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场范围与边界
        blocks:
          - type: paragraph
            body: >
              数字肌肉骨骼（MSK）护理市场涵盖软件驱动平台，通过远程或混合模式交付物理治疗、疼痛管理、康复和预防性 MSK 项目——不同于传统线下物理治疗（美国 $60–70 billion 市场）、MSK
              手术和药物疼痛管理。核心产品类别包括：（1）面向雇主的虚拟物理治疗和运动治疗应用；（2）集成可穿戴设备的远程监测和止痛设备；（3）连接患者与服务方的护理协调平台；（4）替代或延伸线下 PT 就诊的 AI
              增强临床路径。

              Hinge Health 主要竞争于第（1）和（2）类；HingeConnect 覆盖第（3）类，AI 助手 Robin 覆盖第（4）类。可服务市场定义排除零售端销售的 DTC 疼痛应用、没有临床路径的雇主健康
              应用，以及未做数字化增强的传统 PT 诊所。相邻市场包括职业健康、行为健康（与慢性疼痛交叉）、女性盆底健康（Hinge 2022 进入）、跌倒预防（2023）和偏头痛护理（2026）——每一项都是扩张向量。

              现状替代方案是线下物理治疗叠加处方止痛药，但在可及性（平均等待 3–4 周）、成本（无保险 PT 单次 $75–$150）、依从性（处方 12 次平均完成 7 次），以及常可避免却仍发生的 MSK
              手术支出上都失效。数字 MSK 护理必须以更低总体护理成本证明临床结果相当或更优，才能支撑 PMPM 订阅模式。本章审阅的证据支持其临床逻辑，同时也呈现第三方对数字 MSK 证据强度的怀疑性评估。
