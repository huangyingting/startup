      - number: '8.2'
        title: 建议、信心与风险评级
        blocks:
          - type: paragraph
            body: >
              建议：跟踪（有条件买入）。当前 EV/2026E 收入约 5.5x，监管风险未解、付款方集中度仍高，不算特别便宜的入场点。若满足两点，我们会把评级上调至买入：（a）FDA 对 TrueMotion
              问询给出有利结论（或公司取得 510(k)）；（b）股价交易在未来收入 4x 或以下。信心：中。风险评级：高。

              公司轨迹——FY2025 收入增长 51%、毛利率 85%、现金 $407M、授权回购 $250M——支持 Hinge Health 结构稳健这一判断。不过，FDA
              若给出负面裁定，概率无法精确加权，却可能明显损害内在价值。因此，在投入完整仓位之前，我们更倾向等待带安全边际的入场点。
