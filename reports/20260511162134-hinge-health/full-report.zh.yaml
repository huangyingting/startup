      - number: '1.2'
        title: 创始人、领导团队与治理
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的领导团队把深厚临床能力、企业软件和医疗运营经验放在一起。Daniel Perez（联合创始人兼 CEO）拥有 Westminster University 的 B.S.
              生物学学位，曾就读 University of Oxford 的生物化学 PhD 项目，并在那里结识 Gabriel Mecklenburg。Perez 自创立以来一直领导公司，IPO 后持股约
              18.9%。Gabriel Mecklenburg（联合创始人兼执行董事长）拥有 University of Cambridge 的 M.Sc. 材料科学学位和 Imperial College London 的
              M.Phil. 生物工程学位。Mecklenburg 曾任 COO，仍持有约 8.2% 股份。

              James Budge 于 March 2023 加入担任首席财务官（CFO），曾在 Automation Anywhere、Pluralsight、Anaplan 和 Genesys Cloud
              Services 任职。Jim Pursley 担任总裁，2021 加入；此前他是 Livongo Health 的首席商务官，带来深厚企业医疗销售经验。Lex Annison 担任首席运营官，来自
              Google，曾任 Global Director of Strategy and Operations。Dr. Jeffrey Krauss 于 2018 加入担任首席医疗官，拥有 Physical
              Medicine and Rehabilitation（PM&R）和 Lifestyle Medicine 的专科认证资质，并与 Stanford 和 VA Palo Alto 有关联。

              董事会在 March 2026 扩容，任命 Freshworks Inc. CFO and COO Tyler Sloat；他拥有多年扩张上市 SaaS 公司的经验。Hinge Health
              的治理结构包括创始人主导的上市科技公司常见的双层股权结构，创始人保留有意义的投票影响力。Perez 是公司公开形象、主要股东，也是长期战略和文化架构师，因此关键人依赖是重大风险。若 Perez
              离开，投资者和客户很可能负面解读。
