        - 投资论点受损 — 需要加速投入临床研究；可能压缩利润率并拉长盈利时间线
      - - 联合创始人或关键人物离职风险
        - 锁定期后 SEC Form 4 内部人出售超过持股 15%；Form 8-K 披露高管离职
