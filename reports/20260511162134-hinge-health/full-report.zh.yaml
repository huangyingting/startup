      - number: '6.3'
        title: 具名客户背书与生产部署证据
        blocks:
          - type: paragraph
            body: >
              Hinge Health 已发布多个具名客户案例研究，提供了具体部署证据。Boeing 案例研究（航空航天制造，自保雇主）记录了向 Boeing 美国员工群体部署的情况，结果包括公司声称的医疗支出三位数
              ROI（避免手术、减少 PT 就诊）。Hinge Health 引用的具体 ROI 指标由公司发布，未被独立审计；不过，Boeing 部署本身是已确认的生产规模参考。考虑到 Boeing 在美国约 150,000
              名员工，其自保员工医疗支出规模可观——但 Hinge Health 项目在该人群中的规模未披露。

              City of Los Angeles 案例研究（市政府，自保公共雇员计划）记录了向城市工作人员部署的情况，结果包括通过 NRS 和 EQ-5D 工具报告的疼痛减轻和身体功能改善。City of LA 部署证明
              Hinge Health 进入了公共部门雇主计划；这类计划相比私营部门雇主，通常有不同采购流程（基于 RFP、工会谈判）。公共部门部署说明项目质量能经受政治和工会审视。

              Amazon Health Services 整合（2025 年宣布）代表一种新型客户背书：通过 Amazon 的雇主健康福利基础设施，分销给 Amazon 约 1.5 million
              名美国员工。这不是直接雇主合同——它通过 Amazon Health Services 作为健康福利提供方流转——而 Amazon 渠道带来的 Hinge Health
              实际活跃会员数未披露。战略意义很高：Amazon 的品牌光环和分销规模，使其成为数字健康领域最显眼的雇主背书之一。

              合并来看，公司的客户背书由高质量具名雇主参考（Boeing、City of LA、Amazon 渠道）、强劲汇总结果统计（疼痛减少 68%、手术避免 58%）以及强 NPS（约 70）构成，这让 Hinge
              Health 位列评分最高的企业健康福利供应商之一。NPS 数字（Fierce Healthcare 披露为 2024
              年数据）对雇主采购方是有意义的质量信号，但它在活跃会员中测量，而不是在更广泛的签约覆盖人群中测量。
