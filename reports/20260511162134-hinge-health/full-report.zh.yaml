      - number: '6.2'
        title: 采用轨迹与活跃会员增长
        blocks:
          - type: paragraph
            body: >
              衡量 Hinge Health 采用情况，最好看三个相互关联的指标：签约覆盖人数（企业合同覆盖的总人数）、活跃会员（任一期间在平台上有实质参与的会员）和年度转化率（活跃会员 / 签约覆盖人数）。这三个指标在
              2025 年到 Q1 2026 都保持正向轨迹。

              截至 December 2025，签约覆盖人数增至约 25 million（据 FY2025 年度披露），高于 December 2024 的约 20
              million。这一增长既来自新增健康险计划合同，也来自现有计划覆盖范围扩大到健康险计划网络内更多雇主群体。活跃会员——签约覆盖人数中可变现的子集——截至 December 2025 达到约 783,000，对应
              FY2025 年度转化率 3.9%。转化率较 FY2024 的约 3.7% 小幅改善，说明 Hinge Health 在会员激活上有进展，但空白仍巨大：96.1% 的签约覆盖人数从未与平台互动。

              客户数稳步增长：从 December 2023 的约 2,600，增至 December 2025 的 2,830，再到 March 2026 的 2,849。Q1 2026 净新增客户只有 19
              个账户，说明企业销售管线有选择性，聚焦高价值 logo，而不是追求数量。主要增长驱动来自现有客户内部扩张（117% NDR），不是净新增
              logo。这与健康险计划分销模型一致：现有健康险计划合同内的新雇主群体会自动覆盖，不需要逐个雇主单独销售。

              按每名活跃会员平均运动课程数衡量的会员参与深度，尚未公开披露。公司确实报告结果（疼痛减轻、手术避免），但没有提供每名会员平均课程数、首次课程后的流失率，或完整 12 周项目的完成率。这些指标对于判断 3.9%
              转化率代表深度参与会员，还是浅层一次性用户，至关重要——这是一个开放尽调缺口。
