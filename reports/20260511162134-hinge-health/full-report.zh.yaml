  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Hinge Health 处在数字健康软件和医疗器械交叉点，形成多层监管敞口，也是公司面临的最实质风险之一。FDA 数字健康监管框架自 2019 年以来快速演进，而 Hinge Health 的
              TrueMotion 动作分析算法——驱动其 MSK 运动项目的传感器动作追踪引擎——位于模糊监管地带。February 2025，FDA 向 Hinge Health 发出正式询问信，询问 TrueMotion
              是否需要作为医疗器械软件（SaMD）取得 510(k) clearance。公司在 2025 年提交的 S-1 注册声明中披露了这一询问。截至 Q1 2026，FDA 询问仍未关闭；尚未采取执法行动，也未提交
              clearance 申请。

              监管风险有两个维度：概率和严重性。FDA 认定 TrueMotion 不需要 510(k) clearance 的概率不低——FDA 的 pre-certification program 以及面向较低风险
              SaMD 的 DSCSA framework，为避免完整 clearance 提供了路径。不过，如果 FDA 认定需要 clearance，Hinge Health 必须为 TrueMotion 申请
              510(k) clearance，并可能需要在获批前修改或移除算法动作评估功能。Class II 医疗器械的 clearance 周期通常为提交后 150–300 天；不利 FDA
              认定叠加产品修改要求，可能扰乱会员体验，并触发基于当前功能采购产品的健康险计划客户重新谈判合同。

              除 FDA 询问外，Hinge Health 在三个领域面临法律敞口：（1）过往营销材料中的结果主张可能未达到临床证明的证据标准，从而引发集体诉讼风险；（2）如果竞争对手围绕 TrueMotion
              算法或可穿戴传感器整合提出专利主张，会产生 IP 敞口；以及（3）州和联邦隐私法合规，尤其是 California 的 CCPA 以及正在形成的各州隐私法拼图。Hinge Health
              从会员处收集详细生物识别和健康数据；任何泄露或不当使用，都可能触发集体诉讼、FTC 执法和州检察长程序。

              Hinge Health 的隐私政策和服务条款（截至 2026 年生效）限定了会员数据用途，并为受覆盖的健康险计划客户纳入明确的 HIPAA Business Associate Agreement
              条款。条款禁止把数据变现给第三方广告商。不过，公司不发布透明度报告或事件日志，公开信息中也没有过往数据事件。Courtlistener.com
              检索显示，案卷中有一个与数字健康隐私诉讼先例相关的案件（Accellion 数据泄露案），但并非针对 Hinge Health；这表明公司尚未成为联邦法院隐私诉讼中的具名被告。
