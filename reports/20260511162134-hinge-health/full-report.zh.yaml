      - number: '6.4'
        title: 留存、NRR 与客户耐久性
        blocks:
          - type: paragraph
            body: >
              Hinge Health 报告最近一次披露的客户留存率为 97–98%，截至 December 2024 的净美元留存（NDR）为
              117%。这些是企业数字健康细分中最强的留存指标之一，可与一流企业软件公司相比。97–98% 留存率背后的机制有两点：健康险计划很少在合同周期中途终止供应商关系（典型合同 12–36
              个月），同时，对健康险计划以及计划内雇主群体而言，把会员迁移到竞争 MSK 平台的成本和扰动都很高。

              117% NDR 主要由现有客户关系内的三种扩张机制驱动：（1）转化率提升——随着雇主健康促进项目推广 Hinge Health 入组，更多签约覆盖人群成为活跃会员；（2）项目扩张——现有客户在核心 MSK
              项目之上增加盆底健康、跌倒预防或偏头痛项目；以及（3）签约覆盖人数增长——健康险计划网络内雇主群体增加员工，或健康险计划扩大其覆盖雇主基础，都会以相同 PMPM 费率把更多人数加入 Hinge Health
              合同。

              97–98% 的客户留存意味着毛收入留存（GRR）大致等于留存率（97–98%），NDR 高出 17 个百分点则由扩张驱动。这一结构确认，Hinge Health
              的增长策略主要是在锁定客户基础内做扩张，而不是依赖新 logo
              获取引擎。对长期收入可见性的含义偏正面：考虑到切换成本高（会员数据迁移、临床连续性风险、采购复杂度），只要客户熬过第一个续约周期，除非竞争对手以更低成本提供显著更优结果，否则不太可能流失。

              一个重要缺口：117% NDR 最后一次披露截至 December 2024，在 Q3 2025、Q4 2025 或 Q1 2026 业绩材料中没有更新。Q1 2026 账单额同比增长 52%，暗示 NDR
              维持或改善，但缺少最新披露的 NDR 指标，仍是小幅尽调担忧。公司也没有把 GRR 与 NDR 分开披露；这本可帮助区分留存指标中由流失驱动的逆风和由扩张带来的顺风。
