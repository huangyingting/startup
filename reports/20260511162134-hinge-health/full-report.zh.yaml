      - number: '1.4'
        title: 公司里程碑
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的历史横跨十年产品创新、临床验证、商业扩张和公司治理演进。从 2014 创立到 2025 IPO，公司从一家英国小型创业公司成长为数字 MSK 护理的上市品类领导者。关键拐点包括
              2021 两轮融资为快速扩张提供资本、收购 Enso 可穿戴设备、推出多个临床项目，以及 2025 IPO。公司轨迹由持续收入增长标记，IPO 后增速加快：收入从 2023 的 $293 million 增至
              2024 的 $390 million，再到 2025 的 $588 million；2026 指引中点约 $801 million。

              重要产品里程碑包括 March 2021 收购 Enso 这款获 FDA 许可的电神经刺激设备，April 2022 推出女性盆底健康项目，2023 推出跌倒预防项目，2024 推出 HingeSelect
              线下服务方网络和 Global/International MSK 项目，以及 May 2026 推出偏头痛护理项目，使用获 FDA 510(k) 许可的 Enso 神经调节 技术。合作里程碑包括与 Amazon
              Health Services（December 2024）、Cigna Healthcare（April 2025）的协议，以及接入美国五大全国性健康计划。April 2025 FDA 对 TrueMotion
              技术 的问询，是一个重要监管检查点，目前仍有部分未解决。
