      - number: '3.3'
        title: 能力对比、定价与 GTM 分析
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的核心技术差异化来自 Enso 这款获 FDA 许可的电神经刺激设备和 TrueMotion AI 运动追踪技术。Enso 通过经皮电神经刺激（TENS）提供无药物止痛；FDA
              510(k) 许可给 Hinge 带来纯软件竞争者缺乏的监管护城河。TrueMotion 使用基于智能手机摄像头的 3D 动作分析，评估运动姿态并指导治疗性动作，无需专用传感器——从而以高吞吐、低边际成本交付
              PT 级动作反馈。截至 2026，没有直接竞争者提供获 FDA 许可设备硬件 + AI 动作指导的同等组合。

              在健康计划分销上，Hinge Health 接入五大全国性健康计划（Aetna、Elevance/Anthem、HCSC、Cigna、United Health Group）和 60+
              健康计划合作伙伴，是最决定性的商业护城河。Sword Health 和 Omada Health 也有健康计划关系，但规模和深度更小。对自保雇主而言，Hinge 拥有 2,849 家客户，其中多数是
              Fortune 100 和 500 公司；这个已安装客户基础通过理赔集成、数据分析和多年期合同结构形成切换成本。

              竞争对手之间的数字 MSK 护理定价没有公开披露。Hinge Health 向雇主或健康计划收取 PMPM 费用；行业来源估计 PMPM 费率在 $15–$50
              区间，取决于项目设计、合同规模和设备集成水平。Sword Health 和 Omada Health 被认为采用类似 PMPM 结构。DarioHealth 据称以更低 PMPM
              定价服务中端雇主。实际定价会因合同谈判大幅变化，标价 不能可靠代表实现 PMPM 费率。缺乏公开定价披露，是限制独立定价比较的缺口。

              从 GTM 看，Hinge Health 84% 的健康计划渠道收入，使其成为市场上分销杠杆最高的玩家，本质上把健康计划计费关系用作面向雇主销售的 飞轮。这与 Sword 过去更直接面向雇主的 GTM
              在结构上不同。健康计划渠道是 Omada Health 的历史强项，其进入 MSK 项目很可能沿用这些关系。
