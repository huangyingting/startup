  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 按买方和用例划分的客户分层
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的客户基础分为两个主要买方细分：自保雇主（企业直销）和健康险计划（面向其网络内雇主群体的分销渠道）。截至 Q1 2026，公司服务 2,849
              个唯一客户账户。近似收入拆分为健康险计划分销 84%、直签自保雇主合同 16%——反映出自 2021 年以来，公司战略上转向以健康险计划伙伴作为主要商业化渠道。

              在雇主细分内，Hinge Health 主要瞄准拥有 500+ 名员工的大型自保雇主，尤其是 Fortune 500 公司以及州 / 市政府。已确认的具名雇主客户包括 Boeing（航空航天制造，2021
              案例研究确认）、City of Los Angeles（市政府，2024 案例研究确认）和 Amazon（通过 2025 年宣布的 Amazon Health Services 整合）。公司披露服务
              Fortune 500 中 50 家，等于对 Fortune 500 基础的 10% 渗透——这是企业触达力的可信陈述。雇主客户横跨制造、科技、零售、医疗系统和政府等行业。

              在健康险计划细分内，已确认的全国性健康险计划分销伙伴包括 HCSC（Blue Cross Blue Shield of Illinois 及其关联方，收入约 16%）、Elevance
              Health/Anthem（收入约 13%）和 Aetna/CVS Health（收入约 10%）。S-1 披露显示，这三家合计约占公司总收入 39%。公司也通过 Cigna、UnitedHealth
              Group（UHC/Optum）以及 60+ 个区域健康险计划分销。Medicare Advantage 渠道正在增长，但具体 MA 客户名称和收入贡献尚未公开披露。

              第三类买方是医院系统和整合交付网络（IDNs），不过 Hinge Health 的投资者披露并未单独突出这一细分。媒体曾讨论 Kaiser Permanente
              作为潜在合作伙伴，但没有已确认的企业合同记录。HingeSelect 线下 PT 网络（4,100 个地点）需要接近 IDN 的提供方关系，但不意味着存在 IDN 企业合同。

              Hinge Health 的地理覆盖是全国性（聚焦美国）。公司服务覆盖全部 50 个州的雇主和健康险计划。国际扩张目前未披露为业务优先事项；S-1 和业绩材料中没有非美国收入组成或扩张计划。
