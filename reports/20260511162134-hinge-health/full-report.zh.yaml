      - number: '5.2'
        title: TrueMotion AI、Robin 与 AI 驱动的临床交付
        blocks:
          - type: paragraph
            body: >
              Hinge Health 产品策略的核心技术差异化，是 AI 驱动的临床自动化。平台由两个不同 AI 系统支撑：TrueMotion 和 Robin。TrueMotion
              是计算机视觉和动作感知系统，使用移动设备摄像头以及加速度计 / 陀螺仪传感器，追踪患者在治疗性运动中的身体位置。TrueMotion
              提供实时姿势指导（运动过程中的音频和视觉提示）、次数计数、关节活动度测量，以及课后动作质量反馈。公司称，TrueMotion 目前可在没有真人物理治疗师主动监督的情况下，指导约 97% 的运动课程；2019
              年基线则是多数课程需要真人 PT 签到检查。这个比例是毛利率扩张论点的核心：用 AI 指导课程替代 PT 工时，可在规模化时大幅降低临床交付成本。不过，97% 这一数字尚未被独立验证，而且该说法对「主动 PT
              监督」的定义，可能排除了治疗师在每次课程后进行的异步复核。

              Robin 是 Hinge Health 的 AI 临床护理导航员，于 2024 年推出，并在 2025 年扩展。Robin
              处理临床分诊（把会员路由到合适护理层级——虚拟或线下）、自动签到消息、症状升级提醒和教育内容投放。Robin 的设计目标，是把常规临床沟通规模化处理，从而减轻真人健康教练和物理治疗师的负担。公司的 GPT-4 级
              AI 模型在临床 MSK 数据集上微调，并与平台内会员的纵向健康记录集成。Robin 互动由真人临床人员监控以保证质量，但公司没有披露受监督互动与无监督互动的比例。

              TrueMotion 面临一个关键监管风险：FDA 的 Digital Health Center of Excellence（DHCoE）在 August 2025 向 Hinge Health
              发出询问信，提出 TrueMotion 可能需要被归类为 Class II 医疗器械（de novo pathway），这将要求在当前 SaMD 框架之外完成临床验证研究，并取得 510(k) clearance
              或 PMA approval。公司已在 SEC 文件中披露该询问，并正就重新分类问题与 FDA 沟通。TrueMotion
              若被重新分类，不一定需要从市场撤下产品，但会增加监管负担，并可能延迟功能更新。结果仍不确定，并构成实质性技术风险。
