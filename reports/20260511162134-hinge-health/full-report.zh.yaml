  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Hinge Health 所处竞争市场横跨直接数字 MSK 同业、向 MSK 扩张的相邻慢病平台、传统物理治疗存量玩家，以及 自建替代方案。竞争格局可分为五类：（1）直接数字 MSK 护理平台（Sword
              Health、Kaia Health——现已被 Sword 收购、Vori Health、RecoveryOne、Joint Academy、Limber Health、IncludeHealth）；（2）增加
              MSK 的相邻慢病护理平台（Omada Health、DarioHealth、Novu Health）；（3）传统线下物理治疗（ATI Physical Therapy、Select Medical、个人 PT
              诊所，代表美国 $60–70B 市场）；（4）雇主 / 健康计划自建或优选服务方组织；（5）数字 MSK 护理试图替代的药物和手术方案。

              Sword Health 是 Hinge Health 最可比的直接竞争对手。Sword 于 2020 在美国成立（源起 Portugal），已募集大量 风险资本，并在 2022 Series D 后取得估计约
              $3 billion 私募估值。2025，Sword 收购 Kaia Health——一家总部在 Munich 的 AI 动作指导创业公司，此前被视为单独的数字 MSK
              竞争者——扩展能力组合和欧洲存在。Sword 采用类似 PMPM 雇主模式，但过去缺乏 Hinge Health 在健康计划分销上的深度。Kaia Health 曾获 Munich Re
              和其他欧洲机构投资者支持，其基于 AI 的运动追踪产品 与 Hinge Health 的 TrueMotion 技术直接竞争。此次收购显示 Sword 有意加速。

              Omada Health 走了另一条路：它 2024 以慢病管理（糖尿病和高血压）为核心上市，随后在 2025 宣布推出 MSK 护理 项目，直接进入 Hinge Health 核心市场。Omada
              用十年慢病管理业务搭建的健康计划和雇主分销网络，为其交叉销售 MSK 服务提供现成渠道；因此它是可信的相邻进入者，而不是纯粹数字 MSK 新玩家。DarioHealth 是规模较小的上市公司，提供数字 MSK
              与慢性病管理组合平台，年收入约 $50 million，分销足迹比 Hinge 或 Sword 都更有限。
