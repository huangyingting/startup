      - number: '7.2'
        title: 运营与网络安全风险
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的运营风险画像由三类因素塑造：（1）云基础设施集中，（2）网络安全和 PHI 保护，以及（3）硬件供应链和设备可靠性。三者都是残余风险，已有部分缓解，但没有消除。

              云基础设施：Hinge Health 的后端基础设施完全依赖 Amazon Web Services（AWS），包括 AI/ML 模型推理管线、会员数据存储、实时传感器数据处理和 API 服务。公司未在 S-1
              或 Q1 2026 10-Q 中披露多云部署或 active-active 故障转移架构。AWS 区域故障（例如 us-east-1 持续中断）会让会员端应用离线。实际缓解因素是，AWS 对核心服务提供
              99.99% uptime SLAs，而 Hinge Health 的 B2B
              合同模型（健康险计划和雇主，而非直接消费者）意味着，工作日业务时段数小时宕机会引发会员投诉，但不太可能立即触发合同终止。典型健康险计划合同中，业务连续性违约的实质性门槛未公开披露。

              网络安全：Hinge Health 为约 783,000 名活跃会员处理受保护健康信息（PHI），并为数量更大的已入组会员处理生物识别动作数据。公司在健康险计划合同下是 HIPAA 覆盖实体。这种规模的 PHI
              泄露（>500 条记录）会触发 HIPAA Breach Notification Rule 下的强制 HHS 通知和公开泄露披露。Hinge Health 已取得 SOC 2 Type II 认证（S-1
              和公司网站披露），说明安全控制通过第三方审计。不过，SOC 2 认证不保证防止泄露；它认证的是流程成熟度。数字健康行业在 2023–2025 年经历了多起高曝光 PHI 泄露（Accellion、Change
              Healthcare），而 Hinge Health 集中持有敏感生物识别和近似心理健康的数据，使其成为高价值目标。

              硬件供应链：Enso 无线 TENS 设备以及 Hinge Health
              运动项目使用的可穿戴动作传感器套件，依赖未公开具名的硬件供应商。固件缺陷、硬件召回或供应中断，都可能影响会员体验，并要求以高成本现场更换。Enso 设备作为 Class II 医疗器械（510(k)）拥有 FDA
              批准；任何上市后安全问题都可能触发强制 FDA 召回流程。以规模化方式运输、更换和管理退回硬件（700,000+ 活跃会员）的运营足迹，构成物流负担；公开披露中看不到流程效率或每次退货成本。
