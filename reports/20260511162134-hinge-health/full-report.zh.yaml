  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与反论点
        blocks:
          - type: paragraph
            body: >
              Hinge Health 已在美国雇主和商业健康计划渠道，搭起领先的数字 MSK 护理平台。投资逻辑有三根支柱：（1）自保雇主和健康计划承受结构性降本压力，MSK 可触达成本池为 $25–30B；（2）产品架构把
              AI 动作分析（TrueMotion）、可穿戴硬件（Enso）和持照 PT 监督拼在一起，支撑临床上站得住脚的结果主张；（3）2,849 份企业合同和 25M
              签约覆盖人群形成飞轮，推高切换成本，并把净收入留存率维持在 120% 以上。

              反方逻辑同样具体：Hinge Health 的 TrueMotion 尚未通过 510(k)；若 FDA 作出不利认定，公司需要修改产品或取得监管许可（150–300+
              天），健康计划合同也会面临重新谈判风险。付款方集中让公司暴露在前三大付款方重新定价之下。85% 毛利率很突出，但公司 EBITDA 仍未转正，需要靠收入继续增长来供给 G&A 和 R&D。Sword Health
              在 2024 年底收购 Kaia Health 后，企业市场的竞争威胁已明显升级。
