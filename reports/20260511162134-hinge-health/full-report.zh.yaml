      - number: '7.3'
        title: 伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Hinge Health 的分销模型形成结构性伙伴依赖，并在规模化时放大执行风险。健康险计划渠道——估计占签约覆盖人数的 60–65%——形成双边依赖：Hinge Health
              需要健康险计划续约来维持收入，而健康险计划需要 Hinge Health 的会员参与质量，来向雇主客户证明数字 MSK 福利项目合理。

              支付方集中：前三大健康险计划客户（HCSC、Elevance、Aetna）估计约占 FY2026 年化收入 39%（基于 S-1 中集中度披露并结合收入指引）。HCSC 一家（估计 FY2026 约
              $128M）就是单一交易对手敞口，约等于总收入 16%。失败场景是健康险计划合同不续约：HCSC 采用多年期企业合同并设年度续约窗口；如果 HCSC
              减少覆盖雇主群体或向下重新谈判定价，收入影响会立即出现，并且考虑到健康险计划销售周期（12–18 个月），在 12 个月内很难替代。FY2026 NDR 为 117% 说明现有计划客户在扩张，而不是收缩——但
              NDR 指标是混合值，不能把计划层面的流失与计划内雇主扩张拆开。

              平台依赖（Apple/Google）：Hinge Health 的会员体验通过原生 iOS 和 Android 应用交付。Apple App Store 或 Google Play Store
              政策变化——包括支付处理规则、健康数据收集限制或特定类别审核要求——可能要求应用更新或功能修改，而时间表由平台方控制，不由 Hinge Health 控制。Apple 针对健康应用的 App Store
              Review Guidelines 在 2023–2025 年收紧。实际风险是，如果 Apple 强制要求用户对生物识别数据收集（例如动作传感器数据）选择加入，若相当比例用户拒绝，会员激活率可能下降。

              第三方临床验证依赖：Hinge Health 的市场位置建立在同行评审期刊发表的临床结果主张以及内部结果研究之上。公司临床证据团队与学术医疗中心合作开展研究（S-1 披露）。如果未来针对数字 MSK
              护理工具的荟萃分析发现，Hinge Health 的结果改善在 RCT 环境中并不显著优于常规护理，可能削弱其用来支撑健康险计划合同定价的临床价值主张。Healio 在 2023 年报道，临床审查者认为数字
              MSK 工具证据只有中等强度，并呼吁更严格的 RCT 数据——这一风险仍未关闭。
