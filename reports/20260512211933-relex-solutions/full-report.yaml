      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >-
              RELEX was co-founded by three Finnish supply chain scientists: Mikko Kärkkäinen (Group CEO), Johanna
              Småros (Chief Sustainability Officer and Co-founder), and Michael Falck (Co-founder). All three were
              researchers at the Helsinki University of Technology (now Aalto University) whose doctoral and
              post-doctoral work focused on reducing waste and inefficiency in retail supply chains. Their academic
              frustration with food waste and overstock motivated a commercial software venture aimed at making the
              consumer goods value chain more efficient. Mikko Kärkkäinen, as Group CEO, leads overall strategy and
              external relationships; Johanna Småros champions RELEX's sustainability mission and publicly represents
              the company's environmental impact achievements, such as helping customers prevent 350 million kg of food
              waste in 2024. Michael Falck is the third co-founder and has played an ongoing role in product and
              technical leadership. The three founders were awarded Finnish Software Entrepreneur of the Year 2024,
              reflecting peer and industry recognition of RELEX's commercial success and responsible growth. Key-person
              concentration risk exists around the founding trio, as they remain central to culture, vision, and
              customer relationships; however, RELEX has built a broader senior management team across sales,
              engineering, customer success, and operations to support scale in 21 countries. The chair of the board is
              Robert Delmar Burke (as recorded in Finnish registry), and investor-appointed directors from Blackstone
              and TCV sit on the board following major financing rounds.
