      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              RELEX has raised approximately $816 million in total external equity capital across several rounds since
              2005. The largest single financing was a $568 million Series D in February 2022 led by Blackstone Growth,
              which established a post-money valuation of approximately $5.7 billion— at the time one of the largest
              private software company valuations in Northern Europe. TCV (Technology Crossover Ventures) first invested
              in a $226 million Series C in February 2019 and has been an ongoing strategic investor. Summit Partners
              invested as early as 2015 (Series B) and fully exited in December 2024 when Blackstone and TCV increased
              their holdings by purchasing Summit's stake in a secondary transaction. Financial details of the December
              2024 secondary were not publicly disclosed, but the transaction confirms continued investor confidence and
              provides some early-round liquidity. In January 2025, RELEX secured a €10 million green revolving credit
              facility from Nordea Bank linked to sustainability-related projects, demonstrating access to debt capital
              alongside equity. No public IPO timeline has been announced as of the research date (May 2026); the
              Blackstone-led secondary buyout is consistent with a potential IPO or further secondary sale in the
              2026–2028 window, but the company has made no commitment. The Finnish parent entity had an equity ratio of
              47.1% in fiscal 2024, indicating a reasonably well-capitalised balance sheet. Operating losses (Finnish
              entity: -€8.71M EBIT in 2024, improving from -€26.4M in 2022) reflect continued investment in R&D and
              international expansion rather than structural unprofitability.
