  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >-
              RELEX competes in the Supply Chain Planning (SCP) software market — the segment of enterprise software
              dedicated to demand forecasting, inventory optimisation, replenishment, production scheduling, and
              integrated business planning. This segment is distinct from the broader Supply Chain Management (SCM)
              market ($38.5B in 2025), which also includes execution layers such as transportation management systems
              (TMS), warehouse management systems (WMS), and procurement automation. The SCP market specifically covers
              the planning and optimisation decision-support layer that sits on top of transactional ERP systems. RELEX
              also competes in an adjacent segment: Retail Planning and Merchandise Optimisation software, which
              includes space and assortment planning, promotions planning, and pricing — capabilities that pure-play SCP
              vendors like Kinaxis typically do not offer. RELEX's addressable market (its service of both SCP and
              retail planning modules) therefore spans an estimated $14.75 billion SCP market plus an adjacent retail
              planning segment estimated at $5–8 billion, for a combined total addressable market approaching $20–23
              billion in 2025. Excluded from RELEX's served market: pure procurement platforms, WMS/TMS, field service
              management, and downstream e-commerce fulfilment automation. The SAP IBP and Oracle S&OP products compete
              in this market as embedded modules within their ERP platforms, but RELEX competes as a standalone
              best-of-breed vendor across all ERP environments (including SAP and Oracle customers). The key status-quo
              substitute is spreadsheet-based planning (still used by a significant fraction of mid-market companies),
              ERP-embedded native planning modules, and first-generation point solutions for individual planning
              functions.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
              - CM003
      - number: '2.2'
        title: Market Sizing and Growth Trajectory
        blocks:
          - type: paragraph
            body: >-
              The global SCP software market is estimated at $14.75 billion in 2025 and is projected to reach $36.3
              billion by 2033, representing a compound annual growth rate (CAGR) of 11.75% (Research and Markets/Globe
              Newswire estimate, September 2024). A parallel estimate from MarketsandMarkets places the AI in Supply
              Chain market at $13.93 billion in 2025, growing to $50.41 billion by 2032 at 20.2% CAGR — a higher rate
              reflecting the accelerating AI premium now embedded in SCP software. The broader SCM market (all execution
              + planning layers) was estimated at $38.51 billion in 2025 and is projected to reach $58.42 billion by
              2030 at 8.7% CAGR by MarketsandMarkets. These estimates are directionally consistent: the planning layer
              is growing faster than the execution layer, driven by AI-augmented forecasting and the shift from
              rule-based to ML-driven replenishment. At RELEX's current $467M ARR, the company holds approximately 3.2%
              of the $14.75B SCP market — a modest share in a highly fragmented market that still contains dozens of
              regional point-solution providers, suggesting substantial headroom for consolidation. RELEX's 28% ARR
              growth rate meaningfully exceeds the 11.75% market CAGR, indicating market share gains rather than pure
              market-growth riding. The fastest growing sub-segment is AI-native cloud demand sensing and inventory
              optimisation, where RELEX's architecture is best positioned relative to legacy on-premise planning tools
              from SAP and Oracle. North America ($6–8B of the SCP market), Europe ($4–5B), and Asia-Pacific ($2–3B,
              fastest growing) are the three principal regions. RELEX is strong in Europe, growing in North America, and
              nascent in Asia-Pacific.
