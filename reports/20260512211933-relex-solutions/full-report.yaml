  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              RELEX operates at the intersection of the $14.75 billion supply chain planning (SCP) software market and
              the adjacent retail planning and merchandise optimisation segment. The competitive landscape falls into
              four layers. First, best-of-breed SCP specialists: Blue Yonder (Panasonic subsidiary), Kinaxis (public,
              TSX:KXS), and o9 Solutions (private, $3.7B valuation) each offer dedicated SCP platforms with Gartner
              Magic Quadrant recognition. Second, ERP-embedded planning incumbents: SAP Integrated Business Planning
              (IBP) and Oracle Supply Chain Planning leverage captive ERP installed bases to sell planning add-ons,
              competing on procurement friction rather than product superiority. Third, adjacent execution vendors:
              Manhattan Associates (NASDAQ:MANH) and Infor are expanding from warehouse and order management into
              planning layers. Fourth, the status-quo substitute: Microsoft Excel and homegrown spreadsheet workflows
              remain widely used in the mid-market (estimated 60% penetration) and represent the most commonly displaced
              predecessor system in RELEX deals. Beyond these, adjacent internal-build risk exists at the largest
              technology-forward retailers such as Amazon, Walmart, and Target, which historically develop proprietary
              supply chain tools. Likely entrants in the 2026-2030 horizon include hyperscalers (AWS Supply Chain,
              Google Cloud Supply Chain) and AI-native verticalized platforms leveraging foundation model APIs for
              demand sensing.
