        - JVM runtime; internal RELEX R&D; third-party libraries
        - Limited public disclosure of tech stack; inference from job postings and partner docs
      - - In-memory Optimisation Engine
        - Proprietary constraint-based programming engine
        - Solves multi-variable replenishment, space, and production planning problems
        - RELEX trade-secret IP; in-memory RAM
        - Key-person and IP concentration risk; not patented; loss of core engineers could impair engine development
      - - ML / AI Layer
        - Proprietary per-customer ML forecasting; Rebot AI assistant; agentic planning agents (2025–26)
        - Demand forecasting; planner AI assistant; autonomous category management pilots
        - Internal training infrastructure; external LLM APIs for Rebot (undisclosed vendor)
        - LLM vendor dependency for Rebot; computer vision module still in development
      - - Data / Storage Layer
        - In-memory data store; cloud database (AWS RDS or equivalent); data lake for ML training
        - Unified planning data model; historical data for ML training; audit trail
        - AWS cloud availability; GDPR-compliant data residency in EU regions
        - Single cloud provider (AWS) dependency; no multi-cloud redundancy publicly confirmed
      - - Integration Layer
        - REST APIs; EDI; SFTP; pre-built SAP connector; Oracle / Infor / Dynamics connectors
        - Ingest POS and ERP data in near-real-time; export planning outputs to ERP
        - ERP version compatibility; customer data quality
        - ERP upgrade cycles can break connectors; data-quality issues at source can impair forecast accuracy
