            body: >-
              RELEX has delivered 74 consecutive quarters of ARR growth—equivalent to approximately 18.5 years of
              uninterrupted revenue expansion—without any publicly disclosed period of ARR contraction. This metric is
              the strongest available proxy for retention, as any significant churn event would break the growth streak.
              Net Revenue Retention (NRR) is not publicly disclosed, but based on the combination of new logo growth
              (nearly 100 net-new customers in 2025), module expansion patterns documented in customer case studies, and
              the 74-quarter growth record, NRR is estimated at 110–120%, consistent with best-in-class enterprise SaaS
              platforms. Contract structure is subscription-based with multi-year terms; publicly available case studies
              reference multi-year implementation and operational engagements with major retail chains. Module expansion
              is a key expansion vector: customers typically begin with demand forecasting and replenishment, then
              expand into space planning, workforce management, promotions optimisation, and (following the Optimity
              acquisition) production planning and scheduling. RELEX reported a 62 NPS in 2024, above the SaaS industry
              average of approximately 40, providing an additional proxy for customer satisfaction and
              reference-ability. Evidence of customer expansion in 2026 includes Douglas's pan-European scope expansion
              and the continued engagement of long-standing grocery accounts. Multi-year contract terms and deep
              data-model integration (RELEX embeds its shared data model tightly into customer ERP, POS, and warehouse
              systems) create switching costs that reinforce retention. No major publicly disclosed customer defections
              or contract terminations have been identified in the research window.
