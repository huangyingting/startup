      - number: '2.4'
        title: Growth Drivers and Market Tailwinds
        blocks:
          - type: paragraph
            body: >-
              Several macro and structural forces are accelerating adoption of AI-native SCP platforms. First, supply
              chain disruption: the 2020–2023 pandemic era exposed catastrophic fragility in global supply chains,
              creating boardroom-level urgency to move beyond reactive ERP planning. A 2025 RELEX-commissioned study
              found that 60% of companies were actively overhauling their supply chains in response to tariff
              uncertainty and macro volatility. Second, AI maturity: machine learning models for demand sensing and
              probabilistic inventory optimisation have crossed the enterprise-readiness threshold, delivering
              measurable lift over statistical baseline models. RELEX's Rebot assistant (60,000+ monthly queries) and
              agentic AI pilots (2025) reflect this capability maturity. Third, sustainability mandates: ESG disclosure
              rules in the EU (CSRD), food waste reduction targets (EU Farm-to-Fork strategy), and retailer net- zero
              commitments are creating regulatory and reputational demand for food waste reduction platforms — RELEX's
              core value proposition. Fourth, ERP-to-best-of-breed migration: SAP's S/4HANA migration wave is prompting
              enterprises to evaluate planning layer replacements, as IBP costs increase and best-of-breed vendors offer
              superior AI capabilities. Fifth, the broadening of SCP scope: expansion into production planning, supplier
              collaboration, and sustainability metrics is growing the SCP TAM itself, as each module displaces an
              additional legacy point solution. Sixth, globalisation of retail: expansion of Western retail brands into
              LATAM (OXXO, Circle K), APAC (Coles), and Middle East is driving SCP platform adoption in new geographies.
            claimRefs:
              - CM016
              - CM017
              - CM018
              - CM019
              - CM020
              - CM021
          - type: figure
            figureRef: FM002
            claimRefs:
              - CM016
