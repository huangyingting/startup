      - number: '3.3'
        title: 'ERP-Embedded Incumbents: SAP IBP and Oracle SCP'
        blocks:
          - type: paragraph
            body: >-
              SAP Integrated Business Planning (IBP) is embedded within the SAP ERP ecosystem, giving it access to SAP's
              300M+ user installed base. SAP IBP covers demand sensing, S&OP, and supply planning within the S/4HANA
              architecture, with pricing typically bundled into broader ERP contracts. Its primary competitive advantage
              is procurement friction: enterprises already running SAP ERP face a default selection bias toward IBP.
              However, SAP IBP is widely regarded as not best-of-breed for retail-specific use cases; implementation
              timelines of 24–48 months and complex licensing structures mean that many SAP customers evaluate RELEX as
              a best-of-breed overlay. SAP's ongoing S/4HANA migration wave is a double-edged dynamic for RELEX: some
              enterprises use the migration as an opportunity to evaluate planning layer replacements, creating
              displacement opportunities, while others choose to consolidate on SAP IBP to reduce vendor complexity.
              Oracle Supply Chain Planning, embedded in Oracle Fusion Cloud, competes primarily in manufacturing
              verticals where Oracle ERP has strong installed base penetration; it has weaker differentiation versus
              RELEX in grocery and food retail planning specifically. Both SAP and Oracle face structural disadvantages
              in the retail SCP segment because their planning modules were designed for manufacturing-type planning
              horizons (weeks to months) rather than retail high-velocity inventory replenishment cycles (hourly to
              daily). The pricing comparison table shows that ERP-embedded planning has the lowest perceived initial
              cost but the longest time-to-value and highest total implementation complexity across all competitor
              categories.
            claimRefs:
              - CP010
