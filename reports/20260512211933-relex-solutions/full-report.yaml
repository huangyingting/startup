  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Executive Risk Overview
        blocks:
          - type: paragraph
            body: >-
              RELEX Solutions enters 2026 with a materially expanded risk profile relative to its 2022 peak fundraising
              moment. Six primary risk dimensions require investor attention: (1) operational execution following a
              significant Finnish headcount reduction in April 2026 that affects ~40% of the Helsinki-based workforce;
              (2) regulatory compliance under the EU AI Act (enforcement 2026) and GDPR, both of which directly affect
              RELEX's AI-driven planning software and its handling of consumer purchasing data; (3) competitive pressure
              from SAP IBP's bundled ERP advantages, Blue Yonder's AI investment pipeline, and Kinaxis's retail vertical
              push; (4) financial risks centring on the EBIT-negative Finnish entity, a stale 2022 valuation, and no
              public IPO timeline providing liquidity; (5) key-person concentration around CEO Mikko Kärkkäinen and the
              co-founder trio; and (6) geographic concentration with estimated 70%+ revenue in EMEA and limited North
              American brand recognition versus entrenched incumbents. Each risk is rated by likelihood and residual
              impact in the heatmap below. Several risks cascade into each other — a layoff-driven service quality
              decline amplifies competitive risk and customer churn probability — making integrated monitoring
              essential. The company's certified security posture (ISO 27001, SOC 2 Type II) and high NRR partially
              offset the regulatory and operational exposure, but investors should treat the EU AI Act compliance gap
              and the stale valuation as active monitoring items.
            claimRefs:
              - CR001
              - CR004
              - CR005
              - CR009
