              year through FY2024 (EBIT -7.5%). The April 2026 restructuring affecting up to 288 Finnish employees
              signals a deceleration in growth confidence and a priority shift toward profitability ahead of a potential
              exit event. Investors should closely monitor whether FY2026 ARR growth holds above 25% post-restructuring.
            calloutType: risk
            claimRefs:
              - CI002
