      - number: '7.8'
        title: Risk Mitigation and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Effective risk management for RELEX requires monitoring a specific set of leading indicators that would,
              if triggered, materially change the investment thesis from positive to neutral or negative. The strongest
              mitigating factors are: a certified security posture (ISO 27001, SOC 2 Type II), consistent 74-quarter ARR
              growth demonstrating resilience across competitive cycles, a high NPS (62 vs industry average 40), premium
              pricing that selects for mission-critical use cases with high switching costs, and a diversified
              geographic footprint across 21 countries. The Blackstone and TCV relationship provides continued
              institutional oversight and some insulation against financial distress. The kill criteria below are
              specific measurable triggers that would require a thesis re-evaluation. For EU AI Act risk, the trigger is
              a formal high-risk classification ruling from the EU AI Office that requires extensive remediation in
              RELEX's current product architecture. For competitive risk, the trigger is a documented win-rate decline
              in RELEX's core grocery retail vertical, signalled by net revenue retention dropping below 110%. For
              financial risk, the trigger is a further operating loss deterioration in the Finnish entity beyond -€12
              million EBIT, suggesting the efficiency restructuring has not improved unit economics. For leadership
              risk, the trigger is the departure of CEO Mikko Kärkkäinen. For valuation risk, the trigger is a public
              IPO or secondary transaction that implies a valuation materially below the 2022 $5.7 billion anchor.
              Investors should request quarterly updates on NRR, EU AI Act compliance status, and headcount
              stabilisation metrics as standard monitoring items.
            claimRefs:
