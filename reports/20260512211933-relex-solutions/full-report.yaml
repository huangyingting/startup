              initial engagement to contract signature for large retailers and manufacturers, given the complexity of
              system integration and data migration. RELEX does not publicly disclose CAC, sales payback period, or
              sales efficiency ratios. Key efficiency proxies visible from public evidence include: (1) subscription
              revenue grew 30% YoY in FY2025 against an improving but still negative margin, implying adequate
              gross-margin contribution to justify go-to-market spend; (2) approximately 100 net-new customers added in
