      - number: '2.5'
        title: Adoption Constraints and Market Headwinds
        blocks:
          - type: paragraph
            body: >-
              Despite strong structural tailwinds, several factors constrain adoption velocity. First, switching costs
              are high: supply chain planning is deeply integrated with ERP, POS, WMS, and supplier data systems. A
              typical RELEX implementation requires 12–24 months of data migration, configuration, and change
              management, creating incumbent stickiness even for underperforming systems. Second, data readiness: many
              potential customers lack the POS data quality, master data management, and integration architecture that
              RELEX requires to deliver value. This disqualifies a material portion of mid-market retailers. Third,
              economic headwinds: rising interest rates increase the cost of capital held in inventory, driving urgency
              to optimise — a tailwind — but also compress IT discretionary budgets, delaying purchase decisions.
              Fourth, in-house build risk: large technology-forward retailers (Amazon, Walmart, Target) have
              historically built proprietary planning tools, reducing their SCP software TAM contribution. Fifth, vendor
              lock-in from SAP and Oracle: many enterprises standardise on a single vendor suite across ERP + planning,
              giving SAP IBP a structural headstart at SAP customers even where RELEX has technically superior
              capabilities. RELEX has successfully displaced SAP IBP at several large accounts but must invest heavily
              in pre-sales to overcome default incumbent selection.
            claimRefs:
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
      - number: '2.6'
        title: Sizing and Adoption Diligence Gaps
        blocks:
          - type: paragraph
            body: >-
              Market sizing for SCP software is complicated by several definitional and methodological challenges.
              First, market research firms use different boundaries: some include SCM execution (TMS/WMS) in their SCP
              market, inflating reported TAM. Second, the AI-in-supply-chain estimates ($13.93B at 20.2% CAGR) include
              hardware and services revenues that are not RELEX's addressable market — RELEX sells software
              subscriptions, not AI infrastructure. Third, RELEX's own market share calculation cannot be verified
              independently, as neither the SCP market leader (Blue Yonder, private) nor RELEX disclose absolute
              revenue. Fourth, private-company universe: a significant fraction of the SCP market is served by regional
              players and system-integrator-embedded solutions, most of which are not publicly tracked. The $14.75B SCP
              estimate is treated as the base case for this report's valuation and market share calculations, but the
