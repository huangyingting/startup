        title: Exhibits
        blocks:
          - type: callout
            title: Rare Combination of Sustained Growth and Enterprise Loyalty
            body: >-
              RELEX has delivered 74 consecutive quarters of ARR growth — approximately 18.5 years of uninterrupted
              revenue expansion — while maintaining a 62 NPS and estimated 95%+ retention. This combination is
              exceptionally rare in enterprise SaaS and underpins strong compounding unit economics.
