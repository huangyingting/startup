  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Subscription ARR Quality
        blocks:
          - type: paragraph
            body: >-
              RELEX generates revenue through two primary streams: multi-year enterprise SaaS subscriptions and
              professional services or implementation fees. Subscriptions are the strategically dominant stream and are
              structured around annual contract values tied to the volume of SKUs, stores, or production assets under
              management and the number of platform modules deployed, creating an expanding revenue base as customers
              adopt additional capabilities over time. Professional services are recognised as delivered and represent a
              secondary, lower-margin stream estimated at 15–25% of total revenue based on comparable enterprise SaaS
              benchmarks. The Finnish parent entity (Retail Logistics Excellence — RELEX Oy) reported €292.2 million in
              statutory revenue for fiscal year 2024, a 24.8% year-over-year increase, while subscription revenue grew
              30% and annual recurring revenue grew 30%+ in FY2024. In FY2025, subscription revenue grew another 30% and
              ARR grew 28% in constant currencies, reaching a milestone of 74 consecutive quarters of uninterrupted ARR
              growth. Global ARR is estimated at approximately $467 million in 2025 per third-party data. Third-party
              estimates show sequential ARR of $152.1M (2023), $290.5M (2024), and $467M (2025). RELEX's pricing is
              based on contract scope and module selection; no volume-based usage billing has been disclosed. The RELEX
              Open platform (announced May 2026) introduces extensibility and third-party AI agent connectivity,
              creating potential new usage or marketplace revenue vectors on top of the core subscription base. The EU
              AI Act (in force August 2024) imposes risk-classification requirements on AI systems used in supply chain
              contexts; RELEX's AI-driven forecasting and autonomous replenishment modules may face compliance cost
              while simultaneously attracting enterprise buyers seeking a vendor with governance controls already in
              place.
