      - number: '8.5'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >-
              Three scenarios frame the range of outcomes for RELEX's valuation by 2027–2028, spanning from
              IPO-readiness with AI premium to execution shortfall with no exit catalyst. The base case —
              probability-weighted at approximately 55% — assumes RELEX maintains its current ARR trajectory of 25–30%
              growth, reaches approximately $500–550M ARR by 2027, achieves Rule of 40 improvement toward 25–30 through
              margin recovery, and is valued at 10–13x ARR by institutional investors in a secondary or IPO context,
              yielding a base-case valuation of $5B– $6B. The bull case — probability-weighted at approximately 25% —
              requires RELEX to file for IPO on NYSE or Nasdaq in 2026–2028, validate its AI platform premium (Rebot
              agentic AI adoption validated by key customers), improve Rule of 40 above 35, and achieve IPO pricing at
              15–19x ARR on $550–600M projected ARR, yielding a valuation of $7B–$9B. The bear case —
              probability-weighted at approximately 20% — assumes ARR growth decelerates below 15%, execution concerns
              emerge from any prior restructuring or leadership changes, no IPO materialises in the 2026–2028 window,
              and the multiple compresses to 7–8x the ~$467M ARR, yielding a valuation of $3.5B–$4B. The probability
              signals for the bull case rest on: (1) continued Blackstone commitment, (2) Rule of 40 trajectory
              improvement, and (3) AI competitive proof in key customer wins. The probability signals for the bear case
              rest on: (1) ARR growth deceleration, (2) large customer loss, and (3) delayed IPO window. The Valuation /
              Return Range figure and Bull / Base / Bear Scenario table below present the structured outputs. The
              scenario analysis implies a probability-weighted expected valuation of approximately $5.6B, marginally
              above the current $5.7B mark — suggesting that at the current price, the risk/reward is balanced but the
              distribution is right-skewed (IPO upside > distressed bear).
            claimRefs:
              - CV030
              - CV031
              - CV032
              - CV033
