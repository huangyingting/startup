  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Executive Recommendation
        blocks:
          - type: paragraph
            body: >-
              This valuation chapter converts the evidence across Chapters 1–7 into a structured investment
              recommendation for RELEX Solutions as of May 2026. The recommendation is Track, with medium confidence and
              a medium risk rating. RELEX demonstrates a genuinely differentiated unified supply chain planning
              platform, a 28% ARR CAGR with 74 consecutive quarters of growth, and strong institutional backing from
              Blackstone and TCV. However, the $5.7B valuation mark is now four years old, consolidated global
              financials remain undisclosed, the Rule of 40 score of approximately 20 falls below the ≥40 threshold that
              typically commands SaaS premium multiples, and no IPO catalyst has been announced as of May 2026. The
              valuation stance is Fair at the current implied 12x ARR multiple: RELEX is priced consistently with
              upper-tier SCP SaaS peers like o9 Solutions and Kinaxis but does not yet command the premium warranted by
              Rule of 40 compliance or a confirmed exit event. An entry or hold position is rational at $5–6B; any entry
              above $6.5B requires evidence of gross margin above 70%, ARR growth acceleration above 30%, or a confirmed
              IPO mandate. The Recommendation Summary table and Investment KPIs figure below capture the structured
              scoring. The Recommendation Logic flow maps the chain of evidence to the Track conclusion, incorporating
              both thesis and anti-thesis signals.
