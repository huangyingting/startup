      - number: '8.6'
        title: Exit Readiness, Thesis-Break Triggers, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              RELEX has three credible exit paths available in the 2026–2028 window: an IPO on NYSE or Nasdaq, a
              strategic acquisition, or a Blackstone-led sponsor secondary or buyout. An IPO is the highest-value exit
              at $6B–$9B given the SaaS premium and liquid market access; as a Finnish company with global operations,
              NYSE or Nasdaq is the natural venue. As of May 2026, no S-1 has been filed and no IPO adviser mandate has
              been announced publicly, suggesting the company is in preparation but not yet in a formal registration
              process. RELEX would likely need to improve its Rule of 40 to ≥35 and disclose consolidated global
              financials before a successful institutional roadshow. Among strategic acquirers, SAP is the most natural
              fit given RELEX's complementary retail supply chain capabilities, but an SAP acquisition would face
              material EU and US antitrust scrutiny given SAP's existing ERP dominance and growing IBP footprint.
              Oracle, Salesforce, and Microsoft are alternative strategic buyers with fewer antitrust constraints.
              Blackstone Growth could execute a sponsor-led secondary buydown or full buyout if IPO conditions remain
              unfavourable. The December 2024 secondary transaction, while providing Summit Partners with full exit
              liquidity, also extended Blackstone and TCV's holding horizon. Five thesis-break triggers and five key
              diligence gaps are structured in the tables below, enabling an investment committee to monitor the thesis
              and prioritise the most critical evidence gaps before committing capital above $5.5B.
