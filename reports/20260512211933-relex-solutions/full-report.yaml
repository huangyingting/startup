      - number: '7.7'
        title: Key Person and Governance Risks
        blocks:
          - type: paragraph
            body: >-
              RELEX has a concentrated founding team risk that is uncommon even for a company of its scale. All three
              co-founders — CEO Mikko Kärkkäinen, Chief Sustainability Officer Johanna Småros, and Co-Founder Michael
              Falck — remain actively employed at the company 20+ years after founding. While this represents
              exceptional founder commitment, it creates a key-person concentration where the departure of any
              co-founder — especially CEO Kärkkäinen — would be interpreted as a significant negative signal by
              enterprise customers, strategic partners, and existing investors. Mikko Kärkkäinen is RELEX's primary
              external face for AI strategy and large customer relationships; he is prominently cited in industry
              analyst commentary (Gartner, Nucleus Research) and in company press releases. A leadership transition at
              the CEO level during an active restructuring and competitive acceleration phase would compound
              uncertainty. Beyond the founding team, the April 2026 restructuring itself creates a secondary governance
              risk: if the company has reduced customer success leadership or key technical R&D personnel as part of the
              Finnish workforce reduction, the institutional knowledge and customer relationship equity embedded in
              those roles could diminish, creating slower response times on enterprise customer issues. RELEX has not
              disclosed the specific functions most affected by the April 2026 reduction, which limits visibility into
              this risk. The board includes investor-appointed directors from Blackstone and TCV, providing some
              oversight balance, but the founders' combined cultural authority at the company means governance levers
              are limited if founders and investors diverge on strategy.
            claimRefs:
              - CR028
              - CR029
              - CR034
              - CR042
