        title: Customer Base Overview and ICP Definition
        blocks:
          - type: paragraph
            body: >-
              RELEX serves more than 700 enterprise customers worldwide as of end-2025, having added nearly 100 net-new
              logos in 2025 alone. The company's ideal customer profile (ICP) is a large enterprise retailer or
              manufacturer with annual revenues exceeding $500 million, high SKU velocity, complex multi-echelon
              distribution networks, and meaningful perishable or short-shelf- life inventory exposure. Within that ICP,
              the highest-value segment is grocery and fresh-food retail: perishability creates acute waste-reduction
              ROI that justifies RELEX's premium price point, and grocery chains typically operate hundreds to thousands
              of stores, producing large ARR per account. Secondary ICP segments include home improvement, drug and
              convenience, discount and value retail, and specialty consumer goods brands. RELEX explicitly does not
              target the SME segment (sub-$200 million revenue companies) due to implementation complexity and the data-
              readiness requirements of its AI models. The customer base is geographically weighted toward EMEA
              (primarily Finland, Nordics, Germany, UK, Iberia, and Benelux), with North America as the fastest-growing
              region and APAC nascent (Coles in Australia being the primary beachhead). Named global logos include The
              Home Depot, AutoZone, PetSmart, Dollar Tree and Family Dollar, Circle K, Coles (Australia), M&S Food
              (Marks & Spencer), ICA Sweden, El Corte Inglés (Spain), Rossmann (Germany/Europe), Rituals (cosmetics),
              ADUSA (Delhaize US), Hy-Vee (Iowa, ~280 stores), Douglas (EU beauty), COSMOS Pharmaceutical, Carhartt,
              Vita Coco, and The Body Shop. The breadth of verticals and geographies covered demonstrates platform
              versatility, though it also creates implementation complexity that RELEX manages through a network of
              global system-integrator partners including Wipro and Cognizant.
