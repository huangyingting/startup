  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Architecture and Core Technology
        blocks:
          - type: paragraph
            body: >-
              The RELEX Living Retail Platform is built on a single unified data model that encompasses the full
              planning chain from demand sensing through replenishment, space allocation, workforce scheduling, and
              production planning. This "single source of truth" architecture eliminates the data reconciliation
              overhead inherent in point-solution stacks, where separate demand, replenishment, and space tools must be
              synchronised through fragile batch ETL pipelines. RELEX's platform stores all planning data in a shared
              in-memory layer that enables simultaneous computation across millions of SKU-location combinations — a
              design choice that differentiates it from cloud-native competitors whose columnar database approaches
              impose latency penalties at the scale of large food retailers or home improvement chains operating more
              than 100,000 active SKUs per store.

              The platform is deployed as cloud-native SaaS on Amazon Web Services (AWS) with multi-tenant architecture
              and isolated customer instances, ensuring data separation while sharing the underlying optimisation
              infrastructure. For the minority of customers on legacy contracts, an on-premise deployment option is
              maintained, though RELEX's go-forward strategy is SaaS-primary. The integration layer is API-first: REST
              APIs, EDI, and SFTP protocols are supported alongside pre-built connectors for SAP (S/4HANA, ECC, IBP),
              Oracle, Infor, and Microsoft Dynamics. Near-real-time POS and ERP data ingestion ensures that
              replenishment decisions reflect the latest store-level sales and inventory positions rather than
              yesterday's batch file. The optimisation engine is built on constraint-based programming combined with
              machine-learning-based forecasting, allowing RELEX to solve complex multi-variable planning problems —
              such as balancing shelf fill rate against waste targets for fresh categories — that pure LP solvers cannot
              handle within acceptable planning cycle times.
