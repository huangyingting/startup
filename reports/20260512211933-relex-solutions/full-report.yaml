      - number: '1.5'
        title: Milestones and Key Events
        blocks:
          - type: paragraph
            body: >-
              RELEX's 20-year trajectory spans academic spin-out, European expansion, global scale-up, and a multi-wave
              acquisition strategy. The company reached €100M ARR in 2021, secured unicorn status with its February 2022
              Series D, and has since compounded growth through organic wins and targeted bolt-on acquisitions. Optimity
              (acquired January 2024, Sweden-based production planning specialist) was the fifth acquisition, extending
              RELEX's addressable market into manufacturing and CPG upstream planning. Ida (acquired December 2025)
              brought advanced store-level fresh replenishment capabilities for grocery, addressing a key category gap.
              Earlier acquisitions include Galleria (category planning), Zenopt (workforce scheduling), and Formulate
              (promotional planning), all integrated into the unified platform. In April 2025 RELEX was named a Leader
              in the Gartner Magic Quadrant for Supply Chain Planning for the first time, having first appeared in the
              report in 2022 — a notably rapid climb from Challenger to Leader in just three years. On sustainability,
              RELEX helped food retail customers prevent 350 million kg of food waste in 2024, up from 280 million kg in
              2023, translating to 1.2 million metric tons of CO₂ avoided. The company maintained 100% renewable
              electricity across all offices and co-location data centres in 2024 and reduced its own emissions
              intensity by 9.9% year-over-year.
