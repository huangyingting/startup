      - number: '5.4'
        title: Security, Compliance, and Enterprise Readiness
        blocks:
          - type: paragraph
            body: >-
              RELEX's security and compliance posture is commensurate with enterprise software serving Tier 1 retailers
              and global CPG manufacturers. The company holds ISO 27001 certification for its information security
              management system, SOC 2 Type I and Type II reports covering the SaaS platform's security, availability,
              and confidentiality controls, and complies with GDPR for handling EU-based customer data. The SSAE 18 /
              AT-C 320 audit standard governs third-party reporting on internal controls — the same framework required
              by US public companies when evaluating SaaS vendors for SOX-relevant workflows.

              For enterprise procurement teams, the combination of ISO 27001 and SOC 2 Type II is typically the minimum
              threshold for inclusion in a vendor shortlist for supply chain planning, where the software will process
              commercially sensitive SKU-level sales data and margin information. RELEX's certifications place it on par
              with direct competitors including Kinaxis and Blue Yonder in the compliance dimension, though RELEX's
              Finnish-origin cloud infrastructure (AWS EU regions) provides an additional data-residency selling point
              for European enterprise customers operating under strict GDPR interpretations. GDPR compliance is
              operationalised through data processing agreements, EU Standard Contractual Clauses for cross-border
              transfers, and a dedicated data protection function.

              The EU AI Act — formally applying from August 2026 onward for high-risk AI systems — poses a
              forward-looking compliance obligation for RELEX. AI-based replenishment and production planning systems
              that affect employment decisions (for example, workforce scheduling) or critical supply chain operations
              may fall within the "high-risk" classification under Annex III of the Act. RELEX has acknowledged this
              exposure and is developing a compliance framework, but as of the May 2026 research date the internal AI
              register, bias-testing protocols, and human-oversight mechanisms required for high-risk systems are not
              yet publicly disclosed. This represents a diligence ask for prospective investors.
            claimRefs:
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
