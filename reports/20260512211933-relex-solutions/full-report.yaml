      - number: '1.4'
        title: Operating Scale and Geographic Footprint
        blocks:
          - type: paragraph
            body: >-
              RELEX has approximately 2,374 employees globally across 20+ offices in 21 countries as of late 2025.
              European operations—particularly Finland, Germany, Denmark, France, Italy, and the UK— account for the
              majority of headcount (~1,900 employees), with North America (~363 employees, concentrated in Atlanta and
              other US hubs) growing as the company actively targets American enterprise retailers. Additional presence
              in Australia (Melbourne), Japan (Tokyo), Hong Kong, and Latin America gives RELEX genuine global reach.
              The Finnish parent entity alone employed 914 staff in 2024. Key enterprise customers including The Home
              Depot, Dollar Tree, AutoZone, PetSmart, and Circle K are North American, while Coles (Australia), M&S Food
              (UK), El Corte Inglés (Spain), and OXXO LATAM (Mexico) anchor international expansion. In 2025 RELEX had
              700+ total customers and closed over 300 customer agreements. The company reinvests approximately 25% of
              revenue into R&D (above the enterprise SaaS norm of ~15%), supporting innovation in agentic AI, demand
              sensing, and production planning. RELEX achieved a Net Promoter Score of 62 in 2024, well above the SaaS
              industry average of approximately 40, and customer retention is assessed at 95%+ by market observers.
              RELEX's in-memory processing engine is a key architectural differentiator, enabling high-throughput
              planning computations that cloud-native competitors reportedly cannot match at scale.
