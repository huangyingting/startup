        - AWS (primary cloud); multi-tenant SaaS; isolated customer instances
        - Compute, storage, networking; global availability; SaaS provisioning
        - AWS service availability; EU-region data residency
        - AWS outage risk; no publicly confirmed multi-region active-active architecture
