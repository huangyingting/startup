      - number: '7.2'
        title: Operational and Execution Risks
        blocks:
          - type: paragraph
            body: >-
              The most immediate operational risk stems from RELEX's April 2026 restructuring, in which up to 288
              Finnish employees were notified of potential redundancy from a base of approximately 722 Finnish employees
              — representing roughly 40% of the Helsinki workforce. CEO Mikko Kärkkäinen characterised the rationale as
              needing to "do things faster with a smaller team," signalling an efficiency-driven transformation rather
              than a financial crisis. Nonetheless, the customer success, professional services, and R&D functions most
              exposed to implementation quality could degrade during the transition. RELEX's typical implementation
              cycles run 6–24 months; any disruption to dedicated implementation teams creates project timeline risk
              that could delay customer go-live, trigger contract penalties, or reduce net revenue retention. The
              restructuring also creates employee morale and talent retention risk globally: high performers in
              non-Finnish offices who observe a 40% Finnish reduction may voluntarily exit, reducing institutional
              knowledge depth. From a supply chain standpoint, RELEX is a software company, so physical supply chain
              disruptions are not a primary exposure. However, cloud infrastructure dependencies on hyperscale providers
              (AWS, Azure) represent operational availability risk — RELEX's SLA performance is co-dependent on upstream
              cloud reliability. The company's ISO 27001 and SOC 2 Type II certifications cover information security but
              do not eliminate business-continuity exposure in a forced-reduction scenario.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR035
              - CR036
              - CR041
              - CR042
