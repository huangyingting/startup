      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >-
              RELEX's ideal customer profile (ICP) centres on large enterprise retailers and manufacturers with
              high-velocity, high-SKU-count inventory across perishable and general merchandise categories. The primary
              buyer persona is the Chief Supply Chain Officer (CSCO) or VP/SVP of Supply Chain, who controls the supply
              chain software budget and is accountable for service levels, inventory turns, and waste reduction.
              Secondary buyers include the Chief Information Officer (CIO) or CTO (who must approve cloud infrastructure
              decisions), the Chief Financial Officer (CFO, who evaluates ROI and on-balance-sheet inventory), and the
              Chief Sustainability Officer (who cares about ESG impact of waste reduction). The end users of RELEX are
              supply chain analysts, category managers, retail buyers, store operations managers, and production
              planners. These users interact with the platform daily to review forecast exceptions, approve
              replenishment orders, analyse promotional lift, and plan workforce schedules. The key segmentation axes
              are: (1) vertical — grocery and food retail ($6–8B addressable, RELEX's core; high perishability → high
              ROI on waste reduction), general merchandise and speciality retail ($4–5B), consumer goods / CPG
              manufacturers ($3–4B), wholesale and distribution ($1–2B); (2) size — enterprise ($1B+ annual revenue),
              mid-market ($200M–$1B), and SME (<$200M, which RELEX does not effectively serve today due to
              implementation complexity and premium pricing); (3) geography — EMEA (RELEX's current majority), North
              America (growing aggressively), APAC (nascent). Budget ownership sits at the enterprise level: typical
              RELEX deal sizes are $1M–$10M ACV for large retailers, with implementations taking 6–24 months. Adoption
              is gated by IT procurement cycles, data-readiness (POS and ERP data quality), and internal change-
              management capability — all of which favour established enterprise vendors over new entrants.
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM014
              - CM015
