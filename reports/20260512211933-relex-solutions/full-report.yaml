      - number: '8.4'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >-
              Four comparable sets inform RELEX's valuation: public SCP SaaS peers, private SCP peers, supply chain M&A
              transactions, and planning software M&A transactions. The most directly comparable public company is
              Kinaxis (TSX: KXS), the only pure-play listed SCP vendor. Kinaxis reported FY2024 ARR of approximately
              CAD$590M (~USD$435M), with 13% year-over-year revenue growth and a market capitalization of approximately
              CAD$4.3–5B (~USD$3.2–3.7B), implying an ARR multiple of 7–8.5x USD. Kinaxis's lower multiple relative to
              RELEX's implied 12x reflects its slower growth rate (13% vs. RELEX's 28%) and narrower product focus on
              the supply chain planning segment without the breadth of RELEX's retail-specific modules. Manhattan
              Associates (NASDAQ: MANH) trades at a significant premium (~25–28x ARR on ~$900M ARR) but this reflects
              its successful SaaS transition premium and expanding planning module, making it a ceiling reference rather
              than a direct comp. Among private peers, o9 Solutions was valued at $3.7B in its 2023 KKR financing round
              on approximately $300–350M ARR, implying ~10–12x ARR — the closest structural analog to RELEX's current
              positioning. Blue Yonder was acquired by Panasonic in 2021 at ~$7.1B, approximately 7x its ARR of ~$1B at
              acquisition — a 2021 peak-multiple transaction now representing a compressed historical floor. Anaplan,
              acquired by Thoma Bravo in June 2022 at $10.7B (~18x ARR on ~$600M ARR), represents the peak of planning
              software M&A multiples and is now an outlier reference. The enterprise SaaS SCP peer median ARR multiple
              in 2024 is approximately 8–12x, compressed from the 2021 peak of 25–35x. RELEX at ~12x ARR sits at the
              upper bound of this range, reflecting a premium for its ARR growth rate and platform breadth. The
              Comparable Valuation table and Valuation Sensitivity figure below structure the full comp set and scenario
              sensitivity.
