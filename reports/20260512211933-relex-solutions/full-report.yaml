companyProfile:
  summary: >
    RELEX Solutions is a Helsinki-headquartered supply chain planning SaaS company founded in 2005 by four ex-academics.
    Its unified platform covers demand forecasting, replenishment, space, allocation, workforce, and operations planning
    for retail and consumer goods enterprises. With €292 M Finnish-entity revenue in FY2024, 700+ global customers
    across 100+ countries, and 74 consecutive quarters of ARR growth, RELEX has established durable category leadership
    in unified supply chain planning. The company is backed by TCV, Blackstone, Summit Partners, and other growth
    investors; it last raised at a $5.7 B valuation in February 2022 and confirmed continued investor interest through a
    December 2024 Blackstone-led secondary.
