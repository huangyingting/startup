      - number: '8.2'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: >-
              RELEX's last primary valuation event was its February 2022 Series D, in which the company raised $500M at
              a post-money valuation of $5.7B. The round was led by Blackstone Growth with participation from TCV (which
              first invested in the 2019 Series C at ~$450M valuation) and co-investors Thomas H. Lee Partners and
              Summit Partners. This established the current primary valuation anchor, which has not been updated by any
              subsequent primary equity transaction as of May 2026 — making the mark approximately four years old. In
              December 2024, Blackstone and TCV increased their respective holdings via a secondary transaction in which
              Summit Partners fully exited; the financial terms were not publicly disclosed. The absence of a disclosed
              transaction price in the secondary means external observers cannot verify whether the implied valuation
              was maintained, increased, or — contrary to public signals — reduced from the $5.7B primary mark. Legal
              advisors Krogerus (Helsinki) confirmed that the secondary was completed but provided no pricing
              information. RELEX also secured a €10M green revolving credit facility from Nordea Bank in January 2025.
              Total equity raised across all rounds is approximately $816M, with the Finnish parent entity carrying an
              equity ratio of 47.1% and reporting an EBIT loss of -€22M (-7.5% EBIT margin) on €292.2M FY2024 revenue —
              confirming the company is scaling but not yet at breakeven. The implied ARR multiple of the $5.7B mark is
              approximately 12.2x based on the 2025 ARR of ~$467M, consistent with the midpoint of the 2024 SCP SaaS
              peer range.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV011
              - CV012
              - CV016
      - number: '8.3'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for RELEX rests on four structural pillars. First, it operates the broadest unified
              supply chain planning platform in the market — demand forecasting, inventory management, replenishment,
              space and assortment, workforce management, and production planning in a single shared data model — a
              depth that has no direct public peer. Second, it has delivered 28% ARR CAGR with 74 consecutive quarters
              of uninterrupted growth, demonstrating exceptional execution durability over 18+ years. Third, RELEX was
              named a Gartner Magic Quadrant Leader for Supply Chain Planning in 2025, validating competitive
              positioning just three years after entering the MQ. Fourth, Blackstone — one of the world's largest
              private equity firms — is the lead institutional backer, with TCV continuing as a strategic co-investor;
              the December 2024 secondary confirms their conviction without a down-round signal. The anti-thesis is
              equally structured. RELEX is loss-making at -7.5% EBIT and its Rule of 40 score of approximately 20 falls
              well below the ≥40 threshold for premium SaaS multiple expansion. The $5.7B valuation was set at a peak
              multiple environment in early 2022 before the ZIRP unwind compressed SaaS multiples industry-wide; the
              current mark may embed stale pricing. SAP, Oracle, and Microsoft are investing heavily in AI-enabled
              supply chain planning that competes directly with RELEX. Finally, without IPO or audited consolidated
              financial disclosure, there is no market-clearing mechanism to confirm or deny the current valuation. The
              Thesis / Anti-Thesis table below structures each argument with its evidence anchor and the conditions that
              would change the view.
            claimRefs:
              - CV007
