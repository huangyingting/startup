chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              RELEX Solutions (official Finnish legal name: Retail Logistics Excellence - RELEX Oy, Business ID
              1963444-1) is a private enterprise software company headquartered at Postintaival 7, 00230 Helsinki,
              Finland, with its principal US operational hub in Atlanta, Georgia. Founded in June 2005, RELEX delivers a
              unified, AI-native platform that helps retailers, wholesalers, manufacturers, and consumer goods companies
              plan and optimise their entire supply chain and retail operations. The name RELEX is an amalgam of
              "Retail" and "Excellence," reflecting the company's original focus on retail supply chain efficiency. The
              platform integrates demand forecasting, inventory management and replenishment, pricing and promotion
              planning, space and assortment planning, workforce management, and production planning and scheduling in a
              single shared data model—positioning RELEX as a direct alternative to point-solution silos and ERP add-on
              modules from vendors such as SAP and Oracle. RELEX's business model is software-as-a-service (SaaS):
              enterprise customers pay annual subscription fees for access to configurable platform modules, with
              revenue expanding as customers adopt additional capabilities. The company has generated over 30%
              year-over-year subscription revenue growth in each of 2024 and 2025, reflecting strong net revenue
              retention and new logo wins. The Finnish parent entity reported €292.2 million in revenue for fiscal 2024
              under IFRS (Finnish statutory accounts), while the globally consolidated ARR reached approximately $467
              million in 2025 per third-party financial data.
