      - number: '7.3'
        title: Technology and Product Risks
        blocks:
          - type: paragraph
            body: >-
              RELEX's May 2026 launch of RELEX Open — its platform for MCP (Model Context Protocol) connectivity
              enabling third-party AI agent integration — materially expands the attack surface. MCP-based integrations
              allow external AI orchestration agents to query and potentially write to RELEX's planning data layer,
              creating new classes of prompt injection, data exfiltration, and privilege escalation risk that the
              company's prior security architecture was not designed to address. While RELEX holds ISO 27001 and SOC 2
              Type II certifications that establish baseline information security controls, MCP connectivity is a
              2026-era threat vector not typically covered by pre-2025 certification scopes. AI/ML model drift
              represents a second technology risk: RELEX's demand forecasting models are trained on customer POS, ERP,
              and market data. If a customer's data quality degrades — through poor master data management, undisclosed
              promotional events, or supply disruptions that distort historical patterns — RELEX's forecast accuracy can
              decline without an apparent trigger, leading customers to incorrectly attribute the degradation to RELEX's
              algorithms rather than input data quality. This creates a product reputation risk and renewal risk that is
              difficult to monitor externally. Premium pricing (typical ACV $1M–$10M for large enterprise) concentrates
              RELEX's customer base among companies with sufficient IT governance to maintain data quality, but economic
              downturns that force customer IT budget cuts could increase data quality risk across the portfolio.
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR030
              - CR036
              - CR043
              - CR044
      - number: '7.4'
        title: Competitive Risks
        blocks:
          - type: paragraph
            body: >-
              RELEX's competitive moat faces challenges from multiple directions in 2026. SAP IBP retains a structural
              distribution advantage: SAP's installed base of over 300 million enterprise users creates a default vendor
              selection dynamic where procurement teams evaluate SAP's native planning solution before considering
              best-of-breed alternatives. SAP is actively adding generative AI features to IBP — including Joule AI
              assistant integrations — narrowing RELEX's AI differentiation narrative for SAP ERP accounts. Blue Yonder
              (Panasonic-backed, Blackstone-invested) is RELEX's most direct competitor in AI-native supply chain
              planning for large grocery and retail accounts. Blue Yonder's 2024–2026 product roadmap centres on machine
              learning-driven autonomous replenishment and category management tools that compete on RELEX's home turf.
              Kinaxis, the publicly traded Canadian supply chain orchestration vendor (TSX: KXS), has been explicitly
              expanding into retail verticals since 2024 via acquisition strategy, targeting RELEX's core food-retail
              segment. A structurally new risk category has emerged: large-language-model (LLM) native planning tools
              from hyperscale AI players (OpenAI, Google DeepMind, Amazon) and specialised logistics AI startups
              (Covariant, project44) could disintermediate traditional SCP software by delivering real-time demand
              sensing and replenishment recommendations through general-purpose AI agents, commoditizing the forecasting
              layer where RELEX charges premium pricing. RELEX's competitive response — RELEX Open and the Rebot AI
              assistant — is the right strategic direction but may not be sufficient if big-tech AI accelerates
              adoption.
            claimRefs:
              - CR015
              - CR016
              - CR017
              - CR018
              - CR019
              - CR025
              - CR026
              - CR038
              - CR039
              - CR040
