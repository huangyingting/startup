          - type: callout
            title: ~25% R&D Investment Creates Scientific Product Moat but Delays Breakeven
            body: >-
              RELEX re-invests approximately twice the SaaS industry average in R&D (~25% of revenue vs. ~15% industry
              norm), funding continuous improvement of AI forecasting models trained on 700+ enterprise deployments.
              This scientific moat is defensible but materially delays EBIT breakeven; investors face a trade-off
