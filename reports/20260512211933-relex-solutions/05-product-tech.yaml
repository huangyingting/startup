    data:
      nodes:
        - id: n1
          label: AWS Cloud (Primary Infrastructure)
          detail: Single cloud provider for all SaaS compute, storage, and networking; no public multi-cloud failover disclosed
        - id: n2
          label: Customer ERP Systems (SAP / Oracle / Infor / Dynamics)
          detail: Source of planning master data and transaction feeds; pre-built connectors; ERP upgrade risk
        - id: n3
          label: External LLM Provider (Rebot backend, undisclosed)
          detail: Powers Rebot AI assistant; vendor identity not publicly confirmed; API latency and cost risk
        - id: n4
          label: System Integrator Partners (Wipro / Accenture / Capgemini / IBM et al.)
          detail: Deliver RELEX implementations; amplify go-to-market; quality of SI partner delivery affects NPS
        - id: n5
          label: MCP Ecosystem (External AI Agents)
          detail: RELEX Open Connect layer; third-party LLMs and agents integrated via Model Context Protocol (May 2026)
        - id: n6
          label: EU Regulatory Framework (GDPR + EU AI Act)
          detail: GDPR governs EU customer data; EU AI Act (Aug 2026) may classify replenishment/workforce AI as high-risk
        - id: n7
          label: Data Quality from Customer Source Systems
          detail: Forecast accuracy and optimisation quality depend on completeness and timeliness of POS/inventory data feeds
      edges:
        - from: n1
          to: n2
