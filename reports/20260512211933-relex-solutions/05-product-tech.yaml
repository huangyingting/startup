company:
  name: RELEX Solutions
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    RELEX Solutions delivers the "RELEX Living Retail Platform," a single unified SaaS platform running on AWS
    that integrates nine planning modules — from demand forecasting and inventory replenishment through space,
    workforce, production, and fresh-food ordering — on a shared in-memory data model. The AI layer spans
    Rebot (60,000+ monthly queries in 2025 H1), per-customer ML forecasting models, agentic replenishment
    pilots, and the RELEX Open extensibility framework (launched May 2026) featuring MCP-based agent
    connectivity. ISO 27001, SOC 2 Type II, GDPR, and SSAE 18 certifications underpin enterprise readiness.
    The primary technology moats are the proprietary in-memory optimization engine, the 700+ customer data
    flywheel, and a multi-wave acquisition strategy that assembled specialist capabilities organically
    impossible to replicate at speed.

sections:
  - id: platform-architecture-core-tech
    title: Platform Architecture and Core Technology
    body: >-
      The RELEX Living Retail Platform is built on a single unified data model that encompasses the full
      planning chain from demand sensing through replenishment, space allocation, workforce scheduling, and
      production planning. This "single source of truth" architecture eliminates the data reconciliation
      overhead inherent in point-solution stacks, where separate demand, replenishment, and space tools
      must be synchronised through fragile batch ETL pipelines. RELEX's platform stores all planning data
      in a shared in-memory layer that enables simultaneous computation across millions of SKU-location
      combinations — a design choice that differentiates it from cloud-native competitors whose columnar
      database approaches impose latency penalties at the scale of large food retailers or home improvement
      chains operating more than 100,000 active SKUs per store.

      The platform is deployed as cloud-native SaaS on Amazon Web Services (AWS) with multi-tenant
      architecture and isolated customer instances, ensuring data separation while sharing the underlying
      optimisation infrastructure. For the minority of customers on legacy contracts, an on-premise
      deployment option is maintained, though RELEX's go-forward strategy is SaaS-primary. The integration
      layer is API-first: REST APIs, EDI, and SFTP protocols are supported alongside pre-built connectors
      for SAP (S/4HANA, ECC, IBP), Oracle, Infor, and Microsoft Dynamics. Near-real-time POS and ERP data
      ingestion ensures that replenishment decisions reflect the latest store-level sales and inventory
      positions rather than yesterday's batch file. The optimisation engine is built on constraint-based
      programming combined with machine-learning-based forecasting, allowing RELEX to solve complex
      multi-variable planning problems — such as balancing shelf fill rate against waste targets for fresh
      categories — that pure LP solvers cannot handle within acceptable planning cycle times.
