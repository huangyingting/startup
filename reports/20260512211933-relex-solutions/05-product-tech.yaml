  - id: ai-ml-capabilities
    title: AI and Machine Learning Capabilities
    body: >-
      RELEX's AI strategy spans three maturity levels: production-grade ML forecasting, a deployed
      conversational AI assistant, and early-stage agentic automation pilots. At the foundation, the
      ML-based forecasting engine trains per-customer models on two to five years of SKU-level sales
      history, incorporating external signals including weather, local events, and promotional calendars.
      Unlike off-the-shelf forecast libraries, RELEX trains distinct model families for different product
      categories — fresh, ambient, seasonal, and fashion — and continually retrains as new data arrives.
      The competitive differentiation from accumulated training data across 700-plus customers means RELEX's
      base model priors are calibrated on a breadth of retail environments that a newly launched competitor
      cannot replicate. RELEX refers to this as its "accumulated intelligence" data flywheel.

      Rebot, RELEX's conversational AI assistant, was receiving more than 60,000 queries per month as of
      2025 H1. Planners use Rebot to interrogate forecast anomalies, generate replenishment exception
      reports, and query what-if scenarios in natural language rather than navigating tabular planning
      views. Rebot represents the first layer of human-AI collaboration within planning workflows, reducing
      the cognitive overhead of exception management in high-SKU environments.

      The most forward-looking investment is in agentic AI. In 2025, RELEX piloted "autonomous
      replenishment agents" for low-touch commodity categories — non-seasonal ambient SKUs where demand
      patterns are stable enough for the AI agent to close replenishment orders without planner review.
      RELEX Open, launched on 7 May 2026, formalised the extensibility framework with three layers:
      Deploy (pre-configured AI agents for common planning tasks), Connect (MCP — Model Context Protocol —
      for integrating external AI agents and LLM tools into RELEX workflows), and Extend (custom agent
      development APIs for systems integrators and enterprise developers). The MCP layer is significant
      because it positions RELEX as an AI orchestration hub rather than a closed application, enabling
      customers to embed third-party LLMs or in-house AI models alongside RELEX's native capabilities.

      Computer vision integration — shelf-scanning robots feeding real-time out-of-stock signals into
      demand sensing — is in active development as of 2026, with pilot deployments not yet at production
      scale. This represents the next frontier of the data flywheel: moving from transaction-based signals
      to real-time physical-world observations. With only two patents filed publicly, RELEX's IP moat
      depends primarily on trade-secret protection of its model architectures and the depth of its
      training data, rather than formal patent barriers.
