  - id: technology-moat-competitive-positioning
    title: Technology Moat, Build vs Buy, and Competitive Positioning
    body: >-
      RELEX's technology moat has three reinforcing layers. The first is the in-memory processing engine,
      which handles the combinatorial complexity of multi-echelon, multi-SKU planning problems at a speed
      that pure cloud-native database architectures cannot match for very large retailers. The Home Depot,
      a customer with annual revenues exceeding $150 billion and more than 2,300 stores, relies on RELEX
      for enterprise-scale replenishment — an implicit benchmark that narrows the competitive shortlist to
      fewer than five vendors globally. The second layer is the 700-plus customer data flywheel: ML
      forecasting models trained across retailers in Europe, North America, and APAC embed category-level
      structural knowledge (e.g., demand elasticity shapes, promotional uplift distributions, seasonal
      curves by climate zone) that require years of deployment to develop. The third layer is the unified
      data model, which creates switching cost through deep ERP integration, custom business rules, and
      accumulated planning parameters that are expensive and time-consuming to replicate in a competing
      platform. Implementation cycles of twelve to twenty-four months for full multi-module deployment
      are a barrier to entry from a competitor's perspective and create high churn-inertia from the
      customer's perspective.

      On the build-versus-buy dimension, RELEX has been disciplined: core optimisation engine and
      forecasting ML were built in-house (trade secret); vertical specialists (fresh, workforce, promotions,
      production) were acquired when organic build would have taken three or more years; and go-to-market
      capacity is amplified through system integrator partnerships with Wipro, Accenture, Capgemini, CGI,
      Infosys, DXC Technology, IBM, and Mindtree. The RELEX Open framework (2026) is a strategic pivot
      toward becoming an AI platform layer — not just a planning application — which could expand the
      total addressable market to include enterprise customers building custom AI planning agents on
      RELEX's data and optimisation infrastructure. The primary competitive risk is SAP's deepening
      integration of IBP (Integrated Business Planning) into S/4HANA cloud environments, which reduces
      the switching friction for existing SAP ERP customers to adopt SAP's native planning tools rather
      than a best-of-breed alternative.
