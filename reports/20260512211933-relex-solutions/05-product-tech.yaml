  - id: product-module-portfolio
    title: Product Module Portfolio
    body: >-
      RELEX's nine planning modules represent both organic R&D and a disciplined multi-wave acquisition
      strategy that assembled specialist capabilities faster than internal development would have permitted.
      The core modules — Demand Forecasting & Sensing, Inventory Optimisation & Replenishment, and Supply
      Chain Planning (S&OP/IBP) — were developed in-house and constitute the original platform. Five
      additional capability areas arrived via acquisition: Galleria (2016, category and space planning),
      Zenopt (2019, workforce management and shift scheduling), Formulate (2022, promotions and pricing
      planning), Optimity (January 2024, production planning and scheduling for manufacturers and CPG),
      and Ida (December 2025, store-level fresh and perishables ordering for grocery). Each acquired
      capability was integrated onto the shared data model, rather than left as a standalone module
      with API coupling, which is the primary differentiator versus platform aggregators.

      The ninth module — Fresh/Perishables Ordering — addresses a critical gap in grocery where
      AI-driven day-part ordering for bread, chilled ready meals, and produce must account for remaining
      shelf life, promotional uplift, and weather-driven demand shifts simultaneously. The Ida acquisition
      (December 2025) brought proprietary algorithms purpose-built for these fresh constraints. Together,
      the nine modules address the full "plan-to-shelf" lifecycle for retailers and the "plan-to-produce"
      lifecycle for manufacturers — positioning RELEX to serve both sides of the consumer goods value
      chain from a single contract, which simplifies procurement and increases switching cost materially.
      Gartner Peer Insights reviewers describe the integrated offering as the "living retail platform,"
      rating it 4.5 out of 5.0 as of 2025.
