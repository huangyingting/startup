company:
  name: RELEX Solutions
chapter:
  number: 6
  title: Customers
  summary: >-
    RELEX Solutions serves 700+ enterprise customers globally as of end-2025, anchored in grocery,
    general merchandise, drug/convenience, and specialty retail verticals. Named logos span The Home
    Depot, AutoZone, PetSmart, Dollar Tree, Circle K, Coles, M&S Food, ICA, El Corte Inglés, Rossmann,
    Rituals, and Hy-Vee. Published ROI benchmarks show 10–30% inventory reduction, 20–40% food-waste
    reduction, and 15–25% service-level improvement, with 12–18 month payback periods. Seventy-four
    consecutive quarters of ARR growth imply negligible churn, and NRR is estimated at 110–120%.
    An April 2026 layoff event in Finland introduces some customer-success execution risk.

sections:
  - id: customer-base-overview
    title: Customer Base Overview and ICP Definition
    body: >-
      RELEX serves more than 700 enterprise customers worldwide as of end-2025, having added nearly
      100 net-new logos in 2025 alone. The company's ideal customer profile (ICP) is a large
      enterprise retailer or manufacturer with annual revenues exceeding $500 million, high SKU
      velocity, complex multi-echelon distribution networks, and meaningful perishable or short-shelf-
      life inventory exposure. Within that ICP, the highest-value segment is grocery and fresh-food
      retail: perishability creates acute waste-reduction ROI that justifies RELEX's premium price
      point, and grocery chains typically operate hundreds to thousands of stores, producing large
      ARR per account. Secondary ICP segments include home improvement, drug and convenience, discount
      and value retail, and specialty consumer goods brands. RELEX explicitly does not target the SME
      segment (sub-$200 million revenue companies) due to implementation complexity and the data-
      readiness requirements of its AI models. The customer base is geographically weighted toward
      EMEA (primarily Finland, Nordics, Germany, UK, Iberia, and Benelux), with North America as the
      fastest-growing region and APAC nascent (Coles in Australia being the primary beachhead). Named
      global logos include The Home Depot, AutoZone, PetSmart, Dollar Tree and Family Dollar, Circle K,
      Coles (Australia), M&S Food (Marks & Spencer), ICA Sweden, El Corte Inglés (Spain), Rossmann
      (Germany/Europe), Rituals (cosmetics), ADUSA (Delhaize US), Hy-Vee (Iowa, ~280 stores),
      Douglas (EU beauty), COSMOS Pharmaceutical, Carhartt, Vita Coco, and The Body Shop. The breadth
      of verticals and geographies covered demonstrates platform versatility, though it also creates
      implementation complexity that RELEX manages through a network of global system-integrator
      partners including Wipro and Cognizant.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008]
    tableRefs: [TU001]
    figureRefs: [FU001, FU002]

  - id: roi-evidence-and-outcomes
    title: ROI Evidence and Customer Outcome Claims
    body: >-
      RELEX publishes aggregate outcome benchmarks derived from its installed base, corroborated by
      independent analyst validation. Published ranges as of May 2026 include: 10–30% reduction in
      total inventory levels, 20–40% reduction in food waste across perishable categories, and 15–25%
      improvement in product availability or service levels. Payback periods are cited at 12–18 months
      for typical enterprise deployments. These figures are consistent with Nucleus Research's
      independent ROI validation of RELEX's supply-chain planning platform, which affirmed that
      customers achieve substantial positive return within the first year of deployment. Individual
      case studies reinforce the aggregate benchmarks: Hy-Vee (Iowa grocery chain, ~280 stores) selected
      RELEX in 2026 specifically to strengthen product availability and reduce fresh-product waste,
      aligned with the 20–40% waste-reduction claim. Forever Cheese (specialty food distributor)
      implemented RELEX across three distribution centres in 2026 to improve forecast accuracy and
      replenishment efficiency. Douglas (EU beauty retailer) expanded its RELEX deployment across
      European markets in 2026, demonstrating multi-region platform scalability and customer willingness
      to expand scope. M&S Food (Marks & Spencer UK) is a long-standing grocery customer whose
      continued engagement with RELEX across fresh and ambient categories illustrates the stickiness of
      the platform in demanding perishable retail environments. The Home Depot and AutoZone represent
      the big-box and auto-parts verticals, proving that RELEX's forecasting engine generalises beyond
      food retail. One structural limitation is that most ROI data is company-published or customer-
      attributable via press releases rather than independently audited third-party case studies;
      Nucleus Research provides partial external validation but the full ROI distribution across 700+
      customers is not public.
    claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017]
    tableRefs: [TU002]
    figureRefs: [FU005]

  - id: retention-expansion-contract-signals
    title: Retention, Expansion, and Contract Structure Signals
    body: >-
      RELEX has delivered 74 consecutive quarters of ARR growth—equivalent to approximately 18.5 years
      of uninterrupted revenue expansion—without any publicly disclosed period of ARR contraction. This
      metric is the strongest available proxy for retention, as any significant churn event would
      break the growth streak. Net Revenue Retention (NRR) is not publicly disclosed, but based on the
      combination of new logo growth (nearly 100 net-new customers in 2025), module expansion patterns
      documented in customer case studies, and the 74-quarter growth record, NRR is estimated at
      110–120%, consistent with best-in-class enterprise SaaS platforms. Contract structure is
      subscription-based with multi-year terms; publicly available case studies reference multi-year
      implementation and operational engagements with major retail chains. Module expansion is a key
      expansion vector: customers typically begin with demand forecasting and replenishment, then
      expand into space planning, workforce management, promotions optimisation, and (following the
      Optimity acquisition) production planning and scheduling. RELEX reported a 62 NPS in 2024,
      above the SaaS industry average of approximately 40, providing an additional proxy for customer
      satisfaction and reference-ability. Evidence of customer expansion in 2026 includes Douglas's
      pan-European scope expansion and the continued engagement of long-standing grocery accounts.
      Multi-year contract terms and deep data-model integration (RELEX embeds its shared data model
      tightly into customer ERP, POS, and warehouse systems) create switching costs that reinforce
      retention. No major publicly disclosed customer defections or contract terminations have been
      identified in the research window.
    claimRefs: [CU018, CU019, CU020, CU021, CU022, CU023, CU024, CU025]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: customer-concentration-and-geography
    title: Customer Concentration, Geography, and Vertical Mix
    body: >-
      RELEX's 700+ enterprise customers are distributed across more than 40 countries, with EMEA
      representing the dominant share of ARR (estimated 60–65% of total ARR), North America
      approximately 25–30%, and APAC under 10%. The top-10 customers are not publicly disclosed as
      individual revenue contributors, but given the breadth of the named-logo list and the 700+
      total count, single-customer concentration risk is considered moderate: the largest accounts
      (The Home Depot, Dollar Tree, Coles) are likely material but not dominant. By vertical, grocery
      and food retail constitutes approximately 40–45% of customers, reflecting RELEX's founding
      focus and strongest competitive differentiation. General merchandise and home improvement
      (Home Depot, AutoZone) account for approximately 15–20%; drug/convenience (Circle K, COSMOS
      Pharmaceutical, Rossmann) 10–15%; specialty retail and CPG (Rituals, Carhartt, Vita Coco,
      The Body Shop) 10–15%; and other verticals (wholesale, distribution, manufacturing) the
      remainder. The growing CPG and manufacturing segment is partly driven by the Optimity
      acquisition, which added upstream production-planning customers. Geographic expansion into
      North America is RELEX's declared priority: the Atlanta-based US hub has grown to approximately
      363 employees, and North American wins (Home Depot, AutoZone, PetSmart, Dollar Tree, Circle K,
      Hy-Vee) demonstrate real traction. The UK/EU base remains strong with Coles (APAC) as a
      strategic outlier. An April 2026 restructuring that included layoffs in the Finnish headquarters
      introduced some uncertainty around the customer-success and professional-services capacity that
      supports retention and onboarding; this is flagged as a material adverse signal that warrants
      monitoring.
    claimRefs: [CU026, CU027, CU028, CU029, CU030, CU031, CU032, CU033]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: reference-ability-and-nps-proxies
    title: Reference-ability, NPS, and Customer Voice
    body: >-
      RELEX demonstrates strong reference-ability across its customer base. The company publishes
      named customer case studies and press announcements for a significant fraction of its 700+
      accounts, a level of transparency unusually high for a private enterprise software company.
      Key reference customers span multiple verticals and geographies, giving prospective buyers
      access to peer-validated evidence relevant to their own use cases. RELEX's 2024 NPS of 62 is
      the single most important published satisfaction metric; at 62 it exceeds the SaaS industry
      average (~40) and is consistent with the reference-ability and retention signals described
      above. Independent review platforms reinforce positive customer sentiment: Gartner Peer
      Insights reviews for RELEX consistently highlight forecast accuracy, ease of replenishment
      configuration, and the unified data model as differentiators, with composite ratings above
      4.3 out of 5.0 on that platform as of early 2026. Nucleus Research validated RELEX's ROI
      claims independently in its 2025 Supply Chain Planning Technology Value Matrix, placing
      RELEX in the Leader quadrant and affirming that customer-reported ROI is achievable within
      the published timeframes. The adverse note is that no independent third-party audit of churn
      rates, NRR, or NPS calculation methodology has been published; all satisfaction metrics are
      company-reported or derived from voluntary review platforms, which carry self-selection bias.
      The April 2026 Finnish layoffs, while primarily affecting back-office and some R&D roles, may
      impact customer-success team capacity and create short-term onboarding delays for new accounts
      won in late 2025 and early 2026. Diligence should seek direct NPS audit, churn cohort data,
      and confirmation of post-restructuring customer-success headcount adequacy.
    claimRefs: [CU034, CU035, CU036, CU037, CU038, CU039, CU040]
    figureRefs: [FU006]

