callouts:
  - calloutType: strength
    title: Deep Enterprise Roster Across Seven Verticals
    body: >-
      RELEX has assembled a 700+ enterprise customer base including marquee logos across grocery
      (Coles, M&S Food, ICA, Hy-Vee), home improvement (The Home Depot), discount (Dollar Tree,
      Rossmann), drug/convenience (Circle K, COSMOS), specialty (Rituals, Carhartt), and beauty
      (Douglas, The Body Shop). This vertical and geographic breadth signals platform versatility
      and de-risks single-vertical dependency.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007]

  - calloutType: strength
    title: 74-Quarter Growth Streak Is a Structural Churn Proxy
    body: >-
      No enterprise SaaS company sustains 74 consecutive quarters of ARR growth without strong
      gross dollar retention. This metric, while not a direct disclosure of churn rates, is
      effectively a ceiling on cumulative churn and validates that the platform delivers
      sufficient value to prevent mass contract terminations across economic cycles.
    claimRefs: [CU018, CU021, CU022]

  - calloutType: risk
    title: April 2026 Layoffs Create Customer-Success Execution Risk
    body: >-
      Finnish media reported restructuring at RELEX's Helsinki headquarters in April 2026, including
      layoffs that may affect customer-success and professional-services teams. While RELEX frames this
      as efficiency improvement, any reduction in CS capacity during a period of rapid North American
      customer growth could slow onboarding, reduce expansion ARR, and elevate churn risk at the
      margin. Diligence should confirm post-restructuring CS headcount by region.
    claimRefs: [CU033, CU038, CU039]

  - calloutType: risk
    title: NRR, Churn Rate, and Customer Concentration Are All Undisclosed
    body: >-
      RELEX does not publicly disclose NRR, gross dollar retention, per-customer revenue
      contribution, or churn cohort data. The absence of these metrics — standard for public SaaS
      but absent for private RELEX — creates a diligence gap. Investors must require disclosure of
      these KPIs in due diligence to validate the NRR 110–120% estimate and assess concentration risk.
    claimRefs: [CU040]

