callouts:
  - calloutType: insight
    title: RELEX Is Growing at 2.4x the Market CAGR
    body: >-
      At 28% ARR growth versus an 11.75% market CAGR, RELEX is compounding market share. If this
      differential sustains through 2028, RELEX's share of the $14.75B SCP market would grow from
      ~3.2% today to approximately 5–6%, still leaving substantial whitespace for continued expansion.
    claimRefs: [CM008, CM009]

  - calloutType: risk
    title: Market Boundary Ambiguity Inflates TAM
    body: >-
      Third-party SCP market sizing estimates vary by a factor of 2.6x ($14.75B vs $38.51B)
      depending on market definition. Investors should apply the narrower $14.75B SCP-only estimate
      when evaluating RELEX's market share and headroom. Using the broader SCM market inflates
      apparent opportunity and understates current penetration.
    claimRefs: [CM027, CM028]

  - calloutType: strength
    title: ESG-Driven Mandates Create a Second Commercial Vector
    body: >-
      EU CSRD disclosure requirements and the Farm-to-Fork food waste reduction targets create
      regulatory demand that is separate from pure productivity ROI — making RELEX's sustainability
      narrative a compliance vector, not just a value-add story. This is particularly powerful
      in European retail where sustainability mandates carry board-level accountability.
    claimRefs: [CM018, CM019]

