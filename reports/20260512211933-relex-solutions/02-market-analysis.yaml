  evidenceGaps:
    - type: missing-source
      severity: material
      topic: North American market share
      missingEvidence: >-
        RELEX has not disclosed its North American ARR contribution, win rate, or specific market
        share versus Blue Yonder and Kinaxis in North America. Third-party sources do not provide
        disaggregated regional SCP market share data.
      whyItMatters: "North America is RELEX's primary growth frontier and largest addressable region."
      diligencePath: "Request disaggregated ARR by region from company; cross-reference with Kinaxis public quarterly filings."
      relatedQuestionRefs: [QM003, QM013]

    - type: missing-source
      severity: minor
      topic: cloud-native SCP sub-market sizing
      missingEvidence: >-
        No analyst report specifically segments cloud-native best-of-breed SCP (excluding ERP-embedded
        and on-premise); the $14.75B estimate includes revenue streams not in RELEX's addressable market.
      whyItMatters: "A cloud-native-only TAM would give a more accurate picture of RELEX's actual penetration."
      diligencePath: "Commission targeted analyst research or request Gartner data on cloud-native SCP vendor revenues."
      relatedQuestionRefs: [QM011, QM015]

    - type: private-evidence-only
      severity: minor
      topic: average deal size and ACV
      missingEvidence: >-
        RELEX has not disclosed average ACV, deal size range, or median contract duration in public
        communications. The $1M–$10M ACV range is estimated from comparable enterprise SCP peers.
      whyItMatters: "ACV informs both growth efficiency (CAC/ACV) and buyer personas for sizing the enterprise-only market."
      diligencePath: "Request deal-size distribution and average ACV from company's investor data room."
      relatedQuestionRefs: [QM018, QM025]

    - type: missing-source
      severity: minor
      topic: APAC market presence
      missingEvidence: >-
        RELEX's APAC (specifically Japan, Hong Kong, Australia) customer base and revenue contribution
        are not publicly disclosed. While Coles (Australia) is a named customer, no APAC ARR
        breakdown is available.
      whyItMatters: "APAC is the fastest-growing SCP region; RELEX's penetration matters for long-term share potential."
      diligencePath: "Request APAC ARR contribution and customer count by region from company."
      relatedQuestionRefs: [QM020]

    - type: missing-source
      severity: minor
      topic: regional/vertical SCP competitors
      missingEvidence: >-
        Regional SCP specialists (e.g. OMP in CPG, Infor SCP in distribution, GAINS in mid-market)
        and system-integrator-embedded solutions are poorly covered by public analyst research;
        the full competitive landscape at the regional level cannot be established.
      whyItMatters: "Untracked regional competitors could represent meaningful competition for RELEX's expansion into new markets."
      diligencePath: "Review Gartner Peer Insights and Forrester Wave for additional named vendors; cross-reference RFP databases."
      relatedQuestionRefs: [QM014]

    - type: private-evidence-only
      severity: minor
