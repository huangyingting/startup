      - number: '6.2'
        title: ROI 证据与客户成果主张
        blocks:
          - type: paragraph
            body: >-
              RELEX 发布的汇总成果基准来自装机客户群，并得到独立分析机构验证支撑。截至 2026 年 5 月，公开区间包括：总库存水平降低 10–30%、易腐品类食物浪费降低 20–40%、商品可得性或服务水平提升
              15–25%。典型企业部署的回本期被引用为 12–18 个月。这些数字与 Nucleus Research 对 RELEX 供应链规划平台的独立 ROI
              验证一致；该验证确认客户可在部署第一年取得显著正回报。单个案例研究强化了汇总基准：Hy-Vee（Iowa 杂货连锁，约 280 家门店）在 2026 年选择 RELEX，明确是为了提升商品可得性并降低生鲜浪费，与
              20–40% 减损主张一致。Forever Cheese（专业食品分销商）在 2026 年将 RELEX 部署到 3 个配送中心，以提升预测准确度和补货效率。Douglas（欧盟美妆零售商）在 2026 年将
              RELEX 部署范围扩展到多个欧洲市场，证明平台可跨区域扩张，也说明客户愿意扩大使用范围。M&S Food（英国 Marks & Spencer）是长期杂货客户，持续在生鲜和常温品类使用
              RELEX，体现平台在要求很高的易腐零售环境中的粘性。The Home Depot 和 AutoZone 代表大卖场与汽车零部件垂直行业，证明 RELEX 的预测引擎可泛化到食品零售之外。一个结构性限制是，多数
              ROI 数据由公司发布，或由客户新闻稿归因，缺少独立审计的第三方案例研究；Nucleus Research 提供了部分外部验证，但 700+ 客户的完整 ROI 分布并未公开。
