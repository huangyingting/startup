      - number: '7.2'
        title: 运营与执行风险
        blocks:
          - type: paragraph
            body: >-
              最直接的运营风险来自 RELEX 2026 年 4 月重组：约 722 名芬兰员工中，最多 288 人收到潜在裁员通知，约占 Helsinki 员工的 40%。CEO Mikko Kärkkäinen
              将理由描述为需要「用更小的团队把事情做得更快」，释放的是效率驱动转型信号，而不是财务危机。即便如此，最关系实施质量的客户成功、专业服务和 R&D 职能，仍可能在转型期受损。RELEX 的典型实施周期为 6–24
              个月；专属实施团队任何中断，都会带来项目时间表风险，可能推迟客户上线、触发合同罚则，或降低净收入留存。重组还在全球范围内带来员工士气和人才留存风险：非芬兰办公室的高绩效员工看到芬兰裁员
              40%，可能主动离职，削弱机构知识深度。从供应链角度看，RELEX 是软件公司，因此实体供应链中断不是主要敞口。不过，对 AWS、Azure 等超大规模云厂商的云基础设施依赖，构成运营可用性风险——RELEX 的
              SLA 表现与上游云可靠性共同决定。公司的 ISO 27001 和 SOC 2 Type II 认证覆盖信息安全，但无法消除强制缩编情境下的业务连续性敞口。
