      - number: '5.4'
        title: 安全、合规与企业级准备度
        blocks:
          - type: paragraph
            body: >-
              RELEX 的安全与合规状态，与服务 Tier 1 零售商和全球 CPG 制造商的企业软件要求相匹配。公司持有信息安全管理体系 ISO 27001 认证，拥有覆盖 SaaS 平台安全性、可用性和保密性控制的
              SOC 2 Type I 和 Type II 报告，处理欧盟客户数据时遵守 GDPR。SSAE 18 / AT-C 320 审计标准规范第三方对内部控制的报告；美国上市公司评估用于 SOX 相关工作流的 SaaS
              供应商时，采用的也是同一框架。

              企业采购团队筛选供应链规划供应商时，ISO 27001 与 SOC 2 Type II 的组合通常是进入候选名单的最低门槛；这类软件会处理商业敏感的 SKU 级销售数据和利润率信息。按合规要求看，RELEX
              的认证水平与 Kinaxis、Blue Yonder 等直接竞品相当；同时，RELEX 源自芬兰的云基础设施（AWS 欧盟区域）为受到严格 GDPR 解释约束的欧洲企业客户，提供了额外的数据驻留卖点。GDPR
              合规落在数据处理协议、跨境传输的欧盟 Standard Contractual Clauses，以及专门的数据保护职能上。

              EU AI Act 对 RELEX 构成前瞻性合规义务；该法将从 2026 年 8 月起正式适用于高风险 AI 系统。影响就业决策（例如人力排班）或关键供应链运营的 AI 补货和生产规划系统，可能落入法案
              Annex III 下的「高风险」分类。RELEX 已承认这一敞口，并在开发合规框架；但截至 2026 年 5 月研究日，高风险系统所需的内部 AI
              登记册、偏见测试协议和人工监督机制尚未公开披露。这是潜在投资人应提出的尽调要求。
