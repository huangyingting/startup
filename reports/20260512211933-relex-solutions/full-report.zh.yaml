      - number: '3.3'
        title: ERP 内嵌存量厂商：SAP IBP 与 Oracle SCP
        blocks:
          - type: paragraph
            body: >-
              SAP Integrated Business Planning（IBP）嵌在 SAP ERP 生态中，可触达 SAP 300M+ 用户装机基础。SAP IBP 在 S/4HANA 架构内覆盖需求感知、S&OP
              和供应规划，定价通常打包进更大的 ERP 合同。它的主要竞争优势是采购摩擦：已经运行 SAP ERP 的企业默认更容易选择 IBP。不过，市场普遍认为 SAP IBP 并非零售特定用例的同类最佳；24–48
              个月实施周期和复杂许可结构，使许多 SAP 客户把 RELEX 作为专精型叠加层来评估。SAP 正在推进的 S/4HANA 迁移潮，对 RELEX
              是双刃剑：部分企业借迁移机会评估规划层替代方案，创造替换机会；另一些企业则选择集中到 SAP IBP，以降低供应商复杂度。Oracle Supply Chain Planning 嵌在 Oracle Fusion
              Cloud 中，主要在 Oracle ERP 装机基础强的制造业垂直竞争；在杂货和食品零售规划上，它相对 RELEX 的差异化更弱。SAP 和 Oracle 在零售 SCP
              细分中都面临结构劣势，因为它们的规划模块原本面向制造型规划周期（数周到数月），而非零售高周转库存补货周期（小时到天）。定价对比表显示，ERP
              内嵌规划的感知初始成本最低，但在所有竞争对手类别中，价值兑现时间最长，实施总复杂度最高。
