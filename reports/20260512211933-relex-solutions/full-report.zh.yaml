      - number: '1.6'
        title: 不利因素与风险信号
        blocks:
          - type: paragraph
            body: >-
              几项不利指标值得投资者关注。第一，RELEX 经营层面长期亏损：芬兰母实体 FY2024 EBIT 为 -7.5%（经营亏损 -€22M），法定口径尚未披露过全年经营利润。亏损已从 2022 年 -€26.4M
              收窄，趋势在改善，但在利率上行环境中，持续亏损会制造资本依赖。第二，市场观察者和 SWOT 分析师指出，RELEX 在北美的品牌认知弱于 SAP 和
              Oracle；北美对公司下一阶段增长至关重要。公司“高度依赖欧洲”，必须投入大量资源来加速北美市场份额提升。第三，RELEX 定价偏高，多模块实施周期复杂（完整部署有时需 12–24
              个月），限制了中型客户可及性并拉长价值兑现时间，在漫长上线过程中制造流失风险。第四，公司尚未披露清晰 IPO 或流动性时间表。Blackstone 与 TCV 的 2024 年 12 月二级交易解决了
              Summit Partners 的退出，但追求近期公开市场流动性的投资者仍面临不确定性。第五，随着公司扩大全球组织，围绕三位联合创始人的关键人集中仍是治理风险。
