      - number: '5.5'
        title: 技术护城河、自研外购与竞争定位
        blocks:
          - type: paragraph
            body: >-
              RELEX 的技术护城河由三层相互强化的能力构成。第一层是内存处理引擎，它能以纯云原生数据库架构在超大型零售商场景中难以匹敌的速度，处理多层级、多 SKU 规划问题的组合复杂度。The Home Depot
              年收入超过 $150B、门店超过 2,300 家，依赖 RELEX 做企业级补货；这一隐性标杆把全球可选供应商名单压缩到不足 5 家。第二层是 700+ 客户数据飞轮：在欧洲、北美和 APAC 零售商中训练的
              ML 预测模型，嵌入了品类级结构性知识（例如需求弹性形状、促销拉升分布、按气候带划分的季节曲线），这些知识需要多年部署才能长出来。第三层是统一数据模型，它依靠深度 ERP
              集成、自定义业务规则和累积的规划参数创造切换成本；竞品平台复制这些东西既贵又耗时。完整多模块部署通常需要 12–24 个月，这从竞品视角构成进入壁垒，也从客户视角形成强流失惯性。

              在自研与外购取舍上，RELEX 保持了纪律：核心优化引擎和预测 ML 自研（商业秘密）；生鲜、人力、促销、生产等垂直专家能力，若内部建设需要 3 年以上就用并购补齐；市场拓展能力则借助与
              Wipro、Accenture、Capgemini、CGI、Infosys、DXC Technology、IBM 和 Mindtree 等系统集成商的合作放大。RELEX Open 框架（2026
              年）是一次战略转向：公司希望成为 AI 平台层，而不只是规划应用；这可能把总可服务市场扩展到那些基于 RELEX 数据和优化基础设施构建自定义 AI 规划智能体的企业客户。主要竞争风险来自 SAP 对
              IBP（Integrated Business Planning）与 S/4HANA 云环境的进一步深度集成；这会降低现有 SAP ERP 客户采用 SAP 原生规划工具的切换摩擦，而不是转向同类最佳独立方案。
