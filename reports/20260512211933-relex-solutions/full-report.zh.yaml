      - number: '7.4'
        title: 竞争风险
        blocks:
          - type: paragraph
            body: >-
              进入 2026 年，RELEX 的竞争护城河受到多方向挑战。SAP IBP 保留结构性分销优势：SAP 装机基础超过 300M 企业用户，形成默认供应商选择机制，采购团队通常先评估 SAP
              原生规划方案，再考虑同类最佳替代品。SAP 正在为 IBP 主动加入生成式 AI 功能，包括 Joule AI 助手集成，这会收窄 RELEX 面向 SAP ERP 账户的 AI 差异化叙事。Blue
              Yonder（Panasonic 支持、Blackstone 投资）是 RELEX 在大型杂货和零售账户的 AI 原生供应链规划中最直接的竞品。Blue Yonder 的 2024–2026
              产品路线图聚焦机器学习驱动的自主补货和品类管理工具，直接打到 RELEX 主场。Kinaxis 这家加拿大上市供应链编排供应商（TSX: KXS），自 2024 年起通过并购策略明确扩张到零售垂直行业，瞄准
              RELEX 的核心食品零售细分市场。一个结构性新风险类别已经出现：来自超大规模 AI 厂商（OpenAI、Google DeepMind、Amazon）和专业物流 AI
              初创公司（Covariant、project44）的 LLM 原生规划工具，可能靠通用 AI 智能体交付实时需求感知和补货建议，从而绕开传统 SCP 软件，并把 RELEX 收取溢价的预测层商品化。RELEX
              的竞争回应——RELEX Open 和 Rebot AI 助手——方向正确；但如果大型科技公司的 AI 采用加速，可能仍不够。
