      - number: '7.3'
        title: 技术与产品风险
        blocks:
          - type: paragraph
            body: >-
              RELEX 2026 年 5 月推出 RELEX Open，这是面向 MCP（Model Context Protocol）连接、支持第三方 AI 智能体集成的平台；它实质性扩大了攻击面。基于 MCP
              的集成允许外部 AI 编排智能体查询、甚至写入 RELEX 的规划数据层，带来提示注入、数据外泄、权限提升等新风险类别，而公司此前的安全架构并非为此设计。RELEX 持有 ISO 27001 和 SOC 2
              Type II 认证，建立了基础信息安全控制；但 MCP 连接是 2026 年代的新威胁向量，通常不在 2025 年前认证范围内。AI/ML 模型漂移是第二个技术风险：RELEX 的需求预测模型基于客户
              POS、ERP 和市场数据训练。如果客户数据质量下降——原因可能是主数据管理薄弱、未披露促销活动，或供应扰动扭曲历史模式——RELEX 的预测准确度可能在没有明显触发点的情况下下滑，客户也可能误把退化归因于
              RELEX 算法，而不是输入数据质量。这会带来产品声誉风险和续约风险，且外部难以监控。高定价（大型企业典型 ACV 为 $1M–$10M）使 RELEX 客户基础集中在有足够 IT
              治理能力维护数据质量的公司；但若经济下行迫使客户削减 IT 预算，组合层面的数据质量风险可能上升。
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR030
              - CR036
              - CR043
