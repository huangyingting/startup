      - number: '5.3'
        title: AI 与机器学习能力
        blocks:
          - type: paragraph
            body: >-
              RELEX 的 AI 策略横跨三层成熟度：生产级 ML 预测、已部署的对话式 AI 助手，以及早期智能体自动化试点。底层是基于 ML 的预测引擎，它为每个客户基于 2–5 年 SKU
              级销售历史训练模型，并纳入天气、本地事件、促销日历等外部信号。不同于现成预测库，RELEX 针对生鲜、常温、季节性、时尚等不同产品类别训练不同模型族，并在新数据到来后持续再训练。700+
              客户积累出的训练数据带来竞争差异：RELEX 的基础模型先验，已经在广泛零售环境中校准；新入场竞品很难复制这种覆盖面。RELEX 将其称为「accumulated intelligence」数据飞轮。

              截至 2025 H1，RELEX 的对话式 AI 助手 Rebot 每月收到超过 60,000 次查询。规划人员用 Rebot
              以自然语言追问预测异常、生成补货例外报告、查询假设情景，而不是在表格化规划视图中来回导航。Rebot 是规划工作流中人机协同的第一层，降低了高 SKU 环境下例外管理的认知负担。

              最前瞻的投入在智能体 AI。2025 年，RELEX 针对低人工介入的大宗品类试点「自主补货智能体」——这些非季节性常温 SKU 的需求模式足够稳定，AI 智能体可在无需规划员复核的情况下关闭补货订单。2026
              年 5 月 7 日上线的 RELEX Open，以三层结构正式定义可扩展框架：Deploy（面向常见规划任务的预配置 AI 智能体）、Connect（MCP，即 Model Context
              Protocol，用于将外部 AI 智能体和 LLM 工具接入 RELEX 工作流）以及 Extend（面向系统集成商和企业开发者的自定义智能体开发 API）。MCP 层意义重大，因为它把 RELEX 定位成
              AI 编排枢纽，而不是封闭应用；客户可将第三方 LLM 或内部 AI 模型嵌入 RELEX 原生能力旁边。

              计算机视觉集成——由货架扫描机器人将实时缺货信号送入需求感知——截至 2026 年仍在积极开发中，试点部署尚未达到生产规模。这代表数据飞轮的下一条前沿：从基于交易的信号，走向实时物理世界观测。RELEX
              公开提交的专利只有 2 项，因此其知识产权护城河主要依赖模型架构的商业秘密保护和训练数据深度，而不是正式专利壁垒。
