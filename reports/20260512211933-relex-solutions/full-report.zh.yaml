      - number: '3.2'
        title: 直接竞争对手——专精型 SCP 厂商
        blocks:
          - type: paragraph
            body: >-
              Blue Yonder 2021 年被 Panasonic 以约 $7.1 billion 收购，运营 Luminate Platform，覆盖供应链规划和执行（WMS、TMS）。Blue Yonder 估算
              ARR 超 $1B，员工 6,000+，总部位于 Arizona Scottsdale，是 RELEX 在杂货和 CPG 领域最直接的企业级竞争对手。Blue Yonder 的强项是面向大型企业客户（收入
              >$1B）提供从执行到规划的广覆盖，但市场过去认为它迁移云原生架构较慢，服务交付占比也重于 RELEX。重要的是，Blue Yonder 在 2025 年推出 AI 原生需求预测能力，缩小了 RELEX 自
              2005 年创立以来在市场感知中的 AI 差异化优势。Kinaxis（TSX:KXS）总部在 Canada Ottawa，聚焦供应链控制塔，以及航空航天、国防和高科技制造的 S&OP；其
              RapidResponse 平台拥有同类领先的并发规划架构，但相较 RELEX，零售和杂货覆盖较弱。Kinaxis 估算 ARR 为 $500M，市值约 C$5B，是一家可信的大型企业竞争对手，并通过 2024
              年收购向零售扩张。o9 Solutions（估值 $3.7B，Dallas TX）提供 AI 原生一体化规划平台，尤其擅长 CPG/消费品和企业 S&OP；它在寻求统一规划的 CPG 制造商中与 RELEX
              直接竞争，也在高科技行业与 Kinaxis 竞争。o9 的 Gartner Peer Insights 评分确认了强劲企业采用，但其零售垂直深度明显窄于 RELEX
              专为零售打造的算法，包括易腐性建模、促销拉动和天气校正需求感知，这些能力已积累 18+ 年。
