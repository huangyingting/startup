      - number: '8.5'
        title: 牛市 / 基准 / 熊市情景分析
        blocks:
          - type: paragraph
            body: >-
              三种情景框定 RELEX 到 2027–2028 年的估值结果区间，从具备 IPO 条件并获得 AI 溢价，到执行不达预期且没有退出催化剂。基准情景——概率权重约 55%——假设 RELEX 维持当前
              25–30% ARR 增长轨迹，到 2027 年达到约 $500–550M ARR，通过利润率修复把 Rule of 40 改善至 25–30，并在二级交易或 IPO 场景下由机构投资人按 10–13x ARR
              定价，对应基准估值 $5B–$6B。牛市情景——概率权重约 25%——要求 RELEX 在 2026–2028 年向 NYSE 或 Nasdaq 提交 IPO 申请，验证其 AI 平台溢价（Rebot 智能体
              AI 获关键客户采用验证），把 Rule of 40 提升到 35 以上，并基于 $550–600M 预计 ARR 按 15–19x ARR 完成 IPO 定价，对应估值 $7B–$9B。熊市情景——概率权重约
              20%——假设 ARR 增速降至 15% 以下，任何既往重组或领导层变化引发执行担忧，2026–2028 年窗口内没有 IPO 落地，倍数压缩至 ~$467M ARR 的 7–8x，对应估值
              $3.5B–$4B。牛市概率信号来自：（1）Blackstone 持续承诺；（2）Rule of 40 轨迹改善；（3）关键客户赢单中的 AI 竞争证明。熊市概率信号来自：（1）ARR
              增速放缓；（2）大客户流失；（3）IPO 窗口推迟。下方《估值 / 回报区间》图和《牛市 / 基准 / 熊市情景》表呈现结构化输出。情景分析隐含的概率加权预期估值约为 $5.6B，略高于当前 $5.7B
              标记——说明在当前价格下，风险 / 回报大体均衡，但分布右偏（IPO 上行 > 困境熊市）。
