      - number: '2.5'
        title: 采用约束与市场逆风
        blocks:
          - type: paragraph
            body: >-
              尽管结构性顺风强劲，几项因素仍限制采用速度。第一，切换成本高：供应链规划深度接入 ERP、POS、WMS 和供应商数据系统。典型 RELEX 实施需要 12–24
              个月的数据迁移、配置和变革管理，即便现有系统表现不佳，也会形成存量黏性。第二，数据就绪度：许多潜在客户缺少 RELEX 兑现价值所需的 POS
              数据质量、主数据管理和集成架构。这会排除相当一部分中型零售商。第三，经济逆风：利率上升提高库存占用资本成本，促使企业优化——这是顺风——但也压缩 IT
              自由支配预算，推迟采购决策。第四，内部自研风险：Amazon、Walmart、Target 等技术能力强的大型零售商过去常自建自研规划工具，减少其对 SCP 软件 TAM 的贡献。第五，SAP 和 Oracle
              的供应商锁定效应：许多企业在 ERP + 规划上标准化为单一供应商套件，使 SAP IBP 即便在 RELEX 技术能力更强的场景中，也能在 SAP 客户中获得结构性先发。RELEX 已在多个大型客户处成功替换
              SAP IBP，但必须重投入售前，才能克服默认选择存量厂商的倾向。
            claimRefs:
              - CM022
