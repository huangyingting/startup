      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              自 2005 年以来，RELEX 已通过多轮融资累计获得约 $816 million 外部股权资本。最大一轮是 2022 年 2 月由 Blackstone Growth 领投的 $568 million
              Series D，确立了约 $5.7 billion 的投后估值——当时这是北欧未上市软件公司中规模最大的估值之一。TCV（Technology Crossover Ventures）最早在 2019 年 2 月
              $226 million Series C 中投资，此后一直是战略投资者。Summit Partners 早在 2015 年（Series B）即已投资，并在 2024 年 12 月完全退出；Blackstone
              和 TCV 通过二级交易买入 Summit 持股并增持。2024 年 12 月二级交易的财务细节未公开，但交易确认投资者信心仍在，也为早期轮次提供了部分流动性。2025 年 1 月，RELEX 从 Nordea
              Bank 获得 €10 million 绿色循环信贷额度，资金与可持续相关项目挂钩，说明公司除股权外也能获得债务资本。截至研究日期（2026 年 5 月），公司尚未公布 IPO 时间表；Blackstone
              主导的二级买断符合 2026–2028 年窗口内潜在 IPO 或进一步二级出售的情形，但公司没有作出承诺。芬兰母实体 FY2024 权益比率为
              47.1%，显示资产负债表资本化程度相对健康。经营亏损（芬兰实体：2024 年 EBIT -€8.71M，较 2022 年 -€26.4M 改善）更多反映公司继续投入 R&D 和国际扩张，而非结构性无盈利能力。
