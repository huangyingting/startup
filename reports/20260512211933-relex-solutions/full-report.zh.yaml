  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 高管风险概览
        blocks:
          - type: paragraph
            body: >-
              相比 2022 年融资高点，RELEX Solutions 进入 2026 年时风险画像已明显扩大。6 个主要风险维度需要投资人关注：（1）2026 年 4 月芬兰大幅减员后的运营执行，涉及 Helsinki
              员工约 40%；（2）EU AI Act（2026 年执法）和 GDPR 下的监管合规，两者都直接影响 RELEX 的 AI 驱动规划软件及其对消费者购买数据的处理；（3）来自 SAP IBP 捆绑 ERP
              优势、Blue Yonder AI 投资管线、Kinaxis 零售垂直推进的竞争压力；（4）财务风险，核心是 EBIT 为负的芬兰实体、陈旧的 2022 年估值，以及缺少公开 IPO
              时间表带来的流动性缺口；（5）围绕 CEO Mikko Kärkkäinen 和三位联合创始人的关键人物集中；（6）地域集中，估计 70%+ 收入来自
              EMEA，且北美品牌认知度相对老牌厂商仍有限。下方热力图按发生可能性和剩余影响评估每项风险。若干风险会相互传导——裁员引发的服务质量下降会放大竞争风险和客户流失概率——因此必须一体化监控。公司的认证安全状态（ISO
