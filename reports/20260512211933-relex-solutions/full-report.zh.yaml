      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >-
              RELEX 由三位芬兰供应链科学家共同创立：Mikko Kärkkäinen（Group CEO）、Johanna Småros（首席可持续发展官兼联合创始人）和 Michael
              Falck（联合创始人）。三人都曾在 Helsinki University of Technology（现 Aalto
              University）做研究，博士及博士后工作聚焦减少零售供应链中的浪费和低效。食品浪费和库存过剩带来的学术挫败感，促使他们创办商业软件公司，目标是提升消费品价值链效率。作为 Group CEO，Mikko
              Kärkkäinen 负责整体战略和外部关系；Johanna Småros 推动 RELEX 的可持续发展使命，并公开代表公司展示环境影响成果，例如帮助客户在 2024 年避免 350 million kg
              食品浪费。Michael Falck 是第三位联合创始人，持续参与产品和技术领导。三位创始人获评 Finnish Software Entrepreneur of the Year 2024，体现了同行和行业对
              RELEX 商业成功与负责任增长的认可。创始三人仍深度影响文化、愿景和客户关系，因此存在关键人集中风险；不过 RELEX 已在销售、工程、客户成功和运营上搭建更广的高管团队，支撑 21
              个国家的规模化。董事会主席是 Robert Delmar Burke（芬兰登记信息），Blackstone 与 TCV 在主要融资轮后委派董事进入董事会。
