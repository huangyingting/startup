  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 2024 年 12 月二级交易估值
        - 交易金额和隐含每股价格未披露
        - 验证或推翻 $5.7B 一级融资估值标记；这是 2022 年后唯一可能更新估值锚点的一手数据点
        - 向 Blackstone IR 或 TCV 索取；Krogerus（Helsinki）为该交易提供顾问服务
      - - 合并全球毛利率
        - 仅能取得芬兰母公司法定 P&L；全球 COGS 和毛利率未披露
        - 溢价倍数（>12x ARR）需要毛利率 ≥70%；若低于 65%，估值会压缩至熊市情景
        - 公司 data room；对标同业 Kinaxis 毛利率 77–80%，RELEX 未知
      - - 完整股权结构表和清算优先权
        - 优先股类别、清算优先权层级、反稀释条款未公开
        - 决定退出情景下的投资人回报分配；优先权悬置可能让有效股权价值低于名义估值
        - 公司 data room；法律顾问（Krogerus Helsinki 或 Hannes Snellman）
      - - IPO 时间表和董事会授权
        - 截至 2026 年 5 月，未提交 S-1 或招股书，也未公开宣布 IPO 顾问授权
        - 决定牛市情景的退出窗口和时间确定性；若 2027 年 IPO 授权落地，风险 / 回报会明显改变
        - 监控 SEC EDGAR 的 F-1 备案；跟踪投行 IPO 顾问聘任信号
      - - 合并 ARR 与 NRR 勾稽
        - GetLatka 的 $467M ARR 是第三方估算；RELEX 披露订阅收入增长百分比，但未按合并口径披露绝对 ARR 或 NRR 数据
        - ARR 和 NRR 是核心估值输入；未经验证的 ARR 会带来 ±10–15% 估值不确定性
        - 向公司索取经审计的合并 ARR 明细表和 NRR cohort 数据
    notes: 这些尽调问题对应会实质影响估值信心的证据缺口。若拿到上述五项数据，信心评级可从中提升至高；估值立场也可能从公允转为有吸引力（若毛利率和 NRR 证实其溢价定位），或转为昂贵（若披露财务显示单位经济弱于基准）。
    claimRefs:
      - CV018
      - CV038
      - CV043
      - CV044
