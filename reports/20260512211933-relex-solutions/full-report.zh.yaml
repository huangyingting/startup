      - number: '5.2'
        title: 产品模块组合
        blocks:
          - type: paragraph
            body: >-
              RELEX 的 9 个规划模块，既来自内部
              R&D，也来自纪律明确的多轮并购策略；后者让公司比纯内部开发更快拼出专业能力。核心模块——需求预测与感知、库存优化与补货、供应链规划（S&OP/IBP）——由公司自研，构成原始平台。另有 5
              个能力领域来自并购：Galleria（2016 年，品类与空间规划）、Zenopt（2019 年，人力管理与班次排程）、Formulate（2022 年，促销与定价规划）、Optimity（2024 年 1
              月，面向制造商和 CPG 的生产规划与排程）以及 Ida（2025 年 12 月，面向杂货零售的门店级生鲜和易腐品订货）。每项并购能力都被整合到共享数据模型上，而不是保留为仅靠 API 粘合的独立模块；这正是
              RELEX 相比平台聚合商的主要差异。

              第 9 个模块——生鲜 / 易腐品订货——补上了杂货零售中的关键缺口：面包、冷藏即食餐和果蔬等品类的 AI 驱动分时段订货，必须同时考虑剩余保质期、促销拉升和天气驱动的需求变化。Ida 并购（2025 年 12
              月）带来了专为这些生鲜约束设计的自研算法。9 个模块合在一起，覆盖零售商「从计划到货架」的全生命周期，以及制造商「从计划到生产」的全生命周期；RELEX
              因此可用一份合同服务消费品价值链两端，简化采购，并显著提高切换成本。Gartner Peer Insights 评价者将这一整合产品称为「living retail platform」；截至 2025 年，评分为
              4.5/5.0。
