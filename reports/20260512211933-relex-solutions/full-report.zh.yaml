      - number: '6.5'
        title: 可背书性、NPS 与客户声音
        blocks:
          - type: paragraph
            body: >-
              RELEX 的客户基础具备强可背书性。公司为 700+
              账户中的相当一部分发布具名客户案例和新闻公告；这种透明度对私有企业软件公司而言并不常见。关键背书客户跨越多个垂直行业和地域，使潜在买家能获得与自身用例相关、由同行验证的证据。RELEX 2024 年 NPS 为
              62，是最重要的公开满意度指标；62 分高于 SaaS 行业平均水平（约 40），也与上文的可背书性和留存信号一致。独立评价平台进一步支持正向客户情绪：截至 2026 年初，Gartner Peer
              Insights 上的 RELEX 评价持续突出预测准确度、补货配置便利性和统一数据模型这些差异点，平台综合评分高于 4.3/5.0。Nucleus Research 在 2025 年 Supply Chain
              Planning Technology Value Matrix 中独立验证 RELEX 的 ROI 主张，将 RELEX 置于领导者象限，并确认客户报告的 ROI
              可在公司公布的时间框架内实现。负面点在于，流失率、NRR 或 NPS 计算方法尚无独立第三方审计；所有满意度指标都由公司报告，或来自自愿评价平台，存在自选择偏差。2026 年 4 月芬兰裁员虽主要影响后台和部分
              R&D 岗位，但可能削弱客户成功团队产能，并让 2025 年末和 2026 年初新赢客户的上线短期延迟。尽调应要求直接 NPS 审计、流失分群数据，以及重组后按区域划分的客户成功人手是否充足的确认。
