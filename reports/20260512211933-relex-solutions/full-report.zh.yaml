  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 执行建议
        blocks:
          - type: paragraph
            body: >-
              本估值章节把第 1–7 章证据转化为 RELEX Solutions 截至 2026 年 5 月的结构化投资建议。建议为跟踪，置信度中、风险评级中。RELEX 拥有真正差异化的统一供应链规划平台，ARR 以
              28% CAGR 增长且连续 74 个季度扩张，并获得 Blackstone 和 TCV 的强机构背书。但 $5.7B 估值标记已过去 4 年，公司仍未披露合并全球财务，Rule of 40 约
              20，低于通常支撑 SaaS 溢价倍数的 ≥40 门槛；截至 2026 年 5 月也未公布 IPO 催化剂。当前隐含 12x ARR 倍数下，估值立场为公允：RELEX 的定价与 o9
              Solutions、Kinaxis 等第一梯队 SCP SaaS 同业一致，但尚未具备 Rule of 40 达标或已确认退出事件所支撑的溢价。以 $5–6B 进入或持有是理性的；任何高于 $6.5B
              的进入，都需要看到毛利率超过 70%、ARR 增速重新超过 30%，或已确认的 IPO 顾问聘任。下方《建议摘要》表和《投资
              KPI》图呈现结构化评分。《建议逻辑》流程把证据链映射到跟踪结论，并纳入正向论证和反向论证信号。
