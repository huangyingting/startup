      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >-
              RELEX 的理想客户画像（ICP）聚焦大型企业级零售商和制造商：它们在生鲜及一般商品品类中拥有高周转、高 SKU 数量的库存。主要买方角色是首席供应链官（CSCO）或供应链
              VP/SVP，掌握供应链软件预算，并对服务水平、库存周转和减废负责。次级买方包括首席信息官（CIO）或 CTO（需批准云基础设施决策）、首席财务官（CFO，评估 ROI
              和资产负债表内库存），以及首席可持续发展官（关注减废带来的 ESG 影响）。RELEX
              的终端用户是供应链分析师、品类经理、零售采购、门店运营经理和生产规划员。这些用户每天在平台上查看预测异常、批准补货订单、分析促销拉动，并规划劳动力排班。关键分层轴包括：（1）垂直行业——杂货和食品零售（可服务
              $6–8B，RELEX 核心；高易腐性 → 减废 ROI 高）、一般商品和专卖零售（$4–5B）、消费品 / CPG 制造商（$3–4B）、批发和分销（$1–2B）；（2）规模——企业级（年收入
              $1B+）、中型市场（$200M–$1B）和 SME（<$200M；因实施复杂、定价偏高，RELEX 当前无法有效服务）；（3）地理——EMEA（RELEX
              当前多数）、北美（激进增长）、APAC（早期）。预算归属在企业层面：大型零售商的典型 RELEX 交易规模为 $1M–$10M ACV，实施需 6–24 个月。采用受 IT 采购周期、数据就绪度（POS 与
              ERP 数据质量）和内部变革管理能力限制——这些因素都更有利于成熟企业厂商，而非新进入者。
