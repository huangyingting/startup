      - number: '8.2'
        title: 估值背景与融资历史
        blocks:
          - type: paragraph
            body: >-
              RELEX 最近一次一级市场估值事件是 2022 年 2 月 Series D，当时公司融资 $500M，投后估值 $5.7B。该轮由 Blackstone Growth 领投，TCV（2019 年 Series
              C 首次投资，当时估值约 $450M）参投，Thomas H. Lee Partners 与 Summit Partners 跟投。该轮确立了当前一级市场估值锚点；截至 2026 年 5
              月，后续没有任何一级股权交易更新这一标记，因此该估值约 4 年未更新。2024 年 12 月，Blackstone 和 TCV 借二级交易分别增持，Summit Partners
              完全退出；财务条款未公开披露。二级交易未披露价格，外部观察者无法核验隐含估值相较 $5.7B 一级市场标记是维持、上调，还是——与公开信号相反——下调。法律顾问
              Krogerus（Helsinki）确认二级交易已完成，但未提供定价信息。RELEX 还在 2025 年 1 月从 Nordea Bank 获得 €10M 绿色循环信贷额度。历轮股权融资总额约
              $816M；芬兰母公司权益比率为 47.1%，FY2024 收入 €292.2M、EBIT 亏损 -€22M（EBIT 利润率 -7.5%）——确认公司仍在扩张，但尚未达到盈亏平衡。以 2025 年 ARR 约
              $467M 计算，$5.7B 估值对应 ARR 倍数约 12.2x，处于 2024 年 SCP SaaS 同业区间中位附近。
            claimRefs:
