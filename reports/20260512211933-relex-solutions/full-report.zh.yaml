      - number: '7.7'
        title: 关键人物与治理风险
        blocks:
          - type: paragraph
            body: >-
              RELEX 存在创始团队集中风险；以其公司规模看，这种集中并不常见。三位联合创始人——CEO Mikko Kärkkäinen、Chief Sustainability Officer Johanna
              Småros、Co-Founder Michael Falck——在创立 20+ 年后仍在公司积极任职。这体现了罕见的创始人承诺，但也形成关键人物集中：任何一位联合创始人离职，尤其是 CEO Kärkkäinen
              离职，都会被企业客户、战略伙伴和现有投资人解读为重大负面信号。Mikko Kärkkäinen 是 RELEX AI 战略和大型客户关系的主要外部面孔；他频繁出现在行业分析师评论（Gartner、Nucleus
              Research）和公司新闻稿中。在积极重组且竞争加速的阶段，如果 CEO 层面发生领导交接，不确定性会进一步放大。除创始团队外，2026 年 4
              月重组本身带来次级治理风险：如果公司在芬兰减员中削减了客户成功领导层或关键技术 R&D 人员，这些角色承载的机构知识和客户关系资产可能下降，企业客户问题响应时间也会变慢。RELEX 未披露 2026 年 4
              月裁员受影响最重的具体职能，因此外部难以看清这一风险。董事会包括 Blackstone 和 TCV
              委派的投资人董事，提供了一定监督平衡；但创始人在公司内部合计拥有很强文化权威，一旦创始人与投资人在战略上分歧，治理抓手仍有限。
