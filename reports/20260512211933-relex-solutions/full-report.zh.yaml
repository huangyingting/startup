      - number: '7.5'
        title: 财务风险
        blocks:
          - type: paragraph
            body: >-
              RELEX 的财务风险画像有三个不同维度。第一，估值锚陈旧：$5.7B 估值形成于 2022 年 2 月，当时私募市场倍数处在峰值。虽然 2024 年 12 月二级交易（Summit Partners 退出，由
              Blackstone 和 TCV 购买）暗示当前投资人仍按接近 2022 年价格看待 RELEX，但条款未公开披露，也没有独立第三方确认当前隐含估值。在 2024–2026 年公开 SaaS 倍数较 2021
              年峰值显著压缩的环境下，陈旧的私有估值给任何投资人或二级买家带来不确定性。第二，经营亏损：芬兰母公司 FY2024 收入 €292.2M，EBIT 为 -€8.71M（利润率
              -3.0%），反映公司仍在投入国际扩张和 R&D。虽然这已较 FY2022 的 -€26.4M 改善，但该实体尚未实现 GAAP 口径盈利；芬兰财务覆盖 RELEX 全球 R&D
              和运营成本的大部分。第三，汇率敞口：RELEX 大部分收入以欧元产生（芬兰实体），但 $5.7B 估值基准以美元计价，受 EUR/USD 波动影响。若 EUR 相对 USD 持续贬值，将降低以美元折算的 EBIT
              轨迹，并扩大所述美元估值与底层欧元经济性之间的差距。截至 2026 年 5 月，公司未传达公开 IPO 时间表，这给自 2019 年（TCV、Series C）起持仓的早期投资人带来流动性悬挂风险。芬兰实体层面
              47.1% 的权益比率提供了适度财务缓冲，但公司未披露集团层面现金余额。
            claimRefs:
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
              - CR037
      - number: '7.6'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              2026 年，3 项欧盟工具进入或深化执法阶段，使 RELEX 面临显著抬升的监管风险环境。EU AI Act（Regulation 2024/1689，2024 年 8 月生效，2026 年起分阶段执法）为
              AI 系统引入基于风险的义务。RELEX 的需求预测和自动补货建议，可能被归类为用于关键供应链运营的 AI 系统；法案 Annex 将这一类别列为潜在高风险。若被归为高风险，RELEX
              需要开展合格评定、维护技术文档、为 AI 建议提供可解释机制，并确保人工监督。对资源充足的软件供应商而言，这一合规负担很重但可管理；主要风险在于 RELEX 系统是否会被归为高风险仍不确定，截至 2026 年 5
              月公开披露中也未确认。GDPR（Regulation 2016/679）带来持续敞口：RELEX 作为零售客户的数据处理者，处理数百万条消费者购买记录。若该数据集发生泄露或未授权访问，可能触发最高相当于
              RELEX 全球年营业额 4% 的罚款——按 $467M ARR 估算为 $19M+。RELEX 维持 SOC 2 Type II 和 ISO 27001
              认证，可缓释这一风险；其与客户签署的数据处理协议也建立了合同问责。企业可持续发展报告指令（CSRD）带来间接监管风险：RELEX 最大客户有义务报告食物浪费降低和供应链排放数据，使公司商业上依赖这些客户优先推进
              RELEX 集成以支持 ESG 报告。除 GDPR 和 EU AI Act 之外，法律风险敞口有限：截至 2026 年 5 月，RELEX 公开记录中没有披露重大诉讼、监管执法行动或知识产权争议。
