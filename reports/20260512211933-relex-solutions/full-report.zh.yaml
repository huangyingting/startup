  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与核心技术
        blocks:
          - type: paragraph
            body: >-
              RELEX Living Retail Platform
              构建在单一统一数据模型上，覆盖从需求感知到补货、空间分配、人力排班和生产计划的完整规划链。这种「单一事实源」架构消除了单点方案堆栈固有的数据对账成本；在后者中，需求、补货和空间工具各自独立，只能依靠脆弱的批量
              ETL 管道同步。RELEX 平台将所有规划数据存放在共享内存层，可同时计算数百万个 SKU-地点组合；大型食品零售商或家居建材连锁店每店运营超过 100,000 个活跃 SKU
              时，采用列式数据库路径的云原生竞品会在这一规模下付出延迟代价，而 RELEX 的设计选择形成了差异化。

              该平台以云原生 SaaS 形态部署在 Amazon Web Services（AWS）上，采用多租户架构和隔离的客户实例，在共享底层优化基础设施的同时保持数据隔离。少数遗留合同客户仍保留本地部署选项，但
              RELEX 未来策略以 SaaS 为先。集成层坚持 API-first：除为 SAP（S/4HANA、ECC、IBP）、Oracle、Infor 和 Microsoft Dynamics
              提供预构建连接器外，也支持 REST API、EDI 和 SFTP 协议。近实时 POS 和 ERP
              数据摄取，使补货决策反映最新门店级销售与库存位置，而不是昨天的批处理文件。优化引擎以约束式编程结合基于机器学习的预测，能求解复杂多变量规划问题——例如在生鲜品类中平衡货架满足率和损耗目标——这类问题纯 LP
              求解器无法在可接受的规划周期内处理。
