      - number: '2.6'
        title: 规模测算与采用尽调缺口
        blocks:
          - type: paragraph
            body: >-
              SCP 软件市场规模测算受到多项定义和方法挑战。第一，市场研究机构边界不同：一些机构把 SCM 执行（TMS/WMS）纳入 SCP 市场，推高披露 TAM。第二，供应链 AI 估算（$13.93B、20.2%
              CAGR）包含硬件和服务收入，而这些并不是 RELEX 的可服务市场——RELEX 卖的是软件订阅，不是 AI 基础设施。第三，RELEX 自身市场份额无法独立验证，因为 SCP 市场领导者 Blue
              Yonder（未上市）和 RELEX 都不披露绝对收入。第四，私营公司覆盖：SCP 市场中相当一部分由区域玩家和系统集成商嵌入式方案服务，其中多数没有公开跟踪。本报告在估值和市场份额计算中将 $14.75B
              SCP 估算作为基准情景，但云原生专精型 SCP 的实际可服务市场可能只有 $8–12B（排除本地部署传统方案和 ERP 内嵌方案）。按 $467M ARR 计算，RELEX 在云原生 SCP
              细分中的渗透率可能已达 4–6%，这比总市场份额更相关。
