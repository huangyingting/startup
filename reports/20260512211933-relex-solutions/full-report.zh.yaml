  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              RELEX 位于 $14.75 billion 供应链规划（SCP）软件市场与相邻零售规划及商品优化细分市场的交汇处。竞争格局分为四层。第一，专精型 SCP 厂商：Blue Yonder（Panasonic
              子公司）、Kinaxis（上市公司，TSX:KXS）和 o9 Solutions（未上市，估值 $3.7B）都提供专门 SCP 平台，并获得 Gartner Magic Quadrant 认可。第二，ERP
              内嵌规划存量厂商：SAP Integrated Business Planning（IBP）和 Oracle Supply Chain Planning 借助被锁定的 ERP
              装机基础销售规划附加模块，竞争点更多是采购摩擦，而非产品优越性。第三，相邻执行层厂商：Manhattan Associates（NASDAQ:MANH）和 Infor
              正从仓库和订单管理扩张到规划层。第四，现状替代方案：Microsoft Excel 和自建电子表格工作流仍在中型市场广泛使用（估算渗透率 60%），也是 RELEX
              交易中最常被替换的前任系统。除此之外，Amazon、Walmart、Target 等技术能力强的最大型零售商存在相邻内部自研风险，它们过去常开发自研供应链工具。2026–2030
              年窗口内的潜在进入者包括超大云厂商（AWS Supply Chain、Google Cloud Supply Chain）以及借助基础模型 API 做需求感知的 AI 原生垂直平台。
