            body: >-
              RELEX 的 700+ 家企业客户分布在 40 多个国家；EMEA 占 ARR 主导份额（估计为总 ARR 的 60–65%），北美约 25–30%，APAC 低于 10%。前 10
              大客户的单独收入贡献未公开披露；但考虑具名 logo 名单广度和 700+ 的总客户数，单一客户集中度风险可视为中等：最大账户（The Home Depot、Dollar
              Tree、Coles）很可能重要，但不占支配地位。按垂直行业看，杂货与食品零售约占客户的 40–45%，反映 RELEX 的创始聚焦和最强竞争差异。综合零售与家居建材（Home Depot、AutoZone）约占
              15–20%；药店 / 便利（Circle K、COSMOS Pharmaceutical、Rossmann）占 10–15%；专业零售和 CPG（Rituals、Carhartt、Vita Coco、The
              Body Shop）占 10–15%；其他垂直行业（批发、分销、制造）占剩余部分。增长中的 CPG 和制造细分市场，部分由 Optimity 并购推动；该并购带来了上游生产规划客户。向北美扩张是 RELEX
              明确优先事项：Atlanta 的美国枢纽已增至约 363 名员工，北美赢单（Home Depot、AutoZone、PetSmart、Dollar Tree、Circle K、Hy-Vee）显示真实牵引力。英国
              / 欧盟基本盘仍强，Coles（APAC）是战略性异类。2026 年 4 月包含芬兰总部裁员的重组，为支撑留存和新客户上线的客户成功与专业服务产能带来一定不确定性；这是需要监控的重大负面信号。
