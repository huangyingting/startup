      - number: '2.4'
        title: 增长驱动与市场顺风
        blocks:
          - type: paragraph
            body: >-
              多个宏观和结构性力量正在加速 AI 原生 SCP 平台采用。第一，供应链冲击：2020–2023 年疫情时期暴露了全球供应链的灾难性脆弱，迫使董事会层面急于摆脱被动 ERP 规划。RELEX 委托的 2025
              年研究发现，60% 公司正因关税不确定性和宏观波动而主动改造供应链。第二，AI 成熟：用于需求感知和概率库存优化的机器学习模型已跨过企业可用门槛，相比统计基线模型能交付可量化提升。RELEX 的 Rebot
              assistant（每月 60,000+ 次查询）和智能体式 AI 试点（2025 年）体现了这种能力成熟度。第三，可持续要求：EU 的 ESG 披露规则（CSRD）、食品减废目标（EU Farm-to-Fork
              战略）和零售商净零承诺，正在为食品减废平台创造监管和声誉需求——这正是 RELEX 的核心价值主张。第四，从 ERP 转向专精型方案：SAP S/4HANA 迁移潮促使企业评估规划层替代方案，因为 IBP
              成本上升，而专精型厂商提供更强 AI 能力。第五，SCP 范围扩大：生产规划、供应商协作和可持续指标纳入后，SCP TAM 本身在增长，因为每个模块都会替代一个额外的传统单点方案。第六，零售全球化：西方零售品牌向
              LATAM（OXXO、Circle K）、APAC（Coles）和中东扩张，推动 SCP 平台在新地区落地。
