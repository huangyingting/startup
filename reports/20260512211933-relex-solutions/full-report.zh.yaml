chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >-
              RELEX Solutions（芬兰官方法定名称：Retail Logistics Excellence - RELEX Oy，Business ID 1963444-1）是一家未上市企业软件公司，总部位于
              Finland Helsinki 00230 Postintaival 7，美国主要运营枢纽在 Georgia Atlanta。RELEX 创立于 2005 年 6 月，提供统一的 AI
              原生平台，帮助零售商、批发商、制造商和消费品公司规划并优化整条供应链和零售运营。RELEX 这个名字由 “Retail” 与 “Excellence”
              拼合而成，呼应公司最初聚焦零售供应链效率。平台把需求预测、库存管理与补货、定价和促销规划、空间与品类规划、劳动力管理、生产规划和排程整合在一个共享数据模型中——因此 RELEX 直接对标单点方案孤岛，以及
              SAP、Oracle 等供应商的 ERP 附加模块。RELEX 的商业模式是 SaaS（软件即服务）：企业客户按年支付订阅费，获得可配置平台模块；客户采用更多能力后，收入随之扩张。2024 年和 2025
              年，公司订阅收入同比增速均超过 30%，反映出强劲的净收入留存和新客户赢单。芬兰母实体 FY2024 按 IFRS（芬兰法定账目）口径披露收入 €292.2 million；第三方财务数据显示，2025
              年全球合并口径 ARR 约 $467 million。
