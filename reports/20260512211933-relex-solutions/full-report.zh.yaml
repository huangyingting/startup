      - number: '7.8'
        title: 风险缓释与放弃标准
        blocks:
          - type: paragraph
            body: >-
              RELEX 的有效风险管理，需要盯住一组具体前瞻指标；一旦触发，投资论证就会从正面转为中性或负面。最强的缓释因素包括：已认证的安全态势（ISO 27001、SOC 2 Type II）；连续 74 个季度 ARR
              增长，证明其能穿越竞争周期；高 NPS（62，行业平均 40）；高定价筛选出任务关键型、高切换成本用例；以及覆盖 21 个国家的多元地域布局。Blackstone 和 TCV
              的关系带来持续机构监督，也在一定程度上隔离财务困境。以下终止标准 是可量化触发器，一旦出现就需要重评投资论证。EU AI Act 风险的触发器，是 EU AI Office 作出正式高风险分类裁定，且要求
              RELEX 现有产品架构大规模整改。竞争风险的触发器，是 RELEX 核心杂货零售垂直的胜率出现有记录下降，并由净留存率（NRR）跌破 110% 发出信号。财务风险的触发器，是芬兰实体经营亏损继续恶化，EBIT
              低于 -€12M，说明效率重组尚未改善单位经济性。领导层风险的触发器，是 CEO Mikko Kärkkäinen 离任。估值风险的触发器，是公开 IPO 或二级交易隐含估值显著低于 2022 年 $5.7B
              锚点。投资人应把 NRR、EU AI Act 合规状态和员工人数稳定指标作为标准监控项，要求季度更新。
            claimRefs:
