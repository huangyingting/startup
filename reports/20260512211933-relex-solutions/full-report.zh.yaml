      - number: '1.5'
        title: 里程碑与关键事件
        blocks:
          - type: paragraph
            body: >-
              RELEX 20 年轨迹横跨学术衍生、欧洲扩张、全球规模化，以及多轮并购策略。公司 2021 年达到 €100M ARR，2022 年 2 月 Series D
              后成为独角兽，此后靠有机获客和定向补强并购持续复合增长。Optimity（2024 年 1 月收购，瑞典生产规划专家）是第五笔收购，把 RELEX 的可服务市场延伸到制造业和 CPG 上游规划。Ida（2025
              年 12 月收购）带来杂货门店级生鲜补货能力，补上关键品类缺口。更早的收购包括 Galleria（品类规划）、Zenopt（劳动力排班）和 Formulate（促销规划），均已整合进统一平台。2025 年 4
              月，RELEX 首次被 Gartner Magic Quadrant for Supply Chain Planning 评为 Leader；公司 2022 年才首次进入该报告，仅三年就从 Challenger
              升至 Leader，速度相当快。在可持续方面，RELEX 帮助食品零售客户在 2024 年避免 350 million kg 食品浪费，高于 2023 年的 280 million kg，相当于减少 1.2
              million metric tons CO₂。公司 2024 年所有办公室和托管数据中心均使用 100% 可再生电力，自身排放强度同比降低 9.9%。
