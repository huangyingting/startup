      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              全球 SCP 软件市场 2025 年估算为 $14.75 billion，预计到 2033 年达到 $36.3 billion，对应 11.75% 的复合年增长率（CAGR）（Research and
              Markets/Globe Newswire 2024 年 9 月估算）。MarketsandMarkets 的平行估算显示，AI in Supply Chain 市场 2025 年为 $13.93
              billion，到 2032 年将以 20.2% CAGR 增长至 $50.41 billion——增速更高，反映 SCP 软件中 AI 溢价正在加速嵌入。更宽的 SCM 市场（全部执行 + 规划层）2025
              年估算为 $38.51 billion，并据 MarketsandMarkets 预计到 2030 年以 8.7% CAGR 达到 $58.42 billion。这些估算方向一致：在 AI
              增强预测和从规则驱动转向 ML 驱动补货的推动下，规划层增速快于执行层。按 RELEX 当前 $467M ARR 计算，公司约占 $14.75B SCP 市场的
              3.2%——在一个仍有数十家区域单点方案提供商的高度碎片化市场中，这一份额不高，说明整合空间仍大。RELEX 28% 的 ARR 增速明显高于 11.75% 的市场
              CAGR，表明公司在拿份额，而不只是吃市场增长红利。增长最快的子赛道是 AI 原生云需求感知和库存优化；相较 SAP、Oracle 的传统本地部署规划工具，RELEX 架构最适合这一方向。北美（SCP 市场
              $6–8B）、欧洲（$4–5B）和 Asia-Pacific（$2–3B，增速最快）是三大主要区域。RELEX 在欧洲强，在北美增长，在 Asia-Pacific 尚处早期。
