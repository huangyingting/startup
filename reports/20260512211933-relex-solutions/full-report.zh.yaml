      - number: '1.4'
        title: 经营规模与地理布局
        blocks:
          - type: paragraph
            body: >-
              截至 2025 年末，RELEX 全球约有 2,374 名员工，分布在 21 个国家的 20+ 个办公室。欧洲业务——尤其是 Finland、Germany、Denmark、France、Italy 和
              UK——占员工大多数（约 1,900 人）；北美约 363 人，集中在 Atlanta
              及其他美国枢纽，并随公司积极争取美国企业级零售商而增长。Australia（Melbourne）、Japan（Tokyo）、Hong Kong 和 Latin America 的布局让 RELEX
              具备真实全球触达。仅芬兰母实体 2024 年就有 914 名员工。The Home Depot、Dollar Tree、AutoZone、PetSmart、Circle K
              等关键企业客户来自北美；Coles（Australia）、M&S Food（UK）、El Corte Inglés（Spain）和 OXXO LATAM（Mexico）则支撑国际扩张。2025 年 RELEX
              客户总数 700+ 家，并签下 300+ 份客户协议。公司将约 25% 收入再投入 R&D，高于企业 SaaS 约 15% 的常态，支撑智能体式 AI、需求感知和生产规划创新。RELEX 2024
              年净推荐值（NPS）为 62，显著高于 SaaS 行业约 40 的平均水平；市场观察者估计客户留存率在 95%+。RELEX
              的内存处理引擎是关键架构差异点，能够支撑高吞吐规划计算；据称云原生竞争对手在规模化后难以匹配。
