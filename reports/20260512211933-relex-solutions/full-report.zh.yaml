      - number: '4.2'
        title: GTM 动作与销售效率代理指标
        blocks:
          - type: paragraph
            body: >-
              RELEX 采用直接企业销售模式，在北美、欧洲和 Asia-Pacific 配置区域化一线销售。大型零售商和制造商的企业供应链规划交易通常从初次接触到签约需要 9–18
              个月，因为系统集成和数据迁移复杂。RELEX 不公开披露 CAC、销售回本期或销售效率比率。公开证据中可见的关键效率代理指标包括：（1）FY2025 订阅收入同比增长
              30%，同时利润率虽仍为负但已有改善，说明毛利贡献足以支撑 GTM 投入；（2）FY2025 约新增 100 家净新客户，新客户赢单同比增长 45%；（3）NPS 为 62，高于 SaaS 行业约 40
              的平均水平，暗示现有客户内扩张销售强；（4）FY2025 有 35% 现有客户扩大使用范围，说明先落地再扩张动作健康。RELEX 还与 Wipro 维持战略实施合作，通过系统集成商扩大大型企业账户触达。SAP
              Integrated Business Planning（SAP IBP）在 SAP ERP 装机基础账户中直接争夺 S&OP 和需求规划预算，并在 SAP 依赖深的账户中形成定价压力。RELEX 的 R&D
              投入约占收入 25%——几乎是 SaaS 行业约 15% 基准的两倍——推动产品差异化，但限制近期利润率改善。毛利率未公开披露；基于企业 SaaS 同行基准和 RELEX 成本结构，估算为
              70–75%，显示规模化后单位经济健康。2025 年 Gartner Magic Quadrant Leader 地位支撑 RELEX 在竞争评估中的胜率和定价权。
