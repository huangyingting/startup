      - number: '6.3'
        title: 留存、扩张与合同结构信号
        blocks:
          - type: paragraph
            body: >-
              RELEX 已连续 74 个季度实现 ARR 增长——约等于 18.5 年不间断收入扩张——期间没有任何公开披露的 ARR
              收缩。这是当前最强的留存代理指标，因为任何重大流失事件都会打断增长纪录。净留存率（NRR）未公开披露；但结合新客户增长（2025 年净新增近 100 家客户）、客户案例中记录的模块扩张模式，以及 74
              个季度增长纪录，NRR 估计为 110–120%，符合一流企业 SaaS
              平台水平。合同结构为订阅制，期限通常多年；公开案例研究提到与大型零售连锁的多年实施和运营合作。模块扩张是关键扩张向量：客户通常从需求预测和补货起步，再扩展到空间规划、人力管理、促销优化，以及（Optimity
              并购后）生产规划与排程。RELEX 报告 2024 年 NPS 为 62，高于 SaaS 行业约 40 的平均水平，为客户满意度和可背书性提供了额外代理指标。2026 年的客户扩张证据包括 Douglas
              的泛欧洲范围扩张，以及长期杂货客户的持续合作。多年合同期限和深度数据模型集成（RELEX 将共享数据模型紧密嵌入客户 ERP、POS
              和仓储系统）创造切换成本，并强化留存。研究窗口内未发现重大公开客户流失或合同终止。
