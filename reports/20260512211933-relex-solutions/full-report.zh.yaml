      - number: '4.4'
        title: 公开牵引力与私有指标缺口
        blocks:
          - type: paragraph
            body: >-
              RELEX 可公开取得的财务数据很有限，主要限于芬兰母公司法定 IFRS 账目（可通过 Finnish Business Registry 获取）、公司自发新闻稿披露的订阅收入和 ARR
              增速，以及数据聚合商的第三方估计。最可靠的公开牵引证据包括：芬兰实体 FY2024 收入 €292.2M（同比 +24.8%）、公司披露 FY2024 和 FY2025 订阅收入增长 30%+、截至 2025
              Q4 连续 74 个季度 ARR 增长，以及第三方估计 2025 年全球 ARR 约 $467M。客户赢单——包括 2026 年初 Hy-Vee（美国 9 个州 560+ 家门店）、Douglas
              Group（在荷兰、比利时和东欧扩张）以及 Forever Cheese（3 个配送中心、1,000+ 个 SKU）——为 ARR 持续增长动能提供了定性证据。仍未披露的关键私有指标包括：合并口径 ARR
              绝对值（RELEX 只披露增速）、毛利率、净留存率（NRR）、客户 ARR 分群数据、经营现金流和自由现金流（FCF）绝对值、月度烧钱速度，以及非芬兰实体的完整财务报表。芬兰实体收入（€292.2M ≈
              $320M）与估算全球 ARR（$467M）之间的差距，意味着未纳入公开法定申报合并范围的非芬兰子公司贡献了可观订阅 ARR。GetLatka 的第三方 ARR
              估计依赖公开信号推断，只能作方向性参考，不能视为定论。投资人做完整尽调时，必须在为估值背书前要求提供经审计的集团合并财务报表、带分群数据的 ARR 绝对值确认，以及净留存率（NRR）披露。
