        title: 成本结构与毛利率分析
        blocks:
          - type: paragraph
            body: >-
              芬兰母实体 FY2024 EBIT 为 -€22 million（收入 €292.2M 上的 -7.5% 利润率），反映公司仍处投入期，而非成熟成本结构。芬兰实体经营亏损已从 FY2022 约 -€26.4
              million 改善，说明收入扩大后早期经营杠杆开始显现——两个财年改善约 €4 million，尽管利润率扩张速度仍偏慢。公司将约 25% 收入再投入 R&D，接近 SaaS 行业约 15%
              平均水平的两倍，体现 RELEX 的科学差异化策略，以及在 AI、预测和可扩展性上的持续平台投入。销售、营销和 G&A 费用未在公开账目中单独披露；按增长率相近的可比企业 SaaS 公司估算，销售、营销和 G&A
              合计支出约占收入 50–60%，剩余部分由毛利润吸收。截至 FY2024 法定申报，RELEX 芬兰实体雇用 914 人，意味着人均收入约 €320K——处在企业 SaaS 基准高端，也反映芬兰员工平均资历高且
              R&D 集中。全球员工估算 2,300+，覆盖 21 个国家；芬兰实体是主导性的 R&D、工程和产品成本中心。2026 年 4 月重组通知——影响最多 288 名芬兰员工，722
