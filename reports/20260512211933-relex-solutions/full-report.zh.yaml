      - number: '8.4'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              四组可比对象支撑 RELEX 估值：公开 SCP SaaS 同业、私有 SCP 同业、供应链 M&A 交易，以及规划软件 M&A 交易。最直接可比的上市公司是 Kinaxis（TSX:
              KXS），它是唯一上市的纯供应链规划厂商。Kinaxis 披露 FY2024 ARR 约 CAD$590M（约 USD$435M），收入同比增长 13%，市值约 CAD$4.3–5B（约
              USD$3.2–3.7B），隐含 ARR 倍数为 7–8.5x（USD）。Kinaxis 相对 RELEX 隐含 12x 的较低倍数，反映其增速更慢（13%，而 RELEX 为
              28%），且产品更窄，聚焦供应链规划赛道，没有 RELEX 面向零售的模块广度。Manhattan Associates（NASDAQ: MANH）以显著溢价交易（约 25–28x ARR，对应约 $900M
              ARR），但这反映其成功 SaaS 转型溢价和扩张中的规划模块，更适合作为上限参照，而非直接可比。私有同业中，o9 Solutions 在 2023 年 KKR 融资轮估值 $3.7B，对应约 $300–350M
              ARR，隐含约 10–12x ARR——是最接近 RELEX 当前定位的结构性类比。Blue Yonder 2021 年被 Panasonic 以约 $7.1B 收购，约为收购时 ~$1B ARR 的
              7x——这笔 2021 年峰值倍数交易，如今代表被压缩后的历史下限。Anaplan 2022 年 6 月被 Thoma Bravo 以 $10.7B 收购（约 $600M ARR、约 18x
              ARR），代表规划软件 M&A 倍数峰值，如今只能作为离群参照。2024 年企业 SaaS SCP 同业 ARR 倍数中位区间约 8–12x，低于 2021 年 25–35x 的峰值。RELEX 约 12x
              ARR 位于该区间上沿，反映市场为其 ARR 增速和平台广度给出溢价。下方《可比估值》表和《估值敏感性》图呈现完整可比集与情景敏感性。
