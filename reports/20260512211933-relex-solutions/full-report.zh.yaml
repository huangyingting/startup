  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与订阅 ARR 质量
        blocks:
          - type: paragraph
            body: >-
              RELEX 通过两条主要收入流变现：多年期企业 SaaS 订阅，以及专业服务或实施费用。订阅是战略上占主导的收入流，围绕年合同额设计，合同额与纳入管理的
              SKU、门店或生产资产规模，以及已部署的平台模块数量挂钩；随着客户逐步采用更多能力，收入基数会扩张。专业服务随交付确认，属于次要且毛利率较低的收入流；按可比企业 SaaS 基准估算，占总收入
              15–25%。芬兰母实体（Retail Logistics Excellence — RELEX Oy）披露 FY2024 法定收入 €292.2 million，同比增长 24.8%；订阅收入增长
              30%，年经常性收入（ARR）在 FY2024 增长 30%+。FY2025 订阅收入又增长 30%，ARR 按固定汇率增长 28%，并达到 ARR 连续 74 个季度不间断增长的里程碑。第三方数据估算，2025
              年全球 ARR 约 $467 million。第三方估算显示 ARR 依次为 $152.1M（2023）、$290.5M（2024）和 $467M（2025）。RELEX
              定价基于合同范围和模块选择；未披露基于用量的计费。2026 年 5 月发布的 RELEX Open 平台引入可扩展性和第三方 AI 智能体连接，可能在核心订阅基础之上打开新的用量或市场收入向量。EU AI
              Act（2024 年 8 月生效）对供应链场景中使用的 AI 系统提出风险分类要求；RELEX 的 AI 驱动预测和自主补货模块可能产生合规成本，同时也会吸引希望供应商已具备治理控制的企业买方。
