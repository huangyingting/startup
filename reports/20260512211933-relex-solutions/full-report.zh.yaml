  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              RELEX 竞争的市场是 Supply Chain Planning（SCP）软件——企业软件中专门处理需求预测、库存优化、补货、生产排程和一体化业务规划的细分市场。这个细分市场不同于更宽的 Supply
              Chain Management（SCM）市场（2025 年 $38.5B），后者还包括运输管理系统（TMS）、仓库管理系统（WMS）和采购自动化等执行层。SCP 市场专指位于交易型 ERP
              系统之上的规划和优化决策支持层。RELEX 还参与一个相邻细分市场：零售规划和商品优化软件，涵盖空间与品类规划、促销规划和定价——这些能力通常不是 Kinaxis 这类纯 SCP 厂商的强项。因此，RELEX
              的可服务市场（同时服务 SCP 与零售规划模块）包括估算 $14.75 billion 的 SCP 市场，加上估算 $5–8 billion 的相邻零售规划市场，2025 年合计总可寻址市场接近 $20–23
              billion。RELEX 服务市场不包括纯采购平台、WMS/TMS、现场服务管理和下游电商履约自动化。SAP IBP 和 Oracle S&OP 产品作为 ERP 平台内嵌模块参与该市场竞争，但 RELEX
              以独立专精型厂商身份跨 ERP 环境竞争（包括 SAP 与 Oracle 客户）。关键现状替代方案包括电子表格规划（仍被大量中型公司使用）、ERP 内嵌原生规划模块，以及面向单一规划职能的第一代单点方案。
