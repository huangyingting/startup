    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础概览与 ICP 定义
        blocks:
          - type: paragraph
            body: >-
              截至 2025 年底，RELEX 在全球服务 700+ 家企业客户，仅 2025 年就净新增近 100 家客户。公司的理想客户画像（ICP）是年收入超过 $500M、SKU
              周转快、配送网络多层级，并且有显著易腐或短保质期库存敞口的大型企业零售商或制造商。在该 ICP 中，价值最高的细分市场是杂货与生鲜食品零售：易腐性带来强烈的减损 ROI，足以支撑 RELEX
              的高定价；杂货连锁通常运营数百到数千家门店，单账户 ARR 较大。次级 ICP 包括家居建材、药店与便利、折扣与价值零售，以及专业消费品品牌。RELEX 明确不面向 SME 客群（收入低于 $200M
              的公司），原因是实施复杂度高，且 AI 模型对数据就绪度要求高。客户基础在地域上偏向 EMEA（主要是芬兰、北欧、德国、英国、伊比利亚和 Benelux），北美是增长最快的区域，APAC 仍处早期（澳大利亚
              Coles 是主要滩头）。具名全球客户包括 The Home Depot、AutoZone、PetSmart、Dollar Tree and Family Dollar、Circle
              K、Coles（澳大利亚）、M&S Food（Marks & Spencer）、ICA Sweden、El Corte Inglés（西班牙）、Rossmann（德国 /
              欧洲）、Rituals（化妆品）、ADUSA（Delhaize US）、Hy-Vee（Iowa，约 280 家门店）、Douglas（欧盟美妆）、COSMOS
              Pharmaceutical、Carhartt、Vita Coco 和 The Body Shop。覆盖的垂直行业和地域广度证明平台具备多场景适配能力，但也带来实施复杂度；RELEX 依靠包括 Wipro 和
              Cognizant 在内的全球系统集成商伙伴网络管理这一复杂度。
