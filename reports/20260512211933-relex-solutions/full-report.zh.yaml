companyProfile:
  summary: >
    RELEX Solutions 总部在 Helsinki，是一家供应链规划 SaaS 公司，2005 年由 4 位前学者创立。其统一平台面向零售和消费品企业，覆盖需求预测、补货、空间、分配、劳动力和运营规划。FY2024
    芬兰实体收入达 €292 M，全球客户 700+ 家、覆盖 100+ 个国家，ARR 已连续 74 个季度增长；RELEX 已在统一供应链规划赛道建立稳固的品类领导地位。公司背后有 TCV、Blackstone、Summit
    Partners 等成长型投资者；最近一次融资发生在 2022 年 2 月，估值 $5.7 B，并借 2024 年 12 月 Blackstone 主导的二级交易确认了投资者持续兴趣。
