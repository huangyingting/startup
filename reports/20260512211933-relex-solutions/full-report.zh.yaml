      - number: '4.6'
        title: 财务结论与尽调阻断项
        blocks:
          - type: paragraph
            body: >-
              RELEX 展现出较高的订阅收入质量——FY2024 和 FY2025 ARR 增长 30%+、连续 74 个季度增长、FY2025 客户扩张率 35%、NPS
              62——但持续经营亏损，以及与其体量不匹配的财务透明度不足，抵消了部分优势。按最近披露的 $5.7B 估值和估算 $467M ARR，RELEX 隐含约 12x ARR 倍数；相较上市可比公司
              Kinaxis（TSX: KXS，约 3–5x 收入）有溢价，但可由 RELEX 更高增速和私有公司稀缺性溢价支撑。悲观情境退出估值（2027 年 ARR 约 $530M，6–8x）对应 $3.2–4.2B
              企业价值；基准情境（10–12x）对应 $5.3–6.4B；乐观情境（2028 年 ARR 约 $680M，15–18x）对应 $10.2–12.2B。2026 年 4
              月重组降低了芬兰成本基数，但也引发对增长信心和近期 ARR 减速风险的疑问。RELEX Open（2026 年 5 月）提供了可信的平台可扩展性叙事，但新架构带来执行风险。估算 40 法则得分（约 18，结合
              28% ARR 增长和约 -10% 自由现金流率）低于支撑高溢价 SaaS 估值所需的 40+ 门槛，限制了近期倍数扩张。关键尽调阻断项包括：（1）未披露集团合并财务报表；（2）ARR
              只披露增速，不披露绝对值；（3）毛利率、净留存率（NRR）和 FCF 未披露；（4）2024 年 12 月二级交易估值未披露；（5）2026 年 4 月重组对 ARR、NRR
              和客户情绪的影响未知；（6）RELEX Open 平台可扩展性风险尚未量化。
