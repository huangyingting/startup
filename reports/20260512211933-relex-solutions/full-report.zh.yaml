      - number: '8.3'
        title: 投资论证与反向论证
        blocks:
          - type: paragraph
            body: >-
              RELEX
              的投资论证建立在四个结构性支柱上。第一，它运营市场上最广的统一供应链规划平台——需求预测、库存管理、补货、空间与品类组合、劳动力管理、生产规划共用一个共享数据模型——这一深度没有公开直接同业。第二，ARR 以
              28% CAGR 增长，连续 74 个季度未中断扩张，18 年以上执行韧性异常强。第三，RELEX 在 2025 年被评为 Gartner Magic Quadrant 供应链规划领导者，进入 MQ
              仅三年后就验证了竞争地位。第四，Blackstone——全球最大私募股权机构之一——是主要机构投资方，TCV 继续作为战略共同投资方；2024 年 12 月二级交易确认两者信心，且没有降价融资
              信号。反向论证同样清晰。RELEX 仍亏损，EBIT 利润率 -7.5%；Rule of 40 约 20，显著低于支撑 SaaS 溢价倍数扩张的 ≥40 门槛。$5.7B 估值设定在 2022
              年初的峰值倍数环境，之后 ZIRP 退潮压缩了全行业 SaaS 倍数；当前标记可能内含过时定价。SAP、Oracle 和 Microsoft 正重金投入 AI 驱动供应链规划，直接与 RELEX
              竞争。最后，在没有 IPO 或经审计合并财务披露的情况下，市场缺少清算机制来确认或否定当前估值。下方正向 / 反向论证 表按证据锚点和改变判断所需条件结构化呈现每条论点。
