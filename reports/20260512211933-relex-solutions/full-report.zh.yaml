      - number: '3.5'
        title: 竞争风险、不利证据与替代威胁
        blocks:
          - type: paragraph
            body: >-
              RELEX 面临多项可信竞争风险和不利信号，平衡评估时必须把它们与护城河优势一起权衡。近期最重要的不利事件是 2026 年 4 月芬兰员工重组：RELEX 将 722 名芬兰员工中的最多 288
              人置于裁撤风险中，CEO Mikko Kärkkäinen 将行动称为主动且可控。受影响员工主要在 Finland，而 Finland 承载了 RELEX 相当部分 R&D 和产品工程人才。尽管 CEO
              将其描述为可控转型，重组仍带来执行风险——产品路线图交付可能放缓、组织知识流失、客户信心受损——且发生在 Blue Yonder 和 Kinaxis 正积极投入 AI 能力与零售覆盖的时点。Blue Yonder
              2025 年 AI 原生需求预测能力升级，显著缩小了 RELEX 的 AI 架构差异化；后者原本是竞争性 RFP 中的关键卖点。Kinaxis 通过 2024 年收购宣布扩张零售垂直，对 RELEX
              在杂货和一般商品中的大本营构成中期威胁；该阵地过去未受到 Kinaxis 制造业优先平台的强挑战。基础 AI 模型（GPT 级 API、Google Vertex AI）商品化带来的结构性风险存在于 5–7
              年窗口：如果通用大语言模型和时间序列 AI 模型商品化，专业 SCP 平台的定制预测价值主张可能被侵蚀。RELEX 的 RELEX Open MCP 策略就是有意对冲这一风险，把 RELEX
              定位为工作流编排和数据层，而不是模型提供者。多供应商并用风险也是潜在脆弱点：大型全球零售商可能在不同区域或业务单元部署多个 SCP 厂商；RELEX 在 EMEA 的优势和北美尚早的存在，为 Blue
              Yonder 或 Kinaxis 在 RELEX 完成账户内全球扩张前锚定平行部署留下窗口。
            claimRefs:
              - CP022
              - CP023
              - CP024
              - CP028
              - CP032
              - CP034
              - CP040
      - number: '3.6'
        title: 展示要点
        blocks:
          - type: callout
            title: 2026 年 4 月重组——竞争拐点中的 R&D 执行风险
            body: >-
              RELEX 在 2026 年 4 月让最多 288 个芬兰 R&D 和工程岗位面临裁撤风险，恰好发生在 Blue Yonder 与 Kinaxis 加速 AI
              平台投入之际，带来实质执行风险。投资者在判断护城河持久性前，应要求公司提供重组后产品路线图交付时间表和客户留存数据。
            calloutType: risk
            claimRefs:
              - CP022
              - CP023
          - type: callout
            title: 数据飞轮与 18 年零售算法库构成难以复制的护城河
            body: >-
              RELEX 用 18+ 年积累的零售专用预测算法库——包括易腐性模型、促销拉动曲线和天气校正需求感知——并将其嵌入数百万个已训练 SKU-地点模型实例，形成结构性竞争优势。横向 SCP
              进入者无法仅靠平台投入复制这一优势。该护城河把切换成本推高到典型合同锁定效应之外。
            calloutType: strength
            claimRefs:
              - CP017
              - CP037
          - type: callout
            title: RELEX Open MCP 框架对冲基础模型替代风险
            body: >-
              2026 年 5 月 RELEX Open 公告引入 MCP（Model Context Protocol）支持和三种部署模式（Deploy、Connect、Extend），把 RELEX 定位为吸收外部 AI
              模型作为扩展的工作流编排中心。这一架构通过让 RELEX 成为集成与数据层，而非被替代的模型提供者，来对冲通用 AI 商品化风险。
            calloutType: insight
            claimRefs:
              - CP012
