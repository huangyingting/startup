      - number: '3.4'
        title: RELEX 差异化、切换成本与竞争护城河
        blocks:
          - type: paragraph
            body: >-
              RELEX 的主要竞争护城河来自四项相互强化的结构优势。第一，零售垂直深度：围绕易腐性曲线、促销拉动建模、天气校正需求感知和门店级 planogram 执行的专用算法，来自 18+ 年领域特定投入，横向 SCP
              平台无法快速复制。RELEX 的统一数据模型把需求预测、补货、空间与品类规划、劳动力管理和促销放进一个共享数据模式，是企业规模下唯一同类平台；没有单一竞争对手能在统一模型中匹配这一广度。第二，数据飞轮：RELEX
              系统基于客户特定历史需求数据，训练数百万个 SKU-地点预测模型。当客户部署 RELEX 12–24
              个月后，积累的模型历史会成为该部署的自研资产；切换供应商意味着放弃这段训练历史，从而在合同切换成本之外形成结构性锁定效应。第三，实施复杂性带来的高切换成本：典型 RELEX 部署需要 12–24 个月
              ERP/POS 数据集成、主数据清洗和组织变革管理，使切换到竞争对手的总拥有成本高到难以承受。第四，平台扩张：RELEX 五次收购（Galleria 补空间规划、Zenopt 补劳动力、Formulate
              补促销、Optimity 补生产规划、Ida 补生鲜门店订货）逐步填补了竞争对手可用来切入的空白。2026 年 5 月 RELEX Open 公告又增加第五个维度：通过支持 Model Context
              Protocol（MCP）和智能体式 AI 集成，RELEX 把自己定位为工作流编排中心，而不是封闭系统，从而降低被通用 AI 模型替代的风险。RELEX 的 ISO 27001、SOC 2 Type I 和
              II 认证，加上与 Wipro、Accenture、Capgemini 的合作，提供了赢下并留住大型企业客户所需的信任与实施分发基础设施。
