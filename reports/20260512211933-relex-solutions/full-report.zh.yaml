      - 可观察阈值
      - 投资论点传导
      - 行动含义
    rows:
      - - ARR 增长实质减速
        - 连续两个已披露季度 CAGR 低于 15%
        - 削弱增长溢价；基准情景倍数从 10–13x 压缩到 7–9x；熊市情景概率升至 ≥40%
        - 下调信念评级；重审基准估值；向公司索取更新后的 ARR 桥接表
      - - 宣布降价轮或估值标记下调至 $4B 以下
        - 披露的二级或一级交易隐含估值低于 $4B
        - 确认熊市情景；Blackstone/TCV 减记信号；投资论点破裂
        - 退出 / 回避；若持仓入场价高于 $5B，清仓
      - - 失去 Home Depot 或 Dollar Tree（北美头部客户）
        - 贡献 >3% ARR 的客户公开宣布终止合同或不续约
        - 客户集中风险兑现；北美增长论点受损；收入可见性下降
        - 对客户留存指标和合同结构重做深度尽调；升级为 P1 风险
      - - SAP GenAI SCP 在竞争性评测中挤掉 RELEX
        - 公开引用的案例 ≥2 起，显示 RELEX 在核心零售规划垂直领域正面对决 SAP IBP 失利
        - TAM 压缩信号；SAP 生态杠杆兑现；RELEX 护城河受质疑
        - 重估市场份额假设；将牛市情景概率从 25% 降至 ≤10%
      - - CEO 或联合创始人离任且无继任安排
        - Mikko Kärkkäinen 离任，或重要联合创始人退出且未公开继任计划
        - 文化与愿景风险；企业客户关系延续风险；关键人断崖
        - 治理风险升级为 P1；董事会沟通；观察人才留存信号
    notes: 触发条件均为可观察的市场或公司事件。每一项都映射到估值情景切换和投资动作。它们不是概率预测，而是结构化监控条件。
