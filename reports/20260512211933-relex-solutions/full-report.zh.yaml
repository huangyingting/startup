      - number: '8.6'
        title: 退出准备度、论证失效触发器与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              RELEX 在 2026–2028 年窗口内有三条可信退出路径：在 NYSE 或 Nasdaq IPO、战略收购，或 Blackstone 主导的财务投资方二级交易或买断。鉴于 SaaS
              溢价和流动市场准入，IPO 是价值最高的退出路径，区间为 $6B–$9B；RELEX 是全球运营的芬兰公司，NYSE 或 Nasdaq 是自然上市地点。截至 2026 年 5 月，公司尚未提交
              S-1，也未公开宣布 IPO 顾问聘任，说明公司可能在准备中，但尚未进入正式注册流程。RELEX 可能需要先把 Rule of 40 提升到
              ≥35，并披露合并全球财务，才能成功完成面向机构的路演。战略买方中，SAP 最自然契合 RELEX 的互补零售供应链能力；但考虑到 SAP 既有 ERP 主导地位和不断扩张的 IBP 版图，SAP
              收购会面临重大的欧盟和美国反垄断审查。Oracle、Salesforce 和 Microsoft 是反垄断约束较少的替代战略买方。如果 IPO 条件持续不利，Blackstone Growth
              可执行财务投资方主导的二级减持或全额买断。2024 年 12 月二级交易一方面让 Summit Partners 完全退出并获得流动性，另一方面也延长了 Blackstone 和 TCV
              的持有周期。下方表格结构化列出 5 个论证失效触发器和 5 个关键尽调缺口，帮助投资委员会监控投资论证，并在以高于 $5.5B 的价格投入资本前优先处理最关键的证据缺口。
