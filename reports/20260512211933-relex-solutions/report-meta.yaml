  foundingLocation: Helsinki, Finland
  headquarters: Helsinki, Finland
  productSummary: >
    RELEX's unified supply chain platform integrates demand and sales forecasting, automated
    replenishment, inventory optimisation, space and assortment planning, workforce planning,
    production and supply planning, and supply chain analytics in a single SaaS stack. The
    May 2026 RELEX Open initiative introduced Deploy/Connect/Extend AI architecture with Model
    Context Protocol (MCP) support, enabling enterprise customers to embed AI agents across
    their planning workflows.
  customerFocus: >
    Large and mid-market retailers, grocery chains, fashion and apparel, DIY, specialty,
    and consumer goods manufacturers across Europe, North America, and Asia-Pacific.
  businessModel: >
    Annual recurring subscription (SaaS) with implementation services; multi-year enterprise
    contracts; usage and module expansion drives NRR. Indirect channel through system integrators
    and technology partners.
  stage: late-stage private
