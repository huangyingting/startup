  topStrengths:
    - >-
      Seventy-four consecutive quarters of ARR growth demonstrate exceptional product-market fit in an
      execution-intensive vertical.
    - >-
      Unified platform across demand, replenishment, space, workforce, and supply planning creates deep multi-module
      customer lock-in.
    - >-
      Helsinki-anchored R&D with a strong academic foundation provides defensible IP and algorithmic IP moats relative
      to legacy ERP vendors.
    - >-
      RELEX Open (May 2026) positions the platform for the next AI-agent procurement wave with MCP support and an open
      extensibility layer.
    - >-
      700+ enterprise customers across 100+ countries with major grocery, fashion, and DIY logos de-risk customer
      concentration risk.
  topRisks:
    - >-
      The $5.7 B February 2022 valuation has not been publicly re-confirmed; April 2026 layoffs (up to 288 Finnish
      employees) suggest internal cost-rationalisation that warrants a fresh mark-to-market exercise.
    - >-
      Blue Yonder (Panasonic, ~$7 B) and o9 Solutions ($3.7 B) are competing for the same enterprise wallet with
      comparably funded platforms and growing North American channels.
    - >-
      Global consolidated financials are not publicly filed; gross margin, NRR, churn, and burn are unverifiable from
      public sources alone.
    - >-
      Rising EU AI Act and data-sovereignty compliance requirements add engineering overhead and customer procurement
      friction in RELEX's core European markets.
    - >-
      Founder-led governance with closely held equity and limited board transparency creates key-person dependency and
      secondary liquidity risk.
  unresolvedGaps:
    - >-
      Global consolidated P&L, gross margin, and cash burn rate remain non-public; Finnish-entity accounts cover ~30–40%
      of the global revenue base.
    - >-
      Net revenue retention (NRR) and gross customer churn are not disclosed; long-term ARR durability cannot be fully
      triangulated.
    - >-
      The December 2024 Blackstone/TCV secondary valuation is undisclosed; a fresh mark-to-market is needed to size the
      2022–2024 valuation delta.
    - >-
      April 2026 layoff scope (up to 288 employees, ~40% of Finnish workforce) and strategic rationale require
      clarification from management.
    - North American ARR share, contract lengths, and top-10 customer concentration are unavailable in public sources.
