callouts:
  - calloutType: strength
    title: Rare Combination of Sustained Growth and Enterprise Loyalty
    body: >-
      RELEX has delivered 74 consecutive quarters of ARR growth — approximately 18.5 years of
      uninterrupted revenue expansion — while maintaining a 62 NPS and estimated 95%+ retention.
      This combination is exceptionally rare in enterprise SaaS and underpins strong compounding
      unit economics.
    claimRefs: [CO026, CO027, CO028, CO029]

  - calloutType: risk
    title: Persistent Operating Losses and No Clear IPO Path
    body: >-
      Despite impressive top-line growth, RELEX's Finnish parent entity has operated at a loss
      every year through FY2024. The December 2024 secondary resolved early investor liquidity
      without setting a new public valuation or IPO timeline. Investors should seek evidence of
      a path to profitability and a defined exit event.
    claimRefs: [CO021, CO022, CO039, CO040]

  - calloutType: insight
    title: Finnish Academic Origin Creates Durable Scientific Moat
    body: >-
      RELEX's founding by three supply chain PhD researchers creates an unusual cultural and
      intellectual moat: the platform's AI models have been refined against 700+ enterprise
      implementations over two decades, producing a compounding dataset advantage that new
      entrants cannot replicate in a comparable timeframe.
    claimRefs: [CO008, CO009, CO010, CO032]

