company:
  name: RELEX Solutions
chapter:
  number: 1
  title: Company Overview
  summary: >-
    RELEX Solutions is a Finnish enterprise software company founded in 2005 that provides an
    AI-native unified supply chain and retail planning platform to 700+ global retailers,
    manufacturers, and consumer goods companies. Backed by Blackstone and TCV at a ~$5.7 billion
    valuation (2022), RELEX has delivered 74 consecutive quarters of ARR growth, reaching approximately
    $467M ARR in 2025, and was named a Gartner Magic Quadrant Leader for Supply Chain Planning in 2025.

sections:
  - id: identity-and-business-model
    title: Identity and Business Model
    body: >-
      RELEX Solutions (official Finnish legal name: Retail Logistics Excellence - RELEX Oy,
      Business ID 1963444-1) is a private enterprise software company headquartered at Postintaival 7,
      00230 Helsinki, Finland, with its principal US operational hub in Atlanta, Georgia.
      Founded in June 2005, RELEX delivers a unified, AI-native platform that helps retailers,
      wholesalers, manufacturers, and consumer goods companies plan and optimise their entire supply
      chain and retail operations. The name RELEX is an amalgam of "Retail" and "Excellence," reflecting
      the company's original focus on retail supply chain efficiency. The platform integrates demand
      forecasting, inventory management and replenishment, pricing and promotion planning, space and
      assortment planning, workforce management, and production planning and scheduling in a single
      shared data model—positioning RELEX as a direct alternative to point-solution silos and ERP
      add-on modules from vendors such as SAP and Oracle. RELEX's business model is software-as-a-service
      (SaaS): enterprise customers pay annual subscription fees for access to configurable platform
      modules, with revenue expanding as customers adopt additional capabilities. The company has
      generated over 30% year-over-year subscription revenue growth in each of 2024 and 2025, reflecting
      strong net revenue retention and new logo wins. The Finnish parent entity reported €292.2 million
      in revenue for fiscal 2024 under IFRS (Finnish statutory accounts), while the globally consolidated
      ARR reached approximately $467 million in 2025 per third-party financial data.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007]
    tableRefs: [TO001]

  - id: founders-and-leadership
    title: Founders and Leadership
    body: >-
      RELEX was co-founded by three Finnish supply chain scientists: Mikko Kärkkäinen (Group CEO),
      Johanna Småros (Chief Sustainability Officer and Co-founder), and Michael Falck (Co-founder).
      All three were researchers at the Helsinki University of Technology (now Aalto University) whose
      doctoral and post-doctoral work focused on reducing waste and inefficiency in retail supply chains.
      Their academic frustration with food waste and overstock motivated a commercial software venture
      aimed at making the consumer goods value chain more efficient. Mikko Kärkkäinen, as Group CEO,
      leads overall strategy and external relationships; Johanna Småros champions RELEX's sustainability
      mission and publicly represents the company's environmental impact achievements, such as helping
      customers prevent 350 million kg of food waste in 2024. Michael Falck is the third co-founder
      and has played an ongoing role in product and technical leadership. The three founders were awarded
      Finnish Software Entrepreneur of the Year 2024, reflecting peer and industry recognition of
      RELEX's commercial success and responsible growth. Key-person concentration risk exists around
      the founding trio, as they remain central to culture, vision, and customer relationships; however,
      RELEX has built a broader senior management team across sales, engineering, customer success, and
      operations to support scale in 21 countries. The chair of the board is Robert Delmar Burke (as
      recorded in Finnish registry), and investor-appointed directors from Blackstone and TCV sit on the
      board following major financing rounds.
    claimRefs: [CO008, CO009, CO010, CO011, CO012, CO013, CO014]
    tableRefs: [TO002]

  - id: funding-history-and-capital-structure
    title: Funding History and Capital Structure
    body: >-
      RELEX has raised approximately $816 million in total external equity capital across several
      rounds since 2005. The largest single financing was a $568 million Series D in February 2022
      led by Blackstone Growth, which established a post-money valuation of approximately $5.7 billion—
      at the time one of the largest private software company valuations in Northern Europe. TCV
      (Technology Crossover Ventures) first invested in a $226 million Series C in February 2019 and
      has been an ongoing strategic investor. Summit Partners invested as early as 2015 (Series B) and
      fully exited in December 2024 when Blackstone and TCV increased their holdings by purchasing
      Summit's stake in a secondary transaction. Financial details of the December 2024 secondary were
      not publicly disclosed, but the transaction confirms continued investor confidence and provides
      some early-round liquidity. In January 2025, RELEX secured a €10 million green revolving credit
      facility from Nordea Bank linked to sustainability-related projects, demonstrating access to
      debt capital alongside equity. No public IPO timeline has been announced as of the research date
      (May 2026); the Blackstone-led secondary buyout is consistent with a potential IPO or further
      secondary sale in the 2026–2028 window, but the company has made no commitment. The Finnish parent
      entity had an equity ratio of 47.1% in fiscal 2024, indicating a reasonably well-capitalised
      balance sheet. Operating losses (Finnish entity: -€8.71M EBIT in 2024, improving from -€26.4M in
      2022) reflect continued investment in R&D and international expansion rather than structural
      unprofitability.
    claimRefs: [CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO022]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: operating-scale-and-geographic-footprint
    title: Operating Scale and Geographic Footprint
    body: >-
      RELEX has approximately 2,374 employees globally across 20+ offices in 21 countries as of late
      2025. European operations—particularly Finland, Germany, Denmark, France, Italy, and the UK—
      account for the majority of headcount (~1,900 employees), with North America (~363 employees,
      concentrated in Atlanta and other US hubs) growing as the company actively targets American
      enterprise retailers. Additional presence in Australia (Melbourne), Japan (Tokyo), Hong Kong,
      and Latin America gives RELEX genuine global reach. The Finnish parent entity alone employed
      914 staff in 2024. Key enterprise customers including The Home Depot, Dollar Tree, AutoZone,
      PetSmart, and Circle K are North American, while Coles (Australia), M&S Food (UK), El Corte
      Inglés (Spain), and OXXO LATAM (Mexico) anchor international expansion. In 2025 RELEX had 700+
      total customers and closed over 300 customer agreements. The company reinvests approximately 25%
      of revenue into R&D (above the enterprise SaaS norm of ~15%), supporting innovation in agentic
      AI, demand sensing, and production planning. RELEX achieved a Net Promoter Score of 62 in 2024,
      well above the SaaS industry average of approximately 40, and customer retention is assessed
      at 95%+ by market observers. RELEX's in-memory processing engine is a key architectural
      differentiator, enabling high-throughput planning computations that cloud-native competitors
      reportedly cannot match at scale.
    claimRefs: [CO023, CO024, CO025, CO026, CO027, CO028, CO029, CO030]
    tableRefs: []
    figureRefs: [FO002]

  - id: milestones-and-key-events
    title: Milestones and Key Events
    body: >-
      RELEX's 20-year trajectory spans academic spin-out, European expansion, global scale-up, and
      a multi-wave acquisition strategy. The company reached €100M ARR in 2021, secured unicorn
      status with its February 2022 Series D, and has since compounded growth through organic wins
      and targeted bolt-on acquisitions. Optimity (acquired January 2024, Sweden-based production
      planning specialist) was the fifth acquisition, extending RELEX's addressable market into
      manufacturing and CPG upstream planning. Ida (acquired December 2025) brought advanced
      store-level fresh replenishment capabilities for grocery, addressing a key category gap.
      Earlier acquisitions include Galleria (category planning), Zenopt (workforce scheduling),
      and Formulate (promotional planning), all integrated into the unified platform. In April 2025
      RELEX was named a Leader in the Gartner Magic Quadrant for Supply Chain Planning for the
      first time, having first appeared in the report in 2022 — a notably rapid climb from Challenger
      to Leader in just three years. On sustainability, RELEX helped food retail customers prevent
      350 million kg of food waste in 2024, up from 280 million kg in 2023, translating to 1.2 million
      metric tons of CO₂ avoided. The company maintained 100% renewable electricity across all offices
      and co-location data centres in 2024 and reduced its own emissions intensity by 9.9% year-over-year.
    claimRefs: [CO031, CO032, CO033, CO034, CO035, CO036, CO037, CO038]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: adverse-factors-and-risk-flags
    title: Adverse Factors and Risk Flags
    body: >-
      Several adverse indicators warrant investor attention. First, RELEX has been persistently
      loss-making at the operating level: the Finnish parent entity recorded EBIT of -7.5% (-€22M
      operating loss) in fiscal 2024, and has not reported a full-year operating profit on a statutory
      basis. While losses have narrowed from -€26.4M in 2022 and the trajectory is improving,
      sustained loss-making in a rising-rate environment creates capital dependency. Second, market
      observers and SWOT analysts flag RELEX's weak brand awareness versus SAP and Oracle in the
      North American market, which is critical to achieving the company's next growth phase. The company
      is "heavily reliant on Europe" and must invest materially to accelerate North American market
      share. Third, RELEX's premium pricing and complex multi-module implementation cycles (sometimes
      12–24 months for full deployment) limit accessibility for mid-market customers and slow
      time-to-value, creating churn risk during lengthy onboarding. Fourth, the company has not
      disclosed a clear IPO or liquidity timeline. Blackstone and TCV's December 2024 secondary
      transaction resolved Summit Partners' exit, but investors seeking near-term public-market
      liquidity face uncertainty. Fifth, key-person concentration around the three co-founders
      remains a governance risk as the company grows its global organisation.
    claimRefs: [CO039, CO040, CO041, CO042, CO043]

