  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: valuation
      missingEvidence: >-
        Post-2022 private valuation from the December 2024 secondary transaction (Blackstone/TCV
        increasing stake); financial terms were not publicly disclosed.
      whyItMatters: "Investors cannot assess current fair value without a post-2022 transaction valuation anchor."
      diligencePath: "Request December 2024 transaction documents from company or counsel (Krogerus advised)."
      relatedQuestionRefs: [QO004, QO005]

    - type: private-evidence-only
      severity: material
      topic: cap table (TO003)
      missingEvidence: >-
        Full capitalization table including all employee option holders, preferred share classes,
        liquidation preferences, anti-dilution provisions, and board observer rights. The Stakeholder
        or Investor Map (TO003) is accordingly partial; specific ownership percentages are not
        publicly available for any shareholder.
      whyItMatters: "Cap table structure determines effective ownership economics and exit proceeds distribution."
      diligencePath: "Request capitalization table and shareholder agreement from company directly."
      relatedQuestionRefs: [QO016]
      relatedTableRefs: [TO003]

    - type: private-evidence-only
      severity: minor
      topic: global consolidated financials
      missingEvidence: >-
        Globally consolidated revenue, gross margin, EBITDA, and cash position across all RELEX
        subsidiaries; only Finnish parent entity statutory accounts are publicly available.
      whyItMatters: "Finnish entity accounts capture the majority of R&D and operations but not all global subsidiaries."
      diligencePath: "Request audited consolidated group financial statements."
      relatedQuestionRefs: [QO007, QO015]

    - type: missing-source
      severity: minor
      topic: leadership team completeness (TO002)
      missingEvidence: >-
        Full current C-suite roster (CFO, CPO, CTO, CRO names and backgrounds); RELEX does not
        publish a comprehensive leadership page as a private company. The Leadership and Founder Table
        (TO002) is accordingly partial.
      whyItMatters: "Functional coverage and key-person bench strength matter for scaling execution."
      diligencePath: "LinkedIn, direct company inquiry, or data provider (PitchBook/LinkedIn Sales Nav)."
      relatedQuestionRefs: [QO016]
      relatedTableRefs: [TO002]

    - type: private-evidence-only
      severity: minor
      topic: total funding rounds history (TO004)
      missingEvidence: >-
        Precise funding amounts for Series B (Summit Partners, 2015) and the December 2024 secondary
        transaction (Blackstone/TCV) are not publicly disclosed. The Milestone Table (TO004) lists all
