  evidenceGaps:
    - type: stale
      severity: material
      topic: RELEX post-2022 private valuation
      missingEvidence: >-
        No primary-source evidence exists confirming RELEX's current implied valuation
        beyond the February 2022 $5.7B Series D. The December 2024 secondary transaction
        terms were not publicly disclosed. This leaves the 2022 valuation as the only
        independently confirmed data point in a market where SaaS multiples have
        contracted 30–50% from 2021–2022 peaks.
      whyItMatters: "Investors cannot assess current fair value or entry discipline without a post-2022 transaction valuation anchor."
      diligencePath: "Request December 2024 transaction terms, including implied price per share and valuation floor, from company counsel (Krogerus, Helsinki) or data room."
      relatedQuestionRefs: [QR002]

    - type: missing-source
      severity: material
      topic: EU AI Act compliance readiness
      missingEvidence: >-
        RELEX has not publicly disclosed its EU AI Act compliance strategy, internal
        risk classification assessment, or any engagement with EU AI regulatory authorities.
        Whether RELEX's demand forecasting AI is classified as high-risk under Annex III
        has not been confirmed or denied in any public communication as of May 2026.
      whyItMatters: "High-risk classification would trigger significant product engineering and documentation requirements; non-compliance carries fines of up to €30M or 6% of global annual turnover under the AI Act."
      diligencePath: "Request RELEX's EU AI Act internal risk assessment and any pre-market conformity assessment documentation from legal counsel or compliance team."
      relatedQuestionRefs: [QR006]

    - type: private-evidence-only
      severity: material
      topic: IPO timeline and liquidity
      missingEvidence: >-
        RELEX has not communicated any definitive IPO timeline, secondary market opportunity,
        or planned liquidity mechanism for early investors as of May 2026. The Blackstone-
        and TCV-led position accumulation in December 2024 is consistent with a 2026–2028
        IPO window but no commitment has been made publicly.
      whyItMatters: "Absence of a liquidity path creates holding risk for Series C investors (TCV, 2019) who have been holding 7+ years without a public exit mechanism."
      diligencePath: "Request investor letter or board resolution on IPO planning, post-secondary investor reporting, or direct communication from Blackstone/TCV IR."
      relatedQuestionRefs: [QR024]

    - type: missing-source
      severity: minor
      topic: RELEX EBIT vs SaaS peer comparison
      missingEvidence: >-
        While Kinaxis (TSX: KXS) provides a public market comparable with disclosed
        EBIT and margin data, direct comparison between RELEX's Finnish entity financials
        and the globally consolidated Kinaxis P&L is complicated by entity-level versus
        consolidated scope differences. No analyst report provides a like-for-like
        EBIT margin comparison between RELEX and Kinaxis on a comparable basis.
      whyItMatters: "Peer-relative EBIT comparison is necessary to assess whether RELEX's operating loss trajectory is competitive or lagging for a company at its scale."
      diligencePath: "Request globally consolidated RELEX P&L from data room; cross-reference with Kinaxis public quarterly filings (SEDAR) on an ARR/employee/EBIT basis."
      relatedQuestionRefs: [QR026]

    - type: enumeration-incomplete
      severity: minor
      topic: April 2026 restructuring function breakdown
      missingEvidence: >-
        The functions most affected by RELEX's April 2026 Finnish restructuring (e.g.,
        whether customer success, R&D, professional services, or administrative roles
        were disproportionately reduced) are not disclosed in public communications.
      whyItMatters: "Function-level breakdown would determine whether the restructuring creates immediate customer implementation quality risk or is primarily back-office efficiency."
      diligencePath: "Request restructuring impact analysis by function from management; or cross-reference LinkedIn headcount changes by function post-April 2026."
      relatedQuestionRefs: [QR001, QR014]

    - type: private-evidence-only
      severity: minor
      topic: global consolidated financials
      missingEvidence: >-
        Only the Finnish parent entity's statutory accounts are publicly available;
        globally consolidated revenue, gross margin, EBITDA, and cash position across all
        RELEX subsidiaries worldwide are not disclosed.
      whyItMatters: "Finnish entity accounts capture the majority of R&D and operations but do not reflect global subsidiary contribution to revenue and profit."
      diligencePath: "Request audited consolidated group financial statements (IFRS) from company data room."
      relatedQuestionRefs: [QR011, QR026]

