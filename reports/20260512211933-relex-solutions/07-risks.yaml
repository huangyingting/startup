company:
  name: RELEX Solutions
chapter:
  number: 7
  title: Risks
  summary: >-
    RELEX Solutions faces a materially changed risk environment in 2026. An April 2026
    restructuring (up to 288 Finnish employees, ~40% of the Finnish workforce) raises
    execution and customer-success quality risk at a moment when competitive pressure is
    intensifying. EU AI Act enforcement ramps up from 2026 and RELEX's AI-driven supply
    chain recommendations may qualify as high-risk AI systems, creating compliance overhead.
    GDPR exposure is elevated given the volume of consumer purchasing data RELEX processes.
    On the competitive front, SAP IBP's ERP lock-in, Blue Yonder's AI investment, and
    Kinaxis's retail-market push all threaten RELEX's premium positioning. The $5.7 billion
    2022 valuation has no post-2022 primary confirmation, and the Finnish entity remains
    EBIT-negative (-€8.71M FY2024). Key-person concentration around three co-founders and
    EMEA revenue concentration compound residual exposure. Mitigations are generally credible
    — ISO 27001, SOC 2 Type II, a security-first architecture, and strong NRR — but several
    risks remain partially open and require active monitoring.

