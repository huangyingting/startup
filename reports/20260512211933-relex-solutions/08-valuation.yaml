company:
  name: RELEX Solutions
chapter:
  number: 8
  title: Valuation
  summary: >-
    RELEX Solutions carries a $5.7B post-money valuation anchored to its February 2022 Series D,
    implying approximately 12x its 2025 ARR of ~$467M — consistent with the upper half of the
    2024 enterprise SCP SaaS peer range (8–12x). A December 2024 secondary transaction in which
    Blackstone and TCV increased stakes without disclosed terms provided no new primary mark but
    confirmed continued investor confidence. With a Rule of 40 score of ~20, an IPO catalyst absent
    as of May 2026, and private consolidated financials, the investment recommendation is Track:
    the growth trajectory and market position support a base-case valuation of $5–6B, with a
    bull-case of $7–9B contingent on IPO readiness and AI-led margin improvement.

sections:
  - id: executive-recommendation
    title: Executive Recommendation
    body: >-
      This valuation chapter converts the evidence across Chapters 1–7 into a structured investment
      recommendation for RELEX Solutions as of May 2026. The recommendation is Track, with medium
      confidence and a medium risk rating. RELEX demonstrates a genuinely differentiated unified
      supply chain planning platform, a 28% ARR CAGR with 74 consecutive quarters of growth, and
      strong institutional backing from Blackstone and TCV. However, the $5.7B valuation mark is now
      four years old, consolidated global financials remain undisclosed, the Rule of 40 score of
      approximately 20 falls below the ≥40 threshold that typically commands SaaS premium multiples,
      and no IPO catalyst has been announced as of May 2026. The valuation stance is Fair at the
      current implied 12x ARR multiple: RELEX is priced consistently with upper-tier SCP SaaS peers
      like o9 Solutions and Kinaxis but does not yet command the premium warranted by Rule of 40
      compliance or a confirmed exit event. An entry or hold position is rational at $5–6B; any entry
      above $6.5B requires evidence of gross margin above 70%, ARR growth acceleration above 30%, or
      a confirmed IPO mandate. The Recommendation Summary table and Investment KPIs figure below
      capture the structured scoring. The Recommendation Logic flow maps the chain of evidence to
      the Track conclusion, incorporating both thesis and anti-thesis signals.
    claimRefs: [CV001, CV009, CV013, CV017, CV032, CV039]
    tableRefs: [TV001]
    figureRefs: [FV001, FV004]

  - id: valuation-context-and-financing-history
    title: Valuation Context and Financing History
    body: >-
      RELEX's last primary valuation event was its February 2022 Series D, in which the company
      raised $500M at a post-money valuation of $5.7B. The round was led by Blackstone Growth with
      participation from TCV (which first invested in the 2019 Series C at ~$450M valuation) and
      co-investors Thomas H. Lee Partners and Summit Partners. This established the current primary
      valuation anchor, which has not been updated by any subsequent primary equity transaction as
      of May 2026 — making the mark approximately four years old. In December 2024, Blackstone and
      TCV increased their respective holdings via a secondary transaction in which Summit Partners
      fully exited; the financial terms were not publicly disclosed. The absence of a disclosed
      transaction price in the secondary means external observers cannot verify whether the implied
      valuation was maintained, increased, or — contrary to public signals — reduced from the $5.7B
      primary mark. Legal advisors Krogerus (Helsinki) confirmed that the secondary was completed
      but provided no pricing information. RELEX also secured a €10M green revolving credit facility
      from Nordea Bank in January 2025. Total equity raised across all rounds is approximately $816M,
      with the Finnish parent entity carrying an equity ratio of 47.1% and reporting an EBIT loss
      of -€22M (-7.5% EBIT margin) on €292.2M FY2024 revenue — confirming the company is scaling
      but not yet at breakeven. The implied ARR multiple of the $5.7B mark is approximately 12.2x
      based on the 2025 ARR of ~$467M, consistent with the midpoint of the 2024 SCP SaaS peer range.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV011, CV012, CV016]

  - id: investment-thesis-and-anti-thesis
    title: Investment Thesis and Anti-Thesis
    body: >-
      The investment thesis for RELEX rests on four structural pillars. First, it operates the
      broadest unified supply chain planning platform in the market — demand forecasting, inventory
      management, replenishment, space and assortment, workforce management, and production planning
      in a single shared data model — a depth that has no direct public peer. Second, it has delivered
      28% ARR CAGR with 74 consecutive quarters of uninterrupted growth, demonstrating exceptional
      execution durability over 18+ years. Third, RELEX was named a Gartner Magic Quadrant Leader
      for Supply Chain Planning in 2025, validating competitive positioning just three years after
      entering the MQ. Fourth, Blackstone — one of the world's largest private equity firms — is the
      lead institutional backer, with TCV continuing as a strategic co-investor; the December 2024
      secondary confirms their conviction without a down-round signal. The anti-thesis is equally
      structured. RELEX is loss-making at -7.5% EBIT and its Rule of 40 score of approximately 20
      falls well below the ≥40 threshold for premium SaaS multiple expansion. The $5.7B valuation
      was set at a peak multiple environment in early 2022 before the ZIRP unwind compressed SaaS
      multiples industry-wide; the current mark may embed stale pricing. SAP, Oracle, and Microsoft
      are investing heavily in AI-enabled supply chain planning that competes directly with RELEX.
      Finally, without IPO or audited consolidated financial disclosure, there is no market-clearing
      mechanism to confirm or deny the current valuation. The Thesis / Anti-Thesis table below
      structures each argument with its evidence anchor and the conditions that would change the view.
    claimRefs: [CV007, CV009, CV014, CV015, CV038, CV039, CV040, CV041, CV045]
    tableRefs: [TV002]

  - id: comparable-company-analysis
    title: Comparable Company Analysis
    body: >-
      Four comparable sets inform RELEX's valuation: public SCP SaaS peers, private SCP peers,
      supply chain M&A transactions, and planning software M&A transactions. The most directly
      comparable public company is Kinaxis (TSX: KXS), the only pure-play listed SCP vendor. Kinaxis
      reported FY2024 ARR of approximately CAD$590M (~USD$435M), with 13% year-over-year revenue
      growth and a market capitalization of approximately CAD$4.3–5B (~USD$3.2–3.7B), implying an
      ARR multiple of 7–8.5x USD. Kinaxis's lower multiple relative to RELEX's implied 12x reflects
      its slower growth rate (13% vs. RELEX's 28%) and narrower product focus on the supply chain
      planning segment without the breadth of RELEX's retail-specific modules. Manhattan Associates
      (NASDAQ: MANH) trades at a significant premium (~25–28x ARR on ~$900M ARR) but this reflects
      its successful SaaS transition premium and expanding planning module, making it a ceiling
      reference rather than a direct comp. Among private peers, o9 Solutions was valued at $3.7B in
      its 2023 KKR financing round on approximately $300–350M ARR, implying ~10–12x ARR — the
      closest structural analog to RELEX's current positioning. Blue Yonder was acquired by Panasonic
      in 2021 at ~$7.1B, approximately 7x its ARR of ~$1B at acquisition — a 2021 peak-multiple
      transaction now representing a compressed historical floor. Anaplan, acquired by Thoma Bravo in
      June 2022 at $10.7B (~18x ARR on ~$600M ARR), represents the peak of planning software M&A
      multiples and is now an outlier reference. The enterprise SaaS SCP peer median ARR multiple in
      2024 is approximately 8–12x, compressed from the 2021 peak of 25–35x. RELEX at ~12x ARR sits
      at the upper bound of this range, reflecting a premium for its ARR growth rate and platform
      breadth. The Comparable Valuation table and Valuation Sensitivity figure below structure the
      full comp set and scenario sensitivity.
    claimRefs: [CV021, CV022, CV023, CV024, CV025, CV026, CV027, CV028, CV029]
    tableRefs: [TV004]
    figureRefs: [FV002]

  - id: scenario-analysis
    title: Bull / Base / Bear Scenario Analysis
    body: >-
      Three scenarios frame the range of outcomes for RELEX's valuation by 2027–2028, spanning
      from IPO-readiness with AI premium to execution shortfall with no exit catalyst. The base
      case — probability-weighted at approximately 55% — assumes RELEX maintains its current ARR
      trajectory of 25–30% growth, reaches approximately $500–550M ARR by 2027, achieves Rule of
      40 improvement toward 25–30 through margin recovery, and is valued at 10–13x ARR by
      institutional investors in a secondary or IPO context, yielding a base-case valuation of $5B–
      $6B. The bull case — probability-weighted at approximately 25% — requires RELEX to file for
      IPO on NYSE or Nasdaq in 2026–2028, validate its AI platform premium (Rebot agentic AI
      adoption validated by key customers), improve Rule of 40 above 35, and achieve IPO pricing at
      15–19x ARR on $550–600M projected ARR, yielding a valuation of $7B–$9B. The bear case —
      probability-weighted at approximately 20% — assumes ARR growth decelerates below 15%, execution
      concerns emerge from any prior restructuring or leadership changes, no IPO materialises in
      the 2026–2028 window, and the multiple compresses to 7–8x the ~$467M ARR, yielding a valuation
      of $3.5B–$4B. The probability signals for the bull case rest on: (1) continued Blackstone
      commitment, (2) Rule of 40 trajectory improvement, and (3) AI competitive proof in key
      customer wins. The probability signals for the bear case rest on: (1) ARR growth deceleration,
      (2) large customer loss, and (3) delayed IPO window. The Valuation / Return Range figure and
      Bull / Base / Bear Scenario table below present the structured outputs. The scenario analysis
      implies a probability-weighted expected valuation of approximately $5.6B, marginally above the
      current $5.7B mark — suggesting that at the current price, the risk/reward is balanced but
      the distribution is right-skewed (IPO upside > distressed bear).
    claimRefs: [CV030, CV031, CV032, CV033, CV037, CV042]
    tableRefs: [TV003]
    figureRefs: [FV003]

  - id: exit-readiness-and-diligence
    title: Exit Readiness, Thesis-Break Triggers, and Final Diligence Asks
    body: >-
      RELEX has three credible exit paths available in the 2026–2028 window: an IPO on NYSE or
      Nasdaq, a strategic acquisition, or a Blackstone-led sponsor secondary or buyout. An IPO is
      the highest-value exit at $6B–$9B given the SaaS premium and liquid market access; as a Finnish
      company with global operations, NYSE or Nasdaq is the natural venue. As of May 2026, no S-1
      has been filed and no IPO adviser mandate has been announced publicly, suggesting the company
      is in preparation but not yet in a formal registration process. RELEX would likely need to
      improve its Rule of 40 to ≥35 and disclose consolidated global financials before a successful
      institutional roadshow. Among strategic acquirers, SAP is the most natural fit given RELEX's
      complementary retail supply chain capabilities, but an SAP acquisition would face material EU
      and US antitrust scrutiny given SAP's existing ERP dominance and growing IBP footprint. Oracle,
      Salesforce, and Microsoft are alternative strategic buyers with fewer antitrust constraints.
      Blackstone Growth could execute a sponsor-led secondary buydown or full buyout if IPO conditions
      remain unfavourable. The December 2024 secondary transaction, while providing Summit Partners
      with full exit liquidity, also extended Blackstone and TCV's holding horizon. Five thesis-break
      triggers and five key diligence gaps are structured in the tables below, enabling an investment
      committee to monitor the thesis and prioritise the most critical evidence gaps before committing
      capital above $5.5B.
    claimRefs: [CV033, CV034, CV035, CV036, CV037, CV038, CV043, CV044]
    tableRefs: [TV005, TV006]

