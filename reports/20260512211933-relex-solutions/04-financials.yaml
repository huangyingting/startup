    claimRefs: [CI001, CI002, CI031, CI036]

callouts:
  - calloutType: strength
    title: 74 Consecutive ARR Growth Quarters — Rare Revenue Quality Signal
    body: >-
      RELEX has delivered 74 consecutive quarters of ARR growth as of Q4 2025 — approximately
      18.5 years of uninterrupted recurring revenue expansion — while maintaining a 62 NPS and
      35% customer expansion rate in FY2025. This combination of growth durability, customer
      loyalty, and expansion motion is exceptionally rare in enterprise SaaS and underpins
      durable compounding unit economics.
    claimRefs: [CI006, CI011, CI012]

  - calloutType: risk
    title: April 2026 Restructuring and Persistent Operating Losses
    body: >-
      Despite strong ARR growth, RELEX's Finnish parent entity has operated at a loss every
      disclosed fiscal year through FY2024 (EBIT -7.5%). The April 2026 restructuring affecting
      up to 288 Finnish employees signals a deceleration in growth confidence and a priority shift
      toward profitability ahead of a potential exit event. Investors should closely monitor
      whether FY2026 ARR growth holds above 25% post-restructuring.
    claimRefs: [CI002, CI029, CI030]

  - calloutType: insight
    title: ~25% R&D Investment Creates Scientific Product Moat but Delays Breakeven
    body: >-
      RELEX re-invests approximately twice the SaaS industry average in R&D (~25% of revenue
      vs. ~15% industry norm), funding continuous improvement of AI forecasting models trained
      on 700+ enterprise deployments. This scientific moat is defensible but materially delays
      EBIT breakeven; investors face a trade-off between platform differentiation and near-term
      profitability.
    claimRefs: [CI010, CI031]

