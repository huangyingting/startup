company:
  name: RELEX Solutions
chapter:
  number: 4
  title: Financials
  summary: >-
    RELEX Solutions generates subscription-led ARR that grew 28% in constant currencies in FY2025
    (74 consecutive growth quarters), reaching an estimated $467M globally, while the Finnish parent
    entity reported €292.2M revenue (+24.8% YoY) at a -7.5% EBIT margin in FY2024. The company
    remains in an investment phase: ~25% of revenue re-invested in R&D, operating losses persisting
    through FY2024, and an April 2026 restructuring of up to 288 Finnish employees signalling a
    deliberate pivot toward profitability. Capital adequacy is underpinned by ~$816M raised and a
    47.1% equity ratio, but consolidated cash, FCF, NRR, and gross margin are all undisclosed.

sections:
  - id: revenue-model-and-arr-quality
    title: Revenue Model and Subscription ARR Quality
    body: >-
      RELEX generates revenue through two primary streams: multi-year enterprise SaaS subscriptions
      and professional services or implementation fees. Subscriptions are the strategically dominant
      stream and are structured around annual contract values tied to the volume of SKUs, stores, or
      production assets under management and the number of platform modules deployed, creating an
      expanding revenue base as customers adopt additional capabilities over time. Professional
      services are recognised as delivered and represent a secondary, lower-margin stream estimated
      at 15–25% of total revenue based on comparable enterprise SaaS benchmarks. The Finnish parent
      entity (Retail Logistics Excellence — RELEX Oy) reported €292.2 million in statutory revenue
      for fiscal year 2024, a 24.8% year-over-year increase, while subscription revenue grew 30%
      and annual recurring revenue grew 30%+ in FY2024. In FY2025, subscription revenue grew
      another 30% and ARR grew 28% in constant currencies, reaching a milestone of 74 consecutive
      quarters of uninterrupted ARR growth. Global ARR is estimated at approximately $467 million in
      2025 per third-party data. Third-party estimates show sequential ARR of $152.1M (2023),
      $290.5M (2024), and $467M (2025). RELEX's pricing is based on contract scope and module
      selection; no volume-based usage billing has been disclosed. The RELEX Open platform
      (announced May 2026) introduces extensibility and third-party AI agent connectivity, creating
      potential new usage or marketplace revenue vectors on top of the core subscription base. The EU
      AI Act (in force August 2024) imposes risk-classification requirements on AI systems used in
      supply chain contexts; RELEX's AI-driven forecasting and autonomous replenishment modules may
      face compliance cost while simultaneously attracting enterprise buyers seeking a vendor with
      governance controls already in place.
    claimRefs: [CI001, CI005, CI006, CI007, CI008, CI009, CI036, CI037, CI038, CI039]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: gtm-motion-and-sales-efficiency
    title: GTM Motion and Sales Efficiency Proxies
    body: >-
      RELEX operates a direct enterprise sales model with regionally structured field sales in North
      America, Europe, and Asia-Pacific. Enterprise supply chain planning deals typically require
      9–18 months from initial engagement to contract signature for large retailers and manufacturers,
      given the complexity of system integration and data migration. RELEX does not publicly disclose
      CAC, sales payback period, or sales efficiency ratios. Key efficiency proxies visible from
      public evidence include: (1) subscription revenue grew 30% YoY in FY2025 against an improving
      but still negative margin, implying adequate gross-margin contribution to justify go-to-market
      spend; (2) approximately 100 net-new customers added in FY2025, a 45% YoY increase in new logo
      wins; (3) NPS of 62 compared with a SaaS industry average of approximately 40, suggesting
      strong expansion sales from within the existing base; (4) 35% of existing customers expanded
      their footprint in FY2025, implying a healthy land-and-expand motion. RELEX also maintains a
      strategic implementation partnership with Wipro, extending reach via system integrators in
      large enterprise accounts. SAP Integrated Business Planning (SAP IBP) competes directly for
      S&OP and demand-planning budgets at SAP ERP installed-base accounts, creating pricing pressure
      in accounts with deep SAP dependency. RELEX's R&D investment at ~25% of revenue — nearly
      double the ~15% SaaS industry benchmark — drives product differentiation but constrains
      near-term margin improvement. Gross margin is not publicly disclosed but is estimated at
      70–75% based on enterprise SaaS peer benchmarks and the structure of RELEX's cost base,
      suggesting healthy unit economics at scale. Gartner Magic Quadrant Leader status in 2025
      supports RELEX's competitive win rate and pricing authority in competitive evaluations.
    claimRefs: [CI010, CI011, CI012, CI013, CI031, CI032, CI033, CI035, CI041]
    tableRefs: [TI002]
    figureRefs: [FI005]

  - id: cost-structure-and-gross-margin
    title: Cost Structure and Gross Margin Analysis
    body: >-
      The Finnish parent entity incurred an EBIT of -€22 million in FY2024 (-7.5% margin on
      €292.2M revenue), reflecting an ongoing investment phase rather than a mature cost structure.
      Finnish entity operating losses have improved from approximately -€26.4 million in FY2022,
      demonstrating early operating leverage as revenue scales — approximately €4 million of
      improvement over two fiscal years, though the pace of margin expansion has been gradual. The
      company reinvests approximately 25% of revenue in R&D, nearly double the ~15% SaaS industry
      average, reflecting RELEX's scientific differentiation strategy and continued platform
      investment in AI, forecasting, and extensibility. Sales and marketing and G&A expense are not
      separately disclosed in public accounts; based on comparable enterprise SaaS companies at
      similar growth rates, combined sales, marketing, and G&A spend is estimated at approximately
      50–60% of revenue, leaving gross profit to absorb the remainder. RELEX's Finnish entity
      employed 914 people as of the FY2024 statutory filing, implying revenue per employee of
      approximately €320K — at the upper end of enterprise SaaS benchmarks and reflecting
      the high average seniority and R&D concentration of the Finnish workforce. Global headcount
      is estimated at 2,300+ across 21 countries, with the Finnish entity representing the dominant
      R&D, engineering, and product cost centre. The April 2026 restructuring notification —
      affecting up to 288 Finnish employees, with 722 in co-determination consultations — is a
      significant signal that management is actively targeting the Finnish cost base to improve
      operating leverage and accelerate the path to group-level profitability ahead of a potential
      liquidity event. Gross margin is estimated at 70–75%; not publicly disclosed.
    claimRefs: [CI002, CI004, CI010, CI017, CI026, CI029, CI030, CI031, CI040]
    tableRefs: []
    figureRefs: [FI002]

  - id: public-traction-and-private-gaps
    title: Public Traction and Private Metric Gaps
    body: >-
      RELEX's publicly available financial data is limited to the Finnish parent entity's statutory
      IFRS accounts (accessible via the Finnish Business Registry), company-authored press releases
      disclosing subscription and ARR growth rates, and third-party estimates from data aggregators.
      The most reliable public traction evidence includes: Finnish entity FY2024 revenue of €292.2M
      (+24.8% YoY), company-reported subscription revenue growth of 30%+ in FY2024 and FY2025, 74
      consecutive quarters of ARR growth as of Q4 2025, and third-party estimates placing global
      ARR at approximately $467M in 2025. Customer wins — including Hy-Vee (560+ stores across nine
      US states) in early 2026, Douglas Group (European expansion across Netherlands, Belgium, and
      Eastern Europe), and Forever Cheese (three DCs, 1,000+ SKUs) — provide qualitative evidence
      of continued ARR growth momentum. Key private metrics that remain undisclosed include:
      absolute consolidated ARR (RELEX reports only growth rates), gross margin percentage,
      net revenue retention rate, customer ARR cohort data, absolute operating cash flow and free
      cash flow, monthly burn rate, and the complete set of non-Finnish entity financial statements.
      The gap between Finnish entity revenue (€292.2M ≈ $320M) and estimated global ARR ($467M)
      implies material subscription ARR contribution from non-Finnish subsidiaries not consolidated
      in public statutory filings. Third-party ARR estimates from GetLatka rely on inference from
      public signals and should be treated as directional, not definitive. Investors performing full
      diligence must require consolidated audited group financial statements, absolute ARR
      confirmation with cohort data, and NRR disclosure before underwriting a valuation.
    claimRefs: [CI001, CI005, CI006, CI007, CI008, CI009, CI012, CI013, CI014, CI015, CI016, CI027]
    tableRefs: []
    figureRefs: []

  - id: capital-adequacy-and-financing-dependency
    title: Capital Adequacy and Financing Dependency
    body: >-
      RELEX has raised approximately $816 million in total external equity capital. The last
      disclosed equity round was the February 2022 Series D ($568M, Blackstone Growth, $5.7B
      post-money valuation). TCV led the Series C ($226M, February 2019, ~$450M post-money), and
      Summit Partners invested in the Series B (~2015, amount undisclosed). In December 2024,
      Blackstone and TCV increased their stakes via a secondary transaction in which Summit Partners
      fully exited; the financial terms of this secondary transaction were not publicly disclosed
      and no new valuation anchor was established. In January 2025, RELEX secured a €10 million
      green revolving credit facility from Nordea Bank — its first sustainability-linked debt
      instrument — indicating access to institutional debt capital in addition to equity. No further
      equity round or IPO timeline has been announced as of May 2026. Cash on hand and monthly burn
      rate are not separately disclosed in public accounts. The Finnish entity equity ratio of 47.1%
      as of FY2024 provides a balance-sheet buffer, though ongoing operating losses (-€22M EBIT
      in FY2024) indicate continued cash consumption. The Blackstone/TCV investor profile and
      typical PE/growth-equity hold periods of five to seven years (2022 + 5-7 years = 2027–2029
      exit window) imply a potential liquidity event via IPO or strategic sale within this window.
      The April 2026 restructuring of the Finnish workforce is consistent with a management
      objective of reaching near-profitability ahead of a public offering. No indicators of
      near-term mandatory refinancing exist based on available public evidence, but the ongoing
      operating loss limits internal cash generation and increases dependence on investor patience
      or a future capital raise if the ARR growth trajectory decelerates further.
    claimRefs: [CI003, CI018, CI019, CI020, CI021, CI022, CI023, CI024, CI025, CI029]
    tableRefs: [TI003, TI004]
    figureRefs: [FI004]

  - id: financial-verdict-and-diligence-blockers
    title: Financial Verdict and Diligence Blockers
    body: >-
      RELEX demonstrates high subscription revenue quality — 30%+ ARR growth across FY2024 and
      FY2025, 74 consecutive growth quarters, 35% customer expansion rate in FY2025, and a 62 NPS
      — offset by persistent operating losses and limited financial transparency for a company at
      this scale. At the last disclosed $5.7B valuation and estimated $467M ARR, RELEX implied a
      ~12x ARR multiple — a premium to public comp Kinaxis (TSX: KXS, ~3–5x revenue) but
      justifiable by RELEX's superior growth rate and private-company scarcity premium. Bear-case
      exit valuation (6–8x 2027 ARR of ~$530M) implies $3.2–4.2B enterprise value; base case
      (10–12x) implies $5.3–6.4B; bull case (15–18x 2028 ARR of ~$680M) implies $10.2–12.2B.
      The April 2026 restructuring reduces the Finnish cost base but raises questions about growth
      confidence and near-term ARR deceleration risk. RELEX Open (May 2026) creates a credible
      platform extensibility narrative but introduces execution risk on a new architecture. The
      estimated Rule of 40 score (~18, combining 28% ARR growth and approximately -10% FCF margin)
      is below the 40+ threshold required for premium SaaS valuations and constrains near-term
      multiple expansion. Key diligence blockers are: (1) no consolidated group financial
      statements have been disclosed; (2) ARR is reported as growth rates only, not absolute
      figures; (3) gross margin, NRR, and FCF are undisclosed; (4) December 2024 secondary
      transaction valuation is undisclosed; (5) April 2026 restructuring impact on ARR, NRR,
      and customer sentiment is unknown; (6) RELEX Open platform extensibility risk is unquantified.
    claimRefs: [CI005, CI006, CI012, CI013, CI027, CI028, CI029, CI034, CI038, CI041]
    tableRefs: []
    figureRefs: [FI003]

