  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: consolidated group financial statements
      missingEvidence: >-
        Globally consolidated revenue, gross margin, EBITDA, operating cash flow, free cash flow,
        and total cash position across all RELEX subsidiaries are not publicly available. Only
        the Finnish parent entity statutory accounts (Asiakastieto) are accessible; non-Finnish
        subsidiaries have no public filings.
      whyItMatters: >-
        Without consolidated financials, investors cannot assess true group profitability, gross
        margin, cash consumption, or working capital dynamics. The Finnish entity (~$320M revenue)
        materially understates the global group (~$467M ARR).
      diligencePath: >-
        Request audited consolidated group financial statements from RELEX management or legal
        counsel; Krogerus (Helsinki) advised on the December 2024 transaction.
      relatedQuestionRefs: [QI010, QI014, QI026]
      relatedTableRefs: [TI004]

    - type: private-evidence-only
      severity: material
      topic: absolute ARR, NRR, and gross margin
      missingEvidence: >-
        RELEX discloses only ARR and subscription revenue growth rates in press releases, not
        absolute ARR figures. Net revenue retention rate (NRR), gross margin, and customer-level
        ARR cohort data are not publicly disclosed.
      whyItMatters: >-
        Absolute ARR, NRR, and gross margin are the three most critical financial metrics for
        underwriting a SaaS company. Without them, revenue quality, expansion durability, and
        unit economics cannot be fully assessed. GetLatka ARR estimates are directional only.
      diligencePath: >-
        Request ARR waterfall with cohort detail (new ARR, expansion ARR, contraction ARR,
        churn ARR) for at least the last four quarters; request audited P&L with gross margin line.
      relatedQuestionRefs: [QI011, QI017]
      relatedTableRefs: [TI002]

    - type: private-evidence-only
      severity: material
      topic: December 2024 secondary transaction valuation
      missingEvidence: >-
        The financial terms of the December 2024 secondary transaction (Blackstone/TCV buying out
        Summit Partners) were not publicly disclosed. No new implied valuation was established,
        leaving the February 2022 $5.7B Series D as the only confirmed valuation anchor — now
        over three years stale.
      whyItMatters: >-
        Stale valuation anchor creates significant uncertainty for any current-period underwriting.
        The implied 12x ARR multiple assumes no multiple compression since 2022, which may not
        reflect post-2022 SaaS multiple contraction.
      diligencePath: >-
        Request December 2024 secondary transaction documents or the implied share price;
        legal advisory was provided by Krogerus (Helsinki).
      relatedQuestionRefs: [QI021]

    - type: private-evidence-only
      severity: minor
      topic: monthly cash burn and runway
      missingEvidence: >-
        RELEX's monthly cash burn rate, total cash on hand, and runway in months are not publicly
        disclosed. The Finnish entity EBIT provides only an indirect proxy (approximately -€1.8M
        per month) that does not account for working capital, capex, debt service, or the cash
        dynamics of non-Finnish subsidiaries.
      whyItMatters: >-
        Without confirmed cash burn and runway, investors cannot assess the probability or
        timing of a future capital raise and the resulting dilution risk.
      diligencePath: >-
        Request monthly cash flow statement and rolling 12-month cash forecast from CFO;
        confirm debt covenant terms on the Nordea €10M green credit facility.
      relatedQuestionRefs: [QI026]

    - type: private-evidence-only
      severity: minor
      topic: Rule of 40 and FCF margin
      missingEvidence: >-
        Free cash flow margin, the FCF-basis Rule of 40 score, and operating cash flow are
        not publicly disclosed. The estimated Rule of 40 of approximately 18 (using ARR growth
        and estimated FCF) is a directional proxy only.
      whyItMatters: >-
        Rule of 40 below 40 constrains near-term premium multiple support; without FCF
        confirmation, the efficiency discount applied to RELEX's valuation cannot be quantified.
      diligencePath: >-
        Request unlevered FCF bridge for the last two fiscal years; confirm operating cash
        flow from the consolidated group P&L.
      relatedQuestionRefs: [QI014]
