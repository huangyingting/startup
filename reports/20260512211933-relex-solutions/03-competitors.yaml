  - id: FP003
    title: Moat / Readiness KPIs
    type: kpi
    layout: standard
    summary: >-
      Compact competitive durability summary for RELEX: seven KPIs capturing the strength and
      breadth of RELEX's moat factors as of May 2026. These indicators include ARR consistency,
      customer scale, switching-cost evidence, SI distribution breadth, compliance posture, and
      platform expansion depth. Together they support a medium-to-high moat durability assessment
      for the 2026–2028 competitive horizon, moderated by the April 2026 restructuring execution
      risk.
    data:
      items:
        - label: Consecutive Quarters of ARR Growth
          value: "74 quarters"
          note: "Unbroken since founding; through Q1 2026. Demonstrates competitive resilience across multiple cycles."
        - label: Named Enterprise Customers
          value: "700+"
          note: "700+ globally; includes Home Depot, AutoZone, PetSmart, Dollar Tree, Circle K, M&S Food, Coles"
        - label: Avg. Implementation Timeline (Switching Cost)
          value: "12–24 months"
