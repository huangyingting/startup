        - label: Global SI Partners (Wipro, Accenture, Capgemini, others)
          value: "3+ tier-1 SIs"
          note: "SI relationships provide enterprise distribution and reduce GTM cost in new geographies"
        - label: Platform Modules (Unified Data Model)
          value: "7 modules"
          note: "Demand, Replenishment, Space, Assortment, Workforce, Promotions, Production Planning"
        - label: Compliance Certifications
          value: "ISO 27001 + SOC 2 I+II"
