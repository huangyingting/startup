company:
  name: RELEX Solutions
chapter:
  number: 3
  title: Competitors
  summary: >-
    RELEX Solutions competes in a concentrated best-of-breed supply chain planning (SCP) market
    against four principal competitor categories: best-of-breed specialists (Blue Yonder, Kinaxis,
    o9 Solutions), ERP-embedded planning modules (SAP IBP, Oracle SCP), adjacent execution vendors
    expanding into planning (Manhattan Associates), and the persistent status-quo substitute of
    spreadsheet-based processes. RELEX's core differentiators are its purpose-built retail vertical
    depth, a unified data model spanning demand-to-replenishment-to-space-to-workforce, and a
    data flywheel of millions of SKU-location forecasting models. Near-term risks include Blue
    Yonder's AI re-platforming, Kinaxis's retail expansion, and RELEX's April 2026 Finnish
    workforce restructuring introducing execution risk during a period of heightened competitive
    intensity.

