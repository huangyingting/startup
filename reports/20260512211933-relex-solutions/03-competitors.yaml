    title: Competitive Positioning Map
    type: quadrant
    layout: wide
    summary: >-
      Quadrant mapping eight market participants on X-axis (Retail Vertical Depth: Low=1 to High=10)
      and Y-axis (AI / Modern Architecture Maturity: Low=1 to High=10). RELEX occupies the
      top-right quadrant — highest retail depth combined with strong AI maturity. Kinaxis and o9
      rank high on AI maturity but low-to-moderate on retail vertical depth. SAP IBP and Oracle SCP
      sit mid-range on both axes, reflecting broad ERP coverage but moderate AI maturity. Blue Yonder
      ranks strong on retail depth but below RELEX on AI maturity after its 2025 refresh. Scores are
      ordinal assessments based on product documentation, Gartner reviews, and analyst coverage.
