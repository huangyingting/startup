summary:
  headline: >-
    EvolutionaryScale 做出了前沿质量的蛋白语言模型（经 Science 验证的 ESM3），但 2025 年 11 月被 CZI 吸收——距 $142M Series A 仅约 14
    个月——终结了独立投资逻辑，商业投资人的回报也未有公开交代。
