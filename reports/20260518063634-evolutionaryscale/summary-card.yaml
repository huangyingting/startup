summary:
  headline: >-
    EvolutionaryScale produced frontier-quality protein language models (Science-validated ESM3) but the November 2025
    CZI absorption — barely 14 months after the $142M Series A — eliminates the standalone investment thesis and leaves
    commercial investor returns publicly unaccounted for.
