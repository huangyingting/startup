  - id: legal-ip-risk
    title: "Legal and IP Risk"
    body: >-
      EvolutionaryScale's ESM3 was trained using ESM2 weights as a starting point. Meta's facebookresearch/esm
      GitHub repository (which hosts ESM2) does not carry a standard open-source licence for the model weights
      themselves; the ESM2 model weights are described under Meta's own model card terms. The relationship between
      ESM3's commercial weights and the ESM2 ancestor weights is not fully documented in public sources, creating
      a latent IP provenance risk if Meta were to assert rights over derivative works.

      The biorxiv preprint competing interest statement notes that "patents have been filed related to aspects of this
      work." The nature, claims, and status of these patents are not publicly disclosed. The discrete-token approach to
      protein modelling used in ESM3 (tokenising 3D structure and function into discrete alphabets) has potential
      prior art from academic groups, including the Baker Lab, Meta FAIR, and Oxford-based researchers. Any
      infringement assertion — or patent interference proceedings — could slow commercialisation or require expensive
      licensing arrangements.

      EvolutionaryScale is incorporated as a Public Benefit Corporation (PBC), which provides some governance
      flexibility but also creates obligations around public benefit mission that could constrain purely commercial
      decisions, particularly around open-model access vs. commercial gating.
    claimRefs:
