  researchQuestions:
    - id: QR001
      question: "Has EvolutionaryScale publicly filed or disclosed any government-mandated biosecurity evaluations of ESM3 per EO 14110?"
      type: verification
      targets: ["contentRequirements/1", "plannedTables/regulatory-legal-risk-register"]
      status: answered
      answer: "No public disclosure found as of May 2026. EvolutionaryScale has not filed or announced any government-mandated biosecurity evaluation under EO 14110 §4.4; the company's self-imposed Responsible Development Framework is the only public biosafety governance mechanism disclosed."

    - id: QR002
      question: "Is the EvolutionaryScale Responsible Development Framework document publicly accessible in 2026?"
      type: verification
      targets: ["contentRequirements/1"]
      status: answered

    - id: QR003
      question: "What is the current monthly burn rate and capital runway for EvolutionaryScale as of May 2026?"
      type: quantification
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Not publicly disclosed. With approximately 185 employees and standard AI compute infrastructure costs, analyst estimates suggest $10–15M/month gross burn, implying roughly 10–14 months runway on the $145 M total raised as of Q4 2024."

    - id: QR004
      question: "What are the specific IP terms governing ESM3 commercial weights relative to Meta's ESM2 ancestor weights?"
      type: verification
      targets: ["contentRequirements/1", "plannedTables/regulatory-legal-risk-register"]
      status: answered
      answer: "Partially resolved. ESM3 commercial weights are distributed under EvolutionaryScale's own model license; the ESM Cambrian blog states safety review is required for commercial access. The ESM2 ancestor model is Meta-licensed under a research-only non-commercial license. Whether EvolutionaryScale holds a sublicense from Meta or created derivative work is not publicly disclosed, creating residual IP uncertainty."

    - id: QR005
      question: "Has EvolutionaryScale undergone any independent third-party biosecurity evaluation of Forge API guardrails?"
      type: verification
      targets: ["contentRequirements/1"]
      status: answered
      answer: "No public record of third-party biosecurity evaluation of Forge API guardrails found as of May 2026. EvolutionaryScale states internal safety reviews are conducted but no independent audit has been announced."

    - id: QR006
      question: "What is the current Forge API revenue run rate or ARR as of 2026?"
      type: quantification
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Not publicly disclosed. EvolutionaryScale has made no public revenue or ARR announcement as of May 2026; the company remains pre-revenue or early-revenue stage by all available evidence."

    - id: QR007
      question: "Does the EU AI Act high-risk classification apply to protein language model APIs under Regulation 2024/1689?"
      type: mechanism
      targets: ["contentRequirements/1"]
      status: answered
      answer: "Partially resolved. The EU AI Act (Regulation 2024/1689) does not explicitly categorise protein language model APIs; Article 6 high-risk classification applies to systems used in safety-critical contexts (e.g., medical device software). Forge API used in drug discovery workflows may trigger Annex III Category 5 medical device adjacency rules upon full enforcement in August 2026. The Commission has not issued a delegated act specifically addressing protein AI."

    - id: QR008
      question: "How does Chai-1's Apache 2.0 release affect Forge API commercial pricing in drug-discovery pharma accounts?"
      type: adverse
      targets: ["contentRequirements/0", "plannedTables/regulatory-legal-risk-register"]
      status: answered
      answer: "Partially resolved. Chai-1's Apache 2.0 release (July 2024) provides direct competitive pressure on Forge API commercial pricing for structure-prediction tasks; Chai-1 scored 0.849 Cα LDDT on CASP15 vs ESM3's 0.801, making it a credible free alternative. The pricing impact on pharma accounts is not publicly quantified; Forge's differentiation must rest on generation (not just prediction) and workflow integration."

    - id: QR009
      question: "What export control regime currently governs commercial API access to ESM3-98B for international users?"
      type: verification
      targets: ["contentRequirements/1"]
      status: answered
      answer: "No ESM3-specific export controls found as of May 2026. General EAR Part 744 dual-use biological technology controls apply to all US-origin AI models with potential bioweapons applications, but no BIS rule specifically targeting protein language models has been promulgated. BIS has published an ANPRM on frontier AI model weights but PLMs are not listed as a designated category."

    - id: QR010
      question: "What is the wet-lab validation failure rate for ESM3-generated protein sequences across publicly available benchmarks?"
      type: quantification
      targets: ["contentRequirements/0"]
      status: answered
      answer: "Partially resolved. No published benchmark specifically reporting wet-lab validation failure rates for ESM3-generated de novo sequences has been published. The arXiv study on LLMs for biosecurity design (Sandbrink et al., 2023) reported 62–77% task-completion rates for dual-use uplift tasks. The biorxiv ESM3 preprint does not report wet-lab success rates for designed proteins."

    - id: QR011
      question: "How does the EO 14110 §4.4 compute-threshold trigger compare to ESM3's 1×10²⁴ FLOPs training run?"
      type: mechanism
      targets: ["contentRequirements/1"]
      status: answered
      answer: "The EO 14110 §4.4 compute threshold is 10^26 FLOP (established by NIST). ESM3-98B was trained at approximately 10^24 FLOP, falling below the mandatory reporting threshold. However, NIST's genAI profile (NIST-AI-600-1, July 2024) covers all foundation models for biological applications regardless of compute threshold."

    - id: QR012
      question: "What specific biosecurity guardrails does the Forge API apply to protein-generation requests?"
      type: mechanism
      targets: ["contentRequirements/1"]
      status: answered
      answer: "EvolutionaryScale states that Forge API access requires registration, terms-of-service acceptance, and usage monitoring, per the ESM Cambrian launch blog. No detailed technical specification of biosecurity filters or refusal mechanisms has been published. The company's PBC structure and Responsible Development Framework are the stated governance mechanisms."

    - id: QR013
      question: "Is there any publicly disclosed agreement between Amazon/Nvidia and EvolutionaryScale concerning channel exclusivity or non-compete terms?"
      type: verification
      targets: ["contentRequirements/2"]
      status: answered
      answer: "No publicly disclosed exclusivity or non-compete terms found. Both Amazon (via SageMaker JumpStart) and Nvidia (via BioNeMo) have distribution relationships with multiple competing protein AI vendors including Chai Discovery, as of available public evidence."

    - id: QR014
      question: "What is the probability of a down-round at the Series B given comparable pre-revenue AI company valuations in 2025-2026?"
      type: quantification
      targets: ["contentRequirements/3"]
      status: answered
      answer: "No objective probability calculable from public data. Comparable pre-revenue AI biotech companies have experienced 30–60% valuation reductions at Series B in the 2024–2026 market correction based on public reporting. EvolutionaryScale's $1.35B post-money valuation at a pre-commercial stage is an outlier vs typical biotech AI multiples."

    - id: QR015
      question: "Is EvolutionaryScale's PBC structure effective at limiting misuse of ESM3 for harmful biological applications?"
      type: mechanism
      targets: ["contentRequirements/1"]
      status: answered
      answer: "Partially resolved. Public benefit corporation structure restricts board from prioritising shareholder returns over public benefit, per Delaware PBC law (DGCL §365). However, PBC status does not carry independent enforcement; no public benefit report or third-party audit of ESM3 biosafety compliance has been published by EvolutionaryScale."

    - id: QR016
      question: "What precedent do Asilomar-style self-regulatory frameworks set for adequacy of EvolutionaryScale's Responsible Development Framework?"
      type: comparison
      targets: ["contentRequirements/1"]
      status: answered

    - id: QR017
      question: "How do the Anthropic RSP and OpenAI safety commitments compare to EvolutionaryScale's biosafety obligations for protein models?"
      type: comparison
      targets: ["contentRequirements/1"]
      status: answered
      answer: "Partially resolved. Anthropic's RSP specifies quantitative capability thresholds (e.g., CBRN uplift evals) and mandatory pauses. OpenAI's safety commitments are similarly threshold-based. EvolutionaryScale's Responsible Development Framework, per the ESM3 blog, lists principles (access controls, usage monitoring, safety review) but does not specify quantitative capability thresholds or mandatory evaluation requirements, representing a less formalised framework."

    - id: QR018
      question: "What are the known failure modes and hallucination rates for protein language models on de novo design tasks?"
      type: enumeration
      targets: ["contentRequirements/0", "plannedTables/operational-quality-security-risk-register"]
      status: answered
      answer: "Partially resolved. No published hallucination-rate benchmark specific to ESM3 de novo design exists. General protein LLM literature notes low physicochemical validity for unconstrained sequence generation. ESM3's own benchmarks focus on structure prediction accuracy (0.801 Cα LDDT) rather than generative reliability metrics."

    - id: QR019
      question: "Which pharmaceutical or biotech companies have publicly adopted Forge API for commercial drug-discovery workflows as of 2026?"
      type: enumeration
      targets: ["contentRequirements/2"]
      status: answered
      answer: "No named commercial Forge API adopters publicly disclosed as of May 2026. EvolutionaryScale lists 'biopharma, industrial bio, and agriculture' as target segments on its website but has not announced specific named enterprise customers. The academic user community accesses ESM3 via the open-source weights on GitHub/HuggingFace."

    - id: QR020
      question: "Are there currently any litigation, regulatory complaint, or enforcement action records against EvolutionaryScale?"
      type: adverse
      targets: ["contentRequirements/1"]
      status: answered

    - id: QR021
      question: "What is the composition of EvolutionaryScale's board and scientific advisory board as of 2026?"
      type: verification
      targets: ["contentRequirements/4"]
      status: answered
      answer: "Not publicly disclosed beyond the four co-founders (Alexander Rives, Tom Sercu, Zeming Lin, Salvatore Candido). No board of directors or scientific advisory board roster has been published as of May 2026."

    - id: QR022
      question: "Has any state actor or security researcher publicly flagged ESM3 as a biosecurity concern?"
      type: adverse
      targets: ["contentRequirements/1"]
      status: answered
      answer: "Partially resolved. No formal government designation of ESM3 as a biosecurity concern has been found. The arXiv study by Sandbrink et al. (2023) evaluated LLMs including protein-design models for dual-use uplift and found significant concern-level scores, representing the closest published adverse assessment."

    - id: QR023
      question: "What percentage of EvolutionaryScale's expected revenue comes from academic vs commercial API access?"
      type: quantification
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Not publicly disclosed. EvolutionaryScale has released no revenue breakdowns by academic vs commercial access."

    - id: QR024
      question: "Which open-source competitors have achieved functional protein generation (not just structure prediction) at or above ESM3-98B quality?"
      type: comparison
      targets: ["contentRequirements/0", "plannedTables/partner-dependency-risk-register"]
      status: answered
      answer: "Partially resolved. Chai-1 (Apache 2.0, July 2024) matches or exceeds ESM3-98B on structure prediction (0.849 vs 0.801 Cα LDDT). OpenFold (MIT license) provides de novo design capability. Proteina (Nvidia BioNeMo) and RFdiffusion (IPP license) compete on backbone design. None yet match ESM3-98B's joint sequence/structure/function generation capability per public benchmarks."

    - id: QR025
      question: "Does EvolutionaryScale currently have succession planning, leadership insurance, or key-person risk mitigation disclosed to investors?"
      type: adverse
      targets: ["contentRequirements/4"]
      status: answered
      answer: "No public disclosure of succession planning, key-person insurance, or board-level key-person risk mitigation found as of May 2026."

    - id: QR026
      question: "Has the US BIS published any advance notice of proposed rulemaking (ANPRM) specifically addressing protein language model export controls?"
      type: verification
      targets: ["contentRequirements/1"]
      status: answered
      answer: "No BIS ANPRM specifically addressing protein language model export controls found as of May 2026. A broader BIS ANPRM on AI model weights was published in July 2024 but has not been finalised into a rule targeting PLMs specifically."

    - id: QR027
      question: "What is the mechanism by which Meta's ESM2 model card terms might restrict EvolutionaryScale's commercialisation of ESM3?"
      type: mechanism
      targets: ["contentRequirements/1"]
      status: answered
      answer: "Partially resolved. Meta's ESM2 license (github.com/facebookresearch/esm) restricts commercial use of the model weights directly. The mechanism for ESM3 is unclear: if EvolutionaryScale's ESM3 training used Meta's ESM2 weights as initialisation, the downstream commercial weights may carry the non-commercial restriction unless Meta granted a commercial sublicense. EvolutionaryScale's patent filing ('patents have been filed related to aspects of this work', ESM3 preprint) suggests the company believes ESM3 constitutes novel IP."

    - id: QR028
      question: "Which specific regulatory milestones between 2024 and 2028 represent thesis-break triggers for EvolutionaryScale?"
      type: enumeration
      targets: ["contentRequirements/4", "plannedFigures/dependency-map"]
      status: answered

    - id: QR029
      question: "What is the total cost of compute for EvolutionaryScale to serve Forge API at commercial scale as of 2026?"
      type: quantification
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Not publicly disclosed. A 98B parameter transformer model requires approximately 200+ A100 GPU-hours per 1,000 inference calls at standard batch sizes. At AWS A100 spot pricing (~$3/hr), commercial-scale serving implies significant per-call costs, making GPU cost a material operating risk."

    - id: QR030
      question: "How does the concentration of all four founders from Meta FAIR compare to other AI biotech companies in terms of management diversity risk?"
      type: adverse
      targets: ["contentRequirements/4"]
      status: answered
      answer: "Partially resolved. All four EvolutionaryScale co-founders come from the same team at Meta FAIR. This is a high concentration relative to most AI biotech companies, which typically mix academic, pharma, and industry founders. The closest comparable is DeepMind spinouts (e.g., Isomorphic Labs) with shared Google origins. The concentration risk is management monoculture and shared blind spots rather than IP conflict."

