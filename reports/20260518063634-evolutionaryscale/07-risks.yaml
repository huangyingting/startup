  - id: financial-operational-risk
    title: "Financial and Operational Risk"
    body: >-
      EvolutionaryScale has raised approximately $145 M in total (seed plus $142 M Series A, September 2024) at a
      $1.35 B post-money valuation. Operating a frontier protein language model at the 98B-parameter scale requires
      significant recurring compute. Training ESM3 consumed 1×10²⁴ FLOPs on a high-throughput GPU cluster; ongoing
      inference serving and model iteration at commercial scale carry recurring hardware costs. There is no public
      revenue disclosure; the company is pre-revenue or very-early-revenue at known access date.

      At typical AI infrastructure spending rates for a 50–80 person company with frontier GPU clusters, $145 M
      implies a runway measured in 2–4 years unless the Forge API converts to meaningful commercial revenue quickly.
      The valuation implies a multiple exceeding 10× any forward revenue projection achievable with current Forge
      adoption, creating down-round risk if the commercial ramp is slower than investor expectations.

      The investor/partner concentration in Amazon and Nvidia creates dual conflicts: both are the company's primary
      cloud-compute providers, primary distribution channels (SageMaker JumpStart, BioNeMo), and Series A investors.
      In a scenario where EvolutionaryScale needs to renegotiate cloud contracts or seek competitive bids, the investor
      relationship limits negotiating leverage. Conversely, if Amazon or Nvidia develop competing capabilities (which
      they have: BioNeMo already includes ESM models but also competing tools), they may have incentive to steer
      customers away from Forge API.

      The company has no disclosed IP monetisation strategy beyond the Forge API subscription. If the open ESM3
      1.4B model (free for academic use) cannibalises commercial Forge adoption by serving most academic demand,
      and if pharmaceutical customers prefer building internal capabilities rather than paying API fees, the
      commercial model could underperform at scale.
