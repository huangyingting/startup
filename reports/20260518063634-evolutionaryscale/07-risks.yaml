callouts:
  - calloutType: risk
    title: "Biosecurity is the Thesis-Break Risk"
    body: >-
      If a regulatory body or legislative action imposes mandatory pre-deployment biosecurity evaluations or export
      controls on protein language models above a capability threshold, EvolutionaryScale's Forge API would face
      compliance costs and potential access restrictions that could effectively halt commercial operations in key
      geographies. This risk is currently unquantifiable but directionally worsening as AI biosecurity policy
      accelerates globally following EO 14110 and EU AI Act implementation.
    claimRefs:
      - CR005
      - CR026
      - CR029

  - calloutType: risk
    title: "Investor/Competitor Conflict: Amazon and Nvidia"
    body: >-
      Amazon and Nvidia serve simultaneously as the company's largest Series A investors, primary compute providers,
      and primary distribution channel operators. Both also develop competing protein AI platforms. This structural
      conflict limits EvolutionaryScale's negotiating leverage on cloud costs and distribution terms, and could
      create principal-agent conflicts if these investors seek to steer enterprise clients toward their own platforms.
