  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: forge-api-commercial-metrics
      missingEvidence: "Number of Forge API beta-enrolled users, active usage volume, conversion rate to paid subscriptions, and post-beta commercial pricing structure."
      whyItMatters: "Without paid API user count and conversion data, it is impossible to assess whether EvolutionaryScale's commercial model is working. A free beta that converts no users to paid contracts has zero revenue value regardless of download count."
      diligencePath: "Request beta user count and composition (academic vs. commercial) from management; obtain planned pricing tiers and beta exit timeline; ask for anticipated Forge ARR at steady state."
      relatedQuestionRefs: [QU021]

    - type: private-evidence-only
      severity: blocking
      topic: enterprise-customer-count-and-ARR
      missingEvidence: "Identity, number, and annual recurring value of any paying enterprise customer — whether via Forge API, SageMaker subscription, or direct contract — as of May 2026."
      whyItMatters: "The most critical missing data point for Series B valuation. Zero confirmed revenue-generating commercial relationships means the company's $1.35B+ post-Series-A valuation rests entirely on scientific credibility, model performance benchmarks, and strategic investor interest."
      diligencePath: "Request management disclosure of any commercial customer under NDA; verify AWS Marketplace subscriber counts under NDA with AWS business development contact; cross-reference with NVIDIA BioNeMo integration live date and usage."
      relatedQuestionRefs: [QU022]

    - type: missing-source
      severity: material
      topic: aws-industries-blog-spotlight
      missingEvidence: "Content from the AWS Industries blog post 'Revolutionizing Drug Discovery with AI: A Spotlight on EvolutionaryScale' (URL returned 404 during research). This would likely contain customer-proof, use-case specifics, and potentially named early adopters."
      whyItMatters: "AWS customer spotlight blog posts routinely include named case studies and quantified outcomes. If this post was published and then removed or renamed, its content would be the strongest available commercial customer-proof source."
      diligencePath: "Contact AWS Partner Programs or retrieve via web archive (archive.org); check AWS HealthOmics partner directory for EvolutionaryScale listing; request AWS co-marketing materials from EvolutionaryScale IR."
      relatedTableRefs: [TU003]

    - type: enumeration-incomplete
      severity: material
      topic: esm-partner-repo-contents
      missingEvidence: "Identity of partner collaborations logged in the private or semi-public evolutionaryscale/esm-partner GitHub repository, which is labeled 'Repository for partner collaborations' but contains no public content."
      whyItMatters: "The existence of a dedicated partner collaboration repository implies ongoing formal partnerships beyond Adaptyv Bio. The number and identity of these partners is entirely opaque."
      diligencePath: "Request full partner list from management; ask whether any partner has signed a commercially validated contract with disclosed terms; review LinkedIn posts from EvolutionaryScale founders mentioning named partners."
      relatedTableRefs: [TU003]
      relatedQuestionRefs: [QU001]

    - type: private-evidence-only
      severity: minor
      topic: addressable-researcher-community-size
      missingEvidence: "Rigorous estimate of the total global computational biology and protein AI research community that constitutes EvolutionaryScale's top-of-funnel academic user base."
      whyItMatters: "HuggingFace downloads (10.9k combined) represent an unknown fraction of the addressable academic researcher base. Without denominator, conversion rate and market penetration cannot be estimated."
      diligencePath: "Cross-reference ISMB/ECCB and similar conference attendance with GitHub academic user surveys; use NIH bioinformatics grant data as a proxy for active computational biology research teams."
      relatedQuestionRefs: [QU024]

acknowledgedWarnings:
  - dimension: figureType
    reason: "FU004 uses type:bar instead of the planned cohort type because no time-series retention data exists for EvolutionaryScale (no commercial customers, no disclosed NRR/GRR). A bar chart of open-access adoption metrics provides a meaningful alternative visualization of adoption breadth without inventing retention data."
  - dimension: paywallRisk
    reason: "Three sources (SU025 AWS Marketplace, SU026 AWS Industries blog, SU027 NVIDIA developer blog) have accessStatus:broken. All three URLs are confirmed in the fetch log as attempted; content was unavailable due to 400/404 responses. These three broken sources represent 3/29 = 10.3% of chapter sources, well below the 30% report-level ceiling."
