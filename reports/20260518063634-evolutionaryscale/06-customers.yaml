  - id: named-customer-proof
    title: Named Deployments and Integration Partners
    body: >-
      The named commercial deployment and integration evidence for EvolutionaryScale
      is anchored by three confirmed channels and one named partner. First, AWS
      SageMaker Marketplace lists ESM-C models for commercial deployment under the
      Cambrian Inference Clickthrough License Agreement. The GitHub README provides
      explicit deployment instructions: admin-level AWS access, subscription via
      the SageMaker Marketplace, and CloudFormation-based launch taking 15–25
      minutes. GPU costs are billed directly to the subscriber's AWS account.
      This represents a verifiable commercial deployment path, though subscriber
      counts are undisclosed.

      Second, NVIDIA BioNeMo listed ESM-C as an upcoming integration as of
      December 2024. NVIDIA BioNeMo targets drug discovery, molecular design,
      virtual screening, and protein binder design use cases — exactly matching
      ESM-C's intended commercial applications. NVIDIA is also a strategic
      investor in EvolutionaryScale (Series A participant), creating a structural
      incentive for deep integration. The NVIDIA investor relationship is
      confirmed by both the Series A announcement (BusinessWire) and a dedicated
      NVIDIA news release about the seed investment.

      Third, Adaptyv Bio — a protein engineering company at Biopole Life Science
      Campus, Lausanne, Switzerland — has been confirmed as a named ESM ecosystem
      partner. Adaptyv Bio's focus on protein design aligns directly with ESM
      model capabilities. The partnership reflects the small-and-growing-biotech
      customer segment that can utilize open-weight or API-based access without
      the procurement overhead of large pharma.

      Fourth, the Forge API public beta (launched January 2025) constitutes a
      customer proof of the commercial platform, though the scale of enrolled
      users and conversion to paid status is not disclosed. The EvolutionaryScale
      GitHub ESM partner repository (evolutionaryscale/esm-partner, labeled
      "Repository for partner collaborations") implies a formal partnership pipeline
      beyond Adaptyv Bio, but no other partners are named publicly.

      Importantly, prior ESM family generations (ESM1b, ESM2) had documented
      corporate users: BioNTech and InstaDeep fine-tuned ESM models on COVID
      spike proteins to create a variant early-warning system flagging all 16
      WHO variants of concern; Hie et al. used ESM1v/ESM1b to evolve antibodies;
      Shanker et al. used ESM-IF1 for antibody evolution against SARS-CoV-2.
      These legacy use cases by corporate and academic users validate the ESM
      family's practical utility, but they do not constitute current commercial
      customers of EvolutionaryScale's paid products.
