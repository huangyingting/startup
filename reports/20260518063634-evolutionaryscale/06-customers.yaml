callouts:
  - calloutType: risk
    title: "No Named Pharma Customer — Material Commercial Proof Gap"
    body: >-
      As of May 2026, EvolutionaryScale has no publicly disclosed enterprise
      pharmaceutical company partnership with stated financial terms. Generate
      Biomedicines announced a $1.9B Amgen collaboration; Isomorphic Labs closed
      deals with Eli Lilly and Novartis totaling over $3B in potential milestone
      value. EvolutionaryScale's frontier scientific credentials (Science
      publication, 98B ESM3) do not substitute for commercial proof.
      The absence of any named pharma anchor customer is the single most
      significant customer chapter risk for Series B fundraising and valuation.
    claimRefs:
      - CU017
      - CU018
      - CU019

  - calloutType: strength
    title: "AWS and NVIDIA Strategic Investment Creates Structural Channel Advantage"
    body: >-
      Both Amazon (AWS) and NVIDIA joined EvolutionaryScale's $142M Series A as
      strategic investors, and both provide distribution channels: AWS SageMaker
      Marketplace lists ESM-C models commercially, and NVIDIA BioNeMo announced
      ESM integration. This creates a self-reinforcing channel dynamic where
      EvolutionaryScale models are surfaced to enterprise life sciences buyers
      within two of the largest AI infrastructure platforms in the world,
      without requiring EvolutionaryScale's own enterprise sales force. This
      structural advantage is a meaningful differentiator from academic-only
      protein AI labs.
    claimRefs:
      - CU007
      - CU010
      - CU014
      - CU036

  - calloutType: recommendation
    title: "Verify Forge API Pricing and First Paid Customer Before Series B"
    body: >-
      The most critical diligence action is confirming (a) when Forge API
      commercial pricing launches, (b) the number of current beta users, and
      (c) the identity and terms of the first enterprise paying customer.
      Without this data, any Series B valuation rests entirely on scientific
      credibility and channel placement, not demonstrated revenue-generating
      customer relationships. An NDA-protected reference call with one named
      pharma or biotech AWS SageMaker subscriber would substantially improve
      confidence.
    claimRefs:
      - CU012
      - CU022
      - CU027

  - calloutType: insight
    title: "Open-Weight Funnel Architecture Is Structurally Sound but Conversion Unverified"
    body: >-
      EvolutionaryScale's academic-to-commercial funnel (open weights → Forge
      API beta → SageMaker commercial → enterprise deal) mirrors the successful
      model used by Hugging Face and open-source AI companies. The same Python
      SDK operates identically across local, Forge, and SageMaker endpoints,
      removing adoption friction. Prior ESM family generations (ESM2) produced
      confirmed corporate production deployments (BioNTech/InstaDeep). The
      structural ingredients for conversion are present; actual conversion rate
      data is unavailable.
    claimRefs:
      - CU025
      - CU034
      - CU035

