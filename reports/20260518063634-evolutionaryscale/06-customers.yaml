  - id: retention-durability
    title: Retention, Durability, and Satisfaction Evidence
    body: >-
      EvolutionaryScale has disclosed no NRR, GRR, customer churn rate, contract
      renewal statistics, or customer satisfaction scores as of May 2026. The
      absence of these metrics is expected for a company at this commercialization
      stage: the Forge API beta launched only in January 2025, AWS SageMaker
      listings are relatively recent, and no enterprise software deal with disclosed
      terms has been announced. The primary observable retention signals are
      indirect: sustained HuggingFace download growth (ESM-C updated within days of
      the research date), active GitHub commits through April–May 2026, and the
      ongoing accumulation of downstream academic papers (37 months of building
      on ESM models since ESM2's release).

      For the Forge API channel, the public beta model offers free access as an
      explicit customer development tool. The company's January 2025 blog post
      describes a "public beta, allowing scientists in academia and industry a
      free limited time preview" — which implies post-beta paid conversion as an
      intended but unverified retention mechanism. The ESM GitHub repository SDK
      integrates seamlessly across local, Forge, and SageMaker deployment modes
      (the same API code works regardless of endpoint), creating a low-switching-
      cost and high-stickiness profile that is architecturally favorable for
      retention but unverified at the commercial level.

      For the AWS SageMaker channel, retention is mediated by AWS cloud
      infrastructure lock-in. Once a customer deploys ESM-C via CloudFormation
      inside their AWS environment, migration to a competing protein LM requires
      deliberate re-integration effort, providing durable channel stickiness.

      The ESM2 predecessor models — available freely under a non-commercial
      license — represent an important floor for willingness-to-pay analysis. A
      customer who can satisfy their protein representation tasks with the free
      ESM2 (up to 15B parameters) has limited incentive to pay for ESM-C commercial
      access unless performance advantages justify the premium. The task of
      demonstrating quantifiable performance lift for specific pharmaceutical
      applications is a critical unresolved retention evidence gap.
    claimRefs:
