  headquarters: San Francisco, California, USA (pre-acquisition); post-acquisition operations consolidated into CZ Biohub Network sites.
  productSummary: EvolutionaryScale's product lineup centered on the ESM (Evolutionary Scale Modeling) family of protein language models — ESM3 (multimodal generative, up to 98B parameters) and ESM Cambrian / ESM-C (representation-focused, 300M / 600M / 6B variants) — distributed through (a) the open-weights HuggingFace channel for academic/non-commercial use (esm3-sm-open-v1 and ESM-C variants accumulated ~9,400+ downloads combined as of May 2026), (b) the commercial Forge API at forge.evolutionaryscale.ai with developer-facing SDK and documentation, (c) NVIDIA BioNeMo NIM microservice integration for enterprise H100 deployment, and (d) the AWS Marketplace SageMaker JumpStart listing. A peer-reviewed Science paper (Jan 16, 2025; DOI 10.1126/science.ads0018) validated ESM3's ability to design novel functional fluorescent proteins, providing independent scientific credibility.
  customerFocus: Pre-acquisition the intended customer base was biotechnology and pharmaceutical R&D teams (target identification, protein engineering, antibody design), synthetic biology and industrial enzyme companies, academic researchers (free open-weights tier), and infrastructure customers reaching the models through AWS Marketplace and NVIDIA BioNeMo. No named pharma customer or paying-customer count was ever publicly disclosed.
  businessModel: SaaS / usage-based API pricing through the Forge platform plus partner revenue-share with AWS (SageMaker JumpStart listing) and NVIDIA (BioNeMo NIM microservice). Free open-weights ESM3 and ESM-C variants were released on HuggingFace under non-commercial research licenses as a developer-community / lead-gen strategy. Post-acquisition the entity is part of a non-profit research network (CZI / CZ Biohub) and the future commercial status of the Forge API is publicly unconfirmed.
  stage: acquired
  fundingStatus: Acquired by Chan Zuckerberg Initiative / CZ Biohub on November 6, 2025; team absorbed into the CZ Biohub Network under the Frontier AI for Biology initiative. Acquisition terms (cash, stock, IP transfer, employee retention packages, treatment of Series A preferred shares) have not been publicly disclosed. Total disclosed pre-acquisition capital raised was $142M (Series A, Sep 26 2024) plus an undisclosed seed round (announced Jun 25 2024) at an implied ~$1.35B post-money valuation on the Series A.
