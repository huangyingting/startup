  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的可服务市场有两个相互连接的层次。第一层是蛋白质语言模型（PLM）API 与平台市场——云托管或本地部署的 AI
              模型，让蛋白质工程师无需耗尽湿实验室定向进化，就能生成、预测、优化蛋白质序列和结构。该市场不同于通用云计算、传统生物信息学管线、基因组测序平台、医学影像 AI
              或临床试验管理软件。第二层是更广义的蛋白质工程研究工具市场，涵盖重组蛋白研究和设计中使用的全部试剂、仪器和软件；PLM API 是该更大可服务市场中的高增长 AI 子类别。

              蛋白质 LM 平台的现状替代品包括：（1）AlphaFold2/3（Google DeepMind），用于蛋白质结构预测——通过包含 200 million+
              个预测结构的公共数据库，免费供非商业用途使用；（2）Rosetta 和 PyRosetta（University of
              Washington），用于计算蛋白质设计——开源，但计算密集，并要求较高专业能力；（3）湿实验室定向进化（反复随机诱变和筛选）——成本高、速度慢（每周期数周）、吞吐受限；（4）传统分子动力学和同源建模软件（GROMACS、MODELLER、Schrödinger
              Maestro）——成熟的结构引导设计工具，但不具备生成能力。ESM3 和 ESM-C 的差异化在于，在一个统一生成式模型内同时推理蛋白质序列、结构和功能。

              相邻市场包括 AI 药物发现平台市场（加速小分子和生物药设计的全部计算工具）。Grand View Research 估计该市场 2025 年为 $2.35B，到 2033 年增至 $13.77B，CAGR 为
              24.8%。工业生物技术——面向绿色化学、农业和生物材料的酶工程——是另一个相邻市场，采购模式与药物应用不同，监管负担也更低。最外层边界是全球药物发现市场（Precedence Research 估计 2025
              年 $71.89B），包含所有模式和服务，远超 EvolutionaryScale 的直接覆盖范围。
