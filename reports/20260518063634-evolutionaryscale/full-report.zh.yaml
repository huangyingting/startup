      - - Chai-1 (Chai Discovery)
        - Apache 2.0；免费商用
        - 多聚体结构预测；PoseBusters 77%；单体 LDDT 0.849；无需 MSA
        - 高——已在 CASP15 单体上超过 ESM3-98B
        - 尚不是生成式蛋白设计模型；序列生成有限
      - - OpenFold (AQ Laboratory)
        - Apache 2.0；可训练
        - 等同 AlphaFold2 的结构预测；可用自有数据训练
        - 中——训练需要算力
        - 仅结构；不生成序列 / 功能；无 98B 规模模型
      - - RFdiffusion (Baker Lab/IPD)
        - 宽松许可；研究免费
        - 从头生成蛋白骨架；结合蛋白设计；基序支架搭建
        - 对结合蛋白设计用例威胁中等
        - 无序列 / 功能联合推理；多模态弱于 ESM3
      - - Meta ESM2（通过 facebookresearch 采用 MIT 许可）
        - MIT——免费商用
        - 序列嵌入；结构预测（ESMFold）
        - 对嵌入和结构任务威胁中等
        - 不是 ESM3 意义上的生成式模型；已被 ESM3 架构取代
      - - Profluent Bio、AbSci、Generate Biomedicines 等竞争方
        - 自研 / 合作
        - AI 驱动的抗体 / 蛋白设计，配套湿实验
        - 对企业药物发现客户威胁中等
        - 垂直整合竞争者；按发现服务收费，而不是按 API 访问收费
    notes: 竞争对手数据来自访问日期的公开 GitHub 仓库、模型卡和技术博客文章。
