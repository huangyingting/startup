  - id: TV002
    title: 投资逻辑与反向逻辑分析
    columns:
      - 视角
      - 论点
      - 何种情况会改变观点
    rows:
      - - 投资逻辑
        - 创始人（Rives、Sercu、Lin、Candido）在 Meta AI FAIR 创建了 ESM 蛋白语言模型家族；这种机构知识，竞争团队无法复制
