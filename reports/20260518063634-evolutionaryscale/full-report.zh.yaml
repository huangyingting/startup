      - number: '5.2'
        title: 技术架构：多轨 Transformer、训练规模与 Token 化
        blocks:
          - type: paragraph
            body: >-
              ESM3 最核心的架构创新，是多轨 transformer 设计：在统一 transformer 框架内，模型同时处理三条并行 token 序列——氨基酸序列 token、结构 token（编码 3D
              坐标）和功能注释 token（基于关键词的 GO term 标签）。 每一轨都采用离散 token 化。结构坐标通过向量量化变分自编码器（VQVAE）编码进有限的结构 token 码本，
              让模型无需连续坐标回归，就能原生读取并生成三维蛋白质结构。

              预训练使用掩码语言建模（MLM）目标，并同时施加在三条轨道上，使模型学到覆盖序列—结构—功能空间的联合表征。 98B 参数的 ESM3-large 在约 2.78 billion 条蛋白质序列（771
              billion 个唯一 token）上训练， 训练消耗 1.07×10²⁴ 次浮点运算；训练集群为 Andromeda HPC，使用 NVIDIA H100 GPU 和 Quantum-2 InfiniBand
              网络。NVIDIA 称，ESM3-large 相比前代 ESM2 使用约 25× 更多 FLOPs 和 60× 更多数据。ESM3-large
              还应用了基于人类反馈的强化学习（RLHF），使蛋白质设计输出更贴合人类偏好。

              ESM-C（Cambrian）采用另一套架构：带旋转位置嵌入（RoPE）和 SwiGLU 前馈激活的 Pre-Layer Normalization
              （Pre-LN）transformer，并用掩码语言建模预训练。ESMC-300M（30 层、隐藏宽度 960）训练消耗 1.26×10²² FLOPs； ESMC-600M（36 层、宽度 1152）为
              2.17×10²² FLOPs；ESMC-6B（80 层、宽度 2560）为 2.37×10²³ FLOPs。 训练数据覆盖三个大型序列数据库：UniRef（83 million 个簇）、MGnify（372
              million 个簇）和 JGI metagenomics （2 billion 个簇），全部按 70% 序列同一性聚类。

              开源 DeepEP 库展示了 EvolutionaryScale 的内部基础设施能力。DeepEP 是面向 H800 GPU 的 Mixture-of-Experts 专家并行通信自定义 CUDA/NCCL
              实现，拥有 1,253 个 GitHub 星标，说明公司具备活跃的 HPC 工程能力，可支撑大规模分布式训练和推理。
