  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 生物安全与双重用途风险
        blocks:
          - type: paragraph
            body: >-
              生物安全风险是 EvolutionaryScale 投资逻辑中最根本的风险维度。esmGFP 已经展示，ESM3 能生成与任何已知天然蛋白相距 「相当于 500 million years
              的进化」序列距离的功能蛋白。同一种支撑药物发现的生成能力，原则上也可能被导向增强病原体毒力、 生成新型毒素，或工程化出监测系统所覆盖已知序列空间之外的生物制剂。MIT 2023 年发表在 arXiv
              的研究（Sandbrink & Shulman, 2306.03809）显示，大语言模型可在一小时会话内，为没有实验室训练的非科学人员识别潜在大流行病原体、 合成路线和 CRO 合作伙伴。尽管该研究聚焦通用
              LLM，而非蛋白质专用模型，担忧机制直接类比：蛋白质语言模型降低了设计功能性生物制剂的门槛。

              US Executive Order 14110（October 30, 2023）明确把生物技术列为国家安全 AI 风险领域，要求评估那些可能降低生物、 化学、核或放射性大规模伤亡武器制造门槛的 AI
              系统。NIST AI Risk Management Framework（AI RMF 1.0， January 2023 发布；Generative AI Profile 于 July 2024
              更新）为识别和管理这些风险提供自愿性指南。 EU AI Act（Regulation 2024/1689，OJ 12 July 2024）也在 Annex III 及相关条款下，将生物相关双重用途 AI
              纳入高风险范围。

              EvolutionaryScale 发布过负责任开发框架（Responsible Development Framework），包含四项核心原则：沟通收益与风险、部署前严格评估模型、
              采用护栏，并与政府和公民社会互动。ESM Cambrian 发布博客称：「ESM C 经科学专家委员会审查，委员会认为发布模型的收益大幅超过任何潜在风险。」 但是，在访问日（2026-05-18），该框架的规范
              URL（/blog/responsible-development） 返回 404 错误，说明该框架文件可能无法公开访问；这本身就是透明度风险。EvolutionaryScale
              的模型安全评估没有公开披露任何独立第三方验证。

              Biological Weapons Convention（BWC，1972，截至 May 2025 有 189 个缔约方）禁止开发和储存生物武器， 但没有正式核查机制，也没有专门处理 AI
              设计蛋白质的机制。Center for AI Safety 2023 年声明——由 Hinton、 Bengio 等人签署——把 AI 引发的大流行级生物风险列为最高级别灭绝风险之一。Johns Hopkins
              Center for Health Security 明确将 AI 与生物安全交叉作为核心研究领域。行业通过负责任 AI 生物框架自律（Anthropic 的 RSP、OpenAI 的安全承诺）仍处早期，
              且不约束 EvolutionaryScale 这样的第三方。
