      - number: '5.5'
        title: 产品路线图、CZI Biohub 过渡与负责任开发
        blocks:
          - type: paragraph
            body: >-
              在 NVIDIA 早期种子投资之后，EvolutionaryScale 于 September 2024 完成由 Lux Capital 领投、Amazon 和 NVIDIA 参与的 $142 million
              Series A。November 2025，公司团队加入 CZI Biohub，成为 Chan Zuckerberg Initiative 宣布的重大「Frontier AI &
              Biology」计划的一部分。在这一过渡中，联合创始人兼首席科学家 Alex Rives 出任 Biohub 科学负责人，EvolutionaryScale 研究团队则并入 Biohub 由生物科学家、AI
              工程师和技术人员组成的综合团队。 CZI Biohub 已宣布，到 2028 年将算力扩张至 10,000 GPUs，以支持该计划。

              截至 May 2026 报告日，Forge API 和开放权重模型分发仍在运行。EvolutionaryScale 的公益公司（PBC）章程， 以及开放权重适用的 Cambrian
              非商业许可，共同写入了对研究访问的承诺，同时把商业能力保留给 Forge API 收入模式。

              关键的信任与安全维度需要尽调关注。生成式蛋白质设计的双重用途风险——包括被误用于病原体工程——是全行业问题。 EvolutionaryScale 通过开放权重的非商业许可限制和 Forge API
              访问控制来应对，但尚未公开记录生物安全筛查政策或独立生物安全审计。 December 2024 发表的一篇独立 BioRxiv
              预印本发现，如果把每个变体各自松弛后的不同蛋白质结构作为输入，而不是使用单一一致结构作为骨架， ESM3
              的结合预测性能会下降——这是一个「结构更多，准确率更低」悖论；涉及异质结构输入的部署场景，应由尽调团队专门测试。 Forge API
              提交序列的数据留存政策也未公开披露，这可能成为受监管行业企业客户的合规顾虑。未找到 EvolutionaryScale 的 SEC Form D 文件，与其私营公司身份一致。
