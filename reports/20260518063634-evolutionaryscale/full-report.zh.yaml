      - number: '7.6'
        title: 人才、关键人物与文化风险
        blocks:
          - type: paragraph
            body: >-
              已披露姓名的四位创始人——Alexander Rives（CEO）、Tom Sercu（President）、Zeming Lin（CTO）和 Salvatore Candido——都来自 Meta AI 的
              FAIR 蛋白质研究团队。单一雇主出身带来文化集中风险：团队共享同一套研究范式、人脉网络和职业经历。 文化单一能加快一致决策，但在评估战略转向或监管威胁时，会削弱认知多样性；FAIR
              的学术文化也未必让团队为这些问题做好准备。

              关键人物风险很高。Alexander Rives 是最早的 ESM 模型创建者，也是主要科学愿景负责人。BioRxiv 预印本作者名单显示， Tom Sercu 和 Zeming Lin 是 ESM3 与 ESM
              Cambrian 的主要技术架构师。任何一位创始人离开，都可能拖慢模型开发速度并削弱投资人信心。 公司没有公开披露继任计划或 CEO 独立性安排。

              公司位于湾区 AI 人才市场，这是全球竞争最激烈的人才市场之一。面对资本充足的超大规模云厂商（Google DeepMind、Meta、 Microsoft）或制药 AI
              部门（Isomorphic、Xaira）的挖角，在 $1.35 B 估值且没有公开流动性的情况下留住资深 ML 研究员， 是结构性挑战。Amazon 和 Nvidia
              的投资人身份可能降低来自这两方的团队收购风险，但无法降低人才流向其他超大规模云厂商的风险。
