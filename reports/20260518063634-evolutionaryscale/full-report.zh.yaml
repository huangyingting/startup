      - number: '8.5'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 近期最可能的退出路径包括：（1）被 Amazon 战略收购（人才收购或整体收购，把 Forge 嵌入 AWS AI Services）或被 NVIDIA 收购（加深
              BioNeMo 的可微蛋白质设计能力）；（2）在 ARR 证明商业产品市场契合后，被寻求蛋白质 AI 平台的大型药企收购（AstraZeneca、Pfizer、Genentech、Novartis）；（3）如果
              Forge 达到 $25M+ ARR 并拥有多家制药客户， 以 $2B+ 估值完成 Series B 或 Series C；或（4）达到 $50M+ ARR、毛利率 >60% 后 IPO——最早也大概率不会早于
              2028。

              Amazon 的结构性投资人关系显著降低悲观情景概率：一家由 AWS 支持、且 Forge 已部署在 SageMaker JumpStart 上的公司， 除非 Amazon
              主动采取敌意决策，否则很难遭遇灾难性下轮。不过，同一个 Amazon 关系也让退出路径集中：如果 Amazon 是最可能买家， 二级投资人必须接受 M&A 定价纪律，而这未必能为非战略投资人最大化估值。

              买入建议发布前，有五个尽调问题至关重要：（1）截至 Q2 2026 的 Forge ARR 和客户数；（2）Forge API 收入毛利率； （3）Amazon 和 NVIDIA
              合作中的收入分成与排他条款；（4）与 Meta Platforms 之间的 ESM2/ESM3 IP 转让协议（如有）， 确认 IP
              权属链清晰；（5）生物安全和双用途客户筛查协议。五项得到确认前，估值置信度仍为中等，建议仍是继续研究 / 观察。
