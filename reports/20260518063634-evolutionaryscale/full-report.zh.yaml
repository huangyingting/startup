      - number: '7.3'
        title: 竞争商品化风险
        blocks:
          - type: paragraph
            body: >-
              蛋白质 AI 工具正在快速商品化。Google DeepMind 的 AlphaFold 3 数据库通过与 EMBL-EBI 的合作，免费提供超过 2 亿个预测蛋白质复合体结构（March 2026
              更新后纳入蛋白质复合体）。Meta 的 ESM2 通过 facebookresearch/esm 以 MIT 许可证发布；OpenFold 使用 Apache 2.0。Chai-1 使用 Apache
              2.0，允许免费商用。 Baker Lab 的 RFdiffusion 和 ProteinMPNN 可从 IPD/UW 免费获取。这些可免费使用的模型覆盖结构预测和结合体设计工作流， 正是 Forge API
              的核心用例。

              EvolutionaryScale 的防御性靠三点支撑：（1）ESM3 的生成式多模态能力不止结构预测，而是把序列、结构、功能放在一起生成； （2）98B 参数旗舰模型通过 API
              闸门和商业许可控制；（3）药物发现所需的领域微调离不开专有数据。不过，Chai-1 技术报告称其无需 MSA 就能达到最先进的多聚体预测水平，直接冲击 ESM3 的关键差异点。如果学术团队和 VC
              支持的对手（Profluent、Generate Biomedicines、AbSci、Isomorphic Labs）用宽松许可证发布有竞争力的生成模型， Forge 的定价权会被压缩。

              投资人和合作伙伴重叠进一步放大竞争风险：Amazon（AWS）通过 SageMaker JumpStart 分发 EvolutionaryScale 模型， 但也投资并向竞争性生物 AI
              公司提供算力；Nvidia 通过 BioNeMo 分发模型，而 BioNeMo 本身也是竞争性的模型分发平台。 合作伙伴利益和投资人利益一旦冲突，这些平台可能优先扶持替代方案。
