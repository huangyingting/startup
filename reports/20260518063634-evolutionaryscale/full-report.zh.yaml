      - number: '8.3'
        title: 融资、估值背景与进入纪律
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 于 September 26, 2024 完成 $142M Series A，由 Amazon（AWS）和 NVIDIA 共同领投。 Lux Capital、Nat
              Friedman 和 Daniel Gross（AI Grant 组织）参投。包括种子轮在内，累计融资约 $145M。投后估值约 $1.35B——由 Crunchbase、Bloomberg（付费墙）和
              PitchBook（付费墙）确认。SEC EDGAR 全文检索数据库中没有找到 “EvolutionaryScale” 的 Form D 证券备案；这与公司的私营状态一致，也可能意味着其使用 Regulation
              D 但未公开披露。

              以历史生物技术创投标准看，收入前阶段给出 $1.35B 估值偏高；但放在 2024 AI 估值环境下，大体仍说得通：仅 Q4 2024， 美国就有五家公司各自完成 $4B+ 融资（KPMG Venture
              Pulse）。Amazon 和 NVIDIA 投资的战略性质显著改变了风险调整后的投资逻辑： 两者都是分发渠道伙伴，投资本身会形成自我强化的商业激励，把制药 API 流量导向 Forge。AWS
              SageMaker JumpStart 和 NVIDIA BioNeMo 合计触达几乎所有主要全球制药 R&D 组织，渠道护城河真实且持久。

              进入纪律要求先确认商业牵引力，再给出买入建议。优先股堆叠、股权结构表和 Series A 带来的稀释压力都未知；没有经审计财务或备考股权结构披露， 就无法在任何给定企业价值下精确计算普通股价值。Amazon 和
              NVIDIA 共同投资，从结构上降低了敌意人才收购或灾难性下轮的概率， 因为任何一方都不会受益于一笔破坏其云平台战略的困境出售。
