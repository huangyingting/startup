              November 2025 的 CZI Biohub 交易，是本报告最核心的财务风险信号。公司在 14 个月前刚以 $1.35B 估值完成 $142M Series
              A，却在披露任何收入指标前，让整个团队被一家非营利机构吸收。投资人是否拿到回报、拿到多少， 仍未披露。
