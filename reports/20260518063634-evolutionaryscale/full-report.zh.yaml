      - number: '4.3'
        title: 资本充足性与 CZI Biohub 交易
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的资本路径很清楚：先是 2023 年底约 $3M 的种子轮，随后在 September 26, 2024 完成 $142M Series A（CNBC、Axios 和
              NVIDIA 同步披露）。 这一轮由 Amazon 和 NVIDIA 领投，Lux Capital、Nat Friedman、Daniel Gross 跟投；据报道投后估值约 $1.35B。累计融资约
              $145M。

              按每月 $5–15M 的估计烧钱速度（员工数 + 算力 + 管理开销）测算，$142M Series A 自 September 2024 交割起，理论上可支撑 9–28 个月现金跑道。实际现金跑道在
              November 2025 结束——距离 Series A 交割仅约 14 个月——EvolutionaryScale 团队随后加入 CZI Biohub。 联合创始人兼首席科学家 Alex Rives 出任
              CZI Biohub 科学负责人。交易条款未披露；研究未在 EDGAR 或其他公开监管数据库中找到由该交易触发的 SEC 文件（例如 Form D 修订、Hart-Scott-Rodino 披露或收购通知）。

              $142M Series A 投资人（Amazon、NVIDIA、Lux Capital 和天使投资人）的财务结果仍不清楚。 如果 CZI/Biohub
              交易是对实体的现金收购，投资人应获得分配；如果只是未购买实体的人才收购（acqui-hire）， 交易发生时 $142M
              资本大概率已被大幅消耗，投资人回收有限。没有任何公开交易金额披露，这一风险评估只能保持开放。

              研究中发现一个值得注意的财务合规缺口：SEC EDGAR 中没有出现 EvolutionaryScale 任何名称变体的 Form D 文件（检索过
              "EvolutionaryScale"、"Evolutionary Scale"、"Evolutionary Scale Inc"，以及关键人物 "Alexander Rives"）。私营公司通过
              Regulation D 豁免融资 $142M，通常需要在首次出售后 15 天内向 SEC 提交 Form D。没有任何 Form D，可能说明文件以其他法律实体名称提交、使用了其他证券豁免（例如面向离岸投资人的
