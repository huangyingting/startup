              人、尚未产生收入的基础模型蛋白质 AI 公司来说，$1.35B 估值隐含了显著溢价。

              按人均融资额看，EvolutionaryScale 的资本强度极高，约每名员工融资 $3–6M。这反映的是世界级 AI 研究人才和重算力模型开发的成本，而不是已规模化的商业运营。相比之下，上市 AI
              药物发现公司（AbSci、Recursion） 相对融资额拥有更大的员工基数，资金被临床和制造运营摊薄。同业对比说明，Series A 时的 EvolutionaryScale
