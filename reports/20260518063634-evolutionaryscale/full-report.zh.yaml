      - number: '3.3'
        title: 定价、包装与分销比较
        blocks:
          - type: paragraph
            body: >
              AI 蛋白质设计领域的定价模式，反映出根本不同的商业化哲学。EvolutionaryScale 提供 Forge，这是面向 ESM3 和 ESMC 访问的商业 API 平台，公开测试版于 early 2025
              宣布。ESM3 small model（open）和 ESMC（300M/600M）可在 HuggingFace 免费用于非商业和研究用途；更大模型和生成式 API 访问需要 Forge 账户。


              Cradle.bio 明确定位为软件订阅（“no royalties, just a software subscription fee”），客户保留所有生成 IP，实验数据也绝不会用于为其他客户训练模型。这种
              SaaS 粘性不同于 EvolutionaryScale 的按量 API 模式。


              Meta 的 ESM2 采用 MIT 许可，在 GitHub 和 HuggingFace 上免费开放，所有用途包括商业用途都零成本。ESMFold 结构预测同样开放。DeepMind 的 AlphaFold
              DB（200M+ 结构）采用 CC-BY-4.0，可用于任何用途；AlphaFold Server 对非商业研究免费。AlphaFold 3 在药物发现中的商业使用，通过 Isomorphic Labs
              与制药公司的独家许可安排实现。


              Generate Biomedicines 和 AbSci 都采用面向大型制药公司的 B2B 合作与授权模式，而不是自助式 API。两者都没有公开定价页或开发者 API。Baker Lab/IPD
              工具（RFdiffusion、RoseTTAFold）和 OpenFold 完全免费，使用宽松许可。


              关键尽调缺口：Forge 企业标价、阶梯量价和实际每次调用成本没有公开披露。Isomorphic Labs 与 Lilly、Novartis 的交易经济性有报道，但公开信息没有拆分。
