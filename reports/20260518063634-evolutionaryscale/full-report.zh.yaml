      - number: '5.3'
        title: 部署与生态：Forge API、AWS、NVIDIA 与社区
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 搭建了多层分发策略：一端用开放权重吸收社区采用，另一端通过商业 API 和云市场提供访问。

              Forge API（forge.evolutionaryscale.ai）于 January 2025 开放公测，是 ESM3 与 ESMC 商业使用的主要编程接口。 官方 Python 客户端（pip
              install evoscale-sdk）托管在 github.com/evolutionaryscale/esm，同时提供同步推理和异步批处理执行。 截至 May 2026，Forge API
              门户可访问且运行中，但详细定价未公开列出。

              AWS SageMaker JumpStart 通过 CloudFormation 堆栈提供 ESMC-6B 商业部署，可在 15-25 分钟内配置专用 GPU 实例。esm-sagemaker GitHub
              仓库记录了该集成，目标客户是需要大规模向量嵌入工作流和可预测 SLA 的企业生物信息学用户。 Amazon 既是 EvolutionaryScale Series A 的共同投资人，也是部署合作伙伴。

              ESM3 于 June 2024 首次发布时，NVIDIA 宣布将 ESM3 集成进 BioNeMo NIM 平台，用于 GPU 优化推理； EvolutionaryScale 的 ESM-C
              博客（December 2024）把 BioNeMo 列为即将上线的分发渠道。NVIDIA NGC 目录也单独列出 ESM3 资源。

              在 GitHub 上，EvolutionaryScale 维护九个公开仓库。除旗舰 esm 仓库外，面向社区的重要项目还包括 DeepEP （1,253 个星标）、一个 NCCL 分叉、一个 Hugging
              Face transformers 分叉和一个 Mamba 实现。HuggingFace
              组织页（huggingface.co/evolutionaryscale）托管开放权重模型卡；esm3-sm-open-v1 模型页显示上月 3,105 次下载、291 个点赞，ESMC-300M 为 6,320
              次下载，ESMC-600M 为 1,490 次下载。这些指标说明研究社区已有实质采用。
