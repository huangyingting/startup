companyProfile:
  summary: >-
    EvolutionaryScale 是一家总部位于 San Francisco 的 AI 生物公司，开发并发布了 ESM3：一个 98B 参数的生成式多模态蛋白质语言模型，训练数据包括 2.78 billion 条序列（在
    NVIDIA H100 上消耗 1×10^24 FLOPs）；随后又推出偏表征的 ESM Cambrian（ESM-C）。四位联合创始人 Alex Rives（CEO）、Tom Sercu（工程副总裁）、Zeming
    Lin、Sanjay Rao 都来自 Meta AI Research（FAIR），ESM 谱系也起源于他们在 FAIR 的工作。公司完成一轮种子轮（June 2024）和由 Amazon、NVIDIA 共同领投的 $142M
    Series A（September 2024），Series A 隐含投后估值约 ~$1.35B，Lux Capital、Nat Friedman、Daniel Gross 也参投。ESM3 通过 Science
    论文（January 2025）获得同行评审验证，并接入 AWS SageMaker JumpStart 与 NVIDIA BioNeMo。November 6, 2025，Series A 交割不到 14 个月后，整个团队加入
    Chan Zuckerberg Initiative 的 Frontier AI for Biology initiative 旗下 CZ Biohub——EvolutionaryScale
    作为独立营利实体就此结束。公司独立期间从未披露商业收入。
