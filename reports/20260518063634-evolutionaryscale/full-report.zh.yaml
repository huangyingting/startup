      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的财务叙事，是异常强的早期融资之后，突然战略转向，独立商业化路径随之终止。 Amazon 和 NVIDIA 领投的 $142M Series A、$1.35B
              估值，本质上是在押注 ESM3 成为蛋白质 AI 的基础层，而不是押注近期商业收入。商业产品 Forge API 于 January 2025 公开上线，但没有披露收入指标、 客户数或定价。November
              2025 的 CZI Biohub 交易发生在 Series A 交割后 14 个月内，确认公司在进入 CZI 体系前，并未以独立公司身份实现商业突破。

              收入质量评估：数据不足，无法判断。Forge API 机制本身成立——自研基础模型按 token 推理收费——但如果缺少更完整的药物发现工作流， 付费蛋白质 AI API
              访问的可服务市场偏窄；开放权重替代品（Meta 的 ESM2）又压住了通用向量嵌入场景的付费意愿上限。 相比商业牵引，资本强度非常高。SEC Form D
              申报缺口是值得关注的合规信号。主要尽调阻塞点包括：（1）CZI Biohub 交易条款；（2）经确认的 Forge API 收入或客户指标；（3）交易前实际烧钱速度；（4）CZI 交易中的投资人回报情况。
              仅凭公开来源，无法对投资回报形成可承销级财务结论。 [CI033][CI034][CI035][CI036][CI037][CI038]
