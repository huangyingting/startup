      - number: '2.2'
        title: 市场规模与分析师估算
        blocks:
          - type: paragraph
            body: >-
              已发布的蛋白质工程市场估算随口径不同而差异很大。MarketsandMarkets 估计市场从 $2.2B（2019）增至 2024 年 $3.9B，CAGR
              12.4%；这是较窄口径，聚焦蛋白质工程工具和服务。Precedence Research 口径更宽，估计 2025 年 $5.09B，到 2035 年增至 $23.59B，CAGR
              16.57%，纳入工业酶和生物制药等更多蛋白质工程应用。Allied Market Research 估计 2022 年 $2.2B，到 2032 年增至 $7.7B，CAGR 13.2%。Grand View
              Research 估计 2023 年 $2.60B，到 2030 年增至 $7.62B，CAGR 16.24%。方向性共识很清楚——未来十多年保持中双位数百分比年增长——但 $2.2B 与 $5.09B
              的基数差异来自范围不一致，不是证据相互矛盾。

              相邻的 AI 药物发现市场（Grand View Research）估计 2025 年 $2.35B，到 2033 年增至 $13.77B，CAGR 24.8%，增速显著快于单独的蛋白质工程工具市场，反映
              AlphaFold 之后大型制药公司 AI 投资的拉动。更广义的药物发现市场（全部模式）估计 2025 年 $71.89B，到 2034 年增至 $158.74B，CAGR 9.2%（Precedence
              Research），可作为外层 TAM 参照。EvolutionaryScale 的可服务市场，是蛋白质工程工具客户中的一个子群：（a）拥有计算生物学基础设施，（b）正在采用 AI
              原生工具而非传统生物信息学，（c）计算规模足以支持付费 API 订阅，而不是自托管开放权重。

              EvolutionaryScale 目前可获取市场包括：来自生物制药和生物技术客户的 Forge API 订阅收入；通过 AWS SageMaker JumpStart 和 NVIDIA BioNeMo
              获得的商业模型访问收入；以及在受监管环境中部署 ESM3 与 ESM-C 的企业授权。公司完成 $142M Series A 融资（Crunchbase），说明投资人认可市场机会，但 PLM API 在制药
              R&D 中的独立 SOM 数字尚未发布。这是规模测算缺口部分记录的实质性尽调缺口。HuggingFace 下载指标（ESM-C 6,320+、ESM3 3,110+）和 129+ 篇 bioRxiv
              引文，可以作为用户采用的代理指标，但不能证明商业收入牵引力。
