      - number: '3.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 开源商品化：Meta ESM2（MIT）是核心结构性风险
            body: >-
              EvolutionaryScale 创始人在创办公司前构建了 ESM2；该模型在 GitHub 和 HuggingFace 以 MIT 许可免费开放。任何组织都能零成本部署
              ESM2，用于包括商业蛋白质设计在内的任何目的。这建立了商品化底线：ESM3
              的差异化完全取决于多模态提示和前沿规模能否继续作为值得付费的高端能力存在。随着开源替代方案向上收敛（Chai-2、OpenFold、未来 ESM-family 发布），这一逻辑会减弱。
