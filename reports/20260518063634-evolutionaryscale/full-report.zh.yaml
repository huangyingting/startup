      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >
              在被 CZI 吸收前，EvolutionaryScale 完成了两轮已知融资。第一轮是种子轮，与 ESM3 于 June 25, 2024 公开发布同时宣布。NVIDIA、Amazon 均参与种子轮，Lux
              Capital、Nat Friedman、Daniel Gross 也参投。种子轮准确金额没有公开披露，但 NVIDIA 单独宣布了参投。Series A 很快跟进：September 26,
              2024，EvolutionaryScale 宣布 $142M Series A，由 Amazon 和 NVIDIA 共同领投，Lux Capital、Nat Friedman、Daniel Gross
              继续参投，隐含投后估值约 $1.35B。该轮在 ESM3 发布仅三个月后交割，是 2024 年规模最大的 AI 生物融资之一。值得注意的是，EDGAR 在 2024 至 2026 期间没有找到任何
              “EvolutionaryScale” 变体名下的 SEC Form D 文件。Bloomberg 曾报道 Series
              A，但文章在付费墙后，公开渠道无法核验完整交易条款、投资人权利和任何老股交易部分。已确认累计融资为 $142M 加未披露金额的种子轮。公开记录中没有商业收入、债务融资或老股交易。CZI
              收购时公司的资本结构仍未公开。
