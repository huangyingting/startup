  - id: TR004
    title: 监管格局
    columns:
      - 监管工具
      - 司法辖区
      - 状态
      - 对 ESM3/Forge 的适用性
      - 可能时间线
      - 剩余风险
    rows:
      - - EO 14110 — 安全、可靠、可信的 AI（§4.4 生物技术）
        - 美国联邦
        - 已生效（Oct 30, 2023）；未来实施规则待定
        - 要求前沿模型开发者在超过算力阈值时，向 NIST/OSTP 报告两用生物评估
        - 持续推进；报告要求取决于规则制定
        - 中：ESM3 达到 1×10²⁴ FLOPs，可能跨过阈值；截至目前未确认已报告
      - - NIST AI RMF 1.0 + 生成式 AI 概要（NIST-AI-600-1）
        - 美国（自愿）
        - 已发布 Jan 2023；GenAI 概要于 Jul 2024 发布
        - 自愿框架；采购和监管语境中引用越来越多
        - 自愿；事实标准
        - 低至中：不合规仅带来声誉和采购风险
      - - EU AI Act (Regulation 2024/1689)
        - EU
        - 已发布 Jul 12, 2024；Aug 2026 全面执行
        - 训练量 >10²⁵ FLOPs 的通用 AI 模型可能触发系统性风险义务；两用生物应用可能被列为高风险
        - 大多数条款于 Aug 2026 适用
        - 高：合规评估、透明度义务和第三方审计可能限制 EU 市场准入
      - - FDA AI/ML 医疗器械框架（SaMD）
        - US FDA
        - 演进中；2024 AI/ML 行动计划
        - 适用于诊断 / 治疗 AI，不适用于发现阶段蛋白设计工具；未来可能扩展
        - 渐进推进；暂无针对蛋白 LLM 的具体规则
        - 目前低；若 ESM3 用于临床决策支持，可能扩大
      - - BIS 出口管理条例（EAR）——潜在 AI 生物管制
        - 美国（Commerce/BIS）
        - ANPRM 开发中（2024）；蛋白 LLM 尚无最终规则
        - 可能限制向对抗性国家出口 ESM3 权重或提供 API 访问
        - 若出台最终规则，可能在 2025–2027 年
        - 中：会限制国际商业收入和学术分发
      - - 生物武器公约（BWC）
        - 国际（189 个缔约方）
        - 1975 年起生效；无核查机制
        - 禁止开发生物武器；未专门处理 AI 设计蛋白；公司和客户均须合规
        - 持续有效；近期无 AI 专门修正案
        - 低至中：合规义务落在客户；除服务条款外，EvolutionaryScale 无直接监管负担
    notes: 状态和时间线信息基于公开监管文件及抓取日期可得知识。EU AI Act 执行日期可能因实施法案变化。BIS ANPRM 状态可能变化。
