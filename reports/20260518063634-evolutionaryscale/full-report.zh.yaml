      - number: '8.2'
        title: 建议、置信度与风险评级
        blocks:
          - type: paragraph
            body: >-
              建议为继续研究 / 保持关注。这不是买入建议，原因有三点且都有证据支撑。第一，估值置信度为中等：$1.35B 投后 Series A 锚点经 Crunchbase 和 Bloomberg 确认，但没有 Forge
              收入、ARR、毛利率或客户数数据——这些目前都未披露——就无法建立内在价值模型。 第二，进入倍数激进：在 $1.35B 且收入前的状态下，EvolutionaryScale 隐含的价格 / 已融资倍数（投后估值
              / 已融资约 ~9.5x） 明显高于收入前生物技术公司的行业常态；没有商业牵引力可见度，很难证明这一估值合理。第三，悲观情景风险不对称：开源 ESM2 和免费的 AlphaFold 3 是真实替代品，可能压缩
              API 定价，并在收入逻辑兑现前摧毁它。

              整体置信度为中等。产品证据强（Science 发表、模型架构），团队证据强（Meta AI 背景、GitHub 活动、HuggingFace 存在）， 融资证据也强（已确认且多来源）。商业侧证据弱（无收入、无
              ARR、无客户披露、无合作财务条款）。风险评级为高，原因包括： 以高估值进入收入前公司；四位联合创始人均来自同一前雇主，关键人物高度集中；开源和免费层竞争替代；双用途生物安全监管不确定； 以及商业分发结构性依赖
              Amazon 和 NVIDIA。

              估值判断是基础设施 / 平台 AI 溢价，但没有临床验证上浮。不同于临床阶段 AI 药物发现公司（Insilico Medicine、Recursion）， EvolutionaryScale
              的价值完全在平台和基础模型层——更像一家把基础模型 API 公司（Anthropic、Cohere）套用到垂直生物领域的企业， 但没有通用模型的规模，同时市场暴露集中得多。买入建议需要三个条件：披露 Forge
              ARR 至少 $10M+、拥有活跃的多制药客户群、 并确认毛利率高于 60%。
