  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模式
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的收入模式围绕 Forge 构建。Forge 是商业 API 平台，向 ESM3、ESM Cambrian 及相关蛋白质语言模型提供推理访问。Forge 于 January
              2025 进入公开测试版，对蛋白质序列生成和结构预测按 token 使用量收费。forge.evolutionaryscale.ai
              界面没有公开列出准确价格表，需要登录；企业合同条款私下谈判。公开来源可识别三条收入流：（1）Forge API 按次付费，（2）企业年度 API 访问合同（按量），（3）通过战略伙伴分发——NVIDIA
              BioNeMo 平台和 AWS SageMaker JumpStart 提供云托管 ESM 模型访问，可能分别与 NVIDIA、Amazon 采取收入分成或推荐费模式。

              ESM Cambrian（January 2025 发布）仅作为商业模型通过 Forge 发布，不同于 Meta AI Research 发布的开放权重 ESM2；后者仍可在 HuggingFace
              免费使用。这种 ESM Cambrian 商业专属设计强化了 API 访问模式。Forge 产品页列出一个学术免费层，带有 token 额度上限。

              EvolutionaryScale 作为独立实体运营期间，从未披露任何收入数字、ARR 或客户指标。November 2025 被 CZI Biohub 收购从根本上打断了商业路径；截至 May
              2026，Forge API 在 CZI Biohub 管理下的运营状态和定价，公开来源尚未确认。
