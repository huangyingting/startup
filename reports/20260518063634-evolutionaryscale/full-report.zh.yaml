  - id: TE003
    title: ESM 技术 / 运行架构表
    slug: technology-operating-architecture-table
    type: enumeration
    notes: >-
      ESM-C 的架构参数（层数、隐藏宽度）来自官方 ESM-C 博客。ESM3-large 的训练 FLOPs 来自官方 ESM3 博客和 Science 论文。ESM-C FLOPs 来自 ESM-C
      博客。基础设施细节（Andromeda 集群、H100 GPU）来自 NVIDIA 博客公告，并由 ESM3 Science 论文交叉印证。
    columns:
      - 组件
      - 描述 / 规格
      - 关键指标
      - 主要来源
    rows:
      - - ESM3 多轨 Transformer
        - 三条并行输入 / 输出轨道：氨基酸序列 token、VQVAE 结构 token、功能关键词 token；跨轨道统一注意力
        - 3 条轨道；3 个模型尺寸分别为 1.4B / 7B / 98B 参数
        - ESM3 博客（官方）；Hayes 等，Science 2025
      - - VQVAE 结构 tokenizer
        - 向量量化变分自编码器把 3D 蛋白骨架坐标编码为有限码本中的离散结构 token
        - 离散码本；无需坐标回归即可原生生成 3D 结构
        - ESM3 博客（官方）；ESM3 预印本（bioRxiv）
      - - ESM3 预训练与对齐
        - 三条轨道统一做掩码语言建模（MLM）；在 ESM3-large 上用 RLHF 微调，使其对齐蛋白设计偏好
        - 1.07×10²⁴ FLOPs（98B 模型）；2.78B 个蛋白；771B 个唯一 token
        - ESM3 博客（官方）；NVIDIA 博客；Science 论文
      - - ESM-C 架构
        - Pre-LN Transformer，使用 RoPE 位置嵌入和 SwiGLU 激活；掩码语言建模预训练；三个尺寸：300M / 600M / 6B
        - '架构：300M: 30L×960W; 600M: 36L×1152W; 6B: 80L×2560W'
        - ESM-C 博客（官方）
      - - ESM-C 训练算力与数据
        - >-
          训练数据：UniRef（83M 序列簇）、MGnify（372M）、JGI metagenomics（2B 簇），按 70% 序列一致性聚类；各模型
          FLOPs：300M=1.26e22、600M=2.17e22、6B=2.37e23
        - 总序列簇 2B+（最大组成来自 JGI metagenomics）
        - ESM-C 博客（官方）
      - - Andromeda HPC 训练集群
        - NVIDIA H100 Tensor Core GPU 集群，配 Quantum-2 InfiniBand 网络；用于训练 ESM3-large
        - FLOPs 较前代 ESM2 高 25×，数据多 60×
        - NVIDIA 博客（伙伴证明）
      - - DeepEP MoE 专家并行库
        - 专家混合（MoE）专家并行通信的开源 CUDA/NCCL 实现；为 H800 GPU 定制内核
        - 1,253 个 GitHub stars；显示内部 HPC 基础设施能力较强
        - GitHub evolutionaryscale/DeepEP（开发者信号）
