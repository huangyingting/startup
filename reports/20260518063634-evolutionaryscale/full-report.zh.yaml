  - id: FR002
    title: 风险传导 DAG：主要风险如何层层传导至收入和估值
    type: dag
    layout: wide
    summary: 这张有向无环图展示生物安全、技术和财务风险如何传导到商业结果和投资人影响。
    data:
      nodes:
        - id: biosec-policy
          label: 生物安全监管 / EO 14110
          type: risk
        - id: eu-ai-act
          label: EU AI Act 高风险分类
          type: risk
        - id: comp-free-tools
          label: 免费开放工具（AlphaFold3、Chai-1）
          type: risk
        - id: meta-ip
          label: Meta 对 ESM2 权重的残余 IP
          type: risk
        - id: hallucination
          label: ESM3 蛋白质幻觉率
          type: risk
        - id: gpu-cost
          label: GPU / 算力成本集中
          type: risk
        - id: forge-access
          label: Forge API 访问限制
          type: impact
        - id: price-power
          label: Forge 定价权被侵蚀
          type: impact
        - id: legal-cost
          label: IP 诉讼 / 授权成本
          type: impact
        - id: cust-roi
          label: 客户 ROI / 采用率
          type: impact
        - id: burn-rate
          label: 烧钱速度 / 现金跑道
          type: impact
        - id: revenue
          label: 商业化收入
          type: outcome
        - id: valuation
          label: Series B 估值标记
          type: outcome
      edges:
        - from: biosec-policy
          to: forge-access
          label: 可能限制或强制审查
        - from: eu-ai-act
          to: forge-access
          label: 合格评定 / 审计
        - from: comp-free-tools
          to: price-power
          label: 拉低付费意愿
        - from: meta-ip
          to: legal-cost
          label: 主张风险
        - from: hallucination
          to: cust-roi
          label: 拉低每次 API 调用命中率
        - from: gpu-cost
          to: burn-rate
          label: 推高运营支出
        - from: forge-access
          to: revenue
          label: 限制可触达市场
        - from: price-power
          to: revenue
          label: 压缩 ASP
        - from: legal-cost
          to: burn-rate
          label: 增加运营支出
        - from: cust-roi
          to: revenue
          label: 影响续约 / 扩张
        - from: burn-rate
          to: valuation
          label: 资本效率信号
        - from: revenue
          to: valuation
          label: 主要驱动因素
