      - number: '6.2'
        title: 采用轨迹与开放访问使用
        blocks:
          - type: paragraph
            body: >-
              最清晰、最客观可衡量的采用信号来自开放访问渠道。在 HuggingFace 上，截至研究日，biohub/esm3-sm-open-v1 模型（ESM3 的 1.4B 开放权重版本）约有 3,110
              次下载、291 个点赞；biohub/esmc-300m-2024-12 约有 6,320 次下载、30 个点赞；biohub/esmc-600m-2024-12 约有 1,490 次下载、32 个点赞。截至
              May 2026，两个开放模型合计带来约 7,810 次 ESM-C 家族下载。ESM-C 模型在研究缓存日期前两天仍有更新， 说明维护活跃。这些下载数很可能低估实际使用，因为很多学术用户会克隆 GitHub
              仓库，或通过官方 esm Python package 访问模型权重，而不是直接走 HuggingFace hub。

              在 GitHub 上，evolutionaryscale/esm 仓库是主要开源分发渠道。该组织维护九个或更多仓库，包括衍生技术基础设施 （DeepEP 1,253 个星标、NCCL 分叉 1,270
              个星标）、模型权重，以及明确标注为合作伙伴协作的 esm-partner 仓库。 March–May 2026 期间仍有活跃 commit 记录，说明开发活动持续。

              学术引用证据扎实：截至 May 2026，Semantic Scholar API 搜索返回 32 篇基于 ESM3 的论文；bioRxiv 搜索 "evolutionaryscale ESM3" 返回 129
              个预印本结果。具名下游应用包括 MegSite（核酸结合残基预测）、 ProteinReasoner（带链式思维推理的多模态蛋白质语言模型）、iNClassSec-ESM（非经典分泌蛋白发现），
              以及用于色谱纯化的亲和肽设计，覆盖学术、临床和工业应用。ESM3 Science 论文（发表于 January 16, 2025, DOI
              10.1126/science.ads0018）提供权威学术认可，也成为商业沟通中的可信度锚点。
