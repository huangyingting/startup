      - number: '5.4'
        title: 知识产权与竞争护城河
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的 IP 护城河靠三根柱子支撑：（1）高影响力期刊上的发表深度；（2）自研训练规模和基础设施； （3）esmGFP
              展示了模型在自然进化未探索过的蛋白质序列空间中生成新蛋白的能力。

              旗舰 Science 论文（Hayes et al., Science, January 2025, Vol 387, Issue 6736, pp. 850-858, DOI
              10.1126/science.ads0018）在本次研究观察到的引用指标中，已累计 341 次引用、68,494 次下载； 其中 318 次引用发生在发表后前 12 个月。ESM3 在 bioRxiv
              上的预印本（10.1101/2024.07.01.600583, July 2024）第一年内被 129+ 篇下游论文引用。这一发表速度让 ESM3 跻身被引用最多的新蛋白质 ML 方法之一。

              esmGFP 结果是 ESM3 生成能力最强的公开证明。该设计蛋白在 229 个氨基酸位置上携带 96 个突变（与最近已知天然 GFP 的汉明距离为
              58%），进化距离可类比珊瑚与水母这两个不同门类之间的分化。EvolutionaryScale 已就 esmGFP 及相关蛋白质设计方法提交专利。复现 ESM3-large 需要的算力投入（1.07×10²⁴
              FLOPs，相当于训练当时 GPT-4 训练预算的两倍以上）形成了有意义的成本壁垒。

              主要竞争对手更多是轴向差异，而非完全重叠。AlphaFold3（DeepMind，May 2024）擅长蛋白质结构预测，包括小分子和抗体复合物，
              但在设计意义上并非生成式模型，且商业使用限制在学术研究。Chai-1（Chai Discovery，2024）聚焦高精度蛋白质复合物结构预测。 ESM2（Meta AI，2022）是 650M
              参数的开放权重前代模型，提供序列向量嵌入，但缺少生成式的序列—结构—功能联合建模。 EvolutionaryScale 的独特定位，是能够同时围绕序列、结构和功能推理的生成式蛋白质设计。
