      - number: '7.4'
        title: 监管格局
        blocks:
          - type: paragraph
            body: >-
              AI 设计蛋白质的监管环境仍在早期，且高度碎片化。还没有任何司法辖区出台专门规则，管控生成式蛋白质语言模型的商业部署。 美国、欧盟和英国都在制定框架，未来可能按不同风险分类覆盖 EvolutionaryScale
              的产品。

              在美国，EO 14110（October 30, 2023）要求超过定义阈值的双用途基础模型开发者向政府报告安全评估，尤其关注 “生物安全、网络安全和关键基础设施”风险。NIST AI RMF（January
              2023）及其 Generative AI Profile（July 2024）提供自愿指引。FDA 通过软件即医疗器械（SaMD）框架和 2024 AI/ML 行动计划监管 AI/ML
              医疗器械，但只覆盖诊断或治疗决策 AI，不覆盖纯发现阶段的蛋白质设计工具。BIS（工业与安全局） 已开始研究可用于生物武器场景的 AI 模型出口管制框架，但还没有最终规则专门管控蛋白质语言模型。

              在欧盟，AI Act（Regulation 2024/1689，August 2024 生效；多数条款自 August 2026 起适用）会根据应用场景， 将可能造成双用途生物危害的 AI
              系统划入高风险或禁止类别。待法案条款全面执行后，ESM3 的双用途 API 访问可能需要合格评定、 透明度义务和人工监督措施。

              英国的生物安全审查仍在 Biosecurity Strategy 和 AI Safety Institute 框架下推进，该框架与美国及国际伙伴合作评估 AI 带来的生物风险。Biological Weapons
              Convention（已有 189 个国家签署并批准）禁止发展和生产生物武器，但没有 AI 专门条款，也缺少正式核查机制。

              监管尾部风险不对称：新的强制性规则（强制安全评估、出口管制、访问限制）可能抬高合规成本、限制国际分发，或要求模型删减—— 任何一项都会削弱 Forge 的商业模式，而且没有先例可判断限制会持续多久、强度多高。
