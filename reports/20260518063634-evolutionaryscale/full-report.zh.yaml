  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的客户基础最适合拆成四个访问层级，每层买方画像、访问机制和证据深度都不同。最大、证据最充分的一层是学术和独立研究人员； 他们通过 GitHub 和 HuggingFace
              直接访问开放权重的 ESM3（1.4B，非商业许可）和 ESM-C（300M、600M，开放权重）。
              这些用户主要来自大学、研究机构和政府实验室，身份多为计算生物学家、结构生物学家和生物信息学家。使用场景包括蛋白质序列表征、
              结构预测微调、功能注释、抗体设计和下游模型开发。开放权重用户不产生收入，但构成商业转化漏斗顶端信号。

              第二层是商业云平台用户，他们通过 Amazon Web Services SageMaker Marketplace（ESM-C 模型可商业部署）和 NVIDIA BioNeMo（列为即将上线）接触 ESM
              模型。这些买方通常是药企和生物技术公司的生物信息学与计算生物学团队， 相比直接订阅 API，更偏好云原生、由基础设施托管的模型部署。AWS 和 NVIDIA 是渠道合作伙伴，不是终端客户；
              真正的企业买方是它们的下游客户。订阅用户数和部署指标未公开披露。

              第三层是 Forge API beta 用户。截至 January 2025，EvolutionaryScale 开放了限时免费的 Forge API 公测， 让用户规模化访问 ESM3 和 ESM-C
              模型。Forge API 面向需要超过 1.4B 开放模型推理能力的学术科学家和商业构建者。 Forge 公测后的商业定价尚未公开宣布。API 注册需要访问 token；用户数未披露。

              第四层是为企业平台访问付费的大型药企 R&D 买方。这是价值最高的细分群体，但公开证据最弱。Adaptyv Bio （一家位于瑞士 Lausanne 的蛋白质工程公司）已确认是具名 ESM
              生态合作伙伴。Pfizer、Eli Lilly、 Novartis、Roche 或其他全球 top-20 药企交易均未公开宣布；相较 Generate Biomedicines 和 Isomorphic
              Labs， 这是实质性的商业证明缺口。
