  - id: TV006
    title: 投资逻辑失效与终止触发条件
    columns:
      - 触发条件
      - 阈值和事件
      - 对投资逻辑的传导
      - 操作含义
    rows:
      - - 到 2026 年底仍未披露 Forge ARR
        - 到 2026 年 Q4，也就是成立三年后，EvolutionaryScale 仍未披露任何 ARR、企业客户数或定价数据
        - 证实商业化逻辑完全停留在推测；任何高于已融资资本的估值都失去收入倍数基础；释放可能被收购团队的风险信号
        - 下调至回避；追加投入前，要求与公司 IR 直接会面确认 ARR
      - - 联合创始人离职（Rives、Sercu、Lin、Candido 任一人）
        - 四位联合创始人中任一人公开宣布离开 EvolutionaryScale 主动职务，或 LinkedIn 离职信息获确认
        - 摧毁创始人领域权威这一支柱；立刻引出 IP 延续性、团队士气以及 Amazon / NVIDIA 合作方信心问题
        - 立即重新评估；降低仓位；任何投资逻辑上调前，要求解释 IP 归属和竞业限制状态
      - - 开源蛋白生成模型追平
        - 任何开源蛋白语言模型发布，并具备可比 ESM3 的多模态生成能力且被社区广泛采用（6 个月内 GitHub star 数 >10k）
        - 抹掉 Forge API 的技术差异；让 $1.35B 估值锚商品化；定价权从 EvolutionaryScale 转向基础设施（AWS/NVIDIA）
        - 按悲观情景重估；评估仅靠 AWS/NVIDIA 分发优势能否撑住 $800M+ 估值
      - - Amazon 收购团队或敌意定价变化
        - Amazon 出价以低于 $1B 的估值收购 EvolutionaryScale，或 AWS 调整 Forge 定价条款、直接截留经济收益
        - 暴露 Amazon 把 EvolutionaryScale 视为基础设施组件，而非独立平台，进而触发估值重置
        - 评估收购团队溢价与长期独立路径；将公允价值按 AWS 功能而非独立平台建模
    claimRefs:
      - CV005
      - CV022
      - CV023
      - CV029
      - CV033
      - CV037
    notes: >-
      终止触发条件是二元事件或阈值事件；监控需要定期检查 EvolutionaryScale 博客 / 新闻稿、跟踪 LinkedIn 上联合创始人动态、监控 GitHub 蛋白模型仓库以及 AWS Partner Network
      公告。
  - id: TV007
    title: 最终尽调待确认事项
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人和尽调路径
    rows:
      - - Forge ARR 和客户数
        - 截至 2026 年 Q2，Forge API 平台的年经常性收入（ARR）、企业客户数和客户名称（至少到类别层面）
        - 没有收入确认，任何高于 Series A 入场估值的模型都站不住；ARR 是验证商业化逻辑的首要指标
        - 公司 IR；AWS Marketplace 上架数据；提到面向客户岗位的 LinkedIn 招聘；Series B 融资资料室
      - - Forge 毛利率
        - Forge API 收入成本（每次 API 调用的 GPU 计算成本、基础设施成本、分摊人员）；毛利率百分比
        - 毛利率决定 Forge 能否扩成高价值 SaaS 业务（毛利率 >70%），还是结构上只是低毛利算力转售
        - 公司 IR；财务资料室；以 AWS 计算成本基准作代理
      - - Amazon 和 NVIDIA 合作财务条款
        - AWS SageMaker JumpStart 和 NVIDIA BioNeMo 分发协议的收入分成比例、排他条款、最低承诺量和期限
        - 如果 Amazon 或 NVIDIA 作为渠道费拿走 Forge 总收入的 >40%，EvolutionaryScale 的净经济性可能撑不起独立平台价值；排他条款决定自助获客能力
        - Series B 资料室；M&A 资料室请求；NVIDIA 和 AWS 合作伙伴计划备案
      - - 来自 Meta 的 ESM IP 权属链
        - Meta Platforms 与 EvolutionaryScale 创始人之间，覆盖 ESM 模型架构、训练代码或数据管线的任何 IP 转让、许可或让与协议
        - 若 IP 权属链未确认，收购方或药企合作伙伴会面对 IP 诉讼风险；Amazon 或药企尽调会要求权属清晰
        - 公司法务披露；专利检索（USPTO）；联合创始人雇佣协议审查
      - - 生物安全与双用途筛查流程
        - 客户筛查流程、高风险请求（病原体相关蛋白）的访问控制，以及 NIH Dual Use Research of Concern (DURC) 政策合规
        - 生物安全监管行动可能限制 Forge 只能在非美国市场分发，或迫使 API 功能下线；治理透明是药企合作的前提
        - EvolutionaryScale 负责任开发博客；DURC 政策审查；US DoD/BARDA 承包商关系核查
      - - 股权结构表和优先股堆叠
        - Series A 清算优先权倍数、反稀释条款、已发行优先股总量，以及 Series A 后估计摊薄股数
        - 低于 $1.35B 名义估值的普通股价值高度取决于优先股堆叠；2x 清算优先权或参与型优先股会在中等退出价格下显著压低普通股价值
        - Series B 资料室；VC 法律顾问审查；Delaware 州务卿公司注册证书
    claimRefs:
      - CV005
      - CV009
      - CV034
      - CV037
    notes: 六项尽调待确认事项都是买入建议的阻断项。Forge ARR 优先级最高；没有它，无法对高于当前 Series A 锚点的估值建立信心。IP 和生物安全是机构药企合作及任何 M&A 交易的前提。
