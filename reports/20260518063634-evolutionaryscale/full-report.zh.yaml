      - number: '7.2'
        title: 技术风险
        blocks:
          - type: paragraph
            body: >-
              ESM3 的性能取决于训练分布质量。模型在 2.78 billion 条蛋白质序列上训练，但新型家族中功能蛋白的天然多样性——例如非核糖体合成肽、
              新型酶骨架或完全从头折叠——可能远在这一分布之外。蛋白质语言模型可能「幻觉式」生成高置信度序列，但这些序列并不按预测折叠或发挥功能； 任何 ESM3
              生成序列用于治疗或工业用途前，都需要湿实验室验证。由此产生延迟风险：客户为 Forge API 调用付费， 但在产生商业价值前仍要承担昂贵实验验证；相较开放替代品，溢价定价的经济论据因此变弱。

              基准饱和是近期技术风险。ESM3-98B 发布时在 CASP15 单体预测上达到最先进水平，但 Chai-1（Apache 2.0，免费） 已报告 Cα LDDT 0.849 vs ESM3-98B 的
              0.801，以及 77% vs 76% 的 PoseBusters 成功率，在结构预测上接近商业模型。 AlphaFold 3 及其开放数据库（截至 March 2026，含蛋白质复合物在内超过 200 M+
              个结构）持续扩大免费覆盖。 Baker Lab 的 RFdiffusion（Nature 2023）可免费用于结合体设计。这些开放工具降低了 Forge API 门控访问的边际价值。

              ESM3 的训练从 Meta 的 ESM2 权重初始化。根据 Meta 自有模型卡和 facebookresearch/esm GitHub 仓库条款， Meta 保留 ESM2 模型家族的 IP。ESM3 相比
              ESM2 在架构和训练上有实质进步，但如果 Meta 对祖先权重仍有任何残留 IP 主张， 可能限制 EvolutionaryScale 商业化 98B 模型或再许可权重的能力。公司已就部分工作提交专利（ESM3
              bioRxiv 预印本竞争利益声明中披露）， 但完整专利组合及其与 Meta 在先技术的关系仍未披露。

              对 NVIDIA（H100/H200 集群）和 Amazon（AWS）的算力依赖是一把双刃剑：两者既是投资人和渠道伙伴，理论上也可能限制访问或降低工作负载优先级。 GPU 供应约束可能推迟模型训练或 API
              扩容；尤其是 ESM3 训练消耗 1×10²⁴ FLOPs，是发布时任何生物模型中规模最大的算力投入之一。
