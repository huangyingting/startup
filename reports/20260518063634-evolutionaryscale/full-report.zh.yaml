      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale Forge API 的主要商业买方，是拥有活跃计算生物学或蛋白质工程项目的大型和中型制药 /
              生物技术公司。经济买方通常是计算生物学副总裁、药物发现总监或首席科学官，采购权限通过 R&D 和 IT
              预算下放。技术拥护者负责评估模型能力并推动采用，通常是嵌入发现团队的计算生物学家、结构生物学家或机器学习科学家。财务和采购负责人承担正式付款方角色，需要用减少湿实验室筛选周期或加快先导化合物识别周期来证明
              ROI。

              Forge 商业 API 面向需要大规模蛋白质序列生成和向量嵌入、且要求可用性和合规保障的企业客户。AWS SageMaker JumpStart 和 NVIDIA BioNeMo
              是次级商业渠道，触达已嵌入这些云生态的制药客户。学术和政府研究实验室构成高体量但非收入的用户分层，他们从 HuggingFace 下载 MIT 许可下的 ESM-C 开放权重（6,320+ 次下载），并通过
              PyPI `esm` 包安装——这种社区心智会反哺商业管线。

              工业生物技术公司——为绿色化学、农业和特殊材料设计酶——代表一个实质上不同的买方分层，产品开发周期更短，监管负担更低。合同研究组织有双重角色：既可能购买蛋白质 LM API
              来增强自身服务，也可能成为渠道伙伴，把带计算能力的蛋白质工程服务转售给制药客户。Series A–B 阶段的生物技术创业公司是新兴付费分层：它们具备计算基础设施，但缺乏内部资源训练前沿蛋白质 LM，因此购买
              Forge API 访问在经济上合理。
