      - number: '7.5'
        title: 财务与运营风险
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 累计融资约 $145 M（种子轮加 $142 M Series A，September 2024），投后估值 $1.35 B。 运行 98B
              参数级别的前沿蛋白质语言模型，需要大量持续算力。训练 ESM3 消耗 1×10²⁴ FLOPs，依托高吞吐 GPU 集群；
              商业规模下的持续推理服务和模型迭代会反复产生硬件成本。公司没有公开收入披露；截至已知访问日，公司仍处于收入前或极早期收入阶段。

              按一家拥有前沿 GPU 集群、50–80 人 AI 基础设施公司的典型开支速度，除非 Forge API 很快转化为有意义的商业收入， $145 M 对应的现金跑道大约只有 2–4 年。该估值意味着相对于当前
              Forge 采用度可支撑的任何前瞻收入预测，倍数都超过 10×； 如果商业爬坡慢于投资人预期，下轮估值下调风险会出现。

              Amazon 和 Nvidia 的投资人 / 合作伙伴集中带来双重冲突：两家公司同时是 EvolutionaryScale 的主要云算力供应商、 主要分发渠道（SageMaker
              JumpStart、BioNeMo）和 Series A 投资人。如果 EvolutionaryScale 需要重谈云合约或寻求竞争性报价， 投资人关系会限制谈判筹码。反过来，如果 Amazon 或 Nvidia
              发展竞争能力（两者已经在做：BioNeMo 已纳入 ESM 模型， 也包含竞争工具），它们可能有动力把客户从 Forge API 引走。

              除 Forge API 订阅外，公司没有披露任何 IP 变现策略。如果开放的 ESM3 1.4B 模型（学术用途免费）满足了大部分学术需求， 从而蚕食商业 Forge 采用；同时制药客户更愿意自建能力而不是支付
              API 费用，商业模式在规模化时可能低于预期。
