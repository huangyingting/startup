  - id: TR002
    title: 技术风险细节
    columns:
      - 风险
      - 机制
      - 证据
      - 严重性
      - 缓释措施
    rows:
      - - 蛋白幻觉 / 非功能性生成
        - 语言模型生成的序列统计上可信，但折叠错误或没有生物活性
        - Chai-1 技术报告显示，ESM3-98B Cα LDDT 为 0.801，低于 Chai-1 的 0.849；AlphaFold2 仅在 CASP14 对约 2/3 蛋白达到准确度
        - 对期待可靠命中的药物发现客户，严重性高
        - ESM3 论文称对齐训练类似 RLHF；仍需实验室验证
      - - 基准饱和与竞争者追赶
        - 免费开放工具在结构预测上快速缩小性能差距；生成任务基准更不完善
        - AlphaFold3 DB 免费提供 200M+ 结构；Chai-1 采用 Apache 2.0 且达到 SOTA；RFdiffusion 来自 Baker Lab，免费
        - 中——限制溢价定价能力
        - ESM3 的多模态联合生成（序列 + 结构 + 功能）形成差异
      - - ESM2 知识产权来源——Meta 祖先权重
        - ESM3 以 Meta 的 ESM2 初始化；Meta 模型卡未完全公开衍生品条款；可能对商业权重提出权利主张
        - facebookresearch/esm 仓库文本写明在 Meta 条款下“包含预训练权重”；未明确给出 ESM2 权重的开源许可证
        - 中——潜在许可风险
        - 已提交专利；需要律师审查；PBC 结构提供一定保护
      - - 算力成本与 GPU 供应集中
        - 训练消耗 1×10²⁴ FLOPs，且需要持续推理；ESM3-98B 需要 HPC 集群；NVIDIA H100/H200 供应稀缺
        - ESM3 博客：“在当今世界吞吐量最高的 GPU 集群之一上训练”
        - 中等运营风险
        - Amazon 和 Nvidia 作为投资方提供算力获取可选性；多云风险仍在
      - - 稀有蛋白类别训练数据缺口
        - 新型生物、合成生物学底物或非天然氨基酸可能落在 2.78B 序列训练分布之外
        - ESM3 论文：用合成数据补足缺口；ESM Cambrian 缩放律平台期表明存在上限
        - 中——限制其在前沿药物发现中的效用
        - 合成数据增强；通过 ESM Cambrian 系列持续更新模型
    notes: 严重性评级为定性；证据引用指向公开模型卡和技术报告。
