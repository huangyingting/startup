      - number: '5.6'
        title: 证据展品
        blocks:
          - type: callout
            title: esmGFP：同行评议验证的进化尺度生成能力证据
            body: >-
              esmGFP 结果——一种新型功能性荧光蛋白，在 229 个位置上携带 96 个突变（与最近天然 GFP 的序列同一性为 58%， 代表约 500 million years 的进化分化）——以及
              Science（January 2025，341 次引用）的验证，共同构成最强的公开证据： ESM3 能生成真正新颖的功能蛋白，而不只是已知序列的变体。这是一个具体且经实验确认的验证点，把 ESM3
              与结构预测模型（AlphaFold）和早期仅序列 LM（ESM2）区分开，也为投资人与合作伙伴可信度提供了可复现、可引用的锚点。
            calloutType: strength
            claimRefs:
              - CE029
              - CE030
              - CE027
          - type: callout
            title: 结合预测悖论：结构输入异质性降低准确率
            body: >-
              December 2024 发表的一篇独立 BioRxiv 预印本发现，如果用每个变体各自松弛后的不同结构模型作为输入，而不是使用单一一致结构骨架， ESM3
              的结合预测性能会下降。这个「结构更多，准确率更低」发现，对药物发现场景有直接影响：研究人员通常会为每个突变体独立计算松弛结构。 尽调团队应在自身具体结构输入制度下测试 ESM3 结合预测，并要求
              EvolutionaryScale / CZI Biohub 给出最佳实践结构条件化指南， 以避免这一退化模式。
            calloutType: risk
            claimRefs:
              - CE039
          - type: callout
            title: 双轨商业模式：开放权重播种采用，Forge API 捕获收入
            body: >-
              EvolutionaryScale 的架构是典型开放核心商业模式：较小模型（ESM3-small、ESMC-300M/600M）在非商业许可下开放权重，
              用来积累社区采用、学术引用和开发者熟悉度；高容量模型（ESM3-large 98B、ESMC-6B）与 Forge API 则形成商业护城河。 HuggingFace 月度下载数据（研究日 ESM3-small
              为 3,105 次，ESMC-300M 为 6,320 次）显示，实践者采用正在增长， 未来可能转化为 Forge API 商业客户。关键尽调问题，是该漏斗带来的转化率和 Forge 定价。
            calloutType: insight
            claimRefs:
              - CE004
              - CE020
              - CE021
              - CE037
          - type: callout
            title: 尽调优先事项：索取 Forge API 定价、数据留存政策与生物安全审查
            body: >-
              任何潜在投资人或合作伙伴，都应向 EvolutionaryScale / CZI Biohub 索取：（1）Forge API 定价层级，以及当前客户数或 ARR 区间；（2）提交至 Forge API
              的序列数据留存和保密政策（对拥有自有管线序列的药企客户至关重要）；（3）覆盖生成式蛋白质设计双重用途风险的生物安全政策和任何第三方生物安全审查； （4）CZI Biohub 过渡后 Forge API
              持续运营承诺的确认，包括可用性 SLA 和 2026–2027 路线图；（5）独立基准测试： ESM3-large 相对 AlphaFold3 与 Chai-1 的结构预测准确率，以及 ESMC 相对 ESM2
              在下游分类任务中的向量嵌入质量。
            calloutType: recommendation
            claimRefs:
