      - number: '1.5'
        title: 关键里程碑与负面事件
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale 的历史从 2023 年注册开始，经历快速的产品和融资阶段，到 November 2025 被 CZI 吸收为止；作为独立实体的总运营寿命不足三年。公司最重要的技术里程碑是
              ESM3 Science 论文发表，首次用独立同行评审验证生成式蛋白质语言模型能够设计具备可编程属性的全新功能蛋白。September 2024，以约 $1.35B 估值完成 $142M Series
              A，距离产品发布仅三个月，反映出投资人对该技术的异常热情。但 November 2025 被 CZI/Biohub 收购，是最关键的负面治理事件：Series A 交割到并入非营利实体间隔不到 14
              个月，商业投资人的退出路径高度不确定，因为 CZI 收购条款以及任何给股权持有人的补偿都没有公开披露。从营利性商业实体转为非营利研究项目，实质性引发几个问题：Series A
              投资人如何处理、员工股权如何处理、Forge API 商业产品能否延续。其他负面事件还包括：没有任何 SEC Form D 文件，这对于一家融资 $142M 的公司并不寻常；ESM GitHub 仓库重定向到
              biohub 组织，释放 IP 转移信号；公司没有 Wikipedia 页面，说明主流媒体记录有限。
