  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的投资逻辑建立在四个相互强化的支柱上。第一，创始人的领域权威：Alexander Rives、Tom Sercu、 Zeming Lin 和 Salvatore Candido
              是 Meta AI FAIR 时期 ESM 蛋白质语言模型家族的真正创造者，拥有任何竞争团队都无法从零复制的机构知识和发表记录。 第二，经同行评审的科学验证：ESM3 于 January 16, 2025
              发表在顶级同行评审期刊 Science Magazine，记录了一个新型荧光蛋白的生成， 等同于模拟 5 亿年进化——这一非凡科学主张已经通过编辑评审公开验证，并以超过 1×10^24 FLOPs
              训练算力被索引。第三，结构性的云分发护城河： Amazon（AWS）和 NVIDIA 不只是财务投资人；它们也是分发渠道伙伴，把 Forge 嵌入 AWS SageMaker JumpStart 和 NVIDIA
              BioNeMo， 让 EvolutionaryScale 直接触达几乎所有全球制药和生物技术 R&D 组织使用的云基础设施。第四，独特的多模态生成能力：ESM3 同时在蛋白质序列、结构和功能上推理——同类蛋白质
              AI 创业公司（Profluent、Cradle.bio、Absci）还没有在单一基础模型中做出这一能力。

              反向逻辑同样有证据支撑。第一，收入披露为零：截至 May 2026，Forge 没有公开确认 ARR、客户数或毛利率；$1.35B Series A 估值完全建立在前瞻预期上，使其成为 AI
              生物技术领域估值最高的收入前项目之一。第二，开源替代威胁：ESM2（前代模型）可免费开源使用； AlphaFold 3（Google DeepMind）向全球超过 300
              万研究人员免费提供非商业蛋白质结构和相互作用预测；两者都直接替代 EvolutionaryScale 商业产品的核心。第三，关键人物集中：四位联合创始人全部来自同一前雇主（Meta AI
              FAIR）；如果同时离开， 这是高度相关的集中风险，在可比创业公司中几乎没有先例。第四，双用途和生物安全监管阴影：ESM3 的生成式蛋白质设计能力存在生物安全风险，
              责任发展框架也承认这一点；客户筛查协议未披露，监管暴露仍不确定。第五，VC 估值倍数压缩风险：KPMG 2024 Venture Pulse 报告明确警告， 投资人正在“更审慎判断 AI
              领域谁可能成为赢家”，并会偏好商业模式可信的公司；公开证据看， EvolutionaryScale 还没有达到这一标准。
