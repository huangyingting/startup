      - number: '7.7'
        title: 法律与 IP 风险
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的 ESM3 以 ESM2 权重为起点训练。Meta 的 facebookresearch/esm GitHub 仓库（托管 ESM2）
              没有为模型权重本身附上标准开源许可证；ESM2 模型权重适用 Meta 自己的模型卡条款。ESM3 商业权重与 ESM2 祖先权重之间的关系， 公开来源没有完整说明；如果 Meta 主张衍生作品权利，就会形成潜在
              IP 来源风险。

              biorxiv 预印本的利益冲突声明写明，“已就本工作的若干方面提交专利申请”。这些专利的性质、 权利要求和状态没有公开披露。ESM3 使用的蛋白质建模离散 token 方法（将 3D 结构和功能 token
              化为离散字母表）可能面对来自学术团队的既有技术， 包括 Baker Lab、Meta FAIR 和 Oxford 研究者。任何侵权主张——或专利冲突程序——都可能拖慢商业化，或要求昂贵的授权安排。

              EvolutionaryScale 注册为公益公司（PBC）。这一形式提供一定治理弹性，但也围绕公共利益使命产生义务， 可能约束纯商业决策，尤其是开放模型访问与商业闸门之间的取舍。
