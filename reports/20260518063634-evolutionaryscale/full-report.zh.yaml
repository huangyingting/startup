      - number: '3.4'
        title: 护城河耐久性、商品化风险与反向分析
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale 最具结构性意义的竞争风险，是蛋白质语言模型的开源商品化。ESM2 和 ESMFold 由 Alexander Rives、Zeming Lin、Tom
              Sercu、Salvatore Candido 在 Meta AI FAIR 开发，在 GitHub 和 HuggingFace 上以 MIT 许可开放，可用于包括商业用途在内的任何目的。ESM2 版本覆盖 8M
              至 15B 参数；ESMFold 预测蛋白质结构的速度最高可比此前 SOTA 快 60x。OpenFold 提供 AlphaFold
              的独立开源复现，并采用宽松许可。任何生物技术或制药公司都可以部署这些免费模型作为基线，直接压缩 ESM3 在不需要多模态提示或前沿规模应用中的价值。


              EvolutionaryScale 试图通过三种策略逃离这条底线：（1）前沿规模——ESM3 拥有 98B 参数和 10^24
              FLOPs，是具备已验证涌现生成能力的最大蛋白质语言模型；（2）多模态差异化——ESM3 是首个同时推理蛋白质序列、结构和功能的模型，这一能力 ESM2 不具备；（3）R&D 速度——ESM
              Cambrian（ESMC）于 December 2024 发布，维持新模型发布节奏。


              但反向信号也很明确。第一，Chai Discovery 的 Chai-2 推进原子级精度 de novo 抗体设计，Isomorphic Labs 持有 AlphaFold 3
              商业独家权，说明多模态蛋白质设计空间正在变挤。第二，临床概念验证护城河掌握在 Insilico Medicine（AI 设计药物完成 Phase 2）和 Recursion（多项目临床管线）手中，而
              EvolutionaryScale 没有披露内部管线。第三，Generate Biomedicines 的资本基础（$700M+）远超
              EvolutionaryScale（$142M），能够支撑更资本密集、经实验室验证的策略。第四，制药客户可以并且确实会同时使用免费工具（AlphaFold、ESM2）和付费平台（Forge、Cradle、Generate），限制任何单一供应商的定价权。
