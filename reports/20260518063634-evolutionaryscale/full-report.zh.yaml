    rows:
      - - AlphaFold 3 DB (DeepMind/EMBL-EBI)
        - 免费；CC BY 4.0
        - 蛋白、复合物和小分子的结构预测；数据库含 200M+ 条目
        - 对结构预测用例威胁高
