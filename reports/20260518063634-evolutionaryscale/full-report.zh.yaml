chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale, Inc. 是一家早期 AI 生物公司，总部位于 San Francisco, California，2023 年注册，约从 March 2024
              起运营。公司宣称的使命是用大型生成式模型解码蛋白质序列语言，把蛋白质视为承载数十亿年生物进化的文本，并据此设计具备可编程功能的新蛋白。其核心商业产品是 Forge API
              平台（forge.evolutionaryscale.ai），面向开发者，以程序化方式开放 ESM3 和 ESM Cambrian（ESM-C）模型家族。预期收入模式是软件即服务 API
              订阅和按量计费，服务需要加速蛋白质工程的生物技术、制药、合成生物学客户。公司也通过 Hugging Face 发布开放权重 ESM3
              模型（esm3-sm-open-v1），供非商业学术用途，在商业产品之外建设开发者社区。截至 November 2025，整个团队被 Chan Zuckerberg Initiative 旗下 CZ Biohub
              吸收后，EvolutionaryScale 不再作为独立实体运营，独立商业公司的路径也随之终止。公司独立期间从未公开披露收入、ARR 或付费客户数。
