    EvolutionaryScale 的产品线围绕 ESM（Evolutionary Scale Modeling）蛋白质语言模型家族展开——ESM3（多模态生成式，最高 98B 参数）以及 ESM Cambrian /
    ESM-C（偏表征，300M / 600M / 6B 版本）。分发路径包括：（a）面向学术 / 非商业用途的 HuggingFace 开放权重渠道（截至 May 2026，esm3-sm-open-v1 与 ESM-C 版本合计约
