      - number: '1.4'
        title: 产品、技术与运营
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale 的产品组合以 ESM（Evolutionary Scale Modeling）蛋白质语言模型家族为核心。ESM3 于 June 25, 2024
              发布，是生成式多模态蛋白质模型，最高 98 billion 参数；发布时，它是公开发布的最大蛋白质语言模型。ESM3 用 2.78 billion 条蛋白质序列训练，总计 771 billion
              tokens，在公司内部称为 Andromeda 的 NVIDIA H100 GPU 集群上消耗约 1×10^24 浮点运算。公司称，ESM3 在一次生成过程中模拟 500 million
              年蛋白质进化，从而设计具有用户指定结构和功能属性的新蛋白。Science 于 January 16, 2025 发表同行评审论文（DOI: 10.1126/science.ads0018），验证 ESM3
              能设计真正全新的荧光蛋白，显著提升独立可信度。ESM Cambrian（ESM-C）于 December 4, 2024 发布，是下一代蛋白质语言模型，提供 300M、600M、6B
              参数版本，针对高效推理优化。NVIDIA 将 ESM3 接入 BioNeMo 平台，并以 NVIDIA NIM 微服务形式开放，支持企业在 H100 基础设施上部署。公司维护一个 GitHub 组织，拥有 9+
              个仓库，包括 ESM 模型代码库、用于 mixture-of-experts 推理的 DeepEP 仓库，以及若干开源训练基础设施 fork。Forge API 平台承担商业开发者接口。收购前，LinkedIn
              显示 EvolutionaryScale 员工数为 11 至 50 人。
