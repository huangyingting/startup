      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              五股结构性力量推动蛋白质 LM 市场增长。第一，蛋白质序列数据库指数级扩张：DNA 测序成本从 2011 年约 ~$10,000 / genome 降至 2023 年约 ~$100 /
              genome（National Human Genome Research Institute），推动数十亿条新蛋白质序列产生。ESM3 用 2.78 billion 条蛋白质序列和 98 billion
              参数训练；这种规模只有在数据民主化之后才可实现。第二，AlphaFold2/3（Google DeepMind）生成了一个包含 200+ million 蛋白质结构的免费数据库，移除了历史上 $500,000+
              的晶体学成本壁垒，也训练行业接受计算蛋白质工具达到生产级。第三，NVIDIA BioNeMo 将生物基础模型训练提速 2×、模型推理提速 6×，降低企业 PLM 部署总拥有成本，压低 Forge API
              替代方案的经济门槛，同时扩大 EvolutionaryScale 分发触达。第四，FDA 监管参与正在加速：2016 至 2023 年收到 500+ 份启用 AI/ML 的药物开发提交，2025
              年发布草案指南，2024 年成立 CDER AI Council——这降低了制药客户评估 AI 原生发现工具时的监管不确定性。第五，ESM-C 以 MIT 许可开放权重发布，使 EvolutionaryScale
              成为蛋白质 LM 的社区标准，类似 Hugging Face 开放权重策略推动 NLP 商业云 API 转化。

              四个实质性约束限制采用速度。第一，开源商品化：ESM-C 权重以 MIT 许可免费开放；任何资源充足的实验室都可以自托管，压低付费转化率和非前沿市场的定价权。第二，湿实验室验证要求：没有任何完全由计算 AI
              设计的蛋白质在缺少大量体外和体内确认的情况下进入监管批准流程——API 有价值，但不能替代实验瓶颈。第三，企业采购摩擦：制药 IT 安全审查、云数据治理政策、多年供应商评估周期，让商业部署时间比学术采用多出
              12–24 个月。第四，Big Tech 竞争压力：Google DeepMind、NVIDIA BioNeMo、AWS HealthOmics 都有分发、算力和生态优势；如果前沿蛋白质 LM
              能力走向商品化，它们会威胁 EvolutionaryScale。
