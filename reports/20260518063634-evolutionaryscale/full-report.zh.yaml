  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争宇宙与类别分层
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale 的竞争位置在蛋白质语言建模、生成式生物学和 AI 赋能药物发现的交叉点。竞争宇宙可分为四类。


              第一类也是最直接的一类，是 AI 蛋白质设计平台同行：专门为蛋白质工程和设计构建并商业化基础模型的公司。Profluent Bio（San Francisco，累计融资约 ~$44M）使用源自 ProGen
              的模型，并推出 OpenCRISPR——其网站称之为全球首个 AI 设计的基因编辑器。Cradle.bio（Amsterdam，累计融资约 ~$73M）提供 SaaS
              蛋白质工程平台，把自有湿实验室数据循环与客户数据结合，并声称可将开发周期提速 2–12x；客户中包括 Novonesis（原 Novozymes）。Generate
              Biomedicines（Somerville, MA，累计融资 ~$700M+）运营 Generate Platform——一个持续训练的生成式生物学闭环，已在 140,000+ sq ft
              实验室空间中生成、构建并测试 42,000+ 种蛋白，并拥有活跃的大型制药合作。AbSci Corporation（NASDAQ: ABSI；Vancouver, WA）是唯一上市的直接同行，拥有面向 de
              novo 抗体设计的 AI Drug Creation Platform，采用 6 周迭代周期，并于 March 2026 向 SEC 提交 FY2025 10-K。Adaptyv Bio（Lausanne,
              Switzerland）定位为 Biopole Life Science Campus 的蛋白质设计师云实验室。


              第二类包括基础模型和更广义的 bio-AI 同行。Isomorphic Labs（London，Alphabet 子公司）在 May 2024 Google DeepMind 联合公告之后，持有
              AlphaFold 3 在药物发现领域的独家商业许可，并在 early 2024 与 Eli Lilly、Novartis 签署标志性交易。Chai Discovery（San
              Francisco）以开放模型形式发布 Chai-1，并在推进 Chai-2，用于具有原子级精度的药物样 de novo 抗体设计。Xaira Therapeutics（San Francisco，April
              2024 启动时融资约 ~$1B）正在构建覆盖完整药物发现谱系的预测型和智能体 AI 模型。Iambic Therapeutics 使用 Enchant 和 NeuralPLexer AI 技术，并已有
              IAM1363（HER2 inhibitor）Phase 1b 数据。Inceptive（Palo Alto/Berlin/Zurich，成立于 2021）专注于
              RNA/mRNA/siRNA/ASO/peptide 基础模型。


              第三类是 AI 药物发现整合商。Insilico Medicine（HKEX: 3696）在 AI-first 公司中临床证明最领先，已完成 ISM001-055（TNIK inhibitor for IPF）的
              Phase 2 试验。Recursion Pharmaceuticals（NASDAQ: RXRX）收购 Exscientia，运营 50+ petabytes 表型组数据，并拥有 BioHive-2（与
              NVIDIA 共建）。Schrödinger（NASDAQ: SDGR）是占主导地位的物理建模平台，拥有 30+ 年 R&D，以及 FEP+、WaterMap、LiveDesign 工具。


              第四类覆盖学术和开源参与者。Institute for Protein Design（Baker Lab，UW）——其联合主任 David Baker 分享 2024 Nobel Prize in
              Chemistry——以免费开源工具形式分发 RFdiffusion 和 RoseTTAFold，并有一款免版税 COVID-19 疫苗在 UK 和 South Korea 获批。Google DeepMind
              通过 AlphaFold Server（免费、非商业）和 EMBL-EBI AlphaFold DB（200M+ 结构，CC-BY-4.0）开放 AlphaFold 3。最具对抗性意义的开源威胁，是 Meta 的
              ESM 模型家族（ESM2、ESMFold）——由 Alexander Rives、Zeming Lin、Tom Sercu、Salvatore Candido 创建，正是创办 EvolutionaryScale
              的同一批人——并以 MIT 许可发布，为基础蛋白质语言建模建立了商品化底线。
