      - number: '6.4'
        title: 留存、耐久性与满意度证据
        blocks:
          - type: paragraph
            body: >-
              截至 May 2026，EvolutionaryScale 未披露净留存率（NRR）、总留存率（GRR）、客户流失率、合同续约统计或客户满意度分数。 以公司当前商业化阶段看，缺少这些指标并不意外：Forge
              API beta 只在 January 2025 上线，AWS SageMaker 上架也较新，且没有披露条款的企业软件交易宣布。主要可观察留存信号都是间接的：HuggingFace 下载持续增长（ESM-C
              在研究日前数日内更新）、April–May 2026 期间 GitHub commit 活跃、下游学术论文持续累积（自 ESM2 发布以来， 已有 37 个月围绕 ESM 模型继续构建）。

              对 Forge API 渠道而言，公开 beta 的免费访问明确服务于客户开发。公司 January 2025 博客称这是 「公开 beta，让学术界和产业界科学家限时免费预览」——这暗示 beta
              后付费转化是预期留存机制， 但尚未验证。ESM GitHub 仓库 SDK 能在本地、Forge 和 SageMaker 部署模式之间无缝集成（同一套 API 代码不受端点差异
              影响），架构上形成低切换成本、高粘性的留存条件，但商业层面尚未验证。

              对 AWS SageMaker 渠道而言，留存由 AWS 云基础设施锁定效应中介。一旦客户通过 CloudFormation 在自有 AWS 环境内部署 ESM-C，迁移到竞争性蛋白质 LM
              需要有意重新集成，因此渠道粘性更持久。

              ESM2 前代模型可在非商业许可下免费使用，是付费意愿分析的重要下限。如果客户用免费的 ESM2（最高 15B 参数） 就能满足蛋白质表征任务，除非性能优势足以证明溢价合理，否则为 ESM-C
              商业访问付费的动力有限。针对具体药物应用证明可量化性能提升， 是仍未解决的关键留存证据缺口。
