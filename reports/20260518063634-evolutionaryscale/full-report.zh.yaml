      - number: '8.4'
        title: 可比估值组
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的可比组横跨三类：上市 AI 药物发现公司、私有 AI 生物技术同行，以及近期融资交易。由于 EvolutionaryScale 的定位独特——一家收入前蛋白质基础模型 API
              公司，并由全球最大的两家科技公司提供战略云分发——没有完美的单一可比对象。

              上市可比公司中，Absci（NASDAQ:ABSI）按商业模式最接近——纯 AI 生物制剂设计，没有 Phase 2 或临床项目。ABSI 截至 May 2026 市值约 $800M，为一家 AI
              药物创造平台提供了公开市场估值底部；其披露收入为 $2.8M（FY2025），净亏损 $115.2M。 隐含收入倍数极高（约 285x FY2025
              收入），反映市场为平台可选性定价，而不是为近期基本面定价。Recursion Pharmaceuticals （NASDAQ:RXRX）市值约 ~$1.555B，但 Q1 2026 收入只有
              $6.47M，累计亏损 $2.1B；它按拥有管线可选性的临床阶段 AI 平台交易。Schrödinger（NASDAQ:SDGR）市值约
              ~$893M，披露了软件加基于结构的药物发现收入；其倍数更常规，但混合模式不同。

              私有可比公司中，Generate Biomedicines 累计融资约 ~$700M，最近披露估值约 $2.5B——按模态（蛋白质生成式 AI）看最接近。 Xaira Therapeutics 于 April
              2024 以 $1B Series A 启动——当时是有史以来最大的 AI 药物发现 Series A——估值约 ~$1B。Isomorphic Labs（Alphabet 支持）未披露独立估值，但正在与
              Lilly 和 Novartis 进行数十亿美元级合作。Profluent 融资 $44M，Cradle.bio 融资约 ~$73M；两者都服务蛋白质工程用例，但阶段更早、估值低得多。

              若以基础模型平台可比公司并按垂直市场狭窄度调整：Anthropic（约 ~$60B）、Mistral（约 ~$6B）和 Cohere（约 ~$5B） 提供了收入前 AI
              基础模型公开市场情绪的上界。EvolutionaryScale 的 $1.35B 约为 Anthropic 估值的 2–3%，模型质量主张可比，
              但可服务市场窄得多（仅生物）。鉴于总可用市场（TAM）集中，相比横向基础模型打折是合理的；但相较临床阶段 AI 药物发现上市可比公司， 它仍有溢价。
