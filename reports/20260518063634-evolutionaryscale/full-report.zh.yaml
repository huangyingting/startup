        - ESM3 支持蛋白质靶点表征和抗体设计，使 EvolutionaryScale 成为 AI 药物发现工作流的赋能平台
      - - 工业生物技术（相邻非制药）
        - 面向绿色化学、生物燃料、农业、特种材料和食品科学的酶工程
        - 诊断工具、医疗器械、医院 IT、保险平台
        - 工业生物技术 R&D 团队、生物技术制造企业 CTO / 工程副总裁
