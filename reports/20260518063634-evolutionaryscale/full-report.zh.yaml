      - number: '6.5'
        title: 扩张驱动因素与集中度风险
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的扩张轨迹由两股相互竞争的力量塑造。第一股有利：AWS 和 NVIDIA 的战略投资，带来优先渠道位置、 联合营销，以及潜在的优先触达两家公司企业客户网络。NVIDIA
              BioNeMo 声称训练快 2x、推理快 6x，再叠加 ESM 模型集成， 把 EvolutionaryScale 模型放进一个高采用度 GPU 基础设施平台。AWS 将 ESM-C 纳入 SageMaker
              JumpStart， 也让数千家在 AWS 上部署工作负载的生命科学公司更容易发现它。「免费学术层 → Forge API beta → 企业 SageMaker 合同」 这一漏斗在架构上成立。

              第二股不利：EvolutionaryScale 没有披露药企锚定客户，没有落地后扩张案例研究，也没有公开宣布可支持市场标准比较的定价。 Generate Biomedicines 披露了 $1.9B 的
              Amgen 合作；Isomorphic Labs 宣布与 Eli Lilly 和 Novartis 达成交易，潜在里程碑价值合计超过 $3B。EvolutionaryScale
              的前沿蛋白质语言模型在学术资质上或许更强 （Science 论文、98B 参数 ESM3），但相对这些蛋白质 AI 直接竞争对手，商业证明明显更弱。客户集中度风险目前无法衡量——
              没有具名企业客户，技术上客户集中度为零，但这掩盖了更大的风险：一家 27 个月融资 $142M 的公益公司，完全没有企业收入。

              扩张逻辑的结构性风险包括：（1）开放权重 ESM2 替代——很多下游用户用免费的 15B 参数 ESM2 就能得到足够好结果， 不必为 ESM-C 或 ESM3
              商业访问付费；（2）生物安全约束——负责任开发框架和双重用途风险评估（NTI 和 safe.ai 有记录）
              为前沿蛋白质设计模型设置访问门槛提供了正当理由，从而限制可服务商业用户基础；（3）学术开源竞争——AlphaFold3、ESMFold 和 RoseTTAFold 都可免费用于结构预测，把可服务市场压缩到
              ESM3 真正有差异化的生成和多模态推理任务。
