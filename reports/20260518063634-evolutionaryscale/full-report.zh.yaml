  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: ESM 产品组合与模型家族
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 基于 ESM（Evolutionary Scale Modeling）底座，提供两条明确的产品线：ESM3 生成式蛋白质语言模型，以及
              ESM-C（Cambrian）蛋白质向量嵌入家族。两者合计覆盖开放权重和商业 API 两个层级， 共八个模型 SKU。

              ESM3 分为三个权重档位：ESM3-small-2024-08（1.4B 参数）、ESM3-medium-2024-08 （7B 参数）和 ESM3-large-2024-03（98B
              参数）。ESM3-small 是唯一开放权重的 ESM3 变体，通过 HuggingFace 以 esm3-sm-open-v1 形式提供，并适用 Cambrian 非商业许可协议。 ESM3-medium 和
              ESM3-large 属于商业模型，只能通过 Forge API 访问。98B 的 ESM3-large 被用于设计 esmGFP——一种从头生成的荧光蛋白，与最近的天然 GFP 仅有 58%
              序列同一性，相当于约 500 million years 的进化分化，并已由 Science（January 2025）同行评议论文验证。

              ESM-C（Cambrian）是独立的向量嵌入模型家族，包含三个规模：ESMC-300M、ESMC-600M 和 ESMC-6B。 ESMC-300M 与 ESMC-600M 在同一 Cambrian
              非商业许可下开放权重。ESMC-6B 面向学术用户可通过 Forge API 访问，商业部署则通过 AWS SageMaker JumpStart。ESM-C 模型采用带旋转位置嵌入和 SwiGLU 激活的
              Pre-LN transformer 架构；EvolutionaryScale 的基准测试显示，它们在各自规模上达到序列表征模型的最先进水平。

              Forge API（forge.evolutionaryscale.ai）是主要商业变现载体。Forge 于 January 2025 与 Science 论文同步开放公测，通过可经 pip 安装的 Python
              SDK，为 ESM3 和 ESMC 模型家族提供同步和异步 REST API 访问。 SDK 内含面向高吞吐工作负载的批处理执行器。商业 Forge 访问价格未公开披露；学术访问条款可直接通过平台获取。
