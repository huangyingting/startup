      - CR019
      - CR032
      - CR042
  - id: FR003
    title: 监管时间线：生物安全与 AI 政策关键节点
    type: timeline
    layout: wide
    summary: 2022 至 2027 年（预测）期间影响 EvolutionaryScale 的监管节点按时间排列。
    data:
      items:
        - date: '2022-01-01'
          label: BWC 审议大会
          description: 《生物武器公约》第九次审议大会；未加入正式 AI 条款
        - date: '2023-01-26'
          label: NIST AI RMF 1.0 发布
          description: 美国自愿性 AI 风险管理框架发布，涵盖双用途生物风险
        - date: '2023-06-01'
          label: ESM3 首次内部训练
          description: EvolutionaryScale 开始开发 ESM3（根据 2024 年 6 月发布时间线推断）
        - date: '2023-10-30'
          label: EO 14110 签署
          description: 美国关于安全、可靠 AI 的第 14110 号行政令签署——第 4.4 节明确覆盖生物技术与 CBRN 风险
        - date: '2024-06-25'
          label: ESM3 公开发布
          description: EvolutionaryScale 发布 ESM3，并同步推出 Responsible Development Framework；Forge API beta 开放
        - date: '2024-07-12'
          label: EU AI Act 在《欧盟官方公报》发布
          description: 第 2024/1689 号法规刊登于《欧盟官方公报》；12 个月分阶段生效期开始
        - date: '2024-07-26'
          label: NIST GenAI Profile 发布
          description: NIST AI-600-1 生成式 AI 风险管理 Profile 发布，供自愿采用
        - date: '2024-08-01'
          label: EU AI Act 生效
          description: 法案生效；禁止性 AI 条款自 2025 年 2 月起适用
        - date: '2025-01-16'
          label: ESM3 Science 论文发表
          description: ESM3 论文发表于 Science（DOI 10.1126/science.ads0018）
        - date: '2026-08-01'
          label: EU AI Act 全面执行（预测）
          description: 包括高风险义务在内的 EU AI Act 剩余条款预计全部适用
        - date: '2027-01-01'
          label: 美国 BIS AI 生物规则预测（估计）
          description: 若 ANPRM 推动规则制定，BIS 关于 AI 生物风险的潜在最终规则预计在这一时点落地
        - date: '2027-06-01'
          label: 监管清晰窗口（估计）
          description: 蛋白质 LLM 全球政策框架可能趋稳的预期窗口
    approximationNotes: 2026 年及以后监管节点的日期基于典型美欧规则制定节奏估算；实际日期可能不同。
    claimRefs:
      - CR025
      - CR026
      - CR027
      - CR028
      - CR029
  - id: FV001
    title: 建议逻辑流
    type: flow
    layout: standard
    summary: 从创始人履历、平台验证、风险因素与估值锚点，推导至「继续研究」建议及所需催化剂的决策链。
    claimRefs:
      - CV006
      - CV009
      - CV030
      - CV033
    data:
      nodes:
        - id: founder_proof
          label: 创始人领域权威
          detail: Rives / Sercu / Lin / Candido 在 Meta AI FAIR 创建 ESM；2025 年 Science 论文验证技术主张
        - id: platform_proof
          label: 平台与分发验证
          detail: Forge API 接入 AWS SageMaker JumpStart + NVIDIA BioNeMo；ESM3 具备独特多模态能力；ESM-C 在 HuggingFace 下载量超过 6k
        - id: risk_factors
          label: 风险评估
          detail: Forge 收入未披露；ESM2 开源，加上 AlphaFold 3 等免费替代；4 位创始人构成关键人物集中；双用途生物安全压力悬而未决
        - id: valuation_anchor
          label: 估值锚点
          detail: 基准 $1.5–2.5B；牛市情景基于 $50–100M ARR，对应 $3–5B；熊市情景受商品化拖累，对应 $400–800M；当前 Series A 投后估值 $1.35B
        - id: recommendation
          label: 继续研究 / 跟踪
          detail: 证据足以支撑兴趣，但商业化验证不足以买入；中等置信度；高风险
        - id: catalysts
          label: 必要催化剂
          detail: Forge ARR >$10M；披露多家药企客户；毛利率 >60%；Amazon / NVIDIA 收入分成条款
      edges:
        - from: founder_proof
          to: recommendation
          label: 支撑
        - from: platform_proof
          to: recommendation
          label: 支撑
        - from: risk_factors
          to: recommendation
          label: 约束
        - from: valuation_anchor
          to: recommendation
          label: 锚定
        - from: recommendation
          to: catalysts
          label: 取决于
  - id: FV002
    title: 估值对关键驱动因素的敏感性
    type: bar
    layout: wide
    summary: 相对于约 $2.0B 基准情景中位数，EvolutionaryScale 估计企业价值（十亿美元）对单项上行和下行驱动因素的敏感度。
    approximationNotes: 所有数值均为相对于约 $2.0B 基准情景中位数的估计敏感性变化。未获得 Forge 已确认财务数据。区间反映可比公司倍数、ARR 增长情景与 M&A 先例分析。
    claimRefs:
      - CV031
      - CV032
      - CV033
    data:
      items:
        - label: Forge $50–100M ARR（牛市）
          value: 2.5
        - label: 多家药企合同管线获确认
          value: 1.2
        - label: 战略 M&A 溢价（Amazon 或 NVIDIA 收购）
          value: 1
        - label: AWS + NVIDIA 渠道 ARR 放量
          value: 0.8
        - label: 开源 ESM2 侵蚀 API 定价
          value: -0.6
        - label: AlphaFold 3 免费层替代冲击
          value: -0.8
        - label: 联合创始人离职（关键人物溢价坍塌）
          value: -0.9
        - label: 2026 年底仍无 Forge ARR（降估值融资风险）
          value: -1.2
  - id: FV003
    title: 估值情景区间
    type: range
    layout: wide
    summary: 基于情景假设与可比公司基准，熊市、基准、牛市情景下的低至高估值区间（十亿美元）。
    approximationNotes: 区间来自模型，使用可比公司倍数、M&A 先例与 ARR 情景建模。未使用已确认的 Forge 财务数据。区间是有依据的估算，不是精确 DCF 输出。
    claimRefs:
      - CV031
      - CV032
      - CV033
    data:
      items:
        - label: 熊市情景
          low: 0.4
          mid: 0.6
          high: 0.8
          unit: USD billion
        - label: 基准情景
          low: 1.5
          mid: 2
          high: 2.5
          unit: USD billion
        - label: 牛市情景
          low: 3
          mid: 4
          high: 5
          unit: USD billion
  - id: FV004
    title: 投资 KPI 评分卡
    type: kpi
    layout: standard
    summary: 面向 IC 的六维评分：市场验证、平台护城河、商业证据、经济性可见度、风险水平与证据质量。
    claimRefs:
      - CV005
      - CV006
      - CV009
      - CV030
    data:
      items:
        - label: 创始人与科学验证
          value: High — ESM3 in Science 2025; Meta AI FAIR pedigree; unique multimodal architecture
          score: 8
        - label: 平台护城河
          value: High — AWS SageMaker + NVIDIA BioNeMo distribution; unique ESM3 generative capability
          score: 7
        - label: 商业证据
          value: Low — no disclosed Forge ARR, customer count, or gross margin
          score: 2
        - label: 经济性可见度
          value: Very Low — no audited financials; preference stack unknown; no Forge revenue
          score: 1
        - label: 风险水平
          value: High — pre-revenue at $1.35B; key-person concentration; open-source substitutes; dual-use risk
          score: 2
        - label: 证据质量
          value: Constrained — Science paper and GitHub/HuggingFace signals strong; commercial side inaccessible
          score: 4
