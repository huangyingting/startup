      - number: '3.2'
        title: 直接 AI 蛋白质设计同行：详细画像
        blocks:
          - type: paragraph
            body: >
              在直接 AI 蛋白质设计平台同行中，每家公司相对于 EvolutionaryScale 都有不同的商业化模式和差异化策略。


              Profluent Bio（San Francisco，2022）聚焦以蛋白质为中心的 AI，并对 OpenCRISPR 采取公共利益策略，以开放访问形式发布首个 AI 设计的基因编辑器。公司的核心 ProGen
              模型架构面向蛋白质序列生成。Profluent 估计约 ~$44M 的融资基础显著小于 EvolutionaryScale 的 $142M，意味着算力和数据基础设施更有限。


              Cradle.bio（Amsterdam，2021）通过 SaaS 平台差异化，把客户湿实验室数据与自有蛋白质工程模型结合。客户每次上传实验结果，模型都会改进（“models learn with
              you”），形成数据飞轮锁定效应。Cradle 声称客户可将蛋白质开发周期提速 2–12x，并明确采用无版税订阅模式，客户拥有所有生成 IP。公司在 Amsterdam
              运营自有湿实验室，作为概念验证层。Cradle 与 Novonesis 的合作，代表全球最大工业生物技术公司之一把 AI 嵌入创新工作流。平台符合 SOC 2，并支持单点登录。


              Generate Biomedicines（Somerville, MA，2018）是融资最重的直接同行，累计融资超过 $700M。Generate Platform 整合 AI
              模型训练、高通量蛋白表达和迭代学习，覆盖 140,000+ sq ft 实验室空间。公司已测试 42,000+ 种蛋白，形成持续改进的反馈闭环。其领先项目 GB-0895 针对哮喘
              TSLP，从一开始就共同优化更强生物效应和更低给药频率（具备一年两次潜力）。与大型生物制药公司的活跃合作，显示平台级制药验证。


              AbSci Corporation（NASDAQ: ABSI，Vancouver, WA）是唯一上市的直接竞争对手。其 AI Drug Creation Platform 将湿实验室和 AI 整合进 6
              周迭代周期，用于 de novo 生物药（抗体）设计和多参数先导优化。AbSci 的 ABS-201 是一款 AI 设计的抗体，靶向雄激素性脱发中的 prolactin
              receptors，已展示体内毛囊再生效果。FY2025 10-K 于 March 24, 2026 向 SEC 提交，提供私有同行没有的公开披露，但也让 AbSci 暴露在季度收入压力下。


              Adaptyv Bio（Lausanne, Switzerland）定位为 Biopole Life Science Campus
