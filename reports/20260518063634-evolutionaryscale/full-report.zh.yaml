      - number: '2.5'
        title: 规模与采用尽调缺口
        blocks:
          - type: paragraph
            body: >-
              几个实质性证据缺口限制了市场分析精度。第一，针对制药 R&D 中蛋白质语言模型 API
              的可服务市场，尚无独立发布的规模数字。所有蛋白质工程市场估算（$2.2B–$23.59B）都涵盖完整市场，包括试剂、仪器和服务；纯 API / 软件子市场没有在任何可访问的分析师报告中被单独测算。推导 PLM
              API SAM，需要估算蛋白质工程支出中有多大比例可由计算工具捕获——这是高度依赖假设、缺少独立可验证基础的推断。

              第二，EvolutionaryScale 的 Forge API 定价和实际付费订阅数没有公开披露。HuggingFace 下载量（ESM-C 6,320+、ESM3 3,110+）和 PyPI
              安装数显示开发者牵引力，但如果不知道 Forge 转化漏斗和定价结构，就无法转化为付费商业收入。第三，biorxiv 预印本搜索返回 129 篇引用 ESM3/EvolutionaryScale 的论文，ESM3
              Science 论文（DOI: 10.1126/science.ads0018）也被广泛引用；但学术引用影响力不能直接映射到制药商业市场渗透。第四，蛋白质工程市场分析师估算在相邻基准年之间跨度达
              10×（$2.2B 至 $23.59B）；该范围主要由口径差异驱动（仅工具 vs. 仪器 + 试剂 + 服务），不是市场真实分歧，但投资人跨来源比较时若不调整口径，可能得出错误结论。

              为后续章节保留的证据：（a）未识别到付费客户披露——这是 Chapter 4（Business Model）的尽调缺口；（b）Chapter 3（Competitors）应获取相对于 OpenAI
              API、Anthropic API 和 AWS Bedrock 的可比蛋白质 LM API 定价基准；（c）ESM3 商业 Forge API 是否用于任何 IND 提交或监管申报尚未确认——该缺口应在
              Chapter 5（Technology）或 Chapter 7（Regulatory）处理。
