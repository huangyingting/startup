      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: Forge ARR 披露是最重要的投资信号
            body: >-
              截至 May 2026，EvolutionaryScale 的估值逻辑完全处于收入前。Amazon 和 NVIDIA 分发护城河真实且持久，但只有 Forge
              被付费制药客户使用时才会创造价值。没有任何数据点比确认 $10M+ ARR 且披露企业客户数，更能快速把建议从继续研究推向买入。 投资人应把任何 Forge
              商业指标披露视为优先触发事件，并在其发布后立即重评完整估值模型。
            calloutType: recommendation
            claimRefs:
              - CV005
              - CV009
              - CV034
          - type: callout
            title: 开源替代是最核心的悲观风险
            body: >-
              EvolutionaryScale 的悲观情景不是科学失败——ESM3 真实存在且已被验证。悲观风险在商业侧：ESM2（前代模型）完全开源， AlphaFold 3（Google DeepMind）向 300
              万+ 研究人员免费提供蛋白质结构预测。如果研究社区认为这些开源工具足以覆盖大多数蛋白质 AI 任务，Forge 的付费客户基数可能始终很小。投资人应跟踪基于 ESM2 的社区 fork 在 GitHub
              上的采用度，以及 AlphaFold 3 使用情况，把它们作为商业压力的领先指标。
            calloutType: risk
            claimRefs:
              - CV022
              - CV023
              - CV033
          - type: callout
            title: Amazon 与 NVIDIA 共同投资从结构上限制灾难性下行
            body: >-
              虽然 EvolutionaryScale 的悲观情景包含真实的估值重置风险，但 Amazon 和 NVIDIA 共同投资创造了结构性底部。Amazon （把 Forge 集成进 SageMaker
              JumpStart）和 NVIDIA（把 Forge 嵌入 BioNeMo）都不会受益于一笔破坏自身平台战略的困境贱卖。 更可能的悲观结果，是 Amazon 以不低于 $1.35B Series A
              价格进行人才收购，而不是纯粹减记——对追求 $3B+ 回报的投资人仍然痛苦， 但与完全归零显著不同。
            calloutType: insight
            claimRefs:
              - CV003
              - CV009
              - CV034
