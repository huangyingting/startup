      - number: '1.2'
        title: 创始人、领导层与关键人物风险
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale 由四位曾在 Meta AI Research（FAIR）共事的研究员联合创立：Alexander (Alex) Rives、Tom Sercu、Zeming
              Lin、Sanjay Rao。Alex Rives 担任 CEO，是 ESM 蛋白质语言模型谱系的主要架构师；该谱系源于他的学术工作，并在公司拆分前延续到 Meta FAIR。Tom Sercu
              担任联合创始人兼工程副总裁，带领基础设施和工程团队搭建 Andromeda H100 集群。Zeming Lin 与 Sanjay Rao 以技术联合创始人身份参与模型开发和研究。November 2025
              收购后，Alex Rives 出任 Chan Zuckerberg Initiative Head of Science，其余创始团队进入 CZ Biohub
              担任高级研究职务。公司整个创始团队都来自同一雇主（Meta FAIR），形成显著集中风险：团队在文化、方法论和技术假设上高度同质，且没有证据显示创始团队中存在独立董事、AI
              研究圈之外的顾问，或具备商业化生物技术经验的高管。单一雇主来源也加重关键人物依赖；任何一位创始人离开，尤其是 CEO 和技术愿景核心 Rives 离开，都会对公司研究方向和投资人信心产生过大影响。
