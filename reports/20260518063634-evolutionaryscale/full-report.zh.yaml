      - number: '6.3'
        title: 具名部署与集成伙伴
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的具名商业部署和集成证据，主要由三个已确认渠道和一个具名伙伴支撑。第一，AWS SageMaker Marketplace 在 Cambrian Inference
              Clickthrough License Agreement 下列出 ESM-C 模型，可用于商业部署。 GitHub README 给出明确部署说明：需要管理员级 AWS 访问权限，通过 SageMaker
              Marketplace 订阅，并基于 CloudFormation 启动，耗时 15–25 分钟。GPU 成本直接计入订阅者的 AWS 账户。这是一条可验证的商业部署路径， 但订阅用户数未披露。

              第二，截至 December 2024，NVIDIA BioNeMo 将 ESM-C 列为即将上线的集成。NVIDIA BioNeMo 面向药物发现、 分子设计、虚拟筛选和蛋白质结合剂设计场景，正好匹配
              ESM-C 的预期商业应用。NVIDIA 也是 EvolutionaryScale 战略投资人（Series A 参与方），对深度集成有结构性激励。Series A 公告（BusinessWire）和
              NVIDIA 关于种子投资的专门新闻稿， 都确认了 NVIDIA 的投资人关系。

              第三，Adaptyv Bio——位于瑞士 Lausanne 的 Biopole Life Science Campus 的一家蛋白质工程公司——已确认为具名 ESM 生态伙伴。Adaptyv Bio
              聚焦蛋白质设计，与 ESM 模型能力直接对齐。该合作关系反映出小型且成长中的生物技术客户群： 它们可以使用开放权重或 API 访问，而不承担大型药企的采购开销。

              第四，Forge API 公开 beta（January 2025 上线）构成商业平台的客户证明，尽管注册用户规模和付费转化未披露。 EvolutionaryScale GitHub ESM partner
              仓库（evolutionaryscale/esm-partner，标注为「用于合作伙伴协作的仓库」） 暗示 Adaptyv Bio 之外还有正式合作伙伴管线，但没有公开具名其他伙伴。

              重要的是，早期 ESM 家族（ESM1b、ESM2）已有企业用户记录：BioNTech 和 InstaDeep 在 COVID 刺突蛋白 上微调 ESM 模型，创建变体早期预警系统，标记全部 16 个 WHO
              关注变体；Hie et al. 用 ESM1v/ESM1b 进化抗体； Shanker et al. 用 ESM-IF1 针对 SARS-CoV-2 做抗体进化。这些企业和学术用户的历史用例验证了 ESM
              家族的实用性， 但并不构成 EvolutionaryScale 当前付费产品的商业客户。
