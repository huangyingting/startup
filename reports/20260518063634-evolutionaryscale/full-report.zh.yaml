      - number: '4.2'
        title: 成本结构、毛利率驱动因素与资本强度
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale 的成本结构由三类主导：研究人员、模型训练 GPU 算力，以及 Forge API 推理基础设施。公司训练 ESM3 消耗超过 10^24
              FLOPs——按公司博客说法，高于此前任何生物模型——运行在其称为 “one of the highest throughput GPU clusters in the world today”
              的集群上。按当时云端 GPU 价格（H100 每 GPU-hour $2–5）估算，单次训练成本约 $10–50 million，成为主导性资本开支。

              人员成本受员工数限制：LinkedIn 显示公司处于 11-50 人区间，峰值可能约 25-50 FTE。按每名 FTE $200,000–$300,000 的综合全成本（San Francisco AI
              研究人才的常规水平）计算，年度人员烧钱约 $5–15 million。Forge API 的持续推理成本会随 API 调用量增加而形成可变成本——98B 参数 ESM3 的蛋白质生成单次查询计算成本很高。

              API 推理业务的毛利率，很大程度取决于公司自营 GPU 集群（资本密集、长期毛利更高）还是租用云算力（capex 更低、COGS 更高）。公司未披露毛利率数据。正向信号是 Amazon 领投 Series
              A：AWS 可能在交易结构中提供了可观的实物云抵扣，实质性降低近期基础设施成本。ESM2 模型在 HuggingFace 上开源，给向量嵌入市场建立了永久竞争成本底线，这是 ESM Cambrian
              商业层的结构性毛利压缩风险。 [CI011][CI012][CI013][CI014][CI015][CI016][CI017]
