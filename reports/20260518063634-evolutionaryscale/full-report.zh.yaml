            body: >-
              EvolutionaryScale 的公开财务记录几乎为空。作为私营公司，EvolutionaryScale 不需要向 SEC 提交财务报表； Form D
              文件缺失，又进一步压缩了公开监管渠道可验证的信息。已审阅的公开来源中，没有任何一个披露以下关键指标： 实际收入、年经常性收入（ARR）、毛利率、客户数、流失率、现金余额或确认后的月度烧钱速度。Crunchbase
              将 $142M Series A 错误归为「种子投资」，说明私募市场数据聚合器并不适合做可验证的财务分析。

              CZI 交易之后，财务尽调现在必须穿透到 CZI Biohub——一家由 Chan Zuckerberg Initiative 支持的非营利机构。 尽调路径因此被根本改写：问题不再是标准 VC
              财务尽调，而是（1）CZI 交易条款，以及前投资人和股东拿到了什么； （2）CZI 体系下 Forge API 与 ESM 模型家族的持续运营状态和商业化策略；（3）是否还有任何残留商业实体 （持有 IP 的
              EvolutionaryScale 实体）继续独立运营。所有未完成的财务分析，都需要查看 CZI Biohub 内部文件和任何交易披露。 [CI033][CI034][CI035][CI036]
