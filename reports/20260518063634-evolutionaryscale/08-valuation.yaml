callouts:
  - calloutType: recommendation
    title: "Forge ARR Disclosure Is the Single Most Important Investment Signal"
    body: >-
      EvolutionaryScale's valuation case is entirely pre-revenue as of May 2026. The
      Amazon and NVIDIA distribution moat is real and durable, but it creates value only
      if Forge is being used by paying pharma customers. No data point would move the
      recommendation from Research-More to Buy faster than a confirmed ARR figure of
      $10M+ with disclosed enterprise customer counts. Investors should treat any company
      disclosure of Forge commercial metrics as a priority trigger event and re-evaluate
      the full valuation model immediately upon its release.
    claimRefs:
      - CV005
      - CV009
      - CV034

  - calloutType: risk
    title: "Open-Source Substitution Is the Defining Bear Risk"
    body: >-
      The bear case for EvolutionaryScale is not a scientific failure—ESM3 is real and
      validated. The bear risk is commercial: ESM2 (the predecessor) is fully open-source,
      and AlphaFold 3 (Google DeepMind) provides free protein structure prediction to 3M+
      researchers. If the research community treats these open-source tools as sufficiently
      capable for most protein AI tasks, Forge's paying customer base may remain small.
      Investors should monitor GitHub adoption of ESM2-based community forks and AlphaFold 3
      usage as leading indicators of commercial pressure.
    claimRefs:
      - CV022
      - CV023
      - CV033

  - calloutType: insight
    title: "Amazon and NVIDIA Co-Investment Structurally Limits Catastrophic Downside"
    body: >-
      While EvolutionaryScale's bear case reflects real valuation reset risk, the
      Amazon and NVIDIA co-investment creates a structural floor. Neither Amazon (which
      integrates Forge into SageMaker JumpStart) nor NVIDIA (which embeds Forge into
      BioNeMo) would benefit from a distressed fire-sale that undermines their own
      platform strategies. The more likely bear-case outcome is an acqui-hire by Amazon
      at or above the $1.35B Series A price rather than a pure write-down—still painful
      for investors seeking $3B+ returns, but meaningfully different from a complete
      loss scenario.
    claimRefs:
      - CV003
      - CV009
      - CV034

