        - "Company IR; financial data room; AWS compute cost benchmarks as proxy"
      - - "Amazon and NVIDIA partnership financial terms"
        - "Revenue share percentage, exclusivity provisions, minimum commitment volumes, and term length for the AWS SageMaker JumpStart and NVIDIA BioNeMo distribution agreements"
        - "If Amazon or NVIDIA take >40% of Forge gross revenue as channel fee, EvolutionaryScale's net economics may not support independent platform value; exclusivity terms determine ability to self-serve"
        - "Series B data room; M&A data room request; NVIDIA and AWS partner program filings"
      - - "ESM IP chain of title from Meta"
        - "Any IP transfer, license, or assignment agreement between Meta Platforms and EvolutionaryScale founders covering ESM model architecture, training code, or data pipeline"
        - "Without confirmed IP clean chain, acquirers or pharma partners face IP litigation risk; Amazon or pharma due diligence will require clean title"
        - "Company legal disclosure; patent search (USPTO); co-founder employment agreement review"
      - - "Biosecurity and dual-use screening protocols"
        - "Customer screening process, access controls for high-risk requests (pathogen-related proteins), and compliance with NIH Dual Use Research of Concern (DURC) policies"
        - "Biosecurity regulatory action could restrict Forge distribution to non-US markets or force API feature removal; governance transparency is a pre-condition for pharma partnership"
        - "EvolutionaryScale responsible development blog; DURC policy review; US DoD/BARDA contractor relationship check"
      - - "Cap table and preference stack"
        - "Series A liquidation preference multiple, anti-dilution provisions, total preferred share outstanding, and estimated diluted share count post-Series A"
        - "Common equity value below the $1.35B headline depends critically on the preference stack; 2x liquidation preference or participating preferred can significantly reduce common equity value at moderate exit prices"
        - "Series B data room; VC legal counsel review; Delaware secretary of state certificate of incorporation"
    claimRefs:
      - CV005
      - CV009
      - CV034
      - CV037
    notes: >-
      All six diligence asks are blockers for a buy recommendation. Forge ARR is the
      highest-priority item; without it, no valuation confidence above the current Series A
      anchor is possible. IP and biosecurity items are pre-conditions for institutional
      pharma partnerships and any M&A transaction.

