  - id: capital-adequacy-and-czi-transaction
    title: Capital Adequacy and the CZI Biohub Transaction
    body: >-
      EvolutionaryScale's capital trajectory was: seed round (~$3M, late 2023) followed by a
      $142M Series A on September 26, 2024 (announced simultaneously by CNBC, Axios, and
      NVIDIA). The Series A was led by Amazon and NVIDIA with co-investment from Lux Capital,
      Nat Friedman, and Daniel Gross at a reported ~$1.35B post-money valuation. Total capital
      raised was approximately $145M.

      At an estimated burn rate of $5–15M per month (based on headcount + compute + overhead),
      the $142M Series A provided a theoretical runway of 9–28 months from the September 2024
      close. The actual runway ended in November 2025—only approximately 14 months after the
      Series A closed—when the EvolutionaryScale team joined CZI Biohub. Alex Rives,
      co-founder and chief scientist, became Head of Science at CZI Biohub. The transaction
      terms were not disclosed, and no SEC filings triggered by the transaction (e.g., a Form D
      amendment, Hart-Scott-Rodino disclosure, or acquisition notice) have been located in
      EDGAR or other public regulatory databases.

      The financial implications for the $142M Series A investors (Amazon, NVIDIA, Lux Capital,
      and angels) are unclear. If the CZI/Biohub transaction was a cash acquisition of the
      entity, investors would have received a distribution. If it was a talent acquisition
      (acqui-hire) without entity purchase, the $142M capital would have been substantially
      consumed by the time of the transaction—leaving investors with limited recovery. The
      absence of any public deal-value disclosure makes this risk assessment open-ended.

      A notable financial compliance gap was identified during research: no Form D filings
      appear in SEC EDGAR under any name variant for EvolutionaryScale (searches conducted for
      "EvolutionaryScale," "Evolutionary Scale," "Evolutionary Scale Inc," and by key person
      "Alexander Rives"). Private companies raising $142M via Regulation D exemptions are
      typically required to file Form D with the SEC within 15 days of the first sale. The
      absence of any Form D is either an indicator of filing under a different legal entity
      name, use of an alternate securities exemption (e.g., Regulation S for offshore
      investors), or a filing gap. [CI018][CI019][CI020][CI021][CI022][CI023][CI024][CI025][CI026][CI027][CI028]
