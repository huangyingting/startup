  - id: cost-structure-and-margins
    title: Cost Structure, Gross Margin Drivers, and Capital Intensity
    body: >-
      EvolutionaryScale's cost structure was dominated by three categories: research personnel,
      GPU compute for model training, and inference infrastructure for the Forge API. The
      company trained ESM3 using over 10^24 FLOPs—more compute than any prior biological model
      per the company's own blog—on what it described as "one of the highest throughput GPU
      clusters in the world today." This single training run would have cost an estimated
      $10–50 million at prevailing cloud GPU rates (H100 at $2–5 per GPU-hour), making it a
      dominant capital expense.

      Personnel costs were limited by headcount: LinkedIn shows the company in the 11-50
      employee bracket, suggesting approximately 25-50 FTE at peak. At a blended all-in cost
      of $200,000–$300,000 per FTE (standard for San Francisco AI research talent), annual
      personnel burn was approximately $5–15 million per year. Ongoing inference costs for
      the Forge API would add a variable component scaling with API call volume—protein
      generation with ESM3 at 98B parameters is computationally expensive per query.

      Gross margins for an API inference business depend heavily on whether the company
      operated its own GPU cluster (capital-intensive, higher long-run margins) versus renting
      cloud compute (lower capex, higher COGS). No gross margin figures were disclosed. A
      positive indicator was Amazon's lead investment in the Series A: AWS may have provided
      substantial in-kind cloud credits as part of the deal structure, materially reducing
      near-term infrastructure costs. The ESM2 model's open-source availability on HuggingFace
      represents a permanent competitive cost floor for the embeddings market, which is a
      structural margin-compression risk for the ESM Cambrian commercial tier. [CI011][CI012][CI013][CI014][CI015][CI016][CI017]
    claimRefs:
      - CI011
