  - id: peer-benchmarks-and-positioning
    title: Peer Capital Benchmarks and Positioning
    body: >-
      EvolutionaryScale's $142M Series A and $1.35B valuation sit at the mid-upper range
      of protein AI fundraising activity, above pure infrastructure plays like Profluent
      (~$44M) and Cradle (~$73M), but well below full-stack drug discovery AI companies such
      as Generate:Biomedicines (~$700M+) and Xaira Therapeutics ($1B at founding). The
      $1.35B valuation implied a significant premium for a pre-revenue, foundation-model
      protein AI company with fewer than 50 employees.

      On a capital-per-head basis, EvolutionaryScale was exceptionally capital-intensive at
      approximately $3–6M raised per employee—reflecting the cost of world-class AI research
      talent and compute-heavy model development rather than a scaled commercial operation.
      By contrast, publicly traded AI drug discovery companies (AbSci, Recursion) have far
      larger employee bases relative to capital raised, diluted across clinical and
      manufacturing operations. The peer comparison underscores that EvolutionaryScale was
      structured as a frontier research vehicle, not a scaled commercial enterprise, at the
      time of its Series A—raising questions about the commercial revenue ramp hypothesis
      embedded in the $1.35B valuation. [CI029][CI030][CI031][CI032]
    claimRefs:
      - CI029
      - CI030
      - CI031
      - CI032
