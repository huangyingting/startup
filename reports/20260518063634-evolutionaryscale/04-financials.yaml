callouts:
  - calloutType: risk
    title: "CZI acqui-hire terminates standalone commercial path"
    body: >-
      The November 2025 CZI Biohub transaction is the dominant financial risk signal in this
      report. A $142M Series A raised just 14 months earlier at $1.35B valuation ended with
      the entire team absorbed by a nonprofit before any revenue metrics were disclosed.
      Whether investors received a return—and how much—remains undisclosed.
    claimRefs:
      - CI022
      - CI023
      - CI034
      - CI035

  - calloutType: risk
    title: "SEC Form D filing gap is unexplained"
    body: >-
      No Form D filing was found in SEC EDGAR under any EvolutionaryScale name variant across
      multiple searches. A $142M Regulation D exempt offering is legally required to file
      Form D within 15 days of first sale. The absence either means filing under an undetected
      legal entity name or a compliance gap that adds regulatory risk.
    claimRefs:
      - CI026
      - CI027
      - CI028

  - calloutType: insight
    title: "Amazon's lead investment suggests in-kind cloud subsidy"
    body: >-
      Amazon led the $142M Series A as a strategic investor for AWS cloud consumption. It is
      standard in such deals for the cloud provider to offer in-kind compute credits as a
      structural incentive. If applied, this would significantly reduce EvolutionaryScale's
      cash infrastructure spend, compressing the effective burn rate and extending the
      theoretical runway beyond naive headcount-plus-compute estimates.
    claimRefs:
      - CI019
      - CI015
      - CI016

  - calloutType: assumption
    title: "Crunchbase data quality warning"
    body: >-
      Crunchbase incorrectly labels EvolutionaryScale's $142M Series A as a "seed investment
      round" in its AI-generated summary, illustrating the unreliability of AI-generated
      private-market data summaries. All funding facts in this chapter are sourced from
      primary news reports (CNBC, Axios, MIT Tech Review, NVIDIA) that directly covered
      the announcement.
    claimRefs:
      - CI033

acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      Bloomberg article (https://www.bloomberg.com/news/articles/2024-09-26/evolutionaryscale-raises-142-million-from-amazon-nvidia)
      returned HTTP 403 at fetch time (Cloudflare rate-limited). The URL is cited only to
      document that Bloomberg covered the Series A and access was blocked; no content from
      this source is used in any claim. The financial facts it would have covered are
      independently confirmed via CNBC, Axios, and NVIDIA official announcements.

