    - type: private-evidence-only
      severity: material
      topic: forge-api-commercial
      missingEvidence: >-
        Forge API pricing tiers, current commercial customer list, estimated ARR or revenue
        range, and API uptime/SLA terms are not publicly disclosed.
      whyItMatters: >-
        Without public pricing or customer metrics, it is impossible to assess the commercial
        traction of the Forge API or the revenue model supporting EvolutionaryScale's / CZI
        Biohub's operating costs. This is a blocking diligence issue for any investor or
        partner seeking to evaluate commercial viability.
      diligencePath: >-
        Request directly from EvolutionaryScale / CZI Biohub: (1) Forge API pricing sheet;
        (2) current Forge customer count and industry breakdown; (3) estimated ARR or monthly
        revenue range; (4) SLA terms and historical uptime; (5) any commercial partnership
        agreements beyond AWS and NVIDIA.
