company:
  name: EvolutionaryScale

chapter:
  number: 5
  title: "Product & Technology"
  summary: >-
    EvolutionaryScale's ESM3 is a 98-billion-parameter multimodal generative protein language
    model trained on 2.78 billion proteins (771 billion unique tokens, 1.07×10²⁴ FLOPs) that
    jointly reasons over protein sequence, structure, and function using a three-track masked
    language modeling architecture. The flagship proof of concept — esmGFP, a novel fluorescent
    protein with only 58% sequence identity to the nearest known natural GFP, representing
    approximately 500 million years of evolutionary divergence — was published in Science (Hayes
    et al., January 2025, Vol 387, pp. 850-858, 341 citations). The companion ESM-C (Cambrian)
    embedding family (300M/600M/6B) extends the portfolio with strong sequence representation
    models. Open weights for ESM3-small and ESMC-300M/600M are available under the Cambrian
    Non-Commercial License; commercial access runs through the Forge API (forge.evolutionaryscale.ai)
    and AWS SageMaker, with NVIDIA BioNeMo NIM integration in progress. EvolutionaryScale joined
    CZI Biohub in November 2025, transitioning from an independent Series A startup to a Biohub
    research group; the Forge API and open-weight models remain active as of the report date, and
    CZI Biohub has announced a 10,000-GPU compute expansion by 2028. Key product risks include
    closed commercial pricing, no disclosed customer contracts, binding-prediction performance
    degradation under heterogeneous structural inputs (per a December 2024 BioRxiv adversarial
    study), and organizational dependency on the CZI Biohub transition.

sections:
  - id: product-catalog
    title: "ESM Product Portfolio and Model Family"
    body: >-
      EvolutionaryScale offers two distinct product lines built on the ESM (Evolutionary Scale
      Modeling) foundation: the ESM3 generative protein language model and the ESM-C (Cambrian)
      protein embedding family. Together they span eight model SKUs across open-weight and
      commercial-API tiers.

      ESM3 is offered in three weight classes: ESM3-small-2024-08 (1.4 billion parameters),
      ESM3-medium-2024-08 (7 billion parameters), and ESM3-large-2024-03 (98 billion parameters).
      ESM3-small is the only ESM3 variant with open weights, available under the Cambrian
      Non-Commercial License Agreement via HuggingFace (as esm3-sm-open-v1). ESM3-medium and
      ESM3-large are commercial and accessible exclusively through the Forge API. The 98B ESM3-large
      is the model used to design esmGFP — a de novo fluorescent protein exhibiting only 58%
      sequence identity to the nearest natural GFP, representing approximately 500 million years
      of equivalent evolutionary divergence and validated by peer-reviewed publication in Science
      (January 2025).

      ESM-C (Cambrian) is a separate embedding-focused model family with three sizes: ESMC-300M,
      ESMC-600M, and ESMC-6B. ESMC-300M and ESMC-600M carry open weights under the same Cambrian
      Non-Commercial License. ESMC-6B is accessible via the Forge API for academic users and via
      AWS SageMaker JumpStart for commercial deployments. ESM-C models use a Pre-LN transformer
      architecture with rotary positional embeddings and SwiGLU activations and were benchmarked
      by EvolutionaryScale as state-of-the-art sequence representation models at their respective
      scales.

      The Forge API (forge.evolutionaryscale.ai) is the primary commercial monetization vehicle.
      Opened to public beta in January 2025 concurrent with the Science publication, Forge provides
      synchronous and asynchronous REST API access to the ESM3 and ESMC model family with a Python
      SDK available via pip. A batch executor for high-throughput workloads is included in the
      SDK. Pricing for commercial Forge access is not publicly disclosed; academic access terms
      are available directly through the platform.
