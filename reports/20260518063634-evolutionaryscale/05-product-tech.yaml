  - id: roadmap-trust
    title: "Product Roadmap, CZI Biohub Transition, and Responsible Development"
    body: >-
      EvolutionaryScale raised a $142 million Series A in September 2024 led by Lux Capital,
      with participation from Amazon and NVIDIA, following an earlier seed investment from
      NVIDIA. In November 2025, the company's team joined CZI Biohub as part of a major
      "Frontier AI & Biology" initiative announced by the Chan Zuckerberg Initiative. Under this
      transition, co-founder and chief scientist Alex Rives became head of science at Biohub,
      and the EvolutionaryScale research team was integrated into Biohub's combined team of
      biological scientists, AI engineers, and technologists. CZI Biohub has announced a compute
      expansion to 10,000 GPUs by 2028 to support this initiative.

      As of the May 2026 report date, the Forge API and open-weight model distributions remain
      operational. EvolutionaryScale's public benefit company (PBC) charter and the Cambrian
      Non-Commercial License on open weights encode a commitment to research access while
      reserving commercial capabilities for the Forge API revenue model.

      Key trust and safety dimensions require diligence attention. The dual-use risk of generative
      protein design — including potential misuse for pathogen engineering — is an industry-wide
      concern. EvolutionaryScale addresses this through the non-commercial license restriction on
      open weights and access controls on the Forge API, but has not publicly documented a
      biosecurity screening policy or independent biosafety audit. An independent BioRxiv
      preprint published in December 2024 found that ESM3's binding prediction performance
      deteriorates when distinct, per-variant relaxed protein structures are used as inputs,
      compared to using a single consistent structure as the backbone — a "More Structure, Less
      Accuracy" paradox that diligence teams should investigate for deployment scenarios involving
      heterogeneous structural inputs. Data retention policies for sequences submitted to the
      Forge API have not been publicly disclosed, which may be a compliance concern for enterprise
      customers in regulated industries. No SEC Form D filings were found for EvolutionaryScale,
      consistent with its status as a privately held company.
