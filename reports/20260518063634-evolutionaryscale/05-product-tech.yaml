  - id: technical-architecture
    title: "Technical Architecture: Multitrack Transformer, Training Scale, and Tokenization"
    body: >-
      ESM3's defining architectural innovation is its multitrack transformer design: the model
      processes three parallel token sequences — amino acid sequence tokens, structure tokens
      (encoding 3D coordinates), and function annotation tokens (keyword-based GO term labels) —
      within a unified transformer framework. Each track uses discrete tokenization. Structure
      coordinates are encoded via a vector quantized variational autoencoder (VQVAE) into a
      finite codebook of structural tokens, enabling the model to natively read and generate
      three-dimensional protein structure without requiring continuous coordinate regression.

      Pre-training uses a masked language modeling (MLM) objective applied across all three
      tracks simultaneously, allowing the model to learn joint representations that span the
      sequence-structure-function space. The 98-billion-parameter ESM3-large model was trained
      using 1.07×10²⁴ floating-point operations on approximately 2.78 billion protein sequences
      (771 billion unique tokens), trained on the Andromeda HPC cluster using NVIDIA H100 GPUs
      and Quantum-2 InfiniBand networking. NVIDIA reports that ESM3-large uses approximately
      25× more FLOPs and 60× more data than its predecessor ESM2. Reinforcement learning from
      human feedback (RLHF) was applied to ESM3-large to align outputs with human preferences
      for protein design tasks.

      ESM-C (Cambrian) employs a different architectural profile: a Pre-Layer Normalization (Pre-LN)
      transformer with rotary positional embeddings (RoPE) and SwiGLU feed-forward activations,
      pre-trained with masked language modeling. ESMC-300M (30 layers, hidden width 960) was
      trained on 1.26×10²² FLOPs; ESMC-600M (36 layers, width 1152) on 2.17×10²² FLOPs; and
      ESMC-6B (80 layers, width 2560) on 2.37×10²³ FLOPs. Training data spans three large
      sequence databases: UniRef (83 million clusters), MGnify (372 million), and JGI metagenomics
      (2 billion clusters), all clustered at 70% sequence identity.

      EvolutionaryScale's internal infrastructure capabilities are illustrated by the open-source
      DeepEP library, a custom CUDA/NCCL implementation of Mixture-of-Experts Expert Parallelism
      communication for H800 GPUs. With 1,253 GitHub stars, DeepEP signals active HPC engineering
      capability at the company, supporting large-scale distributed training and inference.
