        evolutionary scales raise legitimate biosecurity concerns regarding potential misuse
        for pathogen engineering. Absence of a public biosecurity policy is a material gap
        for institutional investors, government customers, and regulated industry partners.
      diligencePath: >-
        Request from EvolutionaryScale / CZI Biohub: (1) biosecurity policy and Forge API
        access controls; (2) any third-party biosafety review commissioned; (3) engagement
