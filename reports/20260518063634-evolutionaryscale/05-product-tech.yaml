figures:
  - id: FE001
    title: "Product architecture map"
    type: stack
    layout: standard
    summary: "Five-layer architecture of EvolutionaryScale's ESM protein AI platform from training data through deployment."
    data:
      layers:
        - label: "Data Layer"
          detail: "2.78B protein sequences (771B unique tokens); UniRef 83M clusters; MGnify 372M; JGI metagenomics 2B clusters @ 70% identity; PDB 3D structures; GO function annotations"
        - label: "Tokenization Layer"
          detail: "Track 1 — Amino acid sequence tokens | Track 2 — VQVAE discrete structure tokens (3D backbone → codebook) | Track 3 — Function keyword tokens (GO annotations)"
        - label: "Model Layer"
          detail: "ESM3 multitrack transformer (1.4B / 7B / 98B params; RLHF-aligned large) | ESMC Pre-LN transformer (300M / 600M / 6B params; RoPE + SwiGLU) | DeepEP MoE EP library (HPC infrastructure)"
        - label: "Product / Access Layer"
