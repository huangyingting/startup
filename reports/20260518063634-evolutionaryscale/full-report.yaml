      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >-
              The primary commercial buyer for EvolutionaryScale's Forge API is the large and mid-tier pharmaceutical or
              biotech company with an active computational biology or protein engineering program. The economic buyer is
              typically a VP of Computational Biology, Director of Drug Discovery, or Chief Scientific Officer, with
              procurement authority delegated through R&D and IT budgets. The technical champion—who evaluates model
              capabilities and advocates for adoption—is the computational biologist, structural biologist, or machine
              learning scientist embedded in discovery teams. Finance and procurement officers act as formal payers,
              requiring ROI justification via reduction in wet-lab screening cycles or accelerated lead identification
              timelines.

              The Forge commercial API targets enterprise customers needing large-scale protein sequence generation and
              embedding with guaranteed availability and compliance. AWS SageMaker JumpStart and NVIDIA BioNeMo serve as
              secondary commercial channels, reaching pharma customers already embedded in those cloud ecosystems.
              Academic and government research labs represent a high-volume but non-revenue user segment that downloads
              ESM-C open weights under MIT license from HuggingFace (6,320+ downloads) and installs via the PyPI `esm`
              package—building community mindshare that feeds commercial pipeline.

              Industrial biotechnology companies—engineering enzymes for green chemistry, agriculture, and specialty
              materials—represent a materially different buyer segment with shorter product development cycles and lower
              regulatory burden. Contract research organizations offer a dual role: potential buyers of protein LM APIs
              to enhance their service offerings, and potential channel partners who resell compute-enabled protein
              engineering services to pharma clients. Biotech startups at the Series A–B stage represent an emerging
              paid segment: they have computational infrastructure but lack the internal resources to train frontier
              protein LMs, making Forge API access economically rational.
