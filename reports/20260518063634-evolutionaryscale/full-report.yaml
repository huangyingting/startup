  - id: FU001
    title: 'Customer Journey Map: Academic Discovery to Enterprise Deployment'
    type: journey-map
    layout: standard
    summary: >-
      EvolutionaryScale's customer journey from open-weight academic discovery through Forge API trial to commercial
      cloud deployment and potential enterprise pharma engagement.
    data:
      nodes:
        - label: Open-Weight Discovery
          description: >-
            Researcher downloads ESM3-open (1.4B) or ESM-C open weights from GitHub or HuggingFace. Zero friction — no
            API key, no account required. This tier drives 3.1k ESM3 downloads and 7.8k ESM-C downloads, and generates
            129+ bioRxiv preprints and 32 academic papers as downstream proof.
        - label: Forge API Beta Evaluation
          description: >-
            Academic or commercial builder applies for Forge API token to access ESM3 at larger scale (7B, 98B) or ESM-C
            6B. Free limited-time beta launched January 2025. Commercial developer begins building application using the
            same Python SDK interface as local and SageMaker deployments.
        - label: SageMaker Commercial Deployment
          description: >-
            Enterprise or commercial biotech subscribes to ESM-C on AWS SageMaker Marketplace. Subscription is
            self-service; CloudFormation deploys a dedicated GPU endpoint in the customer's own AWS environment in 15–25
            minutes. Billed directly to customer's AWS account. No EvolutionaryScale account or Forge token needed.
        - label: NVIDIA BioNeMo Integration (Planned)
          description: >-
            Enterprise customer accesses ESM models through NVIDIA BioNeMo platform for drug discovery workflows. NVIDIA
            BioNeMo targets protein binder design, virtual screening, and molecular design use cases. Integration
            announced December 2024; live status unverified as of May 2026.
        - label: Pharma Enterprise Partnership (Target)
          description: >-
            Large pharma R&D team signs enterprise-level collaboration agreement for multimodal protein generation using
            ESM3 frontier models. This stage has no confirmed instance as of May 2026. Comparable companies (Generate
            Biomedicines, Isomorphic Labs) have reached this stage; EvolutionaryScale has not publicly disclosed any
            such deal.
    approximationNotes: >-
      Journey stages are inferred from documented access mechanisms and competitive market norms. Stage transition rates
      (conversion from open-weight to API to enterprise) are entirely unknown. The pharma enterprise stage is a
      hypothesized destination, not a confirmed outcome.
