      - number: '5.3'
        title: 'Deployment and Ecosystem: Forge API, AWS, NVIDIA, and Community'
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale has built a multi-tier distribution strategy combining open-weight community adoption
              with commercial API and cloud-marketplace access.

              The Forge API (forge.evolutionaryscale.ai), opened to public beta in January 2025, is the primary
              programmatic interface for ESM3 and ESMC commercial use. The official Python client (pip install
              evoscale-sdk) is hosted at github.com/evolutionaryscale/esm and provides both synchronous inference and
              asynchronous batch execution. As of May 2026, the Forge API portal is accessible and operational, though
              detailed pricing is not publicly listed.

              AWS SageMaker JumpStart provides commercial deployment of ESMC-6B via a CloudFormation stack that
              provisions a dedicated GPU instance in 15-25 minutes. This integration, documented in the esm-sagemaker
              GitHub repository, targets enterprise bioinformatics customers needing large-scale embedding workflows
              with predictable SLAs. Amazon was a co-investor in EvolutionaryScale's Series A and is a deployment
              partner.

              NVIDIA announced ESM3 integration into its BioNeMo NIM platform for GPU-optimized inference when ESM3 was
              first released in June 2024; EvolutionaryScale's ESM-C blog (December 2024) lists BioNeMo as a forthcoming
              distribution channel. The NVIDIA NGC catalog separately lists ESM3 as a resource.

              On GitHub, EvolutionaryScale maintains nine public repositories. Beyond the flagship esm repository,
              notable community-facing projects include DeepEP (1,253 stars), a NCCL fork, a Hugging Face transformers
              fork, and a Mamba implementation. The HuggingFace organization (huggingface.co/evolutionaryscale) hosts
              open-weight model cards, with the esm3-sm-open-v1 model page showing 3,105 downloads in the prior month
              and 291 likes; ESMC-300M shows 6,320 downloads and ESMC-600M shows 1,490 downloads. These metrics indicate
              meaningful adoption within the research community.
