      - number: '2.5'
        title: Sizing and Adoption Diligence Gaps
        blocks:
          - type: paragraph
            body: >-
              Several material evidence gaps limit the precision of the market analysis. First, no independently
              published serviceable addressable market figure exists for protein language model APIs within
              pharmaceutical R&D specifically. All protein engineering market estimates ($2.2B–$23.59B) encompass the
              full market including reagents, instruments, and services; the pure API/software sub-segment has not been
              sized in any accessible analyst report. Deriving a PLM API SAM requires analytical estimates of what
              fraction of protein engineering spend is addressable by computational tools—an assumption-heavy inference
              without independently verifiable basis.

              Second, EvolutionaryScale's Forge API pricing and actual paid subscriber count have not been publicly
              disclosed. HuggingFace downloads (6,320+ ESM-C, 3,110+ ESM3) and PyPI install counts indicate developer
              traction, but do not translate to paid commercial revenue without knowledge of the Forge conversion funnel
              and pricing structure. Third, the biorxiv preprint search returned 129 papers citing
              ESM3/EvolutionaryScale, and the ESM3 Science paper (DOI: 10.1126/science.ads0018) has been cited
              extensively—but academic citation impact does not directly map to commercial market penetration in pharma.
              Fourth, analyst estimates for the protein engineering market span a 10× range ($2.2B to $23.59B) for
              adjacent base years; this range is primarily driven by scope differences (tools-only vs.
              instruments+reagents+services) rather than genuine market disagreement, but investors comparing across
              sources without scope adjustment may reach erroneous conclusions.

