  - id: TV006
    title: Thesis-break and kill triggers
    columns:
      - Trigger
      - Threshold and Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - No Forge ARR disclosed by year-end 2026
        - >-
          EvolutionaryScale has not disclosed any ARR, enterprise customer count, or pricing data by Q4 2026—three years
          post-founding
        - >-
          Confirms the commercial thesis is entirely speculative; eliminates revenue multiple basis for any valuation
          above raised capital; signals possible acqui-hire risk
        - >-
          Downgrade to avoid; seek direct company IR meeting for ARR confirmation before any additional capital
          commitment
      - - Co-founder departure (any of Rives, Sercu, Lin, Candido)
        - >-
          Public announcement or confirmed LinkedIn departure of any of the four co-founders from an active role at
          EvolutionaryScale
        - >-
          Destroys the founder-domain-authority pillar; raises immediate questions about IP continuity, team morale, and
          Amazon/NVIDIA partner confidence
        - >-
          Immediate reassessment; reduce position; require explanation of IP assignment and non-compete status before
          any thesis upgrade
      - - Open-source protein generative model parity
        - >-
          Any open-source protein language model released with comparable ESM3 multimodal generative capability and
          broad community adoption (>10k GitHub stars within 6 months)
        - >-
          Eliminates Forge API's technical differentiation; commoditizes the $1.35B valuation anchor; shifts pricing
          power to infrastructure (AWS/NVIDIA) away from EvolutionaryScale
        - >-
          Reassess valuation toward bear case; evaluate whether AWS/NVIDIA distribution advantage alone sustains $800M+
          valuation
      - - Amazon acqui-hire or hostile pricing change
        - >-
          Amazon makes an offer to acquire EvolutionaryScale at a sub-$1B valuation, or AWS changes Forge pricing terms
          to capture economics directly
        - >-
          Reveals that Amazon views EvolutionaryScale as an infrastructure component rather than an independent
          platform, driving a valuation reset
        - >-
          Evaluate acqui-hire premium vs. long-term independence path; model fair value as AWS feature vs. standalone
          platform
    claimRefs:
      - CV005
      - CV022
      - CV023
      - CV029
      - CV033
      - CV037
    notes: >-
      Kill triggers are binary or threshold events; monitoring requires: regular EvolutionaryScale blog/press release
      checks; LinkedIn tracking for co-founder activity; GitHub protein model repository monitoring; AWS Partner Network
      announcements.
  - id: TV007
    title: Final diligence asks
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner and Diligence Path
    rows:
      - - Forge ARR and customer count
        - >-
          Annual recurring revenue, enterprise customer count, and customer names (at least category-level) for the
          Forge API platform as of Q2 2026
        - >-
          No valuation model above Series A entry is defensible without revenue confirmation; ARR is the primary
          commercial thesis validation metric
        - >-
          Company IR; AWS Marketplace listing data; LinkedIn job postings referencing customer-facing roles; Series B
          fundraise data room
      - - Forge gross margin
        - >-
          Cost of revenue for Forge API (GPU compute cost per API call, infrastructure cost, personnel allocated); gross
          margin percentage
        - >-
          Gross margin determines whether Forge can scale to a high-value SaaS business (>70% GM) or is structurally a
          low-margin compute resale business
        - Company IR; financial data room; AWS compute cost benchmarks as proxy
      - - Amazon and NVIDIA partnership financial terms
        - >-
          Revenue share percentage, exclusivity provisions, minimum commitment volumes, and term length for the AWS
          SageMaker JumpStart and NVIDIA BioNeMo distribution agreements
        - >-
          If Amazon or NVIDIA take >40% of Forge gross revenue as channel fee, EvolutionaryScale's net economics may not
          support independent platform value; exclusivity terms determine ability to self-serve
        - Series B data room; M&A data room request; NVIDIA and AWS partner program filings
      - - ESM IP chain of title from Meta
        - >-
          Any IP transfer, license, or assignment agreement between Meta Platforms and EvolutionaryScale founders
          covering ESM model architecture, training code, or data pipeline
        - >-
          Without confirmed IP clean chain, acquirers or pharma partners face IP litigation risk; Amazon or pharma due
          diligence will require clean title
        - Company legal disclosure; patent search (USPTO); co-founder employment agreement review
      - - Biosecurity and dual-use screening protocols
        - >-
          Customer screening process, access controls for high-risk requests (pathogen-related proteins), and compliance
          with NIH Dual Use Research of Concern (DURC) policies
        - >-
          Biosecurity regulatory action could restrict Forge distribution to non-US markets or force API feature
          removal; governance transparency is a pre-condition for pharma partnership
        - EvolutionaryScale responsible development blog; DURC policy review; US DoD/BARDA contractor relationship check
      - - Cap table and preference stack
        - >-
          Series A liquidation preference multiple, anti-dilution provisions, total preferred share outstanding, and
          estimated diluted share count post-Series A
        - >-
          Common equity value below the $1.35B headline depends critically on the preference stack; 2x liquidation
          preference or participating preferred can significantly reduce common equity value at moderate exit prices
        - Series B data room; VC legal counsel review; Delaware secretary of state certificate of incorporation
    claimRefs:
      - CV005
      - CV009
      - CV034
      - CV037
    notes: >-
      All six diligence asks are blockers for a buy recommendation. Forge ARR is the highest-priority item; without it,
      no valuation confidence above the current Series A anchor is possible. IP and biosecurity items are pre-conditions
      for institutional pharma partnerships and any M&A transaction.
