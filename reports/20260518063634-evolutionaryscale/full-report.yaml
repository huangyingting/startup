      - number: '8.5'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale's most likely near-term exit paths are: (1) strategic acquisition by Amazon (acqui-hire
              or full buyout to embed Forge into AWS AI Services) or NVIDIA (to deepen BioNeMo's differentiable protein
              design capability); (2) a pharma acquisition by a major drug company seeking a protein AI platform
              (AstraZeneca, Pfizer, Genentech, Novartis) once ARR demonstrates commercial product-market fit; (3) a
              Series B or Series C at $2B+ if Forge hits $25M+ ARR with multi-pharma customers; or (4) an IPO after
              reaching $50M+ ARR with >60% gross margin—likely not before 2028 at the earliest.

              The Amazon structural investor relationship substantially reduces bear case probability: an AWS-backed
              company with Forge deployed on SageMaker JumpStart would need an actively hostile Amazon decision to face
              a catastrophic down-round. However, the same Amazon relationship creates exit path concentration: if
              Amazon is the likely acquirer, secondary investors must accept M&A pricing discipline that may not
              maximize valuation for non-strategic investors.

              Five diligence asks are critical before a buy recommendation can be issued: (1) Forge ARR and customer
              count as of Q2 2026; (2) gross margin on Forge API revenue; (3) revenue share and exclusivity terms in the
              Amazon and NVIDIA partnerships; (4) ESM2/ESM3 IP transfer agreement with Meta Platforms (if any)
              confirming clear IP chain of title; (5) biosecurity and dual-use customer screening protocols. Until these
              five items are confirmed, valuation confidence remains MEDIUM and the recommendation remains Research-More
              / Track.
            claimRefs:
              - CV005
