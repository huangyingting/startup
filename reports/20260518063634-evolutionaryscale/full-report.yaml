      - number: '6.2'
        title: Adoption Trajectory and Open-Access Usage
        blocks:
          - type: paragraph
            body: >-
              The clearest and most objectively measurable adoption signals come from open-access channels. On
              HuggingFace, the biohub/esm3-sm-open-v1 model (the 1.4B open-weight version of ESM3) had approximately
              3,110 downloads with 291 likes as of the research date; the biohub/esmc-300m-2024-12 model had
              approximately 6,320 downloads and 30 likes; and biohub/esmc-600m-2024-12 had approximately 1,490 downloads
              and 32 likes. Total ESM-C family downloads across the two open models sum to approximately 7,810 as of May
              2026. The ESM-C models were updated as recently as two days before the research cache date, indicating
              active maintenance. These download counts likely under-represent actual usage because many academic users
              clone the GitHub repository or access model weights via the official esm Python package rather than
              through the HuggingFace hub directly.

              On GitHub, the evolutionaryscale/esm repository is the primary open-source distribution channel. The
              organization maintains nine or more repositories including derivative technical infrastructure (DeepEP
              with 1,253 stars, NCCL fork with 1,270 stars), model weights, and the esm-partner repository explicitly
              labeled for partner collaborations. Active commit history through March–May 2026 demonstrates sustained
              development activity.

              Academic citation evidence is robust: a Semantic Scholar API search returned 32 papers building on ESM3 as
              of May 2026, and a bioRxiv search for "evolutionaryscale ESM3" returned 129 preprint results. Named
              downstream applications include MegSite (nucleic acid binding residue prediction), ProteinReasoner
              (multi-modal protein language model with chain-of-thought reasoning), iNClassSec-ESM (non-classical
              secreted protein discovery), and affinity peptide design for chromatographic purification — spanning
              academic, clinical, and industrial applications. The ESM3 Science paper (published January 16, 2025, DOI
              10.1126/science.ads0018) provides authoritative academic reception and serves as a credibility anchor for
              commercial conversations.
