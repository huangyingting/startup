disclaimer: >-
  EvolutionaryScale ceased to operate as an independent for-profit entity on November 6, 2025, when its team was
  absorbed into CZ Biohub under the Chan Zuckerberg Initiative. This report is therefore primarily a historical /
  forensic diligence on a defunct standalone investment thesis; the present-day investable surface is the CZI / CZ
  Biohub network, which is non-profit and not on offer to outside investors. All financial figures (valuation, raise,
  headcount, downloads) are sourced from third-party reports as no SEC filings or audited disclosures exist; acquisition
  terms are undisclosed. The recommendation reflects unavailability of a forward-looking standalone equity instrument,
  not a judgment on the underlying science.
