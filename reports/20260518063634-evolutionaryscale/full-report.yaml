  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Universe and Category Segmentation
        blocks:
          - type: paragraph
            body: |
              EvolutionaryScale competes at the intersection of protein language modeling, generative
              biology, and AI-enabled drug discovery. The competitive universe divides into four segments.

              The first and most direct segment is AI protein design platform peers: companies that build
              and commercialize foundation models specifically for protein engineering and design.
              Profluent Bio (San Francisco, ~$44M raised) uses ProGen-derived models and produced
              OpenCRISPR—described on its website as the world's first AI-designed gene editor.
              Cradle.bio (Amsterdam, ~$73M raised) offers a SaaS protein engineering platform that
              integrates proprietary wet-lab data cycles with customer data, claiming 2–12x faster
              development timelines; it counts Novonesis (formerly Novozymes) among its customers.
              Generate Biomedicines (Somerville, MA, ~$700M+ raised) operates the Generate Platform—a
              continuously trained generative biology loop that has generated, built, and tested over
              42,000 proteins across 140,000+ sq ft of lab space—with active major-pharma partnerships.
              AbSci Corporation (NASDAQ: ABSI; Vancouver, WA) is the only publicly traded direct peer,
              with an AI Drug Creation Platform for de novo antibody design using 6-week iterative cycles
              and a FY2025 10-K filed with the SEC in March 2026. Adaptyv Bio (Lausanne, Switzerland)
              positions as a cloud lab for protein designers at the Biopole Life Science Campus.

              The second segment comprises foundation-model and broader bio-AI peers. Isomorphic Labs
              (London, Alphabet subsidiary) holds the exclusive commercial license to AlphaFold 3 for
              drug discovery, following the joint Google DeepMind announcement in May 2024, and signed
              landmark deals with Eli Lilly and Novartis in early 2024. Chai Discovery (San Francisco)
              released Chai-1 as an open model and is advancing Chai-2 for drug-like de novo antibody
              design with atomic precision. Xaira Therapeutics (San Francisco, ~$1B raised at launch in
              April 2024) is building predictive and agentic AI models across the complete drug discovery
              spectrum. Iambic Therapeutics uses Enchant and NeuralPLexer AI technologies and has
              Phase 1b data for IAM1363 (HER2 inhibitor). Inceptive (Palo Alto/Berlin/Zurich, founded
              2021) specializes in RNA/mRNA/siRNA/ASO/peptide foundation models.

              The third segment includes AI drug-discovery integrators. Insilico Medicine (HKEX: 3696)
              has the most advanced clinical proof among AI-first companies, having completed a Phase 2
              trial with ISM001-055 (TNIK inhibitor for IPF). Recursion Pharmaceuticals (NASDAQ: RXRX)
              acquired Exscientia and operates over 50 petabytes of phenomics data with BioHive-2
              (built with NVIDIA). Schrödinger (NASDAQ: SDGR) is the dominant physics-based platform
              with 30+ years of R&D and FEP+, WaterMap, and LiveDesign tools.

              The fourth segment covers academic and open-source actors. The Institute for Protein
              Design (Baker Lab, UW)—whose co-director David Baker shared the 2024 Nobel Prize in
              Chemistry—distributes RFdiffusion and RoseTTAFold as free open-source tools and has
              a royalty-free COVID-19 vaccine approved in the UK and South Korea. Google DeepMind
              makes AlphaFold 3 available via AlphaFold Server (free, non-commercial) and the
              EMBL-EBI AlphaFold DB (200M+ structures, CC-BY-4.0). The most adversarially important
              open-source threat is Meta's ESM model family (ESM2, ESMFold)—created by Alexander Rives,
              Zeming Lin, Tom Sercu, and Salvatore Candido, the exact same individuals who founded
              EvolutionaryScale—and released under an MIT license, establishing a commoditization
              floor for basic protein language modeling.
