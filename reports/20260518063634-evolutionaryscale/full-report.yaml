      - number: '1.3'
        title: Funding History, Valuation, and Capital Structure
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale raised capital in two known rounds prior to its absorption into CZI. The first was a
              seed round announced simultaneously with the ESM3 public launch on June 25, 2024. NVIDIA and Amazon both
              participated in the seed round alongside Lux Capital, Nat Friedman, and Daniel Gross. The exact seed
              amount was not publicly disclosed, though NVIDIA announced its participation separately. The Series A
              followed rapidly: on September 26, 2024, EvolutionaryScale announced a $142M Series A co-led by Amazon and
              NVIDIA, with continued participation from Lux Capital, Nat Friedman, and Daniel Gross, at an implied
              post-money valuation of approximately $1.35B. This closed only three months after the ESM3 launch and
              represented one of the largest AI biology funding rounds of 2024. Notably, no SEC Form D filings were
              found in EDGAR under any variant of "EvolutionaryScale" for the 2024 to 2026 period. Bloomberg reported on
              the Series A but the article is behind a paywall, preventing public verification of full deal terms,
              investor rights, and any secondary components. Total confirmed capital raised is $142M plus an undisclosed
              seed amount. No commercial revenue, debt facilities, or secondaries are on public record. The company's
              capital structure at the time of the CZI acquisition remains private.
