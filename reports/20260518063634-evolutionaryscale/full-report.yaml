      - number: '2.2'
        title: Market Sizing and Analyst Estimates
        blocks:
          - type: paragraph
            body: >-
              Published estimates for the protein engineering market vary considerably based on scope definition.
              MarketsandMarkets estimates the market at $2.2B (2019) growing to $3.9B by 2024 at a 12.4% CAGR—a narrower
              estimate that focuses on protein engineering tools and services. Precedence Research takes a broader
              scope, estimating the market at $5.09B in 2025 growing to $23.59B by 2035 at 16.57% CAGR, incorporating a
              wider set of protein engineering applications including industrial enzymes and biopharmaceuticals. Allied
              Market Research estimates $2.2B in 2022 growing to $7.7B by 2032 at 13.2% CAGR. Grand View Research
              estimates $2.60B in 2023 growing to $7.62B by 2030 at 16.24% CAGR. The directional consensus is
              clear—mid-teen percentage annual growth for over a decade—but the $2.2B vs. $5.09B base discrepancy
              reflects scope inconsistency, not contradictory evidence.

              The adjacent AI drug discovery market (Grand View Research) is estimated at $2.35B in 2025 growing to
              $13.77B by 2033 at 24.8% CAGR—a materially faster growth rate than protein engineering tools alone,
              reflecting the pull from large-pharma AI investment post-AlphaFold. The broader drug discovery market (all
              modalities) is estimated at $71.89B in 2025 growing to $158.74B by 2034 at 9.2% CAGR (Precedence
              Research), serving as the outer TAM reference. EvolutionaryScale's serviceable addressable market is the
              sub-segment of protein engineering tools customers who (a) have computational biology infrastructure, (b)
              are adopting AI-native tools rather than traditional bioinformatics, and (c) have compute scale justifying
              a paid API subscription over self-hosting open weights.

              EvolutionaryScale's current serviceable obtainable market includes: Forge API subscription revenue from
              biopharma and biotech customers; commercial model access via AWS SageMaker JumpStart and NVIDIA BioNeMo;
              and enterprise licensing for ESM3 and ESM-C deployment in regulated settings. The company raised $142M in
              Series A funding (Crunchbase), indicating investor validation of the market opportunity, though no
              independent SOM figure for PLM APIs within pharmaceutical R&D has been published. This is a material
              diligence gap documented in the sizing-gaps section. HuggingFace download metrics (6,320+ for ESM-C,
              3,110+ for ESM3) and 129+ bioRxiv citations provide proxies for user adoption rather than commercial
              revenue traction.
