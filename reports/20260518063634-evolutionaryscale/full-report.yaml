  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: ESM Product Portfolio and Model Family
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale offers two distinct product lines built on the ESM (Evolutionary Scale Modeling)
              foundation: the ESM3 generative protein language model and the ESM-C (Cambrian) protein embedding family.
              Together they span eight model SKUs across open-weight and commercial-API tiers.

              ESM3 is offered in three weight classes: ESM3-small-2024-08 (1.4 billion parameters), ESM3-medium-2024-08
              (7 billion parameters), and ESM3-large-2024-03 (98 billion parameters). ESM3-small is the only ESM3
              variant with open weights, available under the Cambrian Non-Commercial License Agreement via HuggingFace
              (as esm3-sm-open-v1). ESM3-medium and ESM3-large are commercial and accessible exclusively through the
              Forge API. The 98B ESM3-large is the model used to design esmGFP — a de novo fluorescent protein
              exhibiting only 58% sequence identity to the nearest natural GFP, representing approximately 500 million
              years of equivalent evolutionary divergence and validated by peer-reviewed publication in Science (January
              2025).

              ESM-C (Cambrian) is a separate embedding-focused model family with three sizes: ESMC-300M, ESMC-600M, and
              ESMC-6B. ESMC-300M and ESMC-600M carry open weights under the same Cambrian Non-Commercial License.
              ESMC-6B is accessible via the Forge API for academic users and via AWS SageMaker JumpStart for commercial
              deployments. ESM-C models use a Pre-LN transformer architecture with rotary positional embeddings and
              SwiGLU activations and were benchmarked by EvolutionaryScale as state-of-the-art sequence representation
              models at their respective scales.

              The Forge API (forge.evolutionaryscale.ai) is the primary commercial monetization vehicle. Opened to
              public beta in January 2025 concurrent with the Science publication, Forge provides synchronous and
              asynchronous REST API access to the ESM3 and ESMC model family with a Python SDK available via pip. A
              batch executor for high-throughput workloads is included in the SDK. Pricing for commercial Forge access
              is not publicly disclosed; academic access terms are available directly through the platform.
