      - number: '7.2'
        title: Technical Risks
        blocks:
          - type: paragraph
            body: >-
              ESM3's performance depends on the quality of its training distribution. The model is trained across 2.78
              billion protein sequences but the natural diversity of functional proteins in novel families — e.g.,
              non-ribosomally synthesised peptides, novel enzyme scaffolds, or fully de novo folds — may lie far outside
              this distribution. Protein language models can "hallucinate" high-confidence sequences that do not fold or
              function as predicted; wet-lab validation is required before any ESM3-generated sequence can be used
              therapeutically or industrially. This creates a latency risk: customers pay for Forge API calls but must
              still run expensive lab validation before generating commercial value, weakening the economic argument for
              premium pricing relative to open alternatives.

              Benchmark saturation is a near-term technical risk. ESM3-98B was the state-of-the-art on CASP15 monomer
              prediction at launch, but Chai-1 (Apache 2.0, free) already reports Cα LDDT of 0.849 vs ESM3-98B's 0.801
              and a 77% vs 76% PoseBusters success rate, approaching parity with commercial models in structure
              prediction. AlphaFold 3 and its open database (200 M+ structures including protein complexes as of March
              2026) continuously expand free coverage. Baker Lab's RFdiffusion (Nature 2023) is freely available for
              binder design. These open tools reduce the marginal value of Forge's API-gated access.

              ESM3's training is initialised from Meta's ESM2 weights. Meta retains IP on the ESM2 model family under
              the terms of its own model card and the GitHub repository for facebookresearch/esm. ESM3 represents a
              substantial architectural and training advance beyond ESM2, but any residual IP claim from Meta on the
              ancestor weights could constrain EvolutionaryScale's ability to commercialise the 98B model or sublicense
              weights. The company has filed patents on aspects of its work (disclosed in the ESM3 biorxiv preprint
              competing interest statement), but the full patent portfolio and its relationship to Meta's prior art
              remain undisclosed.

              Compute dependency on NVIDIA (H100/H200 clusters) and Amazon (AWS) is a double-edged risk: both entities
              are investors and channel partners but could theoretically restrict access or deprioritise workloads. GPU
              supply constraints could delay model training or API scaling, particularly given that ESM3 was trained at
              1×10²⁴ FLOPs — one of the largest compute investments for any biological model at launch.
