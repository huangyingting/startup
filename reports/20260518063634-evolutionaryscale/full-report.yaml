  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Biosecurity and Dual-Use Risk
        blocks:
          - type: paragraph
            body: >-
              Biosecurity risk is the most existential dimension of the EvolutionaryScale thesis. ESM3 can generate
              functional proteins at sequence distances that "represent 500 million years of evolution" from any known
              natural protein, as demonstrated by esmGFP. The same generative capability that enables drug discovery
              could, in principle, be directed at enhancing pathogen virulence, generating novel toxins, or engineering
              biological agents outside the known sequence space monitored by surveillance systems. A 2023 MIT study
              published on arXiv (Sandbrink & Shulman, 2306.03809) showed that large language models could, in a
              one-hour session, identify potential pandemic pathogens, synthesis routes, and CRO partners for
              non-scientists with no laboratory training. While that study focused on general-purpose LLMs rather than
              protein-specific models, the concern is directly analogous: protein language models lower the barrier to
              designing functional biological agents.

              US Executive Order 14110 (October 30, 2023) explicitly singles out biotechnology as a national-security AI
              risk domain, mandating evaluations of AI systems that might lower barriers to creating biological,
              chemical, nuclear, or radiological weapons with mass-casualty potential. The NIST AI Risk Management
              Framework (AI RMF 1.0, released January 2023; updated Generative AI Profile July 2024) provides voluntary
              guidance for identifying and managing these risks. The EU AI Act (Regulation 2024/1689, OJ 12 July 2024)
              includes dual-use bio-related AI in its high-risk scope under Annex III and related provisions.

              EvolutionaryScale has published a Responsible Development Framework with four core tenets: communicate
              benefits and risks, rigorously evaluate models before deployment, adopt guardrails, and engage government
              and civil society. ESM Cambrian's launch blog states that "ESM C was reviewed by a committee of scientific
              experts who concluded that the benefits of releasing the models greatly outweigh any potential risks."
              However, the canonical Responsible Development Framework URL (/blog/responsible-development) returned a
              404 error at access date (2026-05-18), indicating the framework document may not be publicly accessible,
              which itself is a transparency risk. No independent third-party verification of EvolutionaryScale's model
              safety evaluations has been publicly disclosed.

              The Biological Weapons Convention (BWC, 1972, 189 parties as of May 2025) prohibits development and
              stockpiling of biological weapons but has no formal verification regime and no mechanism specifically
              addressing AI-designed proteins. The Center for AI Safety's 2023 statement — signed by Hinton, Bengio, and
              others — identifies pandemic- class bio risk from AI as one of the top extinction-level concerns. The
              Johns Hopkins Center for Health Security focuses explicitly on AI-biosecurity intersection as a core
              research area. Industry self-regulation via responsible AI bio frameworks (Anthropic's RSP, OpenAI's
              safety commitments) is nascent and not binding on third parties like EvolutionaryScale.
            claimRefs:
