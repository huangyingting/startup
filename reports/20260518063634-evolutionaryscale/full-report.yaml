      - number: '3.3'
        title: Pricing, Packaging, and Distribution Comparison
        blocks:
          - type: paragraph
            body: |
              Pricing models across the AI protein design landscape reflect fundamentally different
              go-to-market philosophies. EvolutionaryScale offers Forge, a commercial API platform
              for ESM3 and ESMC access, with public beta announced in early 2025. The ESM3 small
              model (open) and ESMC (300M/600M) are available freely on HuggingFace for non-commercial
              and research use, while larger models and generative API access require Forge accounts.

              Cradle.bio explicitly positions as a software subscription ("no royalties, just a
              software subscription fee"), where customers retain all generated IP and their
              experimental data is never used to train models for others. This SaaS stickiness
              contrasts with EvolutionaryScale's usage-based API model.

              Meta's ESM2 is MIT-licensed and freely available on GitHub and HuggingFace for all
              uses including commercial, at zero cost. ESMFold structure prediction is similarly
              open. DeepMind's AlphaFold DB (200M+ structures) is CC-BY-4.0 for any use;
              AlphaFold Server is free for non-commercial research. Commercial AF3 use in drug
              discovery routes through Isomorphic Labs' exclusive licensing arrangements with pharma.

              Generate Biomedicines and AbSci both operate B2B partnership-and-licensing models
              with pharma majors rather than self-service APIs. Neither offers a public pricing
              page or developer API. Baker Lab/IPD tools (RFdiffusion, RoseTTAFold) and OpenFold
              are entirely free under permissive licenses.

              Key diligence gap: Forge enterprise list pricing, volume tiers, and realized
              per-call costs are not publicly disclosed. Isomorphic Labs' deal economics with
              Lilly and Novartis are reported but not publicly broken down.
