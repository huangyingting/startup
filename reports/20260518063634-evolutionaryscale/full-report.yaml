      - number: '7.4'
        title: Regulatory Landscape
        blocks:
          - type: paragraph
            body: >-
              The regulatory environment for AI-designed proteins is nascent and fragmented. No jurisdiction has issued
              a specific rule governing commercial deployment of generative protein language models. The US, EU, and UK
              are each developing frameworks that could apply to EvolutionaryScale's products under different risk
              classifications.

              In the US, EO 14110 (October 30, 2023) requires developers of dual-use foundation models above defined
              thresholds to report safety evaluations to the government, with specific attention to "biosecurity,
              cybersecurity, and critical infrastructure" risks. The NIST AI RMF (January 2023) and its Generative AI
              Profile (July 2024) provide voluntary guidance. The FDA regulates AI/ML-enabled medical devices via its
              Software as a Medical Device (SaMD) framework and 2024 AI/ML action plan, but this applies only to
              diagnostic or treatment-decision AI, not pure discovery-stage protein design tools. The BIS (Bureau of
              Industry and Security) has begun examining export-control frameworks for AI models that could be used in
              biological weapons contexts, though no specific rule governing protein language models has been finalised.

              In the EU, the AI Act (Regulation 2024/1689, effective August 2024; most provisions apply from August
              2026) classifies AI systems with potential for dual-use biological harm in its high-risk or prohibited
              categories depending on application. Dual-use API access to ESM3 could require conformity assessments,
              transparency obligations, and human oversight measures once the Act's provisions are fully enforced.

              UK biosafety review is ongoing under the Biosecurity Strategy and AI Safety Institute framework, which
              evaluates biological risks from AI in collaboration with the US and international partners. The Biological
              Weapons Convention (signed and ratified by 189 states) prohibits development and production of biological
              weapons but contains no AI-specific language and lacks a formal verification mechanism.

              The regulatory tail risk is asymmetric: new binding rules (mandatory safety evaluations, export controls,
              access restrictions) could impose compliance costs, limit international distribution, or require model
              redactions — any of which would impair Forge's commercial model without precedent for the duration or
              severity of such restrictions.
