  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale's customer base is best understood as four access tiers, each with a different buyer
              profile, access mechanism, and evidence depth. The largest and best-evidenced tier is academic and
              independent researchers, who access open-weight ESM3 (1.4B, non-commercial license) and ESM-C (300M and
              600M, open weights) directly via GitHub and HuggingFace. These users are predominantly computational
              biologists, structural biologists, and bioinformaticians at universities, research institutes, and
              government labs. Their use cases include protein sequence representation, structure prediction
              fine-tuning, functional annotation, antibody design, and downstream model development. No revenue is
              generated from open-weight users; they represent a top-of-funnel signal for commercial conversion.

              The second tier comprises commercial cloud platform users reaching ESM models through Amazon Web Services
              SageMaker Marketplace (ESM-C models available for commercial deployment) and NVIDIA BioNeMo (listed as
              upcoming). These buyers are typically bioinformatics and computational biology teams at pharmaceutical and
              biotech companies who prefer cloud-native, infrastructure- managed model deployment over direct API
              subscriptions. AWS and NVIDIA are channel partners, not end customers; the actual enterprise buyers are
              their downstream clients. Subscriber counts and deployment metrics are not publicly disclosed.

              The third tier is Forge API beta users. As of January 2025, EvolutionaryScale opened a free limited-time
              public beta of the Forge API, providing access to ESM3 and ESM-C models at scale. The Forge API targets
              academic scientists and commercial builders who need inference beyond the 1.4B open model. Commercial
              pricing for Forge post-beta has not been publicly announced. API enrollment requires an access token; no
              user count has been disclosed.

              The fourth tier — large pharma R&D buyers paying for enterprise platform access — is the highest-value
              segment but has the weakest publicly available evidence. Adaptyv Bio (a protein engineering company based
              in Lausanne, Switzerland) has been confirmed as a named ESM ecosystem partner. No Pfizer, Eli Lilly,
              Novartis, Roche, or other top-20 global pharma deal has been publicly announced, creating a material
              commercial proof gap relative to peers Generate Biomedicines and Isomorphic Labs.
