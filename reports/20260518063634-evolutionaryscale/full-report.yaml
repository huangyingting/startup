chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Headquarters, and Business Model
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale, Inc. was an early-stage AI biology company headquartered in San Francisco, California,
              incorporated in 2023 and operationally active from approximately March 2024. The company's stated mission
              was to use large generative models to decode the language of protein sequences, treating proteins as text
              encoding billions of years of biological evolution, and apply that understanding to design novel proteins
              with programmable functions. Its primary commercial offering was the Forge API platform
              (forge.evolutionaryscale.ai), a developer-facing service providing programmatic access to the ESM3 and ESM
              Cambrian (ESM-C) model families. The intended revenue model was a software-as-a-service API subscription
              and usage-based pricing for biotechnology, pharmaceutical, and synthetic biology customers seeking to
              accelerate protein engineering. The company also released the open-weights ESM3 model (esm3-sm-open-v1)
              for non-commercial academic use via Hugging Face, building a developer community alongside the commercial
              offering. As of November 2025, EvolutionaryScale ceased to operate as an independent entity when its full
              team was absorbed into CZ Biohub under the Chan Zuckerberg Initiative, marking the end of its path as a
              standalone commercial company. No revenue, ARR, or paying customer counts were ever publicly disclosed by
              the company during its independent existence.
