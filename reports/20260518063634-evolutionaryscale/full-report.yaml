  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale's addressable market has two interconnected layers. The primary layer is the protein
              language model (PLM) API and platform market—cloud-hosted or on-premise AI models that enable protein
              engineers to generate, predict, and optimize protein sequences and structures without exhaustive wet-lab
              directed evolution. This market is distinct from general cloud compute, traditional bioinformatics
              pipelines, genomic sequencing platforms, medical imaging AI, or clinical trial management software. The
              secondary layer comprises the broader protein engineering research tools market, which encompasses all
              reagents, instruments, and software used in recombinant protein research and design—a larger addressable
              segment into which PLM APIs fit as a high-growth AI sub-category.

              Status-quo substitutes for protein LM platforms include: (1) AlphaFold2/3 (Google DeepMind) for protein
              structure prediction—freely available for non-commercial use via a public database of over 200 million
              predicted structures; (2) Rosetta and PyRosetta (University of Washington) for computational protein
              design—open-source but computationally intensive and requiring significant expertise; (3) directed
              evolution in wet lab (iterative random mutagenesis and screening)—expensive, slow (weeks per cycle), and
              throughput-limited; and (4) traditional molecular dynamics and homology modeling software (GROMACS,
              MODELLER, Schrödinger Maestro)—established tools for structure-guided design without generative
              capability. ESM3 and ESM-C differentiate from these substitutes by jointly reasoning over protein
              sequence, structure, and function within a single unified generative model.

              Adjacent markets include the AI drug discovery platform market (all computational tools accelerating
              small-molecule and biologic drug design), which Grand View Research estimates at $2.35B in 2025 growing to
              $13.77B by 2033 at 24.8% CAGR. Industrial biotechnology— enzyme engineering for green chemistry,
              agriculture, and biomaterials—represents a further adjacency with distinct procurement patterns and lower
              regulatory burden than pharmaceutical applications. The outer boundary is the global drug discovery market
              ($71.89B in 2025 per Precedence Research), which includes all modalities and services, well beyond
              EvolutionaryScale's direct footprint.
