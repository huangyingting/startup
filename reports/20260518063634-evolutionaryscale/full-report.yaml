          - type: paragraph
            body: >-
              The public financial record for EvolutionaryScale is near-empty. As a private company, EvolutionaryScale
              was not required to file financial statements with the SEC. The absence of Form D filings further limits
              what can be verified through public regulatory channels. None of the following key metrics are available
              in any public source reviewed: actual revenue, ARR, gross margin, customer count, churn rate, cash
              position, or confirmed monthly burn rate. Crunchbase misclassifies the $142M Series A as a "seed
              investment," which illustrates the unreliability of private-market data aggregators for verified financial
              analysis.

              Post-CZI transaction, financial diligence must now flow through CZI Biohub, a nonprofit supported by the
              Chan Zuckerberg Initiative. This fundamentally changes the diligence path: rather than standard VC
              financial due diligence, the relevant inquiry becomes (1) the terms of the CZI transaction and what was
              paid to former investors and shareholders, (2) the ongoing operational status and commercialization
              strategy for the Forge API and ESM model family under CZI, and (3) whether any residual commercial entity
              (EvolutionaryScale entity holding IP) continues to operate independently. All outstanding financial
