      - number: '8.4'
        title: Comparable Valuation Set
        blocks:
          - type: paragraph
            body: >-
              The comparable set for EvolutionaryScale spans three categories: public AI drug discovery companies,
              private AI biotech peers, and recent financing transactions. No perfect single comparable exists, given
              EvolutionaryScale's unique position as a pre-revenue protein foundation-model API company with strategic
              cloud distribution from two of the world's largest technology companies.

              Among public comps, Absci (NASDAQ:ABSI) is the closest direct analog by business model—pure-play AI
              biologics design with no Phase 2 or clinical programs. ABSI's market cap of approximately $800M as of May
              2026 provides a public floor valuation for an AI drug creation platform with disclosed revenue of $2.8M
              (FY2025) and a net loss of $115.2M. The implied revenue multiple is extreme (~285x FY2025 revenue) and
              reflects market pricing for platform optionality, not near-term fundamentals. Recursion Pharmaceuticals
              (NASDAQ:RXRX) has a market cap of ~$1.555B but generated only $6.47M Q1 2026 revenue, with an accumulated
              deficit of $2.1B; it trades as a clinical-stage AI platform with pipeline optionality. Schrödinger
              (NASDAQ:SDGR) has a market cap of ~$893M with disclosed software plus structure-based drug discovery
              revenue; its multiple is more conventional but its hybrid model differs.

              Among private comps, Generate Biomedicines has raised ~$700M total with a last reported valuation around
              $2.5B—the closest comparable by modality (protein generative AI). Xaira Therapeutics launched with $1B in
              Series A funding in April 2024—the largest AI drug discovery Series A ever at that time—at a ~$1B
              valuation. Isomorphic Labs (Alphabet-backed) has undisclosed standalone valuation but is active in
              multi-billion collaboration deals with Lilly and Novartis. Profluent raised $44M, Cradle.bio raised ~$73M;
              both serve protein engineering use cases at earlier stage and substantially lower valuation.

              For foundation-model platform comparables adjusted for vertical narrowness: Anthropic (~$60B), Mistral
              (~$6B), and Cohere (~$5B) provide upper-bound public market sentiment for pre-revenue AI foundation
              models. EvolutionaryScale's $1.35B is approximately 2-3% of Anthropic's valuation with comparable
              model-quality claims but dramatically narrower addressable market (biology only). The implied discount to
              horizontal foundation models is appropriate given TAM concentration, but still represents a premium to
              clinical-stage AI drug discovery public comps.
