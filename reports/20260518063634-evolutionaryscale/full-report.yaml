companyProfile:
  summary: >-
    EvolutionaryScale was a San Francisco-based AI biology company that built and released ESM3, a 98-billion-parameter
    generative multimodal protein language model trained on 2.78 billion sequences (1×10^24 FLOPs on NVIDIA H100s), and
    ESM Cambrian (ESM-C), a representation-focused follow-on. The four co-founders — Alex Rives (CEO), Tom Sercu (VP
    Eng), Zeming Lin, and Sanjay Rao — were all formerly at Meta AI Research (FAIR), where they originated the ESM
    lineage. The company raised a seed round (June 2024) and a $142M Series A co-led by Amazon and NVIDIA (September
    2024) at an implied ~$1.35B post-money valuation, alongside Lux Capital, Nat Friedman, and Daniel Gross. ESM3 was
    peer-validated by a Science publication (January 2025) and integrated into AWS SageMaker JumpStart and NVIDIA
    BioNeMo. On November 6, 2025, fewer than 14 months after the Series A close, the entire team joined CZ Biohub under
    the Chan Zuckerberg Initiative's Frontier AI for Biology initiative — ending EvolutionaryScale as an independent
    for-profit entity. Commercial revenue was never disclosed during the company's independent existence.
