      - number: '7.3'
        title: Competitive Commoditisation Risk
        blocks:
          - type: paragraph
            body: >-
              The protein AI tooling landscape is commoditising rapidly. Google DeepMind's AlphaFold 3 database provides
              over 200 million predicted protein-complex structures freely via EMBL-EBI partnership (updated March 2026
              to include protein complexes). Meta's ESM2 is MIT-licensed via facebookresearch/esm; OpenFold is Apache
              2.0. Chai-1 is Apache 2.0 with free commercial use. Baker Lab's RFdiffusion and ProteinMPNN are freely
              available from IPD/UW. These free-to-use models serve structure prediction and binder design workflows
              that are core use cases for Forge's API.

              EvolutionaryScale's defensibility relies on: (1) ESM3's generative multimodal capability going beyond
              structure prediction to sequence/structure/function joint generation; (2) the 98B-parameter flagship model
              being API-gated and commercially licensed; (3) domain-specific fine-tunes for drug discovery that require
              proprietary data. However, Chai-1's technical report claims state-of-the-art multimer prediction without
              MSA, directly competing with ESM3's key differentiator. If academic and venture-backed competitors
              (Profluent, Generate Biomedicines, AbSci, Isomorphic Labs) release competitive generative models under
              permissive licenses, Forge's pricing power will compress.

              The competitive risk is compounded by investor/partner overlap: Amazon (AWS) distributes EvolutionaryScale
              models via SageMaker JumpStart but also invests in and provides compute to competing bio-AI companies;
              Nvidia distributes via BioNeMo but BioNeMo is itself a competing model-distribution platform. Any conflict
              between partner and investor interests could result in preferential treatment of alternatives on these
              platforms.
