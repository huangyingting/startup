  - id: TE003
    title: ESM Technology / Operating Architecture Table
    slug: technology-operating-architecture-table
    type: enumeration
    notes: >-
      Architecture parameters (layer counts, hidden widths) for ESM-C are from the official ESM-C blog. Training FLOPs
      for ESM3-large are from the official ESM3 blog and Science paper. ESM-C FLOPs are from the ESM-C blog.
      Infrastructure details (Andromeda cluster, H100 GPUs) are from the NVIDIA blog announcement and corroborated by
      the ESM3 Science paper.
    columns:
      - Component
      - Description / Specification
      - Key Metric
      - Primary Source
    rows:
      - - ESM3 multitrack transformer
        - >-
          Three parallel input/output tracks: amino-acid sequence tokens, VQVAE structure tokens, function keyword
          tokens; unified attention across tracks
        - 3 tracks; 1.4B / 7B / 98B params across 3 model sizes
        - ESM3 blog (official); Hayes et al. Science 2025
      - - VQVAE structure tokenizer
        - >-
          Vector quantized variational autoencoder encodes 3D protein backbone coordinates as discrete structural tokens
          from a finite codebook
        - Discrete codebook; enables native 3D structure generation without coordinate regression
        - ESM3 blog (official); ESM3 preprint (bioRxiv)
      - - ESM3 pre-training and alignment
        - >-
          Masked language modeling (MLM) across all three tracks; RLHF fine-tuning on ESM3-large for alignment with
          protein design preferences
        - 1.07×10²⁴ FLOPs (98B model); 2.78B proteins; 771B unique tokens
        - ESM3 blog (official); NVIDIA blog; Science paper
      - - ESM-C architecture
        - >-
          Pre-LN transformer with RoPE positional embeddings and SwiGLU activations; masked language modeling
          pre-training; three sizes: 300M / 600M / 6B
        - '300M: 30L×960W; 600M: 36L×1152W; 6B: 80L×2560W'
        - ESM-C blog (official)
      - - ESM-C training compute and data
        - >-
          Training data: UniRef (83M seq clusters), MGnify (372M), JGI metagenomics (2B clusters) at 70% identity; FLOPs
          per model: 300M=1.26e22, 600M=2.17e22, 6B=2.37e23
        - 2B+ total sequence clusters (largest component from JGI metagenomics)
        - ESM-C blog (official)
      - - Andromeda HPC training cluster
        - NVIDIA H100 Tensor Core GPU cluster with Quantum-2 InfiniBand networking; used to train ESM3-large
        - 25× more FLOPs and 60× more data vs. predecessor ESM2
        - NVIDIA blog (partner-proof)
      - - DeepEP MoE Expert Parallelism library
        - >-
          Open-source CUDA/NCCL implementation of Mixture-of-Experts Expert Parallelism communication; custom kernels
          for H800 GPUs
        - 1,253 GitHub stars; signals advanced internal HPC infrastructure
        - GitHub evolutionaryscale/DeepEP (developer-signal)
