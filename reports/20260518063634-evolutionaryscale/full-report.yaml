  - id: FE001
    title: Product architecture map
    type: stack
    layout: standard
    summary: Five-layer architecture of EvolutionaryScale's ESM protein AI platform from training data through deployment.
    data:
      layers:
        - label: Data Layer
          detail: >-
            2.78B protein sequences (771B unique tokens); UniRef 83M clusters; MGnify 372M; JGI metagenomics 2B clusters
            @ 70% identity; PDB 3D structures; GO function annotations
        - label: Tokenization Layer
          detail: >-
            Track 1 — Amino acid sequence tokens | Track 2 — VQVAE discrete structure tokens (3D backbone → codebook) |
            Track 3 — Function keyword tokens (GO annotations)
        - label: Model Layer
          detail: >-
            ESM3 multitrack transformer (1.4B / 7B / 98B params; RLHF-aligned large) | ESMC Pre-LN transformer (300M /
            600M / 6B params; RoPE + SwiGLU) | DeepEP MoE EP library (HPC infrastructure)
        - label: Product / Access Layer
          detail: >-
            Open weights: ESM3-small + ESMC-300M/600M (Cambrian Non-Commercial License, HuggingFace) | Forge API:
            ESM3-medium/large + ESMC-6B (commercial, forge.evolutionaryscale.ai) | AWS SageMaker JumpStart: ESMC-6B
            (enterprise commercial)
        - label: Distribution and Research Layer
          detail: >-
            GitHub (9 repos, community SDK) | HuggingFace Hub (open model cards; 3.1k–6.3k monthly downloads) | NVIDIA
            BioNeMo NIM (in progress) | CZI Biohub research program (10k GPU by 2028)
    approximationNotes: >-
      Layer boundaries are conceptual; exact service architecture of the Forge API and internal infrastructure are not
