            tableRef: TE005
            claimRefs: []
      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'esmGFP: Peer-Reviewed Proof of Generative Capability at Evolutionary Scale'
            body: >-
              The esmGFP result—a novel functional fluorescent protein carrying 96 mutations across 229 positions (58%
              sequence identity to the nearest natural GFP, representing ~500 million years of evolutionary
              divergence)—and its validation in Science (January 2025, 341 citations) constitute the strongest public
              demonstration that ESM3 can generate genuinely novel functional proteins, not just variants of known
              sequences. This is a concrete, experimentally confirmed proof point that differentiates ESM3 from
              structure prediction models (AlphaFold) and from earlier sequence-only LMs (ESM2). It creates a
              reproducible, citable anchor for investor and partner credibility.
            calloutType: strength
            claimRefs:
              - CE029
              - CE030
              - CE027
          - type: callout
            title: 'Binding Prediction Paradox: Structural Input Heterogeneity Degrades Accuracy'
            body: >-
              An independent BioRxiv preprint published in December 2024 found that ESM3's binding prediction
              performance deteriorates when distinct, per-variant relaxed structural models are used as inputs rather
              than a single consistent structural backbone. This 'More Structure, Less Accuracy' finding has direct
              implications for drug discovery use cases where researchers commonly compute relaxed structures
              independently for each mutant. Diligence teams should test ESM3 binding prediction in their specific
              structural input regime and request EvolutionaryScale's / CZI Biohub's guidance on best-practice
              structural conditioning to avoid this degradation mode.
            calloutType: risk
            claimRefs:
              - CE039
          - type: callout
            title: 'Dual-Track Commercial Model: Open Weights Seed Adoption, Forge API Captures Revenue'
            body: >-
              EvolutionaryScale's architecture is a classic open-core commercial model: open weights for smaller models
              (ESM3-small, ESMC-300M/600M) under a non-commercial license build community adoption, academic citations,
              and developer familiarity — while the high-capacity models (ESM3-large 98B, ESMC-6B) and the Forge API
              create the commercial moat. The monthly HuggingFace download figures (3,105 for ESM3-small; 6,320 for
              ESMC-300M as of research date) indicate growing practitioner adoption that could convert into Forge API
              commercial customers. The key diligence question is the conversion rate and Forge pricing that this funnel
              drives.
            calloutType: insight
            claimRefs:
              - CE004
              - CE020
              - CE021
              - CE037
          - type: callout
            title: 'Diligence Priority: Request Forge API Pricing, Data Retention Policy, and Biosecurity Review'
            body: >-
              Any prospective investor or partner should request from EvolutionaryScale / CZI Biohub: (1) Forge API
              pricing tiers and current customer count or ARR range; (2) a data retention and confidentiality policy for
              sequences submitted to the Forge API (critical for pharma customers with proprietary pipeline sequences);
              (3) a biosecurity policy and any third-party biosafety review covering dual-use risks of generative
              protein design; (4) confirmation of Forge API continuity commitments post-CZI Biohub transition, including
              uptime SLA and roadmap through 2026–2027; and (5) independent benchmarks for ESM3-large versus AlphaFold3
              and Chai-1 on structure prediction accuracy and for ESMC versus ESM2 on embedding quality for downstream
              classification tasks.
            calloutType: recommendation
            claimRefs:
              - CE036
              - CE037
              - CE038
