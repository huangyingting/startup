  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >-
              EvolutionaryScale's revenue model was built around Forge, a commercial API platform providing inference
              access to ESM3, ESM Cambrian, and related protein language models. Forge launched in public beta in
              January 2025 with a per-token usage fee for protein sequence generation and structure prediction. The
              exact pricing schedule was not publicly listed on the forge.evolutionaryscale.ai interface and required a
              login; enterprise contract terms were negotiated privately. Three revenue streams were identifiable from
              public sources: (1) Forge API pay-per-use, (2) enterprise annual API access contracts (volume-based), and
              (3) distribution through strategic partners—NVIDIA's BioNeMo platform and AWS SageMaker JumpStart provided
              cloud-hosted access to ESM models, potentially on a revenue-share or referral-fee basis with NVIDIA and
              Amazon respectively.

              ESM Cambrian (released January 2025) was released exclusively as a commercial model through Forge, in
              contrast to the open-weight ESM2 released by Meta AI Research, which remains freely available on
              HuggingFace. This commercial-only design for ESM Cambrian reinforced the API access model. An academic
              free tier with capped token allowances was listed on the Forge product page.

              No revenue figures, ARR, or customer metrics were disclosed at any point during EvolutionaryScale's
              operational life as a standalone entity. The company's acquisition by CZI Biohub in November 2025 has
              fundamentally disrupted the commercial path, and as of May 2026 the Forge API's operational status and
              pricing under CZI Biohub management is not confirmed in public sources.
