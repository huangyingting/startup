  - id: FV001
    title: Recommendation logic flow
    type: flow
    layout: standard
    summary: >-
      Decision chain from founder pedigree, platform proof, risk factors, and valuation anchors to the Research-More
      recommendation and required catalysts.
    claimRefs:
      - CV006
      - CV009
      - CV030
      - CV033
    data:
      nodes:
        - id: founder_proof
          label: Founder Domain Authority
          detail: Rives/Sercu/Lin/Candido created ESM at Meta AI FAIR; Science 2025 publication validates technical claims
        - id: platform_proof
          label: Platform and Distribution Proof
          detail: >-
            Forge API on AWS SageMaker JumpStart + NVIDIA BioNeMo; ESM3 unique multimodal capability; ESM-C 6k+
            HuggingFace downloads
        - id: risk_factors
          label: Risk Assessment
          detail: >-
            No Forge revenue disclosed; ESM2 open-source + AlphaFold 3 free substitutes; key-person concentration in 4
            founders; dual-use biosecurity overhang
        - id: valuation_anchor
          label: Valuation Anchor
          detail: >-
            Base $1.5–2.5B; bull $3–5B on $50–100M ARR; bear $400–800M on commoditization; current entry $1.35B
            post-money Series A
        - id: recommendation
          label: Research-More / Track
          detail: Evidence-supported interest but insufficient commercial proof for buy; medium confidence; high risk
        - id: catalysts
          label: Required Catalysts
          detail: Forge ARR >$10M; multi-pharma customer disclosure; gross margin >60%; Amazon/NVIDIA revenue share terms
      edges:
        - from: founder_proof
          to: recommendation
          label: Supports
        - from: platform_proof
          to: recommendation
          label: Supports
        - from: risk_factors
          to: recommendation
          label: Constrains
        - from: valuation_anchor
          to: recommendation
          label: Anchors
        - from: recommendation
          to: catalysts
          label: Conditional on
