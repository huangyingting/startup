      - number: '1.2'
        title: Founders, Leadership, and Key-Person Risk
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale was co-founded by four researchers who had worked together at Meta AI Research (FAIR):
              Alexander (Alex) Rives, Tom Sercu, Zeming Lin, and Sanjay Rao. Alex Rives served as CEO and was the
              principal architect of the ESM protein language model lineage, which had its roots in his academic work
              and continued at Meta FAIR prior to the spin-out. Tom Sercu served as co-founder and VP of Engineering,
              leading the infrastructure and engineering team that built the Andromeda H100 cluster. Zeming Lin and
              Sanjay Rao served in technical co-founder roles contributing to model development and research. Following
              the November 2025 acquisition, Alex Rives became Head of Science at the Chan Zuckerberg Initiative, and
              the rest of the founding team joined CZ Biohub in senior research roles. The company's entire founding
              team originating from a single employer (Meta FAIR) represents a significant concentration risk: the
              cultural, methodological, and technical assumptions of the team are deeply homogeneous, and there was no
              evidence of independent board members, advisors from outside the AI research community, or experienced
              commercial biotechnology executives among the founding team. This single-employer provenance also
              heightens key-person dependency, since the departure of any one founder, particularly Rives as CEO and
              technical visionary, would have had an outsized impact on the company's research direction and investor
              confidence.
