      - number: '1.5'
        title: Key Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >
              EvolutionaryScale's history spans from its 2023 incorporation through a rapid product-and-capital phase to
              its absorption into CZI in November 2025, a total operational lifespan of under three years as an
              independent entity. The company's most significant technical milestone is the ESM3 Science paper
              publication, which provided the first independent peer-reviewed validation that a generative protein
              language model could design novel functional proteins with programmable properties. The $142M Series A at
              approximately $1.35B valuation in September 2024, just three months after product launch, reflected
              extraordinary investor enthusiasm for the technology. However, the November 2025 acquisition by CZI/Biohub
              is the dominant adverse governance event: with less than 14 months between the Series A close and the
              absorption into a non-profit entity, commercial investors face a highly uncertain exit path, since the
              terms of the CZI acquisition and any compensation to equity holders have not been publicly disclosed. The
              transition from a for-profit commercial entity to a non-profit research initiative raises material
              questions about the fate of the Series A investors, any employee equity, and the continuity of the Forge
              API commercial offering. Additional adverse events include: the absence of any SEC Form D filings, which
              is unusual for a company that raised $142M; the ESM GitHub repository redirect to the biohub organization,
              signaling IP transfer; and the company's Wikipedia page does not exist, indicating limited mainstream
              media documentation.
