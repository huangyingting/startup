  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: wide
    summary: >-
      Four-level sizing pyramid for EvolutionaryScale's market: TAM outer boundary (all drug discovery services
      globally), TAM addressable (protein engineering tools market), SAM (AI-native protein design tools and APIs within
      protein engineering), and SOM (EvolutionaryScale's current Forge API and distribution channel revenue zone), as of
      2026.
    data:
      nodes:
        - label: 'TAM Outer: Global Drug Discovery Market (~$71.9B, 2025)'
          detail: >-
            Precedence Research estimate for all drug discovery services globally—includes CRO wet-lab, instruments,
            software, and AI tools. Outer boundary only; most spend is not addressable by PLM APIs.
          tone: neutral
        - label: 'TAM Addressable: Protein Engineering Tools Market (~$2.6–5.1B, 2023–2025)'
          detail: >-
            Analyst consensus range across MarketsandMarkets ($3.9B, 2024), Allied ($2.2B, 2022), GVR ($2.6B, 2023), and
            Precedence ($5.09B, 2025). Scope includes software, services, and applications; 12–17% CAGR.
          tone: positive
        - label: 'SAM: AI-Native Protein Design APIs within Protein Engineering (est.)'
          detail: >-
            Analytical estimate; no independent SAM figure published. Includes cloud API, enterprise LM licensing, and
            distribution channel (AWS SageMaker, NVIDIA BioNeMo) for frontier protein LM tools. Fraction of broader
            protein engineering market.
          tone: neutral
        - label: 'SOM: EvolutionaryScale Forge API + Distribution Revenue Zone (2026)'
          detail: >-
            Forge API commercial subscriptions + AWS SageMaker + NVIDIA BioNeMo access revenue. $142M Series A
            (Crunchbase) validates investor-assessed opportunity; no public revenue figure disclosed. HuggingFace
            downloads (6,320+ ESM-C) as adoption proxy.
          tone: neutral
    approximationNotes: >-
      TAM outer from Precedence Research ($71.89B, 2025); TAM addressable midpoint of four analyst estimates (MAM,
      Allied, GVR, Precedence). SAM is an analytical estimate not independently published; derived from the fraction of
      protein engineering tools that are AI-native software-only (excluding instruments and reagents). SOM reflects
      commercial API and cloud distribution only; Forge API pricing and subscriber count are undisclosed. All figures
      are directional.
