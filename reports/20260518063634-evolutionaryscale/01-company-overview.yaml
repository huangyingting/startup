  - id: products-and-operations
    title: Products, Technology, and Operations
    body: >
      EvolutionaryScale's product portfolio centered on the ESM (Evolutionary Scale Modeling) family of protein language models. ESM3, released June 25, 2024, is a generative multimodal protein model available in sizes up to 98 billion parameters, the largest protein language model released publicly at the time of its launch. ESM3 was trained on 2.78 billion protein sequences totaling 771 billion tokens using approximately one times ten to the power 24 floating-point operations on a cluster of NVIDIA H100 GPUs branded Andromeda internally. The company described ESM3 as simulating 500 million years of protein evolution during a single generation pass, enabling the design of novel proteins with user-specified structural and functional properties. A peer-reviewed paper validating ESM3's ability to design genuinely novel fluorescent proteins was published in Science on January 16, 2025 (DOI: 10.1126/science.ads0018), providing significant independent credibility. ESM Cambrian (ESM-C), released December 4, 2024, is a next-generation protein language model available in 300M, 600M, and 6B parameter sizes optimized for efficient inference. NVIDIA integrated ESM3 into its BioNeMo platform and made it available as an NVIDIA NIM microservice for enterprise deployment on H100 infrastructure. The company maintained a GitHub organization with 9+ repositories including the ESM model codebase, the DeepEP repository for mixture-of-experts inference, and forks of open-source training infrastructure. The Forge API platform served as the commercial developer interface. EvolutionaryScale had 11 to 50 employees as indicated on LinkedIn prior to the acquisition.
