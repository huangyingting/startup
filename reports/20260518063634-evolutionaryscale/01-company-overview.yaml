company:
  name: EvolutionaryScale

chapter:
  number: 1
  title: Company Overview
  summary: >
    EvolutionaryScale was a San Francisco-based AI biology company that built and released ESM3, a 98-billion-parameter generative protein language model trained on 2.78 billion sequences, and ESM Cambrian, a follow-on model family. The company raised $142M in a Series A co-led by Amazon and NVIDIA in September 2024 at an implied ~$1.35B valuation. On November 6, 2025, the entire team joined CZ Biohub as part of the CZI Frontier AI for Biology initiative, effectively ending EvolutionaryScale as an independent for-profit entity. The company never disclosed commercial revenue.

sections:
  - id: identity-and-model
    title: Identity, Headquarters, and Business Model
    body: >
      EvolutionaryScale, Inc. was an early-stage AI biology company headquartered in San Francisco, California, incorporated in 2023 and operationally active from approximately March 2024. The company's stated mission was to use large generative models to decode the language of protein sequences, treating proteins as text encoding billions of years of biological evolution, and apply that understanding to design novel proteins with programmable functions. Its primary commercial offering was the Forge API platform (forge.evolutionaryscale.ai), a developer-facing service providing programmatic access to the ESM3 and ESM Cambrian (ESM-C) model families. The intended revenue model was a software-as-a-service API subscription and usage-based pricing for biotechnology, pharmaceutical, and synthetic biology customers seeking to accelerate protein engineering. The company also released the open-weights ESM3 model (esm3-sm-open-v1) for non-commercial academic use via Hugging Face, building a developer community alongside the commercial offering. As of November 2025, EvolutionaryScale ceased to operate as an independent entity when its full team was absorbed into CZ Biohub under the Chan Zuckerberg Initiative, marking the end of its path as a standalone commercial company. No revenue, ARR, or paying customer counts were ever publicly disclosed by the company during its independent existence.
    claimRefs:
      - CO001
      - CO003
      - CO006
      - CO007
      - CO028
      - CO029
      - CO021
      - CO035
    tableRefs:
      - TO001
    figureRefs:
      - FO003

  - id: founders-leadership
    title: Founders, Leadership, and Key-Person Risk
    body: >
      EvolutionaryScale was co-founded by four researchers who had worked together at Meta AI Research (FAIR): Alexander (Alex) Rives, Tom Sercu, Zeming Lin, and Sanjay Rao. Alex Rives served as CEO and was the principal architect of the ESM protein language model lineage, which had its roots in his academic work and continued at Meta FAIR prior to the spin-out. Tom Sercu served as co-founder and VP of Engineering, leading the infrastructure and engineering team that built the Andromeda H100 cluster. Zeming Lin and Sanjay Rao served in technical co-founder roles contributing to model development and research. Following the November 2025 acquisition, Alex Rives became Head of Science at the Chan Zuckerberg Initiative, and the rest of the founding team joined CZ Biohub in senior research roles. The company's entire founding team originating from a single employer (Meta FAIR) represents a significant concentration risk: the cultural, methodological, and technical assumptions of the team are deeply homogeneous, and there was no evidence of independent board members, advisors from outside the AI research community, or experienced commercial biotechnology executives among the founding team. This single-employer provenance also heightens key-person dependency, since the departure of any one founder, particularly Rives as CEO and technical visionary, would have had an outsized impact on the company's research direction and investor confidence.
    claimRefs:
      - CO002
      - CO004
      - CO005
      - CO022
      - CO030
    tableRefs:
      - TO002

  - id: funding-and-capital
    title: Funding History, Valuation, and Capital Structure
    body: >
      EvolutionaryScale raised capital in two known rounds prior to its absorption into CZI. The first was a seed round announced simultaneously with the ESM3 public launch on June 25, 2024. NVIDIA and Amazon both participated in the seed round alongside Lux Capital, Nat Friedman, and Daniel Gross. The exact seed amount was not publicly disclosed, though NVIDIA announced its participation separately. The Series A followed rapidly: on September 26, 2024, EvolutionaryScale announced a $142M Series A co-led by Amazon and NVIDIA, with continued participation from Lux Capital, Nat Friedman, and Daniel Gross, at an implied post-money valuation of approximately $1.35B. This closed only three months after the ESM3 launch and represented one of the largest AI biology funding rounds of 2024. Notably, no SEC Form D filings were found in EDGAR under any variant of "EvolutionaryScale" for the 2024 to 2026 period. Bloomberg reported on the Series A but the article is behind a paywall, preventing public verification of full deal terms, investor rights, and any secondary components. Total confirmed capital raised is $142M plus an undisclosed seed amount. No commercial revenue, debt facilities, or secondaries are on public record. The company's capital structure at the time of the CZI acquisition remains private.
    claimRefs:
      - CO015
