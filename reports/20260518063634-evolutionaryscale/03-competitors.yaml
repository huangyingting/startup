  - id: TP004
    title: "Moat Durability and Competitive Risk Register"
    columns:
      - Moat Claim
      - Threat / Counter-Evidence
      - Severity
      - Mitigation / Diligence Ask
    rows:
      - - Frontier scale — 98B params, 10^24 FLOPs
        - Open-source models approach capability (ESM2 15B free; Chai-2 advancing); rapid convergence
        - High
        - Validate whether ESM3 98B shows meaningfully better scientific outcomes vs smaller free models on independent benchmarks
      - - Multimodal joint reasoning (seq+struct+func)
        - AlphaFold3 handles molecules + structure; Chai-2 targets antibody structure + function; convergence accelerating
        - Medium
        - Assess how many pharma workflows genuinely require simultaneous trimodal prompting
      - - Forge API commercial distribution
        - Self-service API is low-moat GTM; Cradle has stickier data-flywheel SaaS; no disclosed multi-year enterprise contracts
        - High
        - Determine whether Forge has enterprise contracts with switching costs or is pay-per-call
      - - Founder reputation / ESM research lineage
        - Same founders released ESM2 for free (MIT) at Meta, providing a high-quality free alternative to their own paid offering
        - High
        - Seek founder clarity on commercialization strategy beyond model API; assess if research credibility drives enterprise pipeline
      - - AWS SageMaker + NVIDIA BioNeMo distribution
        - Both channels are non-exclusive; multiple competitors available on same marketplaces (Recursion, others)
        - Medium
        - Determine EvolutionaryScale's contractual exclusivity or priority on AWS/NVIDIA channels
      - - No disclosed clinical pipeline
        - Competitors with clinical proof (Insilico Phase 2; Recursion multi-phase pipeline) command higher pharma deal values
        - High
        - Assess whether EvolutionaryScale plans any internal therapeutic programs or remains a pure-tool company
    notes: >-
      Severity reflects impact on EvolutionaryScale's competitive durability if the threat
      materializes. All threats are based on publicly observed evidence; internal strategic
      mitigations not known to diligence team are not captured.
