  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Forge enterprise pricing
      missingEvidence: >-
        EvolutionaryScale Forge enterprise list pricing, volume tiers, and per-model
        API cost breakdown are not publicly available.
      whyItMatters: >-
        Without pricing transparency, it is impossible to model EvolutionaryScale's revenue
        run-rate, assess competitive pricing positioning, or evaluate whether Forge pricing
        competes effectively with free alternatives (ESM2 MIT) and SaaS peers (Cradle).
      diligencePath: >-
        Request Forge pricing schedule and any executed enterprise contracts directly from
        EvolutionaryScale management; compare to Cradle SaaS pricing and AWS marketplace rates.
      relatedQuestionRefs:
        - QP025

    - type: private-evidence-only
      severity: material
      topic: Isomorphic Labs deal economics
      missingEvidence: >-
        Deal values, milestone structures, and royalty terms for Isomorphic Labs'
        Eli Lilly and Novartis partnerships are not publicly disclosed.
      whyItMatters: >-
        The Isomorphic Labs pharma deals validate commercial pricing for AI-powered
        protein/structure-based drug discovery; they establish comp-set for what
        EvolutionaryScale could achieve in future pharma partnerships.
      diligencePath: >-
