  - id: peer-profiles
    title: "Direct AI Protein Design Peers: Detailed Profiles"
    body: |
      Among direct AI protein design platform peers, each carries a distinct go-to-market
      model and differentiation strategy relative to EvolutionaryScale.

      Profluent Bio (San Francisco, 2022) focuses on protein-centric AI and has taken a
      public-good strategy with OpenCRISPR, publishing the first AI-designed gene editor
      as open access. The company's core ProGen model architecture is designed for protein
      sequence generation. Profluent's estimated ~$44M funding base is substantially smaller
      than EvolutionaryScale's $142M, implying more limited compute and data infrastructure.

      Cradle.bio (Amsterdam, 2021) differentiates through a SaaS platform that integrates
      customer wet-lab data with proprietary protein engineering models. Its model improves
      each time customers upload experimental results ("models learn with you"), creating a
      data-flywheel lock-in effect. Cradle claims customers achieve 2–12x faster protein
      development timelines and explicitly retains a no-royalties subscription model where
      customers own all generated IP. The company operates its own wet lab in Amsterdam as
      a proof-of-concept validation layer. Cradle's Novonesis partnership represents one of
      the world's largest industrial biotech companies embedding AI into its innovation workflow.
      The platform is SOC 2 compliant and supports single sign-on.

      Generate Biomedicines (Somerville, MA, 2018) is the most heavily funded direct peer,
      with over $700M raised. Its Generate Platform integrates AI model training, high-throughput
      protein expression, and iterative learning across 140,000+ sq ft of lab space. The company
      has tested 42,000+ proteins with a continuously improving feedback loop. Its lead program
      GB-0895 targets TSLP for asthma, co-optimized from the start for improved biological
      effect and reduced dosing frequency (twice-yearly potential). Active partnerships with
      major biopharma firms signal platform-level pharma validation.

      AbSci Corporation (NASDAQ: ABSI, Vancouver, WA) is the only publicly traded direct
      competitor. Its AI Drug Creation Platform integrates wet-lab and AI in iterative 6-week
      cycles for de novo biologic (antibody) design and multi-parametric lead optimization.
      AbSci's ABS-201 is an AI-designed antibody targeting prolactin receptors for androgenetic
      alopecia with demonstrated in vivo hair follicle regeneration. A 10-K for FY2025 was
      filed with the SEC on March 24, 2026, providing public disclosure not available from
      private peers, but also exposing AbSci to quarterly revenue pressure.

      Adaptyv Bio (Lausanne, Switzerland) positions as a cloud lab for protein designers at
      the Biopole Life Science Campus. Public information is significantly limited compared
      to other direct peers, suggesting early-stage or pre-public status.
