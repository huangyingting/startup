callouts:
  - calloutType: risk
    title: "Open-Source Commoditization: Meta ESM2 (MIT) Is the Core Structural Risk"
    body: >-
      EvolutionaryScale's founders built ESM2—available free under MIT license on GitHub and
      HuggingFace—before launching EvolutionaryScale. Any organization can deploy ESM2 for any
      purpose, including commercial protein design, at zero cost. This establishes a
      commoditization floor: ESM3 differentiation depends entirely on multimodal prompting and
      frontier scale remaining premium capabilities worth paying for. As open-source alternatives
      converge upward (Chai-2, OpenFold, future ESM-family releases), this thesis weakens.
    claimRefs:
      - CP033
      - CP034
      - CP035
      - CP036

  - calloutType: insight
    title: "Generate Biomedicines Leads on Wet-Lab Capital and Experimental Depth"
    body: >-
      Generate Biomedicines has raised over $700M and maintains 140,000+ sq ft of lab space,
      enabling a generate-build-measure-learn loop at a scale EvolutionaryScale ($142M, no
      disclosed wet lab) cannot currently match. Generate's 42,000+ proteins experimentally
      validated represents a data moat independent of model architecture: empirical ground-truth
      data at this scale is difficult to replicate and supports proprietary model improvement.
    claimRefs:
      - CP004
      - CP022
      - CP023
      - CP036

  - calloutType: recommendation
    title: "Clinical Moat Gap Requires Strategic Positioning Decision"
    body: >-
      EvolutionaryScale is the only major AI protein design company with no disclosed internal
      drug program or clinical pipeline. Insilico Medicine (Phase 2 completion), Recursion
      (multi-program Phase 1/2), AbSci (ABS-201 candidate), and Generate (GB-0895) all have
      at least one clinical or pre-IND program. This gap may limit EvolutionaryScale's ability
      to command premium partnership economics versus peers with clinical proof. The diligence
      ask is whether EvolutionaryScale intends to remain a pure-tool company or build an
      internal pipeline.
    claimRefs:
      - CP017
      - CP018
      - CP024
      - CP038
      - CP039

