callouts:
  - id: KV001
    type: insight
    title: "Clinical Proof Is Real — Financial Proof Is Missing"
    body: >
      Spring Health is unusual in having genuine peer-reviewed clinical evidence (JAMA 2025)
      for outcomes that most digital health companies assert only in press releases. The JAMA
      RCT showing 1.9× ROI and 50% lower hospitalization rates is a defensible moat. The
      missing piece is financial: ARR, NRR, and unit economics are fully opaque, making
      precise valuation impossible without a data room.
    claimRefs: [CV006, CV026]
    sourceRefs: [SV002, SV015]

  - id: KV002
    type: risk
    title: "Public Comp Re-Rating Risk Is Material"
    body: >
      Accolade, Talkspace, and Teladoc all trade at 1–3× ARR — roughly 80–90% below their
      2021 peak multiples. Spring Health's $3.3B at 11–25× ARR requires sustained premium
      to public comps. If mental health tech re-rates further or Spring Health's growth
      trajectory disappoints, a down-round at 2025–2026 fundraise or IPO is plausible.
    claimRefs: [CV015, CV016, CV017, CV031, CV032]
    sourceRefs: [SV004, SV005, SV013]

  - id: KV003
    type: benchmark
    title: "Lyra Health's $4.8B (2022) Is the Closest Precedent — and Likely Impaired"
    body: >
      Lyra Health's 2022 Series F at $4.8B was the sector high-water mark. With no new
      rounds disclosed since 2022 and public comp re-ratings, Lyra is likely marked down
      significantly on fund NAVs. Spring Health's April 2024 $3.3B round is more recent
      and carries a higher clinical-evidence premium, but the sector headwinds are similar.
    claimRefs: [CV018, CV019, CV020]
    sourceRefs: [SV014, SV016]

