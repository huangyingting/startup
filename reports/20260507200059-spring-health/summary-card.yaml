summary:
  headline: |
    Spring Health is the best-evidenced employer mental health unicorn globally, with a JAMA
    2025 peer-reviewed RCT providing gold-standard clinical outcomes proof unavailable from any
    direct competitor. The $3.3B Series E valuation (April 2024) is the highest for an
    independent employer mental health benefits company and implies 11–25× ARR at a wide analyst
    estimate range ($130–300M). The investment thesis is a conditional buy: strong clinical proof,
    MHPAEA enforcement tailwind, and Alma-enabled multi-channel optionality support a premium
    valuation, but financial opacity (zero ARR disclosure), MHPAEA NQTL compliance risk, and
    unquantified Guide AI clinical liability create material conviction gaps that require data
    room access before term sheet. For growth-stage investors with a 4–7 year horizon.
