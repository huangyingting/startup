  topStrengths:
    - >-
      JAMA 2025 peer-reviewed RCT showing 1.9× ROI and 50% lower hospital costs is the only gold-standard clinical
      outcomes evidence in the employer mental health sector — a moat competitors cannot quickly replicate
    - >-
      20M covered lives across 450+ direct enterprise employer accounts (Microsoft, Target, JPMorgan, Delta) provides
      durable, sticky ARR base with 1–3 year renewal cycles and ROI guarantee reducing churn risk
    - >-
      MHPAEA 2024 Final Rule enforcement creates new compliance-driven demand for Spring Health's documented protocol
      approach, providing a durable secular tailwind through at least 2028
    - >-
      Alma acquisition (2025) and Knox-Keene license (2025) open health plan and consumer channels, diversifying from
      single-channel employer risk and extending total addressable revenue per covered life
    - >-
      Guide AI proactive navigation, VERA-MH open-source safety framework, and Atlas longitudinal outcome tracking
      create a technical and data moat that employer-channel competitors cannot quickly replicate
  topRisks:
    - >-
      Zero financial disclosure: ARR, NRR, gross margin, and EBITDA are fully opaque — analyst ARR estimates span
      $130–300M (2.3× range), making any precise valuation impossible without data room access
    - >-
      MHPAEA 2024 NQTL compliance: Spring Health has not publicly disclosed a comparative NQTL analysis; if its
      utilization management protocols create parity violations, employer clients face DOL enforcement and may be forced
      to terminate contracts
    - >-
      Guide AI clinical liability: proactive AI mental health recommendations carry UPL, FDA SaMD, and negligence
      exposure; no clinical liability legal opinion or insurance coverage has been disclosed; ROI guarantee amplifies
      exposure
    - >-
      Public comparable re-rating risk: Accolade, Talkspace, and Teladoc trade at 1–3× ARR vs. Spring Health's 11–25×;
      if employer mental health sector re-rates toward public comps, a down-round is plausible at the next capital event
    - >-
      FTC data sharing enforcement risk: the 2023 BetterHelp consent order creates a direct precedent for mental health
      platform analytics data sharing; Spring Health's Guide AI and employer analytics create material FTC Act Section 5
      exposure if member engagement data reaches third-party advertising platforms
  unresolvedGaps:
    - >-
      ARR, NRR, gross margin, and EBITDA not disclosed; all financial valuation depends on analyst estimates with a
      $130–300M ARR range — the single largest gap in this diligence
    - >-
      Cap table, liquidation preference stack, and share class waterfall not disclosed; common equity returns in a
      sub-$5B exit depend critically on the preference overhang structure
    - >-
      MHPAEA NQTL comparative analysis for Spring Health's utilization management, prior authorization, and network
      adequacy protocols — not disclosed; employer clients and investors both need this
    - >-
      Guide AI clinical liability legal opinion (UPL, FDA SaMD, negligence) and corresponding insurance coverage limits
      not disclosed
    - Health plan channel economics (PMPM, CAC, NRR) not disclosed; critical for the bull case valuation thesis
    - Alma integration synergy timeline and projected ARR contribution not disclosed post-2025 acquisition
