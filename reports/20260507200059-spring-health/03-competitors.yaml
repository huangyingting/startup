callouts:
  - id: KP001
    type: strength
    title: JAMA validation + guaranteed ROI is Spring Health's most defensible moat
    body: >
      No Tier 1 digital competitor (Lyra, Modern Health) offers both a peer-reviewed JAMA- published outcomes study and
      a contractual ROI guarantee. This two-part evidence stack converts behavioral health from a compliance cost to a
      CFO-quantifiable investment—an enterprise buying argument that competitors cannot quickly replicate without
      generating equivalent clinical evidence. Lyra's AI launch signals awareness of this moat; monitoring whether Lyra
      commissions a comparable JAMA study should be a key competitive watch indicator.
    claimRefs:
      - CP013
      - CP014
      - CP015
  - id: KP002
    type: risk
    title: Lyra's 3× larger provider network and AI launch are material competitive threats
    body: >
      Lyra Health's 30,000+ provider network is three times the size of Spring Health's 10,000+. For large enterprise
      buyers who prioritize access breadth over precision matching, Lyra may win on network size alone. Lyra's October
      2025 clinical-grade AI launch directly attacks Spring Health's precision AI differentiation narrative. If Lyra
      produces peer-reviewed evidence for its AI model within 12-18 months, Spring Health's clinical moat narrows
      significantly. This is the most time-sensitive competitive risk in the portfolio.
    claimRefs:
      - CP005
      - CP017
      - CP018
  - id: KP003
    type: risk
    title: Optum's bundled insurer relationships are a structural displacement barrier
    body: >
      Optum Behavioral Health's EAP and managed care products are bundled with UnitedHealthcare health plan contracts
      covering tens of millions of employees. When an employer's health plan is through UHC, behavioral health benefits
      may be auto-included in the contract— creating a bundled purchasing barrier that Spring Health's superior outcomes
      cannot always overcome. This is particularly acute in mid-market employers where CFOs default to the bundled UHC
      offer rather than evaluating standalone digital-first platforms.
    claimRefs:
      - CP008
      - CP009
      - CP016
