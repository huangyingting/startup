  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Spring Health vs. Lyra Head-to-Head Win/Loss Data
      missingEvidence: >-
        Spring Health has not disclosed its competitive win/loss rate against Lyra Health or Modern Health. No
        independent analyst has published a direct head-to-head comparison.
      whyItMatters: >-
        Win/loss data is the most direct evidence of competitive strength; its absence means the competitive moat
        analysis rests entirely on feature comparison and clinical evidence rather than observed market outcomes.
      diligencePath: >-
        Request CRM win/loss data by competitor in data room; ask for pipeline conversion rate against Lyra-incumbent
        accounts.
      relatedQuestionRefs:
        - QP019
    - type: private-evidence-only
      severity: moderate
      topic: Independent comparative NPS or member satisfaction scores across competitors
      missingEvidence: >-
        No independent analyst has published NPS or member satisfaction scores comparing Spring Health, Lyra, and Modern
        Health on standardized measures. Company-reported scores are not cross-comparable.
      whyItMatters: >-
        Member satisfaction is a renewal driver; if Lyra or Modern Health achieves higher employee NPS, it undermines
        Spring Health's premium pricing.
      diligencePath: >-
        Request member NPS data by cohort and employer size from Spring Health data room; compare to Lyra's published
        NPS claims.
      relatedQuestionRefs:
        - QP020
    - type: missing-source
      severity: moderate
      topic: Lyra Health post-2022 valuation update
      missingEvidence: >-
