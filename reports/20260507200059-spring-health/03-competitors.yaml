  claims:
    - id: CP001
      statement: >-
        Spring Health operates in a three-tier competitive market: (1) digital-first platforms (Lyra, Modern Health);
        (2) managed behavioral health / EAP incumbents (Optum, Magellan, Beacon, ComPsych); and (3) consumer apps and
        point solutions (Headspace, Talkspace, BetterHelp).
      type: inferred
      topic: competitive-landscape
      sourceRefs:
        - SP001
        - SP006
      confidence: high
      freshness: current
    - id: CP002
      statement: >-
        Spring Health supports the most comprehensive feature set among digital-first employer mental health platforms:
        digital self-care, coaching, therapy, psychiatry, EAP replacement, specialty care (high-acuity), AI matching,
        guaranteed ROI, Knox-Keene health plan contracting, and Alma consumer continuity—a total of 12/12 assessed
        capabilities.
      type: inferred
      topic: competitive-position
      sourceRefs:
        - SP001
        - SP009
      confidence: high
      freshness: current
    - id: CP003
      statement: >-
        Legacy EAP products (Optum/Magellan) typically achieve 5–8% employee utilization, while digital-first platforms
        like Spring Health report 20-40%+ engagement, representing a measurable quality-of-service advantage.
      type: estimated
      topic: competitive-position
      sourceRefs:
        - SP011
        - SP022
      confidence: medium
      freshness: current
    - id: CP004
      statement: >-
        Consumer mental health apps (Headspace, Calm, BetterHelp, Talkspace) serve lower-acuity needs at lower price
        points ($10-20/month) and are not direct substitutes for Spring Health's employer-sponsored clinical platform in
        the enterprise procurement cycle.
      type: inferred
      topic: competitive-landscape
      sourceRefs:
        - SP001
        - SP013
      confidence: medium
      freshness: current
    - id: CP005
      statement: >-
        Lyra Health's last known valuation was $4.8B (2022 Series F, $235M raised, per Axios). Lyra has 30,000+
        providers and serves 20M+ people globally, including customers like Facebook/Meta, Uber, eBay, and Morgan
        Stanley.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP029
        - SP002
      confidence: high
      freshness: recent
    - id: CP006
      statement: >-
        Modern Health's last known valuation was $1.17B, with $170M+ raised from Kleiner Perkins, Founders Fund, John
        Doerr, Y Combinator, and Battery Ventures—making it the fastest entirely female-founded US company to reach
        unicorn status.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP005
        - SP007
      confidence: high
      freshness: recent
    - id: CP007
      statement: >-
        Spring Health ($3.3B, April 2024) is the second-highest valued digital-first employer mental health platform
        after Lyra Health ($4.8B, 2022), and ahead of Modern Health ($1.17B, 2021) by a significant valuation premium.
      type: inferred
      topic: competitive-position
      sourceRefs:
        - SP008
        - SP004
      confidence: high
      freshness: current
    - id: CP008
      statement: >-
        Optum Behavioral Health (UnitedHealth Group subsidiary) is the largest managed behavioral health incumbent,
        managing benefits for 30M+ commercial plan members through its EAP and managed care programs—an entrenched
        installed base that presents both a displacement opportunity and a structural barrier for Spring Health.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP006
        - SP022
      confidence: high
      freshness: current
    - id: CP009
      statement: >-
        Optum's 100,000+ clinical network and integration with UnitedHealthcare health plan contracts create a bundled
        purchasing dynamic: employers who use UHC for health coverage may automatically receive behavioral health
        services through Optum, without evaluating digital-first alternatives.
      type: inferred
      topic: competitive-risk
      sourceRefs:
        - SP006
        - SP022
      confidence: medium
      freshness: current
    - id: CP010
      statement: >-
        Talkspace (NASDAQ: TALK) had approximately $170M revenue (2024) and a ~$300M market cap, serving consumers and
        some employers with teletherapy only—no psychiatry, coaching, or EAP capability—and was subject to FTC data
        privacy scrutiny in 2023–2024, per SEC filings.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP027
        - SP013
      confidence: medium
      freshness: recent
    - id: CP011
      statement: >-
        Modern Health covers 70+ countries and is positioned as the international employer mental health solution of
        choice—a differentiation that Spring Health currently cannot match, particularly for US-headquartered companies
        with large international workforces.
      type: third-party-reported
      topic: competitive-risk
      sourceRefs:
        - SP007
        - SP005
      confidence: high
      freshness: current
    - id: CP012
      statement: >-
        BetterHelp (Teladoc subsidiary) is the largest US consumer teletherapy platform by subscriber count (~6M+ peak
        users) and faced a 2023 FTC complaint regarding sharing user mental health data with advertisers—an adverse
        regulatory event that benefited platforms with HIPAA-compliant employer-channel models.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP013
        - SP006
      confidence: medium
      freshness: recent
    - id: CP013
      statement: >-
        Spring Health's 2025 JAMA Network Open publication is the highest tier of independent clinical proof in the
        digital employer mental health sector; no Tier 1 competitor (Lyra, Modern Health) has an equivalent
        peer-reviewed study in JAMA-tier journals as of 2026.
      type: inferred
      topic: competitive-moat
      sourceRefs:
        - SP012
        - SP002
      confidence: high
      freshness: current
    - id: CP014
      statement: >-
        Spring Health's guaranteed 3× ROI by Year 3 is a contractual commitment with no direct equivalent published by
        any digital-first competitor, transforming mental health benefits from a compliance cost to a CFO-quantifiable
        investment.
      type: company-claimed
      topic: competitive-moat
      sourceRefs:
        - SP009
        - SP001
      confidence: high
      freshness: current
    - id: CP015
      statement: >-
        Digital employer mental health platform estimated PEPM ranges: Spring Health $30–50 (estimated), Lyra Health
        $25–45 (estimated), Modern Health $20–40 (estimated), Legacy EAP $2–8, Talkspace employer $10–20—with Spring
        Health at the premium end of Tier 1.
      type: estimated
      topic: pricing
      sourceRefs:
        - SP010
        - SP011
      confidence: low
      freshness: current
    - id: CP016
      statement: >-
        Employer objections to switching from legacy EAP/managed care include: (1) bundled insurer contract lock-in; (2)
        annual benefits renewal cycle (12-month decision lag); (3) employee re-enrollment burden; and (4) integration
        complexity with HRIS and health plan systems.
      type: inferred
      topic: competitive-risk
      sourceRefs:
        - SP022
        - SP011
      confidence: medium
      freshness: current
    - id: CP017
      statement: >-
        Lyra Health launched a clinical-grade AI platform in October 2025 and unveiled a pediatric Center of Excellence
        in May 2025, signaling aggressive product development to close the gap with Spring Health's precision AI and
        specialty care differentiation.
      type: third-party-reported
      topic: competitive-risk
      sourceRefs:
        - SP002
        - SP004
      confidence: high
      freshness: current
    - id: CP018
      statement: >-
        Industry critics (Fierce Healthcare 2025) have raised concerns that digital mental health platform outcomes
        metrics—across all vendors—rely heavily on vendor self-reporting and may not reflect independent clinical
        measurement at population scale.
      type: third-party-reported
      topic: competitive-risk
      sourceRefs:
        - SP013
        - SP011
      confidence: medium
      freshness: current
    - id: CP019
      statement: >-
        Lyra's March 2026 integration partnership with Workday Wellness provides Lyra with a distribution advantage via
        Workday's enterprise HR platform penetration of 10,000+ large employer customers globally—a channel Spring
        Health does not currently have a comparable partnership with.
      type: third-party-reported
      topic: competitive-risk
      sourceRefs:
        - SP002
        - SP004
      confidence: high
      freshness: current
    - id: CP020
      statement: >-
        Headspace (post-Ginger merger) serves both consumer wellness and some employers, but has less clinical depth
        than Spring Health, Lyra, or Modern Health—particularly lacking psychiatry and specialty care capabilities that
        enterprise CFOs require for a full EAP replacement.
      type: inferred
      topic: competitor-profile
      sourceRefs:
        - SP001
        - SP013
      confidence: medium
      freshness: current
    - id: CP021
      statement: >-
        Magellan Health (Centene subsidiary) manages behavioral health carve-outs for Medicaid and commercial health
        plan populations, with particular depth in substance use disorder and public sector contracts—a segment Spring
        Health has not publicly targeted as of 2026.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP006
        - SP022
      confidence: medium
      freshness: current
    - id: CP022
      statement: >-
        Spring Health's Alma combination creates a consumer-to-employer continuity loop that no Tier 1 digital
        competitor has replicated as of 2026: members who leave an employer retain their provider relationship through
        the Alma marketplace.
      type: inferred
      topic: competitive-moat
      sourceRefs:
        - SP017
        - SP018
      confidence: high
      freshness: current
    - id: CP023
      statement: >-
        Spring Health's URAC nationwide accreditation for clinical care and crisis programs is an independent
        third-party quality certification that neither Lyra nor Modern Health has publicly disclosed having achieved at
        the same scope.
      type: inferred
      topic: competitive-moat
      sourceRefs:
        - SP009
        - SP001
      confidence: medium
      freshness: historical
    - id: CP024
      statement: >-
        Lyra Health's Bend Health acquisition (July 2025) directly enters the pediatric and adolescent mental health
        segment, matching Spring Health's specialty care breadth expansion and signaling that both competitors are
        racing to expand from single-modality to full-spectrum.
      type: third-party-reported
      topic: competitive-dynamics
      sourceRefs:
        - SP002
        - SP004
      confidence: high
      freshness: current
    - id: CP025
      statement: >-
        Spring Health's scientific advisory board (John Krystal, Yale; Myrna Weissman, Columbia; Martin Paulus, Laureate
        Institute) provides clinical credibility that is a moat in enterprise procurement for large sophisticated
        employers—a credential that consumer apps and traditional EAPs cannot claim.
      type: company-claimed
      topic: competitive-moat
      sourceRefs:
        - SP024
        - SP001
      confidence: high
      freshness: current
    - id: CP026
      statement: >-
        The competitive market for employer mental health platforms is still underpenetrated: fewer than 10% of large US
        employers have transitioned from legacy EAP to digital-first platforms, meaning the primary growth dynamic is
        market creation, not zero-sum competitive displacement.
      type: estimated
      topic: competitive-dynamics
      sourceRefs:
        - SP022
        - SP011
      confidence: medium
      freshness: current
