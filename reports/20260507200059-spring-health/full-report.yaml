            body: >
              The 2025 appointment of Dipak Golechha (CFO, Palo Alto Networks) to Spring Health's board is a governance
              signal typically associated with IPO preparation or late-stage institutional fundraising. Palo Alto
              Networks is a publicly traded enterprise tech company; Golechha's expertise in public-market financial
              operations, investor relations, and governance would add board-level capability that Spring Health's
              current stage requires. This does not confirm an IPO timeline but is a meaningful board composition
              indicator for financial events within 12–24 months of the run date.
