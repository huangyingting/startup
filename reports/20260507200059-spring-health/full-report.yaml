  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Technology Architecture and Proprietary AI Engine
        blocks:
          - type: paragraph
            body: >
              Spring Health's foundational technology is the Precision Mental Healthcare (PMH) engine— a machine
              learning system trained on clinical outcome data that assigns a personalized care plan to each member. The
              model ingests responses to validated clinical assessments (PHQ-9 for depression, GAD-7 for anxiety, and
              proprietary burnout/stress indices) and maps them to one of 13 defined care pathways—from digital
              exercises to psychiatric medication management. This AI-driven matching differentiates Spring Health from
              EAP providers that assign care uniformly or rely entirely on member self-selection.

              The platform is built to be FHIR R4-compliant, enabling bidirectional data exchange with commercial health
              plans and electronic health record systems—a critical architectural requirement for the Knox-Keene health
              plan channel launched in 2025. Atlas, the company's proprietary recommendation engine (launched 2022),
              provides real-time provider matching that reduced time-to-appointment to under 2 days for most members.
              Guide (launched 2025) is an AI-powered care navigation experience that proactively surfaces the right next
              step for members between provider sessions—positioning Spring Health as a continuous-care platform rather
              than a session-episodic service.

              The VERA-MH open-source AI safety evaluation framework (co-developed with a clinical expert council, 2024)
              is the first published standard for evaluating GenAI responses to suicidal ideation in mental health
              contexts. The public release serves both a safety purpose and a developer community strategy—making Spring
              Health a standards-setter rather than a passive adopter of third-party AI safety frameworks.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
      - number: '5.2'
        title: Product Portfolio and Clinical Workflow
        blocks:
          - type: paragraph
            body: >
              Spring Health offers a modular product suite built around the employer benefit deployment model.
              SpringWorks is the employer-facing configuration and analytics platform, providing HR administrators with
              engagement reporting, utilization data, and ROI dashboards. SpringLife is the member-facing mobile and web
              application through which employees access assessments, book appointments, access digital exercises, and
              interact with Guide AI. Compass EHR is Spring Health's proprietary electronic health record, built
              specifically for behavioral health—enabling structured clinical documentation, outcome tracking, and care
              coordination within the provider network.

              Specialty Care (launched 2023) addresses high-acuity conditions—eating disorders, substance use disorder
              (SUD), ADHD, OCD, and severe depression—through dedicated care pathways with specialists and case
              management. This extends the platform from EAP replacement to comprehensive behavioral health management
              (BHM). The Bloom content acquisition (2022) added self-guided digital therapeutic content (dCBT,
              mindfulness, stress modules) to the SpringLife app, reducing dependency on synchronous provider sessions
              for lower-acuity members.

              The Alma combination (2025) adds a consumer marketplace layer: Alma's directory of 10,000+ independent
              therapists in all 50 states is now accessible through SpringLife, extending reach beyond the contracted
              employer network to individuals seeking self-pay or insurance-based therapy without employer sponsorship.
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
              - CE011
      - number: '5.3'
        title: Integration Architecture and Platform Differentiation
        blocks:
          - type: paragraph
            body: >
              Spring Health integrates with the major enterprise HR and benefits technology stacks. The Workday Wellness
              Partner Program integration (2026) connects SpringLife directly into Workday's employee wellness hub,
              enabling single-sign-on (SSO) and enrollment without separate app downloads—reducing activation friction
              and increasing utilization rates. Integration with ADP, Salesforce Health Cloud, and major TPAs is
              supported through standard OAuth 2.0 API connections.

              The HIPAA-compliant data architecture uses end-to-end encryption for member data, a zero-retention policy
              for AI model training on clinical conversations (asserted by VERA-MH RFI guidelines), and role-based
              access control for employer administrators who receive only aggregate, de-identified engagement data. The
              company's 2025 Knox-Keene California license required FHIR-based electronic data interchange (EDI)
              compliance with California health plan data standards.

              The primary technology differentiation moat is the PMH training data set—cumulative clinical outcome
              records from 20M+ covered lives over six years of measurement-based care cycles. This dataset is
              proprietary and grows continuously, creating a data moat that pure EAP providers and newer entrants cannot
              easily replicate. The combination of clinical outcomes data, AI matching, and a built-in EHR (Compass)
              distinguishes Spring Health from both legacy EAP providers (no clinical data infrastructure) and point
              solutions (single-condition focus without population health measurement).
            claimRefs:
              - CE012
              - CE013
              - CE014
              - CE015
              - CE016
      - number: '5.4'
        title: Exhibits
        blocks:
          - type: callout
            title: VERA-MH open-source framework establishes Spring Health as AI safety standards-setter
            body: >
              Spring Health's decision to release VERA-MH as an open-source AI safety evaluation tool— rather than
              keeping it proprietary—represents a deliberate developer ecosystem strategy. By co-authoring the first
              clinical standard for evaluating GenAI mental health chatbots and making it publicly accessible at
              vera-mh.com, Spring Health positions itself as the reference implementation for responsible AI in
              behavioral health. This approach mirrors Google's and Microsoft's pattern of open-sourcing safety
              frameworks to set industry standards they can also meet with their own products—creating regulatory and
              reputational advantages while also generating trust signals for enterprise buyers.
            calloutType: insight
            claimRefs:
              - CE014
              - CE015
              - CE016
          - type: callout
            title: AI clinical accuracy risks grow as Guide extends AI into continuous, between-session care
            body: >
              Guide AI's continuous-care model—proactively nudging members between sessions based on engagement
              signals—creates new clinical and liability risks. An AI that incorrectly assesses a member's mental state
              between sessions, fails to escalate a crisis signal, or provides inappropriate support during a high-risk
              moment could cause direct clinical harm. VERA-MH addresses chatbot safety for suicidal ideation but the
              standard applies to consumer-facing AI; it is unclear whether Guide AI's proactive nudge model (not a
              conversational chatbot) has been independently evaluated under the same framework.
            calloutType: insight
            claimRefs:
              - CE012
              - CE016
