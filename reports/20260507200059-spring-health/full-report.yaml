  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: >
              Spring Health has raised $488M+ across five disclosed rounds. Series A: $22M (2020, Kinnevik and
              Work-Bench); Series B: $76M (2021, Tiger Global); Series C: $190M (2022, Tiger Global, post-money
              valuation $2B); Series D: Not publicly confirmed; Series E: $100M (April 2024, post-money valuation $3.3B
              per Fortune exclusive). The gap between Series C and Series E—approximately two years with no confirmed
              Series D—may reflect an undisclosed bridge, an unlabeled extension round, or simply that the company did
              not require additional capital between 2022 and 2024.

              The $3.3B Series E valuation represents a 65% step-up from the $2B Series C valuation, achieved over
              approximately two years of operations. This implies the company has been growing fast enough to justify a
              premium relative to the broader digital health repricing that affected most venture-backed companies in
              2022–2023. No SEC Form D filings were identified in EDGAR under Spring Health, Inc., Spring Health
              Benefits, or related entity names—which may reflect Delaware-level state exemptions rather than no capital
              raise.

              Investor profile: Tiger Global (led Series B and C), Kinnevik (led Series A), William Blair. Dipak
              Golechha (CFO, Palo Alto Networks) joined the board in 2025, signaling preparation for a potential public
              offering or large institutional financing event.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
      - number: '4.2'
        title: Revenue Model and Unit Economics Estimate
        blocks:
          - type: paragraph
            body: >
              Spring Health generates revenue primarily through PEPM (per employee per month) subscription fees charged
              to employers for access to the Spring Health mental health benefits platform. Health plan channel revenue,
              introduced via the Knox-Keene license (2025), follows a capitation or PMPM model; this is early-stage
              revenue as of the run date. The Alma combination (2025) adds consumer marketplace revenue through Alma's
              therapist marketplace, a different unit economics profile with potentially lower ARPU and higher churn
              than the enterprise PEPM core.

              Implied ARR estimate (analyst-inferred): 20M covered lives × $30–50 PEPM × 12 months would imply
              $7.2B–$12B theoretical ceiling ARR if all covered lives were active subscribers at full commercial rates.
              However, covered lives include channel-partner groups where per-life PEPM may be significantly lower, and
              not all covered employees actively engage. A more conservative estimate using 450 direct employer clients
              at $150–300 PEPY (per employee per year) and an assumed average headcount of 2,000 employees per client
              implies $135M–$270M ARR from direct employer contracts—broadly consistent with a high-growth Series E
              stage company.

              Unit economics remain entirely private. No gross margin, CAC, LTV, or payback period data has been
              disclosed. Provider network costs (10,000+ licensed providers), customer success headcount (1,001–5,000
              employees), and technology costs are all substantive expense items whose scale versus revenue is unknown.
            claimRefs:
              - CI006
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
      - number: '4.3'
        title: Capital Adequacy and Financial Risk Assessment
        blocks:
          - type: paragraph
            body: >
              The April 2024 Series E ($100M) is the last confirmed financing event. With no subsequent capital
              announcement through the run date (May 2026), the company has been operating on existing capital for
              approximately 13 months. Given typical Series E company burn rates of $5–15M per month for a company of
              Spring Health's scale, the residual runway from the Series E at the run date is 7–20 months—suggesting
              either the company is approaching a new capital raise, has achieved near-breakeven operations, or has
              additional undisclosed capital sources (e.g., debt facility, revenue-based financing).

              The $3.3B valuation at Series E implies a return expectation of $10B+ for a 3× return at exit. At Spring
              Health's estimated ARR range ($135M–$270M), the revenue multiple implied by the valuation is approximately
              12–24×. This is a premium that requires sustained growth of 40%+ annually to maintain—a high bar given the
              current employer benefits renewal cycle and competition from Lyra and Optum.

              Alma combination financial risks: The combination with Alma introduces consumer-facing revenue, which
              historically has higher churn, lower ARPU, and different regulatory cost profiles (Knox-Keene) than Spring
              Health's enterprise core. Integration costs were not disclosed. The combination appears strategic (market
              expansion) rather than financial (accretive), suggesting near-term margin dilution is likely.

              CFO board appointment (Dipak Golechha, Palo Alto Networks CFO) in 2025 is a governance strengthening
              signal typically associated with IPO preparation or large late-stage round preparation—potentially
              signaling a capital event within 12–24 months of the run date.
            claimRefs:
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
      - number: '4.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Revenue is entirely undisclosed – $3.3B valuation rests on unverified financials
            body: >
              Spring Health has never disclosed ARR, revenue, margins, or unit economics. The $3.3B valuation implies
              $9.9B+ exit value for a 3× VC return—requiring either IPO or strategic acquisition at a premium. Without
              verifying revenue, the valuation is purely based on market positioning, clinical proof, and growth
              trajectory. At an estimated $135–360M implied ARR, the revenue multiple ranges from 9×–24×—well above
              public SaaS healthcare comps (5–10×) and requiring sustained 40%+ annual growth to maintain.
            calloutType: insight
            claimRefs:
              - CI008
              - CI009
              - CI015
          - type: callout
            title: No SEC Form D filings found; Series D absence creates cap table uncertainty
            body: >
              SEC EDGAR returned no Form D filings under Spring Health, Inc. or known entity names. While private
              companies often claim state-level Reg D exemptions, the absence of any federal filing is unusual for a
              company of this scale. More importantly, no Series D has been publicly confirmed between the 2022 Series C
              and April 2024 Series E—a two-year gap during which the company could have raised an undisclosed bridge,
              extension, or venture debt facility. Cap table uncertainty requires data room verification.
            calloutType: insight
            claimRefs:
