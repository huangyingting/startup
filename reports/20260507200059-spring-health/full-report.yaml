  productSummary: |
    Spring Health's product suite spans five layers: (1) SpringWorks — enterprise benefits
    administration with smart matching, EAP coordination, and employer analytics dashboard;
    (2) Guide AI — proactive AI-driven mental health navigation that identifies at-risk members
    and prompts evidence-based care pathways before crisis; (3) Atlas — longitudinal outcomes
    tracking platform; (4) Compass — provider-facing EHR and clinical documentation tool;
    (5) Specialty Care — substance use disorder (SUD) and complex mental health programs.
    The Alma acquisition adds a consumer therapist marketplace with 10,000+ in-network
    therapists. Spring Health also provides SpringLife (member-facing app, self-guided tools,
    content library including Bloom). The guaranteed ROI model (cost-neutral Year 1, 1.5×
