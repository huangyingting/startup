companyProfile:
  summary: |
    Spring Health is a New York City–based precision mental health benefits company founded in
    2016 by CEO April Koh and President/Chief Scientific Officer Adam Chekroud. The company
    offers a vertically integrated employer mental health benefits platform — SpringWorks
    (employer), SpringLife (consumer/member), Guide AI (proactive care navigation), Compass
    (provider EHR), Atlas (longitudinal outcome tracking), and Specialty Care (SUD) — covering
    more than 20 million lives across 450+ direct enterprise employers including Microsoft,
    Target, J.P. Morgan Chase, Delta Airlines, and Wawa. Spring Health's clinical outcomes
    differentiation is anchored by a 2025 JAMA Psychiatry peer-reviewed RCT showing 1.9× ROI
    and 50% lower hospitalization rates vs. standard EAP, and a Validation Institute 2025
    certification confirming 21% net savings. The company completed the acquisition of Alma
    (consumer therapist marketplace, 10,000+ in-network therapists) in 2025 and obtained a
    California Knox-Keene health plan license in 2025. Spring Health raised $100M at a $3.3B
    valuation in April 2024 (Series E, led by Generation Investment Management); total capital
    raised is approximately $488M. The company has been recognized on TIME100 Most Influential
    Companies 2026. Revenue and ARR are not publicly disclosed.
