  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              Spring Health participates in the US employer-sponsored behavioral health benefits market as its primary
              served market, with secondary access to the broader managed behavioral health market (health plans,
              Medicaid, Medicare Advantage) via its 2025 Knox-Keene license.

              The market is segmented into four distinct spend pools: (1) Legacy EAP (Employee Assistance
              Programs)—phone-based counseling with 5–8% average utilization; (2) traditional mental health carve-outs
              managed by Magellan, Optum, or Beacon—high cost, low member experience; (3) digital-first point solutions
              (Spring Health, Lyra, Modern Health)—full-spectrum platforms replacing legacy EAP with clinically measured
              outcomes; and (4) consumer direct- pay apps (Headspace, Calm, BetterHelp)—low acuity, no employer
              integration. Spring Health competes in pool 3 and is displacing pool 1 and 2 contracts.

              Excluded from Spring Health's addressable market (as of 2026): inpatient psychiatric hospital stays,
              residential substance use treatment, clinical drug trials, and direct-to- consumer mental health apps
              without employer contracts. The Alma combination introduces a hybrid: consumer-facing therapist
              marketplace for members post-employment, but this is an ancillary channel, not the primary revenue driver.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
      - number: '2.2'
        title: TAM, SAM, and SOM Sizing
        blocks:
          - type: paragraph
            body: >
              Total Addressable Market (TAM): The global behavioral health market was estimated at $95– $105B in 2022
              and is projected to reach approximately $177B by 2030 at a 7–8% CAGR. US behavioral health total direct
              spending was estimated at approximately $280B in 2022, representing the single largest national market
              globally. Within the US, employer-sponsored insurance covers approximately 165 million Americans under
              employment-based health plans (KFF 2024 Employer Health Benefits Survey). The employer mental health spend
              is approximately $182–$220 per employee per year across benefits (inclusive of EAP and behavioral health
              carve-outs), implying a US employer TAM of $30–$36B annually.

              Serviceable Addressable Market (SAM): Spring Health targets mid-to-large employers (500+ employees) and
              national health plans. The US has approximately 40,000–45,000 employer groups with 500+ employees,
              covering ~95 million workers. At a conservative $150 PEPM potential for a comprehensive mental health
              platform, the Spring Health SAM is approximately $17–$20B per year. The digital-first employer mental
              health platforms (Spring Health, Lyra, Modern Health combined) have penetrated fewer than 10% of this SAM
              as of 2025.

              Serviceable Obtainable Market (SOM): Spring Health serves 450+ direct employer clients and 27,000 channel
              partner groups covering 20M+ lives as of 2025. At a mid-range PEPM of $30– $50 and 20M covered lives, this
              implies ~$7.2B–$12B annual implied revenue potential if fully activated—with actual ARR undisclosed.

              A contradictory estimate exists: the Mental Health Apps market (MarketsandMarkets 2026) is valued at
              $9.94B in 2025 and projected to reach $22.73B by 2030. This is a narrower digital-only slice; Spring
              Health's market includes traditional EAP replacement and health plan contracting which is larger.
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
              - CM010
              - CM011
      - number: '2.3'
        title: Market Drivers and Constraints
        blocks:
          - type: paragraph
            body: >
              Growth drivers operating over the 2024–2030 period: (1) Mental health crisis—23.4% of US adults (61.5M
              people) experience a mental illness in any given year (NAMI 2024); 1 in 20 have serious mental illness;
              adolescent female mental health has worsened continuously since 2019. (2) Employer cost and productivity
              imperative—mental health conditions cost US employers $16.8B+ annually in lost productivity and 200M+
              workdays; 50% of Millennials and 75% of Gen Z have left jobs for mental health reasons, making this a
              talent retention issue. (3) Mental health parity regulation—the MHPAEA (2008) and its 2024 final rule
              require employer-sponsored health plans to provide equivalent coverage for mental health and substance use
              as for medical/surgical conditions, creating compliance pressure to upgrade legacy EAP. (4) Telehealth
              permanence—post-COVID telehealth adoption has normalized virtual behavioral health care, lowering session
              drop-off and enabling national provider networks. (5) Precision AI evidence—the 2025 JAMA validation of
              Spring Health's platform gave digital behavioral health enterprise-grade clinical proof for the first
              time.

              Market constraints: (1) Provider shortage—the US faces a shortage of licensed psychiatrists and
              therapists, estimated at a shortfall of 7,000+ psychiatrists nationwide (HRSA). Building a 10,000+ quality
              provider network is a significant supply barrier. (2) Employer budget cycles—benefits decisions are
              typically made annually during open enrollment, slowing platform transitions. (3) Integration
              complexity—employer HR and payroll systems, insurer claims adjudication, and mental health platforms
              require deep API integration. (4) ROI skepticism—despite growing peer-reviewed evidence, many CFOs still
              question whether digital behavioral health delivers measurable financial returns. (5) Privacy and
              stigma—employees fear that using mental health benefits through an employer-sponsored platform exposes
              their usage data to their employer.
            claimRefs:
              - CM012
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
              - CM020
              - CM021
      - number: '2.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Mental health parity regulation is the biggest enterprise sales catalyst
            body: >
              The DOL/HHS/Treasury 2024 final rule under the Mental Health Parity and Addiction Equity Act requires
              employers to demonstrate that their behavioral health benefits are equivalent to medical/surgical
              coverage—a requirement that most legacy EAP products structurally fail. This compliance imperative is
              driving large employers to evaluate Spring Health as a replacement, independent of ROI arguments.
              Regulatory tailwind is a structural market driver that competes on mandatory action, not optional upgrade.
            calloutType: insight
            claimRefs:
              - CM015
              - CM016
              - CM003
          - type: callout
            title: Spring Health serves <3% of its SAM; scaling beyond 450 employers is unproven
            body: >
              With 450+ direct employers in a SAM of ~40,000 groups with 500+ employees, Spring Health has penetrated
              less than 2% of its primary market. While this demonstrates significant upside, the company's growth model
              has yet to prove whether it can scale beyond its current blue-chip anchor accounts into the mid-market,
              where HR departments are smaller and price sensitivity is higher. The company's disclosed 27,000
              channel-partner groups provide volume coverage, but unit economics in channel relationships may differ
              from direct sales.
            calloutType: insight
            claimRefs:
              - CM007
              - CM008
              - CM020
          - type: callout
            title: Provider shortage constrains the entire digital behavioral health sector
            body: >
              The US faces a shortage of 7,000+ psychiatrists and a broader clinician gap that affects all digital
              mental health platforms equally. Spring Health's 10,000+ provider network is a meaningful asset, but
              adding providers faster than competitors is a supply-constrained arms race. Platforms that solve
              quality—not just volume—will win. Spring Health's precision matching model claims to reduce provider
              mis-match, but the underlying provider scarcity is a structural headwind for the entire sector's growth
              rate.
            calloutType: insight
            claimRefs:
              - CM018
              - CM019
              - CM021
