chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Business Model, and Product Platform
        blocks:
          - type: paragraph
            body: |
              Spring Health is a precision mental health benefits company headquartered in New York City,
              founded in 2016 by CEO April Koh and President Adam Chekroud. Its mission is "Eliminating
              every barrier to mental health." The company operates a B2B subscription model—selling
              behavioral health benefit programs to self-insured employers and health plans on a per-
              employee-per-month (PEPM) basis. Employees and their dependents receive access at no
              out-of-pocket cost. As of 2025, Spring Health covers 20M+ lives globally, serves 450+
              direct employers, and reaches 27,000 additional groups through channel partners.

              Spring Health differentiates through Precision Mental Healthcare—a proprietary AI system
              that screens members for 12+ mental health conditions in a 3–5 minute assessment and
              automatically routes each person to the optimal care modality: digital self-guided exercises,
              coaching, therapy (virtual or in-person), psychiatry/medication management, EAP services,
              or specialty care for complex conditions. First appointments are achieved in less than one
              day. The product platform spans: SpringLife (individual/family benefits), SpringWorks
              (manager mental health), Guide (AI continuous care companion, launched 2025), Compass
              (purpose-built provider EHR), Atlas (employer ROI analytics), and Specialty Care (substance
              use, PTSD, eating disorders, severe mood/anxiety). LinkedIn reports 1,001–5,000 employees
              with hubs in New York, San Francisco, Salt Lake City, and Seattle.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
      - number: '1.2'
        title: Founders, Leadership, Scientific Advisors, and Governance
        blocks:
          - type: paragraph
            body: |
              April Koh (CEO, Co-founder) previously worked at McKinsey and Google; a personal connection
              to mental health challenges in her family animates the company's mission. Adam Chekroud
              (President, Co-founder) holds a DPhil in computational neuroscience from Oxford and was a
              research scientist at Yale School of Medicine, where he published predictive-analytics work
              on antidepressant treatment selection that formed the scientific nucleus of Precision Mental
              Healthcare. Arielle Mortimer joined as Chief Operating Officer in 2024. Dipak Golechha,
              CFO of Palo Alto Networks, joined the board in 2025, signaling enterprise-technology
              investor validation. No other C-suite members are publicly named, creating concentrated
              key-person risk in the two founders whose combined scientific, clinical, and fundraising
              roles are difficult to replace.

              Spring Health's Scientific Advisory Board includes: John Krystal, MD (Chair of Psychiatry
              at Yale University School of Medicine, Chief of Psychiatry at Yale-New Haven Health System,
              known for ketamine/depression research); Myrna Weissman, PhD (Columbia University, developer
              of Interpersonal Psychotherapy for depression); Nikolaos Koutsouleris, MD (Ludwig Maximilian
              University of Munich, machine learning in psychiatry); Svetha Venkatesh, PhD (Deakin
              University, pattern recognition and data analytics); and Martin Paulus, MD (Scientific
              Director, Laureate Institute for Brain Research). This bench of internationally recognized
              academic psychiatrists confers clinical credibility rare among employer benefits platforms.
            claimRefs:
              - CO007
              - CO008
              - CO009
              - CO010
              - CO011
      - number: '1.3'
        title: Funding, Valuation, and Key Milestones
        blocks:
          - type: paragraph
            body: |
              Spring Health has raised over $488M in disclosed venture financing. Confirmed rounds:
              Series A ($22M, 2020, Kinnevik/Work-Bench); Series B ($76M, 2021, Tiger Global); Series C
              ($190M, 2022, Tiger Global, $2B post-money); and Series E ($100M, April 2024, $3.3B post-
              money, Fortune exclusive). No Series D has been publicly confirmed, creating an unexplained
              two-year gap. Investors include Tiger Global, Kinnevik, and William Blair.

              Cover metrics as of the research window: valuation $3.3B (April 2024); disclosed raised
              $488M+; 20M+ covered lives; 10,000+ providers; 450+ direct employers; 1,001–5,000 employees;
              revenue undisclosed. In-window milestones (post 2024-05-07): Validation Institute 2025 third-
              party validation of 21% net savings on mental health spend; JAMA Network Open 2025 peer-
              reviewed study validating 1.9× ROI and 50% lower hospital costs—the strongest independent
              clinical proof in the digital behavioral health market; Alma combination completed (2025)
              creating the first lifelong mental health platform spanning from initial care through
              long-term support; Knox-Keene managed behavioral health license in California (2025) opening
              the health-plan managed care market; Guide AI companion launched (2025); Dipak Golechha
              (CFO, Palo Alto Networks) joined board (2025); and named to TIME100 Most Influential
              Companies 2026.

              Competitive context: Spring Health's full-spectrum platform—spanning digital self-care,
              coaching, therapy, psychiatry, EAP, and specialty care in one solution—contrasts with
              competitors that address only one or two care modes. The peer-reviewed JAMA validation and
              the guaranteed ROI commitment are differentiators no pure EAP provider has matched publicly.
            claimRefs:
