  - id: TV006
    title: Final Diligence Asks Table
    description: |
      Top diligence questions that must be answered in the data room before full investment conviction on Spring Health.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - ARR and Revenue Composition
        - >-
          Annual recurring revenue by channel (employer direct, channel partners, health plans); net revenue retention
          by cohort vintage (2020–2024)
        - >-
          The entire valuation thesis depends on ARR; without confirmation, the $130–300M analyst range is too wide to
          underwrite any multiple
        - CFO data room; audited financial statements or management accounts; investor update letter
      - - MHPAEA NQTL Comparative Analysis
        - >-
          Spring Health's comparative NQTL analysis for utilization management, prior authorization, and network
          adequacy vs. medical/surgical equivalents
        - >-
          Employer clients bear primary MHPAEA compliance obligation; if Spring Health's protocols create violations,
          employer clients face DOL penalties and will be forced to modify or terminate the contract
        - General counsel and compliance team; independent MHPAEA counsel review
      - - Guide AI Clinical Liability and Insurance
        - >-
          Guide AI clinical decision support legal opinion (UPL, FDA SaMD, negligence); errors-and-omissions /
          malpractice insurance coverage and limits
        - >-
          If Guide makes a proactive recommendation that leads to patient harm, liability could be entity-level; the
          guaranteed ROI model and proactive outreach increase exposure
        - Chief Medical Officer; legal counsel; insurance broker; clinical advisory board
      - - Channel Economics and Unit Cohort Data
        - >-
          Employer PMPM, employer CAC, payback period, and account-level NRR by 12/24/36-month cohort; health plan PMPM
          and contract terms
        - >-
          Channel economics determine sustainable growth rate and margin floor; health plan economics likely materially
          different from employer
        - CFO and sales ops data room; commercial team presentation
      - - Cap Table and Liquidation Preference Stack
        - >-
          Series A–E share classes, liquidation preferences, anti-dilution provisions, ratchets, and participation
          rights; total diluted share count
        - >-
          At $3.3B valuation, preferred preference stack could consume meaningful proceeds in a sub-$5B exit; common
          returns depend heavily on capital structure
        - Legal; cap table model from CFO; Series E term sheet disclosures
      - - Alma Integration Progress and Synergy Plan
        - >-
          Integration milestones, ARR contribution from Alma, technology integration roadmap, and projected synergy
          timeline post-2025 acquisition
        - >-
          Acquisition risk is material; integration failures have impaired Teladoc by $13B+ and other acquirers
          significantly; unclear whether Alma ARR is additive or cannibalistic
        - Integration PMO; product and engineering leads; Alma legacy customer retention data
