  - id: TV002
    title: Thesis / Anti-Thesis Table
    description: |
      Main investment thesis arguments and anti-thesis counterpoints for Spring Health.
    columns:
      - Type
      - Argument
      - What Would Change the View
    rows:
      - - Thesis
        - >-
          JAMA 2025 RCT provides peer-reviewed, independently validated clinical outcomes evidence — a defensible moat
          competitors cannot quickly replicate
        - Replication studies showing similar outcomes for lower-cost competitors (Lyra, Modern Health)
      - - Thesis
        - >-
          MHPAEA 2024 Final Rule enforcement creates new compliance demand wave for employer-facing mental health
          programs with documented NQTL analysis
        - DOL delays MHPAEA enforcement or exempts employer self-insured plans from new audit requirements
      - - Thesis
        - >-
          20M covered lives and 450+ direct employer relationships represent substantial contractual ARR base with 1–3
          year renewal cycles
        - Annual employer churn data showing >15% gross logo attrition
      - - Thesis
        - >-
          Guaranteed ROI (cost-neutral Year 1, 3× Year 3) aligns Spring Health's revenue model with employer ROI and
          reduces churn risk
        - Material guarantee payout events or actuarial reserve disclosure showing inadequate backing
      - - Thesis
        - >-
          Alma combination and Knox-Keene license open health plan and consumer channels, diversifying from
          single-channel employer risk
        - >-
          Health plan channel economics materially worse than employer (lower PMPM, longer sales cycles, payer pricing
          pressure)
      - - Anti-Thesis
        - >-
          No disclosed ARR, NRR, or unit economics; all valuation depends on analyst estimation with wide confidence
          intervals ($130–300M ARR range)
        - Audited ARR confirmation in the $200M+ range would substantially increase conviction
      - - Anti-Thesis
        - >-
          Public mental health telehealth comps (Teladoc, Talkspace, Accolade) have re-rated to 1–3× ARR; Spring
          Health's 11–25× premium requires sustained growth premium
        - Public comp re-rating to 5–8× ARR as digital health sector recovers
      - - Anti-Thesis
        - >-
          Guide AI proactive mental health intervention has no regulatory clearance, FDA AI/ML guidance is evolving, and
          clinical liability is unquantified
        - >-
          Regulatory safe harbor or FDA enforcement discretion guidance covering AI-driven behavioral health
          recommendations
