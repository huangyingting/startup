  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    description: >
      Material events or thresholds that would break the bull or base investment thesis for Spring Health, with
      transmission logic and action implication.
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - ARR confirmed below $100M
        - Audited ARR < $100M at $3.3B valuation implies >33× multiple — unjustifiable vs. public comps at 2–3×
        - Fundamental overvaluation; no growth rate that closes the gap to public comparables in 5 years
        - No-invest; revise downward; watch for restructuring signals
      - - Employer gross logo churn > 15% annually
        - Sustained annual employer account attrition exceeding 15% signals structural product-market fit erosion
        - NRR likely below 90%; growth dependent entirely on new logos; ARR ceiling appears
        - Conditional no-invest pending churn root-cause analysis
      - - Material FTC enforcement action (AI data sharing)
        - FTC complaint or consent order naming Spring Health for unauthorized mental health data sharing
        - Guide AI paused; enterprise sales freeze; settlement cost material; class action risk
        - Immediate review; position exit if risk of revenue disruption confirmed
      - - MHPAEA enforcement naming Spring Health's protocols as parity violations
        - DOL EBSA audit finding Spring Health's utilization management creates discriminatory NQTL
        - Employer clients must modify or drop Spring Health plan design; churn cascade
        - Conditional sell; monitor employer renewal cadence for 6 months post-finding
      - - Next round at materially lower valuation (down-round > 30%)
        - Spring Health raises new capital at $2.3B or below
        - Signals fundamental miss on growth or profitability targets vs. Series E commitments
        - Review anti-dilution provisions; thesis revision required; new due diligence cycle
      - - Guide AI clinical adverse event with regulatory escalation
        - State medical board or FDA enforcement action for Guide-driven clinical harm
        - AI product paused; liability reserve required; employer clients may terminate
        - Immediate risk assessment; likely thesis-break depending on severity and scope
