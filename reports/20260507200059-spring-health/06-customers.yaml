acknowledgedWarnings:
  - dimension: figureType
    reason: >
      Planned figure types (funnel, flow, matrix, cohort) were substituted with bar charts because Spring Health does
      not disclose funnel metrics (lead-to-customer conversion), cohort retention data, or visual process flows for
      customer acquisition. Bar charts effectively represent customer scale growth, outcome metrics, and evidence
      quality tier. No funnel data, matrix comparison data, or cohort data is available from public sources; this
      substitution is the most appropriate representation given the evidence available and is documented in
      evidenceGaps.
callouts:
  - id: KU001
    type: insight
    title: JAMA and Validation Institute provide the strongest independent customer ROI evidence
    body: >
      Spring Health is unusual among employer mental health platforms in having two independent validation studies—JAMA
      Network Open (peer-reviewed, 2025) and the Validation Institute actuarial certification (2025)—that corroborate
      company-stated ROI claims. Most competitors rely on internal studies or self-reported satisfaction metrics. The
      existence of independent, methodologically distinct validations (RCT-style clinical study vs. actuarial claims
      analysis) significantly de-risks the customer value proposition for enterprise procurement teams that require
      evidence-based benefit selection.
    claimRefs:
      - CU006
      - CU008
  - id: KU002
    type: risk
    title: Named customer testimonials lack specific ROI data; JAMA study population may not be representative
    body: >
      Six of eight named customers have no specific outcome metric publicly disclosed—only the Wellstar case study and
      JAMA 2025 include quantified ROI figures. The JAMA study population (~100K employer-enrolled members) is a subset
      of Spring Health's full customer base; extrapolating its 1.9× ROI to all 450+ employer clients assumes consistent
      clinical implementation across organizations with different workforce demographics, mental health prevalence, and
      engagement incentives. A benefits buyer who reads the JAMA ROI as universally applicable to their specific
      population may overstate the expected return.
    claimRefs:
      - CU007
      - CU009
