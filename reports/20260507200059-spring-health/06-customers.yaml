company:
  name: Spring Health
chapter:
  order: 6
  number: 6
  title: Customers and Traction
  summary: >
    Spring Health serves 450+ direct enterprise employers and 27,000+ channel-partner groups covering 20M+ lives as of
    2026. Named customers include Microsoft, Target, J.P. Morgan Chase, Delta Airlines, Wawa, Wellstar Health System,
    and Hearst. The most rigorously validated customer outcome is the Wellstar case study ($4.30 saved per $1 invested)
    and the JAMA 2025 study (1.9× ROI, 50% lower hospital costs) drawn from ~100K employer-enrolled members.
    Point32Health (2025) represents the company's first major health plan channel win, enabled by the Knox-Keene
    license. Third-party buyer validation from the Validation Institute (21% net savings) and three URAC accreditations
    anchor the value proposition for benefits decision-makers. The customer base is concentrated in large employers and
    white-collar industries (finance, retail, healthcare systems, media); geographic distribution is US-centric with
    early international expansion signals. Customer acquisition is primarily through direct enterprise sales and channel
    partners (TPAs, health plans, benefits brokers).
sections:
  - id: SU001
    title: Named Customer Base and Segment Profile
    body: >
      Spring Health's disclosed customer roster spans multiple large-employer verticals. Anchors include Microsoft
      (technology, tens of thousands of global employees), Target (retail, 400,000 team members), J.P. Morgan Chase
      (finance, ~300,000 employees), Delta Airlines (transportation, ~95,000 employees), Wawa (food retail, 45,000+
      associates), and Wellstar Health System (Georgia-based health system, 24,000+ employees). These named accounts
      cover an estimated 900,000+ direct employees and represent the blue-chip logo portfolio typical of an enterprise
      benefits platform at the $3.3B valuation stage.

      The vertical mix is notable for its breadth: healthcare systems (Wellstar), financial services (JPMorgan),
      technology (Microsoft), retail (Target, Wawa), and transportation (Delta). This cross-industry diversification
      mitigates vertical concentration risk; no single sector appears to account for more than 20–30% of revenue based
      on the disclosed logo mix. Hearst (media/publishing) and Point32Health (health plan) round out the publicly
      confirmed set, indicating penetration into media and managed-care channels.

      The employer channel accounts for 450+ direct clients and 27,000+ channel-partner groups. The vast majority of the
      20M covered lives come from the channel-partner segment (TPAs, health plans, benefits brokers), where Spring
      Health has significantly lower per-life revenue than direct employer accounts. Customer acquisition is primarily
      outbound enterprise sales, supplemented by benefits broker / TPA channel introductions.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
    tableRefs:
      - TU001
      - TU004
    figureRefs:
      - FU001
  - id: SU002
    title: Customer Outcomes Evidence and ROI Validation
    body: >
      Spring Health's customer value proposition is anchored by four independent or semi-independent validation studies.
      First, the Wellstar Health System case study (published by Spring Health, 2023) documented $4.30 saved per $1
      invested by Wellstar employees and their families—a 4.3× ROI—representing the most granular single-employer
      outcome published. Second, the JAMA Network Open 2025 study, peer-reviewed and independent, demonstrated 1.9× ROI,
      50% lower hospital costs, and 5.9-week average recovery time for depression across a large employer cohort of
      approximately 100,000 enrolled members.

      Third, the Validation Institute 2025 certification validated 21% net savings on mental health spend across Spring
      Health's employer client base—applying actuarial methods to claims data rather than self-reported surveys. Fourth,
      the URAC triple accreditation (clinical care, crisis programs, and wellness) provides quality-of-care validation
      from an independent accreditation body rather than an outcomes study.

      Platform-level metrics (disclosed by Spring Health): 92% clinical improvement rate; 95% member retention with
      Spring Health-recommended provider; 67% member improvement in mental health conditions (employer testimonial); 25%
      enrollment within first 30 days at one unnamed employer; 90% provider satisfaction rating. These are self-reported
      metrics whose methodology is not disclosed; the JAMA and Validation Institute studies provide independent
      corroboration for a subset of these claims.
    claimRefs:
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
    tableRefs:
      - TU002
      - TU005
    figureRefs:
      - FU002
      - FU004
  - id: SU003
    title: Customer Acquisition, Retention, and Competitive Displacement
    body: >
      Spring Health's primary customer acquisition channel is direct enterprise sales to HR and benefits leaders at
      organizations with 500+ employees. The company has disclosed a guaranteed 3× ROI commitment by Year 3 (with 2× by
      Year 2 and cost neutrality in Year 1)—a financially backed performance guarantee that reduces procurement risk for
      HR buyers and differentiates Spring Health from competitors offering outcome-tracking but no financial guarantee.
      This guarantee creates a selection effect: only customers with sufficient population density for statistically
      meaningful ROI measurement would commit, which may bias the disclosed customer base toward large employers with
      2,000+ enrolled employees.

      The channel-partner route (27,000+ groups) is driven by TPA relationships (Stonebrook Risk Solutions, 2025),
      benefits brokers, and health plan integrations. Point32Health's selection of Spring Health (2025) as its
      behavioral health benefits partner represents the most significant health plan customer win publicly disclosed,
      signaling that the Knox-Keene model is commercially viable.

      Customer retention signals are strong but self-reported: the URAC accreditation requirement implies ongoing
      quality standards maintenance; Wellstar and JPMorgan have not publicly announced a departure (as of the run date).
      Competitive displacement from legacy EAP vendors (Optum, Lyra as replacement rather than as de novo spend) is
      documented in the employer testimonials but net revenue retention rate is not disclosed.
    claimRefs:
      - CU013
      - CU014
      - CU015
      - CU016
      - CU017
    tableRefs:
      - TU003
    figureRefs:
      - FU003
