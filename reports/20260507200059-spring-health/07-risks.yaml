  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Spring Health's data sharing practices with third-party analytics and marketing vendors
      missingEvidence: >-
        Spring Health has not publicly disclosed which third-party analytics or marketing vendors receive member
        engagement data. Post-BetterHelp FTC precedent makes this a material compliance question.
      whyItMatters: >-
        If Spring Health uses standard analytics SDKs that transmit member engagement data to advertising platforms, the
        FTC BetterHelp precedent creates direct regulatory exposure.
      diligencePath: >-
        Request data flow diagram, third-party data sharing inventory, and privacy counsel opinion on FTC Act
        compliance.
      relatedQuestionRefs:
        - QR004
        - QR027
      relatedTableRefs:
        - TR006
    - type: missing-source
      severity: material
      topic: MHPAEA NQTL compliance analysis for Spring Health's utilization management protocols
      missingEvidence: >-
        Spring Health has not disclosed any MHPAEA comparative NQTL analysis. The 2024 final rule requires plan sponsors
        to document that Spring Health's utilization management criteria are no more restrictive than medical/surgical
        equivalents.
      whyItMatters: >-
        Employer clients bear the primary MHPAEA compliance obligation; if Spring Health's protocols create parity
        violations, employer clients face DOL enforcement risk—and will pressure Spring Health to modify protocols.
      diligencePath: >-
        Commission independent MHPAEA NQTL analysis covering prior authorization, utilization management, and network
        adequacy protocols.
      relatedQuestionRefs:
        - QR005
        - QR006
