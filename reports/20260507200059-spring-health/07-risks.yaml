callouts:
  - id: KR001
    type: risk
    title: BetterHelp FTC precedent creates direct data-sharing liability for Spring Health
    body: >
      The FTC's 2023 BetterHelp consent order established that sharing mental health status, engagement history, or
      treatment data with advertising platforms—even if disclosed in a privacy policy—violates the FTC Act. Spring
      Health's employer analytics dashboards, marketing analytics tools, and potential use of third-party tracking
      pixels must be evaluated against this standard. The company's zero-retention AI training claim is not equivalent
      to a no-third-party-sharing commitment. Without a public disclosure of its data sharing practices with analytics
      vendors, the BetterHelp risk remains unaddressed.
    claimRefs:
      - CR008
      - CR009
      - CR010
  - id: KR002
    type: risk
    title: MHPAEA 2024 final rule introduces new NQTL compliance burden for employer plan sponsors using Spring Health
    body: >
      The 2024 MHPAEA final rule requires employer-sponsored health plans to conduct and document formal comparative
      analyses of NQTLs for MH/SUD versus medical/surgical benefits. Spring Health's prior authorization processes,
      network adequacy standards, and utilization management criteria are all NQTLs subject to parity analysis. If
      Spring Health's clinical model imposes more restrictive NQTLs on mental health care than the employer plan imposes
      on comparable medical services, Spring Health's employer clients face DOL enforcement exposure—and could pressure
      Spring Health to modify its clinical protocols, expand its network, or remove utilization limits.
    claimRefs:
      - CR001
      - CR002
      - CR003
