  claims:
    - id: CR001
      statement: >-
        The MHPAEA 2024 final rule (effective for plan years starting January 2025) requires employer-sponsored health
        plans using Spring Health to conduct formal comparative NQTL analyses for mental health and substance use
        disorder benefits—a new compliance obligation that directly implicates Spring Health's prior authorization,
        utilization management, and network adequacy protocols.
      type: third-party-reported
      topic: regulatory
      sourceRefs:
        - SR001
        - SR014
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR005
        - QR006
    - id: CR002
      statement: >-
        MHPAEA enforcement by the DOL Employee Benefits Security Administration (EBSA) and HHS has increased
        substantially in 2023–2025; the 2024 final rule gives enforcement agencies direct authority to require employers
        to produce NQTL analysis documentation—creating a new compliance workflow for Spring Health's employer clients.
      type: third-party-reported
      topic: regulatory
      sourceRefs:
        - SR001
        - SR014
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR005
    - id: CR003
      statement: >-
        Spring Health's telehealth-first model and <2 day time-to-appointment standard actually support MHPAEA network
        adequacy parity—a favorable compliance position—but its utilization management criteria and prior authorization
        practices for specialty care must be analyzed to ensure they are no more restrictive than the employer's
        medical/surgical utilization management.
      type: inferred
      topic: regulatory
      sourceRefs:
        - SR001
        - SR006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR006
    - id: CR004
      statement: >-
        Spring Health operates under the California Knox-Keene Health Care Service Plan Act following its 2025 license,
        subjecting its California health plan operations to DMHC oversight—including solvency requirements, member
        grievance and appeals processes, and network adequacy standards specific to managed care plans.
      type: company-claimed
      topic: regulatory
      sourceRefs:
        - SR005
        - SR006
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR007
    - id: CR005
      statement: >-
        42 CFR Part 2 (SAMHSA) imposes stricter-than-HIPAA consent requirements for the use and disclosure of substance
        use disorder treatment records. Spring Health's Specialty Care SUD pathways (launched 2023) create a direct 42
        CFR Part 2 compliance obligation for any data sharing of SUD member records with employer analytics dashboards—a
        requirement Spring Health has not publicly addressed.
      type: inferred
      topic: regulatory
      sourceRefs:
        - SR008
        - SR027
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR008
    - id: CR006
      statement: >-
        Spring Health is a HIPAA Business Associate (BA) for employer health plan sponsors. A breach of PHI at Spring
        Health's 20M covered lives scale would trigger the HHS OCR Breach Notification Rule, require notification to
        affected individuals and the media, and could result in OCR civil money penalties up to $1.9M per violation
        category per year.
      type: inferred
      topic: legal-risk
      sourceRefs:
        - SR002
        - SR026
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
        - QR002
    - id: CR007
      statement: >-
        Spring Health has not disclosed any HIPAA breach, OCR enforcement action, or data privacy incident as of the run
        date. The absence of a disclosed breach does not confirm zero risk; at 20M covered lives scale, the probability
        of an attempted breach is non-trivial even with strong controls.
      type: observed
      topic: HIPAA
      sourceRefs:
        - SR002
        - SR011
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR002
    - id: CR008
      statement: >-
        The FTC's 2023 consent order against BetterHelp—fined $7.8M and ordered to stop sharing mental health data with
        advertising platforms—established that disclosing mental health status or engagement data to third-party
        advertisers violates the FTC Act even when disclosed in a privacy policy.
      type: third-party-reported
      topic: legal-precedent
      sourceRefs:
        - SR003
        - SR004
        - SR021
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QR003
        - QR011
    - id: CR009
      statement: >-
        The BetterHelp FTC enforcement pattern directly applies to Spring Health's use of marketing analytics tools,
        employer dashboard reporting, and any third-party data sharing that includes member mental health status,
        therapy engagement, or diagnostic data. Spring Health has not publicly disclosed its data sharing practices with
        third-party analytics or marketing vendors.
      type: inferred
      topic: legal-risk
      sourceRefs:
        - SR003
        - SR021
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR004
    - id: CR010
      statement: >-
        JD Supra analysis (2024) confirms that post-BetterHelp, the FTC has made mental health data privacy a top
        enforcement priority—and that digital health platforms using standard analytics SDKs (Google Analytics, Facebook
        Pixel, etc.) that transmit mental health engagement data to third parties face material FTC enforcement
        exposure.
      type: third-party-reported
      topic: legal-risk
      sourceRefs:
        - SR021
        - SR004
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QR004
    - id: CR011
      statement: >-
        Optum's Behavioral Health division (UnitedHealth Group) serves 95M+ covered lives, owns an integrated provider
        network, has Epic EHR integration, and operates as a payer-owned solution with embedded health plan
        distribution—structural advantages over Spring Health in the PMPM health plan channel that Spring Health's
        Knox-Keene model directly competes with.
      type: third-party-reported
      topic: competitive-risk
      sourceRefs:
        - SR012
        - SR023
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR013
    - id: CR012
      statement: >-
        Lyra Health's $4.8B valuation (most recent confirmed) and active clinical expansion—adding psychiatry, EAP
        replacement, and outcomes measurement capabilities—positions it as the primary direct competitor to Spring
        Health in the large employer mental health segment.
      type: third-party-reported
