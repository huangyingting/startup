  productSummary: |
    Spring Health's product suite spans five layers: (1) SpringWorks — enterprise benefits
    administration with smart matching, EAP coordination, and employer analytics dashboard;
    (2) Guide AI — proactive AI-driven mental health navigation that identifies at-risk members
    and prompts evidence-based care pathways before crisis; (3) Atlas — longitudinal outcomes
    tracking platform; (4) Compass — provider-facing EHR and clinical documentation tool;
    (5) Specialty Care — substance use disorder (SUD) and complex mental health programs.
    The Alma acquisition adds a consumer therapist marketplace with 10,000+ in-network
    therapists. Spring Health also provides SpringLife (member-facing app, self-guided tools,
    content library including Bloom). The guaranteed ROI model (cost-neutral Year 1, 1.5×
    Year 2, 3× Year 3) is the primary commercial differentiation.
  customerFocus: "B2B enterprise employers (self-insured plans; 450+ direct accounts); growing health plan channel (Knox-Keene license; Point32Health first customer); 27,000 channel-partner employee benefit groups; consumer via Alma (10,000+ in-network therapists)"
  businessModel: "Employer SaaS: per-member-per-month recurring revenue from employer benefits contracts; additional revenue from health plan contracts; consumer marketplace revenue from Alma; ROI guarantee structure creates contractual stickiness"
  stage: "Late growth / Series E"
  fundingStatus: "$488M raised total; Series A $22M (2020, Kinnevik/Work-Bench), Series B $76M (2021, Tiger Global), Series C $190M at $2B val (2022), Series E $100M at $3.3B val (April 2024, Generation Investment Management lead); no Series D confirmed"
