  this report are analyst estimates derived from 20M covered lives × estimated PMPM rates
  and public funding context; the range is $130–300M ARR. The $3.3B Series E valuation is
  confirmed from the April 2024 press release and contemporaneous media coverage. The Alma
  acquisition completion (2025) is confirmed from public announcements. All clinical outcome
  statistics (JAMA 2025 RCT, Validation Institute 2025, Wellstar ROI) are drawn from
  peer-reviewed or third-party sources. Forward estimates, scenarios, and multiples are
  analyst-derived and should be treated as illustrative approximations, not confirmed
  projections.

