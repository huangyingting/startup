            body: >
              SEC EDGAR 未返回 Spring Health, Inc. 或已知实体名称下的 Form D 文件。虽然私营公司常主张州层面的 Reg D
              豁免，但对这种规模的公司来说，没有任何联邦文件并不常见。更重要的是，2022 年 Series C 到 2024 年 4 月 Series E 之间没有公开确认的 Series
              D——这两年里，公司可能完成了未披露的桥接轮、延展轮或风险债务额度。股权结构不确定性需要在数据室核验。
            calloutType: insight
            claimRefs:
              - CI005
              - CI013
              - CI014
          - type: callout
            title: CFO 董事任命释放 IPO 或后期资本事件准备信号
            body: >
              2025 年任命 Dipak Golechha（Palo Alto Networks CFO）进入 Spring Health 董事会，是通常与 IPO 准备或后期机构融资相关的治理信号。Palo Alto
              Networks 是上市企业科技公司；Golechha 在公开市场财务运营、投资者关系和治理方面的经验，可为 Spring Health 当前阶段所需的董事会能力补位。这并不确认 IPO 时间表，但对运行日期后
              12–24 个月内的财务事件而言，是有意义的董事会构成指标。
            calloutType: insight
