  - id: FV004
    title: Spring Health 投资 KPI——IC 评分
    type: kpi
    layout: standard
    description: |
      为投资委员会准备的 Spring Health 八项关键尽调维度评分。每项 1–5 分（5 = 证据 / 确信度极强；1 = 重大缺口）。评分仅反映公开证据。
    data:
      items:
        - label: 市场机会
          value: 5 / 5
          detail: $225B+ 心理健康市场；MHPAEA 执法顺风；结构性治疗不足缺口
          claimRefs:
            - CV040
        - label: 临床 / 产品证明
          value: 5 / 5
          detail: JAMA 2025 RCT（黄金标准）；Validation Institute 21% 净节省；URAC 认证
          claimRefs:
            - CV006
        - label: 竞争护城河
          value: 4 / 5
          detail: VERA-MH、Atlas 纵向数据、ROI 保证、Alma 网络；PBM 拥有渠道杠杆
          claimRefs:
            - CV009
        - label: 收入质量 / 经济性
          value: 2 / 5
          detail: 20M 覆盖人群暗示 $130–300M ARR，但财务披露为零；NRR/CAC 不透明
          claimRefs:
            - CV026
        - label: 监管 / 法律风险
          value: 2 / 5
          detail: MHPAEA NQTL 缺口、FTC 数据风险、Guide AI 责任造成重大且未量化敞口
          claimRefs:
            - CV027
        - label: 团队 / 治理
          value: 4 / 5
          detail: 创始人 April Koh / Adam Chekroud；Dipak Golechha（Palo Alto Networks CFO）于 2025 年入董事会
          claimRefs:
            - CV038
        - label: 估值吸引力
          value: 3 / 5
          detail: $3.3B 估值合理到略偏高；若 ARR ≥ $200M，相对上市同业的溢价可以成立
          claimRefs:
            - CV032
        - label: 证据质量
          value: 3 / 5
          detail: 临床 / 产品证据强；财务弱；缺少监管合规证据
          claimRefs:
            - CV033
    basis: |
      KPI 评分综合 Spring Health 八个尽调章节。评分为分析师估算；Spring Health 未独立审阅或验证这些评估。
