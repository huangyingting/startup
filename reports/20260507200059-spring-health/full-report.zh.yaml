              Health（2025）作为行为健康福利合作伙伴，是公开披露中最重要的健康计划客户签约，表明 Knox-Keene 模型在商业上跑得通。

              客户留存信号强，但仍是自报：URAC 认证要求意味着需要持续维持质量标准；截至本次报告日，Wellstar 和 JPMorgan 未公开宣布离开。雇主证言记录了对传统 EAP 供应商（Optum、Lyra
              作为替代而非新增支出）的竞争替代，但净收入留存率未披露。
