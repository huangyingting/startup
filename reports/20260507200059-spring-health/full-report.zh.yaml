chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、商业模式与产品平台
        blocks:
          - type: paragraph
            body: >
              Spring Health 是一家总部位于 New York City 的精准心理健康福利公司，2016 年由 CEO April Koh 与总裁 Adam Chekroud
              创立。公司的使命是「消除通往心理健康的一切障碍」。公司采用 B2B 订阅模式，按员工按月（PEPM）向自保雇主和健康计划销售行为健康福利项目。员工及其受扶养家属无需自付即可使用。截至 2025 年，Spring
              Health 全球覆盖 20M+ 人群，服务 450+ 直营雇主，并通过渠道合作伙伴触达另外 27,000 个团体。


              Spring Health 的差异化来自 Precision Mental Healthcare——一套自研 AI 系统，可在 3–5 分钟评估中筛查会员的 12+
              种心理健康状况，并自动把每个人导向最合适的护理方式：数字自助练习、教练、治疗（线上或线下）、精神科 / 药物管理、EAP 服务，或复杂病症的专科护理。首次预约可在不到 1
              天内完成。产品平台包括：SpringLife（个人 / 家庭福利）、SpringWorks（管理者心理健康）、Guide（AI 连续护理伙伴，2025 年推出）、Compass（专为服务方打造的
              EHR）、Atlas（雇主 ROI 分析）和 Specialty Care（物质使用、PTSD、进食障碍、重度情绪 / 焦虑）。LinkedIn 显示公司有 1,001–5,000 名员工，在 New
              York、San Francisco、Salt Lake City 和 Seattle 设有枢纽。
