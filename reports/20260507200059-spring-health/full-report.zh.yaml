      - number: '6.2'
        title: 客户结果证据与 ROI 验证
        blocks:
          - type: paragraph
            body: >
              Spring Health 的客户价值主张由四项独立或半独立验证研究支撑。第一，Wellstar Health System 案例研究（Spring Health 2023 年发布）记录 Wellstar
              员工及家属每投入 $1 可节省 $4.30，即 4.3× ROI；这是已发布的单一雇主结果中颗粒度最高的一项。第二，2025 年 JAMA Network Open 研究经同行评审且独立完成，在约 100,000
              名注册会员的大型雇主队列中证明了 1.9× ROI、住院成本降低 50%，抑郁症平均康复时间为 5.9 周。

              第三，Validation Institute 2025 认证验证了 Spring Health 雇主客户群心理健康支出净节省 21%；该认证使用理赔数据和精算方法，而不是自报问卷。第四，URAC
              三重认证（临床照护、危机项目、健康促进）不是结果研究，但由独立认证机构验证照护质量。

              平台层面指标（Spring Health 披露）包括：临床改善率 92%；会员留在 Spring Health 推荐提供者处的比例 95%；心理健康状况改善的会员占 67%（雇主证言）；某未具名雇主前 30
              天注册率 25%；提供者满意度 90%。这些指标为公司自报，方法未披露；JAMA 和 Validation Institute 研究为其中部分主张提供独立佐证。
