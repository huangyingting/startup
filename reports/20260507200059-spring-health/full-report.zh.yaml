  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管风险图谱
        blocks:
          - type: paragraph
            body: >
              Spring Health 处在高度监管环境，横跨联邦心理健康平等法、HIPAA、加州 Knox-Keene 保险监管，以及临床场景中新兴的联邦 AI 政策。每一层监管都带来合规义务；一旦违规，Spring
              Health 及其雇主客户可能面临执法行动、福利计划重组和声誉损害。

              MHPAEA（Mental Health Parity and Addiction Equity Act）是运营上最重要的监管要求。2024
              最终规则（DOL/HHS/Treasury）要求健康计划和雇主福利计划确保适用于心理健康和物质使用障碍（MH/SUD）福利的 NQTL（非定量治疗限制，如事前授权、使用管理标准和网络充足性），不得比适用于可比医疗
              / 外科福利的限制更严格。Spring Health 核心产品（PEPM 雇主福利）嵌在计划发起人的 MH/SUD 福利设计中；2024 MHPAEA 规则要求计划发起人开展并记录 NQTL 比较分析，这可能迫使
              Spring Health 调整使用管理做法。

              HIPAA 隐私与安全规则适用于 Spring Health，因为它是雇主赞助健康计划的业务伙伴（BA）。HHS 民权办公室（OCR）执行 HIPAA，最高可按每个违规类别每年处以 $1.9M 民事罚款。以
              Spring Health 20M 覆盖人群的规模，一旦会员 PHI 泄露，就会触发 OCR 违规通知规则，需要媒体通知，并带来重大声誉风险。BetterHelp FTC
              和解（2023）确立了先例：向第三方广告商共享心理健康数据违反 FTC Act；该先例直接适用于 Spring Health 与营销和分析供应商的数据实践。

              加州 Knox-Keene Health Care Service Plan Act 在 Spring Health 2025 年获牌后适用。California DMHC（Department of
              Managed Health Care）监管 Spring Health 在加州的健康计划运营，包括偿付能力、申诉与上诉、可及性标准和网络充足性要求；这在联邦 MHPAEA 与 HIPAA
              义务之上，又加了一层州级合规。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
