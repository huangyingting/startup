      - number: '7.4'
        title: 展示材料
        blocks:
          - type: callout
            title: BetterHelp FTC 先例给 Spring Health 带来直接数据共享责任
            body: >
              FTC 2023 年 BetterHelp 同意令确立：与广告平台共享心理健康状态、参与历史或治疗数据，即便隐私政策已有披露，也违反 FTC Act。Spring Health
              的雇主分析仪表盘、营销分析工具以及可能使用的第三方跟踪像素，都必须按这一标准评估。公司声称 AI 训练零留存，并不等同于承诺不向第三方共享数据。若公司不公开披露与分析供应商的数据共享做法，BetterHelp
              风险仍未解决。
            calloutType: insight
            claimRefs:
              - CR008
              - CR009
              - CR010
          - type: callout
            title: MHPAEA 2024 最终规则给使用 Spring Health 的雇主计划发起人带来新的 NQTL 合规负担
            body: >
              2024 MHPAEA 最终规则要求雇主赞助健康计划针对 MH/SUD 与医疗 / 外科福利的 NQTL，开展并记录正式比较分析。Spring Health 的事前授权流程、网络充足性标准和使用管理标准都属于
              NQTL，需要接受平等性分析。若 Spring Health 的临床模型对心理健康照护施加的 NQTL 比雇主计划对可比医疗服务施加的限制更严格，Spring Health 的雇主客户将面临 DOL
              执法暴露，并可能向 Spring Health 施压，要求其修改临床协议、扩大网络或取消使用限制。
            calloutType: insight
