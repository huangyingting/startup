        - 在 $3.3B 估值下，经审计 ARR < $100M 意味着倍数 >33×——相较 2–3× 的公开可比公司无法支撑
        - 根本性高估；任何增长率都无法在 5 年内弥合与公开可比公司的差距
        - 不投；下调判断；观察重组信号
      - - 雇主总 logo 年流失率 > 15%
        - 雇主账户年流失率持续超过 15%，说明产品市场匹配正在结构性削弱
        - NRR 可能低于 90%；增长完全依赖新 logo；ARR 天花板出现
        - 在流失根因分析完成前，有条件不投
      - - 重大 FTC 执法行动（AI 数据共享）
        - FTC 投诉或同意令点名 Spring Health 未经授权共享心理健康数据
        - Guide AI 暂停；企业销售冻结；和解成本重大；存在集体诉讼风险
        - 立即复核；若确认存在收入扰动风险，则退出仓位
      - - MHPAEA 执法认定 Spring Health 协议违反平价要求
        - DOL EBSA 审计认定 Spring Health 的利用管理造成歧视性 NQTL
        - 雇主客户必须修改或放弃 Spring Health 计划设计；流失连锁发生
        - 有条件卖出；认定后 6 个月监测雇主续约节奏
      - - 下一轮估值显著降低（降价轮 > 30%）
        - Spring Health 以 $2.3B 或更低估值融资
        - 相比 Series E 承诺，增长或盈利目标出现根本性落空
        - 复核反稀释条款；必须修订投资论点；启动新一轮尽调
      - - Guide AI 引发临床不良事件并升级为监管问题
        - 州医学委员会或 FDA 因 Guide 导致临床伤害采取执法行动
        - AI 产品暂停；需要计提责任准备金；雇主客户可能终止合同
        - 立即评估风险；是否推翻论点取决于严重程度和范围
