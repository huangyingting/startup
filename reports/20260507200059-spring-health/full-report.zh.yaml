  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Spring Health 的主服务市场是美国雇主赞助的行为健康福利市场；借助 2025 年 Knox-Keene 牌照，公司也可进入更广泛的行为健康管理式市场（健康计划、Medicaid、Medicare
              Advantage）。

              该市场可拆成四个支出池：（1）传统 EAP（Employee Assistance Programs）——以电话咨询为主，平均使用率 5–8%；（2）由 Magellan、Optum 或 Beacon
              管理的传统心理健康 carve-out——成本高、会员体验弱；（3）数字优先单点方案（Spring Health、Lyra、Modern Health）——以临床衡量结果的全谱系平台替代传统
              EAP；（4）消费者直接付费应用（Headspace、Calm、BetterHelp）——低严重度、无雇主整合。Spring Health 在第 3 个池竞争，并正在替代第 1 和第 2 个池的合同。

              截至 2026 年，Spring Health 的可触达市场不包括：住院精神科治疗、住院式物质使用治疗、临床药物试验，以及没有雇主合同的直接面向消费者心理健康应用。Alma
              组合引入了一个混合形态：面向离职后会员的消费者治疗师市场，但这只是附属渠道，并非主要收入驱动。
