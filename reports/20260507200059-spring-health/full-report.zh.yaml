  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    description: |
      Main investment thesis arguments and anti-thesis counterpoints for Spring Health.
    columns:
      - 类型
      - 论点
      - 什么会改变判断
    rows:
      - - 投资逻辑
        - JAMA 2025 RCT 给出同行评审、独立验证的临床结果证据，构成竞争对手难以快速复制的护城河
        - 复制研究显示低成本竞争者（Lyra、Modern Health）也能取得相近结果
      - - 投资逻辑
        - MHPAEA 2024 最终规则执法为面向雇主、且记录了 NQTL 分析的心理健康项目带来新一波合规需求
        - DOL 推迟 MHPAEA 执法，或将雇主自保计划豁免于新的审计要求
      - - 投资逻辑
        - 20M 覆盖人群和 450+ 个直接雇主关系，代表具备 1–3 年续约周期的可观合同 ARR 基础
        - 年度雇主流失数据显示总 logo 流失率 >15%
      - - 投资逻辑
        - 保证 ROI（第 1 年成本中性，第 3 年 3×）让 Spring Health 收入模型与雇主 ROI 对齐，并降低流失风险
        - 重大保证赔付事件，或精算准备金披露显示支撑不足
      - - 投资逻辑
        - Alma 合并和 Knox-Keene 牌照打开健康计划与消费者渠道，降低单一雇主渠道风险
        - 健康计划渠道经济性显著弱于雇主（PMPM 更低、销售周期更长、支付方定价压力）
      - - 反向逻辑
        - 未披露 ARR、NRR 或单位经济性；所有估值都依赖分析师估算，置信区间很宽（ARR 区间 $130–300M）
        - 经审计确认 ARR 达到 $200M+ 区间，将显著提高确信度
      - - 反向逻辑
        - 公开心理健康远程医疗可比公司（Teladoc、Talkspace、Accolade）已重估至 1–3× ARR；Spring Health 的 11–25× 溢价需要持续增长溢价支撑
        - 数字健康板块复苏后，公开可比公司重估至 5–8× ARR
      - - 反向逻辑
        - Guide AI 的主动心理健康干预没有监管许可，FDA AI/ML 指引仍在演进，临床责任未量化
        - 监管安全港，或 FDA 覆盖 AI 驱动行为健康建议的执法裁量指引
