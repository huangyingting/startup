  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心技术架构与自研 AI 引擎
        blocks:
          - type: paragraph
            body: >
              Spring Health 的基础技术是 Precision Mental
              Healthcare（PMH）引擎——一套基于临床结果数据训练的机器学习系统，为每名会员分配个性化护理计划。模型读取经过验证的临床评估回答（抑郁 PHQ-9、焦虑 GAD-7，以及自研倦怠 /
              压力指数），并把会员映射到 13 条既定护理路径之一，从数字练习到精神科药物管理不等。AI 驱动的匹配，让 Spring Health 区别于统一分配护理、或完全依赖会员自选的 EAP 服务方。

              该平台按 FHIR R4 合规搭建，可与商业健康计划和电子健康记录系统双向交换数据——这是 2025 年推出 Knox-Keene 健康计划渠道的关键架构要求。Atlas 是公司的自研推荐引擎（2022
              年推出），提供实时服务方匹配，使大多数会员的预约等待时间降至 2 天以内。Guide（2025 年推出）是 AI 驱动的护理导航体验，会在会员两次服务方会面之间主动浮现正确的下一步——这把 Spring
              Health 定位为连续护理平台，而不是按单次疗程提供服务的平台。

              VERA-MH 开源 AI 安全评估框架（2024 年与临床专家委员会共同开发），是首个用于评估心理健康场景中 GenAI 对自杀意念响应的公开标准。公开发布同时服务于安全目的和开发者社区策略——让 Spring
              Health 成为标准制定者，而不是第三方 AI 安全框架的被动采用者。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
