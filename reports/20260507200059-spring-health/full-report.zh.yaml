      - number: '5.4'
        title: 图表
        blocks:
          - type: callout
            title: VERA-MH 开源框架让 Spring Health 成为 AI 安全标准制定者
            body: >
              Spring Health 选择把 VERA-MH 作为开源 AI 安全评估工具发布，而不是保留为自有工具，这是一项有意的开发者生态策略。通过共同制定首个用于评估 GenAI 心理健康聊天机器人的临床标准，并在
              vera-mh.com 公开，Spring Health 把自己定位为行为健康负责任 AI 的参考实现。这一路径类似 Google 和 Microsoft
              开源安全框架以设定行业标准、同时让自家产品满足这些标准的做法——既创造监管和声誉优势，也为企业买家生成信任信号。
            calloutType: insight
            claimRefs:
              - CE014
              - CE015
              - CE016
          - type: callout
            title: Guide 把 AI 延伸到连续的疗程间护理，临床准确性风险随之上升
            body: >
              Guide AI 的连续护理模型会基于互动信号，在两次会面之间主动提醒会员，这带来了新的临床和责任风险。如果 AI
              在两次会面之间错误评估会员心理状态、未能升级危机信号，或在高风险时刻提供不当支持，可能造成直接临床伤害。VERA-MH 处理的是自杀意念场景下的聊天机器人安全，但该标准适用于面向消费者的 AI；Guide AI
              的主动提醒模型（不是对话式聊天机器人）是否已在同一框架下接受独立评估，仍不清楚。
            calloutType: insight
            claimRefs:
