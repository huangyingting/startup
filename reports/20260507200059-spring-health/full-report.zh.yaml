      - number: '8.3'
        title: 情景分析与概率加权回报
        blocks:
          - type: paragraph
            body: >
              牛市情形：借助新取得的 Knox-Keene 牌照扩张健康计划渠道，Point32Health 这一首个大型健康计划合同扩展到更多计划，Generation Investment Management
              的英国网络推动国际增长，Specialty Care（SUD）收入爬坡，Spring Health 到 2026–2027 年把 ARR 加速至 $400–500M。若以 $450M ARR 年化口径计算
              15–20× 倍数，估值可达 $6.75–9B，相比 $3.3B Series E 入场价隐含 2–3× 回报。该情形需要拿下大型健康计划客户并持续保持强劲雇主留存；逻辑可信，但依赖执行。基准情形：雇主渠道年增长
              30–40%，健康计划贡献温和，ARR 达到 $200–300M；临床证据支撑 12–15× 远期倍数，估值隐含 $2.4–4.5B，回报大致持平到小幅为正。熊市情形：MHPAEA 执法带来监管逆风，PBM
              和保险公司自有心理健康网络施压，提供者成本上升，把 ARR 增长压到 20% 以下 CAGR；倍数压缩至受压公开可比公司的 4–6×，估值隐含 $520M–$780M，较入场价减值 75–85%。若 FTC
              数据风险和 AI 临床责任同时兑现，触发企业销售冻结和监管整改成本，熊市情形就有现实可能。
