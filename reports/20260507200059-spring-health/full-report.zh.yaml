  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              Spring Health 在五个已披露轮次中累计融资 $488M+。Series A：$22M（2020，Kinnevik 和 Work-Bench）；Series B：$76M（2021，Tiger
              Global）；Series C：$190M（2022，Tiger Global，投后估值 $2B）；Series D：未公开确认；Series E：$100M（2024 年 4 月，投后估值
              $3.3B，Fortune 独家）。Series C 到 Series E 之间约两年没有已确认 Series D，可能意味着未披露的桥接轮、未贴标签的延展轮，也可能只是公司在 2022 到 2024
              年之间不需要额外资本。

              $3.3B Series E 估值较 $2B Series C 估值上升 65%，大约用了两年运营时间。这意味着公司增长足够快，能够在 2022–2023
              年大多数风险投资支持公司经历数字健康重定价时，仍获得溢价。EDGAR 中未发现 Spring Health, Inc.、Spring Health Benefits 或相关实体名称下的 SEC Form D
              文件——这可能反映的是 Delaware 层面的州豁免，而不是没有融资。

              投资方画像：Tiger Global（领投 Series B 和 C）、Kinnevik（领投 Series A）、William Blair。Palo Alto Networks CFO Dipak
              Golechha 于 2025 年加入董事会，释放出准备潜在上市或大型机构融资事件的信号。
