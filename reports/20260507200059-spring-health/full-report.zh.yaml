      - number: '5.2'
        title: 产品组合与临床工作流
        blocks:
          - type: paragraph
            body: >
              Spring Health 围绕雇主福利部署模式，提供模块化产品套件。SpringWorks 是面向雇主的配置和分析平台，为 HR 管理员提供互动报告、使用数据和 ROI 仪表盘。SpringLife
              是面向会员的移动与网页应用，员工可在其中完成评估、预约、使用数字练习，并与 Guide AI 互动。Compass EHR 是 Spring Health
              自研电子健康记录，专为行为健康打造，可在服务方网络内支持结构化临床文档、结果追踪和护理协调。

              Specialty Care（2023 年推出）面向高严重度病症——进食障碍、物质使用障碍（SUD）、ADHD、OCD 和重度抑郁——通过专门护理路径、专科医生和个案管理处理。这把平台从 EAP
              替代扩展为综合行为健康管理（BHM）。Bloom 内容收购（2022）把自助式数字治疗内容（dCBT、正念、压力模块）加入 SpringLife 应用，降低低严重度会员对同步服务方会面的依赖。

              Alma 组合（2025）增加了消费者市场层：Alma 在全美 50 个州拥有 10,000+ 名独立治疗师目录，现在可通过 SpringLife
              访问，使触达范围从签约雇主网络扩展到没有雇主赞助、但寻求自付或保险支付治疗的个人。
