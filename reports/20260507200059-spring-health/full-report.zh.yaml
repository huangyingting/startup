      - number: '8.4'
        title: 投资逻辑与建议
        blocks:
          - type: paragraph
            body: >
              在当前 $3.3B 估值下，Spring Health 评级为有条件买入，适合拥有数据室访问权限、投资期限 4–7 年的成长期投资者。投资逻辑立在三根相互强化的支柱上。第一，JAMA 2025 同行评审 RCT
              证据支持临床结果优势；多数数字健康竞争者达不到这个标准，这带来可防守的雇主留存，并支撑相对仅 EAP 替代方案的价格溢价。第二，雇主市场中循证心理健康照护渗透率仍低，而 MHPAEA 2024
              执法又带来对可记录协议的合规需求，至少到 2028 年都提供耐久的长期顺风。第三，Alma 合并把 Spring Health 从 B2B 雇主延伸到消费者和健康计划邻近市场，再叠加 Knox-Keene
              牌照，形成多渠道平台，提高每名覆盖人群的总可寻址收入。支撑信念的主要条件包括：在数据室确认 ARR 和 NRR，审查 MHPAEA NQTL 合规分析，以及取得 Guide AI
              临床责任法律意见和保险覆盖。$3.3B 入场价相对 2021–2022 年 30–80× ARR 的数字健康峰值估值有吸引力，但仍需要财务确认，才能消除宽幅不确定区间。
            claimRefs: []
