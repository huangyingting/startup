      - number: '5.3'
        title: 集成架构与平台差异化
        blocks:
          - type: paragraph
            body: >
              Spring Health 可与主要企业 HR 和福利技术栈集成。Workday Wellness Partner Program 集成（2026）把 SpringLife 直接接入 Workday
              的员工健康枢纽，支持单点登录（SSO）和注册，无需单独下载应用——这降低了激活阻力，并提高使用率。通过标准 OAuth 2.0 API 连接，公司也支持与 ADP、Salesforce Health Cloud
              和主要 TPA 的集成。

              HIPAA 合规的数据架构对会员数据采用端到端加密，对临床对话的 AI 模型训练采用零留存政策（VERA-MH RFI
              指南中主张），并对雇主管理员采用基于角色的访问控制；雇主只能收到汇总、去标识化的互动数据。公司 2025 年取得 California Knox-Keene 牌照，要求基于 FHIR 的电子数据交换（EDI）符合
              California 健康计划数据标准。

              核心技术差异化护城河是 PMH 训练数据集——来自 20M+ 覆盖人群、历经六年基于测量护理周期积累的临床结果记录。该数据集为自有资产，并持续增长，形成纯 EAP
              服务商和新进入者难以复制的数据护城河。临床结果数据、AI 匹配和内置 EHR（Compass）的组合，使 Spring Health 区别于传统 EAP
              服务方（没有临床数据基础设施）和单点方案（只关注单一病症，缺少人群健康衡量）。
