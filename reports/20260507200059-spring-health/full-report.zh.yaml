      - number: '3.2'
        title: 正面对比
        blocks:
          - type: paragraph
            body: >
              Lyra Health（主要竞争对手）：2015 年创立，总部 Burlingame, CA。按服务方网络规模看，它是最大的数字心理健康竞争对手（30,000+，而 Spring Health 为
              10,000+）。服务 20M+ 人群，覆盖 Facebook/Meta、Uber、eBay、Morgan Stanley 等大型企业客户。最近已知估值：$4.8B（2022 Series F，融资
              $235M）。2025 年，Lyra 推出临床级 AI 平台，收购 Bend Health（聚焦儿科），并与 Workday Wellness 建立整合合作。Lyra
              覆盖国际雇主（瑞士办公室）。关键弱点：临床证据基础更窄——截至 2026 年没有 JAMA 等级论文；以治疗为起点，也限制了它在教练 + EAP + 专科护理堆栈上的广度。

              Modern Health（次要竞争对手）：2017 年创立，总部 San Francisco。由 Kleiner Perkins、Founders Fund、John Doerr、Y
              Combinator、Battery Ventures 支持。估值 $1.17B，累计融资 $170M+。创始人为 Alyson
              Watson；是美国最快达到独角兽的全女性创始公司。采用教练优先路径，提供多模态支持（教练、数字、团体）；服务全球雇主，服务方覆盖 70+
              国家。关键弱点：教练优先定位可能限制其对高严重度案例和精神科需求的吸引力。

              Optum Behavioral Health（主导型存量玩家）：UnitedHealth Group 的一部分（NYSE: UNH，市值约 $500B）。通过 Emotional Wellbeing
              Solutions EAP 和管理式护理 carve-out，为 30M+ 商业计划会员管理行为健康福利。与 OptumRx、UHC 和主要医院网络整合。关键弱点：使用率低（EAP
              模型）、数字互动有限，以及保险方所有权带来的利益冲突观感。

              Talkspace：上市公司（NASDAQ: TALK）。收入约 $170M（2024）。仅做远程治疗，雇主捆绑中没有精神科或教练。市值约 $300M。公司一直面临利润率压力和治疗师流失。FTC
              对数据隐私实践的调查（2023-2024）增加了反向监管悬念。它不是全谱系 EAP 替代方案。
