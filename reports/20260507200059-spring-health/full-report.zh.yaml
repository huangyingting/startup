          value: 2400
        - label: $200M ARR × 20×（乐观溢价）
          value: 4000
        - label: $300M ARR × 5×（承压上市可比）
          value: 1500
        - label: $300M ARR × 12×（基准私募）
          value: 3600
        - label: $300M ARR × 20×（乐观溢价）
          value: 6000
    basis: >
      ARR 情景来自分析师估算（Rock Health 2024、CB Insights、Bloomberg、Forbes）。倍数下沿锚定上市可比公司（Accolade 1.4×、Talkspace 2.9×、Teladoc
      1.3×）；基准 / 乐观锚定私募成长 SaaS（12×）和数字健康峰值（20×）。所有数值均为分析师估算；Spring Health 未披露 ARR。
