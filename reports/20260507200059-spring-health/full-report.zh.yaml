companyProfile:
  summary: >
    Spring Health 是一家总部位于 New York City 的精准心理健康福利公司，2016 年由 CEO April Koh 与总裁 / 首席科学官 Adam Chekroud
    创立。公司提供纵向整合的雇主心理健康福利平台——SpringWorks（雇主端）、SpringLife（消费者 / 会员端）、Guide AI（主动式护理导航）、Compass（服务方 EHR）、Atlas（纵向结果追踪）和
    Specialty Care（SUD）——覆盖 Microsoft、Target、J.P. Morgan Chase、Delta Airlines、Wawa 等 450+ 直营企业雇主，合计超过 20M 覆盖人群。Spring
    Health 的临床结果差异化，建立在 2025 年 JAMA Psychiatry 同行评审 RCT 之上：相较标准 EAP，ROI 达 1.9×，住院率低 50%；Validation Institute 2025
    认证也确认净节省 21%。公司于 2025 年完成收购 Alma（消费者治疗师市场，10,000+ 网络内治疗师），并在 2025 年取得 California Knox-Keene 健康计划牌照。Spring Health 于
    2024 年 4 月以 $3.3B 估值融资 $100M（Series E，由 Generation Investment Management 领投）；累计融资约 $488M。公司入选 TIME100 Most
    Influential Companies 2026。收入和 ARR 未公开披露。
