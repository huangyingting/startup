      - number: '2.3'
        title: 市场驱动因素与约束
        blocks:
          - type: paragraph
            body: >
              2024–2030 年的增长驱动因素包括：（1）心理健康危机——23.4% 的美国成年人（61.5M 人）在任一年经历心理疾病（NAMI 2024）；1/20 患有严重心理疾病；青春期女性心理健康自 2019
              年以来持续恶化。（2）雇主成本与生产率压力——心理健康状况每年让美国雇主损失 $16.8B+ 生产率和 200M+ 工作日；50% 的 Millennials 和 75% 的 Gen Z
              曾因心理健康原因离职，使心理健康成为人才留存问题。（3）心理健康平等覆盖监管——MHPAEA（2008）及其 2024 年最终规则要求雇主赞助健康计划，在心理健康和物质使用上提供与医疗 /
              外科条件等同的覆盖，推动企业升级传统 EAP。（4）远程医疗常态化——COVID 后远程医疗采用已经让虚拟行为健康护理变成常态，降低疗程中断，并支持全国性服务方网络。（5）精准 AI 证据——2025 年
              JAMA 对 Spring Health 平台的验证，首次为数字行为健康提供了企业级临床证明。

              市场约束包括：（1）服务方短缺——美国缺少持证精神科医生和治疗师，全国估计短缺 7,000+ 名精神科医生（HRSA）。搭建 10,000+
              高质量服务方网络，是显著的供给壁垒。（2）雇主预算周期——福利决策通常在年度开放注册期做出，平台切换速度受限。（3）整合复杂——雇主 HR 和薪资系统、保险理赔裁定、心理健康平台之间需要深度 API
              集成。（4）ROI 怀疑——尽管同行评审证据在增加，许多 CFO 仍质疑数字行为健康能否带来可衡量的财务回报。（5）隐私与污名——员工担心通过雇主赞助平台使用心理健康福利，会把使用数据暴露给雇主。
