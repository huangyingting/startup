      - number: '7.3'
        title: 业务、财务与竞争风险
        blocks:
          - type: paragraph
            body: >
              Spring Health 的财务风险集中在四个相互牵连的挑战：ROI 保证责任、盈利路径、估值可持续性和退出流动性。ROI 保证（第 3 年
              3×）产生一项未量化的或有负债：若任何雇主队列临床结果不达标，Spring Health 必须补偿雇主，方式可能是延长合同、服务抵扣或现金支付。该保证的精算基础未公开。若 JAMA 研究的 ROI
              无法在低使用率或高病情严重度的雇主人群中复现，保证赔付可能超出预期并侵蚀利润率。

              短期最实质的竞争风险来自 Optum：Optum（UnitedHealth 子公司）拥有 95M+ 会员行为健康网络、全谱系平等性合规、Epic EHR 集成和健康计划分销；Spring Health
              当前规模无法匹配这些优势。Lyra 的临床扩张（2023–2024 年增加 EAP 替代能力）和 Modern Health 的独角兽融资（估值
              $1.17B）意味着雇主心理健康平台高端市场已有三家资金充足的竞争者，直接瞄准 Spring Health 核心客户。

              与 Alma 的合并引入整合执行风险：Spring Health 必须把 Alma 的消费者市场模型（独立治疗师、自费 / 保险结算、消费者 UI）和临床企业平台（雇主 PEPM、循证照护路径、Compass
              EHR）统一起来。两个不同技术栈、提供者类型和商业模式之间的整合复杂度，是实质性运营风险。若合并拖慢产品开发或分流工程资源，Spring Health 在雇主渠道的竞争位置可能削弱。

              外部风险包括数字健康市场周期：2022–2023 年数字健康重新定价淘汰了若干中端竞争者，也压缩了 IPO 倍数。Spring Health $3.3B 估值需要持续的私募市场倍数溢价（意味着 Series F
              或 IPO 达到 $5–10B+），或拿出运营结果，在更保守退出倍数下证明溢价合理。
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
              - CR016
