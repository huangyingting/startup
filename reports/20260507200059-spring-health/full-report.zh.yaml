      - number: '4.3'
        title: 资本充足性与财务风险评估
        blocks:
          - type: paragraph
            body: >
              2024 年 4 月 Series E（$100M）是最后一个已确认融资事件。截至运行日期（2026 年 5 月）未有后续资本公告，公司已依靠现有资本运营约 13 个月。考虑到 Spring Health
              这种规模的 Series E 公司通常每月烧钱 $5–15M，运行日期时 Series E 剩余现金跑道为 7–20
              个月——这意味着公司可能正在接近新一轮融资，已经接近盈亏平衡，或拥有额外未披露资本来源（例如债务额度、基于收入的融资）。

              $3.3B Series E 估值意味着，若退出时实现 3× 回报，需要 $10B+ 回报预期。按 Spring Health 估计 ARR 区间（$135M–$270M），估值隐含收入倍数约为
              12–24×。这是一种溢价，需要每年 40%+ 的持续增长才能维持；考虑到当前雇主福利续约周期以及 Lyra、Optum 的竞争，门槛很高。

              Alma 组合的财务风险：与 Alma 的组合引入了面向消费者的收入，而这类收入相较 Spring Health 的企业核心，历史上流失更高、ARPU
              更低、监管成本结构也不同（Knox-Keene）。整合成本未披露。该组合看起来更偏战略（市场扩张），而非财务（增厚），说明短期利润率稀释的可能性较高。

              2025 年 CFO 级董事任命（Palo Alto Networks CFO Dipak Golechha）是治理强化信号，通常与 IPO 准备或大型后期融资准备相关——可能暗示运行日期后 12–24
              个月内出现资本事件。
