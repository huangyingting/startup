    title: Spring Health 投资建议逻辑
    type: flow
    description: |
      从临床证明、市场规模和风险推导投资建议的链条。决策节点展示证据较强之处（临床结果、雇主需求）与不确定性较高之处（财务不透明、AI 责任）。
