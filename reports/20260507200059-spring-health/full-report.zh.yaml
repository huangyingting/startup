              Lyra Health 的 30,000+ 服务方网络，是 Spring Health 10,000+ 的三倍。对于优先看重覆盖广度、而非精准匹配的大型企业买家，Lyra 可能仅凭网络规模胜出。Lyra 2025
              年 10 月发布临床级 AI，直接攻击 Spring Health 的精准 AI 差异化叙事。如果 Lyra 在 12-18 个月内为其 AI 模型产出同行评审证据，Spring Health
