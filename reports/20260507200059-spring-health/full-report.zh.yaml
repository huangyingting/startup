  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与框架
        blocks:
          - type: paragraph
            body: >
              Spring Health 2024 年 4 月完成 $100M Series E 融资，由英国影响力投资机构 Generation Investment Management 领投，私募估值达到
              $3.3B。按当时口径，Spring Health 成为美国估值最高的独立雇主心理健康福利公司，也是全球第二大心理健康独角兽，仅次于 Lyra Health 2022 年 $4.8B
              融资。公司始终拒绝披露年度经常性收入（ARR）、毛利率或任何财务指标，因此只能用倍数法估值。基于 20M 覆盖人群、估计 $3–8 的雇主 PEPM 费率，并混合 450+ 个直销雇主账户和 27,000
              个渠道伙伴团体，独立分析师估计 ARR 区间为 $130–300M；区间很宽，反映真实不确定性。按 $3.3B Series E 投后估值计算，隐含 ARR 倍数约 11–25×，与高增长企业 SaaS
              相符：雇主收入耐久且经常性，已有同行评审临床 ROI，合同保证结构降低流失风险；但在这一阶段，要承销精确倍数通常需要的财务透明度仍然缺失。
            claimRefs: []
