  - id: FV002
    title: Spring Health 估值对 ARR 和倍数的敏感性
    type: bar
    description: |
      九种 ARR-倍数组合下的隐含估值，覆盖三个 ARR 情景（$130M、$200M、$300M）和三档收入倍数（5×、12×、20×）。Spring Health 完全未公开 ARR，因此不确定区间很宽。
    data:
      items:
        - label: $130M ARR × 5×（承压上市可比）
