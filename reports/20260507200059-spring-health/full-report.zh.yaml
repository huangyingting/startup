      - number: '8.2'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              公开心理健康和远程医疗可比公司提供的是受压市场锚点。Accolade（ACCD）截至 2024 年 Q4 约以 1.4× ARR 交易，年度收入约 $360M，已从 2021 年 15–20× ARR
              压缩。Talkspace（TALK）截至 2025 年 Q1 约以 2.9× ARR 交易，收入约 $110M。Teladoc Health（TDOC）2023 年收入 $2.6B，约以 1.3×
              收入交易；在累计 $13.4B Livongo 商誉减值后，只剩 2021 年峰值估值的一小部分。公开可比公司的信号很明确：2021
              年数字健康倍数扩张，对未能证明清晰盈利路径或结果差异化的公司已经完全反转。私营可比公司处在另一个层级，但在二级市场和基金 NAV 上面临类似重估压力。Lyra Health 上次估值为 2022 年 Series
              F 的 $4.8B，此后没有公开新融资，意味着 NAV 可能明显下调。Modern Health 2021 年 $1.17B 峰值估值也显得过期。Spring Health 相对公开可比公司的溢价，来自 JAMA
              2025 同行评审 RCT 结果证据、雇主 SaaS 黏性和 ROI 保证——这些是公开同行缺少的因素——但该溢价对 ARR 确认高度敏感。
            claimRefs: []
