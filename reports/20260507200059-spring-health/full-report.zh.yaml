      - number: '1.2'
        title: 创始人、领导层、科学顾问与治理
        blocks:
          - type: paragraph
            body: >
              April Koh（CEO、联合创始人）曾任职于 McKinsey 和 Google；家人面临心理健康挑战的个人经历，驱动了公司的使命。Adam Chekroud（总裁、联合创始人）拥有 Oxford
              计算神经科学 DPhil，曾任 Yale School of Medicine 研究科学家，并发表过抗抑郁治疗选择的预测分析研究；这项工作构成了 Precision Mental Healthcare
              的科学内核。Arielle Mortimer 于 2024 年加入，担任首席运营官。Palo Alto Networks CFO Dipak Golechha 于 2025
              年加入董事会，释放出企业科技投资人认可的信号。其他 C-suite 成员未公开具名，关键人物风险集中在两位创始人身上；他们合在一起承担科学信誉、临床路线图和融资关系，替代难度很高。


              Spring Health 的科学顾问委员会包括：John Krystal, MD（Yale University School of Medicine 精神病学系主任、Yale-New Haven Health
              System 精神科主任，以氯胺酮 / 抑郁研究闻名）；Myrna Weissman, PhD（Columbia University，抑郁症人际心理治疗开发者）；Nikolaos Koutsouleris,
              MD（Ludwig Maximilian University of Munich，精神病学机器学习）；Svetha Venkatesh, PhD（Deakin University，模式识别与数据分析）；以及
              Martin Paulus, MD（Laureate Institute for Brain Research 科学主任）。这批国际知名学术精神病学家，为雇主福利平台中少见的临床可信度背书。
