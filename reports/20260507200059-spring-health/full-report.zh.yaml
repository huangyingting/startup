      - number: '1.3'
        title: 融资、估值与关键里程碑
        blocks:
          - type: paragraph
            body: >
              Spring Health 已披露的风险融资超过 $488M。已确认轮次包括：Series A（$22M，2020，Kinnevik/Work-Bench）；Series B（$76M，2021，Tiger
              Global）；Series C（$190M，2022，Tiger Global，投后 $2B）；以及 Series E（$100M，2024 年 4 月，投后 $3.3B，Fortune
              独家报道）。Series D 未被公开确认，留下一个无法解释的两年空档。投资方包括 Tiger Global、Kinnevik 和 William Blair。


              研究窗口期内的封面指标：估值 $3.3B（2024 年 4 月）；披露融资 $488M+；20M+ 覆盖人群；10,000+ 服务方；450+ 直营雇主；1,001–5,000
              名员工；收入未披露。窗口期内里程碑（2024-05-07 之后）：Validation Institute 2025 第三方验证心理健康支出净节省 21%；JAMA Network Open 2025
              同行评审研究验证 1.9× ROI 和医院成本低 50%——这是数字行为健康市场最强的独立临床证明；Alma 组合完成（2025），打造从初次护理到长期支持的首个终身心理健康平台；California
              Knox-Keene 行为健康管理式医疗牌照（2025）打开健康计划管理式护理市场；Guide AI 伙伴推出（2025）；Dipak Golechha（Palo Alto Networks
              CFO）加入董事会（2025）；并入选 TIME100 Most Influential Companies 2026。


              竞争背景：Spring Health 的全谱系平台把数字自助、教练、治疗、精神科、EAP 和专科护理放在一个方案里；相比之下，竞争对手通常只覆盖一到两种护理模式。同行评审的 JAMA 验证和 ROI
              保证承诺，是纯 EAP 服务商尚未公开匹配的差异化。
