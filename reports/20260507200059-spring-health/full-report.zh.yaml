      - number: '4.2'
        title: 收入模式与单位经济估计
        blocks:
          - type: paragraph
            body: >
              Spring Health 主要通过 PEPM（每名员工每月）订阅费创收，雇主为接入 Spring Health 心理健康福利平台付费。健康计划渠道收入经 2025 年 Knox-Keene 牌照引入，采用
              capitation 或 PMPM 模式；截至运行日期仍处早期。Alma 组合（2025）通过 Alma 的治疗师市场增加消费者市场收入，单位经济与企业 PEPM 核心不同，ARPU 可能更低、流失更高。

              隐含 ARR 估计（分析师推断）：20M 覆盖人群 × $30–50 PEPM × 12 个月，如果所有覆盖人群都按完整商业费率成为活跃订阅者，理论 ARR 上限为
              $7.2B–$12B。但覆盖人群包括渠道合作伙伴团体，这些人群的单人 PEPM 可能显著更低，且并非所有覆盖员工都会积极使用。用更保守方法测算：450 个直营雇主客户，每名员工每年 $150–300
              PEPY，假设每个客户平均 2,000 名员工，则直营雇主合同 ARR 为 $135M–$270M——大致符合高增长 Series E 阶段公司。

              单位经济完全未公开。公司未披露毛利率、CAC、LTV 或回本周期数据。服务方网络成本（10,000+ 持证服务方）、客户成功员工数（1,001–5,000
              名员工）和技术成本都是实质性费用项；其规模相对收入如何仍未知。
