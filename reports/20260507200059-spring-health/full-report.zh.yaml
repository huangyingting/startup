              Spring Health 从未披露 ARR、收入、利润率或单位经济。$3.3B 估值意味着 VC 若要获得 3× 回报，需要 $9.9B+ 退出价值——这要求 IPO
              或高溢价战略收购。若不能验证收入，估值只能建立在市场定位、临床证明和增长轨迹之上。按估计 $135–360M 隐含 ARR，收入倍数为 9×–24×，明显高于上市 SaaS
              医疗健康可比公司（5–10×），并且需要 40%+ 的持续年增长才能维持。
