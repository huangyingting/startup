  - id: TV006
    title: 最终尽调问题清单
    description: |
      Top diligence questions that must be answered in the data room before full investment conviction on Spring Health.
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - ARR 与收入构成
        - 按渠道划分的年度经常性收入（雇主直销、渠道伙伴、健康计划）；按客户 cohort 年份（2020–2024）划分的净收入留存
        - 整个估值论点都压在 ARR 上；若无法确认，$130–300M 的分析师区间过宽，无法支撑任何倍数
        - CFO 数据室；经审计财报或管理账；投资人更新信
      - - MHPAEA NQTL 对比分析
        - Spring Health 针对利用管理、预授权、网络充足性相对医疗 / 外科等效项的 NQTL 对比分析
        - 雇主客户承担主要 MHPAEA 合规义务；若 Spring Health 的流程制造违规，雇主客户将面临 DOL 处罚，并被迫修改或终止合同
        - 总法律顾问和合规团队；独立 MHPAEA 律师审查
      - - Guide AI 临床责任与保险
        - Guide AI 临床决策支持法律意见（UPL、FDA SaMD、过失）；错误与遗漏 / 医疗事故保险覆盖和限额
        - 如果 Guide 主动给出的建议导致患者受害，责任可能上升到实体层面；保证 ROI 模型和主动触达会放大敞口
        - 首席医疗官；法律顾问；保险经纪；临床顾问委员会
      - - 渠道经济性与单位 cohort 数据
        - 雇主 PMPM、雇主 CAC、回本期，以及按 12/24/36 个月 cohort 划分的账户级 NRR；健康计划 PMPM 和合同条款
        - 渠道经济性决定可持续增速和利润率底线；健康计划经济性很可能与雇主渠道显著不同
        - CFO 和销售运营数据室；商业团队演示
      - - 股权结构与清算优先权堆栈
        - Series A–E 股份类别、清算优先权、反稀释条款、棘轮条款和参与权；完全稀释后总股数
        - 在 $3.3B 估值下，优先股清算优先权堆栈可能吃掉低于 $5B 退出中的大量收益；普通股回报高度取决于资本结构
        - 法务；CFO 提供的股权结构模型；Series E 条款清单披露
      - - Alma 整合进展与协同计划
        - 整合里程碑、Alma 贡献的 ARR、技术整合路线图，以及 2025 年收购后的预计协同时间表
        - 收购风险不小；整合失败曾让 Teladoc 损失 $13B+，也重创其他收购方；Alma ARR 是增量还是蚕食仍不清楚
        - 整合 PMO；产品和工程负责人；Alma 原有客户留存数据
    claimRefs:
