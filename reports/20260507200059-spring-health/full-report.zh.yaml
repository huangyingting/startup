      - number: '3.3'
        title: 竞争护城河与风险评估
        blocks:
          - type: paragraph
            body: >
              Spring Health 的可防守优势包括：（1）JAMA 验证结果——2025 年 JAMA Network Open
              论文是该行业最高等级的独立临床证明；没有直接竞争对手在同等规模上拥有类似同行评审验证。（2）ROI 保证承诺——第 3 年 3× ROI 是合同层面的差异化，传统 EAP 服务商无法匹配。（3）精准 AI
              匹配——自研算法基于规模化临床结果训练；会员越多，匹配模型越好，形成数据飞轮。（4）完整 EAP 替代——唯一把数字自助到专科精神科护理路径放进一个整合产品的平台。（5）Alma
              组合——增加消费者市场连续性，截至 2026 年没有竞争对手复制。

              护城河被侵蚀的风险包括：（1）Lyra 于 2025 年 10 月推出「临床级 AI」，说明 Lyra 正在积极攻击 Spring Health 的精准匹配优势。（2）Optum
              的规模和保险整合创造了捆绑采购动态，可能把 Spring Health 挡在 UnitedHealth 覆盖的雇主合同之外。（3）Modern Health 的国际覆盖（70+
              国家）可能成为跨国公司采购时的决定因素，而 Spring Health 尚未能全球服务。（4）广泛质疑数字心理健康有效性的荟萃分析（Fierce Healthcare 2025）带来类别级逆风，并不会区分
              Spring Health 特定临床验证。
