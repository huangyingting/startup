      - number: '8.5'
        title: 关键尽调请求
        blocks:
          - type: paragraph
            body: >
              在对 Spring Health 形成完整投资信念前，优先级最高的五项数据室材料，围绕八个尽调章节中最实质的证据缺口展开。第一且最关键：按雇主队列年份（2020–2024）拆分的
              ARR、总收入和净收入留存，因为整个估值逻辑取决于确认 ARR 是否落在 $130–300M 的分析师估计区间内。第二：Spring Health 使用管理、事前授权和网络充足性协议的 MHPAEA
              NQTL（非定量治疗限制） 比较分析；雇主客户承担主要 MHPAEA 合规义务，一旦被认定违反平等性要求，就会迫使合同修改或终止。第三：Guide AI 临床责任法律意见（未经授权执业 / 行医、FDA SaMD
              分类、州心理健康执业法）以及相应错误与遗漏险、医疗过失险覆盖额度。第四：渠道经济性——健康计划 PMPM、CAC 回收期，以及 12、24、36 个月队列的账户级
              NRR——用于确认健康计划经济性相对雇主直销渠道是增厚还是稀释。第五：Series A 到 E 的股权结构表和清算优先权瀑布，包括反稀释条款和参与权；在 $3.3B 估值、累计融资 $488M
              的情况下，若退出低于 $5B，优先权堆栈会实质影响普通股回报。
            claimRefs: []
