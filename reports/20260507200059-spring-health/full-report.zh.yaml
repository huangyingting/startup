            body: >
              Spring Health 披露的客户名单覆盖多个大型雇主垂直领域。锚定客户包括 Microsoft（科技，全球数万名员工）、Target（零售，400,000 名团队成员）、J.P. Morgan
              Chase（金融，约 300,000 名员工）、Delta Airlines（交通，约 95,000 名员工）、Wawa（食品零售，45,000+ 名员工）和 Wellstar Health System（总部
              Georgia 的健康系统，24,000+ 名员工）。这些已具名账户估计覆盖 900,000+ 直营员工，构成了 $3.3B 估值阶段企业福利平台典型的蓝筹 logo 组合。

              垂直组合的广度值得注意：医疗系统（Wellstar）、金融服务（JPMorgan）、科技（Microsoft）、零售（Target、Wawa）和交通（Delta）。这种跨行业多元化缓解了垂直集中风险；基于披露
              logo 组合，未见单一行业占收入超过 20–30%。Hearst（媒体 / 出版）和 Point32Health（健康计划）补足公开确认客户集，显示公司已渗透到媒体和管理式护理渠道。

              雇主渠道包括 450+ 直营客户和 27,000+ 渠道合作伙伴团体。20M
