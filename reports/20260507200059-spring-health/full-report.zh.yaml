  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              雇主心理健康平台市场有三层竞争。第一层（数字优先平台）：Spring Health、Lyra Health 和 Modern Health
              是三家由风险资本支持的独角兽，面向大型雇主提供全谱系心理健康平台。三家公司都声称拥有同行评审结果，都采用 PEPM 订阅模式，也都瞄准 Fortune 500 和 500+ 员工的中端市场雇主。

              第二层（行为健康管理机构 / EAP 存量玩家）：Optum Behavioral Health（UnitedHealth Group）、Magellan Health（Centene）、Beacon
              Health Options（Anthem）和 ComPsych 掌握现有雇主 EAP 与行为健康管理式合同。这些存量玩家有深度保险整合、成熟管理基础设施和高切换成本，但使用率只有
              5–8%，临床衡量有限，用户体验老旧。

              第三层（单点方案和消费者应用）：Headspace、Calm、Talkspace、BetterHelp 以及冥想 /
              睡眠应用，服务较低严重度的健康需求。Talkspace（上市公司，NASDAQ）面向消费者和部分雇主，但单位经济承压。BetterHelp（Teladoc
              子公司）按订阅人数看是最大的消费者远程治疗平台，但雇主整合深度不足，且因数据实践受到 FTC 审查。

              Spring Health 的战略位置处在第一层的高端：JAMA 验证的临床证明最强、服务方质量标准最高、具备完整 EAP 替代能力，并且是唯一承诺 ROI 保证的平台。它的 PEPM
              高于第二层存量玩家，但交付的结果可衡量且更好。
            claimRefs:
