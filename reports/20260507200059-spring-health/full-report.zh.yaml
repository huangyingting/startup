      - number: '2.2'
        title: TAM、SAM 与 SOM 测算
        blocks:
          - type: paragraph
            body: >
              总可用市场（TAM）：全球行为健康市场 2022 年估计为 $95–$105B，预计到 2030 年以 7–8% CAGR 增至约 $177B。美国行为健康直接总支出 2022 年估计约
              $280B，是全球最大的单一国家市场。在美国，雇主赞助保险覆盖约 165M 名基于雇佣关系获得健康计划的美国人（KFF 2024 Employer Health Benefits
              Survey）。雇主心理健康福利支出约为每名员工每年 $182–$220（包含 EAP 和行为健康 carve-out），对应美国雇主 TAM 每年 $30–$36B。

              可服务市场（SAM）：Spring Health 面向中大型雇主（500+ 员工）和全国性健康计划。美国约有 40,000–45,000 个 500+ 员工的雇主团体，覆盖约 95M
              名员工。以综合心理健康平台每人 $150 PEPM 的保守潜力测算，Spring Health 的 SAM 约为每年 $17–$20B。截至 2025 年，数字优先雇主心理健康平台（Spring
              Health、Lyra、Modern Health 合计）渗透率低于该 SAM 的 10%。

              可获取市场（SOM）：截至 2025 年，Spring Health 服务 450+ 直营雇主客户和 27,000 个渠道合作伙伴团体，覆盖 20M+ 人群。按中位 PEPM $30–$50、20M
              覆盖人群测算，如果所有人都完全激活，隐含年收入潜力约为 $7.2B–$12B；实际 ARR 未披露。

              也存在一个相互矛盾的估计：Mental Health Apps 市场（MarketsandMarkets 2026）2025 年价值 $9.94B，预计 2030 年达到
              $22.73B。这是更窄的纯数字切片；Spring Health 的市场还包括传统 EAP 替代和健康计划签约，规模更大。
