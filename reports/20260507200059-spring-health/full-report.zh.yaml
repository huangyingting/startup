      - number: '8.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 临床证据是真的——财务证据缺失
            body: >
              Spring Health 罕见地拥有真正经同行评审的临床结果证据（JAMA 2025）；多数数字健康公司只在新闻稿中宣称这类结果。JAMA RCT 显示 1.9× ROI 和住院率降低
              50%，构成可防守的护城河。缺失的是财务部分：ARR、NRR 和单位经济完全不透明，没有数据室就无法精确估值。
            calloutType: insight
            claimRefs:
              - CV006
              - CV026
          - type: callout
            title: 公开可比公司重估风险很实质
            body: >
              Accolade、Talkspace 和 Teladoc 目前都以 1–3× ARR 交易，较 2021 年峰值倍数低约 80–90%。Spring Health $3.3B 估值对应 11–25×
              ARR，需要相对公开可比公司持续维持溢价。若心理健康科技进一步重估，或 Spring Health 增长轨迹不及预期，2025–2026 年融资或 IPO 出现降估值轮是现实可能。
            calloutType: insight
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV031
              - CV032
          - type: callout
            title: Lyra Health 2022 年 $4.8B 是最接近先例——且可能已减值
            body: >
              Lyra Health 2022 年 Series F 估值 $4.8B，是该板块高水位。自 2022 年以来没有披露新融资，加上公开可比公司重估，Lyra 在基金 NAV 上很可能已大幅下调。Spring
              Health 2024 年 4 月 $3.3B 融资更近，也带有更高的临床证据溢价，但行业逆风相似。
            calloutType: insight
