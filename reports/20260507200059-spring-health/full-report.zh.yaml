      - number: '7.2'
        title: 法律与责任风险
        blocks:
          - type: paragraph
            body: >
              Spring Health 的临床交付模式把持牌提供者放到重度心理健康会员的照护链条中，因此直接暴露于临床过失和监督不足责任。不同于声明不承担临床责任的软件平台，Spring Health
              作为有组织的医疗交付系统运营，拥有签约提供者、结果责任和 ROI 保证；这些都会产生纯技术平台不承担的义务。

              最重要的新兴法律风险是 AI 临床责任。Guide AI 的主动连续照护模式让 AI 系统主动向会员提出心理健康照护建议。若 Guide AI 未能发现危机信号、给出错误指导，或延误会员获得急诊照护，Spring
              Health 可能面临专业责任索赔；索赔可以直接指向公司，也可能通过其提供者网络的赔偿义务传导。VERA-MH 安全框架覆盖聊天机器人自杀意念风险，但 Guide 的主动模式没有任何已发布安全标准覆盖。

              FTC BetterHelp 同意令（2023）确立了法律先例：即使向用户披露，与广告平台共享心理健康数据仍违反 FTC Section 5。Spring Health
              使用分析供应商、再营销像素和雇主分析仪表盘时，必须避免 BetterHelp 式违规：未经明确知情同意，为非治疗目的向第三方共享会员心理健康状态、治疗历史或参与数据。

              42 CFR Part 2 联邦法规（物质使用障碍患者记录保密）对共享 SUD 治疗记录施加了标准 HIPAA 之外的额外同意要求。Spring Health 的 Specialty Care SUD
              路径在与雇主分析仪表盘共享数据时必须遵守 Part 2；许多数字健康公司都在这一领域遇到过意外的合规复杂性。
