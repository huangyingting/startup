            body: >
              Spring Health 的主要获客渠道是直销给 500+ 员工组织的 HR 和福利负责人。公司披露的承诺是第 3 年保证 3× ROI（第 2 年 2×，第 1
              年成本中性）；这是一项有财务背书的绩效保证，可降低 HR 买方采购风险，也把 Spring Health 与只跟踪结果、不给财务保证的竞争对手区分开。该保证带来选择效应：只有人群密度足以支撑统计上有意义的 ROI
              测量时，客户才会承诺签约，这可能让披露客户群偏向拥有 2,000+ 名注册员工的大型雇主。

