            ROI 保证、Alma）
        - id: N4
          label: |-
            财务风险
            （未披露 ARR；
            单位经济性不透明）
        - id: N5
          label: |-
            监管 / AI 风险
            （FTC 数据共享；
            MHPAEA NQTL；
            Guide 责任）
        - id: N6
