        - Validate demand through employer survey or HR partner data
      - - Provider shortage (7,000+ psychiatrist shortfall)
        - Headwind
        - 2024–2030
        - Limits Spring Health's ability to scale 10,000+ network without quality dilution
        - Request provider network growth plan and attrition data in data room
      - - Employer budget pressure / CFO skepticism
        - Headwind
        - 2024–2026 recession scenarios
        - Benefits budgets are discretionary; ROI guarantee reduces but does not eliminate risk
        - Review contract renewal rates and churn data in data room
      - - Privacy and stigma (employer data fears)
        - Headwind
        - Ongoing
        - Reduces voluntary engagement; Spring Health addresses via HIPAA partitioning
        - Confirm data firewall architecture with HIPAA privacy officer
      - - Digital health platform consolidation
        - Mixed
        - 2024–2027
        - M&A could create a larger combined competitor; Alma combination strengthens Spring Health's moat
        - Track Lyra/Modern Health funding and partnership activity
