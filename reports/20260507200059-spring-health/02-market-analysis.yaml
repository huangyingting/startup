  claims:
    - id: CM001
      statement: >-
        Spring Health's primary served market is the US employer-sponsored behavioral health benefits segment,
        specifically replacing legacy EAP contracts at 500+ employee companies.
      type: inferred
      topic: market-definition
      sourceRefs:
        - SM008
        - SM009
      confidence: high
      freshness: current
    - id: CM002
      statement: >-
        Legacy EAP products typically achieve 5–8% employee utilization rates, leaving more than 90% of covered
        employees without mental health support in any given year.
      type: estimated
      topic: market-definition
      sourceRefs:
        - SM006
        - SM010
      confidence: medium
      freshness: current
    - id: CM003
      statement: >-
        The 2024 final rule under the Mental Health Parity and Addiction Equity Act (MHPAEA) requires employers to
        document equivalent mental health and substance use benefits compared to medical/surgical coverage—a standard
        legacy EAP products typically cannot meet.
      type: third-party-reported
      topic: regulatory
      sourceRefs:
        - SM015
        - SM004
      confidence: high
      freshness: current
    - id: CM004
      statement: >-
        Spring Health's Knox-Keene license (2025) enables it to contract directly with California health plans as a
        managed behavioral health organization, expanding its addressable market to the commercial and Medicaid managed
        care channel.
      type: company-claimed
      topic: market-expansion
      sourceRefs:
        - SM011
        - SM008
      confidence: high
      freshness: current
    - id: CM005
      statement: >-
        The global behavioral health market was estimated at approximately $95–$105 billion in 2022, with projections of
        approximately $177 billion by 2030, representing a 7–8% annual growth rate.
      type: third-party-reported
      topic: market-size
      sourceRefs:
        - SM005
        - SM007
      confidence: medium
      freshness: recent
    - id: CM006
      statement: >-
        The mental health apps digital sub-market was valued at $9.94 billion in 2025 and is projected to reach $22.73
        billion by 2030 at an 18% CAGR, a faster growth rate than the broader behavioral health market.
      type: third-party-reported
      topic: market-size
      sourceRefs:
        - SM007
        - SM005
      confidence: medium
      freshness: current
    - id: CM007
      statement: >-
        Spring Health serves 450+ direct employer clients and 27,000+ channel-partner groups covering 20M+ lives as of
        2025, representing penetration of less than 2% of the estimated 40,000+ US employer groups with 500+ employees.
      type: company-claimed
      topic: market-penetration
      sourceRefs:
        - SM008
        - SM009
      confidence: high
      freshness: current
    - id: CM008
      statement: >-
        The US has approximately 40,000–45,000 employer groups with 500+ employees, providing a serviceable addressable
        market of approximately $17–20 billion annually for a full-spectrum mental health platform at a conservative
        $150 PEPM ceiling.
      type: estimated
      topic: market-size
