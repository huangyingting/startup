  - id: SM003
    title: Market Drivers and Constraints
    body: >
      Growth drivers operating over the 2024–2030 period: (1) Mental health crisis—23.4% of US adults (61.5M people)
      experience a mental illness in any given year (NAMI 2024); 1 in 20 have serious mental illness; adolescent female
      mental health has worsened continuously since 2019. (2) Employer cost and productivity imperative—mental health
      conditions cost US employers $16.8B+ annually in lost productivity and 200M+ workdays; 50% of Millennials and 75%
      of Gen Z have left jobs for mental health reasons, making this a talent retention issue. (3) Mental health parity
      regulation—the MHPAEA (2008) and its 2024 final rule require employer-sponsored health plans to provide equivalent
      coverage for mental health and substance use as for medical/surgical conditions, creating compliance pressure to
      upgrade legacy EAP. (4) Telehealth permanence—post-COVID telehealth adoption has normalized virtual behavioral
      health care, lowering session drop-off and enabling national provider networks. (5) Precision AI evidence—the 2025
      JAMA validation of Spring Health's platform gave digital behavioral health enterprise-grade clinical proof for the
      first time.

      Market constraints: (1) Provider shortage—the US faces a shortage of licensed psychiatrists and therapists,
      estimated at a shortfall of 7,000+ psychiatrists nationwide (HRSA). Building a 10,000+ quality provider network is
      a significant supply barrier. (2) Employer budget cycles—benefits decisions are typically made annually during
      open enrollment, slowing platform transitions. (3) Integration complexity—employer HR and payroll systems, insurer
      claims adjudication, and mental health platforms require deep API integration. (4) ROI skepticism—despite growing
      peer-reviewed evidence, many CFOs still question whether digital behavioral health delivers measurable financial
      returns. (5) Privacy and stigma—employees fear that using mental health benefits through an employer-sponsored
      platform exposes their usage data to their employer.
