callouts:
  - id: KM001
    type: strength
    title: Mental health parity regulation is the biggest enterprise sales catalyst
    body: >
      The DOL/HHS/Treasury 2024 final rule under the Mental Health Parity and Addiction Equity Act requires employers to
      demonstrate that their behavioral health benefits are equivalent to medical/surgical coverage—a requirement that
      most legacy EAP products structurally fail. This compliance imperative is driving large employers to evaluate
      Spring Health as a replacement, independent of ROI arguments. Regulatory tailwind is a structural market driver
      that competes on mandatory action, not optional upgrade.
    claimRefs:
      - CM015
      - CM016
      - CM003
  - id: KM002
    type: risk
    title: Spring Health serves <3% of its SAM; scaling beyond 450 employers is unproven
    body: >
      With 450+ direct employers in a SAM of ~40,000 groups with 500+ employees, Spring Health has penetrated less than
      2% of its primary market. While this demonstrates significant upside, the company's growth model has yet to prove
      whether it can scale beyond its current blue-chip anchor accounts into the mid-market, where HR departments are
      smaller and price sensitivity is higher. The company's disclosed 27,000 channel-partner groups provide volume
      coverage, but unit economics in channel relationships may differ from direct sales.
    claimRefs:
      - CM007
      - CM008
      - CM020
  - id: KM003
    type: insight
    title: Provider shortage constrains the entire digital behavioral health sector
    body: >
      The US faces a shortage of 7,000+ psychiatrists and a broader clinician gap that affects all digital mental health
      platforms equally. Spring Health's 10,000+ provider network is a meaningful asset, but adding providers faster
      than competitors is a supply-constrained arms race. Platforms that solve quality—not just volume—will win. Spring
      Health's precision matching model claims to reduce provider mis-match, but the underlying provider scarcity is a
      structural headwind for the entire sector's growth rate.
    claimRefs:
      - CM018
      - CM019
      - CM021
