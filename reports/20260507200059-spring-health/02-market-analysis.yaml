  number: 2
  title: Market Analysis
  summary: >
    Spring Health operates at the intersection of three concentric markets: the $280B US total behavioral health spend,
    the $95B+ global behavioral health market (growing to ~$177B by 2030), and the $30-50B US employer-sponsored
    behavioral health benefits segment—which is Spring Health's primary served market. The employer segment is
    characterized by chronic underutilization of legacy EAP products (5–8% engagement), a documented productivity crisis
    ($16.8B lost annually in the US), and strong employer ROI motivation that digital-first precision platforms can
    quantify and capture. Mental health parity regulation, post-COVID workforce demand, and a generational shift in
    workforce expectations (50% of Millennials and 75% of Gen Z have left jobs for mental health reasons) are structural
    tailwinds. Key constraints include the licensed provider shortage, telehealth reimbursement policy uncertainty, and
    employer budget cycles that slow enterprise adoption. Spring Health's SAM is the roughly 40,000+ US employer groups
    with 500+ employees—a segment where digital benefits platforms have achieved less than 10% penetration.
sections:
  - id: SM001
    title: Market Definition and Scope
    body: >
      Spring Health participates in the US employer-sponsored behavioral health benefits market as its primary served
      market, with secondary access to the broader managed behavioral health market (health plans, Medicaid, Medicare
      Advantage) via its 2025 Knox-Keene license.

      The market is segmented into four distinct spend pools: (1) Legacy EAP (Employee Assistance Programs)—phone-based
      counseling with 5–8% average utilization; (2) traditional mental health carve-outs managed by Magellan, Optum, or
      Beacon—high cost, low member experience; (3) digital-first point solutions (Spring Health, Lyra, Modern
      Health)—full-spectrum platforms replacing legacy EAP with clinically measured outcomes; and (4) consumer direct-
      pay apps (Headspace, Calm, BetterHelp)—low acuity, no employer integration. Spring Health competes in pool 3 and
      is displacing pool 1 and 2 contracts.

      Excluded from Spring Health's addressable market (as of 2026): inpatient psychiatric hospital stays, residential
      substance use treatment, clinical drug trials, and direct-to- consumer mental health apps without employer
      contracts. The Alma combination introduces a hybrid: consumer-facing therapist marketplace for members
      post-employment, but this is an ancillary channel, not the primary revenue driver.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
    tableRefs:
      - TM001
      - TM004
  - id: SM002
    title: TAM, SAM, and SOM Sizing
    body: >
      Total Addressable Market (TAM): The global behavioral health market was estimated at $95– $105B in 2022 and is
      projected to reach approximately $177B by 2030 at a 7–8% CAGR. US behavioral health total direct spending was
      estimated at approximately $280B in 2022, representing the single largest national market globally. Within the US,
      employer-sponsored insurance covers approximately 165 million Americans under employment-based health plans (KFF
      2024 Employer Health Benefits Survey). The employer mental health spend is approximately $182–$220 per employee
      per year across benefits (inclusive of EAP and behavioral health carve-outs), implying a US employer TAM of
      $30–$36B annually.

      Serviceable Addressable Market (SAM): Spring Health targets mid-to-large employers (500+ employees) and national
      health plans. The US has approximately 40,000–45,000 employer groups with 500+ employees, covering ~95 million
      workers. At a conservative $150 PEPM potential for a comprehensive mental health platform, the Spring Health SAM
      is approximately $17–$20B per year. The digital-first employer mental health platforms (Spring Health, Lyra,
      Modern Health combined) have penetrated fewer than 10% of this SAM as of 2025.

      Serviceable Obtainable Market (SOM): Spring Health serves 450+ direct employer clients and 27,000 channel partner
      groups covering 20M+ lives as of 2025. At a mid-range PEPM of $30– $50 and 20M covered lives, this implies
      ~$7.2B–$12B annual implied revenue potential if fully activated—with actual ARR undisclosed.

      A contradictory estimate exists: the Mental Health Apps market (MarketsandMarkets 2026) is valued at $9.94B in
      2025 and projected to reach $22.73B by 2030. This is a narrower digital-only slice; Spring Health's market
      includes traditional EAP replacement and health plan contracting which is larger.
    claimRefs:
