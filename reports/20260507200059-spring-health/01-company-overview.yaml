callouts:
  - id: KO001
    type: strength
    title: JAMA-validated outcomes create rare third-party clinical proof
    body: >
      Spring Health's 2025 JAMA Network Open study is one of the few peer-reviewed publications validating a digital
      mental health platform at scale: 92% clinical improvement, 1.9× employer ROI, 50% lower hospital costs, and
      5.9-week recovery—evidence that sharply differentiates Spring Health from competitors whose outcomes are largely
      self-reported.
    claimRefs:
      - CO021
      - CO022
      - CO023
  - id: KO002
    type: strength
    title: Blue-chip enterprise customers with guaranteed ROI commitment
    body: >
      Named customers include Microsoft, Target, J.P. Morgan Chase, and Delta Airlines. Spring Health backs its claim
      with a published performance guarantee (3× ROI by Year 3) and the Wellstar case study ($4.30 saved per $1
      invested), creating compelling enterprise sales proof that no pure EAP provider can match.
    claimRefs:
      - CO027
      - CO028
      - CO025
      - CO026
  - id: KO003
    type: risk
    title: Revenue undisclosed; key-person concentration in founders
    body: >
      Spring Health has never disclosed ARR, revenue, or profitability. With $488M+ raised and a capital-intensive
      provider-network model, the path to profitability is opaque. Key-person risk is also elevated: Koh and Chekroud
      together hold the company's scientific credibility, fundraising relationships, and clinical roadmap.
    claimRefs:
      - CO029
      - CO011
  - id: KO004
    type: insight
    title: Alma combination enables lifelong mental health continuity
    body: >
      The 2025 completion of the Spring Health–Alma combination merges Spring Health's employer- sponsored benefits
      platform with Alma's consumer-facing marketplace of independent therapists. This enables members to maintain
      provider relationships and care continuity beyond their employment tenure, significantly expanding Spring Health's
      lifetime customer relationship value.
    claimRefs:
      - CO015
      - CO030
