callouts:
  - id: KE001
    type: insight
    title: VERA-MH open-source framework establishes Spring Health as AI safety standards-setter
    body: >
      Spring Health's decision to release VERA-MH as an open-source AI safety evaluation tool— rather than keeping it
      proprietary—represents a deliberate developer ecosystem strategy. By co-authoring the first clinical standard for
      evaluating GenAI mental health chatbots and making it publicly accessible at vera-mh.com, Spring Health positions
      itself as the reference implementation for responsible AI in behavioral health. This approach mirrors Google's and
      Microsoft's pattern of open-sourcing safety frameworks to set industry standards they can also meet with their own
      products—creating regulatory and reputational advantages while also generating trust signals for enterprise
      buyers.
    claimRefs:
      - CE014
      - CE015
      - CE016
  - id: KE002
    type: risk
    title: AI clinical accuracy risks grow as Guide extends AI into continuous, between-session care
    body: >
      Guide AI's continuous-care model—proactively nudging members between sessions based on engagement signals—creates
      new clinical and liability risks. An AI that incorrectly assesses a member's mental state between sessions, fails
      to escalate a crisis signal, or provides inappropriate support during a high-risk moment could cause direct
      clinical harm. VERA-MH addresses chatbot safety for suicidal ideation but the standard applies to consumer-facing
      AI; it is unclear whether Guide AI's proactive nudge model (not a conversational chatbot) has been independently
      evaluated under the same framework.
    claimRefs:
      - CE012
      - CE016
