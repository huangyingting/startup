chapter:
  order: 5
  number: 5
  title: Product and Technology
  summary: >
    Spring Health's technology stack is a vertically integrated, AI-native precision mental healthcare platform built on
    a proprietary measurement-based care engine. The core IP is the Machine Learning Precision Mental Healthcare
    model—which matches members to the "right care at the right time" by assessing 3,000+ data points including PHQ-9,
    GAD-7, and proprietary questionnaire responses. The product stack includes SpringWorks (employer platform),
    SpringLife (member app), Guide (AI-powered continuous care), Atlas (recommendation engine), Compass EHR (built-in
    clinical record system), and Specialty Care pathways for high-acuity conditions. The platform integrates with major
    HRISs (Workday, ADP) and is FHIR-compliant for health plan interoperability. VERA-MH (2024), a co-developed
    open-source AI safety evaluation framework, signals the company's investment in responsible AI and
    developer-community positioning. Key technology risks include AI model bias, provider-quality control at scale, and
    EHR interoperability complexity as health plan channels expand.
sections:
  - id: SE001
    title: Core Technology Architecture and Proprietary AI Engine
    body: >
      Spring Health's foundational technology is the Precision Mental Healthcare (PMH) engine— a machine learning system
      trained on clinical outcome data that assigns a personalized care plan to each member. The model ingests responses
      to validated clinical assessments (PHQ-9 for depression, GAD-7 for anxiety, and proprietary burnout/stress
      indices) and maps them to one of 13 defined care pathways—from digital exercises to psychiatric medication
      management. This AI-driven matching differentiates Spring Health from EAP providers that assign care uniformly or
      rely entirely on member self-selection.

      The platform is built to be FHIR R4-compliant, enabling bidirectional data exchange with commercial health plans
      and electronic health record systems—a critical architectural requirement for the Knox-Keene health plan channel
      launched in 2025. Atlas, the company's proprietary recommendation engine (launched 2022), provides real-time
      provider matching that reduced time-to-appointment to under 2 days for most members. Guide (launched 2025) is an
      AI-powered care navigation experience that proactively surfaces the right next step for members between provider
      sessions—positioning Spring Health as a continuous-care platform rather than a session-episodic service.

      The VERA-MH open-source AI safety evaluation framework (co-developed with a clinical expert council, 2024) is the
      first published standard for evaluating GenAI responses to suicidal ideation in mental health contexts. The public
      release serves both a safety purpose and a developer community strategy—making Spring Health a standards-setter
      rather than a passive adopter of third-party AI safety frameworks.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
    tableRefs:
