  - id: SE003
    title: Integration Architecture and Platform Differentiation
    body: >
      Spring Health integrates with the major enterprise HR and benefits technology stacks. The Workday Wellness Partner
      Program integration (2026) connects SpringLife directly into Workday's employee wellness hub, enabling
      single-sign-on (SSO) and enrollment without separate app downloads—reducing activation friction and increasing
      utilization rates. Integration with ADP, Salesforce Health Cloud, and major TPAs is supported through standard
      OAuth 2.0 API connections.

      The HIPAA-compliant data architecture uses end-to-end encryption for member data, a zero-retention policy for AI
      model training on clinical conversations (asserted by VERA-MH RFI guidelines), and role-based access control for
      employer administrators who receive only aggregate, de-identified engagement data. The company's 2025 Knox-Keene
      California license required FHIR-based electronic data interchange (EDI) compliance with California health plan
      data standards.

      The primary technology differentiation moat is the PMH training data set—cumulative clinical outcome records from
      20M+ covered lives over six years of measurement-based care cycles. This dataset is proprietary and grows
      continuously, creating a data moat that pure EAP providers and newer entrants cannot easily replicate. The
      combination of clinical outcomes data, AI matching, and a built-in EHR (Compass) distinguishes Spring Health from
      both legacy EAP providers (no clinical data infrastructure) and point solutions (single-condition focus without
      population health measurement).
    claimRefs:
      - CE012
      - CE013
      - CE014
      - CE015
      - CE016
