  - id: SE002
    title: Product Portfolio and Clinical Workflow
    body: >
      Spring Health offers a modular product suite built around the employer benefit deployment model. SpringWorks is
      the employer-facing configuration and analytics platform, providing HR administrators with engagement reporting,
      utilization data, and ROI dashboards. SpringLife is the member-facing mobile and web application through which
      employees access assessments, book appointments, access digital exercises, and interact with Guide AI. Compass EHR
      is Spring Health's proprietary electronic health record, built specifically for behavioral health—enabling
      structured clinical documentation, outcome tracking, and care coordination within the provider network.

      Specialty Care (launched 2023) addresses high-acuity conditions—eating disorders, substance use disorder (SUD),
      ADHD, OCD, and severe depression—through dedicated care pathways with specialists and case management. This
      extends the platform from EAP replacement to comprehensive behavioral health management (BHM). The Bloom content
      acquisition (2022) added self-guided digital therapeutic content (dCBT, mindfulness, stress modules) to the
      SpringLife app, reducing dependency on synchronous provider sessions for lower-acuity members.

      The Alma combination (2025) adds a consumer marketplace layer: Alma's directory of 10,000+ independent therapists
      in all 50 states is now accessible through SpringLife, extending reach beyond the contracted employer network to
      individuals seeking self-pay or insurance-based therapy without employer sponsorship.
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
      - CE011
