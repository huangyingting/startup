acknowledgedWarnings:
  - dimension: figureType
    reason: >
      Planned figure types (flow, waterfall, range, matrix) were substituted with bar charts because
      Spring Health has never disclosed revenue, margins, or unit economics. A waterfall requires
      real revenue breakdown; a range chart requires real ARR/margin ranges; a flow requires process
      data not applicable here; a matrix is better suited to Chapter 3. Bar charts for funding history,
      valuation step-up, ARR sensitivity, and valuation multiple are the most appropriate representations
      for fully estimated financial data. Substitution documented in evidenceGaps.
company:
  name: Spring Health
chapter:
  order: 4
  number: 4
  title: Financials
  summary: >
    Spring Health is a private company that has never disclosed revenue, ARR, margins, or unit
    economics. Its financial profile is reconstructable only from disclosed financing events:
    $488M+ raised across Series A–E (2020–2024); last confirmed valuation $3.3B (April 2024);
    no SEC Form D filings identified in EDGAR. The company's revenue model is PEPM subscription
    from employer clients and health plans, with PEPM rates estimated at $30–50 for direct
    employer accounts. With 20M+ covered lives, the theoretical ARR ceiling is $7–12B—but
    actual PEPM realization, employer conversion rates, and churn are unknown. Capital adequacy
    appears sufficient for a 24–36 month runway based on the April 2024 $100M Series E and
    absence of a capital raise through the run date. The largest financial risk is undisclosed
    burn rate against a $3.3B valuation premium that requires continued high growth. The Alma
    combination (2025) introduces integration cost and potential revenue dilution from a
    consumer-facing marketplace model with different unit economics.

sections:
  - id: SI001
    title: Funding History and Valuation
    body: >
      Spring Health has raised $488M+ across five disclosed rounds. Series A: $22M (2020,
      Kinnevik and Work-Bench); Series B: $76M (2021, Tiger Global); Series C: $190M (2022,
      Tiger Global, post-money valuation $2B); Series D: Not publicly confirmed; Series E:
      $100M (April 2024, post-money valuation $3.3B per Fortune exclusive). The gap between
      Series C and Series E—approximately two years with no confirmed Series D—may reflect
      an undisclosed bridge, an unlabeled extension round, or simply that the company did not
      require additional capital between 2022 and 2024.

      The $3.3B Series E valuation represents a 65% step-up from the $2B Series C valuation,
      achieved over approximately two years of operations. This implies the company has been
      growing fast enough to justify a premium relative to the broader digital health
      repricing that affected most venture-backed companies in 2022–2023. No SEC Form D
      filings were identified in EDGAR under Spring Health, Inc., Spring Health Benefits,
      or related entity names—which may reflect Delaware-level state exemptions rather than
      no capital raise.

      Investor profile: Tiger Global (led Series B and C), Kinnevik (led Series A), William
      Blair. Dipak Golechha (CFO, Palo Alto Networks) joined the board in 2025, signaling
      preparation for a potential public offering or large institutional financing event.
    claimRefs: [CI001, CI002, CI003, CI004, CI005]

  - id: SI002
    title: Revenue Model and Unit Economics Estimate
    body: >
      Spring Health generates revenue primarily through PEPM (per employee per month)
      subscription fees charged to employers for access to the Spring Health mental health
      benefits platform. Health plan channel revenue, introduced via the Knox-Keene license
      (2025), follows a capitation or PMPM model; this is early-stage revenue as of the run
      date. The Alma combination (2025) adds consumer marketplace revenue through Alma's
      therapist marketplace, a different unit economics profile with potentially lower
      ARPU and higher churn than the enterprise PEPM core.

      Implied ARR estimate (analyst-inferred): 20M covered lives × $30–50 PEPM × 12 months
      would imply $7.2B–$12B theoretical ceiling ARR if all covered lives were active
      subscribers at full commercial rates. However, covered lives include channel-partner
      groups where per-life PEPM may be significantly lower, and not all covered employees
      actively engage. A more conservative estimate using 450 direct employer clients at
      $150–300 PEPY (per employee per year) and an assumed average headcount of 2,000
      employees per client implies $135M–$270M ARR from direct employer contracts—broadly
      consistent with a high-growth Series E stage company.

      Unit economics remain entirely private. No gross margin, CAC, LTV, or payback period
      data has been disclosed. Provider network costs (10,000+ licensed providers), customer
      success headcount (1,001–5,000 employees), and technology costs are all substantive
      expense items whose scale versus revenue is unknown.
    claimRefs: [CI006, CI007, CI008, CI009, CI010, CI011]

  - id: SI003
    title: Capital Adequacy and Financial Risk Assessment
    body: >
      The April 2024 Series E ($100M) is the last confirmed financing event. With no
      subsequent capital announcement through the run date (May 2026), the company has been
      operating on existing capital for approximately 13 months. Given typical Series E
      company burn rates of $5–15M per month for a company of Spring Health's scale, the
      residual runway from the Series E at the run date is 7–20 months—suggesting either
      the company is approaching a new capital raise, has achieved near-breakeven operations,
      or has additional undisclosed capital sources (e.g., debt facility, revenue-based
      financing).

      The $3.3B valuation at Series E implies a return expectation of $10B+ for a 3× return
      at exit. At Spring Health's estimated ARR range ($135M–$270M), the revenue multiple
      implied by the valuation is approximately 12–24×. This is a premium that requires
      sustained growth of 40%+ annually to maintain—a high bar given the current employer
      benefits renewal cycle and competition from Lyra and Optum.

      Alma combination financial risks: The combination with Alma introduces consumer-facing
      revenue, which historically has higher churn, lower ARPU, and different regulatory cost
      profiles (Knox-Keene) than Spring Health's enterprise core. Integration costs were not
      disclosed. The combination appears strategic (market expansion) rather than financial
      (accretive), suggesting near-term margin dilution is likely.

      CFO board appointment (Dipak Golechha, Palo Alto Networks CFO) in 2025 is a governance
      strengthening signal typically associated with IPO preparation or large late-stage round
      preparation—potentially signaling a capital event within 12–24 months of the run date.
    claimRefs: [CI012, CI013, CI014, CI015, CI016]

