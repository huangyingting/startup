callouts:
  - id: KI001
    type: risk
    title: Revenue is entirely undisclosed – $3.3B valuation rests on unverified financials
    body: >
      Spring Health has never disclosed ARR, revenue, margins, or unit economics. The $3.3B
      valuation implies $9.9B+ exit value for a 3× VC return—requiring either IPO or strategic
      acquisition at a premium. Without verifying revenue, the valuation is purely based on
      market positioning, clinical proof, and growth trajectory. At an estimated $135–360M
      implied ARR, the revenue multiple ranges from 9×–24×—well above public SaaS healthcare
      comps (5–10×) and requiring sustained 40%+ annual growth to maintain.
    claimRefs: [CI008, CI009, CI015]

  - id: KI002
    type: risk
    title: No SEC Form D filings found; Series D absence creates cap table uncertainty
    body: >
      SEC EDGAR returned no Form D filings under Spring Health, Inc. or known entity names.
      While private companies often claim state-level Reg D exemptions, the absence of any
      federal filing is unusual for a company of this scale. More importantly, no Series D
      has been publicly confirmed between the 2022 Series C and April 2024 Series E—a two-year
      gap during which the company could have raised an undisclosed bridge, extension, or
      venture debt facility. Cap table uncertainty requires data room verification.
    claimRefs: [CI005, CI013, CI014]

  - id: KI003
    type: insight
    title: CFO board appointment signals IPO or late-stage capital event preparation
    body: >
      The 2025 appointment of Dipak Golechha (CFO, Palo Alto Networks) to Spring Health's board
      is a governance signal typically associated with IPO preparation or late-stage institutional
      fundraising. Palo Alto Networks is a publicly traded enterprise tech company; Golechha's
      expertise in public-market financial operations, investor relations, and governance would
      add board-level capability that Spring Health's current stage requires. This does not
      confirm an IPO timeline but is a meaningful board composition indicator for financial
      events within 12–24 months of the run date.
    claimRefs: [CI016, CI012]

