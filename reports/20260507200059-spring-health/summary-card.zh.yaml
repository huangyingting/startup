summary:
  headline: |
    Spring Health 是全球证据最扎实的雇主心理健康独角兽；JAMA 2025 同行评议 RCT
    给出了直接竞争对手都拿不出的金标准临床结果证明。2024 年 4 月 Series E 轮估值
    $3.3B，是独立雇主心理健康福利公司里的最高水平；按分析师 $130–300M 的宽 ARR
    估计区间计算，对应 11–25× ARR。投资结论是有条件买入：强临床证据、MHPAEA
    执法顺风，以及 Alma 带来的多渠道可选性支撑溢价估值；但财务不透明（ARR
    零披露）、MHPAEA NQTL 合规风险、Guide AI 临床责任未量化，留下实质性信心缺口。
    签 term sheet 前必须进 data room。适合 4–7 年持有期的成长期投资者。
