          - type: callout
            title: 13x ARR 倍数意味着要守住估值，年同比增长需达到 40-50%
            body: >-
              在 $85M ARR 上按 13x 定价，Tines 当前估值押注的是持续高增长。若 ARR 增速降至 30% 以下，收入倍数会向低增长安全软件常见的 8-10x 区间压缩，Series D
              将面临下轮估值下调风险。守住增长动能，是当前资本结构最重要的财务约束。
            calloutType: insight
