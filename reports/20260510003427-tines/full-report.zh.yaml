      - number: '6.5'
        title: 客户风险画像与尽调缺口
        blocks:
          - type: paragraph
            body: >
              从客户风险看，核心担忧有三点：（1）客户集中度——若少数企业账号贡献了不成比例的 ARR，单一客户流失就会实质影响收入；（2）NRR 与流失——留存率不披露，就无法验证 Tines 的 ARR
              增长究竟来自净新增客户，还是来自存量账号扩张，而这一区分会实质影响增长质量；（3）非技术用户的学习曲线风险，在复杂环境里可能导致实施失败，并推动缺少专职自动化工程师的小客户流失。


              Gartner 替代品视角和 PeerSpot 批评评论提供了反向信号：Tines 并非每次评估都赢。客户需要更深 SIEM 集成或复杂分支逻辑时，有些会选择 Splunk SOAR 或 Cortex
              XSOAR。Gartner 的 Tines 替代品页面确认，买家在承诺购买前，会把 Tines 与多个 SOAR 平台比较。竞争性流失风险可管理，但真实存在；尤其 Splunk 和 Palo Alto
              仍在投入平台集成和企业销售支持。


              Tines 没有发布 SLA，企业评论者也指出公开可见的审计日志深度有限，这意味着部分买家在签署 Enterprise 合同前，可能要求额外谈判保护。投资人尽调时应索取客户流失率、NRR、账号集中度数据（前 10
              大客户占 ARR 的比例），以及 pilot-to-close 转化率。
