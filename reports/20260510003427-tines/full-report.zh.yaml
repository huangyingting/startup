      - number: '5.3'
        title: 集成生态与开发者体验
        blocks:
          - type: paragraph
            body: >
              Tines 提供超过 700 个预置集成，按安全、IT、生产力、协作、云和数据等类别组织。与 CrowdStrike Falcon、Elastic、IBM
              QRadar、AWS、1Password、HashiCorp 的战略集成，让 Tines 深入安全运营栈；这类客户通常同时运行 5 到 15
              个工具。集成库既是商业护城河（已经投入这些工具的客户会面对切换成本），也是采用加速器（预置 action 降低了常见厂商的配置工作量）。


              开发者体验是 Tines 有意押注的产品优先级。快速入门文档用面向公开 API 的示例 HTTP action，把新用户从创建账号带到第一个可运行 story，全程只需数分钟。Tines 的 GitHub
              组织托管开源示例、社区贡献和自动化蓝图，安全工程师可以 fork 并改造。这种面向开发者的发布策略养成了从业者社区，并通过安全论坛和会议演讲中的同行推荐放大 Tines 的触达。


              Swimlane 公开发布的 SOAR 对比承认，与大量依赖脚本的替代方案相比，Tines 这类无代码平台能缩短自动化配置时间；但 Swimlane 也主张自己的低代码路径保留了高阶用户扩展性。Fivetran
              案例量化了价值主张：Fivetran 用 Tines 将 GTM 和财务工作流的自动化规模扩大 3x，说明平台适用范围已经从安全运营延伸到一般企业自动化。合作伙伴生态在 2026 年增长 25%，新增 75
              个技术伙伴，表明公司仍在投入这条集成护城河。
