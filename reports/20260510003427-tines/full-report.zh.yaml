            title: 投资决策前要求提供毛利率、NRR、CAC 和烧钱速度
            body: 财务承销需要五个关键指标，但公开资料拿不到：毛利率、净留存率（NRR）、获客成本（CAC）、月度烧钱速度，以及按客户划分的收入集中度。作出任何投资承诺前，必须通过正式资料室拿到这些数据，才可能负责任地建模。
