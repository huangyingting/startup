              - CV016
      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景与估值区间
        blocks:
          - type: paragraph
            body: >
              乐观情景假设 Tines 到 2027 年仍保持 60%+ ARR 增长，2027 年底 ARR 达到约 $340M，且 NRR 确认为 120% 以上，没有重大客户集中或竞争性流失。若公司在 2028 年
              IPO 或 M&A 流程中仍以 60%+ 增长且 NRR 较高，12x ARR 退出倍数合理；乐观情景企业价值达到 $4.1B，意味着 Series C 投资三年回报 3.6x。这要求公司成功完成 Series
              D 融资，并在对抗 Cisco-Splunk 打包时持续保持竞争差异化。


              基准情景假设到 2027 年 ARR 增长为 50%，达到约 $280M，NRR 处于 110–120% 区间。若退出倍数为 9x ARR（反映相较私人市场估值高点略有倍数压缩），基准情景企业价值约
              $2.5B，意味着 2.2x 回报。该情景要求没有重大伙伴倒戈，并在安全自动化细分市场继续获取份额。


              悲观情景假设 ARR 年同比增速降至 35%——由 Cisco-Splunk 平台打包压力和 NRR 低于 110% 触发——2027 年 ARR 约为 $200M。按 5x ARR
              倍数计，反映增长放缓公司面临的倍数压缩，悲观情景企业价值为 $1.0B，低于当前 $1.125B 估值标记。这代表下轮降估值场景，或最多持平退出，隐含 0.9x 回报（按进入价格计损失资本）。


              Mordor Intelligence 估计 SOAR 市场为 $6.9B，到 2029 年 CAGR 13.4%；即便在悲观情景，Tines 2027 年市场份额也低于
              3%。这说明总可用市场不是硬约束，执行和竞争动态才是。
