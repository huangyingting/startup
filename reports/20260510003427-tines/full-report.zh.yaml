      - number: '5.2'
        title: AI 与智能自动化功能
        blocks:
          - type: paragraph
            body: >
              Tines 于 2025 年 6 月推出 AI Agents，这是平台创立以来最重要的一次产品演进。传统 SOAR playbook 执行的是确定性、预定义序列；Tines Agents
              则能基于输入数据推理，在可用 action 中选择，并在从业者设定的护栏内自主执行多步骤任务。Agents 仍用同一个 story
              画布构建，但加入大语言模型推理步骤，根据告警文本、工单内容、邮件正文等非结构化或半结构化输入决定走哪条路径。


              嵌入 story 构建器的 AI Copilot 允许用户用自然语言描述自动化需求，并生成 story 骨架；不熟悉平台的用户把第一个工作流搭起来，时间从数小时降到数分钟。Tines 还加入 Model
              Context Protocol（MCP）集成，让 Agents 能调用外部 AI 系统中的工具——自主决策面因此不再局限于 Tines 自己的 action 库。


              Anthropic 用 Tines 跑 AI 安全自动化工作流，验证了该平台适合构建自有 AI 产品的 AI-native 组织。AI 功能推出后，Tines 的可服务范围不再只是传统 SOAR
              市场，也延伸到更广泛的企业 AI 自动化空间：组织希望在现有工具链之上部署 LLM 推理，而不自建定制基础设施。Help Net Security 将 Agents 发布解读为从规则式编排转向自主 AI
              运营，这与 Gartner 2025 技术趋势分析捕捉到的企业自动化市场迁移一致。
