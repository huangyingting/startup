      - number: '3.4'
        title: 定价与包装分析
        blocks:
          - type: paragraph
            body: >-
              Tines 提供免费社区层、Starter 层，以及团队或企业层。定价基于工作流执行量（story
              执行次数），而不是按席位收费；这让成本与价值交付一致，但也会让高流量安全运营中心的账单变得不可预测。基于第三方评论信号和社区讨论，企业合同估计为每年 $50,000 至 $200,000，不过标价未公开。Palo
              Alto Cortex XSOAR 定价不透明，但企业部署通常每年达到六位数，并与 XSIAM 或 XSOAR 许可证捆绑。Splunk SOAR 作为 Splunk
              平台许可证的附加项定价，独立比较困难；Cisco 整合又给既有客户带来额外定价不确定性。Swimlane 发布按席位或工作流分层定价，但企业级同样不透明。ServiceNow Security
              Operations 是 ServiceNow ITSM 许可证的附加模块，通常意味着一笔可观增购，已深度使用 ServiceNow 的客户可能会消化，但这也为新进入者制造高门槛。Tines 采用的社区层和
              Starter 层策略，是获取漏斗顶端实践者的结构性优势。不过，基于用量的定价模型在自动化使用量扩大时会带来预算冲击风险；买方评论和续约分析显示，这是真实摩擦点，会在续约时推动客户评估竞争对手。
