    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >
              Tines 是一个工作流自动化平台，2018 年由 Eoin Hinchy（CEO）和 Thomas Kinsella（COO
              兼首席客户官）创立于爱尔兰都柏林。公司最初的使命，是消除压垮安全运营团队的重复性手工工作——两位创始人在 Deloitte、eBay 欧洲安全部门和 DocuSign 任职时都亲身遭遇过这个问题，Hinchy
              曾任 DocuSign 安全运营高级总监。2014 年 eBay 数据泄露事件暴露了 145 million 条用户记录，直接促使 Hinchy 决定创办
              Tines：他想要一个平台，让安全工程师不用编写生产代码，也能自动化复杂的多步骤工作流。

              平台靠一个名为 “stories” 的可视化拖拽工作流构建器兑现承诺，实践者可以把动作、条件和集成连接成自动化流水线。Tines 已从聚焦安全的工具成长为更广的企业自动化平台，如今服务 IT 运营、法务、HR
              和业务流程自动化等团队。截至 2025 年，平台拥有 700 多个预构建集成和工具库；2025 年中推出的 AI Agent 能力，又把平台推进到自主决策和任务执行。Tines 将自身商业模式定义为：不需要传统
              SOAR 的复杂度，也不需要昂贵的专业服务项目，就能交付企业级规模的自动化。公司双总部位于都柏林（欧洲总部）和纽约（美国运营），并通过 SOC 2 Type II 和 ISO 27001 认证。
