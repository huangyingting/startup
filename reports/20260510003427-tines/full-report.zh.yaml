  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览与分层分布
        blocks:
          - type: paragraph
            body: >
              截至 2025 年，Tines 服务约 33,000 名用户或组织，这一数字来自 Series C 新闻材料。客户基础覆盖企业、中端市场和个人从业者，Community Edition
              提供免费入口，为企业销售管线播种。已具名企业客户包括 Coinbase、Mars、Intercom、Canva、GitLab、Elastic、Databricks、Reddit、HubSpot 和
              Hulu——这组跨行业组合说明，Tines 已成功从安全运营起点扩展到更广泛的企业自动化。


              从地域看，Tines 客户分布在北美、欧洲（尤其英国和爱尔兰）以及
              APAC。欧洲存在感受益于都柏林总部，以及公司参与爱尔兰科技生态。客户组合偏向科技公司和数字原生企业，这与平台的安全运营血统、以及它和云原生工具栈的集成一致。


              细分分布数据没有公开，具体包括按 ARR 区间、行业垂直、地理区域或公司规模的拆分。这是有意义的尽调缺口：Tines 的收入究竟来自广泛的中端市场
              logo，还是集中在少数大企业合同，会实质影响客户集中度风险和流失画像。公开领域没有 NPS、总留存率和净留存率（NRR）数据，也进一步限制了在没有直接尽调权限时评估客户健康度的能力。
