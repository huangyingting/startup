      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              SOAR 和安全自动化采用最持久的驱动力，是威胁量和告警疲劳持续上升。企业安全栈越来越复杂——加入端点检测、云安全态势管理、身份与访问管理、SaaS 监控层——需要人工分诊的告警量增长快于人员编制。SOAR
              平台通过自动化第一轮分诊和响应来修正这种失衡，减少需要分析师关注的告警数量。这一动态是结构性的，不太可能逆转，因此是企业安全中最持久的需求驱动之一。

              监管驱动正成为次级催化剂。SEC 的网络安全披露规则（大型加速申报公司自 2023 年 12
              月起适用）要求上市公司在四个工作日内报告重大网络安全事件，直接创造了对更快事件检测和文档化响应流程的组织需求——两者都由 SOAR 平台支持。GDPR、HIPAA 和 NIS2 在欧洲市场提出类似要求；考虑到
              Tines 总部位于爱尔兰并拥有欧洲客户基础，这会直接利好 Tines。切换成本和现有厂商锁定构成主要采用约束：已经部署 Palo Alto Cortex XSOAR 或 Splunk SOAR
              的组织，拥有用专有脚本语言构建的既有自动化剧本、集成配置和分析师肌肉记忆；这些都会在评估迁移到 Tines 时制造摩擦。该约束在续约周期利好现有厂商，但可能降低 Tines 销售团队在竞争性替换场景中的胜率。
            claimRefs:
