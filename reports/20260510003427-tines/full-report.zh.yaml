      - number: '6.4'
        title: 获客、留存与扩张信号
        blocks:
          - type: paragraph
            body: >
              Tines 的 go-to-market 模型把两条路径合在一起：以 Community Edition 带动的产品驱动增长，以及面向安全运营和 IT 团队的企业直销。Community Edition
              提供免费、低摩擦入口；从业者在公司内部推动平台后，再转化为企业合同。这种自下而上的采用模式，符合开发者工具和安全工具公司的常见路径：从业者背书先于采购流程。


              公开资料没有披露 NRR（净留存率）和总留存率数据。作为替代指标，ARR 从 $13.4M（2024）到约 $85M（2025）的轨迹意味着，约 6x 增长要么来自大量新 logo
              获取，要么来自强劲的先落地再扩张动力，也可能两者兼有。按这一增速，客户在初始部署用例之外继续自动化更多工作流，Tines 很可能从中获得有意义的扩张收入。


              Fivetran（从安全扩展到 GTM 和财务自动化）和 Canva（从事件响应扩展到身份管理）等具名客户表明，Tines 在以安全为切入口进入企业账号后，会穿透多个部门并捕获扩张收入。Irish Tech
              News 报道 Tines 成为独角兽，将其视为企业商业牵引力的验证；TechEU 也指出 Series C 融资反映投资人对客户增长轨迹有强信心。
