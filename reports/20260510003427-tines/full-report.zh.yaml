  - id: TV005
    title: 投资逻辑失效与否决触发因素表
    columns:
      - 触发因素
      - 阈值 / 事件
      - 对投资逻辑的影响
      - 应对动作
    rows:
      - - ARR 增长减速
        - 连续 2 个及以上季度同比低于 50%
        - 基准情景转向悲观；回报潜力降至 0.9x
        - 重新承做投资论证；评估竞争根因
      - - NRR 低于 110%
        - 尽调确认 NRR 低于 110%
        - 增长质量不可接受；ARR 倍数站不住
        - 谈判压价，或按当前估值放弃
      - - 联合创始人离职
        - Eoin Hinchy 或 Thomas Kinsella 在 18 个月内离职
        - 产品连续性与投资人信心面临风险
        - 启动高管搜寻；承诺投资前评估管理梯队厚度
      - - 主要合作伙伴流失
        - CrowdStrike 或 PagerDuty 终止 Tines 集成，或宣布竞争性自动化产品
        - GTM 渠道和产品生态受冲击
        - 量化 ARR 暴露；建模不依赖伙伴的情景
      - - Cisco-Splunk 免费捆绑 SOAR
        - Cisco 宣布 SOAR 随 Splunk Enterprise Security 免费提供
        - 企业评估胜率坍塌；ARR 增长停滞
        - 立即重新承做投资论证；大概率进入悲观情景
      - - 重大数据泄露（GDPR/CCPA）
        - 公开披露数据泄露，或遭监管执法
        - 企业客户流失风险上升；NRR 坍塌；IPO 窗口关闭
        - 评估法律风险敞口；重新评估客户留存
      - - Series D 轮估值抬升至 >30x ARR
        - Series D 轮在 ARR 增长 <$100M 情况下以 >$2.5B 估值完成
        - IRR 被稀释；退出回报空间有限
        - 评估老股退出；按 Series D 条款建模稀释
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
      - CV038
    notes: 触发因素是分析师定义的阈值，基于可比 SaaS 投资框架。Tines 未披露内部监控标准。
