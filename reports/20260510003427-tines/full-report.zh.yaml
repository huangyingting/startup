              到 2025 年，Tines 已公开披露一组指标，显示其在当前融资阶段具备相当规模。平台每周执行超过 1 billion 次自动化动作，公司将该数字用作头部指标，传达真实部署广度。第三方分析师数据库估计，2025
              年年经常性收入（ARR）约为 $85M，较 2024 年报告的 $13.4M ARR 明显加速。公司服务约 33,000 名用户或组织，具名客户包括
