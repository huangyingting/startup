      - number: '2.5'
        title: 规模测算缺口、矛盾与尽调路径
        blocks:
          - type: paragraph
            body: >
              SOAR 市场规模测算存在几处重大不一致，尽调应记录这些不一致，而不是武断解决。第一，所参考的三份主要分析师报告采用不同市场边界——Mordor Intelligence 的 $1.87B
              数字似乎限定在安全专用平台，而 Market Research Future 的更高估算可能包含相邻 IT 自动化支出。第二，没有任何公开报告拆出 Tines
              最直接覆盖的无代码或云原生子板块，因此在没有分析师构建假设的情况下，无法推导出有来源支持的 SAM。第三，SOAR 类别本身正承受定义压力：随着 Tines 等平台从安全扩展到 IT 和业务流程自动化，传统
              SOAR 边界变得没那么有意义，可能因纳入 ITPA 或 iPaaS 支出而高估 TAM，也可能因排除 Tines 可捕获的企业自动化预算而低估 TAM。

              第四，Tines 自身约 $85M ARR 已占无代码 SOAR 子板块的相当比例，说明可触达 SAM 可能小于自上而下估算所暗示的规模；也可能说明 Tines
              已在一个新兴板块中拿下异常高的份额。要消解这一模糊性，需要拿到无代码 SOAR 子市场的分析师拆分，或 Swimlane、Torq 等同业可比收入数据。在这些数据点可用前，任何 Tines 市场份额或 SAM
              渗透率计算都应标注为分析师构建，并用多组市场边界假设进行敏感性测试。
            claimRefs:
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
