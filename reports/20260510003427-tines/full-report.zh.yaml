  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              Tines 在 SOAR 和企业自动化平台市场，与 Splunk SOAR、Palo Alto Cortex XSOAR、Swimlane，以及 Microsoft Power
              Automate、Workato、Zapier 等通用低代码平台竞争。主要竞争替代风险来自两个方向：大型安全厂商把 SOAR
              能力打包进套件产品，并以负毛利拿下更大的平台交易；以及超大规模云厂商（AWS、Microsoft、Google）投入原生编排工具后，工作流自动化被商品化。


              Cisco 于 2024 年以约 $28B 收购 Splunk 后，Cisco-Splunk 组合成为强势 SOAR 既有玩家：企业关系深、现场销售能力强，并拥有原生 SIEM-SOAR 集成，而 Tines
              目前必须通过 HTTP connector 去桥接。Palo Alto Networks 的 Cortex XSOAR 受益于类似平台打包逻辑，可与 Prisma 和 Cortex XDR
              一起销售；平台交易的经济模型允许 XSOAR 大幅折扣。Tines 的无代码差异化和产品质量——G2 4.7/5 评分有所体现——提供部分缓冲，但无法消除大型企业买家为减少供应商数量而选择既有平台的风险。


              在非安全核心自动化用例中，Microsoft Power Automate 取代 Tines 的风险在中端市场账号里相当实质，因为 Microsoft 365 授权已经包含工作流自动化能力。Tines
              的安全运营专长和 connector 质量，在安全买家群体中构成差异化；但随着 Tines 扩展到 IT、财务和 GTM 自动化（具名客户案例已经显示），对 Power Automate 和 Workato
              的竞争暴露会增加。Swimlane 新 Turbine 平台则明确定位为 Tines 的安全原生替代方案。
