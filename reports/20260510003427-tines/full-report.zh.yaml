      - number: '6.2'
        title: 具名客户案例
        blocks:
          - type: paragraph
            body: >
              Tines 为一组选定企业客户发布了详细案例，合起来展示了平台在安全、IT、业务运营和财务场景中的适用性。全球消费品公司 Mars 用 Tines
              自动化安全事件工作流，这些流程过去需要分析师手工处理——说明平台适合工具栈复杂的大型企业环境。客户消息平台 Intercom 部署 Tines
              来加速钓鱼邮件分流和邮件安全自动化，让安全团队在不按比例增加人手的情况下提高告警处理吞吐。


              设计平台 Canva 用 Tines 自动化访问管理和身份开通工作流，代表用例从核心安全事件响应扩展到 IT 运营。GitLab 用 Tines 做安全运营自动化，案例显示平台适配全远程、云原生工程文化中的
              DevSecOps 工作流。战略集成伙伴 Elastic 将 Tines 与自身可观测性栈并行部署，用于规模化自动化安全和 IT 运营，因此既是客户背书，也是 go-to-market 放大器。


              Reddit 的部署覆盖安全和 IT 运营中的多个自动化用例。Hulu 用 Tines 处理媒体与娱乐垂直的自动化工作流，把可服务客户基础扩展到新行业。Databricks 和 HubSpot
              也分别代表向数据工程和营销技术买家群体扩张，说明 Tines 平台没有被安全运营小众场景锁死，而能跨工作流服务多类企业买家。
