  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Tines 投资逻辑建立在五个支柱上：（1）庞大且增长中的总可用市场——全球 SOAR 市场估计为 $6.9B，CAGR 13.4%，安全编排已开始扩展到更广泛的企业自动化；（2）同类最佳的产品差异化——G2 上
              397 条评价给出 4.7/5，Gartner 上 54 名企业评价者给出 4.9/5，说明在一个存在多个根深蒂固但满意度较低既有玩家的市场里，Tines 产品质量真实；（3）异常强的 ARR 速度——从
              2024 年 $13.4M 到 2025 年约 $85M，单年隐含 6x 增长，超过常规高增长 SaaS 基准；（4）企业级证明——Coinbase、Canva、GitLab、Fivetran 等 10+
              具名企业客户有记录在生产环境部署；（5）围绕无代码范式构建的可防守竞争位置，降低采用门槛，推动从业者主导的自下而上增长，并缩短销售周期。


              反向逻辑集中在四个担忧：（1）来自 Cisco-Splunk 和 Palo Alto Networks 的竞争替代风险，两者能在企业平台交易中以折扣价打包 SOAR；（2）Series C 进入时 13x ARR
              倍数——高增长公司可承受，但若增长放缓，下行缓冲有限；（3）NRR 和留存指标未披露，ARR 增长质量无法验证——若增长主要来自新 logo
              获取且留存较弱，这一倍数站不住；（4）客户集中度和分析深度缺口，可能在需要更深报表和更少供应商的账号中推动企业流失。


              能把结论从谨慎买入推到坚定买入的关键尽调解锁，是确认 NRR 高于 110%，并拿到可验证的客户集中度数据，证明没有单一账号贡献超过 ARR 的 10%。若 NRR 低于 110%，投资逻辑会显著转弱。
