      - number: '4.3'
        title: 成本结构与毛利率
        blocks:
          - type: paragraph
            body: >-
              Tines 的成本结构符合 Series C 阶段云原生 SaaS
              公司的典型特征。主要成本类别包括云基础设施（用于工作流执行的计算与存储）、工程、产品、销售和客户成功等职能的员工薪酬，以及包含合作伙伴共同销售投入的 GTM
              支出。毛利率未公开披露。以软件为主、专业服务收入相对有限的 SaaS 企业，在 Tines 规模上通常能达到 70-80% 毛利率；不过，Tines 的基于用量模型引入了随 story
              执行量相关变化的基础设施成本，可能压缩高利用率企业账户的利润率。如果专业服务收入占总 ARR 超过 15-20%，毛利率可能更接近
              60-70%。资本开支需求极低（云原生基础设施消除了实物资本开支），营运资本需求符合订阅 SaaS 业务常态。截至 2026 年，公司约有 562
              名员工；按行业基准估计，一个都柏林加纽约双总部、具备工程和销售组织的同规模公司，年度总薪酬成本约 $80-100M。这意味着在 ARR
              实质超过总现金运营成本前，公司会处于经营现金流为负状态；这在当前增长阶段属于典型且可预期。
