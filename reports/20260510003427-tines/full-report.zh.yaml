companyProfile:
  summary: >-
    Tines 是一家总部位于爱尔兰都柏林的工作流自动化公司，2018 年由 Eoin Hinchy（CEO）和 Thomas Kinsella（COO/CCO）创立。两人都曾在 eBay 欧洲安全部门和 DocuSign
    任职。平台让安全与企业团队通过可视化拖拽界面搭建复杂的多步骤自动化流程，Tines 将这些流程称为 “stories”，且无需编写代码。凭借 700+ 集成、2025 年推出的 AI Agent 能力，以及每周执行超过 1
    billion 次自动化动作，Tines 已从聚焦安全的 SOAR 替代方案演进为更宽的企业自动化平台。2025 年 2 月，Tines 完成由 Goldman Sachs Growth Equity 领投的 $125M
    Series C，估值 $1.125B，凭约 $85M ARR 和 33,000 名用户进入独角兽行列。在 SOAR 领域，Tines 与 Palo Alto Cortex XSOAR、Splunk SOAR、Swimlane 和
    Torq 竞争；在企业自动化市场，则面对更广泛的工作流平台。
