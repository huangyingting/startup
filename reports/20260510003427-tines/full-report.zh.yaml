      - number: '1.3'
        title: 融资历史、估值与投资方基础
        blocks:
          - type: paragraph
            body: >
              Tines 已在五个不同融资阶段累计获得约 $272M 风险资本。公司融资史始于 2018 年种子轮，随后是约 $16M 的 Series A（2019-2020 年，Accel 领投）、2021 年 $55M
              Series B（Addition 和 Felicis Ventures 领投）、2024 年 5 月 $50M Series B 延展轮，以及 2025 年 2 月 11 日完成的标志性 $125M
              Series C。Series C 由 Goldman Sachs Growth Equity 领投，并引入 SoftBank Vision Fund 2 和 Activant
              作为新投资方；Accel、Felicis、CrowdStrike Falcon Fund 和 Addition 继续参投。

              Series C 后，Tines 投后估值达到 $1.125B，成为爱尔兰最新的独角兽，并跻身 2025 年获得独角兽身份的 10 多家欧洲初创公司之列。Goldman Sachs Growth Equity
              在新闻材料中将 Tines 称为下一代安全自动化平台，把该投资放入其更广的企业软件投资逻辑中。CrowdStrike Falcon Fund 持续参与在战略层面值得关注：这显示 Tines
              与一家领先端点安全供应商保持一致，而该供应商的客户常需要 Tines 能提供的编排和自动化能力。跨所有轮次约 $272M 的累计融资，为 Tines 当前阶段提供了实质性资本基础，可支撑其投入 AI
              产品能力、GTM 扩张和国际招聘。
