            body: >-
              Tines 最可靠的公开财务信号，是 2025 年 2 月的 Series C 新闻稿，其中确认投后估值 $1.125B、融资 $125M。GetLatka、Tracxn 等第三方数据库估计 2025 年 ARR
              约为 $85M，与估值隐含约 13x 收入倍数一致。该倍数处在企业安全软件同业组高端，但有已记录的两位数收入增长、强劲净收入留存信号和一线投资方财团支撑。已披露运营指标包括截至 2025 年每周超过 1
              billion 次工作流动作，以及超过 33,000 名注册用户；不过这些是参与度指标，而非财务 KPI。公司未披露 ARR 增长率；40-50% 的同比增长率将与同业倍数和 $1.125B
              估值的基准情景相符。GitHub、Canva、Coinbase、Databricks、Elastic、Intercom 和 Hulu 等具名客户标识提供了实质性社会证明，降低了收入质量叙事风险；但如果不知道前
