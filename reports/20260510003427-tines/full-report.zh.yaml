      - number: '1.2'
        title: 创始人、领导层与关键人物依赖
        blocks:
          - type: paragraph
            body: >
              Tines 由 Eoin Hinchy 和 Thomas Kinsella 共同创立，两人都在大型组织的企业安全运营中建立职业生涯。创办 Tines 前，Hinchy 曾任 DocuSign
              安全运营高级总监，此前在 eBay 欧洲部门和 Deloitte 担任安全领导职务。Kinsella
              走过几乎相同的组织路径。两位创始人共享的高风险安全运营背景，让他们直接看见要解决的痛点：告警疲劳、手工分诊，以及在缺少大量工程资源时无法以机器速度响应威胁。

              Hinchy 担任 CEO，是公司最主要的外部面孔，代表 Tines 出现在融资沟通、媒体活动和行业会议中。Kinsella 担任 COO
              兼首席客户官，负责售后关系和客户扩张收入。双创始人架构且分工清晰，相比单一创始人公司降低了单点故障风险；但 Hinchy 在资本市场和战略叙事中的突出位置，意味着 CEO
              角色仍然构成更高的关键人物依赖。Goldman Sachs Growth Equity、Accel
              等投资方已在多轮融资中支持该领导团队，显示其对执行质量的持续信心。正式董事会治理细节——确切构成、独立董事和投资方席位分配——尚未进入公开记录；对希望完整看清治理的投资者而言，这是一个尽调缺口。
