  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与核心机制
        blocks:
          - type: paragraph
            body: >
              Tines 围绕一个核心抽象构建，叫作 “story”：用户在拖拽画布上把单个动作串成可视化工作流，包括 HTTP 请求、转换、查找、发送邮件等。每个 story
              都有一个或多个触发器（webhook、定时、手动）来启动执行；story 运行时，工作流引擎会评估条件逻辑、循环，以及基于 Liquid 模板的转换。整个平台完全云原生，以多租户 SaaS 方式部署在 AWS
              基础设施上；受监管企业若要求数据留在特定地理区域，也可以选择数据驻留配置。


              工作流引擎把面向用户的 story 构建器（基于 React 的 Web UI）和执行运行时拆开，工作流处理可以独立于编排层横向扩展。Action 是最小组合单元：开箱可用的 action 类型包括 HTTP
              request、send-to-story、delay、trigger-story、event transform、date filter 和 group actions。HTTP request action
              是主要扩展机制，客户可以连接市场上任何 REST API 端点，不必等 Tines 发布第一方集成。这一架构选择降低了 Tines 对自身集成路线图的依赖，也让客户能立刻接入内部工具和定制服务。


              性能指标显示平台已有相当规模：截至 2025 年，每周执行超过 10 亿次自动化 action；这是公司披露的数据，可间接代表客户部署面的广度。Story 可以从 Tines Library
              导出并导入任意租户；该 Library 是一组经过整理的预置自动化配方，让常见安全和 IT 场景更快见效。Library 模式还带来网络效应：贡献模板的客户越多，新采用者获得的价值越大。
            claimRefs:
