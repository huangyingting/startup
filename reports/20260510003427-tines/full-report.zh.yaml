      - number: '8.5'
        title: 退出准备度、尽调要求与投资逻辑破裂触发因素
        blocks:
          - type: paragraph
            body: >
              Tines 最可能的退出路径有三条：（1）若 ARR 达到 $250–350M 且公开市场 SaaS 倍数修复，在 2027–2028 年 IPO；（2）被寻求工作流自动化能力的大型安全或云平台战略收购，包括
              Microsoft、CrowdStrike、Cisco/Splunk、Palo Alto Networks；（3）若 ARR 年同比增速持续高于 50%，以更高估值做老股交易或 Series
              D。收购情景在战略上成立，但考虑到既有 Cisco-Splunk SOAR 组合和 Palo Alto 的 Cortex XSOAR，也存在反垄断风险。


              ProductHunt 社区情绪和 DarkReading 对 Series C 的报道都确认，市场已广泛认知 Tines 是可行的企业安全自动化品牌——这是 IPO 退出准备度的前提。Irish
              Examiner 报道确认了 Tines 作为爱尔兰科技公司的重要性，也为都柏林员工留存和人才获取提供本地市场背景；这些因素会影响扩张执行。


              最终尽调中，以下资料会显著提高信心：（1）2024 和 2025 年经审计或审阅的财务报表，包括 NRR、总留存率和按队列划分的收入；（2）前 10 大客户 ARR 集中度百分比；（3）相对 Splunk
              SOAR 和 Cortex XSOAR 的胜负单分析；（4）员工数、流失率和开放岗位数据；（5）包含范围和例外的 SOC 2 审计报告；（6）Series C
              优先权条款，包括清算瀑布；（7）产品路线图，并说明在安全深度、分析改进和 AI Agent 扩张之间的投入分配。


              投资逻辑破裂触发因素：ARR 年同比增长低于 50%；NRR 低于 110%；任一共同创始人离职；Cisco-Splunk 宣布在平台交易中免费打包 SOAR；或发生重大数据泄露。
