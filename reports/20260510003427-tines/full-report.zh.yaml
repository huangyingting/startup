        - 集中度 >20% 会显著放大流失风险
        - 索取附 ARR 区间的保密客户名单
      - - 赢单 / 输单分析
        - 相对 Splunk / Cortex XSOAR 的竞争胜率未披露
        - 决定竞争护城河耐久度
        - 向 Tines 销售运营索取，或在 CEO 访谈中确认
      - - 员工数与流失率
        - 组织规模、增长率和流失率未披露
        - 评估执行扩张风险
        - 尽调中索取 HR 数据
      - - SOC 2 审计报告
        - 审计范围和例外事项未公开
        - 控制缺口可能让客户工作流暴露于泄露风险
        - 在 NDA 下索取；法务 / 安全审阅
      - - Series C 轮优先权条款
        - 清算分配瀑布未披露
        - 决定不同股份类别的回报分配
        - 向法务索取股权结构表和优先权条款
      - - 产品路线图
        - 分析能力投入和 AI 路线图未公开
        - 决定产品缺口能否补上
        - 在尽调访谈中与 CTO/CPO 审阅
      - - 烧钱速度与现金跑道
        - 月度现金消耗未披露
        - 决定 Series D 轮前融资风险
        - 索取 12 个月现金流预测
    claimRefs:
      - CV039
      - CV040
    notes: 尽调问题代表在 Series C 轮估值下确认或否定对 Tines 高确信买入建议所需的最低证据集。
