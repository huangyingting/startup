      - number: '7.2'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >
              Tines 受多套数据隐私与安全合规框架约束。公司持有 SOC 2 Type II 和 ISO 27001 认证，这是受监管行业企业采购的必要前提。Tines 总部在都柏林且拥有欧洲客户基础，GDPR
              合规至关重要；作为企业自动化工作流的数据处理者，Tines 必须维持适当的数据处理协议（DPA），并落实符合 GDPR Article 28 要求的技术控制。


              Tines 安全页面披露了 SOC 2 Type II 和 ISO 27001 这两项安全合规姿态，提供了可验证证据，说明公司已投入企业级基线合规基础设施。不过，SOC 2
              审计的范围和限制（哪些系统在范围内、是否记录例外）没有公开披露，构成尽调缺口。


              截至 2026 年 5 月，公开来源未识别出重大诉讼、监管执法行动、专利纠纷或数据泄露披露。Tines 帮助中心披露了定价和打包条款，包括订阅授权和数据驻留选项，可支持对基线合同条款做法律审查。Tines
              平台处理企业安全数据，包括可能敏感的事件工件、凭据引用和 API token；若客户自动化工作流发生数据泄露，监管风险会很实质。


              从授权和 IP 看，Tines 似乎没有自有专利组合，也没有披露的 IP 纠纷。公司注册在爱尔兰，这可能有利于满足欧盟数据驻留要求，但也让它作为数据控制者和处理者，在 GDPR 下接受爱尔兰监管监督。
            claimRefs:
