      - number: '5.4'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >
              Tines 持有 SOC 2 Type II 和 ISO 27001 认证，这是北美和欧洲企业 SaaS
              买家最常要求的两类安全合规标准。安全页面披露了静态与传输中加密、基于角色的访问控制（RBAC）、审计日志、SSO/SAML
              支持，以及数据驻留配置选项。多数企业安全采购清单的基线要求，这些控制项已经能覆盖，客户不必再请专业服务团队来做合规验证。


              平台云原生并托管在 AWS 上，因此 Tines 继承了 AWS 底层基础设施认证，包括 ISO 27001、SOC 1/2/3、PCI DSS 和 FedRAMP 等效项，合规防线分层。从数据处理看，story
              执行期间 Tines 只短暂处理客户工作流 payload；密钥单独入库，并在运行时注入，而不是以明文存放在 story 定义里。这种架构降低了凭据暴露事故的爆炸半径。


              PeerSpot 和 G2 的第三方评论指出了改进空间：部分企业客户认为，审计日志颗粒度和开箱报表深度落后于更成熟的 SIEM 邻近平台。即便如此，Gartner Peer Insights
              评价者（4.9/5）和 G2 用户（4.7/5）仍给平台整体信任度和可靠性打出高分。Community edition 带来额外安全面：免费社区账号共用同一套基础设施，因此 Tines
              必须在多租户架构中谨慎隔离社区层数据和企业租户。这条社区到企业的边界，是安全敏感型企业买家需要尽调的事项。
