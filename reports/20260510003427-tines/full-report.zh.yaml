      - number: '8.2'
        title: 融资背景、估值与进入纪律
        blocks:
          - type: paragraph
            body: >
              Tines 最近一次披露融资，是 2025 年 2 月的 Series C：融资 $125M，估值 $1.125B，由 DTCP 领投，Accel、Index Ventures 和 Bain Capital
              参与。Goldman Sachs Asset Management 也参与其中，提供机构质量背书。该交易由 PR Newswire 新闻稿和多家独立媒体来源确认，是本分析中证据较充分的私人公司估值标记之一。


              在约 $85M ARR 和 $1.125B 估值下，Series C 进入时隐含 ARR 倍数约 13.2x。增长画像相近的可比 SaaS 公司——规模化后的 ServiceNow、Automation
              Anywhere、UiPath——在年同比增长高于 50% 时，交易区间为 10–20x ARR。Tines 的 13x 倍数处于一家 ARR 年同比增长 6x
              公司可接受区间内，但位于溢价倍数低端，反映私人市场相对公开可比公司的合理折价。


              Dark Reading 对 Series C 的报道确认了 Goldman Sachs 和 Softbank 邻近投资人的参与，进一步增强估值标记可信度。Tracxn 公司档案提供了额外 ARR 和增长指标，与
              $85M ARR 和 $1.125B 估值一致。State of the Stack newsletter 分析深入评估了 Series C
              机制，并指出尽管存在竞争环境，该估值仍反映了投资人对无代码自动化市场的信念。


              优先股负担假设按 Series C 常规处理：累计融资 $155M 意味着累计清算优先权可能在 $155–230M 区间（1–1.5x 非参与优先股）。在 $1.125B 企业价值下，普通股仍有有意义的价值，但
              Series D 或退出场景中必须建模这一因素。
            claimRefs:
              - CV009
              - CV010
              - CV011
