      - number: '8.4'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Tines Series C 约 13x ARR 的倍数，应与处在相似增长阶段的安全自动化和工作流自动化公司比较。RPA 先驱 UiPath 在 2021 年 IPO 时约为 30x ARR，随后随着增长放缓降至
              5–8x ARR——这说明倍数压缩的下行风险。Automation Anywhere 2023 年按估计 $250M ARR、约 $6.8B 估值融资，隐含约 27x ARR——溢价反映其规模更大。与 Tines
              可比的横向工作流自动化平台 Workato，2022 年以约 $100M ARR、$7.7B 估值融资，隐含 77x ARR，处于私人市场估值峰值的极端溢价，之后已被压缩。


              XSOAR/Palo Alto Networks 没有单独估值标记；Palo Alto 整个 Cortex 平台约按 12–14x 收入交易。ServiceNow 是最成熟的工作流自动化既有玩家，约按
              13–15x NTM 收入交易——这说明 Tines 进入倍数与成熟企业自动化基准一致，不过 Tines 阶段更早，风险也更高。


              Market Research Future 估计更广泛的工作流自动化市场约 $26B，到 2030 年 CAGR 23.9%。这意味着 Tines 的 SOAR
              专长，是更大长期自动化浪潮中的一个可防守细分。IBM Think 对安全自动化的报道确认，大型企业在积极投入编排，利好整个类别。
            claimRefs:
              - CV025
