      - CV036
    notes: 建议对价格和证据敏感，基于截至 2026 年 5 月的公开信息；并非投资建议。
  - id: TV002
    title: 投资论点 / 反论点表
    columns:
      - 维度
      - 牛市论点
      - 反论点挑战
      - 改变判断的条件
    rows:
      - - 市场规模
        - $6.9B SOAR + 更广自动化 TAM；CAGR 13%
        - 若 SOAR 以零边际成本捆入平台套件，市场空间受限
        - SOAR 之外持续获取新 logo；CAGR 加速
      - - 产品质量
        - G2 4.7/5；Gartner 4.9/5；一流无代码 UX
        - 分析能力深度不足；非技术用户有学习曲线
        - 投入分析能力路线图；企业评审者反馈改善
      - - ARR 增长
        - 2024–2025 年同比增长 6x；持续 50%+ CAGR 可行
        - 若仅由新 logo 驱动且留存弱，则不可持续
        - NRR 确认 >110%；队列数据显示扩张可持续
      - - 客户验证
        - 10+ 个企业 logo；Anthropic、Mars、GitLab 生产环境使用
        - 未发布 NRR；集中度未知；Gartner 显示用户评估过替代方案
        - 前十大客户集中度 <10% ARR；共享流失数据
      - - 竞争
        - 无代码差异化；部署快于 SOAR 既有厂商
        - Cisco-Splunk 捆绑；Palo Alto 折扣；Swimlane Turbine 定位
        - 竞争胜率数据；SOAR Gartner MQ 定位
      - - 估值
        - Series C 阶段 6x 增长公司，13x ARR 合理
        - 下行缓冲有限；熊市情景意味着回报持平或下滑
        - NRR 已确认；收入质量数据降低估值风险
    claimRefs:
