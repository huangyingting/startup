            title: 若买方走向平台整合，捆绑威胁将影响生存
            body: >-
              Palo Alto Networks 和 Cisco/Splunk 可以在既有平台合同内以零边际成本提供等同 SOAR 的自动化。如果企业买方优先平台整合，而不是最佳单项 SOAR，Tines
              的独立收入模式将面临结构性价格底部压力。
            calloutType: risk
            claimRefs:
              - CP021
          - type: callout
            title: 基于用量定价制造续约摩擦
            body: 第三方评论数据持续把规模化后的成本不可预测性列为买方最关切问题之一。这让续约对话出现漏洞，Swimlane、Torq 和 ServiceNow 可以用更可预测的按席位或模块定价结构加以利用。
            calloutType: risk
            claimRefs:
              - CP015
              - CP038
          - type: callout
            title: Anthropic 合作显示 AI 原生差异化窗口
            body: >-
              Tines 与 Anthropic 合作，将 Claude 驱动的工作流智能引入平台，在传统 SOAR 厂商达到可比 AI 集成深度前，创造了 12-18 个月的差异化窗口。随着市场向 AI 功能趋同，Tines
              需要持续投入构建器内 AI，才能守住优势。
            calloutType: insight
            claimRefs:
              - CP020
              - CP034
          - type: callout
            title: 尽调 FedRAMP 与政府市场准入
            body: FedRAMP 授权状态在可得公开来源中未确认。考虑到政府和受监管行业扩张机会，任何投资决定前，都应把厘清 Tines 的 FedRAMP 路线图列为优先尽调问题。
            calloutType: recommendation
            claimRefs:
              - CP039
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >-
              Tines 经营云原生 SaaS 业务，采用基于用量的定价模型，锚定工作流 story
              执行量，而非按席位许可。该模型带来三项结构性优势：收入直接与客户价值实现绑定（运行更多自动化即产生更多收入）；能够提供社区免费层，在无需销售介入的情况下推动漏斗顶端实践者采用；客户随着时间自动化更多工作流时，扩张收入会自然被捕获。收入来源包括：（1）团队和企业层订阅合同，按
              story 执行次数定价；（2）面向大型企业部署的专业服务和入门导入，覆盖自定义工作流迁移或集成构建；（3）合作伙伴与应用市场生态安排，包括与 CrowdStrike、Elastic 和 HashiCorp
              的共同销售协议，带来推荐和分发收入。社区免费层和 Starter 层是亏损引流的获客工具，本身不是有意义的收入贡献者。基于第三方评论信号，企业和团队层合同估计为每年 $50,000 至 $200,000，但
              Tines 不公布标价。收入确认遵循标准 SaaS 按合同期分摊确认；公开来源中未识别到多年积压订单或递延收入披露。
