      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >-
              Tines 的 GTM 动作建立在自下而上的社区飞轮上。安全实践者通过免费 Community Edition 发现 Tines，构建初始自动化，形成内部倡导，再把需求拉向 CISO
              层级预算批准。相比自上而下的企业 SaaS 同业，这降低了传统外呼 CAC，但需要时间把社区拥护者转化为企业合同。公司运营一支直接企业销售团队，并由不断扩大的渠道合作伙伴网络补充，包括 CrowdStrike
              Falcon 应用市场（可触达约 24,000 家企业客户）、Elastic、HashiCorp 和 1Password。直接企业合同贡献 ARR
              的大部分。企业交易销售周期未披露，但考虑到实践者拥护者模式——安全工程师先完成初步评估，再进入采购——估计为 60 至 120 天。获客成本未公开；代理信号显示，在入站主导模型下 CAC
              效率较高，但没有内部队列数据，绝对 CAC-to-LTV 比率仍未知。拥有 500+ 企业客户和约 $85M ARR，隐含单个企业客户平均 ARR 约 $170,000，说明这个规模下的无代码工具合同价值健康。
