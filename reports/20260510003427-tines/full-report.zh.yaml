      - number: '4.6'
        title: 图表证据
        blocks:
          - type: callout
            title: 基于用量的模型在规模化时让收入与客户价值一致
            body: 按 story 执行次数定价会在客户自动化更多工作流时自然创造扩张收入机制。不同于按席位模型，它按使用深度捕获经济价值；如果客户扩大自动化足迹，就能支撑强劲净收入留存。
            calloutType: strength
            claimRefs:
              - CI001
              - CI007
          - type: callout
            title: 核心单位经济均不可得——无法完成财务承销
            body: 毛利率、烧钱速度、NRR、CAC 和 LTV 没有在任何公开来源中披露。仅基于公开数据作出投资决定，就必须接受每个财务承销输入都存在重大不确定性。这些都是标准数据室要求，必须在基于模型承销前取得。
            calloutType: risk
            claimRefs:
              - CI030
              - CI031
              - CI032
              - CI033
              - CI034
          - type: callout
            title: 基于用量计费在企业规模下制造收入可预测性风险
            body: 高使用量企业账号的月度费用容易失去可预测性，续约时会增加摩擦。若计费模式在大规模部署环境里造成价格冲击，客户可能转向 Swimlane 或 ServiceNow SecOps 的封顶定价方案，NRR 会被侵蚀。
            calloutType: risk
            claimRefs:
