  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Tines 同时处在安全编排、自动化与响应（SOAR）市场，以及更广的无代码企业工作流自动化空间。直接同业包括传统 SOAR 平台（Palo Alto Cortex XSOAR、Splunk
              SOAR）、云原生新锐（Torq、Swimlane），以及向安全运营扩展的 IT 服务管理现有厂商（ServiceNow SecOps）。相邻替代方案包括超自动化平台（UiPath、Microsoft Power
              Automate）、内部工程自建，以及点状集成工具（Tines 主要希望替换的现状方案）。竞争地形分为三个战略集群：（1）成熟的捆绑式 SOAR 套件，作为更大 XDR 或 SIEM
              平台的一部分销售；（2）面向安全实践者直接销售的独立无代码 SOAR 平台；（3）已添加安全自动化剧本模板的通用自动化厂商。Tines 正处于第二个集群，其无代码、实践者主导的 GTM
              和社区库，使其区别于传统套件。2025 年 Series C 以 $1.125B 估值完成，给 Tines 相比未融资或 Series A 阶段竞争者带来有意义的资本优势，但也让它直接面对资源雄厚的 Palo
              Alto 和 Splunk 母公司。Forrester 分析师将该轮融资称为对安全自动化投资逻辑的验证，同时指出来自传统厂商和超自动化厂商的竞争压力正在加剧。
