  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、定义与相邻领域
        blocks:
          - type: paragraph
            body: >
              Tines 位于两个不同但重叠的市场类别交汇处：安全编排、自动化与响应（SOAR），以及无代码 / 低代码企业工作流自动化。SOAR 是 Tines
              最直接争夺安全预算的类别，覆盖为安全运营中心自动化告警分诊、事件响应、威胁狩猎工作流和跨工具编排的平台。Mordor Intelligence、Market Research Future 和 The
              Business Research Company 等分析机构都把 SOAR 市场定义为包含软件和服务，这些软件和服务支持安全工具响应的自动化协同；但它们在是否纳入更广泛 IT
              流程自动化、还是只限于纯安全工作流上存在差异。

              相关相邻类别同样重要，并显著扩大潜在可触达市场。IT 流程自动化（ITPA）传统上与 ServiceNow 和 PagerDuty 相关；当安全团队用 Tines 自动化身份开通、访问审查、漏洞管理等 IT
              运营任务时，二者发生重叠。通用企业自动化平台——包括定位在安全之外的竞争性无代码工具——是第二个相邻领域，尤其当 Tines 追逐 HR、法务或财务工作流客户时。现状替代方案包括：安全工程团队维护的自定义
              Python/bash 脚本；成熟度较低 SOC
              使用的电子表格加邮件流程；以及没有自动化预算团队的全手工分析师工作流。判断潜在客户处在哪种替代状态，对预测交易规模和销售周期至关重要：替换脚本路径只需要工具采购，而替换传统 SOAR
              平台则需要迁移既有自动化剧本并重新培训运营人员。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
