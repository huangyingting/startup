      - number: '2.2'
        title: 市场规模——TAM、SAM 与现有证据
        blocks:
          - type: paragraph
            body: >
              三份不同分析师报告提供了对 SOAR 市场总可用市场（TAM）的估算，这些估算彼此重叠但不完全一致。Mordor Intelligence 估计，2025 年全球 SOAR 市场约为 $1.87B，并以约 18%
              的复合年增长率增长，到 2030 年超过 $4.4B。Market Research Future 给出更高基数，但使用不同方法，将相邻 IT 自动化支出纳入范围。The Business Research
              Company 发布覆盖同一时期的全球 SOAR 市场报告，CAGR 数字略有不同，反映各机构在处理同时服务安全与非安全自动化用例的平台收入归因时方法不一。

              从这些数字推导 Tines 专属的可服务市场（SAM），需要对几项因素作出假设：（a）SOAR 支出中有多少可由无代码云原生平台触达，而非传统本地部署；（b）安全自动化预算的地理分布，其中美国和英国代表企业
              SOC 人均支出最高的集中区；（c）当前由高切换成本现有厂商服务的更广市场份额。对 Tines 的保守 SAM 估算——限制在拥有 500+ 员工组织中的云原生、无代码或低代码 SOAR 部署——可能是 SOAR
              总 TAM 的 20–35%，即 2025 年约 $400M 至 $650M。这个区间由分析师按第一性原理构建，并非直接来自已发布数字，因此应视为有证据边界的估算，而不是确定性 SAM。在该框架下，Tines
              2025 年估计 $85M ARR 意味着当前 SAM 渗透率约为 13% 至 21%。
