        - 中
        - PR Newswire Series C；Tracxn ARR 估算
      - - 风险评级
        - 中-高
        - 中
        - 留存未经验证；Cisco-Splunk 竞争压力；关键人风险
      - - 回报潜力（基准情景）
        - 2028 年退出 2.2x；牛市情景 3.6x
        - 低
        - 分析师情景建模；ARR 估算未确认
      - - 核心尽调解锁项
