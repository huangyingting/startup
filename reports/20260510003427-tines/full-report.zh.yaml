      - number: '3.2'
        title: 主要竞争者画像
        blocks:
          - type: paragraph
            body: >-
              Palo Alto Networks Cortex XSOAR 是主导型 SOAR 现有厂商，把 Demisto 原有 SOAR 能力与 Palo Alto 更广的 XDR 和威胁情报平台结合起来。它面向已投入
              Palo Alto 生态的企业 SOC 团队，并收取高端定价。优势在于生态锁定，以及与 Cortex XDR、Prisma 的原生集成；弱点是自动化剧本依赖脚本，需要受训工程师，从而形成技能瓶颈，而 Tines
              的无代码构建器正好消除这个瓶颈。Splunk SOAR（原 Phantom）是第二大传统 SOAR 厂商，如今捆绑在 Splunk 的 SIEM 产品中，并在 2024 年被收购后并入 Cisco
              产品组合。它受益于与 Splunk SIEM 的深度集成，但面临与 XSOAR 相同的工程中心型可用性批评，并因 Cisco 整合引入客户不确定性。ServiceNow Security Operations 将
              ServiceNow 的 ITSM 工作流延展到安全事件管理，对已大规模运行 ServiceNow 的组织是可信替代方案，尤其在 IT 风险和 GRC 相邻工作流中。Swimlane 是纯 SOAR
              厂商，采用低代码路径，已融到 Series C 阶段，在实践者易用性上与 Tines 最直接竞争。Torq 是无代码安全超自动化竞争者，强调 IT 与安全融合，采用类似社区主导的 GTM
              策略。CrowdStrike 在 Falcon 平台内提供原生工作流自动化，对既有 Falcon 客户而言，会给独立 SOAR 带来捆绑替换风险。Tines 与 Anthropic 的合作以及 AI agent
              构建器，显示其走向差异化 AI 原生产品方向；纯 RPA 和传统 SOAR 厂商短期内不易复制。
            claimRefs:
              - CP002
              - CP010
              - CP011
              - CP012
              - CP020
              - CP024
              - CP036
      - number: '3.3'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >-
              Tines 最常被引用的差异化，在于真正的无代码架构：没有工程背景的安全实践者无需编写 Python 或 YAML 自动化剧本，也能构建、部署和维护自动化。Palo Alto XSOAR 和 Splunk
              SOAR 在非简单自动化剧本上都需要 Python 熟练度，由此形成技能瓶颈；Tines 的自然语言构建器消除了这个瓶颈。在集成广度上，Tines 声称拥有 700+ 原生集成，高于 Swimlane 据称的
              200+ 和 Torq 的 500+，说明其对运行多样化安全工具栈的大型企业覆盖更有优势。Tines
              拥有数千个预构建工作流模板的社区库，这是传统套件没有直接对应物的采用杠杆；每新增一个模板，都会在无增量成本下为所有既有和潜在用户增加价值，形成复合网络效应。在 AI 能力上，主要厂商都在 2025 年宣布 AI
              辅助自动化剧本生成；Tines 的 AI agent 构建器和 Anthropic 合作，说明它具备可信的 AI 助手功能，不过 AI 功能趋同正在缩短差异化窗口。相较 XSOAR 和
              ServiceNow，案例管理深度是 Tines 公认缺口；需要原生工单工作流的企业，通常还要额外接入 ITSM
              集成。第三方评论数据将基于用量定价的不可预测性列为企业买家的首要顾虑之一，制造了现有厂商按席位定价模型没有的续约摩擦。Tines 在安全、IT、财务和合规多团队部署上的能力，也让它区别于多数以 SOC
              为中心定位的传统 SOAR 替代品。
