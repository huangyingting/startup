            body: >-
              Tines 在 2025 年 2 月 Series C 融资 $125M，使累计披露融资达到约 $272M。按估计每月烧钱 $8-12M（来自员工成本估计和典型 SaaS 运营成本画像），$125M
              融资在既有现金储备之外提供了 10-15 个月增量跑道。此前各轮融资通过 Series B 和 2024 年 5 月 $50M Series B 延展轮提供营运资金，Tines 很可能在 Series C
              完成前已带着有意义的现金跑道进入 2025 年。融资后，公司应有 24-36 个月运营跑道，足以触达下一融资里程碑；若 ARR 持续以 40-50% 同比增长，也可能接近现金流盈亏平衡。Series C
              资金用途指向国际扩张（欧洲和亚太 GTM 建设）、AI 产品投入（2025 年中推出 AI agent 构建器）和合作伙伴生态项目资金。财务承销结论是：Tines
              具备强收入质量信号（企业层隐含多年合同结构、先落地再扩张模型、高知名度客户标识），资本位置足以支撑未来 24-36 个月；但毛利率、烧钱速度、NRR 和 CAC
