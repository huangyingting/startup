      - number: '7.4'
        title: 合作伙伴、依赖与关键人物风险
        blocks:
          - type: paragraph
            body: >
              Tines 的合作伙伴生态同时带来 go-to-market 杠杆和集中度风险。公司与 CrowdStrike、Pagerduty、Splunk、Elastic
              的战略集成构成渠道依赖：若任何主要伙伴在自有平台内加深原生自动化能力，Tines 可能面临推荐流量下降，并被生态内部竞争替代。CrowdStrike 的 Technology Alliance Partner
              列表包含 Tines，构成双向依赖——CrowdStrike 既是渠道伙伴，又可能随着 Falcon 平台扩展自有自动化和编排能力，成为潜在平台竞争者。


              PagerDuty 的运营自动化平台与 Tines 的事件自动化用例高度重叠；近年 PagerDuty 收购 Runbook Automation 后，事件自动化邻近领域的平台竞争更强。Splunk 被
              Cisco 收购又增加复杂度：Tines 与 Splunk 集成，同时也和 Splunk SOAR 竞争。这种双重关系带来收入依赖风险；若 Splunk 弃用 Tines 集成，或优先把客户导向
              SOAR，Tines 会受影响。


              Tines 的关键人物风险偏高，因为产品愿景、技术架构和客户关系集中在小规模创始团队。Eoin Hinchy（CEO）和 Thomas
              Kinsella（COO）是公司公开面孔，媒体报道反复将二人称为产品战略驱动者。任一共同创始人离开，都可能影响客户信心和投资人情绪；在当前增长阶段尤其如此。
