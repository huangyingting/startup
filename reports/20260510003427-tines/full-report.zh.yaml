      - number: '5.5'
        title: 差异化、成熟度评估与尽调缺口
        blocks:
          - type: paragraph
            body: >
              Tines 的主要技术差异点有四个：（1）无代码 story 范式，缩短自动化见效时间；（2）AI Agents 能力，把平台延伸到自主执行；（3）覆盖安全栈较深、数量超过 700
              个的集成库；（4）Community edition 推动草根采用，并为企业管线供给线索。这些差异点相互强化：社区创造模板贡献者，模板库降低企业采用门槛，企业合同又反哺 AI 和集成研发。


              与竞争对手相比，Tines 位置清晰：它比 Splunk SOAR 和 Palo Alto Cortex XSOAR 更少依赖代码，比脚本拼出来的自动化更企业级；和纯编排工具相比，自主 AI
              推理能力也在增强。无代码 / 低代码领域里，Swimlane 的 Turbine 平台和 Torq 是架构上最接近的竞争者；两者的集成库更小，企业级证明点也更少。


              关键尽调缺口包括：平台 SLA 可用性历史和有记录的事故率未公开；多租户隔离架构的代码级细节属于专有信息；AI Agents 虽已在 2025 年 6
              月发布，但其在生产安全环境中的自主决策准确性仍缺少独立验证。每周 10 亿次 action 指标来自公司披露，没有独立审计。潜在投资人应索取 SOC 2 Type II 审计报告、可用性 SLA
              文档，以及带可量化结果的 AI Agents 生产案例。
            claimRefs:
              - CE001
              - CE004
              - CE007
              - CE029
              - CE030
              - CE036
              - CE037
