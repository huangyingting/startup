      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Tines 的运营风险主要落在三处：（1）云基础设施依赖
              AWS，运营韧性风险集中在单一超大规模云厂商的可用性和服务稳定性上；（2）平台处理企业安全工作流数据，包括敏感自动化工件，因此存在安全事件或数据泄露风险；（3）为了维持 ARR 增长轨迹，工程和
              go-to-market 组织必须按所需速度扩张，执行风险随之上升。


              公开来源未识别出涉及 Tines 的公开宕机事件、CVE 或重大安全事件。Tines 的 SOC 2 Type II 认证提供了安全控制测试证据，公司也维护公开安全页面并披露合规信息。不过，没有发布
              SLA、可用性历史或事故复盘索引；企业买家和投资人评估运营韧性时，这是有意义的运营尽调缺口。


              产品复杂度风险体现在 G2 和 PeerSpot
              评论中：非技术用户搭建复杂分支工作流时存在学习曲线。复杂度会转化为实施风险；没有专职自动化工程师的客户尤其受影响，并可能推动较小账号流失。企业评论者指出的分析深度缺口也是产品风险；若路线图不解决，可能给竞争替代打开空间。


              Tines 总部在都柏林，工程领导力和组织知识集中在一个地理位置。Series C 融资后，为支撑增长需要快速扩员，这带来执行风险；尤其在竞争激烈的都柏林和美国市场招聘安全自动化工程师与资深企业销售人才时更明显。
