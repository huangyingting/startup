      - number: '1.5'
        title: 里程碑、产品轨迹与合作伙伴生态
        blocks:
          - type: paragraph
            body: >
              Tines 从都柏林安全自动化初创公司成长为十亿美元级自动化平台，经历了八年的产品开发、融资和生态建设。公司推出 Community
              Edition，是为了让个人实践者和小团队无需走企业采购流程也能使用平台；这帮助它在安全社区中推动草根采用和口碑增长。2025 年推出 AI Agents，标志着平台能力画像发生质变：Tines Agents
              不只是编排预定义工作流，还能在实践者设定的护栏内自主推理、决策和行动。Help Net Security 在 2025 年 6 月报道 Agents 发布时，将其放在行业从基于规则的编排转向 AI
              驱动自主运营的大背景下。

              合作伙伴生态已成为 Tines 增长战略中越来越重要的一部分。2026 年，公司将合作伙伴计划扩大 25%，新增 75 家技术合作伙伴，加入已有阵容；该阵容包括
              CrowdStrike、Elastic、AWS、1Password、HashiCorp 和
              IBM。生态广度重要，因为集成是自动化市场的关键竞争护城河：一个平台能无缝连接客户现有工具栈，客户就更可能加深投入。Agents 能力叠加不断扩大的集成库，使 Tines 不只作为 SOAR
              替代品竞争，也能作为通用企业自动化层竞争。平台的库化路径会浮现预构建自动化配方，进一步降低新用户采用门槛，并加快企业买家的见效时间。
