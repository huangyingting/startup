      - number: '3.5'
        title: 护城河评估与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Tines 的竞争护城河建立在五个相互咬合的因素上：第一，实践者社区和工作流库让客户积累组织自动化剧本后形成高切换成本；第二，无代码可用性从结构上区别于以工程师为中心的传统套件；第三，不断增长的 700+
              集成合作伙伴生态，任何替代平台都必须重建；第四，通过 500+ 企业客户和 GitHub、Coinbase、Elastic 等高知名度安全客户建立声誉信任；第五，$125M Series C
              后的资本位置，支撑产品投入和分发规模。护城河持久性的主要风险包括：AI 辅助工作流生成商品化，如果 AI agents
              能在没有可视化构建器的情况下生成自动化剧本，无代码优势可能被削弱；CrowdStrike、Palo Alto 和 Microsoft 等平台原生自动化捆绑，把 SOAR
              能力加入既有安全平台；以及超自动化巨头向安全下沉扩张。Tines 与 CrowdStrike、HashiCorp、1Password 和 Elastic
              的合作深度，既强化护城河，也形成依赖。CrowdStrike 应用市场上架让 Tines 借一个优先分发渠道触达 CrowdStrike 的 24,000+ 企业客户。FedRAMP
              授权状态在公开来源中仍未确认，这可能成为进入政府市场的潜在门槛，拥有已获许可产品的竞争者可加以利用。
