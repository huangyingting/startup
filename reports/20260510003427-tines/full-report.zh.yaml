      - number: '7.5'
        title: 财务与模型风险、缓释措施和终止标准
        blocks:
          - type: paragraph
            body: >
              Tines 的财务风险画像，反映出一家高增长 SaaS 公司的执行挑战：公司在 ARR 基础估计约 $85M 时，以 $1.125B 估值融资 $125M。按中点估计，隐含 ARR 倍数约 13x；ARR 以
              6x 增长的公司可以承受这一倍数，但如果增长放缓，下行缓冲有限。烧钱速度和现金跑道未披露；累计融资 $155M 且未披露盈利能力，因此假设烧钱规模不低。


              订阅 SaaS 商业模式的营运资本风险有限——Tines 现金主要花在人头（工程、销售、客户成功）上，而不是资本设备或库存。不过 Series C 发生在 2025 年初；若月度烧钱速度为中等水平
              $3-5M，公司有 2.5-4 年现金跑道。只要 ARR 增长延续，这应足以撑到下一轮融资或盈利。


              Palo Alto Networks 针对 Cortex XSOAR 的定价数据确认，SOAR 定价模型复杂且依赖部署。Tines
              基于用量的定价模式可能带来毛利压缩风险，因为企业客户在续约时会谈判更大用量折扣。既有厂商把 SOAR 作为平台交易的一部分打折出售，带来的企业级价格竞争是真实风险，也可能随时间压缩 Tines 的有效 ASP。


              会实质破坏投资逻辑的触发因素包括：ARR 年同比增长低于 50%；NRR 低于 110%；主要平台伙伴（CrowdStrike、Splunk）弃用 Tines 集成；重大数据泄露或监管执法行动；或共同创始人离职。
