      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              Tines 的主要买方是中大型企业中的安全运营职能，通常由 CISO 或安全运营 VP 代表，他们掌握专门的安全工具预算。主要用户是搭建和维护自动化工作流的安全工程师与分析师；在 Tines
              术语中，这类工作流通常称为 “stories”。买方与用户分离会影响交易经济性：Tines 需要能配置工作流的实践者，因此销售动作既需要高管支持来批准预算，也需要将拥有平台的安全工程团队买单。免费
              Community Edition 专门把实践者采用（自下而上）转化为企业交易（自上而下批准），这是安全工具市场标准的产品驱动增长机制。

              随着 Tines 扩大平台范围，次级买方群体也浮现出来，包括 IT 运营团队（通常归 CIO 或 CTO 预算）、自动化文档审查和审计工作流的法务与合规团队，以及管理员工入职和访问开通的 HR
              运营团队。这些次级群体带来扩张机会，也带来渠道复杂度：安全买方画像更熟悉 SOAR 概念，而 IT 和业务流程买方可能需要更多教育，才能理解自动化 ROI；他们还可能与既有 RPA 或 iPaaS
              厂商争夺预算。Mars 和 HubSpot 等客户展示了跨职能用例：它们的 Tines 部署横跨安全和 IT 职能，说明平台一旦先以安全场景落地，就有能力扩大足迹。
