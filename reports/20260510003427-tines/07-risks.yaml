  - id: sec-r-5
    title: Financial and Model Risk, Mitigations, and Kill Criteria
    body: |
      Tines' financial risk profile reflects the execution challenges of a high-growth SaaS company that
      raised $125M at a $1.125B valuation with an ARR base estimated at approximately $85M. The implied
      ARR multiple of approximately 13x (at mid-point estimates) is serviceable for a company growing
      at 6x ARR, but leaves limited downside cushion if growth decelerates. Burn rate and runway are
      not disclosed; with $155M raised in total financing and no disclosed profitability, burn is
      assumed to be material.

      Working capital risk is limited for a subscription SaaS business model — Tines' cash is primarily
      consumed by headcount (engineering, sales, customer success) rather than capital equipment or
      inventory. However, the Series C was raised in early 2025; at a moderate burn rate of $3-5M per
      month, the company has 2.5-4 years of runway, which should be sufficient to reach a subsequent
      financing event or profitability if ARR growth continues.

      Palo Alto Networks' pricing data for Cortex XSOAR confirms that SOAR pricing models are complex
      and deployment-dependent. Tines' volume-based pricing model could create margin compression risk
      as enterprise customers negotiate larger-volume discounts at contract renewal. The risk of
      enterprise-level price competition from incumbents discounting SOAR as part of platform deals
      is real and could compress Tines' effective ASP over time.

      Thesis-break triggers that would materially impair the investment case include: ARR growth below
      50% YoY; NRR below 110%; a major platform partner (CrowdStrike, Splunk) deprecating the Tines
      integration; a material data breach or regulatory enforcement action; or co-founder departure.
    claimRefs:
