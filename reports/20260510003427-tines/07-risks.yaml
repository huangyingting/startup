  - id: sec-r-2
    title: Regulatory, Legal, and Compliance Risk
    body: |
      Tines operates under multiple data privacy and security compliance frameworks. The company holds
      SOC 2 Type II and ISO 27001 certifications, which are necessary prerequisites for enterprise
      procurement in regulated industries. GDPR compliance is critical given Tines' Dublin headquarters
      and European customer base; as a data processor for enterprise automation workflows, Tines must
      maintain appropriate data processing agreements (DPAs) and implement technical controls that meet
      GDPR Article 28 requirements.

      Tines' security compliance posture — SOC 2 Type II and ISO 27001 — is disclosed on the Tines
      security page, providing verifiable evidence that the company has invested in baseline enterprise
      compliance infrastructure. However, the scope and limitations of the SOC 2 audit (which systems
      are in scope, any exceptions noted) are not publicly disclosed, representing a diligence gap.

      No material litigation, regulatory enforcement actions, patent disputes, or data breach disclosures
      were identified in public sources as of May 2026. Tines' pricing and packaging terms, including
      subscription licensing and data residency options, are disclosed in the Tines help center, providing
      legal review of baseline contract terms. Tines' platform processes enterprise security data including
      potentially sensitive incident artifacts, credentials references, and API tokens; the regulatory
      risk of a data breach involving customer automation workflows would be material.

      From a licensing and IP perspective, Tines does not appear to hold a proprietary patent portfolio
      or face disclosed IP disputes. The company is incorporated in Ireland, which may carry advantages
      for EU data residency requirements but also subjects it to Irish regulatory oversight under GDPR
      as both a data controller and processor.
    claimRefs:
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
    artifacts:
