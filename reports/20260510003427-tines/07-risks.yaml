  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: burn-rate-and-runway
      missingEvidence: Tines has not disclosed burn rate, cash balance, or runway timeline.
      whyItMatters: Burn and runway determine whether a bridge or Series D is needed and at what dilution.
      diligencePath: Request audited financial statements, burn rate, and 12-month cash forecast from Tines CFO.
      relatedQuestionRefs:
        - QR018
    - type: private-evidence-only
      severity: material
      topic: analytics-roadmap
      missingEvidence: >-
        Tines has not published a product roadmap addressing the analytics and reporting gap cited by enterprise
        reviewers.
      whyItMatters: Persistent analytics gap could enable competitive displacement by SOAR platforms with stronger reporting.
      diligencePath: Request product roadmap; evaluate R&D investment allocation in analytics vs. AI features.
      relatedQuestionRefs:
        - QR012
    - type: private-evidence-only
      severity: material
      topic: engineering-talent-scaling
      missingEvidence: No public data on headcount growth rate, engineering org size, or hiring plans in Dublin and US markets.
      whyItMatters: >-
        Engineering scaling failure is a common execution risk for Series C SaaS companies in competitive talent
        markets.
      diligencePath: Request headcount data, attrition rate, and open role count from Tines HR/Operations.
      relatedQuestionRefs:
        - QR028
    - type: missing-source
      severity: minor
      topic: soc2-audit-scope
      missingEvidence: SOC 2 Type II audit report scope and any noted exceptions are not publicly available.
      whyItMatters: Audit scope exclusions can reveal control gaps in systems that process customer automation workflow data.
      diligencePath: Request SOC 2 Type II audit report directly in diligence. Review system scope and any exceptions.
    - type: enumeration-incomplete
      severity: minor
      topic: regulatory-risk-completeness
      missingEvidence: >-
        Regulatory risk register is based on publicly available compliance disclosures and comparable company analysis;
        not all regulatory obligations may be captured.
      whyItMatters: >-
        Undisclosed regulatory requirements could introduce legal and compliance costs not reflected in current
        estimates.
      diligencePath: >-
        Request legal counsel review of full regulatory obligation inventory for Tines' jurisdiction and customer
        sectors.
      relatedTableRefs:
        - TR001
