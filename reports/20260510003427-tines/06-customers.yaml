  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: retention-metrics
      missingEvidence: NRR, gross retention rate, and customer churn are not publicly disclosed by Tines.
      whyItMatters: >-
        These are the most critical customer quality metrics; without them, ARR growth cannot be decomposed and customer
        health cannot be assessed.
      diligencePath: Request NRR, gross retention, and churn cohort data directly from Tines in investor diligence.
      relatedQuestionRefs:
        - QU009
        - QU022
    - type: private-evidence-only
      severity: material
      topic: concentration-risk
      missingEvidence: Top-10 customer ARR concentration percentage is not disclosed.
      whyItMatters: High customer concentration amplifies the revenue impact of a single customer churn event.
      diligencePath: Request top-10 customer ARR concentration and contract term data in diligence.
      relatedQuestionRefs:
        - QU021
    - type: private-evidence-only
      severity: material
      topic: conversion-rate
      missingEvidence: Community Edition-to-Enterprise conversion rate and pilot-to-close metrics are not publicly available.
      whyItMatters: PLG efficiency determines capital efficiency of the go-to-market motion.
      diligencePath: Request Community-to-Enterprise conversion funnel data and sales cycle data.
      relatedQuestionRefs:
        - QU024
    - type: missing-source
      severity: minor
      topic: independent-benchmarks
      missingEvidence: >-
        No independent third-party benchmark compares Tines customer satisfaction scores directly to SOAR competitor
        satisfaction data.
      whyItMatters: Relative satisfaction benchmarks are important for competitive positioning analysis.
      diligencePath: Review Gartner Magic Quadrant and Forrester Wave SOAR reports for comparative satisfaction data.
      relatedQuestionRefs:
        - QU025
    - type: enumeration-incomplete
      severity: minor
      topic: customer-segmentation
      missingEvidence: No breakdown of customer base by company size (SMB vs. mid-market vs. enterprise) or ARR band is available.
      whyItMatters: Customer mix determines quality of ARR, expansion potential, and support cost structure.
      diligencePath: Request customer segment breakdown from Tines finance and revenue operations teams.
      relatedTableRefs:
        - TU002
