chapter:
  number: 6
  title: Customers
  summary: >-
    Tines serves approximately 33,000 users or organizations globally, anchored by named enterprise accounts including
    Coinbase, Mars, Intercom, Canva, GitLab, Elastic, Databricks, Reddit, HubSpot, and Hulu. Third-party review ratings
    of 4.7/5 on G2 and 4.9/5 on Gartner Peer Insights confirm strong customer satisfaction, though some enterprise
    reviewers flag limited analytics depth and a learning curve for non-technical users building complex workflows.
