  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary, Definition, and Adjacencies
        blocks:
          - type: paragraph
            body: >
              Tines operates at the intersection of two distinct but overlapping market categories: Security
              Orchestration,

              Automation, and Response (SOAR) and no-code/low-code enterprise workflow automation. SOAR is the category
              in

              which Tines most directly competes for security budgets; it encompasses platforms that automate alert
              triage,

              incident response, threat hunting workflows, and cross-tool orchestration for security operations centers.

              Analyst firms including Mordor Intelligence, Market Research Future, and The Business Research Company
              each

              define the SOAR market as including software and services enabling automated coordination of security tool

              responses, but they vary in whether they include broader IT process automation or restrict their scope to

              pure security workflows.


              The relevant adjacent categories are significant and expand the potential addressable market considerably.

              IT Process Automation (ITPA), traditionally associated with ServiceNow and PagerDuty, overlaps with Tines

              when security teams use the platform to automate IT operational tasks such as identity provisioning,
              access

              reviews, and vulnerability management. General enterprise automation platforms — including competing
              no-code

              tools positioned outside security — are a second adjacency when Tines pursues HR, legal, or finance
              workflow

              customers. Status-quo substitutes include: custom Python/bash scripts maintained by security engineering

              teams; spreadsheet-and-email processes for lower-maturity SOCs; or fully manual analyst workflows for
              teams

              without automation budgets. Understanding which substitute regime a prospective customer occupies is
              critical

              to forecasting deal size and sales cycle length, because replacing a script-based approach requires only
              tool

              procurement, whereas replacing a legacy SOAR platform requires migration of existing playbooks and
              retraining

              of operations staff.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
      - number: '2.2'
        title: Market Sizing — TAM, SAM, and Available Evidence
        blocks:
          - type: paragraph
            body: >
              Three distinct analyst reports provide overlapping but not identical estimates of the SOAR market total

              addressable market. Mordor Intelligence estimates the global SOAR market at approximately $1.87 billion in

              2025, growing at a compound annual rate of roughly 18 percent to exceed $4.4 billion by 2030. Market
              Research

              Future estimates a higher base value but uses a different methodology, including adjacent IT automation

              spending in its scope. The Business Research Company publishes a global SOAR market report covering the

              same period with a slightly different CAGR figure, reflecting differences in how each firm handles vendor

              revenue attribution across platforms that serve both security and non-security automation use cases.


              Deriving a Tines-specific SAM from these figures requires assumptions about: (a) the percentage of SOAR

              spending addressable by a no-code cloud-native platform versus legacy on-premise deployments; (b) the

              geographic distribution of security automation budgets, with the US and UK representing the highest
              per-capita

              concentrations of enterprise SOC spending; and (c) the share of the broader market currently served by

              incumbents with high switching costs. A conservative SAM estimate for Tines — restricting to cloud-native,

              no-code or low-code SOAR deployments at organizations with 500+ employees — might be 20–35 percent of the

              total SOAR TAM, or approximately $400 million to $650 million in 2025. This range is analyst-constructed

              from first principles rather than directly sourced from a published figure, and should be treated as an

              evidence-bounded estimate rather than a definitive SAM. Tines' estimated $85M ARR in 2025 implies a
              current

              SAM penetration of roughly 13 to 21 percent under this construct.
            claimRefs:
              - CM007
              - CM008
              - CM009
              - CM010
              - CM011
              - CM012
      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              The primary buyer for Tines is the security operations function within mid-to-large enterprises, typically

              represented by a CISO or VP of Security Operations who controls a dedicated security tooling budget. The

              primary users are security engineers and analysts who build and maintain automation workflows — commonly

              called "stories" in Tines' terminology. This buyer-user distinction matters for deal economics: because
              Tines

              requires a practitioner who can configure workflows, the sales motion needs both executive sponsorship for

              budget approval and practitioner buy-in from the security engineering team who will own the platform. The

              free Community Edition is specifically designed to convert practitioner adoption (bottom-up) into
              enterprise

              deals (top-down approval), which is a standard product-led growth mechanism in the security tooling
              market.


              Secondary buyer segments that have emerged as Tines has broadened its platform include IT operations teams

              (often budgeted under a CIO or CTO), legal and compliance teams automating document review and audit

              workflows, and HR operations teams managing onboarding and access provisioning. These secondary segments

              represent an expansion opportunity but also a channel complexity: the security buyer persona is more
              familiar

              with SOAR concepts, while IT and business-process buyers may require more education about automation ROI
              and

              may compete for budget with incumbent RPA or iPaaS vendors. Customers such as Mars and HubSpot illustrate

              the cross-functional use case: their Tines deployments span security and IT functions, suggesting the
              platform

              can expand its footprint once initially deployed for security.
            claimRefs:
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The most durable driver of SOAR and security automation adoption is the sustained increase in threat
              volume

              and alert fatigue. As enterprise security stacks grow more complex — adding endpoint detection, cloud
              security

              posture management, identity and access management, and SaaS monitoring layers — the volume of alerts

              requiring human triage grows faster than headcount. SOAR platforms address this imbalance by automating

              first-pass triage and response, reducing the number of alerts that require analyst attention. This dynamic
              is

              structural and unlikely to reverse, making it one of the most durable demand drivers in enterprise
              security.


              Regulatory drivers are emerging as a secondary catalyst. The SEC's cybersecurity disclosure rules
              (effective

              for large accelerated filers from December 2023) require public companies to report material cybersecurity

              incidents within four business days, creating a direct organizational need for faster incident detection
              and

              documented response processes — both of which SOAR platforms support. GDPR, HIPAA, and NIS2 create

              analogous requirements in European markets, which directly benefits Tines given its Irish headquarters and

              European customer base. Switching costs and incumbent lock-in represent the primary adoption constraint:

              organizations that have already deployed Palo Alto Cortex XSOAR or Splunk SOAR have existing playbooks

              built in proprietary scripting languages, integration configurations, and analyst muscle memory — all of

              which create friction when evaluating a migration to Tines. This constraint benefits incumbents in renewal

              cycles but may reduce win rates in competitive displacement scenarios for Tines' sales team.
            claimRefs:
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
      - number: '2.5'
        title: Sizing Gaps, Contradictions, and Diligence Paths
        blocks:
          - type: paragraph
            body: >
              The SOAR market sizing landscape has several material inconsistencies that diligence should document
              rather

              than resolve by fiat. First, the three major analyst reports consulted use different market boundaries —

              Mordor Intelligence's $1.87B figure appears to restrict to security-dedicated platforms, while Market
              Research

              Future's higher estimates may include adjacent IT automation spending. Second, none of the public reports

              break out the no-code or cloud-native sub-segment that Tines most directly addresses, making it impossible
              to

              derive a source-backed SAM without analyst-constructed assumptions. Third, the SOAR category is itself

              under definitional pressure: as platforms like Tines expand beyond security into IT and business-process

              automation, the traditional SOAR boundary becomes less meaningful, potentially overstating TAM (by
              including

              ITPA or iPaaS spend) or understating it (by excluding enterprise automation budgets that Tines could
              capture).


              Fourth, Tines' own ARR of approximately $85M represents a significant fraction of the no-code SOAR

              sub-segment, suggesting the addressable SAM may be smaller than top-down estimates imply — or that Tines

              has captured an unusually high share of an emerging segment. Resolving this ambiguity requires obtaining

              analyst breakdowns of the no-code SOAR sub-market or comparable revenue data from peers such as Swimlane

              and Torq. Until those data points are available, any Tines market share or SAM penetration calculation

              should be labeled as analyst-constructed and sensitivity-tested against multiple market boundary
              assumptions.
            claimRefs:
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural Demand Tailwind from Alert Volume Growth
            body: >-
              Rising alert volumes, SOC analyst burnout, and regulatory incident-disclosure requirements create a
              durable structural demand for security automation that is unlikely to reverse within a 5-year investment
              horizon. Tines is positioned at the intersection of these drivers with a no-code platform that expands the
              addressable buyer pool beyond specialist SOAR engineers.
            calloutType: strength
            claimRefs:
              - CM019
              - CM020
              - CM021
          - type: callout
            title: Incumbent Switching Costs Limit Displacement Velocity
            body: >-
              Organizations already running Palo Alto Cortex XSOAR or Splunk SOAR have existing playbooks in proprietary
              scripting languages and trained analyst teams. This creates meaningful switching costs that slow
              competitive displacement and may compress Tines' win rates in renewal cycles against incumbents.
            calloutType: risk
            claimRefs:
              - CM024
              - CM025
          - type: callout
            title: Market Definition Risk — SOAR vs. Broader Enterprise Automation
            body: >-
              The market boundary between SOAR and general enterprise automation is blurring as Tines expands its
              customer base beyond security. This definitional ambiguity makes top-down TAM estimates unreliable for
              valuation purposes and requires Tines to demonstrate SOM growth through actual ARR trajectory rather than
              market penetration ratios.
            calloutType: insight
            claimRefs:
              - CM026
              - CM027
              - CM028
          - type: callout
            title: Prioritize SAM and SOM Evidence Collection in Due Diligence
            body: >-
              No published source provides a no-code SOAR sub-segment TAM. Due diligence should prioritize collecting
              Tines' win/loss rate, average contract value by buyer segment, and expansion ARR data from the company,
              then use those inputs to construct a bottom-up SAM that is internally consistent with the observed ARR
              trajectory.
            calloutType: recommendation
            claimRefs:
              - CM029
              - CM030
