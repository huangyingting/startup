      - number: '1.5'
        title: Milestones, Product Trajectory, and Partner Ecosystem
        blocks:
          - type: paragraph
            body: >
              Tines' journey from a Dublin-based security automation startup to a billion-dollar automation platform

              spans eight years of product development, fundraising, and ecosystem building. The company launched its

              Community Edition to make the platform accessible to individual practitioners and smaller teams without

              enterprise procurement cycles, a move that helped drive grass-roots adoption and word-of-mouth growth
              within

              security communities. The launch of AI Agents in 2025 marked a qualitative shift in the platform's
              capability

              profile: rather than simply orchestrating pre-defined workflows, Tines Agents can reason, decide, and act

              autonomously within guardrails set by the practitioner. Help Net Security covered the Agents launch in
              June

              2025, framing it as part of a broader industry transition from rule-based orchestration to AI-driven

              autonomous operations.


              The partner ecosystem has become an increasingly important part of Tines' growth strategy. The company

              expanded its partner program by 25 percent in 2026, adding 75 new technology partners to an existing
              roster

              that includes CrowdStrike, Elastic, AWS, 1Password, HashiCorp, and IBM. This ecosystem breadth is
              significant

              because integrations are a key competitive moat in the automation market: customers are more likely to
              deepen

              their commitment to a platform that connects seamlessly to their existing tool stack. The Agents
              capability

              combined with a widening integration library positions Tines to compete not just as a SOAR replacement but
              as

              a general enterprise automation layer. The platform's library approach, surfacing pre-built automation
              recipes,

              further lowers the barrier to adoption for new users and accelerates time-to-value for enterprise buyers.
            claimRefs:
              - CO023
              - CO027
              - CO028
              - CO033
              - CO035
              - CO040
