  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Overview and Segment Distribution
        blocks:
          - type: paragraph
            body: >
              Tines serves approximately 33,000 users or organizations as of 2025, a figure disclosed in Series C

              press materials. The customer base spans enterprise, mid-market, and individual practitioner segments,

              with the Community Edition providing a free entry point that seeds enterprise pipeline. Named enterprise

              accounts include Coinbase, Mars, Intercom, Canva, GitLab, Elastic, Databricks, Reddit, HubSpot, and Hulu

              — a cross-industry portfolio that illustrates Tines' successful expansion beyond its security-operations

              origins into broader enterprise automation.


              Geographically, Tines counts customers in North America, Europe (particularly the UK and Ireland), and

              APAC, with European presence benefiting from the Dublin headquarters and the company's participation in

              the Irish tech ecosystem. The customer mix skews toward technology companies and digital-native
              enterprises,

              consistent with the platform's security operations heritage and its integration with cloud-native
              toolstacks.


              Segment distribution data — specifically, the breakdown by ARR band, industry vertical, geographic region,

              or company size — is not publicly disclosed. This is a meaningful diligence gap: customer concentration

              risk and churn profile are materially affected by whether Tines derives its revenue from a broad base of

              mid-market logos or a concentrated set of large enterprise deals. The absence of NPS, gross retention,

              and net revenue retention (NRR) data in the public domain further limits the ability to assess customer

              health without direct diligence access.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
              - CU006
      - number: '6.2'
        title: Named Customer Case Studies
        blocks:
          - type: paragraph
            body: |
              Tines publishes detailed case studies for a select set of enterprise customers that collectively
              demonstrate the platform's applicability across security, IT, business operations, and finance. Mars,
              the global consumer goods company, uses Tines to automate security incident workflows that previously
              required manual analyst effort — illustrating the platform's fit for large, complex enterprise
              environments with diverse toolstacks. Intercom, the customer messaging platform, deployed Tines to
              accelerate phishing triage and email security automation, enabling their security team to process
              alerts at higher throughput without proportional headcount growth.

              Canva, the design platform, uses Tines to automate access management and identity provisioning
              workflows, representing use-case expansion beyond core security incident response into IT operations.
              GitLab uses Tines for security operations automation, with the case study demonstrating the platform's
              compatibility with DevSecOps workflows in an all-remote, cloud-native engineering culture. Elastic,
              a strategic integration partner, deployed Tines alongside its own observability stack to automate
              security and IT operations at scale, serving as both a customer reference and a go-to-market amplifier.

              Reddit's deployment spans multiple automation use cases across security and IT operations. Hulu uses
              Tines for media and entertainment vertical automation workflows, expanding the addressable customer
              base into new verticals. Databricks and HubSpot similarly represent expansion into data engineering
              and marketing technology buyer segments, demonstrating that Tines' platform is not niche-constrained
              to security operations and can serve diverse enterprise buyers across workflows.
            claimRefs:
              - CU007
              - CU008
              - CU009
              - CU010
              - CU011
              - CU012
              - CU013
              - CU014
              - CU015
      - number: '6.3'
        title: Customer Satisfaction, Reviews, and Sentiment Analysis
        blocks:
          - type: paragraph
            body: |
              Tines holds exceptional third-party review scores: 4.7 out of 5 on G2 from 397 user reviews, and
              4.9 out of 5 on Gartner Peer Insights from 54 verified enterprise reviews. Both ratings place Tines
              in the top tier of the SOAR and workflow automation categories. On Gartner, reviewers specifically
              praise the platform's ease of use, onboarding speed, and the quality of customer support, factors
              that are particularly meaningful for enterprise buyers evaluating deployment risk.

              On G2, positive sentiment clusters around the no-code paradigm, the breadth of the integration
              library, and the responsiveness of the Tines support team. Critical feedback on G2 and PeerSpot
              focuses on three recurring themes: (1) limited out-of-the-box analytics and reporting compared to
              mature SIEM-adjacent platforms; (2) a learning curve for non-technical users attempting to build
              complex branching workflows without developer support; and (3) the platform's pricing model, which
              some reviewers describe as becoming expensive at scale as automation volume increases. Capterra
              reviews (archived, 2026) similarly reflect a positive overall rating but echo the analytics depth
              concern.

              The Gartner Peer Insights alternative listing for Tines suggests that buyers actively compare Tines
              to Splunk SOAR, Palo Alto Cortex XSOAR, and Swimlane, indicating Tines is firmly in the competitive
              consideration set for SOAR replacements. Producthunt sentiment, while less rigorous, shows positive
              community reception for the platform's ease of automation and developer friendliness.
            claimRefs:
              - CU016
              - CU017
              - CU018
              - CU019
              - CU020
              - CU021
              - CU022
              - CU023
      - number: '6.4'
        title: Customer Acquisition, Retention, and Expansion Signals
        blocks:
          - type: paragraph
            body: |
              Tines' go-to-market model combines a Community Edition-led product-led growth motion with a direct
              enterprise sales force targeting security operations and IT teams. The Community Edition provides a
              free, friction-reduced entry point that converts into enterprise deals as practitioners champion the
              platform internally. This bottom-up adoption pattern is consistent with patterns seen in developer-
              tool and security-tool companies where practitioner advocacy precedes procurement.

              Public NRR (net revenue retention) and gross retention data are not disclosed. As a proxy, the ARR
              trajectory from $13.4M (2024) to approximately $85M (2025) implies that either a high volume of new
              logo acquisition or strong land-and-expand dynamics drove roughly 6x growth — or a combination of both.
              At this growth rate, Tines likely benefits from meaningful expansion revenue as customers automate
              additional workflows beyond the initial deployment use case.

              Named customers such as Fivetran (which expanded from security into GTM and finance automation) and
              Canva (which expanded from incident response into identity management) suggest that Tines captures
              expansion revenue by penetrating multiple departments within enterprise accounts after an initial
              security-led entry. The Irish Tech News covered Tines' unicorn achievement as validation of its
              enterprise commercial traction, while TechEU similarly noted the Series C financing as reflecting
              strong investor conviction in the customer growth trajectory.
            claimRefs:
              - CU024
              - CU025
              - CU026
              - CU027
              - CU028
              - CU029
      - number: '6.5'
        title: Customer Risk Profile and Diligence Gaps
        blocks:
          - type: paragraph
            body: |
              From a customer risk perspective, the primary concerns are: (1) customer concentration — if a small
              number of enterprise accounts generate a disproportionate share of ARR, the loss of a single customer
              could have material revenue impact; (2) NRR and churn — without disclosed retention rates, it is
              impossible to verify whether Tines' ARR growth is driven by net-new acquisition or expansion in
              existing accounts, a distinction that materially affects growth quality; and (3) the learning-curve
              risk for non-technical users, which could create implementation failures in complex environments and
              drive churn among smaller accounts with limited dedicated automation engineers.

              The Gartner alternative view and PeerSpot critical reviews provide adversarial signal that Tines does
              not win every evaluation: some customers choose Splunk SOAR or Cortex XSOAR when deeper SIEM
              integration or complex branching logic is required. The Gartner alternatives page for Tines confirms
              that buyers compare Tines against multiple SOAR platforms before committing. This competitive churn
              risk is manageable but real, particularly as Splunk and Palo Alto continue investing in platform
              integration and enterprise sales support.

              The absence of a published SLA and the limited public audit-log depth flagged by enterprise reviewers
              suggest that some buyers may require additional negotiated protections before signing Enterprise
              contracts. Investors should request customer churn rates, NRR, account concentration data (top 10
              customers as a percent of ARR), and pilot-to-close conversion rates in diligence.
            claimRefs:
              - CU030
              - CU031
              - CU032
              - CU033
              - CU034
              - CU035
