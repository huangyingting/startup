  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Architecture and Core Mechanics
        blocks:
          - type: paragraph
            body: >
              Tines is built around a central abstraction called a "story" — a visual workflow that chains together

              individual actions (HTTP requests, transformations, lookups, send-email, etc.) via a drag-and-drop canvas.

              Each story has one or more triggers (webhook, schedule, manual) that initiate execution, and the workflow

              engine evaluates conditional logic, loops, and Liquid-template-based transformations as the story runs.

              The platform is entirely cloud-native, deployed as a multi-tenant SaaS hosted on AWS infrastructure, with

              optional data-residency configurations for regulated enterprise customers who require their data to remain

              in a specific geographic region.


              The workflow engine separates the user-facing story builder (React-based web UI) from the execution
              runtime,

              allowing horizontal scaling of workflow processing independent of the authoring layer. Actions are the

              atomic unit of composition: out-of-the-box action types include HTTP request, send-to-story, delay,

              trigger-story, event transform, date filter, and group actions. The HTTP request action is the primary

              extensibility mechanism, enabling connection to any REST API endpoint in the market without requiring

              Tines to publish a first-party integration. This architectural choice reduces Tines' dependency on its

              own integration roadmap and allows customers to connect internal tools and bespoke services immediately.


              Performance metrics indicate substantial scale: the platform executes more than one billion automated

              actions per week as of 2025, a company-disclosed figure that serves as an indirect proxy for aggregate

              customer deployment breadth. Stories can be exported from the Tines Library — a curated collection of

              pre-built automation recipes — and imported into any tenant, enabling rapid time-to-value for common

              security and IT use cases. The library model also creates network effects: as more customers contribute

              templates, the library grows in value for new adopters.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE012
              - CE013
              - CE015
              - CE028
              - CE031
      - number: '5.2'
        title: AI and Intelligent Automation Features
        blocks:
          - type: paragraph
            body: |
              Tines launched AI Agents in June 2025, representing its most significant product evolution since the
              platform's founding. Unlike traditional SOAR playbooks that execute deterministic, pre-defined sequences,
              Tines Agents can reason over input data, select among available actions, and execute multi-step tasks
              autonomously within guardrails set by the practitioner. Agents are built using the same story canvas
              but incorporate large-language-model reasoning steps that determine which path to take based on
              unstructured or semi-structured inputs such as alert text, ticket contents, or email bodies.

              The AI Copilot feature, embedded in the story builder, allows users to describe automation requirements
              in natural language and receive a generated story skeleton, reducing the time to build first workflows
              from hours to minutes for users unfamiliar with the platform. Tines also added Model Context Protocol
              (MCP) integration, enabling Agents to invoke tools across external AI systems — expanding the surface
              area of autonomous decision-making beyond Tines' own action library.

              Anthropic uses Tines for AI security automation workflows, validating the platform's suitability for
              AI-native organizations building their own AI products. The AI features launch positions Tines to
              address not just the historical SOAR market but the broader enterprise AI automation space, where
              organizations seek to deploy LLM reasoning on top of their existing toolchains without building custom
              infrastructure. Help Net Security framed the Agents launch as a transition from rule-based orchestration
              to autonomous AI operations, consistent with the broader enterprise automation market shift captured in
              Gartner's 2025 technology trend analysis.
            claimRefs:
              - CE007
              - CE008
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
              - CE035
      - number: '5.3'
        title: Integration Ecosystem and Developer Experience
        blocks:
          - type: paragraph
            body: |
              Tines ships with more than 700 pre-built integrations organized by security, IT, productivity,
              collaboration, cloud, and data categories. Strategic integrations with CrowdStrike Falcon, Elastic,
              IBM QRadar, AWS, 1Password, and HashiCorp give Tines strong presence in the security operations stack
              where customers typically run five to fifteen tools simultaneously. The integration library functions
              as both a commercial moat (customers already invested in integrated tools face switching costs) and
              an adoption accelerator (pre-built actions reduce configuration effort for common vendors).

              Developer experience is a deliberate product priority. The quickstart documentation walks a new user
              from account creation to a running first story within minutes, using example HTTP actions against
              publicly accessible APIs. The Tines GitHub organization hosts open-source examples, community
              contributions, and automation blueprints that security engineers can fork and adapt. This developer-
              oriented publishing strategy has built a practitioner community that amplifies Tines' reach through
              peer recommendations in security forums and conference presentations.

              Swimlane's publicly published SOAR comparison acknowledges that no-code platforms like Tines reduce
              automation configuration time compared to script-heavy alternatives, though Swimlane argues its
              low-code approach retains power-user extensibility. The Fivetran case study quantifies the value
              proposition: Fivetran scaled automation 3x across GTM and finance workflows using Tines, demonstrating
              that the platform's applicability now extends beyond security operations into general enterprise
              automation. The partner ecosystem grew by 25 percent in 2026, adding 75 new technology partners,
              indicating continued investment in the integration moat.
            claimRefs:
