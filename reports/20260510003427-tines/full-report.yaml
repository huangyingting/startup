          - type: callout
            title: Volume-Based Pricing Creates Renewal Friction
            body: >-
              Third-party review data consistently identifies cost unpredictability at scale as a top buyer concern.
              This creates a vulnerability in renewal conversations that Swimlane, Torq, and ServiceNow can exploit with
              more predictable per-seat or module-based pricing structures.
            calloutType: risk
