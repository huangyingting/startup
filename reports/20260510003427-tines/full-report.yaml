      - number: '5.4'
        title: Trust, Security, and Compliance
        blocks:
          - type: paragraph
            body: |
              Tines holds SOC 2 Type II certification and ISO 27001 certification, the two most commonly required
              security compliance standards for enterprise SaaS buyers in North America and Europe respectively.
              The security page discloses encryption at rest and in transit, role-based access control (RBAC),
              audit logs, SSO/SAML support, and data residency configuration options. These controls satisfy the
              baseline requirements of most enterprise security procurement checklists without requiring customers
              to engage professional services for compliance validation.

              The platform's cloud-native, AWS-hosted architecture means Tines inherits AWS's underlying
              infrastructure certifications, including ISO 27001, SOC 1/2/3, PCI DSS, and FedRAMP equivalents,
              providing a layered compliance posture. From a data-handling perspective, Tines processes customer
              workflow payloads transiently during story execution; secrets are vaulted separately and injected
              at runtime rather than stored in plaintext in story definitions. This architecture reduces the blast
              radius of a credential exposure incident.

              Third-party reviewers on PeerSpot and G2 flag areas for improvement: some enterprise customers
              note that audit log granularity and out-of-box reporting depth lag behind more mature SIEM-adjacent
              platforms. Gartner Peer Insights reviewers (4.9/5) and G2 users (4.7/5) nonetheless rate the
              overall trust and reliability of the platform highly. The Community edition introduces an additional
              security surface: free community accounts share the same infrastructure, so Tines must carefully
              segment community-tier data from enterprise tenants in its multi-tenant architecture. This
              community-to-enterprise boundary represents a diligence item for security-sensitive enterprise buyers.
            claimRefs:
              - CE010
              - CE011
              - CE012
              - CE013
              - CE025
              - CE026
              - CE027
              - CE032
              - CE033
              - CE036
      - number: '5.5'
        title: Differentiation, Maturity Assessment, and Diligence Gaps
        blocks:
          - type: paragraph
            body: |
              Tines' primary technical differentiators are: (1) the no-code story paradigm that reduces automation
              time-to-value; (2) the AI Agents capability that extends the platform into autonomous execution;
              (3) the 700-plus integration library with strong security-stack coverage; and (4) the Community edition
              that drives grassroots adoption and feeds an enterprise pipeline. These differentiators are mutually
              reinforcing: the community creates template contributors, the template library lowers enterprise
              barriers, and the enterprise contracts fund AI and integration R&D.

              Against competitors, Tines occupies a distinct position: it is less code-intensive than Splunk SOAR
              and Palo Alto Cortex XSOAR, more enterprise-grade than script-assembled automation, and increasingly
              capable of autonomous AI reasoning compared to pure orchestration tools. Swimlane's Turbine platform
              and Torq represent the closest architectural competitors in the no-code/low-code space; both have
              smaller integration libraries and less established enterprise proof points.

              Key diligence gaps include: the platform's SLA uptime history and documented incident rates are not
              publicly disclosed; code-level details of the multi-tenant isolation architecture are proprietary;
              and the AI Agents feature, while launched in June 2025, has limited independent validation of
              autonomous decision accuracy in production security environments. The 1-billion-actions-per-week
              metric is company-disclosed and carries no independent audit. Prospective investors should request
              SOC 2 Type II audit reports, uptime SLA documentation, and AI Agents production case studies with
              measurable outcomes.
            claimRefs:
              - CE001
              - CE004
              - CE007
              - CE029
              - CE030
              - CE036
              - CE037
      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Platform Scale Validates Enterprise Readiness
            body: >-
              The 1-billion-actions-per-week figure, combined with SOC 2 Type II certification and a 4.9/5 Gartner Peer
              Insights rating, confirms that Tines has crossed the enterprise maturity threshold. This scale reduces the
              technical risk for a prospective investor: the platform has proven it can handle production workloads at
              enterprise volumes without the reliability concerns typical of earlier-stage SaaS.
            calloutType: strength
            claimRefs:
              - CE003
              - CE010
              - CE011
              - CE026
          - type: callout
            title: No-code Constraint Limits Power-User Extensibility
            body: >-
              PeerSpot and G2 reviewers note that Tines' no-code paradigm, while a strength for rapid adoption,
              constrains advanced customization relative to low-code competitors that permit scripted overrides.
              Enterprise customers with complex, bespoke automation requirements may find the platform's guardrails
              limiting and may require additional workarounds via HTTP action chaining — increasing implementation
              complexity for edge cases.
            calloutType: risk
            claimRefs:
              - CE027
              - CE029
              - CE036
          - type: callout
            title: AI Agents Extend TAM Beyond the SOAR Market
            body: >-
              The June 2025 Agents launch signals Tines' intent to position itself as an AI-native enterprise automation
              platform, not just a SOAR replacement. If Agents prove reliable in production, they expand the addressable
              market from the $1.87B SOAR segment to the multi-billion-dollar enterprise AI automation space. The
              Anthropic customer reference provides early validation from an AI-native organization.
