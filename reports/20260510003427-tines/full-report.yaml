      - number: '1.4'
        title: Key Metrics, Customers, and Scale Indicators
        blocks:
          - type: paragraph
            body: >
              By 2025, Tines had assembled a set of publicly disclosed metrics that indicate substantial scale for a

              company at its funding stage. The platform executes more than one billion automated actions per week, a
              figure

              the company uses as a headline metric to communicate real-world deployment breadth. Annual recurring
              revenue

              was estimated at approximately $85 million as of 2025 by third-party analyst databases, representing a

              significant acceleration from the $13.4 million ARR reported for 2024. The company serves approximately
              33,000

              users or organizations, with named customers including Coinbase, Intercom, Mars, HubSpot, Canva,
              Databricks,

              Reddit, GitLab, and Elastic.


              Headcount stood at approximately 500 to 562 employees as of 2025-2026, distributed across Dublin, New
              York,

              Boston, and remote locations. Product quality signals are strongly positive: Tines holds a G2 rating of
              4.7

              out of 5 from 397 user reviews and a Gartner Peer Insights rating of 4.9 out of 5 from 54 reviews.
              However,

              some reviewers on PeerSpot have noted limitations in out-of-the-box reporting and analytics depth, and a

              subset of G2 reviewers indicate that non-technical users face a learning curve when building complex
              workflows

              without developer support. Pricing spans a free Community edition, a Starter tier at approximately $500
              per

              month, Business pricing on a custom basis, and Enterprise deals typically beginning at $50,000 per year.
            claimRefs:
              - CO009
              - CO010
              - CO011
              - CO021
              - CO022
              - CO024
              - CO025
              - CO026
              - CO031
              - CO038
