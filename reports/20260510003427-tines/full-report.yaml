  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >-
              Tines operates a cloud-native SaaS business with a usage-based pricing model anchored on workflow story
              execution volume rather than per-seat licensing. This model delivers three structural advantages: it
              aligns Tines' revenue directly with customer value realization (more automations run equals more revenue),
              it enables a community free tier that drives top-of-funnel practitioner adoption without requiring sales
              involvement, and it captures expansion revenue organically as customers automate more workflows over time.
              Revenue streams include: (1) subscription contracts on team and enterprise tiers priced by story run
              volume; (2) professional services and onboarding for large enterprise deployments requiring custom
              workflow migration or integration build-out; and (3) partner and marketplace ecosystem arrangements,
              including co-sell agreements with CrowdStrike, Elastic, and HashiCorp that create referral and
              distribution revenue. The community free tier and starter tier are loss-leader acquisition vehicles, not
              meaningful revenue contributors in their own right. Enterprise and team tier contracts are estimated at
              $50,000 to $200,000 per year based on third-party review signals, though Tines does not publish list
              pricing. Revenue recognition follows standard SaaS ratable recognition across contract terms, with no
              identified multi-year backlog or deferred revenue disclosed in public sources.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >-
              Tines' go-to-market motion is built on a bottom-up community flywheel. Security practitioners discover
              Tines through the free community edition, build initial automations, generate internal advocacy, and
              create an inbound pull toward CISO-level budget approval. This reduces traditional outbound CAC relative
              to top-down enterprise SaaS peers but requires time investment to convert community champions to
              enterprise contracts. The company operates a direct enterprise sales team supplemented by a growing
              channel partner network including the CrowdStrike Falcon marketplace (access to ~24,000 enterprise
              customers), Elastic, HashiCorp, and 1Password. Direct enterprise contracts drive the majority of ARR.
              Sales cycle length for enterprise deals is not disclosed but is estimated at 60 to 120 days given the
              practitioner-champion model where initial evaluation is completed by security engineers before procurement
              involvement. Customer acquisition cost is not publicly disclosed; proxy signals suggest efficient CAC
              given the inbound-led model, though absolute CAC-to-LTV ratios remain unknown without access to internal
              cohort data. With 500+ enterprise customers and ~$85M ARR, implied average ARR per enterprise customer is
              approximately $170,000, suggesting healthy contract values for a no-code tool at this scale.
            claimRefs:
              - CI006
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
      - number: '4.3'
        title: Cost Structure and Gross Margin
        blocks:
          - type: paragraph
            body: >-
              Tines' cost structure is typical of a cloud-native SaaS company at Series C scale. The dominant cost
              categories are cloud infrastructure (compute and storage for workflow execution), employee compensation
              across engineering, product, sales, and customer success, and go-to-market spend including partner co-sell
              investments. Gross margin is not publicly disclosed. Software-first SaaS businesses with relatively
              limited professional services revenue typically achieve 70-80% gross margins at Tines' scale; however,
              Tines' usage-based model introduces a variable infrastructure cost component that correlates with story
              execution volume, potentially compressing margins in high-utilization enterprise accounts. If professional
              services revenue represents more than 15-20% of total ARR, gross margin could be closer to 60-70%. Capital
              expenditure requirements are minimal (cloud-native infrastructure eliminates physical capex), and working
              capital requirements are standard for a subscription SaaS business. The company has approximately 562
              employees as of 2026, with total compensation cost estimated at $80-100M annually based on industry
              benchmarks for a Dublin-plus-New York dual-headquartered engineering and sales organization at this scale.
              This implies a negative operating cash flow position until ARR materially exceeds total cash operating
              costs, which is typical and expected at the current growth stage.
            claimRefs:
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
      - number: '4.4'
        title: Traction and Public Financial Metrics
        blocks:
          - type: paragraph
            body: >-
              The most reliable public financial signal for Tines is the Series C press release from February 2025,
              which confirmed a $1.125B post-money valuation and $125M raise. Third-party databases including GetLatka
              and Tracxn estimate ARR at approximately $85M as of 2025, consistent with the valuation implying a revenue
              multiple of approximately 13x. This multiple is at the upper end of the enterprise security software peer
              group but is supported by documented double-digit revenue growth, strong net revenue retention signals,
              and a tier-1 investor syndicate. Operational metrics disclosed include more than one billion workflow
              actions per week as of 2025 and more than 33,000 registered users, though these are engagement metrics
              rather than financial KPIs. The company has not disclosed ARR growth rate; a 40-50% YoY growth rate would
              be consistent with peer multiples and a base case for the $1.125B valuation. Named customer logos
              including GitHub, Canva, Coinbase, Databricks, Elastic, Intercom, and Hulu represent material social proof
              that de-risks the revenue quality narrative, though revenue concentration risk cannot be assessed without
              knowing the percentage of ARR from the top 10 customers.
            claimRefs:
              - CI017
              - CI018
              - CI019
              - CI020
              - CI021
              - CI022
              - CI023
      - number: '4.5'
        title: Capital Adequacy and Financial Verdict
        blocks:
          - type: paragraph
            body: >-
              Tines raised $125M in its February 2025 Series C, bringing cumulative disclosed funding to approximately
              $272M. At an estimated monthly burn rate of $8-12M (derived from headcount cost estimates and typical SaaS
              operating cost profiles), the $125M raise provides 10-15 months of incremental runway beyond existing cash
              reserves. With prior rounds providing working capital through Series B and the $50M Series B extension in
              May 2024, Tines likely entered 2025 with meaningful cash runway before the Series C closing. Post-round,
              the company should have 24-36 months of operational runway, sufficient to reach the next funding milestone
              or approach cash-flow break-even if ARR continues growing at 40-50% YoY. Use of funds from the Series C is
              directed toward international expansion (Europe and Asia-Pacific GTM buildout), AI product investment (the
              AI agent builder launched mid-2025), and partner ecosystem program funding. The financial underwriting
              verdict is: Tines has strong revenue quality signals (multi-year contract structures implied by enterprise
              tier, land-and-expand model, high-profile logos), a capital position adequate for the next 24-36 months,
              but critical financial inputs including gross margin, burn rate, NRR, and CAC are unavailable for
              independent verification. Any investment decision must treat these as material data-room diligence
              requirements before underwriting the financial model with confidence.
            claimRefs:
              - CI024
              - CI025
              - CI026
              - CI027
              - CI028
              - CI029
              - CI030
