chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Operating Model
        blocks:
          - type: paragraph
            body: >
              Tines is a workflow automation platform founded in Dublin, Ireland in 2018 by Eoin Hinchy (CEO) and Thomas

              Kinsella (COO and Chief Customer Officer). The company's original mission was to eliminate the repetitive,

              manual work that overwhelmed security operations teams — a problem both founders encountered first-hand
              during

              their tenures at Deloitte, eBay's European Security division, and DocuSign, where Hinchy served as Senior

              Director of Security Operations. The eBay data breach of 2014, which exposed 145 million user records,
              served

              as the direct catalyst for Hinchy's decision to build Tines: he wanted a platform that would let security

              engineers automate complex multi-step workflows without requiring them to write production code.


              The platform delivers on this promise through a visual drag-and-drop workflow builder called "stories,"
              which

              allows practitioners to connect actions, conditions, and integrations into automated pipelines. Tines has

              grown from a security-focused tool into a broader enterprise automation platform, now serving teams across
              IT

              operations, legal, HR, and business process automation. As of 2025, the platform hosts more than 700

              pre-built integrations and a library of tools, while its AI Agent capabilities, launched in mid-2025,
              extend

              the platform into autonomous decision-making and task execution. Tines characterizes its commercial model
              as

              delivering automation at enterprise scale without requiring traditional SOAR complexity or expensive
              professional

              services engagements. The company operates from dual headquarters in Dublin (European HQ) and New York (US

              operations), and is certified SOC 2 Type II and ISO 27001.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO006
              - CO007
              - CO008
              - CO032
              - CO034
              - CO036
              - CO037
      - number: '1.2'
        title: Founders, Leadership, and Key-Person Dependence
        blocks:
          - type: paragraph
            body: >
              Tines was co-founded by Eoin Hinchy and Thomas Kinsella, both of whom built their careers in enterprise

              security operations at large organizations. Before founding Tines, Hinchy served as Senior Director of
              Security

              Operations at DocuSign and prior to that held security leadership roles at eBay's European division and

              Deloitte. Kinsella followed a parallel path through the same organizations. This shared institutional
              background

              in high-stakes security operations gave the founders direct insight into the pain points they sought to
              address:

              alert fatigue, manual triage, and the inability to respond to threats at machine speed without heavy
              engineering

              resources.


              Hinchy serves as CEO and is the primary public face of the company, representing Tines in fundraising

              communications, press engagements, and industry events. Kinsella serves as COO and Chief Customer Officer,

              taking responsibility for post-sale relationships and customer expansion revenue. The dual-founder
              structure with

              clearly delineated domains reduces single-point-of-failure risk compared with single-founder companies,
              though

              Hinchy's prominence in capital markets and strategic narratives means the CEO role still represents an
              elevated

              key-person dependency. Investors including Goldman Sachs Growth Equity and Accel have backed the
              leadership team

              through multiple rounds, suggesting sustained conviction in execution quality. Formal board governance
              details —

              exact composition, independent directors, and investor seat assignments — are not yet in the public record
              and

              represent a diligence gap for investors seeking full governance visibility.
            claimRefs:
              - CO002
              - CO003
              - CO005
              - CO036
              - CO037
      - number: '1.3'
        title: Funding History, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: >
              Tines has raised approximately $272 million in total venture financing across five distinct tranches. The

              company's funding history began with a seed round in 2018 and progressed through a Series A of
              approximately

              $16 million (2019-2020, led by Accel), a Series B of $55 million in 2021 (led by Addition and Felicis

              Ventures), a $50 million Series B extension in May 2024, and a landmark Series C of $125 million closed on

              February 11, 2025. The Series C was led by Goldman Sachs Growth Equity and introduced SoftBank Vision Fund
              2

              and Activant as new investors, while Accel, Felicis, CrowdStrike Falcon Fund, and Addition continued their

              participation.


              The Series C valued Tines at $1.125 billion post-money, making it Ireland's newest unicorn and placing it

              among the cohort of more than 10 European startups that achieved unicorn status in 2025. Goldman Sachs
              Growth

              Equity characterized Tines as a next-generation security automation platform in its press materials,
              framing

              the investment as consistent with its broader enterprise software thesis. The CrowdStrike Falcon Fund's

              continued involvement is notable from a strategic perspective: it signals alignment with a leading
              endpoint

              security vendor whose customers frequently need orchestration and automation capabilities that Tines can
              supply.

              Total funding of approximately $272 million across all rounds represents a material capital base for a
              company

              of Tines' stage, providing runway to invest in AI product capabilities, go-to-market expansion, and
              international

              hiring.
            claimRefs:
              - CO012
              - CO013
              - CO014
              - CO015
              - CO016
              - CO017
              - CO018
              - CO019
              - CO020
              - CO029
              - CO030
