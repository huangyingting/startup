  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: |
              The Tines investment thesis rests on five pillars: (1) a large and growing total addressable market —
              the global SOAR market is estimated at $6.9B growing at 13.4% CAGR, with security orchestration
              expanding into broader enterprise automation; (2) best-in-class product differentiation — 4.7/5 on
              G2 from 397 reviews and 4.9/5 on Gartner from 54 enterprise reviewers, reflecting genuine product
              quality in a market with several entrenched but lower-satisfaction incumbents; (3) exceptional ARR
              velocity — from $13.4M in 2024 to approximately $85M in 2025, implying 6x growth in a single year
              that exceeds normal high-growth SaaS benchmarks; (4) enterprise proof — 10+ named enterprise customers
              including Coinbase, Canva, GitLab, and Fivetran with documented production deployments; and
              (5) a defensible competitive position built around a no-code paradigm that lowers adoption barriers
              and drives practitioner-led bottom-up growth that reduces sales cycle length.

              The anti-thesis centers on four concerns: (1) competitive displacement risk from Cisco-Splunk and
              Palo Alto Networks, which can bundle SOAR at discounted rates in enterprise platform deals; (2) the
              13x ARR multiple at Series C entry — while reasonable for a high-growth company, this leaves limited
              downside cushion if growth decelerates; (3) undisclosed NRR and retention metrics, which mean the
              quality of ARR growth cannot be verified — if growth is primarily new logo acquisition with weak
              retention, the multiple is unsupportable; and (4) customer concentration and analytics depth gaps
              that could drive enterprise churn in accounts requiring deeper reporting and fewer vendors.

              The primary diligence unlock that would move this from Cautious Buy to Conviction Buy is confirmed
              NRR above 110% and verifiable customer concentration data showing no account represents more than
              10% of ARR. Below 110% NRR, the thesis weakens materially.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV008
      - number: '8.2'
        title: Financing Context, Valuation, and Entry Discipline
        blocks:
          - type: paragraph
            body: |
              Tines' latest disclosed financing is its February 2025 Series C of $125M at a $1.125B valuation, led
              by DTCP with participation from Accel, Index Ventures, and Bain Capital. Goldman Sachs Asset Management
              participated, providing institutional quality validation. The deal was confirmed via PR Newswire press
              release and multiple independent media sources, making it one of the better-evidenced private company
              valuation marks in this analysis.

              At approximately $85M ARR and a $1.125B valuation, the implied ARR multiple at Series C entry is
              approximately 13.2x. Comparable SaaS companies at similar growth profiles — ServiceNow at scale,
              Automation Anywhere, UiPath — traded at 10–20x ARR when growing above 50% YoY. Tines' 13x multiple
              is within the reasonable range for a company growing at 6x ARR YoY but is at the lower end of
              premium multiples, reflecting the private market's appropriate discount to public comparables.

              Dark Reading's coverage of the Series C confirms the Goldman Sachs and Softbank-adjacent investor
              participation, lending further credibility to the valuation mark. Tracxn's company profile provides
              additional ARR and growth metrics consistent with $85M ARR and the $1.125B valuation. State of the
              Stack newsletter analysis provided a deep-dive assessment of the Series C mechanics, noting that the
              valuation reflects conviction in the no-code automation market despite the competitive environment.

              Preference overhang is assumed to be standard for Series C: $155M total raised implies cumulative
              liquidation preference potentially in the $155–230M range (1–1.5x non-participating preferred),
              which at a $1.125B enterprise value leaves meaningful common equity value but requires modeling in
              Series D or exit scenarios.
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
      - number: '8.3'
        title: Bull / Base / Bear Scenarios and Valuation Range
        blocks:
          - type: paragraph
            body: |
              The bull case assumes Tines maintains 60%+ ARR growth through 2027, reaching approximately $340M ARR
              by 2027 end, with NRR confirmed above 120% and no major customer concentration or competitive loss.
              At a 12x ARR exit multiple (reasonable for a company growing 60%+ with high NRR in a 2028 IPO or M&A
              process), the bull case enterprise value reaches $4.1B, implying a 3.6x return on the Series C
              investment over three years. This requires successful Series D financing and sustained competitive
              differentiation against Cisco-Splunk bundling.

              The base case assumes 50% ARR growth through 2027, reaching approximately $280M ARR, with NRR in
              the 110–120% range. At a 9x ARR exit multiple (reflecting slight multiple compression from peak
              private market valuations), the base case enterprise value is approximately $2.5B, implying a 2.2x
              return. This case requires no major partner defection and continued market share capture in the
              security automation segment.

              The bear case assumes growth deceleration to 35% ARR YoY — triggered by Cisco-Splunk platform
              bundling pressure and NRR below 110% — bringing 2027 ARR to approximately $200M. At a 5x ARR
              multiple reflecting multiple compression for a decelerating growth company, the bear case enterprise
              value is $1.0B, below the current $1.125B valuation mark. This represents a down-round scenario
              or flat exit at best, implying a 0.9x return (loss of capital at entry price).

              Mordor Intelligence estimates the SOAR market at $6.9B growing at 13.4% CAGR through 2029; even in
              the bear case, Tines would represent less than 3% market share in 2027, suggesting the total
              addressable market is not the binding constraint — execution and competitive dynamics are.
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
      - number: '8.4'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: |
              Tines' Series C multiple of approximately 13x ARR is benchmarked against a set of comparable
              security automation and workflow automation companies at similar growth stages. UiPath, the RPA
              pioneer, listed at approximately 30x ARR in its 2021 IPO and subsequently traded down to 5–8x ARR
              as growth decelerated — illustrating the downside risk of multiple compression. Automation Anywhere
              raised at approximately $6.8B valuation on estimated $250M ARR in 2023, implying approximately 27x
              ARR — a premium reflecting its larger scale. Workato, a horizontal workflow automation platform
              comparable to Tines, raised at $7.7B valuation on approximately $100M ARR in 2022, implying 77x
              ARR at peak private market valuations — an extreme premium since compressed.

              XSOAR/Palo Alto Networks does not provide a standalone valuation mark; Palo Alto trades at
              approximately 12–14x revenue across its Cortex platform. ServiceNow, the most mature workflow
              automation incumbent, trades at approximately 13–15x NTM revenue — suggesting Tines' entry
              multiple is consistent with mature enterprise automation benchmarks, though Tines carries more
              risk given its earlier stage.

              Market Research Future estimates the broader workflow automation market at approximately $26B,
              growing at 23.9% CAGR through 2030, suggesting Tines' SOAR specialization is a defensible
              niche within a larger secular automation wave. The IBM Think security automation coverage confirms
              that large enterprises are actively investing in orchestration, benefiting the overall category.
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
              - CV032
      - number: '8.5'
        title: Exit Readiness, Diligence Asks, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: |
              Tines' path to exit most plausibly runs through one of three channels: (1) an IPO in 2027–2028 if
              ARR reaches $250–350M and public market SaaS multiples recover; (2) a strategic acquisition by a
              large security or cloud platform (Microsoft, CrowdStrike, Cisco/Splunk, Palo Alto Networks) seeking
              workflow automation capabilities; or (3) a secondary sale or Series D at a higher valuation if ARR
              growth sustains above 50% YoY. The acquisition scenario is strategically plausible but carries
              antitrust risk given the existing Cisco-Splunk SOAR combination and Palo Alto's Cortex XSOAR.

              ProductHunt community sentiment and DarkReading Series C coverage both confirm broad market awareness
              of Tines as a viable enterprise security automation brand — a prerequisite for IPO exit readiness.
              Irish Examiner coverage confirms Tines' significance as an Irish technology company, providing
              local market context for Dublin-based employee retention and talent acquisition relevant to
              scaling execution.

              Final diligence asks that would significantly increase conviction: (1) audited or reviewed financial
              statements for 2024 and 2025, including NRR, gross retention, and revenue by cohort; (2) top-10
              customer ARR concentration expressed as a percentage; (3) win/loss analysis against Splunk SOAR and
              Cortex XSOAR; (4) headcount, attrition, and open role data; (5) SOC 2 audit report with scope and
              exceptions; (6) Series C preference terms including liquidation waterfall; and (7) a product roadmap
              with investment allocation between security depth, analytics improvement, and AI Agent expansion.

              Thesis-break triggers: ARR growth below 50% YoY; NRR below 110%; departure of either co-founder;
              Cisco-Splunk announcing free bundling of SOAR in platform deals; or a material data breach.
            claimRefs:
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
