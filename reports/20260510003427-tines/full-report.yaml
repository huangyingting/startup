  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Competitive and Market Risk
        blocks:
          - type: paragraph
            body: |
              Tines competes in the SOAR and enterprise automation platform market against Splunk SOAR, Palo Alto
              Cortex XSOAR, Swimlane, and general-purpose low-code platforms including Microsoft Power Automate,
              Workato, and Zapier. The primary competitive displacement risk arises from two directions: platform
              consolidation by large security vendors bundling SOAR capabilities into suite products sold at
              negative margin to win broader platform deals, and commoditization of workflow automation as
              hyperscalers (AWS, Microsoft, Google) invest in native orchestration tooling.

              Splunk's acquisition by Cisco in 2024 for approximately $28B positions the combined Cisco-Splunk
              entity as a formidable SOAR incumbent with deep enterprise relationships, significant field sales
              capacity, and native SIEM-SOAR integration that Tines currently must bridge via HTTP connectors.
              Palo Alto Networks' Cortex XSOAR benefits from similar platform bundling dynamics, sold alongside
              Prisma and Cortex XDR with deal economics that allow XSOAR to be discounted significantly in
              platform deals. Tines' no-code differentiation and product quality — reflected in 4.7/5 G2 ratings
              — provide partial insulation but do not eliminate the risk that large enterprise buyers choose
              incumbent platforms to reduce vendor count.

              The risk of Microsoft Power Automate displacing Tines in non-security-centric automation use cases
              is material at mid-market accounts where Microsoft 365 licensing includes workflow automation
              capabilities. Tines' security-operations specialization and connector quality provide differentiation
              in security buyer segments, but as Tines expands into IT, finance, and GTM automation (as named
              customer case studies show), the competitive exposure to Power Automate and Workato increases.
              Swimlane's new Turbine platform is positioned explicitly as a security-native alternative to Tines.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
      - number: '7.2'
        title: Regulatory, Legal, and Compliance Risk
        blocks:
          - type: paragraph
            body: |
              Tines operates under multiple data privacy and security compliance frameworks. The company holds
              SOC 2 Type II and ISO 27001 certifications, which are necessary prerequisites for enterprise
              procurement in regulated industries. GDPR compliance is critical given Tines' Dublin headquarters
              and European customer base; as a data processor for enterprise automation workflows, Tines must
              maintain appropriate data processing agreements (DPAs) and implement technical controls that meet
              GDPR Article 28 requirements.

              Tines' security compliance posture — SOC 2 Type II and ISO 27001 — is disclosed on the Tines
              security page, providing verifiable evidence that the company has invested in baseline enterprise
              compliance infrastructure. However, the scope and limitations of the SOC 2 audit (which systems
              are in scope, any exceptions noted) are not publicly disclosed, representing a diligence gap.

              No material litigation, regulatory enforcement actions, patent disputes, or data breach disclosures
              were identified in public sources as of May 2026. Tines' pricing and packaging terms, including
              subscription licensing and data residency options, are disclosed in the Tines help center, providing
              legal review of baseline contract terms. Tines' platform processes enterprise security data including
              potentially sensitive incident artifacts, credentials references, and API tokens; the regulatory
              risk of a data breach involving customer automation workflows would be material.

              From a licensing and IP perspective, Tines does not appear to hold a proprietary patent portfolio
              or face disclosed IP disputes. The company is incorporated in Ireland, which may carry advantages
              for EU data residency requirements but also subjects it to Irish regulatory oversight under GDPR
              as both a data controller and processor.
            claimRefs:
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
      - number: '7.3'
        title: Operational and Technical Risk
        blocks:
          - type: paragraph
            body: |
              Tines' operational risk profile is anchored by three primary exposures: (1) cloud infrastructure
              dependency on AWS, which concentrates operational resilience risk in a single hyperscaler's uptime
              and service availability; (2) the risk of security incidents or data breaches given that the platform
              processes enterprise security workflow data including sensitive automation artifacts; and (3) the
              execution risk of scaling the engineering and go-to-market organization at the pace required to
              sustain the ARR growth trajectory.

              No public outage incidents, CVEs, or significant security incidents involving Tines were identified
              in public sources. Tines' SOC 2 Type II certification provides evidence of security control testing,
              and the company maintains a published security page with compliance disclosures. However, the
              absence of a published SLA, uptime history, or incident postmortem index is a meaningful operational
              diligence gap for enterprise buyers and investors assessing operational resilience.

              Product complexity risk is evidenced by G2 and PeerSpot reviewers citing a learning curve for
              non-technical users building complex branching workflows. This complexity risk translates into
              implementation risk for customers without dedicated automation engineers, which could drive churn
              in smaller accounts. Analytics depth gaps flagged by enterprise reviewers represent a product risk
              that could enable competitive displacement if not addressed in the roadmap.

              Tines' Dublin headquarters concentrates engineering leadership and institutional knowledge in a
              single geographic location. Rapid headcount scaling required to support Series C-funded growth
              introduces execution risk, particularly in recruiting security automation engineers and senior
              enterprise sales talent in competitive Dublin and US markets.
            claimRefs:
              - CR016
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
      - number: '7.4'
        title: Partner, Dependency, and Key-Person Risk
        blocks:
          - type: paragraph
            body: |
              Tines' partner ecosystem is a source of both go-to-market leverage and concentration risk. The
              company's strategic integrations with CrowdStrike, Pagerduty, Splunk, and Elastic create channel
              dependency: if any major partner deepens native automation capabilities within their own platforms,
              Tines could face reduced referral flow and competitive displacement from within the ecosystem.
              CrowdStrike's Technology Alliance Partner listing includes Tines, creating bidirectional dependency —
              CrowdStrike is both a channel partner and a potential platform competitor as it expands its own
              automation and orchestration capabilities within the Falcon platform.

              PagerDuty's operations automation platform and Tines' incident automation use cases overlap
              significantly; PagerDuty's acquisition of Runbook Automation in recent years has increased
              platform competition in the incident automation adjacency. Splunk's acquisition by Cisco adds
              further complexity: Tines integrates with Splunk but also competes with Splunk SOAR, creating
              a dual relationship that carries revenue dependency risk if Splunk deprecates the Tines integration
              or preferentially routes customers to SOAR.

              Key-person risk is elevated at Tines due to the concentration of product vision, technical
              architecture, and customer relationships in a small founding team. Eoin Hinchy (CEO) and Thomas
              Kinsella (COO) are the public faces of the company and are cited repeatedly in press coverage as
              the drivers of product strategy. The departure of either co-founder would likely impact customer
              confidence and investor sentiment, particularly at the current growth stage.
            claimRefs:
              - CR023
              - CR024
              - CR025
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
      - number: '7.5'
        title: Financial and Model Risk, Mitigations, and Kill Criteria
        blocks:
          - type: paragraph
            body: |
              Tines' financial risk profile reflects the execution challenges of a high-growth SaaS company that
              raised $125M at a $1.125B valuation with an ARR base estimated at approximately $85M. The implied
              ARR multiple of approximately 13x (at mid-point estimates) is serviceable for a company growing
              at 6x ARR, but leaves limited downside cushion if growth decelerates. Burn rate and runway are
              not disclosed; with $155M raised in total financing and no disclosed profitability, burn is
              assumed to be material.

              Working capital risk is limited for a subscription SaaS business model — Tines' cash is primarily
              consumed by headcount (engineering, sales, customer success) rather than capital equipment or
              inventory. However, the Series C was raised in early 2025; at a moderate burn rate of $3-5M per
              month, the company has 2.5-4 years of runway, which should be sufficient to reach a subsequent
              financing event or profitability if ARR growth continues.

              Palo Alto Networks' pricing data for Cortex XSOAR confirms that SOAR pricing models are complex
              and deployment-dependent. Tines' volume-based pricing model could create margin compression risk
              as enterprise customers negotiate larger-volume discounts at contract renewal. The risk of
              enterprise-level price competition from incumbents discounting SOAR as part of platform deals
              is real and could compress Tines' effective ASP over time.

              Thesis-break triggers that would materially impair the investment case include: ARR growth below
              50% YoY; NRR below 110%; a major platform partner (CrowdStrike, Splunk) deprecating the Tines
              integration; a material data breach or regulatory enforcement action; or co-founder departure.
            claimRefs:
