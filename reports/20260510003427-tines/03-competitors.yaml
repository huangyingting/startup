sections:
  - id: sec-p-1
    title: Competitive Landscape Overview
    body: >-
      Tines operates in the Security Orchestration, Automation, and Response (SOAR) market and the broader no-code
      enterprise workflow automation space. Its direct peers include legacy SOAR platforms (Palo Alto Cortex XSOAR,
      Splunk SOAR), cloud-native upstarts (Torq, Swimlane), and IT-service-management incumbents expanding into security
      operations (ServiceNow SecOps). Adjacent substitutes include hyperautomation platforms (UiPath, Microsoft Power
      Automate), internal engineering build, and point-solution integration tools (Tines' primary status-quo
      displacement target). The competitive terrain divides into three strategic clusters: (1) mature, bundled SOAR
      suites sold as part of larger XDR or SIEM platforms; (2) standalone no-code SOAR platforms targeting security
      practitioners directly; and (3) general-purpose automation vendors that have added security playbook templates.
      Tines sits squarely in the second cluster, with its no-code, practitioner-led go-to-market and community library
      differentiating it from legacy suites. The 2025 Series C at a $1.125B valuation provides Tines with meaningful
      capital advantage over unfinanced or Series A-stage competitors but places it in direct competition with
      well-resourced Palo Alto and Splunk parent companies. Forrester analysts characterized the round as validation of
      the security automation thesis while noting intensifying competitive pressure from both legacy and hyperautomation
      vendors.
    claimRefs:
      - CP001
      - CP010
      - CP011
      - CP012
      - CP013
      - CP014
    tableRefs:
      - TP001
    figureRefs:
      - FP001
  - id: sec-p-2
    title: Key Competitor Profiles
    body: >-
      Palo Alto Networks Cortex XSOAR is the dominant SOAR incumbent, combining Demisto's original SOAR capability with
      Palo Alto's broader XDR and threat intelligence platform. It targets enterprise SOC teams already invested in Palo
      Alto's ecosystem and commands premium pricing. Its strength is ecosystem lock-in and native integration with
      Cortex XDR and Prisma; its weakness is scripting-heavy playbooks that require trained engineers, creating a skills
      bottleneck that Tines' no-code builder eliminates. Splunk SOAR, formerly Phantom, is the second major legacy SOAR
      vendor, now bundled within Splunk's SIEM offering and folded into Cisco's portfolio after the 2024 acquisition. It
      benefits from deep Splunk SIEM integration but faces the same engineering-centric usability critique as XSOAR and
      introduces customer uncertainty from the Cisco integration. ServiceNow Security Operations extends ServiceNow's
      ITSM workflows into security incident management, offering a credible substitute for organizations already running
      ServiceNow at scale, particularly in IT risk and GRC-adjacent workflows. Swimlane is a pure-play SOAR vendor with
      a low-code approach, Series C-stage funded, competing most directly with Tines on practitioner ease of use. Torq
      is a no-code security hyperautomation competitor that emphasizes IT and security convergence, with a similar
      community-led go-to-market strategy. CrowdStrike offers native workflow automation within its Falcon platform,
      posing a bundle-displacement risk to standalone SOAR for existing Falcon customers. Tines' Anthropic partnership
      and AI agent builder signal a differentiated AI-native product direction that pure-play RPA and legacy SOAR
      vendors cannot easily replicate in the near term.
    claimRefs:
      - CP002
      - CP010
      - CP011
      - CP012
      - CP020
      - CP024
      - CP036
  - id: sec-p-3
    title: Feature and Capability Comparison
    body: >-
      Tines' most cited differentiation is its genuinely no-code architecture: security practitioners without
      engineering backgrounds can build, deploy, and maintain automations without writing Python or YAML playbooks. Palo
      Alto XSOAR and Splunk SOAR both require Python proficiency for non-trivial playbooks, creating a skills bottleneck
      that Tines' natural-language builder eliminates. In integrations breadth, Tines claims 700+ native integrations
      versus Swimlane's reported 200+ and Torq's 500+, suggesting an advantage in coverage for large enterprises running
      diverse security toolstacks. Tines' community library of thousands of pre-built workflow templates is a meaningful
      adoption lever with no direct equivalent in the legacy suites, and creates a compounding network effect as each
      new template adds value for all existing and prospective users at no incremental cost. On AI capabilities, all
      major vendors announced AI-assisted playbook generation in 2025; Tines' AI agent builder and Anthropic partnership
      suggest a credible co-pilot feature, though the differentiation window from AI feature parity is narrowing. Case
      management depth is an acknowledged gap for Tines relative to XSOAR and ServiceNow; enterprises requiring native
      ticketing workflows often need an additional ITSM integration. Third-party review data identifies volume-based
      pricing unpredictability as a top concern for enterprise buyers, creating renewal friction that incumbent per-seat
      pricing models do not. Tines' multi-team deployment across security, IT, finance, and compliance distinguishes it
      from the SOC-centric positioning of most legacy SOAR alternatives.
    claimRefs:
      - CP002
      - CP003
      - CP015
      - CP020
      - CP022
      - CP024
      - CP027
      - CP030
      - CP037
      - CP038
    tableRefs:
      - TP002
    figureRefs:
      - FP002
  - id: sec-p-4
    title: Pricing and Packaging Analysis
    body: >-
      Tines offers a community free tier, a starter tier, and team or enterprise tiers. Pricing is based on workflow
      execution volume (story runs) rather than per-seat, which aligns cost with value delivery but creates
      unpredictable billing for high-volume security operations centers. Enterprise contracts are estimated at $50,000
      to $200,000 per year based on third-party review signals and community discussion, though list pricing is not
      publicly disclosed. Palo Alto Cortex XSOAR pricing is opaque but typically runs six figures annually for
      enterprise deployments, bundled with XSIAM or XSOAR licenses. Splunk SOAR is priced as an add-on to Splunk
      platform licensing, making standalone comparison difficult, and Cisco integration creates additional pricing
      uncertainty for existing customers. Swimlane publishes per-seat or workflow tier pricing with similar enterprise
      opacity. ServiceNow Security Operations is an add-on module to ServiceNow ITSM licensing, typically representing a
      substantial upsell that already-committed ServiceNow customers may absorb, but that creates a high barrier for new
      entrants. The community and starter tier strategy that Tines employs is a structural advantage for top-of-funnel
      practitioner acquisition. However, the volume-based pricing model creates a risk of budget shock as automation
      usage scales, which buyer reviews and renewal analysis suggest is a real friction point driving competitor
      evaluation at renewal.
    claimRefs:
      - CP015
      - CP026
      - CP038
    tableRefs:
      - TP003
  - id: sec-p-5
    title: Moat Assessment and Competitive Risks
    body: >-
      Tines' competitive moat rests on five interlocking factors: first, practitioner community and workflow library
      creating high switching costs as customers accumulate institutional playbooks; second, no-code accessibility that
      structurally differentiates from engineer-centric legacy suites; third, a growing partner ecosystem of 700+
      integrations that would need to be rebuilt on any alternative platform; fourth, reputational trust established
      through 500+ enterprise customers and high-profile security logos including GitHub, Coinbase, and Elastic; and
      fifth, capital position after the $125M Series C which funds both product investment and distribution scale. The
      primary risks to moat durability are: commoditization of AI-assisted workflow generation, which could reduce the
      no-code advantage if AI agents generate playbooks without a visual builder; platform-native automation bundles
      from CrowdStrike, Palo Alto, and Microsoft adding SOAR capability to existing security platforms; and the
      hyperautomation mega-vendors expanding downmarket into security. Tines' partnership depth with CrowdStrike,
      HashiCorp, 1Password, and Elastic is both a moat reinforcement and a dependency. The CrowdStrike marketplace
      listing exposes Tines to CrowdStrike's 24,000+ enterprise customers through a preferred distribution channel.
      FedRAMP authorization status remains unconfirmed in public sources, representing a potential barrier to government
      market access that competitors with cleared offerings could exploit.
    claimRefs:
      - CP008
      - CP017
      - CP018
      - CP021
      - CP025
      - CP028
      - CP031
      - CP032
      - CP040
    tableRefs:
      - TP004
    figureRefs:
      - FP003
