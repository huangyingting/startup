chapter:
  number: 3
  title: Competitors
  summary: >-
    Tines competes in the SOAR and no-code enterprise automation market against legacy suites (Palo Alto Cortex XSOAR,
    Splunk SOAR), cloud-native standalone platforms (Swimlane, Torq), and ITSM-native substitutes (ServiceNow SecOps).
    Tines' primary moat is its genuinely no-code builder, a compounding community workflow library, and a 700+
    integration ecosystem reinforced by tier-1 partners (CrowdStrike, Elastic, Anthropic). Key competitive risks include
    platform bundling by Palo Alto and Cisco/Splunk, volume-based pricing friction at renewal, and medium-term AI-agent
    substitution of the visual workflow builder.
