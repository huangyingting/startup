  evidenceGaps:
    - type: missing-source
      severity: material
      topic: fedramp-authorization
      missingEvidence: >-
        Tines FedRAMP authorization or government security certification status is not confirmed in any available public
        source.
      whyItMatters: >-
        Without FedRAMP authorization, Tines cannot sell to US federal agencies, a significant regulated-market segment
        that better-certified competitors could exploit.
      diligencePath: Direct company inquiry; FedRAMP marketplace search; government channel partner interviews.
      relatedQuestionRefs:
        - QP024
    - type: private-evidence-only
      severity: material
      topic: competitor-financials
      missingEvidence: >-
        Swimlane and Torq ARR and customer count estimates derive from analyst inference, not disclosed financials; no
        company has published audited revenue.
      whyItMatters: >-
        Accurate competitive capital and revenue position comparison requires data not available in public sources;
        estimates carry material uncertainty.
      diligencePath: >-
        Cross-reference Crunchbase, Tracxn, and industry analyst subscriptions for each competitor's funding and
        revenue.
      relatedQuestionRefs:
        - QP003
    - type: missing-source
      severity: material
      topic: win-loss-data
      missingEvidence: >-
        No independent win/loss data is available for 2025 or 2026 Tines competitive deals vs. Cortex XSOAR or Splunk
        SOAR.
      whyItMatters: >-
        Without win/loss data, the competitive claim that Tines wins on ease of use cannot be independently verified;
        vendor churn and deal loss patterns remain opaque.
      diligencePath: Buyer interviews; reference customer calls; channel partner win/loss surveys.
      relatedQuestionRefs:
        - QP028
    - type: missing-source
      severity: minor
      topic: ai-substitution-timeline
      missingEvidence: >-
        No formal analyst estimate of the 3 to 5 year SOAR displacement probability from autonomous AI agents is
        available in public sources.
      whyItMatters: >-
        AI substitution risk timeline is speculative; the speed at which AI agent platforms could erode the no-code
        builder's value proposition is highly uncertain.
      diligencePath: Forrester, Gartner security automation forecast reports; interview AI-native workflow vendors on roadmap.
      relatedQuestionRefs:
        - QP023
    - type: private-evidence-only
      severity: minor
      topic: enterprise-pricing-distribution
      missingEvidence: >-
        Tines enterprise deal size distribution and actual realized pricing are not publicly disclosed; estimates based
        on review and community signals carry wide error bars.
      whyItMatters: >-
        Without realized ASP data, it is not possible to accurately estimate revenue per customer, expansion revenue
        dynamics, or churn-at-risk from pricing friction.
      diligencePath: Request realized pricing data in formal data room; community channel partner interviews.
      relatedQuestionRefs:
