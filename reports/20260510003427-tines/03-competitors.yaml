callouts:
  - calloutType: strength
    title: No-Code Plus Community Moat Is Structurally Durable
    body: >-
      Tines' combination of genuine no-code accessibility and a compounding community workflow library creates a
      self-reinforcing moat that Python-heavy legacy SOAR vendors cannot replicate without full platform
      re-architecture. The 700+ integration library further raises switching cost.
    claimRefs:
      - CP002
      - CP018
      - CP040
  - calloutType: risk
    title: Platform Bundling Threat Is Existential if Buyers Consolidate
    body: >-
      Palo Alto Networks and Cisco/Splunk can offer SOAR-equivalent automation at zero marginal cost within existing
      platform contracts. If enterprise buyers prioritize platform consolidation over best-in-class SOAR, Tines'
      standalone revenue model faces structural pricing floor pressure.
    claimRefs:
      - CP021
  - calloutType: risk
    title: Volume-Based Pricing Creates Renewal Friction
    body: >-
      Third-party review data consistently identifies cost unpredictability at scale as a top buyer concern. This
      creates a vulnerability in renewal conversations that Swimlane, Torq, and ServiceNow can exploit with more
      predictable per-seat or module-based pricing structures.
    claimRefs:
      - CP015
      - CP038
  - calloutType: insight
    title: Anthropic Partnership Signals AI-Native Differentiation Window
    body: >-
      Tines' partnership with Anthropic for Claude-powered workflow intelligence creates a 12-18 month differentiation
      window before legacy SOAR vendors can achieve comparable AI integration depth. Sustained investment in
      AI-in-builder is required to maintain this advantage as the market converges on AI features.
    claimRefs:
      - CP020
      - CP034
  - calloutType: recommendation
    title: Diligence FedRAMP and Government Market Access
    body: >-
      FedRAMP authorization status is unconfirmed in available public sources. Given the government and
      regulated-industry expansion opportunity, clarifying Tines' FedRAMP roadmap should be a priority diligence ask
      before any investment decision.
    claimRefs:
      - CP039
