- id: sec-v-4
  title: Comparable Valuation Analysis
  body: 'Tines'' Series C multiple of approximately 13x ARR is benchmarked against a set of comparable

    security automation and workflow automation companies at similar growth stages. UiPath, the RPA

    pioneer, listed at approximately 30x ARR in its 2021 IPO and subsequently traded down to 5–8x ARR

    as growth decelerated — illustrating the downside risk of multiple compression. Automation Anywhere

    raised at approximately $6.8B valuation on estimated $250M ARR in 2023, implying approximately 27x

    ARR — a premium reflecting its larger scale. Workato, a horizontal workflow automation platform

    comparable to Tines, raised at $7.7B valuation on approximately $100M ARR in 2022, implying 77x

    ARR at peak private market valuations — an extreme premium since compressed.


    XSOAR/Palo Alto Networks does not provide a standalone valuation mark; Palo Alto trades at

    approximately 12–14x revenue across its Cortex platform. ServiceNow, the most mature workflow

    automation incumbent, trades at approximately 13–15x NTM revenue — suggesting Tines'' entry

    multiple is consistent with mature enterprise automation benchmarks, though Tines carries more

    risk given its earlier stage.


    Market Research Future estimates the broader workflow automation market at approximately $26B,

    growing at 23.9% CAGR through 2030, suggesting Tines'' SOAR specialization is a defensible

    niche within a larger secular automation wave. The IBM Think security automation coverage confirms

    that large enterprises are actively investing in orchestration, benefiting the overall category.

    '
