  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: nrr-and-retention
    missingEvidence: NRR, gross retention, and customer cohort data are not publicly disclosed by Tines.
    whyItMatters: NRR is the single most important diligence ask; without it, the 13x ARR multiple cannot be validated against
      revenue quality.
    diligencePath: Request NRR, gross retention, and cohort data from Tines CFO in direct diligence.
    relatedQuestionRefs:
    - QV006
  - type: private-evidence-only
    severity: blocking
    topic: concentration-and-churn
    missingEvidence: Top-10 customer ARR concentration and churn rate are not publicly disclosed.
    whyItMatters: High concentration amplifies downside in the bear case and could trigger an ARR cliff if a top-5 customer
      churns.
    diligencePath: Request top-10 customer ARR concentration, contract lengths, and pilot-to-close data.
  - type: private-evidence-only
    severity: material
    topic: product-roadmap
    missingEvidence: Tines has not published a product roadmap with investment allocation between analytics, AI Agents, and
      security depth.
    whyItMatters: Roadmap gaps in analytics could enable competitive displacement; AI investment could be a moat-building
      opportunity.
    diligencePath: Interview CTO/CPO on roadmap priorities and relative investment allocation.
    relatedQuestionRefs:
    - QV017
  - type: private-evidence-only
    severity: material
    topic: burn-rate-and-runway
    missingEvidence: Monthly burn rate and current cash balance are not publicly disclosed.
    whyItMatters: Burn and runway determine Series D timing and dilution; below 18 months runway increases financing risk.
    diligencePath: Request 12-month cash flow forecast and current cash balance from Tines CFO.
    relatedQuestionRefs:
    - QV021
  - type: enumeration-incomplete
    severity: minor
    topic: comparable-valuation-completeness
    missingEvidence: Comparable set does not include all relevant private SOAR/automation rounds or strategic M&A transactions;
      market data for private comps is limited.
    whyItMatters: A more complete comparable set would improve confidence in the 13x ARR multiple assessment.
    diligencePath: Request Pitchbook/CB Insights comparable round data for SOAR and security automation companies in investor
      diligence.
    relatedTableRefs:
    - TV004
