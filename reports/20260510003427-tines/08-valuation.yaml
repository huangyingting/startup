company:
  name: Tines
chapter:
  number: 8
  title: Valuation
  summary: Tines is a Cautious Buy at the $1.125B Series C valuation, contingent on confirming NRR above 110% and customer
    concentration data in direct diligence. The base case implies a 2.2x–3.1x return at a 2028 exit assuming 50% ARR growth
    and an 8–10x ARR multiple, driven by the company's best-in-class product ratings, 6x ARR growth from 2024 to 2025, and
    a strongly-differentiated no-code platform in a $6.9B SOAR market growing at 13% CAGR. The primary downside risk is competitive
    displacement by Cisco-Splunk platform bundling, combined with undisclosed retention metrics and a 13x ARR entry multiple
    that leaves limited margin of safety if growth decelerates below 50% YoY.
