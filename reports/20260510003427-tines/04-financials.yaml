company:
  name: Tines
chapter:
  number: 4
  title: Financials
  summary: >-
    Tines generates revenue primarily through a usage-based SaaS model priced on workflow (story) execution volume, with
    community, starter, team, and enterprise tiers. Estimated ARR of approximately $85M as of 2025 implies a revenue
    multiple of roughly 13x at the $1.125B Series C valuation, consistent with high-growth enterprise SaaS peers but
    dependent on continued double-digit ARR growth. Gross margin, burn rate, and unit economics remain private; the
    financial underwriting case rests heavily on ARR trajectory, partner ecosystem expansion, and disciplined Series C
    deployment across product investment and go-to-market scale.
