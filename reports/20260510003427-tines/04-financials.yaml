  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: gross-margin
      missingEvidence: >-
        Audited gross margin percentage and gross profit figures are not publicly available for Tines as a private
        company.
      whyItMatters: >-
        Without gross margin data, operating leverage, sustainable cost structure, and margin expansion path cannot be
        independently modeled; this is the single most critical missing financial input.
      diligencePath: Request audited P&L or CFO gross margin presentation from data room before any financial model is built.
      relatedQuestionRefs:
        - QI005
        - QI024
    - type: private-evidence-only
      severity: material
      topic: net-revenue-retention
      missingEvidence: >-
        Net revenue retention by cohort is not publicly disclosed; expansion versus contraction revenue cannot be
        separated from reported ARR estimates.
      whyItMatters: >-
        NRR is the primary leading indicator of revenue quality; NRR above 100% self-funds expansion while NRR below
        100% signals churn risk that undermines the ARR growth thesis.
      diligencePath: Request cohort-level NRR data and ARR bridge (new ARR, expansion ARR, churn ARR) from finance team in data room.
      relatedQuestionRefs:
        - QI007
    - type: private-evidence-only
      severity: material
      topic: burn-rate-and-runway
      missingEvidence: >-
        Actual monthly cash burn and current cash balance are not disclosed; all runway estimates are derived from
        headcount-based benchmarks with wide error bars.
      whyItMatters: >-
        Without actual burn data, capital adequacy assessment cannot be confirmed; a higher-than-benchmark burn would
        materially shorten runway and accelerate next-round dependency.
      diligencePath: Request monthly cash flow statement, current cash balance, and CFO runway model from data room.
      relatedQuestionRefs:
        - QI009
        - QI022
    - type: missing-source
      severity: material
      topic: debt-obligations
      missingEvidence: >-
        No public source confirms or denies the existence of debt, venture debt, convertible notes, or revenue-based
        financing instruments at Tines.
      whyItMatters: >-
        Undisclosed debt obligations could affect equity value, capital priority, and dilution structure at future
        financing events.
      diligencePath: Request capitalization table and debt schedule from data room; verify with company counsel.
      relatedQuestionRefs:
        - QI017
    - type: private-evidence-only
      severity: material
      topic: revenue-concentration
      missingEvidence: Top-10 customer ARR concentration, customer count by tier, and churn rate by segment are not publicly disclosed.
      whyItMatters: >-
        High revenue concentration in a small number of enterprise accounts creates execution risk if any major customer
        churns or renegotiates pricing downward.
      diligencePath: >-
        Request customer ARR distribution, top-10 customer list (with NDA), and annual churn waterfall from finance
        team.
      relatedQuestionRefs:
        - QI020
    - type: private-evidence-only
      severity: minor
      topic: cac-by-channel
      missingEvidence: >-
        Customer acquisition cost segmented by inbound community versus outbound direct channel is not publicly
        disclosed; absolute CAC values and payback period cannot be independently verified.
      whyItMatters: >-
        Without CAC data, sales efficiency comparisons to outbound-first peers cannot be validated and LTV-to-CAC ratio
        cannot be confirmed.
      diligencePath: Request CAC by channel from sales operations and finance team during data room review.
      relatedQuestionRefs:
        - QI006
