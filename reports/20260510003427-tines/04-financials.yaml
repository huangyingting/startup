callouts:
  - calloutType: strength
    title: Usage-Based Model Aligns Revenue with Customer Value at Scale
    body: >-
      Story run-based pricing creates a natural expansion revenue mechanism as customers automate more workflows. Unlike
      per-seat models, it captures economic value proportional to usage depth, supporting strong net revenue retention
      if customers scale their automation footprint.
    claimRefs:
      - CI001
      - CI007
  - calloutType: risk
    title: All Core Unit Economics Are Unavailable — Financial Underwriting Cannot Be Completed
    body: >-
      Gross margin, burn rate, NRR, CAC, and LTV are not disclosed in any public source. An investment decision based
      solely on public data requires accepting material uncertainty across every financial underwriting input. These are
      standard data-room requirements and must be obtained before model-based underwriting.
    claimRefs:
      - CI030
      - CI031
      - CI032
      - CI033
      - CI034
  - calloutType: risk
    title: Volume-Based Billing Creates Revenue Predictability Risk at Enterprise Scale
    body: >-
      High-volume enterprise accounts face unpredictable monthly charges that can create friction at renewal. If the
      billing model generates sticker shock in large-deployment environments, NRR could erode as customers seek
      capped-pricing alternatives from Swimlane or ServiceNow SecOps.
    claimRefs:
      - CI015
      - CI016
  - calloutType: insight
    title: 13x ARR Multiple Implies 40-50% YoY Growth Requirement to Hold Valuation
    body: >-
      At 13x ARR on $85M, Tines' valuation is priced for continued high growth. If ARR growth decelerates to below 30%,
      the revenue multiple will compress toward the 8-10x range typical of lower-growth security software, creating a
      downround risk at Series D. Maintaining growth momentum is the primary financial covenant of the current capital
      structure.
    claimRefs:
      - CI019
      - CI020
      - CI022
  - calloutType: recommendation
    title: Request Gross Margin, NRR, CAC, and Burn Rate Before Any Investment Decision
    body: >-
      Five metrics are critical for financial underwriting and unavailable publicly: gross margin, net revenue
      retention, customer acquisition cost, monthly burn rate, and revenue concentration by customer. These must be
      obtained through a formal data-room process before any investment commitment can be responsibly modeled.
    claimRefs:
      - CI030
      - CI031
      - CI032
      - CI033
      - CI034
