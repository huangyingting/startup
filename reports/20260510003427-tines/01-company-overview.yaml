company:
  name: Tines

chapter:
  number: 1
  title: "Company Overview"
  summary: >-
    Tines is a Dublin-founded, no-code workflow automation company built originally for security operations teams that
    has since expanded into a general enterprise automation platform. After closing a $125M Series C at a $1.125B
    valuation in February 2025, the company has achieved unicorn status with approximately $85M ARR, ~33,000 users,
    and a partner ecosystem spanning CrowdStrike, Goldman Sachs Growth Equity, and SoftBank Vision Fund 2.

