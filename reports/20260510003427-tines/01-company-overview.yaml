      no values are estimated or interpolated by this analyst.

sections:
  - id: identity-and-mission
    title: "Identity, Mission, and Operating Model"
    body: |
      Tines is a workflow automation platform founded in Dublin, Ireland in 2018 by Eoin Hinchy (CEO) and Thomas
      Kinsella (COO and Chief Customer Officer). The company's original mission was to eliminate the repetitive,
      manual work that overwhelmed security operations teams — a problem both founders encountered first-hand during
      their tenures at Deloitte, eBay's European Security division, and DocuSign, where Hinchy served as Senior
      Director of Security Operations. The eBay data breach of 2014, which exposed 145 million user records, served
      as the direct catalyst for Hinchy's decision to build Tines: he wanted a platform that would let security
      engineers automate complex multi-step workflows without requiring them to write production code.

      The platform delivers on this promise through a visual drag-and-drop workflow builder called "stories," which
      allows practitioners to connect actions, conditions, and integrations into automated pipelines. Tines has
      grown from a security-focused tool into a broader enterprise automation platform, now serving teams across IT
      operations, legal, HR, and business process automation. As of 2025, the platform hosts more than 700
      pre-built integrations and a library of tools, while its AI Agent capabilities, launched in mid-2025, extend
      the platform into autonomous decision-making and task execution. Tines characterizes its commercial model as
      delivering automation at enterprise scale without requiring traditional SOAR complexity or expensive professional
      services engagements. The company operates from dual headquarters in Dublin (European HQ) and New York (US
      operations), and is certified SOC 2 Type II and ISO 27001.
    claimRefs: [CO001, CO002, CO003, CO004, CO006, CO007, CO008, CO032, CO034, CO036, CO037]

  - id: founders-and-leadership
    title: "Founders, Leadership, and Key-Person Dependence"
    body: |
      Tines was co-founded by Eoin Hinchy and Thomas Kinsella, both of whom built their careers in enterprise
      security operations at large organizations. Before founding Tines, Hinchy served as Senior Director of Security
      Operations at DocuSign and prior to that held security leadership roles at eBay's European division and
      Deloitte. Kinsella followed a parallel path through the same organizations. This shared institutional background
      in high-stakes security operations gave the founders direct insight into the pain points they sought to address:
      alert fatigue, manual triage, and the inability to respond to threats at machine speed without heavy engineering
      resources.

      Hinchy serves as CEO and is the primary public face of the company, representing Tines in fundraising
      communications, press engagements, and industry events. Kinsella serves as COO and Chief Customer Officer,
      taking responsibility for post-sale relationships and customer expansion revenue. The dual-founder structure with
      clearly delineated domains reduces single-point-of-failure risk compared with single-founder companies, though
      Hinchy's prominence in capital markets and strategic narratives means the CEO role still represents an elevated
      key-person dependency. Investors including Goldman Sachs Growth Equity and Accel have backed the leadership team
      through multiple rounds, suggesting sustained conviction in execution quality. Formal board governance details —
      exact composition, independent directors, and investor seat assignments — are not yet in the public record and
      represent a diligence gap for investors seeking full governance visibility.
    claimRefs: [CO002, CO003, CO005, CO036, CO037]

  - id: funding-and-investors
    title: "Funding History, Valuation, and Investor Base"
    body: |
      Tines has raised approximately $272 million in total venture financing across five distinct tranches. The
      company's funding history began with a seed round in 2018 and progressed through a Series A of approximately
      $16 million (2019-2020, led by Accel), a Series B of $55 million in 2021 (led by Addition and Felicis
      Ventures), a $50 million Series B extension in May 2024, and a landmark Series C of $125 million closed on
      February 11, 2025. The Series C was led by Goldman Sachs Growth Equity and introduced SoftBank Vision Fund 2
      and Activant as new investors, while Accel, Felicis, CrowdStrike Falcon Fund, and Addition continued their
      participation.

      The Series C valued Tines at $1.125 billion post-money, making it Ireland's newest unicorn and placing it
      among the cohort of more than 10 European startups that achieved unicorn status in 2025. Goldman Sachs Growth
      Equity characterized Tines as a next-generation security automation platform in its press materials, framing
      the investment as consistent with its broader enterprise software thesis. The CrowdStrike Falcon Fund's
      continued involvement is notable from a strategic perspective: it signals alignment with a leading endpoint
      security vendor whose customers frequently need orchestration and automation capabilities that Tines can supply.
      Total funding of approximately $272 million across all rounds represents a material capital base for a company
      of Tines' stage, providing runway to invest in AI product capabilities, go-to-market expansion, and international
      hiring.
    claimRefs: [CO012, CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO020, CO029, CO030, CO041]

  - id: key-metrics-and-scale
    title: "Key Metrics, Customers, and Scale Indicators"
    body: |
      By 2025, Tines had assembled a set of publicly disclosed metrics that indicate substantial scale for a
      company at its funding stage. The platform executes more than one billion automated actions per week, a figure
      the company uses as a headline metric to communicate real-world deployment breadth. Annual recurring revenue
      was estimated at approximately $85 million as of 2025 by third-party analyst databases, representing a
      significant acceleration from the $13.4 million ARR reported for 2024. The company serves approximately 33,000
      users or organizations, with named customers including Coinbase, Intercom, Mars, HubSpot, Canva, Databricks,
      Reddit, GitLab, and Elastic.

      Headcount stood at approximately 500 to 562 employees as of 2025-2026, distributed across Dublin, New York,
      Boston, and remote locations. Product quality signals are strongly positive: Tines holds a G2 rating of 4.7
      out of 5 from 397 user reviews and a Gartner Peer Insights rating of 4.9 out of 5 from 54 reviews. However,
      some reviewers on PeerSpot have noted limitations in out-of-the-box reporting and analytics depth, and a
      subset of G2 reviewers indicate that non-technical users face a learning curve when building complex workflows
      without developer support. Pricing spans a free Community edition, a Starter tier at approximately $500 per
      month, Business pricing on a custom basis, and Enterprise deals typically beginning at $50,000 per year.
    claimRefs: [CO009, CO010, CO011, CO021, CO022, CO024, CO025, CO026, CO031, CO038, CO039]

  - id: milestones-and-product-evolution
    title: "Milestones, Product Trajectory, and Partner Ecosystem"
    body: |
      Tines' journey from a Dublin-based security automation startup to a billion-dollar automation platform
      spans eight years of product development, fundraising, and ecosystem building. The company launched its
      Community Edition to make the platform accessible to individual practitioners and smaller teams without
      enterprise procurement cycles, a move that helped drive grass-roots adoption and word-of-mouth growth within
      security communities. The launch of AI Agents in 2025 marked a qualitative shift in the platform's capability
      profile: rather than simply orchestrating pre-defined workflows, Tines Agents can reason, decide, and act
      autonomously within guardrails set by the practitioner. Help Net Security covered the Agents launch in June
      2025, framing it as part of a broader industry transition from rule-based orchestration to AI-driven
      autonomous operations.

      The partner ecosystem has become an increasingly important part of Tines' growth strategy. The company
      expanded its partner program by 25 percent in 2026, adding 75 new technology partners to an existing roster
      that includes CrowdStrike, Elastic, AWS, 1Password, HashiCorp, and IBM. This ecosystem breadth is significant
      because integrations are a key competitive moat in the automation market: customers are more likely to deepen
      their commitment to a platform that connects seamlessly to their existing tool stack. The Agents capability
      combined with a widening integration library positions Tines to compete not just as a SOAR replacement but as
      a general enterprise automation layer. The platform's library approach, surfacing pre-built automation recipes,
      further lowers the barrier to adoption for new users and accelerates time-to-value for enterprise buyers.
    claimRefs: [CO023, CO027, CO028, CO033, CO035, CO040, CO042, CO043]

