callouts:
  - calloutType: strength
    title: "Founder-Market Fit and Lived-Experience Insight"
    body: >-
      Both founders operated in high-stakes enterprise security roles at Deloitte, eBay, and DocuSign before
      building Tines. Hinchy's personal experience of the 2014 eBay breach (145M users exposed) gives the founding
      story unusual authenticity and provides a credible anchor for the company's product philosophy.
    claimRefs: [CO003, CO004]

  - calloutType: strength
    title: "Tier-1 Investor Syndicate and Unicorn Validation"
    body: >-
      The Series C syndicate — Goldman Sachs Growth Equity, SoftBank Vision Fund 2, Accel, Felicis, and the
      CrowdStrike Falcon Fund — represents a combination of financial credibility, strategic alignment, and
      distribution potential that most Series C companies do not achieve simultaneously.
    claimRefs: [CO013, CO014, CO015]

  - calloutType: risk
    title: "Key-Person Concentration in CEO Role"
    body: >-
      Eoin Hinchy is the primary external face of Tines in capital markets and press communications. The company
      does not publicly disclose a detailed leadership bench below the co-founder level, making it difficult to
      assess succession readiness or depth of executive talent. This is a standard but material diligence item
      at Series C.
    claimRefs: [CO002, CO005]

  - calloutType: insight
    title: "Private Financials — ARR and Margin Not Directly Verifiable"
    body: >-
      ARR of approximately $85M is sourced from third-party analyst databases and has not been confirmed by the
      company in official press materials. Gross margin, burn rate, and cash position are not publicly available,
      which is standard for private companies but limits financial underwriting confidence without a formal
      data-room engagement.
    claimRefs: [CO021, CO016]

