callouts:
- calloutType: strength
  title: Platform Scale Validates Enterprise Readiness
  body: 'The 1-billion-actions-per-week figure, combined with SOC 2 Type II certification and a 4.9/5 Gartner Peer Insights
    rating, confirms that Tines has crossed the enterprise maturity threshold. This scale reduces the technical risk for a
    prospective investor: the platform has proven it can handle production workloads at enterprise volumes without the reliability
    concerns typical of earlier-stage SaaS.'
  claimRefs:
  - CE003
  - CE010
  - CE011
  - CE026
- calloutType: risk
  title: No-code Constraint Limits Power-User Extensibility
  body: PeerSpot and G2 reviewers note that Tines' no-code paradigm, while a strength for rapid adoption, constrains advanced
    customization relative to low-code competitors that permit scripted overrides. Enterprise customers with complex, bespoke
    automation requirements may find the platform's guardrails limiting and may require additional workarounds via HTTP action
    chaining — increasing implementation complexity for edge cases.
  claimRefs:
  - CE027
  - CE029
  - CE036
- calloutType: insight
  title: AI Agents Extend TAM Beyond the SOAR Market
  body: The June 2025 Agents launch signals Tines' intent to position itself as an AI-native enterprise automation platform,
    not just a SOAR replacement. If Agents prove reliable in production, they expand the addressable market from the $1.87B
    SOAR segment to the multi-billion-dollar enterprise AI automation space. The Anthropic customer reference provides early
    validation from an AI-native organization.
  claimRefs:
  - CE007
  - CE008
  - CE022
  - CE035
