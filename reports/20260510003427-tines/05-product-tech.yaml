chapter:
  number: 5
  title: Product & Technology
  summary: Tines delivers a no-code, cloud-native workflow automation platform built around a visual "stories" paradigm that
    lets security and enterprise operations teams automate complex, multi-step processes without writing production code.
    The June 2025 launch of AI Agents marks a significant architectural shift toward autonomous execution, while a 700-plus
    integration library, SOC 2 Type II and ISO 27001 certifications, and greater-than-one-billion weekly automated actions
    confirm platform maturity and enterprise readiness.
acknowledgedWarnings:
- dimension: tableNotes
  reason: Pure factual snapshot tables in this chapter draw directly from official Tines documentation, press releases, and
    third-party reviews; no values are estimated or analyst-interpolated by this author.
sections:
- id: sec-e-1
  title: Platform Architecture and Core Mechanics
  body: 'Tines is built around a central abstraction called a "story" — a visual workflow that chains together

    individual actions (HTTP requests, transformations, lookups, send-email, etc.) via a drag-and-drop canvas.

    Each story has one or more triggers (webhook, schedule, manual) that initiate execution, and the workflow

    engine evaluates conditional logic, loops, and Liquid-template-based transformations as the story runs.

    The platform is entirely cloud-native, deployed as a multi-tenant SaaS hosted on AWS infrastructure, with

    optional data-residency configurations for regulated enterprise customers who require their data to remain

    in a specific geographic region.


    The workflow engine separates the user-facing story builder (React-based web UI) from the execution runtime,

    allowing horizontal scaling of workflow processing independent of the authoring layer. Actions are the

    atomic unit of composition: out-of-the-box action types include HTTP request, send-to-story, delay,

    trigger-story, event transform, date filter, and group actions. The HTTP request action is the primary

    extensibility mechanism, enabling connection to any REST API endpoint in the market without requiring

    Tines to publish a first-party integration. This architectural choice reduces Tines'' dependency on its

    own integration roadmap and allows customers to connect internal tools and bespoke services immediately.


    Performance metrics indicate substantial scale: the platform executes more than one billion automated

    actions per week as of 2025, a company-disclosed figure that serves as an indirect proxy for aggregate

    customer deployment breadth. Stories can be exported from the Tines Library — a curated collection of

    pre-built automation recipes — and imported into any tenant, enabling rapid time-to-value for common

    security and IT use cases. The library model also creates network effects: as more customers contribute

    templates, the library grows in value for new adopters.

    '
