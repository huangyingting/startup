companyProfile:
  summary: >-
    Tines is a Dublin-headquartered workflow automation company founded in 2018 by
    Eoin Hinchy (CEO) and Thomas Kinsella (COO/CCO), both veterans of eBay's European
    Security division and DocuSign. The platform enables security and enterprise teams
    to build complex multi-step automations — called "stories" — through a visual
    drag-and-drop interface with no coding required. With 700+ integrations, AI Agent
    capabilities launched in 2025, and more than 1 billion automated actions executed
    weekly, Tines has evolved from a security-focused SOAR alternative into a broad
    enterprise automation platform. After closing a $125M Series C led by Goldman Sachs
    Growth Equity in February 2025 at a $1.125B valuation, Tines entered unicorn status
    with approximately $85M ARR and 33,000 users. The company competes against Palo Alto
    Cortex XSOAR, Splunk SOAR, Swimlane, and Torq in the SOAR segment and against
    broader workflow platforms in the enterprise automation market.
  foundedDate: "2018-01-01"
  founders:
    - name: "Eoin Hinchy"
      role: "CEO & Co-Founder"
      background: "Former Senior Director of Security Operations at DocuSign; prior security leadership roles at eBay (European division) and Deloitte."
      claimRefs: [CO002]
    - name: "Thomas Kinsella"
      role: "COO & Chief Customer Officer"
      background: "Parallel career path through Deloitte, eBay European Security, and DocuSign alongside co-founder Eoin Hinchy."
      claimRefs: [CO003]
  foundingLocation: "Dublin, Ireland"
  headquarters: "Dublin, Ireland (European HQ); New York, USA (US HQ)"
  productSummary: >-
    No-code/low-code workflow automation platform ("stories") with visual drag-and-drop
    builder, 700+ integrations, AI Agents for autonomous task execution, and an enterprise
    pricing tier starting at $50K/yr. The platform processes over 1 billion automated
    actions per week.
  customerFocus: >-
    Security operations teams (SOC, IR, threat intelligence), IT operations, and
    enterprise teams in technology, financial services, and regulated industries.
    Key named customers include Mars, Intercom, Canva, GitLab, Elastic, Databricks,
    Coinbase, HubSpot, and Reddit.
  businessModel: >-
    SaaS subscription with tiered pricing: Community (free), Starter (~$500/mo),
    Business (custom), Enterprise ($50K+/yr). Revenue derived from annual recurring
    subscriptions; no per-action pricing at upper tiers.
  stage: "Series C (Unicorn)"
  fundingStatus: >-
    $125M Series C closed February 2025, led by Goldman Sachs Growth Equity with
    participation from SoftBank Vision Fund 2 and Activant (new investors) and existing
    investors Accel, Felicis, CrowdStrike Falcon Fund, and Addition. Total lifetime
    funding approximately $272M.
  disclosureProfile: private-disclosed
