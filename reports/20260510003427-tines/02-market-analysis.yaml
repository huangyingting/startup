chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The SOAR and security workflow automation market in which Tines competes was valued at approximately $1.87 billion
    in 2025 and is projected to grow at a compound annual rate of roughly 18 percent to exceed $4.4 billion by 2030.
    Tines occupies the modern, no-code tier of this market, targeting CISO-budget security operations teams before
    expanding into IT, legal, and business-process automation. Multiple market sizing methodologies converge on a
    fast-growing total addressable market, though exact SAM/SOM breakdowns require buyer-level segmentation not yet
    available in public sources.
