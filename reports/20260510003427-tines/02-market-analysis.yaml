callouts:
  - calloutType: strength
    title: Structural Demand Tailwind from Alert Volume Growth
    body: >-
      Rising alert volumes, SOC analyst burnout, and regulatory incident-disclosure requirements create a durable
      structural demand for security automation that is unlikely to reverse within a 5-year investment horizon. Tines is
      positioned at the intersection of these drivers with a no-code platform that expands the addressable buyer pool
      beyond specialist SOAR engineers.
    claimRefs:
      - CM019
      - CM020
      - CM021
  - calloutType: risk
    title: Incumbent Switching Costs Limit Displacement Velocity
    body: >-
      Organizations already running Palo Alto Cortex XSOAR or Splunk SOAR have existing playbooks in proprietary
      scripting languages and trained analyst teams. This creates meaningful switching costs that slow competitive
      displacement and may compress Tines' win rates in renewal cycles against incumbents.
    claimRefs:
      - CM024
      - CM025
  - calloutType: insight
    title: Market Definition Risk — SOAR vs. Broader Enterprise Automation
    body: >-
      The market boundary between SOAR and general enterprise automation is blurring as Tines expands its customer base
      beyond security. This definitional ambiguity makes top-down TAM estimates unreliable for valuation purposes and
      requires Tines to demonstrate SOM growth through actual ARR trajectory rather than market penetration ratios.
    claimRefs:
      - CM026
      - CM027
      - CM028
  - calloutType: recommendation
    title: Prioritize SAM and SOM Evidence Collection in Due Diligence
    body: >-
      No published source provides a no-code SOAR sub-segment TAM. Due diligence should prioritize collecting Tines'
      win/loss rate, average contract value by buyer segment, and expansion ARR data from the company, then use those
      inputs to construct a bottom-up SAM that is internally consistent with the observed ARR trajectory.
    claimRefs:
      - CM029
      - CM030
