      - number: '5.3'
        title: 差异化、IP 与质量控制
        blocks:
          - type: paragraph
            body: >-
              Turntide 的产品差异化依托三点：纵向一体化的电机 + 逆变器 + 电池栈；轴向磁通拓扑在空间受限应用中的功率密度优势；以及公司覆盖质量、环境、信息安全和安全管理体系的 BSI/UKAS ISO
              认证。公司在 About 页面称，已通过国际认可 ISO 标准认证，并获得 BSI/UKAS 认可；这对 OEM 资格认证是可信的流程质量信号。


              但 IP 护城河存在重要问题。专利组合规模、司法辖区覆盖和授权状态均未公开披露。轴向磁通电机拓扑本身属于可追溯至 1830s 的既有技术，YASA（现属 Mercedes-Benz）也持有重要竞争专利组合。公司的
              SRM 知识产权可能支撑、也可能不支撑当前轴向磁通产品；没有技术披露说明两条技术路线是否共享 IP，还是分别来自不同收购流的不同平台。路线图方面，2026 年 4
              月产品扩展公告称，公司扩展了轴向磁通产品组合，目标是混合动力和电动重型平台；技术导览文章展示了与 OEM 传动系统的集成能力。公司没有发布带日期、里程碑或研发阶段门槛的公开路线图。信任与质量控制由 ISO
              认证释放信号，但除公司网站上的 BSI/UKAS 认可主张外，已审阅来源没有独立审计。
