      - number: '7.2'
        title: 运营、供应链与制造风险
        blocks:
          - type: paragraph
            body: >-
              Turntide 的运营风险由三类结构性敞口决定。第一，轴向磁通电机很可能需要稀土永磁体（钕铁硼），供应链因此依赖一种供给集中、且地缘政治敏感的投入品。根据 Wikipedia
              关于稀土元素的条目，中国控制全球稀土开采约 60–70%，加工环节占比更高。价格波动和出口管制可能实质性推高 Turntide 的 BOM 成本并压缩毛利。


              第二，Gen 6 逆变器使用碳化硅（SiC）功率半导体，供应商集中在 Wolfspeed、STMicro、Infineon 等少数公司。近几年 SiC 晶圆供应偏紧；如果 Turntide 依赖单一 SiC
              供应商，就存在单一来源风险。第三，制造集中在从 BorgWarner 收购的英国 Gateshead 工厂。单一工厂会影响客户交付，使公司暴露于英国人工成本、脱欧后 EU
              客户贸易摩擦，以及低利用率时反向放大固定成本。ISO 认证（BSI/UKAS 认可）能证明流程质量，但缓解不了实物产能或供应链集中的风险。当前产品的质量和可靠性测试数据没有公开——这一缺口放大了运营风险，因为
              OEM 客户一旦出现产品故障，作为初创供应商，Turntide 要承担不成比例的声誉和合同后果。
