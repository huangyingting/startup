            body: >-
              SRM 与轴向磁通电机是根本不同的拓扑。SRM 无稀土、电磁结构简单；轴向磁通电机使用永磁体，定子-转子几何也不同。Turntide 原有 SRM IP
              组合是否仍与当前产品有关尚未验证——轴向磁通能力可能主要来自 2021 年英国收购。
