      - number: '5.2'
        title: 架构、技术栈与运营模式
        blocks:
          - type: paragraph
            body: >-
              Turntide 的技术架构把三层硬件——电机、电力电子和储能——整合成一个系统，OEM 可以打包采购，也可以单独采购组件。轴向磁通电机拓扑与公司早期产品线所定义的开关磁阻电机（SRM）有根本差异。SRM
              依靠电磁磁阻工作，不使用永磁体，因此不依赖稀土——这是 2021 年 Reuters
              报道强调的供应链优势。相比之下，轴向磁通电机通常使用永磁体（常见为钕铁硼），这带来稀土供应链依赖；公司尚未就当前产品线公开回应这一点。


              制造运营模式以 2021 年从 BorgWarner 收购的英国 Gateshead 设施为中心，并由 Pune 印度办公室和 Atlanta 旧有运营提供工程支持。Wikipedia
              关于轴向磁通电机的文章称，这种拓扑可追溯至 1830s，现代商业应用包括 EV、航空航天和船舶——这说明 Turntide 选择的是成熟拓扑，而非新发明。NREL 2019 年技术报告评估的是早期 SRM
              产品，发现冰箱冷凝器风机节能 29–71%；但这一验证不能转移到轴向磁通产品上。Gen 6 逆变器按产品页采用碳化硅（SiC）功率半导体，相比硅 IGBT 具备更高效率和热性能——这是高端 EV
              牵引逆变器的行业标准设计选择，但会增加组件成本。
