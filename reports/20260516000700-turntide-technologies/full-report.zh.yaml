  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >-
              Turntide 当前产品覆盖三类互补硬件，面向 OEM 电气化项目。第一类是旗舰产品轴向磁通电机，Turntide 产品页列出的功率范围为 5 kW 到 450
              kW。这类电机采用轴向磁通拓扑——磁通平行于电机轴穿过，而非径向穿过——相比传统径向磁通设计，功率密度更高、轴向长度更短，对船舶机舱、紧凑型非公路设备等空间受限平台有利。Turntide
              新闻页和技术导览文章将轴向磁通电机描述为公司 OEM 电气化合作关系的核心。


              第二类是 Gen 6 电力电子产品线；根据电力电子产品页，包含高压牵引逆变器、低压电机控制器和 DC/DC 转换器。它们面向电气化平台中的牵引、发电和辅助功能。第三类是 Gen 5 锂离子 NMC 电池模块，额定
              44V、4.5 kWh；根据储能产品页，目标是严苛的建筑、农业和船舶应用。公司称该电池相较上一代能量提升 15%，密度也改善。客户工作流中，希望电气化某个平台的 OEM 会与 Turntide
              就电机选择和尺寸匹配、逆变器规格以及可选电池集成展开合作，随后进行资格测试，并由英国 Gateshead 制造设施进入批量生产。
