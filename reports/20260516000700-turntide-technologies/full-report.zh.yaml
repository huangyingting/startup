  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 财务与模式风险
        blocks:
          - type: paragraph
            body: >-
              Turntide 最严重的风险类别是财务不透明。公司没有披露任何定量财务指标——没有收入、ARR、毛利率、EBITDA、烧钱速度、现金头寸或员工数。对一家 2021 年以 $2.8B 估值融资 $600M+
              的公司，这种不披露即便在成长阶段私营公司中也不典型，并构成财务投资判断的硬性阻碍。Bloomberg 报道的 2024 年裁员与保现金压力一致；2021 年后没有任何融资轮，则带来重大降估值融资风险。


              对一家在英国设施内自制电机、逆变器和电池，并拥有多地工程运营的公司，资本强度天然偏高。四笔 2021 年收购增加了持续运营成本，但金额未知。如果 $600M+ 融资在扣除收购支出、CAPEX
              和经营亏损后的余额不足 18 个月现金跑道，公司将在不利的气候科技融资环境中面临被迫融资事件——CB Insights 报告称，气候科技创业公司融资已较 2021–2022
              年高点下降。营运资本风险包括稀土磁体、SiC 晶圆和锂离子电芯的原材料库存，以及 60–90 天 OEM 应收账款周期。这些科目没有一项得到公开确认。
