      - number: '3.2'
        title: 能力、定价与分销对比
        blocks:
          - type: paragraph
            body: >-
              对竞争集合做直接功能对比，会受到 Turntide 公开披露有限的约束：公司没有披露定价、已发布 5–450 kW 电机范围之外的功率等级，也没有披露量产状态。Turntide 产品页描述了轴向磁通电机、Gen
              6 电力逆变器和 Gen 5 电池，但没有发布标价、最低订单量或交期。相比之下，ABB、Siemens 和 Regal Rexnord 通过授权经销商发布标准电机框架的目录定价，Nidec 和 WEG
              也维护广泛的在线配置器。


              技术差异化上，Turntide 的轴向磁通拓扑比径向磁通替代方案提供更高功率密度和更短轴向长度，对空间受限的 OEM
              平台（船舶机舱、紧凑型非公路施工设备）有价值。公司早期的开关磁阻电机（SMS）具备无稀土运行能力——这是 2021 年 Reuters
              报道强调的供应链优势——但当前轴向磁通产品页没有明确重复无稀土主张，而轴向磁通电机通常使用永磁体。分销是偏向既有厂商的重大差异：ABB 通过 100 多个国家组织运营；Siemens
              拥有相近的全球足迹；Regal Rexnord 通过数千家运动控制伙伴分销。基于已审阅来源，Turntide 的分销模式是直接 OEM 合作，而不是广泛目录分销；这限制了市场触达，但若赢下客户，可能加深集成黏性。
