      - number: '4.2'
        title: 单位经济、成本结构与利润率驱动因素
        blocks:
          - type: paragraph
            body: >-
              公开证据中，Turntide 的单位经济完全不透明。公司没有披露毛利率、COGS
              拆分、贡献利润率或单台盈利指标。对一家制造电机、逆变器和电池的硬件组件公司，主要成本驱动通常包括原材料（电工钢、铜、轴向磁通所需稀土磁体、锂离子电芯）、制造人工、工装摊销、质量 /
              测试和物流。基于已审阅来源，2021 年从 BorgWarner 收购来的英国 Gateshead 制造设施是主要生产基地。


              可比上市公司的毛利率只能提供粗略基准。Regal Rexnord 报告 FY2024 其运动控制和电机组合毛利率约 36%。Nidec 电机业务经营利润率约为 8–10%。这些是成熟规模下的数字；Turntide
              这样的创业公司很可能处于更低产能利用率、更高单台成本。任何自制电机、逆变器和电池的公司资本强度都偏高——2021 年收购（BorgWarner
              Gateshead、Hyperdrive、AVID）带来实体厂房、设备和员工义务，既能形成固定成本杠杆，也会在产量偏低时带来烧钱风险。硬件公司的营运资本需求包括原材料库存、在制品和成品持有成本，以及 OEM
              供应链常见的应收账款周期（60–90 天）。这些科目没有一项得到 Turntide 公开确认。
