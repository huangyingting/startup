  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争图谱与分类
        blocks:
          - type: paragraph
            body: >-
              Turntide 当前产品组合的竞争图谱至少跨四类。第一类是全球工业电机既有巨头——ABB、Siemens、Nidec、Regal Rexnord、WEG 和 Eaton——它们合计控制 Allied
              Market Research、MarketsandMarkets 和 Precedence Research 在 2024–2025 年规模测算报告中引用的 $160–200 billion
              全球电动机市场绝大部分。这些既有厂商在 NEMA 和 IEC 框架下制造感应电机、永磁电机以及越来越多的高端能效电机，并拥有深厚分销网络、现场服务组织和与 OEM 的规格导入关系；Turntide
              在同等规模上不具备这些能力。仅 ABB 2024 年集团收入就为 CHF 32.0 billion；Nidec 报告 JPY 2.35 trillion；Regal Rexnord 报告 USD 6.3
              billion。这些并不是直接产品线对比——每个集团卖的都远不止电机——但足以说明 Turntide 面临的资本和渠道不对称。


              第二类是轴向磁通电机专业公司，这是最直接的竞争集合。YASA 是最显眼的一家，2021 年被 Mercedes-Benz 收购，已将其轴向磁通技术整合进 Mercedes 的 AMG.EA 高端 EV
              平台。BorgWarner 在 2021 年将 Gateshead 传动部门出售给 Turntide，但保留自己的 eDrive 产品组合，并继续投资电气化。更小的进入者包括
              Magnax（Belgium）、Linear Labs（Texas），以及若干中国电机创业公司；本报告审阅的来源没有逐一跟踪这些中国公司，但它们出现在 MarketsandMarkets 和 Allied
              的竞争格局章节中。


              第三类是现状方案——带变频驱动（VFD）的传统 AC 感应电机——仍是主导性装机基础，也是多数 OEM 采购团队评估 Turntide 产品时的实际替代方案。第四类是大型 OEM（如 John
              Deere、Caterpillar、Volvo Trucks）内部自研，这是一条可信的替代路径，可完全绕开第三方组件供应商。
