          - type: callout
            title: SAM/SOM 与 2021 年估值之间存在缺口
            body: 即便采用慷慨假设，Turntide 近期 SOM 看起来也只是每年低数亿美元。要把这个水平与 2021 年被引用的 ~$2.8B 估值对齐，要么需要快速夺取市场份额，要么需要公司尚未披露的另一块收入池。
            calloutType: risk
            claimRefs:
