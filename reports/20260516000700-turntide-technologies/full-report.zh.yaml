chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品与商业模式
        blocks:
          - type: paragraph
            body: >-
              Turntide Technologies 将自己定位为「一切会动的东西」提供端到端电气化组件的供应商，制造轴向磁通电机、电力电子（逆变器和 DC/DC 转换器）以及锂离子储能模块。当前 Turntide.com
              首页和 About 页面称，公司设计并制造「突破性电动机、电力电子和储能解决方案」，目标行业覆盖农业、建筑与采矿、商用和高端汽车、船舶、铁路、休闲和工业设备。公司 2020–2022
              年的身份与此明显不同：当时最知名的是 Smart Motor System（SMS）——一种开关磁阻电机与 IoT 控制器，主要面向商业楼宇，替换 HVAC 风机和泵电机，宣称节能 30–64%。

              现在的商业模式是向重型、非公路和高端移动出行领域的 OEM 销售硬件组件，并辅以服务（工程、集成）以及 Industries 页面上的「电气化合作伙伴」叙事。SMC/Turntide-1.0 时代的楼宇能源订阅
              / IoT 主题，已不再是公司主要营销界面的重点。2021 年的多笔收购——BorgWarner 的 Gateshead 传动部门、电池制造商 Hyperdrive、EV 控制公司 AVID
              Technology、楼宇自动化公司 Riptide——在公司披露最大一轮融资的同一年重塑了产品组合。Turntide 的英文 Wikipedia 词条现在称其为总部位于 Gateshead
              的「英国创业公司」，而 About 页面列出 Gateshead、Atlanta、Waterloo（Ontario）和 Pune 等地点。
