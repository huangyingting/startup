      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >-
              Turntide 的创始 CEO 是 Ryan Morris，他带领公司完成 2020 年 7 月更名、2020 年 9 月 Amazon Climate Pledge Fund 轮、2021 年 2 月由
              Fidelity Management & Research 领投且 Breakthrough Energy Ventures 参与的 Series B，以及 2021 年末以三笔英国收购告终的 EV
              扩张战略。2021 年期间，Morris 是主要公开发言人，曾在 TechCrunch、CNBC、CNN 和 Bloomberg 就公司战略和资本计划发声。截至当前 Turntide.com 网站以及
              2025–2026 年新闻稿，公司面向公众的领导者是 Steve Hornyak；主页嵌入的 Climate Week 访谈称其为「Turntide 总裁兼
              CEO」。这次领导层交接没有伴随可在已审阅来源中找到的新闻稿，本身就是一个治理信号。

              CEO 之外，公开治理披露有限。Turntide 是私营公司，没有 SEC 文件；对「turntide」进行 EDGAR 全文搜索，没有返回 10-K、10-Q 或
              S-1。已审阅来源没有列出董事会、完整高管团队，或审计与薪酬委员会结构。可能拥有董事会影响力的战略投资方包括 Breakthrough Energy Ventures、Amazon 的 Climate
              Pledge Fund、BMW i Ventures 和 Fifth Wall，它们都出现在公司「投资方」栏目。Turntide 获得 BSI/UKAS 多项 ISO
              标准认证（公司网站称覆盖质量、环境、信息安全），这是流程治理信号，但尽调时不能替代股权结构表或董事会披露。
