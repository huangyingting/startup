      - number: '7.4'
        title: 人员、执行与投资逻辑破裂风险
        blocks:
          - type: paragraph
            body: >-
              关键人依赖度高。Steve Hornyak 是唯一面向公众的高管；创始 CEO Ryan Morris 的领导层交接没有配套公开新闻稿。公司网站没有披露完整高管名单，也没有披露 CTO、CFO 或 VP
              级领导。公司运营横跨 Gateshead、Atlanta、Waterloo 和 Pune 多地；领导层不透明让外部无法评估执行风险。


              Turntide 的投资逻辑破裂触发点很清楚：(1) 如果剩余现金只能支撑不到 12 个月、且融资并不迫近，公司将面临生存风险；(2) 如果无法确认任何量产规模 OEM
              客户，轴向磁通电机在目标细分市场的产品市场匹配仍未被验证；(3) 如果 $2.8B 的 2021
              年估值已被领投方正式减记，任何按该估值进入的新投资都会受损。当前公开证据无法解决这些触发点，必须进入尽调资料室。缓释因素包括强大的投资方阵容（Breakthrough
              Energy、Amazon、Fidelity）、垂直整合产品栈，以及 SRM 时代真实的技术验证——但这些都不能缓解主导风险清单的财务不透明和客户证据缺失。
