      - number: '8.3'
        title: 情景分析与建议
        blocks:
          - type: paragraph
            body: >-
              我们为 Turntide 的 2028E 股权价值构建乐观、基准和悲观情景。乐观情景假设到 2028 年确认 $150M+ 年化收入、毛利率转正、以 $1.5B+ 投后估值成功完成 Series C
              轮，且至少有两个具名 OEM 量产客户——按 10–15× 收入或 3–4× EV/revenue，对应股权价值 $1.5–2.5B。概率：10–15%。基准情景假设收入 $30–80M，以 $500M–$1B
              投后估值完成过桥融资，HVAC/SMS 遗留收入延续但轴向磁通牵引有限——对应 $500M–$1B 股权价值。概率：30–40%。悲观情景假设收入低于 $20M、以低于 $500M
              的估值进行困境重组，Gateshead 工厂和 IP 组合可能被资产出售——对应 $100–400M。概率：40–50%。


              各情景的概率加权期望值约为 $450–750M，较 $2.8B 的 2021 年标记折价 70–85%。建议是在遗留估值下放弃。重新接触标准包括：(1) 尽调资料室确认年化收入 ≥$50M 且毛利率为正，(2)
              至少一个具名量产 OEM 客户并签有多年供货协议，(3) 确认现金跑道 ≥18 个月，(4) 股权结构表干净，既有轮次没有惩罚性清算优先权。
