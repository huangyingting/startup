      - number: '2.2'
        title: 规模测算视角与 TAM/SAM/SOM
        blocks:
          - type: paragraph
            body: >-
              没有一个单一 TAM 数字能干净概括 Turntide 的机会，因此我们用三种视角交叉校验。视角 1（最宽）：全球电动机 TAM 在 2024–2025 年约为 USD 175–230 billion，CAGR
              约 ~6–7%（Allied Market Research、Grand View Research、Fortune Business Insights）。视角 2（中间）：NEMA Premium /
              IE4–IE5 能效等级以上的电机及其控制器和驱动，Turntide 的 SMS 位于这一层。公开的高效率电机规模测算更少且不够一致；IEA 的能效框架认为，全球用电需求的 >40% 来自电机驱动系统，美国
              DOE 也估计更高效电机和驱动还有显著节能空间。我们将高效率溢价细分市场视为到 2030 年约占更广义电机 TAM 的 15–25%。视角 3（最接近今天的 Turntide）：面向重型 /
              高端移动出行的轴向磁通电机，这是一个新兴小众市场，没有单一权威规模，但多份分析师报告将其放在低个位数十亿美元量级，并在小基数上快速增长（到 2030 年 CAGR 20%+）。

              SAM 更难钉准，因为 Turntide 面向 OEM 而非终端用户销售，OEM 设计定点又高度依赖关系。我们估算 Turntide 可触达的 SAM 取决于两个函数：（a）美国 / 英国 / 欧盟商业 HVAC
              改造电机支出；（b）重型移动出行和高端汽车中，轴向磁通在热管理 / 封装上有意义的电机采购。考虑硬件组件定价和已知单位量，满产爬坡后 SOM 合理范围可能是每年低到中数亿美元——远低于 2021 年 $2.8B
              估值按典型收入倍数暗示的水平。
