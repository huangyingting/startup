  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              Turntide 的客户基础可分为两个时期。早期时期（2018–2022）通过 Smart Motor System 服务商业楼宇运营方；这是一个开关磁阻电机和 IoT 控制器，按节能 ROI
              销售。该时期有名客户包括 Frasers Group；根据 Frasers Group 公司网站，该公司在英国零售资产组合中部署了 SMS 单元做 HVAC 改造。CBRE 和 JLL
              都是大型商业地产服务公司，通过各自风投机构（Fifth Wall 和 JLL Spark 投资 Turntide）被称为战略合作伙伴，但没有公开披露归属于任一公司的具体部署量或收入数字。


              当前时期（2023 年至今）瞄准重型移动出行、农业、建筑、船舶和高端汽车的 OEM 平台。Turntide Industries 页面列出了这些细分市场，但没有点名任何 OEM
              客户。公司的技术导览文章展示了与未具名传动系统的集成能力，产品扩展新闻提到混合动力和电动重型平台——但没有披露客户身份、设计定点阶段、产量或合同价值。早期 SMS
              客户基础与当前轴向磁通目标市场之间的分裂很关键：现有证据（Frasers、CBRE、JLL）验证的是另一种产品、另一个买方，而非当前战略要服务的市场。


              早期与当前客户证据之间的缺口，不只是披露偏好问题——它反映了公司商业模式、目标买方和产品供给的根本转向。尽调必须把两个客户时期分开看，不能假设 SMS 客户关系会转化为轴向磁通电机需求。
