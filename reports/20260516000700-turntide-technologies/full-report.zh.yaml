  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模式
        blocks:
          - type: paragraph
            body: >-
              根据产品页和新闻报道重建，Turntide 的收入模式以向 OEM 客户销售硬件组件为核心，覆盖重型移动出行、农业、建筑、船舶和高端汽车等垂直领域。公司制造并销售 Turntide.com
              所列的轴向磁通电机（5–450 kW）、Gen 6 电力逆变器（高压逆变器、低压控制器、DC/DC 转换器）和 Gen 5 锂离子 NMC 电池（44V，4.5
              kWh）。第二条收入流似乎是工程服务和集成支持，Industries 页面将其包装为「电气化合作伙伴」；但产品收入和服务收入的边界没有公开划清。


              Turntide 网站或任何已审阅独立来源都没有发布标价、最低订单量、交期或合同条款。按汽车和重型组件供应商的标准行业做法，OEM 硬件销售通常按项目谈判，采用随采购量变化的价格阶梯、工装 NRE
              费用和多年供货协议。Bloomberg 和 Reuters 对 2021 年融资轮的报道提到公司的电机技术和市场机会，但没有引用收入、ARR 或积压订单数据。早期 SMS 产品线——面向 HVAC
              的开关磁阻电机——按节能 ROI 销售，并有 Southern California Edison 等公用事业机构认证 23–57% 节能；但当前产品界面看不到经常性收入或订阅模式。
