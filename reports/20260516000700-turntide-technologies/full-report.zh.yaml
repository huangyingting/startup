            title: 财务不透明，仅凭公开证据无法投资
            body: 没有披露任何财务指标，叠加 2024 年裁员、2021 年后没有融资轮，风险画像必须通过尽调资料室才能缓解。$2.8B 估值没有任何 2022 年后证据支撑。
