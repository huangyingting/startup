            title: 节能效果有独立技术验证
            body: >-
              Turntide 对 Smart Motor System 引用的节能区间（30–64%）得到 Southern California Edison（ETCC，23–57%）和 National
              Renewable Energy Laboratory（制冷应用中 29–71%）的独立印证，两者都属于一手来源。相比多数清洁技术电机主张，这一证据基础更强。
