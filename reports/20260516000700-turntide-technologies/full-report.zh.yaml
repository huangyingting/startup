            title: 财务不透明是最大的投资判断阻碍
            body: >-
              Turntide 没有披露任何定量财务指标——没有收入、没有利润率、没有烧钱速度、没有员工数、没有积压订单。对一家以 $2.8B 估值融资 $600M+ 的公司，这种透明度不足叠加 2024
