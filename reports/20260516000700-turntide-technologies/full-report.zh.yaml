companyProfile:
  summary: >-
    Turntide Technologies 是一家私营气候科技公司，正在搭建纵向一体化的电气化平台，覆盖轴向磁通电机（5–450 kW）、Gen 6 SiC 逆变器和 Gen 5 NMC 电池模块。公司 2013 年以
    Software Motor Company 名义成立，最初商业化开关磁阻电机技术；2020 年更名后转向轴向磁通电机，并在 2021 年完成四笔收购。公开证据能支撑技术主张，但无法支撑财务表现或客户牵引力。
