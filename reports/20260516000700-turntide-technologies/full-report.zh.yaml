      - number: '2.3'
        title: 买方、驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              买方主要是 OEM 或楼宇 / 资产组合的能源决策者；用户是运营方（工厂经理、车队经理、楼宇工程师）；付款方是企业资本开支预算，或在 HVAC 改造中来自 ESG /
              能效资本池。采用触发因素包括：（a）能效强制要求和激励计划（DOE、EU Ecodesign、UK ESOS）；（b）商业地产围绕 Scope 2 排放的脱碳承诺；（c）稀土供应地缘政治风险，推动 OEM
              评估无磁体架构；（d）向电气化移动出行的结构性转变，为更高功率密度电机创造首次装配设计机会。Turntide 关于 HVAC 风机电机节能 30–64% 的叙事吸引楼宇业主付款方，而轴向磁通叙事吸引 OEM
              设计和动力总成团队。

              采用约束同样真实，也部分解释了一家已披露 $600M+
              资本的硬件清洁技术公司为何没有公布收入数字。电机和驱动属于长周期、保守的产品类别，客户默认选择拥有全球服务网络的既有厂商。切换成本包括重新工程设计、重新测试、认证和保修责任转移。资本强度很高：扩大轴向磁通产能需要制造
              CAPEX，Turntide 自 Gateshead 收购后一直在投入。Tier-1 工业客户的采购团队明确提到组件级采购要「双来源采购」，这限制了任何单一新进入者的份额。2024
              年清洁技术宏观降温又放大了这些结构性摩擦。
