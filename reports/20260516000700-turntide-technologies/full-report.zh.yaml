      - number: '4.3'
        title: 资本充足性、烧钱速度与融资依赖
        blocks:
          - type: paragraph
            body: >-
              根据 Company Overview 章节审阅的 TechCrunch、Bloomberg 和 Reuters 报道，Turntide 在 2020 年至 2021 年中之间已宣布融资约 $600
              million+。2020 年 9 月 Amazon Climate Pledge Fund 轮据报道约为 $33 million。2021 年 Series B 据报道分两批——2021 年 2 / 3 月约
              $225 million，2021 年 6 月又约 $225 million——合计约 $450–480 million，参与方包括 Fidelity、Breakthrough Energy
              Ventures、FootPrint Coalition、Fifth Wall 和 Canada Pension Plan Investment Board。


              此后没有公开披露新的融资轮。对一家拥有英国制造设施且 2024 年裁员的硬件公司，这是一项重大的资本充足性信号。Bloomberg 和 Bizjournals 2024 年 3
              月报道的裁员与保现金措施一致，但裁员幅度和裁后员工数没有说明。月度烧钱速度、账面现金、现金跑道（月数）和剩余资金计划用途均未披露。公司 2021 年以 ~$2.8 billion
              估值融资，此后没有公开融资；资本充足性问题在于，$600M+ 融资在扣除收购、CAPEX、经营亏损和营运资本后，剩余余额是否足以支撑公司达到收入规模——或者一轮降估值融资或结构化融资是否已经临近。四笔 2021
              年收购消耗了未披露比例的融资额，每笔收购也带来持续运营成本。尽调必须索取当前现金头寸、月度烧钱速度和 18 个月预测。
