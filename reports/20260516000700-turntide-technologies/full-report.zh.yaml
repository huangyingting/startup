  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出与替代方案
        blocks:
          - type: paragraph
            body: >-
              Turntide 的可服务市场最好拆成三层嵌套来理解。最外层是全球电动机市场——所有化学体系的电机，销往工业、商业、住宅、移动出行和 HVAC
              等终端用途。独立分析机构对这一市场的测算因定义不同而差异很大；已发布估计显示，2024–2025 年市场约为 USD 150–230 billion，到 2030 年 CAGR
              为中个位数。中间层是高效率替换电机和电机系统细分市场——这类电机配套控制器、驱动或软件，用来替代 HVAC 风机 / 泵、制冷冷凝器、食品饮料加工和相邻商业楼宇应用中的传统 AC 感应电机。Turntide 的
              Smart Motor System（SMS）历史上就在这一细分市场竞争。最内层是新兴的高功率密度轴向磁通电机细分市场，用于重型移动出行、高端汽车电气化、船舶推进和电气化农业 / 建筑设备；Turntide
              当前产品线正瞄准这里。

              纳入支出包括电机本体、逆变器或电机控制器、电池或 DC 母线（在轴向磁通 / 移动出行场景中），以及越来越常见的集成 / 服务外壳。排除的支出包括下游增值部分，例如已安装的 HVAC
              设备、整车、整台挖掘机或电网配套基础设施——Turntide 卖组件，不卖成品资产。现状替代品很强：AC 感应电机和永磁同步电机已经成熟、低成本、认证广泛，由 ABB、Siemens、Nidec、Regal
              Rexnord、WEG、Rockwell 和 Eaton 在全球规模供应。Turntide 的战略前提是，能效强制要求、稀土供应风险以及向电气化移动出行的转变，最终会让软件定义 SRM
              或轴向磁通替代方案的价格溢价变得合理。
