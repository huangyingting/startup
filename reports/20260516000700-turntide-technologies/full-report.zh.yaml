  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Turntide 的投资逻辑建立在三根支柱上：(1) 垂直整合的电气化平台，覆盖轴向磁通电机、SiC 逆变器和 NMC 电池；如果被验证，它相较大宗径向磁通方案具有效率和封装优势；(2)
              蓝筹投资方阵容（Breakthrough Energy、Amazon Climate Pledge、Fidelity、BMW iV），带来可信度，并可能打开战略渠道；(3) 长期政策顺风（英国 ESOS、EU
              EcoDesign、美国 DOE 能效标准），支撑高能效电机需求。


              反向逻辑同样清楚。第一，公司没有披露任何财务指标，无法验证收入轨迹、单位经济或资本效率。第二，轴向磁通产品线没有确认任何具名 OEM 量产客户，意味着公司当前核心市场的产品市场匹配尚未验证。第三，$2.8B 的
              2021 年估值没有任何 2022 年后数据点支撑，而 Bloomberg 报道的 2024 年裁员也不符合一家公司沿该轨迹执行的状态。第四，竞争格局包括资金充足的既有厂商（ABB、Nidec、Regal
              Rexnord）以及资金深厚的新进入者（YASA/Mercedes）；这些公司合计拥有 Turntide 尚未证明能匹配的制造规模、客户关系和 IP 组合。以当前证据看，反向逻辑强于正向投资逻辑。


              投资逻辑与反向逻辑的平衡并非学术讨论——它决定任何进入价格是否站得住。基于当前公开证据，反向逻辑压倒每一个高权重因素。
