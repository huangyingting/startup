            title: 纵向一体化电气化栈简化 OEM 采用
            body: >-
              由单一供应商供应电机、逆变器和电池这一合格系统，可以降低 OEM 集成负担。本报告审阅的既有竞争者中，没有提供等价单一来源轴向磁通组合的公司；对优先考虑集成速度而非组件级优化的 OEM，Turntide
              因此具备结构性采购优势。
