      - number: '1.3'
        title: 资本、里程碑与轨迹
        blocks:
          - type: paragraph
            body: >-
              以私营硬件公司标准看，Turntide 披露的资本栈异常庞大：2020 年通过 Amazon Climate Pledge Fund 轮和 Future Shape 约融资 $80
              million；TechCrunch 2021 年 3 月报道，由 Robert Downey Jr. 的 FootPrint Coalition 和 Breakthrough Energy Ventures
              牵头的「Series B」为 $225 million；随后 Reuters 和 Bloomberg 又在 2021 年 6 月下旬报道第二笔 2021 轮融资，金额同为 $225 million，包含
              Canada Pension Plan Investment Board——使 2021 年已宣布资本约为 $450–480 million，累计已宣布资本超过 $600 million。常被引用的「2021 年
              2 月 $480M Series B」可与 Fast Company、CNBC、Forbes 对首关和后续参与的报道对齐。2021 年约 $2.8 billion
              的估值被广泛引用，但未由本报告审阅的任何文件独立确认。

              里程碑曲线很醒目。Turntide 曾是清洁技术明星——Edison Award、Fast Company Most Innovative Companies 2021、Bloomberg、CNBC 和 CNN
              头条报道——随后在 2021 年快速收购（Riptide、VES、BorgWarner Gateshead、Hyperdrive、AVID），并激进扩张到英国 EV 动力总成制造；到 2023–2025
              年，公司明显转为低调，产品焦点转向轴向磁通电机，公开重心迁至英国 Gateshead，并更换创始 CEO。已审阅来源不能证实 $2.8B 估值仍然有效；多次搜索后续融资轮也没有公开确认。这既符合
              2023–2024 年硬件 / 清洁技术老股交易降温，也对任何锚定 2021 年价格的投资判断构成重大尽调警讯。
