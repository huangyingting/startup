      - number: '7.3'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              单独看，Turntide 的监管风险中低，但披露存在缺口。公司在英国和美国运营，两地都有电机能效标准（IEC 60034 / 美国 EISA，英国 ESOS 合规要求）。不过，轴向磁通电机产品线没有公开宣称
              IEC 60034 能效等级，也没有公开披露汽车应用监管备案或批准（例如 EV 安全的 UN ECE R100）。


              正面因素是，英国和 EU 能效法规（ESOS、EU EcoDesign）为高能效电机提供长期政策顺风，美国 DOE/EIA 能效展望也支撑长期需求。Turntide 没有 SEC 文件（EDGAR
              负面检索确认），这意味着没有公开披露义务，也没有投资者保护机制。法律风险包括：鉴于 YASA（Mercedes）在轴向磁通电机上的专利组合，Turntide 存在 IP 自由实施敞口；遗留 SRM IP
              与当前产品的关系也未确认。已审阅来源中没有发现针对 Turntide 的诉讼，但除了公开媒体报道之外缺少更深入的诉讼检索，这本身就是缺口。隐私政策引用了标准的数据保护承诺，但没有公开 SOC 2 或 GDPR
              审计报告。
