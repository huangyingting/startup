            body: BSI/UKAS ISO 认证为 OEM 认证提供可信的流程质量背书；英国 ESOS 与 EU EcoDesign 法规也为高能效电机创造了支持性政策环境。这些因素真实存在，但不足以抵消顶层的财务和客户风险。
