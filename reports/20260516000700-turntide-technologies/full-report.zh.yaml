            body: >-
              已审阅的任何公开来源都没有提供 Turntide 的留存、流失、NRR、GRR、合同续约或客户满意度指标。对一家向 OEM
              销售的硬件组件公司，相关的留存类比指标是多年供货协议续约，以及跨平台世代的设计导入持续性。两项指标都没有公开披露。


              扩张潜力在结构上绑定纵向一体化栈：一个 OEM 若在某个平台上认证 Turntide
              电机，可能扩展到采购逆变器和电池，形成先落地再扩张的动态。然而，公开来源中没有这种交叉销售模式的证据。没有收入份额数据，集中度风险无法判断；但狭窄的市场进入路径（直接 OEM
              合作、有限分销）意味着，初期收入很可能集中在少数账户——这是早期硬件公司的标准模式，会放大单一客户风险。Bloomberg 和 Bizjournals 报道的 2024
              年裁员，既可能符合客户销售管线延迟，也可能符合收入集中损失；不过没有公开信息把裁员归因于具体客户流失事件。尽调必须索取头部客户收入表和销售管线置信度评估。
