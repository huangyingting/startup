            title: 稀土与 SiC 供应链集中带来毛利和交付风险
            body: 轴向磁通电机很可能需要 NdFeB 磁体（60–70% 来自中国），Gen 6 逆变器使用来自集中供应商群体的 SiC 晶圆。两条采购策略都未披露，无法评估供应链韧性。
            calloutType: risk
