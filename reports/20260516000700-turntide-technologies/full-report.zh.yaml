        title: 要点证据
        blocks:
          - type: callout
            title: 当前轴向磁通产品线没有独立验证
            body: >-
              支撑 Turntide 可信度的 SCE（23–57%）和 NREL（29–71%）能效验证，只适用于早期开关磁阻 SMS 产品。当前轴向磁通电机、Gen 6 逆变器和 Gen 5
