            body: >-
              对 Turntide 当前产品线而言，公开采用轨迹证据基本为零。公司没有披露客户数、部署数、出货量、活跃安装量或采用队列数据。公司新闻页有产品发布、行业活动和 CEO
              访谈，但没有客户公告、案例研究或部署里程碑。这与 2020–2021 年形成明显反差；当时 Turntide 的 SMS 曾出现在 CNN、Bloomberg 和 CNBC 带客户引用的报道中。


              对早期 SMS 产品而言，Frasers Group 部署提供了最强客户证明数据点，尽管该证据也缺少单元数量、实际节能效果或合同期限。2020 年收购 VES 将奶牛场自动化客户带入产品组合，但收购后没有公开
              VES 客户指标。自 2021 年转向以来，轴向磁通产品线没有任何客户公告，这本身就是一个重要采用轨迹信号——要么销售周期长于预期，要么公司出于竞争原因选择不披露 OEM
              关系；两种情况都需要在尽调中澄清。任何收入预测被采信之前，必须通过尽调确认真实销售管线。
