      - number: '8.2'
        title: 可比公司与交易估值
        blocks:
          - type: paragraph
            body: >-
              在 Turntide 未披露财务数据的情况下，我们用电机和电力电子领域的公开可比公司交叉校验。主要公开公司组——Regal Rexnord（RRX，$6.5B 收入、$18B EV）、Nidec（$16B
              收入、$30B 市值）、ABB（$32B 收入、$80B 市值）、WEG（$6B 收入、$40B 市值）——交易区间为 1.5–6.5× 往绩收入和 10–25× EBITDA。若用 3× EV/revenue
              的中位数支撑 $2.8B 目标，Turntide 需要约 $930M 运行率收入；即使用慷慨的 4.5× 初创公司溢价，也需要约 $620M——两者都没有任何公开证据证明存在。


              交易可比包括 Mercedes-Benz 收购 YASA（2021，条款未披露；基于报道员工数和已知融资估计 $75–100M）、BorgWarner Gateshead 工厂（Turntide
              收购，条款未披露）、Regal Rexnord 与 Rexnord 合并（2021，$5.4B EV）以及收购 Altra Industrial（2023，$5.0B
              EV）。这些交易涉及的都是已有收入且盈利的业务。唯一可比的收入前轴向磁通电机公司是 YASA，而其估值只是 Turntide 声称估值的一小部分。PitchBook 按 Turntide
              最后一轮估值列示；没有独立分析师发布前瞻估计。在 Turntide 所处阶段，轴向磁通电机公司没有私营公司估值基准。
