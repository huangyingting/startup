company:
  name: Turntide Technologies
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Turntide Technologies delivers a vertically integrated electrification stack comprising axial-flux electric
    motors (5–450 kW), Gen 6 silicon-carbide power inverters, and Gen 5 lithium-ion NMC battery modules (44V, 4.5
    kWh), targeting OEM platforms in heavy-duty mobility, agriculture, construction, marine, and premium automotive.
    The product portfolio represents a material pivot from the original switched-reluctance Smart Motor System (SMS)
    for HVAC applications to a mobility-focused axial-flux platform inherited largely from the 2021 UK acquisitions.
    Independent performance validation exists only for the legacy SMS product; the current axial-flux line relies
    on company-published specifications without third-party benchmarks, which is the single largest product-credibility
    gap.
sections:
- id: product-definition
  title: Product definition and customer workflow
  body: >-
    Turntide's current product offering spans three complementary hardware categories designed to serve OEM electrification
    programs. First, axial-flux electric motors are the flagship product, listed on the Turntide product page in
    a power range from 5 kW to 450 kW. These motors use an axial-flux topology — where magnetic flux passes parallel
    to the motor shaft rather than radially — which offers higher power density and shorter axial length than conventional
    radial-flux designs, advantageous for space-constrained platforms such as marine engine bays and compact off-highway
    equipment. The Turntide news page and tech-tour article describe the axial-flux motor as the centerpiece of
    the company's OEM electrification partnership.


    Second, the Gen 6 power electronics line includes high-voltage traction inverters, low-voltage motor controllers,
    and DC/DC converters per the power-electronics product page. These are designed for traction, generation, and
    auxiliary functions in electrified platforms. Third, the Gen 5 lithium-ion NMC battery module is rated at 44V
    and 4.5 kWh, targeting rugged construction, agriculture, and marine applications per the energy-storage product
    page. The battery claims 15% more energy with improved density relative to its predecessor. In the customer
    workflow, an OEM seeking to electrify a platform would engage Turntide for motor selection and sizing, inverter
    specification, and optional battery integration, followed by qualification testing and volume production from
    the Gateshead UK manufacturing facility.
