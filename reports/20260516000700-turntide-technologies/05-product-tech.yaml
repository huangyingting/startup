- id: architecture-technology
  title: Architecture, technology stack and operating model
  body: >-
    Turntide's technology architecture integrates three hardware layers — motor, power electronics and energy storage
    — into a system that OEMs can procure as a bundle or as individual components. The axial-flux motor topology
    differs fundamentally from the switched-reluctance motor (SRM) that defined the company's early product line.
    SRMs use electromagnetic reluctance without permanent magnets, making them rare-earth-free — a supply-chain
    advantage highlighted in the 2021 Reuters coverage. Axial-flux motors, by contrast, typically use permanent
    magnets (often neodymium-iron-boron), which introduces rare-earth supply-chain dependency that the company has
    not publicly addressed for the current product line.


    The manufacturing operating model centers on the Gateshead UK facility acquired from BorgWarner in 2021, with
    engineering support from the Pune India office and legacy operations in Atlanta. The Wikipedia article on axial-flux
    motors describes the topology as dating to the 1830s, with modern commercial applications in EVs, aerospace
    and marine — confirming that Turntide's choice of topology is well-established rather than novel. The NREL technical
    report from 2019 evaluated the earlier SRM product and found 29–71% energy reduction in refrigerator condenser
    fans, but this validation does not transfer to the axial-flux product. The Gen 6 inverter uses silicon-carbide
    (SiC) power semiconductors per the product page, which offer higher efficiency and thermal performance than
    silicon IGBTs — a design choice that is industry-standard for premium EV traction inverters but adds component
    cost.
