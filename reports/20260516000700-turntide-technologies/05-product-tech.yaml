callouts:
- calloutType: risk
  title: No independent validation exists for the current axial-flux product line
  body: >-
    The SCE (23–57%) and NREL (29–71%) efficiency validation that anchored Turntide's credibility applies only to
    the legacy switched-reluctance SMS product. The current axial-flux motor, Gen 6 inverter and Gen 5 battery rely
    entirely on company-published specifications without third-party testing. This is the single largest product-credibility
    gap.
  claimRefs:
  - CE012
  - CE020
  - CE024
- calloutType: strength
  title: Vertically integrated electrification stack simplifies OEM adoption
  body: >-
    The ability to supply motor, inverter and battery as a qualified system from a single vendor reduces OEM integration
    burden. No incumbent competitor in the reviewed set offers an equivalent single-source axial-flux bundle, giving
    Turntide a structural procurement advantage for OEMs that prioritize integration speed over component-level
    optimization.
  claimRefs:
  - CE001
  - CE005
  - CE008
- calloutType: insight
  title: Technology pivot from SRM to axial-flux may not preserve IP continuity
  body: >-
    The SRM and axial-flux motor are fundamentally different topologies. The SRM is rare-earth-free and electromagnetically
    simple; the axial-flux motor uses permanent magnets and a different stator-rotor geometry. Whether Turntide's
    original SRM IP portfolio is relevant to the current product is unverified — the axial-flux capability may derive
    primarily from the 2021 UK acquisitions.
  claimRefs:
  - CE009
  - CE013
  - CE014
