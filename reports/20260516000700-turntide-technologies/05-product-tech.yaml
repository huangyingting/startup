- id: differentiation-ip
  title: Differentiation, IP and quality controls
  body: >-
    Turntide's product differentiation rests on three pillars: the vertically integrated motor-plus-inverter-plus-battery
    stack, the axial-flux topology's power-density advantage in space-constrained applications, and the company's
    BSI/UKAS ISO certifications covering quality, environmental, information security, and safety management systems.
    The company states on its About page that it is certified to internationally recognized ISO standards and accredited
    by BSI/UKAS, which is a credible process-quality signal for OEM qualification.


    However, the IP moat has significant questions. The patent portfolio size, jurisdiction coverage, and grant
    status are not publicly disclosed. The axial-flux motor topology itself is prior art dating to the 1830s, and
    YASA (now Mercedes-Benz) holds a significant competing patent portfolio. The company's SRM intellectual property
    may or may not underpin the current axial-flux product; no technical disclosure clarifies whether the two technology
    tracks share IP or represent distinct platforms inherited from different acquisition streams. On the roadmap,
    the April 2026 product expansion announcement described an expanded axial-flux portfolio targeting hybrid and
    electric heavy-duty platforms, and the tech-tour article showcases integration capabilities with OEM drivetrain
    systems. No public roadmap with dates, milestones or development-stage gates has been published. Trust and quality
    controls are signaled by the ISO certifications but not independently audited in reviewed sources beyond the
    BSI/UKAS accreditation claim on the company website.
