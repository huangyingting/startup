companyProfile:
  summary: >-
    Turntide Technologies is a private climate-tech company building a vertically integrated electrification platform
    spanning axial-flux motors (5–450 kW), Gen 6 SiC inverters and Gen 5 NMC battery modules. Originally founded
    as Software Motor Company in 2013 to commercialize switched-reluctance motor technology, the company rebranded
    in 2020, pivoted to axial-flux motors, and executed four acquisitions in 2021. Public evidence supports technical
    claims but not financial performance or customer traction.
  foundedDate: '2013-01-01'
  founders:
  - name: Ryan Morris
    role: Founding CEO (no longer CEO)
    background: Founded Software Motor Company; led through Series A and early Series B.
    claimRefs:
    - CO003
    - CO004
  foundingLocation: San Jose, California
  headquarters: Gateshead, United Kingdom
  productSummary: >-
    Core products include axial-flux permanent-magnet motors (5–450 kW), Gen 6 silicon-carbide inverters, and Gen
    5 NMC lithium-ion battery modules (44V, 4.5 kWh). Legacy product line included switched-reluctance motors for
    HVAC applications (Smart Motor System).
  customerFocus: Industrial electrification, HVAC/building services, agriculture, marine and EV/mobility OEMs.
  businessModel: Hardware equipment manufacturer selling motors, inverters and batteries to OEM customers and system
    integrators.
  stage: Late-stage private company (Series B)
  fundingStatus: >-
    Raised >$600M total including a ~$225M Series B in June 2021 at a reported ~$2.8B post-money valuation. No subsequent
    financing round has been publicly disclosed.
