  title: Strong investor roster provides a floor on franchise value
  body: >-
    Breakthrough Energy, Amazon and Fidelity participation implies non-trivial franchise value. Even in the bear
    case, the Gateshead facility, IP portfolio and brand have liquidation value that provides a floor above zero.
