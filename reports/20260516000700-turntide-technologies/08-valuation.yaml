artifact: valuation
slug: turntide-technologies
runDate: '2026-05-16'
company:
  name: Turntide Technologies
chapter:
  number: 8
  title: Valuation
  summary: >-
    Turntide Technologies last raised at a reported ~$2.8 billion valuation in mid-2021 during peak climate-tech
    sentiment. No subsequent financing round has been disclosed. With zero public revenue, margin, or burn data,
    traditional DCF or revenue-multiple approaches are unapplicable, leaving only comparable-company triangulation
    and scenario analysis. Public comparables (Regal Rexnord, Nidec, ABB, WEG) trade at 1.5–4.5× revenue, implying
    Turntide would need $620M–$1.9B in revenue to justify the 2021 mark — revenue for which there is zero public
    evidence. The bull case requires confirmed OEM production revenue and a clean bridge round; the bear case assumes
    a distressed recapitalization below $500M. Recommendation is to pass at the legacy valuation and re-engage only
    after data-room access confirms runway, revenue traction, and a defensible product moat.
sections:
- id: investment-thesis
  title: Investment thesis and anti-thesis
  body: >-
    The investment thesis for Turntide rests on three pillars: (1) a vertically integrated electrification platform
    spanning axial-flux motors, SiC inverters and NMC batteries that — if proven — offers efficiency and packaging
    advantages over commodity radial-flux alternatives; (2) a blue-chip investor roster (Breakthrough Energy, Amazon
    Climate Pledge, Fidelity, BMW iV) that provides credibility and potential strategic channel access; and (3)
    secular policy tailwinds (UK ESOS, EU EcoDesign, US DOE efficiency standards) that support demand for premium-efficiency
    motors.


    The anti-thesis is equally clear. First, the company has disclosed zero financial metrics, making it impossible
    to validate revenue trajectory, unit economics, or capital efficiency. Second, no named OEM production customer
    has been confirmed for the axial-flux product line, meaning product-market fit is unproven in the company's
    current primary market. Third, the $2.8B 2021 valuation has not been supported by any post-2022 data point,
    and the 2024 layoffs reported by Bloomberg are inconsistent with a company executing on that trajectory. Fourth,
    the competitive landscape includes well-capitalized incumbents (ABB, Nidec, Regal Rexnord) and a deep-pocketed
    new entrant (YASA/Mercedes) that collectively possess manufacturing scale, customer relationships and IP portfolios
    that Turntide has not demonstrated the ability to match. The anti-thesis outweighs the thesis on current evidence.


    The thesis/anti-thesis balance is not merely academic — it defines whether any entry price is defensible. On
    current public evidence, the anti-thesis dominates every high-weight factor.
  claimRefs:
