acknowledgedWarnings:
- dimension: paywallRisk
  reason: >-
    Bloomberg layoffs article is partially paywalled; the adverse fact is corroborated via multiple independent
    sources and the company's own quiet disclosure pattern.
- dimension: tableNotes
  reason: Scenario and comparable tables include explanatory notes; additional notes would duplicate section prose.
- dimension: unverifiedSource
  reason: >-
    All cited URLs were fetched during this run; valuation assessments explicitly label confidence level and acknowledge
    the absence of disclosed financials.
- dimension: figureType
  reason: >-
    Flow figures use inferred causal pathways; KPI figure uses range-based values for scenarios consistent with
    the absence of point estimates.
