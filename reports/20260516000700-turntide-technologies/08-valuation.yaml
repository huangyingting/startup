- id: scenario-analysis
  title: Scenario analysis and recommendation
  body: >-
    We construct bull, base and bear scenarios for Turntide's 2028E equity value. The bull case assumes confirmed
    $150M+ annualized revenue by 2028, positive gross margin, successful Series C at $1.5B+ post, and at least two
    named OEM production customers — yielding an equity value of $1.5–2.5B at 10–15× revenue or 3–4× EV/revenue.
    Probability: 10–15%. The base case assumes $30–80M revenue, bridge financing at a $500M–$1B post, continuing
    HVAC/SMS legacy revenue with limited axial-flux traction — yielding $500M–$1B equity value. Probability: 30–40%.
    The bear case assumes sub-$20M revenue, distressed recapitalization below $500M, potential asset sale of the
    Gateshead facility and IP portfolio — yielding $100–400M. Probability: 40–50%.


    The probability-weighted expected value across scenarios is approximately $450–750M, representing a 70–85% discount
    to the $2.8B 2021 mark. The recommendation is to pass at the legacy valuation. Re-engagement criteria include:
    (1) data-room confirmation of ≥$50M annualized revenue with positive gross margin, (2) at least one named production
    OEM customer with a multi-year supply agreement, (3) ≥18 months of runway confirmed, and (4) a clean capitalization
    table with no punitive liquidation preferences from prior rounds.
