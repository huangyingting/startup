callouts:
- calloutType: risk
  title: The $2.8B 2021 valuation is unsupported by any current evidence
  body: >-
    No post-2022 data point supports the 2021 mark. Comparable-company analysis implies Turntide would need $620M–$1.9B
    in revenue to justify the valuation, and there is zero public evidence of any revenue. Probability-weighted
    scenario analysis suggests a 70–85% discount.
  claimRefs:
  - CV002
  - CV009
  - CV020
- calloutType: risk
  title: Pass at legacy valuation; re-engage only with data-room evidence
  body: >-
    The recommendation is to decline investment at the $2.8B mark. Re-engagement requires confirmed ≥$50M revenue,
    ≥1 named OEM customer, ≥18 months runway, and a clean cap table.
  claimRefs:
  - CV022
  - CV023
  - CV024
