company:
  name: Turntide Technologies
chapter:
  number: 7
  title: Risks
  summary: >-
    Turntide Technologies faces a severity-ranked set of risks spanning financial opacity, capital adequacy, customer-evidence
    absence, supply-chain dependency, regulatory compliance, and execution. The highest-severity risks are (1) the
    inability to verify financial health due to zero disclosed revenue, margin or burn metrics, (2) the absence
    of any named axial-flux product customer, and (3) the staleness of the $2.8B 2021 valuation mark. Operational
    risks include rare-earth supply dependency for axial-flux motors, SiC wafer procurement concentration, single-facility
    manufacturing exposure in Gateshead, and post-Brexit trade friction. Mitigations exist for some risks (ISO certifications,
    vertically integrated stack, UK government energy-efficiency tailwinds) but most high-severity risks require
    data-room access to resolve.
sections:
- id: financial-model-risk
  title: Financial and model risk
  body: >-
    The most severe risk class for Turntide is financial opacity. The company has disclosed zero quantitative financial
    metrics — no revenue, ARR, gross margin, EBITDA, burn rate, cash position or headcount. For a company that raised
    $600M+ at a $2.8B valuation in 2021, this level of non-disclosure is atypical even for private companies at
    the growth stage and constitutes a hard blocker for financial underwriting. The 2024 layoffs reported by Bloomberg
    are consistent with cash-conservation pressure, and the absence of any post-2021 financing round creates material
    down-round risk.


    Capital intensity is inherently elevated for a company manufacturing motors, inverters and batteries in-house
    across a UK facility with multi-site engineering operations. The four 2021 acquisitions added ongoing operating
    costs whose magnitude is unknown. If the remaining balance of the $600M+ raise (net of acquisition spend, CAPEX
    and operating losses) provides less than 18 months of runway, the company faces a forced financing event in
    an unfavorable climate-tech funding environment — per CB Insights reporting that climate-tech startup funding
    declined relative to 2021–2022 peaks. Working capital risk includes raw-material inventory for rare-earth magnets,
    SiC wafers and lithium-ion cells, plus 60–90 day OEM receivable cycles. None of these line items are publicly
    confirmed.
  claimRefs:
  - CR001
  - CR002
  - CR003
  - CR004
  - CR005
  - CR006
  - CR007
  - CR008
  tableRefs:
  - TR001
  figureRefs:
