- id: operational-supply-risk
  title: Operational, supply-chain and manufacturing risk
  body: >-
    Turntide's operational risk profile is shaped by three structural exposures. First, the axial-flux motor likely
    requires rare-earth permanent magnets (neodymium-iron-boron), creating supply-chain dependency on a concentrated
    and geopolitically sensitive input. China controls approximately 60–70% of global rare-earth mining and an even
    higher share of processing, per the Wikipedia article on rare-earth elements. Price volatility and export controls
    could materially impact Turntide's BOM cost and margin.


    Second, the Gen 6 inverter uses silicon-carbide (SiC) power semiconductors, sourced from a small number of vendors
    (Wolfspeed, STMicro, Infineon). SiC wafer supply has been constrained in recent years, and single-source risk
    exists if Turntide relies on one SiC supplier. Third, manufacturing is concentrated in the Gateshead UK facility
    acquired from BorgWarner. This creates single-facility risk for customer delivery, UK labor-cost exposure, post-Brexit
    trade friction for EU customers, and fixed-cost leverage that works against the company at low utilization rates.
    The ISO certifications (BSI/UKAS accredited) provide process-quality assurance but do not mitigate physical
    or supply-chain concentration risks. Quality and reliability testing data for current products is not publicly
    available — a gap that amplifies operational risk because product failures at OEM customers would carry disproportionate
    reputational and contractual consequences for a startup supplier.
  claimRefs:
  - CR009
  - CR010
  - CR011
  - CR012
  - CR013
  - CR014
  - CR015
  - CR016
  - CR017
  tableRefs:
