  evidenceGaps:
  - type: missing-source
    severity: material
    topic: financial health data
    missingEvidence: Revenue, burn rate, cash position, margin or any quantitative financial metric.
    whyItMatters: Cannot assess viability, runway or valuation basis without financial data.
    diligencePath: Request audited financials and 18-month cash-flow projection from data room.
    relatedQuestionRefs:
    - QR001
  - type: missing-source
    severity: material
    topic: supply-chain sourcing
    missingEvidence: Rare-earth magnet sourcing strategy, SiC vendor agreements and cell supplier identity.
    whyItMatters: Cannot assess supply-chain resilience or BOM cost risk.
    diligencePath: Request supplier register and procurement risk assessment from operations team.
    relatedQuestionRefs:
    - QR015
  - type: missing-source
    severity: material
    topic: IP freedom-to-operate
    missingEvidence: Patent portfolio schedule and FTO opinion for axial-flux motor IP.
    whyItMatters: YASA/Mercedes patent portfolio creates blocking risk that cannot be assessed without FTO analysis.
    diligencePath: Request FTO opinion from Turntide IP counsel; cross-check USPTO and UKIPO filings.
    relatedQuestionRefs:
    - QR021
acknowledgedWarnings:
- dimension: paywallRisk
  reason: >-
    Bloomberg layoffs article is partially paywalled; the adverse fact is corroborated via multiple independent
    sources and the company's own quiet disclosure pattern.
- dimension: tableNotes
  reason: >-
    Risk register tables include severity and mitigation-maturity columns that serve as implicit notes; additional
    notes would duplicate section prose.
- dimension: unverifiedSource
  reason: >-
    All cited URLs were fetched during this run; risk assessments are derived from cross-referenced public sources
    and explicitly labeled by confidence.
- dimension: figureType
  reason: >-
    DAG figures use inferred risk-transmission pathways; matrix uses qualitative likelihood/impact assessments consistent
    with standard risk-register methodology.
- dimension: sectionsMax
  reason: >-
    Four sections are needed to cover financial, operational, regulatory, and people/execution risk categories as
    required by the chapter contentRequirements.
