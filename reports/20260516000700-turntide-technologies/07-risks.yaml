callouts:
- calloutType: risk
  title: Financial opacity makes the company uninvestable from public evidence alone
  body: >-
    Zero disclosed financial metrics combined with 2024 layoffs and no post-2021 funding round create a risk profile
    that cannot be mitigated without data-room access. The $2.8B valuation is unsupported by any post-2022 evidence.
  claimRefs:
  - CR001
  - CR003
  - CR004
- calloutType: risk
  title: Rare-earth and SiC supply-chain concentration creates margin and delivery risk
  body: >-
    Axial-flux motors likely require NdFeB magnets (60–70% China-sourced), and the Gen 6 inverter uses SiC wafers
    from a concentrated supplier base. Neither sourcing strategy is disclosed, preventing assessment of supply-chain
    resilience.
  claimRefs:
  - CR009
  - CR010
- calloutType: insight
  title: ISO certifications and policy tailwinds partially offset operational risk
  body: >-
    BSI/UKAS ISO certifications provide credible process-quality assurance for OEM qualification, and UK ESOS plus
    EU EcoDesign regulations create a supportive policy environment for premium-efficiency motors. These are real
    but insufficient to offset the top-tier financial and customer risks.
  claimRefs:
  - CR014
  - CR019
