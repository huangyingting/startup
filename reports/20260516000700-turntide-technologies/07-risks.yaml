- id: regulatory-legal-risk
  title: Regulatory and legal risk
  body: >-
    Turntide's regulatory risk profile is moderate to low in isolation but has gaps in disclosure. The company operates
    in the UK and US, both of which have motor-efficiency standards (IEC 60034 / EISA in the US, UK ESOS compliance
    requirements). However, no IEC 60034 efficiency classification has been publicly claimed for the axial-flux
    motor line, and no regulatory filing or approval for automotive applications (e.g., UN ECE R100 for EV safety)
    is publicly disclosed.


    On the positive side, UK and EU energy-efficiency regulations (ESOS, EU EcoDesign) create a secular tailwind
    for premium-efficiency motors, and the US DOE/EIA energy-efficiency outlook supports long-term demand. Turntide
    has no SEC filings (confirmed by EDGAR negative search), which means there are no public disclosure obligations
    but also no investor-protection mechanisms. Legal risk includes IP freedom-to-operate exposure given YASA's
    (Mercedes) patent portfolio in axial-flux motors, and the unconfirmed relationship between the legacy SRM IP
    and the current product. No litigation against Turntide was found in reviewed sources, but the absence of litigation
    searches beyond public press is itself a gap. The privacy policy references standard data-protection commitments,
    but no SOC 2 or GDPR audit report is publicly available.
  claimRefs:
  - CR018
  - CR019
  - CR020
  - CR021
  - CR022
  - CR023
  - CR024
  - CR025
  - CR026
  tableRefs:
  - TR004
- id: people-execution-risk
  title: People, execution, and thesis-break risk
  body: >-
    Key-person dependency is high. Steve Hornyak is the sole public-facing executive, and the leadership transition
    from founding CEO Ryan Morris was not accompanied by a public press release. No full executive roster, CTO,
    CFO or VP-level leadership is disclosed on the company website. For a multi-site operation spanning Gateshead,
    Atlanta, Waterloo and Pune, this opacity creates execution risk that cannot be assessed externally.


    The thesis-break triggers for Turntide are clear: (1) if remaining cash provides less than 12 months of runway
    and no financing is imminent, the company faces existential risk; (2) if zero production-volume OEM customers
    can be confirmed, the product-market fit for axial-flux motors in the target segments is unproven; (3) if the
    $2.8B 2021 valuation has been formally written down by lead investors, any new investment at that mark is impaired.
    Each trigger is currently unresolvable from public evidence and requires data-room access. Mitigations include
    the strong investor lineup (Breakthrough Energy, Amazon, Fidelity), the vertically integrated product stack,
    and the real technical validation from the SRM era — but none of these mitigate the financial opacity or customer-evidence
    absence that dominate the risk register.
  claimRefs:
