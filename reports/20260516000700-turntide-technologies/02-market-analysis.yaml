  evidenceGaps:
    - type: conflicting-data
      severity: material
      topic: market-size estimates differ across publishers
      missingEvidence: A reconciled bottom-up build that explains why Allied, Grand View, Fortune Business Insights and MarketsandMarkets differ by tens of billions on the same nominal market.
      whyItMatters: A factor-of-two TAM uncertainty propagates into SAM/SOM and the valuation lens.
      diligencePath: License one analyst report end-to-end and rebuild the methodology in-house.
      relatedQuestionRefs:
        - QM009
        - QM025
    - type: missing-source
      severity: material
      topic: axial-flux motor segment size and PMSM displacement
