callouts:
  - calloutType: insight
    title: Two markets, two stories
    body: >-
      Turntide's historical HVAC SMS market and its current axial-flux mobility market have
      different buyers, sales cycles, and unit economics. Treating them as one TAM understates
      the strategic shift and the diligence work needed.
    claimRefs:
      - CM003
      - CM020
      - CM022
  - calloutType: risk
    title: SAM/SOM gap relative to 2021 valuation
    body: >-
      Even on generous assumptions, Turntide's near-term SOM appears to be in the low
      hundreds of millions of dollars annually. Reconciling that to the cited 2021 ~$2.8B
      valuation requires either rapid market-share capture or a different revenue pool the
      company has not yet disclosed.
    claimRefs:
      - CM017
      - CM026
  - calloutType: strength
    title: Real regulatory and supply-chain tailwinds
    body: >-
      Motor-driven systems are >40% of global electricity demand per IEA, and energy-efficiency
      mandates plus rare-earth-supply concerns provide structural support for both SRM and
      axial-flux pitches.
    claimRefs:
      - CM018
      - CM019
      - CM025
