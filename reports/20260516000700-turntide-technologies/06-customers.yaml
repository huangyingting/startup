  title: Legacy SMS customer evidence does not transfer to current strategy
  body: >-
    Frasers Group, CBRE and JLL are associated with the HVAC SMS product that is now de-emphasized. These relationships
    validate the company's historical go-to-market but do not constitute evidence for the current axial-flux OEM
    pivot.
  claimRefs:
  - CU002
  - CU003
  - CU008
- calloutType: risk
  title: 2024 layoffs may signal customer pipeline delays
  body: >-
    Bloomberg reported 2024 layoffs at Turntide, which may indicate that the OEM sales pipeline has been slower
    than anticipated. For a company with zero disclosed axial-flux customers, this is a concerning signal about
    commercial traction.
