- calloutType: risk
  title: Zero named customers for the current axial-flux product line
  body: >-
    No OEM design-win customer, production delivery volume, or axial-flux motor deployment has been publicly announced.
    This is the most severe customer-evidence gap and makes adoption trajectory entirely unverifiable from public
    sources.
