  evidenceGaps:
  - type: missing-source
    severity: material
    topic: named OEM customers
    missingEvidence: Any named OEM design-win customer for the current axial-flux motor, inverter or battery product
      line.
    whyItMatters: Without named customers, adoption trajectory is unverifiable and revenue projections have no foundation.
    diligencePath: Request a design-win register with OEM names, platform details, stage and SOP dates from Turntide
      management.
    relatedQuestionRefs:
    - QU004
    - QU015
    relatedTableRefs:
    - TU003
  - type: missing-source
    severity: material
    topic: adoption metrics
    missingEvidence: Customer count, units shipped, active installations, production volume or any quantitative
      adoption metric.
    whyItMatters: Cannot assess market penetration or adoption velocity without these inputs.
    diligencePath: Request quarterly unit shipments, active account count and production run data.
    relatedQuestionRefs:
    - QU006
    - QU023
    relatedTableRefs:
    - TU002
  - type: missing-source
    severity: minor
    topic: Frasers Group deployment detail
    missingEvidence: Specific unit count, savings realized, contract duration and renewal status for the Frasers
      SMS deployment.
    whyItMatters: Frasers is the strongest customer-proof data point but lacks quantification.
    diligencePath: Request deployment case study or customer reference from Turntide or Frasers Group directly.
    relatedQuestionRefs:
    - QU002
    - QU022
acknowledgedWarnings:
- dimension: paywallRisk
  reason: >-
    Bloomberg layoffs article is partially paywalled; the core adverse fact is corroborated across multiple independent
    sources.
- dimension: tableNotes
  reason: >-
    Customer tables explicitly mark evidence quality and null fields; additional notes would duplicate section-level
    gap analysis.
- dimension: unverifiedSource
  reason: All cited URLs were fetched during this run; customer-proof claims are explicitly labeled by evidence
    quality.
- dimension: figureType
  reason: >-
    Funnel figure uses structural stages without conversion data; approximationNotes explain the absence of Turntide-specific
    metrics.
