  name: Turntide Technologies
chapter:
  number: 6
  title: Customers
  summary: >-
    Turntide Technologies has disclosed almost no customer data publicly. The only named customer evidence in reviewed
    sources is Frasers Group (HVAC SMS retrofits), with CBRE and JLL referenced as real-estate partners or prospects
    rather than confirmed production customers of the current axial-flux product line. No OEM design-win customers,
    production delivery volumes, customer count, retention metrics, NRR, or concentration data are available. The
    customer chapter is therefore largely a gap-mapping exercise, identifying the specific evidence that diligence
    must secure before any customer-dependent underwriting can proceed.
sections:
- id: customer-segmentation
  title: Customer base segmentation
  body: >-
    Turntide's customer base can be segmented into two eras. The legacy era (2018–2022) served commercial building
    operators through the Smart Motor System, a switched-reluctance motor and IoT controller sold on energy-savings
    ROI. Named customers from this era include Frasers Group, which deployed SMS units for HVAC retrofits in its
    UK retail portfolio per the Frasers Group corporate site. CBRE and JLL, both large commercial real-estate services
    firms, are referenced as strategic partners via their venture arms (Fifth Wall and JLL Spark invested in Turntide),
    but no specific deployment volumes or revenue figures are publicly attributed to either firm.


    The current era (2023–present) targets OEM platforms in heavy-duty mobility, agriculture, construction, marine
    and premium automotive. The Turntide Industries page lists these segments but does not name any OEM customer.
    The company's tech-tour article demonstrates integration capabilities with unnamed drivetrain systems, and the
    product-expansion news references hybrid and electric heavy-duty platforms — but no customer identity, design-win
    stage, production volume, or contract value is disclosed. This bifurcation between the legacy SMS customer base
    and the current axial-flux target market is critical: the evidence that exists (Frasers, CBRE, JLL) validates
    a different product for a different buyer than the current strategy addresses.


    The gap between legacy and current customer evidence is not merely a disclosure preference — it reflects a fundamental
    pivot in the company's business model, target buyer and product offering. Diligence must treat the two customer
    eras as distinct and not assume that SMS customer relationships translate into axial-flux motor demand.
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU006
  - CU007
  - CU008
  tableRefs:
  - TU001
  figureRefs:
  - FU001
- id: adoption-trajectory
  title: Adoption trajectory and traction evidence
  body: >-
    Public evidence for Turntide's adoption trajectory is essentially null for the current product line. No customer
    count, deployment count, production units shipped, active installations, or adoption cohort data is disclosed.
    The company's news page features product launches, industry events and the CEO interview but contains no customer
    announcements, case studies, or deployment milestones. This is a material departure from the 2020–2021 era,
    when Turntide's SMS was featured in customer-referencing coverage by CNN, Bloomberg and CNBC.


    For the legacy SMS product, the Frasers Group deployment provides the strongest customer-proof data point, though
    even this lacks specificity on unit count, savings realized, or contract duration. The VES acquisition in 2020
    brought dairy-farm automation customers into the portfolio, but no VES customer metrics are publicly available
    post-acquisition. The absence of any customer announcement for the axial-flux product line since the 2021 pivot
    is itself a significant adoption-trajectory signal — either the sales cycle has been longer than expected, or
    the company is choosing not to disclose OEM relationships for competitive reasons, both of which require diligence
    clarification. The pipeline reality must be established through diligence before any revenue projection can
    be credited.
  claimRefs:
  - CU009
  - CU010
  - CU011
  - CU012
  - CU013
  - CU014
  tableRefs:
  - TU002
  - TU003
  - TU006
  figureRefs:
  - FU002
- id: retention-expansion-concentration
  title: Retention, expansion, and concentration risk
  body: >-
    No retention, churn, NRR, GRR, contract renewal, or customer-satisfaction metrics are available for Turntide
    in any reviewed public source. For a hardware-component company selling to OEMs, the relevant retention analogue
    is multi-year supply-agreement renewal and design-in persistence across platform generations. Neither metric
    is publicly disclosed.


    Expansion potential is structurally tied to the vertically integrated stack: an OEM that qualifies Turntide's
    motor for one platform may expand to inverter and battery procurement, creating a land-and-expand dynamic. However,
    no evidence of this cross-sell pattern exists in public sources. Concentration risk is unknowable without revenue-share
    data, but the narrow go-to-market (direct OEM partnership, limited distribution) suggests that initial revenue
    is likely concentrated among a small number of accounts — a standard early-stage hardware pattern that amplifies
    single-customer risk. The 2024 layoffs reported by Bloomberg and Bizjournals are consistent with either customer
    pipeline delays or revenue concentration losses, though no specific customer churn event is publicly attributed.
    Diligence must request a top-customer revenue schedule and pipeline confidence assessment.
  claimRefs:
  - CU015
  - CU016
  - CU017
  - CU018
  - CU019
  - CU020
  - CU021
