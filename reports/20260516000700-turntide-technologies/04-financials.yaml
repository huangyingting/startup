callouts:
- calloutType: risk
  title: Financial opacity is the single largest underwriting blocker
  body: >-
    Turntide discloses zero quantitative financial metrics — no revenue, no margins, no burn rate, no headcount,
    no backlog. For a company that raised $600M+ at a $2.8B valuation, this level of opacity combined with 2024
    layoffs and no disclosed follow-on round constitutes a high-severity diligence flag that cannot be resolved
    without data-room access.
  claimRefs:
  - CI012
  - CI016
  - CI020
- calloutType: risk
  title: 2024 layoffs signal cash-conservation pressure
  body: >-
    Bloomberg reported in March 2024 that Turntide cut staff as climate-tech investment cooled. For a hardware company
    with manufacturing facilities and over $600M in announced capital, layoffs within three years of the peak raise
    are consistent with burn exceeding plan or revenue ramp underperformance — both of which erode the 2021 valuation
    basis.
  claimRefs:
  - CI016
  - CI017
- calloutType: insight
  title: Capital-intensive model requires volume scale for margin path
  body: >-
    Manufacturing motors, inverters and batteries in-house creates fixed-cost leverage at scale but burns cash at
    low utilization. Turntide's four 2021 acquisitions added plant, equipment and workforce that require production
    volume to amortize — and no public evidence confirms volume production has been achieved.
  claimRefs:
  - CI011
  - CI019
  - CI015
