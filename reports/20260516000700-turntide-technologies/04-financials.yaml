company:
  name: Turntide Technologies
chapter:
  number: 4
  title: Financials
  summary: >-
    Turntide Technologies is a private company with no SEC filings and no publicly disclosed revenue, ARR, gross
    margin, EBITDA or unit-economic metrics. The company raised over $600 million in announced capital between 2020
    and mid-2021 at a reported ~$2.8 billion valuation, but no subsequent financing round has been publicly confirmed
    and 2024 layoffs signal cash-conservation pressure. The revenue model is a hardware-component sale to OEMs —
    motors, inverters and batteries — supplemented by engineering services, but list pricing, realized ASPs, gross
    margins and cost structure are entirely opaque. This chapter maps what is knowable from public evidence and
    identifies the specific financial data required for investment underwriting.
sections:
- id: revenue-model
  title: Revenue streams and pricing model
  body: >-
    Turntide's revenue model, as reconstructed from product pages and press coverage, centers on hardware-component
    sales to OEM customers across heavy-duty mobility, agriculture, construction, marine and premium automotive
    verticals. The company manufactures and sells axial-flux electric motors (5–450 kW), Gen 6 power inverters (high-voltage
    inverters, low-voltage controllers, DC/DC converters) and Gen 5 lithium-ion NMC batteries (44V, 4.5 kWh) as
    cataloged on Turntide.com. A secondary revenue stream appears to be engineering services and integration support,
    framed as "electrification partnership" on the Industries page, though the boundary between product and service
    revenue is not publicly delineated.


    No list prices, minimum order quantities, lead times or contract terms are published on the Turntide site or
    in any reviewed independent source. The pricing model for OEM hardware sales is typically negotiated per-program
    with volume-dependent pricing tiers, tooling NRE charges and multi-year supply agreements, based on standard
    industry practice for automotive and heavy-duty component suppliers. Bloomberg and Reuters coverage of the 2021
    financing rounds referenced the company's motor technology and market opportunity but did not cite revenue,
    ARR or backlog figures. The legacy SMS product line — switched-reluctance motors for HVAC — was marketed on
    an energy-savings ROI basis, with utilities like Southern California Edison certifying 23–57% savings, but no
    recurring-revenue or subscription model is visible on the current product surfaces.
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
  - CI006
  - CI007
  tableRefs:
  - TI001
  - TI002
  figureRefs:
  - FI001
- id: unit-economics-cost
  title: Unit economics, cost structure and margin drivers
  body: >-
    Turntide's unit economics are entirely opaque in public evidence. No gross margin, COGS breakdown, contribution
    margin, or per-unit profitability metric has been disclosed. For a hardware-component company manufacturing
    motors, inverters and batteries, the primary cost drivers typically include raw materials (electrical steel,
    copper, rare-earth magnets for axial-flux, lithium-ion cells), manufacturing labor, tooling amortization, quality/testing,
    and logistics. The Gateshead UK manufacturing facility, inherited from the 2021 BorgWarner acquisition, is the
    primary production site based on reviewed sources.


    Comparable public-company gross margins provide loose benchmarks. Regal Rexnord reported a gross margin of approximately
    36% for FY2024 across its motion-control and motor portfolio. Nidec's operating margin was approximately 8–10%
    on its motor business. These are mature-volume figures; a startup like Turntide is likely operating at lower
    utilization and higher per-unit cost. Capital intensity is elevated for any company manufacturing motors, inverters
    and batteries in-house — the 2021 acquisitions (BorgWarner Gateshead, Hyperdrive, AVID) added physical plant,
    equipment and workforce obligations that create fixed-cost leverage but also burn risk if production volumes
    remain low. Working capital requirements for hardware companies include raw-material inventory, work-in-process
    and finished-goods holding costs, plus accounts receivable cycles typical of OEM supply chains (60–90 days).
    None of these line items are publicly confirmed for Turntide.
  claimRefs:
  - CI008
  - CI009
  - CI010
  - CI011
  - CI012
  - CI013
  tableRefs:
  - TI003
  figureRefs:
  - FI002
- id: capital-adequacy
  title: Capital adequacy, burn and financing dependency
  body: >-
    Turntide's announced capital stack is approximately $600 million+ raised between 2020 and mid-2021, per TechCrunch,
    Bloomberg and Reuters reporting reviewed in the Company Overview chapter. The September 2020 Amazon Climate
    Pledge Fund round was reported at approximately $33 million. The 2021 Series B was reported in two tranches
    — roughly $225 million in February/March 2021 and another $225 million in June 2021 — totaling approximately
    $450–480 million, with participants including Fidelity, Breakthrough Energy Ventures, FootPrint Coalition, Fifth
    Wall, and Canada Pension Plan Investment Board.


    No subsequent financing round has been publicly disclosed. This is a material capital-adequacy signal for a
    hardware company with UK manufacturing facilities and 2024 layoffs. The layoffs reported by Bloomberg and Bizjournals
    in March 2024 are consistent with cash-conservation measures, though the magnitude and resulting headcount were
    not specified. Monthly burn rate, cash-on-hand, runway months and planned use of remaining funds are all undisclosed.
    For a company that raised at a ~$2.8 billion valuation in 2021 and has not raised publicly since, the capital-adequacy
    question is whether the remaining balance of the $600M+ raise (net of acquisitions, CAPEX, operating losses
    and working capital) provides sufficient runway to reach revenue scale — or whether a down-round or structured
    financing is imminent. The four 2021 acquisitions consumed an undisclosed portion of the capital raise, and
    each brought ongoing operating costs. Diligence must request a current cash position, monthly burn and 18-month
    projection.
  claimRefs:
  - CI014
  - CI015
  - CI016
  - CI017
  - CI018
  - CI019
  - CI020
