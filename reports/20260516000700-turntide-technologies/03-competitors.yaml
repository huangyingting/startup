- id: capability-comparison
  title: Capability, pricing and distribution comparison
  body: >-
    A direct feature comparison across the competitive set is constrained by limited public disclosure from Turntide
    on pricing, power ratings beyond the published 5–450 kW motor range, and volume production status. The Turntide
    product pages describe axial-flux motors, Gen 6 power inverters and Gen 5 batteries, but do not publish list
    prices, minimum order quantities or lead times. By contrast, ABB, Siemens and Regal Rexnord publish catalog
    pricing for standard motor frames through authorized distributors, and Nidec and WEG maintain extensive online
    configurators.


    On technical differentiation, Turntide's axial-flux topology offers higher power density and shorter axial length
    than radial-flux alternatives, which is valuable in space-constrained OEM platforms (marine engine bays, compact
    construction equipment). The company's earlier switched-reluctance motor (SMS) offered rare-earth-free operation
    — a supply-chain advantage highlighted in the 2021 Reuters coverage — but the current axial-flux line does not
    explicitly repeat the rare-earth-free claim on the product page, and axial-flux motors typically use permanent
    magnets. Distribution is a major differentiator favoring incumbents: ABB operates through more than 100 country
    organizations; Siemens has a comparable global footprint; Regal Rexnord distributes through thousands of motion-control
    partners. Turntide's distribution model, based on reviewed sources, is a direct OEM partnership model rather
    than broad catalog distribution, which limits market reach but may deepen integration stickiness with won accounts.
  claimRefs:
