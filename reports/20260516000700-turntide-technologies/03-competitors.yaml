acknowledgedWarnings:
- dimension: paywallRisk
  reason: >-
    Several competitor Wikipedia and product-page sources provide summary-level data; underlying financial figures
    from annual reports are corroborated across multiple independent market-data sources.
- dimension: tableNotes
  reason: >-
    Competitor profile and capability tables note where data is estimated or unavailable; further notes would duplicate
    the enumerationScope.basis and section prose.
- dimension: unverifiedSource
  reason: >-
    Each cited URL was issued through fetch-url in this run and returned accessible content; Wikipedia sources are
    treated as secondary and cross-referenced against official competitor pages.
- dimension: figureType
  reason: >-
    Quadrant axes use ordinal 1-5 scores derived from evidence rather than quantitative measurements; approximationNotes
    explain the scoring basis.
