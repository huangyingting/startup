callouts:
- calloutType: risk
  title: Incumbents have insurmountable channel and scale advantages in the near term
  body: >-
    ABB, Siemens and Nidec each have decades of OEM spec-in relationships, global service networks and catalog distribution
    that Turntide cannot replicate without sustained revenue growth. The company's direct-OEM model is capital-efficient
    but limits addressable market breadth until design-win volume is publicly demonstrated.
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP015
- calloutType: insight
  title: YASA acquisition by Mercedes validates axial-flux demand but removes a competitor
  body: >-
    Mercedes's acquisition of YASA in 2021 confirmed OEM appetite for axial-flux motors in premium EV platforms.
    However, it also removed the most prominent independent axial-flux supplier from the market, leaving Turntide
    as one of few non-captive options — a positioning advantage if design-win momentum can be demonstrated.
  claimRefs:
  - CP008
  - CP019
- calloutType: strength
  title: Vertically integrated motor-inverter-battery stack is a genuine simplification for OEMs
  body: >-
    Turntide's ability to supply axial-flux motors, power inverters and battery modules as a single qualified system
    reduces integration burden for OEMs electrifying off-highway and heavy-duty platforms. No incumbent in the reviewed
    competitive set offers an equivalent single-source axial-flux bundle.
  claimRefs:
  - CP022
  - CP013
