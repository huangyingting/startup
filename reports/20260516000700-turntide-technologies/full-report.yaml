        title: Unit economics, cost structure and margin drivers
        blocks:
          - type: paragraph
            body: >-
              Turntide's unit economics are entirely opaque in public evidence. No gross margin, COGS breakdown,
              contribution margin, or per-unit profitability metric has been disclosed. For a hardware-component company
              manufacturing motors, inverters and batteries, the primary cost drivers typically include raw materials
              (electrical steel, copper, rare-earth magnets for axial-flux, lithium-ion cells), manufacturing labor,
              tooling amortization, quality/testing, and logistics. The Gateshead UK manufacturing facility, inherited
              from the 2021 BorgWarner acquisition, is the primary production site based on reviewed sources.


              Comparable public-company gross margins provide loose benchmarks. Regal Rexnord reported a gross margin of
              approximately 36% for FY2024 across its motion-control and motor portfolio. Nidec's operating margin was
              approximately 8–10% on its motor business. These are mature-volume figures; a startup like Turntide is
              likely operating at lower utilization and higher per-unit cost. Capital intensity is elevated for any
              company manufacturing motors, inverters and batteries in-house — the 2021 acquisitions (BorgWarner
              Gateshead, Hyperdrive, AVID) added physical plant, equipment and workforce obligations that create
              fixed-cost leverage but also burn risk if production volumes remain low. Working capital requirements for
              hardware companies include raw-material inventory, work-in-process and finished-goods holding costs, plus
              accounts receivable cycles typical of OEM supply chains (60–90 days). None of these line items are
              publicly confirmed for Turntide.
