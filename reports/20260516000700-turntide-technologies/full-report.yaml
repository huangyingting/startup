      - number: '8.2'
        title: Comparable-company and transaction valuation
        blocks:
          - type: paragraph
            body: >-
              In the absence of disclosed Turntide financials, we triangulate from public comparables in the electric
              motor and power-electronics space. The primary public-company set — Regal Rexnord (RRX, $6.5B revenue,
              $18B EV), Nidec ($16B revenue, $30B market cap), ABB ($32B revenue, $80B market cap), WEG ($6B revenue,
              $40B market cap) — trades at 1.5–6.5× trailing revenue and 10–25× EBITDA. Applying a median 3× EV/revenue
              to the $2.8B target would require ~$930M in run-rate revenue from Turntide, and even a generous 4.5×
              start-up premium would require ~$620M — neither of which has any public evidence of existence.


              Transaction comparables include the YASA acquisition by Mercedes-Benz (2021, undisclosed terms, estimated
              $75–100M based on reported headcount and known funding), the BorgWarner Gateshead facility (acquired by
              Turntide, terms undisclosed), and the Regal Rexnord merger with Rexnord (2021, $5.4B EV) and acquisition
              of Altra Industrial (2023, $5.0B EV). These transactions involved profitable businesses with demonstrated
              revenue. The sole comparable for a pre-revenue axial-flux motor company is YASA at a fraction of
              Turntide's claimed valuation. PitchBook lists Turntide at its last round valuation; no independent analyst
              has published a forward estimate. No private-company valuation benchmark exists for axial-flux motor
              companies at Turntide's stage.
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
