      - number: '2.3'
        title: Buyers, drivers and adoption constraints
        blocks:
          - type: paragraph
            body: >-
              The buyer is overwhelmingly the OEM or the building/portfolio energy decision-maker; the user is the
              operator (plant manager, fleet manager, building engineer); the payer is the corporate capex budget or, in
              HVAC retrofits, an ESG/energy-efficiency capital pool. Adoption triggers are (a) energy-efficiency
              mandates and incentive programs (DOE, EU Ecodesign, UK ESOS), (b) decarbonization commitments tied to
              Scope 2 emissions for commercial real estate, (c) rare-earth-supply geopolitical risk pushing OEMs to
              evaluate magnet-free architectures, and (d) the structural shift to electrified mobility creating
              first-fit design opportunities for higher-power-density motors. Turntide's pitch on 30–64% HVAC fan-motor
              energy savings appeals to the building-owner payer, while the axial-flux pitch appeals to OEM design and
              powertrain teams.

              Adoption constraints are equally real and partly explain why a hardware-cleantech company with $600M+ in
              disclosed capital has not produced a public revenue figure. Motors and drives are long-cycle, conservative
              product categories where customers default to incumbents with global service networks. Switching costs
              include re-engineering, retest, certification and warranty assignment. Capital intensity is high: scaling
              axial-flux production requires manufacturing capex that Turntide has been deploying since the Gateshead
              acquisitions. Procurement teams at Tier-1 industrial customers explicitly mention "dual sourcing" for
              component-class purchases, which caps any single new entrant's share. Macroeconomic 2024 climate-tech
              cooling has compounded these structural frictions.
