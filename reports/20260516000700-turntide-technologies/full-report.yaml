              building operators through the Smart Motor System, a switched-reluctance motor and IoT controller sold on
              energy-savings ROI. Named customers from this era include Frasers Group, which deployed SMS units for HVAC
              retrofits in its UK retail portfolio per the Frasers Group corporate site. CBRE and JLL, both large
              commercial real-estate services firms, are referenced as strategic partners via their venture arms (Fifth
              Wall and JLL Spark invested in Turntide), but no specific deployment volumes or revenue figures are
              publicly attributed to either firm.


              The current era (2023–present) targets OEM platforms in heavy-duty mobility, agriculture, construction,
              marine and premium automotive. The Turntide Industries page lists these segments but does not name any OEM
              customer. The company's tech-tour article demonstrates integration capabilities with unnamed drivetrain
              systems, and the product-expansion news references hybrid and electric heavy-duty platforms — but no
              customer identity, design-win stage, production volume, or contract value is disclosed. This bifurcation
              between the legacy SMS customer base and the current axial-flux target market is critical: the evidence
              that exists (Frasers, CBRE, JLL) validates a different product for a different buyer than the current
              strategy addresses.


              The gap between legacy and current customer evidence is not merely a disclosure preference — it reflects a
              fundamental pivot in the company's business model, target buyer and product offering. Diligence must treat
              the two customer eras as distinct and not assume that SMS customer relationships translate into axial-flux
              motor demand.
