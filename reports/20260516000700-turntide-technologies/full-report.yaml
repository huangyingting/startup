  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape and categorization
        blocks:
          - type: paragraph
            body: >-
              The competitive landscape for Turntide's current product portfolio spans at least four categories. First,
              global industrial motor incumbents — ABB, Siemens, Nidec, Regal Rexnord, WEG and Eaton — collectively
              control the vast majority of the $160–200 billion global electric motor market cited by Allied Market
              Research, MarketsandMarkets and Precedence Research in their 2024–2025 sizing reports. These incumbents
              manufacture induction, permanent-magnet and increasingly premium-efficiency motors across NEMA and IEC
              frames, and have deep distribution networks, field-service organizations and spec-in relationships with
              OEMs that Turntide lacks at comparable scale. ABB alone reported CHF 32.0 billion in 2024 group revenue;
              Nidec reported JPY 2.35 trillion; Regal Rexnord reported USD 6.3 billion. These are not direct
              product-line comparisons — each conglomerate sells far more than motors — but they establish the capital
              and channel asymmetry Turntide faces.


              Second, axial-flux motor specialists represent the most direct competitive set. YASA, acquired by
              Mercedes-Benz in 2021, is the most prominent, having integrated its axial-flux technology into Mercedes's
              AMG.EA premium EV platform. BorgWarner, which sold its Gateshead drivetrain unit to Turntide in 2021,
              retains its own eDrive portfolio and continues to invest in electrification. Smaller entrants include
              Magnax (Belgium), Linear Labs (Texas) and several Chinese motor startups that are not individually tracked
              in reviewed sources but appear in MarketsandMarkets and Allied competitive landscape sections.


              Third, the status quo — conventional AC induction motors with variable-frequency drives (VFDs) — remains
              the dominant installed base and the practical alternative for most OEM procurement teams evaluating
              Turntide's offering. Fourth, internal build by large OEMs (e.g. John Deere, Caterpillar, Volvo Trucks) is
              a credible substitute path that bypasses third-party component suppliers entirely.
