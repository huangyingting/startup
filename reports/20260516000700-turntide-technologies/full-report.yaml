      - number: '1.2'
        title: Founders, leadership, and governance
        blocks:
          - type: paragraph
            body: >-
              Turntide's founding CEO was Ryan Morris, who led the company through its July 2020 rebrand, the September
              2020 Amazon Climate Pledge Fund round, the February 2021 Series B led by Fidelity Management & Research
              with Breakthrough Energy Ventures, and the late-2021 EV expansion strategy that culminated in three UK
              acquisitions. Morris was the primary public spokesperson through 2021, on record with TechCrunch, CNBC,
              CNN and Bloomberg about the company's strategy and capital plan. As of the current Turntide.com site and
              2025–2026 press, the company's public-facing leadership is Steve Hornyak, described as "President and CEO
              of Turntide" in the Climate Week interview embedded on the homepage, and the leadership transition has not
              been accompanied by a press release that surfaces in reviewed sources, which is itself a governance
              signal.

              Beyond the CEO, public governance disclosure is limited. Turntide is a private company with no SEC
              filings; an EDGAR full-text search for "turntide" returns no 10-K, 10-Q or S-1. The reviewed sources do
              not list a board of directors, a full C-suite roster, or audit and compensation committee structures.
              Strategic investors with likely board influence include Breakthrough Energy Ventures, Amazon's Climate
              Pledge Fund, BMW i Ventures and Fifth Wall, who are all named on the company's "investors" section. The
              company is BSI/UKAS certified to multiple ISO standards (quality, environmental, information security per
              the Turntide site), which is a process-governance signal but not a substitute for cap-table or board
              disclosure for diligence purposes.
