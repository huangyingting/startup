          - type: callout
            title: Rare-earth and SiC supply-chain concentration creates margin and delivery risk
            body: >-
              Axial-flux motors likely require NdFeB magnets (60–70% China-sourced), and the Gen 6 inverter uses SiC
              wafers from a concentrated supplier base. Neither sourcing strategy is disclosed, preventing assessment of
              supply-chain resilience.
            calloutType: risk
            claimRefs:
