      - number: '7.4'
        title: People, execution, and thesis-break risk
        blocks:
          - type: paragraph
            body: >-
              Key-person dependency is high. Steve Hornyak is the sole public-facing executive, and the leadership
              transition from founding CEO Ryan Morris was not accompanied by a public press release. No full executive
              roster, CTO, CFO or VP-level leadership is disclosed on the company website. For a multi-site operation
              spanning Gateshead, Atlanta, Waterloo and Pune, this opacity creates execution risk that cannot be
              assessed externally.


              The thesis-break triggers for Turntide are clear: (1) if remaining cash provides less than 12 months of
              runway and no financing is imminent, the company faces existential risk; (2) if zero production-volume OEM
              customers can be confirmed, the product-market fit for axial-flux motors in the target segments is
              unproven; (3) if the $2.8B 2021 valuation has been formally written down by lead investors, any new
              investment at that mark is impaired. Each trigger is currently unresolvable from public evidence and
              requires data-room access. Mitigations include the strong investor lineup (Breakthrough Energy, Amazon,
              Fidelity), the vertically integrated product stack, and the real technical validation from the SRM era —
              but none of these mitigate the financial opacity or customer-evidence absence that dominate the risk
              register.
            claimRefs:
