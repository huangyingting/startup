          - type: callout
            title: Pass at legacy valuation; re-engage only with data-room evidence
            body: >-
              The recommendation is to decline investment at the $2.8B mark. Re-engagement requires confirmed ≥$50M
              revenue, ≥1 named OEM customer, ≥18 months runway, and a clean cap table.
            calloutType: risk
            claimRefs:
              - CV022
