  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product definition and customer workflow
        blocks:
          - type: paragraph
            body: >-
              Turntide's current product offering spans three complementary hardware categories designed to serve OEM
              electrification programs. First, axial-flux electric motors are the flagship product, listed on the
              Turntide product page in a power range from 5 kW to 450 kW. These motors use an axial-flux topology —
              where magnetic flux passes parallel to the motor shaft rather than radially — which offers higher power
              density and shorter axial length than conventional radial-flux designs, advantageous for space-constrained
              platforms such as marine engine bays and compact off-highway equipment. The Turntide news page and
              tech-tour article describe the axial-flux motor as the centerpiece of the company's OEM electrification
              partnership.


              Second, the Gen 6 power electronics line includes high-voltage traction inverters, low-voltage motor
              controllers, and DC/DC converters per the power-electronics product page. These are designed for traction,
              generation, and auxiliary functions in electrified platforms. Third, the Gen 5 lithium-ion NMC battery
              module is rated at 44V and 4.5 kWh, targeting rugged construction, agriculture, and marine applications
              per the energy-storage product page. The battery claims 15% more energy with improved density relative to
              its predecessor. In the customer workflow, an OEM seeking to electrify a platform would engage Turntide
              for motor selection and sizing, inverter specification, and optional battery integration, followed by
              qualification testing and volume production from the Gateshead UK manufacturing facility.
            claimRefs:
