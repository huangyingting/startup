companyProfile:
  summary: >-
    Turntide Technologies is a private climate-tech company building a vertically integrated electrification platform
    spanning axial-flux motors (5–450 kW), Gen 6 SiC inverters and Gen 5 NMC battery modules. Originally founded as
    Software Motor Company in 2013 to commercialize switched-reluctance motor technology, the company rebranded in 2020,
    pivoted to axial-flux motors, and executed four acquisitions in 2021. Public evidence supports technical claims but
    not financial performance or customer traction.
