  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis and anti-thesis
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for Turntide rests on three pillars: (1) a vertically integrated electrification
              platform spanning axial-flux motors, SiC inverters and NMC batteries that — if proven — offers efficiency
              and packaging advantages over commodity radial-flux alternatives; (2) a blue-chip investor roster
              (Breakthrough Energy, Amazon Climate Pledge, Fidelity, BMW iV) that provides credibility and potential
              strategic channel access; and (3) secular policy tailwinds (UK ESOS, EU EcoDesign, US DOE efficiency
              standards) that support demand for premium-efficiency motors.


              The anti-thesis is equally clear. First, the company has disclosed zero financial metrics, making it
              impossible to validate revenue trajectory, unit economics, or capital efficiency. Second, no named OEM
              production customer has been confirmed for the axial-flux product line, meaning product-market fit is
              unproven in the company's current primary market. Third, the $2.8B 2021 valuation has not been supported
              by any post-2022 data point, and the 2024 layoffs reported by Bloomberg are inconsistent with a company
              executing on that trajectory. Fourth, the competitive landscape includes well-capitalized incumbents (ABB,
              Nidec, Regal Rexnord) and a deep-pocketed new entrant (YASA/Mercedes) that collectively possess
              manufacturing scale, customer relationships and IP portfolios that Turntide has not demonstrated the
              ability to match. The anti-thesis outweighs the thesis on current evidence.


              The thesis/anti-thesis balance is not merely academic — it defines whether any entry price is defensible.
              On current public evidence, the anti-thesis dominates every high-weight factor.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV008
