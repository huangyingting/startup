          - type: callout
            title: ISO certifications and policy tailwinds partially offset operational risk
            body: >-
              BSI/UKAS ISO certifications provide credible process-quality assurance for OEM qualification, and UK ESOS
              plus EU EcoDesign regulations create a supportive policy environment for premium-efficiency motors. These
              are real but insufficient to offset the top-tier financial and customer risks.
            calloutType: insight
            claimRefs:
