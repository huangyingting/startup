            title: Financial opacity makes the company uninvestable from public evidence alone
            body: >-
              Zero disclosed financial metrics combined with 2024 layoffs and no post-2021 funding round create a risk
              profile that cannot be mitigated without data-room access. The $2.8B valuation is unsupported by any
              post-2022 evidence.
            calloutType: risk
