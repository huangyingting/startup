  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, included spend, and substitutes
        blocks:
          - type: paragraph
            body: >-
              Turntide's addressable market is best framed in three nested layers. The outermost is the global
              electric-motor market — the universe of motors of all chemistries sold into industrial, commercial,
              residential, mobility and HVAC end uses. Independent analyst sizings of this universe vary widely
              depending on definition; published estimates put the 2024–2025 market at roughly USD 150–230 billion with
              mid-single-digit CAGR through 2030. The middle layer is the high-efficiency replacement-motor and
              motor-system subsegment — motors that are sold with controls, drives or software to displace conventional
              AC induction motors in HVAC fans/pumps, refrigeration condensers, food and beverage processing, and
              adjacent commercial-building applications. This subsegment is where Turntide's Smart Motor System (SMS)
              historically competed. The innermost layer is the emerging high-power-density axial-flux motor segment
              used in heavy-duty mobility, premium automotive electrification, marine propulsion and electrified
              agriculture/ construction equipment, which is where Turntide's current product line is pointed.

              Included spend covers the motor itself, the inverter or motor controller, the battery or DC bus (in
              axial-flux/mobility contexts), and increasingly an integration/services wrapper. Excluded spend covers
              downstream value-added like installed HVAC equipment, complete vehicles, complete excavators or
              balance-of-plant grid infrastructure — Turntide sells components, not finished assets. Status-quo
              substitutes are powerful: the AC induction motor and permanent-magnet synchronous motor are mature,
              low-cost, broadly certified products supplied by ABB, Siemens, Nidec, Regal Rexnord, WEG, Rockwell and
              Eaton at global scale. Turntide's strategic premise is that energy-efficiency mandates, rare-earth-supply
              risk and the shift to electrified mobility eventually justify a price premium for software-defined SRM or
              axial-flux alternatives.
