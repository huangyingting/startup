        title: Exhibits
        blocks:
          - type: callout
            title: The $2.8B 2021 valuation is unsupported by any current evidence
            body: >-
              No post-2022 data point supports the 2021 mark. Comparable-company analysis implies Turntide would need
              $620M–$1.9B in revenue to justify the valuation, and there is zero public evidence of any revenue.
              Probability-weighted scenario analysis suggests a 70–85% discount.
            calloutType: risk
            claimRefs:
