      - number: '7.3'
        title: Regulatory and legal risk
        blocks:
          - type: paragraph
            body: >-
              Turntide's regulatory risk profile is moderate to low in isolation but has gaps in disclosure. The company
              operates in the UK and US, both of which have motor-efficiency standards (IEC 60034 / EISA in the US, UK
              ESOS compliance requirements). However, no IEC 60034 efficiency classification has been publicly claimed
              for the axial-flux motor line, and no regulatory filing or approval for automotive applications (e.g., UN
              ECE R100 for EV safety) is publicly disclosed.


              On the positive side, UK and EU energy-efficiency regulations (ESOS, EU EcoDesign) create a secular
              tailwind for premium-efficiency motors, and the US DOE/EIA energy-efficiency outlook supports long-term
              demand. Turntide has no SEC filings (confirmed by EDGAR negative search), which means there are no public
              disclosure obligations but also no investor-protection mechanisms. Legal risk includes IP
              freedom-to-operate exposure given YASA's (Mercedes) patent portfolio in axial-flux motors, and the
              unconfirmed relationship between the legacy SRM IP and the current product. No litigation against Turntide
              was found in reviewed sources, but the absence of litigation searches beyond public press is itself a gap.
              The privacy policy references standard data-protection commitments, but no SOC 2 or GDPR audit report is
              publicly available.
            claimRefs:
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
              - CR026
