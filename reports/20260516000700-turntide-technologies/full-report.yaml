      - number: '2.2'
        title: Sizing lenses and TAM/SAM/SOM
        blocks:
          - type: paragraph
            body: >-
              No single TAM number cleanly captures Turntide's opportunity, so we triangulate across three lenses. Lens
              1 (broadest): global electric-motor TAM at roughly USD 175–230 billion in 2024–2025, growing at ~6–7% CAGR
              (Allied Market Research, Grand View Research, Fortune Business Insights). Lens 2 (mid): the subset of
              motors above NEMA Premium / IE4–IE5 efficiency tiers plus their controls and drives, where Turntide's SMS
              sits. Published high-efficiency-motor sizings are scarcer and less consistent; the IEA's energy-efficiency
              framework attributes >40% of global electricity demand to motor-driven systems, and the U.S. DOE estimates
              significant energy-savings headroom from higher-efficiency motors and drives. We treat the high-efficiency
              premium segment as roughly 15–25% of the broader motor TAM by 2030. Lens 3 (closest to Turntide today):
              axial-flux motors for heavy-duty/premium mobility, an emerging niche with no single authoritative size but
              several analyst notes putting it in the low-single-digit billions growing fast (20%+ CAGR through 2030 on
              a small base).

              SAM is even harder to pin down because Turntide markets to OEMs rather than end users, and OEM design wins
              are heavily relationship-driven. We estimate Turntide's reachable SAM as a function of (a) commercial HVAC
              retrofit motor spend in the U.S./UK/EU and (b) heavy-duty mobility and premium-automotive motor purchases
              where axial-flux makes thermal/packaging sense. SOM, given hardware-component pricing and known unit
              volumes, is plausibly in the low to mid-hundreds of millions of dollars annually at full ramp — far below
              the 2021 valuation implied $2.8B mark would suggest at typical revenue multiples.
