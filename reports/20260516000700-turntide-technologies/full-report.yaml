      - number: '1.3'
        title: Capital, milestones, and trajectory
        blocks:
          - type: paragraph
            body: >-
              Turntide's reported capital stack is unusually large for a private hardware company: approximately $80
              million raised in 2020 across the Amazon Climate Pledge Fund round and Future Shape, $225 million reported
              by TechCrunch in March 2021 as the "Series B" headed by Robert Downey Jr.'s FootPrint Coalition and
              Breakthrough Energy Ventures, and then a second 2021 round publicly reported by Reuters and Bloomberg in
              late June 2021 at another $225 million including Canada Pension Plan Investment Board — bringing announced
              2021 capital to roughly $450–480 million and lifetime announced capital above $600 million. The frequently
              cited "$480M Series B in February 2021" number reconciles to the Fast Company/CNBC/Forbes coverage of the
              initial close and follow-on participation. A 2021 valuation of approximately $2.8 billion is widely cited
              but not independently confirmed by any filing reviewed here.

              The milestone arc is striking. Turntide went from cleantech darling — Edison Award, Fast Company Most
              Innovative Companies 2021, headline coverage in Bloomberg, CNBC and CNN — through a rapid 2021 acquisition
              spree (Riptide, VES, BorgWarner Gateshead, Hyperdrive, AVID) and an aggressive expansion into UK-based EV
              powertrain manufacturing, to a notably quieter 2023–2025 period in which the company shifted its product
              focus to axial-flux motors, relocated its public center of gravity to Gateshead, England, and replaced its
              founding CEO. Reviewed sources do not corroborate the $2.8B valuation as still standing, and several
              searches for follow-on financing rounds returned no public confirmation, which is consistent with
              hardware/cleantech secondaries cooling in 2023–2024 but is also a material due-diligence flag for any
              investor underwriting at the 2021 mark.
