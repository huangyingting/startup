acknowledgedWarnings:
  - dimension: tableNotes
    reason: Snapshot tables note source basis and data-completeness caveats inline; further notes would duplicate the enumerationScope.basis and section bodies.
  - dimension: paywallRisk
    reason: Several 2021 round announcements (TechCrunch, Forbes, Reuters, BusinessWire) returned 404 or paywall responses during this run; the underlying facts are corroborated across additional ok-access sources (CNBC, Wikipedia, Canary Media, NREL).
  - dimension: unverifiedSource
    reason: Each cited URL was issued through fetch-url in this run; entries that returned 404 or rate-limited responses were retained for traceability and corroborated against alternate sources in the same row of evidence.
