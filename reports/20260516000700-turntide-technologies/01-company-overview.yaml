company:
  name: Turntide Technologies
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Turntide Technologies is an electrification component company that designs and manufactures
    electric motors, power electronics and energy storage. It was founded in 2013 as Software
    Motor Corporation (later Software Motor Company) and rebranded to Turntide Technologies in
    July 2020. After raising more than $400 million between 2020 and 2021 from Breakthrough
    Energy Ventures, Amazon's Climate Pledge Fund, BMW i Ventures, Fifth Wall, JLL and others at
    a reported valuation around $2.8 billion, the company pivoted from HVAC switched-reluctance
    motors toward axial-flux motors for heavy-duty and premium mobility, executed multiple UK
    acquisitions, replaced founding CEO Ryan Morris with Steve Hornyak, and has gone notably
    quieter on disclosed metrics since 2023.
sections:
  - id: identity-and-business
    title: Identity, product, and business model
    body: >-
      Turntide Technologies positions itself as an end-to-end electrification component supplier
      for "anything that moves," manufacturing axial-flux electric motors, power electronics
      (inverters and DC/DC converters) and lithium-ion energy storage modules. The current
      Turntide.com homepage and About page describe the company as designing and manufacturing
      "breakthrough electric motors, power electronics and energy storage solutions" and list
      target industries spanning agriculture, construction and mining, commercial and premium
      automotive, marine, rail, recreational and industrial equipment. This is materially
      different from the company's 2020–2022 identity, when it was best known for its Smart
      Motor System (SMS) — a switched-reluctance motor and IoT controller marketed primarily to
      replace HVAC fan and pump motors in commercial buildings with 30–64% energy savings.

      The business model is now a hardware-component sale into OEMs in heavy-duty, off-highway
      and premium mobility, complemented by services (engineering, integration) and an
      "electrification partner" framing on the Industries page. The previous building-energy
      subscription/IoT motif from the SMC/Turntide-1.0 era is no longer prominent on the
      company's primary marketing surfaces. Multiple acquisitions in 2021 — BorgWarner's
      Gateshead drivetrain division, battery maker Hyperdrive, EV controls firm AVID Technology,
      and building-automation firm Riptide — re-shaped the product portfolio in the same year
      the company raised its largest disclosed round. Turntide's English-language Wikipedia
      entry now describes the company as a "UK start-up" headquartered in Gateshead, while the
      About page lists Gateshead, Atlanta, Waterloo (Ontario) and Pune among its locations.
    claimRefs:
