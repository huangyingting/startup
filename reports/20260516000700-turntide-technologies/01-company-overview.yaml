callouts:
  - calloutType: strength
    title: Independent technical validation of energy savings
    body: >-
      Energy savings cited by Turntide for its Smart Motor System (30–64% range) are
      independently corroborated by Southern California Edison (ETCC, 23–57%) and the National
      Renewable Energy Laboratory (29–71% in refrigeration applications), both of which are
      primary-tier sources. That is a stronger evidence base than most cleantech motor claims.
    claimRefs:
      - CO010
      - CO011
  - calloutType: risk
    title: 2021 valuation appears stale and under-disclosed
    body: >-
      The widely repeated ~$2.8B 2021 valuation is not supported by any post-2022 disclosure
      reviewed, and the company has gone notably quieter since 2023. Combined with reported
      2024 layoffs and a CEO change, this constitutes a material valuation-staleness flag for
      any investor anchoring on the 2021 mark.
    claimRefs:
      - CO026
      - CO033
      - CO014
  - calloutType: insight
    title: The company you read about in 2021 is not the company today
    body: >-
      Turntide's 2020–2021 narrative was a Silicon Valley HVAC-IoT smart-motor story. The 2026
      reality is a UK-headquartered axial-flux motor component supplier to heavy-duty mobility
      OEMs. Underwriting Turntide on the 2021 thesis without acknowledging this pivot is a
      diligence error.
    claimRefs:
      - CO003
      - CO030
      - CO009
