  evidenceGaps:
    - type: missing-source
      severity: material
      topic: post-2021 financing rounds and disclosed financials
      missingEvidence: Any public confirmation of a 2023–2026 Turntide financing round, valuation mark, revenue, ARR, headcount or other unit-economic disclosure.
      whyItMatters: The $2.8B 2021 valuation is the only widely cited mark; absence of any 2023+ round and the lack of revenue/headcount disclosure prevent underwriting at the 2021 level.
      diligencePath: Pull PitchBook/Crunchbase deltas, request investor-relations contact, and ask for current cap-table, revenue and headcount data.
      relatedQuestionRefs:
        - QO013
        - QO014
        - QO015
    - type: missing-source
      severity: material
      topic: leadership and founder table
      missingEvidence: A current Turntide leadership page or filed annual return naming the full executive team and board.
      whyItMatters: Key-person dependence is high; opaque governance below the CEO is a material diligence risk.
