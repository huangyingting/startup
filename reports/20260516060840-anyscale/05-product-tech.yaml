- id: TE002
  title: Technical architecture layers
  columns:
  - layer
  - technology/component
  - Anyscale value-add
  - key dependency/risk
  rows:
  - - Developer API
    - Python @ray.remote decorator, Ray AIR unified interface
    - Fully backwards-compatible managed runtime; no code changes for managed vs self-hosted
    - Any API break in open-source Ray propagates to Anyscale Platform
  - - AI Libraries
    - Ray Data, Train, Tune, Serve, RLlib (Ray 2.55.1)
    - Enterprise support contracts backed by the core Ray engineering team
    - Open-source parity lag; Ray users may access new features before Anyscale Runtime ships them
  - - Distributed Scheduler
    - Ray GCS (Global Control Store) + distributed task/actor scheduler
    - Anyscale Runtime manages GCS reliability; head node resilience feature
    - GCS is a single logical control-plane component; HA configuration adds complexity
  - - Object Store
    - Plasma (in-process shared memory object store) + remote object store
    - Managed by Anyscale Runtime; transparent failover on node loss
    - Large object transfers add serialization overhead; latency-sensitive paths require tuning
  - - Cluster Management
    - Anyscale-managed Ray clusters; KubeRay on customer Kubernetes as alternative
    - Autoscaling, budget controls, multi-cloud provisioning, GPU utilization dashboards
    - KubeRay provides full self-hosting alternative; commercial conversion depends on ops value
  - - Compute Layer
    - AWS EC2, GCP Compute, Azure VMs, CoreWeave, Nebius GPUs
    - BYOC model uses customer reservations; Hosted tier absorbs spot pricing risk
    - GPU spot price compression may reduce Hosted-tier compute margin over time
  notes: Architecture is reconstructed from official documentation on docs.ray.io, docs.anyscale.com, the arxiv Ray paper
    (arXiv:1712.05889), and public product pages. Plasma object store internals and GCS HA design are described in the Ray
    research paper but implementation details in the Anyscale Runtime are not publicly disclosed. Diligence should verify
    Anyscale Runtime's HA configuration and SLA for GCS failover.
