- id: section-E5
  title: Enterprise Readiness, Security, and Observability
  body: 'Anyscale''s enterprise feature set is documented on the platform and pricing pages and includes SSO, SAML, SCIM,
    VPC isolation (BYOC), audit logs, and multi-region deployment capabilities. The BYOC model, where Anyscale''s control
    plane deploys within the customer''s cloud account, is the primary data residency and governance mechanism. This architecture
    means customer data and compute never leave the customer''s VPC in BYOC mode, satisfying the data residency requirements
    common in financial services, healthcare, and government AI use cases.


    Observability is built into the platform through workload-specific dashboards with persistent logs covering Ray Data,
    Train, and Serve workloads. One-click CPU and GPU profiling for distributed training jobs is available. The Anyscale Runtime
    provides a fully managed, Ray-compatible runtime supported by the core Ray engineering team, enabling customers to rely
    on expert-maintained infrastructure without being locked into a proprietary runtime—since the underlying Ray API remains
    Apache 2.0 and portable.


    Support tiers are differentiated by deployment mode: Hosted tier offers business-hours support with five case submissions,
    while BYOC provides 24x7 enterprise SLAs with unlimited submissions. This two-tier model is standard for infrastructure
    SaaS and creates a clear upsell path from developer experimentation (Hosted free-tier with $100 credit) to enterprise
    production (BYOC with full SLA coverage).

    '
