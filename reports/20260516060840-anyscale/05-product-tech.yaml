  evidenceGaps:
  - id: EGE001
    topic: Ray 3.0 scope and technical roadmap
    body: The Anyscale blog post at anyscale.com/blog/ray-3-0-announcement returned an empty page body at time of retrieval.
      No publicly accessible document describes the Ray 3.0 architecture, timeline, or scope of breaking changes. For enterprise
      buyers evaluating long-term platform commitments, the absence of a public roadmap is a diligence blocker. Diligence
      should request the Ray 3.0 technical spec and migration guide from Anyscale.
    relatedQuestionRefs:
    - QE007
    relatedTableRefs:
    - TE004
    type: missing-source
    severity: material
  - id: EGE002
    topic: Ray Serve tail-latency benchmarks vs dedicated LLM serving frameworks
    body: No public benchmark from Anyscale or a neutral third party compares Ray Serve's serving latency and throughput to
      vLLM, TGI (text-generation-inference), SGLang, or TensorRT-LLM for single-model LLM serving. Anyscale's composite inference
      positioning acknowledges that Ray Serve adds orchestration overhead relative to bare inference runtimes, but the quantitative
      tradeoff is unverified.
    relatedQuestionRefs:
    - QE008
    - QE026
    - QE012
    relatedTableRefs:
    - TE001
    type: missing-source
    severity: material
  - id: EGE003
    topic: Anyscale enterprise compliance certifications (SOC 2 / ISO 27001 / HIPAA / FedRAMP)
    body: Public documentation does not confirm whether Anyscale holds SOC 2 Type II, ISO 27001, HIPAA BAA, or FedRAMP certifications.
      Enterprise security teams routinely require these prior to production deployment. The BYOC architecture is consistent
      with meeting these requirements but certification status must be confirmed directly with Anyscale's security team.
    relatedQuestionRefs:
    - QE024
    relatedTableRefs:
    - TE003
    type: private-evidence-only
    severity: material
  - id: EGE004
    topic: KubeRay-to-Anyscale commercial conversion rate and self-hosting churn
    body: Anyscale does not publish data on what fraction of Ray users evaluate Anyscale's commercial platform versus choosing
      the KubeRay self-hosted path. The conversion efficiency from open-source adoption to paid platform is the central commercial
      question for Anyscale's business model. No third-party analysis was accessible. Diligence must obtain this metric from
      Anyscale's internal funnel data.
    relatedQuestionRefs:
    - QE025
    - QE019
    relatedTableRefs:
    - TE003
    type: private-evidence-only
    severity: blocking
  - id: EGE005
    topic: Ray PyPI weekly download cadence and trend
    body: Only the all-time download figure (500M+, company-cited) was accessible. Granular PyPI Stats API data for recent
      weekly or monthly download volume was not retrieved. This limits the ability to assess whether download velocity is
      accelerating or plateauing. Public PyPI Stats API data at pypistats.org/packages/ray would provide this without requiring
      Anyscale's cooperation.
    relatedQuestionRefs:
    - QE010
    - QE018
    relatedTableRefs: []
    type: missing-source
    severity: minor
