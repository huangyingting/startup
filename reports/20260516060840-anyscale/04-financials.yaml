  evidenceGaps:
    - id: EGI001
      topic: Anyscale ARR and revenue growth rate (2026)
      body: >-
        Anyscale has not publicly disclosed ARR, quarterly revenue, or revenue growth rate. No third-party source
        provides a credible estimate of current annual revenue. This is the most consequential financial gap: without
        revenue data, it is impossible to independently validate the $1B Series C valuation multiple or assess whether
        the company is on track for a Series D or liquidity event.
      relatedQuestionRefs:
        - QI013
        - QI008
    - id: EGI002
      topic: Series C SEC Form D filing
      body: >-
        The June 2024 Series C ($100M, ~$1B valuation) has no corresponding Form D on EDGAR as of 2026-05-16. Private
        companies are required to file Form D within 15 days of the first sale under Regulation D. The absence may
        indicate an unreported amendment, a different exemption type, a filing under a parallel entity name, or an
        inadvertent non-filing. This should be requested directly from Anyscale's legal team during diligence.
      relatedQuestionRefs:
        - QI015
        - QI018
        - QI019
      relatedTableRefs:
        - TI001
    - id: EGI003
      topic: Series B true total (Form D/A discrepancy)
      body: >-
        The Form D/A filed September 2022 shows $199,185,923 for the Series B offering, compared to the press-
        reported $100M. The gap of ~$97M, the increase in investor count from 7 to 13, and the 9-month lag between
        the original filing and amendment suggest an extended close or follow-on tranche. Without Anyscale confirming
        the structure of the Series B, the exact total raised remains uncertain.
      relatedQuestionRefs:
