company:
  name: Anyscale
chapter:
  number: 4
  title: Financials
  summary: >-
    Anyscale has raised at least $320M across four disclosed stages, though only ~$225M is widely cited in press
    coverage. SEC EDGAR Form D filings for CIK 0001785482 show an initial offering of $20.7M (first sale 2019-08-02)
    and a Series B filing that began at $102.3M in December 2021 and was amended to $199.2M by September 2022—
    suggesting the Series B raised roughly twice the publicly-reported $100M through an extended close with six
    additional investors. The June 2024 Series C ($100M at ~$1B valuation, led by a16z) has no corresponding
    EDGAR Form D on record, an evidence gap requiring diligence follow-up. The business model is usage-based
    compute billing at GPU market rates (H100 ~$9.29/AC-hr, H200 ~$10.68/AC-hr) with a SaaS management layer
    generating an estimated 30–50% blended gross margin. Revenue and ARR are not publicly disclosed. The primary
    financial risks are GPU compute cost volatility, hyperscaler price competition, and the absence of any public
    financial disclosures that would allow independent validation of unit economics.

sections:
  - id: section-1
    title: Capital formation history and SEC filing evidence
    body: >
      Anyscale, Inc. (CIK 0001785482, formerly Indigostack, Inc., incorporated in Delaware) has three Form D exempt-
      offering registrations on record with the SEC as of the research date. The earliest filing (accession number
      0001785482-20-000003, Form D, filed 2020-02-18) reports a first sale date of 2019-08-02 with a total offering
      amount of $20,744,995 involving 18 investors, coded as item 06b (equity). Directors and officers named include
      Robert Nishihara (CEO), Ion Stoica, Philipp Moritz, and Ben Horowitz—confirming a16z board participation from
      the earliest institutional round. This filing most likely consolidates the Seed and Series A tranches; the $20.7M
      is consistent with press-reported aggregate early-stage capital of ~$25.6M (Seed $5M from Foundation Capital and
      NEA in 2019, plus Series A ~$20.6M from a16z in late 2019/early 2020).


      The second offering (accession number 0001785482-21-000001, Form D, filed 2021-12-29) reports a first sale date
      of 2021-10-15 with an initial total offering of $102,285,932 across 7 investors. Peter Sonsini (NEA) is added
      as a director, confirming NEA's continued participation alongside a16z. A subsequent amendment (Form D/A, filed
      2022-09-06, accession 0001785482-22-000001) updates the same offering to $199,185,923 with 13 investors. This
      amendment implies an extended Series B close that added six additional investors and approximately $97M in
      follow-on capital between December 2021 and September 2022—raising the probable total Series B to nearly $200M,
      materially above the publicly-reported $100M headline figure.


      The 2024 Series C ($100M at ~$1B valuation, led by a16z with NEA, Google Ventures, and Intel Capital) has no
      corresponding SEC Form D on record as of this research date. This either reflects a filing delay, a different
      exemption, or an unreported structural aspect of the round. The absence is flagged as a primary evidence gap
      requiring direct diligence inquiry with Anyscale's legal team.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
    tableRefs:
      - TI001
    figureRefs:
      - FI001

  - id: section-2
    title: Business model architecture and revenue streams
    body: >
      Anyscale's revenue model has two principal components: usage-based compute billing and enterprise subscription
      contracts. On the compute side, Anyscale charges customers based on GPU and CPU hours consumed, denominated in
      Anyscale Credits (AC). Published list rates as of May 2026 range from $0.0135/hr for CPU-only instances to
      $9.2880/hr for NVIDIA H100 and $10.6812/hr for NVIDIA H200 instances. These rates represent Anyscale's pass-
      through cost of underlying cloud compute plus a platform margin, though the exact margin over spot/on-demand
      cloud pricing is not disclosed. Anyscale offers both Hosted (Anyscale-managed infrastructure) and BYOC
      (customer's own VPC on AWS, GCP, Azure, Nebius, or CoreWeave) deployment modes.


      Enterprise agreements are structured as committed contracts with volume discounts, available on monthly invoices
      or via cloud marketplace billing channels (AWS, Azure, GCP), allowing customers to draw down existing cloud
      committed-spend agreements. This marketplace co-sell channel is a meaningful go-to-market lever: it reduces
      procurement friction and enables customers to apply pre-committed cloud budgets to Anyscale workloads. The
      startup program offers up to $20,000 in credits, representing a customer acquisition tool targeting early-stage
      AI teams who are expected to graduate to paying enterprise contracts.


      Anyscale also offers dedicated Field Engineering support and expert 24×7 SLAs as part of the BYOC enterprise
      tier, suggesting a professional-services layer that may generate additional revenue or support premium pricing.
      The Terms and Conditions classify the platform as a SaaS subscription service with usage-based overage
      mechanics, and the absence of per-seat pricing in public materials confirms that revenue scales with compute
      consumption rather than user headcount. This model directly ties Anyscale's top line to the volume of GPU
      workloads its customers run—making revenue highly correlated with AI adoption velocity but also with customer
      concentration in large foundation-model builders.
    claimRefs:
      - CI011
