    title: Anyscale Funding Timeline (2019–2026)
    type: timeline
    layout: wide
    summary: >-
      Anyscale's capital formation spans five years from a 2019 Seed to the June 2024 Series C. The SEC
      Form D/A amendment (September 2022) suggests the Series B was extended to $199M total, nearly doubling
      the publicly-cited $100M headline. No Form D exists for the 2024 Series C.
    data:
      items:
        - date: "2019-08"
          label: "Seed (~$5M)"
          detail: "Foundation Capital and NEA. First sale date per SEC Form D: 2019-08-02."
          tone: positive
        - date: "2020-02"
          label: "Series A / early rounds ($20.7M, SEC Form D)"
          detail: "SEC Form D (021-360767) filed 2020-02-18. $20,744,995 across 18 investors. Ben Horowitz (a16z) named Director."
          tone: positive
        - date: "2021-10"
          label: "Series B first close ($102.3M)"
          detail: "SEC Form D (021-426994) filed 2021-12-29. First sale 2021-10-15. 7 investors. Peter Sonsini (NEA) added as Director."
          tone: positive
        - date: "2022-09"
          label: "Series B extended close / amendment ($199.2M total)"
          detail: "SEC Form D/A filed 2022-09-06. Total updated to $199,185,923; investor count to 13. ~$97M additional capital raised."
          tone: neutral
