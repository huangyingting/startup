  - id: FM003
    title: Buyer and segment flow — Anyscale platform adoption path
    type: flow
    layout: wide
    summary: >-
      Anyscale's buyers move from open-source Ray discovery through scale-triggered consideration to managed
      platform adoption. Different segments enter at different stages and convert via distinct triggers. The
      flow maps buyer, user, payer, and decision point for each segment.
    data:
      nodes:
        - id: ray-discovery
          label: Ray open-source discovery
          detail: >-
            500M+ downloads, 41K+ GitHub stars. ML engineer discovers Ray via research, community, or colleague.
            No Anyscale revenue at this stage.
          tone: neutral
        - id: scale-trigger
          label: Scale-triggered consideration
          detail: >-
            Team hits operational complexity: cluster instability, failed training jobs, multi-team onboarding
            friction, or GPU waste. Evaluation of managed options begins.
          tone: neutral
        - id: enterprise-segment
          label: Large enterprise ML platform team
          detail: >-
            Buyer: VP/Director ML Engineering. Payer: platform team budget or cloud marketplace spend.
            Adoption trigger: operational SLA requirement or compliance gate.
          tone: positive
        - id: startup-segment
          label: AI-native startup
          detail: >-
            Buyer: CTO or founding engineer. Payer: VC-backed budget or $20K startup credits.
            Adoption trigger: first multi-node scale need or co-founder referral.
          tone: positive
        - id: research-segment
          label: Research organization
          detail: >-
            Buyer: PI or lab director. Payer: grant funding. Low conversion to paid; brand value.
          tone: neutral
        - id: anyscale-hosted
          label: Anyscale Hosted (fully managed)
          detail: Fastest onboarding; Anyscale provides infrastructure. Best for new teams, startups.
          tone: positive
        - id: anyscale-byoc
          label: Anyscale BYOC (customer cloud)
          detail: Deploys inside customer AWS/GCP/Azure. Best for enterprise data residency and governance.
          tone: positive
        - id: open-source-path
          label: Self-managed KubeRay / SkyPilot
          detail: Free alternative for Kubernetes-expert teams. No Anyscale revenue; competitive loss.
          tone: warning
      edges:
        - from: ray-discovery
          to: scale-trigger
        - from: scale-trigger
          to: enterprise-segment
        - from: scale-trigger
          to: startup-segment
        - from: scale-trigger
          to: research-segment
        - from: scale-trigger
          to: open-source-path
        - from: enterprise-segment
          to: anyscale-byoc
        - from: startup-segment
          to: anyscale-hosted
        - from: startup-segment
          to: anyscale-byoc
        - from: research-segment
          to: open-source-path
    approximationNotes: >-
      Segment entry points and conversion paths are inferred from Anyscale product messaging, startup program design,
      and BYOC versus Hosted positioning. No conversion rate data is publicly available. The open-source path
      represents competitive loss that is not recoverable without a second trigger.
