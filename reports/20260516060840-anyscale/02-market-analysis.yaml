  - id: section-3
    title: Buyer, user, and payer segmentation
    body: >
      Anyscale serves four distinct buyer segments with different organizational profiles, buying processes, and
      value propositions. Understanding the segment-buyer-user-payer triad is essential because the budget owner and
      technical champion are often different people, and the adoption trigger varies materially across segments.


      The largest segment by ACV is large enterprise ML platform teams — the ML infrastructure function within
      Fortune 500 and equivalent global enterprises in financial services, healthcare, retail, and technology.
      These buyers typically have 10–50+ ML engineers and operate production ML systems at scale. The buyer is the
      VP/Director of ML Engineering or ML Platform; the payer is the IT or platform team's capex/opex budget;
      the adoption trigger is operational failure of existing infrastructure at scale (cluster instability, failed
      training jobs, or inability to onboard new teams quickly). Anyscale's Tripadvisor customer reference —
      cited as a senior MLOps engineer use case — is representative of this segment.


      AI-native startups are the second segment. Companies that are building AI products from scratch — including
      generative AI, multimodal AI, and AI agents — frequently choose Anyscale at founding to avoid infrastructure
      overhead. The buyer and payer in this segment is often the CTO or founding engineer; the user is every
      ML engineer on the team; the adoption trigger is the need to scale training or serving beyond what a single
      machine supports. Anyscale's startup credits program (up to $20,000) specifically targets this segment.
      Predibase, cited by Anyscale as a customer, is a representative AI-native startup user.


      Mid-market enterprise ML teams form the third segment — companies with 3–15 ML engineers doing production
      ML but not yet at hyperscaler scale. The buying process is faster and less committee-driven than large
      enterprise, but the ACV is lower and the sensitivity to open-source alternatives is higher. The adoption
      trigger here is often specific pain around autoscaling reliability or multi-cloud cost optimization.


      Research organizations — academic labs, national labs, and government agencies — form the fourth segment.
      These buyers are price-sensitive and often co-exist with open-source Ray without converting to paid Anyscale
      Platform. They represent brand value and community influence but lower near-term revenue contribution.
