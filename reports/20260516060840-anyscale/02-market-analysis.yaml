  - id: TM003
    title: Segment and buyer map
    columns:
      - segment
      - buyer
      - user
      - payer
      - primary workflow
      - budget owner
      - adoption trigger
    rows:
      - - Large enterprise ML platform teams
        - VP/Director of ML Engineering or ML Platform
        - ML engineers, MLOps engineers, platform engineers (10–50+ per team)
        - Infrastructure or platform team capex/opex budget; AWS/GCP/Azure marketplace committed spend
        - Distributed training, model serving, multi-team ML infrastructure
        - VP Engineering or CTO
        - Cluster instability at scale; failed production training jobs; inability to onboard new teams;
          compliance requirement for managed infrastructure
      - - AI-native startups
        - CTO or founding engineer
        - All ML engineers on the team (typically 3–20)
        - Startup budget / VC-backed runway; Anyscale startup credits ($20K) reduce initial cost
        - End-to-end AI product development including training, fine-tuning, and serving
        - CTO or CEO
        - Need to scale training or serving beyond single machine; co-founder recommendation or investor referral;
          awareness from Ray open-source community
      - - Mid-market enterprise ML teams
        - Director of Data Science or ML Engineering
        - Data scientists and ML engineers (3–15 per team)
        - Shared analytics or IT budget; cloud marketplace spend
        - Periodic training jobs; model serving for internal business applications
        - VP Data or Chief Data Officer
        - Autoscaling reliability failures; multi-cloud cost optimization need; team capacity limit
      - - Research organizations (academic and government)
        - Principal Investigator or Lab Director
        - Researchers, graduate students, research engineers
        - Grant funding or government budget; often minimal or free via startup program
        - Large-scale research computing; foundation model training experiments
        - PI or lab director within grant terms
        - Access to scaled compute not available through institutional HPC; Ray adoption through papers and
          publications; limited commercial conversion expected
    notes: >-
      Segment definitions are derived from Anyscale's product page messaging, customer case study references, and
      startup program terms. ACV estimates by segment are not publicly disclosed; buyer and payer roles are inferred
      from standard enterprise software procurement patterns for the ML infrastructure category. The research
      organization segment is included for completeness but is expected to contribute low near-term revenue.
    enumerationScope:
      coverage: partial
      basis: >-
        Segments are constructed from observable product positioning and cited customer examples. Anyscale does not
        publish a formal segmentation. The large enterprise and AI-native startup segments are the most substantiated
        by named customer references (Tripadvisor, Predibase). Mid-market and research segments are inferred from
        product pricing and startup program design.
    claimRefs:
      - CM019
      - CM020
      - CM021
      - CM022
      - CM023
      - CM024
      - CM025
      - CM026
      - CM027

  - id: TM004
    title: Growth drivers and adoption constraints
    columns:
      - driver/constraint
      - direction
      - timing
      - implication for Anyscale
      - diligence ask
    rows:
      - - LLM and foundation model adoption
        - driver
        - current (2024–2026 peak)
        - Enterprises building LLM-based products need distributed training and serving at a scale that
          justifies managed orchestration; Ray is the leading framework for this use case
        - Quantify what share of Anyscale's ARR is attributable to LLM workloads versus traditional ML;
          assess concentration risk if LLM demand plateaus
      - - GPU supply constraints and multi-cloud GPU access
        - driver
        - moderate (easing in 2025–2026 but structural multi-cloud remains)
        - Enterprises that procured GPU capacity across multiple clouds need an orchestration layer that
          spans providers; Anyscale's multi-cloud BYOC support is a differentiator over SageMaker/Vertex
        - Assess whether GPU supply normalization in 2026 reduces urgency of multi-cloud orchestration
      - - Enterprise AI productionization
        - driver
        - current and accelerating
        - As AI moves from experimental to business-critical, operational failure is unacceptable; teams
          upgrade from DIY stacks to managed services with SLAs and support
        - Obtain enterprise contract metrics (support tier uptake, SLA-bound contracts) to confirm conversion
          from self-managed to managed at Anyscale
      - - Cost optimization pressure on GPU compute
        - driver
        - current
        - High GPU costs increase demand for efficient scheduling and spot instance optimization; platforms
          that demonstrably reduce compute waste have a quantifiable ROI story
        - Request case study data showing Anyscale's average GPU utilization improvement versus self-managed
          baseline for sales evidence
      - - AWS SageMaker and GCP Vertex AI bundling
        - constraint
        - persistent
        - Enterprises with cloud committed spend have an incentive to use native ML platforms to draw down
          contract minimums; Anyscale must offer differentiated value to justify incremental spend
        - Quantify what fraction of Anyscale's target SAM is already committed to AWS or GCP exclusive
          contracts; assess marketplace channel strategy effectiveness
      - - High switching costs from existing ML pipelines
        - constraint
        - persistent
        - Even with Ray at the core, rewriting serving endpoints and training scripts for Anyscale requires
          engineering investment; teams resist migration without a clear operational crisis trigger
        - Measure typical time-to-value for new Anyscale enterprise deployments; track churn triggers to
          understand when switching costs are overcome
      - - Open-source self-managed alternatives
        - constraint
        - persistent but addressable
        - KubeRay, SkyPilot, and Kubeflow provide viable no-cost alternatives for teams with Kubernetes
          expertise; Anyscale's managed value proposition must exceed the Kubernetes operational overhead
        - Assess what percentage of Ray users convert to paid Anyscale versus self-manage; track
          trajectory over time to detect commoditization pressure
      - - Regulatory and compliance gatekeeping
        - constraint (also driver for BYOC)
        - current for regulated industries
        - HIPAA, FedRAMP, and data residency requirements gate enterprise deals in healthcare, government,
          and financial services; BYOC mode partially addresses this but formal certifications may be required
        - Verify Anyscale's SOC 2, ISO 27001, HIPAA BAA, and FedRAMP status; quantify revenue from
          regulated industries to size the compliance-gated TAM
    notes: >-
      Timing characterizations (current, moderate, persistent) reflect the state of the market as of May 2026 based
      on available public evidence. GPU supply assessment is based on industry reporting through 2025; the extent of
      supply normalization in 2026 affects the multi-cloud urgency driver materially. Regulatory timing reflects
      federal AI policy acceleration in the US since 2023. All diligence asks require private data access.
    claimRefs:
      - CM028
      - CM029
      - CM030
      - CM031
      - CM032
      - CM033
      - CM034
      - CM035
      - CM036

figures:
  - id: FM001
    title: Anyscale market sizing pyramid — TAM, SAM, SOM (2026)
    type: pyramid
    layout: standard
    summary: >-
      The three-tier market structure for Anyscale shows a broad AI/ML platform TAM of $15–50 billion, a SAM of
      $3–8 billion for distributed compute orchestration enterprises, and a 2026 SOM of $150–600 million based on
      1–5% SAM penetration. All figures are analytic estimates; no analyst publishes a dedicated managed-Ray figure.
    data:
      items:
        - label: TAM — AI/ML Platform Software (ex-hardware, 2026)
          value: 32
          detail: >-
            Midpoint of $15–50B analyst-synthesized estimate for AI/ML infrastructure software excluding hardware
            procurement. Sources: Grand View Research, MarketsandMarkets, Gartner (narrative). Unit: $B.
          tone: neutral
        - label: SAM — Distributed Compute Orchestration Enterprises (2026)
