  - id: section-6
    title: Sizing diligence gaps and contradictory estimates
    body: >
      The market sizing analysis for Anyscale faces three structural evidence problems that diligence must resolve.


      First, no analyst publishes a market size for managed Ray orchestration as an isolated category. Every available
      estimate (Grand View Research, MarketsandMarkets, Gartner, IDC) covers broader markets — the entire AI software
      market, the MLOps market, or the AI platform market — with definitions that include spend categories not
      addressable by Anyscale. Estimates for the total AI market in 2026 range from $60 billion to over $200 billion,
      a 3x range that reflects radically different boundary definitions. Using any of these as a TAM without narrowing
      to Anyscale's actual footprint would produce materially misleading sizing. The $3–8 billion SAM estimate in
      this analysis is a judgment based on triangulated bottom-up and top-down methods, not a directly published figure.


      Second, analyst estimates for the MLOps market specifically also vary significantly. Some estimates frame the
      MLOps market at $2–4 billion in 2024 (narrowly defined as model monitoring, drift detection, and experiment
      tracking), while others expand it to $10–20 billion by including all infrastructure for ML pipelines. Anyscale
      addresses the latter but not necessarily the former. The boundary ambiguity means diligence should establish
      Anyscale's own internal TAM/SAM definition and compare it to published comparables.


      Third, Anyscale's own market share is unknown. The company does not disclose ARR, customer count, or revenue
      growth rate. Without a market share anchor, any SOM estimate is speculative. The $150–600 million SOM range
      used in this analysis is a 1–5% penetration assumption against a $3–8 billion SAM — a range that spans
      pre-breakout to strong early-growth infrastructure company. Confirming where in this range Anyscale actually
      sits requires access to private financial data in the diligence process.
    claimRefs:
      - CM042
      - CM043
      - CM044
      - CM045

