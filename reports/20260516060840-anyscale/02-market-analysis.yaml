company:
  name: Anyscale
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Anyscale operates in the AI/ML infrastructure platform market, a segment distinct from both raw cloud compute and
    general-purpose data engineering. The addressable opportunity sits at the intersection of distributed compute
    orchestration, MLOps tooling, and LLM serving infrastructure — categories that analyst firms including Grand View
    Research, MarketsandMarkets, Gartner, and Forrester track separately but that collectively define the budget pool
    Anyscale competes for. Multiple analyst estimates frame the AI/ML platform total addressable market (TAM) at
    $20–50 billion by 2026, expanding to $50–100 billion by 2030 at 30–40% CAGR, though no firm publishes a precise
    "managed Ray orchestration" segment. The serviceable addressable market (SAM) for Anyscale — enterprises running
    large-scale distributed ML training and serving workloads that cannot cost-effectively self-manage — is estimated
    at $3–8 billion in 2026 using bottom-up and top-down triangulation. The serviceable obtainable market (SOM) in
    2026 is $150–600 million, constrained by current GTM reach and competition from Amazon SageMaker, Google Vertex AI,
    Databricks, Modal, and self-managed KubeRay. Growth is driven by the LLM compute wave, enterprise AI
    productionization, and multi-cloud GPU demand. Constraints include cloud provider lock-in, open-source substitution,
    and high switching costs from existing ML pipelines. Key diligence tension: market sizing estimates span a 10x range
    depending on boundary definition, and no independent source confirms Anyscale's market share.

sections:
  - id: section-1
    title: Market boundary, included spend, and status-quo substitutes
    body: >
      Anyscale's addressable market is best defined as managed distributed AI/ML compute orchestration — the layer
      between raw cloud compute (GPUs, CPUs, networking) and the model artifact. This layer includes the tooling and
      services that enable teams to schedule, run, monitor, scale, and serve AI workloads across heterogeneous compute
      environments. It is distinct from the underlying hardware procurement layer (not addressable by Anyscale) and from
      application-level AI services like inference APIs sold to non-ML-engineer end users.


      Four spending categories fall within the boundary: (1) distributed ML training orchestration, including job
      scheduling, cluster autoscaling, and fault tolerance for large training runs; (2) batch inference and data
      processing pipelines that pre-process training data or run large-scale inference at scale; (3) model serving
      infrastructure for real-time inference endpoints, including load balancing, routing, and multi-model composition;
      and (4) MLOps platform tooling that manages the experiment lifecycle, dependency management, and observability for
      ML practitioners. Spend that falls outside Anyscale's current scope includes raw GPU procurement, general-purpose
      cloud storage, pre-trained model licensing, and application-layer AI API consumption (e.g., calling OpenAI's
      API rather than running a model on owned infrastructure).


      Status-quo substitutes for Anyscale are numerous and technically viable. Amazon SageMaker offers a managed ML
      platform tightly integrated with AWS compute, storage, and networking. Google Vertex AI provides an equivalent
      GCP-native managed ML platform. Databricks offers a unified analytics and ML environment with MLflow for
      experiment tracking and model registry. Self-managed KubeRay — the Kubernetes operator for Ray — allows teams
      to run Ray clusters on their own infrastructure without Anyscale's management layer. SkyPilot is an open-source
      multi-cloud job scheduler that abstracts GPU resource procurement across cloud providers. Modal is a serverless
      Python compute platform that competes specifically for event-driven and short-lived ML workloads. Run:ai is a
      GPU scheduling and orchestration platform aimed at enterprise ML infrastructure teams. Each substitute has a
      different strength: SageMaker wins on AWS integration, Vertex AI wins on GCP integration, Databricks wins on
      SQL/analytics convergence, and KubeRay/SkyPilot win on cost for teams with strong Kubernetes expertise.
