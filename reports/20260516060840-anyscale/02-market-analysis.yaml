tables:
  - id: TM001
    title: Market definition — included spend, excluded spend, and substitutes
    columns:
      - segment/category
      - included spend
      - excluded spend
      - buyer/payer
      - relevance to Anyscale
    rows:
      - - Distributed ML training orchestration
        - Cluster provisioning, autoscaling, job scheduling, fault tolerance, checkpoint management for
          multi-node GPU/CPU training runs
        - Raw GPU/CPU compute procurement; model weights or datasets purchased from third parties
        - ML platform engineering team / CTO office budget
        - Core Anyscale use case; Ray Train and Ray Data cover this workflow end-to-end
      - - Batch inference and data processing
        - Large-scale offline inference pipelines, embedding generation, data preprocessing at ML scale
        - General-purpose ETL (Spark, dbt) not associated with ML model lifecycle
        - Data engineering and ML team shared budget
        - Addressable via Ray Data and Ray Serve batch mode; overlap with Databricks and Spark ecosystems
      - - Real-time model serving
        - Inference endpoint hosting, request routing, multi-model composition, autoscaling for low-latency
          serving; LLM serving infrastructure
        - Application-layer managed inference APIs (OpenAI, Anthropic) consumed by end applications
        - ML platform team or infrastructure team / cloud marketplace committed spend
        - Ray Serve and Anyscale Endpoints target this category; competes with SageMaker endpoints,
          Vertex AI Prediction, BentoML, and vLLM-based serving stacks
      - - MLOps platform tooling
        - Experiment tracking, dependency management, cluster observability, role-based access control,
          audit logging, cost monitoring for ML workloads
        - General DevOps tooling (GitHub Actions, Terraform) not ML-specific
        - ML engineering team budget; sometimes IT operations budget
        - Anyscale Platform's workspace and observability layer addresses this; competes with Weights and
          Biases, MLflow on Databricks, and Neptune.ai
      - - Multi-cloud GPU access and scheduling
        - Orchestration spanning multiple cloud GPU providers to optimize availability and cost; spot
          instance management across AWS, GCP, Azure, CoreWeave, and Nebius
        - Cloud provider billing and reserved instance contracts (not Anyscale's layer)
        - Cloud infrastructure or FinOps team / cloud committed spend budget
        - Anyscale's BYOC multi-cloud support directly addresses this; SkyPilot and Ray's multi-cloud
          cluster launcher are free alternatives
    notes: >-
      Market boundary definitions are analytic constructs, not official regulatory or analyst categories.
      Included/excluded classifications reflect Anyscale Platform's current product coverage as of 2026-05-16.
      Adjacent markets (general data engineering, application-layer inference APIs, GPU hardware) are excluded
      because Anyscale does not sell into those layers today; future product expansion could shift the boundary.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM006
      - CM007
      - CM008

