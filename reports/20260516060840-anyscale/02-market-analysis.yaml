    summary: >-
      Anyscale's adoption funnel has four stages from Ray open-source user to expanding enterprise customer.
      Each stage has a distinct conversion dynamic and different competitive alternatives. The top of the funnel
      is exceptionally large (millions of Ray users); conversion to paid is a small but valuable subset.
    data:
      items:
        - label: Stage 1 — Ray open-source adoption
