  - id: section-4
    title: Growth drivers and adoption constraints
    body: >
      The AI/ML infrastructure market is experiencing the strongest growth tailwind in the history of enterprise
      software infrastructure. The LLM and foundation model wave — driven by the commercial adoption of large
      generative AI systems since 2022 — has created demand for distributed training infrastructure at a scale
      that most enterprise ML teams had not previously needed. Teams that once ran small models on single GPUs now
      require multi-node, multi-GPU training clusters with complex scheduling, fault tolerance, and checkpoint
      management. This demand shift directly benefits Anyscale, since Ray is the de facto framework for distributed
      training at scale and Anyscale is its managed productization.


      GPU supply constraints are a second structural driver. The shortage of H100 and A100 GPUs across all major
      cloud providers in 2023–2025 forced enterprises to procure GPU capacity from multiple cloud providers
      simultaneously. Multi-cloud GPU strategies require an orchestration layer that can abstract across AWS,
      GCP, Azure, and specialist clouds (CoreWeave, Lambda Labs, Nebius). Anyscale's multi-cloud support positions
      it directly at this pain point, since cloud-native ML platforms (SageMaker, Vertex AI) cannot span clouds.


      Enterprise AI production adoption is the third driver. McKinsey's State of AI research has tracked the
      proportion of enterprises with AI in production rising steadily, and as AI moves from experimental to
      business-critical, the tolerance for operational failure in ML infrastructure drops. This creates demand
      for production-grade managed services rather than DIY open-source stacks.


      Constraints are equally important to size. Cloud provider lock-in is the primary constraint: AWS SageMaker
      and Google Vertex AI are deeply integrated with their respective cloud ecosystems and benefit from
      committed cloud spend budgets that Anyscale competes against. Switching costs from existing ML pipelines
      are high — rewriting training jobs and serving endpoints to run on Anyscale requires engineering investment
      even when the underlying framework (Ray) is the same. The open-source path (self-managed KubeRay, SkyPilot)
      provides a cost-effective alternative for teams with strong Kubernetes skills, capping Anyscale's pricing
      power with cost-sensitive segments. Capital intensity is a constraint too: since GPU compute is expensive,
      the share of budget available for platform tooling above the compute layer is limited. Regulatory constraints
      (data residency, HIPAA, FedRAMP) are modestly accelerating BYOC adoption but also gate enterprise deals
      that require formal compliance certifications.
