  - id: section-4
    title: Capital base and investor map
    body: >
      Anyscale has completed multiple venture funding rounds, with a June 2024 Series C of $100 million establishing
      the company at an approximately $1 billion (unicorn) valuation. craft.co data independently tracked the market
      valuation at $1 billion as of December 9, 2021, suggesting the Series B valuation also reached or approached that
      level. The publicly known investor base includes Andreessen Horowitz (a16z), NEA, Google Ventures, Intel Capital,
      and Foundation Capital. The combination of a16z (the leading AI infrastructure investor), Google Ventures
      (strategic alignment with GCP), and Intel Capital (hardware ecosystem alignment) is a strategically coherent
      syndicate for an AI compute platform company.


      The full cap table is not publicly available. The cumulative disclosed funding is over $60 million per craft.co
      (an incomplete figure that predates later rounds), and the aggregate across all disclosed rounds through the
      Series C is estimated at over $225 million. Specific stake sizes, liquidation preferences, pro-rata rights,
      board composition changes from each round, and secondary transaction history are not available in public sources.
      The presence of Google Ventures is notable for a company that also supports AWS and Azure as deployment targets—
      any preferred cloud, ROFR, or strategic alignment clauses in the investment agreement should be a primary
      diligence ask. Intel Capital's participation is similarly worth investigating for hardware exclusivity or
      preferential pricing commitments that could affect cloud-agnostic positioning.
    claimRefs:
      - CO028
      - CO029
      - CO030
      - CO031
    tableRefs:
      - TO003
  - id: section-5
    title: Product architecture, revenue model, and go-to-market
    body: >
      Anyscale Platform is a multi-cloud managed service built on Ray. The platform's core value proposition is removing
      the operational burden of running Ray clusters in production—handling cluster provisioning, autoscaling, failure
      recovery, dependency management, and observability so that engineering teams can focus on application logic rather
      than infrastructure operations. The platform supports distributed training, batch inference, model serving,
      multimodal data processing, and embedding generation, covering the primary AI workload categories that foundation
      model teams need to scale.


      Deployment options divide into two tiers. The Hosted tier is a fully managed option where Anyscale provides the
      underlying infrastructure, making it fastest for new projects and teams without existing cloud infrastructure
      investments. The BYOC tier deploys inside the customer's own cloud account, supporting AWS, GCP, Azure, Nebius,
      and CoreWeave. BYOC targets enterprise platform teams that require data residency, governance controls, or
      existing cloud budget commitments. Enterprise security features include SSO, SAML, SCIM, and full audit logging.
      Billing is available through direct Anyscale invoices or via cloud marketplace channels for AWS, GCP, and Azure—
      an important go-to-market lever since marketplace billing allows customers to use existing cloud committed spend.


      Anyscale has a startup-facing program offering up to $20,000 in platform credits, positioning it to capture
      emerging AI teams early and grow with them. Customer testimonials on public product pages name Tripadvisor (via
      Sam Jenkins, Senior MLOps Engineer) and Predibase (via Travis Addair, CTO and maintainer of Horovod and Ludwig AI)
      as production users. These named references represent a mix of large-enterprise ML platform teams and AI-native
      startup workloads. Anyscale has also cited customers in distributed-training use cases who describe training on
      systems with 170 million end users, consistent with large consumer-scale ML teams.
