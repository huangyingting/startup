      - SV008
      - SV012
      - SV015
  - id: TV006
    title: Final Diligence Asks
    notes: >-
      These are minimum required evidence items before committing capital. Items marked BLOCKING must be resolved before
      investment; MATERIAL items should be resolved within 30 days of initial commitment.
    columns:
      - Priority
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - BLOCKING
        - ARR and Revenue Growth
        - Trailing 12-month ARR, quarterly growth rate, NRR breakdown by cohort
        - Validates or invalidates $1B valuation at market multiples; required for scenario calibration
        - Board data room request; cross-validate with Series C investor reporting
      - - BLOCKING
        - Series C Form D Gap
        - No SEC Form D filing found for the 2024 $100M Series C raise
        - May indicate SAFE structure, offshore close, or filing delay; affects preference stack analysis
        - Direct request to Anyscale legal counsel; EDGAR monitoring for delayed filing
      - - BLOCKING
        - Cap Table and Preference Stack
        - Unknown liquidation preferences, anti-dilution terms, and ROFR provisions across 4 preferred series
        - Preference overhang can materially dilute common-equivalent value at base and bear exit prices
        - Full cap table model from counsel; review GV and Intel Capital strategic alignment clauses
      - - MATERIAL
        - Gross Margin and Unit Economics
        - Blended gross margin, Hosted vs. BYOC margin breakdown, GPU cost structure
        - Determines path to profitability and validates 30–55% estimated gross margin range
        - Controller-level interview; pricing vs. cost benchmarking from Anyscale rate card
      - - MATERIAL
        - Burn Rate and Runway
        - Monthly cash burn and remaining runway from Series C proceeds
        - Series C runway may expire by late 2026 at $4–10M/month burn; determines Series D urgency
        - CFO interview; estimate from headcount signals (LinkedIn) and compute cost structure
      - - INFORMATIONAL
        - Key Customer Concentration
        - Revenue breakdown by top 5 customers as percentage of ARR
        - OpenAI as anchor customer creates meaningful concentration risk if usage declines
        - Customer reference calls with OpenAI, Uber, Spotify teams; contract disclosure in data room
