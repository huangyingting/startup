      - number: '3.2'
        title: Direct compute-layer competitors — Modal, CoreWeave, Together AI
        blocks:
          - type: paragraph
            body: >
              Modal Labs is a serverless Python compute platform with Starter ($0 plus compute, $30/month free credits,
              100 containers, 10 GPU concurrency slots) and Team ($250 plus compute, $100/month free credits, 1000
              containers, 50 GPU concurrency) pricing tiers. Modal markets itself as serverless, claiming cost advantage
              for spiky or unpredictable workloads relative to fixed on-demand compute; the pricing page illustrates a
              scenario where 50 average GPUs at $3.95/GPU-hour versus 75 reserved at $3.00/GPU-hour results in lower
              total cost on Modal for bursty workloads. Modal does not natively support multi-node distributed training
              orchestration at the depth of Ray Train, making it primarily a competing option for serving, batch, and
              short-run training jobs rather than large-scale distributed training runs. CoreWeave describes itself as
              the world's number-one AI cloud platform, purpose-built for AI with Kubernetes-native compute, storage,
              and networking. CoreWeave has launched CoreWeave Sandboxes for reinforcement learning, agent tool use, and
              model evaluation in isolated environments. Its primary differentiation is GPU fleet scale and
              Kubernetes-native access, targeting teams that prefer full infrastructure control over a managed
              abstraction layer; this makes CoreWeave an infrastructure supplier rather than a direct application-layer
              competitor to Anyscale, and Anyscale lists CoreWeave as a supported BYOC cloud target. Together AI
              positions as an AI-native cloud claiming 2× faster inference, 60% lower cost via workload-specific
              optimization, and 90% faster pre-training with its Together Kernel Collection. Together AI supports
              serverless inference, batch inference (up to 30 billion tokens per model), dedicated deployments, and GPU
              cluster infrastructure for training. Unlike Anyscale, Together AI is inference-first and does not expose
              the Ray programming model.
