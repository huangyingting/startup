      - SV015
  - id: FV003
    title: Valuation range by scenario — Anyscale ($B)
    type: range
    layout: wide
    insight: >-
      The base case ($1.1–1.8B) implies a modest valuation step-up from the $1B Series C. The bull case ($3.0–5.0B)
      requires $150M+ ARR with 20–30× multiple. The bear case ($0.3–0.5B) represents a significant down round driven by
      multiple compression and competitive displacement.
    data:
      items:
        - label: Bear Case ($B)
          low: 0.3
          high: 0.5
          unit: $B
          notes: $30–50M ARR × 8–10×; multiple compression + competitive displacement
        - label: Base Case ($B)
          low: 1.1
          high: 1.8
          unit: $B
          notes: $75–100M ARR × 14–18×; moderate growth, stable multiple
        - label: Bull Case ($B)
          low: 3
          high: 5
          unit: $B
          notes: $150M+ ARR × 20–30×; Ray flywheel + high NRR + premium AI multiple
    sourceRefs:
      - SV006
      - SV007
      - SV015
  - id: FV004
    title: Investment KPI scorecard — Anyscale (May 2026)
    type: kpi
    layout: standard
    insight: >-
      Anyscale scores strongly on market size and technical moat but faces critical gaps in financial verification (ARR
      and NRR undisclosed) and competitive resilience against hyperscalers. The overall IC-ready score is 3.3/5,
      conditional on resolving the financial opacity gap.
    data:
      items:
        - label: Valuation (Series C)
          value: $1B
          status: confirmed
          note: June 2024; led by a16z, NEA, GV, Intel Capital
        - label: Total Funding Raised
          value: ~$320M
          status: confirmed
          note: $20.7M Form D + $199.2M Form D/A + $100M Series C (press-reported)
        - label: ARR (2026)
          value: Undisclosed
          status: missing
          note: Estimated $50–100M from structural analysis; not confirmed
        - label: NRR
          value: Undisclosed
          status: missing
          note: No public data; inferred >100% from land-and-expand model
        - label: Ray Downloads
          value: 500M+
          status: confirmed
          note: Cited in prior chapter research from github.com/ray-project/ray
        - label: GitHub Stars (Ray)
          value: 41,000+
          status: confirmed
          note: github.com/ray-project/ray; confirms OSS community scale
        - label: Series C Form D
          value: Not Filed
          status: missing
          note: No Form D found in SEC EDGAR as of May 2026; evidence gap
        - label: Exit Comparables
          value: Databricks $62B
          status: confirmed
          note: Databricks closed $15B Series J at $62B (Dec 2024, per SiliconAngle)
    sourceRefs:
      - SV001
      - SV003
      - SV013
      - SV015
