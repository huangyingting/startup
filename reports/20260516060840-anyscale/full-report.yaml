      - number: '4.2'
        title: Business model architecture and revenue streams
        blocks:
          - type: paragraph
            body: >
              Anyscale's revenue model has two principal components: usage-based compute billing and enterprise
              subscription contracts. On the compute side, Anyscale charges customers based on GPU and CPU hours
              consumed, denominated in Anyscale Credits (AC). Published list rates as of May 2026 range from $0.0135/hr
              for CPU-only instances to $9.2880/hr for NVIDIA H100 and $10.6812/hr for NVIDIA H200 instances. These
              rates represent Anyscale's pass- through cost of underlying cloud compute plus a platform margin, though
              the exact margin over spot/on-demand cloud pricing is not disclosed. Anyscale offers both Hosted
              (Anyscale-managed infrastructure) and BYOC (customer's own VPC on AWS, GCP, Azure, Nebius, or CoreWeave)
              deployment modes.


              Enterprise agreements are structured as committed contracts with volume discounts, available on monthly
              invoices or via cloud marketplace billing channels (AWS, Azure, GCP), allowing customers to draw down
              existing cloud committed-spend agreements. This marketplace co-sell channel is a meaningful go-to-market
              lever: it reduces procurement friction and enables customers to apply pre-committed cloud budgets to
              Anyscale workloads. The startup program offers up to $20,000 in credits, representing a customer
              acquisition tool targeting early-stage AI teams who are expected to graduate to paying enterprise
              contracts.


              Anyscale also offers dedicated Field Engineering support and expert 24×7 SLAs as part of the BYOC
              enterprise tier, suggesting a professional-services layer that may generate additional revenue or support
              premium pricing. The Terms and Conditions classify the platform as a SaaS subscription service with
              usage-based overage mechanics, and the absence of per-seat pricing in public materials confirms that
              revenue scales with compute consumption rather than user headcount. This model directly ties Anyscale's
              top line to the volume of GPU workloads its customers run—making revenue highly correlated with AI
              adoption velocity but also with customer concentration in large foundation-model builders.
            claimRefs:
