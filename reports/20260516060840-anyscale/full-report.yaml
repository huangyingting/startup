      - number: '5.2'
        title: Anyscale Platform Commercial Product Lines
        blocks:
          - type: paragraph
            body: >
              Anyscale wraps the Ray open-source framework in a production-grade managed service with three primary
              product surfaces. Workspaces provide cluster-backed VS Code and Jupyter development environments with
              sub-one-minute startup times, fast dependency synchronization via uv, and built-in observability
              dashboards for debugging Ray Data, Train, and Serve workloads interactively. Jobs offer production-grade
              managed Ray clusters for batch workloads including data preprocessing, distributed training, and embedding
              generation, with head node resilience and autoscaling. Services deliver online inference serving with
              fault tolerance, A/B rollouts, blue/green deployment, and multi-model pipeline support. Collectively these
              surfaces address the full ML lifecycle from experimentation through production, differentiating Anyscale
              from point tools that address only training or only serving.


              A distinctive newer product line is Anyscale Endpoints, which exposes LLM serving as a fully managed API.
              This positions Anyscale in the LLM serving market alongside dedicated providers such as Together AI and
              modal.com. The composite AI inference product, branded separately, targets multi-model, heterogeneous
              CPU+GPU inference pipelines—recommendation systems, multimodal search, and multi-step reasoning
              workflows—that chain embeddings, retrieval, reranking, and large and small models across a single cluster.
              This architecture requires independent scaling of heterogeneous compute resources and is a technically
              differentiated area where Ray's fine-grained scheduling outperforms coarser orchestration layers.


              Deployment is available in two tiers. The Hosted tier provides fully managed infrastructure; Anyscale
              provisions and manages the cloud resources, and billing is via monthly credit card invoice. The Bring Your
              Own Cloud (BYOC) tier deploys the Anyscale control plane inside the customer's own AWS, GCP, Azure,
              Nebius, or CoreWeave VPC, preserving data residency and allowing customers to use existing GPU
              reservations. BYOC includes 24x7 enterprise support with SLAs and unlimited case submissions, while Hosted
              is limited to business-hours support with five submissions. Pricing is usage-based with no monthly fixed
              fee; compute costs range from $0.0135/hr for CPU-only nodes to $9.288/hr for NVIDIA H100 and $10.6812/hr
              for H200 on the Hosted tier.


              Anyscale Lineage Tracking provides visual traceability across datasets and model training runs, enabling
              reproducibility audits and pipeline transparency. This enterprise feature addresses MLOps compliance needs
              that are increasingly material for regulated and safety-critical AI deployments.
