      - number: '1.2'
        title: Founders, leadership, and key-person risk
        blocks:
          - type: paragraph
            body: >
              Anyscale was founded by the core team that originally developed Ray at UC Berkeley's RISELab. The founding
              group includes Robert Nishihara (CEO), Philipp Moritz, Ion Stoica (Professor of Computer Science at UC
              Berkeley and co-creator of Apache Spark and Databricks), and Michael I. Jordan (James and Katherine Lau
              Professor of Statistics and EECS at UC Berkeley, and one of the most cited researchers in machine learning
              and statistics). The Ray academic paper, submitted to arXiv in December 2017 and accepted at USENIX OSDI
              2018, lists all four founders among eleven co-authors—a group that also includes Stephanie Wang, Alexey
              Tumanov, Richard Liaw, Eric Liang, Melih Elibol, Zongheng Yang, and William Paul.


              This founder composition represents exceptional founder-market fit by infrastructure software standards.
              Stoica and Jordan bring institutional credibility and deep academic networks. Nishihara and Moritz bring
              hands-on engineering ownership of the core framework. The combination has produced a technology asset with
              41,000+ GitHub stars and 500 million+ all-time downloads—metrics that validate both the technical quality
              and the adoption pull of the underlying open-source project. The risk is that much of Anyscale's technical
              differentiation is concentrated in the same people who are also the primary engineering leadership. If one
              or more founders depart, the company could face simultaneous leadership, product, and community
              credibility impacts.


              The public record does not disclose Anyscale's full executive org chart. Key engineering, sales, and
              operational leadership positions below the founding team are not named in public materials. This is
              typical for a private company of Anyscale's size, but it means diligence on management depth, succession
              planning, and single-point-of- failure risk for specific functional areas (particularly enterprise sales
              and infrastructure reliability) must rely on private diligence-room information rather than public
              sources.
