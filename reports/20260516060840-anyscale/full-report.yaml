      - number: '7.5'
        title: Technical and Operational Risks
        blocks:
          - type: paragraph
            body: >-
              Anyscale's technical risk profile centers on three vectors: Ray's inherent operational complexity, GPU
              supply chain and NVIDIA CUDA dependency, and distributed system security. Ray's learning curve is a
              documented practitioner criticism: self-managing a Ray cluster requires non-trivial engineering effort for
              cluster lifecycle management, autoscaling configuration, fault-tolerance tuning, and observability setup.
              While this complexity is the primary rationale for Anyscale's managed service, it also creates churn risk
              — organizations that adopt Ray during evaluation but find operational burden too high may abandon the
              framework entirely, choosing simpler alternatives like Modal or managed Kubernetes jobs. The Ray GitHub
              issue tracker and discussion forums show active community engagement with cluster management challenges,
              confirming the complexity signal. On GPU supply: Anyscale's inference and training workloads run on
              GPU-intensive compute, primarily NVIDIA hardware. Anyscale supports BYOC deployment on AWS, GCP, Azure,
              Nebius, and CoreWeave — cloud diversity that partially mitigates any single provider's GPU supply
              constraints. However, dependency on NVIDIA CUDA for GPU compute remains a structural risk: CUDA's
              proprietary ecosystem creates switching costs and means any NVIDIA supply disruption or pricing increase
              flows through to Anyscale's customers. AMD ROCm and open-source accelerator stacks are maturing
              alternatives, but adoption in production ML workloads remains limited. Security risks in distributed
              systems are inherent: Ray clusters expose network ports, manage process isolation across nodes, and handle
              sensitive model training data. CISA has specifically flagged AI system security as a critical
              infrastructure concern, and any security incident affecting a major Anyscale customer deployment would
              have reputational and commercial consequences. The Ray proxy state refactoring effort visible in GitHub
              issue #40000 reflects ongoing internal architectural work that, if misexecuted, could introduce
              regressions in cluster reliability. Anyscale does not publish a public security certification status page
              or incident history, which is a diligence gap for enterprise procurement.
