      - number: '4.6'
        blocks:
          - type: paragraph
            body: >
              Anyscale's financial trajectory hinges on three interlocking variables: GPU compute demand from foundation
              model builders, the competitive pricing environment from hyperscalers, and the pace of enterprise contract
              expansion. Three scenarios bracket the plausible financial range. In the bull case, continued AI
              infrastructure spending growth, strong Ray adoption metrics, and successful upsell of enterprise BYOC
              contracts drive ARR above $100M by 2027 at improving margins as compute costs decline; the company reaches
              profitability or a strong IPO-filing position within 3–4 years. In the base case, ARR grows to $50–80M by
              2027, margins remain at 30–45%, and the company raises a Series D at a valuation step-up from $1B,
              extending runway to 2028+. In the bear case, hyperscaler price reductions on GPU compute (e.g., AWS/GCP
              aggressively cutting managed ML pricing) compress Anyscale's compute margin to near zero, NRR softens as
              customers self-manage Ray via KubeRay, and the company faces a down-round or strategic exit scenario.


              The key adverse financial risk is the Neptune/OpenAI acquisition, which removes a complementary ML
              ecosystem tool and signals that OpenAI—a major potential future competitor in the AI infrastructure
              stack—is deliberately acquiring tools that augment training workflows. If OpenAI or other frontier labs
              vertically integrate compute orchestration (as they have done with neptune.ai for experiment tracking),
              Anyscale loses access to an important ecosystem tailwind. The financial implication is a potential
              narrowing of Anyscale's addressable customer base to externally-facing AI teams (as opposed to
              internally-focused foundation model builders who increasingly build their own infrastructure).
