  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and operating model
        blocks:
          - type: paragraph
            body: >
              Anyscale is incorporated as Anyscale, Inc. and operates as an AI infrastructure company headquartered at
              600 Harrison Street, 4th Floor, San Francisco, California 94107. The company describes its mission as
              "Make scalable computing effortless" and its vision as building "the future of distributed computing for
              AI and ML workflows." In practice, Anyscale is the commercial vehicle built to productize Ray, the
              distributed computing framework its founding team developed at the University of California, Berkeley's
              RISELab in 2016–2017. The company was formally incorporated in 2019, approximately two years after the Ray
              framework was demonstrated publicly.


              The operating model is a managed cloud platform. Anyscale wraps the open-source Ray framework in a
              production service that handles cluster management, autoscaling, fault tolerance, authentication,
              observability, and billing. Customers can deploy through Anyscale's Hosted option (fully managed, no
              infrastructure setup required) or through a Bring Your Own Cloud (BYOC) model that deploys inside the
              customer's own AWS, GCP, Azure, Nebius, or CoreWeave account. This dual-mode approach allows Anyscale to
              serve both early-stage AI teams that need fast onboarding and enterprise platform teams that require data
              residency or governance controls. The business generates revenue through pay-as-you-go consumption pricing
              with committed contract options, and billing is available either through Anyscale invoices or via cloud
              marketplace channels on AWS, GCP, and Azure.


              Anyscale's culture signals are notable for an early-stage AI infrastructure company. The careers page
              reports a 4.7 out of 5 Glassdoor rating and states that 94% of employees would recommend Anyscale to a
              friend. The company operates three office locations: San Francisco (headquarters), Palo Alto, and
              Bangalore, India. These culture metrics are self-reported and should be validated through independent
              employee review data, but they are directionally consistent with a company that has been able to attract
              research-caliber founders and maintain a focused engineering culture.
