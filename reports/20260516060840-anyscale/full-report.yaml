  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: >-
              Anyscale's most recent public valuation data point is its June 2024 Series C: $100M raised at a post-money
              valuation of approximately $1B, with pre-money implied at ~$900M. The round was led by Andreessen Horowitz
              (a16z) with participation from NEA, Google Ventures, and Intel Capital, all of whom had participated in
              prior rounds. This is the company's first publicly-disclosed billion-dollar valuation mark and establishes
              Anyscale as a confirmed AI infrastructure unicorn as of mid-2024.


              SEC EDGAR records for Anyscale, Inc. (CIK 0001785482, formerly Indigostack, Inc.) show three Form D
              exempt-offering filings as of the May 2026 research date. The earliest (accession 0001785482-20-000003,
              filed 2020-02-18) discloses a first sale date of 2019-08-02, total offering of $20,744,995, and 18
              investors — consistent with the combined Seed (~$5M) and Series A (~$20.6M) tranches. Directors named
              include Ion Stoica, Philipp Moritz, and Ben Horowitz, confirming a16z board participation from the
              earliest institutional raise. The second filing (accession 0001785482-21-000001, filed 2021-12-29)
              discloses a first sale date of 2021-10-15 and total offering of $102,285,932 across 7 investors, with
              Peter Sonsini (NEA) added as a new director. A subsequent amendment (Form D/A, 0001785482-22-000001, filed
              2022-09-06) expands the same offering to $199,185,923 across 13 investors — suggesting an extended Series
              B close that raised approximately $97M more than the publicly-reported $100M headline. No Form D
              corresponding to the 2024 Series C ($100M, ~$1B valuation) has been filed with the SEC as of this research
              date. This absence is a primary evidence gap requiring legal diligence.


              Total capital raised across confirmed SEC filings and the press-reported Series C is approximately $319.9M
              ($20.7M seed/A + $199.2M Series B extended + $100M Series C). The $1B post-money valuation at $319.9M
              cumulative raised implies a capital efficiency ratio of approximately 3.1× (valuation / total capital
              raised) — relatively capital-efficient for an AI infrastructure platform at Series C stage, though the
              ratio is limited by undisclosed ARR, which would sharpen this analysis considerably.


              Anyscale has not publicly disclosed its ARR, revenue growth rate, or financial projections. The
              Morningstar, PitchBook, and CB Insights platforms confirm Anyscale's unicorn status and funding history
              but do not have public ARR estimates with primary source backing. Based on the $1B valuation and
              structural analysis of comparable infrastructure-SaaS revenue multiples (10–25× ARR for AI infrastructure
              at Series C stage per Bessemer and Clouded Judgment benchmarks), ARR of $50–100M would be consistent with
              this valuation at market-rate multiples. This is an inference, not a disclosed figure, and should be
              treated as a working hypothesis pending direct confirmation.
