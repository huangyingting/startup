      - number: '4.4'
        title: Capital structure, governance, and investor rights
        blocks:
          - type: paragraph
            body: >
              The public record on Anyscale's cap table is incomplete. From SEC Form D filings, the following can be
              inferred: a16z (represented by Director Ben Horowitz) has held a board seat since at least the 2019
              offering; NEA (represented by Director Peter Sonsini) joined the board by the Series B in 2021; Google
              Ventures and Intel Capital are cited as Series C co-investors in press coverage and the GV portfolio
              confirmation page, though neither has filed director-level disclosures accessible through public sources.
              The Foundation Capital portfolio page lists Anyscale as a portfolio company, consistent with its reported
              Seed-stage participation.


              The company's legal entity is Anyscale, Inc., formerly incorporated as Indigostack, Inc., a Delaware
              corporation. Delaware incorporation is standard for VC-backed companies and enables standard
              preferred-stock structures with liquidation preferences, anti-dilution provisions, and ROFR rights. The
              exact preference stack, participation rights, and conversion triggers are not available from public
              sources. Based on the investment sequence (Seed, Series A, B, C), there are likely four series of
              preferred stock outstanding, with earlier investors carrying lower liquidation preferences per-share but
              potentially larger proportional stakes from their earlier entry prices.


              The presence of Google Ventures (a strategic investor aligned with Google Cloud) and Intel Capital
              (aligned with Intel hardware) alongside a16z and NEA creates potential for investor-driven strategic
              constraints. Any ROFR, preferred-cloud provisions, or strategic alignment clauses in the GV or Intel
              Capital investment agreements could affect Anyscale's cloud-agnostic positioning and should be a primary
              item in the legal diligence process.
            claimRefs:
