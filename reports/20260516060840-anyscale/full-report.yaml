  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Capital formation history and SEC filing evidence
        blocks:
          - type: paragraph
            body: >
              Anyscale, Inc. (CIK 0001785482, formerly Indigostack, Inc., incorporated in Delaware) has three Form D
              exempt- offering registrations on record with the SEC as of the research date. The earliest filing
              (accession number 0001785482-20-000003, Form D, filed 2020-02-18) reports a first sale date of 2019-08-02
              with a total offering amount of $20,744,995 involving 18 investors, coded as item 06b (equity). Directors
              and officers named include Robert Nishihara (CEO), Ion Stoica, Philipp Moritz, and Ben Horowitz—confirming
              a16z board participation from the earliest institutional round. This filing most likely consolidates the
              Seed and Series A tranches; the $20.7M is consistent with press-reported aggregate early-stage capital of
              ~$25.6M (Seed $5M from Foundation Capital and NEA in 2019, plus Series A ~$20.6M from a16z in late
              2019/early 2020).


              The second offering (accession number 0001785482-21-000001, Form D, filed 2021-12-29) reports a first sale
              date of 2021-10-15 with an initial total offering of $102,285,932 across 7 investors. Peter Sonsini (NEA)
              is added as a director, confirming NEA's continued participation alongside a16z. A subsequent amendment
              (Form D/A, filed 2022-09-06, accession 0001785482-22-000001) updates the same offering to $199,185,923
              with 13 investors. This amendment implies an extended Series B close that added six additional investors
              and approximately $97M in follow-on capital between December 2021 and September 2022—raising the probable
              total Series B to nearly $200M, materially above the publicly-reported $100M headline figure.


              The 2024 Series C ($100M at ~$1B valuation, led by a16z with NEA, Google Ventures, and Intel Capital) has
              no corresponding SEC Form D on record as of this research date. This either reflects a filing delay, a
              different exemption, or an unreported structural aspect of the round. The absence is flagged as a primary
              evidence gap requiring direct diligence inquiry with Anyscale's legal team.
