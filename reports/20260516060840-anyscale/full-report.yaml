  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Ray Framework Architecture and Technical Foundation
        blocks:
          - type: paragraph
            body: >
              Ray is the technical core of Anyscale's entire product strategy. The framework, documented at docs.ray.io
              under version 2.55.1 as of May 2026, provides a unified Python-native API for scaling distributed
              applications from a single laptop to thousands of GPU nodes. The architecture rests on three foundational
              abstractions: Tasks (stateless functions executed remotely), Actors (stateful worker processes that
              persist state across calls), and Objects (immutable values stored in a distributed object store). This
              task-parallel plus actor-based computation model, first published in the 2017 arXiv paper by Moritz,
              Nishihara, Stoica, Jordan, and collaborators, was a deliberate design choice to support the emerging class
              of AI workloads that mix stateless training steps with stateful serving processes and reinforcement
              learning agents.


              Above the core runtime sit six specialized AI libraries that provide high-level APIs for distinct ML
              lifecycle phases. Ray Data handles scalable data ingest and preprocessing with CPU/GPU co-scheduling. Ray
              Train provides distributed model training across PyTorch, XGBoost, HuggingFace, JAX, and TensorFlow. Ray
              Tune delivers hyperparameter search with parallelism across clusters. Ray Serve implements scalable model
              serving with composable deployment graphs. Ray RLlib supports reinforcement learning at scale. The
              unification of these libraries under a single runtime is Ray's most consequential architectural decision:
              competing frameworks require separate infrastructure stacks for training versus serving versus data, while
              Ray pipelines all phases through one scheduler and object store.


              Ray ships as a Python package on PyPI with Apache 2.0 license. The latest stable version is 2.55.1,
              released April 22, 2026, and requires Python ≥3.10 (with active support through Python 3.14). The
              repository on GitHub has accumulated 42.6k stars and 7.6k forks, indicating broad community reach. Active
              development is reflected in 2.9k open issues, 584 open pull requests, and 30,371 total commits. The
              Kubernetes integration via KubeRay is documented in the official cluster guide and enables deployment on
              any managed Kubernetes service without Anyscale's managed layer—a self-hosted path that is central to
              understanding Anyscale's commercial conversion challenge.
