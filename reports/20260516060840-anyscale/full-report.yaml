      - number: '3.4'
        title: Open-source and infrastructure substitutes
        blocks:
          - type: paragraph
            body: >
              The open-source tier represents the most structurally important substitution risk for Anyscale, because it
              captures developer mindshare without any direct revenue transaction. KubeRay — the official Kubernetes
              operator for the Ray framework — allows teams to self-host Ray clusters on any Kubernetes distribution,
              including AWS EKS, Google GKE, and Azure AKS. Teams with strong Kubernetes engineering capacity can use
              KubeRay at near-zero marginal cost, replacing Anyscale's management layer entirely. SkyPilot is an
              open-source multi-cloud job scheduler that abstracts GPU procurement across AWS, GCP, Azure, and Lambda
              Labs, targeting teams that want cloud-provider-agnostic workload routing without vendor lock-in. Kubeflow
              is a Kubernetes-native ML toolkit for distributed training, pipelines, hyperparameter tuning, and serving,
              developed initially by Google and maintained by the CNCF community. MLflow is an open-source AI platform
              with 30 million-plus monthly downloads, backed by the Linux Foundation, providing observability,
              evaluation, prompt versioning, an AI Gateway, and an Agent Server for production deployment. MLflow is
              complementary to Anyscale in experiment tracking but does not provide compute orchestration or distributed
              training infrastructure. Metaflow is a Netflix open-source ML framework that supports bring-your-own cloud
              deployment on AWS, Azure, and GCP with single-command production deployment. Prefect provides workflow
              orchestration and AI infrastructure tooling, positioned as an alternative for teams that need data
              pipeline coordination without distributed compute scale. Each of these tools reduces Anyscale's
              serviceable market by capturing the self-service segment, but none provides the integrated multi-workload
              managed platform with enterprise support that Anyscale targets.
            claimRefs:
