  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Overview and Prioritization
        blocks:
          - type: paragraph
            body: >-
              Anyscale's material risks cluster into six categories ranked by a composite of likelihood and impact: (1)
              competitive displacement by hyperscalers and adjacent platforms, (2) open-source self-hosting substitution
              via KubeRay, (3) key-person concentration in the founding team, (4) regulatory and legal compliance across
              GDPR, EU AI Act, and evolving US frameworks, (5) technical and operational risks including GPU supply
              chain and Ray complexity churn, and (6) financial and macro risks tied to AI spending correlation and burn
              rate opacity. The master risk registry below rates each on a four-point likelihood scale
              (Low/Medium/High/Very High) and a four-point impact scale (Limited/Moderate/Significant/Critical). The two
              highest-residual-risk categories are hyperscaler competition and OSS self-hosting, because both are
              already materializing in the market: AWS SageMaker, Google Vertex AI, and Databricks have all received
              Gartner or IDC Leader designations in AI platform categories that overlap with Anyscale's value
              proposition, while KubeRay's official production deployments at multiple named companies demonstrate that
              free self-hosting is viable. The remaining four categories carry medium residual risk with identifiable
              mitigants. Regulatory risk is partially mitigated by Anyscale's documented GDPR/DPF compliance and the EU
              AI Act's extended transition timelines; key-person risk lacks a publicly named succession plan; technical
              risk is partially managed through managed platform abstraction; and financial risk is opaque due to the
              absence of public revenue or burn disclosures.
