      - number: '6.5'
        title: Retention, Concentration Risks, and Adverse Signals
        blocks:
          - type: paragraph
            body: >-
              Anyscale's retention durability cannot be assessed from public sources. No NRR, GRR, churn, cohort, or
              renewal data is available. The absence of such disclosure is typical for a private company at Anyscale's
              stage, but it means the diligence judgment on retention durability must rely on proxy signals and
              structural analysis. The structural retention argument is that Ray's API becomes deeply embedded in
              customer codebases—distributed training jobs, data pipelines, and serving deployments are all written
              against Ray's @ray.remote decorator and actor model. Once a team's ML infrastructure is Ray-native,
              switching to a different framework requires rewriting substantial application code. This creates natural
              switching costs that favor Anyscale's BYOC model in particular. The structural churn risk is the
              self-hosting alternative. KubeRay provides a fully open-source, officially maintained Kubernetes operator
              that gives any team with Kubernetes expertise the ability to run Ray without Anyscale's managed service.
              The KubeRay quickstart guide on GitHub documents a sub-10-minute deployment path. The blog.det.life post
              "Why Your MLOps Stack Is Wrong: Ditch Ray, Use Simple Async Python Instead" represents active practitioner
              critique of Ray's complexity relative to simpler tools, arguing that many teams do not need Ray's
              distributed capabilities and would be better served by lightweight async Python. Neptune.ai's blog on Ray
              alternatives (prior to Neptune's acquisition by OpenAI) documented competing frameworks including Dask,
              Prefect, Airflow, and Modal as viable alternatives for specific workload profiles. Modal.com explicitly
              targets developers who find Ray's programming model too complex, offering a simpler GPU-compute interface.
              Customer concentration is undisclosed; a small number of high-GPU-usage customers could represent a
              disproportionate share of Anyscale's revenue, a structural risk that requires private diligence to assess.
              The expansion and concentration risks table captures these structural uncertainties.
