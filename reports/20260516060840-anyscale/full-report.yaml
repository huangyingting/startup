        title: Developer Adoption Signals and Ecosystem Strength
        blocks:
          - type: paragraph
            body: >
              Ray's developer adoption metrics provide the strongest external validation of Anyscale's technical
              position. As of May 2026, the ray-project/ray GitHub repository has 42.6k stars, 7.6k forks, 584 open pull
