      - number: '4.3'
        title: Unit economics and gross margin analysis
        blocks:
          - type: paragraph
            body: >
              Anyscale's unit economics are not publicly disclosed. The following estimates are derived from structural
              analysis of the pricing model, comparable public infrastructure-software benchmarks, and the compute-cost
              arithmetic observable from Anyscale's published rate card. A key distinction exists between the Hosted
              tier (where Anyscale bears the infrastructure cost and therefore has a direct gross-margin stake on each
              hour billed) and the BYOC tier (where the customer bears cloud infrastructure cost and Anyscale earns a
              platform-management fee layer with structurally higher margins).


              For the Hosted tier, Anyscale purchases GPU compute from cloud providers at negotiated rates and resells
              it plus the platform margin. On-demand pricing for NVIDIA H100 instances on AWS is publicly quoted at
              approximately $12–14/hr before any enterprise discount. Anyscale's published H100 rate of $9.29/hr implies
              either that Anyscale operates primarily on reserved or committed-instance pricing from cloud providers
              (which can be 40–60% below on-demand for 1-3 year terms) or that H100 spot rates are being applied. Rough
              arithmetic suggests a compute cost basis of $5–8/hr for H100 at scale, leaving an implied platform margin
              of $1–4/hr (roughly 15– 40%). When blended with lower-margin CPU instances and higher-margin
              software-management overhead from BYOC clients, blended gross margin is estimated at 30–50%. This range is
              consistent with published benchmarks for cloud infrastructure software companies that combine hardware
              pass-through with SaaS management layers.


              Customer Acquisition Cost (CAC) and Net Revenue Retention (NRR) are entirely undisclosed. The startup
              program's $20K credits suggest an intentional loss-leader CAC strategy to seed large future accounts.
              Land-and-expand economics are plausible given that Ray adoption typically begins with one workload (e.g.,
              batch inference) and grows to cover training, fine-tuning, and serving—multiplying compute consumption per
              customer over time.
