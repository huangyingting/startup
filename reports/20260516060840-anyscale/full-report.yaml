          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.4'
        title: Bull / Base / Bear Scenarios
        blocks:
          - type: paragraph
            body: >-
              Three explicit scenarios frame the investment outcome distribution for Anyscale. Each is anchored on
              different assumptions about ARR trajectory, competitive dynamics, and exit multiple environment.
              Probability signals are qualitative assessments based on market evidence and competitive analysis; they do
              not represent mathematical probability estimates.


              Bull Case (Probability signal: Possible, ~25%): Anyscale reaches $150M+ ARR by end-2026 driven by strong
              enterprise uptake of its unified Ray platform across LLM fine-tuning, batch inference, and real-time
              serving workloads. Net Revenue Retention (NRR) exceeds 120%, consistent with land-and-expand dynamics
              observed in comparable infrastructure platforms. The Ray open-source community flywheel (500M+ downloads)
              continues to drive top-of-funnel conversion, while the enterprise BYOC model protects gross margins at
              45–55%. Anyscale raises a Series D at 20–25× forward ARR, implying a $3–5B post- money valuation. Exit via
              IPO or strategic acquisition at $5–10B is achievable by 2028–2030. Key driver: OpenAI and other top-tier
              foundation model builders continue to grow compute consumption on Anyscale, creating a reference customer
              halo that accelerates enterprise land-and-expand.


              Base Case (Probability signal: Most likely, ~45%): Anyscale reaches $75–100M ARR by end-2026, growing
              40–50% annually. NRR is 105–115%, indicating moderate land-and-expand dynamics but some price sensitivity
              as customers evaluate hyperscaler alternatives. The $1B Series C valuation holds through Series D, with a
              likely raise at 14–18× ARR implying $1.1–1.8B post-money. Exit via strategic acquisition at $2–4B is the
              most likely scenario over a 4–6 year horizon. Key risk: Databricks and AWS SageMaker continue to win large
              data-platform enterprise accounts where Anyscale's compute-only positioning is insufficient.


              Bear Case (Probability signal: Plausible downside, ~30%): Anyscale's ARR growth stalls below $50M due to a
              combination of hyperscaler competition, KubeRay self-hosting adoption by cost-sensitive teams, and AI
              spending normalization. Multiple compression brings private infrastructure-SaaS valuations from 20× toward
              8–10× ARR as the EMCLOUD benchmark warns. A flat or down Series D at $600M–$800M becomes the most likely
              next financing. The Clouded Judgment weekly SaaS multiple tracker documents ongoing compression risk from
              public benchmarks that inform private market sentiment. Exit via distressed sale or acqui-hire at
              $300–600M becomes a real risk scenario, with Google Ventures and Intel Capital potentially exercising ROFR
              or board influence over exit path. Key trigger: AWS or Google announces a free managed Ray service bundled
              with cloud credits, removing Anyscale's core commercial value proposition for midmarket customers.
            claimRefs:
              - CV030
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
          - type: table
            tableRef: TV004
            claimRefs: []
          - type: figure
            figureRef: FV001
            claimRefs: []
      - number: '8.5'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for Anyscale rests on five converging signals. First, the Ray open-source ecosystem
              provides a durable top-of-funnel advantage that no hyperscaler can replicate without forking or replacing
              the framework — an estimated 500M+ downloads and 41,000+ GitHub stars represent years of community
              investment and developer trust. Second, the AI infrastructure market is growing rapidly: the CB Insights
              Anyscale profile content from VentureBeat's Q1 2026 AI Infrastructure and Compute Market Tracker shows
              that managed inference outsourcing intent jumped from 13.2% to 23.1% of enterprise buyers in a single
              quarter, directly expanding Anyscale's serviceable market. Third, Bessemer's State of the Cloud 2024
              report identifies the "AI Cloud" as having rebounded the private market even while public EMCLOUD trades
              at historical norms, confirming that investors continue to assign premium multiples to AI infrastructure
              platforms with demonstrable technical differentiation. Fourth, Anyscale's multi-cloud, BYOC architecture
              directly addresses enterprise data sovereignty requirements that single-cloud SaaS products cannot meet.
              Fifth, the Databricks trajectory — from Series E in 2021 at $10B to Series J in December 2024 at $62B —
              demonstrates a viable valuation escalation path for AI data infrastructure platforms over a 3–5 year
              horizon.


              The anti-thesis rests on three structural concerns. First, hyperscaler competition is intensifying: AWS
              SageMaker, Google Vertex AI, and Databricks (which offers Ray on Databricks) compete directly with
              Anyscale's core product and can bundle managed services with cloud commit credits that no independent
              vendor can match. Second, KubeRay — the official Kubernetes operator for Ray maintained as an open-source
              project — provides a credible self-hosting path for DevOps-competent teams, creating a ceiling on
              Anyscale's TAM among cost-sensitive engineering organizations. Third, and most importantly for valuation,
              Anyscale has not publicly disclosed its ARR, NRR, burn rate, or gross margins. This opacity makes it
              impossible to independently verify whether the $1B valuation is supported by current fundamentals — a risk
              that grows with each quarter that passes since the June 2024 Series C without a financial update. The
              absence of a Series C Form D filing with the SEC adds an additional layer of structural uncertainty about
              round structure.
            claimRefs:
              - CV037
              - CV038
              - CV039
              - CV040
              - CV041
              - CV042
          - type: table
            tableRef: TV005
            claimRefs: []
      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Anyscale's exit readiness is assessed as emerging. The company has the customer base, market positioning,
              and investor backing to pursue either an IPO or strategic acquisition, but the financial disclosure gap
              (no public ARR, margin, or NRR data) means that IPO readiness is 3–5 years away at minimum, subject to
              accelerating ARR disclosure and a favorable public market environment.


              The most probable exit path is strategic acquisition. Google (via Google Cloud and GV strategic stake),
              Microsoft (Azure ML complementarity), and AWS (SageMaker competitive gap) are all credible acquirers at
              valuations of $2–6B depending on ARR at time of exit. The GV strategic investment introduces potential
              information rights and preferential negotiation dynamics that may affect competitive auction dynamics.
              NVIDIA is a potential strategic acquirer given Ray's role in distributed GPU orchestration.


              IPO is a secondary option contingent on $200M+ ARR with above-median NRR and gross margin. The CB Insights
              Q1 2026 data showing exits at a two-year low suggests that the IPO window remains narrow and that
              strategic M&A may be the more realistic liquidity event for the current fundraising cohort.


              The six thesis-break triggers that would require immediate investment thesis reassessment are: (1) a
              hyperscaler announcing free managed Ray service; (2) ARR disclosed below $40M at Series D time; (3) NRR
              below 100% (indicating net churn); (4) Ion Stoica or Robert Nishihara departure; (5) Ray open-source
              license change to non-permissive terms; and (6) Series D at valuation below $800M (confirmed down round).
              Final diligence asks are documented in TV006.
            claimRefs:
              - CV043
              - CV044
              - CV045
          - type: table
            tableRef: TV006
            claimRefs: []
