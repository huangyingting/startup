      - number: '5.6'
        title: Technical Risks, Debt, and Roadmap Gaps
        blocks:
          - type: paragraph
            body: >
              Four technical risk vectors warrant diligence attention. First, Ray's operational complexity is a known
              friction point. Unlike SaaS-native tools such as Modal or Runpod that abstract the cluster entirely, Ray
              exposes distributed execution semantics (actors, object stores, scheduling) to the developer. For ML
              engineers whose core skill is model development rather than systems programming, the Ray mental model
              creates a learning cliff. Community practitioner posts explicitly recommend avoiding Ray for teams that do
              not need multi-node distribution at scale. This limits the addressable developer base to ML platform
              engineers and infrastructure- aware teams.


              Second, the open-source/commercial tension is structural. Any team with Kubernetes competency can
              self-host Ray via KubeRay—the official Kubernetes operator—and obtain the same distributed computing
              capabilities without an Anyscale subscription. The KubeRay path is documented in Ray's official cluster
              guide and is actively maintained by the Ray community. Anyscale's commercial value therefore depends on
              operational complexity savings (head node resilience, autoscaling, observability, lineage tracking) and
              access to enterprise support SLAs being worth the compute markup—a value proposition that is compelling
              for production-scale teams but frequently re-evaluated at budget cycles.


              Third, GPU dependency is a structural cost risk. Anyscale's Hosted tier prices compute at market-rate GPU
              premiums (H100 at $9.288/hr, H200 at $10.6812/hr). As GPU spot market prices decline and cloud providers
              reduce on-demand pricing, Anyscale's compute margin will compress. The BYOC model partially mitigates this
              by allowing customers to bring their own reserved GPU capacity, but Hosted margin is exposed to spot
              pricing.


              Fourth, performance overhead from the Ray actor system adds latency relative to bare-metal Kubernetes
              workloads. Ray's GCS (Global Control Store) and Plasma object store introduce inter-node communication
              overhead for task scheduling and object transfer. For latency-sensitive inference applications, this
              overhead is measurable and competing tools (vLLM, TGI) offer lower raw serving latency when deployed
              without Ray's orchestration layer. Anyscale's composite AI inference product absorbs this tradeoff by
              providing pipeline orchestration benefits that justify the latency cost, but it is a valid engineering
              objection for pure single-model serving.
            claimRefs:
              - CE035
              - CE036
              - CE037
              - CE038
              - CE039
