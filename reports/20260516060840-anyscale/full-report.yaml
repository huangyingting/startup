      - number: '7.7'
        title: Financial Risk, Macro Exposure, and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Anyscale's financial risk profile is shaped by three intersecting factors: undisclosed burn rate,
              GPU-margin sensitivity, and AI spending correlation. The company's revenue is usage-based compute billing,
              making it highly correlated with AI adoption velocity. If enterprise AI spending slows — due to
              macroeconomic pressure, ROI skepticism, or consolidation to hyperscaler native tools — Anyscale's revenue
              would decline proportionally with no structural floor from recurring SaaS contracts. The Series C of $100M
              (June 2024) extended runway, but with no public ARR disclosure and no disclosed monthly burn, the precise
              runway cannot be calculated. The Bloomberg-reported $1B valuation at Series C implies growth expectations
              that require continued AI infrastructure investment acceleration. GPU-margin exposure is a compounding
              risk: Anyscale's Hosted tier absorbs cloud infrastructure costs and resells at a markup, making blended
              margin sensitive to GPU instance pricing. Hyperscaler price reductions on GPU compute (which have been the
              historical trend for CPU compute) would compress Anyscale's margin unless offset by platform fee growth.
              The stateofaireport.com profile confirms Anyscale's positioning in analyst tracking but does not provide
              revenue benchmarks. Kill criteria for the investment thesis are identifiable: a hyperscaler launching free
              or deeply discounted managed Ray-equivalent service, Ion Stoica leaving Anyscale for full-time academic
              return, revenue stagnation below expected thresholds at Series D timing, a major GDPR enforcement action,
              or a forced open-source license change under revenue pressure would each individually or combinatorially
              challenge the thesis. The monitoring table below defines specific observable triggers for each kill
