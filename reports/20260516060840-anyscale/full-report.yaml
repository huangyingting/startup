      - number: '2.2'
        title: Market sizing — TAM, SAM, and SOM triangulation
        blocks:
          - type: paragraph
            body: >
              No analyst publishes a market size for "managed Ray orchestration" as an isolated category, so the sizing
              relies on triangulating three perspectives: top-down analyst estimates for adjacent markets, bottom-up
              estimates from enterprise ML team count and spend per team, and cross-checks from comparable
              infrastructure platform transactions.


              The broadest framing — the entire AI market including hardware, software, and services — is tracked by
              Grand View Research, MarketsandMarkets, and Gartner at figures in the hundreds of billions of dollars by
              2030. These figures are not useful as Anyscale TAMs because they include hardware spend and
              application-layer services that Anyscale does not address. a16z has published analysis framing AI
              infrastructure as a distinct investment category, separating compute procurement from software tooling.
              The relevant sub-market — AI/ML software platforms and infrastructure tooling excluding hardware — is
              estimated by analyst consensus at $15–50 billion in 2026 growing at 30–40% CAGR. Forrester's Q3 2024 Wave
              on AI/ML platforms covers this space as a formally contested market with multiple major vendors including
              Databricks, AWS, Google, and Microsoft Azure ML.


              Anyscale's SAM is further narrowed to enterprises whose ML workloads are large enough to require
              distributed compute orchestration — roughly, teams running multi-node GPU or CPU training jobs or serving
              models at more than a few hundred requests per second. Bottom-up: if the global population of enterprise
              ML platform teams is approximately 5,000–10,000 (based on Fortune 2000 companies with mature ML practices
              plus AI-native companies with significant engineering headcount), and average annual spend on ML compute
              orchestration software is $500K–$2M per team per year, the SAM ranges from $2.5 billion to $20 billion.
              Taking the midpoint of both ranges yields approximately $5 billion. Top-down: if the AI/ML platform market
              is $15–50 billion in 2026 and the addressable subset for distributed compute orchestration is
              approximately 20–30% of that, the SAM is $3–15 billion. These two methods triangulate to a SAM of $3–8
              billion in 2026.


              The SOM for Anyscale in 2026 is smaller still, limited by current product coverage, sales capacity, and
              competition. Anyscale's current product is strongest for teams already using Ray (estimated at tens of
              thousands of organizations given Ray's 500M+ downloads) but converting primarily those with both scale
              requirements and willingness to pay for a managed layer. Assuming 1–5% SAM penetration in 2026 —
              consistent with an early-growth enterprise infrastructure company — the SOM is approximately $150 million
              to $400 million. The upper bound expands to $600 million if Anyscale successfully penetrates the
              hyperscaler-customer and AI-native startup segments.
