        title: Capital base and investor map
        blocks:
          - type: paragraph
            body: >
              Anyscale has completed multiple venture funding rounds, with a June 2024 Series C of $100 million
              establishing the company at an approximately $1 billion (unicorn) valuation. craft.co data independently
              tracked the market valuation at $1 billion as of December 9, 2021, suggesting the Series B valuation also
              reached or approached that level. The publicly known investor base includes Andreessen Horowitz (a16z),
              NEA, Google Ventures, Intel Capital, and Foundation Capital. The combination of a16z (the leading AI
              infrastructure investor), Google Ventures (strategic alignment with GCP), and Intel Capital (hardware
              ecosystem alignment) is a strategically coherent syndicate for an AI compute platform company.


              The full cap table is not publicly available. The cumulative disclosed funding is over $60 million per
              craft.co (an incomplete figure that predates later rounds), and the aggregate across all disclosed rounds
              through the Series C is estimated at over $225 million. Specific stake sizes, liquidation preferences,
              pro-rata rights, board composition changes from each round, and secondary transaction history are not
              available in public sources. The presence of Google Ventures is notable for a company that also supports
              AWS and Azure as deployment targets— any preferred cloud, ROFR, or strategic alignment clauses in the
              investment agreement should be a primary diligence ask. Intel Capital's participation is similarly worth
              investigating for hardware exclusivity or preferential pricing commitments that could affect
              cloud-agnostic positioning.
