      - number: '1.3'
        title: Ray open-source platform and technical foundation
        blocks:
          - type: paragraph
            body: >
              Ray is the central technical asset in Anyscale's strategy. As of 2026, the framework has accumulated more
              than 41,000 GitHub stars, over 500 million all-time downloads, and more than 1,200 contributors to the
              open-source project. These metrics position Ray as the most widely adopted distributed computing framework
              for AI and ML workloads—surpassing alternatives including Apache Spark for AI-native use cases and
              outpacing newer entrants such as Kubeflow for general-purpose distributed training. The technical
              foundation for this scale is the OSDI 2018 paper that demonstrated Ray scaling beyond 1.8 million tasks
              per second in benchmarks, a result that validated the framework's viability for production distributed
              systems at extreme scale.


              Ray's architecture consists of a core distributed runtime and a set of domain-specific AI libraries: Ray
              Data for data preprocessing and streaming, Ray Train for distributed model training, Ray Tune for
              hyperparameter optimization, RLlib for reinforcement learning, and Ray Serve for model serving and
              deployment. This breadth means Anyscale can serve the full AI development lifecycle—from data curation
              through training, fine-tuning, and serving—rather than just one stage. The breadth also creates a larger
              land-and-expand surface: a team that adopts Ray Serve for inference can later expand to Ray Train for
              fine-tuning without switching vendors.


              The managed platform integrates with the open-source framework through the KubeRay operator for
              self-hosted deployments and through Anyscale's proprietary platform for managed deployments. Ray's own
              documentation explicitly describes Anyscale as "the managed Ray platform developed by the creators of Ray"
              and lists KubeRay as the recommended self-hosted path. This means Anyscale benefits from users who
              research Ray, discover Anyscale via the official documentation, and convert to the managed service when
              they decide they need production-grade infrastructure support.
            claimRefs:
