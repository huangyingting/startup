      - number: '2.5'
        title: Adoption funnel and value-chain position
        blocks:
          - type: paragraph
            body: >
              Anyscale's adoption funnel is unusual among enterprise software companies because it begins with
              open-source Ray — a public good that Anyscale distributes freely. This creates a top-of-funnel measured in
              the millions of Ray users globally rather than the thousands of Anyscale enterprise prospects. The funnel
              from open-source user to paid customer has multiple stages, each with different conversion economics.


              Stage one is Ray discovery and adoption. An ML engineer or data scientist discovers Ray (via GitHub,
              research paper, colleague recommendation, or Anyscale-sponsored conference) and integrates it into a
              project. At 500 million+ all-time downloads and 41,000+ GitHub stars, Ray's installed base is large and
              growing. This is the top of Anyscale's demand funnel but generates no direct revenue.


              Stage two is scale-triggered consideration. As the Ray-based workload grows — more models, larger
              datasets, more frequent training cycles — the team hits operational complexity that exceeds what a simple
              script or single developer can manage. This is typically manifested as cluster instability, failed
              training jobs, difficulty onboarding additional team members, or inability to utilize spot instances
              efficiently. At this stage, the team evaluates managed options: Anyscale Platform, self-managed KubeRay,
              or cloud-native alternatives.


              Stage three is the managed platform decision. The team compares Anyscale to KubeRay (self-managed),
              SageMaker (if on AWS), or Vertex AI (if on GCP). The decision factors are engineering overhead,
              operational reliability, multi-cloud flexibility, and cost. Anyscale's Hosted and BYOC options address
              different risk profiles: BYOC reduces data-residency concerns while Hosted minimizes setup effort.


              Stage four is enterprise contract and expansion. Initial contracts are typically consumption-based.
              Expansion follows as teams add more workloads, users, and cloud regions. Anyscale's marketplace billing —
              available on AWS, GCP, and Azure — enables customers to draw down from existing committed cloud spend,
              reducing procurement friction. The value chain position for Anyscale sits above cloud compute (IaaS) and
              below AI applications — in the infrastructure software layer where gross margins are historically higher
              (60–80%) than hardware resale.
