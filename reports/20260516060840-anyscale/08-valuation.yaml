- id: FV003
  title: Valuation range by scenario — Anyscale ($B)
  type: range
  layout: wide
  insight: The base case ($1.1–1.8B) implies a modest valuation step-up from the $1B Series C. The bull case ($3.0–5.0B) requires
    $150M+ ARR with 20–30× multiple. The bear case ($0.3–0.5B) represents a significant down round driven by multiple compression
    and competitive displacement.
