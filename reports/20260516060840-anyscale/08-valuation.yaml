- id: section-V3
  title: Valuation Methodologies
  body: |-
    Four valuation methodologies are applied to Anyscale. Each has significant limitations given the absence of public financial disclosures; all results are estimated ranges, not confirmed valuations.

    Method 1 — Revenue Multiple: At $1B post-money valuation, an implied ARR range of $50–100M would place the revenue multiple at 10–20× ARR. Infrastructure SaaS companies with above-median growth trade at 15–25× forward ARR in the private market (per Bessemer State of Cloud 2024 benchmarks for cloud-native infrastructure). At $80M ARR (base case midpoint), the 12.5× multiple is consistent with moderately-growing infrastructure SaaS businesses. The $1B valuation is defensible at ARR ≥ $60–70M with >50% YoY growth; it becomes a stretch below $50M ARR.

    Method 2 — Comparable Transaction Analysis: Private AI infrastructure peers trade at 15–40× ARR in recent financings (Databricks 39×, Together AI ~25× estimated, Hugging Face ~90× for a hub-model business). Applying 15–25× to an Anyscale ARR range of $50–100M yields an implied valuation of $750M to $2.5B, with $1B sitting at the midpoint or slightly below the midpoint. At this range, the $1B valuation is fairly priced assuming ARR is ~$60–80M with strong growth. The Databricks precedent suggests that AI-native data infrastructure companies can sustain 30–40× ARR multiples at scale, providing an aspirational ceiling for Anyscale's trajectory.

    Method 3 — DCF Proxy: A full discounted cash flow analysis is not feasible without disclosed financials. A structural proxy using $80M ARR (midpoint estimate), 50% annual revenue growth for three years then 30% thereafter, 40% terminal gross margin, and a 30% discount rate yields an estimated NPV of $700M–$1.2B over a 10-year horizon — directionally consistent with the $1B valuation mark but highly sensitive to assumed growth rates and margins. A sensitivity analysis suggests the DCF range spans $300M (bear: 30% growth, 35% margin) to $2.5B (bull: 70% growth, 55% margin). This proxy should be replaced with actual financials when available.

    Method 4 — Strategic Acquirer Premium: Anyscale's multi-cloud Ray management layer, open-source community (500M+ Ray downloads, 41,000+ GitHub stars per prior chapter research), and enterprise customer base (OpenAI, Uber, Spotify, Pinterest, Virgin Pulse) make it a credible acquisition target for Google (Cloud AI infrastructure synergy), Microsoft (Azure ML and GitHub integration), and AWS (SageMaker competitive gap). Strategic acquirers typically pay a 30–50% premium over financial value, implying a $1.3–1.5B floor and a potential $3–5B ceiling if Anyscale reaches $150M+ ARR before an exit. The presence of Google Ventures on the cap table as a strategic investor introduces potential ROFR considerations that should be reviewed in legal diligence.
