    - AWS SageMaker, Google Vertex AI, Databricks Ray on Databricks named as Gartner/IDC Leaders
    - Anyscale wins two or more large ($5M+ ARR) marquee competitive displacements from hyperscaler
  - - Anti-thesis (−)
    - KubeRay self-hosting risk constrains commercial conversion
    - KubeRay is an official CNCF project with production deployments at multiple enterprises
    - Net new enterprise logos significantly outpace community-to-commercial conversion historical rate
  - - Anti-thesis (−)
    - Financial opacity makes valuation unverifiable
    - No public ARR, NRR, margin, or burn rate disclosures as of May 2026
    - Anyscale provides audited financials or a credible independent analyst estimate with primary sourcing
  - - Anti-thesis (−)
    - 'CB Insights Q1 2026: exits at two-year low, constraining return timeline'
    - 'CB Insights State of Venture Q1 2026: exit volumes declined to two-year low despite record funding'
    - IPO window reopens with AI SaaS public listings reaching revenue scale
  sourceRefs:
