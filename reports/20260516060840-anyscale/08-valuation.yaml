  letter: V
  summary: 'Anyscale''s most recent valuation anchor is its June 2024 Series C: $100M raised at a ~$1B post-money valuation
    (pre-money ~$900M), led by a16z with participation from NEA, Google Ventures, and Intel Capital. SEC EDGAR Form D records
    show three exempt-offering filings totaling ~$220M in disclosed capital (2020–2022); the Series C has no corresponding
    Form D on file, creating a primary evidence gap. The $1B valuation implies an ARR multiple of approximately 10–20× if
    ARR is $50–100M — within the range of comparable AI infrastructure SaaS peers (Databricks ~39× ARR at $62B December 2024;
    public infrastructure SaaS median approximately 8–15× NTM revenue per Bessemer EMCLOUD). The bull case rests on Anyscale
    reaching $150M+ ARR with the Ray ecosystem flywheel intact, implying a $2.5–5B Series D or exit valuation. The base case
    targets $80M ARR and a $1.2–1.5B Series D at 15× ARR. The bear case — driven by hyperscaler displacement or multiple compression
    — implies $300–500M at 8–10× ARR on $40M revenue. A conditional positive investment view is warranted given Anyscale''s
    Ray OSS moat, the growth of the AI infrastructure market, and credible strategic exit paths (Google, Microsoft, AWS);
    however, entry discipline requires confirmation of ARR ≥ $60M, NRR ≥ 110%, and resolution of the Series C Form D gap before
    committing.'
