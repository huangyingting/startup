- id: section-V4
  title: Bull / Base / Bear Scenarios
  body: |-
    Three explicit scenarios frame the investment outcome distribution for Anyscale. Each is anchored on different assumptions about ARR trajectory, competitive dynamics, and exit multiple environment. Probability signals are qualitative assessments based on market evidence and competitive analysis; they do not represent mathematical probability estimates.

    Bull Case (Probability signal: Possible, ~25%): Anyscale reaches $150M+ ARR by end-2026 driven by strong enterprise uptake of its unified Ray platform across LLM fine-tuning, batch inference, and real-time serving workloads. Net Revenue Retention (NRR) exceeds 120%, consistent with land-and-expand dynamics observed in comparable infrastructure platforms. The Ray open-source community flywheel (500M+ downloads) continues to drive top-of-funnel conversion, while the enterprise BYOC model protects gross margins at 45–55%. Anyscale raises a Series D at 20–25× forward ARR, implying a $3–5B post- money valuation. Exit via IPO or strategic acquisition at $5–10B is achievable by 2028–2030. Key driver: OpenAI and other top-tier foundation model builders continue to grow compute consumption on Anyscale, creating a reference customer halo that accelerates enterprise land-and-expand.

    Base Case (Probability signal: Most likely, ~45%): Anyscale reaches $75–100M ARR by end-2026, growing 40–50% annually. NRR is 105–115%, indicating moderate land-and-expand dynamics but some price sensitivity as customers evaluate hyperscaler alternatives. The $1B Series C valuation holds through Series D, with a likely raise at 14–18× ARR implying $1.1–1.8B post-money. Exit via strategic acquisition at $2–4B is the most likely scenario over a 4–6 year horizon. Key risk: Databricks and AWS SageMaker continue to win large data-platform enterprise accounts where Anyscale's compute-only positioning is insufficient.

    Bear Case (Probability signal: Plausible downside, ~30%): Anyscale's ARR growth stalls below $50M due to a combination of hyperscaler competition, KubeRay self-hosting adoption by cost-sensitive teams, and AI spending normalization. Multiple compression brings private infrastructure-SaaS valuations from 20× toward 8–10× ARR as the EMCLOUD benchmark warns. A flat or down Series D at $600M–$800M becomes the most likely next financing. The Clouded Judgment weekly SaaS multiple tracker documents ongoing compression risk from public benchmarks that inform private market sentiment. Exit via distressed sale or acqui-hire at $300–600M becomes a real risk scenario, with Google Ventures and Intel Capital potentially exercising ROFR or board influence over exit path. Key trigger: AWS or Google announces a free managed Ray service bundled with cloud credits, removing Anyscale's core commercial value proposition for midmarket customers.
