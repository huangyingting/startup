figures:
- id: FV001
  title: Recommendation logic — from evidence to conditional positive
  type: flow
  layout: wide
  insight: The conditional positive recommendation flows from the intersection of a strong technical moat (Ray OSS), demonstrated
    market demand (managed inference growth), and credible exit paths (Google/MSFT/AWS) — gated by the requirement to confirm
    ARR ≥ $60M and resolve the Series C Form D gap before committing.
  data:
    nodes:
    - id: f1
      label: Technical Moat (High)
      description: Ray OSS 500M+ downloads; 41K+ GitHub stars; no viable hyperscaler replacement
    - id: f2
      label: Market Demand (Growing)
      description: Managed inference intent 13.2% → 23.1% in one quarter per VentureBeat Q1 2026 tracker
    - id: f3
      label: Comparable Valuation (At Market)
      description: $1B defensible at $60–100M ARR; stretched below $50M at current AI infra multiples
    - id: f4
      label: Competition Risk (High)
      description: AWS SageMaker, Google Vertex AI, Databricks all named Gartner / IDC Leaders 2024–2025
    - id: f5
      label: Financial Opacity (High Risk)
      description: ARR, NRR, burn, and margin undisclosed; Series C Form D absent from SEC EDGAR
    - id: f6
      label: Diligence Gates
      description: Confirm ARR ≥ $60M; NRR ≥ 110%; resolve Series C Form D gap; review cap table
    - id: f7
      label: Conditional Positive Recommendation
      description: Invest at or below $1B entry with diligence gates met; target 3–5 year exit at $2–5B
    - id: f8
      label: Kill Criteria
      description: Free hyperscaler Ray service; ARR < $40M; down round; founder departure; license change
