- id: section-V2
  title: Comparable Company Analysis
  body: |-
    Anyscale's valuation of $1B (June 2024) is assessed against two sets of comparables: public cloud infrastructure and data-platform companies, and private AI infrastructure peers at similar funding stages. The public comps provide multiple anchors; the private comps provide direct peer benchmarking for pre-revenue-disclosure stage companies.

    Among public infrastructure SaaS companies, Databricks provides the most relevant private-to-private analog. SiliconAngle reported in December 2024 that Databricks closed a $15B Series J mega-round at a $62B post-money valuation — the largest enterprise software financing round in history to that point. Databricks' ARR at the time of the Series J was reported at approximately $1.6B, implying a financing- round multiple of approximately 39× ARR. While this multiple reflects Databricks' scale ($1.6B ARR vs. Anyscale's estimated $50–100M) and its broader unified data+AI platform, it establishes a ceiling for AI infrastructure private valuations and demonstrates that top-tier AI data platforms can command significant revenue premiums in the private market.

    For public infrastructure SaaS comparables, Bessemer Venture Partners' State of the Cloud 2024 report notes that the BVP Nasdaq Emerging Cloud Index (EMCLOUD) "remains down from ZIRP highs and trades at historical norms" — indicating that public cloud infrastructure multiples have normalized from 2021 peak levels (30–50× NTM revenue for hypergrowth companies) to approximate historical norms of 8–15× NTM revenue for established cloud infrastructure businesses. Clouded Judgment (Jamin Ball's substack), a weekly data-driven analysis of SaaS companies, tracks these multiples as they compress or expand across the public SaaS cohort. Based on publicly observable financial data and the Morningstar financial data platform, approximate representative multiples as of the research date include: Datadog (~13–16× NTM revenue at ~$30–38B market cap), Snowflake (~10–12× NTM at ~$35–45B market cap), MongoDB (~10–12× NTM at ~$20–25B market cap), and Confluent (~8–10× NTM at ~$7–9B market cap). These ranges are estimates derived from structural analysis and published benchmark reports; they require verification against current market data.

    Among private AI infrastructure peers, the most proximate comparables are Hugging Face (~$4.5B valuation, 2023, ARR estimated at $50M+), Together AI (~$1.25B valuation, 2024), and Modal Labs (~$500M+ valuation, 2024, per PitchBook data). Hugging Face's $4.5B valuation on estimated $50M ARR implies ~90× ARR — a premium that reflects its open-source ML model hub monopoly rather than enterprise infrastructure revenue. Together AI at $1.25B and modal Labs at ~$500M are closer direct comparables for AI infrastructure-as-a-service businesses. Anyscale at $1B is priced in the middle of this peer cohort, below Hugging Face but above or at parity with Together AI and Modal, reflecting its Ray OSS moat advantage over comparable-stage peers.

    CB Insights' State of Venture Q1 2026 report confirms that quarterly global VC funding hit a record $286B in Q1 2026, while exits declined to a two-year low — a bifurcated environment where late-stage private funding is abundant but liquidity events remain constrained. This context implies that Anyscale's Series D round, when it occurs, will face a favorable fundraising environment but may encounter exit-multiple compression if the IPO window remains narrow.
