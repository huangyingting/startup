- id: section-V6
  title: Exit Readiness and Final Diligence Asks
  body: |-
    Anyscale's exit readiness is assessed as emerging. The company has the customer base, market positioning, and investor backing to pursue either an IPO or strategic acquisition, but the financial disclosure gap (no public ARR, margin, or NRR data) means that IPO readiness is 3–5 years away at minimum, subject to accelerating ARR disclosure and a favorable public market environment.

    The most probable exit path is strategic acquisition. Google (via Google Cloud and GV strategic stake), Microsoft (Azure ML complementarity), and AWS (SageMaker competitive gap) are all credible acquirers at valuations of $2–6B depending on ARR at time of exit. The GV strategic investment introduces potential information rights and preferential negotiation dynamics that may affect competitive auction dynamics. NVIDIA is a potential strategic acquirer given Ray's role in distributed GPU orchestration.

    IPO is a secondary option contingent on $200M+ ARR with above-median NRR and gross margin. The CB Insights Q1 2026 data showing exits at a two-year low suggests that the IPO window remains narrow and that strategic M&A may be the more realistic liquidity event for the current fundraising cohort.

    The six thesis-break triggers that would require immediate investment thesis reassessment are: (1) a hyperscaler announcing free managed Ray service; (2) ARR disclosed below $40M at Series D time; (3) NRR below 100% (indicating net churn); (4) Ion Stoica or Robert Nishihara departure; (5) Ray open-source license change to non-permissive terms; and (6) Series D at valuation below $800M (confirmed down round). Final diligence asks are documented in TV006.
