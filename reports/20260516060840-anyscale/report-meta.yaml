companyProfile:
  summary: >-
    Anyscale is the commercial company behind Ray, the leading open-source distributed computing
    framework for AI and machine learning. Founded in 2019 by UC Berkeley researchers Robert Nishihara,
    Philipp Moritz, Ion Stoica, and Michael I. Jordan — co-creators of Ray — Anyscale sells the Anyscale
    Platform, a fully managed cloud service that lets enterprises run Ray workloads on AWS, GCP, Azure,
    and specialist GPU clouds (CoreWeave, Nebius) without managing infrastructure. The platform covers
    distributed training, batch inference, online serving (Ray Serve), data processing (Ray Data), and
    LLM fine-tuning and serving (Anyscale Endpoints). With 41,000+ GitHub stars, 500M+ all-time PyPI
    downloads, and a recognized open-source flywheel, Anyscale is positioned as the neutral, Python-first
    alternative to hyperscaler-native ML platforms. It raised $100M in a Series C round in June 2024 at
    approximately $1B valuation, with backing from a16z, NEA, Google Ventures, Intel Capital, and
    Foundation Capital.
