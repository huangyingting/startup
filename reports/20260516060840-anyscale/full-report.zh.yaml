      - number: '7.4'
        title: 监管和法律风险
        blocks:
          - type: paragraph
            body: >-
              Anyscale 所处的监管环境仍在演化，横跨欧盟数据保护、AI 专项立法、美国出口管制和 FTC 竞争监管。短期概率最高的监管敞口是欧盟《通用数据保护条例》（GDPR）：Anyscale
              处理欧盟用户个人信息，并在隐私政策中引用 Data Privacy Framework（DPF）原则，明确列出 EU/UK GDPR
              法律依据（合同履行、合法利益、同意和法律义务）。隐私政策还确认，未解决的合规投诉可依据 DPF 原则附件 I 使用 DPF 仲裁，这表明公司已搭起正式的 EU/UK GDPR 合规基础设施。欧盟 AI Act
              关于通用 AI（GPAI）模型的规则已于 2025 年 8 月 2 日适用。构建或支持 GPAI 模型的基础设施提供商，可能承担透明度、文档和版权合规义务。2026 年 5 月 7 日，AI Act 简化
              omnibus 达成政治协议，将嵌入产品的高风险 AI 系统时间表调整到 2027–2028 年。NIST 的 AI 风险管理框架（AI
              RMF）在美国是自愿、非监管性质，但政府采购要求会推动采用——也就是说，Anyscale 的美国公共部门客户可能把 NIST RMF 对齐作为采购条件。BIS 出口管制仍然活跃：BIS 将 authorized
              IC designer 时间线延至 2026 年 12 月 31 日，并定期更新 AI 加速器出口限制。受监管行业或司法辖区的 Anyscale 客户，部署可能受到这些规则约束。CISA 已发布 AI
              Cybersecurity Collaboration Playbook 和安全部署 AI 系统指南，企业客户会越来越多用这些指南评估供应商。诉讼方面，在 CourtListener
              搜索「anyscale」没有返回匹配判例，说明尚无已确认的公开诉讼。SEC EDGAR 显示 2020 年和 2021 年的 Form D 豁免发行文件，与早期私募融资轮相符；公开记录中没有 2024 年
              Series C Form D，这是一个轻微尽调警示，也与财务章节发现一致。
