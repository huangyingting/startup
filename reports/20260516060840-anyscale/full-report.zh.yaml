  - id: TE002
    title: 技术架构层
    columns:
      - 层级
      - 技术 / 组件
      - Anyscale 增值
      - 关键依赖 / 风险
    rows:
      - - 开发者 API
        - Python @ray.remote 装饰器、Ray AIR 统一接口
        - 完全向后兼容的托管运行时；托管与自托管之间无需改代码
        - 开源 Ray 出现任何 API 破坏性变更，都会传导到 Anyscale Platform
      - - AI 库
        - Ray Data、Ray Train、Ray Tune、Ray Serve、RLlib（Ray 2.55.1）等模块
        - 核心 Ray 工程团队支撑企业支持合同
        - 开源同等能力可能滞后；Ray 用户可能先于 Anyscale Runtime 用到新功能
      - - 分布式调度器
        - Ray GCS（Global Control Store）+ 分布式任务 / actor 调度器
        - Anyscale Runtime 管理 GCS 可靠性；提供头节点韧性功能
        - GCS 是单一逻辑控制平面组件；HA 配置会增加复杂度
      - - 对象存储
        - Plasma（进程内共享内存对象存储）+ 远程对象存储
        - 由 Anyscale Runtime 管理；节点丢失时透明故障转移
        - 大对象传输会增加序列化开销；延迟敏感路径需要调优
      - - 集群管理
        - Anyscale 托管 Ray 集群；客户 Kubernetes 上的 KubeRay 可作为替代
        - 自动扩缩容、预算控制、多云供给、GPU 利用率仪表盘
        - KubeRay 提供完整自托管替代；商业转化取决于运维价值
      - - 计算层
        - AWS EC2、GCP Compute、Azure VMs、CoreWeave、Nebius GPUs 等算力资源
        - BYOC 模式使用客户预留资源；Hosted 层承担现货价格风险
        - GPU 现货价格压缩可能逐步削弱 Hosted 层计算毛利
    notes: >-
      架构依据 docs.ray.io、docs.anyscale.com 官方文档、arxiv Ray 论文（arXiv:1712.05889）和公开产品页面重构。 Ray 研究论文描述了 Plasma 对象存储内部机制和 GCS
      HA 设计，但 Anyscale Runtime 中的实现细节未公开披露。 尽调应核验 Anyscale Runtime 的 HA 配置，以及 GCS 故障转移 SLA。
    claimRefs:
      - CE009
      - CE010
      - CE011
      - CE025
      - CE026
