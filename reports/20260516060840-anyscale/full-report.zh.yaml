        - 主要承担顾问 / 学术角色；公开证据显示运营依赖度低
        - 日常运营不需要
  - id: TR005
    title: 扼杀条件与监测指标
    notes: 扼杀条件阈值是作者定义的监测触发器；Series D 阶段的 ARR 或增长阈值需要私有公司财务数据，目前公开渠道拿不到。
    columns:
      - 风险触发器
      - 可观察事件 / 阈值
      - 监测频率
      - 行动含义
      - 当前状态
    rows:
      - - 超大规模云厂商推出托管 Ray 等价产品
        - AWS、Google 或 Microsoft 宣布原生托管 Ray 服务，且不在现有云抵扣额度之外另行收费
        - 每季度复盘云平台公告
        - 立即复盘投资逻辑；加快核查差异化深度；建模流失情景
        - 截至 May 2026 尚未触发
      - - Ion Stoica 全职离开 Anyscale
        - 公开宣布 Stoica 全职回归 UC Berkeley 或加入另一家公司
        - 持续监测新闻；跟踪 GitHub 提交活动
        - 评估继任技术领导力；评估社区影响；重新打分关键人风险
        - 尚未触发；Stoica 仍是联合创始人
      - - KubeRay 采用度超过 Anyscale 商业产品
        - 社区证据（GitHub 星标、论坛活跃度、博客文章）显示，自托管 KubeRay 在新增企业部署中替代 Anyscale
        - 每季度复盘开发者社区信号
        - 加快评估 Anyscale 托管相对自托管的价值主张深度
        - 尚未触发；两个生态仍在并行增长
      - - GDPR 或 EU AI Act 对 Anyscale 采取执法行动
        - 欧盟监管机构对 Anyscale 启动调查、发出正式通知或罚款
        - 每季度监测监管执法（EU AI Office、各国 DPA）
        - 评估罚款敞口、整改时间表和客户合同影响
        - 尚未触发；未确认执法行动
      - - Series D 时点收入停滞
        - 下一轮融资时 ARR 低于支撑 $1B+ 估值所需的增长轨迹
        - Series D 融资时；期间看客户扩张 / 流失新闻信号
        - 重新评估增长逻辑；评估烧钱 / 收入比；考虑过桥风险
        - 公开资料无法评估；收入未披露
  - id: TV001
    title: 投资建议摘要 — Anyscale（May 2026）
    notes: 所有评估均基于公开证据和结构性推断。投资建议以完成 TV006 中列出的尽调要求为前提，然后才可承诺投资。
    columns:
      - 维度
      - 评估
      - 依据
    rows:
      - - 总体建议
        - 有条件正面
        - Ray 开源护城河、AI 基础设施 TAM 增长、Databricks 退出先例；前提是确认 ARR/NRR
      - - 置信度
        - 中
        - Series C 估值已确认；ARR、NRR、烧钱速度未公开披露
      - - 风险评级
        - 高
        - 超大规模云厂商竞争、财务不透明、OSS 自托管风险、倍数压缩风险
      - - 估值立场
        - 符合市场（ARR 低于 $50M 时偏高）
        - $1B 隐含 10–20× ARR；若 ARR 为 $60–100M 且增长 >50%，则可辩护
      - - 持有 / 退出周期
        - 3–5 年（2027–2029）
        - 战略 M&A 最可能；ARR 达到 $200M+ 后可做 IPO 老股交易
      - - 进入条件
        - 确认 ARR ≥ $60M、NRR ≥ 110%，Series C Form D 状态已解决
        - 承诺投资前不可让步的尽调门槛
    sourceRefs:
      - SV001
      - SV006
      - SV013
  - id: TV002
    title: 可比估值表
    notes: >-
      上市公司市值和收入为近似估计，依据 Morningstar 财务数据和已发布基准报告，应结合当前市场数据复核。私有公司 ARR 估计来自融资轮倍数和公开信号，并非披露数字。上市公司收入倍数为 NTM（未来 12
      个月）估计；私有公司为最近一轮已知融资隐含的 LTM ARR 倍数。
    columns:
