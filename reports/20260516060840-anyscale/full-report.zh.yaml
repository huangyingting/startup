      - number: '7.3'
        title: 开源与商业张力
        blocks:
          - type: paragraph
            body: >-
              Anyscale 最深层的结构性风险，在于 Ray 的开源模式和商业变现之间的张力。KubeRay 是 ray-project GitHub 组织下维护的官方 Kubernetes operator，企业可以不用
              Anyscale 参与、也不用付费，就在 EKS、GKE、AKS 或自托管 Kubernetes 上部署生产级 Ray 集群。Ray 文档明确写到「KubeRay is used by several
              companies to run production Ray deployments」，证实它已经能真实替代商业部署。KubeRay operator 开源，且由 Anyscale 自己积极维护，用来证明
              Ray 兼容 Kubernetes；换句话说，Anyscale 实际上在构建并改进自己的竞争替代品。这是典型的 open-core 张力：KubeRay 每改进一步，自托管可覆盖的人群就扩大一步。Anyscale
              的托管价值主张——集群生命周期管理、自动扩缩容、容错、可观测性、企业级 SSO/SAML/SCIM、审计日志——必须比 KubeRay 基线多交付足够的运营价值，才能支撑订阅成本。风险在于，DevOps
              能力成熟的企业平台团队会直接运营 KubeRay，甚至不会评估 Anyscale 的商业层。Ray 的 GitHub 仓库是最重要的社区信号和开源资产；如果公司在收入压力下改变开源许可证（例如转向 SSPL 或
              BUSL），社区可能强烈反弹，并加速竞争性 fork，削弱 Anyscale 的获客漏斗顶部。discuss.ray.io
              论坛显示社区仍然活跃，讨论内容包括运营挑战、集群管理问题和功能请求——既说明平台复杂，也说明社区仍依赖这个生态。公司目前没有计划或宣布改变许可证；这是一个或有风险，只有在收入持续低于预期时才会兑现。
            claimRefs:
