      - number: '5.5'
        title: 企业就绪度、安全与可观测性
        blocks:
          - type: paragraph
            body: >
              Anyscale 的企业功能集记录在平台页和定价页中，包括 SSO、SAML、SCIM、VPC isolation（BYOC）、audit logs 和多区域部署能力。BYOC 模式把 Anyscale
              control plane 部署在客户云账户内，是主要的数据驻留和治理机制。该架构意味着 BYOC 模式下客户数据和计算不会离开客户 VPC，可满足金融服务、医疗健康和政府 AI 用例中常见的数据驻留要求。


              平台通过面向不同工作负载的 dashboard 内置可观测性，并提供持久日志，覆盖 Ray Data、Train、Serve 工作负载。分布式训练 job 可一键做 CPU 和 GPU
              profiling。Anyscale Runtime 提供全托管、兼容 Ray 的 runtime，由 Ray 核心工程团队支持。客户可以依赖专家维护的基础设施，同时不被锁进专有 runtime，因为底层 Ray
              API 仍是 Apache 2.0 且可迁移。


              支持层级按部署模式区分：Hosted 层提供工作时间支持和五次 case submissions；BYOC 提供 24x7 企业 SLA 和不限量提交。这种双层模型是基础设施 SaaS
