      - number: '7.2'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Anyscale 的首要竞争风险，是被超大规模云厂商替代。云厂商能把托管 AI 基础设施与既有云承诺支出打包，形成独立平台难以跨越的价格和采购护城河。AWS SageMaker 自称是「所有数据、分析和 AI
              的中心」，能力横跨分布式训练、推理、AI ops、治理和可观测性，直接与 Anyscale 托管 Ray 产品重叠。Google Vertex AI 同时获得 IDC MarketScape for
              Worldwide GenAI Life-Cycle Foundation Model Software、Gartner Magic Quadrant for AI Application Development
              Platforms Q4 2025、Forrester Wave for AI/ML Platforms Q3 2024 的 Leader 认定，三个分析机构 Leader 位置反映出 Google 对 AI
              平台的激进投入。Databricks 在已经握有企业数据合同的统一 data+AI 平台内，把 Ray on Databricks 做成托管能力，进一步压缩 Anyscale 市场。FTC 在 2023 年 6
              月博客中特别指出，同时控制计算服务和生成式 AI 产品的公司「可能利用其在计算服务领域的力量，通过给予自身及其合作伙伴相对新进入者的歧视性待遇，来扼杀生成式 AI 竞争」。 这一警告直接适用于 Anyscale
              所处竞争环境。第二类竞争威胁来自更简单的平台：Modal.com 社区 testimonials 把其开发者体验称为「动态沙盒中的 GOAT」，用户拿它与 Docker、Cloud Run、Lambda
              做正面对比，说明 Modal 会吸走那些不喜欢 Ray 集群管理负担的 ML 实践者。FTC 还警告「先开放、后封闭」策略——公司先借开源采用扩大规模，再关闭生态——可能被商业采用 Ray 的竞争者用来对付
              Anyscale，随后把客户迁移到专有栈。LLM 商品化的可能性进一步加重市场风险：如果推理成本继续下降，专用基础设施需求降低，Anyscale 的可服务市场可能收缩。
