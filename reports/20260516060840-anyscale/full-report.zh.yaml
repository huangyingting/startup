  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与优先级
        blocks:
          - type: paragraph
            body: >-
              Anyscale 的重大风险可归为六类，并按可能性与影响的综合结果排序：（1）被超大规模云厂商和相邻平台竞争性替代，（2）通过 KubeRay 开源自托管替代，（3）创始团队关键人集中，（4）GDPR、EU AI
              Act 和不断演进的美国框架下的监管与法律合规，（5）GPU 供应链和 Ray 复杂度流失等技术与运营风险，（6）与 AI
              支出相关性和烧钱速度不透明有关的财务与宏观风险。下方主风险登记表按四档可能性（Low/Medium/High/Very
              High）和四档影响（Limited/Moderate/Significant/Critical）评分。残余风险最高的两类是超大规模云厂商竞争和 OSS 自托管，因为两者已经在市场中发生：AWS
              SageMaker、Google Vertex AI、Databricks 都在与 Anyscale 价值主张重叠的 AI 平台类别中获得 Gartner 或 IDC Leader 认定；KubeRay
              在多家具名公司的官方生产部署则证明，免费自托管可行。其余四类为中等残余风险，且有可识别缓释因素。Anyscale 已记录的 GDPR/DPF 合规和 EU AI Act
              拉长的过渡时间线，部分缓释监管风险；关键人风险缺少公开具名接班计划；技术风险通过托管平台抽象得到部分管理；财务风险因缺少公开收入或烧钱披露而不透明。
