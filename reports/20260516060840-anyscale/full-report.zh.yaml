  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景和融资历史
        blocks:
          - type: paragraph
            body: >-
              Anyscale 最近一次公开估值数据点，是 2024 年 6 月的 Series C：融资 $100M，投后估值约 $1B，隐含投前约 ~$900M。该轮由 Andreessen
              Horowitz（a16z）领投，NEA、Google Ventures 和 Intel Capital 参投，这些机构也参与过此前轮次。这是公司首次公开披露的十亿美元估值标记，也确立了 Anyscale 截至
              2024 年中为已确认的 AI 基础设施独角兽。


              截至 2026 年 5 月研究日，SEC EDGAR 中 Anyscale, Inc.（CIK 0001785482，曾用名 Indigostack, Inc.）记录了三份 Form D
              豁免发行文件。最早一份（accession 0001785482-20-000003，2020-02-18 提交）披露首次销售日为 2019-08-02，发行总额 $20,744,995，投资者 18
              名——与合并后的 Seed（~$5M）和 Series A（~$20.6M）相符。董事名单包括 Ion Stoica、Philipp Moritz 和 Ben Horowitz，确认 a16z
              从最早机构融资起就参与董事会。第二份文件（accession 0001785482-21-000001，2021-12-29 提交）披露首次销售日为 2021-10-15，发行总额
              $102,285,932，投资者 7 名，并新增 Peter Sonsini（NEA）为董事。后续修订（Form D/A，0001785482-22-000001，2022-09-06 提交）把同一发行扩大到
              $199,185,923，投资者 13 名——显示 Series B 可能延长关闭，较公开报道的 $100M 标题金额多融资约 $97M。截至本研究日，SEC 尚未出现对应 2024 年 Series
              C（$100M，~$1B 估值）的 Form D。这一缺失是需要法律尽调的主要证据缺口。


              已确认 SEC 文件和媒体报道的 Series C 合计，Anyscale 累计融资约 $319.9M（$20.7M seed/A + $199.2M 延长 Series B + $100M Series
              C）。$1B 投后估值对应 $319.9M 累计融资，隐含资本效率约 3.1×（估值 / 累计融资）——对 Series C 阶段的 AI 基础设施平台而言相对资本高效；不过公司未披露
              ARR，限制了该分析的精度。


              Anyscale 没有公开披露 ARR、收入增速或财务预测。Morningstar、PitchBook 和 CB Insights 平台确认了 Anyscale 的独角兽身份和融资历史，但没有带一手来源支撑的公开
              ARR 估计。基于 $1B 估值，并参照基础设施 SaaS 可比收入倍数的结构性分析（Bessemer 和 Clouded Judgment 基准显示，Series C 阶段 AI 基础设施为 10–25×
              ARR），$50–100M ARR 与这一估值在市场倍数下相符。这是推断，不是披露数字，应作为待直接确认的工作假设。
