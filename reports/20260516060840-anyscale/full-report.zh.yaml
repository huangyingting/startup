    title: Anyscale 融资时间线（2019–2026）
    type: timeline
    layout: wide
    summary: >-
      Anyscale 的资本形成跨越 5 年，从 2019 年 Seed 到 2024 年 6 月 Series C。SEC Form D/A 修订文件（2022 年 9 月）显示 Series B 可能扩展至总计
      $199M，几乎是公开引用的 $100M 标题金额的两倍。2024 年 Series C 没有 Form D。
