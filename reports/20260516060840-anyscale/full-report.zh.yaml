      - number: '7.5'
        title: 技术和运营风险
        blocks:
          - type: paragraph
            body: >-
              Anyscale 的技术风险集中在三条线：Ray 本身的运营复杂度、GPU 供应链和 NVIDIA CUDA 依赖、以及分布式系统安全。Ray 学习曲线陡，是从业者已有记录的批评点：自管 Ray
              集群需要投入不低的工程能力，覆盖集群生命周期管理、自动扩缩容配置、容错调优和可观测性搭建。复杂度本身是 Anyscale 托管服务的核心理由，但也带来流失风险——组织在评估期采用 Ray
              后，如果发现运营负担过重，可能直接放弃该框架，转向 Modal 或托管 Kubernetes jobs 等更简单的替代方案。Ray 的 GitHub issue tracker
              和讨论论坛显示，社区持续围绕集群管理挑战互动，印证了复杂度信号。GPU 供应方面，Anyscale 的推理和训练负载依赖 GPU 密集型算力，主要是 NVIDIA 硬件。Anyscale 支持在
              AWS、GCP、Azure、Nebius 和 CoreWeave 上做 BYOC 部署，多云覆盖部分缓解了单一云厂商的 GPU 供应约束。但 GPU 计算对 NVIDIA CUDA 的依赖仍是结构性风险：CUDA
              的专有生态制造切换成本，任何 NVIDIA 供应中断或涨价都会传导给 Anyscale 客户。AMD ROCm 和开源加速器栈正在成熟，但在生产级 ML 负载中的采用仍有限。分布式系统天然有安全风险：Ray
              集群会暴露网络端口、跨节点管理进程隔离，并处理敏感模型训练数据。CISA 已明确把 AI 系统安全列为关键基础设施关切；任何影响大型 Anyscale 客户部署的安全事件，都会带来声誉和商业后果。GitHub
              issue #40000 中可见的 Ray proxy state 重构，反映内部架构工作仍在推进；如果执行不当，可能引入集群可靠性回归。Anyscale
              没有发布公开安全认证状态页或事故历史，这是企业采购尽调的缺口。
