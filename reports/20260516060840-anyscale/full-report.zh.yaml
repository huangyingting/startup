      - number: '7.6'
        title: 关键人物和执行风险
        blocks:
          - type: paragraph
            body: >-
              Anyscale 创始团队具备很强的 founder-market fit，但关键人物风险集中。Ion Stoica 是联合创始人，也是 Ray 背后最知名的公开技术权威，同时仍任 UC Berkeley
              计算机科学教授。学术职责带来注意力分散风险：研究重点、教学任务和学生指导，都会与 Anyscale 的商业路线图争夺时间。Stoica 还共同创办过
              Databricks，并曾扮演类似的技术锚点角色——Databricks 的参照意义在于，它既证明了研究成果可以商业化成功，也说明学术创始人会长期面对多重牵引。Robert Nishihara 是
              Anyscale CEO，公开记录没有显示他曾在 Anyscale 当前规模或阶段的公司担任过 CEO。基础设施公司的首次 CEO，从 founder-market-fit
              阶段走向规模化企业销售时，会面对已知执行风险：企业关系管理、结构化 QBR、法律谈判和多利益相关方采购周期，都需要经验，而 Nishihara 的公开履历里看不出这些经验。创始团队高度集中在 UC
              Berkeley 研究圈——Stoica、Moritz、Jordan 和 Nishihara 都来自 RISELab 生态——这会带来战略视角和网络多样性的同质化风险。创始团队以下，Anyscale
              公开材料没有列出 CFO、CRO 或 VP of Engineering，仅凭公开来源无法评估管理层厚度。关键人物风险还被放大，因为 Ray
              开源社区的可信度部分系于创始人的学术声誉——创始人离开造成的影响可能不止内部执行，还会波及社区。公开来源未发现继任计划、股权 vesting cliff 时间表或 key-man insurance 披露。
