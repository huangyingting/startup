      - number: '4.6'
        blocks:
          - type: paragraph
            body: >
              Anyscale 的财务轨迹取决于三个相互咬合的变量：基础模型开发者的 GPU 计算需求、超大规模云厂商的竞争定价环境，以及企业合同扩张速度。三个情景框定了可能的财务区间。乐观情景下，AI
              基础设施支出继续增长，Ray 采用指标强劲，企业 BYOC 合同增购顺利；随着计算成本下降、毛利改善，ARR 到 2027 年超过 $100M，公司在 3–4 年内实现盈利或形成强 IPO
              申报位置。基准情景下，ARR 到 2027 年增至 $50–80M，毛利率维持 30–45%，公司以高于 $1B 的估值完成 Series D，把现金跑道延至 2028 年以后。悲观情景下，超大规模云厂商下调
              GPU 计算价格（例如 AWS/GCP 激进下调托管 ML 定价），把 Anyscale 计算毛利压到接近零；客户通过 KubeRay 自管理 Ray，NRR 走弱，公司面临 down-round 或战略出售。


              关键的反向财务风险是 Neptune/OpenAI 收购。这笔交易拿走了一个互补的 ML 生态工具，也显示 OpenAI——AI 基础设施栈中一个未来重要潜在竞争者——正有意收购能增强训练工作流的工具。如果
              OpenAI 或其他前沿实验室纵向整合计算编排（就像它们用 neptune.ai 做实验跟踪一样），Anyscale 将失去一个重要生态顺风。财务含义是：Anyscale 的可服务客户群可能收窄到对外提供 AI
              的团队，而不是越来越多自建基础设施、面向内部的基础模型开发者。
