      - number: '3.2'
        title: 直接计算层竞争对手——Modal、CoreWeave、Together AI
        blocks:
          - type: paragraph
            body: >
              Modal Labs 是 serverless Python 计算平台，定价分为 Starter（$0 加计算费用、每月 $30 免费 credits、100 个容器、10 个 GPU 并发 slot）和
              Team（$250 加计算费用、每月 $100 免费 credits、1000 个容器、50 个 GPU 并发）两档。Modal 以 serverless
              定位自身，声称相较固定按需计算，在尖峰或不可预测工作负载上有成本优势；定价页举例说明，50 块平均 GPU、单价 $3.95/GPU-hour，相比 75 块预留 GPU、单价
              $3.00/GPU-hour，在突发工作负载下 Modal 总成本更低。Modal 原生并不支持 Ray Train
              深度下的多节点分布式训练编排，因此主要竞争的是服务、批处理和短时训练任务，而不是大规模分布式训练运行。CoreWeave 称自己是全球第一 AI 云平台，专为 AI 打造，具备 Kubernetes
              原生计算、存储和网络。CoreWeave 已推出 CoreWeave Sandboxes，用于在隔离环境中做强化学习、agent 工具使用和模型评估。其主要差异化在于 GPU fleet 规模和
              Kubernetes 原生接入，目标是更偏好完整基础设施控制、而非托管抽象层的团队；这使 CoreWeave 更像基础设施供应商，而不是 Anyscale 的直接应用层竞争者，且 Anyscale 把
              CoreWeave 列为支持的 BYOC 云目标。Together AI 定位为 AI 原生云，声称借助面向工作负载的优化实现 2× 更快推理、60% 更低成本，并通过 Together Kernel
              Collection 实现 90% 更快预训练。Together AI 支持 serverless 推理、批量推理（每模型最高 300 亿 tokens）、专用部署和训练用 GPU 集群基础设施。与
              Anyscale 不同，Together AI 以推理为先，也不暴露 Ray 编程模型。
