      - number: '6.5'
        title: 留存、集中度风险与反向信号
        blocks:
          - type: paragraph
            body: >-
              公开来源无法评估 Anyscale 留存耐久性。没有 NRR、GRR、churn、cohort 或续约数据。对 Anyscale
              阶段的私营公司而言，缺少此类披露很常见；但这意味着留存耐久性的尽调判断必须依赖代理信号和结构分析。结构性留存逻辑在于，Ray API 会深度嵌入客户代码库——分布式训练 job、数据
              pipeline、serving deployment 都围绕 Ray 的 @ray.remote decorator 和 actor model 编写。一旦团队的 ML 基础设施
              Ray-native，切换到其他框架就需要重写大量应用代码。这形成天然切换成本，尤其利好 Anyscale 的 BYOC 模式。结构性流失风险则来自自托管替代方案。KubeRay 提供完全开源、官方维护的
              Kubernetes operator，让任何具备 Kubernetes 能力的团队都能不使用 Anyscale 托管服务而运行 Ray。GitHub 上的 KubeRay 快速上手指南记录了低于 10
              分钟的部署路径。blog.det.life 文章「为什么你的 MLOps 栈错了：放弃 Ray，改用简单的 Async Python」代表实践者对 Ray 相比更简单工具的复杂度批评，认为许多团队并不需要 Ray
              的分布式能力，轻量 async Python 更适合。Neptune.ai 在被 OpenAI 收购前关于 Ray alternatives 的博客，记录了 Dask、Prefect、Airflow、Modal
              等竞品框架，认为它们对特定工作负载画像是可行替代方案。Modal.com 明确瞄准觉得 Ray 编程模型过于复杂的开发者，提供更简单的 GPU-compute 接口。客户集中度未披露；少数高 GPU
              用量客户可能贡献 Anyscale 过高收入占比，这是需要私下尽调评估的结构性风险。扩张和集中度风险表捕捉了这些结构性不确定性。
