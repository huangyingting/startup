  - id: FE001
    title: Ray 与 Anyscale 技术架构栈
    type: flow
    layout: wide
    summary: Ray/Anyscale 栈从开源 Python API 出发，经过专用 AI 库到分布式运行时；Anyscale 在开源层之上增加托管集群运维和企业功能。通过 KubeRay 自托管的并行路径，是主要商业转化风险。
    approximationNotes: 架构根据官方 docs.ray.io 文档、arXiv Ray 论文和 Anyscale 平台页面重构。内部 Ray 组件名称（GCS、Plasma）来自研究论文；Anyscale Runtime 内部机制未公开披露。
    claimRefs:
      - CE009
      - CE010
      - CE011
      - CE025
    data:
      nodes:
        - id: python-api
          label: Python 开发者 API
          detail: '@ray.remote 任务、actor、对象；零 JVM、单装饰器分发；Python 3.10–3.14'
          tone: positive
        - id: ai-libraries
          label: Ray AI 库（Data / Train / Tune / Serve / RLlib）
          detail: 6 个专用库；统一运行时；截至 2026 年 4 月，Ray 2.55.1 GA
          tone: positive
        - id: ray-runtime
          label: Ray 分布式运行时（GCS + Plasma）
          detail: Global Control Store 管理集群状态；Plasma 进程内共享内存对象存储；分布式调度器
          tone: neutral
        - id: anyscale-layer
          label: Anyscale 托管层
          detail: Workspaces、Jobs、Services；头节点韧性、自动扩缩、血缘追踪、可观测性仪表板
          tone: positive
        - id: compute-layer
          label: 多云算力（AWS / GCP / Azure / CoreWeave / Nebius）
          detail: Hosted（Anyscale 托管）或 BYOC（客户 VPC）；支持 GPU H100/H200/A100/A10G/L4/T4
          tone: neutral
        - id: kubray-path
          label: KubeRay 自托管替代方案
          detail: 官方 Kubernetes operator；不用 Anyscale 也能使用相同 Ray API；是有运维能力团队的主要替代路径
          tone: warning
      edges:
        - from: python-api
          to: ai-libraries
        - from: ai-libraries
          to: ray-runtime
        - from: ray-runtime
          to: anyscale-layer
        - from: anyscale-layer
