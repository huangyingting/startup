  - id: FP003
    title: 护城河 / 就绪度 KPI——Anyscale 竞争耐久性摘要
    type: kpi
    layout: standard
    summary: Anyscale 的 8 项竞争耐久性指标，覆盖 5 个护城河维度和 3 个脆弱性信号。正向条目反映可持续差异化；警示条目标出需要尽调关注的替代风险。
    data:
      items:
        - label: Ray OSS 社区飞轮
          value: 41K+ GitHub stars; 500M+ downloads; 1,200+ contributors
          detail: 按 star 数和下载量计算，它是最大的分布式 Python ML OSS；持续制造 ML 工程师漏斗顶部，纯云平台若没有多年 OSS 投入很难复制。
          tone: positive
        - label: Python-first 易用性（无 JVM）
          value: Pure Python; no Spark/Scala required
          detail: 去掉 JVM 开销和 Spark 学习曲线；面对以 Python 为中心的 ML 团队，在纯 ML 工作负载上相对 Databricks 具备结构性优势。
          tone: positive
        - label: 多工作负载平台广度
          value: Train + Serve + Batch + Pipelines on one Ray API
          detail: Ray Data、Ray Train、Ray Tune、Ray Serve 和 Anyscale Jobs 覆盖从预处理到服务的完整 AI 工作流；没有单一竞争者能在统一框架上匹配这一点。
          tone: positive
        - label: 多云 + 多加速器
          value: AWS, GCP, Azure, CoreWeave, Nebius; NVIDIA, AMD, TPU
          detail: BYOC 模式支持跨 5 家云服务商和 3 类加速器家族的硬件无关部署；SageMaker、Vertex AI、Azure ML 都受限于单一云。
          tone: positive
        - label: 企业安全套件完整度
          value: SSO, SAML, SCIM, VPC, audit logging, marketplace billing
          detail: 企业安全和采购集成完整；AWS、GCP、Azure 市场账单让 Anyscale 支出可以抵扣现有云承诺使用预算。
          tone: positive
        - label: 云服务商商品化风险
          value: HIGH — AWS, GCP, Azure can bundle managed Ray
          detail: 三大 hyperscaler 都能通过现有托管 Kubernetes 以更低边际成本提供托管 Ray 集群；Databricks 上的 Databricks Ray 已经部分兑现这一威胁。
          tone: warning
        - label: 开源自管理替代缺口
          value: MEDIUM — KubeRay + SkyPilot covers Kubernetes-proficient teams
          detail: 拥有 4 名以上内部 Kubernetes 工程师的团队，可用 KubeRay 和 SkyPilot 以近零边际成本替代 Anyscale 的管理层；Kubernetes 采用扩大后，这类团队会更多。
          tone: warning
        - label: 相比 Modal 的 serverless 简洁性缺口
          value: MEDIUM — Modal wins event-driven and short-run workloads
          detail: 对事件驱动或短时长 GPU 工作负载团队，Modal 的零配置 serverless 体验胜过 Anyscale；Anyscale 的集群模式增加设置开销，而 Modal 完全消除了这部分负担。
          tone: warning
    approximationNotes: >-
      该 KPI 图中的所有数值都是基于公开产品文档和独立分析得出的定性评估；除已注明的 GitHub stars、下载量外，并非 Anyscale
