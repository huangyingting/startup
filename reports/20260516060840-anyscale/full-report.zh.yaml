      - number: '2.6'
        title: 规模测算尽调缺口与相互矛盾的估算
        blocks:
          - type: paragraph
            body: >
              Anyscale 的市场规模分析面临三个必须在尽调中解决的结构性证据问题。


              第一，没有分析机构把托管 Ray 编排作为独立类别发布市场规模。所有可用估算（Grand View Research、MarketsandMarkets、Gartner、IDC）都覆盖更宽市场——整个 AI
              软件市场、MLOps 市场或 AI 平台市场——其定义包含 Anyscale 无法覆盖的支出类别。2026 年总体 AI 市场估算从 $60 billion 到超过 $200 billion，跨度超过 3
              倍，反映边界定义差异极大。若不收窄到 Anyscale 的实际足迹，就把其中任何一个数当作 TAM，会得到实质误导的规模判断。本分析中的 $3–8 billion SAM
              估算，是基于自下而上和自上而下方法三角校验后的判断，而不是直接发布的数字。


              第二，专门针对 MLOps 市场的分析师估算也差异显著。有些估算把 2024 年 MLOps 市场定在 $2–4 billion（窄义定义为模型监控、漂移检测和实验跟踪），另一些则把所有 ML
              管线基础设施纳入，扩展到 $10–20 billion。Anyscale 覆盖后者，但未必覆盖前者。边界模糊意味着，尽调应明确 Anyscale 自身内部 TAM/SAM 定义，并与公开可比口径比较。


              第三，Anyscale 自身市场份额未知。公司不披露 ARR、客户数或收入增长率。没有市场份额锚点，任何 SOM 估计都带有推测性。本分析使用的 $150–600 million SOM 区间，是在 $3–8
              billion SAM 上假设 1–5% 渗透率——这个区间横跨突破前阶段到强劲早期增长型基础设施公司。要确认 Anyscale 实际落在区间何处，需要在尽调中获取私有财务数据。
