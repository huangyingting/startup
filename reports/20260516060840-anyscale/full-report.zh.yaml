  - id: FI002
    title: Anyscale 收入模型架构（2026）
    type: flow
    layout: wide
    summary: Anyscale 收入流经两条不同路径：计算转售 / 透传路径（Hosted 层，利润率较低）和平台费路径（BYOC 层，利润率较高）。两者最终都通过 Anyscale Credits 或云市场渠道进入基于用量的计费。
    data:
      nodes:
        - id: customer
          label: 客户（AI/ML 团队）
          tier: input
        - id: hosted
          label: Hosted 层（Anyscale 托管）
          tier: primary
          detail: AC 计费：按 GPU 类型不同为 $0.0135–$10.68/hr。Anyscale 承担基础设施成本。
        - id: byoc
          label: BYOC 层（客户 VPC）
          tier: primary
          detail: 平台管理费。客户承担云成本。Anyscale 利润率更高。
        - id: cloud_infra
          label: 云服务商（AWS/GCP/Azure/CoreWeave/Nebius）
          tier: secondary
          detail: Anyscale 以预留 / 承诺费率购买算力，并在 BYOC 上转售或管理。
        - id: billing
          label: 计费与市场
          tier: output
          detail: Anyscale 直接开票，或走 AWS/Azure/GCP Marketplace（抵扣客户云承诺支出）。
        - id: revenue
          label: Anyscale 收入（ARR 未披露）
          tier: output
          detail: 毛利率估计为 15–40%（Hosted）或 50–70%（BYOC）。混合约 30–50%。
      edges:
        - from: customer
          to: hosted
          label: 选择 Hosted
        - from: customer
          to: byoc
          label: 选择 BYOC
        - from: hosted
          to: cloud_infra
          label: Anyscale 购买算力
        - from: byoc
          to: cloud_infra
          label: 客户现有云账户
        - from: hosted
          to: billing
          label: AC 计算小时计费
        - from: byoc
          to: billing
          label: 平台费计费
        - from: billing
          to: revenue
          label: 扣除计算 COGS 后
