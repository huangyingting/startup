  - id: TM001
    title: 市场定义——纳入支出、排除支出和替代品
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 付款方
      - 与 Anyscale 的相关性
    rows:
      - - 分布式 ML 训练编排
        - 多节点 GPU/CPU 训练任务的集群供应、自动扩缩容、任务调度、容错、checkpoint 管理
        - 原始 GPU/CPU 算力采购；从第三方购买的模型权重或数据集
        - ML 平台工程团队 / CTO office 预算
        - Anyscale 核心使用场景；Ray Train 和 Ray Data 端到端覆盖该工作流
      - - 批量推理和数据处理
        - 大规模离线推理流水线、embedding 生成、ML 规模的数据预处理
        - 与 ML 模型生命周期无关的通用 ETL（Spark、dbt）
        - 数据工程和 ML 团队共享预算
        - 可由 Ray Data 和 Ray Serve batch mode 覆盖；与 Databricks 和 Spark 生态重叠
      - - 实时模型服务
        - 推理 endpoint 托管、请求路由、多模型组合、低延迟服务的自动扩缩容；LLM 服务基础设施
        - 应用层托管推理 API（OpenAI、Anthropic），由终端应用消费
        - ML 平台团队或基础设施团队 / 云 marketplace 承诺支出
        - Ray Serve 和 Anyscale Endpoints 目标指向这一类别；竞争对手包括 SageMaker endpoints、Vertex AI Prediction、BentoML 和基于 vLLM 的服务栈
      - - MLOps 平台工具
        - ML 负载的实验跟踪、依赖管理、集群可观测性、基于角色的访问控制、审计日志、成本监控
        - 非 ML 专用的通用 DevOps 工具（GitHub Actions、Terraform）
        - ML 工程团队预算；有时来自 IT operations 预算
        - Anyscale Platform 的 workspace 和可观测性层覆盖这一点；竞争对手包括 Weights and Biases、Databricks 上的 MLflow 和 Neptune.ai
      - - 多云 GPU 访问和调度
        - 跨多个云 GPU 提供商编排，以优化可用性和成本；跨 AWS、GCP、Azure、CoreWeave 和 Nebius 的 spot instance 管理
