  - id: TV004
    title: 乐观 / 基准 / 悲观情景分析
    notes: 概率信号是定性评估，不是数学概率。ARR 估计是结构性推断，并非披露数字。
    columns:
      - 情景
      - ARR 假设（2026）
      - 适用倍数
      - 隐含估值
      - 概率信号
      - 关键驱动 / 风险
    rows:
      - - 乐观
        - $150M+ ARR；NRR >120%；增长 60%+
        - 20–30× ARR
        - $3.0–5.0B
        - 有可能（~25%）
        - 基础模型建设者持续投入；Ray 飞轮把社区用户转成企业客户
      - - 基准
        - $75–100M ARR；NRR 105–115%；增长 40–50%
        - 14–18× ARR
        - $1.1–1.8B
        - 最可能（~45%）
        - 企业稳步采用；来自 Databricks 和 SageMaker 的竞争中等
      - - 悲观
        - $30–50M ARR；NRR <105%；增长 <30%
        - 8–10× ARR
        - $0.3–0.5B
        - 可信下行情景（~30%）
        - 超大规模云厂商免费托管 Ray；KubeRay 被采用；支出正常化
    sourceRefs:
      - SV006
      - SV007
      - SV012
      - SV015
  - id: TV005
    title: 投资逻辑与反向逻辑
    notes: 每条投资逻辑都配有可证伪它的证据或变化事件。
    columns:
      - 方向
      - 论点
      - 支持证据
      - 什么会改变判断
    rows:
      - - 投资逻辑（+）
        - Ray 开源护城河持久且可防守
        - 500M+ 下载、41,000+ GitHub 星标；尚无超大规模云厂商分叉或替代 Ray
        - AWS 或 Google 宣布生产级、API 兼容的 Ray 替代品
      - - 投资逻辑（+）
        - AI 基础设施托管推理需求增长很快
        - VentureBeat Q1 2026 跟踪：托管推理意向一个季度内从 13.2% 跳到 23.1%
        - 企业推理需求完全转向超大规模云厂商捆绑选项
      - - 投资逻辑（+）
        - 差异化平台的 Bessemer AI Cloud 溢价结构仍在
        - BVP 私有市场“反弹，并且可以说再次起泡，主要靠 AI Cloud 拉动”
        - 倍数压缩让上市市场 EMCLOUD 重新成为私有估值的硬上限
      - - 投资逻辑（+）
        - 经由 Google / Microsoft / AWS 收购的战略退出路径可信
        - Google Ventures 董事会席位；Anyscale BYOC 支持 GCP、AWS、Azure、CoreWeave
        - 三家超大规模云厂商都认为内部 Ray 投资已经足够，不需要竞争性 M&A
      - - 反向逻辑（−）
        - 超大规模云厂商竞争可能压低 TAM 上限
        - AWS SageMaker、Google Vertex AI、Databricks Ray on Databricks 被 Gartner/IDC 列为领导者
        - Anyscale 赢下两个或更多大型（$5M+ ARR）标杆案，从超大规模云厂商手中替换客户
      - - 反向逻辑（−）
        - KubeRay 自托管风险限制商业转化
        - KubeRay 是 CNCF 官方项目，已在多家企业生产部署
        - 净新增企业客户明显快于社区转商业的历史转化率
      - - 反向逻辑（−）
        - 财务不透明让估值无法验证
        - 截至 May 2026，ARR、NRR、利润率或烧钱速度均未公开披露
        - Anyscale 提供经审计财务，或给出有一手来源支撑、可信的独立分析师估计
      - - 反向逻辑（−）
        - CB Insights Q1 2026：退出降至两年低点，压制回报时间线
        - CB Insights State of Venture Q1 2026：尽管融资创纪录，退出数量降至两年低点
        - IPO 窗口重新打开，AI SaaS 上市公司达到收入规模
    sourceRefs:
      - SV006
      - SV008
      - SV012
      - SV015
  - id: TV006
    title: 最终尽调要求
    notes: 这些是承诺资本前最低限度必须拿到的证据。标记为阻断项的事项必须在投资前解决；重大事项应在初始承诺后 30 天内解决。
    columns:
      - 优先级
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 阻断项
        - ARR 与收入增长
        - 过去 12 个月 ARR、季度增长率、按 cohort 拆分的 NRR
        - 验证或推翻 $1B 估值是否符合市场倍数；也是校准情景的必需输入
        - 向董事会资料室索取；与 Series C 投资人报告交叉验证
      - - 阻断项
        - Series C Form D 缺口
        - 未找到 2024 年 $100M Series C 融资的 SEC Form D 文件
        - 可能意味着 SAFE 结构、离岸交割或申报延迟；影响优先股堆叠分析
        - 直接向 Anyscale 法务顾问索取；在 EDGAR 监测延迟申报
      - - 阻断项
        - 股权结构表与优先股堆叠
        - 4 轮优先股的清算优先权、反稀释条款和 ROFR 条款未知
        - 优先权悬置会在基准和悲观退出价格下显著稀释普通股等价价值
        - 由律师提供完整股权结构模型；审查 GV 和 Intel Capital 战略协同条款
      - - 重大
        - 毛利率与单位经济
        - 混合毛利率、托管与 BYOC 毛利率拆分、GPU 成本结构
        - 决定盈利路径，并验证 30–55% 估计毛利率区间
        - 财务负责人级别访谈；用 Anyscale 费率卡做价格与成本基准
      - - 重大
        - 烧钱速度与现金跑道
        - 月度现金消耗和 Series C 融资后的剩余现金跑道
        - 按每月 $4–10M 烧钱，Series C 现金跑道可能在 2026 年底到期；决定 Series D 紧迫性
        - CFO 访谈；根据员工数信号（LinkedIn）和计算成本结构估算
      - - 信息项
        - 关键客户集中度
        - 前 5 大客户收入占 ARR 的比例
        - OpenAI 作为锚定客户，若使用量下降，会形成实质集中度风险
        - 与 OpenAI、Uber、Spotify 团队做客户访谈；在资料室披露合同
    sourceRefs:
      - SV001
      - SV003
      - SV013
      - SV021
