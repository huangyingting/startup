      - number: '8.3'
        title: 估值方法
        blocks:
          - type: paragraph
            body: >-
              本报告对 Anyscale 使用四种估值方法。由于缺少公开财务披露，每种方法都有显著限制；所有结果都是估计区间，不是已确认估值。


              方法 1 — 收入倍数：按 $1B 投后估值计算，隐含 ARR 区间 $50–100M 时，收入倍数为 10–20× ARR。根据 Bessemer State of Cloud 2024
              对云原生基础设施的基准，高于中位数增长的基础设施 SaaS 公司在私募市场交易于 15–25× forward ARR。以 $80M ARR（基准情景中点）计算，12.5× 倍数与中等增速基础设施 SaaS
              业务相符。如果 ARR ≥ $60–70M 且 YoY 增长 >50%，$1B 估值可以成立；若 ARR 低于 $50M，则估值偏吃力。


              方法 2 — 可比交易分析：近期融资中，私有 AI 基础设施同行交易在 15–40× ARR（Databricks 39×、Together AI 估计 ~25×、Hugging Face hub 模式业务
              ~90×）。把 15–25× 套用于 Anyscale $50–100M ARR 区间，隐含估值为 $750M 到 $2.5B，$1B 位于中点或略低于中点。按这个区间，只要 ARR 约为 ~$60–80M
              且增长强劲，$1B 估值算公允。Databricks 先例说明，AI-native 数据基础设施公司在规模化后可以维持 30–40× ARR 倍数，为 Anyscale 轨迹提供了一个理想上限。


              方法 3 — DCF 代理：没有披露财务，完整折现现金流分析不可行。用 $80M ARR（中点估计）、前三年年收入增长 50% 后续 30%、终局毛利率 40%、折现率 30% 做结构性代理，10 年期估计
              NPV 为 $700M–$1.2B——方向上与 $1B 估值标记一致，但对假设增长率和毛利高度敏感。敏感性分析显示 DCF 区间从 $300M（悲观：30% 增长、35% 毛利）到 $2.5B（乐观：70%
              增长、55% 毛利）。拿到实际财务数据后，应替换该代理。


              方法 4 — 战略收购方溢价：Anyscale 的多云 Ray 管理层、开源社区（前文研究显示 Ray 下载 500M+、GitHub stars
              41,000+）和企业客户基础（OpenAI、Uber、Spotify、Pinterest、Virgin Pulse），使其成为 Google（Cloud AI 基础设施协同）、Microsoft（Azure
              ML 和 GitHub 集成）以及 AWS（补 SageMaker 竞争缺口）的可信收购标的。战略收购方通常比财务价值支付 30–50% 溢价，隐含 $1.3–1.5B 底部；如果 Anyscale 在退出前达到
              $150M+ ARR，上限可能到 $3–5B。Google Ventures 作为战略投资者进入股权结构，可能带来 ROFR 条款，需要在法律尽调中审阅。
