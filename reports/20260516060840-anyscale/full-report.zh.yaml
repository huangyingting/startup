  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出与现状替代方案
        blocks:
          - type: paragraph
            body: >
              Anyscale 的可服务市场最好定义为托管式分布式 AI/ML 计算编排——位于原始云计算资源（GPU、CPU、网络）与模型 artifact
              之间的一层。这一层包括让团队在异构计算环境中调度、运行、监控、扩展和服务 AI 工作负载的工具与服务。它不同于底层硬件采购层（Anyscale 无法覆盖），也不同于面向非 ML 工程终端用户销售推理 API
              的应用层 AI 服务。


              四类支出落在这个边界内：（1）分布式 ML
              训练编排，包括大规模训练任务的作业调度、集群自动扩缩容和容错；（2）批量推理和数据处理管线，用于预处理训练数据或大规模运行推理；（3）实时推理端点的模型服务基础设施，包括负载均衡、路由和多模型组合；（4）MLOps
              平台工具，用于管理 ML 从业者的实验生命周期、依赖管理和可观测性。落在 Anyscale 当前范围之外的支出包括原始 GPU 采购、通用云存储、预训练模型授权，以及应用层 AI API 消费（例如调用
              OpenAI API，而不是在自有基础设施上运行模型）。


              Anyscale 的现状替代方案很多，而且技术上可行。Amazon SageMaker 提供与 AWS 计算、存储和网络深度集成的托管 ML 平台。Google Vertex AI 提供等价的 GCP 原生托管
              ML 平台。Databricks 提供统一分析与 ML 环境，MLflow 负责实验跟踪和模型注册。自托管 KubeRay——Ray 的 Kubernetes operator——允许团队不使用 Anyscale
              管理层，在自己的基础设施上运行 Ray 集群。SkyPilot 是开源多云作业调度器，抽象跨云服务商的 GPU 资源采购。Modal 是 serverless Python 计算平台，专门争夺事件驱动和短生命周期
              ML 工作负载。Run:ai 是面向企业 ML 基础设施团队的 GPU 调度与编排平台。每个替代方案都有不同强项：SageMaker 强在 AWS 集成，Vertex AI 强在 GCP
              集成，Databricks 强在 SQL/分析融合，KubeRay/SkyPilot 对 Kubernetes 能力强的团队则赢在成本。
