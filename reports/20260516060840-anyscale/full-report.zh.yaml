        are estimated from analyst reports and public filings; private company ARR figures are analyst estimates, not
        disclosed financials. Public SaaS and data infrastructure peers (Snowflake, Confluent, Datadog) are included for
        multiple benchmarking. Unlisted peers (Weights & Biases, Cohere, Mistral) are excluded due to insufficient
