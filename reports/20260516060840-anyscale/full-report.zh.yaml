      items:
        - date: 2019-08
          label: Seed（约 $5M）
          detail: Foundation Capital 和 NEA。SEC Form D 载明的首次销售日期：2019-08-02。
          tone: positive
        - date: 2020-02
          label: Series A / 早期轮次（$20.7M，SEC Form D）
          detail: SEC Form D（021-360767）于 2020-02-18 提交。18 名投资者合计 $20,744,995。Ben Horowitz（a16z）列为董事。
          tone: positive
        - date: 2021-10
          label: Series B 首次交割（$102.3M）
          detail: SEC Form D（021-426994）于 2021-12-29 提交。首次销售为 2021-10-15。7 名投资者。Peter Sonsini（NEA）新增为董事。
          tone: positive
        - date: 2022-09
          label: Series B 扩展交割 / 修订（总计 $199.2M）
          detail: SEC Form D/A 于 2022-09-06 提交。总额更新为 $199,185,923；投资者数量更新为 13。新增融资约 $97M。
          tone: neutral
