      - number: '5.3'
        title: 技术差异化与竞争护城河
        blocks:
          - type: paragraph
            body: >
              Anyscale 的技术差异化集中在三类：架构独特性、开发者体验、平台完整性。架构上，Ray 的 actor model 是最关键的差异点。多数分布式计算框架（Spark、Dask、multiprocessing
              pools）只支持无状态 task parallelism。Ray 的 actors 支持有状态分布式计算——持久 GPU 内存池、流式推理服务器，以及需要在计算步骤间保留状态的强化学习环境。因此，纯
              task-parallel 框架如果不做大量应用层 workaround，就无法表达的工作负载，Ray 在结构上可以承接。


              开发者体验是 Python-first、zero-JVM。把本地 Python 函数转成分布式 Ray task，只需加一个 @ray.remote decorator。Spark/Databricks
              则形成鲜明对比：做性能工作需要理解 JVM、熟悉 Scala，并掌握 RDD/DataFrame 心智模型。对日常使用 Python 和 Jupyter 的 ML 工程师，Ray 的转换成本接近零。Actor
              model 也让推理服务器和训练循环共用同一抽象，减少工具切换。


              多加速器支持上，Anyscale 平台支持异构调度：CPU + GPU（NVIDIA T4、L4、A10G、A100、H100、H200）+ AMD + TPU 资源可在单个 pipeline
              内分配。Composite AI inference pipeline 直接受益——CPU 上生成 embedding，小 GPU 上 reranking，H100 上生成 LLM，都能通过一个 Ray
              Serve deployment graph 协调，不必手工交接 job。平台的 auto-scaling 和 GPU 利用率功能解决真实痛点：闲置 GPU 成本是 AI
              团队最主要的运营成本驱动因素；Anyscale 报告了多客户性能改善，包括 embedding 生成成本降低 80%，训练速度提升 12x、云成本降低 50%。


              开源飞轮仍是最强的护城河信号。一个拥有 42.6k GitHub stars 和 7.6k forks 的框架，会生成自我强化的生态：集成围绕 Ray API 编写，博客和教程不断累积自然发现，企业评估 AI
              基础设施时，也自然会落到他们已经用来实验的平台上。
