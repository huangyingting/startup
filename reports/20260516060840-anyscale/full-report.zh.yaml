      - number: '3.5'
        title: Anyscale 的差异化与护城河
        blocks:
          - type: paragraph
            body: >
              Anyscale 的竞争差异化建立在五个复合优势上。第一，也是最耐久的一项，是 Ray 开源社区飞轮：41,000+ GitHub stars 和 5 亿+ 历史下载量，让 Ray
              产生自我强化的漏斗顶部；纯云竞争者若不投入多年 OSS，很难复制。新的 ML 从业者往往先通过论文、教程和雇主代码库接触 Ray，再接触 Anyscale，因此 Anyscale 的产品营销比从零搭建 ML
              平台受众更容易、也更便宜。第二，Anyscale 的 Python 优先易用性消除了 Databricks 在许多 ML 工作流中要求的 JVM 负担和 Scala/Spark 学习曲线，让以 Python
              为核心技能的团队获得结构性体验优势。第三，Anyscale 用一个一致的编程模型覆盖完整 AI 工作负载谱系：Ray Data 做预处理，Ray Train 做分布式训练，Ray Tune 做超参数搜索，Ray
              Serve 做实时和批量服务，Anyscale Jobs 做计划式计算。没有单一竞争者能在共享框架上匹配这种宽度。第四，Anyscale
              支持多云和多加速器——AWS、GCP、Azure、CoreWeave、Nebius，以及 NVIDIA、AMD 和 TPU
              计算——给企业买家带来云原生平台无法匹配的硬件独立性。第五，SSO、SAML、SCIM、审计日志、VPC 隔离，以及覆盖三大主要云服务商的 marketplace 计费等企业安全功能，让 Anyscale
              能跨过更简单 serverless 平台无法通过的企业采购门槛。下方护城河耐久性分析展示每个维度、主要威胁和尽调问题。
