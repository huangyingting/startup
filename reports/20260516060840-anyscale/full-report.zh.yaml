  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览与市场结构
        blocks:
          - type: paragraph
            body: >
              Anyscale 的竞争环境最好理解为三个相互重叠的层级。第一层是直接的计算层竞争者，它们面向同一批以 Python 为中心的 ML 工程师，用 GPU 计算接入和最小基础设施负担作为卖点：Modal
              Labs（serverless Python 计算）、CoreWeave（GPU 原生 Kubernetes 云）和 Together AI（推理优化 AI 云，同时具备训练能力）。这些公司分别攻击
              Anyscale 工作负载可覆盖范围中的某个切片——Modal 针对事件驱动和短时任务，CoreWeave 针对大规模原始 GPU 集群接入，Together AI 针对有成本优势的推理吞吐。第二层包括托管 ML
              平台 incumbents，把工作流管理与底层云计算打包：AWS SageMaker、Google Vertex AI、Microsoft Azure ML、Databricks 和
              RunAI。这些平台已有客户基础更大、云计费集成更深、企业签约更多，但各自受限于单一云生态（Databricks 除外），且没有建立在定义 Anyscale 社区飞轮的开源 Ray
              框架之上。第三层是开源和基础设施级替代方案：KubeRay、SkyPilot、Kubeflow、MLflow 和 Metaflow。这些工具让 Kubernetes
              或云工程能力强的团队可以自主管理工作流，不必支付 Anyscale 的管理溢价。关键竞争洞察是，每个企业买家都面对真实的多供应商选择；当分布式训练规模、多云灵活性和 Python
              优先易用性成为主导评估标准时，Anyscale 才会胜出。下方的竞争定位象限和竞争者画像，将十个主要替代方案放在易用性和分布式规模两个维度上比较。
