      - number: '6.3'
        title: GTM 策略与商业模式
        blocks:
          - type: paragraph
            body: >-
              Anyscale 的 GTM 策略围绕开源飞轮搭建：把实践者对 Ray 的采用转化为商业平台客户。主要获客动作是自然流入：Ray 的 42,600+ GitHub stars 和 500M+ all-time
              downloads，在没有付费获客的情况下持续带来开发者兴趣。沿着实践者漏斗，Anyscale 设计了三条转化路径。第一，创业公司计划面向 seed 到 Series-A 的 AI 公司，提供最高 $20,000
              计算 credits、专属现场工程师支持和技术架构指导。平台文档确认 credits 可与既有云厂商 credits（AWS、GCP、Azure）叠加使用。第二，Hosted
              层为想快速启动、但缺乏基础设施经验的团队提供 pay-as-you-go、全托管环境。Hosted 层计算定价从 CPU-only 实例的 $0.0135/hr，到 NVIDIA H100 的
              $9.29/hr、NVIDIA H200 的 $10.68/hr。第三，BYOC（Bring Your Own Cloud）层把 Anyscale control plane 部署在客户自己的云 VPC
              内，面向有数据驻留要求、既有 GPU 预留或治理要求的企业。BYOC 层包含 24x7 企业 SLA 和不限量工单提交。AWS、GCP、Azure
              的云市场账单让企业客户消耗承诺云支出，降低采购摩擦。开发者社区策略包括 Ray Slack 社区、discuss.ray.io 论坛（Ray Core 1,453+ topics）、Ray
              Summit（年度会议）和大量文档。社区论坛和 Slack channel 增强实践者粘性，也作为正式产品支持之外的补充支持渠道。合作伙伴包括云厂商（AWS、GCP、Azure）、专用 GPU
              云（CoreWeave、Nebius）和硬件厂商（NVIDIA、AMD）。Anyscale 的 Committed Contract 层为 GPU 消耗可预测的团队提供量价折扣，降低高用量工作负载的单位成本。
