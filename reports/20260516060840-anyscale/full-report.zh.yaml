  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Ray 框架架构与技术基础
        blocks:
          - type: paragraph
            body: >
              Ray 是 Anyscale 整个产品战略的技术核心。截至 2026 年 5 月，docs.ray.io 文档版本为 2.55.1；该框架提供统一的 Python-native API，可把分布式应用从一台
              laptop 扩展到数千个 GPU 节点。架构建立在三个基础抽象上：Tasks（远程执行的无状态函数）、Actors（跨调用保留状态的有状态 worker 进程）和
              Objects（存放在分布式对象存储中的不可变值）。这种 task-parallel 加 actor-based 的计算模型，最早由 Moritz、Nishihara、Stoica、Jordan 等人在 2017
              年 arXiv 论文中发表，是为了支持一类正在出现的 AI 工作负载：无状态训练步骤、有状态 serving 进程和强化学习智能体混在一起。


              核心 runtime 之上有六个专用 AI 库，为 ML 生命周期不同阶段提供高层 API。Ray Data 处理可扩展数据摄取和预处理，并做 CPU/GPU 协同调度。Ray Train 支持
              PyTorch、XGBoost、HuggingFace、JAX、TensorFlow 的分布式模型训练。Ray Tune 在集群间并行做超参数搜索。Ray Serve 用可组合部署图实现可扩展模型
              serving。Ray RLlib 支持大规模强化学习。把这些库统一在同一个 runtime 下，是 Ray 最关键的架构选择：竞品框架通常需要为训练、serving、数据分别搭建基础设施栈，而 Ray 用一个
              scheduler 和 object store 串起全部阶段。


              Ray 以 Apache 2.0 许可的 Python package 形式发布在 PyPI。最新稳定版为 2.55.1，发布于 2026 年 4 月 22 日，要求 Python ≥3.10（主动支持到
              Python 3.14）。GitHub 仓库累计 42.6k stars 和 7.6k forks，显示社区触达广。活跃开发体现在 2.9k open issues、584 open pull requests
              和 30,371 次总提交。官方集群指南记录了通过 KubeRay 做 Kubernetes 集成，可在任何托管 Kubernetes 服务上部署，而不必使用 Anyscale 的托管层——这条自托管路径，是理解
              Anyscale 商业转化挑战的核心。
