      - number: '3.6'
        title: 竞争风险与脆弱性
        blocks:
          - type: paragraph
            body: >
              Anyscale 面临四类核心竞争风险。第一类也是最具战略性的风险，是云厂商把能力商品化：AWS、Google、Microsoft 都能借现有托管 Kubernetes 和计算服务提供托管 Ray
              集群，成本基础低于 Anyscale。Anyscale 以市场价格采购同一层底层算力，价格上很难硬拼。三大超大规模云厂商中任意一家推出第一方托管 Ray 产品，并深度接入云市场账单，Anyscale
              在计算层的价值主张都会明显被削弱。Databricks 已经通过 Ray on Databricks 部分兑现了这种威胁。 第二类风险是 serverless 的简单性：Modal Labs 面向事件驱动和短时长
              ML 工作负载，开发者体验简单得多，也没有集群配置负担。工作负载能改写成 Modal 可部署容器的团队，可能根本不会评估 Anyscale。Together AI 带来相邻风险：如果推理成本降到在
              Together AI 共享基础设施上跑模型，比在 Anyscale 上运营专用 serving endpoint 更便宜，Anyscale 的 serving
              层业务就会暴露。第三类风险是开源自管理：KubeRay、SkyPilot、Kubeflow 为内部有四名以上 Kubernetes 工程师的团队提供了可信的无托管替代方案。托管
              Kubernetes、operator 成熟度等工具每降低一美元复杂度，都会扩大可自管理的可服务人群。 第四类风险是数据集成深度：Databricks 在企业数据湖和 SQL 分析中占据主导。已经把 ML 跑在
              Databricks 数据资产上的团队，迁移计算编排到 Anyscale 的切换成本，可能高于性能或易用性收益。Anyscale 未公开竞争胜率或流失数据，仅靠公开来源无法量化校准风险。
            claimRefs:
              - CP035
              - CP036
              - CP037
              - CP038
              - CP039
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与 SEC 文件证据
        blocks:
          - type: paragraph
            body: >
              截至研究日期，Anyscale, Inc.（CIK 0001785482，前身为 Indigostack, Inc.，注册于 Delaware）在 SEC 留有三份 Form D
              豁免发行登记。最早一份文件（accession number 0001785482-20-000003，Form D，2020-02-18 提交）披露首次出售日为 2019-08-02，发行总额
              $20,744,995，涉及 18 名投资者，分类为 item 06b（equity）。文件列名的董事和高管包括 Robert Nishihara（CEO）、Ion Stoica、Philipp
              Moritz、Ben Horowitz，确认 a16z 从最早的机构轮就已进入董事会。这份文件最可能合并了 Seed 和 Series A 两段；$20.7M 与媒体报道的早期累计融资约 $25.6M
              基本吻合（2019 年 Foundation Capital 和 NEA 参与的 Seed $5M，加上 2019 年底 / 2020 年初 a16z 参与的 Series A 约 $20.6M）。


              第二次发行（accession number 0001785482-21-000001，Form D，2021-12-29 提交）披露首次出售日为 2021-10-15，初始发行总额
              $102,285,932，覆盖 7 名投资者。Peter Sonsini（NEA）新增为董事，确认 NEA 继续与 a16z 一同参与。后续修订文件（Form D/A，2022-09-06
              提交，accession 0001785482-22-000001）把同一发行更新为 $199,185,923，投资者增至 13 名。这份修订意味着 Series B 延长交割：2021 年 12 月至 2022
              年 9 月之间又增加了六名投资者和约 $97M 后续资本，使 Series B 的可能总额接近 $200M，显著高于公开报道的 $100M 公开头条数字。


              2024 年 Series C（$100M，估值约 $1B，由 a16z 领投，NEA、Google Ventures、Intel Capital 参投）截至研究日期没有对应 SEC Form D
              记录。这可能是提交延迟、采用了不同豁免路径，或该轮存在未披露的结构安排。该缺口应列为首要证据缺口，需要在尽调中直接向 Anyscale 法务团队核实。
