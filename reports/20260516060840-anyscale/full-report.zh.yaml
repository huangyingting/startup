      - number: '5.2'
        title: Anyscale 平台商业产品线
        blocks:
          - type: paragraph
            body: >
              Anyscale 把 Ray 开源框架包成生产级托管服务，主要有三类产品表面。Workspaces 提供由集群支撑的 VS Code 和 Jupyter 开发环境，启动时间低于一分钟，借助 uv
              快速同步依赖，并内置可观测性 dashboard，便于交互式调试 Ray Data、Train、Serve 工作负载。Jobs 提供生产级托管 Ray 集群，面向数据预处理、分布式训练、embedding
              生成等批处理工作负载，并具备头节点韧性和自动扩缩容。Services 提供在线推理 serving，支持容错、A/B rollout、蓝绿部署和多模型 pipeline。这些表面合起来覆盖从实验到生产的完整 ML
              生命周期，使 Anyscale 区别于只解决训练或只解决 serving 的点工具。


              Anyscale Endpoints 是一条较新的差异化产品线，把 LLM serving 做成全托管 API。这让 Anyscale 与 Together AI、modal.com 等专门服务商一同进入 LLM
              serving 市场。另行品牌化的 composite AI inference 产品，面向多模型、异构 CPU+GPU 推理 pipeline——推荐系统、多模态搜索、多步推理工作流——在单个集群中串联
              embedding、检索、reranking、大模型和小模型。该架构要求异构计算资源独立扩缩容；Ray 的细粒度调度优于更粗的编排层，这是技术差异化区域。


              部署分为两层。Hosted 层提供全托管基础设施；Anyscale 供应并管理云资源，账单通过月度信用卡发票结算。Bring Your Own Cloud（BYOC）层把 Anyscale control
              plane 部署在客户自己的 AWS、GCP、Azure、Nebius 或 CoreWeave VPC 内，保留数据驻留，并允许客户使用既有 GPU 预留。BYOC 包含 24x7 企业支持、SLA
              和不限量工单提交；Hosted 仅提供工作时间支持和五次提交。定价按用量计费，没有月固定费；Hosted 层计算成本从 CPU-only 节点的 $0.0135/hr，到 NVIDIA H100 的
              $9.288/hr、H200 的 $10.6812/hr。


              Anyscale Lineage Tracking 为数据集和模型训练 run 提供可视化追踪，支撑可复现性审计和 pipeline 透明度。这项企业功能解决 MLOps 合规需求；在受监管和安全关键的 AI
              部署中，这类需求越来越重要。
