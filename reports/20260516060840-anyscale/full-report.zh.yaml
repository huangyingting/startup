    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >
              Anyscale 的注册主体为 Anyscale, Inc.，是一家 AI 基础设施公司，总部位于 600 Harrison Street, 4th Floor, San Francisco,
              California 94107。公司把使命表述为「让可扩展计算变得轻松」，愿景是「为 AI 与 ML 工作流建设分布式计算的未来」。落到业务上，Anyscale 是为产品化 Ray 而成立的商业载体；Ray
              是创始团队 2016–2017 年在 University of California, Berkeley 的 RISELab 开发的分布式计算框架。公司于 2019 年正式注册，距离 Ray
              框架公开演示约两年。


              运营模式是一套托管云平台。Anyscale 把开源 Ray 框架包成生产级服务，负责集群管理、自动扩缩容、容错、认证、可观测性和计费。客户可以选择 Anyscale 的 Hosted
              方案（全托管，无需基础设施配置），也可以选择 Bring Your Own Cloud（BYOC）模式，部署在客户自己的 AWS、GCP、Azure、Nebius 或 CoreWeave 账户内。这种双模式让
              Anyscale 同时服务两类客户：需要快速上手的早期 AI 团队，以及要求数据驻留或治理控制的企业平台团队。收入来自按用量计费的消费定价，并可搭配承诺用量合同；计费既可通过 Anyscale 发票完成，也可走
              AWS、GCP 和 Azure 的云 marketplace 渠道。


              作为一家早期 AI 基础设施公司，Anyscale 的文化信号值得注意。招聘页面披露 Glassdoor 评分为 4.7/5，并称 94% 员工愿意向朋友推荐 Anyscale。公司有三个办公室：San
              Francisco（总部）、Palo Alto 和印度 Bangalore。这些文化指标由公司自行披露，应通过独立员工评价数据核验；但方向上，它们与一家公司能吸引研究型创始人、保持聚焦工程文化的画像一致。
