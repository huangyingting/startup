      - number: '3.3'
        title: 平台层竞争对手——Databricks、SageMaker、Vertex AI、Azure ML、RunAI
        blocks:
          - type: paragraph
            body: >
              Databricks 在其 Lakehouse 架构上提供集成式 AI 与 ML 平台。截至 2026 年，Databricks ML 包括 Foundation Models（Meta
              Llama、Anthropic Claude、OpenAI GPT）、用于 GenAI 可观测性和评估的 MLflow、Vector Search、Agent Framework、Foundation Model
              Fine-tuning、AutoML，以及用于工作流自动化的 Lakeflow Jobs。关键在于，Databricks 原生包含 Ray on Databricks，这意味着既有 Databricks
              客户无需切换到 Anyscale，也能使用 Ray 的分布式计算。这让 Databricks 同时成为替代方案和 Ray 采用渠道——从 Databricks 托管 Ray
              起步的团队，若需要更深的管理能力和多云可移植性，最终可能升级到 Anyscale。AWS SageMaker 是 AWS 上占主导地位的托管 ML 平台，提供训练、批量推理、实时端点、MLflow
              实验跟踪，以及与 AWS 计算定价深度绑定的集成管线管理。SageMaker 定价跟随底层 EC2 实例费率，对已承诺 AWS 支出的客户有成本竞争力，但也制造了云锁定，而 Anyscale 的 BYOC
              模式正是为避开这一点。Google Vertex AI 提供等价的 GCP 原生托管 ML 平台。Microsoft Azure ML 与更广泛的 Azure AI services 生态集成。RunAI 是基于
              Kubernetes 的 GPU 调度和编排平台，面向想要 workload-aware GPU 共享和 quota 管理、但不需要完整托管训练平台抽象层的企业 ML 基础设施团队。章节抓取时 RunAI
              访问被拦截（403 Forbidden），因此只有此前章节数据可用。下方功能对比矩阵按九项采购标准映射全部六个平台。
