      - number: '4.2'
        title: 商业模式架构与收入来源
        blocks:
          - type: paragraph
            body: >
              Anyscale 的收入模型由两部分组成：按用量计费的计算收入，以及企业订阅合同。计算侧，Anyscale 按客户消耗的 GPU 和 CPU 小时收费，单位为 Anyscale Credits（AC）。截至
              2026 年 5 月，公开标价从 CPU-only 实例的 $0.0135/hr，到 NVIDIA H100 的 $9.2880/hr、NVIDIA H200 的 $10.6812/hr
              不等。这些费率本质上是底层云计算转嫁成本加平台毛利，但相对 spot / on-demand 云价格的精确加价未披露。Anyscale 提供 Hosted（由 Anyscale 管理基础设施）和 BYOC（客户在
              AWS、GCP、Azure、Nebius 或 CoreWeave 上的自有 VPC）两种部署模式。


              企业协议通常是带量价折扣的承诺合同，可走月度发票，也可通过云市场账单渠道（AWS、Azure、GCP）结算，让客户消耗既有云承诺支出。云市场共售是重要的 GTM
              杠杆：它降低采购摩擦，也让客户把预先承诺的云预算用于 Anyscale 工作负载。创业公司计划最高提供 $20,000 credits，是面向早期 AI 团队的获客工具，预期这些团队后续会升级为付费企业合同。


              BYOC 企业层还包含专属现场工程支持和专家级 24×7 SLA，说明公司存在一层专业服务，可能贡献额外收入或支撑溢价。Terms and Conditions 将平台归类为 SaaS
              订阅服务，并带有按用量超额计费机制；公开材料没有按席位定价，也确认收入随计算消耗而非用户人数扩张。该模型把 Anyscale 的收入直接绑定到客户 GPU 工作负载量上——收入高度受 AI
              采用速度驱动，也受大型基础模型客户集中度影响。
