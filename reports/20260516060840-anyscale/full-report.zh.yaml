      - number: '2.3'
        title: 买方、用户与付费方分层
        blocks:
          - type: paragraph
            body: >
              Anyscale 服务四类不同买方细分，每类组织画像、采购流程和价值主张都不同。理解 segment-buyer-user-payer 三元关系很关键，因为预算所有者和技术 champion
              往往不是同一个人，采用触发点在各细分之间也有实质差异。


              按 ACV 看，最大细分是大型企业 ML 平台团队——金融服务、医疗、零售和科技等 Fortune 500 及同等全球企业内的 ML 基础设施职能。这些买方通常拥有 10–50+ 名 ML
              工程师，并在生产环境中大规模运行 ML 系统。买方是 ML Engineering 或 ML Platform 的 VP/Director；付费方是 IT 或平台团队的 capex/opex
              预算；采用触发点是既有基础设施在规模化时出现运行故障（集群不稳定、训练任务失败，或无法快速接入新团队）。Anyscale 的 Tripadvisor 客户案例——以 senior MLOps engineer
              用例出现——可代表这一细分。


              AI 原生初创公司是第二类。那些从零开始构建 AI 产品的公司——包括生成式 AI、多模态 AI 和 AI agents——常在创立初期选择 Anyscale，以避免基础设施负担。在这一细分中，买方和付费方通常是
              CTO 或创始工程师；用户是团队内每位 ML 工程师；采用触发点是训练或服务规模超出单机能力。Anyscale 的初创公司 credits 计划（最高 $20,000）正是针对这一细分。Anyscale
              引用的客户 Predibase，是典型 AI 原生初创用户。


              中端市场企业 ML 团队构成第三类——这些公司有 3–15 名 ML 工程师，已在生产中使用 ML，但尚未达到超大云级规模。采购流程比大型企业更快、委员会驱动更少，但 ACV
              更低，对开源替代方案更敏感。这里的采用触发点通常是自动扩缩容可靠性或多云成本优化上的具体痛点。


              研究机构——学术实验室、国家实验室和政府机构——构成第四类。这些买方价格敏感，往往与开源 Ray 共存，不转化为付费 Anyscale Platform。它们带来品牌价值和社区影响力，但近期收入贡献较低。
