      - number: '5.6'
        title: 技术风险、债务与路线图缺口
        blocks:
          - type: paragraph
            body: >
              四个技术风险向量需要尽调关注。第一，Ray 的运营复杂度是已知摩擦点。Modal、Runpod 这类 SaaS-native 工具把集群完全抽象掉；Ray 则把分布式执行语义（actors、object
              stores、scheduling）暴露给开发者。对核心能力在模型开发、而非系统编程的 ML 工程师，Ray 心智模型形成学习悬崖。社区实践者文章明确建议，不需要大规模多节点分布的团队应避免使用
              Ray。这把可服务开发者群限制在 ML 平台工程师和具备基础设施意识的团队。


              第二，开源与商业的张力是结构性的。任何具备 Kubernetes 能力的团队，都能通过官方 Kubernetes operator KubeRay 自托管 Ray，在没有 Anyscale
              订阅的情况下获得同样的分布式计算能力。Ray 官方 cluster guide 记录了 KubeRay 路径，Ray 社区也在积极维护。Anyscale
              的商业价值因此取决于两点是否值得计算加价：节省运营复杂度（head 头节点韧性、自动扩缩容、可观测性、血缘追踪），以及获得企业支持 SLA。这个价值主张对生产规模团队有吸引力，但在预算周期中会被反复重评。


              第三，GPU 依赖是结构性成本风险。Anyscale Hosted 层按市场价 GPU premium 计价（H100 为 $9.288/hr，H200 为 $10.6812/hr）。随着 GPU spot
              市场价格下降、云厂商下调 on-demand 价格，Anyscale 的计算毛利会被压缩。BYOC 模式允许客户带入自有 reserved GPU capacity，可部分缓释这一点，但 Hosted
              毛利仍暴露在 spot 定价下。


              第四，相比裸 Kubernetes 工作负载，Ray actor system 的性能开销会增加延迟。Ray 的 GCS（Global Control Store）和 Plasma object store 为
              task scheduling 和 object transfer 引入节点间通信开销。对延迟敏感的推理应用，这种开销可测；竞品工具（vLLM、TGI）在不部署 Ray 编排层时可提供更低的原始 serving
              延迟。Anyscale 的 composite AI inference 产品靠 pipeline 编排收益吸收这种取舍，足以解释延迟成本；但对纯单模型 serving 而言，这是合理的工程反对意见。
            claimRefs:
