      - number: '1.2'
        title: 创始人、领导层与关键人风险
        blocks:
          - type: paragraph
            body: >
              Anyscale 由最初在 UC Berkeley RISELab 开发 Ray 的核心团队创立。创始团队包括 Robert Nishihara（CEO）、Philipp Moritz、Ion Stoica（UC
              Berkeley 计算机科学教授，Apache Spark 和 Databricks 共同创造者）以及 Michael I. Jordan（UC Berkeley 统计学与 EECS 的 James and
              Katherine Lau Professor，也是机器学习和统计学领域被引用最多的研究者之一）。Ray 学术论文于 2017 年 12 月提交至 arXiv，并被 USENIX OSDI 2018 接收；论文
              11 位共同作者中包含四位创始人，也包括 Stephanie Wang、Alexey Tumanov、Richard Liaw、Eric Liang、Melih Elibol、Zongheng Yang 和
              William Paul。


              按基础设施软件标准看，这样的创始人组合体现了极强的创始人-市场匹配度。Stoica 和 Jordan 带来机构信誉和深厚学术网络；Nishihara 和 Moritz
              对核心框架有一线工程所有权。组合结果是一项技术资产：41,000+ GitHub stars、5 亿+ 历史下载量——这些指标同时验证了底层开源项目的技术质量和采用拉力。风险也在这里：Anyscale
              的很多技术差异化集中在同一批人身上，而他们同时也是主要工程领导者。若一位或多位创始人离开，公司可能同时承受领导力、产品和社区信誉冲击。


              公开资料没有披露 Anyscale 的完整高管组织架构。创始团队以下的关键工程、销售和运营领导岗位，公开材料均未点名。对 Anyscale
              这样规模的私营公司来说，这并不罕见；但这意味着，管理层深度、继任安排，以及特定职能领域（尤其是企业销售和基础设施可靠性）的单点故障风险，需要依靠私有尽调资料室，而不是公开来源。
