      - number: '1.6'
        title: 里程碑、竞争风险与尽调语境
        blocks:
          - type: paragraph
            body: >
              Anyscale 的竞争格局不能只看直接的托管 Ray 对比。三类结构性风险需要重点跟踪。第一，Kubeflow 提供免费的 Kubernetes 原生开源替代方案，用于分布式 AI 工作负载。拥有既有
              Kubernetes 基础设施和强平台工程团队的组织，可以通过 Kubeflow 自托管一个 Ray 替代方案，把 Anyscale 托管服务的价值压缩为纯运维成本节省。第二，Databricks Managed
              MLflow 覆盖 5,000 家组织，每月 package 下载量超过 2,500 万，并明确把「avoiding vendor lock-in」作为价值主张——这是对 Anyscale
              这类专有托管平台的直接批评。第三，AWS SageMaker、Google Vertex AI 和相应 Azure ML 服务提供云原生 ML 编排，争夺同一笔企业 AI 基础设施预算。


              最深的结构性风险在于 Ray 本身以 Apache 2.0 许可证免费开放。任何云服务商都可以提供托管 Ray 服务；KubeRay operator 在 Ray 自身文档中被称为在 Kubernetes 上运行
              Ray 的「推荐方式」，为自托管部署提供了完全开源路径。Anyscale 可防守的差异化必须来自产品速度、生态集成、企业支持，以及「Ray 创造者」管理框架所带来的信任。社区
              fork、主要云服务商以更低价格推出竞争性托管 Ray 服务，或重要贡献者离开，都可能侵蚀这一定位。


              支撑尽调论点的积极信号包括：Ray 的 41,000+ GitHub stars 验证了平台级需求；$1B 估值的 Series C 反映投资人对托管层的信心；Berkeley
              背景的创始团队带来社区信任和技术信誉，确实难以复制；Ray 横跨训练、服务和数据处理，在每个企业客户内部创造多年扩展机会。2026 年 rebrand（anyscale.com/rebrand2026
              重定向至首页）说明产品定位刷新正在推进，应作为 go-to-market 演进信号继续跟踪。
