              - CE037
              - CE038
              - CE039
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层与市场定位
        blocks:
          - type: paragraph
            body: >-
              Anyscale 可服务客户群横跨三个大类，对应从开源到企业化旅程的不同位置。第一类是 AI-native 基础模型开发者——构建或微调大语言模型、多模态模型和 post-training pipeline
              的公司。这些组织有足够计算预算和工作负载复杂度，可以证明选择 Anyscale 托管集群服务而非自管理 KubeRay 的合理性。ray.io 首页称 Ray 是「ChatGPT
              背后的框架」，显示公司正面向该类客户定位。第二类是成熟科技、电商、媒体公司中的企业平台团队，在规模化运行生产 ML 基础设施。具名客户证言确认 Tripadvisor（旅游科技）、Predibase（AI
              平台）和 Afresh（农业科技 / ML）为生产用户。第三类是 Hosted 层的新兴 AI 创业公司，通过创业公司计划服务；该计划最高提供 $20,000 计算
              credits，并配备专属现场工程师支持。地域上，Anyscale 跨 AWS、GCP、Azure、Nebius、CoreWeave 运营，支持多云区域部署。Anyscale
              未按垂直行业、地域或收入带公开分层客户。客户数量披露和收入结构数据缺失，是重大尽调缺口。anyscale.com/customers 页面把主张表述为「最好的 AI 团队使用 Anyscale
              构建」，并邀请查看案例研究；但截至 2026 年 5 月，OpenAI、Uber、Shopify、Netflix、Spotify 的单独案例研究 URL 均返回 404，说明页面已被移除或重构。
