      - number: '1.3'
        title: Ray 开源平台与技术基础
        blocks:
          - type: paragraph
            body: >
              Ray 是 Anyscale 战略里的核心技术资产。截至 2026 年，该框架已累计超过 41,000 个 GitHub stars、5 亿多次历史下载量，并有 1,200 多名开源贡献者。这些指标让 Ray
              成为 AI 和 ML 工作负载中采用最广的分布式计算框架——在 AI 原生用例上超过 Apache Spark 等替代方案，也领先于 Kubeflow 等较新的通用分布式训练进入者。支撑这一规模的技术基础是
              OSDI 2018 论文：基准测试中，Ray 展示了超过每秒 180 万个任务的扩展能力，验证了该框架在极端规模生产分布式系统中的可行性。


              Ray 的架构由一个核心分布式运行时和一组面向 AI 领域的库构成：Ray Data 用于数据预处理和流式处理，Ray Train 用于分布式模型训练，Ray Tune 用于超参数优化，RLlib
              用于强化学习，Ray Serve 用于模型服务和部署。这个宽度意味着 Anyscale 可以服务完整 AI
              开发生命周期——从数据整理，到训练、微调和服务——而不是只覆盖一个阶段。宽度也扩大了落地后扩展的空间：一个团队先采用 Ray Serve 做推理，之后可以在不换供应商的情况下扩展到 Ray Train 做微调。


              托管平台通过两条路径与开源框架集成：自托管部署使用 KubeRay operator，托管部署使用 Anyscale 的专有平台。Ray 自身文档明确把 Anyscale 描述为「由 Ray 创造者开发的托管
              Ray 平台」，并把 KubeRay 列为推荐的自托管路径。也就是说，用户研究 Ray、通过官方文档发现 Anyscale，并在需要生产级基础设施支持时转向托管服务，Anyscale 会从这条路径中受益。
