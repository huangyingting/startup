  - id: FO002
    title: 公司快照逻辑
    type: flow
    layout: standard
    summary: Anyscale 的商业逻辑从开源 Ray 底座出发，经由托管平台进入企业 AI 工作负载；云厂商既是分销伙伴，也是结构性竞争威胁。
    data:
      nodes:
        - id: ray-oss
          label: Ray 开源（Apache 2.0）
          detail: 41K+ stars、500M+ 下载、1.2K+ 贡献者；基础技术诞生于 UC Berkeley。
          tone: positive
        - id: anyscale-platform
          label: Anyscale Platform（托管 Ray）
          detail: 托管和 BYOC 层级；企业认证、自动扩缩容、可观测性、账单集成。
          tone: positive
        - id: cloud-infra
          label: 多云基础设施
          detail: AWS、GCP、Azure、Nebius、CoreWeave；云市场计费让客户可使用已承诺云支出。
          tone: neutral
        - id: ai-workloads
          label: 企业 AI 工作负载
          detail: 分布式训练、批量推理、模型服务、多模态数据处理、向量嵌入。
          tone: positive
