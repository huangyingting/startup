      - 阶段
      - 估计 ARR / 收入
      - 估值（$B）
      - 收入倍数
      - 相关性
      - 局限
    rows:
      - - Databricks
        - 私有公司（Series J，Dec 2024）
        - ~$1.6B ARR（据报道）
        - ~$62B
        - ~39× ARR
        - 直接 AI 数据平台可比公司；也在 Databricks 上运行 Ray
        - 规模大得多；统一数据 + AI 平台对比纯计算
      - - Datadog (DDOG)
        - 上市公司（NYSE）
        - ~$2.4B 收入（FY2024 估计）
        - ~$30–38B
        - ~13–16× NTM
        - 基础设施可观测性 SaaS；企业客户画像相近
        - 可观测性对比计算；工作负载类型不同
      - - Snowflake (SNOW)
        - 上市公司（NYSE）
        - ~$3.6B 收入（FY2025 估计）
        - ~$35–45B
        - ~10–12× NTM
        - 按用量计费的云数据平台；定价模型相似
        - 数据仓库对比计算编排
      - - MongoDB (MDB)
        - 上市公司（NASDAQ）
        - ~$2.0B 收入（FY2025 估计）
        - ~$20–25B
        - ~10–12× NTM
        - 开发者优先的基础设施 SaaS；OSS 到商业化打法
        - 数据库对比计算层；OSS 模式可类比
      - - Confluent (CFLT)
        - 上市公司（NASDAQ）
        - ~$900M 收入（FY2024 估计）
        - ~$7–9B
        - ~8–10× NTM
        - Kafka OSS 到商业化；阶段和 OSS 变现路径可类比
        - 事件流对比分布式计算
      - - Hugging Face
        - 私有公司（~2023 轮）
        - ~$50M ARR 估计
        - ~$4.5B
        - ~90× ARR 估计
        - AI 原生 OSS 到商业化；面向 ML 从业者的枢纽模式
        - 枢纽 / 模型注册表对比计算编排；TAM 不同
      - - Together AI
        - 私有公司（~2024 轮）
        - ~$50M ARR 估计
        - ~$1.25B
        - ~25× ARR 估计
        - 直接 AI 基础设施同业；聚焦推理的计算云
        - 推理优先对比完整计算生命周期；不暴露 Ray
      - - Anyscale（标的）
        - 私有公司（Series C，Jun 2024）
        - 未披露（估计 $50–100M）
        - ~$1.0B
        - ~10–20× ARR 估计
        - 标的公司
        - ARR 未披露；倍数区间取决于 ARR 估计
