      - number: '2.5'
        title: 采用漏斗与价值链位置
        blocks:
          - type: paragraph
            body: >
              Anyscale 的采用漏斗在企业软件公司中并不常见，因为起点是开源 Ray——一个由 Anyscale 免费分发的公共品。这样一来，漏斗顶部以全球数百万 Ray 用户衡量，而不是以数千个 Anyscale
              企业潜在客户衡量。从开源用户到付费客户的漏斗分多个阶段，每个阶段的转化经济性不同。


              第一阶段是 Ray 的发现与采用。ML 工程师或数据科学家通过 GitHub、研究论文、同事推荐或 Anyscale 赞助会议发现 Ray，并把它集成进项目。凭借 5 亿+ 历史下载量和 41,000+
              GitHub stars，Ray 的安装基础庞大且仍在增长。这是 Anyscale 需求漏斗顶部，但不直接产生收入。


              第二阶段是由规模触发的考虑。随着基于 Ray
              的工作负载增长——模型更多、数据集更大、训练周期更频繁——团队遇到的运维复杂度会超过简单脚本或单个开发者可管理范围。典型表现是集群不稳定、训练任务失败、难以接入更多团队成员，或无法高效使用 spot
              instances。此时，团队会评估托管选项：Anyscale Platform、自托管 KubeRay 或云原生替代方案。


              第三阶段是托管平台决策。团队会把 Anyscale 与 KubeRay（自托管）、SageMaker（若在 AWS 上）或 Vertex AI（若在 GCP
              上）比较。决策因素包括工程负担、运行可靠性、多云灵活性和成本。Anyscale 的 Hosted 和 BYOC 选项对应不同风险画像：BYOC 降低数据驻留顾虑，Hosted 则最大限度减少配置工作。


              第四阶段是企业合同和扩展。初始合同通常按消费计费。随着团队增加更多工作负载、用户和云区域，扩展随之发生。Anyscale 在 AWS、GCP 和 Azure 上可用的 marketplace
              计费，让客户能消耗既有云承诺支出，降低采购摩擦。Anyscale 在价值链中的位置位于云计算（IaaS）之上、AI 应用之下——处在基础设施软件层，这一层的毛利率历史上高于硬件转售，约为 60–80%。
