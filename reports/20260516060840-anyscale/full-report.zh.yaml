      - number: '6.4'
        title: 客户采用信号与社区生态
        blocks:
          - type: paragraph
            body: >-
              Anyscale 客户牵引力的量化采用信号分为两类：开源社区指标（可直接测量）和商业转化信号（未公开）。开源侧，截至 2026 年 5 月，ray-project/ray GitHub 仓库有 42,600+
              stars、7,600+ forks、1,200+ contributors 和 30,371+ 次总提交。PyPI 记录 ray package 历史累计下载超过 5 亿。这些指标对任何 ML
              基础设施框架都处于前十分位，确认 Ray 已成为实践者默认选项。Ray 社区论坛 discuss.ray.io 中，Ray Core 有 1,453 个 topics，Ray Tune 759 个，Ray
              Serve 408 个，Ray Data 228 个，Ray Train 168 个——这些类别直接映射到 Anyscale 的商业产品表面。用于自托管 Ray 的开源 Kubernetes operator
              KubeRay 拥有自己的 GitHub 仓库，并记录了包括 Workday 10K-model 场景在内的企业级部署，说明开源自托管路径也在企业规模上使用。Anyscale YouTube
              channel（youtube.com/@anyscale）是另一个实践者互动表面。商业转化侧，Anyscale 不公布客户数、NRR、GRR 或漏斗转化率。公司在产品页引用了总体性能改善（「VLA
              模型训练数据集扩大 10x」「模型部署加快 3x」「训练加快 12x，同时云成本降低 50%」），但这些是公司声称的指标，缺乏第三方佐证。State of AI Report
