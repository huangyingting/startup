  - id: TM004
    title: 增长驱动因素和采用约束
    columns:
      - 驱动 / 约束
      - 方向
      - 时点
      - 对 Anyscale 的影响
      - 尽调问题
    rows:
      - - LLM 和基础模型采用
        - 驱动
        - 当前（2024–2026 年峰值）
        - 企业构建 LLM 产品，需要达到足以证明托管编排价值的分布式训练和服务规模；Ray 是这一用例的领先框架
        - 量化 Anyscale ARR 中有多少来自 LLM 工作负载、多少来自传统 ML；若 LLM 需求见顶，评估集中度风险
      - - GPU 供给约束和多云 GPU 获取
        - 驱动
        - 中等（2025–2026 年缓解，但结构性多云仍在）
        - 企业在多家云上采购 GPU 容量后，需要一个横跨供应商的编排层；Anyscale 的多云 BYOC 支持相对 SageMaker/Vertex 形成差异
        - 评估 2026 年 GPU 供给正常化是否削弱多云编排的紧迫性
      - - 企业 AI 生产化
        - 驱动
        - 当前且在加速
        - AI 从实验走向关键业务后，运营故障就不可接受；团队会从 DIY 技术栈升级到带 SLA 和支持的托管服务
        - 获取企业合同指标（支持层级采用率、受 SLA 约束的合同），确认 Anyscale 是否把自管理客户转成托管客户
      - - GPU 计算成本优化压力
        - 驱动
        - 当前
        - GPU 成本高，推高了对高效调度和 spot instance 优化的需求；若平台能证明减少计算浪费，ROI 故事就可量化
        - 要求案例数据，展示 Anyscale 相对自管理基线平均提升多少 GPU 利用率，用作销售证据
      - - AWS SageMaker 和 GCP Vertex AI 捆绑
        - 约束
        - 持续
        - 企业已有云承诺支出，就有动力使用原生 ML 平台来消耗合同最低额；Anyscale 必须给出差异化价值，才能证明增量支出合理
        - 量化 Anyscale 目标 SAM 中已有多少锁定在 AWS 或 GCP 独家合同里；评估 marketplace 渠道策略成效
      - - 现有 ML 流水线切换成本高
        - 约束
        - 持续
        - 即便核心是 Ray，把服务端点和训练脚本改到 Anyscale 仍要投入工程资源；没有明确运营危机触发，团队会抗拒迁移
        - 测量 Anyscale 新企业部署的典型 time-to-value；追踪流失触发因素，理解切换成本何时会被克服
      - - 开源自管理替代方案
        - 约束
        - 持续但可应对
        - KubeRay、SkyPilot 和 Kubeflow 为具备 Kubernetes 能力的团队提供了可行的零成本替代；Anyscale 的托管价值主张必须高过 Kubernetes 运营负担
        - 评估 Ray 用户转化为付费 Anyscale、而非自管理的比例；持续追踪趋势，识别商品化压力
      - - 监管和合规把关
        - 约束（也是 BYOC 的驱动）
        - 当前，面向受监管行业
        - HIPAA、FedRAMP 和数据驻留要求会卡住医疗、政府和金融服务业的企业交易；BYOC 模式能部分解决，但可能仍需正式认证
        - 核验 Anyscale 的 SOC 2、ISO 27001、HIPAA BAA 和 FedRAMP 状态；量化受监管行业收入，以估算受合规门槛限制的 TAM
    notes: >-
      时点判断（当前、中等、持续）反映截至 2026 年 5 月、基于可得公开证据的市场状态。GPU 供给评估基于截至 2025 年的行业报道；2026 年供给正常化程度会实质影响多云紧迫性这一驱动因素。监管时点反映 2023
      年以来美国联邦 AI 政策加速。所有尽调问题都需要访问非公开数据。
    claimRefs:
      - CM028
      - CM029
      - CM030
      - CM031
      - CM032
      - CM033
      - CM034
      - CM035
      - CM036
