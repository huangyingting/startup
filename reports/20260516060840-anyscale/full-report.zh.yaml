      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM 三角校验
        blocks:
          - type: paragraph
            body: >
              没有分析机构把「托管 Ray 编排」作为孤立类别发布市场规模，因此测算需要三种视角相互校验：相邻市场的自上而下分析师估算、基于企业 ML 团队数量和单团队支出的自下而上估算，以及可比基础设施平台交易的交叉检查。


              最宽口径——包含硬件、软件和服务的整个 AI 市场——由 Grand View Research、MarketsandMarkets 和 Gartner 跟踪，2030 年规模达到数千亿美元。这些数字不能直接作为
              Anyscale 的 TAM，因为它们包含 Anyscale 不覆盖的硬件支出和应用层服务。a16z 曾发布分析，把 AI 基础设施列为独立投资类别，将计算采购与软件工具分开。相关子市场——不含硬件的 AI/ML
              软件平台和基础设施工具——按分析师共识估计，2026 年为 $15–50 billion，CAGR 为 30–40%。Forrester 2024 年 Q3 关于 AI/ML 平台的 Wave
              报告覆盖了这一空间，把它视作一个有多家主要供应商正式竞争的市场，包括 Databricks、AWS、Google 和 Microsoft Azure ML。


              Anyscale 的 SAM 进一步收窄到 ML 工作负载足够大、需要分布式计算编排的企业——粗略说，是运行多节点 GPU 或 CPU 训练任务，或以每秒数百次以上请求服务模型的团队。自下而上看：若全球企业 ML
              平台团队约 5,000–10,000 个（基于拥有成熟 ML 实践的 Fortune 2000 公司，加上工程人员规模可观的 AI 原生公司），且每团队每年在 ML 计算编排软件上的平均支出为
              $500K–$2M，则 SAM 介于 $2.5 billion 至 $20 billion。取两个区间中点，约为 $5 billion。自上而下看：若 2026 年 AI/ML 平台市场为 $15–50
              billion，分布式计算编排可覆盖子集约占其中 20–30%，则 SAM 为 $3–15 billion。两种方法交叉后，2026 年 SAM 约为 $3–8 billion。


              Anyscale 2026 年的 SOM 更小，受当前产品覆盖、销售能力和竞争限制。Anyscale 当前产品对已经使用 Ray 的团队最强（考虑 Ray 的 5 亿+
              下载量，组织数估计达数万），但主要转化的是同时有规模需求且愿意为托管层付费的客户。假设 2026 年 SAM 渗透率为 1–5%——符合早期成长型企业基础设施公司的水平——SOM 约为 $150 million
              至 $400 million。若 Anyscale 成功打入超大云客户和 AI 原生初创公司细分，SOM 上限可扩展至 $600 million。
