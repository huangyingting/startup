companyProfile:
  summary: >-
    Anyscale 是 Ray 背后的商业化公司。Ray 是 AI 和机器学习领域领先的开源分布式计算框架。公司由 UC Berkeley 研究人员 Robert Nishihara、Philipp Moritz、Ion Stoica
    和 Michael I. Jordan 于 2019 年创立，四人也是 Ray 的共同创造者。Anyscale 销售 Anyscale Platform，这是一项全托管云服务，让企业无需管理基础设施，就能在
    AWS、GCP、Azure 和专业 GPU 云（CoreWeave、Nebius）上运行 Ray 工作负载。平台覆盖分布式训练、批量推理、在线服务（Ray Serve）、数据处理（Ray Data），以及 LLM
    微调和服务（Anyscale Endpoints）。凭借 41,000+ GitHub stars、5 亿+ PyPI 历史下载量和已被认可的开源飞轮，Anyscale 的定位是超大云厂商原生 ML 平台之外的中立、Python
    优先替代方案。公司在 2024 年 6 月完成 $100M Series C，估值约 $1B，投资方包括 a16z、NEA、Google Ventures、Intel Capital 和 Foundation Capital。
