      - number: '4.4'
        title: 资本结构、治理与投资者权利
        blocks:
          - type: paragraph
            body: >
              Anyscale 股权结构表的公开记录不完整。SEC Form D 文件可推断出几件事：a16z（由董事 Ben Horowitz 代表）至少自 2019 年发行起持有董事会席位；NEA（由董事 Peter
              Sonsini 代表）到 2021 年 Series B 时进入董事会；Google Ventures 和 Intel Capital 在媒体报道及 GV portfolio 确认页面中被列为 Series C
              共同投资者，但两者均没有可从公开来源取得的董事级披露。Foundation Capital 投资组合页面将 Anyscale 列为被投公司，与其据报道参与 Seed 阶段相符。


              公司法律实体为 Anyscale, Inc.，前身注册名为 Indigostack, Inc.，是一家 Delaware corporation。Delaware 注册是 VC
              支持公司的标准安排，便于设置带清算优先权、反稀释条款和 ROFR 权利的常规优先股结构。具体优先股堆叠、参与权和转换触发条件无法从公开来源获得。按投资顺序（Seed、Series
              A、B、C）推断，公司可能有四个系列优先股在外流通；早期投资者每股清算优先权较低，但因进入价格更早，持股比例可能更大。


              Google Ventures（与 Google Cloud 方向一致的战略投资者）和 Intel Capital（与 Intel 硬件方向一致）与 a16z、NEA
              同在股东名单中，可能带来由投资者驱动的战略约束。GV 或 Intel Capital 投资协议中的任何 ROFR、preferred-cloud 条款或战略协同条款，都可能影响 Anyscale
              的云中立定位，应列为法律尽调重点。
