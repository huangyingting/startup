      - number: '4.3'
        title: 单位经济模型与毛利率分析
        blocks:
          - type: paragraph
            body: >
              Anyscale 未公开单位经济模型。以下估计来自三类信息：定价模型的结构分析、可比上市基础设施软件公司的基准，以及 Anyscale 公开价目表中可观察的计算成本算术。 关键差异在 Hosted 层与 BYOC
              层之间：Hosted 层由 Anyscale 承担基础设施成本，因此每个计费小时都直接影响毛利；BYOC 层由客户承担云基础设施成本，Anyscale 赚取平台管理费，结构性毛利更高。


              Hosted 层中，Anyscale 以协商价格从云厂商采购 GPU 算力，再叠加平台毛利转售。AWS 上 NVIDIA H100 实例的公开 on-demand 价格在企业折扣前约为
              $12–14/hr。Anyscale 公开 H100 价格为 $9.29/hr，意味着公司主要使用云厂商的 reserved 或 committed-instance 价格（1-3 年期限通常比
              on-demand 低 40–60%），或使用 H100 spot 价格。粗略测算，规模化 H100 的计算成本基础约为 $5–8/hr，隐含平台毛利 $1–4/hr（约 15– 40%）。再混合低毛利 CPU
              实例，以及 BYOC 客户较高毛利的软件管理费，综合毛利率估计为 30–50%。这个区间与云基础设施软件公司的公开基准相符：硬件成本转嫁叠加 SaaS 管理层。


              获客成本（CAC）和净留存率（NRR）完全未披露。创业公司计划的 $20K credits 显示，公司有意用亏损引流的 CAC 策略培育未来大客户。Ray
              的采用通常从一个工作负载起步（例如批量推理），随后扩展到训练、微调和 serving，单客户计算消耗随时间成倍增长，因此 land-and-expand 经济模型具备合理性。
            claimRefs:
