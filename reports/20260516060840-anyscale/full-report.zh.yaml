      - number: '1.5'
        title: 产品架构、收入模式与 go-to-market
        blocks:
          - type: paragraph
            body: >
              Anyscale Platform 是一项基于 Ray 构建的多云托管服务。平台的核心价值主张是拿掉生产环境中运行 Ray
              集群的运维负担——集群配置、自动扩缩容、故障恢复、依赖管理和可观测性由平台处理，工程团队可以把注意力放在应用逻辑，而不是基础设施运维。平台支持分布式训练、批量推理、模型服务、多模态数据处理和 embedding
              生成，覆盖基础模型团队需要扩展的主要 AI 工作负载类别。


              部署选项分为两档。Hosted 档是全托管选项，由 Anyscale 提供底层基础设施，最适合新项目和没有既有云基础设施投入的团队快速启动。BYOC 档部署在客户自己的云账户内，支持
              AWS、GCP、Azure、Nebius 和 CoreWeave。BYOC 面向需要数据驻留、治理控制或已有云预算承诺的企业平台团队。企业安全功能包括 SSO、SAML、SCIM 和完整审计日志。计费可以通过
              Anyscale 直接发票完成，也可以通过 AWS、GCP 和 Azure 的云 marketplace 渠道完成——这是重要的 go-to-market 杠杆，因为 marketplace
              计费允许客户使用既有云承诺消费。


              Anyscale 有面向初创公司的计划，提供最高 $20,000 平台 credits，借此尽早获取新兴 AI 团队，并随其成长。公开产品页面上的客户证言点名 Tripadvisor（Sam
              Jenkins，Senior MLOps Engineer）和 Predibase（Travis Addair，CTO，Horovod 与 Ludwig AI
              maintainer）为生产用户。这些具名案例混合了大型企业 ML 平台团队和 AI 原生初创公司工作负载。Anyscale 也曾引用分布式训练用例客户，其系统覆盖 1.7 亿终端用户，符合大规模消费级 ML
              团队画像。
