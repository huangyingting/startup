  - id: TV003
    title: 估值方法比较
    notes: 所有隐含价值区间均为估计。以现有证据看，收入倍数和可比公司分析最可靠。DCF 代理测算仅作示意。战略价值只代表方向。
    columns:
      - 方法
      - 依据
      - 隐含价值区间（$B）
      - 置信度
      - 关键局限
    rows:
      - - 收入倍数
        - $50–100M 估计 ARR × 10–20× AI 基础设施 SaaS 倍数
        - $0.5–2.0B
        - 中
        - ARR 未披露；增长不确定，倍数区间较宽
      - - 可比交易
        - 私有 AI 基础设施同业为 15–40× ARR；上市基础设施 SaaS 为 8–15× NTM
        - $0.75–2.5B
        - 中
        - Databricks 的 39× 属于离群值；可比组混合上市和私有公司
      - - DCF 代理
        - $80M ARR，前 3 年增长 50% / 此后 30%，终局利润率 40%，折现率 30%
        - $0.3–2.5B
        - 低
        - 财务未经验证；对增长和利润率假设高度敏感
      - - 战略收购方溢价
        - 在财务价值基础上溢价 30–50%；Google/MSFT/AWS 收购可选性
        - $1.3–5.0B
        - 中
        - GV 持股带来 ROFR；战略收购方兴趣未确认
    sourceRefs:
