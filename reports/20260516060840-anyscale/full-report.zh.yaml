      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              Anyscale 2024 年 6 月 $1B 估值，放在两组可比对象中评估：公开市场云基础设施和数据平台公司，以及融资阶段相近的私有 AI
              基础设施同行。公开可比公司提供倍数锚点；私有可比公司则为尚未披露收入的阶段提供直接同业基准。


              在公开基础设施 SaaS 公司中，Databricks 是最相关的 private-to-private 类比。SiliconAngle 2024 年 12 月报道称，Databricks 完成 $15B
              Series J 巨额融资，投后估值 $62B——截至当时，这是企业软件史上最大融资轮。Databricks 在 Series J 时的 ARR 报道约为 $1.6B，隐含该融资轮倍数约 39×
              ARR。这个倍数反映了 Databricks 的规模（$1.6B ARR，相比 Anyscale 估计 $50–100M）和更宽的统一 data+AI 平台定位，但它为 AI
              基础设施私有估值设定了上沿，也证明顶级 AI 数据平台在私募市场可以获得显著收入溢价。


              公开基础设施 SaaS 可比方面，Bessemer Venture Partners 的 State of the Cloud 2024 报告指出，BVP Nasdaq Emerging Cloud
              Index（EMCLOUD）「remains down from ZIRP highs and trades at historical norms」——说明公开云基础设施倍数已从 2021
              年峰值水平（高增长公司 30–50× NTM 收入）回归到大约历史常态，即成熟云基础设施业务 8–15× NTM 收入。Clouded Judgment（Jamin Ball 的 substack）每周用数据跟踪
              SaaS 公司，观察这些倍数在公开 SaaS 队列中的压缩或扩张。基于公开可观察财务数据和 Morningstar 财务数据平台，截至研究日，代表性倍数大致包括：Datadog（NTM 收入约
              13–16×，市值约 $30–38B）、Snowflake（NTM 约 10–12×，市值约 $35–45B）、MongoDB（NTM 约 10–12×，市值约 $20–25B）和 Confluent（NTM 约
              8–10×，市值约 $7–9B）。这些区间来自结构性分析和已发布基准报告，仍需用当前市场数据核验。


              私有 AI 基础设施同行中，最接近的可比对象是 Hugging Face（2023 年估值 ~$4.5B，ARR 估计 $50M+）、Together AI（2024 年估值 ~$1.25B）和 Modal
              Labs（据 PitchBook 数据，2024 年估值 ~$500M+）。Hugging Face 以估计 $50M ARR 支撑 $4.5B 估值，隐含 ~90× ARR——这个溢价来自其开源 ML 模型
              hub 垄断地位，而不是企业基础设施收入。Together AI 的 $1.25B 和 Modal Labs 的 ~$500M，更接近 AI infrastructure-as-a-service
              业务的直接可比对象。Anyscale 的 $1B 位于同业队列中段，低于 Hugging Face，但高于或接近 Together AI 和 Modal，反映其 Ray OSS 护城河相对同阶段同行的优势。


              CB Insights 的 State of Venture Q1 2026 报告确认，2026 年 Q1 全球 VC 融资季度额创下 $286B
              纪录，同时退出降至两年低点——这是一个分化环境：后期私募资金充裕，但流动性事件受限。由此看，Anyscale 未来 Series D 会面对有利融资环境，但如果 IPO 窗口仍窄，退出倍数可能承压。
