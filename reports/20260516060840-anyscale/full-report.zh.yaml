      - number: '1.4'
        title: 资本基础与投资人地图
        blocks:
          - type: paragraph
            body: >
              Anyscale 已完成多轮风险融资，2024 年 6 月的 $100 million Series C 将公司估值推至约 $1 billion（独角兽）水平。craft.co 数据独立追踪到，公司在 2021
              年 12 月 9 日的市场估值为 $1 billion，说明 Series B 估值也达到或接近这一水平。公开已知投资人包括 Andreessen Horowitz（a16z）、NEA、Google
              Ventures、Intel Capital 和 Foundation Capital。a16z（领先 AI 基础设施投资方）、Google Ventures（与 GCP 有战略协同）和 Intel
              Capital（与硬件生态协同）组合在一起，对一家 AI 计算平台公司而言，是战略上相当一致的财团。


              完整 cap table 未公开。craft.co 披露的累计融资超过 $60 million（这是一个不完整数字，早于后续轮次），截至 Series C 的所有已披露轮次合计估计超过 $225
              million。公开资料没有具体持股比例、清算优先权、pro-rata 权利、各轮后的董事会构成变化，以及二级交易历史。Google Ventures 的出现值得关注，因为 Anyscale 同时支持 AWS 和
              Azure 作为部署目标——投资协议中是否存在首选云、ROFR 或战略协同条款，应成为首要尽调问题。Intel Capital 的参与同样值得核查：是否有硬件排他或优惠定价承诺，进而影响公司云中立定位。
