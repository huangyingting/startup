      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              AI/ML 基础设施市场正经历企业软件基础设施史上最强增长顺风。LLM 和基础模型浪潮——由 2022 年以来大型生成式 AI 系统的商业采用推动——创造了对分布式训练基础设施的需求，规模超过大多数企业 ML
              团队此前所需。过去在单块 GPU 上运行小模型的团队，现在需要多节点、多 GPU 训练集群，并配套复杂调度、容错和 checkpoint 管理。这一需求迁移直接利好 Anyscale，因为 Ray
              是大规模分布式训练的事实框架，而 Anyscale 是其托管产品化形态。


              GPU 供给约束是第二个结构性驱动。2023–2025 年，主要云服务商的 H100 和 A100 GPU 全面短缺，迫使企业同时从多个云服务商采购 GPU 容量。多云 GPU 策略需要一个编排层，能跨
              AWS、GCP、Azure 和专业云（CoreWeave、Lambda Labs、Nebius）抽象资源。Anyscale 的多云支持正好落在这个痛点上，因为云原生 ML 平台（SageMaker、Vertex
              AI）无法跨云。


              企业 AI 生产化采用是第三个驱动。McKinsey State of AI 研究持续跟踪到，企业在生产环境中使用 AI 的比例稳步上升；当 AI 从实验性走向业务关键，ML
              基础设施对运行故障的容忍度就会下降。这带来对生产级托管服务的需求，而不是 DIY 开源栈。


              约束同样决定市场规模。云服务商锁定是首要约束：AWS SageMaker 和 Google Vertex AI 与各自云生态深度集成，并受益于客户已承诺的云支出预算，而 Anyscale 必须与之竞争。从既有
              ML 管线迁移的成本很高——即便底层框架同样是 Ray，把训练任务和服务端点改写到 Anyscale 上运行仍需要工程投入。开源路径（自托管 KubeRay、SkyPilot）为 Kubernetes
              能力强的团队提供了高性价比替代方案，限制了 Anyscale 面向成本敏感细分的定价权。资本强度也是约束：GPU
              计算昂贵，因此计算层之上可用于平台工具的预算份额有限。监管约束（数据驻留、HIPAA、FedRAMP）在温和加速 BYOC 采用，但也会拦住需要正式合规认证的企业交易。
