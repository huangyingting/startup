      - number: '3.4'
        title: 开源与基础设施替代方案
        blocks:
          - type: paragraph
            body: >
              开源层是 Anyscale 最重要的结构性替代风险，因为它占据开发者心智，却不产生直接收入交易。KubeRay——Ray 框架的官方 Kubernetes operator——允许团队在任何 Kubernetes
              发行版上自托管 Ray 集群，包括 AWS EKS、Google GKE 和 Azure AKS。Kubernetes 工程能力强的团队可以用近乎零边际成本使用 KubeRay，完全替代 Anyscale
              的管理层。SkyPilot 是开源多云作业调度器，抽象 AWS、GCP、Azure 和 Lambda Labs 之间的 GPU 采购，面向想要云服务商无关工作负载路由、避免 vendor lock-in
              的团队。Kubeflow 是 Kubernetes 原生 ML 工具包，用于分布式训练、管线、超参数调优和服务，最初由 Google 开发，现在由 CNCF 社区维护。MLflow 是开源 AI
              平台，每月下载量超过 3,000 万，由 Linux Foundation 支持，提供可观测性、评估、prompt 版本管理、AI Gateway 和生产部署用 Agent Server。MLflow
              在实验跟踪上与 Anyscale 互补，但不提供计算编排或分布式训练基础设施。Metaflow 是 Netflix 开源 ML 框架，支持在 AWS、Azure 和 GCP 上 bring-your-own
              cloud 部署，并可用单条命令生产部署。Prefect 提供工作流编排和 AI 基础设施工具，定位为需要数据管线协同、但不需要分布式计算规模的团队的替代方案。这些工具都会通过吸走自助服务细分，压缩
              Anyscale 可服务市场；但没有一个能提供 Anyscale 目标中的集成式多工作负载托管平台和企业支持。
            claimRefs:
              - CP020
              - CP021
              - CP022
              - CP023
              - CP024
