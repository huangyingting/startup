      - number: '4.5'
        title: 烧钱速度、现金跑道与现金管理
        blocks:
          - type: paragraph
            body: >
              Anyscale 未公开烧钱速度。以下估计基于员工数信号、成本结构和 Series C 融资背景作结构性推断。2024 年 6 月的 $100M Series C 是最近一次资本注入。以 Anyscale
              所处阶段看——一家 AI 基础设施平台，工程团队占比高，运营多云基础设施，并有显著销售动作——参考可比私营 AI 基础设施公司，月度运营成本 $4–10M 是合理区间。若每月烧钱 $4M，Series C
              可提供约 25 个月现金跑道（到 2026 年中）；若每月 $10M，则约 10 个月（到 2025 年 4
              月，已经过去，意味着烧钱更保守或存在未披露的追加融资）。没有任何公开收入数字，公开来源无法精确计算现金跑道。


              计算用量收入能显著抵消烧钱。如果 Anyscale 产生例如 $30–80M ARR（与其阶段、客户基础，以及 $1B 估值对应 12–25× ARR 倍数相符），净现金消耗会明显低于总烧钱，从而延长
              Series C 现金跑道。不过，GPU 密集型基础设施公司有一个特定风险：客户计算需求急升时，基础设施成本可能短期内比计费回款更快膨胀，在高速增长季度造成营运资本压力。如果 Anyscale
              为保障供应而预先购买计算容量，风险会进一步放大。


              $1B 估值的 Series C 也表明，公司尚未达到成熟 SaaS 公司常见的自由现金流转正门槛（收入持平或增长，毛利率 90%+）。在这个阶段继续依赖投资者资本可以预期，但仍是结构性风险：VC 对 AI
              基础设施的情绪一旦恶化，或公司无法证明 NRR 持续改善，未来融资成本都会上升。
