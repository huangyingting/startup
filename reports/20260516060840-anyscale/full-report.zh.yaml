      - number: '7.7'
        title: 财务风险、宏观敞口和终止标准
        blocks:
          - type: paragraph
            body: >-
              Anyscale 的财务风险由三项因素交织决定：未披露的烧钱速度、GPU 毛利敏感度、以及 AI 支出相关性。公司的收入来自基于用量的计算计费，与 AI 采用速度高度相关。如果企业 AI
              支出放缓——原因可能是宏观压力、ROI 怀疑或转向超大规模云厂商原生工具——Anyscale 收入会按比例下滑，且没有经常性 SaaS 合同提供结构性底部。2024 年 6 月 $100M Series C
              延长了现金跑道，但 ARR 未公开、月度 burn 未披露，精确跑道无法计算。Bloomberg 报道的 Series C $1B 估值，隐含公司必须持续受益于 AI 基础设施投资加速。GPU
              毛利敞口会进一步放大风险：Anyscale Hosted 层吸收云基础设施成本并加价转售，综合毛利对 GPU 实例价格敏感。超大规模云厂商如果下调 GPU 计算价格（CPU 计算的历史趋势如此），Anyscale
              毛利会被压缩，除非平台费增长抵消。stateofaireport.com 画像确认 Anyscale 被纳入分析师跟踪，但不提供收入基准。投资逻辑的终止标准可以识别：超大规模云厂商推出免费或深度折扣的托管 Ray
              等价服务、Ion Stoica 离开 Anyscale 全职回归学术、Series D 时点收入停滞低于预期阈值、重大 GDPR
              执法行动、或在收入压力下被迫改变开源许可证，单独或组合出现都会挑战投资逻辑。下方监控表为每项终止标准定义了具体可观察触发器、建议阈值和投资者行动含义。
