        - label: 超大云平台竞争
          value: 10
          detail: 可能性极高 × 关键影响。AWS/Google/Databricks 已在重叠能力上竞争。
        - label: 开源自托管（KubeRay）
          value: 9
          detail: 高可能性 × 重大影响。多家公司已确认生产环境 KubeRay 部署。
        - label: 关键人物集中
          value: 7
          detail: 中等可能性 × 重大影响。Ion Stoica UCB 职务分散精力；Nishihara 首次担任 CEO。
        - label: GPU 供给 / CUDA 依赖
          value: 6
          detail: 中等可能性 × 重大影响。多云 BYOC 支持可部分缓释。
        - label: AI 支出放缓
          value: 6
          detail: 中等可能性 × 重大影响。按用量计费收入与 AI 采用度高度相关。
        - label: GDPR / 监管责任
          value: 4
          detail: 中低可能性 × 中等影响。DPF 合规基础设施已到位。
        - label: EU AI Act 合规
          value: 4
          detail: 中低可能性 × 中等影响。高风险产品 AI 的过渡期延长至 2028 年。
        - label: 开源许可证变更
          value: 3
          detail: 低可能性 × 关键影响。取决于收入不及预期；目前未计划变更。
  - id: FR003
    title: 风险传导图——关键风险如何传导至估值影响
    type: flow
    layout: wide
    summary: 该有向流展示 Anyscale 四个主要风险源如何层层传导为中间后果，并最终影响收入、烧钱速度和估值。图中标出复合风险路径：多个风险源会汇聚到同一下游后果。
    approximationNotes: 流向结构基于商业模式分析和结构性推断。未使用公司私有财务数据。传导路径代表作者基于公开证据对可能因果链的判断。
    claimRefs:
      - CR001
      - CR020
      - CR026
      - CR030
      - CR031
      - CR033
      - CR039
      - CR041
    data:
      nodes:
        - id: hyperscaler
          label: 超大云平台竞争
          tier: risk-source
          detail: AWS/Google/Azure 捆绑托管 AI 基础设施；Databricks Ray on Databricks
        - id: kubray_oss
          label: KubeRay 自托管替代
          tier: risk-source
          detail: 免费、Kubernetes 原生的 Ray；生产部署已确认
        - id: key_person
          label: 关键人物离职风险
          tier: risk-source
          detail: Ion Stoica 受 UCB 职务分散精力；Nishihara 首次担任 CEO
        - id: regulatory
          label: 监管合规缺口
          tier: risk-source
          detail: GDPR 罚款；EU AI Act GPAI 规则；NIST 采购要求
        - id: revenue_decline
          label: 收入下滑 / 停滞
          tier: intermediate
          detail: 客户流向超大云或自托管 KubeRay；支出收缩
        - id: eng_velocity
          label: 工程速度下降
          tier: intermediate
          detail: 框架路线图放慢；社区信任受损；产品差异化收窄
        - id: sales_block
          label: 企业销售阻力
          tier: intermediate
          detail: 合规缺口阻碍受监管行业采购签字
        - id: burn_accel
          label: 烧钱速度加快
          tier: consequence
          detail: 收入缺口推高净烧钱；现金跑道压缩
        - id: capital_constraint
          label: 资本约束 / 过桥风险
          tier: consequence
          detail: Series D 条件恶化；稀释或降价融资风险上升
        - id: valuation_impact
          label: 估值压缩
          tier: consequence
          detail: $1B 独角兽估值受挑战；增长论点承压
      edges:
        - from: hyperscaler
          to: revenue_decline
          label: 客户迁移到捆绑云 AI
        - from: kubray_oss
          to: revenue_decline
          label: 商业转化率下降
        - from: key_person
          to: eng_velocity
          label: 产品路线图放慢；社区信誉承压
        - from: regulatory
          to: sales_block
          label: 合规缺口阻碍企业采购
        - from: revenue_decline
          to: burn_accel
          label: 收入缺口推高净烧钱
        - from: eng_velocity
          to: revenue_decline
          label: 产品差距让竞争对手替代
        - from: sales_block
          to: revenue_decline
          label: 企业管线收缩
        - from: burn_accel
          to: capital_constraint
          label: 现金跑道压缩快于预期
        - from: capital_constraint
          to: valuation_impact
          label: 融资议价力下降
        - from: revenue_decline
          to: valuation_impact
          label: 增长轨迹低于 1B 估值预期
  - id: FV001
    title: 推荐逻辑——从证据到有条件正面
    type: flow
    layout: wide
    insight: >-
      有条件正面建议来自三点交集：强技术护城河（Ray OSS）、已验证的市场需求（托管推理增长）、可信退出路径（Google/MSFT/AWS）。但在出手前，必须确认 ARR ≥ $60M，并解决 Series C Form D
      缺口。
    data:
      nodes:
        - id: f1
          label: 技术护城河（高）
          description: Ray OSS 下载量 5 亿+；GitHub 星标 4.1 万+；超大云尚无可行替代
        - id: f2
          label: 市场需求（增长）
          description: VentureBeat 2026 年 Q1 追踪显示，托管推理意向一个季度内从 13.2% 升至 23.1%
        - id: f3
          label: 可比估值（贴近市场）
          description: ARR 为 $60–100M 时，$1B 估值可辩护；若低于 $50M，按当前 AI 基础设施倍数则偏吃力
        - id: f4
          label: 竞争风险（高）
          description: AWS SageMaker、Google Vertex AI、Databricks 均入选 Gartner / IDC 2024–2025 领导者
        - id: f5
          label: 财务不透明（高风险）
          description: ARR、NRR、烧钱和毛利率未披露；SEC EDGAR 未见 Series C Form D
        - id: f6
          label: 尽调关口
          description: 确认 ARR ≥ $60M；NRR ≥ 110%；解决 Series C Form D 缺口；审阅股权结构表
        - id: f7
          label: 有条件正面建议
          description: 在尽调关口满足时，以 $1B 或更低入场；目标 3–5 年内以 $2–5B 退出
        - id: f8
          label: 放弃标准
          description: 超大云免费 Ray 服务；ARR < $40M；下轮降价融资；创始人离职；许可证变更
    sourceRefs:
      - SV001
      - SV006
      - SV012
      - SV013
  - id: FV002
    title: 可比收入倍数——AI 与云基础设施（NTM/ARR ×，2026）
    type: bar
    layout: wide
    insight: >-
      Anyscale 若按 $1B 估值，约为预估 ARR 的 10–20×——低于按 25–90× ARR 交易的私有 AI 基础设施同业（Hugging Face、Together AI），但与公开基础设施 SaaS 8–15×
      NTM 收入倍数一致。Databricks 39× 是异常值，反映其规模和平台宽度，Anyscale 还没有追上。
    data:
      items:
        - label: Hugging Face（约 2023）
          value: 90
          unit: × ARR est.
        - label: Databricks（2024 年 12 月）
          value: 39
          unit: × ARR
        - label: Together AI（约 2024）
          value: 25
          unit: × ARR est.
        - label: Datadog（上市公司）
          value: 15
          unit: × NTM rev.
        - label: Anyscale（2024 年 6 月，乐观估算）
          value: 13
          unit: × ARR est.
        - label: Snowflake（上市公司）
          value: 11
          unit: × NTM rev.
        - label: MongoDB（上市公司）
          value: 11
          unit: × NTM rev.
        - label: Anyscale（2024 年 6 月，悲观估算）
          value: 10
          unit: × ARR est.
        - label: Confluent（上市公司）
          value: 9
          unit: × NTM rev.
    sourceRefs:
      - SV006
      - SV010
      - SV015
  - id: FV003
    title: 按情景划分的估值区间——Anyscale（$B）
    type: range
    layout: wide
    insight: >-
      基准情景（$1.1–1.8B）意味着估值较 $1B Series C 小幅上行。乐观情景（$3.0–5.0B）需要 ARR 超过 $150M，且倍数达到
      20–30×。悲观情景（$0.3–0.5B）则意味着倍数压缩和竞争替代驱动的大幅降价融资。
    data:
      items:
        - label: 悲观情景（$B）
          low: 0.3
          high: 0.5
          unit: $B
          notes: $30–50M ARR × 8–10×；倍数压缩 + 竞争替代
        - label: 基准情景（$B）
          low: 1.1
          high: 1.8
          unit: $B
          notes: $75–100M ARR × 14–18×；温和增长，倍数稳定
        - label: 乐观情景（$B）
          low: 3
          high: 5
          unit: $B
          notes: $150M+ ARR × 20–30×；Ray 飞轮 + 高 NRR + AI 溢价倍数
    sourceRefs:
      - SV006
      - SV007
      - SV015
  - id: FV004
    title: 投资 KPI 记分卡——Anyscale（2026 年 5 月）
    type: kpi
    layout: standard
    insight: Anyscale 在市场规模和技术护城河上得分强，但财务验证（ARR 和 NRR 未披露）以及对抗超大云的竞争韧性仍有关键缺口。整体可提交 IC 分数为 3.3/5，前提是先解决财务不透明缺口。
    data:
      items:
        - label: 估值（Series C）
          value: $1B
          status: confirmed
          note: 2024 年 6 月；由 a16z、NEA、GV、Intel Capital 领投
        - label: 累计融资额
          value: ~$320M
          status: confirmed
          note: $20.7M Form D + $199.2M Form D/A + $100M Series C（媒体报道）
        - label: ARR（2026）
          value: Undisclosed
          status: missing
          note: 结构性分析估计为 $50–100M；未确认
        - label: NRR
          value: Undisclosed
          status: missing
          note: 无公开数据；从落地后扩张模型推断 >100%
        - label: Ray 下载量
          value: 500M+
          status: confirmed
          note: 前文章节研究引用自 github.com/ray-project/ray
        - label: GitHub 星标（Ray）
          value: 41,000+
          status: confirmed
          note: github.com/ray-project/ray；验证 OSS 社区规模
        - label: Series C Form D
          value: Not Filed
          status: missing
          note: 截至 2026 年 5 月，SEC EDGAR 未发现 Form D；证据缺口
        - label: 退出可比
          value: Databricks $62B
          status: confirmed
          note: Databricks 以 $62B 估值完成 $15B Series J（2024 年 12 月，据 SiliconAngle）
    sourceRefs:
      - SV001
      - SV003
      - SV013
      - SV015
