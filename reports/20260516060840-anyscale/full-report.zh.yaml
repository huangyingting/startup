  - id: TP004
    title: 护城河耐久度 / 竞争风险登记表
    columns:
      - 护城河主张
      - 主要威胁
      - 严重性
      - 缓释措施 / 尽调问题
    rows:
      - - Ray OSS 社区飞轮（GitHub 41K+ 星标；500M+ 下载）
        - 竞争性 OSS 框架（PyTorch、JAX、Flax）可能取代 Ray，成为主导的分布式 Python ML 运行时；前提是 Ray 的抽象跟不上 GPU 硬件演进。
        - 中
        - 跟踪 Ray GitHub 活跃度、贡献者数量和企业部署量的同比增长；核验 Ray 3.0 采用率；评估 GPU 原生 kernels（FlashAttention、xFormers）是否绕开 Ray。
      - - Python 优先易用性（无 JVM 开销）
        - Databricks 和 SageMaker 都支持 Python SDK；随着 Spark 在 Databricks ML 中变成可选项，JVM 差距 正在收窄；易用性优势可能减弱。
        - 低
        - 用标准训练工作负载，对比 Anyscale 与 Databricks 在纯 Python ML 工程师部署耗时上的差异；评估 Databricks 客户迁移模式。
      - - 多工作负载覆盖（训练 + 服务 + 批处理 + 流水线共用一个框架）
        - 目前没有单一竞争对手能匹配全覆盖广度；风险在于专业化最佳单点方案（Modal 做服务、Together AI 做推理、SkyPilot 做训练）逐块替代 Anyscale。
        - 中
        - 跟踪客户采用最佳单点方案还是 Anyscale 一体化；评估企业 ML 预算决策中，是平台整合胜出，还是碎片化胜出。
      - - 多云 BYOC（AWS、GCP、Azure、CoreWeave、Nebius）
        - 超大云厂商扩大跨云支持（AWS Outposts、GCP Distributed Cloud、Azure Arc）；多云可迁移性带来的 切换成本优势被削弱。
        - 中
        - 评估 Anyscale BYOC 客户按云的分布；判断多云是采购标准还是合规勾选项；对比 CoreWeave 与 超大云厂商的跨云路线图。
      - - 云市场计费和企业安全（SSO、SAML、SCIM、VPC、审计日志）
        - 主流云 ML 平台（SageMaker、Vertex AI、Azure ML、Databricks）都提供同等或更强的企业安全能力； Modal 企业层级随规模扩大很可能补上 SSO。
        - 低
        - 核验企业安全功能是否是目标买家的采购门槛；评估 SSO/SAML/SCIM 差异是短期还是可持续；对比合规认证。
    notes: 严重性评级是基于公开证据的定性判断；实际威胁程度取决于外部无法从公开资料看到的竞争投入速度。所有缓释项都需要 私下尽调获取 Anyscale 的产品路线图、客户分群数据和竞争胜负报告。
