- id: section-R4
  title: Regulatory and Legal Risks
  body: >-
    Anyscale operates in an evolving regulatory environment spanning EU data protection, AI-specific
    legislation, US export controls, and FTC competition oversight. The EU General Data Protection
    Regulation (GDPR) is the highest-probability near-term regulatory exposure: Anyscale processes
    personal information of EU users and has addressed this in its privacy policy by referencing the
    Data Privacy Framework (DPF) Principles and explicitly citing EU/UK GDPR legal bases (Performance
    of Contract, Legitimate Interest, Consent, and Legal Obligations). The privacy policy also confirms
    availability of DPF arbitration for unresolved compliance complaints under Annex I of the DPF
    Principles — a signal of formal EU/UK GDPR compliance infrastructure. The EU AI Act's rules for
    general-purpose AI (GPAI) models became applicable on August 2, 2025. Infrastructure providers
    building or enabling GPAI models may carry transparency, documentation, and copyright compliance
    obligations under the Act. A political agreement on the AI Act's simplification omnibus was reached
    on May 7, 2026, adjusting timelines for high-risk AI systems embedded in products to 2027-2028.
    NIST's AI Risk Management Framework (AI RMF) is voluntary and non-regulatory in the US, but its
    adoption is driven by government procurement mandates — meaning Anyscale's US public-sector customers
    may require NIST RMF alignment as a procurement condition. BIS export control activity is active:
    BIS extended the authorized IC designer timeline to December 31, 2026, and regularly updates
    restrictions on AI accelerator exports. Anyscale customers in regulated industries or jurisdictions
    may face deployment constraints under these rules. CISA has published the AI Cybersecurity
    Collaboration Playbook and guidelines for deploying AI systems securely — guidance that enterprise
    customers will increasingly use to assess vendors. From a litigation standpoint, a CourtListener
    search for "anyscale" returns no matching court opinions, indicating no confirmed public litigation.
    SEC EDGAR shows Form D exempt offering filings from 2020 and 2021, consistent with early private
    fundraising rounds; no 2024 Series C Form D is visible in public records, a minor diligence flag
    consistent with findings in the financials chapter.
