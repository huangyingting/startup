      Changes in the US federal AI governance posture directly affect NIST RMF applicability,
      export control direction, and the regulatory environment for AI infrastructure providers.
    diligencePath: >-
      Search whitehouse.gov for current AI executive orders; review Federal Register for AI-related
      regulatory activity issued under the current administration.

