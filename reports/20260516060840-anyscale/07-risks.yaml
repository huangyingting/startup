  evidenceGaps:
  - id: EGR001
    type: private-evidence-only
    severity: blocking
    topic: revenue-and-burn-rate
    missingEvidence: >-
      Anyscale's ARR, quarterly revenue growth, monthly burn rate, and net revenue retention are not
      publicly disclosed. No independent analyst estimates with primary source backing are available.
    whyItMatters: >-
      Without revenue and burn data, the financial risk severity (kill criteria QR024 and TR005 row 5)
      cannot be quantified. The $1B valuation at Series C implies growth expectations whose current
      fulfillment status cannot be assessed from public sources.
    diligencePath: >-
      Request from Anyscale: trailing 12-month ARR, quarterly growth rate, monthly burn rate, and
      gross margin breakdown by Hosted vs. BYOC tier. Cross-validate with Series C investor board
      reporting.

    relatedQuestionRefs:
    - QR024
  - id: EGR002
    type: missing-source
    severity: material
    topic: security-certifications
    missingEvidence: >-
      No public SOC 2 Type II report, ISO 27001 certification, or security incident history is
      available for Anyscale. The Anyscale security page returned a 404 error as of May 2026,
      and no trust center or compliance page is accessible.
    whyItMatters: >-
      Enterprise procurement in financial services, healthcare, and regulated sectors requires SOC 2
      attestation. Absence of confirmed certification is a sales blocker for a segment of Anyscale's
      target enterprise market and an operational risk signal.
    diligencePath: >-
      Request from Anyscale: SOC 2 Type II audit report, penetration test results, and security
      incident history including any Ray cluster security vulnerabilities and CVE disclosures.

    relatedQuestionRefs:
    - QR012
  - id: EGR003
    type: private-evidence-only
    severity: material
    topic: key-person-succession
    missingEvidence: >-
      No succession plan, key-man insurance, or named backup leadership is documented in any
      public Anyscale filing or announcement for Ion Stoica, Robert Nishihara, or Philipp Moritz.
    whyItMatters: >-
      Key-person risk for Stoica (academic divided attention) and Nishihara (first-time CEO) cannot
      be assessed for mitigation quality without understanding internal succession and equity vesting
      arrangements.
    diligencePath: >-
      Request from Anyscale board: equity vesting cliff schedules for founders, key-man insurance
      coverage, and informal succession planning documentation.

  - id: EGR004
