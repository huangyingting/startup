- id: section-R3
  title: Open-Source and Commercial Tension
  body: >-
    Anyscale's deepest structural risk is the tension between Ray's open-source model and its commercial
    monetization. KubeRay, the official Kubernetes operator for Ray maintained under the ray-project GitHub
    organization, enables organizations to deploy production Ray clusters on EKS, GKE, AKS, or self-hosted
    Kubernetes without any Anyscale involvement or payment. The Ray documentation explicitly notes that
    "KubeRay is used by several companies to run production Ray deployments," confirming real commercial
    substitution. Because the KubeRay operator is open-source and actively maintained by Anyscale itself
    (to demonstrate Ray's Kubernetes compatibility), Anyscale is in effect building and improving its own
    competitive substitute. This creates a classic open-core tension: every improvement to KubeRay expands
    the self-hosted addressable cohort. Anyscale's managed value proposition — cluster lifecycle management,
    autoscaling, fault tolerance, observability, enterprise SSO/SAML/SCIM, audit logs — must deliver
    enough operational value above the KubeRay baseline to justify subscription cost. The risk is that
    enterprise platform teams with mature DevOps capacity will simply operate KubeRay and never evaluate
    Anyscale's commercial tier. Ray's GitHub repository serves as the primary community signal and open-source
    asset; any decision to change the open-source license (e.g., to SSPL or BUSL) under revenue pressure
    would trigger community backlash and potentially accelerate competitive forking, reducing Anyscale's
    top-of-funnel. The discuss.ray.io forum reflects active community engagement including operational
    challenges, cluster management issues, and feature requests — signals of both the platform's complexity
    and the community's continued dependence on the ecosystem. No license change is currently planned or
    announced; this is a contingent risk that would materialize only under sustained revenue underperformance.
  claimRefs:
