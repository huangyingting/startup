figures:
- id: FU001
  title: Anyscale Customer Journey Map — Open Source to Enterprise
  type: journey-map
  layout: wide
  summary: >-
    The five-stage journey from open-source Ray discovery to BYOC enterprise deployment,
    showing buyer triggers, Anyscale value props, and conversion barriers at each stage.
  approximationNotes: >-
    Journey stages are inferred from Anyscale's pricing, startup program, and platform
    pages. No customer interview data or funnel metrics are publicly available.
  claimRefs:
  - CU021
  - CU023
  - CU026
  - CU027
  data:
    items:
    - label: 'Stage 1: Discovery'
      description: Practitioner finds Ray via GitHub, PyPI, or peer recommendation
      buyerTrigger: Need to scale a Python ML workload beyond a single machine
      anyscaleValue: Free open-source Ray; no Anyscale account needed
      alternative: Dask, multiprocessing, Modal for simpler workloads
      conversionBarrier: No commercial touchpoint; user may never evaluate Anyscale
    - label: 'Stage 2: Startup Evaluation'
      description: Early-stage AI company evaluates managed Ray for fast production deployment
      buyerTrigger: Need production ML infra without dedicated platform engineering team
      anyscaleValue: Up to $20K credits + field engineer support + Anyscale Runtime
      alternative: SageMaker, Vertex AI free tier, self-hosted KubeRay
      conversionBarrier: Credit limits; team may outgrow free tier before generating revenue
    - label: 'Stage 3: Hosted Production'
      description: Team deploys first production workload on Hosted tier
      buyerTrigger: Need managed clusters with autoscaling and observability for production
      anyscaleValue: Pay-as-you-go; sub-1-min startup; integrated dashboards and lineage
      alternative: KubeRay self-hosted on own Kubernetes; Modal for inference-only
      conversionBarrier: Limited regions; no GPU reservation usage; business-hours support only
    - label: 'Stage 4: BYOC Enterprise'
      description: Enterprise migrates to BYOC for data residency and GPU reservation use
      buyerTrigger: Data residency mandate, existing cloud commitments, or security requirements
      anyscaleValue: Control plane in customer VPC; 24x7 SLA; unlimited support; committed contracts
      alternative: AWS SageMaker, Azure ML, Vertex AI with native Kubernetes + KubeRay
      conversionBarrier: Procurement friction; IT security review; comparison with native cloud ML
    - label: 'Stage 5: Expansion'
      description: Customer expands to new workloads (training + serving + data) on Anyscale
      buyerTrigger: New AI use cases; new teams adopting Ray internally
      anyscaleValue: Composite AI inference; multi-workload unified platform; GPU pooling
      alternative: Point solutions for specific workloads (Modal, Together AI)
      conversionBarrier: Budget consolidation; platform engineering teams may self-manage

