  evidenceGaps:
  - id: EGU001
    type: private-evidence-only
    severity: blocking
    topic: customer-metrics
    missingEvidence: >-
      ARR, NRR, GRR, churn rate, and total enterprise customer count are not publicly available.
      No public financial disclosure or independent reporting on Anyscale's commercial retention metrics.
    whyItMatters: >-
      Without NRR and churn data, the durability of Anyscale's commercial traction cannot be assessed.
      High OSS adoption without retention data could indicate thin monetization even at apparent scale.
    diligencePath: >-
      Request from Anyscale: total ARR, quarterly NRR, cohort churn data, and top-10-customer
      revenue concentration from the data room. Cross-check against inferred GPU consumption patterns
      from BYOC cloud marketplace billing disclosures if available.
    relatedQuestionRefs:
    - QU017
    - QU021

  - id: EGU002
    type: missing-source
    severity: material
    topic: named-customers
    missingEvidence: >-
      Direct case-study pages for OpenAI, Uber, Netflix, Shopify, and Spotify are unavailable
      (all return HTTP 404). No archived or independent versions of these case studies were accessible.
    whyItMatters: >-
      These are the marquee customer references in Anyscale's historical marketing. Their absence
      from live pages makes it impossible to confirm production deployment status, use-case depth,
      or customer satisfaction for the most strategically important logos.
    diligencePath: >-
      Request Anyscale for updated case study documentation, or obtain reference calls with
      engineering leadership at named ecosystem customers. Web Archive versions of the removed
      pages may provide historical content.
    relatedQuestionRefs:
    - QU001
    - QU009
    - QU018
    relatedTableRefs:
    - TU001

  - id: EGU003
    type: private-evidence-only
    severity: material
    topic: conversion-funnel
    missingEvidence: >-
      OSS-to-commercial conversion rate and startup-program-to-paid conversion rate are not
      publicly disclosed. The fraction of Ray practitioners who evaluate and purchase Anyscale
      versus self-hosting on KubeRay is unknown.
    whyItMatters: >-
      The entire commercial thesis depends on converting the Ray open-source community into paying
      customers. Without conversion rate data, the revenue multiple on OSS investment cannot be assessed.
    diligencePath: >-
      Obtain internal funnel metrics from Anyscale: unique evaluations, conversion from Hosted to
      BYOC, startup-program-to-paid rate, and MQL-to-closed-won rates by segment.
    relatedQuestionRefs:
    - QU021
    - QU017

  - id: EGU004
    type: missing-source
    severity: material
    topic: customer-concentration
    missingEvidence: >-
      Revenue concentration among Anyscale's top customers is not publicly available. It is
      unknown whether 3-5 high-GPU-usage customers represent a majority of revenue.
    whyItMatters: >-
      If a small number of foundation model training customers (such as OpenAI or similar)
      represent a large share of revenue, loss of even one such customer would materially
      impair Anyscale's financials. This is particularly relevant given the industry trend
      toward large AI labs building proprietary infrastructure.
    diligencePath: >-
      Request from Anyscale: revenue distribution by customer decile, revenue from top-5 customers
      as a percentage of ARR, and customer-level GPU consumption concentration.
    relatedQuestionRefs:
    - QU017
    relatedTableRefs:
    - TU005

  - id: EGU005
    type: missing-source
    severity: minor
    topic: independent-customer-validation
    missingEvidence: >-
      All available customer testimonials are sourced from Anyscale's own product pages (independence: company).
      No independent G2, TrustRadius, Gartner Peer Insights, or other third-party review platform
      data was accessible (G2 returned 403; TrustRadius returned 404). Customer segmentation by
      vertical, geography, and size is entirely inferred from testimonials; no authoritative
      breakdown of the customer base by segment is available.
    whyItMatters: >-
      Company-hosted testimonials lack independence. Third-party reviews would provide unbiased
      signals on product satisfaction, NPS, and common pain points. Their absence leaves a gap
      in evidence quality for customer sentiment. Segmentation claims without a denominator
      cannot establish true share-of-customer-base per vertical.
    diligencePath: >-
      Access G2 or Gartner Peer Insights via authenticated enterprise account. Request NPS data
      or CSAT scores from Anyscale's data room. Conduct reference calls with named Anyscale customers.
    relatedQuestionRefs:
    - QU002
    - QU015
