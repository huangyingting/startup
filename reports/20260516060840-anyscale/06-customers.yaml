- id: section-U3
  title: Go-to-Market Strategy and Commercial Model
  body: >-
    Anyscale's GTM strategy is structured around an open-source flywheel that converts practitioner
    adoption of Ray into commercial platform customers. The primary acquisition motion is organic:
    Ray's 42,600+ GitHub stars and 500M+ all-time downloads generate continuous inbound developer
    interest without paid acquisition. From this practitioner funnel, Anyscale targets three
    conversion paths. First, the startup program provides up to $20,000 in compute credits plus
    dedicated field engineer support and technical architecture guidance, targeting seed-to-Series-A
    AI companies. The platform documentation confirms credits can be stacked with existing cloud
    provider credits (AWS, GCP, Azure). Second, the Hosted tier provides a pay-as-you-go, fully
    managed environment for teams that want to start quickly without infrastructure expertise.
    Compute pricing ranges from $0.0135/hr for CPU-only instances to $9.29/hr for NVIDIA H100 and
    $10.68/hr for NVIDIA H200 on the Hosted tier. Third, the BYOC (Bring Your Own Cloud) tier
    deploys the Anyscale control plane inside the customer's own cloud VPC, targeting enterprises
    with data residency requirements, existing GPU reservations, or governance mandates. The BYOC
    tier includes 24x7 enterprise SLAs and unlimited case submissions. Cloud marketplace billing
    on AWS, GCP, and Azure allows enterprise customers to draw down against committed cloud spend,
    reducing procurement friction. The developer community strategy includes the Ray Slack community,
    the discuss.ray.io forum (1,453+ topics in Ray Core), Ray Summit (annual conference), and
    extensive documentation. The community forum and Slack channel create practitioner stickiness
    and serve as a support channel that supplements formal product support. Partners include
    cloud providers (AWS, GCP, Azure), specialty GPU clouds (CoreWeave, Nebius), and hardware
    vendors (NVIDIA, AMD). Anyscale's Committed Contract tier offers volume discounts for teams
    with predictable GPU consumption, reducing per-unit costs for high-volume workloads.
  claimRefs:
