- id: section-U4
  title: Customer Adoption Signals and Community Ecosystem
  body: >-
    Quantitative adoption signals for Anyscale's customer traction fall into two categories:
    open-source community metrics (directly measurable) and commercial conversion signals
    (not publicly available). On the open-source side, the ray-project/ray GitHub repository
    has 42,600+ stars, 7,600+ forks, 1,200+ contributors, and 30,371+ total commits as of
    May 2026. PyPI records over 500 million all-time downloads of the ray package. These
    metrics are top-decile for any ML infrastructure framework and confirm Ray's position as
    a practitioner default. The Ray community forum at discuss.ray.io hosts 1,453 topics in
    Ray Core, 759 in Ray Tune, 408 in Ray Serve, 228 in Ray Data, and 168 in Ray Train—
    categories that map directly to Anyscale's commercial product surfaces. KubeRay, the
    open-source Kubernetes operator for self-hosted Ray, has its own GitHub repository and
    documents enterprise-scale deployments including Workday's 10K-model scenario, indicating
    that the open-source self-hosting path is also used at enterprise scale. The Anyscale
    YouTube channel at youtube.com/@anyscale is an additional practitioner engagement surface.
    On commercial conversion, Anyscale does not publish customer count, net revenue retention,
    gross revenue retention, or pipeline conversion rate. The company cited aggregate performance
    improvements on product pages ("10x larger datasets for VLA model training," "3x faster
    model deployment," "12x faster training with 50% lower cloud costs") but these are company-
    claimed metrics without third-party corroboration. The State of AI Report 2025 (stateofaireport.com)
    documents that 44% of U.S. businesses now pay for AI tools, confirming broad AI tooling
    adoption trends that favor Anyscale's market, but does not specifically validate Anyscale's
    customer numbers.
