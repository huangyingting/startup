- id: section-U2
  title: Named Customer Proof and Production Deployments
  body: >-
    Anyscale's publicly verifiable customer evidence as of May 2026 consists of named testimonials
    on its own product pages. Six distinct named individuals with verified organizational affiliations
    are quoted across the distributed-training, multimodal-data-processing, composite-ai-inference,
    and product/open-source/ray pages. Sam Jenkins, Senior MLOps Engineer at Tripadvisor, states
    on the multimodal-data-processing page: "Ray scheduling heterogeneous workloads is something
    we couldn't really do easily before. We see much lower idle time and much better utilization."
    This is one of the few testimonials attributing a named enterprise company. Travis Addair,
    CTO at Predibase, credits Ray as enabling a "state-of-the-art low-code deep learning platform"
    on the product/open-source/ray page. Philip Cerles, Senior Machine Learning Engineer at
    Afresh, describes integrating Ray for hyperparameter tuning in 20 minutes and achieving
    results that "worked beautifully." Additional testimonials from John Macdonald (Head of
    Perception, company unnamed), Greg Roodt (ML Lead at a company with 170 million users),
    Adrian Li-Bell (Member of Technical Staff, company unnamed), Cindy Wang (Staff ML Engineer,
    company unnamed), Jake Sager (Software Engineer, 3x faster model deployment for multimodal
    search), and Ross Morrow (Principal Engineer, model deployment time from one week to one day)
    collectively describe production deployments across training, data processing, and serving
    workloads. Anastasis Germanidis, Co-Founder and CTO of an unnamed generative AI company,
    states on the rebrand2026 page that Anyscale "removes the risk around our infrastructure and
    allows our team to focus on innovation rather than infrastructure bottlenecks." The KubeRay
    GitHub repository lists "Scaling Ray to 10K Models and Beyond" with Workday as a community
    case study, indicating large-scale enterprise deployment on KubeRay (self-hosted), not
    necessarily Anyscale's managed service. Ray.io describes Ray as "the framework behind
    ChatGPT," referencing OpenAI's widely-reported use of Ray for model training. Independent
    confirmation of named deployments at OpenAI, Uber, Netflix, Shopify, Spotify, and Cruise
    could not be obtained because direct case-study URLs are unavailable.
