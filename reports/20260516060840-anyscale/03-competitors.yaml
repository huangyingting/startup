- id: section-3
  title: Platform-layer competitors — Databricks, SageMaker, Vertex AI, Azure ML,
    RunAI
  body: 'Databricks offers an integrated AI and ML platform on its Lakehouse architecture.
    As of 2026, Databricks ML includes Foundation Models (Meta Llama, Anthropic Claude,
    OpenAI GPT), MLflow for GenAI observability and evaluation, Vector Search, Agent
    Framework, Foundation Model Fine-tuning, AutoML, and Lakeflow Jobs for workflow
    automation. Critically, Databricks includes Ray on Databricks as a native capability,
    meaning existing Databricks customers can access Ray''s distributed computing
    without switching to Anyscale. This positions Databricks as both a substitute
    and a channel for Ray adoption — teams that start with Databricks'' managed Ray
    may eventually upgrade to Anyscale if they need deeper management and multi-cloud
    portability. AWS SageMaker is the dominant managed ML platform on AWS, offering
    training, batch inference, real-time endpoints, MLflow experiment tracking, and
    integrated pipeline management deeply tied to AWS compute pricing. SageMaker pricing
    follows the underlying EC2 instance rates, which are cost-competitive for AWS-committed
    customers but create cloud lock-in that Anyscale''s BYOC model is designed to
    avoid. Google Vertex AI provides an equivalent GCP-native managed ML platform.
    Microsoft Azure ML integrates with the broader Azure AI services ecosystem. RunAI
    is a GPU scheduling and orchestration platform built on Kubernetes, targeting
    enterprise ML infrastructure teams that want workload-aware GPU sharing and quota
    management without the full abstraction layer of a managed training platform.
    RunAI''s access was blocked at chapter fetch time (403 Forbidden), so only prior-chapter
    data is available. The feature comparison matrix below maps all six platforms
    across nine buying criteria.

    '
