- id: TP004
  title: Moat durability / competitive risk register
  columns:
  - moat claim
  - primary threat
  - severity
  - mitigation / diligence ask
  rows:
  - - Ray OSS community flywheel (41K+ GitHub stars; 500M+ downloads)
    - Competitor OSS frameworks (PyTorch, JAX, Flax) could displace Ray as the dominant
      distributed Python ML runtime if Ray's abstractions fall behind GPU hardware
      progress
    - medium
    - Track Ray GitHub velocity, contributor count, and enterprise deployment growth
      YoY; verify Ray 3.0 adoption rate; assess whether GPU-native kernels (FlashAttention,
      xFormers) route around Ray
  - - Python-first ergonomics (no JVM overhead)
    - Databricks and SageMaker both support Python SDKs; the JVM gap is narrowing
      as Spark becomes optional in Databricks ML; ergonomic advantage may diminish
    - low
    - Benchmark Anyscale vs. Databricks on pure Python ML engineer time-to-deploy
      for standard training workloads; assess Databricks customer migration patterns
  - - Multi-workload coverage (train + serve + batch + pipelines on one framework)
    - No single competitor currently matches full breadth; risk is that specialized
      best-of-breed point solutions (Modal for serving, Together AI for inference,
      SkyPilot for training) displace Anyscale piecemeal
    - medium
    - Track customer adoption of best-of-breed point solutions vs. Anyscale consolidation;
      assess whether platform consolidation or fragmentation wins in enterprise ML
      budget decisions
  - - Multi-cloud BYOC (AWS, GCP, Azure, CoreWeave, Nebius)
    - Hyperscalers expand cross-cloud support (AWS Outposts, GCP Distributed Cloud,
      Azure Arc); reducing the switching cost advantage of multi-cloud portability
    - medium
    - Assess Anyscale BYOC customer breakdown by cloud; evaluate whether multi-cloud
      is a buying criterion or a compliance checkbox; compare CoreWeave and hyperscaler
      cross-cloud roadmaps
  - - Marketplace billing and enterprise security (SSO, SAML, SCIM, VPC, audit logging)
    - All major cloud ML platforms (SageMaker, Vertex AI, Azure ML, Databricks) offer
      equivalent or superior enterprise security; Modal's enterprise tier will likely
      add SSO as it scales
    - low
    - Verify that enterprise security features are a procurement gate for target buyers;
      assess whether SSO/SAML/SCIM differentiation is transient vs. durable; compare
      compliance certifications
  notes: Severity ratings are qualitative assessments based on public evidence; actual
    threat severity depends on competitive investment rates not visible from public
    sources. All mitigations require private diligence access to Anyscale's product
    roadmap, customer cohort data, and competitive win/loss reporting.
