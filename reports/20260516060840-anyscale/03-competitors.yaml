tables:
- id: TP001
  title: Competitor profile table
  columns:
  - competitor
  - category
  - scale / funding
  - target segment
  - differentiation
  - limitation vs. Anyscale
  rows:
  - - Anyscale
    - Managed Ray platform (reference)
    - $225M+ raised; Series C 2024
    - Enterprise ML teams, AI-native startups
    - Managed Ray, multi-cloud BYOC, full workload spectrum, OSS flywheel
    - Pricing premium over self-managed; limited serverless for short-duration jobs
  - - Modal Labs
    - Serverless Python compute
    - Venture-backed; undisclosed
    - ML engineers, startups, event-driven workloads
    - Zero-config serverless; per-second billing; Python-native function deployment
    - No multi-node distributed Ray training; no enterprise SSO/SAML/SCIM natively
  - - CoreWeave
    - GPU cloud infrastructure (IaaS)
    - $1B+ raised; IPO filed
    - Teams needing raw GPU cluster access; inference-at-scale
    - Kubernetes-native GPU fleet; CoreWeave Sandboxes for RL and eval; Anyscale BYOC
      target
    - IaaS layer only; no ML workflow orchestration or Ray management
  - - Together AI
    - AI-native cloud (inference + training)
    - $228M+ raised (as of 2024)
    - LLM serving teams, AI research, pre-training at scale
    - 2× faster inference claim, 60% cost reduction, 90% faster pre-training (Together
      Kernel)
    - Inference-first; does not expose Ray programming model; limited enterprise security
      suite
  - - Databricks
    - Unified Lakehouse AI/ML platform
    - $43B valuation (2023); $10B+ raised
    - Data-centric enterprise ML teams; SQL-heavy analytics + ML workflows
    - MLflow built-in, Ray on Databricks, Vector Search, Foundation Models, Lakeflow
      Jobs
    - JVM/Spark overhead for pure ML; cloud-agnostic but Databricks-native; not BYOC
  - - AWS SageMaker
    - Managed ML platform (AWS-native)
    - Amazon subsidiary (no separate funding)
    - AWS-committed enterprise ML teams
    - Deep AWS integration; pay-per-use EC2 pricing; Marketplace billing; AutoML
    - AWS lock-in; no multi-cloud or BYOC to competing clouds; Spark/Databricks pattern
  - - Google Vertex AI
    - Managed ML platform (GCP-native)
    - Google / Alphabet subsidiary
    - GCP-committed enterprise ML teams
    - AutoML, Vertex Experiments, Foundation Model serving, Vertex Pipelines
    - GCP lock-in; no multi-cloud; Python SDK but not Ray-native
  - - Microsoft Azure ML
    - Managed ML platform (Azure-native)
    - Microsoft subsidiary
    - Azure-committed enterprise ML teams
    - Azure integration, AutoML, MLflow support, AKS-based compute
    - Azure lock-in; no multi-cloud; less Python-native than Anyscale
  - - RunAI
    - GPU scheduling and orchestration
    - Acquired by NVIDIA 2024
    - Enterprise GPU infrastructure teams
    - Kubernetes-based GPU quota management and workload scheduling
    - Not a full ML workflow platform; no model serving; no Ray framework support
  - - Lightning AI
    - PyTorch Lightning training platform
    - Venture-backed; undisclosed
    - PyTorch-centric ML teams
    - PyTorch Lightning native; Studio IDE; cloud training with GPU autoscaling
    - PyTorch-only; no Ray compatibility; limited multi-cloud BYOC; no batch inference
      layer
  - - SkyPilot
    - Open-source multi-cloud job scheduler
    - Open source (Berkeley Sky Lab / OSS)
    - Cost-focused ML teams with cloud engineering capacity
    - Cloud-agnostic GPU procurement; no management fee; AWS/GCP/Azure/Lambda Labs
      support
    - No managed service; no enterprise support; no Ray-specific orchestration features
  notes: Funding figures are from public reports as of mid-2025; CoreWeave IPO status
    reflects 2024–2025 news. Anyscale row is included for reference comparison. Funding
    for Modal, Lightning, and Together AI may have updated since chapter research
    date; all figures should be confirmed via private diligence. RunAI was acquired
    by NVIDIA in 2024 per prior-chapter sources.
