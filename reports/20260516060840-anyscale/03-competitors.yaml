- id: section-6
  title: Competitive risks and vulnerabilities
  body: 'Anyscale faces four primary categories of competitive risk. The first and
    most strategic is cloud provider commoditization: AWS, Google, and Microsoft can
    each offer managed Ray clusters through their existing managed Kubernetes and
    compute services at a cost basis that Anyscale — paying market rates for the same
    underlying compute — cannot match on price. If any of the three hyperscalers launches
    a first-party managed Ray offering with deep marketplace billing integration,
    Anyscale''s compute-layer value proposition erodes significantly. Databricks partially
    executes this threat already through Ray on Databricks. The second risk is serverless
    simplicity: Modal Labs wins for event-driven and short-duration ML workloads with
    a dramatically simpler developer experience and no cluster configuration overhead.
    Teams that can reformulate their workloads as modal-deployable containers may
    never evaluate Anyscale. Together AI adds a related risk: if inference cost drops
    to a price point where running models on Together AI''s shared infrastructure
    is cheaper than operating dedicated serving endpoints on Anyscale, the serving
    layer of Anyscale''s business becomes vulnerable. The third risk is open-source
    self-management: KubeRay, SkyPilot, and Kubeflow provide credible managed-free
    alternatives for teams with four or more internal Kubernetes engineers. Each dollar
    reduction in Kubernetes complexity tools (managed Kubernetes, operator maturity)
    expands the self-managed addressable cohort. The fourth risk is data-integration
    depth: Databricks holds the dominant position in enterprise data lakes and SQL
    analytics. For teams that run ML on their existing Databricks data estate, the
    switching cost of migrating compute orchestration to Anyscale may exceed the performance
    or ergonomic gains. Anyscale has not publicly disclosed competitive win rates
    or churn data, making quantitative risk calibration impossible from public sources
    alone.

    '
