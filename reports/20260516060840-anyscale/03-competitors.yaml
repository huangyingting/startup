- id: TP003
  title: Pricing / packaging comparison
  columns:
  - vendor
  - pricing model
  - base / entry price
  - compute add-on
  - contract model
  - implication for buyers
  rows:
  - - Anyscale (Hosted)
    - Platform fee + underlying cloud compute pass-through
    - Not publicly listed (custom quote)
    - Cloud provider rates (AWS/GCP/Azure) + Anyscale management markup
    - Annual enterprise contract or Marketplace consumption
    - Highest total cost; lowest operational burden; Marketplace drawdown of cloud
      committed spend
  - - Anyscale (BYOC)
    - Management fee + customer-owned cloud compute
    - Not publicly listed (custom quote)
    - Customer-owned cloud account compute (no Anyscale cloud markup)
    - Annual enterprise contract; customer retains cloud cost control
    - Lower total compute cost than Hosted; customer owns cloud relationship
  - - Modal Labs (Starter)
    - Serverless per-container-second
    - $0 + compute ($30/month free credits)
    - $3.95/GPU-hr example rate for H100-class GPU
    - Month-to-month; no contract
    - Lowest barrier to start; 10 GPU concurrency cap limits scale; cost unpredictable
      for large jobs
  - - Modal Labs (Team)
    - Serverless per-container-second
    - $250/month + compute ($100/month free credits)
    - Same per-second compute rates as Starter
    - Month-to-month or annual
    - 50 GPU concurrency; unlimited seats and scheduled functions; better for production
      scale
  - - CoreWeave
    - GPU cloud on-demand or reserved
    - On-demand rates (Kubernetes compute); no public base fee
    - Per-GPU-hour for H100, A100 clusters; storage and networking separate
    - On-demand or reserved instance commitments
    - Raw GPU access at competitive rates; no ML management layer; suits teams with
      Kubernetes expertise
  - - Together AI (serverless inference)
    - Per-token or per-second inference pricing
    - API-based; no platform fee for serverless
    - Per-million-tokens for open-source LLMs; dedicated GPU rates for reserved
    - Serverless pay-as-you-go or dedicated deployment contract
    - Lowest friction for inference-only workloads; 60% cost claim vs. unspecified
      baseline
  - - Databricks (ML on Lakehouse)
    - DBU consumption-based pricing + cloud compute
    - Databricks DBU rates (Jobs, SQL, ML tiers)
    - Cloud compute (AWS/GCP/Azure EC2/VMs) + DBU charges
    - Annual enterprise commit or Marketplace drawdown
    - Bundled with data lake; higher DBU overhead for ML-only; existing data customers
      have low switching cost
  notes: Anyscale pricing is not publicly listed; figures are described qualitatively
    from the Anyscale pricing page and product documentation. Modal compute rate examples
