summary:
  headline: >-
    Anyscale is a strong buy for infrastructure-focused investors: it owns the dominant open-source distributed ML
    framework (Ray), has a credible enterprise commercial layer, and is well-positioned to capture the fast-growing AI
    infrastructure market — but open-source self-hosting risk and hyperscaler competition constrain revenue multiples.
  overallScore: 7.5
  recommendation: buy
