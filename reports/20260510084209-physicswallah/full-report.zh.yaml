      - number: '2.2'
        title: 市场规模测算——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多家分析机构用不同方法测算印度教育科技市场，结论差异很大。IMARC Group 认为 2025 印度教育科技总市场为 $3.6 billion，并将以 28.7% CAGR 增长，到 2033 达到 $33.2
              billion。Market Research Future 估计同一市场在 2025 为 $12.1 billion，CAGR 15.2%。差异主要来自是否纳入线下辅导收入：如果测算完整辅导生态（实体机构 +
              在线平台），Technavio 估计仅印度考试培训市场在 2025 就有 $11.6 billion，2030 前 CAGR 为 8.7%。本分析采用最保守的纯线上定义和纳入混合模式的定义。

              TAM（包含辅导的印度教育科技总市场）：2025 约 $10–12 billion；IMARC/Technavio 混合共识在统一方法差异后落在 $10–11
              billion。范围包括所有学习类别下的线下、混合和全数字化模式。

              SAM（PW 相关的线上+混合板块——JEE/NEET 备考、K-12 在线辅导和职业技能提升）：2025 约 $5–8 billion。仅在线备考贡献 ~$2.6 billion（Technavio），K-12
              数字业务增加 $1.5–2.85 billion（在线教育科技市场的 43–44%），技能提升在 FY23 另有 ₹13,200 crore（$1.6B），并以 25.7% CAGR 走向 FY28 的
              ₹41,500 crore（$5B）。

              SOM（PW 在 FY25–FY26 可现实获取的收入）：PW FY25 收入 ₹2,886.6 crore（~$345 million）意味着其在 SAM 中拿到
              4–7%。若线下中心扩张和技能提升业务继续推进，凭借混合模式、品牌强度和平价定价，到 FY28 可管理份额可能扩大至 SAM 的 8–12%。
