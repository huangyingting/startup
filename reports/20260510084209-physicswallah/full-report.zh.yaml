      - number: '4.3'
        title: 成本结构、毛利率与营运资本
        blocks:
          - type: paragraph
            body: >
              PW 在 FY2024 的成本结构由三类主导：教学和内容成本（约收入 30–35%）、销售与营销（约收入 20–25%）、技术与平台（约收入 5–8%）。一般及行政成本，包括线下中心教师薪酬和 iNeuron
              收购带来的与收购相关的摊销，再增加 15–20%。FY2024 报告 EBITDA 亏损 ₹1,131 crore，主要反映非现金摊销和重组费用；DRHP 披露，收购带来的商誉和无形资产（主要是
              iNeuron）对 FY2023 和 FY2024 报告亏损贡献很大。

              毛利率按收入流分化。数字课程估计毛利率 65–70%（内容大体是沉没成本；数字交付层新增一份订阅的增量利润率接近 100%）。相比之下，线下 Vidyapeeth 中心在教师、租金和水电后估计毛利率
              35–40%。PW Skills（技能提升）估计毛利率 40–50%，较高客单价抵消了更高讲师成本。按当前收入结构，公司综合毛利率估计约 55–60%，与 Vedantu、BYJU'S
              等印度教育科技上市可比公司在过度扩张前的轨迹一致。

              营运资本动态有利：订阅费预收，形成递延收入负债（最理想意义上的负营运资本）。线下中心学费也采用类似预付模式。PW Skills 对高客单课程使用挂钩 EMI
              的方案，带来应收账款敞口。数字业务资本开支强度低，约收入 3–5%；线下扩张资本开支重，每新建一个 Vidyapeeth 中心需 ₹1–3 crore，规划扩张到 500 个中心意味着 ₹300–₹900
              crore 的多年重大资本开支承诺。
            claimRefs:
              - CI015
