      - number: '6.3'
        title: 具名客户证明与结果证据
        blocks:
          - type: paragraph
            body: >
              PW 的客户证明主要是汇总口径和社交媒体驱动，而不是基于具名个人引用；这与面向学生的 B2C 商业模式一致。 最可信的证明类别是考试结果主张：PW 报告称，其平台有多名学生进入 NEET 2024 前 50
              名，且 JEE 2024 有 200 多名学生被 IIT 录取——两项均为公司主张，没有独立第三方审计或政府佐证。这些主张出现在新闻稿、 PW 官方传播和网站上。

              YouTube 证言体量非常大：仅 Alakh Pandey 频道就有 150M+ 订阅者，数千条学生反应视频、成绩分享帖和 “PW se hua IIT/NEET”（通过 PW 考上 IIT/NEET）证言在
              YouTube、Twitter/X 和 Instagram 上自然流通。 这些证言由用户生成，不是 PW 策划，因此更有真实感，但也降低了可验证性。

              Google Play Store 评论（2M+ 条评论，平均 4.5/5）提供了大样本客户满意度数据，尽管没有和结果挂钩。 部分评论明确提到考试成功。一些用户评论和科技媒体报道质疑 4.5/5
              评分的真实性，称可能存在虚假评论。 Trustpilot 对 PW 的覆盖有限（全球不到 500 条评论，多数来自印度）。

              具名个人学生引用没有以汇总形式公开——出于隐私和竞争原因，PW 不维护或发布具名客户名单（多数情况下学生 是未成年人）。这带来天然的枚举范围限制。尽调团队无法通过公开来源独立验证具体具名结果；证据主要是社交
              媒体汇总。

              NEET 2024 试卷泄露争议是相关反向信号：2024 年 5–6 月，试题泄露指控广泛影响考生信心；考虑到大规模 重考带来的复杂性，一些学生在论坛上质疑 PW
              的结果主张是否经过选择性呈现。没有监管机构正式针对 PW 采取 行动，但该时期的品牌情绪数据显示，负面评论明显上升。
