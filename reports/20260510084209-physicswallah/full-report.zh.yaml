      - number: '4.6'
        title: 财务结论：收入质量、利润率路径与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              在印度教育科技公司中，Physics Wallah 的财务画像相当有辨识度。收入质量高于行业平均：订阅驱动、 预收现金、递延确认，加上创始人品牌内容带来的高自然需求拉力，降低了 BYJU'S 这类同行出现过的
              收入回撤风险。FY2024 收入同比增长 86%，FY2025 在更大基数上仍增长 49%，说明需求有韧性， 不是疫情一次性红利。IPO 及后续公开披露，也让其财务透明度高于仍处私募阶段的教育科技同行。

              利润率路径可信，但取决于收入结构切换。数字订阅的毛利率为 65–70%，构成利润率上限；线下扩张毛利率 只有 35–40%，会稀释综合利润率。FY2025 EBITDA 从 -₹1,131 crore 改善至约
              -₹243 crore， 亏损同比减少 79%——进展非常快；若能延续，FY2027 实现 EBITDA 收支平衡有依据。不过，FY2024 亏损被非现金收购摊销放大；底层现金经营亏损更温和。

              仍有三个尽调阻断项。第一，缺少 NRR 和队列级客户终身价值（LTV）数据，无法独立承保单位经济模型 逻辑。第二，PW Skills（技能提升）单位经济模型完全未披露——这是增长野心最大的板块，也是最不透明
              的板块。第三，公开卖方覆盖没有完整建模 Vidyapeeth 线下资本开支强度，包括租赁义务。尽调应要求： (a) 三年及以上、按产品队列审计的 NRR；(b) 拆分后的 PW Skills 损益表；(c)
              含爬坡入住率假设的 线下扩张 5 年资本开支计划。在这些材料提供前，对财务尽调结论给出中等置信度更合适。
            claimRefs:
