      - number: '3.4'
        title: 切换成本、锁定效应、多平台使用与分发力
        blocks:
          - type: paragraph
            body: >
              PW 数字产品的切换成本结构性偏低。订阅按年，没有长期合同；内容库总体非独占（竞争对手视频在 YouTube 上免费可得）；学生可以、也确实会同时使用多个平台。主导性多平台使用模式是 PW 数字
              app（学理论和每日练习题）搭配 Allen 或 Aakash 线下课堂（结构化答疑和同伴队列）。这意味着 PW 的 6.5M 付费订阅用户并非独占客户——相当一部分还会向线下机构付费，以获得 PW
              不能完全在线复制的现场体验。

              PW 确实拥有的关键锁定机制包括：(1) 习惯化学习模式——在 PW 开始一套课程的学生，会在心理上锚定 Alakh Pandey 的授课风格，不愿中途切换；(2) PW app
              内的进度追踪和测试历史带来轻度切换摩擦；(3) Vidyapeeth 线下中心模式让已入读 PW 中心的学生具备地理黏性。相对地，Allen 每年 350,000+
              线下报名学生的结构性锁定更强，因为他们有教师关系、Kota 住宿安排和同伴社交网络。FIITJEE 和 Resonance 同样受益于 Kota 住宿生态，形成 12–24
              个月承诺结构。分发力在漏斗顶端也偏向线下既有玩家：一线 城市的学校顾问和家长网络会系统性把学生导向成熟线下品牌，而 PW 仍在通过 Vidyapeeth 建设这一渠道。供给和合作伙伴获取
              方面，教师人才是关键资源；Alakh Pandey 离开风险（或资金充足的既有玩家挖角教师）是最集中的供给风险。线下既有玩家 的师资板凳更厚，能更平滑地吸收单个教师离职。
            claimRefs:
              - CP031
              - CP032
