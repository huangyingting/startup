      - number: '2.3'
        title: 买方分层与决策机制
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah 的市场由四类主要买方构成，动机、支付意愿和渠道偏好各不相同。

              JEE/NEET 考生（15–20 岁，11–12 年级及复读生）：这是 PW 的核心、也是收入最高的客群。NEET 2024 报名人数 24.06 lakh（历史峰值），NEET 2025 为 22.76
              lakh。JEE Main 2024 各场次合计报名 12.21 lakh。考虑多年辅导，任一时点活跃 JEE+NEET 备考人群估计为 5–8 million 名学习者。结构化辅导的平均支付意愿，从线上每年
              ₹2,000–5,000（PW 入门价）到高端线下机构（Allen、Aakash）₹60,000–200,000 不等。PW 最锋利的差异化就是性价比。

              K-12 课外学习者（8–18 岁，1–10 年级）：印度 250 million 在校生构成庞大长期 TAM。但这一板块线上单学生变现更弱；家长价格敏感，结果兑现周期更长。2025，K-12
              约占教育科技总市场价值的 43–44%。PW 的 Vidyapeeth 线下中心在 JEE/NEET 基础班之外也服务这一客群。

              技能提升专业人士（22–35 岁，在职或刚毕业）：PW Skills / iNeuron 面向这类人群，课程覆盖数据科学、AI、编程和云计算。该客群支付意愿更高（每门课
              ₹15,000–100,000），集中在大都市和一线城市。印度技能提升市场从 FY23 的 ₹13,200 crore 增长到 FY28 预计 ₹41,500 crore（25.7%
              CAGR），动力来自雇主对技术人才的需求。

              政府/机构买方（B2G 和 B2B）：这是新兴客群，教育科技平台会竞标政府合同（邦教育部门、中央技能使命 项目）。PW 与 Andhra Pradesh 围绕 University of Innovation
              签署 MoU，暗示这一路径。该客群单笔交易大，但销售周期长，还带政治风险。
