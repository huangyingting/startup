      - number: '1.3'
        title: 融资历史、估值与投资者基础
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah 在 2022 到 2025 期间经历三轮主要机构融资和一次公开市场上市。公司靠自举实现盈利后才进行首轮机构融资，这在教育科技 同业中少见。

              Series A (June 2022)：PW 以 $1.1 billion 投后估值融资 $100–101 million（约 ₹777 crore），成为印度第 101 家独角兽——也是第一家在 Series
              A 轮即进入独角兽行列的教育科技公司。投资者为 WestBridge Capital 和 GSV Ventures。当时公司有 1,900 名员工，其中 500 名教师，年化收入运行率约 $65 million。

              Series B (September 2024)：在全球教育科技投资环境艰难的背景下，PW 以 $2.8 billion 投后估值融资 $210 million，较 Series A 提升
              2.5×。Hornbill Capital（一家聚焦亚洲的对冲基金）领投，Lightspeed Venture Partners 以及老股东 WestBridge Capital、GSV Ventures
              参投。资金计划用于线下中心扩张、进入 K-12 市场、AI 驱动学习工具、规模化内容生产和潜在 M&A。

              IPO 前老股轮 (February 2025)：WestBridge 领投的老股交易（~$25 million）把 PW 在 IPO 申报前的隐含估值推至约 $3.7 billion。

              IPO 前增长轮 (November 2025)：IPO 同期，PW 从 360 ONE Asset（formerly IIFL Wealth）和至少 9 家其他投资者获得约 $176 million，使 IPO
              前累计融资达到约 $486 million。

              IPO (November 2025)：PW 的 IPO 于 November 11–13, 2025 开放认购，价格区间 ₹103–109/share。发行总规模 ₹3,480 crore，包括 ₹3,100
              crore 新股发行（28.44 crore shares）和来自发起人的 ₹380 crore 出售老股。整体认购约 1.8×，QIBs 认购 2.7×。PW 从 57 家基石投资者融资 ₹1,562.8
              crore，包括 Goldman Sachs、Fidelity、Franklin Templeton、ICICI Prudential MF、Kotak Mahindra AMC 和 360 ONE。公司于
              November 18, 2025 以 ₹145/share 在 BSE/NSE 上市，较发行价上限溢价 33%。

              IPO 后持股：两位创始人各持 40.31%；WestBridge AIF 持有 6.4%（16.8 crore shares）；Hornbill Capital Partners 持有 4.41%（11.52
              crore shares）；Lightspeed Opportunity Fund 约 1.8%（4.66 crore shares）；Setu AIF Trust 约 1.4%（3.64 crore
              shares）。
