companyProfile:
  summary: >
    Physics Wallah 由 Alakh Pandey（一名物理教师转型 YouTube 教育者）和 Prateek Maheshwari 于 2016 在印度 Allahabad 创立。它从免费的 YouTube
    课程起步，PW 于 2020 推出订阅 app，很快成为印度考试培训市场最有冲击力的价格颠覆者——JEE 和 NEET 备考课程每年 ₹2,000–₹8,000，而 Allen、Aakash 等线下老牌机构收费
    ₹15,000–₹80,000。PW 在 June 2021 以 $1.1 billion 估值融资 $100 million（WestBridge Capital 和 GSV
    Ventures），成为印度最快的独角兽之一。随后公司扩展到线下辅导（Vidyapeeth 中心）、技能提升（PW Skills）和公职考试备考。November 2025，PW 通过 ₹3,480 crore IPO 在 BSE
    和 NSE 上市。
