      - number: '4.4'
        title: 公开牵引力与未披露指标缺口
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 在 DRHP 和 IPO 招股书中披露了以下公开财务牵引指标：FY2024 收入 ₹1,940.8 crore（经审计）、FY2023 收入 ₹1,042.4
              crore（经审计）、FY2022 收入 ₹294.4 crore（经审计）。FY2025 收入 ₹2,886.6 crore 在上市后的 Q4 FY2025 业绩材料中披露。公司报告 FY2025 约 6.5
              million 付费订阅用户，高于 FY2024 估计 4.5 million。截至 Q1 FY2026，线下网络由 200+ 中心和 100+ 城市组成。

              未公开披露的关键私有指标包括：(a) 净收入留存率（NRR）——公司提到续费率为 65–70%，但未在 DRHP 披露 NRR 或 dollar-based NRR；(b) 每客户终身价值（LTV）——没有正式
              LTV 披露；(c) 渠道层面 CAC——披露了总营销支出，但没有渠道拆分；(d) 队列层面收入留存——没有披露多年订阅用户队列数据；(e) PW Skills GMV 与净收入——iNeuron
              收购后的综合指标未拆分。

              NRR 缺失是关键缺口：教育科技商业模式能否耐久，取决于学生是年复一年续报，还是考完就流失。65% 续费率意味着约三分之一付费订阅用户每年流失，新订阅用户获取压力很大。没有经审计 队列数据，底层 LTV/CAC
              ratio——也就是业务的基本单位经济模型——无法独立验证。这是机构投资者财务尽调中最重要的障碍。
