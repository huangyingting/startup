      - number: '8.6'
        title: 退出准备度、投资逻辑破坏触发点与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              截至 2025 年 11 月，Physics Wallah 已在 BSE 和 NSE 上市，机构投资者的流动性退出路径已经解决。公开上市也带来季度披露要求（SEBI
              LODR），为跟踪投资逻辑演化提供了结构化证据链。IPO 后进入的机构投资者，标准退出机制是二级市场卖出；pre-IPO 持有人（WestBridge、Hornbill、Lightspeed）的锁定期通常按
              SEBI 规则为 IPO 后 6 个月，约在 2026 年 5 月到期——届时二级供给压力可能带来更好的入场点。

              五个会触发立即负面重估的投资逻辑破坏点是：（1）Alakh Pandey 公开把活跃角色降至内容 / 品牌活动的 20% 以下——这是最可能摧毁自然获客经济性的关键人事件；（2）NTA 取消或重构现有形式的
              JEE/NEET，动摇 PW 针对考试的课程库；（3）FY26 收入低于分析师一致预期超过 20%（即低于 ₹2,300 crore，而一致预期为 ₹2,850+ crore），说明 FY25 的 49%
              增速已是峰值；（4）PW 管理层出现 Byju's 式信贷、欺诈或治理指控，即便 PW 基本面不变，也会触发全行业降估值；（5）DPDP Act 执法行动造成实质性合规停摆，影响学生个性化相关的数据实践。

              升级到买入确信度前，仍需完成的尽调问题包括：（1）披露 FY26 经审计毛利率，并按业务线（数字、线下、技能）拆分，以验证 55–60% 估计；（2）正式披露每个订阅者队列的 CAC、NRR 和
              LTV；（3）证明国际学生队列已有牵引力（印度以外学生 100K+），支撑乐观情景；（4）披露经审计的关联方信息，覆盖 Alakh Pandey 个人品牌活动和内容排他条款；（5）由董事会审计委员会给出 DPDP
              Act 合规路线图，尤其是 PW 收集了 6.5M+ 未成年学生的数据。
