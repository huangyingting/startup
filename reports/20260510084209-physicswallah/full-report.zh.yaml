  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户流程
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的产品套件覆盖学生备考全周期：从学校基础课程，到竞争性入学考试，再到职业技能提升。 旗舰 PW App 覆盖 Android（Kotlin 原生）、iOS（Swift 原生）和
              Web（React.js）。截至 2025 年中， 各应用商店累计下载量超过 50 million；截至 FY2025，活跃付费订阅用户超过 6.5 million。App 聚合 预录视频课（超过 250,000
              小时，由自研 CMS 管理）、直播课、带 AI 分析的题库测评引擎、PDF 笔记， 以及基于 OTP 认证的答疑。内容覆盖 JEE（物理、化学、数学）、NEET（生物、化学、物理）、UPSC、 CA
              Foundation 和 Class 6-12 校内备考，并提供 Hindi、English 和地方语言版本；在一个长期由 英语授课线下机构服务的市场里，这构成了有意义的可及性差异。

              Vidyapeeth 在 120 多个城市拥有 320 多家辅导中心，用「线下教师授课 + PW App 作业和测评」的混合 模式触达 Tier 2 和 Tier 3 地区。Vidyapeeth 年费为
              ₹15,000-40,000，明显低于收费 ₹75,000 或更高的 Kota 模式老牌机构，同时提供一部分考生及家长偏好的真实线下学习环境。

              PW Skills（整合 iNeuron 收购资产）面向职业技能提升，提供 8-12 周队列制课程，覆盖数据科学、 机器学习、全栈开发和数字营销，定价 ₹8,000-₹45,000， 并与讲师分成收入。PW
              Test Series 是独立模拟考试产品，定价 ₹499-₹2,999，为 JEE 和 NEET 考生 提供基于 AI 的表现分析、全国排名模拟和学科级短板识别。PW Books（纸质学习资料）通过合作书店
              分发，是产品组合中体量较小的收入来源。

              获客漏斗锚定 Alakh Pandey 的 YouTube 影响力；PW 各频道合计订阅者超过 150 million，相当于零成本、 高触达的发现入口。学生先试用免费内容、下载 App，再以估计 10-15%
              的比例转为付费订阅。Vidyapeeth 中心的线下报名，则由本地营销和偏好或需要线下教学的学生到店流量驱动。
