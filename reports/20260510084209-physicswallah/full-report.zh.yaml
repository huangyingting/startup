      - number: '6.2'
        title: 采用轨迹与增长指标
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的采用增长在印度教育科技中属于最快一档。PW 从免费 YouTube 频道起步，到 FY2025 付费订阅 用户突破 6.5 million（公司口径）；约 4
              年变现运营（FY22–FY25）内从 0 做到 6.5M，轨迹异常陡峭。 截至 2025 年，Google Play 和 Apple App Store 累计下载量超过 50
              million，说明相对付费转化而言， 免费或试用用户池很大。

              Google Play 应用商店数据持续显示，PW App 位居印度教育类 App 前列，评论超过 2 million，平均评分 4.5/5。基于下载转活跃的行业比率和 PW 自身公开表述估算，月活约为
              10–15 million；这意味着付费 / 活跃 比例约为 43–65%，在教育科技中偏高——但这些是估计值，不是披露数据。

              FY23–FY25，线下基础设施从零扩张到覆盖 120 多个城市的 320 多家 Vidyapeeth 中心；FY24 在 ₹210M Series B 后，Tier-2 城市扩张加速。PW FY25 收入
              ₹2,886.6 crore（同比 +49%）部分来自这轮快速线下 扩张。公司以更低价格直接竞争 Allen 和 Aakash 的教室座位。

              历史采用节奏：FY21（App 变现前，主要是 YouTube 免费内容）；FY22（首个变现年度，快速获客）； FY23（估计 ~3–4M 订阅用户）；FY24（估计 ~5–6M）；FY25（公司确认
              6.5M）。150M 订阅者的 YouTube 受众向付费转化的比例未披露，但这是关键增长杠杆——即便 YouTube 订阅者按 1% 转化、ARPU 为 ₹5,000， 也意味着 ₹750 crore
              增量收入空间。

              FY20 至 FY25，PW 付费用户 5 年 CAGR 超过 100%，公司位居全球备考类增长最快的教育科技平台之列。 尽调要验证的关键问题是：IPO 后这条增长曲线能否延续，还是自然队列毕业和有限市场规模会在
              FY26–FY27 带来天花板效应。
