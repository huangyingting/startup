  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >
              Physics Wallah (PW) 的客户基础以学生年龄段为主，并呈现清晰的核心、次级和新兴分层。核心客群是 JEE 考生（Class 11-12，年龄 17–19）和 NEET 考生（Class
              11-12，年龄 17–19），合计构成付费 订阅用户和备考可服务市场的主体。JEE Main 2024 有 12.21 lakh 人报名，NEET 2024 报名人数约 24.06 lakh；两者合计约 36
              lakh 名活跃高风险考试考生，构成 PW 的核心漏斗。

              次级客群包括 Class 6–10 学生，他们参加基础课程，提前建立科学和数学能力。新兴客群是 UPSC 考生，使用政治学、历史和通识内容。PW Skills 这个职业技能提升垂直，面向希望转向数据科学、Web
              开发和数字营销岗位的在职人士与应届毕业生。

              从地域看，PW 用户明显偏向印度 Tier-2 和 Tier-3 城市：UP、Bihar、Rajasthan 和 Madhya Pradesh 估计贡献 50%
              以上用户注册。公司明确瞄准第一代工程和医学考生，他们负担不起 ₹75,000–₹1.5 lakh 的 Kota 风格线下辅导。人口结构显示，80% 以上学生来自非都会地区。付费者和使用者分离也很关键：学生是用户，
              家长（通常是小城镇的工薪或自雇人群）才是经济决策者和付款人。这种双边动态影响营销、定价和支付方式选择 （EMI、UPI、农村网银）。

              渠道结构以直接面向消费者的数字渠道为主（App 下载 → 订阅），并由覆盖 120 多个印度城市的 320 多家 Vidyapeeth 线下中心补充，服务偏好混合线下-线上体验的学生。迄今没有披露实质性的 B2B
              机构渠道收入， 但 PW 已测试 Class 6–10 内容交付的学校合作。
