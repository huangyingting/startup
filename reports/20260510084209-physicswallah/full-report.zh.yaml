      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的 go-to-market 模型主要依靠创始人品牌内容带来的自然需求：Alakh Pandey 的 YouTube 频道订阅超过 14
              million，充当零成本漏斗顶端，并以估计每月活跃 YouTube 观众 3–5% 的比例转化为付费订阅。这给 PW 带来少见的成本优势：多数教育科技同业高峰期把收入的 40–60% 花在效果广告上，PW 在
              FY2023 把综合营销支出控制在收入约 20–25%，并指引 IPO 后继续下降。DRHP 披露的营销收入比与这些估计方向一致。

              公司没有正式披露获客成本。第三方估计综合 CAC——覆盖数字和线下所有付费用户——约为每订阅用户 ₹800–₹1,200；按估计 ARPU ₹2,000–₹3,000，意味着 12–18 个月回本周期。与
              BYJU'S 相比，这些数字有利得多；据报道 BYJU'S 高峰期每订阅用户花费 ₹4,000–₹8,000，Unacademy 也承担高效果广告成本。渠道组合包括 YouTube（自然推荐）、PW
              app（直接报名）、线下中心（到店咨询和本地营销），以及 PW Skills 刚起步的联盟/转售渠道。

              线下 Vidyapeeth 中心的销售周期更短（从到访到报名 7–14 天），但建中心资本开支较重。混合模式形成交叉销售漏斗：升级为数字订阅的线下学生，比纯线下学生带来更高 LTV；PW
              将其描述为战略获客机制。混合学生与纯数字学生 比例未披露，是建模增量 LTV 的关键尽调缺口。
