              BYJU's 在 2024 资不抵债，把估计 25–30 million 名学习者从一个崩塌平台上挤出来，也向市场释放了一个可信度信号：治理和财务纪律在 教育科技中很重要。PhysicsWallah
              靠平价和创始人可信度起家，而不是激进 VC 资金驱动的销售打法，因此是最直接受益者。随后的监管收紧——强制退款政策、结果披露——对新进入者不利，也抬高了合规门槛；像 PW 这样过往记录干净的既有玩家更容易消化。
