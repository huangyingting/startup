chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与创始故事
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah Limited (PW) 是一家印度教育科技公司，总部位于 A-13/5, Sector 62, Noida, Uttar Pradesh, India，运营平台为
              www.pw.live。公司源头可追溯到 2016，当时 Alakh Pandey——Harcourt Butler Technical University (HBTU), Kanpur
              机械工程专业三年级退学生——创办名为 "Physics Wallah-Alakh Pandey" 的 YouTube 频道，为 JEE 和 NEET 考生免费讲物理课。频道增长很快，到 2019 订阅用户超过 2
              million。2020，Pandey 与 Prateek Boob 合作创办注册公司 PhysicsWallah；Boob 毕业于 IIT (BHU) Varanasi 机械工程专业，此前运营
              PenPencil 这款在线学习 app。创始理念很明确：让印度各地学生，包括农村和资源不足背景的学生，都能负担并获得优质备考。

              从一开始，PW 就冲击由 Kota 机构主导的既有辅导市场——这些机构收费 ₹75,000 或更高——PW 把课程价格定在约 ₹5,000。到 FY22 (April 2021–March 2022)，PW
              收入猛增 9.5×，利润达到 ₹98 crore。June 2022，公司完成首轮机构融资，成为印度第 101 家独角兽。November 2025，PW 作为印度股市史上最受期待的教育科技 IPO
              之一登陆资本市场，在 BSE 和 NSE 上市，较发行价区间溢价 33%。截至运行日期（May 2026），PW 在 NSE 的股票代码为 PWL（BSE code: 544609），分类为上市公司。PW
              的使命仍是教育民主化，重点服务 JEE、NEET、UPSC、CUET、邦级校考以及职业技能提升等竞争性考试备考。
            claimRefs:
