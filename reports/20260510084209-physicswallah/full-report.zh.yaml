  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局与竞争者类别
        blocks:
          - type: paragraph
            body: >
              印度考试培训市场有五类不同竞争者，PW 都必须应对。第一，线下既有玩家：Allen Career Institute（1988 年创立，Kota）、Aakash Institute（Blackstone
              支持，350+ 中心）、FIITJEE（1992 年以来的先行者，80+ 中心）和 Resonance（Kota-based，每年 60,000+ 学生），它们按收入和已验证的 IIT/NEET
              成绩共同主导有组织线下板块。这些玩家的结构化课堂项目每年收费 ₹15,000–₹80,000，在一线 城市家长中拥有不对称品牌资产。第二，受困数字同业：BYJU's（自 2025 起破产程序，$1.2B
              债务）、Unacademy（融资 $570M+ 后 FY24 收入降至 ~₹650 crore）和 Vedantu（FY24 收入 ~₹300 crore，自 2022 起裁员 1,400+）在 2022
              教育科技 回调后都遭遇严重资本和留存挑战。它们的困境验证了 PW 更保守的烧钱速度，也污染了整个教育科技投资叙事。第三，混合转型者：Allen Digital（2021 推出）、Aakash Digital 和
              Motion Education 都在尝试把线下品牌延伸到线上。这是近期最危险的威胁，因为它们把线下品牌可信度和数字交付结合起来。第四，AI 支持的相邻玩家：Embibe（Reliance 资助，投入
              ₹1,200+ crore）走 B2G 路线，面向州政府提供 AI 个性化学习，主要争夺公共部门合同，而不是消费者钱包份额。第五，现状本身：免费 YouTube 内容——包括 PW 自己 2020 年前的
              Alakh Pandey 视频——是主导性的零成本替代方案。PW 任何边际提价，都可能加速用户回流免费内容。可能进入者包括 Google 的 AI 辅导工具、全球 MOOC
              平台（Coursera、Unacademy 的全球扩张）以及 Jio/Reliance 可能把 Embibe 捆绑进 Jio 订阅。
