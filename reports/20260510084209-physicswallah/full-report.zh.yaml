      - number: '7.4'
        title: 合作伙伴、依赖与财务风险
        blocks:
          - type: paragraph
            body: >
              PW 的合作伙伴和依赖风险集中在三处：云基础设施、内容分发和支付处理。基础设施方面，PW 主要托管在 Amazon Web Services (AWS)；没有公开披露多云冗余，意味着任何 AWS
              区域故障都可能在关键备考窗口期变成平台故障。 分发方面，YouTube 是主要漏斗顶部渠道；Google 算法变化、政策执行行动或取消变现事件，都可能在没有提前 通知的情况下降低 PW
              免费内容可见度，并进而压低付费转化率。YouTube 频道 150M+ 订阅者基础是一项表外品牌 资产；如果 Google 调整教育频道内容变现政策，该资产存在结构性风险。支付网关对 Razorpay 和
              Paytm 的依赖 严重性较低，因为替代方案存在；但招生高峰期宕机会伤害收入捕获。财务方面，PW 对 320 多家 Vidyapeeth 中心
              的地产承诺带来长期固定成本义务；若需求转回纯数字，很难快速收缩。IPO 后 ₹4,000+ crore 现金余额提供强流动性， 但从 FY2025 约 ₹243 crore EBITDA 亏损走到 FY2027
              收支平衡，假设收入继续以每年 30-40% 增长，并通过数字 板块经营杠杆改善利润率。BYJU'S 崩塌已造成全行业传染效应：投资者如今极度审视教育科技烧钱指标，任何季度
              收入不及预期都可能触发不成比例的市场倍数压缩。收入季节性集中在 8 月至 3 月备考周期，给 Q1（4 月至 6 月） 带来营运资本压力；线下中心租赁义务全年存在，使压力更明显。
