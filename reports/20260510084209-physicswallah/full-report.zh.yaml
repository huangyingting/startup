      - number: '5.5'
        title: 信任、安全、信息安全与合规
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的合规姿态正随印度数字平台监管环境一起演进。Digital Personal Data Protection (DPDP) Act 2023
              是印度第一部综合性数据隐私法，要求处理数百万学生个人数据的公司履行同意、目的限制和数据 最小化义务；这些学生包括参加校内考试和入学考试的未成年人。截至运行日，PW 的 DPDP 合规仍是部分完成： 公司已更新
              pw.live 上的隐私政策，但未公开披露 Data Protection Impact Assessment 状态，也未说明 是否可能注册为 Significant Data Fiduciary。截至
              FY2026 Q1，MeitY 的完整执行规则仍未落地，给 PW 留出合规跑道；但作为刚上市的公众公司，提前投入合规是治理层面的预期。

              支付安全实际上委托给 Razorpay 和 Paytm；两者都是 PCI-DSS Level 1 认证处理方。PW 自身未公开披露 PCI-DSS、ISO 27001 或 SOC 2 认证。对一家处理 6.5
              million 以上用户支付数据和学业记录的组织来说， 这构成声誉和运营风险。Class 6-12 未成年用户的内容安全需要符合适用儿童安全规定；PW 未公开面向未成年 受众的内容审核协议。

              内容准确性和课程匹配主要靠内部评审流程，而不是第三方认证。PW 正在跨多个垂直领域扩张到 100 多名教师 以上，质量控制一致性是已知运营风险。内容盗版——尤其是 Telegram 群组中广泛分发 PW
              视频——同时侵蚀 收入和品牌完整性；针对再分发渠道的执法影响有限。
