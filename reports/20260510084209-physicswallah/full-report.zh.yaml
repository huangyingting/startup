      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah 的领导层围绕两位联合创始人展开；IPO 后，两人合计仍保有公司多数控制权。Alakh Pandey（出生于 October 2, 1991，Prayagraj, UP）担任 CEO
              和全职董事。Pandey 没有正式工程学位——他在 HBTU Kanpur 三年级退学——但凭借独特、易懂的授课风格，打造了一个全印度认可的教育品牌。他的主频道拥有 14 million+ YouTube
              订阅用户，也被普遍视为 PW 的公众门面和品牌锚点。IPO 时，Pandey 持有公司 40.31% 股权（105.12 crore shares）。

              Prateek Boob 是联合创始人兼全职董事（Strategy and Innovation），于 July 1, 2020 加入 PhysicsWallah。他毕业于 IIT (BHU) Varanasi
              机械工程专业，此前任职于 Caterpillar India Pvt Ltd。联合创办 PW 前，他还做过在线学习应用 PenPencil。Boob 持有同等 40.31% 股权（105.12 crore
              shares）。

              IPO 后，公司治理明显加强。2024 年末，PW 任命 Blinkit (Grofers) 前 CFO Amit Sachdeva 为首席财务官。2025 年初，在提交 IPO 文件前，PW
              任命三名独立董事：(1) Nitin Savara，Zomato 前 Deputy CFO；(2) Rachna Dikshit，前 RBI Regional Director；(3) Deepak
              Amitabh，前高级官僚、PTC India 前 chairman，目前与 Adani Group 合作。WestBridge Capital 董事总经理 Sandeep Singhal
              代表机构投资者进入董事会。Ajinkya Jain 担任集团总法律顾问、公司秘书兼合规官，于 January 2025 任命。董事会结构满足 SEBI 对上市公司独立董事比例的要求。

              关键人物风险仍然实质存在：Alakh Pandey 的个人品牌与 PW 的学生信任和内容质量深度绑定。IPO 分析师把对创始人 “face value” 的依赖列为头部风险。
