  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的投资逻辑建立在四个相互咬合的支柱上。第一，市场结构：印度竞争性考试备考市场（JEE、NEET、 UPSC、CUET、邦级学校考试）每年面向估计 30–40 million
              名学生；Tier 3/4 地区数字渗透率仍低于 30%， 给 PW 混合模式留下多年跑道。第二，价格护城河：PW 旗舰 JEE 和 NEET 课程定价 ₹2,000–₹12,000，而 线下 Kota 机构收费
              ₹50,000–₹1,50,000，形成老牌机构难以轻易复制的结构性成本优势。第三，品牌飞轮： Alakh Pandey 的 14+ million YouTube 订阅者构成零成本获客漏斗，让混合 CAC
              保持在约 ₹800–₹1,200， 只是 Byju's 峰值支出的一小部分，并支撑估计 55–60% 的毛利率。第四，财务动能：FY25 收入 ₹2,887 crore （同比 +49%），EBITDA
              亏损收窄至 ₹243 crore（FY24 为 ₹1,131 crore），表明超高速增长投入阶段正在 转向盈利。

              反向逻辑同样实质。关键人风险占主导：PW 品牌权益与 Alakh Pandey 深度绑定；他若离开或减少参与，会同时 伤害学生信任、自然获客和教师留存。考试政策不确定性具有系统性：NTA 的 JEE/NEET
              框架重组、考试周期压缩， 或考试形式遭政治扰动，都可能一夜之间重排市场。印度教育科技行业背着幅度不确定的 Byju's 传染折价——随着 Byju's
              破产程序暴露行业治理失范，即便基本面健康的印度教育科技公司，投资者兴趣仍受损。最后，PW 的盈利 时间表来自管理层指引，未获审计师认可；成本结构——尤其是 iNeuron 收购摊销和线下中心建设资本开支——造成
              模型不透明，也限制了市场对一家亏损公司当前 6.5x FY24 收入倍数的信心。
