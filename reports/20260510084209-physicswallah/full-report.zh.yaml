      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 于 2025 年 11 月完成 IPO，发行价区间约为每股 ₹1,420–₹1,500，募集新股发行资金 ₹3,480 crore。叠加 IPO 前现金及等价物，IPO
              后现金估计约为 ₹4,000–₹4,500 crore。DRHP 把募资 用途分为三类：技术和产品投入（约 ₹1,000 crore）、扩张 Vidyapeeth 线下中心（约 ₹900 crore），
              以及包含营运资本在内的一般公司用途（约 ₹1,580 crore）。DRHP 未把任何收购列为强制募资用途。

              按 EBITDA 趋势外推，截至 FY2025 Q4，月度烧钱速度估计为 ₹60–90 crore；以 IPO 后现金计算， 现金跑道为 44–75 个月（约 3.5–6 年）。这显著高于机构投资者通常认可的
              24 个月舒适线。EBITDA 亏损从 FY2024 的 ₹1,131 crore 收窄至 FY2025 的约 ₹243 crore，显示公司正朝运行日后 18–24 个月内（即 FY2027 前）实现
              EBITDA 收支平衡推进，也与管理层指引一致。

              债务负担有限。IPO 前，PW 长期债务很少；DRHP 未披露重大的项目融资或银行授信。不过，随着 Vidyapeeth 线下网络扩至 500 家中心，线下扩张可能需要新增资本开支融资，也可能带来租赁义务，并在
              INDAS 116 下体现为使用权资产负债。公司的轻资产数字化核心能隔离资本密集型扩张风险，但线下扩张 仍是尽调中最需要盯住的资本充足性问题。
