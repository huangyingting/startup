      - number: '6.4'
        title: 留存、耐久性与满意度
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的留存画像由备考的结构性生命周期决定：学生通常订阅 1–2 年（Class 11 + Class 12）， 完成目标考试后自然离开平台——要么进入大学，要么复读一年后重新报名。这使第
              2 年天然流失率偏高；这是 结构性现象，不是产品质量信号。公司表示的年度订阅续费率为 65–70%，是正面信号，但有重要限制：它衡量 的是 2 年备考生命周期内的年度续费，而不是生命周期之外的留存。

              PW 未披露净留存率（NRR），这是明显尽调缺口。NRR 衡量既有队列是否扩大消费（通过增购、交叉销售或提价）， 是评估每个客户队列 LTV 上升还是下降的重要指标。缺少该披露，再叠加结构性 2 年生命周期，说明
              NRR 可能 不是管理层优先事项，或可能并未有利地高于 100%。

              总留存率（GRR）同样未披露。公司 FY25 收入同比增长 49%，主要来自新订阅用户获取和线下中心扩张，而非 队列扩张——这与新用户获取驱动的增长模式一致。App 满意度（Google Play
              4.5/5，2M+ 条评论）为留存用户 提供了情绪代理指标。印度本地 App 评论分析持续把 PW 排在教育类 App 前 5。

              PW Skills（职业技能提升）可能延长留存——完成 JEE 备考的学生可能转向 PW Skills 做职业发展，从而延长 LTV。不过，PW Skills 仍处早期（约 2023
              年推出），交叉销售数据未公开。复读学生（NEET/JEE repeaters） 是天然再获取队列；同伴网络和对平台的熟悉感降低了该子群体的流失摩擦，PW 可能因此受益。

              来自社交媒体、Quora 和教育论坛的定性满意度信号较为混合：内容质量和定价获得强烈好评，但也有关于 App 技术问题、考试旺季答疑响应速度和结果验证方法的投诉。重视实体教室同伴竞争的学生仍更偏好 Allen 和
              Aakash； PW 的 Vidyapeeth 线下体验瞄准这一人群，但尚未占据主导。
            claimRefs:
