      - number: '8.5'
        title: 可比公司与交易分析
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的可比对象横跨四类：全球上市教育科技公司、印度上市教育公司、有公开估值标记的印度私营
              教育科技公司，以及教育科技并购交易。全球上市教育科技公司中，Duolingo（DUOL）是质量最高的可比公司，FY24 收入倍数为 12x；其依据是 74% 同比增长、EBITDA
              为正，以及国际消费品牌护城河。Coursera（COUR）按 2.3x FY24 收入交易，反映增速较慢（约 12% 同比）和 OPM 合作模式经济性。Chegg（CHGG）0.9x 的倍数反映 GenAI
              冲击作业辅导后的结构性下滑。2U Inc 的 0.4x 倍数反映其接近破产。

              印度上市教育公司里，没有直接教育科技可比对象。Career Point 和 Resonance Eduventures 都是小市值、线下优先的培训公司，个位数收入倍数与 PW 的数字化规模无关。Allen
              Career Institute 是 PW 最接近的线下竞争者，收入超过 ₹3,500 crore，但仍为私有且未披露估值。最有参考价值的印度私营教育科技可比公司是 Unacademy（上一公开标记为 2021
              年 $3.4B；鉴于投资者已减记 50–70%，按市值重估可能约 $1B–1.5B）和 Vedantu（上一标记为 2021 年 $1B，现估计 $200–400M）。这两个估值标记都印证：相对竞争对手，PW
              凭盈利路径和品牌强度享有合理溢价。

              以 PW 自身口径看，IPO 估值下每名付费订阅者价格约 ₹47,954（约 $575），是一个有用的交叉校验：按 6.5M 付费订阅者计，PW 的估值约为估计单用户年订阅收入的
              3x，符合一家尚未盈利的高增长、类 SaaS 消费公司的定价。JPMorgan 给出的 Overweight 评级和 ₹65/股目标价，意味着较 IPO 价格约 18% 溢价，与 FY26
              中期前基准情景回报一致。我们的可比分析支持 4.5–6x FY25E 收入作为基准情景的合理估值区间，也支撑这一判断：以 18 个月持有期看，IPO 价格是合理到略偏贵的入场点；若能在 4x FY25E（约
              ₹10,000 crore 市值）买入，机会更好。
