      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的技术栈主要托管在 AWS。视频分发由自建 CDN 层管理，并叠加 Cloudflare 和 Akamai 优化最后一公里带宽，尤其服务连接条件受限的农村学生。客户端覆盖
              Android 原生（Kotlin）、iOS 原生 （Swift）和 React.js Web；移动 App 内置离线下载，解决印度 Tier 2 和 Tier 3 城市网络覆盖不稳定 的问题。后端围绕 AWS
              上的微服务架构组织：PostgreSQL 是主关系型数据库，Redis 用于会话缓存和 信息流个性化，Elasticsearch 支撑超过 250,000 小时视频及配套学习资料的搜索与发现。

              身份认证使用 Firebase；考虑到 PW 用户以移动端为主，OTP 手机验证是主要登录机制。收款集成 Razorpay、Paytm 和
              UPI，覆盖印度学生常见的信用卡、钱包和直连银行转账偏好。直播课通过自研流媒体 平台交付，同时保留 Agora 和 Zoom 作为热备，在 JEE、NEET 直播课等高并发场景中处理故障切换。

              内容管理由自研 CMS 承担，索引并管理超过 250,000 小时视频内容；教师可以上传、打标签并排课， 同时挂载 PDF 笔记、测试集和答疑线程。PW Labs 是公司的内部 AI 和工程单元，截至 2025
              年拥有 150 多名工程师，正在开发基于 NLP 的答疑、手写问题扫描 OCR、自适应出题，以及学生表现预测引擎。 推荐引擎则根据测试表现、观看历史和学科进度个性化学习路径。

              技术运营模式过去更重部署速度，而不是严格工程标准；这在高速增长的消费者互联网公司中很常见。 2021-2023 增长期累积的技术债构成潜在运营风险，尤其集中在数据库架构迁移和 API 版本一致性上。 据报道，PW
              Labs 正在推进系统性重构，但债务修复的时间表和范围未公开披露，是重要尽调缺口。
