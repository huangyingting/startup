      - number: '8.2'
        title: 建议、置信度与估值立场
        blocks:
          - type: paragraph
            body: >
              我们对 Physics Wallah 的建议是观察，且倾向正面：业务投资逻辑有高信念度，但现有证据不足以认定 2025 年 11 月 IPO 时 16x FY24
              收入倍数就是入场点。该建议对应的投资姿态是「观察，并在走弱时累积」， 而不是一开始就激进建仓。置信度为中等：我们对市场机会和品牌护城河有高置信度，对 FY27 盈利时间表有中等
              置信度，对单位经济模型精度置信度较低（CAC、NRR、LTV 均未正式披露）。

              风险评级为中高，驱动因素包括：(1) Alakh Pandey 的关键人集中度，估计代表推动自然获客的品牌权益的 60–70%；(2) 与 National Testing Agency (NTA)
              相关的考试政策不确定性，NTA 曾面临政治争议；(3) Byju's 破产造成的行业情绪损伤，即便基本面改善，也可能压制教育科技倍数；(4) FY27 EBITDA 收支平衡路径 的执行风险，该路径需要收入持续以
              30–40% CAGR 增长，同时保持成本纪律；(5) 面向未成年学生数据的平台在 Digital Personal Data Protection (DPDP) Act 下存在合规不确定性。

              按 IPO 价对应 16x FY24 收入看，估值立场是合理至略偏高。在 5x FY25E 收入（约 ₹10,000 crore 市值） 时，24-36 个月投资逻辑下的风险 / 回报更有吸引力。入场纪律是在
              FY25E 收入 4–5x 以下累积。按 JPMorgan ₹65/share 的 Overweight 目标价（隐含约 ₹15,000 crore 市值），若基准情景盈利达成，18 个月回报约为 相对 IPO
              价 +18%。持有期为 18–36 个月，用于等待 FY27 EBITDA 收支平衡逻辑兑现；退出触发器由逻辑破坏 事件定义，而不只是价格目标。
