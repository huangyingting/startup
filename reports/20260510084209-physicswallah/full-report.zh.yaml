      - number: '3.3'
        title: 能力对比、定价动态与 GTM 姿态
        blocks:
          - type: paragraph
            body: >
              从能力广度看，PW 和 Allen Digital 的 JEE/NEET 覆盖最广，但 Allen 的线下基础设施在答疑、线下模拟考试和高阶师资深度上仍领先。PW 最强的能力优势是移动优先内容交付：50M+
              app 下载量、八种语言的本地语种内容，以及可离线访问的每日练习题（DPP）。AI 个性化在所有玩家中都还早；PW 的 Prayas AI initiative 和 Vedantu 的 WAVE
              模式都声称提供个性化学习路径，但两者都没有发布独立效果基准。Embibe 的 B2G AI 系统获得最深的政府背书，但并不在消费者备考领域与 PW 正面竞争。

              定价差是 PW 最持久的 GTM 优势。PW 数字课程 ₹1,999–₹8,000/year，相比 Allen/Aakash/FIITJEE 线下等价课程（₹15,000–₹80,000/year）折价
              80–95%。即使 Unacademy（₹2,999–₹15,000/year）也贵 1.5–2×。这让 PW 成为价格敏感的二三线学生默认入口；这些学生过去负担不起有组织辅导。但价格差也在高端带来感知问题：顶尖
              JEE Advanced 考生在考前最后 100–200 天仍偏好 Allen 或 FIITJEE 线下辅导，由此形成结构性的拆分购买模式。

              GTM 分发差异很大：PW 依靠 YouTube（全频道 100M+ 订阅用户）做漏斗顶端，靠 app 上的强品牌转化，并持续扩张线下 Vidyapeeth 中心（320+）。Allen 和 Aakash
              依靠城市级中心存在、学校合作和考生网络效应（学生向同伴推荐 Allen）。信任姿态也不同：一线 城市家长在高风险考试上常偏好成熟线下品牌；二三线学生因价格敏感，天然更容易转向
              PW。监管姿态相近：印度备考辅导未受监管，因此不存在实质合规差异化。
