      - number: '2.4'
        title: 增长驱动与市场约束
        blocks:
          - type: paragraph
            body: >
              增长驱动是结构性、强劲且持续多年的：印度人口红利、互联网渗透率上升（950 million active users、760 million smartphones）、Gen Z 的数字优先行为、NEP 2020
              对数字内容交付的要求，以及竞争性考试文化持续加剧，共同形成长期顺风。BYJU's 在 2024 崩塌——它曾是行业最大玩家——反而为纪律更强的玩家加速增长创造条件：25–30 million
              名原有学习者需要从崩塌平台寻找替代方案，需求本身并未明显下降。

              关键市场约束，是大众市场规模与可持续单位经济模型之间的张力。印度二三线人群既是最大增长机会，也是最难变现的人群：价格敏感度极高，数字渠道 CAC（获客成本）在上升（行业范围每付费用户
              ₹1,500–3,000），流失率也高。考试结果出来后的留存一直难做——通过 NEET 的学生不再需要 NEET 备考，自然造成队列流失。印度教育科技融资较 2021 年 $4+ billion 高点下跌约
              87%，迫使公司优先考虑盈利。只有一小批公司实现或接近盈利，PW 是其中最突出的。

              监管约束也是逆风：Ministry of Consumer Affairs 提议了针对教育科技运营商的新指导意见，要求退款政策透明、禁止误导性的“保证结果”
              主张，并强制披露学生成绩和就业率。这些变化抬高所有玩家的合规成本，但更有利于 PW 这类有真实过往记录的既有玩家。农村数字鸿沟（只有 3.8% 农村家庭有高速光纤）限制了欠服务地区对视频密集型课程的可服务市场。
