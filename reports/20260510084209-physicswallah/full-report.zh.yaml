      - number: '8.7'
        title: 附录
        blocks:
          - type: callout
            title: 关键人风险：Alakh Pandey
            body: >
              Alakh Pandey 的个人 YouTube 频道（14M+ 订阅者）和直接授课，是 PW 零成本自然获客漏斗的主要驱动。我们的分析显示，将漏斗顶部认知转化为付费订阅的品牌资产中，60–70% 可归因于
              Pandey 个人。他的活跃内容角色若有任何下降——无论出于自愿、健康还是合同原因——公司都需要大幅增加付费营销来补偿，混合 CAC 可能从约 ₹1,000 升至 ₹4,000–6,000（Byju's
              水平），从根本上改写单位经济模型和盈利时间表。
            calloutType: risk
            claimRefs:
              - CV006
              - CV007
              - CV012
          - type: callout
            title: 入场纪律：4–5x FY25E 收入（约 ₹10,000–12,500 Cr）
            body: >
              以 16x FY24 收入的 IPO 价格看，PW 对一家 EBITDA 为负的公司而言合理到略偏贵。若降至 4–5x FY25E 收入（约 ₹10,000–12,500 crore
              市值），风险回报会显著改善，这是我们偏好的建仓区间。pre-IPO 机构持有人的锁定期到期（约 2026 年 5 月）可能提供这一入场窗口。若要从观察升级到买入，需要满足：（1）FY26
              收入达到或高于一致预期；（2）出现 EBITDA 利润率改善轨迹的证据；（3）至少披露一项 KPI（NRR、CAC 或按业务线拆分的毛利率）。
