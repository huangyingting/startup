      - number: '5.6'
        title: PW Labs AI 计划与技术展望
        blocks:
          - type: paragraph
            body: >
              PW Labs 是公司的内部 AI 和工程研究单元，截至 2025 年雇用 150 多名工程师，并直接向联合创始人 Prateek Boob 汇报。该单元的研究议程覆盖四个方向：基于 NLP
              的答疑，解析学生用自然语言或手写形式提出 的问题；手写问题扫描 OCR，尤其适用于偏好书写而不是打字的农村学生提出数学和物理题；自适应出题，根据
              历史表现数据调整难度和主题覆盖；以及学生表现预测，在考试周期前主动识别高风险学生。

              技术仍处早期。PW Labs 工程师的 LinkedIn 帖文显示，团队正在积极开发基于 transformer 的 NLP 模型， 用于 Hindi-English 双语答疑；LinkedIn 和 PW
              Careers 页面可见的招聘信息也显示，公司在招聘具备 NLP、 推荐系统和计算机视觉背景的 ML 工程师。公共领域没有关于 PW Labs AI 能力的同行评议论文、基准比较或
              第三方评估，因此能力主张难以独立验证。

              PW 有足够用户基数和数据量来训练有意义的 AI 个性化模型——6.5 million 付费用户及其颗粒度学习行为数据， 已经构成实质训练集。但要把原始数据转成能改善学生结果的生产级 AI
              功能，需要持续工程投入、与 Bangalore 和 Noida 科技行业薪资竞争的人才留存，以及有纪律的产品路线图。公司过去重内容和增长、轻工程严谨度， 暗示 AI 功能交付可能落后于宣布时间表；到
              FY2027，和全球 AI 原生教育科技平台之间的差距仍是现实 竞争风险。
