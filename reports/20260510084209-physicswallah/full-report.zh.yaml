      - number: '3.2'
        title: 竞争者画像——规模、融资、定价与战略方向
        blocks:
          - type: paragraph
            body: >
              Allen Career Institute 仍是印度收入规模最大的辅导业务，FY24 总收入估计 ₹3,500+ crore。它 1988 年创立于 Kota，运营 800+ 辅导中心，每年招收
              350,000+ 学生，并长期产出最多 IIT-JEE 高排名学生。Allen 于 2021 推出 Allen Digital，是对 PW 价格冲击的防御性回应，但其数字收入仍只占总收入很小一部分。定价为
              ₹15,000–₹60,000/year，比 PW 的数字产品贵 5–10×。Allen 的主要战略方向是守住线下主导地位，同时慢慢建设混合能力；Allen IPO 曾有市场猜测，但尚未确认。

              Aakash Institute（现 Aakash Digital）由 Blackstone 支持（2023 收购），运营 350+ 中心，在 NEET 品牌认知上尤其强。FY24 收入估计 ₹1,500
              crore，定价 ₹20,000–₹80,000/year。BYJU's 收购 Aakash 的尝试因法律纠纷失败，使其在机构所有权下保持独立定位。Unacademy——由 Sequoia、Tiger
              Global、SoftBank 支持，2021 年估值 $3.4B——收入已降至 FY24 ~₹650 crore，自 2022 起裁员 2,000+ 人，并转向混合模式。Vedantu（FY24 收入
              ~₹300 crore）大规模裁员后转向 WAVE（Whiteboard Audio Visual Environment）模式。FIITJEE（自 1992 起）凭 80+ 中心拥有强 IIT Advanced
              成绩记录，但数字存在感很弱。Embibe 获 Reliance 支持，投入 ₹1,200+ crore，拥有 ~30M 注册用户，但主要追求 B2G（州政府）合同，未披露商业收入且补贴很重。Motion
              Education（Kota 本地，增长中）以 ₹12,000–₹50,000/year 服务 ~40,000 名学生，并在线上扩张。
