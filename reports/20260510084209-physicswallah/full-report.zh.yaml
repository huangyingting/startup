      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 最实质的监管风险是 Digital Personal Data Protection Act 2023。该法于 2023 年 8 月 签署成法，执行规则预计在 2024-2026
              年通知。PW 收集数百万名未成年学生（18 岁以下）的个人数据，这些 学生报名 JEE、NEET 和基础课程，因此直接落入 DPDP 的家长同意义务。违规罚款每起可达 ₹250 crore；相对 PW
              FY2025 EBITDA 亏损轨迹，这是有意义的暴露。如果数据本地化要求严格落地，云基础 设施成本可能显著上升。教育部 2022 年 11 月教育科技咨询意见提出禁止暗黑模式和退款政策义务；2024-2025
              年，针对教育科技公司的消费者保护投诉大幅上升。NEET 2024 试卷泄露争议引发最高法院介入和 NTA 持续重组， 造成 JEE/NEET 考试形式稳定性的不确定——PW 的整个核心 TAM 都由 NTA
              考试考生构成，因此任何考试扰动或 形式变化（地方语言强制要求、仅 CBT 过渡）都会立刻压缩可服务市场。消费者诉讼暴露正在上升：付费上课后 考试失败的学生越来越多地向 NCDRC 投诉；BYJU'S
              破产前面临合计超过 ₹2,000 crore 的消费者索赔，已经为 行业建立先例。IPO 后 SEBI 上市义务（持续披露、关联方交易规范）增加合规负担。Telegram 上的内容盗版
              降低付费转免费转化，也构成持续 IP 风险；PW 尚未公开披露明确的执法策略来处理这一问题。
