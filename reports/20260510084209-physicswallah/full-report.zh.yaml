      - number: '8.4'
        title: 乐观、基准、悲观情景分析
        blocks:
          - type: paragraph
            body: >
              乐观情景（20% 概率）预计 FY27 收入达到 ₹5,500 crore，驱动力来自向东南亚和中东扩张、靠 AI 个性化学习功能把 ARPU 从 ₹2,500 提升至 ₹4,000，以及 PW Skills
              从技能提升业务贡献 ₹500 crore。如果 PW 实现 EBITDA 打平，并证明品牌可以跨国复制，8x FY27 收入倍数才站得住；按此测算，隐含估值约 ₹44,000 crore（约 $5.3B），较
              IPO 价格上涨 +250%。关键乐观催化剂，是 Duolingo 式国际病毒传播叠加 PW app 的游戏化路线图。

              基准情景（60% 概率）预计 FY27 收入为 ₹4,000 crore，主要由印度 Tier 3/4 城市扩张推动，同时 NEET 数字化渗透率从可触达考试市场的 25% 加深至
              40%+。在这一规模下，EBITDA 接近打平。5x FY27 收入倍数符合一家资本效率较高、高增长的教育科技公司：相对 Duolingo 打折，但相对 Coursera 溢价；对应隐含估值 ₹20,000
              crore（约 $2.4B），两年内较 IPO 价格上涨 +58%。

              悲观情景（20% 概率）由三类潜在冲击触发：Byju's 传染导致全行业收入倍数压缩到 3x 以下；National Testing Agency 政策变化实质扰乱 JEE/NEET 考试周期；或 Alakh
              Pandey 离开，削弱自然获客效率。在该情景下，FY27 收入仅达到 ₹2,800 crore（比基准低 30%），按 3x 远期收入交易，隐含估值 ₹8,400 crore（约 $1B），两年内较 IPO
              价格回报 -34%。BYJU's 破产先例抹去了 $22B 峰值估值，说明印度教育科技的悲观情景可以非常猛烈且发展很快。
