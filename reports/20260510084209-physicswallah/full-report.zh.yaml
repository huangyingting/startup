            title: 席位稀缺是市场需求引擎
            body: >-
              印度 1.2 million JEE Main 申请人竞争 ~17,000 个 IIT 本科席位（1:70），2.4 million NEET 申请人竞争 ~110,000 个政府 MBBS
              席位（1:22）。极端稀缺让辅导几乎成为考生必花的钱，需求曲线结构性缺乏弹性，不受经济周期明显影响——这正是备考市场具有投资吸引力的核心动态。
