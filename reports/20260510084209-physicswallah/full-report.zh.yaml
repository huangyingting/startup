      - number: '1.4'
        title: 产品组合与商业模式
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah 采用混合教育模式，三个主要交付渠道：(1) 线上（app 与网站平台），(2) Vidyapeeth 和 Pathshala 品牌下的技术赋能线下中心，(3)
              结合两者的混合形态。多模式打法把 PW 与纯在线教育科技玩家和传统线下辅导机构区分开。

              核心产品包括：PW app（截至 February 2025 在 Google Play 下载 10 million+ 次）；PW YouTube 频道（截至 July 2025 主频道 13.7 million
              订阅用户，另有 112+ 个频道，覆盖五种本地语言，合计约 100 million 订阅用户）；Vidyapeeth 和 Pathshala 线下中心（截至 March 2025 在 109 个城市有 198
              个中心）；PW Skills（编程、AI、数据分析、云和软件开发等技能提升/职业课程）；PW School（K-12 课程和基础课程）；PW Foundation（免费内容）；PW
              OnlyIAS（公务员考试）；以及 PW Institute of Innovation (IOI)，一个 4 年制住宿工程项目。

              PW 覆盖 35+ 个考试类别：JEE（工程入学）、NEET（医学入学）、UPSC（公务员考试）、CUET、邦级校考、政府岗位考试（国防、银行、会计）以及技能提升方向。公司服务 6
              年级到研究生阶段的学生，也服务在职专业人士。课程价格平均 ₹5,000–₹40,000，明显低于传统辅导机构。

              收入主要来自订阅制课程销售、线下中心收费、产品销售（书籍、周边）和广告。FY25，在线课程贡献 ₹1,404 crore（+45% YoY），线下中心贡献 ₹1,351.9 crore（+46%
              YoY），两类渠道已接近持平。产品销售（书籍）增加 ₹259.2 crore，其他收入（广告等）为 ₹12.9 crore。

              PW 声称服务印度 18,000+ 个邮政编码区，覆盖印度约 98% 地理范围。国际触达来自 Knowledge Planet（面向印度侨民的 UAE 子公司）以及小规模海外收入贡献（FY25 的 ₹2,886
              crore 中有 ₹35.5 crore）。PW 每周生产 9,500+ 小时教育内容，并声称通过 YouTube 免费触达 4.6 crore（46 million）学生。
