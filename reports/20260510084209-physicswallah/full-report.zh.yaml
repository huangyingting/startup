  - id: FV001
    title: 推荐逻辑
    type: flow
    description: 从市场机会、产品护城河、财务轨迹和风险因素推导投资建议。
    claimRefs:
      - CV001
      - CV009
      - CV010
      - CV011
    data:
      nodes:
        - id: n1
          label: 市场：₹86,000 Cr+ 印度考试培训 TAM
          type: input
        - id: n2
          label: 产品：价格护城河 + Alakh 品牌飞轮
          type: input
        - id: n3
          label: 财务：FY25 收入 ₹2,887 Cr（+49%），亏损收窄
          type: input
        - id: n4
          label: 风险：关键人物、NTA 政策、Byju 负面情绪外溢、DPDP
          type: input
        - id: n5
          label: 可比公司：16x FY24 收入；IPO 时合理偏贵；4–5x FY25E 是更好入场点
          type: process
        - id: n6
          label: 建议：观察——高确信度，但严守入场价格
          type: output
      edges:
        - from: n1
          to: n5
          label: 支撑溢价倍数
        - from: n2
          to: n5
          label: 证明品牌护城河
        - from: n3
          to: n5
          label: 限制估值倍数（仍亏损）
        - from: n4
          to: n5
          label: 施加风险折价
        - from: n5
          to: n6
          label: 综合 → 观察
  - id: FV002
    title: 估值敏感性
    type: bar
    description: 在悲观 / 基准 / 乐观情景下测试收入倍数敏感性，并对比当前 IPO 估值和分析师目标价。
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
    data:
      xAxis: 收入倍数情景
      yAxis: 隐含市值（₹ Crore）
      items:
        - label: 悲观情景（3x FY27E ₹2,800 Cr）
          value: 8400
          note: FY27E ₹2,800 Cr × 3x = ₹8,400 Cr；较 IPO -34%
        - label: 入场纪律（4x FY25E ₹2,500 Cr）
          value: 10000
          note: FY25E ₹2,500 Cr × 4x = ₹10,000 Cr；偏好的入场点
        - label: 基准情景（5x FY27E ₹4,000 Cr）
          value: 20000
          note: FY27E ₹4,000 Cr × 5x = ₹20,000 Cr；较 IPO +58%
        - label: IPO 估值（16x FY24 收入）
          value: 31170
          note: 2025 年 11 月 IPO 上市日市值 ₹31,170 Cr；为 FY24 ₹1,940 Cr 收入的 16x
        - label: JPMorgan 目标价隐含值
          value: 15000
          note: JPMorgan 增持评级 ₹65/股 → 约 ₹15,000 Cr 市值
        - label: 乐观情景（8x FY27E ₹5,500 Cr）
          value: 44000
          note: FY27E ₹5,500 Cr × 8x = ₹44,000 Cr；较 IPO +250%
  - id: FV003
    title: 估值 / 回报区间
    type: range
    description: Physics Wallah 两年投资逻辑周期内的乐观 / 基准 / 悲观估值区间、回报估算和倍数敏感性。
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV028
      - CV029
    data:
      items:
        - label: FY25E 收入倍数
          low: 3
          high: 8
          unit: x revenue
          note: 悲观 3x 至乐观 8x；基准为 5x FY25E ₹2,500 Cr
        - label: 隐含市值（₹ Cr）
          low: 7500
          high: 20000
          unit: ₹ Crore
          note: 基于 FY25E ₹2,500 Cr；低点=悲观 3x，高点=乐观 8x
        - label: IPO 至 FY27 回报——基准情景
          low: 40
          high: 65
          unit: '%'
          note: 基准：₹20,000 Cr，对比 IPO ₹31,170 Cr；持有 18–36 个月
        - label: 较 IPO 价格下行——悲观情景
          low: -40
          high: -20
          unit: '%'
          note: 悲观：₹8,400 Cr，对比 IPO ₹31,170 Cr；Byju 负面情绪外溢情景
        - label: 较 IPO 价格上行——乐观情景
          low: 200
          high: 300
          unit: '%'
          note: 乐观：₹44,000 Cr，对比 IPO ₹31,170 Cr；国际扩张
        - label: 概率加权预期回报
          low: 80
          high: 110
          unit: '%'
          note: 预期值 20%×250% + 60%×58% + 20%×(-34%) ≈ +93%
  - id: FV004
    title: 投资 KPI
    type: kpi
    description: 截至 2026 年 5 月，Physics Wallah 的关键估值、财务和风险指标摘要，可直接用于 IC 讨论。
    claimRefs:
      - CV016
      - CV017
      - CV018
      - CV013
      - CV014
    data:
      items:
        - label: IPO 估值
          value: ₹31,170 Cr (~$3.7B)
          note: 2025 年 11 月 IPO 上市市值
        - label: 收入倍数（FY24）
          value: 6.5x
          note: ₹31,170 Cr / FY24 收入 ₹1,940 Cr
        - label: 收入倍数（FY25E）
          value: ~4.4x
          note: ₹31,170 Cr / FY25 收入 ₹2,887 Cr（已披露）
        - label: IPO 后现金（估计）
          value: ~₹4,000–4,500 Cr
          note: IPO 增发募资 ₹3,100 Cr + IPO 前现金
        - label: EBITDA 盈亏平衡路径
          value: FY27 target
          note: 管理层指引；取决于执行和业务结构变化
        - label: JPMorgan 目标价
          value: ₹65/share (Overweight)
          note: 2026 年首次覆盖；较 IPO 价格区间上限约有 18% 溢价
        - label: 每名付费订阅用户对应价格
          value: ~₹47,954 (~$575)
          note: ₹31,170 Cr / 6.5M 付费订阅用户（FY25 已披露）
