      - number: '5.3'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的部署模式是在 AWS 上集中式云原生架构；除 Vidyapeeth 中心本地网络外，没有显著的 边缘计算或混合本地部署足迹。工程团队合计超过 600 人，其中 PW Labs 超过
              150 人；Android 和 iOS App 通过标准应用商店发布周期更新，后端服务则通过 AWS 托管容器编排部署。消费者产品未发现公开状态页 或正式 SLA
              承诺；直播课活动会吸引数万名并发观看者，其可用性是最敏感的可靠性场景。缺少公开事故历史， 让独立可靠性评估无法完成。

              集成面有限。PW 不向第三方集成开放公共 API 或开发者 SDK，这限制了合作伙伴生态增长，但也缩小了外部 攻击面。主要外部集成包括
              Razorpay（支付）、Firebase（认证）、Agora/Zoom（直播课备份）和 Cloudflare/Akamai（CDN）。相较 Canvas、Coursera
              等全球教育科技同行，缺少开发者生态是明显缺口； 后者支持与 LMS 和机构客户之间活跃的 API 驱动集成生态。

              FY2025-2026 产品路线图聚焦三件事：PW Skills 扩展到更多技能提升领域，并改善就业安置跟踪；面向 UAE 和 Gulf 的 NRI 学生启动国际化；在 PW Labs
              开发中的自适应课程引擎上深化 AI 个性化。FY2026-2027， 管理层释放了 B2G 推进信号，希望在 NEP 2020 框架下向邦政府供应数字内容。路线图证据主要来自管理层指引
              和媒体报道；没有公开的正式产品更新日志或发布说明历史，导致里程碑在完成前无法验证。
