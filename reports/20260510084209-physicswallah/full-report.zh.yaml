      - number: '7.5'
        title: 人员、执行与逻辑破坏触发器
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的人员风险由两个相互咬合的动态驱动：管理层厚度和教师流失。高级领导团队相对年轻，在上市 公司规模运营上的经验有限；这类运营伴随 SEBI
              披露义务、季度业绩电话会和机构投资者关系。CFO 和 COO 是 关键执行节点；任何意外离职都会在公司刚建立公开市场可信度时制造执行风险。ESOP 留才计划存在，但 SEBI 文件
              没有公开详细披露，因此很难评估关键高管受激励留下的期限。教师流失是第二大人员风险：受欢迎教师可以跳槽到 竞争对手——Unacademy 挖角明星教师的模式已清晰证明这一点——而 PW
              与内容创作者之间的收入分成争议，也未 通过公开披露的 IP 所有权框架解决。如果明星教师离开并带走自己的学生社群，PW 会同时失去内容资产和相应的 在读学生。会实质削弱投资逻辑的触发器包括：(1) Alakh
              Pandey 离职或停止活跃内容创作；(2) DPDP Act 对 PW 采取执法行动，导致 ₹100 crore+ 罚款或强制暂停数据处理；(3) NTA 考试废止或根本性形式变化，消除 JEE/NEET 备考
              TAM；(4) SEBI 或 MCA 发起 BYJU'S 式监管或会计调查；(5) 连续几个季度收入增长放缓且 EBITDA 亏损扩大， 表明 FY2027
