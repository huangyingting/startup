            - DPDP Act 合规缺口
            - 内容质量走样
            - YouTube 漏斗依赖
            - 明星教师流失
            - 季节性 / Q1 压力
        - label: 中可能性
          values:
            - NTA 考试政策变化
            - 高峰期平台宕机
            - AWS 集中度
            - 关键人物 Alakh Pandey
            - BYJU's 负面情绪外溢
        - label: 低可能性
          values:
            - FEMA / 外资违规
            - Vidyapeeth 中心合规
            - 支付网关故障
            - CFO / COO 意外离任
            - 经营亏损持续到 FY2028
  - id: FR002
    title: 风险传导图
    type: dag
    description: 有向无环图，展示四个主要风险事件如何经由运营和财务渠道传导，最终影响收入、品牌和估值节点。
    claimRefs:
      - CR001
      - CR005
      - CR013
      - CR025
      - CR032
      - CR036
      - CR037
    data:
      nodes:
        - id: r1
          label: DPDP Act 执法行动
          type: input
        - id: r2
          label: NTA 考试形式变化
          type: input
        - id: r3
          label: Alakh Pandey 离任
          type: input
        - id: r4
          label: BYJU's 负面情绪外溢
          type: input
        - id: r5
          label: 学生报名下降
          type: process
        - id: r6
          label: 品牌 / 获客漏斗坍塌
          type: process
        - id: r7
          label: 收入低于指引
          type: process
        - id: r8
          label: 投资者估值倍数压缩
          type: output
        - id: r9
          label: 平台收入受冲击
          type: output
      edges:
        - from: r1
          to: r5
          label: 数据暂停导致访问受限
        - from: r2
          to: r5
          label: TAM 收缩
        - from: r3
          to: r6
          label: YouTube 频道丢失
        - from: r6
          to: r5
          label: 新增报名下降
        - from: r5
          to: r7
          label: 收入不及预期
        - from: r4
          to: r8
          label: 板块重估
        - from: r7
          to: r9
          label: 直接收入损失
  - id: FR003
    title: 依赖关系图
    type: dag
    description: 梳理 Physics Wallah 的关键外部依赖，展示交易对手关系，以及每项依赖支撑的内部结果。
    claimRefs:
      - CR024
      - CR025
      - CR027
      - CR028
      - CR030
    data:
      nodes:
        - id: d1
          label: Google / YouTube
          type: input
        - id: d2
          label: Amazon Web Services (AWS)
          type: input
        - id: d3
          label: Razorpay / Paytm
          type: input
        - id: d4
          label: National Testing Agency (NTA)
          type: input
        - id: d5
          label: WestBridge / Lightspeed / GSV
          type: input
        - id: d6
          label: 自然学生获客
          type: process
        - id: d7
          label: 平台可用性
          type: process
        - id: d8
          label: 收款
          type: process
        - id: d9
          label: 考试 TAM 定义
          type: process
        - id: d10
          label: PW 收入与增长
          type: output
      edges:
