  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流、定价模型与确认
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 采用四条收入流模型。数字订阅——覆盖 JEE、NEET、UPSC、CUET 和基础考试 的年度访问课程包——贡献 FY2024 收入 ₹1,940.8 crore 的约
              55–60%，是最大、也利润率最高的收入流。直播班课和测试系列合计再贡献 15–20% 收入，其中测试系列票价 ₹499–₹2,999/exam，形成高频、低客单交易层。线下 Vidyapeeth
              中心网络——截至 Q1 FY2026 在 100+ 城市有 200+ 中心——贡献约 20–25% 收入，由 ₹15,000–₹40,000 年费驱动；但固定成本更重，相对数字业务会稀释利润率。PW
              Skills（iNeuron 整合）面向在职专业人士做技能提升，课程价格 ₹8,000–₹45,000，贡献 FY2024 收入约 5%，运营上仍早期。

              收入确认遵循 INDAS
              115：订阅费在课程访问期内摊销（通常十二个月），因此报名时收取的现金先递延，再按比例确认。这会在资产负债表中形成健康的递延收入负债，也意味着增长期报告收入滞后于现金收款。DRHP（SEBI
              文件）披露了递延收入和合同负债项目，支持这一判断。实质确认风险在于捆绑产品（直播班课 + 录播内容 + 测试系列）：公开文件没有充分披露单独售价分摊方法。

              FY2022–FY2024 约 157% CAGR 反映了异常的高速增长期，一部分来自疫情顺风和线下到线上的迁移，一部分来自相对老牌机构的激进低价（Kota 机构收费 ₹75,000+）。FY2025 增长
              49%，在基数扩大后进入正常化节奏；这与全球公开教育科技可比公司跨过 ₹1,000-crore 收入拐点后的表现一致。整体收入质量中高：订阅驱动的多数收入具备经常性，但 JEE/NEET
              考试周期带来季度波动，线下收入还承担中心级固定成本集中风险。
