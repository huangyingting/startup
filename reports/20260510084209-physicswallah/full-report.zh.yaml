      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 最大的单一运营风险，是 Alakh Pandey 关键人集中度。他的个人 YouTube 频道截至 2025 年拥有 超过 150 million
              订阅者，是公司的主要品牌资产和自然获客引擎。关键在于，该频道登记在 Alakh 个人身份下， 而非公司实体；若他离开，PW 会同时失去内容库和分发漏斗。公司未公开披露正式继任计划，也未披露把频道 转移给 PW
              的合同机制。除关键人风险外，随着 PW 扩张到 500 多名教育者，内容质量漂移也是重要运营挑战： 学生论坛投诉记录了 Alakh 制作内容与非明星教师内容之间的实质质量差距，这会拉低课程完成率，并可能推高
              流失。技术可靠性是中等严重风险——用户评论和社交媒体记录了考试结果旺季的 App 崩溃，也有 JEE/NEET 日期 公布期间 CDN 故障的报道。PW 未发布任何 SLA
              或正常运行时间保证，因此很难就可用性追责。NEET 2024 试卷泄露争议带来声誉关联风险：PW 品牌与 NEET 考生紧密绑定，若市场认为 NTA 系统性失灵影响了 PW 学生
              结果，就可能引发负面媒体周期。320 多家 Vidyapeeth 中心也带来租赁管理、员工质量和地方监管合规上的运营 复杂性，扩张速度越快，中央监控越难跟上。
