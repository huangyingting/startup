  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险图谱概览与严重性排序
        blocks:
          - type: paragraph
            body: >
              Physics Wallah (PW) 面临多层风险，覆盖监管合规、运营执行、合作伙伴依赖、财务可持续性和人员集中度。 截至 2026 年 5 月，按严重性排序的风险图谱把创始人兼 CEO Alakh
              Pandey 的关键人集中度，以及印度 Digital Personal Data Protection Act 2023 下的合规义务放在最高位；紧随其后的是对 YouTube 作为
              主要学生获客漏斗的结构性依赖，以及 NEET 2024 考试争议带来的声誉拖累。IPO 后，财务风险已明显缓和： 约 ₹4,000 crore 现金，加上 EBITDA 亏损从 FY2024 的 ₹1,131
              crore 收窄至 FY2025 的约 ₹243 crore， 按当前烧钱速度，现金跑道延伸到 FY2028 之后。FY2027 走向盈利，取决于收入结构转向毛利更高的数字课程， 以及 Vidyapeeth
              线下中心扩张放慢。投资视角下，监管和人员风险最难定价：截至 2026 年，DPDP Act 执行规则仍有部分未通知，造成合规不确定性；Alakh Pandey 的品牌权益也无法在法律上与公司实体分离。 鉴于
              IPO 募集资金和主动成本纪律，运营和财务风险更有边界。BYJU'S 崩塌已永久重估印度教育科技倍数； PW 必须持续证明自身基本面不同。风险热力图（FR001）呈现五类风险的严重性；传导图（FR002）展示单个
              风险事件如何级联影响收入、利润率和市值。
