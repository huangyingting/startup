  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              印度教育科技市场覆盖五个相互重叠的板块：考试培训（JEE、NEET、UPSC、邦级校考）、K-12 课外辅导、高等教育在线学位、职业技能提升与认证，以及学前数字内容。PhysicsWallah
              主要竞争在前两个板块，并正通过 PW Skills / iNeuron 扩展到第三个板块。本章测算各板块的总可用市场（TAM）、可服务市场（SAM）和可获取市场（SOM），并特别关注贡献 PW 大部分收入的
              JEE/NEET 备考子市场。

              结构性背景很关键：印度有超过 250 million 在校学生和约 500 million 24 岁以下人口，人口红利支撑长期需求。同时，优质席位极度稀缺——约 17,000 个 IIT 本科席位对应 1.2+
              million JEE Main 申请人，约 110,000 个政府 MBBS 席位对应 2.4 million NEET
              申请人——让备考对考生几乎成为必需，而不是可选奢侈消费。席位稀缺是辅导行业需求端的主要引擎，也直接利好 PhysicsWallah 等玩家。

              市场地理分布集中，但正在快速扩宽。历史上，Kota 辅导走廊（Rajasthan）和大都市占主导。2020 后，向二三线城市的数字渗透成为关键增长前沿；PW 明确站在平价端，吃这轮迁移。
