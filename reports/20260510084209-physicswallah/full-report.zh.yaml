            body: 多数印度教育科技独角兽从第一天就需要机构资本，PW 不同：FY20 到 FY22 它靠自举先做出盈利业务，然后才启动首轮机构融资。这说明公司在扩张前已经跑通真实的 产品-市场匹配。
