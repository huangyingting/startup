      - number: '8.3'
        title: 融资背景、入场纪律与股权结构表压力
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 2025 年 11 月 IPO 以每股 ₹103–109 的价格区间募资 ₹3,480 crore，上市价 ₹145/股（溢价 33%），上市后市值约 ₹31,170
              crore。此次 IPO 包括 ₹3,100 crore 新股发行和发起人 ₹380 crore OFS，意味着创始人 Alakh Pandey 和 Prateek Boob 各自出售了合计 80.62%
              持股中的一小部分。IPO 整体超额认购约 1.8x，其中 QIB 部分超额认购 2.7x，说明机构相对谨慎，而散户热度更高。锚定投资者包括 Goldman Sachs、Fidelity、Franklin
              Templeton、ICICI Prudential MF 和 Kotak Mahindra AMC，合计 ₹1,562.8 crore。

              IPO 后股权结构：两位创始人各持股约 40.31%（各 105.12 crore 股）；WestBridge Capital AIF 持股 6.4%；Hornbill Capital 持股
              4.41%；Lightspeed Opportunity Fund 约 1.8%；公众流通股约 10%。机构轮没有披露优先股堆叠或清算优先权包袱，因为 SEBI 要求下，PW 在 IPO
              前已将全部优先股转换为普通股。2024 年按 $2.8B 估值完成的 pre-IPO Series B 轮，意味着 Hornbill Capital 和 Lightspeed 在 IPO
              价格区间大致打平，也消除了高于当前价格被迫抛售形成压盘的风险。

              IPO 后现金估计约 ₹4,000–4,500 crore（新股发行所得加既有现金），按当前每月 ₹60–90 crore 的烧钱速度，可支撑 3–5 年现金跑道。管理层已披露 IPO 募资用途：₹1,000
              crore 投入技术 / AI，₹900 crore 用于 Vidyapeeth 线下扩张，₹1,580 crore 用作一般公司用途。近期没有债务到期（PW
              实际上债务很轻），因此悲观情景里的财务困境风险被移除。
