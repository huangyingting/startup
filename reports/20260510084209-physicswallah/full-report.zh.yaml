      - number: '1.5'
        title: 里程碑、并购与运营规模
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah 从 YouTube 频道走到上市教育科技公司，产品、融资、治理和战略事件上都有几个关键节点。公司运营扩张很快：FY23 收入约 ₹779 crore，FY24 达到 ₹1,940.7
              crore（+160% YoY），FY25 达到 ₹2,886.6 crore（+49% YoY），两年收入 CAGR 约 97%。

              并购是 PW 扩张战略的关键支柱。2022，PW 完成多笔补强型收购：FreeCo（答疑平台，首笔收购）、iNeuron（AI/ML 技能提升，从 S. Chand Group 以 ~$31 million
              收购）、PrepOnline、Altis Vortex，以及几家教育图书出版商。2022，PW 还收购 Knowledge Planet（一家服务印度侨民的 UAE K-12 平台）。2023，PW 以约
              ₹500 crore（~$61 million）收购 Kerala-based Xylem Learning 50% 股权，借此在 South India 备考市场站稳脚跟。PW 此后逐步提高 Xylem
              持股——先到 64.98%，再到 77.27%（December 2025 额外投资 ₹122.9 crore），并按股东协议规划在 FY30 前实现全资控股。2025 年末，PW 还持有 Utkarsh
              Classes and Edutech Private Ltd 75.5% 股权，目标是 March 2028 前达到 100% 持股。

              反向里程碑：November 2023，PW 裁员 70–150 人（少于当时 ~12,000 名员工的 0.8%），这是公司首次重要裁员；官方称为 “performance-based
              assessment”，但报道也认为部分是降本。更早的 March 2023，几名教师离职并公开批评 PW 的文化和管理，创建独立 YouTube 频道 “Sankalp Bharat”，并指称 PW Kota
              中心给学生的价值无法支撑所收学费。

              监管端，PW 于 September 2025 向 SEBI 提交更新版 DRHP。Andhra Pradesh 政府于 December 2024 与 PW 签署 MoU，拟建立 University of
              Innovation。Q2 FY26（July–September 2025），PW 报告经营收入 ₹1,051 crore（+26% YoY）和利润 ₹70
              crore——这是其首次季度盈利，显示成本控制正在改善。
