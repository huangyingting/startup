      - number: '6.5'
        title: 扩张、集中度与渠道风险
        blocks:
          - type: paragraph
            body: >
              Physics Wallah 的 B2C 模式天然分散——没有单个学生贡献超过极小比例的收入，风险画像与 B2B 企业软件公司 很不一样。按标准指标看，客户集中度风险低：6.5M
              付费订阅用户，且未披露任何单一客户或客户类别贡献超过 1% 收入，传统前十大客户集中度接近零。不过，分部集中和地域集中是实质风险。

              分部集中：JEE 和 NEET 考生可能占付费订阅的 70–80%。这两个考试垂直共享相关风险——任何监管扰动、 考试取消或形式变化（如 NEET 2024
              试卷泄露争议打击考试信心）都可能同时影响两个分部。如果政府重构 JEE 或 NEET（例如改为基于学期制的统一大学入学考试），PW 的核心产品市场匹配需要大幅重定位。

              地域集中：估计 50% 的 PW 用户来自 UP、Bihar、Rajasthan 和 Madhya Pradesh。对 Hindi belt 的重度 倾斜限制了国际多元化，也让 PW
              暴露于区域经济冲击、互联网连接中断，以及进入 South India（Tamil Nadu、 Karnataka、Andhra Pradesh）时的语言壁垒；当地地方语言辅导机构已有根深蒂固的优势。

              正在推进的扩张方向包括：PW Skills（面向专业人士的技能提升，瞄准增量 LTV）；国际扩张（Gulf NRI 市场、 UAE、Saudi Arabia——仍在早期）；学校合作（Class 6–10
              机构渠道——探索中）；以及加深 UPSC / state PSC 覆盖。这些方向在 2 年周期内都尚未达到能实质分散收入集中度的规模。

              支付摩擦是分部特定风险：农村付费家长信用卡渗透有限；PW 高度依赖 UPI 和 BNPL/EMI 选项。EMI 支付失败 率和续费延迟，可能让披露转化率相对实际完成支付偏高。现有公开文件未披露这一运营风险。
