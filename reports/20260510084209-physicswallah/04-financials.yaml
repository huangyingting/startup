company:
  name: Physics Wallah
chapter:
  number: 4
  title: "Financials"
  summary: >
    Physics Wallah (PW) reported audited FY2024 revenue of ₹1,940.8 crore (+86% YoY) and FY2025 revenue of ₹2,886.6 crore
    (+49% YoY), now a public company following its November 2025 IPO that raised ₹3,480 crore. EBITDA losses narrowed
    sharply to approximately ₹243 crore in FY2025 versus ₹1,131 crore in FY2024, reflecting aggressive cost discipline;
    however, underlying unit economics remain partially opaque with CAC, NRR, and LTV undisclosed. With ₹4,000+ crore
    post-IPO cash and monthly burn declining to ~₹60–90 crore, runway exceeds three years, but the margin path to
    profitability by FY2027 depends on mix-shift toward higher-margin digital courses and continued reduction of
    acquisition-related amortization.

sections:
  - id: "SI-S1"
    title: "Revenue Streams, Pricing Model, and Recognition"
    body: >
      Physics Wallah operates a four-stream revenue model. Digital subscriptions — annual-access course packs covering JEE,
      NEET, UPSC, CUET, and foundation exams — contributed approximately 55–60% of FY2024 revenue of ₹1,940.8 crore,
      making them the dominant and highest-margin stream. Live batch classes and test series together accounted for a
      further 15–20% of revenue, with test-series tickets priced at ₹499–₹2,999 per exam providing a high-frequency,
      low-ticket transaction layer. The offline Vidyapeeth centre network — 200+ centres across 100+ cities as of Q1 FY2026
      — contributed approximately 20–25% of revenue, driven by annual fees of ₹15,000–₹40,000, but carries higher
      fixed-cost intensity and is therefore margin-dilutive relative to digital. PW Skills (iNeuron integration), the
      upskilling vertical targeting working professionals with courses priced at ₹8,000–₹45,000, generated roughly 5% of
      FY2024 revenue and is operationally nascent.

      Revenue recognition follows INDAS 115: subscription fees are spread over the course-access period (typically
      twelve months), so cash collected at enrollment is deferred and recognized ratably. This creates a healthy deferred
      revenue liability visible in balance-sheet disclosures and means reported revenue lags cash collections in growth
      phases. The DRHP (SEBI filing) disclosed deferred revenue and contract liability line items, supporting this
      interpretation. A material recognition risk is bundled offerings (live batch + recorded content + test series)
      where the standalone selling price allocation methodology is not fully disclosed in public documents.

      The FY2022–FY2024 CAGR of approximately 157% reflects an exceptional hypergrowth phase, partly driven by pandemic
      tailwinds and offline-to-online migration, partly by aggressive pricing below incumbents (Kota institutes charging
      ₹75,000+). FY2025 growth at 49% signals a normalization cadence as the base scales, consistent with public edtech
      comps globally when passing the ₹1,000-crore revenue inflection. Overall revenue quality is medium-high: the
      subscription-driven majority is recurring, but JEE/NEET exam-cycle seasonality creates quarterly lumpiness, and
      offline revenue carries the concentration risk of center-level fixed costs.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001

  - id: "SI-S2"
    title: "GTM Motion and Sales Efficiency"
    body: >
      Physics Wallah's go-to-market model relies primarily on organic demand generation through founder-brand content:
      Alakh Pandey's YouTube channel exceeds 14 million subscribers, functioning as a zero-cost top-of-funnel that
      converts to paid subscriptions at estimated rates of 3–5% of monthly active YouTube viewers. This gives PW an
      unusual cost advantage: unlike most edtech peers that spent 40–60% of revenue on performance marketing at peak,
      PW held blended marketing spend at approximately 20–25% of revenue in FY2023 and has guided for further reduction
      post-IPO. The DRHP disclosed marketing-to-revenue ratios directionally consistent with these estimates.

      Customer acquisition costs are not formally disclosed. Third-party estimates place blended CAC — all paid users
      across digital and offline — at approximately ₹800–₹1,200 per subscriber, implying a payback period of 12–18
      months at an estimated ARPU of ₹2,000–₹3,000. These figures compare favorably with BYJU'S, which reportedly spent
      ₹4,000–₹8,000 per subscriber at its peak, and Unacademy, which also incurred high performance-marketing costs.
      The channel mix comprises YouTube (organic referral), PW app (direct enrollment), offline centers (walk-in and
      local marketing), and a nascent affiliate-reseller channel for PW Skills.

      For the offline Vidyapeeth centers, the sales cycle is shorter (7–14 days from visit to enrollment) but capex-heavy
      for center setup. The hybrid model creates a cross-sell funnel: offline students who upgrade to digital
      subscriptions generate a higher LTV than pure offline students, and PW has described this as a strategic
      acquisition mechanism. The ratio of hybrid-to-pure-digital students is not disclosed, representing a key diligence
      gap for modeling incremental LTV.
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
    tableRefs:
      - TI003

  - id: "SI-S3"
    title: "Cost Structure, Gross Margin, and Working Capital"
    body: >
      PW's cost structure in FY2024 was dominated by three buckets: teaching and content costs (approximately 30–35% of
      revenue), sales and marketing (approximately 20–25% of revenue), and technology and platform (approximately 5–8%
      of revenue). General and administrative costs, including faculty salaries for offline centers and acquisition-linked
      amortization from the iNeuron acquisition, add a further 15–20%. The reported EBITDA loss of ₹1,131 crore in
      FY2024 substantially reflected non-cash amortization and restructuring charges; the DRHP disclosed that goodwill
      and intangibles from acquisitions (primarily iNeuron) contributed materially to reported losses in FY2023 and
      FY2024.

      Gross margin is bifurcated by stream. Digital courses carry estimated gross margins of 65–70% (content is a
      largely sunk cost; incremental margin on one additional subscription is near 100% for the digital delivery
      layer). Offline Vidyapeeth centers, in contrast, carry estimated gross margins of 35–40% after faculty, rent,
      and utilities. PW Skills (upskilling) is estimated at 40–50% gross margin, with higher instructor costs offset
      by higher ticket sizes. The blended company gross margin is estimated at approximately 55–60% based on the
      current revenue mix, consistent with the trajectory of Indian edtech public comps like Vedantu and BYJU'S in
      their pre-overexpansion phases.

      Working capital dynamics are favorable: subscription fees are collected upfront, creating a deferred revenue
      liability (negative working capital in the best sense). Offline center fees follow a similar pay-upfront model.
      PW Skills uses an EMI-linked scheme for higher-ticket courses, creating a receivables exposure. Capex intensity
      is low for the digital business at approximately 3–5% of revenue; offline expansion is capex-intensive at
      ₹1–3 crore per new Vidyapeeth center setup, and the planned expansion to 500 centers represents a meaningful
      multi-year capex commitment of ₹300–₹900 crore.
    claimRefs:
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021

  - id: "SI-S4"
    title: "Public Traction and Private Metric Gaps"
    body: >
      Physics Wallah disclosed the following public financial traction metrics in its DRHP and IPO prospectus:
      FY2024 revenue of ₹1,940.8 crore (audited), FY2023 revenue of ₹1,042.4 crore (audited), and FY2022 revenue
      of ₹294.4 crore (audited). FY2025 revenue of ₹2,886.6 crore was disclosed in Q4 FY2025 earnings materials
      post-listing. The company reported approximately 6.5 million paid subscribers in FY2025, up from an estimated
      4.5 million in FY2024. The offline network as of Q1 FY2026 comprised 200+ centers and 100+ cities.

      Key private metrics not publicly disclosed include: (a) net revenue retention rate (NRR) — the company cited
      renewal rates of 65–70% but did not disclose NRR or dollar-based NRR in DRHP; (b) lifetime value (LTV) per
      customer — no formal LTV disclosure; (c) channel-level CAC — aggregate marketing spend disclosed but channel
      breakdown not available; (d) cohort-level revenue retention — multi-year subscriber cohort data not disclosed;
      (e) PW Skills GMV versus net revenue — iNeuron post-acquisition blended metrics are not disaggregated.

      The absence of NRR is a critical gap: edtech business model durability depends on whether students re-enroll
      year-over-year or churn after exam completion. A 65% renewal rate implies approximately one-third of paying
      subscribers churn annually, putting significant pressure on new subscriber acquisition to maintain growth.
      Without audited cohort data, the underlying LTV/CAC ratio — and therefore the fundamental unit economics of
      the business — cannot be independently verified. This represents the single most material financial diligence
      blocker for institutional investors.
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
      - CI027
      - CI028
    tableRefs:
      - TI005
    figureRefs:
      - FI003

  - id: "SI-S5"
    title: "Capital Adequacy and Financing Dependency"
    body: >
      Physics Wallah completed its IPO in November 2025 at a price band of approximately ₹1,420–₹1,500 per share,
      raising ₹3,480 crore in fresh issue proceeds. Combined with pre-IPO cash and equivalents, post-IPO cash is
      estimated at approximately ₹4,000–₹4,500 crore. The DRHP specified use of proceeds across three categories:
      technology and product investment (approximately ₹1,000 crore), expansion of Vidyapeeth offline centers
      (approximately ₹900 crore), and general corporate purposes including working capital (approximately ₹1,580
      crore). No acquisitions were earmarked as mandatory use of proceeds in the DRHP.

      Monthly cash burn — estimated at ₹60–90 crore as of Q4 FY2025 based on extrapolation from EBITDA trend —
      implies a runway of 44–75 months (roughly 3.5–6 years) from post-IPO cash. This is well above typical
      institutional investor comfort thresholds of 24 months. The narrowing of EBITDA losses from ₹1,131 crore
      in FY2024 to approximately ₹243 crore in FY2025 suggests the company is tracking toward EBITDA break-even
      within 18–24 months of the run date (i.e., by FY2027), consistent with management guidance.

      Debt obligations are limited. Pre-IPO, PW carried minimal long-term debt; the DRHP did not disclose
      significant project-finance or bank credit facilities. The Vidyapeeth offline expansion, however, may require
      incremental capex financing as the network scales toward 500 centers, potentially necessitating lease
      obligations that would show up as right-of-use asset liabilities under INDAS 116. The company's asset-light
      digital core insulates it from capital-intensive scale risk, but offline expansion represents the primary
      capital adequacy watchpoint for diligence.
    claimRefs:
      - CI029
      - CI030
      - CI031
      - CI032
      - CI033
      - CI034
      - CI035
    tableRefs:
      - TI004
    figureRefs:
      - FI004

  - id: "SI-S6"
    title: "Financial Verdict: Revenue Quality, Margin Path, and Diligence Blockers"
    body: >
      Physics Wallah presents a differentiated financial profile among Indian edtech companies. Revenue quality is
      above sector average: subscription-driven, upfront cash collection, deferred recognition, and high organic
      demand pull via founder-brand content reduce the risk of revenue reversal seen in peers like BYJU'S. The
      86% YoY revenue growth in FY2024 and 49% in FY2025 on a much larger base demonstrate durable demand, not
      a one-time pandemic artifact. The IPO and subsequent public disclosures provide a higher level of financial
      transparency than private-stage edtech peers.

      The margin path is credible but dependent on mix-shift. Digital-subscription gross margins of 65–70% provide
      the margin ceiling; offline expansion at 35–40% dilutes the blended margin. The FY2025 EBITDA improvement
      from -₹1,131 crore to approximately -₹243 crore represents a 79% reduction in losses year-on-year —
      extraordinary progress that, if sustained, points to EBITDA break-even by FY2027. However, the FY2024 losses
      were inflated by non-cash acquisition amortization; the underlying cash operating loss is more moderate.

      Three diligence blockers remain. First, the absence of NRR and cohort-level LTV data makes it impossible
      to independently underwrite the unit economics thesis. Second, PW Skills (upskilling) unit economics are
      entirely undisclosed — this is the highest-growth ambition segment and the most opaque. Third, offline
      Vidyapeeth capex intensity, including lease obligations, is not fully modeled in public analyst coverage.
      Diligence should require: (a) audited NRR by product cohort for three or more years; (b) disaggregated
      PW Skills P&L; (c) 5-year capex plan for offline expansion with assumptions on occupancy ramp. Until these
      are provided, a medium-confidence rating on the financial diligence verdict is appropriate.
    claimRefs:
      - CI036
      - CI037
      - CI038
      - CI039
      - CI040
      - CI041
      - CI042

