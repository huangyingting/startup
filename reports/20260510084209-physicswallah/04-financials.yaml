  evidenceGaps:
    - type: "private-evidence-only"
      severity: "blocking"
      topic: "NRR"
      missingEvidence: "Audited net revenue retention (NRR) by product cohort for at least three enrollment years"
      whyItMatters: "Without NRR, the fundamental unit economics of the subscription business — LTV, payback, and capital efficiency — cannot be independently verified, making it impossible to underwrite the long-term financial thesis."
      diligencePath: "Request audited cohort revenue data from CFO data room; cross-check with statutory auditor footnotes in FY2025 annual report."
      relatedQuestionRefs: ["QI010", "QI017"]
      relatedTableRefs: ["TI003", "TI005"]

    - type: "private-evidence-only"
      severity: "blocking"
      topic: "LTV"
      missingEvidence: "Formal LTV model with audited churn rates, discount rate assumptions, and multi-year cohort revenue curves"
      whyItMatters: "The LTV/CAC ratio is the core economic thesis for a subscription edtech business; without LTV disclosure, the business model durability cannot be assessed independently."
      diligencePath: "Request management's internal LTV model with underlying cohort data; validate against statutory audit workpapers."
      relatedQuestionRefs: ["QI008", "QI017"]
      relatedTableRefs: ["TI003"]

    - type: "private-evidence-only"
      severity: "material"
      topic: "PW-Skills-segment-P&L"
      missingEvidence: "Disaggregated PW Skills (iNeuron) segment P&L including GMV, net revenue, gross margin, and headcount costs"
      whyItMatters: "PW Skills is the highest-growth strategic bet and is entirely opaque; without its standalone P&L, investors cannot assess the value destruction or creation from the iNeuron acquisition."
      diligencePath: "Request PW Skills segment reporting in the FY2026 annual report; if not available, require segment breakout in data room."
      relatedQuestionRefs: ["QI007"]
      relatedTableRefs: ["TI005"]

    - type: "private-evidence-only"
      severity: "material"
      topic: "offline-center-unit-economics"
      missingEvidence: "Per-center P&L including revenue per center, occupancy rate, fixed cost structure, and break-even timeline for Vidyapeeth centers"
      whyItMatters: "Offline represents 20–25% of revenue with structurally lower margins; without center-level economics, the capex return and margin dilution from planned 500-center network cannot be modeled."
      diligencePath: "Request representative center-level P&L from data room; cross-check with INDAS 116 right-of-use asset schedules in DRHP."
      relatedQuestionRefs: ["QI015"]
      relatedTableRefs: ["TI004", "TI005"]

    - type: "missing-source"
      severity: "material"
      topic: "CAC-by-channel"
