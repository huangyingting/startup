  - id: "SE-S5"
    title: "Trust, Safety, Security, and Compliance"
    body: >
      Physics Wallah's compliance posture is evolving in step with India's regulatory environment for digital platforms.
      The Digital Personal Data Protection (DPDP) Act 2023 — India's first comprehensive data privacy law — imposes consent,
      purpose limitation, and data minimisation obligations on companies processing personal data of millions of students,
      including minors studying for board and entrance examinations. As of the run date, PW's DPDP compliance status is
      partial: the company has updated its privacy policy on pw.live but has not publicly disclosed the status of its Data
      Protection Impact Assessment or its potential registration as a Significant Data Fiduciary. Full enforcement rules from
      MeitY were still pending as of Q1 FY2026, giving PW a compliance runway, but first-mover compliance investment is a
      governance expectation for a recently listed public company.

      Payment security is effectively delegated to Razorpay and Paytm — both PCI-DSS Level 1 certified processors. PW itself
      has not publicly disclosed PCI-DSS, ISO 27001, or SOC 2 certifications, representing a reputational and operational
      risk for an organisation handling payment data and academic records for 6.5 million-plus users. Content safety for
      Class 6-12 minor users requires compliance with applicable child safety regulations; PW's content moderation protocols
      for minor audiences are not publicly disclosed.

      Content accuracy and curriculum alignment are managed through internal review processes rather than third-party
      certification. With PW scaling beyond 100 faculty members across verticals, quality control consistency is a known
      operational risk. Content piracy — particularly widespread distribution of PW videos on Telegram groups — undermines
      both revenue and brand integrity, and enforcement against redistribution channels has had limited impact.
    claimRefs:
      - CE023
      - CE031
      - CE032
      - CE033
      - CE038
      - CE039
