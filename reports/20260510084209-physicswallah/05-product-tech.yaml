  evidenceGaps:
    - type: "private-evidence-only"
      severity: "material"
      topic: "per-product revenue breakdown"
      missingEvidence: "Segment-level revenue breakdown by product (PW App digital, Vidyapeeth offline, PW Skills, Test Series) is not publicly disclosed in DRHP or earnings materials."
      whyItMatters: "Without segment-level data, it is impossible to independently assess the margin profile and growth trajectory of each product line or determine which verticals are driving profitability improvement."
      diligencePath: "Request disaggregated revenue by product vertical from CFO data room; cross-check with management's internal business review presentation."
      relatedQuestionRefs: ["QE002"]
      relatedTableRefs: ["TE001"]

    - type: "missing-source"
      severity: "material"
      topic: "AI capability verification"
      missingEvidence: "No third-party benchmark, peer-reviewed publication, or external evaluation of PW Labs NLP or AI personalisation capabilities is available in the public domain."
      whyItMatters: "PW Labs AI claims are unverifiable without independent evaluation; AI capability is cited as a key differentiator in the roadmap, and its absence diminishes confidence in AI-driven product milestones."
      diligencePath: "Request internal AI accuracy benchmarks and test results from PW Labs; compare against published benchmarks from Coursera, Duolingo, or academic NLP competitions."
      relatedQuestionRefs: ["QE011", "QE025"]
      relatedTableRefs: ["TE003", "TE005"]

    - type: "private-evidence-only"
      severity: "material"
      topic: "technology reliability and uptime"
      missingEvidence: "No public status page, incident history, SLA commitment, or uptime data has been identified for PW's live class or app delivery infrastructure."
      whyItMatters: "Reliability during high-stakes live sessions (JEE/NEET) is critical; a single high-profile outage could significantly damage PW's brand and subscriber retention."
      diligencePath: "Request historical uptime reports and incident log from engineering team; check app store reviews for outage complaints during major exam seasons."
      relatedQuestionRefs: ["QE024", "QE019"]
      relatedTableRefs: ["TE003"]

    - type: "missing-source"
      severity: "material"
      topic: "content quality control mechanisms"
      missingEvidence: "No third-party curriculum audit, faculty qualification standards, or content review protocol has been publicly disclosed by PW for its 100+ educator network."
      whyItMatters: "Content quality drift as PW scales its educator base is a material product risk; without independent verification, the consistency of JEE/NEET/UPSC content quality across non-Alakh educators cannot be assessed."
      diligencePath: "Request faculty qualification criteria, content review protocol, and student satisfaction survey data from management; conduct sample content audit across non-Alakh educators."
      relatedQuestionRefs: ["QE020"]
      relatedTableRefs: ["TE004"]

