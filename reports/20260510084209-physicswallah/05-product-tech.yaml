chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Physics Wallah operates a multi-product edtech platform anchored by its flagship PW App (50M+ total downloads, 6.5M+ paid
    subscribers as of FY2025), complemented by Vidyapeeth offline centres (320+ locations across 120+ cities), PW Skills
    upskilling vertical, and PW Test Series. The technology stack is AWS-native with a custom CDN for video delivery, native
    Android/iOS apps, and a 150-engineer PW Labs AI unit developing NLP doubt-resolution, adaptive tests, and personalised
    study plans. Content depth in JEE and NEET is a genuine differentiator reinforced by Alakh Pandey's 150M+ YouTube
    subscriber brand, but AI personalisation is early-stage relative to global peers. Key risks include founder key-person
    dependency, content piracy via Telegram, and pending DPDP Act compliance. The roadmap targets PW Skills expansion,
    UAE/Gulf international launch in FY25-26, and B2G government contracts under NEP 2020 by FY27+.

sections:
  - id: "SE-S1"
    title: "Product Portfolio and Customer Workflow"
    body: >
      Physics Wallah's product suite serves students across the full exam-preparation lifecycle, from foundational school boards
      through competitive entrance examinations to professional upskilling. The flagship PW App — available on Android (Kotlin
      native), iOS (Swift native), and web (React.js) — had accumulated 50 million-plus total downloads across app stores as of
      mid-2025 and serves 6.5 million-plus active paid subscribers as of FY2025. The app aggregates pre-recorded video lectures
      (250,000-plus hours managed by a custom CMS), live classes, a test series engine with AI-driven analytics, PDF notes, and
      OTP-authenticated doubt clearing. Content spans JEE (Physics, Chemistry, Mathematics), NEET (Biology, Chemistry, Physics),
      UPSC, CA Foundation, and Class 6-12 board preparation, available in Hindi, English, and regional languages — a meaningful
      access differentiator in a market historically served by English-medium offline institutes.

      The Vidyapeeth network of 320-plus coaching centres across 120-plus cities extends reach to Tier 2 and Tier 3 geographies
      through a blended model combining in-person faculty teaching with PW app-based assignments and assessments. Annual fees of
      ₹15,000-40,000 position Vidyapeeth meaningfully below incumbent Kota-model institutes charging ₹75,000 or more, while
      providing the tangible, in-person learning environment that a significant cohort of aspirants and their parents prefer.

      PW Skills (incorporating the iNeuron acquisition) addresses professional upskilling with 8-12 week cohort-based courses in
      Data Science, Machine Learning, Full-Stack Development, and Digital Marketing, priced at ₹8,000-₹45,000 with instructor
      revenue sharing. PW Test Series — a standalone mock-test product priced at ₹499-₹2,999 — offers AI-based performance
      analytics, national rank simulations, and subject-level gap identification for JEE and NEET aspirants. PW Books (physical
      study material) rounds out the portfolio as a minor revenue contributor distributed through partner bookstores.

      The customer acquisition funnel is anchored in Alakh Pandey's YouTube presence, exceeding 150 million subscribers across
      PW channels, which functions as a zero-cost, high-reach discovery surface. Students sample free content, download the app,
      and convert at an estimated 10-15% rate to paid subscriptions. Offline enrollment at Vidyapeeth centres is driven by local
      marketing and walk-in traffic from students who prefer or require in-person instruction.
