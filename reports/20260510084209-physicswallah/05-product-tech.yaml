  - id: "SE-S6"
    title: "PW Labs AI Initiative and Technology Outlook"
    body: >
      PW Labs is the company's internal AI and engineering research unit, employing 150-plus engineers as of 2025 and
      reporting directly to co-founder Prateek Boob. The unit's research agenda covers four areas: NLP-based doubt resolution
      parsing student questions in natural language or handwritten form; OCR technology for handwritten query scanning,
      particularly relevant for mathematics and physics queries from rural students who prefer writing over typing; adaptive
      test generation adjusting difficulty and topic coverage based on historical performance data; and student performance
      prediction to proactively identify at-risk students before exam cycles.

      The technology is early-stage. LinkedIn posts from PW Labs engineers indicate active development of transformer-based
      NLP models for Hindi-English bilingual doubt resolution, and job postings visible on LinkedIn and the PW Careers page
      show active hiring of ML engineers with NLP, recommendation systems, and computer vision backgrounds. No peer-reviewed
      publications, benchmark comparisons, or third-party evaluations of PW Labs AI capabilities are available in the public
      domain, which limits independent verification of capability claims.

      PW has the user base and data volume to train meaningful AI personalisation models — 6.5 million paid users with
      granular learning-behaviour data is a substantive training dataset. However, converting raw data into production-grade
      AI features at the quality required to improve student outcomes requires sustained engineering investment, talent
      retention competitive with Bangalore and Noida tech-sector salaries, and a disciplined product roadmap. The company's
      history of prioritising content and growth over engineering rigour suggests that AI feature delivery may lag announced
      timelines, and the gap versus global AI-native edtech platforms is a live competitive risk heading into FY2027.
