  - id: "SE-S2"
    title: "Technology Architecture and Operating Model"
    body: >
      Physics Wallah's technology stack is primarily AWS-hosted, with video delivery managed through an in-house CDN layer
      augmented by Cloudflare and Akamai for last-mile bandwidth optimisation, particularly for rural students with constrained
      connectivity. The client layer spans native Android (Kotlin), native iOS (Swift), and React.js web, with offline download
      support baked into the mobile apps to address India's patchy internet coverage in Tier 2 and Tier 3 cities. The backend
      is organised around a microservices architecture on AWS, with PostgreSQL as the primary relational database, Redis for
      session caching and feed personalisation, and Elasticsearch for content search and discovery across 250,000-plus hours
      of video and associated study material.

      Authentication uses Firebase for identity management, with OTP-based mobile verification as the primary login mechanism
      given PW's mobile-first demographic. Payment collection integrates Razorpay, Paytm, and UPI — covering the spectrum from
      credit-card to wallet-to-direct-bank-transfer preferences prevalent among Indian students. Live classes are delivered
      through a proprietary streaming platform, with Agora and Zoom maintained as hot-standby backups to handle failover during
      high-concurrency events such as JEE and NEET live sessions.

      Content management is handled by a custom-built CMS that indexes and manages over 250,000 hours of video content, allowing
      faculty to upload, tag, and schedule recordings with attached PDF notes, test sets, and doubt-clearing threads. PW Labs —
      the company's internal AI and engineering unit with 150-plus engineers as of 2025 — is developing NLP-based doubt
      resolution, OCR for handwritten query scanning, adaptive test generation, and a student performance prediction engine.
      The recommendation engine personalises learning paths based on test performance, watch history, and subject progress.

      The technology operating model has historically prioritised speed of deployment over rigorous engineering standards, a
      pattern common in hypergrowth consumer-internet companies. Technical debt accumulated in the 2021-2023 growth phase
      represents a latent operational risk, particularly around database schema migrations and API versioning consistency. PW
      Labs is reportedly undergoing systematic re-architecture efforts, but the timeline and scope of debt remediation are not
      publicly disclosed and represent a material diligence gap.
