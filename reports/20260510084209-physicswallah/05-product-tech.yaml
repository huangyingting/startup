  - id: "SE-S3"
    title: "Deployment, Integration, Reliability, and Roadmap"
    body: >
      Physics Wallah's deployment model is a centralised cloud-native architecture on AWS, with no significant edge-compute
      or hybrid on-premise footprint outside of Vidyapeeth centre local networking. The engineering team, totalling 600-plus
      personnel with 150-plus in PW Labs, ships updates to Android and iOS apps through standard app-store release cycles,
      while backend services are deployed via AWS-managed container orchestration. No public status page or formal SLA
      commitment has been identified for the consumer product; availability during live class events — which draw tens of
      thousands of concurrent viewers — is the most operationally sensitive reliability scenario. The absence of a public
      incident history makes independent reliability assessment impossible.

      Integration surface is limited. PW does not expose a public API or developer SDK for third-party integration, which
      constrains partner ecosystem growth but also limits the external attack surface. Primary external integrations are
      Razorpay (payments), Firebase (authentication), Agora/Zoom (live class backup), and Cloudflare/Akamai (CDN). The
      absence of a developer ecosystem is a notable gap relative to global edtech peers such as Canvas or Coursera, which
      support active API-driven integration ecosystems with LMS and institutional customers.

      The product roadmap for FY2025-2026 targets three priorities: PW Skills expansion to additional upskilling domains
      with improved job-placement tracking; international launch targeting NRI students in UAE and Gulf; and deepening AI
      personalisation with the adaptive curriculum engine under development in PW Labs. For FY2026-2027, management has
      signalled a B2G push to supply digital content to state governments under the NEP 2020 framework. Roadmap evidence
      is primarily management guidance and press reporting; no formal product changelog or release note history is publicly
      available, making milestone verification impossible ahead of completion.
