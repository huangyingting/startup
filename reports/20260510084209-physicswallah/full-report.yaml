      - number: '6.4'
        title: Retention, Durability, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              Physics Wallah's retention profile is shaped by the structural lifecycle of exam preparation: students
              typically subscribe for 1–2 years (Class 11 + Class 12) and then naturally exit the platform upon
              completing their target examination — either proceeding to college or re-enrolling for a drop year. This
              creates a high inherent churn rate at year 2 that is structural, not a product quality signal. The
              company-indicated renewal rate of 65–70% for year-over-year subscription renewal is a positive signal but
              carries an important caveat: it measures annual renewal within the 2-year exam prep lifecycle, not
              retention beyond that lifecycle.

              No Net Revenue Retention (NRR) figure has been disclosed by PW, which is a notable gap for diligence. NRR
              measures whether existing cohorts expand their spend (through upsell, cross-sell, or price increases) — an
              important metric for evaluating whether the LTV per customer cohort is growing or declining. The absence
              of this disclosure, combined with the structural 2-year lifecycle, suggests NRR may not be a management
              priority or may not be favorably above 100%.

              Gross Revenue Retention (GRR) is similarly undisclosed. The company's FY25 revenue growth of 49% YoY is
              primarily attributable to new subscriber acquisition and offline center expansion, not cohort expansion —
              consistent with a new-user-acquisition-led growth model. App satisfaction (4.5/5, 2M+ reviews on Google
              Play) provides a sentiment proxy for retained users. India-specific app review analytics consistently rank
              PW among top 5 educational apps.

              PW Skills (professional upskilling) represents a potential retention extension — a student who finishes
              JEE prep might transition to PW Skills for career development, extending LTV. However, PW Skills is
              nascent (launched ~2023) and cross-sell data is not publicly available. Drop-year students (NEET/JEE
              repeaters) represent a natural re-acquisition cohort that PW likely benefits from, as peer networks and
              familiarity with the platform reduce churn friction for this sub-segment.

              Qualitative satisfaction signals from social media, Quora, and education forums are mixed: strong praise
              for content quality and pricing, but complaints about app technical issues, doubt-clearing responsiveness
              during peak exam season, and questions about result verification methodology. Allen and Aakash remain
              preferred by students who value peer competition in physical classrooms — a segment where PW's Vidyapeeth
              offline experience is positioned but not yet dominant.
