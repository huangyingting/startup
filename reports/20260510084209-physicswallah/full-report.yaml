companyProfile:
  summary: >
    Physics Wallah was founded in 2016 in Allahabad, India, by Alakh Pandey (a physics teacher turned YouTube educator)
    and Prateek Maheshwari. Beginning as free YouTube lectures, PW launched a subscription app in 2020 and rapidly
    became the dominant price-disruptive force in India's test-preparation sector — offering JEE and NEET preparation
    courses at ₹2,000–₹8,000 per year versus the ₹15,000–₹80,000 charged by offline incumbents like Allen and Aakash. PW
    raised $100 million at a $1.1 billion valuation in June 2021 (WestBridge Capital and GSV Ventures), making it one of
    India's fastest unicorns. It expanded into offline coaching (Vidyapeeth centers), upskilling (PW Skills), and
    government exam prep. In November 2025, PW listed on BSE and NSE in a ₹3,480 crore IPO.
