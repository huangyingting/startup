      - number: '6.3'
        title: Named Customer Proof and Outcome Evidence
        blocks:
          - type: paragraph
            body: >
              PW's customer proof is primarily aggregated and social-media-driven rather than
              named-individual-reference-based, which is consistent with a B2C student-facing business model. The most
              credible proof category is exam outcome claims: PW reported that multiple students from its platform
              ranked in the top 50 of NEET 2024 and that over 200 students were selected to IITs in JEE 2024 — both
              company-claimed, without independent third-party audit or government corroboration. These claims appear in
              press releases and PW's official communications and website.

              YouTube testimonial volume is exceptional: the Alakh Pandey channel alone has 150M+ subscribers, with
              thousands of student reaction videos, result-sharing posts, and "PW se hua IIT/NEET" (got into IIT/NEET
              through PW) testimonials organically circulating across YouTube, Twitter/X, and Instagram. These
              testimonials are user-generated and not curated by PW, lending authenticity but also limiting
              verifiability.

              Google Play Store reviews (2M+ reviews, 4.5/5 average) provide large-volume customer satisfaction data
              though they are not outcome-linked. A subset of reviews specifically mention exam success. Some user
              reviews and tech-media reports question the 4.5/5 rating for authenticity, citing potential fake reviews.
              Trustpilot has limited PW coverage (under 500 reviews globally, most India-based).

              Named individual student references are not publicly available in aggregated form — PW does not maintain
              or publish a named customer list for privacy and competitive reasons (students are minors in most cases).
              This creates an inherent enumeration-scope limitation. The diligence team was unable to independently
              verify specific named outcomes through public sources; evidence is primarily social-media aggregated.

              The NEET 2024 paper leak controversy is a relevant adverse signal: allegations of question paper leakage
              affected aspirant confidence broadly in May–June 2024, and some students on forums questioned whether PW's
              result claims were cherry-picked given the mass retest complications. No formal regulatory action was
              taken against PW specifically, but brand sentiment data from that period showed elevated negative
              commentary.
