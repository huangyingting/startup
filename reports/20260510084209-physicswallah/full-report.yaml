      - number: '4.4'
        title: Public Traction and Private Metric Gaps
        blocks:
          - type: paragraph
            body: >
              Physics Wallah disclosed the following public financial traction metrics in its DRHP and IPO prospectus:
              FY2024 revenue of ₹1,940.8 crore (audited), FY2023 revenue of ₹1,042.4 crore (audited), and FY2022 revenue
              of ₹294.4 crore (audited). FY2025 revenue of ₹2,886.6 crore was disclosed in Q4 FY2025 earnings materials
              post-listing. The company reported approximately 6.5 million paid subscribers in FY2025, up from an
              estimated 4.5 million in FY2024. The offline network as of Q1 FY2026 comprised 200+ centers and 100+
              cities.

              Key private metrics not publicly disclosed include: (a) net revenue retention rate (NRR) — the company
              cited renewal rates of 65–70% but did not disclose NRR or dollar-based NRR in DRHP; (b) lifetime value
              (LTV) per customer — no formal LTV disclosure; (c) channel-level CAC — aggregate marketing spend disclosed
              but channel breakdown not available; (d) cohort-level revenue retention — multi-year subscriber cohort
              data not disclosed; (e) PW Skills GMV versus net revenue — iNeuron post-acquisition blended metrics are
              not disaggregated.

              The absence of NRR is a critical gap: edtech business model durability depends on whether students
              re-enroll year-over-year or churn after exam completion. A 65% renewal rate implies approximately
              one-third of paying subscribers churn annually, putting significant pressure on new subscriber acquisition
              to maintain growth. Without audited cohort data, the underlying LTV/CAC ratio — and therefore the
              fundamental unit economics of the business — cannot be independently verified. This represents the single
              most material financial diligence blocker for institutional investors.
