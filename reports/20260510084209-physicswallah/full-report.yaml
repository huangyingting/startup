  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams, Pricing Model, and Recognition
        blocks:
          - type: paragraph
            body: >
              Physics Wallah operates a four-stream revenue model. Digital subscriptions — annual-access course packs
              covering JEE, NEET, UPSC, CUET, and foundation exams — contributed approximately 55–60% of FY2024 revenue
              of ₹1,940.8 crore, making them the dominant and highest-margin stream. Live batch classes and test series
              together accounted for a further 15–20% of revenue, with test-series tickets priced at ₹499–₹2,999 per
              exam providing a high-frequency, low-ticket transaction layer. The offline Vidyapeeth centre network —
              200+ centres across 100+ cities as of Q1 FY2026 — contributed approximately 20–25% of revenue, driven by
              annual fees of ₹15,000–₹40,000, but carries higher fixed-cost intensity and is therefore margin-dilutive
              relative to digital. PW Skills (iNeuron integration), the upskilling vertical targeting working
              professionals with courses priced at ₹8,000–₹45,000, generated roughly 5% of FY2024 revenue and is
              operationally nascent.

              Revenue recognition follows INDAS 115: subscription fees are spread over the course-access period
              (typically twelve months), so cash collected at enrollment is deferred and recognized ratably. This
              creates a healthy deferred revenue liability visible in balance-sheet disclosures and means reported
              revenue lags cash collections in growth phases. The DRHP (SEBI filing) disclosed deferred revenue and
              contract liability line items, supporting this interpretation. A material recognition risk is bundled
              offerings (live batch + recorded content + test series) where the standalone selling price allocation
              methodology is not fully disclosed in public documents.

              The FY2022–FY2024 CAGR of approximately 157% reflects an exceptional hypergrowth phase, partly driven by
              pandemic tailwinds and offline-to-online migration, partly by aggressive pricing below incumbents (Kota
              institutes charging ₹75,000+). FY2025 growth at 49% signals a normalization cadence as the base scales,
              consistent with public edtech comps globally when passing the ₹1,000-crore revenue inflection. Overall
              revenue quality is medium-high: the subscription-driven majority is recurring, but JEE/NEET exam-cycle
              seasonality creates quarterly lumpiness, and offline revenue carries the concentration risk of
              center-level fixed costs.
