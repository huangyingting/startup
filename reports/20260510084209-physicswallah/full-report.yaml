      - number: '8.4'
        title: Bull, Base, and Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              The bull case (20% probability) projects FY27 revenue of ₹5,500 crore driven by international expansion to
              Southeast Asia and the Middle East, ARPU expansion from ₹2,500 to ₹4,000 through AI-personalized learning
              features, and PW Skills contributing ₹500 crore from upskilling. At an 8x FY27 revenue multiple —
              justified if PW achieves EBITDA breakeven and demonstrates the brand can travel internationally — implied
              valuation is approximately ₹44,000 crore (~$5.3B), representing +250% from the IPO price. The key bull
              catalyst is Duolingo-style international virality combined with the PW app's gamification roadmap.

              The base case (60% probability) projects FY27 revenue of ₹4,000 crore driven primarily by Tier 3/4
              geographic expansion within India and NEET digital penetration deepening from 25% to 40%+ of the
              addressable exam market. EBITDA is near-breakeven at this scale. At a 5x FY27 revenue multiple —
              consistent with a capital-efficient, high-growth edtech trading at a discount to Duolingo but premium to
              Coursera — the implied valuation is ₹20,000 crore (~$2.4B), representing +58% from the IPO price over two
              years.

              The bear case (20% probability) is driven by three possible shocks: Byju's contagion causing a sector-wide
              multiple compression below 3x revenue, a National Testing Agency policy change that materially disrupts
              JEE/NEET exam cycles, or Alakh Pandey's departure reducing organic acquisition efficiency. In this
              scenario, FY27 revenue reaches only ₹2,800 crore (30% miss to base) and trades at 3x forward revenue,
              implying ₹8,400 crore valuation (~$1B) — a -34% return from the IPO price over two years. The BYJU's
              bankruptcy precedent, which wiped out $22B in peak valuation, demonstrates that India edtech bear cases
              can be severe and fast-moving.
