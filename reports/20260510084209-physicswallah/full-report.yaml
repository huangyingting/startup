      - number: '1.4'
        title: Product Portfolio and Business Model
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah operates a hybrid education model with three primary delivery channels: (1) online (app and
              web platform), (2) tech-enabled offline centers under the Vidyapeeth and Pathshala brands, and (3) hybrid
              formats combining both. This multi-modal approach distinguishes PW from pure-play online edtech players
              and from traditional offline coaching institutes.

              Core products include: the PW app (downloaded 10 million+ times on Google Play as of February 2025); PW
              YouTube channels (13.7 million subscribers on the primary channel as of July 2025, plus 112+ channels
              across five vernacular languages covering an aggregate ~100 million subscribers); Vidyapeeth and Pathshala
              offline centers (198 centers across 109 cities as of March 2025); PW Skills (upskilling/professional
              courses in coding, AI, data analytics, cloud, and software development); PW School (K-12 curriculum and
              foundation courses); PW Foundation (free access content); PW OnlyIAS (civil services); and PW Institute of
              Innovation (IOI), a 4-year residential engineering program.

              PW offers courses across 35+ exam categories: JEE (engineering entrance), NEET (medical entrance), UPSC
              (civil services), CUET, state board exams, government job exams (defense, banking, accountancy), and
              upskilling tracks. The company serves students from Class 6 through post-graduation and working
              professionals. Course pricing averages ₹5,000–₹40,000, making PW significantly more affordable than
              traditional coaching institutes.

              Revenue comes primarily from subscription-based course sales, offline center fee collections, product
              sales (books, merchandise), and advertising. In FY25, online courses contributed ₹1,404 crore (+45% YoY)
              and offline centers ₹1,351.9 crore (+46% YoY), demonstrating near-parity between channels. Product sales
              (books) added ₹259.2 crore, and other income (ads, etc.) ₹12.9 crore.

              PW claims to serve 18,000+ pin codes across India covering approximately 98% of India's geography.
              International reach exists through Knowledge Planet (UAE subsidiary targeting Indian diaspora) and a small
              overseas revenue contribution (₹35.5 crore of ₹2,886 crore in FY25). PW produces 9,500+ hours of
              educational content weekly and claims free reach of 4.6 crore (46 million) students across YouTube.
