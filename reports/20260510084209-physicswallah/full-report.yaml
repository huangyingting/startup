      - number: '4.6'
        title: 'Financial Verdict: Revenue Quality, Margin Path, and Diligence Blockers'
        blocks:
          - type: paragraph
            body: >
              Physics Wallah presents a differentiated financial profile among Indian edtech companies. Revenue quality
              is above sector average: subscription-driven, upfront cash collection, deferred recognition, and high
              organic demand pull via founder-brand content reduce the risk of revenue reversal seen in peers like
              BYJU'S. The 86% YoY revenue growth in FY2024 and 49% in FY2025 on a much larger base demonstrate durable
              demand, not a one-time pandemic artifact. The IPO and subsequent public disclosures provide a higher level
              of financial transparency than private-stage edtech peers.

              The margin path is credible but dependent on mix-shift. Digital-subscription gross margins of 65–70%
              provide the margin ceiling; offline expansion at 35–40% dilutes the blended margin. The FY2025 EBITDA
              improvement from -₹1,131 crore to approximately -₹243 crore represents a 79% reduction in losses
              year-on-year — extraordinary progress that, if sustained, points to EBITDA break-even by FY2027. However,
              the FY2024 losses were inflated by non-cash acquisition amortization; the underlying cash operating loss
              is more moderate.

              Three diligence blockers remain. First, the absence of NRR and cohort-level LTV data makes it impossible
              to independently underwrite the unit economics thesis. Second, PW Skills (upskilling) unit economics are
              entirely undisclosed — this is the highest-growth ambition segment and the most opaque. Third, offline
              Vidyapeeth capex intensity, including lease obligations, is not fully modeled in public analyst coverage.
              Diligence should require: (a) audited NRR by product cohort for three or more years; (b) disaggregated PW
              Skills P&L; (c) 5-year capex plan for offline expansion with assumptions on occupancy ramp. Until these
              are provided, a medium-confidence rating on the financial diligence verdict is appropriate.
