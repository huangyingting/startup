      - number: '6.5'
        title: Expansion, Concentration, and Channel Risks
        blocks:
          - type: paragraph
            body: >
              Physics Wallah's B2C model is inherently distributed — no single student represents more than a trivial
              fraction of revenue, and the risk profile is very different from a B2B enterprise software company.
              Customer concentration risk is low by standard metrics: with 6.5M paid subscribers and no disclosed
              revenue attribution above 1% to any single customer or customer category, traditional top-10-customer
              concentration is near-zero. However, segment concentration and geographic concentration are material
              risks.

              Segment concentration: JEE and NEET aspirants likely constitute 70–80% of paid subscriptions. These two
              exam verticals share a correlated risk — any regulatory disruption, exam cancellation, or format change
              (such as NEET 2024's paper leak controversy affecting exam confidence) can simultaneously affect both
              segments. If the government were to restructure JEE or NEET (e.g., shifting to a semester-based common
              university entrance), PW's core product-market fit would require significant repositioning.

              Geographic concentration: An estimated 50% of PW's users are from UP, Bihar, Rajasthan, and Madhya
              Pradesh. This heavy Hindi-belt skew limits international diversification and exposes PW to regional
              economic shocks, internet connectivity disruptions, and language barriers for expansion into South India
              (Tamil Nadu, Karnataka, Andhra Pradesh) where regional-language coaching players have entrenched
              advantages.

              Expansion vectors being pursued: PW Skills (upskilling for professionals, targeting incremental LTV);
              international expansion (Gulf NRI market, UAE, Saudi Arabia — nascent); school partnerships (Class 6–10
              institutional channel — exploratory); and UPSC/state PSC coverage deepening. None of these are at a scale
              to materially diversify revenue concentration within a 2-year horizon.

              Payment friction is a segment-specific risk: rural payer parents have limited credit card penetration; PW
              relies heavily on UPI and BNPL/EMI options. Failure rates on EMI payments and late renewals may inflate
              reported conversion rates vs. actual completed payments. This operational risk is not disclosed in
              available public filings.
