      - number: '8.3'
        title: Financing Context, Entry Discipline, and Cap-Table Overhang
        blocks:
          - type: paragraph
            body: >
              Physics Wallah's November 2025 IPO raised ₹3,480 crore at ₹103–109 per share price band, listing at
              ₹145/share (33% premium), implying a post-listing market capitalization of approximately ₹31,170 crore.
              The IPO comprised a ₹3,100 crore fresh issue and ₹380 crore OFS from promoters, implying founders Alakh
              Pandey and Prateek Boob each sold a small portion of their combined 80.62% stake. The IPO was
              oversubscribed approximately 1.8x overall, with QIB tranche oversubscribed 2.7x, reflecting institutional
              caution relative to retail enthusiasm. Anchor investors included Goldman Sachs, Fidelity, Franklin
              Templeton, ICICI Prudential MF, and Kotak Mahindra AMC at ₹1,562.8 crore.

              Post-IPO cap table: founders each hold ~40.31% (105.12 crore shares each); WestBridge Capital AIF holds
              6.4%; Hornbill Capital 4.41%; Lightspeed Opportunity Fund ~1.8%; public float approximately 10%. There is
              no disclosed preference stack or liquidation preference overhang from the institutional rounds, as PW
              converted all preference shares to equity before the IPO per SEBI requirements. The pre-IPO Series B round
              at $2.8B valuation (2024) means Hornbill Capital and Lightspeed are approximately at break-even at the IPO
              price band, removing the risk of a forced overhang sale above current levels.

              Post-IPO cash is estimated at approximately ₹4,000–4,500 crore (fresh issue proceeds plus pre-existing
              cash), providing 3–5 years of runway at current burn of ₹60–90 crore/month. Management has disclosed IPO
              use of proceeds: ₹1,000 crore technology/AI investment, ₹900 crore Vidyapeeth offline expansion, ₹1,580
              crore general corporate purposes. The absence of near-term debt maturities (PW is effectively debt-light)
              removes financial distress risk from the bear case scenario.
