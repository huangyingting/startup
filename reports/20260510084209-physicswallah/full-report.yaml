      - number: '1.5'
        title: Milestones, Acquisitions, and Operational Scale
        blocks:
          - type: paragraph
            body: >
              PhysicsWallah's trajectory from YouTube channel to listed edtech company is marked by several pivotal
              milestones across product, financing, governance, and strategic events. The company demonstrated rapid
              operational scaling: FY23 revenue was approximately ₹779 crore, FY24 reached ₹1,940.7 crore (+160% YoY),
              and FY25 hit ₹2,886.6 crore (+49% YoY), reflecting a ~97% revenue CAGR over two years.

              Acquisitions have been a key pillar of PW's expansion strategy. In 2022, PW completed multiple bolt-on
              acquisitions: FreeCo (doubt-solving platform, first acquisition), iNeuron (AI/ML upskilling, acquired for
              ~$31 million from S. Chand Group), PrepOnline, Altis Vortex, and several educational book publishers. In
              2022, PW also acquired Knowledge Planet (UAE-based K-12 platform serving Indian diaspora). In 2023, PW
              acquired a 50% stake in Kerala-based Xylem Learning for approximately ₹500 crore (~$61 million), giving it
              a strong foothold in South India's test-prep market. PW has been gradually increasing its Xylem stake —
              reaching 64.98% and then 77.27% (by investing an additional ₹122.9 crore in December 2025), with a roadmap
              to achieve full ownership by FY30 per its shareholder agreement. PW also held 75.5% of Utkarsh Classes and
              Edutech Private Ltd as of late 2025, targeting 100% ownership by March 2028.

              Adverse milestone: In November 2023, PW laid off 70–150 employees (less than 0.8% of its then
              ~12,000-person workforce) in what was the company's first significant layoff, officially described as a
              "performance-based assessment" but reported as partly a cost-cutting exercise. Earlier, in March 2023,
              several teachers departed and publicly criticized PW's culture and management, starting the "Sankalp
              Bharat" independent YouTube channel and alleging that student value at PW's Kota center did not justify
              tuition fees charged.

              On the regulatory front, PW filed an Updated DRHP with SEBI in September 2025. The Government of Andhra
              Pradesh signed an MoU with PW in December 2024 for establishing a University of Innovation. In Q2 FY26
              (July–September 2025), PW reported ₹1,051 crore operating revenue (+26% YoY) and ₹70 crore profit — its
              first quarterly profit — demonstrating improving cost control.
