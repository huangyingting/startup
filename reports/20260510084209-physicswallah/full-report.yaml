      - number: '7.5'
        title: People, Execution, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              Physics Wallah's people risk is driven by two interlocking dynamics: management depth and educator
              attrition. The senior leadership team is relatively young and has limited experience operating at
              listed-company scale with attendant SEBI disclosure obligations, quarterly earnings calls, and
              institutional investor relations. The CFO and COO roles are critical execution nodes; any unplanned
              departure would create execution risk precisely when public-market credibility is being established. ESOP
              retention plans exist but have not been publicly detailed in SEBI filings, making it difficult to assess
              how long key executives are incentivized to stay. Educator attrition is the second major people risk:
              popular teachers can leave to competitors — the Unacademy model of poaching star educators demonstrated
              this pattern clearly — and revenue-sharing disputes between PW and content creators have not been resolved
              through a publicly disclosed IP ownership framework. If a star educator departs and takes their student
              community with them, PW loses both the content asset and the associated enrolled students. Thesis-break
              triggers that would materially impair the investment case include: (1) Alakh Pandey departing or ceasing
              active content creation; (2) DPDP Act enforcement action against PW resulting in ₹100 crore+ penalties or
