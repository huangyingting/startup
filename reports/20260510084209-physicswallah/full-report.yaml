        title: Exhibits
        blocks:
          - type: callout
            title: Bootstrapped-to-Profitable Foundation
            body: >-
              Unlike most Indian edtech unicorns that required institutional capital from day one, PW built a profitable
              business bootstrapping from FY20 to FY22 before its first institutional round. This demonstrates true
              product-market fit before scaling.
            calloutType: strength
            claimRefs:
