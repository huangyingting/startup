  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Physics Wallah (PW) serves a predominantly student-aged customer base with a clear
              primary/secondary/emerging tier structure. The primary segments are JEE aspirants (Class 11-12, ages
              17–19) and NEET aspirants (Class 11-12, ages 17–19), who collectively represent the bulk of paid
              subscribers and the exam-preparation addressable market. JEE Main 2024 saw 12.21 lakh registrations while
              NEET 2024 saw approximately 24.06 lakh registrations — together comprising roughly 36 lakh active
              high-stakes test-takers that form PW's core funnel.

              Secondary segments include Class 6–10 students enrolled in foundation programs designed to build early
              competency in science and mathematics. An emerging segment is UPSC aspirants who access political-science,
              history, and general-studies content. PW Skills — the professional-upskilling vertical — targets working
              professionals and fresh graduates seeking career transitions into data science, web development, and
              digital marketing roles.

              Geographically, PW's user base skews strongly toward Tier-2 and Tier-3 Indian cities: UP, Bihar,
              Rajasthan, and Madhya Pradesh account for an estimated 50%+ of user registrations. The company explicitly
              targets first-generation engineering and medical aspirants who cannot afford ₹75,000–₹1.5 lakh Kota-style
              offline coaching. Demographics show 80%+ of students are from non-metro areas. The payer-user split is
              notable: the student is the user, while the parent (often salaried or self-employed in a small town) is
              the economic decision-maker and payer. This two-sided dynamic affects marketing, pricing, and payment
              modality choices (EMI, UPI, rural net-banking).

              Channel breakdown is primarily direct-to-consumer digital (app download → subscription) supplemented by
              320+ Vidyapeeth offline centers across 120+ Indian cities for students preferring a hybrid offline-online
              experience. There is no material B2B institutional channel revenue reported to date, though PW has tested
              school partnerships for Class 6–10 content delivery.
