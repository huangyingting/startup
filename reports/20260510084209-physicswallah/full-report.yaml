      - number: '6.2'
        title: Adoption Trajectory and Growth Metrics
        blocks:
          - type: paragraph
            body: >
              Physics Wallah's adoption growth is among the fastest in Indian edtech. From a standing start as a free
              YouTube channel, PW crossed 6.5 million paid subscribers by FY2025 (company-stated), representing an
              extraordinary 0-to-6.5M trajectory in approximately 4 years of monetized operations (FY22–FY25).
              Cumulative Google Play and Apple App Store downloads surpassed 50 million as of 2025, suggesting a large
              free or trial user base relative to paid conversion.

              App store data from Google Play consistently shows the PW app among the top-ranked educational apps in
              India, with 2 million+ reviews averaging 4.5/5 stars. Monthly active user estimates based on
              download-to-active industry ratios and PW's own public statements suggest approximately 10–15 million
              monthly actives, implying a paid-to-active ratio of roughly 43–65%, which is high for edtech — though
              these are estimates, not disclosed figures.

              Offline infrastructure expanded from zero to 320+ Vidyapeeth centers across 120+ cities over FY23–FY25,
              with an acceleration in Tier-2 city expansion in FY24 following the ₹210M Series B. PW's FY25 revenue of
              ₹2,886.6 crore (+49% YoY) is partially attributable to this rapid offline expansion. The company targets
              classroom seats that compete directly with Allen and Aakash at lower price points.

              Historical adoption pace: FY21 (pre-app monetization, primarily YouTube free); FY22 (first monetized year,
              rapid user acquisition); FY23 (~3–4M subscribers estimated); FY24 (~5–6M estimated); FY25 (6.5M confirmed
              by company). Free-to-paid conversion rate from the 150M-subscriber YouTube audience is not disclosed but
              represents a critical growth lever — even a 1% conversion of YouTube subscribers at ₹5,000 ARPU implies
              ₹750 crore incremental revenue headroom.

              PW's 5-year CAGR of paid users exceeds 100% from FY20 to FY25 and the company is positioned among the
              fastest-growing edtech platforms globally in the test-prep category. The key validation question for
              diligence is whether this growth trajectory is sustainable post-IPO, or whether natural cohort graduation
              and limited market size could cause a ceiling effect in FY26–FY27.
