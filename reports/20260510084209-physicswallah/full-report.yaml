  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape and Competitor Categories
        blocks:
          - type: paragraph
            body: >
              India's test-preparation coaching market hosts five distinct competitor categories that PW must address.
              First, offline incumbents: Allen Career Institute (est. 1988, Kota), Aakash Institute (Blackstone-backed,
              350+ centers), FIITJEE (pioneer since 1992, 80+ centers), and Resonance (Kota-based, 60,000+
              students/year) collectively dominate the organized offline segment by revenue and by proven IIT/NEET
              results. These players charge ₹15,000–₹80,000/year for structured classroom programs and hold asymmetric
              brand equity with parents in Tier 1 cities. Second, distressed digital peers: BYJU's (bankruptcy
              proceedings since 2025, $1.2B debt), Unacademy (revenue declining to ~₹650 crore FY24 after $570M+
              raised), and Vedantu (~₹300 crore FY24 revenue, 1,400+ layoffs since 2022) have all encountered severe
              capital and retention challenges following the 2022 edtech correction. Their struggles validate PW's more
              conservative burn rate but also contaminate the broader edtech investment narrative. Third, hybrid pivots:
              Allen Digital (launched 2021), Aakash Digital, and Motion Education are all attempting online extensions
              of offline brands. These are the most dangerous near-term threats because they combine offline brand
              credibility with digital delivery. Fourth, AI-backed adjacents: Embibe (Reliance-funded, ₹1,200+ crore
              invested) pursues a B2G route targeting state governments with AI-personalized learning, competing
              primarily for public-sector contracts rather than consumer wallet share. Fifth, the status quo itself:
              free YouTube content — including PW's own pre-2020 Alakh Pandey videos — is the dominant zero-cost
              alternative. Any marginal pricing increase by PW risks accelerating migration back to free. Likely
              entrants include Google's AI tutoring tools, global MOOC platforms (Coursera, Unacademy's global
              expansion), and Jio/Reliance's potential bundling of Embibe into Jio subscriptions.
