      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Seat Scarcity Is the Market's Demand Engine
            body: >-
              India's 1.2 million JEE Main applicants compete for ~17,000 IIT undergraduate seats (1:70 ratio) and 2.4
              million NEET applicants compete for ~110,000 government MBBS seats (1:22 ratio). This extreme scarcity
              makes coaching a near-mandatory spend for aspirants, creating a structurally inelastic demand curve that
              is immune to economic cycles — exactly the market dynamic that makes test prep an attractive investment.
            calloutType: strength
            claimRefs:
              - CM004
              - CM005
              - CM017
              - CM018
          - type: callout
            title: Market Sizing Uncertainty Is Material
            body: >-
              Analyst estimates for the India edtech market in 2025 range from $3.6 billion (IMARC, online-only) to
              $12.1 billion (Market Research Future, broad definition). This 3.4× spread is not noise — it reflects
              genuine definitional ambiguity about what counts as 'edtech' vs. traditional offline coaching. Investors
              and analysts using TAM to value PW must explicitly state which definition they are using; failure to do so
              leads to systematically misleading comparisons.
            calloutType: risk
            claimRefs:
              - CM008
              - CM009
              - CM010
          - type: callout
            title: BYJU's Collapse Is a Structural Gift to PW
            body: >-
              The insolvency of BYJU's in 2024 displaced an estimated 25–30 million learners from a collapsing platform
              and sent a credibility signal to the market: governance and financial discipline matter in edtech.
              PhysicsWallah, which was built on affordability and founder credibility rather than aggressive VC-funded
              sales tactics, is the most direct beneficiary. The regulatory tightening that followed — mandatory refund
              policies, outcome disclosures — disadvantages new entrants and raises the compliance bar in a way that
              incumbents with clean track records (like PW) can absorb more easily.
            calloutType: insight
