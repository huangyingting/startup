      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              Multiple analyst firms have sized the India edtech market with divergent methodologies. IMARC Group puts
              the total

              India edtech market at $3.6 billion in 2025, growing at 28.7% CAGR to reach $33.2 billion by 2033. Market
              Research

              Future estimates the same market at $12.1 billion in 2025, growing at 15.2% CAGR. The divergence largely
              reflects

              whether offline coaching revenue is included: when the full coaching ecosystem (physical institutes +
              online platforms)

              is measured, Technavio estimates the India test-preparation market alone at $11.6 billion in 2025 with a
              CAGR of 8.7%

              through 2030. For this analysis, the most conservative online-only and hybrid-inclusive definitions are
              applied.


              TAM (total India edtech including coaching): approximately $10–12 billion in 2025, with the
              IMARC/Technavio blended

              consensus placing it at $10–11 billion when normalized for methodology differences. This includes offline,
              hybrid, and

              fully digital modes across all learning categories.


              SAM (PW-relevant online+hybrid segments — JEE/NEET test prep, K-12 online tutoring, and professional
              upskilling):

              approximately $5–8 billion in 2025. Online test prep alone contributes ~$2.6 billion (Technavio), K-12
              digital adds

              $1.5–2.85 billion (43–44% of the online edtech market), and upskilling adds a further ₹13,200 crore
              ($1.6B) in FY23

              trending toward ₹41,500 crore ($5B) by FY28 at 25.7% CAGR.


              SOM (PW's realistically capturable revenue in FY25–FY26): PW's FY25 revenue of ₹2,886.6 crore (~$345
              million) implies

              a 4–7% capture rate on its SAM. With its hybrid model, brand strength, and affordable pricing, the
              manageable share

              could expand to 8–12% of SAM by FY28 if offline center expansion and upskilling gains continue.
