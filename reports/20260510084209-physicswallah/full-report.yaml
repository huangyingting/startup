      - number: '4.3'
        title: Cost Structure, Gross Margin, and Working Capital
        blocks:
          - type: paragraph
            body: >
              PW's cost structure in FY2024 was dominated by three buckets: teaching and content costs (approximately
              30–35% of revenue), sales and marketing (approximately 20–25% of revenue), and technology and platform
              (approximately 5–8% of revenue). General and administrative costs, including faculty salaries for offline
              centers and acquisition-linked amortization from the iNeuron acquisition, add a further 15–20%. The
              reported EBITDA loss of ₹1,131 crore in FY2024 substantially reflected non-cash amortization and
              restructuring charges; the DRHP disclosed that goodwill and intangibles from acquisitions (primarily
              iNeuron) contributed materially to reported losses in FY2023 and FY2024.

              Gross margin is bifurcated by stream. Digital courses carry estimated gross margins of 65–70% (content is
              a largely sunk cost; incremental margin on one additional subscription is near 100% for the digital
              delivery layer). Offline Vidyapeeth centers, in contrast, carry estimated gross margins of 35–40% after
              faculty, rent, and utilities. PW Skills (upskilling) is estimated at 40–50% gross margin, with higher
              instructor costs offset by higher ticket sizes. The blended company gross margin is estimated at
              approximately 55–60% based on the current revenue mix, consistent with the trajectory of Indian edtech
              public comps like Vedantu and BYJU'S in their pre-overexpansion phases.

              Working capital dynamics are favorable: subscription fees are collected upfront, creating a deferred
              revenue liability (negative working capital in the best sense). Offline center fees follow a similar
              pay-upfront model. PW Skills uses an EMI-linked scheme for higher-ticket courses, creating a receivables
              exposure. Capex intensity is low for the digital business at approximately 3–5% of revenue; offline
              expansion is capex-intensive at ₹1–3 crore per new Vidyapeeth center setup, and the planned expansion to
              500 centers represents a meaningful multi-year capex commitment of ₹300–₹900 crore.
            claimRefs:
