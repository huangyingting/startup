  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              India's edtech market spans five overlapping segments: test-preparation coaching (JEE, NEET, UPSC, state
              board exams),

              K-12 supplemental tutoring, higher-education online degrees, professional upskilling and certifications,
              and preschool

              digital content. PhysicsWallah competes primarily in the first two segments and is expanding into the
              third (through PW

              Skills / iNeuron). This chapter analyses the total addressable market (TAM), serviceable addressable
              market (SAM), and

              serviceable obtainable market (SOM) for each of these segments, with special attention to the JEE/NEET
              test-prep

              sub-market that generates the majority of PW's revenue.


              The structural backdrop is crucial: India has more than 250 million school-going students and
              approximately 500 million

              citizens under the age of 24, creating a demographic dividend that underpins long-run demand.
              Simultaneously, acute

              scarcity of quality seats — roughly 17,000 IIT undergraduate seats for 1.2+ million JEE Main applicants,
              and about

              110,000 government MBBS seats for 2.4 million NEET applicants — makes test preparation a near-necessity
              for aspirants

              rather than an optional luxury. This seat scarcity is the primary demand-side engine for the coaching
              industry and

              directly benefits players such as PhysicsWallah.


              The market is geographically concentrated but rapidly broadening. Historically, the Kota coaching corridor
              (Rajasthan)

              and metro cities dominated. Post-2020, digital penetration into Tier 2 and Tier 3 cities has become the
              key growth

              frontier, with PW specifically positioned at the affordable end of the market to exploit this shift.
