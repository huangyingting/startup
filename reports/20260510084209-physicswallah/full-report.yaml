  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape Overview and Severity Rankings
        blocks:
          - type: paragraph
            body: >
              Physics Wallah (PW) faces a multi-layered risk profile spanning regulatory compliance, operational
              execution, partner dependencies, financial sustainability, and people concentration. As of May 2026, the
              severity-ranked risk landscape places key-person concentration in founder-CEO Alakh Pandey and compliance
              obligations under India's Digital Personal Data Protection Act 2023 at the apex, followed closely by
              structural dependency on YouTube as the primary student acquisition funnel and the reputational overhang
              from the NEET 2024 examination controversy. Financial risks have moderated materially post-IPO: with
              approximately ₹4,000 crore in cash and EBITDA losses narrowing from ₹1,131 crore in FY2024 to
              approximately ₹243 crore in FY2025, runway extends beyond FY2028 under current burn. Path to profitability
              by FY2027 depends on mix-shift toward higher-margin digital courses and slower offline Vidyapeeth center
              expansion. From an investment perspective, regulatory and people risks are the hardest to price: DPDP Act
              implementation rules remain partially unnotified as of 2026, creating compliance uncertainty, while Alakh
              Pandey's brand equity is not legally separable from the corporate entity. Operational and financial risks
              are more bounded given IPO-raised capital and active cost discipline. The BYJU's collapse has permanently
              re-rated India edtech multiples; PW must continuously demonstrate its fundamentals differ. The risk
              heatmap (FR001) visualizes severity across five categories; the transmission map (FR002) shows how
              individual risk events cascade into revenue, margin, and market-capitalization impact.
