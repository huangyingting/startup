            title: Key-Person Dependency on Alakh Pandey
            body: >-
              Alakh Pandey is both the primary educator and the brand identity for PhysicsWallah. IPO analysts,
              including InCred Equities, specifically flagged dependence on the promoter's 'face value' as a material
              risk. Any disruption to his participation — reputational, health, or otherwise — could materially impair
              student trust and enrollment.
