      - number: '7.4'
        title: Partner, Dependency, and Financial Risks
        blocks:
          - type: paragraph
            body: >
              PW's partner and dependency risk is concentrated in three areas: cloud infrastructure, content
              distribution, and payment processing. On infrastructure, PW primarily hosts on Amazon Web Services (AWS);
              no public disclosure of multi-cloud redundancy exists, meaning any AWS regional outage becomes a platform
              outage during critical exam-preparation windows. On distribution, YouTube is the primary top-of-funnel
              channel; Google algorithm changes, policy enforcement actions, or demonetization events could reduce PW's
              free-content visibility and therefore paid conversion rates without advance notice. The YouTube channel's
              150M+ subscriber base represents an off-balance-sheet brand asset that is structurally at risk if Google
              changes content monetization policies for educational channels. Payment gateway dependency on Razorpay and
              Paytm is lower severity given the availability of alternatives, but outages during enrollment peaks would
              hurt revenue capture. On the financial side, PW's real-estate commitment for 320+ Vidyapeeth centers
              creates long-term fixed-cost obligations that are difficult to wind down quickly if demand shifts back to
              digital-only. The ₹4,000+ crore post-IPO cash balance provides strong liquidity, but the path from FY2025
              EBITDA loss of approximately ₹243 crore to breakeven by FY2027 assumes continued revenue growth at 30-40%
              annually and margin improvement from operating leverage in the digital segment. The BYJU's collapse has
              created an industry-wide contagion effect: investors now apply extreme scrutiny to edtech cash burn
              metrics, and any quarterly revenue shortfall could trigger disproportionate market multiple compression.
              Revenue seasonality — concentrated in August-to-March exam preparation cycles — creates Q1 (April-June)
              working capital pressure, particularly as offline center lease obligations are year-round.
