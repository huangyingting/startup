      - number: '8.6'
        title: Exit Readiness, Thesis-Break Triggers, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Physics Wallah is publicly listed on BSE and NSE as of November 2025, resolving the liquidity exit pathway
              for institutional investors. The public listing also imposes quarterly disclosure requirements (SEBI
              LODR), creating a structured evidence trail for monitoring thesis evolution. For institutional investors
              entering post-IPO, the standard exit mechanism is secondary market sale; for pre-IPO holders (WestBridge,
              Hornbill, Lightspeed), the lock-up period (typically 6 months post-IPO per SEBI norms) expires
              approximately May 2026 — at which point a secondary supply overhang could present an improved entry point.

              The five thesis-break triggers that would cause an immediate negative reassessment are: (1) Alakh Pandey
              publicly reducing his active role to less than 20% of content/brand activity — the key-person event most
              likely to destroy organic acquisition economics; (2) NTA abolishing or restructuring JEE/NEET in their
              current form, which would destabilize PW's exam-specific course library; (3) FY26 revenue missing analyst
              consensus by more than 20% (implying below ₹2,300 crore vs ₹2,850+ crore consensus), signaling that the
              49% FY25 growth rate was peak; (4) Byju's-style credit, fraud, or governance allegations against PW
              management, which would trigger a sector-wide derating regardless of PW fundamentals; and (5) DPDP Act
              enforcement actions creating a material compliance shutdown of data practices affecting student
              personalization.

              Outstanding diligence asks before upgrading to BUY conviction include: (1) audited FY26 gross margin
              disclosure disaggregated by stream (digital vs offline vs skills) to verify the 55–60% estimate; (2)
              formal disclosure of CAC, NRR, and LTV per subscriber cohort; (3) proof of international student cohort
              traction (100K+ students outside India) to underpin the bull case; (4) audited related-party disclosure
              covering Alakh Pandey's personal brand engagements and content exclusivity terms; (5) DPDP Act compliance
              roadmap from the board's audit committee, noting that PW collects data on 6.5M+ minor students.
