      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Physics Wallah's most material regulatory risk is the Digital Personal Data Protection Act 2023, signed
              into law in August 2023, with implementation rules expected to be notified in 2024-2026. PW collects
              personal data from millions of minor students (under 18) enrolled in JEE, NEET, and foundation courses,
              making it squarely subject to DPDP's parental-consent requirements. Non-compliance penalties can reach
              ₹250 crore per incident — a meaningful exposure relative to PW's FY2025 EBITDA loss trajectory. Data
              localization requirements, if enacted strictly, could increase cloud infrastructure costs materially. The
              Ministry of Education's November 2022 edtech advisory imposed no-dark-pattern and refund-policy
              obligations; consumer protection complaints against edtech companies rose sharply in 2024-2025. The NEET
              2024 paper leak controversy triggered Supreme Court intervention and ongoing NTA restructuring, creating
              uncertainty about JEE/NEET exam format stability — PW's entire core TAM consists of NTA exam aspirants, so
              any exam disruption or format change (regional language mandates, CBT-only transition) compresses
              addressable market immediately. Consumer litigation exposure is rising as students who fail exams after
              paying for courses increasingly file NCDRC complaints; BYJU's faced over ₹2,000 crore in aggregate
              consumer claims before insolvency, establishing a precedent for the sector. Post-IPO SEBI listing
              obligations (continuous disclosure, related-party transaction norms) add compliance overhead. Content
              piracy via Telegram reduces paid-to-free conversion and constitutes an ongoing IP risk that PW has not
              publicly disclosed a definitive enforcement strategy to address.
