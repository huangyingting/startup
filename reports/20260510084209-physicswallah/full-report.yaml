      - number: '7.3'
        title: Operational and Technology Risks
        blocks:
          - type: paragraph
            body: >
              Physics Wallah's single greatest operational risk is key-person concentration in Alakh Pandey. His
              personal YouTube channel — with over 150 million subscribers as of 2025 — is the company's primary brand
              asset and organic acquisition engine. Critically, the channel is registered under Alakh's personal
              identity, not the corporate entity; if he exits, PW loses both the content repository and the distribution
              funnel simultaneously. No formal succession plan or contractual mechanism transferring the channel to PW
              has been publicly disclosed. Beyond key-person risk, content quality drift is a significant operational
              challenge as PW scales beyond 500 educators: student forum complaints document a material quality gap
              between Alakh-produced content and that of non-star educators, which drives lower course completion rates
              and potentially higher churn. Technology reliability is a medium-severity risk — app crashes during peak
              exam-result seasons are documented in user reviews and social media, and CDN failures during JEE/NEET date
              announcements have been reported. PW has not published any SLA or uptime guarantee, making it difficult to
              hold the platform accountable for availability. The NEET 2024 paper-leak controversy caused reputational
              association risk: PW's brand is tightly linked to NEET aspirants, and any perception that NTA systemic
              failures affected PW students' outcomes could generate negative media cycles. The 320+ Vidyapeeth centers
              create operational complexity around lease management, staff quality, and local regulatory compliance that
              is difficult to monitor centrally at pace with the expansion.
