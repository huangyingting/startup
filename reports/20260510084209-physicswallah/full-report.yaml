      - number: '4.5'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Physics Wallah completed its IPO in November 2025 at a price band of approximately ₹1,420–₹1,500 per
              share, raising ₹3,480 crore in fresh issue proceeds. Combined with pre-IPO cash and equivalents, post-IPO
              cash is estimated at approximately ₹4,000–₹4,500 crore. The DRHP specified use of proceeds across three
              categories: technology and product investment (approximately ₹1,000 crore), expansion of Vidyapeeth
              offline centers (approximately ₹900 crore), and general corporate purposes including working capital
              (approximately ₹1,580 crore). No acquisitions were earmarked as mandatory use of proceeds in the DRHP.

              Monthly cash burn — estimated at ₹60–90 crore as of Q4 FY2025 based on extrapolation from EBITDA trend —
              implies a runway of 44–75 months (roughly 3.5–6 years) from post-IPO cash. This is well above typical
              institutional investor comfort thresholds of 24 months. The narrowing of EBITDA losses from ₹1,131 crore
              in FY2024 to approximately ₹243 crore in FY2025 suggests the company is tracking toward EBITDA break-even
              within 18–24 months of the run date (i.e., by FY2027), consistent with management guidance.

              Debt obligations are limited. Pre-IPO, PW carried minimal long-term debt; the DRHP did not disclose
              significant project-finance or bank credit facilities. The Vidyapeeth offline expansion, however, may
              require incremental capex financing as the network scales toward 500 centers, potentially necessitating
              lease obligations that would show up as right-of-use asset liabilities under INDAS 116. The company's
              asset-light digital core insulates it from capital-intensive scale risk, but offline expansion represents
              the primary capital adequacy watchpoint for diligence.
