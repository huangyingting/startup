      - number: '8.5'
        title: Comparable Company and Transaction Analysis
        blocks:
          - type: paragraph
            body: >
              The comparable set for Physics Wallah spans four categories: global public edtech, India-listed education,
              private India edtech with disclosed marks, and edtech M&A transactions. Among public global edtech
              companies, Duolingo (DUOL) is the highest-quality comparable at 12x FY24 revenue — justified by its 74%
              YoY growth, positive EBITDA, and international consumer brand moat. Coursera (COUR) trades at 2.3x FY24
              revenue, reflecting slower growth (~12% YoY) and OPM-partnership model economics. Chegg (CHGG) at 0.9x
              reflects structural decline as GenAI disrupts homework-help. 2U Inc's 0.4x multiple reflects bankruptcy
              proximity.

              Among India education listed companies, no direct edtech comparable exists. Career Point and Resonance
              Eduventures are small-cap, offline-first coaching businesses with single-digit revenue multiples
              irrelevant to PW's digital scale. Allen Career Institute, PW's closest offline competitor with ₹3,500+
              crore revenue, is private with no disclosed valuation. The most instructive India private edtech comps are
              Unacademy (last public mark $3.4B in 2021, likely ~$1B–1.5B on mark-to-market basis given 50–70%
              write-downs by investors) and Vedantu (last mark $1B in 2021, estimated $200–400M now). Both marks confirm
              PW commands a deserved premium for its profitability trajectory and brand strength relative to
              competitors.

              On a PW-specific basis, the Price/Paid Subscriber metric of approximately ₹47,954 (~$575) per subscriber
              at IPO valuation is a useful sense-check: at 6.5M paid subscribers, this implies PW is valued at
              approximately 3x estimated annual subscription revenue per user, consistent with a high-growth
              SaaS-adjacent consumer company prior to profitability. The JPMorgan Overweight at ₹65/share target implies
              a ~18% premium to the IPO price, consistent with the base case return by mid-FY26. Our comparable analysis
              supports 4.5–6x FY25E revenue as a fair value range for a base case, supporting the thesis that the IPO
              price represents a fair-to- rich entry for an 18-month hold, with better opportunity at 4x FY25E (~₹10,000
              crore market cap).
