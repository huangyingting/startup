  - id: FV002
    title: Valuation sensitivity
    type: bar
    description: >-
      Revenue multiple sensitivity across bear/base/bull scenarios versus current IPO valuation and analyst price
      targets.
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
    data:
      xAxis: Revenue Multiple Scenario
      yAxis: Implied Market Cap (₹ Crore)
      items:
        - label: Bear Case (3x FY27E ₹2,800 Cr)
          value: 8400
          note: FY27E ₹2,800 Cr × 3x = ₹8,400 Cr; -34% from IPO
        - label: Entry Discipline (4x FY25E ₹2,500 Cr)
          value: 10000
          note: FY25E ₹2,500 Cr × 4x = ₹10,000 Cr; preferred entry
        - label: Base Case (5x FY27E ₹4,000 Cr)
          value: 20000
          note: FY27E ₹4,000 Cr × 5x = ₹20,000 Cr; +58% from IPO
        - label: IPO Valuation (16x FY24 rev)
          value: 31170
          note: Nov 2025 IPO at ₹31,170 Cr listing-day cap; 16x FY24 ₹1,940 Cr
        - label: JPMorgan Price Target Implied
          value: 15000
          note: JPMorgan Overweight ₹65/share → ~₹15,000 Cr market cap
        - label: Bull Case (8x FY27E ₹5,500 Cr)
          value: 44000
          note: FY27E ₹5,500 Cr × 8x = ₹44,000 Cr; +250% from IPO
  - id: FV003
    title: Valuation / return range
    type: range
    description: >-
      Bull/base/bear valuation range, return estimates, and multiple sensitivity for Physics Wallah over 2-year thesis
      horizon.
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV028
      - CV029
    data:
      items:
        - label: FY25E Revenue Multiple
          low: 3
          high: 8
          unit: x revenue
          note: Bear 3x to bull 8x; base 5x FY25E ₹2,500 Cr
        - label: Implied Market Cap (₹ Cr)
          low: 7500
          high: 20000
          unit: ₹ Crore
          note: Based on FY25E ₹2,500 Cr; low=bear 3x, high=bull 8x
        - label: IPO to FY27 Return — Base Case
          low: 40
          high: 65
          unit: '%'
          note: 'Base: ₹20,000 Cr vs IPO ₹31,170 Cr; 18–36 month hold'
        - label: Downside from IPO Price — Bear Case
          low: -40
          high: -20
          unit: '%'
          note: 'Bear: ₹8,400 Cr vs IPO ₹31,170 Cr; Byju contagion scenario'
        - label: Upside from IPO Price — Bull Case
          low: 200
          high: 300
          unit: '%'
          note: 'Bull: ₹44,000 Cr vs IPO ₹31,170 Cr; international expansion'
        - label: Probability-Weighted Expected Return
          low: 80
          high: 110
          unit: '%'
          note: Expected value 20%×250% + 60%×58% + 20%×(-34%) ≈ +93%
  - id: FV004
    title: Investment KPIs
    type: kpi
    description: IC-ready summary of key valuation, financial, and risk metrics for Physics Wallah as of May 2026.
    claimRefs:
      - CV016
      - CV017
      - CV018
      - CV013
      - CV014
    data:
      items:
        - label: IPO Valuation
          value: ₹31,170 Cr (~$3.7B)
          note: November 2025 IPO listing market cap
        - label: Revenue Multiple (FY24)
          value: 6.5x
          note: ₹31,170 Cr / FY24 revenue ₹1,940 Cr
        - label: Revenue Multiple (FY25E)
          value: ~4.4x
          note: ₹31,170 Cr / FY25 revenue ₹2,887 Cr (disclosed)
        - label: Cash Post-IPO (Est.)
          value: ~₹4,000–4,500 Cr
          note: IPO proceeds ₹3,100 Cr fresh issue + pre-IPO cash
        - label: Path to EBITDA Breakeven
          value: FY27 target
          note: Management guidance; subject to execution and mix-shift
        - label: JPMorgan Price Target
          value: ₹65/share (Overweight)
          note: Initiating coverage 2026; ~18% premium to IPO upper band
        - label: Price per Paid Subscriber
          value: ~₹47,954 (~$575)
          note: ₹31,170 Cr / 6.5M paid subscribers (FY25 disclosed)
