            title: 'Entry Discipline: 4–5x FY25E Revenue (~₹10,000–12,500 Cr)'
            body: >
              At the IPO price of 16x FY24 revenue, PW is fair-to-slightly-rich for an EBITDA-negative company. The
              risk/reward materially improves at 4–5x FY25E revenue (approximately ₹10,000–12,500 crore market
              capitalization), which is our preferred accumulation zone. The lock-up expiry for pre-IPO institutional
              holders (~May 2026) may provide this entry window. An upgrade from MONITOR to BUY requires: (1) FY26
              revenue in line with or above consensus, (2) evidence of EBITDA margin improvement trajectory, and (3) at
              least one KPI disclosure (NRR, CAC, or gross margin by stream).
            calloutType: recommendation
            claimRefs:
              - CV011
              - CV013
              - CV014
