callouts:
  - calloutType: "risk"
    title: "Key-Person Risk: Alakh Pandey"
    body: >
      Alakh Pandey's personal YouTube channel (14M+ subscribers) and direct teaching presence are the primary
      drivers of PW's zero-cost organic acquisition funnel. Our analysis suggests 60–70% of brand equity that
      converts top-of-funnel awareness to paid subscriptions is attributable to Pandey personally. Any reduction
      in his active content role — whether voluntary, health-related, or contractual — would require significant
      paid marketing spend to compensate, raising blended CAC from ~₹1,000 to potentially ₹4,000–6,000 (Byju's
      level), which would fundamentally alter the unit economics and profitability timeline.
    claimRefs:
      - CV006
      - CV007
      - CV012

  - calloutType: "recommendation"
    title: "Entry Discipline: 4–5x FY25E Revenue (~₹10,000–12,500 Cr)"
    body: >
      At the IPO price of 16x FY24 revenue, PW is fair-to-slightly-rich for an EBITDA-negative company.
      The risk/reward materially improves at 4–5x FY25E revenue (approximately ₹10,000–12,500 crore market
      capitalization), which is our preferred accumulation zone. The lock-up expiry for pre-IPO institutional
      holders (~May 2026) may provide this entry window. An upgrade from MONITOR to BUY requires: (1) FY26
      revenue in line with or above consensus, (2) evidence of EBITDA margin improvement trajectory, and
      (3) at least one KPI disclosure (NRR, CAC, or gross margin by stream).
    claimRefs:
      - CV011
      - CV013
      - CV014

