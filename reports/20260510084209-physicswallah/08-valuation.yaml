  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "unit economics"
      missingEvidence: "Formal disclosure of CAC per subscriber cohort, Net Revenue Retention (NRR), and Lifetime Value (LTV) metrics. Physics Wallah has not disclosed these formally in any public filing."
      whyItMatters: "Without unit economics transparency, the 6x revenue multiple cannot be supported with a bottom-up DCF or cohort analysis, limiting conviction for a BUY recommendation upgrade."
      diligencePath: "Monitor quarterly LODR disclosures and analyst day presentations; engage IR directly via the investor relations portal at pw.live."
      relatedQuestionRefs: ["QV008"]

    - type: enumeration-incomplete
      severity: material
      topic: "comparable valuation table"
      missingEvidence: "Private India edtech peers (Unacademy, Vedantu, Embibe, Allen) do not disclose current valuations publicly; estimates are based on secondary investor marks and press reports, not audited data."
      whyItMatters: "The comparable set for Physics Wallah is primarily global public edtech, which operates in different markets with different growth profiles; India-specific comps would substantially improve multiple validation."
      diligencePath: "Secondary market data providers (Preqin, PitchBook); investor disclosures from Tiger Global, WestBridge; SEBI disclosure of VCF/AIF portfolio valuations where mandated."
      relatedQuestionRefs: ["QV024"]
      relatedTableRefs: ["TV004"]

    - type: missing-source
      severity: material
      topic: "gross margin by stream"
      missingEvidence: "Physics Wallah has not disclosed gross margin disaggregated by revenue stream (digital subscriptions, offline Vidyapeeth, PW Skills); the blended estimate of 55–60% is third-party derived."
      whyItMatters: "Digital vs offline margin mix is the key input for modeling the profitability trajectory; without stream-level disclosure, FY27 EBITDA breakeven projections are inherently uncertain."
      diligencePath: "SEBI annual report (annual statement of accounts); post-IPO investor presentations; CFO commentary on earnings calls."
      relatedQuestionRefs: ["QV033"]

