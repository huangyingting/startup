chapter:
  number: 8
  title: "Valuation"
  summary: >
    Physics Wallah (NSE: PWL) completed its IPO in November 2025, listing at ₹145/share on a ₹109 upper price band,
    implying a post-IPO market capitalization of approximately ₹31,170 crore (~$3.7B) and a Price/FY24 Revenue multiple
    of 6.5x. Analyst coverage is broadly positive — JPMorgan Overweight, HDFC Securities Buy, Motilal Oswal Buy —
    though Morgan Stanley and Goldman Sachs strike a cautious tone pending FY26 profitability signals. Our synthesis
    is MONITOR with positive lean: PW owns a structurally advantaged position in a ₹86,000+ crore India test-prep
    market, but the investment case depends on management execution toward EBITDA breakeven by FY27, resolution of
    key-person concentration in Alakh Pandey, and continued immunity from the Byju's-era contagion affecting
    sector sentiment and multiples.

sections:
  - id: "SV-S1"
    title: "Investment Thesis and Anti-Thesis"
    body: >
      Physics Wallah's investment thesis rests on four interlocking pillars. First, market structure: India's competitive
      exam preparation market (JEE, NEET, UPSC, CUET, state boards) addresses an estimated 30–40 million students
      annually, with digital penetration still below 30% in Tier 3/4 geographies, creating a multi-year runway for
      PW's hybrid model. Second, price moat: PW's flagship JEE and NEET courses are priced at ₹2,000–₹12,000 versus
      ₹50,000–₹1,50,000 for offline Kota institutes, creating a structural cost advantage that incumbents cannot
      easily replicate. Third, brand flywheel: Alakh Pandey's 14+ million YouTube subscribers form a zero-cost
      acquisition funnel that keeps blended CAC around ₹800–₹1,200 — a fraction of Byju's peak spend —
      sustaining estimated gross margins in the 55–60% range. Fourth, financial momentum: FY25 revenue of ₹2,887 crore
      (+49% YoY) with EBITDA losses narrowed to ₹243 crore (from ₹1,131 crore in FY24) signals that the
      hypergrowth-investment phase is transitioning toward profitability.

      The anti-thesis is equally material. Key-person risk dominates: PW's brand equity is inextricably tied to
      Alakh Pandey, whose departure or reduced engagement would damage student trust, organic acquisition, and
      teacher retention simultaneously. Exam policy uncertainty is systemic: a restructuring of NTA's JEE/NEET
      framework, compressed exam cycles, or political disruption of test formats could re-order the market overnight.
      The edtech sector in India carries a Byju's contagion discount of indeterminate magnitude — investor appetite
      for India edtech, even for fundamentally sound companies, remains impaired as Byju's bankruptcy proceedings
      expose misgovernance norms in the sector. Finally, PW's profitability timeline is management-guided without
      auditor sanction, and the cost structure — particularly amortization of the iNeuron acquisition and
      offline center buildout capex — creates model opacity that limits conviction at the current 6.5x FY24
      revenue multiple for a loss-making company.
