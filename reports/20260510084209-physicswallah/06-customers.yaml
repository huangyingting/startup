callouts:
  - id: GU001
    type: risk
    title: "Outcome Verification Gap"
    body: "PW's JEE/NEET selection claims (200+ IITs, top-50 NEET) are company-stated without independent audit. Investors should request verifiable methodology before accepting outcome claims at face value."
    claimRefs: [CU016, CU017, CU021]
  - id: GU002
    type: risk
    title: "NRR and Cohort Disclosure Absent"
    body: "Neither Net Revenue Retention nor cohort-level retention curves are disclosed in PW's IPO filings or public communications. This is a significant diligence gap for assessing the durability of the subscriber base."
    claimRefs: [CU024, CU025]
  - id: GU003
    type: strength
    title: "Massive Organic Top-of-Funnel via YouTube"
    body: "PW's 150M+ subscriber YouTube channel provides an unmatched organic acquisition funnel in Indian edtech. Even a 1% paid conversion of the YouTube base at ₹5,000 ARPU implies ₹750 crore incremental revenue headroom."
    claimRefs: [CU008, CU009, CU030]
  - id: GU004
    type: risk
    title: "NEET 2024 Controversy Brand Impact"
    body: "The NEET 2024 paper leak controversy created a sentiment dip for all edtech platforms including PW. While no regulatory action targeted PW directly, aspirant confidence in coaching platform outcome claims was broadly reduced in mid-2024."
    claimRefs: [CU019, CU032]

