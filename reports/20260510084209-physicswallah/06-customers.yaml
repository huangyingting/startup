sections:
  - id: SU001
    title: "Customer Base Segmentation"
    body: >
      Physics Wallah (PW) serves a predominantly student-aged customer base with a clear primary/secondary/emerging tier structure. The primary segments are JEE aspirants (Class 11-12, ages 17–19) and NEET aspirants (Class 11-12, ages 17–19), who collectively represent the bulk of paid subscribers and the exam-preparation addressable market. JEE Main 2024 saw 12.21 lakh registrations while NEET 2024 saw approximately 24.06 lakh registrations — together comprising roughly 36 lakh active high-stakes test-takers that form PW's core funnel.

      Secondary segments include Class 6–10 students enrolled in foundation programs designed to build early competency in science and mathematics. An emerging segment is UPSC aspirants who access political-science, history, and general-studies content. PW Skills — the professional-upskilling vertical — targets working professionals and fresh graduates seeking career transitions into data science, web development, and digital marketing roles.

      Geographically, PW's user base skews strongly toward Tier-2 and Tier-3 Indian cities: UP, Bihar, Rajasthan, and Madhya Pradesh account for an estimated 50%+ of user registrations. The company explicitly targets first-generation engineering and medical aspirants who cannot afford ₹75,000–₹1.5 lakh Kota-style offline coaching. Demographics show 80%+ of students are from non-metro areas. The payer-user split is notable: the student is the user, while the parent (often salaried or self-employed in a small town) is the economic decision-maker and payer. This two-sided dynamic affects marketing, pricing, and payment modality choices (EMI, UPI, rural net-banking).

      Channel breakdown is primarily direct-to-consumer digital (app download → subscription) supplemented by 320+ Vidyapeeth offline centers across 120+ Indian cities for students preferring a hybrid offline-online experience. There is no material B2B institutional channel revenue reported to date, though PW has tested school partnerships for Class 6–10 content delivery.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007]
    tableRefs: [TU001]
    figureRefs: [FU001, FU002]

  - id: SU002
    title: "Adoption Trajectory and Growth Metrics"
    body: >
      Physics Wallah's adoption growth is among the fastest in Indian edtech. From a standing start as a free YouTube channel, PW crossed 6.5 million paid subscribers by FY2025 (company-stated), representing an extraordinary 0-to-6.5M trajectory in approximately 4 years of monetized operations (FY22–FY25). Cumulative Google Play and Apple App Store downloads surpassed 50 million as of 2025, suggesting a large free or trial user base relative to paid conversion.

      App store data from Google Play consistently shows the PW app among the top-ranked educational apps in India, with 2 million+ reviews averaging 4.5/5 stars. Monthly active user estimates based on download-to-active industry ratios and PW's own public statements suggest approximately 10–15 million monthly actives, implying a paid-to-active ratio of roughly 43–65%, which is high for edtech — though these are estimates, not disclosed figures.

      Offline infrastructure expanded from zero to 320+ Vidyapeeth centers across 120+ cities over FY23–FY25, with an acceleration in Tier-2 city expansion in FY24 following the ₹210M Series B. PW's FY25 revenue of ₹2,886.6 crore (+49% YoY) is partially attributable to this rapid offline expansion. The company targets classroom seats that compete directly with Allen and Aakash at lower price points.

      Historical adoption pace: FY21 (pre-app monetization, primarily YouTube free); FY22 (first monetized year, rapid user acquisition); FY23 (~3–4M subscribers estimated); FY24 (~5–6M estimated); FY25 (6.5M confirmed by company). Free-to-paid conversion rate from the 150M-subscriber YouTube audience is not disclosed but represents a critical growth lever — even a 1% conversion of YouTube subscribers at ₹5,000 ARPU implies ₹750 crore incremental revenue headroom.

      PW's 5-year CAGR of paid users exceeds 100% from FY20 to FY25 and the company is positioned among the fastest-growing edtech platforms globally in the test-prep category. The key validation question for diligence is whether this growth trajectory is sustainable post-IPO, or whether natural cohort graduation and limited market size could cause a ceiling effect in FY26–FY27.
    claimRefs: [CU008, CU009, CU010, CU011, CU012, CU013, CU014]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: SU003
    title: "Named Customer Proof and Outcome Evidence"
    body: >
      PW's customer proof is primarily aggregated and social-media-driven rather than named-individual-reference-based, which is consistent with a B2C student-facing business model. The most credible proof category is exam outcome claims: PW reported that multiple students from its platform ranked in the top 50 of NEET 2024 and that over 200 students were selected to IITs in JEE 2024 — both company-claimed, without independent third-party audit or government corroboration. These claims appear in press releases and PW's official communications and website.

      YouTube testimonial volume is exceptional: the Alakh Pandey channel alone has 150M+ subscribers, with thousands of student reaction videos, result-sharing posts, and "PW se hua IIT/NEET" (got into IIT/NEET through PW) testimonials organically circulating across YouTube, Twitter/X, and Instagram. These testimonials are user-generated and not curated by PW, lending authenticity but also limiting verifiability.

      Google Play Store reviews (2M+ reviews, 4.5/5 average) provide large-volume customer satisfaction data though they are not outcome-linked. A subset of reviews specifically mention exam success. Some user reviews and tech-media reports question the 4.5/5 rating for authenticity, citing potential fake reviews. Trustpilot has limited PW coverage (under 500 reviews globally, most India-based).

      Named individual student references are not publicly available in aggregated form — PW does not maintain or publish a named customer list for privacy and competitive reasons (students are minors in most cases). This creates an inherent enumeration-scope limitation. The diligence team was unable to independently verify specific named outcomes through public sources; evidence is primarily social-media aggregated.

      The NEET 2024 paper leak controversy is a relevant adverse signal: allegations of question paper leakage affected aspirant confidence broadly in May–June 2024, and some students on forums questioned whether PW's result claims were cherry-picked given the mass retest complications. No formal regulatory action was taken against PW specifically, but brand sentiment data from that period showed elevated negative commentary.
    claimRefs: [CU015, CU016, CU017, CU018, CU019, CU020, CU021]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: SU004
    title: "Retention, Durability, and Satisfaction"
    body: >
      Physics Wallah's retention profile is shaped by the structural lifecycle of exam preparation: students typically subscribe for 1–2 years (Class 11 + Class 12) and then naturally exit the platform upon completing their target examination — either proceeding to college or re-enrolling for a drop year. This creates a high inherent churn rate at year 2 that is structural, not a product quality signal. The company-indicated renewal rate of 65–70% for year-over-year subscription renewal is a positive signal but carries an important caveat: it measures annual renewal within the 2-year exam prep lifecycle, not retention beyond that lifecycle.

      No Net Revenue Retention (NRR) figure has been disclosed by PW, which is a notable gap for diligence. NRR measures whether existing cohorts expand their spend (through upsell, cross-sell, or price increases) — an important metric for evaluating whether the LTV per customer cohort is growing or declining. The absence of this disclosure, combined with the structural 2-year lifecycle, suggests NRR may not be a management priority or may not be favorably above 100%.

      Gross Revenue Retention (GRR) is similarly undisclosed. The company's FY25 revenue growth of 49% YoY is primarily attributable to new subscriber acquisition and offline center expansion, not cohort expansion — consistent with a new-user-acquisition-led growth model. App satisfaction (4.5/5, 2M+ reviews on Google Play) provides a sentiment proxy for retained users. India-specific app review analytics consistently rank PW among top 5 educational apps.

      PW Skills (professional upskilling) represents a potential retention extension — a student who finishes JEE prep might transition to PW Skills for career development, extending LTV. However, PW Skills is nascent (launched ~2023) and cross-sell data is not publicly available. Drop-year students (NEET/JEE repeaters) represent a natural re-acquisition cohort that PW likely benefits from, as peer networks and familiarity with the platform reduce churn friction for this sub-segment.

      Qualitative satisfaction signals from social media, Quora, and education forums are mixed: strong praise for content quality and pricing, but complaints about app technical issues, doubt-clearing responsiveness during peak exam season, and questions about result verification methodology. Allen and Aakash remain preferred by students who value peer competition in physical classrooms — a segment where PW's Vidyapeeth offline experience is positioned but not yet dominant.
    claimRefs: [CU022, CU023, CU024, CU025, CU026, CU027]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: SU005
    title: "Expansion, Concentration, and Channel Risks"
    body: >
      Physics Wallah's B2C model is inherently distributed — no single student represents more than a trivial fraction of revenue, and the risk profile is very different from a B2B enterprise software company. Customer concentration risk is low by standard metrics: with 6.5M paid subscribers and no disclosed revenue attribution above 1% to any single customer or customer category, traditional top-10-customer concentration is near-zero. However, segment concentration and geographic concentration are material risks.

      Segment concentration: JEE and NEET aspirants likely constitute 70–80% of paid subscriptions. These two exam verticals share a correlated risk — any regulatory disruption, exam cancellation, or format change (such as NEET 2024's paper leak controversy affecting exam confidence) can simultaneously affect both segments. If the government were to restructure JEE or NEET (e.g., shifting to a semester-based common university entrance), PW's core product-market fit would require significant repositioning.

      Geographic concentration: An estimated 50% of PW's users are from UP, Bihar, Rajasthan, and Madhya Pradesh. This heavy Hindi-belt skew limits international diversification and exposes PW to regional economic shocks, internet connectivity disruptions, and language barriers for expansion into South India (Tamil Nadu, Karnataka, Andhra Pradesh) where regional-language coaching players have entrenched advantages.

      Expansion vectors being pursued: PW Skills (upskilling for professionals, targeting incremental LTV); international expansion (Gulf NRI market, UAE, Saudi Arabia — nascent); school partnerships (Class 6–10 institutional channel — exploratory); and UPSC/state PSC coverage deepening. None of these are at a scale to materially diversify revenue concentration within a 2-year horizon.

      Payment friction is a segment-specific risk: rural payer parents have limited credit card penetration; PW relies heavily on UPI and BNPL/EMI options. Failure rates on EMI payments and late renewals may inflate reported conversion rates vs. actual completed payments. This operational risk is not disclosed in available public filings.
    claimRefs: [CU028, CU029, CU030, CU031, CU032, CU033, CU034]
    tableRefs: [TU005]
    figureRefs: [FU003]

