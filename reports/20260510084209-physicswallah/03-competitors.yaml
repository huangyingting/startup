- id: switching-costs-lock-in
  title: Switching Costs, Lock-In, Multi-Homing, and Distribution Power
  body: >
    Switching costs for PW's digital offering are structurally low. Subscriptions are annual with no
    long-term contracts, content libraries are broadly non-exclusive (competitors' videos are freely
    available on YouTube), and students can and do use multiple platforms simultaneously. The dominant
    multi-homing pattern is PW digital app (for theory and daily practice problems) paired with Allen
    or Aakash offline classroom (for structured doubt-clearing and peer cohort). This multi-homing
    dynamic means PW's 6.5M paid subscribers are not exclusive PW customers — a material proportion
    also pay an offline institute for the live experience that PW cannot fully replicate digitally.

    The key lock-in mechanisms PW does have are: (1) habituated learning patterns — students who
    begin a course sequence on PW are psychologically anchored on Alakh Pandey's teaching style and
    reluctant to switch mid-year; (2) progress tracking and test history within the PW app creates
    light switching friction; (3) the Vidyapeeth offline center model creates geographic stickiness
    for students enrolled in a PW center. Against this, Allen's 350,000+ annual offline enrollees
    have higher structural lock-in because of enrolled teacher relationships, hostel accommodations
    in Kota, and peer social networks. FIITJEE and Resonance similarly benefit from the Kota
    residential ecosystem that creates a 12–24 month commitment structure. Distribution power also
    favors offline incumbents at the top of the funnel: school counselors and parent networks in
    Tier 1 cities systematically steer students toward established offline brands, a channel PW is
    still building through Vidyapeeth. Supply and partner access: teacher talent is the critical
    resource, and Alakh Pandey's departure risk (or faculty poaching by well-funded incumbents)
    represents the most concentrated supply risk. Offline incumbents have larger faculty benches
    and can absorb individual teacher exits more smoothly.
