- id: competitor-profiles
  title: Competitor Profiles — Scale, Funding, Pricing, and Strategic Direction
  body: >
    Allen Career Institute remains India's largest coaching business by total revenue, estimated at ₹3,500+
    crore FY24. Founded in 1988 in Kota, it operates 800+ coaching centers, enrolls 350,000+ students
    annually, and has historically produced the highest number of IIT-JEE top rankers. Allen launched
    Allen Digital in 2021 as a defensive response to PW's price disruption, but its digital revenue remains
    a small fraction of total revenue. Pricing ranges from ₹15,000–₹60,000/year, making it 5–10× more
    expensive than PW's digital offering. Allen's primary strategic direction is to maintain offline
    dominance while slowly building hybrid capacity; an Allen IPO has been speculated but not confirmed.

    Aakash Institute (now Aakash Digital) is Blackstone-backed (acquired 2023), operating 350+ centers
    with particularly strong NEET brand recognition. Revenue is estimated at ₹1,500 crore FY24 and
    pricing runs ₹20,000–₹80,000/year. Aakash's attempted acquisition by BYJU's failed amid legal
    disputes, leaving it independently positioned under institutional ownership. Unacademy — backed by
    Sequoia, Tiger Global, SoftBank, and valued at $3.4B in 2021 — has seen revenue decline to ~₹650
    crore FY24, laid off 2,000+ employees since 2022, and is pivoting to a hybrid model. Vedantu
    (~₹300 crore FY24 revenue) shifted to its WAVE (Whiteboard Audio Visual Environment) model after
    large-scale layoffs. FIITJEE (since 1992) has strong IIT Advanced results track record from 80+
    centers but negligible digital presence. Embibe, backed by Reliance with ₹1,200+ crore invested,
    has ~30M registered users but pursues primarily B2G (state government) contracts, with non-disclosed
    commercial revenue heavily subsidized. Motion Education (Kota-based, growing) serves ~40,000 students
    at ₹12,000–₹50,000/year and is expanding online.
