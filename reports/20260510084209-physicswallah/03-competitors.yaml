    severity: material
    topic: multi-homing-rate
    missingEvidence: No published study quantifies the proportion of PW paid subscribers who simultaneously pay for Allen or Aakash offline coaching.
    whyItMatters: The multi-homing rate directly determines how much of PW's stated paid subscriber base represents exclusive customers vs shared wallet customers.
    diligencePath: Commission a primary survey of 500+ JEE/NEET aspirants across Tier 1 and Tier 2 cities to measure multi-homing behavior.
    relatedQuestionRefs:
    - QP020
    - QP007
  - type: missing-source
    severity: minor
    topic: AI-personalization-benchmarks
    missingEvidence: No independent benchmark compares learning outcomes or accuracy across PW's Prayas AI, Vedantu's WAVE model, and Embibe's B2G AI system.
    whyItMatters: Without outcome benchmarks, AI personalization claims are marketing assertions and cannot be weighted in the capability matrix.
    diligencePath: Search for academic studies or government evaluations of Embibe's B2G AI efficacy; commission an educator evaluation of PW Prayas vs Vedantu WAVE.
