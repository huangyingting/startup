  - type: private-evidence-only
    severity: material
    topic: Allen-digital-revenue
    missingEvidence: Allen Career Institute's exact digital revenue breakdown for FY24–FY25 is not publicly disclosed; the company is private.
    whyItMatters: Understanding how fast Allen Digital is growing relative to PW determines the timeline before Allen becomes a credible hybrid competitor.
    diligencePath: Request Allen's management accounts via investment banker channel or commission a primary survey of Allen Digital's subscriber count.
