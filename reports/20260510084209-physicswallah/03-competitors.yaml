- id: TP004
  title: Moat durability / competitive risk register
  description: >
    Assessment of each claimed competitive moat for Physics Wallah, the primary threat to that moat,
    severity (High/Medium/Low), and the recommended diligence or mitigation action.
  columns:
  - Moat Claim
  - Primary Threat
  - Severity
  - Mitigation / Diligence Ask
  rows:
  - - Alakh Pandey personal brand — irreplaceable content anchor and student trust
    - Pandey departure, health issue, or reputational scandal
    - High
    - Assess founder contract terms, succession plan, talent bench depth; verify no competing platforms approached Pandey
  - - Price disruption positioning — lowest digital price point in organized test prep
    - Allen Digital or Aakash aggressively discounting online offerings to match PW
    - High
    - Monitor Allen Digital pricing semi-annually; assess PW's margin floor before profitability is threatened by price war
  - - Distribution scale — 50M+ app downloads and 14M+ YouTube subscribers
    - Google/YouTube algorithm changes reducing organic reach; app store fee increases
    - Medium
    - Track YouTube subscriber growth rate quarterly; diversify top-of-funnel via offline Vidyapeeth centers
  - - Vernacular content advantage — 8+ language support vs competitors' 2–5
    - Competitors expanding language coverage with AI dubbing and translation tools
    - Medium
    - Evaluate AI content localization capability of Allen Digital and Unacademy; assess time-to-parity
  - - Content quality (DPP, test series accuracy)
    - Rapid content commoditization as competitors expand educator networks
    - Medium
    - Commission independent comparison of PW vs Allen DPP/test-series accuracy and question quality
  - - Reliance / Embibe bundling with Jio subscriptions at zero cost
    - Embibe-Jio bundle offered free to 500M+ Jio users undercuts PW's ₹1,999/yr floor
    - High
    - Monitor Reliance Jio product announcements quarterly; assess PW's response if Embibe goes free
  notes: "Moat severity ratings are qualitative based on competitive analysis, analyst reports, and BYJU's precedent. All ratings reflect May 2026 risk horizon."
