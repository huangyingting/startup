sections:
  - id: SR-S1
    title: Risk Landscape Overview and Severity Rankings
    body: >
      Physics Wallah (PW) faces a multi-layered risk profile spanning regulatory compliance, operational execution,
      partner dependencies, financial sustainability, and people concentration. As of May 2026, the severity-ranked risk
      landscape places key-person concentration in founder-CEO Alakh Pandey and compliance obligations under India's
      Digital Personal Data Protection Act 2023 at the apex, followed closely by structural dependency on YouTube as the
      primary student acquisition funnel and the reputational overhang from the NEET 2024 examination controversy.
      Financial risks have moderated materially post-IPO: with approximately ₹4,000 crore in cash and EBITDA losses
      narrowing from ₹1,131 crore in FY2024 to approximately ₹243 crore in FY2025, runway extends beyond FY2028 under
      current burn. Path to profitability by FY2027 depends on mix-shift toward higher-margin digital courses and slower
      offline Vidyapeeth center expansion. From an investment perspective, regulatory and people risks are the hardest
      to price: DPDP Act implementation rules remain partially unnotified as of 2026, creating compliance uncertainty,
      while Alakh Pandey's brand equity is not legally separable from the corporate entity. Operational and financial
      risks are more bounded given IPO-raised capital and active cost discipline. The BYJU's collapse has permanently
      re-rated India edtech multiples; PW must continuously demonstrate its fundamentals differ. The risk heatmap
      (FR001) visualizes severity across five categories; the transmission map (FR002) shows how individual risk events
      cascade into revenue, margin, and market-capitalization impact.
    claimRefs:
      - CR001
      - CR005
      - CR013
      - CR018
      - CR019
      - CR032
      - CR034
      - CR035
    tableRefs:
      - TR005
    figureRefs:
      - FR001
  - id: SR-S2
    title: Regulatory and Legal Risks
    body: >
      Physics Wallah's most material regulatory risk is the Digital Personal Data Protection Act 2023, signed into law
      in August 2023, with implementation rules expected to be notified in 2024-2026. PW collects personal data from
      millions of minor students (under 18) enrolled in JEE, NEET, and foundation courses, making it squarely subject to
      DPDP's parental-consent requirements. Non-compliance penalties can reach ₹250 crore per incident — a meaningful
      exposure relative to PW's FY2025 EBITDA loss trajectory. Data localization requirements, if enacted strictly,
      could increase cloud infrastructure costs materially. The Ministry of Education's November 2022 edtech advisory
      imposed no-dark-pattern and refund-policy obligations; consumer protection complaints against edtech companies
      rose sharply in 2024-2025. The NEET 2024 paper leak controversy triggered Supreme Court intervention and ongoing
      NTA restructuring, creating uncertainty about JEE/NEET exam format stability — PW's entire core TAM consists of
      NTA exam aspirants, so any exam disruption or format change (regional language mandates, CBT-only transition)
      compresses addressable market immediately. Consumer litigation exposure is rising as students who fail exams after
      paying for courses increasingly file NCDRC complaints; BYJU's faced over ₹2,000 crore in aggregate consumer claims
      before insolvency, establishing a precedent for the sector. Post-IPO SEBI listing obligations (continuous
      disclosure, related-party transaction norms) add compliance overhead. Content piracy via Telegram reduces
      paid-to-free conversion and constitutes an ongoing IP risk that PW has not publicly disclosed a definitive
      enforcement strategy to address.
