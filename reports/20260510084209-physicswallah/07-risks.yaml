        - >-
          Demonstrate differentiated unit economics vs BYJU's; accelerate path to EBITDA breakeven; increase
          transparency on cohort metrics
        - PW stock price vs BSE Sensex; edtech sector P/S multiple compression; SEBI short-sale interest
        - >-
          PW market capitalization declines >40% from IPO price within 12 months without corresponding revenue
