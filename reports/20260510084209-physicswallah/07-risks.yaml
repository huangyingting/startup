chapter:
  number: 7
  title: Risks
  summary: >
    Physics Wallah's risk profile in May 2026 is anchored by three apex exposures: key-person concentration in
    founder-CEO Alakh Pandey whose personal YouTube brand drives a majority of top-of-funnel acquisition; a nascent
    regulatory environment under India's Digital Personal Data Protection (DPDP) Act 2023 that imposes parental-consent
    and data-localization obligations on PW's millions of minor student accounts; and structural dependency on NTA exam
    cycles (JEE/NEET) where policy disruption translates directly to TAM compression. Post-IPO cash of ₹4,000+ crore and
    narrowing losses (FY25 EBITDA approx. –₹243 crore vs FY24 –₹1,131 crore) provide meaningful financial buffer, but
    BYJU's contagion sentiment continues to compress edtech multiples. Mitigations are credible but immature;
    thesis-break triggers centre on Alakh Pandey departure, DPDP enforcement action, or NTA exam format abolition.
