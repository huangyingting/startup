  - id: SR-S5
    title: People, Execution, and Thesis-Break Triggers
    body: >
      Physics Wallah's people risk is driven by two interlocking dynamics: management depth and educator attrition. The
      senior leadership team is relatively young and has limited experience operating at listed-company scale with
      attendant SEBI disclosure obligations, quarterly earnings calls, and institutional investor relations. The CFO and
      COO roles are critical execution nodes; any unplanned departure would create execution risk precisely when
      public-market credibility is being established. ESOP retention plans exist but have not been publicly detailed in
      SEBI filings, making it difficult to assess how long key executives are incentivized to stay. Educator attrition
      is the second major people risk: popular teachers can leave to competitors — the Unacademy model of poaching star
      educators demonstrated this pattern clearly — and revenue-sharing disputes between PW and content creators have
      not been resolved through a publicly disclosed IP ownership framework. If a star educator departs and takes their
      student community with them, PW loses both the content asset and the associated enrolled students. Thesis-break
      triggers that would materially impair the investment case include: (1) Alakh Pandey departing or ceasing active
      content creation; (2) DPDP Act enforcement action against PW resulting in ₹100 crore+ penalties or mandatory data
      processing suspension; (3) NTA exam abolition or fundamental format change eliminating the JEE/NEET preparation
      TAM; (4) BYJU's-style regulatory or accounting investigation launched by SEBI or MCA; and (5) consecutive quarters
      of decelerating revenue growth combined with widening EBITDA losses signaling the FY2027 breakeven target is
      unreachable. Monitoring indicators and kill triggers are formalized in the mitigation table (TR005).
    claimRefs:
