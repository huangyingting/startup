  - id: SR-S3
    title: Operational and Technology Risks
    body: >
      Physics Wallah's single greatest operational risk is key-person concentration in Alakh Pandey. His personal
      YouTube channel — with over 150 million subscribers as of 2025 — is the company's primary brand asset and organic
      acquisition engine. Critically, the channel is registered under Alakh's personal identity, not the corporate
      entity; if he exits, PW loses both the content repository and the distribution funnel simultaneously. No formal
      succession plan or contractual mechanism transferring the channel to PW has been publicly disclosed. Beyond
      key-person risk, content quality drift is a significant operational challenge as PW scales beyond 500 educators:
      student forum complaints document a material quality gap between Alakh-produced content and that of non-star
      educators, which drives lower course completion rates and potentially higher churn. Technology reliability is a
      medium-severity risk — app crashes during peak exam-result seasons are documented in user reviews and social
      media, and CDN failures during JEE/NEET date announcements have been reported. PW has not published any SLA or
      uptime guarantee, making it difficult to hold the platform accountable for availability. The NEET 2024 paper-leak
      controversy caused reputational association risk: PW's brand is tightly linked to NEET aspirants, and any
      perception that NTA systemic failures affected PW students' outcomes could generate negative media cycles. The
      320+ Vidyapeeth centers create operational complexity around lease management, staff quality, and local regulatory
      compliance that is difficult to monitor centrally at pace with the expansion.
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
      - CR017
      - CR021
      - CR022
      - CR023
    tableRefs:
      - TR002
  - id: SR-S4
    title: Partner, Dependency, and Financial Risks
    body: >
      PW's partner and dependency risk is concentrated in three areas: cloud infrastructure, content distribution, and
      payment processing. On infrastructure, PW primarily hosts on Amazon Web Services (AWS); no public disclosure of
      multi-cloud redundancy exists, meaning any AWS regional outage becomes a platform outage during critical
      exam-preparation windows. On distribution, YouTube is the primary top-of-funnel channel; Google algorithm changes,
      policy enforcement actions, or demonetization events could reduce PW's free-content visibility and therefore paid
      conversion rates without advance notice. The YouTube channel's 150M+ subscriber base represents an
      off-balance-sheet brand asset that is structurally at risk if Google changes content monetization policies for
      educational channels. Payment gateway dependency on Razorpay and Paytm is lower severity given the availability of
      alternatives, but outages during enrollment peaks would hurt revenue capture. On the financial side, PW's
      real-estate commitment for 320+ Vidyapeeth centers creates long-term fixed-cost obligations that are difficult to
      wind down quickly if demand shifts back to digital-only. The ₹4,000+ crore post-IPO cash balance provides strong
      liquidity, but the path from FY2025 EBITDA loss of approximately ₹243 crore to breakeven by FY2027 assumes
      continued revenue growth at 30-40% annually and margin improvement from operating leverage in the digital segment.
      The BYJU's collapse has created an industry-wide contagion effect: investors now apply extreme scrutiny to edtech
      cash burn metrics, and any quarterly revenue shortfall could trigger disproportionate market multiple compression.
      Revenue seasonality — concentrated in August-to-March exam preparation cycles — creates Q1 (April-June) working
      capital pressure, particularly as offline center lease obligations are year-round.
