company:
  name: Physics Wallah
chapter:
  number: 1
  title: Company Overview
  summary: >
    PhysicsWallah Limited (NSE: PWL, BSE: 544609) is India's leading affordable edtech company, founded as a YouTube
    channel in 2016 by Alakh Pandey and incorporated in 2020 with co-founder Prateek Boob. It went public in November
    2025, raising ₹3,480 crore in an IPO that listed at a 33% premium. The company operates a hybrid online-offline
    model across 200+ centres in 100+ cities, reporting FY25 revenue of ₹2,886.6 crore (+49% YoY) with losses narrowed
    sharply to ₹243 crore.
sections:
  - id: company-identity
    title: Company Identity and Founding Story
    body: >
      PhysicsWallah Limited (PW) is an Indian educational technology company headquartered at A-13/5, Sector 62, Noida,
      Uttar Pradesh, India, operating the platform at www.pw.live. The company's origins trace to 2016, when Alakh
      Pandey — a mechanical engineering student who dropped out in his third year at Harcourt Butler Technical
      University (HBTU), Kanpur — launched a YouTube channel called "Physics Wallah-Alakh Pandey" to offer free physics
      lessons for JEE and NEET aspirants. The channel grew rapidly, reaching over 2 million subscribers by 2019. In
      2020, Pandey partnered with Prateek Boob, an IIT (BHU) Varanasi mechanical engineering graduate who had been
      running an e-learning app called PenPencil, to co-found PhysicsWallah as a registered company. The founding ethos
      was explicit: make quality exam preparation affordable and accessible to students across India, including those
      from rural and under-resourced backgrounds.

      From the outset, PW disrupted the established coaching market — dominated by Kota-based institutes charging
      ₹75,000 or more — by offering courses at around ₹5,000. By FY22 (April 2021–March 2022), PW's revenue had surged
      9.5× and profits reached ₹98 crore. The company became India's 101st unicorn in June 2022 upon completing its
      first institutional funding round. In November 2025, PW made its capital markets debut as one of the
      most-anticipated edtech IPOs in Indian stock market history, listing on the BSE and NSE at a 33% premium to its
      price band. As of the run date (May 2026), PW trades on the NSE under ticker symbol PWL (BSE code: 544609) and is
      classified as a public company. PW's mission continues to be democratizing education, with particular focus on
      test preparation for competitive examinations including JEE, NEET, UPSC, CUET, state board exams, and professional
      upskilling.
