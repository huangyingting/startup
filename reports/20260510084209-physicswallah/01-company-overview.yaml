  - id: founders-leadership-governance
    title: Founders, Leadership, and Governance
    body: >
      PhysicsWallah's leadership is centered on its two co-founders who together retain majority control of the company
      post-IPO. Alakh Pandey (born October 2, 1991, in Prayagraj, UP) serves as CEO and Whole-time Director. Despite
      lacking a formal engineering degree — having dropped out of HBTU Kanpur in his third year — Pandey built an
      educational brand recognized across India through his distinctive, accessible teaching style. He has over 14
      million YouTube subscribers on his primary channel and is widely regarded as the public face and brand anchor of
      PW. Pandey holds 40.31% (105.12 crore shares) of the company as of the IPO.

      Prateek Boob, co-founder and Whole-time Director (Strategy and Innovation), joined PhysicsWallah on July 1, 2020.
      He graduated with a mechanical engineering degree from IIT (BHU) Varanasi and previously worked at Caterpillar
      India Pvt Ltd. He also built PenPencil, an e-learning application, prior to co-founding PW. Boob holds an
      identical 40.31% stake (105.12 crore shares).

      Post-IPO governance was significantly strengthened. In late 2024, PW appointed Amit Sachdeva — former CFO of
      Blinkit (Grofers) — as its Chief Financial Officer. In early 2025, ahead of the IPO filing, PW appointed three
      independent directors: (1) Nitin Savara, former Deputy CFO of Zomato; (2) Rachna Dikshit, former RBI Regional
      Director; and (3) Deepak Amitabh, an ex-senior bureaucrat and ex-chairman of PTC India, currently engaged with the
      Adani Group. WestBridge Capital's Managing Director Sandeep Singhal holds a board seat representing the
      institutional investor community. Ajinkya Jain serves as Group General Counsel, Company Secretary, and Compliance
      Officer, appointed January 2025. The board structure meets SEBI regulations for listed companies regarding
      independent director ratios.

      Key-person risk remains a material concern: Alakh Pandey's personal brand is deeply entwined with PW's student
      trust and content quality. IPO analysts flagged dependence on founder face value as a top risk.
