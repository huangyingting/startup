  - id: funding-valuation
    title: Funding History, Valuation, and Investor Base
    body: >
      PhysicsWallah has gone through three primary institutional funding rounds and a public market listing spanning
      2022 to 2025. The company bootstrapped profitably to its first institutional round, which is rare among edtech
      peers.

      Series A (June 2022): PW raised $100–101 million (approximately ₹777 crore) at a post-money valuation of $1.1
      billion, making it India's 101st unicorn — and notably the first edtech company to achieve unicorn status in a
      Series A round. Investors were WestBridge Capital and GSV Ventures. The company had 1,900 employees at that time,
      including 500 teachers, and was generating approximately $65 million annualized run-rate revenue.

      Series B (September 2024): PW raised $210 million at a post-money valuation of $2.8 billion — a 2.5× increase from
      Series A — in a challenging global edtech investment environment. Hornbill Capital (an Asia-focused hedge fund)
      led the round, with participation from Lightspeed Venture Partners, and existing investors WestBridge Capital and
      GSV Ventures. Funds were earmarked for offline center expansion, K-12 market entry, AI-powered learning tools,
      content production at scale, and potential M&A.

      Pre-IPO secondary round (February 2025): A secondary transaction (~$25 million) led by WestBridge pushed PW's
      implied valuation to approximately $3.7 billion ahead of the IPO filing.

      Pre-IPO growth round (November 2025): Alongside the IPO, PW raised approximately $176 million from 360 ONE Asset
      (formerly IIFL Wealth) and at least 9 other investors, bringing total pre-IPO funding raised to approximately $486
      million.

      IPO (November 2025): PW's IPO opened November 11–13, 2025, at a price band of ₹103–109 per share. Total issue size
      was ₹3,480 crore, comprising a ₹3,100 crore fresh issue (28.44 crore shares) and a ₹380 crore offer-for-sale from
      promoters. The issue was subscribed approximately 1.8× overall, with QIBs 2.7×. PW raised ₹1,562.8 crore from 57
      anchor investors including Goldman Sachs, Fidelity, Franklin Templeton, ICICI Prudential MF, Kotak Mahindra AMC,
      and 360 ONE. The company listed on November 18, 2025 at ₹145/share on BSE/NSE, a 33% premium to the upper issue
      price.

      Post-IPO ownership: founders each hold 40.31%; WestBridge AIF holds 6.4% (16.8 crore shares); Hornbill Capital
      Partners 4.41% (11.52 crore shares); Lightspeed Opportunity Fund ~1.8% (4.66 crore shares); Setu AIF Trust ~1.4%
      (3.64 crore shares).
