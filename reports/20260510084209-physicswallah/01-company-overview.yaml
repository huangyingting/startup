callouts:
  - calloutType: strength
    title: Bootstrapped-to-Profitable Foundation
    body: >-
      Unlike most Indian edtech unicorns that required institutional capital from day one, PW built a profitable
      business bootstrapping from FY20 to FY22 before its first institutional round. This demonstrates true
      product-market fit before scaling.
    claimRefs:
      - CO003
      - CO012
  - calloutType: risk
    title: Key-Person Dependency on Alakh Pandey
    body: >-
      Alakh Pandey is both the primary educator and the brand identity for PhysicsWallah. IPO analysts, including InCred
      Equities, specifically flagged dependence on the promoter's 'face value' as a material risk. Any disruption to his
      participation — reputational, health, or otherwise — could materially impair student trust and enrollment.
    claimRefs:
      - CO005
      - CO009
  - calloutType: insight
    title: IPO a Significant Governance Milestone
    body: >-
      The November 2025 IPO transformed PW from a VC-backed startup to a listed public company with SEBI-mandated
      disclosure obligations. Three independent directors, a new CFO, and a group general counsel were all appointed in
      2025, signaling serious preparation. The 33% listing-day premium reflects strong market confidence.
    claimRefs:
      - CO015
      - CO016
      - CO034
