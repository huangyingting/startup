companyProfile:
  summary: >
    Physics Wallah was founded in 2016 in Allahabad, India, by Alakh Pandey (a physics teacher
    turned YouTube educator) and Prateek Maheshwari. Beginning as free YouTube lectures, PW
    launched a subscription app in 2020 and rapidly became the dominant price-disruptive force in
    India's test-preparation sector — offering JEE and NEET preparation courses at ₹2,000–₹8,000
    per year versus the ₹15,000–₹80,000 charged by offline incumbents like Allen and Aakash. PW
    raised $100 million at a $1.1 billion valuation in June 2021 (WestBridge Capital and GSV
    Ventures), making it one of India's fastest unicorns. It expanded into offline coaching
    (Vidyapeeth centers), upskilling (PW Skills), and government exam prep. In November 2025, PW
    listed on BSE and NSE in a ₹3,480 crore IPO.
  foundedDate: "2016-01-01"
  founders:
    - name: Alakh Pandey
      role: Co-founder & CEO
      background: >
        Physics teacher and YouTube educator; built 150M+ subscriber YouTube channel before
        co-founding PW. Primary academic brand of the company.
      claimRefs: [CO001]
    - name: Prateek Maheshwari
      role: Co-founder & COO
      background: >
        Business and operations lead; managed PW's commercial scale-up from 2020 onwards.
      claimRefs: [CO002]
  foundingLocation: Allahabad (Prayagraj), Uttar Pradesh, India
  headquarters: Noida, Uttar Pradesh, India
  productSummary: >
    PW sells digital test-preparation courses (JEE, NEET, UPSC, Class 6-12 boards) via its
    iOS/Android app and website; runs 320+ offline Vidyapeeth blended-learning coaching centers;
    offers PW Skills upskilling courses in data science, coding, and marketing; and sells
    supplementary test series and printed study material.
  customerFocus: >
    Primary: JEE and NEET aspirants (Class 11-12 students, ages 16-19), predominantly from Tier-2
    and Tier-3 cities in India's Hindi-speaking states. Secondary: UPSC aspirants and K-12
    students. Emerging: working professionals via PW Skills.
  businessModel: >
    Annual digital course subscriptions (₹2,000–₹12,000/year), one-off test series purchases,
    offline coaching fees at Vidyapeeth centers, and PW Skills course enrollments.
  stage: Public (listed BSE+NSE, November 2025)
  fundingStatus: >
    Pre-IPO: ~$210M raised across Series A ($100M, Jun 2021) and subsequent rounds. IPO proceeds:
    ₹3,480 crore (November 2025). Post-IPO cash: ~₹4,200 crore.
  disclosureProfile: public
  claimRefs: [CO001, CO002, CO012, CO013, CI001]

summary:
  headline: >
    Physics Wallah is India's most affordable and fastest-growing digital test-prep platform, with
    dominant market position and strong brand, but remains loss-making with key-person and
    exam-policy risks that warrant a watch-and-accumulate stance post-IPO.
  overallScore: 6.5
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 3700
    revenueRunRateUsdM: 233
    arrUsdM: null
    revenueGrowthYoYPct: 86
    grossMarginPct: 67
    nrrPct: null
    totalRaisedUsdM: 630
    customerCount: 6500000
    headcount: 4500
  topStrengths:
    - "Price disruption moat: PW's ₹2,000–₹8,000/year pricing is 5–30× cheaper than Allen/Aakash offline alternatives, driving mass-market adoption among Tier-2/3 India."
    - "Alakh Pandey's irreplaceable teaching brand: 150M+ YouTube subscribers and 6.5M paid users built around a single educator's authentic style creates near-unassailable loyalty among JEE/NEET aspirants."
    - "Scale and data flywheel: 50M+ app downloads and 6.5M paid subscribers generate India's largest proprietary test-prep dataset, enabling AI-personalization at competitive scale."
    - "Massive addressable market: India's ~36M annual JEE+NEET aspirant pool underpins a $3–12B digital edtech TAM with 15–20% CAGR."
    - "Post-IPO capital strength: ₹3,480 crore IPO proceeds give PW 3+ years of operational runway and acquisitive flexibility while BYJU's and Vedantu are distressed."
  topRisks:
    - "Key-person concentration: Alakh Pandey's face IS the brand; his YouTube channel is personally owned, not PW corporate. An exit or health event would be existential."
    - "Sustained operating losses: FY24 EBITDA of -₹1,131 crore on ₹1,940 crore revenue; FY27 profitability guidance is management-only and may slip."
    - "NTA/exam policy risk: Any restructuring of JEE/NEET formats — already under Supreme Court and government review post-2024 paper-leak controversy — directly threatens PW's core TAM."
    - "BYJU's sector contagion: Ongoing BYJU's bankruptcy proceedings keep India edtech sentiment depressed; a BYJU's creditor flare-up could reprice all sector multiples downward."
    - "DPDP Act compliance: India's Digital Personal Data Protection Act 2023 mandates parental consent for minors' data — PW's millions of under-18 users are directly in scope, with up to ₹250 crore in penalties for non-compliance."
  unresolvedGaps:
    - "No audited NRR or cohort retention data disclosed; renewal rate of 65-70% is company-stated and unverified."
    - "PW Skills unit economics not disclosed; upskilling TAM and PW's competitive position in this market remain unclear."
    - "Exact teacher/educator revenue-sharing terms and IP ownership framework not publicly detailed."
    - "AI personalization roadmap lacks concrete timeline and competitive benchmarking vs. global peers."
    - "FY2025 full-year financials pending; analyst consensus forecasts diverge by ±20%."

