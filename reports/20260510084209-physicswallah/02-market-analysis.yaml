- id: SM-S3
  title: Buyer Segments and Decision Dynamics
  body: 'PhysicsWallah''s market comprises four principal buyer segments with distinct motivations, willingness-to-pay, and

    channel preferences.


    JEE/NEET aspirants (ages 15–20, Classes 11–12 and drop-year repeaters): This is PW''s primary and highest-revenue

    segment. NEET 2024 saw 24.06 lakh registered candidates (a historic peak) and NEET 2025 saw 22.76 lakh. JEE Main

    2024 registered 12.21 lakh across sessions. The total active JEE+NEET preparation pool, accounting for multiple

    years of coaching, is estimated at 5–8 million learners at any point in time. Average willingness-to-pay for

    structured coaching ranges from ₹2,000–5,000 per year online (PW''s entry price) to ₹60,000–200,000 at premium

    offline institutes (Allen, Aakash). PW''s price-to-quality ratio is its sharpest competitive differentiator.


    K-12 supplemental learners (ages 8–18, Class 1–10): India''s 250 million school students represent a large long-term

    TAM. However, this segment is less monetized per student online; parents are price-sensitive and outcome timelines are

    longer. K-12 is approximately 43–44% of total edtech market value in 2025. PW''s Vidyapeeth offline centers serve this

    segment alongside foundation JEE/NEET batches.


    Upskilling professionals (ages 22–35, working or recently graduated): PW Skills / iNeuron targets this segment, with

    courses in data science, AI, coding, and cloud computing. This segment has higher willingness-to-pay (₹15,000–100,000

    per course) and is concentrated in metro and Tier 1 cities. The India upskilling market grew from ₹13,200 crore in

    FY23 to a projected ₹41,500 crore by FY28 (25.7% CAGR), driven by employer demand for technical talent.


    Government/institutional buyers (B2G and B2B): An emerging segment where edtech platforms bid for government

    contracts (state education departments, central skill mission programs). PW''s MoU with Andhra Pradesh for a

    University of Innovation hints at this strategy. This segment offers large deal sizes but long sales cycles and

    political risk.

    '
