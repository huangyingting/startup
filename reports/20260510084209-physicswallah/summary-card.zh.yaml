  topStrengths:
    - 价格颠覆形成护城河：PW 每年 ₹2,000–₹8,000 的定价比 Allen/Aakash 线下方案便宜 5–30×， 推动印度二三线城市大众市场采用。
    - Alakh Pandey 的教学品牌难以替代：围绕单一教师真实风格沉淀的 150M+ YouTube 订阅者和 6.5M 付费用户， 让 JEE/NEET 考生形成近乎不可撼动的忠诚度。
    - 规模与数据飞轮：50M+ App 下载量和 6.5M 付费订阅用户，拼出印度最大的自有备考数据集， 让 AI 个性化具备竞争性规模。
    - 可触达市场庞大：印度每年约 36M JEE+NEET 考生支撑 $3–12B 数字教育科技 TAM，CAGR 为 15–20%。
    - IPO 后资本更充足：₹3,480 crore 募资给 PW 提供 3+ 年运营现金跑道和并购弹性，而 BYJU's 与 Vedantu 正陷入困境。
  topRisks:
    - 关键人物高度集中：Alakh Pandey 本人就是品牌；他的 YouTube 频道归个人所有，不属于 PW 公司。 若他退出或出现健康事件，公司可能面临生存风险。
    - 经营亏损持续：FY24 收入 ₹1,940 crore，EBITDA 为 -₹1,131 crore；FY27 盈利指引仅来自管理层，可能延后。
    - NTA/考试政策风险：2024 年试题泄露争议后，JEE/NEET 形式已进入最高法院和政府审查； 任何重构都会直接威胁 PW 的核心 TAM。
    - BYJU's 行业传染：BYJU's 破产程序仍在推进，压低印度教育科技情绪； 一旦 BYJU's 债权人冲突升级，整个板块倍数可能被下修。
    - DPDP Act 合规：印度 2023 年《数字个人数据保护法》要求处理未成年人数据需取得父母同意； PW 数百万 18 岁以下用户直接落入监管范围，违规罚款最高可达 ₹250 crore。
  unresolvedGaps:
    - 未披露经审计的 NRR 或队列留存数据；65-70% 续费率为公司口径，尚未验证。
    - PW Skills 单位经济模型未披露；职业技能提升 TAM 以及 PW 在该市场的竞争位置仍不清晰。
    - 教师/教育者收入分成条款和 IP 归属框架没有公开细节。
    - AI 个性化路线图缺少具体时间表，也缺少与全球同业的竞争基准。
    - FY2025 全年财务数据尚未发布；分析师一致预期分歧达 ±20%。
