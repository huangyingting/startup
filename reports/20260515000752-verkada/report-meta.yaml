companyProfile:
  summary: "Verkada, founded in 2016 by Filip Kaliszan, James Ren, Benjamin Bercovitz, and Hans Robertson (ex-Meraki COO), is a San Mateo-based cloud-managed physical security company. The company has raised over $800 million across six funding rounds, reaching a $5.8 billion valuation in December 2025 via a CapitalG-led round. Verkada serves approximately 30,000 customers including 91 Fortune 500 companies, with over 2 million devices deployed globally. Estimated 2025 revenue is approximately $806 million."
  foundedDate: "2016-01-01"
