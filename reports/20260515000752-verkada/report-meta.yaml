  foundingLocation: "Menlo Park, CA"
  headquarters: "San Mateo, CA"
  productSummary: "Cloud-managed physical security platform integrating AI-powered cameras, access control readers, alarms, environmental sensors (air quality, temperature, humidity), intercoms, visitor management, and workplace analytics — all managed through a single browser-based Command dashboard with hybrid-cloud architecture (on-device AI processing + cloud storage)."
  customerFocus: "Enterprise and mid-market organizations across verticals including education, healthcare, retail, hospitality, manufacturing, and government. ~30,000 customers including 91 Fortune 500 companies."
  businessModel: "Hardware purchase (cameras, readers, sensors) plus annual per-device cloud software subscription. Land-and-expand model where customers start with cameras and add access control, alarms, and sensors. Direct sales plus channel partner distribution."
  stage: "Late-Stage Private (Series E+)"
  fundingStatus: "Over $800M raised across six rounds. Latest: $100M in December 2025 led by CapitalG (Alphabet) at $5.8B valuation. Series E ($200M, Feb 2025, General Catalyst). Series D ($305M, Oct 2023, Alkeon/Lightspeed). Investors include Sequoia, Felicis, Eclipse, Meritech, MSD Partners, First Round, Next47."
  disclosureProfile: private-undisclosed
