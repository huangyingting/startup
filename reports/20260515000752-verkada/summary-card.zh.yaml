    - 职场骚扰丑闻（2019–2020 年摄像头滥用、2021 年兄弟会文化报道）指向治理缺口
    - $5.8B 估值约为估计收入的 7.2x，定价偏溢价，下行保护有限
  unresolvedGaps:
