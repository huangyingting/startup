  topStrengths:
    - Sequoia、General Catalyst、CapitalG 等顶级投资人站台，验证云端实体安防平台逻辑
    - 30,000 家客户、2M+ 台设备，$100K+ 大客户同比增长 43%，产品市场匹配强
