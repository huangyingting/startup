  - id: deployment-integration-and-roadmap
    title: Deployment, Integration, and Roadmap
    body: >-
      Verkada's plug-and-play deployment model is a competitive advantage in the enterprise physical security
      market. Cameras and sensors are pre-provisioned to the customer's Verkada account before shipment and
      connect to the Command cloud via a standard PoE+ switch with no local server configuration. Site setup
      typically takes under one hour for small deployments. Multi-site enterprise rollouts are managed from
      a single Command dashboard and can be staged remotely by a central IT team.

      The integration ecosystem spans identity providers (Okta, Azure Active Directory), SIEM and SOAR
      platforms for security operations, physical access systems (Brivo, Lenel), and HR platforms for
      automated user provisioning and de-provisioning. Verkada publishes a REST API and webhook framework
      at developer.verkada.com, allowing customers and partners to build custom integrations. In January
      2026, Carahsoft Technology began distributing Verkada to federal, state, and local government
      customers through its reseller network, expanding the go-to-market into the SLED segment.

      Published roadmap directions as of early 2026 include: expanded AI-native search capabilities
      extending to environmental sensor and access log correlation; deeper Workplace analytics for
      enterprise space planning; additional access control form factors (including open-standard OSDP
      reader support); and expanded environmental sensor coverage for industrial and laboratory
      environments. The FTC/DOJ consent decree mandates specific security infrastructure upgrades
      through at least 2027, including enhanced audit logging and third-party assessment cadence. The
      exact OTA update schedule, feature release calendar, and platform deprecation timelines are not
      publicly disclosed, representing a diligence gap for integration partners planning multi-year
      roadmap alignment.
