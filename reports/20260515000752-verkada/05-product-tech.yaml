      - CE007
      - CE008
      - CE010
      - CE011
  - id: FE003
    title: Critical Dependency Map
    type: dag
    layout: wide
    summary: >-
      Dependency graph for Verkada's product delivery: hardware supply chain, cloud infrastructure, channel
      distribution, compliance obligations, and integration ecosystem. Key concentration risks are the
      undisclosed SoC supplier and AWS single-cloud dependency.
    data:
      nodes:
