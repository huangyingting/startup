  - id: FE004
    title: Product Maturity / Capability Map
    type: matrix
    layout: wide
    summary: >-
      Maturity and capability assessment across Verkada's seven product lines on five dimensions:
      GA status, AI depth, integration breadth, enterprise readiness, and compliance coverage.
      Video security and access control are the strongest lines; newer modules (intercoms, workplace)
      have shallower capability stacks.
    data:
      columns:
        - GA / Maturity
        - AI Depth
        - Integration Breadth
        - Enterprise Readiness
        - Compliance Coverage
      rows:
        - label: Video Security
          values:
            - GA — full lineup (2016–2025)
            - High — on-device NPU, facial/LPR/attribute search, behavioral analytics
            - High — REST API, SIEM, BMS, IdP
            - High — RBAC, MFA, multi-site, audit log
            - SOC 2 Type II in scope; FTC/DOJ ISP applies
        - label: Access Control
          values:
            - GA — launched 2020; #1 cloud-native AC (Omdia 2024)
            - Medium — AI-assisted entry logs; anomaly flagging
            - High — HR, IdP, physical access platforms
            - High — automated provisioning, door-event-to-clip
            - SOC 2 Type II in scope
        - label: Alarms
          values:
            - GA — launched 2022–2023; narrower install base
            - Low — rule-based threshold alerts only
            - Medium — Command integrated; limited third-party
            - Medium — basic; no standalone monitoring center integration
            - SOC 2 in scope; alarm-specific UL certification not disclosed
        - label: Environmental Sensors
          values:
            - GA — SV-series; multi-parameter monitoring
            - Medium — threshold alerting; anomaly-video correlation (2026)
            - Medium — webhook, Command API
            - Medium — facilities/EHS use cases; limited enterprise workflow integration
            - SOC 2 in scope; regulatory compliance accuracy not certified
        - label: Intercoms
          values:
            - GA — single model; limited SKU breadth
            - Low — motion trigger and two-way audio only
            - Low — Command platform only; no third-party intercom ecosystem
            - Medium — basic visitor flow; lacks advanced call routing
            - SOC 2 in scope
        - label: Guest / Visitor Mgmt
          values:
            - GA — web-based portal integrated with cameras and AC
            - Low — identity match and watchlist; no biometric beyond opt-in
            - Medium — badge printing, IdP, camera/AC tie-in
            - Medium — works for enterprise lobbies; large-venue scalability untested
            - SOC 2 in scope; GDPR visitor data retention unclear
        - label: Workplace Analytics
          values:
            - GA — analytics layer on existing cameras; no new hardware
            - Medium — anonymized heatmaps, headcount, occupancy trends
            - Low — reporting API; limited integration with space planning tools
            - Medium — CRE and facilities use cases; limited HR system integration
            - SOC 2 in scope; anonymization methodology not independently verified
    approximationNotes: >-
      Maturity ratings are inferred from official product pages, industry reviews, and IPVM analysis.
      AI depth, integration breadth, and enterprise readiness ratings are qualitative assessments
      by this report's authors; they are not Verkada's own classifications.
