chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Verkada delivers a seven-module cloud-managed physical security platform — cameras, access control, alarms,
    environmental sensors, intercoms, visitor management, and workplace analytics — unified under a single
    browser-based Command dashboard. Its hybrid cloud architecture processes AI at the edge (on-device SoC with
    NPU and local SSD storage of 30–365 days) while management, search, and analytics reside in the cloud. The
    2021 breach led to mandatory MFA, a bug bounty program, and the 2024 FTC/DOJ consent decree requiring a
    permanent information security program. The platform is SOC 2 Type II certified and exposes REST APIs for
    third-party integration. Core differentiation is the elimination of NVR/DVR hardware through hybrid-cloud
    design plus on-device AI for low-latency analytics without round-trip cloud dependency.
sections:
  - id: product-platform-and-modules
    title: Product Platform and Modules
    body: >-
      Verkada's cloud-managed physical security platform integrates hardware endpoints across seven distinct
      product lines under a single management layer called Command. The platform is built on a hardware-first,
      software-defined philosophy: devices handle intelligent edge processing while the cloud handles management,
      storage, analytics, and orchestration. This structure allows Verkada to sell hardware as a one-time
      purchase and cloud software as a recurring per-device annual subscription, creating a hybrid-monetization
      model with growing SaaS attach.

      The seven product lines are: (1) Security Cameras — available as indoor dome (Mini, D series), outdoor
      dome (CD, CX series), bullet, fisheye, multisensor, and license plate recognition variants supporting
      2 MP to 12 MP sensors; (2) Access Control — door readers (Reader D series), controllers (AC series), and
      credentials including mobile, card, fob, and PIN; (3) Alarms — hub, door/window sensors, motion
      detectors, glass-break sensors, and panic buttons; (4) Environmental Sensors — monitoring PM2.5, CO2,
      VOCs, temperature, humidity, ambient light, and noise levels; (5) Intercoms — video door stations with
      two-way audio and Command dashboard integration; (6) Guest (Visitor Management) — web-based visitor
      check-in tied to camera and access control for identity verification and badge printing; and
      (7) Workplace — anonymized occupancy analytics and heatmaps derived from camera data for space
      utilization reporting.

      All seven product lines are managed via the Command dashboard, a browser-based SaaS application
      requiring no on-premises server or NVR. Devices are pre-provisioned to the customer's Command account
      before shipment and connect via standard PoE+ switch, enabling site deployment in under one hour for
      most configurations. The integrated platform creates cross-product value that is difficult for point-
      solution competitors to replicate: an access event automatically generates a camera clip, an alarm
      triggers a camera view, and environmental threshold breaches can fire webhook integrations to work-order
      systems. As of late 2025, Verkada had deployed over 2 million devices globally across approximately
      30,000 enterprise customers.
