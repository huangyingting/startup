figures:
  - id: FU001
    title: Customer Journey Map
    type: journey-map
    caption: >-
      Six-stage Verkada customer journey from initial awareness through strategic multi-product
      expansion, illustrating the land-and-expand motion that drives the $100K+ account cohort.
    data:
      items:
        - label: Awareness
          value: 1
          note: >-
            Prospect learns of Verkada via direct sales outreach, security integrator recommendation,
            Carahsoft procurement listing, peer reference from existing customer, or trade press /
            G2 research. Actors: facilities director, IT security lead, CRE manager.
        - label: Evaluation and Demo
          value: 2
          note: >-
            Verkada provides plug-and-play demo kit (camera + Command dashboard access). Prospect
            evaluates against NVR/DVR incumbent or Axis/Genetec. Total-cost-of-ownership comparison
            eliminates server hardware and onsite IT costs. Actors: security architect, IT director.
        - label: Initial Purchase (Cameras)
          value: 3
          note: >-
            First purchase is typically a camera-only deployment of 10–200 cameras at 1–3 sites.
            Annual cloud subscription attached at point of sale. ASP at this stage typically under
            $100K. Actors: procurement, facilities manager, integrator project manager.
        - label: Production Deployment
          value: 4
          note: >-
            Cameras deployed and enrolled via PoE+ switch; Command dashboard configured with RBAC
            and site hierarchy. Multi-site rollout often follows within 6–12 months. Customer joins
            review platforms (G2, Gartner Peer Insights). Actors: IT admin, physical security team.
        - label: Multi-Product Expansion
          value: 5
          note: >-
            Customer adds access control (door readers, controllers), alarms, environmental sensors,
            or visitor management. Annual spend crosses $100K threshold, entering 4,700+ large
            account cohort. Integrations to HR and building management deepen switching costs.
        - label: Strategic Account and Renewal
          value: 6
