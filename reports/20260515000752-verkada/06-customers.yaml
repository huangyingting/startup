  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: nrr grr churn retention metrics
      missingEvidence: >-
        Verkada has not publicly disclosed NRR, GRR, or gross customer churn rate. The physical
        security SaaS model (annual per-device subscriptions, embedded hardware) theoretically
        supports high retention, but the actual retention profile — including the breach-cohort
        attrition of 2021 — is unavailable without data room access.
      whyItMatters: >-
        Without NRR/GRR, it is impossible to assess whether the 43% large-customer growth rate
        reflects new logo acquisition, expansion within existing accounts, or both; and whether
        the base is stable or eroding.
      diligencePath: >-
        Request NRR, GRR, and gross churn by cohort year and vertical from Verkada data room.
        Specifically request the 2021 breach cohort attrition report and renewal rate data for
        healthcare and government accounts post-FTC consent decree.
      relatedQuestionRefs:
        - QU008
        - QU027

    - type: missing-source
      severity: material
      topic: named customer proof table coverage
      missingEvidence: >-
        The Named Customer Proof Table covers approximately 10–15 publicly named accounts out of
        Verkada's ~30,000 total customers. The full customer list is confidential. Completeness
        of the named evidence set cannot be verified through public sources; key Fortune 500
        accounts in healthcare, financial services, and government are not publicly named.
      whyItMatters: >-
        If the publicly named accounts are not representative of Verkada's overall customer mix
        (e.g., if healthcare and government are underrepresented), retention and concentration risk
        assessments based on the named set would be biased.
      diligencePath: >-
        Request a full named customer list from Verkada data room. Ask for 5–10 reference customer
        calls across verticals (healthcare, government, retail, enterprise commercial), including
        at least two from the 2021 breach cohort to assess post-breach retention directly.
      relatedTableRefs:
        - TU003
      relatedQuestionRefs:
        - QU005

    - type: missing-source
      severity: moderate
      topic: contract terms and renewal structure
      missingEvidence: >-
        Verkada has not publicly disclosed enterprise contract length, auto-renewal provisions,
        cancellation clauses, or typical multi-year commitment rates. Without this data, the
        durability of the recurring revenue base cannot be assessed from public sources alone.
      whyItMatters: >-
        If most contracts are month-to-month or annual with easy cancellation, the retention
        profile is weaker than the hardware-embedded model implies; multi-year contracts with
        prepayment would indicate stronger revenue durability.
      diligencePath: >-
        Request standard MSA/order-form templates from Verkada data room. Confirm typical contract
        length, renewal cadence, escalation clauses, and termination-for-convenience provisions
        for enterprise accounts.
      relatedQuestionRefs:
        - QU027

    - type: missing-source
      severity: minor
      topic: post-breach customer attrition in regulated sectors
      missingEvidence: >-
        No public data is available on customer attrition in the 95 organizations affected by the
        2021 breach. Healthcare and government entities, which have the highest breach-sensitivity,
        have not publicly announced churn, but the absence of a public announcement does not
        confirm retention.
      whyItMatters: >-
        If healthcare or government customers churned post-breach, Verkada's penetration in these
        regulated verticals — which carry high ASP and long-term contract value — is lower than
        the broader customer count implies.
      diligencePath: >-
        Request breach-cohort customer status report from Verkada (which accounts renewed, which
        did not, which reduced deployment scope). Cross-reference with FTC consent decree compliance
        report submitted to the FTC.
      relatedQuestionRefs:
        - QU014
        - QU022
