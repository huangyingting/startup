  - id: retention-expansion-and-satisfaction
    title: Retention, Expansion, and Satisfaction
    body: >-
      Verkada does not publicly disclose net revenue retention (NRR), gross revenue retention
      (GRR), or gross customer churn rates. Contract length and renewal terms are likewise not
      publicly disclosed. This is a material diligence gap: the physical security hardware-plus-
      SaaS model theoretically supports high retention (hardware installed on premises creates
      switching cost; cloud platform subscription auto-renews), but the actual retention profile
      must be verified in the data room.

      Third-party review aggregators provide an indirect satisfaction signal. G2 rates Verkada
      at approximately 4.4 out of 5.0 based on hundreds of verified reviews, with users
      consistently citing ease of cloud management, plug-and-play hardware setup, and unified
      dashboard as top strengths. Gartner Peer Insights shows comparable ratings with enterprise
      users endorsing the platform's scalability and the value of unified camera plus access
      control. TrustRadius ratings corroborate the G2 data with similar themes — ease of
      administration, reliable hardware, and lack of NVR/DVR complexity. These review aggregator
      signals are noisy (volume skews toward satisfied customers who respond to vendor requests)
      but directionally positive.

      The 2021 breach created a known adverse-satisfaction event. Approximately 95 customer
      organizations — including hospitals, jails, Tesla, Cloudflare, and others — had footage
      accessed by an unauthorized third party. Some customers may have churned immediately post-
      breach, but Verkada has not disclosed any breach-related attrition, and named customers
      like Tesla and Equinox appear to remain active. The FTC and DOJ settlement (2023–2024)
      required Verkada to implement a permanent information security program, MFA mandates, and
      independent security assessments — remediation actions that may have partially restored
      trust in regulated sectors like healthcare and government.

      The land-and-expand motion is Verkada's strongest retention mechanism. Customers that
      start with cameras and add access control hardware create deeper integration of Verkada
      credentials into their building management infrastructure. Access control customer bases
      typically have annual renewal rates above 90% in the physical security industry because
      credential systems are deeply operationally embedded. Verkada's multi-product expansion
      pattern — cameras to access to alarms to environmental sensors — compounds this stickiness
      with each added product line.
