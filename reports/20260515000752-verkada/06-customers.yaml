  - id: concentration-and-channel-risk
    title: Concentration and Channel Risk
    body: >-
      Customer revenue concentration by individual account is not publicly disclosed. Verkada's
      pricing model (per-device annual subscription plus hardware) means that large Fortune 500
      deployments running thousands of cameras and access control points across global campuses
      could individually represent several million dollars of annual contract value. However, with
      ~30,000 total customers and 4,700+ large accounts, it is unlikely that any single customer
      represents more than a few percent of total ARR — but this cannot be confirmed without
      data room access.

      Vertical concentration risk is moderate. Verkada's publicly evidenced deployments span at
      least six major verticals (enterprise commercial, education, healthcare, retail/hospitality,
      non-profit, government), which limits single-vertical revenue dependency. The education
      segment ("thousands of schools") is a high-volume, lower-ASP cohort; enterprise commercial
      (Fortune 500) is a lower-volume, higher-ASP cohort. Retail and healthcare are mid-tier.
      This distribution is broadly consistent with a resilient multi-vertical go-to-market,
      though loss of the K-12 segment (e.g., due to competing state procurement mandates or
      budget cuts) could affect volume and brand visibility.

      Channel concentration risk is evolving. Historically, Verkada relied heavily on direct
      enterprise sales and security integrators — the traditional channel for commercial physical
      security. The integrator channel creates second-order concentration: if major integrators
      representing significant volume were to shift toward competing platforms (e.g., Axis/Milestone
      or Genetec), Verkada's mid-market pipeline could be disrupted. The January 2026 Carahsoft
      partnership adds a third channel specifically for public sector and reduces the two-channel
      dependency for that segment.

      The 2021 breach and DOJ/FTC settlement create a specific concentration risk in regulated
      industries: healthcare providers covered by HIPAA, financial institutions, and government
      agencies may have elevated procurement scrutiny or third-party risk management requirements
      that slow new-logo acquisition and renewals in those sub-segments. Verkada's response — FTC
      consent decree compliance program, mandatory MFA, and SOC 2 Type II certification — mitigates
      but does not eliminate this regulatory-scrutiny headwind in sensitive sectors.

      The Carahsoft partnership is the most significant channel development in 2025–2026. Carahsoft
      is the dominant technology aggregator for U.S. federal and SLED (state, local, education)
      procurement, with access to cooperative purchasing vehicles including GSA Schedule, NASA SEWP,
      and AEPA. This partnership substantially lowers the sales friction for public sector accounts
      that require established procurement mechanisms and may drive incremental large-account growth
      in the $100K+ cohort over 2026–2027.
