  - id: named-customer-evidence
    title: Named Customer Evidence
    body: >-
      Verkada's named-customer evidence is stronger than is typical for a late-stage private company
      in physical security: multiple Fortune 500 accounts are confirmed through case studies, press
      releases, and third-party reporting. The strongest evidence level is for customers whose
      relationship predates and survived the 2021 breach — demonstrating retention durability under
      adverse conditions.

      Equinox Fitness, confirmed as Verkada's first major enterprise customer (2017), is the
      longest-standing public reference. Equinox deployed cameras across dozens of fitness club
      locations and is featured in Verkada's official case study library. This is a multi-site,
      multi-year relationship with the highest available evidence quality — company case study
      corroborated by multiple press references.

      Tesla was a confirmed Verkada camera customer whose factory camera feeds were accessed during
      the March 2021 breach. Post-breach, Tesla is reported to have remained on Verkada (no public
      termination announcement). The breach event provides independently verifiable evidence of the
      production deployment. Cloudflare similarly had office camera access compromised in the breach.

      The LA Rams (NFL) are cited in a Verkada case study as a production customer using Verkada
      cameras and access control at their SoFi Stadium facilities. Canada Goose, the luxury
      outerwear retailer, uses Verkada cameras for retail loss prevention and has a published Verkada
      case study. The Salvation Army is a confirmed non-profit deployment referenced in Verkada
      channel materials and trade press.

      Sandy Hook Elementary School is a high-profile educational reference and symbolically
      significant for school safety marketing. Zionsville Community Schools and Durham College
      are cited in K-12 and higher-education case studies. Harry Rosen (Canadian luxury retailer)
      and Citrix (enterprise technology) complete the publicly named set.

      Evidence quality varies: case studies authored by Verkada are primary company sources (not
      independent), while breach reporting by The Verge and Bloomberg provides independent third-
      party confirmation of production deployment for Tesla and Cloudflare. The named customer
      list is partial — Verkada has ~30,000 customers but fewer than 15 are named in public
      materials.
