company:
  name: Verkada
chapter:
  number: 6
  title: Customers
  summary: >-
    Verkada's customer base of approximately 30,000 enterprises as of end-2025 spans Fortune 500
    corporations, K-12 school districts, healthcare systems, retail chains, hospitality operators,
    and public sector agencies. The company's most publicly cited traction metrics include 91 Fortune
    500 customers (February 2025), 4,700+ large accounts spending more than $100,000 annually (up
    43% year-over-year), and 2 million+ deployed devices. Named customer evidence is robust for the
    enterprise segment — Equinox (first major customer, 2017), Tesla, LA Rams, Canada Goose, and the
    Salvation Army are among publicly confirmed deployments — but retention metrics (NRR, GRR, churn)
    are not publicly disclosed. The 2021 breach affecting approximately 95 customer organizations
    (including Tesla, Cloudflare, hospitals, and jails) and the subsequent 2023–2024 FTC/DOJ
    consent decree represent material adverse customer-trust events that diligence must address.
    Expansion from initial camera deployments into multi-product accounts (access control, alarms,
    sensors) is the primary land-and-expand motion. The January 2026 Carahsoft partnership extends
    the channel into federal, state, and local government. Customer concentration by single account
    is not disclosed; vertical diversification across >6 end-market segments reduces single-vertical
    risk.
sections:
  - id: customer-base-segmentation
    title: Customer Base Segmentation
    body: >-
      Verkada's ~30,000 enterprise customers are distributed across at least six distinct vertical
      segments: enterprise commercial (Fortune 500 corporations, mid-market businesses, and corporate
      campuses), K-12 and higher education, healthcare and life sciences, retail and hospitality,
      non-profit and faith communities, and public sector (government, law enforcement, transit).
      The company does not publicly disclose the share of ARR or customer count attributable to each
      vertical, but its publicly named case studies, press coverage, and product marketing provide a
      consistent picture of where adoption is deepest.

      The enterprise commercial segment is the most prominently marketed: 91 Fortune 500 companies
      use Verkada as of February 2025, representing roughly 18% of the Fortune 500. Named anchors
      include Equinox (fitness, first major customer 2017), Tesla (manufacturing, cameras in
      factories), LA Rams (professional sports), Canada Goose (luxury retail), and Citrix (technology
      services). These accounts demonstrate penetration across multiple Fortune 500 sub-industries,
      not concentration in one.

      The education segment is a major volume driver. Verkada publicly states that "thousands of
      schools" use its platform, with named anchors including Zionsville Community Schools (K-12,
      Indiana), Sandy Hook Elementary (school safety high-profile reference), and Durham College
      (post-secondary, Canada). EdWeek and SDM Magazine coverage confirms that K-12 budget cycles
      and the post-Uvalde school security funding wave accelerated this segment.

      Healthcare, retail, and hospitality deployments are referenced in product marketing and case
      studies but individual customer names in these verticals are less frequently disclosed by
      Verkada. Non-profit deployments include the Salvation Army. The January 2026 Carahsoft
      distribution agreement formally extends Verkada's reach into federal, state, and local
      government procurement vehicles, a segment that was previously served primarily through
      direct sales.

      Customer acquisition channels are direct enterprise sales, security system integrators (the
      traditional physical security distribution channel), and as of January 2026, Carahsoft for
      public sector. The integrator channel is consistent with industry norms for physical security
      hardware-plus-software and lowers Verkada's direct sales cost for mid-market accounts.
