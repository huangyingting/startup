      - number: '6.2'
        title: 采用情况与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Verkada 披露的客户指标显示，最高价值客户队列在复合增长。大客户细分（年支出 ≥$100,000）到 2025 年底达到 4,700+ 个账户，较上一期同比增长
              43%。这是目前最精确、且公开确认的增长信号；总客户数（约 30,000）和设备部署数（2M+）虽见于引用公司披露的媒体报道，但没有细颗粒度时间序列对比。

              43% 的大客户增长率尤其重要，因为它跟踪的是扩张深度，而不只是新增 logo。每年在 Verkada 花费 $100,000+
              的客户几乎一定在多站点运行多产品部署（摄像机加门禁、报警或环境传感器中的至少一种）。该队列 43% 的同比增长快于隐含总客户增长率，表明 Verkada
              的先落地再扩张动作正在把最初只买摄像机的账户转化为更深的平台关系。

              采纳漏斗始于 Verkada 直销团队或安全集成商伙伴寻找线索，随后是概念验证（PoC）或演示部署（Verkada 的即插即用 PoE+ 设计支持快速试用）、采购决定，再进入多站点或多产品扩张。2026 年 1
              月宣布的 Carahsoft 合作渠道，把这个漏斗延伸到政府采购载体（合作采购合同）；这类项目销售周期更长，但一旦赢单，通常带来多年合同关系。

              超过 2 million 台设备分布在约 30,000 家客户中，意味着平均每个客户约 67 台设备，更符合中大型多站点企业部署，而不是单地点小企业。这个平均值掩盖了巨大离散度：Fortune 500
              账户可能在全球园区运行数百到数千台摄像机，较小客户可能在单一站点少于 20 台摄像机。

              2024 年之前的客户数同比增长率没有以一致时间序列公开披露。唯一参照点是 Verkada 在 2022 年 Series D 融资（$800M，2022 年 1 月）时约服务 15,000
              家客户，意味着客户数约三年翻倍——CAGR 约 26%。
