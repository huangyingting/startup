      - number: '7.5'
        title: 缓解措施与否决条件
        blocks:
          - type: paragraph
            body: >-
              Verkada 已在多数主要风险桶中落地有意义的缓解措施。FTC/DOJ 同意令要求结构性改进：全面信息安全计划、每两年独立安全审计，以及停止欺骗性安全营销。Verkada 信任中心发布其 SOC 2 Type
              II 合规姿态。HackerOne bug bounty 计划持续发现漏洞。2026 年 1 月 Carahsoft
              政府分销合作降低渠道集中度，并把获客多元化到联邦、州和地方政府细分市场。CapitalG（Alphabet）2025 年 12 月投资提供额外机构背书和战略入口。

              缓解措施降低风险，但没有消除风险。击穿投资逻辑的触发点清晰且可监控。违反同意令，或 FTC、DOJ 发起新的执法行动，将直接否定监管风险缓解逻辑。若 ITC 不利裁决导致硬件进口禁令，Verkada
              在美国市场销售摄像机的能力会立即受扰动，新账户的订阅附着率也会被压缩。重大数据泄露复发——尤其影响 2021 年后重新建立信任的企业或政府客户——会同时带来客户流失、监管审查和估值压缩。Filip
              Kaliszan 若在没有预备继任者的情况下离任，会在 IPO 前窗口给董事会层面的执行带来不确定性。由上述事件任意组合驱动的 NRR 持续恶化，则是投资案例已实质改变的滞后信号。

              私下尽调必须拿到同意令合规计划、独立审计时间表、芯片供应协议、云基础设施合同和领导层继任框架，之后才应按当前估值水平承保任何投资。
