      - number: '5.3'
        title: AI 与分析能力
        blocks:
          - type: paragraph
            body: >-
              Verkada 的设备端 AI 引擎支撑一组分析能力，使其区别于基础云视频监控。关键 AI 功能包括：Person of
              Interest（POI）搜索，使用需客户选择启用的人脸识别，并由客户侧管理同意流程；People Analytics，提供实时和历史人数、拥挤检测、占用阈值告警和热力图可视化；Vehicle and
              License Plate Recognition（LPR），用于停车、门控和周界安防；AI
              驱动的基于属性的目标搜索，操作员描述物理特征即可在全部摄像机中调取匹配片段；行为分析，包括徘徊检测、越线告警和门禁点尾随检测；以及与 SV-series 传感器套件的视频事件关联的环境异常告警。

              所有 AI 推理都在设备端运行，而不是放到云端，从而降低往返延迟、节省带宽并限制云出站成本。同步到云端的片段和分类元数据，让单次查询可以跨数千台摄像机做多站点 AI 搜索。截至 2026 年初，Verkada
              已把 AI 原生搜索扩展到环境传感器异常，将视频片段与传感器读数交叉引用，服务事件关联。IPVM 独立分析认为，Verkada 的设备端 AI
              在检测准确率和查询响应速度上高于企业实体安防细分市场平均水平。边缘推理叠加云端聚合搜索，构成有意义的技术护城河，压制那些完全依赖云端 AI 处理的竞争对手。

              差异化风险包括：人脸识别仍仅限客户选择启用，且在美国和欧盟面临越来越多监管审视；具体 SoC 供应商和 NPU 架构未公开，形成芯片依赖的尽调缺口；AI 模型准确率基准来自公司声称，尚无独立第三方验证。
