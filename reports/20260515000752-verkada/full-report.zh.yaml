      - number: '3.4'
        title: 竞争护城河评估
        blocks:
          - type: paragraph
            body: >
              Verkada 的竞争位置建立在三条相互关联的护城河上：云架构成熟度、装机基础锁定效应和多产品平台深度。云架构护城河是 Verkada 最清晰的差异点，但也是时间最有限的优势。Incumbent
              正在积极建设云产品——Avigilon Alta、Genetec Stratocast 和 Milestone Care+——虽然都还没有达到 Verkada 的云原生 DNA，但随着 incumbent
              投资，差距会在 3-5 年维度收窄。不过，仅靠云架构不足以撬动既有装机基础：Verkada 的 30,000+ 客户、2 million+ 设备和硬件切换成本，会形成独立于当前产品竞争力的留存动力。


              平台深度护城河或许是最耐久的竞争优势。Verkada
              在单一统一云仪表盘中提供摄像头、门禁、报警、传感器、对讲和访客管理，形成多产品依赖；竞争对手要以可比云原生质量复制这一点，在架构上很难。客户每多采用一个产品，切换成本就加深一层。early 2025
              报告的大客户（年消费 $100,000+）同比增长 43%，验证了 land-and-expand 逻辑。


              关键竞争风险包括：Motorola Solutions ITC 专利诉讼仍在推进，不论最终结果如何，都会带来执行和财务风险；凭借 Motorola 资源，Avigilon 的 Alta 云栈可能在 24-36
              个月内成为可信的全栈替代品；NDAA Section 889 禁止中国供应商参与政府部署，带来监管顺风；Rhombus 和 Eagle Eye 在中型市场用价格施压，而 Verkada
              目前在那里仍收取溢价。Incumbent 在集成商渠道深度上也有结构性优势，Verkada 还没有完全追平。
