            body: >-
              Verkada 的资本位置由 December 2025 CapitalG（Alphabet）轮公开锚定：$100M，估值 $5.8B；此前 February 2025 完成 General Catalyst
              领投、Eclipse Ventures 参投的 $200M Series E，估值 $4.5B。六轮股权融资累计超过 $800M。2025 的两轮融资合计 $300M，间隔
              ten-month，说明公司处于积极部署资本阶段，而不是保守留钱阶段，资金可能用于加速扩员、产品扩张和国际分销。TechCrunch、Fortune、CNBC 和 Bloomberg 共同印证了 Series E
              和 December 2025 轮次细节。


              公司 September 2024 的 $2.95M DOJ
              罚款相对资本基数不大，但永久禁令要求公司建立全面信息安全计划并定期接受独立评估。持续合规成本——第三方审计、项目管理、补救基础设施——会成为经常性运营费用；公司没有单独披露，但相对泄露前安全支出可能并不小。


              现金余额、月度烧钱、现金跑道、债务额度和或有负债都未披露。公开记录中未发现 UCC 备案或留置权。Carahsoft 分销合作没有披露财务条款。PitchBook 和 Crunchbase
