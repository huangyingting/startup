      - number: '1.4'
        title: 规模、里程碑与负面事件
        blocks:
          - type: paragraph
            body: >
              Verkada 自 2017 在 Beverly Hills 一家 Equinox 健身房安装第一批摄像头后快速扩张。到 2025 年底，公司报告约 30,000 家活跃客户，全球部署超过 2 million
              台设备，门禁系统每天处理 8 million 次开门。公司声称自己在云视频安全（引用 2023 Novaira Insights 数据）和云原生门禁（引用 2024 Omdia
              数据）两个市场均排名第一。根据公开估计，2025 收入达到估计 $806 million；不过作为私营公司，Verkada 并不公开披露详细财务。


              公司发展轨迹里也有几起重大负面事件。March 2021，自称 “APT-69420 Arson Cats” 的黑客组织，包括 maia arson crimew（Tillie
              Kottmann），利用公开在线可得的凭据攻入 Verkada 系统，访问了约 150,000 台客户摄像头的实时和历史画面，受影响客户包括 Tesla 工厂、Cloudflare
              办公室、医院、监狱和学校。事件引发广泛媒体报道，也把集中式云安全架构的根本问题摆到台面上。September 2024，美国 Department of Justice 宣布对 Verkada 处以 $2.95
              million 罚款并发布永久禁令，原因包括违反 CAN-SPAM、数据安全失效以及源自该泄露事件的欺骗性做法。此外，August 2021，Motorola Solutions 向美国
              International Trade Commission 对 Verkada 提起专利侵权投诉，称 Verkada 摄像头侵犯其 Avigilon 子公司持有的专利。
