            title: 市场规模估计分歧大，也可能被高估
            body: >
              Verkada 和 Eclipse Ventures 估计其可服务市场为 $60
              billion，但这个数字很可能包含相邻品类和未来市场扩张，而这些机会可能需要十年才会真正落地。更保守的分析师估计把云管理物理安全细分放在 $15-25
              billion，仍有显著空间，但明显小于公司声称的总可用市场（TAM）。
            calloutType: risk
            claimRefs:
              - CM010
              - CM011
          - type: callout
            title: 平台式 Land-and-Expand 放大单客户价值
            body: >
              Verkada 的多产品平台策略形成强劲的 land-and-expand 动态：客户先从摄像头开始，再逐步增加门禁、报警、传感器和对讲。大客户（$100K+）同比增长
              43%，说明扩张经济性强，也验证了平台逻辑。
