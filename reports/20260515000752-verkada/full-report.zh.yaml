      - number: '5.2'
        title: 架构与技术栈
        blocks:
          - type: paragraph
            body: >-
              Verkada 的架构更准确地说是混合云：AI 智能和主存储留在边缘（设备端），管理、搜索、告警、审计日志和长期归档放在云端。架构设计刻意避开纯云流式架构的单点故障：WAN
              中断就停止录像。云断开时，视频继续写入设备 SSD；重连后再同步——NVR 系统也能提供这种可靠性，但不必承受 NVR 的管理复杂度。

              每台摄像机内置自定义系统级芯片（SoC）和嵌入式神经处理单元（NPU），在传感器端实时跑目标检测、人员 / 车辆分类和运动分析，不把原始视频传到云端。所有视频存储在板载 SSD 上，根据 SKU 提供 30 到
              365 天本地留存，并以 AES-256 加密。视频和事件元数据通过 TLS 1.3 同步到云端，用于远程访问、AI 搜索和长期留存。Command 云平台跑在 AWS
              基础设施上，提供基于浏览器的仪表盘，支持基于角色的访问控制（RBAC）、多因素认证（MFA）、细粒度站点和设备权限、审计日志和统一通知。

              空中下载（OTA）固件更新会自动下发到所有已注册设备，不需要客户操作。相比基于 NVR 的竞争对手——固件更新往往要工程师上门——自动 OTA 下发形成关键运营差异。REST API 和 webhook 支持接入
              HR 系统（自动开通和撤销权限）、SIEM 和 SOAR 工具（安全运营）以及楼宇管理系统（BMS）。开发者文档发布在 developer.verkada.com，覆盖 REST API 端点、事件
              payload、webhook 和 OAuth 认证流程。集成市场列出经过认证的合作伙伴集成，覆盖身份提供商、实体门禁平台和企业生产力工具。
