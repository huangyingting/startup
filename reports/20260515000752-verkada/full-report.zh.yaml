      - number: '6.4'
        title: 留存、扩张与满意度
        blocks:
          - type: paragraph
            body: >-
              Verkada 不公开净留存率（NRR）、总留存率（GRR）或总客户流失率。合同期限和续约条款同样未公开。留存数据因此成为重大尽调缺口：实体安防硬件 + SaaS
              模型理论上支持高留存（硬件安装在客户现场形成切换成本；云平台订阅自动续费），但真实留存画像必须在尽调资料室中验证。

              第三方评价聚合平台提供间接满意度信号。G2 基于数百条已验证评价给 Verkada 约 4.4/5.0 评分，用户持续把云端管理简单、即插即用硬件安装、统一仪表盘列为主要优势。Gartner Peer
              Insights 评分相近，企业用户认可平台可扩展性，以及摄像机 + 门禁统一的价值。TrustRadius 评分与 G2 数据互相印证，主题相似——管理简单、硬件可靠、没有 NVR/DVR
              复杂性。评价聚合信号噪声较高（样本更偏向响应供应商请求的满意客户），但方向上正面。

              2021 年泄露是一次已知的负面满意度事件。约 95 个客户组织——包括医院、监狱、Tesla、Cloudflare 等——视频被未授权第三方访问。部分客户可能在泄露后立即流失，但 Verkada
              没有披露任何与泄露有关的流失；Tesla 和 Equinox 等点名客户似乎仍然活跃。FTC 和 DOJ 和解（2023–2024）要求 Verkada 落地永久信息安全计划、强制 MFA
              和独立安全评估——整改动作可能部分修复了医疗和政府等受监管行业的信任。

              先落地再扩张是 Verkada 最强的留存机制。客户从摄像机起步，再增加门禁控制硬件，会把 Verkada 凭证更深地嵌入楼宇管理基础设施。实体安防行业中，门禁控制客户群的年度续约率通常高于
              90%，因为凭证系统深嵌运营。Verkada 从摄像机到门禁、报警、环境传感器的多产品扩张路径，让每新增一条产品线都进一步增强黏性。
