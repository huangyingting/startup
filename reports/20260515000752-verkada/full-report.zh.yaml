      - number: '8.5'
        title: 退出准备度与最终尽调
        blocks:
          - type: paragraph
            body: >-
              Verkada 的退出准备度为中等。公司已有规模（估计 $800M+ ARR）、企业客户牵引力和可防守的云原生架构——这些都是 IPO 或战略收购的前提。三条退出路径都可行。第一，若沿着约 $1B ARR
              轨迹上市，并按公开市场 8-10x NTM 收入倍数定价，2027-2028 年企业价值将隐含 $8-10B，较当前入场价有 37-72% 上行空间 [CV027][CV035]。IPO 路径要求 ITC
              专利案先解决（排除令会直接堵死上市窗口），并持续遵守同意令。第二，大型安防集团——Honeywell、Allegion、Bosch Security 或 Motorola
              Solutions（前提是专利纠纷已解决）——发起战略收购，可能带来超过 $7B 的控制权溢价退出。第三，二级收购或成长型 PE 投资可在不依赖公开市场的情况下，以 6-8x 收入提供流动性
              [CV034][CV026]。

              最终尽调有五项硬要求。第一，经审计或审阅的财务报表，披露 2024-2025 年实际收入、毛利率和经营亏损——$806M 收入估计必须被确认，不能只靠市场共识假设
              [CV004][CV006]。第二，完整股权结构表和清算优先权瀑布，用于正确建模回报情景。第三，净留存率（NRR）数据（投资者需要 NRR 高于
              110%，才能支撑溢价倍数入场）。第四，Motorola/Avigilon ITC 专利案当前状态——任何新裁决、和解谈判或排除令时间表，提交前都必须完全弄清。第五，同意令合规日志和 FTC
              审计状态；它们直接影响安全敏感行业（金融服务、医疗、政府）的企业采购资格 [CV009][CV024][CV030]。
            claimRefs:
