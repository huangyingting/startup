  - id: FE004
    title: 产品成熟度 / 能力图
    type: matrix
    layout: wide
    summary: 从 GA 状态、AI 深度、集成广度、企业级就绪度和合规覆盖 5 个维度，评估 Verkada 七条产品线的成熟度和能力。 视频安防和门禁是最强产品线；较新的模块（对讲机、workplace）能力栈更浅。
    data:
      columns:
        - GA / 成熟度
        - AI 深度
        - 集成广度
        - 企业级就绪度
        - 合规覆盖
      rows:
        - label: 视频安防
          values:
            - GA — 全产品线 (2016–2025)
            - 高 — 端侧 NPU，人脸 / LPR / 属性搜索，行为分析
            - 高 — REST API、SIEM、BMS、IdP
            - 高 — RBAC、MFA、多站点、审计日志
            - 纳入 SOC 2 Type II 范围；FTC/DOJ ISP 适用
        - label: 门禁
          values:
            - GA — 2020 推出；
            - 中 — AI 辅助进出日志；异常标记
            - 高 — HR、IdP、物理门禁平台
            - 高 — 自动配置，门事件关联视频片段
            - 纳入 SOC 2 Type II 范围
        - label: 警报
          values:
            - GA — 2022–2023 推出；装机基础较窄
            - 低 — 仅规则阈值告警
            - 中 — 已接入 Command；第三方有限
            - 中 — 基础能力；没有独立监控中心集成
            - 纳入 SOC 2 范围；未披露警报专用 UL 认证
        - label: 环境传感器
          values:
            - GA — SV 系列；多参数监测
            - 中 — 阈值告警；异常与视频关联 (2026)
            - 中 — webhook、Command API
            - 中 — 设施 / EHS 场景；企业工作流集成有限
            - 纳入 SOC 2 范围；合规准确性未获认证
        - label: 对讲设备
          values:
            - 正式可用 — 单一型号；SKU 宽度有限
            - 低 — 仅支持移动触发和双向音频
            - 低 — 仅限 Command 平台；没有第三方对讲生态
            - 中 — 基础访客流程；缺少高级呼叫路由
            - 纳入 SOC 2 范围
        - label: 访客 / 来访管理
          values:
            - 正式可用 — 网页门户，已接入摄像头和门禁控制
            - 低 — 身份匹配和关注名单；除自愿启用外无生物识别
            - 中 — 徽章打印、IdP、摄像头 / 门禁控制联动
            - 中 — 适用于企业大堂；大型场馆可扩展性未经验证
            - 纳入 SOC 2 范围；GDPR 下访客数据留存不清晰
        - label: 工作场所分析
          values:
            - 正式可用 — 基于现有摄像头的分析层；无需新硬件
            - 中 — 匿名化热力图、人数、占用趋势
            - 低 — 报告 API；与空间规划工具集成有限
            - 中 — CRE 和设施场景；HR 系统集成有限
            - 纳入 SOC 2 范围；匿名化方法未经独立验证
    approximationNotes: 成熟度评级基于官方产品页面、行业评测和 IPVM 分析推断。AI 深度、集成广度和企业就绪度评级是本报告作者的定性评估； 并非 Verkada 自己的分类。
