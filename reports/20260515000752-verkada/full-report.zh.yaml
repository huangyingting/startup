      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Verkada 已完成六轮公开披露的风险融资，累计超过 $800 million，从早期创业公司成长为估值 $5.8 billion 的后期私营公司。公司的 Series A 由 Next47（Siemens
              旗下风险投资部门）和 First Round Capital 领投。April 2019，Verkada 完成由 Meritech Capital Partners 和 Sequoia Capital 领投的
              $40 million Series B，公司估值 $540 million。January 2020，公司完成 Felicis Ventures 领投的 $80 million Series C，估值 $1.6
              billion，进入独角兽行列。


              经历 2021 数据泄露和职场文化争议后，Verkada 在 October 2023 关闭 Series D，融资 $305 million，估值 $3.2 billion。最后一笔 $100 million
              由 Alkeon Capital 领投，Lightspeed Venture Partners 参投。February 2025，公司完成 General Catalyst 领投、Eclipse Ventures
              参投的 $200 million Series E，估值 $4.5 billion，累计融资增至约 $700 million。最近，December 2025，Verkada 完成 Alphabet 旗下
              CapitalG 领投的 $100 million 融资，估值 $5.8 billion。历轮知名投资方包括 Sequoia Capital、Felicis Ventures、General
              Catalyst、Eclipse Ventures、Meritech Capital、MSD Partners（Michael Dell）、First Round Capital 和 CapitalG。
