      - number: '8.2'
        title: 估值背景与入场纪律
        blocks:
          - type: paragraph
            body: >-
              Verkada 已完成五轮可识别融资，2025 年 12 月估值达到 $5.8 billion。估值路径——Series D（2023 年 10 月）$3.2B，Series E（2025 年 2
              月）$4.5B，CapitalG extension（2025 年 12 月）$5.8B——意味着约 26 个月内较 Series D 抬升 81% [CV041][CV042]。累计融资超过 $800M
              [CV003]。按 $5.8B 估值和 2025 年估计 $806M 收入计算，隐含收入倍数约 7.2x [CV005]。相比之下，Motorola Solutions/Avigilon 约 6.5x
              收入，Alarm.com 约 5x，Samsara 约 20x，Axon Enterprise 约 18x；因此，Verkada 相对传统硬件 / 安防同业估值合理，但相对高增长云 IoT 可比公司有明显折价
              [CV011] [CV012][CV013][CV014]。

              以 $5.8B 入场，投前必须确认三件事。第一，$806M 收入估计必须独立验证——它只是分析师共识，并非官方披露 [CV004][CV006]。第二，7.2x
              收入倍数对于一家有硬件敞口的公司偏紧：可比硬件附着型 SaaS 公司（Samsara IPO 初期、Alarm.com）交易在 5-8x 收入，而不是 15-20x [CV015][CV038]。第三，必须先分析
              $800M+ 优先股带来的优先股堆叠和清算瀑布，才能建模回报画像——在 $5.8B 下，如果下行情景退出，普通股投资人可能遭遇早期优先权持有者带来的显著稀释
              [CV023][CV040]。按当前估值进入的投资人，至少要建模 $11.6B+、2x 退出，才能在 4-6 年持有期内获得足够 IRR；达成目标需要公司以强收入倍数 IPO，或被愿意在当前 VC
              估值标记上支付控制权溢价的大型收购方战略收购 [CV027][CV035]。
