      - number: '3.3'
        title: 传统 Incumbent 与平台玩家
        blocks:
          - type: paragraph
            body: >
              传统物理安全 incumbent 是 Verkada 最强的长期竞争挑战，因为它们装机基础庞大、与集成商关系深、母公司资金充足。Axis Communications 自 2015 由 Canon
              持有，是按出货量计的网络视频摄像头全球市场领导者，通过开放生态销售，并由 Genetec、Milestone、Hanwha 等 VMS 合作伙伴支持。Axis 缺少捆绑订阅软件的原生云管理平台，主要依靠 AXIS
              Camera Application Platform（ACAP）做设备端分析和第三方 VMS 集成。Canon 的所有权让 Axis 能获取大量公司资源，以及互补的 Milestone VMS 平台。


              Avigilon 是最激进的 incumbent 挑战者，Motorola Solutions 在 2018 以约 $1 billion 收购了它。Motorola 在 2022 推出 Alta 云门户，在
              Avigilon 硬件上叠加云管理层，并把 Openpath 云门禁（2021 收购）纳入 Avigilon 产品家族。Avigilon 的 AI-first H5A 摄像头系列、Openpath 的 ACaaS
              产品和 Alta 云门户组合起来，已经接近 Verkada 的一体化愿景；而 Motorola Solutions 约 $10 billion 的年收入也提供了充足投资能力。关键是，Motorola 在
              November 2023 向 ITC 对 Verkada 提起专利侵权投诉，称 Verkada 的 AI 分析能力侵犯 Avigilon 知识产权。


              Genetec 仍是重视开放生态灵活性和隐私合规的组织偏好的企业 VMS，尤其在 Europe 和政府客户中如此。其 Security Center 平台支持全球超过 750,000
              个站点的安装。Milestone Systems 同样由 Canon 持有，凭借 7,000 多个认证合作伙伴产品，在开放 VMS 市场按集成数量领先。Hanwha Vision（Samsung
              剥离）、Bosch Security Systems 和 Honeywell 构成传统阵营的其余部分，组合宽，服务全球企业和关键基础设施市场。
