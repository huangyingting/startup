  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模式
        blocks:
          - type: paragraph
            body: >-
              Verkada 的变现建立在硬件加 SaaS 的两段式架构上。客户先一次性购买 Verkada 硬件——网络摄像头、门禁读卡器、报警面板、环境传感器、对讲或访客管理设备。每台设备随后接入年度云软件订阅，获得 AI
              视频搜索、自动 OTA 固件更新、加密云归档、远程仪表盘管理和边缘分析。这一经常性订阅层是长期经济价值的核心：随着设备基数扩大，即使硬件出货增长放缓，年度 SaaS 基数也会继续复利。


              定价完全通过谈判确定，公开并未列价。Verkada 官网会把潜在买方转给企业销售代表。独立渠道来源和 G2 评论者显示，硬件 ASP 从基础摄像头约 $500 到高分辨率 AI 型号超过 $3,000
              不等；IPVM 行业分析和客户自述估计，按设备计费的年度订阅成本为每台摄像头每年 $200–$500。企业细分通常采用多年合同，一般为 three years。市场普遍认为会有批量和多站点折扣，但没有公开价目表。


              Verkada 还通过辅助收入流变现：专业部署服务（尽管公司把产品定位为 plug-and-play）、客户在摄像头部署基础上增加门禁和报警线带来的多产品交叉销售，以及通过 Carahsoft
              Technology（announced January 2026）等分销商面向政府和 SLED 市场的渠道销售。任何公开披露都没有单独拆分这些收入流，因此收入结构分析完全依赖管理层提供的数据。
