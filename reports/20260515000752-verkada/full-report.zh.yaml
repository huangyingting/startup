  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >-
              Verkada 的约 30,000 家企业客户分布在至少六个垂直细分市场：企业商业（Fortune 500 公司、中端市场企业和企业园区）、K-12
              和高等教育、医疗健康和生命科学、零售和酒店、非营利和信仰社区，以及公共部门（政府、执法、交通）。公司没有公开各垂直领域贡献的 ARR
              或客户数占比，但公开点名的案例、媒体报道和产品营销材料，给出了采纳最深领域的一致图景。

              企业商业细分市场营销露出最强：截至 2025 年 2 月，91 家 Fortune 500 公司使用 Verkada，约占 Fortune 500 的 18%。已点名锚定客户包括 Equinox（健身，2017
              年首个大型客户）、Tesla（制造，工厂摄像机）、LA Rams（职业体育）、Canada Goose（奢侈品零售）和 Citrix（技术服务）。这些账户证明 Verkada 打入多个 Fortune 500
              子行业，而非集中在单一行业。

              教育细分市场贡献大量设备和账户。Verkada 公开称“数千所学校”使用其平台，点名锚定客户包括 Zionsville Community Schools（K-12，Indiana）、Sandy Hook
              Elementary（学校安全的高知名度参考案例）和 Durham College（加拿大高等教育）。EdWeek 和 SDM Magazine 报道确认，K-12 预算周期和 Uvalde
              事件后的学校安防资金潮加速了该细分市场。

              医疗健康、零售和酒店部署出现在产品营销和案例中，但 Verkada 较少披露这些垂直领域的具体客户名。非营利部署包括 The Salvation Army。2026 年 1 月 Carahsoft 分销协议正式把
              Verkada 触达到联邦、州和地方政府采购载体；此前该细分市场主要靠直销服务。

              获客渠道包括企业直销、安全系统集成商（传统实体安防分销渠道），以及自 2026 年 1 月起面向公共部门的 Carahsoft。集成商渠道符合实体安防硬件 + 软件的行业惯例，也降低 Verkada
              在中端市场账户上的直销成本。
