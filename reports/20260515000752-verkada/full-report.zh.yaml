      - number: '6.5'
        title: 集中度与渠道风险
        blocks:
          - type: paragraph
            body: >-
              单一账户收入集中度未公开。Verkada 的定价模型（按设备年度订阅 + 硬件）意味着，运行数千台摄像机和门禁点、覆盖全球园区的大型 Fortune 500
              部署，单个客户的年度合同价值可能达到数百万美元。不过，鉴于总客户约 30,000 家、大客户账户 4,700+，任何单一客户超过总 ARR 几个百分点的概率不高——但没有尽调资料室访问无法确认。

              垂直领域集中度风险为中等。公开证据显示，Verkada 部署覆盖至少六个主要垂直领域（企业商业、教育、医疗健康、零售 / 酒店、非营利、政府），降低了单一垂直收入依赖。教育细分（“数千所学校”）是高量、低 ASP
              队列；企业商业（Fortune 500）是低量、高 ASP 队列。零售和医疗处于中间层。分布大体符合有韧性的多垂直销售体系；不过如果 K-12
              细分流失（例如因州级采购要求变化或预算削减），可能影响数量和品牌能见度。

              渠道集中风险正在变化。历史上，Verkada 高度依赖企业直销和安全集成商；商业实体安防传统渠道本就如此。集成商渠道带来二阶集中：如果贡献大量数量的主要集成商转向竞争平台（如 Axis/Milestone 或
              Genetec），Verkada 的中端市场销售管线可能受扰动。2026 年 1 月 Carahsoft 合作新增第三条渠道，专门面向公共部门，也降低该细分市场对两条渠道的依赖。

              2021 年泄露和 DOJ/FTC 和解在受监管行业形成特定集中风险：受 HIPAA 覆盖的医疗服务机构、金融机构和政府机构，采购审查或第三方风险管理要求可能更高，从而拖慢上述子细分市场的新 logo
              获取和续约。Verkada 的回应——FTC 同意令合规计划、强制 MFA 和 SOC 2 Type II 认证——缓解但不能消除敏感行业的监管审视逆风。

              Carahsoft 合作是 2025–2026 年最重要的渠道进展。Carahsoft 是美国联邦和 SLED（州、地方、教育）采购的主导技术聚合商，触达 GSA Schedule、NASA SEWP 和
              AEPA 等合作采购载体。该合作显著降低需要成熟采购机制的公共部门账户的销售摩擦，并可能在 2026–2027 年推动 $100K+ 队列的增量大客户增长。
