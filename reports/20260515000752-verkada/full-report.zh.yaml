  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重度评估
        blocks:
          - type: paragraph
            body: >-
              Verkada 的风险画像由五类相互关联的风险主导。第一，来自 2024 年 FTC/DOJ 同意令、Motorola Solutions/Avigilon
              活跃专利诉讼，以及不断扩张的数据隐私法体系的监管和法律敞口；隐私法律直接触及公司的人脸识别分析。第二，来自 2021 年 3 月泄露的运营和安全风险；事件揭示 Verkada
              的集中式云架构存在结构性单点故障。第三，来自合同硬件制造和云基础设施依赖的供应链与合作伙伴集中风险。第四，来自 2020–2021 年有记录员工骚扰事件的人才和文化风险，以及没有公开继任计划的单一 CEO
              关键人依赖。第五，财务和模型风险：$5.8 billion 估值对应估计 5-7x 收入倍数，增长放缓或额外执法行动的容错空间很小。

              在当前缓解成熟度下，没有单一风险能独立击穿投资逻辑。同意令有明确合规路径，Verkada 已在联邦法院抗辩专利诉讼，泄露后整改包括强制 MFA 和独立安全审计。但风险叠加后，尾部下行比监管履历干净的企业 SaaS
              可比公司更厚。风险热力图展示了剩余严重度分布：数据泄露复发和违反同意令锚定关键列；专利诉讼、竞争压力和 FTC
              执法落在高严重度区域；人脸识别禁令、供应链中断和文化升级构成中等层级。各风险桶的否决条件和尽调要求见第 5 节。
