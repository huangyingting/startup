  - id: TV005
    title: 投资逻辑破裂与终止触发器表
    columns:
      - 触发器
      - 阈值 / 事件
      - 对投资逻辑的影响
      - 行动含义
    rows:
      - - ITC 排除令
        - ITC 最终裁决对美国境外生产的 Verkada 摄像头施加入境禁令
        - 硬件 + 订阅捆绑被打断；在国内生产建立前，收入面临风险
        - 立即下调至减持；ITC 结果落定前阻止后续投资
      - - 同意令违规
        - FTC 或法院认定 Verkada 违反 2024 年 9 月永久禁令
        - 企业采购资格受损；监管风险溢价飙升；估值重置到 4-5x
        - 立即开展投资组合复核；评估老股退出选项
      - - 数据泄露复发
        - 第二次大规模未授权访问事件，影响 ≥10,000 台摄像头或客户 PII
        - 在安全敏感型企业买家中声誉崩塌；NRR 跌破 100%
        - 启动退出流程；就被投公司通知义务咨询法律顾问
      - - 收入增长 < 15%
        - 官方或可信第三方确认 2026 年收入同比增长低于 15%
        - 以 7.2x 进入倍数看，低于 15% 的增长意味着倍数显著压缩，回报画像变差
        - 下调至回避；不按当前价格参与下一轮
      - - NRR 持续低于 100%
        - 连续两个季度确认净留存率（NRR）低于 100%
        - 现有客户基本盘在收缩；增长模型倒转；平台粘性被打破
        - 立即重新评估投资逻辑；提高老股退出监控频率
    notes: 终止触发器是分析师定义的条件，应触发正式投资组合复核，不等于自动退出决定。阈值是分析师基于公开数据和可比公司先例作出的估计。
