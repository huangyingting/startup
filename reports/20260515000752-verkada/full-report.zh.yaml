      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多家分析机构给出了物理安全市场估计，但方法和分段边界差异很大。仅全球视频监控市场，Omdia、MarketsandMarkets、Grand View Research 等机构估计 2024-2025 规模为
              $53-62 billion，并预计到 2030 增长至 $85-100 billion，CAGR 为 8-12%。全球门禁市场再贡献 $10-15 billion，CAGR 为
              7-9%。叠加报警、对讲、环境传感器和相关软件后，全球物理安全设备和服务的总可用市场（TAM）约为 $120-150 billion。


              Verkada 的可服务市场（SAM）定义更窄，指面向商业和企业客户的云管理物理安全，主要在 North America 和 Europe。Verkada 与 Eclipse Ventures 曾估计这个市场约
              $60 billion，但该数字可能包含相邻品类和未来市场扩张。基于 Omdia 和 Novaira Insights 分段，一个更保守的云原生视频监控和门禁平台 SAM，在 2025 约为 $15-25
              billion，并会随着云采用加速以 15-20% CAGR 增长。Verkada 的可获取市场（SOM）——按当前产品组合、渠道和地理覆盖现实可拿到的份额——估计在 North America
              核心中型市场和大型企业细分中约 $3-5 billion。


              一个关键尽调点是，Verkada 所在的云原生细分增长显著快于整体物理安全市场。整体市场以 8-10% CAGR 增长，而据 Novaira Insights，云视频监控细分以 20-30% CAGR
              增长，背后是从本地部署转向云架构的长期迁移。这个增长差就是 Verkada 相对传统安防硬件厂商获得溢价估值的核心逻辑。
