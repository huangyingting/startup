      - CV019
      - CV020
      - CV021
      - CV035
      - CV036
      - CV037
    data:
      items:
        - label: 悲观情景企业价值（2027）
          low: 3500
          base: 4200
          high: 5000
          unit: USD M
          note: ITC 排除令或违反同意令情景；接近或低于入场价格
