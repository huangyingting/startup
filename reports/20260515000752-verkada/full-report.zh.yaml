      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              乐观情景假设 Verkada 能维持 30-35% 的收入增长，ITC 专利纠纷以有利结果收场，净留存率（NRR）保持在 120% 以上，到 2027-2028 年收入约 $1.5B。若按 10x
              未来收入倍数估值——与 Axon 和 Samsara 高增长阶段一致——企业价值可达 $12-15B，相当于当前 $5.8B 估值标记的 2-2.6x。这个情景要求 CapitalG
              带来的势能转化为企业账户扩张，硬件 + 云捆绑保持完整，且 ITC 不出现不利裁决 [CV019][CV036]。在乐观情景下，同意令会带来合规成本，但不打断商业势头。

              基准情景假设收入增速放缓到每年 20-25%，2027 年收入达到约 $1.0-1.1B，公司在 2027-2028 年以 7-8x 未来收入完成 IPO 或战略退出。按 $1.05B 收入和 7.5x
              倍数计算，企业价值为 $7.9B——较当前 $5.8B 标记仅有小幅溢价。考虑 Verkada 目前的商业势头和监管环境，这条路径最可能发生 [CV020][CV022][CV039]。若要从入场价赚到 2x
              回报，基准情景必须上行到约 8.5x 倍数或 $1.2B 收入。

              悲观情景假设 ITC 专利案引发进口禁令，迫使公司转向美国制造或许可硬件；同意令又让安全敏感客户的企业流失率上升。收入增速降至 10-15%，2027 年收入达到 $900M-950M，估值倍数压缩到
              4-5x。隐含企业价值降至 $3.6-4.75B——低于或接近当前入场价 [CV021][CV037]。若重大数据泄露再次发生，悲观情景会加速兑现；这是最可能把估值灾难性重置的单一事件路径。
