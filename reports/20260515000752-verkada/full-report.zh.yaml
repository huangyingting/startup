      - number: '1.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 顶级投资方组合验证平台逻辑
            body: >
              Verkada 的投资方名单——Sequoia、General Catalyst、CapitalG（Alphabet）、Eclipse、Felicis——几乎覆盖企业和 deep-tech
              风投的一线名字。December 2025 的 CapitalG 轮显示 Google 母公司对云管理物理安全存在战略兴趣，也可能为 Verkada 打开企业分销渠道。
            calloutType: strength
            claimRefs:
              - CO019
          - type: callout
            title: 2021 数据泄露仍是声誉与结构性包袱
            body: >
              March 2021 的泄露事件中，黑客用公开可得凭据访问了 150,000 台摄像头，暴露出 Verkada 内部安全姿态的根本弱点。随后 2024 年的 $2.95M DOJ/FTC
              和解，确认监管方认定其存在数据安全失效。对一家价值主张就是安全的公司来说，这次泄露仍是持续声誉风险，竞争对手也会在销售周期中主动利用。
            calloutType: risk
            claimRefs:
              - CO023
              - CO027
          - type: callout
            title: Meraki DNA 带来创始人与市场匹配
            body: >
              Hans Robertson 曾联合创立 Meraki；这家公司在被 Cisco 以 $1.2B 收购前，开创了云管理网络的路径。这段经历给 Verkada
              带来一套已验证的打法：在企业规模上用云管理硬件。Verkada 的混合云架构和零接触部署重点，都能看到这种 Meraki DNA。
            calloutType: insight
            claimRefs:
              - CO008
          - type: callout
            title: 职场文化争议暴露治理缺口
            body: >
              有报道称，男性员工在 2019-2020 用 Verkada 自家摄像头骚扰女同事；随后 Bloomberg 在 2021 报道其 “bro culture”，这些都指向治理和人力资源短板。Verkada
              虽已采取纠正措施，但问题反复出现，会让投资人质疑董事会监督和内部控制，尤其是这家公司处理的是敏感监控数据。
            calloutType: risk
            claimRefs:
              - CO025
  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              物理安全市场覆盖保护楼宇、人员和资产免受物理威胁所需的硬件、软件和服务，包括视频监控（摄像头、视频管理软件、存储）、门禁（读卡器、控制器、凭证、软件）、入侵检测（报警器、传感器）、环境监测（空气质量、温度、湿度传感器）、对讲和访客管理系统。网络安全软件、个人安全设备和消费级家庭安防产品（Ring、Nest）不在这个市场内；它们属于相邻但不同的细分市场，买方画像和渠道也不同。


              Verkada
              具体切入这个市场里的企业和商业客户，目标客户通常有多地点、数百到数千台摄像头，以及专业安全运营团队。公司的可服务市场同时包括新装项目（greenfield）和替换传统本地系统（brownfield）；考虑到模拟摄像头和
              NVR 系统的庞大存量，后者是更大的近期机会。关键相邻市场包括楼宇自动化、IoT 平台管理和办公场所分析，Verkada 正通过环境传感器和办公场所产品开始覆盖。


              Verkada 云原生平台的现状替代品，是 Axis Communications（Canon）、Avigilon（Motorola Solutions）、Genetec、Milestone Systems 和
              Hanwha Vision（Samsung）等 incumbent 的传统本地系统。这些系统通常需要专用服务器、NVR 和现场 IT
              人员维护，带来持续运营成本，而云替代方案要削减的正是这些成本。企业切换成本很高——通常要更换摄像头硬件、升级网络并重新培训安全人员——这既压制采用速度，也在一旦安装后形成持久竞争护城河。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
