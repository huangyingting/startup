chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与使命
        blocks:
          - type: paragraph
            body: >
              Verkada Inc. 是一家总部位于 California San Mateo 的云管理物理安全公司，为企业楼宇安全打造并销售软硬件一体化方案。公司由 Filip Kaliszan（CEO）、James
              Ren、Benjamin Bercovitz 和 Hans Robertson 于 2016 在 California Menlo Park 创立，后来将总部迁至 San Mateo。Verkada
              的公开使命，是用云原生平台取代传统本地 DVR 视频监控系统，让摄像头、门禁、报警、环境传感器、对讲和访客管理都汇到同一个控制台里，推动企业物理安全现代化。


              公司把自己定位为“软件优先”的安全供应商，并借 Apple 从少数核心产品切入、做到极致后再逐步扩张移动业务的路径作类比。Verkada 的摄像头用内置 AI
              芯片在设备端处理视频，同时把加密录像同步到云端，不再需要网络视频录像机（NVR）或专用服务器。这个混合云架构让企业能通过单个浏览器仪表盘远程管理数千个站点，并获得 AI 搜索、人脸识别、运动警报和 OTA
              固件更新等能力。公司还通过相邻产品线扩大总可用市场（TAM），包括门禁（2020 推出）、环境传感器（2020）、报警、对讲、访客管理和办公场所解决方案。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >
              Verkada 由四位技术和创业背景互补的人在 2016 联合创立。Filip Kaliszan 担任 CEO，是连续创业者；他曾在 Stanford University 就读期间联合创立课程排课与评分平台
              CourseRank，并在 2010 被 Chegg 收购。James Ren 和 Benjamin Bercovitz 同样毕业于 Stanford University，此前与 Kaliszan 一起做过
              CourseRank，也加入成为联合创始人。第四位联合创始人 Hans Robertson 带来深厚的硬件和网络经验；他曾是云管理网络公司 Meraki 的联合创始人兼 COO，Meraki 在 2012 以
              $1.2 billion 被 Cisco 收购。


              投资人常把创始团队的组合视作关键差异：Kaliszan、Ren、Bercovitz 带来企业软件经验，Robertson 则把 Meraki 的硬件加云网络能力带进来。Verkada 领导层还包括 CFO
              Kameron Rezai，他主导了公司 Series D 及后续融资。截至 early 2026，公司全球约有 1,700 名员工。公司也经历过与领导和文化有关的争议，包括 2020 男员工用 Verkada
              自家人脸识别摄像头骚扰女同事的事件，最终导致员工被解雇，也引发外界对公司职场文化的公开批评。
