      - number: '5.4'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >-
              2021 年 3 月的泄露事件从根本上重塑了 Verkada 的安全姿态。当时，一个黑客组织使用公开在线找到的管理员凭证，访问了约 150,000
              台摄像机的实时画面。攻击者利用一个暴露在公网、带有硬编码凭证的管理工具，暴露出集中式 Command 平台在访问控制上的缺口。事后整改包括：所有管理员账户强制 MFA、正式 bug bounty
              计划，以及定期红队和蓝队安全演练。

              2024 年 FTC 和 DOJ 联合行动随后把这些承诺制度化。行动带来 $2.95 million 民事罚款和永久同意令，要求 Verkada
              维持全面信息安全计划（ISP）、定期接受独立第三方安全评估，并持续提交监管报告。同意令还要求 Command 平台强化审计日志和访问控制。

              技术控制包括传输中的 TLS 1.3 加密，以及设备 SSD 静态数据的 AES-256 加密。基于每台设备证书的认证可防止设备伪装。平台获得 SOC 2 Type II 认证，覆盖安全性、可用性、保密性和隐私等
              Trust Service Criteria。客户可通过数据驻留和隐私设置配置 GDPR 与 CCPA 合规。人脸识别需要客户明确选择启用，并管理同意工作流。Verkada 在合规定位中引用 NIST
              Cybersecurity Framework（Identify/Protect/Detect/Respond/Recover）。Verkada 接受评估所依据的 AICPA SOC 2 Type II
              框架，是处理敏感运营数据的云托管 SaaS 平台行业标准。

              已知合规缺口包括：SOC 2 审计报告未公开供审阅；审计机构身份和具体审计期未披露；DOJ 同意令带来持续合规义务，但年度成本未公开；若没有额外合同安排，客户侧 GDPR 配置可能无法完全满足数据处理要求。
