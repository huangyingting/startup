      - number: '7.4'
        title: 人才、文化与执行风险
        blocks:
          - type: paragraph
            body: >-
              Verkada 面临有记录的人才和文化风险栈。2020 年 10 月，The Verge 报道 Verkada 员工曾使用公司摄像机和人脸识别功能骚扰女性同事，并在内部分享目标照片。Bloomberg 随后在
              2021 年 3 月作更广泛报道，将事件与公司据称存在的兄弟会式文化联系起来。公司已采取纪律处分，但报道造成持续雇主品牌损伤，影响其在 Bay Area 招募高级工程和产品人才。Glassdoor
              评价在认可使命和薪酬的同时，也反映出对管理风格和文化的持续担忧。

              Filip Kaliszan 自 2016 年共同创办 Verkada 以来一直担任唯一 CEO。公司没有公开继任计划、在册 CFO 或 C-suite 梯队，因而在一家正向 30,000+
              企业客户规模扩张的公司中形成关键人集中风险。快速招聘以支撑增长，也给工程、销售和客户成功组织带来压力；岗位所在的人才市场又是全球竞争最激烈的市场之一。$200 million Series E（2025 年 2
              月）和随后 $5.8 billion 估值为早期员工提供留任激励，但流动性仍取决于尚未宣布的 IPO 或收购；如果可比公司更快提供流动性，漫长归属尾期可能转化为留任负担。

              财务模型风险进一步放大人才问题。Verkada 的硬件 + SaaS 模型需要持续投入制造、库存融资和设备补贴；纯软件 SaaS 公司不需要承担制造、库存融资和设备补贴等资本需求。烧钱速度、毛利率和通往 GAAP
              盈利的路径均未公开披露。
