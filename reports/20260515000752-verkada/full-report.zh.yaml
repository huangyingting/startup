              本章审阅的公开来源中，没有任何一个披露 Verkada 的 GAAP
              收入、ARR、收入确认政策、递延收入表、分部毛利率、CAC、回本周期、销售周期、NRR、GRR、现金余额、月度烧钱、现金跑道或任何其他标准承销指标。SEC EDGAR 全文搜索确认，作为私营实体，Verkada
              没有公开 filings。Crunchbase 和 PitchBook 档案提供融资历史和估值数据点，但没有经营财务。


              强客户数和设备基数指标与彻底财务不透明并存，是后期私营公司在潜在 IPO 或老股交易前谨慎管理信息环境的典型特征。$5.8B 估值意味着按 $806M 估计收入计算约 7.2x
