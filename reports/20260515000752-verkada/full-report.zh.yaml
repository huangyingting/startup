      - number: '2.3'
        title: 买方、用户与付费方分层
        blocks:
          - type: paragraph
            body: >
              物理安全采购决策牵涉组织内部多个利益相关方，买方、用户和付费方关系复杂。主要买方通常是物理安全、企业安全或设施管理的 Director 或 VP。较小组织里，IT Director 或 CTO
              可能掌握安全预算。最终用户包括安全运营中心（SOC）分析师、前台员工、设施经理，有时也包括审看录像的 HR
              或法务团队。付费方则是组织的资本开支（capex）或运营开支（opex）预算，取决于部署被设计为设备采购还是云订阅。


              Verkada 的云原生模式把采购从重资本开支的 NVR / 服务器采购（传统模式），转成硬件加订阅模式：摄像头先一次性购买，云软件按年付费。这顺应企业 IT 转向 opex
              消费模式的趋势，也通过去掉服务器硬件、NVR 维护和现场 IT 固件更新支持，降低总体拥有成本。Verkada 将客户分成几层：Fortune 500 企业（截至 February 2025 为 91
              家）、年消费 $100,000+ 的大客户（截至 February 2025 为 4,700+ 家）、中型市场组织和较小商业客户。公司还在推进垂直行业细分，包括 K-12 学校、医疗机构、零售连锁，并通过
              Carahsoft 合作越来越多切入公共部门。


              采用触发因素因细分而异，但常见情形包括：现有摄像头系统到达生命周期末期、安防事件暴露传统监控缺口、设施扩张需要可扩展管理、COVID
              期间的空间占用监测需求，以及保险或监管要求。远程办公和分布式设施增加后，客户更需要可集中监控的云管理安全系统，而不是每个地点都配现场人员。
