      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 观察而非买入：提交前确认收入与 ITC 状态
            body: >-
              Verkada 的 $5.8B 估值在基准情景下说得过去——但只是说得过去，并不便宜。估计 NTM 收入倍数为
              7.2x，高于传统实体安防同业（Motorola/Avigilon、Alarm.com）；若不想靠倍数压缩来消化价格，公司必须继续保持 20-25% 增长。观察评级来自三个未解决关口：(1) $806M
              收入估计尚未得到官方确认，因此倍数本身仍不确定；(2) 与 Motorola/Avigilon 的 ITC 专利诉讼带来低概率但高杀伤力的进口禁令风险，一旦发生，会切断商业模式核心的硬件订阅捆绑；(3)
              FTC/DOJ 同意令是持续合规义务，会增加企业采购摩擦。若收入确认达到或超过 $800M ARR、ITC 案件有利解决且 NRR 被确认高于 110%，评级可上调为买入。
            calloutType: recommendation
            claimRefs:
              - CV004
              - CV005
              - CV009
              - CV010
              - CV022
          - type: callout
            title: 同意令 + 专利诉讼叠加尾部风险
            body: >-
              以 Verkada 现有规模看，监管与法律风险堆栈异常厚。2024 年 9 月 FTC/DOJ 同意令要求每两年一次安全审计、合规报告，并施加永久禁令，持续增加企业采购摩擦。Motorola/Avigilon 向
              ITC 提起的专利投诉又带来硬件进口风险。这两项风险并不独立——不利的 ITC 裁决叠加更高的同意令合规成本，会同时压缩增长和利润率。IPVM 发布过批判性分析，质疑 Verkada 平台相对开放标准 VMS
              替代方案是否配得上价格溢价，这又增加了第三条竞争压力。投资者至少需要在收入倍数上计入 1-2 个倍数点的风险溢价，以覆盖投资期内多个风险同时兑现的复合概率。
            calloutType: risk
            claimRefs:
              - CV009
              - CV010
              - CV030
          - type: callout
            title: CapitalG 入场是真正的质量信号
            body: >-
              CapitalG 的 2025 年 12 月 $100M 投资，估值 $5.8B，不是边际信号，而是实打实的质量信号。CapitalG 管理 Alphabet/Google 的独立成长股权基金，过往投中过后来
              IPO 或实现 $10B+ 退出的企业 SaaS 公司（Hubspot、Duolingo、Stripe）。在独立尽调后以 $5.8B 入场，说明 CapitalG 对 Verkada 的商业势头、NRR
              画像和企业平台差异化有内部信心。对外部投资者，这个参照点有用，但不能替代独立尽调：CapitalG 能看到外部投资者拿不到的财务和 NRR 数据，也能接受更长持有期和低于典型成长基金要求的 IRR 门槛。
            calloutType: insight
            claimRefs:
              - CV008
              - CV033
