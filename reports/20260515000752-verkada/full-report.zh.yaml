        - 要求经审计的毛利率桥接，包含硬件（材料、保修、物流）和 SaaS（云基础设施、AI 计算、支持）的 COGS 明细；索取按季度拆分的混合毛利率趋势
      - - CAC、回本周期、销售周期和配额达成率
        - 卡住 GTM 效率判断；无法建模招聘产能或渠道 ROI
        - 要求按直销和渠道客群拆分的全口径 CAC、中位销售周期、按销售代表档位拆分的配额达成率，以及管道转化漏斗
      - - NRR、GRR 和客户队列留存
        - 卡住 LTV 建模和续约质量评估；是订阅业务判断的关键
        - 要求按客户年份拆分的净收入留存和总收入留存、前 20 大客户占 ARR 比例，以及按原因拆分的流失桥接
      - - 账面现金、月度烧钱速度和现金跑道
        - 卡住偿付能力和资本强度分析；无法建模现金跑道和下一轮融资触发点
        - 要求资金报告，包含当前现金余额、13-week 现金预测、按职能拆分的月度烧钱桥接，以及基准和下行情景下 18-to-24-month 现金跑道模型
      - - 债务、留置权和或有负债
        - 卡住下行风险建模；契约触发、留置权和未结诉讼负债可能实质影响企业价值
        - 要求债务明细表、授信额度条款、契约条款包、UCC 或留置权检索结果、未结诉讼准备金，以及任何 FTC 或 DOJ 持续合规成本估计
