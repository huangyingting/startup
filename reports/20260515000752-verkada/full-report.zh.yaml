  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Verkada 在商业物理安全市场竞争，竞争对手大致分为三层且彼此重叠：云原生同行、正向云迁移的传统本地 incumbent，以及门禁点解决方案专家。整个竞争格局由从本地 NVR/DVR
              系统转向云管理平台的长期迁移塑造，但这轮转型仍在早期——分析机构估计，目前商业视频监控摄像头中少于 15% 由云管理。


              最广泛的竞争威胁来自拥有庞大装机基础的多元化传统 incumbent：Axis Communications（网络摄像头全球市场领导者，Canon 自 2015 持有）、Avigilon（Motorola
              Solutions 自 2018 持有）、Genetec 和 Milestone Systems（同样由 Canon 自 2014
              持有）。这些厂商控制了大多数企业安全部署，并在积极建设云产品以防守位置。第二层云原生竞争对手——Eagle Eye Networks、Rhombus Systems 和 Cisco Meraki MV——与
              Verkada 共享云架构，但产品组合明显更窄。第三层门禁专家包括 Brivo、Openpath（Motorola Solutions）、Kisi 和 Salto Systems，专门竞争 Verkada
              的门禁产品线。


              Verkada 与所有这些竞争者的差异在于多产品平台广度：它是唯一能在单一统一仪表盘中原生提供摄像头、门禁、报警、环境传感器、对讲和访客管理的云原生供应商。没有一家单一竞争对手能以云原生质量复制这种广度，尽管
              Genetec、Avigilon 等 incumbent 平台玩家在本地或混合生态里接近这一形态。本节将梳理竞争格局，按云原生程度和平台广度定位关键玩家，并为后续护城河评估建立框架。
            claimRefs:
