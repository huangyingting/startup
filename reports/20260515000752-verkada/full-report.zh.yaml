  - id: FU001
    title: 客户旅程图
    type: journey-map
    caption: Verkada 客户从初次认知到战略性多产品扩张，一共六个阶段；图中展示支撑 $100K+ 账户群的“先落地、再扩张”路径。
    data:
      items:
        - label: 认知
          value: 1
          note: 潜在客户通过直销触达、安全集成商推荐、Carahsoft 采购名录、现有客户同侪推荐，或行业媒体 / G2 研究了解 Verkada。 参与者：设施总监、IT 安全负责人、CRE 经理。
        - label: 评估与演示
          value: 2
          note: >-
            Verkada 提供即插即用演示套件（摄像头 + Command 仪表盘访问）。潜在客户与既有 NVR/DVR 或 Axis/Genetec 对比评估。总拥有成本对比剔除服务器硬件和现场 IT
            成本。参与者：安全架构师、IT 总监。
        - label: 初始采购（摄像头）
          value: 3
          note: 首单通常仅部署摄像头，规模为 1–3 个站点的 10–200 台摄像头。销售时附带年度云订阅。该阶段 ASP 通常低于 $100K。 参与者：采购、设施经理、集成商项目经理。
        - label: 生产部署
          value: 4
          note: >-
            摄像头通过 PoE+ 交换机部署并注册；Command 仪表盘配置 RBAC 和站点层级。多站点推广往往在 6–12 个月内跟进。 客户加入评价平台（G2、Gartner Peer Insights）。参与者：IT
            管理员、物理安全团队。
        - label: 多产品扩张
          value: 5
          note: 客户增加门禁控制（门读卡器、控制器）、警报、环境传感器或访客管理。年支出跨过 $100K 门槛，进入 4,700+ 大客户队列。对 HR 和楼宇管理的集成加深切换成本。
        - label: 战略账户与续约
          value: 6
          note: >-
            多年、多站点、多产品关系。设备数量 100–5,000+。年度订阅续约已嵌入运营。客户成为 Verkada 案例研究的参考账户 （Equinox、LA Rams、Canada Goose）。企业 QBR
            节奏建立。流失需要全量更换硬件。
    claimRefs:
      - CU019
      - CU020
      - CU023
      - CU024
  - id: FU002
    title: 采用 / 部署漏斗
    type: funnel
    caption: 估计的六阶段采用漏斗，从 Verkada 理想客户画像中的全部物理安全潜在客户到大型战略账户，展示截至 2025 年底的转化动态。 “活跃客户”阶段以上的所有漏斗数值都是分析师估计；Verkada 未披露销售管线或销售阶段数据。
    approximationNotes: >-
      漏斗顶部估计（500,000 个 ICP 潜在客户、100,000 个已认知客户）由分析师根据物理安全市场规模和 Verkada 声明的 ICP（有多站点安全需求的企业）推导。每年赢得 / 新增客户（约 3,000 个）由隐含
      CAGR 和客户总数推断。 活跃客户（30,000）和大客户（4,700）是公司披露数字。
    data:
      items:
        - label: ICP 潜在客户总数（多站点企业）
          value: 500000
          note: 分析师估计：全球在 Verkada 可触达细分市场（商业、教育、医疗、零售、政府）中，拥有 ≥10 个地点且有专门物理安全预算的企业。
        - label: 知道 Verkada
          value: 100000
          note: 估计 ICP 内品牌认知率为 20%，依据行业媒体触达、G2 市场存在感类别和 Gartner 认可；并非公司披露数字。
        - label: 活跃销售管线 / 演示阶段
          value: 20000
          note: 分析师估计处于主动评估的账户（试用套件、POC 演示或集成商方案阶段）。基于 SaaS 常态，估计从认知到演示转化率为 20%。
        - label: 赢单 / 新客户（每年）
          value: 3000
          note: 由约 24,000 基数上的 ~26% CAGR 推断；每年约 3,000 个净新增客户（部分被流失抵消）。并非公司披露数字。
        - label: 活跃客户（总数）
          value: 30000
          note: 公司披露数字：截至 2025 年底约 30,000 家企业客户。反映累计活跃安装基础，而不是任何单一年份的新客户。
        - label: 大客户（年支出 $100K+）
          value: 4700
          note: 公司披露：截至 2025 年底，年支出 ≥$100K 的账户 4,700+，同比增长 43%。按数量约占客户总数的 16%，但很可能贡献 >50% ARR。
    claimRefs:
