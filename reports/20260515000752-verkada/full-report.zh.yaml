  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品平台与模块
        blocks:
          - type: paragraph
            body: >-
              Verkada 的云托管实体安防平台，把七条产品线的硬件端点接到名为 Command 的统一管理层下。平台采用“硬件优先、软件定义”的思路：设备在边缘侧做智能处理，云端负责管理、存储、分析和编排。结构安排让
              Verkada 可以一次性销售硬件，再按设备收取年度云软件订阅，形成硬件 + SaaS 附着率持续提高的混合变现模型。

              七条产品线包括：（1）安防摄像机——室内半球（Mini、D series）、室外半球（CD、CX series）、枪机、鱼眼、多传感器和车牌识别等型号，支持 2 MP 到 12 MP
              传感器；（2）门禁控制——门禁读卡器（Reader D series）、控制器（AC series）和手机、卡片、门禁扣、PIN 等凭证；（3）报警——hub、门 /
              窗传感器、运动探测器、玻璃破碎传感器和紧急按钮；（4）环境传感器——监测 PM2.5、CO2、VOCs、温度、湿度、环境光和噪声水平；（5）对讲——带双向音频并接入 Command
              仪表盘的视频门站；（6）Guest（访客管理）——基于网页的访客签到，与摄像机和门禁控制打通，用于身份核验和打印访客证；（7）Workplace——基于摄像头数据生成匿名化占用率分析和热力图，用于空间利用率报告。

              七条产品线都由 Command 仪表盘管理；Command 仪表盘是基于浏览器的 SaaS 应用，不需要本地服务器或 NVR。设备发货前已预配置到客户的 Command 账户，通过标准 PoE+ switch
              连接，多数配置下站点部署不到 1 小时。集成平台创造了单点方案竞争对手难以复制的跨产品价值：门禁事件自动生成摄像机片段，报警触发摄像机画面，环境阈值突破可触发 webhook 集成，把信号送入工单系统。截至
              2025 年末，Verkada 已在全球约 30,000 家企业客户中部署超过 2 million 台设备。
