  - id: FI001
    title: 收入模型桥
    type: flow
    layout: wide
    summary: 企业买家先采购硬件，再转化为不断扩大的按设备计费 SaaS 订阅基础；多产品交叉销售会随时间推高每个账户的 ACV。
    data:
      nodes:
        - id: buyer
          label: 企业买家识别实体安防需求
          detail: 中端市场到大型企业；政府 / SLED 通过渠道进入
        - id: demo
          label: 通过 Verkada 现场销售做演示评估
          detail: 没有自助购买；企业 AE 主导技术概念验证
        - id: hw-sale
          label: 硬件采购（摄像头、读卡器、传感器等）
          detail: 一次性资本开支；每台设备 ASP $500–$3,000+
        - id: onboard
          label: 云端开通和设备注册
          detail: 设备注册时激活 SaaS 订阅；即插即用
        - id: saas-sub
          label: 按设备计费的年度云订阅
          detail: 估计每台设备每年 ~$200–$500；典型合同期为 3 年
        - id: cross-sell
          label: 账户内多产品交叉销售
          detail: 在摄像头基础上叠加门禁、警报、传感器、对讲机
        - id: channel
          label: 渠道和政府分销
          detail: Carahsoft（SLED/Gov）；国际 VAR
        - id: revenue
          label: 持续扩大的硬件 + SaaS 收入基础
          detail: 硬件一次性；SaaS 经常性；两者随设备规模增长
      edges:
        - from: buyer
          to: demo
          label: 企业评估
        - from: demo
          to: hw-sale
          label: 签署硬件合同
        - from: hw-sale
          to: onboard
          label: 设备激活触发 SaaS
        - from: onboard
          to: saas-sub
          label: 年度 SaaS 订阅生效
        - from: saas-sub
          to: cross-sell
          label: 先落地再扩张
        - from: cross-sell
          to: saas-sub
          label: 新增按设备订阅
        - from: channel
          to: hw-sale
          label: 渠道中介硬件销售
        - from: saas-sub
          to: revenue
          label: 经常性 SaaS ARR 复利增长
        - from: hw-sale
          to: revenue
          label: 一次性硬件收入
    approximationNotes: Verkada 未披露渠道组合、附加率或分产品收入，因此该流程为定性描述。ASP 和订阅价格节点来自第三方估计， 不是官方定价。
    claimRefs:
      - CI001
      - CI015
      - CI016
      - CI017
      - CI018
      - CI023
      - CI025
      - CI034
  - id: FI002
    title: 单位经济模型桥
    type: flow
    layout: wide
    summary: 设备基础规模和 ARPU 估计能框出一套可能的毛利结构；但公司没有公开经营财务，所有利润率和效率节点都来自基准推算。
    data:
      nodes:
        - id: device-base
          label: 2M+ 已部署设备（增长中）
          detail: 公司披露；未按产品类型拆分
        - id: arpu
          label: 每台设备年收入约 ~$200–$500（估计）
          detail: 硬件 ASP 摊销 + 年度 SaaS 订阅；未正式披露
        - id: gross-rev
          label: 总收入约 ~$806M（2025 第三方估计）
          detail: Craft.co 和 Wikipedia 估计；未经审计
        - id: hw-cogs
          label: 硬件 COGS（约占硬件收入 60–70%）
          detail: 估计硬件毛利率 30–40%；来自基准推算
        - id: saas-cogs
          label: SaaS COGS（约占 SaaS 收入 15–20%）
          detail: 估计 SaaS 毛利率 80–85%；来自基准推算
        - id: gross-profit
          label: 估计综合毛利率 60–70%
          detail: 来自基准推算；公司未确认；硬件拖累，相比之下 SaaS 溢价
        - id: missing
          label: 缺少 CAC、NRR、烧钱速度和运营利润率
          detail: 无公开披露；完整承销需要这些数据
        - id: verdict
          label: 单位经济模型有方向性，但不能直接承销
          detail: 需要私下尽调确认利润率路径和销售效率
      edges:
        - from: device-base
          to: arpu
          label: 按设备 ARPU 基础
        - from: arpu
          to: gross-rev
          label: 设备 × ARPU ≈ 收入
        - from: gross-rev
          to: hw-cogs
          label: 硬件成本分摊
        - from: gross-rev
          to: saas-cogs
          label: SaaS 成本分摊
        - from: hw-cogs
          to: gross-profit
          label: 扣除硬件 COGS 后的剩余
        - from: saas-cogs
          to: gross-profit
          label: 扣除 SaaS COGS 后的剩余
        - from: gross-profit
          to: missing
          label: 毛利以下完全未披露
        - from: missing
          to: verdict
          label: 需要管理层材料
    approximationNotes: 该桥中的所有财务量都来自行业基准（SaaStr、Bessemer、OpenView）和 IPVM/G2 渠道数据推算。Verkada 未正式披露任何经营财务数据。
    claimRefs:
      - CI002
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021
      - CI025
      - CI028
      - CI029
