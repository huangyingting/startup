      - number: '7.2'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >-
              Verkada 最重大的监管敞口是 2024 年 9 月 FTC/DOJ 同意令：它处以 $2.95 million 民事罚款，并设置永久禁令，要求 Verkada
              建立全面信息安全计划、每两年接受独立安全评估，并停止对自身安全能力作误导性陈述。FTC 2023 年 8 月初步行动指出三个根因：电子邮件营销违反 CAN-SPAM；数据安全不足导致 2021
              年泄露；以及平台安全姿态营销说法具有误导性。DOJ 起诉书结案后，同意令已经成为可预见未来的持续合规义务。

              专利诉讼叠加第二层法律风险。Motorola Solutions 及其 Avigilon 子公司 2021 年 8 月向 ITC 提起 Section 337 申诉，指控 Verkada
              侵犯视频监控技术专利。USITC 新闻稿确认了申诉提交。若 ITC 作出不利裁决，可能发布排除令，禁止进口在海外制造的 Verkada
              摄像机；对于一家靠硬件带动经常性云订阅变现的公司，排除令可能是毁灭性打击。Verkada 于 2021 年 9 月在 Northern District of California 反诉
              Motorola，挑战专利有效性，但诉讼仍在进行。

              数据隐私风险不止于当前执法。Verkada 的人脸识别分析若部署在 Illinois 工作场所，Illinois BIPA
              将带来法定赔偿敞口。美国多个城市已经颁布或提议禁止在监控场景中使用人脸识别，州层面对私营部门的限制扩张也是长期产品范围风险。California CCPA 和 CPRA
              对生物识别和个人数据施加披露与退出要求。EU GDPR 为 Verkada 的欧洲扩张野心带来数据主权合规义务。隐私监管栈覆盖面很宽，意味着 Verkada 一边继续把 AI
              分析能力加入产品路线图，一边必须在多个司法辖区并行跑合规计划。
