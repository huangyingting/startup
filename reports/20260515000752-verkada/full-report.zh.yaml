      - number: '5.5'
        title: 部署、集成与路线图
        blocks:
          - type: paragraph
            body: >-
              Verkada 的即插即用部署模型是其在企业实体安防市场的竞争优势。摄像机和传感器发货前已预配置到客户的 Verkada 账户，通过标准 PoE+ switch 接入 Command
              云端，无需配置本地服务器。小规模部署通常不到 1 小时即可完成站点设置。多站点企业上线由单一 Command 仪表盘管理，中央 IT 团队可远程分批推进。

              集成生态覆盖身份提供商（Okta、Azure Active Directory）、用于安全运营的 SIEM 和 SOAR 平台、实体门禁系统（Brivo、Lenel），以及自动开通和撤销用户权限的 HR
              平台。Verkada 在 developer.verkada.com 发布 REST API 和 webhook 框架，方便客户和合作伙伴构建自定义集成。2026 年 1 月，Carahsoft
              Technology 开始通过其经销商网络向联邦、州和地方政府客户分销 Verkada，把销售覆盖扩展到 SLED 细分市场。

              截至 2026 年初，已公开路线图方向包括：AI 原生搜索能力扩展到环境传感器和门禁日志关联；面向企业空间规划的更深 Workplace 分析；更多门禁控制形态（包括支持开放标准 OSDP
              reader）；以及面向工业和实验室环境的更广环境传感器覆盖。FTC/DOJ 同意令要求至少到 2027 年持续升级特定安全基础设施，包括强化审计日志和第三方评估节奏。准确 OTA
              更新排期、功能发布日历和平台弃用时间线未公开，给规划多年路线图对齐的集成合作伙伴留下尽调缺口。
