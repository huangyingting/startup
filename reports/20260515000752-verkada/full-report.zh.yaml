      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >-
              Verkada 以直接企业销售为主，并用不断扩大的渠道项目补充。公司按行业垂直和地理区域配置外勤和内勤销售团队。企业客户经理覆盖中型市场到大型企业买方；Carahsoft 合作通过成熟的 GSA-schedule
              分销商，拓宽政府和 SLED 垂直市场。至少自 2023 起，公司就在推进国际扩张，但地理收入拆分没有披露。


              公开材料中最清晰的 GTM 效率信号，是大客户队列：截至 late 2025，年合同额超过 $100,000 的企业账户约 4,700 家，同比增长
              43%。如果这一增速持续，意味着企业细分的净收入留存很强——既有新 logo，也有存量账户扩张——但公司并未正式发布 NRR 或 GRR。Glassdoor 评论描绘了一个高节奏企业销售环境，配套有竞争性的
              on-target earnings 结构，说明公司已经搭建了规模不小的背指标销售队伍。总客户基数为 30,000 家，覆盖各种规模组织，但 4,700 家企业客户队列（每家 $100K+）的 ACV
              集中度说明，这一细分是主要收入驱动。


              本章审阅的任何公开来源，都没有披露销售周期、全口径 CAC、回本周期、赢单率或配额达成率。公开记录支持 GTM 动能这一方向性判断，但不能支撑可承销的销售效率指标。
