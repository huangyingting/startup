      - number: '4.3'
        title: 成本结构与利润率轮廓
        blocks:
          - type: paragraph
            body: >-
              Verkada 的成本结构由混合硬件软件模式塑造，各收入构成的利润率轮廓有结构性差异。硬件承担制造、元件、物流和保修成本，类似无晶圆厂或合约制造设备业务；参照
              Meraki（Cisco）等云管理硬件厂商，单看硬件的毛利率估计为 30–40%。相比之下，云订阅层主要是 SaaS 成本结构：云基础设施（AWS 或同类）、边缘和云分析所需的 AI 算力，以及客户支持。按
              Bessemer 和 OpenView 基准，可比企业云平台规模化后，SaaS 利润率的行业常态为 80–85%。


              混合毛利率——按 Verkada 设备挂载模式把硬件和 SaaS 合并——估计为 60–70%。这一估计与 SaaStr 对硬件加 SaaS 公司在类似 ARR 规模的分析一致，也与 Verkada 竞争对手
              Motorola Solutions 等上市可比公司的报告利润率一致，后者包含硬件和软件组合。不过，这只是分析师推导，不是公司披露数字。


              毛利以下，Verkada 成本结构包含大量研发投入（公司全球约 1,700 名员工，工程人员占比较高）、销售和营销（企业销售团队、渠道赋能、现场活动）以及一般和行政费用，其中包括 2021
              泄露及后续监管程序后的显著法律和合规支出。月度烧钱速度没有披露。营业利润、EBITDA 和自由现金流也都没有公开分享。
