      - number: '3.2'
        title: 直接云原生竞争对手
        blocks:
          - type: paragraph
            body: >
              在云原生视频竞争对手中，Verkada 面对三家有意义的挑战者：Eagle Eye Networks、Rhombus Systems 和 Cisco Meraki MV。Eagle Eye Networks
              创立于 2012，总部位于 Texas Austin，已融资约 $140 million，包括 SoftBank Vision Fund 领投的 Series C。公司采取渠道合作伙伴优先模式，面向 SMB
              和企业客户提供可连接多厂商摄像头的云 VMS，这直接威胁 Verkada 在渠道合作伙伴心智中的位置。不过 Eagle Eye 缺少原生门禁、报警或环境传感器产品，因此在多产品平台交易中替代 Verkada
              的能力有限。


              Rhombus Systems 是一家创立于 2016 的风投支持初创公司，已融资约 $60 million，并常被渠道合作伙伴视为最接近的直接 Verkada 替代品。Rhombus
              架构同样云原生，部署也更简单，主要在中型市场交易中竞争；这些交易里，买方认为 Verkada 太贵。其产品广度更窄——主要是摄像头加有限传感器——因此更像点解决方案，而不是平台。Cisco Meraki MV
              提供云管理摄像头，并与 Cisco 更广泛的 IT 管理仪表盘集成，在 IT 主导的企业部署中竞争；这些客户的网络往往已由 Meraki 管理，全球超过 400,000 家组织如此。


              在门禁领域，Brivo、Openpath（2021 被 Motorola Solutions 收购）、Kisi 和 Salto Systems 都直接竞争 Verkada 的门禁硬件和云门禁软件。Brivo
              是面向企业客户的领先云 ACaaS 纯玩家。Openpath 已整合进 Avigilon 产品家族，在 Motorola 体系下形成门禁加视频组合方案。Kisi 用开发者友好的 API-first
              路线服务技术前沿型组织。这些门禁专家都没有可比的视频监控能力，使 Verkada 在视频加门禁组合交易里拥有结构性优势。
