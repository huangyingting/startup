      - number: '7.3'
        title: 运营、安全与技术风险
        blocks:
          - type: paragraph
            body: >-
              2021 年 3 月 Verkada 泄露中，黑客访问了约 150,000 台摄像机的实时和归档视频，客户包括
              Tesla、Cloudflare、医院和惩教设施。事件暴露了公司集中式云架构的根本安全风险：一组可在网上发现、且没有多因素认证的超级管理员凭证，让攻击者同时访问整个客户设备群。泄露后整改包括强制
              MFA、HackerOne bug bounty 计划，以及 FTC 要求的全面安全计划。但促成泄露的底层架构——跨所有客户摄像机的云托管特权访问——并未重做；攻击面仍内生于集中式模型，而集中式模型恰恰也是
              Verkada 竞争差异化的来源。

              硬件供应链集中是第二个运营风险。Verkada 摄像机依赖少数供应商提供的第三方 SoC
              芯片组，设备由合同伙伴制造，地理集中又带来关税、出口管制和产能中断敞口。半导体供应链冲击若延误硬件交付，将同时扰动硬件收入线，以及绑定到新设备上的经常性云订阅收入。长时间云基础设施故障会让整个已安装基础同时失去所有依赖云端的管理、分析、告警和远程访问功能。

              渠道合作伙伴摩擦是更慢燃的风险。Verkada 的订阅模型替代了集成商几十年来销售的纯设备采购。大型全国性集成商已经适应，但许多区域玩家仍偏好传统竞争对手提供的模式，限制 Verkada
              通过间接渠道打入中端市场账户。客户现场对既有本地部署系统的集成商忠诚度，也让尚未迁移到云端实体安防的账户存在切换成本阻力。
