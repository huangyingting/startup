      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              云物理安全市场受多重长期驱动。最强的一条，是从传统本地 DVR/NVR 系统持续迁移到云原生平台，类似过去二十年企业软件的 SaaS 迁移。分析机构估计，目前只有 10-15%
              的商业视频监控摄像头由云管理，意味着转换空间很大。AI 和机器学习能力——包括人脸识别、物体检测、行为分析和异常检测——正越来越成为标配，而云架构可以用集中算力更有效地交付这些能力。


              监管驱动也支撑采用，包括楼宇安全规范、工作场所安全法规（OSHA）、医疗合规（HIPAA），以及校园安全担忧后出现的教育安全要求。环境、社会和治理（ESG）报告越来越受重视，也推高了空气质量监测和空间占用分析的兴趣，直接利好
              Verkada 的环境传感器产品线。物理安全和网络安全融合是另一条驱动，因为组织希望用统一平台同时提供物理门禁控制和数字审计轨迹。


              但采用约束同样明显。数据主权和隐私担忧会限制某些地区（EU、政府部门）的云采用，不过 Verkada
              的混合云架构通过在设备端处理和存储录像，部分缓解了这个问题。替换已安装摄像头硬件的切换成本很高，尤其是上千台摄像头的大型部署，惯性更强。单一供应商依赖也是顾虑之一；Verkada 自己的 2021
              泄露事件放大了这种担忧，让一些企业买方不愿把全部物理安全集中到一个云平台。渠道动态也重要：传统安全集成商可能抵触云平台，因为云平台会绕过他们原有的 NVR 维护经常性收入流。
