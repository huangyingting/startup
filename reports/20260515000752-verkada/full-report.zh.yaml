  - id: TV006
    title: 最终尽调索取清单
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 负责人 / 尽调路径
    rows:
      - - 审计财务报表
        - 经审计或复核的 2024 和 2025 年收入、毛利率、EBITDA 和现金消耗
        - $806M 收入估计只是分析师共识；实际数字驱动所有估值模型；毛利率决定倍数是否合适
        - 向 Verkada CFO 索取，并要求审计师确认；任何出资承诺前，将其作为关口级要求
      - - 股权结构表和优先权瀑布
        - 完整股权结构表，涵盖所有优先股系列条款、清算优先权、期权池、转换和 pay-to-play 条款
        - $800M+ 优先股造成复杂瀑布；没有优先股堆叠数据，无法建模回报
        - 正式尽调中向 Verkada 法务顾问和 CFO 索取
      - - 净留存率（NRR）数据
        - 至少过去 4 个季度按队列拆分的 NRR，最好按企业和中端市场再拆分
        - NRR 是最重要的增长质量指标；7x 倍数要求 NRR ≥110%；更低 NRR 会打破增长模型
        - 向 Verkada VP Finance 或 CRO 索取；要求季度队列数据，而不只是混合年度数字
      - - ITC 专利案状态
        - Motorola Solutions / Avigilon ITC Section 337 投诉的当前程序状态；任何和解谈判、ALJ 裁决或委员会复核时间线
        - 不利排除令会禁止硬件进口，切断硬件 + 订阅捆绑，并立即扰乱收入
        - 直接审阅 USITC 案卷；聘请外部专利律师评估不利裁决的概率和时间线
      - - FTC 同意令合规日志
        - 2024 年 9 月 FTC 同意令要求的独立安全审计报告；合规认证及任何未结整改项
        - 不合规会触发新的 FTC/DOJ 执法；受监管行业的企业买家（FSI、医疗、政府）需要同意令合规证明
        - 向 Verkada 总法律顾问索取；对照 FTC 案卷核验；确认两年一次的审计进度正常
    notes: 这五项尽调要求是重大投资决定的最低门槛信息，不是完整尽调清单。每项都有具体关口级理由：缺少它，就无法正确量化回报模型、风险评估或监管敞口。
    claimRefs:
      - CV004
      - CV006
      - CV009
      - CV010
      - CV024
