      - number: '8.4'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              可比公司集合分四层看。带硬件的上市 SaaS 同业——Motorola Solutions（Avigilon，市值 $65B+，约 6.5x 收入）和 Alarm.com（市值约 $3B，约 5x
              收入）——给具备硬件 / 软件混合经济性的实体安防平台划出估值底线 [CV011][CV014]。这些同业以保守倍数交易，因为硬件会带来收入波动、COGS 拖累和供应链风险。Verkada 的 7.2x
              倍数高于这条底线，必须靠云原生架构和更高的经常性订阅占比来解释。

              高增长云 IoT 与云安防同业——Samsara（市值约 $20B，约 20x 收入）和 Axon Enterprise（市值约 $35B，约 18x 收入）——划出估值天花板
              [CV012][CV013]。这些同业能拿到溢价倍数，靠的是 35-50% 收入增长、接近 100% 的 GRR，以及持续扩张的平台生态。Verkada 的 7.2x
              倍数较这一天花板折价很深，反映投资者仍不确定它的硬件敞口、同意令和专利风险。

              CrowdStrike（市值约 $90B，约 15x 收入）提供了纯云安全 SaaS 规模化后的参照；它体量太大、利润率太厚，不适合直接可比，但为云安全平台划出渐近估值上限 [CV017]。

              私有可比公司给云 VMS 的底线提供信息：Eagle Eye Networks（融资 $100M+，估值未披露）和 Rhombus Systems（规模较小、云原生）都与 Verkada
              直接竞争，但近期估值未披露 [CV016]。这些公司在更小规模上的融资轮次印证，云 VMS 业务确实能拿到企业 SaaS 的溢价倍数；但 Verkada 的规模（$800M+
              ARR）与这些早期可比公司已不是一个量级。

              净结论：按 7.2x 收入计，Verkada 的价格押注其继续保持 25%+ 增长——高于传统硬件底线，但需要它一路长进云增长天花板 [CV015][CV025]。
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV025
