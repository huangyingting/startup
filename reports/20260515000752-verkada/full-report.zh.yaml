  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 从市场规模、平台护城河、增长证据、监管风险、估值评估和情景概率，一路推导出对 Verkada 的观察建议。
    approximationNotes: null
    claimRefs:
      - CV001
      - CV005
      - CV009
      - CV022
      - CV023
      - CV024
    data:
      nodes:
        - id: n1
          label: 市场：$20B+ 云物理安全 TAM；从本地部署迁移的比例 <10%
          detail: 市场大、渗透率低，迁移顺风长期存在
        - id: n2
          label: 平台护城河：统一云架构（摄像头 + 门禁 + 传感器 + 警报）
          detail: 唯一一个在企业规模上把所有物理安全层接到同一云后端的厂商
        - id: n3
          label: 收入增长：2025 年估计 $806M；5 年 CAGR 约 50%
          detail: 增长强劲；收入只是分析师估计，官方未披露
        - id: n4
          label: 客户证据：CapitalG 于 2025 年 12 月以 $5.8B 估值进入；企业客户基础
          detail: CapitalG 背书有意义；客户数和 NRR 未披露
        - id: n5
          label: 监管风险：FTC/DOJ 2024 年 9 月同意令；ITC 专利诉讼进行中
          detail: 现行执法是主要风险，把投资确信度从买入压到观察
        - id: n6
          label: 泄露历史：2021 年 3 月 150k 台摄像头泄露；复发将打破投资逻辑
          detail: 集中式云架构造成结构性单点故障
        - id: n7
          label: 估值：$5.8B = 估计 NTM 收入约 7.2x——相对传统同业偏高
          detail: 高于 MSI/ALRM 底部；低于 AXON/IOT 上限；安全边际有限
        - id: n8
          label: 乐观路径：ITC 解决 + 收入 ≥$1.3B → 2-2.6x 回报的买入触发点
          detail: 20-25% 概率；需要 ITC 解决和持续 30% 增长同时成立
        - id: n9
          label: 悲观路径：ITC 排除令或违反同意令 → 投资逻辑破裂
          detail: 25-30% 概率；任一事件都会迫使立即下调
        - id: n10
          label: 建议：观察——中等确信度；高风险；入场价格偏高
          detail: 没有经审计财务、NRR 数据和 ITC 案件状态，不应以 $5.8B 估值出手
      edges:
        - from: n1
          to: n2
          label: TAM 支撑平台投入
        - from: n2
          to: n3
          label: 平台粘性拉动留存
        - from: n3
          to: n4
          label: 收入增长验证投资人入场
        - from: n4
          to: n5
          label: 监管敞口压住确信度
        - from: n5
          to: n6
          label: 执法放大泄露复发风险
        - from: n6
          to: n7
          label: 风险溢价压低倍数
        - from: n7
          to: n8
          label: 乐观路径需要双催化
        - from: n7
          to: n9
          label: 任一风险兑现都会触发悲观路径
        - from: n8
          to: n10
          label: 乐观路径 → 上调至买入
        - from: n9
          to: n10
          label: 悲观路径 → 下调至回避
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 将不同收入倍数套用在 2025 年 $806M 估计收入基数上，得到 Verkada 隐含企业价值，展示从悲观到乐观情景的区间。
    approximationNotes: 收入基数（$806M）为分析师估计；Verkada 未披露财务结果。倍数区间来自截至 2026 年 Q1 的可比公司分析。
    claimRefs:
      - CV005
      - CV011
      - CV013
      - CV019
      - CV020
      - CV021
    data:
      items:
        - label: 悲观：4.5x × $806M（传统安防底部）
          value: 3.6
          note: 接近 ADT/MSI 底部倍数；适用于增长放缓至 <15% 且 ITC 风险兑现的情形
        - label: 悲观-基准：5.5x × $806M（Alarm.com 可比）
          value: 4.4
          note: 若云 SaaS 溢价部分兑现，适用 ALRM 可比倍数
        - label: 基准：7.2x × $806M（当前入场估值）
          value: 5.8
          note: 2025 年 12 月 CapitalG 估值；收入基数采用分析师共识
        - label: 基准-乐观：8.5x × $806M（增长溢价）
          value: 6.9
          note: 若收入确认在 $800M+ 且 ITC 案件有利解决
        - label: 乐观：10x × $806M（Samsara 区间增长可比）
          value: 8.1
          note: 若 30%+ 增长持续，且 NRR 确认高于 120%
        - label: 完全乐观：13x × $806M（Axon / 云上限）
          value: 10.5
          note: 渐近上限；需要纯云毛利率画像和公开市场 IPO 溢价
        - label: 退出上行：10x × $1.1B 估计 2027 年收入
          value: 11
          note: 乐观情景 IPO，以 2027 年基准情景收入计算；相对当前入场有 90% 上行
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: Verkada 在悲观、基准、乐观情景下的低 / 基准 / 高企业估值区间，以及以 2025 年 12 月 $5.8B 估值入场的示例性回报倍数。
    approximationNotes: 所有 EV 估计均为分析师估计。实际回报取决于优先股堆叠、未来轮次稀释、退出时间和 IPO 时公开市场环境。不保证回报； 模型仅作示例。
