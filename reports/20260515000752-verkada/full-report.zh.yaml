        - label: 乐观情景企业价值（2027-2028）
          low: 10000
          base: 12000
          high: 15000
          unit: USD M
          note: 30-35% 增长，ITC 解决，以 9-10x 倍数 IPO；相对 $5.8B 入场回报 2-2.6x
        - label: 当前入场估值（2025 年 12 月）
          low: 5800
          base: 5800
          high: 5800
          unit: USD M
          note: CapitalG 领投 $100M 轮，投后估值 $5.8B；回报建模参考点
        - label: 2x 回报门槛（最低要求）
          low: 11600
          base: 11600
          high: 11600
          unit: USD M
          note: 入场后实现 2x 净回报所需的最低退出额；基准情景只是略高于该门槛
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: compact
    summary: 面向 IC 的 Verkada 八项投资维度评分，采用 1-10 分制，并附证据质量说明。
    approximationNotes: 分数是分析师基于公开证据的判断。官方财务数据（收入、毛利率、NRR）会显著改变多个分数。
    claimRefs:
      - CV001
      - CV002
      - CV004
      - CV009
      - CV022
      - CV025
    data:
      items:
        - label: 市场机会
          value: 8/10 — Large, underpenetrated $20B+ cloud physical security TAM; strong enterprise migration tailwind
        - label: 平台护城河
          value: 7/10 — Cloud-native unified architecture is differentiated; Eagle Eye and Rhombus closing the gap
        - label: 收入增长
          value: 7/10 — ~50% 5-year CAGR estimated; unverified by official disclosure; CapitalG validates momentum
        - label: 监管 / 法律风险
          value: 3/10 — Active FTC/DOJ consent decree + ITC patent litigation; both are live thesis-break risks
        - label: 财务透明度
          score: 3
          note: 3/10 — 未官方披露收入、利润率或 NRR；$806M 估计仅为分析师共识
        - label: 可比估值
          value: >-
            5/10 — 7.2x blended multiple stretched vs legacy peers; discount to cloud growth comps; defensible if growth
            sustains
        - label: 退出准备度
          value: 6/10 — Scale and momentum support IPO; ITC case and consent decree are blocking issues
        - label: 整体投资评分
          value: '6.5/10 — TRACK: compelling platform with high residual risk and opaque financials'
