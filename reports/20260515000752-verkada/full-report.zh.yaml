        - 新的 FTC 或 DOJ 执法往来；同意令合规审计发现
        - 任何违规通知、额外罚款或审计失败都会触发合规审查
        - 投资逻辑破裂 — 重新评估整套监管风险；可能暂停或退出
      - - 不利的 ITC 进口禁令裁决（Motorola/Avigilon 专利案）
        - ITC 初步裁定和委员会复审日程；法院案卷更新
        - 发布排除令，禁止进口海外制造的 Verkada 摄像头
        - 投资逻辑破裂 — 硬件供应中断实质损害订阅附加；触发退出
      - - 企业或政府规模的数据泄露复发
        - 重大安全事件的自愿披露、FTC 通知或可信媒体报道
        - 任何确认影响企业客户数据或摄像头完整性的重大泄露事件
        - 投资逻辑破裂 — 客户信任崩塌、监管升级和 NRR 恶化连锁发生
      - - CEO 关键人事件（Filip Kaliszan 离任或丧失履职能力）
        - 董事会新闻稿、高管离任披露或可信媒体报道
        - 宣布 CEO 离任，但未确定并准备好继任者
        - 重大风险上升 — 暂停尽调；评估董事会继任和治理应急计划
      - - NRR / 客户流失恶化
        - 季度业务回顾、投资方更新或行业分析师跟踪
        - NRR 连续两个报告期低于 100%，或出现重要大客户流失
        - 降低确信度——重新审视先落地再扩张逻辑和定价模型韧性
      - - 关键市场监管叫停人脸识别产品
        - 州立法跟踪器；市政条例公告；FTC 规则制定通知
        - California、New York 或 Texas 已颁布私营部门人脸识别禁令
        - 收入模型影响——下调分析产品线 TAM 估计；重新评估定价权
    notes: >-
      阈值只是指示性，不构成合同约定。投资逻辑破裂指核心投资逻辑被直接推翻的事件；默认动作应是暂停新增投资，或在全面重新评估前退出现有持仓。重大风险升高会触发尽调暂停和重新评估，但不自动退出。每个触发项的监控责任，应在投资交割前分配给具名团队成员或外部律师。
