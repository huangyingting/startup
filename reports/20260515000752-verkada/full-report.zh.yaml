  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: 沿发生可能性和影响两个轴看剩余风险分布。数据泄露复发和违反同意令占据“严重”列。专利诉讼、竞争压力和 FTC 执法位于“高”列。人脸识别禁令和供应链中断构成中等层级。
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 严重影响
      rows:
        - label: 高可能性
          values:
            - ''
            - 人脸识别禁令扩大
            - 被竞争对手替代的风险
            - 数据泄露复发
        - label: 中等可能性
          values:
            - 渠道合作伙伴流失
            - 供应链中断
            - 文化与 HR 问题升级
            - 违反 FTC 同意令
        - label: 低可能性
          values:
            - 轻微固件漏洞
            - CEO 关键人事件
            - ITC 专利进口禁令
            - AWS 平台长时间宕机
    claimRefs:
      - CR001
      - CR015
      - CR040
      - CR041
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: 从 Verkada 主要风险节点，经客户信任和增长指标，传导到估值和融资结果的因果路径。法律和安全风险共用一条经过客户信任的传导通道。
    data:
      nodes:
        - id: legal
          label: FTC/DOJ 执法
          detail: 现行同意令包含永久禁令和每两年一次审计义务。
          tone: negative
        - id: patent
          label: 专利诉讼（Motorola ITC）
          detail: Section 337 投诉可能导致排除令；反诉仍在进行。
          tone: warning
        - id: breach
          label: 泄露复发风险
          detail: 集中式云架构仍有结构性单点故障访问风险。
          tone: warning
        - id: culture
          label: 文化与 HR 风险
          detail: 骚扰历史已有记录；单一 CEO 带来关键人集中风险。
          tone: warning
        - id: trust
          label: 客户信任
          detail: 企业和政府客户在 2021 年事件后是否愿意加深部署。
          tone: warning
        - id: revenue
          label: 收入与 NRR
          detail: ARR 能否守住，取决于续约率和初始摄像头部署后的扩张。
          tone: warning
        - id: valuation
          label: 估值倍数
          detail: $5.8B，对应估计收入 5-7x；溢价压缩负面事件容错空间。
          tone: negative
        - id: financing
          label: 融资与 IPO 路径
          detail: IPO 前公司；若增长或信任走弱，可能遭遇估值下调轮或退出推迟。
          tone: negative
      edges:
        - from: legal
          to: trust
          label: 侵蚀企业信心
        - from: legal
          to: revenue
          label: 推高合规成本负担
        - from: patent
          to: revenue
          label: 扰动硬件进口
        - from: breach
          to: trust
          label: 客户流失风险
        - from: breach
          to: revenue
          label: 流失冲击收入
        - from: culture
          to: revenue
          label: 人才缺口拖慢执行
        - from: trust
          to: revenue
          label: 留存与扩张放缓
        - from: revenue
          to: valuation
          label: 倍数压缩
        - from: valuation
          to: financing
          label: 估值下调融资或 IPO 推迟
    claimRefs:
      - CR015
      - CR040
      - CR041
      - CR042
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: Verkada 在云基础设施、硬件供应链、渠道合作伙伴、投资人和监管机构上的关键外部依赖。供应链依赖（云、芯片组、代工制造） 集中风险最高。
    data:
      nodes:
        - id: verkada
          label: Verkada
          detail: 云托管物理安全平台；硬件 + SaaS 模式。
          tone: warning
        - id: cloud
          label: 云提供商（AWS / 超大规模云厂商）
          detail: Command 平台托管、存储、分析；身份未公开确认。
          tone: warning
        - id: soc
          label: SoC 芯片组供应商
          detail: 端侧 AI 算力；Ambarella 和同类供应商（推断）。
          tone: warning
        - id: mfg
          label: 合同制造商
          detail: 摄像头和门禁控制设备组装；可能在中国 / 台湾（推断）。
          tone: warning
        - id: channel
          label: 安全集成商
          detail: 间接销售、安装和支持；Carahsoft 面向政府。
          tone: warning
        - id: investor
          label: CapitalG / Alphabet
          detail: 2025 年 12 月 $5.8B 估值融资的领投方；释放战略 AI 合作信号。
          tone: positive
        - id: regulator
          label: FTC / DOJ / USITC
          detail: 现行同意令义务；待决 ITC 专利案件尚需结果。
          tone: negative
        - id: customer
          label: 企业客户（~30K）
          detail: Fortune 500、教育、医疗、政府；关键收入与信任节点。
          tone: warning
      edges:
