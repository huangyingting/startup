  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: Verkada 的五层混合云架构底层是硬件端点，中间是端侧边缘智能，上方是云管理，顶层是集成 API 层。该结构去掉了 NVR/DVR 硬件，同时保留本地录像韧性。
    data:
      layers:
        - label: 硬件端点
          detail: 安防摄像头（室内 / 室外半球、枪机、鱼眼、多传感器、LPR）、门禁读卡器（Reader D 系列）、警报传感器（中枢、门 / 窗、运动、玻璃破碎、紧急按钮）、环境传感器（SV-series）、对讲机和访客管理终端。
        - label: 边缘处理（端侧 SoC + SSD）
          detail: 定制 SoC 内嵌 NPU，用于实时 AI 推理（物体检测、人员 / 车辆分类、运动分析）。AES-256 加密 SSD 提供 30–365 天本地视频存储。云端断连时，设备仍可独立运行。
        - label: 网络与连接
          detail: 标准 PoE+ / LAN 连接。加密后的视频元数据和片段通过 TLS 1.3 同步到云端。带宽已优化：只同步片段和元数据， 不同步连续原始视频流。即插即用配置——不需要本地服务器配置。
        - label: Command 云平台（AWS）
          detail: 面向所有产品线的浏览器统一仪表盘。能力包括：AI 视频搜索、门禁管理、警报监控、环境仪表盘、RBAC、MFA、 审计日志、OTA 固件更新、多站点管理、基于角色的权限。
        - label: API 与集成层
          detail: >-
            REST API 和 webhook 支持双向数据交换。已认证集成包括 Okta、Azure AD、SIEM/SOAR、HR 平台、楼宇管理系统。developer.verkada.com
            提供开发者文档，覆盖端点、事件 payload 和 OAuth 认证。
    claimRefs:
      - CE001
      - CE005
      - CE006
      - CE008
      - CE009
      - CE017
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: wide
    summary: 端到端工作流从实体安防事件开始，经过边缘 AI 处理、加密云同步、运营人员告警，再生成审计轨迹。该图展示 Verkada 的混合架构如何映射到客户安防运营流程。
    data:
      nodes:
        - id: physical-event
          label: 实体安防事件
          detail: 客户现场出现门禁尝试、未经授权的移动、环境阈值突破（CO2、温度）、访客到达或行为异常。
        - id: device-detect
          label: Verkada 设备捕捉事件
          detail: 摄像头、门禁读卡器、警报传感器、环境传感器或对讲机在硬件层记录触发信号。
        - id: edge-ai
          label: 端侧 AI 本地处理
          detail: 嵌入式 NPU 分类人员 / 车辆、检查运动区域、评估传感器阈值，并生成事件元数据——全程无需云端往返。
        - id: local-ssd
          label: 片段和元数据写入 SSD
          detail: 加密 AES-256 片段存储在本地 SSD（30–365d 留存）。即使云连接丢失也继续录像，恢复连接后再同步。
        - id: cloud-sync
          label: 加密同步到 Command Cloud
          detail: 片段缩略图和元数据通过 TLS 1.3 同步到 AWS。完整片段可按需调取；AI 搜索索引会用事件属性和分类更新。
        - id: alert-notify
          label: 发送告警或通知
          detail: 向指定安防运营人员推送通知或发送邮件告警；若已配置集成，则向 SIEM、BMS 或工单系统发送 webhook payload。
        - id: operator-review
          label: 运营人员在 Command 仪表盘复核
          detail: 安防运营人员访问浏览器仪表盘：实时画面、AI 驱动的视频片段搜索、回放、门禁日志和跨站点关联。
        - id: action-audit
          label: 采取动作并生成审计日志
          detail: 远程开门、激活警报、派遣人员或创建事件工单。所有动作记录在不可篡改的审计日志中，供合规和取证访问。
      edges:
        - from: physical-event
          to: device-detect
          label: 触发捕捉
        - from: device-detect
          to: edge-ai
          label: 原始传感器数据进入 NPU
        - from: edge-ai
          to: local-ssd
          label: 分类后的片段写入
        - from: edge-ai
          to: alert-notify
          label: 阈值突破触发告警
        - from: local-ssd
          to: cloud-sync
          label: 加密同步
        - from: cloud-sync
          to: operator-review
          label: 片段可在 Command 调取
        - from: alert-notify
          to: operator-review
          label: 收到告警
        - from: operator-review
          to: action-audit
          label: 动作和审计日志
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE010
      - CE011
  - id: FE003
    title: 关键依赖图
    type: dag
    layout: wide
    summary: Verkada 产品交付的依赖图涵盖硬件供应链、云基础设施、渠道分销、合规义务和集成生态。关键集中风险在于未披露的 SoC 供应商，以及对 AWS 的单一云依赖。
    data:
      nodes:
        - id: verkada-hq
          label: Verkada HQ（软件、固件、AI）
          detail: 软件开发、AI 模型训练、固件工程、云运营。所有产品设计和更新权限都集中在这里。
        - id: soc-supplier
          label: SoC / NPU 芯片供应商（未披露）
          detail: 带神经引擎的嵌入式 AI 芯片；关键单一来源风险；供应商身份未公开披露；暴露于半导体供应链。
        - id: contract-mfr
          label: 代工厂（亚洲）
          detail: PCB 组装、SoC 集成、SSD 安装、QC 和测试。具体代工厂未公开识别；很可能位于亚洲。
        - id: aws-cloud
          label: AWS 云基础设施
          detail: Command 平台托管、视频片段存储、AI 搜索索引、API 网关、OTA 固件分发。依赖单一云厂商。
        - id: enterprise-customer
          label: 企业客户现场
          detail: PoE 交换机、网络连接、实体设备安装都由客户管理。Verkada 只负责软件和预配置。
        - id: distribution
          label: 渠道与分销（Carahsoft、经销商）
          detail: Carahsoft Technology（SLED/Federal，Jan 2026 宣布）、授权经销商、直销企业客户。没有独家分销依赖。
        - id: api-ecosystem
          label: 集成合作伙伴生态
          detail: Okta、Azure AD、SIEM/SOAR 供应商、HR 系统、BMS 平台；加深平台锁定，并拓宽使用场景。
        - id: ftc-doj
          label: FTC / DOJ 同意令
          detail: 永久禁令（Sep 2024）要求 ISP、第三方安全审计、强化审计日志，并至少到 2027 持续提交合规报告。
      edges:
        - from: soc-supplier
          to: contract-mfr
          label: 芯片供应到组装
        - from: contract-mfr
          to: enterprise-customer
          label: 预配置设备发货
        - from: verkada-hq
          to: contract-mfr
          label: 硬件设计规格和固件
        - from: verkada-hq
          to: aws-cloud
          label: 云平台运营
        - from: aws-cloud
          to: enterprise-customer
          label: Command 管理和 AI 搜索
        - from: enterprise-customer
          to: api-ecosystem
          label: Webhook 和 API 集成
        - from: distribution
          to: enterprise-customer
          label: 渠道履约
        - from: ftc-doj
          to: verkada-hq
          label: 平台合规义务
        - from: verkada-hq
          to: enterprise-customer
          label: OTA 固件更新
    approximationNotes: 代工厂位置和 SoC 供应商基于垂直整合安防硬件公司的行业惯例推断；Verkada 未公开披露这些关系。AWS 依赖来自公开架构描述和招聘信息推断。
    claimRefs:
