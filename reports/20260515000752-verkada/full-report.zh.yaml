        title: 点名客户证据
        blocks:
          - type: paragraph
            body: >-
              以实体安防领域的后期私营公司标准看，Verkada 的点名客户证据偏强：多个 Fortune 500 账户通过案例研究、新闻稿和第三方报道得到确认。证据等级最高的是那些关系早于 2021
              年泄露、且在泄露后仍留存的客户——这证明逆风下的留存韧性。

              Equinox Fitness 已被确认是 Verkada 第一个大型企业客户（2017 年），也是公开资料中时间最长的参考客户。Equinox 在数十家健身俱乐部部署摄像机，并出现在 Verkada
              官方案例库中。关系跨多站点、持续多年，证据质量在可得材料中最高——公司案例研究又被多篇媒体报道佐证。

              Tesla 是已确认的 Verkada 摄像机客户，其工厂摄像机画面在 2021 年 3 月泄露中遭访问。泄露后，据报道 Tesla 仍留在
              Verkada（未有公开解约公告）。泄露事件提供了可独立验证的生产环境部署证据。Cloudflare 的办公室摄像机访问也在此次泄露中受影响。

              LA Rams（NFL）在 Verkada 案例研究中被列为生产客户，在 SoFi Stadium 设施使用 Verkada 摄像机和门禁控制。奢侈外套零售商 Canada Goose 用 Verkada
              摄像机做零售防损，并发布了 Verkada 案例研究。The Salvation Army 是已确认的非营利部署，出现在 Verkada 渠道材料和行业媒体中。

              Sandy Hook Elementary School 是高知名度教育参考客户，对学校安全营销也有象征意义。Zionsville Community Schools 和 Durham College 出现在
              K-12 和高等教育案例研究中。Harry Rosen（加拿大奢侈品零售商）和 Citrix（企业技术）补齐公开点名客户集合。

              证据质量不一：Verkada 自己撰写的案例研究是公司一手来源（并非独立来源），The Verge 和 Bloomberg 的泄露报道则为 Tesla 和 Cloudflare
              的生产部署提供独立第三方确认。点名客户名单只是局部——Verkada 约有 30,000 家客户，但公开材料中点名不足 15 家。
