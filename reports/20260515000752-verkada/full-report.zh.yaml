            title: 长期云迁移顺风支撑溢价增长
            body: >
              商业视频监控摄像头目前只有 10-15% 由云管理。企业替换老旧 DVR/NVR 基础设施时，Verkada 受益于庞大且持久的长期顺风。云细分以 20-30% CAGR 增长，而整体物理安全市场为
              8-10%，支撑 Verkada 的溢价估值。
            calloutType: strength
            claimRefs:
              - CM017
