      - number: '1.5'
        title: 快照 KPI 与数据缺口
        blocks:
          - type: paragraph
            body: >
              Verkada 的关键经营指标显示，这是一家接近 $1 billion 收入门槛的高增长私营公司。公司 2025 收入估计为 $806 million，较早期已有显著增长；在 2018-2019 前后，公司只有
              11 名员工，却已实现数千万美元销售额。客户基数从 Series D（October 2023）时约 20,000 家，扩大到 2025 年底约 30,000 家。大客户定义为年消费 $100,000
              或以上；截至 February 2025，公司拥有超过 4,700 家这类客户，同比增长 43%，说明企业端采用和扩张动能较强。


              但从尽调角度看，关键数据缺口仍然很大。Verkada 不公开披露经审计财务报表、毛利率、净留存率（NRR）或 ARR 拆分。公司员工数估计约 1,700
              人，但并未定期正式披露。硬件销售、软件订阅和专业服务之间的收入构成也没有公开数据，难以判断经常性收入质量或利润率轮廓。按 December 2025 的 $5.8 billion 估值计算，估值倍数约为
              trailing revenue 的 7.2x，让 Verkada 落在高增长 SaaS 相邻安全公司的区间，但高于传统硬件同行。
