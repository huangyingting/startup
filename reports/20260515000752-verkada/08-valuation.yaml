  - CV022
  - CV028
  - CV037
- id: TV006
  title: Final Diligence Asks Table
  columns:
  - Topic
  - Missing Evidence
  - Why It Matters
  - Owner / Diligence Path
  rows:
  - - Audited financial statements
    - Audited or reviewed 2024 and 2025 revenue, gross margin, EBITDA, and cash burn
    - $806M revenue estimate is analyst consensus only; actual figure drives every valuation model; gross margin determines multiple appropriateness
    - Request from Verkada CFO with auditor confirmation; treat as gate-level ask before any capital commitment
  - - Cap table and preference waterfall
    - Complete cap table with all preferred series terms, liquidation preferences, option pool, conversion, and pay-to-play provisions
    - $800M+ of preferred equity creates complex waterfall; return modeling is impossible without preference stack data
    - Request from Verkada legal counsel and CFO during formal due diligence process
  - - Net Revenue Retention data
    - NRR by cohort for at least 4 trailing quarters, ideally broken down by enterprise and mid-market segments
    - NRR is the single most important growth quality metric; a 7x multiple requires NRR ≥110%; lower NRR breaks the growth model
    - Request from Verkada VP Finance or CRO; require quarterly cohort data, not just blended annual number
  - - ITC patent case status
    - Current procedural status of Motorola Solutions / Avigilon ITC Section 337 complaint; any settlement talks, ALJ ruling, or Commission review timeline
    - An adverse exclusion order would ban hardware imports, severing the hardware-subscription bundle and triggering immediate revenue disruption
    - Review USITC docket directly; engage external patent counsel to assess probability and timeline of adverse ruling
  - - FTC consent decree compliance log
    - Independent security audit reports required under September 2024 FTC consent decree; compliance certification and any open remediation items
    - Non-compliance triggers new FTC/DOJ enforcement; enterprise buyers in regulated sectors (FSI, healthcare, government) require consent decree compliance proof
    - Request from Verkada General Counsel; verify against FTC docket; confirm biennial audit schedule is on track
  notes: 'These five diligence asks are minimum threshold information for a material investment decision. They are not a complete due diligence checklist. Each ask has a specific reason it is gate-level:
    without it, return modeling, risk assessment, or regulatory exposure cannot be properly quantified.'
