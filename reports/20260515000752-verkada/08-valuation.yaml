company:
  name: Verkada
chapter:
  number: 8
  title: Valuation
  summary: 'Recommendation: TRACK. Verkada''s December 2025 valuation of $5.8 billion (CapitalG-led $100M extension) reflects premium pricing at an estimated 7.2x NTM revenue multiple — stretched versus
    legacy physical security peers like Motorola Solutions (~6.5x) but below high-growth cloud IoT comps like Samsara (~20x) and Axon Enterprise (~18x). The investment thesis rests on a compelling cloud-native
    physical security platform with hardware-plus-recurring-subscription economics, a large and underpenetrated $20B+ TAM, and an accelerating enterprise customer base. The anti-thesis rests on an active
    FTC/DOJ consent decree ($2.95M, September 2024), unresolved Motorola/Avigilon ITC patent litigation with import-ban potential, a March 2021 breach that remains a live reputational liability, and limited
    financial disclosure that prevents independent verification of the $806M estimated 2025 revenue figure. The TRACK designation reflects medium confidence in the thesis and high residual risk — a BUY
    trigger requires confirmed revenue at or above $800M ARR, resolution of the ITC patent case, and evidence of sustained NRR above 110%. Confidence in the $5.8B mark is medium; the five required final
    diligence asks (cap table, audited financials, NRR data, patent case status, and consent decree compliance log) must be satisfied before upgrading. Overall investment score: 6.5/10.'
sections:
- id: VSEC01
  title: Investment Thesis and Anti-Thesis
  body: 'Verkada''s investment thesis is built on five reinforcing pillars. First, the company operates the only cloud-native enterprise physical security platform that combines cameras, access control,
    sensors, and alarms on a single unified cloud architecture — a meaningful integration moat that legacy on-premise VMS vendors (Genetec, Milestone) and distributed cloud challengers (Eagle Eye Networks)
    have not yet replicated at Verkada''s scale [CV001][CV002]. Second, Verkada''s recurring software subscription model drives high gross margins on the cloud side, partially offset by hardware COGS; the
    resulting blended margin profile is below pure-SaaS but above traditional security hardware companies [CV003][CV007]. Third, the company has grown from $100M ARR in 2020 to an estimated $806M in 2025
    revenue — a roughly 50% five-year CAGR — anchored in mid-market and enterprise customers where switching costs are high and expansion revenues are predictable [CV004][CV005][CV006]. Fourth, CapitalG''s
    December 2025 entry at $5.8B provides independent institutional validation: CapitalG''s portfolio includes Hubspot, Duolingo, and Stripe, and its enterprise growth track record makes its investment
    a genuine signal about Verkada''s commercial momentum [CV008][CV033]. Fifth, the $20B+ cloud physical security TAM is underpenetrated: fewer than 10% of global commercial buildings have migrated from
    on-premise NVRs to cloud-managed surveillance as of 2025 [CV001][CV002].

    The anti-thesis for Verkada is equally substantive. The FTC/DOJ consent decree (September 2024, $2.95M civil penalty, permanent injunction requiring a comprehensive security program and biennial audits)
    imposes ongoing compliance costs and creates reputational liability with enterprise procurement teams that require security certifications [CV009][CV029]. The March 2021 breach — in which a hacktivist
    group accessed approximately 150,000 camera feeds globally by exploiting a super-admin credential — remains the single most damaging event in the company''s history, and a recurrence would be immediately
    thesis-breaking [CV028][CV031]. The active ITC Section 337 complaint from Motorola Solutions/Avigilon creates an import-ban risk for Verkada''s hardware, which would sever the hardware-subscription
    bundle that is the core commercial model [CV010][CV032]. Finally, at an estimated 7.2x NTM revenue, the $5.8B valuation prices in significant continued growth; any deceleration toward 20-25% revenue
    growth would compress the multiple sharply relative to Samsara and Axon peers who trade on faster growth profiles [CV005][CV015].'
