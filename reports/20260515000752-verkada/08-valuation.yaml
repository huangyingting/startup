- id: TV005
  title: Thesis-Break and Kill Triggers Table
  columns:
  - Trigger
  - Threshold / Event
  - Effect on Thesis
  - Action Implication
  rows:
  - - ITC exclusion order
    - Final ITC ruling imposing import ban on Verkada cameras manufactured outside the US
    - Hardware-subscription bundle broken; revenue at risk until domestic production established
    - Immediate downgrade to REDUCE; block follow-on investment pending ITC outcome
  - - Consent decree violation
    - FTC or court finds Verkada in violation of September 2024 permanent injunction
    - Enterprise procurement eligibility impaired; regulatory risk premium spikes; valuation reset to 4-5x
    - Immediate portfolio review; assess secondary exit options
  - - Breach recurrence
    - Second large-scale unauthorized access event affecting ≥10,000 cameras or customer PII
    - Reputational collapse among enterprise security-sensitive buyers; NRR collapses below 100%
    - Trigger exit process; consult legal counsel on portfolio company notification obligations
  - - Revenue growth < 15%
    - Official or credible third-party confirmation that 2026 revenue growth fell below 15% YoY
    - At 7.2x entry multiple, sub-15% growth implies material multiple compression and poor return profile
    - Downgrade to AVOID; do not participate in next round at current price
  - - NRR sustained below 100%
    - Net revenue retention confirmed below 100% for two consecutive quarters
    - Existing customer base is shrinking; growth model inverted; platform stickiness broken
    - Immediate thesis reassessment; increase secondary exit monitoring frequency
  notes: Kill triggers represent analyst-defined conditions that should prompt formal portfolio review, not automatic exit decisions. Thresholds are analyst estimates based on publicly available data and
    comparable company precedents.
  claimRefs:
