- id: VSEC02
  title: Valuation Context and Entry Discipline
  body: 'Verkada has raised capital across five identified rounds, reaching $5.8 billion in December 2025. The progression — $3.2B at Series D (October 2023), $4.5B at Series E (February 2025), and $5.8B
    at the CapitalG extension (December 2025) — represents an 81% step-up from Series D over roughly 26 months [CV041][CV042]. Total capital raised exceeds $800M across all rounds [CV003]. At $5.8B and
    an estimated $806M in 2025 revenue, the implied revenue multiple is approximately 7.2x [CV005]. This compares to Motorola Solutions/Avigilon at ~6.5x revenue, Alarm.com at ~5x revenue, Samsara at ~20x,
    and Axon Enterprise at ~18x — positioning Verkada as fairly valued against legacy hardware/security peers but at a meaningful discount to high-growth cloud IoT comps [CV011] [CV012][CV013][CV014].

    Entry discipline at $5.8B requires confirming three things before committing capital. First, the $806M revenue estimate must be independently verified — it is analyst-consensus only, not officially
    disclosed [CV004][CV006]. Second, the revenue multiple of 7.2x is stretched for a company with hardware exposure: comparable hardware-attached SaaS companies (Samsara at launch IPO, Alarm.com) traded
    at 5-8x revenue, not 15-20x [CV015][CV038]. Third, the preference stack and liquidation waterfall from $800M+ of preferred equity must be analyzed before the return profile can be modeled — at $5.8B,
    common investors could see significant dilution from early preference holders in a downside exit scenario [CV023][CV040]. An investor entering at the current valuation must model a minimum 2x exit at
    $11.6B+ to achieve adequate IRR on a 4-6 year hold, which requires either an IPO at strong revenue multiples or a strategic exit to a large acquirer willing to pay a control premium above the current
    VC mark [CV027][CV035].'
