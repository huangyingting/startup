- id: VSEC03
  title: Bull, Base, and Bear Scenarios
  body: 'The bull case assumes Verkada sustains 30-35% revenue growth, exits the ITC patent dispute favorably, and maintains NRR above 120%, reaching ~$1.5B in revenue by 2027-2028. At a 10x forward revenue
    multiple — consistent with Axon and Samsara during their high-growth phases — enterprise valuation reaches $12-15B, representing 2-2.6x the current $5.8B mark. This scenario requires CapitalG momentum
    to translate into enterprise account expansion, the hardware+cloud bundle to remain intact, and no adverse ITC ruling [CV019][CV036]. The consent decree imposes compliance costs but does not disrupt
    commercial momentum in the bull case.

    The base case assumes growth decelerates to 20-25% annually, revenue reaches ~$1.0-1.1B by 2027, and the company achieves an IPO or strategic exit at 7-8x forward revenue in 2027-2028. At $1.05B revenue
    and 7.5x multiple, enterprise value reaches $7.9B — a modest premium to the current $5.8B mark. This scenario reflects the most likely trajectory given Verkada''s current commercial momentum and regulatory
    environment [CV020][CV022][CV039]. A 2x return from entry requires the base case to outperform to ~8.5x multiple or $1.2B revenue.

    The bear case assumes the ITC patent case results in an import ban, forcing a pivot to US-manufactured or licensed hardware, and the consent decree triggers elevated enterprise churn among security-sensitive
    customers. Revenue decelerates to 10-15% growth, reaching $900M-950M by 2027, and multiples compress to 4-5x. Implied enterprise value falls to $3.6-4.75B — below or near the current entry price [CV021][CV037].
    A recurrence of a major data breach would accelerate the bear case and is the most likely single-event path to catastrophic valuation reset.'
