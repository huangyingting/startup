callouts:
- calloutType: strength
  title: Secular Cloud Migration Tailwind Supports Premium Growth
  body: 'With only 10-15% of commercial video surveillance cameras currently cloud-managed, Verkada benefits from a large and durable secular tailwind as enterprises replace aging DVR/NVR infrastructure.
    The cloud segment is growing at 20-30% CAGR versus 8-10% for the overall physical security market, supporting Verkada''s premium valuation.

    '
  claimRefs:
  - CM017
- calloutType: risk
  title: Market Sizing Estimates Vary Widely and May Be Inflated
  body: 'Verkada and Eclipse Ventures estimate their addressable market at $60 billion, but this likely includes adjacent categories and future market expansion that may take a decade to materialize. More
    conservative analyst estimates of the cloud-managed physical security segment put it at $15-25 billion, which still represents significant headroom but is materially smaller than the company''s claimed
    TAM.

    '
  claimRefs:
  - CM010
  - CM011
- calloutType: insight
  title: Platform Land-and-Expand Model Amplifies Per-Customer Value
  body: 'Verkada''s multi-product platform strategy creates a powerful land-and-expand dynamic where customers start with cameras and progressively add access control, alarms, sensors, and intercoms. The
    43% year-over-year growth in large customers ($100K+) suggests strong expansion economics and validates the platform thesis.

    '
  claimRefs:
  - CM015
