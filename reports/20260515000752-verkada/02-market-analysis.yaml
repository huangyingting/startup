- id: buyer-segmentation
  title: Buyer, User, and Payer Segmentation
  body: 'Physical security purchasing decisions involve multiple stakeholders within an organization, creating a complex buyer-user-payer dynamic. The primary buyer is typically the Director or VP of Physical
    Security, Corporate Security, or Facilities Management. In smaller organizations, the IT Director or CTO may own the security budget. The end users are security operations center (SOC) analysts, front-desk
    staff, facility managers, and sometimes HR or legal teams who review footage. The payer is the organization''s capital expenditure (capex) or operational expenditure (opex) budget, depending on whether
    the deployment is structured as an equipment purchase or a cloud subscription.


    Verkada''s cloud-native model shifts the procurement dynamic from a capex-heavy NVR/server purchase (traditional model) to a hardware-plus-subscription model where cameras are purchased upfront and
    cloud software is paid annually. This aligns with enterprise IT trends toward opex-based consumption models and reduces the total cost of ownership by eliminating server hardware, NVR maintenance, and
    on-site IT support for firmware updates. Verkada segments its customers into several tiers: Fortune 500 enterprises (91 as of February 2025), large customers spending $100,000+ annually (4,700+ as of
    February 2025), mid-market organizations, and smaller commercial customers. The company has also pursued vertical-specific segments including K-12 schools, healthcare facilities, retail chains, and
    increasingly the public sector through its Carahsoft partnership.


    Adoption triggers vary by segment but commonly include: end-of-life for existing camera systems, security incidents that expose gaps in legacy monitoring, facility expansion requiring scalable management,
    COVID-era occupancy monitoring needs, and insurance or regulatory requirements. The shift to remote work and distributed facilities has also increased demand for cloud-managed security that can be monitored
    centrally rather than requiring on-site personnel at each location.

    '
  claimRefs:
  - CM012
  - CM013
  - CM014
  - CM015
  - CM016
