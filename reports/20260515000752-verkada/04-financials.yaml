callouts:
  - calloutType: strength
    title: Hardware-plus-SaaS model creates compounding recurring revenue
    body: >-
      With 2M+ devices enrolled in annual cloud subscriptions and a large-customer cohort growing 43% YoY,
      Verkada has the structural ingredients of high-quality recurring revenue: device-based lock-in, multi-year
      contracts, and a platform that expands its share of wallet as customers add product lines. The two 2025
      capital rounds totaling $300M provide a substantial runway buffer even against elevated burn.
    claimRefs:
      - CI001
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008
  - calloutType: risk
    title: Total financial opacity blocks underwriting at any reasonable conviction level
    body: >-
      No audited or management-reported revenue, ARR, gross margin, CAC, payback, NRR, cash, burn, or runway
      figure is publicly available for Verkada. The $806M revenue estimate is a third-party aggregator figure
      with no independent verification. Any position underwritten on public information alone is speculative;
      a private data room is a prerequisite for any formal investment thesis.
    claimRefs:
      - CI020
      - CI021
      - CI022
      - CI038
      - CI039
      - CI040
  - calloutType: risk
    title: DOJ permanent injunction creates ongoing compliance cost and reputational risk
    body: >-
      The September 2024 DOJ consent decree requires a permanent comprehensive information-security program,
      regular third-party audits, and compliance reporting — costs not separately disclosed. While the $2.95M
      penalty is modest relative to the capital base, failure to comply with the injunction would expose Verkada
      to contempt proceedings with potentially much larger consequences.
    claimRefs:
      - CI012
      - CI013
      - CI014
  - calloutType: assumption
    title: Revenue and valuation multiple estimates are third-party approximations
    body: >-
      The $806M 2025 revenue estimate from Craft.co and Wikipedia, and the implied 7.2x revenue multiple at
      the $5.8B valuation, should be treated as rough directional inputs rather than underwriteable base cases.
      Private-company aggregators typically have 15–25% variance from actual company results.
    claimRefs:
      - CI002
      - CI025
      - CI037
      - CI041
