  - id: capital-adequacy-financing
    title: Capital Adequacy and Financing
    body: >-
      Verkada's capital position is publicly anchored by its December 2025 CapitalG (Alphabet) round: $100M at
      a $5.8B valuation, following a February 2025 $200M Series E at $4.5B led by General Catalyst with Eclipse
      Ventures. Total equity raised across six rounds exceeds $800M. The two 2025 rounds — totaling $300M in a
      ten-month period — suggest the company is in an active capital deployment phase rather than capital
      conservation mode, likely funding accelerated headcount, product expansion, and international distribution.
      TechCrunch, Fortune, CNBC, and Bloomberg collectively corroborate the Series E and December 2025 round
      details.


      The company's $2.95M DOJ penalty from September 2024, while modest relative to the capital base,
      established a permanent injunction requiring a comprehensive information security program and regular
      independent assessments. The ongoing compliance costs — third-party audits, program management, remediation
      infrastructure — represent a recurring operating expense that is not separately disclosed but likely material
      relative to pre-breach security spend.


      Cash on hand, monthly burn, runway, debt facilities, and contingent liabilities are not disclosed. No UCC
      filings or liens have been identified in publicly available records. The Carahsoft distribution partnership
      does not entail disclosed financial terms. PitchBook and Crunchbase provide the most granular cap-table
      proxies available in the public domain but do not supply operating financial statements. An investor
      underwriting Verkada's capital adequacy must rely entirely on private management materials.
