  - id: gtm-sales-efficiency
    title: GTM Motion and Sales Efficiency
    body: >-
      Verkada operates a direct enterprise sales motion supplemented by a growing channel program. The company
      employs a field and inside-sales force organized by industry vertical and geography. Enterprise account
      executives target mid-market through large enterprise buyers; the Carahsoft partnership expands the
      government and SLED vertical through an established GSA-schedule distributor. International expansion has
      been underway since at least 2023, though geographic revenue breakdown is not disclosed.


      The clearest public signal of GTM efficiency is the large-customer cohort: approximately 4,700 enterprise
      accounts with annual contract values exceeding $100,000 grew 43% year-over-year as of late 2025. This
      growth rate, if sustained, implies strong net revenue retention in the enterprise segment — new logos and
      expansion within existing accounts — though no NRR or GRR figure is officially published. Glassdoor reviews
      describe a high-pace enterprise sales environment with competitive on-target earnings structures, suggesting
      the company has built a substantial quota-carrying sales force. The total 30,000-customer base spans
      organizations of all sizes, but the concentration of ACV in the 4,700-enterprise cohort ($100K+ each)
      implies that segment is the primary revenue driver.


      Sales-cycle length, fully loaded CAC, payback period, win rates, and quota attainment are not disclosed in
      any public source reviewed for this chapter. The public record supports directional GTM momentum but not
      underwriteable sales-efficiency metrics.
    claimRefs:
      - CI003
      - CI004
