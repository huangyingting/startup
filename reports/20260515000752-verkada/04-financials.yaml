  - id: financial-verdict
    title: Financial Verdict
    body: >-
      Verkada's financial profile presents strong public signals of scale and momentum — $800M+ raised, $5.8B
      valuation, 30,000 customers, 2M+ devices, and a large-customer cohort growing at 43% — layered atop total
      opacity on the metrics that matter most for underwriting: revenue quality, margin structure, sales efficiency,
      and capital adequacy. The hardware-plus-SaaS architecture is the right long-term model for recurring revenue
      and gross margin expansion, and industry benchmarks suggest the economics should converge toward 60–70%
      blended gross margin at this scale. But convergence is not confirmation.


      The $2.95M DOJ penalty and permanent injunction represent a resolved — though not cost-free — adverse event.
      The absence of audited financials, no public ARR or NRR, and no disclosed burn or runway mean the financial
      thesis rests entirely on private diligence. Any investment thesis premised on Verkada's revenue quality,
      margin path, or capital adequacy must be substantiated through management data room access before
      commitments are made.
    claimRefs:
