  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue-and-gross-margin
      missingEvidence: >-
        GAAP revenue and ARR with monthly bridge, gross margin by segment (hardware vs SaaS), revenue
        recognition policy, and deferred revenue schedule
      whyItMatters: >-
        Without audited or management-confirmed revenue and gross margin, the $806M estimate cannot be
        verified, the 7.2x valuation multiple cannot be defended, and the margin-path thesis remains
        entirely speculative.
      diligencePath: >-
        Request management P&L with GAAP revenue, ARR waterfall, revenue recognition memo, deferred
        revenue roll-forward, and gross margin bridge by hardware and SaaS segment; cross-check against
        board materials and draft audited financials if available.
      relatedQuestionRefs:
        - QI003
        - QI019
        - QI022
      relatedTableRefs:
        - TI003
        - TI005
    - type: private-evidence-only
      severity: blocking
      topic: unit-economics
      missingEvidence: >-
        CAC by channel, payback period, NRR, GRR, customer cohort retention curves, sales-cycle length,
        and quota attainment by segment
      whyItMatters: >-
        The entire enterprise SaaS financial thesis depends on retention quality; without NRR and GRR
        cohort data, there is no basis to underwrite the compounding ARR growth implied by the 43% large-
        customer growth rate.
      diligencePath: >-
        Request cohort-level NRR/GRR by customer vintage, fully loaded CAC by direct and channel segments,
        payback model, pipeline conversion funnel with win-rate data, and sales productivity by rep band.
      relatedQuestionRefs:
        - QI005
        - QI009
        - QI012
      relatedTableRefs:
        - TI003
        - TI005
    - type: private-evidence-only
      severity: blocking
      topic: capital-adequacy
      missingEvidence: >-
        Current unrestricted cash balance, monthly cash burn by function, 18-to-24-month runway model
        under base and downside scenarios, and any debt or credit facility details
      whyItMatters: >-
        Two $300M capital raises in 2025 are strong signals, but post-close cash drawdown and burn rate
        determine actual runway; without these figures, capital adequacy cannot be independently confirmed.
      diligencePath: >-
        Request treasury report with current cash balance, 13-week cash forecast, monthly burn bridge by
        function (R&D, S&M, G&A, compliance), and debt schedule with covenant terms and UCC lien search.
      relatedQuestionRefs:
        - QI020
        - QI021
        - QI024
      relatedTableRefs:
        - TI004
        - TI005
    - type: private-evidence-only
      severity: material
      topic: regulatory-compliance-costs
      missingEvidence: >-
        Annual cost of the DOJ permanent injunction compliance program — third-party assessments,
        remediation infrastructure, legal oversight, and any ongoing FTC/DOJ reporting costs
      whyItMatters: >-
        The $2.95M penalty is a one-time cost, but the permanent injunction creates recurring compliance
        obligations whose annual cost could be $5M–$20M+; this is a persistent OPEX headwind not visible
        in the public record.
      diligencePath: >-
        Request legal budget line-item for FTC/DOJ compliance, third-party assessment contracts, and any
        open litigation reserves related to the 2021 breach or subsequent proceedings.
      relatedQuestionRefs:
        - QI024
        - QI025
      relatedTableRefs:
        - TI004
    - type: missing-source
      severity: material
      topic: competitive-pricing-benchmarks
      missingEvidence: >-
        Published per-device hardware ASPs and annual subscription price comparisons across Verkada and
        key competitors (Eagle Eye Networks, Rhombus Systems, Cisco Meraki MV) as of 2025–2026
      whyItMatters: >-
        Without current competitive pricing data, it is impossible to assess whether Verkada's premium
        pricing is sustainable as cloud-native competitors mature and legacy vendors launch competitive
        cloud tiers.
      diligencePath: >-
        Obtain current IPVM competitive pricing analysis or equivalent third-party study; supplement with
        customer-sourced quote comparisons across at least three direct competitors at equivalent
        deployment scales.
      relatedQuestionRefs:
        - QI008
        - QI015
      relatedTableRefs:
        - TI002
