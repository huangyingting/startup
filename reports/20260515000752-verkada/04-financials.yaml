  - id: public-traction-data-gaps
    title: Public Traction Metrics and Data Gaps
    body: >-
      The public financial record for Verkada is unusually thin for a company at this scale and valuation. The
      strongest publicly available figures are: approximately $806M in 2025 annual revenue per Craft.co and
      Wikipedia third-party estimates; approximately 30,000 active customers; 4,700+ large enterprise customers
      (>$100K ACV); 2M+ deployed devices; and 8 million door unlocks per day processed through the access-control
      platform. All of these figures are either company-stated operational metrics or third-party revenue estimates
      — not audited financial results.


      No public source reviewed for this chapter discloses Verkada's GAAP revenue, ARR, revenue recognition policy,
      deferred revenue schedule, gross margin by segment, CAC, payback period, sales cycle, NRR, GRR, cash on hand,
      monthly burn, runway, or any other standard underwriting metric. The SEC EDGAR full-text search confirms no
      public filings exist for Verkada as a private entity. Crunchbase and PitchBook profiles provide funding history
      and valuation datapoints but no operating financials.


      The combination of strong customer-count and device-base metrics with total financial opacity is characteristic
      of a late-stage private company managing its information environment carefully ahead of a potential IPO or
      secondary transaction. The $5.8B valuation implies approximately a 7.2x revenue multiple on the $806M
      estimate — a premium that requires strong underlying unit economics to be defensible, but those economics
      cannot be independently verified.
