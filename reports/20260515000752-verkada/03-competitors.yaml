- id: legacy-incumbents-and-platform-players
  title: Legacy Incumbents and Platform Players
  body: 'Legacy physical security incumbents represent Verkada''s most formidable long-term competitive challenge due to their massive installed bases, deep integrator relationships, and well-funded parent
    companies. Axis Communications, owned by Canon since 2015, is the global market leader in network video cameras by unit volume, selling through an open ecosystem supported by VMS partners including
    Genetec, Milestone, and Hanwha. Axis lacks a native cloud management platform with bundled subscription software, relying instead on its AXIS Camera Application Platform (ACAP) for on-device analytics
    and third-party VMS integrations. Canon''s ownership gives Axis access to substantial corporate resources and the complementary Milestone VMS platform.


    Avigilon, acquired by Motorola Solutions for approximately $1 billion in 2018, is the most aggressive incumbent challenger. Motorola launched the Alta cloud portal in 2022 to provide a cloud management
    layer over Avigilon hardware and incorporated Openpath cloud access control (acquired 2021) into the Avigilon product family. The combination of Avigilon''s AI-first H5A camera series, Openpath''s ACaaS
    product, and the Alta cloud portal approximates Verkada''s integrated vision — and Motorola Solutions''s approximately $10 billion in annual revenue provides substantial investment capacity. Critically,
    Motorola filed an ITC patent infringement complaint against Verkada in November 2023 alleging that Verkada''s AI analytics capabilities infringe on Avigilon intellectual property.


    Genetec remains the preferred enterprise VMS for organizations valuing open-ecosystem flexibility and privacy compliance, particularly in Europe and government. Its Security Center platform supports
    installations at over 750,000 sites globally. Milestone Systems, also Canon-owned, leads the open VMS market by integration count with 7,000-plus certified partner products. Hanwha Vision (Samsung-spun),
    Bosch Security Systems, and Honeywell round out the legacy tier with broad portfolios serving global enterprise and critical infrastructure markets.

    '
