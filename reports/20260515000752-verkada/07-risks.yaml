      - FR001
  - id: section-2
    title: Regulatory, Legal, and Compliance Risk
    body: >-
      Verkada's most material regulatory exposure is the September 2024 FTC/DOJ consent decree, which imposed a
      $2.95 million civil penalty and a permanent injunction requiring Verkada to implement a comprehensive
      information security program, submit to independent security assessments every two years, and cease deceptive
      representations about its security capabilities. The FTC's August 2023 preliminary action identified three
      root causes: CAN-SPAM violations in email marketing, inadequate data security that enabled the 2021 breach,
      and misleading marketing claims about the platform's security posture. The DOJ complaint resolved the case
      and the consent decree is now a standing compliance obligation for the foreseeable future.

      Patent litigation adds a second legal stack. Motorola Solutions and its Avigilon subsidiary filed an ITC
      Section 337 complaint against Verkada in August 2021, alleging infringement of video surveillance technology
      patents. A USITC press release confirmed the complaint filing. An adverse ITC ruling could impose an exclusion
      order banning imports of Verkada cameras manufactured abroad, which would be a potentially devastating blow to
      a company that monetizes recurring cloud subscriptions attached to hardware it cannot sell. Verkada
      counter-sued Motorola in the Northern District of California in September 2021 to contest the patents, but
      that litigation remains ongoing.

      Data privacy risk extends beyond active enforcement. Illinois BIPA creates statutory-damages exposure for
      Verkada's facial recognition analytics when deployed in Illinois workplaces. Multiple US cities have enacted
      or proposed bans on facial recognition in surveillance contexts, and expanding state-level private-sector
      restrictions are a long-term product-scope risk. California CCPA and CPRA impose disclosure and opt-out
      requirements for biometric and personal data. EU GDPR creates data-sovereignty compliance obligations for
      Verkada's European expansion ambitions. The breadth of the privacy regulatory stack means that Verkada must
      run parallel compliance programs across multiple jurisdictions even as it continues to add AI-enabled analytics
      capabilities to its product roadmap.
