company:
  name: Verkada
chapter:
  number: 7
  title: Risks
  summary: >-
    Verkada's highest residual risks are the active FTC/DOJ consent decree (September 2024, $2.95M penalty, permanent
    injunction), unresolved Motorola Solutions/Avigilon ITC patent litigation with import-ban potential, data breach
    recurrence risk from its centralized cloud architecture, and a premium $5.8B valuation that compresses the margin
    for error. People and cultural risk — documented 2020-2021 employee harassment and a sole-CEO key-person
    concentration — add execution-layer exposure. Public mitigations are meaningful: mandatory MFA, a HackerOne bug
    bounty program, SOC 2 Type II certification, and FTC-mandated biennial security audits all reduce severity.
    Mitigations do not remove the risk, however, and five explicit thesis-break triggers — consent decree violation,
    adverse ITC ruling, breach recurrence, CEO departure, or sustained NRR deterioration — should be defined as
    kill criteria before any investment is underwritten.
sections:
  - id: section-1
    title: Risk Overview and Severity Assessment
    body: >-
      Verkada's risk profile is dominated by five interconnected buckets. First, regulatory and legal exposure from
      the 2024 FTC/DOJ consent decree, active patent litigation with Motorola Solutions/Avigilon, and an expanding
      data-privacy law landscape that directly touches the company's facial recognition analytics. Second, operational
      and security risk inherited from the March 2021 breach, which revealed that Verkada's centralized cloud
      architecture contains a structural single point of failure. Third, supply chain and partner concentration risk
      from contract hardware manufacturing and cloud infrastructure dependency. Fourth, people and culture risk from
      documented employee harassment incidents in 2020-2021 and a sole-CEO key-person dependency that carries no
      public succession plan. Fifth, financial and model risk from a $5.8 billion valuation at an estimated 5-7x
      revenue multiple that leaves little room for growth deceleration or additional enforcement action.

      No single risk is independently thesis-breaking at current mitigation maturity. The consent decree has
      a clear compliance path, the patent litigation has been contested by Verkada in federal court, and post-breach
      remediation includes mandatory MFA and independent security audits. The combination, however, creates a thicker
      downside tail than is typical for enterprise SaaS comparables with clean regulatory histories. The risk heatmap
      illustrates the residual severity distribution: data breach recurrence and consent decree violation anchor the
      critical column; patent litigation, competitive pressure, and FTC enforcement occupy the high-severity zone; and
      facial recognition bans, supply chain disruption, and culture escalation form the medium tier. Kill criteria
      and diligence asks for each bucket appear in Section 5.
    claimRefs:
      - CR001
      - CR015
      - CR026
      - CR033
      - CR034
      - CR040
