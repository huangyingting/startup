  - id: section-5
    title: Mitigations and Kill Criteria
    body: >-
      Verkada has implemented meaningful mitigations across most major risk buckets. The FTC/DOJ consent decree
      mandates structural improvements: a comprehensive information security program, independent biennial security
      audits, and cessation of deceptive security marketing. Verkada's trust center publishes its SOC 2 Type II
      compliance posture. The HackerOne bug bounty program provides ongoing vulnerability discovery. The January
      2026 Carahsoft government distribution partnership reduces channel concentration and diversifies customer
      acquisition into the federal, state, and local government segment. The CapitalG (Alphabet) investment in
      December 2025 provides additional institutional validation and strategic access.

      These mitigations lower risk; they do not remove it. The thesis-break triggers are well-defined and
      monitorable. A consent decree violation or new enforcement action by the FTC or DOJ would directly
      invalidate the regulatory-risk mitigation thesis. An adverse ITC ruling imposing a hardware import ban
      would immediately disrupt Verkada's ability to sell cameras in the US market and compress the subscription
      attach rate for new accounts. A significant data breach recurrence — particularly one affecting enterprise
      or government customers whose trust was rebuilt after 2021 — would generate customer attrition, regulatory
      scrutiny, and valuation compression simultaneously. Filip Kaliszan's departure without a prepared
      successor would create execution uncertainty at the board level during the pre-IPO window. And sustained
      NRR deterioration driven by any combination of the above events would be the lagging signal that the
      investment case has materially changed.

      Private diligence should secure the consent decree compliance plan, independent audit schedule, chip supply
      agreements, cloud infrastructure contracts, and leadership succession framework before any investment is
      underwritten at the current valuation level.
