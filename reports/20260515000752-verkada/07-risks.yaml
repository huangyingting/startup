  evidenceGaps:
    - type: enumeration-incomplete
      severity: minor
      topic: regulatory-legal-coverage
      missingEvidence: >-
        Complete inventory of all state and local regulatory proceedings, non-US enforcement threads outside the EU,
        and any unreported customer or employee legal claims against Verkada.
      whyItMatters: >-
        Facial recognition bans, BIPA exposure, and emerging state privacy laws create a fragmented enforcement
        landscape that is difficult to fully enumerate from public sources; gaps could include active state AG
        investigations not yet publicly disclosed.
      diligencePath: >-
        Commission an outside-counsel nationwide regulatory survey covering all active and pending enforcement
        actions, biometric privacy complaints, and customer litigation in the 50 states before investment close.
      relatedTableRefs:
        - TR001

    - type: stale
      severity: minor
      topic: motorola-itc-litigation-status
      missingEvidence: >-
        Current procedural status, schedule, and Initial Determination date for the Motorola Solutions/Avigilon
        ITC Section 337 case against Verkada; public record is from 2021.
      whyItMatters: >-
        An import ban would materially disrupt Verkada's hardware supply and is a thesis-break risk; knowing the
        current schedule and outcome probability is essential for investment underwriting.
      diligencePath: >-
        Review current USITC docket for case status; obtain outside patent-litigation counsel opinion on timeline,
        likely ITC determination, and available design-around options.
      relatedQuestionRefs:
        - QR005

    - type: private-evidence-only
      severity: material
      topic: cloud-infrastructure-dependency
      missingEvidence: >-
        Confirmed identity of Verkada's cloud infrastructure provider(s), contract terms, SLA commitments, pricing
        structure, and geographic distribution of cloud regions for the Command platform.
      whyItMatters: >-
        Cloud provider identity and concentration affect SLA, pricing renegotiation risk, data sovereignty
        obligations, and the single-point-of-failure exposure that is central to the operational risk thesis.
      diligencePath: >-
        Request cloud vendor contracts, pricing schedules, and multi-region architecture documentation in private
        diligence; confirm whether Verkada has a secondary cloud provider or degraded-mode fallback.
      relatedQuestionRefs:
        - QR011

    - type: missing-source
      severity: material
      topic: hardware-manufacturing-geography
      missingEvidence: >-
        Names of contract manufacturing partners, primary country of manufacture, dual-sourcing or contingency
        arrangements, and current inventory buffers for Verkada cameras and access control hardware.
      whyItMatters: >-
        China or Taiwan manufacturing concentration creates tariff, export-control, and supply-continuity risk
        that directly affects Verkada's hardware revenue and the subscription attach rate on new devices.
      diligencePath: >-
        Request supplier list, manufacturing contracts, and contingency sourcing plans in private diligence;
        assess US-based or near-shore manufacturing options given current trade policy environment.
      relatedQuestionRefs:
        - QR012

    - type: missing-source
      severity: material
      topic: profitability-path
      missingEvidence: >-
        Verkada's current burn rate, gross margin by segment (hardware vs software), EBITDA trajectory, and
        management's internal timeline and path to GAAP profitability.
      whyItMatters: >-
        Without profitability visibility, investors cannot assess whether the hardware-plus-SaaS model generates
        sustainable unit economics at scale or whether Verkada requires additional equity rounds before IPO.
      diligencePath: >-
        Request audited financial statements, board-approved financial projections, and unit economics breakdowns
        in private diligence; benchmark hardware gross margin against comparable VSaaS companies.
      relatedQuestionRefs:
        - QR020

    - type: missing-source
      severity: minor
      topic: security-posture-comparison
      missingEvidence: >-
        Third-party comparative assessment of Verkada's post-breach security posture against Avigilon, Genetec,
        and Eagle Eye Networks, including penetration test results or red-team exercise outcomes.
      whyItMatters: >-
        Cannot verify whether post-decree remediation places Verkada above or below industry standard for
        cloud-managed physical security platforms, which affects the residual breach-recurrence risk assessment.
      diligencePath: >-
        Commission independent penetration test and red-team exercise targeting the Command platform's privileged
        access model; compare findings to SOC 2 Type II audit scope and any FTC audit reports.
      relatedQuestionRefs:
        - QR025
