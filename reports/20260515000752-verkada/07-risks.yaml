  - id: TR005
    title: Mitigation and Kill Criteria Table
    columns:
      - risk
      - monitorable trigger
      - threshold/event
      - action implication
    rows:
      - - FTC/DOJ consent decree violation
        - New FTC or DOJ enforcement correspondence; consent decree compliance audit findings
        - Any notice of violation, additional penalty, or failed audit triggers compliance review
        - Thesis break — re-evaluate entire regulatory risk stack; potential hold or exit
      - - Adverse ITC import ban ruling (Motorola/Avigilon patent case)
        - ITC Initial Determination and Commission Review schedules; court docket updates
        - Issuance of exclusion order banning import of Verkada cameras from overseas manufacturing
        - Thesis break — hardware supply disruption materially impairs subscription attach; exit trigger
      - - Data breach recurrence at enterprise or government scale
        - Voluntary disclosure, FTC notification, or credible media reporting of major security incident
        - Any confirmed breach affecting enterprise customer data or camera integrity at material scale
        - Thesis break — customer trust collapse, regulatory escalation, and NRR deterioration cascade
      - - CEO key-person event (Filip Kaliszan departure or incapacity)
        - Board press release, executive departure disclosure, or credible media reporting
        - Announced departure of CEO without identified and prepared successor
        - Material risk elevation — pause diligence; assess board succession and governance contingency plan
      - - NRR / customer churn deterioration
        - Quarterly business reviews, investor updates, or industry analyst tracking
        - NRR falls below 100% for two consecutive reporting periods or significant large-account departures
        - Reduce conviction — re-examine land-and-expand thesis and pricing-model durability
      - - Facial recognition product regulatory shutdown in key markets
        - State legislative tracker; municipal ordinance announcements; FTC rulemaking notices
        - Enacted private-sector facial recognition bans in California, New York, or Texas
        - Revenue model impact — reduce TAM estimate for analytics product line; reassess pricing power
    notes: >-
      Thresholds are indicative, not contractual. Thesis break designates events where the core investment thesis
      is directly invalidated and the default action should be to halt new investment or exit existing position
      pending full re-evaluation. Material risk elevation triggers a diligence pause and reassessment without
      automatic exit. Monitoring responsibilities for each trigger should be assigned to a named team member or
      external counsel before investment is closed.
