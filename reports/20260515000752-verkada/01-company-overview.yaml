company:
  name: Verkada
chapter:
  number: 1
  title: Company Overview
  summary: Verkada, founded in 2016 in San Mateo, California, is a cloud-based physical security platform offering cameras, access control, alarms, environmental sensors, intercoms, and visitor management.
    The company has raised over $800 million across six funding rounds, reaching a $5.8 billion valuation in December 2025 via a CapitalG-led round, and serves approximately 30,000 customers with 2 million+
    devices deployed globally.
sections:
- id: identity-and-mission
  title: Identity and Mission
  body: 'Verkada Inc. is a San Mateo, California-based cloud-managed physical security company that builds and sells integrated hardware and software solutions for enterprise building security. The company
    was founded in 2016 in Menlo Park, California by Filip Kaliszan (CEO), James Ren, Benjamin Bercovitz, and Hans Robertson, and later relocated its headquarters to San Mateo. Verkada''s stated mission
    is to modernize physical security for the enterprise by replacing legacy on-premises DVR-based video surveillance systems with a cloud-native platform that unifies cameras, access control, alarms, environmental
    sensors, intercoms, and visitor management under a single pane of glass.


    The company positions itself as a "software-first" security provider, drawing analogies to what Apple did with mobile by starting with a few core products done exceptionally well and expanding over
    time. Verkada''s cameras process video on-device using embedded AI chips while simultaneously syncing encrypted footage to the cloud, eliminating the need for network video recorders (NVRs) or dedicated
    servers. This hybrid-cloud architecture enables remote management of thousands of sites from a single browser-based dashboard, with features including AI-powered search, facial recognition, motion alerts,
    and over-the-air firmware updates. The company has expanded its Total Addressable Market by adding adjacent product lines including access control (launched 2020), environmental sensors (2020), alarms,
    intercoms, guest management, and workplace solutions.

    '
  claimRefs:
  - CO001
  - CO002
  - CO003
  - CO004
  - CO005
- id: founders-and-leadership
  title: Founders and Leadership
  body: 'Verkada was co-founded in 2016 by four individuals with complementary technical and entrepreneurial backgrounds. Filip Kaliszan serves as CEO and is a two-time entrepreneur who previously co-founded
    CourseRank, a class scheduling and ratings platform acquired by Chegg in 2010, while he was a student at Stanford University. James Ren and Benjamin Bercovitz, also Stanford graduates who had collaborated
    with Kaliszan on CourseRank, joined as co-founders. Hans Robertson, the fourth co-founder, brings deep hardware and networking expertise as the former co-founder and COO of Meraki, the cloud-managed
    networking company acquired by Cisco in 2012 for $1.2 billion.


    The founding team''s combination of enterprise software experience (Kaliszan, Ren, Bercovitz) and hardware-plus-cloud-networking expertise (Robertson from Meraki) is frequently cited by investors as
    a key differentiator. Verkada''s leadership team also includes Kameron Rezai as CFO, who has led the company''s fundraising efforts including the Series D and subsequent rounds. As of early 2026, the
    company employed approximately 1,700 people globally. The company has faced leadership-related controversies, including a 2020 incident where male employees used Verkada''s own facial recognition cameras
    to harass female coworkers, leading to terminations and public criticism of the company''s workplace culture.

    '
  claimRefs:
  - CO006
  - CO007
  - CO008
  - CO009
  - CO010
  - CO011
  tableRefs:
  - TO002
- id: funding-history
  title: Funding History and Capital Structure
  body: 'Verkada has raised over $800 million in total venture capital funding across six disclosed rounds, progressing from an early-stage startup to a late-stage private company valued at $5.8 billion.
    The company''s Series A was led by Next47 (Siemens'' venture arm) and First Round Capital. In April 2019, Verkada raised a $40 million Series B led by Meritech Capital Partners and Sequoia Capital,
    valuing the company at $540 million. In January 2020, the company raised $80 million in Series C funding led by Felicis Ventures at a $1.6 billion valuation, achieving unicorn status.


    After weathering the 2021 data breach and workplace culture controversies, Verkada closed its Series D in October 2023, raising $305 million at a $3.2 billion valuation. The final $100 million tranche
    was led by Alkeon Capital with participation from Lightspeed Venture Partners. In February 2025, the company raised a $200 million Series E led by General Catalyst with Eclipse Ventures, at a $4.5 billion
    valuation, bringing total funding to approximately $700 million. Most recently, in December 2025, Verkada raised $100 million led by Alphabet''s CapitalG at a $5.8 billion valuation. Notable investors
    across rounds include Sequoia Capital, Felicis Ventures, General Catalyst, Eclipse Ventures, Meritech Capital, MSD Partners (Michael Dell), First Round Capital, and CapitalG.

    '
  claimRefs:
  - CO012
  - CO013
  - CO014
  - CO015
  - CO016
