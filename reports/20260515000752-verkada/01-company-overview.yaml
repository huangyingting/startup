- id: scale-and-milestones
  title: Scale, Milestones, and Adverse Events
  body: 'Verkada has scaled rapidly since installing its first cameras at an Equinox gym in Beverly Hills in 2017. By the end of 2025, the company reported approximately 30,000 active customers and over
    2 million devices deployed globally, with 8 million door unlocks per day processed through its access control system. The company claims the number one market share position in both cloud video security
    (citing 2023 Novaira Insights data) and cloud-native access control (citing 2024 Omdia data). Revenue reached an estimated $806 million in 2025 according to publicly available estimates, though the
    company does not publicly disclose detailed financials as a private entity.


    The company''s trajectory has been marked by several significant adverse events. In March 2021, a hacker collective calling itself "APT-69420 Arson Cats," including maia arson crimew (Tillie Kottmann),
    breached Verkada''s systems using credentials found publicly online, gaining access to live and archived footage from approximately 150,000 cameras across customers including Tesla factories, Cloudflare
    offices, hospitals, jails, and schools. The breach drew widespread media coverage and raised fundamental questions about centralized cloud security architectures. In September 2024, the U.S. Department
    of Justice announced a $2.95 million penalty and permanent injunction against Verkada for CAN-SPAM violations, data security failures, and deceptive practices stemming from the breach. Additionally,
    in August 2021, Motorola Solutions filed a patent infringement complaint against Verkada with the U.S. International Trade Commission, alleging that Verkada cameras infringe on patents held by its Avigilon
    subsidiary.

    '
  claimRefs:
  - CO020
  - CO021
  - CO022
  - CO023
  - CO024
  - CO025
  - CO026
  - CO027
  - CO028
  tableRefs:
  - TO001
  figureRefs:
  - FO001
  - FO002
- id: snapshot-kpis
  title: Snapshot KPIs and Data Gaps
  body: 'Verkada''s key performance indicators reflect a high-growth private company approaching the $1 billion revenue threshold. The company''s estimated 2025 revenue of $806 million represents significant
    growth from its early years, when it had just 11 employees and was generating tens of millions in sales circa 2018-2019. The customer base has expanded from approximately 20,000 at the time of the Series
    D (October 2023) to approximately 30,000 by year-end 2025. Large customers, defined as those spending $100,000 or more annually, numbered over 4,700 as of February 2025, up 43% year-over-year, suggesting
    strong enterprise adoption and expansion dynamics.


    However, significant data gaps persist for diligence purposes. Verkada does not publicly disclose audited financial statements, gross margins, net revenue retention, or ARR breakdowns. The company''s
    headcount is estimated at approximately 1,700 employees but is not officially disclosed on a regular basis. The exact revenue composition across hardware sales, software subscriptions, and professional
    services is not publicly available, making it difficult to assess the recurring revenue quality or margin profile. Valuation multiples based on the $5.8 billion December 2025 valuation imply approximately
    7.2x trailing revenue, which positions Verkada in the range of high-growth SaaS-adjacent security companies but above traditional hardware peers.

    '
  claimRefs:
  - CO029
  - CO030
  - CO031
  - CO032
  - CO033
