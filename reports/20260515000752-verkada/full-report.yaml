      - number: '7.3'
        title: Operational, Security, and Technology Risk
        blocks:
          - type: paragraph
            body: >-
              The March 2021 Verkada breach, in which hackers accessed live and archived footage from approximately
              150,000 cameras at customers including Tesla, Cloudflare, hospitals, and correctional facilities, exposed
              the fundamental security risk of the company's centralized cloud architecture: a single set of super-admin
              credentials, discoverable online without multi-factor authentication, gave the attackers simultaneous
              access to the entire customer fleet. Post-breach remediation included mandatory MFA, a HackerOne bug
              bounty program, and the FTC-mandated comprehensive security program. However, the underlying architecture
              that enabled the breach — cloud-managed privileged access across all customer cameras — has not been
              redesigned; the attack surface remains inherent to the centralized model that also provides Verkada's
              competitive differentiation.

              Hardware supply chain concentration is a second operational risk. Verkada's cameras depend on third-party
              SoC chipsets from a small set of suppliers, and devices are manufactured by contract partners whose
              geographic concentration introduces tariff, export-control, and capacity-disruption exposure.
              Semiconductor supply chain shocks that delay hardware delivery would disrupt both the hardware revenue
              line and the recurring cloud subscription revenue that attaches to new devices. A prolonged cloud
              infrastructure outage would disable all cloud-dependent management, analytics, alerting, and remote-access
              functions for the entire installed base simultaneously.

              Channel partner friction represents a slower-burn risk. Verkada's subscription model replaces the
              equipment-only purchase that integrators have sold for decades. Larger national integrators have adapted,
              but many regional players still prefer models that traditional competitors provide, limiting Verkada's
              penetration into mid-market accounts through the indirect channel. Integrator loyalty to incumbent
              on-premise systems at customer sites also creates switching-cost resistance in accounts that have not yet
              migrated to cloud physical security.
