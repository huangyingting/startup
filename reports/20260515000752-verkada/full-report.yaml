      - number: '8.5'
        title: Exit Readiness and Final Diligence
        blocks:
          - type: paragraph
            body: >-
              Exit readiness for Verkada is medium. The company has scale ($800M+ estimated ARR), enterprise customer
              traction, and a defensible cloud-native architecture — all prerequisites for either an IPO or a strategic
              acquisition. Three exit paths are plausible. First, an IPO at a public-market multiple of 8-10x NTM
              revenue on ~$1B ARR trajectory would imply an $8-10B enterprise value in 2027-2028, representing 37-72%
              upside from current entry [CV027][CV035]. The IPO path requires resolution of the ITC patent case (an
              exclusion order would be disqualifying) and continued consent decree compliance. Second, a strategic
              acquisition by a large security conglomerate — Honeywell, Allegion, Bosch Security, or Motorola Solutions
              (patent-dispute resolution would be a prerequisite) — could produce a control-premium exit above $7B.
              Third, a secondary buyout or growth PE investment could provide liquidity at 6-8x revenue without
              requiring public markets [CV034][CV026].

              The final diligence asks are five and non-negotiable. First, audited or reviewed financial statements
              showing actual 2024-2025 revenue, gross margin, and operating loss — the $806M revenue estimate must be
              confirmed, not just consensus-assumed [CV004][CV006]. Second, the complete cap table and liquidation
              preference waterfall to model return scenarios correctly. Third, net revenue retention data (investors
              need NRR above 110% to support premium-multiple entry). Fourth, the current status of the
              Motorola/Avigilon ITC patent case — any new rulings, settlement talks, or exclusion order timeline must be
              fully understood before committing. Fifth, the consent decree compliance log and FTC audit status, which
              directly affect enterprise procurement eligibility for security-sensitive sectors (financial services,
              healthcare, government) [CV009][CV024][CV030].
            claimRefs:
