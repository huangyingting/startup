      - number: '3.2'
        title: Direct Cloud-Native Competitors
        blocks:
          - type: paragraph
            body: >
              Among cloud-native video competitors, Verkada faces three meaningful challengers: Eagle Eye Networks,
              Rhombus Systems, and Cisco Meraki MV. Eagle Eye Networks, founded in 2012 and headquartered in Austin,
              Texas, has raised approximately $140 million in venture funding including a SoftBank Vision Fund-led
              Series C round. The company operates a channel-partner-first model targeting SMB and enterprise customers
              with a cloud VMS that connects to cameras from multiple manufacturers — directly threatening Verkada in
              channel partner mindshare. However, Eagle Eye lacks native access control, alarms, or environmental sensor
              products, limiting its ability to displace Verkada in multi-product platform deals.


              Rhombus Systems is a venture-backed startup founded in 2016 that has raised approximately $60 million and
              is frequently cited by channel partners as the closest direct Verkada alternative. With similar
              cloud-native architecture and simpler deployment, Rhombus competes primarily in mid-market deals where
              Verkada is considered too expensive. Its narrower product breadth — primarily cameras plus limited sensors
              — positions it as a point solution rather than a platform. Cisco Meraki MV offers cloud-managed cameras
              integrated with Cisco's broader IT management dashboard, competing in IT-led enterprise deployments where
              Meraki already manages the network for over 400,000 organizations globally.


              In access control, Brivo, Openpath (acquired by Motorola Solutions in 2021), Kisi, and Salto Systems each
              compete directly with Verkada's door hardware and cloud access control software. Brivo is the leading
              cloud ACaaS pure-play for enterprise customers. Openpath has been integrated into the Avigilon product
              family to create a combined access-plus-video solution under the Motorola umbrella. Kisi targets
              tech-forward organizations with a developer-friendly API-first approach. None of these access control
              specialists offers comparable video surveillance, giving Verkada a structural advantage in combined
              video-plus-access-control deals.
