      - number: '5.3'
        title: AI and Analytics Capabilities
        blocks:
          - type: paragraph
            body: >-
              Verkada's on-device AI engine powers a suite of analytics that differentiate it from basic cloud video
              surveillance. Key AI features include: Person of Interest (POI) search using opt-in facial recognition
              with customer-side consent management; People Analytics with real-time and historical headcount, crowd
              detection, occupancy threshold alerting, and heatmap visualization; Vehicle and License Plate Recognition
              (LPR) for parking, gate control, and perimeter security; AI-powered attribute-based object search allowing
              operators to describe physical characteristics and retrieve matching clips across all cameras; behavioral
              analytics including loitering detection, line-crossing alerts, and tailgating detection at access points;
              and environmental anomaly alerting correlated with video events from the SV-series sensor suite.

              All AI inference runs on-device rather than in the cloud, reducing round-trip latency, conserving
              bandwidth, and limiting cloud egress costs. Clips and classified metadata synchronized to the cloud enable
              cross-site AI search across thousands of cameras from a single query. As of early 2026, Verkada extended
              its AI-native search to include environmental sensor anomalies, cross-referencing video clips with sensor
              readings for incident correlation. IPVM independent analysis rates Verkada's on-device AI as above the
              enterprise physical security segment average for detection accuracy and query responsiveness. The
              combination of edge inference and cloud-side aggregated search represents a meaningful technology moat
              against competitors relying entirely on cloud-side AI processing.

              Differentiation risks include: facial recognition remains opt-in only and subject to increasing regulatory
              scrutiny in the US and EU; the specific SoC vendor and NPU architecture are not publicly disclosed,
              creating a chip-dependency diligence gap; and AI model accuracy benchmarks are company- claimed rather
              than independently validated by a third party.
