            title: Seven-module unified platform creates multi-product lock-in
            body: >-
              The integration of cameras, access control, alarms, environmental sensors, intercoms, visitor management,
              and workplace analytics under a single Command dashboard creates cross-product value flows that
              point-solution competitors cannot replicate: access events generate camera clips, alarms trigger camera
              views, and sensor anomalies correlate with video. This cross-product data linkage deepens enterprise
