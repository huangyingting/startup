      - number: '4.3'
        title: Cost Structure and Margin Profile
        blocks:
          - type: paragraph
            body: >-
              Verkada's cost structure is shaped by its hybrid hardware-software model, which creates structurally
              different margin profiles for each revenue component. Hardware carries manufacturing, component,
              logistics, and warranty costs typical of a fabless or contract-manufactured device business; gross margins
              on hardware alone are estimated at 30–40% based on analogous cloud-managed hardware vendors such as Meraki
              (Cisco). The cloud subscription layer, by contrast, has a predominantly SaaS cost structure: cloud
              infrastructure (AWS or equivalent), AI compute for edge and cloud analytics, and customer support. At
              scale, SaaS margins of 80–85% are the industry norm for comparable enterprise cloud platforms per Bessemer
              and OpenView benchmarks.


              Blended gross margin — combining hardware and SaaS in proportions consistent with Verkada's device-attach
              model — is estimated at 60–70%. This estimate is consistent with SaaStr analysis of hardware-plus-SaaS
              companies at analogous ARR scale, and with reported margins at public comparables such as Verkada
              competitor Motorola Solutions (which includes hardware and software mix). However, it is an
              analyst-derived estimate and not a company-disclosed figure.


              Below gross profit, Verkada's cost structure includes substantial research and development (the company
              employs approximately 1,700 people globally with significant engineering headcount), sales and marketing
              (enterprise sales force, channel enablement, field events), and general and administrative costs that
              include significant legal and compliance expenditure following the 2021 breach and subsequent regulatory
              proceedings. Monthly cash burn is not disclosed. Neither operating income, EBITDA, nor free cash flow has
              been publicly shared.
