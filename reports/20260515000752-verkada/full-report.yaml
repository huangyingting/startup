      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Verkada has raised over $800 million in total venture capital funding across six disclosed rounds,
              progressing from an early-stage startup to a late-stage private company valued at $5.8 billion. The
              company's Series A was led by Next47 (Siemens' venture arm) and First Round Capital. In April 2019,
              Verkada raised a $40 million Series B led by Meritech Capital Partners and Sequoia Capital, valuing the
              company at $540 million. In January 2020, the company raised $80 million in Series C funding led by
              Felicis Ventures at a $1.6 billion valuation, achieving unicorn status.


              After weathering the 2021 data breach and workplace culture controversies, Verkada closed its Series D in
              October 2023, raising $305 million at a $3.2 billion valuation. The final $100 million tranche was led by
              Alkeon Capital with participation from Lightspeed Venture Partners. In February 2025, the company raised a
              $200 million Series E led by General Catalyst with Eclipse Ventures, at a $4.5 billion valuation, bringing
              total funding to approximately $700 million. Most recently, in December 2025, Verkada raised $100 million
              led by Alphabet's CapitalG at a $5.8 billion valuation. Notable investors across rounds include Sequoia
              Capital, Felicis Ventures, General Catalyst, Eclipse Ventures, Meritech Capital, MSD Partners (Michael
              Dell), First Round Capital, and CapitalG.
