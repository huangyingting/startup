      - number: '6.2'
        title: Adoption and Growth Trajectory
        blocks:
          - type: paragraph
            body: >-
              Verkada's disclosed customer metrics show compounding growth in its highest-value customer cohort. The
              large-customer segment (annual spend ≥$100,000) reached 4,700+ accounts by end-2025, representing 43%
              year-over-year growth from the prior period. This is the most precise and publicly confirmed growth signal
              available; total customer count (~30,000) and device deployment count (2M+) are cited in press coverage
              referencing company disclosures but without granular time-series comparisons.

              The 43% large-customer growth rate is especially meaningful because it tracks expansion depth, not just
              logo acquisition. A customer spending $100,000+ per year on Verkada is almost certainly running a
              multi-product deployment (cameras plus at least one of access control, alarms, or environmental sensors)
              across multiple sites. This cohort's 43% YoY growth outpaces the implied total-customer growth rate,
              signaling that Verkada's land-and-expand motion is converting initial camera-only accounts into deeper
              platform relationships.

              The adoption funnel begins with prospecting by Verkada's direct sales team or security integrator
              partners, followed by a proof-of-concept or demo deployment (Verkada's plug-and- play PoE+ design supports
              rapid trials), a purchase decision, and then multi-site or multi- product expansion. The Carahsoft
              partnership channel, announced January 2026, extends this funnel into government procurement vehicles
              (cooperative purchasing contracts), which have longer sales cycles but deliver multi-year contracted
              relationships once won.

              Total device deployments exceeding 2 million across ~30,000 customers implies an average of approximately
              67 devices per customer, consistent with mid-to-large multi-site enterprise deployments rather than
              single-location small businesses. This average hides wide dispersion: Fortune 500 accounts likely run
              hundreds to thousands of cameras across global campuses, while smaller customers may run under 20 cameras
              at a single site.

              Year-over-year customer-count growth rates prior to 2024 are not publicly disclosed in a consistent
              time-series. The only reference point is that Verkada served roughly 15,000 customers at its 2022 Series D
              funding ($800M, January 2022), implying a doubling of customer count in approximately three years — a
              roughly 26% CAGR.
