      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Hybrid cloud architecture eliminates NVR while preserving recording resilience
            body: >-
              Verkada's on-device SSD and edge AI processing removes the NVR from the physical security stack —
              eliminating a major failure point, simplifying deployment, and enabling OTA updates — while maintaining
              local recording continuity during cloud outages. This architectural choice is difficult for traditional
              vendors to replicate without hardware redesign and enables Verkada's plug-and-play deployment advantage
              and per-device SaaS model.
