chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Verkada Inc. is a San Mateo, California-based cloud-managed physical security company that builds and
              sells integrated hardware and software solutions for enterprise building security. The company was founded
              in 2016 in Menlo Park, California by Filip Kaliszan (CEO), James Ren, Benjamin Bercovitz, and Hans
              Robertson, and later relocated its headquarters to San Mateo. Verkada's stated mission is to modernize
              physical security for the enterprise by replacing legacy on-premises DVR-based video surveillance systems
              with a cloud-native platform that unifies cameras, access control, alarms, environmental sensors,
              intercoms, and visitor management under a single pane of glass.


              The company positions itself as a "software-first" security provider, drawing analogies to what Apple did
              with mobile by starting with a few core products done exceptionally well and expanding over time.
              Verkada's cameras process video on-device using embedded AI chips while simultaneously syncing encrypted
              footage to the cloud, eliminating the need for network video recorders (NVRs) or dedicated servers. This
              hybrid-cloud architecture enables remote management of thousands of sites from a single browser-based
              dashboard, with features including AI-powered search, facial recognition, motion alerts, and over-the-air
              firmware updates. The company has expanded its Total Addressable Market by adding adjacent product lines
              including access control (launched 2020), environmental sensors (2020), alarms, intercoms, guest
              management, and workplace solutions.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >
              Verkada was co-founded in 2016 by four individuals with complementary technical and entrepreneurial
              backgrounds. Filip Kaliszan serves as CEO and is a two-time entrepreneur who previously co-founded
              CourseRank, a class scheduling and ratings platform acquired by Chegg in 2010, while he was a student at
              Stanford University. James Ren and Benjamin Bercovitz, also Stanford graduates who had collaborated with
              Kaliszan on CourseRank, joined as co-founders. Hans Robertson, the fourth co-founder, brings deep hardware
              and networking expertise as the former co-founder and COO of Meraki, the cloud-managed networking company
              acquired by Cisco in 2012 for $1.2 billion.


              The founding team's combination of enterprise software experience (Kaliszan, Ren, Bercovitz) and
              hardware-plus-cloud-networking expertise (Robertson from Meraki) is frequently cited by investors as a key
              differentiator. Verkada's leadership team also includes Kameron Rezai as CFO, who has led the company's
              fundraising efforts including the Series D and subsequent rounds. As of early 2026, the company employed
              approximately 1,700 people globally. The company has faced leadership-related controversies, including a
              2020 incident where male employees used Verkada's own facial recognition cameras to harass female
              coworkers, leading to terminations and public criticism of the company's workplace culture.
