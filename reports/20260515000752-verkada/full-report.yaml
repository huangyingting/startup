      - number: '8.4'
        title: Comparable Analysis
        blocks:
          - type: paragraph
            body: >-
              The comparable set spans four analytical layers. Public hardware-attached SaaS peers — Motorola Solutions
              (Avigilon, $65B+ market cap, ~6.5x revenue) and Alarm.com (~$3B market cap, ~5x revenue) — establish the
              valuation floor for a physical security platform with blended hardware/software economics [CV011][CV014].
              These peers trade at conservative multiples because hardware creates lumpy revenue, COGS drag, and supply
              chain risk. Verkada's 7.2x multiple sits above this floor, requiring justification from its cloud-native
              architecture and higher recurring subscription mix.

              High-growth cloud IoT and cloud-security peers — Samsara (~$20B market cap, ~20x revenue) and Axon
              Enterprise (~$35B market cap, ~18x revenue) — establish the valuation ceiling [CV012][CV013]. These peers
              trade at premium multiples because of 35-50% revenue growth, near-100% gross retention, and expanding
              platform ecosystems. Verkada's 7.2x multiple is a steep discount to this ceiling, reflecting investor
              uncertainty around its hardware exposure, consent decree, and patent risk.

              CrowdStrike (~$90B market cap, ~15x revenue) provides a reference for pure-cloud security SaaS at scale;
              it is too large and too margin-rich to be a direct comparable but establishes the asymptotic valuation
              ceiling for cloud security platforms [CV017].

              Private comps inform the floor for cloud VMS: Eagle Eye Networks (raised $100M+, undisclosed valuation)
              and Rhombus Systems (smaller, cloud-native) both compete directly with Verkada but have not disclosed
              recent valuations [CV016]. Their funding rounds at smaller scale corroborate that cloud VMS businesses do
              attract premium enterprise SaaS multiples, but Verkada's scale ($800M+ ARR) is categorically different
              from these early-stage comps.

              The net conclusion: at 7.2x revenue, Verkada is priced for continued 25%+ growth — above the legacy
              hardware floor but requiring it to grow into the cloud growth ceiling [CV015][CV025].
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV025
