      - number: '5.2'
        title: Architecture and Technology Stack
        blocks:
          - type: paragraph
            body: >-
              Verkada's architecture is best described as hybrid cloud: AI intelligence and primary storage reside at
              the edge (on-device), while management, search, alerts, audit logs, and long-term archival reside in the
              cloud. This design deliberately avoids the single points of failure of pure-cloud streaming architectures
              where a WAN outage stops recording. Footage continues to write to the on-device SSD during cloud
              disconnection and syncs upon reconnection — a reliability property NVR-based systems also offer, but
              without their management complexity.

              Each camera contains a custom System-on-Chip (SoC) with an embedded neural processing unit (NPU) that runs
              real-time object detection, person/vehicle classification, and motion analysis at the sensor without
              sending raw video to the cloud. All footage is stored on an onboard SSD providing 30 to 365 days of local
              retention depending on SKU — encrypted with AES-256. Footage and event metadata sync to the cloud over TLS
              1.3 for remote access, AI search, and long-term retention. The Command cloud platform runs on AWS
              infrastructure and exposes a browser-based dashboard with role-based access control (RBAC), multi-factor
              authentication (MFA), granular site and device permissions, audit logging, and unified notifications.

              Over-the-air (OTA) firmware updates are delivered automatically to all enrolled devices without customer
              action — a key operational differentiator versus NVR-based competitors where firmware updates require
              on-site engineer visits. REST APIs and webhooks enable integration with HR systems (automated access
              provisioning and de-provisioning), SIEM and SOAR tools (for security operations), and building management
              systems (BMS). Developer documentation is published at developer.verkada.com covering REST API endpoints,
