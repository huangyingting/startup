  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              Verkada's investment thesis is built on five reinforcing pillars. First, the company operates the only
              cloud-native enterprise physical security platform that combines cameras, access control, sensors, and
              alarms on a single unified cloud architecture — a meaningful integration moat that legacy on-premise VMS
              vendors (Genetec, Milestone) and distributed cloud challengers (Eagle Eye Networks) have not yet
              replicated at Verkada's scale [CV001][CV002]. Second, Verkada's recurring software subscription model
              drives high gross margins on the cloud side, partially offset by hardware COGS; the resulting blended
              margin profile is below pure-SaaS but above traditional security hardware companies [CV003][CV007]. Third,
              the company has grown from $100M ARR in 2020 to an estimated $806M in 2025 revenue — a roughly 50%
              five-year CAGR — anchored in mid-market and enterprise customers where switching costs are high and
              expansion revenues are predictable [CV004][CV005][CV006]. Fourth, CapitalG's December 2025 entry at $5.8B
              provides independent institutional validation: CapitalG's portfolio includes Hubspot, Duolingo, and
              Stripe, and its enterprise growth track record makes its investment a genuine signal about Verkada's
              commercial momentum [CV008][CV033]. Fifth, the $20B+ cloud physical security TAM is underpenetrated: fewer
              than 10% of global commercial buildings have migrated from on-premise NVRs to cloud-managed surveillance
              as of 2025 [CV001][CV002].

              The anti-thesis for Verkada is equally substantive. The FTC/DOJ consent decree (September 2024, $2.95M
              civil penalty, permanent injunction requiring a comprehensive security program and biennial audits)
              imposes ongoing compliance costs and creates reputational liability with enterprise procurement teams that
              require security certifications [CV009][CV029]. The March 2021 breach — in which a hacktivist group
              accessed approximately 150,000 camera feeds globally by exploiting a super-admin credential — remains the
              single most damaging event in the company's history, and a recurrence would be immediately thesis-breaking
              [CV028][CV031]. The active ITC Section 337 complaint from Motorola Solutions/Avigilon creates an
              import-ban risk for Verkada's hardware, which would sever the hardware-subscription bundle that is the
              core commercial model [CV010][CV032]. Finally, at an estimated 7.2x NTM revenue, the $5.8B valuation
              prices in significant continued growth; any deceleration toward 20-25% revenue growth would compress the
              multiple sharply relative to Samsara and Axon peers who trade on faster growth profiles [CV005][CV015].
