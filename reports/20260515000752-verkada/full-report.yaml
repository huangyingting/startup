  - id: TI005
    title: Public Financial Gaps Table
    columns:
      - Missing private metric
      - Impact
      - Exact diligence path
    rows:
      - - GAAP revenue / ARR / revenue recognition policy
        - Cannot underwrite scale, seasonality, deferred revenue quality, or revenue-recognition risk
        - >-
          Request management-reported GAAP revenue and ARR with monthly bridge; request revenue-recognition memo,
          deferred revenue roll-forward, and SKU-level revenue mix
      - - Gross margin by segment (hardware vs software)
        - Blocks margin-path and operating-leverage analysis; prevents LTV and unit-economics modeling
        - >-
          Request audited gross margin bridge with COGS detail for hardware (materials, warranty, logistics) and SaaS
          (cloud infra, AI compute, support); ask for blended margin trend by quarter
      - - CAC, payback, sales cycle, and quota attainment
        - Blocks GTM efficiency underwriting; cannot model hiring productivity or channel ROI
        - >-
          Request fully loaded CAC by direct and channel segments, median sales cycle, quota attainment by rep band, and
          pipeline conversion funnel
      - - NRR, GRR, and customer cohort retention
        - Blocks LTV modeling and renewal quality assessment; critical for subscription-business underwriting
        - >-
          Request net and gross revenue retention by customer vintage, top-20 customer concentration as percentage of
          ARR, and churn bridge by reason
      - - Cash on hand, monthly burn, and runway
        - Blocks solvency and capital-intensity analysis; prevents runway and next-round-trigger modeling
        - >-
          Request treasury report with current cash balance, 13-week cash forecast, monthly burn bridge by function, and
          18-to-24-month runway model under base and downside scenarios
      - - Debt, liens, and contingent liabilities
        - >-
          Blocks downside risk modeling; covenant triggers, liens, and open litigation liabilities can materially affect
          enterprise value
        - >-
          Request debt schedule, credit facility terms, covenant package, UCC or lien search results, open litigation
          reserve, and any FTC or DOJ ongoing compliance cost estimates
    notes: >-
      Verkada's private status and deliberate disclosure management mean every standard financial underwriting input is
      unavailable publicly. Investors must require management data room access covering all six gaps above before any
      capital commitment.
