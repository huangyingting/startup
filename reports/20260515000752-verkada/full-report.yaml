      - number: '1.4'
        title: Scale, Milestones, and Adverse Events
        blocks:
          - type: paragraph
            body: >
              Verkada has scaled rapidly since installing its first cameras at an Equinox gym in Beverly Hills in 2017.
              By the end of 2025, the company reported approximately 30,000 active customers and over 2 million devices
              deployed globally, with 8 million door unlocks per day processed through its access control system. The
              company claims the number one market share position in both cloud video security (citing 2023 Novaira
              Insights data) and cloud-native access control (citing 2024 Omdia data). Revenue reached an estimated $806
              million in 2025 according to publicly available estimates, though the company does not publicly disclose
              detailed financials as a private entity.


              The company's trajectory has been marked by several significant adverse events. In March 2021, a hacker
              collective calling itself "APT-69420 Arson Cats," including maia arson crimew (Tillie Kottmann), breached
              Verkada's systems using credentials found publicly online, gaining access to live and archived footage
              from approximately 150,000 cameras across customers including Tesla factories, Cloudflare offices,
              hospitals, jails, and schools. The breach drew widespread media coverage and raised fundamental questions
              about centralized cloud security architectures. In September 2024, the U.S. Department of Justice
              announced a $2.95 million penalty and permanent injunction against Verkada for CAN-SPAM violations, data
              security failures, and deceptive practices stemming from the breach. Additionally, in August 2021,
              Motorola Solutions filed a patent infringement complaint against Verkada with the U.S. International Trade
              Commission, alleging that Verkada cameras infringe on patents held by its Avigilon subsidiary.
