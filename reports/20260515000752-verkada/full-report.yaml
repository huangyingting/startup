      - number: '5.4'
        title: Trust, Security, and Compliance
        blocks:
          - type: paragraph
            body: >-
              The March 2021 breach — in which a hacker group accessed live feeds from approximately 150,000 cameras
              using admin credentials found publicly online — fundamentally reshaped Verkada's security posture. The
              attackers exploited a publicly exposed admin tool with hardcoded credentials, demonstrating a gap in
              access control for the centralized Command platform. Post-breach remediation included mandatory MFA for
              all admin accounts, a formal bug bounty program, and recurring red-team and blue-team security exercises.

              These commitments were later formalized through the 2024 FTC and DOJ joint action, which resulted in a
              $2.95 million civil penalty and a permanent consent decree requiring Verkada to maintain a comprehensive
              Information Security Program (ISP), submit to regular independent third-party security assessments, and
              comply with ongoing regulatory reporting. The decree also mandates enhanced audit logging and access
              controls on the Command platform.

              Technical controls include TLS 1.3 encryption in transit and AES-256 encryption at rest on device SSDs.
              Per-device certificate-based authentication prevents device spoofing. The platform is SOC 2 Type II
              certified covering the Trust Service Criteria for security, availability, confidentiality, and privacy.
              GDPR and CCPA compliance are customer-configurable via data residency and privacy settings. Facial
              recognition requires explicit customer opt-in and consent workflow management. Verkada references the NIST
              Cybersecurity Framework (Identify/Protect/Detect/Respond/Recover) in its compliance positioning. The AICPA
              SOC 2 Type II framework against which Verkada is assessed is the industry standard for cloud-hosted SaaS
              platforms handling sensitive operational data.

              Known compliance gaps include: the SOC 2 audit report is not publicly available for review; the auditor
              identity and specific audit period are not disclosed; the DOJ consent decree creates ongoing compliance
              obligations whose annual cost is not publicly disclosed; and customer-side GDPR configurations may not
              fully satisfy data processing requirements without additional contractual agreements.
