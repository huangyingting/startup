      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'TRACK, Not BUY: Confirm Revenue and ITC Status Before Committing'
            body: >-
              Verkada's $5.8B valuation is defensible in a base scenario — but only defensible, not cheap. The 7.2x
              estimated NTM revenue multiple sits above legacy physical security peers (Motorola/Avigilon, Alarm.com)
              and requires continued 20-25% growth to justify without multiple compression. The TRACK designation
              reflects three unresolved gates: (1) the $806M revenue estimate has not been officially confirmed, so the
              multiple is itself uncertain; (2) the ITC patent litigation with Motorola/Avigilon creates a
              low-probability but high-severity import-ban risk that would sever the hardware-subscription bundle at the
              core of the business model; and (3) the FTC/DOJ consent decree is an ongoing compliance obligation that
              increases enterprise procurement friction. A BUY upgrade triggers on: confirmed revenue at or above $800M
              ARR, favorable ITC case resolution, and NRR confirmed above 110%.
            calloutType: recommendation
            claimRefs:
              - CV004
              - CV005
              - CV009
              - CV010
              - CV022
          - type: callout
            title: Consent Decree + Patent Litigation Create Compounding Tail Risk
            body: >-
              The regulatory and legal risk stack for Verkada is unusually thick for a company at its scale. The
              September 2024 FTC/DOJ consent decree imposes biennial security audits, compliance reporting, and a
              permanent injunction that creates ongoing enterprise procurement friction. The Motorola/Avigilon ITC
              patent complaint adds hardware-import risk. These two risks are not independent — an adverse ITC ruling
              combined with elevated consent decree compliance costs would compress growth and margins simultaneously.
              IPVM has published critical analyses questioning whether Verkada's platform justifies its pricing premium
              relative to open-standard VMS alternatives, adding a third competitive pressure vector. Investors must
              price in a risk premium of at least 1-2 turns on the revenue multiple to account for the compounding
              probability that more than one of these risks crystallizes within the investment horizon.
            calloutType: risk
            claimRefs:
              - CV009
              - CV010
              - CV030
          - type: callout
            title: CapitalG Entry Is a Genuine Quality Signal
            body: >-
              CapitalG's December 2025 $100M investment at $5.8B is not a marginal signal — it is a meaningful one.
              CapitalG manages Alphabet/Google's independent growth equity fund and has a track record of backing
              enterprise SaaS companies that subsequently IPO'ed or achieved $10B+ exits (Hubspot, Duolingo, Stripe).
              Its entry at $5.8B after conducting independent due diligence signals internal conviction in Verkada's
              commercial momentum, NRR profile, and enterprise platform differentiation. For outside investors, this is
              a useful reference point but not a substitute for independent diligence: CapitalG has access to financials
              and NRR data that outside investors do not, and it can tolerate a longer hold period with a lower IRR
              threshold than typical growth fund mandates.
            calloutType: insight
            claimRefs:
              - CV008
              - CV033
