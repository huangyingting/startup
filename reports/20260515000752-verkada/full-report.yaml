  - id: FE001
    title: Product Architecture Map
    type: stack
    layout: wide
    summary: >-
      Verkada's five-layer hybrid cloud architecture stacks hardware endpoints at the bottom, on-device edge
      intelligence in the middle, cloud management above, and an integration API layer at the top. This structure
      eliminates NVR/DVR hardware while preserving local recording resilience.
    data:
      layers:
        - label: Hardware Endpoints
          detail: >-
            Security cameras (indoor/outdoor dome, bullet, fisheye, multisensor, LPR), access control readers (Reader D
            series), alarm sensors (hub, door/window, motion, glass-break, panic), environmental sensors (SV-series),
            intercoms, and visitor management terminals.
        - label: Edge Processing (On-Device SoC + SSD)
          detail: >-
            Custom SoC with embedded NPU for real-time AI inference (object detection, person/vehicle classification,
            motion analysis). AES-256 encrypted SSD provides 30–365 days local footage storage. Devices operate
            independently during cloud disconnection.
        - label: Network and Connectivity
          detail: >-
            Standard PoE+/LAN connection. Encrypted footage metadata and clips sync to cloud over TLS 1.3.
            Bandwidth-optimized: only clips and metadata synced, not continuous raw video streams. Plug-and-play
            provisioning — no on-premises server configuration.
        - label: Command Cloud Platform (AWS)
          detail: >-
            Browser-based unified dashboard for all product lines. Capabilities: AI video search, access control
            management, alarm monitoring, environmental dashboards, RBAC, MFA, audit logging, OTA firmware updates,
            multi-site management, role-based permissions.
        - label: API and Integration Layer
          detail: >-
            REST APIs and webhooks for bi-directional data exchange. Certified integrations with Okta, Azure AD,
            SIEM/SOAR, HR platforms, building management systems. Developer documentation at developer.verkada.com
            covering endpoints, event payloads, and OAuth authentication.
    claimRefs:
      - CE001
      - CE005
      - CE006
      - CE008
      - CE009
      - CE017
  - id: FE002
    title: Customer Workflow / Operating Flow
    type: flow
    layout: wide
    summary: >-
      End-to-end workflow from a physical security event through edge AI processing, encrypted cloud sync, operator
      alert, and audit trail creation. Shows how Verkada's hybrid architecture maps to the customer security operations
      process.
    data:
      nodes:
        - id: physical-event
          label: Physical Security Event
          detail: >-
            Door access attempt, unauthorized motion, environmental threshold breach (CO2, temp), visitor arrival, or
            behavioral anomaly detected at a customer site.
        - id: device-detect
          label: Verkada Device Captures Event
          detail: >-
            Camera, access reader, alarm sensor, environmental sensor, or intercom records the triggering stimulus at
            the hardware level.
        - id: edge-ai
          label: On-Device AI Processes Locally
          detail: >-
            Embedded NPU classifies person/vehicle, checks motion zones, evaluates sensor thresholds, and generates
            event metadata — all without cloud round-trip.
        - id: local-ssd
          label: Clip and Metadata Written to SSD
