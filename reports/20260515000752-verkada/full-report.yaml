            title: Multi-Product Platform Depth Creates Durable Competitive Moat
            body: >
              Verkada is the only cloud-native vendor to natively offer cameras, access control, alarms, environmental
              sensors, intercoms, and visitor management in a single unified dashboard. No single competitor — legacy
              incumbent or cloud-native peer — replicates this breadth at cloud-native quality levels. Each additional
