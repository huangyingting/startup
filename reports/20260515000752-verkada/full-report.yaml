  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >-
              Verkada's monetization is built on a two-part hardware-plus-SaaS architecture. Customers first purchase
              Verkada hardware — network cameras, access control readers, alarm panels, environmental sensors,
              intercoms, or guest-management devices — as a one-time capital sale. Each device is then enrolled in an
              annual cloud software subscription that delivers AI-powered video search, automatic over-the-air firmware
              updates, encrypted cloud archiving, remote dashboard management, and edge analytics. This recurring
              subscription layer is the core long-term economic asset: as the device fleet grows, the annual SaaS base
              compounds even if hardware unit growth slows.


              Pricing is entirely negotiated and not publicly listed. Verkada's website routes prospective buyers to
              enterprise sales representatives. Independent channel sources and G2 reviewers indicate hardware ASPs
              range from roughly $500 for basic cameras to over $3,000 for high-resolution AI models, while annual
              per-device subscription costs are estimated at $200–$500 per camera per year by IPVM industry analysis and
              customer self-reports. Multi-year contracts — typically three years — are standard in the enterprise
              segment. Volume and multi-site discounts are understood to apply, but no rate card is publicly available.


              Verkada earns additional revenue through ancillary streams: professional deployment services (though the
              company positions the product as plug-and-play), multi-product cross-sell as customers add access control
              and alarm lines to a camera deployment, and channel-mediated sales through distributors such as Carahsoft
              Technology (announced January 2026) for the government and SLED market. None of these streams is
              individually broken out in any public disclosure, making revenue mix analysis entirely dependent on
              management-provided data.
