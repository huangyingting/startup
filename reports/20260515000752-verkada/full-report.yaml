  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              The physical security market encompasses the hardware, software, and services used to protect buildings,
              people, and assets from physical threats. This includes video surveillance (cameras, video management
              software, storage), access control (readers, controllers, credentials, software), intrusion detection
              (alarms, sensors), environmental monitoring (air quality, temperature, humidity sensors), intercoms, and
              visitor management systems. The market excludes cybersecurity software, personal safety devices, and
              consumer home security products (Ring, Nest) which operate in adjacent but distinct segments with
              different buyer personas and distribution channels.


              Verkada operates specifically in the enterprise and commercial segment of this market, targeting
              organizations with multiple locations, hundreds to thousands of cameras, and professional security
              operations. The company's addressable market includes both new installations (greenfield) and replacement
              of legacy on-premises systems (brownfield), with the latter representing the larger near-term opportunity
              given the massive installed base of analog and NVR-based systems. Key adjacent markets include building
              automation, IoT platform management, and workplace analytics, which Verkada is beginning to address
              through its environmental sensors and workplace products.


              The status-quo substitutes for Verkada's cloud-native platform are traditional on-premises systems from
              incumbents like Axis Communications (Canon), Avigilon (Motorola Solutions), Genetec, Milestone Systems,
              and Hanwha Vision (Samsung). These systems typically require dedicated servers, NVRs, and on-site IT staff
              for maintenance, creating ongoing operational costs that cloud alternatives aim to reduce. The switching
              cost for enterprises is significant — typically requiring camera hardware replacement, network upgrades,
              and retraining of security staff — which both constrains adoption velocity and creates durable competitive
              moats once installed.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
              - CM003
      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Multiple analyst firms provide estimates of the physical security market, though methodologies and segment
              boundaries vary considerably. The global video surveillance market alone was estimated at $53-62 billion
              in 2024-2025 by firms including Omdia, MarketsandMarkets, and Grand View Research, with projected growth
              to $85-100 billion by 2030 at a CAGR of 8-12%. The global access control market adds another $10-15
              billion, growing at 7-9% CAGR. Combined with alarms, intercoms, environmental sensors, and related
              software, the total addressable market for physical security equipment and services reaches approximately
              $120-150 billion globally.


              Verkada's Serviceable Addressable Market (SAM) is more tightly defined as cloud-managed physical security
              for commercial and enterprise customers, primarily in North America and Europe. Verkada and Eclipse
              Ventures have estimated this at approximately $60 billion, though this figure likely includes adjacent
              categories and future market expansion. A more conservative SAM for cloud-native video surveillance and
              access control platforms, based on Omdia and Novaira Insights segmentation, would be approximately $15-25
              billion in 2025, growing at 15-20% CAGR as cloud adoption accelerates. Verkada's Serviceable Obtainable
              Market (SOM) — the share it can realistically capture given its current product portfolio, channel, and
              geographic presence — is estimated at $3-5 billion within its core mid-market and large enterprise
              segments in North America.


              A critical diligence point is that Verkada's cloud-native segment is growing significantly faster than the
              overall physical security market. While the total market grows at 8-10% CAGR, the cloud video surveillance
              segment is growing at 20-30% CAGR according to Novaira Insights, driven by the secular shift from
              on-premises to cloud architectures. This differential growth rate is the core thesis for Verkada's premium
              valuation relative to traditional security hardware vendors.
