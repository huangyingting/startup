      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Secular Cloud Migration Tailwind Supports Premium Growth
            body: >
              With only 10-15% of commercial video surveillance cameras currently cloud-managed, Verkada benefits from a
              large and durable secular tailwind as enterprises replace aging DVR/NVR infrastructure. The cloud segment
              is growing at 20-30% CAGR versus 8-10% for the overall physical security market, supporting Verkada's
              premium valuation.
            calloutType: strength
            claimRefs:
              - CM017
          - type: callout
            title: Market Sizing Estimates Vary Widely and May Be Inflated
            body: >
              Verkada and Eclipse Ventures estimate their addressable market at $60 billion, but this likely includes
              adjacent categories and future market expansion that may take a decade to materialize. More conservative
              analyst estimates of the cloud-managed physical security segment put it at $15-25 billion, which still
              represents significant headroom but is materially smaller than the company's claimed TAM.
            calloutType: risk
            claimRefs:
              - CM010
              - CM011
          - type: callout
            title: Platform Land-and-Expand Model Amplifies Per-Customer Value
            body: >
              Verkada's multi-product platform strategy creates a powerful land-and-expand dynamic where customers start
              with cameras and progressively add access control, alarms, sensors, and intercoms. The 43% year-over-year
              growth in large customers ($100K+) suggests strong expansion economics and validates the platform thesis.
            calloutType: insight
            claimRefs:
              - CM015
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Verkada competes in the commercial physical security market across three overlapping competitive tiers:
              cloud-native peers, legacy on-premises incumbents migrating to cloud, and point-solution access control
              specialists. The competitive landscape is shaped by the secular shift from on-premises NVR/DVR systems to
              cloud-managed platforms, though this transition is still in early innings — analyst estimates suggest
              fewer than 15% of commercial video surveillance cameras are currently cloud-managed.


              The broadest competitive threat comes from diversified legacy incumbents with massive installed bases:
              Axis Communications (the global market leader in network cameras, owned by Canon since 2015), Avigilon
              (owned by Motorola Solutions since 2018), Genetec, and Milestone Systems (also Canon-owned since 2014).
              These vendors control the majority of enterprise security deployments and are actively building cloud
              offerings to defend their positions. A second tier of cloud-native competitors — Eagle Eye Networks,
              Rhombus Systems, and Cisco Meraki MV — shares Verkada's cloud architecture but has materially narrower
              product portfolios. A third tier of access control specialists, including Brivo, Openpath (Motorola
              Solutions), Kisi, and Salto Systems, competes specifically with Verkada's access control product line.


              What distinguishes Verkada from all of these competitors is its multi-product platform breadth: the only
              cloud-native vendor to natively offer cameras, access control, alarms, environmental sensors, intercoms,
              and visitor management in a single unified dashboard. No single competitor replicates this breadth at
              cloud-native quality levels, though incumbent platform players like Genetec and Avigilon approximate it
              within their on-premises or hybrid ecosystems. This section maps the competitive landscape, positions key
              players by cloud-nativity and platform breadth, and frames the moat assessment that follows.
            claimRefs:
