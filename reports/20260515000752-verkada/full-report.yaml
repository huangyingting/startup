      - number: '7.4'
        title: People, Culture, and Execution Risk
        blocks:
          - type: paragraph
            body: >-
              Verkada faces a documented people and culture risk stack. In October 2020, The Verge reported that Verkada
              employees had used the company's cameras and facial recognition feature to harass female colleagues, with
              targeted photos shared internally. Bloomberg followed with broader coverage in March 2021 linking the
              incident to a reported bro culture at the company. Disciplinary action was taken, but the coverage
              generated persistent employer-brand damage that affects recruitment of senior engineering and product
              talent in the Bay Area. Glassdoor reviews reflect ongoing concerns about management style and culture
              alongside positive ratings for mission and compensation.

              Filip Kaliszan has served as sole CEO since co-founding Verkada in 2016. There is no publicly disclosed
              succession plan, CFO of record, or depth chart for the C-suite, creating key-person concentration risk at
              a company scaling toward and beyond 30,000 enterprise customers. Rapid hiring to support growth puts
              strain on engineering, sales, and customer success organizations in one of the most competitive talent
              markets in the world. The $200 million Series E (February 2025) and subsequent $5.8 billion valuation
              create retention incentives for early employees, but liquidity remains contingent on an IPO or acquisition
              that has not been announced, and long vesting tails can become a retention liability if comparable
              companies provide faster liquidity.

              Financial model risk compounds the people picture. Verkada's hardware-plus-SaaS model requires ongoing
              capital for manufacturing, inventory financing, and device subsidization that pure-software SaaS companies
              do not face. No burn rate, gross margin, or path to GAAP profitability has been publicly disclosed.
            claimRefs:
              - CR026
              - CR027
              - CR028
