chapter:
  number: 1
  title: Company Overview
  summary: |
    Cyberhaven is a private AI and data security company best known for a lineage-first platform
    that combines data security posture management, data loss prevention, insider risk
    management, and AI security. Public records support a 2016 founding by five technical
    co-founders and show a major capital step-up from a $33 million Series B in 2021 to an $88
    million Series C in 2024 and a $100 million Series D at a $1 billion valuation in April
    2025. The company expanded its executive bench in September 2024, shifted from Howard Ting to
    Nishant Doshi as CEO in 2025, and reported triple-digit revenue growth plus greater than 50%
    customer growth for fiscal 2026. The main diligence caveats are uneven disclosure on
    headquarters, headcount, revenue/ARR, and absolute customer count, plus the reputational and
    operational overhang from the December 2024 Chrome extension compromise.
sections:
  - id: s1
    title: Identity, product scope, and location ambiguity
    body: |
      Cyberhaven presents itself as an AI and data security company whose core differentiator is
      data lineage: the company says its platform follows how sensitive data originates, moves,
      and changes across endpoints, cloud, SaaS, on-prem systems, and AI tools. Current product
      marketing and the February 2026 growth release describe a single architecture spanning DSPM,
      DLP, insider risk management, and AI security rather than a loose collection of separate
      point products. That unified positioning matters because later chapters can treat Cyberhaven
      as a platform company, not just a browser-extension or classic DLP vendor.

      Identity basics are directionally clear but not perfectly clean. Redpoint and Tracxn both
      place the company in San Jose and list five founders, while Cyberhaven's own public
      materials use different Bay Area datelines over time: San Jose in September 2024, Palo Alto
      in April 2025, and Mountain View in late 2025 and early 2026. The extension privacy policy
      also lists a Palo Alto mailing address. For diligence purposes, the safest canonical
      description is that Cyberhaven is a private Bay Area company with strongest non-company
      support for San Jose, but with headquarters precision still needing direct confirmation.

      Sector focus is more concrete. Cyberhaven publicly targets technology/SaaS, manufacturing,
      law firms, investment management, and healthcare, which lines up with its messaging around
      protecting sensitive intellectual property, regulated data, and AI workflows. The company is
      best treated as a late-stage private security vendor that reached unicorn status in 2025 but
      still discloses only selected operating metrics.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
