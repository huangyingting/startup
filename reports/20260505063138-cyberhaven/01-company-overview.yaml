callouts:
  - calloutType: strength
    title: Lineage-first platform thesis has scaled into a broader control plane
    body: |
      Cyberhaven is no longer positioning as a narrow DLP or browser-extension vendor. Public
      materials consistently describe a unified platform spanning DSPM, DLP, insider risk, and AI
      security, which is a materially larger product and budget envelope than the company's 2021
      or 2022 positioning alone would suggest.
    claimRefs:
      - CO001
      - CO002
      - CO028
      - CO046
  - calloutType: risk
    title: Operational and disclosure risks remain material
    body: |
      The December 2024 extension compromise, the 2025 CEO transition, and conflicting public
      records on headquarters and headcount all create diligence friction. None of these issues is
      necessarily thesis-breaking, but together they mean Cyberhaven should not be treated as a
      fully de-risked late-stage software company.
    claimRefs:
      - CO019
      - CO029
      - CO030
      - CO031
      - CO038
      - CO039
      - CO041
  - calloutType: insight
    title: Capital formation outpaced public KPI disclosure
    body: |
      Cyberhaven has disclosed enough to prove strong investor demand and momentum, but not enough
      to benchmark revenue quality from public sources alone. The company gives valuation, total
      funding, growth rates, and customer categories, yet withholds absolute ARR, revenue, and
      customer count.
    claimRefs:
      - CO012
      - CO022
      - CO023
      - CO024
      - CO025
