callouts:
  - calloutType: risk
    title: Retention and Cohort Data Are Completely Undisclosed
    body: |
      Cyberhaven does not publicly disclose NRR, GRR, annual churn, or cohort retention.
      As a pre-IPO company with a $1B valuation, this is the single largest evidence gap
      for customer durability analysis. Buyers should treat favorable review scores as
      satisfaction proxies only, not retention guarantees. Formal diligence must include
      requests for retention dashboards, renewal rate by cohort, and top-10 customer ARR
      concentration data.
    claimRefs:
      - CU038
      - CU027
  - calloutType: risk
    title: Named Customer Base Is Small Relative to Valuation
    body: |
      Only 14 customers have been publicly confirmed. Enterprise security SaaS companies
      at $1B valuations typically have 200–500 enterprise accounts generating the ARR
      implied by that valuation. The small named-customer disclosure base is a diligence
      flag: either the actual customer count is much larger (favorable) or revenue is
      heavily concentrated in a few large accounts (unfavorable). Formal diligence should
      request the total customer count, ACV distribution, and top-5 customer revenue
      concentration.
    claimRefs:
      - CU039
      - CU038
      - CU015
  - calloutType: insight
    title: Motorola Outcome Metrics Are Industry-Leading Proof Points
    body: |
      Motorola's reported 90% false-positive reduction, 98% investigation-time reduction,
      and 50% actionable-alert increase are among the most specific and quantified
      customer outcome data points in the DLP market. These metrics directly address the
      primary objection to legacy DLP (false-positive overload) and position Cyberhaven
      as a replacement rather than a supplement. If the metrics generalize across
      manufacturing, legal, and financial verticals, they represent a strong expansion
      motion foundation.
    claimRefs:
      - CU003
      - CU004
      - CU005
