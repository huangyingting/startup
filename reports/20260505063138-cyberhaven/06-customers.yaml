company:
  name: Cyberhaven
chapter:
  number: 6
  title: Customers
  summary: |
    Cyberhaven serves large enterprises across technology, manufacturing, legal, financial
    services, healthcare, and government verticals. At least 14 named production customers
    have been publicly confirmed, including Snowflake, Motorola, Canon, Reddit, AmeriHealth,
    Cooley, IVP, Navan, DBS, Upstart, Kirkland & Ellis, DARPA, IDA, and Iron Mountain.
    Motorola is the flagship reference, with CISO Richard Rushing citing 90% false-positive
    reduction, 98% investigation-time reduction, and 50% increase in actionable alerts.
    Review scores are consistently strong: 4.6/5 on Gartner Peer Insights (48 reviews),
    4.5/5 on G2, and 4.8/5 on FeaturedCustomers (953 ratings). PeerSpot DLP mindshare
    grew from 1.5% to 2.3% between 2024 and May 2026. NRR, churn, and total customer
    count are not publicly disclosed; the December 2024 Chrome extension incident caused
    no known customer churn.
sections:
  - id: '6.1'
    title: Customer Base and Segmentation
    body: |
      Cyberhaven serves large enterprises across six industry verticals: Technology/SaaS,
      Manufacturing, Legal/Professional Services, Financial Services, Healthcare, and
      Government/Defense. Named customers confirmed via press coverage and case studies
      include Snowflake, Motorola, Canon, Reddit, AmeriHealth, Cooley, IVP, Navan, DBS,
      Upstart, Kirkland & Ellis, Iron Mountain, DARPA, and IDA — 14 organizations in total.
      All are large enterprises with more than 1,000 employees; there is no evidence of
      SMB or mid-market customers. The website explicitly segments industry marketing into
      five named verticals: Technology/SaaS, Manufacturing, Law Firms, Investment
      Management, and Healthcare, confirming a deliberate vertical go-to-market strategy
      rather than horizontal generalist positioning. Geography is predominantly US-based
      (12 of 14 named customers are US-headquartered), with at least one Asian financial
      institution (DBS, Singapore) demonstrating early international expansion.
    claimRefs:
      - C234
      - C235
      - C248
      - C249
      - C262
      - C269
  - id: '6.2'
    title: Named Customer Proof and Outcomes
    body: |
      Motorola is the most detailed public reference. CISO Richard Rushing credits
      Cyberhaven with a 90% reduction in DLP false positives, a 98% reduction in
      investigation time per incident, and a 50% increase in actionable security alerts.
      These metrics reflect the core product claim: that data lineage context radically
      reduces false positives compared with content-inspection-only DLP tools. Navan
      (formerly TripActions), the corporate travel and expense SaaS platform, deployed
      Cyberhaven for financial and employee data protection, with VP of Security PK Karanth
      as a named reference. Iron Mountain uses Cyberhaven to monitor data flows across its
      global records management and cloud storage infrastructure. FeaturedCustomers records
      17 verified testimonials and one case study, with a 4.8/5 composite score from
      953 reference ratings. DARPA and the Institute for Defense Analyses (IDA) are
      customers cited by FeaturedCustomers, confirming federal government penetration.
      Approximately 400,000 corporate users were exposed to the December 2024 malicious
      extension, providing a lower-bound estimate of end-user deployment scale across
      the enterprise customer base.
    claimRefs:
      - C236
      - C237
      - C238
      - C239
      - C240
      - C241
      - C252
      - C259
      - C270
  - id: '6.3'
    title: Customer Satisfaction and Review Scores
    body: |
      Cyberhaven earns consistently high review scores across independent platforms.
      On Gartner Peer Insights, the platform holds 4.6/5 from 48 verified enterprise
      reviews, ranking above most legacy DLP vendors (Symantec ~3.8, Forcepoint ~3.9,
      Microsoft Purview ~4.0). FeaturedCustomers reports a 4.8/5 composite from 953
      reference ratings. G2 shows 4.5/5 from 18 reviews (2021 snapshot; likely higher
      currently). PeerSpot DLP mindshare grew from approximately 1.5% to 2.3% between
      2024 and May 2026, reflecting organic review accumulation. Qualitative review themes
      consistently cite: real-time data flow visibility, reduced false-positive burden,
      fast deployment via MDM and Google Workspace admin, and improved investigation
      speed as top strengths. Common criticism points include limited on-premises
      deployment options and SIEM integration depth.
    claimRefs:
      - C250
      - C251
      - C252
      - C253
      - C254
      - C263
      - C264
      - C268
  - id: '6.4'
    title: Retention, Expansion, and Concentration Risk
    body: |
      Cyberhaven does not publicly disclose NRR, GRR, or customer churn metrics. No
      customer churn was publicly reported following the December 2024 Chrome extension
      incident, despite approximately 400,000 corporate users being affected. Cyberhaven's
      response — engaging Mandiant, publishing a clean extension within 24 hours, and
      proactively notifying customers — appears to have contained retention damage.
      Expansion dynamics follow a land-and-expand model: initial DLP deployments expand
      to DSPM, Insider Risk Management (IRM), and AI Security modules as security programs
      mature. Cyberhaven added AWS, Azure, and GCP marketplace availability in April 2026,
      expanding enterprise procurement channels for cloud-committed buyers. Customer
      concentration risk is observable: Motorola is the only reference with fully
      quantified outcomes, and 14 publicly named accounts is a limited disclosure base
      relative to companies at comparable $1B valuations. Top-customer revenue concentration
      is unverifiable; typical enterprise security companies at this stage have 100–500
      customers.
    claimRefs:
      - C260
      - C261
      - C265
      - C266
      - C267
      - C271
      - C272
  - id: '6.5'
    title: Awards, Analyst Recognition, and Competitive Positioning
    body: |
      Cyberhaven has accumulated meaningful third-party validation. Gartner named it a
      Cool Vendor in Data Security. The 2025 Deloitte Technology Fast 500 placed it among
      the fastest-growing technology companies in North America by revenue growth rate.
      Fortune included Cyberhaven in its 2025 Cyber 60 list. Redpoint Ventures named it
      to the InfraRed 100 infrastructure security list for three consecutive years.
      Cyberhaven achieved Black Unicorn status in 2024 and crossed $1B valuation in
      April 2025. PeerSpot mindshare increased from 1.5% to 2.3% (May 2026), the highest
      growth rate among emerging DLP vendors tracked. Competitors Symantec, Forcepoint,
      and Microsoft DLP receive lower Gartner Peer Insights scores (3.8–4.1) than
      Cyberhaven's 4.6, though each commands a significantly larger installed base.
    claimRefs:
      - C255
      - C256
      - C257
      - C258
      - C268
      - C273
