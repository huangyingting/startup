      - number: '5.2'
        title: 模块架构与产品线地图
        blocks:
          - type: paragraph
            body: >
              平台由五个相互连接的模块构成。DSPM 在云和端点环境中发现并分类数据，并在数据于云和设备之间移动时持续监控。DLP
              通过带有数据血缘信息的策略决策，而不是纯内容检查，在电子邮件、网页、云和设备上实时阻断和指导。IRM 把数据移动信号与行为信号结合起来，检测内部威胁并厘清意图，捕捉传统工具会漏掉的慢速外泄模式。AI 安全监控影子
              AI 使用（ChatGPT、Google Gemini、Microsoft Copilot 和其他 AI 工具），评估 AI 风险态势，并在不阻断正当使用的情况下防止数据泄露给 AI 工具。Linea AI
              是横跨所有模块的智能层——包括 Detection Agent（使用专有 Large Lineage Models，LLiM，自主检测高风险活动）和 Analyst
              Agent（发起深度调查、收集证据，并交付带后续步骤的报告）。每个模块都作为统一平台的一部分销售；单独模块定价或独立 SKU 可用性没有公开记录。公司在 May 5, 2026 宣布「Securing the
              Agentic AI Era」产品发布，暗示平台继续扩展到智能体 AI 治理，但截至研究日期，该发布的具体内容尚未公开。
