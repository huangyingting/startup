      - number: '8.3'
        title: 牛市 / 基准 / 熊市情景
        blocks:
          - type: paragraph
            body: >
              牛市情景假设 Cyberhaven 到 2028 年 ARR 继续以每年 50–60% 增长，达到 $400–600M。在该情景下，Microsoft 未能交付有竞争力的数据血缘 DLP
              产品，没有重大安全事件发生，NRR 保持在 120% 以上，Cyberhaven 向欧盟和 APAC 受监管企业国际扩张。按 8–12x ARR 计算，2028 年估值为 $3.2B–$7.2B，相当于从 $1B
              Series D 估值获得 3–7 倍回报。退出路径包括 IPO（若 ARR 达 $400M+ 且利润率已被证明）或被 Palo Alto Networks、CrowdStrike、Microsoft 战略收购。


              基准情景假设 ARR 年增长 30–40%，到 2028 年达到 $200–300M，NRR 约 110%，毛利率约 75%，且集体诉讼以成功但成本较高的方式解决（和解低于 $15M）。按 5–7x ARR
              计算，估值区间为 $1B–$2.1B，相当于从当前入场获得 1–2 倍回报。该情景要求 Microsoft Purview 仍是较弱竞争者，且不发生第二次重大安全事件。


              熊市情景由第二次重大 Chrome 扩展被攻破、GDPR/FTC 执法行动，或 Microsoft 在 Purview E5 中发布数据血缘功能触发。在该情景下，ARR 年增长停滞在 10–20%，到 2028
              年仅达到 $120–150M。企业客户开始流失，NRR 低于 100%。按 3–5x ARR 计算，估值将为 $360M–$750M，远低于 $1B Series D 入场，意味着降估值融资和重大资本减损。
            claimRefs:
