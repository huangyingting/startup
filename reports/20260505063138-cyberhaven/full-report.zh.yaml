      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >
              主要运营风险是架构性的：Cyberhaven 的终端覆盖依赖 Chrome 浏览器扩展。2024 年 12 月，攻击者攻破开发者 OAuth token，并向 Chrome Web Store 推送恶意版本
              v24.10.4，这条分发通道绕过了传统终端安全控制。恶意扩展存活约 24 小时，随后 Cyberhaven 发布干净的 v24.10.5，并聘请 Mandiant
              做取证调查。事件暴露了浏览器扩展供应链的根本脆弱性：单个开发者凭据被攻破，就能在没有逐客户审批流程的情况下触达所有已部署实例。


              Google Chrome 约占全球浏览器市场 65%，因此是企业 DLP 代理的理性主通道，但也带来平台依赖。Chrome Manifest v3 迁移改变了 API
              可用性，未来政策变化可能限制扩展可用的网络拦截深度。Cyberhaven 另有通过 MDM 安装的 network DLP 代理，可部分缓解只靠扩展的风险，但并非所有客户都普遍部署该代理。


              GCP 单云依赖带来集中度风险：区域性 GCP 故障或定价重谈都会压缩灵活性。基础设施部署在美国 GCP 区域，并采用逐客户隔离实例；这种设计限制爆炸半径，但抬高运营开销。DevOps 关键人风险为中等，约
              350 名员工的工程团队掌握难以快速替换的专门数据血缘图谱能力。核心数据科学或基础设施工程师流失会拖慢路线图。
            claimRefs:
