  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 所处的是数据处理监管最重的品类之一：软件会检查、拦截并记录员工和企业数据在终端、云服务、网络通道中的流动。这触发 GDPR（EU 2016/679）、CCPA/CPRA（加州）、PCI
              DSS v4.0.1、客户属于适用主体时的 HIPAA，以及 FTC Act 第 5 条下 FTC 广泛数据安全执法权的义务。2023 年 SEC 网络安全披露规则要求 Cyberhaven
              的企业客户报告重大事件，间接倒逼 Cyberhaven 提供快速且有文档记录的数据泄露响应；这一能力已在 2024 年 12 月接受检验。


              Cyberhaven 处理欧盟数据主体个人数据的任何场景，都适用 GDPR 第 28 条处理者义务和第 32 条安全要求。金融、医疗、法律等受监管行业客户会通过数据处理协议，把下游合规要求传导给
              Cyberhaven。Cyberhaven 若不合规，可能让客户暴露在监管机构执法下，引发合同终止和声誉损害，影响超出任何直接罚款。GDPR 第 83(5) 条规定，最严重违规的罚款可达 EUR 20M
              或全球年营业额 4% 中较高者。


              2024 年 12 月 Chrome 扩展被攻破（v24.10.4）后，TopClassActions 记录了至少一起集体诉讼，称约 400,000 名企业用户的 OAuth
              凭据暴露。诉讼风险不可忽视：和解成本、诉讼费用和负面曝光都可能拖累销售周期和续约率。IP 风险为中等，因为 Cyberhaven 持有数据血缘跟踪专利；但随着 Symantec、Microsoft Purview
              等现有厂商纳入血缘功能，新颖性窗口正在收窄。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
