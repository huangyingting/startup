      - number: '4.2'
        title: 公开牵引信号及其对单位经济的含义
        blocks:
          - type: paragraph
            body: >
              公开牵引信号方向性很强，尽管经典 SaaS 效率指标仍未披露。Cyberhaven 的 June 2024 C 轮公告称新签订单额增长 200%；February 2026 业务结果发布称截至 January
              31, 2026 的财年在收入、客户和平台采用上创纪录增长，包括同比三位数增长和超过 50% 的客户增长。同一发布还称，客户包括 Forbes AI 50
              榜单前五家公司中的四家，以及部分北美前五大银行，另有其他受监管机构和律所。这些披露支持一个判断：Cyberhaven 正在上移到更大、更重视合规的企业客户。


              客户验证也显示产品能产生可衡量的运营价值。Cyberhaven 强调，启用实时用户指导后，解决时长改善 200%，高风险行为减少
              80%。预约演示和合作伙伴材料还加入了管理层说法：平台减少告警噪音、降低项目成本，并通过整合工具降低总拥有成本。这些不是 CAC、回本周期、总留存或 NRR 的替代品，但确实说明 Cyberhaven
              为什么能追求高溢价企业销售，而不是走量驱动的商品化安全路线。


              最难回答的公开数字问题是规模。独立数据供应商意见不一：Datanyze 和 ZoomInfo 都显示收入约 $64.9 million，Growjo 估计约 $52.4
              million。这些数字足够可信，可以框出一个公开估算区间，但它们不是公司申报数据，不应视为可承销收入。合并来看，最强的单位经济解读仍是定性的：Cyberhaven
              看起来拥有强劲企业需求、上升的销售速度和有意义的产品 ROI 信号，但公开记录仍缺少 CAC、回本周期、毛利率和续约质量的直接证据。
