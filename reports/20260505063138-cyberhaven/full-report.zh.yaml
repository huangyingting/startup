        - 安全运营、合规、数据保护负责人 / 安全或合规预算
        - 核心邻近品类和传统替代方案
      - - 内部人员风险管理（IRM）
        - 行为分析、策略告警、调查、兼顾隐私的内部滥用治理项目
        - 通用 HR 软件、未绑定数据风险处置动作的通用 UEBA
        - 合规负责人、内部人员风险调查员、法务和安全相关方 / 中央治理预算
        - Cyberhaven 风险用户定位的核心邻近品类
      - - 数据安全态势管理（DSPM）
        - 敏感数据发现、分类、暴露面映射、合规报告、云数据上下文
        - 不含数据分类、只管基础设施的态势管理
        - 云安全和数据治理团队 / 云安全或平台预算
        - 与 Cyberhaven 数据血缘和可视性主张最相关的新兴品类
      - - 原生套件替代方案
        - Microsoft Purview 或类似套件控制，随更广的合规和数据安全项目打包
        - 买方只想使用打包原生控制时，最佳单项平台不计入
        - 既有 Microsoft 或合规负责人 / 现有套件预算
        - 重要现状替代方案，可能拖慢独立产品采用
