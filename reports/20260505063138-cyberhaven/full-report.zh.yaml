      - number: '2.4'
        title: 增长驱动、采用约束与估值相关性
        blocks:
          - type: paragraph
            body: >-
              支撑 Cyberhaven 采用的驱动因素具有持续性。第一，云和多云蔓延持续把敏感数据推向端点、SaaS 和云存储库，正好对应公开 DSPM 研究强调的数据发现与分类问题。第二，AI
              采用制造新的外泄和治理问题：Cyberhaven、Microsoft 和 Palo Alto 都强调保护现在会流经 AI 工具和智能体的数据。第三，监管和治理压力正在上升；SEC
              规则现在要求上市公司更明确披露网络风险管理和治理，而 Microsoft 与 CISA 材料显示，内部人员风险控制正在从临时调查变成正式项目。第四，泄露数据让紧迫感维持高位。HIPAA Journal 对
              Verizon 2024 DBIR 的总结显示，在 Verizon 方法论下，内部行为人造成 70% 的医疗数据泄露，人为错误涉及 68%
              的泄露。约束同样真实：传统环境碎片化，告警质量可能很差，许可和权限会拖慢落地，公开市场预测也不同意品类边界。对估值而言，这意味着 Cyberhaven
              暴露于一个真实且增长中的市场，但投资人应对实施摩擦，以及合同规模、胜率和垂直行业组合缺乏公开证据做折价。
