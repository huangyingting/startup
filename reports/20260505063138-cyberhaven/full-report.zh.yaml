  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与平台概览
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 营销的是统一 AI 与数据安全平台，合并了四个过去相互分离的产品类别：数据安全态势管理（DSPM）、数据防泄漏（DLP）、内部人员风险管理（IRM）和 AI
              安全。按客户工作流看，平台位于企业数据存储与每个外泄向量之间——电子邮件、浏览器、SaaS 应用、可移动存储、打印和云——并实时拦截高风险数据移动。它解决的业务问题是：传统 DLP
              产品在策略检查点检查内容，却不了解数据历史，因此制造大量误报，也漏掉依赖上下文的威胁。Cyberhaven 声称，通过把数据血缘上下文加入每次决策，误报告警比其他工具减少 95%。产品面向拥有高价值
              IP、受监管数据或活跃内部人员风险的企业；技术、金融、制造、医疗和法律行业的具名客户可作佐证。定价未公开披露，需要直接销售接触。平台可用性在 April 2026 扩展至 AWS
              Marketplace、Azure Marketplace 和 GCP Marketplace，使客户能够把支出计入既有云承诺。
            claimRefs:
              - CE001
