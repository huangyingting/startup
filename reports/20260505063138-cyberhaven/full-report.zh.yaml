      - number: '1.5'
        title: 里程碑、负面事件与后续章节可复用内容
        blocks:
          - type: paragraph
            body: >
              可复用的公司时间线很清楚。公开来源支持：2016 年成立；2021 年 B 轮；2022 年发布内部威胁产品；June 2024 C 轮引入 Adams Street 并新增董事会席位；September
              2024 扩充领导层；December 2024 浏览器扩展被攻陷；April 2025 D 轮使公司成为独角兽；May 2025 CEO 交接；November 2025 入选 Deloitte Fast
              500；February 2026 发布业绩，报告强劲增长但未给出绝对财务数据。这些事件合在一起，展现出公司在很短窗口内从技术起源叙事走向品类营销规模。


              负面事件具有实质性，应延续到风险章节。TechCrunch、BleepingComputer 和 Nightfall 都描述了 December 2024 下旬公司账号被攻陷后发布的恶意 Chrome
              扩展更新。据报道影响包括认证会话和 cookie 暴露、约 400,000 名扩展用户处于风险中，并与一场影响超过 35 个扩展、约 2.6 million
              用户的更大行动有关。该事件不否定产品逻辑，但对一家销售数据保护软件的公司来说，它是声誉和运营压力测试。


              事件后的增长叙事仍然强劲。Cyberhaven 仍完成 D 轮，在没有明显公开扰动的情况下更换 CEO，在 Deloitte 2025 Technology Fast 500 中排名 #51，并随后报告 2026
              财年三位数收入增长。后续章节可复用这一序列作为核心框架：强劲资本和品类动能，与披露缺口和有意义的运营污点并存。
