      - number: '1.4'
        title: 封面指标、披露限制与公开运营信号
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 披露的信息足以证明成熟度，但不足以在没有管理层访问的情况下承销业务。最强的公开封面指标包括 $1 billion D 轮估值、官方累计融资 $250 million、2026
              财年三位数收入增长，以及超过 50% 的客户增长。公司还公开声称进入 Forbes AI 50
              前五家公司中的四家，以及北美前五大银行，同时被金融、法律、零售、医疗和媒体等大型组织使用。这些说法显示出企业相关性和受监管数据敞口，但并未给出客户数、ACV、留存或按客户标识划分的收入集中度。


              到估值工作最看重的规模指标时，公开披露明显变弱。已审公开来源均未给出绝对 ARR、收入或客户数。员工数也只能部分支撑：BankInfoSecurity 称 Cyberhaven 到 May 2025 约 220
              人，而 PitchBook 公开 FAQ 列出 282 名员工，Tracxn 又显示一个不同且部分可见的员工数字字段。由于这些都不是公司官方 KPI 披露，员工数应视为低置信度区间，而不是标准数字。


              安全态势信号好于财务透明度。Cyberhaven 的 Trust Center 展示 SOC 2 Type 2、GDPR、CCPA 和 PCI DSS v4.0.1
              材料，并列出渗透测试和网络保险资料。浏览器扩展隐私政策进一步确认，雇主客户控制扩展数据，且该政策于 September 2024 更新。这些都是有用的尽调线索，但底层文件仍需授权访问，应直接向公司索取。
