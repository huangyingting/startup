chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品边界与地点口径不一致
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 将自己定位为 AI 与数据安全公司，核心差异化是数据血缘：公司称其平台会追踪敏感数据如何在端点、云、SaaS、本地系统和 AI 工具中产生、移动和变化。当前产品营销和 February
              2026 增长发布都描述了一套覆盖 DSPM、DLP、内部人员风险管理和 AI 安全的单一架构，而不是一组松散拼接的单点产品。这个统一定位很关键，因为后续章节可以把 Cyberhaven
              当作平台公司，而不只是浏览器扩展或传统 DLP 厂商。


              身份基础大体清楚，但并不完全干净。Redpoint 和 Tracxn 都把公司放在 San Jose，并列出五名创始人；Cyberhaven 自身公开材料却在不同时点使用了不同的湾区发稿地：September
              2024 是 San Jose，April 2025 是 Palo Alto，2025 年底和 2026 年初是 Mountain View。扩展隐私政策也列出 Palo Alto
              通讯地址。尽调时，最稳妥的标准描述是：Cyberhaven 是一家私营湾区公司，San Jose 得到最强的非公司来源支持，但总部精确地址仍需直接确认。


              行业重心更具体。Cyberhaven 公开瞄准技术 / SaaS、制造、律所、投资管理和医疗，这与其保护敏感知识产权、受监管数据和 AI 工作流的叙事一致。最合适的处理方式是把公司视为一家 2025
              年进入独角兽行列的后期私营安全厂商，但它仍只披露经过选择的运营指标。
