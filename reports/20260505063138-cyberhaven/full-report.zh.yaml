      - number: '1.3'
        title: 资本形成、投资人与治理信号
        blocks:
          - type: paragraph
            body: >
              对一家私营安全公司来说，Cyberhaven 的公开融资历史披露得异常充分。公司宣布 December 2021 完成 Redpoint 领投的 $33 million B 轮，June 2024 完成
              Adams Street Partners 和 Khosla Ventures 领投的 $88 million C 轮，随后在 April 2025 完成 StepStone Group 领投、Schroders
              和 Industry Ventures 新进的 $100 million D 轮。D 轮公告称累计融资 $250 million、估值 $1
              billion。这是目前最强的一手资本结构来源，也应成为后续章节的基准。


              C 轮期间，治理结构变得更可见。Cyberhaven 披露 Adams Street 合伙人 Fred Wang 随该轮融资加入董事会，这是已审材料中最清晰的公开董事会新增席位。Redpoint
              的公司页另行确认其最早在 2021 年 B 轮与 Cyberhaven 合作，说明 Redpoint 相比 C 轮和 D 轮的新进入者是持有时间更长的利益相关方。Tracxn 通过列出 23 家机构投资者和 6
              名天使投资人补充了广度，但公开数据库常常把轮次和投资人类型归类得不同于公司发布稿，因此只能作为方向性信息。


              一个重要尽调细节是，各来源的累计融资数字并不完全一致。Cyberhaven 称 D 轮后为 $250 million，Tracxn 则称截至同日六轮合计 $236
              million。差异很可能来自数据库对补助、历史轮次或投资人轮次归属的处理，而非实质资本错配；但这也提醒我们，只有公司按轮次发布的公告才应被视为标准口径。
