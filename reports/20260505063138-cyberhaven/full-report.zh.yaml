          - type: callout
            title: Chrome 扩展供应链风险
            body: >
              2024 年 12 月的钓鱼攻击导致恶意扩展 v24.10.4 发布，暴露了 Chrome Web Store 分发链路的结构性漏洞。该扩展在被发现前自动更新到约 400,000
              名企业用户。事件说明，浏览器扩展部署通道虽是 Cyberhaven AI Security 和 DLP 覆盖的核心，却会被绕过 MFA 的 OAuth
              钓鱼攻击打穿。事后加固披露有限；尽调应确认公司是否已经落地扩展版本固定、Web Store 账户的抗钓鱼认证，以及浏览器扩展安全控制。
            calloutType: risk
