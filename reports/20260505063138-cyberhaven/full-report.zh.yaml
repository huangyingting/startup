      分打分并计算加权平均。
    data:
      items:
        - label: 市场 TAM（$5.7B 纯 DLP 至 $21B 数据安全）
          value: 4
          max: 5
        - label: 产品差异化（AI 数据血缘相对内容检查）
          value: 4
          max: 5
        - label: 客户证明（Gartner 4.6/5，14+ 家具名 F500）
          value: 4
          max: 5
        - label: 财务透明度（NRR、GM 未披露）
          value: 2
          max: 5
        - label: 安全风险（Chrome 扩展事件、诉讼）
          value: 2
          max: 5
        - label: 竞争护城河（相对 MSFT Purview、CrowdStrike）
          value: 3
          max: 5
        - label: 退出可选性（IPO 路径、并购兴趣）
          value: 3
          max: 5
    approximationNotes: 评分为定性评估；财务得分 2 反映披露缺口，并非确认表现不佳。
