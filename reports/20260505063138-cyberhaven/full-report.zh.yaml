            body: >
              Cyberhaven 的公共 REST API 只开放三个端点（endpoints/list、incidents/list、audit-log/dataflow/list）。GitHub 组织
              CyberhavenInc 维护 10 多个公开仓库，但唯一面向客户的 CLI 是 edm-cli（Python，用于 EDM 数据库管理）。更广的内部技术栈（Go、gRPC、TypeScript
              生成器）可见，但没有暴露给客户。由此看，API 可扩展性和伙伴集成深度比集成列表暗示的更受限。
            calloutType: insight
