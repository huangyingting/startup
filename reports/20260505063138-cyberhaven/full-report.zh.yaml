      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 的 Trust Center（trust.cyberhaven.com，由 SafeBase 支持）列出四个合规框架：CCPA、GDPR、PCI DSS v4.0.1 和 SOC 2
              Type 2（SOC-2 Bridge Letter 有效至 January 2026）。应用渗透测试、网络保险和子处理方清单可按客户请求提供。安全政策描述了 GCP 托管、客户隔离的实例，传输中数据的 TLS
              加密，通过 GCP 密钥管理实现的静态加密，以及借助 Google Security Command Center 做 Kubernetes 原生安全的 24/7 MDR 监控。认证选项包括 Google
              SSO（OAuth2）、强制 2FA 的密码，以及 SAML 2.0。RBAC 支持普通用户和管理员。代码部署需要同行评审，并由至少一名额外工程师做安全审计。开发者必须接受年度 OWASP Top 10
              安全代码培训。公司报告 Qualys SSL Labs 评级为 A+。December 2024 Chrome 扩展事件（恶意版本 24.10.4 影响约 400,000 名用户）证明，扩展分发渠道承载着独立于
              GCP 后端的供应链风险。公司聘请 Mandiant 进行事件响应，并通知了联邦执法机构。公司在 24 小时内发布了干净版本（24.10.5）。截至研究日期，未有源自该事件的诉讼、SEC
              执法行动或监管罚款被公开披露。
