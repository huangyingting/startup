      - number: '1.2'
        title: 创始人、领导层厚度与关键人依赖
        blocks:
          - type: paragraph
            body: >
              Redpoint 和 Tracxn 都列出 Cyberhaven 的五名创始人：Cristian Zamfir、George Candea、Radu Banabic、Vitaly Chipounov 和
              Volodymyr Kuznetsov。目前可得来源中的公开创始人履历很少，但投资人和数据服务商页面反复出现同一五人名单，足以把这组人视为公司最有支撑的创始阵容。George Candea 也在 Tracxn
              中以董事会观察员身份出现，说明公司商业化规模扩大后，至少仍有一部分创始人延续到治理层。


              Howard Ting 看起来是把 Cyberhaven 从研究色彩很重的组织推向规模化商业安全厂商的执行者。BankInfoSecurity 报道称，Ting 于 June 2020 加入时公司约 18 人，到
              May 2025 已约 220 人。Cyberhaven 随后在 September 2024 明显加厚管理层，引入 Nishant Doshi、Edward Sharp、Kristin Vines 和
              Manoj Gupta，覆盖产品、财务、人力和企业发展。这些任命重要，因为它们显示公司在 D 轮前就开始为更大的 GTM 和平台路线图制度化。


              领导层连续性仍需观察。Ting 于 May 2025 辞任 CEO，Doshi 经过三个月交接后接任，Ting 留在董事会。到 February 2026，Cyberhaven 自身发布稿已把 Doshi 列为
              CEO，并把 James McCarthy 和 Aman Sirohi 加入领导团队。相比 early 2024，这一序列降低了单一高管依赖，但公司在 CEO 继任以及 2024
              年规模化阶段引入的产品领导层上，仍有实质关键人敞口。
