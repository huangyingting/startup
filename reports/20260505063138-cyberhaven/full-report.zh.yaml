      - number: '5.6'
        title: 图表与要点
        blocks:
          - type: callout
            title: 数据血缘是结构性差异化
            body: >
              Cyberhaven 的端到端数据血缘引擎是已验证的架构差异化。Motorola 案例研究（误报减少 90%、调查时间减少 98%）提供了独立客户验证，证明该方法有效。PeerSpot DLP mindshare
              指标同比增长 53% 至 2.3%，Gartner Peer Insights 显示 48 条评价给出 4.6/5，也都印证了独立市场牵引。
            calloutType: strength
