      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 由 Howard Hua、Georgy Gritschuk 和 Volodymyr Kuznetsov 于 2016
              年创立。数据血缘图谱概念在技术上有差异化，但执行取决于能否留住搭建该架构的核心工程团队。同阶段创业公司通常会在高级工程师股权归属后遇到明显流失风险；$1B 估值的 Series D
              提供了一定流动性选择，但也意味着早期期权持有人需要更高退出门槛，才有可观收益。


              销售执行风险显著：Cyberhaven 累计融资 $250M、估计 ARR 接近 $100M，显示资本效率较高的增长轨迹；但打入 Fortune 500 账户需要经验丰富的企业销售，能推进 DLP
              替换交易。DLP 替换销售周期长，通常 12 到 18 个月，需要法务和安全团队签字，并要对抗现有厂商带来的惯性。如果 Cyberhaven 不能按节奏招聘并留住背负销售配额的企业 AE，增长可能在公司达到支撑
              IPO 的可持续规模前停滞。


              创始三人组之外的高管深度，公开信息显示偏薄。CISO 角色、客户成功负责人和 CFO 职能没有突出披露，导致财务控制和规模化准备度不透明。2024 年 12 月事件处理——包括 CEO
              透明沟通、快速部署补丁和聘请 Mandiant——运营表现强；但若重复事件没有同等质量的响应，将严重损害企业客户信任和持续监管姿态。
            claimRefs:
              - CR025
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
