  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型、定价机制与 GTM 动作
        blocks:
          - type: paragraph
            body: >
              最容易把 Cyberhaven 的变现模型描述为围绕统一 AI 与数据安全平台打包的企业软件订阅。公司当前产品页把一个平台定位为覆盖 DSPM、DLP、内部人员风险管理和 AI
              安全，并以数据血缘作为共同控制层。这一架构在财务上重要，因为它支持落地后扩张销售：Cyberhaven 可以从数据检测与响应切入，然后随着客户需求扩展，叠加 DSPM 或 AI
              安全控制等相邻模块。Microsoft 云市场上架信息也强化同一打包逻辑，称该统一方案能保护云、端点和可移动介质中的数据，同时与 Microsoft Purview、Salesforce 等工具集成。


              商业上，Cyberhaven 并没有跑透明的自助 SaaS 动作。官网把买方导向预约演示和免费点播演示，而不是发布公开标价。第三方定价页和 AWS
              私有报价文档也指向同一方向：定价看起来基于订阅，通常与端点或数据量等部署范围挂钩，再通过企业合同、量级折扣或云市场私有报价谈判。这意味着公开记录能支撑定价机制，但不能支撑实际成交价、折扣纪律或模块级收入组合。


              GTM 广度正在改善。Cyberhaven 称自己渠道优先，运营经销 / 技术 / 集成合作伙伴项目，并且截至 April 2026 可通过 AWS、Azure 和 Google Cloud
              云市场使用既有云承诺完成交易。这些采购选项很可能缩短企业审批，并拓宽收入路径，尤其适合买方已经通过超大规模云厂商承诺做预算的场景。不过，留存来源没有披露合同期限、续约率、实施服务占比，或订单额中来自直销、合作伙伴和云市场的比例。
