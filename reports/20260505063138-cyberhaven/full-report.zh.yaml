      - number: '2.2'
        title: 规模测算视角，以及公开 TAM/SAM/SOM 仍受限制的原因
        blocks:
          - type: paragraph
            body: >-
              只有边界逻辑保持清楚，公开市场规模测算才有用。最宽的相邻视角是 DLP：Grand View 估算全球 DLP 市场在 2022 年为 $1.87B，到 2030 年达到
              $9.33B，且云部署已是最大模式。下一个视角是内部人员风险管理，ResearchAndMarkets 估算该市场从 2024 年 $2.4B 增至 2030 年 $3.7B，Verified Market
              Reports 则给出更大的路径：2024 年 $3.14B 到 2033 年 $8.23B。最贴近 Cyberhaven 的新兴品类是 DSPM，但即便在这里，公开估算也差异很大：Growth Market
              Reports 称 2024 年 $1.42B 到 2033 年 $17.2B，DataHorizzon 则把 DSPM 工具市场放在 2023 年 $1.8B、2033 年 $5.7B。Palo Alto
              的供应商撰写市场指南又给出不同框架，引用 2025 年市场估值 $415M-$2B，以及 25%-37% 年增长。合起来看，证据支持一个有意义且扩张中的数据中心安全机会，但不支持干净嵌套的 TAM/SAM/SOM
              金字塔。品类彼此重叠，预测年份不同，有些来源统计独立工具，有些则纳入集成平台模块。这足以给市场方向划界，但不足以声称一个精确的公开 Cyberhaven SAM 或 SOM。
