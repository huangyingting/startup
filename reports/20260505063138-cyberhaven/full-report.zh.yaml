companyProfile:
  summary: >-
    Cyberhaven 是一家私营网络安全公司，为大型企业构建以数据血缘为核心的 AI 与数据安全平台。公司把 DSPM、DLP、内部人员风险管理和 AI
    安全整合进统一控制平面，并已把这一定位转化为具名企业客户、较高用户评测分数，以及以 $1B 估值完成 $100M D
    轮的快速融资进展。产品差异化和客户成效让商业逻辑有吸引力，但公开证据在财务质量和事件后续影响上仍太薄，尚不足以支撑完整承销的后期投资决策。
