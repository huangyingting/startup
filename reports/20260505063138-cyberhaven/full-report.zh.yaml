      - number: '8.2'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 估值 $1B、估计 ARR $100M，隐含 10x ARR 倍数和约 9–10x NTM 收入倍数（假设增长
              30–40%）。与公开可比公司相比，这一水平有利。CrowdStrike（CRWD）报告 FY25 ARR 为 $4.24B、增长 23%，交易约 29x NTM P/S 和 12x
              ARR；其溢价反映主导地位和多产品平台。Palo Alto Networks（PANW）下一代安全 ARR 达 $5.6B、增长 32%，规模更大，交易约 14x NTM P/S。Zscaler（ZS）报告 Q3
              FY25 ARR 约 $2.9B、增长 23%，交易约 9x NTM P/S。Rubrik（RBRK）报告 FY25 ARR $1.09B、增长 39%，市值 $8B+，交易约 9x NTM P/S。


              企业安全 SaaS 私募市场交易中，Cyberhaven 这一阶段、且 ARR 确认高于 $80M、NRR 高于 110% 的公司，通常对应 8–15x ARR 倍数。Cyberhaven 的 10x ARR
              倍数处于区间中部，但只有在 NRR 确认高于 100%、毛利率高于 70% 时才站得住。没有审计财务，10x 倍数带有显著不确定性溢价；若单位经济模型得到确认，牛市情景下可支撑扩张到 12–15x ARR。


              Grand View Research 估计，DLP 市场 TAM 从 2024 年 $5.7B 增至 2030 年 $7.1B（CAGR 3.7%），这里指纯 DLP；MarketsAndMarkets
              则预计更广的数据安全市场从 $21.1B 增至 2029 年 $34.4B（CAGR 10.3%）。Cyberhaven 的 AI 原生数据血缘路径瞄准的是更广的数据安全市场，而不只是传统 DLP，因此支撑更高的
              TAM 框架。
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
