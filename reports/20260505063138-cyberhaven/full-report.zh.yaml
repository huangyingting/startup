      - number: '8.6'
        title: 证据项
        blocks:
          - type: callout
            title: 10x ARR 可以辩护，但取决于单位经济模型确认
            body: >
              Cyberhaven 的 $1B 估值隐含约 10x 估计 ARR——与同阶段企业安全 SaaS 私募市场区间中部一致。公开可比公司 Rubrik 和 Zscaler 交易在 9x NTM
              P/S，且分别有已确认的 39% 和 23% 增长。如果 Cyberhaven 确认 NRR 高于 110%、毛利率高于 70%，10x ARR 倍数可以辩护，并可能在牛市情景下扩张到
              12–15x。没有这些确认，该倍数带有无法量化的不确定性溢价。
            calloutType: insight
            claimRefs:
              - CV009
              - CV010
              - CV011
          - type: callout
            title: 财务不透明是最大的投资风险
            body: >
              Cyberhaven 没有在任何公开申报或新闻稿中披露 NRR、毛利率、流失率或 LTV/CAC。公开可比公司每季度报告这些指标，而 Cyberhaven 投资人只能靠估计 ARR 和定性客户证据承销 $1B
              估值。不管产品和客户叙事多有吸引力，这种不透明都意味着没有私有财务数据就无法区分基准情景和熊市情景。这是一个二元尽调闸门。
            calloutType: risk
            claimRefs:
              - CV038
              - CV040
          - type: callout
            title: $100M ARR 估计来自第三方推导
            body: >
              本章使用的 $100M ARR 来自 VentureBeat 的评论：$1B 估值隐含约 10x ARR，因此 ARR 接近 $100M。该数字未经 Cyberhaven 确认。Deloitte Fast
              500（2025）确认了快速增长率，但没有给出绝对 ARR 数字。本章所有估值和回报情景都取决于 ARR 位于 $80–120M 区间；如果 ARR 有重大差异（例如 $50M 或
              $200M），倍数和回报情景都会显著改变。
            calloutType: assumption
            claimRefs:
              - CV040
              - CV009
