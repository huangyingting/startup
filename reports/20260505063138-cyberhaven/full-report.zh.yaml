    sections:
      - number: '8.1'
        title: 投资逻辑与反向论点
        blocks:
          - type: paragraph
            body: >
              投资逻辑建立在三根支柱上：（1）在 AI 原生数据血缘 DLP 中具备品类领导地位，且现有厂商尚未在生产规模复制这种差异化路径；（2）企业牵引力可见，拥有 14+ 个具名 Fortune 500
              账户和第三方验证评分（Gartner 4.6/5、FeaturedCustomers 4.8/5）；（3）$1B 估值入场，对一家估计以高双位数增长、且受 AI
              驱动数据激增和监管合规收紧推动的公司而言，对应合理的 10x ARR 倍数。


              反向论点集中在四个重大风险。第一，2024 年 12 月 Chrome 扩展供应链被攻破仍是未完全解决的声誉事件，伴随持续集体诉讼和未知监管调查状态。第二，Microsoft Purview 的既有厂商位置（与
              M365 E5 捆绑，边际成本接近零）构成持续定价威胁，可能把 DLP 市场商品化。第三，Cyberhaven 的财务指标（NRR、毛利率、流失率）完全不透明，公开资料无法验证假设的增长和留存画像。第四，产品依赖
              Chrome 扩展架构，除非 Cyberhaven 迁移到内核级或通过 MDM 部署的代理模型，否则结构性供应链攻击面会反复存在。


              平衡这些风险的是 Cyberhaven 在 2024 年 12 月展现的事件响应能力（24 小时补丁、聘请 Mandiant、CEO 透明沟通）、增长中的心智份额（PeerSpot 2.3%，高于此前
              1.5%），以及 2025 年 4 月 Series D 估值重置发生在事件之后，说明投资人信心吸收了 2024 年事件并已将其计价。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
