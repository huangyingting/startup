      - number: '7.3'
        title: 伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              现阶段 Cyberhaven 的销售路径依靠直接企业销售团队，渠道或伙伴杠杆有限。这让公司依赖一支规模不大的销售团队，也限制了地域扩张速度。与 MSSP 和 SI 的合作仍处早期；竞争对手 Symantec 和
              Forcepoint 拥有数十年 MSSP 关系，不必投入直接销售就能驱动续约收入。


              供应链暴露不止 2024 年 12 月扩展事件。Cyberhaven 依赖第三方 OAuth 提供商、Chrome Web Store 发布流水线和上游 GCP 基础设施。每一项都有独立失效模式：2024
              年已经发生的 OAuth token 被攻破、Chrome Web Store 审核延迟挡住紧急补丁，或 GCP 服务中断拖累产品可用性。Chrome 扩展供应链攻击除 Cyberhaven 外还影响约 35
              个扩展，说明这是系统性行业威胁，而不是一次定向攻击；但按用户数看，Cyberhaven 是最大受影响厂商，因此承担了不成比例的声誉暴露。


              资本提供方依赖目前较低：2025 年 4 月的 $100M Series D 按假设现金消耗率可提供约 18 到 24 个月资金跑道，降低近期融资风险。不过 StepStone Group 和 Schroders
              Capital 是财务投资人，在企业 SaaS 运营支持能力上披露有限。若竞争替代或监管处罚触发降估值融资，将因期权价外严重打击员工留存，并削弱客户信心。
