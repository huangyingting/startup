      - number: '8.4'
        title: 融资背景与稀释分析
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 累计融资 $250M，2025 年 4 月 Series D 为 $100M、投后估值 $1B。这意味着 Series D 约造成 10% 稀释（投前 $900M，本轮
              $100M）。更早轮次未公开详细披露，但累计融资额显示此前已有多轮机构融资；从种子轮到 Series D，同阶段公司累计稀释通常为 60–70%，意味着创始人和早期员工可能持有 $1B 估值中的 30–40%。


              清算优先权堆栈分析：在 $1B 估值和 $250M 累计融资下，清算优先权覆盖约 4x（250/1000 = 估值的 25%）。如果以 $500M 降估值退出，优先股投资人会获得约
              $125–187M（取决于参与权，占退出所得的 50–75%），普通股股东和早期员工会被显著稀释。该优先权悬顶压力提高了员工留存和士气对 $1B+ 退出的紧迫性。


              Series D 投资人（StepStone Group、Schroders Capital、Industry
              Ventures）都是财务投资人，未披露战略收购方关系，降低近期高溢价并购的概率。假设持续增长且没有重大不利事件，$400M+ ARR 时的 IPO（可能在 2028–2030 年）是主要退出路径。
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
      - number: '8.5'
        title: 建议、退出准备度与最终尽调事项
        blocks:
          - type: paragraph
            body: >
              建议：有条件继续研究，证据要求高。Cyberhaven 是 AI 原生数据血缘 DLP 中有吸引力的品类领导者，产品差异化明确，客户验证强，并切入智能体 AI 安全浪潮。若确认 ARR
              增长和单位经济模型能支撑投资逻辑，$1B Series D 入场是可辩护的。不过，投资前必须满足三个条件：（1）取得审计或董事会验证的财务报表，显示 NRR 高于 105%、毛利率高于
              70%；（2）取得受法律特权保护的集体诉讼评估，最大量化暴露低于 $20M；（3）取得工程管理层确认，事件后的 OAuth 加固和代码签名改进已实质性降低 Chrome 扩展再次被攻破的概率。


              当前退出准备度为中等。Cyberhaven 有支撑 IPO 故事的客户名称和增长轨迹，但缺少公开市场要求的财务透明度（审计报表、CFO 履历）。如果公司能在当前估计 $100M ARR
              基础上再翻两倍，2028–2030 年 IPO 窗口是可行的。若 CrowdStrike 或 Palo Alto Networks 希望把 AI 数据血缘 DLP 加入平台组合，在 $200–500M ARR
              阶段战略收购也仍然可行。Microsoft 作为收购方理论上可能，但考虑到 Microsoft 自身对 Purview 的投入，概率不高。


              最终五项尽调要求是：披露 NRR 和毛利率；法律顾问给出诉讼暴露上限；OAuth / 扩展架构安全评估；GCP 基础设施和可用性文档；客户 ARR 集中度（top 5 和 top 10 客户占比）。
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
