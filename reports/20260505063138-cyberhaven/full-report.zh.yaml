            body: |
              本次研究未在公开记录中确认 Cyberhaven 围绕数据血缘技术或 LLiM 的专利申请。公司可能持有尚未公开的商业秘密或待审专利。竞争护城河主要靠积累的数据血缘和模型质量，而不是正式注册的 IP 保护。
