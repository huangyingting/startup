      - number: '5.4'
        title: 差异化与专有技术
        blocks:
          - type: paragraph
            body: >
              Cyberhaven
              声称的差异化是其数据血缘引擎，它把数据从创建开始，经过每一次复制、转换、重命名、电子邮件附件、上传和碎片化事件的完整旅程映射出来。这张血缘图驱动上下文感知的策略决策：一份源自内部商业秘密的文件，即使内容与公开来源文件相同，也会被不同对待，从而以更少误报实现准确阻断。Large
              Lineage Model（LLiM）被描述为一个专门构建的 AI 模型，训练数据是血缘图数据而不是通用文本，因此是公司特定架构下的专有能力。公司称 LLiM
              可实现预测性风险检测（在策略违规发生前识别高风险模式）。公开记录未确认这些技术的专利申请；公司没有披露专利组合。EDM（Exact Data
              Match）能力允许企业为特定敏感数据集（结构化数据、源代码）生成指纹并精确跟踪，减少基于 regex 方法的误报。独立评测数据支撑了差异化说法：PeerSpot 的 DLP mindshare 指标同比从
              1.5% 增至 2.3%，Gartner Peer Insights 显示 48 条评价给出 4.6/5，G2 显示 18 条评价给出 4.5/5，FeaturedCustomers 显示 17 条客户证言和 1
              个案例研究。Motorola 报告称，部署 Cyberhaven 后误报减少 90%、调查时间减少 98%、高风险事件减少 90%。
            claimRefs:
