      - number: '5.3'
        title: 技术架构与部署模型
        blocks:
          - type: paragraph
            body: >
              Cyberhaven 使用三种部署模式来采集数据流。第一，端点代理支持 Windows、macOS 和 Linux 操作系统，并在操作系统层拦截文件操作、USB 传输、打印和应用级数据移动。第二，浏览器扩展（以
              Chrome 为主）在浏览器中监控基于网页的数据流、SaaS 应用上传和 AI 工具交互。该扩展正是 December 2024 供应链事件的向量。第三，云 API 连接器通过 API 与 SaaS
              平台（Google Workspace、Microsoft 365）集成，在不要求端点的情况下捕捉云端数据移动。后端基础设施完全运行在 Google Cloud
              Platform（GCP）的美国数据中心。每个客户运行完全隔离的实例，配有专用虚拟计算、存储和网络资源；客户之间不共享处理。微服务架构建立在最小权限原则上。端点传感器与后端之间的所有传输中数据都通过 TLS
              加密；容器间流量也通过 GCP VPN 上的 TLS 加密。公开 REST API 暴露三个端点：/api/rest/v1/endpoints/list、/api/rest/v1/incidents/list 和
              /api/rest/v1/audit-log/dataflow/list，全部使用从 API 密钥派生的临时 bearer token 认证。GitHub 上的 edm-cli Python
              CLI（CyberhavenInc/edm-cli）允许使用哈希指纹（SpookyHash V2 + SHA256）以编程方式管理 Exact Data Match（EDM）数据库。Cyberhaven 还维护
              GitHub 组织（CyberhavenInc），公开仓库包括 api2（Go HTTP API 库）、cel2sql（CEL-to-SQL 转换器）和
              protoc-gen-grpc-gateway-ts（gRPC gateway TypeScript 生成器），显示其内部技术栈使用 Go、gRPC 和 TypeScript。
