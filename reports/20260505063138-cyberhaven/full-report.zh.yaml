      - number: '7.5'
        title: 财务风险与打破投资逻辑的触发点
        blocks:
          - type: paragraph
            body: >
              财务风险核心在现金消耗率不透明和竞争性价格压力。Cyberhaven 累计融资 $250M，公开资料估计 ARR 约 $100M；没有审计财务报表，就无法验证毛利率、NRR 和 LTV/CAC。DLP
              市场正承受价格压缩：Microsoft Purview 随 M365 E5 捆绑，边际成本接近零；Symantec 则在续约时大幅折扣。如果 Microsoft
              把可比的数据血缘能力嵌入原生工具，Cyberhaven 的溢价定价会面临替代风险。


              已有缓释措施包括 SOC 2 Type 2 认证和 2026 年 1 月出具的 Bridge Letter、PCI DSS v4.0.1 合规、逐客户隔离的 GCP 实例、2024 年 12 月事件后的
              Chrome 扩展代码签名改进，以及成文的事件响应预案。这些措施降低运营风险，但不能消除 2024 年事件带来的监管或诉讼暴露。


              五个打破投资逻辑的触发点需要持续跟踪。第一，18 个月内出现第二次重大安全事件，可能触发企业客户流失和监管调查。第二，Google 以削弱扩展深度内容检查的方式限制 Manifest v3
              API，将迫使公司做多年代理架构重构。第三，Microsoft 在 Purview E5 中嵌入生产级 AI 数据血缘，会削弱 Cyberhaven 的溢价定位。第四，超过 $30M
              的集体诉讼和解或监管罚款会消耗可观 Series D 资金跑道，并可能迫使公司进行困境融资。第五，未能取得类似 SOC 2 的欧盟认证（如 ISAE 3000 或 BSI C5），将阻断受监管欧盟企业扩张。
