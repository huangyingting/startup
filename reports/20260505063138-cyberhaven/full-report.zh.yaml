      - number: '2.3'
        title: 买方分层、预算归属与采用路径
        blocks:
          - type: paragraph
            body: >-
              公开买方地图更偏安全和合规，而不是开发者主导。Cyberhaven 自身云市场和官网信息反复瞄准安全团队、IT 专业人员、CISO 和受监管数据运营方；Microsoft
              的内部人员风险文档则显示，采购往往嵌在合规、安全和租户管理工作流里，并伴随许可门槛和明确角色组设置。实操中，经济买方通常是 CISO、合规负责人或中心化安全平台负责人；运营用户是安全分析师、内部人员风险调查员和
              IT 管理员；付款方通常是中心化安全、合规或 Microsoft/Purview
              相邻平台预算。采用路径也能从公开材料中看出来：组织先意识到数据蔓延或内部人员风险问题，再评估传统或原生控制是否噪音过多，然后在一两个数据渠道试点，随后把工具接入身份、工单、DLP
              或云工作流，最后才扩展为更广的数据安全项目。由于隐私设置、选择加入提示、连接器和跨平台策略执行都很重要，部署不是一笔标准化席位销售。最可能解锁预算的情形，是买方能把内部人员风险、AI
              治理和合规报告连进一个可衡量的控制平面。
