  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出与替代方案
        blocks:
          - type: paragraph
            body: >-
              Cyberhaven 的正确市场边界，要从产品实际声称能做什么开始。Cyberhaven 官方材料把公司定位为 AI 与数据安全平台，统一端点、云、本地、SaaS 和 AI 工具中的
              DSPM、DLP、内部人员风险管理和 AI
              安全。因此，纳入支出既不是「全部网络安全」，甚至也不是数据安全的完整宇宙。最相关的资金池，是企业在发现敏感数据、分类敏感数据、监控数据移动、防止未授权传输，以及调查高风险用户或 AI
              辅助数据处理上的支出。相邻支出包括 Microsoft Purview 的原生数据安全套件、Zscaler 的云交付 DLP，以及 Palo Alto Networks 与 CNAPP 集成的
              DSPM。现状替代方案包括 Microsoft 原生控制、传统 DLP 技术栈、手工数据分类项目，以及只聚焦云存储库的单点产品。应排除的支出包括通用
              SIEM、防火墙、端点保护和广义基础设施安全预算，因为这些预算并不直接购买数据发现、数据分类、外泄防护或内部人员风险响应。这个边界很重要，因为 Cyberhaven
              的公开叙事讲的是流动中数据的上下文、血缘和响应质量，而不是占有整个安全技术栈。
