      - number: '4.3'
        title: 资本充足性、融资依赖与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              公开记录中最干净的资本充足性事实是 April 2025 D 轮。Cyberhaven 称该轮带来 $100 million，使累计融资升至 $250 million，并把公司估值推至 $1
              billion。管理层还称资金将支持 M&A、有机产品创新和激进 GTM 投入。这组信息通常意味着进攻性的资金用途，而不是防御性过桥轮：Cyberhaven 看起来在同时为平台扩张和分发增长融资。February
              2026 业绩发布以及 April 2026 云市场扩张，也说明管理层在融资后继续投入，而不是放慢节奏。


              尽管如此，仅靠公开数据仍很难承销公司。留存公开来源没有披露手头现金、月度烧钱、现金跑道、债务余额、契约条款、项目融资义务或下一轮触发条件。North Carolina Secretary of State
              备案页显示公司按期提交年度报告，包括一个与 2026-01-31 财年日期相关的 2026 年备案，但没有提供上市公司备案才会有的运营财务报表。SEC EDGAR 搜索页可作为备案尽调路径，但由于
              Cyberhaven 仍是私营公司，本次未留存到公司特定的公开财务备案。


              实用结论是，Cyberhaven 很可能拥有有意义的资本支持和当前需求，但财务质量仍取决于私下尽调。下一次尽调应优先拿到管理层报告的 ARR 或收入、毛利率、销售效率、现金与烧钱、债务排期、收入确认政策，以及渠道
              / 模块组合。缺少这些项目时，投资人可以为正面的商业动能观点辩护，但无法精确判断现金跑道、资本强度或利润率路径。
