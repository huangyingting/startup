      - number: '3.3'
        title: 护城河耐久性、切换成本与反向证据
        blocks:
          - type: paragraph
            body: >
              公开证据支持 Cyberhaven 拥有真实但可争夺的护城河。公司有牵引信号——FY2026 客户增长超过 50%、赢下 AI 密集和受监管账号，以及以 $1 billion
              估值获得新融资——意味着它有相当资源继续扩展平台。近期发布也显示公司从以端点为中心的数据血缘，拓展到云连接器、静态数据扫描、AI 驱动分类和数据目录。这种扩张在战略上必要，因为最强的反向证据并不是说
              Cyberhaven 缺少核心想法；而是买方可能仍会看到覆盖缺口、部署负担和边缘处的信任风险。


              这些边缘风险具有实质性。Nightfall 的竞争简报攻击 Cyberhaven 在 SaaS 可见性、端点上传覆盖和修复速度上的不足。SecurityWeek 关于 December 2024 恶意
              Chrome 扩展更新的报道，会形成竞争对手可在采购场景中使用的异议，尤其是浏览器重度部署。既有厂商还保留非技术切换成本优势：Microsoft 可以把 DLP
              和内部人员风险能力打包进更广的合规支出；Forcepoint、Symantec、Proofpoint 和 Mimecast
              则可以把自己定位为现有控制平面的延伸，而不是全新的安全项目。结果是，买方明确重视上下文丰富的调查和更低误报率时，Cyberhaven
              的护城河最强；采购更看重打包分发、既有工作流，或可公开证明的定价和合规覆盖时，护城河最弱。
