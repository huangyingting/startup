summary:
  headline: Cyberhaven shows credible category leadership and enterprise traction, but the $1B Series D still requires private diligence on financial quality, litigation exposure, and architecture hardening.
  overallScore: 6.4
  recommendation: research-more
  confidence: medium
  riskRating: high
  valuationStance: fair
