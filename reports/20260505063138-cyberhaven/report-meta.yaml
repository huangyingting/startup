  foundingLocation: San Jose, California, USA
  headquarters: Bay Area, California, USA (public materials vary across San Jose, Palo Alto, and Mountain View)
  productSummary: Cyberhaven sells a unified AI & Data Security platform that combines data security posture management, data loss prevention, insider risk management, and AI security. Its core differentiator is data lineage technology that tracks how sensitive data is created, transformed, fragmented, and moved across endpoints, browsers, SaaS, cloud, and on-prem systems, with Linea AI used to automate detection and investigation workflows.
  customerFocus: Large enterprises in technology, manufacturing, legal, financial services, healthcare, and government / defense environments with high-value IP, regulated data, or insider-risk exposure.
  businessModel: Sales-led enterprise subscription software with land-and-expand potential across modules, procured via direct sales, partners, and hyperscaler marketplaces.
  stage: Series D private / unicorn
  fundingStatus: $250M total raised publicly, including a $100M Series D announced in April 2025 at a $1B valuation.
