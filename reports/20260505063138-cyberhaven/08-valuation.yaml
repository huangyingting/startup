  - id: '8.2'
    title: Comparable Valuation Analysis
    body: |
      Cyberhaven's $1B valuation at an estimated $100M ARR implies a 10x ARR multiple and
      approximately 9-10x NTM revenue multiple (assuming 30-40% growth). This compares
      favourably to the public comparable set. CrowdStrike (CRWD) reported FY25 ARR of $4.24B
      growing at 23%, trading at approximately 29x NTM P/S and 12x ARR; its premium reflects
      its dominant position and multiple-product platform. Palo Alto Networks (PANW) achieved
      next-generation security ARR of $5.6B growing 32%, trading at approximately 14x NTM P/S
      with greater scale. Zscaler (ZS) reported Q3 FY25 ARR of approximately $2.9B growing
      23%, trading at approximately 9x NTM P/S. Rubrik (RBRK) reported FY25 ARR of $1.09B
      growing 39%, trading at approximately 9x NTM P/S with a $8B+ market cap.

      Private market transactions in enterprise security SaaS at Cyberhaven's stage typically
      carry 8-15x ARR multiples for companies with confirmed ARR above $80M and NRR above 110%.
      Cyberhaven's 10x ARR multiple sits in the middle of this range, but is only supportable
      if NRR is confirmed above 100% and gross margin above 70%. Without audited financials,
      the 10x multiple carries meaningful uncertainty premium; confirmed unit economics could
      justify expansion to 12-15x ARR in a bull scenario.

      The DLP market total addressable market is estimated by Grand View Research at $5.7B in
      2024 growing to $7.1B by 2030 (CAGR 3.7%) for pure-play DLP, while MarketsAndMarkets
      projects the broader data security market at $21.1B growing to $34.4B by 2029 (CAGR 10.3%).
      Cyberhaven's AI-native data lineage approach targets the broader data security market rather
      than legacy DLP-only, supporting a higher TAM frame.
