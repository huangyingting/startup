  - id: '8.4'
    title: Financing Context and Dilution Analysis
    body: |
      Cyberhaven has raised $250M total across multiple rounds, with the April 2025 Series D
      being $100M at a $1B post-money valuation. This implies the Series D represents approximately
      10% dilution (pre-money $900M, round $100M). Earlier rounds are not publicly disclosed in
      detail, but total funding suggests multiple prior institutional rounds; cumulative dilution
      from seed to Series D typically runs 60-70% for companies at this stage, implying founders
      and early employees may hold 30-40% of a $1B valuation.

      Preference stack analysis: at $1B valuation with $250M total raised, liquidation preference
      coverage is approximately 4x (250/1000 = 25% of valuation). In a down-round exit at $500M,
      preferred investors would receive approximately $125-187M (50-75% of exit proceeds depending
      on participation rights), creating meaningful dilution for common stockholders and early
      employees. This preference overhang increases the urgency of a $1B+ exit for employee
      retention and morale.

      Series D investors (StepStone Group, Schroders Capital, Industry Ventures) are financial
      investors without disclosed strategic acquirer relationships, limiting the probability of
      near-term M&A at premium valuations. An IPO at $400M+ ARR (likely 2028-2030) is the
      primary exit path, assuming continued growth and absence of material adverse events.
    claimRefs:
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
  - id: '8.5'
    title: Recommendation, Exit Readiness, and Final Diligence Asks
    body: |
      Recommendation: Conditional Explore with High Evidence Requirements. Cyberhaven represents
      a compelling category leader in AI-native data lineage DLP with a differentiated product,
      strong customer validation, and momentum into the agentic AI security wave. The $1B
      Series D entry is defensible if confirmed ARR growth and unit economics support the thesis.
      However, three conditions must be satisfied before investment: (1) obtain audited or
      board-verified financial statements showing NRR above 105% and gross margin above 70%;
      (2) obtain legal privilege-protected assessment of the class-action litigation with maximum
      quantified exposure below $20M; and (3) obtain engineering management confirmation that
      post-incident OAuth hardening and code-signing improvements materially reduce the
      probability of a repeat Chrome extension compromise.

      Exit readiness is currently Medium. Cyberhaven has the customer names and growth trajectory
      for an IPO storyline, but lacks the financial transparency (audited statements, CFO profile)
      that public markets require. A 2028-2030 IPO window is plausible if the company doubles ARR
      twice more from the current estimated $100M base. Strategic acquisition by CrowdStrike or
      Palo Alto Networks remains a plausible exit at $200-500M ARR if either company wants to
      add AI data-lineage DLP to its platform portfolio. Microsoft as acquirer is theoretically
      possible but unlikely given Microsoft's own Purview investment.

      The five final diligence asks are: NRR and gross margin disclosure; litigation exposure
      cap from legal counsel; OAuth/extension architecture security assessment; GCP infrastructure
      and uptime documentation; and customer ARR concentration (top 5 and top 10 customer share).
