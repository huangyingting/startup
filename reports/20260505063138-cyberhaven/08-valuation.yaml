  - id: '8.3'
    title: Bull / Base / Bear Scenarios
    body: |
      The bull scenario assumes Cyberhaven continues growing ARR at 50-60% annually through 2028,
      reaching $400-600M ARR. In this scenario, Microsoft fails to deliver a competitive
      data-lineage DLP product, no major security incident occurs, NRR stays above 120%, and
      Cyberhaven expands internationally into EU and APAC regulated enterprises. At 8-12x ARR,
      this implies a $3.2B-$7.2B valuation in 2028, representing a 3-7x return from the $1B
      Series D valuation. Exit paths include IPO (if ARR reaches $400M+ with demonstrated
      margins) or strategic acquisition by Palo Alto Networks, CrowdStrike, or Microsoft.

      The base scenario assumes 30-40% annual ARR growth to $200-300M by 2028, with NRR around
      110%, gross margins around 75%, and a successful but costly resolution of the class-action
      litigation (below $15M settlement). At 5-7x ARR, this implies a $1B-$2.1B valuation
      range, representing a 1-2x return from current entry. This scenario requires Microsoft
      Purview to remain a weaker competitor and no second material security incident.

      The bear scenario is triggered by a second major Chrome extension compromise, a GDPR/FTC
      enforcement action, or Microsoft shipping data-lineage features in Purview E5. In this
      scenario ARR growth stalls at 10-20% annually, reaching only $120-150M by 2028. Enterprise
      churns begin and NRR drops below 100%. At 3-5x ARR, valuation would be $360M-$750M, well
      below the $1B Series D entry, implying a down-round and significant capital impairment.
