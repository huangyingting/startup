callouts:
  - calloutType: insight
    title: 10x ARR Is Defensible But Conditional on Confirming Unit Economics
    body: >
      Cyberhaven's $1B valuation implies approximately 10x estimated ARR -- in line with the middle of the
      private-market range for enterprise security SaaS at this stage. Public comparables Rubrik and Zscaler trade at 9x
      NTM P/S with confirmed 39% and 23% growth respectively. If Cyberhaven confirms NRR above 110% and gross margin
      above 70%, the 10x ARR multiple is defensible and could expand to 12-15x in a bull scenario. Without these
      confirmations, the multiple carries an unquantifiable uncertainty premium.
    claimRefs:
      - CV009
      - CV010
      - CV011
  - calloutType: risk
    title: Financial Opacity Is the Biggest Investment Risk
    body: >
      Cyberhaven has not disclosed NRR, gross margin, churn, or LTV/CAC in any public filing or press release. Unlike
      public comparables where these metrics are reported quarterly, Cyberhaven investors are underwriting a $1B
      valuation on estimated ARR and qualitative customer evidence alone. No matter how compelling the product and
      customer narrative, this opacity means the base case and bear case cannot be distinguished without private
      financial data. This is a binary diligence gate.
    claimRefs:
      - CV038
      - CV040
  - calloutType: assumption
    title: $100M ARR Estimate Is a Derived Third-Party Inference
    body: >
      The $100M ARR figure used throughout this chapter is derived from VentureBeat's comment that the $1B valuation
      implies approximately 10x ARR, implying ARR near $100M. This figure is not confirmed by Cyberhaven. Deloitte Fast
      500 (2025) confirms rapid growth rate but does not provide an absolute ARR figure. All valuations and return
      scenarios in this chapter are contingent on ARR being in the $80-120M range; if ARR is materially different (e.g.,
      $50M or $200M), the multiple and return scenarios change significantly.
    claimRefs:
      - CV040
      - CV009
