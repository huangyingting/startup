chapter:
  number: 8
  title: Valuation
  summary: >
    Cyberhaven entered its Series D at a $1B valuation in April 2025 with $100M raised, implying an approximate 10x ARR
    multiple on an estimated $100M ARR base. Comparable public-market security SaaS companies (CrowdStrike, Palo Alto
    Networks, Zscaler, Rubrik) trade at 9-29x NTM P/S, with the premium end reflecting high NTM growth and defensible
    moats. Cyberhaven's 10x implied ARR multiple is in the middle of the private-market range for enterprise security
    SaaS at this stage, but the $1B valuation discounts the unresolved class-action litigation, opaque financial
    metrics, and structural Chrome-extension supply-chain risk. Bull case ($400-600M ARR by 2028, 8-12x ARR multiple)
    implies 3-5x return from Series D. Base case ($200-300M ARR, 5-7x multiple) implies 1-2x. Bear case (below $150M ARR
    due to competitive displacement or second security incident) implies a down-round scenario. The primary diligence
    gap is absence of audited financials; recommendation is conditional on obtaining NRR, gross margin, and unit
    economics data from management.
sections:
  - id: '8.1'
    title: Investment Thesis and Anti-Thesis
    body: |
      The investment thesis rests on three pillars: (1) category leadership in AI-native data
      lineage DLP, a differentiated approach that incumbents have not yet replicated at production
      scale; (2) demonstrable enterprise traction with 14+ named Fortune 500 accounts and
      third-party validation scores (Gartner 4.6/5, FeaturedCustomers 4.8/5); and (3) a $1B
      valuation entry that represents a reasonable 10x ARR multiple for a company growing at
      estimated high-double-digit rates with expanding market tailwinds from AI-driven data
      proliferation and tightening regulatory compliance requirements.

      The anti-thesis centres on four material risks. First, the December 2024 Chrome extension
      supply-chain compromise is an unresolved reputational event with ongoing class-action
      litigation and unknown regulatory investigation status. Second, Microsoft Purview's
      incumbent position (bundled with M365 E5 at near-zero marginal cost) represents a sustained
      pricing threat that could commoditise the DLP market. Third, Cyberhaven's financial metrics
      (NRR, gross margin, churn) are entirely opaque, making it impossible to validate the
      assumed growth and retention profile from public sources. Fourth, the product's dependency
      on the Chrome extension architecture introduces a structurally recurring supply-chain attack
      surface unless Cyberhaven migrates to a kernel-level or MDM-deployed agent model.

      The thesis is balanced by Cyberhaven's demonstrated incident-response capability in December
      2024 (24-hour patch, Mandiant engagement, CEO transparency), its growing mindshare (2.3%
      on PeerSpot, up from 1.5%), and the April 2025 Series D valuation reset occurring after the
      incident, suggesting investor confidence absorbed the 2024 event and priced it in.
