  - id: section-2
    title: Sizing lenses and why public TAM/SAM/SOM remains constrained
    body: >-
      Public market sizing is useful only if the boundary logic is kept explicit. The broadest adjacent lens is DLP:
      Grand View sizes the global DLP market at $1.87B in 2022 and $9.33B by 2030, with cloud deployment already the
      largest mode. The next lens is insider risk management, where ResearchAndMarkets puts the market at $2.4B in 2024
      growing to $3.7B by 2030, while Verified Market Reports publishes a larger $3.14B in 2024 to $8.23B by 2033 path.
      The most Cyberhaven-adjacent emerging category is DSPM, but even there public estimates diverge sharply: Growth
      Market Reports says $1.42B in 2024 to $17.2B by 2033, while DataHorizzon places DSPM tools at $1.8B in 2023 and
      $5.7B by 2033. Palo Alto’s vendor-authored market guide adds a still different frame, citing $415M-$2B 2025 market
      valuations and 25%-37% annual growth. Taken together, the evidence supports a meaningful and expanding
      data-centric security opportunity, but not a clean nested TAM/SAM/SOM pyramid. The categories overlap, the
      forecast years differ, and some sources count standalone tools while others include integrated platform modules.
      That is enough to bound the market directionally, but not enough to claim a precise public Cyberhaven SAM or SOM.
    claimRefs:
      - CM020
      - CM021
      - CM022
      - CM029
      - CM030
      - CM032
