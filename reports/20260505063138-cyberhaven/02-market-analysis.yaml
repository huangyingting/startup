chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Cyberhaven sits in a fast-growing but boundary-messy slice of enterprise data security where DLP, insider risk
    management, DSPM, and AI-data-governance controls are converging. The broadest public lens is the DLP market ($9.33B
    by 2030 per Grand View), while the more company-relevant adjacencies are DSPM ($5.7B-$17.2B by 2033 across public
    estimates) and insider risk management ($3.7B-$8.23B by 2030-2033 across public estimates). Cyberhaven is not
    selling into all cybersecurity spend; it is selling to security and compliance buyers who need to discover sensitive
    data, understand how it moves, and stop risky internal or AI-enabled exfiltration. Demand is supported by cloud
    sprawl, AI adoption, insider-driven breach evidence, and tightening governance obligations, but precise Cyberhaven
    SAM/SOM remains publicly under-disclosed because no independent source cleanly isolates Cyberhaven-specific revenue
    pools, contract values, or vertical conversion rates.
sections:
  - id: section-1
    title: Market boundary, included spend, and substitutes
    body: >-
      The right market boundary for Cyberhaven starts with what the product actually claims to do. Official Cyberhaven
      materials position the company as an AI and data security platform that unifies DSPM, DLP, insider risk
      management, and AI security across endpoints, cloud, on-prem, SaaS, and AI tools. That means the included spend is
      not “all cybersecurity” and not even the full universe of data security. The most relevant pools are enterprise
      spend on discovering sensitive data, classifying it, monitoring how it moves, preventing unauthorized transfer,
      and investigating risky user or AI-assisted data handling. Adjacent spend includes native data security suites
      from Microsoft Purview, cloud-delivered DLP from Zscaler, and CNAPP-integrated DSPM from Palo Alto Networks.
      Status-quo substitutes are native Microsoft controls, legacy DLP stacks, manual data classification programs, and
      point products focused only on cloud repositories. Excluded spend should include generic SIEM, firewall, endpoint
      protection, and broad infrastructure security budgets that do not directly buy data discovery, data
      classification, exfiltration prevention, or insider-risk response. This boundary matters because Cyberhaven’s
      public messaging is about data-in-motion context, lineage, and response quality, not about owning the whole
      security stack.
    claimRefs:
      - C047
      - C048
      - C052
