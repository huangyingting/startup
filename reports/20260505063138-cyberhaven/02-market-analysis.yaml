  - id: section-3
    title: Buyer segmentation, budget ownership, and adoption path
    body: >-
      The public buyer map is more security-and-compliance led than developer led. Cyberhaven’s own marketplace and
      homepage messaging repeatedly target security teams, IT professionals, CISOs, and regulated-data operators, while
      Microsoft’s insider-risk documentation shows how purchases often sit inside compliance, security, and
      tenant-administration workflows with licensing gates and explicit role-group setup. In practice, the economic
      buyer is usually a CISO, compliance leader, or central security platform owner; the operational users are security
      analysts, insider-risk investigators, and IT administrators; and the payer is commonly a central security,
      compliance, or Microsoft/Purview-adjacent platform budget. The adoption path is also visible in public materials:
      organizations first recognize data-sprawl or insider-risk problems, then evaluate whether legacy or native
      controls are producing too much noise, then pilot across one or two data channels, then connect the tool into
      identity, ticketing, DLP, or cloud workflows, and only then scale into a broader data-security program. Because
      privacy settings, opt-in indicators, connectors, and cross-platform policy enforcement all matter, deployment is
      not a commodity seat sale. Budget unlocks most plausibly when a buyer can link insider-risk, AI governance, and
      compliance reporting into one measurable control plane.
    claimRefs:
      - CM003
