    title: Market definition table
    columns:
      - segment/category
      - included spend
      - excluded spend
      - buyer/payer
      - relevance
    rows:
      - - Unified AI and data security platform
        - DSPM, DLP, insider risk management, AI-security controls, incident investigation workflows
        - Generic SIEM, firewall, endpoint protection, and unrelated infrastructure security spend
        - CISO, security platform owner, central IT / security budget
        - Direct framing used by Cyberhaven
      - - Data loss prevention (DLP)
        - Policy enforcement across web, email, endpoint, removable media, cloud, and AI channels
        - Threat intel, network firewall, and IAM spend not tied to data handling controls
        - Security operations, compliance, data-protection owners / security or compliance budget
        - Core adjacent category and legacy substitute
      - - Insider risk management (IRM)
        - Behavior analytics, policy alerts, investigations, privacy-aware internal misuse programs
        - General HR software, generic UEBA not tied to data-risk actions
        - Compliance leaders, insider-risk investigators, legal and security stakeholders / central governance budget
        - Core adjacent category for Cyberhaven’s risky-user positioning
      - - Data security posture management (DSPM)
        - Sensitive-data discovery, classification, exposure mapping, compliance reporting, cloud data context
        - Infrastructure-only posture management without data classification
        - Cloud-security and data-governance teams / cloud security or platform budget
        - Most relevant emerging category for Cyberhaven’s data-lineage and visibility claims
      - - Native suite substitutes
        - Microsoft Purview or similar suite controls bundled with wider compliance and data-security programs
        - Best-of-breed platforms when the buyer only wants bundled native controls
        - Existing Microsoft/compliance owners / existing suite budget
        - Important status-quo substitute that can slow standalone adoption
      - - Excluded adjacencies
        - 'null'
        - Broad cybersecurity suites, SOC tooling, endpoint detection, and non-data-centric security categories
        - Mixed enterprise security buyers / mixed budgets
        - Useful outer context but not a clean Cyberhaven revenue pool
    notes: >-
      Boundary is evidence-constrained and intentionally excludes generic cybersecurity TAM claims. Rows focus on
      Cyberhaven-adjacent spend categories surfaced in official product and market sources.
