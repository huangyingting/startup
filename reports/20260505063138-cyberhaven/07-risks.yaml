callouts:
  - calloutType: risk
    title: Chrome Extension Architecture Is a Structural Vulnerability
    body: >
      The December 2024 supply-chain compromise exposed a fundamental risk: a single developer OAuth token compromise
      can push a malicious version to all 400,000+ corporate users simultaneously with no per-customer approval gate.
      Cyberhaven patched within 24 hours and engaged Mandiant, but the underlying Chrome extension distribution model
      remains architecturally unchanged. Until Cyberhaven migrates to a cryptographically signed, enterprise-managed
      deployment model similar to EDR kernel drivers, this attack surface persists and represents the single
      highest-severity operational risk in this chapter.
    claimRefs:
      - C282
      - C283
      - C284
  - calloutType: risk
    title: Class-Action and Regulatory Exposure Remains Unresolved
    body: >
      TopClassActions has documented lawsuit filings against Cyberhaven arising from the 2024 incident. GDPR Article 83
      fines can reach 4% of global annual turnover; FTC consent decrees impose multi-year compliance obligations.
      Neither the litigation settlement nor any regulatory investigation outcome is publicly resolved as of May 2026.
      Diligence should obtain legal hold status and privilege-protected litigation exposure estimates before finalising
      any investment.
    claimRefs:
      - C279
      - C280
      - C277
  - calloutType: insight
    title: Two-Vendor Google Concentration Warrants Structural Mitigation
    body: >
      Cyberhaven depends on Google for both its primary endpoint distribution channel (Chrome Web Store) and its cloud
      infrastructure (GCP). This creates a scenario where a single Google policy or pricing change could simultaneously
      disrupt distribution and hosting. Multi-cloud roadmap disclosure and a Chrome enterprise deployment alternative
      such as Group Policy or MDM bypass of the Web Store would materially reduce this concentration risk.
    claimRefs:
      - C290
      - C291
