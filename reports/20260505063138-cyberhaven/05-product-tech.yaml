company:
  name: Cyberhaven
chapter:
  number: 5
  title: Product & Technology
  summary: |
    Cyberhaven delivers a unified AI & Data Security platform combining Data Security Posture
    Management (DSPM), Data Loss Prevention (DLP), Insider Risk Management (IRM), and AI Security
    in a single agent-based and cloud-connected solution. Its core differentiator is proprietary
    data lineage technology that traces sensitive data from creation through every movement,
    transformation, and fragmentation across endpoint, browser, and cloud. The Linea AI layer
    (Large Lineage Models) automates detection and investigation. Architecture is cloud-native on
    GCP with per-customer isolation, supporting three deployment modes: endpoint agent
    (Windows/macOS/Linux), browser extension, and cloud API connectors. Compliance posture includes
    SOC 2 Type 2, PCI DSS v4.0.1, GDPR, and CCPA. The December 2024 Chrome extension supply-chain
    incident is a material security risk that warrants diligence into extension hardening and
    post-incident customer trust recovery.
sections:
  - id: '5.1'
    title: Product Definition and Platform Overview
    body: |
      Cyberhaven markets a unified AI & Data Security Platform that merges four historically
      separate product categories: Data Security Posture Management (DSPM), Data Loss Prevention
      (DLP), Insider Risk Management (IRM), and AI Security. In customer workflow terms, the
      platform sits between the enterprise data store and every exfiltration vector—email,
      browser, SaaS applications, removable storage, printing, and cloud—and intercepts risky
      data movement in real time. The business problem it addresses is that legacy DLP products
      inspect content at policy checkpoints without understanding data history, producing large
      volumes of false positives and missing context-dependent threats. Cyberhaven claims to
      reduce false positive alerts by 95% compared with other tools by adding lineage context to
      every decision. The product targets enterprises with high concentrations of valuable IP,
      regulated data, or active insider risk, evidenced by named customers in technology, finance,
      manufacturing, healthcare, and legal sectors. Pricing is not publicly disclosed and requires
      a direct sales engagement. Platform availability was expanded to AWS Marketplace, Azure
      Marketplace, and GCP Marketplace in April 2026, enabling customers to consume spend against
      existing cloud commitments.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
  - id: '5.2'
    title: Module Architecture and Product Line Map
    body: |
      The platform comprises five interlinked modules. DSPM discovers and classifies data across
      cloud and endpoint environments and continuously monitors it as it moves between clouds and
      devices. DLP enforces real-time blocking and coaching across email, web, cloud, and devices
      using lineage-enriched policy decisions rather than pure content inspection. IRM combines
      data-movement signals with behavioral signals to detect insider threats and clarify intent,
      capturing slow-burn exfiltration patterns legacy tools miss. AI Security monitors shadow AI
      usage (ChatGPT, Google Gemini, Microsoft Copilot, and other AI tools), assesses AI risk
      posture, and prevents leaks to AI tools without blocking legitimate usage. Linea AI is the
      intelligence layer spanning all modules—it includes the Detection Agent (autonomously
      detecting risky activity using proprietary Large Lineage Models, or LLiM) and the Analyst
      Agent (launching deep investigations, gathering evidence, and delivering reports with
      next-steps). Each module is sold as part of the unified platform; individual module pricing
      or separate SKU availability is not publicly documented. The company announced a "Securing
      the Agentic AI Era" product launch on May 5, 2026, suggesting continued platform expansion
      into agentic AI governance, though specifics of that launch were not yet public as of the
      research date.
    claimRefs:
      - CE005
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
  - id: '5.3'
    title: Technology Architecture and Deployment Model
    body: |
      Cyberhaven uses three deployment modes to instrument data flows. First, an endpoint agent
      supports Windows, macOS, and Linux operating systems and intercepts file operations, USB
      transfers, printing, and application-level data movements at the OS level. Second, a browser
      extension (Chrome primary) monitors web-based data flows, SaaS application uploads, and AI
      tool interactions in the browser. This extension was the vector for the December 2024
      supply-chain incident. Third, cloud API connectors integrate with SaaS platforms (Google
      Workspace, Microsoft 365) via API to capture cloud-resident data movements without requiring
      an endpoint. The backend infrastructure runs exclusively on Google Cloud Platform (GCP)
      in US data centers. Each customer runs a fully isolated instance with dedicated virtual
      compute, storage, and network resources; no shared processing occurs between customers.
      Microservices architecture built on least-privilege principles. All in-transit data between
      endpoint sensors and the backend is encrypted via TLS; inter-container traffic is also TLS
      over GCP VPN. The public REST API exposes three endpoints: /api/rest/v1/endpoints/list,
      /api/rest/v1/incidents/list, and /api/rest/v1/audit-log/dataflow/list, all authenticated
      via temporary bearer tokens derived from an API key. The edm-cli Python CLI on GitHub
      (CyberhavenInc/edm-cli) allows programmatic management of Exact Data Match (EDM) databases
      using hashed fingerprints (SpookyHash V2 + SHA256). Cyberhaven also maintains a GitHub
      organization (CyberhavenInc) with public repos including api2 (Go HTTP API library),
      cel2sql (CEL-to-SQL converter), and protoc-gen-grpc-gateway-ts (gRPC gateway TypeScript
      generator), indicating an internal stack using Go, gRPC, and TypeScript.
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
  - id: '5.4'
    title: Differentiation and Proprietary Technology
    body: |
      Cyberhaven's stated differentiation is its data lineage engine, which maps the complete
      journey of data from creation through every copy, transformation, rename, email attachment,
      upload, and fragmentation event. This lineage graph is what powers context-aware policy
      decisions: a file that originated as an internal trade secret is treated differently from
      a publicly sourced file with the same content, enabling accurate blocking with fewer false
      positives. The Large Lineage Model (LLiM) is described as a purpose-built AI model trained
      on lineage graph data rather than general text, making it proprietary to the company's
      specific architecture. The company claims the LLiM enables predictive risk detection
      (identifying risky patterns before a policy violation occurs). No patent filings for these
      techniques were confirmed in the public record; the company has not disclosed a patent
      portfolio. EDM (Exact Data Match) capability allows enterprises to fingerprint specific
      sensitive datasets (structured data, source code) and track them precisely, reducing false
      positives from regex-based approaches. Independent review data corroborates differentiation
      claims: PeerSpot mindshare in DLP grew from 1.5% to 2.3% year-over-year, Gartner Peer
      Insights showed 4.6/5 from 48 reviews, G2 showed 4.5/5 from 18 reviews, and FeaturedCustomers
      showed 17 testimonials and 1 case study. Motorola reported 90% reduction in false positives,
      98% reduction in investigation time, and 90% reduction in risky events after deploying
      Cyberhaven.
    claimRefs:
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
      - CE024
  - id: '5.5'
    title: Trust, Security, Compliance, and Quality Controls
    body: |
      Cyberhaven's Trust Center (trust.cyberhaven.com, powered by SafeBase) lists four compliance
      frameworks: CCPA, GDPR, PCI DSS v4.0.1, and SOC 2 Type 2 (with a SOC-2 Bridge Letter
      valid through January 2026). Application penetration testing, cyber insurance, and
      subprocessor listing are available to customers on request. The security policy describes
      GCP-hosted customer-isolated instances, TLS-encrypted data in transit, at-rest encryption
      via GCP key management, and 24/7 MDR monitoring with Google Security Command Center for
      Kubernetes-native security. Authentication options include Google SSO (OAuth2), password
      with mandatory 2FA, and SAML 2.0. RBAC supports regular users and administrators. Code
      deployment requires peer review plus security audit by at least one additional engineer.
      Annual OWASP Top 10 secure code training is required for developers. The company reports
      an A+ rating on Qualys SSL Labs. The December 2024 Chrome extension incident (malicious
      version 24.10.4 affecting ~400,000 users) demonstrated that the extension distribution
      channel carries supply-chain risk independent of the GCP backend. Mandiant was engaged for
      incident response; federal law enforcement was notified. The company published a clean
      version (24.10.5) within 24 hours. As of the research date, no litigation, SEC enforcement
      actions, or regulatory fines arising from the incident had been publicly disclosed.
    claimRefs:
      - CE025
      - CE026
      - CE027
      - CE028
      - CE029
      - CE030
      - CE031
      - CE032
      - CE033
