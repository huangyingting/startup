  - calloutType: risk
    title: Financial opacity is still the main underwriting blocker
    body: >
      Public sources do not disclose cash, burn, runway, gross margin, CAC, payback, debt, or revenue-recognition
      policy, so any valuation or downside case still depends on management materials.
    claimRefs:
      - CI048
