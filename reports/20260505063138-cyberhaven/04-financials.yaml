  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing private metric
      - Impact
      - Exact diligence path
    rows:
      - - ARR / GAAP revenue / revenue recognition policy
        - Prevents reliable underwriting of scale, seasonality, and deferred revenue quality
        - >-
          Request monthly ARR and GAAP revenue bridge, revenue-recognition memo, deferred revenue roll-forward, and
          SKU-level revenue mix
      - - Realized pricing, discounts, and contract duration
        - Blocks analysis of monetization quality and pricing power
        - Request quote-to-cash extracts with list price, discount, term length, and renewal uplift by segment
      - - CAC, payback, sales cycle, and sales productivity
        - Blocks GTM efficiency analysis and hiring-plan underwriting
        - >-
          Request fully loaded CAC, pipeline conversion, median cycle length, quota attainment, and payback by channel
          and segment
      - - Gross margin, hosting, support, and services burden
        - Blocks margin-path and operating-leverage analysis
        - Request gross-margin bridge, COGS detail, cloud spend, services attach rate, and support staffing ratios
      - - Cash balance, burn, and runway
        - Blocks solvency and financing-dependency analysis
        - Request treasury report, monthly burn bridge, covenant headroom, and downside runway model
      - - Debt, liens, customer concentration, and NRR
        - Blocks downside modeling for covenant risk and renewal quality
        - Request debt schedule, lien search, top-20 customers, concentration by ARR, and NRR / GRR cohorts
    notes: >
      Cyberhaven's public record is good enough to show momentum and financing history, but not good enough to build a
      full underwriting model without management materials.
