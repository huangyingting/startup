  - id: capital-adequacy
    title: Capital adequacy, financing dependency, and diligence blockers
    body: >
      The cleanest capital-adequacy fact in the public record is the April 2025 Series D. Cyberhaven said the round
      brought in $100 million, lifted total funding to $250 million, and valued the company at $1 billion. Management
      also said the proceeds would support M&A, organic product innovation, and aggressive go-to-market investment. That
      combination usually implies an offensive use-of-funds plan rather than a defensive bridge round: Cyberhaven
      appears to be financing platform expansion and distribution growth at the same time. The February 2026 results
      release, plus marketplace expansion in April 2026, suggests management kept investing after the raise rather than
      slowing down.


      That said, the company remains difficult to underwrite from public data alone. No retained public source disclosed
      cash on hand, monthly burn, runway, debt balances, covenant terms, project-finance obligations, or a next-round
      trigger. The North Carolina Secretary of State filing page shows regular annual-report compliance, including a
      2026 filing tied to fiscal date 2026-01-31, but it does not provide the operating financial statements that a
      public-company filing would. The SEC EDGAR search page is useful as a filing diligence path, yet no
      company-specific public financial filing was retained for Cyberhaven because it is still private.


      The practical verdict is that Cyberhaven likely has meaningful capital support and current demand, but financial
      quality still hinges on private diligence. The next diligence session should prioritize management-reported ARR or
      revenue, gross margin, sales efficiency, cash and burn, debt schedule, revenue-recognition policy, and channel /
      module mix. Without those items, an investor can defend a positive commercial-momentum view, but not a precise
      view of runway, capital intensity, or margin path.
    claimRefs:
