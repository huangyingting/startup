    title: Procurement flexibility can expand coverage before it proves pricing power
    body: >
      Marketplace availability across AWS, Azure, and Google Cloud, plus a channel-first program, should reduce
      procurement friction, but the public record still does not show how those routes affect discounting or channel
      mix.
    claimRefs:
      - C169
      - C170
