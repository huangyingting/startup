callouts:
  - calloutType: strength
    title: Financing and demand both moved in Cyberhaven's favor
    body: >
      Cyberhaven paired a $100 million Series D in April 2025 with a February 2026 update that claimed triple-digit
      growth and more than 50 percent customer growth, which is unusually strong public momentum for a private security
      company.
    claimRefs:
      - C160
      - C161
      - C163
      - C164
      - C165
  - calloutType: risk
    title: Financial opacity is still the main underwriting blocker
    body: >
      Public sources do not disclose cash, burn, runway, gross margin, CAC, payback, debt, or revenue-recognition
      policy, so any valuation or downside case still depends on management materials.
    claimRefs:
      - C189
      - C190
      - C191
      - C192
