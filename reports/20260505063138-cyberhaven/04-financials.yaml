          Directional check on entry-level contract economics, but third-party benchmarks may understate
          large-enterprise deal sizes
        - Provide ACV distribution by customer size and deployment scope
      - - 'Operational ROI proxy: faster investigations'
        - 200% improved time-to-resolution
