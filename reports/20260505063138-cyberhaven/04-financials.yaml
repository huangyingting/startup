        - null
        - low
        - Without these metrics, investors cannot judge GTM efficiency or hiring productivity
        - Provide fully loaded CAC, payback, sales cycle, and sales productivity by segment
      - - Gross margin / service-delivery cost
        - null
        - low
        - Margin path determines how much of current growth can convert into durable operating leverage
        - Provide gross margin bridge, hosting cost, support burden, and services mix
    notes: >
      Public evidence is strongest on growth and customer ROI proxies, but classical unit economics remain
      private-company blind spots.
