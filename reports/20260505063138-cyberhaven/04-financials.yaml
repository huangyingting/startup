    rows:
      - - New bookings growth disclosed with Series C
        - 200
        - medium
        - Fast bookings growth is the strongest public sales-efficiency proxy before CAC/payback disclosure
        - Provide bookings by year, net new ARR, and win-rate bridge
      - - FY2026 customer growth
        - '>50%'
        - medium
        - Supports continued demand and potential payback leverage if expansion and renewals are healthy
        - Provide gross adds, churned logos, and expansion ARR by cohort
      - - Public contract-value benchmark
        - 35016
        - low
        - >-
          Directional check on entry-level contract economics, but third-party benchmarks may understate
          large-enterprise deal sizes
        - Provide ACV distribution by customer size and deployment scope
      - - 'Operational ROI proxy: faster investigations'
        - 200% improved time-to-resolution
        - medium
        - Operational payback can support premium enterprise pricing and lower customer friction
        - Provide quantified labor savings and incident-cost avoidance studies
      - - 'Operational ROI proxy: risk reduction'
        - 80% reduction in risky behavior
        - medium
        - Improved user behavior supports retention and expansion narratives if verified broadly
        - Provide sample size, measurement period, and customer cohort context
      - - Public annual revenue estimate range
        - 52.4-64.9 USD M
        - low
        - Useful only as a rough scale bound because vendors disagree and figures are not filed
        - Provide management-reported ARR/revenue with monthly trend
