    title: Financing and demand both moved in Cyberhaven's favor
    body: >
      Cyberhaven paired a $100 million Series D in April 2025 with a February 2026 update that claimed triple-digit
      growth and more than 50 percent customer growth, which is unusually strong public momentum for a private security
      company.
    claimRefs:
      - CI019
      - CI020
      - CI022
