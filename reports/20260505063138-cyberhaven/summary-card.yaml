      December 2024 incident.
  topRisks:
    - The December 2024 Chrome extension compromise remains an unresolved reputational, legal, and regulatory overhang.
    - Financial opacity is severe: ARR, NRR, gross margin, churn, burn, and cash runway are not publicly disclosed.
    - >-
      Microsoft Purview and other incumbents can pressure pricing and reduce win rates through bundling and distribution
      leverage.
    - >-
      Browser-extension dependency leaves a recurring supply-chain and platform-dependency risk unless architecture
      materially evolves.
    - >-
      Public evidence on total customer count, concentration, and expansion quality is too thin to validate durability
      at the current valuation.
  unresolvedGaps:
