  topStrengths:
    - Lineage-first product architecture appears genuinely differentiated versus legacy DLP and bundle-first incumbents.
    - >-
      Public customer proof is unusually strong for a private security company, including 14 named enterprises and
      detailed Motorola outcome metrics.
    - Market tailwinds are favorable as DLP, DSPM, insider risk, and AI-data-governance budgets converge.
    - >-
      Customer satisfaction and mindshare signals are strong, including Gartner Peer Insights, G2, FeaturedCustomers,
      and improving PeerSpot share.
