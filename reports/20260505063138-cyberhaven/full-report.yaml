  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, included spend, and substitutes
        blocks:
          - type: paragraph
            body: >-
              The right market boundary for Cyberhaven starts with what the product actually claims to do. Official
              Cyberhaven materials position the company as an AI and data security platform that unifies DSPM, DLP,
              insider risk management, and AI security across endpoints, cloud, on-prem, SaaS, and AI tools. That means
              the included spend is not “all cybersecurity” and not even the full universe of data security. The most
              relevant pools are enterprise spend on discovering sensitive data, classifying it, monitoring how it
              moves, preventing unauthorized transfer, and investigating risky user or AI-assisted data handling.
              Adjacent spend includes native data security suites from Microsoft Purview, cloud-delivered DLP from
              Zscaler, and CNAPP-integrated DSPM from Palo Alto Networks. Status-quo substitutes are native Microsoft
              controls, legacy DLP stacks, manual data classification programs, and point products focused only on cloud
              repositories. Excluded spend should include generic SIEM, firewall, endpoint protection, and broad
              infrastructure security budgets that do not directly buy data discovery, data classification, exfiltration
              prevention, or insider-risk response. This boundary matters because Cyberhaven’s public messaging is about
              data-in-motion context, lineage, and response quality, not about owning the whole security stack.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM006
              - CM007
              - CM008
              - CM009
              - CM010
              - CM016
              - CM018
