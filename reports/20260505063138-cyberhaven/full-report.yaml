      - number: '4.2'
        title: Public traction signals and what they imply for unit economics
        blocks:
          - type: paragraph
            body: >
              Public traction signals are directionally strong even though classical SaaS efficiency metrics remain
              undisclosed. Cyberhaven's June 2024 Series C announcement said the company had 200 percent growth in new
              bookings, and its February 2026 business-results release said the fiscal year ended January 31, 2026
              delivered record growth in revenue, customers, and platform adoption, including triple-digit growth over
              the prior year and customer growth above 50 percent. The same release also said customers include four of
              the top five companies on Forbes' AI 50 list and some of the top five North American banks, alongside
              other regulated institutions and law firms. Those disclosures support the idea that Cyberhaven is moving
              upmarket into larger, more compliance-sensitive enterprises.


              Customer proof also suggests the product can generate measurable operational value. Cyberhaven highlights
              a 200 percent improvement in time-to-resolution and an 80 percent reduction in risky behavior after
              enabling real-time user coaching. The request-demo and partner materials add management claims that the
              platform reduces alert noise, lowers program cost, and lowers total cost of ownership by consolidating
              tools. These are not substitutes for CAC, payback, gross retention, or NRR, but they do suggest why
              Cyberhaven can pursue a premium enterprise motion rather than a volume-led commodity-security motion.


              The hardest public-number question is scale. Independent data vendors disagree: Datanyze and ZoomInfo both
              show roughly $64.9 million of revenue, while Growjo estimates roughly $52.4 million. Those figures are
              plausible enough to frame a public estimate range, but they are not company-filed and should not be
              treated as underwriteable revenue. Taken together, the strongest unit-economics read is qualitative:
              Cyberhaven appears to have strong enterprise demand, rising sales velocity, and meaningful product ROI
              signals, but the public record still lacks direct evidence on CAC, payback, gross margin, and renewal
              quality.
