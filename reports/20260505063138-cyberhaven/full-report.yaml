      - number: '1.5'
        title: Milestones, adverse events, and what later chapters can reuse
        blocks:
          - type: paragraph
            body: |
              The reusable company chronology is straightforward. Public sources support a 2016 founding,
              a 2021 Series B, a 2022 insider-threat product launch, a June 2024 Series C that brought in
              Adams Street and added a board seat, a September 2024 leadership expansion, a December 2024
              browser-extension compromise, a unicorn-making Series D in April 2025, a CEO handoff in May
              2025, a November 2025 Deloitte Fast 500 ranking, and a February 2026 results release that
              reported strong growth without giving absolute financials. Those events collectively show a
              company moving from technical origin story to category-marketing scale in a compressed
              window.

              The adverse event is material and should carry forward into the risks chapter. TechCrunch,
              BleepingComputer, and Nightfall all describe a malicious Chrome extension update published
              after a company-account compromise in late December 2024. Reported impact included exposure
              of authenticated sessions and cookies, roughly 400,000 extension users at risk, and linkage
              to a wider campaign affecting more than 35 extensions and roughly 2.6 million users. That
              incident does not negate the product thesis, but it is a reputational and operational stress
              test for a company selling data-protection software.

              The growth narrative after the incident remained strong. Cyberhaven still closed Series D,
              changed CEOs without obvious public disruption, ranked #51 on Deloitte's 2025 Technology Fast
              500, and then reported triple-digit revenue growth in fiscal 2026. Later chapters can reuse
              that sequence as the core frame: strong capital and category momentum, paired with
              disclosure gaps and a meaningful operational blemish.
            claimRefs:
              - CO005
              - CO015
              - CO019
              - CO021
              - CO022
