      - number: '1.2'
        title: Founders, leadership bench, and key-person dependence
        blocks:
          - type: paragraph
            body: |
              Redpoint and Tracxn both list five founders for Cyberhaven: Cristian Zamfir, George Candea,
              Radu Banabic, Vitaly Chipounov, and Volodymyr Kuznetsov. Public founder bios are sparse in
              currently available sources, but the repeated five-founder listing across investor and data
              provider surfaces is strong enough to treat that lineup as the company's best-supported
              founding roster. George Candea also appears in Tracxn as a board observer, indicating at
              least some founder continuity into governance even after the company became more
              commercially scaled.

              Howard Ting appears to have been the executive who turned Cyberhaven from a research-heavy
              organization into a scaled commercial security vendor. BankInfoSecurity reports that when
              Ting joined in June 2020 the company had roughly 18 people, versus about 220 by May 2025.
              Cyberhaven then materially deepened the bench in September 2024 by adding Nishant Doshi,
              Edward Sharp, Kristin Vines, and Manoj Gupta across product, finance, people, and corporate
              development. Those hires are important because they show the company institutionalizing for a
              larger go-to-market and platform roadmap before the Series D.

              Leadership continuity is still a watch item. Ting resigned as CEO in May 2025, Doshi took
              over after a three-month transition, and Ting remained on the board. By February 2026,
              Cyberhaven's own release identified Doshi as CEO and added James McCarthy and Aman Sirohi to
              the leadership team. That sequence reduces single-executive dependency relative to early
              2024, but the company still shows material key-person exposure around CEO succession and the
              product leadership brought in during the 2024 scale-up.
            claimRefs:
              - CO003
              - CO017
              - CO018
              - CO019
              - CO020
              - CO021
              - CO041
              - CO044
      - number: '1.3'
        title: Capital formation, investors, and governance signals
        blocks:
          - type: paragraph
            body: |
              Cyberhaven's public financing history is unusually well disclosed for a private security
              company. The company announced a $33 million Series B in December 2021 led by Redpoint,
              followed by an $88 million Series C in June 2024 led by Adams Street Partners and Khosla
              Ventures, and then a $100 million Series D in April 2025 led by StepStone Group with new
              investors Schroders and Industry Ventures. The Series D announcement put total funding at
              $250 million and valuation at $1 billion. That is the strongest primary-source capital stack
              available and should be the baseline for later chapters.

              Governance became more visible during the Series C. Cyberhaven disclosed that Adams Street
              partner Fred Wang joined the board as part of that financing, which is the clearest public
              board addition in the reviewed materials. Redpoint's company page separately confirms it
              first partnered with Cyberhaven in the 2021 Series B, highlighting that Redpoint is a
              longer-tenured stakeholder than the Series C and D entrants. Tracxn adds breadth by listing
              23 institutional and 6 angel investors, but that should be treated as directional because
              public databases often classify rounds and investor types differently from company releases.

              One important diligence nuance is that total-raised figures do not line up perfectly across
              sources. Cyberhaven says $250 million after Series D, while Tracxn says $236 million over
              six rounds as of the same date. The gap likely reflects database treatment of grants,
              historical rounds, or investor round attribution rather than a substantive capital mismatch,
              but it is still a reminder that only round-level company announcements should be treated as
              canonical.
            claimRefs:
              - CO011
              - CO012
              - CO013
              - CO014
              - CO015
              - CO035
              - CO042
              - CO044
      - number: '1.4'
        title: Cover metrics, disclosure limits, and public operating signals
        blocks:
          - type: paragraph
            body: |
              Cyberhaven discloses enough to establish maturity, but not enough to underwrite the business
              without management access. The strongest public cover metrics are the $1 billion Series D
              valuation, official total funding of $250 million, triple-digit fiscal 2026 revenue growth,
              and customer growth above 50%. The company also publicly claims penetration into four of the
              top five Forbes AI 50 companies and the top five North American banks, plus usage by large
              organizations in finance, law, retail, healthcare, and media. Those claims indicate
              enterprise relevance and regulated-data exposure even though they stop short of giving
              customer count, ACV, retention, or logo-level revenue concentration.

              Public disclosure becomes much weaker on scale metrics that matter most for valuation work.
              No reviewed public source gave absolute ARR, revenue, or customer count. Headcount is only
              partially supportable: BankInfoSecurity described Cyberhaven as roughly 220 people by May
              2025, while PitchBook's public FAQ lists 282 employees and Tracxn surfaces a different,
              partially visible employee-count field. Because none of those are official company KPI
              disclosures, headcount should be treated as a low-confidence range rather than a canonical
              number.

              Security posture signals are better than financial transparency. Cyberhaven's Trust Center
              advertises SOC 2 Type 2, GDPR, CCPA, and PCI DSS v4.0.1 artifacts, along with penetration
              testing and cyber-insurance materials. The browser extension privacy policy further confirms
              that employer customers control extension data and that the policy was updated in September
              2024. Those are useful diligence breadcrumbs, but the underlying documents remain access
              gated and should be requested directly.
            claimRefs:
              - CO012
              - CO022
              - CO023
