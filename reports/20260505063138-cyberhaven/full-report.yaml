  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model, pricing mechanics, and GTM motion
        blocks:
          - type: paragraph
            body: >
              Cyberhaven's monetization model is easiest to describe as enterprise software subscriptions wrapped around
              a unified AI and data-security platform. The company's current product pages position one platform
              spanning DSPM, DLP, insider risk management, and AI security, with data lineage as the common control
              layer. That architecture matters financially because it supports land-and-expand selling: Cyberhaven can
              start from data detection and response, then add adjacent modules such as DSPM or AI-security controls as
              customer requirements broaden. The Microsoft marketplace listing reinforces the same bundle thesis by
              describing a unified offer that protects data across cloud, endpoints, and removable media while also
              integrating with tools such as Microsoft Purview and Salesforce.


              Commercially, Cyberhaven is not running a transparent self-serve SaaS motion. The official website routes
              buyers to a request-demo path and a free on-demand demo instead of publishing list prices. Third-party
              pricing pages and AWS private-offer documentation point in the same direction: pricing appears to be
              subscription based, usually tied to deployment scope such as endpoints or data volume, and then negotiated
              through enterprise contracts, volume discounts, or marketplace private offers. That means the public
              record supports pricing mechanics, but not realized pricing, discounting discipline, or module-level
              revenue mix.


              GTM breadth is improving. Cyberhaven says it is channel-first, operates reseller / tech / integration
              partner programs, and as of April 2026 can transact through AWS, Azure, and Google Cloud marketplaces
              using existing cloud commitments. Those procurement options likely shorten enterprise approvals and expand
              routes to revenue, especially for buyers already budgeting through hyperscaler commitments. Still, none of
              the retained sources disclose contract duration, renewal rates, implementation services mix, or how much
              of bookings come from direct sales versus partners versus marketplaces.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
              - CI007
              - CI014
