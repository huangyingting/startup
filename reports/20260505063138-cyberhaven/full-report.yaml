      - number: '2.2'
        title: Sizing lenses and why public TAM/SAM/SOM remains constrained
        blocks:
          - type: paragraph
            body: >-
              Public market sizing is useful only if the boundary logic is kept explicit. The broadest adjacent lens is
              DLP: Grand View sizes the global DLP market at $1.87B in 2022 and $9.33B by 2030, with cloud deployment
              already the largest mode. The next lens is insider risk management, where ResearchAndMarkets puts the
              market at $2.4B in 2024 growing to $3.7B by 2030, while Verified Market Reports publishes a larger $3.14B
              in 2024 to $8.23B by 2033 path. The most Cyberhaven-adjacent emerging category is DSPM, but even there
              public estimates diverge sharply: Growth Market Reports says $1.42B in 2024 to $17.2B by 2033, while
              DataHorizzon places DSPM tools at $1.8B in 2023 and $5.7B by 2033. Palo Alto’s vendor-authored market
              guide adds a still different frame, citing $415M-$2B 2025 market valuations and 25%-37% annual growth.
              Taken together, the evidence supports a meaningful and expanding data-centric security opportunity, but
              not a clean nested TAM/SAM/SOM pyramid. The categories overlap, the forecast years differ, and some
              sources count standalone tools while others include integrated platform modules. That is enough to bound
              the market directionally, but not enough to claim a precise public Cyberhaven SAM or SOM.
            claimRefs:
              - CM020
              - CM021
              - CM022
              - CM029
              - CM030
              - CM032
              - CM035
              - CM037
              - CM039
      - number: '2.3'
        title: Buyer segmentation, budget ownership, and adoption path
        blocks:
          - type: paragraph
            body: >-
              The public buyer map is more security-and-compliance led than developer led. Cyberhaven’s own marketplace
              and homepage messaging repeatedly target security teams, IT professionals, CISOs, and regulated-data
              operators, while Microsoft’s insider-risk documentation shows how purchases often sit inside compliance,
              security, and tenant-administration workflows with licensing gates and explicit role-group setup. In
              practice, the economic buyer is usually a CISO, compliance leader, or central security platform owner; the
              operational users are security analysts, insider-risk investigators, and IT administrators; and the payer
              is commonly a central security, compliance, or Microsoft/Purview-adjacent platform budget. The adoption
              path is also visible in public materials: organizations first recognize data-sprawl or insider-risk
              problems, then evaluate whether legacy or native controls are producing too much noise, then pilot across
              one or two data channels, then connect the tool into identity, ticketing, DLP, or cloud workflows, and
              only then scale into a broader data-security program. Because privacy settings, opt-in indicators,
              connectors, and cross-platform policy enforcement all matter, deployment is not a commodity seat sale.
              Budget unlocks most plausibly when a buyer can link insider-risk, AI governance, and compliance reporting
              into one measurable control plane.
            claimRefs:
              - CM003
              - CM005
              - CM011
              - CM013
              - CM014
              - CM015
              - CM019
              - CM023
              - CM024
              - CM043
              - CM044
      - number: '2.4'
        title: Growth drivers, adoption constraints, and valuation relevance
        blocks:
          - type: paragraph
            body: >-
              The adoption case for Cyberhaven is supported by several durable drivers. First, cloud and multicloud
              sprawl keep pushing sensitive data across endpoints, SaaS, and cloud repositories, which is exactly the
              discovery and classification problem highlighted in public DSPM research. Second, AI adoption creates new
              exfiltration and governance problems: Cyberhaven, Microsoft, and Palo Alto all emphasize protecting data
              that now moves through AI tools and agents. Third, regulatory and governance pressure is increasing; SEC
              rules now require more explicit cyber-risk management and governance disclosure by public companies, while
              Microsoft and CISA materials show how insider-risk controls are becoming formal programs rather than ad
              hoc investigations. Fourth, breach data keeps the urgency high. HIPAA Journal’s summary of Verizon’s 2024
              DBIR shows internal actors causing 70% of healthcare breaches and human error involved in 68% of breaches
              under Verizon’s methodology. The constraints are equally real: legacy environments are fragmented, alert
              quality can be poor, licensing and permissions can slow rollout, and public market forecasts disagree
              about category scope. For valuation, that means Cyberhaven is exposed to a real and growing market, but
              investors should discount for implementation friction and for the absence of public evidence on contract
              sizes, win rates, and vertical mix.
            claimRefs:
