companyProfile:
  summary: >-
    Cyberhaven is a private cybersecurity company building a lineage-first AI and data security platform for large
    enterprises. The company combines DSPM, DLP, insider risk management, and AI security into a unified control plane
    and has translated that positioning into named enterprise wins, strong user-review scores, and rapid financing
    progress through a $100M Series D at a $1B valuation. The business case is compelling on product differentiation and
    customer outcomes, but public evidence remains too thin on financial quality and incident aftermath to support a
    fully underwritten late-stage investment decision.
