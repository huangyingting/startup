            body: |
              Cyberhaven does not publicly disclose NRR, GRR, annual churn, or cohort retention.
              As a pre-IPO company with a $1B valuation, this is the single largest evidence gap
              for customer durability analysis. Buyers should treat favorable review scores as
              satisfaction proxies only, not retention guarantees. Formal diligence must include
              requests for retention dashboards, renewal rate by cohort, and top-10 customer ARR
