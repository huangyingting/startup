  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape and buyer substitutes
        blocks:
          - type: paragraph
            body: |
              Cyberhaven is not selling into a greenfield category. Public shortlists and vendor-authored
              comparison pages consistently place it against three different competitor classes at once:
              incumbent enterprise DLP suites such as Microsoft Purview, Forcepoint, and Symantec DLP;
              direct insider-risk and response-centric platforms such as Mimecast Incydr and Proofpoint;
              and adjacent cloud- and AI-oriented DLP vendors such as Nightfall. That pattern matters
              because the buyer's “alternative” is often not a single like-for-like product. In many
              enterprises, the practical substitute is to extend an existing Microsoft or legacy DLP estate,
              add insider-risk workflow tooling on top, and delay any rip-and-replace purchase until a new
              program owner has budget and executive air cover. Cyberhaven therefore competes as much
              against the status quo and suite expansion as it does against a single direct peer.

              The landscape is also heterogeneous by use case. Cyberhaven's lineage-first messaging fits
              buyers who care about knowledge-flow reconstruction, insider investigations, and stopping
              risky sharing across endpoints, SaaS, and AI tools. Microsoft competes where M365-native
              coverage, privacy-by-design workflows, and procurement leverage dominate. Forcepoint and
              Symantec represent the legacy control-heavy path for large hybrid estates. Mimecast and
              Proofpoint pitch fast insider-risk response and multichannel evidence. Nightfall attacks the
              SaaS, browser, and AI-app problem with simpler deployment and public pricing signals. For a
              diligence view, that means Cyberhaven must win on precision and workflow quality, not merely
              on having “DLP” in the product name.
            claimRefs:
              - CP030
              - CP031
              - CP035
              - CP036
              - CP038
      - number: '3.2'
        title: Where Cyberhaven leads and where rivals are strongest
        blocks:
          - type: paragraph
            body: |
              Cyberhaven's clearest public advantage is context. Its own product and comparison pages say
              the platform combines content analysis with data lineage, follows where data originated and
              moved, and reconstructs the events leading to a leak or insider-risk incident. Those same
              materials claim materially fewer false positives and much faster investigations than legacy,
              content-only DLP. That is a persuasive buying story for R&D-heavy and regulated teams that
              care less about box-checking compliance and more about determining whether sensitive data was
              actually exposed, who handled it, and whether the action was malicious or accidental.

              Rivals, however, each attack a different weak spot in that story. Microsoft's public
              documentation emphasizes deep content analysis, machine learning, broad policy coverage, and
              privacy-sensitive insider-risk operations inside an installed M365 estate. Forcepoint and
              Symantec keep the incumbent posture argument alive for large enterprises that already have
              mature policy teams and hybrid infrastructure. Proofpoint and Mimecast lean into
              investigation-centric workflows, multichannel telemetry, and automated response controls.
              Nightfall's public pages and pricing lean hard into fast rollout and modern SaaS, browser,
              endpoint, and AI-app coverage. Varonis pushes adjacent platform breadth by pairing DLP with
              DSPM, UEBA, access governance, and AI security. In other words, Cyberhaven's message is
              differentiated, but the short list is deep because adjacent vendors can frame the buying
              decision around bundle leverage, simplicity, or cloud coverage instead of lineage.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP011
              - CP014
              - CP016
              - CP018
