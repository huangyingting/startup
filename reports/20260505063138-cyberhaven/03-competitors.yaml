callouts:
  - calloutType: strength
    title: Context, not checkbox compliance, is Cyberhaven's strongest wedge
    body: >-
      The retained public evidence repeatedly shows Cyberhaven winning the “what actually happened to this data?”
      argument: lineage, event reconstruction, and lower-noise investigations are the most differentiated parts of the
      story.
    claimRefs:
      - C098
      - C100
      - C102
      - C141
  - calloutType: risk
    title: Distribution and trust are the main ways rivals can blunt Cyberhaven
    body: >-
      Microsoft and legacy incumbents can lean on installed-base procurement and compliance workflows, while the
      December 2024 extension compromise gives competitors a concrete trust objection to raise.
    claimRefs:
      - C108
      - C115
      - C116
      - C139
  - calloutType: insight
    title: Public pricing transparency favors Nightfall and Teramind in early evaluations
    body: >-
      Cyberhaven and most incumbents stay demo-led on reviewed pages, while Nightfall and Teramind expose clearer public
      pricing structures that can accelerate initial shortlist formation.
    claimRefs:
      - C127
      - C130
      - C140
