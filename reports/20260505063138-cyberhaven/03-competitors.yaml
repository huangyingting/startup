figures:
  - id: F301
    title: Competitive positioning map
    type: quadrant
    layout: wide
    summary: >-
      Cyberhaven plots furthest on contextual detection depth, while Microsoft and legacy incumbents sit furthest on
      distribution and installed-base leverage. Nightfall pulls higher on modern SaaS and AI coverage, but with less
      public evidence of incumbent reach.
    data:
      xAxis:
        label: Contextual detection / lineage depth (0-10 ordinal)
      yAxis:
        label: Suite reach / distribution leverage (0-10 ordinal)
      points:
        - label: Cyberhaven
          x: 9
          'y': 6
          detail: Strongest public lineage-centric story, but narrower installed-base leverage than suites.
          tone: positive
        - label: Microsoft Purview
          x: 6
          'y': 10
          detail: Broadest suite and procurement leverage, with good insider-risk depth inside M365.
          tone: positive
        - label: Forcepoint DLP
          x: 5
          'y': 8
          detail: Mature incumbent DLP reach and compliance depth, but not marketed around lineage.
          tone: neutral
        - label: Mimecast Incydr
          x: 6
          'y': 7
          detail: Strong insider-risk response workflow for cloud-first teams, but narrower broad-suite reach.
          tone: neutral
        - label: Nightfall AI
          x: 8
          'y': 5
          detail: Modern SaaS, browser, endpoint, and AI-app coverage with public pricing, but less incumbent pull.
          tone: positive
        - label: Symantec DLP
          x: 4
          'y': 8
          detail: Still benefits from legacy enterprise presence, though current public differentiation is weaker.
          tone: warning
    approximationNotes: >-
      Ordinal scores synthesize the retained public evidence rather than source-backed numeric market-share data. They
      rank positioning relative to Cyberhaven's core buying criteria: context depth and distribution reach.
    claimRefs:
