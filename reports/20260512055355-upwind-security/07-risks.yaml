  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: risks-private-metrics
      missingEvidence: ARR, net retention, gross margin, and cohort expansion by customer size.
      whyItMatters: The missing private evidence determines whether public traction signals translate into underwritable economics.
      diligencePath: >-
        Request management data-room schedules, customer references, and contract-level support before investment
        committee.
    - type: missing-source
      severity: minor
      topic: risks-source-depth
      missingEvidence: Independent customer interviews and audited operating metrics are not public.
      whyItMatters: Independent proof would reduce reliance on company-controlled materials and financing headlines.
      diligencePath: Run expert calls, customer calls, and cohort analysis after NDA access.
