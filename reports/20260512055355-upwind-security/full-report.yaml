  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Evidence base and thesis relevance
        blocks:
          - type: paragraph
            body: >-
              Upwind Security company overview diligence is evidence-constrained but actionable because the public
              record contains a mix of official materials, third-party coverage, market context, and risk sources. The
              section emphasizes what can be verified from retained sources and separates it from information that
              should be requested in a data room. For Upwind Security, the most important analytical stance is that
              public evidence can establish category participation, recent financing context, product direction, and
              some customer or partner signals, but it cannot by itself prove repeatable economics. This matters for
              investment work because a private unicorn round can validate external demand while still leaving material
              uncertainty about retention, margin, sales efficiency, and implementation quality. The specific unresolved
              diligence path for this section is: ARR, net retention, gross margin, and cohort expansion by customer
              size. Until that evidence is reviewed, the report treats strong public claims as directional signals
              rather than final underwriting proof. The 2026 freshness check also keeps volatile facts separate from
              older background material.
