companyProfile:
  summary: >-
    Upwind Security is a San Francisco, California, USA / Tel Aviv, Israel-anchored private company in Cybersecurity /
    cloud-native application protection. Upwind sells a runtime cloud security platform that combines workload,
    identity, network, Kubernetes, and vulnerability context to prioritize exploitable cloud risk. The report treats the
    latest unicorn-confirming financing as credible screening evidence while requiring private operating materials
    before final underwriting.
