            body: >-
              Upwind Security 的公司概况尽调受证据约束，但仍足以推进判断：公开记录里同时有官方材料、第三方报道、 市场背景和风险来源。本节只写已留存来源能够验证的内容，并把需要向数据室索取的信息单列出来。 对
              Upwind Security，核心分析立场是：公开证据可以确认它参与的赛道、近期融资背景、产品方向， 以及部分客户或合作伙伴信号，但不能单独证明经营经济性可重复。独角兽私募轮可以验证外部需求，
              但留存、毛利率、销售效率和实施质量仍有重大不确定性，这正是投资工作需要补证据的原因。 本节仍待核验的尽调路径是：年经常性收入（ARR）、净留存率、毛利率，以及按客户规模拆分的队列扩张。
              在上述证据拿到前，报告把强公开主张视为方向性信号，而不是最终投资判断证据。2026 年时效性检查 也把易变事实与更早的背景材料拆开。
