companyProfile:
  summary: >-
    Upwind Security 是一家以 San Francisco, California, USA / Tel Aviv, Israel 为双中心的网络安全 / 云原生应用保护私营公司。Upwind
    销售运行时云安全平台，把工作负载、身份、网络、Kubernetes 和漏洞上下文拼在一起，用来优先处理可被利用的云风险。本报告把最近一轮确认独角兽身份的融资视为可信的初筛证据；最终投资判断前，仍需要非公开经营材料。
  foundedDate: '2022-01-01'
  founders:
    - name: Amiram Shachar
      role: 联合创始人兼 CEO
      background: 与 Spot.io 和云运营相关的云基础设施创业者。
      claimRefs:
        - CO001
    - name: Yoni Leitersdorf
      role: 联合创始人
      background: 与 Upwind 领导团队相关的云安全和基础设施运营者。
      claimRefs:
        - CO001
  foundingLocation: Israel / United States
  headquarters: San Francisco, California, USA / Tel Aviv, Israel
  productSummary: Upwind 销售运行时云安全平台，把工作负载、身份、网络、Kubernetes 和漏洞上下文拼在一起，用来优先处理可被利用的云风险。
  customerFocus: 以云为先的企业、安全团队、DevSecOps 团队，以及运行 Kubernetes 和多云工作负载的平台团队。
  businessModel: 企业 SaaS 网络安全订阅，围绕云运行时、态势、漏洞和身份模块做平台扩张。
  stage: Series B private unicorn
  fundingStatus: 2026 年 1 月宣布 $250M Series B 轮，估值 $1.5B；据报道累计融资约 $430M。
