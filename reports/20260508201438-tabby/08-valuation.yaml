  evidenceGaps:
    - id: gv001
      topic: comparable valuation completeness
      gapType: enumeration-incomplete
      severity: material
      description: >-
        Comparable set is limited to publicly disclosed BNPL transactions and estimates;
        Tamara valuation is estimated, not confirmed. MENA-specific BNPL M&A transactions
        are few and lack public financial detail, limiting comparability. Zip/Spotii acquisition
        financials are not publicly broken out by region. Regional operator MDR rates and
        credit economics are not disclosed, preventing unit-economics comparability.
      relatedQuestionRefs:
        - QV020
      relatedTableRefs:
        - TV004
      relatedClaimRefs:
        - CV021
        - CV033

    - id: gv002
      topic: audited consolidated financial statements not publicly available
      gapType: private-evidence-only
      severity: material
      description: >-
        Tabby has not filed or published audited consolidated financial statements covering
        all group entities (KSA, UAE, Kuwait, Tweeq). The publicly available profitability
        metrics (KSA net profit ~$55M, H1 2025 SAR 90.4M) are disclosed only at the KSA
        entity level via media reports, not as audited group accounts. Group-level profitability
        may differ materially if UAE or Kuwait operations are loss-making. Without audited
        accounts, provisioning methodology, inter-company transactions, and group cash position
        cannot be independently assessed.
      relatedQuestionRefs:
        - QV012
      relatedTableRefs:
        - TV006
      relatedClaimRefs:
        - CV027
        - CV008

    - id: gv003
      topic: cohort retention NRR and credit loss rate not publicly disclosed
      gapType: private-evidence-only
      severity: material
      description: >-
        Tabby's cohort retention curves, net revenue retention (NRR), customer lifetime value,
        and credit loss rate across the BNPL receivables portfolio are not available from public
        sources. These are among the most critical inputs for valuation modelling of a BNPL
        operator. A 1% increase in net credit loss rate across $10B+ GMV would eliminate
        approximately $100M in profit, potentially reversing reported profitability entirely.
        Without NRR data, revenue sustainability assumptions in all three scenarios are
        unverifiable from public evidence.
      relatedQuestionRefs:
        - QV013
        - QV014
      relatedTableRefs:
        - TV006
      relatedClaimRefs:
        - CV028
        - CV029

    - id: gv004
      topic: IPO prospectus cap table and preference stack not yet filed
      gapType: missing-source
      severity: material
      description: >-
        No Saudi CMA prospectus filing or preliminary draft has been publicly disclosed as of
        May 2026. Cap table, preference share classes, liquidation preferences, and investor
        rights agreements governing IPO proceeds distribution are not publicly available. Without
        these inputs, modelling investor returns at different IPO price scenarios is impossible.
        The preference stack is particularly important given the multi-round funding history
        and JPMorgan debt facility covenants that may contain IPO lock-up or conversion
        provisions.
      relatedQuestionRefs:
        - QV030
        - QV031
      relatedTableRefs:
        - TV006
      relatedClaimRefs:
        - CV030

