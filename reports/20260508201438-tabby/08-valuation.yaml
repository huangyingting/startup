chapter:
  number: 8
  title: Valuation
  summary: >-
    Tabby's February 2025 Series E at $3.3B and April 2025 secondary at ~$4.5B implied valuation establish the current market price. At ~12-17x 2025 estimated KSA revenue ($378M), the valuation is elevated versus global BNPL peers but justified by MENA-first positioning, dual profitable years, $10B+ GMV, and a clear Saudi Tadawul IPO pathway. The base case targets a 2026-2027 IPO at $4.5-6B valuation on 15-18x forward revenue; the bull case reaches $6-8B on accelerated wallet revenue and UAE expansion; the bear case falls to $2.5-3.5B if SAMA regulatory tightening stalls growth. Recommendation: Track / Research More — valuation is priced for near-perfect execution; entry at current levels requires IPO liquidity clarity.

sections:
  - id: section-1
    title: Investment Thesis and Anti-Thesis
    body: >-
      Tabby's investment thesis rests on four structural pillars. First, MENA-first BNPL leadership:
      Tabby holds an estimated 60% KSA BNPL market share by company claims, with 15 million registered
      users, over 40,000 merchant partners, and $10B+ annualised GMV. This network scale creates
      durable switching costs for both consumers and merchants that new entrants struggle to replicate.
      Second, dual-year profitability de-risks the pre-IPO profile significantly versus global BNPL
      peers such as Klarna and Affirm, which remained loss-making through their growth phases. Tabby
      reported a KSA net profit of approximately $55M in 2025, with H1 2025 KSA net profit growing
      360% year-over-year to SAR 90.4 million. Third, Tweeq wallet acquisition in September 2024
      unlocks the full neobank revenue stack — interchange income on Tabby Card transactions, savings
      products, and eventually embedded lending — providing a material upside driver beyond merchant
      discount rate income. Fourth, the Saudi Tadawul IPO pathway with JPMorgan, HSBC, and Morgan
      Stanley engaged as banks provides a credible liquidity event for existing investors within a
      12-24 month horizon.
      The anti-thesis centres on four structural concerns. Valuation at $4.5B secondary implies
      approximately 12-17x 2025 estimated KSA revenue of $378M — materially elevated versus global
      BNPL peers including Klarna at approximately 5.4x revenue at IPO preparation stage. SAMA
      regulatory tightening represents existential risk: new credit limit caps or capital adequacy
      requirements could constrain GMV growth or mandate expensive equity raises at lower valuations.
      Credit loss rates, net revenue retention, and cohort data are not publicly disclosed, creating
      material information asymmetry that prevents independent verification of profitability claims.
      Finally, revenue multiple compression risk is real — Klarna's European MDR compression from
      3-4% to under 2% as competition intensified provides a cautionary precedent for the MENA market
      over a 24-36 month horizon as Tamara and global entrants scale.
