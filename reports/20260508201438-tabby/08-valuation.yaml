  - id: section-5
    title: Comparable Set Analysis
    body: >-
      Tabby's comparable set spans global BNPL peers, MENA regional operators, and relevant M&A
      transactions. Klarna is the closest structural comparable — a profitable BNPL operator
      preparing for a 2025 IPO with estimated $15B valuation on 2024 revenue of $2.8B, implying
      approximately 5.4x revenue. Klarna's profitable scale and European market dominance provide
      the most direct parallel, though the maturity difference is material: Klarna operates at
      nearly 7x Tabby's scale. Tabby's 12-17x revenue multiple represents a significant premium
      to Klarna's 5.4x — justified in part by MENA's higher growth trajectory and Tabby's
      smaller base, but requiring significant execution to sustain through IPO.
      Afterpay, acquired by Block (formerly Square) in 2022 for approximately $29B, provides a
      useful M&A ceiling benchmark but was executed at the peak of the BNPL cycle when growth
      was paramount and interest rates were near zero — conditions that do not replicate today.
      Tamara, the nearest direct MENA competitor operating under SAMA licence in KSA, is privately
      valued at approximately $1B based on Series C estimates — representing less than one-quarter
      of Tabby's implied valuation. This relative premium reflects Tabby's first-mover advantage,
      user scale, and profitability. Zip, the ASX-listed BNPL company that acquired Spotii for MENA
      market entry, provides a cautionary precedent: its market capitalisation of approximately
      $500M AUD illustrates how BNPL operators struggle to sustain premium multiples in public
      markets without clear profitability. The comparables analysis supports Tabby's premium over
      regional peers but shows material compression risk versus global BNPL multiples at IPO.
    claimRefs:
      - CV012
      - CV013
      - CV021
      - CV022
      - CV033
      - CV037

  - id: section-6
    title: Exit Readiness and Final Diligence Asks
    body: >-
      Tabby's IPO readiness is materially advanced relative to most pre-IPO growth companies.
      Two consecutive profitable years in KSA (2024 and 2025), SAMA licence compliance maintained
      since July 2022, UAE CBUAE SVF licence obtained in April 2026, and engagement of JPMorgan,
      HSBC, and Morgan Stanley as IPO banks collectively signal a company in active pre-IPO
      preparation. The Saudi Tadawul listing target aligns with Saudi Vision 2030 objectives and
      provides a domestic investor base that understands Tabby's regulatory context — a structural
      advantage over cross-border listings.
      However, six material diligence items remain outstanding that are necessary before a conviction
      investment decision. Audited consolidated financial statements covering KSA, UAE, Kuwait, and
      Tweeq entities would confirm group-level profitability versus the KSA-only disclosed metrics.
      Cohort retention and NRR data would validate the sustainability of customer economics and
      repeat purchase rates. IPO prospectus terms would clarify post-IPO dilution, preference share
      conversion, and the distribution of IPO proceeds to existing holders. Cap table and preference
      stack details are necessary to model investor returns under different IPO price scenarios.
      Credit loss provisioning rate disclosed in audited accounts would enable independent
      verification of whether the reported $55M net profit reflects conservative or aggressive
      provisioning. Finally, SAMA licence renewal conditions and terms must be confirmed directly
      to assess the single highest-severity regulatory risk to the IPO timeline. Absent these
      items, Track / Research More remains the appropriate posture — the company is monitoring-worthy
      but requires materially more evidence before investment commitment at current valuation levels.
    claimRefs:
      - CV004
      - CV010
      - CV011
