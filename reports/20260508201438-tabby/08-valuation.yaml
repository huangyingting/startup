  - id: section-4
    title: Bull / Base / Bear Scenarios
    body: >-
      Three valuation scenarios bracket the return range from the $4.5B secondary mark. The bull
      case assumes a 2026-2027 IPO at approximately 20x forward revenue on a 2026 estimated revenue
      base of $600M, implying a $6B-$8B IPO valuation. This scenario requires Tweeq wallet monthly
      active users exceeding 2 million within 12 months, UAE expansion contributing materially to
      group revenue, and a benign SAMA regulatory environment. The return logic is 33-78% upside
      from the $4.5B secondary mark on a 3-4 year hold, contingent on public market re-rating from
      private BNPL multiple to a diversified fintech multiple as wallet revenue contribution grows.
      Probability signal is low-to-medium: achievable but requires simultaneous execution of multiple
      strategic initiatives.
      The base case targets a 2027 IPO at approximately 15x forward revenue on 2027 estimated revenue
      of $520M, implying $4.5B-$6B valuation. This scenario assumes KSA-dominant growth continues
      at current trajectory with moderate UAE contribution, no material SAMA tightening, and Tweeq
      wallet contributing modestly. The return logic is 0-33% upside from $4.5B on a 2-3 year
      horizon — flat to modest gain unless the public market awards a premium multiple at IPO.
      Probability signal is medium, consistent with current trajectory if execution holds.
      The bear case assumes SAMA tightening caps credit limits, IPO is delayed beyond 2027, and
      competitor fee pressure from Tamara squeezes merchant margins, holding 2026 revenue at $350M.
      At 8-10x depressed multiples, valuation falls to $2.5B-$3.5B — representing 22-44% loss from
      current secondary mark, potentially triggering a down-round if IPO is deferred beyond 2028.
      Probability signal is low-to-medium: non-trivial tail risk given SAMA regulatory uncertainty.
    claimRefs:
      - CV023
      - CV024
      - CV025
      - CV006
      - CV007
      - CV022
