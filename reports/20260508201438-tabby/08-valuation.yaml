  - id: section-3
    title: Financing Context and Valuation History
    body: >-
      Tabby's financing history traces a disciplined escalation from seed capital through five
      institutional rounds to a secondary market valuation of $4.5B. The Series A (2021, approximately
      $50M raised) established the initial BNPL product in KSA. Series B (2022) brought the company
      to unicorn proximity. Series C followed, establishing merchant network scale. The landmark
      Series D closed in November 2023 at $1.5B valuation with $200M raised from Wellington,
      STV, Mubadala, PayPal Ventures, and Hassana — a consortium that anchors Tabby's institutional
      credibility. Concurrent with the Series D, JPMorgan arranged a $700M receivables securitisation
      facility in December 2023, dramatically expanding Tabby's GMV capacity without additional
      equity dilution. This facility is the working capital engine for the entire BNPL receivables
      book and represents the highest single counterparty dependency in the capital structure.
      The Series E in February 2025 raised $160M at $3.3B valuation — a 2.2x step-up from Series D
      — led by returning investors and signalling sustained institutional demand. The secondary market
      transaction in April 2025 implied a $4.5B valuation, representing a further 36% step-up in
      just eight months and suggesting strong demand from secondary buyers anticipating an IPO
      re-rating. JPMorgan, HSBC, and Morgan Stanley have been engaged as IPO banks, with Tabby
      targeting the Saudi Tadawul as the primary listing venue. The IPO window is most commonly
      cited as 2026-2027 by analyst and news sources, though no formal filing has occurred. The
      total equity raised across all rounds exceeds $650M, and the JPMorgan debt facility brings
      total financing accessed to approximately $1.35B — providing substantial runway and GMV
      capacity through the IPO process.
