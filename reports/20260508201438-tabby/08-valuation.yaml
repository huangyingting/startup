  - id: section-2
    title: Recommendation and Confidence
    body: >-
      The recommendation for Tabby at its current $4.5B secondary implied valuation is Track /
      Research More, with medium confidence and a high risk rating. The valuation stance is Stretched.
      This recommendation reflects a well-constructed company with demonstrable profitability and a
      credible IPO path, but priced for near-perfect execution at a multiple that leaves limited
      margin of safety. At 12-17x 2025 estimated KSA revenue, Tabby is priced substantially above
      comparable global BNPL peers at IPO readiness stages — Klarna prepared its IPO at approximately
      5.4x revenue — and any material adverse development in credit losses, regulatory conditions,
      or IPO market timing could produce a significant markdown.
      The medium confidence reflects the strong public evidence base for Tabby's profitability and
      growth trajectory but acknowledges three material information gaps that prevent a high-conviction
      buy: (1) no publicly available audited consolidated financial statements covering all group
      entities including UAE, Kuwait, and Tweeq; (2) no disclosed cohort retention, net revenue
      retention, or customer lifetime value data; (3) no IPO prospectus, preference stack details,
      or Saudi CMA filing that would clarify post-IPO dilution and investor returns. A conviction
      buy requires at minimum: audited consolidated P&L confirming group-level profitability, cohort
      data supporting NRR above 110%, confirmation that SAMA licence renewal is on track, and IPO
      prospectus disclosure that enables preference stack analysis.
