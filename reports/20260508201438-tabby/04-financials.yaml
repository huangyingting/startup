    - id: CI001
      statement: >-
        Tabby's primary revenue source is the merchant discount rate (MDR), charged to retailers as a percentage
        of each transaction value in exchange for offering interest-free BNPL and absorbing consumer credit risk.
      type: company-claimed
      topic: primary revenue model
      sourceRefs:
        - SI001
        - SI008
      confidence: high
      freshness: current
    - id: CI002
      statement: >-
        Tabby's secondary revenue streams include Tabby Plus consumer subscription (SAR 19/month), Tabby Card
        interchange fees, Tabby Shop affiliate revenue, and Tabby Care buyer protection merchant fees.
      type: company-claimed
      topic: secondary revenue streams
      sourceRefs:
        - SI002
        - SI009
      confidence: medium
      freshness: current
    - id: CI003
      statement: >-
        Consumer BNPL fees at Tabby are zero for on-time payments; no interest is charged, and the merchant
        absorbs the cost through MDR — a structural feature of the merchant-funded BNPL model.
      type: company-claimed
      topic: consumer pricing model
      sourceRefs:
        - SI009
        - SI008
      confidence: high
      freshness: current
    - id: CI004
      statement: >-
        Tabby's MDR rates are not publicly disclosed; global BNPL peers charge 1–6% depending on category and
        merchant size, suggesting Tabby's implied take rate of approximately 3.8% is within the industry norm.
      type: estimated
      topic: MDR estimate
      sourceRefs:
        - SI010
        - SI011
      confidence: low
      freshness: unknown
    - id: CI005
      statement: >-
        The revenue recognition methodology for BNPL platforms is a material accounting policy — whether Tabby
        recognizes MDR gross or net, and how credit loss provisions are timed, affects the comparability of its
        revenue to BNPL peers.
      type: inferred
      topic: revenue recognition methodology risk
      sourceRefs:
        - SI010
        - SI012
      confidence: medium
      freshness: current
    - id: CI006
      statement: >-
