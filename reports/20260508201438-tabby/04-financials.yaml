callouts:
  - calloutType: strength
    title: KSA profitability at $55M net profit demonstrates BNPL unit economics can work at scale in MENA
    body: >-
      Tabby's reported $55M net profit in Saudi Arabia for 2025 (14.5% net margin on $378M revenue) is the
      first credible evidence that a MENA BNPL operator can achieve meaningful profitability in its core market.
      This de-risks the IPO thesis and validates the MDR-funded consumer credit model. However, this is company-
      claimed data requiring audit confirmation before it can be fully relied upon by external investors.
    claimRefs:
      - CI008
      - CI009
      - CI010
  - calloutType: risk
    title: $700M JPMorgan debt facility creates counterparty concentration and covenant risk
    body: >-
      Tabby's business model depends critically on the JPMorgan securitization facility to recycle receivables
      capital and fund GMV growth. A single $700M facility from one counterparty creates concentration risk.
      If JPMorgan reduces availability, imposes restrictive covenants triggered by credit deterioration, or does
      not renew the facility, Tabby's GMV capacity could be severely constrained. The facility terms and covenants
      are not publicly disclosed, making this the most material undisclosed financial risk.
    claimRefs:
      - CI016
      - CI017
      - CI018
  - calloutType: risk
    title: Absence of audited group-level financials is the primary diligence blocker for pre-IPO investors
    body: >-
      All financial figures in this chapter originate from company-claimed press releases or news reporting of
      those claims. No audited consolidated accounts covering all geographies and entities (KSA + UAE + Kuwait +
      Tweeq) have been publicly disclosed. The KSA-only profitability metric may not reflect the group position
      if UAE or Kuwait operations are loss-making. Investors transacting at the $4.5B secondary valuation are
      accepting significant financial information risk that should be priced into any pre-IPO discount requirement.
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
  - calloutType: insight
    title: Series E revenue multiple of 8.7x KSA 2025 revenue prices in the super-app expansion successfully
    body: >-
      At $3.3B Series E valuation on $378M KSA 2025 revenue, the implied multiple is 8.7x trailing revenue.
      This is a high multiple for a MENA regional BNPL operator and implies investors believe Tabby will either:
      (1) expand revenue significantly via UAE and Kuwait, (2) successfully monetize Tabby Card, Tabby Plus, and
      Tabby Shop at margins above pure MDR, or (3) achieve an IPO premium that justifies the entry multiple.
      If KSA revenue growth decelerates below 30%, the valuation would be difficult to sustain.
    claimRefs:
      - CI019
      - CI020
      - CI021
