      topic: Saudi Arabia market size
      sourceRefs:
        - SM005
        - SM025
      confidence: medium
      freshness: recent
    - id: CM009
      statement: >-
        Saudi Arabia BNPL payments are projected to grow to approximately $2.7 billion by 2028 at approximately
        13 percent annual growth rate, according to Research and Markets.
