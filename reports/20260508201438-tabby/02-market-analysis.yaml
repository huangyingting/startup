  evidenceGaps:
    - type: missing-source
      severity: material
      topic: MENA BNPL market share by competitor
      missingEvidence: >-
        No retained public source provides market share data disaggregated by BNPL operator (Tabby vs Tamara vs
        Postpay vs Cashew) by GMV or user count. This is the most critical market analysis gap.
      whyItMatters: >-
        Without market share data, it is impossible to assess whether Tabby is genuinely dominant or faces
        material competitive erosion. Investor valuation models depend critically on assumed market position.
      diligencePath: >-
        Request proprietary market share data from Tabby; cross-check with Tamara investor materials if accessible;
        commission MENA fintech market study from Bain, McKinsey, or RedSeer.
      relatedTableRefs:
        - TM002
      relatedQuestionRefs:
        - QM022
        - QM004
    - type: conflicting-data
      severity: material
      topic: GMV vs analyst BNPL market sizing reconciliation
      missingEvidence: >-
        Tabby's $10B+ GMV claim and Research and Markets' $1.4B Saudi Arabia BNPL estimate for 2023 cannot
        be reconciled from retained sources. The definitions may differ fundamentally.
      whyItMatters: >-
        If Tabby's GMV includes non-BNPL payments or uses a different accounting boundary, the apparent 7x
        difference from analyst data would indicate market share close to 100%, which is implausible.
      diligencePath: >-
        Request Tabby's internal GMV definition and breakdown by product (BNPL vs card vs wallet); compare
        to Research and Markets methodology to reconcile.
