  claims:
    - id: CM001
      statement: >-
        Tabby's core market is merchant-funded, interest-free BNPL at digital or POS checkout, where the merchant
        pays a discount rate to offer installment payments to consumers.
      type: company-claimed
      topic: market definition
      sourceRefs:
        - SM001
        - SM006
      confidence: high
      freshness: current
    - id: CM002
      statement: >-
        The primary status-quo substitutes for BNPL in Saudi Arabia include cash on delivery, debit card purchases,
        and informal social credit (family lending), as formal credit cards have lower penetration than in developed markets.
      type: inferred
      topic: market substitutes
      sourceRefs:
        - SM005
        - SM019
      confidence: medium
      freshness: current
    - id: CM003
      statement: >-
        Excluded from Tabby's primary BNPL market definition are traditional revolving credit cards, personal loans,
        consumer-interest BNPL, and bank-issued deferred debit products.
      type: inferred
      topic: market boundary
      sourceRefs:
        - SM001
        - SM013
      confidence: medium
      freshness: current
    - id: CM004
      statement: >-
        Interest-free BNPL is structurally compatible with Islamic finance principles, removing a barrier that has
        historically suppressed credit card adoption in observant Muslim consumer segments in MENA.
      type: inferred
      topic: Islamic finance compatibility
      sourceRefs:
        - SM005
        - SM019
      confidence: medium
      freshness: current
    - id: CM005
      statement: >-
        Adjacent markets to BNPL that are relevant to Tabby's expansion include digital wallets, subscription
        financial services, consumer rewards, and product discovery commerce.
      type: inferred
      topic: market adjacencies
      sourceRefs:
        - SM003
        - SM007
        - SM016
      confidence: medium
      freshness: current
    - id: CM006
      statement: >-
        Klarna, Afterpay/Block, and Paidy are global BNPL peers that are not currently active in MENA at scale but
        represent potential market entrants in a longer-term competitive landscape.
      type: inferred
      topic: global competitive substitutes
      sourceRefs:
        - SM005
        - SM021
      confidence: medium
      freshness: current
    - id: CM007
      statement: >-
        The global BNPL market is projected to reach $1 trillion by 2028 at approximately 45 percent compound
        annual growth rate, according to Research and Markets.
      type: third-party-reported
      topic: global market size
      sourceRefs:
        - SM005
        - SM025
      confidence: medium
      freshness: recent
    - id: CM008
      statement: >-
        Saudi Arabia BNPL payments were approximately $1.4 billion in 2023, according to Research and Markets
        as cited in AGBI's September 2024 reporting.
