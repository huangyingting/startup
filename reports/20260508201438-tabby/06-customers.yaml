acknowledgedWarnings:
  - dimension: duplicateAnalysis
    reason: >-
      Tables and figures serve complementary roles. Tables preserve row-level evidence; figures compress domains into architecture, flow, and maturity views for faster reading.
chapter:
  number: 6
  title: Customers
  summary: >-
    Tabby serves over 15 million registered users and 40,000+ merchant partners across Saudi Arabia, UAE, and Kuwait, with 80%+ of users concentrated in KSA. The consumer base is predominantly millennial and Gen Z shoppers seeking interest-free instalment credit; the merchant base spans fashion, electronics, home, travel, and grocery. Named merchant proof includes Amazon, SHEIN, Adidas, IKEA, H&M, Samsung, Noon, Al Futtaim Group, Landmark Group, Apparel Group, and Chalhoub Group. Profitability achieved in 2 consecutive years and a 360% YoY growth in H1 2025 KSA net profit signal strong retention and unit economics despite limited public cohort disclosure.

