callouts:
  - title: 40K+ Merchant Network Creates Two-Sided Discovery Flywheel
    body: >-
      Tabby's 40,000+ merchant network — spanning Amazon, SHEIN, IKEA, Samsung, Noon, and major GCC
      retail conglomerates — creates a discovery flywheel that compounds with scale. Consumers join
      Tabby because their preferred merchants accept it; merchants join because Tabby's 15M+ consumer
      base is a ready-made acquisition channel. Tabby Shop — the in-app merchant discovery surface
      claiming 20M+ shoppers — transforms the BNPL payment app into a commerce destination, driving
      habitual engagement and repeat visits independent of immediate purchase intent. This network
      architecture makes Tabby simultaneously a payment infrastructure, a consumer acquisition tool
      for merchants, and an advertising/discovery platform — three revenue vectors from one user base.
    calloutType: strength
    claimRefs: [CU001, CU002, CU012, CU020, CU026]

  - title: Two Consecutive Profitable Years with 360% H1 2025 Net Profit Growth
    body: >-
      Tabby's achievement of profitability in two consecutive years, punctuated by a 360% year-on-year
      increase in KSA net profit for H1 2025 (SAR 90.4M), is among the most differentiated financial
      signals in the MENA fintech cohort. Most BNPL competitors at comparable scale are still burning
      capital. Profitability at this trajectory signals not just breakeven efficiency but accelerating
      operating leverage — fixed costs being absorbed across a growing revenue base, with marginal
      contribution exceeding marginal cost at increasing rates. This financial profile substantially
      de-risks the IPO narrative and creates a credible pathway to public market listing.
    calloutType: strength
    claimRefs: [CU007, CU009, CU005, CU006]

  - title: Risk — Top-Merchant GMV Concentration Unknown and Unquantifiable from Public Data
    body: >-
      Tabby does not disclose the GMV contribution of its top-10 or top-25 merchant partners. Given
      that Amazon, Noon, and the major retail conglomerates (Al Futtaim, Landmark, Apparel Group)
      collectively span the highest-volume BNPL retail categories, it is structurally plausible that
      a handful of relationships account for 30-50%+ of total platform GMV. Loss of one top merchant
      — through competitive displacement, in-house BNPL development, or relationship deterioration —
      could materially impact revenue. This concentration risk cannot be sized without direct data
      room access to merchant GMV distribution and contract terms.
    calloutType: risk
    claimRefs: [CU002, CU018, CU020, CU026]

  - title: Risk — Consumer Cohort and Retention Data Not Publicly Disclosed
    body: >-
      Tabby's core retention metrics — consumer cohort retention, monthly active user rates, NRR for
      merchants, and subscriber churn for Tabby Plus — are not publicly disclosed. Investors and
      acquirers cannot independently assess whether the 15M registered user base represents a durable,
      engaged cohort or a largely dormant historical count. The proxy indicators (profitability, app
      rating) are consistent with healthy retention but cannot substitute for cohort-level evidence.
      This represents the primary diligence gap requiring direct management engagement and data room
      access before any investment or acquisition decision.
    calloutType: risk
    claimRefs: [CU035, CU036, CU008, CU009]

  - title: Insight — Tweeq Wallet Acquisition Positions Tabby for Full Neobank Play
    body: >-
      The September 2024 acquisition of Tweeq — combined with the April 2026 UAE SVF licence — is
      the strategic move that differentiates Tabby from every other MENA BNPL competitor. By stacking
      a SAMA EMI licence (via Tweeq) onto its existing SAMA BNPL permit, plus the UAE CBUAE SVF licence,
      Tabby has built a regulatory stack that enables stored-value wallets, P2P transfers, and salary
      deposits — the core capabilities of a primary financial account. No other MENA BNPL player has
      assembled an equivalent regulatory stack. If Tabby successfully integrates Tweeq and launches
      the full wallet experience, it transforms from a checkout payment tool into a financial super-app
      for the GCC — a market segment with no established winner and a multi-billion dollar TAM.
    calloutType: insight
    claimRefs: [CU013, CU016, CU017]
