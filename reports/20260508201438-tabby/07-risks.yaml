chapter:
  number: 7
  title: Risks
  summary: >-
    Tabby operates under SAMA BNPL permit since July 2022 but faces evolving regional regulation across KSA, UAE, and Kuwait as central banks tighten oversight of BNPL credit providers. Key risks include regulatory tightening (credit limits, disclosure rules, licence extensions), credit loss exposure from $700M JPMorgan receivables facility, operational dependency on payment networks and cloud infrastructure, IPO execution risk on Saudi Tadawul, and Hosam Arab key-person dependency. Profitability achieved two consecutive years provides substantial buffer, but rising competition from Tamara and global BNPL players compresses merchant fee economics.
sections:
  - id: section-1
    title: Risk Overview and Severity Ranking
    body: >-
      Tabby's risk profile spans six distinct domains: regulatory/legal, operational/security,
      partner/dependency, financial/model, people/execution, and competitive. Of these, regulatory
      tightening presents the highest severity given that Tabby's SAMA BNPL permit underpins over 80
      percent of its user base in Saudi Arabia. Non-renewal or material condition changes to the permit
      would be existential for the KSA business and likely delay or derail the planned Tadawul IPO.
      IPO execution risk ranks as the second-highest priority: market window uncertainty, Saudi CMA
      prospectus requirements, and mandatory audited consolidated accounts represent substantive
      execution hurdles that could slip the timeline significantly. Third in severity is the $700M
      JPMorgan receivables securitization facility — a single counterparty providing the working
      capital engine for the entire BNPL receivables book. A covenant breach, credit deterioration
      event, or non-renewal of this facility would constrain GMV capacity and force expensive
      refinancing or equity dilution. Competitive risk from Tamara, the nearest Saudi BNPL rival, and
      global entrants such as Klarna compresses merchant fee economics and creates MDR deflation
      risk over a multi-year horizon. Operational risk — platform uptime, fraud, and data security
      — is rated medium-high given the 15M+ user PII exposure; however, the absence of any publicly
      documented major incident to date provides cautious comfort. People risk is concentrated in
      Hosam Arab, whose public profile, investor relationships, and operational leadership create
      meaningful key-person dependency, though the CTO/COO Daniil Barkalov provides partial mitigation
      through technical and operational depth. The two consecutive profitable years (KSA 2024 and 2025)
      materially reduce financial model risk, creating a cash buffer against regulatory or competitive
      shocks that would have been debilitating at an earlier funding stage.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
  - id: section-2
    title: Regulatory and Legal Risk
    body: >-
      Tabby's regulatory risk architecture is anchored by its SAMA BNPL permit issued in July 2022,
      which authorises buy now, pay later operations in the Kingdom of Saudi Arabia. This permit is
      subject to SAMA's ongoing supervision, and its renewal conditions — including capital adequacy
      thresholds, consumer protection requirements, and credit limit caps — are not publicly disclosed,
      creating a material diligence gap. Saudi Arabia's broader financial regulation landscape has been
      tightening: SAMA issued revised BNPL Service Providers Regulations that impose merchant and
      consumer-facing disclosure requirements and mandate transparent fee structures. Tabby's
      Shariah-compliant no-late-fees model provides a structural advantage under these rules but does
      not eliminate renewal risk if SAMA raises capital or operational requirements above Tabby's
      current position.
      In the UAE, the Central Bank of the UAE (CBUAE) granted Tabby a Stored Value Facility (SVF)
      licence in April 2026, enabling regulated payments operations. However, CBUAE's BNPL-specific
      supervisory framework for credit providers remains in evolution through 2025-2026, and new
      circulars could impose stricter credit exposure limits or disclosure obligations. Kuwait's
      Central Bank (CBK) is at an early stage of BNPL oversight, representing lower but still
      non-zero risk given Tabby's presence in that market.
      The Saudi Personal Data Protection Law (PDPL), which came into force in 2022 and entered
      enforcement phase in 2024, creates direct obligations for Tabby given its 15M+ consumer
      PII dataset spanning biometric identity verification, payment history, and device data. A PDPL
      enforcement action triggered by a data breach or inadequate data governance programme could
      result in material fines and reputational damage. Tweeq's EMI licence under SAMA adds a
      second regulatory track that must be maintained in parallel with the BNPL permit, doubling
      the compliance surface area. Consumer credit disclosure rules in KSA and UAE are tightening
      through 2025, and legal counsel review of Tabby's current consumer-facing documentation is
      a recommended diligence step. No public record of SAMA enforcement actions against Tabby
      has been identified in retained sources.
    claimRefs:
      - CR007
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR013
  - id: section-3
    title: Operational and Security Risk
    body: >-
      Tabby's operational risk profile is dominated by three vectors: platform availability, fraud
      and credit default management, and data security. As a high-throughput consumer fintech
      processing millions of BNPL transactions across three markets, any significant platform
      downtime during peak shopping periods — such as Ramadan or Saudi National Day — could result
      in material GMV loss and merchant relationship damage. Tabby does not publicly disclose its
      uptime SLA or incident history, creating an evidence gap for operational resilience assessment.
      Payment fraud is an endemic risk for BNPL operators globally. Unlike traditional card networks
      that share fraud liability with merchants and issuers, Tabby absorbs first-loss credit risk
      on unpaid instalments. The absence of public fraud rate disclosure prevents assessment of
      whether Tabby's machine-learning credit scoring effectively suppresses fraud at the rates
      achieved by more mature global peers such as Klarna or Affirm. Any spike in first-payment
      default fraud — a known BNPL attack vector in which fraudsters exploit the first instalment
      grace period — could significantly impair credit loss performance.
      The PII dataset of 15M+ registered consumers represents a high-value target for cybersecurity
      threats. Identity verification data, payment history, device fingerprints, and potentially
      biometric data collected during onboarding are all stored by Tabby. A material data breach
      would trigger PDPL notification obligations in Saudi Arabia and potential CBUAE requirements
      in UAE, with associated fine exposure and severe reputational damage. Tabby's payment
      processing infrastructure is dependent on Visa and Mastercard networks for the Tabby Card
      product and card-based merchant disbursements; network outages or fee schedule changes imposed
      by these networks would directly affect operational costs and the Tabby Card product economics.
      Merchant churn risk from competitors offering lower MDR pricing is a secondary operational
      risk that erodes the merchant network defensibility over time. Trustpilot reviews of Tabby
      surface consumer complaints primarily around payment dispute resolution timelines and
      merchant delivery issues incorrectly attributed to Tabby's payment system, indicating
      customer service operational gaps worth monitoring.
    claimRefs:
      - CR014
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
  - id: section-4
    title: Partner and Dependency Risk
    body: >-
      Tabby's most concentrated partner dependency is the $700M receivables securitization facility
      arranged by JPMorgan, first announced in December 2023 as part of the Series D extension.
      This facility is the primary working capital mechanism enabling Tabby to recycle its BNPL
      receivables book and fund GMV growth beyond what equity capital alone could support. The
      specific terms of the facility — interest rate, maturity date, advance rate, dilution covenants,
      performance triggers, and renewal conditions — have not been publicly disclosed. If JPMorgan
      were to reduce facility availability due to credit deterioration in Tabby's receivables
      portfolio, trigger covenants based on loss rates, or decline to renew at maturity, Tabby's
      GMV capacity would be severely constrained. The company would face a choice between raising
      expensive replacement financing or cutting GMV growth, either of which would impair the IPO
      thesis significantly.
      Visa and Mastercard network dependency is concentrated around the Tabby Card product, which
      is issued as a Visa debit card with embedded BNPL capability. Network downtime, fee schedule
      changes, or sanctions-related network restrictions affecting KSA or UAE could disrupt Tabby
      Card operations. The payment processing infrastructure for merchant disbursements also relies
      on card network rails, creating dual exposure. Cloud infrastructure dependency — most likely
      AWS or GCP — creates a business continuity risk if a regional cloud availability zone
      experiences an extended outage during peak transaction periods.
      SAMA approval dependency for new product launches and business model extensions represents
      a structural drag on innovation velocity. Tabby's ability to expand Tweeq wallet functionality,
      launch new credit products, or enter new verticals is gated by SAMA regulatory approval
      timelines that can extend for months. This dependency is compounded by the Tweeq EMI licence,
      which requires ongoing SAMA compliance and restricts certain wallet activities. KSA banking
      partners providing settlement services represent another dependency layer whose contractual
      terms and concentration are not publicly known.
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
  - id: section-5
    title: Financial and Model Risk
    body: >-
      Tabby's financial model risk centres on three structural vulnerabilities: credit loss
      provisioning opacity, merchant fee compression from competitive dynamics, and the revenue
      model impact of its Shariah-compliant no-late-fees structure. Credit loss provisioning
      practices for Tabby's BNPL receivables portfolio are not publicly disclosed. The company
      claims profitability for two consecutive years in KSA, but without audited consolidated
      accounts, it is impossible to verify whether loss provisions are conservatively or
      aggressively set. A 1% increase in net credit loss rate across a $10B+ annualised GMV
      portfolio could translate to $100M+ in additional provisioning — potentially eliminating
      the reported $55M KSA net profit entirely. The absence of vintage loss curves, 90-day
      delinquency data, and charge-off rates is the most critical financial diligence gap.
      Merchant fee compression is a structural long-term risk. Tabby's revenue is primarily
      driven by merchant discount rates (MDR) charged to retailers at checkout. As Tamara,
      Postpay, Cashew, and potential global entrants compete for the same merchant relationships,
      price competition could compress blended MDR rates over a 24-36 month horizon. Klarna's
      experience in European markets — where MDR rates have declined from 3-4% to under 2% as
      competition intensified — provides a concerning precedent for the MENA market.
      The no-late-fees model, while regulatory compliant and Shariah-friendly, removes a significant
      revenue lever that global BNPL competitors such as Afterpay and Zip have historically
      relied upon. Tabby's revenue ceiling is therefore purely a function of MDR and adjacent
      monetisation (Tabby Plus subscriptions, Tabby Card interchange, Tabby Shop affiliate fees).
      Pre-IPO burn rate and cash runway are not publicly disclosed; however, with $160M raised
      at Series E in February 2025, the company is expected to have adequate runway for an IPO
      filing within 12-18 months absent a significant credit loss event or regulatory disruption.
      Group-level revenue (KSA + UAE + Kuwait + Tweeq) has not been publicly disclosed; the $378M
      KSA 2025 revenue figure may overstate group profitability if UAE or Kuwait operations are
      loss-making.
    claimRefs:
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
  - id: section-6
    title: People and Execution Risk
    body: >-
      Hosam Arab, co-founder and CEO, represents the highest key-person dependency in Tabby's
      leadership structure. Arab's track record from founding and selling Namshi, a leading MENA
      e-commerce platform, established Tabby's investor credibility and merchant trust network
      from launch. His public profile, media presence, and investor communication role make him
      the primary face of the company. No CEO succession plan or deputy CEO has been publicly
      disclosed, meaning that an unexpected departure — whether voluntary, health-related, or
      governance-driven — would create significant leadership uncertainty precisely at the most
      sensitive pre-IPO period. The Namshi analogy cuts both ways: Arab's successful exit from
      Namshi demonstrates execution discipline and founder liquidity appetite that could
      accelerate an IPO timeline for personal portfolio reasons.
      Daniil Barkalov, co-founder and CTO/COO, represents a secondary key-person concentration.
      As the architect of Tabby's core credit-scoring, payment processing, and platform
      infrastructure, Barkalov's departure would create technical leadership disruption that
      could slow product development and raise operational risk during the integration of
      Tweeq's infrastructure. The broader executive bench depth below the founding duo is
      not publicly disclosed, limiting assessment of succession quality.
      IPO execution risk is substantial and multidimensional. Saudi CMA requirements mandate
      full audited consolidated financial statements covering all operating entities, a process
      that may require 12-18 months of preparation if not already underway. Market timing risk
      is real: a deterioration in Saudi Tadawul market conditions, a regional geopolitical
      event, or a global BNPL sector de-rating (following Afterpay, Zip, or Paidy valuation
      corrections) could close the IPO window before Tabby files. The appointment of JPMorgan,
      HSBC, and Morgan Stanley as IPO advisers signals seriousness, but advisory mandates do
      not guarantee successful execution.
    claimRefs:
      - CR032
      - CR033
      - CR034
      - CR035
      - CR036
  - id: section-7
    title: Mitigations and Kill Criteria
    body: >-
      Tabby's strongest risk mitigation is its two-year profitability track record in Saudi Arabia,
      which provides a financial buffer against regulatory shocks, credit loss spikes, and
      competitive fee compression that would be debilitating for a pre-profitability operator.
      The $55M KSA net profit in 2025 gives the company real economic flexibility in the event
      of a regulatory capital requirement increase or a requirement to increase loss provisions.
      This profitability also strengthens the SAMA renewal argument: a profitable, compliant
      BNPL operator is a stronger candidate for permit renewal than a cash-burning one.
      The JPMorgan relationship itself is a mitigation signal: JPMorgan conducted significant
      credit diligence before committing $700M in receivables financing, effectively underwriting
      Tabby's credit loss model. The continued availability of this facility — now 18 months
      after initial close — suggests that loss rates are within acceptable covenant limits,
      though this cannot be confirmed without facility documentation.
      Tabby's diversified investor base — including Mubadala Capital (Abu Dhabi sovereign),
      Hassana Investment Company (Saudi pension), Wellington Management (institutional), and
      Blue Pool Capital — provides implicit governance stability and potential bridge capital
      sources if the IPO timeline slips. The Tweeq acquisition diversifies revenue beyond
      pure MDR into wallet services and payment infrastructure, partially mitigating the
      merchant fee compression risk over time.
      Kill criteria for investment thesis: (1) SAMA permit non-renewal or material adverse
      condition change; (2) JPMorgan facility covenant breach or non-renewal reducing advance
      rate below $400M; (3) credit loss rate exceeding 4% of receivables for two consecutive
      quarters; (4) IPO not filed within 24 months of Series E (by February 2027); (5) CEO
      departure without credible succession announcement; (6) material data breach triggering
      PDPL enforcement action. Any single kill criterion should trigger immediate position
      reassessment.
    claimRefs:
      - CR037
      - CR038
      - CR039
      - CR040
      - CR041
