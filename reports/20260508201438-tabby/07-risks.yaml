callouts:
  - calloutType: risk
    title: SAMA BNPL permit renewal is existential — non-renewal would halt KSA operations covering 80%+ of users
    body: >-
      Tabby's entire KSA business — the core of its $3.3B valuation, its profitability, and its IPO
      thesis — rests on the SAMA BNPL permit issued in July 2022. The renewal conditions, capital
      requirements, and credit limit parameters are not publicly disclosed. Any investor or acquirer
      must treat permit renewal diligence as the highest-priority regulatory item, requiring direct
      engagement with SAMA or Tabby's regulatory affairs team under NDA. A permit non-renewal or
      material adverse condition change would be thesis-breaking.
    claimRefs:
      - CR001
      - CR007
      - CR008
  - calloutType: risk
    title: JPMorgan $700M debt facility creates single-counterparty refinancing risk against the IPO timeline
    body: >-
      The $700M receivables securitization facility arranged by JPMorgan in December 2023 is the
      primary working capital mechanism enabling Tabby's GMV growth. With facility terms undisclosed,
      covenant thresholds unknown, and no alternative facility publicly announced, the refinancing
      risk is material. A credit loss deterioration that triggers covenant breach could constrain
      GMV capacity at exactly the moment Tabby needs strong growth momentum for a credible IPO
      filing. The interest cost on this facility (estimated $30-50M annually at market rates) is
      also a material drag against the $55M KSA net profit.
    claimRefs:
      - CR020
      - CR021
      - CR026
  - calloutType: risk
    title: IPO execution on Saudi Tadawul depends on market conditions, CMA approval, and audited consolidated accounts
    body: >-
      Tabby's planned Tadawul IPO faces three independent execution risks that must all resolve
      favourably: Saudi CMA prospectus requirements mandate full audited consolidated accounts
      (KSA + UAE + Kuwait + Tweeq); Saudi market conditions and BNPL sector sentiment must be
      supportive; and the advisory coordination between JPMorgan, HSBC, and Morgan Stanley must
      deliver a marketable prospectus. A delay in any of these tracks could push the IPO beyond
      the February 2027 Series E milestone window, requiring a bridge financing event. The global
      BNPL sector re-rating risk — illustrated by Afterpay, Zip, and Sezzle corrections in
      2022-2023 — remains a live concern for MENA BNPL valuations.
    claimRefs:
      - CR034
      - CR035
      - CR036
  - calloutType: strength
    title: Two consecutive profitable years provide a meaningful financial buffer against regulatory and competitive shocks
    body: >-
      Tabby's reported $55M net profit in KSA for 2025 (following profitability in 2024) represents
      a material risk buffer that distinguishes Tabby from most global BNPL operators at comparable
      growth stages. A profitable company can absorb a regulatory capital requirement increase,
      increase provisioning for credit losses, or sustain a period of MDR compression without
      requiring emergency equity financing. This profitability also strengthens Tabby's SAMA
      renewal position and IPO credibility, as the prospectus will be able to demonstrate
      demonstrated unit economics rather than a path-to-profitability narrative.
    claimRefs:
      - CR037
      - CR038
      - CR039
  - calloutType: insight
    title: Shariah-compliant no-late-fees model differentiates from global BNPL players but compresses the revenue ceiling
    body: >-
      Tabby's decision to operate without late fees aligns with Saudi Shariah finance principles and
      SAMA's consumer protection objectives, and differentiates the product from non-compliant
      global BNPL entrants. However, this structural choice also removes a significant revenue lever.
      Global BNPL operators have historically derived 10-30% of revenue from consumer late fees.
      Tabby's revenue ceiling is therefore a function of MDR rates and adjacent monetisation
      (Plus subscriptions, Card interchange, Shop affiliate). As competition compresses MDR, the
      absence of a late-fee safety valve means Tabby's margin resilience is more dependent on
      volume growth than that of fee-charging peers.
    claimRefs:
      - CR029
      - CR030
      - CR040
