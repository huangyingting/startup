callouts:
  - calloutType: strength
    title: Tabby's regulatory footprint is the widest of any MENA BNPL operator and is a durable moat
    body: >-
      Tabby holds SAMA BNPL permit, SAMA EMI licence (via Tweeq), and CBUAE SVF licence — the most comprehensive
      regulatory approvals of any MENA BNPL operator. Each licence takes 12–24 months to obtain and requires
      capital, compliance infrastructure, and ongoing regulatory relationship. Tamara holds SAMA BNPL only;
      no competitor holds all three licence types. This is the most durable component of Tabby's competitive moat.
    claimRefs:
      - CP021
      - CP022
      - CP004
  - calloutType: risk
    title: Tamara is a credibly funded competitor in Tabby's primary market and the moat is not yet proven wide
    body: >-
      Tamara has raised $210M+ and holds its own SAMA BNPL licence, making it the only competitor with genuine
      scale in Tabby's Saudi Arabia core market. Neither company discloses merchant overlap, consumer switching
      rate, or comparative GMV, making it impossible to determine from public sources whether Tabby's network
      advantage is widening or narrowing. The absence of this data is itself a diligence risk.
    claimRefs:
      - CP007
      - CP008
      - CP023
      - CP028
  - calloutType: insight
    title: Consumer switching cost is structurally low — the real battleground is merchant acquisition
    body: >-
      MENA BNPL consumers face near-zero switching costs: every app is installed in seconds, there is no
      monthly fee for basic BNPL, and consumer benefit depends on merchant coverage not operator preference.
      This means the competitive moat is won or lost at the merchant level: whichever operator achieves
      deeper merchant coverage will attract more consumer usage, which in turn attracts more merchants.
      Tabby's 40K+ merchant claim (if accurate) is therefore the most important data point for assessing moat
      durability — and independent verification of this figure is a priority diligence task.
    claimRefs:
      - CP019
      - CP020
      - CP024
      - CP025
