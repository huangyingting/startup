  claims:
    - id: CP001
      statement: >-
        Tabby's direct BNPL competitors in MENA include Tamara (Riyadh), Postpay (Dubai), Cashew (Dubai),
        and Spotii (Dubai, now absorbed into Zip Australia following 2021 acquisition).
      type: third-party-reported
      topic: competitor identification
      sourceRefs:
        - SP003
        - SP005
        - SP014
      confidence: high
      freshness: recent
    - id: CP002
      statement: >-
        Incumbent substitutes for BNPL in Saudi Arabia include bank credit card 0% installment plans offered
        by Al Rajhi Bank, Saudi National Bank, and Riyad Bank via Visa/Mastercard installment programs.
      type: inferred
      topic: incumbent substitutes
      sourceRefs:
        - SP015
        - SP016
      confidence: medium
      freshness: current
    - id: CP003
      statement: >-
        Global BNPL operators Klarna, Afterpay/Block, and Paidy are potential MENA market entrants but have
        not materially entered the region as of early 2026 due to regulatory barriers and market prioritisation.
      type: inferred
      topic: potential entrants
      sourceRefs:
        - SP012
        - SP014
      confidence: medium
      freshness: current
    - id: CP004
      statement: >-
        Tabby holds three regulatory licences — SAMA BNPL permit (July 2022), SAMA EMI (via Tweeq acquisition
        September 2024), and CBUAE SVF (April 2026) — representing the broadest regulatory coverage of any
        MENA BNPL operator.
      type: company-claimed
      topic: regulatory moat
      sourceRefs:
        - SP023
        - SP024
        - SP025
      confidence: high
      freshness: current
    - id: CP005
      statement: >-
        Regulatory complexity of the MENA BNPL market — requiring separate SAMA and CBUAE licences — creates
        a 12–24 month barrier to entry that slows competitive entry from global operators.
      type: inferred
      topic: regulatory entry barrier
      sourceRefs:
        - SP015
        - SP020
      confidence: medium
      freshness: current
    - id: CP006
      statement: >-
        Status-quo substitutes for BNPL in MENA include cash on delivery (still prevalent in KSA) and informal
        social credit; these compete for the same purchase occasions that BNPL targets.
      type: inferred
      topic: status-quo substitutes
      sourceRefs:
        - SP005
        - SP016
      confidence: medium
      freshness: current
    - id: CP007
      statement: >-
        Tamara, headquartered in Riyadh, raised a major Series B funding round (reported at $210M) from Coatue
        Management and Checkout.com, making it one of the best-funded Saudi fintech companies outside of Tabby.
      type: third-party-reported
      topic: Tamara competitor profile
      sourceRefs:
        - SP008
        - SP017
        - SP018
      confidence: medium
      freshness: recent
    - id: CP008
      statement: >-
        Tamara holds a SAMA BNPL licence and competes directly with Tabby for Saudi Arabia merchant integrations
        and consumer wallet share.
      type: third-party-reported
      topic: Tamara competitive threat
      sourceRefs:
        - SP013
        - SP008
      confidence: high
      freshness: current
    - id: CP009
      statement: >-
        Postpay is a UAE-based BNPL operator licensed by CBUAE with a product scope primarily covering Pay-in-4
        at UAE merchant checkouts; no confirmed KSA licence or significant Saudi operation was identified.
      type: third-party-reported
      topic: Postpay competitor profile
      sourceRefs:
        - SP009
        - SP014
      confidence: medium
      freshness: current
    - id: CP010
      statement: >-
        Cashew is a Dubai-headquartered BNPL operator with UAE and some Saudi presence, targeting fashion and
        lifestyle verticals; its funding and merchant network scale are well below Tabby or Tamara.
      type: third-party-reported
      topic: Cashew competitor profile
      sourceRefs:
        - SP010
        - SP014
      confidence: medium
      freshness: current
    - id: CP011
      statement: >-
        Spotii was a UAE BNPL startup acquired by Zip Australia (ASX: ZIP) in 2021 in the first major MENA BNPL
        M&A transaction; post-acquisition, Spotii does not appear to have received continued MENA-specific investment.
      type: third-party-reported
      topic: Spotii/Zip competitor profile
      sourceRefs:
        - SP011
        - SP014
      confidence: medium
      freshness: recent
    - id: CP012
      statement: >-
        Klarna, the global BNPL leader, has not entered the MENA market as of early 2026 and would require SAMA
        and CBUAE licences before operating; this regulatory requirement represents a 12–24 month minimum entry delay.
      type: inferred
      topic: Klarna potential entry
      sourceRefs:
        - SP012
        - SP015
      confidence: medium
      freshness: current
    - id: CP013
      statement: >-
        Saudi bank installment products (0% on credit cards via Visa/Mastercard) serve Saudi credit card holders
        but not the underbanked consumer segment that BNPL targets; overlap with Tabby's consumer base is limited.
      type: inferred
      topic: bank installment substitute
      sourceRefs:
        - SP015
        - SP016
      confidence: medium
      freshness: current
    - id: CP014
