company:
  name: Tabby
chapter:
  number: 3
  title: Competitors
  summary: >-
    Tabby is the category leader in MENA BNPL by GMV and consumer reach, but faces credible competition from Tamara
    in its Saudi home market, Postpay and Cashew in UAE, and longer-term risk from global entrants and bank-issued
    installment products. Its moat rests on network effects (merchants × consumers), regulatory approvals, and
    data-driven underwriting, but switching costs are low and MDR compression is a structural risk.
sections:
  - id: section-landscape
    title: Competitive Landscape and Competitor Classification
    body: >-
      Tabby competes across four competitor classes in the MENA BNPL and consumer fintech market. Direct peers are
      licensed BNPL operators serving the same consumer-merchant installment market in Saudi Arabia and UAE:
      Tamara (Riyadh), Postpay (UAE), Cashew (UAE/Saudi), and Spotii (UAE, now absorbed by Zip Australia after
      acquisition). Incumbent alternatives are bank-issued products including credit cards, interest-bearing
      deferred debit, and bank-sponsored installment plans (Saudi banks such as Al Rajhi, SNB, and Riyad Bank
      offering 0% installment plans on major credit cards via Visa/Mastercard networks). Adjacent entrants are
      global BNPL operators that could expand into MENA — Klarna (Swedish, operating in EU and US, no MENA
      presence as of 2026), Afterpay/Block, and Paidy. Status-quo substitutes are cash on delivery (still material
      in KSA) and informal social credit. Internal build refers to large Saudi retailers or e-commerce platforms
      that could develop in-house BNPL capability rather than relying on third-party operators. The most material
      competitive threat today is Tamara, which operates the same Saudi BNPL market, is funded by Coatue and
      Checkout.com, and holds its own SAMA BNPL licence. Second-tier direct competitors (Postpay, Cashew) are
      smaller and primarily UAE-focused. Global entry by Klarna is possible but has not materialised, and the
      regulatory complexity of MENA (SAMA, CBUAE licensing requirements) creates barriers that slow global entry.
      Incumbent bank installment products are a meaningful substitute for consumers who already hold credit cards,
      but given low credit card penetration in Saudi Arabia, the overlap is limited. Tabby's competitive
      strategy has shifted from "be the best BNPL" to "be the primary financial super-app for MENA consumers"
      (Tabby Card, Tabby Plus, Tabby Shop, Tweeq wallet), which expands both the competitive surface and the moat.
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
      - CP005
      - CP006
  - id: section-profiles
    title: Competitor Profiles — Scale, Funding, and Strategy
    body: >-
      Tamara is Tabby's most direct and credibly-funded competitor. Headquartered in Riyadh, Tamara raised a
      Series B (reported at $210M by multiple sources) from Coatue Management and Checkout.com in 2022–2023,
      making it one of the best-funded BNPL startups in MENA outside of Tabby. Tamara holds a SAMA BNPL licence
      and focuses on the Saudi consumer market. Tamara's product scope covers Pay in 3 and Pay in 4, Tamara
      shopping app, and merchant integrations with Shopify and WooCommerce. Tamara does not appear to have a
      debit card or subscription product analogous to Tabby Card or Tabby Plus, which represents a differentiation
      gap if Tabby's super-app strategy succeeds. No audited revenue or GMV figures for Tamara are publicly
      available as of the research cutoff. Postpay is a UAE-based BNPL operator founded in 2019. It secured
      backing from investors including VCs and is licensed by the UAE Central Bank. Postpay's product scope
      is narrower than Tabby's, focusing on Pay-in-4 for UAE merchants. No material public data on revenue or
      user count is available. Postpay appears to have a predominantly UAE footprint with no disclosed KSA licence,
      which limits its competitive threat to the UAE market segment. Cashew is a Dubai-headquartered BNPL operator
      with UAE and Saudi presence, targeting similar consumer and merchant segments to Tabby, particularly in
      fashion and lifestyle verticals. Cashew has raised funding but at a scale well below Tabby or Tamara.
      Spotii was a UAE BNPL startup that was acquired by Zip Australia (ASX: ZIP) in 2021, making it the first
      significant MENA BNPL M&A transaction and demonstrating global operator interest in the region. Following
      the Zip acquisition, Spotii appears to have been absorbed into Zip's global operations with limited
      continued investment in MENA-specific growth. Klarna, the world's largest private BNPL company with
      $7B+ in GMV and operations across 20+ countries, has not entered the MENA market as of early 2026. Klarna's
      entry would represent the most material competitive threat to Tabby's premium market position if it
      obtained SAMA and CBUAE licences and leveraged global brand recognition.
    claimRefs:
      - CP007
      - CP008
      - CP009
      - CP010
      - CP011
      - CP012
      - CP013
      - CP014
  - id: section-comparison
    title: Capability, Pricing, and Distribution Comparison
    body: >-
      Tabby leads on breadth of product offering, network scale (20M+ users, 40K+ merchants), and regulatory
      footprint (SAMA BNPL permit, SAMA EMI licence via Tweeq, CBUAE SVF licence). On pricing, merchant discount
      rates are not publicly disclosed by any MENA BNPL operator, making a direct MDR comparison impossible from
      public sources. Based on global BNPL benchmarks, MENA operators likely charge 1–5% MDR with variations
      by category and merchant size. Consumer pricing across all major MENA BNPL operators (Tabby, Tamara, Postpay,
      Cashew) is zero fees if payments are on time — a market-wide feature, not a differentiator. Late fees vary
      by operator and regulatory jurisdiction. Tabby's differentiation on distribution rests on: (1) largest
      merchant network in MENA (40K+), creating a network effect where consumers install Tabby because it is
      available at the most merchants; (2) Tabby Card as a physical card enabling offline and in-store payments,
      extending reach beyond e-commerce; (3) Tabby Plus as a retention and monetization tool that builds habit
      and loyalty among the most active users; (4) Tabby Shop as a discovery layer reducing consumer CAC by
      driving product search intent natively. No competitor has replicated this full-stack product suite.
      Tamara's closest product equivalents lack the card and subscription components based on available public
      information. On trust and regulatory posture, Tabby's SAMA licences and CBUAE licence, combined with JPMorgan
      as a debt partner, position it as the most institutionally-endorsed MENA BNPL operator — a trust signal
      relevant for both merchant adoption and future IPO investors. Switching cost for consumers is low: all BNPL
      apps are installed on the same smartphone and can be selected at checkout. The key switching driver is
      merchant coverage — consumers use whichever app is available at their preferred merchant. This dynamic
      means merchant acquisition is the primary competitive battleground, not consumer-facing features.
    claimRefs:
      - CP015
      - CP016
      - CP017
      - CP018
      - CP019
      - CP020
  - id: section-moat
    title: Moat Durability and Competitive Risk Register
    body: >-
      Tabby's competitive moat is built on four layered components: scale network effects (largest merchant and
      consumer network creates a flywheel where more merchants attract more consumers, who attract more merchants);
      data advantage (proprietary underwriting model trained on MENA-specific transaction data from 20M+ users);
      regulatory approvals (SAMA BNPL permit, SAMA EMI via Tweeq, CBUAE SVF — each takes 12–24 months to obtain,
      creating a headstart over new entrants); and the emerging super-app positioning (Tabby Card, Tabby Plus,
      Tabby Shop, Tweeq wallet layered on top of BNPL creating cross-product stickiness). The durability of
      this moat is tested by three material risks. First, Tamara is credibly funded and licensed in Saudi Arabia —
      the two companies compete directly for the same merchant integrations and consumer wallet share in Tabby's
      largest market. If Tamara achieves a similar merchant coverage, consumer switching between the two apps
      becomes the norm, eroding Tabby's network advantage. Second, MDR compression: as BNPL becomes a commodity
      capability expected at every major Saudi checkout, merchants gain pricing power to compress MDR, directly
      reducing Tabby's revenue per unit of GMV. Third, bank disintermediation: Saudi banks (Al Rajhi Bank, Saudi
      National Bank) have the distribution, capital, and regulatory relationships to offer competitive installment
      products at scale, and may invest in BNPL-like products as the market matures. The counter to these risks
      is Tabby's super-app strategy: if Tabby Plus and Tabby Card build genuine consumer habits beyond BNPL
      checkout, Tabby gains switching costs that its pure-play BNPL competitors cannot match. The critical
      diligence question is whether consumer engagement data supports this multi-product stickiness hypothesis.
    claimRefs:
      - CP021
      - CP022
      - CP023
      - CP024
      - CP025
      - CP026
      - CP027
      - CP028
