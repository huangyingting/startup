    reason: >-
      Tables and figures serve complementary roles. Tables preserve row-level evidence; figures compress domains into architecture, flow, and maturity views for faster reading.
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Tabby operates a multi-product BNPL and financial services platform across KSA, UAE, and Kuwait, anchored by Pay-in-4 instalment credit, the Tabby Card, Tabby Plus subscription, and the Tweeq-powered digital wallet. The platform processed over $10 billion in annualized transaction volume by 2025 and has achieved two consecutive years of profitability. Key technical dependencies include payment network partners, SAMA licensing, and cloud infrastructure; product differentiation rests on the 15 million+ user network, merchant discovery surface, and Shariah-compliant fee model.

