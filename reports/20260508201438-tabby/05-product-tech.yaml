callouts:
  - title: Regulatory Moat — SAMA Licences + Profitability
    body: >-
      Tabby is the only MENA BNPL player with both a SAMA BNPL permit and (via Tweeq) a SAMA EMI licence, plus a
      UAE CBUAE SVF licence obtained April 2026. Combined with two consecutive years of profitability and a
      $10B+ GMV run-rate, this regulatory depth and financial track record creates a barrier that no competitor
      has matched. Regulatory licensing in KSA takes 12-24 months and requires demonstrated financial stability —
      Tabby's head start is effectively a 3-5 year advantage over any new MENA BNPL entrant.
    calloutType: strength
    claimRefs: [CE035, CE036, CE037, CE012]

  - title: Network Effect — 15M+ Users and 40K+ Merchants
    body: >-
      Tabby's 15 million consumer user base and 40,000+ merchant network create a powerful two-sided marketplace
      effect. Consumers join because their preferred merchants accept Tabby; merchants join because Tabby's 15M
      users represent a ready-made acquisition channel. This flywheel deepens with every new user and merchant
      added. At this scale, Tabby's consumer data asset — proprietary repayment history for 15M+ consumers,
      many thin-file relative to bureau data — becomes a compounding credit scoring moat that improves approval
      rates and reduces default risk over time.
    calloutType: strength
    claimRefs: [CE008, CE009, CE023]

  - title: Risk — Credit Decisioning Opacity
    body: >-
      Tabby has not publicly disclosed its credit model architecture, approval rates, default rates, or loan-loss
      provisions. Investors cannot independently verify credit risk management quality without private data room
      access. BNPL credit losses can accelerate rapidly in an economic downturn, and the MENA consumer credit
      information infrastructure (bureau coverage) is less mature than Western markets. The opacity of Tabby's
      credit decisioning is the primary diligence risk requiring direct management engagement and portfolio
      performance data to resolve.
    calloutType: risk
    claimRefs: [CE023, CE040]

  - title: Insight — Tweeq Acquisition Enables Full Neobank Play
    body: >-
      The September 2024 Tweeq acquisition was the single most strategically significant event in Tabby's history.
      By adding a SAMA EMI licence to its BNPL permit, Tabby can now legally offer stored-value wallets, P2P
      transfers, and salary deposits in KSA — capabilities that transform Tabby from a checkout payment tool into
      a primary financial account. Combined with the UAE SVF licence (April 2026), Tabby is positioned to become
      the first Shariah-compliant BNPL-native neobank in the GCC, a market segment with no established winner
      and a $1.4B and growing BNPL TAM expanding at 13% CAGR.
    calloutType: insight
    claimRefs: [CE006, CE007, CE036, CE037]
