sections:
  - id: section-1
    title: Product Portfolio Overview
    body: >-
      Tabby has expanded from a single-product Pay-in-4 BNPL service into a multi-product financial platform
      serving consumers and merchants across KSA, UAE, and Kuwait. The core Pay-in-4 product splits any purchase
      into four equal interest-free instalments over six weeks, with no late fees charged since 2023, making it
      fully Shariah-compliant. [CE001] The Tabby Card (Visa network) extends BNPL credit and cashback rewards
      to any Visa-accepting merchant globally, removing the constraint of the partner merchant network. [CE002]
      Tabby Plus is a SAR 19/month subscription tier delivering premium cashback and merchant offers, creating a
      recurring revenue layer and deepening consumer engagement. [CE003] Tabby Shop is an in-app merchant
      discovery and shopping surface that allows consumers to browse 40,000+ partner merchants and access
      exclusive deals, transforming the Tabby app from a payment tool into a commerce destination. [CE004]
      Tabby Care adds consumer purchase protection and warranty coverage for high-value electronics and goods
      transactions. [CE005] Most significantly, the September 2024 acquisition of Tweeq — a SAMA EMI-licenced
      digital wallet startup — brought stored-value wallet capabilities and person-to-person transfer
      functionality to the platform, enabling Tabby to position itself as a full neobanking challenger for MENA
      consumers. [CE006] In April 2026, Tabby obtained a UAE Stored Value Facility (SVF) licence from the CBUAE,
      unlocking equivalent wallet capabilities in the UAE market. [CE037] The breadth of this product portfolio,
      all accessible through a single 4.8-rated app, creates a consumer financial super-app that no other
      regional BNPL player has replicated at comparable scale.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE037]
    figureRefs: []
    tableRefs: []

  - id: section-2
    title: Module and Capability Map
    body: >-
      Each Tabby product module addresses a distinct user job and deployment context. Pay-in-4 is the mature
      anchor product used by 15 million+ consumers at checkout, both online and in-store via QR code or NFC.
      [CE008] Evidence of deployment is extensive: Pay-in-4 is available at 40,000+ merchants including IKEA,
      H&M, Noon, and Namshi, and is accessible via Shopify, Magento, and WooCommerce plugins as well as custom
      API integrations. [CE009] The Tabby Card (Visa) is a growth-stage product targeted at consumers who want
      BNPL credit at merchants outside the Tabby network; deployment evidence includes the Visa network
      partnership and in-app card management. [CE002] Tabby Plus targets frequent purchasers who want premium
      cashback; it is deployed as an in-app subscription with month-to-month billing at SAR 19. [CE003]
      Tabby Shop is live across the primary consumer app and serves as the merchant discovery engine, combining
      curated storefronts, deal alerts, and category browsing to drive purchase intent. [CE004] Tabby Care
      addresses the consumer protection job, providing purchase insurance for electronics and high-value items;
      deployment evidence comes from Tabby's official product listings. [CE005] The Tweeq Wallet, the newest
      module, adds stored-value balance and P2P transfers for KSA users under the SAMA EMI licence, with UAE
      wallet functionality enabled by the April 2026 SVF licence. [CE007] The most significant diligence gap
      across modules is the Tweeq integration depth — no official launch confirmation for the fully integrated
      wallet experience has been published as of May 2026, making the timeline for neobank positioning uncertain.
    claimRefs: [CE002, CE003, CE004, CE005, CE007, CE008, CE009]
    figureRefs: []
    tableRefs: [TE001]

  - id: section-3
    title: Technical Architecture
    body: >-
      Tabby's technical architecture is inferred from public job postings, the Tabby for Business merchant portal,
      GitHub activity, and third-party analyst reporting. [CE022] The consumer application is delivered via
      native iOS and Android apps with Arabic and English localisation, integrating checkout deeplinks, instalment
      management, Tabby Shop browsing, and card controls in a single interface. App store ratings of 4.8 reflect
      strong UX execution. [CE013] Payment processing relies on Visa for the Tabby Card and local acquiring bank
      partnerships for BNPL transactions across KSA, UAE, and Kuwait; card network connectivity and acquiring
      relationships are critical single-dependency risks. [CE024] Credit decisioning is performed in real time at
      checkout using a proprietary scoring engine that combines national ID data, credit bureau signals (where
      available), and Tabby's internal transaction history. Repeat customers benefit from Tabby's proprietary
      repayment track record data, which is a meaningful data moat for thin-file consumers who lack bureau
      history. [CE023] The merchant API layer supports plug-and-play integration with Shopify, Magento,
      WooCommerce, and custom REST API implementations, with sandbox environments and SDKs published via the
      Tabby for Business portal. [CE025] Cloud infrastructure is not publicly disclosed but is inferred to use a
      major hyperscaler (AWS or GCP equivalent) based on the scale of transaction processing and global engineering
      hiring signals visible in job postings. [CE022] Tabby's GitHub organisation (github.com/tabbyai) shows
      limited public repositories — primarily merchant SDKs — consistent with a closed-source fintech architecture
      rather than an open-source platform. [CE040] The absence of a public engineering blog represents a
      transparency gap compared to Stripe or Monzo but is not atypical for a growth-stage MENA fintech.
    claimRefs: [CE013, CE022, CE023, CE024, CE025, CE040]
    figureRefs: [FE001, FE003]
    tableRefs: [TE003]

  - id: section-4
    title: Deployment, Integration, and Roadmap
    body: >-
      Tabby's deployment model spans online and in-store channels. Online integration is achieved via
      Shopify, Magento, and WooCommerce plugins or via direct REST API, with an average integration time under
      48 hours for plugin-based merchants. [CE027] In-store BNPL is available via QR scan-and-pay and NFC
      tap-to-pay at physical retail locations in KSA malls, enabling Tabby to capture offline GMV from major
      fashion and electronics retailers. [CE026] The merchant onboarding process involves KYB documentation
      submission, technical integration, and Tabby BNPL appearing at checkout — the Tabby for Business portal
      manages this end-to-end. [CE027] On the product roadmap, the most significant initiative is the full
      integration of the Tweeq digital wallet into the primary consumer app, which would allow consumers to
      hold balances, receive salaries, and pay merchants directly from a stored value account. [CE028]
      Expansion of the Tabby Card to additional markets and deepening of the Tabby Shop personalisation engine
      using purchase history data from 15M+ users are also signalled priorities. [CE028] The strategic capstone
      of the roadmap is the Tadawul IPO: Tabby has engaged JPMorgan, HSBC, and Morgan Stanley as banks for the
      offering, targeting 2025-2026 subject to CMA approval. [CE033] The April 2025 secondary share sale at a
      $4.5 billion implied valuation represents a pre-IPO price discovery event and confirms institutional
      demand for Tabby equity ahead of the public listing. [CE034] Key roadmap risks include regulatory approval
      timeline, KSA capital market conditions, and the execution complexity of integrating Tweeq while
      simultaneously preparing for an IPO.
    claimRefs: [CE026, CE027, CE028, CE033, CE034]
    figureRefs: []
    tableRefs: [TE005]

  - id: section-5
    title: Competitive Differentiation and Moat
    body: >-
      Tabby's competitive moat rests on five reinforcing elements. First, scale network effect: 15 million+ users
      and 40,000+ merchants create a two-sided marketplace where each side joins for the other's presence. New
      BNPL entrants cannot replicate this without years of customer acquisition spend. [CE008] Second, Shariah-
      compliant product design: removing late fees in 2023 and structuring instalment products without compound
      interest aligns Tabby with Islamic finance principles, which are structurally preferred by Saudi and Emirati
      consumers and Islamic banking regulators. Competitors using late fees face a disadvantage in GCC markets.
      [CE031] Third, regulatory depth: Tabby holds both a SAMA BNPL permit (July 2022) and, via the Tweeq
      acquisition, a SAMA EMI licence — the most comprehensive regulatory stack of any MENA BNPL player. The UAE
      SVF licence (April 2026) extends this regulatory moat to the second-largest market. [CE035, CE036, CE037]
      Fourth, commerce destination: the Tabby Shop merchant discovery surface creates consumer engagement well
      beyond the payment moment, building a habitual browsing and shopping behaviour that payment-only BNPL
      players (Postpay, Cashew) have not matched. [CE032] Fifth, proprietary credit data: Tabby's internal
      repayment history on 15M+ users, many of whom are thin-file consumers without bureau records, creates a
      credit scoring advantage that improves approval rates and reduces defaults for repeat customers without
      relying on external bureaus. [CE023] Versus Tamara (the closest competitor), Tabby leads on user scale,
      profitability, regulatory breadth, and product diversification. [CE029] Versus UAE-focused Postpay and
      Cashew, Tabby's KSA scale and SAMA regulatory depth create a moat that is difficult to overcome without
      years of investment. [CE030]
    claimRefs: [CE008, CE023, CE029, CE030, CE031, CE032, CE035, CE036, CE037]
    figureRefs: [FE004]
    tableRefs: [TE002]

  - id: section-6
    title: Trust, Security, and Regulatory Compliance
    body: >-
      Tabby's regulatory compliance architecture is the strongest of any MENA BNPL operator. SAMA granted Tabby
      its BNPL permit in July 2022, one of the first such licences in the GCC, authorising consumer instalment
      credit operations in Saudi Arabia subject to consumer protection, AML/KYC, and credit disclosure
      requirements. [CE035] The September 2024 acquisition of Tweeq added the SAMA EMI licence to Tabby's
      regulatory portfolio, enabling stored-value wallet operations, e-money issuance, and payment processing
      beyond BNPL instalment credit. [CE036] In April 2026, Tabby obtained the UAE Central Bank SVF licence,
      enabling stored-value wallet services for UAE consumers and completing the dual-market regulatory
      authorisation that positions Tabby as a GCC neobank contender. [CE037] Tabby's decision to remove late
      fees in 2023 — explicitly citing Shariah compliance — is both a regulatory and reputational differentiator.
      No late-fee-based revenue means Tabby's income model aligns with consumer interests, reducing regulatory
      scrutiny risk and building brand trust among observant Muslim consumers. [CE038] Data security is governed
      by KSA's Personal Data Protection Law (PDPL) and UAE data protection regulations, with Tabby's privacy
      policy disclosing data processing and retention practices. No material data breaches have been publicly
      reported as of May 2026. [CE039] The primary trust gap is the absence of disclosed credit-loss rates,
      default performance metrics, and any public record of SAMA compliance examinations or enforcement history.
      Investors cannot independently verify Tabby's credit risk management quality without private data room
      access. [CE023] No adverse regulatory actions or sanctions against Tabby have been publicly identified,
      though the absence of evidence is not conclusive given SAMA's non-public enforcement practice.
    claimRefs: [CE023, CE035, CE036, CE037, CE038, CE039]
    figureRefs: []
    tableRefs: [TE004]

