  claims:
    - id: CE001
      statement: >-
        Tabby's core product is Pay-in-4 BNPL, which allows consumers to split any purchase into four equal interest-free
        instalments, payable over six weeks. The product is available online and in-store across KSA, UAE, and Kuwait,
        with no late fees charged to consumers since 2023, making it Shariah-compliant.
      type: company-claimed
      topic: product-portfolio
      sourceRefs: [SE001, SE007]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001]
      contradictsClaimRefs: []

    - id: CE002
      statement: >-
        The Tabby Card is a Visa-network debit/prepaid card that allows cardholders to earn cashback rewards and access
        BNPL credit at any Visa-accepting merchant globally, extending Tabby's reach beyond its partner merchant network
        to in-store and international transactions.
      type: company-claimed
      topic: product-portfolio
      sourceRefs: [SE001, SE004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE001]
      contradictsClaimRefs: []

    - id: CE003
      statement: >-
        Tabby Plus is a paid subscription service priced at SAR 19/month (approximately $5) that provides subscribers
        with premium cashback rates, exclusive merchant offers, and priority customer support. The subscription model
        generates recurring revenue and increases user engagement and stickiness on the platform.
      type: company-claimed
      topic: product-portfolio
      sourceRefs: [SE001, SE004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE001, QE021]
      contradictsClaimRefs: []

    - id: CE004
      statement: >-
        Tabby Shop is an integrated merchant discovery and shopping surface within the Tabby app, enabling consumers to
        browse and shop from 40,000+ partner merchants directly. The discovery surface creates a captive shopping
        channel that drives transaction volume and merchant referral value, differentiating Tabby from pure payment
        infrastructure BNPL players.
      type: company-claimed
      topic: product-portfolio
      sourceRefs: [SE005, SE001]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001]
      contradictsClaimRefs: []

    - id: CE005
      statement: >-
        Tabby Care is a consumer protection and insurance product offering purchase protection and extended warranty
        coverage. It is primarily targeted at consumer electronics and high-value purchases made through the Tabby
        platform, adding a non-credit revenue stream to complement BNPL instalment fees.
      type: company-claimed
      topic: product-portfolio
      sourceRefs: [SE001, SE004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE001, QE025]
      contradictsClaimRefs: []

    - id: CE006
      statement: >-
        In September 2024 Tabby acquired Tweeq, a Saudi-based digital wallet startup holding a SAMA Electronic Money
        Institution (EMI) licence. The acquisition enables Tabby to offer stored-value wallet functionality, person-to-
        person transfers, and broader consumer financial services beyond BNPL, positioning Tabby on a path to becoming
        a full-stack digital bank.
      type: third-party-reported
      topic: product-portfolio
      sourceRefs: [SE006, SE014]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001, QE012]
      contradictsClaimRefs: []

    - id: CE007
      statement: >-
        Following the Tweeq acquisition, Tabby integrated the Tweeq SAMA EMI licence to offer a digital wallet product
        allowing consumers to hold a stored balance, pay merchants directly from wallet funds, and receive salary
        deposits. The wallet functionality extends Tabby's engagement beyond the purchase moment to become a primary
        financial account for users.
      type: company-claimed
      topic: product-portfolio
      sourceRefs: [SE006, SE012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE002, QE012]
