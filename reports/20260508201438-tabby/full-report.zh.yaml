      - number: '2.2'
        title: 市场规模测算 — 从 TAM、SAM、SOM 多个镜头看
        blocks:
          - type: paragraph
            body: >-
              多个规模测算镜头指向一个一致结论：Tabby 的市场机会很大；但估计值会因框架是全球 BNPL 规模、MENA BNPL 规模，还是沙特特定装机基础而显著变化。MENA BNPL 最常被引用的数据来自
              Research and Markets：2023 年沙特 BNPL 支付额为 $1.4B，到 2028 年增至 $2.7B，CAGR 约 13%。AGBI 2024 年 9
              月报道直接引用了这个数字，因此它成为所审阅报道中 MENA BNPL 规模测算的主要基准。同一来源也给出全球 BNPL 市场背景：到 2028 年市场规模预计达到 $1T，CAGR
              45%；这是一套更宽的框架，包含 Klarna 在欧盟和美国的可服务市场。对 Tabby 而言，沙特数字是最有决策意义的 TAM 代理。沿这个框架外推：若 MENA BNPL（沙特 + 阿联酋 + 科威特 +
              卡塔尔 + 巴林）在 2024 年总计约 $2.5–3B（以沙特占 MENA BNPL 电商份额约 50-60% 推算 $1.4B 沙特数据），则 MENA 范围内 BNPL 层的 TAM 约为 $2.5B，并在
              2028 年升至 $5B+。Tabby 声称截至 2025 年初年化 GMV 为 $10B，这似乎已经是该市场的相当一部分，说明 Tabby 的 SOM 已拿下 BNPL 装机基础中的显著份额。换言之，当前
              BNPL 特定装机基础的市场渗透率很高，这与 Tabby 作为品类领导者相符。不过，更宽的 SAM 框架同样重要：如果把所有消费者电商结账支出都纳入潜在 GMV（即理论上可用于 BNPL
              的所有购买），仅沙特电商市场 2023 年就约为 $12B（多项估计），说明 BNPL 仍有空间从少数结账交易渗透到多数。相互冲突的估计需要保留：Research and Markets 对 2023 年沙特
              BNPL 的 $1.4B 估计，相比 Tabby 自身 $10B+ GMV 声称（覆盖沙特、阿联酋和科威特）显得保守；这意味着 Research and Markets 可能采用了更窄的 BNPL 定义，或
              Tabby 的 $10B 存在夸大，或市场增长快于预期。
