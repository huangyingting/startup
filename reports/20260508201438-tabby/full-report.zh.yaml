      - number: '5.2'
        title: 模块与能力图谱
        blocks:
          - type: paragraph
            body: >-
              Tabby 每个产品模块都对应不同用户任务和部署场景。Pay-in-4 是成熟的锚点产品，15 million+ 消费者在结账时使用它，线上线下都可通过 二维码或 NFC 完成。[CE008]
              部署证据很充分：Pay-in-4 已覆盖 IKEA、H&M、Noon、Namshi 等 40,000+ 商户，并可通过 Shopify、Magento、WooCommerce 插件以及自定义 API
              集成接入。[CE009] Tabby Card（Visa）处于增长阶段，面向想在 Tabby 网络之外商户使用 BNPL 授信的消费者；部署证据包括 Visa 网络合作和 App 内卡片管理。[CE002]
              Tabby Plus 面向追求高级返现的高频购买者，以 SAR 19 的 App 内月度订阅形式部署。[CE003] Tabby Shop 已在主消费者 App
              上线，作为商户发现引擎，把精选店铺、优惠提醒和分类浏览结合起来，推动购买意图。[CE004] Tabby Care 解决消费者保护任务，为电子产品和高价值商品提供购买保险；部署证据来自 Tabby
              官方产品列表。[CE005] 最新模块 Tweeq Wallet 在 SAMA EMI 牌照下为沙特用户增加储值余额和 P2P 转账，阿联酋钱包功能则由 2026 年 4 月 SVF 牌照解锁。[CE007]
