          - type: callout
            title: 连续两年盈利，H1 2025 净利润同比增长 360%
            body: >-
              Tabby 连续两年实现盈利，并在 H1 2025 沙特净利润同比增长 360%（SAR 90.4M），这是 MENA 金融科技群体中最具差异化的财务信号之一。 多数同规模 BNPL
              竞争对手仍在烧钱。沿着这条轨迹实现盈利，不只是达到盈亏平衡效率，更说明经营杠杆在加速释放——固定成本被不断扩大的收入基础吸收，边际贡献以更快速度超过边际成本。 这样的财务画像大幅降低了 IPO
              叙事风险，并提供了可信的公开市场上市路径。
