      - number: '5.4'
        title: 部署、集成与路线图
        blocks:
          - type: paragraph
            body: >-
              Tabby 的部署模型覆盖线上和线下渠道。线上集成通过 Shopify、Magento、WooCommerce 插件或直接 REST API 完成；采用插件的商户平均集成时间低于 48 小时。[CE027] 线下
              BNPL 可在沙特购物中心实体零售点通过 QR 扫码支付和 NFC 轻触支付使用，帮助 Tabby 捕捉主要时尚和电子零售商的线下 GMV。[CE026] 商户入驻流程包括提交 KYB 文件、技术集成，以及
              Tabby BNPL 出现在结账页；Tabby for Business 门户端到端管理这套流程。[CE027] 产品路线图上，最重要的项目是把 Tweeq 数字钱包完整集成进主消费者
              App，让消费者持有余额、接收工资，并直接从储值账户向商户付款。[CE028] Tabby Card 向更多市场扩张，以及用 15M+ 用户购买历史数据加深 Tabby Shop
              个性化引擎，也是公司释放出的优先方向。[CE028] 路线图的战略收束点是 Tadawul 首次公开募股（IPO）：Tabby 已聘请 JPMorgan、HSBC 和 Morgan Stanley
              担任发行银行，目标窗口是 2025-2026 年，前提是获得 CMA 批准。[CE033] 2025 年 4 月以 $4.5 billion 隐含估值完成的老股交易，是 IPO
              前价格发现事件，也确认了公开上市前机构对 Tabby 股权的需求。[CE034] 关键路线图风险包括监管审批时间、沙特资本市场环境，以及一边准备 IPO、一边集成 Tweeq 的执行复杂度。
