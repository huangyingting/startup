      - number: '2.3'
        title: 买方和细分市场地图
        blocks:
          - type: paragraph
            body: >-
              MENA BNPL 市场有两个截然不同、但 Tabby 必须同时拿下的买方群体：消费者和商户。消费者采用主要由 18–35 岁年轻成年人推动；他们没有信用卡，但有智能手机和线上购物习惯。沙特人口结构偏年轻——约
              70% 在 40 岁以下——且智能手机渗透率位居全球前列，天然形成了更容易接受的消费者基础。BNPL 在时尚（主要是女性消费者购买服装）和电子产品（偏男性的高客单价商品）里的使用场景最强，这与 Tabby
              报告的头部品类一致。阿联酋消费者由于外籍劳动者占比更高、正式银行关系更普遍，更可能已经持有信用卡，因此 BNPL 相比沙特的结构性优势略弱。商户采用由结账转化率提升和平均订单金额提高推动。按照全球 BNPL
              运营商披露，提供 BNPL 的零售商通常相对只支持信用卡结账的方式，转化率高出 10–30%，平均订单金额高出 20–50%。对 MENA 商户而言——尤其在退货率可能偏高的时尚和电子产品领域——买家保障和
              Tabby Care 功能可以降低商户财务风险。商户侧预算归属通常在电商和数字营销团队，因为他们控制支付网关选择；大型零售商则由 CFO / 财务团队谈判 MDR
              条款。生鲜杂货和旅行是正在出现的邻近垂直领域。BNPL 模式中的付款方是商户（MDR
              收入），消费者免费使用产品（按时还款则无利息、无费用）。这种消费者免费模式与传统信贷有结构性差异，也是消费者抗拒计息产品地区（伊斯兰金融因素）的关键采用推动器。Tabby Plus
              是迈向订阅式直接消费者变现的第一步，说明公司正从纯 MDR 收入演进出去。
