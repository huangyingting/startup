              - CP022
              - CP004
          - type: callout
            title: Tamara 是 Tabby 主市场中资金实力可信的竞争者，护城河宽度尚未被证明
            body: >-
              Tamara 已融资 $210M+，并持有自己的 SAMA BNPL 牌照，是唯一在 Tabby 沙特核心市场具备真实规模的竞争者。两家公司都未披露商户重叠、消费者切换率或对比 GMV，公开来源无法判断
              Tabby 的网络优势正在扩大还是收窄。缺少这些数据本身就是尽调风险。
