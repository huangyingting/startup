      - number: '4.4'
        title: 财务尽调缺口和 IPO 准备度
        blocks:
          - type: paragraph
            body: >-
              Tabby 的财务画像存在三项重大缺口，使外部投资人在计划中的 Tadawul IPO 前无法完整承销。第一，缺少覆盖所有地区（KSA + 阿联酋 + 科威特 + Tweeq
              实体）的经审计合并财务报表，意味着投资人只能依赖公司发布、且未经过第三方审计检验的收入和利润数字。BNPL
              特定会计判断——收入确认、信用损失准备、利息收入处理——都很重要，需要审计机构签字确认。第二，信用表现数据（损失率、逾期分层、放款批次（vintage） 分析）不公开。对 BNPL
              放贷方来说，这是最重要的承销输入：如果 Tabby 为维持 GMV 增长而向质量更低的借款人放贷、导致损失率上升，那么报告中的 P&L
              盈利可能是由拨备不足掩盖出来的。第三，集团层面的资本充足状况（总权益、总债务、流动性、契约空间）未披露。SAMA 的 BNPL 监管很可能对 Tabby 沙特实体设置最低资本要求，Tweeq 的 SAMA EMI
              牌照也有单独资本要求。IPO 流程——向沙特资本市场管理局（CMA）提交招股书——将要求完整经审计账目、完整分部披露和信用表现数据。因此，IPO 流程是大多数财务尽调缺口的自然解决事件。对以二级市场隐含
              $4.5B 估值（2025 年 4 月）交易的 IPO 前投资人来说，缺少经审计账目形成重大信息不对称风险，必须通过对 Tabby 管理层的深度一手访谈，或通过相对披露二级估值的折价来补偿。
