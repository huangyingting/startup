      - number: '7.3'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              Tabby 的运营风险主要由三条向量主导：平台可用性、欺诈与信用违约管理，以及数据安全。作为一个在三个市场处理数百万笔 BNPL 交易的高吞吐消费者金融科技平台，若在斋月或沙特国庆日等购物高峰出现重大停机，
              可能造成实质 GMV 损失并伤害商户关系。Tabby 不公开披露可用性 SLA 或事件历史，给运营韧性评估留下证据缺口。支付欺诈是全球 BNPL 运营商的内生风险。
              与传统卡网络把欺诈责任在商户和发卡方之间分担不同，Tabby 对未付分期承担第一损失信用风险。缺少公开欺诈率披露，外部无法评估 Tabby 的机器学习授信评分是否能把欺诈压到 Klarna 或 Affirm
              等更成熟全球同业的水平。 首付违约欺诈一旦激增——这是已知 BNPL 攻击向量，欺诈者会利用首期分期宽限期——可能显著损害信用损失表现。15M+ 注册消费者 PII 数据集是网络安全威胁的高价值目标。
              身份验证数据、支付历史、设备指纹以及入驻时可能采集的生物识别数据，都由 Tabby 存储。重大数据泄露会触发沙特 PDPL 通知义务和阿联酋潜在 CBUAE 要求，并带来罚款暴露和严重声誉损害。 Tabby
              的支付处理基础设施，在 Tabby Card 产品和基于卡的商户付款上依赖 Visa 与 Mastercard 网络；这些网络停机或调整费率表，会直接影响运营成本和 Tabby Card
              产品经济性。竞争对手以更低 MDR 定价挖走商户，是次级运营风险，会随时间侵蚀商户网络防御力。Tabby 的 Trustpilot 评论显示，消费者投诉主要围绕支付争议解决周期，以及被错误归因于 Tabby
              支付系统的商户交付问题，说明客服运营缺口值得跟踪。
            claimRefs:
