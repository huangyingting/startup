      - number: '6.2'
        title: 采用轨迹与增长指标
        blocks:
          - type: paragraph
            body: >-
              Tabby 的采用轨迹由多个相互独立、可交叉印证的数据点支撑，显示用户、商户和财务表现都在快速放大。[CU004] 截至 2025 年，平台处理的年化交易量超过 $10 billion——相较 Series A
              融资时不足 $1 billion 是一次跃迁，整个增长阶段提升超过 10x。对 Tabby 的主导市场沙特而言，2024 全年报告收入约为 $267 million。[CU005] 到 2025
              年，沙特收入在同口径下增至约 $378 million，意味着核心市场同比增长约 41%。[CU006] 最突出的指标是 H1 2025 沙特净利润：SAR 90.4 million，同比 H1 2024 增长
              360%——这个增速说明规模化后经营杠杆释放、单位经济模型改善。[CU007] 连续两年盈利，而且发生在 BNPL 激进扩张阶段，说明业务模型在运营中产生现金，而不是单纯牺牲利润率换增长。[CU009]
              融资轨迹进一步印证采用度： Series D（$200M，估值 $1.5B，2023 年 11 月）之后是 Series E（$160M，估值 $3.3B，2025 年 2 月），并在 2025 年 4 月以隐含
              $4.5B 估值完成老股交易。[CU031, CU032, CU037] 商户网络从上线扩展到 40,000+ 合作伙伴，反映了供给侧采用；正是这层供给，支撑了所宣称规模下的消费者交易量。[CU002]
