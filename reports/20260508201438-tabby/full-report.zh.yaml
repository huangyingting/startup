            body: >-
              2024 年 9 月收购 Tweeq，再加上 2026 年 4 月阿联酋 SVF 牌照，是 Tabby 区别于所有其他 MENA BNPL 竞争对手的战略动作。Tabby 把 SAMA EMI 牌照（通过
              Tweeq） 叠加到既有 SAMA BNPL 许可之上，再加上阿联酋 CBUAE SVF 牌照，已经搭出一套监管栈，可以支持储值钱包、P2P 转账和工资入账——这些是主金融账户的核心能力。 没有其他 MENA
