      - number: '3.3'
        title: 能力、定价和分发对比
        blocks:
          - type: paragraph
            body: >-
              Tabby 在产品广度、网络规模（20M+ 用户、40K+ 商户）和监管版图（SAMA BNPL 许可、通过 Tweeq 获得 SAMA EMI 牌照、CBUAE SVF 牌照）上领先。定价方面，没有任何
              MENA BNPL 运营商公开商户扣率，因此无法基于公开来源直接比较 MDR。按全球 BNPL 基准，MENA 运营商可能收取 1–5% MDR，随品类和商户规模变化。所有主要 MENA BNPL
              运营商（Tabby、Tamara、Postpay、Cashew）的消费者定价都是按时还款零费用——这是全市场特征，不是差异化。滞纳金因运营商和监管辖区而异。Tabby 的分发差异化建立在四点上：（1）MENA
              最大商户网络（40K+），形成消费者安装 Tabby 因为它覆盖最多商户的网络效应；（2）Tabby Card 是实体卡，可支持线下和店内支付，把触达延伸到电商之外；（3）Tabby Plus
              是留存和变现工具，能在最活跃用户中建立习惯和忠诚度；（4）Tabby Shop 是发现层，靠原生驱动商品搜索意图来降低消费者 CAC。尚无竞争对手复制了这套全栈产品组合。基于可得公开信息，Tamara
              最接近的产品等价物缺少卡和订阅组件。在信任和监管姿态上，Tabby 的 SAMA 牌照、CBUAE 牌照，以及 JPMorgan 作为债务伙伴，把它定位为 MENA BNPL
              运营商中最具机构背书的一家——这对商户采用和未来 IPO 投资人都是信任信号。消费者切换成本低：所有 BNPL
              应用都装在同一部智能手机上，结账时即可选择。关键切换驱动是商户覆盖——消费者会使用自己偏好商户支持的那个应用。这一动态意味着商户获取才是主要竞争战场，不是面向消费者的功能。
