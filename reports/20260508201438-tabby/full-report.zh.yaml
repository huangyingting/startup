      - number: '6.6'
        title: 客户集中度与反向证据
        blocks:
          - type: paragraph
            body: >-
              Tabby 的集中度风险和反向证据都是重要尽调项，需要直接进入数据室才能解决。商户集中度方面，Tabby 未公开披露前 10 或前 25 大商户伙伴贡献的 GMV。[CU018]
              从结构上看，少数高交易量商户——Amazon、Noon 以及主要零售集团（Al Futtaim、Landmark、Apparel Group）——很可能贡献总 GMV 的不成比例份额；
              如果任一关系终止，或商户开发自有 BNPL 方案，平台会变得脆弱。MENA BNPL 赛道竞争日益激烈，主要区域竞争对手 Tamara 已融资同样大额轮次，并在重叠 GCC 垂直品类达到有意义规模。[CU017]
              消费者侧，Tabby 的 Trustpilot 评论包含关于商户争议解决延迟、授信审批结果不一致，以及 2023 年后取消滞纳金政策引发困惑的投诉。[CU019] 这些投诉在性质上与全球 BNPL
              规模化挑战一致，但相对于 15 million 用户基础，其频率和严重程度没有直接数据就无法独立量化。[CU019] 消费者欺诈率、信用违约率和争议交易频率都不是 Tabby 公开披露的指标。[CU039]
              缺少这些数据是尽调缺口，需要直接接触管理层。80%+ 用户集中在沙特，也形成单一市场监管依赖： SAMA 的 BNPL 框架、信用额度或消费者保护规则发生任何变化，都会直接影响 Tabby
              绝大多数用户基础和收入。[CU003, CU034]
            claimRefs:
              - CU003
              - CU017
              - CU018
              - CU019
              - CU034
              - CU039
      - number: '6.7'
        title: 展项
        blocks:
          - type: callout
            title: 40K+ 商户网络形成双边发现飞轮
            body: >-
              Tabby 的 40,000+ 商户网络覆盖 Amazon、SHEIN、IKEA、Samsung、Noon 和 GCC 主要零售集团，形成随规模复利的发现飞轮。消费者加入 Tabby，是因为偏好的商户接受它；
              商户加入，是因为 Tabby 的 15M+ 消费者基础就是现成获客渠道。Tabby Shop 这个 App 内商户发现入口声称拥有 20M+ 购物者，把 BNPL 支付 App 变成商业目的地，
              在即时购买意图之外推动习惯性参与和复访。这套网络架构让 Tabby 同时成为支付基础设施、商户获客工具和广告 / 发现平台——同一用户基础上跑出三条收入向量。
            calloutType: strength
            claimRefs:
