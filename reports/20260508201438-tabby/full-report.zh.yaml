      - number: '2.5'
        title: 展示项
        blocks:
          - type: callout
            title: 沙特 BNPL 的结构性优势耐久且仍在加深
            body: >-
              信用卡渗透率低、人口年轻、兼容伊斯兰金融，以及 Vision 2030 的监管顺风，共同让沙特形成一个对 BNPL 结构性有利、且不太可能逆转的市场。这些驱动是长期趋势，不是周期波动，给 Tabby
              在其主市场留下了很长跑道。
            calloutType: strength
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
          - type: callout
            title: Tabby GMV 与分析师 BNPL 市场估算之间的矛盾需要厘清
            body: >-
              Tabby 声称年化 GMV 达 $10B+，而 Research and Markets 对整个沙特 BNPL 市场 2023 年规模的估算只有 $1.4B。除非 Tabby 的 GMV
              使用更宽定义（总结账金额而非 BNPL 特定交易量）、市场增长极快，或其中一个估计存在重大错误，否则这两个数字彼此冲突。投资人应先厘清这一差异，再用任一数字估算市场份额。
            calloutType: risk
            claimRefs:
              - CM009
              - CM011
              - CM013
          - type: callout
            title: 伊斯兰金融兼容性是被低估的结构性驱动
            body: >-
              在 MENA，BNPL 产品的免息结构不只是营销卖点——它移除了一道真实的宗教和文化障碍，这道障碍历史上压低了较虔诚穆斯林消费群体的信用卡采用。美国或欧洲 BNPL 市场没有这项结构性顺风，也部分解释了为什么
              MENA BNPL 能从更低基线实现更快渗透。
            calloutType: insight
            claimRefs:
