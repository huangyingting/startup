      - number: '3.2'
        title: 竞争对手画像 — 规模、融资与策略
        blocks:
          - type: paragraph
            body: >-
              Tamara 是 Tabby 最直接、资金实力也最可信的竞争者。Tamara 总部位于利雅得，2022–2023 年从 Coatue Management 和 Checkout.com 获得一轮 Series
              B（多家来源报道为 $210M），使其成为 Tabby 之外 MENA 资金最充足的 BNPL 初创公司之一。Tamara 持有 SAMA BNPL 牌照，聚焦沙特消费者市场。其产品范围包括 Pay in
              3、Pay in 4、Tamara 购物应用，以及与 Shopify 和 WooCommerce 的商户集成。Tamara 似乎没有类似 Tabby Card 或 Tabby Plus 的借记卡或订阅产品；如果
              Tabby 的超级应用策略跑通，这就是一处差异化缺口。截至研究截止日，没有公开的 Tamara 经审计收入或 GMV 数据。Postpay 是一家阿联酋 BNPL 运营商，成立于 2019
              年。它获得包括风投在内的投资人支持，并由阿联酋央行发牌。Postpay 产品范围比 Tabby 更窄，聚焦阿联酋商户的 Pay-in-4。收入或用户数没有重要公开数据。Postpay
              足迹似乎主要在阿联酋，未披露沙特牌照，因此对阿联酋市场段以外的威胁有限。Cashew 总部位于迪拜，是在阿联酋和沙特经营的 BNPL 运营商，瞄准与 Tabby
              相似的消费者和商户群体，尤其是时尚和生活方式垂直领域。Cashew 已融资，但规模远低于 Tabby 或 Tamara。Spotii 是一家阿联酋 BNPL 初创公司，2021 年被 Zip
              Australia（ASX: ZIP）收购，成为 MENA 第一笔重要 BNPL 并购交易，也证明全球运营商对该地区有兴趣。Zip 收购后，Spotii 似乎已并入 Zip 全球业务，对 MENA
              特定增长的持续投入有限。Klarna 是全球最大私营 BNPL 公司，GMV 超过 $7B，业务覆盖 20+ 国家；截至 2026 年初，尚未进入 MENA 市场。如果 Klarna 获得 SAMA 和
              CBUAE 牌照，并利用全球品牌认知进入，将构成对 Tabby 高端市场地位最重大的竞争威胁。
