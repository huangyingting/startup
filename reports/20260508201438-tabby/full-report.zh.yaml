  - id: FR002
    title: 风险传导图
    type: dag
    claimRefs:
      - CR002
      - CR003
      - CR007
      - CR020
      - CR026
      - CR028
      - CR033
      - CR037
    data:
      nodes:
        - id: sama-tightening
          label: SAMA 监管收紧
          detail: SAMA 提高资本要求、信贷限额，或对包括 Tabby 在内的 BNPL 许可持有人施加不利牌照条件
        - id: licence-loss
          label: SAMA 许可未续期
          detail: SAMA 拒绝续期或实质性限制 Tabby 的 BNPL 许可；KSA 运营被叫停或受限
        - id: ksa-revenue-loss
          label: KSA 收入损失
          detail: 沙特阿拉伯收入流失（用户基础 80%+）；KSA 2025 年 $378M 收入面临风险
        - id: ipo-failure
          label: IPO 执行失败
          detail: 因监管不确定性、CMA 申报失败或不利市场环境，Tadawul IPO 推迟或取消
        - id: jpmorgan-risk
          label: JPMorgan 授信承压
          detail: 信用损失恶化触发契约违约，或 JPMorgan 降低授信可用额度
        - id: liquidity-crunch
          label: 流动性紧缩
          detail: 营运资本约束迫使 GMV 缩减；需要昂贵再融资或紧急股权融资
        - id: gmv-stall
          label: GMV 增长停滞
          detail: 交易量增长急剧放缓；商户和消费者信任被侵蚀
        - id: fee-compression
          label: 竞争性费率压缩
          detail: Tamara 和全球 BNPL 新进入者压低 Tabby MDR；综合抽成率同比下降
        - id: margin-decline
          label: 利润率下降
          detail: 每单位 GMV 收入跌破盈亏平衡阈值；盈利反转为亏损
        - id: credit-loss
          label: 信用损失激增
          detail: 宏观驱动的消费者逾期或欺诈激增，显著推高净核销率
        - id: valuation-reset
          label: 估值重置
          detail: IPO 前老股交易隐含估值 $4.5B，后续估值下调；Series F 过桥融资需要接受更低价格
      edges:
        - from: sama-tightening
          to: licence-loss
        - from: licence-loss
          to: ksa-revenue-loss
        - from: ksa-revenue-loss
          to: ipo-failure
        - from: jpmorgan-risk
          to: liquidity-crunch
        - from: liquidity-crunch
          to: gmv-stall
        - from: gmv-stall
          to: ipo-failure
        - from: fee-compression
          to: margin-decline
        - from: margin-decline
          to: ipo-failure
        - from: credit-loss
          to: jpmorgan-risk
        - from: credit-loss
          to: margin-decline
        - from: ipo-failure
          to: valuation-reset
  - id: FR003
    title: 依赖关系图
    type: dag
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR023
      - CR024
    data:
      nodes:
        - id: tabby-core
          label: Tabby 平台
          detail: 核心 BNPL 交易引擎、信用评分、Tabby Card、Tabby Plus、Tabby Shop、Tweeq 钱包——合并口径覆盖全部经营主体
        - id: sama
          label: SAMA（沙特央行）
          detail: 发放并续期 BNPL 许可和 Tweeq EMI 牌照；审批新产品；为沙特业务设定资本和行为规范要求
        - id: jpmorgan
          label: JPMorgan $700M 融资额度
          detail: 提供应收账款证券化周转资金；让 BNPL 资产池循环周转；作为主要债务交易对手，也带来单一放款人集中风险
        - id: visa
          label: Visa 卡网络
          detail: 以 Visa 借记卡形式发行 Tabby Card；为商户结算拨款提供卡网络通道；是 Tabby Card 产品的关键基础设施
        - id: mastercard
          label: Mastercard 网络
          detail: 用于商户结算的第二支付通道，也可能承接替代发卡；小幅降低单一网络集中度
        - id: cloud-infra
          label: 云基础设施
          detail: 承载 Tabby 平台、评分模型、交易处理和 PII 数据存储；可能是 AWS 或 GCP；关键运营依赖
        - id: ksa-banking
          label: 沙特银行合作伙伴
          detail: 沙特持牌银行，提供结算账户、资金托管和本地支付基础设施接入；Tabby 连接沙特支付体系的接口
        - id: tweeq
          label: Tweeq EMI（已收购）
          detail: 2024 年 9 月收购的沙特 EMI 牌照持有人；提供数字钱包、转账和消费基础设施；由 SAMA 监管，独立于 BNPL 许可
      edges:
        - from: tabby-core
          to: sama
        - from: tabby-core
          to: jpmorgan
        - from: tabby-core
          to: visa
        - from: tabby-core
          to: mastercard
        - from: tabby-core
          to: cloud-infra
        - from: tabby-core
          to: ksa-banking
        - from: tabby-core
          to: tweeq
        - from: tweeq
          to: sama
        - from: ksa-banking
          to: sama
  - id: FV001
    title: 建议逻辑
    type: flow
    claimRefs:
      - CV001
      - CV002
      - CV004
      - CV022
      - CV026
      - CV027
    data:
      nodes:
        - id: evidence-base
          label: 证据基础
          detail: >-
            Series E 轮估值 $3.3B（2025 年 2 月）、老股交易估值 $4.5B（2025 年 4 月）、2025E 沙特收入约 $378M、GMV 超 $10B、用户 15M、已连续盈利 2 年、IPO
            承销银行已进场。
          tone: neutral
        - id: thesis-assessment
          label: 投资逻辑评估
          detail: MENA 优先的 BNPL 领先地位得到证实；盈利能力由新闻来源验证；Tweeq 钱包上行空间真实，但仍处早期；顶级投行参与让 IPO 路径更可信。
          tone: positive
        - id: risk-assessment
          label: 风险评估
          detail: SAMA 监管风险高；信用损失披露不透明，影响显著；缺少经审计的合并账目；没有队列 / NRR 数据；优先股堆叠未知；IPO 时间不确定。
          tone: risk
        - id: valuation-assessment
          label: 估值评估
          detail: 老股交易 $4.5B 估值隐含 2025 年沙特收入 12-17x——相对 Klarna IPO 时 5.4x 偏高；定价已经押注近乎完美执行，安全边际有限。
          tone: warning
        - id: recommendation
          label: 投资建议
          detail: 观察 / 继续研究。置信度：中。风险：高。估值立场：偏高。当前价位进场，需要先看到 IPO 招股说明书和经审计账目。
          tone: neutral
        - id: diligence-path
          label: 尽调路径
          detail: 上调评级前必须拿到：经审计的合并 P&L、队列 NRR 数据、SAMA 牌照确认、IPO 招股说明书和优先股堆叠、信用损失率披露。
          tone: opportunity
      edges:
        - from: evidence-base
          to: thesis-assessment
        - from: evidence-base
          to: risk-assessment
        - from: thesis-assessment
          to: valuation-assessment
        - from: risk-assessment
          to: valuation-assessment
        - from: valuation-assessment
          to: recommendation
        - from: recommendation
          to: diligence-path
