      - number: '7.7'
        title: 缓释措施与放弃标准
        blocks:
          - type: paragraph
            body: >-
              Tabby 最强的风险缓释来自沙特阿拉伯连续两年的盈利记录，这给它留出了财务缓冲，足以顶住监管冲击、信用损失上行和竞争导致的费率压缩；这些压力足以拖垮尚未盈利的运营商。2025 年 KSA 净利润
              $55M，让公司在监管资本要求上调或损失拨备提高时有真实的经济弹性。盈利也强化了 SAMA 续许可的论点：一家盈利且合规的 BNPL 运营商，比持续烧钱的玩家更有资格拿到续期。JPMorgan
              关系本身也是风险缓释信号：JPMorgan 在承诺 $700M 应收账款融资前做了大量信用尽调，等同于为 Tabby 的信用损失模型背书。该融资额度初始关闭 18
              个月后仍可使用，说明损失率大概率仍在契约条款可接受范围内，但没有融资文件无法确认。Tabby 的投资者基础分散，包括 Mubadala Capital（Abu Dhabi 主权资本）、Hassana
              Investment Company（沙特养老金）、Wellington Management（机构投资者）和 Blue Pool Capital；如果 IPO
              时间表推迟，这既提供隐性治理稳定，也可能提供过桥资本来源。Tweeq 收购把收入从纯 MDR 扩展到钱包服务和支付基础设施，部分缓释商户费率长期压缩风险。投资逻辑的否决条件包括：（1）SAMA
              许可不续期，或条件出现重大不利变化；（2）JPMorgan 融资额度触发契约违约或不续期，使预付额度降至 $400M 以下；（3）信用损失率连续两个季度超过应收账款的 4%；（4）Series E 后 24
              个月内（即 2027 年 2 月前）未提交 IPO 文件；（5）CEO 离任且没有可信的继任公告；（6）重大数据泄露触发 PDPL 执法。任一否决条件出现，都应立即重新评估持仓。
