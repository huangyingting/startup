companyProfile:
  summary: >-
    Tabby 是 MENA 最有价值的风投支持创业公司，也是一家先买后付（BNPL）和消费者金融服务平台。公司 2019 年创立于迪拜，如今总部位于沙特利雅得。Tabby 已从单一 BNPL 产品，长成覆盖分期付款、内嵌 BNPL 的
    Visa 卡、订阅制权益计划、商品发现和买家保障的多产品金融服务平台。2024 年收购 Tweeq（持有 SAMA 牌照的数字钱包）以及 2026 年 4 月取得阿联酋储值支付工具牌照，把 Tabby
    的受监管版图推向全栈新银行能力。Tabby 已连续两年报告盈利，并正准备在沙特 Tadawul 证券交易所上市，JPMorgan、HSBC 和 Morgan Stanley 担任顾问。
