      - number: '8.5'
        title: 可比公司组分析
        blocks:
          - type: paragraph
            body: >-
              Tabby 的可比范围覆盖全球 BNPL 同行、MENA 区域运营商和相关并购交易。Klarna 是结构上最接近的可比对象——一家盈利的 BNPL 运营商，正准备 2025 年 IPO，按 2024 年收入
              $2.8B 估计估值 $15B，隐含约 5.4 倍收入。Klarna 的盈利规模和欧洲市场主导地位提供了最直接参照，但成熟度差异很大：Klarna 运营规模接近 Tabby 的 7 倍。Tabby 12–17
              倍收入倍数相较 Klarna 的 5.4 倍有显著溢价；MENA 更高增长轨迹和 Tabby 更小基数可以解释一部分，但要撑到 IPO，需要很强执行。Afterpay 于 2022 年被 Block（原
              Square）以约 $29B 收购，可作为有用的并购天花板基准，但该交易发生在 BNPL 周期峰值，当时增长压倒一切、利率接近零；今天这些条件不再复现。Tamara 是 MENA 最接近的直接竞争对手，在 KSA
              持有 SAMA 牌照，按 Series C 估计私募估值约 $1B，不到 Tabby 隐含估值的四分之一。这一相对溢价反映了 Tabby 的先发优势、用户规模和盈利能力。Zip 是 ASX 上市 BNPL
              公司，曾收购 Spotii 进入 MENA 市场，它提供了反面先例：其市值约 $500M AUD，说明没有清晰盈利能力时，BNPL 运营商很难在公开市场维持溢价倍数。可比分析支持 Tabby
              相对区域同行的溢价，但也显示其 IPO 时相较全球 BNPL 倍数存在实质压缩风险。
            claimRefs:
              - CV012
              - CV013
              - CV021
              - CV022
              - CV033
              - CV037
