      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Tabby 的监管风险架构，锚定在 2022 年 7 月获发的 SAMA BNPL 许可；该许可授权其在沙特阿拉伯王国开展先买后付业务。该许可受 SAMA 持续监管，
              续期条件——包括资本充足率门槛、消费者保护要求和信用额度上限——并未公开披露，构成重大尽调缺口。沙特更广泛的金融监管环境一直在收紧： SAMA 发布修订版 BNPL Service Providers
              Regulations，要求面向商户和消费者的信息披露，并强制收费结构透明。Tabby 符合 Shariah 的免滞纳金模式，在这些规则下具备结构性优势； 但如果 SAMA 把资本或运营要求提高到 Tabby
              当前水平之上，续期风险并不会消失。在阿联酋，阿联酋央行（CBUAE）于 2026 年 4 月向 Tabby 授予 Stored Value Facility（SVF）牌照，
              使其能开展受监管的支付业务。不过，CBUAE 面向授信提供方的 BNPL 专项监管框架在 2025-2026 年仍在演进，新通函可能施加更严格的信用敞口限制或披露义务。 科威特央行（CBK）的 BNPL
              监管仍处早期；考虑到 Tabby 已进入该市场，风险较低但不是零。沙特 Personal Data Protection Law（PDPL）于 2022 年生效、2024 年进入执法阶段； 鉴于 Tabby 拥有
              15M+ 消费者 PII 数据集，覆盖生物识别身份验证、支付历史和设备数据，PDPL 对其形成直接义务。若数据泄露或数据治理不足触发 PDPL 执法， Tabby 可能面临重大罚款和声誉损害。Tweeq 的
              SAMA EMI 牌照给 Tabby 增加第二条监管线，必须与 BNPL 许可并行维护，合规暴露面翻倍。 沙特和阿联酋的消费信贷披露规则在 2025 年持续收紧，法律顾问审查 Tabby
              当前面向消费者文件，是建议尽调步骤。留存来源中未发现 SAMA 对 Tabby 采取执法行动的公开记录。
