  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合概览
        blocks:
          - type: paragraph
            body: >-
              Tabby 已从单一 Pay-in-4 先买后付（BNPL）产品，扩展成一个多产品金融平台，服务沙特、阿联酋和科威特的消费者与商户。核心 Pay-in-4 产品把任意消费拆成六周内四期等额免息分期；自 2023
              年起不再收取滞纳金，因此完全符合 Shariah 要求。[CE001] Tabby Card（Visa 网络）把 BNPL 授信和返现奖励延伸到全球任何接受 Visa
              的商户，摆脱了合作商户网络的边界。[CE002] Tabby Plus 是 SAR 19/month 的订阅层，提供高级返现和商户优惠，给收入结构增加经常性层，也加深消费者参与。[CE003] Tabby
              Shop 是 App 内商户发现和购物入口，消费者可以浏览 40,000+ 合作商户并获取独家优惠，Tabby App 因而从支付工具变成商业入口。[CE004] Tabby Care
              为高价值电子产品和商品交易增加购买保护与保修覆盖。[CE005] 最关键的是，2024 年 9 月收购 Tweeq——一家持有 SAMA EMI 牌照的数字钱包初创公司——把储值钱包能力和 P2P
              转账功能带入平台，让 Tabby 得以把自己定位成面向 MENA 消费者的完整新银行挑战者。[CE006] 2026 年 4 月，Tabby 从 CBUAE 获得阿联酋 Stored Value
              Facility（SVF）牌照，在阿联酋市场解锁同等钱包能力。[CE037] 这组产品都集中在一个评分 4.8 的 App 内，拼出了消费者金融超级 App；区域内还没有其他 BNPL 玩家能在相近规模上复制。
            claimRefs:
