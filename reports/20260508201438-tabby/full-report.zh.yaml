      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Tabby 最集中的合作伙伴依赖，是 JPMorgan 安排的 $700M 应收款证券化额度；该额度最早在 2023 年 12 月作为 Series D 扩展的一部分宣布。 这是 Tabby 回收 BNPL
              应收款账本、并在单靠股权资本无法支撑的水平上继续支持 GMV 增长的主要营运资本机制。该额度的具体条款——利率、到期日、预支率、稀释约束条款、表现触发条件和续期条件——未公开披露。 如果 JPMorgan 因
              Tabby 应收款组合信用恶化而降低额度可用性、基于损失率触发约束条款，或到期后拒绝续期，Tabby 的 GMV 容量将受到严重限制。 公司将不得不在昂贵替代融资和削减 GMV 增长之间选择；两者都会显著削弱
              IPO 逻辑。Visa 与 Mastercard 网络依赖集中在 Tabby Card 产品上，该产品以嵌入 BNPL 能力的 Visa 借记卡形式发行。网络停机、费率表变化，或影响沙特 /
              阿联酋的制裁相关网络限制，都可能扰乱 Tabby Card 运营。商户付款的支付处理基础设施同样依赖卡网络通道，形成双重暴露。 云基础设施依赖——最可能是 AWS 或
              GCP——则带来业务连续性风险；若区域云可用区在交易高峰长时间宕机，业务会受到影响。新产品上线和业务模型延伸受 SAMA 审批依赖， 这是创新速度的结构性拖累。Tabby 扩展 Tweeq
              钱包功能、推出新信贷产品或进入新垂直领域，都被 SAMA 监管审批时间表卡住，审批可能延续数月。 Tweeq EMI 牌照又放大了这种依赖，因为它要求持续满足 SAMA
              合规并限制部分钱包活动。提供清结算服务的沙特银行伙伴构成另一层依赖，其合同条款和集中度并不公开。
