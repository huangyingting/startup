      - number: '6.4'
        title: 留存、复购与满意度
        blocks:
          - type: paragraph
            body: >-
              Tabby 的留存和复购证据较为混合：盈利能力和 App 参与度释放了强代理信号，但公开披露的队列或留存指标几乎为空。[CU035] 最可靠的留存代理指标，是 Tabby
              连续两年实现盈利——这个结果与大规模消费者流失在结构上不相容，因为 BNPL 单位经济需要复购交易量来摊销获客和入驻成本。[CU009] Tabby App 在 iOS 和 Android 平台评分为
              4.8，公司在官方沟通中引用这一消费者满意度数字。[CU008] 在 MENA 移动金融市场，高 App Store 评分是有意义的满意度指标， 因为消费者可选替代很多——Tamara、Postpay 和
              Cashew 都在争夺同一分期授信需求。Tabby Plus 是 SAR 19/month 的订阅层，提供高级返现和独家商户优惠，构成明确留存机制： 订阅者为了用现金返还赚回订阅费，在经济上有动机把购买导向
              Tabby。[CU011] Tabby Shop 声称其商户发现入口拥有 20 million+ 购物者，把参与从销售点向外延伸， 在即时购买意图之外制造发现循环式回访。[CU012]
              仍未公开的数据包括消费者队列留存率、商户账户净留存率（NRR）、总商户留存率、净推荐值（NPS）、信用违约或欺诈指标。[CU036] Trustpilot
              上的独立反向证据显示，消费者投诉集中在商户争议解决延迟和授信审批体验不一致；这与官方 4.8 评分主张构成定性反向参照。[CU019]
            claimRefs:
              - CU008
