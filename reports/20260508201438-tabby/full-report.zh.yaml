      - number: '8.3'
        title: 融资背景与估值历史
        blocks:
          - type: paragraph
            body: >-
              Tabby 的融资历史是一条纪律较强的台阶式上行路径：从种子资本，经过五轮机构融资，到老股市场 $4.5B 估值。Series A（2021 年，约融资 $50M）在 KSA 建立了初始 BNPL
              产品。Series B（2022 年）把公司推到接近独角兽的位置。随后 Series C 建立了商户网络规模。标志性 Series D 于 2023 年 11 月关闭，估值 $1.5B，融资
              $200M，投资方包括 Wellington、STV、Mubadala、PayPal Ventures 和 Hassana；这一财团奠定了 Tabby 的机构可信度。与 Series D 同期，JPMorgan
              在 2023 年 12 月安排了 $700M 应收账款证券化融资，大幅扩展 Tabby 的 GMV 承载能力，同时不增加股权稀释。该融资额度是整个 BNPL
              应收账款簿的营运资本引擎，也是资本结构中最高的单一交易对手依赖。2025 年 2 月的 Series E 以 $3.3B 估值融资 $160M，较 Series D 上涨 2.2
              倍，由老股东领投，说明机构需求仍在。2025 年 4 月的老股市场交易隐含 $4.5B 估值，仅八个月又上台阶 36%，显示二级买家押注 IPO 重估。JPMorgan、HSBC 和 Morgan Stanley
              已被聘为 IPO 投行，Tabby 的目标主要上市地是 Saudi Tadawul。分析师和新闻来源最常提到的 IPO 窗口是 2026–2027 年，但公司尚未正式提交文件。所有轮次累计股权融资超过
              $650M，加上 JPMorgan 债务融资额度，Tabby 已获得的融资总额约 $1.35B，为 IPO 进程提供了充足跑道和 GMV 容量。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV005
              - CV010
              - CV011
              - CV018
              - CV044
              - CV045
              - CV047
              - CV048
      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >-
              三个估值情景框定了从 $4.5B 老股价格出发的回报区间。乐观情景假设 2026–2027 年 IPO，以 2026 年估计收入 $600M 为基数、约 20 倍远期收入定价，隐含 $6B-$8B IPO
              估值。该情景要求 Tweeq 钱包月活用户在 12 个月内超过 2 million，UAE 扩张对集团收入形成实质贡献，且 SAMA 监管环境温和。回报逻辑是在持有 3–4 年内，相较 $4.5B 老股价格上涨
              33–78%；前提是随着钱包收入贡献提高，公开市场把公司从私人 BNPL 倍数重估为多元化金融科技倍数。概率信号为低至中：可以做到，但需要多个战略项目同时执行成功。基准情景目标是 2027 年 IPO，以
              2027 年估计收入 $520M 为基数、约 15 倍远期收入定价，隐含 $4.5B-$6B 估值。该情景假设 KSA 主导的增长沿当前轨迹继续，UAE 贡献适中，SAMA 没有实质收紧，Tweeq
              钱包贡献温和。回报逻辑是在 2–3 年内相较 $4.5B 上涨 0–33%——除非公开市场在 IPO 时给予溢价倍数，否则基本持平到小幅收益。概率信号为中等，只要执行守住，就符合当前轨迹。悲观情景假设 SAMA
              收紧并封顶信用额度，IPO 推迟到 2027 年之后，Tamara 带来的竞争费率压力挤压商户利润率，使 2026 年收入停在 $350M。按 8–10 倍受压倍数，估值降至
              $2.5B-$3.5B，较当前老股价格亏损 22–44%；如果 IPO 推迟到 2028 年之后，还可能触发下行轮。概率信号为低至中：考虑到 SAMA 监管不确定性，这是不可忽视的尾部风险。
