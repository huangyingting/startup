chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部和商业模式
        blocks:
          - type: paragraph
            body: >-
              Tabby 是一家先买后付（BNPL）和消费者金融服务平台，2019 年由 Hosam Arab（CEO）和 Daniil Barkalov（CTO/COO）在阿联酋迪拜创立。公司最初在迪拜运营；为筹备在沙特
              Tadawul 证券交易所上市，后来把总部迁至沙特利雅得。截至 2025 年初，Tabby 自称是 MENA 领先的购物和金融服务应用，提供四个核心产品：Pay in 4（四期免息 BNPL）、Tabby
              Card（内嵌 BNPL 能力的 Visa 借记卡）、Tabby Plus（约 SAR 19/月的订阅制权益计划）和 Tabby Shop（商品发现和商户市场入口）。公司还提供 Tabby
              Care，即买家保障和购买质保产品。2024 年 9 月，Tabby 收购持沙特牌照的电子货币机构 Tweeq，补上了数字钱包基础设施，可支持消费、转账和资金管理。2026 年 4 月 15 日，阿联酋央行授予
              Tabby 储值支付工具牌照，把其受监管支付版图延伸到阿联酋市场。Tabby 的核心商业模式来自商户折扣收入：零售商为在结账环节提供 BNPL，按交易额向 Tabby
              支付一定比例费用。平台服务沙特、阿联酋和科威特消费者，其中沙特贡献超过 80% 的用户基础。截至 2025 年初，Tabby 拥有 20M+ 注册用户、40,000+ 合作商户，年化 GMV 超过
              $10B，已成为沙特主导 BNPL 运营商，并在更广的 MENA 区域具备重要影响力。
