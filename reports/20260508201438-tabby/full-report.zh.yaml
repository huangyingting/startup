      - number: '8.6'
        title: 退出准备度与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              相比大多数 IPO 前增长公司，Tabby 的 IPO 准备度已明显更高。KSA 连续两年盈利（2024 年和 2025 年）、自 2022 年 7 月以来维持 SAMA 牌照合规、2026 年 4 月取得
              UAE CBUAE SVF 牌照，以及聘请 JPMorgan、HSBC 和 Morgan Stanley 担任 IPO 投行，合在一起都指向公司正处于积极的 IPO 前准备期。Saudi Tadawul
              上市目标也契合 Saudi Vision 2030，并提供理解 Tabby 监管语境的本土投资者基础；相比跨境上市，这是结构性优势。但在做出高确信投资决定前，仍有六项重大尽调事项未完成。覆盖
              KSA、UAE、科威特和 Tweeq 实体的经审计合并财务报表，可确认集团层面盈利，而不是只看 KSA 披露指标。队列留存和 NRR 数据可验证客户经济性和重复购买率的可持续性。IPO 招股书条款可厘清 IPO
              后稀释、优先股转换以及 IPO 募资对现有持有人的分配。建模不同 IPO 定价情景下的投资者回报，还需要股权结构表和优先股堆叠细节。经审计账目披露的信用损失拨备率，可独立验证报告中的 $55M
              净利润是基于保守还是激进拨备。最后，必须直接确认 SAMA 牌照续期条件和条款，以评估对 IPO 时间线最严重的单一监管风险。没有这些材料，观察 /
              继续研究仍是合适姿态——公司值得跟踪，但以当前估值投入资金前，需要多得多的证据。
            claimRefs:
              - CV004
              - CV010
              - CV011
              - CV027
              - CV028
              - CV029
              - CV030
              - CV032
              - CV039
