            title: 消费者切换成本结构性偏低——真正战场在商户获取
            body: >-
              MENA BNPL 消费者几乎没有切换成本：每个应用几秒即可安装，基础 BNPL
              没有月费，消费者收益取决于商户覆盖而非运营商偏好。因此，竞争护城河在商户层面赢或输：哪个运营商商户覆盖更深，就能吸引更多消费者使用，进而吸引更多商户。若 Tabby 的 40K+
