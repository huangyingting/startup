      - number: '2.4'
        title: 增长驱动、采用约束和风险
        blocks:
          - type: paragraph
            body: >-
              MENA BNPL 采用的主要结构性驱动包括：（1）正式信贷渗透率低——沙特信用卡渗透率显著低于发达市场，BNPL 填补了数字活跃但信贷不足消费者的缺口；（2）年轻人口结构——18–35 岁人口占比高，这是全球
              BNPL 的核心人群；（3）Saudi Vision
              2030——国家转型计划明确瞄准无现金经济和金融包容，为金融科技运营商提供监管顺风和主权主体背书；（4）电商增长——沙特电商渗透率从低于美国或欧洲的基数快速增长，扩大了可服务结账触点池；（5）伊斯兰金融兼容性——免息
              BNPL 与伊斯兰金融原则结构上兼容，移除了信用卡在较虔诚消费者群体中的一项障碍。采用约束和风险包括：（1）监管不确定性——沙特 BNPL 监管（SAMA 框架 2022
              年生效）和阿联酋监管仍在演进；资本、消费者保护或征信报告方面的新要求，可能抬高运营成本或限制增长；（2）竞争——Tamara 是资金实力可信的沙特 BNPL 玩家，Klarna 等全球运营商也可能进入
              MENA；（3）信用风险——BNPL 运营商把信用风险留在账上；在信贷档案较薄的消费者群体中，违约数据不足、风控模型较新，形成尾部风险；（4）商户 MDR 压缩——BNPL 商品化后，商户议价能力增强，会压缩
              MDR 费率，直接影响 Tabby 的单位 GMV 收入；（5）消费者多栖——消费者可以轻松在不同商户使用多个 BNPL 应用，限制网络锁定。Vision 2030 和无现金经济是最耐久的结构性顺风；MDR
              压缩和监管收紧则是最重大的中期风险。
