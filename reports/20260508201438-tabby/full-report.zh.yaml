          - type: callout
            title: 风险 — 消费者队列与留存数据未公开披露
            body: >-
              Tabby 核心留存指标——消费者队列留存、月活跃用户率、商户 NRR 以及 Tabby Plus 订阅者流失率——均未公开披露。 投资人和收购方无法独立判断 15M
              注册用户基础究竟是一个持久、活跃的队列，还是很大程度上沉睡的历史累计数。代理指标（盈利能力、App 评分）与健康留存相符，但不能替代队列级证据。
              这是任何投资或收购决策前最主要的尽调缺口，需要直接接触管理层并获取数据室访问。
