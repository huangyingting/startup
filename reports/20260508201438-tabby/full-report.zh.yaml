          - type: callout
            title: 风险 — 头部商户 GMV 集中度未知，公开数据无法量化
            body: >-
              Tabby 不披露前 10 或前 25 大商户伙伴的 GMV 贡献。考虑到 Amazon、Noon 和主要零售集团（Al Futtaim、Landmark、Apparel Group）共同覆盖最高交易量的
              BNPL 零售品类，少数关系贡献总平台 GMV 的 30-50%+ 在结构上是可能的。失去一个头部商户——无论源于竞争替代、自研 BNPL，还是关系恶化——都可能实质影响收入。 没有直接进入数据室查看商户 GMV
