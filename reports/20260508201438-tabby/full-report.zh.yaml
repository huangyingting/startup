  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重性排序
        blocks:
          - type: paragraph
            body: >-
              Tabby 的风险画像覆盖六个不同领域：监管 / 法律、运营 / 安全、合作伙伴 / 依赖、财务 / 模型、人员 / 执行，以及竞争。其中监管收紧最严重，因为 Tabby 的 SAMA BNPL
              许可支撑了其在沙特超过 80% 的用户基础。许可不续期或附加条件发生重大变化，会触及沙特业务生存线，并很可能推迟或打乱计划中的 Tadawul IPO。IPO 执行风险排在第二： 市场窗口不确定、Saudi
              CMA 招股书要求以及强制性经审计合并账目，都是实质执行障碍，可能显著拖慢时间表。第三严重的是 $700M JPMorgan 应收款证券化额度—— 单一交易对手为整个 BNPL
              应收款账本提供营运资本引擎。一旦该额度触发条款违约、信用恶化事件或不续期，Tabby 的 GMV 容量会受限，被迫接受昂贵再融资或股权稀释。 来自最接近沙特 BNPL 对手 Tamara 以及 Klarna
              等全球进入者的竞争，会压缩商户费经济性，并在多年维度制造 MDR 下行风险。运营风险——平台可用性、欺诈和数据安全——评为中高， 因为涉及 15M+ 用户 PII
              暴露；不过截至目前，公开记录中没有重大事件，提供了有限安慰。人员风险集中在 Hosam Arab：他的公开形象、投资人关系和运营领导力形成关键人依赖， 但 CTO/COO Daniil Barkalov
              的技术和运营深度提供了部分缓释。连续两年盈利（沙特 2024 和 2025）实质降低了财务模型风险，形成现金缓冲；若在更早融资阶段，监管或竞争冲击本会更具破坏性。
