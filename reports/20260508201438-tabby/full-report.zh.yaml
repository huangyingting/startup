      - number: '5.6'
        title: 信任、安全与监管合规
        blocks:
          - type: paragraph
            body: >-
              Tabby 的监管合规架构在 MENA BNPL 运营商中最强。SAMA 于 2022 年 7 月向 Tabby 授予 BNPL 许可，是 GCC 最早一批同类牌照之一，允许其在沙特阿拉伯开展消费者分期授信业务，
              同时受消费者保护、AML/KYC 和信用披露要求约束。[CE035] 2024 年 9 月收购 Tweeq 后，Tabby 的监管组合又增加 SAMA EMI 牌照， 使其能在 BNPL
              分期授信之外运营储值钱包、发行电子货币并处理支付。[CE036] 2026 年 4 月，Tabby 获得阿联酋央行 SVF 牌照，可以为阿联酋消费者提供储值钱包服务， 完成双市场监管授权，也把 Tabby 推向
              GCC 新银行竞争者的位置。[CE037] Tabby 在 2023 年取消滞纳金，并明确引用 Shariah 合规，这是监管和声誉双重差异化。 不靠滞纳金收入，意味着 Tabby
              收入模型与消费者利益更一致，降低监管审查风险，也在虔诚穆斯林消费者中建立品牌信任。[CE038] 数据安全受沙特 Personal Data Protection Law（PDPL）和阿联酋数据保护规则管辖，
              Tabby 隐私政策披露了数据处理和留存做法。截至 2026 年 5 月，公开渠道没有报告重大数据泄露。[CE039] 主要信任缺口在于，Tabby 未披露信用损失率、违约表现指标，也没有公开的 SAMA
              合规检查或执法记录。没有私有数据室访问，投资人无法独立验证 Tabby 信用风险管理质量。[CE023] 公开渠道未发现针对 Tabby 的不利监管行动或制裁，不过鉴于 SAMA
              执法实践不公开，缺少证据并不能形成结论。
