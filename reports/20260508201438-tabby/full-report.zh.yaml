      - number: '7.5'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >-
              Tabby 的财务模型风险集中在三项结构性脆弱点：信用损失拨备不透明、竞争动态导致商户费压缩，以及符合 Shariah 的免滞纳金结构对收入模型的影响。 Tabby 的 BNPL
              应收款组合如何计提信用损失拨备，并未公开披露。公司声称在沙特连续两年盈利；但没有经审计合并账目，无法验证损失拨备设定是保守还是激进。 在 $10B+ 年化 GMV 组合上，净信用损失率上升 1% 就可能带来
              $100M+ 额外拨备——足以完全抹掉所报告的 $55M 沙特净利润。缺少 Vintage 损失曲线、90 天逾期数据和核销率，是最关键的财务尽调缺口。 商户费压缩是结构性长期风险。Tabby
              收入主要来自结账时向零售商收取的商户折扣率（MDR）。当 Tamara、Postpay、Cashew 和潜在全球进入者争夺同一批商户关系时， 价格竞争可能在 24-36 个月周期内压低综合 MDR。Klarna
              在欧洲市场的经历——竞争加剧后 MDR 从 3-4% 降到低于 2%——为 MENA 市场提供了令人担忧的先例。 免滞纳金模式虽然合规且符合 Shariah，但拿掉了 Afterpay、Zip 等全球 BNPL
              竞争对手历史上依赖的重要收入杠杆。因此，Tabby 的收入天花板纯粹取决于 MDR 和相邻变现： Tabby Plus 订阅、Tabby Card 交换费以及 Tabby Shop 联盟佣金。IPO
              前烧钱速度和现金跑道未公开披露；不过，公司在 2025 年 2 月 Series E 融资 $160M，若没有重大的信用损失事件或监管扰动，预计足以支撑 12-18 个月内提交 IPO 文件。集团层面收入（沙特
              + 阿联酋 + 科威特 + Tweeq）并未公开披露； 如果阿联酋或科威特业务亏损，$378M 沙特 2025 收入数字可能高估集团盈利能力。
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
              - CR031
      - number: '7.6'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              联合创始人兼 CEO Hosam Arab，是 Tabby 领导结构中最高的关键人依赖。Arab 曾创办并出售 MENA 领先电商平台 Namshi，这段记录从一开始就建立了 Tabby
              的投资人可信度和商户信任网络。他的公众形象、媒体曝光和投资人沟通职责，使其成为公司最主要的对外面孔。公司未公开披露 CEO 继任计划或副 CEO，
              这意味着任何意外离任——无论自愿、健康相关，还是治理驱动——都会在最敏感的 IPO 前阶段制造重大领导不确定性。Namshi 类比有两面性： Arab 从 Namshi
              成功退出，既证明执行纪律，也显示创始人可能有流动性兑现诉求，出于个人资产组合原因加速 IPO 时间表。联合创始人兼 CTO/COO Daniil Barkalov 是第二个关键人集中点。 作为 Tabby
              核心信用评分、支付处理和平台基础设施架构师，Barkalov 离开会造成技术领导断层，在 Tweeq 基础设施集成期间拖慢产品开发并抬高运营风险。
              创始双人组之下的更广泛高管梯队深度未公开披露，限制了对继任质量的评估。IPO 执行风险重大且多维。Saudi CMA 要求提供覆盖所有运营实体的完整经审计合并财务报表； 如果尚未启动，准备过程可能需要 12-18
              个月。市场时点风险真实存在：沙特 Tadawul 市场环境恶化、区域地缘政治事件，或全球 BNPL 板块估值下修（跟随 Afterpay、Zip 或 Paidy 的估值修正）， 都可能在 Tabby
              提交文件前关闭 IPO 窗口。聘请 JPMorgan、HSBC 和 Morgan Stanley 担任 IPO 顾问释放了严肃性信号，但顾问授权并不保证执行成功。
