    columns:
      - 扩张驱动因素
      - 集中风险
      - 影响
      - 尽调路径
    rows:
      - - UAE SVF 牌照（2026 年 4 月）
        - 相比 KSA，UAE 市场目前渗透不足；拿到牌照不等于消费者会采用钱包产品
        - 可在 UAE 推出储值钱包、预付卡和 P2P 转账，把产品 TAM 从 BNPL 结账显著扩到更宽的金融场景；估计 UAE 消费金融 TAM 超过 $5B
        - 确认产品上线日期和功能范围；评估 UAE 消费者对 Tabby 钱包和 BNPL 的认知差异；梳理 UAE 钱包赛道竞争格局（Postpay、Cashew）
      - - Tabby Plus 订阅
        - 订阅用户数和流失率未知；若订阅基数较小，收入与留存贡献会被高估
        - 每位订阅用户每月贡献经常性 SAR 19；提高复购的经济动机；降低高频购物者的价格敏感度
        - 索取按市场拆分的订阅用户数、月流失率和平均订阅用户 LTV；确认 Tabby Plus 是否已覆盖 UAE 和科威特
      - - Tweeq 钱包整合（KSA）
        - 整合时间表不确定；SAMA EMI 牌照合规增加运营复杂度；收购后 Tweeq 工程团队能否留住仍是风险
        - 向 KSA 用户加入储值钱包、P2P 转账和薪资入账能力；把 Tabby 从结账支付工具推向主要金融账户
        - 确认完整整合上线日期；复核 SAMA EMI 合规审计状态；评估收购后 Tweeq 用户留存和技术整合里程碑
      - - 商户结构集中度
        - 前 10 大商户 GMV 贡献未知；结构性风险在于 Amazon、Noon 和大型零售集团可能贡献超过总 GMV 的 50%
        - 若失去一家头部商户（例如 Amazon 转向自建 BNPL），总 GMV 和收入可能受到实质冲击；头部商户按规模压低 MDR，也会挤压利润率
        - 索取按商户队列十分位拆分的 GMV；确认前 10 大商户占比；复核前 20 大 GMV 商户的合同条款、独家安排和续约条款
      - - KSA 监管集中度（SAMA）
        - 超过 80% 用户基数处于单一监管方（SAMA）之下；SAMA 政策变化可能影响大部分收入
        - SAMA BNPL 许可条款、授信上限或消费者保护规则一旦转向不利，将直接影响 Tabby 80% 以上收入和用户
        - 跟踪 SAMA BNPL 监管动态；复核 Tabby 合规体系；确认 SAMA 检查历史，以及是否有合规缺口往来函件
    notes: Tabby 未公开披露集中风险指标。地理用户分布和商户 GMV 集中度估计来自公司披露说法和独立新闻报道；精确数字需要直接通过数据室验证。
