      - number: '4.2'
        title: 单位经济、利润率和盈利能力
        blocks:
          - type: paragraph
            body: >-
              Tabby 报告了沙特业务首次净利润：2025 年上半年 SAR 90.4M（约 $24M），在 2025 年上半年同比改善 360%。2025 全年净利润据报约 $55M（或在 $378M 收入上实现
              14.5% 净利率）。若这些数字准确，它们说明 Tabby 的 BNPL 模式在沙特规模化后可以盈利——这是计划中的 Tadawul IPO 前的正面信号。不过，若干单位经济组成部分尚未公开：毛利率（MDR
              收入减信用损失和支付处理成本）、获客成本（CAC）、客户终身价值（LTV）、90 天重复使用率、各放款批次（vintage）损失率，以及运营费用结构。BNPL 毛利结构关键取决于信用损失率：对 0%
              利息的消费者产品而言，Tabby 每笔交易毛利等于收取的 MDR，减去违约分期的信用损失和支付处理成本。在 MENA 信贷档案较薄的消费者市场，承保质量至关重要。违约率上升 1%，可能吞掉 20–50%
              毛利，具体取决于 MDR 水平。Tabby 在沙特 2024 至 2025 年收入增长 42%，符合一个成熟 BNPL 业务达到规模效率后的增长轨迹。2025 年上半年约 12–15% 的利润率（SAR
              90.4M 对应估计上半年收入 SAR 600-700M）表明经营杠杆开始发挥作用；但没有经审计账目，外部投资人无法高置信度承销这些数字。跨市场盈利能力（阿联酋和科威特）未知。集团合并财务——包括 Tweeq
              收购成本、JPMorgan 证券化额度利息成本，以及阿联酋和科威特市场亏损——可能与沙特单体数字有重大差异。
