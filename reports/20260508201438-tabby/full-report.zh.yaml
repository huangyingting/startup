  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式和收入来源
        blocks:
          - type: paragraph
            body: >-
              Tabby 的主要收入来源是商户扣率（MDR），向在结账环节集成 BNPL 的零售商收取。MDR 是每笔交易金额的一定比例，由商户付给 Tabby，换来向消费者提供免息分期付款，并由 Tabby
              承担分期账簿上的信用风险。MDR 费率未公开披露，但全球 BNPL 同业会根据品类和商户规模收取 1–6%。对 Tabby 的主市场沙特而言，2025 年报告收入 $378M（高于 2024 年 $267M，增长
              42%）只代表沙特，不是所有市场合并口径。KSA、阿联酋和科威特之间的精确收入拆分未披露。次要收入流包括：Tabby Plus（消费者每月 SAR 19 的订阅，获取权益和优惠）、Tabby Card
              手续费收入（未披露）、Tabby Shop 商品发现带来的联盟 / 推荐收入，以及 Tabby Care 买家保障覆盖向商户收取的费用。这些非 MDR
              收入当前估计只占总收入一小部分，但代表了走向直接消费者变现的战略方向。BNPL 平台的收入确认方法很重要：Tabby 很可能在商户交易发生时确认 MDR
              收入（按促成交易全额的总额口径），或按扣除分期支付后的净额确认。会计处理会影响 Tabby 收入与 BNPL 同业的可比性。公司没有公开经审计财务报表。本章引用的所有收入数字，均来自新闻报道中转述的 Tabby
              公司声称（新闻稿和投资人沟通），尚未与经审计账目独立核对。
