      - number: '1.2'
        title: 创始人、领导层和治理
        blocks:
          - type: paragraph
            body: >-
              Hosam Arab 在 2019 年联合创办 Tabby；此前他联合创办中东时尚电商平台 Namshi 并担任 CEO，Namshi 后出售给 Global Fashion Group。这段区域电商运营经历，让
              Arab 直接看见消费者在结账环节遇到的摩擦，也构成了 Tabby BNPL 模式的创立逻辑。Tabby 的 CTO 兼 COO Daniil Barkalov 负责技术基础设施；Arab
              则提供商业和市场拓展经验。这对创始组合与 MENA 消费金融科技市场高度匹配：Arab 的 Namshi 履历为早期拿下区域零售商和投资人建立了信誉。由于 Tabby
              仍是私营公司，投资人基础实际上形成了一层非正式治理。Wellington Management 领投 Series D，给出机构级背书。Mubadala Capital（阿布扎比主权财富资本）和 Hassana
              Investment Company（沙特养老基金管理人）是重要股东，带来海湾主权资本，也带来隐含的软治理预期。沙特 风投 STV 和 Blue Pool Capital（香港）也持有有意义的股权。PayPal
              Ventures 参与 Series D，Tabby 是其投资的首家海湾金融科技公司。董事会构成和投票权结构尚未公开，这是投资人在 IPO 前尽调时的关键治理缺口。对 Hosam Arab
              的关键人物依赖被评为高：他的公开形象、媒体曝光和运营角色共同构成公司最主要的外部面孔。创始双人组以下的继任梯队深度尚未公开。
