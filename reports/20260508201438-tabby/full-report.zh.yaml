      - number: '8.2'
        title: 建议与置信度
        blocks:
          - type: paragraph
            body: >-
              当前 $4.5B 老股交易隐含估值下，Tabby 的建议是观察 / 继续研究，中等置信度，高风险评级。估值立场为偏高。该建议反映的是：公司搭得扎实，有可验证的盈利能力和可信 IPO
              路径，但定价几乎要求完美执行，安全边际有限。按 2025 年估计 KSA 收入的 12–17 倍计算，Tabby 的价格显著高于处于 IPO 就绪阶段的可比全球 BNPL 同行——Klarna 筹备 IPO
              时约为 5.4 倍收入——一旦信用损失、监管条件或 IPO 市场窗口出现重大不利变化，就可能产生明显估值下修。中等置信度来自 Tabby
              盈利和增长路径的公开证据基础较强，但也承认有三项重大信息缺口，使其无法成为高确信买入：（1）没有覆盖 UAE、科威特和 Tweeq
              等所有集团实体的公开经审计合并财务报表；（2）没有披露队列留存、净收入留存或客户终身价值数据；（3）没有 IPO 招股书、优先股堆叠细节或沙特 CMA 文件，无法厘清 IPO
              后稀释和投资者回报。要升为高确信买入，至少需要：经审计合并损益表确认集团层面盈利，队列数据支撑 NRR 高于 110%，确认 SAMA 牌照续期进展正常，以及披露 IPO 招股书以支持优先股堆叠分析。
