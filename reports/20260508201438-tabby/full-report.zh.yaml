      - number: '6.5'
        title: 扩张与地理集中度
        blocks:
          - type: paragraph
            body: >-
              Tabby 的地理扩张战略，以加深其主导性沙特地位为锚，同时系统性把平台模型延伸到阿联酋和科威特。[CU003] Tabby 注册用户基础中超过 80% 集中在沙特阿拉伯——
              这种结构性集中既是优势（渗透深、监管先发），也是风险（任何沙特特定监管、经济或竞争冲击都会影响绝大多数用户）。[CU034] 阿联酋是 Tabby 第二个活跃市场，2026 年 4
              月从阿联酋央行（CBUAE）获得 Stored Value Facility（SVF）牌照后，现有 BNPL 服务之外的完整钱包产品部署路径被打开。[CU016] SVF 牌照把 Tabby
              在阿联酋的监管身份从支付处理商抬升为持牌储值发行方——可以提供工资入账、P2P 转账和预付卡产品，把消费者关系延展到 BNPL 结账之外。[CU016] 科威特是 Tabby
              第三个运营区域，目前用户占比较小。[CU015] 2024 年 9 月收购 Tweeq——一家持有 SAMA EMI 牌照的数字钱包公司——使 Tabby 在既有监管牌照下获得沙特储值钱包能力，
              加深主导性沙特市场的钱包功能，并朝新银行定位推进。[CU013] 公司已公开释放在 Saudi Tadawul 交易所 IPO 的计划，并聘请 JPMorgan、HSBC 和 Morgan Stanley
              担任顾问； 上市会进一步锚定 Tabby 的沙特存在，并为下一轮地理和产品扩张提供资本。[CU038] MENA BNPL 市场预计将从约 $1.4 billion 增长到 $2.7 billion，
              为地理和垂直扩张提供结构性顺风。[CU017]
            claimRefs:
