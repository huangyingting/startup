      - number: '6.3'
        title: 具名商户客户证据
        blocks:
          - type: paragraph
            body: >-
              Tabby 的商户证据不只是 Logo 堆砌，而是包含多个垂直品类和市场分层中的具名生产环境部署。[CU020] 全球电商龙头 Amazon 在结账时为沙特和阿联酋客户部署 Tabby BNPL；考虑到
              Amazon 严格的供应商评估标准和全球品牌可见度，这是 Tabby 最可信的生产证据之一。Gen Z 快时尚平台 SHEIN 代表大规模、高频、小客单价交易—— 正是这种复购行为会累积消费者留存。[CU021]
              Adidas 和 H&M 提供跨运动与大众市场时尚分层的国际品牌证据。[CU022, CU024] IKEA 是家居品类的锚点证据；该品类客单价高，分期授信与转化尤其相关。[CU023] Samsung
              以全球品牌信用验证消费电子垂直品类。[CU025] 总部位于阿联酋的 MENA 电商平台 Noon，提供区域数字商业证据。[CU026] 企业集团关系包括 Al Futtaim
              Group（多元化阿联酋零售集团）、Landmark Group（中东和非洲最大零售集团之一）、 Apparel Group（在 14 个国家拥有 80+ 品牌的生活方式与时尚零售运营商）以及 Chalhoub
              Group（在 GCC 运营 LVMH 和高端品牌的奢侈品分销商）。[CU027, CU028, CU029, CU030] 具名商户证据覆盖时尚、电子、家居、奢侈品和大众电商——区域市场中 GMV 最高的五个
              BNPL 品类。主要证据缺口是，相比宣称的 40,000+ 商户基础，只有 11 家商户经过独立验证。
