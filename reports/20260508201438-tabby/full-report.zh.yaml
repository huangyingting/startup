      - number: '3.4'
        title: 护城河耐久性和竞争风险清单
        blocks:
          - type: paragraph
            body: >-
              Tabby 的竞争护城河由四层组件构成：规模网络效应（最大的商户和消费者网络形成飞轮，更多商户吸引更多消费者，更多消费者再吸引更多商户）；数据优势（基于 20M+ 用户的 MENA
              特定交易数据训练自有风控模型）；监管批准（SAMA BNPL 许可、通过 Tweeq 获得 SAMA EMI、CBUAE SVF——每项通常需要 12–24
              个月取得，给新进入者制造时间差）；以及正在成形的超级应用定位（Tabby Card、Tabby Plus、Tabby Shop、Tweeq 钱包叠在 BNPL
              之上，制造跨产品粘性）。这条护城河的耐久性正在被三项重大风险测试。第一，Tamara 在沙特资金实力可信且持牌，两家公司在 Tabby 最大市场直接争夺同一批商户集成和消费者钱包份额。如果 Tamara
              取得类似商户覆盖，消费者在两个应用间切换会成为常态，削弱 Tabby 的网络优势。第二，MDR 压缩：BNPL 逐渐成为每个大型沙特结账都被期待具备的商品化能力后，商户会获得定价权，压缩 MDR，直接降低
              Tabby 的单位 GMV 收入。第三，银行去中介化：沙特银行（Al Rajhi Bank、Saudi National
              Bank）拥有分发、资本和监管关系，可以规模化提供有竞争力的分期产品，并可能在市场成熟时投资类 BNPL 产品。Tabby 对这些风险的反制是超级应用策略：如果 Tabby Plus 和 Tabby Card
              能在 BNPL 结账之外建立真实消费习惯，Tabby 就能获得纯 BNPL 竞争者无法匹配的切换成本。尽调中的关键问题是：消费者参与数据是否支持这套多产品粘性假设。
