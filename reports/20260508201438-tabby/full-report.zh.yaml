      - number: '3.5'
        title: 展示项
        blocks:
          - type: callout
            title: Tabby 的监管版图是所有 MENA BNPL 运营商中最宽，也是一条耐久护城河
            body: >-
              Tabby 持有 SAMA BNPL 许可、SAMA EMI 牌照（通过 Tweeq）和 CBUAE SVF 牌照——这是 MENA BNPL 运营商中最完整的监管批准组合。每项牌照都需要 12–24
              个月取得，并要求资本、合规基础设施和持续监管关系。Tamara 只持有 SAMA BNPL；没有竞争者同时持有这三类牌照。这是 Tabby 竞争护城河里最耐久的一层。
            calloutType: strength
            claimRefs:
