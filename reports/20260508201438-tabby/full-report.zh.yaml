  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义和边界
        blocks:
          - type: paragraph
            body: >-
              Tabby
              所在市场，是中东和北非消费者金融服务中的先买后付（BNPL）赛道，沙特和阿联酋是其主要可服务市场。核心市场包括销售点（POS）或数字结账环节的商户出资、免息分期支付产品：零售商支付商户扣率（MDR）来吸收利息成本，并向消费者提供拆分付款选项。主要市场定义排除传统信用卡（计息、银行发行的循环信用）、个人贷款、延期借记，以及向消费者收取利息的先买后付产品。与
              Tabby 扩张路径相关的邻近市场包括：数字钱包和储值账户（通过收购 Tweeq 切入）、订阅制金融服务（Tabby Plus）、消费者权益和忠诚度，以及商品发现型电商（Tabby Shop）。在
              MENA，BNPL
              的现状替代方案是货到付款（在沙特和阿联酋仍然常见）、借记卡购买，以及非正式社会信用（亲友借款）。正式信用卡相对发达市场渗透率较低，尤其在沙特，许多消费者在信贷产品上未被银行充分覆盖。这个结构性缺口是 Tabby
              模式的根本需求驱动。商户视角下的邻近替代品包括 Afterpay（全球化、非 MENA 聚焦）、Klarna（主要在欧洲和美国），以及区域玩家 Tamara、Postpay 和
              Cashew。本章用于测算的纳入边界是：（1）沙特和阿联酋持牌 BNPL 平台处理的 BNPL 交易额；以及另行计算的（2）更广 MENA 可服务市场，包含科威特、巴林和卡塔尔等 Tabby
              与同业曾经或计划进入的市场。
