  - id: FU001
    type: journey-map
    title: 客户旅程图
    subtitle: Tabby 消费者旅程：从首次发现到忠诚留存和升级 Tabby Plus
    approximationNotes: 旅程阶段基于 Tabby 官方产品文档、面向消费者的 App 内容和独立分析师报道。时间估计来自 BNPL 行业常模，以及 Tabby 声称的 6 周分期周期。
    claimRefs:
      - CU001
      - CU004
      - CU011
      - CU012
      - CU033
    data:
      items:
        - label: 发现 / 认知
          detail: 消费者通过 Tabby Shop App 内浏览、商户网站 BNPL 入口、社交媒体广告，或现有用户口碑发现 Tabby。MENA BNPL 认知由 4 万+ 商户结账入口和 Tabby Shop 精选店铺拉动。
        - label: 账户注册与 KYC
          detail: 新用户完成注册，提交国家 ID 验证和 KYC 审查。Tabby 自研信用评分引擎实时评估资格，使用 ID 数据、征信数据和行为信号。获批用户获得初始信用额度。
        - label: 首次购买——Pay-in-4 BNPL
          detail: 消费者在商户结账时选择 Tabby（线上，或店内 QR/NFC）。首期（购买金额的 25%）立即扣款；商户收到扣除 MDR 后的全额付款。剩余三期安排在六周内支付。
        - label: 分期还款周期
          detail: 剩余三期在六周内通过绑定支付方式自动还款。消费者在 Tabby App 中跟踪分期和待付款项。良好还款历史提高未来信用额度和获批概率。
        - label: 复购与忠诚度
          detail: 成功还款解锁更高信用额度，并让后续购买更快获批。消费者回到平台购买时尚、电子、家居等商品。Tabby Shop 发现入口推广新商户和优惠，推动用户形成回访习惯。
        - label: 升级到 Tabby Plus 订阅
          detail: 高频购物者升级到 Tabby Plus（SAR 19/月），获取更高返现比例和专属商户优惠。订阅带来直接收入，并靠返现累积激励加深消费者锁定。
        - label: 高价值用户与品牌倡导
          detail: 长期 Tabby Plus 订阅者如果交易频率高，会成为平台倡导者。推荐行为和社交分享放大自然增长。随着消费者把工资入账和 P2P 转账迁移到 Tabby，Tweeq 钱包集成进一步加深参与度。
  - id: FU002
    type: funnel
    title: 采用 / 部署漏斗
    subtitle: MENA BNPL 可触达市场到 Tabby 高参与消费者漏斗——估计值为百万用户（2025）
    approximationNotes: >-
      注册用户以下的所有漏斗数值均为估计，基于 BNPL 行业参与度基准（MAU/注册用户 20-40%；订阅转化 5-10%；高价值复购队列 3-5%）。Tabby 未公开披露
      MAU、订阅人数或高价值用户定义。这些估计仅用于尽调框架示意。
    claimRefs:
      - CU001
      - CU011
      - CU012
      - CU017
    data:
      items:
        - label: MENA BNPL 总可触达用户（估计，百万）
          value: 80
          stage: 可触达市场
          detail: >-
            估计 KSA、UAE、Kuwait 及更广泛 MENA 范围内符合 BNPL 条件的总可触达消费者。依据为 GCC 成年、联网且可支配收入高于 BNPL 最低购买门槛的人口。MENA BNPL 市场预计从 $1.4B
            增至 $2.7B。
        - label: Tabby 注册用户（公司披露，百万）
          value: 15
          stage: 注册基础
          detail: >-
            根据 Tabby 官方披露，并由 TechCrunch 和 Bloomberg 的 Series E 轮报道佐证，2025-2026 年注册用户为 1500 万+。约占估计 MENA BNPL 可触达市场的
            19%，已拿下相当高的份额。
        - label: 估计月活跃用户（估计，百万）
          value: 6
          stage: 活跃用户
          detail: 按 40% MAU/注册用户比例估计，月活跃用户约 600 万。BNPL 行业标准参与度在 30-50% MAU/注册用户之间。Tabby 未披露 MAU；该数值仅为示意估计。
        - label: Tabby Plus 订阅用户（估计，百万）
          value: 0.9
          stage: 付费订阅用户
          detail: 估计 6% MAU 转化为 Tabby Plus 订阅，对应约 90 万订阅者。按 SAR 19/月（约 $5）计算，隐含年订阅收入约 $54M。Tabby 未披露订阅人数；该数值为示意估计。
        - label: 高价值复购用户（估计，百万）
          value: 0.45
          stage: 高价值用户
          detail: 估计 MAU 的 3%，或 Tabby Plus 订阅者的 50%，为高频、高客单价复购用户，贡献不成比例的 GMV 和 LTV。这个高价值用户队列是 Tabby 最具战略价值的消费者细分。
