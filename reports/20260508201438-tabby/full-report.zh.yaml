      - number: '7.8'
        title: 展示材料
        blocks:
          - type: callout
            title: SAMA BNPL 许可续期关乎生死——若不续期，覆盖 80%+ 用户的 KSA 业务将停摆
            body: >-
              Tabby 整个 KSA 业务——也是其 $3.3B 估值、盈利能力和 IPO 逻辑的核心——都压在 SAMA 于 2022 年 7 月发放的 BNPL
              许可上。续期条件、资本要求和信用额度参数均未公开。任何投资者或收购方都必须把许可续期尽调列为最高优先级监管事项，并在 NDA 下直接接触 SAMA 或 Tabby
              监管事务团队。许可不续期或条件出现重大不利变化，将直接打碎投资逻辑。
            calloutType: risk
            claimRefs:
              - CR001
              - CR007
              - CR008
          - type: callout
            title: JPMorgan $700M 债务融资让 IPO 时间线背上单一交易对手再融资风险
            body: >-
              JPMorgan 于 2023 年 12 月安排的 $700M 应收账款证券化融资，是 Tabby 推动 GMV
              增长的主要营运资本机制。融资条款未披露、契约阈值未知，且没有公开宣布替代融资额度，再融资风险因此很实在。一旦信用损失恶化并触发契约违约，Tabby 的 GMV 承载能力可能受限，而那恰好是公司为了可信 IPO
              申报最需要强增长动能的时候。该融资额度的利息成本（按市场利率估计每年 $30-50M）也会明显吃掉 KSA $55M 净利润。
            calloutType: risk
            claimRefs:
              - CR020
              - CR021
              - CR026
          - type: callout
            title: 在 Saudi Tadawul 执行 IPO，取决于市场条件、CMA 批准和经审计合并账目
            body: >-
              Tabby 计划中的 Tadawul IPO 面临三条彼此独立的执行风险，且都必须顺利落地：沙特 CMA 招股书要求完整经审计合并账目（KSA + UAE + Kuwait + Tweeq）；沙特市场条件和
              BNPL 板块情绪必须配合；JPMorgan、HSBC 与 Morgan Stanley 之间的顾问协调必须交付可销售的招股书。任一环节延迟，都可能把 IPO 推出 2027 年 2 月 Series E
              里程碑窗口，并需要一次过桥融资。全球 BNPL 板块重估风险仍然存在，Afterpay、Zip 和 Sezzle 在 2022–2023 年的回调就是例子；这对 MENA BNPL 估值仍是活风险。
            calloutType: risk
            claimRefs:
              - CR034
              - CR035
              - CR036
          - type: callout
            title: 连续两年盈利，为监管和竞争冲击提供了有意义的财务缓冲
            body: >-
              Tabby 报告 2025 年 KSA 净利润 $55M（此前 2024 年也已盈利），这是一层实质风险缓冲，也让 Tabby 与大多数处在相似增长阶段的全球 BNPL
              运营商区分开来。一家盈利公司可以吸收监管资本要求上调、提高信用损失拨备，或撑过一段 MDR 压缩期，而不必依赖紧急股权融资。盈利也强化了 Tabby 的 SAMA 续期位置和 IPO
              可信度，因为招股书能展示已经跑通的单位经济，而不是一套通向盈利的叙事。
            calloutType: strength
            claimRefs:
              - CR037
              - CR038
              - CR039
          - type: callout
            title: 符合 Shariah 的无滞纳金模式不同于全球 BNPL 玩家，但也压低收入天花板
            body: >-
              Tabby 选择不收滞纳金，符合沙特 Shariah 金融原则和 SAMA 消费者保护目标，也让产品与不合规的全球 BNPL 进入者区分开来。但这一结构性选择也拿掉了一根重要收入杠杆。全球 BNPL
              运营商历史上有 10–30% 收入来自消费者滞纳金。因此，Tabby 的收入天花板取决于 MDR 费率和相邻变现（Plus 订阅、Card 交换费、Shop 联盟收入）。当竞争压缩
              MDR，没有滞纳金这只安全阀，Tabby 的利润韧性就比收费同行更依赖交易量增长。
            calloutType: insight
            claimRefs:
              - CR029
              - CR030
              - CR040
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Tabby 的投资逻辑建立在四根结构性支柱上。第一，立足 MENA 的 BNPL 领导地位：按公司说法，Tabby 估计持有沙特 BNPL 市场 60% 份额，拥有 15 million 注册用户、超过
              40,000 个商户伙伴，年化 GMV 超过 $10B。这种网络规模同时为消费者和商户建立了耐用的切换成本，新进入者很难复制。第二，连续两年盈利显著降低了 IPO 前风险，尤其相较 Klarna 和 Affirm
              等全球 BNPL 同行，它们在增长阶段仍持续亏损。Tabby 报告 2025 年 KSA 净利润约 $55M；2025 年上半年 KSA 净利润同比增长 360%，达到 SAR 90.4
              million。第三，2024 年 9 月收购 Tweeq 钱包，打开了完整数字银行收入栈——Tabby Card
              交易的交换费收入、储蓄产品，以及最终的嵌入式贷款——让商户折扣率收入之外多了一个实质上行驱动。第四，JPMorgan、HSBC 和 Morgan Stanley 已作为投行参与，指向 Saudi Tadawul
              IPO 路径，为现有投资者提供了 12–24 个月内可信的流动性事件。反向逻辑集中在四个结构性担忧。$4.5B 老股交易估值隐含约为 2025 年估计 KSA 收入 $378M 的 12–17 倍；相比
              Klarna 等全球 BNPL 同行明显偏高，Klarna 在 IPO 准备阶段约为 5.4 倍收入。SAMA 监管收紧是生死级风险：新的信用额度上限或资本充足要求可能压制 GMV
              增长，或迫使公司在更低估值下高成本增发股权。信用损失率、净收入留存和队列数据均未公开，造成重大信息不对称，无法独立验证盈利主张。最后，收入倍数压缩风险真实存在——竞争加剧后，Klarna 在欧洲的 MDR 从
              3–4% 压到 2% 以下，为 24–36 个月后 Tamara 和全球进入者做大时的 MENA 市场提供了警示样本。
