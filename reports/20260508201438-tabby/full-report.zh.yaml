      - number: '4.3'
        title: 资本结构、融资和资本强度
        blocks:
          - type: paragraph
            body: >-
              Tabby 从种子轮到 Series E 累计融资约 $480M 股权资金（不含 Tweeq 收购），并在 2023 年 12 月从 JPMorgan 获得 $700M 证券化债务。JPMorgan 额度以
              Tabby 的 BNPL 应收款为支持，是一种资产支持贷款：Tabby 向消费者发放 BNPL 贷款，将其汇集进应收款载体，再由 JPMorgan 提供仓储融资额度来支持这些应收款，让 Tabby
              可以循环使用资本，并把 GMV 增长推到单靠股权无法支撑的规模。这种结构是全球 BNPL 运营商的标准做法（Klarna、Affirm 和 Afterpay
              都使用类似应收款融资），但也引入几类财务风险：（1）利率风险——JPMorgan 额度成本未披露，但很可能是浮动利率利差，使盈利对利率变化敏感；（2）交易对手集中——来自单一银行的一笔 $700M
              额度形成集中风险，如果 JPMorgan 下调额度或不续期，Tabby 会受影响；（3）契约风险——证券化额度通常设置绩效契约（损失触发、稀释触发），若信用表现恶化，可能限制 Tabby
              运营；（4）杠杆——$700M 额度叠加 Tabby 股权基础，意味着业务带有杠杆，会同时放大上行和下行。Tabby 截至 2023 年末的总融资（股权 + 债务）约 $1.18B（未计 2025 年 2 月
              $160M Series E），对 $10B GMV 运行率而言，代表显著资本投入。资本效率比（GMV / 总融资）约 8–10x，说明资本使用相对高效，符合 BNPL
              模式一年多次周转应收款组合的特征。Series E 估值 $3.3B，意味着市场以约 8.7x 2025 年沙特收入（$3.3B / $378M）为 Tabby 定价；对一家区域 BNPL
              运营商而言，这一倍数偏高，只有在 Tabby 的超级应用扩张和 IPO 溢价兑现时才说得通。
