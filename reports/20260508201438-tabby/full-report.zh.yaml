              - CE023
          - type: callout
            title: 风险 — 授信决策不透明
            body: >-
              Tabby 尚未公开披露信用模型架构、通过率、违约率或贷款损失拨备。没有私有数据室访问，投资人无法独立验证信用风险管理质量。 经济下行时，BNPL 信用损失可能迅速加速；MENA
              消费信贷信息基础设施（征信覆盖）也不如西方市场成熟。Tabby 授信决策不透明，是首要尽调风险，需要直接接触管理层并获取组合表现数据才能解决。
