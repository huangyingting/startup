              - CM004
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局和竞争对手分类
        blocks:
          - type: paragraph
            body: >-
              在 MENA BNPL 和消费者金融科技市场，Tabby 横跨四类竞争对手。直接同业是服务沙特和阿联酋同一消费者—商户分期市场的持牌 BNPL
              运营商：Tamara（利雅得）、Postpay（阿联酋）、Cashew（阿联酋 / 沙特）和 Spotii（阿联酋，被收购后已并入 Zip
              Australia）。既有替代者是银行发行产品，包括信用卡、计息延期借记，以及银行支持的分期计划（例如 Al Rajhi、SNB、Riyad Bank 等沙特银行通过 Visa/Mastercard
              网络在主要信用卡上提供 0% 分期计划）。邻近进入者是可能扩张至 MENA 的全球 BNPL 运营商——Klarna（瑞典公司，在欧盟和美国运营，截至 2026 年尚无 MENA
              业务）、Afterpay/Block 和 Paidy。现状替代方案包括货到付款（在沙特仍然重要）和非正式社会信用。内部自建指大型沙特零售商或电商平台可能自行开发 BNPL
              能力，而不是依赖第三方运营商。今天最重要的竞争威胁是 Tamara：它经营同一个沙特 BNPL 市场，获得 Coatue 和 Checkout.com 资金支持，并持有自己的 SAMA BNPL
              牌照。第二梯队直接竞争者（Postpay、Cashew）规模更小，主要聚焦阿联酋。Klarna 全球进入存在可能，但尚未落地；MENA 的监管复杂性（SAMA、CBUAE
              牌照要求）构成壁垒，会拖慢全球玩家进入。银行分期产品对已经持有信用卡的消费者是有意义的替代品，但鉴于沙特信用卡渗透率低，重叠有限。Tabby 的竞争策略已从「做最好的 BNPL」转向「做 MENA
              消费者的主要金融超级应用」（Tabby Card、Tabby Plus、Tabby Shop、Tweeq 钱包），这同时扩大了竞争面和护城河。
