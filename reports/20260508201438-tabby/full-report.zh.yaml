      - number: '1.3'
        title: 融资历史、估值和资本结构
        blocks:
          - type: paragraph
            body: >-
              Tabby 从 2019 年 $2M 种子轮走到 2025 年 $3.3B 估值的 Series E，构成中东和北非金融科技里推进最快的风投融资历程之一。2019 年，公司从 Global Founders
              Capital、Arbor Ventures 和 Wamda Capital 获得 $2M 种子轮融资。2020 年一轮 $7M 融资支持其进入沙特。2020 年 12 月，$23M Series A 由
              Arbor Ventures 和 Mubadala Capital 领投，STV、Raed Ventures 和 JIMCO 参投。2021 年，Tabby 从 Partners for Growth 获得
              $50M 债务融资，用于支持应收款账簿。2022 年，公司以 $300M 估值完成 $50M Series B，由 Global Founders Capital 和 STV 领投，Delivery Hero
              作为战略投资人参与。2023 年 11 月，Wellington Management 领投 $200M Series D，估值 $1.5B，Tabby 成为 MENA 首家金融科技独角兽。2023 年 12
              月，Series D 追加 $50M 股权融资，并由 JPMorgan 安排标志性的 $700M 应收款证券化——这是 MENA 金融科技史上最大一笔债务融资。2025 年 2 月，Series E 融资
              $160M，估值 $3.3B，由 Blue Pool Capital 和 Hassana Investment 领投，使 Tabby 成为 MENA 最有价值的风投支持公司。随后 2025 年 4
              月的一笔老股交易，据报道对应约 $4.5B 估值。截至 Series E，累计股权融资估计超过 $410M；加上 $700M+ 应收款融资，支持 Tabby 业务的总资本超过 $1.1B。公司正筹划在沙特
              Tadawul IPO，JPMorgan、HSBC 和 Morgan Stanley 已获委任为顾问。
