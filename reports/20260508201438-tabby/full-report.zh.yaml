      - number: '5.7'
        title: 展项
        blocks:
          - type: callout
            title: 监管护城河 — SAMA 牌照 + 盈利能力
            body: >-
              Tabby 是唯一同时拥有 SAMA BNPL 许可和（通过 Tweeq）SAMA EMI 牌照的 MENA BNPL 玩家，并且在 2026 年 4 月获得阿联酋 CBUAE SVF 牌照。
              再叠加连续两年盈利和 $10B+ GMV 运行率，这组监管深度与财务记录形成了竞争对手尚未匹配的壁垒。沙特监管牌照获取通常需要 12-24 个月，并要求证明财务稳定性—— Tabby 的先发优势，对任何新的
              MENA BNPL 进入者而言，实质上是 3-5 年优势。
            calloutType: strength
            claimRefs:
              - CE035
              - CE036
              - CE037
              - CE012
          - type: callout
            title: 网络效应 — 15M+ 用户与 40K+ 商户
            body: >-
              Tabby 的 15 million 消费者用户基础和 40,000+ 商户网络，形成强劲的双边市场效应。消费者加入，是因为偏好的商户接受 Tabby；商户加入，是因为 Tabby 的 15M
              用户就是现成获客渠道。每新增一个用户和商户，飞轮都会更深一层。在这个规模上，Tabby 的消费者数据资产——15M+ 消费者的自有还款历史，其中许多人相对征信数据而言
              信用档案稀薄（thin-file）——会变成复利式信用评分护城河，随时间推移提高通过率并降低违约风险。
            calloutType: strength
