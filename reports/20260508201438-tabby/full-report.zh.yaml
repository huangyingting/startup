      - number: '5.5'
        title: 竞争差异化与护城河
        blocks:
          - type: paragraph
            body: >-
              Tabby 的竞争护城河由五个相互强化的要素构成。第一，规模网络效应：15 million+ 用户和 40,000+ 商户形成双边市场，每一边都因为另一边存在而加入。 新 BNPL
              进入者如果不砸多年获客预算，很难复制。[CE008] 第二，符合 Shariah 的产品设计：2023 年取消滞纳金，并把分期产品设计成不含复利，符合伊斯兰金融原则；
              沙特和阿联酋消费者以及伊斯兰银行监管者在结构上更偏好这种安排。依赖滞纳金的竞争对手在 GCC 市场会处于劣势。[CE031] 第三，监管深度： Tabby 同时持有 SAMA BNPL 许可（2022 年 7
              月）和通过收购 Tweeq 获得的 SAMA EMI 牌照——这是 MENA BNPL 玩家中最完整的监管牌照组合。 阿联酋 SVF 牌照（2026 年 4 月）把这道监管护城河延伸到第二大市场。[CE035,
              CE036, CE037] 第四，商业目的地： Tabby Shop 的商户发现入口把消费者参与从支付瞬间向外拉长，形成习惯性浏览和购物行为；只做支付的 BNPL
              玩家（Postpay、Cashew）尚未做到这一点。[CE032] 第五，自有信用数据：Tabby 掌握 15M+
              用户的内部还款历史，其中许多人没有征信记录、信用档案稀薄（thin-file）；这些数据带来信用评分优势，可以在不依赖外部征信机构的情况下，提高复购客户通过率并降低违约。[CE023] 对比最接近的竞争对手
              Tamara，Tabby 在用户规模、盈利能力、监管广度和产品多元化上领先。[CE029] 对比聚焦阿联酋的 Postpay 和 Cashew，Tabby 的沙特规模和 SAMA
              监管深度形成护城河，没有多年投入很难跨过去。[CE030]
