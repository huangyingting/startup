  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              Tabby 面向两个结构上不同的客户群：面向消费者（B2C）的零售购物者，以及面向企业（B2B）的商户伙伴。[CU001] 消费者群体包括超过 15 million 注册用户，
              主要分布在沙特阿拉伯（80%+）、阿联酋和科威特。[CU003] 核心用户人群明显偏向千禧一代和 Z 世代——他们是数字原住民，厌恶信用负债，相比传统银行信用卡或循环债务，更偏好免息分期购买。[CU010]
              这种人群偏好契合 GCC 人口结构：沙特 60% 以上人口低于 35 岁，为 BNPL
              采用提供了结构性友好的基础。消费者使用场景覆盖时尚购物、消费电子、家居、旅行预订和生鲜杂货——这些垂直品类客单价更高、复购频率也高。[CU033] 商户群体由 40,000+
              企业伙伴组成，核心任务是把浏览访问转成付费客户；Tabby 的 BNPL 消除了前置全额付款门槛，降低结账摩擦。[CU002] 商户规模从独立 SME
              零售商一路延伸到全球企业品牌和大型零售集团。企业级商户关系覆盖时尚、电子、奢侈品和家居等品类的知名名称。[CU040] 双边平台结构形成相互强化的网络动态：消费者网络规模直接放大商户获客价值，而 40,000+
              商户目录本身也是消费者拉新和留存资产。[CU001, CU002]
            claimRefs:
