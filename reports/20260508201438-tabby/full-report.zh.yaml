          - type: callout
            title: 洞察 — 收购 Tweeq 打开完整新银行战局
            body: >-
              2024 年 9 月收购 Tweeq，是 Tabby 历史上最具战略意义的一次事件。把 SAMA EMI 牌照叠加到 BNPL 许可之上后，Tabby 现在可以在沙特合法提供储值钱包、P2P 转账和工资入账——
              这些能力把 Tabby 从结账支付工具变成主金融账户。再加上阿联酋 SVF 牌照（2026 年 4 月），Tabby 有机会成为 GCC 第一个符合 Shariah、以 BNPL 起家的新银行；
              这个细分市场尚无既定赢家，并且拥有 $1.4B 且仍在增长、以 13% CAGR 扩张的 BNPL TAM。
