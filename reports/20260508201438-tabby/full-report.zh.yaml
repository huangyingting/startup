      - number: '1.4'
        title: 规模、里程碑和监管进展
        blocks:
          - type: paragraph
            body: >-
              Tabby 的运营里程碑沿着用户、商户和交易量持续增长。公司 2019 年在阿联酋上线，2020 年进入沙特，不久后进入科威特，早年也曾在巴林和卡塔尔运营。关键监管节点出现在 2022 年 7 月：Tabby
              从沙特央行（SAMA）监管沙盒毕业，获得正式 BNPL 许可，得以在沙特这个高增长市场主流化运营。公司报告已连续两个财年盈利。沙特子公司收入 2024 年约 $267M，2025 年增至约 $378M，同比增长
              42%；2025 年净利润约 $55M。2025 年上半年沙特子公司净利润为 SAR 90.4M（约 $24M），同比增长 360%。用户数先后突破 1000 万、1200 万（按 AGBI 2024 年 9
              月报道），公司现在声称截至 2025 年初注册用户达到 2000 万。40,000 家合作商户和 $10B+ 年化 GMV 支撑了一张覆盖时尚、电子产品、生鲜杂货和旅行垂直领域的网络。2024 年 9 月收购
              Tweeq 是公司首次非有机扩张，补入持 SAMA 牌照的电子货币能力。2026 年 4 月获得阿联酋储值支付工具牌照，则是公司的另一项监管首次。需要注意的一项不利事件是 Series C
              融资金额仍未披露，在公开融资时间线上留下一个小缺口。来自另一家沙特 BNPL 玩家 Tamara 的竞争，是最重要的持续竞争风险。
