      - number: '8.7'
        title: 展示材料
        blocks:
          - type: callout
            title: MENA BNPL 先发优势支撑相对区域同行的溢价倍数
            body: >-
              Tabby 估计拥有沙特 BNPL 市场 60% 份额、15 million 注册用户和 $10B+ GMV，这些网络防御力足以支撑它相对 Tamara 约 $1B 估值的有意义溢价。先发优势在 MENA
              尤其耐用，因为 SAMA 牌照壁垒限制新进入者，商户集成的切换成本也高。但相较 Klarna 等全球同行的溢价，在 IPO 过程中仍难维持，因为公开市场投资者会套用全球可比倍数。
            calloutType: insight
            claimRefs:
              - CV015
              - CV016
              - CV021
              - CV038
          - type: callout
            title: $4.5B 老股估值隐含 2025 年收入 12–17 倍——相较全球 BNPL 同行 5–8 倍偏高
            body: >-
              Tabby 2025 年 4 月 $4.5B 老股价格，隐含约为 2025 年估计 KSA 收入 $378M 的 12–17 倍。相比之下，Klarna 在 2025 年 IPO 准备阶段约为 5.4
              倍收入。即使在金融科技牛市周期，全球 BNPL 同行在公开市场也通常以 5–8 倍收入交易。Tabby 的溢价部分由 MENA 更高增长率和更小基数支撑，但如果 IPO
              延迟，或公开市场投资者套用全球可比框架，这一差距会带来明显的倍数压缩风险。
            calloutType: risk
            claimRefs:
              - CV002
              - CV012
              - CV022
              - CV037
          - type: callout
            title: 连续两年盈利，相较亏损中的全球 BNPL 同行，降低 IPO 前风险
            body: >-
              Tabby 报告 2024 年和 2025 年 KSA 均实现盈利，2025 年上半年净利润同比增长 360%，达到 SAR 90.4 million。这让 Tabby 与几乎所有处在相似阶段的全球 BNPL
              同行区分开来：Klarna、Affirm 和 Afterpay 在主要增长阶段都承受了显著亏损。以 Tabby 当前规模实现盈利，明显降低 IPO
              过程风险，减少因紧急融资带来的股权稀释压力，也为监管或竞争冲击提供现金缓冲；这些冲击如果发生在更早融资阶段，可能就是生死问题。
            calloutType: strength
            claimRefs:
              - CV004
              - CV008
              - CV009
          - type: callout
            title: 经审计财务、队列留存和 NRR 数据仍为私有——投资者面对重大信息不对称
            body: >-
              最关键的估值风险不是倍数本身，而是支撑倍数的底层指标不透明。经审计合并财务报表、队列批次曲线、净收入留存、信用损失率和拨备方法，公开来源均不可得。在 $10B+ GMV 组合上，净信用损失率上升
              1%，就足以完全抹掉报告中的 KSA $55M 净利润。没有这些输入，外部无法独立验证盈利主张，当前估值在很大程度上只能相信管理层公开披露。
            calloutType: risk
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV008
          - type: callout
            title: 观察 / 继续研究——形成确信需要 IPO 招股书、经审计账目和 SAMA 牌照确认
            body: >-
              观察 / 继续研究的建议，是按当前证据状态校准得出的。Tabby
              是一家搭得不错的公司，公开证据有力支持其市场领导地位和盈利能力，但当前定价要求近乎完美执行，安全边际有限。最阻碍高确信买入的三项信息缺口——经审计合并账目、队列 / NRR 数据和 IPO
              招股书条款——都可以通过 IPO 过程本身补齐。投资者现在应建立监控仓位，为招股书发布准备尽调基础设施，并在这些材料可得时再上调确信度。
            calloutType: recommendation
            claimRefs:
              - CV026
              - CV027
              - CV028
              - CV030
