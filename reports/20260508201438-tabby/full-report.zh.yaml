      - number: '5.3'
        title: 技术架构
        blocks:
          - type: paragraph
            body: >-
              Tabby 的技术架构只能从公开招聘、Tabby for Business 商户门户、GitHub 活动和第三方分析报告中推断。[CE022] 消费者应用通过原生 iOS 和 Android App
              交付，支持阿拉伯语和英语本地化，并在单一界面内整合结账深链、分期管理、Tabby Shop 浏览和卡片控制。 App Store 评分 4.8，说明 UX 执行力较强。[CE013] 支付处理方面，Tabby
              Card 依赖 Visa，沙特、阿联酋和科威特的 BNPL 交易依赖本地收单银行合作； 卡网络连通性和收单关系都是关键单点依赖风险。[CE024] 授信决策在结账时实时完成，靠自研评分引擎组合国家 ID
              数据、征信机构信号（如可用）和 Tabby 内部交易历史。复购客户受益于 Tabby 自有还款记录数据；对于缺少征信历史、信用档案稀薄（thin-file）的消费者，这是一道有意义的数据护城河。[CE023]
              商户 API 层支持 Shopify、Magento、WooCommerce 以及自定义 REST API 的即插即用集成，Tabby for Business 门户发布了沙盒环境和 SDK。[CE025]
              云基础设施未公开披露，但从交易处理规模和招聘中可见的全球工程扩张信号看，推断使用主流超大规模云厂商（AWS 或 GCP 同等）。[CE022] Tabby 的 GitHub
              组织（github.com/tabbyai）公开仓库有限，主要是商户 SDK；这更像封闭源代码金融科技架构，而非开放源代码平台。[CE040] 缺少公开工程博客，相比 Stripe 或 Monzo
              是透明度缺口，但对增长阶段 MENA 金融科技公司并不罕见。
