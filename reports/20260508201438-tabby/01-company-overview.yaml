callouts:
  - calloutType: strength
    title: First-mover and dominant BNPL market position in Saudi Arabia
    body: >-
      Tabby holds the largest market share in Saudi BNPL by user count and GMV, backed by its SAMA regulatory permit,
      early mover advantage since 2020, and deep merchant network of 40,000+ partners. Saudi Arabia's high youth
      population, low credit card penetration, and Vision 2030 cashless economy tailwind structurally advantage a
      compliant, well-capitalised BNPL leader.
    claimRefs:
      - CO003
      - CO007
      - CO008
      - CO031
  - calloutType: strength
    title: Sovereign and institutional capital anchors IPO credibility
    body: >-
      Mubadala, Hassana, and Wellington Management represent sovereign and institutional-grade capital validation.
      Hassana co-leading both the Series D extension and Series E, combined with JPMorgan's $700M debt facility and
      IPO mandate, signals that the Tadawul listing has institutional demand already aligned.
    claimRefs:
      - CO024
      - CO025
      - CO027
      - CO029
  - calloutType: risk
    title: Key-person dependence on Hosam Arab is high and undisclosed succession depth
    body: >-
      Hosam Arab is the sole public face of Tabby across investor relations, media, and regulatory engagements. The
      C-suite bench and board roster are not publicly disclosed, making external assessment of succession risk
      impossible. Key-person risk is elevated at pre-IPO stage where regulatory relationship continuity and
      investor confidence are both CEO-dependent.
    claimRefs:
      - CO011
      - CO013
      - CO015
  - calloutType: risk
    title: Receivables capital intensity is structurally high
    body: >-
      Tabby's Pay-in-4 model creates a rolling receivables book that must be continuously financed. The $700M
      JPMorgan securitization demonstrates capital market access, but refinancing risk, covenant terms, and
      concentration of the credit facility in a single bank relationship represent material risks that are not
      fully disclosed. Credit losses on the book are not public.
    claimRefs:
      - CO025
      - CO026
      - CO030
