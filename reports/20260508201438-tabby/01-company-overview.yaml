  - id: section-milestones
    title: Scale, Milestones, and Regulatory Progress
    body: >-
      Tabby's operational milestones track a consistent growth trajectory across users, merchants, and transaction
      volume. The company launched in the UAE in 2019 before expanding to Saudi Arabia in 2020, Kuwait shortly after,
      and also operated in Bahrain and Qatar in its early years. A critical regulatory milestone came in July 2022
      when Tabby graduated from the Saudi Central Bank (SAMA) regulatory sandbox, receiving a formal BNPL permit
      and enabling mainstream operations in the Kingdom's high-growth market. The company reported reaching
      profitability in consecutive fiscal years. Saudi Arabia subsidiary revenues were approximately $267M in 2024
      and grew to approximately $378M in 2025, a 42 percent year-over-year increase, with net profit of approximately
      $55M in 2025. H1 2025 Saudi subsidiary net profit was SAR 90.4M (approximately $24M), representing 360 percent
      year-over-year growth. The company passed 10 million users, then 12 million users (as of September 2024 per
      AGBI), and now claims 20 million registered users as of early 2025. The 40,000 merchant partners figure and
      $10B+ annualized GMV underpin a network that spans fashion, electronics, groceries, and travel verticals. The
      Tweeq acquisition in September 2024 was the company's first inorganic move, adding SAMA-licensed e-money
      capabilities. The UAE Stored Value Facility licence received in April 2026 marks another regulatory first for
      the company. An adverse event to note is the Series C round amount remaining undisclosed, creating a minor gap
      in the public funding chronology. Competition from Tamara, another Saudi BNPL player, represents the most
      material ongoing competitive risk.
    claimRefs:
      - CO031
      - CO032
      - CO033
