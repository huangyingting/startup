  - id: section-founders
    title: Founders, Leadership, and Governance
    body: >-
      Hosam Arab co-founded Tabby in 2019 after previously co-founding and serving as CEO of Namshi, the Middle East
      fashion e-commerce platform that was sold to Global Fashion Group. This operational background in regional
      e-commerce gave Arab first-hand insight into the friction consumers face at checkout, forming the founding
      thesis for Tabby's BNPL model. Daniil Barkalov, Tabby's CTO and COO, brings the technical infrastructure
      leadership alongside Arab's commercial and market-development expertise. The founding pair represents a
      strong founder-market fit for MENA consumer fintech: Arab's Namshi track record created early credibility with
      regional retailers and investors. Tabby's investor base functions as an informal governance layer given the
      company's private status. Wellington Management led the Series D, marking institutional quality validation.
      Mubadala Capital (Abu Dhabi sovereign wealth) and Hassana Investment Company (Saudi pension-fund manager) are
      material shareholders, bringing Gulf sovereign capital with implicit soft-governance expectations. STV, the
      Saudi-based VC, and Blue Pool Capital (Hong Kong) also hold meaningful equity stakes. PayPal Ventures invested
      in Series D, the first Gulf fintech to receive their backing. The board composition and voting-rights structure
      are not publicly disclosed, representing a key governance gap for investors conducting pre-IPO diligence.
      Key-person dependency on Hosam Arab is rated high: his public profile, media presence, and operating role
      are the primary face of the company. Succession depth below the founding duo is not publicly disclosed.
    claimRefs:
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
