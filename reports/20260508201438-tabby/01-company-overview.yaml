  - id: section-funding
    title: Funding History, Valuation, and Capital Structure
    body: >-
      Tabby's capital formation journey from a $2M seed in 2019 to a $3.3B Series E in 2025 constitutes one of the
      most accelerated venture funding histories in Middle East and North Africa fintech. The company raised $2M in
      seed funding in 2019 from Global Founders Capital, Arbor Ventures, and Wamda Capital. A $7M round in 2020
      enabled expansion into Saudi Arabia. The $23M Series A in December 2020 was led by Arbor Ventures and
      Mubadala Capital, with STV, Raed Ventures, and JIMCO participating. In 2021, Tabby secured $50M in debt
      from Partners for Growth to fund its receivables book. The $50M Series B in 2022 at a $300M valuation was
      led by Global Founders Capital and STV, with Delivery Hero as a strategic investor. Series D in November
      2023 at $1.5B valuation ($200M raise led by Wellington Management) made Tabby MENA's first fintech unicorn.
      The Series D was extended in December 2023 with $50M more equity and a landmark $700M receivables
      securitization arranged by JPMorgan — the largest debt financing ever arranged for a MENA fintech. Series E
      in February 2025 raised $160M at a $3.3B valuation, led by Blue Pool Capital and Hassana Investment, making
      Tabby MENA's most valuable VC-backed company. A subsequent secondary share sale in April 2025 reportedly
      implied a valuation of approximately $4.5B. Total equity raised is estimated at over $410M through Series E.
      With $700M+ in receivables financing, total capital deployed in support of Tabby's business exceeds $1.1B.
      An IPO on the Saudi Tadawul is in planning, with JPMorgan, HSBC, and Morgan Stanley mandated as advisers.
    claimRefs:
