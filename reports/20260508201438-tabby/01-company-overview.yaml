company:
  name: Tabby
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Tabby is MENA's most valuable VC-backed startup and its first fintech unicorn, having grown from a 2019 Dubai BNPL
    launch to a Riyadh-headquartered financial-services platform with 20M+ users, $10B+ annualized transaction volume,
    and a $3.3B Series E valuation en route to a planned Tadawul IPO.
sections:
  - id: section-identity
    title: Identity, Headquarters, and Business Model
    body: >-
      Tabby is a buy now, pay later (BNPL) and consumer financial services platform founded in 2019 in Dubai, United
      Arab Emirates, by Hosam Arab (CEO) and Daniil Barkalov (CTO/COO). The company originally operated from Dubai
      but relocated its headquarters to Riyadh, Saudi Arabia, ahead of a planned listing on the Saudi Tadawul stock
      exchange. As of early 2025, Tabby describes itself as MENA's leading shopping and financial services app,
      offering four core products: Pay in 4 (interest-free BNPL in four installments), the Tabby Card (a Visa debit
      card with embedded BNPL capability), Tabby Plus (a subscription rewards programme priced at approximately SAR
      19 per month), and Tabby Shop (a product discovery and merchant marketplace surface). The company also offers
      Tabby Care, a buyer-protection and purchase warranty product. Through its September 2024 acquisition of Tweeq,
      a Saudi-licensed electronic money institution, Tabby added digital wallet infrastructure that enables spending,
      sending, and money management. A UAE Stored Value Facility licence was granted by the Central Bank of the UAE
      on 15 April 2026, extending Tabby's regulated payments footprint into that market. Tabby's core business model
      earns merchant discount revenue when retailers pay a percentage of each transaction to offer BNPL at checkout.
      The platform serves consumers in Saudi Arabia, the UAE, and Kuwait, with Saudi Arabia accounting for more than
      80 percent of its user base. With 20M+ registered users, 40,000+ merchant partners, and an annualized GMV
      exceeding $10B as of early 2025, Tabby has achieved significant scale as the dominant BNPL operator in the
      Kingdom and a major force across the wider MENA region.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
