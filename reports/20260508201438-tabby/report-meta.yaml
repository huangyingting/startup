companyProfile:
  summary: >-
    Tabby is MENA's most valuable venture-backed startup, a buy now, pay later and consumer
    financial services platform founded in 2019 in Dubai and now headquartered in Riyadh, Saudi
    Arabia. The company has grown from a pure BNPL offering into a multi-product financial services
    platform covering installment payments, a Visa card with embedded BNPL, a subscription rewards
    program, product discovery, and buyer protection. The 2024 acquisition of Tweeq (a SAMA-licensed
    digital wallet) and a UAE Stored Value Facility licence (April 2026) extend Tabby's regulated
    footprint toward full neobank capabilities. Tabby has reported profitability in two consecutive
    years and is preparing for a listing on the Saudi Tadawul stock exchange with JPMorgan, HSBC,
    and Morgan Stanley as advisors.
  foundedDate: "2019-01-01"
  founders:
    - name: Hosam Arab
      role: Co-Founder and CEO
      background: >-
        Previously co-founded and served as CEO of Namshi, the leading MENA fashion e-commerce
        platform acquired by Global Fashion Group; brings deep regional e-commerce and consumer
        finance expertise.
    - name: Daniil Barkalov
      role: Co-Founder and CTO/COO
      background: >-
        Technical and operational co-founder responsible for Tabby's engineering and product
        architecture.
  foundingLocation: "Dubai, UAE"
  headquarters: "Riyadh, Saudi Arabia"
  productSummary: >-
    Core products: Pay in 4 (interest-free BNPL in four installments), Tabby Card (Visa debit
    card with embedded BNPL), Tabby Plus (subscription rewards ~SAR 19/month), Tabby Shop
    (product discovery and deal tracking), and Tabby Care (buyer protection and purchase
    warranty). The Tweeq digital wallet acquisition adds a SAMA-licensed EMI capability for
    spending accounts and money management tools.
  customerFocus: >-
    Consumers aged 18-45 in Saudi Arabia, UAE, and Kuwait seeking flexible payment options.
    Saudi Arabia accounts for more than 80% of the user base. Merchant partners include global
    brands (Amazon, SHEIN, Adidas, IKEA, H&M, Samsung, Noon) and major regional retail groups
    (Al Futtaim, Landmark, Apparel, Chalhoub). As of early 2025: 15M+ registered users and
    40,000+ merchant partners.
  businessModel: >-
    Merchant fee model: merchants pay a discount rate (estimated 4-8% per transaction) to offer
    BNPL at checkout. Late fees were removed in 2023 for Shariah compliance. Supplemental revenue
    from Tabby Plus subscriptions, and prospectively from card interchange, digital wallet
    services, and remittances. Receivables are partially funded via a $700M JPMorgan
    asset-backed securitization facility.
  stage: Pre-IPO
  fundingStatus: >-
    Series E at $3.3B valuation (February 2025); total equity raised >$410M across seed through
    Series E; $700M JPMorgan receivables securitization (December 2023). Total capital (equity
    plus debt) exceeds $1.1B. Series E likely final private round before IPO. Secondary share
    sale in April 2025 implied ~$4.5B valuation. IPO banks mandated: JPMorgan, HSBC,
    Morgan Stanley.
