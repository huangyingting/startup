    Tabby is MENA's most valuable venture-backed startup, a buy now, pay later and consumer financial services platform
    founded in 2019 in Dubai and now headquartered in Riyadh, Saudi Arabia. The company has grown from a pure BNPL
    offering into a multi-product financial services platform covering installment payments, a Visa card with embedded
    BNPL, a subscription rewards program, product discovery, and buyer protection. The 2024 acquisition of Tweeq (a
    SAMA-licensed digital wallet) and a UAE Stored Value Facility licence (April 2026) extend Tabby's regulated
    footprint toward full neobank capabilities. Tabby has reported profitability in two consecutive years and is
    preparing for a listing on the Saudi Tadawul stock exchange with JPMorgan, HSBC, and Morgan Stanley as advisors.
