      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Hosam Arab co-founded Tabby in 2019 after previously co-founding and serving as CEO of Namshi, the Middle
              East fashion e-commerce platform that was sold to Global Fashion Group. This operational background in
              regional e-commerce gave Arab first-hand insight into the friction consumers face at checkout, forming the
              founding thesis for Tabby's BNPL model. Daniil Barkalov, Tabby's CTO and COO, brings the technical
              infrastructure leadership alongside Arab's commercial and market-development expertise. The founding pair
              represents a strong founder-market fit for MENA consumer fintech: Arab's Namshi track record created early
              credibility with regional retailers and investors. Tabby's investor base functions as an informal
              governance layer given the company's private status. Wellington Management led the Series D, marking
              institutional quality validation. Mubadala Capital (Abu Dhabi sovereign wealth) and Hassana Investment
              Company (Saudi pension-fund manager) are material shareholders, bringing Gulf sovereign capital with
              implicit soft-governance expectations. STV, the Saudi-based VC, and Blue Pool Capital (Hong Kong) also
              hold meaningful equity stakes. PayPal Ventures invested in Series D, the first Gulf fintech to receive
              their backing. The board composition and voting-rights structure are not publicly disclosed, representing
              a key governance gap for investors conducting pre-IPO diligence. Key-person dependency on Hosam Arab is
              rated high: his public profile, media presence, and operating role are the primary face of the company.
              Succession depth below the founding duo is not publicly disclosed.
            claimRefs:
              - CO011
              - CO012
              - CO013
              - CO014
              - CO015
              - CO016
              - CO017
              - CO018
      - number: '1.3'
        title: Funding History, Valuation, and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Tabby's capital formation journey from a $2M seed in 2019 to a $3.3B Series E in 2025 constitutes one of
              the most accelerated venture funding histories in Middle East and North Africa fintech. The company raised
              $2M in seed funding in 2019 from Global Founders Capital, Arbor Ventures, and Wamda Capital. A $7M round
              in 2020 enabled expansion into Saudi Arabia. The $23M Series A in December 2020 was led by Arbor Ventures
              and Mubadala Capital, with STV, Raed Ventures, and JIMCO participating. In 2021, Tabby secured $50M in
              debt from Partners for Growth to fund its receivables book. The $50M Series B in 2022 at a $300M valuation
              was led by Global Founders Capital and STV, with Delivery Hero as a strategic investor. Series D in
              November 2023 at $1.5B valuation ($200M raise led by Wellington Management) made Tabby MENA's first
              fintech unicorn. The Series D was extended in December 2023 with $50M more equity and a landmark $700M
              receivables securitization arranged by JPMorgan — the largest debt financing ever arranged for a MENA
              fintech. Series E in February 2025 raised $160M at a $3.3B valuation, led by Blue Pool Capital and Hassana
              Investment, making Tabby MENA's most valuable VC-backed company. A subsequent secondary share sale in
              April 2025 reportedly implied a valuation of approximately $4.5B. Total equity raised is estimated at over
              $410M through Series E. With $700M+ in receivables financing, total capital deployed in support of Tabby's
              business exceeds $1.1B. An IPO on the Saudi Tadawul is in planning, with JPMorgan, HSBC, and Morgan
              Stanley mandated as advisers.
