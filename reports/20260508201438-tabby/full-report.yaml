          values:
            - Platform fraud
            - Fee compression
            - SAMA permit non-renewal
        - label: Critical Impact
          values:
            - None
            - JPMorgan facility loss
            - IPO execution failure
        - label: Existential Impact
          values:
            - None
            - Credit loss spike
            - Data breach + PDPL enforcement
  - id: FR002
    title: Risk Transmission Map
    type: dag
    claimRefs:
      - CR002
      - CR003
      - CR007
      - CR020
      - CR026
      - CR028
      - CR033
      - CR037
    data:
      nodes:
        - id: sama-tightening
          label: SAMA Regulatory Tightening
          detail: >-
            SAMA raises capital requirements, credit limits, or imposes adverse licence conditions on BNPL permit
            holders including Tabby
        - id: licence-loss
          label: SAMA Permit Non-Renewal
          detail: SAMA declines to renew or materially restricts Tabby's BNPL permit; KSA operations halted or constrained
        - id: ksa-revenue-loss
          label: KSA Revenue Loss
          detail: Loss of Saudi Arabia revenue (80%+ of user base); $378M KSA 2025 revenue at risk
        - id: ipo-failure
          label: IPO Execution Failure
          detail: >-
            Tadawul IPO postponed or cancelled due to regulatory uncertainty, CMA filing failure, or adverse market
            conditions
        - id: jpmorgan-risk
          label: JPMorgan Facility Stress
          detail: Credit loss deterioration triggers covenant breach or JPMorgan reduces facility availability
        - id: liquidity-crunch
          label: Liquidity Crunch
          detail: Working capital constraint forces GMV reduction; expensive refinancing or emergency equity raise required
        - id: gmv-stall
          label: GMV Growth Stall
          detail: Transaction volume growth decelerates sharply; merchant and consumer trust erodes
        - id: fee-compression
          label: Competitive Fee Compression
          detail: Tamara and global BNPL entrants undercut Tabby MDR; blended take rate declines year-on-year
        - id: margin-decline
          label: Margin Decline
          detail: Revenue per GMV unit falls below break-even threshold; profitability reverses to loss-making
        - id: credit-loss
          label: Credit Loss Spike
          detail: Macro-driven consumer delinquency or fraud spike increases net charge-off rate materially
        - id: valuation-reset
          label: Valuation Reset
          detail: Pre-IPO secondary valuation ($4.5B implied) re-rated downward; Series F bridge required at lower price
      edges:
        - from: sama-tightening
          to: licence-loss
        - from: licence-loss
          to: ksa-revenue-loss
        - from: ksa-revenue-loss
          to: ipo-failure
        - from: jpmorgan-risk
          to: liquidity-crunch
        - from: liquidity-crunch
          to: gmv-stall
        - from: gmv-stall
          to: ipo-failure
        - from: fee-compression
          to: margin-decline
        - from: margin-decline
          to: ipo-failure
        - from: credit-loss
          to: jpmorgan-risk
        - from: credit-loss
          to: margin-decline
        - from: ipo-failure
          to: valuation-reset
  - id: FR003
    title: Dependency Map
    type: dag
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR023
      - CR024
    data:
      nodes:
        - id: tabby-core
          label: Tabby Platform
          detail: >-
            Core BNPL transaction engine, credit scoring, Tabby Card, Tabby Plus, Tabby Shop, Tweeq wallet — all
            operating entities combined
        - id: sama
          label: SAMA (Saudi Central Bank)
          detail: >-
            Issues and renews BNPL permit and Tweeq EMI licence; approves new products; sets capital and conduct
            requirements for KSA operations
        - id: jpmorgan
          label: JPMorgan $700M Facility
          detail: >-
            Provides receivables securitization working capital; enables BNPL book recycling; primary debt counterparty
            with single-lender concentration risk
        - id: visa
          label: Visa Card Network
          detail: >-
            Issues Tabby Card as Visa debit; provides card network rails for merchant disbursements; critical
            infrastructure for Tabby Card product
        - id: mastercard
          label: Mastercard Network
          detail: >-
            Secondary payment rail for merchant settlement and potential alternative card issuance; reduces
            single-network concentration modestly
        - id: cloud-infra
          label: Cloud Infrastructure
          detail: >-
            Hosts Tabby platform, scoring models, transaction processing, and PII data storage; likely AWS or GCP;
            critical operational dependency
        - id: ksa-banking
          label: KSA Banking Partners
          detail: >-
            Saudi licensed banks providing settlement accounts, fund custody, and local payment infrastructure
            integration; Tabby's connections to the Saudi payments system
        - id: tweeq
          label: Tweeq EMI (Acquired)
          detail: >-
            Saudi EMI licence holder acquired September 2024; provides digital wallet, money transfer, and spending
            infrastructure; SAMA-regulated separately from BNPL permit
      edges:
        - from: tabby-core
          to: sama
        - from: tabby-core
          to: jpmorgan
        - from: tabby-core
          to: visa
        - from: tabby-core
          to: mastercard
        - from: tabby-core
          to: cloud-infra
        - from: tabby-core
          to: ksa-banking
        - from: tabby-core
          to: tweeq
        - from: tweeq
          to: sama
        - from: ksa-banking
          to: sama
  - id: FV001
    title: Recommendation Logic
    type: flow
    claimRefs:
      - CV001
      - CV002
      - CV004
      - CV022
      - CV026
      - CV027
    data:
      nodes:
        - id: evidence-base
          label: Evidence Base
          detail: >-
            Series E $3.3B (Feb 2025), secondary $4.5B (Apr 2025), KSA revenue ~$378M (2025E), $10B+ GMV, 15M users, 2
            profitable years, IPO banks engaged.
          tone: neutral
        - id: thesis-assessment
          label: Thesis Assessment
          detail: >-
            MENA-first BNPL leadership confirmed; profitability verified via news sources; Tweeq wallet upside real but
            early-stage; IPO path credible with top-tier banks.
          tone: positive
        - id: risk-assessment
          label: Risk Assessment
          detail: >-
            SAMA regulatory risk high; credit loss opacity material; no audited consolidated accounts; no cohort/NRR
            data; preference stack unknown; IPO timing uncertain.
          tone: risk
        - id: valuation-assessment
          label: Valuation Assessment
          detail: >-
            $4.5B secondary implies 12-17x 2025 KSA revenue — stretched vs Klarna 5.4x at IPO; priced for near-perfect
            execution with limited margin of safety.
          tone: warning
        - id: recommendation
          label: Recommendation
          detail: >-
            Track / Research More. Confidence: Medium. Risk: High. Valuation Stance: Stretched. Entry at current levels
            requires IPO prospectus and audited accounts.
          tone: neutral
        - id: diligence-path
          label: Diligence Path
          detail: >-
            Required before upgrade: audited consolidated P&L, cohort NRR data, SAMA licence confirmation, IPO
            prospectus and preference stack, credit loss rate disclosure.
          tone: opportunity
      edges:
        - from: evidence-base
          to: thesis-assessment
        - from: evidence-base
          to: risk-assessment
        - from: thesis-assessment
          to: valuation-assessment
        - from: risk-assessment
          to: valuation-assessment
        - from: valuation-assessment
          to: recommendation
        - from: recommendation
          to: diligence-path
