  - id: FU001
    type: journey-map
    title: Customer Journey Map
    subtitle: Tabby consumer journey from initial discovery through loyalty and Tabby Plus upgrade
    approximationNotes: >-
      Journey stages based on Tabby official product documentation, consumer-facing app content, and independent analyst
      reporting. Timing estimates are inferred from BNPL industry norms and Tabby's stated 6-week instalment cycle.
    claimRefs:
      - CU001
      - CU004
      - CU011
      - CU012
      - CU033
    data:
      items:
        - label: Discovery / Awareness
          detail: >-
            Consumer discovers Tabby via Tabby Shop in-app browsing, merchant website BNPL offer, social media
            advertising, or word-of-mouth from existing users. MENA BNPL awareness driven by 40,000+ merchant checkout
            placements and Tabby Shop curated storefronts.
        - label: Account Registration and KYC
          detail: >-
            First-time user completes registration with national ID verification and KYC checks. Tabby's proprietary
            credit scoring engine evaluates eligibility in real time using ID data, bureau data, and behavioural
            signals. Approved users receive initial credit limit.
        - label: First Purchase — Pay-in-4 BNPL
          detail: >-
            Consumer selects Tabby at merchant checkout (online or in-store via QR/NFC). First instalment (25% of
            purchase value) is collected immediately; merchant receives full payment minus MDR. Three further
            instalments are scheduled over six weeks.
        - label: Instalment Repayment Cycle
          detail: >-
            Automated repayment of three remaining instalments over six weeks via linked payment method. Consumer tracks
            instalments and upcoming payments in the Tabby app. Positive repayment history improves future credit limit
            and approval probability.
        - label: Repeat Purchase and Loyalty
          detail: >-
            Successful repayment unlocks higher credit limits and faster approval for subsequent purchases. Consumer
            returns for fashion, electronics, home, and other purchases. Tabby Shop discovery surface promotes new
            merchants and deals to drive habitual return visits.
        - label: Upgrade to Tabby Plus Subscription
          detail: >-
            High-frequency shoppers upgrade to Tabby Plus (SAR 19/month) to earn premium cashback rates and access
            exclusive merchant deals. Subscription creates direct revenue stream and deepens consumer lock-in via
            cashback accumulation incentive.
        - label: Power User and Brand Advocacy
          detail: >-
            Long-tenure Tabby Plus subscribers with high transaction frequency become platform advocates. Referral
            behaviour and social sharing amplify organic growth. Tweeq wallet integration deepens engagement as
            consumers move salary deposits and P2P transfers onto Tabby.
  - id: FU002
    type: funnel
    title: Adoption / Deployment Funnel
    subtitle: MENA BNPL addressable market to Tabby engaged consumer funnel — estimated values in millions of users (2025)
    approximationNotes: >-
      All funnel values below Registered Users are estimated based on BNPL industry engagement benchmarks (20-40%
      MAU/registered ratio; 5-10% subscription conversion; 3-5% high-value repeat cohort). Tabby does not publicly
      disclose MAU, subscriber count, or high-value user definitions. These estimates are for illustrative diligence
      framing only.
