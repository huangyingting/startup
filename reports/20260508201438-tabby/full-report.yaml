  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >-
              Tabby competes in the buy now, pay later (BNPL) segment of consumer financial services in the Middle East
              and North Africa region, with Saudi Arabia and the UAE as its primary addressable markets. The core market
              includes merchant-funded, interest-free installment payment products at point of sale (POS) or digital
              checkout, where a retailer pays a merchant discount rate (MDR) to absorb the interest cost and offer a
              split-payment option to consumers. Excluded from the primary market definition are traditional credit
              cards (interest-bearing, bank- issued revolving credit), personal loans, deferred debit, and
              buy-now-pay-later offerings that charge consumer interest. Adjacent markets that are relevant to Tabby's
              expansion trajectory include: digital wallets and stored- value accounts (addressed through the Tweeq
              acquisition), subscription financial services (Tabby Plus), consumer rewards and loyalty, and product
              discovery commerce (Tabby Shop). The status-quo substitute for BNPL in MENA is the combination of cash on
              delivery (still prevalent in KSA and UAE), debit card purchases, and informal social credit (family
              lending). Formal credit cards have low penetration relative to developed markets, especially in Saudi
              Arabia where many consumers are unbanked or underbanked for credit products. This structural gap is the
              fundamental demand driver for Tabby's model. Adjacent substitutes from a merchant perspective include
              Afterpay (global, not MENA-focused), Klarna (largely European and US), and regional players Tamara,
              Postpay, and Cashew. The inclusion perimeter for sizing purposes in this chapter is: (1) BNPL transaction
              value processed on licensed BNPL platforms in Saudi Arabia and UAE and, separately, (2) the broader MENA
              addressable market inclusive of Kuwait, Bahrain, and Qatar where Tabby and peers have had or plan
              presence.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM Across Lenses
        blocks:
          - type: paragraph
            body: >-
              Multiple sizing lenses produce a coherent picture of Tabby's market opportunity, though estimates vary
              significantly depending on whether the frame is global BNPL value, MENA BNPL value, or the KSA-specific
              installed-base number. The most widely cited figure for MENA BNPL is from Research and Markets: $1.4
              billion in Saudi Arabia BNPL payments in 2023, growing to $2.7 billion by 2028 at approximately 13 percent
              CAGR. The AGBI reporting (September 2024) cited this figure directly, making it the primary benchmark for
              MENA BNPL sizing in coverage reviewed. The global BNPL market context is provided by the same source: a
              projected market size of $1 trillion by 2028 at 45 percent CAGR, representing a broader framing that
              includes Klarna's EU and US addressable market. For Tabby's purposes, the KSA figure is the most
              decision-relevant TAM proxy. Extending that frame: if MENA BNPL (Saudi Arabia + UAE + Kuwait + Qatar +
              Bahrain) is approximately $2.5–3B total in 2024 (extrapolating the $1.4B KSA figure given KSA represents
              roughly 50-60% of MENA BNPL volume by share of e-commerce), the MENA-wide TAM for the BNPL layer is
              approximately $2.5B rising to $5B+ by 2028. Tabby's claimed $10B annualized GMV as of early 2025 appears
              to represent a substantial fraction of this market already, suggesting Tabby's SOM already captures a
              significant share of the installed BNPL base. This would imply very high current market penetration of the
              BNPL-specific installed base, consistent with Tabby being the category leader. However, the broader SAM
              framing matters: if one includes all consumer e-commerce checkout spend as potential GMV (i.e., all
              purchases that could theoretically be BNPL-eligible), the Saudi Arabia e-commerce market alone was
              approximately $12B in 2023 (various estimates), implying significant ongoing headroom for BNPL penetration
              from a minority of checkout transactions to a majority. Conflicting estimates exist and should be
              preserved: Research and Markets' $1.4B Saudi BNPL in 2023 appears conservative relative to Tabby's own GMV
              claim of $10B+ (which spans KSA, UAE, and Kuwait), suggesting either the Research and Markets figure uses
              a narrower BNPL definition, or Tabby's $10B is an overstatement, or the market has grown faster than
              projected.
            claimRefs:
              - CM007
              - CM008
              - CM009
              - CM010
              - CM011
              - CM012
              - CM013
      - number: '2.3'
        title: Buyer and Segment Map
        blocks:
          - type: paragraph
            body: >-
              The BNPL market in MENA has two distinct buyer segments that Tabby must win simultaneously: consumers and
              merchants. Consumer adoption is driven primarily by young adults (18–35) who lack credit cards but have
              smartphones and online shopping habits. Saudi Arabia's population skews young — approximately 70 percent
              under 40 — and has one of the world's highest smartphone penetration rates, creating a structurally
              receptive consumer audience. The consumer BNPL use case is strongest in fashion (primarily female
              consumers buying apparel) and electronics (male-skewing high-ticket items), consistent with Tabby's
              reported top categories. UAE consumers are more likely to already hold credit cards due to the higher
              proportion of expatriate workers with formal banking relationships, slightly moderating the BNPL
              structural advantage compared to KSA. Merchant adoption is driven by conversion rate uplift and average
              order value increase at checkout. Retailers offering BNPL typically see 10–30% higher conversion versus
              credit-only checkout according to global BNPL operator disclosures, with average order value increases of
              20–50%. For MENA merchants — particularly in fashion and electronics where return rates can be high —
              buyer protection and Tabby Care features reduce merchant financial risk. Budget ownership on the merchant
              side lies with e-commerce and digital marketing teams who control payment gateway selection, or with
              CFOs/treasury for large retailers negotiating MDR terms. Grocery and travel verticals are emerging
              adjacencies. The payer in the BNPL model is the merchant (MDR revenue), while the consumer uses the
              product for free (no interest, no fees if payments are on time). This consumer-free model is structurally
              different from traditional credit and is the key adoption enabler in regions with consumer resistance to
              interest-bearing products (Islamic finance considerations). Tabby Plus represents a first move toward
              direct consumer monetization via subscription, suggesting the company is evolving beyond pure MDR revenue.
            claimRefs:
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
              - CM020
      - number: '2.4'
        title: Growth Drivers, Adoption Constraints, and Risks
        blocks:
          - type: paragraph
            body: >-
              The primary structural drivers for BNPL adoption in MENA are: (1) low formal credit penetration — credit
              card penetration in Saudi Arabia is substantially lower than in developed markets, creating a gap that
              BNPL fills for digitally-active but credit-light consumers; (2) young demographics — a large share of the
              population is aged 18–35, the prime BNPL demographic globally; (3) Saudi Vision 2030 — the national
              transformation plan explicitly targets a cashless economy and financial inclusion, providing regulatory
              tailwind for fintech operators and endorsement from sovereign actors; (4) e-commerce growth — Saudi
              Arabia's e-commerce penetration is growing rapidly from a lower base than US or Europe, expanding the
              addressable checkout touchpoint pool; (5) Islamic finance compatibility — interest-free BNPL is
              structurally compatible with Islamic finance principles, removing a barrier that exists for credit cards
              in culturally observant consumer segments. Adoption constraints and risks include: (1) regulatory
              uncertainty — BNPL regulation in Saudi Arabia (SAMA framework effective 2022) and UAE are evolving;
              additional requirements for capital, consumer protection, or credit bureau reporting could raise
              operational costs or cap growth; (2) competition — Tamara is a credibly funded Saudi BNPL player, and
              global operators including Klarna could expand into MENA; (3) credit risk — BNPL operators absorb credit
              risk on their books; in a credit-light consumer population, default data is thin and underwriting models
              are newer, creating tail risk; (4) merchant MDR compression — as BNPL becomes commoditised, merchants gain
              negotiating leverage to compress MDR rates, directly impacting Tabby's revenue per unit GMV; (5) consumer
              multi-homing — consumers can easily use multiple BNPL apps for different merchants, limiting network
              lock-in. The Vision 2030 and cashless economy driver is the most durable structural tailwind; MDR
              compression and regulatory tightening are the most material medium-term risks.
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
              - CM027
              - CM028
      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural BNPL advantage in Saudi Arabia is durable and deepening
            body: >-
              Low credit card penetration, young demographics, Islamic finance compatibility, and Vision 2030 regulatory
              tailwind combine to create a structurally advantaged market for BNPL in Saudi Arabia that is unlikely to
              reverse. These drivers are secular rather than cyclical, giving Tabby a long runway in its primary market.
            calloutType: strength
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
          - type: callout
            title: Sizing contradictions between Tabby GMV and analyst BNPL market estimates need resolution
            body: >-
              Tabby claims $10B+ annualized GMV while Research and Markets sizes the entire Saudi Arabia BNPL market at
              $1.4B for 2023. These figures conflict unless Tabby's GMV uses a broader definition (total checkout value
              rather than BNPL-specific volume), or the market has grown extremely rapidly, or one estimate is
              materially wrong. Investors should resolve this discrepancy before relying on either figure for market
              share estimates.
            calloutType: risk
            claimRefs:
              - CM009
              - CM011
              - CM013
          - type: callout
            title: Islamic finance compatibility is an underappreciated structural driver
            body: >-
              The interest-free structure of BNPL products is not merely a marketing feature in MENA — it removes a
              genuine religious and cultural barrier that has historically suppressed credit card adoption in observant
              Muslim consumer segments. This structural tailwind does not exist in US or European BNPL markets and
              partially explains why MENA BNPL has achieved faster penetration from a lower baseline.
            calloutType: insight
            claimRefs:
              - CM025
