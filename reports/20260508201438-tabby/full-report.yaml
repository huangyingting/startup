          detail: >-
            Estimated total addressable BNPL-eligible consumers in KSA, UAE, Kuwait, and broader MENA. Based on GCC
            adult internet-connected population with disposable income above BNPL minimum purchase threshold. MENA BNPL
            market projected to grow from $1.4B to $2.7B.
        - label: Tabby Registered Users (company-reported, millions)
          value: 15
          stage: Registered Base
          detail: >-
            15M+ registered users as of 2025-2026 per Tabby official disclosures corroborated by TechCrunch and
            Bloomberg Series E reporting. Represents approximately 19% penetration of estimated MENA BNPL addressable
            market — a substantial achieved share.
        - label: Estimated Active Monthly Users (est., millions)
          value: 6
          stage: Active Users
          detail: >-
            Estimated 40% MAU-to-registered ratio yields approximately 6 million monthly active users. Industry-standard
            BNPL engagement ratios range from 30-50% MAU/registered. Tabby does not disclose MAU; this is an
            illustrative estimate only.
        - label: Tabby Plus Subscribers (est., millions)
          value: 0.9
          stage: Premium Subscribers
          detail: >-
            Estimated 6% conversion of MAU to Tabby Plus subscription yields approximately 900,000 subscribers. At SAR
            19/month (~$5), this implies ~$54M annual subscription revenue. Tabby does not disclose subscriber count;
            this is an illustrative estimate.
        - label: High-Value Repeat Purchasers (est., millions)
          value: 0.45
          stage: Power Users
          detail: >-
            Estimated 3% of MAU or 50% of Tabby Plus subscribers represent high-frequency, high-basket-value repeat
            purchasers who drive disproportionate GMV and LTV. This power-user cohort is Tabby's most strategically
            valuable consumer segment.
