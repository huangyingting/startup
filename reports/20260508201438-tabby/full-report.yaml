  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >-
              Tabby's primary revenue source is the merchant discount rate (MDR), charged to retailers who integrate
              BNPL at checkout. The MDR represents a percentage of each transaction value paid by the merchant to Tabby
              in exchange for offering interest-free installment payments to consumers and for Tabby absorbing the
              credit risk on the installment book. MDR rates are not publicly disclosed, but global BNPL peers charge
              1–6% depending on category and merchant size. For Saudi Arabia — Tabby's primary market — the $378M
              revenue figure reported for 2025 (up from $267M in 2024, a 42% increase) represents Saudi Arabia only and
              is not consolidated across all markets. The precise revenue split between KSA, UAE, and Kuwait is not
              disclosed. Secondary revenue streams include: Tabby Plus (SAR 19/month subscription from consumers for
              access to rewards and benefits), Tabby Card fee revenue (not disclosed), Tabby Shop affiliate/referral
              revenue from product discovery, and Tabby Care merchant fees for buyer protection coverage. These non-MDR
              streams are estimated to be a small fraction of total revenue currently, though they represent the
              strategic direction toward direct consumer monetisation. The revenue recognition methodology for BNPL
              platforms is relevant: Tabby likely recognizes MDR revenue at the point of merchant transaction (gross
              basis for the full transaction facilitating amount), or net of the installment payouts. The accounting
              treatment affects the comparability of Tabby's revenue to BNPL peers. No audited financial statements are
              publicly available. All revenue figures cited in this chapter originate from Tabby company claims (press
              releases and investor communications) as reported in news coverage; they have not been independently
              verified against audited accounts.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
              - CI007
      - number: '4.2'
        title: Unit Economics, Margins, and Profitability
        blocks:
          - type: paragraph
            body: >-
              Tabby reported its first net profit for KSA operations: SAR 90.4 million (approximately $24M) in H1 2025,
              representing a 360% year-over-year improvement in the H1 2025 period. For the full year 2025, net profit
              was reported at approximately $55M (or $378M revenue at a 14.5% net margin). These figures, if accurate,
              demonstrate that Tabby's BNPL model can be profitable at scale in Saudi Arabia — a positive signal ahead
              of the planned Tadawul IPO. However, several unit economics components are not publicly disclosed: gross
              margin (MDR revenue minus credit losses and payment processing costs), customer acquisition cost (CAC),
              lifetime value (LTV), 90-day repeat usage rate, loss rate per vintage, and operating expense structure.
              The BNPL gross margin structure depends critically on credit loss rates: for a 0%-interest consumer
              product, Tabby's margin on each transaction equals the MDR charged minus credit losses on defaulted
              installments and payment processing costs. In MENA's thin-file consumer market, underwriting quality is
              critical. A 1% increase in default rate can erase 20–50% of gross margin depending on MDR level. Tabby's
              revenue growth trajectory — 42% from 2024 to 2025 in Saudi Arabia — is consistent with a maturing BNPL
              business that has achieved scale efficiencies. The H1 2025 profit margin of approximately 12–15% (SAR
              90.4M on estimated H1 revenue of SAR 600-700M) suggests operational leverage is working, but without
              audited accounts, these figures cannot be underwritten with high confidence by external investors.
              Cross-market profitability (UAE and Kuwait) is unknown. The aggregate group financials — including the
              costs of the Tweeq acquisition, the JPMorgan securitization facility interest cost, and UAE and Kuwait
              market losses — may look materially different from the KSA-only figures.
            claimRefs:
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
              - CI013
              - CI014
      - number: '4.3'
        title: Capital Structure, Funding, and Capital Intensity
        blocks:
          - type: paragraph
            body: >-
              Tabby has raised approximately $480M in equity across Seed through Series E (excluding the Tweeq
              acquisition) and secured $700M in securitization debt from JPMorgan in December 2023. The JPMorgan
              facility is backed by Tabby's BNPL receivables and represents a form of asset-backed lending: Tabby
              originates BNPL loans to consumers, pools them into a receivables vehicle, and JPMorgan provides a
              warehouse line to fund those receivables, allowing Tabby to recycle capital and grow GMV beyond what
              equity alone would support. This structure is standard for BNPL operators globally (Klarna, Affirm, and
              Afterpay all use similar receivables financing), but it introduces several financial risks: (1) interest
              rate risk — the cost of the JPMorgan facility is not disclosed but is likely a floating-rate spread,
              creating earnings sensitivity to rate changes; (2) counterparty concentration — a single $700M facility
              from one bank creates concentration risk if JPMorgan were to reduce or not renew the facility; (3)
              covenant risk — securitization facilities typically impose performance covenants (loss triggers, dilution
              triggers) that could restrict Tabby's operations if credit performance deteriorates; (4) leverage — the
              $700M facility combined with Tabby's equity base means the business is levered, amplifying both upside and
              downside. Tabby's total funding (equity + debt) of approximately $1.18B as of late 2023 (before the $160M
              Series E in February 2025) represents significant capital deployment in service of a $10B GMV run rate.
              The capital efficiency ratio (GMV / total funding) of approximately 8–10x suggests a relatively efficient
              use of capital, consistent with BNPL models that turn their receivables portfolio multiple times per year.
              The Series E at $3.3B valuation implies the market values Tabby at approximately 8.7x 2025 Saudi Arabia
              revenue ($3.3B / $378M), which is a high multiple for a regional BNPL operator, justifiable only if
              Tabby's super-app expansion and IPO premium materialise.
            claimRefs:
              - CI015
              - CI016
              - CI017
              - CI018
              - CI019
              - CI020
              - CI021
      - number: '4.4'
        title: Financial Diligence Gaps and IPO Readiness
        blocks:
          - type: paragraph
            body: >-
              Tabby's financial profile has three significant gaps that prevent full external underwriting ahead of the
              planned Tadawul IPO. First, the absence of audited consolidated financial statements covering all
              geographies (KSA + UAE + Kuwait + Tweeq entity) means investors are relying on company-released revenue
              and profit figures that have not been subjected to third-party audit scrutiny. BNPL-specific accounting
              judgments — on revenue recognition, credit loss provisioning, and interest income treatment — are material
              and require audit firm sign-off. Second, credit performance data (loss rates, delinquency buckets, vintage
              analysis) is not publicly available. This is the most important underwriting input for a BNPL lender: if
              Tabby's loss rates have risen as it extends credit to lower-quality borrowers to maintain GMV growth, the
              P&L profitability reported could be illusory — masked by insufficient provisioning. Third, the group-level
              capital adequacy position (total equity, total debt, liquidity, covenant headroom) is not disclosed.
              SAMA's BNPL regulations likely impose minimum capital requirements on Tabby's Saudi entity, and the SAMA
              EMI licence for Tweeq imposes separate capital requirements. The IPO process — filing the prospectus with
              the Saudi Capital Markets Authority (CMA) — will require full audited accounts, complete segment
              disclosure, and credit performance data. The IPO process therefore represents the natural resolution event
              for most of these financial diligence gaps. For pre-IPO investors transacting at the secondary market
              implied valuation of $4.5B (April 2025), the absence of audited accounts creates a material information
              asymmetry risk that demands either deep primary discovery with Tabby management or a discount to the
              disclosed secondary valuation.
            claimRefs:
              - CI022
              - CI023
              - CI024
              - CI025
              - CI026
              - CI027
              - CI028
      - number: '4.5'
        title: Exhibits
        blocks:
          - type: callout
            title: KSA profitability at $55M net profit demonstrates BNPL unit economics can work at scale in MENA
            body: >-
              Tabby's reported $55M net profit in Saudi Arabia for 2025 (14.5% net margin on $378M revenue) is the first
              credible evidence that a MENA BNPL operator can achieve meaningful profitability in its core market. This
              de-risks the IPO thesis and validates the MDR-funded consumer credit model. However, this is company-
              claimed data requiring audit confirmation before it can be fully relied upon by external investors.
            calloutType: strength
            claimRefs:
              - CI008
              - CI009
              - CI010
          - type: callout
            title: $700M JPMorgan debt facility creates counterparty concentration and covenant risk
            body: >-
              Tabby's business model depends critically on the JPMorgan securitization facility to recycle receivables
              capital and fund GMV growth. A single $700M facility from one counterparty creates concentration risk. If
              JPMorgan reduces availability, imposes restrictive covenants triggered by credit deterioration, or does
              not renew the facility, Tabby's GMV capacity could be severely constrained. The facility terms and
              covenants are not publicly disclosed, making this the most material undisclosed financial risk.
            calloutType: risk
            claimRefs:
              - CI016
              - CI017
              - CI018
          - type: callout
            title: Absence of audited group-level financials is the primary diligence blocker for pre-IPO investors
            body: >-
              All financial figures in this chapter originate from company-claimed press releases or news reporting of
              those claims. No audited consolidated accounts covering all geographies and entities (KSA + UAE + Kuwait +
              Tweeq) have been publicly disclosed. The KSA-only profitability metric may not reflect the group position
              if UAE or Kuwait operations are loss-making. Investors transacting at the $4.5B secondary valuation are
              accepting significant financial information risk that should be priced into any pre-IPO discount
              requirement.
            calloutType: risk
            claimRefs:
              - CI022
              - CI023
              - CI024
              - CI025
          - type: callout
            title: Series E revenue multiple of 8.7x KSA 2025 revenue prices in the super-app expansion successfully
            body: >-
              At $3.3B Series E valuation on $378M KSA 2025 revenue, the implied multiple is 8.7x trailing revenue. This
              is a high multiple for a MENA regional BNPL operator and implies investors believe Tabby will either: (1)
              expand revenue significantly via UAE and Kuwait, (2) successfully monetize Tabby Card, Tabby Plus, and
              Tabby Shop at margins above pure MDR, or (3) achieve an IPO premium that justifies the entry multiple. If
              KSA revenue growth decelerates below 30%, the valuation would be difficult to sustain.
            calloutType: insight
            claimRefs:
              - CI019
              - CI020
              - CI021
