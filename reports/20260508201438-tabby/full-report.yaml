  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              Tabby's investment thesis rests on four structural pillars. First, MENA-first BNPL leadership: Tabby holds
              an estimated 60% KSA BNPL market share by company claims, with 15 million registered users, over 40,000
              merchant partners, and $10B+ annualised GMV. This network scale creates durable switching costs for both
              consumers and merchants that new entrants struggle to replicate. Second, dual-year profitability de-risks
              the pre-IPO profile significantly versus global BNPL peers such as Klarna and Affirm, which remained
              loss-making through their growth phases. Tabby reported a KSA net profit of approximately $55M in 2025,
              with H1 2025 KSA net profit growing 360% year-over-year to SAR 90.4 million. Third, Tweeq wallet
              acquisition in September 2024 unlocks the full neobank revenue stack — interchange income on Tabby Card
              transactions, savings products, and eventually embedded lending — providing a material upside driver
              beyond merchant discount rate income. Fourth, the Saudi Tadawul IPO pathway with JPMorgan, HSBC, and
              Morgan Stanley engaged as banks provides a credible liquidity event for existing investors within a 12-24
              month horizon. The anti-thesis centres on four structural concerns. Valuation at $4.5B secondary implies
              approximately 12-17x 2025 estimated KSA revenue of $378M — materially elevated versus global BNPL peers
              including Klarna at approximately 5.4x revenue at IPO preparation stage. SAMA regulatory tightening
              represents existential risk: new credit limit caps or capital adequacy requirements could constrain GMV
              growth or mandate expensive equity raises at lower valuations. Credit loss rates, net revenue retention,
              and cohort data are not publicly disclosed, creating material information asymmetry that prevents
              independent verification of profitability claims. Finally, revenue multiple compression risk is real —
              Klarna's European MDR compression from 3-4% to under 2% as competition intensified provides a cautionary
              precedent for the MENA market over a 24-36 month horizon as Tamara and global entrants scale.
            claimRefs:
              - CV001
              - CV002
              - CV014
              - CV015
              - CV016
              - CV017
              - CV022
              - CV037
              - CV038
              - CV041
              - CV042
              - CV046
      - number: '8.2'
        title: Recommendation and Confidence
        blocks:
          - type: paragraph
            body: >-
              The recommendation for Tabby at its current $4.5B secondary implied valuation is Track / Research More,
              with medium confidence and a high risk rating. The valuation stance is Stretched. This recommendation
              reflects a well-constructed company with demonstrable profitability and a credible IPO path, but priced
              for near-perfect execution at a multiple that leaves limited margin of safety. At 12-17x 2025 estimated
              KSA revenue, Tabby is priced substantially above comparable global BNPL peers at IPO readiness stages —
              Klarna prepared its IPO at approximately 5.4x revenue — and any material adverse development in credit
              losses, regulatory conditions, or IPO market timing could produce a significant markdown. The medium
              confidence reflects the strong public evidence base for Tabby's profitability and growth trajectory but
              acknowledges three material information gaps that prevent a high-conviction buy: (1) no publicly available
              audited consolidated financial statements covering all group entities including UAE, Kuwait, and Tweeq;
              (2) no disclosed cohort retention, net revenue retention, or customer lifetime value data; (3) no IPO
              prospectus, preference stack details, or Saudi CMA filing that would clarify post-IPO dilution and
              investor returns. A conviction buy requires at minimum: audited consolidated P&L confirming group-level
              profitability, cohort data supporting NRR above 110%, confirmation that SAMA licence renewal is on track,
              and IPO prospectus disclosure that enables preference stack analysis.
            claimRefs:
              - CV022
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
              - CV012
              - CV037
      - number: '8.3'
        title: Financing Context and Valuation History
        blocks:
          - type: paragraph
            body: >-
              Tabby's financing history traces a disciplined escalation from seed capital through five institutional
              rounds to a secondary market valuation of $4.5B. The Series A (2021, approximately $50M raised)
              established the initial BNPL product in KSA. Series B (2022) brought the company to unicorn proximity.
              Series C followed, establishing merchant network scale. The landmark Series D closed in November 2023 at
              $1.5B valuation with $200M raised from Wellington, STV, Mubadala, PayPal Ventures, and Hassana — a
              consortium that anchors Tabby's institutional credibility. Concurrent with the Series D, JPMorgan arranged
              a $700M receivables securitisation facility in December 2023, dramatically expanding Tabby's GMV capacity
              without additional equity dilution. This facility is the working capital engine for the entire BNPL
              receivables book and represents the highest single counterparty dependency in the capital structure. The
              Series E in February 2025 raised $160M at $3.3B valuation — a 2.2x step-up from Series D — led by
              returning investors and signalling sustained institutional demand. The secondary market transaction in
              April 2025 implied a $4.5B valuation, representing a further 36% step-up in just eight months and
              suggesting strong demand from secondary buyers anticipating an IPO re-rating. JPMorgan, HSBC, and Morgan
              Stanley have been engaged as IPO banks, with Tabby targeting the Saudi Tadawul as the primary listing
              venue. The IPO window is most commonly cited as 2026-2027 by analyst and news sources, though no formal
              filing has occurred. The total equity raised across all rounds exceeds $650M, and the JPMorgan debt
              facility brings total financing accessed to approximately $1.35B — providing substantial runway and GMV
              capacity through the IPO process.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV005
              - CV010
              - CV011
              - CV018
              - CV044
              - CV045
              - CV047
              - CV048
      - number: '8.4'
        title: Bull / Base / Bear Scenarios
        blocks:
          - type: paragraph
            body: >-
              Three valuation scenarios bracket the return range from the $4.5B secondary mark. The bull case assumes a
              2026-2027 IPO at approximately 20x forward revenue on a 2026 estimated revenue base of $600M, implying a
              $6B-$8B IPO valuation. This scenario requires Tweeq wallet monthly active users exceeding 2 million within
              12 months, UAE expansion contributing materially to group revenue, and a benign SAMA regulatory
              environment. The return logic is 33-78% upside from the $4.5B secondary mark on a 3-4 year hold,
              contingent on public market re-rating from private BNPL multiple to a diversified fintech multiple as
              wallet revenue contribution grows. Probability signal is low-to-medium: achievable but requires
              simultaneous execution of multiple strategic initiatives. The base case targets a 2027 IPO at
              approximately 15x forward revenue on 2027 estimated revenue of $520M, implying $4.5B-$6B valuation. This
              scenario assumes KSA-dominant growth continues at current trajectory with moderate UAE contribution, no
              material SAMA tightening, and Tweeq wallet contributing modestly. The return logic is 0-33% upside from
              $4.5B on a 2-3 year horizon — flat to modest gain unless the public market awards a premium multiple at
              IPO. Probability signal is medium, consistent with current trajectory if execution holds. The bear case
              assumes SAMA tightening caps credit limits, IPO is delayed beyond 2027, and competitor fee pressure from
              Tamara squeezes merchant margins, holding 2026 revenue at $350M. At 8-10x depressed multiples, valuation
              falls to $2.5B-$3.5B — representing 22-44% loss from current secondary mark, potentially triggering a
              down-round if IPO is deferred beyond 2028. Probability signal is low-to-medium: non-trivial tail risk
              given SAMA regulatory uncertainty.
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV006
              - CV007
              - CV022
              - CV046
      - number: '8.5'
        title: Comparable Set Analysis
        blocks:
          - type: paragraph
            body: >-
              Tabby's comparable set spans global BNPL peers, MENA regional operators, and relevant M&A transactions.
              Klarna is the closest structural comparable — a profitable BNPL operator preparing for a 2025 IPO with
              estimated $15B valuation on 2024 revenue of $2.8B, implying approximately 5.4x revenue. Klarna's
              profitable scale and European market dominance provide the most direct parallel, though the maturity
              difference is material: Klarna operates at nearly 7x Tabby's scale. Tabby's 12-17x revenue multiple
              represents a significant premium to Klarna's 5.4x — justified in part by MENA's higher growth trajectory
              and Tabby's smaller base, but requiring significant execution to sustain through IPO. Afterpay, acquired
              by Block (formerly Square) in 2022 for approximately $29B, provides a useful M&A ceiling benchmark but was
              executed at the peak of the BNPL cycle when growth was paramount and interest rates were near zero —
              conditions that do not replicate today. Tamara, the nearest direct MENA competitor operating under SAMA
              licence in KSA, is privately valued at approximately $1B based on Series C estimates — representing less
              than one-quarter of Tabby's implied valuation. This relative premium reflects Tabby's first-mover
              advantage, user scale, and profitability. Zip, the ASX-listed BNPL company that acquired Spotii for MENA
              market entry, provides a cautionary precedent: its market capitalisation of approximately $500M AUD
              illustrates how BNPL operators struggle to sustain premium multiples in public markets without clear
              profitability. The comparables analysis supports Tabby's premium over regional peers but shows material
              compression risk versus global BNPL multiples at IPO.
            claimRefs:
              - CV012
              - CV013
              - CV021
              - CV022
              - CV033
              - CV037
      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Tabby's IPO readiness is materially advanced relative to most pre-IPO growth companies. Two consecutive
              profitable years in KSA (2024 and 2025), SAMA licence compliance maintained since July 2022, UAE CBUAE SVF
              licence obtained in April 2026, and engagement of JPMorgan, HSBC, and Morgan Stanley as IPO banks
              collectively signal a company in active pre-IPO preparation. The Saudi Tadawul listing target aligns with
              Saudi Vision 2030 objectives and provides a domestic investor base that understands Tabby's regulatory
              context — a structural advantage over cross-border listings. However, six material diligence items remain
              outstanding that are necessary before a conviction investment decision. Audited consolidated financial
              statements covering KSA, UAE, Kuwait, and Tweeq entities would confirm group-level profitability versus
              the KSA-only disclosed metrics. Cohort retention and NRR data would validate the sustainability of
              customer economics and repeat purchase rates. IPO prospectus terms would clarify post-IPO dilution,
              preference share conversion, and the distribution of IPO proceeds to existing holders. Cap table and
              preference stack details are necessary to model investor returns under different IPO price scenarios.
              Credit loss provisioning rate disclosed in audited accounts would enable independent verification of
              whether the reported $55M net profit reflects conservative or aggressive provisioning. Finally, SAMA
              licence renewal conditions and terms must be confirmed directly to assess the single highest-severity
              regulatory risk to the IPO timeline. Absent these items, Track / Research More remains the appropriate
              posture — the company is monitoring-worthy but requires materially more evidence before investment
              commitment at current valuation levels.
            claimRefs:
              - CV004
              - CV010
              - CV011
              - CV027
              - CV028
              - CV029
              - CV030
              - CV032
              - CV039
      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: MENA BNPL first-mover advantage supports premium multiple over regional peers
            body: >-
              Tabby's estimated 60% KSA BNPL market share, 15 million registered users, and $10B+ GMV create network
              defensibility that justifies a meaningful premium over Tamara's estimated $1B valuation. The first-mover
              advantage is especially durable in MENA where SAMA licensing barriers limit new entrants, and merchant
              integration switching costs are high. However, the premium versus global peers such as Klarna remains
              difficult to sustain through an IPO process where public market investors will apply global comparable
              multiples.
            calloutType: insight
            claimRefs:
              - CV015
              - CV016
              - CV021
              - CV038
          - type: callout
            title: Valuation at $4.5B secondary implies 12-17x 2025 revenue — stretched vs global BNPL peers at 5-8x
            body: >-
              Tabby's April 2025 secondary mark of $4.5B implies approximately 12-17x its estimated 2025 KSA revenue of
              $378M. This compares unfavourably to Klarna's approximately 5.4x revenue at its 2025 IPO preparation
              stage. Global BNPL peers have consistently traded at 5-8x revenue in public markets, even during bullish
              fintech cycles. Tabby's premium is partially justified by higher MENA growth rates and smaller base, but
              the gap creates meaningful multiple compression risk if the IPO is delayed or if public market investors
              apply global comparable frameworks.
            calloutType: risk
            claimRefs:
              - CV002
              - CV012
              - CV022
              - CV037
          - type: callout
            title: Two consecutive profitable years de-risk pre-IPO profile vs loss-making global BNPL peers
            body: >-
              Tabby reported KSA profitability for both 2024 and 2025, with H1 2025 net profit growing 360%
              year-over-year to SAR 90.4 million. This distinguishes Tabby from virtually all global BNPL peers at
              comparable stages: Klarna, Affirm, and Afterpay each operated at significant losses through their primary
              growth phases. Profitability at Tabby's current scale significantly de-risks the IPO process, reduces
              equity dilution pressure from emergency fundraises, and provides a cash buffer against regulatory or
              competitive shocks that would have been existential at an earlier funding stage.
            calloutType: strength
            claimRefs:
              - CV004
              - CV008
              - CV009
          - type: callout
            title: >-
              Audited financials, cohort retention, and NRR data are private — material information asymmetry for
              investors
            body: >-
              The most critical valuation risk is not the multiple itself, but the opacity of the underlying metrics
              supporting it. Audited consolidated financial statements, cohort vintage curves, net revenue retention,
              credit loss rates, and provisioning methodology are all unavailable from public sources. A 1% increase in
              net credit loss rate across a $10B+ GMV portfolio would eliminate the reported $55M KSA net profit
              entirely. Without these inputs, independent verification of the profitability claims is impossible, and
              the current valuation must be taken largely on faith in management's public disclosures.
            calloutType: risk
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV008
          - type: callout
            title: >-
              Track / Research More — conviction requires IPO prospectus, audited accounts, and SAMA licence
              confirmation
            body: >-
              The Track / Research More recommendation is calibrated to the current evidence state. Tabby is a
              well-constructed company with strong public evidence of market leadership and profitability, but priced at
              a level that requires near-perfect execution and has limited margin of safety. The three information gaps
              that most materially prevent a conviction buy — audited consolidated accounts, cohort/NRR data, and IPO
              prospectus terms — are all addressable through the IPO process itself. Investors should establish a
              monitoring position now, prepare diligence infrastructure for the prospectus release, and plan to upgrade
              conviction when these items become available.
            calloutType: recommendation
            claimRefs:
              - CV026
              - CV027
              - CV028
              - CV030
