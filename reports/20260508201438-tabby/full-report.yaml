  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              Tabby addresses two structurally distinct customer segments: business-to-consumer (B2C) retail shoppers
              and business-to-business (B2B) merchant partners. [CU001] The consumer segment encompasses over 15 million
              registered users distributed predominantly across Saudi Arabia (80%+), UAE, and Kuwait. [CU003] The core
              user demographic skews strongly toward millennials and Generation Z — digital-native, credit-averse
              consumers who prefer interest-free instalment purchasing over traditional bank credit cards or revolving
              debt. [CU010] This demographic preference aligns with GCC population dynamics, where over 60% of Saudi
              Arabia's population is under 35 years old, creating a structurally receptive base for BNPL adoption.
              Consumer use cases span fashion purchases, consumer electronics, home furnishings, travel bookings, and
              grocery spending — verticals with elevated average order values and high repeat purchase frequency.
              [CU033] The merchant segment comprises 40,000+ business partners whose primary job-to-be-done is
              converting browser visits into paying customers; Tabby's BNPL reduces checkout friction by eliminating the
              upfront full-payment barrier. [CU002] Merchant scale spans from independent SME retailers through to
              global enterprise brands and large retail conglomerates. Enterprise merchant relationships include
              prominent names across fashion, electronics, luxury, and home categories. [CU040] The two-sided platform
              structure creates a reinforcing network dynamic: consumer network scale directly amplifies merchant
              acquisition value, and the 40,000+ merchant catalogue is itself a consumer recruitment and retention
              asset. [CU001, CU002]
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU010
              - CU033
              - CU040
      - number: '6.2'
        title: Adoption Trajectory and Growth Metrics
        blocks:
          - type: paragraph
            body: >-
              Tabby's adoption trajectory is underpinned by multiple independently corroborated data points signalling
              rapid scale across users, merchants, and financial performance. [CU004] The platform processed over $10
              billion in annualized transaction volume as of 2025 — a step-change from sub-$1 billion at the time of
              Series A fundraising, representing a 10x+ increase over the growth phase. For the KSA segment — Tabby's
              dominant market — reported revenue was approximately $267 million for full-year 2024. [CU005] By 2025, KSA
              revenue grew to approximately $378 million on the same basis, implying approximately 41% year-on-year
              growth in the core market. [CU006] The most striking metric is H1 2025 KSA net profit: SAR 90.4 million,
              representing a 360% year-on-year increase over H1 2024 — a growth rate that signals operational leverage
              and improving unit economics at scale. [CU007] Two consecutive profitable years — achieved during a period
              of aggressive BNPL expansion — signal a business model generating cash from operations rather than merely
              growing at the expense of margin. [CU009] Fundraising trajectory further corroborates adoption: Series D
              ($200M at $1.5B valuation, November 2023) was followed by Series E ($160M at $3.3B valuation, February
              2025), with a secondary transaction at an implied $4.5B valuation in April 2025. [CU031, CU032, CU037]
              Merchant network growth — from launch to 40,000+ partners — reflects the supply-side adoption that enables
              and sustains consumer transaction volume at the claimed scale. [CU002]
            claimRefs:
              - CU002
              - CU004
              - CU005
              - CU006
              - CU007
              - CU009
              - CU031
              - CU032
              - CU037
      - number: '6.3'
        title: Named Merchant Customer Proof
        blocks:
          - type: paragraph
            body: >-
              Tabby's merchant proof extends beyond logo collections to include named production deployments across
              multiple verticals and market segments. [CU020] Amazon, the global e-commerce leader, deploys Tabby BNPL
              at checkout for Saudi and UAE customers — one of Tabby's most credible production proof points given
              Amazon's rigorous vendor evaluation standards and global brand visibility. SHEIN, the dominant Gen Z
              fast-fashion platform, represents high-frequency low-basket-size transactions at scale — precisely the
              repeat-purchase behaviour that builds consumer retention. [CU021] Adidas and H&M provide international
              brand-name fashion proof across sport and mass-market segments. [CU022, CU024] IKEA serves as the anchor
              proof in the home furnishings category, where high average order values make instalment credit
              particularly conversion-relevant. [CU023] Samsung validates the consumer electronics vertical with global
              brand credibility. [CU025] Noon, the UAE-headquartered MENA e-commerce platform, provides regional digital
              commerce proof. [CU026] Enterprise group relationships include Al Futtaim Group, a diversified UAE retail
              conglomerate; Landmark Group, one of the largest retail conglomerates in the Middle East and Africa;
              Apparel Group, a lifestyle and fashion retail operator with 80+ brands across 14 countries; and Chalhoub
              Group, a luxury goods distributor operating LVMH and premium brands across the GCC. [CU027, CU028, CU029,
              CU030] Named merchant proof spans fashion, electronics, home, luxury, and mass e-commerce — the five
              highest-GMV BNPL categories in the regional market. The primary evidence gap is that only 11 merchants
              have been independently verified against the claimed 40,000+ merchant base.
            claimRefs:
              - CU020
              - CU021
              - CU022
              - CU023
              - CU024
              - CU025
              - CU026
              - CU027
              - CU028
              - CU029
              - CU030
      - number: '6.4'
        title: Retention, Repeat Usage, and Satisfaction
        blocks:
          - type: paragraph
            body: >-
              Retention and repeat usage evidence for Tabby is mixed: strong proxy signals from profitability and app
              engagement coexist with a near-complete absence of publicly disclosed cohort or retention metrics. [CU035]
              The most reliable retention proxy is Tabby's achievement of profitability in two consecutive years — an
              outcome structurally inconsistent with mass consumer churn, since BNPL unit economics require repeat
              purchase volume to amortize user acquisition and onboarding costs. [CU009] The Tabby app carries a 4.8
              star rating across iOS and Android platforms, a consumer satisfaction figure cited by the company in
              official communications. [CU008] High app store ratings in the MENA mobile finance market are a meaningful
              satisfaction indicator given the competitive alternatives available to consumers — Tamara, Postpay, and
              Cashew all compete for the same instalment credit demand. Tabby Plus, the SAR 19/month subscription tier
              offering premium cashback and exclusive merchant deals, acts as an explicit retention mechanism:
              subscribers are economically incentivized to route purchases through Tabby to earn back the subscription
              fee via cashback accumulation. [CU011] Tabby Shop — claiming 20 million+ shoppers on its merchant
              discovery surface — drives habitual engagement beyond the point-of-sale, creating discovery-loop return
              visits independent of immediate purchase intent. [CU012] What remains undisclosed publicly includes
              consumer cohort retention rates, net revenue retention (NRR) for merchant accounts, gross merchant
              retention rates, net promoter score (NPS), and credit default or fraud metrics. [CU036] Independent
              adverse evidence from Trustpilot captures consumer complaints related to merchant dispute resolution
              delays and inconsistent credit approval experiences, representing a qualitative counterpoint to the
              official 4.8 rating claim. [CU019]
            claimRefs:
              - CU008
              - CU009
              - CU011
              - CU012
              - CU019
              - CU035
              - CU036
      - number: '6.5'
        title: Expansion and Geographic Concentration
        blocks:
          - type: paragraph
            body: >-
              Tabby's geographic expansion strategy is anchored in deepening its dominant KSA position while
              systematically extending the platform model to UAE and Kuwait. [CU003] Over 80% of Tabby's registered user
              base is concentrated in Saudi Arabia — a structurally concentrated position that is simultaneously a
              strength (deep market penetration with regulatory first-mover advantage) and a risk (KSA-specific
              regulatory, economic, or competitive disruptions would affect the large majority of users). [CU034] UAE is
              Tabby's second active market, where the April 2026 award of a Stored Value Facility (SVF) licence from the
              UAE Central Bank (CBUAE) opens the pathway for full wallet product deployment alongside the existing BNPL
              service. [CU016] The SVF licence elevates Tabby's UAE regulatory standing from payment processor to
              licensed stored-value issuer — enabling salary deposits, P2P transfers, and prepaid card products that
              expand the consumer relationship beyond BNPL checkout. [CU016] Kuwait represents Tabby's third operational
              geography, currently serving a smaller user share. [CU015] The September 2024 acquisition of Tweeq — a
              SAMA EMI-licenced digital wallet company — added stored-value wallet capabilities in KSA under an existing
              regulatory licence, deepening the wallet functionality for the dominant KSA segment and building toward a
              neobank positioning. [CU013] A planned IPO on the Saudi Tadawul exchange, with JPMorgan, HSBC, and Morgan
              Stanley as advisors, has been publicly signalled — a public listing would further anchor Tabby's KSA
              presence and provide capital for the next geographic and product expansion phase. [CU038] The MENA BNPL
              market is projected to grow from approximately $1.4 billion to $2.7 billion, providing a structural
              tailwind for geographic and vertical expansion. [CU017]
            claimRefs:
              - CU003
              - CU013
              - CU015
              - CU016
              - CU017
              - CU034
              - CU038
      - number: '6.6'
        title: Customer Concentration and Adverse Evidence
        blocks:
          - type: paragraph
            body: >-
              Tabby's concentration risks and adverse evidence are material diligence items requiring direct data room
              investigation to resolve. On the merchant concentration side, Tabby does not publicly disclose the GMV
              contribution of its top-10 or top-25 merchant partners. [CU018] It is structurally plausible that a
              handful of high-volume merchants — Amazon, Noon, and the major retail conglomerates (Al Futtaim, Landmark,
              Apparel Group) — account for a disproportionate share of total GMV, creating fragility if any one
              relationship were to terminate or if a merchant developed an in-house BNPL solution. The MENA BNPL sector
              is increasingly competitive, with Tamara — the primary regional competitor — having raised comparably
              large rounds and reached meaningful scale in overlapping GCC verticals. [CU017] On the consumer side,
              Trustpilot reviews for Tabby include complaints about merchant dispute resolution delays, inconsistent
              credit approval outcomes, and confusion over late fee removal policies post-2023. [CU019] These complaints
              are qualitatively consistent with BNPL scale challenges experienced globally, but frequency and severity
              relative to the 15 million user base cannot be independently quantified without direct data access.
              [CU019] Consumer fraud rate, credit default rate, and disputed transaction frequency are not publicly
              disclosed metrics for Tabby. [CU039] The absence of this data is a diligence gap warranting direct
              management engagement. The 80%+ geographic concentration in KSA also creates a single-market regulatory
              dependency: any change in SAMA's BNPL framework, credit limits, or consumer protection rules would
              directly affect the vast majority of Tabby's user base and revenue. [CU003, CU034]
            claimRefs:
              - CU003
              - CU017
              - CU018
              - CU019
              - CU034
              - CU039
      - number: '6.7'
        title: Exhibits
        blocks:
          - type: callout
            title: 40K+ Merchant Network Creates Two-Sided Discovery Flywheel
            body: >-
              Tabby's 40,000+ merchant network — spanning Amazon, SHEIN, IKEA, Samsung, Noon, and major GCC retail
              conglomerates — creates a discovery flywheel that compounds with scale. Consumers join Tabby because their
              preferred merchants accept it; merchants join because Tabby's 15M+ consumer base is a ready-made
              acquisition channel. Tabby Shop — the in-app merchant discovery surface claiming 20M+ shoppers —
              transforms the BNPL payment app into a commerce destination, driving habitual engagement and repeat visits
              independent of immediate purchase intent. This network architecture makes Tabby simultaneously a payment
              infrastructure, a consumer acquisition tool for merchants, and an advertising/discovery platform — three
              revenue vectors from one user base.
            calloutType: strength
            claimRefs:
              - CU001
              - CU002
              - CU012
              - CU020
              - CU026
          - type: callout
            title: Two Consecutive Profitable Years with 360% H1 2025 Net Profit Growth
            body: >-
              Tabby's achievement of profitability in two consecutive years, punctuated by a 360% year-on-year increase
              in KSA net profit for H1 2025 (SAR 90.4M), is among the most differentiated financial signals in the MENA
              fintech cohort. Most BNPL competitors at comparable scale are still burning capital. Profitability at this
              trajectory signals not just breakeven efficiency but accelerating operating leverage — fixed costs being
              absorbed across a growing revenue base, with marginal contribution exceeding marginal cost at increasing
              rates. This financial profile substantially de-risks the IPO narrative and creates a credible pathway to
              public market listing.
            calloutType: strength
            claimRefs:
              - CU007
              - CU009
              - CU005
              - CU006
          - type: callout
            title: Risk — Top-Merchant GMV Concentration Unknown and Unquantifiable from Public Data
            body: >-
              Tabby does not disclose the GMV contribution of its top-10 or top-25 merchant partners. Given that Amazon,
              Noon, and the major retail conglomerates (Al Futtaim, Landmark, Apparel Group) collectively span the
              highest-volume BNPL retail categories, it is structurally plausible that a handful of relationships
              account for 30-50%+ of total platform GMV. Loss of one top merchant — through competitive displacement,
              in-house BNPL development, or relationship deterioration — could materially impact revenue. This
              concentration risk cannot be sized without direct data room access to merchant GMV distribution and
              contract terms.
            calloutType: risk
            claimRefs:
              - CU002
              - CU018
              - CU020
              - CU026
          - type: callout
            title: Risk — Consumer Cohort and Retention Data Not Publicly Disclosed
            body: >-
              Tabby's core retention metrics — consumer cohort retention, monthly active user rates, NRR for merchants,
              and subscriber churn for Tabby Plus — are not publicly disclosed. Investors and acquirers cannot
              independently assess whether the 15M registered user base represents a durable, engaged cohort or a
              largely dormant historical count. The proxy indicators (profitability, app rating) are consistent with
              healthy retention but cannot substitute for cohort-level evidence. This represents the primary diligence
              gap requiring direct management engagement and data room access before any investment or acquisition
              decision.
            calloutType: risk
            claimRefs:
              - CU035
              - CU036
              - CU008
              - CU009
          - type: callout
            title: Insight — Tweeq Wallet Acquisition Positions Tabby for Full Neobank Play
            body: >-
              The September 2024 acquisition of Tweeq — combined with the April 2026 UAE SVF licence — is the strategic
              move that differentiates Tabby from every other MENA BNPL competitor. By stacking a SAMA EMI licence (via
              Tweeq) onto its existing SAMA BNPL permit, plus the UAE CBUAE SVF licence, Tabby has built a regulatory
              stack that enables stored-value wallets, P2P transfers, and salary deposits — the core capabilities of a
              primary financial account. No other MENA BNPL player has assembled an equivalent regulatory stack. If
              Tabby successfully integrates Tweeq and launches the full wallet experience, it transforms from a checkout
              payment tool into a financial super-app for the GCC — a market segment with no established winner and a
              multi-billion dollar TAM.
            calloutType: insight
            claimRefs:
