          - type: callout
            title: Consumer switching cost is structurally low — the real battleground is merchant acquisition
            body: >-
              MENA BNPL consumers face near-zero switching costs: every app is installed in seconds, there is no monthly
              fee for basic BNPL, and consumer benefit depends on merchant coverage not operator preference. This means
              the competitive moat is won or lost at the merchant level: whichever operator achieves deeper merchant
              coverage will attract more consumer usage, which in turn attracts more merchants. Tabby's 40K+ merchant
              claim (if accurate) is therefore the most important data point for assessing moat durability — and
              independent verification of this figure is a priority diligence task.
