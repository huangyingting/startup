      - number: '6.2'
        title: Adoption Trajectory and Growth
        blocks:
          - type: paragraph
            body: |
              Temporal's customer growth trajectory since Temporal Cloud GA in October 2022 has been
              exceptional by any benchmark. The platform crossed 1,000 enterprise customers in April
              2024, roughly 18 months post-GA. By August 2024 the count rose to 1,500 customers, and
              by March 2025 it reached 2,500+, implying approximately 1,000 net new logos in roughly
              seven months or about 143 new customers per month during that interval. This trajectory
              is exceptional for an infrastructure-focused developer-tooling company competing in a
              market previously dominated by open-source tools with no managed cloud offering.

              Beyond account count, usage intensity metrics paint a compelling adoption picture. The
              130B+ monthly actions figure from August 2024 reflects deep operational reliance: each
              action corresponds to a workflow state transition or activity execution, meaning Temporal
              is embedded in high-frequency transactional flows rather than low-volume batch jobs. The
              183,000+ weekly active OSS developers as of March 2025 represents potential cloud
              conversion targets distributed across 7 million+ unique Temporal clusters globally.

              Revenue growth of 4.4x in 18 months to March 2025 confirms that account growth is
              translating to ARR at scale. However, this represents a deceleration from approximately
              20x annual growth rates reported in 2022 and 2023. The deceleration is expected at scale
              and is not unusual for developer-infrastructure businesses transitioning from viral
              adoption to enterprise sales motion. Partner ecosystem expansion to 36 partners by August
              2024 including hyperscalers and global consulting firms indicates Temporal is building
              indirect channel coverage to support continued enterprise penetration without a linear
              increase in direct sales headcount.

              Key unknowns include the precise definition of customer, the distribution between
              Essentials, Business, and Enterprise tiers, the monthly vs. annual contract mix, and
              whether the 2,500+ figure includes trial accounts. These ambiguities are common in
              developer-tooling growth reports and do not invalidate the trend but limit precise
              ARR triangulation from public data alone.
