  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation History and Funding Trajectory
        blocks:
          - type: paragraph
            body: >
              Temporal Technologies has completed seven disclosed financing events since 2019, with aggregate capital of
              approximately $650M and a valuation trajectory from sub-$500M seed-stage to $5B at Series D in February
              2026. The Series A (2021) and Series B ($103M at ~$1.5B, Feb 2022) established the company's unicorn
              status during a favorable market. A $75M Series B extension in February 2023 at a flat $1.5B valuation
              signaled market contraction pressure. The Series C ($146M at $1.72B, March 2025) — described by TechCrunch
              as "very little bit" above flat relative to prior secondary — suggests the company navigated a period of
              compressed multiples. A $105M secondary led by GIC at $2.5B in October 2025 revalued the company 46% above
              the Series C. The Series D at $5.0B in February 2026 represents a 2× step-up from the secondary in
              approximately four months, consistent with a late-stage company accelerating into an AI-workflow demand
              inflection. The valuation history reflects both the challenges of sustaining premium multiples through a
              downturn and the potential for rapid re-rating when growth metrics reaccelerate.
            claimRefs:
              - CV001
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV036
      - number: '8.2'
        title: Revenue and Growth Metrics
        blocks:
          - type: paragraph
            body: >
              Temporal's financial profile relies on company-reported and analyst-inferred metrics, as no audited
              financials have been published. The company reported 380%+ year-over-year revenue growth at the time of
              the Series D (unaudited, Feb 2026) and 4.4× cloud revenue growth in the 18 months to March 2025. Net
              Revenue Retention of 184% as of early 2025 is high by any public SaaS benchmark and suggests strong
              expansion from existing customers. Getlatka estimated 2023 ARR at approximately $26M. Applying the 4.4×
              18-month growth factor implies ~$114M ARR by approximately Q3 2025, and extrapolating through the Series D
              announcement at 380%+ growth suggests a plausible $200-350M ARR range by early 2026. These are analyst
              inferences and must be verified against data-room materials; the company has not published audited
              revenue. The combination of high NRR, accelerating growth, and 2,500+ cloud customers provides a
              supportive but unaudited financial picture. Any underwriting should place material weight on securing an
              audited revenue schedule before committing to a valuation at or above $5B.
            claimRefs:
              - CV002
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV039
      - number: '8.3'
        title: Investor Composition and Institutional Signaling
        blocks:
          - type: paragraph
            body: >
              The Series D investor syndicate is unusually broad and high-quality for a late-stage private round.
              Andreessen Horowitz led with an investment thesis positioning Temporal as "the code execution layer for
              critical workflows," citing OpenAI's deployment of Temporal for ChatGPT Images as validation of the
              AI-workflow thesis. Lightspeed Venture Partners and Sapphire Ventures both confirmed participation via
              their company portfolio pages. Sovereign wealth fund GIC participated in both the October 2025 secondary
              ($2.5B) and the Series D ($5B), providing cross-round institutional continuity. Returning investors
              include Sequoia, Index Ventures, Tiger Global, Madrona, and Amplify Partners. The board addition of
              Jonathan Chadwick — a VMware veteran who also serves on the boards of Confluent, Databricks, Notion,
              ServiceNow, and Zoom — brings enterprise GTM experience directly relevant to Temporal's expansion.
              Crunchbase data (behind a paywall) reports total funding of approximately $626M pre-Series-D, consistent
              with public disclosures. The breadth and quality of the syndicate reduces adverse selection risk relative
              to a narrow or insider-led round.
            claimRefs:
              - CV001
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
              - CV037
              - CV042
      - number: '8.4'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >
              Four comparables are most instructive for Temporal's valuation: Confluent (CFLT), Datadog (DDOG), MongoDB
              (MDB), and HashiCorp (acquired by IBM for $6.4B in September 2024). Confluent, the closest public analog
              as a developer infrastructure platform monetizing a popular open-source project (Apache Kafka), generated
              $1.12B in subscription revenue in FY2025 at 21% year-over-year growth, implying a 6-8× revenue multiple at
              recent trading levels. Datadog, the observability leader with $3.0B in FY2025 revenue growing 26%
              year-over-year, trades at a premium to the SaaS median (~12-16× NTM revenue) owing to its growth rate and
              margin profile. MongoDB, with $2.0B in FY2026 revenue growing 19%, trades near median SaaS multiples.
              HashiCorp's $6.4B IBM acquisition represents an infrastructure-software transaction at approximately 7-9×
              trailing revenue for a platform with significant enterprise penetration. Temporal's higher NRR (184% vs.
              typical 120-140% for these peers), faster growth rate, and AI-workflow tailwind justify a premium to
              Confluent-like multiples but imply a significant re-rating risk if growth decelerates. The 14-25× implied
              EV/ARR range is appropriate for Temporal's growth profile but leaves limited downside cushion at the $5B
              entry point.
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
              - CV030
              - CV031
              - CV032
              - CV033
              - CV038
