      - number: '8.5'
        title: SaaS Valuation Multiples and Benchmarks
        blocks:
          - type: paragraph
            body: >
              Public SaaS multiple benchmarks provide the quantitative floor and ceiling for Temporal's valuation range.
              Aventis Advisors (March 2026) reports the median public SaaS EV/Revenue multiple at 3.4×. Windsor Drake
              (February 2026) places the mid-2025 public SaaS median EV/NTM Revenue at 6.1× with top-quartile companies
              at 13-14×. These benchmarks apply to public companies with disclosed, audited financials; private
              companies typically command a premium for growth optionality and a discount for illiquidity. At $5B and
              estimated $200M ARR (bear-case revenue), the implied multiple is 25× — well above the top-quartile
              benchmark. At $350M ARR (bull-case estimate), the multiple compresses to ~14×, which is within
              top-quartile territory for a company growing at 380%+ with 184% NRR. The critical sensitivity is the
              revenue estimate: a 50% miss from $350M to $175M ARR would push the implied multiple to 28× — a stretched
              entry point even for high-growth private technology. Any position at or above $5B should be sized to
              reflect the ARR estimation uncertainty.
            claimRefs:
              - CV018
              - CV019
              - CV020
              - CV030
