      - number: '5.3'
        title: Technical Architecture and Operating Model
        blocks:
          - type: paragraph
            body: |
              The Temporal Server comprises four independently deployable and horizontally scalable
              services. The Frontend Service handles all inbound gRPC requests from SDK clients and the
              web UI, performing rate limiting and routing. The Matching Service manages task queues,
              scheduling workflows and activities to available workers via a long-poll mechanism that
              avoids constant polling overhead. The History Service owns the authoritative execution
              history for each workflow and processes state transitions atomically. The Worker Service
              runs internal background maintenance workflows such as archival and replication.

              The execution model is event-sourced: every state transition including workflow started,
              activity scheduled, activity completed, timer fired, and signal received is recorded as
              an immutable event in the workflow Event History stored in the persistence layer. On worker
              restart or failure, the Temporal SDK replays the workflow function from the beginning,
              sourcing return values for completed activities and timers from the recorded history rather
              than re-executing side-effectful operations. This deterministic replay provides exactly-once
              execution semantics without distributed transactions.

              Workers connect to the Temporal Server via gRPC long-poll over mTLS for mutual
              authentication and encryption in transit. The persistence layer supports Cassandra (default
              for self-hosted), PostgreSQL, and MySQL, with Elasticsearch for workflow visibility. The
              Data Converter interface enables client-side payload encryption so sensitive data never
              reaches the server in plaintext. The published p99 latency SLO is 200ms; observed January
              2026 measurements show StartWorkflow p99 at 69ms and SignalWorkflow p99 at 46ms on
              Temporal Cloud.
