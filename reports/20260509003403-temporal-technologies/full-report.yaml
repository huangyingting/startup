      - number: '1.5'
        title: Key Milestones and Corporate History
        blocks:
          - type: paragraph
            body: |
              Temporal's corporate history traces directly to the development of Cadence at Uber between
              approximately 2015 and 2019. Abbas and Fateev observed that essentially every major distributed
              systems company (Airbnb, LinkedIn, Coinbase) faced the same orchestration reliability challenges
              and were building the same bespoke solutions. After open-sourcing Cadence and observing the
              community adoption, they founded Temporal Technologies in 2019 to commercialize the concept.

              The core Temporal platform launched in 2019 and the company began operations in 2020 with the
              $18 million seed round. The Series A (led by Sequoia) and Series B (led by Index at $1.5B
              valuation, $103M) followed as the platform gained enterprise adoption. A $75 million Series B
              extension in February 2023 sustained growth through the 2022–2023 market downturn, though
              valuation appeared to have dipped during this period. In 2024, the company executed a
              deliberate go-to-market acceleration by hiring Jim Cyb as President and making the CEO/CTO
              role swap between Abbas and Fateev.

              In 2025, Temporal's trajectory accelerated sharply. The March 2025 Series C returned the
              company to growth-round territory at $1.72 billion. In May 2025, Forrester published a
              commissioned TEI study confirming 201% enterprise ROI for Temporal Cloud customers.
              In September 2025, Temporal and OpenAI launched a public-preview integration of the OpenAI
              Agents SDK with Temporal's durable execution engine, positioning Temporal as a core layer
              for production AI agents. The October 2025 secondary round at $2.5 billion and February 2026
              Series D at $5 billion (led by a16z) validated the company's accelerating commercial momentum.
              Temporal's annual user conference "Replay 2026" in 2026 announced new features for AI agent
              orchestration including improved cross-namespace Nexus capabilities and integrations.
            claimRefs:
              - CO029
              - CO030
              - CO031
              - CO032
              - CO033
      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Exceptional NRR Signals Deep Product-Market Fit
            body: |
              Temporal Cloud's reported Net Dollar Retention of 184% as of early 2025 is well above the
              ~120% benchmark for high-performing SaaS infrastructure companies. This indicates that existing
              customers are rapidly expanding their usage — consistent with a platform that becomes increasingly
              embedded in mission-critical workflows and adds new use cases (especially AI agent orchestration)
              over time.
            calloutType: strength
            claimRefs:
              - CO026
          - type: callout
            title: Key-Person Concentration in Co-Founders
            body: |
              Temporal's intellectual property, architectural vision, and customer relationships are heavily
              concentrated in co-founders Samar Abbas and Maxim Fateev, who have been working on successive
              versions of this problem since 2009. Recent hires (Jim Cyb as President, John Bonney as CFO)
              and board appointments begin to distribute operational responsibility, but departure of either
              founder would represent a material risk to product continuity and investor confidence.
            calloutType: risk
            claimRefs:
              - CO007
              - CO008
          - type: callout
            title: AI Agent Wave Amplifies Temporal's Core Value Proposition
            body: |
              Temporal was built for distributed systems reliability before the AI era, but the emergence of
              long-running autonomous AI agents has created a structural tailwind. As Andreessen Horowitz
              stated in their Series D blog post: "For long-running agents operating over extended horizons,
              the durability that Temporal provides is the difference between a compelling demo and a
              production system." This positions Temporal as infrastructure-layer enabler of the agentic AI
              transition, not just a developer tools company.
            calloutType: insight
            claimRefs:
              - CO032
              - CO033
  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Temporal's primary market is enterprise workflow orchestration software — platforms that coordinate,
              execute, and durably persist multi-step business logic across distributed systems. The workflow
              orchestration market encompasses software and services that automate task coordination, manage state
              across failures, and provide visibility into long-running business processes. It sits at the intersection
              of business process management (BPM), data engineering orchestration, and distributed systems
              infrastructure.

              Within this broad category, Temporal addresses the developer-facing durable execution sub-segment:
              code-first platforms where software engineers write workflows as ordinary functions that survive
              infrastructure failures, scale automatically, and provide deterministic replay guarantees. This
              distinguishes Temporal from low-code BPM tools (Appian, Pega), data pipeline schedulers (Apache Airflow,
              Prefect), and enterprise integration platforms (MuleSoft, Boomi). The status-quo substitutes Temporal
              displaces are custom retry logic built on message queues (Kafka, SQS), homegrown saga implementations,
              cloud-native state machine services (AWS Step Functions), and cron-plus-database patterns that accumulate
              technical debt.

              An important adjacent market is agentic AI infrastructure: the orchestration layer that manages
              multi-step, long-running AI agent pipelines. Temporal's September 2025 OpenAI Agents SDK integration and
              the Nexus cross-namespace RPC primitive position it directly in this layer. The global agentic AI market
              reached $7.3B in 2025 and is projected at $9.1–10.9B in 2026, growing at a 40–45% CAGR through 2034. Of
              that, the enterprise automation sub-segment represents approximately $5.9B in 2025. Temporal benefits from
              both the workflow orchestration spend and the incremental AI infrastructure budget as enterprises move AI
              agents from pilot to production.
            claimRefs:
              - CM001
              - CM002
              - CM003
