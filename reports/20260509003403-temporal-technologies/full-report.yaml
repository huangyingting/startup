      - number: '1.2'
        title: Founders and Leadership Team
        blocks:
          - type: paragraph
            body: |
              Temporal Technologies was co-founded by Samar Abbas and Maxim Fateev, two distributed systems
              engineers who have collaborated for over 15 years across Amazon Web Services, Microsoft, and
              Uber. At Amazon, both worked on the Amazon Simple Workflow Service (SWF), one of the earliest
              cloud-hosted workflow execution systems. At Microsoft, Abbas led the creation of the Durable
              Task Framework for Azure. At Uber, the pair jointly built Cadence, an open-source workflow
              orchestration engine that became the direct predecessor to Temporal and was adopted by companies
              including HashiCorp, LinkedIn, Airbnb, and Coinbase. The commercial success and developer
              enthusiasm around Cadence convinced them there was a large market opportunity, and they launched
              Temporal in 2019.

              In April 2024, Abbas and Fateev swapped executive roles: Abbas became CEO (previously CTO)
              and Fateev became CTO (previously CEO). This transition was described as a deliberate move to
              align each founder's strengths with the company's growth phase, with Abbas focusing on
              go-to-market and company-building and Fateev concentrating on long-term technical vision.
              As of early 2026, the executive team includes Jim Cyb (President, leading go-to-market efforts,
              hired 2024/2025), and John Bonney (CFO, formerly CFO of Harness and senior finance roles at
              FinancialForce and SAP, appointed October 2025). The board of directors includes Sahir Azam
              (Chief Product Officer of MongoDB, the company's first independent board member), Jonathan
              Chadwick (former VMware CFO and COO, board member at Confluent, Databricks, Notion, ServiceNow,
              and Zoom, appointed October 2025), and Raghu Raghuram (former VMware CEO, general partner at
              Andreessen Horowitz, joined as board observer in February 2026).

              The leadership team reflects a deliberate effort to balance deep technical roots with enterprise
              go-to-market and financial sophistication. Abbas has noted that Temporal is "literally the
              fourth or fifth time we are building a similar system" — a phrase that speaks to the deep
              domain expertise both founders bring. The concentration of institutional knowledge in the two
              co-founders represents the primary key-person risk, though the recent executive hires (Cyb,
              Bonney) and board appointments begin to distribute operational responsibility.
