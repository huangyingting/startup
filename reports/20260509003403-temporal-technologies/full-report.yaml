      - number: '3.4'
        title: 'Adjacent Data Orchestration: Airflow, Astronomer, Prefect, and Conductor'
        blocks:
          - type: paragraph
            body: >
              Apache Airflow is the dominant platform in data engineering workflow scheduling with over 45,000 GitHub
              stars and adoption at thousands of enterprises running ETL, data transformation, and ML pipeline jobs.
              Astronomer provides the commercial managed Airflow service, with pricing starting at approximately
              $200/month for cloud deployments. Airflow's DAG-based model is purpose-built for batch, dependency-ordered
              data pipelines where tasks are scheduled on a clock, not triggered by real-time events. This architectural
              difference limits direct overlap with Temporal: Airflow does not provide deterministic replay,
              fault-tolerant stateful execution at the transaction level, or sub-second triggering. Teams running both
              Temporal and Airflow typically use Temporal for real-time transactional workflows and Airflow for data
              pipeline scheduling — complementary, not competitive, in mature architectures.

              Prefect is the leading modern alternative to Airflow, with $38M in Series B funding (2022) and a strong
              Python-native developer experience. Prefect Cloud's pricing starts at a free tier for development and paid
              plans from $500/month for production. Prefect's core differentiator over Airflow is a more pythonic API,
              better cloud-native observability, and Prefect Cloud managed infrastructure. Like Airflow, Prefect is
              primarily positioned for data engineering rather than transactional durable execution, and Prefect's own
              documentation positions it explicitly for data pipelines and ML workflows — not general-purpose stateful
              business logic.

              Netflix Conductor is the open-source orchestration system whose architecture directly influenced
              Temporal's founding. Conductor uses a JSON-based workflow definition model and a server-side execution
              model. Orkes is the primary commercial entity supporting Conductor today. Conductor's lower abstraction
              level compared to Temporal means teams must manage more boilerplate, but some enterprises prefer its
              explicit, audit-friendly execution model. DZone analysis rates Temporal higher on workflow expressiveness,
              while Conductor earns higher marks on operational simplicity for teams that distrust code-embedded
              workflow logic.
