  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: |
              Temporal Technologies targets software engineering teams that build distributed systems,
              long-running workflows, and mission-critical backend infrastructure. The primary buyer
              persona is the engineering leader such as VP of Engineering, CTO, or Principal/Staff
              Engineer, who evaluates the platform on technical merit before procurement decisions
              move to finance and legal. The end user is the software developer writing Temporal
              workflows in Go, Java, Python, TypeScript, .NET, or PHP. The economic buyer is
              typically the engineering budget holder at the business-unit or infrastructure-platform
              level, though in larger enterprises procurement may involve centralized IT or an
              approved vendor list.

              By vertical, the customer base skews toward technology-intensive sectors. Financial
              services and fintech including Stripe, Coinbase, Brex, Upstart, and Xero represent
              the largest known cluster given the sector's need for SAGA-pattern transaction
              orchestration, compliance automation, and zero-failure-tolerance payment flows. Media
              and streaming companies Netflix and Snap are prominent early adopters attracted by
              workflow reliability at hundreds of millions of daily active users. E-commerce and
              marketplace companies such as Instacart use Temporal for order orchestration and
              inventory state machines. Developer infrastructure and SaaS companies including
              Datadog, HashiCorp, Box, and Replit use Temporal as an internal platform for CI/CD,
              deployment automation, and agent orchestration. AI-native companies are a fast-emerging
              segment: Replit Agent is powered by Temporal, and the OpenAI Agents SDK integration
              signals growing AI workload adoption. Traditional enterprises such as Alaska Airlines
              represent a later-stage segment with longer procurement cycles.

              Channel segmentation includes self-serve OSS-to-Cloud conversion, partner-sourced
              through 36 partners as of August 2024 including AWS, KPMG, MongoDB, and EPAM, and
              direct enterprise sales. The OSS flywheel of 183,000+ weekly active developers acts
              as the primary top-of-funnel, making Temporal's go-to-market structurally similar to
              developer-led growth companies like HashiCorp and Confluent. Revenue banding is not
              publicly disclosed, but the Essentials tier at $100 per month and Business tier at
              $500 per month indicate a long tail of smaller accounts alongside high-ACV Enterprise
              and Mission Critical contracts, suggesting a bimodal revenue distribution across the
              customer base.
