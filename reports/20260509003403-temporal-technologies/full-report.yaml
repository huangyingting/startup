  - id: FR001
    title: Risk Heatmap — Likelihood vs. Impact by Category
    type: matrix
    layout: wide
    summary: >-
      Assessment of eight major risk categories across four dimensions: likelihood of occurrence, financial/strategic
      impact if realized, current mitigation maturity, and residual exposure after mitigations. Based on triangulated
      evidence from regulatory filings, security disclosures, competitive intelligence, and investor data as of May
      2026.
    data:
      columns:
        - Likelihood
        - Impact
        - Mitigation Maturity
        - Residual Exposure
      rows:
        - label: Regulatory / Compliance Risk
          values:
            - label: Medium — GDPR/CCPA active but no enforcement
              tone: neutral
            - label: High — fines up to 4% global revenue
              tone: negative
            - label: Medium — DPA and data residency in place
              tone: neutral
            - label: Medium — audit evidence gap remains
              tone: neutral
        - label: Hyperscaler Competitive Displacement
          values:
            - label: Medium — no managed Temporal service launched yet
              tone: neutral
            - label: High — could collapse cloud delivery premium
              tone: negative
            - label: Medium — OSS moat and switching costs present
              tone: neutral
            - label: Medium-High — no structural defense against bundling
              tone: negative
        - label: Security / Data Breach
          values:
            - label: Low-Medium — multi-tenant SaaS inherent surface
              tone: neutral
            - label: Critical — enterprise trust and revenue at risk
              tone: negative
            - label: Medium — mTLS, isolation, encryption in place
              tone: neutral
            - label: Medium-High — no public pen test or SOC 2 available
              tone: negative
        - label: Key Person / Execution Risk
          values:
            - label: Low — co-founders stable, role swap shows planning
              tone: positive
            - label: High — Fateev is sole architect of durable execution model
              tone: negative
            - label: Medium — role swap and pairing reduce concentration
              tone: neutral
            - label: Medium — retention terms not publicly disclosed
              tone: neutral
        - label: Open-Source Monetization / License Risk
          values:
            - label: Low — MIT license retained; no change signaled
              tone: positive
            - label: High — license change could trigger fork and trust erosion
              tone: negative
            - label: High — MIT permissiveness limits immediate risk
              tone: positive
            - label: Low-Medium — community sensitivity is a natural deterrent
              tone: positive
        - label: Financial / Valuation Reset Risk
          values:
            - label: Medium — premium 50-100x ARR multiple compresses margin
              tone: negative
            - label: High — down round impairs employee equity and talent retention
              tone: negative
            - label: Low — no public guidance on burn or profitability path
              tone: negative
            - label: Medium-High — burn undisclosed; growth rate unverifiable
              tone: negative
    claimRefs:
