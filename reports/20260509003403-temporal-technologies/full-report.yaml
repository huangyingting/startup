  - id: FV003
    title: Valuation / Return Range by Scenario
    type: range
    layout: wide
    summary: >
      Low / mid / high exit enterprise value under bear, base, and bull scenarios for an investor entering at $5B. The
      base case produces flat-to-negative returns at the $5B entry price, reinforcing the conditional recommendation to
      seek a lower entry or preferred-share structuring.
    data:
      items:
        - label: Bear Exit (ARR $100-150M; 10-15× EV/ARR; 4-7 year hold)
          low: 1500
          mid: 2000
          high: 2500
          unit: $M
          note: ARR overestimation, NRR compression below 130%, delayed IPO; implies 0.3-0.5× return at $5B entry
        - label: Base Exit (ARR $200-250M; 12-18× EV/ARR; 4-6 year hold)
          low: 2800
          mid: 3800
          high: 4500
          unit: $M
          note: Confirmed ARR, moderate NRR, IPO or strategic acquisition; implies 0.6-0.9× return at $5B entry
        - label: Bull Exit (ARR $300M+; 20-30× EV/ARR; 3-4 year hold)
          low: 6000
          mid: 10000
          high: 15000
          unit: $M
          note: Strong AI-workflow adoption, NRR ≥170%, IPO or acquisition premium; implies 1.2-3.0× return at $5B entry
