      - number: '7.3'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: |
              Temporal's partner and dependency risk profile reflects its position as an open-source-first
              platform built on and competing within the broader cloud ecosystem. The most material
              infrastructure dependency is on AWS and GCP for Temporal Cloud hosting. A multi-cloud
              strategy is in place, but primary workload concentration on AWS creates uncomfortable
              single-cloud exposure particularly because AWS is simultaneously a competing product
              vendor through AWS Step Functions. Amazon can price Step Functions below cost, embed it
              in managed service offerings, and leverage native integrations with Lambda and ECS that
              Temporal cannot replicate without third-party connectors — a structural distribution
              disadvantage that will intensify if enterprise buyers evaluate on total cost of ownership
              rather than developer experience.

              Customer revenue concentration risk is undisclosed. Temporal's public customer list
              includes marquee accounts such as Stripe, Netflix, Coinbase, Snap, DoorDash, and Datadog,
              but the revenue contribution from its top-10 customers is unknown. For enterprise SaaS
              companies at Temporal's estimated ARR, top-10 customer concentration typically ranges from
              30–60%, which would represent significant exposure if one or two anchor accounts churned
              or renegotiated terms materially. The fintech and gig-economy vertical concentration also
              creates correlated downside risk during sector-specific downturns. Orkes, a commercial
              Temporal-based orchestration vendor, demonstrates that third parties can build competing
              commercial products on Temporal's open-source stack, validating the ecosystem while also
              representing a potential channel conflict. Temporal's SI and partner channel is nascent
              compared to enterprise peers, creating over-reliance on direct sales for large deals and
              limiting geographic reach in markets where local system integrators are the gatekeepers
              to enterprise procurement. Capital provider dependency on Sequoia, Madrona, and Alphabet
              GV is supportive but reflects ongoing FCF-negative operations requiring continued investor
              confidence.
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
