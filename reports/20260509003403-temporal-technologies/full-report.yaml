  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Temporal's competitive landscape divides into four distinct tiers. The first tier comprises direct
              durable-execution competitors — platforms sharing the same core value proposition of code-first,
              fault-tolerant workflow orchestration: Restate (MIT-licensed Berlin startup, $7M seed, TypeScript/
              Java/Go), Inngest (event-driven function orchestration, $9.1M raised, TypeScript-first), and Orkes
              (managed Conductor service from ex-Netflix engineers). These rivals target the same senior engineering
              buyer and the same job-to-be-done.

              The second tier is cloud-native managed services bundled by hyperscalers: AWS Step Functions (JSON-based
              ASL state machines, deep AWS integration), Azure Durable Functions (code-first, .NET/TypeScript/Python,
              Azure-native), and Google Cloud Workflows (declarative YAML). These incumbents benefit from distribution
              leverage with committed cloud customers but sacrifice developer ergonomics and portability. AWS and Azure
              in particular have near-unlimited sales capacity and can subsidize workflow services to capture broader
              cloud spend.

              The third tier is data-engineering orchestration: Apache Airflow (45K+ GitHub stars, dominant in batch
              ETL), Astronomer (commercial Airflow), and Prefect (Python-native, $38M Series B). These platforms overlap
              in developer persona but serve different primary jobs — batch DAG scheduling vs. stateful, real-time
              durable execution — limiting direct displacement risk in Temporal's core transactional use cases.

              The fourth tier is status-quo and DIY alternatives: custom retry logic on message queues (Kafka, SQS),
              saga pattern implementations, and cron-plus-database architectures. These represent the largest total
              opportunity for Temporal but require educational selling rather than feature-differentiated displacement.
              The competitive picture benefits Temporal most clearly where the buyer needs polyglot support,
              deterministic replay, and enterprise-grade compliance — a combination none of the four tiers currently
              delivers as a single integrated offering.
