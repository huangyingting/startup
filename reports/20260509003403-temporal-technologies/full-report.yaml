  - id: FE001
    title: Product Architecture Map
    type: stack
    layout: wide
    summary: >-
      Temporal layered architecture from customer application through server services to persistence, with security
      controls at each boundary.
    data:
      layers:
        - label: Customer Application and Worker Layer
          detail: >-
            Workflow Workers and Activity Workers implemented in Go, Java, Python, TypeScript, .NET, or PHP. Poll task
            queues via gRPC long-poll over mTLS. Zero infrastructure cost for dormant workflows.
        - label: SDK Client Layer
          detail: >-
            Language-native SDK clients connect to Temporal Frontend Service. Expose start, signal, query, and await
            workflow APIs. Data Converter handles payload serialization and optional client-side encryption.
        - label: Temporal Server Four Core Services
          detail: >-
            Frontend Service for gRPC routing and rate limiting, Matching Service for task queue management and worker
            assignment, History Service for event sourcing and state transitions, Worker Service for internal
            maintenance. MIT-licensed OSS or Temporal Cloud managed.
        - label: Persistence Layer
          detail: >-
            Cassandra for default self-hosted deployment, PostgreSQL and MySQL as alternatives, Elasticsearch for
            workflow visibility and search. Temporal Cloud uses a proprietary managed persistence layer.
        - label: Security and Observability
          detail: >-
            mTLS at all service boundaries, AES-256 at rest on Cloud, Data Converter for client-side payload encryption,
            Codec Server for authorized decryption, OpenTelemetry metrics and traces, Cloud UI and OSS Web UI for
            workflow visibility.
    claimRefs:
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
      - CE019
