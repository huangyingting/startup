              The $1.5B Series B (2022) barely moved to $1.72B at the Series C (March 2025) — three years of near-zero
              multiple expansion — while growth decelerated from >20× (2022/23) to 4.4× over 18 months. TechCrunch
              labeled the Series C 'a very little bit' above flat; Prime Unicorn Index reportedly marked valuation to
              ~$880M. The AI tailwind has reversed the trajectory, but prior deceleration is a legitimate diligence
              concern.
