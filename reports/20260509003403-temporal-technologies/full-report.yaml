      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The primary growth driver is the proliferation of distributed, microservices-based architectures that make
              unreliable remote calls and state management a universal engineering pain point. As organizations
              decompose monoliths, the need for durable workflow primitives increases proportionally. Cloud adoption
              further amplifies this: serverless and containerized compute are stateless by design, and Temporal fills
              the stateful workflow gap in cloud-native stacks.

              The AI agent wave is the most significant near-term catalyst. Gartner projects that 40% of enterprise
              applications will embed AI agents by end of 2026. IDC estimates agentic AI already represents 10–15% of
              enterprise IT spending in 2026. Multi-step AI agent pipelines that call tools, wait for human approval, or
              span hours-to-days of execution require exactly the durable execution guarantees Temporal provides.
              Temporal's integration with the OpenAI Agents SDK (September 2025) and Nexus cross-namespace orchestration
              primitives position it as a runtime layer for production AI agents.

              Regulatory compliance is a secondary driver in financial services, healthcare, and logistics:
              auditability, deterministic replay, and workflow history retention reduce regulatory risk and simplify SOC
              2 / PCI-DSS compliance posture for customers. The Forrester TEI study (May 2025, commissioned) found 201%
              ROI over three years and a 14-month payback period across interviewed customers, driven primarily by
              engineering time savings and reduced incident costs.

              Key adoption constraints include the deterministic execution model, which requires developers to avoid
              non-deterministic operations inside workflow code — a learning curve that slows initial adoption.
              Migration cost from existing homegrown or vendor solutions is a significant barrier for incumbent
              enterprise accounts. AWS Step Functions, Azure Durable Functions, and Google Cloud Workflows offer managed
              workflow services bundled with cloud commitment discounts, creating price competition on smaller
              workloads. The open-source community represents a free tier that cannibalizes commercial conversion:
              183,000+ weekly active OSS developers (March 2025) vastly outnumber Temporal Cloud's 2,500+ paying
              customers, creating a conversion efficiency challenge.
