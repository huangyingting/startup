        blocks:
          - type: paragraph
            body: >-
              Temporal Technologies monetizes through three principal mechanisms. First is Temporal Cloud, a fully
              managed consumption-based cloud service billing customers on workflow Actions executed and Active/Retained
              Storage consumed per month. List pricing starts at $100 per month for Essentials (1 million Actions, 1 GB
              active storage, 40 GB retained), scales to $500 per month for Business (2.5 million Actions), and extends
              to custom-negotiated Enterprise contracts for larger tenants. Volume discounts and commitment pricing are
              available above tier floors; new accounts receive $1,000 in free credits. Second, enterprise customers may
              license Temporal for self-managed deployment with commercial SLAs, support tiers, and enterprise-specific
              capabilities unavailable in the MIT-licensed OSS core. Third, Temporal offers professional services
              including onboarding, architecture reviews, and migration assistance, though this stream is not separately
              disclosed. The vast majority of open-source users self-host without paying; the key financial dynamic is
              conversion from the 183,000+ weekly-active OSS developer base to cloud or enterprise consumption. As of
              the March 2025 Series C, Temporal Cloud had grown 4.4× in revenue over the prior 18 months and served over
              2,500 paying customers globally with NRR of 184%. The February 2026 Series D announced >380%
              year-over-year revenue growth, driven by the AI-native workload wave and expanding enterprise production
              deployments at OpenAI, ADP, Yum! Brands, and Block.
