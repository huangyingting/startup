    title: Valuation Sensitivity to ARR Estimate
    type: bar
    layout: wide
    summary: >
      Implied enterprise value at the $5B Series D price under six ARR scenarios (two revenue estimates × three EV/ARR
      multiples). Bars above the $5B reference line indicate scenarios that support the current valuation; bars below
      indicate scenarios where the $5B price is stretched. Only the bull ARR ($350M) × top-quartile multiple (25×)
      scenario produces an EV above $5B — highlighting the narrow margin of valuation support.
