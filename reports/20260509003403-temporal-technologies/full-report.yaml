      - number: '8.6'
        title: Bull / Base / Bear Valuation Scenarios
        blocks:
          - type: paragraph
            body: >
              The bull case rests on three conditions: confirmed ARR of $300M+ at Series D, continued NRR above 150%
              through an AI-workflow adoption cycle, and a successful IPO or strategic acquisition within three to four
              years at a revenue multiple of 20-30×. Under these assumptions, a $5B entry could generate 3-5× return to
              IPO or acquisition at $15-25B enterprise value. The base case assumes $200-250M ARR confirmed in the data
              room, NRR compressing to 140-160% post-AI wave, and an IPO or acquisition in four to six years at 12-18×
              ARR. The implied exit value of $3-5B produces a modest 1-2× return from a $5B entry — acceptable only with
              preferred-share downside protection. The bear case assumes ARR overestimation (actual $100-150M), NRR
              compression below 130%, and hyperscaler competition eroding addressable market. Under these assumptions,
              the $5B valuation is not supportable, and a down-round or stagnant exit in the $2-3B range is plausible.
              The probability-weighted expected value across scenarios suggests flat-to-modest returns from a $5B entry
              without further negotiated structuring.
