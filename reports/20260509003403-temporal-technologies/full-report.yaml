      - number: '2.5'
        title: Conflicting Estimates and Diligence Gaps
        blocks:
          - type: paragraph
            body: >
              Multiple structural gaps and contradictions in the available market evidence require preservation and
              disclosure. First, the workflow orchestration TAM estimates range dramatically: $19.4B (BRC, 2025) to
              $292.8B (Verified Market Research, 2032) depending on scope. The high-end estimates conflate BPM, robotic
              process automation (RPA), enterprise integration platforms, and data orchestration — markets where
              Temporal does not compete. Analysts have divergent scope definitions, and no single authoritative
              third-party study directly sizes the durable execution sub-segment.

              Second, ARR estimates for Temporal are entirely third-party and unconfirmed. The $61.9M figure from
              compworth.com uses employee-count benchmarks from comparable companies and should be treated as a rough
              indicator, not a precise measurement. Temporal has not disclosed revenue publicly.

              Third, the agentic AI infrastructure market is nascent and analyst estimates vary widely: $7.1–7.6B for
              global agentic AI in 2025 with a projected $9.1–10.9B in 2026 (MarketsandMarkets, Fortune Business
              Insights, Precedence Research) — but defining what counts as "agentic AI infrastructure" vs. foundational
              model spend vs. application layer spend is not standardized. Temporal's share of this market is not
              independently estimated.

              Fourth, the customer adoption conversion rate from OSS to commercial is unknown. With 183,000 weekly
              active OSS developers and 2,500+ cloud customers, the implied conversion rate is under 2%, though the
              comparison is imperfect since many OSS users self-host and are not directly comparable. This gap matters
