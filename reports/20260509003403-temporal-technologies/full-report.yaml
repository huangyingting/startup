      - number: '1.3'
        title: Funding History and Investors
        blocks:
          - type: paragraph
            body: |
              Temporal has raised $650 million across seven financing events since its 2019 founding. The
              seed round of approximately $18 million was raised in 2020. The Series A was led by Sequoia
              Capital. The Series B of $103 million was led by Index Ventures, followed by a $75 million
              extension in February 2023 that valued the company at approximately $1.5 billion (up from an
              earlier reported dip to roughly $880 million, a figure Temporal has not publicly confirmed).

              The March 2025 Series C of $146 million was led by Tiger Global at a $1.72 billion post-money
              valuation — described by CEO Abbas as "a little bit up — a very little bit" from the prior
              round, reflecting the difficult private funding market of 2022–2024. Co-investors in the Series
              C included StepStone Group, Amplify Partners, Index Ventures, MongoDB Ventures, Sequoia Capital,
              Conversion Capital, Hanwha Next Generation Opportunity Fund, and 137 Ventures.

              In October 2025, Singapore's sovereign wealth fund GIC led a $105 million secondary transaction
              (an investor-led tender offer enabling existing shareholders and employees to sell shares)
              valuing the company at $2.5 billion. Tiger Global and Index Ventures also participated. The
              secondary round was accompanied by two key leadership appointments: John Bonney as CFO and
              Jonathan Chadwick to the board.

              In February 2026, Temporal raised $300 million in a Series D round led by Andreessen Horowitz
              at a $5 billion valuation — nearly tripling from the March 2025 Series C in under twelve months.
              Other participants included Lightspeed Venture Partners, Sapphire Ventures, and existing
              investors Sequoia Capital, Index, Tiger Global, GIC, Madrona, and Amplify. The Series D
              was accompanied by the appointment of Raghu Raghuram (a16z general partner and former VMware CEO)
              as a board observer. Total funding to date stands at $650 million. Temporal has not disclosed
              any debt financing or credit facilities.
