chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Product Overview
        blocks:
          - type: paragraph
            body: |
              Temporal Technologies is an open-source workflow orchestration and durable execution company
              founded in 2019 and headquartered in Bellevue, Washington. The company builds and maintains the
              Temporal open-source platform — an MIT-licensed durable execution engine — and Temporal Cloud,
              its enterprise-grade managed service. Temporal's core innovation is the concept of "durable
              execution": developers write ordinary business logic in their preferred programming languages
              (Go, Java, Python, TypeScript, .NET, PHP), and the Temporal runtime guarantees that code
              executes to completion even in the face of infrastructure failures, network timeouts, and
              process crashes. Workflow state is automatically persisted at every step, enabling seamless
              resumption without manual retry logic or complex state machines.

              The platform serves two related but distinct customer segments. The first is the open-source
              developer community: as of March 2025, more than 183,000 weekly active developers use the
              self-hosted Temporal server, with over 7 million unique Temporal cluster deployments globally.
              The second is the Temporal Cloud enterprise customer base: over 2,500 organizations pay for the
              managed service, which handles server operations, scaling, and reliability at the infrastructure
              layer. Temporal Cloud uses consumption-based pricing structured around four tiers — Essentials
              ($100/month), Business ($500/month), Enterprise (custom), and Mission Critical (custom) — with
              charges based on Actions executed and storage consumed. Revenue grew 4.4x in the 18 months
              preceding March 2025 and accelerated to more than 380% year-over-year by February 2026.

              The company's business model combines open-source community investment (ensuring platform
              adoption and developer trust) with a cloud-hosted service (monetizing production-grade
              reliability). This "open-core" model — though Temporal's core is fully open-source under MIT
              rather than a restricted open-core — mirrors successful precedents such as HashiCorp and
              MongoDB. The primary use cases span payment processing, order fulfillment, customer
              onboarding, CI/CD pipelines, data pipelines, and increasingly, AI agent orchestration where
              durable multi-step workflows are critical.
            claimRefs:
