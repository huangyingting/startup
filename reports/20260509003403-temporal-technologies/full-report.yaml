      - number: '3.3'
        title: 'Cloud-Native Managed Alternatives: AWS, Azure, and Google'
        blocks:
          - type: paragraph
            body: >
              AWS Step Functions is the most widely deployed managed workflow service globally by virtue of AWS's
              installed base. It uses Amazon States Language (ASL), a JSON-based state machine definition language, and
              integrates natively with 220+ AWS services via optimized integrations. Pricing is $25 per million state
              transitions for Standard Workflows, with no minimum contract, making it frictionless for AWS-committed
              teams evaluating whether to adopt a purpose-built workflow platform. The fundamental limitation is
              developer ergonomics: ASL is a JSON/YAML DSL rather than a general-purpose programming language, creating
              a context switch cost for developers accustomed to writing business logic in Go, Python, or TypeScript.
              For greenfield projects running exclusively on AWS, Step Functions is a default consideration that
              Temporal must displace.

              Azure Durable Functions is the most developer-experience-similar competitor to Temporal. Built on the
              Azure Functions serverless runtime, it provides code-first durable execution in .NET,
              JavaScript/TypeScript, Python, and PowerShell, with Java in preview. The orchestrator/activity/ entity
              pattern in Durable Functions closely mirrors Temporal's workflow/activity model, reducing the conceptual
              distance for teams already on Azure. Microsoft's distribution advantage through Azure credits, GitHub
              Copilot workspace integrations, and Azure DevOps toolchains creates a significant bundling advantage for
              Azure-committed shops. The limitation is portability: Durable Functions cannot be deployed outside the
              Azure Functions runtime, creating vendor lock-in.

              Google Cloud Workflows takes a declarative YAML-based approach, offering lower programmability than
              Temporal or Durable Functions. It targets simple sequential and parallel automation on GCP rather than
              complex, long-running business workflows with custom logic. Developer signal on Stack Overflow and
              Stackshare indicates limited organic community adoption relative to Temporal and AWS Step Functions. For
              Temporal, GCP Workflows represents a minor competitive threat primarily for GCP-native customers with
              simple orchestration needs.
