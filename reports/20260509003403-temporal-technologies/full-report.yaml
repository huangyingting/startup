      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Multiple sizing lenses triangulate Temporal's addressable market. The broadest TAM is the workflow
              orchestration market: $19.36B in 2025, growing to $21.93B in 2026 at a 13.3% CAGR, and projected to reach
              $36.45B by 2030 at a 13.5% CAGR (Business Research Company). This broad definition includes all business
              process automation, DevOps orchestration, and data workflow spend — categories where Temporal does not
              directly compete but benefits from budget allocation shifts.

              A narrower developer-infrastructure lens (the SAM) isolates the code-first workflow platform spend:
              developer tools platforms that require engineering adoption, support custom code, and target
              mission-critical transactional workflows. Verified Market Research estimates the developer-oriented
              workflow orchestration segment at $7.8B in 2024, growing to $29.8B by 2032 at a 18.3% CAGR. GII Research
              estimates the broader workflow orchestration market at $108.65B by 2032 under a 7.8% CAGR, though this
              broader scope includes low-code and BPM platforms.

              For SOM, Temporal targets the upper quartile of this SAM: companies with at least 50 engineers and
              mission-critical transactional workloads in fintech, logistics, e-commerce, AI/ML, and SaaS. Temporal
              Cloud's 2,500+ paying customers and ~$61.9M estimated ARR (May 2026, compworth.com estimate) represents a
              roughly 0.5–0.8% penetration of the SAM. Given its 380% YoY growth rate as of February 2026, the company
              is in an aggressive land-and-expand phase, compounded by the agentic AI tailwind. Temporal does not
              publish an official SAM/SOM, so these estimates carry material uncertainty and require verification under
              NDA.
