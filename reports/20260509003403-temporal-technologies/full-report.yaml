      - number: '1.4'
        title: Growth Metrics and Business Scale
        blocks:
          - type: paragraph
            body: |
              Temporal's growth metrics as of early 2026 reflect both the scale of its open-source community
              and the momentum of its commercial cloud service. On the open-source side, the platform has
              been adopted by more than 183,000 weekly active developers globally and deployed across more
              than 7 million unique Temporal clusters as of March 2025 — representing 600% growth in
              developer adoption over the preceding 18 months. Monthly installs exceeded 20 million by
              February 2026, a 500% increase from prior levels. Temporal's open-source codebase is
              distributed under the MIT license and available on GitHub.

              On the commercial side, Temporal Cloud had over 2,500 global customers as of March 2025.
              Revenue grew 4.4x in the 18 months to March 2025 and accelerated to more than 380% year-over-year
              by February 2026. Net Dollar Retention was reported at 184% as of early 2025, indicating
              strong upsell and expansion within existing accounts. The platform has processed 9.1 trillion
              lifetime action executions as of February 2026, including 1.86 trillion attributed to AI-native
              companies. Weekly active usage on Temporal Cloud grew 350% year-over-year by February 2026.

              Independent market intelligence estimates Temporal's annualized revenue at approximately
              $61.9 million as of mid-2025 (compworth.com estimate, unverified by the company), implying
              an EV/ARR multiple of approximately 27-28x at the $1.72 billion Series C valuation and
              approximately 80x at the $5 billion Series D valuation on an estimated forward ARR basis.
              Temporal has approximately 375 employees as of February 2026, of whom roughly 62 are based
              in the Seattle/Bellevue area. The company describes itself as remote-first. A Forrester
              Consulting Total Economic Impact study commissioned by Temporal (published May 2025) found
              that Temporal Cloud customers achieved 201% ROI over three years with a 14-month payback period.
