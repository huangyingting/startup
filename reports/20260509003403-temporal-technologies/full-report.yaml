  - id: TE003
    title: Technology / Operating Architecture Table
    columns:
      - Layer/Component
      - Role
      - Key Dependency
      - Risk/Gap
    rows:
      - - Frontend Service
        - Inbound gRPC routing and rate limiting
        - SDK client connections, Cloud load balancer
        - Single ingress path; rate limit config is operator responsibility on self-hosted
      - - Matching Service
        - Task queue management and worker assignment
        - Frontend Service, persistence layer
        - Queue depth spikes possible under worker shortage conditions
      - - History Service
        - Authoritative event history and state transitions
        - Cassandra or PostgreSQL persistence
        - Hot shards possible for high-volume single workflow IDs
      - - Worker Service
        - Internal maintenance workflows including archival
        - History and Matching Services
        - Not exposed externally; upgrade dependencies exist
      - - Cassandra (default)
        - Primary persistence for workflow history on self-hosted
        - JVM, external Cassandra cluster management
        - Operational complexity high; tuning required for production scale
      - - PostgreSQL
        - Alternative persistence for smaller self-hosted deployments
        - Standard RDBMS infrastructure
        - Lower throughput ceiling than Cassandra at production scale
      - - Elasticsearch
        - Workflow visibility and advanced search queries
        - External Elasticsearch cluster for self-hosted
        - Optional but required for advanced search; adds operational burden
      - - SDK/Worker Process
        - Executes workflow and activity logic, polls via gRPC long-poll
        - Language runtime (Go, JVM, Python, Node.js, .NET, PHP)
        - Determinism bugs cause silent replay failures that are hard to diagnose
      - - Data Converter
        - Client-side payload encryption and custom serialization
        - Customer-managed encryption keys, Codec Server
        - Requires custom implementation; not enabled by default
      - - Nexus
        - Cross-namespace workflow composition with circuit breaking
        - Frontend Service, Namespace configuration
        - New GA January 2026; limited production case studies available
    claimRefs:
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
    notes: >-
      Architecture based on official Temporal documentation. Cassandra is the default persistence for self-hosted;
