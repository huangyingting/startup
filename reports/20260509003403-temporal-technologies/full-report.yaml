  - id: FV001
    title: Recommendation Logic Flow
    type: flow
    layout: wide
    summary: >
      Decision chain from five independent diligence inputs (growth, NRR, syndicate, comparable multiples, and
      structural risk) through the valuation gate to the final conditional recommendation. The flow shows that growth
      and NRR support a premium multiple, but the valuation gate is blocked by unaudited revenue — resolving to a
      conditional recommendation contingent on data-room confirmation.
    data:
      nodes:
        - id: n1
          label: Growth Signal
          detail: 380%+ YoY revenue, 4.4× cloud growth in 18 months — strong but unaudited
        - id: n2
          label: NRR Signal
          detail: 184% NRR as of Series C — top-decile for SaaS platforms
        - id: n3
          label: Syndicate Signal
          detail: a16z lead, GIC cross-round, Lightspeed/Sapphire confirm — low adverse-selection risk
        - id: n4
          label: Comparable Multiples
          detail: 14-25× EV/ARR implied; top-quartile but above median SaaS benchmark
        - id: n5
          label: Structural Risks
          detail: Unaudited revenue, flat Series C, hyperscaler competition, illiquidity
        - id: n6
          label: Valuation Gate
          detail: 'BLOCKED: ARR unconfirmed — range $200-350M; must verify before underwriting at $5B'
        - id: n7
          label: Recommendation
          detail: CONDITIONAL BUY at ≤$4B secondary / pre-IPO with preferred structuring; HOLD at $5B Series D until data-room
      edges:
        - from: n1
          to: n6
        - from: n2
          to: n6
        - from: n3
          to: n6
        - from: n4
          to: n6
        - from: n5
          to: n6
        - from: n6
          to: n7
    claimRefs:
