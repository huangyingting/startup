      - number: '7.2'
        title: Operational and Security Risk
        blocks:
          - type: paragraph
            body: |
              Temporal Cloud's operational risk profile centers on the sensitivity of data it processes
              and the criticality of orchestrated workflows. Enterprise customers frequently use Temporal
              to coordinate high-value, long-running business processes — payments, fraud detection,
              user onboarding, supply chain reconciliation — meaning outages carry disproportionate
              business impact relative to simple infrastructure downtime. Temporal publishes SLAs at
              99.9% for standard plans and 99.99% for enterprise plans, but comprehensive historical
              incident data is not publicly disclosed. Minor degraded-performance events have been
              observed on the status page during the research period, suggesting reasonable operational
              discipline, though the absence of a published post-mortem culture represents a transparency
              gap for enterprise buyers conducting vendor due diligence.

              Security risk is material because Temporal workflow payloads can contain sensitive business
              data, authentication tokens, PII, and financial records. The open-source nature of the
              server code means vulnerabilities are publicly discoverable by adversaries. Temporal
              maintains a responsible disclosure program and publishes CVE advisories for relevant
              dependencies, but the attack surface of a multi-tenant cloud service orchestrating
              sensitive workflows is inherently broad. The Open Source Security Foundation has highlighted
              workflow orchestration platforms as an emerging attack target category given their access
              to long-lived business state. Supply chain risk is elevated by the Go and Java SDK
              ecosystem, where transitive dependency vulnerabilities can propagate into customer
              workflow runtimes. Temporal's use of mutual TLS for inter-service communication, namespace
              isolation between tenants, and encryption at rest provides a solid security baseline, but
              third-party penetration test results are not publicly available, and the SOC 2 Type II
              report is only accessible under NDA during enterprise procurement processes.

              Reliability dependencies on underlying cloud providers introduce correlated failure risk.
              Temporal Cloud spans multiple AWS and GCP regions, providing geographic redundancy, but
              a major cloud provider outage affecting multiple regions simultaneously remains a
              low-probability, high-impact scenario. AWS concentration in certain regions represents
              a single-cloud dependency that enterprise buyers with strict multi-cloud requirements may
              flag, particularly given that AWS is simultaneously a direct competitor via Step Functions.
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
              - CR013
