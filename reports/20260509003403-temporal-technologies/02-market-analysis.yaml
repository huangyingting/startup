  - id: SM-S004
    title: Growth Drivers and Adoption Constraints
    body: >
      The primary growth driver is the proliferation of distributed, microservices-based architectures that make
      unreliable remote calls and state management a universal engineering pain point. As organizations decompose
      monoliths, the need for durable workflow primitives increases proportionally. Cloud adoption further amplifies
      this: serverless and containerized compute are stateless by design, and Temporal fills the stateful workflow gap
      in cloud-native stacks.

      The AI agent wave is the most significant near-term catalyst. Gartner projects that 40% of enterprise applications
      will embed AI agents by end of 2026. IDC estimates agentic AI already represents 10–15% of enterprise IT spending
      in 2026. Multi-step AI agent pipelines that call tools, wait for human approval, or span hours-to-days of
      execution require exactly the durable execution guarantees Temporal provides. Temporal's integration with the
      OpenAI Agents SDK (September 2025) and Nexus cross-namespace orchestration primitives position it as a runtime
      layer for production AI agents.

      Regulatory compliance is a secondary driver in financial services, healthcare, and logistics: auditability,
      deterministic replay, and workflow history retention reduce regulatory risk and simplify SOC 2 / PCI-DSS
      compliance posture for customers. The Forrester TEI study (May 2025, commissioned) found 201% ROI over three years
      and a 14-month payback period across interviewed customers, driven primarily by engineering time savings and
      reduced incident costs.

      Key adoption constraints include the deterministic execution model, which requires developers to avoid
      non-deterministic operations inside workflow code — a learning curve that slows initial adoption. Migration cost
      from existing homegrown or vendor solutions is a significant barrier for incumbent enterprise accounts. AWS Step
      Functions, Azure Durable Functions, and Google Cloud Workflows offer managed workflow services bundled with cloud
      commitment discounts, creating price competition on smaller workloads. The open-source community represents a free
      tier that cannibalizes commercial conversion: 183,000+ weekly active OSS developers (March 2025) vastly outnumber
      Temporal Cloud's 2,500+ paying customers, creating a conversion efficiency challenge.
    claimRefs:
      - CM016
      - CM017
      - CM018
      - CM019
      - CM020
    tableRefs:
      - TM004
  - id: SM-S005
    title: Conflicting Estimates and Diligence Gaps
    body: >
      Multiple structural gaps and contradictions in the available market evidence require preservation and disclosure.
      First, the workflow orchestration TAM estimates range dramatically: $19.4B (BRC, 2025) to $292.8B (Verified Market
      Research, 2032) depending on scope. The high-end estimates conflate BPM, robotic process automation (RPA),
      enterprise integration platforms, and data orchestration — markets where Temporal does not compete. Analysts have
      divergent scope definitions, and no single authoritative third-party study directly sizes the durable execution
      sub-segment.

      Second, ARR estimates for Temporal are entirely third-party and unconfirmed. The $61.9M figure from compworth.com
      uses employee-count benchmarks from comparable companies and should be treated as a rough indicator, not a precise
      measurement. Temporal has not disclosed revenue publicly.

      Third, the agentic AI infrastructure market is nascent and analyst estimates vary widely: $7.1–7.6B for global
      agentic AI in 2025 with a projected $9.1–10.9B in 2026 (MarketsandMarkets, Fortune Business Insights, Precedence
      Research) — but defining what counts as "agentic AI infrastructure" vs. foundational model spend vs. application
      layer spend is not standardized. Temporal's share of this market is not independently estimated.

      Fourth, the customer adoption conversion rate from OSS to commercial is unknown. With 183,000 weekly active OSS
      developers and 2,500+ cloud customers, the implied conversion rate is under 2%, though the comparison is imperfect
      since many OSS users self-host and are not directly comparable. This gap matters because the unit economics of
      OSS-to-cloud conversion drive long-term revenue scalability.
    claimRefs:
      - CM021
      - CM022
      - CM023
      - CM024
      - CM025
