  - id: SM-S003
    title: Buyer and User Segmentation
    body: >
      Temporal's primary buyer profile centers on senior software engineers and platform engineering leadership in
      companies building complex, stateful business logic. The purchasing decision is typically bottom-up, initiated by
      an individual contributor or architect who encounters the pain point of unreliable distributed workflows,
      escalating through a proof-of-concept phase before formal vendor evaluation.

      The primary buyer persona is the Staff Engineer or Director of Engineering at a Series B+ startup or large
      enterprise in fintech, payments, logistics, e-commerce, or AI-native SaaS. Budget ownership lies with the VP of
      Engineering or CTO, with total contract value ranging from $100/month (Essentials) to multi-million-dollar
      enterprise agreements. The decision cycle ranges from two weeks (self-serve cloud) to six months for enterprise
      procurement with security review.

      Secondary buyer segments include data engineering teams replacing Airflow for mission-critical pipelines (though
      Temporal does not market itself as a data pipeline tool), DevOps platform teams building internal developer
      platforms, and AI/ML engineering teams building agentic systems. The fastest-growing buyer segment as of 2026 is
      AI-native companies: OpenAI's public integration and Temporal's 1.86T lifetime action executions attributed to
      AI-native companies signal that this segment is becoming a primary growth vector.

      Payer and user frequently diverge in Temporal's model. The user is the developer writing Go, Java, Python,
      TypeScript, .NET, or PHP workflow code. The payer is the business unit or engineering organization consuming cloud
      credits. This developer-led adoption model mirrors successful infrastructure companies (Stripe, Twilio, HashiCorp)
      and drives strong product-led growth metrics. Enterprise customers typically begin on Temporal Cloud self-serve,
      then expand to Business or Mission Critical tiers as volume and reliability requirements grow.
    claimRefs:
      - CM011
      - CM012
      - CM013
      - CM014
