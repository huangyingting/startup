  evidenceGaps:
    - type: missing-source
      severity: material
      topic: TAM/SAM sizing for durable execution sub-segment
      missingEvidence: >-
        No independent analyst report directly sizes the code-first durable execution sub-segment as distinct from
        low-code BPM, data pipeline orchestration, and enterprise integration. The SAM estimate in this chapter is
        derived from composite assumptions and should be treated as illustrative only.
      whyItMatters: >-
        Without a direct-size SAM estimate, Temporal's market penetration rate and long-term ceiling are difficult to
        assess, complicating valuation comparables.
      diligencePath: >-
        Commission bespoke market research from Forrester, IDC, or a comparable firm to size the code-first workflow
        platform sub-segment separately from BPM and data pipeline markets.
      relatedQuestionRefs:
        - QM007
        - QM008
    - type: private-evidence-only
      severity: material
      topic: OSS-to-cloud conversion rate
      missingEvidence: >-
        The exact conversion rate from OSS users to paid Temporal Cloud customers is not publicly disclosed. The 183,000
        weekly active OSS developer figure and 2,500+ paying customer figure are incommensurable since many OSS users
        self-host and are not migration candidates.
      whyItMatters: >-
        Conversion rate is a key unit economic input for PLG models and affects LTV/CAC analysis and long-term revenue
        ceiling projections.
      diligencePath: Request OSS-to-cloud conversion funnel data from Temporal management under NDA.
      relatedQuestionRefs:
        - QM018
    - type: private-evidence-only
      severity: minor
      topic: Bottom-up vs. top-down ARR mix
      missingEvidence: >-
        The proportion of Temporal's ARR driven by PLG self-serve vs. enterprise sales-led motion is not publicly known,
        making it impossible to assess sales efficiency and growth sustainability.
      whyItMatters: >-
        PLG-heavy companies have different cost structures and churn profiles than enterprise-led companies; the mix
        affects gross margin and burn rate assumptions.
      diligencePath: Request ARR breakdown by tier and GTM channel from Temporal management under NDA.
      relatedQuestionRefs:
        - QM011
    - type: conflicting-data
      severity: minor
      topic: Agentic AI TAM estimates vary by scope
      missingEvidence: >-
        Multiple analyst firms publish agentic AI market estimates with dramatically different scope definitions.
        MarketsandMarkets, Fortune Business Insights, Precedence Research, and Grand View Research produce estimates
        ranging from $93B to $324B by 2034 for ostensibly the same market.
      whyItMatters: >-
        The ambiguity makes it difficult to credibly quantify Temporal's AI-native TAM expansion opportunity or
        attribute a specific premium to its agentic AI positioning.
      diligencePath: >-
        Identify which specific sub-segment (AI agent runtimes and execution infrastructure only) best matches
        Temporal's product surface area, and commission targeted research on that sub-segment.
      relatedQuestionRefs:
        - QM019
        - QM026
    - type: private-evidence-only
      severity: minor
      topic: Asia-Pacific customer presence
      missingEvidence: >-
        Temporal has not disclosed customer concentration by geography. Whether the company has meaningful enterprise
        traction in Asia-Pacific (despite its projected CAGR leadership) is unknown.
      whyItMatters: >-
        Geographic concentration risk affects long-term growth potential and strategic optionality for international
        expansion.
      diligencePath: Request geographic ARR breakdown and pipeline distribution from Temporal management.
      relatedQuestionRefs:
        - QM024
