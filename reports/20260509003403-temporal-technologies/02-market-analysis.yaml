callouts:
  - calloutType: insight
    title: AI Agent Wave Creates Second Growth Curve
    body: >
      Temporal's 1.86 trillion lifetime action executions attributed to AI-native companies, combined with the OpenAI
      Agents SDK integration and Nexus primitives, indicate that the company has successfully established a foothold in
      the agentic AI infrastructure layer. With Gartner projecting 40% of enterprise applications embedding AI agents by
      end-2026 and IDC estimating agentic AI at 10–15% of enterprise IT spend, Temporal has a structural growth lever
      independent of its core fintech and logistics market. This second growth curve justifies a premium EV/ARR
      multiple.
    claimRefs:
      - CM016
      - CM017
      - CM018
  - calloutType: risk
    title: OSS Conversion Efficiency Is a Key Unknown
    body: >
      The gap between 183,000 weekly active OSS developers and 2,500+ paying cloud customers implies a sub-2% conversion
      rate, though the comparison is imprecise. This structural dynamic is common in open-source infrastructure
      companies (HashiCorp, Grafana, Elastic) and can be sustainable if the commercial tier provides compelling features
      OSS users cannot self-host economically. However, if OSS-to-cloud conversion stalls as self-hosted alternatives
      mature, top-line revenue growth could decelerate while developer mindshare remains high.
    claimRefs:
      - CM023
      - CM024
