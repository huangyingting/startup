          unit: $M
        - label: $350M ARR × 10×（SaaS 中位数）
          value: 3500
          unit: $M
        - label: $350M ARR × 17×（高于中位数）
          value: 5950
          unit: $M
        - label: $350M ARR × 25×（前四分位）
          value: 8750
          unit: $M
    claimRefs:
