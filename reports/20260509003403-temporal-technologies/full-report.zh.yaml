      - number: '3.2'
        title: 直接持久执行竞争对手：Restate、Inngest 和 Orkes
        blocks:
          - type: paragraph
            body: >
              Restate 是开源持久执行赛道中与 Temporal 结构最接近的对手。它 2023 年创立于柏林，完成 $7M 种子轮，以 MIT 许可发布，目标开发者是 TypeScript、Java 和
              Go。Restate 的架构差异点在于单二进制运行时，把服务网格和持久性层共置，从而支持更低延迟的本地调用。不过截至 2026 年中，Restate 的社区牵引力仍明显小于 Temporal——GitHub
              星标少于 10,000，而 Temporal 超过 10,500——也缺少 Temporal 在规模化企业客户中的证明（9.1T 次执行）。MIT 许可对 Restate 既是优势（OSS
              采用者不用担心供应商锁定），也是其自身商业模式的风险。

              Inngest 把自己放在持久执行光谱中更简单的一端：事件驱动后台函数和计划任务，并提供开发者友好的 SDK。截至 2026 年，它累计融资 $9.1M，瞄准无服务器和边缘部署。Inngest
              的优势是上手快、TypeScript 一等支持，以及配置极少的托管基础设施。主要限制是没有确定性重放保证，范围也更窄（没有多语言 SDK，也没有 Temporal 复杂度下的子工作流协调）。G2 评论者一致认为
              Inngest 更容易启动，但对复杂企业编排流的能力较弱。

              Orkes 是战略意义最强的直接威胁。Orkes Inc. 由设计并构建最初 Conductor 编排系统的前 Netflix 工程师领导，提供托管且 API 兼容的 Conductor 服务；Conductor
              是 Temporal 的概念前身。Orkes Cloud 起价 $500/month。由于 Conductor 和 Temporal 共享架构 DNA——两者都源自 Netflix 分布式系统谱系——Orkes
              可以可信地触达那些认为 Temporal 学习曲线陡峭或定价激进的企业团队。Temporal 相比 Orkes 的关键优势在于确定性重放引擎、多语言 SDK 深度和大得多的社区。不过 Orkes
              的托管模式给厌恶运维的买方讲了一个更简单的运营故事。
