      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: |
              Temporal 的合作伙伴和依赖风险画像，来自它作为 open-source-first 平台的位置：既构建在更大的云生态之上，
              又在其中竞争。最重要的基础设施依赖是 Temporal Cloud 托管所需的 AWS 和 GCP。公司已有多云策略，
              但主要 workload 集中在 AWS 上，形成不舒服的单云暴露；更麻烦的是，AWS 还通过 AWS Step Functions
              成为竞争产品供应商。Amazon 可以把 Step Functions 定价到低于成本，嵌入托管服务组合，并借助与 Lambda
              和 ECS 的原生集成；Temporal 若没有第三方 connector 很难复制这些能力。这是结构性分发劣势，
              如果企业买方按总拥有成本而非开发者体验评估，劣势会加剧。

              客户收入集中度没有披露。Temporal 的公开客户名单包括 Stripe、Netflix、Coinbase、Snap、DoorDash
              和 Datadog 等 marquee accounts，但前 10 大客户的收入贡献未知。对 Temporal 估算 ARR 阶段的企业 SaaS
              公司而言，前 10 大客户集中度通常在 30–60%；如果一两个 anchor accounts 流失或大幅重谈条款，
              这会形成显著暴露。fintech 和 gig-economy 垂直集中，也会在行业特定下行周期中带来相关性 downside 风险。
              Orkes 作为基于 Temporal 的商业编排厂商，证明第三方可以在 Temporal 开源栈上构建竞争性商业产品；
              这既验证生态，也代表潜在渠道冲突。Temporal 的 SI 和 partner channel 与企业级同行相比仍处早期，
              大额交易过度依赖直销，也限制了在本地系统集成商把控企业采购入口的市场中的地理触达。Sequoia、Madrona
              和 Alphabet GV 等资本提供方的支持是正面因素，但也反映出公司仍处 FCF-negative，需要持续投资人信心。
