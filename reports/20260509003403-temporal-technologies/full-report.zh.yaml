  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: Temporal 从客户应用到服务器服务再到持久化的分层架构，并展示每个边界的安全控制。
    data:
      layers:
        - label: 客户应用与 Worker 层
          detail: >-
            Workflow Worker 和 Activity Worker 以 Go、Java、Python、TypeScript、.NET 或 PHP 实现。通过基于 mTLS 的 gRPC long-poll
            轮询任务队列。休眠工作流的基础设施成本为零。
        - label: SDK 客户端层
          detail: >-
            原生语言 SDK 客户端连接 Temporal Frontend Service。暴露启动、Signal、Query 和等待工作流 API。Data Converter 处理 payload
            序列化和可选客户端侧加密。
        - label: Temporal Server 四大核心服务
          detail: >-
            Frontend Service 负责 gRPC 路由和限流，Matching Service 负责任务队列管理和 worker 分配，History Service 负责事件溯源和状态转换，Worker
            Service 负责内部维护。可用 MIT 许可 OSS 自托管，也可用 Temporal Cloud 托管。
        - label: 持久化层
          detail: Cassandra 是默认自托管部署方案，PostgreSQL 和 MySQL 可作替代，Elasticsearch 用于工作流可见性和搜索。Temporal Cloud 使用自研托管持久化层。
        - label: 安全与可观测性
          detail: >-
            所有服务边界使用 mTLS，Cloud 静态数据使用 AES-256 加密，Data Converter 用于客户端侧 payload 加密，Codec Server 用于授权解密，OpenTelemetry
            提供指标和追踪，Cloud UI 和 OSS Web UI 提供工作流可见性。
    claimRefs:
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
      - CE019
