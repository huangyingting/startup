  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流价值
        blocks:
          - type: paragraph
            body: |
              Temporal 是一个持久执行平台，让开发者可以像写普通代码一样编写容错、有状态的业务逻辑，
              不必手工实现重试机制、状态机或分布式协调原语。平台的核心抽象是 Workflow 函数：
              它以开发者选择的语言写成顺序过程式代码执行，而 Temporal runtime 会在每个 await
              点自动持久化执行状态，并保证即使进程崩溃、网络分区或服务器重启，流程也能完成。
              传统生产应用里大量消耗工程时间的分布式系统复杂性，由此被整类消掉。

              典型用例覆盖电商订单履约（支付、库存、配送协同的多步 saga）、金融科技支付处理
              （带自动补偿的幂等多段交易）、用户 onboarding 流程（并行 API 调用与超时处理）、
              AI agent 循环（长时间运行、多轮 LLM 编排并保持持久状态）、数据管道编排
              （DAG 式批处理、重试和回填），以及 DevOps provisioning 工作流。休眠工作流零计算成本，
              意味着一个睡眠 30 天的工作流不会产生 CPU 成本，这让 Temporal 适合订阅生命周期管理、
              多阶段审批流等长周期业务流程。

              Netflix、Stripe、Coinbase、DoorDash 和 HashiCorp 的生产部署，验证了平台在严格延迟、
              可用性和正确性要求下的大规模可靠性。平台采用事件溯源设计和确定性重放，
              不需要分布式事务或外部幂等基础设施，就能为工作流代码保证 exactly-once 执行语义。
