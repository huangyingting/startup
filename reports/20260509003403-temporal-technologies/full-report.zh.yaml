      - number: '6.5'
        title: 客户侧结论与尽调缺口
        blocks:
          - type: paragraph
            body: |
              总体看，Temporal Technologies 在企业开发者基础设施中呈现出最有说服力的客户质量故事之一。
              2,500+ 付费云客户、184% NDR、18 个月 4.4x 收入增长、跨多个垂直行业的知名企业生产部署，
              以及 Forrester 记录的 201% ROI，共同构成了关键任务工作流编排 product-market fit 的强证据。
              183,000+ 周活跃开发者喂给 2,500+ 付费客户的 OSS-to-Cloud 转化飞轮，是结构上占优的 GTM
              模型：它限制前期 CAC，同时产生大量有机 pipeline。

              具名客户证据集异常强。Netflix、Snap、Stripe、Coinbase 和 Replit 都是各自垂直行业里的定义品类公司，
              它们的生产部署覆盖从部署自动化到 AI agent 编排再到金融交易管理的用例。Netflix proof point
              的细节罕见：由 Netflix 工程师独立发布、量化为五个数量级的可靠性提升，是 Temporal 这个阶段公司很少能拿到的重大尽调正面信号。

              重大尽调缺口仍在。第一，客户数和 NDR 全部来自公司声称，未经独立审计；验证方应要求 cohort-level
              ARR 数据和 CFO attest。第二，GRR 未披露，无法评估 self-serve 长尾中的 logo churn。第三，客户群似乎地理上集中在北美，
              买方也集中于科技行业；国际扩张和垂直多元化时间表不清楚。第四，客户集中度数据缺失：如果不知道前 10 大客户占 ARR
              的 20% 还是 60%，集中度风险就无法正确量化。第五，Forrester TEI 研究由 Temporal 委托，作为验证材料独立性有限。
              第六，TechCrunch 提到的增速从约 20x 降至 4.4x，值得围绕企业 pipeline 健康度和 quota attainment
              趋势进一步审视。潜在投资人应在交割前要求至少五家企业客户访谈，并要求审计后 ARR 与 cohort-level 留存数据。
