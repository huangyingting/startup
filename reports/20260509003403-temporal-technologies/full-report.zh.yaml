      - number: '6.4'
        title: 留存、扩张与 NRR
        blocks:
          - type: paragraph
            body: |
              截至 2025 年 3 月，Temporal 184% 的净美元留存是公开记录中最重要的客户质量信号。
              184% 的 NDR 意味着 12 个月前的客户 cohort 在扣除流失和收缩后，如今多付 84%。
              作为参照，前四分位 SaaS 公司通常能做到 120% 以上 NDR；Snowflake 巅峰期和 HashiCorp
              最好年份这类顶尖基础设施与开发者工具公司可达到 130% 到 150%。若能独立验证，184% 的 NDR
              会把 Temporal 放进全球仅少数基础设施软件公司所在的稀缺梯队。

              驱动这一异常 NDR 的经济机制大概率有两层。第一，Temporal Cloud 按工作流 actions 和 compute
              绑定的消费定价，让客户随着工作流复杂度提升、用例增加或用户基数扩大，自然产生扩张路径。一个客户从单一支付工作流起步，
              随着对平台信心增加，自然会扩展到订单管理、欺诈检测和客户生命周期自动化。第二，Temporal 的架构粘性很强；
              生产工作流一旦用确定性重放部署，迁移到竞争对手就需要完整重写工作流逻辑，切换成本高，从而降低非自愿流失。
              Forrester TEI 研究也支持这一点：综合企业客户三年实现 201% ROI，回本期 14 个月，说明持续扩张的经济性强烈有利于留存。

              Gross Revenue Retention 没有公开披露，因此无法区分扩张驱动的 NDR 与被抵消的 logo churn。
              客户集中度也未披露：公司有 2,500+ 客户，但没有按层级或 top-customer share 拆分收入；
              少数企业账户如 Snap、Netflix 和 Stripe 贡献不成比例的 ARR，是合理可能情形。Forrester 记录的
              $14.3M 避免宕机收入、50% 更快功能交付和 $1M 开发者生产力收益，是有吸引力的尽调输入，
              但来自委托研究，独立验证有限。G2 评论显示满意度很高，尤其赞扬可靠性保证，同时也建设性批评学习曲线陡峭。
