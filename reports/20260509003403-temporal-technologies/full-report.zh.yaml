  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点
      - 证据
      - 何种情况会改变该观点
    rows:
      - - 乐观——Temporal 是 AI 和企业工作流的持久执行层
        - 184% NRR、380%+ 增长、OpenAI / ChatGPT Images 部署、a16z 投资逻辑、2,500+ 云客户
        - NRR 降至 140% 以下；超大规模云厂商推出完全托管的 Temporal 等价产品；AI 采用见顶
      - - 乐观——AI 原生负载是结构性新需求驱动
        - AI 原生公司执行 1.86T 次动作（总数 9.1T）；a16z AI 工作流投资逻辑
        - LLM 编排框架（LangChain、LangGraph）绕过 Temporal，吃下 AI 工作流支出
      - - 乐观——顶级投资财团降低逆向选择风险
        - a16z 领投；主权财富基金 GIC 跨轮参与；Lightspeed、Sapphire、Sequoia 参投
        - 轮次结构显示由内部投资人主导或过度集中；新投资人的尽调时间有限
      - - 悲观——无审计收入；$5B 入场倍数难以让人信服
        - 无公开财务数据；从 Getlatka 2023 年 ARR $26M 外推到 $200–350M，需要多步推断
        - 经审计收入确认 ARR ≥$250M 且增长 >300%——多头逻辑增强
      - - 悲观——Series C 基本持平；$5B 是极快重估
        - TechCrunch：Series C 只比持平“高一点点”；较老股交易 4 个月内抬升 2×
        - Series D 条款包含实质性清算优先权堆叠，足以支撑名义估值
      - - 悲观——企业级规模下，超大规模云厂商在位风险很尖锐
        - AWS Step Functions、Azure Durable Functions 是免费打包替代品；GCP Workflows 在扩张
        - Temporal 在企业账户中证明对超大规模云厂商有实质胜率
    notes: 本表汇总尽调过程中识别的主要乐观和悲观论点。没有单一论点具有决定性；TV006 中的数据室确认应能解决最高优先级的未决问题。
