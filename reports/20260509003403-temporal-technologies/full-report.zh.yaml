  - id: TV005
    title: 投资逻辑破裂与终止触发信号表
    columns:
      - 触发信号
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - ARR 显著低于估计
        - Series D 时经审计 ARR < $150M
        - EV/ARR 升至 33×+；任何增速都无法支撑该倍数
        - 退出或大幅减仓；不要按 $5B 投资定价
      - - NRR 崩塌
        - 过去 12 个月 NRR 低于 120%
        - 扩张引擎失灵；收入增长只依赖新增 logo
        - 重评完整乐观逻辑；NRR 崩塌意味着竞争或产品失败
      - - 超大规模云厂商产品发布
        - AWS、Azure 或 GCP 推出完全托管、原生集成的 Temporal 等价工作流引擎
        - Temporal 的企业价值主张被侵蚀；OSS 分叉风险放大
        - 降低敞口；监测企业胜率数据；评估护城河耐久性
      - - 领导层离职
        - CEO（Samar Abbas）或 CTO（Maxim Fateev）意外离职
        - 关键人风险兑现；组织知识和 AI 愿景延续性受威胁
        - 暂停行动，等待董事会回应；新投资前要求替换计划
      - - IPO 或收购较 Series D 延后超过 7 年
        - 到 2033 年仍无流动性事件
        - 资本锁在非流动性仓位；机会成本累积
        - 评估老股出售；继续持有前先评估基本面经营表现
    notes: 这些触发信号应由投资组合团队按季度监测。基于当前竞争动态，超大规模云厂商和 NRR 触发信号最可能在三年内兑现。
    claimRefs:
      - CV002
      - CV010
      - CV011
      - CV027
      - CV040
      - CV041
  - id: TV006
    title: 最终尽调清单表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 解决路径
    rows:
      - - 审计收入
        - FY2024 和 FY2025 经审计或审阅的财务报表
        - 整个估值判断取决于 ARR 估计；未经审计数字无法支撑 $5B 投资定价
        - 公司；数据室；要求四大或同等独立审计师
      - - 队列 NRR 明细
        - 按客户队列拆分 NRR（按规模、获客年份和垂直行业）
        - 184% 汇总 NRR 可能由少数企业客户扩张拉动；队列数据能揭示集中度
        - 公司；数据室；与 ARR 明细表一起索取
      - - 竞争输赢
        - 针对 AWS Step Functions、Azure Durable 和 Temporal 分叉的结构化赢单 / 输单数据
        - 超大规模云厂商威胁是主要悲观情景驱动；胜率数据是关键缓释因素
        - 公司；销售团队分析；客户访谈作为补充核验
      - - 烧钱与现金跑道
        - 月度烧钱速度、按收入流拆分的毛利率，以及按当前节奏计算的现金跑道
        - 已融资 $650M，烧钱纪律和盈利路径决定是否需要进一步稀释
        - 公司；数据室；CFO（John Bonney）已确认担任财务负责人
      - - 轮次经济条款
        - Series D 条款清单：清算优先权、参与权、反稀释、按比例认购权
        - 在 $5B 名义估值下，优先股结构可能显著改变有效入场价格和下行保护
        - 法律顾问；数据室中的股权结构表和条款清单
      - - 按客户分部拆分 ARR
        - 企业、中端市场、SMB 的 ARR 贡献和增速
        - Temporal 的 TAM 和 NRR 耐久性取决于企业渗透；分部数据能揭示增长引擎
        - 公司；数据室；销售运营团队
    notes: 这六项数据是按 $5B Series D 价格投资所需的最低条件。若无法进入数据室，在当前 $5B 估值水平下，建议仍是有条件持有。
