  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: |
              Temporal Technologies 面向构建分布式系统、长时间运行工作流和关键后端基础设施的软件工程团队。
              主要买方画像是 VP of Engineering、CTO 或 Principal/Staff Engineer 等工程负责人，
              他们先按技术价值评估平台，之后采购决策再进入财务和法务。最终用户是在 Go、Java、Python、
              TypeScript、.NET 或 PHP 中编写 Temporal 工作流的软件开发者。经济买方通常是业务单元或基础设施平台层面的工程预算负责人；
              大型企业中，采购也可能牵涉集中 IT 或已批准供应商名单。

              按垂直行业看，客户群偏向技术密集型行业。金融服务和 fintech 是已知最大集群，包括 Stripe、
              Coinbase、Brex、Upstart 和 Xero，因为该行业需要 SAGA-pattern 交易编排、合规自动化和零失败容忍的支付流。
              媒体和流媒体公司 Netflix、Snap 是突出的早期采用者，吸引它们的是在数亿日活用户下的工作流可靠性。
              Instacart 等电商和 marketplace 公司用 Temporal 做订单编排和库存状态机。Datadog、HashiCorp、
              Box、Replit 等开发者基础设施和 SaaS 公司，把 Temporal 当作 CI/CD、部署自动化和 agent
              编排的内部平台。AI-native 公司正快速成为新兴客群：Replit Agent 由 Temporal 驱动，OpenAI
              Agents SDK 集成也说明 AI workload 采用在增长。Alaska Airlines 等传统企业代表更后期的客群，
              采购周期更长。

              渠道分层包括 self-serve 的 OSS-to-Cloud 转化、截至 2024 年 8 月由 36 家合作伙伴带来的 partner-sourced
              线索（包括 AWS、KPMG、MongoDB 和 EPAM），以及直接企业销售。183,000+ 周活跃开发者的 OSS 飞轮承担主要漏斗入口，
              使 Temporal 的 go-to-market 在结构上类似 HashiCorp 和 Confluent 这类开发者驱动增长公司。收入分层没有公开披露，
              但 Essentials 层级每月 $100、Business 层级每月 $500，说明高 ACV 的 Enterprise 和 Mission Critical
              合同之外，还有一条小账户长尾，客户群收入分布可能呈双峰。
