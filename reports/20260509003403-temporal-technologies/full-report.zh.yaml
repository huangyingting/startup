    summary: >
      投资委员会评分卡覆盖六个维度：市场机会、增长 / 收入证明、竞争护城河、单位经济、执行风险和估值上行。分数基于现有尽调证据，采用 1-10 分制。整体画像支持在合适入场价投资；但 $5B
      高溢价入场和未经审计收入限制了估值上行评分。
    data:
