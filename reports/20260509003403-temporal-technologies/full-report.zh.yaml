  - id: FV003
    title: 按情景划分的估值 / 回报区间
    type: range
    layout: wide
    summary: |
      投资人按 $5B 进入时，悲观、基准、乐观情景下的低 / 中 / 高退出企业价值。基准情景在 $5B 入场价下给出持平到负回报，强化了有条件建议：要么争取更低入场价，要么采用优先股结构。
    data:
      items:
        - label: 悲观退出（ARR $100-150M；10-15× EV/ARR；持有 4-7 年）
          low: 1500
          mid: 2000
          high: 2500
          unit: $M
          note: ARR 高估、NRR 压缩至 130% 以下、IPO 延后；按 $5B 入场，隐含 0.3-0.5× 回报
        - label: 基准退出（ARR $200-250M；12-18× EV/ARR；持有 4-6 年）
          low: 2800
          mid: 3800
          high: 4500
          unit: $M
          note: ARR 已确认、NRR 适中、IPO 或战略收购；按 $5B 入场，隐含 0.6-0.9× 回报
        - label: 乐观退出（ARR $300M+；20-30× EV/ARR；持有 3-4 年）
          low: 6000
          mid: 10000
          high: 15000
          unit: $M
          note: AI 工作流采用强劲、NRR ≥170%、IPO 或收购溢价；按 $5B 入场，隐含 1.2-3.0× 回报
    claimRefs:
      - CV010
      - CV011
      - CV030
      - CV031
      - CV032
      - CV033
      - CV040
      - CV041
