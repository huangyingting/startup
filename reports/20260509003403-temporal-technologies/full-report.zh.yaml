      - number: '5.5'
        title: 技术差异化与竞争性 IP
        blocks:
          - type: paragraph
            body: |
              Temporal 最核心的技术差异化，是 code-first 的工作流编程模型。AWS Step Functions 和
              Azure Durable Functions 要求用 YAML 或 JSON 状态机 DSL 表达工作流逻辑；Apache Airflow
              的 Python DAG 定义也与执行代码分离。Temporal 工作流则是开发者所用语言里的普通过程式函数。
              这让循环、条件、库、调试器和 IDE 工具都能直接使用，业务逻辑与工作流定义之间不需要翻译层。

              六个官方 SDK 的多语言支持，让 Temporal 区别于单语言替代品。Temporal 源自同一批创始人在
              Uber 构建的 Cadence 项目，沉淀了约六年经过实战检验的算法 IP，覆盖确定性重放、任务队列分片和分布式调度，
              短期内很难复制。休眠工作流零计算成本，在规模化场景下具有经济意义。工作流 patching
              和 worker versioning 等版本化 API，允许在运行中执行继续走旧代码路径时部署新代码，
              对 24/7 生产系统而言至关重要。AI agentic workload 的适配正在成为新的差异点：
              持久执行模型天然适合长时间运行、多轮 LLM 编排，因为这类流程失败频繁，且状态必须跨轮次保存；
              1.86 trillion 次已报告的 AI-native workflow executions 为这一点提供支撑。
            claimRefs:
              - CE027
              - CE028
              - CE029
              - CE030
              - CE031
              - CE032
      - number: '5.6'
        title: 信任、安全、隐私与合规
        blocks:
          - type: paragraph
            body: |
              Temporal Technologies 持有 Temporal Cloud 的 SOC 2 Type II 认证，覆盖安全性、可用性和保密性信任服务准则。
              医疗客户可签 HIPAA Business Associate Agreement。GDPR 合规和 Data Processing Agreement
              也可用于欧盟数据处理。这些认证适用于 Temporal Cloud；自托管部署的安全责任仍由运营方承担。

              传输层上，所有 worker 到 server 的通信都使用 mTLS，实现双向认证和传输加密。Temporal Cloud
              用 AES-256 对静态存储的工作流历史加密。Data Converter 接口在数据到达服务器前提供客户端侧
              payload 加密，确保 PII、财务记录和医疗信息等敏感数据不会以明文存储。Codec Server 模式允许授权调试，
              但不暴露加密密钥。持久化层的 Namespace 隔离防止跨租户数据访问。

              Business 及以上层级支持通过 SAML 做身份联合，Enterprise 层级支持 SCIM，并配有 RBAC
              做细粒度权限管理。私有连接选项可以让流量不暴露在公共互联网。Temporal Technologies 是 CVE
              Numbering Authority（CNA），说明安全项目已具成熟度。关键风险在于开源 Temporal Server
              默认不带认证或授权；缺少网络控制的自托管部署会暴露给未授权访问，这是开发者社区反复提出的担忧。
              渗透测试节奏和具体 CVE 历史没有公开披露。
