      - number: '1.4'
        title: 增长指标与业务规模
        blocks:
          - type: paragraph
            body: >
              Temporal 截至 2026 年初的增长指标，同时体现开源社区规模和商业云服务动能。开源侧，截至 2025 年 3 月，平台已被全球超过 183,000 名每周活跃开发者采用，并部署在超过 700 万个唯一
              Temporal 集群上——过去 18 个月开发者采用增长 600%。到 2026 年 2 月，月安装量超过 2000 万，比此前水平增长 500%。Temporal 的开源代码库采用 MIT 许可，并托管在
              GitHub。


              商业侧，截至 2025 年 3 月，Temporal Cloud 拥有超过 2,500 家全球客户。截至 2025 年 3 月的 18 个月内收入增长 4.4x，到 2026 年 2 月同比增速超过
              380%。截至 2025 年初，净留存率（NRR）披露为 184%，说明存量账户的增购和扩张强劲。截至 2026 年 2 月，平台累计处理 9.1 trillion 次 action 执行，其中 1.86
              trillion 次来自 AI 原生公司。到 2026 年 2 月，Temporal Cloud 每周活跃使用量同比增长 350%。


              独立市场情报估计，Temporal 截至 2025 年中年化收入约 $61.9 million（compworth.com 估算，未获公司验证），意味着在 $1.72 billion Series C 估值下
              EV/ARR 约 27-28x，在 $5 billion Series D 估值下，以估算前瞻 ARR 计算约 80x。Temporal 截至 2026 年 2 月约有 375 名员工，其中约 62 人位于
              Seattle/Bellevue 区域。公司称自己远程优先。Temporal 委托 Forrester Consulting 进行的 Total Economic Impact 研究（2025 年 5
              月发布）发现，Temporal Cloud 客户三年 ROI 达 201%，回本周期 14 个月。
