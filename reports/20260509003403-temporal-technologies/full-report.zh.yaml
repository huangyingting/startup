        - 要求提供前 10 大客户收入占总 ARR 的比例
      - - 科技行业垂直集中度
        - 具名客户以科技和金融科技为主；医疗、政府、制造较薄
        - 中风险
        - 限制 TAM 扩张叙事；垂直专用工具可能进入竞争
