      - number: '6.3'
        title: 具名客户验证
        blocks:
          - type: paragraph
            body: |
              Temporal 已在大量可公开引用的企业客户中拿下生产部署，覆盖多个垂直行业，提供了有意义的 proof-point
              多样性。以公司规模和阶段看，reference logo 的质量和层级非常突出，反映出 developer-led、bottoms-up
              的 GTM 策略先转化有影响力的工程组织。

              Netflix 是记录最完整的案例。Netflix 工程团队发布技术博客，说明 Temporal 如何把其部署自动化系统的部署失败率从
              4% 降至 0.0001%，提升五个数量级；这个案例具体、量化，且由 Netflix 工程师独立发布，而不是 Temporal
              市场材料。Netflix 每天在全球微服务集群中管理数千次部署，意味着 Temporal 运行在全球最高吞吐、最高关键性的生产环境之一。

              Snap 被引用为在服务 414 million 日活用户的关键应用栈中运行 Temporal；这是一个要求亚秒级延迟和极高可用性的实时约束。
              Netflix 与 Snap 作为早期采用者，显著降低了后续企业买家对 Temporal 平台可靠性的疑虑，也让 Temporal
              成为高吞吐、延迟敏感生产负载的优先选择。

              Replit 代表 AI-native 细分市场的 proof point。Replit Agent 用 Temporal 做多步 AI agent
              工作流编排，确认 Temporal 已在新兴 agentic AI workload 中生产部署。Coinbase 则通过分布式加密货币交易的
              SAGA 模式，证明 Temporal 适合金融级交易编排；在这类场景里，exactly-once 语义不可谈判。Alaska
              Airlines 提供了传统企业基础设施工作流自动化的 proof point。HashiCorp、Datadog、Box、Stripe、
              Instacart、Brex、Outreach、Upstart、Xero、Sinch 和 Nvidia 等客户，进一步覆盖开发者工具、SaaS、
              fintech 和企业垂直行业。一个关键限制是，公开案例主要来自科技行业公司；医疗、制造、除电商外的零售以及政府垂直行业，
