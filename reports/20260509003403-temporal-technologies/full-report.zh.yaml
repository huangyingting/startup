        - 中风险
        - 若 AWS 推出成本更低的竞争性托管工作流服务，平台面临风险
        - 要求拆分伙伴来源与直销来源 ARR
      - - 北美地域集中度
        - 可见客户大多总部在美国；EMEA 和 APAC 可见度有限
        - 中风险
        - 限制国际 ARR；GDPR 和数据驻留要求抬高成本
        - 要求提供 EMEA 与 APAC ARR 占比和区域员工数拆分
    notes: 集中度风险估计来自对公开客户信息的定性推断。Temporal 未公开披露按客户、垂直行业和地域划分的实际收入集中度。
