      - number: '1.3'
        title: 融资历史与投资方
        blocks:
          - type: paragraph
            body: >
              Temporal 自 2019 年成立以来，经过七次融资事件累计融资 $650 million。约 $18 million 的种子轮在 2020 年完成。Series A 由 Sequoia Capital
              领投。$103 million 的 Series B 由 Index Ventures 领投，随后在 2023 年 2 月完成 $75 million 延展轮，公司估值约 $1.5
              billion（此前据报道曾降至约 $880 million，但 Temporal 未公开确认该数字）。


              2025 年 3 月，Tiger Global 领投 Temporal $146 million Series C，投后估值 $1.72 billion——CEO Abbas
              称相较上一轮是「涨了一点点——非常小的一点」，反映 2022–2024 年私募融资市场艰难。Series C 共同投资方包括 StepStone Group、Amplify Partners、Index
              Ventures、MongoDB Ventures、Sequoia Capital、Conversion Capital、Hanwha Next Generation Opportunity Fund 和 137
              Ventures。


              2025 年 10 月，新加坡主权财富基金 GIC 领投 $105 million 老股交易（由投资者发起的要约收购，允许现有股东和员工出售股份），公司估值 $2.5 billion。Tiger Global 和
              Index Ventures 也参与。该轮老股交易伴随两项关键领导层任命：John Bonney 出任 CFO，Jonathan Chadwick 加入董事会。


              2026 年 2 月，Temporal 完成由 Andreessen Horowitz 领投的 $300 million Series D，估值 $5 billion——不到十二个月，较 2025 年 3 月
              Series C 接近翻三倍。其他参与方包括 Lightspeed Venture Partners、Sapphire Ventures，以及老股东 Sequoia Capital、Index、Tiger
              Global、GIC、Madrona 和 Amplify。Series D 伴随 Raghu Raghuram（a16z 普通合伙人、前 VMware CEO）获任董事会观察员。截至目前累计融资 $650
              million。Temporal 未披露任何债务融资或授信额度。
