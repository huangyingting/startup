  - id: FV001
    title: 投资建议逻辑流
    type: flow
    layout: wide
    summary: |
      决策链从五个独立尽调输入（增长、NRR、投资人组合、可比倍数和结构性风险）出发，经估值关口到最终有条件建议。流程显示，增长和 NRR 支撑溢价倍数，但未经审计收入卡住估值关口；结论是有条件建议，前提是数据室确认。
    data:
      nodes:
        - id: n1
          label: 增长信号
          detail: 收入同比增长 380%+，18 个月 Cloud 增长 4.4×——强劲但未经审计
        - id: n2
          label: NRR 信号
          detail: Series C 时 NRR 为 184%——SaaS 平台前 10% 分位
        - id: n3
          label: 投资人信号
          detail: a16z 领投，GIC 跨轮跟进，Lightspeed / Sapphire 确认——逆向选择风险低
        - id: n4
          label: 可比倍数
          detail: 隐含 14-25× EV/ARR；处于前四分位，但高于 SaaS 基准中位数
        - id: n5
          label: 结构性风险
          detail: 收入未经审计、Series C 平轮、超大规模云厂商竞争、流动性不足
        - id: n6
          label: 估值关口
          detail: 阻断：ARR 未确认——区间 $200-350M；按 $5B 投资前必须核验
        - id: n7
          label: 投资建议
          detail: 有条件买入：≤$4B 老股 / Pre-IPO，且采用优先股结构；数据室确认前，对 $5B Series D 持有观望
      edges:
        - from: n1
          to: n6
        - from: n2
          to: n6
        - from: n3
          to: n6
        - from: n4
          to: n6
        - from: n5
          to: n6
        - from: n6
          to: n7
    claimRefs:
      - CV001
      - CV002
      - CV008
      - CV010
      - CV011
      - CV030
      - CV031
      - CV040
      - CV041
  - id: FV002
    title: 估值对 ARR 估计的敏感性
    type: bar
    layout: wide
    summary: >
      在六个 ARR 情景下（两个收入估计 × 三个 EV/ARR 倍数），$5B Series D 价格对应的隐含企业价值。柱状图高于 $5B 参考线，表示情景支撑当前估值；低于参考线，则表示 $5B 价格偏高。只有乐观
      ARR（$350M）× 前四分位倍数（25×）情景给出的 EV 高于 $5B——这凸显估值支撑的安全边际很窄。
    data:
      items:
        - label: $200M ARR × 10×（SaaS 中位数）
