      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >
              Temporal
              的主要买方画像集中在构建复杂、有状态业务逻辑公司的高级软件工程师和平台工程负责人。采购决策通常自下而上，由遇到分布式工作流不可靠痛点的个人贡献者或架构师发起，经过概念验证阶段后，再升级到正式供应商评估。

              主要买方人物是 Series B+ 初创公司或大型企业中的 Staff Engineer 或工程总监，行业包括金融科技、支付、物流、电商或 AI 原生 SaaS。预算归工程副总裁或 CTO 所有，总合同价值从
              $100/month（Essentials）到数百万美元企业协议不等。决策周期从两周（自助云）到六个月（含安全审查的企业采购）不等。

              次级买方包括用 Temporal 替换 Airflow、承载关键任务流水线的数据工程团队（尽管 Temporal 并不把自己营销为数据流水线工具）、构建内部开发者平台的 DevOps
              平台团队，以及构建智能体系统的 AI/ML 工程团队。截至 2026 年，增长最快的买方分层是 AI 原生公司：OpenAI 的公开集成，以及 Temporal 归因于 AI 原生公司的 1.86T 累计
              action 执行，显示该分层正在成为主要增长向量。

              在 Temporal 模型中，付款方和使用者经常分离。使用者是编写 Go、Java、Python、TypeScript、.NET 或 PHP
              工作流代码的开发者。付款方是消耗云积分的业务单元或工程组织。这种开发者驱动的采用模式类似成功基础设施公司（Stripe、Twilio、HashiCorp），并推动强劲的产品驱动增长指标。企业客户通常先从
              Temporal Cloud 自助服务开始，然后随着用量和可靠性要求提高，扩展到 Business 或 Mission Critical 层级。
