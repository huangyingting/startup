      - number: '8.5'
        title: SaaS 估值倍数与基准
        blocks:
          - type: paragraph
            body: >
              上市 SaaS 倍数基准给 Temporal 的估值区间提供了量化地板和天花板。Aventis Advisors（Mar 2026）报告上市 SaaS EV/Revenue 中位数为 3.4×。Windsor
              Drake（Feb 2026）把 2025 年中上市 SaaS EV/NTM Revenue 中位数放在 6.1×，头部四分位公司为
              13-14×。这些基准适用于财务已披露、经审计的上市公司；私营公司通常因增长可选性获得溢价，也因流动性不足被打折。若估值 $5B、ARR 估计 $200M（悲观收入），隐含倍数为 25×，远高于头部四分位基准。若
              ARR 为 $350M（乐观估计），倍数压缩到约 14×；对于一家增长 380%+、NRR 184% 的公司，这落在头部四分位范围内。关键敏感项是收入估算：若 $350M ARR 低估 50% 至
              $175M，隐含倍数会升至 28×，即便放在高增长私营科技公司里，入场价也偏紧。任何以 $5B 或更高估值建仓，都应按 ARR 估算不确定性控制仓位。
