  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值历史与融资轨迹
        blocks:
          - type: paragraph
            body: >
              2019 年以来，Temporal Technologies 已完成七次披露融资事件，累计资本约 $650M，估值轨迹从种子阶段低于 $500M 走到 2026 年 2 月 Series D 的
              $5B。Series A（2021）和 Series B（$103M，估值约 $1.5B，2022 年 2 月） 在有利市场中确立了公司的独角兽地位。2023 年 2 月，公司以 $1.5B 持平估值完成
              $75M Series B extension， 显示出市场收缩压力。Series C（$146M，估值 $1.72B，2025 年 3 月）被 TechCrunch
              描述为相对上一轮二级交易「只高出非常一点点」， 说明公司穿过了一段倍数压缩期。2025 年 10 月，GIC 领投 $105M 二级交易，估值 $2.5B，比 Series C 高 46%。 2026 年 2
              月，Series D 将估值推至 $5.0B，较四个月前的二级交易翻 2×，符合一家后期公司在 AI-workflow
              需求拐点中加速的图景。估值历史同时反映出在下行周期维持高倍数的挑战，以及增长指标重新加速时快速重估的可能。
            claimRefs:
              - CV001
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV036
      - number: '8.2'
        title: 收入与增长指标
        blocks:
          - type: paragraph
            body: >
              Temporal 的财务画像目前主要依赖公司披露和分析师推算；公司尚未发布经审计财务。D 轮时（未经审计，Feb 2026）公司披露收入同比增长 380%+，截至 Mar 2025 的 18 个月里云收入增长
              4.4×。2025 年初净收入留存率（NRR）为 184%，按任何上市 SaaS 标尺都很高，说明存量客户扩张强。Getlatka 估计 2023 年 ARR 约 $26M。若套用 18 个月 4.4×
              的增长因子，到约 Q3 2025 ARR 可达 ~$114M；再按 D 轮 公告披露的 380%+ 增长外推，到 2026 年初 ARR 落在 $200-350M
              区间是合理情景。这些都是分析师推断，必须用尽调资料室材料核验；公司未发布经审计收入。高 NRR、增长提速和 2,500+
              云客户共同撑起一个积极但未经审计的财务图景。任何承销判断都应把拿到经审计收入明细表作为重权重条件，再考虑以 $5B 或更高估值入场。
            claimRefs:
              - CV002
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV039
      - number: '8.3'
        title: 投资人构成与机构信号
        blocks:
          - type: paragraph
            body: >
              D 轮投资人阵容异常宽且质量高，在后期私募轮里并不常见。Andreessen Horowitz 领投，投资逻辑把 Temporal 定位为「关键工作流的代码执行层」，并以 OpenAI 在 ChatGPT
              Images 中部署 Temporal 来验证 AI 工作流逻辑。Lightspeed Venture Partners 和 Sapphire Ventures 均通过各自公司组合页面确认参投。主权财富基金
              GIC 同时参与 Oct 2025 老股交易（$2.5B）和 D 轮（$5B），形成跨轮次机构连续性。回归投资人包括 Sequoia、Index Ventures、Tiger Global、Madrona 和
              Amplify Partners。Jonathan Chadwick 加入董事会也很有分量：他是 VMware 老将，同时在 Confluent、Databricks、Notion、ServiceNow 和
              Zoom 董事会任职，带来与 Temporal 扩张直接相关的企业 GTM 经验。Crunchbase 付费墙后的数据显示，D 轮前累计融资约
              $626M，与公开披露一致。相比窄基或内部人主导轮次，这一投资人阵容的广度和质量降低了逆向选择风险。
            claimRefs:
              - CV001
              - CV021
              - CV022
