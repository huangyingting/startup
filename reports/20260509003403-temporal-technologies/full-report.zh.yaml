        - 客户增加工作流、动作数和用户后，ARR 无需重新谈判就会自动增长
        - 机会
        - 184% NDR 的主要驱动；形成结构性扩张飞轮
        - 按层级和年份建模各客户队列的 ACV 轨迹
      - - OSS 到 Cloud 转化管线
        - 183K+ 每周 OSS 开发者是未付费管线；每次转化都会带来阶跃式 ARR
        - 机会
        - 最大的自然增长杠杆；结构性低 CAC 获客路径
        - 要求按 OSS 集群规模和活跃度提供转化率
      - - 头部客户收入集中度
        - Snap、Netflix、Stripe 可能贡献不成比例的 ARR；无公开披露
        - 高风险
