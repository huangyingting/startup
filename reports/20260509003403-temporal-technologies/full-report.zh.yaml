      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >
              Temporal Technologies 由 Samar Abbas 和 Maxim Fateev 联合创立。两人都是分布式系统工程师，在 Amazon Web Services、Microsoft 和
              Uber 共事超过 15 年。在 Amazon，两人都参与过 Amazon Simple Workflow Service（SWF），这是最早一批云托管工作流执行系统之一。在 Microsoft，Abbas
              领导创建了面向 Azure 的 Durable Task Framework。在 Uber，两人共同构建 Cadence，这个开源工作流编排引擎后来成为 Temporal 的直接前身，并被
              HashiCorp、LinkedIn、Airbnb、Coinbase 等公司采用。Cadence 的商业成功和开发者热情让他们相信市场机会足够大，于是在 2019 年创立 Temporal。


              2024 年 4 月，Abbas 和 Fateev 互换高管角色：Abbas 从 CTO 转任 CEO，Fateev 从 CEO 转任 CTO。公司称，这次调整是有意让每位创始人的强项匹配公司增长阶段，Abbas
              专注 GTM 和公司建设，Fateev 集中负责长期技术愿景。截至 2026 年初，高管团队包括 Jim Cyb（President，负责 GTM，2024/2025 年加入）和 John
              Bonney（CFO，曾任 Harness CFO，并在 FinancialForce 和 SAP 担任高级财务职位，2025 年 10 月任命）。董事会包括 Sahir Azam（MongoDB
              首席产品官，公司首位独立董事）、Jonathan Chadwick（前 VMware CFO 和 COO，Confluent、Databricks、Notion、ServiceNow、Zoom 董事，2025 年
              10 月任命）以及 Raghu Raghuram（前 VMware CEO、Andreessen Horowitz 普通合伙人，2026 年 2 月以董事会观察员身份加入）。


              领导团队刻意在深厚技术根基、企业级 GTM 和财务成熟度之间做平衡。Abbas 曾说 Temporal
              是「我们第四次或第五次构建类似系统」——这句话说明两位创始人带来的领域经验很深。制度性知识集中在两位联合创始人身上，是主要关键人风险；不过近期高管招聘（Cyb、Bonney）和董事会任命开始分散运营责任。
