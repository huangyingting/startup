      - number: '1.5'
        title: 关键里程碑与公司历史
        blocks:
          - type: paragraph
            body: >
              Temporal 的公司历史直接追溯到 2015 至 2019 年左右 Uber 内部 Cadence 的开发。Abbas 和 Fateev
              观察到，几乎每一家大型分布式系统公司（Airbnb、LinkedIn、Coinbase）都面临同样的编排可靠性挑战，并在构建同样的定制方案。在开源 Cadence 并看到社区采用后，两人于 2019 年创立
              Temporal Technologies，将这一理念商业化。


              Temporal 核心平台于 2019 年推出，公司在 2020 年伴随 $18 million 种子轮开始运营。随着平台获得企业采用，随后完成由 Sequoia 领投的 Series A，以及由 Index
              领投、估值 $1.5B、规模 $103M 的 Series B。2023 年 2 月，$75 million Series B 延展轮支撑公司穿越 2022–2023
              年市场下行，不过估值看起来在这一时期有所回落。2024 年，公司通过聘请 Jim Cyb 担任 President，并让 Abbas 与 Fateev 互换 CEO/CTO 角色，有意加速 GTM。


              2025 年，Temporal 轨迹明显提速。2025 年 3 月 Series C 让公司以 $1.72 billion 估值重回增长轮。2025 年 5 月，Forrester 发布委托 TEI 研究，确认
              Temporal Cloud 客户获得 201% 企业 ROI。2025 年 9 月，Temporal 与 OpenAI 推出 OpenAI Agents SDK 和 Temporal
              持久执行引擎的公开预览集成，把 Temporal 定位为生产级 AI 智能体的核心层。2025 年 10 月 $2.5 billion 估值的老股交易，以及 2026 年 2 月由 a16z 领投、估值 $5
              billion 的 Series D，验证了公司商业动能正在加速。Temporal 2026 年年度用户大会「Replay 2026」宣布了面向 AI 智能体编排的新功能，包括增强的跨命名空间 Nexus
              能力和集成。
