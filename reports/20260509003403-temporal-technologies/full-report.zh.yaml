      - number: '7.4'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: |
              Temporal 的财务风险由三股相互咬合的力量塑造：高估值倍数、未披露但可能不低的 burn rate，
              以及与免费自托管开源替代品竞争的变现模型。约 $5B 的 Series D 估值，对应估算收入 50–100x 的 ARR
              倍数，明显高于 2025–2026 年基础设施 SaaS 公司 10–15x 的公开市场可比水平。这个溢价带来显著重估风险：
              如果增长放缓、在 risk-off 宏观环境中需要融资，或潜在收购方对任何收购报价套用保守战略折价倍数，估值都可能被重置。

              burn rate 没有公开披露。按约 250–350 名员工、基础设施成本和该阶段典型 SaaS 单位经济性估算，
              月度现金消耗约 $2–6M，对应年化 burn $24–72M。公司已融资 $350M，且没有现金耗尽迹象，
              runway 看起来足够支撑 3–5 年；但 AI 产品开发加速和企业销售团队扩张，可能明显压缩这段 runway。
              公司没有公开给出盈利路径或时间表，因此更依赖投资人继续按高倍数支持。

              开源变现动态是最具结构性特征的财务风险。Temporal 的 MIT 许可证允许无限免费使用服务器，
              开发者社区中相当大比例选择自托管而不付费。自托管部署与付费 Temporal Cloud 客户的比例未知，
              但据信明显偏向自托管使用。这形成根本性的「免费层重力」，使 Temporal Cloud 可变现的可服务市场小于总平台采用。
              如果 hyperscalers 投资托管的 Temporal-compatible 服务——类似 AWS 通过 OpenSearch 对 ElasticSearch
              所做的事——Temporal Cloud 变现的云交付溢价可能塌陷，差异化只剩支持合同和企业 SLA。沿 HashiCorp/Terraform
              路径从 MIT 转向 Business Source License，是一个对社区高度敏感的选项，可能触发 fork 和开发者信任侵蚀，
              且很难逆转。
