      - number: '2.2'
        title: 市场规模：TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              多个规模测算视角共同锚定 Temporal 的可寻址市场。最宽口径 TAM 是工作流编排市场：2025 年 $19.36B，2026 年增至 $21.93B，CAGR 13.3%，并预计到 2030 年达到
              $36.45B，CAGR 13.5%（Business Research Company）。这个宽定义包含所有业务流程自动化、DevOps 编排和数据工作流支出——这些类别里 Temporal
              并不直接竞争，但会受益于预算分配迁移。

              更窄的开发者基础设施视角（SAM）把代码优先工作流平台支出单独拎出来：需要工程采用、支持自定义代码、并面向关键任务交易型工作流的开发者工具平台。Verified Market Research
              估计，面向开发者的工作流编排赛道 2024 年为 $7.8B，到 2032 年增长至 $29.8B，CAGR 18.3%。GII Research 估计，更广义工作流编排市场到 2032 年为
              $108.65B，CAGR 7.8%，但该更宽范围包含低代码和 BPM 平台。

              SOM 方面，Temporal 瞄准这个 SAM 的上四分位：至少 50 名工程师、在金融科技、物流、电商、AI/ML 和 SaaS 中运行关键任务交易型负载的公司。Temporal Cloud 2,500+
              家付费客户以及约 $61.9M 估算 ARR（2026 年 5 月，compworth.com 估算）代表对 SAM 约 0.5–0.8% 的渗透。考虑到截至 2026 年 2 月 380%
              的同比增速，公司正处于激进的先落地再扩张阶段，并叠加智能体 AI 顺风。Temporal 未公布官方 SAM/SOM，因此这些估算存在重大不确定性，需要在 NDA 下验证。
