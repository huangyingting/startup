      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              最主要增长驱动因素，是分布式、微服务架构的扩散让不可靠远程调用和状态管理成为普遍工程痛点。组织拆分单体架构后，对持久工作流原语的需求会相应增加。云采用进一步放大这一点：无服务器和容器化计算天生无状态，Temporal
              补上云原生技术栈中的有状态工作流缺口。

              AI 智能体浪潮是近期最重要催化剂。Gartner 预计，到 2026 年底，40% 企业应用将嵌入 AI 智能体。IDC 估计，2026 年智能体 AI 已占企业 IT 支出的 10–15%。多步骤 AI
              智能体流水线会调用工具、等待人工批准，或跨越数小时到数天执行，正好需要 Temporal 提供的持久执行保证。Temporal 与 OpenAI Agents SDK 的集成（2025 年 9 月）以及
              Nexus 跨命名空间编排原语，把它定位为生产级 AI 智能体的运行时层。

              监管合规是金融服务、医疗和物流中的次级驱动因素：可审计性、确定性重放和工作流历史保留降低监管风险，并简化客户的 SOC 2 / PCI-DSS 合规姿态。Forrester TEI 研究（2025 年 5
              月，委托研究）在受访客户中发现三年 ROI 为 201%、回本周期 14 个月，主要由工程时间节省和事故成本降低驱动。

              关键采用约束包括确定性执行模型；该模型要求开发者避免在工作流代码中使用非确定性操作，学习曲线会拖慢初始采用。从既有自研或供应商方案迁移的成本，是现有企业账户的重大门槛。AWS Step
              Functions、Azure Durable Functions 和 Google Cloud Workflows
              提供与云承诺折扣捆绑的托管工作流服务，对较小负载形成价格竞争。开源社区相当于免费层，会吞噬商业转化：183,000+ 名每周活跃 OSS 开发者（2025 年 3 月）远多于 Temporal Cloud 的
              2,500+ 家付费客户，形成转化效率挑战。
            claimRefs:
              - CM016
