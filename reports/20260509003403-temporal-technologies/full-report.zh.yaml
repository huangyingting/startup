  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Temporal
              的主要市场是企业工作流编排软件——这类平台在分布式系统中协调、执行并持久保存多步骤业务逻辑。工作流编排市场涵盖自动化任务协调、跨故障管理状态、并为长时间运行的业务流程提供可见性的软件和服务。它位于业务流程管理（BPM）、数据工程编排和分布式系统基础设施的交叉点。

              在这个宽口径类别中，Temporal 切入面向开发者的持久执行子赛道：代码优先的平台让软件工程师把工作流写成普通函数，同时能穿越基础设施故障、自动扩展，并提供确定性重放保证。这把 Temporal 与低代码
              BPM 工具（Appian、Pega）、数据流水线调度器（Apache Airflow、Prefect）和企业集成平台（MuleSoft、Boomi）区分开来。Temporal
              替代的现状方案包括基于消息队列（Kafka、SQS）自建重试逻辑、自研 saga 实现、云原生状态机服务（AWS Step Functions），以及会积累技术债的 cron 加数据库模式。

              一个重要相邻市场是智能体 AI 基础设施：管理多步骤、长时间运行 AI 智能体流水线的编排层。Temporal 2025 年 9 月与 OpenAI Agents SDK 的集成，以及 Nexus 跨命名空间
              RPC 原语，让它直接进入这一层。全球智能体 AI 市场 2025 年达到 $7.3B，2026 年预计为 $9.1–10.9B，并将在 2034 年前以 40–45% CAGR 增长。其中，企业自动化子赛道
              2025 年约为 $5.9B。随着企业把 AI 智能体从试点推向生产，Temporal 同时受益于工作流编排支出和新增 AI 基础设施预算。
