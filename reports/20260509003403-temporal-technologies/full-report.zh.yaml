      - number: '5.2'
        title: 产品模块、SDK 与资产图谱
        blocks:
          - type: paragraph
            body: |
              Temporal 的产品组合覆盖开源 Temporal Server、托管的 Temporal Cloud 服务，以及不断扩张的
              SDK 和集成生态。OSS Server 采用 MIT 许可证，允许不受限制的商业使用和自托管，
              但默认不带认证或授权，安全责任落在运营方身上。

              Temporal Cloud 把服务器打包成多租户托管服务，以 Namespace 组织，并按 Actions
              的消费模型计费。现有四个定价层：Essentials（$100/月，1 million Actions）、
              Business（$500/月，2.5 million Actions，SAML SSO）、Enterprise（10 million
              Actions，年度合同，SCIM）和 Mission Critical（定制 SLA、专用基础设施）。六个官方 SDK
              以功能一致为目标发版：Go（功能完整度最高）、Java（Spring Boot 集成）、Python
              （asyncio-native）、TypeScript（npm、Node.js）、.NET（C#，GA）和 PHP（社区支持）。

              Temporal Nexus 于 2026 年 1 月正式 GA，用于跨 namespace 和跨租户的工作流组合。
              OpenAI Agents SDK 集成在 2025 年 9 月预览发布，使 Temporal 成为 OpenAI-powered
              agentic pipeline 的持久执行层。Google ADK 集成在 2026 年宣布。Replay 2026
              发布的 Serverless Workers 将替客户消除 worker 基础设施管理。每个模块都是一个独立产品面，
              有自己的发布节奏；Temporal 从纯工作流编排走向 AI 基础设施，同时服务传统企业和 AI-native
              客户，可服务市场也随之扩大。
