      - number: '8.4'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              Temporal 估值最值得参考的四家公司是 Confluent（CFLT）、Datadog（DDOG）、MongoDB（MDB）和 HashiCorp（Sep 2024 被 IBM 以 $6.4B
              收购）。Confluent 最接近 Temporal：同为开发者基础设施平台，靠热门开源项目（Apache Kafka）商业化；FY2025 订阅收入 $1.12B，同比增长 21%，按近期交易水平对应约
              6-8× 收入倍数。Datadog 是可观测性龙头，FY2025 收入 $3.0B，同比增长 26%；凭增长率和利润率结构，交易倍数高于 SaaS 中位数（约 12-16× NTM 收入）。MongoDB
              FY2026 收入 $2.0B、增长 19%，交易倍数接近 SaaS 中位数。HashiCorp 以 $6.4B 被 IBM 收购，代表一笔基础设施软件交易：平台企业渗透率高，成交价约为过去收入的
              7-9×。Temporal 的 NRR 更高（184%，而这些同业通常为 120-140%）、增长更快，并有 AI 工作流顺风，因此相对 Confluent
              类倍数可享受溢价；但一旦增长放缓，重估风险也很大。14-25× 的隐含 EV/ARR 区间匹配 Temporal 的增长画像，但在 $5B 入场点下行缓冲有限。
            claimRefs:
