      - number: '8.6'
        title: 乐观 / 基准 / 悲观估值情景
        blocks:
          - type: paragraph
            body: >
              乐观情景要满足三件事：D 轮时确认 ARR 超过 $300M；AI 工作流采用周期里 NRR 持续高于 150%；三到四年内以 20-30× 收入倍数成功 IPO 或被战略收购。在这些假设下，以 $5B 入场，若
              IPO 或收购时企业价值达到 $15-25B，可产生 3-5× 回报。基准情景假设尽调资料室确认 ARR 为 $200-250M，AI 浪潮后 NRR 压缩至 140-160%，四到六年内以 12-18× ARR
              IPO 或被收购。隐含退出价值 $3-5B，从 $5B 入场只带来 1-2× 的温和回报，只有拿到优先股下行保护才可接受。悲观情景假设 ARR 被高估（实际 $100-150M）、NRR 压缩至 130%
              以下，且超大规模云厂商竞争侵蚀可服务市场。在这些假设下，$5B 估值站不住脚，下一轮降估值或以 $2-3B 区间平淡退出都很可能。对各情景做概率加权后，若没有进一步谈判结构，以 $5B
              入场的预期回报大概率只是持平到小幅正收益。
