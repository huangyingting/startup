  - id: TE002
    title: 工作流 / 用例表
    columns:
      - 用户任务
      - 不用 Temporal 的痛点
      - Temporal 方案
      - 可衡量收益
      - 已知限制
    rows:
      - - 电商订单履约
        - 队列加 DB 状态机手写 saga
        - 工作流编排补偿 Activity 并自动重试
        - 省掉手写补偿代码和重试表
        - 开发者需要跨过确定性学习曲线
      - - 金融科技支付处理
        - 幂等键加外部 cron 加重试表
        - 带 timer、signal 和 exactly-once 的原子工作流
        - 无需外部 cron，也能跑 exactly-once 执行
        - 需要仔细设计 Activity 幂等性
      - - 用户入门流程
        - 顺序 API 调用，局部失败靠应用代码处理
        - 并行 Activity，配超时和 fallback 分支
        - 降低代码复杂度，状态可通过 query 查看
        - 复杂流程下 workflow history 可能膨胀
      - - AI 智能体循环
        - 自定义状态机加队列承接 LLM 调用
        - 持久工作流承载 LLM Activity，并用 signal 驱动多轮交互
        - 带持久状态的容错多轮智能体
        - 受确定性约束，LLM 调用必须包进 Activity
      - - 数据流水线编排
        - Airflow DAG 加外部重试逻辑
        - Temporal 工作流配扇出 Activity 图和重试
        - 原生重试、回填和可观测性，无需额外基础设施
        - 相比 Spark，未针对大规模数据 shuffle 优化
      - - DevOps 基础设施开通
        - Bash 脚本加手动重试和状态文件
        - 长运行工作流，通过 signals 暂停 / 恢复
        - 故障中也能安全暂停 / 恢复，保留完整审计轨迹
        - 相比简单脚本方案，SDK 设置成本偏高
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE005
    notes: 用例表综合官方文档、开发者社区讨论和已发布客户案例研究。
  - id: TE003
    title: 技术 / 运行架构表
    columns:
      - 层 / 组件
      - 角色
      - 关键依赖
      - 风险 / 缺口
    rows:
      - - Frontend Service
        - 入站 gRPC 路由和限流
        - SDK 客户端连接、Cloud 负载均衡器
        - 单一入口路径；自托管下限流配置由运维方负责
      - - Matching Service
        - 任务队列管理和 worker 分配
        - Frontend Service、持久化层
        - worker 不足时队列深度可能飙升
      - - History Service
        - 权威事件历史和状态转换
        - Cassandra 或 PostgreSQL 持久化
        - 单个高流量 workflow ID 可能形成热分片
      - - Worker Service
        - 内部维护工作流，包括归档
        - History Service 和 Matching Service
        - 不对外暴露；存在升级依赖
      - - Cassandra（默认）
        - 自托管 workflow history 的主持久化层
        - JVM、外部 Cassandra 集群管理
        - 运维复杂度高；生产规模需要调优
      - - PostgreSQL
        - 小型自托管部署的替代持久化层
        - 标准 RDBMS 基础设施
        - 生产规模下吞吐上限低于 Cassandra
      - - Elasticsearch
        - 工作流可见性和高级搜索查询
        - 自托管需要外部 Elasticsearch 集群
        - 可选，但高级搜索需要；会增加运维负担
      - - SDK / Worker 进程
        - 执行 workflow 和 activity 逻辑，通过 gRPC 长轮询拉取
        - 语言运行时（Go、JVM、Python、Node.js、.NET、PHP）
        - 确定性 bug 会引发难以诊断的静默 replay 失败
      - - Data Converter
        - 客户端 payload 加密和自定义序列化
        - 客户自管加密密钥、Codec Server
        - 需要客户自行实现；默认不开启
      - - Nexus
        - 跨命名空间工作流组合，带熔断
        - Frontend Service、Namespace 配置
        - January 2026 刚 GA；生产案例研究有限
    claimRefs:
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
    notes: 架构基于 Temporal 官方文档。Cassandra 是自托管默认持久化层；Temporal Cloud 使用自研托管持久化层。
