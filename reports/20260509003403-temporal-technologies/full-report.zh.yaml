        - label: 执行风险
          value: '6'
          unit: /10
          delta: Strong team, broad syndicate; flat Series C history a concern
        - label: $5B 估值上行
          value: '5'
          unit: /10
          delta: Base case flat return; conditional upside only at reduced entry price
    claimRefs:
