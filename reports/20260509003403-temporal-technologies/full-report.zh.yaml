      - number: '7.5'
        title: 缓释因素、触发点与结论
        blocks:
          - type: paragraph
            body: |
              Temporal 有若干可信的风险缓释因素，能部分抵消上述风险。监管方面，Temporal 发布 GDPR-compliant
              Data Processing Agreement，通过企业销售渠道报告 SOC 2 Type II 认证，并向欧盟客户提供数据驻留选项。
              这些是企业云 SaaS 的 table stakes 缓释项，但缺少公开审计报告限制了独立验证。负责任披露计划、CVE
              响应、mutual TLS 强制执行和 namespace 隔离，使其相对同阶段开发者基础设施同行具备高于平均水平的运营安全 hygiene。

              Temporal 在持久执行上领先七年的竞争护城河，加上大型开源社区的网络效应，以及覆盖 Go、Java、Python、
              TypeScript、PHP、Ruby 和 .NET 的广泛 SDK，给快速竞争替代提供了有意义的缓冲。架构差异化——工作流事件溯源、
              确定性重放、版本化和长时间运行状态持久性——不是云厂商功能团队在竞争时间压力下容易复制的。2024 年 4 月 CEO/CTO
              互换显示出组织成熟度和有意设计的领导层演进，部分缓释关键人集中风险；不过联合创始人中心性仍在，留任包没有公开披露。

              需要监控的 thesis-break 触发点包括：（1）AWS 或 Azure 以有竞争力价格推出 managed Temporal-compatible
              服务，释放核心产品商品化信号；（2）确认发生影响 Temporal Cloud 工作流数据的数据泄露或安全事件，
              损害这个依赖信任的基础设施类别；（3）同一财年失去两个或更多 marquee accounts，说明竞争替代发生；（4）许可证从
              MIT 改为 BSL 或类似安排，很可能触发社区 fork；（5）在最后已知融资后的 24 个月内无法完成 flat-or-up
              融资，释放投资人信心侵蚀信号。强制尽调问题包括审计财务报表、前 10 大客户收入集中度、总留存和净留存指标、SOC 2
              Type II 报告、附 subprocessor list 的 GDPR DPA，以及任何待处理监管通信。
