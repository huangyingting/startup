  - id: FR001
    title: 风险热力图——按类别看发生可能性与影响
    type: matrix
    layout: wide
    summary: 从四个维度评估八大风险类别：发生可能性、若发生的财务 / 战略影响、当前缓释成熟度，以及缓释后的剩余暴露。评估基于截至 2026 年 5 月的监管文件、安全披露、竞争情报和投资人数据交叉验证。
    data:
      columns:
        - 发生可能性
        - 影响
        - 缓释成熟度
        - 剩余暴露
      rows:
        - label: 监管 / 合规风险
          values:
            - label: 中——GDPR/CCPA 已适用，但尚无执法
              tone: neutral
            - label: 高——罚款最高可达全球收入的 4%
              tone: negative
            - label: 中——DPA 和数据驻留已到位
              tone: neutral
            - label: 中——审计证据缺口仍在
              tone: neutral
        - label: 超大规模云厂商竞争替代
          values:
            - label: 中——尚无托管 Temporal 服务上线
              tone: neutral
            - label: 高——可能压缩云交付溢价
              tone: negative
            - label: 中——OSS 护城河和切换成本仍在
              tone: neutral
            - label: 中高——对捆绑销售缺少结构性防御
              tone: negative
        - label: 安全 / 数据泄露
          values:
            - label: 低至中——多租户 SaaS 天然存在攻击面
              tone: neutral
            - label: 严重——企业信任和收入存在风险
              tone: negative
            - label: 中——mTLS、隔离和加密已到位
              tone: neutral
            - label: 中高——未公开可用渗透测试或 SOC 2
              tone: negative
        - label: 关键人物 / 执行风险
          values:
            - label: 低——联合创始人稳定，角色互换显示有规划
              tone: positive
            - label: 高——Fateev 是持久执行模型的唯一架构师
              tone: negative
            - label: 中——角色互换和搭档机制降低集中度
              tone: neutral
            - label: 中——留任条款未公开披露
              tone: neutral
        - label: 开源变现 / 许可证风险
          values:
            - label: 低——保留 MIT 许可证，未释放变更信号
              tone: positive
            - label: 高——许可证变更可能引发分叉和信任流失
              tone: negative
            - label: 高——MIT 宽松许可压低即时风险
              tone: positive
            - label: 低至中——社区敏感度形成天然约束
              tone: positive
        - label: 财务 / 估值重置风险
          values:
            - label: 中——50-100x ARR 的高溢价倍数挤压安全边际
              tone: negative
            - label: 高——降价融资损害员工股权和人才留存
              tone: negative
            - label: 低——烧钱速度和盈利路径没有公开指引
              tone: negative
            - label: 中高——烧钱未披露，增速无法核验
              tone: negative
    claimRefs:
      - CR001
      - CR006
      - CR009
      - CR025
      - CR028
      - CR031
      - CR036
      - CR038
