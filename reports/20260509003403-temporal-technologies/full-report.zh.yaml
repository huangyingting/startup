      - number: '2.5'
        title: 相互冲突的估算与尽调缺口
        blocks:
          - type: paragraph
            body: >
              现有市场证据中存在多个结构性缺口和矛盾，需要保留并披露。第一，工作流编排 TAM 估算跨度很大：从 $19.4B（BRC，2025 年）到 $292.8B（Verified Market
              Research，2032 年），取决于口径。高端估算把 BPM、机器人流程自动化（RPA）、企业集成平台和数据编排混在一起——这些市场 Temporal
              并不参与竞争。分析师的范围定义不一致，也没有单一权威第三方研究直接测算持久执行子赛道。

              第二，Temporal 的 ARR 估算全部来自第三方，且未经确认。compworth.com 给出的 $61.9M 数字使用可比公司的员工数基准，应视为粗略指标，而不是精确测量。Temporal
              尚未公开披露收入。

              第三，智能体 AI 基础设施市场仍处早期，分析师估算差异很大：2025 年全球智能体 AI 为 $7.1–7.6B，2026 年预计 $9.1–10.9B（MarketsandMarkets、Fortune
              Business Insights、Precedence Research）——但「智能体 AI 基础设施」与基础模型支出、应用层支出的边界尚未标准化。Temporal 在该市场的份额没有独立估算。

              第四，从 OSS 到商业的客户采用转化率未知。183,000 名每周活跃 OSS 开发者和 2,500+ 家云客户，隐含转化率低于 2%，不过这个比较并不完美，因为许多 OSS
              用户自托管，不能直接类比。这个缺口很重要，因为 OSS 到云转化的单位经济决定长期收入可扩展性。
