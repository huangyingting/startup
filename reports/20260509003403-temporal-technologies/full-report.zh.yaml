  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Temporal 的竞争格局分为四个清晰层级。第一层是直接的持久执行竞争对手——这些平台共享同一个核心价值主张：代码优先、容错的工作流编排，包括 Restate（柏林初创公司，MIT 许可，$7M 种子轮，支持
              TypeScript/Java/Go）、Inngest（事件驱动函数编排，累计融资 $9.1M，TypeScript 优先）和 Orkes（由前 Netflix 工程师提供的托管 Conductor
              服务）。这些对手瞄准同样的高级工程买方和同样的待办任务。

              第二层是超大规模云厂商捆绑的云原生托管服务：AWS Step Functions（基于 JSON 的 ASL 状态机，深度 AWS 集成）、Azure Durable Functions（代码优先，支持
              .NET/TypeScript/Python，Azure 原生）和 Google Cloud Workflows（声明式 YAML）。这些在位者依托已承诺云消费客户获得分发杠杆，但牺牲开发者易用性和可移植性。尤其
              AWS 和 Azure 几乎拥有无限销售能力，并能补贴工作流服务来捕获更广泛的云支出。

              第三层是数据工程编排：Apache Airflow（45K+ GitHub 星标，批处理 ETL 主导者）、Astronomer（商业化 Airflow）和 Prefect（Python 原生，$38M
              Series B）。这些平台在开发者画像上重叠，但服务的核心任务不同——批处理 DAG 调度，而不是有状态、实时的持久执行——因此在 Temporal 核心交易型用例中的直接替代风险有限。

              第四层是现状和 DIY 替代方案：消息队列（Kafka、SQS）上的自定义重试逻辑、saga 模式实现，以及 cron 加数据库架构。这些代表 Temporal
              最大总机会，但需要教育式销售，而不是靠功能差异化替换。买方需要多语言支持、确定性重放和企业级合规三者结合时，竞争格局最明显有利于 Temporal；四个层级中目前没有任何一方能把这套组合做成单一集成产品。
