      - number: '5.3'
        title: 技术架构与运行模式
        blocks:
          - type: paragraph
            body: |
              Temporal Server 由四个可独立部署、可水平扩展的服务组成。Frontend Service 处理来自
              SDK client 和 Web UI 的所有入站 gRPC 请求，负责限流和路由。Matching Service 管理任务队列，
              通过 long-poll 机制把工作流和 activity 调度给可用 worker，避免持续轮询开销。History
              Service 掌握每个工作流的权威执行历史，并以原子方式处理状态转换。Worker Service
              运行归档、复制等内部后台维护工作流。

              执行模型采用事件溯源：每次状态转换都会作为不可变事件写入持久化层中的工作流 Event History，
              包括 workflow started、activity scheduled、activity completed、timer fired 和 signal
              received。worker 重启或失败后，Temporal SDK 会从头重放工作流函数；已完成 activity
              和 timer 的返回值来自记录历史，而不是重新执行有副作用的操作。确定性重放让系统无需分布式事务，
              也能提供 exactly-once 执行语义。

              Worker 通过基于 mTLS 的 gRPC long-poll 连接 Temporal Server，实现双向认证和传输加密。
              持久化层支持 Cassandra（自托管默认）、PostgreSQL 和 MySQL，并用 Elasticsearch
              支撑工作流可观测性。Data Converter 接口支持客户端侧 payload 加密，敏感数据因此不会以明文到达服务器。
              公开的 p99 延迟 SLO 为 200ms；2026 年 1 月实测显示，Temporal Cloud 上 StartWorkflow
              p99 为 69ms，SignalWorkflow p99 为 46ms。
