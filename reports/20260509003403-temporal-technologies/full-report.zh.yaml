  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: |
              Temporal Technologies 是云软件提供商，其平台处理的客户工作流状态可能包含个人身份信息、财务记录、健康数据或其他受监管内容。
              作为《通用数据保护条例》下的数据处理方，Temporal Cloud 必须与欧盟客户维持适当的数据处理协议，
              维护数据主体权利机制，并实施防止未授权访问的技术保障。不合规会让 Temporal 面临最高全球年营业额 4%
              或 €20M 的罚款，以较高者为准。Temporal 发布了 Data Processing Agreement，并在 Frankfurt
              提供欧盟区域 namespace 托管，但没有公开独立 GDPR 审计报告；对欧盟市场的机构买方来说，这是一个尽调缺口。

              根据《加州消费者隐私法案》及其后续《加州隐私权法案》，Temporal 必须响应其工作流中流转的加州居民数据访问和删除请求。
              鉴于企业用例很广——订单处理、身份验证、欺诈检测——工作流 payload 中存在受监管数据的可能性很高。欧盟 AI Act
              于 2024 年 8 月生效，并在 2026–2027 年分阶段实施，对 AI 系统开发者和部署方引入按风险分层的合规义务。
              Temporal 本身不是 AI 模型提供商，但它定位为 AI agent 工作流的编排骨干，可能产生间接监管暴露。
              使用 Temporal 编排高风险 AI 系统的客户，可能要求 Temporal 作为 subprocessor 提供基础设施 attestations。
              EAR 下的出口管制可能限制服务某些司法辖区，不过 Temporal 纯软件模式的风险低于硬件出口商。研究期间未发现已知待决诉讼、
              专利侵权索赔或执法行动；缺少负面法律信号是正面指标。开源 IP 交叉污染和未来许可证摩擦仍是需要监控的潜在风险，
              尤其是如果 MIT 许可证未来改成类似 HashiCorp 2023 年 Terraform 重新许可的更严格 Business Source License。
