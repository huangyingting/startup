      - number: '3.3'
        title: 云原生托管替代方案：AWS、Azure 和 Google
        blocks:
          - type: paragraph
            body: >
              凭借 AWS 的装机基础，AWS Step Functions 是全球部署最广泛的托管工作流服务。它使用 Amazon States Language（ASL），一种基于 JSON
              的状态机定义语言，并通过优化集成与 220+ 项 AWS 服务原生连接。Standard Workflows 定价为每百万次状态转换 $25，没有最低合同要求，因此对已经承诺 AWS
              消费的团队来说，评估是否采用专用工作流平台几乎没有摩擦。根本限制在开发者体验：ASL 是 JSON/YAML DSL，而不是通用编程语言，会给习惯用 Go、Python 或 TypeScript
              编写业务逻辑的开发者带来上下文切换成本。对于完全运行在 AWS 上的新项目，Step Functions 是默认会考虑的方案，Temporal 必须将其替换掉。

              Azure Durable Functions 是与 Temporal 在开发者体验上最相似的竞争对手。它构建在 Azure Functions 无服务器运行时之上，提供
              .NET、JavaScript/TypeScript、Python 和 PowerShell 的代码优先持久执行，并预览支持 Java。Durable Functions 中的
              orchestrator/activity/entity 模式非常接近 Temporal 的 workflow/activity 模型，降低了已在 Azure 上团队的概念距离。Microsoft 借 Azure
              credits、GitHub Copilot workspace 集成和 Azure DevOps 工具链获得分发优势，对已承诺 Azure 的公司形成显著捆绑优势。限制在可移植性：Durable
              Functions 不能部署在 Azure Functions 运行时之外，造成供应商锁定。

              Google Cloud Workflows 采用声明式 YAML 路线，可编程性低于 Temporal 或 Durable Functions。它面向 GCP
              上简单的顺序和并行自动化，而不是带自定义逻辑的复杂、长时间运行业务工作流。Stack Overflow 和 Stackshare 上的开发者信号显示，与 Temporal 和 AWS Step Functions
              相比，它的自然社区采用有限。对 Temporal 来说，GCP Workflows 主要在简单编排需求的 GCP 原生客户中构成较小竞争威胁。
