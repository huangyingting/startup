      - number: '8.7'
        title: 风险调整后的估值考量
        blocks:
          - type: paragraph
            body: >
              几项风险会直接影响估值可信度。第一，公司没有经审计财务报表；380%+ 增长和 184% NRR 都来自公司披露。第二，TechCrunch 曾把 $1.72B 的 C
              轮描述为接近持平轮，说明当时市场并不支持大幅估值上调；从 Oct 2025 老股交易到 Feb 2026 D 轮，四个月估值跳升 2×，也让人质疑 $5B
              定价究竟来自基本面重估，还是领投方激烈竞争。第三，据报道，Prime Unicorn Index 在 2022-2024 年期间给 Temporal 的估值约 $880M，与公司同期声称的 $1.5-1.72B
              估值相冲突。第四，公司 375 名员工，人均收入（按悲观 / 乐观 ARR 估计为 $530K-$930K）符合 SaaS 基准；但如果收入低于估计区间下沿，并不能提供安全垫。缓释因素包括 D
              轮投资人阵容广、主权财富基金参与（GIC 跨轮次）以及 184% NRR 暗示的平台粘性。
