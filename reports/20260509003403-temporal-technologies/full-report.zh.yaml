      - - MongoDB（MDB，上市）
        - FY2026 收入 $2.0B
        - 同比 +19%
        - NTM 收入 8–12×
        - 具备 OSS 到云转化路径的数据库平台；已有企业级规模
        - NRR 低于 Temporal；增速更慢；数据库品类 TAM 不同
      - - HashiCorp（2024 年 9 月被 IBM 收购）
        - 收购时 ARR 约 $700M（估计）
        - 收购时约 15–20%
        - 约 9× ARR（IBM 支付 $6.4B EV）
        - 基础设施软件收购基准；企业渗透显著
        - 许可证重授权争议压低估值；Temporal 尚未面临同样问题
    enumerationScope:
      coverage: sample
      basis: >-
        Comparables selected from publicly disclosed financials (Confluent, Datadog, MongoDB via stockanalysis.com) and
        acquisition announcement (HashiCorp via IBM newsroom). Temporal's private market lacks direct public peers;
        these four represent the closest analogs across OSS-to-cloud infrastructure, developer tooling, and infra M&A.
        Pure-play workflow orchestration companies are not publicly traded as of the report date.
    notes: 所有倍数均为估计，基于截至 2026 年 5 月的公开交易数据和分析师报告。本表未单独量化 Temporal 的私营公司溢价和流动性折价。
