chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与产品概览
        blocks:
          - type: paragraph
            body: >
              Temporal Technologies 是一家开源工作流编排和持久执行公司，成立于 2019 年，总部位于华盛顿州 Bellevue。公司构建并维护 Temporal 开源平台——一个采用 MIT
              许可的持久执行引擎——以及企业级托管服务 Temporal Cloud。Temporal
              的核心创新是「持久执行」：开发者用自己熟悉的编程语言（Go、Java、Python、TypeScript、.NET、PHP）编写普通业务逻辑，Temporal
              运行时保证代码即使遇到基础设施故障、网络超时和进程崩溃，也能执行完成。工作流状态会在每一步自动持久化，无需手写重试逻辑或复杂状态机，就能无缝恢复。


              平台服务两个相关但不同的客户群。第一类是开源开发者社区：截至 2025 年 3 月，超过 183,000 名每周活跃开发者使用自托管 Temporal server，全球唯一 Temporal 集群部署超过
              700 万个。第二类是 Temporal Cloud 企业客户群：超过 2,500 家组织为托管服务付费，由它处理服务器运维、扩展和基础设施层可靠性。Temporal Cloud
              采用按用量计费，围绕四个层级定价——Essentials（$100/month）、Business（$500/month）、Enterprise（定制）和 Mission Critical（定制）——按执行的
              Actions 和消耗的存储收费。截至 2025 年 3 月前 18 个月，收入增长 4.4x；到 2026 年 2 月，同比增速超过 380%。


              公司的商业模式把开源社区投入（保证平台采用和开发者信任）与云托管服务（把生产级可靠性变现）结合起来。这种「开放核心」模式——尽管 Temporal 核心在 MIT 许可下完全开源，并不是受限开放核心——类似
              HashiCorp、MongoDB 等成功先例。主要用例覆盖支付处理、订单履约、客户引导、CI/CD 流水线、数据流水线，并越来越多地进入 AI 智能体编排，因为持久的多步骤工作流对这类场景至关重要。
