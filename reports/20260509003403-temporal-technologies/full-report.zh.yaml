      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: |
              Temporal Cloud 的运营风险集中在两点：它处理的数据敏感性，以及被编排工作流的关键性。企业客户经常用 Temporal
              协调高价值、长时间运行的业务流程——支付、欺诈检测、用户 onboarding、供应链对账——因此宕机造成的业务影响，
              相比简单基础设施停机更不成比例。Temporal 对标准计划发布 99.9% SLA，对企业计划发布 99.99% SLA，
              但没有公开完整历史事故数据。研究期间，status page 上出现过轻微性能降级事件，说明运营纪律尚可；
              但没有公开 post-mortem 文化，对做供应商尽调的企业买方而言是透明度缺口。

              安全风险很重要，因为 Temporal 工作流 payload 可能包含敏感业务数据、认证 token、PII 和财务记录。
              服务器代码开源，意味着漏洞可被攻击者公开发现。Temporal 维护负责任披露计划，并为相关依赖发布 CVE advisory，
              但一个编排敏感工作流的多租户云服务，攻击面天然很宽。Open Source Security Foundation 已把工作流编排平台列为新兴攻击目标类别，
              原因是它们能接触长期存在的业务状态。Go 和 Java SDK 生态进一步抬高供应链风险，传递依赖漏洞可能传播到客户工作流 runtime。
              Temporal 使用 mutual TLS 做服务间通信、租户间 namespace 隔离和静态加密，安全基线扎实；但第三方渗透测试结果不公开，
              SOC 2 Type II 报告也只在企业采购流程中通过 NDA 获取。

              对底层云厂商的可靠性依赖，会引入相关性故障风险。Temporal Cloud 横跨多个 AWS 和 GCP 区域，
              提供地理冗余，但大型云厂商同时影响多个区域的故障仍是低概率、高影响情景。某些区域的 AWS 集中度构成单云依赖，
              严格要求多云的企业买方可能会标记这一点；尤其是 AWS 还通过 Step Functions 直接竞争。
