      - number: '3.4'
        title: 相邻数据编排：Airflow、Astronomer、Prefect 和 Conductor
        blocks:
          - type: paragraph
            body: >
              Apache Airflow 是数据工程工作流调度中的主导平台，GitHub 星标超过 45,000，并被数千家运行 ETL、数据转换和 ML 流水线任务的企业采用。Astronomer 提供商业化托管
              Airflow 服务，云部署起价约 $200/month。Airflow 基于 DAG 的模型专为批处理、依赖有序的数据流水线设计，任务按时钟调度，而不是由实时事件触发。这种架构差异限制了它与 Temporal
              的直接重叠：Airflow 不提供确定性重放、交易级容错有状态执行，也不支持亚秒级触发。在成熟架构中，同时运行 Temporal 和 Airflow 的团队通常用 Temporal 处理实时交易型工作流，用
              Airflow 做数据流水线调度——两者互补，而非竞争。

              Prefect 是 Airflow 领先的现代替代者，2022 年完成 $38M Series B，并拥有强 Python 原生开发者体验。Prefect Cloud 定价从面向开发的免费层开始，生产付费计划起价
              $500/month。Prefect 相比 Airflow 的核心差异点是更 Python 风格的 API、更好的云原生可观测性，以及 Prefect Cloud 托管基础设施。与 Airflow
              一样，Prefect 主要定位于数据工程，而不是交易型持久执行；Prefect 自己的文档也明确把它定位为数据流水线和 ML 工作流，而不是通用有状态业务逻辑。

              Netflix Conductor 是直接影响 Temporal 创立的开源编排系统。Conductor 使用基于 JSON 的工作流定义模型和服务端执行模型。Orkes 是今天支持 Conductor
              的主要商业实体。与 Temporal 相比，Conductor 抽象层级较低，团队必须管理更多样板代码；但一些企业偏好它显式、便于审计的执行模型。DZone 分析给 Temporal 在工作流表达力上更高评分，而
              Conductor 在运营简单性上得分更高，尤其适合不信任代码嵌入式工作流逻辑的团队。
            claimRefs:
              - CP006
              - CP007
              - CP009
