      - number: '6.2'
        title: 采用轨迹与增长
        blocks:
          - type: paragraph
            body: |
              自 2022 年 10 月 Temporal Cloud GA 以来，Temporal 的客户增长按任何基准看都很突出。
              平台在 2024 年 4 月突破 1,000 家企业客户，距离 GA 约 18 个月。到 2024 年 8 月，
              客户数升至 1,500 家；到 2025 年 3 月达到 2,500+，意味着约七个月净增约 1,000 个 logo，
              或该阶段每月新增约 143 个客户。对一家在此前由无托管云产品的开源工具主导市场中竞争的基础设施型开发者工具公司来说，
              这条轨迹非常罕见。

              账户数之外，用量强度指标也给出有力的采用图景。2024 年 8 月的每月 130B+ actions
              反映出深度运营依赖：每个 action 对应一次工作流状态转换或 activity 执行，说明 Temporal
              嵌入的是高频交易流，而不是低量批处理任务。截至 2025 年 3 月，183,000+ 周活跃 OSS 开发者分布在全球
              7 million+ 个独特 Temporal clusters 中，是潜在云转化对象。

              到 2025 年 3 月，收入在 18 个月内增长 4.4x，确认账户增长正在规模化转化为 ARR。不过，这也低于
              2022 和 2023 年报告的约 20x 年增长率。规模上来后增速放缓符合预期；开发者基础设施企业从病毒式采用转向企业销售动作时，
              这种变化并不异常。到 2024 年 8 月，合作伙伴生态扩至 36 家，包括 hyperscalers 和全球咨询公司，
              说明 Temporal 正在搭建间接渠道覆盖，以支持持续企业渗透，而不必线性增加直销人数。

              关键未知项包括 customer 的精确定义、Essentials、Business 和 Enterprise 层级之间的分布、
              月度合同与年度合同的混合，以及 2,500+ 是否包含试用账户。这些模糊点在开发者工具增长报告中常见，
              不会推翻趋势，但限制了仅凭公开数据精确三角测算 ARR。
