      - number: '8.8'
        title: 投资建议与尽调要求
        blocks:
          - type: paragraph
            body: >
              投资建议是：若能以 $4B 或更低估值参与老股或 IPO 前融资，可有条件买入；关键条件包括：（1）取得尽调资料室权限，在审计机构参与下确认 ARR ≥ $200M；（2）核验过去十二个月 NRR
              ≥150%；（3）谈成至少 1× 非参与型优先股清算优先权。按已宣布的 $5B D 轮价格，若没有结构性保护，风险调整后回报并不吸引。最关键的五项尽调要求是：（i）FY2024 和 FY2025
              经审计或审阅的收入报表；（ii）按客户规模和垂直行业切分的队列级 NRR 数据；（iii）对 AWS Step Functions、Azure Durable Functions 和 Temporal OSS
              分叉的详细竞争赢 /
              输数据；（iv）按部门拆分的员工数和烧钱速度；（v）条款清单经济性，包括清算优先权、按比例认购权和反稀释条款。没有这些数据点，估值主要靠增长动能和投资人质量支撑；以这个价格建仓，证据并不充分。
