          - type: callout
            title: AI 智能体浪潮放大 Temporal 的核心价值主张
            body: >
              Temporal 在 AI 时代之前就为分布式系统可靠性而生，但长时间运行的自主 AI 智能体兴起后，形成了结构性顺风。Andreessen Horowitz 在 Series D
              博文中称：「对跨长时间范围运行的长期智能体来说，Temporal 提供的持久性，正是一个有吸引力的演示和一个生产系统之间的差别。」这让 Temporal 成为智能体 AI
              转型的基础设施层赋能者，而不只是开发者工具公司。
            calloutType: insight
            claimRefs:
