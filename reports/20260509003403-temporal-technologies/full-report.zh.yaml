              Temporal 的知识产权、架构愿景和客户关系高度集中在联合创始人 Samar Abbas 和 Maxim Fateev 身上。两人自 2009 年以来一直在迭代同一类问题的不同版本。近期招聘（Jim Cyb
              任 President、John Bonney 任 CFO）和董事会任命开始分散运营责任，但任一创始人离开都会给产品连续性和投资者信心带来重大风险。
            calloutType: risk
