      - number: '5.4'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: |
              Temporal 支持两种主要部署模式：自托管，由运营方管理 server、持久化和扩缩容；以及
              Temporal Cloud，提供 99.9% 可用性 SLA 的托管服务。自托管部署给客户完整的数据驻留控制，
              但需要在集群运维上投入工程资源。Temporal Cloud 移除运维负担；离开客户基础设施的数据，
              可通过 Data Converter 客户端侧加密，以及 AWS PrivateLink、Google Cloud Private Service
              Connect 等私有连接选项来缓释风险。

              与既有应用集成时，SDK Client 连接到 Temporal Frontend Service 或 Cloud endpoint，
              并暴露启动、发送 signal、查询和等待工作流执行的方法。可靠性功能包括可配置的指数退避重试策略、
              服务器重启后仍能存活的持久 Timer、通过补偿 activity 支持 Saga 模式、用于与运行中工作流同步交互的
              Workflow Update 原语（2024 年 GA）、带 circuit breaking 的跨 namespace 组合 Nexus，以及用于潜在无限历史增长工作流的
              Continue-As-New。

              2025–2026 年路线图体现出 AI-first 投入：OpenAI Agents SDK 预览版（2025 年 9 月）、
              Google ADK 集成（2026 年）、Serverless Workers（Replay 2026 宣布）和 AI Sandbox
              环境。基础设施改进包括多区域复制 GA，以及用于安全部署运行中代码的 Worker Versioning 增强。
              路线图的广度说明产品速度健康，但也带来同时横跨六个 SDK 语言生态的执行风险。
