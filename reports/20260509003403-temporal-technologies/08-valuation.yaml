  researchQuestions:
    - id: QV001
      type: quantification
      status: partial
      question: What is Temporal's confirmed ARR as of the Series D close in February 2026?
      targets:
        - contentRequirements/2
      answer: >-
        Not confirmed; company reported 380%+ YoY revenue growth (unaudited). Analyst inference from Getlatka 2023
        baseline ($26M) × 4.4× cloud growth suggests $60-80M by late 2024, extrapolating to $200-350M by early 2026. No
        audited revenue has been published.
      sourceRefs:
        - SV008
        - SV011
        - SV021
    - id: QV002
      type: quantification
      status: answered
      question: What is Temporal's Net Revenue Retention rate and how does it compare to public SaaS peers?
      targets:
        - contentRequirements/0
        - contentRequirements/1
      answer: >-
        Temporal reported 184% NRR as of Series C (March 2025) — company-claimed and corroborated by BusinessWire and
        TechCrunch. This is materially above public SaaS peers: Confluent ~125%, Datadog ~130%, MongoDB ~120%.
      sourceRefs:
        - SV029
        - SV017
        - SV013
    - id: QV003
      type: quantification
      status: answered
      question: What is the history of Temporal's disclosed valuations across all financing rounds?
      targets:
        - contentRequirements/2
      answer: >-
        Seed (2019, undisclosed); Series A (2021, ~$300M est.); Series B $103M at ~$1.5B (Feb 2022); Series B extension
        $75M at $1.5B flat (Feb 2023); Series C $146M at $1.72B near-flat (Mar 2025); Secondary $105M at $2.5B (Oct
        2025); Series D $300M at $5B (Feb 2026). Total raised approximately $650M.
      sourceRefs:
        - SV011
        - SV012
        - SV013
        - SV014
        - SV018
        - SV019
        - SV022
        - SV029
    - id: QV004
      type: quantification
      status: answered
      question: What EV/ARR multiple does the $5B Series D valuation imply at various ARR estimates?
      targets:
        - contentRequirements/2
        - contentRequirements/4
      answer: >-
        At $200M ARR: 25×. At $250M ARR: 20×. At $350M ARR: 14.3×. Public SaaS median is 3.4-6.1×; top-quartile is
        13-14×. The $5B valuation is defensible only at ARR ≥$300M with continued high growth.
      sourceRefs:
        - SV009
        - SV010
        - SV011
    - id: QV005
      type: comparison
      status: answered
      question: >-
        How does Temporal's implied valuation multiple compare to public SaaS benchmarks from Aventis Advisors and
        Windsor Drake?
      targets:
        - contentRequirements/4
      answer: >-
        Aventis Advisors (Mar 2026): median public SaaS EV/Revenue = 3.4×. Windsor Drake (Feb 2026): median EV/NTM
        Revenue = 6.1×; top-quartile = 13-14×. Temporal's implied 14-25× is above all benchmarks except under the
        highest ARR estimate.
      sourceRefs:
        - SV009
        - SV010
    - id: QV006
      type: comparison
      status: answered
      question: What are the revenue multiples for Temporal's closest public comparables — Confluent, Datadog, and MongoDB?
      targets:
