  evidenceGaps:
    - type: private-evidence-only
      topic: ARR and revenue verification — no audited financials published
      missingEvidence: >-
        Temporal has not published audited financial statements. All ARR and revenue growth figures (380%+ YoY, 4.4×
        cloud growth, estimated $200-350M ARR) are company-reported or analyst-inferred.
      whyItMatters: >-
        The $5B valuation cannot be reliably underwritten without confirmed ARR. The entire valuation multiple analysis
        rests on estimates that could be materially wrong.
      diligencePath: >-
        Request audited trailing-12-month ARR schedule with quarterly waterfall and revenue-stream breakdown in data
        room. Require Big 4 or equivalent engagement.
      severity: blocking
      relatedQuestionRefs:
        - QV001
    - type: missing-source
      topic: NRR cohort data not publicly available
      missingEvidence: >-
        No cohort-level NRR data (by customer size, vintage, vertical) is publicly available. Aggregate 184% NRR could
        reflect a small number of hyper-expanding accounts rather than broad-based expansion.
      whyItMatters: >-
        NRR concentration risk would materially change the quality and durability of the revenue base and therefore the
        supportable valuation multiple.
      diligencePath: Request cohort NRR waterfall segmented by customer cohort vintage and ARR tier in data room.
      severity: material
      relatedQuestionRefs:
        - QV027
    - type: missing-source
      topic: competitive win-loss data against hyperscalers unavailable
      missingEvidence: >-
        No structured win/loss data against AWS Step Functions, Azure Durable Functions, or Temporal OSS forks is
        publicly available. Competitive moat is described qualitatively only.
      whyItMatters: >-
        Hyperscaler competition is the primary bear-case driver; without win-rate data the competitive moat cannot be
        quantitatively assessed at the $5B valuation premium.
      diligencePath: >-
        Request sales team win/loss analysis; run customer reference calls to validate displacement of hyperscaler
        alternatives.
      severity: material
      relatedQuestionRefs:
        - QV012
    - type: conflicting-data
      topic: Prime Unicorn Index valuation mark conflicts with company-stated Series B/C figures
      missingEvidence: >-
        The Prime Unicorn Index reportedly marked Temporal at approximately $880M during 2022-2024, while the company
        publicly stated $1.5-1.72B valuations in the same period. The discrepancy has not been resolved in public
        sources.
      whyItMatters: >-
        If the index methodology is more reliable, it would imply the Series B/C prices were above fair value — a
        material adverse signal for the Series D at $5B.
      diligencePath: >-
        Obtain cap table with preference stack and prior-round term sheets to verify effective valuation vs. headline
        round price.
      severity: material
      relatedQuestionRefs:
        - QV010
    - type: private-evidence-only
      topic: adverse overpricing signals — rapid 2× valuation step-up and unaudited growth basis
      missingEvidence: >-
        The 2× step-up from $2.5B secondary (Oct 2025) to $5B Series D (Feb 2026) in four months, combined with
        unaudited revenue figures, leaves the overpricing question partially unresolved.
      whyItMatters: >-
        Without data-room confirmation, the $5B price may reflect competitive round dynamics rather than fundamental
        re-rating, creating adverse downside risk.
      diligencePath: Obtain Series D term sheet and cap table; compare with secondary pricing terms and preference stack.
      severity: material
      relatedQuestionRefs:
        - QV011
    - type: missing-source
      topic: comparable valuation table coverage is a sample not exhaustive
      missingEvidence: >-
        The comparable valuation table (TV004) covers four companies (Confluent, Datadog, MongoDB, HashiCorp); pure-play
        workflow orchestration comparables are not publicly traded. The sample may underrepresent the relevant peer set
        for Temporal's AI-workflow positioning.
      whyItMatters: >-
        A narrow comparable set could overstate or understate the appropriate multiple; additional private-market
        comparables (Temporal's direct private peers) are not publicly available.
      diligencePath: >-
        Review investment bank comparable analysis in data room; request company-supplied comps from Series D syndicate
        bankers if available.
      severity: minor
      relatedTableRefs:
        - TV004
