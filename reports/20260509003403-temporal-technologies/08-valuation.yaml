  - id: SV004
    title: Comparable Company Analysis
    body: >
      Four comparables are most instructive for Temporal's valuation: Confluent (CFLT), Datadog (DDOG), MongoDB (MDB),
      and HashiCorp (acquired by IBM for $6.4B in September 2024). Confluent, the closest public analog as a developer
      infrastructure platform monetizing a popular open-source project (Apache Kafka), generated $1.12B in subscription
      revenue in FY2025 at 21% year-over-year growth, implying a 6-8× revenue multiple at recent trading levels.
      Datadog, the observability leader with $3.0B in FY2025 revenue growing 26% year-over-year, trades at a premium to
      the SaaS median (~12-16× NTM revenue) owing to its growth rate and margin profile. MongoDB, with $2.0B in FY2026
      revenue growing 19%, trades near median SaaS multiples. HashiCorp's $6.4B IBM acquisition represents an
      infrastructure-software transaction at approximately 7-9× trailing revenue for a platform with significant
      enterprise penetration. Temporal's higher NRR (184% vs. typical 120-140% for these peers), faster growth rate, and
      AI-workflow tailwind justify a premium to Confluent-like multiples but imply a significant re-rating risk if
      growth decelerates. The 14-25× implied EV/ARR range is appropriate for Temporal's growth profile but leaves
      limited downside cushion at the $5B entry point.
    claimRefs:
