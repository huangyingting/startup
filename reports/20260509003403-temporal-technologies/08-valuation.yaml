  - id: SV008
    title: Investment Recommendation and Diligence Asks
    body: >
      The investment recommendation is CONDITIONAL BUY on secondary or pre-IPO participation at or below $4B, with key
      conditions: (1) data-room access to confirm ARR ≥ $200M with auditor engagement, (2) NRR verification at ≥150%
      trailing twelve months, (3) negotiated liquidation preference of at least 1× non-participating preferred. At the
      announced $5B Series D price, the risk-adjusted return profile is unattractive without structural protections. The
      five most critical diligence asks are: (i) audited or reviewed revenue statements for FY2024 and FY2025; (ii)
      cohort-level NRR data segmented by customer size and vertical; (iii) detailed competitive win/loss data against
      AWS Step Functions, Azure Durable Functions, and Temporal OSS forks; (iv) headcount and burn rate breakdown by
      department; and (v) term sheet economics including liquidation preferences, pro-rata rights, and anti-dilution
      provisions. Without these data points, the valuation rests primarily on growth momentum and syndicate quality,
      which is insufficient for a position at this price.
    claimRefs:
