        - Company; data room; require Big 4 or equivalent independent auditor
      - - Cohort NRR Detail
        - NRR broken down by customer cohort (by size, vintage, and vertical)
        - 184% aggregate NRR may be driven by a small number of enterprise expansions; cohort data reveals concentration
        - Company; data room; request alongside ARR schedule
      - - Competitive Win/Loss
        - Structured win/loss data against AWS Step Functions, Azure Durable, and Temporal forks
        - Hyperscaler threat is the primary bear-case driver; win rate data is the key mitigant
        - Company; sales team analysis; customer reference calls as supplementary check
      - - Burn and Runway
        - Monthly burn rate, gross margin by revenue stream, and runway at current pace
        - At $650M raised, burn discipline and path to profitability determine whether further dilution is required
        - Company; data room; CFO (John Bonney) confirmed as financial lead
      - - Round Economics
        - 'Series D term sheet: liquidation preference, participation, anti-dilution, pro-rata rights'
        - At a $5B headline, preferred structuring may significantly alter effective entry price and downside protection
        - Legal counsel; cap table and term sheet in data room
      - - ARR by Customer Segment
        - Enterprise vs. mid-market vs. SMB ARR contribution and growth rates
        - Temporal's TAM and NRR durability depend on enterprise penetration; segment data reveals growth engine
        - Company; data room; sales operations team
    notes: >-
      These six data points represent the minimum required to underwrite at the $5B Series D price. Absent data-room
      access, the recommendation remains CONDITIONAL HOLD at the current $5B valuation level.
