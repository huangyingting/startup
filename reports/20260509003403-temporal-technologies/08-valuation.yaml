company:
  name: Temporal Technologies
chapter:
  number: 8
  title: Valuation
  summary: >
    Temporal Technologies closed a $300M Series D at a $5B pre-money valuation in February 2026, led by Andreessen
    Horowitz with participation from Lightspeed Venture Partners, Sapphire Ventures, Sequoia, Index Ventures, Tiger
    Global, GIC, Madrona Venture Group, and Amplify Partners. The round brought total disclosed funding to approximately
    $650M and follows a trajectory that includes a near-flat $1.72B Series C in March 2025 and a $2.5B secondary led by
    GIC in October 2025 — a 2× step-up to $5B in approximately four months. Company-reported metrics at Series D include
    380%+ year-over-year revenue growth (unaudited) and 184% Net Revenue Retention as of Series C. Estimated ARR at
    Series D is $200-350M (inferred from a $26M 2023 baseline × 4.4× cloud growth × post-Series-C trajectory). The
    implied EV/ARR multiple of 14-25× sits above the median public SaaS multiple (3.4-6.1× per Aventis Advisors and
    Windsor Drake) but within the top-quartile range for high-growth, high-NRR platforms. Comparable companies —
    Confluent, Datadog, MongoDB, and HashiCorp (IBM acquisition) — trade or were acquired at 6-15× revenue, anchoring
    the reasonable valuation range. The investor syndicate quality (a16z thesis, sovereign wealth participation,
    Lightspeed and Sapphire confirmation) provides strong institutional signal. Key risks include no audited revenue, a
    flat Series C, premium entry multiple, and hyperscaler competitive expansion. The base case recommends selective
    participation in a potential secondary or pre-IPO financing at or below $5B, contingent on ARR and NRR verification
    in a data room.
sections:
  - id: SV001
    title: Valuation History and Funding Trajectory
    body: >
      Temporal Technologies has completed seven disclosed financing events since 2019, with aggregate capital of
      approximately $650M and a valuation trajectory from sub-$500M seed-stage to $5B at Series D in February 2026. The
      Series A (2021) and Series B ($103M at ~$1.5B, Feb 2022) established the company's unicorn status during a
      favorable market. A $75M Series B extension in February 2023 at a flat $1.5B valuation signaled market contraction
      pressure. The Series C ($146M at $1.72B, March 2025) — described by TechCrunch as "very little bit" above flat
      relative to prior secondary — suggests the company navigated a period of compressed multiples. A $105M secondary
      led by GIC at $2.5B in October 2025 revalued the company 46% above the Series C. The Series D at $5.0B in February
      2026 represents a 2× step-up from the secondary in approximately four months, consistent with a late-stage company
      accelerating into an AI-workflow demand inflection. The valuation history reflects both the challenges of
      sustaining premium multiples through a downturn and the potential for rapid re-rating when growth metrics
      reaccelerate.
    claimRefs:
      - CV001
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
      - CV036
  - id: SV002
    title: Revenue and Growth Metrics
    body: >
      Temporal's financial profile relies on company-reported and analyst-inferred metrics, as no audited financials
      have been published. The company reported 380%+ year-over-year revenue growth at the time of the Series D
      (unaudited, Feb 2026) and 4.4× cloud revenue growth in the 18 months to March 2025. Net Revenue Retention of 184%
      as of early 2025 is high by any public SaaS benchmark and suggests strong expansion from existing customers.
      Getlatka estimated 2023 ARR at approximately $26M. Applying the 4.4× 18-month growth factor implies ~$114M ARR by
      approximately Q3 2025, and extrapolating through the Series D announcement at 380%+ growth suggests a plausible
      $200-350M ARR range by early 2026. These are analyst inferences and must be verified against data-room materials;
      the company has not published audited revenue. The combination of high NRR, accelerating growth, and 2,500+ cloud
      customers provides a supportive but unaudited financial picture. Any underwriting should place material weight on
      securing an audited revenue schedule before committing to a valuation at or above $5B.
    claimRefs:
      - CV002
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV039
  - id: SV003
    title: Investor Composition and Institutional Signaling
    body: >
      The Series D investor syndicate is unusually broad and high-quality for a late-stage private round. Andreessen
      Horowitz led with an investment thesis positioning Temporal as "the code execution layer for critical workflows,"
      citing OpenAI's deployment of Temporal for ChatGPT Images as validation of the AI-workflow thesis. Lightspeed
      Venture Partners and Sapphire Ventures both confirmed participation via their company portfolio pages. Sovereign
      wealth fund GIC participated in both the October 2025 secondary ($2.5B) and the Series D ($5B), providing
      cross-round institutional continuity. Returning investors include Sequoia, Index Ventures, Tiger Global, Madrona,
      and Amplify Partners. The board addition of Jonathan Chadwick — a VMware veteran who also serves on the boards of
      Confluent, Databricks, Notion, ServiceNow, and Zoom — brings enterprise GTM experience directly relevant to
      Temporal's expansion. Crunchbase data (behind a paywall) reports total funding of approximately $626M
      pre-Series-D, consistent with public disclosures. The breadth and quality of the syndicate reduces adverse
      selection risk relative to a narrow or insider-led round.
    claimRefs:
      - CV001
