      question: How is Temporal's consumption-based pricing model expected to affect ARR growth and NRR?
      targets:
        - contentRequirements/0
        - contentRequirements/2
      answer: >-
        Temporal Cloud bills on Actions executed and Active/Retained Storage. Consumption-based models with high NRR
        (184%) indicate that customer usage is expanding significantly beyond initial contracted volumes — a hallmark of
        land-and-expand SaaS. This model aligns pricing with value delivery and supports NRR above 100% as long as usage
        expands, making the NRR figure more credible as a structural product attribute rather than a sales artifact.
      sourceRefs:
        - SV011
        - SV029
