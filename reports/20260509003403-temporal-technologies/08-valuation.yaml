  - id: TV002
    title: Thesis / Anti-Thesis Table
    columns:
      - Argument
      - Evidence
      - What Would Change This View
    rows:
      - - BULL — Temporal is the durable execution layer for AI and enterprise workflows
        - 184% NRR, 380%+ growth, OpenAI / ChatGPT Images deployment, a16z thesis, 2,500+ cloud customers
        - NRR falls below 140%; a hyperscaler launches a fully managed Temporal-equivalent; AI adoption plateaus
      - - BULL — AI-native workloads are a structurally new demand driver
        - 1.86T actions by AI-native companies (of 9.1T total); a16z AI-workflow investment thesis
        - LLM orchestration frameworks (LangChain, LangGraph) bypass Temporal and capture AI-workflow spend
      - - BULL — Premium syndicate de-risks adverse selection
        - a16z lead; GIC sovereign wealth cross-round; Lightspeed, Sapphire, Sequoia participation
        - Round structure reveals inside-led or concentrated; new investors had limited diligence time
      - - BEAR — No audited revenue; entry multiple stretches credulity at $5B
        - No public financials; Getlatka 2023 ARR $26M extrapolated to $200-350M is multi-step inference
        - Audited revenue confirms ≥$250M ARR at >300% growth — bull thesis strengthens
      - - BEAR — Series C was flat; $5B is a very fast re-rating
        - 'TechCrunch: Series C ''very little bit'' above flat; 2× step-up in 4 months from secondary'
        - Series D terms include meaningful liquidation preference stacking that justifies headline valuation
      - - BEAR — Hyperscaler incumbency risk is acute at enterprise scale
        - AWS Step Functions, Azure Durable Functions are free bundled alternatives; GCP Workflows expanding
        - Temporal demonstrates material win rates over hyperscalers in enterprise accounts
    notes: >-
