  - id: SV007
    title: Risk-Adjusted Valuation Considerations
    body: >
      Several risks directly affect the reliability of the valuation. First, there are no audited financial statements;
      the 380%+ growth and 184% NRR are company-reported. Second, the Series C at $1.72B was described by TechCrunch as
      a near-flat round, indicating a period during which the market did not support significant valuation step-ups; the
      2× jump from the October 2025 secondary to the February 2026 Series D in four months raises questions about
      whether the $5B price was set by aggressive lead-investor competition rather than fundamental re-rating. Third,
      the Prime Unicorn Index reportedly carried Temporal at approximately $880M during the 2022-2024 period,
      conflicting with the company's stated $1.5-1.72B valuations during the same period. Fourth, at 375 employees,
      Temporal's revenue-per-employee (estimated $530K-$930K at bear/bull ARR) is consistent with SaaS benchmarks but
      provides no margin of comfort if revenue is below the low end of estimates. Mitigating factors include the breadth
      of the Series D syndicate, the sovereign wealth participation (GIC cross-round), and the platform stickiness
      implied by 184% NRR.
    claimRefs:
      - CV002
      - CV003
      - CV008
      - CV013
