  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - ARR significantly below estimate
        - Audited ARR < $150M at Series D
        - EV/ARR rises to 33×+; multiples are unjustifiable for any growth rate
        - Exit or significantly reduce position; do not underwrite at $5B
      - - NRR collapses
        - NRR below 120% in trailing twelve months
        - Expansion engine broken; revenue growth dependent on net-new logos only
        - Re-evaluate entire bull thesis; NRR collapse implies competitive or product failure
      - - Hyperscaler product launch
        - AWS, Azure, or GCP launches fully managed Temporal-equivalent workflow engine with native integration
        - Temporal's enterprise value proposition eroded; OSS fork risk amplified
        - Reduce exposure; monitor enterprise win-rate data; assess moat durability
      - - Leadership departure
        - CEO (Samar Abbas) or CTO (Maxim Fateev) unexpectedly departs
        - Key-person risk materialized; institutional knowledge and AI-vision continuity at risk
        - Hold pending board response; require replacement plan before new investment
      - - IPO or acquisition delayed beyond 7 years from Series D
        - No liquidity event by 2033
        - Capital locked in illiquid position; opportunity cost accrues
        - Evaluate secondary sale; assess fundamental operating performance before holding further
    notes: >-
      These triggers should be monitored quarterly by the portfolio team. The hyperscaler and NRR triggers are the most
      likely to materialize within a three-year horizon based on current competitive dynamics.
