        - contentRequirements/1
      answer: >-
        Three adverse signals: (1) Series C was near-flat ($1.72B vs. $2.5B secondary implies a prior secondary was
        above market); (2) 2× step-up from $2.5B secondary to $5B Series D in four months may reflect competitive round
        dynamics more than fundamental re-rating; (3) no audited revenue, and Getlatka 2023 baseline of $26M requires
        8-13× growth to reach $200-350M, which is possible but unconfirmed. Prime Unicorn Index carried valuation at
        ~$880M in 2022-2024.
      sourceRefs:
