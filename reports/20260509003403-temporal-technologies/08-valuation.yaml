      answer: >-
        Confluent: $1.12B FY2025 subscription revenue at ~6-8× trailing multiple. Datadog: $3.0B FY2025 revenue at
        12-16× NTM multiple. MongoDB: $2.0B FY2026 revenue at 8-12× NTM multiple. All are below Temporal's implied
        14-25×, though all have slower growth rates than Temporal's reported 380%+.
      sourceRefs:
        - SV003
        - SV004
        - SV005
