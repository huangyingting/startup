        - SV019
        - SV020
        - SV021
    - id: QV012
      type: adverse
      status: partial
      question: What competitive threats could structurally impair Temporal's growth trajectory and valuation?
      targets:
        - contentRequirements/0
        - contentRequirements/5
      answer: >-
        Primary threats: AWS Step Functions (native integration, bundled pricing), Azure Durable Functions (same), GCP
        Workflows. Secondary threats: open-source Temporal forks (MIT license allows proprietary forks), LLM
        orchestration frameworks (LangChain, LangGraph) routing AI-workflow spend away from Temporal. None of these
        threats have materially impacted Temporal's growth to date, but at $5B, the market is pricing in sustained
        dominance, which requires active competitive monitoring.
      sourceRefs:
        - SV013
        - SV027
