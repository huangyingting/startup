      answer: >-
        The Prime Unicorn Index reportedly marked Temporal at approximately $880M during the 2022-2024 period — below
        the company's stated $1.5-1.72B valuations during the same period. This discrepancy is unresolved; it may
        reflect the index's use of lagged public-market comp adjustments vs. negotiated private-round prices.
