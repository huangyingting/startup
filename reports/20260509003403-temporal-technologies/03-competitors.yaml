  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "Restate and Inngest funding rounds post-seed"
      missingEvidence: "No public announcement of Restate or Inngest follow-on funding rounds as of May 2026; seed-stage financials only."
      whyItMatters: "A significant follow-on round for Restate or Inngest would signal intensifying competitive pressure in the durable execution segment and require reassessment of the competitive moat rating."
      diligencePath: "Monitor Crunchbase, TechCrunch, and company blogs for funding announcements; ask Temporal's competitive intelligence team for known deal conversations with Restate or Inngest."
      relatedQuestionRefs: [QP020]

    - type: stale
      severity: minor
      topic: "Competitor GitHub star trajectory for Restate and Inngest"
      missingEvidence: "12-month GitHub star growth rate for Restate and Inngest is not available from a single primary source; point-in-time counts only."
      whyItMatters: "Star growth velocity is a leading indicator of community momentum; a fast-accelerating Restate community would increase competitive risk in the OSS developer segment."
      diligencePath: "Use Star History (star-history.com) or GitHub archive data to track monthly star additions for temporalio/temporal, restatedev/restate, and inngest/inngest over 12 months."
      relatedQuestionRefs: [QP022]

    - type: missing-source
      severity: material
      topic: "Orkes enterprise customer wins and ARR"
      missingEvidence: "Orkes does not publicly disclose customer count, ARR, or named enterprise reference customers; competitive intelligence on Orkes's traction is limited to product documentation and press releases."
      whyItMatters: "If Orkes is winning meaningful enterprise accounts away from Temporal Cloud, it represents a higher-severity competitive threat than current evidence supports. Current evidence is insufficient to rate this risk above medium."
      diligencePath: "Request competitive deal intelligence from Temporal's sales team; search LinkedIn for engineers who moved from Temporal-using companies to Orkes-using companies; review Orkes's case study pages."
      relatedQuestionRefs: [QP019]

    - type: missing-source
      severity: minor
      topic: "Independent TCO analysis: Temporal Cloud vs. AWS Step Functions"
      missingEvidence: "No independent, peer-reviewed total cost of ownership analysis comparing Temporal Cloud and AWS Step Functions for equivalent enterprise workloads is publicly available."
      whyItMatters: "Without a TCO benchmark, Temporal's sales narrative on cost competitiveness versus free-tier AWS bundling is unsupported by independent evidence."
      diligencePath: "Commission a Forrester or IDC TEI study, or review analyst notes from prior Temporal diligence processes under NDA."
      relatedQuestionRefs: [QP016]
