callouts:
  - type: strength
    title: "Polyglot SDK Breadth Creates Durable Switching Costs"
    body: >
      Temporal's 6-language SDK support (Go, Java, Python, TypeScript, .NET, PHP) is unmatched among
      direct durable execution competitors. Migrating a multi-language enterprise codebase from Temporal
      requires rewriting workflow logic in a competitor's supported language set — a non-trivial
      engineering effort that deepens lock-in at each additional language deployed. Azure Durable
      Functions offers the closest parity at 5 languages but is Azure-runtime-bound.
    claimRefs: [CP011, CP016]

  - type: strength
    title: "Community Flywheel at 183K+ Weekly Developers"
    body: >
      The open-source community scale (183K+ weekly active developers) creates a virtuous cycle of
      third-party tooling, community support, and talent availability that reinforces Temporal Cloud
      adoption. No durable execution startup (Restate, Inngest) or even Azure Durable Functions
      approaches this community density in the segment. The OpenAI Agents SDK integration extends
      this flywheel into the AI-native developer community.
    claimRefs: [CP025, CP029]

  - type: risk
    title: "MIT License Enables Cloud Vendor Fork Risk"
    body: >
      Temporal's server is MIT-licensed, permitting any cloud vendor to fork, modify, and operate a
      managed Temporal-compatible service without royalty obligations. This is not a theoretical risk:
      third-party managed Temporal services already exist. If AWS or Azure committed to a first-party
      hosted Temporal fork, it would materially compress Temporal Cloud's addressable market among
      hyperscaler-committed customers.
    claimRefs: [CP030, CP032]

  - type: risk
    title: "Series C Flat Valuation Signals Prior Growth Deceleration"
    body: >
      TechCrunch reporting indicates Temporal's 2025 Series C was executed at a flat-to-modest
      premium on the extended Series B valuation, reflecting a deceleration from peak 20x revenue
      multiples. While the 2026 Series D ($300M) appears to signal renewed investor confidence,
      the flat-C round raises questions about the durability of growth rates and whether the
      AI-native tailwind is a genuine inflection or a temporary boost.
    claimRefs: [CP031]

  - type: insight
    title: "Orkes Is the Highest-Signal Competitive Intelligence Target"
    body: >
      Orkes was founded by the engineers who built Conductor at Netflix — the same codebase that
      inspired Temporal's founding team. It competes directly with Temporal Cloud for enterprise
      managed service contracts, has institutional knowledge of Temporal's architectural decisions,
      and can credibly claim parity on workflow execution fundamentals. Tracking Orkes's enterprise
      wins, pricing changes, and SDK roadmap is the highest-ROI competitive intelligence task
      for Temporal's sales and product teams.
    claimRefs: [CP005, CP033, CP037]

  - type: recommendation
    title: "Commission Independent TCO Analysis vs. AWS Step Functions"
    body: >
      The most common competitive displacement scenario is a new AWS-native project choosing between
      Step Functions (zero marginal cost, bundled) and Temporal Cloud (separate contract). An
      independent total-cost-of-ownership model comparing developer hours, debugging cost, migration
      cost, and operational overhead across the two platforms would provide Temporal's sales team with
      a defensible commercial narrative. Currently this analysis is absent from public materials.
    claimRefs: [CP018, CP019, CP032]

