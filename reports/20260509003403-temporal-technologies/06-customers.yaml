  - id: S-verdict
    title: Customer Verdict and Diligence Gaps
    body: |
      On balance, Temporal Technologies presents one of the most compelling customer quality
      stories in enterprise developer infrastructure. The combination of 2,500+ paying cloud
      customers, 184% NDR, 4.4x revenue growth in 18 months, production deployments at
      household-name enterprises across multiple verticals, and a Forrester-documented 201%
      ROI constitutes a strong evidence base for product-market fit in mission-critical
      workflow orchestration. The OSS-to-Cloud conversion flywheel of 183,000+ weekly active
      developers feeding a 2,500+-strong paying customer base is a structurally advantaged
      GTM model that limits upfront customer acquisition cost while generating large organic
      pipeline.

      The named-customer proof set is exceptionally strong. Netflix, Snap, Stripe, Coinbase,
      and Replit are each category-defining companies in their respective verticals, and their
      production deployments span use cases from deployment automation to AI agent orchestration
      to financial transaction management. The Netflix proof point is unusual in its specificity:
      a quantified five-orders-of-magnitude reliability improvement published independently
      by Netflix engineers is a material diligence positive rarely achieved by companies at
      Temporal's stage.

      Material diligence gaps remain. First, all customer-count and NDR figures are
      company-claimed and have not been independently audited; validators should request
      cohort-level ARR data and CFO attestation. Second, GRR is not disclosed, making it
      impossible to assess logo churn in the self-serve tail. Third, the customer base
      appears geographically concentrated in North America and among technology-sector buyers;
      international expansion and vertical diversification timelines are unclear. Fourth,
      customer concentration data is unavailable: without knowing whether the top 10 customers
      represent 20% or 60% of ARR, concentration risk cannot be properly quantified. Fifth,
      the Forrester TEI study was commissioned by Temporal, limiting its independence as
      verification. Sixth, the growth rate deceleration from approximately 20x to 4.4x
      noted by TechCrunch deserves scrutiny regarding enterprise pipeline health and quota
      attainment trends. Prospective investors should request references from at least five
      enterprise customers and demand audited ARR with cohort-level retention data before
      closing.
