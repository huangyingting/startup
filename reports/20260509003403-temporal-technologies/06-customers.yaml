  - id: S-proof
    title: Named Customer Proof
    body: |
      Temporal has secured production deployments at a large number of publicly referenceable
      enterprise customers across multiple verticals, providing meaningful proof-point diversity.
      The quality and seniority of the reference logos is exceptional for a company of this
      size and stage, reflecting a developer-led bottoms-up GTM strategy that converts
      influential engineering organizations first.

      Netflix is the most thoroughly documented case study. Netflix engineering published a
      technical blog post describing how Temporal reduced deployment failure rates from 4% to
      0.0001% across its deployment automation system, a five-orders-of-magnitude improvement
      that is specific, quantified, and independently published by Netflix engineers rather
      than by Temporal marketing. Netflix manages thousands of daily deployments across its
      global microservices fleet, meaning Temporal operates in one of the highest-volume and
      highest-criticality production environments in the world.

      Snap is cited as running Temporal in the critical application stack serving 414 million
      daily active users, a real-time constraint demanding sub-second latency and extraordinary
      availability. The combination of Netflix and Snap as early adopters significantly de-risked
      Temporal's platform reliability story for subsequent enterprise buyers and established
      Temporal as the preferred choice for high-volume, latency-sensitive production workloads.

      Replit represents the AI-native segment proof point. Replit Agent uses Temporal for
      multi-step AI agent workflow orchestration, confirming production deployment in the
      emerging agentic AI workload category. Coinbase demonstrates Temporal's suitability for
      financial-grade transaction orchestration via the SAGA pattern for distributed
      cryptocurrency transactions where exactly-once semantics are non-negotiable. Alaska
      Airlines provides a traditional enterprise proof point for infrastructure workflow
      automation. HashiCorp, Datadog, Box, Stripe, Instacart, Brex, Outreach, Upstart, Xero,
      Sinch, and Nvidia round out the reference set across developer tools, SaaS, fintech, and
      enterprise verticals. A key limitation is that publicly documented cases are predominantly
      technology-sector companies; healthcare, manufacturing, retail outside e-commerce, and
      government verticals are not prominently represented in public case study material.
