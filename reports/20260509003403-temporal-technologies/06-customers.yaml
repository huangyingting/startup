  - id: S-retention
    title: Retention, Expansion, and NRR
    body: |
      Temporal's 184% Net Dollar Retention as of March 2025 is the single most important
      customer-quality signal in the public record. An NDR of 184% means the cohort of
      customers from twelve months prior is now paying 84% more, net of any churn or
      contraction. For context, top-quartile SaaS companies typically achieve NDR above 120%;
      elite infrastructure and developer-tooling companies like Snowflake at its peak and
      HashiCorp in its best years reached 130 to 150%. An NDR of 184% would place Temporal
      in a rarified tier alongside only a handful of infrastructure software companies globally,
      if independently verified.

      The economic mechanism driving this exceptional NDR is likely twofold. First, Temporal
      Cloud's consumption-based pricing tied to workflow actions and compute creates a natural
      expansion path as customers increase workflow complexity, add use cases, or grow their
      user base. A customer starting with a single payment workflow will naturally expand to
      order management, fraud detection, and customer-lifecycle automation as confidence in
      the platform grows. Second, Temporal's architectural stickiness means that once
      production workflows are deployed using deterministic replay, migrating them to a
      competitor requires a full rewrite of workflow logic, creating high switching costs
      that reduce involuntary churn. The Forrester TEI study supports this: the composite
      enterprise customer achieved 201% ROI over three years with a 14-month payback,
      suggesting the economics of continued expansion strongly favor retention.

      Gross Revenue Retention is not publicly disclosed, making it impossible to distinguish
      expansion-driven NDR from logo churn offset. Customer concentration is also undisclosed:
      with 2,500+ customers but no revenue breakdown by tier or top-customer share, it is
      plausible that a small number of enterprise accounts such as Snap, Netflix, and Stripe
      contribute a disproportionate share of ARR. The Forrester-documented $14.3M in avoided
      outage revenue, 50% faster feature delivery, and $1M developer productivity gains are
      compelling diligence inputs but were generated via a commissioned study, limiting
      independent verification. G2 reviews reflect strong satisfaction with specific praise
      for reliability guarantees and constructive criticism of the steep learning curve.
