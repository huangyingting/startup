summary:
  headline: >
    Temporal has achieved rare developer infrastructure category leadership with 183,000+ weekly active OSS users and
    2,500+ cloud customers, a 184% NRR confirming durable enterprise expansion, and 380% YoY revenue growth in early
    2026. The company is well-positioned to benefit from the AI agent orchestration wave through Nexus. The primary
    investment question is whether the OSS-to-cloud conversion flywheel can sustain growth as the platform matures and
    hyperscalers develop competing native orchestration services.
  overallScore: 8.1
  recommendation: buy
  confidence: medium
  riskRating: medium
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 2500
    arrUsdM: 125
    revenueGrowthYoYPct: 380
    nrrPct: 184
    totalRaisedUsdM: 650
    customerCount: 2500
    headcount: 350
  topStrengths:
    - 184% NRR confirms a durable, expanding revenue base across high-quality enterprise logos.
    - Open-source flywheel with 183,000+ weekly active developers creates a low-CAC enterprise funnel.
    - >-
      Category leadership in durable execution with moat from SDK-level workflow integration — switching costs are very
      high once Temporal is embedded in production systems.
    - 380% YoY revenue growth in February 2026 signals re-acceleration ahead of anticipated Series D.
    - >-
      AI agent orchestration (Nexus) positions Temporal at the centre of the emerging agentic-AI stack, extending TAM
      beyond traditional workflow orchestration.
    - >-
      Founding team created Cadence at Uber — the direct predecessor technology — giving Temporal unmatched domain
      credibility.
  topRisks:
    - >-
      Consumption-based pricing creates revenue volatility tied to customer workload volumes; macro-driven workload
      reductions could compress ARR unpredictably.
    - >-
      Amazon Step Functions, Netflix Conductor (OSS), Restate, and Windmill are credible alternatives that reduce
      switching cost in greenfield deployments.
    - >-
      Azure, AWS, and GCP could bundle workflow orchestration into managed cloud-native services, compressing Temporal's
      pricing power at the enterprise tier.
    - No disclosed path to profitability; burn rate relative to ~$125M estimated ARR and $464M raised is unknown.
    - >-
      Key-person dependency on Fateev and Abbas — both from the Cadence/Uber lineage — creates concentration risk if
      either departs.
  unresolvedGaps:
    - Gross revenue retention and logo churn rates not publicly disclosed; 184% NRR masks base retention dynamics.
    - >-
      Revenue concentration across top customers unknown; a small number of hyperscale logos could represent
      disproportionate ARR.
    - No public breakdown of AI/Nexus ARR vs. traditional workflow orchestration ARR.
    - Burn rate, cash position, and runway since Series C not disclosed.
    - OSS-to-Cloud conversion rate by cohort not available; funnel efficiency is inferred but not verified.
