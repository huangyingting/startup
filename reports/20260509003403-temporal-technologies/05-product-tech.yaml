  title: Product & Technology
  summary: |
    Temporal Technologies delivers a durable execution platform enabling developers to write
    fault-tolerant, stateful distributed business logic as ordinary code without implementing
    retry mechanisms, state machines, or distributed coordination primitives by hand. The server
    uses event-sourced, deterministic replay semantics — every state transition recorded as an
    immutable history event — guaranteeing workflow completion across failures. The platform ships
    six official SDKs (Go, Java, Python, TypeScript, .NET, PHP), four independently scalable
    server services (Frontend, Matching, History, Worker Service), and integrations including
    Temporal Nexus (GA January 2026), OpenAI Agents SDK (preview September 2025), and Google ADK
    (2026). Temporal Cloud provides SOC 2 Type II, HIPAA BAA, GDPR compliance, mTLS, AES-256
    encryption, SAML/SCIM federation, and an observed p99 StartWorkflow latency of 69ms in
    January 2026. Primary risks include the determinism learning curve, OSS default
    no-authentication posture, and limited pricing transparency at Enterprise and Mission
    Critical tiers.
sections:
  - id: S-product-definition
    title: Product Definition and Customer Workflow Value
    body: |
      Temporal is a durable execution platform that enables developers to write fault-tolerant,
      stateful business logic as ordinary code without implementing retry mechanisms, state
      machines, or distributed coordination primitives by hand. The platform's core abstraction
      is the Workflow function, which executes as sequential procedural code in the developer's
      chosen language, while the Temporal runtime automatically persists execution state at every
      await point and guarantees completion even after process crashes, network partitions, or
      server reboots. This eliminates entire categories of distributed systems complexity that
      traditionally consume significant engineering time in production applications.

      Typical use cases span e-commerce order fulfillment (multi-step saga with payment,
      inventory, and shipping coordination), fintech payment processing (idempotent multi-leg
      transactions with automatic compensation), user onboarding flows (parallel API calls with
      timeout handling), AI agent loops (long-running multi-turn LLM orchestration with durable
      state), data pipeline orchestration (DAG-style batch processing with retry and backfill),
      and DevOps provisioning workflows. Zero-compute cost for dormant workflows means a workflow
      sleeping for 30 days incurs no CPU cost, making Temporal suitable for long-horizon
      business processes such as subscription lifecycle management and multi-stage approval flows.

      Production deployments at Netflix, Stripe, Coinbase, DoorDash, and HashiCorp validate
      the platform's reliability at scale under strict latency, availability, and correctness
      requirements. The platform's event-sourced design and deterministic replay guarantee
      exactly-once execution semantics for workflow code without requiring distributed
      transactions or external idempotency infrastructure.
    claimRefs:
      - CE001
      - CE002
