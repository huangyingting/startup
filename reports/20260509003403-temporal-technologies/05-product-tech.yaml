  - id: S-product-modules
    title: Product Modules, SDKs, and Asset Map
    body: |
      The Temporal product portfolio spans the open-source Temporal Server, the managed Temporal
      Cloud service, and a growing SDK and integration ecosystem. The OSS Server is released under
      the MIT license, allowing unrestricted commercial use and self-hosting, but ships without
      authentication or authorization by default, placing security responsibility on the operator.

      Temporal Cloud packages the server as a multi-tenant managed service organized around
      Namespaces, billed on an Actions-based consumption model. Four pricing tiers exist:
      Essentials ($100/month, 1 million Actions), Business ($500/month, 2.5 million Actions,
      SAML SSO), Enterprise (10 million Actions, annual contract, SCIM), and Mission Critical
      (custom SLA, dedicated infrastructure). Six official SDKs ship with feature parity targets:
      Go (highest feature completeness), Java (Spring Boot integration), Python (asyncio-native),
      TypeScript (npm, Node.js), .NET (C#, GA), and PHP (community-supported).

      Temporal Nexus reached general availability in January 2026 for cross-namespace and
      cross-tenant workflow composition. The OpenAI Agents SDK integration launched in preview
      September 2025, making Temporal the durable execution layer for OpenAI-powered agentic
      pipelines. Google ADK integration was announced in 2026. Serverless Workers, announced at
      Replay 2026, will eliminate worker infrastructure management for customers. Each module
      represents a distinct product surface with an independent release cadence, creating an
      expanding total addressable market as Temporal grows from pure workflow orchestration into
      AI infrastructure serving both traditional enterprise and AI-native customers.
