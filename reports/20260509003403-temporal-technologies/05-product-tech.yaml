  - id: S-deployment
    title: Deployment, Integration, Reliability, and Roadmap
    body: |
      Temporal supports two primary deployment models: self-hosted where the operator manages
      server, persistence, and scaling, and Temporal Cloud which is a managed service with 99.9%
      availability SLA. Self-hosted deployments provide full data residency control but require
      engineering investment in cluster operations. Temporal Cloud removes operational burden;
      data leaving customer infrastructure is mitigated by Data Converter client-side encryption
      and private connectivity options including AWS PrivateLink and Google Cloud Private Service
      Connect.

      Integration with existing applications occurs through the SDK Client, which connects to
      a Temporal Frontend Service or Cloud endpoint and exposes methods for starting, signaling,
      querying, and awaiting workflow executions. The reliability feature set includes configurable
      exponential backoff retry policies, durable Timers surviving server restarts, Saga pattern
      support via compensating activities, the Workflow Update primitive (GA 2024) for synchronous
      interaction with running workflows, Nexus for cross-namespace composition with circuit
      breaking, and Continue-As-New for workflows with potentially unbounded history growth.

      The 2025-2026 roadmap reflects AI-first investment: OpenAI Agents SDK preview (September
      2025), Google ADK integration (2026), Serverless Workers (announced Replay 2026), and an
      AI Sandbox environment. Infrastructure improvements include multi-region replication GA and
      Worker Versioning enhancements for safe in-flight code deployments. The roadmap breadth
      signals healthy product velocity but creates execution risk across six SDK language
      ecosystems simultaneously.
