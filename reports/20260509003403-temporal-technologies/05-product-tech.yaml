  claims:
    - id: CE001
      statement: >-
        Temporal is a durable execution platform that enables developers to write fault-tolerant distributed business
        logic as ordinary code, with the runtime guaranteeing execution to completion even after infrastructure
        failures, network partitions, or process crashes.
      type: company-claimed
      topic: product-definition
      sourceRefs:
        - SE001
        - SE002
      confidence: high
      freshness: current
    - id: CE002
      statement: >-
        Temporal workflows are defined as ordinary procedural functions in the developer's chosen language, with
        execution state automatically persisted at every await point to enable seamless resumption after failure without
        manual retry logic.
      type: company-claimed
      topic: product-definition
      sourceRefs:
        - SE001
        - SE012
      confidence: high
      freshness: current
