  - id: S-trust
    title: Trust, Security, Privacy, and Compliance
    body: |
      Temporal Technologies holds SOC 2 Type II certification for Temporal Cloud covering
      security, availability, and confidentiality trust service criteria. HIPAA Business Associate
      Agreements are available for healthcare customers. GDPR compliance and Data Processing
      Agreements are available for EU data handling. These certifications apply to Temporal Cloud;
      self-hosted deployments remain the operator's security responsibility.

      At the transport layer, all worker-to-server communication uses mTLS for mutual
      authentication and encryption in transit. Temporal Cloud encrypts stored workflow history
      with AES-256 at rest. The Data Converter interface provides client-side payload encryption
      before data reaches the server, ensuring sensitive data including PII, financial records,
      and medical information is never stored in plaintext. A Codec Server pattern enables
      authorized debugging without exposing encryption keys. Namespace isolation at the
      persistence layer prevents cross-tenant data access.

      Identity federation is available via SAML on the Business tier and above, and SCIM on the
      Enterprise tier, with RBAC for fine-grained permission management. Private connectivity
      options route traffic without public internet exposure. Temporal Technologies operates as a
      CVE Numbering Authority (CNA), indicating security program maturity. A key risk is that the
      open-source Temporal Server ships with no default authentication or authorization, meaning
      self-hosted deployments without network controls are exposed to unauthorized access, a
      recurring developer community concern. Pen testing cadence and specific CVE history are
      not publicly disclosed.
