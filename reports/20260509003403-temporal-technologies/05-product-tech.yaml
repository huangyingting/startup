  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Enterprise and Mission Critical pricing
      missingEvidence: >-
        Exact pricing for Enterprise and Mission Critical tiers is not publicly disclosed and requires direct sales
        engagement.
      whyItMatters: >-
        Without published pricing, total cost of ownership models for large customers cannot be validated, limiting
        financial diligence.
      diligencePath: Request enterprise pricing schedule and representative customer contracts from Temporal Technologies sales team.
    - type: missing-source
      severity: material
      topic: Penetration testing cadence and CVE disclosure history
      missingEvidence: >-
        Temporal Technologies does not publish its penetration testing cadence, scope, or historical CVE record
        publicly.
      whyItMatters: >-
        Without pen test reports or a CVE history log, the security program maturity claim cannot be independently
        verified beyond the CNA designation.
      diligencePath: >-
        Request most recent pen test executive summary and full CVE disclosure log in the security due diligence data
        room.
    - type: missing-source
      severity: minor
      topic: PHP SDK maintenance status and roadmap
      missingEvidence: >-
        The PHP SDK is described as community-supported with no public clarity on whether Temporal plans to bring it to
        official maintenance status.
      whyItMatters: >-
        Customers relying on the PHP SDK for production workflows face maintenance risk if the SDK falls behind other
        official SDKs.
      diligencePath: Check GitHub repository commit activity and confirm PHP SDK roadmap intent with Temporal product team.
    - type: private-evidence-only
      severity: material
      topic: Serverless Workers production readiness and launch timeline
      missingEvidence: >-
        Serverless Workers was announced at Replay 2026 but no public GA date, preview access documentation, or beta
        customer list exists.
      whyItMatters: >-
        If Serverless Workers is a key roadmap commitment for enterprise sales cycles, timeline slippage represents a
        material execution risk.
      diligencePath: >-
        Request internal product timeline, beta access criteria, and design documents from Temporal Technologies product
        engineering team.
    - type: stale
      severity: minor
      topic: Netflix and Stripe production scale metrics
      missingEvidence: >-
        Specific production metrics from Netflix and Stripe such as daily workflow counts, throughput, and SLA figures
        are not publicly updated.
      whyItMatters: >-
