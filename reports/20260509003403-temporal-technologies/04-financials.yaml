  evidenceGaps:
  - type: private-evidence-only
    topic: Absolute ARR and quarterly growth trend
    missingEvidence: Temporal has not disclosed absolute ARR or quarterly revenue in audited form. The $26M 2023 Latka estimate
      and 4.4× growth factor allow triangulation to $60–80M at Series C, but this remains an analyst inference.
    whyItMatters: Cannot underwrite the valuation-multiple thesis without a confirmed ARR baseline; the $5B Series D valuation
      is unverifiable without this figure.
    diligencePath: Request audited trailing-12-month ARR with quarterly waterfall and product-line breakdown.
    severity: material
    relatedQuestionRefs:
    - QI001
    - QI015
    - QI021
  - type: private-evidence-only
    topic: Gross margin and COGS breakdown by segment
    missingEvidence: No gross margin or cost-of-revenue data has been publicly disclosed. Cloud infrastructure COGS, support
      headcount costs, and service-delivery structure are all unknown.
    whyItMatters: Cannot assess capital efficiency, Rule-of-40 compliance, or benchmark against Confluent and Grafana without
      gross margin data.
    diligencePath: Request GAAP income statement with segmented cost-of-revenue by product line (Cloud, Enterprise License,
      Services).
    severity: material
    relatedQuestionRefs:
    - QI011
  - type: private-evidence-only
    topic: Monthly burn rate, cash balance, and runway
    missingEvidence: Burn and cash are not disclosed. Headcount-derived estimates suggest $8–12M/month but are unconfirmed
      by any company or third-party source.
    whyItMatters: Cannot calculate actual runway or validate capital adequacy claims; determines whether $300M Series D is
      sufficient for stated growth goals.
    diligencePath: Request monthly management accounts, trailing-6-month P&L, and current cash and cash equivalents schedule.
    severity: material
    relatedQuestionRefs:
    - QI012
  - type: private-evidence-only
    topic: Customer concentration and OSS-to-Cloud conversion rate
    missingEvidence: No top-customer ARR concentration data and no OSS-to-Cloud conversion rate data are publicly available.
      These are the two most important private monetization metrics.
    whyItMatters: Revenue fragility, churn risk, and PLG monetization efficiency cannot be assessed without these figures.
    diligencePath: Request top-25 customer ARR schedule with contract terms and renewal dates; request cohort analysis of
      OSS-to-Cloud conversion rate by quarterly cohort.
    severity: material
    relatedQuestionRefs:
    - QI021
    - QI025
  - type: private-evidence-only
    topic: Enterprise vs. Cloud revenue split and CAC/payback by channel
    missingEvidence: Revenue split across Cloud consumption, Enterprise License, and Professional Services is not disclosed.
      CAC and payback by channel are also unavailable.
    whyItMatters: Margin mix and growth sustainability cannot be assessed without product-line ARR. CAC efficiency is the
      key burn-justification metric.
    diligencePath: Request ARR waterfall by product; S&M spend by channel vs. net new ARR added; cohort payback analysis by
      customer segment.
    severity: material
    relatedQuestionRefs:
    - QI022
    - QI025
