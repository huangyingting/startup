company:
  name: Temporal Technologies
chapter:
  number: 4
  title: Financials
  summary: 'Temporal Technologies operates a consumption-based cloud revenue model anchored in Temporal Cloud, supplemented
    by enterprise license and professional-services revenue. Commercial trajectory is well-evidenced: Temporal Cloud revenue
    grew 4.4× in the 18 months to March 2025, NRR reached 184%, and paying cloud customers exceeded 2,500. The February 2026
    Series D cited >380% year-over-year revenue growth. Total funding stands at $650 million across seven rounds; the most
    recent $300 million Series D (Andreessen Horowitz, $5B valuation, February 2026) provides substantial runway. Key financial
    unknowns: absolute ARR (not disclosed), gross margin, monthly burn, CAC/payback data. Primary diligence blockers are absence
    of audited financials, opaque burn relative to rapid headcount growth (250→375 employees in one year), and a historically
    flat valuation (Series B through Series C at near-$1.5B–$1.72B during 2022–2025) resolved only by the AI-driven demand
    surge. The $5B valuation implies an extreme premium to public SaaS comparables and requires data-room access to underwrite.'
sections:
- id: SI001
  title: Revenue Model and Monetization Strategy
  body: Temporal Technologies monetizes through three principal mechanisms. First is Temporal Cloud, a fully managed consumption-based
    cloud service billing customers on workflow Actions executed and Active/Retained Storage consumed per month. List pricing
    starts at $100 per month for Essentials (1 million Actions, 1 GB active storage, 40 GB retained), scales to $500 per month
    for Business (2.5 million Actions), and extends to custom-negotiated Enterprise contracts for larger tenants. Volume discounts
    and commitment pricing are available above tier floors; new accounts receive $1,000 in free credits. Second, enterprise
    customers may license Temporal for self-managed deployment with commercial SLAs, support tiers, and enterprise-specific
    capabilities unavailable in the MIT-licensed OSS core. Third, Temporal offers professional services including onboarding,
    architecture reviews, and migration assistance, though this stream is not separately disclosed. The vast majority of open-source
    users self-host without paying; the key financial dynamic is conversion from the 183,000+ weekly-active OSS developer
    base to cloud or enterprise consumption. As of the March 2025 Series C, Temporal Cloud had grown 4.4× in revenue over
    the prior 18 months and served over 2,500 paying customers globally with NRR of 184%. The February 2026 Series D announced
    >380% year-over-year revenue growth, driven by the AI-native workload wave and expanding enterprise production deployments
    at OpenAI, ADP, Yum! Brands, and Block.
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
  - CI006
  - CI007
- id: SI002
  title: Capital Raise History and Capital Adequacy
  body: Temporal has raised $650 million across seven financing events since 2019. Amplify Partners anchored a seed round
    of approximately $18 million in 2020. Sequoia Capital led a Series A of undisclosed size in 2021. Index Ventures led a
    $103 million Series B in February 2022 at approximately $1.5 billion, establishing unicorn status. Greenoaks led a $75
    million Series B extension in February 2023 at a near-flat $1.5 billion valuation amid the software market contraction.
    Tiger Global Management led the $146 million Series C in March 2025 at $1.72 billion — described by TechCrunch as 'a very
    little bit' above flat. GIC (Singapore's sovereign wealth fund) led a $105 million secondary tender offer in October 2025
    at $2.5 billion, enabling employee liquidity without adding primary capital to the balance sheet. The February 2026 Series
    D of $300 million, led by Andreessen Horowitz, tripled the valuation to $5 billion and brought total funding to $650 million.
    At estimated burn of $8–12 million per month, the Series D provides roughly 25–37 months of runway from February 2026.
    Temporal has not publicly disclosed cash on hand, monthly burn, or debt obligations.
  claimRefs:
