  - CI023
- id: SI004
  title: Cost Structure and Burn Profile
  body: 'Temporal''s cost structure is dominated by personnel: the company grew from approximately 250 employees in early
    2025 to 375 by February 2026, a 50% increase in approximately 12 months. At a fully-loaded annual cost of $250,000–$300,000
    per employee, annual compensation is estimated at $90–110 million. Cloud infrastructure COGS for operating Temporal Cloud
    (managed Kubernetes, distributed databases, networking, storage) represents a second material cost category; for cloud-hosted
    workflow services, infrastructure typically runs 20–30% of cloud revenue, yielding gross margins in the 65–75% range.
    Sales and marketing investment is accelerating, with EMEA and APAC expansion explicitly called out since the Series C.
    R&D was cited in the Series D use-of-funds, covering Nexus (durable RPC), Large Payload Storage, Serverless Execution,
    Execution History Branching, and AI-focused capabilities. No burn rate or P&L has been publicly disclosed. Profitability
    is not targeted in the near term; the company is investing aggressively across product, geography, and community to capitalize
    on the AI-native orchestration wave and justify the $5 billion Series D valuation.'
  claimRefs:
  - CI024
  - CI025
  - CI026
  - CI027
  - CI028
- id: SI005
  title: Financial Risks and Diligence Blockers
  body: 'The primary financial risk is the absence of audited public financials, leaving investors reliant on company-reported
    growth metrics. The 2022–2025 flat-valuation period ($1.5B→$1.72B over three years) signals that revenue growth was below
    investor expectations during the software market contraction; TechCrunch noted the Series C was ''a very little bit''
    above flat, and Prime Unicorn Index reportedly marked Temporal''s valuation to approximately $880 million at one point.
    Open-source commoditization risk is structural: the MIT license permits cloud providers to fork and host Temporal without
    licensing fees, mirroring the AWS/Elasticsearch dynamic. The $5B Series D valuation implies 55–83× trailing ARR on the
    Series C-era estimate, declining to 15–25× only if >380% growth has materialized into $200–300M ARR — a figure unverifiable
    from public sources. Enterprise sales cycles (3–12 months) lengthen payback and pressure S&M spend. Revenue concentration,
    OSS-to-Cloud conversion rate, and gross margin are all undisclosed. The October 2025 secondary tender offer provided employee
    liquidity but added no cash to the balance sheet and may create future retention pressure at senior levels.'
  claimRefs:
  - CI029
  - CI030
  - CI031
  - CI032
  - CI033
  - CI034
