callouts:
- calloutType: strength
  title: Exceptional Net Dollar Retention of 184%
  body: NRR of 184% is among the highest publicly cited figures in developer-infrastructure SaaS, well above best-in-class
    peers such as Confluent (~120–130%). This metric validates extreme product stickiness, successful consumption-expansion
    motion, and meaningful pricing power. It is the single most important positive financial indicator for Temporal's long-term
    revenue trajectory.
  claimRefs:
  - CI016
  - CI017
  - CI035
- calloutType: risk
  title: Extreme Valuation Multiple Requires Sustained Hyper-Growth
  body: The $5B Series D implies 55–83× trailing ARR at the Series C-era estimate — declining to 15–25× only if >380% YoY
    growth has materialized into $200–300M ARR. Public developer-infrastructure SaaS (Confluent) trades at ~8.5× revenue.
    Any growth deceleration compresses this multiple severely. Full underwriting requires audited ARR, gross margin, and a
    quarterly growth schedule.
  claimRefs:
  - CI033
  - CI034
  - CI035
- calloutType: risk
  title: Flat Valuation Period (2022–2025) as Adverse Prior-Cycle Signal
  body: The $1.5B Series B (2022) barely moved to $1.72B at the Series C (March 2025) — three years of near-zero multiple
    expansion — while growth decelerated from >20× (2022/23) to 4.4× over 18 months. TechCrunch labeled the Series C 'a very
    little bit' above flat; Prime Unicorn Index reportedly marked valuation to ~$880M. The AI tailwind has reversed the trajectory,
    but prior deceleration is a legitimate diligence concern.
  claimRefs:
  - CI030
  - CI031
  - CI032
- calloutType: insight
  title: Secondary Transaction Was Employee Liquidity, Not Balance-Sheet Capital
  body: 'The October 2025 GIC-led $105M secondary transferred existing shares from employees and early investors to GIC, Tiger
    Global, and Index. Zero primary capital was added to Temporal''s balance sheet. Financial significance: (1) validated
    a $2.5B mark between primary rounds; (2) reduced employee equity overhang; (3) accompanied CFO hire (John Bonney) and
    board addition (Jonathan Chadwick). Investors should not treat the $105M as available operating capital.'
  claimRefs:
  - CI013
  - CI014
  - CI015
