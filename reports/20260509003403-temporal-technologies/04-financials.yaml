  type: flow
  layout: wide
  summary: Shows how Temporal's product-led growth funnel converts OSS developer adoption into paying Temporal Cloud customers
    and into gross profit. The MIT-licensed OSS drives discovery; enterprise reliability requirements drive cloud conversion;
    consumption growth (NRR 184%) drives revenue expansion within accounts. The bridge highlights the PLG monetization path
    and the key conversion gap (OSS-to-Cloud rate undisclosed).
  data:
    nodes:
    - id: n1
      label: OSS Adoption
      detail: 183K+ weekly active OSS developers; 7M+ unique clusters; MIT-licensed; self-hosted; no direct revenue; 600%
        growth in 18 months
    - id: n2
      label: Developer Evaluation
      detail: Free Temporal Cloud credits ($1,000); proof-of-concept on managed platform; conversion rate undisclosed
    - id: n3
      label: Temporal Cloud Subscription
      detail: 2,500+ paying customers; Essentials ($100/mo) through Enterprise (custom); consumption billing on Actions +
        Storage
    - id: n4
      label: Usage Expansion
      detail: NRR 184%; existing customers expand Actions and Storage as production workloads scale; organic ARR growth
    - id: n5
      label: Enterprise Upsell
      detail: Enterprise tier and self-managed license; custom ACV; SAML SSO; dedicated HA; regulated-industry accounts
    - id: n6
      label: Cloud Gross Profit
      detail: Estimated 65–75% gross margin; consumption billing minus cloud infra COGS, support headcount, managed-service
        ops
  approximationNotes: Gross margin estimated from developer-infrastructure SaaS benchmarks (Confluent ~70% non-GAAP FY2025);
