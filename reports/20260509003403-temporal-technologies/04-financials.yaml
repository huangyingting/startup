- id: SI003
  title: Unit Economics and Commercial Traction
  body: The most significant disclosed unit-economics metric is Net Dollar Retention (NRR) of 184% as of the March 2025 Series
    C, placing Temporal among the top tier of developer-infrastructure SaaS — well above peers such as Confluent (~120–130%
    NRR). This metric confirms extreme product stickiness and successful consumption-expansion within existing accounts. Revenue
    grew 4.4× in 18 months to March 2025, accelerating to >380% year-over-year by the February 2026 Series D, with weekly
    active usage up 350% and installations up 500% to 20 million per month. The Latka-reported 2023 revenue of approximately
    $26 million, combined with the 4.4× growth factor, yields an estimated ARR of $60–80 million at the Series C, consistent
    with an implied EV/ARR multiple of approximately 21–28× at the $1.72 billion valuation. Customer acquisition economics
    (CAC, payback, LTV) are not publicly disclosed. Gross margin is not disclosed; developer-infrastructure SaaS peers (Confluent
    ~70% non-GAAP FY2025) suggest 65–75% for Temporal's cloud segment. The product-led growth model embeds a portion of effective
    CAC in R&D and OSS community investment rather than direct sales spend, complicating external CAC calculation.
  claimRefs:
