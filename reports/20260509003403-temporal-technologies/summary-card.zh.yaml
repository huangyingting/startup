summary:
  headline: >
    Temporal 已拿下开发者基础设施里少见的品类领导权：183,000+ 周活 OSS 用户、2,500+ 云客户、184% NRR 验证企业端扩张韧性，2026 年初收入同比增长 380%。Nexus 让公司站上 AI
    agent 编排浪潮。核心投资问题是：平台成熟之后，OSS-to-cloud 转化飞轮能否继续撑住增长，同时顶住超大规模云厂商自研原生编排服务的竞争。
