companyProfile:
  summary: >
    Temporal Technologies is a San Francisco-based infrastructure company that built the leading
    open-source durable execution platform for orchestrating complex distributed workflows. Founded
    in 2019 by Maxim Fateev and Samar Abbas — architects of Cadence at Uber — Temporal has
    grown to 183,000+ weekly active OSS developers and 2,500+ Temporal Cloud customers including
    Netflix, Stripe, Coinbase, and Snap. The company raised a $146M Series C in March 2025 at a
    $1.72B valuation and reported a 184% Net Revenue Retention rate, reflecting strong expansion
    in existing accounts. Revenue grew 380% YoY in February 2026, suggesting re-acceleration ahead
    of an anticipated Series D. Temporal has also launched Nexus, an AI agent orchestration product
    that positions the company at the centre of the emerging agentic-AI stack.
  foundedDate: "2019-01-01"
  founders:
    - name: "Maxim Fateev"
      role: "Co-founder & CEO"
      background: "Co-creator of Cadence at Uber; built workflow orchestration at AWS; former Google engineer."
      claimRefs: [CO001]
    - name: "Samar Abbas"
      role: "Co-founder & CTO"
      background: "Co-creator of Cadence at Uber; distributed systems architect with deep workflow expertise."
      claimRefs: [CO001]
  foundingLocation: "San Francisco, California, USA"
  headquarters: "San Francisco, California, USA"
  productSummary: >
    Temporal's core product is an open-source durable execution engine that persists workflow state
    across failures, timeouts, and server restarts. It provides native SDKs for Go, Java, Python,
    TypeScript, .NET, and PHP and supports use cases including payment processing, order management,
    ML pipelines, and AI agent orchestration. Temporal Cloud offers a fully-managed, consumption-based
    service priced on Actions executed per month across four tiers (Essentials, Business, Enterprise,
    Mission Critical). The Nexus product (2025) extends orchestration to AI agent workflows, enabling
    durable execution of multi-step AI pipelines. Temporal has 183,000+ weekly active OSS users and
    2,500+ cloud customers.
  customerFocus: "Developer-led B2B: backend engineers and platform teams at high-scale technology companies, fintechs, and enterprises running complex distributed workflows."
  businessModel: "Consumption-based SaaS: Temporal Cloud charges per Action executed across four pricing tiers. Self-hosted OSS is free and serves as the primary top-of-funnel channel."
  stage: "Series C — growth stage, approaching Series D"
  fundingStatus: "$464M raised through Series C; post-money valuation $1.72B at Series C (March 2025). Secondary at ~$2.5B reported October 2025."
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]

summary:
  headline: >
    Temporal has achieved rare developer infrastructure category leadership with 183,000+ weekly active
    OSS users and 2,500+ cloud customers, a 184% NRR confirming durable enterprise expansion, and 380%
    YoY revenue growth in early 2026. The company is well-positioned to benefit from the AI agent
    orchestration wave through Nexus. The primary investment question is whether the OSS-to-cloud
    conversion flywheel can sustain growth as the platform matures and hyperscalers develop competing
    native orchestration services.
