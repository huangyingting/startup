  evidenceGaps:
    - type: enumeration-incomplete
      severity: minor
      topic: Leadership and Founder Table completeness
      missingEvidence: >-
        The leadership table covers C-suite and board members only based on public disclosures. VP, Director-level, and
        engineering leadership are not enumerated.
      whyItMatters: Incomplete leadership enumeration limits assessment of organizational depth and key-person risk distribution.
      diligencePath: Request complete organizational chart from management under NDA.
    - type: enumeration-incomplete
      severity: minor
      topic: Stakeholder or Investor Map completeness
      missingEvidence: >-
        Ownership percentages, pro-rata rights, anti-dilution provisions, and exact board seat allocations are not
        publicly disclosed. Pre-Series-B cap table structure unknown.
      whyItMatters: Cap table structure affects dilution, governance rights, and founder control at future liquidity events.
      diligencePath: Request cap table and shareholder agreement under NDA in a formal diligence process.
    - type: enumeration-incomplete
      severity: minor
      topic: Milestone Table completeness
      missingEvidence: >-
        Internal product launches, partnership agreements not publicly announced, regulatory interactions, and legal
        matters are not captured in publicly available milestone history.
      whyItMatters: Incomplete milestone history may miss adverse events or partnerships with strategic implications.
      diligencePath: Review internal corporate timeline and board minutes under NDA.
    - type: private-evidence-only
      severity: material
      topic: Annual recurring revenue
      missingEvidence: >-
        Temporal has not publicly disclosed its exact ARR or revenue figures. The $61.9M estimate from compworth.com is
        an independent estimate based on employee count and benchmarks and is not confirmed.
      whyItMatters: ARR is necessary for accurate valuation multiple analysis and assessing whether $5B valuation is justified.
      diligencePath: Request ARR and revenue figures under NDA from management in a diligence process.
      relatedQuestionRefs:
        - QO016
    - type: conflicting-data
      severity: material
      topic: Pre-Series-C valuation low-water mark
      missingEvidence: >-
        Prime Unicorn Index reportedly estimated Temporal's valuation at approximately $880 million during 2022-2023.
        This figure has not been confirmed or denied by Temporal. The CEO described the Series C valuation as 'a little
        bit up' from prior rounds.
      whyItMatters: >-
        A significant prior valuation dip would indicate the company struggled during the 2022-2024 downturn and may
        have experienced investor sentiment challenges.
      diligencePath: Review Series B and extension term sheets under NDA; request cap table history from company.
      relatedQuestionRefs:
        - QO022
    - type: private-evidence-only
      severity: minor
      topic: Forrester TEI study methodology and representativeness
      missingEvidence: >-
        The Forrester TEI study was commissioned by Temporal and is based on interviews with an unspecified number of
        customers in financial services, transportation, entertainment, and food services. The full methodology and
        sample size are not publicly disclosed in the press release.
      whyItMatters: >-
        Commissioned studies may have selection bias toward successful implementations; the 201% ROI and 14-month
        payback should be interpreted with that context.
      diligencePath: >-
        Obtain the full Forrester TEI study methodology section; request customer references for independent
        verification.
      relatedQuestionRefs:
        - QO024
    - type: missing-source
      severity: material
      topic: Adverse events and litigation
      missingEvidence: >-
        No public records of lawsuits, regulatory actions, data breaches, or significant adverse events were found in
        available sources. This absence may reflect genuine clean history or limited public disclosure.
      whyItMatters: Adverse events could affect valuation, customer contracts, and regulatory compliance.
      diligencePath: Conduct legal due diligence including PACER search, state court filings, and regulatory databases.
      relatedQuestionRefs:
        - QO021
    - type: private-evidence-only
      severity: minor
      topic: Headcount by function and historical trajectory
      missingEvidence: >-
        Detailed headcount breakdown by function (engineering, sales, G&A) and hiring trajectory over time is not
        publicly available.
      whyItMatters: Headcount mix informs burn rate, go-to-market investment, and organizational maturity.
      diligencePath: Request organizational chart and headcount data by function from management.
      relatedQuestionRefs:
        - QO019
