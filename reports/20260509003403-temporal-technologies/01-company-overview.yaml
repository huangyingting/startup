callouts:
  - calloutType: strength
    title: Exceptional NRR Signals Deep Product-Market Fit
    body: |
      Temporal Cloud's reported Net Dollar Retention of 184% as of early 2025 is well above the
      ~120% benchmark for high-performing SaaS infrastructure companies. This indicates that existing
      customers are rapidly expanding their usage — consistent with a platform that becomes increasingly
      embedded in mission-critical workflows and adds new use cases (especially AI agent orchestration)
      over time.
    claimRefs:
      - CO026
  - calloutType: risk
    title: Key-Person Concentration in Co-Founders
    body: |
      Temporal's intellectual property, architectural vision, and customer relationships are heavily
      concentrated in co-founders Samar Abbas and Maxim Fateev, who have been working on successive
      versions of this problem since 2009. Recent hires (Jim Cyb as President, John Bonney as CFO)
      and board appointments begin to distribute operational responsibility, but departure of either
      founder would represent a material risk to product continuity and investor confidence.
    claimRefs:
      - CO007
      - CO008
  - calloutType: insight
    title: AI Agent Wave Amplifies Temporal's Core Value Proposition
    body: |
      Temporal was built for distributed systems reliability before the AI era, but the emergence of
      long-running autonomous AI agents has created a structural tailwind. As Andreessen Horowitz
      stated in their Series D blog post: "For long-running agents operating over extended horizons,
      the durability that Temporal provides is the difference between a compelling demo and a
      production system." This positions Temporal as infrastructure-layer enabler of the agentic AI
      transition, not just a developer tools company.
    claimRefs:
      - CO032
      - CO033
