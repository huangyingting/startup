schemaVersion: startup-diligence-v2
artifact: research-plan
slug: openai
runDate: 2026-04-30
company:
  name: OpenAI
  requestedName: OpenAI
  requestedUrl: null
researchScope:
  focus: Full company diligence on OpenAI with emphasis on entity verification, governance and control structure, product and platform stack, commercialization, infrastructure strategy, funding, and legal-regulatory exposure for a late-stage private AI company.
  depth: standard
  geography: Global
  sectorHypothesis: AI research and deployment company spanning consumer applications, enterprise software, developer platform, and frontier-model infrastructure
keyResearchQuestions:
  - id: Q001
    question: What is the correct diligence target when official materials refer to OpenAI as both a nonprofit foundation and a for-profit public benefit corporation?
    whyItMatters: Wrong-entity research would contaminate legal, governance, ownership, and financial conclusions.
  - id: Q002
    question: Which legal entities control governance, fundraising, contracting, privacy compliance, and international operations across OpenAI Foundation, OpenAI Group PBC, OpenAI OpCo, LLC, and OpenAI Ireland Limited?
    whyItMatters: Investors need entity-level clarity to assess fiduciary control, revenue capture, regulatory perimeter, and litigation exposure.
  - id: Q003
    question: How dependent is OpenAI's business model on ChatGPT consumer distribution versus API, enterprise, and other product lines?
    whyItMatters: Concentration by surface, customer type, and monetization model drives durability and valuation support.
  - id: Q004
    question: What evidence supports OpenAI's position as a frontier-model, platform, and application company rather than a single chatbot vendor?
    whyItMatters: The company's competitive set, capital needs, and strategic options differ materially if it is an infrastructure platform rather than a single-product company.
  - id: Q005
    question: What are the core governance and mission-control mechanisms after the 2025 recapitalization?
    whyItMatters: Mission lock, board composition, safety oversight, and stakeholder rights are unusually central to long-duration private capital risk.
  - id: Q006
    question: How large and defensible are OpenAI's compute, cloud, and infrastructure advantages relative to major peers?
    whyItMatters: Frontier AI economics are dominated by access to capital, chips, cloud capacity, and deployment infrastructure.
  - id: Q007
    question: What are the highest-probability legal, regulatory, and policy constraints on OpenAI over the next 24 months?
    whyItMatters: Copyright, privacy, competition, safety, and government-use issues could shape growth, margins, and strategic optionality.
  - id: Q008
    question: What evidence exists on growth quality, capital intensity, and path to sustainable economics at OpenAI's current scale?
    whyItMatters: Late-stage private diligence should distinguish headline adoption from durable unit economics and ongoing cash requirements.
priorityAngles:
  - angle: identity
    priority: high
    rationale: OpenAI is an umbrella brand spanning multiple legal entities and a flagship product family, so entity precision is the first gating item.
  - angle: governance
    priority: high
    rationale: Nonprofit control, PBC governance, and board structure are unusually central to valuation, control, and safety oversight.
  - angle: legal
    priority: high
    rationale: Contracting entities, privacy controllers, and jurisdiction-specific obligations materially affect diligence conclusions.
  - angle: risk
    priority: high
    rationale: Copyright, privacy, regulatory, safety, and government-use scrutiny are core investment risks for frontier AI.
  - angle: product
    priority: high
    rationale: OpenAI monetizes across ChatGPT, API, Codex, Sora, and agents, so product-surface mapping is needed to avoid over-attributing all value to ChatGPT.
  - angle: technology
    priority: high
    rationale: Model capability, inference stack, and compute partnerships drive competitive position and capital requirements.
  - angle: traction
    priority: medium
    rationale: Growth claims are strong, but this stage should frame them and tee up later source-led validation.
  - angle: gtm
    priority: medium
    rationale: Consumer pull-through into enterprise appears strategically important and needs disciplined validation.
  - angle: competition
    priority: medium
    rationale: Positioning versus Anthropic, Google DeepMind, xAI, Meta, Microsoft, and open-source ecosystems matters, but identity comes first.
  - angle: funding
    priority: high
    rationale: Recent funding scale and ownership structure are critical to late-stage private-company analysis.
  - angle: financials
    priority: medium
    rationale: Standard-depth work should frame economics and cash needs, while leaving full model-building to later stages.
  - angle: business-model
    priority: high
    rationale: The mix of subscriptions, enterprise contracts, API usage, and platform monetization is central to durability and valuation.
sourceStrategy:
  sourceTarget: 30
  mustHaveSourceTypes:
    - official websites
    - legal and policy pages
    - company announcements
    - reputable news
    - corporate databases
    - founder and leadership profiles
  disconfirmingEvidencePlan: Test every major conclusion against the possibility that a fact belongs to ChatGPT, OpenAI Foundation, OpenAI Group PBC, OpenAI OpCo, LLC, OpenAI Ireland Limited, or an unrelated similarly named project rather than to the OpenAI organization as a whole; prioritize sources that clarify control, ownership, contracting, privacy, and governance boundaries.
  handoffNotes: Identity is high-confidence at the umbrella-organization level, but downstream researchers should cite the exact legal entity whenever a claim is specific to governance, fundraising, contracts, privacy, employment, or regional regulatory obligations.
