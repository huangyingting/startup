schemaVersion: startup-diligence-v2
artifact: risk-governance
slug: openai
runDate: 2026-04-30
company:
  name: OpenAI
riskRegister:
  - id: R001
    category: financial
    risk: Public underwriting still depends on management-reported revenue, valuation, and mix claims because audited segment economics are not disclosed.
    severity: high
    likelihood: high
    timeHorizon: near
    mitigation: Require audited or board-approved revenue, gross margin, burn, customer concentration, and cohort-retention data by product surface before underwriting valuation.
    claimRefs: [C011, C012, C039]
  - id: R002
    category: funding
    risk: OpenAI may remain unusually capital intensive even at large claimed revenue scale because compute, infrastructure, safety, and compliance costs are not transparently broken out.
    severity: high
    likelihood: medium
    timeHorizon: medium
    mitigation: Review forward compute commitments, capex or cloud obligations, and base-case liquidity under downside demand and pricing scenarios.
    claimRefs: [C011, C022, C037, C039]
  - id: R003
    category: platform
    risk: Microsoft remains a primary cloud and economics counterparty, so partner concentration can still shape availability, pricing, and margin outcomes despite multi-cloud progress.
    severity: high
    likelihood: high
    timeHorizon: medium
    mitigation: Test how much volume, margin, and strategic control can realistically shift to direct and AWS channels over the next 24 months.
    claimRefs: [C021, C022, C023]
  - id: R004
    category: regulatory
    risk: Growth in government and other regulated sectors is gated by procurement, FedRAMP, privacy, and ongoing transparency obligations rather than model performance alone.
    severity: high
    likelihood: high
    timeHorizon: near
    mitigation: Underwrite regulated-sector growth only after validating procurement conversion, compliance staffing, and renewal mechanics.
    claimRefs: [C017, C019, C037, C038]
  - id: R005
    category: product
    risk: High-stakes use cases still require human review, evals, cited evidence, and policy-constrained deployment, which can cap automation value in premium segments.
    severity: high
    likelihood: high
    timeHorizon: near
    mitigation: Focus diligence on workflows where human-in-the-loop operation is acceptable and economically durable rather than assuming fully autonomous deployment.
    claimRefs: [C015, C031, C034, C036]
  - id: R006
    category: competition
    risk: Bundled hyperscaler copilots, cloud-layer distribution, and internal builds can pressure pricing and limit OpenAI's direct ownership of the enterprise relationship.
    severity: high
    likelihood: medium
    timeHorizon: medium
    mitigation: Validate win rates, displacement patterns, and pricing power where buyers can choose bundled alternatives or build internally.
    claimRefs: [C022, C023, C024]
  - id: R007
    category: governance
    risk: Foundation control and multi-entity structure create governance and investor-alignment complexity that is not fully visible in public materials.
    severity: high
    likelihood: medium
    timeHorizon: medium
    mitigation: Obtain entity charts, governing documents, investor-rights terms, and board-level reserved-matters schedules before making a conviction call.
    claimRefs: [C002, C003, C039]
  - id: R008
    category: gtm
    risk: Commercial momentum may be lower-quality than headline figures imply because the largest user, business, and ROI datapoints in this pass are mostly company-reported or curated.
    severity: high
    likelihood: medium
    timeHorizon: near
    mitigation: Run independent customer calls, request cohort-level paid usage data, and reconcile management claims to invoiced or contracted revenue.
    claimRefs: [C008, C009, C010, C032, C039]
governance:
  controlStructure: OpenAI Foundation controls OpenAI Group PBC after the 2025 recapitalization, while OpenAI Ireland Limited and OpenAI OpCo, LLC appear as regional operating or privacy entities.
  keyPersonRisk: unknown
  investorAlignment: Foundation control means investor alignment depends on how mission control and for-profit economics interact, and public evidence in this pass is not sufficient to map those rights cleanly.
  transparencyConcerns:
    - Audited revenue by surface, gross margin, burn, and customer concentration are not publicly disclosed.
    - The largest funding, valuation, and revenue datapoints in this pass are management-reported rather than independently corroborated.
  claimRefs: [C002, C003, C011, C039]
legalRegulatory:
  knownIssues:
    - The Microsoft/OpenAI relationship received formal UK CMA scrutiny before the CMA concluded it did not create a relevant merger situation under UK merger rules.
    - OpenAI reports ongoing government-request, child-safety, and DSA transparency obligations as the platform scales.
    - OpenAI's usage policies restrict licensed advice, sensitive decisions, and national-security or intelligence uses without additional review and approval.
  regulatoryExposure: high
  compliancePosture: OpenAI appears to have meaningful enterprise controls, no-training defaults for business data, and a FedRAMP path for federal buyers, but compliance work is integral to commercialization rather than a solved back-office function.
  claimRefs: [C013, C017, C020, C036, C037]
redFlags:
  - flag: Public underwriting still relies heavily on management-reported revenue, mix, funding, and valuation figures.
    severity: high
    evidenceQuality: low
    claimRefs: [C011, C012, C039]
  - flag: Microsoft remains a primary cloud and economics counterparty through 2030 even after broader distribution rights.
    severity: high
    evidenceQuality: medium
    claimRefs: [C021, C022, C023]
  - flag: High-stakes deployments still depend on human review, evals, and policy gating in several premium segments.
    severity: medium
    evidenceQuality: high
    claimRefs: [C031, C034, C036]
riskVerdict:
  overallRisk: high
  rationale: OpenAI has genuine product breadth and demand, but the investment case still carries high risk because public economics are under-disclosed, governance is structurally unusual, partner concentration remains material, and regulated growth brings heavy compliance and human-review constraints.
  confidence: medium
  claimRefs: [C002, C011, C013, C022, C036, C037, C039]
