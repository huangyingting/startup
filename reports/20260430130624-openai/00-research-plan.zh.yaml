schemaVersion: startup-diligence-v2
artifact: research-plan
slug: openai
runDate: 2026-04-30
company:
  name: OpenAI
  requestedName: OpenAI
  requestedUrl: null
researchScope:
  focus: "对 OpenAI 进行完整公司尽调，重点关注实体核验、治理与控制结构、产品与平台栈、商业化、基础设施战略、融资，以及面向一家晚期私营 AI 公司的法律与监管风险敞口。"
  depth: standard
  geography: "全球"
  sectorHypothesis: "一家横跨消费者应用、企业软件、开发者平台和前沿模型基础设施的 AI 研究与部署公司"
keyResearchQuestions:
  - id: Q001
    question: "当官方材料同时将 OpenAI 表述为非营利基金会和营利性公益公司时，正确的尽调对象究竟是哪一个？"
    whyItMatters: "如果研究对象实体判断错误，将污染法律、治理、所有权和财务结论。"
  - id: Q002
    question: "OpenAI Foundation、OpenAI Group PBC、OpenAI OpCo, LLC 和 OpenAI Ireland Limited 之间，哪些法律实体分别控制治理、融资、签约、隐私合规和国际运营？"
    whyItMatters: "投资者需要实体层面的清晰度，以评估受托控制权、收入归集、监管边界和诉讼风险。"
  - id: Q003
    question: "OpenAI 的商业模式对 ChatGPT 消费者分发的依赖程度，相比 API、企业及其他产品线有多高？"
    whyItMatters: "不同产品界面、客户类型和变现模式的集中度，会决定业务韧性和估值支撑。"
  - id: Q004
    question: "有哪些证据支持 OpenAI 被视为一家前沿模型、平台和应用公司，而不仅仅是单一聊天机器人供应商？"
    whyItMatters: "如果公司本质上是基础设施平台而非单一产品公司，其竞争集合、资本需求和战略选项都会出现实质差异。"
  - id: Q005
    question: "在 2025 年资本重组之后，核心治理与使命控制机制是什么？"
    whyItMatters: "使命锁定、董事会构成、安全监督和利益相关者权利，对长周期私募资本风险来说异常关键。"
  - id: Q006
    question: "与主要同行相比，OpenAI 的算力、云和基础设施优势有多大、护城河有多强？"
    whyItMatters: "前沿 AI 的经济性主要由资本、芯片、云容量和部署基础设施的获取能力主导。"
  - id: Q007
    question: "未来 24 个月内，OpenAI 面临概率最高的法律、监管和政策约束是什么？"
    whyItMatters: "版权、隐私、竞争、安全和政府使用等问题，可能影响增长、利润率和战略选择空间。"
  - id: Q008
    question: "在 OpenAI 当前规模下，有哪些证据反映其增长质量、资本强度以及迈向可持续经济性的路径？"
    whyItMatters: "晚期私营公司尽调需要区分表面的采用热度与可持续的单位经济性及持续现金需求。"
priorityAngles:
  - angle: identity
    priority: high
    rationale: "OpenAI 是覆盖多个法律实体和旗舰产品家族的总品牌，因此实体精确性是首个门槛项。"
  - angle: governance
    priority: high
    rationale: "非营利控制、PBC 治理和董事会结构，对估值、控制权和安全监督异常关键。"
  - angle: legal
    priority: high
    rationale: "签约实体、隐私控制者以及不同司法辖区义务，会实质性影响尽调结论。"
  - angle: risk
    priority: high
    rationale: "版权、隐私、监管、安全和政府使用审查，是前沿 AI 的核心投资风险。"
  - angle: product
    priority: high
    rationale: "OpenAI 通过 ChatGPT、API、Codex、Sora 和 agents 变现，因此需要梳理产品界面，避免将所有价值都归因于 ChatGPT。"
  - angle: technology
    priority: high
    rationale: "模型能力、推理栈和算力合作关系决定竞争地位和资本需求。"
  - angle: traction
    priority: medium
    rationale: "增长口径看起来强劲，但此阶段应先完成框定，并为后续基于来源的验证铺路。"
  - angle: gtm
    priority: medium
    rationale: "消费者端拉动进入企业端似乎具有战略重要性，需要严谨验证。"
  - angle: competition
    priority: medium
    rationale: "与 Anthropic、Google DeepMind、xAI、Meta、Microsoft 以及开源生态的定位对比很重要，但实体识别优先。"
  - angle: funding
    priority: high
    rationale: "近期融资规模和所有权结构，对晚期私营公司分析至关重要。"
  - angle: financials
    priority: medium
    rationale: "标准深度工作应勾勒经济性与现金需求框架，而将完整建模留给后续阶段。"
  - angle: business-model
    priority: high
    rationale: "订阅、企业合同、API 使用和平台变现的组合，是业务韧性与估值的核心。"
sourceStrategy:
  sourceTarget: 30
  mustHaveSourceTypes:
    - official websites
    - legal and policy pages
    - company announcements
    - reputable news
    - corporate databases
    - founder and leadership profiles
  disconfirmingEvidencePlan: "对每个重大结论都要检验一种可能性：相关事实究竟属于 ChatGPT、OpenAI Foundation、OpenAI Group PBC、OpenAI OpCo, LLC、OpenAI Ireland Limited，还是一个名称相似但无关的项目，而非整个 OpenAI 组织；优先采用能够澄清控制、所有权、签约、隐私和治理边界的来源。"
  handoffNotes: "在总组织层面，身份识别具有较高置信度，但下游研究者在涉及治理、融资、合同、隐私、雇佣或区域监管义务的具体事实时，应引用精确法律实体。"