retentionExpansionSignals:
  evidence:
    - "OpenAI claims enterprise already contributes more than 40% of revenue and is tracking toward parity with consumer, suggesting mix expansion beyond a single consumer surface."
    - "Enterprise packaging centers on connected company data, shared agents, security controls, and deployment support, which can deepen workflow embedment after rollout."
    - "CyberAgent reports 93% monthly active usage across nearly all departments and Morgan Stanley reports over 98% adoption among advisor teams in a core workflow."
    - "Government procurement paths through FedRAMP, ChatGPT Gov, and GSA can support expansion from pilots into wider agency usage."
  concerns:
    - "OpenAI does not publicly disclose gross retention, net retention, churn, or cohort-level expansion by surface."
    - "Many headline adoption and ROI metrics are self-reported or come through curated customer stories rather than independent audits."
    - "Large rollouts appear to require governance, training, evals, and human-review processes, which can elongate deployment and renewal cycles."
    - "Cloud and channel dependence can still influence economics even when end-user adoption is strong."
  confidence: medium
  claimRefs: [C007, C012, C017, C019, C021, C022, C030, C031, C032, C038, C039]
