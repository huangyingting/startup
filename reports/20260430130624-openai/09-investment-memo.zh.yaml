schemaVersion: startup-diligence-v2
artifact: investment-memo
slug: openai
runDate: 2026-04-30
company:
  name: OpenAI
memo:
  oneLine: "OpenAI 在消费者、企业、开发者和政府 AI 界面上具备异常突出的分发与产品广度，但在本轮审查中，公开证据仍不足以高确信度支撑其估值、利润质量和治理风险。"
  recommendation: research-more
  confidence: medium
  whyNow: "OpenAI 看起来正把消费者覆盖转化为企业、开发者和公共部门分发，同时摆脱单一云上市路径，因此其战略重要性很高，尽管投资者级别的经济透明度仍然不足。"
  claimRefs: [C001, C002, C011, C017, C023, C039]
scorecard:
  market:
    score: 4
    rationale: "OpenAI 处于一个极其庞大的跨界面市场中，覆盖消费者 AI、企业工作流、开发者平台和受监管公共部门需求。"
    claimRefs: [C001, C014, C038]
  customerPull:
    score: 4
    rationale: "企业、开发者和政府买方都展现出真实拉力，但其中许多最大规模信号仍来自管理层自报，而非独立审计。"
    claimRefs: [C008, C009, C017, C019, C025]
  productQuality:
    score: 4
    rationale: "公司已交付覆盖 ChatGPT、API、Codex、智能体和受监管行业产品的真实平台，而非单一聊天产品。"
    claimRefs: [C001, C007, C017, C024]
  traction:
    score: 3
    rationale: "其宣称的使用与收入规模非常惊人，但本轮审查中最重要的变现与采用数据仍主要来自自报。"
    claimRefs: [C010, C011, C012, C039]
  differentiation:
    score: 4
    rationale: "OpenAI 通过结合大众市场分发、企业工作区、API、智能体和公共部门上市路径形成差异化，尽管替代方案依然可信。"
    claimRefs: [C001, C017, C023, C024]
  businessQuality:
    score: 2
    rationale: "变现界面是真实存在的，但毛利率、burn、留存、客户集中度和贡献经济性仍过于不透明，无法支持更高评分。"
    claimRefs: [C004, C006, C021, C022, C039]
  teamAndGovernance:
    score: 2
    rationale: "Foundation 控制与多实体结构也许符合使命导向，但本轮审查中的公开证据不足以为晚期承保提供关于投资者一致性和控制权的充分清晰度。"
    claimRefs: [C002, C003, C039]
  riskAdjustedAttractiveness:
    score: 2
    rationale: "OpenAI 具有战略重要性，但在考虑合作伙伴集中度、合规负担和经济性不透明后，当前公开证据仍不足以支撑高确信度承保。"
    claimRefs: [C022, C036, C037, C039]
thesis:
  bullCase: "OpenAI 将广泛的消费者熟悉度、企业落地、agentic workflow 深度以及不断扩大的多云分发，转化为一个具备耐久跨界面变现能力的品类标准 AI 平台。"
  baseCase: "OpenAI 仍将是最重要的 AI 平台之一，但其经济性会继续受合作伙伴塑造且资本密集，因此投资者在将其视为一项标准化的晚期复利软件资产前，仍需要更好的私有披露。"
  bearCase: "捆绑式替代方案、云合作伙伴杠杆、合规摩擦以及经审计经济性不足，使 OpenAI 无法在当前隐含规模下把惊人的使用量转化为高质量、可持续的回报。"
  keyAssumptions:
    - "管理层自报的需求和收入主张在方向上是真实的，但仍不足以单独支撑完整承保。"
    - "如果采购和合规门槛管理得当，企业、API 和政府业务面能够在消费者 ChatGPT 之外加深变现。"
    - "多云分发扩大了覆盖，但并未完全消除由 Microsoft 形塑的经济安排。"
    - "高风险部署将比最乐观的自动化叙事更长时间地保持 human-in-the-loop。"
  claimRefs: [C001, C011, C017, C022, C023, C024, C036, C039]
decisionDrivers:
  positives:
    - point: "OpenAI 已覆盖消费者 ChatGPT、企业工作区、API 和政府部署，而不是依赖单一产品界面。"
      importance: high
      claimRefs: [C001, C017]
    - point: "OpenAI 正向更高价值的智能体和编码工作流推进，可在基础提示之外加深嵌入度。"
      importance: high
      claimRefs: [C024]
    - point: "FedRAMP、GSA、Microsoft 和 AWS 路径扩大了企业与公共部门买方的分发与采购选项。"
      importance: medium
      claimRefs: [C017, C019, C022, C023]
    - point: "跨多个行业的具名客户证明表明，其在企业侧具有真实的跨垂直相关性，即使大多数结果仍来自公司整理。"
      importance: medium
      claimRefs: [C025, C028, C029]
  concerns:
    - point: "对于晚期承保决策而言，收入、估值、结构和单位经济性可见度仍过于依赖管理层陈述。"
      importance: high
      claimRefs: [C011, C012, C039]
    - point: "尽管多云灵活性有所提升，Microsoft 仍是主要云与经济合作伙伴。"
      importance: high
      claimRefs: [C021, C022, C023]
    - point: "受监管和高风险用例仍受制于采购、合规、评测和人工复核要求。"
      importance: high
      claimRefs: [C017, C036, C037, C038]
    - point: "竞争性替代方案依然强势，包括捆绑式超大云厂商 copilots、云层模型访问和内部自建。"
      importance: medium
      claimRefs: [C022, C023, C024]
nextDiligence:
  mustAnswer:
    - question: "按消费者、企业、API 与政府业务面划分，经审计或经董事会批准的收入、毛利率和贡献利润率分别是多少？"
      owner: company
      priority: high
    - question: "有哪些客户集中度、毛留存、净留存和 cohort 扩张数据能够支撑企业增长故事？"
      owner: company
      priority: high
    - question: "Microsoft 与 AWS 协议中的精确经济条款、交易量承诺、排他性限制和保留权利是什么？"
      owner: legal
      priority: high
    - question: "Foundation、OpenAI Group PBC、OpenAI OpCo, LLC 和 OpenAI Ireland Limited 如何分配控制权、经济利益和签约责任？"
      owner: legal
      priority: high
    - question: "哪些参考客户能够在不经 OpenAI 介入的情况下，确认付费部署深度、续约意向和实际 ROI？"
      owner: customer
      priority: high
    - question: "如果定价受压或推理成本维持高位，有哪些证据支持下行情景下的韧性？"
      owner: investor
      priority: medium
    - question: "未来 24 个月内，哪些尚未解决的安全、隐私、版权或采购争议可能对增长造成实质损害？"
      owner: expert
      priority: medium
  dataRoomRequests:
    - "过去 24 个月经审计或经董事会批准的财务报表和月度管理账。"
    - "按 ChatGPT 消费者、business、enterprise、API、healthcare、education 和 government 业务面划分的收入、毛利率和贡献利润率。"
    - "前 50 大账户和主要行业的客户集中度、留存、扩张和 cohort 数据。"
    - "完整的 Microsoft 与 AWS 商业协议，包括收入分成、算力承诺、MFN 条款和终止权。"
    - "Foundation 与营利实体层面的最新股权表、实体结构图、董事会构成、保留事项和投资者权利文件。"
    - "涵盖隐私、政府请求、DSA 及行业特定义务的合规、事件和监管报告摘要。"
  expertCalls:
    - "曾经或正在评估 OpenAI 与捆绑式超大云厂商 copilots 及内部自建方案的企业买方。"
    - "能够对算力强度和云合作伙伴杠杆进行压力测试的前沿模型基础设施专家。"
    - "熟悉 FedRAMP、GSA 和机构部署转化的公共部门采购专家。"
    - "覆盖隐私、版权、竞争和政府使用约束的 AI 政策与监管法律顾问。"
    - "来自受监管客户的安全负责人，他们可以验证 OpenAI 的数据处理姿态在供应商选择中有多决定性。"