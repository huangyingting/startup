financialVerdict:
  assessment: uncertain
  rationale: "OpenAI clearly has real monetization surfaces across subscriptions, enterprise seats, APIs, and public-sector deployments, and management-reported scale is extraordinary. But disclosed evidence still falls short of investor-grade economic transparency on audited revenue quality, margins, burn, retention, and customer concentration, while capital intensity and partner-shaped economics remain central."
