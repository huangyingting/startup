unitEconomics:
  arpaOrAcv: "Not publicly disclosed. Seat pricing starts at SGD 25 per user per month for ChatGPT Business, Enterprise is custom priced, and API monetization is usage-based, so account-level economics likely vary widely by segment."
  grossRetention: "Not publicly disclosed. Enterprise deployment depth and workflow integration suggest retention potential, but no public cohort or logo-churn data supports a number."
  netRetention: "Not publicly disclosed. Cross-sell from consumer familiarity into enterprise seats, agents, and API usage could support positive net retention, but OpenAI does not publicly quantify it."
  cacPayback: "Not publicly disclosed. Blended payback is likely highly variable because self-serve consumer and developer funnels coexist with sales-assisted enterprise motion and procurement-heavy government channels."
  contributionMargin: "Not publicly disclosed. Contribution economics likely differ sharply by surface, with token-intensive API usage and newly compliant government deployments potentially lower margin than mature seat-based enterprise subscriptions."
