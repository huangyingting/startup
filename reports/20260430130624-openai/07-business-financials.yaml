knownFinancials:
  revenue: "OpenAI claims roughly $2 billion of revenue per month as of March 2026, but this figure is not independently corroborated in this standard-depth pass."
  arr: "No separate ARR disclosure is public in the retained evidence. If the $2 billion monthly revenue claim were sustained for 12 months, the implied annualized run rate would be about $24 billion, but that is a low-confidence annualization rather than a reported ARR figure."
  grossMargin: "Not publicly disclosed. Margin quality is uncertain and could sit below mature SaaS norms because usage-based inference costs, cloud dependence, and revenue-share obligations remain visible."
  burnRate: "Not publicly disclosed. The need for extraordinary capital alongside continued frontier-model and infrastructure expansion suggests burn may still be very high in absolute dollars despite large claimed revenue."
  cashRunway: "Not publicly disclosed. The March 2026 financing materially improves liquidity, but runway still depends on compute, infrastructure, and product-expansion spend that is not broken out publicly."
