- id: TI005
  title: Public financial gaps table
  columns:
  - Missing Metric
  - Impact on Underwriting
  - Exact Diligence Path
  rows:
  - - US-only revenue and GMV
    - High — US is fastest-growth market; essential for TAM capture modeling
    - Request US geographic segment from Investor Relations; monitor 20-F/10-K segment notes
  - - Per-product gross margin
    - High — MDR margin vs. consumer interest margin differ structurally
    - SEC 10-K segment reporting (first annual post-IPO filing expected 2026)
  - - Consumer CAC by market
    - High — validates LTV/CAC investment thesis
    - Request cohort-level CAC data from CFO in management meeting
  - - Credit loss curves by vintage
    - High — credit risk underwriting requires loss-at-origination curves
    - Request vintage default data; use Affirm 10-K as comparable proxy
  - - Exact merchant MDR schedule by tier
    - Medium — pricing power indicator; signals competitive moat
    - Obtain merchant contract template via channel checks or IR
  - - Operating cash flow bridge
    - Medium — quality of cash generation relative to GAAP earnings
    - Request operating CF bridge from IR; post-IPO cash flow statement required in 20-F
  claimRefs:
  - CI034
  - CI035
  - CI036
  - CI037
  - CI038
  - CI039
  - CI040
  notes: Gaps are prioritized by underwriting impact. Items marked High are blocking for full investment underwriting. US
    segment and credit loss vintage data are the two most critical requests.
