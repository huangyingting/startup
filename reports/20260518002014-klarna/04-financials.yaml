    nodes:
    - label: Consumer purchase on Klarna
      detail: 'GMV: $105B (2024) across 93M active consumers'
    - label: Merchant transaction commission (MDR)
      detail: ~1.5–3.5% + fixed fee per transaction; est. 60–65% of total revenue
    - label: Consumer interest & financing income
      detail: Interest on Pay Later, monthly instalment, and Klarna Financing products; est. ~20% of revenue
    - label: Consumer service fees & late fees
