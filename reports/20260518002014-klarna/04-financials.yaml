- id: section-2
  title: Unit economics and cost structure
  body: "Klarna's gross profit margin is estimated at approximately 55–58% in 2024, broadly consistent with public BNPL peer\
    \ Affirm (57% FY2024). The primary cost within gross margin is the net credit loss rate on BNPL receivables, estimated\
    \ at 0.5–0.7% of GMV, or approximately $520–735M annually on a $105B GMV base. This credit loss rate is the single largest\
    \ variable cost driver and is macro-sensitive: rising consumer delinquencies in a downturn could rapidly erode the gross\
    \ margin. \n\nOperating expenses include technology and engineering, marketing and sales, and general and administrative\
    \ costs. Klarna claimed that AI automation reduced customer service equivalent headcount by approximately 700 positions\
    \ in 2024, contributing to operating efficiency. Despite this, operating income remained negative at approximately -$121M,\
    \ with net profitability achieved through other income (likely interest on cash balances and FX gains). Operating margin\
    \ was approximately -4.3%, indicating the business is not yet generating positive cash from core operations at scale.\
    \ \n\nConsumer acquisition cost (CAC) is not publicly disclosed. Analyst estimates suggest a blended CAC of $10–20 per\
    \ consumer, implying a payback period of roughly 1–2 years on $30 revenue per user and 55–58% gross margins. The LTV/CAC\
    \ ratio is estimated above 2x by analysts but exact cohort data is a critical gap. GMV per active consumer of ~$1,129\
    \ in 2024 implies moderate purchase frequency (roughly 5–8 purchases annually) and moderate average order values. US-specific\
    \ unit economics are not separately disclosed, a material gap for underwriting the fastest-growing Klarna market."
  tableRefs:
  - TI003
  figureRefs:
  - FI002
  - FI003
  claimRefs:
