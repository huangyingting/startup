  evidenceGaps:
  - type: missing-data
    severity: blocking
    topic: US-specific financial metrics
    missingEvidence: Klarna does not separately disclose US revenue, GMV, CAC, credit loss rates, or gross margin in its S-1
      or press releases. All disclosed metrics are consolidated global figures.
    whyItMatters: The US market is Klarna's fastest-growth geography. Without US-specific data, underwriting the US opportunity,
      competitive positioning against Affirm, and US regulatory risk is impossible.
    diligencePath: Request a geographic segment breakdown in the investor relations management meeting; monitor the first
      post-IPO 20-F annual report (FY2025) for geographic segment disclosure.
    relatedQuestionRefs:
    - QI022
  - type: missing-data
    severity: blocking
    topic: Credit loss curves by vintage and product
    missingEvidence: Klarna discloses a blended net credit loss rate but does not publish loss curves by origination vintage,
      product type (Pay in 4 vs. monthly installments), or geography.
    whyItMatters: Vintage-level credit loss data is essential for underwriting credit risk. A rising loss rate on newer vintages
      could indicate credit book deterioration not visible in the blended headline figure.
    diligencePath: Request vintage loss curve data from the CFO in the management meeting; alternatively, use Affirm's 10-K
      vintage disclosures as a proxy to cross-check plausibility.
    relatedQuestionRefs:
    - QI010
  - type: missing-data
    severity: material
    topic: Disaggregated gross margin by revenue stream
    missingEvidence: Klarna does not disclose gross margin by revenue segment (merchant MDR vs. consumer interest income vs.
      subscription fees). The overall ~55–58% figure may mask very different margin profiles across streams.
    whyItMatters: If consumer interest income (higher credit risk, longer duration) carries significantly lower gross margins
      than merchant MDR, the revenue mix shift toward financing would be a margin headwind not visible in blended figures.
    diligencePath: Review SEC 10-K segment reporting in the first post-IPO FY2025 20-F; request segment margin breakdown from
      the CFO in due diligence.
    relatedQuestionRefs:
    - QI004
    - QI008
  - type: missing-data
    severity: material
    topic: CET1 regulatory capital ratio and capital adequacy details
    missingEvidence: Klarna Bank AB's CET1 capital ratio and detailed regulatory capital adequacy metrics are not disclosed
      in the S-1 or pre-IPO press releases.
    whyItMatters: As a licensed bank, Klarna must maintain minimum CET1 ratios. If capital is near minimum thresholds, it
      limits dividend capacity, share buybacks, and expansion; a below-minimum ratio is a regulatory event.
    diligencePath: Request Finansinspektionen regulatory filings (Pillar 3 disclosure); post-IPO, this will be disclosed in
      the FY2025 20-F banking subsidiary footnotes.
    relatedQuestionRefs:
    - QI019
