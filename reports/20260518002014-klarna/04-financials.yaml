company:
  name: Klarna
chapter:
  number: 4
  title: Financials
  summary: Klarna reported 2024 revenue of $2.81B (up 24% YoY) and net income of $21M — its first annual profit since 2018.
    Merchant fees (MDR) account for an estimated 60–65% of revenue; consumer interest income, Klarna Plus subscriptions, and
    Klarna Balance contribute the balance. Gross margins run approximately 55–58%. Credit loss rates (~0.6% of GMV on $105B
    in GMV) are a key lever. The September 2025 NYSE IPO raised $1.37B at $40/share (~$15B market cap). A Swedish banking
    license enables deposit-funded receivables, reducing wholesale funding dependence. Thin net margins, undisclosed US-specific
    economics, and credit-quality sensitivity to macro conditions are the primary diligence blockers.
