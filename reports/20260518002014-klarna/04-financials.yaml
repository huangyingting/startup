- id: FI001
  title: Revenue model bridge
  type: flow
  description: How consumer shopping activity on Klarna converts through merchant fees, consumer financing, and subscriptions
    into gross revenue and gross profit.
  claimRefs:
  - CI004
  - CI005
  - CI007
  - CI013
  - CI014
  approximationNotes: Revenue stream percentages (60–65% merchant fees, ~20% consumer interest) are analyst estimates derived
    from S-1 segment disclosures; not separately audited by Klarna.
