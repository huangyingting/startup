  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: Consumer cohort repeat purchase rates
    missingEvidence: Klarna does not publicly disclose consumer cohort repeat purchase rates, purchase frequency by vintage, or consumer churn rates. All available consumer metrics are aggregate headcounts, not cohort-level retention data.
    whyItMatters: Repeat purchase rate is the single most important indicator of consumer loyalty and lifetime value. Without cohort data, it is impossible to independently validate Klarna's consumer engagement economics or project LTV with confidence.
    diligencePath: Request cohort-level consumer repeat purchase data from Klarna management in due diligence; request at least three annual cohort vintages showing purchase frequency and spend per cohort over time.
    relatedQuestionRefs:
    - QU003
    - QU021
    relatedTableRefs:
    - TU004
  - type: private-evidence-only
    severity: blocking
    topic: Merchant net revenue retention and gross revenue retention
    missingEvidence: Klarna does not publicly disclose merchant NRR, GRR, or cohort-level merchant spending data. There is no public evidence of merchant revenue expansion rates or churn rates across the 850K merchant base.
    whyItMatters: Merchant NRR is the primary indicator of B2B customer health and pricing power. Undisclosed NRR makes it impossible to assess whether Klarna's merchant base is growing in value per account or experiencing churn-driven revenue erosion.
    diligencePath: Request merchant NRR and GRR from CFO in management meeting; ask for merchant cohort GMV contribution curves by tenure covering Year 1 vs Year 3 merchant cohort GMV contribution.
    relatedQuestionRefs:
    - QU004
    relatedTableRefs:
    - TU004
  - type: missing-source
    severity: material
    topic: Independent audit of merchant conversion uplift claims
    missingEvidence: Klarna's claimed 25-30% checkout conversion uplift is a company-stated figure without published independent academic, consulting, or third-party validation. No peer-reviewed or independently verified study confirming this range is available in public sources.
    whyItMatters: The conversion uplift claim is central to Klarna's merchant sales pitch and justifies merchant fee rates. If actual uplift is lower, Klarna's pricing power and merchant retention thesis are weakened.
    diligencePath: Request independent merchant A/B test data from Klarna; survey 2-3 named merchants directly to validate actual conversion lift; search for independent academic research on BNPL conversion effects.
    relatedQuestionRefs:
    - QU005
    relatedTableRefs:
    - TU003
  - type: enumeration-incomplete
    severity: minor
    topic: Named merchant list completeness across 850K merchant base
    missingEvidence: Publicly available named merchant evidence covers approximately 10-15 major enterprise merchants out of a total base of 850,000. The vast majority of Klarna's merchants are SMBs whose individual contribution to GMV, integration depth, and retention status is unknown.
    whyItMatters: Merchant base quality and concentration risk cannot be assessed from the visible enterprise merchant sample alone. If a significant share of GMV is concentrated in a small number of top merchants, loss of any one could be material.
    diligencePath: Request the top-50 or top-100 merchants by GMV contribution; assess HHI concentration index; ask for churn rate across SMB vs enterprise merchant tiers.
    relatedQuestionRefs:
    - QU006
    relatedTableRefs:
    - TU003

