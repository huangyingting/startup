- id: FU002
  title: Adoption / deployment funnel
  type: flow
  description: >-
    End-to-end flow illustrating how a consumer discovers, selects, checks out, and repays
    using Klarna BNPL, and how this generates merchant and Klarna revenue.
  claimRefs:
  - CU018
  - CU019
  - CU034
  - CU035
  - CU036
  approximationNotes: >-
    Conversion uplift (25-30%) is a company-claimed figure from Klarna merchant marketing materials;
    no independent audit has verified this range. Payment step timing is drawn from Klarna's official
    product pages.
  data:
    nodes:
    - label: Consumer Discovery
      detail: "Consumer discovers merchant via Klarna app shopping feed (150M+ listings), PriceRunner price comparison, or direct merchant visit"
    - label: Merchant Checkout with Klarna
      detail: "Consumer selects Klarna at checkout; Klarna logo displayed as trusted payment option alongside cards and PayPal"
    - label: Klarna Instant Credit Decision
      detail: "Klarna performs real-time soft credit check; approves instalment plan in seconds; no hard credit pull for Pay in 4"
    - label: Consumer Selects Payment Plan
      detail: "Consumer chooses Pay in 4 (interest-free), Pay in 30 days, or monthly instalment (6-36 months); clear repayment schedule shown"
    - label: Purchase Completed
      detail: "Merchant receives full payment from Klarna immediately; claimed 25-30% conversion uplift and higher AOV vs non-BNPL checkout"
    - label: Merchant Pays Klarna MDR
      detail: "Merchant pays ~1.5-3.5% + fixed fee per transaction to Klarna; Klarna absorbs consumer credit risk"
    - label: Consumer Repayment to Klarna
      detail: "Consumer repays Klarna per agreed schedule; late fees or interest may apply on financing products; Klarna manages collections"
    - label: Klarna Revenue Recognised
      detail: "Klarna earns merchant MDR (primary), consumer interest and fees (secondary), and Klarna Plus subscription revenue (tertiary)"

