- id: section-5
  title: Customer expansion dynamics and strategic outlook
  body: >-
    Klarna's customer expansion strategy combines geographic deepening in the US with vertical
    extension across new categories and product-led consumer monetisation. US expansion has been
    accelerating in 2024–2025, with new enterprise merchant partnerships, increasing Klarna Plus
    subscription uptake, and growth in the Klarna Card user base signalling a broadening of Klarna's
    consumer wallet share. The US market is now a primary growth driver, representing the highest-
    opportunity geography for Klarna given the size of the American e-commerce market and BNPL
    penetration remaining well below European levels.


    On the product side, the basket size uplift and conversion rate improvements are the most
    important value drivers for merchant expansion. As Klarna adds more enterprise merchants, it
    creates a flywheel: more merchants attract more consumers, more consumers attract more merchants,
    and deeper consumer data enables better risk assessment and personalised offers. The shopping
    feed's 150 million product listings and PriceRunner's price comparison capability are strategic
    assets in this flywheel, making Klarna increasingly a destination shopping platform rather than
    a pure payment facilitator.


    The key strategic risks to expansion are regulatory in nature — CFPB oversight and FCA formal
    regulation of BNPL could impose credit checks, disclosure requirements, or fee caps that
    increase consumer friction and reduce conversion rates. Alongside regulatory risk, the
    concentration of GMV in a small number of enterprise merchants creates tail risk around
    partnership continuity. The combination of undisclosed cohort retention metrics, company-claimed
    conversion data, and adverse consumer harm evidence means the customer chapter requires
    material management-level diligence before expansion assumptions can be underwritten with
    confidence. Klarna's 26-country footprint and 850,000-merchant network provide substantial
    diversification, but the depth of evidence for each segment varies considerably and the
    diligence gaps on retention are blocking for full investment underwriting.
  claimRefs:
  - CU033
  - CU034
  - CU035

tables:
- id: TU001
  title: Customer segmentation table
  columns:
  - Segment
  - Buyer / User / Payer
  - Use Case
  - Geographic Scale
  - Revenue / Strategic Value
  - Evidence Quality
  - Diligence Gap
  rows:
  - - B2C Gen Z/Millennial (US)
    - Consumer (individual buyer)
    - Fashion, electronics, beauty, home goods — pay in instalments
    - US (launched 2015; accelerating 2024-2025)
    - High — largest growth market; primary GMV driver in US expansion
    - Medium — demographics from analyst reports; no Klarna-disclosed age breakdown
    - US-specific consumer repeat purchase rate and cohort LTV
  - - B2C Gen Z/Millennial (Europe)
    - Consumer (individual buyer)
    - Fashion, electronics, travel — mature market with high BNPL penetration
    - EU (Sweden, Germany, UK, Netherlands, Nordics core)
    - High — established base; deep merchant network; banking licence market
    - Medium — European consumer data inferred from SEC F-1 aggregate figures
    - European cohort churn and per-market revenue per consumer breakdown
  - - B2B SMB Merchant
    - Merchant (business buyer of Klarna services)
    - E-commerce checkout BNPL via Shopify/WooCommerce plugin
    - Global (850K merchants; majority are SMBs)
    - Medium — high count but lower per-merchant GMV; long-tail revenue driver
    - Low — no public data on SMB merchant retention, GMV per account, or churn
    - SMB merchant NRR, churn rate, and average GMV per SMB account
  - - B2B Enterprise Merchant
    - Merchant (strategic partner)
    - Custom checkout integration; co-marketing; data sharing
    - Global (H&M, ASOS, Nike, Macy's, Sephora, eBay, Expedia, Etsy, Instacart)
    - High — concentrated GMV; enterprise NRR drives revenue quality
    - Medium — named merchant presence confirmed but outcome metrics undisclosed
    - Enterprise merchant NRR, GMV concentration HHI, and contract renewal terms
  - - B2B Developer / Platform
    - Developer or platform integrating Klarna via API
    - API-based checkout integration; open banking products
    - Global — platform-agnostic; any e-commerce stack
    - Medium — growing but revenue contribution undisclosed; strategic for API moat
    - Low — developer review signals from Shopify App Store but no outcome metrics
    - API integration volume, developer NPS, platform-driven GMV contribution
  - - B2C High-Value Card or Plus User
    - Consumer with Klarna Card or Klarna Plus subscription
    - In-store and online spending via Klarna Card; $7.99/month premium benefits
    - US (Klarna Plus) and select EU markets (Klarna Card)
    - High — 4M Klarna Card users; Plus subscribers more monetised per consumer
    - Medium — card user count from company disclosure; Plus subscriber count undisclosed
    - Klarna Plus subscriber count, churn rate, and ARPU versus non-Plus consumers
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU015
  - CU016
  - CU024
  - CU029
  notes: Segmentation is derived from SEC F-1, official Klarna product pages, and independent analyst sources. SMB merchant metrics are particularly sparse; enterprise merchant outcomes are confirmed at integration level only without disclosed GMV or NRR data.

