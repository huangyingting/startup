company:
  name: Klarna
chapter:
  number: 6
  title: Customers
  summary: >-
    Klarna serves 114 million consumers globally as of late 2025, up from 93 million active
    consumers at end-2024, operating across 26 countries with a network of 850,000 merchants.
    The consumer base skews heavily toward Gen Z and Millennials, with fashion, electronics,
    travel, and beauty as top categories. Named enterprise merchants include H&M, ASOS, Nike,
    Macy's, Sephora, Expedia, eBay, Etsy, and Instacart, reflecting breadth across verticals.
    GMV reached $105B in 2024, implying strong volume per consumer. Klarna's merchant value
    proposition centres on a claimed 25-30% conversion uplift at checkout and higher average
    order values, though these figures are company-claimed and lack independent audit. Adverse
    evidence exists: Guardian reporting and CFPB scrutiny document consumer debt concerns and
    regulatory risk. Retention metrics — merchant NRR, consumer repeat-purchase rates — are
    not publicly disclosed, representing blocking diligence gaps. Klarna Card has attracted
    four million users, and Klarna Plus at $7.99/month is growing but subscriber counts are
    undisclosed. US expansion is accelerating, but concentration in top merchants and
    unverified conversion claims are material risks requiring management-level diligence.
acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: "Several merchant-side sources (Nike, Macy's, Sephora, ASOS) are official brand pages confirming integration but do not provide independent outcome metrics. Consumer and merchant statistics are primarily drawn from Klarna's own SEC F-1 filing and company press materials corroborated by Bloomberg and CNBC."
  - dimension: paywallRisk
    reason: "Bloomberg and some analyst sources are paywall-protected. Key consumer and merchant statistics are independently corroborated via SEC F-1 filing, CNBC, Observer, and publicly accessible official sources."
  - dimension: fetchTrailMissing
    reason: "All source URLs were researched against publicly available reports, regulatory documents, company filings, and news publications. Source URLs and metadata are recorded in localEvidence.sources with full provenance as of the 2026-05-18 run date."

