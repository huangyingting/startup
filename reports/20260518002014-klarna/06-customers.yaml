- id: section-3
  title: Merchant value proposition and conversion evidence
  body: >-
    Klarna's core merchant value proposition rests on three pillars: checkout conversion uplift,
    average order value (AOV) improvement, and access to Klarna's consumer network for discovery and
    traffic generation. The company claims merchants using Klarna see a 25 to 30 percent uplift in
    checkout conversion rates relative to standard checkout without BNPL. It also claims that
    merchants see meaningfully higher average basket sizes when Klarna is available. These claims are
    central to Klarna's pricing power: they justify merchant acceptance of a 1.5–3.5 percent plus
    fixed-fee MDR that is at or above competitive BNPL pricing.


    The merchant conversion claim is internally consistent with observed BNPL industry dynamics —
    consumers who face a large upfront payment are more likely to abandon checkout, and BNPL
    instalment options remove this friction. However, the 25–30% conversion uplift figure originates
    from Klarna's own merchant-facing marketing materials and case studies, with no published
    independent third-party audit, academic study, or controlled A/B test corroborating the specific
    range. The actual uplift likely varies substantially by merchant vertical, consumer demographic,
    average order value, and competing payment options at checkout, making a single claimed figure
    inherently difficult to generalise.


    Klarna's consumer app shopping feed — featuring more than 150 million product listings — is an
    additional demand-generation asset for merchants. The feed functions as a product discovery engine,
    routing Klarna consumers toward participating merchants and creating an incremental traffic channel
    distinct from paid media. PriceRunner, acquired in 2022, supplements this with B2C price
    comparison functionality, directing consumers toward Klarna-integrated merchants who offer the best
    price for a given product. Merchant switching costs are reinforced by deep integration into checkout
    stacks, order management systems, and ERP workflows, creating structural inertia that depresses
    churn even when competing BNPL offers exist. The basket size uplift claim and the shopping feed
    traffic are company-claimed benefits that would benefit from independent merchant-level verification
    during diligence. The customer proof matrix figure in this chapter visualises evidence quality and
    production maturity across named merchant relationships.
