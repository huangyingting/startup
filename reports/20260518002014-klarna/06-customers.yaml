- id: TU005
  title: Expansion and concentration risk table
  columns:
  - Expansion Driver
  - Concentration Risk
  - Impact Level
  - Mitigation
  - Diligence Path
  rows:
  - - US enterprise merchant additions (Macy's, Nike, Sephora)
    - Geographic concentration — US enterprise relationships are few and high-GMV
    - High — loss of one top-10 US merchant could be material to US GMV
    - Broad SMB merchant base offsets top-account loss; switching costs reduce churn probability
    - Request top-10 merchant GMV contribution and contract renewal visibility from management
  - - Klarna Plus subscription growth ($7.99/month)
    - Consumer product concentration — Plus revenue depends on US consumer uptake
    - Medium — undisclosed subscriber base; if small, plus revenue is immaterial
    - Geographic diversification of Plus into EU markets; product stickiness from fee waivers
    - Request Klarna Plus subscriber count, churn rate, and ARPU from management
  - - Consumer app shopping feed (150M product listings)
    - Platform concentration — feed engagement depends on Klarna app adoption
    - Medium — if consumers use Klarna only at merchant checkout, feed engagement is limited
    - PriceRunner integration drives pre-purchase consumer discovery and feed traffic
    - Track app MAU trend; request feed-driven GMV attribution from Klarna management
  - - Cross-vertical expansion (grocery, travel, home goods)
    - Category concentration reduction — diversification away from fashion and electronics
    - Low — diversification reduces vertical concentration risk over time
    - Fashion remains dominant; travel and grocery BNPL adoption is nascent
    - Monitor vertical GMV share annually; assess travel BNPL regulatory treatment separately
  claimRefs:
  - CU033
  - CU034
  - CU035
  - CU036
  notes: Expansion driver and concentration risk assessment is based on public sources and company disclosures. Actual GMV concentration by merchant and vertical is not publicly disclosed and must be requested in diligence.

