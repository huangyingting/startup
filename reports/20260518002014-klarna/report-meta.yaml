companyProfile:
  summary: Klarna Group plc is a London-domiciled, Stockholm-founded fintech that pioneered buy-now-pay-later installment
    payments and has expanded into consumer banking lite, price comparison, and stablecoin payments. It completed a long-delayed
    NYSE IPO in September 2025 at $40/share, raising $1.37B at a first-day valuation exceeding $17B. Public evidence supports
    genuine scale, first annual net profit in 2024, and a broad product surface, but operating losses persist and post-IPO
    quarterly earnings showed a loss, making the profitability trajectory uncertain.
  foundedDate: '2005-01-01'
  founders:
    - name: Sebastian Siemiatkowski
      role: Co-founder / CEO
      background: Swedish entrepreneur who has led Klarna from founding to NYSE IPO; holds approximately 8% equity post-IPO
        and enhanced Class C voting rights.
      claimRefs: []
    - name: Niklas Adalberth
      role: Co-founder (departed 2015)
      background: Co-founder who left in 2015; controversial for describing delinquent consumers as best customers.
      claimRefs: []
    - name: Victor Jacobsson
      role: Co-founder
      background: Co-founder who has taken a lower public profile as Klarna scaled; reportedly holds shares via opaque structure.
      claimRefs: []
  foundingLocation: Stockholm, Sweden (Stockholm School of Economics entrepreneurship competition origin)
  headquarters: London, UK (10 York Road, SE1 7ND) / Stockholm operational HQ
  productSummary: Klarna sells BNPL installment products (Pay in 3/4, Pay Later 30 days), a Klarna Card, longer-term financing,
    a shopping app with price comparison and cashback, Klarna Plus subscription, and the KlarnaUSD stablecoin launched
    in November 2025.
  customerFocus: Gen Z and Millennial online shoppers (114M consumers) plus 850,000 e-commerce and retail merchants globally,
    with US as primary growth market.
  businessModel: Merchant fee revenue (primary, typically 2-8% per transaction) plus consumer late fees, financing income
    on longer-term installments, subscription revenue (Klarna Plus), and advertising/media revenue via Klarna App.
  stage: Public (NYSE KLAR, IPO September 2025)
  fundingStatus: Public company since September 2025 IPO at $40/share, raising $1.37B. Prior private rounds included $639M
    at $45.6B peak in June 2021 and a $800M down round at $6.7B in July 2022.
  disclosureProfile: public
  claimRefs: []
