        title: Exhibits
        blocks:
          - type: callout
            title: Klarna is the most globally scaled independent BNPL operator
            body: >-
              With 114 million consumers, 850,000 merchants, and $2.81 billion in revenue across 26 countries, Klarna
              has built a BNPL platform that no independent competitor has matched in geographic breadth and consumer
              reach. The NYSE IPO and Swedish banking license give it regulatory credibility and access to capital that
              most BNPL challengers lack.
