      - number: '7.2'
        title: Operational, security, and technology risks
        blocks:
          - type: paragraph
            body: >-
              Klarna operational, security, and technology risk profile reflects the inherent challenges of building
              large-scale consumer financial infrastructure at speed. The most documented security incidents are the May
              2021 data breach, in which a software bug caused users to see other users account information including
              transaction history and partial payment details, and the August 2020 autofill vulnerability reported by
              Der Spiegel, which exposed personal and payment data to third-party websites. While Klarna stated both
              issues were resolved promptly, the extent of post-incident security hardening and independent security
              certification is not publicly documented, leaving residual uncertainty about the robustness of remediation
              measures. No publicly available SOC 2 Type II, ISO 27001, or PCI-DSS certification status has been
              confirmed for all relevant system components. 


              The UK ICO opened an investigation into Klarna data practices in 2020, adding regulatory scrutiny to the
              privacy risk picture. Across more than 26 countries, compliance with GDPR, UK GDPR, and equivalent
              national data protection frameworks creates ongoing data governance overhead and heightened risk of
              recurrent regulatory action, as evidenced by the 2022 IMY fine. Identity theft and unauthorized account
              fraud exploiting Klarna quick-approval BNPL process represent additional operational risk dimensions with
              reputational and regulatory exposure. 


              The AI-driven operational transformation presents significant execution risk. CEO Sebastian Siemiatkowski
              publicly claimed in late 2024 that AI had effectively replaced 700 customer service agents and that AI
              quality exceeded that of human agents. By May 2025, he had publicly backtracked, acknowledging that AI
              quality had not met expectations and that human agents remained necessary for complex interactions. This
              reversal illustrates the risk that AI-dependent operational efficiency savings are overstated and that
              consumer service quality could deteriorate, triggering regulatory attention in markets requiring adequate
              consumer redress mechanisms for financial services. 


              Technology dependencies on major cloud infrastructure providers and on Visa and Mastercard rails for
              Klarna Card represent operational concentration risks that could disrupt transaction processing globally
              if a key dependency fails. As AI-powered automated underwriting expands into regulated US and UK lending
              markets, credit decisioning bias and fair lending compliance risk represent growing operational risk
              dimensions requiring proactive regulatory documentation and model governance.
