      - number: '6.5'
        title: Customer expansion dynamics and strategic outlook
        blocks:
          - type: paragraph
            body: >-
              Klarna's customer expansion strategy combines geographic deepening in the US with vertical extension
              across new categories and product-led consumer monetisation. US expansion has been accelerating in
              2024–2025, with new enterprise merchant partnerships, increasing Klarna Plus subscription uptake, and
              growth in the Klarna Card user base signalling a broadening of Klarna's consumer wallet share. The US
              market is now a primary growth driver, representing the highest- opportunity geography for Klarna given
              the size of the American e-commerce market and BNPL penetration remaining well below European levels.


              On the product side, the basket size uplift and conversion rate improvements are the most important value
              drivers for merchant expansion. As Klarna adds more enterprise merchants, it creates a flywheel: more
              merchants attract more consumers, more consumers attract more merchants, and deeper consumer data enables
              better risk assessment and personalised offers. The shopping feed's 150 million product listings and
              PriceRunner's price comparison capability are strategic assets in this flywheel, making Klarna
              increasingly a destination shopping platform rather than a pure payment facilitator.


              The key strategic risks to expansion are regulatory in nature — CFPB oversight and FCA formal regulation
              of BNPL could impose credit checks, disclosure requirements, or fee caps that increase consumer friction
              and reduce conversion rates. Alongside regulatory risk, the concentration of GMV in a small number of
              enterprise merchants creates tail risk around partnership continuity. The combination of undisclosed
              cohort retention metrics, company-claimed conversion data, and adverse consumer harm evidence means the
              customer chapter requires material management-level diligence before expansion assumptions can be
              underwritten with confidence. Klarna's 26-country footprint and 850,000-merchant network provide
              substantial diversification, but the depth of evidence for each segment varies considerably and the
              diligence gaps on retention are blocking for full investment underwriting.
            claimRefs:
              - CU033
              - CU034
              - CU035
  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk landscape
        blocks:
          - type: paragraph
            body: >-
              Klarna operates under one of the most complex regulatory environments of any fintech company, spanning
              overlapping consumer credit, banking, data protection, and payments regulations across more than 26
              countries. The most material near-term regulatory risk is the UK Financial Conduct Authority forthcoming
              BNPL regulatory regime, developed through consultation paper CP23/10. The FCA proposes to bring BNPL
              within the consumer credit perimeter, requiring mandatory creditworthiness assessments before credit is
              granted, compliance with financial promotion rules, and implementation of consumer redress mechanisms.
              This is expected to reduce Klarna UK BNPL approval rates by an estimated 10 to 25 percent, directly
              reducing UK GMV and merchant fee revenue. The effective date of approximately 2026 creates near-term
              implementation pressure across Klarna UK operations. 


              At the EU level, the revised Consumer Credit Directive 2 extends mandatory credit assessments to BNPL
              products across EU member states, with national transposition creating a patchwork of implementation
              timelines. Klarna largest European markets including Germany, Sweden, and the Netherlands are all in
              scope. In the US, the CFPB has documented consumer harm from BNPL products including risks from consumers
              using multiple BNPL products simultaneously, absence of credit bureau reporting, and elevated delinquency
              rates; the CFPB has designated Klarna a larger participant subject to supervisory examination, and adverse
              enforcement actions remain a credible risk. Australia ASIC enacted credit licensing requirements for BNPL
              providers from November 2022, imposing additional compliance overhead and responsible lending obligations
              on Klarna Australia operations. 


              Sweden Finansinspektionen subjects Klarna Bank AB to full banking supervision, including minimum CET1
              capital ratio requirements that create a permanent capital constraint not faced by unlicensed BNPL
              competitors. On data protection, the 2022 Swedish IMY GDPR fine of 7.5 million SEK and the UK ICO 2020
              investigation demonstrate Klarna ongoing exposure to data privacy enforcement. The German Federal Court of
              Justice ruled Klarna EUR 1.20 email invoicing fee illegal in 2021, establishing an adverse legal precedent
              on fee practices. Across all these jurisdictions, mandatory credit check requirements represent the single
              largest regulatory revenue risk given their direct impact on approval rates and transaction volumes, while
              multi-jurisdictional data protection obligations compound the compliance burden across the full operating
              footprint.
