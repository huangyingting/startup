      - number: '4.4'
        title: Financial verdict and diligence blockers
        blocks:
          - type: paragraph
            body: >-
              Klarna's 2024 profitability milestone is strategically significant but financially fragile. A net margin
              of approximately 0.7% ($21M on $2.81B) provides minimal cushion against credit loss spikes or revenue
              deceleration. The operating loss of ~$121M means core operations are not yet self-sustaining at a cash
              level, and the path to operating profitability depends on continued margin expansion in a competitive BNPL
              market. 


              Revenue quality is medium: the dominant merchant fee stream is transactional and recurring but subject to
              volume risk and merchant fee compression. Competition from Affirm, PayPal Pay in 4, Block's Afterpay, and
              increasingly bank-issued BNPL products is intensifying merchant negotiating power, creating structural MDR
              compression risk over the medium term. Consumer interest income is growing but carries more credit risk.
              Klarna Plus subscription revenue is nascent and its scale is undisclosed. 


              Capital intensity is moderate-to-high for a fintech: the banking license, regulatory capital requirements,
              and BNPL receivables portfolio make Klarna more capital-intensive than pure software platforms. The IPO
              proceeds provide near-term runway, but sustained international expansion will require ongoing capital
              deployment. 


              The primary diligence blockers are: (1) US-specific financial metrics, which are undisclosed but critical
              for the fastest-growing market; (2) per-vintage credit loss curves, needed to underwrite default risk; (3)
              disaggregated gross margins by revenue stream; (4) the CET1 regulatory capital ratio. Klarna's first
              post-IPO public financial filings (Q4 2025 and FY2025 20-F) will be the most important data catalysts for
              resolving these gaps.
