      - number: '8.2'
        title: Valuation Context and IPO Pricing Analysis
        blocks:
          - type: paragraph
            body: >-
              Klarna's valuation history is a study in fintech sentiment cyclicality. The June 2021 peak of $45.6
              billion reflected peak BNPL enthusiasm and zero-interest-rate-policy excess: SoftBank led a $639 million
              financing round at a multiple that implied Klarna would ultimately capture the majority of global payments
              infrastructure. By July 2022, rising interest rates, regulatory headwinds, and consumer credit
              deterioration had compressed the valuation to $6.7 billion — an 85% decline from peak. February 2025
              analyst estimates placed the pre-IPO valuation at approximately $15 billion, consistent with the IPO
              pricing of $40 per share. The April 2025 IPO delay due to Trump tariff-related market volatility pushed
              the listing to September 2025, where the debut cleared successfully.

              At IPO pricing, Klarna's revenue multiple of approximately 6x (based on $2.81 billion in LTM revenue and
              the $15–17 billion market capitalization) represents a premium to pure-play US BNPL peer Affirm, which
              trades at approximately 3–4x EV/Revenue. Klarna commands this premium due to geographic breadth across 45+
              countries, Swedish banking license enabling lower deposit-funded cost of capital, and longer BNPL
              operating history. However, the premium is constrained by Klarna's negative operating income (-$121
              million), the post-IPO Q3 2025 quarterly loss reported by the Observer, and operating expenses exceeding
              investor expectations. The operating loss of -$121 million despite net profitability reflects
              non-operating gains and GAAP timing items, not core operating leverage. At the first-day valuation of >$17
              billion, the implied P/E multiple on FY2024 net income of $21 million exceeds 800x, making profitability
              trajectory — not current earnings — the central valuation driver.

              Goldman Sachs, JPMorgan, Morgan Stanley, Bank of America, Citigroup, and Deutsche Bank served as IPO
              underwriters, ensuring institutional distribution quality and broad investment bank sponsorship. The fully
              diluted market capitalization at $40/share was approximately $15 billion, rising to >$17 billion on
              first-day trading enthusiasm. Both figures are well below the 2021 peak and represent what management
              characterized as a disciplined, fundamentals-anchored IPO price.
