      - number: '5.4'
        title: Trust, Security, Privacy, and Compliance Controls
        blocks:
          - type: paragraph
            body: >-
              Klarna's trust and compliance posture is shaped by its status as a licensed bank operating across 26
              regulatory jurisdictions under divergent regulatory frameworks. Its Swedish banking license — held through
              Klarna Bank AB and supervised by Finansinspektionen — subjects it to full EU banking regulation, including
              capital requirements, consumer credit disclosure standards under the Consumer Credit Directive, and AML
              and KYC obligations. In the UK, the FCA's forthcoming BNPL authorization requirement, consulted upon in
              CP23/10, will require Klarna to obtain FCA consumer credit authorization and comply with creditworthiness
              assessment obligations, adding regulatory burden and potentially requiring product design changes. In the
              US, the CFPB's 2023 BNPL interpretive guidance established requirements for BNPL providers to extend
              dispute rights and refund protections comparable to those required under Regulation Z for credit cards,
              creating compliance obligations Klarna must operationalize at scale.

              On security and privacy, Klarna has disclosed two significant incidents. In May 2021, a software defect
              caused a brief data exposure in which approximately 90,000 app users could view other customers' order
              histories and partial account information — a serious consumer trust event. In 2022, Sweden's IMY fined
              Klarna Bank AB 7.5 million SEK for GDPR violations related to insufficient transparency in data processing
              disclosures presented to consumers at checkout. In 2020, a vulnerability in Klarna's autofill feature was
              reported, allowing unauthorized credential exposure under certain conditions. Klarna's trust and safety
              framework — encompassing transaction monitoring, identity verification, and fraud detection — is described
              in the F-1 at a high level, but technical architecture depth and independent security certifications such
              as SOC 2 or ISO 27001 have not been confirmed in public disclosures. The credit decisioning engine's
              explainability, bias audit records, and compliance with GDPR Article 22 automated decision-making
              obligations represent a residual regulatory risk that is not addressed in current public disclosures.
            claimRefs:
