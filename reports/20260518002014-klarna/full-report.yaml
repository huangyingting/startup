      - number: '8.4'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >-
              Comparable company analysis is central to Klarna's valuation assessment given its position as a newly
              public BNPL company with limited post-IPO financial history. The primary peer group consists of publicly
              listed BNPL and adjacent buy-later fintech companies. Affirm Holdings (AFRM) is the closest direct
              comparable — a US-focused BNPL operator with a similar merchant-funded model and consumer installment
              products. Affirm's market capitalization of approximately $8–12 billion at the time of Klarna's IPO and
              FY2025 revenue of $3 billion+ implies an EV/Revenue multiple of 3–4x, approximately 40–50% below Klarna's
              ~6x IPO multiple. This Klarna premium is defensible based on geographic diversification and banking
              license moat but creates a valuation overhang if Klarna's US growth thesis disappoints.

              Block Inc. (SQ) acquired Afterpay for $29 billion in January 2022 — a transaction at peak BNPL multiples
              now regarded as significantly above fundamental value. Block's total payments business now trades at a
              fraction of the Afterpay acquisition price, illustrating the severe multiple compression risk inherent in
              BNPL-focused businesses.

              Key computed per-consumer metrics from public F-1 data: revenue per active consumer of approximately $30
              (from $2.81 billion / 93 million active consumers), GMV per active consumer of approximately $1,129 (from
              $105 billion / 93 million), and gross margin estimated at 55–58% consistent with Affirm's disclosed 57%
              FY2024 gross margin. Net credit loss rate of approximately 0.6% of GMV is a key benchmarking metric.
              Sequoia Capital's estimated 22% stake and CEO Siemiatkowski's approximately 8% stake with Class C
              supervoting shares create governance concentration that institutional investors discount in valuation
              models by 10–20% per academic governance literature. Zip Co and Sezzle trade at significant discounts
              reflecting their smaller scale and higher risk profiles, while PayPal's BNPL segment provides a large-cap
              benchmark.
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV022
              - CV023
              - CV024
              - CV032
              - CV033
              - CV034
              - CV035
          - type: table
            tableRef: TV004
