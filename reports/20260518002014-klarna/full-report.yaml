      - number: '4.3'
        title: Capital adequacy and funding trajectory
        blocks:
          - type: paragraph
            body: >-
              Klarna's September 2025 NYSE IPO raised $1.37B at $40/share, implying an initial market capitalization of
              approximately $15B — a significant recovery from the 2022 $6.7B down-round valuation, though still well
              below the $45.6B peak in 2021. IPO proceeds were designated for general corporate purposes and
              international expansion. The Company Overview chapter documents the full funding chronology; this chapter
              focuses on forward capital adequacy. 


              Klarna's most distinctive capital structure feature is its Swedish banking license (via Klarna Bank AB,
              regulated by Finansinspektionen). This enables Klarna to accept consumer deposits — estimated at
              approximately $2–3B — which provide low-cost funding for its BNPL receivables book, reducing reliance on
              costly wholesale funding. However, the banking license also imposes regulatory capital requirements
              (minimum CET1 ratios under EU banking rules), creating a permanent capital drag that pure software
              platforms do not face. 


              Pre-IPO, Klarna arranged a $1B revolving credit facility with international banks as a liquidity backstop,
              complementing the deposit base. Post-IPO, Klarna has access to public equity and debt markets for
              additional capital raises if needed. Monthly cash burn is not separately disclosed; given the $21M net
              profit in 2024, the business appears to be generating positive net income at the consolidated level,
              though operating cash flow (including working capital movements in receivables) may differ from net
              income. The CET1 capital ratio, a critical bank solvency metric, is not publicly disclosed pre-IPO and
              will need to be extracted from post-IPO regulatory filings.
