      - number: '2.2'
        title: Market Sizing and TAM/SAM/SOM Estimates
        blocks:
          - type: paragraph
            body: >-
              Analyst estimates of global BNPL market size vary substantially depending on scope and methodology. Grand
              View Research sized BNPL market revenue at $31B in 2022 and projects 26.1% CAGR to $166B by 2030. Juniper
              Research forecast BNPL transaction value (a larger metric than revenue) at $576B by 2026 from a 2022 base.
              Worldpay's transaction-data estimate placed BNPL share at 3.8% of global e-commerce in 2024, implying
              approximately $240B TPV against a $6.3T e-commerce base. Goldman Sachs estimated BNPL could reach 10% of
              global e-commerce by the mid-2020s in a bull scenario.


              These figures are not directly comparable: Grand View measures revenue, Juniper measures TPV, and Worldpay
              measures payment-method share. A conservative cross-check: if global BNPL TPV was approximately $530B in
              2024 (Juniper midpoint) and Klarna's GMV was $105B, Klarna holds roughly 20% global BNPL TPV share. Affirm
              ($26.6B GMV in FY2024) and Afterpay ($26.3B GMV in 2023) confirm the US market is large and plural.
              Klarna's US GMV of approximately $31.5B (30% of $105B) places it second or third in the US behind Affirm.


              Klarna's S-1 defines TAM as $6.8T online commerce with an addressable $1.5T—but neither the segmentation
              logic nor geographic exclusions are independently verifiable. Morgan Stanley projected BNPL sector revenue
              growth moderating to 15-20% CAGR by 2025 from 40-50% in 2021-2022, reflecting market maturation. This
              moderation is the key bear-case risk to growth projections based on prior-era CAGR assumptions.
