      - number: '1.3'
        title: Funding history and IPO journey
        blocks:
          - type: paragraph
            body: >-
              Klarna's capital history spans nearly two decades, progressing from a modest Swedish startup to a
              multi-billion dollar public company. Early investors included Investment AB Öresund in 2007. Sequoia
              Capital joined in 2010. In 2011, Klarna raised $155 million from General Atlantic and DST Global. The
              company acquired SOFORT AG in 2013 for approximately $150 million, entering real-time bank transfers. By
              2019, Klarna had raised $460 million at a $5.5 billion valuation, earning recognition as Europe's largest
              fintech. The zenith came in June 2021 when SoftBank Vision Fund 2 led a $639 million round valuing Klarna
              at $45.6 billion.


              The correction was severe. A July 2022 down round raised $800 million but at only $6.7 billion,
              representing an 85% decline from the 2021 peak, reflecting the broader collapse of growth-tech valuations.
              Klarna stabilized operationally in 2023, reporting its first annual profit. A July 2024 $800 million
              pre-IPO bridge round at a valuation estimated at approximately $15 billion positioned the company for
              public markets. Klarna filed its F-1 prospectus with the SEC on March 14, 2025 (CIK: 0002003292, file:
              333-285826), with Goldman Sachs, J.P. Morgan, and Morgan Stanley as lead underwriters. The IPO was paused
              in April 2025 due to market disruption from Trump administration tariffs, before successfully launching on
              the NYSE in September 2025 at $40 per share, raising $1.37 billion. Klarna had previously filed a
              confidential S-1 in November 2024. The first quarterly earnings post-IPO reported a loss, and the
              company's market capitalization as of May 2026 requires current market data for precise quantification.
