      - number: '1.2'
        title: Leadership, board, and governance
        blocks:
          - type: paragraph
            body: >-
              Klarna's leadership team is anchored by founder-CEO Sebastian Siemiatkowski, who has led the company since
              its founding in 2005 and remains its most significant individual shareholder and public face. Michael
              Moritz of Sequoia Capital serves as Chairman of the board. The company's governance structure reflects its
              dual-class share arrangement: Class A shares carry one vote each, Class B shares (issued to pre-IPO
              shareholders including Sequoia and other early investors) carry ten votes each with no economic rights
              beyond their economic stake, and Class C shares carry ten votes each and are issuable exclusively to
              Siemiatkowski via options to give him enhanced control. This structure means that despite holding
              approximately 8% of economic interest post-IPO, Siemiatkowski retains disproportionate voting power.


              Klarna is NOT classified as a controlled company under NYSE rules, notwithstanding Siemiatkowski's
              enhanced voting position, which means it is subject to full NYSE corporate governance requirements. Lead
              underwriters for the IPO included Goldman Sachs, J.P. Morgan, Morgan Stanley, BofA Securities, Citigroup,
              and Deutsche Bank Securities. Klarna operates as a foreign private issuer and is not an emerging growth
              company. Key-person risk is concentrated in Siemiatkowski, whose public persona, strategic decisions
              including the controversial December 2024 statements about AI replacing all human workers, and governance
              rights are central to any assessment of Klarna's leadership quality and continuity risk. Sequoia Capital,
              holding approximately 22%, is the largest institutional shareholder.
