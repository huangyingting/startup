      - number: '6.4'
        title: Retention, satisfaction, and concentration risk
        blocks:
          - type: paragraph
            body: >-
              Consumer satisfaction signals are mixed. Klarna maintains a presence on Trustpilot with a substantial
              volume of reviews reflecting the experience of its global consumer base. However, alongside positive
              reviews citing seamless payment experiences and financial flexibility, there are material adverse signals.
              The Guardian's investigative reporting documented consumers accumulating debt through Klarna, reporting
              regret over BNPL purchases and expressing concern about the ease with which the platform enables spending
              beyond means. This is corroborated by the CFPB's scrutiny of the BNPL sector, which found that BNPL users
              have lower credit scores, higher delinquency rates, and are more likely to carry revolving debt than the
              general population — a structural risk that applies directly to Klarna's consumer base.


              Consumer complaint volumes associated with Klarna include documented identity theft and fraud incidents,
              where fraudsters open accounts in victims' names and make purchases billed to them. Swedish Consumer
              Agency complaints about Klarna marketing practices date back to 2014, indicating a long-standing tension
              between Klarna's consumer acquisition strategy and consumer protection standards. These adverse signals,
              while partially dated, are relevant to ongoing regulatory risk from the FCA in the UK and the CFPB in the
              US as both bodies move toward formal BNPL oversight regimes.


              On the B2B merchant side, the key retention metrics — merchant NRR and GRR — are not publicly disclosed.
              Klarna's SEC F-1 provides no cohort-level merchant revenue data, making independent assessment of merchant
              loyalty impossible from public sources. Consumer repeat purchase rate is similarly undisclosed.
              Concentration risk is present at the enterprise merchant level: while the merchant base spans 850,000
              accounts, a meaningful share of GMV is likely concentrated in a small number of named enterprise
              relationships. Loss of a top merchant partner could have a material impact on GMV and revenue, though
              Klarna has not disclosed concentration thresholds. The cohort figure illustrates available proxy retention
              signals based on confirmed partnership longevity, and Trustpilot ratings and FCA/CFPB regulatory
              developments are both ongoing monitoring requirements for diligence.
