      - number: '6.2'
        title: Consumer adoption trajectory and named merchant proof
        blocks:
          - type: paragraph
            body: >-
              Klarna's consumer adoption trajectory has been strongly positive. The transition from 93 million active
              consumers at end-2024 to 114 million total consumers by November 2025 represents net growth of more than
              20 million users in under twelve months, implying an annualised growth rate exceeding 20 percent. Gross
              merchandise volume reached $105 billion in 2024, reflecting not only user growth but also deepening spend
              per consumer. The Klarna Card's 4 million users provide an additional proof point of consumer product
              expansion beyond BNPL into everyday spending.


              Named merchant evidence across multiple verticals provides strong enterprise proof of Klarna's merchant
              network value. In fashion, H&M and ASOS offer Klarna across their global e-commerce platforms. In
              sportswear and footwear, Nike integrates Klarna at checkout for US consumers. In department stores, Macy's
              has adopted Klarna as a primary BNPL partner. In beauty and skincare, Sephora offers Klarna payment
              options on its US platform. Travel is covered by Expedia. Marketplace commerce is addressed by eBay and
              Etsy. Grocery delivery via Instacart extends Klarna beyond traditional retail into recurring everyday
              spending categories. Electronics giant Samsung offers Klarna for high-ticket device purchases. This named
              merchant breadth across at least nine major verticals demonstrates that Klarna's merchant proposition
              resonates across diverse retail contexts, not just in its original fashion stronghold.


              Critically, US expansion has been accelerating in 2024–2025. With the US market launched in 2015 and now
              home to several of Klarna's most visible enterprise merchants, the domestic American consumer and merchant
              opportunity is material and growing. Klarna's iOS and Android app presence is confirmed across both major
              platforms, enabling ongoing consumer acquisition and engagement outside of merchant checkout flows.
