figures:
  - id: FO001
    title: Company milestone timeline
    type: timeline
    layout: wide
    summary: >-
      Klarna's public record spans from a 2005 BNPL founding in Stockholm through a spectacular 2021 peak, an 85%
      valuation crash in 2022, operational recovery, and a 2025 NYSE IPO.
    data:
      items:
        - date: '2005-01-01'
          label: Founded in Stockholm
          detail: Sebastian Siemiatkowski, Niklas Adalberth, and Victor Jacobsson launch Klarna as a BNPL checkout solution.
          tone: positive
        - date: '2010-01-01'
          label: Sequoia Capital invests
          detail: Sequoia backs Klarna; Michael Moritz joins board; Nordic and German expansion begins.
          tone: positive
        - date: '2013-01-01'
          label: SOFORT AG acquired
          detail: Real-time bank transfer capability added via ~$150M acquisition; European product scope broadens.
          tone: positive
        - date: '2015-01-01'
          label: US launch with Macy's
          detail: First US partnership; Adalberth departs; international ambitions accelerate.
          tone: positive
        - date: '2019-01-01'
          label: $460M at $5.5B — Europe's largest fintech
          detail: Klarna named Europe's most valuable fintech; $460M raise cements category leadership.
          tone: positive
        - date: '2021-06-01'
          label: $639M at $45.6B peak — SoftBank leads
          detail: SoftBank Vision Fund 2 leads round; Klarna reaches highest-ever $45.6B valuation.
          tone: positive
        - date: '2022-07-01'
          label: Down round — $800M at $6.7B (−85%)
          detail: Largest valuation collapse in European fintech history; layoffs follow in 2022.
          tone: negative
        - date: '2024-07-01'
          label: $800M pre-IPO bridge
          detail: Final private capital raise at ~$15B valuation positions Klarna for public markets.
          tone: positive
        - date: '2025-04-01'
          label: IPO paused — Trump tariff shock
          detail: Market volatility forces delay of scheduled IPO; rescheduled for September 2025.
          tone: warning
        - date: '2025-09-01'
          label: NYSE IPO — KLAR at $40/share
          detail: Klarna lists on NYSE at $40; raises $1.37B; first-day valuation exceeds $17B.
          tone: positive
        - date: '2025-11-01'
          label: KlarnaUSD stablecoin; first quarterly loss as public company
          detail: Stablecoin launched on Stripe blockchain; Q3/Q4 2025 earnings show post-IPO loss.
          tone: warning
