  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: BNPL Core Products and Checkout Workflow
        blocks:
          - type: paragraph
            body: >-
              Klarna's foundational product suite comprises five distinct consumer payment options tailored by geography
              and use case. Pay in 4, the flagship US product, splits purchases into four equal interest-free
              installments paid bi-weekly — the consumer bears no interest cost, with Klarna earning its revenue from
              merchant discount rates instead. Pay in 3 is its structural equivalent in the UK and European markets,
              offering three installments with no consumer interest charged. Pay Later provides a 30-day deferred
              payment window, ideal for consumers who wish to try a product before committing to payment; it is
              particularly popular in fashion and apparel where return rates are high. Klarna Financing extends the
              credit window to 6 to 36 months for larger-ticket purchases, with consumer interest rates applicable,
              generating a different revenue profile from the interest-free short-term products. The Klarna Card —
              available in both physical and virtual form — extends Klarna's installment payment options to any
              Visa-accepting merchant globally, including those without a direct Klarna integration, which meaningfully
              broadens the addressable consumer checkout surface.

              The consumer checkout journey begins with Klarna's JavaScript-based payment widget, which merchants embed
              into their checkout page with minimal engineering effort. Consumers select a Klarna payment option at
              checkout, pass through a real-time credit decision at sub-second latency, and receive instant approval or
              decline. This low-friction experience is central to Klarna's merchant value proposition: higher checkout
              conversion rates and access to the large segment of consumers who prefer deferred payment. Klarna is now
              integrated with approximately 850,000 global merchants across 26 countries, having processed $105 billion
              in GMV in full-year 2024. The Klarna App serves as the primary mobile consumer touchpoint for managing
              payments and discovering merchants. The combination of product breadth across geographies, the
              low-friction checkout widget architecture, and the scale of the merchant network represents the core of
              Klarna's competitive position in the BNPL market.
