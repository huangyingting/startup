            title: Operating losses persist despite net profitability; post-IPO quarterly loss is a flag
            body: >-
              Klarna's $21 million net income in 2024 coexists with a $121 million operating loss, reflecting the cost
              of funding its lending book. The first quarterly earnings report as a public company in late 2025 showed a
              loss, raising questions about the durability of the profitability thesis and increasing scrutiny from
              public market investors.
