            title: 85% peak-to-trough valuation collapse is part of Klarna's record
            body: >-
              The fall from a $45.6 billion June 2021 peak to a $6.7 billion July 2022 trough — an 85% decline — is the
              single most important context for assessing Klarna's capital discipline, management judgment, and investor
              trust. Diligence must evaluate whether the recovery narrative is structurally sound or dependent on
              favorable market conditions.
