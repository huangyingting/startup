companyProfile:
  summary: >-
    Klarna Group plc is a London-domiciled, Stockholm-founded fintech that pioneered buy-now-pay-later installment
    payments and has expanded into consumer banking lite, price comparison, and stablecoin payments. It completed a
    long-delayed NYSE IPO in September 2025 at $40/share, raising $1.37B at a first-day valuation exceeding $17B. Public
    evidence supports genuine scale, first annual net profit in 2024, and a broad product surface, but operating losses
    persist and post-IPO quarterly earnings showed a loss, making the profitability trajectory uncertain.
