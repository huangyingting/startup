      - number: '7.3'
        title: Financial and competitive risks
        blocks:
          - type: paragraph
            body: >-
              Klarna financial risk profile is characterized by thin margins, macro-sensitive credit losses, intense
              competitive pressure, and the legacy of an extreme valuation cycle. The 2022 valuation collapse from $45.6
              billion to $6.7 billion, an 85 percent decline, demonstrated how rapidly investor sentiment and funding
              conditions can reverse for loss-making fintech companies in a rising rate environment. Although Klarna
              returned to nominal net profitability in 2024 with $21 million net income, this was achieved despite a
              negative operating income of approximately $121 million; profitability depended on non-operating income
              items including interest on cash balances and foreign exchange gains. The post-IPO Q3 2025 quarterly loss
              reported by the Observer raises serious questions about the durability of the 2024 profit milestone and
              the sustainability of Klarna path to operating profitability. 


              Credit losses are the primary financial risk variable. At approximately 0.6 percent of GMV, translating to
              roughly $630 million on a $105 billion GMV base, credit losses represent the largest variable cost in the
              model. A recession scenario could see this rate double or triple, rapidly eliminating the thin margin and
              generating substantial operating losses. CFPB research documents that BNPL users are more likely to be
              financially distressed than the general credit population, suggesting Klarna near-prime consumer base is
              particularly vulnerable in a downturn. Interest rate sensitivity further compounds the financial risk
              picture: rising benchmark rates increase funding costs on the banking balance sheet, compressing net
              interest margin on consumer financing products. 


              On the competitive front, the BNPL market has become increasingly commoditized. Affirm holds exclusive or
              preferred distribution at Amazon, Walmart, and Shopify in the US market. PayPal Pay Later benefits from
              more than 430 million existing account holders globally. JPMorgan Chase and American Express have launched
              proprietary BNPL products with lower funding costs and existing customer relationships. Apple Pay Later
              April 2024 discontinuation, despite Apple enormous distribution and ecosystem advantages, serves as a
              cautionary precedent for the structural limitations of standalone BNPL as a business model. Structural MDR
              compression driven by competition will weigh on merchant fee revenue over the medium term, and a
              recession-driven surge in consumer defaults would simultaneously compress both revenue and margins,
              placing the entire profitability trajectory at risk. The financial and competitive risk transmission map
              in FR002 illustrates how regulatory, credit, and competitive pressures converge on Klarna revenue, margin,
              and valuation.
