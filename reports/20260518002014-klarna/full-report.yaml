  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer base segmentation
        blocks:
          - type: paragraph
            body: >-
              Klarna operates a two-sided network serving both consumers (B2C) and merchants (B2B), with each segment
              playing a distinct and complementary role in the platform's economics. On the consumer side, Klarna had
              114 million total consumers as of November 2025 and 93 million active consumers at year-end 2024, spanning
              26 countries. The consumer base skews strongly toward Gen Z and Millennials aged 18–34, a demographic that
              has grown up distrustful of revolving credit cards and prefers transparent instalment structures. These
              consumers are disproportionately engaged in fashion, electronics, travel, beauty, and home goods — the
              five largest Klarna verticals — and their digital-first behaviour makes them natural users of Klarna's
              app-based shopping feed and price comparison tools.


              On the merchant side, Klarna's 850,000-strong global merchant network ranges from SMB online retailers
              using Klarna's plug-and-play Shopify and WooCommerce plugins to major enterprise accounts including H&M,
              ASOS, Nike, Macy's, Sephora, Expedia, eBay, Etsy, and Instacart. Merchant segmentation reflects the B2B
              enterprise tier and the long tail of SMB merchants, with the enterprise cohort contributing
              disproportionately to GMV. The US consumer base launched in 2015 and has accelerated substantially in
              2024–2025, representing one of Klarna's highest-growth geographies.


              High-value consumer segments include Klarna Card holders (approximately 4 million users) and Klarna Plus
              subscribers ($7.99/month), who represent a more monetised consumer tier. The Klarna Plus segment, offering
              fee waivers, cashback, and exclusive deals, signals an intentional move toward consumer subscription
              monetisation that mirrors subscription loyalty programmes in structure. Developer and platform segments —
              merchants integrating via API — form a third B2B segment whose switching costs are higher due to deeper
              technical embedding in merchant checkout stacks. Vertical expansion across grocery (Instacart), travel
              (Expedia), and home goods complements the core fashion and electronics base.
