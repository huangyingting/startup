  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >-
              Klarna operates at the intersection of consumer BNPL credit, merchant checkout, and digital commerce
              infrastructure. Its primary market is the global BNPL segment—installment credit embedded at the point of
              sale—but its platform increasingly spans Pay Now (account-to-account and debit), merchant marketing and
              advertising, and consumer financial services such as the Klarna Card and Klarna Balance.


              The most directly addressable market is online retail checkout, where Klarna competes as a payment method
              alternative to credit cards, debit cards, and PayPal. Global e-commerce transaction value was
              approximately $6.3T in 2024, growing at roughly 10% annually (McKinsey, Statista). BNPL accounted for
              about 3.8% of that volume in 2024 per Worldpay, implying a BNPL-relevant market of approximately $240B in
              2024 growing to 5-6% of e-commerce by 2026. Klarna's implied SOM was approximately $105B GMV in
              2024—roughly 18-21% of estimated global BNPL TPV depending on the sizing source, and substantially below
              the $1.5T SAM the company claims in its S-1.


              The primary status-quo substitute for BNPL is the credit card, which dominates consumer spending globally.
              Credit cards offer revolving credit but carry compound interest, variable rates, and hard credit inquiry
              requirements for approval. BNPL competes by offering 0% short-term installments, fixed repayment
              schedules, and soft-check or no-check underwriting for smaller-ticket Pay-in-4 products. Secondary
              substitutes include personal loans, deferred invoicing (Klarna Pay Later 30-day), and store layaway
              programs. Excluded from Klarna's core TAM are B2B/SME trade credit, mortgages, auto lending, insurance,
              and general savings products.
            claimRefs:
              - CM004
              - CM005
              - CM009
              - CM024
              - CM029
