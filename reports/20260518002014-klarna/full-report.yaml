      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >-
              Klarna operates a B2B2C model: merchants are the direct buyers of its payment service, consumers are the
              end-users. These two segments have distinct purchase processes, budget owners, and adoption triggers.


              On the merchant side, SMBs typically integrate Klarna through Shopify, WooCommerce, or Magento plugins in
              a self-serve flow where the founder or e-commerce manager is the decision-maker. The adoption trigger is
              conversion rate uplift—merchants testing BNPL report 20-30% checkout conversion improvements and 15-25%
              higher average order values. Enterprise merchants use direct API or platform connectors (Salesforce
              Commerce Cloud, SAP) with longer sales cycles involving payments strategy, fraud, and compliance teams.


              On the consumer side, the dominant profile is 18-43 years old, digitally native, and credit-averse or
              credit-limited. Gen Z consumers (18-27) are the fastest-growing segment and strongly prefer BNPL's
              transparent installment model over revolving credit cards. Millennials (28-43) are the highest-volume
              segment by spend. Both groups cite cash-flow management and 0% interest as primary motivations.
              Financially underserved consumers—those with thin credit files—use Pay-in-4 as a credit card alternative
              because it requires only a soft pull. By vertical, fashion, electronics, home goods, beauty, and travel
              are the top BNPL categories. Klarna's US market represented ~30% of 2024 GMV and its European home market
              approximately 55%. The shopping app creates a consumer discovery channel reducing dependence on merchant
              integration for consumer acquisition.
