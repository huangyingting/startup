chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, corporate structure, and business model
        blocks:
          - type: paragraph
            body: >-
              Klarna Group plc is a publicly listed fintech company incorporated in the United Kingdom with its
              registered office at 10 York Road, London SE1 7ND. The company was founded in 2005 in Stockholm, Sweden by
              three co-founders: Sebastian Siemiatkowski, who remains CEO, Niklas Adalberth (who departed in 2015), and
              Victor Jacobsson. Klarna is listed on the New York Stock Exchange under ticker KLAR following its IPO in
              September 2025. While domiciled in the UK for regulatory and capital-markets purposes, the company's
              operational heritage and banking license remain anchored in Sweden, where it is supervised by
              Finansinspektionen as a licensed bank.


              The core business model is a buy-now-pay-later (BNPL) and broader payments platform. Klarna earns revenue
              primarily from merchant fees (typically 2 to 8 percent per transaction), with secondary streams from
              consumer late fees, interest on longer-term financing products, and subscription fees from Klarna Plus
              ($7.99 per month, launched January 2024). The product portfolio includes Pay in 4 (US installments), Pay
              in 3 (UK and Europe), Pay Later (30-day deferred payment), the physical Klarna Card, longer-term
              6-to-36-month financing plans with interest, and the Klarna app which offers shopping feeds, price
              comparisons, and cashback. In November 2025 Klarna also released KlarnaUSD, a stablecoin built on Stripe's
              blockchain infrastructure. The company positions itself not merely as a BNPL provider but as a full-stack
              shopping and payments ecosystem connecting consumers, merchants, and financial services.
