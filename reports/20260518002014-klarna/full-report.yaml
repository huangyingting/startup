  - id: FV001
    title: Recommendation Logic Flow
    type: flow
    description: >-
      Decision logic chain from market opportunity and product evidence through financial performance, regulatory risk,
      competitive dynamics, and governance concerns to the final Research More recommendation.
    claimRefs:
      - CV025
      - CV026
      - CV038
      - CV040
      - CV041
    approximationNotes: >-
      Flow represents the logical chain of evidence used to reach the Research More recommendation; node details
      summarize key evidence points documented in the chapter sections and claims.
    data:
      nodes:
        - label: Market Opportunity
          detail: BNPL global TAM ~$560B (2024), growing at 24% CAGR; Klarna positioned across 45+ markets with 114M consumers
        - label: Product Differentiation
          detail: >-
            Swedish banking license, 20+ year track record, AI-driven efficiency, embedded merchant checkout; superior
            to US-only peers
        - label: Financial Performance
          detail: >-
            $2.81B revenue (+24% YoY); $21M net profit (first since 2018); but -$121M operating income and 0.7% net
            margin
        - label: Post-IPO Adverse Signal
          detail: >-
            Observer reports Q3 2025 net loss post-IPO; operating expenses exceeded expectations; profitability path in
            question
        - label: Regulatory Risk
          detail: >-
            FCA BNPL regulation (UK), EU CCD2 (Europe), CFPB oversight (US) all impose affordability checks that may
            reduce approval rates
        - label: Competitive Dynamics
          detail: >-
            Affirm (US), Block/Afterpay, PayPal Pay in 4, bank-issued BNPL intensifying; merchant fee compression risk
            ongoing
        - label: Governance Concerns
          detail: >-
            Dual-class structure; Siemiatkowski supervoting Class C; Sequoia 22% stake overhang; limited minority
            investor protections
        - label: 'Recommendation: Research More'
          detail: >-
            Medium confidence; fairly valued to slightly overvalued at ~6x EV/Revenue; await 2+ post-IPO quarters before
            initiating
    tableRefs:
      - TV001
      - TV002
  - id: FV002
    title: Valuation Sensitivity Chart
    type: bar
    description: >-
      Comparative valuation estimates across key scenarios and reference points for Klarna, illustrating the range of
      implied enterprise values from the 2022 trough through the bull case.
    claimRefs:
      - CV008
      - CV009
      - CV011
      - CV025
      - CV026
      - CV027
    approximationNotes: >-
      Bull and bear case valuations are analyst estimates based on scenario revenue assumptions and comparable peer
      multiples. IPO and pre-IPO figures are based on disclosed pricing and analyst reporting.
    data:
      items:
        - label: Bull Case Valuation ($B)
          value: 28
          detail: AI-driven profitability, US market capture, 8x forward revenue; requires operating margin >8% by FY2026
        - label: IPO First-Day Valuation ($B)
          value: 17
          detail: September 2025 first-day trading implied market cap at $40/share NYSE debut
        - label: Base Case Valuation ($B)
          value: 16.5
          detail: Moderate growth 15–20%, regulatory headwinds, ~6x forward revenue; broadly consistent with IPO pricing
        - label: Pre-IPO Estimate ($B)
          value: 15
          detail: February 2025 analyst consensus estimate prior to IPO; validated by final IPO pricing
        - label: Bear Case Valuation ($B)
          value: 8
          detail: Regulatory shock from FCA, credit deterioration, operating losses persist; 2–3x forward revenue
        - label: 2022 Down-Round ($B)
          value: 6.7
          detail: July 2022 trough valuation in Sequoia-led down round; 85% below 2021 peak of $45.6B
    tableRefs:
      - TV003
  - id: FV003
    title: Investment KPIs
    type: kpi
    description: >-
      Key performance and investment metrics for Klarna at the time of its September 2025 NYSE IPO, providing an
      IC-ready scorecard across valuation, financial performance, and recommendation dimensions.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV005
      - CV006
      - CV013
      - CV014
      - CV038
    approximationNotes: >-
      Market cap figures reflect first-day trading valuation; revenue multiple is computed from first-day market cap and
      FY2024 revenue. Consumer count of 114M is per Klarna marketing materials; F-1 discloses 93M active consumers.
    data:
      items:
        - label: IPO Price
          value: $40
          unit: USD per share
          detail: September 2025 NYSE IPO at $40/share; NYSE ticker KLAR; raised $1.37B gross proceeds
        - label: First-Day Market Cap
          value: '>$17B'
          unit: USD
          detail: First-day trading pushed implied market cap above $17B; above $15B at-pricing valuation
        - label: FY2024 Revenue
          value: $2.81B
          unit: USD
          detail: 24% YoY growth; first fiscal year with positive net income since 2018
        - label: FY2024 Net Income
          value: $21M
          unit: USD
          detail: First annual net profit since 2018; razor-thin 0.7% net margin on $2.81B revenue
        - label: FY2024 GMV
          value: $105B
          unit: USD
          detail: Gross Merchandise Volume; ~20% YoY growth from ~$87B in FY2023 across 45+ markets
        - label: Active Consumers
          value: 93M
          unit: consumers
          detail: Active consumers per F-1 disclosure; company cites 114M in broader marketing materials
        - label: IPO Revenue Multiple
          value: ~6x
          unit: EV/Revenue
          detail: ~$17B first-day cap on $2.81B LTM revenue; premium to Affirm 3–4x; justified by geography
        - label: Recommendation
          value: Research More
          unit: rating
          detail: Medium confidence; fairly valued to slightly overvalued; await post-IPO quarterly track record
    tableRefs:
      - TV001
