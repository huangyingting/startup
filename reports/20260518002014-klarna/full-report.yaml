      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              Structural BNPL tailwinds include Gen Z and millennial credit card aversion, expanding e-commerce checkout
              volumes, and merchant demand for proven conversion-rate tools. AI-driven underwriting improvements enable
              approval rate expansion into thin-credit-file segments with contained risk. The growth of in-store BNPL at
              POS terminals and Klarna's advertising platform revenue represent additional value creation levers that do
              not solely depend on transaction GMV growth.


              Headwinds are equally material. Rising interest rates since 2022 increased Klarna's warehouse debt cost
              and reduced net interest margins. Oliver Wyman estimated a 200bp rate increase compresses BNPL NIM by
              1.5-2.5 percentage points. The EU Consumer Credit Directive (CCD2), adopted in 2023, mandates full
              creditworthiness assessments for all BNPL products with member state implementation through 2025-2026. UK
              FCA similarly proposed credit-check requirements for all BNPL products. These regulations affect Klarna's
              two largest markets and represent the most material near-term constraint, though the precise approval rate
              impact remains unquantified.


              Competitive headwinds are intensifying: PayPal's BNPL (Pay in 4, Pay Monthly) benefits from 430M+ consumer
              accounts and 35M+ merchant integrations. Banks including JPMorgan, Citibank, and Goldman Sachs are adding
              embedded installment plans to existing credit cards, eliminating the merchant integration requirement.
              Morgan Stanley projected BNPL growth moderating to 15-20% CAGR by 2025 from 40-50% peak-cycle rates. Apple
              Pay Later's closure in mid-2024 shows the limits of big-tech entry but does not eliminate the platform
              risk. S&P Global identified credit quality deterioration in a macroeconomic downturn as a primary tail
              risk for BNPL lenders.
