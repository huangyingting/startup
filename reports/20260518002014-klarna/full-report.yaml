      - number: '3.3'
        title: Switching Costs, Lock-in, and Multi-homing
        blocks:
          - type: paragraph
            body: >-
              Consumer switching costs are low to negligible. Consumers can and do multi-home across Klarna, Affirm, and
              Afterpay simultaneously, selecting based on checkout availability, promotional offers, and merchant
              integration. At any given checkout, the BNPL provider is selected primarily by availability—if Klarna is
              integrated, it appears; if only Affirm is integrated, Affirm is used. The consumer exhibits low brand
              loyalty and high sensitivity to offer terms.


              Merchant switching costs are moderate. A large merchant re-integrating from Klarna to Affirm requires
              approximately 4-8 weeks of engineering work for a direct API integration, or a plugin update for
              Shopify/WooCommerce merchants. This creates switching friction but not lock-in. Merchants often maintain
              2-4 BNPL integrations simultaneously, further reducing switching risk. The most durable merchant
              stickiness occurs when merchants use the full Klarna Merchant Platform (Klarna Payments, Klarna Checkout,
              and Klarna advertising), where replacing Klarna requires replacing multiple products simultaneously.


              Klarna's durable competitive advantages are: (1) consumer data at scale (85M accounts, $105B GMV) enabling
              proprietary credit modeling; (2) EU banking license creating regulatory moat in European markets that US
              BNPL providers would face high cost to replicate; (3) shopping app creating a consumer acquisition channel
              that bypasses merchant integration for new user growth; and (4) Klarna Merchant Platform bundling multiple
              products for large merchants. Against these: MDR pricing is under pressure as PayPal and banks offer
              near-zero-cost BNPL alternatives, consumer multi-homing limits loyalty, and the feature gap between top-5
              BNPL players is narrowing rapidly.
