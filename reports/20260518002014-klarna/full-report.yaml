              - CV024
              - CV027
      - number: '8.5'
        title: Governance, Risks, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Klarna's governance structure is a critical valuation consideration that differentiates it from most
              NYSE-listed peers. The dual-class share structure grants CEO Sebastian Siemiatkowski disproportionate
              voting control through Class C supervoting shares despite his economic ownership of approximately 8%. This
              means public shareholders cannot meaningfully influence board composition, executive compensation, or
              major strategic decisions without founder support. Such structures typically trade at a 10–20% discount to
              equivalent single-class companies per academic literature on governance premiums, and institutional proxy
              advisors ISS and Glass Lewis routinely recommend against governance structures that disenfranchise
              minority shareholders. This governance discount is embedded in the adverse valuation assessment.

              Sequoia Capital holds approximately 22% of Klarna — the largest external shareholder. Post-IPO lock-up
              expiry dates for founders, Sequoia, and other major investors are not publicly disclosed with precision,
              representing a material overhang risk. If Sequoia liquidates its position after lock-up expiry, the
              selling pressure could be significant given the position size relative to Klarna's daily trading volume as
              a newly public company.

              Key kill triggers and thesis-break signals that warrant ongoing monitoring include: FCA BNPL regulation
              becoming materially restrictive for UK revenue (estimated 30–35% of global GMV); US credit quality
              deterioration causing net credit loss rates to spike from 0.6% of GMV toward 1.5–2%; Q4 2025 and FY2025
              post-IPO earnings confirming the Observer's Q3 2025 loss report; and operator concentration risk if a
              top-3 merchant reduces Klarna checkout integration. Any of these events would likely trigger a multiple
              rerating toward the 3–4x Affirm range or below.

              The final diligence asks before initiating any Klarna position center on: (1) geographic revenue
              breakdown, especially US-only figures and GMV; (2) fully diluted share count including all options, RSUs,
              and warrants; (3) precise lock-up expiry schedule for founders and Sequoia; (4) granular credit loss
              vintage data to underwrite default risk; and (5) post-IPO quarterly earnings through at least two quarters
              to establish a financial track record. Without these, the recommendation remains Research More rather than
              any active position.
            claimRefs:
              - CV021
              - CV022
              - CV023
