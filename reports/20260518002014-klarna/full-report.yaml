  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model, pricing, and revenue mix
        blocks:
          - type: paragraph
            body: >-
              Klarna generated $2.81B in revenue in FY2024, a 24% increase year-over-year, driven by GMV growth to $105B
              and monetization improvements. The company achieved its first annual net profit since 2018 — $21M —
              marking a structural inflection point after years of losses. Revenue is generated from three primary
              mechanisms: transaction commissions (merchant discount rates, MDR) on purchases made via Klarna checkout,
              consumer interest and fee income from financing products (Pay Later, monthly installments, Klarna
              Financing), and service fees including subscriptions. Merchant fees are estimated to represent
              approximately 60–65% of total revenue based on S-1 segment disclosures, making Klarna primarily a
              merchant-funded model. The company does not separately disclose per-stream revenue, which limits precision
              in revenue quality analysis. 


              List pricing for Pay in 4 in the US market is approximately 3.29% + $0.30 per transaction — above the
              PayPal Pay in 4 baseline — reflecting Klarna's merchant value proposition around conversion uplift and
              brand recognition. Enterprise merchants typically negotiate lower realized MDRs, and the gap between list
              and realized pricing is a key diligence gap. Klarna Plus, launched at $7.99/month in the US, provides fee
              waivers and cashback to consumers and represents a direct subscription revenue stream, though subscriber
              count remains undisclosed. Klarna Balance, an interest-bearing savings product, generates deposit spread
              income but is not separately quantified as a material revenue line in public filings. The growing share of
              longer-term financing products (monthly installments, Klarna Financing) is notable: Bloomberg reporting
              indicates the loan book more than doubled YoY, shifting revenue mix toward interest income and increasing
              balance sheet duration risk.
