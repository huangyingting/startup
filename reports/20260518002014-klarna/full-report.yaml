      - number: '3.2'
        title: Competitor Profiles and Feature Comparisons
        blocks:
          - type: paragraph
            body: >-
              Among direct BNPL peers, Affirm is the most important US benchmark. Its $26.6B FY2024 GMV and 19M active
              consumers position it as the leading US BNPL specialist. Affirm charges 2-8% MDR to merchants and offers
              0% interest Pay-in-4 and longer-term monthly installment plans. Its zero-late-fee consumer policy differs
              from Klarna, which charges late fees on Pay Later products. Affirm's Amazon and Shopify partnerships give
              it structural distribution that reduces its reliance on direct merchant BD. Afterpay (Block) targets a
              younger demographic with a stricter Pay-in-4-only model and 4-6% MDR. Its 2022 acquisition by Block
              (formerly Square) provides an integration pathway into Square POS terminals, giving Afterpay a growing
              in-store advantage.


              PayPal's BNPL is qualitatively different: it is not a standalone product but a checkout feature bundled
              into the PayPal wallet. This makes comparison of MDR difficult—PayPal BNPL is included within standard
              PayPal processing, creating a near-zero-MDR value proposition for BNPL at merchants who already use
              PayPal. The consumer experience is inferior to Klarna's shopping app ecosystem but the distribution
              advantage is overwhelming. For merchant checkout only, PayPal BNPL is a strong substitute for Klarna
              Pay-in-4 at lower cost.


              Bank installment programs (JPMorgan My Chase Plan, Citi Flex Pay, Amex Plan It) convert existing credit
              card balances into fixed installment plans. The merchant incurs zero additional fee, making these products
              structurally free to merchants. However, they are reactive (applied to existing card transactions) rather
