  callouts:
  - type: risk
    tone: warning
    text: EU CCD2 and UK FCA regulation introduce mandatory credit checks across Klarna's two largest markets through 2025-2026.
      Regulatory implementation could reduce BNPL approval rates, compress consumer GMV, and increase compliance costs—the
      magnitude is unquantified by Klarna or regulators.
  - type: strength
    tone: positive
    text: Klarna's advertising and merchant platform revenue stream is structurally higher-margin than lending and does not
      depend on interest rate cycles or credit risk. Growing this segment buffers against BNPL margin compression and adds
      a durability layer to the financial model.
  - type: adverse
    tone: negative
    text: Morgan Stanley and S&P Global note that BNPL market growth is moderating in developed markets, credit quality is
      under pressure in high-rate environments, and PayPal/bank competition is intensifying. The 40-50% sector CAGR of 2021-2022
      is not a valid baseline for forward planning.
