company:
  name: Klarna
chapter:
  number: 2
  title: Market Analysis
  summary: Klarna operates at the intersection of BNPL consumer credit, merchant checkout, and digital commerce infrastructure.
    The global BNPL market was estimated at $240B-$576B in TPV in 2024 depending on methodology, growing at 20-26% CAGR. Klarna
    reported $105B GMV in 2024, implying approximately 18-21% global BNPL share. Gen Z and millennial credit-card aversion
    and merchant demand for conversion uplift are structural growth drivers. The EU Consumer Credit Directive (CCD2) and UK
    FCA regulation introduce mandatory credit checks across Klarna two largest markets through 2025-2026, representing a material
    constraint on approval rates. Klarna SAM methodology is unvalidated and independent sizing gaps are a key diligence item.
