- id: TM004
  title: Growth drivers and constraints table
  columns:
  - Driver or Constraint
  - Direction
  - Timing
  - Implication for Klarna
  - Diligence Ask
  rows:
  - - Gen Z and millennial credit card aversion
    - Growth driver
    - Structural / ongoing
    - Durable tailwind; BNPL captures credit demand historically served by revolving credit
    - Track Gen Z credit card application and approval rate trends in US and EU
  - - Global e-commerce growth (~10% CAGR)
    - Growth driver
    - Ongoing
    - Rising BNPL SAM as checkout volume expands; BNPL grows faster than e-commerce overall
    - Monitor e-commerce growth versus Klarna GMV growth divergence quarterly
  - - AI-driven underwriting improvements
    - Growth driver
    - 1-3 years
    - Better loss prediction enables approval rate expansion into thin-file segment with contained risk
    - Klarna credit loss trend vs. Affirm and Afterpay; disclose AI underwriting KPIs
  - - Merchant conversion lift proven (20-30%)
    - Growth driver
    - Now
    - Near-zero switching cost once integrated; creates merchant retention moat
    - Request third-party A/B test data; merchant NPS and retention cohort
  - - In-store BNPL rollout
    - Growth driver
    - 1-5 years
    - New TAM layer beyond e-commerce; higher AOV tickets in appliances, home goods, travel
    - In-store GMV share progression quarterly; POS partnership count
  - - Shopping app and advertising platform
    - Growth driver
    - 2-4 years
    - High-margin revenue growing faster than lending; reduces interest-rate cycle sensitivity
    - Advertising revenue as percentage of total; advertising gross margin
  - - Open banking and account-to-account payments
    - Growth driver
    - 2-4 years
    - Lower transaction costs; richer repayment data for underwriting improvement
    - Klarna open banking adoption rates in UK and EU; A2A share of Pay Now volume
  - - Rising interest rates (cost of funds)
    - Constraint
    - Now-2 years
    - Increases warehouse debt cost; compresses net interest margin per transaction
    - Average Klarna funding cost vs. benchmark rate trend; hedging strategy
  - - EU Consumer Credit Directive (CCD2)
    - Constraint
    - 2024-2026
    - Mandatory creditworthiness assessments may reduce BNPL approval rates 5-20% for marginal consumers
    - CCD2 implementation timeline per member state; Klarna EU compliance status and approval rate disclosure
  - - UK FCA BNPL regulation
    - Constraint
    - 2024-2025
    - Credit checks required for all UK BNPL; compliance cost and potential GMV reduction
    - Klarna UK FCA authorization progress; estimated UK GMV at risk
  - - Bank embedded installment plans (JPM, Citi, GS)
    - Constraint
    - 2-5 years
    - Banks offering installment plans on existing credit card rails threaten merchant stickiness
    - Bank BNPL GMV growth; Klarna merchant re-contracting rates post-bank entry
  - - PayPal BNPL structural distribution advantage
    - Constraint
    - Now
    - PayPal 430M+ consumer accounts and 35M+ merchant integrations provide scale BNPL fintechs cannot easily match
    - PayPal BNPL GMV and approval rates vs. Klarna; merchant co-integration rates
  - - Credit quality deterioration in downturn
    - Constraint
    - Tail risk
    - Higher charge-offs compress NIM severely; revolving credit losses could spike 2-4x under stress
    - Klarna charge-off rate vs. macro stress scenarios; provision coverage ratio
  - - Consumer over-indebtedness narrative
    - Constraint
    - 1-3 years
    - Regulatory and reputational risk; fuels political support for BNPL regulation
    - Monitor adverse media and consumer advocate positions; Klarna complaint volume trend
  notes: Growth drivers are structural and well-evidenced. Constraints are material — regulatory implementation through 2025-2026
    and cost-of-funds headwind are the most near-term. In-store and advertising drivers are growth options, not baseline assumptions,
    and should be modeled separately from core BNPL.
