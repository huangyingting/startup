  evidenceGaps:
  - type: missing-source
    severity: material
    topic: market sizing methodology
    missingEvidence: No independently validated bottom-up SAM for Klarna BNPL has been published. Klarna S-1 cites $1.5T addressable
      market without disclosing geographic exclusions or methodology.
    whyItMatters: Equating the company TAM claim with a validated SAM overstates the near-term addressable opportunity and
      distorts growth rate assumptions.
    diligencePath: Request Klarna IR to provide SAM segmentation methodology. Cross-reference with Worldpay transaction data
      to construct an independent estimate.
    relatedQuestionRefs:
    - QM007
    - QM020
    - QM021
    relatedTableRefs:
    - TM002
  - type: private-evidence-only
    severity: material
    topic: consumer demographic breakdown
    missingEvidence: Klarna does not publicly disclose the age or demographic breakdown of its 85 million active consumers.
      Gen Z and millennial share is inferred from industry surveys applied to the reported consumer count.
    whyItMatters: Without a verified demographic breakdown, the growth thesis depending on Gen Z adoption cannot be quantified
      precisely for underwriting purposes.
    diligencePath: Request Klarna IR for age-segment breakdown or proxy metrics such as first-time user age median. Use eMarketer
      cohort data as interim estimate.
    relatedQuestionRefs:
    - QM009
  - type: private-evidence-only
    severity: material
    topic: CCD2 regulatory impact on approval rates
    missingEvidence: No public source has quantified the impact of EU Consumer Credit Directive (CCD2) implementation on Klarna
      approval rates. The 5-20% range in this report is analyst inference, not a company or regulator disclosure.
    whyItMatters: CCD2 affects the EU market representing ~55% of Klarna GMV. If approval rates drop materially, GMV growth
      forecasts for 2026-2028 could be meaningfully incorrect.
    diligencePath: Monitor Klarna regulatory filing disclosures in EU member states. Request impact assessment from Klarna
      during due diligence.
    relatedQuestionRefs:
    - QM014
  - type: conflicting-data
    severity: minor
    topic: BNPL user count consistency
    missingEvidence: eMarketer (97M US BNPL users by 2025), PYMNTS, and Worldpay present inconsistent BNPL user count estimates
      due to differing definitions of active user and coverage.
    whyItMatters: Inconsistent user counts make it difficult to cross-validate Klarna consumer count claims or estimate market
      penetration; growth rate claims may be calculated off different bases.
    diligencePath: Establish consistent definition of active BNPL user across data sources. Treat any cross-source comparison
      as approximate with +/- 20% uncertainty band.
    relatedQuestionRefs:
    - QM022
tables:
- id: TM001
  title: Market definition table
  columns:
  - Segment / Category
  - Included Spend
  - Excluded Spend
  - Buyer / Payer
  - Relevance to Klarna
  rows:
  - - BNPL / Pay Later (core)
    - Online checkout installment credit — Pay-in-4, Pay Monthly, Pay Later 30-day
    - Traditional revolving credit cards, personal loans outside checkout context
    - Merchant pays MDR fee; consumer defers payment
    - Primary monetization; ~85% of historical GMV
  - - Pay Now (debit / A2A)
    - Instant bank transfer and debit at checkout via Klarna Payments rails
    - Card-present in-store spend outside Klarna-integrated POS
    - Merchant pays interchange equivalent
    - Second-largest TPV segment; lower revenue per transaction than BNPL
  - - In-store / physical retail BNPL
    - POS-integrated installment plans via Klarna app or QR scan at physical checkout
    - General in-store card-present spend without Klarna integration
    - Merchant pays MDR
    - Emerging; less than 5% of volumes in 2024 but strategically prioritized
  - - Merchant advertising and data
    - Merchant-funded promotions and sponsored listings on Klarna shopping app
    - General digital advertising (Google, Meta, programmatic)
    - Merchant pays per-click or CPM
    - High-margin revenue growing faster than lending fees
  - - Consumer financial services
    - Klarna Card spend, Klarna Balance deposit product, Klarna Plus subscription
    - Bank savings, mortgage, auto finance, insurance
    - Consumer pays subscription or interest
    - Nascent; early expansion into broader consumer wallet
  - - B2B / SME trade payments
    - None currently included
    - SME trade credit, B2B invoice factoring, accounts receivable financing
    - N/A
    - Excluded from current TAM; potential long-term adjacency
  notes: Core BNPL (Pay Later) is the largest segment by GMV and revenue. Pay Now and in-store are volume expansion priorities.
    Advertising is the highest-margin growth vector. B2B is explicitly excluded from current market definition.
  claimRefs:
  - CM024
  - CM022
  - CM023
  - CM029
