chapter:
  number: 3
  title: Competitors
  summary: 'Klarna faces competition from three distinct categories: direct BNPL peers (Affirm $26.6B GMV, Afterpay $26.3B
    GMV, Zip Co), platform players (PayPal Pay in 4 with 430M+ consumer accounts at near-zero MDR), and bank/card incumbents
    (JPMorgan My Chase Plan, Citi Flex Pay, Amex Plan It at zero merchant MDR). Klarna leads by GMV scale ($105B, ~4x Affirm)
    and platform breadth (shopping app, advertising, banking license). Key competitive risks: PayPal structural distribution
    advantage, bank installment programs displacing BNPL for card-holding consumers, feature parity among top-3 BNPL peers,
    and consumer multi-homing limiting loyalty. Klarna EU banking license and AI underwriting provide real but partially unvalidated
    moats.'
