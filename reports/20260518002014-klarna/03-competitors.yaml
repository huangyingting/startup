sections:
- id: landscape
  title: Competitive Landscape
  body: 'Klarna competes across three distinct competitive categories: direct BNPL peers, platform players with BNPL embedded,
    and bank/card incumbents offering installment features on existing products.


    Direct BNPL peers include Affirm ($26.6B FY2024 GMV, US-focused), Afterpay (Block, $26.3B 2023 GMV, US/ANZ), Zip Co (smaller
    ANZ/US player), and Sezzle (sub-scale US). These compete primarily on merchant integration, consumer underwriting quality,
    MDR pricing, and checkout conversion lift. Klarna''s $105B GMV makes it approximately 4x larger than the next-largest
    direct peer by transaction volume.


    Platform competitors are structurally more threatening due to distribution advantages. PayPal Pay in 4 is embedded in
    430M+ consumer accounts and 35M+ merchant integrations at no incremental merchant fee, making BNPL nearly ubiquitous for
    PayPal-enabled merchants. Apple Pay Later launched in 2023 but was shut down in mid-2024, pivoting to an Affirm partner
    model—demonstrating that credit infrastructure is a non-trivial barrier for tech platforms. Amazon, Google Pay, and Apple
    could re-enter at scale.


    Bank/card incumbents represent the most durable structural threat. JPMorgan My Chase Plan, Citi Flex Pay, and American
    Express Plan It offer installment payments on existing card balances at zero incremental merchant MDR (absorbed by card
    interchange). These products require no new consumer credit application, no merchant re-integration, and leverage existing
    trust relationships—making them a compelling substitute for BNPL at the merchant checkout. The status-quo credit card
    remains the dominant consumer credit vehicle, representing 85%+ of consumer credit transaction volume globally.'
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP005
  - CP006
  - CP007
  - CP031
  - CP032
  - CP038
