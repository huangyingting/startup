  evidenceGaps:
  - type: missing-source
    severity: material
    topic: merchant churn and retention data
    missingEvidence: No BNPL provider including Klarna publicly discloses merchant churn rates, CAC, or cohort retention data.
      The moat durability assessment depends on assumptions about merchant stickiness that cannot be independently verified.
    whyItMatters: Without merchant retention data, the strength of Klarna switching cost moat is an assertion rather than
      a proven structural advantage; investors cannot distinguish between platform lock-in and merchant inertia.
    diligencePath: Request merchant retention cohort data during due diligence. Cross-reference with Shopify App Store install/uninstall
      patterns and third-party merchant survey data.
    relatedQuestionRefs:
    - QP018
    - QP026
    relatedTableRefs:
    - TP004
  - type: private-evidence-only
    severity: material
    topic: independent moat validation
    missingEvidence: Independent analyst validation of Klarna AI underwriting superiority, consumer data moat quality, and
      network effect strength is not publicly available. Company claims about AI and data advantages are self-reported.
    whyItMatters: Moat durability is the key long-run valuation driver; unvalidated moat claims create underwriting uncertainty
      about Klarna premium vs. peers.
    diligencePath: Commission independent benchmarking of Klarna underwriting accuracy vs. Affirm and Afterpay using third-party
      credit bureau data. Review S&P Global and Morgan Stanley moat analysis for third-party views.
    relatedQuestionRefs:
    - QP021
  - type: enumeration-incomplete
    severity: minor
    topic: smaller BNPL competitor coverage
    missingEvidence: Scalapay, Paidy (PayPal), Sezzle, and other regional BNPL providers are not fully profiled due to limited
      public data. The competitor profile table covers the most material players but is not exhaustive.
    whyItMatters: Missing smaller competitors may collectively address specific merchant segments (e.g., Scalapay in Italian
      fashion) that affect Klarna GMV in those geographies.
    diligencePath: Conduct targeted research on Scalapay (Europe) and Paidy (Japan/PayPal) through regulatory filings and
      press coverage.
    relatedQuestionRefs:
    - QP001
  - type: conflicting-data
    severity: minor
    topic: BNPL MDR rate ranges
    missingEvidence: Merchant discount rates are not publicly disclosed by Klarna, Affirm, or Afterpay as fixed rates; published
      ranges (2-8%) are from merchant accounts and third-party reports, not official price lists.
    whyItMatters: MDR rate uncertainty makes pricing comparison approximate and limits the ability to assess Klarna revenue-per-GMV
      trajectory as competition intensifies.
    diligencePath: Use merchant community forums (Shopify Community, BigCommerce Community) and surveys to triangulate actual
      MDR ranges. Request official pricing during diligence.
    relatedQuestionRefs:
    - QP005
    relatedTableRefs:
    - TP003
tables:
- id: TP001
  title: Competitor profile table
  columns:
  - Competitor
  - Category
  - Scale / Funding
  - Target Segment
  - Differentiation
  - Limitation
  rows:
  - - Klarna
    - Direct BNPL / Platform
    - $105B GMV; NYSE IPO Sep 2025; $14.6B IPO valuation
    - Global online and in-store merchants; Gen Z and millennial consumers
    - Shopping app, EU banking license, AI underwriting, 85M consumers, advertising platform
    - Premium MDR vs. PayPal; commoditization risk; EU/UK regulatory pressure
  - - Affirm
    - Direct BNPL
    - $26.6B GMV FY2024; NASDAQ listed; $6.8B market cap
    - US-focused; large ticket (Peloton, travel, home goods); Shopify and Amazon merchants
    - Zero late fees; Amazon and Shopify partnerships; transparent pricing; RLTC risk management
    - US-only; limited consumer app vs. Klarna; smaller global merchant base
  - - Afterpay (Block)
    - Direct BNPL
    - $26.3B GMV 2023; part of Block ($40B market cap)
    - Younger consumers; fashion; ANZ and US markets
    - Block ecosystem integration; Square POS in-store; fashion vertical focus; zero-late-fee
    - Narrower product (Pay-in-4 only); Block integration not yet fully leveraged
  - - PayPal Pay in 4
    - Platform BNPL
    - $1.53T TPV 2023; 430M+ consumers; $35M+ merchants
    - Existing PayPal users; broad merchant base; low-friction checkout
    - Near-zero MDR for merchants; massive distribution; consumer trust; no new integration needed
    - Inferior shopping experience vs. Klarna app; not a standalone product; lower BNPL branding
  - - JPMorgan My Chase Plan
    - Bank installment
    - ~$10B installment volume est.; 50M+ Chase card holders
    - Existing Chase cardholders; moderate-to-large ticket purchases
    - Zero MDR; no consumer credit application; existing card trust; bank regulatory stability
    - Reactive to existing card spend; no pre-checkout intent capture; limited merchant marketing
  - - American Express Plan It
    - Bank installment
    - 25M+ US cardholders; $180B US billed business
    - Existing Amex cardholders; higher-income segment; travel and retail
    - Amex brand trust; no merchant MDR; strong rewards integration
    - Niche (Amex cardholders only); no pre-checkout integration; no consumer acquisition
  - - Zip Co
    - Direct BNPL
    - ~$2.5B GMV FY2024; ASX listed; smaller scale
    - Budget-conscious consumers; ANZ and US; lower AOV
    - Lower credit bar than Klarna; Australian market heritage
    - Loss-making; US profitability uncertain; sub-scale vs. Klarna and Affirm
  - - Sezzle
    - Direct BNPL
    - Sub-scale; private; ~$200M GMV est.
    - US budget consumers; lower income segment
    - Budget-friendly; simple product
    - Sub-scale; limited merchant network; no differentiated moat
  - - Scalapay
    - Adjacent BNPL
    - Private; $700M last valuation (2022); Europe-focused
    - Italian and Southern European fashion merchants
    - Strong in Italian e-commerce fashion; low MDR for EU merchants
    - Limited to Southern Europe; smaller scale; no global ambitions
  - - 'Status quo: Credit card'
    - Incumbent substitute
    - $10T+ global TPV; universal POS acceptance
    - All consumers with credit history; broad merchant base
    - Universal acceptance; rewards programs; credit building; 0% intro periods
    - Hard credit check; revolving debt risk; requires credit history; no checkout conversion boost
  notes: Competitor scale data from public filings (Affirm, Block, PayPal) or estimates for private companies. MDR ranges
