- id: TP004
  title: Moat durability / competitive risk register
  columns:
  - Moat Claim
  - Threat
  - Severity
  - Mitigation / Diligence Ask
  rows:
  - - Consumer data from 85M accounts enables superior underwriting
    - Affirm and PayPal have comparable or larger data sets at comparable quality; open banking reduces proprietary data advantage
    - Medium
    - Benchmark Klarna charge-off rates vs. Affirm and Afterpay on same-vintage cohorts; validate AI underwriting superiority
      independently
  - - Merchant network of 700K creates distribution moat
    - PayPal and Afterpay have comparable or larger networks; Shopify enables parallel integration of multiple BNPL providers
      without exclusivity
    - High
    - Review Klarna merchant multi-homing rate; request exclusivity rate and merchant NPS vs. peers
  - - EU banking license creates regulatory barrier in Europe
    - EU banking license is necessary for some products but not for basic BNPL; non-licensed players operate via regulated
      partners
    - Low-medium
    - Confirm which specific products require banking license vs. regulated agent; assess competitor licensing plans
  - - Klarna shopping app creates differentiated consumer acquisition
    - Shopping apps require sustained investment and consumer habit formation; Google, Amazon, and PayPal have superior consumer
      starting intent data
    - Medium
    - Shopping app MAU trend; consumer acquisition cost per new BNPL user via app vs. merchant integration vs. paid media
  - - AI underwriting and automated customer service reduce CAC and NIM losses
    - AI advantage in consumer credit is hard to sustain vs. Affirm and PayPal who also invest heavily in ML; open banking
      data reduces proprietary advantage
    - Medium
    - Klarna credit loss rate trend vs. Affirm RLTC rate; AI underwriting lift quantified in S-1 vs. third-party validation
  - - Full Klarna Merchant Platform (checkout + ads + lending) creates multi-product lock-in
    - Large merchants have leverage to negotiate individual product deals; competitive platforms can replicate over time
    - Medium
    - Klarna Merchant Platform adoption rate among top-100 merchants; request multi-product merchant churn data
  - - 'Commoditization risk: MDR pressure as PayPal/banks offer near-zero cost alternatives'
    - 'Structural: PayPal, banks offer BNPL at near-zero MDR to merchants; Klarna must justify premium through ROI data'
    - High
    - Track Klarna GMV revenue yield (revenue/GMV) over time; declining yield signals commoditization; request merchant MDR
      trend
  - - Consumer multi-homing limits brand loyalty and long-term LTV
    - Consumer has no incentive to use Klarna exclusively; BNPL provider at checkout determined by merchant integration
    - High
    - Klarna consumer repeat purchase rate and lifetime transaction count vs. first-purchase behavior
  notes: Severity assessments are based on analyst reports (Morgan Stanley, S&P Global) and market observations. High severity
    does not imply failure—it means the threat materially constrains moat durability and requires active monitoring. Unverified
    moat claims are documented in evidence gap GP002.
