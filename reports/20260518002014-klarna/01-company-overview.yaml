callouts:
  - calloutType: strength
    title: Klarna is the most globally scaled independent BNPL operator
    body: >-
      With 114 million consumers, 850,000 merchants, and $2.81 billion in revenue across 26 countries,
      Klarna has built a BNPL platform that no independent competitor has matched in geographic breadth
      and consumer reach. The NYSE IPO and Swedish banking license give it regulatory credibility and
      access to capital that most BNPL challengers lack.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO031
  - calloutType: risk
    title: Operating losses persist despite net profitability; post-IPO quarterly loss is a flag
    body: >-
      Klarna's $21 million net income in 2024 coexists with a $121 million operating loss, reflecting
      the cost of funding its lending book. The first quarterly earnings report as a public company in
      late 2025 showed a loss, raising questions about the durability of the profitability thesis and
      increasing scrutiny from public market investors.
    claimRefs:
      - CO010
      - CO011
      - CO022
  - calloutType: risk
    title: 85% peak-to-trough valuation collapse is part of Klarna's record
    body: >-
      The fall from a $45.6 billion June 2021 peak to a $6.7 billion July 2022 trough — an 85% decline —
      is the single most important context for assessing Klarna's capital discipline, management judgment,
      and investor trust. Diligence must evaluate whether the recovery narrative is structurally sound
      or dependent on favorable market conditions.
    claimRefs:
      - CO014
      - CO016
      - CO017
  - calloutType: insight
    title: Dual-class structure and founder control create governance concentration
    body: >-
      Siemiatkowski's Class B and Class C share arrangement gives him voting control disproportionate to
      his 8% economic interest. While Klarna is not a controlled company per NYSE rules, the governance
      design concentrates strategic and operational decisions in a single individual whose public
      statements have generated both admiration and controversy.
    claimRefs:
      - CO012
      - CO030
      - CO038
      - CO039
