  - id: section-4
    title: Scale metrics, adverse events, and financial position
    body: >-
      Klarna's scale metrics as of 2024 and early 2025 indicate a large but maturing business. The company
      served approximately 93 million consumers by end of 2024, growing to 114 million globally across 26
      countries, with approximately 850,000 merchant partners. Revenue reached $2.81 billion in 2024 with
      net income of $21 million representing Klarna's first annual profit, though operating income
      remained negative at $121 million, reflecting the ongoing cost of funding the lending book.
      Total assets were $13.8 billion against equity of $2.26 billion. The company employed 3,422 people
      in 2024, a significantly reduced headcount following the 2022 layoffs of more than 10% of staff.
      Average compensation per employee rose materially to $203,000, indicating a quality-for-quantity
      trade-off in the workforce restructuring.


      Adverse events constitute a material thread in Klarna's history. A May 2021 data breach briefly
      exposed users' account information to other users. The Swedish Privacy Protection Authority (IMY)
      fined Klarna 7.5 million SEK in 2022 for GDPR violations in data processing transparency. A
      German court ruled in 2022 that Klarna's email fee practice was illegal. CEO Siemiatkowski's
      December 2024 statements claiming AI could replace all human workers drew public criticism and
      were partially walked back by May 2025 when the company announced it was again hiring. The first
      quarterly earnings report as a public company showed a loss. The KlarnaUSD stablecoin launched
      November 2025 extends the product surface but also introduces new regulatory and execution risk.
      Collectively these incidents require diligent assessment in the governance and risk chapters.
