      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >-
              以 2025 年 9 月 IPO 估值为基准，三种情景划定了 Klarna 投资案例的区间。乐观情景下，Shopify 集成和美国商户扩张推动 Klarna 成功拿下可观美国 GMV 份额；AI 驱动效率在
              FY2026 前转化为接近两位数的经营利润率扩张；监管环境走向正常化，而不是进一步收紧。美国收入年增 40%+，欧洲保持稳定，可支撑 2026E 收入 $3.5–4 billion。若按 8–9x
              EV/Revenue 倍数估值，反映市场把公司重估为成长型金融科技，乐观情景可支持 $25–30 billion 估值。AI 效率故事是核心：如果 Klarna
              在收入增长的同时通过自动化降低等效人工人数，经营费用占收入比例会下降。

              基准情景下，Klarna 年收入增长 15–20%；英国 FCA BNPL 改革和欧盟 CCD2 实施带来温和的批准率压力和合规成本；经营利润率缓慢改善，接近盈亏平衡。FY2026E 收入约 $3.2–3.4
              billion，按 5–6x EV/Revenue 计算，估值为 $15–18 billion，大致与 IPO 定价一致。这个情景承认 Klarna 确有竞争优势，同时也把来自 Affirm
              的美国竞争和商户费用压缩计入价格。

              悲观情景很实质，而且已有反向证据支撑。Observer 报道 IPO 后 2025 年 Q3 出现净亏损、经营费用高于预期，说明盈利路径可能比 FY2024 里程碑暗示的更长。若英国——Klarna
              最大单一市场——的 FCA 监管显著降低批准率或要求额外资本缓冲，同时美国信用质量在消费者支出放缓中恶化，则悲观情景按 2–3x 收入给出 $6–9 billion
              估值。业绩恶化时，双层股权结构限制股东推动管理层变更的能力，放大下行风险。Apple Pay Later 2024 年 4 月停摆，是大型科技玩家可能突然退出 BNPL
              的先例，带来竞争不确定性。经济下行中信用损失上升，可能迅速抹掉 0.7% 的薄净利率。基于现有证据，情景概率分布约为 25% 乐观、50% 基准、25% 悲观。
