      - number: '1.4'
        title: 规模指标、负面事件与财务位置
        blocks:
          - type: paragraph
            body: >-
              截至 2024 年和 2025 年初，Klarna 的规模指标显示它已是一家大型但趋于成熟的公司。公司到 2024 年底服务约 93M 消费者，并在全球 26 个国家增长至 114M 消费者，商户伙伴约
              850,000 家。2024 年收入达到 $2.81B，净利润 $21M，这是 Klarna 首次实现年度盈利；但运营利润仍为负，亏损 $121M，反映出为贷款账本融资的成本仍在。总资产为 $13.8B，权益为
              $2.26B。2024 年公司雇用 3,422 人，较 2022 年裁员超过 10% 后明显收缩。员工平均薪酬大幅升至 $203,000，说明劳动力重组中出现了以质量换数量的取舍。


              负面事件是 Klarna 历史中的一条重要线索。2021 年 5 月，一次数据泄露曾短暂让用户可看到其他用户的账户信息。2022 年，瑞典隐私保护机构 IMY 因 Klarna 在数据处理透明度上违反
              GDPR，对其罚款 7.5M SEK。2022 年，德国法院裁定 Klarna 的电子邮件收费做法违法。CEO Siemiatkowski 在 2024 年 12 月声称 AI
              可取代所有人类员工，引发公众批评；到 2025 年 5 月，公司宣布重新招聘时，这一表态被部分收回。公司作为上市公司的首份季度业绩报告显示亏损。2025 年 11 月推出的 KlarnaUSD
              稳定币扩展了产品面，但也引入新的监管和执行风险。上述事件合在一起，需要在治理和风险章节中进行细致评估。
