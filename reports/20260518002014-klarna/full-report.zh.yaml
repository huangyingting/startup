        - 在电商之外增加新的 TAM 层；家电、家居、旅行等大额品类 AOV 更高
        - 按季度跟踪到店 GMV 占比变化；POS 合作伙伴数量
      - - 购物 app 和广告平台
        - 增长驱动
        - 2-4 年
        - 高毛利收入增速快于放贷；降低对利率周期的敏感性
        - 广告收入占总收入比例；广告毛利率
      - - 开放银行和账户到账户支付
        - 增长驱动
        - 2-4 年
        - 交易成本更低；更丰富的还款数据可改善承保
        - Klarna 在英国和欧盟的开放银行采用率；A2A 在 Pay Now 交易量中的占比
      - - 利率上升（资金成本）
        - 约束
        - 当前至 2 年
        - 仓储债务成本上升；压缩单笔交易净息差
        - Klarna 平均资金成本与基准利率趋势对比；对冲策略
      - - EU Consumer Credit Directive（CCD2，欧盟消费者信贷指令）
        - 约束
        - 2024-2026
        - 强制信用状况评估可能使边缘消费者 BNPL 通过率下降 5-20%
        - CCD2 在各成员国的实施时间线；Klarna 欧盟合规状态和通过率披露
      - - UK FCA BNPL 监管
        - 约束
        - 2024-2025
        - 英国所有 BNPL 都需信用检查；合规成本上升，GMV 可能下降
        - Klarna UK FCA 授权进度；估计有风险的英国 GMV
      - - 银行嵌入式分期方案（JPM、Citi、GS）
        - 约束
        - 2-5 年
        - 银行在现有信用卡轨道上提供分期方案，威胁商户粘性
        - 银行 BNPL GMV 增长；银行入场后 Klarna 商户续约率
      - - PayPal BNPL 结构性分发优势
        - 约束
        - 当前
        - PayPal 拥有 430M+ 消费者账户和 35M+ 商户集成，规模是 BNPL 金融科技公司难以复制的
        - PayPal BNPL GMV 和通过率相对 Klarna 的水平；商户共同集成率
      - - 经济下行时信用质量恶化
        - 约束
        - 尾部风险
        - 核销率上升会严重压缩 NIM；压力情景下循环信贷损失可能飙升 2-4 倍
        - Klarna 核销率与宏观压力情景对比；拨备覆盖率
      - - 消费者过度负债叙事
        - 约束
        - 1-3 年
        - 监管和声誉风险；会推高政治层面对 BNPL 监管的支持
        - 监测负面媒体报道和消费者权益倡导者立场；Klarna 投诉量趋势
    notes: 增长驱动因素具备结构性，证据也较充分。约束同样实质——2025-2026 年落地的监管和资金成本逆风最临近。线下门店和广告驱动属于增长期权， 不应放进基准假设，应与核心 BNPL 分开建模。
