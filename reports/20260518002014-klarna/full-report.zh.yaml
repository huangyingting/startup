      - number: '5.4'
        title: 信任、安全、隐私与合规控制
        blocks:
          - type: paragraph
            body: >-
              Klarna 作为持牌银行在 26 个监管辖区运营，各地监管框架不同，这塑造了它的信任与合规状态。它通过 Klarna Bank AB 持有瑞典银行牌照，并受 Finansinspektionen
              监管，因此适用完整 EU 银行监管，包括资本要求、Consumer Credit Directive 下的消费者信贷披露标准，以及 AML 和 KYC 义务。在英国，FCA 即将落地的 BNPL
              授权要求（CP23/10 已咨询）将要求 Klarna 取得 FCA 消费者信贷授权，并遵守信用评估义务，从而增加监管负担，并可能要求产品设计调整。在美国，CFPB 2023 年 BNPL 解释性指引确立了
              BNPL 提供商需提供争议权利和退款保护的要求，其保护水平类似 Regulation Z 对信用卡的要求，Klarna 必须在规模化运营中落地这些合规义务。

              安全和隐私方面，Klarna 披露过两起重大事件。2021 年 5 月，一项软件缺陷造成短暂数据暴露，约 90,000 名 App 用户可看到其他客户的订单历史和部分账户信息，这是严重的消费者信任事件。2022
              年，瑞典 IMY 因 Klarna Bank AB 在结账时向消费者展示的数据处理披露透明度不足、违反 GDPR，对其罚款 7.5M SEK。2020 年，Klarna
              自动填充功能曾被报告存在漏洞，在特定条件下可能导致未经授权的凭据暴露。Klarna 在 F-1 中以较高层次描述了其信任与安全框架，覆盖交易监控、身份验证和欺诈检测；但公开披露尚未确认技术架构深度，以及 SOC
              2 或 ISO 27001 等独立安全认证。信用决策引擎的可解释性、偏见审计记录，以及对 GDPR Article 22 自动化决策义务的合规性，仍是当前公开披露未解决的残余监管风险。
