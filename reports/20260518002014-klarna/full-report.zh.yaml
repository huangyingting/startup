      - number: '3.3'
        title: 切换成本、锁定效应与多归属
        blocks:
          - type: paragraph
            body: >-
              消费者切换成本很低，接近可忽略。消费者可以、也确实会同时多归属于 Klarna、Affirm 和 Afterpay，并根据结账可用性、促销优惠和商户集成来选择。在任一结账点，BNPL 提供商主要由可用性决定：如果
              Klarna 已集成，就出现 Klarna；如果只有 Affirm 已集成，就使用 Affirm。消费者品牌忠诚度低，对优惠条款高度敏感。


              商户切换成本中等。大型商户若从 Klarna 重新集成到 Affirm，直接 API 集成约需 4-8 周工程工作；Shopify/WooCommerce
              商户则更新插件即可。这造成切换摩擦，但不是锁定。商户往往同时保留 2-4 个 BNPL 集成，进一步降低切换风险。最持久的商户粘性出现在商户使用完整 Klarna Merchant Platform（Klarna
              Payments、Klarna Checkout 和 Klarna advertising）时；替换 Klarna 就需要同时替换多个产品。


              Klarna 的持久竞争优势包括：（1）规模化消费者数据（85M 账户、$105B GMV），支撑自研信用建模；（2）EU 银行牌照，在欧洲市场形成监管护城河，美国 BNPL 提供商若要复制成本很高；（3）购物
              App 打造消费者获客渠道，新增用户增长可绕开商户集成；（4）Klarna Merchant Platform 为大型商户捆绑多个产品。反面因素是：随着 PayPal 和银行提供近零成本 BNPL 替代品，MDR
              定价承压；消费者多归属限制忠诚度；前五大 BNPL 玩家之间的功能差距正快速收窄。
