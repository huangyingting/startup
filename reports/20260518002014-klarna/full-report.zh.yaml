  - id: TE002
    title: BNPL 工作流用例分析
    columns:
      - 用户任务
      - 现有工作流（使用 Klarna 前）
      - Klarna 方案
      - 可量化收益
      - 关键限制
    rows:
      - - 不用先付大笔现金就能购买高价商品
        - 用信用卡循环授信承担 20%+ APR，或申请个人贷款，接受信用审核并等待数日审批
        - Pay in 4 或 Financing — 结账时不到一秒即时审批；短期产品不触发硬信用查询
        - 去掉转化前的资金门槛；Klarna 称已集成商户结账转化率提升 20-30%
        - 没有 Klarna Card 时，未集成商户不可用；Financing 产品向消费者收取利息
      - - 决定购买前先试穿时尚或服饰商品
        - 先买后退 — 消费者先被扣款并等待退款；商户承担退货物流成本
        - Pay Later 30 天 — 消费者收货试用，并在退货窗口结束后付款
        - 降低消费者资金风险；提高平均订单价值；可能减少退货带来的坏账核销
        - 30 天延期付款带来消费者债务习惯化风险；英国 FCA 新规将改变产品设计
      - - 在特定零售商下单前先比价
        - 打开多个浏览器标签页，单独使用 Google Shopping，或先访问独立比价网站，再回到结账页
        - PriceRunner 集成进 Klarna app — 同一购物会话内一键跨零售商比价
        - 消费者省时间、找到更好价格；Klarna 为 Klarna Ads 捕捉高意图的购前行为数据
        - PriceRunner 在 Klarna app 中的集成深度，以及相对 Google Shopping 的地理覆盖，尚无充分独立基准测试
      - - 不用携带实体卡，也能管理多个零售商的会员卡
        - 钱包里带多张实体会员卡，或为每个计划分别管理零售商专属 app
        - Stocard 集成进 Klarna app — 所有会员卡与 BNPL 支付管理整合在一个 app 内
        - 提高 Klarna app 会话频次和粘性；提升消费者 LTV 和交叉销售机会
        - 收购后 Stocard 活跃用户数未公开披露；与 Klarna checkout 的完整集成成熟度不清楚
    claimRefs:
      - CE001
      - CE003
      - CE006
      - CE035
      - CE036
    notes: 工作流收益和转化率提升数字基于 Klarna 营销口径和 SEC F-1 披露。转化率提升和退货率影响尚无公开的独立第三方测量。
