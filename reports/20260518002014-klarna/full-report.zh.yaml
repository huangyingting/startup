  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              Klarna 经营的是双边网络，一端服务消费者（B2C），一端服务商户（B2B）；两类群体在平台经济模型里分工清楚、互相补强。消费者端，截至 2025 年 11 月，Klarna 总消费者数为 114
              million；截至 2024 年底，活跃消费者为 93 million，覆盖 26 个国家。用户结构明显偏向 18–34 岁的 Z
              世代和千禧一代：这代人从成长阶段就不信任循环信用卡，更喜欢透明的分期结构。Klarna 用户在时尚、电子产品、旅行、美妆和家居五大垂直品类上更活跃；数字优先的消费习惯，也让他们自然用起 Klarna 基于 app
              的购物信息流和比价工具。


              商户端，Klarna 的全球商户网络有 850,000 家，从使用 Klarna Shopify 和 WooCommerce 即插即用插件的 SMB 网店，到
              H&M、ASOS、Nike、Macy's、Sephora、Expedia、eBay、Etsy 和 Instacart 等大型企业客户。商户分层分成 B2B 企业层和 SMB 长尾，其中企业队列对 GMV
              的贡献更高。美国消费者业务 2015 年启动，2024–2025 年明显提速，已成为 Klarna 增长最快的地理市场之一。


              高价值消费者包括 Klarna Card 持卡人（约 4 million 用户）和 Klarna Plus 订阅者（$7.99/月），他们代表变现更高的用户层。Klarna Plus
              提供费用减免、返现和专属优惠，说明公司有意把消费者变现推向订阅模式，结构上接近订阅式忠诚度计划。开发者和平台型商户——通过 API 集成的商户——构成第三类 B2B
              群体；他们嵌入商户结账栈更深，因此切换成本更高。向杂货（Instacart）、旅行（Expedia）和家居扩张，也补上了核心时尚和电子产品基本盘之外的增量。
