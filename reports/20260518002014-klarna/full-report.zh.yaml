      - number: '4.3'
        title: 资本充足性与融资轨迹
        blocks:
          - type: paragraph
            body: >-
              Klarna 2025 年 9 月 NYSE IPO 以 $40/share 募资 $1.37B，隐含初始市值约 $15B；相比 2022 年 $6.7B 下调轮估值已有显著恢复，但仍远低于 2021 年
              $45.6B 峰值。IPO 募资用途为一般公司用途和国际扩张。公司概况章节记录了完整融资时间线；本章聚焦未来资本充足性。


              Klarna 最有特色的资本结构特征，是通过 Klarna Bank AB 持有并受 Finansinspektionen 监管的瑞典银行牌照。这使 Klarna 能吸收消费者存款，估计约 $2–3B，为
              BNPL 应收款账本提供低成本资金，降低对昂贵批发融资的依赖。但银行牌照也带来监管资本要求（EU 银行规则下最低 CET1 比率），形成纯软件平台不需要承受的长期资本拖累。


              IPO 前，Klarna 与国际银行安排了 $1B 循环信贷额度，作为流动性后盾，并与存款基础互补。IPO 后，如有需要，Klarna 可进入公开股权和债务市场追加融资。月度烧钱速度未单独披露；鉴于 2024
              年净利润为 $21M，合并层面业务似乎在产生正净利润，但运营现金流（包括应收款营运资本变动）可能不同于净利润。CET1 资本比率是关键银行偿付能力指标，IPO 前未公开披露，需要从 IPO 后监管文件中提取。
