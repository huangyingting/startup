      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >-
              Klarna 2024 年毛利率估计约 55–58%，与公开 BNPL 同业 Affirm（FY2024 为 57%）大致一致。毛利中的主要成本是 BNPL 应收款的净信用损失率，估计为 GMV 的
              0.5–0.7%，在 $105B GMV 基数上约为每年 $520–735M。信用损失率是最大的单一可变成本驱动因素，也对宏观环境敏感：经济下行中消费者逾期上升，可能迅速侵蚀毛利率。


              运营费用包括技术与工程、营销与销售、一般和行政费用。Klarna 声称，AI 自动化在 2024 年减少了约 700 个客户服务等效岗位，推动运营效率提升。尽管如此，运营利润仍约为
              -$121M，净盈利依靠其他收入实现，可能来自现金余额利息和外汇收益。运营利润率约为 -4.3%，说明核心业务在规模化后尚未产生正向现金。


              消费者获客成本（CAC）未公开披露。分析师估计混合 CAC 为每位消费者 $10–20；若按每用户收入 $30、55–58% 毛利率计算，隐含回本周期约 1–2 年。分析师估计 LTV/CAC 比率高于
              2x，但精确 cohort 数据是关键缺口。2024 年每活跃消费者 GMV 约 $1,129，意味着购买频次中等（每年约 5–8 次）且平均订单价值中等。美国市场单位经济模型未单独披露，这是承保 Klarna
              增长最快市场时的重要缺口。
