      - number: '4.4'
        title: 财务结论与尽调卡点
        blocks:
          - type: paragraph
            body: >-
              Klarna 2024 年盈利里程碑在战略上重要，但财务上脆弱。约 0.7% 的净利率（$2.81B 收入上实现 $21M）给信用损失飙升或收入放缓留下的缓冲很薄。约 $121M
              的运营亏损意味着核心运营在现金层面尚未自给自足，走向运营盈利依赖于在竞争激烈的 BNPL 市场中持续扩大利润率。


              收入质量为中等：主导性的商户费用流具备交易性和重复性，但受交易量风险和商户费率压缩影响。来自 Affirm、PayPal Pay in 4、Block 的 Afterpay，以及越来越多银行发行的 BNPL
              产品的竞争，正在增强商户议价权，并在中期制造结构性 MDR 压缩风险。消费者利息收入在增长，但承载更多信用风险。Klarna Plus 订阅收入仍处早期，规模未披露。


              对金融科技公司而言，资本强度中高：银行牌照、监管资本要求和 BNPL 应收款组合，使 Klarna 比纯软件平台更消耗资本。IPO 募资提供近期现金跑道，但持续国际扩张仍需要不断投入资本。


              主要尽调卡点包括：（1）美国市场专项财务指标，尚未披露但对增长最快市场至关重要；（2）按 vintage 拆分的信用损失曲线，用于承保违约风险；（3）按收入流拆分的毛利率；（4）CET1
              监管资本比率。Klarna IPO 后首批公开财务文件（Q4 2025 和 FY2025 20-F）将是解决这些缺口的最重要数据催化剂。
