  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与背景
        blocks:
          - type: paragraph
            body: >-
              Klarna 2025 年 9 月在 NYSE IPO，发行价 $40 每股，募集总额 $1.37 billion；上市首日交易把隐含市值推到 $17 billion 以上，而完全摊薄口径下初始定价估值约为
              $15 billion。这次 IPO 是一条剧烈估值弧线的终点：2021 年 6 月 SoftBank Vision Fund 领投 $639 million 轮时，估值峰值为 $45.6
              billion；2022 年 7 月下轮融资时灾难性下跌 85%，估值降至 $6.7 billion；之后靠恢复盈利和 NYSE 上市逐步修复。Klarna 以 KLAR 为代码上市，是 2025
              年最受关注的欧洲金融科技 IPO。

              投资逻辑立在四根相互连接的支柱上。第一，Klarna 在 FY2024 实现 2018 年以来首次年度净利润：收入 $2.81 billion、净利润 $21 million、同比增长
              24%，显示公司向盈利发生结构性拐点。第二，45+ 市场里的 $105 billion GMV，以及公司宣称的 114 million 消费者，构成美国单一市场同行 Affirm 难以复制的全球网络。第三，AI
              驱动效率叙事——替代 700+ 名客服坐席等效人力——支撑经营杠杆故事。第四，相比 Klarna 的欧洲大本营，美国市场仍显著低渗透。

              反向逻辑同样实质。尽管实现净盈利，经营利润仍深度为负，达到 -$121 million，意味着核心业务按现金口径尚不能自我支撑。0.7%
              净利率薄如刀锋，对信用损失激增或收入减速高度敏感。双层股权结构带来的治理担忧限制了少数股东保护。Observer 关于 IPO 后 2025 年 Q3 季度净亏损的业绩报道，又给盈利路径增加了实质不确定性。

              综合建议为继续研究，置信度中。按 IPO 时约 6x EV/Revenue 倍数，Klarna 相对 Affirm 等 BNPL 同行（约
              3–4x）估值合理到略偏高。地理分散度可以支持一定溢价；但把经营利润率脆弱性和治理折价纳入后，这个溢价显得偏紧。投资者应至少等待两个 IPO 后季度报告，再考虑建仓。
