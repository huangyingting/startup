      - number: '1.3'
        title: 融资历史与 IPO 进程
        blocks:
          - type: paragraph
            body: >-
              Klarna 的资本历史横跨近二十年，从一家小型瑞典创业公司走到数十亿美元市值的上市公司。早期投资人包括 2007 年的 Investment AB Öresund。Sequoia Capital 于 2010
              年加入。2011 年，Klarna 从 General Atlantic 和 DST Global 融资 $155M。2013 年，公司以约 $150M 收购 SOFORT AG，进入实时银行转账。到 2019
              年，Klarna 以 $5.5B 估值融资 $460M，被视为欧洲最大金融科技公司。高点出现在 2021 年 6 月，SoftBank Vision Fund 2 领投 $639M 融资，将 Klarna
              估值推至 $45.6B。


              随后的修正非常剧烈。2022 年 7 月，公司完成 $800M 下调轮，但估值仅 $6.7B，较 2021 年峰值下跌 85%，反映出成长型科技估值的大范围崩塌。Klarna 在 2023
              年运营企稳，并报告首次年度盈利。2024 年 7 月，公司完成 $800M IPO 前过桥融资，估值估计约 $15B，为进入公开市场铺路。Klarna 于 2025 年 3 月 14 日向 SEC 提交 F-1
              招股说明书（CIK：0002003292，file：333-285826），Goldman Sachs、J.P. Morgan 和 Morgan Stanley 担任主要承销商。2025 年 4 月，受
              Trump 政府关税引发的市场扰动影响，IPO 暂停；随后公司于 2025 年 9 月在 NYSE 以 $40/share 成功上市，募资 $1.37B。Klarna 此前已在 2024 年 11 月秘密提交
              S-1。IPO 后首份季度业绩显示亏损；截至 2026 年 5 月，若要精确量化公司市值，还需要当前市场数据。
