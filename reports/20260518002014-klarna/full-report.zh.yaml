  - id: TP004
    title: 护城河耐久性 / 竞争风险清单
    columns:
      - 护城河主张
      - 威胁
      - 严重程度
      - 缓释措施 / 尽调问题
    rows:
      - - 85M 账户的消费者数据支撑更优风控审批
        - Affirm 和 PayPal 拥有质量相当、规模相当或更大的数据集；开放银行会削弱自有数据优势
        - 中
        - 按同一放款批次队列，对比 Klarna 与 Affirm、Afterpay 的核销率；独立验证 AI 风控审批优势
      - - 700K 商户网络构成分发护城河
        - PayPal 和 Afterpay 网络相当或更大；Shopify 支持并行集成多个 BNPL 提供商，不需要排他
        - 高
        - 审查 Klarna 商户多归属率；索取排他率，以及商户 NPS 相对同业的水平
      - - 欧盟银行牌照在欧洲构成监管壁垒
        - 部分产品需要欧盟银行牌照，但基础 BNPL 不需要；无牌照玩家可通过受监管合作伙伴运营
        - 低-中
        - 确认哪些具体产品需要银行牌照、哪些可通过受监管代理；评估竞争对手牌照计划
      - - Klarna 购物 App 带来差异化消费者获客
        - 购物 App 需要持续投入，并要养成消费者习惯；Google、Amazon、PayPal 掌握更强的消费者起始意图数据
        - 中
        - 购物 App MAU 趋势；通过 App、商户集成、付费媒体获取每个新增 BNPL 用户的获客成本
      - - AI 风控审批和自动化客服降低 CAC 和 NIM 损失
        - 面对同样重金投入 ML 的 Affirm 和 PayPal，消费信贷里的 AI 优势难以维持；开放银行数据会削弱自有优势
        - 中
        - Klarna 信用损失率趋势与 Affirm RLTC 费率对比；S-1 招股说明书量化的 AI 风控提升与第三方验证对照
      - - 完整 Klarna Merchant Platform（结账 + 广告 + 放贷）形成多产品锁定
        - 大型商户有议价能力，可逐项谈判产品交易；竞争平台可随时间复制
        - 中
        - 前 100 大商户中的 Klarna Merchant Platform 采用率；索取多产品商户流失数据
      - - 商品化风险：PayPal / 银行提供近零成本替代方案，MDR 承压
        - 结构性：PayPal 和银行向商户提供近零 MDR 的 BNPL；Klarna 必须用 ROI 数据证明溢价合理
        - 高
        - 跟踪 Klarna GMV 收入收益率（收入 / GMV）的时间序列；收益率下降意味着商品化；索取商户 MDR 趋势
      - - 消费者多归属限制品牌忠诚度和长期 LTV
        - 消费者没有只用 Klarna 的动机；结账页的 BNPL 提供商由商户集成决定
        - 高
        - Klarna 消费者复购率、生命周期交易次数与首次购买行为对比
    notes: 严重程度评估基于分析师报告（Morgan Stanley、S&P Global）和市场观察。高严重程度不等于失败——而是威胁会实质限制护城河耐久性，需要持续主动监测。 未经验证的护城河主张记录在证据缺口 GP002。
