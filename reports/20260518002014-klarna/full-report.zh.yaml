      - number: '7.3'
        title: 财务与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Klarna 的财务风险画像可以概括为：利润率薄、信用损失受宏观影响大、竞争压力强，以及极端估值周期留下的后遗症。2022 年估值从 $45.6 billion 跌到 $6.7 billion，跌幅 85
              percent，说明在加息环境里，亏损金融科技公司的投资者情绪和融资条件可以多快反转。Klarna 2024 年重新实现名义净盈利，净利润 $21 million；但这是在经营利润约 -$121 million
              的情况下取得的，盈利依赖现金余额利息和外汇收益等非经营性收入项目。Observer 报道的 IPO 后 2025 年 Q3 季度亏损，对 2024 年盈利里程碑的可持续性，以及 Klarna
              通往经营盈利路径的稳固性，提出了严肃问题。


              信用损失是最主要的财务风险变量。按约 0.6 percent GMV 计算，在 $105 billion GMV 基础上约为 $630
              million，信用损失是模型里最大的可变成本。衰退情景下，这一比例可能翻倍或变成三倍，迅速抹掉本就很薄的利润率，并造成大额经营亏损。CFPB 研究记录显示，BNPL 用户比普通信用人群更可能陷入财务困境，说明
              Klarna 的近优级消费者基础在下行周期中特别脆弱。利率敏感性又进一步放大财务风险：基准利率上升会提高银行资产负债表上的资金成本，压缩消费者融资产品的净息差。


              竞争端，BNPL 市场越来越商品化。Affirm 在美国市场拿下 Amazon、Walmart 和 Shopify 的独家或优先分发。PayPal Pay Later 受益于全球超过 430 million
              现有账户持有人。JPMorgan Chase 和 American Express 推出自有 BNPL 产品，既有更低资金成本，也有既有客户关系。Apple Pay Later 虽有 Apple
              的巨大分发和生态优势，却在 2024 年 4 月停摆，为独立 BNPL 商业模式的结构性局限提供了警示先例。中期看，竞争驱动的结构性 MDR
              压缩会拖累商户费用收入；若衰退推高消费者违约，收入和利润率会同时受压，整个盈利轨迹都将承压。FR002 的财务与竞争风险传导图展示了监管、信用和竞争压力如何汇聚到 Klarna 的收入、利润率和估值上。
