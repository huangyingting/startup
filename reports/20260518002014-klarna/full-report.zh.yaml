  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Klarna 位于消费者 BNPL 信贷、商户结账和数字商务基础设施的交叉点。它的核心市场是全球 BNPL 赛道，即嵌入销售点的分期信贷；但平台覆盖面正扩展到 Pay
              Now（账户到账户和借记）、商户营销与广告，以及 Klarna Card、Klarna Balance 等消费者金融服务。


              最直接可触达的市场是线上零售结账场景，Klarna 在这里作为信用卡、借记卡和 PayPal 之外的支付方式参与竞争。2024 年全球电商交易额约为 $6.3T，年增长约
              10%（McKinsey、Statista）。按 Worldpay 数据，BNPL 在 2024 年占其中约 3.8%，对应约 $240B 的 BNPL 相关市场；到 2026 年，BNPL 预计升至电商交易的
              5-6%。Klarna 2024 年隐含 SOM 约为 $105B GMV，约占估算全球 BNPL TPV 的 18-21%，具体取决于口径来源；这一规模也明显低于公司在 S-1 中声称的 $1.5T SAM。


              BNPL 最主要的现状替代品是信用卡，后者主导全球消费者支出。信用卡提供循环信贷，但伴随复利、浮动利率，以及审批时的硬查询要求。BNPL 通过 0% 短期分期、固定还款计划，以及对小额 Pay-in-4
              产品采用软查询或免查询承保来竞争。次要替代品包括个人贷款、延期账单（Klarna Pay Later 30-day）和商店延期取货计划。Klarna 的核心 TAM 不包括 B2B/SME
              贸易信贷、抵押贷款、汽车贷款、保险和一般储蓄产品。
