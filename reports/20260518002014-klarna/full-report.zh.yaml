      - number: '5.2'
        title: Klarna App、AI 与消费者互动平台
        blocks:
          - type: paragraph
            body: >-
              结账之外，Klarna 大量投入，把消费者移动 App 转向更广义的购物互动和金融服务平台。Klarna App 把个性化购物信息流、由 2022 年 3 月完成收购的 PriceRunner
              支撑的比价引擎、通过 2021 年 7 月收购 Stocard 获得的数字会员卡存储、返现奖励、订单追踪和 Klarna Balance 储蓄账户，都聚合在单个消费者应用中。截至 2025 年初，Klarna
              Card 约有 4M 持卡人，把 Klarna 的触达扩展到店内和未集成商户的购买场景，模糊了传统 BNPL 与通用信用卡使用之间的边界。Klarna Plus 每月
              $7.99，通过费用减免、更高返现档位和独家合作伙伴优惠，向高频 App 用户变现；这在核心交易业务之上叠加了直接订阅收入流。移动 App 交易是 Klarna 消费者的主导互动渠道，App
              也是付款管理、订单追踪、购物发现和金融账户管理的主要界面。

              Klarna 于 2024 年 2 月推出基于 OpenAI 技术的 AI 客服助手，这是 Klarna IPO 叙事中最突出的技术里程碑。公司称，该 AI 首月处理 2.3M 次对话，相当于 700
              名全职客服，带来运营成本效率的阶跃式改善。但 2025 年 5 月，CEO Sebastian Siemiatkowski 公开承认质量问题，称人工客服在某些服务场景中表现优于
              AI。这次回撤引入重大不确定性：AI 驱动的成本节省能否持续，以及在所报告质量门槛下，700 名客服等效是否仍成立。Klarna 集成式消费者平台覆盖支付、储蓄、会员和比价，深度使其区别于纯结账型 BNPL
              提供商，也支撑其横跨订阅、广告和交易费的多产品消费者变现策略。
