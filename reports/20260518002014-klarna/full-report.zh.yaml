companyProfile:
  summary: >-
    Klarna Group plc 是一家总部法定设在 London、发源于 Stockholm 的金融科技公司，开创了先买后付（BNPL）分期支付，并扩展到轻量级消费者银行、比价和稳定币支付。公司在长期推迟后，于 2025 年 9
    月以 $40/share 完成 NYSE IPO，募资 $1.37B，首日估值超过 $17B。公开证据支持其真实规模、2024 年首次年度净盈利，以及较宽的产品面，但运营亏损仍在，IPO 后季度业绩也出现亏损，盈利轨迹仍不确定。
