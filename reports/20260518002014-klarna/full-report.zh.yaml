      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              BNPL 的结构性顺风包括 Gen Z 和 Millennial 对信用卡的回避、电商结账量扩张，以及商户对已验证转化率工具的需求。AI 驱动的承保改进可在控制风险的同时，把审批率扩展到信用档案较薄的人群。店内
              POS 终端 BNPL 的增长，以及 Klarna 广告平台收入，都是额外价值创造杠杆，并不完全依赖交易 GMV 增长。


              逆风同样重要。2022 年以来利率上行，提高了 Klarna 仓库债融资成本，并压缩净息差。Oliver Wyman 估计，利率上升 200bp 会压缩 BNPL NIM 1.5-2.5 个百分点。2023
              年通过的 EU Consumer Credit Directive（CCD2）要求所有 BNPL 产品进行完整信用评估，成员国将在 2025-2026 年落地执行。UK FCA 也提出对所有 BNPL
              产品设置信用检查要求。这些监管影响 Klarna 两个最大市场，是近期最重要的约束，但对审批率的精确影响仍未量化。


              竞争逆风正在加剧：PayPal 的 BNPL（Pay in 4、Pay Monthly）受益于 430M+ 消费者账户和 35M+ 商户集成。JPMorgan、Citibank、Goldman Sachs
              等银行正在把嵌入式分期计划加入现有信用卡，消除了商户集成要求。Morgan Stanley 预计 BNPL 增长将从周期高点 40-50% 的 CAGR 放缓到 2025 年的 15-20%。Apple Pay
              Later 在 2024 年中关闭，说明大科技入场有边界，但并未消除平台风险。S&P Global 将宏观下行中的信用质量恶化列为 BNPL 放贷方的主要尾部风险。
