      - number: '7.4'
        title: 合作伙伴、依赖、人员与治理风险
        blocks:
          - type: paragraph
            body: >-
              Klarna 的合作伙伴、人员和治理风险集中在三条线上：人员重组后果、技术和支付网络依赖，以及 CEO 治理控制。2022 年裁员计划把 Klarna 全球员工数从超过 7,000 人降到 2024 年 H1 约
              3,422 人，约两年内减少超过 50 percent。公司把这一变化包装为 AI 驱动的效率提升，但如此剧烈的缩编会给剩余高管带来人才留存风险，给留任员工带来士气风险；如果 AI
              不能完全替代随裁员流失的制度知识和客服产能，还会带来执行风险。Glassdoor 和 LinkedIn 等平台上的员工满意度信号，是评估重组后文化韧性的重要尽调维度，但目前尚未被充分评估。


              双层股权结构让 CEO Sebastian Siemiatkowski 持有带超级投票权的 Class C 股份，使其 IPO
              后投票控制权相对经济所有权明显不成比例。这限制了公众股东推动治理变更、制衡管理层决策，或在业绩不佳时通过董事会层面行动作出回应的能力。因此关键人物风险很高：Klarna 的战略方向、AI
              转型叙事和投资者关系，都异常依赖一位创始人 CEO，且公司未披露继任计划。CEO 是否曾受到任何监管问询或证词询问，并未公开披露，构成未解决的治理尽调事项。


              商户集中度是结构性收入脆弱点。虽然精确数据未公开，但 BNPL 网络通常在头部商户伙伴中呈现显著 GMV 集中。失去锚定商户关系，或在续约中接受不利条款，都会实质降低 GMV
              和连带商户费用收入。外汇风险又加重了这一问题：公司以 USD 报告，但在 26 种或更多货币中运营，SEK 和 EUR 收益带来实质折算暴露。FR003 的依赖地图展示了支撑 Klarna
              运营的关键伙伴和监管节点依赖。Klarna Card 产品依赖 Visa 和 Mastercard，云基础设施又集中在主要提供商上，都是关键技术依赖。Niklas Adalberth 据报道把重度 BNPL
              用户称为最佳客户，尽管这些用户逾期画像更高；这会引出牵动监管和声誉风险的负责任贷款问题。CFPB 研究提示 Klarna 用户基础中近优级消费者集中，也会放大衰退情景下的违约风险。IPO 后 SEC
              披露要求，会把 Klarna 的专有指标和战略定位暴露给竞争对手和监管机构审视。
