      - number: '6.2'
        title: 消费者采用轨迹与具名商户证明
        blocks:
          - type: paragraph
            body: >-
              Klarna 的消费者采用曲线很强。2024 年底活跃消费者为 93 million，到了 2025 年 11 月总消费者数达到 114 million，不到 12 个月净增超过 20 million
              用户，折算年化增速超过 20 percent。2024 年 GMV 达 $105 billion，不只是用户增长，也说明单个消费者的支出在加深。Klarna Card 的 4 million
              用户，则进一步证明消费者产品已经从 BNPL 延伸到日常消费。


              多个垂直品类的具名商户证据，为 Klarna 商户网络价值提供了强企业级证明。时尚领域，H&M 和 ASOS 在全球电商平台提供 Klarna。运动服饰和鞋履领域，Nike 在美国消费者结账环节接入
              Klarna。百货领域，Macy's 把 Klarna 作为主要 BNPL 合作伙伴。美妆护肤领域，Sephora 在美国平台提供 Klarna 支付选项。旅行由 Expedia 覆盖；平台型电商由 eBay 和
              Etsy 覆盖；Instacart 的杂货配送把 Klarna 从传统零售推到日常高频消费品类。电子巨头 Samsung 也为高客单价设备购买提供
              Klarna。至少九个主要垂直品类里的具名商户宽度说明，Klarna 的商户主张不只在最初的时尚强项里成立，也能打进多种零售场景。


              更关键的是，美国扩张在 2024–2025 年加速。美国市场 2015 年启动，如今已有多家 Klarna 最显眼的企业商户；美国本土消费者和商户机会规模大，而且还在增长。Klarna 已确认覆盖 iOS 和
              Android 两大 app 平台，能在商户结账流程之外持续获客并保持互动。不过，公开可见的企业商户名单只覆盖 850,000 家总商户中的一小部分；企业层相对于 SMB 长尾的 GMV 集中度，Klarna
              并未公开披露。
