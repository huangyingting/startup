      - number: '7.2'
        title: 运营、安全与技术风险
        blocks:
          - type: paragraph
            body: >-
              Klarna 的运营、安全和技术风险，来自快速搭建大规模消费者金融基础设施的内在难度。记录最充分的安全事件包括 2021 年 5
              月数据泄露：一个软件缺陷让用户看到其他用户的账户信息，包括交易历史和部分付款详情；以及 Der Spiegel 报道的 2020 年 8 月自动填充漏洞，该漏洞把个人和支付数据暴露给第三方网站。Klarna
              称两起问题都已迅速解决，但事后安全加固到什么程度、是否获得独立安全认证，并无公开记录；补救措施是否足够稳固仍有残余不确定性。所有适用系统组件的 SOC 2 Type II、ISO 27001 或 PCI-DSS
              认证状态，尚未通过公开资料确认。


              英国 ICO 2020 年启动了对 Klarna 数据实践的调查，使隐私风险进一步承压。在超过 26 个国家里，遵守 GDPR、UK GDPR
              以及各国同等数据保护框架，会持续吃掉数据治理资源，并提高反复遭遇监管行动的风险；2022 年 IMY 罚款就是证据。利用 Klarna 快速批准 BNPL
              流程进行身份盗用和未授权账户欺诈，也是额外运营风险，带来声誉和监管暴露。


              AI 驱动的运营转型存在显著执行风险。CEO Sebastian Siemiatkowski 在 2024 年底公开称，AI 实际替代了 700 名客服坐席，且 AI 服务质量超过人工坐席。到 2025 年 5
              月，他又公开回撤，承认 AI 质量未达预期，复杂互动仍需要人工坐席。这个反转说明，依赖 AI 的运营效率节省可能被高估，消费者服务质量也可能下滑；在要求金融服务具备充分消费者救济机制的市场，这会引发监管关注。


              技术上依赖主要云基础设施提供商、Klarna Card 又依赖 Visa 和 Mastercard 支付通道，构成运营集中风险；一旦关键依赖失效，全球交易处理都可能受扰。随着 AI
              驱动的自动承销扩展到受监管的美国和英国借贷市场，信贷决策偏见与公平贷款合规风险会成为越来越重要的运营风险维度，需要提前准备监管文档和模型治理。
