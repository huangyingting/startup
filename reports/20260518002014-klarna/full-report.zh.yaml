  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: BNPL 核心产品与结账流程
        blocks:
          - type: paragraph
            body: >-
              Klarna 的基础产品套件由五种消费者支付选项组成，并按地区和使用场景调整。Pay in 4 是美国旗舰产品，把购买金额拆成四期、每两周支付一次且免息；消费者不承担利息成本，Klarna
              则从商户折扣率中获得收入。Pay in 3 是英国和欧洲市场的结构等价产品，提供三期分期且不向消费者收取利息。Pay Later 提供 30
              天延期付款窗口，适合希望先试用产品再付款的消费者；在退货率高的时尚和服饰场景尤其受欢迎。Klarna Financing 把信用窗口延长到 6 到 36
              个月，用于较大额购买，并适用消费者利率，因此收入结构不同于免息短期产品。Klarna Card 提供实体和虚拟两种形态，把 Klarna 的分期支付选项扩展到全球任何接受 Visa 的商户，包括未直接接入
              Klarna 的商户，从而显著扩大可触达的消费者结账面。

              消费者结账旅程始于 Klarna 的 JavaScript 支付组件，商户只需少量工程工作即可嵌入结账页。消费者在结账时选择 Klarna 支付选项，经过亚秒级实时信用决策，并即时获得批准或拒绝。这种低摩擦体验是
              Klarna 面向商户价值主张的核心：提升结账转化率，并触达偏好延期付款的大量消费者。Klarna 目前已接入全球约 850,000 家商户，覆盖 26 个国家，2024 全年处理 $105B
              GMV。Klarna App 是消费者管理付款和发现商户的主要移动触点。跨地区的产品宽度、低摩擦结账组件架构，以及商户网络规模，共同构成 Klarna 在 BNPL 市场的竞争位置核心。
