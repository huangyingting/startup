      - number: '3.2'
        title: 竞争者画像与功能对比
        blocks:
          - type: paragraph
            body: >-
              在直接 BNPL 同业中，Affirm 是最重要的美国基准。其 FY2024 GMV 为 $26.6B，活跃消费者 19M，是美国领先的 BNPL 专业公司。Affirm 向商户收取 2-8% MDR，并提供
              0% 利息 Pay-in-4 和较长期月度分期计划。它对消费者不收逾期费的政策不同于 Klarna，后者会对 Pay Later 产品收取逾期费。Affirm 与 Amazon、Shopify
              的合作带来结构性分发，降低了对直接商户 BD 的依赖。Afterpay（Block）面向更年轻的人群，采用更严格的仅 Pay-in-4 模式，并收取 4-6% MDR。2022 年被 Block（原
              Square）收购后，Afterpay 获得进入 Square POS 终端的集成路径，店内优势正在扩大。


              PayPal 的 BNPL 在性质上不同：它不是独立产品，而是捆绑在 PayPal 钱包中的结账功能。这使 MDR 比较变得困难——PayPal BNPL 包含在标准 PayPal 处理费内，对已经使用
              PayPal 的商户而言，形成近乎零 MDR 的 BNPL 价值主张。消费者体验弱于 Klarna 的购物 App 生态，但分发优势压倒性。若只看商户结账，PayPal BNPL 是 Klarna
              Pay-in-4 的低成本强替代。


              银行分期计划（JPMorgan My Chase Plan、Citi Flex Pay、Amex Plan
              It）把现有信用卡余额转换为固定分期计划。商户不承担额外费用，因此这些产品对商户在结构上免费。但它们是事后反应式产品（用于既有卡交易），而不是结账时主动提供，因此对销售点转化率的影响有限。包括 Klarna
              在内的 BNPL 提供商，受益于银行分期产品没有的结账前消费者意向信号。
