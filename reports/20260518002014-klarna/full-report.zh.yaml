      - number: '1.2'
        title: 管理层、董事会与治理
        blocks:
          - type: paragraph
            body: >-
              Klarna 的管理团队以创始人兼 CEO Sebastian Siemiatkowski 为核心。他自 2005 年公司创立以来一直掌舵，也是公司最重要的个人股东和公众面孔。Sequoia Capital 的
              Michael Moritz 担任董事长。公司治理结构体现出双重股权安排：Class A 股每股一票；Class B 股发行给 IPO 前股东，包括 Sequoia
              和其他早期投资人，每股十票，但除经济持股外没有额外经济权利；Class C 股每股十票，仅可通过期权发行给 Siemiatkowski，以强化其控制权。这意味着，尽管 Siemiatkowski 在 IPO
              后持有约 8% 经济权益，他仍拥有不成比例的投票权。


              尽管 Siemiatkowski 拥有增强投票权，Klarna 按 NYSE 规则并不被归类为受控公司，因此需遵守完整的 NYSE 公司治理要求。IPO 的主要承销商包括 Goldman Sachs、J.P.
              Morgan、Morgan Stanley、BofA Securities、Citigroup 和 Deutsche Bank Securities。Klarna
              作为外国私人发行人运营，并非新兴成长型公司。关键人物风险集中在 Siemiatkowski：他的公众形象、战略决策，包括 2024 年 12 月关于 AI 可取代所有人类员工的争议表态，以及治理权利，都是评估
              Klarna 领导力质量和延续性风险的核心。Sequoia Capital 持股约 22%，是最大机构股东。
