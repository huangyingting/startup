  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图
        blocks:
          - type: paragraph
            body: >-
              Klarna 的竞争横跨三类：直接 BNPL 同业、内嵌 BNPL 的平台玩家，以及在现有产品上提供分期功能的银行 / 卡组织在位者。


              直接 BNPL 同业包括 Affirm（FY2024 GMV 为 $26.6B，聚焦美国）、Afterpay（Block，2023 年 GMV 为 $26.3B，美国 / 澳新）、Zip Co（较小的澳新 /
              美国玩家）和 Sezzle（美国次规模玩家）。它们主要在商户集成、消费者承保质量、MDR 定价和结账转化提升上竞争。Klarna 的 $105B GMV 让它按交易量约为第二大直接同业的 4 倍。


              平台型竞争者因分发优势而更具结构性威胁。PayPal Pay in 4 嵌入 430M+ 消费者账户和 35M+ 商户集成，且不收增量商户费用，使 BNPL 几乎覆盖所有启用 PayPal 的商户。Apple
              Pay Later 于 2023 年推出，但在 2024 年中关闭，转向 Affirm 合作伙伴模式，说明信用基础设施对科技平台并非轻松门槛。Amazon、Google Pay 和 Apple
              仍可能以规模重新进入。


              银行 / 卡组织在位者构成最持久的结构性威胁。JPMorgan My Chase Plan、Citi Flex Pay 和 American Express Plan It
              可把现有信用卡余额转为固定分期计划，对商户没有额外 MDR（由卡交换费吸收）。这些产品不需要新的消费者信用申请，不需要商户重新集成，并利用既有信任关系，因此在商户结账场景中是 BNPL
              的有力替代品。现状信用卡仍是主导消费者信用工具，占全球消费者信贷交易量 85%+。
