      - number: '6.4'
        title: 留存、满意度与集中度风险
        blocks:
          - type: paragraph
            body: >-
              消费者满意度信号并不单一。Klarna 在 Trustpilot 上有大量评论，反映其全球消费者群体的体验。正面评论强调支付顺滑、财务安排更灵活；但反向信号也很实质。The Guardian
              的调查报道记录了消费者通过 Klarna 累积债务、后悔 BNPL 购买，并担心平台太容易让人超出能力消费。CFPB 对 BNPL 行业的审查也印证了这一点：BNPL
              用户信用分更低、逾期率更高，也比普通人群更可能背负循环债务——这项结构性风险直接落在 Klarna 的消费者基础上。


              Klarna 消费者投诉中，已有身份盗用和欺诈事件记录：欺诈者用受害者姓名开设账户并购物，账单却落到受害者身上。Swedish Consumer Agency 对 Klarna 营销实践的投诉可追溯到 2014
              年，说明 Klarna 的消费者获客策略与消费者保护标准之间长期存在张力。虽然部分反向信号已经有些年头，但在英国 FCA 和美国 CFPB 推进正式 BNPL 监管制度之际，它们仍与持续监管风险直接相关。


              B2B 商户端，关键留存指标——商户 NRR 和 GRR——没有公开披露。Klarna 的 SEC F-1
              没有给出队列级商户收入数据，外部无法靠公开资料独立评估商户忠诚度。消费者复购率同样未披露。企业商户层面存在集中度风险：商户基础虽然覆盖 850,000 个账户，但相当一部分 GMV
              很可能集中在少数具名企业关系中。失去头部商户伙伴可能实质冲击 GMV 和收入，尽管 Klarna 没有披露集中度阈值。队列图基于已确认的合作持续时间，展示了可用的代理留存信号；Trustpilot 评分和
              FCA/CFPB 监管进展，都是尽调需要持续监控的事项。
