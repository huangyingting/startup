      - SR012
  - id: FR003
    title: 依赖关系图
    type: dag
    insight: Klarna 运营栈依赖四组关键外部节点：支付网络（Visa 和 Mastercard）、云基础设施、OpenAI AI 模型层，以及锚定商户关系。任何节点受扰，都会向上游传导到消费者交易能力和收入生成。
    data:
