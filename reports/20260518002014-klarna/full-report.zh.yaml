  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式、定价与收入结构
        blocks:
          - type: paragraph
            body: >-
              Klarna FY2024 收入为 $2.81B，同比增长 24%，由 GMV 增至 $105B 和货币化改善驱动。公司实现 2018
              年以来首次年度净利润——$21M——标志着多年亏损后的结构性拐点。收入来自三大主要机制：通过 Klarna 结账完成购买所产生的交易佣金（商户折扣率，MDR）、融资产品（Pay Later、月度分期、Klarna
              Financing）带来的消费者利息和费用收入，以及包括订阅在内的服务费。基于 S-1 分部披露，商户费用估计占总收入约 60–65%，说明 Klarna
              主要是商户付费模式。公司没有单独披露各收入流数据，限制了收入质量分析的精度。


              美国市场 Pay in 4 标价约为每笔交易 3.29% + $0.30，高于 PayPal Pay in 4 基线，反映出 Klarna
              围绕转化提升和品牌认知向商户提供的价值主张。企业级商户通常会谈判出更低实际 MDR，标价和实际价格之间的差距是关键尽调缺口。Klarna Plus 在美国以
              $7.99/月推出，为消费者提供费用减免和返现，形成直接订阅收入流，但订阅用户数未披露。Klarna Balance
              是带息储蓄产品，可产生存款利差收入，但公开文件未将其单独量化为重要收入线。较长期融资产品（月度分期、Klarna Financing）占比上升值得关注：Bloomberg
              报道显示贷款账本同比翻倍以上，推动收入结构转向利息收入，也提高资产负债表久期风险。
