      - number: '8.5'
        title: 治理、风险与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              Klarna 的治理结构是关键估值因素，也让它不同于多数 NYSE 上市同行。双层股权结构通过 Class C 超级投票股赋予 CEO Sebastian Siemiatkowski
              不成比例的投票控制权，尽管他的经济所有权约为 8%。这意味着，没有创始人支持，公众股东无法实质影响董事会组成、高管薪酬或重大战略决策。按治理溢价学术文献，这类结构通常相对同等单一股权公司折价
              10–20%；机构代理顾问 ISS 和 Glass Lewis 也常规反对剥夺少数股东权利的治理结构。这个治理折价已嵌入反向估值评估。

              Sequoia Capital 持有 Klarna 约 22% 股份，是最大外部股东。创始人、Sequoia 和其他主要投资者的 IPO 后锁定期到期日并未精确公开，构成实质悬顶风险。若 Sequoia
              在锁定期结束后清仓，考虑到持仓规模相对 Klarna 作为新上市公司的日交易量，卖压可能很大。

              需要持续监控的关键止损触发器和投资逻辑破裂信号包括：FCA BNPL 监管对英国收入形成实质限制（估计占全球 GMV 的 30–35%）；美国信用质量恶化，推动净信用损失率从 GMV 的 0.6% 飙升至
              1.5–2%；Q4 2025 和 FY2025 的 IPO 后业绩确认 Observer 关于 2025 年 Q3 亏损的报道；以及若前三大商户减少 Klarna
              结账集成，运营方集中风险显性化。任一事件都可能触发倍数重估，向 Affirm 3–4x 区间或更低水平靠拢。

              建立任何 Klarna 仓位前，最终尽调问题集中在五项：(1) 地理收入拆分，尤其是美国单独数据和 GMV；(2) 完全摊薄股数，包括所有期权、RSU 和认股权证；(3) 创始人和 Sequoia
              的精确锁定期到期安排；(4) 细颗粒度信用损失 vintage 数据，用于承销违约风险；(5) IPO 后至少两个季度业绩，用来建立财务记录。拿不到这些，建议仍应是继续研究，而不是采取任何主动仓位。
