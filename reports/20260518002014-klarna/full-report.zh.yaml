        - 2025 年 Q4 和 2026 年 Q1 财报确认持续净亏损
        - IPO 后连续两个季度净亏损，且没有清晰经营盈亏平衡路径
        - 估值向悲观情景（$6–9B）重估；若持续则退出仓位
      - - 美国信贷质量恶化推动损失率飙升
        - Klarna IPO 后按地域披露季度净信贷损失率
        - 美国信贷损失率超过 GMV 的 1.5%（对比 FY2024 合并基线约 0.6%）
        - 悲观情景加速兑现；若损失率达到 GMV 的 2%，应完全退出仓位
      - - Sequoia 锁定期后大宗减持引发持续卖压
        - 锁定期到期后，Sequoia 实体提交的 SEC Form 4 和 Schedule 13D/G 文件
        - 锁定期后任意 90 天窗口内，Sequoia 出售 >5% 股份
        - 下调仓位规模；监测内部人是否持续抛售，以判断供给压力信号
      - - 治理危机或创始人离任导致领导层不稳
        - 董事会重组公告、SEC 8-K 重大事件，或创始人公开争议
        - 宣布 Siemiatkowski 离任，或出现敌意董事会争夺
        - 立即评估退出；双重股权结构意味着股东追索手段有限
    claimRefs:
      - CV021
      - CV028
      - CV030
      - CV031
      - CV041
    notes: 触发条件必须具体、可观察、可执行。阈值代表把建议从“继续研究”推进到主动卖出所需的证据强度。监测节奏应为 IPO 后每季度财报后复盘，并持续跟踪 SEC 文件。
  - id: TV006
    title: 最终尽调待确认事项表
    columns:
      - 信息请求
      - 理由
      - 优先级
      - 来源 / 获取方式
    rows:
      - - 按地域拆分的美国收入、GMV 和信用损失数据
        - 美国市场是主要增长引擎；没有美国分部数据，就无法与 Affirm 对标
        - P0 — 阻断
        - FY2025 20-F 地域分部附注；投资者关系管理层会议
      - - 计入全部期权、RSU 和认股权证的完全摊薄股数
        - 精确计算市值和稀释影响所必需
        - P0 — 阻断
        - F-1/A 招股书补充文件资本结构表；IPO 后提交给 SEC 的股权计划文件
      - - Siemiatkowski 和 Sequoia Capital 的准确锁定期到期时间表
        - Sequoia 22% 持股是锁定期后主要抛压；时间点决定仓位规模风险
        - P1 — 重大
        - F-1 锁定协议章节；IPO 后持续监测 SEC Form 4 和 Schedule 13D/G
      - - 按产品类型拆分的信用损失 vintage 曲线（Pay in 4、分期、Financing）
        - vintage 级信用损失数据是判断承保违约风险轨迹的关键
        - P1 — 重大
        - CFO 会议请求；用 Affirm 10-K vintage 披露作为可比代理
      - - IPO 后 Q4 2025 和 FY2025 财报，用来确认或反转 Q3 2025 亏损
        - Observer 关于 Q3 2025 的反向报告必须由官方文件证实或证伪
        - P1 — 重大
        - Klarna Q4 2025 财报新闻稿；FY2025 20-F SEC 文件（预计 2026 H1）
    claimRefs:
      - CV019
      - CV022
      - CV032
      - CV035
      - CV042
    notes: 优先级为 P0（阻断——没有这些数据不建仓）和 P1（重大——仓位超过小额试探仓前必须取得）。五项请求全部解决后，投资论点才算完成充分承保。
figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: Klarna 的公开记录从 2005 年在 Stockholm 创立 BNPL 开始，经历 2021 年估值高峰、2022 年估值暴跌 85%、经营修复，并在 2025 年登陆 NYSE。
    data:
      items:
        - date: '2005-01-01'
          label: 在 Stockholm 创立
          detail: Sebastian Siemiatkowski、Niklas Adalberth 和 Victor Jacobsson 将 Klarna 作为 BNPL 结账方案推出。
          tone: positive
        - date: '2010-01-01'
          label: Sequoia Capital 投资
          detail: Sequoia 投资 Klarna；Michael Moritz 加入董事会；北欧和德国扩张启动。
          tone: positive
        - date: '2013-01-01'
          label: 收购 SOFORT AG
          detail: 通过约 $150M 收购补上实时银行转账能力；欧洲产品边界拓宽。
          tone: positive
        - date: '2015-01-01'
          label: 携 Macy's 进入美国
          detail: 首个美国合作伙伴；Adalberth 离职；国际化野心提速。
          tone: positive
        - date: '2019-01-01'
          label: $460M 融资，估值 $5.5B —— 欧洲最大金融科技公司
          detail: Klarna 被称为欧洲最有价值金融科技公司；$460M 融资巩固品类领先。
          tone: positive
        - date: '2021-06-01'
          label: $639M 融资，估值峰值 $45.6B —— SoftBank 领投
          detail: SoftBank Vision Fund 2 领投；Klarna 达到史上最高 $45.6B 估值。
          tone: positive
        - date: '2022-07-01'
          label: 下轮融资 —— $800M，估值 $6.7B（−85%）
          detail: 欧洲金融科技史上最大估值坍塌；2022 年随后裁员。
          tone: negative
        - date: '2024-07-01'
          label: $800M IPO 前过桥融资
          detail: 最后一轮私募融资估值约 $15B，帮助 Klarna 对接公开市场。
          tone: positive
        - date: '2025-04-01'
          label: IPO 暂停 —— Trump 关税冲击
          detail: 市场波动迫使已排期 IPO 延后；改期至 2025 年 9 月。
          tone: warning
        - date: '2025-09-01'
          label: NYSE IPO —— KLAR 发行价 $40/股
          detail: Klarna 以 $40/股在 NYSE 上市；募资 $1.37B；首日估值超过 $17B。
          tone: positive
        - date: '2025-11-01'
          label: KlarnaUSD 稳定币；上市后首个季度亏损
          detail: 在 Stripe 区块链上推出稳定币；Q3/Q4 2025 财报显示 IPO 后亏损。
          tone: warning
    claimRefs:
      - CO001
      - CO002
      - CO014
      - CO016
      - CO017
      - CO018
