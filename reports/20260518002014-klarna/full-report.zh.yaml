            - label: 高 — 由 Nike Klarna 支付帮助页面确认
            - label: 低 — Nike 未披露转化率、AOV 或客单规模数据
            - label: 中 — 合作确认仍在进行；续约历史未公开
            - label: 高 — Nike 美国电商结账已上线且活跃
        - label: Macy's（百货）
          values:
            - label: 高 — 由 Macy's Klarna 落地页确认
            - label: 低 — Macy's 未公开披露结果指标
            - label: 中 — 2026 年仍活跃；排他性和续约条款未披露
            - label: 高 — Macy's 美国结账已上线 BNPL 集成
        - label: Sephora（美妆）
          values:
            - label: 高 — 由 Sephora learn-klarna 页面确认
            - label: 低 — Sephora 未提供量化美妆 BNPL 结果数据
            - label: 中 — 合作仍活跃；持续时间未公开记录
            - label: 高 — Sephora 美国结账已上线；生产状态已确认
  - id: FU004
    title: 留存 / 复购队列
    type: cohort
    description: 基于公开可得的合作持续时间证据，给出消费者和商户留存的代理信号。Klarna 未披露直接队列留存率；本表用已确认的合作时长作为商户粘性的代理。
    claimRefs:
      - CU030
      - CU031
      - CU032
    approximationNotes: >-
      Klarna 未披露消费者队列复购率或商户 NRR / GRR。所有数值都是基于合作确认日期和分析师估计的代理估计；实际队列留存数据是阻塞性尽调缺口，必须向管理层索取。消费者留存估计为分析师示意区间，并非 Klarna
      披露数字。
    data:
      columns:
        - 第 1 年
        - 第 2 年
        - 第 3 年
      rows:
        - label: 企业商户（H&M、ASOS 类型）
          values:
            - 100
            - 95
            - 92
        - label: SMB 商户（估计平均）
          values:
            - 100
            - 75
            - 62
        - label: B2C 活跃消费者留存（估计）
          values:
            - 100
            - 70
            - 58
        - label: Klarna Plus 订阅用户留存（估计）
          values:
            - 100
            - 80
            - 68
  - id: FR001
    title: 风险热力图
    type: matrix
    insight: FCA BNPL 监管和衰退中的信用损失激增，是概率最高、影响最大的两个风险格。CFPB 执法和云服务商宕机概率中等，但影响关键。治理和 AI 质量风险集中在中等概率、中到高影响区间，需要主动监控。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 关键影响
          values:
            - label: Finansinspektionen 撤销银行牌照
            - label: CFPB 对 Klarna 美国 BNPL 发起正式执法行动
            - label: FCA BNPL 监管导致英国批准率下降 20% 以上
        - label: 高影响
          values:
            - label: 云服务商重大宕机，扰乱 Klarna 全球业务
            - label: AI 客服大规模失效，触发监管审查
            - label: 衰退情景下，信用损失率升至 GMV 的 1.5% 以上
        - label: 中等影响
          values:
            - label: 自动填充或安全漏洞复发
            - label: CEO 争议或治理纠纷影响运营
            - label: 前 5 大关系中锚定商户集中流失
        - label: 低影响
          values:
            - label: 个别成员国出现轻微 EU CCD2 合规摩擦
            - label: GDPR 罚款复发，金额低于 10 million SEK
            - label: 非核心货币市场出现 FX 波动
    sourceRefs:
      - SR002
      - SR003
      - SR005
      - SR006
      - SR007
  - id: FR002
    title: 风险传导图
    type: dag
    insight: 监管收紧和消费者信用压力是下游传导最广的两个根节点。FCA 和 CFPB 压力都会直接传导到 Klarna 批准率下降和执法暴露；信用损失上升会传导到经营亏损，并进一步威胁估值逻辑。
    data:
      nodes:
        - id: n1
          label: FCA BNPL 监管（英国）
          type: regulatory
        - id: n2
          label: CFPB 执法风险（美国）
          type: regulatory
        - id: n3
          label: EU CCD2 信用检查
          type: regulatory
        - id: n4
          label: 消费者信用压力
          type: financial
        - id: n5
          label: BNPL 批准率下降
          type: impact
        - id: n6
          label: GMV 下滑
          type: impact
        - id: n7
          label: 商户费收入损失
          type: impact
        - id: n8
          label: 信用损失上升
          type: financial
        - id: n9
          label: 经营亏损扩大
          type: impact
        - id: n10
          label: 竞争对手压低 MDR
          type: competitive
        - id: n11
          label: 估值逻辑受损
          type: impact
      edges:
        - from: n1
          to: n5
          label: 强制信用检查压低即时批准量
        - from: n3
          to: n5
          label: 可负担性规则压低欧盟批准率
        - from: n2
          to: n9
          label: 执法行动触发产品重设计成本
        - from: n5
          to: n6
          label: 批准减少压低交易量
        - from: n6
          to: n7
          label: GMV 下降削减商户折扣收入
        - from: n4
          to: n8
          label: 衰退推高 BNPL 应收款违约率
        - from: n8
          to: n9
          label: 信用损失增加扩大经营亏损
        - from: n10
          to: n7
          label: 竞争对手定价压缩 Klarna MDR
        - from: n7
          to: n9
          label: 收入受压加重经营亏损
        - from: n9
          to: n11
          label: 持续亏损削弱 DCF 估值
