      - number: '8.4'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >-
              Klarna 是刚上市的 BNPL 公司，IPO 后财务历史有限，因此可比公司分析是估值评估的核心。主要同业组由上市 BNPL 及相邻“先买后付”金融科技公司组成。Affirm
              Holdings（AFRM）是最接近的直接可比公司：一家聚焦美国市场的 BNPL 运营商，采用相似的商户出资模式和消费者分期产品。Klarna IPO 时，Affirm 市值约 $8–12
              billion，FY2025 收入 $3 billion+，隐含 EV/Revenue 倍数为 3–4x，约比 Klarna IPO 时约 6x 倍数低 40–50%。Klarna
              的溢价可以由地理分散度和银行牌照护城河解释；但如果美国增长逻辑落空，这个溢价会形成估值压力。

              Block Inc.（SQ）2022 年 1 月以 $29 billion 收购 Afterpay——这笔交易发生在 BNPL 倍数峰值，如今被认为显著高于基本面价值。Block 整体支付业务如今交易价格只是
              Afterpay 收购价的一小部分，说明聚焦 BNPL 的业务内含严重倍数压缩风险。

              基于公开 F-1 数据计算的关键人均指标包括：每活跃消费者收入约 $30（$2.81 billion / 93 million 活跃消费者），每活跃消费者 GMV 约 $1,129（$105 billion /
              93 million），以及估计毛利率 55–58%，与 Affirm 披露的 FY2024 57% 毛利率一致。净信用损失率约为 GMV 的 0.6%，是关键基准指标。Sequoia Capital 估计持股
              22%，CEO Siemiatkowski 约持股 8% 且配有 Class C 超级投票股，形成治理集中；按公司治理学术文献，机构投资者通常会在估值模型中打 10–20% 折扣。Zip Co 和 Sezzle
              的交易折价显著，反映规模更小、风险画像更高；PayPal 的 BNPL 板块则提供大盘基准。
