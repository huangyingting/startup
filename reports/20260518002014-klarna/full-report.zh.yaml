      - number: '5.3'
        title: 商户技术栈与开发者集成面
        blocks:
          - type: paragraph
            body: >-
              Klarna 面向商户的技术栈是把全球 850,000 家商户连接到消费者支付产品的运营脊梁。结账组件是一段 JavaScript 代码，是主要集成机制，可把 Klarna
              支付选项嵌入任何电商结账页，基础集成只需少量工程工作且不需要服务端改动。对更复杂、更高交易量的实现，Klarna 的 REST API（文档位于
              docs.klarna.com）支持完整支付生命周期管理，包括订单创建、捕获、退款和争议解决。开发者门户为 Shopify、WooCommerce、Magento 和 Salesforce Commerce
              Cloud 等主要电商平台提供 SDK，把使用标准平台的长尾商户集成摩擦降到接近零。沙盒环境让商户上线前端到端测试集成，降低实施风险。

              Klarna for Business 是商户仪表盘层，提供订单管理、绩效分析、客服解决工具，并接入 Klarna Ads。这是一款定向广告产品，商户可在 Klarna 消费者 App
              的购物信息流内购买展示位。商户分析工具让零售商看到消费者转化指标、人口统计洞察，以及来自 Klarna 年度 $105B GMV 消费者交易库的行为数据。这个第一方数据资产正成为越来越重要的战略差异点，使
              Klarna 能向商户提供超越纯支付功能的受众定向和归因分析。信用决策引擎以亚秒级延迟运行，使用基于消费者交易历史和第三方征信数据训练的自研 ML 模型，是支撑每笔商户交易的不可见基础设施。Klarna
              的技术路线图——以 2025 年 11 月 KlarnaUSD 稳定币推出为证——显示公司有意扩展到新的支付轨道架构，并在中期加深商户分析能力。
