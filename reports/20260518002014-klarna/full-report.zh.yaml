        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >-
              Klarna 采用 B2B2C 模式：商户是支付服务的直接买方，消费者是终端用户。这两个群体的采购流程、预算所有者和采用触发点各不相同。


              商户侧，SMB 通常通过 Shopify、WooCommerce 或 Magento 插件以自助方式接入 Klarna，决策者往往是创始人或电商经理。采用触发点是转化率提升：测试 BNPL
              的商户报告，结账转化率提高 20-30%，平均订单价值提高 15-25%。企业级商户使用直接 API 或平台连接器（Salesforce Commerce
              Cloud、SAP），销售周期更长，支付策略、欺诈和合规团队都会参与。


              消费者侧，主力画像是 18-43 岁、数字原生、回避信用卡或信用额度有限的人群。Gen Z 消费者（18-27 岁）增长最快，也强烈偏好 BNPL 透明的分期模式，而非循环信用卡。Millennial（28-43
              岁）是按支出计的最高交易量群体。两个群体都把现金流管理和 0% 利息列为主要动机。金融服务不足的消费者，即信用档案较薄的人，会把 Pay-in-4
              当作信用卡替代品，因为它只需要软查询。按垂类看，时尚、电子产品、家居、美妆和旅行是最主要的 BNPL 品类。Klarna 美国市场约占 2024 年 GMV 的 30%，欧洲本土市场约占 55%。购物 App
              打造了一个消费者发现渠道，降低了获客对商户集成的依赖。
