    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、公司结构与商业模式
        blocks:
          - type: paragraph
            body: >-
              Klarna Group plc 是一家在英国注册的上市金融科技公司，注册地址为 10 York Road, London SE1 7ND。公司 2005 年创立于瑞典 Stockholm，三位联合创始人为
              Sebastian Siemiatkowski（至今担任 CEO）、Niklas Adalberth（2015 年离职）和 Victor Jacobsson。Klarna 于 2025 年 9 月 IPO 后在
              New York Stock Exchange 上市，股票代码 KLAR。公司为监管和资本市场目的设在英国，但运营传承和银行牌照仍扎根瑞典，并作为持牌银行受 Finansinspektionen 监管。


              核心商业模式是先买后付（BNPL）和更广义的支付平台。Klarna 的收入主要来自商户费用（通常为每笔交易 2% 到 8%），次要来源包括消费者逾期费、较长期融资产品的利息，以及 Klarna Plus
              的订阅费（$7.99/月，2024 年 1 月推出）。产品组合包括 Pay in 4（美国分期）、Pay in 3（英国和欧洲）、Pay Later（30 天延期付款）、实体 Klarna Card、带利息的 6
              到 36 个月较长期融资计划，以及提供购物信息流、比价和返现的 Klarna App。2025 年 11 月，Klarna 还发布了基于 Stripe 区块链基础设施的稳定币
              KlarnaUSD。公司不只把自己定位为 BNPL 提供商，而是连接消费者、商户和金融服务的全栈购物与支付生态。
