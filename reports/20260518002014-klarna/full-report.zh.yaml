      - number: '2.2'
        title: 市场规模与 TAM/SAM/SOM 估算
        blocks:
          - type: paragraph
            body: >-
              分析师对全球 BNPL 市场规模的估计差异很大，取决于范围和方法。Grand View Research 将 2022 年 BNPL 市场收入估为 $31B，并预计到 2030 年以 26.1% CAGR 增至
              $166B。Juniper Research 预测 BNPL 交易额（大于收入的指标）将从 2022 年基数增至 2026 年 $576B。Worldpay 基于交易数据的估算显示，BNPL 在 2024
              年占全球电商 3.8%，以 $6.3T 电商基数计算，隐含约 $240B TPV。Goldman Sachs 在乐观情景中估计，到 2020 年代中期，BNPL 可能达到全球电商的 10%。


              这些数字不能直接比较：Grand View 衡量收入，Juniper 衡量 TPV，Worldpay 衡量支付方式份额。一个保守交叉校验是：如果 2024 年全球 BNPL TPV 约为
              $530B（Juniper 中点），而 Klarna 的 GMV 为 $105B，则 Klarna 约持有全球 BNPL TPV 20% 份额。Affirm（FY2024 GMV 为 $26.6B）和
              Afterpay（2023 年 GMV 为 $26.3B）证明美国市场规模大且格局多元。Klarna 美国 GMV 约为 $31.5B（$105B 的 30%），在美国位列 Affirm 之后的第二或第三。


              Klarna 的 S-1 将 TAM 定义为 $6.8T 线上商业，并声称可触达规模为 $1.5T，但分段逻辑和地理排除项都无法独立验证。Morgan Stanley 预计 BNPL 行业收入增长将从
              2021-2022 年 40-50% 的 CAGR 放缓到 2025 年的 15-20%，反映市场成熟。若增长预测仍基于上一轮周期的 CAGR 假设，这种放缓就是悲观情景中的关键风险。
