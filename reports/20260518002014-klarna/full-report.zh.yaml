      - number: '6.3'
        title: 商户价值主张与转化证据
        blocks:
          - type: paragraph
            body: >-
              Klarna 给商户的核心价值主张有三根支柱：结账转化率提升、客单价（AOV）改善，以及接入 Klarna 消费者网络带来的发现和流量。公司称，相比没有 BNPL 的标准结账，使用 Klarna
              的商户结账转化率提升 25 to 30 percent；公司还称，接入 Klarna 后平均购物篮金额明显更高。这些说法支撑着 Klarna 的定价权：商户因此愿意接受 1.5–3.5 percent
              加固定费用的 MDR，而这一费率达到或高于竞争性 BNPL 定价。


              商户转化率说法与 BNPL 行业已观察到的机制相符：消费者面对大额一次性付款时更容易放弃结账，BNPL 分期选项能消掉这个摩擦。但 25–30% 转化提升来自 Klarna
              面向商户的营销材料和案例研究；目前没有公开的独立第三方审计、学术研究或受控 A/B
              测试来证实这个具体区间。实际提升很可能随商户垂直品类、消费者画像、客单价和结账时的竞品支付选项而大幅变化，因此单一宣称数字天然难以外推。


              Klarna 消费者 app 的购物信息流收录超过 150 million 个商品条目，也是商户的需求生成资产。信息流承担商品发现引擎的角色，把 Klarna
              消费者导向参与商户，形成不同于付费媒体的增量流量通道。2022 年收购的 PriceRunner 又补上 B2C 比价功能，把消费者导向接入 Klarna 且给出特定商品最优价格的商户。Klarna
              深度嵌入结账栈、订单管理系统和 ERP 工作流，进一步抬高商户切换成本；即便存在竞品 BNPL
              报价，结构性惯性也会压低流失。购物篮金额提升和购物信息流流量仍是公司宣称的收益，尽调中应在商户层面独立验证。本章的客户证明矩阵图展示了具名商户关系的证据质量和生产成熟度。
