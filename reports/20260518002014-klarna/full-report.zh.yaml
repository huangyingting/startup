      - number: '8.2'
        title: 估值背景与 IPO 定价分析
        blocks:
          - type: paragraph
            body: >-
              Klarna 的估值史，就是金融科技情绪周期性的样本。2021 年 6 月 $45.6 billion 峰值，反映了 BNPL 热潮顶点和零利率政策过剩：SoftBank 领投 $639 million
              融资轮，倍数隐含 Klarna 最终会拿下全球支付基础设施的大部分。到 2022 年 7 月，加息、监管逆风和消费者信用恶化把估值压到 $6.7 billion，较峰值下跌 85%。2025 年 2
              月，分析师估计 IPO 前估值约 $15 billion，与 IPO 每股 $40 定价一致。2025 年 4 月，Trump 关税引发的市场波动推迟了 IPO，上市延后到 2025 年 9
              月，并最终成功完成首秀。

              按 IPO 定价，Klarna 收入倍数约 6x（基于 $2.81 billion LTM 收入和 $15–17 billion 市值），相对纯美国 BNPL 同行 Affirm 有溢价，后者约按 3–4x
              EV/Revenue 交易。Klarna 能拿到这部分溢价，靠的是覆盖 45+ 国家的地理宽度、瑞典银行牌照带来的较低存款资金成本，以及更长 BNPL 经营历史。不过，Klarna 负经营利润（-$121
              million）、Observer 报道的 IPO 后 2025 年 Q3 季度亏损，以及超出投资者预期的经营费用，都限制了溢价空间。在净盈利的同时出现 -$121 million
              经营亏损，反映的是非经营性收益和 GAAP 时点项目，而不是核心经营杠杆。按上市首日 >$17 billion 估值计算，FY2024 $21 million 净利润对应的隐含 P/E 超过
              800x，因此核心估值驱动不是当前利润，而是盈利轨迹。

              Goldman Sachs、JPMorgan、Morgan Stanley、Bank of America、Citigroup 和 Deutsche Bank 担任 IPO
              承销商，确保了机构分发质量和广泛投行背书。按 $40/股计算，完全摊薄市值约 $15 billion；在上市首日交易热情推动下升至 >$17 billion。两个数字都远低于 2021
              年峰值，也符合管理层所谓有纪律、锚定基本面的 IPO 价格。
