  - id: FV001
    title: 建议逻辑流程
    type: flow
    description: 从市场机会和产品证据，到财务表现、监管风险、竞争态势和治理担忧，最终落到继续研究建议的决策逻辑链。
    claimRefs:
      - CV025
      - CV026
      - CV038
      - CV040
      - CV041
    approximationNotes: 该流程代表用于得出继续研究建议的证据逻辑链；节点细节概括章节和声明中记录的关键证据点。
    data:
      nodes:
        - label: 市场机会
          detail: BNPL 全球总可用市场（TAM）约 $560B（2024），CAGR 24%；Klarna 覆盖 45+ 个市场，拥有 114M 消费者
        - label: 产品差异化
          detail: 瑞典银行牌照、20+ 年经营记录、AI 驱动效率、嵌入式商户结账；优于只在美国运营的同业
        - label: 财务表现
          detail: 收入 $2.81B（同比 +24%）；净利润 $21M（2018 年以来首次）；但经营利润为 -$121M，净利率仅 0.7%
        - label: IPO 后反向信号
          detail: Observer 报道，IPO 后 2025 年 Q3 出现净亏损；运营费用超预期；盈利路径存疑
        - label: 监管风险
          detail: FCA BNPL 监管（英国）、EU CCD2（欧洲）、CFPB 监督（美国）都会引入可负担性检查，可能压低批准率
        - label: 竞争态势
          detail: Affirm（美国）、Block/Afterpay、PayPal Pay in 4、银行发行 BNPL 都在加剧竞争；商户费压缩风险仍在
        - label: 治理担忧
          detail: 双重股权结构；Siemiatkowski 持有超级投票权 Class C；Sequoia 22% 持股形成悬空压力；少数股东保护有限
        - label: 建议：继续研究
          detail: 中等信心；按约 6x EV/Revenue 看，估值合理至略微偏高；启动前等待 2+ 个 IPO 后季度业绩
    tableRefs:
      - TV001
      - TV002
  - id: FV002
    title: 估值敏感性图
    type: bar
    description: Klarna 关键情景和参考点下的相对估值估计，展示从 2022 年低谷到乐观情景的隐含企业价值区间。
    claimRefs:
      - CV008
      - CV009
      - CV011
      - CV025
      - CV026
      - CV027
    approximationNotes: 乐观和悲观情景估值为分析师估计，基于情景收入假设和可比同业倍数。IPO 和 IPO 前数字基于已披露定价和分析师报道。
    data:
      items:
        - label: 乐观情景估值（$B）
          value: 28
          detail: AI 驱动盈利、拿下美国市场、8x 远期收入；要求 FY2026 经营利润率 >8%
        - label: IPO 首日估值（$B）
          value: 17
          detail: 2025 年 9 月首日交易按 $40/share NYSE 首秀价格隐含的市值
        - label: 基准情景估值（$B）
          value: 16.5
          detail: 中等增长 15–20%、监管逆风、约 6x 远期收入；与 IPO 定价大体一致
        - label: IPO 前估计（$B）
          value: 15
          detail: 2025 年 2 月 IPO 前分析师共识估计；最终 IPO 定价验证了该估计
        - label: 悲观情景估值（$B）
          value: 8
          detail: FCA 监管冲击、信用恶化、经营亏损持续；2–3x 远期收入
        - label: 2022 下轮融资估值（$B）
          value: 6.7
          detail: 2022 年 7 月 Sequoia 领投下轮融资中的低谷估值；较 2021 年 $45.6B 峰值低 85%
    tableRefs:
      - TV003
  - id: FV003
    title: 投资 KPI
    type: kpi
    description: Klarna 2025 年 9 月 NYSE IPO 时的关键表现和投资指标，形成可直接提交 IC 的评分卡，覆盖估值、财务表现和建议维度。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV005
      - CV006
      - CV013
      - CV014
      - CV038
    approximationNotes: 市值数字反映首日交易估值；收入倍数按首日市值和 FY2024 收入计算。114M 消费者数来自 Klarna 营销材料；F-1 披露 93M 活跃消费者。
    data:
      items:
        - label: IPO 价格
          value: $40
          unit: USD per share
          detail: 2025 年 9 月 NYSE IPO，价格 $40/share；NYSE 代码 KLAR；募集总额 $1.37B
        - label: 首日市值
          value: '>$17B'
          unit: USD
          detail: 首日交易将隐含市值推至 $17B 以上；高于定价时 $15B 估值
        - label: FY2024 收入
          value: $2.81B
          unit: USD
          detail: 同比增长 24%；这是 2018 年以来首个净利润为正的财年
        - label: FY2024 净利润
          value: $21M
          unit: USD
          detail: 2018 年以来首次实现年度净利润；在 $2.81B 收入上，净利率仅 0.7%
        - label: FY2024 GMV
          value: $105B
          unit: USD
          detail: 商品交易总额；FY2023 约 $87B，FY2024 同比增长约 20%，覆盖 45+ 个市场
        - label: 活跃消费者
          value: 93M
          unit: consumers
          detail: F-1 披露的活跃消费者；公司在更广泛营销材料中引用 114M
        - label: IPO 收入倍数
          value: ~6x
          unit: EV/Revenue
          detail: 首日约 $17B 市值对应 $2.81B LTM 收入；高于 Affirm 3–4x；由地域布局支撑
        - label: 建议
          value: Research More
          unit: rating
          detail: 中等信心；估值合理至略微偏高；等待 IPO 后季度业绩记录
    tableRefs:
      - TV001
