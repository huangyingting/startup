      - number: '5.5'
        title: 差异化、路线图与战略性技术押注
        blocks:
          - type: paragraph
            body: >-
              Klarna 的产品和技术竞争差异化建立在五根支柱上：（1）BNPL 产品宽度，覆盖免息短期分期（Pay in 4、Pay in 3）、延期付款（Pay Later 30-day），以及 26
              个市场的较长期消费者融资；（2）垂直整合的消费者平台，把支付、通过 Klarna Balance 提供的储蓄、通过 PriceRunner 提供的比价，以及通过 Stocard 提供的数字会员整合起来，提高
              App 粘性和数据深度；（3）亚秒级实时信用决策，基于自研 ML 模型，训练数据来自年度 $105B GMV 交易历史，这是竞争对手难以复制的数据集；（4）规模化商户技术面，包括 850,000
              个集成、完整文档化的开发者 API、Klarna for Business 分析和 Klarna Ads 变现，把收入扩展到纯交易费之外；（5）在欧洲市场积累 20
              年的品牌认知和消费者信任，新进入者难以在中短期复制。

              Klarna 未来路线图中最具战略意义的技术押注，是 AI 客服平台和 KlarnaUSD 稳定币。前者既是成本效率杠杆，也是规模化能力的放大器，尽管 CEO 2025 年 5
              月回撤表态后质量不确定性仍在；后者若能通过 Stripe 获得采用，可能在区块链轨道上支持低成本跨境 BNPL 支付，降低对卡网络经济性的依赖。PriceRunner 和 Stocard 收购显示，Klarna
              不想只在结账点变现，而是要覆盖消费者从购买前、购买中到购买后的完整钱包份额。拥有 4M 持卡人的 Klarna Card
              把产品延展到通用消费，直接与新银行和传统信用发行方竞争。关键开放技术尽调问题包括：自研信用决策模型的深度和防御性、AI 质量在回撤后的轨迹、KlarnaUSD 作为电子货币或其他形态的监管待遇，以及
              Affirm、PayPal 和银行发行 BNPL 产品的竞争反应；这些产品正快速缩小与 Klarna 的技术和产品集成差距。
