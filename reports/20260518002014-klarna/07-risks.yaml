    - Two consecutive quarters with credit loss rate above 1.0 percent of GMV
    - "Conduct deep dive on vintage curves; escalate to investment committee; stress-test model"
  - - CFPB formal enforcement action
    - "Public announcement via CFPB press release or Klarna SEC filing"
    - "Any consent order, civil investigative demand, or enforcement action targeting Klarna"
    - Full regulatory risk re-evaluation; potential investment thesis exit depending on scope
  - - CEO departure or formal investigation
    - "SEC filing, board announcement, or regulatory press release"
    - "CEO departure announced, formal SEC investigation opened, or board-level governance dispute"
    - "Governance risk escalation; monitor for operational disruption; reassess key person dependency"
  - - Post-IPO financial deterioration
    - Revenue growth rate and operating income disclosed in 20-F or 6-K interim reports
    - Two consecutive quarters of revenue growth below 10 percent or widening operating loss
    - "Re-run DCF model; reconsider valuation assumptions; consider reducing exposure"
  - - Data breach recurrence
    - SEC Form 20-F or 6-K mandatory material event disclosure
    - Any confirmed breach affecting more than 100,000 consumer records disclosed publicly
    - "Operational and regulatory risk escalation; assess potential fine exposure and remediation cost"
  claimRefs:
  - CR041
  - CR042
  - CR043
  notes: "Monitorable triggers provide early warning before an action threshold is reached. All thresholds are\
    \ indicative and should be calibrated to the specific investment mandate and risk tolerance."

