company:
  name: Klarna
chapter:
  number: 7
  title: Risks
  summary: "Klarna faces a multi-layered risk profile spanning regulatory, operational, financial, competitive, governance,\
    \ and reputational dimensions. The UK FCA forthcoming BNPL regime effective approximately 2026, EU Consumer Credit\
    \ Directive 2 mandatory credit checks, aggressive US CFPB scrutiny, and Australia ASIC licensing requirements collectively\
    \ represent the most material near-term regulatory risk cluster. A May 2021 data breach, a 7.5 million SEK Swedish\
    \ IMY GDPR fine, a Der Spiegel autofill vulnerability disclosure, and a UK ICO investigation illustrate systemic\
    \ data-security and privacy exposure. Financially, the 2022 valuation crash from $45.6 billion to $6.7 billion, a\
    \ 2024 operating income of approximately negative $121 million despite a nominal net profit of $21 million, and a\
    \ post-IPO Q3 2025 quarterly loss signal persistent earnings fragility. CEO Sebastian Siemiatkowski Class C supervoting\
    \ structure, a 52 percent headcount reduction from peak, an AI quality backtrack in May 2025, and documented consumer\
    \ harm from Guardian and CFPB reporting compound governance and reputational risk. Credit default sensitivity to\
    \ recession, Visa and Mastercard and cloud-provider dependency, merchant concentration risk, and dual-class governance\
    \ round out a material risk register requiring active monitoring across all five risk dimensions."
