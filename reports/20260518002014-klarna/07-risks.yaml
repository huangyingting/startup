  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: CET1 capital ratio and regulatory capital adequacy
    missingEvidence: "Klarna Bank AB CET1 capital ratio and detailed regulatory capital adequacy metrics are\
      \ not disclosed in the F-1 or pre-IPO press releases; Pillar 3 disclosure is not publicly available\
      \ before the post-IPO 20-F filing."
    whyItMatters: "As a licensed bank, Klarna must maintain minimum CET1 ratios under EU banking rules. If\
      \ capital is near minimum thresholds it limits dividend capacity, share buybacks, and expansion; a\
      \ below-minimum ratio constitutes a regulatory event requiring immediate remediation."
    diligencePath: "Request Finansinspektionen Pillar 3 disclosure directly; post-IPO 20-F banking subsidiary\
      \ footnotes will include CET1 ratio; request in management meeting with CFO as a blocking diligence\
      \ item."
    relatedQuestionRefs:
    - QR018
    - QR021
    relatedTableRefs:
    - TR001
  - type: missing-source
    severity: material
    topic: Litigation register and pending regulatory actions
    missingEvidence: "Klarna does not publicly disclose a comprehensive litigation register. Pending lawsuits,\
      \ regulatory investigations, and enforcement proceedings beyond what is disclosed in the F-1 risk\
      \ factors are not independently verifiable from public sources."
    whyItMatters: "Undisclosed litigation or regulatory proceedings could represent material contingent\
      \ liabilities affecting Klarna financial position, regulatory standing, and investor risk assessment\
      \ across multiple jurisdictions."
    diligencePath: "Review F-1 litigation disclosure section in detail; request full litigation register\
      \ from legal counsel in due diligence; monitor court dockets in UK, Germany, Sweden, and US."
    relatedQuestionRefs:
    - QR005
    - QR029
    - QR032
    relatedTableRefs:
    - TR001
  - type: access-blocked
    severity: material
    topic: Paywall-protected adverse journalism and analyst research
    missingEvidence: "Financial Times, Wall Street Journal, and Bloomberg paywall sources limit independent\
      \ adversarial verification of analyst risk assessments and investigative journalism on Klarna financial\
      \ and regulatory exposure."
    whyItMatters: "Premium financial journalism and institutional research often contain the most rigorous\
      \ adverse analysis of fintech risks; inability to access these sources may leave material adverse\
      \ evidence unreviewed during diligence."
    diligencePath: "Obtain institutional research access through Bloomberg terminal or FactSet subscription;\
      \ engage directly with FT and WSJ through full subscription access for article retrieval during\
      \ formal diligence process."
    relatedQuestionRefs:
    - QR004
    - QR030
    - QR009
    relatedTableRefs:
    - TR002
  - type: private-evidence-only
    severity: material
    topic: Internal credit loss vintage curves by product and geography
    missingEvidence: "Klarna discloses a blended net credit loss rate but does not publish loss curves by\
      \ origination vintage, product type such as Pay in 4 versus monthly instalments, or geography, making\
      \ independent assessment of credit risk deterioration trends impossible from public data."
