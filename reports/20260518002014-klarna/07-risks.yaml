  title: Risk heatmap
  type: matrix
  insight: "FCA BNPL regulation and credit loss surge in a recession are the two highest-probability, highest-impact\
    \ risk cells. CFPB enforcement and cloud provider outage are medium-probability but critical-impact.\
    \ Governance and AI quality risks cluster at medium-probability and medium-to-high impact, requiring active monitoring."
  data:
    columns:
    - Low Likelihood
    - Medium Likelihood
    - High Likelihood
    rows:
    - label: Critical Impact
      values:
      - label: Banking licence withdrawal by Finansinspektionen
      - label: CFPB formal enforcement action against Klarna US BNPL
      - label: FCA BNPL regulation causing 20-plus percent UK approval rate drop
    - label: High Impact
      values:
      - label: Cloud provider major outage disrupting Klarna globally
      - label: AI customer service failure at scale triggering regulatory review
      - label: Credit loss rate spike above 1.5 percent of GMV in recession scenario
