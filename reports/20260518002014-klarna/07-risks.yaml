sections:
- id: section-1
  title: Regulatory and legal risk landscape
  body: "Klarna operates under one of the most complex regulatory environments of any fintech company, spanning overlapping\
    \ consumer credit, banking, data protection, and payments regulations across more than 26 countries. The most material\
    \ near-term regulatory risk is the UK Financial Conduct Authority forthcoming BNPL regulatory regime, developed through\
    \ consultation paper CP23/10. The FCA proposes to bring BNPL within the consumer credit perimeter, requiring mandatory\
    \ creditworthiness assessments before credit is granted, compliance with financial promotion rules, and implementation\
    \ of consumer redress mechanisms. This is expected to reduce Klarna UK BNPL approval rates by an estimated 10 to 25\
    \ percent, directly reducing UK GMV and merchant fee revenue. The effective date of approximately 2026 creates near-term\
    \ implementation pressure across Klarna UK operations. \n\nAt the EU level, the revised Consumer Credit Directive 2\
    \ extends mandatory credit assessments to BNPL products across EU member states, with national transposition creating\
    \ a patchwork of implementation timelines. Klarna largest European markets including Germany, Sweden, and the Netherlands\
    \ are all in scope. In the US, the CFPB has documented consumer harm from BNPL products including risks from consumers\
    \ using multiple BNPL products simultaneously, absence of credit bureau reporting, and elevated delinquency rates; the\
    \ CFPB has designated Klarna a larger participant subject to supervisory examination, and adverse enforcement actions\
    \ remain a credible risk. Australia ASIC enacted credit licensing requirements for BNPL providers from November 2022,\
    \ imposing additional compliance overhead and responsible lending obligations on Klarna Australia operations. \n\nSweden\
    \ Finansinspektionen subjects Klarna Bank AB to full banking supervision, including minimum CET1 capital ratio requirements\
    \ that create a permanent capital constraint not faced by unlicensed BNPL competitors. On data protection, the 2022\
    \ Swedish IMY GDPR fine of 7.5 million SEK and the UK ICO 2020 investigation demonstrate Klarna ongoing exposure to\
    \ data privacy enforcement. The German Federal Court of Justice ruled Klarna EUR 1.20 email invoicing fee illegal in\
    \ 2021, establishing an adverse legal precedent on fee practices. Across all these jurisdictions, mandatory credit check\
    \ requirements represent the single largest regulatory revenue risk given their direct impact on approval rates and\
    \ transaction volumes, while multi-jurisdictional data protection obligations compound the compliance burden across\
    \ the full operating footprint."
  tableRefs:
  - TR001
  figureRefs: []
  claimRefs:
  - CR001
