evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Klarna full post-IPO cap table and shareholder register
    missingEvidence: >-
      The complete post-IPO diluted ownership table, including all institutional holders, lock-up expiry schedules,
      registration rights, and any secondary transactions after the September 2025 IPO, is not publicly available from
      sources accessible as of May 2026.
    whyItMatters: >-
      Full cap table visibility is required to assess selling pressure from pre-IPO holders after lock-up expiry, which
      could affect share price stability and Siemiatkowski's effective control.
    diligencePath: >-
      Review SEC 13F filings from institutional holders, Form 4 insider trading disclosures, and Klarna's prospectus
      supplement filings for lock-up and registration rights details.
    relatedTableRefs:
      - TO003
    relatedQuestionRefs:
      - QO017
  - type: stale
    severity: minor
    topic: Klarna first quarterly post-IPO earnings full financial detail
    missingEvidence: >-
      Complete financial details from Klarna's first quarterly earnings report as a public company (Q4 2025 or Q1 2026)
      are not fully available from sources accessed for this chapter. Observer and Bloomberg confirm a loss was reported
      but detailed revenue, margin, and guidance are not fully captured.
    whyItMatters: >-
      Post-IPO earnings quality directly determines whether Klarna's profitability narrative is sustainable. A recurring
      operating loss would challenge the investment case materially.
    diligencePath: >-
      Retrieve Klarna's 20-F annual filing and quarterly earnings releases from SEC EDGAR (CIK 0002003292) for complete
      post-IPO financial metrics including GMV, take rate, and margin.
    relatedQuestionRefs:
      - QO020
  - type: missing-source
    severity: material
    topic: market sizing methodology
    missingEvidence: >-
      No independently validated bottom-up SAM for Klarna BNPL has been published. Klarna S-1 cites $1.5T addressable
      market without disclosing geographic exclusions or methodology.
    whyItMatters: >-
      Equating the company TAM claim with a validated SAM overstates the near-term addressable opportunity and distorts
      growth rate assumptions.
    diligencePath: >-
      Request Klarna IR to provide SAM segmentation methodology. Cross-reference with Worldpay transaction data to
      construct an independent estimate.
    relatedQuestionRefs:
      - QM007
      - QM020
      - QM021
    relatedTableRefs:
      - TM002
  - type: private-evidence-only
    severity: material
    topic: consumer demographic breakdown
    missingEvidence: >-
      Klarna does not publicly disclose the age or demographic breakdown of its 85 million active consumers. Gen Z and
      millennial share is inferred from industry surveys applied to the reported consumer count.
    whyItMatters: >-
      Without a verified demographic breakdown, the growth thesis depending on Gen Z adoption cannot be quantified
      precisely for underwriting purposes.
    diligencePath: >-
      Request Klarna IR for age-segment breakdown or proxy metrics such as first-time user age median. Use eMarketer
      cohort data as interim estimate.
    relatedQuestionRefs:
      - QM009
  - type: private-evidence-only
    severity: material
    topic: CCD2 regulatory impact on approval rates
    missingEvidence: >-
      No public source has quantified the impact of EU Consumer Credit Directive (CCD2) implementation on Klarna
      approval rates. The 5-20% range in this report is analyst inference, not a company or regulator disclosure.
    whyItMatters: >-
      CCD2 affects the EU market representing ~55% of Klarna GMV. If approval rates drop materially, GMV growth
      forecasts for 2026-2028 could be meaningfully incorrect.
    diligencePath: >-
      Monitor Klarna regulatory filing disclosures in EU member states. Request impact assessment from Klarna during due
      diligence.
    relatedQuestionRefs:
      - QM014
  - type: conflicting-data
    severity: minor
    topic: BNPL user count consistency
    missingEvidence: >-
      eMarketer (97M US BNPL users by 2025), PYMNTS, and Worldpay present inconsistent BNPL user count estimates due to
      differing definitions of active user and coverage.
    whyItMatters: >-
      Inconsistent user counts make it difficult to cross-validate Klarna consumer count claims or estimate market
      penetration; growth rate claims may be calculated off different bases.
    diligencePath: >-
      Establish consistent definition of active BNPL user across data sources. Treat any cross-source comparison as
      approximate with +/- 20% uncertainty band.
    relatedQuestionRefs:
      - QM022
  - type: missing-source
    severity: material
    topic: merchant churn and retention data
    missingEvidence: >-
      No BNPL provider including Klarna publicly discloses merchant churn rates, CAC, or cohort retention data. The moat
      durability assessment depends on assumptions about merchant stickiness that cannot be independently verified.
    whyItMatters: >-
      Without merchant retention data, the strength of Klarna switching cost moat is an assertion rather than a proven
      structural advantage; investors cannot distinguish between platform lock-in and merchant inertia.
    diligencePath: >-
      Request merchant retention cohort data during due diligence. Cross-reference with Shopify App Store
      install/uninstall patterns and third-party merchant survey data.
    relatedQuestionRefs:
      - QP018
      - QP026
    relatedTableRefs:
      - TP004
  - type: private-evidence-only
    severity: material
    topic: independent moat validation
    missingEvidence: >-
      Independent analyst validation of Klarna AI underwriting superiority, consumer data moat quality, and network
      effect strength is not publicly available. Company claims about AI and data advantages are self-reported.
    whyItMatters: >-
      Moat durability is the key long-run valuation driver; unvalidated moat claims create underwriting uncertainty
      about Klarna premium vs. peers.
    diligencePath: >-
      Commission independent benchmarking of Klarna underwriting accuracy vs. Affirm and Afterpay using third-party
      credit bureau data. Review S&P Global and Morgan Stanley moat analysis for third-party views.
    relatedQuestionRefs:
      - QP021
  - type: enumeration-incomplete
    severity: minor
    topic: smaller BNPL competitor coverage
    missingEvidence: >-
      Scalapay, Paidy (PayPal), Sezzle, and other regional BNPL providers are not fully profiled due to limited public
      data. The competitor profile table covers the most material players but is not exhaustive.
    whyItMatters: >-
      Missing smaller competitors may collectively address specific merchant segments (e.g., Scalapay in Italian
      fashion) that affect Klarna GMV in those geographies.
    diligencePath: >-
      Conduct targeted research on Scalapay (Europe) and Paidy (Japan/PayPal) through regulatory filings and press
      coverage.
    relatedQuestionRefs:
      - QP001
  - type: conflicting-data
    severity: minor
    topic: BNPL MDR rate ranges
    missingEvidence: >-
      Merchant discount rates are not publicly disclosed by Klarna, Affirm, or Afterpay as fixed rates; published ranges
      (2-8%) are from merchant accounts and third-party reports, not official price lists.
    whyItMatters: >-
      MDR rate uncertainty makes pricing comparison approximate and limits the ability to assess Klarna revenue-per-GMV
      trajectory as competition intensifies.
    diligencePath: >-
      Use merchant community forums (Shopify Community, BigCommerce Community) and surveys to triangulate actual MDR
      ranges. Request official pricing during diligence.
    relatedQuestionRefs:
      - QP005
    relatedTableRefs:
      - TP003
  - type: missing-data
    severity: blocking
    topic: US-specific financial metrics
    missingEvidence: >-
      Klarna does not separately disclose US revenue, GMV, CAC, credit loss rates, or gross margin in its S-1 or press
      releases. All disclosed metrics are consolidated global figures.
    whyItMatters: >-
      The US market is Klarna's fastest-growth geography. Without US-specific data, underwriting the US opportunity,
      competitive positioning against Affirm, and US regulatory risk is impossible.
    diligencePath: >-
      Request a geographic segment breakdown in the investor relations management meeting; monitor the first post-IPO
      20-F annual report (FY2025) for geographic segment disclosure.
    relatedQuestionRefs:
      - QI022
  - type: missing-data
    severity: blocking
    topic: Credit loss curves by vintage and product
    missingEvidence: >-
      Klarna discloses a blended net credit loss rate but does not publish loss curves by origination vintage, product
      type (Pay in 4 vs. monthly installments), or geography.
    whyItMatters: >-
      Vintage-level credit loss data is essential for underwriting credit risk. A rising loss rate on newer vintages
      could indicate credit book deterioration not visible in the blended headline figure.
    diligencePath: >-
      Request vintage loss curve data from the CFO in the management meeting; alternatively, use Affirm's 10-K vintage
      disclosures as a proxy to cross-check plausibility.
    relatedQuestionRefs:
      - QI010
  - type: missing-data
    severity: material
    topic: Disaggregated gross margin by revenue stream
    missingEvidence: >-
      Klarna does not disclose gross margin by revenue segment (merchant MDR vs. consumer interest income vs.
      subscription fees). The overall ~55–58% figure may mask very different margin profiles across streams.
    whyItMatters: >-
      If consumer interest income (higher credit risk, longer duration) carries significantly lower gross margins than
      merchant MDR, the revenue mix shift toward financing would be a margin headwind not visible in blended figures.
    diligencePath: >-
      Review SEC 10-K segment reporting in the first post-IPO FY2025 20-F; request segment margin breakdown from the CFO
      in due diligence.
    relatedQuestionRefs:
      - QI004
      - QI008
  - type: missing-data
    severity: material
    topic: CET1 regulatory capital ratio and capital adequacy details
    missingEvidence: >-
      Klarna Bank AB's CET1 capital ratio and detailed regulatory capital adequacy metrics are not disclosed in the S-1
      or pre-IPO press releases.
    whyItMatters: >-
      As a licensed bank, Klarna must maintain minimum CET1 ratios. If capital is near minimum thresholds, it limits
      dividend capacity, share buybacks, and expansion; a below-minimum ratio is a regulatory event.
    diligencePath: >-
      Request Finansinspektionen regulatory filings (Pillar 3 disclosure); post-IPO, this will be disclosed in the
      FY2025 20-F banking subsidiary footnotes.
    relatedQuestionRefs:
      - QI019
  - type: private-evidence-only
    severity: blocking
    topic: Klarna credit decisioning model architecture and performance
    missingEvidence: >-
      Klarna's proprietary credit scoring and risk model details — feature engineering, model type, training data,
      performance metrics (AUC, Gini), bias audits — are confidential and not disclosed in public filings, developer
