  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: US-specific revenue and GMV breakdown
    missingEvidence: Klarna does not separately disclose US revenue, GMV, credit losses, or gross margin in its F-1 filing or investor relations materials. All disclosed metrics are consolidated global figures.
    whyItMatters: The US market is Klarna's highest-growth geography and the primary driver of bull-case upside. Without US-specific data, underwriting the US opportunity and benchmarking against Affirm (US-only) is impossible.
    diligencePath: Request a geographic segment breakdown from Investor Relations; monitor the first post-IPO 20-F annual report (FY2025) for geographic segment disclosure in financial statement notes.
    relatedQuestionRefs:
    - QV029
    relatedTableRefs:
    - TV004
  - type: missing-source
    severity: blocking
    topic: Fully diluted share count and options/warrants schedule
    missingEvidence: Klarna's fully diluted share count including all employee stock options, restricted stock units, warrants, and conversion shares is not clearly disclosed in the publicly accessible portions of the F-1.
    whyItMatters: Without the fully diluted share count, the market capitalization implied by the IPO price cannot be precisely computed and the dilution impact on existing shareholders post-IPO is unquantifiable.
    diligencePath: Review the prospectus supplement and F-1/A amendment for the capitalization table; request the equity plan schedule from Investor Relations post-IPO.
    relatedQuestionRefs:
    - QV011
    relatedTableRefs: []
  - type: access-blocked
    severity: material
    topic: FT and WSJ paywall sources limiting independent valuation verification
    missingEvidence: Financial Times and Wall Street Journal sources cited for IPO valuation context are paywall-protected and could not be directly retrieved in this research run, reducing verification depth on some analyst estimates.
    whyItMatters: Independent financial media (FT, WSJ) often contain proprietary analyst estimates and management interview content not available in free sources; paywall restrictions reduce the corroboration depth for valuation multiple claims.
    diligencePath: Access FT and WSJ via institutional subscription; cross-reference key valuation facts with SEC F-1 and CNBC which are freely accessible and cover the same events.
    relatedQuestionRefs:
    - QV003
    - QV022
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Lock-up expiry schedule for founder and investor shares
    missingEvidence: The post-IPO lock-up period and expiry schedule for Siemiatkowski, Sequoia Capital, and other pre-IPO investors have not been publicly announced with precise dates as of this research run.
    whyItMatters: Lock-up expiry creates significant selling pressure risk for public shareholders. Sequoia's ~22% stake represents a large potential overhang; timing the lock-up expiry is critical for post-IPO positioning.
    diligencePath: Review the F-1 lock-up agreement disclosures and any post-IPO proxy filings; track SEC Form 4 filings for insider activity after the lock-up period.
    relatedQuestionRefs:
    - QV018
    - QV024
    relatedTableRefs: []
