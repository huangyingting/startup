chapter:
  number: 8
  title: Valuation
  summary: >-
    Klarna's September 2025 NYSE IPO at $40 per share raised $1.37 billion in gross proceeds,
    with first-day trading pushing the implied market capitalization above $17 billion — a
    dramatic rehabilitation from the July 2022 down-round nadir of $6.7 billion and 85% below
    the $45.6 billion peak of June 2021 at peak BNPL enthusiasm. Against FY2024 revenue of
    $2.81 billion (24% YoY growth) on $105 billion GMV, Klarna's ~6x EV/Revenue multiple at
    IPO represents a meaningful premium to pure-play BNPL peer Affirm (~3–4x), defensible on
    geographic breadth across 45+ markets but constrained by razor-thin operating margins
    (-$121M operating income despite $21M net income). The 2024 first annual net profit since
    2018 is structurally significant, yet post-IPO Q3 2025 losses reported by the Observer
    cast doubt on the durability of that profitability path. Governance concerns from the
    dual-class share structure — Siemiatkowski's supervoting Class C shares — add a minority
    investor discount. Overall recommendation is Research More with medium confidence: Klarna
    is newly public with a limited post-IPO track record, and valuation is fairly valued to
    slightly overvalued at IPO price versus BNPL peers.
