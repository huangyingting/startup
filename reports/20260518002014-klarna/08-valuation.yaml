  - - Precise lock-up expiry schedule for Siemiatkowski and Sequoia Capital
    - Sequoia 22% stake is a major post-lock-up overhang; timing determines position sizing risk
    - P1 — Material
    - F-1 lock-up agreement section; post-IPO SEC Form 4 and Schedule 13D/G monitoring
  - - Credit loss vintage curves by product type (Pay in 4 vs. installment vs. Financing)
    - Vintage-level credit loss data essential for underwriting default risk trajectory
    - P1 — Material
    - CFO meeting request; use Affirm 10-K vintage disclosure as comparable proxy
  - - Post-IPO Q4 2025 and FY2025 earnings confirming or reversing Q3 2025 loss
    - Observer Q3 2025 adverse report must be corroborated or refuted by official filings
    - P1 — Material
    - Klarna Q4 2025 earnings press release; FY2025 20-F SEC filing (expected H1 2026)
