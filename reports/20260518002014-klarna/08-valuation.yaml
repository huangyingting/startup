- id: section-3
  title: Bull/Base/Bear Scenarios
  body: >-
    Three scenarios define the investment case range for Klarna at its September 2025 IPO
    valuation. In the bull case, Klarna successfully captures significant US GMV share driven
    by Shopify integration and US merchant expansion, AI-driven efficiency translates into
    operating margin expansion toward double digits by FY2026, and the regulatory environment
    normalizes rather than tightens. US revenue growth at 40%+ annually alongside European
    stability supports 2026E revenue of $3.5–4 billion. Applied against an 8–9x EV/Revenue
    multiple reflecting the re-rating to a growth fintech profile, the bull case supports
    a $25–30 billion valuation. The AI efficiency story is central: if Klarna reduces human
    headcount equivalent through automation while growing revenue, operating expenses decline
    as a percentage of revenue.

    In the base case, Klarna grows revenue at 15–20% annually, FCA BNPL reforms in the UK
    and EU CCD2 implementation create modest approval rate pressure and compliance costs,
    and operating margins improve slowly toward breakeven. FY2026E revenue of approximately
    $3.2–3.4 billion at 5–6x EV/Revenue yields a $15–18 billion valuation, roughly in line
    with IPO pricing. This scenario acknowledges Klarna's genuine competitive advantages
    while pricing in US competition from Affirm and merchant fee compression.

    The bear case is material and has received adverse evidence support. The Observer's
    report of a Q3 2025 post-IPO net loss, with operating expenses exceeding expectations,
    signals the profitability path may be longer than the FY2024 milestone suggested.
    If FCA regulation in the UK — Klarna's largest single market — significantly reduces
    approval rates or requires additional capital buffers, and US credit quality deteriorates
    in a consumer spending slowdown, the bear case yields $6–9 billion at 2–3x revenue.
    The dual-class governance structure limits shareholder ability to effect management
    change if performance deteriorates, amplifying downside risk. Apple Pay Later's April
    2024 discontinuation is a precedent showing how abruptly large technology players can
    exit BNPL, creating competitive uncertainty. Rising credit losses in an economic downturn
    could rapidly eliminate the thin 0.7% net margin. The probability distribution across
    scenarios is roughly 25% bull, 50% base, 25% bear based on available evidence.
