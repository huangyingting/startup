    approximationNotes: "Flow is reconstructed from Klarna public developer documentation at docs.klarna.com, SEC F-1 product descriptions, and official merchant integration guides. Internal system names and processing details are inferred from public sources."
    data:
      nodes:
        - label: "Consumer browses merchant e-commerce store"
          detail: "Consumer arrives at merchant website or mobile app; Klarna checkout widget JS snippet loads alongside other payment options"
        - label: "Consumer selects item and proceeds to checkout"
          detail: "Merchant checkout page displays Klarna Pay in 4, Pay Later, and Financing options next to credit card and PayPal"
