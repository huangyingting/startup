  - id: section-3
    title: "Merchant Technology Stack and Developer Integration Surface"
    body: >-
      Klarna's merchant-facing technology stack is the operational spine connecting 850,000 global merchants to its
      consumer payment products. The checkout widget — a JavaScript snippet — is the primary integration mechanism,
      embedding Klarna payment options into any e-commerce checkout page with minimal engineering effort and no
      server-side changes required for the basic integration. For more complex and higher-volume implementations,
      Klarna's REST API, documented at docs.klarna.com, supports full payment lifecycle management including order
      creation, capture, refund, and dispute resolution. The developer portal provides SDKs for major e-commerce
      platforms including Shopify, WooCommerce, Magento, and Salesforce Commerce Cloud, reducing integration friction
      to near-zero for the long tail of merchants using standard platforms. A sandbox environment enables merchants
      to test integrations end-to-end before going live, reducing implementation risk.

      Klarna for Business is the merchant dashboard layer, providing order management, performance analytics, customer
      service resolution tools, and access to Klarna Ads — a targeted advertising product enabling merchants to
      purchase placements within the Klarna consumer app's shopping feed. Merchant analytics tools provide retailers
      with visibility into consumer conversion metrics, demographic insights, and behavioral data derived from Klarna's
      consumer transaction base spanning $105 billion in annual GMV. This first-party data asset represents a growing
      strategic differentiator, enabling Klarna to offer merchants audience targeting and attribution analytics that
      extend beyond pure payment functionality. The credit decisioning engine, operating at sub-second latency using
      proprietary ML models trained on consumer transaction history and third-party bureau data, is the invisible
      infrastructure underpinning every merchant transaction. Klarna's technology roadmap — as evidenced by the
      November 2025 KlarnaUSD stablecoin launch — signals ambitions to expand into new payment rail architectures
      and deepen merchant analytics capabilities in the medium term.
    tableRefs:
      - TE003
      - TE005
    figureRefs:
      - FE004
