    title: "Klarna Consumer BNPL Checkout Flow"
    type: flow
    description: "End-to-end flow of a consumer BNPL purchase through Klarna, from merchant store entry through real-time credit decisioning to installment payment settlement and Klarna merchant fee revenue recognition."
    claimRefs:
      - CE001
      - CE014
      - CE016
      - CE025
