chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Klarna operates a multi-product fintech platform anchored by its core BNPL suite — Pay in 4 (US),
    Pay in 3 (UK/EU), Pay Later 30-day, and longer-term Financing — deployed across 850,000 merchants in
    26 countries and processing $105B in GMV in 2024. The consumer-facing Klarna App bundles shopping
    discovery, price comparison via PriceRunner (acquired March 2022), digital loyalty cards via Stocard
    (acquired July 2021), Klarna Balance savings, and a Klarna Card with approximately 4 million users.
    Klarna Plus ($7.99/month) adds a subscription monetization layer. On the merchant side, a checkout
    widget, real-time sub-second credit decisioning, a developer API at docs.klarna.com, and Klarna for
    Business analytics constitute the merchant integration surface. The February 2024 AI customer service
    launch — claimed equivalent to 700 full-time agents — is a flagship efficiency bet, though the CEO
    acknowledged quality concerns in May 2025. The November 2025 KlarnaUSD stablecoin on Stripe blockchain
    represents an early-stage strategic probe into crypto payment rails. Privacy incidents (2021 data
    breach, 7.5M SEK IMY GDPR fine in 2022) and a 2020 autofill vulnerability underline residual security
    and compliance risk. Key diligence gaps include the proprietary credit decisioning model architecture,
    undisclosed API uptime SLA, and post-backtrack AI quality metrics.
