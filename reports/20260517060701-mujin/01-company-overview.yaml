callouts:
  - calloutType: strength
    title: "Proven No-Code Industrial AI Platform"
    body: >
      MujinOS is a robot-agnostic, no-code platform that abstracts hardware complexity,
      enabling rapid deployment across different robot OEM brands. This differentiates
      Mujin from single-OEM automation solutions and creates strong switching costs
      once deployed in customer facilities.
    claimRefs: [CO004, CO005, CO007]

  - calloutType: risk
    title: "Financial Opacity and Private Information Gap"
    body: >
      Mujin discloses no revenue, margin, customer count, or burn-rate data as a
      private company. The valuation of ~$1B is unconfirmed by any regulatory filing.
      Meaningful investment decisions require private data room access under NDA.
    claimRefs: [CO033, CO035]

  - calloutType: risk
    title: "Key-Person Dependency on Dr. Diankov"
    body: >
      Dr. Ross Diankov is the creator of the underlying OpenRAVE framework, primary
      technical spokesperson, and co-founder CEO. His departure or incapacitation
      would create significant business continuity and IP-chain risks.
    claimRefs: [CO009, CO032]

