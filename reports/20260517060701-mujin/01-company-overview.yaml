company:
  name: Mujin, Inc.
chapter:
  number: 1
  title: Company Overview
  summary: >
    Mujin is a Japanese intelligent robotics company founded in 2011 in Tokyo by Dr. Ross Diankov (CEO)
    and Issei Takino. Its flagship product MujinOS (formerly MujinController) is a no-code platform
    that transforms industrial robots from any manufacturer into intelligent, autonomously operating
    machines for warehouse and manufacturing automation. Mujin raised $85M in Series C funding in 2022–2023
    led by SBI Investment with participation from Pegasus Tech Ventures, Accenture, 7-Industries, and
    angel investor Dr. James Kuffner, reaching a reported ~$1B valuation. The company operates from
    Tokyo headquarters with offices in Atlanta (US), the Netherlands (Europe), and China.

sections:
  - id: company-identity
    title: Company Identity and Business Model
    body: >
      Mujin, Inc. is a Japanese industrial robotics software and hardware company headquartered in
      Tokyo, Japan. Founded on March 30, 2011, by Dr. Ross (Rosen) Diankov and Issei Takino, Mujin
      develops what it calls the global standard for intelligent robotics: a unified no-code software
      platform called MujinOS that enables industrial robots from any manufacturer to perform complex
      factory and warehouse automation tasks without direct programming. The company's Japanese legal
      entity was incorporated as Mujin K.K. (株式会社Mujin), with the US subsidiary operating as
      Mujin Corporation based in Sandy Springs, Georgia (north of Atlanta).

      The core business model is B2B enterprise software + hardware integration. Mujin licenses
      the MujinOS platform to system integrators and end-users who deploy it on top of industrial
      robot arms from Fanuc, Kawasaki, Mitsubishi, Yaskawa Motoman, Universal Robots, and others.
      MujinOS provides real-time motion planning, 3D perception, and a continuously-updating digital
      twin of the facility—enabling robots to adapt to changing conditions without reprogramming.
      Revenue sources include platform licensing, professional services, and hardware bundles such
      as QuickBot (a quick-deployment depalletizing robot cell). As of 2026, Mujin positions itself
      as an OS-level enabler of the warehouse automation ecosystem rather than a robot-arm OEM,
      competing for the software and intelligence layer in a market that includes Symbotic, Pickle
      Robot, and in-house robot intelligence platforms from major industrial OEMs.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: leadership-governance
    title: Leadership, Founders, and Governance
    body: >
      Mujin was co-founded by two individuals with complementary backgrounds. Dr. Ross Diankov (also
      stylized as Rosen Diankov in older sources) is the CEO and technical co-founder. He completed
      his Ph.D. at Carnegie Mellon University's Robotics Institute under advisor Dr. James Kuffner
      (now CEO of Woven by Toyota, a Toyota mobility subsidiary). During his doctorate, Diankov
      created OpenRAVE, an open-source motion planning framework that remains widely used in robotics
      research globally (802+ GitHub stars, 356+ forks as of 2026) and forms the intellectual
      foundation for Mujin's proprietary technology. Issei Takino, the operational co-founder, serves
      as COO. Together they built the company from its 2011 Tokyo launch into an international
      robotics software business.

      Mujin's US leadership team as of 2026 includes Mario D'Cruz (VP of Marketing and Strategy),
      Manish Gupta (Global FP&A and US CFO), John Ridgley (VP of Engineering), and Rob Schmit
      (SVP of Product). The company established a Global Leadership Cabinet (GLC) to unify
      operations worldwide and align technology, product, sales, and governance functions across
      all regions. Key-person risk is elevated given Dr. Diankov's dual role as technical visionary
      and external face of the company, though the GLC structure aims to distribute leadership
      responsibility. Board composition, advisory details, and specific governance documents are
      not publicly disclosed, representing a material diligence gap for a company at Series C stage.
    claimRefs: [CO008, CO009, CO010, CO011, CO012, CO013, CO014, CO015]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding-investors
    title: Funding History and Investors
    body: >
      Mujin completed a Series C funding round totaling $85 million, with the announcement dated
      September 2022/2023 (sources give conflicting dates—the corporate press release cited September
      5, 2023, while wire service URL patterns suggest September 29, 2022; this discrepancy is an
      open diligence question). The round was led by SBI Investment Co., Ltd. (Japan's largest
      internet finance conglomerate's venture arm), with co-investors including Pegasus Tech Ventures
      (a Silicon Valley VC), 7-Industries (Netherlands), Accenture (as a strategic corporate
      investor), and angel investor Dr. James Kuffner. Accenture had been collaborating with Mujin
      since 2019. Yaskawa Electric, Murata Manufacturing, Itochu, and 31VENTURES (31Group's CVC)
      are cited in earlier rounds according to industry databases and background sources. Total
      capital raised is reported at $85M+ across all rounds; the total exact amount prior to Series C
      is not publicly confirmed. The company's valuation was reported to approach or reach $1 billion
      at the Series C stage, making it a unicorn-adjacent company, though this figure has not been
      independently confirmed by a regulatory filing. Revenue, burn rate, and profitability data
      are not publicly disclosed; Mujin is a private company with undisclosed financials.
    claimRefs: [CO016, CO017, CO018, CO019, CO020, CO021, CO022]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: milestones
    title: Company Milestones
    body: >
      Since founding in 2011, Mujin has progressed from a motion planning research spinout to an
      internationally operating robotics platform company. Early milestones focused on Japan, where
      Mujin deployed some of the world's first fully autonomous bin-picking and palletizing solutions
      for major Japanese logistics and automotive customers including JD.com's China operations and
      Nichirei Logistics. The company opened its China office (Mujin Shanghai) to serve Chinese
      manufacturing and e-commerce logistics markets. In 2022, Mujin opened its first North American
      office in Sandy Springs, Georgia, staffing engineering, sales, and support. The $85M Series C
      funded further international expansion, including the opening of a European headquarters in
      the Netherlands. In December 2024, Mujin signed a capital and business alliance with NTT
      and NTT Docomo Business to accelerate physical AI and autonomous robotics across manufacturing
      and logistics, combining NTT's telecoms/cloud/AI infrastructure with Mujin's MujinOS and
      digital-twin technology. In 2025, Mujin launched QuickBot (QB), a comprehensive quick-deployment
      depalletizing robot cell designed to simplify warehouse receiving automation. By 2026, Mujin
      offers six primary automation applications (palletizing, depalletizing, bin picking, piece
      picking, fleet manager, robotic case picking) and is exhibiting at MODEX 2026 in Atlanta.
    claimRefs: [CO023, CO024, CO025, CO026, CO027, CO028, CO029, CO030, CO031]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: adverse-signals
    title: Risk Signals and Information Gaps
    body: >
      Several material adverse signals merit investor attention. First, Mujin operates as a fully
      private company with no published financial statements—revenue, gross margin, burn rate,
      customer count, and ARR are all undisclosed and must be obtained through private diligence.
      Second, the $1B valuation is reported through secondary sources and has not been confirmed
      by any regulatory filing or independent auditor; the Series C announcement date itself shows
      conflicting signals across reputable sources (2022 vs. 2023), suggesting the company may
      have conducted a multi-tranche or delayed close. Third, the TechCrunch tag page for Mujin
      shows essentially no organic tier-1 technology media coverage despite the company's self-described
      "fastest-growing" status in Japan, which could reflect limited Western market penetration
      rather than real-market traction. Fourth, key-person concentration risk around Dr. Diankov
      is material—he is the creator of OpenRAVE (on which much of the platform rests), primary
      external spokesperson, and technical lead; departure or incapacitation would pose significant
      business continuity risk. Fifth, competition from well-capitalized rivals (Symbotic with ~$1B+
      revenue run rate, Locus Robotics, Pickle Robot, and native-intelligent platforms from Fanuc,
      KUKA, ABB) may constrain margin and market share expansion outside Japan.
    claimRefs: [CO032, CO033, CO034, CO035, CO036]
    tableRefs: []
    figureRefs: []

