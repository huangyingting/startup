  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Mujin ARR and revenue verification
      missingEvidence: >
        Mujin has never published revenue, ARR, gross margin, or any financial KPI in any
        public source. All ARR estimates ($30–80M range) carry potential 50%+ error margins
        and no management confirmation exists. No confirmed revenue figure from any analyst
        database has a primary-source backing.
      whyItMatters: >
        Without verified ARR, no price-sensitive investment or financing decision is
        analytically defensible. A 50% error in the base ARR assumption creates a
        $25–110M revenue range at constant multiples, rendering scenario analysis
        speculative.
      diligencePath: >
        Request management accounts, ARR waterfall by customer and product line, and
        gross margin schedule from Mujin CFO under NDA before any investment commitment.
      relatedQuestionRefs: [QI038]
      relatedTableRefs: [TI001]

    - type: private-evidence-only
      severity: material
      topic: Mujin monthly burn rate and runway
      missingEvidence: >
        No cash position, balance sheet, or management accounts have been disclosed.
        Burn rate estimate ($3–7M per month) is derived solely from headcount inference
        and comparable company benchmarks, not from any Mujin financial disclosure.
      whyItMatters: >
        If Mujin's actual burn is above $5M/month and no revenue offset exists, the
        Series C proceeds are likely exhausted as of mid-2026, creating urgent funding
        risk. Without verification, runway status remains uncertain.
      diligencePath: >
        Request latest monthly management accounts showing cash position, burn rate,
        and revenue offset from Mujin CFO under NDA.
      relatedQuestionRefs: [QI014]

    - type: private-evidence-only
      severity: material
      topic: Next equity financing timing and bridge financing
      missingEvidence: >
        No evidence of a convertible note, bridge financing, or secondary equity
        transaction in the 27-month period between the Series C close (September 2022)
        and the NTT alliance announcement (December 2024) has been identified. The
        timing of any next equity raise is entirely unknown.
      whyItMatters: >
        A bridge note or dilutive financing during this period would materially alter
        cap table dilution and investor return expectations. Without evidence either
        confirming or denying interim financing, the capital structure is opaque.
      diligencePath: >
        Request cap table snapshot as of May 2026, any convertible notes outstanding,
        and bridge financing agreements from Mujin management under NDA. Also request
        the NTT alliance agreement for any equity component.
      relatedQuestionRefs: [QI015, QI036]

    - type: private-evidence-only
      severity: material
      topic: NTT alliance investment amount and equity terms
      missingEvidence: >
        The December 2024 NTT capital alliance press release did not disclose the
        investment amount, equity percentage, convertible debt terms, or co-selling
        revenue commitment. The public announcement mentions only a 'capital and
        business alliance' without specifying financial terms.
      whyItMatters: >
        Without NTT's investment amount and equity terms, the qualitative alliance
        signal cannot be translated into a quantified runway extension or cap table
        impact, making it impossible to factor into financial models.
      diligencePath: >
        Request the NTT partnership agreement summary or term sheet from either
        Mujin management or NTT investor relations under NDA.
      relatedQuestionRefs: [QI041]

    - type: missing-source
      severity: material
      topic: Mujin Japanese financial filings
      missingEvidence: >
        No publicly accessible financial statements, corporate registration filings with
        financial data, or FSA/TSE disclosures for Mujin K.K. (the Japanese legal entity)
        have been identified. The company may have filed financial data with Japanese
        corporate registries but these are not easily searchable or publicly accessible.
      whyItMatters: >
        Japanese corporate registries sometimes contain balance sheet summaries for
        K.K. entities that could provide partial financial verification. Absence of
        identified filings does not confirm absence of any filing.
      diligencePath: >
        Commission a Japanese legal or accounting firm to search the Tokyo Legal Affairs
        Bureau corporate registry for any Mujin K.K. financial disclosures or registered
        financial statements.
      relatedQuestionRefs: [QI037]

    - type: enumeration-incomplete
      severity: minor
      topic: Public financial gaps table partial coverage
      missingEvidence: >
        The public financial gaps table (TI005) enumerates only the five most material
        missing metrics. Additional diligence items — including working capital composition,
        capex schedule, employee compensation structure, debt facilities, and customer
        concentration by ARR — are not enumerated in the table due to insufficient
        evidence to characterize their specific impact.
      whyItMatters: >
        A complete diligence checklist would include ten to fifteen items beyond those
        in TI005; the current table covers the blocking and critical items but not
        all desirable data points.
      diligencePath: >
        Request a full diligence document request list from the Mujin CFO or a
        financial adviser familiar with Japanese technology M&A transactions.
      relatedQuestionRefs: [QI035]
      relatedTableRefs: [TI005]

acknowledgedWarnings:
  - dimension: figureType
    reason: >
      FI004 uses type:timeline instead of the planned acceptedTypes [flow, matrix, waterfall]
      for 'Capital intensity / cash-flow map' because the chapter's capital event data
      is a chronological sequence of discrete financing milestones (founding, Series A,
      Series B, Series C, NTT alliance, and projected next raise), which is most clearly
      and accurately represented as a labeled timeline. A flow, matrix, or waterfall type
      would misrepresent the data structure as a causal flow or numeric decomposition
      rather than a temporal funding chronology. The timeline type directly satisfies
      the figure's planning intent of mapping capital intensity milestones.
