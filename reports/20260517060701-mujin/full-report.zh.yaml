      - number: '3.2'
        title: 直接和相邻竞争对手画像
        blocks:
          - type: paragraph
            body: >
              与 Mujin 最直接可比的竞争者，是为仓储环境打造机器人智能软件平台的公司。Intrinsic（Alphabet 子公司， 2021 年成立）正在构建面向开发者的机器人 OS 平台
              Flowstate，并明确希望服务工业自动化市场。 Intrinsic 拥有来自 Alphabet 的近乎无限资本，也从学术界和产业界招聘了资深机器人技术人才；即便尚未
              成为规模化商业竞争对手，它仍是长期战略威胁。Covariant 于 2017 年由 Pieter Abbeel 等研究人员从 UC Berkeley 衍生创立，为物流场景的机器人手臂开发 AI 软件，并在
              August 2024 被 Amazon 以估计 $1–2 billion 收购。Amazon 收购使 Covariant 不再是独立供应商，并把它转化为 Amazon 物流网络内部的 竞争威胁；对于曾是
              Covariant 客户的其他物流运营商，这也带来潜在竞合风险。Berkshire Grey 在 2021 年 通过 SPAC 上市后，于 January 2023 被 SoftBank Robotics
              America 收购。收购后，SoftBank Robotics 将 Berkshire Grey 的机器人拣选和分拣资产，与自身既有 AMR 和人形机器人组合合并。

              Pickle Robot（美国，2019）是单件拣选领域的直接竞争对手，提供基于订阅的混合箱拣选方案；截至 2023 年 已融资 $26M。Plus One
              Robotics（美国，2016）在包裹处理和混合拣选中竞争，采用人类监督的 AI 系统 （名为 CrewChief），让远程人员监督机器人作业。Osaro（美国，2015）专注于医药和物流应用中的机器人 拣选
              AI 软件。Fizyr（Netherlands，2016）提供专门面向拆垛和单件拣选的感知 AI 软件，模式更窄，偏 纯软件。相对 Mujin 更宽的多用例平台，这些公司都是垂直玩家。
