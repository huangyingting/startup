      - number: '4.3'
        title: 单位经济与利润率结构
        blocks:
          - type: paragraph
            body: >
              Mujin 的单位经济完全来自公开基准和竞争对手类比，因为公司没有公开披露毛利率、CAC 或 LTV 数据。最有 分析价值的公开基准是 Symbotic Inc.，这家 NASDAQ 上市仓储自动化公司在 SEC
              10-K 文件中披露，FY2024 混合毛利率约为 38–42%，覆盖软件、系统集成服务和硬件收入流。Symbotic 的成本结构并非完美替代—— Symbotic
              规模大几个数量级，且模式更偏硬件密集——但其混合利润率轮廓为估计 Mujin 经济性提供了可防守 的下限。

              工业自动化平台的软件许可毛利率通常为 60–80%，因为平台开发完成后，销售成本很低。机器人集成专业服务 利润率通常为 20–35%，反映工程师和调试专家的直接人工成本。在假设收入结构约为 40% 软件、50%
              服务、 10% 硬件时，混合毛利率约为 40–50%，与 Symbotic 替代基准一致。

              Mujin 的获客成本（CAC）估计为每个企业客户 $100K–$500K，反映 6–18 个月的典型企业销售周期、概念验证 演示成本，以及 SI 伙伴联合销售的开销。假设未来五到七年发生多站点扩张，企业 LTV
              估计为 $2M–$10M 或 更高。隐含 LTV/CAC 比率为 4:1 到 20:1，处于正常企业软件区间，但对假设的扩张轨迹以及多站点采用是否 真正落地高度敏感。
