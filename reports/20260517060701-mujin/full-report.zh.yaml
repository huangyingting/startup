      - number: '1.4'
        title: 公司里程碑
        blocks:
          - type: paragraph
            body: >
              自 2011 年创立以来，Mujin 已从运动规划研究衍生项目，发展为一家国际化运营的机器人平台公司。 早期里程碑集中在日本：Mujin 为 JD.com 中国业务、Nichirei Logistics
              等大型日本物流和汽车客户 部署了部分全球首批全自主料箱拣选和码垛方案。公司随后开设中国办公室（Mujin Shanghai），服务 中国制造和电商物流市场。2022 年，Mujin 在 Georgia 州
              Sandy Springs 开设首个北美办公室，配置 工程、销售和支持团队。$85M Series C 进一步支持国际扩张，包括在 Netherlands 设立欧洲总部。 December 2024，Mujin
              与 NTT 和 NTT Docomo Business 签署资本和业务联盟，加速制造与物流场景下 的物理 AI 和自主机器人落地，将 NTT 的电信 / 云 / AI 基础设施与
              MujinOS、数字孪生技术结合。 2025 年，Mujin 推出 QuickBot（QB），这是一个综合型快速部署拆垛机器人工作站，旨在简化仓库收货 自动化。到 2026 年，Mujin
              提供六类核心自动化应用（码垛、拆垛、料箱拣选、单件拣选、机群管理器、 机器人箱拣），并参加 Atlanta 的 MODEX 2026。
