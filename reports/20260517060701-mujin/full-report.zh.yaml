        - 可处理非结构化料箱；物品位置变化时无需重新编程即可适配
        - 单件循环时间会随 SKU 尺寸、重量和形状显著波动
      - - 拆垛
        - 在收货月台卸载入库托盘
        - QuickBot 预配置单元；MujinOS 感知 + 规划
        - 数天而非数月完成调试；自主识别托盘码放模式
        - 在固定托盘配置上表现最佳；不规则混装会拖慢速度
      - - 码垛
        - 用混合商品码放出库运输托盘
        - 自适应堆叠规划；重量和尺寸优化
        - 减少人工码垛劳动；优化托盘稳定性
        - 需要 WMS 中的 SKU 尺寸和重量数据，才能优化堆叠
      - - 料箱拣选
