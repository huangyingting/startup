      - number: '5.2'
        title: 工作流覆盖与用例
        blocks:
          - type: paragraph
            body: >
              MujinOS 已部署到六类主要仓储和制造用例，每一类都要求核心模块采用不同配置。单件拣选——从料箱、周转箱 或货架中取出单个商品——是复杂度最高的用例，也是 Mujin 在客户案例中最常提及的用例。它要求感知
              AI （用于商品识别和姿态估计）、运动规划（用于无碰撞接近轨迹）和夹爪选择逻辑紧密耦合。商品在两次拣取之间 位置变化时，系统能在运行时自适应，无需人工重新编程。

              拆垛（在收货月台卸载入库托盘）是 QuickBot 的目标用例。通过为一组明确的托盘配置预先配置运动轨迹和视觉 参数，QuickBot
              瞄准以天而非月为单位完成调试。码垛（构建出库托盘）需要额外的自适应堆叠模式规划能力， 因为重量分布和悬垂限制会随 SKU 变化。制造场景的料箱拣选服务汽车和工业客户，用于从料箱中处理散放、
              未定向的金属零件或铸件。

              混合箱拣选服务电商仓库；这些仓库必须按订单拣取异构商品组合，任务要求快速 SKU 识别和单件周期时间管理。 最后，机群管理在仓库或工厂地面协调多台机器人手臂和 AMR，处理任务排队、交通仲裁和异常上报。跨所有
              用例，MujinOS 呈现相同的无代码操作员界面——系统集成商无需编写机器人专属代码，即可以可视化方式配置 工作流。与 SAP、Blue Yonder 和 Oracle ERP/WMS
              系统的集成已有文档记录，并在包括 Amazon Japan 设施 在内的大客户现场投入生产。
