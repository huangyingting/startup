      - number: '4.2'
        title: 定价与变现架构
        blocks:
          - type: paragraph
            body: >
              Mujin 的商业结构遵循工业自动化软件平台典型的多组件企业定价架构：前置或分阶段的软件平台许可费、 年度维护和支持费，以及覆盖集成、调试和培训的项目制专业服务费。它不同于纯 SaaS 订阅模式，因为部署
              复杂度和针对特定硬件的定制需要实质性专业服务投入，使每个客户合同周期同时包含项目收入和经常性软件收入。

              基于竞争对手替代数据（Symbotic 披露的合同特征、Pickle Robot 的 RaaS 定价披露）和分析师推断， 估计典型企业合同金额为 $500K 到 $3M。Mujin
              面向单一设施仓库或制造站点的标准项目大概率包括： $200K–$800K 的初始平台许可；$200K–$2M 的集成和数字孪生调试专业服务；以及每年 $50K–$200K 的年度
              维护费。多站点扩张会拉动年经常性收入增长，因为每个新增部署都会带来增量许可和维护费，而成本不会同比例 增加，长期改善混合利润率。

              Mujin 主要通过系统集成商（SI）渠道成交，而不是直接企业销售；Accenture 是主要美国合作伙伴，日本市场 则由多家日本 SI 覆盖。渠道主导模式降低了 Mujin 的直接销售成本，但也让公司依赖 SI
              伙伴的激励和产能， 并引入利润分成，可能限制标示合同金额的实际兑现。任何公开公告或文件中都没有披露价目表、渠道经济性或 已确认实现合同金额。
