  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Mujin 位于三个重叠市场的交汇处：（1）更宽泛的仓储与物流自动化市场，覆盖所有用于自动化内部物流作业 的硬件和软件；（2）仓储机器人市场，范围限于仓库场景中的关节机器人手臂、移动机器人（AMRs/AGVs）
              和专用机器人工作站；（3）智能机器人软件和控制平台市场，这是 Mujin 最直接的可服务市场。总体仓储 自动化市场（TAM 视角
              1）包括自动存储与检索系统（ASRS）、输送和分拣系统、自主移动机器人（AMRs）、 工业机器人手臂、仓库管理软件（WMS）以及自动化所需能源基础设施；按不同分析师口径，2025–2026 年 全球规模估计为
              $25–35 billion。Mujin 的产品瞄准机器人手臂之上的软件与智能层（关节机器人执行 拣取、码垛、拆垛、料箱拣选和单件拣选），行业分析师通常将其归入「仓储机器人」和「工业机器人软件」
              子板块。现状替代方案包括：人工劳动力（直接替代）、较旧的示教器编程方法、OEM 专属机器人控制软件 （Fanuc ROBOGUIDE、KUKA WorkVisual、ABB
              RobotStudio），以及具备机器人编排能力的云 / 边缘仓库管理 系统。MujinOS 在编排和智能层与这些方案竞争，同时保持不绑定硬件。
