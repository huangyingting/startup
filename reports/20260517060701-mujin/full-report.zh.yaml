      - number: '6.2'
        title: 具名客户证明与案例研究深度
        blocks:
          - type: paragraph
            body: >
              Mujin 的客户证明材料在日本记录最深，公司官网发布了多篇官方案例研究。日本最大的工业工具和 五金分销商 Trusco Nakayama，在其配送中心部署了 Mujin 码垛和拆垛自动化。该部署处理的 SKU
              组合很多元，包含不同重量和包装形式的五金、工具和工业耗材；这是技术难度很高的环境，也验证了 MujinOS 不止能跑单一 SKU 工作流，而具备更通用的能力。Trusco 自己的公司页面也佐证了合作关系
              和运营场景。

              Logisteed Ltd.（2023 年由 Hitachi Transport System 更名而来）是日本五大第三方物流提供商 之一，正在多个设施运营 Mujin
              仓储自动化。多站点扩张是最清晰的证据：客户从试点走向完整商业 部署，并为更多设施复购。Logisteed 自己的投资者关系材料和公司沟通也确认，物流自动化是其战略 重点投入方向。

              日本占主导地位的温控物流运营商 Nichirei Logistics，在冷链设施中部署了 Mujin 拆垛自动化。 冷链场景值得注意，因为零下或冷藏环境会给硬件部件和黏性夹具都带来压力，这不是常温仓库自动化
              的典型部署条件。Nichirei 部署提供了超出标准常温物流环境的有意义环境验证。

              JD.com 在中国的 JD Logistics 配送中心网络中部署了 Mujin 件拣选机器人，每天处理大量混合电商 商品，包括小包裹、服装和消费电子产品。JD.com
              运营着全球最大的自有物流网络之一，因此该部署是 Mujin 公开确认客户中吞吐量最高的案例。基于现有案例描述和相互佐证的媒体报道，所有具名部署都是 生产级，而不是概念验证。
