      - number: '2.2'
        title: 市场规模（TAM / SAM / SOM）
        blocks:
          - type: paragraph
            body: >
              仓储和工业自动化市场存在多组分析师估计，差异很大，主要来自定义口径不同。Mordor Intelligence 估计，全球仓储自动化市场（广义定义，包括硬件和软件）2025 年为 $29.98
              billion，2026 年增至 $34.17 billion，2031 年达到 $65.74 billion，2026–2031 年 CAGR 为 13.98%。Precedence Research
              将同一市场 2025 年规模估为 $25.27 billion，到 2035 年达到 $107.36 billion，CAGR 为 15.56%。 MarketsandMarkets
              使用略宽的「自动化物料搬运设备」（AMHE）类别，2025 年规模为 $33.39 billion， 到 2030 年增至 $51.22 billion，CAGR 为 8.9%。Grand View
              Research 则估计更窄的「仓储机器人」 子市场 2022 年为 $4.31 billion，并预测到 2030 年达到 $17.29 billion，CAGR 为 19.6%。这些差异
              反映定义不同：广义研究纳入输送线、ASRS、WMS 和包装自动化；窄口径研究只看机器人硬件。Interact Analysis 以更定性的方式描述市场，称其到 2028 年将「翻倍」，与上述 13–20%
              CAGR 估计相一致。

              Mujin 的可服务市场（SAM）是仓储和制造环境中，叠加在关节机器人手臂之上的智能机器人软件和控制平台层。 按行业惯例，软件约占仓储自动化市场的 15–20%；据此估计，2026 年 SAM 为
              $3.7–6.8 billion（对应 $25–34B 总市场的软件切片）。Mujin 2026 年的可获取市场（SOM）受当前地理覆盖（日本、美国、 Netherlands、中国）、机器人 OEM
              合作关系以及高技能实施团队需求约束。一个极保守的 SOM 估计锚定 当前日本牵引和刚起步的美国 / 欧洲存在——近期机会可能为 $200–500M。
