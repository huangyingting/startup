  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值方法与框架
        blocks:
          - type: paragraph
            body: >
              Mujin, Inc. 是一家私营工业机器人软件公司，没有公开收入、利润率或资产负债表数据。因此，估值依赖 三种相互收敛的方法：（1）把 EV/Revenue
              倍数分析应用于估计年经常性收入（ARR）区间，并用可观察 可比公司倍数锚定；（2）参考仓库自动化领域的私营轮次和 M&A 退出基准；（3）用乐观、基准和悲观 假设生成情景加权估值区间。主要方法是
              EV/Revenue，因为 Mujin 的商业模式——经常性软件许可、专业 服务和 MujinOS 平台费——最接近工业 SaaS 和平台公司，而这些公司的投资人叙事主要看收入倍数。
              可比硬件无关软件平台的毛利率结构通常为 40–60%，在中等增长率下支撑 4–8x 倍数。Mujin 是一家收入 未确认且集中于日本的私营公司，相对美国上市同行应给予保守折价。Mujin 的 ARR
              未公开披露。分析师 估计基于已披露客户数（截至 2024 年 60+ 个企业部署）和典型企业机器人合同规模（每站点 $500K–$2M 年软件价值），得出 $30–80M ARR 区间，基准情景锚定在
              $50–70M。该估计存在重大不确定性，应通过 私有数据室访问验证。本章所有估值结论都明确以这些未经验证的收入估计为条件；若确认财务数据出现 重大差异，结论需要修订。
            claimRefs:
              - CV021
              - CV025
              - CV026
              - CV028
      - number: '8.2'
        title: 可比公司基准
        blocks:
          - type: paragraph
            body: >
              八家可比公司锚定 Mujin 估值分析：Symbotic（上市，最大的仓库自动化软件公司）、Berkshire Grey （SPAC 崩盘警示案例）、Locus
              Robotics（私营，困境重组）、GreyOrange（私营，$1B 轮次）、Exotec （私营，法国货到人独角兽）、AutoStore（上市，挪威）、Geek+（私营，中国，直接竞争者）和 6 River
              Systems（2019 年被 Shopify 收购）。Symbotic 是流动性最好的可比公司：它报告 FY2024 收入 $1.77B，截至 2025 年初，过去十二个月 EV/Revenue 约为
              2.5–4x，较 2022 年 8x+ 峰值显著压缩。 AutoStore 走势类似，从 IPO 时的 7–8x 降至 2024 年的 3–4x。这些公开市场基准设定了可比私营公司
              倍数的上限。反向数据点明显限制乐观空间。Berkshire Grey 在二十四个月内从 $2.3B 跌到不足 $100M， Locus Robotics 则在 $2B 的 Series F
              估值后经历大规模裁员和重组；这些案例说明，如果没有持续的 单位经济性支撑，仓库机器人在周期峰值时的倍数叙事很脆弱。Mujin 避开了一部分失败模式（它运营
              软件，而不是资本密集硬件），但行业情绪冲击是真实存在的。私营可比公司（Geek+ 约 $2B，Exotec 约 $2B）披露规模或地域广度都超过 Mujin，因此不支持 Mujin
              获得同等估值。由这组可比公司推导出的 2–6x 倍数区间，被应用到 Mujin 估计 ARR 上，生成后续章节描述的三个估值情景。
