      - number: '8.4'
        title: 估值情景
        blocks:
          - type: paragraph
            body: >
              Mujin 的企业价值定义了三个情景，每个情景都由收入轨迹、市场倍数和战略执行的具体假设驱动。 乐观情景（$500–800M）：假设 Mujin 把 Amazon 合作、NTT 渠道和欧洲客户管线转化为
              2026-2027 年 $80M+ ARR。美国物流市场规模化渗透后，可获得 6–8x EV/Revenue 倍数，与高增长、AI 邻近的工业软件 相符。NTT 联盟作为企业渠道，在 NTT
              制造业客户群中联合销售 MujinOS。2025-2026 年 AI/机器人行业 顺风支撑倍数扩张。基准情景（$300–500M）：假设日本集中型收入达到 $50–70M ARR，美国和欧洲温和扩张。 4–6x
              倍数反映日本集中、私营公司身份和缺乏公开收入验证带来的周期中段折价。这是结构化老股交易或 战略 M&A 的概率加权中心估计。悲观情景（$150–250M）：假设美国市场进入停滞，市场倍数压缩至 2.5–3x （与
              Symbotic 低谷估值和 AutoStore 2024 年定价一致），且日本和有限亚洲扩张带来的 ARR 上限仅为 $40–50M。若融资不透明持续、竞争者在日本替代 Mujin，或行业市场出现类似
              2022-2023 年的错位，悲观 情景就会被触发。
