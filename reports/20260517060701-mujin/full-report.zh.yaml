      - number: '5.3'
        title: 技术架构与 AI 路线
        blocks:
          - type: paragraph
            body: >
              MujinOS 采用边缘优先架构部署。MujinController 运行时跑在客户设施内的本地工业 Linux PC 上，实时机器人控制不依赖互联网连接或云端可用性。可选的云仪表盘负责远程监控、遥测和分析，
              但核心运动规划和执行仍留在本地。这种边缘优先设计既是工程选择，也是商业选择：工业机器人控制 要求低延迟（公司声称运动规划低于 100ms），大型物流运营商也更看重安全边界。

              MujinOS 的 AI 路线是混合式，而不是完全数据驱动。运动规划引擎以物理模型为基础：它建立机器人 和环境的运动学模型，并在配置空间中搜索无碰撞轨迹。深度学习主要用于感知层，基于深度相机点云
              做物体识别、姿态估计和抓取质量评分。这一路线希望同时拿到模型控制的可靠性和确定性，以及学习 型感知的灵活性和泛化能力。Mujin 与 NTT 的战略联盟（2024 年 12 月宣布）聚焦开发物理 AI
              基础模型，最终拟集成进 MujinOS，把平台的操作泛化能力从预建模任务扩展出去。

              数字孪生是另一层架构差异点。MujinOS 持续维护设施的 3D 模型，因此能先在仿真里验证新运动规划， 再上线执行；导入新 SKU 或调整布局时，碰撞风险会大幅降低。Nvidia Isaac Sim
              和其他商业仿真 平台具备部分重叠能力，但没有集成进 MujinOS——Mujin 的仿真是自研的，并与运动规划器共同设计， 追求紧密的实时保真度。ROS 生态提供了广泛使用的开源中间件替代方案，但 MujinOS
              使用自研运行时， 不依赖 ROS。
