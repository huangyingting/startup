      - number: '6.4'
        title: 客户留存、重复使用与满意度信号
        blocks:
          - type: paragraph
            body: >
              Mujin 的边缘优先部署模式和深度 WMS/ERP 集成，让系统一旦投产就形成较高切换成本。替换 MujinOS 需要重新集成
              WMS、在不同控制器下重新调试机器人，还可能要重新采购兼容硬件；对大型物流设施而言， 这意味着 6 到 12 个月的运营扰动。这样的结构性锁定并非 Mujin 独有，但公司的无代码配置层会强化
              它：运营人员把工作流搭在 MujinOS 数字孪生之上，这些工作流无法直接迁移到竞争平台。

              截至 2026 年 5 月，公开来源中没有发现客户流失证据——也就是没有大型 Mujin 部署被停止、被竞争者 替换，或被公开宣布失败。缺少流失证据是一个正面代理信号，但不能直接等同于满意度，因为 Mujin
              仍是私营公司，公开披露中没有合同续约数据、净收入留存率或总收入留存率。

              最具体的留存信号是多站点扩张：Logisteed 从单一试点设施扩展到多个站点，JD.com 的中国网络扩张， 以及 Trusco Nakayama
              的持续合作，都说明初始部署满足了客户的运营和经济要求。多家日本客户的 复购行为也很有意义，因为这些公司所处的物流环境高度重视成本。Mujin 产品尚未发布独立净推荐值、 Gartner Peer Insights
              评价或同等满意度指标。
