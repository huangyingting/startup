    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Mujin, Inc. 是一家总部位于日本 Tokyo 的工业机器人软件和硬件公司。公司由 Dr. Ross (Rosen) Diankov 和 Issei Takino 于 March 30, 2011
              创立，开发其称为「智能机器人全球标准」的 统一无代码软件平台 MujinOS；该平台让任何制造商的工业机器人无需直接编程，就能完成复杂的工厂 和仓库自动化任务。公司的日本法人登记为 Mujin
              K.K.（株式会社Mujin），美国子公司以 Mujin Corporation 名义运营，总部位于 Georgia 州 Sandy Springs（Atlanta 以北）。

              核心商业模式是 B2B 企业软件 + 硬件集成。Mujin 将 MujinOS 平台授权给系统集成商和终端客户， 后者把平台部署在 Fanuc、Kawasaki、Mitsubishi、Yaskawa
              Motoman、Universal Robots 等工业 机器人手臂之上。MujinOS 提供实时运动规划、3D 感知，以及持续更新的设施数字孪生，让机器人
              无需重新编程即可适应变化的现场条件。收入来源包括平台许可、专业服务，以及 QuickBot（快速部署 拆垛机器人工作站）等硬件套装。截至 2026 年，Mujin 的定位不是机械臂 OEM，而是仓储自动化生态 的
              OS 级赋能层；它在软件和智能层竞争，市场中还有 Symbotic、Pickle Robot，以及大型工业 OEM 自研的机器人智能平台。
