  - id: FE001
    title: 产品架构图
    type: stack
    layout: standard
    summary: >
      MujinOS 是六层软件栈。最底层提供硬件抽象和经认证的 OEM 机器人接口。其上的 MujinController 运行时执行实时确定性控制。智能层承载运动规划、感知 AI
      和数字孪生。车队管理器位于智能层之上，编排多机器人协同作业。API 与集成层管理 WMS/ERP 连接。顶层是应用层，包括 QuickBot 和无代码操作员界面。
    data:
      layers:
        - label: 应用与用户界面层
          detail: QuickBot 快速部署拆垛单元；MujinOS 任务控制台；面向操作员和系统集成商的无代码可视化编程界面
        - label: API 与集成层
          detail: REST/JSON API 服务器；面向 SAP、Blue Yonder、Oracle 的双向 WMS/ERP/MES 连接器；用于任务派发和完成回报的 webhook 与事件总线
        - label: 车队管理层
          detail: 多机器人任务分配引擎；基于图的交通管理；死锁规避；AMR 协同；异常升级处理
        - label: 智能层（AI 核心）
          detail: 基于物理的运动规划引擎（源自 OpenRAVE，生产环境打磨 10 年以上）；感知 AI（在 3D 深度相机点云上跑深度学习）；数字孪生（实时 3D 设施仿真，用于离线调试）
        - label: MujinController 运行时
          detail: 部署在本地工业 PC 上的自研 Linux 实时执行引擎；确定性控制环；核心功能不依赖云端
        - label: 硬件抽象与 OEM 接口层
          detail: 已认证机器人驱动集成：Fanuc、Kawasaki、Mitsubishi、Yaskawa Motoman、Universal Robots、ABB、KUKA；深度相机和传感器接口；夹爪与输送线的 I/O 控制
    claimRefs:
      - CE001
      - CE002
      - CE005
      - CE006
      - CE008
      - CE023
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: standard
    summary: >
      操作流程从 WMS 或 ERP 系统通过 REST API 向 MujinOS 下发工单开始。MujinController 将任务分配给可用机器人。数字孪生先在仿真中验证规划轨迹，再进入现场执行。感知 AI
      扫描作业区定位目标物。运动规划器实时生成无碰撞轨迹。机器人执行动作；传感器确认抓取成功。机器人集群管理器立即排队下一个任务，完成事件回传 WMS，关闭订单闭环。
    data:
      nodes:
        - label: WMS / ERP 发送工单
          detail: 客户系统通过 REST/JSON API 调用，向 MujinController 下发拣选、放置或码垛任务
        - label: MujinController 接收并分配任务
          detail: 实时任务调度器解析工单参数，并将任务分配给集群内可用机器人
        - label: 数字孪生验证运动计划
          detail: 现场执行前，离线仿真检查候选轨迹是否碰撞、是否可达
        - label: 感知 AI 扫描作业区
          detail: 深度相机捕捉 3D 点云；深度学习模型识别物品姿态，并选择夹爪参数
        - label: 运动规划生成轨迹
          detail: 基于物理的引擎求解 IK 和无碰撞路径；公司称规划周期低于 100ms
        - label: 机器人执行动作
          detail: OEM 机械臂在 MujinController 毫秒级实时监督下执行轨迹
        - label: 抓取或放置确认
          detail: 夹爪力传感器或视觉系统确认拣选 / 放置成功；失败则触发异常
        - label: 集群管理器排队下一任务
          detail: 编排层更新机器人可用状态，并从队列派发下一张工单
        - label: 完成事件发送至 WMS
          detail: MujinOS 通过 API 将带有物品 ID 和时间戳的任务完成确认发回客户 WMS/ERP
      edges:
        - from: WMS / ERP sends work order
          to: MujinController receives and assigns task
        - from: MujinController receives and assigns task
          to: Digital twin validates motion plan
        - from: Digital twin validates motion plan
          to: Perception AI scans work area
        - from: Perception AI scans work area
          to: Motion planning generates trajectory
        - from: Motion planning generates trajectory
          to: Robot executes motion
        - from: Robot executes motion
          to: Grasp or place confirmed
        - from: Grasp or place confirmed
          to: Fleet manager queues next task
        - from: Fleet manager queues next task
          to: Completion event sent to WMS
    claimRefs:
      - CE009
      - CE010
      - CE016
      - CE017
      - CE020
  - id: FE003
    title: 关键依赖图
    type: dag
    layout: standard
    summary: >
      MujinOS 有 7 类关键外部依赖。OEM 机器人硬件（Fanuc、KUKA、ABB、Yaskawa、UR）是首要执行依赖——没有兼容的 OEM 机器人，MujinOS
      无法运行。深度相机和传感器硬件提供感知输入。工业边缘计算（本地 PC）运行 MujinController。客户 WMS/ERP
      系统是任务下发和完成回传的集成依赖。网络基础设施支撑实时机器人控制。系统集成商是主要销售和部署渠道。云仪表盘是可选监控依赖。
    data:
      nodes:
        - label: MujinOS 平台
          detail: 核心软件；所有能力都依赖这一层；Mujin 自研，非开源
        - label: OEM 机械臂
          detail: Fanuc、Kawasaki、Mitsubishi、Yaskawa Motoman、Universal Robots、ABB、KUKA；硬件执行；客户采购
        - label: 深度相机 / 视觉硬件
          detail: 向感知 AI 提供点云的 3D 传感器；Mujin 认证特定相机型号
        - label: 工业 PC（边缘计算）
          detail: 运行 MujinController 的本地 Linux 服务器；可由 Mujin 供应，也可使用客户硬件
        - label: WMS / ERP 系统
          detail: 客户仓库或工厂管理系统；通过 REST API 集成任务下发
        - label: 网络基础设施（LAN）
          detail: 实时 LAN 连接 MujinController、机器人控制器和相机；控制对延迟敏感
        - label: 系统集成商
          detail: 第三方 SI 设计、配置并安装完整机器人单元；Mujin 的主要销售渠道
        - label: 云仪表盘（可选）
          detail: Mujin 托管的远程监控和分析；核心运行可不依赖
      edges:
        - from: MujinOS Platform
          to: OEM Robot Arm
          detail: 通过已认证 OEM 驱动控制机器人；没有兼容机器人，MujinOS 无法运行
        - from: MujinOS Platform
          to: Depth Camera / Vision Hardware
          detail: 读取 3D 传感器流供感知 AI 使用；拣选任务依赖视觉
        - from: MujinOS Platform
          to: Industrial PC (Edge Compute)
          detail: 以 MujinController 进程部署在边缘 PC 上；属于计算依赖
        - from: MujinOS Platform
          to: WMS / ERP System
          detail: 双向 REST/JSON API；任务编排需要接入 WMS
        - from: MujinOS Platform
          to: Network Infrastructure (LAN)
          detail: 实时机器人控制依赖低延迟 LAN；网络中断会让运行停摆
        - from: MujinOS Platform
          to: Cloud Dashboard (Optional)
          detail: 可选遥测推送；启用云仪表盘时，监控和分析依赖它
        - from: System Integrator
          to: MujinOS Platform
          detail: 在客户现场配置、部署并维护 MujinOS 安装
        - from: System Integrator
          to: OEM Robot Arm
          detail: 为完整机器人单元采购、安装并认证机器人硬件
    claimRefs:
      - CE008
      - CE021
      - CE028
      - CE034
