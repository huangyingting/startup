companyProfile:
  summary: >
    Mujin, Inc. 是一家总部位于 Tokyo 的工业机器人软件公司，由 Rosen Diankov 和 Issei Takino 于 2011 年创立。核心产品 MujinController
    是一个不绑定硬件、具备实时运动规划能力的机器人智能平台， 让 ABB、Fanuc、Yaskawa、KUKA 等主流 OEM 的工业机器人无需人工示教器编程，就能完成复杂的拣取、 放置、码垛和拆垛任务。Mujin
    主要服务日本的物流运营商、3PL 和制造商（约 70% 收入），同时在中国 扩张，并借助 Accenture 渠道合作伙伴关系切入早期美国业务。公司累计融资约 $120–150M，包括 JAFCO Asia 领投的 $85M
    Series C（Sep 2022）以及 NTT 战略资本联盟（Dec 2024）。
