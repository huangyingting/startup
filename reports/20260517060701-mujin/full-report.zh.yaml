  - id: TM001
    title: 市场定义表
    columns:
      - 市场层级
      - 定义
      - 分析师口径示例
      - Mujin 定位
      - 纳入 / 排除
    rows:
      - - 整体仓库自动化（宽口径）
        - 所有仓内物流自动化硬件和软件：ASRS、输送线、AMR/AGV、工业机器人、WMS、包装自动化、能源基础设施
        - Mordor Intelligence（2026 年约 $34B）、Precedence（2026 年约 $29B）、MnM AMHE（2025 年约 $33B）
        - 只覆盖子集：机械臂 + 智能层
        - 纳入：机械臂、控制软件；排除：纯输送线、ASRS、仅 WMS
      - - 仓库机器人（窄口径）
        - 仅仓库任务中的自主或可编程机器人：关节臂、AMR/AGV、协作机器人
        - Grand View Research（2022 年约 $4.3B → 2030 年 $17.3B）
        - 直接切入：拣选 / 包装 / 码垛任务中的关节臂
        - 纳入：关节机器人臂、AMR；排除：输送带、ASRS 升降系统
      - - 机器人智能软件平台
        - 运行在机器人硬件之上或旁侧的 OS 和 AI 层，用于规划运动、感知环境并自主执行任务
        - 无独立分析师估算；作为子集低于 $1B
        - 核心产品：MujinOS
        - 纳入：运动规划软件、数字孪生、感知软件；排除：机械臂硬件
      - - 智能机器人编排（SAM 代理口径）
        - 用软件编排跨机器人、跨站点的仓库运营，并做实时决策
        - 与 WMS、AMR 编排、云机器人平台市场重叠
        - MujinOS 车队管理器定位在这一层
        - 纳入：多机器人控制、数字孪生、API 集成；排除：终端 WMS/ERP
      - - 现状替代方案
        - 人工劳动、示教器编程、OEM 机器人控制软件（Fanuc ROBOGUIDE、KUKA WorkVisual、ABB RobotStudio）
        - 未单独量化
        - 替代特定 OEM 控制软件和人工劳动
        - 纳入：Mujin 平台设计上要替代或增强的所有直接替代方案
    notes: >
      市场边界来自多份第三方分析师报告，并与 Mujin 的产品定位交叉核对。没有单一分析师给出「机器人智能软件平台」子赛道的独立估算；第 2 节中的 $3.7–6.8B SAM 估算，是按行业惯例假设软件占仓库自动化 TAM 的
      15–20% 推导而来。
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
