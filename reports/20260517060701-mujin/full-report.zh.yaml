      - number: '3.3'
        title: 既有 OEM 软件与切换成本
        blocks:
          - type: paragraph
            body: >
              对 Mujin 采用最具商业意义的竞争威胁，不是 AI 初创公司，而是把专有软件与硬件捆绑销售的既有机器人 OEM。按装机基础看，Fanuc 是全球最大的工业机器人制造商，全球约有 750,000
              台机器人在运行。Fanuc 的 ROBOGUIDE 软件与 Fanuc 机器人硬件深度集成，提供示教器编程、仿真和诊断功能；对购买 Fanuc 机器人的 客户来说，增量成本基本为零。KUKA（自 2016 年起由
              Midea 持有）和 ABB（瑞士跨国公司）同样深度嵌入 欧洲及全球汽车制造场景。Yaskawa 的 MotoSim 覆盖类似功能。Mujin 面临的战略挑战在于，这些 OEM 软件包
              近乎零增量成本，拥有广泛现场支持网络和数十年的客户信任。要让已经运行 OEM 软件的客户承担切换成本， Mujin 必须证明 2–3× 的 ROI 倍数。

              Mujin 相比 OEM 软件的关键论点是：（1）不绑定硬件——Mujin 可同时跨 Fanuc、KUKA、ABB、Yaskawa 和 Universal Robots
              硬件运行，支持混合机群部署；（2）无代码可视化编程 vs. 专有示教器编程；（3）内置 数字孪生，用于仿真和验证；（4）OEM 软件原生不提供机群级编排。这些优势真实存在，但也带来部署复杂度、
              变更管理和集成成本，而 OEM 软件优先部署可避开这些成本。多 OEM 环境（3PL 和大型配送中心常见）是 Mujin 相对 OEM 既有玩家最强的竞争阵地。
