        - 美国市场是乐观情景的核心催化剂；没有收入证据，它仍是未定价的期权
        - 向管理层索取美国销售管线报告、已签客户名单及按地区拆分的 ARR
      - - Series C 后现金跑道与烧钱速度
        - 没有公开烧钱速度数据；2022 年 9 月融资 $85M，意味着 2025–2026 年可能面临现金跑道压力
        - 看不清现金跑道，投资人无法评估融资断崖风险或下一轮融资时间表
        - 在 NDA 下向 CFO 索取季度烧钱速度、现金余额及未来 12 个月现金跑道
    claimRefs:
      - CV028
      - CV035
      - CV033
      - CV034
      - CV040
    notes: |
      全部五项尽调问题，都是将建议从继续研究上调到任何形式买入的前置阻断条件。NDA 下的数据室访问，是做出价格敏感投资决定的最低前提。
