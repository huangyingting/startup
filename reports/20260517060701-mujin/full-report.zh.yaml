      - number: '1.3'
        title: 融资历史与投资方
        blocks:
          - type: paragraph
            body: >
              Mujin 完成了一轮总额 $85 million 的 Series C 融资，公告时间为 September 2022/2023（来源日期 冲突——公司新闻稿写 September 5, 2023，而通讯社
              URL 模式指向 September 29, 2022；这一差异 是开放尽调问题）。本轮由 SBI Investment Co., Ltd.（日本最大互联网金融集团的风险投资部门）领投， 共同投资方包括
              Pegasus Tech Ventures（Silicon Valley VC）、7-Industries（Netherlands）、 Accenture（战略企业投资方）以及天使投资人 Dr. James
              Kuffner。Accenture 自 2019 年起即与 Mujin 合作。行业数据库和背景资料显示，Yaskawa Electric、Murata Manufacturing、Itochu 和
              31VENTURES（31Group 的 CVC）参与了更早轮次。已报告的累计融资为 $85M+；Series C 之前的精确 融资总额未公开确认。公司在 Series C 阶段的估值据报道接近或达到 $1
              billion，使其接近独角兽门槛， 但这一数字尚未由监管文件独立确认。收入、烧钱速度和盈利能力数据均未公开披露；Mujin 是一家财务 数据不透明的私营公司。
