      - number: '7.5'
        title: 监管与地缘政治风险
        blocks:
          - type: paragraph
            body: >
              自 2022 年 Series C 以来，Mujin 面对的多司法辖区监管环境已明显复杂化。近期最尖锐的风险是美国 出口管制暴露。美国商务部工业与安全局（BIS）持续扩大 Entity List 和
              Commerce Control List（CCL） 覆盖范围，纳入先进机器人软件、AI 算法及相关计算组件。虽然 Mujin 并未被点名列入 Entity List， 但其中国客户运营——包括 JD.com 和
              Cainiao 部署——涉及向中国实体转移复杂运动规划软件。若 BIS 认定 MujinOS 落入 EAR 管制软件类别（例如与工业生产或 AI 军事最终用途担忧相关的 Category 4
              计算机软件），可能产生许可义务或限制，影响中国业务连续性。

              欧盟 AI Act（Regulation 2024/1689）于 2024 年 5 月通过，并将在 2026-2027 年逐步进入 合规期限；该法规将某些 AI
              赋能工业机器人系统列为高风险应用，要求进行合格评定、技术文档准备和 持续监测。MujinOS 中由 ML 辅助的运动规划功能——学习任务画像并适应新 SKU——如果部署在受欧盟监管的 工业场景中，可能落入 EU
              AI Act 的高风险分类，带来合规成本并可能拖慢欧洲扩张。

              日本机器人安全标准（JIS B 8433，与 ISO 10218 对齐）要求协作机器人部署进行符合性测试。这些标准 已较成熟，Mujin 的部署看起来在其框架内运行，但 AI
              辅助协作机器人的标准演进可能要求既有部署重新 认证。US-China 地缘政治紧张给 Mujin 的双地域运营带来持续不确定性：广泛贸易脱钩或针对特定技术的 制裁，可能迫使 Mujin 在运营上拆分日本 /
              美国业务和中国业务，并承担显著重组成本和客户关系风险。
            claimRefs:
