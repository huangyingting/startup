  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 按行业、地域和规模划分的客户分层
        blocks:
          - type: paragraph
            body: >
              Mujin 的客户基础在结构上集中于日本物流和分销行业，这反映了它作为东京企业软件公司的起点： 先服务日本本土大型运营商。已确认具名的四家日本客户——Trusco Nakayama、Logisteed Ltd.
              （前身为 Hitachi Transport System）、Nichirei Logistics 和 Amazon Japan——代表了日本
              最大的一批工业分销商和第三方物流提供商。按日本标准，四家都是大型企业，年收入通常超过 ¥100 billion；所有部署都在实际生产物流设施中，而不是受控试点环境。

              日本之外，JD.com 是 Mujin 披露度最高的国际客户，Mujin 在 JD Logistics 的配送中心网络中部署 高吞吐件拣选和混箱自动化。Alibaba 旗下物流子公司 Cainiao
              也被行业媒体引用为 Mujin 在中国的 参考客户。这些中国部署代表了电商物流垂直场景，与 Mujin 在日本的主要基础不同；日本客户更偏 传统 3PL 运营商和工业分销商。美国和欧洲市场仍处早期；截至 2026
              年 5 月，公开来源中没有 已确认的美国 Fortune 500 客户案例。

              按行业垂直划分，物流和 3PL 运营商占具名案例的多数，其次是电商物流（JD.com、Cainiao）和 工业分销（Trusco Nakayama）。制造业客户本可成为第二波需求，因为 Mujin
              具备料箱拣选和精密 搬运能力，但目前没有任何公开具名案例。这一分层同时带来一个集中的正面证据——日本物流——以及 一个明显缺口：制造业客户验证不足。
