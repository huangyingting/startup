  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品模块目录与架构
        blocks:
          - type: paragraph
            body: >
              Mujin 的全部产品组合围绕 MujinOS 组织。MujinOS 是一个统一机器人软件平台，不论机器人制造商是谁，都 为工业机器人提供智能层。MujinOS
              由一组协同模块堆叠而成：运动规划引擎、数字孪生环境、感知 AI 子系统、 机群管理器、MujinController 运行时和 API 集成层。在这套技术栈之上，是 Mujin 预配置的快速部署拆垛 工作站
              QuickBot。每个模块边界独立，但运行上相互依赖——移除任何单一层，都会削弱或消除产品功能。

              运动规划引擎是技术核心。它源自 CEO Ross Diankov 在 CMU 博士阶段开发的 OpenRAVE 研究平台，采用基于 物理的方法，实时求解逆向运动学、避碰和抓取规划。Mujin 声称规划周期低于
              100ms，但尚未发布独立基准。 数字孪生是客户仓库或工厂的高保真实时 3D 模型，在调试阶段填充数据，并持续更新。它支持上线部署前的 离线运动验证；公司认为，相比传统示教器编程，这是其更快调试周期的主要原因。

              感知 AI 使用深度摄像头生成 3D 点云、识别物体姿态，并为非结构化料箱拣选和单件拣选选择合适的夹爪与 吸附参数。机群管理层处理多机器人任务分配、交通路由，以及机械臂和自主移动机器人之间的死锁避免。硬件
              兼容性通过认证驱动集成覆盖 Fanuc、Kawasaki、Mitsubishi、Yaskawa Motoman、Universal Robots、ABB 和 KUKA。API 层暴露 REST/JSON
              接口，用于与 SAP、Blue Yonder、Oracle 等 WMS、ERP 和 MES 系统双向 通信。这些模块共同构成 Mujin 核心商业主张中的无代码、不绑定硬件平台。
