      - number: '7.4'
        title: 财务与融资风险
        blocks:
          - type: paragraph
            body: >
              Mujin 的财务风险画像由公开披露有限和融资历史结构性集中共同决定。公司最近一次披露融资是 2022 年 9 月 $85 million 的 Series
              C——距本报告日期已接近四年。对一家服务全球企业市场、资本 开支强度较高的工业机器人软件公司而言，这构成有意义的现金跑道约束：若烧钱速度与一家 150-250 人、
              在日本运营且美国及国际销售基础设施正在增长的组织相符，除非公司已实现显著收入自筹，否则 Series C 资金到 2025-2026 年可能已大幅消耗或接近耗尽。

              Mujin 没有公开披露收入数字，因此无法确认公司是否已在足够规模上创收，从而降低对外部融资的依赖。 2024 年 12 月宣布的 NTT 战略合作提供分销支持和隐含背书，但没有披露任何股权投资或可转债组成，
              财务影响仍然模糊。在机器人 SPAC/IPO 倍数已显著压缩的市场环境中融资（Berkshire Grey 是警示案例）， 很可能要求公司证明收入增长、客户多元化和通往盈利的路径，而这些内容尚未被公开阐明。

              日本政府面向工厂和物流自动化的补贴——包括 METI 和 JBF 项目——是更广泛自动化采用环境的一部分， 支撑了 Mujin 本土市场。但这些补贴需要年度预算重新授权，可能被削减或停止，从而影响客户资本开支
              决策。Amazon 与 Mujin 的投资人关系带来隐含战略可选性，但如果 Amazon Robotics 激进扩张第三方 平台业务，也可能形成潜在利益冲突。
            claimRefs:
              - CR019
              - CR020
              - CR021
