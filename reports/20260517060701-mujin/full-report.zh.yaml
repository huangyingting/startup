        - 面向工业料箱的 3D 视觉；基于物理的抓取规划
        - 无需整理料箱即可处理零件随机姿态
        - 高反光或透明零件会拉低性能；CAD 模型有帮助
      - - 混箱拣选
        - 面向电商，从混 SKU 库存中拣选异构订单商品
        - Perception AI + 机队编排，面向高 SKU 数环境
        - 支持高 SKU 环境，无需逐件编程
        - 单件循环时间约束限制极小或易碎商品的吞吐
      - - 机队管理
        - 在一个场内协调多台机械臂和 AMR
        - Fleet Manager 编排；任务排队、交通仲裁、异常处理
        - 跨异构机队统一控制，降低协调开销
        - AMR 厂商兼容性未充分披露；测试规模未公开
