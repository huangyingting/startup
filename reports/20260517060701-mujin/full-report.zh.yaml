      - number: '1.5'
        title: 风险信号与信息缺口
        blocks:
          - type: paragraph
            body: >
              有几项重要反向信号值得投资人关注。第一，Mujin 是完全私营公司，没有发布财务报表——收入、毛利率、 烧钱速度、客户数和 ARR 均未披露，必须通过私下尽调获取。第二，$1B 估值来自二手来源，尚未得到
              任何监管文件或独立审计方确认；Series C 公告日期本身在可信来源之间也出现冲突（2022 vs. 2023），
              暗示公司可能采取了多批次交割或延迟交割。第三，尽管公司自称在日本「增长最快」，TechCrunch 的 Mujin 标签页几乎没有一线科技媒体的自然报道，这可能反映的是西方市场渗透有限，而不一定是真实市场
              牵引不足。第四，围绕 Dr. Diankov 的关键人集中风险实质存在——他是 OpenRAVE 的创建者（平台很大 程度上建立于其上）、主要对外发言人和技术负责人；若其离职或丧失履职能力，公司业务连续性将面临
              显著风险。第五，资金充足的竞争对手（Symbotic 收入运行率约 $1B+、Locus Robotics、Pickle Robot， 以及 Fanuc、KUKA、ABB 的原生智能平台）可能限制 Mujin
              在日本以外的利润率和市场份额扩张。
