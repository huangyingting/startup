      可比公司矩阵按五个关键估值维度给 8 个仓储机器人标的打分：EV/Revenue 倍数、收入规模、与 Mujin 的战略相关性、反向信号严重度，以及整体可比性评级。
    data:
      columns:
        - EV/Rev 倍数（2024-25）
        - 收入规模
        - 平台相似度
        - 反向信号风险
        - 整体可比性
      rows:
        - label: Symbotic（SYM，上市）
          values:
            - 2.5–4x（上市公司）
