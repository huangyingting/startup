      - number: '5.4'
        title: 信任、质量与合规
        blocks:
          - type: paragraph
            body: >
              Mujin 称其符合目标市场适用的主要工业机器人安全标准。在欧洲，Mujin 机器人单元带有 CE 标志， 这要求符合 EU Machinery Directive (2006/42/EC)，以及包括 ISO
              10218-1（机器人安全要求—— 操作型工业机器人、设计与制造）和 ISO 10218-2（工业机器人系统集成）在内的适用协调标准。在日本， JARA（Japan Robot
              Association）标准约束工业机器人的设计和部署；Mujin 起源于日本，意味着其 主要工程和认证基线与 JARA 对齐。

              Mujin 在 CE 合规语境下提到 IEC 62061（机械安全——安全相关电气控制系统的功能安全）和 ISO 13849（机械安全——控制系统安全相关部件）的功能安全要求，但公开来源中没有发现独立安全
              审计报告、TÜV 证书或同等第三方验证文件。合规状态主要来自公司声称；间接佐证是，Mujin 已在 受监管的制造和物流环境中投产部署，且没有已知事故。

              公开来源中没有发现可归因于 MujinOS 的产品召回、OSHA 处罚或严重事故报道，这与受控仓库机器人 环境通常低频的事故历史一致。ISO 9001 质量管理认证尚未得到公开确认。主要合规尽调缺口在于：
              缺少公开认证机构记录、安全审计摘要或第三方测试报告，独立投资人无法在不直接接触 Mujin 或其 系统集成商的情况下确认其声称的 CE/ISO 状态。
