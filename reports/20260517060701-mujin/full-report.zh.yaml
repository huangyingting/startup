      - number: '1.2'
        title: 领导团队、创始人与治理
        blocks:
          - type: paragraph
            body: >
              Mujin 由两位背景互补的创始人共同创建。Dr. Ross Diankov（较早资料也写作 Rosen Diankov） 是 CEO 兼技术联合创始人。他在 Carnegie Mellon University
              的 Robotics Institute 完成博士学位， 导师为 Dr. James Kuffner（现任 Toyota 旗下移动出行子公司 Woven by Toyota 的 CEO）。博士期间，
              Diankov 创建了 OpenRAVE 这一开源运动规划框架；截至 2026 年，该框架在全球机器人研究中仍被 广泛使用（802+ GitHub stars、356+ forks），也是 Mujin
              自研技术的知识基础。运营联合创始人 Issei Takino 担任 COO。两人从 2011 年 Tokyo 起步，把公司做成一家国际化机器人软件企业。

              截至 2026 年，Mujin 美国领导团队包括 Mario D'Cruz（营销与战略副总裁）、Manish Gupta（全球 FP&A 兼美国 CFO）、John Ridgley（工程副总裁）和 Rob
              Schmit（产品高级副总裁）。公司设立 Global Leadership Cabinet（GLC），用于统一全球运营，并在各地区对齐技术、产品、销售和治理职能。 Dr. Diankov
              既是技术愿景负责人，也是公司对外面孔，关键人风险偏高；不过 GLC 架构意在分散领导责任。 董事会构成、顾问细节和具体治理文件均未公开披露，对一家 Series C 阶段公司而言，这是重要尽调缺口。
