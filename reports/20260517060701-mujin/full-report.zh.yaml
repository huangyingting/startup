      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 收入不透明是主要估值阻碍
            body: >
              Mujin 作为私营公司，没有披露收入、利润率或财务 KPI 数据。本章所有估值估计都锚定在未经验证的 ARR 假设上。基准 ARR 若误差 50%，在倍数不变时会产生 $150–750M
              的估值区间；没有私有数据室访问， 任何对价格敏感的投资决定都带有投机性。
            calloutType: risk
            claimRefs:
              - CV021
              - CV028
              - CV035
          - type: callout
            title: 仓库机器人倍数压缩是结构性风险
            body: >
              Berkshire Grey（下跌 95%）、Locus Robotics（陷入困境）和 AutoStore（倍数下调 50%）都表明，仓库 机器人公司容易遭遇严重倍数压缩。Mujin
              并不免疫。2022–2025 年行业修正为任何按 5x 以上收入倍数 承保的投资设定了历史上不利的先例，尤其是当标的是一家集中于日本的私营公司时。
            calloutType: risk
            claimRefs:
              - CV014
              - CV015
              - CV029
              - CV030
          - type: callout
            title: NTT 联盟是质量信号，不是估值锚
            body: >
              2024 年 12 月的 NTT 战略资本联盟确认了 Mujin 的企业可信度和渠道可选性，但没有解决财务不透明。 在未披露投资金额、股权比例或联合销售收入承诺的情况下，NTT
              的参与不能锚定估值——它只是一个正面 定性信号。
            calloutType: insight
            claimRefs:
