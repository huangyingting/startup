      - number: '6.5'
        title: 客户集中风险与反向信号
        blocks:
          - type: paragraph
            body: >
              Mujin 的客户风险主要来自两个相互叠加的集中因素：地域高度集中于日本（估计贡献 70%+ 收入）， 垂直行业又高度集中于物流和 3PL。这两点彼此相关——日本物流行业是 Mujin 渗透最深的市场——但也
              让公司对单一国家的物流资本开支周期形成复合暴露。若日本物流资本开支因宏观放缓、监管变化或技术 扰动而收缩，相比地域更多元的机器人平台，Mujin 的收入轨迹会受到不成比例的影响。

              单一客户集中带来第三层风险：JD.com 是 Mujin 最突出的非日本参考客户，也代表了 Mujin 在中国部署 足迹中的重要部分。虽然 JD.com 的物流业务规模大且仍在增长，但 JD.com
              财务状况、战略方向或与 Mujin 关系的任何恶化，都可能压缩中国板块机会。美国是 Mujin 最近最集中投入合作伙伴开发的市场， 但截至 2026 年 5 月仍没有已确认的 Fortune 500
              客户。美国管线主要由 SI 管理，且公开层面未确认， 这给承保美国扩张的投资人带来重大估值不确定性。

              Berkshire Grey 在 SPAC 后的经历，是一个有启发性的反向类比：仓库自动化客户爬坡常因部署复杂、 预算延期和单个客户设施的集成挑战而低于预测。6–18 个月的长企业销售周期会削弱短期收入可预测性，
              尤其当 Mujin 试图通过 SI 渠道加速美国和欧洲市场开发，而这些渠道自己也还在建设 Mujin 专属部署 能力时。实施延期和 WMS 集成复杂度，会制造一种客户关系压力；它未必出现在公开案例研究里，却是
              产品结构中内生存在的风险。
