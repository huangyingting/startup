      - number: '5.5'
        title: 产品路线图、差异化与技术风险
        blocks:
          - type: paragraph
            body: >
              Mujin 的差异化建立在三根较耐久的技术支柱上：（1）源自 OpenRAVE 的运动规划引擎，沉淀了 十多年优化和生产环境打磨；（2）与规划器共同设计的数字孪生，追求紧密的实时保真度；（3）在 OEM
              机器人接口层保持硬件无关，避免客户被任何单一机器人厂商锁定。三者合起来形成切换成本： 一旦 MujinOS 接入客户的 WMS/ERP 工作流，替换难度很高。

              近期路线图只能看到一部分。QuickBot 于 2023 年商业发布，让 Mujin 进入快速部署细分市场。 ProMAT 2025 的演示释放了继续投入美国市场、展示新能力的信号。2024 年 12 月的
              NTT 联盟是 最关键的战略信号：双方目标是开发用于操作任务的物理 AI 基础模型，这可能让平台的泛化能力 跳出预建模任务工作流。不过，除联盟公告外，NTT 联盟的交付物和时间表没有公开细节。

              风险端，边缘优先架构会增加部署复杂度，长期可能被云原生竞争者压低门槛。混合 AI 路线—— 物理规划叠加学习型感知——需要持续维护机器人和场景模型，也会增加集成开销。公开来源中没有 2026
              年及以后路线图文件；路线图内容只能从合作公告、会议演示和招聘信息推断。行业分析师评论 将 RaaS（Robotics-as-a-Service）包装称为 Mujin 未来可能的商业模式，但公司尚未公开确认。
              技术债风险中等：OpenRAVE 代码库是开源且老化的，上游项目活跃度下降后，Mujin 不得不维护 自己的 fork。
