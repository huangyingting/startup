  - id: FV003
    title: 融资历史时间线
    type: timeline
    layout: standard
    summary: |
      时间线覆盖 Mujin 从创立到最近已知资本事件（2024 年 12 月 NTT 联盟）的外部融资历史，其中既有已确认事项，也有估计项。
    data:
      items:
        - label: 2011：Rosen Diankov 与 Issei Takino 在东京创立公司
        - label: ~2016：Series A 轮 — iSGS Investment Works（ITOCHU Group CVC），金额未披露
        - label: ~2019：Series B 轮 — WiL（World Innovation Lab），估计 $20–30M
        - label: 2022-09：Series C 轮 — $85M，JAFCO Asia 领投（共同投资方未披露）
        - label: 2022–2024：27 个月融资沉默期（未确认公开股权融资事件）
        - label: 2024-12：NTT 资本联盟 — 战略投资，条款未披露
