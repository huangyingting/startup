      - number: '6.3'
        title: 客户采用轨迹与增长信号
        blocks:
          - type: paragraph
            body: >
              Mujin 的采用轨迹符合企业工业软件常见的“先落地、再扩张”模式：先用单单元试点验证技术和商业 价值，再走向全站多单元部署，最终在同一客户组织内跨站点扩张。Logisteed 最能体现这一模式：
              它从单一设施的试点部署扩展到多个站点自动化。企业从初次接触到生产部署的典型销售周期估计为 6–18 个月，反映出 MujinOS 接入既有 WMS 和 ERP 系统的集成复杂度，以及数字孪生调试上线的要求。

              按地域看，采用轨迹始于日本（pre-2018），随后随 JD.com 扩展到中国（2019–2020），近年又通过 Accenture、MHS 和 Tompkins Robotics
              等系统集成商合作瞄准美国。美国渠道策略与日本模式根本 不同：在日本，Mujin 与企业客户直接销售，并能借助本土市场声誉；在美国，系统集成商是客户发现、 范围界定和部署的主要中介。北美这种依赖 SI
              的模式拉长了收入兑现周期，但也让 Mujin 立即接入 既有物流客户关系。

              2023 年商业发布的 QuickBot，是 Mujin 有意加速中端市场物流运营商采用曲线的产品，尤其面向 日本市场；这些客户过去很难承受完整 MujinOS 集成所需的 6-18
              个月部署周期。QuickBot 通过预配置 运动参数并提供即插即用拆垛自动化，把目标市场扩展到 Mujin 传统大型企业客户之外。日本物流市场
              也在结构上有利于自动化继续渗透：长期劳动力短缺这一人口结构趋势，让物流运营商持续承压，必须用 机器人替代人工托盘搬运。
