      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              仓储和制造自动化市场有复杂的三层采购结构。付款方（预算持有人）通常是大型物流 / 制造企业的首席供应链官 （CSCO）、运营副总裁或资本投资委员会——交易金额从单个机器人工作站的 $500K 到多工作站部署的
              $5M+ 不等。用户是仓库运营经理、自动化工程师和系统集成商，他们日常使用 MujinOS。把关方包括 IT 安全团队 （负责云 / OT 集成）和机器人安全工程师（负责 CE/UL 认证合规）。Mujin
              的主要买方分层包括：（1）大型 电商和零售 DC（配送中心）——最大单一分层，由 SKU 激增和订单量波动推动，对柔性自动化需求最强； （2）快速消费品（FMCG）制造商——面向 CPG
              企业的码垛和拆垛自动化；（3）第三方物流（3PL）服务商—— 多客户、多 SKU 环境，机器人灵活性价值最高；（4）汽车一级供应商和 OEM 供应商——面向零部件套料的
              料箱拣选；（5）食品和饮料分销商——面向生鲜物流的拆垛。典型采用路径是：单工作站试点 → 单站点扩张 → 企业级多站点许可。系统集成商（Accenture、MHS、Tompkins
              Robotics）是关键渠道伙伴，通常会发起 买方关系。日本是 Mujin 本土市场，也是参考客户密度最高的地区；美国是目标中的下一个大型增长市场， 欧洲仍处于早期扩张阶段。
