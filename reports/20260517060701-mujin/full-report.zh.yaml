  - id: FU001
    title: 客户旅程图
    type: flow
    layout: standard
    summary: >
      Mujin 客户触达通常从贸易展（ProMAT、LogiSYM）、行业媒体或系统集成商转介开始。随后进入技术评估和 RFP，由客户物流工程团队或外部 SI 牵头。SI 介入并完成场地评估后，先部署单单元试点，并在 30-90
      天内按吞吐量和错误率目标验证。试点跑通后转为全场扩张订单，推进到多单元生产部署。单位经济性良好的客户会继续多站点扩张，Logisteed 和 JD.com 已体现这一点。首次接触到投产的典型周期为 6-18
      个月；每新增一个设施，多站点扩张再增加 6-18 个月。
    data:
      nodes:
        - label: 市场认知（展会 / 媒体 / SI 转介）
          detail: 客户物流团队通过 ProMAT、LogiSYM Japan、行业媒体，或 Accenture、MHS、Tompkins 等 SI 伙伴转介，了解到 Mujin
        - label: 技术评估与 RFP
          detail: 内部物流和 IT 团队按需求评估 MujinOS；正式发出 RFP；大型企业通常评估 4-8 周
        - label: 系统集成商介入
          detail: 指派 Mujin 认证 SI（美国为 Accenture、MHS、Tompkins；日本为直销）界定部署范围；评估设施和 WMS 集成
        - label: 单单元试点部署
          detail: 一个机械臂 + MujinOS 部署在真实设施中；完成数字孪生调试；测试 WMS 集成；验证期 30-90 天
        - label: 试点验证与商业案例签批
          detail: 客户将吞吐量、错误率和正常运行时间数据与基线对比；内部 ROI 方案获批；试点成功后才触发全场订单
        - label: 全场扩张订单
          detail: 客户为完整生产场站采购多单元部署；SI 界定 WMS 集成、硬件采购和安装计划
        - label: 多单元生产部署
          detail: 全设施部署完成；MujinOS 集群管理器协调多台机械臂和 AMR；WMS 集成在生产环境运行
        - label: 多站点 / 新设施扩张
          detail: 客户基于已验证 ROI 为更多站点复购；Logisteed 和 JD.com 有多站点扩张记录；单站点销售周期缩短
      edges:
        - from: Market awareness (trade show / press / SI referral)
          to: Technical evaluation and RFP
        - from: Technical evaluation and RFP
          to: System integrator engagement
        - from: System integrator engagement
          to: Single-cell pilot deployment
        - from: Single-cell pilot deployment
          to: Pilot validation and business case sign-off
        - from: Pilot validation and business case sign-off
          to: Full-site expansion order
        - from: Full-site expansion order
          to: Multi-cell production deployment
        - from: Multi-cell production deployment
          to: Multi-site / new facility expansion
    claimRefs:
      - CU009
      - CU014
      - CU015
      - CU021
