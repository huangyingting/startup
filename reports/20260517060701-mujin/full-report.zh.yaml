  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Mujin 在仓储和制造自动化技术栈的四个不同层级竞争，每一层都有不同的既有玩家和新兴威胁。第一层是 OEM 机器人控制软件层——与工业机器人硬件捆绑的专有软件包（Fanuc ROBOGUIDE、KUKA
              WorkVisual、 ABB RobotStudio、Yaskawa MotoSim）。按装机基础看，这些是 Mujin 最大、最根深蒂固的竞争对手， 因为每家大型机器人 OEM
              都随硬件交付自有控制软件，客户默认使用。第二层是专业 AI 拣选软件层——专注 于单件拣选、拆垛和料箱拣选中的 AI 驱动抓取与操作（Covariant 现已被 Amazon 收购、Osaro、Fizyr、
              Pickle Robot）。第三层是更宽的仓储自动化平台层——构建全栈或近全栈自动化系统的公司（Symbotic、 Dematic、Honeywell Intelligrated）。第四层是新兴通用机器人 OS
              / 平台层——Alphabet 旗下 Intrinsic 以及类似基础模型机器人公司，它们试图打造通用机器人软件平台。

              Mujin 的差异化定位，是一个不绑定硬件的全栈机器人智能平台，在单一集成系统里处理运动规划、感知、数字 孪生和机群编排。没有单一直接竞争对手能以同样广度的用例（单件拣选、料箱拣选、码垛、拆垛、机群管理）
              和已验证的多 OEM 硬件兼容性复制这套全栈能力。不过，每一层竞争都是真实威胁：对于已拥有 Fanuc/KUKA 机器人的终端用户，OEM 软件几乎没有额外成本；Amazon 收购 Covariant，把 AI
              拣选能力带入一个超大规模 物流运营商内部；Intrinsic 则有来自 Alphabet 的近乎无限资本，足以打造竞争性机器人 OS。
