  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与 IP 风险
        blocks:
          - type: paragraph
            body: >
              Mujin 的核心技术护城河建立在确定性运动规划引擎上。该引擎最初源自 OpenRAVE 开源规划框架， 由联合创始人 Rosen Diankov 在 Carnegie Mellon University
              开发。虽然 MujinOS 在十五年里已被 大幅扩展并产品化，但底层算法谱系仍可追溯到开源研究。这制造了潜在 IP 风险：随着机器人领域在 学术文献和开源实现中记录类似运动规划技术，Mujin
              将其规划核心作为自研 IP 防御的空间会变窄。 竞争者可以主张，基于采样的规划器和碰撞检测流水线属于现有技术或已被广泛披露，从而压缩可执行 IP 保护的范围。

              更直接的技术风险来自基于神经网络的运动规划器。Covariant、Intrinsic（Google DeepMind 子公司） 和 Boston Dynamics AI Institute 正在开发 AI
              原生的抓取和操作系统，这些系统学习物理先验，而 不是依赖手工构建的几何模型。在训练数据充足的非结构化 SKU 环境中，神经方法可能越过 Mujin 的 确定性规划器；这恰好是 Mujin
              在物流中核心可服务市场——高混合、高速度拣选任务。若神经运动规划 到 2027–2028 年在吞吐量和可靠性上追平确定性规划器，Mujin 的竞争护城河会明显收窄。

              此外，机器人行业转向开源控制器平台，也构成结构性威胁。Google 旗下 Intrinsic 已在 ROS2 之上 建立商业机器人 OS，为任意 OEM 硬件提供企业支持和集成服务，直接竞争 MujinOS
              作为硬件无关控制层 的价值主张。若 Intrinsic 平台在企业物流客户中获得市场牵引，MujinOS 的独特性认知可能被削弱。 Mujin 在日本的专利组合（可通过 J-PlatPat
              检索）覆盖特定数字孪生和运动规划实现，但尚未在对抗性 IP 纠纷中公开经受检验，其可执行性仍未确认。
            claimRefs:
