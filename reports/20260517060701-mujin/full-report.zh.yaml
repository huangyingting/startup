      - number: '4.4'
        title: 资本充足性与现金跑道评估
        blocks:
          - type: paragraph
            body: >
              Mujin 的资本充足性轮廓由一笔已确认的大额融资定义——JAFCO Asia 领投、September 2022 完成的 $85M Series C——随后到 May 2026 已有 44
              个月没有任何已确认股权融资事件。包括约 2016 年 iSGS Investment Works 参与的 Series A、约 2019 年 WiL（World Innovation Lab）参与的 Series
              B 在内，累计外部融资估计 为 $120–150M；这两轮均未公开披露金额。

              按估计每月 $3–7M 的烧钱速度——对应一个 150–250 人组织，运营日本总部、Georgia 美国业务，以及中国和 Netherlands 国际办公室——$85M Series C 自交割起可提供约
              12–28 个月现金跑道。Series C 交割后已过去 44 个月，Mujin 要么已经产生足够经营收入来实质抵消烧钱，意味着 ARR 达到或超过 $30–50M 区间；要么已 消耗 Series C
              的大部分资金。December 2024 宣布的 NTT 资本联盟提供定性信用背书和分销渠道入口，但在 没有确认投资金额的情况下，不能量化为财务现金跑道延长。

              没有任何公开来源识别出 Series C（September 2022）与 NTT 联盟公告（December 2024）之间存在可转债、 过桥融资或二级股权交易证据。对于一家跨多地区运营的资本密集型公司，27
              个月沉默并不常见；这暗示 Mujin 可能比其不透明财务披露所显示的更能靠收入自我维持，或者也可能已经完成未公开披露的私下融资安排。
