      - number: '7.3'
        title: 运营与执行风险
        blocks:
          - type: paragraph
            body: >
              Mujin 的运营风险集中在三处：人才获取与留存、合作伙伴渠道依赖，以及部署执行复杂度。

              日本机器人和 AI 工程人才市场竞争非常激烈。Preferred Networks、SoftBank Robotics、FANUC 的 AI 研究部门和 Toyota Research
              Institute，都在争夺同一批运动规划、计算机视觉和机器人系统工程师。 Glassdoor 评价和公开招聘信号显示，Mujin 提供股权薪酬，但它所处的薪酬环境并不宽松：美国总部的
              超大规模云厂商（Amazon、Google）在日本设有工程中心，东京 AI 工程师可以从这些公司拿到很高薪酬。 持续人才流失——尤其是运动规划和 WMS 集成工程职能——会削弱 Mujin
              维持平台开发速度的能力。

              联合创始人兼 CEO Rosen Diankov 同时是公司对外形象、主要 IP 发明人和首席技术架构师，关键人物 集中度很高，构成单点故障风险。公开资料中没有发现任何继任计划或联席 CEO
              架构可以缓释这一风险。 如果 Diankov 离职、丧失履职能力或被其他事务分散注意力，可能引发投资人担忧、客户关系扰动和技术 路线图放缓，因此这是公司风险画像中严重性最高的人物依赖风险之一。

              在美国市场，Mujin 高度依赖 Accenture 作为主要系统集成商渠道，形成依赖风险：如果 Accenture 降低 机器人业务优先级、减少 Mujin 认证部署产能，或转向竞争自动化平台，Mujin
              北美管线会停滞，且短期 没有可行替代方案。Mujin 的 6-18 个月企业销售周期，叠加按设施定制数字孪生的调试复杂度，意味着 高曝光客户的部署失败或延期，可能带来与实际运营影响不成比例的负面报道。
