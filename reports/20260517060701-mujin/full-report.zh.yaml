      - number: '8.3'
        title: 融资历史与投资人画像
        blocks:
          - type: paragraph
            body: >
              Mujin 已确认的外部融资历史包含四个事件：约 2016 年由 iSGS Investment Works（ITOCHU Group CVC） 领投的 Series A，金额未披露；约 2019 年
              WiL（World Innovation Lab）参与的 Series B，二级市场 追踪机构估计为 $20–30M；2022 年 9 月由 JAFCO Asia 领投、共同投资人未披露的 $85M Series
              C；以及 2024 年 12 月与 NTT Corporation 达成的战略资本联盟，金额未披露。累计融资估计总计 $120–150M， 但 A 轮和 B 轮单轮金额仍未验证。投资人质量总体正面：JAFCO
              Asia 是日本聚焦的最大风险投资机构， 是可信的机构背书。WiL（World Innovation Lab）是专注推动日本科技公司全球化的美日跨境基金。 iSGS Investment Works
              是与日本大型综合商社 ITOCHU 相关的战略 CVC。NTT 的战略联盟是迄今质量 最高的企业信号。关键缺口是所有轮次都完全没有披露投后估值。来自二级市场数据库（Crunchbase、
              PitchBook、Tracxn）的行业估计，将 Mujin 的隐含估值放在 $300M–$1B，但这些估计来自可比轮次推断， 不是任何一手来源确认。Series C 结束到 NTT 公告之间沉默 27
              个月，体现出显著财务不透明；公开记录中 没有出现过桥票据、可转工具或二级交易。
