      - number: '2.5'
        title: 规模估计矛盾与尽调缺口
        blocks:
          - type: paragraph
            body: >
              投资人应标记四项重要的市场规模和采用尽调缺口。第一，分析师对「仓储自动化市场」到 2030 年的估计 从 $17B 到 $65B+ 不等，跨度
              3.8×，反映的是定义分歧，而非真实不确定性——任何单一数字都必须追问口径。 第二，Mujin 的 SAM（机器人智能软件）没有清晰的分析师估计；最好的替代指标是「仓库管理软件」或
              「仓储自动化软件」子板块，但分析师对这些板块的规模估计也不一致。第三，IFR（International Federation of Robotics）记录显示，中国在 2024 年部署了全球 54%
              的工业机器人，并拥有 2M+ 台运行中设备；日本 是第二大市场。这给 Mujin 在本土市场（日本和中国自 2010 年代早期起部署）带来结构性优势，但也意味着 Mujin 最大增长机会（美国 /
              欧洲）的机器人密度更低，需要更多市场教育。第四，单件拣选机器人是增长最快 的子板块，Mordor Intelligence 给出的 CAGR 为 15.27%；这一复杂产品类别中，Mujin 与专业玩家竞争
              （Pickle Robot、现已并入 SoftBank Robotics 的 Berkshire Grey），而 Mujin 在该细分市场的份额未知。
