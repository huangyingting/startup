      - number: '7.2'
        title: 市场与竞争风险
        blocks:
          - type: paragraph
            body: >
              Mujin 所处竞争格局上下同时加压：上方是硬件 OEM 向软件扩张，下方是 AI 原生创业公司提供神经网络
              替代方案。日本和全球传统硬件厂商——FANUC、Yaskawa、ABB、KUKA——都在投入自有软件和控制层， 包括云连接平台和开放机器人 API，在控制器集成层直接与 MujinOS 竞争。FANUC 的
              FIELD System 和 Yaskawa 的 MOTOMAN 平台正向云化控制软件扩展，削弱 Mujin 相对硬件原生控制器栈过去提供的集成 复杂度优势。

              在北美市场，Amazon Robotics 和 Symbotic 是垂直整合竞争者，已搭建深嵌入自身硬件平台的自研软件 栈。这些玩家不争夺第三方部署，但实际上把大型企业物流客户（Amazon
              自身、Walmart）从 Mujin 的 可服务市场中移走。Berkshire Grey 在 SPAC 后崩塌——市值从超过 $1.5 billion 的峰值跌至近乎归零——
              说明仓库自动化公司若不能足够快地分散客户基础，就很难支撑增长预测，集中风险会直接暴露。

              Dobot、Rokae、Flexiv 等中国机器人厂商，正以显著低于西方和日本既有厂商的价格提供运动规划和控制 软件，瞄准新兴市场物流运营商，也可能在 Mujin 已建立的日本和中国市场施加价格压力。若中国机器人
              平台在技术上继续成熟，Mujin 中国收入——目前估计占总收入 15-20%——中期可能面临商品化定价压力。 仓库自动化控制器软件市场尚未商品化，但平台整合和硬件捆绑软件的趋势，威胁 Mujin 长期维持溢价
              定价的能力。
            claimRefs:
