    title: 风险因素树
    type: flow
    summary: |
      结构性风险传导图，显示 Mujin 各个风险因素如何级联为技术护城河侵蚀和收入威胁。神经 AI 抓取和开源平台共同指向护城河侵蚀；地缘政治、人才、财务和渠道风险则推高收入暴露。
