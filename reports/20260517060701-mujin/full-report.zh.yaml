      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              仓储自动化采用最强的宏观驱动因素，是美国、欧洲和日本制造与物流行业的结构性劳动力短缺。美国劳动力 市场数据持续显示，仓储和物流岗位最难填补；日本劳动力老龄化则使自动化上升为国家政策层面的刚需。
              电商增长永久推高了包裹量和 SKU 组合复杂度，拉动能够处理可变商品流的柔性自动化需求，而不是旧式固定 输送线自动化。各地区最低工资和人工成本上升改善了自动化 ROI 测算；高吞吐量场景下常常能在 3 年内回本。
              COVID 之后的供应链韧性担忧，也让自动化作为风险缓释工具加速获得资本投入。从 capex 转向 opex （订阅 / RaaS 模式）降低了采用摩擦，因为资本门槛被移除。

              关键约束包括：（1）资本强度——机器人工作站每次部署通常成本 $500K–$2M+，低吞吐量或高度波动场景下 ROI 不确定；（2）集成风险——用新机器人工作站改造旧有仓库基础设施，需要大量 OT/IT
              集成能力，带来 实施风险；（3）自动化工程人才短缺；（4）监管碎片化——日本（JARA、JIS）、欧洲（CE、ISO/TS 15066）
              和美国（OSHA、RIA）的机器人安全标准不同，推高合规成本；（5）既有投入阻力——3PL 运营商和大型物流 公司在旧有自动化上已有沉没成本，不愿替换仍可运转的基础设施。Mujin 的无代码 MujinOS
              正是针对技能 短缺约束：它消除了机器人编程专业能力需求，是对市场约束 #3 的直接回应。
