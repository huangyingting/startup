  - id: FR002
    title: 风险时间线
    type: timeline
    summary: |
      按时间顺序梳理 Mujin 从中国扩张到 EU AI Act 合规截止期的关键风险暴露里程碑，展示地缘政治和技术风险如何在运营历史中累积。
    data:
      items:
        - label: JD.com 中国部署（2019）
          detail: 进入中国市场带来持续的地缘政治和出口管制暴露
          tone: warning
        - label: OpenRAVE IP 转向（2021）
          detail: ROS2 和开源机器人生态加速；Mujin 的 IP 来源脉络更可见
          tone: warning
        - label: Series C 融资 $85M（Sep 2022）
          detail: 上次已知外部融资；现金跑道计时开始；机器人 IPO 市场开始降温
          tone: neutral
        - label: Intrinsic 发布 ROS2 平台（2023）
          detail: Google 的 Intrinsic 进入开放机器人 OS 市场；直接挑战 MujinOS 价值主张
          tone: warning
        - label: Covariant 神经抓取商业化（2023）
          detail: AI 原生运动规划进入商业部署；竞争护城河压力上升
          tone: warning
        - label: 美国 BIS 扩大 AI 出口管制（Oct 2023）
          detail: BIS 收紧对中国 AI 软件和先进计算出口的限制
          tone: risk
        - label: NTT 战略合作（Dec 2024）
          detail: NTT 合作宣布；释放部分财务信号，但金额未披露
          tone: neutral
        - label: EU AI Act 高风险条款生效（Aug 2026）
          detail: EU AI Act Annex III 高风险 AI 截止期；Mujin 在欧盟部署需要符合性评估
          tone: risk
    claimRefs:
      - CR004
      - CR020
      - CR026
      - CR030
