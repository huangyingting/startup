      - number: '4.4'
        title: Capital Adequacy and Runway Assessment
        blocks:
          - type: paragraph
            body: >
              Mujin's capital adequacy profile is defined by a single confirmed large raise — the $85M Series C in
              September 2022 led by JAFCO Asia — followed by a 44-month period (to May 2026) without any confirmed
              equity financing event. Total cumulative external funding is estimated at $120–150M across all rounds,
              including a Series A from iSGS Investment Works circa 2016 and a Series B from WiL (World Innovation Lab)
              circa 2019, neither of which disclosed amounts publicly.

              At an estimated monthly burn rate of $3–7M per month — consistent with an organization of 150–250
              employees operating Japan headquarters, US operations in Georgia, and international offices in China and
              the Netherlands — the $85M Series C would provide approximately 12–28 months of runway from close. With 44
              months elapsed since the Series C close, Mujin must either be generating sufficient operating revenue to
              materially offset burn, implying ARR at or above the $30–50M range, or have consumed most of the Series C
              proceeds. The NTT capital alliance announced in December 2024 provides qualitative credibility and
              distribution channel access, but without a confirmed investment amount it cannot be quantified as
              financial runway extension.

              No evidence of a convertible note, bridge financing, or secondary equity transaction between the Series C
              (September 2022) and the NTT alliance announcement (December 2024) has been identified in any public
              source. This 27-month silence is unusual for a capital-intensive company operating across multiple
              geographies, and suggests that Mujin may be more revenue-self-sustaining than its opaque financial
              disclosures imply, or alternatively that private financing arrangements have been executed without public
              disclosure.
