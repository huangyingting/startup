  - id: FU001
    title: Customer journey map
    type: flow
    layout: standard
    summary: >
      A Mujin customer engagement typically begins with awareness through trade shows (ProMAT, LogiSYM), industry press,
      or system integrator referral. Technical evaluation and RFP follows, led by the customer's logistics engineering
      team or external SI. After SI engagement and site assessment, a single-cell pilot is deployed and validated
      against throughput and error-rate targets over 30-90 days. Successful pilots convert to full-site expansion
      orders, progressing to multi-cell production deployment. Multi-site expansion follows for customers with favorable
      unit economics, as seen with Logisteed and JD.com. The typical cycle from first contact to production is 6-18
      months; multi-site expansion adds another 6-18 months per additional facility.
    data:
      nodes:
        - label: Market awareness (trade show / press / SI referral)
          detail: >-
            Customer logistics team becomes aware of Mujin via ProMAT, LogiSYM Japan, industry press, or referral from
            Accenture, MHS, or Tompkins SI partners
        - label: Technical evaluation and RFP
          detail: >-
            Internal logistics and IT teams assess MujinOS against requirements; formal RFP issued; 4-8 week evaluation
            period typical for large enterprise
        - label: System integrator engagement
          detail: >-
            Mujin-certified SI (Accenture, MHS, Tompkins in US; direct sales in Japan) assigned to scope deployment;
            facility audit and WMS integration assessment
        - label: Single-cell pilot deployment
          detail: >-
            One robot arm + MujinOS deployed in live facility; digital twin commissioned; WMS integration tested; 30-90
            day validation period
        - label: Pilot validation and business case sign-off
          detail: >-
            Customer reviews throughput, error rate, uptime data versus baseline; internal ROI case approved; pilot
            success gates full-site order
        - label: Full-site expansion order
          detail: >-
            Customer purchases multi-cell deployment for full production site; SI scopes WMS integration, hardware
            procurement, and installation plan
        - label: Multi-cell production deployment
          detail: >-
            Full facility deployment complete; MujinOS fleet manager coordinates multiple arms and AMRs; live WMS
            integration in production
        - label: Multi-site / new facility expansion
          detail: >-
            Customer re-orders for additional sites based on demonstrated ROI; multi-site expansion documented for
            Logisteed and JD.com; reduces per-site sales cycle
      edges:
        - from: Market awareness (trade show / press / SI referral)
          to: Technical evaluation and RFP
        - from: Technical evaluation and RFP
          to: System integrator engagement
        - from: System integrator engagement
          to: Single-cell pilot deployment
        - from: Single-cell pilot deployment
          to: Pilot validation and business case sign-off
        - from: Pilot validation and business case sign-off
          to: Full-site expansion order
        - from: Full-site expansion order
          to: Multi-cell production deployment
        - from: Multi-cell production deployment
          to: Multi-site / new facility expansion
