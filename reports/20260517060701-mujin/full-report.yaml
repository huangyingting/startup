      - number: '1.4'
        title: Company Milestones
        blocks:
          - type: paragraph
            body: >
              Since founding in 2011, Mujin has progressed from a motion planning research spinout to an internationally
              operating robotics platform company. Early milestones focused on Japan, where Mujin deployed some of the
              world's first fully autonomous bin-picking and palletizing solutions for major Japanese logistics and
              automotive customers including JD.com's China operations and Nichirei Logistics. The company opened its
              China office (Mujin Shanghai) to serve Chinese manufacturing and e-commerce logistics markets. In 2022,
              Mujin opened its first North American office in Sandy Springs, Georgia, staffing engineering, sales, and
              support. The $85M Series C funded further international expansion, including the opening of a European
              headquarters in the Netherlands. In December 2024, Mujin signed a capital and business alliance with NTT
              and NTT Docomo Business to accelerate physical AI and autonomous robotics across manufacturing and
              logistics, combining NTT's telecoms/cloud/AI infrastructure with Mujin's MujinOS and digital-twin
              technology. In 2025, Mujin launched QuickBot (QB), a comprehensive quick-deployment depalletizing robot
              cell designed to simplify warehouse receiving automation. By 2026, Mujin offers six primary automation
              applications (palletizing, depalletizing, bin picking, piece picking, fleet manager, robotic case picking)
              and is exhibiting at MODEX 2026 in Atlanta.
