  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology and IP Risks
        blocks:
          - type: paragraph
            body: >
              Mujin's core technology moat rests on its deterministic motion planning engine, originally derived from
              the OpenRAVE open-source planning framework developed by co-founder Rosen Diankov at Carnegie Mellon
              University. While MujinOS has been substantially extended and productized over fifteen years, the
              underlying algorithmic lineage is traceable to open-source research. This creates latent IP risk: as the
              robotics field documents similar motion planning techniques in academic literature and open-source
              implementations, Mujin's ability to defend its planning core as proprietary IP narrows. Competitors could
              argue that sampling-based planners and collision-checking pipelines are prior-art or widely disclosed,
              reducing the scope of enforceable IP protection.

              The more immediate technology risk comes from neural-network-based motion planners. Covariant, Intrinsic
              (Google DeepMind subsidiary), and Boston Dynamics AI Institute are developing AI-native grasping and
              manipulation systems that learn physical priors rather than relying on handcrafted geometric models. These
              neural approaches could leapfrog Mujin's deterministic planner in unstructured SKU environments where
              training data is abundant — precisely the high-mix, high-velocity picking tasks that represent Mujin's
              core addressable market in logistics. If neural motion planning reaches parity with deterministic planners
              in throughput and reliability by 2027–2028, Mujin's competitive moat narrows materially.

              Additionally, the robotics industry's pivot toward open-source controller platforms poses a structural
              threat. Google's Intrinsic subsidiary has built a commercial robotics OS on top of ROS2, offering
              enterprise support and integration services for any OEM hardware — directly competing with MujinOS's value
              proposition as a hardware-agnostic controller layer. If Intrinsic's platform achieves market traction
              among enterprise logistics customers, the perceived uniqueness of MujinOS could erode. Mujin's patent
              portfolio in Japan (searchable via J-PlatPat) covers specific digital twin and motion planning
              implementations, but has not been publicly tested in adversarial IP disputes, leaving its enforceability
              unconfirmed.
            claimRefs:
