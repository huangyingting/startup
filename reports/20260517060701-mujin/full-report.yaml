      - number: '5.4'
        title: Trust, Quality, and Compliance
        blocks:
          - type: paragraph
            body: >
              Mujin claims compliance with the principal industrial robot safety standards applicable to its target
              markets. In Europe, Mujin robot cells carry CE marking, which requires conformity with the EU Machinery
              Directive (2006/42/EC) and applicable harmonized standards including ISO 10218-1 (robot safety
              requirements — manipulating industrial robots, design and construction) and ISO 10218-2 (integration of
              industrial robots into systems). In Japan, JARA (Japan Robot Association) standards govern the design and
              deployment of industrial robots, and Mujin's Japanese origin means its primary engineering and
              certification baseline is JARA-aligned.

              Functional safety requirements under IEC 62061 (machinery safety — functional safety of safety-related
              electrical control systems) and ISO 13849 (safety of machinery — safety-related parts of control systems)
              are referenced by Mujin in the context of CE compliance, but no independent safety audit reports, TÜV
              certificates, or equivalent third-party validation documents have been identified in publicly available
              sources. Compliance is primarily company-claimed and corroborated indirectly by the fact that Mujin
              operates production deployments in regulated manufacturing and logistics environments without known
              incidents.

              No product recalls, OSHA citations, or reported serious incidents attributable to MujinOS have been found
              in publicly available sources, consistent with the low-frequency incident history typical of controlled
              warehouse robotics environments. ISO 9001 quality management certification is not confirmed publicly. The
              primary compliance diligence gap is the absence of public certification body records, safety audit
              summaries, or third-party test reports that would allow an independent investor to confirm the claimed
              CE/ISO status without direct engagement with Mujin or its system integrators.
