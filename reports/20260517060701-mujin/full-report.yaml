      - number: '2.2'
        title: Market Sizing (TAM / SAM / SOM)
        blocks:
          - type: paragraph
            body: >
              Multiple analyst estimates exist for warehouse and industrial automation markets, and they vary
              significantly based on definitional scope. Mordor Intelligence estimates the global warehouse automation
              market (broad definition, including hardware and software) at $29.98 billion in 2025, growing to $34.17
              billion in 2026 and $65.74 billion by 2031, at a 13.98% CAGR (2026–2031). Precedence Research sizes the
              same market at $25.27 billion in 2025, reaching $107.36 billion by 2035 at a 15.56% CAGR.
              MarketsandMarkets uses the slightly broader "automated material handling equipment" (AMHE) category at
              $33.39 billion in 2025, growing to $51.22 billion by 2030 at an 8.9% CAGR. Grand View Research sizes the
              narrower "warehouse robotics" sub-market at $4.31 billion in 2022, projecting it to reach $17.29 billion
              by 2030 at a 19.6% CAGR. These divergences reflect definitional differences: broader studies include
              conveyors, ASRS, WMS and packaging automation; narrower studies focus on robot hardware only. Interact
              Analysis characterizes the market more qualitatively as one that will "double by 2028," consistent with
              the 13–20% CAGR estimates above.

              Mujin's serviceable addressable market (SAM) is the intelligent robot software and control platform layer
              on top of articulated robot arms in warehouse and manufacturing environments. Using industry convention of
              software representing 15–20% of the warehouse automation market, SAM is estimated at $3.7–6.8 billion in
              2026 (software slice of $25–34B total market). Mujin's serviceable obtainable market (SOM) in 2026 is
              constrained by its current geographic footprint (Japan, US, Netherlands, China), robot OEM partner
              relationships, and the requirement for highly skilled implementation teams. An extremely conservative SOM
              estimate anchors to current traction in Japan and nascent US/EU presence—likely $200–500M in near-term
              opportunity.
