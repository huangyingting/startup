      - number: '6.3'
        title: Customer Adoption Trajectory and Growth Signals
        blocks:
          - type: paragraph
            body: >
              Mujin's adoption trajectory follows a land-and-expand pattern typical of enterprise industrial software:
              initial single-cell pilots that validate the technology and business case, followed by full-site
              multi-cell deployments, and ultimately multi-site expansion within the same customer organization. This
              pattern is evidenced most clearly by Logisteed, which expanded from a pilot deployment in a single
              facility to automation across multiple sites. The typical enterprise sales cycle from initial engagement
              to production deployment is estimated at 6–18 months, reflecting the integration complexity of connecting
              MujinOS to existing WMS and ERP systems and the commissioning requirements for the digital twin.

              Geographically, the adoption trajectory begins in Japan (pre-2018), extends to China with JD.com
              (2019–2020), and more recently targets the United States via system integrator partnerships with
              Accenture, MHS, and Tompkins Robotics. The US channel strategy differs fundamentally from the Japan model:
              in Japan, Mujin has direct enterprise sales relationships and can leverage its home-market reputation; in
              the US, system integrators serve as the primary intermediary for customer discovery, scoping, and
              deployment. This SI-dependent model in North America creates a longer time-to-revenue but also provides
              immediate access to established logistics customer relationships.

              QuickBot, commercially launched in 2023, represents a deliberate acceleration of the adoption curve for
              mid-market logistics operators — particularly in Japan — who previously could not absorb the 6-18 month
              deployment timeline of full MujinOS integration. By pre-configuring motion profiles and offering
              plug-and-play depalletizing automation, QuickBot targets a broader addressable market beyond Mujin's
              traditional large-enterprise customer segment. The Japan logistics market is also structurally favorable
              for continued automation adoption, as the country's chronic labor shortage — a structural demographic
              trend — places logistics operators under sustained pressure to replace manual pallet-handling labor with
              robotics.
