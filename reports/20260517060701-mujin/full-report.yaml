      - number: '7.5'
        title: Regulatory and Geopolitical Risks
        blocks:
          - type: paragraph
            body: >
              Mujin faces a multi-jurisdictional regulatory environment that has grown substantially more complex since
              its Series C in 2022. The most acute near-term risk is US export control exposure. The Bureau of Industry
              and Security (BIS) at the Department of Commerce has progressively expanded its Entity List and Commerce
              Control List (CCL) to cover advanced robotics software, AI algorithms, and related computing components.
              While Mujin has not been specifically named on the Entity List, its China customer operations — including
              the JD.com and Cainiao deployments — involve the transfer of sophisticated motion planning software to
              Chinese entities. Any BIS interpretation that MujinOS falls under EAR-controlled software categories
              (e.g., Category 4 computer software relevant to industrial production or AI military end-use concerns)
              could create a licensing obligation or restriction affecting China business continuity.

              The European Union's AI Act (Regulation 2024/1689), passed in May 2024 and entering progressive compliance
              deadlines through 2026-2027, classifies certain AI-enabled industrial robotic systems as high-risk
              applications requiring conformity assessments, technical documentation, and ongoing monitoring. Mujin's
              ML-assisted motion planning features in MujinOS — which learn task profiles and adapt to new SKUs — may
              fall under the EU AI Act's high-risk classification if deployed in EU-regulated industrial contexts,
              creating compliance costs and potential delays in European expansion.

              Japan's robot safety standards (JIS B 8433, aligned with ISO 10218) require conformance testing for
              collaborative robot deployments. These standards are well-established and Mujin's deployments appear to
              operate within them, but evolving standards for AI-assisted collaborative robots could require
              re-certification of existing deployments. US-China geopolitical tensions create ongoing uncertainty for
              Mujin's dual-geography operations: a broad-based trade decoupling or technology-specific sanctions could
              force Mujin to operationally separate its Japan/US and China businesses, carrying significant
              reorganization cost and customer relationship risk.
