      - number: '1.5'
        title: Risk Signals and Information Gaps
        blocks:
          - type: paragraph
            body: >
              Several material adverse signals merit investor attention. First, Mujin operates as a fully private
              company with no published financial statements—revenue, gross margin, burn rate, customer count, and ARR
              are all undisclosed and must be obtained through private diligence. Second, the $1B valuation is reported
              through secondary sources and has not been confirmed by any regulatory filing or independent auditor; the
              Series C announcement date itself shows conflicting signals across reputable sources (2022 vs. 2023),
              suggesting the company may have conducted a multi-tranche or delayed close. Third, the TechCrunch tag page
              for Mujin shows essentially no organic tier-1 technology media coverage despite the company's
              self-described "fastest-growing" status in Japan, which could reflect limited Western market penetration
              rather than real-market traction. Fourth, key-person concentration risk around Dr. Diankov is material—he
              is the creator of OpenRAVE (on which much of the platform rests), primary external spokesperson, and
              technical lead; departure or incapacitation would pose significant business continuity risk. Fifth,
              competition from well-capitalized rivals (Symbotic with ~$1B+ revenue run rate, Locus Robotics, Pickle
              Robot, and native-intelligent platforms from Fanuc, KUKA, ABB) may constrain margin and market share
              expansion outside Japan.
