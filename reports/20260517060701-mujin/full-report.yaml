      - number: '4.2'
        title: Pricing and Monetization Architecture
        blocks:
          - type: paragraph
            body: >
              Mujin's commercial structure follows a multi-component enterprise pricing architecture typical of
              industrial automation software platforms: an upfront or staged software platform license fee, annual
              maintenance and support fees, and project-based professional services fees covering integration,
              commissioning, and training. This structure differs from pure SaaS subscription models in that deployment
              complexity and hardware-specific customization require material professional services investment, making
              each customer engagement partly project-revenue and partly recurring-software-revenue in the same contract
              cycle.

              Estimated typical enterprise contract sizes range from $500K to $3M based on competitor proxy data
              (Symbotic's disclosed contract characteristics and Pickle Robot's RaaS pricing disclosures) and analyst
              inference. A standard Mujin engagement for a single-facility warehouse or manufacturing site would likely
              include: an initial platform license of $200K–$800K; professional services for integration and digital
              twin commissioning of $200K–$2M; and annual maintenance fees of $50K–$200K per year. Multi-site expansion
              creates annual recurring revenue growth as each additional deployment generates incremental license and
              maintenance fees without proportional cost increase, improving blended margins over time.

              Mujin primarily transacts through system integrator (SI) channels rather than direct enterprise sales,
              with Accenture serving as the primary US partner and various Japanese SIs handling the Japan market. This
              channel-led model reduces Mujin's direct sales costs but creates dependency on SI partner incentives and
              capacity, and introduces margin sharing that may limit realization of listed contract value. No list
              pricing, channel economics, or confirmed realized contract values have been disclosed in any public
              announcement or filing.
