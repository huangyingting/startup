      - number: '8.3'
        title: Funding History and Investor Profile
        blocks:
          - type: paragraph
            body: >
              Mujin's confirmed external financing history comprises four events: Series A circa 2016 led by iSGS
              Investment Works (ITOCHU Group CVC), amount undisclosed; Series B circa 2019 with WiL (World Innovation
              Lab), estimated $20–30M by secondary market trackers; Series C of $85M in September 2022, led by JAFCO
              Asia with undisclosed co-investors; and a strategic capital alliance with NTT Corporation in December
              2024, amount undisclosed. Cumulative funding is estimated at $120–150M total, though individual round
              amounts for the A and B remain unverified. The investor quality is generally positive: JAFCO Asia is the
              largest Japan-focused venture capital firm and a credible institutional validator. WiL (World Innovation
              Lab) is a US-Japan cross-border fund focused on globalizing Japanese technology companies. iSGS Investment
              Works is a strategic CVC associated with ITOCHU, a major Japanese conglomerate. NTT's strategic alliance
              is the highest-quality enterprise signal to date. A critical gap is the complete absence of post-money
              valuation disclosure at any round. Industry estimates from secondary market databases (Crunchbase,
              PitchBook, Tracxn) place Mujin's implied valuation at $300M–$1B, but these are inferred from comparable
              rounds, not confirmed by any primary source. The 27-month silence between the Series C close and the NTT
              announcement represents significant financial opacity; no bridge notes, convertible instruments, or
              secondary transactions have surfaced in public record.
