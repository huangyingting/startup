      - number: '5.2'
        title: Workflow Coverage and Use Cases
        blocks:
          - type: paragraph
            body: >
              MujinOS is deployed across six primary warehouse and manufacturing use cases, each demanding a different
              configuration of the core modules. Piece picking — the extraction of individual items from bins, totes, or
              shelves — is the highest-complexity use case and the one most frequently cited by Mujin in customer case
              studies. It requires tight coupling between perception AI (for item identification and pose estimation),
              motion planning (for collision-free approach trajectories), and gripper selection logic. The system adapts
              at runtime when items shift position between picks without human reprogramming.

              Depalletizing (unloading inbound pallets at the receiving dock) is the target use case for QuickBot. By
              pre-configuring the motion profiles and vision parameters for a defined range of pallet configurations,
              QuickBot targets commissioning in days rather than months. Palletizing (building outbound shipping
              pallets) requires the additional capability of adaptive stack pattern planning, since weight distribution
              and overhang constraints vary by SKU. Bin picking in manufacturing serves automotive and industrial
              customers handling loose, unoriented metal parts or castings from bins.

              Mixed-case picking serves e-commerce warehouses that must pick a heterogeneous assortment of items per
              order, a task requiring rapid SKU recognition and cycle-time-per-item management. Finally, fleet
              management coordinates multiple robot arms and AMRs across a warehouse or factory floor, handling task
              queuing, traffic arbitration, and exception escalation. Across all use cases, MujinOS presents the same
              no-code operator interface — system integrators configure workflows visually without writing
              robot-specific code. Integration with SAP, Blue Yonder, and Oracle ERP/WMS systems is documented and
              production-deployed at major customers including Amazon Japan facilities.
