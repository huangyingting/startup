      - number: '8.4'
        title: Valuation Scenarios
        blocks:
          - type: paragraph
            body: >
              Three scenarios are defined for Mujin's enterprise value, each driven by specific assumptions about
              revenue trajectory, market multiple, and strategic execution. Bull case ($500–800M): Assumes Mujin
              converts its Amazon partnership, NTT channel, and European customer pipeline into $80M+ ARR by 2026-2027.
              US logistics market penetration at scale enables a 6–8x EV/Revenue multiple consistent with high-growth
              AI-adjacent industrial software. The NTT alliance serves as an enterprise channel for co-selling MujinOS
              across NTT's manufacturing clients. Multiple expansion is supported by AI/robotics sector tailwinds in
              2025-2026. Base case ($300–500M): Assumes Japan-concentrated revenue at $50–70M ARR with modest US and
              European expansion. A 4–6x multiple reflects a mid-cycle discount for Japan concentration, private status,
              and lack of public revenue validation. This is the probability-weighted central estimate for a structured
              secondary transaction or strategic M&A. Bear case ($150–250M): Assumes stagnant US market entry, market
              multiple compression to 2.5–3x (consistent with Symbotic's trough valuation and AutoStore's 2024 pricing),
              and an ARR ceiling of $40–50M from Japan and limited Asia expansion. The bear case is triggered by
              continued funding opacity, competitor displacement in Japan, or a sector market dislocation analogous to
              2022-2023.
            claimRefs:
              - CV022
