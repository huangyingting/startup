      - number: '6.2'
        title: Named Customer Proof and Case Study Depth
        blocks:
          - type: paragraph
            body: >
              Mujin's customer proof set is most deeply documented in Japan, where multiple official case studies are
              published on the company's website. Trusco Nakayama, the largest industrial tools and hardware distributor
              in Japan, deployed Mujin palletizing and depalletizing automation at its distribution centers. The
              deployment handles a diverse SKU mix including hardware, tools, and industrial consumables of varying
              weights and packaging formats — a technically demanding environment that validates the general-purpose
              nature of MujinOS beyond single-SKU workflows. Trusco's own corporate pages corroborate the partnership's
              existence and operational context.

              Logisteed Ltd. (rebranded from Hitachi Transport System in 2023) is one of Japan's five largest
              third-party logistics providers and is operating Mujin warehouse automation across multiple facilities.
              This multi-site expansion is the clearest evidence of a customer graduating from pilot to full commercial
              deployment and re-ordering for additional facilities. Logisteed's own investor relations and corporate
              communications confirm the company's significant investment in logistics automation as a strategic
              priority.

              Nichirei Logistics, Japan's dominant temperature-controlled logistics operator, deployed Mujin
              depalletizing automation in cold-chain facilities. The cold-chain context is notable because it requires
              reliable operation in sub-zero or refrigerated environments that can stress both hardware components and
              adhesive grippers — a deployment condition not typical in ambient-temperature warehouse automation. The
              Nichirei deployment represents meaningful environmental validation beyond standard ambient-temperature
              logistics.

              JD.com deployed Mujin piece-picking robots across its JD Logistics DC network in China, processing large
              daily volumes of mixed e-commerce items including small parcels, apparel, and consumer electronics.
              JD.com's scale — it operates one of the world's largest proprietary logistics networks — means this
              deployment represents Mujin's highest-volume publicly confirmed customer. All named deployments are
              production-grade, not proofs-of-concept, based on available case study descriptions and corroborating
              press coverage.
