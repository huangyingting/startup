  - id: TE002
    title: Workflow / use-case table
    columns:
      - Use Case
      - Customer Job
      - Mujin Solution
      - Measurable Benefit (Claimed)
      - Known Limitation
    rows:
      - - Piece Picking
        - Pick individual items from bins, totes, or shelves for order fulfillment
        - Perception AI (3D vision) + motion planning + gripper selection
        - Handles unstructured bins; adapts without reprogramming when items shift
        - Per-item cycle time varies significantly by SKU size, weight, and shape
      - - Depalletizing
        - Unload inbound pallets at receiving dock
        - QuickBot pre-configured cell; MujinOS perception + planning
        - Days-not-months commissioning; autonomous pallet pattern recognition
        - Best performance on defined pallet configurations; irregular mixed loads reduce speed
      - - Palletizing
        - Build outbound shipping pallets with mixed items
        - Adaptive stack planning; weight and dimension optimization
        - Reduces manual palletizing labor; optimizes pallet stability
        - Requires SKU dimension and weight data in WMS for optimal stacking
      - - Bin Picking
        - Pick loose, unoriented metal parts or castings from bins (manufacturing)
        - 3D vision on industrial bins; physics-based grasp planning
        - Handles random part orientations without bin organization
        - Performance degrades for highly reflective or transparent parts; CAD models beneficial
      - - Mixed-Case Picking
        - Pick heterogeneous order items from mixed-SKU inventory for e-commerce
        - Perception AI + fleet orchestration for high-SKU-count environments
        - Supports high-SKU environments without per-item programming
        - Per-item cycle time constraints limit throughput for very small or fragile items
      - - Fleet Management
        - Coordinate multiple robot arms and AMRs across a facility
        - Fleet Manager orchestration; task queuing, traffic arbitration, exception handling
        - Unified control across heterogeneous fleets reduces coordination overhead
        - AMR vendor compatibility not fully disclosed; tested scale not public
    claimRefs:
