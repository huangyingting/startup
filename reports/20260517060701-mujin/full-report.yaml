chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Mujin, Inc. is a Japanese industrial robotics software and hardware company headquartered in Tokyo, Japan.
              Founded on March 30, 2011, by Dr. Ross (Rosen) Diankov and Issei Takino, Mujin develops what it calls the
              global standard for intelligent robotics: a unified no-code software platform called MujinOS that enables
              industrial robots from any manufacturer to perform complex factory and warehouse automation tasks without
              direct programming. The company's Japanese legal entity was incorporated as Mujin K.K. (株式会社Mujin), with
              the US subsidiary operating as Mujin Corporation based in Sandy Springs, Georgia (north of Atlanta).

              The core business model is B2B enterprise software + hardware integration. Mujin licenses the MujinOS
              platform to system integrators and end-users who deploy it on top of industrial robot arms from Fanuc,
              Kawasaki, Mitsubishi, Yaskawa Motoman, Universal Robots, and others. MujinOS provides real-time motion
              planning, 3D perception, and a continuously-updating digital twin of the facility—enabling robots to adapt
              to changing conditions without reprogramming. Revenue sources include platform licensing, professional
              services, and hardware bundles such as QuickBot (a quick-deployment depalletizing robot cell). As of 2026,
              Mujin positions itself as an OS-level enabler of the warehouse automation ecosystem rather than a
              robot-arm OEM, competing for the software and intelligence layer in a market that includes Symbotic,
              Pickle Robot, and in-house robot intelligence platforms from major industrial OEMs.
