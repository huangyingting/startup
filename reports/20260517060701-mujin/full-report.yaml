  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              Mujin operates at the intersection of three overlapping market segments: (1) the broader warehouse and
              logistics automation market, which includes all hardware and software deployed to automate intralogistics
              operations; (2) the warehouse robotics market, limited to articulated robot arms, mobile robots
              (AMRs/AGVs), and specialized robot cells used in warehouse settings; and (3) the intelligent robot
              software and control platform market, Mujin's most direct addressable segment. The total warehouse
              automation market (TAM lens 1) encompasses automated storage and retrieval systems (ASRS), conveyor and
              sortation systems, autonomous mobile robots (AMRs), industrial robot arms, warehouse management software
              (WMS), and energy infrastructure for automation—spanning an estimated $25–35 billion globally in 2025–2026
              depending on the analyst. Mujin's products address the software-and-intelligence layer atop robot arms
              (articulated robots performing pick, palletize, depalletize, bin-pick, and piece-pick tasks), which
              industry analysts classify within the "warehouse robotics" and "industrial robot software" sub-segments.
              Status-quo substitutes include: manual labor (direct substitution), older teach-pendant programming
              methods, OEM-specific robot control software (Fanuc ROBOGUIDE, KUKA WorkVisual, ABB RobotStudio), and
              cloud/edge warehouse management systems with robot orchestration capabilities. Mujin's MujinOS competes
              with all of these in the orchestration and intelligence layer while remaining hardware-agnostic.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
