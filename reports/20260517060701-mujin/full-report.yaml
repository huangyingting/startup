      - number: '4.3'
        title: Unit Economics and Margin Structure
        blocks:
          - type: paragraph
            body: >
              Mujin's unit economics are entirely estimated from public benchmarks and competitor analogues because no
              gross margin, CAC, or LTV data has been publicly disclosed. The most analytically useful public benchmark
              is Symbotic Inc., the NASDAQ-listed warehouse automation company that reported a blended gross margin of
              approximately 38–42% in fiscal year 2024 per its SEC 10-K filing, combining software, system integration
              services, and hardware revenue streams. Symbotic's cost structure is imperfect as a proxy — Symbotic is
              orders of magnitude larger and operates a more hardware-intensive model — but its blended margin profile
              provides a defensible floor for estimating Mujin's economics.

              Software license gross margins for industrial automation platforms are typically 60–80%, reflecting
              minimal cost of goods sold once the platform is developed. Professional services margins for robotics
              integration are typically 20–35%, reflecting direct labor costs of engineers and commissioning
              specialists. At an assumed revenue mix of approximately 40% software, 50% services, and 10% hardware, the
              blended gross margin would be approximately 40–50%, consistent with the Symbotic proxy.

              Customer acquisition cost (CAC) at Mujin is estimated at $100K–$500K per enterprise customer, reflecting
              6–18 month typical enterprise sales cycles, the cost of proof-of-concept demonstrations, and the overhead
              of SI partner co-selling. Enterprise LTV is estimated at $2M–$10M or more assuming multi-site expansion
              over five to seven years. The implied LTV/CAC ratio of 4:1 to 20:1 is within normal enterprise software
              ranges but highly sensitive to the assumed expansion trajectory and whether multi-site adoption actually
              materializes.
