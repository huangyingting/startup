      - number: '1.2'
        title: Leadership, Founders, and Governance
        blocks:
          - type: paragraph
            body: >
              Mujin was co-founded by two individuals with complementary backgrounds. Dr. Ross Diankov (also stylized as
              Rosen Diankov in older sources) is the CEO and technical co-founder. He completed his Ph.D. at Carnegie
              Mellon University's Robotics Institute under advisor Dr. James Kuffner (now CEO of Woven by Toyota, a
              Toyota mobility subsidiary). During his doctorate, Diankov created OpenRAVE, an open-source motion
              planning framework that remains widely used in robotics research globally (802+ GitHub stars, 356+ forks
              as of 2026) and forms the intellectual foundation for Mujin's proprietary technology. Issei Takino, the
              operational co-founder, serves as COO. Together they built the company from its 2011 Tokyo launch into an
              international robotics software business.

              Mujin's US leadership team as of 2026 includes Mario D'Cruz (VP of Marketing and Strategy), Manish Gupta
              (Global FP&A and US CFO), John Ridgley (VP of Engineering), and Rob Schmit (SVP of Product). The company
              established a Global Leadership Cabinet (GLC) to unify operations worldwide and align technology, product,
              sales, and governance functions across all regions. Key-person risk is elevated given Dr. Diankov's dual
              role as technical visionary and external face of the company, though the GLC structure aims to distribute
              leadership responsibility. Board composition, advisory details, and specific governance documents are not
              publicly disclosed, representing a material diligence gap for a company at Series C stage.
