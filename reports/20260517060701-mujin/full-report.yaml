      - number: '3.3'
        title: Incumbent OEM Software and Switching Costs
        blocks:
          - type: paragraph
            body: >
              The most commercially significant competitive threat to Mujin's adoption is not the AI startups but the
              incumbent robot OEMs whose proprietary software is bundled with hardware. Fanuc is the world's largest
              industrial robot maker by installed base, with approximately 750,000 robots operating globally. Fanuc's
              ROBOGUIDE software is deeply integrated with Fanuc robot hardware, provides teach-pendant programming,
              simulation, and diagnostics, and has essentially zero incremental cost for customers who buy Fanuc robots.
              KUKA (owned by Midea since 2016) and ABB (Swiss multinational) are similarly entrenched across European
              and global automotive manufacturing. Yaskawa's MotoSim covers similar functionality. The strategic
              challenge for Mujin is that these OEM packages have near-zero incremental cost, extensive field support
              networks, and decades of customer trust. Mujin must demonstrate ROI multiples of 2–3× to overcome the
              switching cost for customers already running OEM software.

              The key argument for Mujin over OEM software is: (1) hardware-agnostic operation — Mujin works across
              Fanuc, KUKA, ABB, Yaskawa, and Universal Robots hardware simultaneously, enabling mixed-fleet deployments;
              (2) no-code visual programming vs. proprietary teach-pendant programming; (3) built-in digital twin for
              simulation and validation; (4) fleet-level orchestration that OEM software does not provide natively.
              These advantages are real but require deployment complexity, change management, and integration cost that
              OEM-software-first deployments avoid. Multi-OEM environments (common in 3PL and large distribution
              centers) are Mujin's strongest competitive footing vs. OEM incumbents.
            claimRefs:
              - CP013
