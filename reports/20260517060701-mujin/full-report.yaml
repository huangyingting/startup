      - number: '6.4'
        title: Customer Retention, Repeat Usage, and Satisfaction Signals
        blocks:
          - type: paragraph
            body: >
              Mujin's edge-first deployment model and deep WMS/ERP integration create high switching costs once the
              system is operational. Replacing MujinOS requires re-integrating the WMS, re-commissioning robots under a
              different controller, and potentially re-purchasing compatible hardware — a process that represents six to
              twelve months of disruption for a large logistics facility. This structural lock-in is not unique to Mujin
              but is reinforced by the company's no-code configuration layer, which means operators build operational
              workflows on top of MujinOS's digital twin that would not transfer to a competing platform.

              No public customer churn — meaning no instance of a major Mujin deployment being discontinued, replaced by
              a competitor, or publicly announced as a failed deployment — has been identified in any publicly available
              source as of May 2026. The absence of churn evidence is a positive proxy signal but not a definitive
              measure of satisfaction, as Mujin's private company status means no contractual renewal data, net revenue
              retention figures, or gross revenue retention statistics are available from public disclosures.

              The most concrete retention signal is multi-site expansion: Logisteed's documented expansion from a single
              pilot facility to multiple sites, JD.com's China network expansion, and Trusco Nakayama's continued
              relationship all indicate that initial deployments met the customers' operational and economic
              requirements. The repeat purchase behavior of multiple Japanese customers — companies that operate in
              highly cost-conscious logistics environments — provides a meaningful proxy for commercial satisfaction.
              Independent net promoter scores, Gartner Peer Insights reviews, or equivalent satisfaction metrics have
              not been published for Mujin's product.
