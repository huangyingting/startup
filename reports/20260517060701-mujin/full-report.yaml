              Mujin completed a Series C funding round totaling $85 million, with the announcement dated September
              2022/2023 (sources give conflicting dates—the corporate press release cited September 5, 2023, while wire
              service URL patterns suggest September 29, 2022; this discrepancy is an open diligence question). The
