      - number: '6.5'
        title: Customer Concentration Risk and Adverse Signals
        blocks:
          - type: paragraph
            body: >
              Mujin's customer risk profile is dominated by two compounding concentration factors: heavy geographic
              concentration in Japan (estimated at 70%+ of revenue), and heavy vertical concentration in logistics and
              3PL. These two factors are related — Japan's logistics sector is the market where Mujin has the deepest
              penetration — but they create compounding exposure to a single country's logistics capex cycle. A
              contraction in Japanese logistics capital expenditure, driven by macro slowdown, regulatory change, or
              technology disruption, would have disproportionate impact on Mujin's revenue trajectory relative to a more
              geographically diversified robotics platform.

              Single-customer concentration adds a third layer: JD.com is Mujin's most prominent non-Japan reference and
              represents a meaningful share of Mujin's China-based deployment footprint. While JD.com's logistics
              operations are large and growing, any deterioration in JD.com's financial position, strategic direction,
              or relationship with Mujin could reduce China segment opportunity. The United States market, where Mujin
              has made the most recent investment in partnership development, has produced no confirmed Fortune 500
              customer as of May 2026. The US pipeline is primarily SI-managed and unconfirmed publicly, representing a
              material valuation uncertainty for investors underwriting US expansion.

              Berkshire Grey's experience post-SPAC is instructive as an adverse analog: warehouse automation customer
              ramp frequently underperforms projections due to deployment complexity, budget delays, and integration
              challenges at individual customer facilities. Long enterprise sales cycles of 6–18 months make near-term
              revenue predictability difficult, particularly as Mujin attempts to accelerate US and European market
              development through SI channels that are themselves in the process of building Mujin-specific deployment
              capability. Implementation delays and WMS integration complexity create a category of customer
              relationship stress that may not be visible in public case studies but is structurally inherent in the
              product.
