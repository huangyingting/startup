  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation by Industry, Geography, and Size
        blocks:
          - type: paragraph
            body: >
              Mujin's customer base is structurally concentrated in Japan's logistics and distribution sector,
              reflecting its origins as a Tokyo-based enterprise software company targeting domestic large-cap operators
              first. The four confirmed named Japanese customers — Trusco Nakayama, Logisteed Ltd. (formerly Hitachi
              Transport System), Nichirei Logistics, and Amazon Japan — represent some of Japan's largest industrial
              distributors and third-party logistics providers. All four are large enterprises by Japanese standards,
              with annual revenues typically exceeding ¥100 billion, and all deployments are in live production
              logistics facilities rather than controlled pilot environments.

              Outside Japan, JD.com in China is Mujin's most prominent internationally disclosed customer, with
              deployments in high-volume piece-picking and mixed-case automation across JD Logistics' distribution
              center network. Cainiao, Alibaba's logistics subsidiary, has also been cited in trade press as a Mujin
              reference in China. These China deployments represent an e-commerce logistics vertical that is distinct
              from Mujin's primary Japan base, which skews toward traditional 3PL operators and industrial distributors.
              The United States and Europe remain nascent markets; no confirmed US Fortune 500 customer reference exists
              in publicly available sources as of May 2026.

              By industry vertical, logistics and 3PL operators make up the plurality of named references, followed by
              e-commerce logistics (JD.com, Cainiao) and industrial distribution (Trusco Nakayama). Manufacturing
              customers — which represent a potential second wave given Mujin's bin-picking and precision-handling
              capabilities — are not represented by any publicly named reference. This segmentation creates both a
              concentrated proof point in Japan logistics and a notable gap in manufacturing customer validation.
