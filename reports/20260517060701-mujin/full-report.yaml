      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              The warehouse and manufacturing automation market has a complex three-tier buying structure. Payers
              (budget holders) are typically Chief Supply Chain Officers (CSCOs), VP Operations, or Capital Investment
              Committees at large logistics/manufacturing companies—deal sizes range from $500K for a single robot cell
              to $5M+ for a multi-cell deployment. Users are warehouse operations managers, automation engineers, and
              system integrators who interact with Mujin's MujinOS day-to-day. Gatekeepers include IT security teams
              (for cloud/OT integration) and robotic safety engineers (for CE/UL certification compliance). Mujin's
              primary buyer segments are: (1) Large e-commerce and retail DCs (distribution centers) — the largest
              single segment, driven by SKU proliferation and volume variability requiring flexible automation; (2)
              Fast-moving consumer goods (FMCG) manufacturers — palletizing and depalletizing automation for CPG
              companies; (3) Third-party logistics (3PL) providers — multi-client, multi-SKU environments where robot
              flexibility is highest value; (4) Automotive tier-1 and OEM suppliers — bin picking for parts kitting; (5)
              Food and beverage distributors — depalletizing for fresh logistics. The adoption path is typically: pilot
              single cell → expand to single site → enterprise multi-site license. System integrators (Accenture, MHS,
              Tompkins Robotics) are critical channel partners and often initiate the buyer relationship. Japan is
              Mujin's home market and the region with the deepest reference customer density; the US market is the
              targeted next large growth market, with Europe in early-expansion stage.
            claimRefs:
              - CM012
              - CM013
              - CM014
