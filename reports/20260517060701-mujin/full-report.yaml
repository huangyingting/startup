  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Module Catalog and Architecture
        blocks:
          - type: paragraph
            body: >
              Mujin's entire product portfolio is organized around MujinOS, a unified robotics software platform that
              provides the intelligence layer for industrial robots regardless of manufacturer. MujinOS is structured as
              a stack of cooperating modules: the motion planning engine, the digital twin environment, the perception
              AI subsystem, the fleet manager, the MujinController runtime, and the API integration layer. Above this
              stack sits QuickBot, Mujin's pre-configured rapid-deployment depalletizing cell. Each module is
              independently scoped but operationally interdependent — removing any single layer degrades or eliminates
              product function.

              The motion planning engine is the technical core. Derived from the OpenRAVE research platform developed by
              CEO Ross Diankov during his CMU PhD, it solves inverse kinematics, collision avoidance, and grasp planning
              in real time using a physics-based approach. Mujin claims sub-100ms planning cycles, though independent
              benchmarks have not been published. The digital twin is a high-fidelity real-time 3D model of the
              customer's warehouse or factory, populated at commissioning time and updated continuously. It enables
              offline motion validation before live deployment, which the company credits as the primary driver of its
              faster commissioning timeline compared to conventional teach-pendant programming.

              Perception AI uses depth cameras to generate 3D point clouds, identify object poses, and select
              appropriate grippers and suction parameters for unstructured bin and piece picking. The fleet manager
              layer handles multi-robot task assignment, traffic routing, and deadlock avoidance across arms and
              autonomous mobile robots. Hardware compatibility covers Fanuc, Kawasaki, Mitsubishi, Yaskawa Motoman,
              Universal Robots, ABB, and KUKA through certified driver integrations. The API layer exposes a REST/JSON
              interface for bidirectional communication with WMS, ERP, and MES systems including SAP, Blue Yonder, and
              Oracle. Together these modules create the no-code, hardware-agnostic platform that is Mujin's core
              commercial proposition.
