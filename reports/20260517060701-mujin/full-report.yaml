  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Methodology and Framework
        blocks:
          - type: paragraph
            body: >
              Mujin, Inc. is a private industrial robotics software company with no published revenue, margin, or
              balance sheet data. Valuation therefore relies on three converging methodologies: (1) EV/Revenue multiple
              analysis applied to an estimated annual recurring revenue range, anchored by observable comparable company
              multiples; (2) comparable private-round and M&A exit benchmarks from the warehouse automation sector; and
              (3) scenario-weighted valuation ranges spanning bull, base, and bear assumptions. The primary method is
              EV/Revenue because Mujin's business model — recurring software licences, professional services, and
              MujinOS platform fees — aligns most closely with industrial SaaS and platform companies for which revenue
              multiples are the dominant investor framing. Gross margin structure for comparable hardware-agnostic
              software platforms is typically 40–60%, supporting multiples in the 4–8x range at moderate growth rates.
              For a Japan-concentrated private company with an unconfirmed ARR, a conservative discount applies relative
              to US-listed peers. Mujin's ARR is not publicly disclosed. Analyst estimates derived from disclosed
              customer count (60+ enterprise deployments as of 2024) and typical enterprise robotics contract sizes
              ($500K–$2M annual software value per site) produce a $30–80M ARR range, with the base case anchored at
              $50–70M. This estimate carries material uncertainty and should be verified through private data room
              access. All valuation conclusions in this chapter are explicitly conditioned on these unverified revenue
              estimates and are subject to revision if confirmed financials differ materially.
            claimRefs:
              - CV021
              - CV025
              - CV026
              - CV028
      - number: '8.2'
        title: Comparable Company Benchmarks
        blocks:
          - type: paragraph
            body: >
              Eight comparable companies anchor the Mujin valuation analysis: Symbotic (public, largest warehouse
              automation software company), Berkshire Grey (SPAC implosion cautionary tale), Locus Robotics (private,
              distressed restructuring), GreyOrange (private, $1B round), Exotec (private, French goods-to-person,
              unicorn), AutoStore (public, Norwegian), Geek+ (private, Chinese, direct competitor), and 6 River Systems
              (acquired by Shopify 2019). Symbotic is the most liquid comparable: it reported $1.77B in FY2024 revenue
              and trades at approximately 2.5–4x trailing EV/Revenue as of early 2025, a significant compression from
              the 8x+ peak of 2022. AutoStore shows a similar trajectory, having de-rated from 7–8x at IPO to 3–4x by
              2024. These public market benchmarks establish the ceiling for comparable private company multiples.
              Adverse data points sharply limit optimism. Berkshire Grey's collapse from $2.3B to under $100M in
              twenty-four months — and Locus Robotics' Series F valuation of $2B followed by mass layoffs and
              restructuring — demonstrate that peak-cycle multiple narratives in warehouse robotics are fragile without
              sustained unit economics. Mujin avoids some of these failure modes (it operates software rather than
              capital-intensive hardware), but the sector sentiment impact is real. Private comparables (Geek+ at ~$2B,
              Exotec at ~$2B) represent companies with greater disclosed scale or geographic breadth than Mujin, arguing
              against Mujin being valued at parity. The 2–6x multiple range derived from this set is applied to Mujin's
              estimated ARR to produce the three valuation scenarios described in a subsequent section.
