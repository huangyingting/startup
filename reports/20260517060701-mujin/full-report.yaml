      - number: '5.3'
        title: Technology Architecture and AI Approach
        blocks:
          - type: paragraph
            body: >
              MujinOS is deployed on an edge-first architecture. The MujinController runtime runs on an industrial Linux
              PC located on-premise inside the customer facility, ensuring that real-time robot control is not dependent
              on internet connectivity or cloud availability. An optional cloud dashboard provides remote monitoring,
              telemetry, and analytics, but core motion planning and execution remain local. This edge-first design is a
              deliberate engineering and commercial choice that aligns with the latency requirements of industrial robot
              control (the company claims sub-100ms motion planning) and the security posture of large logistics
              operators.

              The AI approach in MujinOS is hybrid rather than purely data-driven. The motion planning engine is
              physics-based — it builds a kinematic model of the robot and environment and searches a configuration
              space for collision-free trajectories. Deep learning is applied at the perception layer for object
              recognition, pose estimation, and grasp quality scoring from depth camera point clouds. This hybrid
              approach is intended to provide the reliability and determinism of model-based control with the
              flexibility and generalization of learned perception. Mujin's strategic alliance with NTT (announced
              December 2024) is oriented around developing a physical AI foundation model that would eventually be
              integrated into MujinOS to expand its manipulation generality beyond pre-modeled tasks.

              The digital twin represents a further architectural differentiator. By maintaining a continuously updated
              3D model of the facility, MujinOS can validate new motion plans in simulation before executing them live,
              dramatically reducing the risk of collisions during SKU introductions or layout changes. Nvidia Isaac Sim
              and other commercial simulation platforms offer overlapping capabilities but are not integrated into
              MujinOS — Mujin's simulation is proprietary and co-designed with the motion planner for tight real-time
              fidelity. The ROS ecosystem provides a widely-used open middleware alternative, but MujinOS uses a
              proprietary runtime that does not depend on ROS.
