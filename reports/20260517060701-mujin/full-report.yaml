companyProfile:
  summary: >
    Mujin, Inc. is a Tokyo-based industrial robotics software company founded in 2011 by Rosen Diankov and Issei Takino.
    Its core product is the MujinController — a hardware-agnostic, real-time motion- planning and robot intelligence
    platform that enables industrial robots from major OEMs (ABB, Fanuc, Yaskawa, KUKA) to perform complex pick, place,
    palletize, and depalletize tasks without manual teach-pendant programming. Mujin targets logistics operators, 3PLs,
    and manufacturers primarily in Japan (≈70% of revenue), with growing presence in China and early-stage US operations
    via an Accenture channel partnership. The company has raised approximately $120–150M cumulatively through a $85M
    Series C led by JAFCO Asia (Sep 2022) and a strategic NTT capital alliance (Dec 2024).
  foundedDate: '2011-01-01'
  founders:
