              Accenture (as a strategic corporate investor), and angel investor Dr. James Kuffner. Accenture had been
              collaborating with Mujin since 2019. Yaskawa Electric, Murata Manufacturing, Itochu, and 31VENTURES
              (31Group's CVC) are cited in earlier rounds according to industry databases and background sources. Total
              capital raised is reported at $85M+ across all rounds; the total exact amount prior to Series C is not
              publicly confirmed. The company's valuation was reported to approach or reach $1 billion at the Series C
              stage, making it a unicorn-adjacent company, though this figure has not been independently confirmed by a
              regulatory filing. Revenue, burn rate, and profitability data are not publicly disclosed; Mujin is a
