  evidenceGaps:
    - type: private-evidence-only
      severity: minor
      topic: Mujin IP claims vulnerability — patent scope and enforceability
      missingEvidence: >
        No adversarial IP challenge or patent claim review against Mujin's motion planning
        and digital twin patents has been identified in public records. The enforceability of
        Mujin's J-PlatPat patent portfolio against prior-art attacks (particularly from OpenRAVE
        lineage) cannot be determined from public sources alone; requires patent counsel review.
      whyItMatters: >
        If Mujin's core motion planning IP is determined to have narrow enforceability due to
        prior-art exposure from the OpenRAVE open-source lineage, competitors could replicate
        the core technology without licensing risk, materially eroding the technology moat.
      diligencePath: >
        Engage Japan and US patent counsel to conduct a freedom-to-operate and validity analysis
        of Mujin's key motion planning and digital twin patents; confirm which claims survive a
        prior-art challenge from the OpenRAVE and ROS2 ecosystems.
      relatedQuestionRefs: [QR001]

    - type: private-evidence-only
      severity: material
      topic: Mujin runway and cash burn rate quantification
      missingEvidence: >
        Mujin does not publish financial statements. The estimated burn rate and runway timeline
        are inferred from comparable companies of similar stage and headcount; actual cash
        balance, revenue run-rate, and burn rate are not available from public sources.
      whyItMatters: >
        Without confirmed financial data, investors cannot assess whether Mujin faces a near-term
        funding cliff or has achieved revenue self-sufficiency. The uncertainty directly affects
        risk pricing for any investment.
      diligencePath: >
        Request management accounts, burn rate data, and cash balance from Mujin in due diligence;
        cross-reference with any available revenue data from the NTT partnership or other disclosed
        commercial agreements.
      relatedQuestionRefs: [QR009, QR026]

    - type: missing-source
      severity: material
      topic: BIS entity list and export license status for Mujin
      missingEvidence: >
        No public BIS determination, export license application, or commodity jurisdiction ruling for
        MujinOS has been identified. It is not possible from public sources to confirm whether Mujin
        has conducted the required EAR review for its China software transfers or obtained any required
        licenses.
      whyItMatters: >
        If Mujin has not conducted the required EAR compliance review for transfers of MujinOS
        to Chinese customers, it could face BIS enforcement action, financial penalties, or
        prohibition on further China operations — materially affecting the China revenue segment
        estimated at 15-20% of total.
      diligencePath: >
        Request from Mujin management a copy of any BIS commodity classification opinion, trade
        counsel review memoranda, and license applications for all China software transfers. Confirm
        with export control counsel that all ongoing JD.com and Cainiao software support transfers
        are EAR-compliant.
      relatedQuestionRefs: [QR027]
      relatedTableRefs: [TR006]

    - type: private-evidence-only
      severity: material
      topic: Mujin runway and cash position post-Series C
      missingEvidence: >
        Mujin does not publish financial statements, revenue figures, or cash position data. The
        estimated 2025-2026 runway depletion risk is based on inference from Series C size, public
        comparable burn rates, and company stage rather than actual financial data.
      whyItMatters: >
        Investors considering a position in Mujin cannot assess whether the company is approaching
        a funding cliff, is revenue self-sustaining, or has undisclosed financing arrangements that
        extend the runway. This is the most significant financial diligence gap in the chapter.
      diligencePath: >
        Request audited or management-prepared financial statements, burn rate data, cash balance
        as of most recent quarter, and any undisclosed convertible notes, revenue-backed financing,
        or strategic investment from NTT or other partners from Mujin management in due diligence.
