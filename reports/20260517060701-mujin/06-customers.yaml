  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Japan revenue concentration percentage and top-customer revenue breakdown
      missingEvidence: >
        Mujin does not publish revenue by geography, customer, or vertical. The estimate of 70%+
        Japan concentration is inferred from the distribution of named customer references and
        series investor context, not confirmed financial data.
      whyItMatters: >
        Geographic and customer concentration is a material risk factor for investors; without
        confirmed revenue breakdown, concentration risk cannot be precisely assessed.
      diligencePath: >
        Request country-level and customer-level revenue breakdown from Mujin management in
        due diligence; model Japan capex cycle sensitivity on an assumed 70% Japan share.
      relatedQuestionRefs: [QU013, QU023]

    - type: private-evidence-only
      severity: material
      topic: Total confirmed active deployment count globally
      missingEvidence: >
        Mujin does not publish a deployment count. The estimated 55-80 active sites figure
        is inferred from series funding context, number of publicly named customers, and
        industry analyst commentary. Actual count may be materially different.
