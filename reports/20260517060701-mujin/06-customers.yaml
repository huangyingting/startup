      the largest vertical diversity. China has two confirmed named references (JD.com and
      Cainiao) with strong independent press corroboration for JD.com but only moderate
      evidence for Cainiao. The USA has zero confirmed named customers as of May 2026,
      with pipeline exclusively in SI channel. Europe has no confirmed customer or pipeline
      visibility. The matrix illustrates both Mujin's proof concentration in Japan and the
      diligence gap in North American and European markets.
