  - id: FU004
    title: Retention / repeat cohort
    type: matrix
    layout: standard
    summary: >
      This retention cohort tracks the deployment status of Mujin's six confirmed named customers
      from 2020 through 2025. Each cell shows whether the customer was in a pilot phase, active
      single-site deployment, expanded multi-cell deployment, or multi-site deployment for each
      year. The cohort demonstrates continuous active status across all named customers from their
      initial deployment year through 2025, with no observed churn. Three customers (Logisteed,
      JD.com, Amazon Japan) show documented expansion within the cohort window, confirming
      land-and-expand dynamics. The cohort is limited to publicly named customers; additional
      undisclosed customers may affect cohort quality positively or negatively.
