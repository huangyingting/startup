companyProfile:
  summary: >
    Mujin, Inc. is a Tokyo-based industrial robotics software company founded in 2011 by Rosen Diankov
    and Issei Takino. Its core product is the MujinController — a hardware-agnostic, real-time motion-
    planning and robot intelligence platform that enables industrial robots from major OEMs (ABB, Fanuc,
    Yaskawa, KUKA) to perform complex pick, place, palletize, and depalletize tasks without manual
    teach-pendant programming. Mujin targets logistics operators, 3PLs, and manufacturers primarily in
    Japan (≈70% of revenue), with growing presence in China and early-stage US operations via an
    Accenture channel partnership. The company has raised approximately $120–150M cumulatively through
    a $85M Series C led by JAFCO Asia (Sep 2022) and a strategic NTT capital alliance (Dec 2024).
  foundedDate: "2011-01-01"
  founders:
    - name: "Rosen Diankov"
      role: "CEO & Co-Founder"
      background: "Carnegie Mellon University robotics PhD; creator of OpenRAVE motion planning framework."
      claimRefs: [CO003]
    - name: "Issei Takino"
      role: "COO & Co-Founder"
      background: "Japanese operations executive; led Japan market development and enterprise sales."
      claimRefs: [CO004]
  foundingLocation: "Tokyo, Japan"
  headquarters: "Tokyo, Japan"
  productSummary: >
    MujinController: real-time hardware-agnostic robot motion-planning software. Products span
    palletizing, depalletizing, piece-picking, and bin-picking applications. Delivered as an embedded
    controller appliance + perpetual/subscription software license plus professional services.
  customerFocus: >
    Large logistics operators, third-party logistics providers (3PLs), e-commerce fulfilment centers,
    and industrial manufacturers — primarily in Japan, with secondary focus in China and the United States.
  businessModel: >
    Software license + annual maintenance fees (recurring) layered on one-time project integration fees.
    Hardware-agnostic: sells controller software, not robots. Typical contract $500K–$3M; multi-year
    relationships with site-expansion upsell.
  stage: "Series C (private)"
  fundingStatus: >
    $85M Series C closed September 2022 (JAFCO Asia lead); NTT strategic capital alliance December 2024
    (amount undisclosed). Estimated cumulative funding $120–150M. Post-money valuation not disclosed.
  disclosureProfile: "private-undisclosed"
  claimRefs: [CO001, CO003, CO004, CI004, CI005]

