    claimRefs: [CP018, CP019, CP020, CP021, CP022, CP023, CP024]
    notes: >
      Moat severity ratings are judgmental assessments based on publicly available competitive
      intelligence; they are not based on primary interviews. "High" severity means a credible,
      funded, and near-term displacement threat. Mitigation actions are diligence recommendations,
      not confirmed Mujin strategies.

