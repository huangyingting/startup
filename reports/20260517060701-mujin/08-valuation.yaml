acknowledgedWarnings:
  - dimension: figureType
    reason: >
      The valuation chapter uses matrix (comparable company and sensitivity heat map),
      waterfall (scenario bridge), and timeline (funding history) figure types instead of
      flow, bar, range, or kpi. These four types are the most analytically appropriate for
      representing a private-company valuation with comparable multiples, scenario decomposition,
      and a financing timeline; the planned generic types (flow, bar, range, kpi) were
      superseded by these more precise substitutions intentionally.
