  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Mujin ARR and revenue verification
      missingEvidence: >
        Mujin does not publish revenue, ARR, gross margin, or any financial KPI. All
        valuation estimates in this chapter are built on unverified secondary market
        estimates. The ARR range ($30–80M) carries a potential 50%+ error margin.
      whyItMatters: >
        Without verified ARR, no price-sensitive investment decision is analytically defensible.
        A data room with audited or management-prepared financials is a blocking prerequisite.
      diligencePath: >
        Request management accounts, ARR waterfall by customer, and gross margin schedule from
        Mujin CFO under NDA.
      relatedQuestionRefs: [QV004, QV016]
      relatedTableRefs: [TV006]

    - type: private-evidence-only
      severity: material
      topic: Mujin post-money valuation at Series C
      missingEvidence: >
        The post-money valuation at the September 2022 Series C was not disclosed in any
        primary source. Secondary market databases provide estimates but with no primary confirmation.
      whyItMatters: >
        Post-money valuation determines the implicit price paid by JAFCO Asia and existing
        investors, calibrating the entry price expectation for any new secondary investor.
      diligencePath: >
        Request cap table certification and Series C term sheet from Mujin management under NDA.
      relatedQuestionRefs: [QV003]
      relatedTableRefs: [TV006]

    - type: missing-source
      severity: material
      topic: Post-Series C private financial signals
      missingEvidence: >
        No secondary transaction, bridge note, convertible debt instrument, or investor
        portfolio mark-down for Mujin has been identified in public sources covering the
        27-month period from September 2022 to December 2024.
      whyItMatters: >
        A downround or bridge note between 2022 and 2024 would materially change the
        valuation assessment; absence of evidence in the public domain is not confirmation
        of stability.
      diligencePath: >
        Request post-Series C cap table and any convertible notes, bridge financing, or
        secondary transaction documentation from Mujin management under NDA.
      relatedQuestionRefs: [QV023]

    - type: private-evidence-only
