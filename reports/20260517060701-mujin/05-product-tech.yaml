figures:
  - id: FE001
    title: Product architecture map
    type: stack
    layout: standard
    summary: >
      MujinOS is organized as a six-layer software stack. The lowest layer provides hardware
      abstraction and certified OEM robot interfaces. The MujinController runtime above it executes
      real-time deterministic control. The intelligence layer houses motion planning, perception AI,
      and the digital twin. Fleet manager sits above intelligence, orchestrating work across multiple
      robots. The API and integration layer manages WMS/ERP connectivity. At the apex sits the
      application layer including QuickBot and the no-code operator interface.
    data:
      layers:
        - label: "Application & User Interface Layer"
          detail: "QuickBot rapid-deployment depalletizing cell; MujinOS task console; no-code visual programming interface for operators and system integrators"
        - label: "API & Integration Layer"
          detail: "REST/JSON API server; bidirectional WMS/ERP/MES connectors for SAP, Blue Yonder, Oracle; webhook and event bus for task dispatch and completion reporting"
        - label: "Fleet Manager Layer"
          detail: "Multi-robot task assignment engine; graph-based traffic management; deadlock avoidance; AMR coordination; exception escalation handling"
        - label: "Intelligence Layer (AI Core)"
          detail: "Physics-based motion planning engine (OpenRAVE-derived, >10yr production hardening); perception AI (deep learning on 3D depth camera point clouds); digital twin (real-time 3D facility simulation for offline commissioning)"
        - label: "MujinController Runtime"
          detail: "Proprietary Linux-based real-time execution engine deployed on on-premise industrial PC; deterministic control loop; no cloud dependency for core function"
        - label: "Hardware Abstraction & OEM Interface Layer"
          detail: "Certified robot driver integrations: Fanuc, Kawasaki, Mitsubishi, Yaskawa Motoman, Universal Robots, ABB, KUKA; depth camera and sensor interfaces; I/O control for grippers and conveyors"
    claimRefs: [CE001, CE002, CE005, CE006, CE008, CE023]

  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    layout: standard
    summary: >
      The operating flow begins when a WMS or ERP system dispatches a work order to MujinOS
      via REST API. The MujinController assigns the task to an available robot. The digital twin
      validates the planned trajectory in simulation before live execution. Perception AI scans
      the work area to locate the target item. The motion planner generates a collision-free
      trajectory in real time. The robot executes the motion; a sensor confirms grasp success.
      The fleet manager immediately queues the next task, and a completion event is sent back
      to the WMS to close the order loop.
    data:
      nodes:
        - label: "WMS / ERP sends work order"
          detail: "Customer system dispatches pick, place, or palletize task via REST/JSON API call to MujinController"
        - label: "MujinController receives and assigns task"
          detail: "Real-time task scheduler parses work order parameters and assigns task to available robot in fleet"
        - label: "Digital twin validates motion plan"
          detail: "Offline simulation checks candidate trajectory for collisions and reachability before live execution"
        - label: "Perception AI scans work area"
          detail: "Depth camera captures 3D point cloud; deep learning model identifies item pose and selects gripper parameters"
        - label: "Motion planning generates trajectory"
          detail: "Physics-based engine solves IK and collision-free path; company claims sub-100ms planning cycle"
        - label: "Robot executes motion"
          detail: "OEM robot arm executes trajectory under MujinController real-time supervision at millisecond resolution"
        - label: "Grasp or place confirmed"
          detail: "Gripper force sensor or vision system confirms successful pick or place; exception triggered on failure"
        - label: "Fleet manager queues next task"
          detail: "Orchestration layer updates robot availability status and dispatches next work order from queue"
        - label: "Completion event sent to WMS"
          detail: "MujinOS sends task-complete confirmation with item ID and timestamp back to customer WMS/ERP via API"
      edges:
        - from: "WMS / ERP sends work order"
          to: "MujinController receives and assigns task"
        - from: "MujinController receives and assigns task"
          to: "Digital twin validates motion plan"
        - from: "Digital twin validates motion plan"
          to: "Perception AI scans work area"
        - from: "Perception AI scans work area"
          to: "Motion planning generates trajectory"
        - from: "Motion planning generates trajectory"
          to: "Robot executes motion"
        - from: "Robot executes motion"
          to: "Grasp or place confirmed"
        - from: "Grasp or place confirmed"
          to: "Fleet manager queues next task"
        - from: "Fleet manager queues next task"
          to: "Completion event sent to WMS"
    claimRefs: [CE009, CE010, CE016, CE017, CE020]

  - id: FE003
    title: Critical dependency map
    type: dag
    layout: standard
    summary: >
      MujinOS has seven categories of critical external dependency. OEM robot hardware (Fanuc,
      KUKA, ABB, Yaskawa, UR) is the primary execution dependency — without a compatible OEM
      robot, MujinOS cannot operate. Depth camera and sensor hardware provides the perception
      input. Industrial edge compute (on-premise PC) runs the MujinController. Customer WMS/ERP
      systems are integration dependencies for task dispatch and completion. Network infrastructure
      underpins real-time robot control. System integrators are the primary go-to-market and
      deployment channel. Cloud dashboard is an optional monitoring dependency.
    data:
      nodes:
        - label: "MujinOS Platform"
          detail: "Core software; all capabilities depend on this layer; Mujin-proprietary and not open source"
        - label: "OEM Robot Arm"
          detail: "Fanuc, Kawasaki, Mitsubishi, Yaskawa Motoman, Universal Robots, ABB, KUKA; hardware execution; customer-procured"
        - label: "Depth Camera / Vision Hardware"
          detail: "3D sensor providing point cloud to perception AI; Mujin qualifies specific camera models"
        - label: "Industrial PC (Edge Compute)"
          detail: "On-premise Linux server running MujinController; may be Mujin-supplied or customer hardware"
        - label: "WMS / ERP System"
          detail: "Customer warehouse or factory management system; task dispatch integration via REST API"
        - label: "Network Infrastructure (LAN)"
          detail: "Real-time LAN connecting MujinController, robot controller, cameras; latency-critical for control"
        - label: "System Integrator"
          detail: "Third-party SI designs, configures, and installs complete robot cell; primary Mujin go-to-market channel"
        - label: "Cloud Dashboard (Optional)"
          detail: "Remote monitoring and analytics hosted by Mujin; optional for core operation"
      edges:
        - from: "MujinOS Platform"
          to: "OEM Robot Arm"
          detail: "Controls robot via certified OEM driver; no MujinOS operation without compatible robot"
        - from: "MujinOS Platform"
          to: "Depth Camera / Vision Hardware"
          detail: "Reads 3D sensor stream for perception AI; vision dependency for picking tasks"
        - from: "MujinOS Platform"
          to: "Industrial PC (Edge Compute)"
          detail: "Deployed as MujinController process on edge PC; compute dependency"
        - from: "MujinOS Platform"
          to: "WMS / ERP System"
          detail: "Bidirectional REST/JSON API; task orchestration requires WMS integration"
        - from: "MujinOS Platform"
          to: "Network Infrastructure (LAN)"
          detail: "Real-time robot control depends on low-latency LAN; network outage halts operations"
        - from: "MujinOS Platform"
