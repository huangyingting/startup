  title: Product & Technology

sections:
  - id: product-module-catalog
    title: Product Module Catalog and Architecture
    body: >
      Mujin's entire product portfolio is organized around MujinOS, a unified robotics software
      platform that provides the intelligence layer for industrial robots regardless of manufacturer.
      MujinOS is structured as a stack of cooperating modules: the motion planning engine, the
      digital twin environment, the perception AI subsystem, the fleet manager, the MujinController
      runtime, and the API integration layer. Above this stack sits QuickBot, Mujin's pre-configured
      rapid-deployment depalletizing cell. Each module is independently scoped but operationally
      interdependent — removing any single layer degrades or eliminates product function.

      The motion planning engine is the technical core. Derived from the OpenRAVE research platform
      developed by CEO Ross Diankov during his CMU PhD, it solves inverse kinematics, collision
      avoidance, and grasp planning in real time using a physics-based approach. Mujin claims
      sub-100ms planning cycles, though independent benchmarks have not been published. The digital
      twin is a high-fidelity real-time 3D model of the customer's warehouse or factory, populated
      at commissioning time and updated continuously. It enables offline motion validation before
      live deployment, which the company credits as the primary driver of its faster commissioning
      timeline compared to conventional teach-pendant programming.

      Perception AI uses depth cameras to generate 3D point clouds, identify object poses, and
      select appropriate grippers and suction parameters for unstructured bin and piece picking.
      The fleet manager layer handles multi-robot task assignment, traffic routing, and deadlock
      avoidance across arms and autonomous mobile robots. Hardware compatibility covers Fanuc,
      Kawasaki, Mitsubishi, Yaskawa Motoman, Universal Robots, ABB, and KUKA through certified
      driver integrations. The API layer exposes a REST/JSON interface for bidirectional communication
      with WMS, ERP, and MES systems including SAP, Blue Yonder, and Oracle. Together these modules
      create the no-code, hardware-agnostic platform that is Mujin's core commercial proposition.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: workflow-use-cases
    title: Workflow Coverage and Use Cases
    body: >
      MujinOS is deployed across six primary warehouse and manufacturing use cases, each demanding
      a different configuration of the core modules. Piece picking — the extraction of individual
      items from bins, totes, or shelves — is the highest-complexity use case and the one most
      frequently cited by Mujin in customer case studies. It requires tight coupling between
      perception AI (for item identification and pose estimation), motion planning (for collision-free
      approach trajectories), and gripper selection logic. The system adapts at runtime when items
      shift position between picks without human reprogramming.

      Depalletizing (unloading inbound pallets at the receiving dock) is the target use case for
      QuickBot. By pre-configuring the motion profiles and vision parameters for a defined range
      of pallet configurations, QuickBot targets commissioning in days rather than months. Palletizing
      (building outbound shipping pallets) requires the additional capability of adaptive stack
      pattern planning, since weight distribution and overhang constraints vary by SKU. Bin picking
      in manufacturing serves automotive and industrial customers handling loose, unoriented metal
      parts or castings from bins.

      Mixed-case picking serves e-commerce warehouses that must pick a heterogeneous assortment of
      items per order, a task requiring rapid SKU recognition and cycle-time-per-item management.
      Finally, fleet management coordinates multiple robot arms and AMRs across a warehouse or
      factory floor, handling task queuing, traffic arbitration, and exception escalation. Across
      all use cases, MujinOS presents the same no-code operator interface — system integrators
      configure workflows visually without writing robot-specific code. Integration with SAP, Blue
      Yonder, and Oracle ERP/WMS systems is documented and production-deployed at major customers
      including Amazon Japan facilities.
    claimRefs: [CE009, CE010, CE011, CE012, CE013, CE014, CE015]
    tableRefs: [TE002]
    figureRefs: [FE002]

  - id: technology-architecture
    title: Technology Architecture and AI Approach
    body: >
      MujinOS is deployed on an edge-first architecture. The MujinController runtime runs on an
      industrial Linux PC located on-premise inside the customer facility, ensuring that real-time
      robot control is not dependent on internet connectivity or cloud availability. An optional
      cloud dashboard provides remote monitoring, telemetry, and analytics, but core motion planning
      and execution remain local. This edge-first design is a deliberate engineering and commercial
      choice that aligns with the latency requirements of industrial robot control (the company
      claims sub-100ms motion planning) and the security posture of large logistics operators.

      The AI approach in MujinOS is hybrid rather than purely data-driven. The motion planning
      engine is physics-based — it builds a kinematic model of the robot and environment and
      searches a configuration space for collision-free trajectories. Deep learning is applied
      at the perception layer for object recognition, pose estimation, and grasp quality scoring
      from depth camera point clouds. This hybrid approach is intended to provide the reliability
      and determinism of model-based control with the flexibility and generalization of learned
      perception. Mujin's strategic alliance with NTT (announced December 2024) is oriented around
      developing a physical AI foundation model that would eventually be integrated into MujinOS
      to expand its manipulation generality beyond pre-modeled tasks.

      The digital twin represents a further architectural differentiator. By maintaining a
      continuously updated 3D model of the facility, MujinOS can validate new motion plans in
      simulation before executing them live, dramatically reducing the risk of collisions during
      SKU introductions or layout changes. Nvidia Isaac Sim and other commercial simulation
      platforms offer overlapping capabilities but are not integrated into MujinOS — Mujin's
      simulation is proprietary and co-designed with the motion planner for tight real-time
      fidelity. The ROS ecosystem provides a widely-used open middleware alternative, but MujinOS
      uses a proprietary runtime that does not depend on ROS.
    claimRefs: [CE016, CE017, CE018, CE019, CE020, CE021, CE022, CE023]
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: trust-compliance
    title: Trust, Quality, and Compliance
    body: >
      Mujin claims compliance with the principal industrial robot safety standards applicable to
      its target markets. In Europe, Mujin robot cells carry CE marking, which requires conformity
      with the EU Machinery Directive (2006/42/EC) and applicable harmonized standards including
      ISO 10218-1 (robot safety requirements — manipulating industrial robots, design and construction)
      and ISO 10218-2 (integration of industrial robots into systems). In Japan, JARA (Japan Robot
      Association) standards govern the design and deployment of industrial robots, and Mujin's
      Japanese origin means its primary engineering and certification baseline is JARA-aligned.

      Functional safety requirements under IEC 62061 (machinery safety — functional safety of
      safety-related electrical control systems) and ISO 13849 (safety of machinery — safety-related
      parts of control systems) are referenced by Mujin in the context of CE compliance, but no
      independent safety audit reports, TÜV certificates, or equivalent third-party validation
      documents have been identified in publicly available sources. Compliance is primarily
      company-claimed and corroborated indirectly by the fact that Mujin operates production
      deployments in regulated manufacturing and logistics environments without known incidents.

      No product recalls, OSHA citations, or reported serious incidents attributable to MujinOS
      have been found in publicly available sources, consistent with the low-frequency incident
      history typical of controlled warehouse robotics environments. ISO 9001 quality management
      certification is not confirmed publicly. The primary compliance diligence gap is the absence
      of public certification body records, safety audit summaries, or third-party test reports
      that would allow an independent investor to confirm the claimed CE/ISO status without
      direct engagement with Mujin or its system integrators.
    claimRefs: [CE024, CE025, CE026, CE027, CE028, CE029]
    tableRefs: [TE004]

  - id: roadmap-differentiation
    title: Product Roadmap, Differentiation, and Technical Risk
    body: >
      Mujin's differentiation rests on three durable technical pillars: (1) the OpenRAVE-derived
      motion planning engine, which represents more than a decade of accumulated optimization
      and production hardening; (2) the digital twin co-designed with the planner for tight
      real-time fidelity; and (3) hardware agnosticism at the OEM robot interface level, which
      prevents customer lock-in to any single robot vendor. These pillars collectively create
      switching costs that make MujinOS difficult to displace once integrated into a customer's
      WMS/ERP workflow.

      The near-term roadmap is partially visible. QuickBot was commercially released in 2023,
      establishing Mujin in the fast-deployment segment. Demonstrations at ProMAT 2025 signaled
      continued US market investment with new capability showcases. The December 2024 NTT alliance
      is the most consequential strategic signal: it targets development of a physical AI foundation
      model for manipulation, which would represent a step-change in the platform's generalization
      beyond pre-modeled task workflows. However, NTT alliance deliverables and timelines are
      not publicly specified beyond the alliance announcement.

      On the risk side, the edge-first architecture creates deployment complexity that a
      cloud-native competitor could potentially undercut in the long term. The hybrid AI approach
      — physics-based planning combined with learned perception — requires continuous maintenance
      of robot and scene models, which adds integration overhead. No publicly available roadmap
      document exists for 2026 and beyond; roadmap content is inferred from partnership announcements,
      conference demonstrations, and job postings. RaaS (Robotics-as-a-Service) packaging is
      referenced in industry analyst commentary as a likely future commercial model for Mujin,
      but has not been publicly confirmed. Technical debt risk is moderate: the OpenRAVE codebase
      is open-source and aging, and Mujin has had to maintain its own fork as the upstream project
      has declined in active development.
    claimRefs: [CE030, CE031, CE032, CE033, CE034, CE035, CE036]
    tableRefs: [TE005]
    figureRefs: [FE004]

