  evidenceGaps:
    - type: missing-source
      severity: minor
      topic: "QuickBot deployment time reduction — company-claimed 'days not months' not independently verified"
      missingEvidence: >
        No independent case study or third-party measurement comparing QuickBot commissioning time
        versus conventional robot cell deployment has been identified. The company claims are
        marketing-level and unaudited.
      whyItMatters: >
        Deployment speed is a primary differentiator for QuickBot vs competitors such as Pickle Robot
        and Plus One Robotics. If the claim is overstated, QuickBot's go-to-market positioning is weakened.
      diligencePath: >
        Request system integrator references who can confirm actual QuickBot deployment timelines.
        Seek independent case studies with before/after commissioning hours.
      relatedQuestionRefs: [QE015]

    - type: missing-source
      severity: material
      topic: "Mujin 2026 product roadmap — no public roadmap document exists"
      missingEvidence: >
        Mujin does not publish a public product roadmap. Available roadmap signals are limited to
        partnership announcements (NTT), conference demonstrations (ProMAT 2025), and analyst
        inference. No planned release dates or feature timelines for 2026 have been confirmed.
      whyItMatters: >
        Roadmap opacity makes it impossible to assess delivery risk for the NTT physical AI
        collaboration, cloud-native deployment, or RaaS packaging — all of which are material
        to long-term competitive positioning.
      diligencePath: >
        Request internal product roadmap in due diligence. Ask specifically about NTT timeline,
        cloud-native GA target, and RaaS packaging commercial model.
      relatedQuestionRefs: [QE020]
      relatedTableRefs: [TE005]

    - type: missing-source
      severity: material
      topic: "MujinOS production uptime and reliability metrics not publicly available"
      missingEvidence: >
        No public SLA, uptime report, reliability benchmark, or availability specification for
        MujinOS MujinController in production has been identified. Downtime behavior, redundancy
        architecture, and failure-mode documentation are not publicly disclosed.
      whyItMatters: >
        Industrial automation customers require 99%+ uptime in production environments. Without
        independent confirmation of reliability, investors cannot assess operational risk or
        compare to competitive offerings that publish availability guarantees.
      diligencePath: >
        Request uptime data from reference customers. Ask Mujin for MujinController MTBF, MTTR,
        and HA architecture documentation.
      relatedQuestionRefs: [QE024]

    - type: missing-source
      severity: material
      topic: "ISO and functional safety certifications — no third-party audit records publicly available"
      missingEvidence: >
        CE marking and ISO 10218 compliance are company-claimed but no notified body records,
        TÜV/UL certificates, SISTEMA calculations, or functional safety audit reports have been
        identified in public sources. IEC 62061 and ISO 13849 compliance are inferred from CE
        marking scope rather than independently confirmed.
      whyItMatters: >
        Institutional customers in automotive and logistics require verified safety certifications.
        Absence of public records creates uncertainty for EU and North American regulatory approval
        processes.
      diligencePath: >
        Request CE notified body records, ISO 10218-2 conformity declarations, and IEC 62061
        safety audit reports from Mujin. Verify with system integrators who have deployed
        Mujin cells in regulated environments.
      relatedTableRefs: [TE004]

    - type: missing-source
      severity: minor
      topic: "Perception AI accuracy benchmarks not publicly disclosed"
      missingEvidence: >
        MujinOS perception AI pick accuracy, false-pick rates, and performance on novel SKUs
        are not published. All performance claims are marketing-level and unaudited.
      whyItMatters: >
        Perception accuracy is a primary buying criterion for piece-picking and bin-picking
        customers. Without benchmarks, investors cannot compare Mujin against Covariant, Plus One
        Robotics, Osaro, or Fizyr on the most critical performance dimension.
      diligencePath: >
        Request internal accuracy benchmarks and customer-reported pick rates. Seek reference
        customers willing to share operational performance data under NDA.
