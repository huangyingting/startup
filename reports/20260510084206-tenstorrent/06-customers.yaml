  - id: retention-durability-and-satisfaction
    title: Retention, Durability, and Satisfaction
    body: >
      No public net revenue retention (NRR), gross revenue retention (GRR), or cohort renewal data exists for
      Tenstorrent as of May 2026. This gap is expected for a company whose primary commercial product (Galaxy Blackhole)
      entered general availability only weeks before this report's reference date. The absence of data is therefore a
      timing artifact rather than a red flag, but it means any retention assessment must rely on indirect proxies. The
      most credible proxy for stickiness is re-engagement across hardware generations: LG AI Research's continued use of
      Tenstorrent silicon across both the Wormhole and Blackhole generations indicates a multi-year commitment. Koyeb's
      production deployment similarly represents a durable integration decision—cloud providers do not typically onboard
      hardware partners on a short-term trial basis due to the operational cost of rearchitecting inference backends.
      Developer-side satisfaction is mixed: the tt-metal GitHub repository shows 3,488 open issues as of April 2026, a
      volume suggesting active community engagement but also a meaningful backlog of known software defects and missing
      capabilities. A November 2025 review in The Register assessed Tenstorrent's software as "not polished enough for
      most local AI enthusiasts," citing configuration friction and incomplete driver documentation. This review
      represents the only substantial independent third-party product evaluation available and must be treated as the
      best current proxy for end-user satisfaction among non-captive customers. Fraunhofer Institute's continued
      research use of Tenstorrent hardware across multiple evaluation cycles provides a positive retention signal from
      the academic segment. Contract length for enterprise hardware deals (LG, Hyundai, SoftBank) has not been publicly
      disclosed. No NPS scores, customer satisfaction surveys, or support escalation data are in the public record.
    claimRefs:
      - CU010
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
      - CU027
