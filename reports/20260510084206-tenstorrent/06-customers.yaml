  - id: expansion-concentration-risk-and-strategic-alignment
    title: Expansion, Concentration Risk, and Strategic Alignment
    body: >
      Tenstorrent's customer concentration risk is unusually high for a company at its funding stage. Three of its five
      most-visible named customers (LG AI Research, Hyundai Motor Group, SoftBank) are also equity investors from the
      Series D round. While this alignment can accelerate roadmap co-development and reduce sales cycle friction, it
      creates two material risks: (1) investor-customers may prioritize return on equity over honest product feedback,
      muting the market signal that should guide roadmap decisions; and (2) if any strategic investor partner reduces or
      exits its position, the corresponding customer relationship may simultaneously weaken, creating correlated revenue
      and equity risk. On the positive side, several customers have multi-generational upgrade potential. The Galaxy
      server's modular architecture enables cluster expansion (add-on chassis), and Koyeb's HaaS model scales with
      end-user inference demand. LG and Hyundai represent potential anchor accounts for next-generation silicon. The
      land-and-expand model is structurally sound but has not yet been demonstrated in practice: no announced case of a
      customer expanding beyond an initial purchase has been disclosed. Channel and procurement friction is another
      meaningful risk. Enterprise hardware procurement through traditional OEM channels does not yet exist for
      Tenstorrent; customers purchase directly or through Koyeb's cloud layer. DoD procurement interest (CHIPS Act
      alignment, domestic AI chip sourcing) offers an alternative high-value channel but brings compliance complexity.
      ITAR and EAR implications for Tenstorrent's dual-use AI hardware have not been publicly addressed. Competitor
      pressure from NVIDIA's H100/H200 installed base creates high switching costs for potential customers already
      invested in the CUDA ecosystem, with Tenstorrent's TT-Metalium offering a functionally different but less-mature
      programming model.
