  - id: named-customer-proof
    title: Named Customer Proof
    body: >
      The named customer reference set is small by enterprise hardware standards but notable for the caliber of
      organizations involved. Koyeb provides the clearest arms-length customer proof: the French cloud startup publicly
      announced Tenstorrent Blackhole p150 availability on its HaaS platform, completing a production deployment that
      customers can purchase today. This is the only confirmed case of an independent (non-investor) commercial customer
      deploying Tenstorrent silicon for revenue-generating workloads. LG AI Research represents a strategic
      partner-customer: backed by LG Technology Ventures (Series D lead), LG AI Research uses Tenstorrent chips for AI
      inference and training R&D. The relationship predates the Galaxy launch and spans both Wormhole and Blackhole
      generations, suggesting multi-generational commitment. Hyundai Motor Group's interest is focused on automotive
      AI—on-vehicle processing for autonomous driving assistance systems—and is enabled by the Series D strategic
      investment that aligns roadmaps. SoftBank's Japan AI infrastructure agreement, disclosed in association with its
      participation in the Series D funding round (January 2025 announcements), involves deployment of Tenstorrent AI
      chips for SoftBank's data center expansion. The scale and timeline of that deployment remain undisclosed.
      Fraunhofer Institute (Germany) is cited as an early Wormhole adopter in European academic and industrial research.
      Academic proof from MIT, Stanford, and CMU covers hardware evaluation and model research, not production
      workloads. The Jaguar Land Rover association has been mentioned in automotive AI compute contexts but lacks a
      specific confirmed deployment announcement. In aggregate, the named proof set is thin for a company seeking
      enterprise hardware credibility: one arms-length HaaS customer, three investor-aligned customers, and one national
      infrastructure partner—all prior to Galaxy's GA date.
    claimRefs:
