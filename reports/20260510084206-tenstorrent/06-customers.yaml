chapter:
  number: 6
  title: Customers
  summary: >
    Tenstorrent's customer base in May 2026 is predominantly pre-commercial: the developer community (~5,000 DevCloud
    registrants) provides ecosystem signal, while the named commercial reference set is anchored by strategic investors
    doubling as anchor customers (LG AI Research, Hyundai Motor Group), a cloud-HaaS partner (Koyeb), and a disclosed
    national infrastructure deal (SoftBank Japan). The Galaxy server only reached general availability in April 2026,
    making any retention or NRR data premature. Adoption trajectory is promising but heavily seeded—concentration in
    investor-customers and absence of arms-length enterprise proof are the primary diligence concerns. No public NRR,
    GRR, or renewal data exists; software maturity remains the dominant friction point cited by independent reviewers.
sections:
  - id: customer-segmentation-and-buyer-profile
    title: Customer Segmentation and Buyer Profile
    body: >
      Tenstorrent's addressable customer base spans three distinct buyer archetypes at this stage of the company's
      commercialization. The first is the independent developer or research lab: individuals and teams evaluating
      Blackhole cards ($999–$3,499) or accessing DevCloud, motivated primarily by open-source tooling curiosity, RISC-V
      research, or cost-efficient LLM inference experimentation. As of Q1 2026, Tenstorrent reported approximately 5,000
      registered DevCloud accounts, a metric that counts sign-ups rather than active monthly users. The second archetype
      is the strategic enterprise partner—organizations that are simultaneously investors in Tenstorrent and early
      adopters of its silicon. LG AI Research (backed by LG Technology Ventures, which led the Series D) and Hyundai
      Motor Group (a Series D strategic investor) fall squarely in this category, using Blackhole for AI inference and
      automotive AI compute respectively. This dual investor-customer relationship accelerates early adoption but
      introduces a governance ambiguity: the incentive to purchase is partly shaped by equity ownership rather than
      purely arms-length product evaluation. The third archetype is the cloud or infrastructure provider who resells
      Tenstorrent capacity as a service. Koyeb, a French cloud startup, became the first publicly confirmed cloud HaaS
      partner, offering Tenstorrent Blackhole p150 inference capacity billed per token/second. SoftBank's disclosed
      agreement to deploy Tenstorrent chips in its Japanese data center expansion represents the largest disclosed
      commercial deal and fits an infrastructure-operator archetype. Geographically, early adoption concentrates in
      North America (DevCloud, academic partners), South Korea (LG, Hyundai), Japan (SoftBank), and Western Europe
      (Koyeb, Fraunhofer Institute). By vertical, the primary use cases are enterprise AI inference, automotive
      on-vehicle AI, academic research, and cloud infrastructure provision. No disclosed SMB or mid-market customer base
      exists, consistent with the product's current enterprise price points ($110,000 per Galaxy chassis).
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
    tableRefs:
      - TU001
  - id: adoption-trajectory-and-developer-ecosystem
    title: Adoption Trajectory and Developer Ecosystem
    body: >
      Tenstorrent's adoption trajectory is best understood as a two-speed flywheel: a fast-growing but shallow developer
      funnel feeding a slow-converting but high-value enterprise pipeline. The DevCloud program, launched with Wormhole
      hardware and extended to Blackhole in late 2025, has accumulated approximately 5,000 registered developers by Q1
      2026. GitHub activity on the primary tt-metal repository reflects this momentum: more than 25,830 commits, 1,410+
      stars, and 19,076 merged pull requests as of April 2026. However, the developer funnel to enterprise conversion
      remains unproven: Tenstorrent has not disclosed how many DevCloud users have subsequently purchased hardware or
      converted to paid enterprise engagements. The Galaxy Blackhole server reached general availability only on April
      28, 2026—weeks before this report's reference date—making it too early to measure repeat order rates or cluster
      expansion in production deployments. The Wormhole predecessor product had a longer runway: the QuietBox
      workstation (Wormhole-based, ~$12,000) was available from mid-2024. Academic engagement (MIT, Stanford, CMU
      research groups) is confirmed via Tenstorrent Developer Day coverage, but purchases remain small-scale (individual
      cards or devkits). Tenstorrent's stated 90% pass rate on HuggingFace model benchmarks and claimed compatibility
      with 2.5 million open-source models serve as demand-side adoption drivers, though these claims lack independent
      verification. The opening of the Galaxy platform creates a new adoption pathway for hyperscaler-adjacent
      customers, with at least one unnamed hyperscaler-tier interest reported in trade press.
    claimRefs:
      - CU001
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
