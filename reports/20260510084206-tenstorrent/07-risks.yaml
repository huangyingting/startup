localEvidence:
  researchQuestions:
    - id: QR001
      question: "Which specific BIS Advanced Computing export control rules apply to Tenstorrent's Blackhole chip, and does Blackhole's FP8 FLOPS rating exceed the relevant thresholds?"
      type: enumeration
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
