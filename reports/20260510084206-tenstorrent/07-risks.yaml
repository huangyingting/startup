company:
  name: Tenstorrent

chapter:
  number: 7
  title: Risks
  summary: >
    Tenstorrent faces a risk profile that is elevated across all five major
    dimensions: regulatory/legal, operational/supply-chain, technology/competitive,
    financial, and people/governance. Export-control exposure is the highest-severity
    near-term risk: Blackhole's performance level likely approaches BIS advanced-
    computing thresholds, and no public compliance disclosure exists. TSMC sole-
    source dependency compounds operational risk by introducing geopolitical and
    capacity-constraint vectors. Software immaturity (3,488 open GitHub issues, The
    Register's adverse assessment) limits enterprise conversion and narrows the
    addressable market. Jim Keller's key-person concentration remains a governance
    red flag given prior short tenures. Financially, an estimated $25-50M/month burn
    rate and a $150-300M next-gen tape-out requirement compress runway from the Nov
    2025 Series E. Investor-customer duality (LG, Hyundai, SoftBank) creates circular
    dependency: losing any one investor-customer could cascade into both revenue and
    capital-cost shocks. Mitigations exist but most are embryonic; several thesis-
    break triggers are measurable and should be monitored quarterly.

sections:
  - id: regulatory-legal-risks
    title: "Regulatory and Legal Risks"
    body: >
      Tenstorrent's most acute near-term risk is export-control exposure. The US
      Bureau of Industry and Security (BIS) issued landmark Advanced Computing rules
      in October 2023 and expanded them in October 2024, establishing FLOPS and
      interconnect-bandwidth thresholds that determine whether an AI accelerator
      requires an export license to sell into China, Russia, and a growing list of
      restricted destinations. Tenstorrent's Blackhole chip delivers 664 TFLOPS at
      FP8, and the BIS rules apply to chips with performance densities above specified
      thresholds or with on-chip interconnect performance above certain limits.
      Tenstorrent has not publicly disclosed whether Blackhole triggers these
      thresholds, whether it has obtained any export licenses, or whether its
      distribution channels perform end-use screening. The Federal Register rule 2023-
      25073 (effective December 2023) and subsequent October 2024 expansion
      substantially broadened the country and technology scope of restrictions. A
      violation of the Export Administration Regulations (EAR) carries criminal
      penalties of up to $1M per violation and up to 20 years imprisonment, plus
      civil fines of up to $364,992 per violation. Separately, the EU AI Act (enacted
      August 2024) classifies AI systems by risk tier and may impose conformity
      assessment, transparency, and documentation requirements on AI hardware
      providers selling into the EU. While the Act primarily targets AI software
      systems, hardware marketed as purpose-built AI accelerators could face
      regulatory scrutiny under evolving Commission implementing acts. RISC-V export
      control risk adds a second regulatory vector: US lawmakers debated restricting
      RISC-V IP licensing to Chinese companies in 2024, and although no blanket
      prohibition was enacted, the regulatory uncertainty creates legal exposure for
      Tenstorrent's Beijing office and RISC-V-based IP licensing activities. On the
      IP litigation front, NVIDIA holds more than 10,000 AI and GPU-related patents;
      while no litigation against Tenstorrent is currently on the public record,
      this overhang is material for any AI chip startup. Jim Keller's history of
      moves across Intel, AMD, Apple, and Tesla creates risk of IP claims from former
      employers, though no claims have been filed as of May 2026. Synopsys and Cadence
      EDA tool licensing agreements are critical dependencies: any breach or non-
      renewal would halt chip design.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008

  - id: operational-supply-chain-risks
    title: "Operational and Supply Chain Risks"
    body: >
      TSMC is Tenstorrent's sole wafer fabrication source for Blackhole (6nm node)
      and the dominant foundry for future generations. This sole-source dependency
      creates catastrophic exposure to three independent risk vectors: Taiwan
      geopolitical disruption (potential People's Republic of China military action),
      TSMC internal operational events (earthquake, fire, contamination), and capacity
      allocation constraints (TSMC prioritizes Apple, NVIDIA, and AMD, which
      collectively consume a disproportionate share of leading-edge capacity).
      Tenstorrent has no disclosed secondary fab source or multi-source qualification
      with Samsung or Intel Foundry for its leading-edge node. Memory supply for
      Blackhole (32GB GDDR6) depends on Samsung, SK Hynix, and Micron — suppliers who
      preferentially allocate HBM capacity to NVIDIA and AMD. GDDR6 supply is less
      constrained than HBM, but price spikes or allocation cuts in a memory cycle
      downturn could affect Blackhole margins. Software quality is itself an
      operational risk: The Register's November 2025 review of the Blackhole QuietBox
      concluded that Tenstorrent's software was "simply not polished enough for most
      local AI enthusiasts." As of April 2026, the tt-metal GitHub repository shows
      3,488 open issues and 988 open pull requests — metrics that signal significant
      unresolved bug backlog and review bandwidth constraints. Long chip-design cycles
      (18-24 months from specification to tape-out) mean Blackhole's successor is
      already locked by late 2026. If Blackhole underperforms commercially, there is
      no mid-cycle correction available. Security risk is embedded in the open-source
      model: TT-Metal/TT-Metalium are MIT-licensed, which means any security
      vulnerabilities in the stack are publicly exposed and exploitable before patches
      are issued.
    claimRefs:
      - CR009
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
      - CR016

  - id: technology-competitive-risks
    title: "Technology and Competitive Risks"
    body: >
      Tenstorrent's core technology risk is CUDA ecosystem lock-in. NVIDIA has built
      a 20-year moat of CUDA libraries, frameworks, and developer tooling; migrating
      AI workloads to Tenstorrent's TT-Forge/TT-Metal stack requires developers to
      re-instrument model code, re-validate numerical precision, and re-train
      operations teams. Even if Tenstorrent's hardware outperforms NVIDIA on raw
      throughput-per-dollar, ecosystem switching costs can be prohibitive for
      enterprise customers. NVIDIA's H100/H200 and Blackwell (B200) products dominate
      the AI training market, and CUDA's grip on training workloads is nearly
      absolute. Tenstorrent has explicitly positioned Blackhole as an inference
      accelerator, conceding the training market. This inference focus limits
      addressable market share. Competitors in inference — Groq (LPU architecture),
      Cerebras (wafer-scale), SambaNova, and AMD MI300X — are actively competing for
      the same inference workloads. Google's TPU v5 provides strong in-house
      inference capability for Google Cloud customers. Intel Gaudi 3 (acquired through
      Habana Labs) gives hyperscalers an alternative to NVIDIA inference at potentially
      lower cost. Software maturity is the recurring theme in independent technical
      assessments: Tenstorrent cannot close large enterprise deals without a software
      stack that reduces integration friction to comparable levels. The gap between
      claiming 90% HuggingFace model compatibility and production-grade enterprise
      support is non-trivial. Additionally, next-generation chip development risk
      is high: TSMC yield issues, architectural missteps, or design-for-manufacturing
      errors in Blackhole's successor could set the company back 18-24 months,
      during which NVIDIA will release Rubin and subsequent generations.
    claimRefs:
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
      - CR022
      - CR023

  - id: financial-capital-risks
    title: "Financial and Capital Risks"
    body: >
      Tenstorrent raised $693M in its Series D (December 2024) and an additional
      ~$800M in a reported Series E (November 2025). Despite this substantial capital
      position, the company's burn rate is estimated at $25-50M per month, implying
      a runway of approximately 16-32 months from the Series E close. The next-
      generation chip tape-out at TSMC is estimated to cost $150-300M — a significant
      portion of cash reserves. Revenue remains undisclosed; algorithmic third-party
      estimates of $501M for FY2025 are unreliable and should not be used for
      underwriting. The $150M in signed contracts (as of December 2024) represents
      backlog, not recognized revenue, and conversion rate from backlog to cash
      collection in hardware deals depends on customer acceptance testing, delivery
      schedules, and quality assurance milestones. Gross margins on custom AI
      hardware are structurally compressed: TSMC wafer costs, GDDR6 DRAM, board-level
      assembly, and logistics consume a substantial portion of revenue before any
      R&D, sales, or G&A allocation. No path to profitability has been publicly
      articulated. Capital intensity risk is compounded by the investor-customer
      concentration: LG, Hyundai, and SoftBank are simultaneously the largest known
      customers and among the largest investors. If any of these entities reduces its
      investment posture (due to their own financial pressures or strategic shifts),
      Tenstorrent would simultaneously lose revenue and signal reduced insider
      confidence — a catastrophic double-impact. Working capital risk is material:
      enterprise hardware deals are typically Net-60 to Net-90, while wafer payments
      are advance or short-term credit, compressing cash conversion cycles.
    claimRefs:
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031

  - id: people-governance-mitigations
    title: "People, Governance, and Mitigations"
    body: >
      Jim Keller's concentration as CEO, lead architect, and primary investor
      relations spokesperson represents the highest-severity people risk in the
      Tenstorrent risk portfolio. His track record includes Intel (2017-2018, ~2
      years), Tesla (2016-2018, ~2 years), and Apple (2008-2012, ~4 years) — a
      pattern of high-impact but time-limited engagements. A Keller departure would
      trigger a severe confidence shock among investors (particularly Samsung, who
      has explicitly cited Keller in board-level communications) and customers. No
      succession plan has been disclosed. The engineering talent retention risk is
      elevated: recruiting from Intel and AMD engineers who have signed non-competes
      creates litigation exposure, and Tenstorrent competes for the same chip
      design talent pool as Apple Silicon, Google TPU, and NVIDIA's growing
      custom silicon team. The estimated 1,100-1,200 person headcount (mid-2026)
      for a company this capital-intensive creates organizational scale risk if
      growth is not matched by revenue. Mitigations deployed to date include:
      the open-source software stack reducing customer switching costs in theory
      (but in practice increasing security exposure); geographic diversification
      of offices (Toronto, Austin, Belgrade, Tokyo, Bengaluru, Seoul); IP licensing
      revenue from Tensix and Ascalon RISC-V CPU IP providing a non-hardware revenue
      stream; and the DevCloud freemium model reducing initial customer friction.
      Kill criteria include: (1) BIS enforcement action or export license denial for
      Blackhole in a key market; (2) TSMC wafer allocation cut of more than 30%;
      (3) Jim Keller departure within 18 months; (4) failure to raise next financing
      round before runway drops below 6 months; (5) CUDA-competitive software stack
      not achieved by end of 2027. Diligence asks include: export control counsel
      opinion on Blackhole's BIS classification, data room evidence of TSMC capacity
      commitments, Jim Keller equity vesting schedule, and audited revenue recognition
      policy.
    claimRefs:
      - CR032
      - CR033
      - CR034
      - CR035
      - CR036
      - CR037
      - CR038
      - CR039
      - CR040
      - CR041

