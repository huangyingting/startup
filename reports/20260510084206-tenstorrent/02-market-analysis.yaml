  - id: sizing-gaps
    title: Sizing Gaps, Contradictory Estimates, and Diligence Asks
    body: >
      The single largest analytical gap in this chapter is the absence of a defensible SOM for Tenstorrent.
      The $150M in disclosed signed contracts (December 2024) represents the only public data point.
      Revenue and market penetration figures that would allow bottoms-up SOM construction are unavailable
      as a private company.

      Analyst TAM estimates for the AI chip market in 2026 diverge by a factor of 2–3× depending on scope:
      conservative accelerator-only definitions yield ~$200–270B; broader definitions (including AI memory
      and data center infrastructure) yield $477B–$500B. McKinsey's methodology for the semiconductor
      industry suggests even the largest estimates may undercount captive production and Chinese supplier
      revenues by as much as 30–40%.

      The inference/training split is also contested: while inference is projected to exceed two-thirds
      of compute by 2026 across most forecasts, the precise monetized revenue split depends on pricing
      structures not publicly disclosed by cloud providers. Neocloud margins and hardware pricing remain
      opaque, making neocloud-specific chip procurement volumes difficult to verify.

      For Tenstorrent, two specific sizing diligence asks apply: (1) the breakdown of the $150M signed
      contract portfolio by customer type, segment, and product generation; and (2) whether RISC-V Ascalon
      licensing has generated material revenue as of the 2026 diligence date—Tenstorrent's IP licensing
      business is strategically significant but its contribution to the $150M figure is not disclosed.
    claimRefs:
      - CM035
      - CM036
      - CM037
      - CM038

