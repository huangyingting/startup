  - id: buyer-segmentation
    title: Buyer Segmentation and Adoption Path
    body: >
      The AI accelerator market segments into five buyer archetypes with materially different budget
      ownership, procurement authority, and AI chip adoption behavior.

      Hyperscalers (Amazon AWS, Google Cloud, Microsoft Azure, Meta) dominate demand: the five largest
      hyperscalers are expected to spend $650–700B on AI infrastructure in 2026, of which approximately
      70–75% is AI-specific. They set reference prices and supply terms. Hyperscalers also build custom
      silicon internally (Google TPU, Amazon Trainium/Inferentia) and are not a near-term market for
      Tenstorrent's commercial hardware. However, RISC-V IP licensing to hyperscaler SoC teams represents
      a longer-term pathway.

      Neoclouds (CoreWeave, Lambda Labs, Crusoe, Nebius, ai&co, Cirrascale, Turium, Virtu Financial AI,
      Prodia) are Tenstorrent's primary commercial beachhead as of May 2026. Futurum Group confirmed
      Galaxy Blackhole deployments with at least five neocloud co-locations by May 2026. The neocloud
      segment is projected to generate approximately $20B in revenue in 2026, growing to $180B by 2030.
      Neoclouds are actively evaluating non-NVIDIA chips to reduce GPU dependency and find cost advantage
      in inference.

      Enterprise buyers (finance, healthcare, manufacturing, automotive OEMs) increasingly use cloud AI
      services rather than on-premise GPU clusters. Average enterprise LLM spend reached $7M/year in 2025,
      nearly triple the 2024 level. Most enterprises buy AI compute through hyperscalers, limiting direct
      chip procurement opportunity for Tenstorrent in the near term. However, Korean OEM partners—Hyundai,
      Samsung, LG—as strategic investors represent a high-value enterprise adoption pathway.

      Edge/embedded buyers (autonomous vehicle OEMs, IoT device makers, industrial automation vendors)
      are a longer-horizon market that Tenstorrent addresses through RISC-V edge IP. The edge inference
      market is growing at similar CAGR (~19%) to cloud inference and represents a product-market fit for
      Tenstorrent's forthcoming edge silicon.

      RISC-V IP licensees are a distinct customer type: chipmakers and system OEMs that license the
      Ascalon RISC-V CPU core for embedding in SoCs. Budget control sits with semiconductor procurement
      or IP sourcing teams in those organizations, not AI infrastructure teams.
    claimRefs:
      - CM017
