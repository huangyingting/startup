    title: AI Accelerator Market — TAM / SAM / SOM Sizing Layers
    type: pyramid
    description: >
      Three-layer pyramid showing TAM (broadest AI chip market), SAM (non-NVIDIA AI accelerators addressable
      by alternative vendors), and SOM (Tenstorrent's realistically capturable share based on current
      neocloud and IP licensing deployments). Values are 2026 estimates with source-backed bounds.
    approximationNotes: >
      TAM uses Gartner AI processing semiconductor estimate ($268B) as base. SAM derived as ~20% of
      TAM based on NVIDIA's ~80% share. SOM uses disclosed $150M contract pipeline as a floor; realistic
      addressable share is estimated low–mid single-digit percent of SAM in neoclouds and RISC-V IP
      licensing combined. All values are estimates with wide confidence intervals.
