sections:
  - id: market-boundary
    title: Market Boundary and Definition
    body: >
      Tenstorrent competes in the AI accelerator chip market, defined here as discrete processors—GPUs,
      NPUs, and custom ASICs—designed specifically to accelerate AI training and inference workloads in
      data center, cloud, neocloud, enterprise, and edge deployments. This chapter uses the AI accelerator
      chip market as the primary unit of analysis, accepting that analyst definitions vary materially
      across sources.

      Included spend covers: AI-specific processor silicon (discrete PCIe cards, OAM modules, multi-chip
      modules), complete AI server systems where the accelerator represents the primary value driver, and
      RISC-V IP licensing as an adjacent revenue stream for Tenstorrent's Ascalon core. Excluded spend
      covers: high-bandwidth memory (HBM/GDDR treated as a separate commodity market), standard CPU
      silicon, networking switch chips, AI software subscriptions (MLOps, APIs), and server chassis,
      power, and cooling infrastructure.

      The primary adjacent market is RISC-V processor IP licensing, which Tenstorrent enters through its
      Ascalon 64-bit RISC-V CPU core. The RISC-V IP market was approximately $580M in 2025 and is
      projected at $720M in 2026 (12.1% CAGR per Intel Market Research). The status-quo substitute for
      the primary market is NVIDIA's GPU product line (H100, H200, Blackwell B100/B200/GB200 series),
      which commanded roughly 80% of AI accelerator chip revenue in 2025.

      Market boundaries matter for Tenstorrent's valuation because the SOM is a function of which buyer
      segments can practically adopt a non-CUDA chip today. Hyperscalers are largely locked into NVIDIA
      or building custom silicon. Neoclouds, sovereign compute programs, and early-adopter enterprise AI
      labs represent the realistic beachhead.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006

  - id: market-sizing
    title: Market Sizing — TAM, SAM, and Analytical Contradictions
    body: >
      The AI accelerator chip market has generated a wide and contradictory range of TAM estimates for
      2025–2026. Analyst scope differences are the primary driver of disagreement: Gartner projects $268B
      in AI processing semiconductor revenue for 2026 (a ~30% share of its $1.3T total semiconductor
      forecast), while IDC puts data center semiconductor revenue alone at $477B for the same year. Fortune
      Business Insights sizes the dedicated AI accelerator market at $137B–$180B for 2025–2026 (narrower
      scope, training + inference accelerators only). Deloitte's 2026 semiconductor outlook estimates
      generative-AI chip revenue at approximately $500B—the broadest definition, including AI-adjacent
      memory and networking.

      These contradictions are preserved and quantified in the sizing table below. The most conservative
      defensible TAM for AI accelerators (discrete inference + training silicon) is approximately
      $200–$270B for 2026. The SAM for non-NVIDIA AI accelerators is derived by applying NVIDIA's
      approximately 80% market share: SAM = ~$40–$54B in the conservative TAM range, or ~$40–$100B under
      broader definitions.

      The AI inference sub-market is a critical lens for Tenstorrent. MarketsandMarkets sizes AI inference
      at approximately $106B in 2025 growing to $117–$120B in 2026 at a 19% CAGR to reach $255B by 2030.
      Inference is overtaking training as the dominant compute budget driver: by 2026, approximately
      two-thirds of AI compute is estimated to be inference-driven, versus one-third in 2023. Tenstorrent's
      Galaxy Blackhole competes specifically in the AI inference market and has demonstrated
      cost-competitive inference (DeepSeek at $6/M tokens, 308 tokens/sec/user).

      The RISC-V IP market adds a second revenue dimension. Global Market Insights projects the total RISC-V
      technology market at $1.35B in 2025 and $1.91B in 2026 at 30–41% CAGR. The narrower RISC-V CPU IP
      licensing market is ~$580M in 2025 and ~$720M in 2026 (12.1% CAGR per Intel Market Research). The
      broader segment is growing due to AI/ML edge adoption, automotive ADAS, and geopolitical drivers
      in Korea, Japan, China, and the EU.

      Tenstorrent's SOM cannot be established from public sources alone. The company disclosed ~$150M in
      signed contracts as of December 2024, suggesting low-single-digit market penetration in its targeted
      segments. Realistic SOM modeling requires private contract data and deployment volumes not publicly
      available.
    claimRefs:
