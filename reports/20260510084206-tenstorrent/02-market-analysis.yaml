  - id: growth-drivers-constraints
    title: Growth Drivers and Adoption Constraints
    body: >
      Growth drivers for the AI accelerator market are strong and well-evidenced. The generative AI
      inference explosion is the dominant driver: by 2026, approximately two-thirds of AI compute will
      be inference-driven, creating persistent high-volume demand for inference-optimized silicon. NVIDIA
      GPU supply is severely constrained through at least 2027 due to TSMC CoWoS advanced packaging
      bottlenecks and HBM3e supply limits, creating structural demand for alternatives. Geopolitical
      compute sovereignty requirements—particularly in Korea (Samsung, LG, Hyundai), Japan (SoftBank
      partner ai& is Tenstorrent's largest Galaxy Blackhole deployment), and the EU—generate buyer
      appetite for non-American chip options. Power efficiency is an increasingly critical axis as data
      center power density limits are reached; Tenstorrent claims competitive performance per watt.

      Adoption constraints for Tenstorrent specifically include: CUDA ecosystem lock-in (the primary
      structural constraint—NVIDIA's CUDA/cuDNN libraries require significant software rewrite to migrate
      to any alternative), software immaturity of TT-Metal/TT-Metalium relative to production-grade
      CUDA (confirmed adversely by The Register, November 2025), capital intensity of semiconductor
      development (chips require multi-year development cycles and hundreds of millions in TSMC/Samsung
      fabless costs), and HBM supply as a shared bottleneck across all chip vendors.

      The RISC-V licensing constraint is the ARM IP incumbent: Arm Holdings dominates embedded CPU IP
      licensing with superior software ecosystem and toolchain maturity. RISC-V-based alternatives (SiFive,
      Tenstorrent Ascalon) face toolchain gaps despite rapid ecosystem improvement.
