companyProfile:
  summary: >-
    Tenstorrent is a San Jose-based AI chip company founded in 2016 by Jim
    Keller (CPU architect behind AMD Zen and Apple A-series). The company
    designs the Blackhole ASIC — a TSMC 6nm chip with 120 proprietary Tensix
    cores and 16 big RISC-V processors — targeting high-performance AI
    inference and edge deployment. Tenstorrent has raised ~$1.99B across five
    rounds (most recently $800M Series E at $3.2B valuation in Nov 2025) from
    strategic investors including Samsung Securities, LG Technology Ventures,
    Hyundai Motor Group, and Fidelity. The company's differentiated RISC-V
    architecture avoids ARM licensing fees and enables an open-source software
    stack (TT-Metal, TT-Forge, Apache 2.0) aimed at breaking NVIDIA's CUDA
    ecosystem lock-in.
  foundedDate: "2016-01-01"
  founders:
    - name: Jim Keller
      role: CEO / President
      background: >-
        Former VP Architecture at AMD (Zen), lead architect of Apple A4/A5,
        senior director at Intel; serial CPU design pioneer.
    - name: Ljubisa Bajic
      role: SVP Engineering
      background: >-
        Co-founder; formerly at AMD; deep hardware architecture background.
  foundingLocation: Toronto, Canada
  headquarters: San Jose, CA, USA
  productSummary: >-
    AI accelerator hardware (Blackhole p100a/p150a/p150b PCIe cards; Galaxy
    Blackhole 6U server) and open-source ML software stack (TT-Metal/TT-NN
    runtime, TT-Forge MLIR compiler, TT-Metalium programming model). Galaxy
    server reached GA April 2026 at ~$110K/chassis; also licensing RISC-V
    Tensix Neo IP to OEMs.
  customerFocus: >-
    AI/ML inference workloads; hyperscalers and cloud providers (secondary);
    automotive AI (Hyundai, JLR); enterprise AI infrastructure; research
    institutions and developers via DevCloud.
  businessModel: >-
    Hardware product sales (PCIe cards, Galaxy servers); cloud HaaS via
    partners (Koyeb); RISC-V IP licensing to OEMs; developer ecosystem
    (open-source with commercial support).
  stage: Series E
  fundingStatus: >-
    $800M Series E (Nov 2025, $3.2B post-money, Fidelity-led); $693M Series D
    (Dec 2024, $2.6B post-money); ~$1.99B total raised.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CI001, CI007, CI008, CE001, CE018]

