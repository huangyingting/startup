      - number: '4.5'
        title: 财务结论与尽调阻塞点
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的财务画像是高风险、高上行。正面看，公司资金充足（累计融资约 $1.99B，Series E 资金从 2025 年 11 月起估计提供 16–32
              个月现金跑道），已公开发布定价具备竞争力的 AI 推理服务器系统（Galaxy Blackhole，$110,000/台），并声称相较 NVIDIA 旗舰 GB300 集群有 5× 每 token
              成本优势。反面看，公司不披露经审计收入、毛利率、销售成本（COGS）或烧钱速度。第三方收入估计（Latka 模型，2025 年 $501.6M）是算法猜测，不是经验证数字，也被视为不足以支持投资决策。约
              $150M 已签合同数字（截至 2024 年 12 月）仅为累计融资额的约十三分之一。The Register 2026 年 4 月对 Galaxy
              发布的评测质疑，软件和生态成熟度是否足以推动企业快速采用。关键尽调阻塞点：（1）未披露财务——收入、毛利率、现金位置；（2）没有客户集中度数据——单一客户取消就可能构成重大影响；（3）IP
              授权经济性不透明——权利金率和量承诺未披露；（4）烧钱速度和现金跑道只能靠估计验证；（5）已签合同积压订单的收入确认时间线不清晰。在这些缺口通过经审计数据室解决前，财务尽调并不完整，本财务章节应被视为风险分层文件，而不是已验证财务模型。
