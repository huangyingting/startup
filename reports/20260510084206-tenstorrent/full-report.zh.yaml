      - number: '8.5'
        title: 退出准备度、尽调问题与破局触发条件
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Tenstorrent 还没有达到 IPO 条件。关键准备缺口包括：尚未公开任命具备机构级报告经验的 CFO；未披露 FY2024 或 FY2025
              经审计财务报表；没有能锚定企业市场可信度的超大规模云厂商设计定点；软件栈已有质量问题记录， 会招致机构投资者审查。Arm Holdings 2023 年 IPO 是参照基准：提交 S-1
              招股说明书、披露多年经审计收入、 毛利率高于 90%，且 IP 授权收入可见度清晰。按这个门槛，Tenstorrent 目前还达不到。

              并购更可能是近期退出路径。潜在战略买家包括 Qualcomm（AI 边缘芯片）、Samsung（与代工结合的 AI）、 Intel（定制 AI 硅片），以及 Arm Holdings 本身（RISC-V
              生态整合）。AI 芯片并购的收购溢价基准—— AMD/Xilinx 约 $35 billion（15x 收入，2022）和 Broadcom/VMware（$69 billion）——表明，
              在乐观情景下，Tenstorrent 以 $5–8 billion 被技术溢价收购并非不可能，但前提是拿出已经验证的商业牵引力。

              最终尽调清单（按优先级）：(1) FY2025 收入和毛利率，经审计或数据室验证——关键，30 天；(2) Blackhole 的 BIS 出口合规文件——关键，60 天；(3) 股权结构表，包含 Series
              D/E 优先权条款和清算瀑布——关键，30 天；(4) Galaxy 已签交付订单和客户部署时间表——高优先级，45 天；(5) Jim Keller 股权归属时间表和董事会继任机制——高优先级， 30
              天；(6) TSMC 产能协议和下一代节点认证时间表——高优先级，60 天。

              触发投资逻辑破裂、必须立即暂停投资的信号包括：Jim Keller 公开离职、BIS 对 Blackhole 采取执法行动、 确认烧钱速度超过每月 $60 million 且没有收入支撑、低于 $2.0
              billion 的降轮融资，或确认失去三大战略投资者兼客户中的任意一家。
            claimRefs:
              - CV026
              - CV028
              - CV035
              - CV036
              - CV037
              - CV038
