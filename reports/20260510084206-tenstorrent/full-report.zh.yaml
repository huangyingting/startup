  - id: FV004
    title: 投资 KPI
    type: kpi
    description: |
      投资委员会评分表，覆盖七个 IC 标准维度。星级表示当前证据加权得分（1 = 很弱，5 = 很强）。
    claimRefs:
      - CV001
      - CV005
      - CV006
      - CV013
      - CV019
      - CV026
      - CV040
    data:
      items:
        - label: 市场机会
          value: ★★★★☆
          detail: 2030 年 TAM $170B；推理细分增长最快；买方需求紧迫明确
        - label: 产品 / 技术差异化
          value: ★★★☆☆
          detail: Tensix + RISC-V 确实新颖；Galaxy GA 已交付；软件成熟度落后 CUDA 2–3 年
        - label: 客户 / 商业验证
          value: ★★☆☆☆
          detail: $150M 在手订单（收入未确认）；投资方兼客户集中；尚无超大规模云厂商设计导入
        - label: 财务可持续性
          value: ★★☆☆☆
          detail: 每月烧钱 $25–50M；现金跑道 16–32 个月；无经审计 P&L；FCF 盈亏平衡路径不清晰
        - label: 竞争护城河
          value: ★★☆☆☆
          detail: CUDA 生态是 15+ 年护城河；RISC-V 开放，因而可复制；Tensix IP 有差异化
        - label: 管理层与治理
          value: ★★★☆☆
          detail: Jim Keller 有愿景和信誉；未公开 CFO；投资方兼客户的双重身份带来治理隐患
        - label: 估值 / 入场价格
          value: ★★☆☆☆
          detail: $3.2B 相当于保守收入的 16–32x；收入未确认，却高于可比私营同行
