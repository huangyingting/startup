      - number: '4.4'
        title: 资本结构、现金跑道与融资依赖
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 多轮累计融资约 $1.99B。2024 年 12 月，公司完成 $693M Series D，投后估值 $2.6B，由 Samsung Securities 和 LG Technology
              Ventures 领投。2025 年 11 月，公司完成约 $800M Series E，投后估值 $3.2B，由 Fidelity Management and Research 领投。此前公司还在 2023
              年从 Hyundai Motor Group 和 Samsung 获得 $100M 融资。若按每月 $25M–$50M 经营烧钱速度估算，且收入未披露，Series E 资金从 2025 年 11 月起可提供约
              16–32 个月现金跑道——大体足以支撑公司跑到有意义的 Galaxy 硬件收入，但留给延误的缓冲有限。Series E 资金计划用于产能扩张、下一代芯片（Blackhole 之后）设计与流片，以及 GTM
              扩张。任何重大产品延迟、客户集中挫折或 TSMC 产能约束都会加速消耗现金跑道。公开信息未显示公司有债务融资或项目融资义务。公司也未说明任何盈利目标日期。考虑到半导体业务资本强度，如果 Galaxy
              硬件收入不能快速放量，Tenstorrent 可能需要在 Series E 完成后 24–36 个月内补充资金（Series F
              或基于收入的融资）。收入模型是否足够、毛利率轨迹能否跑通，是任何后续投资的主要尽调关口。
