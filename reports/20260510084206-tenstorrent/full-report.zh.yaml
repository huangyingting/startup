companyProfile:
  summary: >-
    Tenstorrent 是一家位于 San Jose 的 AI 芯片公司，由 Jim Keller（AMD Zen 和 Apple A-series 背后的 CPU 架构师）于 2016 年创立。公司设计 Blackhole
    ASIC——一颗 TSMC 6nm 芯片，集成 120 个自研 Tensix 核心和 16 个大型 RISC-V 处理器，面向高性能 AI 推理和边缘部署。Tenstorrent 五轮融资累计约 $1.99B（最近一轮为 2025
    年 11 月、估值 $3.2B 的 $800M Series E），投资方包括 Samsung Securities、LG Technology Ventures、Hyundai Motor Group、Fidelity
    等战略投资者。公司差异化的 RISC-V 架构绕开 ARM 授权费，并支撑 TT-Metal、TT-Forge、Apache 2.0 等开源软件栈，目标是打破 NVIDIA 的 CUDA 生态锁定效应。
