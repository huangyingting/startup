      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              AI 加速器市场的增长驱动强，证据也充分。生成式 AI 推理爆发是主导驱动：到 2026 年，约三分之二 AI 算力将由推理驱动，持续制造对推理优化硅片的大规模需求。受 TSMC CoWoS 先进封装瓶颈和
              HBM3e 供应限制影响，NVIDIA GPU 供给至少到 2027 年都严重受限，由此形成结构性替代需求。地缘政治下的算力主权要求——尤其在韩国（Samsung、LG、Hyundai）、日本（SoftBank
              伙伴 ai& 是 Tenstorrent 最大 Galaxy Blackhole 部署方）和欧盟——让买方更愿意考虑非美国芯片选项。数据中心功率密度触顶后，能效成为越来越关键的维度；Tenstorrent
              声称其每瓦性能具备竞争力。

              Tenstorrent 自身的采用约束包括：CUDA 生态锁定效应（首要结构性约束——从 NVIDIA CUDA/cuDNN 库迁移到任何替代方案，都需要大量软件重写）；TT-Metal/TT-Metalium
              相对生产级 CUDA 的软件不成熟（The Register 于 2025 年 11 月给出反向证据）；半导体开发资本强度高（芯片需要多年开发周期，以及数亿美元 TSMC/Samsung 无晶圆厂成本）；HBM
              供应也是所有芯片厂商共同面对的瓶颈。

              RISC-V 授权的约束来自 ARM IP 既有巨头：Arm Holdings 凭更强的软件生态和更成熟的工具链主导嵌入式 CPU IP 授权。尽管生态快速改善，基于 RISC-V
              的替代方案（SiFive、Tenstorrent Ascalon）仍存在工具链缺口。
