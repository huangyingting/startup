      - number: '7.2'
        title: 运营与供应链风险
        blocks:
          - type: paragraph
            body: >
              TSMC 是 Tenstorrent Blackhole（6nm node）的唯一晶圆制造来源，也是未来世代的主导晶圆厂。这个单一来源依赖带来三条独立风险向量上的灾难性暴露：Taiwan
              地缘政治中断（People's Republic of China 潜在军事行动）、TSMC 内部运营事件（地震、火灾、污染），以及产能分配约束（TSMC 优先服务 Apple、NVIDIA 和
              AMD，三者合计消耗了不成比例的先进制程产能）。Tenstorrent 没有披露针对先进制程节点的第二晶圆厂来源，也没有与 Samsung 或 Intel Foundry 做多来源认证。Blackhole
              的内存供应（32GB GDDR6）依赖 Samsung、SK Hynix 和 Micron——这些供应商会优先把 HBM 产能分配给 NVIDIA 和 AMD。GDDR6 供给比 HBM
              宽松，但在内存周期下行中，价格飙升或配额削减仍可能影响 Blackhole 利润率。软件质量本身也是运营风险：The Register 在 November 2025 对 Blackhole QuietBox
              的评测结论是，Tenstorrent 软件“对大多数本地 AI 爱好者来说就是不够打磨”。截至 April 2026，tt-metal GitHub 仓库有 3,488 个未关闭 issues 和 988
              个未关闭 PR——这些指标显示未解决 bug 积压很大，评审带宽也受限。芯片设计周期长（18-24 months 从规格定义到 tape-out），意味着 Blackhole 后继产品到 late 2026
              已经锁定。如果 Blackhole 商业表现不及预期，中途没有可用的修正窗口。开源模型内嵌安全风险：TT-Metal / TT-Metalium 采用 MIT
              许可证，任何安全漏洞都会在补丁发布前公开暴露并可能被利用。
