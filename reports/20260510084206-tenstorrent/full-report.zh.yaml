  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 所处市场是 AI 加速器芯片。本报告将其定义为专门加速数据中心、云、neocloud、企业和边缘部署中 AI 训练与推理工作负载的离散处理器，包括 GPU、NPU 和定制 ASIC。本章以
              AI 加速器芯片市场作为主要分析单元，同时承认不同来源的分析师定义差异显著。

              纳入支出包括：AI 专用处理器硅片（离散 PCIe 卡、OAM 模块、多芯片模块）、由加速器贡献主要价值的完整 AI 服务器系统，以及 Tenstorrent Ascalon 核心相邻收入流中的 RISC-V
              IP 授权。排除支出包括：高带宽内存（HBM/GDDR 视为独立商品市场）、标准 CPU 硅片、网络交换芯片、AI 软件订阅（MLOps、API），以及服务器机箱、供电和冷却基础设施。

              主要相邻市场是 RISC-V 处理器 IP 授权，Tenstorrent 通过 Ascalon 64-bit RISC-V CPU 核心进入该市场。RISC-V IP 市场 2025 年约 $580M，预计
              2026 年达到 $720M（Intel Market Research 口径 CAGR 为 12.1%）。主市场的现状替代品是 NVIDIA GPU 产品线（H100、H200、Blackwell
              B100/B200/GB200 系列），其在 2025 年约占 AI 加速器芯片收入的 80%。

              市场边界直接影响 Tenstorrent 估值，因为可获取市场（SOM）取决于哪些买方群体今天能现实采用非 CUDA 芯片。超大规模云厂商大多已被 NVIDIA
              锁定，或在自研定制硅片。neocloud、主权算力项目和早期采用型企业 AI 实验室，才是更现实的滩头阵地。
