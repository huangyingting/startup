      - number: '8.3'
        title: 融资背景与估值基准
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 自 2019 年以来通过六轮融资累计获得约 $1.99 billion：Seed（~$10 million，2019）、Series A（$40 million，2021）、Series
              B（$100 million，2022）、Series C（$235 million，2023）、Series D（$693 million，$2.6 billion 投后估值，December 2024）和
              Series E（$800 million，$3.2 billion 投后估值，November 2025）。Series D 由 Samsung Securities 领投，LG Technology
              Ventures 和 Hyundai 参投；Series E 由 Fidelity 领投。从 $2.6 billion 到 $3.2 billion 的快速估值上调（约 23% in 11
              months）发生在没有确认收入披露的情况下，说明该轮定价更多基于战略可选性和投资者需求，而不是基本面财务指标。

              清算优先权压力是实质担忧。Series D 投资者以 $2.6 billion 进入，Series E 投资者以 $3.2 billion 进入，均带有清算优先权；在熊市或困境情景下，如果退出估值跌破 $2.6
              billion，普通股股东和早期投资者会面临显著的瀑布分配缺口。具体优先权机制以及 participating vs. non-participating preferred
              结构未公开披露，缺少股权结构表就无法精确建模分配瀑布。

              从可比口径看，Tenstorrent 的 6.4x Latka EV/revenue（未确认）处于可比私营融资轮低端：Cerebras（16–28x）、SambaNova（10–17x）和
              Groq（~10x）。不过，如果采用 $100–200 million 的保守收入估计，Tenstorrent 隐含倍数升至 16–32x——达到或高于可比私营区间。公开市场锚点（Arm Holdings
              ~30x EV/revenue、NVIDIA ~26x、Marvell ~10x）表明，若确认收入达到 $200–300 million 且软件栈去风险，$3–5 billion
              估值可以支撑，但不是在当前证据水平下。NVIDIA FY2025 数据中心收入约 $115 billion（已在 SEC 10-K filing 中确认）以及 Arm Holdings FY2025 收入约
              ~$3.96 billion，为评估 AI 芯片硬件和 IP 授权倍数提供了公开市场锚点。
