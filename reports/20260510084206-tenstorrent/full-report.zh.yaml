  - id: FR001
    title: 风险热力图
    type: matrix
    description: |
      Tenstorrent 主要风险的可能性与影响热力图。单元格列出落在各个可能性-影响象限的风险。行表示可能性（越往下越低）；列表示影响（越往右越高）。颜色含义：右上角 = 严重，左下角 = 低。
    claimRefs:
      - CR001
      - CR009
      - CR017
      - CR024
      - CR032
      - CR042
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 严重影响
      rows:
        - label: 极高可能性
          values:
            - 无列示风险
            - 软件质量缺口；CUDA 生态锁定效应
            - 企业客户转化失败；Galaxy 认证延迟
            - 现金跑道顶不住烧钱速度
        - label: 高可能性
          values:
            - 无列示风险
            - 内存供应波动
            - 下一代芯片进度延期；竞争对手生态扩张
            - TSMC 产能受限（非危机）
        - label: 中等可能性
          values:
            - 轻微 IP 索赔
            - EDA 授权重新谈判
            - 新市场需 BIS 出口许可；EU AI Act 合规成本
            - Jim Keller 离任；台湾地缘政治扰动
        - label: 低可能性
          values:
            - 监管罚款（轻微）
            - 供应商价格冲击
            - NVIDIA 专利诉讼；RISC-V 出口禁令
            - TSMC 灾难性停摆；BIS 执法 / 产品禁令
