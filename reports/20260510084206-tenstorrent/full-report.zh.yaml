  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入架构与商业模式
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的收入模型由多条收入流组成：硬件产品销售、知识产权授权和云访问服务。不过作为私营公司，它不披露经审计财务。截至 2026 年 5 月，主要收入驱动是直接硬件销售，尤其是 Galaxy
              Blackhole AI 服务器系统及相关推理加速卡；这些产品在 2026 年 4–5 月进入量产并达到 GA。Galaxy Blackhole 服务器机箱标价为每台 $110,000（32 颗
              Blackhole ASIC、23 PFLOPS FP8），四机箱 Supercluster 定价 $440,000。企业和超大规模云客户预计会按量采购；折扣结构未公开披露。在 Galaxy
              层级之下，Tenstorrent 销售约 $999 的 Blackhole P100 入门推理卡，以及约 $9,999 的 QuietBox 工作站。第二条收入流是公司 RISC-V CPU 核心和 Tensix
              NPU 架构的 IP 授权，来自 Samsung、Hyundai 等汽车和边缘 OEM 伙伴的权利金收入；但授权经济性完全未披露。第三条新兴收入流是通过 Koyeb 无服务器平台交付的云端硬件即服务，按用量提供
              Tenstorrent 计算实例。DevCloud 开发者计划向开发者免费或按免费增值模式提供 Wormhole 硬件访问，未来可能转化为付费企业 DevCloud
              订阅。专业服务和集成支持目前是较小的第四条收入流。
