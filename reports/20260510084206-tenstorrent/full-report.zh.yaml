      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              AI 加速器市场可分为五类买方，它们的预算归属、采购权和 AI 芯片采用行为都明显不同。

              超大规模云厂商（Amazon AWS、Google Cloud、Microsoft Azure、Meta）主导需求：五大超大规模云厂商 2026 年预计在 AI 基础设施上支出 $650–700B，其中约
              70–75% 为 AI 专项支出。它们设定参考价格和供应条款。超大规模云厂商也在内部自研定制硅片（Google TPU、Amazon Trainium/Inferentia），因此短期内并不是
              Tenstorrent 商业硬件的市场。不过，向其 SoC 团队授权 RISC-V IP，是一条更长期路径。

              neocloud（CoreWeave、Lambda Labs、Crusoe、Nebius、ai&co、Cirrascale、Turium、Virtu Financial AI、Prodia）是截至 2026 年
              5 月 Tenstorrent 的主要商业滩头阵地。Futurum Group 确认，到 2026 年 5 月，Galaxy Blackhole 已部署在至少五个 neocloud 机房。neocloud
              细分市场预计 2026 年收入约 $20B，到 2030 年增长至 $180B。neocloud 正主动评估非 NVIDIA 芯片，以降低 GPU 依赖，并在推理中寻找成本优势。

              企业买方（金融、医疗、制造、汽车 OEM）越来越多使用云端 AI 服务，而不是本地部署 GPU 集群。2025 年企业 LLM 平均支出达到 $7M/年，接近 2024 年的三倍。多数企业通过超大规模云厂商购买
              AI 算力，限制了 Tenstorrent 近期直接芯片采购机会。不过，Hyundai、Samsung、LG 等韩国 OEM 伙伴也是战略投资者，构成高价值企业采用路径。

              边缘 / 嵌入式买方（自动驾驶汽车 OEM、IoT 设备制造商、工业自动化厂商）是更长期市场，Tenstorrent 通过 RISC-V 边缘 IP 覆盖。边缘推理市场增长速度与云端推理相近（CAGR 约
              19%），也与 Tenstorrent 未来边缘硅片形成产品市场匹配。

              RISC-V IP 被授权方是独立客户类型：芯片厂商和系统 OEM 授权 Ascalon RISC-V CPU 核心，并嵌入 SoC。预算控制权在这些组织的半导体采购或 IP 寻源团队，而不是 AI
              基础设施团队。
