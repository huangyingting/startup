      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >
              NVIDIA H100 GPU（单价 $27K–$40K）和 Blackwell B200/B300（$30K–$50K）以 CUDA 软件栈为锚，是主要竞争威胁。AMD Instinct MI300X 每块
              GPU 约 $15K–$20K，提供 192GB HBM3 VRAM，并配套逐步成熟的 ROCm 开源栈，因此成为领先的性价比 GPU 替代方案；其云租赁价格 $0.50–$7.86/hr，明显低于
              NVIDIA。Intel Gaudi 3 面向价格敏感型企业推理（比 H100 约便宜 50%），但商业牵引很弱，并已公开从训练市场转向。Cerebras CS-3 晶圆级引擎在 LLM 推理上达到
              1,000–2,000 tokens/sec，对大批量工作负载而言，吞吐量比 GPU 集群高一个数量级；公司以 OpenAI 为锚定客户，在 2026 年 2 月以 $23B 估值完成 $1B Series
              H。Groq LPU 为 Llama-70B 推理提供 300+ tokens/sec 和确定性延迟；据报道，Groq 在 2025 年末曾参与 NVIDIA
              收购讨论，其独立路线图因此存在不确定性。SambaNova SN40L 可重构数据流架构面向企业交钥匙推理；公司 2025 年末探索出售，同时 BlackRock 将其股份估值从 $5B 峰值下调至约
              $2.4B，随后在 2026 年 2 月完成由 Vista Equity 和 Intel 共同领投的 $350M+ Series E。Google Trillium（TPU v6）提供约 926 TFLOPS
              BF16，算力较 TPU v5e 提升 4.7×，已部署 100,000+ 芯片；Amazon Trainium3 提供 2.52 PFLOPS FP8，已量产
              500,000+；两者都以内用为主，对外可用性有限。
