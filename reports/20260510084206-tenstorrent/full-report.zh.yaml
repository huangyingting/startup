      - number: '4.2'
        title: 定价结构与 GTM 动作
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 在定价上的核心商业差异，不是原始标价，而是推理总成本效率。公司称，Galaxy Blackhole 系统在 DeepSeek-R1 671B 工作负载上每百万推理 token 成本为
              $6，而 NVIDIA GB300 GPU 系统约为每百万 token $30，即每输出 token 成本优势 5×。Galaxy 单服务器机箱 $110,000，瞄准的是持续吞吐和内存容量比峰值 FLOPS
              更重要的企业推理部署。GTM 动作以企业直销为主，渠道活动有限。早期部署包括 Tokyo 的 ai& Corporation、Cirrascale Cloud Services 和 Turium
              AI，显示其早期客户策略更像先播种云服务商，而非广泛直销 Fortune 500。企业 AI 基础设施销售周期通常为 3–12 个月，因此约 $150M 已签合同数字（2024 年 12 月 Series D
              完成时披露）更像管线积压订单，而非已确认收入。硬件按交付时点确认收入；若提供多年支持合同，则将按期确认。IP 授权权利金按每芯片或每期间确认。GTM
              效率指标——获客成本（CAC）、回本周期和渠道经济性——未公开披露，是重要尽调缺口。MIT 许可下的 TT-Metal 和 TT-Forge
              开源定位，充当开发者获客漏斗；但能否把开发者心智转化为企业硬件收入，规模化上仍未验证。
