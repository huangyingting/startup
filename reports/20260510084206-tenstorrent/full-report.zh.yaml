      - number: '5.4'
        title: 部署、集成与产品路线图
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 硬件部署遵循一条清晰的客户路径：开发者或企业团队先拿到 PyTorch、JAX 或 ONNX 模型，经 TT-Forge 编译器生成 Blackhole 原生二进制，再通过
              TT-Metalium 调度执行。单卡配置（p100a / p150a）需要支持 PCIe Gen5 的主机服务器和 Linux 环境。TT-Metal 安装文档给出了相对直接的 Ubuntu pip
              安装流程，但截至 early 2026，社区讨论反复提到 Linux 内核版本兼容约束带来的摩擦。多卡集群使用 p150a 和 p150b 卡内置以太网口；Tenstorrent 的 TT-Mesh
              框架负责跨多芯片编排分布式推理，不要求单独通信库。Galaxy Blackhole 服务器以完整 6U 机架单元交付，内部 mesh 网络预先配置，降低企业级客户的集成负担。形态上，p100a
              面向桌面推理和研究工作站；p150a 覆盖工作站与小集群推理；p150b 面向高密度机架推理；Galaxy 则面向超大规模云厂商和企业本地 AI 计算。Tenstorrent
              目前不支持训练工作负载——整条产品线只做推理，相比 NVIDIA CUDA 生态，可服务市场受限。近期公开路线图包括 TT-Forge v1.0 稳定性（目标 2026）、Galaxy 集群扩展至 144
              个节点（4,608 颗芯片），以及继续扩展 ONNX 覆盖。下一代芯片（Blackhole 后续）正在 NDA 下积极开发，没有公开规格。DevCloud 服务为无法直接购买硬件的开发者提供远程 Wormhole
              和 Blackhole 访问，给未来企业转化蓄水。Blackhole 卡在 May 2026 开始量产，这意味着公司具备履行 Series D 在 December 2024 关闭时披露的约 $150
              million 已签积压合同的能力。
