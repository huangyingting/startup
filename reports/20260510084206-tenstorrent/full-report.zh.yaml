      - number: '1.4'
        title: 关键里程碑与产品历史
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的里程碑横跨约九年、三代硬件。2016–2018 年，创始团队从第一性原理设计 Tensix 核心架构，拿到种子轮和 Series A 资金，并开发 Grayskull 处理器（第一代
              Tensix）。Grayskull 是 Tenstorrent 面向开发者的入门产品，最多 120 个 Tensix 核心、每个核心 1MB SRAM，并支持 8GB LPDDR4 内存；对应 e75 和
              e150 PCIe 加速卡，硅片性能最高 600 TOPS。Series B（$20.5M，2019 年 1 月）和 Series C 组合（2021 年，两笔合计 $364M）支持了 Wormhole
              开发。Wormhole（第二代，2024 年 7 月以 n150 和 n300 PCIe 卡、TT-LoudBox / TT-QuietBox 工作站商业发布）带来显著微架构升级：80 个 Tensix+
              核心（数量更少但能力更强）、12nm 制程、16×100GbE 片上 Ethernet、GDDR6 内存（每卡 12GB）和 328 TOPS 峰值性能。Jim Keller 于 2020 年加入，担任总裁和
              CTO；2023 年初出任 CEO。Hyundai 和 Samsung Catalyst 在 2023 年 8 月的 $100M Series C 延伸轮，为 Blackhole
              开发提供资金。Blackhole（6nm 制程、140 个 Tensix++ 核心、10×400GbE、32GB GDDR6、790 TOPS FP8）于 2025 年末以 QuietBox
              工作站形态开始出货，Galaxy Blackhole 服务器则在 2026 年 5 月进入量产。$693M Series D 于 2024 年 12 月 2 日完成，支撑公司激进招聘和全球基础设施扩张。
