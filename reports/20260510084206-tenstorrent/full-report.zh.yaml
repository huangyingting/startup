      - number: '2.5'
        title: 规模缺口、矛盾估算与尽调问题
        blocks:
          - type: paragraph
            body: >
              本章最大的单一分析缺口，是缺少可辩护的 Tenstorrent 可获取市场（SOM）。已披露的 $150M 已签合同（2024 年 12 月）是唯一公开数据点。作为私营公司，Tenstorrent
              没有公开收入和市场渗透率数字，因此无法自下而上构建 SOM。

              分析师对 2026 年 AI 芯片市场 TAM 的估计会随口径相差 2–3×：保守的仅加速器定义给出约 $200–270B；更宽定义（包括 AI 内存和数据中心基础设施）给出 $477B–$500B。按照
              McKinsey 对半导体行业的方法论，即使最高估计也可能少算自用产能和中国供应商收入，低估幅度最高可达 30–40%。

              推理 / 训练拆分同样存在争议：多数预测认为，到 2026 年推理将超过算力的三分之二，但精确的变现收入拆分取决于云服务商未公开披露的定价结构。neocloud 利润率和硬件定价仍不透明，使得 neocloud
              专属芯片采购量难以验证。

              对 Tenstorrent，应提出两个具体市场规模尽调问题：（1）$150M 已签合同组合按客户类型、细分市场和产品代际拆分；（2）截至 2026 年尽调日，RISC-V Ascalon
              授权是否已经产生实质收入——Tenstorrent 的 IP 授权业务具有战略意义，但其对 $150M 数字的贡献未披露。
            claimRefs:
              - CM035
              - CM036
              - CM037
              - CM038
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年 AI 加速器市场由 NVIDIA 主导，按收入约占 80% 市占率；其护城河来自沉淀 20 年的 CUDA 生态，平台上有超过 400 万注册开发者和 40,000+
              依赖组织。竞争格局分为五类：（1）既有 GPU 领导者（NVIDIA H100/B200、AMD MI300X）；（2）直接 AI 芯片挑战者（Cerebras CS-3、Groq LPU、SambaNova
              SN40L）；（3）不对外商业销售的超大规模云厂商定制硅片（Google Trillium/TPU v6、Amazon Trainium3、Meta MTIA）；（4）相邻硬件挑战者（Intel Gaudi
              3）；（5）现状替代品，即仅 CPU 推理和租用云 GPU。Tenstorrent 作为基于 RISC-V 的开源替代方案进入市场，目标客户是主权 AI
              项目、研究机构和对成本敏感的企业推理买方。推理层已显现早期碎片化：Cerebras 2025 年收入达到 $510M，并于 2026 年 4 月提交 IPO；SambaNova 曾接近出售，之后拿到 $350M+
              Series E；Intel 基本已把 AI 训练竞争让给 NVIDIA。对 Tenstorrent 这个资金充足但软件仍在成熟的挑战者而言，这些动态同时带来机会和风险。
