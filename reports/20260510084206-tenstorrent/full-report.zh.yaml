      - number: '7.3'
        title: 技术与竞争风险
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的核心技术风险是 CUDA 生态锁定。NVIDIA 用 20-year 护城河构建了 CUDA 库、框架和开发者工具；把 AI 工作负载迁移到 Tenstorrent 的 TT-Forge
              / TT-Metal 栈，需要开发者重新埋点模型代码、重新验证数值精度，并重新训练运营团队。即使 Tenstorrent 硬件在单位美元吞吐量上优于
              NVIDIA，企业客户的生态切换成本也可能高到难以承受。NVIDIA H100/H200 和 Blackwell（B200）产品主导 AI 训练市场，CUDA 对训练工作负载的控制几乎绝对。Tenstorrent
              已明确把 Blackhole 定位为推理加速器，相当于让出训练市场。这种推理聚焦限制了可服务市场份额。推理领域的竞争者——Groq（LPU
              architecture）、Cerebras（wafer-scale）、SambaNova 和 AMD MI300X——都在积极争夺同一批推理工作负载。Google TPU v5 为 Google Cloud
              客户提供强大的内部推理能力。Intel Gaudi 3（通过 Habana Labs 收购而来）给超大规模云厂商提供了成本可能更低的 NVIDIA
              推理替代品。独立技术评估反复指向同一主题：软件成熟度。Tenstorrent 若没有一套能把集成摩擦降到可比水平的软件栈，就无法关闭大型企业交易。声称 90% HuggingFace
              模型兼容性，与提供生产级企业支持之间，仍有不小距离。此外，下一代芯片开发风险很高：TSMC 良率问题、架构误判，或 Blackhole 后继产品的可制造性设计错误，都可能让公司倒退 18-24
              months；在此期间，NVIDIA 将发布 Rubin 及后续世代。
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
