      - number: '2.2'
        title: 市场规模——TAM、SAM 与分析矛盾
        blocks:
          - type: paragraph
            body: >
              2025–2026 年 AI 加速器芯片市场的总可用市场（TAM）估计跨度很大，且彼此矛盾。分歧主要来自分析师口径不同：Gartner 预计 2026 年 AI 处理半导体收入为 $268B（约占其 $1.3T
              半导体总预测的 30%）；IDC 则认为同年仅数据中心半导体收入就达 $477B。Fortune Business Insights 对专用 AI 加速器市场的估算为 2025–2026 年
              $137B–$180B（口径更窄，只含训练 + 推理加速器）。Deloitte 2026 半导体展望估计生成式 AI 芯片收入约 $500B，这是最宽口径，包含 AI 相邻的内存和网络。

              下方规模表保留并量化这些矛盾。对 AI 加速器（离散推理 + 训练硅片）而言，最保守且可辩护的 2026 年 TAM 约为 $200–$270B。非 NVIDIA AI 加速器的可服务市场（SAM）按
              NVIDIA 约 80% 市占率反推：在保守 TAM 区间下，SAM 约 $40–$54B；若采用更宽口径，则约 $40–$100B。

              AI 推理子市场是观察 Tenstorrent 的关键镜头。MarketsandMarkets 估计，AI 推理市场 2025 年约 $106B，2026 年增长至 $117–$120B，并以 19% CAGR
              在 2030 年达到 $255B。推理正在超过训练，成为算力预算的主导驱动：到 2026 年，估计约三分之二 AI 算力由推理驱动，而 2023 年仅约三分之一。Tenstorrent 的 Galaxy
              Blackhole 直接竞争 AI 推理市场，并展示了具有成本竞争力的推理能力（DeepSeek：$6/M tokens、308 tokens/sec/user）。

              RISC-V IP 市场给 Tenstorrent 增加第二条收入维度。Global Market Insights 预计，整体 RISC-V 技术市场 2025 年为 $1.35B，2026 年为
              $1.91B，CAGR 为 30–41%。更窄的 RISC-V CPU IP 授权市场 2025 年约 $580M，2026 年约 $720M（Intel Market Research 口径 CAGR 为
              12.1%）。更宽市场的增长来自 AI/ML 边缘采用、汽车 ADAS，以及韩国、日本、中国和欧盟的地缘政治驱动。

              仅靠公开来源无法确定 Tenstorrent 的可获取市场（SOM）。公司披露截至 2024 年 12 月已签合同约 $150M，暗示其在目标细分市场的渗透率仍为低个位数。要建立现实 SOM
              模型，需要公开市场拿不到的私有合同数据和部署量。
