      - number: '5.3'
        title: 软件栈与开源生态
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的软件策略和既有 AI 芯片厂商拉开距离，核心在于其承诺把完整工具链以 Apache 2.0 许可证开源。整个栈分为四个逻辑层。最底层是 TT-LLK（Low-Level
              Kernels），为常见矩阵运算提供手工优化的 Tensix 指令序列。上一层 TT-Metalium 是核心运行时与调度引擎：它抽象 Blackhole 的多 tile 执行模型，管理内核编译，并提供类似
              NVIDIA GPU 上 CUDA 的设备编程模型。TT-NN 位于 TT-Metalium 之上，暴露一个可从 Python 调用的算子库，包含 200 多个计算原语，并兼容 HuggingFace
              Transformers 风格的模型定义。最上层是 TT-Forge，这是基于 MLIR 的编译器，可从三个前端桥接接收模型图：面向 PyTorch 模型的 TT-Torch、面向 JAX 模型的
              TT-XLA，以及面向 ONNX 交换格式的 TT-Forge-ONNX。借助这套架构，Tenstorrent 可以声称兼容主流 ML 框架，而无需应用开发者触碰底层 Tensix 编程。主公开仓库
              tenstorrent/tt-metal 在 GitHub 上截至 April 2026 约有 1,410 stars、429 forks 和超过 25,830 commits，覆盖 161
              个官方版本。开源活动量不小：988 个未关闭 PR 和 19,076 个已合并 PR 说明工程推进活跃但仍在扩规模，3,488 个未关闭 issues 则显示已知软件缺口仍有明显积压。Tenstorrent 声称
              HuggingFace 模型基准测试通过率为 90%，并兼容超过 2.5 million 个开源模型，但两个数字都未获独立验证。The Register 在 November 2025
              的一篇评测认为，该软件“对大多数本地 AI 爱好者来说就是不够打磨”，并把配置摩擦和驱动文档不完整列为采用的主要门槛。Pyron SDK
              文档（docs.pyron.dev）提供更高层抽象，目标是降低企业集成商的门槛，但成熟度仍处早期。开源许可策略创造了社区飞轮——开发者贡献可补上 Tenstorrent
              在模型移植和算子覆盖上的工程产能——但也意味着公司无法阻止竞争者 fork 这套栈。
