  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与 SKU 架构
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 以 Blackhole ASIC 为锚，提供垂直整合产品线，覆盖三种形态，分别面向不同推理市场细分。入门层级的 Blackhole p100a 推理卡约
              $999，面向开发者和桌面推理爱好者；它提供 28 GB GDDR6 内存、448 GB/s 带宽，并通过 PCIe Gen5 x16 连接主机。进阶 SKU p150a 增加 4 GB GDDR6（32
              GB，512 GB/s），更关键的是加入四个 QSFP-DD 800 Gbps Ethernet 端口，可在无交换机情况下直接卡间联网，打开工作站规模的多卡推理。p150b 变体在计算规格上与 p150a
              物理一致，但采用被动散热，面向密度优化的机架部署。卡层级之上是 QuietBox 工作站：一台约 $9,999 的液冷桌面机箱，内置两张 Blackhole
              卡，定位为面向全栈开发团队的开发者生产力平台。产品层级顶端是 Galaxy Blackhole，一台 6U 机架服务器，集成 32 颗 Blackhole ASIC，并通过 100 Tbps
              板载网状网络互联，提供 23 PFLOPS FP8 和总计 1 TB GDDR6 内存，公开标价为每机箱 $110,000。Galaxy 于 2026 年 4 月 28 日达到 GA，标志着
              Tenstorrent 从纯开发者硬件公司转向商业企业 AI 基础设施供应商。硬件之外，Tenstorrent 还提供 TT-Metal 和 TT-Forge 开源软件开发套件，以及 DevCloud
              远程访问服务，让开发者无需本地资本开支即可评估 Wormhole 和 Blackhole 硬件。产品组合从 $999 开发者卡到 $110,000 企业服务器，跨度足够大，使 Tenstorrent
              能低成本播种开发者社区，再把已验证用例转化为企业收入；这与 NVIDIA 开发者计划过去十年使用的飞轮策略相似。
