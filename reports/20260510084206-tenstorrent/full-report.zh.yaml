      - number: '5.5'
        title: 技术差异化与竞争护城河
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的主要技术差异化有四点：（1）Tensix 数据流架构，无需动态 GPU
              式线程管理开销，就能做静态调度、带宽效率更高的矩阵运算；（2）原生以太网芯片互联，可用通用网络硬件搭出机架级推理集群；（3）嵌入式应用级 RISC-V 核心可在芯片上运行 Linux，摆脱专有固件锁定；（4）完整
              Apache 2.0 开源软件栈，支持第三方贡献，也避开 NVIDIA 封闭 CUDA 生态的供应商锁定。Tensix 架构可追溯到 Jim Keller 过去在 AMD（Zen）、Apple（A4/A5）和
              Intel 的 CPU 设计经验；Keller 及其联合创始人持有数据流 tile 架构的基础专利，但 IP 组合深度尚未经独立审计。相较 AMD Instinct MI300X 和 Intel Gaudi
              3，Blackhole 的以太网互联策略在架构上不同，规模化后可能更具成本效率，因为不需要专有高速互联硬件。开源定位也构成一个建设中的护城河：随着 tt-metal
              仓库积累社区贡献的模型移植、算子优化和集成指南，生态会越来越黏，而 Tenstorrent 自身不必同比例增加工程投入。差异化逻辑的关键脆弱点包括：对 TSMC 6nm 的单一来源依赖（CE024），使
              Tenstorrent 暴露在所有先进制程芯片公司共同面对的地缘政治与产能风险中；缺乏训练支持（CE023），使 Tenstorrent
              无法承接模型开发工作负载，也让同时做训练和推理的客户把它视作二线供应商；软件打磨不足（CE022），会把集成税转嫁给没有专门 MLOps 工程资源的客户。截至 May 2026 仍无 MLPerf
              提交，使客观第三方基准对比变得困难，买方只能依赖公司提供的数字（例如相对 NVIDIA GB300 的 5× 单 token 成本主张），而这些数字尚未被独立评测者在生产规模验证。
            claimRefs:
              - CE002
              - CE003
              - CE010
              - CE022
              - CE023
