      - number: '1.5'
        title: 规模、竞争位置与关键指标
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 是私营公司，除 2021 年一份企业文件披露收入为 $25M–$100M 外，没有公开财务披露。截至 2026 年 5 月，公司称已签商业合同约 $150M，Galaxy
              Blackhole 服务器已量产，并在至少五个 neocloud 机房部署（Tokyo、Seattle、India，以及通过 Equinix/OrionVM/BetterBrain
              合作宣布的另外两个地点）。全球员工数估计为 1,100–1,200 人。公司开源软件栈（TT-Forge、TT-Metal）声称 Hugging Face 模型通过率达到 90%，并支持约 250 万个开源 AI
              模型。Blackhole 展示了 DeepSeek 推理：每用户 308 tokens/sec，输出 token 成本 $6/M；还与 Prodia 创下视频生成基准纪录（5 秒视频用 3.5
              秒生成，比此前纪录快 83%）。尽管技术履历强，Tenstorrent 面对 NVIDIA 仍有显著竞争劣势，后者 CUDA 生态沉淀了 20 多年库开发。独立评测者也承认，公司软件栈相对 CUDA
              仍不成熟，限制近期大型企业采用。第三方估计其收入在数千万美元量级，远低于 NVIDIA 单季数百亿美元的数据中心收入。
