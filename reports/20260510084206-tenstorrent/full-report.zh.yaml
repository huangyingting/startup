  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 最紧迫的近期风险是出口管制暴露。US Bureau of Industry and Security（BIS）在 October 2023 发布里程碑式 Advanced
              Computing 规则，并在 October 2024 扩大范围，设定 FLOPS 和互联带宽门槛，用来判定 AI 加速器向中国、俄罗斯及越来越多受限目的地销售时是否需要出口许可证。Tenstorrent 的
              Blackhole 芯片在 FP8 下提供 664 TFLOPS，而 BIS 规则适用于性能密度高于特定门槛、或片上互联性能高于特定限制的芯片。Tenstorrent 尚未公开披露 Blackhole
              是否触发这些门槛、是否取得任何出口许可证，或其分销渠道是否执行最终用途筛查。Federal Register rule 2023-25073（effective December 2023）及后续 October
              2024 扩展，显著拓宽了受限国家和技术范围。违反 Export Administration Regulations（EAR）会带来最高 $1M / violation 的刑事罚金和最高 20 years
              imprisonment，并叠加最高 $364,992 / violation 的民事罚款。另一个维度是 EU AI Act（enacted August 2024）：该法按风险层级划分 AI 系统，可能要求向
              EU 销售的 AI 硬件提供商完成合格评定、透明度和文档义务。虽然该法主要针对 AI 软件系统，但作为专用 AI 加速器销售的硬件，可能在不断演进的欧盟委员会实施法案下受到监管审查。RISC-V
              出口管制风险又增加了第二条监管向量：美国立法者在 2024 年讨论过限制向中国公司授权 RISC-V IP；虽然没有出台全面禁令，监管不确定性仍给 Tenstorrent 的北京办公室和基于 RISC-V 的
              IP 授权活动带来法律暴露。IP 诉讼方面，NVIDIA 持有超过 10,000 项 AI 和 GPU 专利；尽管公开记录中目前没有针对 Tenstorrent 的诉讼，这个悬置风险对任何 AI
              芯片创业公司都很实质。Jim Keller 曾在 Intel、AMD、Apple 和 Tesla 之间流动，带来前雇主 IP 索赔风险；不过截至 May 2026 尚无索赔提出。Synopsys 和
              Cadence EDA 工具授权协议是关键依赖：任何违约或未续约都会让芯片设计停摆。
