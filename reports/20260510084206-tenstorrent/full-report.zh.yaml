  - id: FM001
    title: AI 加速器市场——TAM / SAM / SOM 分层测算
    type: pyramid
    description: >
      三层金字塔展示 TAM（最宽口径 AI 芯片市场）、SAM（替代供应商可触达的非 NVIDIA AI 加速器）和 SOM（基于当前新云厂商和 IP 授权部署，Tenstorrent 现实可拿到的份额）。数值为 2026
      年估算，带有来源支持的上下界。
    approximationNotes: >
      TAM 以 Gartner AI 处理半导体估算（$268B）为基础。SAM 按 TAM 的约 20% 推导，依据是 NVIDIA 约 80% 份额。SOM 以已披露 $150M 合同管线为下限；现实可触达份额估计为新云厂商和
      RISC-V IP 授权合计占 SAM 的低到中个位数百分比。所有数值都是估算，置信区间很宽。
    data:
      items:
        - label: TAM —— AI 加速器芯片市场（2026）
          value: $200B–$268B
          detail: Gartner AI 处理半导体估算（$268B）；Fortune Business Insights 独立加速器估算（$137B–$180B）。不含内存和网络。
          claimRefs:
            - CM007
            - CM008
        - label: SAM —— 非 NVIDIA AI 加速器市场
          value: $40B–$54B
          detail: 按 TAM 的约 20% 推导，依据是 NVIDIA 在 2025–2026 年持有约 80% 份额。包括 AMD、定制芯片（Google TPU、AWS Trainium）和替代供应商。
          claimRefs:
            - CM013
            - CM014
        - label: SOM —— Tenstorrent 可触达市场（2026）
          value: $150M+ (disclosed contracts)
          detail: Tenstorrent 披露截至 2024 年 12 月已签合同约 $150M。2026 年 5 月 Galaxy Blackhole 已部署到 5+ 家 新云厂商。RISC-V IP 授权份额未单独披露。
          claimRefs:
