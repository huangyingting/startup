  - id: FV001
    title: 推荐逻辑
    type: flow
    description: |
      从五个证据支柱（规模 / 验证 / 风险 / 估值 / 策略）出发，经过中间评估，推导至最终的继续研究 / 观察建议，以及会把结论推向投资或放弃的具体条件。
    claimRefs:
      - CV001
      - CV005
      - CV013
      - CV019
      - CV040
    data:
      nodes:
        - label: 市场规模（2030 年 TAM $170B）
        - label: 产品验证（Galaxy GA，2026 年 4 月）
        - label: 软件风险（3,488 个未关闭 issue）
        - label: 估值风险（$3.2B，对照未确认收入）
        - label: 竞争护城河（CUDA 生态）
        - label: 财务风险（每月烧钱 $25–50M）
        - label: 投资逻辑成立？
        - label: 估值有支撑？
        - label: 继续研究 / 观察
        - label: 上调触发：收入 >$200M 或拿下超大规模云厂商
        - label: 下调触发：Jim Keller 离任或 BIS 执法
        - label: 选择性投资
        - label: 放弃
      edges:
        - from: Market Scale ($170B TAM 2030)
          to: Thesis Supported?
        - from: Product Proof (Galaxy GA Apr 2026)
          to: Thesis Supported?
        - from: Software Risk (3,488 open issues)
          to: Thesis Supported?
        - from: Competitive Moat (CUDA ecosystem)
          to: Thesis Supported?
        - from: Valuation Risk ($3.2B vs unconfirmed revenue)
          to: Valuation Supported?
        - from: Financial Risk ($25–50M/mo burn)
          to: Valuation Supported?
        - from: Thesis Supported?
          to: Research-More / Track
        - from: Valuation Supported?
          to: Research-More / Track
        - from: Research-More / Track
          to: 'Upgrade Trigger: Revenue >$200M or hyperscaler win'
        - from: Research-More / Track
          to: 'Downgrade Trigger: Keller exit or BIS enforcement'
        - from: 'Upgrade Trigger: Revenue >$200M or hyperscaler win'
          to: Selectively Invest
        - from: 'Downgrade Trigger: Keller exit or BIS enforcement'
          to: Pass
