      - number: '6.2'
        title: 采用轨迹与开发者生态
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的采用轨迹更像一个双速飞轮：快速增长但较浅的开发者漏斗，输送给转化较慢但价值更高的企业管线。DevCloud 项目以 Wormhole 硬件启动，并在 late 2025 扩展到
              Blackhole，截至 Q1 2026 已累计约 5,000 名注册开发者。主要 tt-metal 仓库的 GitHub 活动也反映了这股动能：截至 April 2026，超过 25,830
              commits、1,410+ stars 和 19,076 个已合并 PR。不过，从开发者漏斗到企业转化仍未被证明：Tenstorrent 没有披露多少 DevCloud
              用户随后购买硬件或转化为付费企业合作。Galaxy Blackhole 服务器直到 April 28, 2026 才正式可用——距本报告基准日只有几周——因此现在衡量生产部署中的复购率或集群扩容还太早。上一代
              Wormhole 产品有更长观察期：QuietBox 工作站（基于 Wormhole，约 $12,000）自 mid-2024 起可购买。学术参与（MIT、Stanford、CMU 研究组）通过
              Tenstorrent Developer Day 报道得到确认，但购买仍属小规模（单卡或开发套件）。Tenstorrent 声称 HuggingFace 模型基准测试通过率为 90%，并兼容 2.5
