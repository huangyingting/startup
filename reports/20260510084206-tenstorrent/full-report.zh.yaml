            body: >
              按企业硬件标准看，具名客户证据集偏小，但参与机构层级值得注意。Koyeb 提供了最清晰的独立客户证明：这家法国云创业公司公开宣布 Tenstorrent Blackhole p150 已在其 HaaS
              平台上线，完成了客户今天即可购买的生产部署。这是唯一已确认的独立（非投资方）商业客户，用 Tenstorrent 硅片承载可产生收入的工作负载。LG AI Research 是战略合作伙伴兼客户：LG AI
              Research 由 LG Technology Ventures（Series D 领投方）支持，使用 Tenstorrent 芯片做 AI 推理和训练研发。双方关系早于 Galaxy 发布，且横跨
              Wormhole 和 Blackhole 两代，显示出多代承诺。Hyundai Motor Group 的兴趣聚焦汽车 AI——面向自动驾驶辅助系统的车载处理——并由 Series D
              战略投资带来的路线图协同支撑。SoftBank 的日本 AI 基础设施协议与其参与 Series D 融资（January 2025 公告）一同披露，涉及为 SoftBank 数据中心扩张部署
