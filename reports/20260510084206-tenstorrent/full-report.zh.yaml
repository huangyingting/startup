      - number: '5.6'
        title: 要点展示
        blocks:
          - type: callout
            title: 开源策略既是护城河，也是风险
            body: >
              Tenstorrent 对完整软件栈——从底层 Tensix 内核到 MLIR 编译器——采用 Apache 2.0 开源策略，创造了一个开发者获取飞轮，类似早期 CUDA
              生态打法，但没有专有锁定。tenstorrent/tt-metal 上 25,830+ commits 和 19,076 个已合并 PR 显示出真实的工程动能。不过，完整 Apache 2.0
              授权也意味着竞争者——包括资金充足、正在自建 ASIC 栈的超大规模云厂商——可以 fork 并使用这套栈而不回馈贡献，长期可能把 Tenstorrent
              的软件差异化商品化。今天的护城河是真实的，但法律上守不住；它依赖持续的工程领先和社区信任。
            calloutType: insight
            claimRefs:
              - CE010
              - CE015
              - CE037
              - CE038
          - type: callout
            title: 软件成熟度是企业采用的闸门风险
            body: >
              硅片层面的规格有吸引力，但软件准备度仍是大规模采用的主要障碍。The Register 在 November 2025 对 QuietBox 工作站的评测认为，该软件“对大多数本地 AI
              爱好者来说就是不够打磨”；截至 April 2026，tenstorrent/tt-metal 仓库还有 3,488 个未关闭 issues 和 988 个未关闭
              PR——这说明代码库迭代很快，但成熟度仍在爬坡。企业若把 Tenstorrent 用于生产推理，会要求投资级软件：稳定 API、完整驱动文档和可预测升级路径。90% HuggingFace
              兼容性的标题数字与长尾模型特定失败之间的缺口，是买方在承诺批量部署前必须用自身模型工作负载验证的实质性尽调项。
            calloutType: risk
            claimRefs:
              - CE016
              - CE022
              - CE037
              - CE038
          - type: callout
            title: 对 TSMC 6nm 的单一来源依赖
            body: >
              每一颗 Blackhole ASIC——也就是 Tenstorrent 每一款可产生收入的产品——都依赖单一晶圆厂 TSMC 和单一制程节点（6nm）。TSMC 是全球最先进的合同制造商，6nm
              也是良率稳定的成熟节点，但这种集中度带来供应链风险：地缘政治事件（台海紧张）、来自 Apple、NVIDIA、AMD 和其他大客户的产能竞争，以及特定节点良率事故。Tenstorrent
              尚未披露第二来源认证或替代封装计划。
            calloutType: risk
            claimRefs:
              - CE001
              - CE024
              - CE034
          - type: callout
            title: 只做推理限制 TAM，弱于全栈竞争者
            body: >
              Tenstorrent 选择打造推理优化硬件而不支持训练，显著收窄了总可用市场。企业 ML 团队如果在内部训练和微调模型——成熟 AI 买方大多如此——就需要训练基础设施，而 Tenstorrent
              无法服务这部分需求。因此，Tenstorrent 更像同类最佳的推理专家，而不是全栈平台。这个利基可行（2025–2026 年推理支出增长快于训练支出），但限制公司成为客户主要 AI
              基础设施供应商的能力，尤其是当客户希望维持单一供应商关系时。
            calloutType: risk
            claimRefs:
              - CE023
              - CE032
          - type: callout
            title: Galaxy 正式可用验证企业级商业准备度
            body: >
              Galaxy Blackhole 服务器在 April 28, 2026 正式可用——32 颗芯片、23 PFLOPS FP8、1 TB GDDR6、每台机箱 $110,000——这是一个里程碑，把
              Tenstorrent 从开发者硬件公司推向商业化企业 AI 基础设施供应商。叠加 May 2026 已确认量产和早期客户部署（ai& Corporation、Cirrascale、Turium
              AI），Galaxy 发布验证了 Tenstorrent 可以跑通从硅片到客户可部署系统的完整周期。若相对 NVIDIA GB300 在 DeepSeek-R1 671B 上 5× 单推理 token
              成本的主张获得独立验证，将构成显著的经济价值主张。
            calloutType: strength
            claimRefs:
              - CE009
              - CE019
              - CE033
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与买方画像
        blocks:
          - type: paragraph
            body: >
              以当前商业化阶段看，Tenstorrent 的可服务客户群可分为三类买方。第一类是独立开发者或研究实验室：个人和团队评估 Blackhole 卡（$999–$3,499）或访问
              DevCloud，主要动机是开源工具链好奇心、RISC-V 研究，或以更低成本做 LLM 推理实验。截至 Q1 2026，Tenstorrent 报告约 5,000 个注册 DevCloud
              账号；这个指标统计注册量，不代表月活用户。第二类是战略企业合作伙伴——既是 Tenstorrent 投资方，又是其硅片早期采用者的组织。LG AI Research（由领投 Series D 的 LG
              Technology Ventures 支持）和 Hyundai Motor Group（Series D 战略投资方）正落在这一类，分别用 Blackhole 做 AI 推理和汽车 AI
              计算。这种投资方兼客户关系会加速早期采用，但也带来治理模糊：购买动机部分受股权持有影响，而非完全基于公平市场化的产品评估。第三类是云或基础设施提供商，将 Tenstorrent 算力作为服务转售。法国云创业公司
              Koyeb 成为首个公开确认的云 HaaS 合作伙伴，按 token/second 计费提供 Tenstorrent Blackhole p150 推理算力。SoftBank 披露将 Tenstorrent
              芯片部署到日本数据中心扩张项目，是已披露最大商业订单，符合基础设施运营商画像。地域上，早期采用集中在北美（DevCloud、学术合作伙伴）、韩国（LG、Hyundai）、日本（SoftBank）和西欧（Koyeb、Fraunhofer
              Institute）。垂直场景主要是企业 AI 推理、汽车车载 AI、学术研究和云基础设施供给。尚无已披露的 SMB 或中端市场客户基础，这与当前产品的企业级价格点（每台 Galaxy 机箱
              $110,000）一致。
