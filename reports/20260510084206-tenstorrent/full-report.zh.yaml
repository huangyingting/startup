      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 由 Ljubisa Bajic（前 CEO/CTO）、Ivan Hamer 和 Milos Trajkovic 于 2016
              年共同创立。这三位加拿大工程师此前一起研究深度学习硬件架构，构成了公司 Tensix 核心设计的起点。公司扩张后，Bajic 转任技术 Fellow；Hamer 和 Trajkovic 仍是高级 Fellow
              级工程贡献者。Jim Keller 于 2020 年加入，担任总裁和 CTO，并在 2023 年初正式升任 CEO。Keller 是半导体史上履历最强的芯片架构师之一，曾主导 AMD Athlon K7 和
              K8/Opteron 微架构（包括 x86-64 指令集）、Apple A4 和 A5 移动 SoC 设计（iPhone 4 和 4S、初代 iPad）、Tesla Full Self-Driving
              Hardware 3 芯片，并在 Intel 承担高级硅工程职责。Keith Witek 担任 COO，也是 Series D 融资的公开发言人。领导团队还包括 David Bennett（首席客户官）和
              Erik Goodman（财务副总裁）。Jim Keller 的关键人物集中度构成实质治理风险：他在过往雇主任期偏短（Intel：2 年；Tesla：2 年），引发继任担忧，分析师也将其列为尽调警示。投资方中，除
              Series C 和 Series D 的战略企业投资者外，Eclipse Ventures 和 Real Ventures（早期支持者）也通过董事会和顾问角色参与。
