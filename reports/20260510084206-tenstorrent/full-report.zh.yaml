      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: Galaxy GA 是里程碑，不是收入确认
            body: >
              Galaxy Blackhole 2026 年 4 月宣布 GA，是有意义的产品里程碑，但没有解决收入不确定性。收入确认需要已签采购订单、 客户验收和交付；三项都未获公开确认。在 Q2–Q3 2026
              预订数据出现前，投资者不应把 GA 公告当作商业牵引力的替代指标。
            calloutType: risk
            claimRefs:
              - CV014
              - CV015
          - type: callout
            title: 优先权压力：低于 $2.6B 时普通股面临损失风险
            body: >
              Series D 投资者入场估值为 $2.6 billion，Series E 为 $3.2 billion。任何低于 $2.6 billion 的退出—— 悲观情景估计为
              $300M–$1B——都会让普通股持有人，以及 Series D 清算优先权之下的早期优先股投资者，面临全损风险。 优先股堆叠机制未公开；没有股权结构表，就无法建清算瀑布模型。投资前必须把这项尽调做清楚。
            calloutType: risk
            claimRefs:
              - CV038
              - CV029
          - type: callout
            title: 继续研究立场：具体上调条件
            body: >
              继续研究 / 观察建议有具体、可衡量的上调条件：(1) 数据室或公开信息确认 FY2025 收入高于 $200 million；(2) 至少一家超大规模云厂商 （AWS、Google、Azure 或
              Oracle）宣布 Galaxy Blackhole 部署或设计定点；(3) 软件未关闭 issue 数降至 1,000 以下， 并配套企业级 SLA 承诺；或 (4) 入场价格回调到 $2.0 billion
              以下。只要满足任一条件，在股权结构表审查通过前提下， 建议就可上调为选择性投资。
            calloutType: recommendation
            claimRefs:
              - CV040
              - CV016
          - type: callout
            title: 期望值为正，但信息缺口不可接受
            body: >
              概率加权后的预期退出估值约为 $5.4 billion，意味着相对 $3.2 billion 的 Series E 价格有正回报。不过，
              各情景方差极大（悲观：$300M–$1B；乐观：$10B–$20B），而收窄方差所需的高置信度数据——经审计收入、已确认订单、 股权结构表——并未公开。期望值为正但信息风险无法量化，不足以支撑机构投资承诺。
            calloutType: insight
            claimRefs:
              - CV025
              - CV041
