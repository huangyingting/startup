      - number: '7.4'
        title: 财务与资本风险
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 在 Series D（December 2024）融资 $693M，并在据报道的 Series E（November 2025）中又获得约
              ~$800M。尽管资本位置相当充足，公司烧钱速度估计为 $25-50M per month，意味着从 Series E close 起现金跑道约 16-32 months。下一代芯片在 TSMC tape-out
              估计需 $150-300M，占现金储备相当大一部分。收入未披露；第三方算法估计的 FY2025 $501M 不可靠，不应作为投资测算依据。截至 December 2024 的 $150M
              已签合同代表积压订单，不是已确认收入；硬件交易从积压订单转化为现金回款，取决于客户验收测试、交付排期和质量保证里程碑。定制 AI 硬件的毛利率结构性承压：TSMC 晶圆成本、GDDR6
              DRAM、板级组装和物流，会在任何 R&D、销售或 G&A 分摊之前吃掉收入的相当部分。公司没有公开说明盈利路径。投资方兼客户集中度进一步放大资本密集风险：LG、Hyundai 和 SoftBank
              同时是已知最大客户和最大投资方之一。如果其中任何一方因自身财务压力或战略调整而降低投资姿态，Tenstorrent
              会同时失去收入并释放内部人信心下滑的信号——这是灾难性的双重冲击。营运资本风险也很实质：企业硬件交易通常是 Net-60 到 Net-90，而晶圆付款要么预付、要么短期信用，压缩现金转换周期。
