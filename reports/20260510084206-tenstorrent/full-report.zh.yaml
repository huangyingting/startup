      - number: '5.2'
        title: Blackhole ASIC 架构与技术规格
        blocks:
          - type: paragraph
            body: >
              Blackhole ASIC 是 Tenstorrent 第二代 AI 加速器，也是其第一款采用 TSMC 6 nm 工艺节点生产的芯片，单颗裸片面积约 600 mm²。芯片的计算结构围绕 120 个
              Tensix 处理 tile 展开；Tensix 是 Tenstorrent 自研的数据流架构，每个 tile 内含 5 个小型 RISC-V 核心，负责内核调度、数据搬运和计算编排。120 个 tile 让单颗
              Blackhole 裸片仅底层控制就内置超过 600 个 RISC-V 核心，此外还有 16 个更大的应用级 RISC-V 核心（基于 SiFive X280 64-bit core），用于运行 Linux
              和主机侧管理软件。Tenstorrent 称，这套双 RISC-V 策略让 Blackhole 拥有可编程计算底座，不依赖封闭固件微控制器，从而降低延迟，并把软硬件协同设计做得更紧。片上内存合计 180 MB
              SRAM，分布在 Tensix tile 阵列中，为激活值、权重和中间结果提供高带宽本地存储，避免往返更慢的 GDDR6。单芯片峰值算力为 664 TFLOPS（BlockFP8 格式）或 332
              TFLOPS（BF16），定位介于 NVIDIA H100 SXM（3.9 PFLOPS FP8）和低成本边缘推理 SoC 之间。主动散热版 p100a 和 p150a 的热设计功耗为 300 W。p150a 和
              p150b 的 3.2 Tbps 以太网总带宽尤其少见：多数竞品推理 ASIC 依赖 PCIe 或 NVLink 做设备间通信，而 Blackhole 原生以太网 mesh
              从一开始就是为在通用网络基础设施上集群化设备而设计。Galaxy 配置中，32 颗 Blackhole 芯片以全互联拓扑互联，提供 100 Tbps 芯片间总带宽，让超大模型（例如 DeepSeek-R1
              671B）可以在全系统内做权重分片推理，不在互联层形成拖慢性能的瓶颈。
