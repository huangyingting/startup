  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的投资逻辑建立在六根支柱上。第一，架构差异化：Tensix 处理单元和基于 RISC-V 的 Ascalon CPU 从根上偏离以 GPU
              为中心的设计，可为推理工作负载带来非对称功耗效率。第二，市场时点：AI 加速器市场预计到 2030 年年收入达到 $170 billion，且推理分部增长快于训练，直接利好 Tenstorrent
              的产品聚焦。第三，生态锚定：与 HuggingFace 模型 90% 兼容，加上开源软件栈（TT-Metal / TT-Metalium，MIT 许可证），降低开发者采用摩擦，并提供可信的 CUDA
              替代叙事。第四，资本跑道：累计融资约 $2 billion（包括 November 2025 的 $800 million Series E），Tenstorrent 有资金支持至少一次下一代芯片
              tape-out 和 16–32 months 运营。第五，战略投资方深度：LG Electronics、Hyundai Motor、SoftBank、Samsung Securities 和 Fidelity
              提供绑定客户关系、分销触达和耐心资本。第六，IP 授权上行空间：授权给第三方的 Ascalon RISC-V CPU 可产生经常性、类似软件的收入，隐含倍数更高。

              反向逻辑同样重。NVIDIA 的 CUDA 生态由 15+ years、数百万开发者小时和 $100+ billion 软件投入打造，黏性极强。企业客户面临 18–36 months
              切换成本和显著再培训投入。The Register 在 November 2025 对 Blackhole QuietBox 的评测记录了 Tenstorrent 软件尚未达到企业级打磨，tt-metal 仓库的
              3,488 个未关闭 issues 又放大了这一担忧。投资方兼客户双重身份（LG、Hyundai、SoftBank
              同时是投资者和最大客户）带来循环依赖风险：单一实体退出可能同时导致收入损失和信心崩塌。在收入未确认的情况下，每月 $25–50 million 的烧钱速度意味着公司可能在现金流 breakeven
              前需要再融资。TSMC 单一来源依赖增加了难以对冲的地缘政治和运营集中度。综合来看，投资逻辑要求多个条件同时成立；软件停滞、关键人物离开、TSMC 中断或降价轮中任一项失败，都可能实质性重置估值假设。
