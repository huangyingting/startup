      - number: '6.4'
        title: 留存、耐久度与满意度
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，Tenstorrent 没有公开净留存率（NRR）、总留存率（GRR）或 cohort renewal 数据。考虑到公司的主要商业产品（Galaxy
              Blackhole）在本报告基准日前几周才正式可用，这个缺口符合阶段预期。数据缺失更多是时间因素，不是红旗，但也意味着任何留存判断都必须依赖间接代理指标。最可信的黏性代理是跨硬件世代的再次投入：LG AI
              Research 持续使用 Wormhole 和 Blackhole 两代 Tenstorrent 硅片，显示出多年承诺。Koyeb
              的生产部署同样代表一个耐久集成决定——云提供商通常不会因短期试用就接入硬件合作伙伴，因为重构推理后端的运营成本很高。开发者侧满意度则更混合：截至 April 2026，tt-metal GitHub 仓库有
              3,488 个未关闭 issues，这个量级说明社区参与活跃，也说明已知软件缺陷和缺失能力有明显积压。The Register 在 November 2025 的评测认为 Tenstorrent
              软件“对大多数本地 AI 爱好者来说不够打磨”，并指出配置摩擦和驱动文档不完整。这篇评测是目前唯一可获得的实质性独立第三方产品评价，应视作非绑定客户终端用户满意度的最佳当前代理。Fraunhofer
              Institute 在多轮评估周期中持续研究使用 Tenstorrent 硬件，为学术分部提供了正向留存信号。企业硬件交易（LG、Hyundai、SoftBank）的合同期限未公开披露。公开记录中没有 NPS
              分数、客户满意度调查或支持升级数据。
