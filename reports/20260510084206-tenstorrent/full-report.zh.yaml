      - number: '6.5'
        title: 扩张、集中度风险与战略一致性
        blocks:
          - type: paragraph
            body: >
              对一家处于当前融资阶段的公司而言，Tenstorrent 的客户集中度风险异常高。五个最可见具名客户中，有三个（LG AI Research、Hyundai Motor Group、SoftBank）同时也是
              Series D
              投资方。这种一致性可以加快路线图共创并减少销售周期摩擦，但带来两项实质风险：（1）投资方客户可能优先考虑股权回报，而不是给出坦诚产品反馈，从而削弱本应用来指导路线图决策的市场信号；（2）如果任何战略投资伙伴减持或退出，对应客户关系可能同步弱化，形成收入与股权风险的相关冲击。正面看，若干客户存在多代升级潜力。Galaxy
              服务器的模块化架构支持集群扩展（追加机箱），Koyeb 的 HaaS 模式会随终端用户推理需求扩张。LG 和 Hyundai
              可能成为下一代硅片的锚定客户。先落地再扩张模型在结构上成立，但尚未在实践中证明：没有已公告客户从初始采购继续扩大的案例。渠道和采购摩擦也是重要风险。Tenstorrent 目前还没有通过传统 OEM
              渠道进入企业硬件采购；客户要么直接购买，要么通过 Koyeb 的云层获取。DoD 采购兴趣（CHIPS Act 对齐、美国本土 AI 芯片采购）提供了另一条高价值渠道，但会带来合规复杂性。Tenstorrent
              的军民两用 AI 硬件在 ITAR 和 EAR 下的影响尚未公开说明。NVIDIA H100/H200 装机基础带来的竞争压力，会让已投入 CUDA 生态的潜在客户面临高切换成本；Tenstorrent 的
              TT-Metalium 提供功能上不同、但成熟度更低的编程模型。
