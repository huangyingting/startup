      - number: '8.4'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              三个情景框定 Series E 投资者以 $3.2 billion 进入后的预期结果。

              乐观情景（20% 概率，5-year horizon through 2028–2029）：Tenstorrent 到 2028–2029 年拿下约 5% 的 AI 推理加速器市场，受益于 Galaxy
              Blackhole 在 SoftBank、LG 和 Hyundai 数据中心部署，并至少获得一个主要云服务商认证。软件成熟到企业级（未关闭 issues 低于 1,000；获得独立企业验证）。Ascalon
              RISC-V 的 IP 授权收入增长至每年 $100–200 million。收入达到约 $2 billion；以 8x 收入退出倍数（与高增长硬件 + IP 公司中 NVIDIA 历史区间一致）计算，退出估值约
              $16 billion。Series E 投资者实现 5x 回报（约 40% IRR over 4–5 years）。

              基准情景（50% 概率，exit 2029–2030）：Galaxy Blackhole 在 neocloud 中获得有意义部署，但没有主要超大规模云厂商认证。软件缺口收窄但未完全闭合；CUDA
              在企业训练中仍占主导。收入达到约 $500–800 million（2–3% market share）。以 5x revenue 退出，隐含 $3–5 billion 估值——对 Series E
              投资者而言约为持平到小幅正回报（~5% IRR）。这一情景下，Tenstorrent 作为利基玩家存活，但没有实现突破性规模。

              悲观情景（30% 概率）：软件质量缺口持续存在，NVIDIA 维持 85%+ 推理市场份额，Galaxy Blackhole 局限于战略投资方客户部署。烧钱迫使公司以 $500 million–$1
              billion 降价轮融资或被收购。Series E 投资者面临 60–80% loss。关键触发因素：Jim Keller 离开、到 Q4 2026 仍没有任何 hyperscaler 试点胜利，或 BIS 对
              Blackhole 执法。

              概率加权预期估值（$16B × 20% + $4B × 50% + $750M × 30%）等于 $5.4 billion——约为 Series E 入场价格的
              1.7x，意味着期望值为正，但考虑到高方差和信息缺口，安全边际偏薄。
            claimRefs:
              - CV022
