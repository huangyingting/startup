      - number: '8.2'
        title: 投资建议、信心与估值立场
        blocks:
          - type: paragraph
            body: >
              对 Tenstorrent 在 November 2025 Series E 价格（$3.2 billion 投后估值）的尽调建议是继续研究 / 观察。这不是否定公司，而是在当前价格下否定可获得信息的充分性。

              信心为中低（35 out of 100）。低信心的主要驱动因素是：（a）自 2021 年加拿大公司监管文件后，没有任何公开文件提供已审计收入数字；（b）Latka 对 FY2025 $501.6 million
              的算法估计未经任何独立财务分析验证；（c）截至 December 2024 披露的 $150 million 已签合同代表积压订单，不是已确认收入；（d）独立评测者记录的软件质量风险尚未公开解决。

              估值立场为中性偏负面。在 $3.2 billion 估值下，Tenstorrent 对应 Latka 收入估计的 6.4x，或保守收入估计的 16–32x。可比私营同业（Cerebras 16–28x、Groq
              ~10x、SambaNova 10–17x）显示，该估值处在或高于可比区间上沿——且没有已确认收入支撑。公开市场可比公司（Arm Holdings ~30x EV/revenue、Marvell
              ~10x）为区间定锚，但这些公司都有已审计、已确认收入流。

              风险评级在五个维度均为高：软件成熟度、财务烧钱、TSMC 集中度、CUDA 生态护城河和关键人物依赖。每个维度单独看都值得提高监控强度。组合起来，足以支持继续研究，而不是选择性投资。

              上调为选择性投资的触发条件：收入确认超过 $200 million（经审计或在资料室披露）、至少拿下一个主要超大规模云厂商设计定点、软件达到明确企业 SLA 里程碑，或在降价轮中以低于 $2.0 billion
              的修正估值进入。下调为放弃的触发条件：Jim Keller 离开、BIS 对 Blackhole 采取执法行动、烧钱超过 $60 million per month，或在没有同步收入确认的情况下以低于 $2.0
              billion 降价轮融资。
