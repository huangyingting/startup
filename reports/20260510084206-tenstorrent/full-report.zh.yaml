      - - Marvell Technology
        - 上市定制 ASIC 半导体
        - ~$60B（2026 年 5 月）
        - ~$6B FY2025（经审计）
        - 约 10x EV/rev
        - 定制芯片 / ASIC 可比；服务超大规模云厂商 AI 芯片定制项目
        - ASIC 商业模式不同于标准产品；Google/AWS 客户集中
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV042
      - CV043
    notes: >
      所有未上市公司收入估算均为算法或分析师模型测算；没有经审计的未上市同业收入公开可得。上市公司数据（NVIDIA、Arm、Marvell）来自 SEC EDGAR 10-K 文件和年报。Tenstorrent 的隐含倍数为
      6.4x（Latka 估算）至 16–32x（保守 $100–200M 收入），对比未上市同业 10–28x 区间。
  - id: TV005
    title: 论点失效与退出触发因素表
    description: >
      Specific monitorable events whose occurrence requires an immediate investment hold and thesis reassessment.
      Designed for quarterly monitoring by an active investor or board observer.
    columns:
      - 触发因素
      - 信号 / 指标
      - 退出阈值
      - 对投资论点的传导
      - 行动
    rows:
      - - Galaxy GA 后收入未落地
        - Galaxy 出货数据；积压订单转化率；2026 年 Q2–Q3 收入披露
        - 到 2026 年 Q4 仍无已确认收入 >$100M
        - 牛市和基准情景崩塌；熊市概率升至 >50%
        - 下调为放弃；30 天内争取数据室
      - - 软件成熟度停滞
        - GitHub 未结 issue 数；企业 NPS；独立评测情绪
        - 未结 issue >5,000 或第二次重大负面独立评测
        - 企业采用论点失效；CUDA 护城河进一步加宽
        - 有条件通过；要求硬性软件冲刺计划作为继续持有敞口的条件
      - - Jim Keller 离职
        - LinkedIn / 新闻公告；董事会沟通
        - Series E 轮完成后 18 个月内出现任何公开离职信号
        - 投资者信心崩塌；架构愿景承压；Series F 轮变得极难
        - 立即搁置；60 天内全面重估投资论点
      - - BIS 对 Blackhole 采取执法行动
        - Federal Register；BIS 新闻稿；公司披露
        - BIS 正式下令限制 Blackhole 在任何现有市场销售
        - 生产停摆风险；刑事 / 民事责任；投资者信心被摧毁
        - 立即退出；出口管制违规无法保险覆盖
      - - 估值下修轮
        - Series F 轮公告投后估值低于 $2.5B
        - 任何 Series F 轮定价低于 $2.5B
        - Series E 轮跌破成本；优先权清偿顺序吃掉普通股权益
        - 按模型减记；评估稀释影响；融资后重估股权结构表
      - - 投资者客户退出
        - LG、Hyundai 或 SoftBank 宣布出售股权或终止合同
        - 三者任一在 24 个月内退出股权或终止合同
        - 收入损失与信心冲击同时发生；循环依赖兑现
        - 升级至董事会观察员；要求商业多元化计划
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV026
      - CV029
      - CV040
    notes: |
      阈值是根据尽调惯例和前文章节风险分析推导的参考基准。拿到实际数据室指标后应重新校准。
  - id: TV006
    title: 最终尽调事项表
    description: >
      Prioritized list of diligence items that must be resolved before upgrading the recommendation from
      research-more/track to selectively invest. Each item identifies the missing evidence, why it matters for
      valuation, and the expected disclosure path.
    columns:
      - 尽调事项
      - 优先级
      - 时间线
      - 负责人
      - 缺失证据
      - 负面时的估值影响
    rows:
      - - 收入和毛利率核验（FY2025）
        - 关键
        - 30 天
        - CFO / 数据室
        - 经审计或审计师审阅的 FY2025 收入；按产品线拆分毛利率；收入确认政策
        - 若收入 <$100M，隐含倍数升至 >32x；$3.2B 估值无法成立
      - - Blackhole 的 BIS 出口合规文件
        - 关键
        - 60 天
        - 法务 / 合规
        - BIS 分类意见函；出口许可证申请；分销商最终用途证明
        - BIS 执法行动 = 论点失效；合规缺口 = 无法量化的责任
      - - 含优先权机制和清算顺位的股权结构表
        - 关键
        - 30 天
        - 法务 / 公司秘书
        - 含 Series D/E 轮优先权条款的详细股权结构表；参与型 / 非参与型；反稀释条款
        - 熊市情景下普通股可能归零；Series E 轮 IRR 画像将明显改变
      - - Galaxy Blackhole 已签交付订单和客户部署时间线
        - 高
        - 45 天
        - BD / 销售
        - Galaxy 服务器已执行采购订单；部署计划；收入确认触发日期
        - 没有订单，Galaxy GA 只是产品发布，不是收入事件
      - - Jim Keller 股权归属时间表和董事会接班流程
        - 高
        - 30 天
        - CEO / 董事会主席
        - CEO 雇佣协议；股权归属时间表；董事会批准的接班候选人
        - Keller 离职且无接班计划，就是论点失效事件
      - - TSMC 产能协议和下一代节点资格认证时间线
        - 高
        - 60 天
        - COO / 供应链
        - TSMC 批量采购协议；Blackhole 承诺晶圆投片量；下一代工艺节点选择
        - TSMC 单一来源且没有协议 = 任一中断下的灾难性生产风险
      - - 带企业 SLA 承诺的软件路线图
        - 中
        - 45 天
        - CTO
        - TT-Metal v1.0 企业功能路线图；硬性里程碑日期；未结 issue 消减计划
        - 没有路线图，软件论点只是愿景；企业采用时间线无法建模
      - - 投资者客户收入集中度数据
        - 中
        - 30 天
        - CFO / BD
        - 按客户细分拆分收入；LG、Hyundai、SoftBank 各自占比
        - 三家投资者客户集中度 >60%，就是结构性治理问题
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV028
      - CV035
      - CV036
      - CV037
    notes: |
      优先级评级：关键 = 阻断任何投资决定；高 = 初始兴趣后 60 天内必须拿到；中 = 交割前必须拿到。时间线假设已在 NDA 下进入活跃数据室。
