      - number: '4.3'
        title: 单位经济性与成本结构
        blocks:
          - type: paragraph
            body: >
              作为无晶圆厂半导体公司，Tenstorrent 的单位经济性由 TSMC 晶圆成本（Blackhole 使用 N4 节点制造）、封装、测试和运输驱动，再由平均售价（ASP）和出货量抵消。Galaxy
              服务器机箱单价 $110,000；若每台服务器销售成本（COGS）估计为 $50,000–$70,000（量产下 32 颗 Blackhole ASIC 的 TSMC 晶圆成本，加上 GDDR6
              内存、PCB、电源、组装），隐含单机箱毛利率为 36%–55%，与规模化无晶圆厂芯片公司常见的 40%–55% 区间一致。这些数字完全是估计；Tenstorrent 不披露
              COGS、毛利率或单台经济性。Blackhole N4 流片的一次性工程（NRE）成本估计为 $50M–$100M 或更高，并随生产量摊销。在较低出货量（数千台服务器）下，NRE 摊销会显著压缩毛利率。2026
              年初约 1,100–1,200 名员工，按硬件和软件工程师市场化全包薪酬估算，意味着年度人员成本约 $220M–$300M。叠加 TSMC 生产成本、工具、EDA 授权、设施和 G&A 开销，总运营支出估计为每月
              $25M–$50M。在 Galaxy Blackhole 硬件收入实质放量前，经营亏损几乎确定。公开数据无法量化企业硬件获客成本。通向盈利的毛利率路径，取决于放量爬坡、收入组合向更高毛利 IP
              授权迁移，以及软件赋能服务收入。
