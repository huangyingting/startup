    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、商业模式与运营概览
        blocks:
          - type: paragraph
            body: >
              Tenstorrent Inc. 于 2016 年 3 月 14 日在加拿大注册，运营总部位于加州 Santa Clara 的 2600 Great America Way, Suite
              501。公司公开使命是靠开源软件栈、RISC-V 指令集架构和成本效率更高的 Tensix 核心处理器，让高性能 AI 硬件更普及。主要收入来自硬件销售（PCIe 加速卡和工作站）与 IP 授权（Tensix 和
              Ascalon RISC-V CPU IP）。Tenstorrent 还基于自有基础设施提供 AI 开发者云服务，形成早期云收入。全球办公室覆盖 Toronto（工程中心）、Austin（Texas）、Fort
              Collins（Colorado），以及 Belgrade（Serbia）、Tokyo（Japan）、Bengaluru（India）、Seoul 和
              Pangyo（Korea）、Munich（Germany）、Warsaw（Poland）、Beijing（China）等国际地点。截至 2026 年中，公司全球员工约 1,100–1,200 人，较 2024 年
              12 月 Series D 后大幅增加。Tenstorrent 采用无晶圆厂半导体模式，芯片制造依赖 GlobalFoundries（早期芯片）、TSMC 和 Samsung 等代工伙伴。核心架构差异在
              Tensix 处理核心：这是一个自包含计算单元，包含 RISC-V 数据搬运处理器、面向张量运算的矩阵数学引擎和向量数学单元；片上 Ethernet
              互连结构连接这些计算单元，让芯片可直接横向扩展，不必依赖昂贵交换机基础设施。开源理念也延伸到编译器栈（TT-Metal/TT-Metalium、TT-Forge
              MLIR、TT-Buda、TT-Lang），这些组件采用 MIT 许可，并在 GitHub 公开。
