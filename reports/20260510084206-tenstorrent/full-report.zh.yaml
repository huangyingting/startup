      - number: '3.3'
        title: 能力与定价对比
        blocks:
          - type: paragraph
            body: >
              Tenstorrent 的 Galaxy Blackhole 于 2026 年 5 月进入量产。开发者参考卡估计约 $1K，单价约为 H100 GPU 的三十分之一；开源 TT-Metal（MIT
              许可）也消除了软件授权费。不过，服务器级定价、机架级配置和云租赁费率尚未在规模化场景下建立。NVIDIA 云 GPU 租赁价格从 $2.00–$14.90/hr（H100）到
              $2.25–$14.24/hr（B200）；AMD MI300X 为 $0.50–$7.86/hr。截至 2026 年 5 月，Galaxy Blackhole 与 H100/B200 的独立 LLM
              基准有限。Tenstorrent 声称 TT-Metal 上 HuggingFace 模型通过率约 90%；该数字为自报，未获独立验证。The Register（2025 年 11 月）评测
              Tenstorrent Blackhole QuietBox 工作站，认为软件「对多数本地 AI 爱好者来说根本不够打磨」，这是具体的成熟度指标。Cerebras 和 Groq
              都是仅推理架构，不具备训练能力；Tenstorrent 的 Galaxy Blackhole 硬件同时支持训练和推理，工作负载覆盖面比单一用途推理挑战者更宽。Intel Gaudi 3
              同样面对软件成熟度挑战，但拥有 Intel 既有分销渠道。
