              CMU 的学术证明覆盖硬件评估和模型研究，不是生产工作负载。Jaguar Land Rover 关联曾在汽车 AI
              计算语境中被提及，但没有具体、已确认的部署公告。总体看，对于一家寻求企业硬件可信度的公司，这套具名证明仍偏薄：一个独立 HaaS 客户、三个投资方绑定客户、一个国家级基础设施合作伙伴——而且都发生在 Galaxy
