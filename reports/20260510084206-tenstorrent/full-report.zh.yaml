      - number: '7.5'
        title: 人才、治理与缓释措施
        blocks:
          - type: paragraph
            body: >
              Jim Keller 身兼 CEO、首席架构师和主要投资者关系发言人，是 Tenstorrent 风险组合中严重程度最高的人才风险。他的履历包括 Intel（2017-2018，约 2
              years）、Tesla（2016-2018，约 2 years）和 Apple（2008-2012，约 4 years）——模式是高影响力但任期有限。Keller 离开会在投资者（尤其是
              Samsung，后者在董事会层面沟通中明确提到 Keller）和客户中触发严重信心冲击。公司未披露继任计划。工程人才留存风险偏高：从 Intel 和 AMD
              招募已签竞业协议的工程师会带来诉讼暴露，Tenstorrent 还要与 Apple Silicon、Google TPU 和 NVIDIA
              不断扩大的定制芯片团队争夺同一批芯片设计人才。对一家如此资本密集的公司而言，mid-2026 估计 1,100-1,200
              人的员工规模，会在增长不能由收入匹配时制造组织规模风险。迄今已部署的缓释措施包括：开源软件栈在理论上降低客户切换成本（但实践中增加安全暴露）；办公室地理分散（Toronto、Austin、Belgrade、Tokyo、Bengaluru、Seoul）；来自
              Tensix 和 Ascalon RISC-V CPU IP 的 IP 授权收入提供非硬件收入流；DevCloud 免费增值模式降低初始客户摩擦。终止标准包括：（1）BIS 对 Blackhole
              在关键市场采取执法行动或拒发出口许可证；（2）TSMC 晶圆配额削减超过 30%；（3）Jim Keller 在 18 months 内离开；（4）现金跑道跌破 6 months 前未能完成下一轮融资；（5）到
              end of 2027 仍未达成可与 CUDA 竞争的软件栈。尽调问题包括：出口管制律师对 Blackhole BIS classification 的意见、资料室中 TSMC 产能承诺证据、Jim Keller
              股权归属时间表，以及已审计收入确认政策。
