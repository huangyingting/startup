  - id: FE001
    title: 产品架构图
    type: stack
    description: Tenstorrent 从硅片到应用层的完整硬件与软件产品栈，展示各层如何相连。
    claimRefs:
      - CE001
      - CE011
      - CE012
      - CE013
      - CE014
      - CE028
      - CE029
      - CE030
    data:
      layers:
        - label: 应用层
          detail: 客户 ML 模型和应用：LLM 推理、视觉、多模态、JAX 工作负载；用标准 PyTorch、JAX 或 ONNX API 访问
        - label: 编译器 / 框架层
          modules:
            - TT-Forge（MLIR 编译器）
            - TT-Torch（PyTorch 桥接）
            - TT-XLA（JAX / XLA 桥接）
            - TT-Forge-ONNX（ONNX 导入器）
          detail: 把框架计算图转换为 Blackhole 优化二进制；GitHub 上 Apache 2.0 开源
        - label: 运行时 / 算子层
          modules:
            - TT-Metalium（调度运行时）
            - TT-NN（200+ 算子库）
            - TT-LLK（低层 Tensix 内核）
          detail: 管理设备内存、内核调度、多 tile 执行和跨卡 mesh 通信；Apache 2.0 开源
        - label: 硬件抽象层
          modules:
            - TT-Metal 内核编程 API
            - PCIe Gen5 ×16 主机接口
            - Ethernet 网格网络（p150a/b：每卡 3.2 Tbps）
          detail: 向上层暴露 Tensix tile 编程模型；原生 Ethernet 芯片集群，不需要专有互连硬件
        - label: 硅层
          detail: >-
            Blackhole ASIC（TSMC 6nm，~600 mm²）：120 个 Tensix tiles、16 个 SiFive X280 RISC-V cores（Linux）、每芯片 600+ 个 baby
            RISC-V cores、180 MB SRAM；Galaxy：32 颗芯片，100 Tbps mesh
          outputs:
            - 664 TFLOPS BlockFP8 / 芯片
            - 332 TFLOPS BF16 / 芯片
            - 23 PFLOPS FP8（Galaxy 32 芯片）
