      - number: '1.3'
        title: 融资历史与投资者格局
        blocks:
          - type: paragraph
            body: >
              自 2017 年 Real Ventures 种子轮以来，Tenstorrent 已完成十轮有记录的融资，截至 2026 年 5 月累计融资约 $1.18B。融资节奏分为三个阶段：早期轮次（2017
              年种子轮、2018 年 2 月 $500K Series A、2019 年 1 月 $20.5M Series B）支持原型开发和早期工程团队扩张；2021 年的 Series C
              组合让公司进入独角兽行列（2021 年 4 月 $164M 批次，加上 2021 年 5 月 Fidelity 领投、投后估值 $1B 的 $200M 批次）；2023 年 8 月由 Hyundai Motor
              Group 和 Samsung Catalyst Fund 领投的 $100M Series C 延伸轮；以及 2024 年 12 月标志性的 $693M Series D，由 Samsung
              Securities 和 AFW Partners 领投，投前估值 $2B、投后估值 $2.6B。Series D 被描述为超额认购。主要投资者包括 Samsung Securities（领投）、AFW
              Partners（领投）、LG Electronics、Hyundai Motor Group、Fidelity Management & Research Company、Bezos
              Expeditions（Jeff Bezos）、Baillie Gifford、XTX Markets、Export Development Canada、Healthcare of Ontario
              Pension Plan、Corner Capital、MESH Ventures、SBI Investment、Eclipse Ventures 和 Real
              Ventures。投资者组合同时覆盖韩国战略集团（Samsung、LG、Hyundai、Kia）、长期机构资管（Fidelity、Baillie Gifford）、主权 / 养老金资金（Export
              Development Canada、HOOPP）和财务投资人（AFW Partners、XTX Markets）。2021 年公司监管文件披露收入为 $25M–$100M；之后未公开披露收入。公司称，截至
              2024 年 12 月融资时，已签合同约 $150M。
