      - number: '3.4'
        title: 切换成本与锁定动态
        blocks:
          - type: paragraph
            body: >
              NVIDIA 领先 20 年的 CUDA，构成 AI 硬件中最深的切换成本护城河。已经嵌入 CUDA 的企业组织若迁移到替代方案，需要承担库重新编译、模型重调、软件认证和开发者再培训成本。400 万+
              注册开发者和 40,000+ 依赖组织让锁定效应自我强化：开发者越多，库越多；切换负担越重，硬件采购越向 NVIDIA 倾斜。Tenstorrent 的 RISC-V ISA
              是开放且客户可编程的，TT-Metal/TT-Forge（基于 MLIR）提供编译器层硬件抽象。借助框架抽象层（PyTorch、JAX），跨 AI
              芯片厂商多供应商部署在技术上可行，但运营成本高；多数企业在生产环境中会标准化到单一供应商。Tenstorrent 基于 Ethernet 的横向扩展，避开大型 NVIDIA GPU 集群所需的
              InfiniBand 网络依赖，降低网络层基础设施锁定。主权 AI 项目——由日本（ai& Tokyo 的 Tenstorrent 部署）、韩国（Hyundai
              投资）和中东的政府及战略企业推动——代表一个有结构性动机的非 NVIDIA 买方群体，主动寻求供应链独立。针对特定地理市场的 NVIDIA 芯片出口管制进一步放大这一机会。
