      - number: '3.5'
        title: 护城河耐久性与反向证据
        blocks:
          - type: paragraph
            body: >
              NVIDIA 的 CUDA 护城河呈现结构性耐久：Blackwell B200/B300 代际扩大训练算力性能差距，软件连续性则把既有工作负载继续锁住。推理层正受到 Cerebras、Groq 和
              SambaNova 更激烈挑战，但各自服务的工作负载画像更窄。Intel 从训练竞争中战略性后退，降低了该细分市场的既有巨头压力。Tenstorrent 的关键反向证据包括：（1）The
              Register（2025 年 11 月）记录 TT-Metal「对多数本地 AI 爱好者来说根本不够打磨」，显示其相对 CUDA 存在具体成熟度缺口；（2）Tenstorrent 90% HuggingFace
              通过率为自报，缺少独立验证；（3）SambaNova 估值从 $5B 下调至约 $2.4B，说明资金充足的 AI 芯片挑战者仍面临严峻执行风险；（4）Cerebras 与 OpenAI 的锚定关系（$10B+
              合同）说明挑战者细分市场存在客户集中脆弱性。Tenstorrent 竞争护城河的耐久度，关键取决于能否在 CUDA 生态势能把领先延伸到 2027–2028 年之前，交付生产级软件工具链对等能力，并扩展 ISV
              伙伴关系。
