  - id: recommendation-confidence-valuation-stance
    title: "Recommendation, Confidence, and Valuation Stance"
    body: >
      The diligence recommendation for Tenstorrent at its November 2025 Series E price of
      $3.2 billion post-money is research-more/track. This is not a pass on the company;
      it is a pass on the information available at the current price.

      Confidence is medium-low (35 out of 100). The primary drivers of this low confidence
      are: (a) no audited revenue figures exist in any public document since a 2021 Canadian
      corporate filing; (b) the Latka algorithmic estimate of $501.6 million for FY2025 is
      unverified by any independent financial analysis; (c) the $150 million in signed
      contracts disclosed as of December 2024 represents backlog, not recognized revenue; and
      (d) software quality risks documented by independent reviewers have not been publicly
      resolved.

      Valuation stance is neutral to negative. At $3.2 billion, Tenstorrent trades at 6.4x
      the Latka revenue estimate or 16–32x conservative revenue estimates. Comparable private
      peers (Cerebras 16–28x, Groq ~10x, SambaNova 10–17x) suggest the valuation is at or
      above the upper bound of the comparable range — without the benefit of confirmed revenue.
      Public market comps (Arm Holdings ~30x EV/revenue, Marvell ~10x) bracket the range but
      reflect entities with audited, confirmed revenue streams.

      Risk rating is high across five dimensions: software maturity, financial burn,
      TSMC concentration, CUDA ecosystem moat, and key-person dependency. Each dimension
      independently warrants elevated monitoring. The combination justifies the research-more
      stance rather than a selective invest.

      Upgrade triggers to selectively invest: confirmed revenue above $200 million (audited
      or disclosed in data room), at least one major hyperscaler design win, software reaching
      a defined enterprise SLA milestone, or entry at a valuation corrected below $2.0 billion
      in a down-round. Downgrade triggers to pass: Jim Keller departure, BIS enforcement action
      on Blackhole, burn exceeding $60 million per month, or a down-round below $2.0 billion
      without accompanying revenue confirmation.
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
