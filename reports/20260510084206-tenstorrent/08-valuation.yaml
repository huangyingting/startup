  - id: exit-readiness-diligence-asks-thesis-break
    title: "Exit Readiness, Diligence Asks, and Thesis-Break Triggers"
    body: >
      Tenstorrent is not IPO-ready as of May 2026. Key readiness gaps include: no publicly
      named CFO with institutional-grade reporting experience, no disclosed audited financial
      statements for FY2024 or FY2025, no hyperscaler design win that would anchor
      enterprise credibility, and a software stack with documented quality issues that would
      invite institutional investor scrutiny. Arm Holdings' 2023 IPO benchmark — filed S-1
      with multiple years of audited revenue, gross margins above 90%, and clear IP licensing
      revenue visibility — sets the bar that Tenstorrent currently cannot meet.

      M&A is a more plausible near-term exit scenario. Strategic acquirers would include
      Qualcomm (AI edge chips), Samsung (foundry-integrated AI), Intel (custom AI silicon),
      and Arm Holdings itself (RISC-V ecosystem consolidation). Acquisition premium benchmarks
      from AI chip M&A — AMD/Xilinx at ~$35 billion (15x revenue, 2022) and Broadcom/VMware
      ($69 billion) — suggest that a technology-premium acquisition of Tenstorrent at $5–8
      billion in a bull scenario is plausible but requires demonstrated commercial traction.

      Final diligence asks (priority order): (1) Audited or data-room-verified revenue and
      gross margin for FY2025 — critical, 30-day timeline; (2) BIS export compliance
      documentation for Blackhole — critical, 60-day; (3) Cap table with Series D/E preference
      mechanics and liquidation waterfall — critical, 30-day; (4) Galaxy signed delivery orders
      and customer deployment timeline — high priority, 45-day; (5) Jim Keller equity vesting
      schedule and board succession protocol — high priority, 30-day; (6) TSMC capacity
      agreement and next-gen node qualification timeline — high priority, 60-day.

      Thesis-break triggers that mandate immediate investment hold: Jim Keller public
      departure, BIS enforcement action against Blackhole, burn rate confirmed above
      $60 million per month without corresponding revenue, down-round below $2.0 billion,
      or confirmed loss of any one of the three strategic investor-customers.
    claimRefs:
      - CV026
      - CV028
