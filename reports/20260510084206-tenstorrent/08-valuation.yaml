  - id: financing-context-and-valuation-benchmarking
    title: "Financing Context and Valuation Benchmarking"
    body: >
      Tenstorrent has raised approximately $1.99 billion across six funding rounds since 2019:
      Seed (~$10 million, 2019), Series A ($40 million, 2021), Series B ($100 million, 2022),
      Series C ($235 million, 2023), Series D ($693 million at $2.6 billion post-money,
      December 2024), and Series E ($800 million at $3.2 billion post-money, November 2025).
      The Series D round was led by Samsung Securities with participation from LG Technology
      Ventures and Hyundai; the Series E was led by Fidelity. The rapid step-up from $2.6
      billion to $3.2 billion valuation (approximately 23% in 11 months) without confirmed
      revenue disclosure suggests the round was priced on strategic optionality and investor
      demand rather than fundamental financial metrics.

      Preference overhang is a material concern. Series D investors at $2.6 billion and
      Series E investors at $3.2 billion carry liquidation preferences; in a bear or distress
      scenario where exit valuation falls below $2.6 billion, common equity holders and
      early investors face a significant waterfall shortfall. The exact preference mechanics
      and participating vs. non-participating preferred structure are not publicly disclosed,
      making precise waterfall modeling impossible without the cap table.

      On a comparable basis, Tenstorrent's 6.4x Latka EV/revenue (unconfirmed) sits at
      the lower bound of comparable private rounds: Cerebras (16–28x), SambaNova (10–17x),
      and Groq (~10x). However, if conservative revenue estimates of $100–200 million are
      applied, Tenstorrent's implied multiple rises to 16–32x — at or above the comparable
      private range. Public market anchors (Arm Holdings ~30x EV/revenue, NVIDIA ~26x,
      Marvell ~10x) suggest that at confirmed revenue of $200–300 million and a de-risked
      software stack, a $3–5 billion valuation is supportable, but not at the current
      evidence level. NVIDIA's data center revenue of approximately $115 billion in FY2025,
      confirmed in its SEC 10-K filing, and Arm Holdings' FY2025 revenue of ~$3.96 billion
      provide the public market anchors for evaluating AI chip hardware and IP licensing
      multiples.
