  - id: bull-base-bear-scenarios
    title: "Bull, Base, and Bear Scenarios"
    body: >
      Three scenarios bracket the expected outcome for a Series E investor entering at
      $3.2 billion.

      Bull case (20% probability, 5-year horizon through 2028–2029): Tenstorrent captures
      approximately 5% of the AI inference accelerator market by 2028–2029, benefiting from
      Galaxy Blackhole deployment at SoftBank, LG, and Hyundai data centers plus at least
      one major cloud provider qualification. Software matures to enterprise-grade (open
      issues below 1,000; independent enterprise validation). IP licensing revenue from
      Ascalon RISC-V grows to $100–200 million annually. Revenue reaches approximately
      $2 billion; at an 8x revenue exit multiple (consistent with NVIDIA's historical ranges
      for high-growth hardware-plus-IP companies), the exit valuation is approximately $16
      billion. Series E investors realize a 5x return (~40% IRR over 4–5 years).

      Base case (50% probability, exit 2029–2030): Galaxy Blackhole achieves meaningful
      neocloud deployment but no major hyperscaler qualification. Software gap narrows but
      does not fully close; CUDA remains dominant for enterprise training. Revenue reaches
      approximately $500–800 million (2–3% market share). Exit at 5x revenue implies a
      $3–5 billion valuation — approximately flat to modest positive return for Series E
      investors (~5% IRR). This is a scenario where Tenstorrent survives as a niche player
      but does not achieve breakout scale.

      Bear case (30% probability): Software quality gap persists, NVIDIA maintains 85%+
      inference market share, and Galaxy Blackhole remains confined to strategic investor-
      customer deployments. Burn forces a down-round or acquisition at $500 million–$1
      billion. Series E investors face a 60–80% loss. Key triggers: Jim Keller departure,
      absence of any hyperscaler trial win by Q4 2026, or BIS enforcement action on
      Blackhole.

      Probability-weighted expected valuation ($16B × 20% + $4B × 50% + $750M × 30%)
      equals $5.4 billion — approximately 1.7x the Series E entry price, implying a positive
      expected value but a thin margin of safety given the high variance and information gaps.
