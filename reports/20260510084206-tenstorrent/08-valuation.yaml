callouts:
  - title: "Galaxy GA Is a Milestone, Not a Revenue Confirmation"
    body: >
      The April 2026 general availability announcement for Galaxy Blackhole is a meaningful
      product milestone but does not resolve the revenue uncertainty. Revenue recognition
      requires signed purchase orders, customer acceptance, and delivery — none of which have
      been publicly confirmed. Investors should not use the GA announcement as a proxy for
      commercial traction until Q2–Q3 2026 booking data is available.
    claimRefs:
      - CV014
      - CV015
    calloutType: risk

  - title: "Preference Overhang: Common Equity Is Exposed Below $2.6B"
    body: >
      Series D investors entered at $2.6 billion and Series E at $3.2 billion. In any exit
      below $2.6 billion — which the bear case estimates at $300M–$1B — common equity holders
      and early-stage preferred investors below the Series D liquidation preference are exposed
      to total loss. The preference stack mechanics are not publicly disclosed, making waterfall
      modeling impossible without cap table access. This is a critical diligence item before
      any investment decision.
    claimRefs:
      - CV038
      - CV029
    calloutType: risk

  - title: "Research-More Stance: Specific Upgrade Conditions"
    body: >
      The research-more/track recommendation has specific, measurable upgrade conditions:
      (1) data room or public confirmation of FY2025 revenue above $200 million; (2) at least
      one hyperscaler (AWS, Google, Azure, or Oracle) announces a Galaxy Blackhole deployment
      or design win; (3) software open-issue count falls below 1,000 with enterprise SLA
      commitments; or (4) entry price corrects to below $2.0 billion. Any single condition
      met would move the call to selectively invest pending cap table review.
    claimRefs:
      - CV040
      - CV016
    calloutType: recommendation

  - title: "Expected Value Is Positive, But Information Gap Is Unacceptable"
    body: >
      The probability-weighted expected exit valuation of approximately $5.4 billion implies
      a positive return from the $3.2 billion Series E price. However, the variance across
      scenarios is extreme (bear: $300M–$1B vs. bull: $10B–$20B), and the high-confidence
      data needed to narrow this variance — audited revenue, confirmed orders, cap table —
      is not publicly available. A positive expected value with unquantifiable information
      risk is insufficient for an institutional investment commitment.
    claimRefs:
      - CV025
      - CV041
    calloutType: insight

