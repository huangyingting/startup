      - number: '1.3'
        title: Funding History & Investor Landscape
        blocks:
          - type: paragraph
            body: >
              Tenstorrent has completed ten documented funding rounds since its 2017 seed from Real Ventures, raising a
              total of approximately $1.18 billion as of May 2026. The funding timeline covers three distinct phases:
              early rounds (Seed 2017, Series A $500K in February 2018, Series B $20.5M in January 2019) that funded
              prototype development and initial engineering team growth; a Series C cluster in 2021 that brought the
              company to unicorn status (April 2021 tranche of $164M plus a May 2021 Fidelity-led tranche of $200M at a
              $1B post-money valuation); a $100M Series C extension in August 2023 led by Hyundai Motor Group and
              Samsung Catalyst Fund; and the landmark $693M Series D in December 2024 at a $2B pre-money ($2.6B
              post-money) valuation led by Samsung Securities and AFW Partners. The Series D was described as
              oversubscribed. Major investors include Samsung Securities (lead), AFW Partners (lead), LG Electronics,
              Hyundai Motor Group, Fidelity Management & Research Company, Bezos Expeditions (Jeff Bezos), Baillie
              Gifford, XTX Markets, Export Development Canada, Healthcare of Ontario Pension Plan, Corner Capital, MESH
              Ventures, SBI Investment, Eclipse Ventures, and Real Ventures. The investor base blends strategic Korean
              conglomerates (Samsung, LG, Hyundai, Kia), long-term institutional asset managers (Fidelity, Baillie
              Gifford), sovereign/pension funds (Export Development Canada, HOOPP), and financial sponsors (AFW
              Partners, XTX Markets). Revenue was disclosed as $25M–$100M in a 2021 corporate filing; no subsequent
              revenue disclosures have been made public. The company has stated approximately $150M in signed contracts
              as of the December 2024 fundraise.
