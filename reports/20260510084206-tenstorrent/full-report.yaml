        title: Exhibits
        blocks:
          - type: callout
            title: Software Maturity Gap is the Primary Competitive Risk
            body: >
              The Register's November 2025 review found Tenstorrent's software "simply isn't polished enough for most
              local AI enthusiasts," documenting a concrete production-readiness gap vs. CUDA. Until TT-Metal reaches
              ISV-level toolchain maturity with verified independent benchmarks, Tenstorrent's hardware differentiation
              may be insufficient to drive enterprise adoption at scale. The self-reported 90% HuggingFace pass rate
              requires independent corroboration before enterprises will commit to production workloads.
