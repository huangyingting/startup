  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              Tenstorrent's investment thesis rests on six pillars. First, architectural differentiation: the Tensix
              processing element and RISC-V-based Ascalon CPU represent a ground-up departure from GPU-centric design,
              enabling asymmetric power-efficiency for inference workloads. Second, market timing: the AI accelerator
              market is projected to reach $170 billion in annual revenue by 2030, and the inference segment is growing
              faster than training, directly favoring Tenstorrent's product focus. Third, ecosystem anchoring: 90%
              compatibility with HuggingFace models and an open-source software stack (TT-Metal/ TT-Metalium, MIT
              license) reduce developer adoption friction and provide a credible CUDA-alternative narrative. Fourth,
              capital runway: with approximately $2 billion in cumulative funding including the $800 million Series E
              (November 2025), Tenstorrent has capital to fund at least one next-generation chip tape-out and 16–32
              months of operations. Fifth, strategic investor depth: LG Electronics, Hyundai Motor, SoftBank, Samsung
              Securities, and Fidelity provide captive customer relationships, distribution reach, and patient capital.
              Sixth, IP licensing upside: the Ascalon RISC-V CPU licensed to third parties generates recurring
              software-like revenue with higher implied multiples.

              The anti-thesis is equally substantial. NVIDIA's CUDA ecosystem, built over 15+ years with millions of
              developer hours and $100+ billion in software investment, is extraordinarily sticky. Enterprise customers
              face switching costs of 18–36 months and significant retraining investment. Tenstorrent's software — as
              documented by The Register's November 2025 Blackhole QuietBox review — is not yet enterprise-polished, and
              the tt-metal repository's 3,488 open issues compound this concern. The investor- customer duality (LG,
              Hyundai, SoftBank are simultaneously investors and largest customers) creates circular dependency risk: a
              single entity exiting could cause simultaneous revenue loss and confidence collapse. Burn rate of $25–50
              million per month against unconfirmed revenue means the company could require another round before
              achieving cash-flow breakeven. TSMC sole-source dependency adds geopolitical and operational concentration
              that is difficult to hedge. Taken together, the thesis requires multiple conditions to hold
              simultaneously; any single failure — software stagnation, key-person departure, TSMC disruption, or
              down-round — can materially reset valuation assumptions.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV013
              - CV019
              - CV027
      - number: '8.2'
        title: Recommendation, Confidence, and Valuation Stance
        blocks:
          - type: paragraph
            body: >
              The diligence recommendation for Tenstorrent at its November 2025 Series E price of $3.2 billion
              post-money is research-more/track. This is not a pass on the company; it is a pass on the information
              available at the current price.

              Confidence is medium-low (35 out of 100). The primary drivers of this low confidence are: (a) no audited
              revenue figures exist in any public document since a 2021 Canadian corporate filing; (b) the Latka
              algorithmic estimate of $501.6 million for FY2025 is unverified by any independent financial analysis; (c)
              the $150 million in signed contracts disclosed as of December 2024 represents backlog, not recognized
              revenue; and (d) software quality risks documented by independent reviewers have not been publicly
              resolved.

              Valuation stance is neutral to negative. At $3.2 billion, Tenstorrent trades at 6.4x the Latka revenue
              estimate or 16–32x conservative revenue estimates. Comparable private peers (Cerebras 16–28x, Groq ~10x,
              SambaNova 10–17x) suggest the valuation is at or above the upper bound of the comparable range — without
              the benefit of confirmed revenue. Public market comps (Arm Holdings ~30x EV/revenue, Marvell ~10x) bracket
              the range but reflect entities with audited, confirmed revenue streams.

              Risk rating is high across five dimensions: software maturity, financial burn, TSMC concentration, CUDA
              ecosystem moat, and key-person dependency. Each dimension independently warrants elevated monitoring. The
              combination justifies the research-more stance rather than a selective invest.

              Upgrade triggers to selectively invest: confirmed revenue above $200 million (audited or disclosed in data
              room), at least one major hyperscaler design win, software reaching a defined enterprise SLA milestone, or
              entry at a valuation corrected below $2.0 billion in a down-round. Downgrade triggers to pass: Jim Keller
              departure, BIS enforcement action on Blackhole, burn exceeding $60 million per month, or a down-round
              below $2.0 billion without accompanying revenue confirmation.
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
              - CV038
              - CV039
              - CV040
      - number: '8.3'
        title: Financing Context and Valuation Benchmarking
        blocks:
          - type: paragraph
            body: >
              Tenstorrent has raised approximately $1.99 billion across six funding rounds since 2019: Seed (~$10
              million, 2019), Series A ($40 million, 2021), Series B ($100 million, 2022), Series C ($235 million,
              2023), Series D ($693 million at $2.6 billion post-money, December 2024), and Series E ($800 million at
              $3.2 billion post-money, November 2025). The Series D round was led by Samsung Securities with
              participation from LG Technology Ventures and Hyundai; the Series E was led by Fidelity. The rapid step-up
              from $2.6 billion to $3.2 billion valuation (approximately 23% in 11 months) without confirmed revenue
              disclosure suggests the round was priced on strategic optionality and investor demand rather than
              fundamental financial metrics.

              Preference overhang is a material concern. Series D investors at $2.6 billion and Series E investors at
              $3.2 billion carry liquidation preferences; in a bear or distress scenario where exit valuation falls
              below $2.6 billion, common equity holders and early investors face a significant waterfall shortfall. The
              exact preference mechanics and participating vs. non-participating preferred structure are not publicly
              disclosed, making precise waterfall modeling impossible without the cap table.

              On a comparable basis, Tenstorrent's 6.4x Latka EV/revenue (unconfirmed) sits at the lower bound of
              comparable private rounds: Cerebras (16–28x), SambaNova (10–17x), and Groq (~10x). However, if
              conservative revenue estimates of $100–200 million are applied, Tenstorrent's implied multiple rises to
              16–32x — at or above the comparable private range. Public market anchors (Arm Holdings ~30x EV/revenue,
              NVIDIA ~26x, Marvell ~10x) suggest that at confirmed revenue of $200–300 million and a de-risked software
              stack, a $3–5 billion valuation is supportable, but not at the current evidence level. NVIDIA's data
              center revenue of approximately $115 billion in FY2025, confirmed in its SEC 10-K filing, and Arm
              Holdings' FY2025 revenue of ~$3.96 billion provide the public market anchors for evaluating AI chip
              hardware and IP licensing multiples.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV007
              - CV008
              - CV020
              - CV021
              - CV029
              - CV031
              - CV042
              - CV043
      - number: '8.4'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              Three scenarios bracket the expected outcome for a Series E investor entering at $3.2 billion.

              Bull case (20% probability, 5-year horizon through 2028–2029): Tenstorrent captures approximately 5% of
              the AI inference accelerator market by 2028–2029, benefiting from Galaxy Blackhole deployment at SoftBank,
              LG, and Hyundai data centers plus at least one major cloud provider qualification. Software matures to
              enterprise-grade (open issues below 1,000; independent enterprise validation). IP licensing revenue from
              Ascalon RISC-V grows to $100–200 million annually. Revenue reaches approximately $2 billion; at an 8x
              revenue exit multiple (consistent with NVIDIA's historical ranges for high-growth hardware-plus-IP
              companies), the exit valuation is approximately $16 billion. Series E investors realize a 5x return (~40%
              IRR over 4–5 years).

              Base case (50% probability, exit 2029–2030): Galaxy Blackhole achieves meaningful neocloud deployment but
              no major hyperscaler qualification. Software gap narrows but does not fully close; CUDA remains dominant
              for enterprise training. Revenue reaches approximately $500–800 million (2–3% market share). Exit at 5x
              revenue implies a $3–5 billion valuation — approximately flat to modest positive return for Series E
              investors (~5% IRR). This is a scenario where Tenstorrent survives as a niche player but does not achieve
              breakout scale.

              Bear case (30% probability): Software quality gap persists, NVIDIA maintains 85%+ inference market share,
              and Galaxy Blackhole remains confined to strategic investor- customer deployments. Burn forces a
              down-round or acquisition at $500 million–$1 billion. Series E investors face a 60–80% loss. Key triggers:
              Jim Keller departure, absence of any hyperscaler trial win by Q4 2026, or BIS enforcement action on
              Blackhole.

              Probability-weighted expected valuation ($16B × 20% + $4B × 50% + $750M × 30%) equals $5.4 billion —
              approximately 1.7x the Series E entry price, implying a positive expected value but a thin margin of
              safety given the high variance and information gaps.
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV025
              - CV030
              - CV032
              - CV033
              - CV034
              - CV041
      - number: '8.5'
        title: Exit Readiness, Diligence Asks, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              Tenstorrent is not IPO-ready as of May 2026. Key readiness gaps include: no publicly named CFO with
              institutional-grade reporting experience, no disclosed audited financial statements for FY2024 or FY2025,
              no hyperscaler design win that would anchor enterprise credibility, and a software stack with documented
              quality issues that would invite institutional investor scrutiny. Arm Holdings' 2023 IPO benchmark — filed
              S-1 with multiple years of audited revenue, gross margins above 90%, and clear IP licensing revenue
              visibility — sets the bar that Tenstorrent currently cannot meet.

              M&A is a more plausible near-term exit scenario. Strategic acquirers would include Qualcomm (AI edge
              chips), Samsung (foundry-integrated AI), Intel (custom AI silicon), and Arm Holdings itself (RISC-V
              ecosystem consolidation). Acquisition premium benchmarks from AI chip M&A — AMD/Xilinx at ~$35 billion
              (15x revenue, 2022) and Broadcom/VMware ($69 billion) — suggest that a technology-premium acquisition of
              Tenstorrent at $5–8 billion in a bull scenario is plausible but requires demonstrated commercial traction.

              Final diligence asks (priority order): (1) Audited or data-room-verified revenue and gross margin for
              FY2025 — critical, 30-day timeline; (2) BIS export compliance documentation for Blackhole — critical,
              60-day; (3) Cap table with Series D/E preference mechanics and liquidation waterfall — critical, 30-day;
              (4) Galaxy signed delivery orders and customer deployment timeline — high priority, 45-day; (5) Jim Keller
              equity vesting schedule and board succession protocol — high priority, 30-day; (6) TSMC capacity agreement
              and next-gen node qualification timeline — high priority, 60-day.

              Thesis-break triggers that mandate immediate investment hold: Jim Keller public departure, BIS enforcement
              action against Blackhole, burn rate confirmed above $60 million per month without corresponding revenue,
              down-round below $2.0 billion, or confirmed loss of any one of the three strategic investor-customers.
            claimRefs:
              - CV026
              - CV028
              - CV035
              - CV036
              - CV037
              - CV038
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Galaxy GA Is a Milestone, Not a Revenue Confirmation
            body: >
              The April 2026 general availability announcement for Galaxy Blackhole is a meaningful product milestone
              but does not resolve the revenue uncertainty. Revenue recognition requires signed purchase orders,
              customer acceptance, and delivery — none of which have been publicly confirmed. Investors should not use
              the GA announcement as a proxy for commercial traction until Q2–Q3 2026 booking data is available.
            calloutType: risk
            claimRefs:
              - CV014
              - CV015
          - type: callout
            title: 'Preference Overhang: Common Equity Is Exposed Below $2.6B'
            body: >
              Series D investors entered at $2.6 billion and Series E at $3.2 billion. In any exit below $2.6 billion —
              which the bear case estimates at $300M–$1B — common equity holders and early-stage preferred investors
              below the Series D liquidation preference are exposed to total loss. The preference stack mechanics are
              not publicly disclosed, making waterfall modeling impossible without cap table access. This is a critical
              diligence item before any investment decision.
            calloutType: risk
            claimRefs:
              - CV038
              - CV029
          - type: callout
            title: 'Research-More Stance: Specific Upgrade Conditions'
            body: >
              The research-more/track recommendation has specific, measurable upgrade conditions: (1) data room or
              public confirmation of FY2025 revenue above $200 million; (2) at least one hyperscaler (AWS, Google,
              Azure, or Oracle) announces a Galaxy Blackhole deployment or design win; (3) software open-issue count
              falls below 1,000 with enterprise SLA commitments; or (4) entry price corrects to below $2.0 billion. Any
              single condition met would move the call to selectively invest pending cap table review.
            calloutType: recommendation
            claimRefs:
              - CV040
              - CV016
          - type: callout
            title: Expected Value Is Positive, But Information Gap Is Unacceptable
            body: >
              The probability-weighted expected exit valuation of approximately $5.4 billion implies a positive return
              from the $3.2 billion Series E price. However, the variance across scenarios is extreme (bear: $300M–$1B
              vs. bull: $10B–$20B), and the high-confidence data needed to narrow this variance — audited revenue,
              confirmed orders, cap table — is not publicly available. A positive expected value with unquantifiable
              information risk is insufficient for an institutional investment commitment.
            calloutType: insight
            claimRefs:
              - CV025
              - CV041
