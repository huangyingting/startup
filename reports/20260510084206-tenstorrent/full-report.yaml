  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Architecture and Business Model
        blocks:
          - type: paragraph
            body: >
              Tenstorrent operates a multi-stream revenue model that combines hardware product sales,
              intellectual-property licensing, and cloud-access services, though as a private company it discloses no
              audited financials. The primary revenue driver as of May 2026 is direct hardware sales—specifically the
              Galaxy Blackhole AI server systems and associated inference accelerator cards—which entered volume
              production and general availability in April–May 2026. The Galaxy Blackhole server chassis carries a list
              price of $110,000 per unit (32 Blackhole ASICs, 23 PFLOPS FP8), with a four-chassis Supercluster priced at
              $440,000. Enterprise and hyperscaler customers are expected to transact at volume; discount structure is
              not publicly disclosed. Below the Galaxy tier, Tenstorrent sells the Blackhole P100 inference card at
              approximately $999 (entry) and the QuietBox workstation at approximately $9,999. A second revenue
              stream—IP licensing of the company's RISC-V CPU cores and Tensix NPU architecture—provides royalty income
              from automotive and edge OEM partners including Samsung and Hyundai, though licensing economics are
              entirely undisclosed. A third, emerging stream is cloud-based hardware-as-a-service delivered through the
              Koyeb serverless platform, which offers Tenstorrent compute instances on a usage-based model. The DevCloud
              developer program provides free or freemium access to Wormhole hardware for developers and may convert to
              paid enterprise DevCloud subscriptions. Professional services and integration support are a minor fourth
              stream at this stage.
            claimRefs: []
      - number: '4.2'
        title: Pricing Structure and GTM Motion
        blocks:
          - type: paragraph
            body: >
              Tenstorrent's primary commercial differentiator on pricing is total-cost-of-inference efficiency rather
              than raw list price. The company claims the Galaxy Blackhole system delivers $6 per million inference
              tokens on a DeepSeek-R1 671B workload, versus approximately $30 per million tokens on NVIDIA's GB300 GPU
              system—a 5× cost advantage per token of output. At $110,000 per server chassis, the Galaxy targets
              enterprise inference deployments where sustained throughput and memory capacity matter more than peak
              FLOPS. GTM motion is primarily direct enterprise sales with limited channel activity. Early deployments
              include ai& Corporation in Tokyo, Cirrascale Cloud Services, and Turium AI, suggesting an early-customer
              strategy of cloud-service-provider seeding rather than broad Fortune 500 direct sales. Sales cycles in
              enterprise AI infrastructure are typically three to twelve months, implying the signed-contracts figure of
              approximately $150 million (as reported at the Series D close in December 2024) represents a pipeline
              backlog, not recognized revenue. Revenue recognition for hardware follows an at-delivery model; multi-year
              support contracts, if offered, would be recognized ratably. IP licensing royalties are recognized on a
              per-chip or per-period royalty basis. The GTM efficiency metrics—CAC, payback period, and channel
              economics—are not publicly disclosed and represent a significant diligence gap. Open-source positioning of
              TT-Metal and TT-Forge under MIT license serves as a developer-acquisition funnel, though converting
              developer mindshare to enterprise hardware revenue remains unproven at scale.
            claimRefs: []
      - number: '4.3'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >
              As a fabless semiconductor company, Tenstorrent's unit economics are driven by wafer costs at TSMC
              (manufacturing on the N4 node for Blackhole), packaging, test, and shipping, offset by ASP and volume. At
              $110,000 per Galaxy server chassis, if COGS per server is estimated at $50,000–$70,000 (TSMC wafer cost
              for 32 Blackhole ASICs at volume, plus GDDR6 memory, PCB, power, assembly), implied gross margin per
              chassis is 36%–55%— consistent with the 40%–55% range typical of scaling fabless chip companies. These
              figures are entirely estimated; Tenstorrent does not disclose COGS, gross margin, or per-unit economics.
              The non-recurring engineering (NRE) cost for the Blackhole N4 tape-out is estimated at $50 million–$100
              million or more, amortized over production volume. At lower volume (thousands of servers), NRE
              amortization would compress gross margins significantly. Headcount of approximately 1,100–1,200 employees
              as of early 2026 implies an annual personnel cost of roughly $220–$300 million at market-rate fully loaded
              compensation for hardware and software engineers. Adding TSMC production costs, tooling, EDA licenses,
              facilities, and G&A overhead, total operating expenditure is estimated at $25–$50 million per month. Until
              Galaxy Blackhole hardware revenue scales meaningfully, operating losses are certain. Customer acquisition
              cost for enterprise hardware is unquantifiable from public data. Gross margin path to profitability
              depends on volume ramp, mix shift toward higher-margin IP licensing, and software-enabled service revenue.
            claimRefs: []
      - number: '4.4'
        title: Capital Structure, Runway, and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Tenstorrent has raised total funding of approximately $1.99 billion across multiple rounds. The Series D
              raised $693 million at a $2.6 billion post-money valuation in December 2024, led by Samsung Securities and
              LG Technology Ventures. A Series E of approximately $800 million at a $3.2 billion post-money valuation,
              led by Fidelity Management and Research, closed in November 2025. The company also previously raised $100
              million in funding from Hyundai Motor Group and Samsung in 2023. With an estimated operating burn of
              $25–$50 million per month and no disclosed revenues, the Series E capital provides an estimated runway of
              16–32 months from November 2025—broadly sufficient to reach meaningful Galaxy hardware revenue but with
              limited margin for delays. The planned use of Series E capital includes production scale-up,
              next-generation chip (post-Blackhole) design and tape-out, and GTM expansion. Any major product delay,
              customer concentration setback, or TSMC capacity constraint would accelerate runway consumption. There is
              no public evidence of debt financing or project finance obligations. The company has not indicated any
              profitability target date. Given the capital intensity of the semiconductor business, Tenstorrent will
              likely require additional capital (Series F or revenue-based financing) within 24–36 months of the Series
              E close unless Galaxy hardware revenue scales rapidly. Revenue-model adequacy and gross-margin trajectory
              are the primary diligence gates for any follow-on investment.
            claimRefs: []
      - number: '4.5'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: >
              Tenstorrent presents a high-risk, high-upside financial profile. On the positive side, the company is
              well-capitalized (~$1.99 billion total raised, with Series E proceeds providing estimated 16–32 months
              runway from November 2025), has publicly launched a competitively priced AI inference server system
              (Galaxy Blackhole at $110,000/server), and claims a compelling 5× cost-per-token advantage over NVIDIA's
              flagship GB300 cluster. Against this, the company discloses no audited revenue, gross margins, COGS, or
              burn rate. Third-party revenue estimates (Latka model, $501.6 million for 2025) are algorithmic guesses,
              not verified figures, and are viewed as unreliable for investment decisions. The signed-contracts figure
              of ~$150 million (as of December 2024) lags the total capital raised by a factor of 13×. The Register's
              April 2026 review of the Galaxy launch questioned whether software and ecosystem maturity were sufficient
              to drive rapid enterprise adoption. Key diligence blockers: (1) no disclosed financials—revenue, gross
              margin, cash position; (2) no customer concentration data—a single customer cancellation could be
              material; (3) IP licensing economics are opaque—royalty rates and volume commitments are undisclosed; (4)
              burn rate and cash runway verified only by estimation; (5) no clarity on the revenue-recognition timeline
              for the signed-contracts backlog. Until these gaps are addressed through an audited data room, financial
              diligence is incomplete, and the financial chapter should be treated as a risk-staging document rather
              than a validated financial model.
            claimRefs: []
      - number: '4.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Revenue Opacity Is the Primary Diligence Blocker
            body: >
              Tenstorrent discloses no revenue, gross margins, or burn rate. The only third-party revenue figure ($501.6
              million for FY2025 from Latka's algorithmic model) is widely considered unreliable for private hardware
              companies and is not suitable as a diligence basis. All financial projections in this chapter are
              estimates derived from industry benchmarks and publicly announced pricing; they must be superseded by
              audited financials before any investment decision.
