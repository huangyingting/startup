chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Business Model & Operational Overview
        blocks:
          - type: paragraph
            body: >
              Tenstorrent Inc. was incorporated in Canada on 14 March 2016 and is operationally headquartered at 2600
              Great America Way, Suite 501, Santa Clara, California. The company's stated mission is to democratize
              high-performance AI hardware through open-source software stacks, a RISC-V instruction-set architecture,
              and cost-efficient Tensix-core processors. Its primary revenue streams are hardware sales (PCIe
              accelerator cards and workstations) and IP licensing (Tensix and Ascalon RISC-V CPU IP). Tenstorrent also
              derives early-stage cloud revenue through AI developer cloud services built on its own infrastructure.
              Global offices span Toronto (engineering hub), Austin (Texas), Fort Collins (Colorado), and international
              locations in Belgrade (Serbia), Tokyo (Japan), Bengaluru (India), Seoul and Pangyo (Korea), Munich
              (Germany), Warsaw (Poland), and Beijing (China). The company has approximately 1,100 to 1,200 employees
              globally as of mid-2026, up sharply following the December 2024 Series D. Tenstorrent operates as a
              fabless semiconductor company, relying on foundry partners GlobalFoundries (initial chips), TSMC, and
              Samsung for chip fabrication. The core architectural differentiator is the Tensix processing core—a
              self-contained compute tile comprising a RISC-V data-movement processor, a matrix math engine for tensor
              operations, and a vector math unit— connected via an on-chip Ethernet fabric that enables direct
              chip-to-chip scaling without expensive switch infrastructure. The open-source philosophy extends to
              compiler stacks (TT-Metal/TT-Metalium, TT-Forge MLIR, TT-Buda, TT-Lang), which are MIT-licensed and
              publicly available on GitHub.
