companyProfile:
  summary: >-
    Tenstorrent is a San Jose-based AI chip company founded in 2016 by Jim Keller (CPU architect behind AMD Zen and
    Apple A-series). The company designs the Blackhole ASIC — a TSMC 6nm chip with 120 proprietary Tensix cores and 16
    big RISC-V processors — targeting high-performance AI inference and edge deployment. Tenstorrent has raised ~$1.99B
    across five rounds (most recently $800M Series E at $3.2B valuation in Nov 2025) from strategic investors including
    Samsung Securities, LG Technology Ventures, Hyundai Motor Group, and Fidelity. The company's differentiated RISC-V
    architecture avoids ARM licensing fees and enables an open-source software stack (TT-Metal, TT-Forge, Apache 2.0)
    aimed at breaking NVIDIA's CUDA ecosystem lock-in.
