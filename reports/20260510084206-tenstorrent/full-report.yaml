      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              The AI accelerator market segments into five buyer archetypes with materially different budget ownership,
              procurement authority, and AI chip adoption behavior.

              Hyperscalers (Amazon AWS, Google Cloud, Microsoft Azure, Meta) dominate demand: the five largest
              hyperscalers are expected to spend $650–700B on AI infrastructure in 2026, of which approximately 70–75%
              is AI-specific. They set reference prices and supply terms. Hyperscalers also build custom silicon
              internally (Google TPU, Amazon Trainium/Inferentia) and are not a near-term market for Tenstorrent's
              commercial hardware. However, RISC-V IP licensing to hyperscaler SoC teams represents a longer-term
              pathway.

              Neoclouds (CoreWeave, Lambda Labs, Crusoe, Nebius, ai&co, Cirrascale, Turium, Virtu Financial AI, Prodia)
              are Tenstorrent's primary commercial beachhead as of May 2026. Futurum Group confirmed Galaxy Blackhole
              deployments with at least five neocloud co-locations by May 2026. The neocloud segment is projected to
              generate approximately $20B in revenue in 2026, growing to $180B by 2030. Neoclouds are actively
              evaluating non-NVIDIA chips to reduce GPU dependency and find cost advantage in inference.

              Enterprise buyers (finance, healthcare, manufacturing, automotive OEMs) increasingly use cloud AI services
              rather than on-premise GPU clusters. Average enterprise LLM spend reached $7M/year in 2025, nearly triple
              the 2024 level. Most enterprises buy AI compute through hyperscalers, limiting direct chip procurement
              opportunity for Tenstorrent in the near term. However, Korean OEM partners—Hyundai, Samsung, LG—as
              strategic investors represent a high-value enterprise adoption pathway.

              Edge/embedded buyers (autonomous vehicle OEMs, IoT device makers, industrial automation vendors) are a
              longer-horizon market that Tenstorrent addresses through RISC-V edge IP. The edge inference market is
              growing at similar CAGR (~19%) to cloud inference and represents a product-market fit for Tenstorrent's
              forthcoming edge silicon.

              RISC-V IP licensees are a distinct customer type: chipmakers and system OEMs that license the Ascalon
              RISC-V CPU core for embedding in SoCs. Budget control sits with semiconductor procurement or IP sourcing
              teams in those organizations, not AI infrastructure teams.
            claimRefs:
              - CM017
              - CM018
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              Growth drivers for the AI accelerator market are strong and well-evidenced. The generative AI inference
              explosion is the dominant driver: by 2026, approximately two-thirds of AI compute will be
              inference-driven, creating persistent high-volume demand for inference-optimized silicon. NVIDIA GPU
              supply is severely constrained through at least 2027 due to TSMC CoWoS advanced packaging bottlenecks and
              HBM3e supply limits, creating structural demand for alternatives. Geopolitical compute sovereignty
              requirements—particularly in Korea (Samsung, LG, Hyundai), Japan (SoftBank partner ai& is Tenstorrent's
              largest Galaxy Blackhole deployment), and the EU—generate buyer appetite for non-American chip options.
              Power efficiency is an increasingly critical axis as data center power density limits are reached;
              Tenstorrent claims competitive performance per watt.

              Adoption constraints for Tenstorrent specifically include: CUDA ecosystem lock-in (the primary structural
              constraint—NVIDIA's CUDA/cuDNN libraries require significant software rewrite to migrate to any
              alternative), software immaturity of TT-Metal/TT-Metalium relative to production-grade CUDA (confirmed
              adversely by The Register, November 2025), capital intensity of semiconductor development (chips require
              multi-year development cycles and hundreds of millions in TSMC/Samsung fabless costs), and HBM supply as a
              shared bottleneck across all chip vendors.

              The RISC-V licensing constraint is the ARM IP incumbent: Arm Holdings dominates embedded CPU IP licensing
              with superior software ecosystem and toolchain maturity. RISC-V-based alternatives (SiFive, Tenstorrent
              Ascalon) face toolchain gaps despite rapid ecosystem improvement.
            claimRefs:
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
              - CM032
              - CM033
              - CM034
      - number: '2.5'
        title: Sizing Gaps, Contradictory Estimates, and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              The single largest analytical gap in this chapter is the absence of a defensible SOM for Tenstorrent. The
              $150M in disclosed signed contracts (December 2024) represents the only public data point. Revenue and
              market penetration figures that would allow bottoms-up SOM construction are unavailable as a private
              company.

              Analyst TAM estimates for the AI chip market in 2026 diverge by a factor of 2–3× depending on scope:
              conservative accelerator-only definitions yield ~$200–270B; broader definitions (including AI memory and
              data center infrastructure) yield $477B–$500B. McKinsey's methodology for the semiconductor industry
              suggests even the largest estimates may undercount captive production and Chinese supplier revenues by as
              much as 30–40%.

              The inference/training split is also contested: while inference is projected to exceed two-thirds of
              compute by 2026 across most forecasts, the precise monetized revenue split depends on pricing structures
              not publicly disclosed by cloud providers. Neocloud margins and hardware pricing remain opaque, making
              neocloud-specific chip procurement volumes difficult to verify.

              For Tenstorrent, two specific sizing diligence asks apply: (1) the breakdown of the $150M signed contract
              portfolio by customer type, segment, and product generation; and (2) whether RISC-V Ascalon licensing has
              generated material revenue as of the 2026 diligence date—Tenstorrent's IP licensing business is
              strategically significant but its contribution to the $150M figure is not disclosed.
            claimRefs:
              - CM035
              - CM036
              - CM037
              - CM038
