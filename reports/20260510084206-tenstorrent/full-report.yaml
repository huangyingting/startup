  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Buyer Profile
        blocks:
          - type: paragraph
            body: >
              Tenstorrent's addressable customer base spans three distinct buyer archetypes at this stage of the
              company's commercialization. The first is the independent developer or research lab: individuals and teams
              evaluating Blackhole cards ($999–$3,499) or accessing DevCloud, motivated primarily by open-source tooling
              curiosity, RISC-V research, or cost-efficient LLM inference experimentation. As of Q1 2026, Tenstorrent
              reported approximately 5,000 registered DevCloud accounts, a metric that counts sign-ups rather than
              active monthly users. The second archetype is the strategic enterprise partner—organizations that are
              simultaneously investors in Tenstorrent and early adopters of its silicon. LG AI Research (backed by LG
              Technology Ventures, which led the Series D) and Hyundai Motor Group (a Series D strategic investor) fall
              squarely in this category, using Blackhole for AI inference and automotive AI compute respectively. This
              dual investor-customer relationship accelerates early adoption but introduces a governance ambiguity: the
              incentive to purchase is partly shaped by equity ownership rather than purely arms-length product
              evaluation. The third archetype is the cloud or infrastructure provider who resells Tenstorrent capacity
              as a service. Koyeb, a French cloud startup, became the first publicly confirmed cloud HaaS partner,
              offering Tenstorrent Blackhole p150 inference capacity billed per token/second. SoftBank's disclosed
              agreement to deploy Tenstorrent chips in its Japanese data center expansion represents the largest
              disclosed commercial deal and fits an infrastructure-operator archetype. Geographically, early adoption
              concentrates in North America (DevCloud, academic partners), South Korea (LG, Hyundai), Japan (SoftBank),
              and Western Europe (Koyeb, Fraunhofer Institute). By vertical, the primary use cases are enterprise AI
              inference, automotive on-vehicle AI, academic research, and cloud infrastructure provision. No disclosed
              SMB or mid-market customer base exists, consistent with the product's current enterprise price points
              ($110,000 per Galaxy chassis).
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
              - CU006
              - CU007
              - CU008
      - number: '6.2'
        title: Adoption Trajectory and Developer Ecosystem
        blocks:
          - type: paragraph
            body: >
              Tenstorrent's adoption trajectory is best understood as a two-speed flywheel: a fast-growing but shallow
              developer funnel feeding a slow-converting but high-value enterprise pipeline. The DevCloud program,
              launched with Wormhole hardware and extended to Blackhole in late 2025, has accumulated approximately
              5,000 registered developers by Q1 2026. GitHub activity on the primary tt-metal repository reflects this
              momentum: more than 25,830 commits, 1,410+ stars, and 19,076 merged pull requests as of April 2026.
              However, the developer funnel to enterprise conversion remains unproven: Tenstorrent has not disclosed how
              many DevCloud users have subsequently purchased hardware or converted to paid enterprise engagements. The
              Galaxy Blackhole server reached general availability only on April 28, 2026—weeks before this report's
              reference date—making it too early to measure repeat order rates or cluster expansion in production
              deployments. The Wormhole predecessor product had a longer runway: the QuietBox workstation
              (Wormhole-based, ~$12,000) was available from mid-2024. Academic engagement (MIT, Stanford, CMU research
              groups) is confirmed via Tenstorrent Developer Day coverage, but purchases remain small-scale (individual
              cards or devkits). Tenstorrent's stated 90% pass rate on HuggingFace model benchmarks and claimed
              compatibility with 2.5 million open-source models serve as demand-side adoption drivers, though these
              claims lack independent verification. The opening of the Galaxy platform creates a new adoption pathway
              for hyperscaler-adjacent customers, with at least one unnamed hyperscaler-tier interest reported in trade
              press.
            claimRefs:
              - CU001
              - CU009
              - CU010
              - CU011
              - CU012
              - CU013
              - CU014
              - CU015
      - number: '6.3'
        title: Named Customer Proof
        blocks:
          - type: paragraph
            body: >
              The named customer reference set is small by enterprise hardware standards but notable for the caliber of
              organizations involved. Koyeb provides the clearest arms-length customer proof: the French cloud startup
              publicly announced Tenstorrent Blackhole p150 availability on its HaaS platform, completing a production
              deployment that customers can purchase today. This is the only confirmed case of an independent
              (non-investor) commercial customer deploying Tenstorrent silicon for revenue-generating workloads. LG AI
              Research represents a strategic partner-customer: backed by LG Technology Ventures (Series D lead), LG AI
              Research uses Tenstorrent chips for AI inference and training R&D. The relationship predates the Galaxy
              launch and spans both Wormhole and Blackhole generations, suggesting multi-generational commitment.
              Hyundai Motor Group's interest is focused on automotive AI—on-vehicle processing for autonomous driving
              assistance systems—and is enabled by the Series D strategic investment that aligns roadmaps. SoftBank's
              Japan AI infrastructure agreement, disclosed in association with its participation in the Series D funding
              round (January 2025 announcements), involves deployment of Tenstorrent AI chips for SoftBank's data center
              expansion. The scale and timeline of that deployment remain undisclosed. Fraunhofer Institute (Germany) is
              cited as an early Wormhole adopter in European academic and industrial research. Academic proof from MIT,
              Stanford, and CMU covers hardware evaluation and model research, not production workloads. The Jaguar Land
              Rover association has been mentioned in automotive AI compute contexts but lacks a specific confirmed
              deployment announcement. In aggregate, the named proof set is thin for a company seeking enterprise
              hardware credibility: one arms-length HaaS customer, three investor-aligned customers, and one national
              infrastructure partner—all prior to Galaxy's GA date.
            claimRefs:
              - CU003
              - CU004
              - CU005
              - CU006
              - CU016
              - CU017
              - CU018
              - CU019
              - CU020
              - CU021
      - number: '6.4'
        title: Retention, Durability, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              No public net revenue retention (NRR), gross revenue retention (GRR), or cohort renewal data exists for
              Tenstorrent as of May 2026. This gap is expected for a company whose primary commercial product (Galaxy
              Blackhole) entered general availability only weeks before this report's reference date. The absence of
              data is therefore a timing artifact rather than a red flag, but it means any retention assessment must
              rely on indirect proxies. The most credible proxy for stickiness is re-engagement across hardware
              generations: LG AI Research's continued use of Tenstorrent silicon across both the Wormhole and Blackhole
              generations indicates a multi-year commitment. Koyeb's production deployment similarly represents a
              durable integration decision—cloud providers do not typically onboard hardware partners on a short-term
              trial basis due to the operational cost of rearchitecting inference backends. Developer-side satisfaction
              is mixed: the tt-metal GitHub repository shows 3,488 open issues as of April 2026, a volume suggesting
              active community engagement but also a meaningful backlog of known software defects and missing
              capabilities. A November 2025 review in The Register assessed Tenstorrent's software as "not polished
              enough for most local AI enthusiasts," citing configuration friction and incomplete driver documentation.
              This review represents the only substantial independent third-party product evaluation available and must
              be treated as the best current proxy for end-user satisfaction among non-captive customers. Fraunhofer
              Institute's continued research use of Tenstorrent hardware across multiple evaluation cycles provides a
              positive retention signal from the academic segment. Contract length for enterprise hardware deals (LG,
              Hyundai, SoftBank) has not been publicly disclosed. No NPS scores, customer satisfaction surveys, or
              support escalation data are in the public record.
            claimRefs:
              - CU010
              - CU022
              - CU023
              - CU024
              - CU025
              - CU026
              - CU027
      - number: '6.5'
        title: Expansion, Concentration Risk, and Strategic Alignment
        blocks:
          - type: paragraph
            body: >
              Tenstorrent's customer concentration risk is unusually high for a company at its funding stage. Three of
              its five most-visible named customers (LG AI Research, Hyundai Motor Group, SoftBank) are also equity
              investors from the Series D round. While this alignment can accelerate roadmap co-development and reduce
              sales cycle friction, it creates two material risks: (1) investor-customers may prioritize return on
              equity over honest product feedback, muting the market signal that should guide roadmap decisions; and (2)
              if any strategic investor partner reduces or exits its position, the corresponding customer relationship
              may simultaneously weaken, creating correlated revenue and equity risk. On the positive side, several
              customers have multi-generational upgrade potential. The Galaxy server's modular architecture enables
              cluster expansion (add-on chassis), and Koyeb's HaaS model scales with end-user inference demand. LG and
              Hyundai represent potential anchor accounts for next-generation silicon. The land-and-expand model is
              structurally sound but has not yet been demonstrated in practice: no announced case of a customer
              expanding beyond an initial purchase has been disclosed. Channel and procurement friction is another
              meaningful risk. Enterprise hardware procurement through traditional OEM channels does not yet exist for
              Tenstorrent; customers purchase directly or through Koyeb's cloud layer. DoD procurement interest (CHIPS
              Act alignment, domestic AI chip sourcing) offers an alternative high-value channel but brings compliance
              complexity. ITAR and EAR implications for Tenstorrent's dual-use AI hardware have not been publicly
              addressed. Competitor pressure from NVIDIA's H100/H200 installed base creates high switching costs for
              potential customers already invested in the CUDA ecosystem, with Tenstorrent's TT-Metalium offering a
              functionally different but less-mature programming model.
