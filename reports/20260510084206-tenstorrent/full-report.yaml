      - number: '1.5'
        title: Scale, Competitive Position & Key Metrics
        blocks:
          - type: paragraph
            body: >
              Tenstorrent is a private company with no public financial disclosures beyond a 2021 corporate filing
              indicating revenues of $25M–$100M. As of May 2026, the company claims approximately $150M in signed
              commercial contracts and Galaxy Blackhole servers are in volume production with deployments in at least
              five neocloud co-locations (Tokyo, Seattle, India, and two others announced through
              Equinix/OrionVM/BetterBrain partnerships). Headcount is estimated at 1,100–1,200 globally. The company's
              open-source software stack (TT-Forge, TT-Metal) achieves a claimed 90% pass rate for Hugging Face models
              and supports approximately 2.5 million open-source AI models. Blackhole demonstrates DeepSeek running at
              308 tokens per second per user at $6/million output tokens, and set a video-generation benchmark record
              with Prodia (5-second video in 3.5 seconds, 83% faster than prior record). Despite strong technical
              credentials, Tenstorrent faces significant competitive disadvantage against NVIDIA, whose CUDA ecosystem
              spans 20+ years of library development. The company's software stack is acknowledged by independent
              reviewers to be immature relative to CUDA, limiting near-term large enterprise adoption. Revenue is
              estimated by third parties at tens of millions of dollars, far below NVIDIA's quarterly data-center
              revenue in the tens of billions.
