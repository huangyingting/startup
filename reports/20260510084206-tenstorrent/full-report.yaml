  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and SKU Architecture
        blocks:
          - type: paragraph
            body: >
              Tenstorrent offers a vertically integrated product line anchored by the Blackhole ASIC, spanning three
              form factors designed to address distinct inference market segments. At the entry level, the Blackhole
              p100a inference card targets developers and desktop inference enthusiasts at approximately $999; it
              provides 28 GB of GDDR6 memory at 448 GB/s and connects to the host via PCIe Gen5 x16. The p150a step-up
              SKU adds 4 GB of additional GDDR6 (32 GB at 512 GB/s) and, critically, four QSFP-DD 800 Gbps Ethernet
              ports that enable direct card-to-card networking without a switch, unlocking multi-card inference at
              workstation scale. The p150b variant is physically identical in compute specification to the p150a but
              uses passive cooling for density-optimized rack deployment. Above the card tier sits the QuietBox
              workstation—a liquid-cooled desktop chassis priced at approximately $9,999 that houses two Blackhole cards
              and is positioned as a developer productivity platform for teams building on the full stack. At the top of
              the hierarchy, the Galaxy Blackhole is a 6U rack server integrating 32 Blackhole ASICs interconnected by a
              100 Tbps on-board mesh network, delivering 23 PFLOPS FP8 and 1 TB of aggregate GDDR6 memory at a published
              list price of $110,000 per chassis. The Galaxy reached general availability on April 28, 2026, completing
              Tenstorrent's transition from a pure developer hardware company to a commercial enterprise AI
              infrastructure vendor. In parallel with hardware, Tenstorrent offers the TT-Metal and TT-Forge open-source
              software development kits and a DevCloud remote access service that lets developers evaluate Wormhole and
              Blackhole hardware without on-premises capital expenditure. The portfolio's breadth—from a $999 developer
              card to a $110,000 enterprise server—allows Tenstorrent to seed the developer community at low cost and
              convert proven use cases to enterprise revenue, mirroring the flywheel strategy employed by NVIDIA's
              developer program over the preceding decade.
            claimRefs:
              - CE001
              - CE005
              - CE006
              - CE007
              - CE008
              - CE018
              - CE019
              - CE020
              - CE033
      - number: '5.2'
        title: Blackhole ASIC Architecture and Technical Specifications
        blocks:
          - type: paragraph
            body: >
              The Blackhole ASIC is Tenstorrent's second-generation AI accelerator and its first chip produced at TSMC's
              6 nm process node, yielding a die area of approximately 600 mm² per device. The chip's compute fabric is
              organized around 120 Tensix processing tiles—a proprietary dataflow architecture—each of which contains
              five baby RISC-V cores dedicated to kernel dispatch, data movement, and compute orchestration. With 120
              tiles, a single Blackhole die houses more than 600 embedded RISC-V cores solely for low-level control, in
              addition to 16 larger application-class RISC-V cores (based on the SiFive X280 64-bit core) that run Linux
              and host-side management software. This dual-RISC-V strategy gives Blackhole a programmable compute
              substrate that does not depend on a proprietary firmware microcontroller, which Tenstorrent argues reduces
              latency and enables tighter software–hardware co-design. On-chip memory totals 180 MB of SRAM distributed
              across the Tensix tile array, providing high-bandwidth local storage for activations, weights, and
              intermediate results that avoids round-trips to slower GDDR6. The peak compute rate is 664 TFLOPS in
              BlockFP8 format (332 TFLOPS in BF16) per chip, which positions Blackhole between NVIDIA's H100 SXM (3.9
              PFLOPS FP8) and lower-cost edge inference SoCs. Thermal design power is 300 W for the active-cooled p100a
              and p150a variants. The 3.2 Tbps aggregate Ethernet bandwidth on the p150a and p150b is a particularly
              unusual feature for an AI accelerator card: most competing inference ASICs rely on PCIe or NVLink for
              inter-device communication, whereas Blackhole's native Ethernet mesh was purpose-designed to cluster
              devices across commodity network infrastructure. In the Galaxy configuration, 32 Blackhole chips are
              interconnected in a full-mesh topology delivering 100 Tbps of aggregate chip-to-chip bandwidth, enabling
              weight-sharded inference of very large models (e.g., DeepSeek-R1 671B) across the full system without
              performance-degrading bottlenecks at the interconnect layer.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
              - CE008
              - CE009
              - CE028
              - CE029
              - CE030
              - CE036
      - number: '5.3'
        title: Software Stack and Open-Source Ecosystem
        blocks:
          - type: paragraph
            body: >
              Tenstorrent's software strategy is structurally differentiated from incumbent AI chip vendors by its
              commitment to fully open-source toolchains released under the Apache 2.0 license. The stack is organized
              in four logical layers. At the lowest level, TT-LLK (Low-Level Kernels) provides hand-optimized Tensix
              instruction sequences for common matrix operations. Above it, TT-Metalium is the core runtime and dispatch
              engine: it abstracts Blackhole's multi-tile execution model, manages kernel compilation, and provides the
              device programming model analogous to CUDA for NVIDIA GPUs. TT-NN sits on top of TT-Metalium and exposes a
              Python-accessible operator library comprising more than 200 compute primitives compatible with HuggingFace
              Transformers-style model definitions. The top layer is TT-Forge, an MLIR-based compiler that accepts model
              graphs from three front-end bridges: TT-Torch for PyTorch models, TT-XLA for JAX models, and TT-Forge-ONNX
              for ONNX interchange format. This architecture lets Tenstorrent claim compatibility with the dominant ML
              frameworks without requiring application developers to touch low-level Tensix programming. The primary
              public repository, tenstorrent/tt-metal on GitHub, had approximately 1,410 stars, 429 forks, and more than
              25,830 commits as of April 2026, spanning 161 official releases. Open-source activity is substantial: 988
              open pull requests and 19,076 merged pull requests signal an active but still-scaling engineering effort,
              and 3,488 open issues indicate a meaningful backlog of known software gaps. Tenstorrent claims a 90% pass
              rate on HuggingFace model benchmarks and compatibility with more than 2.5 million open-source models,
              though neither figure has been independently verified. A November 2025 review in The Register found that
              the software "simply isn't polished enough for most local AI enthusiasts," citing configuration friction
              and incomplete driver documentation as the primary barriers to adoption. The Pyron SDK documentation
              (docs.pyron.dev) provides a higher-level abstraction aimed at reducing this barrier for enterprise
              integrators, though it remains at an early maturity stage. The open-source licensing strategy creates a
              community flywheel—developer contributions backfill Tenstorrent's engineering capacity on model porting
              and operator coverage—but also means the company cannot prevent competitors from forking the stack.
            claimRefs:
              - CE010
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
              - CE016
              - CE017
              - CE022
              - CE037
              - CE038
              - CE039
              - CE040
      - number: '5.4'
        title: Deployment, Integration, and Product Roadmap
        blocks:
          - type: paragraph
            body: >
              Deployment of Tenstorrent hardware follows a defined customer journey: a developer or enterprise team
              begins with a PyTorch, JAX, or ONNX model; runs it through the TT-Forge compiler to generate a
              Blackhole-native binary; and dispatches execution via TT-Metalium. For single-card setups (p100a/p150a),
              this workflow requires a PCIe Gen5– capable host server and a Linux environment. The TT-Metal installation
              documentation describes a reasonably straightforward pip-based setup for Ubuntu, though kernel version
              compatibility constraints were a recurring friction point noted in community discussions as of early 2026.
              Multi-card clustering uses the built-in Ethernet ports on p150a and p150b cards; Tenstorrent's TT-Mesh
              framework orchestrates distributed inference across multiple chips without requiring a separate
              communication library. The Galaxy Blackhole server ships as a complete 6U rack unit with internal mesh
              networking pre-configured, reducing customer integration burden at the enterprise tier. On form factor,
              the p100a targets desktop inference and research workstations; the p150a spans workstation and
              small-cluster inference; the p150b addresses high-density rack inference; and Galaxy targets hyperscale
              and enterprise on-premises AI compute. Tenstorrent does not currently support training workloads—the
              entire product line is inference-only, which limits the addressable market compared to NVIDIA's CUDA
              ecosystem. The near-term public roadmap includes TT-Forge v1.0 stability (targeted for 2026), Galaxy
              cluster expansion to 144 nodes (4,608 chips), and continued ONNX coverage expansion. A next-generation
              chip (post-Blackhole) is under active development under NDA with no public specifications. The DevCloud
              service provides remote Wormhole and Blackhole access to developers who cannot purchase hardware outright,
              seeding the pipeline for future enterprise conversions. Volume production of Blackhole cards commenced in
              May 2026, implying the company's ability to fulfill the approximately $150 million signed contract backlog
              reported at the Series D close in December 2024.
            claimRefs:
