      - number: '1.2'
        title: Founders, Leadership & Governance
        blocks:
          - type: paragraph
            body: >
              Tenstorrent was co-founded in 2016 by Ljubisa Bajic (former CEO/CTO), Ivan Hamer, and Milos
              Trajkovic—three Canadian engineers whose earlier work together on deep-learning hardware architecture
              formed the nucleus of the company's Tensix core design. Bajic transitioned to a technical fellow role as
              the company scaled; Hamer and Trajkovic remain senior fellow engineering contributors. Jim Keller joined
              as President and CTO in 2020 and was formally elevated to CEO in early 2023. Keller is one of the most
              decorated chip architects in semiconductor history, having led the AMD Athlon K7 and K8/Opteron
              microarchitectures (including the x86-64 instruction set), the Apple A4 and A5 mobile SoC designs (iPhone
              4 and 4S, original iPad), the Tesla Full Self-Driving Hardware 3 chip, and senior silicon engineering
              responsibilities at Intel. Keith Witek serves as Chief Operating Officer and was the public spokesperson
              for the Series D fundraise. The leadership team also includes David Bennett (Chief Customer Officer) and
              Erik Goodman (VP Finance). Key-person concentration on Jim Keller is a material governance risk: his track
              record of short tenures at prior employers (Intel: 2 years, Tesla: 2 years) raises succession concern,
              which analysts have cited as a diligence flag. Investors include board and advisory representation from
              Eclipse Ventures and Real Ventures (early backers) alongside the strategic corporate investors from the
              Series C and Series D.
            claimRefs:
              - CO010
              - CO011
              - CO012
              - CO013
              - CO014
