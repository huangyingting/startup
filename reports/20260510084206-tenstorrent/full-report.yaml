  - id: FE001
    title: Product architecture map
    type: stack
    description: >-
      Tenstorrent's full hardware and software product stack from silicon to application layer, showing how each layer
      connects to the next.
    claimRefs:
      - CE001
      - CE011
      - CE012
      - CE013
      - CE014
      - CE028
      - CE029
      - CE030
    data:
      layers:
        - label: Application Layer
          detail: >-
            Customer ML models and applications: LLM inference, vision, multimodal, JAX workloads; accessed via standard
            PyTorch, JAX, or ONNX APIs
        - label: Compiler / Framework Layer
          modules:
            - TT-Forge (MLIR compiler)
            - TT-Torch (PyTorch bridge)
            - TT-XLA (JAX / XLA bridge)
            - TT-Forge-ONNX (ONNX importer)
          detail: Converts framework computation graphs into Blackhole-optimized binaries; Apache 2.0 open source on GitHub
        - label: Runtime / Operator Layer
          modules:
            - TT-Metalium (dispatch runtime)
            - TT-NN (200+ operator library)
            - TT-LLK (low-level Tensix kernels)
          detail: >-
            Manages device memory, kernel scheduling, multi-tile execution, and cross-card mesh communication; Apache
            2.0 open source
        - label: Hardware Abstraction Layer
          modules:
            - TT-Metal kernel programming API
            - PCIe Gen5 ×16 host interface
            - 'Ethernet mesh fabric (p150a/b: 3.2 Tbps per card)'
          detail: >-
            Exposes Tensix tile programming model to higher layers; Ethernet-native chip clustering without proprietary
            interconnect hardware
        - label: Silicon Layer
          detail: >-
            Blackhole ASIC (TSMC 6nm, ~600 mm²): 120 Tensix tiles, 16 SiFive X280 RISC-V cores (Linux), 600+ baby RISC-V
            cores per chip, 180 MB SRAM; Galaxy: 32 chips at 100 Tbps mesh
          outputs:
            - 664 TFLOPS BlockFP8 / chip
            - 332 TFLOPS BF16 / chip
            - 23 PFLOPS FP8 (Galaxy 32-chip)
