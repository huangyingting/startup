  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The AI accelerator market in 2026 is dominated by NVIDIA with approximately 80% market share by revenue,
              protected by a 20-year CUDA ecosystem moat with over 4 million registered developers and 40,000+
              organizations dependent on the platform. The competitive landscape spans five categories: (1) incumbent
              GPU leaders (NVIDIA H100/B200, AMD MI300X), (2) direct AI chip challengers (Cerebras CS-3, Groq LPU,
              SambaNova SN40L), (3) hyperscaler custom silicon not commercially available (Google Trillium/TPU v6,
              Amazon Trainium3, Meta MTIA), (4) adjacent hardware challengers (Intel Gaudi 3), and (5) status-quo
              CPU-only inference and rented cloud GPU as substitutes. Tenstorrent enters as a RISC-V based open-source
              alternative targeting sovereign AI programs, research institutions, and cost-sensitive enterprise
              inference buyers. The market shows early-stage fragmentation at the inference layer: Cerebras achieved
              $510M in 2025 revenue and filed for IPO in April 2026; SambaNova secured a $350M+ Series E after a
              near-sale event; Intel has largely conceded the AI training competition to NVIDIA. These dynamics create
              both opportunity and risk for Tenstorrent as a well-funded but software-maturing challenger.
            claimRefs: []
      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              NVIDIA's H100 GPU ($27K–$40K per unit) and Blackwell B200/B300 ($30K–$50K) anchored by the CUDA software
              stack represent the primary competitive threat. AMD's Instinct MI300X offers 192GB HBM3 VRAM at
              approximately $15K–$20K per GPU with a maturing ROCm open-source stack, making it the leading
              price-performance GPU alternative; cloud rental rates of $0.50–$7.86/hr undercut NVIDIA significantly.
              Intel's Gaudi 3 targets price-sensitive enterprise inference (~50% cheaper than H100) but has minimal
              commercial traction and has publicly shifted away from the training market. Cerebras' CS-3 wafer-scale
              engine achieves 1,000–2,000 tokens/sec for LLM inference — order-of-magnitude higher throughput than GPU
              clusters for large batch workloads — and raised $1B Series H at $23B valuation (February 2026) with OpenAI
              as anchor customer. Groq's LPU delivers 300+ tokens/sec for Llama-70B inference with deterministic
              latency; Groq was reportedly involved in NVIDIA acquisition discussions in late 2025, making its
              independent roadmap uncertain. SambaNova's SN40L reconfigurable dataflow architecture targets enterprise
              turnkey inference; after exploring a sale in late 2025 with BlackRock marking shares down from $5B peak to
              ~$2.4B, the company raised $350M+ Series E in February 2026 co-led by Vista Equity and Intel. Google
              Trillium (TPU v6) delivers ~926 TFLOPS BF16 with 4.7x compute improvement over TPU v5e and 100,000+ chips
              deployed; Amazon Trainium3 delivers 2.52 PFLOPS FP8 with 500,000+ in production; both are internal-use
              with limited external availability.
            claimRefs: []
      - number: '3.3'
        title: Capability and Pricing Comparison
        blocks:
          - type: paragraph
            body: >
              Tenstorrent's Galaxy Blackhole entered volume production May 2026. Developer reference cards are estimated
              at approximately $1K — roughly 30x lower per-unit price than an H100 GPU — with open-source TT-Metal (MIT
              license) eliminating software licensing fees. However, server-level pricing, rack-level configurations,
              and cloud rental rates remain unestablished at scale. NVIDIA cloud GPU rental ranges from $2.00–$14.90/hr
              (H100) to $2.25–$14.24/hr (B200); AMD MI300X rents for $0.50–$7.86/hr. Independent LLM benchmarks for
              Galaxy Blackhole vs H100/B200 are limited as of May 2026. Tenstorrent claims ~90% HuggingFace model pass
              rate on TT-Metal; this figure is self-reported and not independently verified. The Register (November
              2025) reviewed Tenstorrent's Blackhole QuietBox workstation and found the software "simply isn't polished
              enough for most local AI enthusiasts," a concrete maturity indicator. Cerebras and Groq are inference-only
              architectures without training capability; Tenstorrent supports both training and inference on Galaxy
              Blackhole hardware, providing broader workload coverage than single-purpose inference challengers. Intel's
              Gaudi 3 shares Tenstorrent's software maturity challenge while having Intel's existing distribution
              channels.
            claimRefs: []
      - number: '3.4'
        title: Switching Costs and Lock-in Dynamics
        blocks:
          - type: paragraph
            body: >
              NVIDIA's 20-year CUDA head start creates the deepest switching cost moat in AI hardware. Enterprise
              organizations embedded in CUDA face library recompilation, model retuning, software qualification, and
              developer retraining costs when migrating to alternatives. With 4 million+ registered developers and
              40,000+ dependent organizations, the lock-in is self-reinforcing: more developers generate more libraries,
              which increases the burden of switching, which drives more hardware purchases. Tenstorrent's RISC-V ISA is
              open and customer-programmable, and TT-Metal/TT-Forge (MLIR-based) provides compiler-level hardware
              abstraction. Multi-homing across AI chip vendors is technically feasible via framework abstraction layers
              (PyTorch, JAX) but is operationally expensive; most enterprises standardize on a single vendor for
              production. Tenstorrent's Ethernet-based scale-out avoids the InfiniBand network dependency required for
              large NVIDIA GPU clusters, reducing infrastructure lock-in at the network layer. Sovereign AI programs —
              driven by governments and strategic enterprises in Japan (ai& Tokyo Tenstorrent deployment), South Korea
              (Hyundai investment), and Middle East — represent a structurally motivated non-NVIDIA buyer segment that
              actively seeks supply-chain independence. Export controls applied to NVIDIA chips for certain geographic
              markets further amplify this opportunity.
            claimRefs: []
      - number: '3.5'
        title: Moat Durability and Adverse Evidence
        blocks:
          - type: paragraph
            body: >
              NVIDIA's CUDA moat shows structural durability: the Blackwell B200/B300 generation widens compute
              performance gaps in training while software continuity keeps existing workloads locked in. The inference
              layer is increasingly contested by Cerebras, Groq, and SambaNova, but each serves narrower workload
              profiles. Intel's strategic retreat from training competition reduces incumbent pressure in that segment.
              Key adverse evidence on Tenstorrent: (1) The Register (November 2025) documented that TT-Metal is "simply
              isn't polished enough for most local AI enthusiasts," a concrete maturity gap vs CUDA; (2) Tenstorrent's
              90% HuggingFace pass rate is self-reported without independent verification; (3) SambaNova's valuation
              markdown from $5B to ~$2.4B demonstrates that well-funded AI chip challengers face severe execution risk;
              (4) Cerebras' anchor relationship with OpenAI ($10B+ contract) illustrates the customer concentration
              fragility in the challenger segment. Tenstorrent's competitive moat durability depends critically on
              delivering production-grade software toolchain parity and expanding ISV partnerships before CUDA ecosystem
              momentum extends its lead further into the 2027–2028 horizon.
            claimRefs: []
