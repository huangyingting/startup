  evidenceGaps:
    - topic: >
        Pricing and economics of IP licensing arrangements (RISC-V CPU and Tensix NPU royalties)
        with Samsung, Hyundai, and other OEM partners are subject to non-disclosure agreements
        and cannot be confirmed from public sources. This covers royalty rates, minimum
        committed volumes, licensee count, and recognized royalty revenue—all critical inputs
        for modeling Tenstorrent's recurring, high-margin revenue base (QI003, QI004).
      relatedQuestionRefs: [QI003, QI004]

    - topic: >
        Koyeb cloud HaaS revenue share, DevCloud subscription conversion rate, and volume
        discount structure for enterprise Galaxy purchases are not publicly disclosed. These
        parameters govern the shape of recurring revenue and pricing power for Tenstorrent's
        non-hardware streams, and they are needed to model future revenue mix and blended
        margin trajectory (QI005, QI006, QI007).
      relatedQuestionRefs: [QI007]

    - topic: >
        Gross margin, COGS breakdown, operating expenditure by category, monthly burn rate,
        and customer acquisition cost are all privately held. Without audited financials in a
        data room, the unit economics chapter cannot be validated. Diligence teams should
        request audited income statements for FY2024 and FY2025, current management accounts,
        and a full COGS bridge from ASP to gross margin for each revenue segment
        (QI009, QI010, QI011, QI012, QI017, QI019).
      relatedQuestionRefs: [QI010]
