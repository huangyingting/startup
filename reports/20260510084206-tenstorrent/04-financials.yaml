callouts:
  - title: Revenue Opacity Is the Primary Diligence Blocker
    body: >
      Tenstorrent discloses no revenue, gross margins, or burn rate. The only third-party
      revenue figure ($501.6 million for FY2025 from Latka's algorithmic model) is widely
      considered unreliable for private hardware companies and is not suitable as a diligence
      basis. All financial projections in this chapter are estimates derived from industry
      benchmarks and publicly announced pricing; they must be superseded by audited financials
      before any investment decision.
    claimRefs: [CI025, CI026, CI031]
    calloutType: risk

  - title: Galaxy Blackhole Pricing Claims Are Competitively Compelling but Unverified
    body: >
      Tenstorrent's claim of $6 per million inference tokens on DeepSeek-R1 671B versus ~$30
      on NVIDIA GB300 represents a 5× cost advantage if validated by independent benchmarks.
      The methodology for this calculation (e.g., utilization rate, batch size, concurrent
      users, memory bandwidth assumptions) is not publicly disclosed, making independent
      verification essential before relying on TCO arguments in customer-facing or
      investment-facing analysis.
    claimRefs: [CI018, CI008, CI009]
    calloutType: assumption

