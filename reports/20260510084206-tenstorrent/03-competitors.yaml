callouts:
  - calloutType: risk
    title: Software Maturity Gap is the Primary Competitive Risk
    body: >
      The Register's November 2025 review found Tenstorrent's software "simply isn't polished enough for most local AI
      enthusiasts," documenting a concrete production-readiness gap vs. CUDA. Until TT-Metal reaches ISV-level toolchain
      maturity with verified independent benchmarks, Tenstorrent's hardware differentiation may be insufficient to drive
      enterprise adoption at scale. The self-reported 90% HuggingFace pass rate requires independent corroboration
      before enterprises will commit to production workloads.
    claimRefs:
      - CP033
      - CP037
  - calloutType: insight
    title: Inference Layer Fragmentation Opens Non-NVIDIA Opportunity
    body: >
      Cerebras ($510M 2025 revenue, $23B valuation, IPO filing), Groq, and SambaNova collectively validate a meaningful
      non-NVIDIA inference market. Tenstorrent's Galaxy Blackhole — unlike single-purpose inference accelerators —
      supports both training and inference, capturing workloads that pure-inference challengers cannot serve. Sovereign
      AI programs and NVIDIA export controls in Asia further validate the non-NVIDIA buyer segment.
    claimRefs:
      - CP010
      - CP011
      - CP012
      - CP028
      - CP032
      - CP039
