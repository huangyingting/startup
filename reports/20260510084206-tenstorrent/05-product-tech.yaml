chapter:
  number: 5
  title: Product and Technology
  summary: >
    Tenstorrent's Blackhole ASIC—built on TSMC 6nm, packing 120 Tensix cores with 664 TFLOPS BlockFP8 per chip—forms the
    foundation of a coherent hardware and open-source software stack spanning edge inference cards through the 32-chip,
    23-PFLOPS Galaxy server that reached general availability in April 2026. The fully Apache-licensed TT-Metal and
    TT-Forge software layers provide a credible on-ramp for PyTorch, JAX, and ONNX workloads, though independent
    reviewers flag software polish as the product's most material near-term risk.
sections:
  - id: product-portfolio-sku-architecture
    title: Product Portfolio and SKU Architecture
    body: >
      Tenstorrent offers a vertically integrated product line anchored by the Blackhole ASIC, spanning three form
      factors designed to address distinct inference market segments. At the entry level, the Blackhole p100a inference
      card targets developers and desktop inference enthusiasts at approximately $999; it provides 28 GB of GDDR6 memory
      at 448 GB/s and connects to the host via PCIe Gen5 x16. The p150a step-up SKU adds 4 GB of additional GDDR6 (32 GB
      at 512 GB/s) and, critically, four QSFP-DD 800 Gbps Ethernet ports that enable direct card-to-card networking
      without a switch, unlocking multi-card inference at workstation scale. The p150b variant is physically identical
      in compute specification to the p150a but uses passive cooling for density-optimized rack deployment. Above the
      card tier sits the QuietBox workstation—a liquid-cooled desktop chassis priced at approximately $9,999 that houses
      two Blackhole cards and is positioned as a developer productivity platform for teams building on the full stack.
      At the top of the hierarchy, the Galaxy Blackhole is a 6U rack server integrating 32 Blackhole ASICs
      interconnected by a 100 Tbps on-board mesh network, delivering 23 PFLOPS FP8 and 1 TB of aggregate GDDR6 memory at
      a published list price of $110,000 per chassis. The Galaxy reached general availability on April 28, 2026,
      completing Tenstorrent's transition from a pure developer hardware company to a commercial enterprise AI
      infrastructure vendor. In parallel with hardware, Tenstorrent offers the TT-Metal and TT-Forge open-source
      software development kits and a DevCloud remote access service that lets developers evaluate Wormhole and
      Blackhole hardware without on-premises capital expenditure. The portfolio's breadth—from a $999 developer card to
      a $110,000 enterprise server—allows Tenstorrent to seed the developer community at low cost and convert proven use
      cases to enterprise revenue, mirroring the flywheel strategy employed by NVIDIA's developer program over the
      preceding decade.
