callouts:
  - title: Open-Source Strategy as Moat and Risk
    body: >
      Tenstorrent's Apache 2.0 open-source strategy for the entire software stack—from low-level Tensix kernels to the
      MLIR compiler—creates a developer acquisition flywheel that mirrors the early CUDA ecosystem playbook but without
      proprietary lock-in. The 25,830+ commits and 19,076 merged PRs on tenstorrent/tt-metal indicate genuine
      engineering momentum. However, full Apache 2.0 licensing also means competitors—including well-capitalized
      hyperscalers building custom ASIC stacks—can fork and use the stack without contributing back, potentially
      commoditizing Tenstorrent's software differentiation over time. The moat is real today but is not legally
      defensible; it depends on continued engineering leadership and community trust.
    calloutType: insight
    claimRefs:
      - CE010
      - CE015
      - CE037
      - CE038
  - title: Software Maturity Is the Gating Risk for Enterprise Adoption
    body: >
      Despite compelling silicon-level specifications, software readiness remains the primary barrier to broad adoption.
      The Register's November 2025 review of the QuietBox workstation found the software "simply isn't polished enough
      for most local AI enthusiasts," and the tenstorrent/tt-metal repository carried 3,488 open issues and 988 open
      pull requests as of April 2026—a signal of a rapidly iterating but still-maturing codebase. Enterprises evaluating
      Tenstorrent for production inference will require investment-grade software, including stable APIs, comprehensive
      driver documentation, and predictable upgrade paths. The gap between the 90% HuggingFace compatibility headline
      and the long tail of model-specific failures is a material diligence item that buyers should validate with their
      own model workloads before committing to volume deployment.
    calloutType: risk
    claimRefs:
      - CE016
      - CE022
      - CE037
      - CE038
  - title: TSMC 6nm Sole-Source Dependency
    body: >
      Every Blackhole ASIC—and therefore every Tenstorrent revenue-generating product—depends on a single foundry, TSMC,
      at a single process node (6nm). While TSMC is the world's most advanced contract manufacturer and 6nm is a mature
      node with stable yields, this concentration creates supply chain risk from geopolitical events (Taiwan Strait
      tension), capacity competition from Apple, NVIDIA, AMD, and other high-volume customers, and node-specific yield
      incidents. Tenstorrent has not disclosed a second-source qualification or packaging-alternative program.
    calloutType: risk
    claimRefs:
      - CE001
      - CE024
      - CE034
  - title: Inference-Only Focus Limits TAM vs. Full-Stack Competitors
    body: >
      Tenstorrent's decision to build inference-optimized hardware without training support significantly narrows its
      total addressable market. Enterprise ML teams that train and fine-tune models in-house—the majority of
      sophisticated AI buyers—require training infrastructure, and Tenstorrent cannot serve that demand. This positions
      Tenstorrent as a best-of-breed inference specialist rather than a full-stack platform, which is a viable niche
      (inference spend is growing faster than training spend in 2025–2026) but limits the company's ability to become a
      primary AI infrastructure vendor for customers who want a single-vendor relationship.
    calloutType: risk
    claimRefs:
      - CE023
      - CE032
  - title: Galaxy GA Validates Commercial Readiness at Enterprise Scale
    body: >
      The April 28, 2026 general availability of the Galaxy Blackhole server—32 chips, 23 PFLOPS FP8, 1 TB GDDR6,
      $110,000 per chassis—is a milestone that transforms Tenstorrent from a developer hardware company into a
      commercial enterprise AI infrastructure vendor. Combined with confirmed volume production in May 2026 and early
      customer deployments (ai& Corporation, Cirrascale, Turium AI), the Galaxy launch validates that Tenstorrent can
      execute the full cycle from silicon to customer-deployable systems. The 5× cost-per-inference-token claim versus
      NVIDIA GB300 on DeepSeek-R1 671B, if independently validated, would represent a significant economic value
      proposition.
    calloutType: strength
    claimRefs:
      - CE009
      - CE019
      - CE033
