  - id: deployment-integration-roadmap
    title: Deployment, Integration, and Product Roadmap
    body: >
      Deployment of Tenstorrent hardware follows a defined customer journey: a developer or enterprise team begins with
      a PyTorch, JAX, or ONNX model; runs it through the TT-Forge compiler to generate a Blackhole-native binary; and
      dispatches execution via TT-Metalium. For single-card setups (p100a/p150a), this workflow requires a PCIe Gen5–
      capable host server and a Linux environment. The TT-Metal installation documentation describes a reasonably
      straightforward pip-based setup for Ubuntu, though kernel version compatibility constraints were a recurring
      friction point noted in community discussions as of early 2026. Multi-card clustering uses the built-in Ethernet
      ports on p150a and p150b cards; Tenstorrent's TT-Mesh framework orchestrates distributed inference across multiple
      chips without requiring a separate communication library. The Galaxy Blackhole server ships as a complete 6U rack
      unit with internal mesh networking pre-configured, reducing customer integration burden at the enterprise tier. On
      form factor, the p100a targets desktop inference and research workstations; the p150a spans workstation and
      small-cluster inference; the p150b addresses high-density rack inference; and Galaxy targets hyperscale and
      enterprise on-premises AI compute. Tenstorrent does not currently support training workloads—the entire product
      line is inference-only, which limits the addressable market compared to NVIDIA's CUDA ecosystem. The near-term
      public roadmap includes TT-Forge v1.0 stability (targeted for 2026), Galaxy cluster expansion to 144 nodes (4,608
      chips), and continued ONNX coverage expansion. A next-generation chip (post-Blackhole) is under active development
      under NDA with no public specifications. The DevCloud service provides remote Wormhole and Blackhole access to
      developers who cannot purchase hardware outright, seeding the pipeline for future enterprise conversions. Volume
      production of Blackhole cards commenced in May 2026, implying the company's ability to fulfill the approximately
      $150 million signed contract backlog reported at the Series D close in December 2024.
