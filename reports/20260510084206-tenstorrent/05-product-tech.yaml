  - id: blackhole-asic-design
    title: Blackhole ASIC Architecture and Technical Specifications
    body: >
      The Blackhole ASIC is Tenstorrent's second-generation AI accelerator and its first chip produced at TSMC's 6 nm
      process node, yielding a die area of approximately 600 mm² per device. The chip's compute fabric is organized
      around 120 Tensix processing tiles—a proprietary dataflow architecture—each of which contains five baby RISC-V
      cores dedicated to kernel dispatch, data movement, and compute orchestration. With 120 tiles, a single Blackhole
      die houses more than 600 embedded RISC-V cores solely for low-level control, in addition to 16 larger
      application-class RISC-V cores (based on the SiFive X280 64-bit core) that run Linux and host-side management
      software. This dual-RISC-V strategy gives Blackhole a programmable compute substrate that does not depend on a
      proprietary firmware microcontroller, which Tenstorrent argues reduces latency and enables tighter
      software–hardware co-design. On-chip memory totals 180 MB of SRAM distributed across the Tensix tile array,
      providing high-bandwidth local storage for activations, weights, and intermediate results that avoids round-trips
      to slower GDDR6. The peak compute rate is 664 TFLOPS in BlockFP8 format (332 TFLOPS in BF16) per chip, which
      positions Blackhole between NVIDIA's H100 SXM (3.9 PFLOPS FP8) and lower-cost edge inference SoCs. Thermal design
      power is 300 W for the active-cooled p100a and p150a variants. The 3.2 Tbps aggregate Ethernet bandwidth on the
      p150a and p150b is a particularly unusual feature for an AI accelerator card: most competing inference ASICs rely
      on PCIe or NVLink for inter-device communication, whereas Blackhole's native Ethernet mesh was purpose-designed to
      cluster devices across commodity network infrastructure. In the Galaxy configuration, 32 Blackhole chips are
      interconnected in a full-mesh topology delivering 100 Tbps of aggregate chip-to-chip bandwidth, enabling
      weight-sharded inference of very large models (e.g., DeepSeek-R1 671B) across the full system without
      performance-degrading bottlenecks at the interconnect layer.
