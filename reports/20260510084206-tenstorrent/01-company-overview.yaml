callouts:
  - calloutType: strength
    title: Jim Keller — Pedigree Advantage
    body: >
      Jim Keller's track record—AMD Zen, Apple A4/A5, Tesla FSD Hardware 3—
      lends Tenstorrent exceptional technical credibility and talent magnetism
      that few AI chip startups can match. His presence was a key driver in
      attracting $693M in Series D capital at a $2.6B valuation.
    claimRefs:
      - CO010
      - CO013
      - CO022

  - calloutType: risk
    title: Key-Person Concentration Risk
    body: >
      Jim Keller has a documented pattern of short tenures (Intel 2 years,
      Tesla 2 years). If Keller were to depart, Tenstorrent's investor
      confidence, talent pipeline, and customer relationships could be
      materially impaired given how central his identity is to the company's
      narrative.
    claimRefs:
      - CO017
      - CO040

  - calloutType: insight
    title: Strategic Investor Constellation Creates Ecosystem Opportunities
    body: >
      The co-investment of Samsung Securities, LG Electronics, Hyundai Motor
      Group, and Kia in a single raise creates a potential Korean ecosystem
      for automotive and consumer AI chip adoption—a differentiated market
      entry vector not available to NVIDIA challengers without similar
      strategic backing.
    claimRefs:
      - CO021
      - CO022
      - CO023

