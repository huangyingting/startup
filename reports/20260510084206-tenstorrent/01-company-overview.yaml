  - id: milestones-timeline
    title: Key Milestones & Product History
    body: >
      Tenstorrent's milestone arc spans three hardware generations across
      approximately nine years. In 2016–2018, the founding team designed the
      core Tensix architecture from first principles, secured seed and Series A
      capital, and developed the Grayskull processor (first-generation Tensix).
      Grayskull, featuring up to 120 Tensix cores with 1MB of SRAM each and
      supporting 8GB of LPDDR4 memory, was Tenstorrent's entry product for
      developer engagement—providing PCIe accelerator cards (e75 and e150)
      reaching up to 600 TOPS of silicon performance. The Series B ($20.5M,
      January 2019) and the Series C cluster (2021, $364M total across two
      tranches) funded the development of Wormhole. Wormhole (second
      generation, commercially launched July 2024 as n150 and n300 PCIe cards
      and TT-LoudBox / TT-QuietBox workstations) represents a significant
      microarchitecture upgrade: 80 Tensix+ cores (fewer but more capable),
      12nm fabrication, 16×100GbE on-chip Ethernet, GDDR6 memory (12GB per
      card), and 328 TOPS peak performance. Jim Keller joined as President and
      CTO in 2020; named CEO in early 2023. The $100M Series C extension
      (August 2023) from Hyundai and Samsung Catalyst financed Blackhole
      development. Blackhole (6nm process, 140 Tensix++ cores, 10×400GbE, 32GB
      GDDR6, 790 TOPS FP8) began shipment as the QuietBox workstation in late
      2025, with Galaxy Blackhole servers reaching volume production in May
      2026. The $693M Series D closed December 2, 2024, enabling aggressive
      hiring and global infrastructure expansion.
    claimRefs:
      - CO028
      - CO029
      - CO030
      - CO031
      - CO032
      - CO033
