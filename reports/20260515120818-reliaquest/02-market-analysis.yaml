callouts:
  - calloutType: strength
    title: "MDR Category CAGR of 24.8% Provides Structural Growth Tailwind"
    body: "At 24.8% CAGR through 2031, the MDR market is growing roughly 3.5× faster than the overall network security market (7.2% CAGR). This creates a rising-tide dynamic where even moderate market share maintenance translates to strong absolute revenue growth, and provides valuation justification for the $3.4B+ implied enterprise value at time of Series D."
    claimRefs: [CM006, CM007]

  - calloutType: risk
    title: "Platform Consolidation Is the Structural Demand Constraint"
    body: "Microsoft's M365 E5 bundle (including Sentinel SIEM + Defender XDR) is available to existing Microsoft enterprise customers at minimal incremental cost. With 65%+ enterprise penetration, Microsoft's embedded position creates a 'good enough' SOC alternative that ReliaQuest must overcome in competitive situations. Every major platform vendor (Palo Alto Networks with Cortex XSIAM, CrowdStrike with Falcon) is similarly bundling detection, response, and SOC automation to reduce total vendor count."
    claimRefs: [CM026, CM027, CM028]

  - calloutType: insight
    title: "SEC Disclosure Rules and EU DORA Create Measurable Procurement Urgency"
    body: "The SEC's 4-day material incident disclosure requirement (effective December 2023) and EU DORA's operational resilience mandates (effective January 2025) have created enforceable compliance drivers for enterprise MDR investment. Unlike aspirational security frameworks, these regulations carry material penalties that make the ROI calculation for MDR procurement easier to justify to CFOs and boards."
    claimRefs: [CM022, CM023]

