  evidenceGaps:
  - id: EGR001
    title: ReliaQuest ARR and Financial Metrics Not Publicly Disclosed
    type: private-evidence-only
    severity: material
    topic: private-financial-metrics
    missingEvidence: >-
      ReliaQuest annual recurring revenue, year-over-year growth rate, gross margin, burn rate, and financial
      runway metrics are not publicly disclosed due to private company status; no publicly available source
      provides revenue or profitability data.
    whyItMatters: >-
      Without public financial metrics it is impossible to independently verify whether the 3.4 billion dollar
      implied valuation from the October 2024 Series D is supported by underlying revenue fundamentals;
      capital efficiency and burn rate are entirely unverifiable from public sources.
    diligencePath: >-
      Request management presentation and data room access including ARR and growth rate by quarter for
      FY2023 through FY2026; gross margin and EBITDA trajectory; cash burn rate and runway; customer count
      and average contract value; and NRR by cohort.
    relatedQuestionRefs:
    - QR023
    - QR024
    relatedTableRefs:
    - TR005
  - id: EGR002
    title: No Confirmed Litigation but Public Record is Incomplete
    type: missing-source
    severity: minor
    topic: litigation-enforcement-gap
    missingEvidence: >-
      Direct confirmation from court records, regulatory enforcement databases, or PACER that no active
      litigation, GDPR enforcement proceedings, DORA compliance notices, or other legal actions are pending
      against ReliaQuest or its subsidiaries globally.
    whyItMatters: >-
      Public source searches return no confirmed litigation but absence of evidence in public search results
      is not equivalent to confirmed absence of legal proceedings; private company litigation is not always
      publicly indexed in accessible databases.
    diligencePath: >-
      Conduct PACER search for ReliaQuest and related entity names; request legal representations and
      warranties in M&A or investment agreement covering litigation; search UK Companies House for
      ReliaQuest UK entity filings; request legal compliance certificate from counsel.
    relatedQuestionRefs:
    - QR019
    relatedTableRefs:
    - TR001
  - id: EGR003
    title: Regulatory Risk Register Partial Due to Incomplete Public Disclosure
    type: enumeration-incomplete
    severity: minor
    topic: regulatory-enumeration-incomplete
    missingEvidence: >-
      Jurisdiction-specific compliance program details for Japan APPI, India DPDP Act 2023, UAE ADGM DIFC
      data protection, and Australia Privacy Act SOC operations are not publicly confirmed; ReliaQuest does
      not publish a comprehensive compliance framework document covering all six SOC jurisdictions.
    whyItMatters: >-
      Incomplete regulatory enumeration means material compliance gaps in Japan, India, UAE, or Australia
      could exist but be undetectable from public sources; fines or contract renegotiations in these markets
      could represent material financial liability if compliance programs are absent.
    diligencePath: >-
      Request ReliaQuest's global compliance register and legal counsel opinions for all six SOC
      jurisdictions; review customer contract templates for jurisdiction-specific data protection provisions;
      confirm data residency controls in each location.
    relatedTableRefs:
    - TR001
  - id: EGR004
    title: SOC 2 Type II and ISO 27001 Certification Currency Not Publicly Confirmed for 2026
    type: stale
    severity: minor
    topic: security-certifications-currency
    missingEvidence: >-
      Public confirmation that ReliaQuest holds a current within-12-months SOC 2 Type II audit report and
      ISO 27001 certification; no publicly accessible audit report or certification registry confirms
      certification status as of May 2026.
    whyItMatters: >-
      Enterprise security buyers frequently require SOC 2 Type II and ISO 27001 certification in procurement;
      lapsed certifications could create customer contract compliance issues and competitive disadvantage in
      enterprise security RFPs.
    diligencePath: >-
      Request current SOC 2 Type II report within 12 months from ReliaQuest; verify ISO 27001 certificate
      currency through UKAS or accreditation body registry; confirm renewal schedule and certification scope.
    relatedQuestionRefs:
    - QR028
  - id: EGR005
    title: Current MDR Pricing Trends and Peer Regulatory Comparison Partially Evidenced
    type: missing-source
    severity: minor
    topic: mdr-pricing-peer-comparison
    missingEvidence: >-
      Specific pricing compression data for MDR market in 2025 to 2026 reflecting Microsoft and CrowdStrike
      bundling impact; peer regulatory risk comparison against CrowdStrike and Palo Alto Networks based on
      their published risk factors or 10-K disclosures.
    whyItMatters: >-
      MDR pricing trends directly affect ReliaQuest's gross margin sustainability and competitive positioning;
      regulatory risk comparison to peers would contextualize whether ReliaQuest's DORA and GDPR exposure is
      an industry-wide risk or a specific liability.
    diligencePath: >-
      Review CrowdStrike and Palo Alto Networks 10-K risk factor sections for comparative regulatory
      language; obtain MDR pricing benchmark data from Gartner or Forrester via data room; request win-loss
      analysis from ReliaQuest management.
    relatedQuestionRefs:
    - QR029
    - QR030

