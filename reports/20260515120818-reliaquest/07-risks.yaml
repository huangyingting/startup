- id: TR005
  title: Mitigation and kill criteria table
  columns:
  - Risk
  - Monitorable Trigger
  - Threshold or Event
  - Action Implication
  rows:
  - - Material security incident within managed SOC environment
    - SEC 8-K Item 1.05 filing mentioning ReliaQuest; Dark Reading or SecurityWeek breach coverage;
      customer advisory communications indicating SOC compromise
    - Any confirmed breach of ReliaQuest managed environment resulting in customer data exposure or
      unauthorized access to multiple customer environments simultaneously
    - Thesis break; pause or exit investment position; demand independent security audit; assess customer
      churn trajectory and revenue impact as primary indicators
  - - CEO Brian Murphy departure
    - Public executive departure announcement; LinkedIn profile change indicating role transition;
      job listing for CEO role appearing on careers page
    - Confirmed departure without identified internal successor or 90-day transition plan presented
      to board and major customers
    - Material risk flag; request emergency management call; assess succession quality before making
      hold versus exit decision; monitor customer retention signals immediately
  - - Regulatory enforcement action in any jurisdiction
    - GDPR fine from ICO or EU DPA; DORA enforcement notice; SEC enforcement referral; court filing
      in any jurisdiction naming ReliaQuest
    - Any confirmed enforcement action or material fine exceeding one million dollars in any jurisdiction
      where ReliaQuest operates SOC centers
    - Escalate diligence; quantify financial liability; assess compliance remediation timeline; review
      customer contract indemnification clauses for pass-through exposure
  - - Competitive displacement by Microsoft or CrowdStrike
    - Win rate data from management presentations; NRR compression in quarterly updates; customer churn
      attributing to Microsoft or CrowdStrike bundling in exit interview data
    - Win rate declining below 40 percent against Microsoft or CrowdStrike head-to-head in competitive
      evaluations; or NRR below 95 percent for two consecutive quarters
    - Monitor trajectory; if sustained recalibrate TAM and market share assumptions; assess differentiation
      strategy effectiveness; request competitive win-loss analysis from management
  - - PE-driven exit pressure creating customer service degradation
    - Management announcements of IPO preparation or M&A process; customer review score declines on G2
      and TrustRadius; headcount reduction announcements in customer-facing roles
    - IPO filing with S-1 showing deteriorating NRR; confirmed layoffs in customer-facing SOC roles;
      Gartner or G2 score decline of 0.5 or more points over two consecutive quarters
    - Diligence escalation; assess exit timeline alignment with customer retention strategy; review
      service-level obligations in enterprise customer contracts and SLA terms
  notes: >-
    Kill criteria and thresholds are indicative and should be calibrated to investor risk tolerance and
    portfolio context. Triggers are derived from monitoring publicly available sources and management
    data room disclosures. The table focuses on thesis-break-level events; incremental risk monitoring
    indicators are documented in the operational and regulatory risk registers above. All triggers should
    be monitored on a quarterly cadence minimum with monthly monitoring of review platform ratings.
