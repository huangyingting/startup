- id: people-and-execution-risks
  title: People and Execution Risks
  body: >-
    CEO Brian Murphy is the single highest-severity key person risk at ReliaQuest. As a co-founder with deep
    customer relationships, institutional investor trust, and strategic vision ownership, his departure would
    create a leadership vacuum with no publicly identified succession plan. ReliaQuest is actively hiring
    across all six global SOC locations per its careers page, indicating rapid headcount scaling, a growth
    vector that introduces consistent quality risk as new analysts are onboarded across diverse geographies
    with varying talent pool depths. The TrustRadius review explicitly cited relative freshness of some SOC
    analysts as a concern, confirming that execution quality is a live risk as the company scales. Execution
    risks include maintaining quality parity across six time zones, retaining talent in competitive
    cybersecurity labor markets, and avoiding cultural fragmentation in a globally distributed workforce. The
    PE ownership structure means that organizational decisions may be optimized for exit readiness rather than
    long-term operational excellence, creating a potential misalignment with enterprise customers who
    prioritize service continuity. Rapid revenue growth expectations from 830 million dollars in PE capital
    create pressure to hire ahead of revenue, potentially impairing capital efficiency and service quality
    simultaneously as the company pursues aggressive global expansion.
  claimRefs:
  - CR030
  - CR031
  - CR032
  tableRefs:
  - TR004
  figureRefs: []
- id: mitigations-and-kill-criteria
  title: Mitigations and Kill Criteria
  body: >-
    ReliaQuest's primary mitigations include 830 million dollars in institutional capital from KKR and EQT
    providing extended runway and strategic resources; a 250-plus integration Open XDR architecture that
    creates switching costs and platform stickiness for enterprise customers; a globally distributed
    six-center SOC footprint that provides geographic resilience and 24/7 coverage; and a differentiated
    AI and autonomous ML capability within GreyMatter that automates repetitive analyst tasks. The 2025
    Annual Threat Report publication and Gartner Magic Quadrant recognition demonstrate domain expertise and
    independent market validation. Thesis-break triggers that should escalate to full diligence or investment
    pause include any confirmed material security incident within the managed SOC environment; a regulatory
    enforcement action in any jurisdiction; departure of CEO Brian Murphy without an identified successor;
    evidence of sustained negative NRR below the expected growth trajectory; loss of a major integration
    partnership such as Microsoft deprecating a key connector; or a PE-driven strategic pivot that prioritizes
    exit over customer retention. Monitoring indicators include quarterly G2, TrustRadius, and Gartner review
    trends, hiring patterns, any SEC EDGAR filings, and coverage of cybersecurity incidents mentioning
    ReliaQuest as a subject or victim.
