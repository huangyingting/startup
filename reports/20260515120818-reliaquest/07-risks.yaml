  rows:
  - - SEC 8-K Item 1.05 cybersecurity incident disclosure rules
    - USA Federal
    - Applicable upon IPO; private company currently exempt from periodic reporting
    - Low current; Medium upon IPO
    - High
    - Strong incident response infrastructure; six SOC centers provide detection capability; private status
      limits formal obligation currently
    - Mandatory disclosure within four business days of materiality determination upon going public; incomplete
      IR processes create SEC liability post-IPO
    - Confirm incident response policy currency; assess readiness timeline for SEC disclosure compliance;
      verify board-level cybersecurity oversight program
  - - EU DORA ICT third-party provider obligations to EU financial sector
    - EU and EEA
    - Active as of January 2025; applies to ReliaQuest serving EU financial institutions
    - Medium
    - High
    - Contractual compliance framework for DORA Article 28 through 30 ICT risk requirements; exit strategy
      clauses in customer agreements
    - Liability for non-compliant customer contracts if DORA provisions not embedded; potential contract
      renegotiation obligations with EU financial sector customers
    - Request DORA compliance gap assessment; review sample customer contracts for Article 28 through 30
      provisions; confirm sub-contractor DORA obligations are addressed
  - - GDPR EU and UK personal data processing in SOC operations
    - EU and EEA and UK
    - Active; UK and UAE SOC centers process EU and UK personal data
    - Medium
    - High
    - Data Processing Agreements required with all EU and UK enterprise customers; Standard Contractual
      Clauses for cross-border transfers; UK GDPR addenda for post-Brexit compliance
    - Enforcement action from ICO or EU DPA if DPA templates incomplete; sub-processor obligations if
      telemetry data transferred to US analysis centers without valid SCCs
    - Verify DPA template completeness; confirm SCCs cover sub-processors; review data transfer impact
      assessments for US-to-EU telemetry flows
  - - Form D and Regulation D private securities offering compliance
    - USA Federal
    - Active; multiple Form D filings confirmed across fundraising rounds
    - Low
    - Medium
    - SEC Form D filings in compliance; experienced securities counsel managing offering exemptions; KKR
      and EQT as institutional investors with compliance infrastructure
    - Future offerings must comply with Regulation D; any general solicitation could void exemption;
      accredited investor verification obligations must be maintained
    - Review Form D filing currency on SEC EDGAR; confirm all capital raises have corresponding filings;
      verify accredited investor documentation practices
  - - NIST CSF 2.0 de facto compliance standard for federal and regulated enterprise customers
    - USA Federal and enterprise-wide
    - Active; de facto requirement for US federal and regulated sector customers
    - Low
    - Medium
    - GreyMatter platform maps to NIST CSF functions Identify Protect Detect Respond Recover; annual
      threat report aligns with NIST guidance and demonstrates framework awareness
    - Loss of federal or regulated-sector contracts if NIST alignment gaps emerge; procurement gatekeeping
      in federal evaluations where CSF maturity is assessed
    - Obtain NIST CSF 2.0 alignment mapping documentation; confirm GreyMatter certifications or
      self-assessment against CSF Tiers; verify federal-contract eligibility criteria are met
  - - Multi-jurisdiction SOC compliance for Japan India UAE Australia data obligations
    - APAC and Middle East and Australia
    - Emerging; local data protection laws apply; specific obligations not fully enumerated
    - Medium
    - Medium
    - Local legal counsel engagements; data residency options for regional SOC operations; contractual
      DPAs by jurisdiction adapted to local law
    - Non-compliance with APPI Japan, DPDP Act India, ADGM DIFC UAE data rules; regulatory fines in
      markets without verified local compliance programs represent unquantified liability
    - Commission jurisdiction-specific legal reviews for Japan India UAE and Australia; map local data
      laws to ReliaQuest SOC operations; confirm data residency toggles and local DPA templates exist
  notes: >-
    Likelihood and severity are qualitative assessments based on publicly available regulatory framework
    analysis, SEC EDGAR filings review, and industry benchmarks as of May 2026. No material legal
    proceedings or enforcement actions against ReliaQuest are confirmed in public sources. DORA and GDPR
    represent the highest-severity active obligations given ReliaQuest's UK and EU SOC operations and EU
    financial sector customer base. Form D filing history confirms securities law compliance across
    fundraising rounds. The register is partial because Japan, India, UAE, and Australia jurisdiction-specific
    obligations have not been fully enumerated from public sources alone.
  enumerationScope:
    coverage: partial
    basis: >-
      Register covers six highest-priority regulatory and legal risk categories identified through SEC EDGAR
      Form D search, EUR-Lex DORA framework review, NIST CSF 2.0 publication, and SEC cybersecurity
