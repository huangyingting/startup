- id: TR002
  title: Operational / quality / security risk register
  columns:
  - Risk
  - Category
  - Likelihood
  - Impact
  - Current Mitigation
  - Residual Exposure
  - Monitoring Indicator
  rows:
  - - Security breach via managed SOC environment
    - Security
    - Low-Medium
    - Critical
    - Privileged access management within SOC; six-center geographic isolation; AI-driven anomaly detection;
      internal security controls program
    - A single compromise of ReliaQuest managed environment provides adversary with simultaneous access
      to multiple enterprise customer environments causing existential brand and ARR damage
    - Monitor for SEC 8-K filings mentioning ReliaQuest; track security incident coverage on Dark Reading
      and SecurityWeek; review customer advisory communications for any SOC breach signals
  - - SOC analyst experience gaps and quality inconsistency at scale
    - Quality
    - Medium
    - High
    - Global hiring program; six SOC locations for redundancy; AI automation reduces analyst burden on
      repetitive tasks; structured training programs
    - TrustRadius review confirms analyst freshness concern; quality inconsistency across six time zones
      and diverse talent markets is a scaling risk as headcount grows
    - Track TrustRadius G2 and Gartner review themes quarterly; monitor NPS if disclosed; review
      analyst-to-customer ratio in management data room
  - - AI and ML alert false positive and false negative risk
    - Operational
    - Medium
    - High
    - Human analyst review layer over AI triage; tunable alert thresholds per customer; customer-specific
      model training within GreyMatter platform
    - Over-suppression of true positives allows adversary dwell time; over-alerting degrades analyst
      efficiency and customer confidence in platform accuracy and value
    - Track customer-reported missed detections or alert fatigue in reviews; monitor published evaluation
      benchmarks for GreyMatter detection accuracy; assess analyst override rate trends
  - - Platform outage or GreyMatter unavailability
    - Infrastructure
    - Low
    - High
    - Six globally distributed SOC centers; cloud-delivered architecture with redundancy; SLA commitments
      in enterprise contracts protect customers and create credit exposure
    - Regional or global outage leaves customers without detection coverage during an active incident;
      SLA breach triggers financial credits and customer churn risk simultaneously
    - Monitor any public outage disclosures or customer complaints citing GreyMatter unavailability;
      request uptime SLA data and historical availability metrics from ReliaQuest
  - - Integration partner deprecating a critical API or connector
    - Dependency
    - Low-Medium
    - Medium
    - 250-plus integrations provide breadth and reduce single-tool dependency; vendor-agnostic Open XDR
      architecture reduces concentration; dedicated integration engineering team maintained
    - Loss of a major integration connector requires emergency re-engineering and creates customer
      dissatisfaction during migration period with potential churn risk
    - Track integration status announcements from major vendors; monitor developer channels for API
      deprecation notices affecting GreyMatter connectors in the 250-plus ecosystem
  - - Supply-chain compromise via integrated third-party security tool
    - Security
    - Low
    - Critical
    - Vendor security assessments for integrated tools; isolation of integration data paths; security
      monitoring of third-party components integrated into GreyMatter
    - A SolarWinds-style supply-chain compromise in a widely integrated tool could propagate into
      ReliaQuest platform and compromise multiple managed customer environments simultaneously
    - Monitor CISA and NIST vulnerability advisories for integrated tool vendors; track CVE disclosures
      for top 20 GreyMatter integrations by customer usage volume
  notes: >-
    Likelihood and impact ratings are qualitative assessments based on review platform analysis, industry
    incident patterns, and MDR market research as of May 2026. Supply-chain and SOC breach risks are rated
    Critical impact because ReliaQuest sits inside customer security environments. Analyst quality and AI
    accuracy risks are rated High impact because they directly affect the core service value proposition.
    Platform outage risk is mitigated by geographic distribution. No confirmed ReliaQuest security incidents
    are in public record as of May 2026.
  claimRefs:
  - CR010
  - CR011
  - CR013
  - CR015
  - CR016
- id: TR003
  title: Partner / dependency risk register
  columns:
  - Dependency
  - Counterparty
  - Role
  - Concentration
  - Failure Scenario
  - Severity
  - Mitigation
  - Residual Exposure
  rows:
  - - Microsoft Defender XDR and Sentinel SIEM bundling
    - Microsoft
    - Competitive threat via enterprise bundling in M365 agreements
    - High; M365 E3 and E5 deployed across most of ReliaQuest enterprise target market
    - Microsoft accelerates Sentinel capabilities and includes Defender XDR as standard; enterprises
      cancel or decline ReliaQuest MDR contracts citing redundancy with existing M365 subscription
    - High
    - ReliaQuest heterogeneous multi-tool aggregation differentiates from Microsoft-only environments;
      serves customers with non-Microsoft tooling in heterogeneous security stacks
    - Microsoft bundling creates structural pricing pressure and margin compression risk in Microsoft
      dominant accounts; requires clear differentiation narrative to retain and win accounts
  - - CrowdStrike Falcon XDR competitive displacement
    - CrowdStrike
    - Competitive threat via native XDR with deep endpoint telemetry
    - Medium; CrowdStrike deployed in significant share of enterprise security environments globally
    - CrowdStrike expands Falcon XDR MSSP Complete program offering native MDR to existing endpoint
      customers at lower marginal cost and with deep integration advantages
    - Medium-High
    - GreyMatter multi-vendor aggregation appeals to non-CrowdStrike-standardized environments; serves
      mixed-vendor estates where CrowdStrike lacks native multi-tool integration
    - Accounts heavily dependent on CrowdStrike endpoint are at risk of consolidating MDR to
      CrowdStrike Complete MSSP program at renewal
  - - Palo Alto Networks Cortex XSIAM displacement
    - Palo Alto Networks
    - Competitive threat via integrated SIEM SOAR and AI-driven MDR platform
    - Medium; Palo Alto Cortex XSIAM targets enterprise security operations consolidation
    - Palo Alto aggressive platformization strategy persuades enterprises to consolidate on Cortex
      XSIAM displacing standalone MDR vendors including ReliaQuest
    - Medium-High
    - ReliaQuest vendor-agnostic integration architecture serves mixed estates; differentiates via
      threat intelligence expertise and SOC analyst depth versus product platform positioning
    - Palo Alto platformization discounting creates competitive pricing pressure; loss risk in
      Palo Alto dominant enterprise accounts at renewal
  - - KKR and EQT private equity governance
    - KKR and EQT Group
    - Financial sponsor and governance stakeholder with board-level control
    - High; combined 830 million dollars invested; board oversight on major strategic decisions
    - PE investor exit horizon typically five to seven years creates pressure for IPO or M&A
      transaction on timeline that may not align with optimal market conditions or business readiness
    - Medium
    - Institutional investors with cybersecurity portfolio expertise; EQT and KKR aligned on
      long-term value creation; executive team has established investor relationships
    - Hold-period pressure could force premature IPO or strategic sale; board composition may
      prioritize exit over long-term operational investment in customer retention
  - - Hyperscaler cloud infrastructure AWS Azure GCP
    - AWS and Azure and GCP
    - Infrastructure dependency for cloud-delivered SOC services
    - Medium; SOC delivery depends on cloud availability at multiple levels
    - Major cloud provider outage during a large-scale security incident degrades ReliaQuest SOC
      response capability exactly when customers need it most creating double liability
    - Medium
    - Multi-cloud architecture reduces single-provider dependency; six physical SOC centers provide
      geographic redundancy and some on-premises fallback capability
    - Cloud outage during active incident response creates SLA breach liability and customer
      confidence risk; concentration in any single cloud provider adds latent risk
  notes: >-
    Partner and dependency risks are assessed based on public product announcements, market research, and
    financial analysis as of May 2026. Microsoft bundling risk is rated highest severity due to ubiquitous
    M365 deployment across ReliaQuest's enterprise target market. CrowdStrike and Palo Alto risks are
    material but partially mitigated by ReliaQuest's vendor-agnostic positioning. PE governance risk is
    inherent to the business model but not an immediate operational concern given the 2024 and 2025 capital
    raises. Cloud infrastructure dependency is mitigated by physical SOC center presence.
  claimRefs:
