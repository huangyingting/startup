    Risk transmission map illustrating how competitive, operational, and financial triggers cascade through
    ReliaQuest's business model. Competitive bundling by Microsoft is the primary upstream trigger feeding
    both win-rate pressure and pricing compression. SOC analyst quality gaps transmit directly into customer
    churn, which cascades into NRR compression and ultimately financial model stress. The map shows that
    customer churn and NRR compression are the central nodes where all major risk vectors converge, making
    them the single most important monitoring indicators for the investment thesis.
