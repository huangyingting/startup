callouts:
  - calloutType: recommendation
    title: "Conditional Buy: Data Room Access Is the Go/No-Go Gate"
    body: "The weight of public evidence supports a conditional buy on ReliaQuest at current private-market valuations, contingent on three verifications in formal diligence: (1) ARR at or above $300 million with 20%+ YoY growth confirmed by audited financials or management accounts reviewed by a Big 4 firm; (2) Net Dollar Retention at or above 110% confirmed by cohort retention data; and (3) subscription gross margin at or above 65% consistent with enterprise SaaS norms. Without these verifications, the correct posture is research-more with a 90-day deadline. The market opportunity, AI product differentiation, and PE sponsor alignment all support the long-term investment case, but the financial opacity prevents underwriting the current valuation with confidence."
    claimRefs: [CV009, CV010, CV011]

  - calloutType: risk
    title: "Financial Opacity Is the Single Largest Investment Risk"
    body: "ReliaQuest has disclosed zero operating metrics — no ARR, no growth rate, no gross margin, no NDR, no EBITDA — despite raising $830 million in two rounds over 18 months. This is not unusual for a PE-backed pre-IPO company, but it means every financial estimate in this chapter is unverified triangulation. The absence of disclosure creates an adverse selection risk: management may have information about ARR growth deceleration, margin compression, or competitive displacement that is deliberately withheld in the pre-IPO period. Any investment decision at the $5–7 billion post-March-2025 implied valuation must be gated on formal data room access with audited financials, not public evidence alone."
    claimRefs: [CV019, CV020, CV021, CV022]

  - calloutType: risk
    title: "Platform Bundling by Microsoft and CrowdStrike Is the Primary Anti-Thesis Risk"
    body: "The most credible bear case for ReliaQuest is not poor product execution but competitive displacement by incumbents offering bundled MDR at no incremental charge. Microsoft M365 Defender with Copilot for Security and managed SOC services, and CrowdStrike's Falcon Complete bundled with Falcon Go/Pro agreements, both create scenarios where enterprise buyers have co-managed SOC access within existing procurement relationships at zero marginal cost. Gartner MDR market reviews and G2 buyer feedback confirm that pricing pressure from platform-bundled alternatives is already a customer consideration. This risk does not kill the investment thesis but sets a hard floor for NDR and ARR growth rate that diligence must verify."
    claimRefs: [CV004, CV005, CV006, CV007]

  - calloutType: strength
    title: "$830M Capital Position Funds Three-Year IPO Runway"
    body: "At an estimated annual cash burn of $100–200 million associated with global SOC operations, AI R&D investment, and enterprise sales motion, the $500 million March 2025 raise alone provides approximately 2.5–5 years of operating runway. Combined with the $300 million October 2024 raise, ReliaQuest has sufficient capital to pursue its IPO without requiring additional equity financing unless burn rate is materially higher than estimated. This capital advantage is strategically important in a competitive market where smaller MDR vendors (Arctic Wolf, Deepwatch) have less financial flexibility to match AI investment at scale."
    claimRefs: [CV016, CV017, CV018]

