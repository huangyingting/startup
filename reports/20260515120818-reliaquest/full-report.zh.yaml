      - number: '5.5'
        title: 信任、合规与安全控制
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的合规和信任姿态直接影响企业采购决策，尤其是金融服务、医疗健康、政府等受监管行业；这些行业构成其 1,300+ 客户中的很大一部分。公司声称符合 SOC 2 Type
              II，在面向客户的材料中引用信息安全标准；产品文档和销售材料也提到 ISO 27001 认证。Dublin 和 London SOC 中心服务欧洲客户，因此 GDPR 合规姿态同样重要。FedRAMP
              授权没有公开确认，这限制了可触达的美国联邦政府市场。客户数据处理依赖共管模式：ReliaQuest 分析师用权限范围合适的凭据访问客户安全工具环境；这一访问模型能否守住安全边界，是信任框架的关键。企业买家的 G2
              和 TrustRadius 评论持续把合规支持、数据处理列为正面属性，但认证范围（纳入系统、审计周期、报告版本）没有公开。没有公开 Trust Center 页面或可公开访问的 SOC 2
              报告摘要，是企业安全厂商的常见做法，但对外部尽调仍是证据缺口。到 May 2026，公司似乎没有在公开记录、媒体报道或 SEC 文件中披露任何重大安全入侵或数据事件。从产品质量看，ReliaQuest
              没有披露缺陷率、经第三方验证的检测有效性基准，或由中立机构独立审计的 MTTD/MTTR 指标。
