  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: >-
      风险热力图把 ReliaQuest 的八项主要风险按发生可能性和严重性绘制，并标注缓释成熟度与剩余暴露。通过托管 SOC 发生安全事件、以及 CEO 离任，尽管发生可能性低，严重性仍属严重级。Microsoft 与
      CrowdStrike 捆绑竞争、SOC 分析师质量缺口，是高严重性、中等可能性的风险，需要主动监控。DORA 与 GDPR 监管风险严重性为高，当前处于活跃状态。财务不透明和 AI
      告警准确性是中高等级运营担忧。热力图确认，竞争替代和关键人风险是投资逻辑监控中优先级最高的两个推翻投资逻辑的风险向量。
    claimRefs:
      - CR001
      - CR010
      - CR017
      - CR024
      - CR030
    data:
      columns:
        - 发生可能性
        - 影响
        - 缓释成熟度
        - 剩余暴露
      rows:
        - label: 通过托管 SOC 发生安全事件
          values:
            - 中低
            - 严重
            - 部分；内部控制存在，但未确认有独立公开审计
            - 高；若多个客户环境同时受损，会带来生存级品牌和 ARR 风险
        - label: CEO Brian Murphy 离任
          values:
            - 低
            - 严重
            - 低；截至 2026 年 5 月未发现公开继任计划
            - 高；联合创始人离任会立刻冲击客户信任和战略执行
        - label: 欧盟 DORA 与 GDPR 监管义务
          values:
            - 活跃
            - 高
            - 部分；合同 DPA 框架存在，但 DORA 合规状态未在公开渠道确认
            - 中；若欧盟金融行业合同存在合规缺口，会有执法行动风险
        - label: Microsoft 捆绑 Defender Sentinel 竞争
          values:
            - 中
            - 高
            - 部分；异构 Open XDR 定位提供一定差异化缓冲
            - 高；Microsoft 365 E3 和 E5 企业账号面临结构性定价压力
        - label: SOC 分析师质量不一致
          values:
            - 中
            - 高
            - 部分；六中心分散和 AI 自动化提供部分缓释
            - 中高；TrustRadius 评论确认，增长规模下存在分析师经验不足的担忧
        - label: 财务不透明且无公开 ARR
          values:
            - 持续
            - 高
            - 无；私营公司身份意味着指标不公开披露，也无法验证
            - 高；无法独立验证 34 亿美元隐含估值是否有支撑
        - label: CrowdStrike 与 Palo Alto 竞争替代
          values:
            - 中
            - 高
            - 部分；供应商中立定位和多工具集成价值提供缓冲
            - 中；混合技术栈客户相较单一供应商 XDR 提供差异化缓冲
        - label: KKR EQT 持有期下的 PE 退出压力
          values:
            - 中低
            - 中
            - 低；2024 与 2025 年新近融资意味着当前持有期可能延长
            - 中；IPO 与 M&A 时间线风险；客户留存与退出优化之间存在张力
    approximationNotes: 发生可能性和影响评级是基于截至 2026 年 5 月的公开披露、评论平台分析、竞争情报和 MDR 市场研究作出的定性评估。由于公司仍为私营，未独立验证任何财务指标。
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: >-
      风险传导图展示竞争、运营和财务触发因素如何沿 ReliaQuest 商业模式级联。Microsoft 捆绑是最主要的上游触发因素，同时传导到赢单率压力和价格压缩。SOC
      分析师质量缺口会直接传导为客户流失，再级联到净留存率（NRR）压缩，并最终形成财务模型压力。图中显示，客户流失和 NRR 压缩是所有主要风险向量汇合的中心节点，因此也是投资逻辑最重要的单一监控指标。
    claimRefs:
      - CR017
      - CR010
      - CR024
      - CR028
      - CR030
    data:
      nodes:
        - id: rt1
          label: Microsoft 捆绑 Defender Sentinel
          detail: M365 E3 和 E5 以近零边际成本包含 MDR 相邻能力
        - id: rt2
          label: CrowdStrike 与 Palo Alto 平台化
          detail: 原生 XDR 和 SIEM SOAR 在单一供应商企业账号中替代 ReliaQuest
        - id: rt3
          label: SOC 分析师质量缺口
          detail: 规模化后出现经验不足担忧；六个全球 SOC 中心之间不一致
        - id: rt4
          label: AI 与 ML 告警准确性风险
          detail: 误报和漏报侵蚀分析师效率和客户信任
        - id: rt5
          label: 客户赢单率下降
          detail: 与 Microsoft 或 CrowdStrike 正面对抗失败，会削弱新增 ARR 销售管线
        - id: rt6
          label: 现有账号客户流失
          detail: 服务质量缺口或竞争替代会在续约时触发取消
        - id: rt7
          label: 净留存率（NRR）压缩
          detail: 流失和扩张放缓会把净留存率压到增长目标以下
        - id: rt8
          label: 估值压力
          detail: 净留存率（NRR）压缩会削弱 34 亿美元估值倍数和退出条件
        - id: rt9
          label: PE 退出时间线压力
          detail: KKR 与 EQT 持有期压力迫使公司在不利市场条件下 IPO 或 M&A
        - id: rt10
          label: CEO 或关键人离任
          detail: 领导真空会同时放大全部下游风险
      edges:
        - from: rt1
          to: rt5
          label: 捆绑降低 Microsoft 账号中的正面赢单率
        - from: rt2
          to: rt5
          label: 原生 XDR 冲击单一供应商企业账号的销售管线
        - from: rt1
          to: rt6
          label: 捆绑使现有账号在续约时被替代
        - from: rt3
          to: rt6
          label: 分析师质量缺口会在重视服务质量的账号中推高流失
        - from: rt4
          to: rt6
          label: 告警不准确侵蚀信心并触发竞争评估
        - from: rt5
          to: rt7
          label: 新增 ARR 降低会直接拉低 NRR 分子
        - from: rt6
          to: rt7
          label: 流失会把 NRR 直接压到增长阈值以下
        - from: rt7
          to: rt8
          label: NRR 低于预期会压缩 IPO 或 M&A 的退出倍数
        - from: rt8
          to: rt9
          label: 估值偏弱迫使 PE 投资者延长持有，或接受更低回报
        - from: rt10
          to: rt6
          label: CEO 离任触发客户重新评估，并加速流失
        - from: rt10
          to: rt5
          label: 领导真空削弱销售执行和销售管线转化率
        - from: rt9
          to: rt8
          label: 不利条件下被迫退出会进一步压低实现估值
