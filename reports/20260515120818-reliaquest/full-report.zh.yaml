      - number: '3.5'
        title: 护城河持久性与竞争风险评估
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的竞争护城河建立在四根支柱上：（1）客户专属检测逻辑、调优用例和集成工作流积累后难以迁移，形成切换成本；（2）专利 Universal Translator 支持跨 250+
              工具的供应商中立遥测规范化；（3）18+ 年企业 SOC 运营深度和威胁情报积累；（4）IPO 前资本位置（累计融资约 $830M）支撑持续 AI
              研发和集成开发。这些护城河面临两大威胁。第一是平台商品化：CrowdStrike、Palo Alto 和 Microsoft 持续以零额外成本捆绑更多类 MDR 能力，「增强而非替代」的价值主张会被削弱。第二是
              AI 商品化：如果开源或平台原生 AI 智能体能以更低成本复制 GreyMatter 的 200+ 智能体技能，智能体 AI
              差异化就有时间限制。切换成本护城河真实存在，但不对称——它保护现有客户，却在平台供应商提供迁移激励时抬高新客户获取摩擦。竞争格局中的一个反向信号，是 Secureworks 公开文件披露的收入收缩；这表明中层
              MDR 厂商面临结构性压力，若不能在 AI 和平台能力上差异化，压力最终可能波及所有纯 MDR 提供商。
            claimRefs:
              - CP022
              - CP023
              - CP024
              - CP025
              - CP026
