      - number: '4.5'
        title: 公开财务缺口与披露限制
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 是私营公司，没有义务披露经审计财务报表、收入数据、利润率结构或经营指标。因此，本章财务分析由多类信号交叉推导而来：已披露融资轮估值、SEC Form D 文件、CB Insights
              估计、分析师市场报告和 MDR 行业可比公司。缺少经审计财务，是任何尽调中的重大证据缺口。关键未知项包括：实际 ARR 和增长率（3
              年估计给出区间但没有点估计）；按收入线划分的毛利率（订阅与专业服务）；净美元留存和队列流失数据；EBITDA
              或经营现金流；债务融资或债务契约；以及精确股权结构表，包括期权池、清算优先权和老股出售条款。本章的「公开财务缺口表」系统列出这些缺口、估计重要性，以及补齐缺口所需的尽调要求。财务图景中的一个反向信号，是公司在
              18 个月内完成两轮大额融资（2024 年 10 月 $300M、2025 年 3 月 $500M），却完全不披露经营指标。这可能只是 PE 阶段常见保密标准，也可能说明经营指标包含管理层不愿在 IPO
              前披露的信息。尽调团队应把缺少披露视为证据缺口，要求直接取得管理层财务数据。
