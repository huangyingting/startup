  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 通过位于 US、UK、UAE、India、Australia 和 Japan 的 6 个全球 SOC
              中心运营托管检测与响应服务，监管触面横跨多个司法辖区，远超典型只在美国运营的网络安全公司。作为摄取并分析企业安全遥测的 MDR 提供商，ReliaQuest 必须遵守 January 2025 生效的 EU
              Digital Operational Resilience Act；该法要求服务欧盟金融机构的 ICT 第三方提供商承担合同韧性、事件报告和退出策略义务。GDPR 适用于 ReliaQuest UK 和 UAE
              SOC 运营，因为这些中心代表企业客户处理 EU 和 UK 个人数据。SEC 网络安全披露规则为 ReliaQuest 未来任何 IPO
              设定衡量标准；处理企业安全数据的私有公司，也会面对企业采购团队类似的事件披露预期。SEC Form D 文件确认 ReliaQuest 已根据 Regulation D
              豁免完成多次私募证券发行，说明其融资历史中遵循了美国证券法。NIST Cybersecurity Framework 2.0 则为美国联邦部门客户和受监管企业建立事实上的合规预期。截至 May
              2026，公开来源没有确认 ReliaQuest 存在未决诉讼或执法行动。监管风险登记被评为部分，因为仅靠公开来源尚未完整列举 Japan、India、UAE 和 Australia 的详细义务。
