  - id: TR003
    title: 合作伙伴 / 依赖风险登记表
    columns:
      - 依赖
      - 交易对手
      - 角色
      - 集中度
      - 失败情景
      - 严重性
      - 缓释措施
      - 剩余暴露
    rows:
      - - Microsoft Defender XDR 与 Sentinel SIEM 捆绑
        - Microsoft
        - 通过 M365 协议中的企业捆绑形成竞争威胁
        - 高；ReliaQuest 企业目标市场中，大多数企业已部署 M365 E3 和 E5
        - Microsoft 加速 Sentinel 能力，并将 Defender XDR 纳入标准配置；企业以现有 M365 订阅已覆盖为由，取消或拒绝 ReliaQuest MDR 合同
        - 高
        - ReliaQuest 的异构多工具聚合区别于纯 Microsoft 环境；服务于安全栈异构、使用非 Microsoft 工具的客户
        - Microsoft 捆绑在 Microsoft 主导账户中造成结构性定价压力和利润率压缩风险；要留住并赢得账户，需要清晰的差异化叙事
      - - CrowdStrike Falcon XDR 竞争替代
        - CrowdStrike
        - 原生 XDR 借深度端点遥测形成竞争威胁
        - 中；CrowdStrike 已部署在全球相当一部分企业安全环境中
        - CrowdStrike 扩展 Falcon XDR MSSP Complete 项目，以更低边际成本和深度集成优势，向现有端点客户提供原生 MDR
        - 中-高
        - GreyMatter 的多供应商聚合吸引未标准化到 CrowdStrike 的环境；服务 CrowdStrike 缺少原生多工具集成的混合供应商资产
        - 高度依赖 CrowdStrike 端点的账户，在续约时可能把 MDR 整合到 CrowdStrike Complete MSSP 项目
      - - Palo Alto Networks Cortex XSIAM 替代
        - Palo Alto Networks
        - 通过集成 SIEM、SOAR 和 AI 驱动 MDR 平台形成竞争威胁
        - 中；Palo Alto Cortex XSIAM 瞄准企业安全运营整合
        - Palo Alto 激进的平台化策略说服企业整合到 Cortex XSIAM，挤出包括 ReliaQuest 在内的独立 MDR 供应商
        - 中-高
        - ReliaQuest 的供应商中立集成架构服务混合资产；相较产品平台定位，其以威胁情报专长和 SOC 分析师深度形成差异
        - Palo Alto 平台化折扣带来竞争性定价压力；在 Palo Alto 主导的企业账户中，续约时存在丢单风险
      - - KKR 与 EQT 私募股权治理
        - KKR 与 EQT Group
        - 财务赞助方和治理利益相关方，拥有董事会层面控制权
        - 高；合计投入 8.3 亿美元；重大策略决策受董事会监督
        - PE 投资者退出周期通常为 5 到 7 年，会给 IPO 或 M&A 交易施加时间压力，而该时间表未必符合最佳市场环境或业务成熟度
        - 中
        - 机构投资者具备网络安全投资组合经验；EQT 和 KKR 在长期价值创造上保持一致；管理团队已建立投资者关系
        - 持有期压力可能迫使公司过早 IPO 或战略出售；董事会构成可能优先考虑退出，而非长期投入客户留存
      - - 超大规模云基础设施 AWS、Azure、GCP
        - AWS、Azure 和 GCP
        - 云交付 SOC 服务的基础设施依赖
        - 中；SOC 交付在多个层级依赖云可用性
        - 大型云提供商在大规模安全事件期间宕机，会恰在客户最需要时削弱 ReliaQuest SOC 响应能力，造成双重责任
        - 中
        - 多云架构降低单一提供商依赖；6 个实体 SOC 中心提供地理冗余和一定本地回退能力
        - 活跃事件响应期间云宕机会触发 SLA 违约责任和客户信心风险；集中于任一单一云提供商都会增加潜在风险
    notes: >-
      合作伙伴和依赖风险依据截至 2026 年 5 月的公开产品公告、市场研究和财务分析评估。Microsoft 捆绑风险的严重性最高，因为 M365 在 ReliaQuest 企业目标市场中几乎无处不在。CrowdStrike 和
      Palo Alto 风险重要，但 ReliaQuest 的供应商中立定位可部分缓释。PE 治理风险内生于业务模式，但鉴于 2024 和 2025 年融资，并非即时运营问题。实体 SOC 中心的存在缓释了云基础设施依赖。
    claimRefs:
