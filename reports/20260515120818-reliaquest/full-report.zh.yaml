  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台概览与产品定义
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest GreyMatter 是一套安全运营平台，为企业提供大规模共管式威胁检测、调查和响应能力。产品定位是基于 Open XDR（Extended Detection and
              Response，扩展检测与响应）架构理念的智能体 AI 安全运营平台：它聚合并标准化客户现有安全工具的遥测数据，而不是要求客户替换整套安全栈。价值落在 CISO 的日常运营流程里：安全团队不用拆掉
              CrowdStrike、SentinelOne、Microsoft Defender、Palo Alto Networks 或 Splunk
              等既有投入，就能在终端、云、网络、身份和应用域获得统一可见性。GreyMatter 平台由 Detect、Respond、Hunt、Automate、Identify 五个核心功能模块组成，分别对应 SOC
              运营周期里的具体步骤。团队通过统一 SaaS 界面使用这些模块，背后由 ReliaQuest 1,200 人团队支撑，包括 Tampa FL、Las Vegas NV、Sandy UT、Dublin
              Ireland、London UK、Pune India 的 6 个全球 24/7 SOC 中心。平台服务 1,300+ 企业客户，主要集中在金融服务、医疗健康、关键基础设施等受监管行业。产品不面向 SMB
              或中端市场买家；最低部署范围意味着客户通常拥有数千个终端。ReliaQuest 对外量化的客户结果包括告警量下降 90%+、总拥有成本（TCO）改善 35%、检测量提升 182%+、威胁平均遏制时间低于 5
              分钟。这些指标由公司披露，G2 和 TrustRadius 评论情绪提供部分佐证，但公开渠道没有独立审计基准。
