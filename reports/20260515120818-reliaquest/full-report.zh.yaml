      - number: '8.6'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的退出准备度分析中度正面：公司具备 PE 赞助方对齐、已披露的机构股权结构、CB Insights 给出的 2026 IPO 管线标签、可提供 ARR
              可预测性的大客户基础，以及与当前公开市场对 AI 原生安全平台偏好相匹配的 AI 叙事。退出执行的主要障碍是：（1）缺少 S-1 文件所需的审计财务或透明运营指标；（2）不同 IPO
              估值下，优先股堆叠对普通股权益影响不确定；（3）Microsoft 和 CrowdStrike 持续扩大捆绑带来的竞争叙事风险。最可能的退出路径是在 Nasdaq 或 NYSE IPO，符合 PE
              赞助方组合和公司规模；若按完整估值 M&A 退出，需要战略买家愿意为托管 SOC 平台支付 $5–10 billion，Microsoft、Palo Alto Networks 和 CrowdStrike
              是最可信战略收购方。如果 IPO 环境变慢，以低于上一轮标记估值的小幅折扣进行二级出售也可能发生，尤其适用于持有期更长的早期投资人（FTV
              Capital）。投资逻辑破坏与否决触发器表列出会让本分析从条件买入转向持有或回避的具体可观察信号，包括 ARR 增长跌破 15%、NDR 低于 100%、新融资出现正式下调估值融资，或
              Microsoft/CrowdStrike 宣布以零增量收费推出竞争性共管 MDR 产品。最终尽调问题表列出正式投资流程在按当前估值投入资本前必须解决的 8 项最高优先级信息请求。
