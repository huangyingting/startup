          emotion: 谨慎——评估集成深度、共管分析师质量和部署风险
          painpoint: Concerns about replacing in-house SOC workflows and analyst handoff friction
        - label: 采购
          actor: CISO + CFO + 采购团队
          touchpoints:
            - 企业合同谈判
            - 客户证明电话（ACG CISO、APi Group 信息安全负责人）
            - 多年期 SLA 审阅
          emotion: 关注 3 年 TCO 与自建 SOC 成本对比；担心锁定风险
          painpoint: Long procurement cycles; internal stakeholder alignment on co-managed vs. in-house model
        - label: 上线
          actor: IT 安全团队 / SOC 分析师
          touchpoints:
            - GreyMatter 集成控制台
            - ReliaQuest 共管 SOC 上线
            - 检测剧本配置
          emotion: 担心集成调优；希望少扰动、快速看到价值
          painpoint: Tool integration setup and alert tuning period; co-managed handoff procedures
        - label: 扩张
          actor: CISO / 平台负责人
          touchpoints:
