      - number: '3.3'
        title: 平台原生 XDR 竞争者
        blocks:
          - type: paragraph
            body: >-
              CrowdStrike（NASDAQ: CRWD）是占主导地位的终端检测与响应厂商，市值 $63 billion+。CrowdStrike 的 Falcon 平台已远超终端，扩展到身份防护、云安全和协同托管
              SOC 服务。CrowdStrike Falcon Complete 是其全托管 MDR 服务；Falcon OverWatch 提供主动威胁狩猎。当企业客户考虑用单一供应商的 Falcon-as-MSSP
              方案替代原有 GreyMatter 时，CrowdStrike 就与 ReliaQuest 正面竞争。Palo Alto Networks（NASDAQ: PANW）市值超过 $100
              billion，是最大的纯网络安全公司，也是一家激进的平台整合者。其 Cortex XSIAM 产品是一套 AI 驱动 SOC 自动化平台，直接对标 GreyMatter 的 AI 角色能力。PANW 的
              Cortex XDR 是协同托管 SOC 服务的基础。Palo Alto 的「platformization」策略——用大幅折扣鼓励客户整合到 Palo Alto 产品——是 ReliaQuest
              多供应商价值主张最清晰的威胁。SentinelOne（NYSE: S）定位为 AI 优先的终端和 XDR 厂商，年收入约 $800 million，并具备较强的自主响应能力。SentinelOne 的
              Singularity XDR 包括威胁情报和托管威胁狩猎。SentinelOne 与 ReliaQuest 争夺同一条 CISO 预算线，不过 SentinelOne 更多时候是 GreyMatter
              环境中的技术组件，而非直接替代品。Microsoft（MSFT）是结构上最危险的竞争者：Sentinel SIEM 与 Defender XDR 结合，已作为 M365 E5 捆绑包的一部分覆盖 65%+
              企业；Microsoft 也一直在扩展 Security Operations Center 能力，加入 AI Copilot for Security 功能。
            claimRefs:
              - CP012
              - CP013
              - CP014
              - CP015
              - CP016
              - CP017
      - number: '3.4'
        title: 功能对比与定价格局
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 以一组差异化能力竞争：供应商中立接入（250+ 伙伴）、可规范化所有安全工具遥测数据的专利 Universal Translator、具备 200+ 技能的智能体 AI 角色，以及 18
              年运营历史。ReliaQuest GreyMatter 平台价格未公开披露；公司采用企业订阅定价，通常按托管终端数、日志量或席位模型计费，并要求多年期合同承诺。参考可比 MDR 厂商定价——Arctic Wolf
              企业端约 $10–30 / endpoint / month，Deepwatch 面向中型企业约 $15–50k / month——ReliaQuest 面向大型企业部署的价格估计在 $15–40+ /
              endpoint / month 区间。CrowdStrike Falcon Complete MDR 与 Falcon 平台捆绑时，价格约 $15–20 / endpoint / month。Microsoft
              Sentinel 按用量计价（每 GB 摄入量），起价约 $2.46 / GB；Defender XDR 已包含在 M365 E5 中，价格约 $57/user/month。Microsoft
              的显著价差制造了「够用还是最佳」的取舍，ReliaQuest 必须在竞争场景中跨过这道门槛。按功能逐项看，ReliaQuest 的 Universal Translator 和供应商中立路线提供了
              Microsoft 难以复制的独特价值，除非 Microsoft 放弃平台优先策略。不过，能力矩阵中缺乏支撑的单元格反映出真实证据缺口，尤其包括 ReliaQuest 当前定价结构、精确 SLA
              条款，以及相较原生平台替代方案的具体集成质量。
