      - number: '1.5'
        title: 公司里程碑与时间线
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 由 Brian Murphy 于 2007 年在佛罗里达州坦帕创立，最初是一家 IT 与网络安全服务公司。公司早期是托管服务商，随后逐步转向平台化模式。2016
              年，公司完成首轮机构成长股权融资，为早期平台开发提供资金。2020 年，公司完成一轮私募股权融资，加速 GreyMatter 平台建设。2021 年 12 月，ReliaQuest 据称以 $1.2
              billion 估值融资约 $300M+（CB Insights 后来引用为 $1B），跻身网络安全独角兽。2022 年，公司将该轮描述为由 FTV Capital 领投、估值约 $1.2B 的 Series
              C。2022–2024 年间，GreyMatter 作为 Open XDR / 智能体 AI 平台商业化推出，并接入数百家技术伙伴。2024 年 10 月，KKR 领投 $300M Series D 轮，估值约
              $3.4B，这是坦帕历史上最大网络安全风险融资轮，也是 MDR/XDR 领域最大融资之一。2025 年 3 月，EQT 与 KKR、FTV Capital、Finback、Ten Eleven Ventures
              共同参与 $500M Private Equity-II 轮。2025 年，公司将 GreyMatter 重新定位为「智能体 AI 安全运营平台」，从 MDR/XDR 叙事转向 AI 优先身份。截至 2026 年
              5 月，公司在六个国家运营，员工 1,200+，客户 1,300+。CB Insights 2026 IPO pipeline 报告将 ReliaQuest 列为潜在公开市场候选。
