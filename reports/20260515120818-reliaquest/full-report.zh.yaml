  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的投资逻辑建立在四个相互强化的支柱上。第一，市场规模：按 MarketsAndMarkets 预测，托管检测与响应市场将从 2026 的 $6.28 billion 增至 2031 的
              $19.01 billion，CAGR 为 24.8%，为类别龙头创造大体量可触达机会。第二，产品验证：ReliaQuest 拥有超过 1,300 家企业客户、250+ 集成、覆盖 Universal
              Translator 遥测标准化层，并在 6 个全球地点运营共管 SOC 中心，已经证明大规模企业级产品市场契合。第三，AI 差异化：2025 推出的 GreyMatter 智能体 AI 系统把平台放在 AI
              原生安全运营前沿，支撑其相对传统 MDR 同行获得溢价估值倍数。第四，财务支持：KKR 和 EQT 确认投入的 $830 million
              股权资本提供多年竞争跑道，也传递机构对退出路径的信心。反向逻辑同样具体。Microsoft 的 M365 Defender 搭配托管 SOC 服务，以及 CrowdStrike 的 Falcon Complete
              MDR，都是已打包进既有企业平台协议的全栈、低增量成本替代方案，带来真实定价和替代风险。ARR、利润率、NDR 或审计质量财务数据没有披露，意味着估值完全由外部信号三角推算，投资案例不能仅靠公开数据承销。未来
              3–5 年内，随着生成式模型降低检测逻辑成本，AI 驱动威胁检测可能商品化，护城河被侵蚀的速度可能快于 MDR 市场增长。投资逻辑和反向逻辑在投资逻辑 / 反向逻辑表中系统比较，并在推荐逻辑图中可视化。
