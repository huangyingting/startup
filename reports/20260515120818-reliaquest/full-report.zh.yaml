      - number: '1.3'
        title: 融资历史、估值与投资方
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 多轮累计融资约 $830M。2016 年，公司完成早期成长股权融资。2020 年 8 月，公司完成一轮私募股权融资。2021 年 12 月，在 $1 billion
              估值下，公司完成一轮未署名风险投资融资（外界广泛称为由 FTV Capital 领投的 Series C，估值约 $1.2 billion）。2024 年 10 月，ReliaQuest 完成由 KKR 领投的
              $300 million Series D 轮，估值约 $3.4 billion，较 2021 年估值提升超过 2.8x。2025 年 3 月 31 日，公司又完成 $500M Private Equity-II
              轮，投资方包括 EQT、FTV Capital、KKR、Finback Investment Partners 和 Ten Eleven Ventures，累计融资增至约 $830M。CB Insights 将
              2025 年 3 月列为最新投后估值日期。现有投资方组合覆盖成长股权（FTV Capital）、并购基金（KKR）和多元化 PE（EQT），显示机构投资者信心较广。KKR 领投 Series D 并继续参与
              2025 年融资，说明 KKR 可能把 ReliaQuest 视为潜在 IPO 或战略并购标的。CB Insights 2025 年 11 月发布的 IPO pipeline 报告，将 ReliaQuest 列为
              2026 年潜在 IPO 候选。
