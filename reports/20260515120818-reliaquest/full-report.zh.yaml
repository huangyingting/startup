    columns:
      - 用户任务 / 角色
      - 当前工作流（无 GreyMatter）
      - GreyMatter 解决方案
      - 声称可量化收益
      - 已知限制
    rows:
      - - 告警分诊（Tier 1 SOC 分析师）
        - 每天要在彼此独立的 CrowdStrike、Splunk 和 Microsoft 控制台手工审阅数百条告警；噪声高、频繁切换上下文、容易疲劳
        - AI Alert Triage Teammate 在统一队列中自动分类、去重并优先级排序所有集成工具的告警，同时补充上下文
        - 声称告警量减少 90%+；分析师只聚焦升级后的高优先级告警
        - 降幅高度取决于集成深度和调优成熟度；部署初期几个月可能较低
      - - 威胁调查（Tier 2 分析师）
        - 手工关联 SIEM 日志、EDR 遥测和威胁情报中的 IOC；跨工具透视每次调查需要 30–90 分钟
        - Threat Investigation AI Teammate 自动透视 IOC、映射到 MITRE ATT&CK，并在数分钟内综合生成调查报告
        - 声称检测量提升 182%+；平均调查时间显著缩短
        - AI 调查质量取决于集成提供的数据完整度；日志覆盖缺口会形成盲点
      - - 威胁狩猎（威胁猎手）
        - 基于假设在 SIEM 中手工搜索；人力密集；受分析师专业能力和工具熟悉度限制
        - Threat Hunting AI Teammate 生成狩猎假设，在源端向集成工具发起查询，并将异常呈现给分析师复核
        - 扩大更广资产清单的狩猎覆盖；让中级分析师也能做威胁狩猎
        - 狩猎深度仅覆盖已启用集成的环境；范围外资产没有覆盖
      - - 事件响应（IR 负责人）
        - 通过各供应商控制台手工遏制；协调成本高；存在遏制延迟风险
        - Automated Response AI Teammate 通过 API 集成，在检测决策后数分钟内执行遏制动作（隔离端点、阻止用户、停用账号）
        - 声称 5 分钟内遏制；自动化剧本执行减少人工协调步骤
        - 自动化遏制范围仅限支持双向 API 的工具；其他工具需要手工兜底
      - - 合规报告（合规官）
        - 手工从多个工具收集安全控制证据；季度或年度流程耗时很长
        - Compliance AI Teammate 将检测和响应动作映射到监管框架（NIST、ISO 27001、SOC 2）；生成可直接用作证据的报告
        - 减少合规报告准备时间；实时可见控制状态
        - 框架映射准确性和完整性未经独立验证；监管接受度可能因审计方而异
      - - CISO 风险可见性（CISO / VP Security）
        - 风险数据分散在各工具中；没有统一视图；叙事型报告需要手工汇总
        - GreyMatter Identify 提供统一风险评分、资产清单和 SOC KPI 仪表盘，汇总所有集成环境
        - 单一视图风险可见性；可用于董事会的报告材料
        - 仪表盘准确性取决于集成覆盖；缺失集成会在企业风险评分中造成盲点
    notes: 工作流描述基于 ReliaQuest 解决方案页面、G2 和 TrustRadius 的客户评论内容，以及独立分析师研究。可量化收益主张由公司披露；公开来源中没有独立第三方基准。
