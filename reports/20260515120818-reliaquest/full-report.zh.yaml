      - CR031
      - CR032
  - id: TR005
    title: 缓释与止损标准表
    columns:
      - 风险
      - 可监测触发器
      - 阈值或事件
      - 行动含义
    rows:
      - - 托管 SOC 环境内发生重大安全事件
        - 提及 ReliaQuest 的 SEC 8-K Item 1.05 文件；Dark Reading 或 SecurityWeek 入侵报道；客户通知显示 SOC 被攻破
        - 任何确认的 ReliaQuest 托管环境入侵，且导致客户数据暴露，或同时未经授权访问多个客户环境
        - 投资逻辑破裂；暂停或退出投资头寸；要求独立安全审计；以客户流失轨迹和收入影响作为核心指标评估
      - - CEO Brian Murphy 离职
        - 公开高管离职公告；LinkedIn 资料变化显示角色转换；招聘页面出现 CEO 职位
        - 确认离职，且未向董事会和主要客户提出已确定的内部接班人或 90 天过渡计划
        - 重大风险标记；要求紧急管理层会议；先评估接班质量，再决定持有或退出；立即监测客户留存信号
      - - 任一司法辖区出现监管执法行动
        - ICO 或欧盟 DPA 处以 GDPR 罚款；DORA 执法通知；SEC 执法移送；任一司法辖区法院文件点名 ReliaQuest
        - ReliaQuest 运营 SOC 中心的任一司法辖区，出现任何确认的执法行动，或金额超过一百万美元的重大罚款
        - 升级尽调；量化财务责任；评估合规整改时间表；审查客户合同赔偿条款中的转嫁暴露
      - - 被 Microsoft 或 CrowdStrike 竞争替代
        - 管理层材料中的胜率数据；季度更新中的 NRR 压缩；离职访谈数据把客户流失归因于 Microsoft 或 CrowdStrike 捆绑
        - 在与 Microsoft 或 CrowdStrike 正面对比评估中，胜率降至 40% 以下；或 NRR 连续两个季度低于 95%
        - 监测轨迹；若持续恶化，重新校准 TAM 和市场份额假设；评估差异化策略有效性；向管理层索取竞争胜负分析
      - - PE 推动退出压力导致客户服务恶化
        - 管理层宣布准备 IPO 或 M&A 流程；G2 和 TrustRadius 客户评分下降；面向客户角色出现裁员公告
        - S-1 显示 NRR 恶化的 IPO 申报；确认面向客户的 SOC 岗位裁员；Gartner 或 G2 评分连续两个季度下降 0.5 分或更多
        - 升级尽调；评估退出时间表与客户留存策略是否一致；审查企业客户合同中的服务等级义务和 SLA 条款
    notes: >-
      止损标准和阈值为指示性，应按投资者风险承受能力和投资组合语境校准。触发器来自对公开来源和管理层数据室披露的监测。表格聚焦投资逻辑破裂级别事件；增量风险监测指标已记录在上方运营和监管风险登记表中。所有触发器至少应按季度监测，评论平台评分则需按月监测。
    claimRefs:
      - CR033
      - CR034
      - CR035
      - CR036
      - CR037
  - id: TV001
    title: 推荐摘要表
    columns:
      - 维度
      - 评级 / 立场
      - 置信度
      - 决策含义
    rows:
      - - 投资建议
        - 有条件买入（若 ARR 未核实则继续研究）
        - 中
        - 推进正式尽调并获取数据室权限；设定 90 天决策期限；若 ARR 低于 $200M 或增长低于 15%，升级为持有
      - - 置信水平
        - 中 — 市场和融资已确认；财务数据完全未核实
        - 高（置信度评级本身确定）
        - 将所有财务估计视为未经核实的三角测算；最终通过 / 不通过前，要求审计财务报表
      - - 风险评级
        - 中-高 — 平台捆绑、财务不透明和高估值倍数造成实质下行
        - 中
        - 在悲观情景下压力测试所有场景；投入前要求确认 ARR、NDR 和利润率
      - - 估值立场
        - 溢价，但在估计 ARR 的 10–14x 下有条件合理；若 ARR ≥$300M 且增长 25%+，可以防守；若 ARR 低于 $200M，则偏贵
        - 低（ARR 估计未核实）
        - 未核实 ARR 前，不应按 Series E 后 $5–7B 估值承销；把获取管理层财务数据作为继续尽调的条件
      - - 目标回报 / 退出周期
        - 基准情景：2027 年以 $6–8B IPO，相比 Series D 获得 1.5–2x；乐观情景：到 2028 年以 $10–14B 退出，获得 3–4x；悲观情景：在 $2.5–3.5B 区间持平到亏损
        - 低（依赖场景）
        - KKR 入场回报需要 IPO 估值 ≥$5B；EQT 入场需要 ≥$7–8B；投入前应按优先股堆叠建模普通股瀑布
    notes: 所有评级均基于三角测算的公开证据；ReliaQuest 未披露 ARR、利润率或运营指标。置信度评级反映的是对评级本身的分析确定性，而非管理层确认的数据。该表为综合判断，并非正式投资建议。
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 维度
      - 投资逻辑
      - 反向逻辑
      - 何种证据会改变判断
    rows:
      - - 市场机会
        - MDR 市场以 24.8% CAGR 从 $6.28B 增至 2031 年 $19.01B；企业安全预算结构性扩张；AI 驱动 MDR 成为新的标准做法
        - 平台厂商（Microsoft、Palo Alto、CrowdStrike）通过免费捆绑 MDR 捕获部分市场增长；平台份额提升后，独立 MDR TAM 可能收缩
        - 确认的企业 MDR 预算支出数据显示，相比平台捆绑替代方案，独立 MDR 份额能够维持或增长
      - - 产品差异化（AI 护城河）
        - Universal Translator 遥测归一化 + 智能体 AI 自动化形成切换成本和集成深度，难以复制；250+ 个集成构成网络效应
        - 生成式 AI 降低构建 MDR 逻辑的成本；Microsoft 和 CrowdStrike 可凭现有平台关系，以边际成本复制 AI 原生 MDR；集成广度是入场券，不是护城河
        - 已核实 NDR 高于 115%，证明粘性扩张；客户披露的 TCO 节省经独立审计确认；有证据表明 Universal Translator 没有近似替代品
      - - 财务轨迹
        - >-
          估计 2025 年 ARR 为 $250–340M，并以 25–30% CAGR 增长；若按 CrowdStrike 同等 IPO 倍数（18–25x ARR），隐含 $5–10B 价值；$830M 融资提供通向 IPO
          的跑道
        - ARR 完全未核实；18 个月内两轮大额融资可能意味着烧钱超过收入增长；若 ARR 低于 $200M，Series D 倍数超过 SentinelOne 可比水平，且在没有 AI 品类证明前无法支撑该溢价
        - 数据室提供 3 年审计财务报表；ARR 确认高于 $300M，NDR 高于 110%；经营现金流接近盈亏平衡
      - - 退出路径与赞助方一致性
        - KKR（自 2020 年起）和 EQT（2025 年）拥有标准 PE 持有期 4–7 年；CB Insights 将 ReliaQuest 列入 2026 年 IPO 管线；赞助方资本让 IPO 执行目标一致
        - PE 集中度高，普通股持有人对时点控制有限；若 IPO 估值低于 $5–7B，清算优先权可能让普通股上行空间很小；IPO 前二级市场流动性有限
        - 提交 S-1 注册声明，确认 IPO 流程启动；股权结构瀑布分析显示，在基准 IPO 估值下普通股仍有上行空间
    notes: 投资逻辑和反向逻辑来自公开证据和分析推断。没有管理层评论或指引可确认或反驳任一方。改变判断的标准代表能够消除不确定性的具体证据。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
      - CV008
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 关键假设
      - 估值 / 回报逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 乐观
        - >-
          到 2028 年 ARR 达到 $600–700M，25–30% CAGR；订阅毛利率 72–77%；NDR 120%+；AI 原生平台定位推动 18–22x ARR 的 IPO 倍数；MDR 市场到 2028
          年维持增长轨迹
        - >-
          IPO 时股权价值：$10–14B；相较 Series D $3.4B 入场获得约 3–4x 回报；EQT 从估计 $5–7B 入场获得约 1.5–2x；2027–2028 年在 Nasdaq IPO，并获得接近
          CrowdStrike 的估值溢价
        - Microsoft / CrowdStrike 加速捆绑 MDR 能力；AI 商品化压缩 MDR 倍数；利率环境压制高倍数 IPO 需求
        - 中等（25–30% 概率）— 取决于 ARR 核实高于 $400M、持续增长以及 AI 护城河证明
      - - 基准
        - >-
          到 2028 年 ARR 达到 $450–550M，18–22% CAGR；毛利率 65–72%；NDR 110–118%；公司维持 MDR 品类领导地位，但竞争导致利润率压缩；按与 SentinelOne 先例一致的
          10–12x ARR 倍数 IPO
        - IPO 时股权价值：$5–7B；相较 Series D 入场获得约 1.5–2x 回报；满足 KKR 最低门槛；EQT 从估计 2025 年入场看略正或中性；2027 年 IPO
        - ARR 增速降至 18% 以下；平台厂商加速捆绑；NDR 低于 110%；IPO 窗口关闭，需要追加私募市场融资
        - 最可能（45–55% 概率）— 假设当前轨迹延续，ARR 处于 $300–400M 区间，MDR 市场接近共识增长落地
      - - 悲观
        - 平台捆绑替代导致 ARR 增速降至 8–12% CAGR；到 2028 年 ARR 达到 $350–450M，但利润率下降；MDR 倍数压缩至 6–8x ARR；IPO 延后或放弃；需要下轮融资
        - 退出时股权价值：$2.5–3.5B；对合计投入 $800M+ 的 KKR 和 EQT 来说，回报接近零到为负；优先股堆叠后普通股几乎没有上行；需要打折二级出售或 M&A
        - MDR 市场增长快于预期；ReliaQuest AI 差异化证明持久；Microsoft / CrowdStrike 捆绑未能替代企业共管 SOC；战略收购以溢价挽救回报
        - 概率较低（20–30%）— 需要 MDR 市场逆风与平台捆绑加速同时发生；视为值得监测的尾部风险，而非基准假设
    notes: >-
      概率信号是基于市场动态和可比先例的分析估计；它们不是精算概率，也不应在未核实前作为基准率使用。估值区间假设三种情景都基于未核实的 ARR 底数建模。实际回报取决于确认的 ARR、优先股堆叠、未来任何融资带来的稀释，以及退出时的
      IPO 市场条件。
    claimRefs:
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
  - id: TV004
    title: 可比估值表
    columns:
      - 可比公司
      - 指标
      - 倍数 / 估值 / 状态
      - 对 ReliaQuest 的参考意义
      - 局限
    enumerationScope:
      coverage: partial
      basis: >-
        Selected public MDR/XDR companies and private comparable peers identified through CB Insights, Crunchbase,
        Gartner, and public IR pages; coverage excludes all cybersecurity companies below $1B enterprise value or
        without verifiable revenue data; private-peer valuations are estimates from secondary market data and investor
        reports
    rows:
      - - CrowdStrike
        - 约 $3.8B ARR（FY2025 已披露）；约 $83B 市值（2026）
        - 约 22x ARR（市值 / 估计 ARR）
        - 最大的 XDR / MDR 可比公司；AI 原生平台；为 AI 品类 MDR 估值溢价设定上限；ReliaQuest 多头把 CrowdStrike 同等倍数视为上行情景
        - 并非纯 MDR 公司；平台广度（端点、身份、云）远超 ReliaQuest；企业渗透率和竞争定位有实质差异；CrowdStrike 规模（10,000+ 名员工）不可比
      - - SentinelOne
        - 约 $900M ARR（FY2025 已披露）；约 $17B 市值（2026）
        - 约 9–11x ARR
        - 结构上最接近：纯 AI 原生云安全平台，具备共管 SOC 功能；曾面对利润率压力和增长减速，是有信息量的下行先例
        - SOC 服务组件不如 ReliaQuest 共管模式成熟；客户画像更偏中端市场；未以同等规模运营全球 SOC 中心
      - - Palo Alto Networks
        - 约 $10B ARR（FY2025 已披露）；约 $120B 市值（2026）
        - 约 10–12x ARR
        - 代表平台整合威胁：XSIAM + MDR 以无增量成本捆绑进企业协议；估值倍数说明，即便规模巨大，大型平台玩家也按 10–12x 为 ARR 定价
        - 平台收入组合（防火墙、云、AI Ops）稀释 MDR 专项可比性；收购驱动增长扭曲有机倍数；在 Palo Alto 生态中，ReliaQuest 是目标而非同行
      - - Rapid7
        - ~$800M ARR（FY2025，约数）；~$2.5B 市值（2026）
        - ~2.5–3x ARR（下降中）
        - 传统 MDR 同业：显示缺少 AI 差异化时，共管 SOC 的底部倍数；倍数下行提示非 AI MDR 服务商的商品化风险；若 ReliaQuest 增速放缓，可作为悲观情景锚点
        - Rapid7 MDR 在下滑；集成 / 漏洞管理收入会扭曲 ARR 结构；并非 AI 原生；不是正向可比公司 ——仅作为下行先例参考
      - - Secureworks (SCWX)
        - ~$500M ARR（FY2025 约数）；~$700M 市值（2026）
        - ~1–1.5x ARR（下降中）
        - 极端传统底部：显示没有产品差异化或 AI 投入时，MDR 会变成什么样；可作为悲观情景倍数的商品化底部锚点
        - Secureworks 处于有管理的下滑期；不适合作为增长情景可比公司；收购或私有化风险限制其交易可比性；Dell 持股，倍数低于市场
      - - Arctic Wolf
        - 私营；讨论估值约 $4–5B（2022–2024 老股数据）；估计 ARR 约 $450M
        - ~9–11x ARR（由讨论估值推断）
        - 与 ReliaQuest 规模最接近的纯 MDR 同业；说明私人市场愿意为 $4–5B 级别的 AI 增强共管 SOC 付费；也证明 ReliaQuest Series D 的 $3.4B 估值并非 MDR 纯玩家的孤例
        - 没有公开财务数据；估值仅来自二级市场数据和投资者报告；Arctic Wolf 未披露与 Series D 对等的融资；覆盖只是部分估计
      - - Deepwatch
        - 私营；估计估值 ~$800M–$1B；估计 ARR ~$100–150M
        - ~6–8x ARR（由估计估值推断）
        - 更早期规模的纯 MDR 同业；说明较小 MDR 平台拿到的倍数更低，印证 ReliaQuest 的规模溢价；可用于理解市场结构
        - 规模远小于 ReliaQuest；公开证据有限；未披露财务数据；估计质量低；主要作为市场结构数据点，而不是直接可比公司
    notes: >-
      所有可比公司数据来自公开 IR 文件（CrowdStrike、SentinelOne、Palo Alto、Rapid7）、CB Insights、Crunchbase 和分析师市场报告。私营公司估值（Arctic
      Wolf、Deepwatch）来自二手来源估计。ARR 倍数为近似值并已取整。市值约为 2026 年中水平，可能随市场波动变化。本表只是部分列举，并不代表所有网络安全公司。
