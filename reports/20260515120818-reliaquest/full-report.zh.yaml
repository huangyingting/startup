    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 是一家私营网络安全技术与服务公司，总部位于佛罗里达州坦帕 1001 Water Street, Suite 1900, Tampa, Florida 33602。公司由 Brian
              Murphy 于 2007 年创立，Murphy 仍担任创始人兼 CEO，使命表述为「Make Security Possible」。核心产品 GreyMatter 是一套智能体 AI
              安全运营平台，能在企业整个安全栈内统一检测、调查和响应，覆盖 SIEM、EDR、云、网络、邮件和身份工具，无需迁移数据。ReliaQuest 的商业模式结合 SaaS 软件订阅和托管安全运营服务：客户使用
              GreyMatter 平台，同时接入 ReliaQuest 24/7 安全运营中心（SOC）分析师。公司从多年期平台订阅和相关托管服务费中获得经常性收入。ReliaQuest
              主要服务安全环境复杂、工具来自多家供应商的大型企业，并把自己定位为供应商中立：GreyMatter 不替换现有工具，而是接入 250+ 技术伙伴，并通过专利 Universal Translator
              规范化遥测数据。公司称其做法是用智能体 AI 角色和 200+ 智能体技能，把安全运营从被动响应推向预测式运营，自动化 Tier 1 和 Tier 2 工作。
