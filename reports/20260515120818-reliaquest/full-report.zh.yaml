      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              CEO Brian Murphy 是 ReliaQuest
              单点严重程度最高的关键人风险。作为联合创始人，他掌握深厚客户关系、机构投资人信任和战略愿景；若离任，而公开渠道又没有识别出继任计划，公司会出现领导真空。根据招聘页面，ReliaQuest 正在 6 个全球 SOC
              地点积极招聘，说明人员规模快速扩大；新分析师分布在不同地域，人才池深度不一，这条增长路径会带来持续质量风险。TrustRadius 评论明确提到部分 SOC
              分析师资历偏浅，确认公司扩张时执行质量已是现实风险。执行风险包括跨 6 个时区维持质量一致、在竞争激烈的网络安全劳动力市场留住人才，以及避免全球分布式团队出现文化碎片化。PE
              所有权结构意味着组织决策可能优先服务退出准备度，而不是长期运营卓越；这可能与重视服务连续性的企业客户发生错位。$830 million PE
              资本带来的快速收入增长预期，会迫使公司先于收入招聘；在激进全球扩张过程中，资本效率和服务质量可能同时受损。
