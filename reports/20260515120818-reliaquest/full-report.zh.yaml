      - number: '8.3'
        title: 当前融资背景与进入纪律
        blocks:
          - type: paragraph
            body: >-
              截至 May 2026，ReliaQuest 的资本结构由机构 PE 投资者主导：KKR（Series D 领投方，October 2024，以 $3.4 billion 投后估值投入 $300
              million；SEC EDGAR Form D 文件和 TechCrunch、BusinessWire、SecurityWeek 等多个独立新闻来源确认）以及 EQT Private Equity（March
              2025 增长轮领投方，$500 million，估值未披露）。FTV Capital 大约自 2014–2016 起作为早期投资人进入，并通过两轮共同投资确认仍持有权益。累计确认融资约 $830
              million。March 2025 轮没有披露投后估值；按典型 PE 成长期融资相对前一轮 1.3–2x 定价，隐含区间为 $4.5–7 billion。当前阶段的进入纪律必须计入 PE
              优先股堆叠带来的稀释。KKR 和 EQT 持有优先股，通常带有清算优先权；若 IPO 估值低于 $5
              billion，普通股股东经济收益会因优先权条款而明显恶化。尽调团队在承诺目标回报前，必须建模股权结构表分配瀑布。未披露可转债或债务工具，降低了优先权分配瀑布分析复杂度，但股权结构表本身仍未披露。如果 IPO
              环境慢于预期，二级市场参与（从早期员工或 FTV Capital 手中收购既有优先股或普通股）可能以低于上一轮估值的折扣完成。CB Insights 2026 Tech IPO Pipeline Scouting
              Report 将 ReliaQuest 列为 12–24 个月内可能进入公开市场的候选公司，这与 KKR（2024 年以 $3.4 billion 进入）和 EQT（2025 年以估计 $5–7 billion
              等价估值进入）的 PE 赞助方持有期目标一致。
