      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的核心品类 MDR 市场，MarketsAndMarkets 估计 2026 年规模为 $6.28 billion，到 2031 年增至 $19.01 billion，复合年增长率
              24.8%。这一增速使 MDR 成为更广义网络安全市场中增长最快的细分之一。相邻的 SIEM 市场 2026 年规模为 $8.39 billion，2031 年增至 $13.67 billion，CAGR
              10.3%；考虑到 GreyMatter 可叠加在传统 SIEM 部署之上，或替代传统 SIEM，这是一块重要相邻机会。多家分析机构估计，XDR 市场 2026 年约 $1.5–3
              billion，并预计随着企业整合检测职能，2028–2030 年可达 $10–15 billion。合并 MDR 核心、XDR 以及 SOC 自动化相邻市场，ReliaQuest 2026
              年总可用市场（TAM）估计为 $10–15 billion。ReliaQuest 的可服务市场（SAM）聚焦需要整合多供应商环境、员工数 2,000+ 的大型企业，2026 年估计为 $3–6
              billion。可获取市场（SOM）反映 ReliaQuest 当前规模和品牌认知：1,300+ 企业客户、估计 $200–400 million ARR，在不同市占率假设下约为 $0.5–1.5
              billion。SOM 和 SAM 数据存在明显证据缺口，因为这些是分析师推算区间，并非公司公开披露数据。
