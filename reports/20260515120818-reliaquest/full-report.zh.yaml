      - number: '8.7'
        title: 证据项
        blocks:
          - type: callout
            title: 条件买入：能否访问资料室决定是否推进
            body: >-
              公开证据整体支持在当前私募市场估值下对 ReliaQuest 有条件买入，但正式尽调必须先验证三点：（1）年经常性收入（ARR）不低于 $300
              million，且经审计财报或四大会计师事务所审阅的管理账确认同比增长 20%+；（2）通过队列留存数据确认净美元留存率（NDR）不低于 110%；（3）订阅毛利率不低于 65%，符合企业 SaaS
              常态。缺少这些验证，正确姿态就是继续研究，并设 90 天期限。市场机会、AI 产品差异化和 PE 赞助方利益一致，都支撑长期投资逻辑；但财务不透明，仍无法让投资人有把握地承销当前估值。
            calloutType: recommendation
            claimRefs:
              - CV009
              - CV010
              - CV011
          - type: callout
            title: 财务不透明是最大的单一投资风险
            body: >-
              ReliaQuest 没有披露任何运营指标——没有 ARR、增长率、毛利率、NDR，也没有 EBITDA——却在 18 个月内两轮融资 $830 million。这对 PE 支持、IPO
              前公司并不罕见，但意味着本章所有财务估计都只是未经验证的三角测算。不披露会带来逆向选择风险：管理层可能掌握 ARR 增速放缓、利润率承压或被竞争对手替代的信息，并在 IPO 前阶段有意不披露。若按 2025 年
              3 月之后隐含的 $5–7 billion 投后估值投资，必须以正式数据室访问和经审计财务为前置条件，不能只依赖公开证据。
            calloutType: risk
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
          - type: callout
            title: Microsoft 和 CrowdStrike 的平台捆绑是主要反向逻辑风险
            body: >-
              ReliaQuest 最可信的悲观情景不是产品执行差，而是现有平台把 MDR 捆进来且不另收费，进而替代它。Microsoft M365 Defender 搭配 Copilot for Security 和托管
              SOC 服务，CrowdStrike 也把 Falcon Complete 捆进 Falcon Go/Pro 协议；两者都让企业买方在既有采购关系里以零边际成本获得共管 SOC 访问。Gartner MDR
              市场评论和 G2 买方反馈均确认，平台捆绑替代品带来的价格压力已经进入客户考量。该风险不会推翻投资逻辑，但会把 NDR 和 ARR 增速变成尽调必须验证的硬门槛。
            calloutType: risk
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV007
          - type: callout
            title: $830M 资本头寸支撑三年 IPO 跑道
            body: >-
              按全球 SOC 运营、AI 研发投入和企业销售打法带来的年度烧钱速度估计为 $100–200 million 计算，仅 2025 年 3 月融资的 $500 million 就能提供约 2.5–5
              年运营跑道。再加上 2024 年 10 月的 $300 million 融资，除非实际烧钱速度明显高于估计，ReliaQuest 已有足够资本推进
              IPO，无需再融资。这一资本优势具备战略意义：在竞争激烈的市场里，Arctic Wolf、Deepwatch 等规模较小的 MDR 厂商，财务弹性不足，难以匹配同等规模的 AI 投入。
            calloutType: strength
            claimRefs:
              - CV016
              - CV017
              - CV018
