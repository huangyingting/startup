      - number: '8.5'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的可比分析使用三组参照：已披露财务的公开 MDR/XDR 公司、估值可估或有讨论的私有 MDR 同行，以及托管安全服务和 SIEM/MDR 领域的先例 M&A
              交易。公开可比公司中，CrowdStrike 是最有参考价值的上限：2026 年市值约 $80–85 billion，对应约 $3.8 billion ARR，隐含 ~22x ARR
              倍数；只有拥有已验证先落地再扩张机制和 85%+ 毛利率的 AI 平台龙头才能达到这一水平。SentinelOne 约 $15–18 billion 市值、约 $900 million ARR（~9–11x
              ARR），是最接近的结构类比：纯云安全公司，同时具备共管 SOC 特征。Palo Alto Networks 的 10–12x ARR 代表平台整合风险——买家可通过平台关系获得捆绑 MDR 服务，而不必购买独立
              MDR 订阅。公开传统 MDR 厂商中，Rapid7（~2–3x ARR，下降中）和 Secureworks（~1–2x ARR，下降中）展示了商品化地板：没有 AI 差异化的共管 SOC
              是低倍数业务。私有同行可比包括 Arctic Wolf（讨论估值 $4–5 billion，与同行 MDR 市场规模一致）和 Deepwatch（估计 $800 million–$1
              billion，规模更小）。这些可比共同支持 ReliaQuest 在公开市场进入证据下的 $4–8 billion 估值区间；上限只有在验证 ARR 增长高于 25%，且 NDR 数据证明 AI
              平台定价权后才可达。先例 M&A——包括 IBM 约 $2.2 billion 收购 QRadar/SIEM 资产，以及 Microsoft 整合 Mimecast——说明战略买家愿意对安全运营平台支付 $3–6
              billion 控制权溢价。可比估值表列出完整可比集合，包括有来源支撑的指标、相关性理由和局限。
