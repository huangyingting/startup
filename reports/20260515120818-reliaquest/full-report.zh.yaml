  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 处在三个安全市场类别的交汇处：托管检测与响应（MDR）、扩展检测响应（XDR）以及 AI 驱动的安全运营中心（SOC）自动化。核心 MDR 市场指把技术与 7×24
              小时人工安全专家结合起来，代表企业客户检测、调查并响应威胁的服务。XDR 平台进一步把终端、云、网络、邮件和身份层的遥测数据统一到一张检测网络中，且不要求迁移数据。SOC 自动化则用 AI
              智能体和编排处理重复的分析师任务，例如警报分诊、调查工作流和遏制 playbook。ReliaQuest 的 GreyMatter 横跨三类：它以 MDR 形式提供托管服务，按 XDR
              思路整合所有安全工具，并部署智能体 AI 自动化大部分 Tier 1 和 Tier 2 SOC 工作。不属于 ReliaQuest
              直接竞争范围的，是纯终端防护平台、独立防火墙、与威胁检测无关的身份治理工具，以及数据防泄漏产品。最常见的被替代对象，是企业用原生 SIEM 工具自建、没有托管覆盖层的内部 SOC。更广泛的网络安全市场（2025
              年 $84.5B、CAGR 7.2%）提供市场背景，但不是 ReliaQuest TAM 的直接测算基础。
