      - number: '4.2'
        title: 单位经济模型与利润率结构
        blocks:
          - type: paragraph
            body: >-
              软件驱动交付的企业 MDR 提供商，订阅部分通常能达到 65–75% 毛利率，专业服务毛利率通常为 20–35%。ReliaQuest 未公开披露单位经济模型；以下分析基于 MDR
              行业基准、可比上市公司（Secureworks、Rapid7）以及可观察成本驱动因素。协同托管 SOC 模式需要在 6 个全球 SOC
              中心投入大量人力资本。人员成本（安全分析师、威胁猎手、检测工程师）是销售成本中的主要项目。估计交付岗位有 250+ 名分析师级员工，单名分析师全成本为 $80–100K，则人员交付成本为每年
              $20M–$25M。盈亏平衡点因此高度依赖收入基数和人效。ReliaQuest 的企业直销动作推高获客成本（CAC）：企业安全交易通常需要 6–12 个月销售周期、高级 AE
              参与，以及概念验证评估。若锚定客户的企业级 ARR 估计为 $500K–$1M+，在 3 年合同期限假设下，CAC 回本周期将以 12–18 个月计。净美元留存率（NDR）未披露。平台采用度高的企业 MDR
              提供商通常可达到 110–130% NDR；分析师基于多年期合同结构和产品扩张模式，估计 ReliaQuest 的 NDR
              也在这一区间。因此，客户终身价值（LTV）实质上较高，但如果无法取得队列留存数据，就不能独立验证。
