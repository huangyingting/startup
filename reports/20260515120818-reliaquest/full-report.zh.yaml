        title: 留存与耐久性
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 没有公开披露净留存率（NRR）、总留存率（GRR）、续约率或队列级流失数据。这是私有企业安全公司常见但重大的证据缺口。结构性留存信号偏正面：多年期合同（通常 2–3 年）是标准配置，共管
              SOC 集成会形成运营依赖并抬高切换成本，250+ 集成生态也让 GreyMatter 深度嵌入客户安全工具。客户满意度代理指标包括 TrustRadius 和 G2 评论，整体以正面为主；TrustRadius
              的反向信号——「部分分析师对 SOC 相对生疏」——反映的是共管模式特有的人员质量担忧。Gartner Peer Insights 评论提供额外企业级满意度数据。企业 MDR 提供商的行业基准显示，集成深的平台
              NRR 通常为 110–130%，GRR 为 90–95%；ReliaQuest 的多年期合同结构和共管依赖画像与该区间上沿一致，但缺乏独立验证。本章的留存队列图采用基准推导估计，并明确标注为近似值，因为
