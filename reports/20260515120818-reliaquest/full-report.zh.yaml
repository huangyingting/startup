        - 区域性或全球性宕机会让客户在活跃事件期间失去检测覆盖；SLA 违约会同时触发财务抵扣和客户流失风险
        - 监测任何公开宕机披露，或引用 GreyMatter 不可用的客户投诉；向 ReliaQuest 索取正常运行时间 SLA 数据和历史可用性指标
      - - 集成伙伴弃用关键 API 或连接器
        - 依赖
        - 低-中
        - 中
