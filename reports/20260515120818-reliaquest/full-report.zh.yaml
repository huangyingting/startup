      - number: '1.2'
        title: 领导层、治理与关键人物因素
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 由创始人 Brian Murphy 以 CEO 身份领导，高管团队覆盖外勤运营、产品、财务、技术和人力职能。Colin O'Connor 担任外勤运营总裁；Brian Foster
              担任产品与技术运营总裁；Scott Dussault 担任 CFO；Joe Partlow 担任 CTO。董事会包括主要投资方代表：KKR、EQT 和 FTV Capital 均有董事席位，另有独立董事 Dave
              Welsh、Mike Burkland 等人。风险投资合伙人 Kara Wilson 也列为董事。领导层偏重运营和客户成功，反映出公司托管服务出身。Brian Murphy
              构成关键人物风险：他既是文化锚点，也是可见度很高的 CEO，并亲自代表「mindset」文化；若他离任，客户关系和内部文化很可能受到明显冲击。公司未披露继任计划。Laura Tanner
              担任首席人力官，Laurie Morylak 担任首席营销官，说明公司同时投入人才留存和市场定位。六个全球运营中心（Tampa、Las Vegas、Sandy
              UT、Dublin、London、Pune）显示出分布式领导结构和区域运营韧性。基于可得信息，2024–2026 年期间 ReliaQuest 领导层保持稳定，未公开披露高管离职。
