      - number: '2.5'
        title: 采用约束与竞争摩擦
        blocks:
          - type: paragraph
            body: >-
              尽管结构性顺风强劲，仍有几类因素限制 MDR 市场增长，也限制 ReliaQuest 抢占份额。大型技术供应商的平台整合——尤其是 Microsoft（Sentinel + Defender XDR 与 M365
              E5 捆绑）、Palo Alto Networks（Cortex XSIAM）和 CrowdStrike（Falcon
              平台）——创造了「够用」的捆绑替代方案，一些企业为减少供应商数量和成本会接受这类方案。Microsoft 在企业市场渗透极深（65%+ 大型企业使用 M365 E5），能提供免费到低成本的 SIEM 和 XDR
              体验，直接争夺 MDR 支出预算。拥有专职安全团队的大型企业仍在争论「自建还是购买」，不少团队更愿意掌握自有检测工程，而不是交给托管服务。切换成本在两个方向都很高：企业多年投入原生 SIEM
              调优和自定义检测规则，迁移摩擦很大。经济不确定时期的预算压缩，可能让企业推迟或削减可自由裁量的安全支出，不过合规要求通常会托住底线支出。数据主权和本地化要求（尤其在欧盟、德国、印度和
              APAC）让跨境托管服务交付更复杂。最后，SolarWinds 和 Kaseya 事件凸显了托管服务提供商（MSP）的供应链风险，企业即使面对资质很强的第三方，仍会对外包安全运营保留疑虑。
            claimRefs:
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
      - number: '2.6'
        title: 图表
        blocks:
          - type: callout
            title: MDR 品类 24.8% CAGR 提供结构性增长顺风
            body: >-
              MDR 市场到 2031 年 CAGR 为 24.8%，约为整体网络安全市场（7.2% CAGR）的 3.5 倍。水涨船高之下，即便只是维持中等市占率，也能转化为强劲的绝对收入增长，并为 Series D 时
              $3.4B+ 的隐含企业价值提供估值支撑。
            calloutType: strength
            claimRefs:
              - CM006
              - CM007
          - type: callout
            title: 平台整合是结构性需求约束
            body: >-
              Microsoft M365 E5 捆绑包（包括 Sentinel SIEM + Defender XDR）对现有 Microsoft 企业客户几乎没有增量成本。凭借 65%+ 企业渗透率，Microsoft
              的嵌入位置创造了一个「够用」的 SOC 替代方案，ReliaQuest 必须在竞争场景中跨过这道门槛。所有主要平台供应商也在走同一路径：Palo Alto Networks 通过 Cortex
              XSIAM、CrowdStrike 通过 Falcon，把检测、响应和 SOC 自动化打包，减少客户总供应商数量。
            calloutType: risk
            claimRefs:
              - CM026
              - CM027
              - CM028
          - type: callout
            title: SEC 披露规则与 EU DORA 制造可衡量的采购紧迫感
            body: >-
              SEC 4 天重大事件披露要求（2023 年 12 月生效）和 EU DORA 运营韧性要求（2025 年 1 月生效），为企业 MDR
              投资创造了可执行的合规驱动。与愿景式安全框架不同，这些法规带有实质性处罚，让 CFO 和董事会更容易接受 MDR 采购的 ROI 计算。
            calloutType: insight
            claimRefs:
              - CM022
              - CM023
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 所处市场竞争激烈，至少面对四类竞争者。纯 MDR 提供商——Arctic
              Wolf、Deepwatch、Expel、Secureworks/Taegis——直接争夺同一批企业托管安全服务预算。平台原生 XDR 厂商——CrowdStrike Falcon、Palo Alto
              Networks Cortex XSIAM 和 SentinelOne Singularity——正从终端起点扩展到全栈 XDR 和协同托管 SOC 服务，侵入 MDR 领地。平台整合者——尤其是带有
              Sentinel SIEM 和 Defender XDR 捆绑包的 Microsoft——利用既有企业授权关系，以接近零增量成本提供集成安全。最后还有现状竞争者：围绕原生 SIEM 工具自建的内部 SOC
              运营；这仍是已投入专门安全团队的大型企业默认方案。ReliaQuest 的供应商中立定位，是其首要战略差异点：GreyMatter 接入而不是替换现有工具（Splunk、CrowdStrike、Sentinel
              等），目标是成为企业现有安全栈之上的统一智能层。ReliaQuest
              通过把自己定位为增强层而非替代品，降低采购决策摩擦。但随着平台供应商把更多能力捆进企业协议，当底层平台可以自我编排时，「增强层」论点会更难维持。AI
              原生安全运营初创公司（Tines、Torq、Darktrace）也让竞争格局更复杂；这些公司更聚焦自动化，而非托管服务。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
      - number: '3.2'
        title: 直接 MDR 竞争者画像
        blocks:
          - type: paragraph
            body: >-
              按定位和客户画像看，Arctic Wolf 是 ReliaQuest 最直接的 MDR 同行。Arctic Wolf 创立于 2012 年，背靠 Owl Rock Capital（Blue Owl），以协同托管
              SOC 模式服务 4,500+ 客户，强调简单性和威胁情报共享。Arctic Wolf 的估值曾被引用为 $4.5 billion+，员工约 4,500 人。不同于 ReliaQuest
              的企业优先打法，Arctic Wolf 覆盖更广市场，包括员工数 500+ 的高端中端市场客户。Deepwatch 是 Warburg Pincus 和 Vista 支持的 PE 系 MDR 提供商，累计融资
              $400M+，其平台主要作为 Splunk 原生托管服务层构建，深度接入 Splunk Enterprise Security 客户。Deepwatch 目标客户是已使用 Splunk 的企业，这一点区别于
              ReliaQuest 的多供应商无关路线。Expel 是一家 VC 支持的 MDR 初创公司，累计融资 $310M+，投资方包括 Greycroft、Battery Ventures 和
              Paladin；Workbench 平台强调透明度，客户能看到 Expel 分析师使用的同一套工作流。Expel 的 SOC-as-a-service 面向员工数 1,000–10,000
              的组织。Secureworks（NASDAQ: SCWX）是 Dell 旗下上市子公司，通过 Taegis XDR 平台提供 MDR。Secureworks 收入增长下滑，同时受到纯 MDR
              厂商和平台整合者夹击；其公开文件确认了收入收缩压力。Rapid7（NASDAQ: RPD）提供 MDR 与 SIEM 组合产品，市值约 $1.6 billion，可作为披露财务指标的公开市场 MDR
              可比公司。Huntress 聚焦托管安全运营的 SMB 细分，低于 ReliaQuest 的企业目标市场。
            claimRefs:
              - CP005
              - CP006
              - CP007
              - CP008
