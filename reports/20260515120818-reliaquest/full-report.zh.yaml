      - number: '2.3'
        title: 买方分层与采用动态
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest GreyMatter 平台的主要买方，是大型企业的首席信息安全官（CISO）或安全副总裁——通常为员工数 2,000+、安全栈多供应商且复杂，并有专门安全运营团队的公司。购买 MDR 或
              XDR 的决定由 CISO 推动，CISO 掌握安全运营预算；这笔预算往往是整体 IT 预算的子科目，也可能是单独批准的安全预算。平台用户包括 SOC 分析师、检测工程师和事件响应人员。付款方通常是企业 IT
              或安全预算负责人。最活跃的购买行业包括金融服务（CISO 面临 FFIEC、SOX 和 SEC 披露规则压力）、医疗（HIPAA 合规、安全人员有限）、零售（PCI DSS、高频数据泄露）、制造（OT/IT
              融合）和科技公司（复杂云原生环境）。员工数 5,000+ 的企业是价值最高的买方，因为合同规模大、容易形成多年承诺，对多供应商统一的需求也更强。高端中端市场（2,000–5,000
              名员工）带来最大数量机会，但平均合同价值较低。采用触发因素包括近期发生泄露或险些泄露、监管审计失败、安全职能负责人更换，或董事会要求提升网络安全态势。
