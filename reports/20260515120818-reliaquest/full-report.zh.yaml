              截至 2026 年 5 月，ReliaQuest 累计股权融资约 $830 million。已记录轮次包括：由 FTV Capital 领投、约 $30 million
              的早期风投支持融资（具体日期和条款未披露，只能定位在 2015–2016 年前后）；2020 年初由 KKR 领投、估值约 $1 billion 的 Series C（通过新闻稿披露）；2024 年 10 月由
