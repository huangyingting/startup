      - number: '8.4'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的情景分析必须面对一个基础证据约束：ARR、毛利率、NDR 和经营现金流全部未披露。因此，以下三个情景由三组输入构建：（1）把 MDR 行业增长率套用到 CB Insights 2021
              年约 ~$100 million ARR 估计后，三角推算出 $250–340 million ARR 区间；（2）2026 年企业网络安全 SaaS 公开可比公司的 ARR 倍数（CrowdStrike
              ~18–25x、SentinelOne ~8–12x、Rapid7 ~2–3x）；（3）MarketsAndMarkets 对 MDR 市场到 2031 年 24.8% CAGR
              的增长预测。乐观情景下，强企业扩张和 AI 驱动的平台增购推动 ReliaQuest 到 2028 年达到 $600–700 million ARR；作为 AI 原生 MDR 类别龙头，IPO 时获得
              18–22x ARR 倍数，对应 $10–14 billion 股权价值，即相对 Series D 的 3–4x 回报。基准情景下，2028 年 ARR 达到 $450–550 million，增长
              15–20%；IPO 按 10–12x ARR 定价，与 SentinelOne 先例一致，对应 $5–7 billion 股权价值，即相对 Series D 的 1.5–2x 回报，满足 PE
              最低门槛预期。悲观情景下，Microsoft 和 CrowdStrike 平台捆绑把 ARR 增速侵蚀至 8–12%；2028 年 ARR 仅达到 $350–450 million；随着 MDR 商品化，IPO
              倍数压缩至 6–8x，股权价值降至 $2.5–3.5 billion，KKR 以 $3.4 billion 进入的回报接近零甚至为负。各情景概率信号，以及估值对倍数压缩的敏感性，见下方乐观 / 基准 /
              悲观情景表、估值敏感性图和估值 / 回报区间图。
