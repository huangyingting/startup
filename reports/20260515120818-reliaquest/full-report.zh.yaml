      - number: '8.2'
        title: 投资建议、风险评级与估值立场
        blocks:
          - type: paragraph
            body: >-
              基于公开证据权重，ReliaQuest 的投资建议是条件买入，前提是验证三项内容：（1）正式资料室中的 ARR 和增长率，（2）净美元留存高于 110%，（3）毛利率画像符合企业 SaaS 基准（订阅毛利率
              65–75%）。如果无法完成这些验证，合适替代方案是继续研究，并设置 90 天期限：在做出是否推进决策前拿到管理层财务数据。风险评级为中高：MDR 市场顺风和 AI 差异化真实存在，但 Microsoft 和
              CrowdStrike 的平台捆绑威胁、未披露财务数据，以及溢价估值倍数（Series D 为估计 ARR 的 10–14x）共同构成无法排除的重大下行情景。估值立场是溢价但有条件合理：ReliaQuest 的
              $3.4 billion Series D 倍数高于传统 MDR 同行（Secureworks 约 ~1–2x ARR，Rapid7 约 ~2–3x ARR），与中游 AI-SaaS 平台（SentinelOne
              约 ~8–12x ARR）一致，但低于 CrowdStrike 的 AI 类别龙头溢价（18–25x ARR）。如果 ARR 验证确认 $300+ million 且维持 25%+ 增长，估值可以防守。如果
              ARR 低于 $200 million，或增长降至 15% 以下，当前估值隐含的倍数在 IPO 时很难维持。推荐摘要表固化了这些评级，投资 KPIs 图提供可直接用于 IC 的评分视图。
