              $500 million 融资。2025 年 3 月轮次的投后估值未正式披露；考虑到企业网络安全估值倍数扩张，且未出现下轮估值下调信号，$5–6 billion 的投后估值是合理区间。SEC Form D
              文件通过 EDGAR 搜索系统确认了投资轮次的存在和大致时间。资本结构的特点是 PE 赞助方集中（KKR 自 2020 年起，EQT 自 2025 年起），早期 VC（FTV
