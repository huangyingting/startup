appendices:
  - id: A
    title: 尽调清单与待解问题
    blocks:
      - type: list
        title: 关键数据室资料请求
        items:
          - 经审计或管理层审阅的财务报表：收入、ARR、毛利率、EBITDA（FY2022–FY2025）
          - 客户队列数据：ARR 留存、NRR、按获客年份划分的总流失率
          - 客户集中度分析：前十大客户 ARR 占总 ARR 的百分比
          - 包含所有投资人和管理层持股比例的股权结构表
          - Series D 和 PE-II 条款清单：清算优先权、反稀释条款、IPO 棘轮条款
          - 任何未偿还债务融资、信用额度或可转债
          - 完整高管薪酬和期权池明细
          - Universal Translator 专利的 IP 所有权确认
          - 重大合同：前 10 大客户 MSA 及到期日
          - 董事会构成文件，含所有独立董事履历
        claimRefs: []
      - type: paragraph
        title: IPO 与退出时间线评估
        body: >-
          CB Insights 在 2025 年 11 月的 Tech IPO Pipeline 2026 报告中纳入 ReliaQuest。2025 年 3 月 PE-II 轮融资 $500M 之后，未来 18–36
          个月最可能的退出路径有两条：(1) 登陆 NASDAQ，目标市值 $5–8B；(2) 被大型安全平台战略收购，例如 Palo Alto Networks、CrowdStrike 或超大规模云厂商。KKR 领投、估值
          $3.4B 的 Series D 轮，以及 EQT 参与 PE-II，说明机构投资方在为公开市场事件做准备。若网络安全估值倍数进一步压缩，或 IPO 时财务披露显示单位经济性弱于投资人预期，IPO
          破发或失利情景也可能出现。
        claimRefs:
          - CO019
          - CO020
