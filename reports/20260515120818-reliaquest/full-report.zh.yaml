  - id: TR001
    title: 监管 / 法律风险登记表
    columns:
      - 风险规则
      - 司法辖区
      - 状态
      - 可能性
      - 严重性
      - 缓释措施
      - 剩余敞口
      - 尽调路径
    rows:
      - - SEC 8-K Item 1.05 网络安全事件披露规则
        - 美国联邦
        - IPO 后适用；私营公司目前免于定期报告义务
        - 当前低；IPO 后中
        - 高
        - 事件响应基础设施强；6 个 SOC 中心提供检测能力；私营公司身份目前限制了正式义务
        - 公司上市后，一旦认定事件具有重大性，必须在 4 个工作日内披露；IR 流程不完整会带来 IPO 后的 SEC 责任
        - 确认事件响应政策是否及时更新；评估 SEC 披露合规的准备时间表；核实董事会层面的网络安全监督机制
      - - 面向欧盟金融业的 EU DORA ICT 第三方供应商义务
        - 欧盟及 EEA
        - 2025 年 1 月起生效；适用于服务欧盟金融机构的 ReliaQuest
        - 中
        - 高
        - 围绕 DORA 第 28 至 30 条 ICT 风险要求建立合同合规框架；客户协议纳入退出策略条款
        - 若 DORA 条款未嵌入客户合同，可能因合同不合规承担责任；面对欧盟金融业客户，可能需要重谈合同
        - 索取 DORA 合规差距评估；审查客户合同样本是否包含第 28 至 30 条条款；确认分包商 DORA 义务已覆盖
      - - SOC 运营中的 GDPR 欧盟和英国个人数据处理
        - 欧盟、EEA 及英国
        - 已生效；英国和阿联酋 SOC 中心处理欧盟和英国个人数据
        - 中
        - 高
        - 所有欧盟和英国企业客户均需签署数据处理协议（DPA）；跨境传输需采用标准合同条款（SCC）；英国 GDPR 附录覆盖脱欧后合规
        - 若 DPA 模板不完整，ICO 或欧盟 DPA 可能执法；若遥测数据在没有有效 SCC 的情况下传至美国分析中心，会触发次级处理方义务
        - 核实 DPA 模板完整性；确认 SCC 覆盖次级处理方；审查美国至欧盟遥测流的数据传输影响评估
      - - Form D 与 Regulation D 私募证券发行合规
        - 美国联邦
        - 已生效；多轮融资均已确认提交 Form D
        - 低
        - 中
        - SEC Form D 申报合规；经验丰富的证券律师管理发行豁免；KKR 和 EQT 作为机构投资者具备合规基础设施
        - 未来发行必须符合 Regulation D；任何一般性招揽都可能使豁免失效；必须持续保留合格投资者核验义务
        - 在 SEC EDGAR 审查 Form D 申报是否及时；确认所有融资均有对应申报；核实合格投资者文件留存做法
      - - NIST CSF 2.0，面向联邦和受监管企业客户的事实合规标准
        - 美国联邦及全企业范围
        - 已生效；美国联邦和受监管行业客户的事实要求
        - 低
        - 中
        - GreyMatter 平台映射到 NIST CSF 的 Identify、Protect、Detect、Respond、Recover 功能；年度威胁报告与 NIST 指引一致，体现框架意识
        - 若 NIST 对齐出现缺口，可能失去联邦或受监管行业合同；在评估 CSF 成熟度的联邦采购中，会遇到准入门槛
        - 获取 NIST CSF 2.0 对齐映射文件；确认 GreyMatter 认证或相对 CSF Tiers 的自评；核实是否满足联邦合同资格标准
      - - 日本、印度、阿联酋、澳大利亚数据义务下的多司法辖区 SOC 合规
        - 亚太、中东及澳大利亚
        - 新兴；当地数据保护法适用；具体义务尚未完全列举
        - 中
        - 中
        - 聘请当地法律顾问；为区域 SOC 运营提供数据驻留选项；按司法辖区调整合同 DPA 以适配当地法律
        - 若不符合日本 APPI、印度 DPDP Act、阿联酋 ADGM / DIFC 数据规则，可能产生合规问题；在尚未核实本地合规项目的市场，监管罚款构成未量化负债
        - 委托对日本、印度、阿联酋和澳大利亚做司法辖区专项法律审查；将当地数据法律映射到 ReliaQuest SOC 运营；确认存在数据驻留开关和本地 DPA 模板
    notes: >-
      可能性和严重性为定性评估，依据截至 2026 年 5 月公开可得的监管框架分析、SEC EDGAR 申报审查和行业基准。公开来源未确认 ReliaQuest 存在重大诉讼或执法行动。鉴于 ReliaQuest 在英国和欧盟运营
      SOC，且拥有欧盟金融业客户，DORA 和 GDPR 是当前严重性最高的有效义务。Form D
      申报历史确认其各轮融资均符合证券法要求。本登记表并不完整，因为仅凭公开来源，尚无法完全列举日本、印度、阿联酋和澳大利亚的司法辖区专项义务。
    enumerationScope:
      coverage: partial
      basis: >-
        Register covers six highest-priority regulatory and legal risk categories identified through SEC EDGAR Form D
        search, EUR-Lex DORA framework review, NIST CSF 2.0 publication, and SEC cybersecurity disclosure rules
        analysis. Additional jurisdiction-specific obligations for Japan APPI, India DPDP Act 2023, UAE ADGM DIFC data
        protection, and Australia Privacy Act exist but have not been fully confirmed from public disclosures about
        ReliaQuest compliance programs. IP and employment litigation searches returned no active proceedings confirming
        absence of material legal disputes.
