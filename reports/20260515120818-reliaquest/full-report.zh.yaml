      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 的核心运营风险内生于 MDR 商业模式：公司位于客户安全环境内部，拥有访问敏感遥测的特权权限，因此会成为攻击者的高价值目标；攻击者只要拿下一个点，就可能同时触达多个企业客户。若
              ReliaQuest 托管环境发生重大安全事件，品牌会遭遇生存级打击，并触发大规模客户流失，因为企业安全买家尤其不能容忍自身安全提供商被攻破。TrustRadius 评论提到对新 SOC
              员工分析师经验水平的担忧，说明 ReliaQuest 在 6 个全球 SOC 中心扩张人员时存在质量一致性风险。G2 和 Gartner
              评论整体确认其竞争能力，但也暴露导入复杂度和告警准确性担忧。GreyMatter 平台的 250+ 集成形成宽攻击面，每个集成点都可能成为漏洞；若某个被广泛使用的集成工具发生供应链受损，风险也可能传导进
              ReliaQuest 平台。AI 和自主 ML 驱动的告警分诊会带来误报和漏报风险。2025 Annual Threat Report
              显示公司持续投入威胁情报能力，可部分缓释风险。但分析师质量风险的缓释成熟度尚未通过独立审计验证；公司扩大全球员工规模后，这仍是残余风险。
