      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >-
              GreyMatter 的技术架构由四层构成：（1）遥测采集与标准化层，由 Universal Translator 驱动，把 250+ 第三方安全工具里的异构事件和告警数据翻译成标准
              schema，无需集中式日志转发；（2）检测层，结合基于 ML 的行为分析、规则检测逻辑和源端检测能力，在信号到达人类分析师前完成过滤和优先级排序；（3）智能体 AI 编排层，6 个具名 AI Teammates
              —— Alert Triage、Threat Investigation、Automated Response、Threat Hunting、Reporting、Compliance —— 运行 200+ 技能和
              400 个 AI 工具，降低分析师工作量；（4）共管 SOC 交付层，6 个全球运营中心提供人类分析师复核、升级和面向客户的响应动作。Open XDR 架构刻意保持厂商中立：Microsoft Sentinel
              或 CrowdStrike Falcon 靠自有数据锁定提取价值，而 GreyMatter 的 Universal Translator 让客户保留现有工具，同时对所有信号叠加 AI 驱动分析。客户把
              GreyMatter 嵌入完整厂商栈的 SOC 工作流后，切换成本就被拉高。源端检测能力让 ReliaQuest 直接查询既有工具环境，而不是把所有日志灌入中央 SIEM，因此降低数据外传成本和延迟。2025
              产品公告确认了智能体 AI 品牌重塑和 Teammate 能力扩展；March 2025 的 $500M 融资也明确有一部分投向 AI 产品。
