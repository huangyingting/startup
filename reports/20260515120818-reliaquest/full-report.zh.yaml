  - id: TI005
    title: 公开财务信息缺口表
    columns:
      - 信息缺口
      - 重要性原因
      - 重大性
      - 尽调问题
      - 缺失可能意味着什么
    rows:
      - - 经审计财务报表（利润表、资产负债表、现金流量表）
        - 没有经审计财务数据，就无法核验收入、利润率或现金状况；当前所有估计都由二级信号交叉推导
        - 关键
        - 索取过去 3 年经审计财务报表；如未经审计，索取由 Big 4 或可信机构审阅的管理账
        - 私营公司的标准做法；仅缺失本身不是红旗，但拒绝披露才是
      - - 年经常性收入（ARR）和增长率（2022–2025）
        - ARR 是核心估值驱动因素；没有披露 ARR，$3.4B–$5.6B 估值区间就无法锚定收入倍数
        - 关键
        - 索取 2022–2025 年逐年 ARR；对照 CB Insights 对 2021 年 $100M 的估计和 MDR 市场增长率做校验
        - 可能说明 ARR 增长已低于市场增速，从而削弱估值叙事
      - - 按收入来源拆分的毛利率（订阅 vs. PS）
        - 评估运营效率必须看毛利率；在共同管理 SOC 模式中，专业服务会实质拖累综合利润率
        - 高
        - 从管理账索取毛利率明细表；核验资本化开发成本与费用化研发的处理
        - 如果交付仍偏人力密集，SOC 人员成本可能高于行业常态
      - - 净美元留存率（NDR）/ 流失数据
        - NDR 是产品粘性和护城河耐久度最重要的单一指标；没有 NDR，切换成本主张无法验证
        - 高
        - 索取按年份队列划分的留存数据；对照任何已知未续约事件核验
        - NRR 低（低于 105%）意味着客户没有扩张，续约可能有风险
      - - 经营现金流和 EBITDA
        - 判断 $830M 融资是增长资本还是生存资本，必须看经营现金流和 EBITDA；这能区分高烧钱与接近盈利两种情景
        - 高
        - 索取 2023–2025 年 EBITDA 和 FCF；核验 2025 年 $500M 融资是为了增长，还是由现金需求驱动
        - 如果相对收入的负现金流很高，说明公司离盈利还远，并依赖 PE 持续支持
      - - 股权结构表和清算优先权结构
        - PE 占比高且清算优先权高的股权结构，即便以高估值 IPO，也可能让普通股股东回报很差
        - 中
        - 索取完整股权结构表，包括期权池、优先股堆叠和清算优先权瀑布
        - 多轮投资者权利修订可能意味着存在限制管理层灵活性的投资者控制条款
      - - 债务融资或授信额度
        - 未披露债务会提高总企业价值、降低股权价值；信贷契约也可能限制运营灵活性
        - 中
        - 直接询问是否存在任何债务、可转债或循环授信额度；索取任何契约合规证明
        - 未公开披露债务是预期基线；不能把没有披露解读为没有债务
    notes: 本表列出截至 May 2026 ReliaQuest 公开财务画像中的已知信息缺口。所有行都是公开来源不可得、必须在正式尽调中通过管理层直接披露或第三方数据室获取的项目。重大性评级反映作者对其影响投资决策程度的判断。
