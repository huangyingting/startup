      - number: '4.4'
        title: IPO 路径、估值框架与烧钱速度
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest 被视为 12–24 个月窗口内可信的 IPO 候选，原因包括资本结构、PE 赞助方所有权（KKR 和 EQT 的典型持有期均为 4–7 年），以及更广泛企业安全 IPO 环境。PE
              赞助方通常会以 2–4x 入场估值作为 IPO 目标估值，以实现目标回报。KKR 于 2024 年 10 月按约 $3.4 billion 估值投资；若 2026–2027 年 IPO 估值达到 $6–10
              billion，将对应 1.8–3x 已部署资本回报，符合 PE 赞助方对高增长企业 SaaS 的回报预期。CB Insights 2026 Tech IPO Pipeline 报告将 ReliaQuest
              列为潜在 IPO 候选。套用收入倍数估值框架：在估计 $250–350 million ARR 下，当前（2026 年）市场环境中的企业安全 SaaS 可比公司交易在 8–15x ARR，对应仅按收入估算的
              $2–5.25 billion 估值区间。不过，如果对 AI 差异化和品类领导力给予溢价（MDR 厂商如 CrowdStrike 交易在 20–30x ARR），只要收入处于估计区间高端且 AI
              定位得到验证，$6–10 billion 区间也可实现。烧钱速度未披露；2025 年 $500 million 融资很可能在估计每年 $100–200 million 现金消耗下提供 2–4
              年经营现金跑道，消耗主要来自 SOC 运营、AI 研发和销售扩张。不过，如果公司正接近经营盈利，实际烧钱速度可能明显更低。
