  - id: TV005
    title: 投资逻辑失效与否决触发项表
    columns:
      - 触发因素
      - 阈值 / 信号
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - ARR 增长放缓
        - 连续两个周期确认 ARR 同比增速低于 15%；或 Series D 时点 ARR 低于 $200M（意味着 Series D 倍数 >17x ARR）
        - 直接打穿财务轨迹支柱；意味着平台捆绑已经在替代增长；高溢价估值倍数难以自洽；基准情景坍缩到悲观情景
        - 下调至回避；要求管理层解释；启动二级市场定价分析，用现实退出倍数评估下行空间
      - - 净美元留存率（NDR）低于 105%
        - 确认 2023 年后任意 12 个月队列 NDR 低于 105%；或原始流失数据表明客户流失率 >10%
        - 打破切换成本和粘性护城河的说法；意味着平台捆绑或定价压力正在让客户缩减支出；基于扩张 ARR 支撑的高溢价倍数被削弱
        - 下调至持有；要求做队列深挖分析；用 100–105% 的基准情景 NDR 假设重新评估估值，而不是 110–120%
      - - Microsoft / CrowdStrike 免费 MDR 公告
        - Microsoft 宣布向 M365 E5 客户免费提供带共管 SOC 的 Copilot for Security；或 CrowdStrike 宣布 LogScale 合同客户可免费捆绑 Falcon Complete
        - 直接攻击最大买方群体中的独立 MDR 价值主张；定价权被侵蚀；ARR 增速滑向悲观情景轨迹；MDR 倍数压缩到 Rapid7 / Secureworks 区间
        - 立即下调至回避，等待管理层回应和客户留存数据；建模 24 个月内 20–30% ARR 流失情景；通知投资委员会投资逻辑失效事件
      - - 降价轮或困境融资
        - ReliaQuest 宣布融资估值低于 $3.4B；或二级市场交易显示市场标记低于 $2.5B；或战略买家以低于 $3B 的价格收购公司
        - 直接反驳 PE 赞助方的价值创造叙事；意味着烧钱速度、增长或竞争格局明显差于预期；清算优先权执行后，普通股权益很可能归零
        - 立即回避；若已持有则退出仓位；按火售倍数分析优先股堆叠和普通股回收率；保住本金
    notes: 否决触发项是可观察信号，若出现，本分析会从有条件买入转为持有或回避。阈值基于分析判断：一旦触及这些点，当前估值下的投资逻辑就难以支撑。它们不是机械交易信号，仍需人工结合语境判断。
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - ARR 与收入核验
        - 经审计或管理层审阅的 2022–2025 年 ARR，包含季度增长轨迹；与 CB Insights 对 2021 年 $100M 的估计交叉核对
        - 核心估值输入完全未经验证；没有确认 ARR 数字，就无法锚定 Series D 10–14x ARR 倍数；所有情景分析都依赖它
        - CFO 与 CEO；要求正式开放数据室；若公司拒绝，视为红旗，并调整为继续研究状态
      - - 净美元留存率（NDR）与流失数据
        - 按入组年份拆分的队列 NRR 数据（2020–2025）；原始流失率；来自增购和交叉销售的扩张 ARR；按层级拆分的客户数
        - NDR 是护城河耐久度和增长质量的核心指标；没有它，切换成本说法只是未经验证的断言
        - CFO 与客户成功负责人；在数据室中索取；与总客户数增长交叉核对
      - - 按收入流拆分的毛利率
        - 订阅与专业服务的毛利率明细；资本化软件开发成本与费用化 R&D；SOC 人员数量和全成本
        - 单位经济模型需要毛利率来评估运营效率；SOC 人员成本结构决定 AI 自动化未来能撬动多少杠杆
        - CFO；要求由四大审阅的管理账；用员工数据核验
      - - 股权结构表与清算优先权
        - 完整股权结构表，包括期权池规模、Series D 与 2025 年成长轮的清算优先权、反稀释条款、老股出售历史
        - PE 占比高、且有多轮优先股的股权结构，在不同 IPO 估值下可能让普通股结果相差很大；瀑布模型必须拿到这些数据
        - 法律顾问与 CFO；将股权结构表作为继续尽调的条件；聘请 M&A 律师审查优先权瀑布
      - - 烧钱速度与现金状况
        - 2024–2025 年季度现金消耗；2025 年 3 月 $500M 融资后的预计现金跑道；EBITDA 或经营现金流轨迹；如有债务工具也需披露
        - 18 个月内两轮大额融资（$800M）引出一个问题：资本是进攻性还是防御性；烧钱速度决定公司是在接近盈利，还是生存依赖 PE
        - CFO；要求季度董事会报告包；在三种情景下建模烧钱速度，并与两轮融资披露的资金用途交叉核对
    notes: 所有尽调问题都是标准正式数据室流程中，IPO 前或二级市场投资交易会提供的信息。条目按对估值判断的重要性排序。若缺少其中任何一项，都应视为红旗，必须先让管理层解释，再决定是否推进。
    claimRefs:
      - CV041
      - CV042
      - CV043
