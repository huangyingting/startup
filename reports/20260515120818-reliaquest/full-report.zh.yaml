  - id: TE003
    title: 技术 / 运营架构表
    columns:
      - 层级 / 组件
      - 角色
      - 关键依赖
      - 主要风险
    rows:
      - - Universal Translator（遥测标准化）
        - 解析并标准化来自 250+ 款集成工具的事件和告警架构，写入统一内部数据模型；在源端运行，无需集中日志转发
        - 与 250+ 个由供应商维护的连接器保持 API 兼容；供应商 API 稳定性和版本管理
        - 供应商 API 弃用或架构变更会打断集成；连接器维护负担随集成数量扩大
      - - 源端检测引擎
        - 在集成工具环境中实时发起查询并执行检测逻辑；避免把完整日志摄入中央 SIEM
        - 连接客户环境的网络能力；客户防火墙 / 代理放行名单；集成工具的 API 速率限制
        - 网络延迟或 API 限流会削弱实时检测能力；依赖第三方 API 的可用性
      - - 智能体 AI 编排层（6 个 AI Teammates）
        - 借助 200+ 智能体技能和 400+ AI 工具，自动跑检测、调查、响应、狩猎、报告和合规工作流
        - 底层 AI 模型基础设施（云 LLM 或自研模型）；推理所需计算基础设施；技能库维护
        - AI 模型幻觉或错误响应动作；模型依赖第三方 LLM 提供商；推理成本随规模上升
      - - 共同管理 SOC 交付（6 个全球中心）
        - 人工分析师复核、升级和面向客户的响应动作；Tampa FL、Las Vegas NV、Sandy UT、Dublin Ireland、London UK、Pune India 提供 24/7 覆盖
        - SOC 分析师人力（1,200 名员工）；运营流程；跨中心交接班
        - 分析师留任和成本上升；某一中心中断时存在地域集中风险；6 个中心之间质量一致性难守
      - - SaaS 平台基础设施
        - 面向客户 UI、API 和后端分析管线的云托管 GreyMatter 平台
        - 云基础设施提供商（AWS、Azure 或 GCP——未公开披露）；CDN 和可用性基础设施
        - 云提供商宕机风险；多租户数据隔离；无公开状态页可核验历史正常运行时间
      - - 集成连接器框架
        - 为 250+ 集成工具管理 API 连接、凭据保险库、集成健康监控和连接器更新
        - 第三方工具供应商维护稳定 API；客户凭据管理；集成认证测试
        - 集成失败会造成覆盖缺口；新工具版本需要更新连接器；新发布供应商 API 的认证可能滞后
      - - 威胁情报管线
        - 汇聚来自 1,300+ 企业客户环境、SOC 分析师发现和外部信息流的威胁情报；丰富检测和狩猎内容
        - 活跃客户群持续贡献数据；6 个 SOC 中心配备威胁研究人员
        - 情报质量取决于客户群广度和分析师专业能力；外部 TI 信息流来源未公开披露
    notes: 架构细节来自官方产品文档、解决方案页、集成页和媒体报道。内部基础设施细节（云提供商、具体 AI 模型、数据库架构）未公开披露。
