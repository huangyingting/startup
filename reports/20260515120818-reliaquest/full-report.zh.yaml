      - CR018
      - CR019
      - CR020
      - CR021
      - CR022
      - CR023
  - id: TR004
    title: 人才 / 执行风险登记表
    columns:
      - 角色或职能
      - 依赖或缺口
      - 可能性
      - 严重性
      - 缓释措施
      - 尽调路径
    rows:
      - - CEO Brian Murphy 共同创始人
        - 单一关键人物依赖；未发现公开接班计划；牵引客户关系、投资者信任和整个公司的战略方向
        - 低
        - 关键
        - 共同创始人股权持仓让长期激励一致；机构投资者监督提供治理托底；公司历史沉淀出强品牌身份
        - 确认管理层材料中是否存在接班计划；评估 CTO、CFO 和 COO 角色的领导梯队深度；审查高管留任和薪酬协议
      - - 核心工程与 AI / ML 团队
        - AI 自主检测能力是主要差异化点；关键工程师流失会威胁 GreyMatter 平台开发路线图的执行
        - 低-中
        - 高
        - 在网络安全工程人才市场提供有竞争力的薪酬；坦帕总部相较湾区同行生活成本更低；PE 资本支持留任方案
        - 索取工程领导组织架构图；评估近期融资轮带来的留任悬崖；确认股权刷新节奏和归属结构
      - - 分布在 6 个全球站点的 SOC 分析师人才
        - 分析师员工数在多元劳动力市场扩张后，质量一致性存在风险；TrustRadius 评论提到分析师经验不足，是当前服务质量风险
        - 中
        - 高
        - 全球 SOC 多元布局扩大人才池；AI 自动化降低分析师在重复任务上的负担；结构化培训和认证项目
        - 按 SOC 地点索取分析师 / 客户比和平均任期数据；审查新分析师招聘的培训认证标准；对标行业 MDR 分析师比例
      - - 销售与商业化领导层
        - 企业 MDR 销售周期长，依赖关系；高级销售领导流失会显著扰乱企业管线和渠道合作伙伴关系
        - 低-中
        - 中
        - KKR 和 EQT 网络提供商业化支持和被投公司引荐；来自 Gartner 和 Forrester 分析师覆盖的强品牌认知提升了 MDR 市场声量
        - 评估销售领导任期和管线覆盖率；审查数据室中的配额达成数据；确认渠道合作伙伴关系由高管层持有，而非单个销售代表持有
    notes: >-
      人才风险依据截至 2026 年 5 月的公开信息评估，包括招聘页面、评论平台和融资公告。CEO 依赖因其共同创始人角色且缺少公开接班计划，被评为关键严重性。SOC
      分析师质量被评为高严重性，因为它直接影响核心服务交付产品。工程和销售风险分别为高和中，二者都可由 PE 资本提供的竞争性留任和薪酬缓释。
