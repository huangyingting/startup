company:
  name: "ReliaQuest"

chapter:
  number: 6
  title: "Customers"
  summary: >-
    ReliaQuest serves 1,300+ enterprise customers across financial services, healthcare, retail,
    manufacturing, and government verticals — all large enterprises with no SMB exposure. Named
    production customers include Auto Club Group (ACG), APi Group, and multiple unnamed Fortune
    500-level accounts. Publicly claimed outcomes include 90%+ alert volume reduction, 35% TCO
    improvement, 182%+ detection increase, and <5-minute mean containment time. Customer
    satisfaction signals from TrustRadius and G2 are predominantly positive; the single identified
    adverse signal — freshness of some SOC analyst talent — reflects a staffing challenge common
    to co-managed MDR providers. Retention data (NRR, GRR, churn) is not publicly disclosed;
    multi-year contracts (2–3 year typical) and co-managed SOC integration create high switching
    costs. Top-customer concentration risk is unquantified and is the primary outstanding
    diligence ask.

sections:
  - id: customer-base-overview
    title: "Customer Base and Segmentation"
    body: >-
      ReliaQuest has publicly confirmed a customer base of 1,300+ enterprise organizations as
      of 2025, representing meaningful scale for a co-managed MDR/SOAR platform provider. The
      company exclusively targets large enterprises — no SMB or mid-market segment is served —
      with typical buyers being CISOs, CIOs, and VP-level security executives at organizations
      with complex, multi-tool security environments. Primary verticals include financial services
      (banking, insurance, and investment management), healthcare and life sciences, retail and
      consumer goods, manufacturing and critical infrastructure, and government/public sector.
      Channel distribution has not been publicly quantified, but the enterprise direct motion is
      dominant; a limited MSSP partner ecosystem exists for select geographies. Geographic
      concentration is US-heavy with expanding EMEA and APAC presence, supported by six global
      SOC centers. There are no disclosed customer count breakdowns by vertical, geography, or
      contract size; all segmentation in this chapter is inferred from publicly available case
      studies, solution marketing pages, and press releases. The large-enterprise-only focus
      implies high average contract values (estimated $500K–$1M+ ACV for anchor deployments)
      and relatively small absolute customer counts per unit of ARR compared to SMB-inclusive
      vendors — consistent with estimated $250–400M ARR from 1,300+ accounts.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-trajectory
    title: "Adoption and Deployment Trajectory"
    body: >-
      ReliaQuest's customer growth trajectory from the platform's inception to 1,300+ enterprise
      accounts in 2025 reflects consistent expansion in the MDR/SOAR market. The company reported
      1,000+ customers in earlier 2023 press materials; the 1,300+ figure appeared in 2024–2025
      funding announcements, implying roughly 30% growth over two years. The adoption funnel for
      GreyMatter begins with marketing-sourced enterprise leads (events, threat intelligence
      publications, analyst coverage), proceeds through a proof-of-concept evaluation period
      involving integration with the prospect's existing security tool stack, and concludes with
      a multi-year subscription contract and phased onboarding. The 250+ integration ecosystem
      is a key adoption accelerator: enterprises with existing SIEM, EDR, and SOAR investments
      can deploy GreyMatter as a co-managed overlay without displacing sunk-cost tooling.
      Claimed deployment outcomes — 90%+ alert volume reduction, 182%+ detection increase, and
      <5-minute mean containment time — function as quantified value propositions that shorten
      evaluation cycles. The $500M 2025 capital raise is directed partly toward international
      expansion (EMEA and APAC), which should accelerate customer count growth outside North
      America. No quarterly or annual customer count time series has been publicly disclosed,
      limiting trajectory analysis to endpoint-to-endpoint comparisons and directional statements
      from investor communications.
    claimRefs: [CU008, CU009, CU010, CU011, CU012, CU013]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: named-customer-proof
    title: "Named Customer Proof"
    body: >-
      ReliaQuest's public customer evidence is anchored by named testimonials from Auto Club
      Group (ACG) and APi Group, supplemented by named CISOs and IT leaders from additional
      unnamed enterprises. ACG's CISO, Gopal Padinjaruveetil, is quoted stating: "Could not be
      happier to have ReliaQuest as my partner in ACG's digital journey." ACG is a Fortune
      500-level insurance and auto club organization, representing a credible large-enterprise
      production deployment. APi Group, an industrial services company, is cited through its
      Information Security Lead Carl Lee as a confirmed MDR/SOC operations customer. Additional
      named references — Mike Novak (CISO VP) and Jay Wessland (CTO/VP Ops) — provide
      testimonials but the companies they represent are not named publicly. TrustRadius reviewers
      include a verified enterprise user who states "RQ's GreyMatter content has enriched our SOC
      experience," confirming production platform usage. G2 reviewers across multiple enterprise
      accounts provide further independent corroboration. All named deployments are positioned
      as production implementations; no pilot-only references are identified. Evidence quality
      is limited by the reliance on company-produced case studies and review platform excerpts;
      no third-party audit or independent outcome validation is available for quantified claims
      (90%+ alert reduction, 35% TCO improvement). The partial coverage of the named customer
      table — approximately 3 named public customers out of 1,300+ — means it cannot be assumed
      representative of the broader installation base.
    claimRefs: [CU014, CU015, CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: retention-durability
    title: "Retention and Durability"
    body: >-
      ReliaQuest does not publicly disclose Net Revenue Retention (NRR), Gross Revenue Retention
      (GRR), renewal rates, or cohort-level churn data. This is a material evidence gap common
      to private enterprise security companies. Structural retention signals are positive: multi-year
      contracts (typically 2–3 years) are standard, co-managed SOC integration creates operational
      dependency that raises switching costs, and the 250+ integration ecosystem embeds GreyMatter
      deeply into customer security tooling. Customer satisfaction proxies include TrustRadius and
      G2 reviews that are predominantly positive; the adverse signal from TrustRadius — "Some
      Analysts are relatively fresh to SOC" — reflects a staffing quality concern specific to the
      co-managed model. Gartner Peer Insights reviews provide additional enterprise-level
      satisfaction data. Industry benchmarks for enterprise MDR providers suggest NRR of 110–130%
      and GRR of 90–95% for platforms with high integration depth; ReliaQuest's multi-year
      contract structure and co-managed dependency profile are consistent with the upper end of
      this range, but independent verification is unavailable. The retention cohort figure in this
      chapter presents benchmark-derived estimates, clearly annotated as approximations, since
      actual ReliaQuest cohort data is not publicly available. The 1,300+ customer count growing
      to this level while maintaining a large-enterprise-only motion is itself a directional
      retention signal — rapid churn would prevent compounding customer-count growth.
    claimRefs: [CU021, CU022, CU023, CU024, CU025, CU026]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: expansion-concentration-risk
    title: "Expansion and Concentration Risk"
    body: >-
      ReliaQuest's expansion motion is driven by platform upsell within the GreyMatter ecosystem:
      customers that begin with MDR often add threat hunting, detection engineering, automated
      playbooks, and advanced analytics modules. The 250+ integration ecosystem creates natural
      land-and-expand vectors as new integrations are added and existing tool coverage deepens.
      The $500M 2025 funding round explicitly targets international expansion (EMEA and APAC),
      indicating geographic expansion as a primary growth lever beyond existing US penetration.
      Customer concentration risk is unquantified — ReliaQuest does not disclose top-customer
      ARR concentration or percentage of revenue from its top-10 or top-20 accounts. For a
      vendor with 1,300+ large-enterprise customers, a scenario where the top-10 accounts
      represent 20–30% of ARR is plausible and manageable; however, this is unverified.
      Channel/partner dependence is also undisclosed; direct enterprise sales appears dominant
      but MSSP partnerships exist. Procurement friction in the enterprise security buying cycle
      is material: typical sales cycles of 6–12 months and multi-year commitments create
      lumpy revenue recognition and pipeline forecasting challenges. There is no evidence of
      significant customer churn events, public contract terminations, or failed deployment
      incidents in any publicly accessible source as of May 2026 — though absence of evidence
      is not evidence of absence for a private company.
    claimRefs: [CU027, CU028, CU029, CU030, CU031, CU032, CU033]
    tableRefs: [TU005]
    figureRefs: []

