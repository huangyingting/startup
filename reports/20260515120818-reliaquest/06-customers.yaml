callouts:
  - calloutType: strength
    title: "1,300+ Enterprise Customers with Named Executive References"
    body: >-
      ReliaQuest's 1,300+ enterprise customer base, anchored by named CISO-level references at
      Auto Club Group and Information Security Lead references at APi Group, demonstrates real
      production adoption at the large-enterprise level. The consistent use of Fortune 500-adjacent
      and industrial enterprise references validates the company's ability to win and deploy in
      complex, high-stakes security environments.
    claimRefs: [CU001, CU014, CU015]

  - calloutType: strength
    title: "High Switching Cost Embedded in Co-Managed SOC Operations"
    body: >-
      GreyMatter's co-managed SOC model and 250+ integration ecosystem create structural switching
      costs that are operationally deeper than typical software subscriptions. Once a security team
      depends on ReliaQuest analysts co-managing their alert queue and the platform has learned
      their environment's tuned playbooks, replacement requires significant re-integration effort
      and organizational disruption — supporting multi-year retention durability even without
      disclosed NRR data.
    claimRefs: [CU022, CU023, CU027]

  - calloutType: risk
    title: "No Disclosed Retention Metrics and Opaque Customer Concentration"
    body: >-
      ReliaQuest has not disclosed NRR, GRR, churn rate, or top-customer concentration in any
      public source. For a vendor at this funding scale ($830M raised, $3.4B+ valuation), the
      absence of retention data is a material diligence gap. The concentration of named public
      references in a small number of accounts (ACG and APi Group) relative to 1,300+ total
      customers leaves top-customer ARR concentration unquantifiable from public sources.
    claimRefs: [CU024, CU025, CU031]

  - calloutType: risk
    title: "Adverse Signal: SOC Analyst Freshness Concerns"
    body: >-
      A TrustRadius reviewer noted that 'Some Analysts are relatively fresh to SOC,' identifying
      a potential service quality risk inherent in scaling a co-managed SOC model. If ReliaQuest
      is growing headcount faster than it can develop senior analyst expertise, service quality
      variability may erode customer satisfaction over time — a risk that could be amplified as
      the company scales internationally with new SOC centers.
    claimRefs: [CU034, CU035]

