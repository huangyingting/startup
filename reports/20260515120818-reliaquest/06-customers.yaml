  evidenceGaps:
    - id: EGU001
      type: missingMetric
      description: >-
        ReliaQuest has not disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR),
        annual renewal rate, or cohort-level churn data in any public source as of May 2026.
        Without these metrics, it is impossible to independently verify the retention durability
        thesis or distinguish expansion revenue from gross churn. NRR and GRR are the single most
        important customer diligence data points for a subscription-based enterprise MDR platform
        and should be the first management disclosure request in due diligence. Diligence teams
        should request NRR and GRR by cohort year and vertical, renewal rate by contract type,
        and top-10 churned account detail.
      relatedQuestionRefs:
        - QU007
        - QU008

    - id: EGU002
      type: enumerationCoverageGap
      description: >-
        The Named customer proof table covers five named or partially named customer entries from
        a total enterprise base of 1,300+, representing less than 0.5% of the total customer
        population. The partial coverage reflects commercial confidentiality constraints typical
        of enterprise security vendors with large-enterprise-only customer bases. The named
        customers that are public (ACG, APi Group) are biased toward customers who have agreed to
        serve as public references — likely the most satisfied and longest-tenure accounts —
        creating selection bias that overstates the typical customer experience. Diligence requires
        a minimum of 5–10 customer reference calls across verticals, contract vintages, and
        contract sizes to validate the outcome claims and retention posture for the broader
        customer base.
      relatedTableRefs:
        - TU003
      relatedQuestionRefs:
        - QU003
        - QU009
        - QU010

    - id: EGU003
      type: missingMetric
      description: >-
        Top-customer ARR concentration — the percentage of total ARR contributed by the top-10
        or top-20 enterprise accounts — has not been publicly disclosed by ReliaQuest. This is
        a critical concentration risk metric for a 1,300+ customer enterprise base where a small
        number of anchor accounts with $2M+ ACV could represent a disproportionate share of
        total ARR. Without this data, concentration risk cannot be assessed from public sources.
        Management should be asked to provide a revenue concentration waterfall (top-1, top-5,
