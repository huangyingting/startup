figures:
  - id: FU001
    title: "Customer journey map"
    type: journey-map
    description: >-
      End-to-end journey from enterprise buyer awareness through GreyMatter production deployment
      and platform expansion, mapping the ReliaQuest go-to-market motion for large-enterprise
      security operations buyers.
    claimRefs: [CU001, CU002, CU010, CU027]
    data:
      items:
        - label: "Awareness"
          actor: "CISO / VP Security"
          touchpoints: ["Gartner MDR Market Guide", "ReliaQuest Annual Threat Report", "Industry events (RSA, Black Hat)", "Peer referral"]
          emotion: "Concerned about SOC alert fatigue, coverage gaps, and fragmented tooling"
          painpoint: "High alert volume with low signal-to-noise; multiple point tools with no unified ops layer"
        - label: "Evaluation"
          actor: "Security Architect / SOC Manager"
          touchpoints: ["GreyMatter platform demo", "Integration catalog review (250+ tools)", "POC with live SIEM/EDR integrations"]
          emotion: "Cautious — assessing integration depth, co-managed analyst quality, and deployment risk"
          painpoint: "Concerns about replacing in-house SOC workflows and analyst handoff friction"
        - label: "Procurement"
          actor: "CISO + CFO + Procurement Team"
          touchpoints: ["Enterprise contract negotiation", "Reference calls (ACG CISO, APi Group Info Security Lead)", "Multi-year SLA review"]
          emotion: "Focused on 3-year TCO vs. in-house SOC cost; concerned about lock-in risk"
          painpoint: "Long procurement cycles; internal stakeholder alignment on co-managed vs. in-house model"
        - label: "Onboarding"
          actor: "IT Security Team / SOC Analysts"
          touchpoints: ["GreyMatter integration console", "ReliaQuest co-managed SOC onboarding", "Detection playbook configuration"]
          emotion: "Anxious about integration tuning; wants rapid time-to-value with minimal disruption"
          painpoint: "Tool integration setup and alert tuning period; co-managed handoff procedures"
        - label: "Expansion"
          actor: "CISO / Platform Owner"
          touchpoints: ["Customer Success Manager QBR", "New module demo (threat hunting, detection engineering)", "Contract renewal"]
          emotion: "Confident in platform value; open to adding modules and expanding deployment scope"
          painpoint: "Budget competition from other security investments; procurement lag for add-on modules"

