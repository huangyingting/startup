companyProfile:
  summary: "ReliaQuest is a private cybersecurity company headquartered in Tampa, Florida, founded in 2007 by Brian Murphy. Its flagship product, GreyMatter, is an agentic AI security operations platform that unifies detection, investigation, and response across an enterprise's entire security stack—including SIEM, EDR, cloud, network, email, and identity—without requiring data migration. The platform features a patented Universal Translator that normalizes telemetry from 250+ technology partners, six agentic AI Teammates, and 200+ agent skills. ReliaQuest pairs the platform with 24/7 managed SOC services across six global operating centers. With $830M raised and a $3.4B valuation established in October 2024, the company serves more than 1,300 enterprise customers with approximately 1,200 employees."
  foundedDate: "2007-01-01"
  founders:
    - name: "Brian Murphy"
      role: "Founder & CEO"
      background: "Founded ReliaQuest in 2007 in Tampa, FL; built the company from a managed services provider to a $3.4B+ agentic AI security platform over 18 years."
      claimRefs: [CO001, CO007]
  foundingLocation: "Tampa, Florida, USA"
  headquarters: "1001 Water Street, Suite 1900, Tampa, FL 33602, USA"
  productSummary: "GreyMatter Agentic AI Security Operations Platform – an Open XDR platform that ingests and normalizes security telemetry from any tool via the Universal Translator, then applies agentic AI (6 AI Teammates, 200+ agent skills) to detect, investigate, and contain threats. The company also provides managed SOC services through six global operating centers. Key claims: 90%+ alert volume reduction, <5-minute threat containment, 35% TCO improvement."
  customerFocus: "Large enterprises (Fortune 500 and large mid-market) with complex, multi-vendor security environments; primary verticals include financial services, healthcare, retail, and manufacturing; typical buyer is the CISO or VP of Security Operations."
  businessModel: "Recurring SaaS subscription fees for GreyMatter platform access, plus managed security operations service fees. The hybrid model (software + managed services) creates multi-year contract stickiness; customers integrate deeply with ReliaQuest's platform and analyst team, generating high switching costs."
  stage: "Private Equity – Late Stage / Pre-IPO"
  fundingStatus: "Most recent: $500M Private Equity-II round (March 31, 2025) from EQT, KKR, FTV Capital, Finback Investment Partners, and Ten Eleven Ventures. Prior: $300M Series D led by KKR at ~$3.4B valuation (October 2024). Total raised: ~$830M across 5 rounds since 2016."
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO003, CO004, CO005, CO013, CO015, CO020, CO021, CO022]
