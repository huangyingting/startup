      - type: paragraph
        title: "IPO and Exit Timeline Assessment"
        body: "CB Insights included ReliaQuest in its November 2025 Tech IPO Pipeline 2026 report. Given the March 2025 PE-II round at $500M, the most likely exit scenario within 18–36 months is either (1) an IPO on NASDAQ targeting a $5–8B market cap, or (2) a strategic acquisition by a large security platform (e.g., Palo Alto Networks, CrowdStrike, or a cloud hyperscaler). The KKR-led Series D at $3.4B and EQT's PE-II participation suggest institutional backers are positioning for a public market event. A busted IPO scenario is possible if cybersecurity multiples compress further or if financial disclosure at IPO reveals unit economics weaker than investors anticipate."
