callouts:
  - calloutType: strength
    title: "250+ Integrations and Universal Translator Create Durable Switching Costs"
    body: "GreyMatter's vendor-neutral Open XDR architecture with 250+ integrations and the patented Universal Translator is the platform's most defensible moat. Enterprise customers embed GreyMatter into their existing SOC workflows across their entire vendor stack; displacing GreyMatter requires reintegrating all security tools with a replacement. The breadth of integrations also exceeds most competitors (Arctic Wolf ~200+, Secureworks 150+) and the Universal Translator's at-source normalization eliminates the data egress cost that makes traditional SIEM deployments expensive."
    claimRefs: [CE002, CE003, CE017, CE029]

  - calloutType: strength
    title: "Agentic AI Teammates Represent a Genuine Architecture Evolution"
    body: "The March 2025 announcement of 6 agentic AI Teammates with 200+ skills and 400+ AI tools marks a meaningful product evolution from co-managed MDR (human + tool) toward autonomous SOC operations. This transition increases throughput per human analyst and could structurally reduce COGS per customer over time if AI can handle an increasing share of tier-1 and tier-2 analyst work. G2 and TrustRadius reviewer sentiment consistently highlights reduced analyst workload as a tangible outcome."
    claimRefs: [CE004, CE005, CE006, CE026, CE027]

  - calloutType: risk
    title: "AI Model Provenance and Architecture Are Undisclosed"
    body: "ReliaQuest does not disclose the AI model infrastructure underlying the 6 AI Teammates — whether proprietary models, fine-tuned open-source models, or third-party LLM API dependencies. If the AI layer depends on commodity foundation models (e.g., OpenAI GPT, Anthropic Claude, or Google Gemini APIs), competitors could replicate similar capabilities without the multi-year SOC data moat advantage. The absence of model disclosure is a material diligence gap for assessing the defensibility of the AI differentiation claim."
    claimRefs: [CE004, CE014, CE018, CE038]

  - calloutType: risk
    title: "SLA, Uptime, and Reliability Terms Are Not Publicly Disclosed"
    body: "ReliaQuest does not publish contractual SLA terms for MTTD, MTTR, platform uptime, or containment response time. The claimed sub-5-minute containment and 90%+ alert reduction are company-reported marketing metrics without independent audit. There is no public status page or incident history. Enterprise buyers should treat these as aspirational benchmarks and require contractually binding SLAs with measurement methodology and penalty provisions in any procurement."
    claimRefs: [CE009, CE012, CE028, CE040]

  - calloutType: insight
    title: "No Public Developer Surface Limits Ecosystem Expansion But Reduces Competitive Exposure"
    body: "ReliaQuest has no public GitHub repository, open-source projects, or developer-facing API documentation. This limits organic developer ecosystem expansion and makes it difficult to independently verify product velocity. However, it also means competitors cannot easily examine GreyMatter's API surface or reverse-engineer integration logic. The absence of a developer community is consistent with an enterprise sales motion that prioritizes managed service delivery over self-service adoption."
    claimRefs: [CE031, CE034]

