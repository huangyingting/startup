    summary: "End-to-end operational flow from security event generation in customer environments through GreyMatter AI processing, SOC analyst review, and customer-facing remediation action."
    data:
      nodes:
        - {id: n1, label: "Security Event Generated", description: "Alert or telemetry event generated by CrowdStrike, SentinelOne, Microsoft Defender, or one of 250+ integrated tools in customer environment"}
        - {id: n2, label: "Universal Translator Normalization", description: "At-source API query fetches event data; Universal Translator normalizes to unified schema without log egress to central SIEM"}
        - {id: n3, label: "Detection Engine Scoring", description: "ML analytics and rule-based detection classify event severity, map to MITRE ATT&CK, and enrich with threat intelligence; 90%+ of alerts suppressed as noise"}
        - {id: n4, label: "AI Teammate Alert Triage", description: "Alert Triage AI Teammate automatically deduplicates, prioritizes, and adds contextual enrichment for remaining high-fidelity alerts"}
        - {id: n5, label: "AI Teammate Automated Investigation", description: "Threat Investigation AI Teammate pivots IOCs across integrated environments, generates investigation timeline, and recommends response action"}
        - {id: n6, label: "SOC Analyst Review", description: "Human analyst at one of 6 global SOC centers reviews AI-generated investigation summary; applies judgment; escalates or approves response action"}
        - {id: n7, label: "Automated Response Execution", description: "Automated Response AI Teammate executes containment (isolate endpoint, block IP, disable account) via API integrations; sub-5-min containment claimed"}
        - {id: n8, label: "Customer Notification and Remediation", description: "CISO and security team notified via GreyMatter dashboard and email; remediation guidance and evidence generated for compliance and post-incident review"}
