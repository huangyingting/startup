  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "sla-reliability"
      missingEvidence: "Contractual SLA terms for MTTD, MTTR, and platform uptime — ReliaQuest does not publish SLAs, no public status page exists, and no third-party uptime audits are publicly available."
      whyItMatters: "Enterprise buyers entering multi-year contracts need binding SLA commitments with measurement methodology and penalty provisions; marketing metrics like '90% alert reduction' and 'sub-5-min containment' are insufficient for contract-level diligence."
      diligencePath: "Request contractual SLA terms directly from ReliaQuest during vendor evaluation; require a status page reference and incident history for the trailing 12 months; seek reference customers willing to attest to response time experience."
      relatedQuestionRefs: [QE008, QE019]

    - type: private-evidence-only
      severity: material
      topic: "ai-model-provenance"
      missingEvidence: "The AI model infrastructure underlying the 6 GreyMatter AI Teammates — including LLM providers (OpenAI, Anthropic, Google, or proprietary), training dataset, and model update cadence — is not publicly disclosed."
      whyItMatters: "If AI capabilities depend on commodity third-party LLM APIs, the differentiation is less defensible than if ReliaQuest trains proprietary models on its 1,300+ customer data moat. Model dependency risk (API deprecation, pricing changes, third-party outages) is also material."
      diligencePath: "Request AI architecture briefing from ReliaQuest CTO; clarify LLM dependencies, proprietary model components, and model governance procedures including hallucination mitigation for automated response actions."
      relatedQuestionRefs: [QE014]

    - type: missing-source
      severity: moderate
      topic: "patent-registration"
      missingEvidence: "The specific patent number, filing date, claims scope, and jurisdictions for the Universal Translator patent are not publicly disclosed; USPTO patent database searches for 'ReliaQuest' or 'Universal Translator' security operations did not surface a confirmed match."
      whyItMatters: "A registered patent provides meaningful IP protection for the normalization technology; if the patent claim is aspirational or pending rather than granted, competitors could develop similar normalization capabilities without licensing risk."
      diligencePath: "Request patent number(s) from ReliaQuest legal counsel; conduct USPTO patent database search; verify scope, claims, and remaining term; assess whether patent covers the normalization algorithm or only a specific implementation."
      relatedQuestionRefs: [QE010]

    - type: missing-source
      severity: moderate
      topic: "platform-reliability"
      missingEvidence: "No public status page, historical uptime record, incident log, or third-party reliability audit is available for the GreyMatter SaaS platform."
      whyItMatters: "For a 24/7 co-managed security operations platform, downtime is directly correlated with security risk to customers; enterprise buyers need demonstrable reliability history before committing to a critical security control dependency."
      diligencePath: "Request SOC 2 Type II report which should include availability trust service criteria; ask for trailing 12-month uptime statistics and incident root cause analysis; request reference conversations with production customers about experienced reliability."
      relatedQuestionRefs: [QE019]

    - type: missing-source
      severity: moderate
      topic: "developer-surface"
      missingEvidence: "ReliaQuest has no public GitHub repository, no developer documentation portal, and no open-source projects. Developer-signal sourceType is satisfied via G2 and TrustRadius practitioner reviews as the closest proxy, but no direct developer community signal (GitHub stars, API forum activity, npm/PyPI packages) exists."
      whyItMatters: "Absence of a developer surface limits organic ecosystem expansion and makes it difficult to independently verify product velocity, integration quality, or engineering team activity patterns."
      diligencePath: "Accept G2/TrustRadius reviews as practitioner proxy for developer signal; document absence of developer community as a structural characteristic of the enterprise-only sales motion rather than a product deficiency; verify integration quality through reference customer technical teams."
