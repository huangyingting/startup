        - {from: n3, to: n4, label: "High-fidelity alert queue"}
        - {from: n4, to: n5, label: "Prioritized alert with context"}
        - {from: n5, to: n6, label: "AI investigation report"}
        - {from: n6, to: n7, label: "Response approval / escalation"}
        - {from: n7, to: n8, label: "Containment confirmation"}
        - {from: n6, to: n8, label: "Direct customer notification (high-severity)"}
    claimRefs: [CE004, CE009, CE011, CE012, CE014, CE025, CE032]

