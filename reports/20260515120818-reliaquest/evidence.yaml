  - id: EGU002
    type: enumerationCoverageGap
    description: >-
      The Named customer proof table covers five named or partially named customer entries from a total enterprise base
      of 1,300+, representing less than 0.5% of the total customer population. The partial coverage reflects commercial
      confidentiality constraints typical of enterprise security vendors with large-enterprise-only customer bases. The
      named customers that are public (ACG, APi Group) are biased toward customers who have agreed to serve as public
      references — likely the most satisfied and longest-tenure accounts — creating selection bias that overstates the
      typical customer experience. Diligence requires a minimum of 5–10 customer reference calls across verticals,
      contract vintages, and contract sizes to validate the outcome claims and retention posture for the broader
      customer base.
