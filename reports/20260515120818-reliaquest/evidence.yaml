  - id: EGU001
    type: missingMetric
    description: >-
      ReliaQuest has not disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR), annual renewal rate, or
      cohort-level churn data in any public source as of May 2026. Without these metrics, it is impossible to
      independently verify the retention durability thesis or distinguish expansion revenue from gross churn. NRR and
      GRR are the single most important customer diligence data points for a subscription-based enterprise MDR platform
      and should be the first management disclosure request in due diligence. Diligence teams should request NRR and GRR
      by cohort year and vertical, renewal rate by contract type, and top-10 churned account detail.
