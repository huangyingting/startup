callouts:
  - calloutType: risk
    title: "Microsoft's Near-Zero-Cost SIEM+XDR Bundle Is the Structural Competitive Threat"
    body: "Microsoft Sentinel combined with Defender XDR is available to any enterprise on M365 E5 at effectively zero incremental cost within existing enterprise agreements. Given Microsoft's 65%+ enterprise penetration, this creates a persistent 'good enough' alternative that ReliaQuest must defeat in every competitive situation. While ReliaQuest wins on operational depth and vendor neutrality, the cost argument becomes increasingly difficult to sustain as Microsoft adds AI Copilot for Security and improves its managed service wrapper."
    claimRefs: [CP015, CP016]

  - calloutType: strength
    title: "Vendor Neutrality as a Structural Differentiation in Multi-Vendor Enterprises"
    body: "Large enterprises operate 30–70 security tools on average. ReliaQuest's Universal Translator—which normalizes telemetry from all security tools without requiring data migration—addresses a genuine multi-vendor integration problem that platform-centric vendors cannot solve without asking customers to replace their existing investments. This vendor-neutral position creates a distinct market niche as long as enterprises continue operating complex, multi-vendor security stacks."
    claimRefs: [CP003, CP022]

  - calloutType: insight
    title: "Secureworks Revenue Decline Is an Adverse Signal for Mid-Tier MDR"
    body: "Secureworks (NASDAQ: SCWX) has reported consistent revenue pressure in public filings, confirming that mid-tier MDR vendors without differentiated AI or vendor-neutral positioning face structural displacement by platform vendors. This is an adverse signal for the broader MDR category: scale and heritage do not prevent competitive pressure without continuous product differentiation."
    claimRefs: [CP010, CP026]

