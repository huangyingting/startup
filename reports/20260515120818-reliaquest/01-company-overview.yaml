company:
  name: "ReliaQuest"
chapter:
  number: 1
  title: "Company Overview"
  summary: "ReliaQuest is a Tampa-based cybersecurity company founded in 2007 by Brian Murphy that provides the GreyMatter agentic AI security operations platform for enterprises. The company has raised over $830M in total funding—including a $300M Series D at ~$3.4B valuation in October 2024 led by KKR and a $500M private equity round in March 2025—and serves more than 1,300 enterprise customers across six global operating centers with approximately 1,200 employees."

sections:
  - id: identity-and-business-model
    title: "Identity, Headquarters, and Business Model"
    body: "ReliaQuest is a privately held cybersecurity technology and services company headquartered at 1001 Water Street, Suite 1900, Tampa, Florida 33602. Founded in 2007 by Brian Murphy, who remains Founder and CEO, the company operates under the mission statement 'Make Security Possible.' Its core product, GreyMatter, is an agentic AI security operations platform that unifies detection, investigation, and response across an enterprise's entire security stack—including SIEM, EDR, cloud, network, email, and identity tools—without requiring data to be moved. ReliaQuest's business model combines SaaS software subscriptions with managed security operations services: customers access the GreyMatter platform alongside ReliaQuest's 24/7 security operations center (SOC) analysts. The company earns recurring revenue from multi-year platform subscriptions and associated managed service fees. ReliaQuest serves primarily large enterprises with complex, multi-vendor security environments, positioning itself as vendor-neutral: rather than replacing existing tools, GreyMatter integrates with more than 250 technology partners and normalizes telemetry through a patented Universal Translator. The company describes its approach as transforming security operations from reactive to predictive, using agentic AI personas with over 200 agent skills to automate Tier 1 and Tier 2 work."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: leadership-governance
    title: "Leadership, Governance, and Key-Person Considerations"
    body: "ReliaQuest is led by founder Brian Murphy as CEO, supported by a senior executive team that covers field operations, product, finance, technology, and people functions. Colin O'Connor serves as President of Field Operations; Brian Foster is President of Product and Technical Operations; Scott Dussault is CFO; and Joe Partlow is CTO. The company's board includes representatives from its primary investors: KKR, EQT, and FTV Capital hold board seats along with independent directors Dave Welsh, Mike Burkland, and others. Kara Wilson, a venture partner, is also listed as a board member. The leadership team is weighted toward operations and customer success, reflecting the company's managed-services heritage. A key-person risk exists in Brian Murphy: as founder and the visible embodiment of the 'mindset' culture, his departure would likely have significant impact on customer relationships and internal culture. The company has not disclosed succession plans. Laura Tanner serves as Chief People Officer, and Laurie Morylak as Chief Marketing Officer, indicating investment in both talent retention and market positioning. The company's six global operating centers (Tampa, Las Vegas, Sandy UT, Dublin, London, Pune) suggest a distributed leadership structure and regional operational resilience. ReliaQuest's leadership has been stable with no publicly disclosed senior departures in the 2024–2026 period based on available information."
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012]
    tableRefs: [TO002]

  - id: funding-history-investors
    title: "Funding History, Valuation, and Investors"
    body: "ReliaQuest has raised approximately $830M in total capital across multiple rounds. In 2016, the company raised an early growth equity round. In August 2020, it raised a private equity round. In December 2021, at a $1 billion valuation, the company completed an unattributed venture capital round (widely cited as Series C led by FTV Capital at a ~$1.2 billion valuation). In October 2024, ReliaQuest raised $300 million in a Series D round led by KKR at a valuation of approximately $3.4 billion—representing more than a 2.8x uplift from the 2021 valuation. On March 31, 2025, the company raised an additional $500M in a Private Equity-II round from a syndicate including EQT, FTV Capital, KKR, Finback Investment Partners, and Ten Eleven Ventures, bringing total capital raised to approximately $830M. CB Insights lists the most recent post-money valuation from March 2025. The company's existing investor base—combining growth equity (FTV Capital), buyout (KKR), and diversified PE (EQT)—signals broad institutional confidence. KKR's lead position in the Series D and continued participation in the 2025 round suggests KKR views ReliaQuest as a potential IPO or strategic M&A target. The IPO pipeline report from CB Insights (November 2025) listed ReliaQuest as a potential 2026 IPO candidate."
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO020]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: scale-metrics
    title: "Scale, Traction, and Key Metrics"
    body: "As of May 2026, ReliaQuest reports 1,200 teammates (employees) distributed across six global operating centers and more than 1,300 enterprise customers. The company's LinkedIn following of 57,792 and 1,077 employees visible on the platform are consistent with a mid-market enterprise company. In terms of declared performance metrics, the company claims 90%+ reduction in alert volume for customers, a 35% improvement in total cost of ownership, and over 182% improvement in threat detection capabilities. GreyMatter is said to contain threats in under 5 minutes—approximately 43 minutes faster than the average time attackers achieve lateral movement—which the company uses as a key competitive differentiator. Revenue figures are not publicly disclosed; CB Insights estimated 2021 revenue at approximately $100M, but this is likely understated as of 2025–2026 given the scale of customer growth and investment. The company's headquarters address at 1001 Water Street suggests a significant downtown Tampa facility. Employees across six operating centers—Tampa, Las Vegas, Sandy (Utah), Dublin (Ireland), London (UK), and Pune (India)—reflect both US domestic coverage and international expansion. All revenue, ARR, and detailed customer count metrics remain private and are not independently verified."
    claimRefs: [CO021, CO022, CO023, CO024, CO025, CO026, CO027]

  - id: milestones-timeline
    title: "Company Milestones and Chronology"
    body: "ReliaQuest was founded in 2007 in Tampa, Florida by Brian Murphy as an IT and cybersecurity services company. The company began as a managed services provider and gradually shifted toward a platform-centric model. In 2016, the company raised its first institutional growth equity round, funding early platform development. In 2020, the company raised a private equity round to accelerate its GreyMatter platform build-out. In December 2021, ReliaQuest raised a reported ~$300M+ at a $1.2 billion valuation (later cited as $1B by CB Insights), marking its emergence as a cybersecurity unicorn. In 2022, the company described the round as a Series C led by FTV Capital at ~$1.2B valuation. GreyMatter launched commercially as an Open XDR/agentic AI platform during 2022–2024, integrating with hundreds of technology partners. In October 2024, KKR led a $300M Series D at ~$3.4B valuation—the largest cybersecurity venture round in Tampa's history and one of the largest in MDR/XDR sector. In March 2025, EQT joined KKR, FTV Capital, Finback, and Ten Eleven Ventures in a $500M Private Equity-II round. The company rebranded GreyMatter as an 'Agentic AI Security Operations Platform' in 2025, repositioning from MDR/XDR messaging to AI-first identity. As of May 2026, the company operates in six countries with 1,200+ employees and 1,300+ customers. The CB Insights 2026 IPO pipeline report identified ReliaQuest as a potential public market candidate."
    claimRefs: [CO028, CO029, CO030, CO031, CO032, CO033, CO034, CO035]
    tableRefs: [TO004]
    figureRefs: [FO002]

