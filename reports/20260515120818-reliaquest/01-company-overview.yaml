callouts:
  - calloutType: strength
    title: "Vendor-Neutral Open XDR Model Creates Platform Lock-In"
    body: "ReliaQuest's Universal Translator and vendor-neutral approach allow it to integrate with any enterprise security stack, making GreyMatter a layer above existing tools rather than a replacement. This reduces procurement friction and increases switching costs as customers accumulate GreyMatter-specific detection logic and workflows."
    claimRefs: [CO005, CO006]

  - calloutType: risk
    title: "Founder Key-Person Concentration"
    body: "Brian Murphy's role as both cultural anchor and visible CEO creates meaningful key-person risk. The 'mindset' culture is explicitly tied to Murphy's personal leadership style; customers, employees, and investors may react negatively to any leadership transition."
    claimRefs: [CO007, CO011]

  - calloutType: insight
    title: "CB Insights 2026 IPO Pipeline Inclusion Signals Pre-IPO Stage"
    body: "CB Insights' November 2025 inclusion of ReliaQuest in the Tech IPO Pipeline 2026 report, combined with the $500M PE-II round in March 2025, suggests the company is preparing for a public market event within 12–24 months. The dual-track (IPO or strategic sale) is consistent with KKR's typical portfolio management approach."
    claimRefs: [CO019, CO020]

  - calloutType: assumption
    title: "Revenue and ARR Figures Are Unverified"
    body: "ReliaQuest does not disclose revenue. The CB Insights estimate of $100M (2021) is likely significantly understated given the company's 2024–2025 investment scale and growth. All revenue estimates in this report are inferred from comparable companies, funding multiples, and market positioning."
    claimRefs: [CO026]

