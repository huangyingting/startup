chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Headquarters, and Business Model
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest is a privately held cybersecurity technology and services company headquartered at 1001 Water
              Street, Suite 1900, Tampa, Florida 33602. Founded in 2007 by Brian Murphy, who remains Founder and CEO,
              the company operates under the mission statement 'Make Security Possible.' Its core product, GreyMatter,
              is an agentic AI security operations platform that unifies detection, investigation, and response across
              an enterprise's entire security stack—including SIEM, EDR, cloud, network, email, and identity
              tools—without requiring data to be moved. ReliaQuest's business model combines SaaS software subscriptions
              with managed security operations services: customers access the GreyMatter platform alongside ReliaQuest's
              24/7 security operations center (SOC) analysts. The company earns recurring revenue from multi-year
              platform subscriptions and associated managed service fees. ReliaQuest serves primarily large enterprises
              with complex, multi-vendor security environments, positioning itself as vendor-neutral: rather than
              replacing existing tools, GreyMatter integrates with more than 250 technology partners and normalizes
              telemetry through a patented Universal Translator. The company describes its approach as transforming
              security operations from reactive to predictive, using agentic AI personas with over 200 agent skills to
              automate Tier 1 and Tier 2 work.
