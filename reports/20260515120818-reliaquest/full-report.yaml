  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest generates revenue primarily through enterprise subscription contracts for its GreyMatter
              Security Operations Platform. The subscription is structured as a multi-year commitment (typically 2–3
              years) priced on a per-endpoint, per-user, or a platform-access basis depending on the deployment scope.
              The contract structure reflects standard enterprise SaaS recurring revenue dynamics with annual prepayment
              terms and renewal options. A secondary revenue stream includes professional services—onboarding, tuning,
              and integration services—that are delivered at implementation and during major platform expansions.
              Professional services revenue is non-recurring and materially smaller than subscription revenue. A third
              emerging stream is analytics and threat intelligence licensing: ReliaQuest offers threat research outputs
              (including the 2025 Annual Threat Report) that may be licensed separately or bundled into premium
              subscription tiers. The platform's 250+ integration ecosystem also creates an indirect revenue benefit:
              high integration breadth reduces churn risk and increases the perceived value of the platform without
              requiring an incremental charge per integration. ReliaQuest does not publicly disclose revenue, ARR, or
              revenue growth rates. The most recent published revenue estimate from CB Insights was approximately $100
              million ARR in 2021. At observed MDR industry growth rates of 25–30% CAGR and assuming reliaquest
              maintained or exceeded sector growth, ARR in 2025 would range from approximately $244 million (applying
              25% CAGR from 2021 base) to $341 million (applying 30% CAGR). This estimate is unverified; actual revenue
              may differ materially. Form D filings with the SEC confirm the investment rounds but do not disclose
              operating metrics.
