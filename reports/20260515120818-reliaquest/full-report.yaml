            body: >-
              Enterprise MDR providers with software-driven delivery typically achieve gross margins in the 65–75% range
              for the subscription component, with professional services margins in the 20–35% range. ReliaQuest's unit
              economics are not publicly disclosed; the following analysis is based on MDR industry benchmarks,
              comparable public companies (Secureworks, Rapid7), and observable cost drivers. The co-managed SOC model
              requires significant human capital investment across 6 global SOC centers. Personnel costs (security
              analysts, threat hunters, detection engineers) are the primary cost of goods sold item. At an estimated
              250+ analyst-level employees in delivery roles at a blended cost of $80–100K fully-loaded per analyst,
              personnel delivery cost ranges from $20M–$25M annually. This implies a break-even point that depends
              heavily on revenue base and headcount efficiency. Customer acquisition cost (CAC) is elevated by
              ReliaQuest's enterprise-direct sales motion: enterprise security deals typically require 6–12 months sales
              cycles, senior AE involvement, and proof-of-concept evaluation. CAC payback at enterprise-level ARR per
              customer ($500K–$1M+ estimated range for anchor accounts) would be measured in 12–18 months assuming
              3-year contract terms. Net Dollar Retention (NDR) is not disclosed. Enterprise MDR providers with strong
              platform adoption typically achieve NDR of 110–130%; analysts estimate ReliaQuest's NDR is in this range
              based on the multi-year contract structure and product expansion pattern. Customer lifetime value (LTV) is
              therefore materially high, but cannot be independently verified without access to cohort retention data.
