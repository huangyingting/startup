              exists in Brian Murphy: as founder and the visible embodiment of the 'mindset' culture, his departure
              would likely have significant impact on customer relationships and internal culture. The company has not
              disclosed succession plans. Laura Tanner serves as Chief People Officer, and Laurie Morylak as Chief
              Marketing Officer, indicating investment in both talent retention and market positioning. The company's
              six global operating centers (Tampa, Las Vegas, Sandy UT, Dublin, London, Pune) suggest a distributed
              leadership structure and regional operational resilience. ReliaQuest's leadership has been stable with no
              publicly disclosed senior departures in the 2024–2026 period based on available information.
