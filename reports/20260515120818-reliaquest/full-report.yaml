  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold / Signal
      - Transmission to Thesis
      - Action Implication
    rows:
      - - ARR growth deceleration
        - >-
          Confirmed ARR growth below 15% YoY for two consecutive periods; or ARR below $200M at Series D date (implying
          series D multiple >17x ARR)
        - >-
          Directly breaks the financial trajectory pillar; implies platform bundling is already displacing growth; makes
          premium valuation multiple indefensible; base case collapses toward bear
        - >-
          Downgrade to Avoid; require management explanation; initiate secondary market pricing analysis to assess
          downside at realistic exit multiples
      - - Net Dollar Retention below 105%
        - >-
          Confirmed NDR below 105% for any 12-month cohort post-2023; or raw churn data indicating >10% customer
          attrition
        - >-
          Breaks the switching cost and stickiness moat claim; implies platform bundling or pricing pressure is causing
          customers to reduce spend; undermines the premium multiple justified by expansion ARR
        - >-
          Downgrade to Hold; require deep-dive cohort analysis; reassess valuation using base-case NDR assumption of
          100–105% instead of 110–120%
      - - Microsoft / CrowdStrike free MDR announcement
        - >-
          Microsoft announces Copilot for Security with co-managed SOC at no incremental charge to M365 E5 customers; or
          CrowdStrike announces Falcon Complete as bundled at no extra charge for LogScale contract holders
        - >-
          Directly attacks the standalone MDR value proposition for the largest buyer segment; pricing power erodes; ARR
          growth decelerates to bear case trajectory; MDR multiple compresses toward Rapid7/Secureworks range
        - >-
          Immediate downgrade to Avoid pending management response and customer retention data; model 20–30% ARR churn
          scenario over 24 months; notify investment committee of thesis-break event
      - - Down-round or distressed financing
        - >-
          ReliaQuest announces a financing at a valuation below $3.4B; or secondary market transactions indicate a
          market mark below $2.5B; or a strategic buyer acquires the company at below $3B
        - >-
          Directly contradicts PE sponsor narrative of value creation; implies burn rate, growth, or competitive
          dynamics are materially worse than expected; common equity is likely zero after preference liquidation
        - >-
          Immediate avoid; exit position if held; analyze preference stack and common equity recovery rate at fire-sale
          multiples; preserve capital
    notes: >-
      Kill triggers represent observable signals that would cause this analysis to move from conditional buy to hold or
      avoid. Thresholds are based on analytical judgment about the point at which the investment thesis is no longer
      supportable at current valuations. These are not mechanical trading signals and require human judgment to
      interpret in context.
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - ARR and Revenue Verification
        - >-
          Audited or management-reviewed ARR for 2022–2025 including quarterly growth trajectory; reconciliation against
          CB Insights $100M 2021 estimate
        - >-
          Primary valuation input is entirely unverified; 10–14x ARR multiple at Series D cannot be anchored without a
          confirmed ARR figure; all scenario analysis depends on this
        - >-
          CFO and CEO; request formal data room access; if company declines, treat as a red flag and adjust to
          research-more status
      - - Net Dollar Retention and Churn Data
        - >-
          Cohort NRR data by vintage year (2020–2025); raw churn rate; expansion ARR from upsell and cross-sell;
          customer count by tier
        - >-
          NDR is the primary indicator of moat durability and growth quality; without it, switching cost claims are
          unverified assertions
        - CFO and Head of Customer Success; request in data room; cross-reference against total customer count growth
      - - Gross Margin by Revenue Stream
        - >-
          Gross margin schedule for subscription vs professional services; capitalized software development costs vs
          expensed R&D; SOC personnel headcount and fully-loaded cost
        - >-
          Unit economics require gross margin to assess operating efficiency; SOC personnel cost structure determines
          the AI automation leverage over time
        - CFO; request management accounts reviewed by Big 4; verify against headcount data
      - - Cap Table and Liquidation Preferences
        - >-
          Full cap table including option pool size, liquidation preferences on Series D and 2025 growth round,
          anti-dilution provisions, secondary sale history
        - >-
          PE-heavy cap tables with multiple tranches of preferred equity can result in materially different common
          equity outcomes at various IPO valuations; necessary for waterfall modeling
        - >-
          Legal counsel and CFO; require cap table as a condition of continued diligence; engage M&A counsel to review
          preference waterfall
      - - Burn Rate and Cash Position
        - >-
          Quarterly cash burn for 2024–2025; projected runway from $500M March 2025 raise; EBITDA or operating cash flow
          trajectory; debt facilities if any
        - >-
          Two large raises in 18 months ($800M) raise the question of whether capital is for offense or defense; burn
          rate determines whether company is approaching profitability or PE-dependent for survival
        - >-
          CFO; request quarterly board reporting package; model burn under three scenarios and cross-reference against
          stated use-of-proceeds for both rounds
    notes: >-
      All diligence asks represent information that would be provided in a standard formal data room process for a
      pre-IPO or secondary investment transaction. Items are ranked by materiality to the valuation judgment. The
      absence of any of these items should be treated as a red flag requiring explanation from management before
      proceeding.
    claimRefs:
      - CV041
      - CV042
      - CV043
