        - label: Security Breach via Managed SOC
          values:
            - Low-Medium
            - Critical
            - Partial; internal controls exist but no independent public audit confirmed
            - High; existential brand and ARR risk if multiple customer environments compromised simultaneously
        - label: CEO Brian Murphy Departure
          values:
            - Low
            - Critical
            - Low; no public succession plan identified as of May 2026
            - High; co-founder departure disrupts customer trust and strategic execution immediately
        - label: EU DORA and GDPR Regulatory Obligations
          values:
            - Active
