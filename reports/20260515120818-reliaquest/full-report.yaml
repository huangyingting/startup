              ReliaQuest is led by founder Brian Murphy as CEO, supported by a senior executive team that covers field
              operations, product, finance, technology, and people functions. Colin O'Connor serves as President of
              Field Operations; Brian Foster is President of Product and Technical Operations; Scott Dussault is CFO;
