      - number: '8.5'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >-
              Comparable analysis for ReliaQuest draws on three sets of reference points: public MDR/XDR companies with
              disclosed financials, private MDR peers with estimated or discussed valuations, and precedent M&A
              transactions in the managed security services and SIEM/MDR space. Among public comparables, CrowdStrike is
              the most instructive ceiling: trading at approximately $80–85 billion market capitalization in 2026
              against approximately $3.8 billion ARR implies a ~22x ARR multiple, achievable only by an AI-platform
              leader with proven land-and-expand mechanics and 85%+ gross margins. SentinelOne, trading at approximately
              $15–18 billion against approximately $900 million ARR (~9–11x ARR), is the closest structural analog:
              pure-play cloud security with co-managed SOC features. Palo Alto Networks at 10–12x ARR represents
              platform consolidation risk — a buyer who can receive bundled MDR services through a platform relationship
              rather than a standalone MDR subscription. Among public legacy MDR vendors, Rapid7 (~2–3x ARR, declining)
              and Secureworks (~1–2x ARR, declining) illustrate the commodity floor: co-managed SOC without AI
              differentiation is a lower-multiple business. Private peer comparables include Arctic Wolf (discussed
              valuation of $4–5 billion, consistent with peer MDR market sizing) and Deepwatch (estimated $800
              million–$1 billion, smaller scale). These comps collectively support a ReliaQuest valuation range of $4–8
              billion on public-market-entry evidence, with the upper bound achievable only with verified ARR growth
              above 25% and AI-platform pricing power demonstrated in NDR data. Precedent M&A — including IBM's
              QRadar/SIEM asset acquisition for approximately $2.2 billion and Microsoft's Mimecast integration —
              suggests strategic acquirer interest at $3–6 billion control premiums for security operations platforms.
              The Comparable valuation table presents the full comparable set with source-backed metrics, relevance
              rationale, and limitations.
            claimRefs:
