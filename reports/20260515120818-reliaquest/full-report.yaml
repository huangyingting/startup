        - label: SOC Analyst Quality Inconsistency
          values:
            - Medium
            - High
            - Partial; six-center diversification and AI automation provide partial mitigation
            - Medium-High; TrustRadius review confirms analyst freshness concern at growth scale
        - label: Financial Opacity and No Public ARR
