  - id: TV003
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Key Assumptions
      - Valuation / Return Logic
      - Key Risks
      - Probability Signal
    rows:
      - - Bull
        - >-
          ARR reaches $600–700M by 2028 at 25–30% CAGR; subscription gross margin 72–77%; NDR 120%+; AI-native platform
          positioning drives 18–22x ARR IPO multiple; MDR market maintains growth trajectory through 2028
        - >-
          Equity value at IPO: $10–14B; ~3–4x return from Series D $3.4B entry; EQT return of ~1.5–2x from estimated
          $5–7B entry; IPO on Nasdaq in 2027–2028 at CrowdStrike-adjacent valuation premium
        - >-
          Microsoft/CrowdStrike accelerate bundled MDR capability; AI commoditization compresses MDR multiples; interest
          rate environment suppresses high-multiple IPO appetite
        - >-
          Moderate (25–30% probability) — conditional on ARR verification above $400M, sustained growth, and AI moat
          proof
      - - Base
        - >-
          ARR reaches $450–550M by 2028 at 18–22% CAGR; gross margin 65–72%; NDR 110–118%; company maintains MDR
          category leadership but faces margin compression from competition; IPO at 10–12x ARR consistent with
          SentinelOne precedent
        - >-
          Equity value at IPO: $5–7B; ~1.5–2x return from Series D entry; meets minimum KKR hurdle; EQT marginally
          positive or neutral from estimated 2025 entry; IPO in 2027
        - >-
          ARR growth decelerates below 18%; platform vendors accelerate bundling; NDR falls below 110%; IPO window
          closes requiring additional private-market financing
        - >-
          Most likely (45–55% probability) — assumes current trajectory continues, ARR is in the $300–400M range, and
          MDR market executes near consensus growth
      - - Bear
        - >-
          ARR growth falls to 8–12% CAGR due to platform bundling displacement; ARR reaches $350–450M by 2028 but at
          declining margins; MDR multiple compresses to 6–8x ARR; IPO delayed or abandoned; down-round financing
          required
        - >-
          Equity value at exit: $2.5–3.5B; near-zero to negative return for KKR and EQT from combined $800M+ deployed;
          common shareholders have minimal upside after preference stack; secondary sale or M&A required at a discount
        - >-
          MDR market grows faster than expected; ReliaQuest AI differentiation proves durable; Microsoft/CrowdStrike
          bundling fails to displace enterprise co-managed SOC; strategic acquisition at premium rescues return
        - >-
          Lower probability (20–30%) — requires both MDR market headwind AND platform bundling acceleration
          simultaneously; considered a tail risk that warrants monitoring, not the base assumption
    notes: >-
      Probability signals are analytical estimates based on market dynamics and comparable precedent; they are not
      actuarial probabilities and should not be used as base rates without verification. Valuation ranges assume all
      three scenarios are modeled against an unverified ARR base. The actual return depends on confirmed ARR, preference
      stack, dilution from any future rounds, and IPO market conditions at exit.
    claimRefs:
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
  - id: TV004
    title: Comparable valuation table
    columns:
      - Comparable
      - Metric
      - Multiple / Valuation / Status
      - Relevance to ReliaQuest
      - Limitation
    enumerationScope:
      coverage: partial
      basis: >-
        Selected public MDR/XDR companies and private comparable peers identified through CB Insights, Crunchbase,
        Gartner, and public IR pages; coverage excludes all cybersecurity companies below $1B enterprise value or
        without verifiable revenue data; private-peer valuations are estimates from secondary market data and investor
        reports
    rows:
      - - CrowdStrike
        - ~$3.8B ARR (FY2025 reported); ~$83B market cap (2026)
        - ~22x ARR (market cap / estimated ARR)
        - >-
          Largest XDR/MDR comparable; AI-native platform; sets ceiling for AI-category MDR valuation premium; ReliaQuest
          bulls cite CrowdStrike parity as upside scenario
        - >-
          Not a pure-play MDR; platform breadth (endpoint, identity, cloud) far exceeds ReliaQuest; enterprise
          penetration and competitive positioning materially different; CrowdStrike's scale (10,000+ employees)
          incomparable
      - - SentinelOne
        - ~$900M ARR (FY2025 reported); ~$17B market cap (2026)
        - ~9–11x ARR
        - >-
          Closest structural analog: pure-play AI-native cloud security platform with co-managed SOC features; has faced
          margin pressure and growth deceleration — informative downside precedent
        - >-
          SOC service component less developed than ReliaQuest's co-managed model; customer profile skews more
          mid-market; does not operate global SOC centers at equivalent scale
      - - Palo Alto Networks
        - ~$10B ARR (FY2025 reported); ~$120B market cap (2026)
        - ~10–12x ARR
        - >-
          Represents the platform consolidation threat: XSIAM + MDR bundled into enterprise agreements at no incremental
          cost; pricing multiple confirms large platform players price ARR at 10–12x even at massive scale
        - >-
          Platform revenue mix (firewall, cloud, AI Ops) dilutes MDR-specific comparability; acquisition-driven growth
          distorts organic multiple; ReliaQuest is a target, not a peer, in Palo Alto's ecosystem
      - - Rapid7
        - ~$800M ARR (FY2025, approximate); ~$2.5B market cap (2026)
        - ~2.5–3x ARR (declining)
        - >-
          Legacy MDR peer: shows floor multiple for co-managed SOC without AI differentiation; declining multiple
          signals commoditization risk for non-AI MDR providers; useful bear-case anchor for ReliaQuest if growth
          decelerates
        - >-
          Rapid7 MDR is declining; integration/vulnerability management revenue distorts ARR mix; not AI-native; not a
          positive comparable — informative only as downside precedent
      - - Secureworks (SCWX)
        - ~$500M ARR (FY2025 approximate); ~$700M market cap (2026)
        - ~1–1.5x ARR (declining)
        - >-
          Extreme legacy floor: shows what MDR looks like without product differentiation or AI investment; useful as
          commodity-floor anchor for bear case multiple
        - >-
          Secureworks is in managed decline; not comparable for a growth scenario; acquisition or take-private risk
          limits trading comparability; owned by Dell at below-market multiples
      - - Arctic Wolf
        - Private; ~$4–5B discussed valuation (2022–2024 secondary data); ~$450M ARR estimated
        - ~9–11x ARR (inferred from discussed valuation)
        - >-
          Pure-play MDR peer at closest scale to ReliaQuest; demonstrates private-market appetite for AI-enhanced
          co-managed SOC at $4–5B; confirms ReliaQuest's Series D $3.4B was not an outlier for MDR pure-plays
        - >-
          No public financials; valuation is from secondary market data and investor reports only; Arctic Wolf has not
          disclosed a Series D equivalent; coverage is partial estimate only
      - - Deepwatch
        - Private; ~$800M–$1B estimated valuation; ~$100–150M ARR estimated
        - ~6–8x ARR (inferred from estimated valuation)
        - >-
          Pure-play MDR peer at earlier scale; demonstrates that smaller MDR platforms receive lower multiples
          confirming scale premium for ReliaQuest; useful for understanding market structure
        - >-
          Much smaller than ReliaQuest; limited public evidence; no disclosed financials; estimate quality is low;
          relevant primarily as a market-structure data point, not a direct comparable
    notes: >-
      All comparable data sourced from public IR filings (CrowdStrike, SentinelOne, Palo Alto, Rapid7), CB Insights,
      Crunchbase, and analyst market reports. Private company valuations (Arctic Wolf, Deepwatch) are estimates from
      secondary sources. ARR multiples are approximate and rounded. Market caps are approximate as of mid-2026 and
      subject to market movements. This table is a partial enumeration and does not represent all cybersecurity
      companies.
