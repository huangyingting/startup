    type: dag
    layout: wide
    summary: >-
      Risk transmission map illustrating how competitive, operational, and financial triggers cascade through
      ReliaQuest's business model. Competitive bundling by Microsoft is the primary upstream trigger feeding both
      win-rate pressure and pricing compression. SOC analyst quality gaps transmit directly into customer churn, which
      cascades into NRR compression and ultimately financial model stress. The map shows that customer churn and NRR
      compression are the central nodes where all major risk vectors converge, making them the single most important
      monitoring indicators for the investment thesis.
    claimRefs:
      - CR017
      - CR010
      - CR024
      - CR028
      - CR030
    data:
      nodes:
        - id: rt1
          label: Microsoft Bundling Defender Sentinel
          detail: M365 E3 and E5 includes MDR-adjacent capabilities at near-zero marginal cost
        - id: rt2
          label: CrowdStrike and Palo Alto Platformization
          detail: Native XDR and SIEM SOAR displaces ReliaQuest in single-vendor enterprise accounts
        - id: rt3
          label: SOC Analyst Quality Gaps
          detail: Freshness concerns at scale; inconsistency across six global SOC centers
        - id: rt4
          label: AI and ML Alert Accuracy Risk
          detail: False positives and false negatives erode analyst efficiency and customer trust
        - id: rt5
          label: Customer Win Rate Decline
          detail: Head-to-head losses to Microsoft or CrowdStrike reduce new ARR pipeline
        - id: rt6
          label: Customer Churn Existing Accounts
          detail: Service quality gaps or competitive displacement triggers cancellations at renewal
        - id: rt7
          label: NRR Compression
          detail: Churn and expansion slowdown reduces net revenue retention below growth target
        - id: rt8
          label: Valuation Pressure
          detail: NRR compression undermines 3.4 billion dollar valuation multiple and exit conditions
        - id: rt9
          label: PE Exit Timeline Stress
          detail: KKR and EQT hold period pressure forces IPO or M&A in adverse market conditions
        - id: rt10
          label: CEO or Key Person Departure
          detail: Leadership vacuum amplifies all downstream risks simultaneously
      edges:
        - from: rt1
          to: rt5
          label: Bundling reduces head-to-head win rates in Microsoft accounts
        - from: rt2
          to: rt5
          label: Native XDR disrupts pipeline in single-vendor enterprise accounts
        - from: rt1
          to: rt6
          label: Bundling enables at-renewal displacement of existing accounts
        - from: rt3
          to: rt6
          label: Analyst quality gaps drive churn in service-quality-sensitive accounts
        - from: rt4
          to: rt6
          label: Alert inaccuracy erodes confidence and triggers competitive evaluation
        - from: rt5
          to: rt7
          label: Lower new ARR reduces NRR numerator directly
        - from: rt6
          to: rt7
