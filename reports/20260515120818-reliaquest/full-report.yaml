  - id: TI005
    title: Public financial gaps table
    columns:
      - Information Gap
      - Why It Matters
      - Materiality
      - Diligence Ask
      - What Absence May Signal
    rows:
      - - Audited financial statements (income statement, balance sheet, cash flow)
        - >-
          Cannot verify revenue, margin, or cash position without audited financials; all current estimates are
          triangulated from secondary signals
        - Critical
        - >-
          Request last 3 years of audited financials; if not audited, request management accounts reviewed by a Big 4 or
          credible firm
        - Standard private company practice; absence alone is not a red flag, but resistance to disclosure is
      - - Annual Recurring Revenue (ARR) and growth rate (2022–2025)
        - >-
          Primary valuation driver; without disclosed ARR, the $3.4B–$5.6B valuation range cannot be anchored to a
          revenue multiple
        - Critical
        - >-
          Request ARR by year for 2022–2025; reconcile against CB Insights $100M 2021 estimate and MDR market growth
          rates
        - Could indicate ARR growth has slowed below market rate, which would weaken the valuation narrative
      - - Gross margin by revenue stream (subscription vs. PS)
        - >-
          Unit economics require gross margin to assess operating efficiency; professional services drag on blended
          margin is material in co-managed SOC models
        - High
        - Request gross margin schedule from management accounts; verify capitalized development costs vs. expensed R&D
        - SOC headcount cost may be higher than industry norm if human-heavy delivery has not been automated
      - - Net Dollar Retention (NDR) / churn data
        - >-
          NDR is the most important single indicator of product stickiness and moat durability; without it, switching
          cost claims are unverified
        - High
        - Request cohort retention data by vintage year; verify against any known non-renewal events
        - Low NRR (below 105%) would indicate customers are not expanding and may be at renewal risk
      - - Operating cash flow and EBITDA
        - >-
          Required to assess whether $830M raise represents growth capital or survival capital; differentiates high-burn
          from approaching-profitability scenarios
        - High
        - >-
          Request EBITDA and FCF for 2023–2025; verify whether 2025 $500M raise was growth-oriented or driven by cash
          needs
        - >-
          High negative cash flow relative to revenue would suggest the company is far from profitability and dependent
          on continued PE support
      - - Cap table and liquidation preference structure
        - >-
          PE-heavy cap table with high liquidation preferences can result in poor common shareholder outcomes even at a
          high-valuation IPO
        - Medium
        - Request full cap table including option pool, preferred stack, and liquidation preference waterfalls
        - Multiple investor rights amendments could signal investor control provisions that limit management flexibility
      - - Debt financing or credit facilities
        - >-
          Undisclosed debt would increase total enterprise value and reduce equity value; credit covenants could
          restrict operational flexibility
        - Medium
        - >-
          Ask directly whether any debt, convertible notes, or revolving credit facilities exist; request any covenant
          compliance certificates
        - >-
          No public disclosure of debt is the expected baseline; absence of disclosure should not be interpreted as
          absence of debt
    notes: >-
      This table enumerates known information gaps in ReliaQuest's public financial profile as of May 2026. All rows
      represent items that are not available in public sources and must be obtained through direct management disclosure
      or third-party data room access in a formal diligence process. Materiality ratings reflect the author's assessment
      of impact on investment decision-making.
