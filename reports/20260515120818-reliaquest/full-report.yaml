      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Exit readiness analysis for ReliaQuest is moderately positive: the company has PE sponsor alignment, a
              disclosed institutional cap table, a 2026 IPO pipeline designation from CB Insights, a large customer base
              providing ARR predictability, and a compelling AI narrative matching current public-market appetite for
              AI-native security platforms. The primary obstacles to exit execution are (1) the absence of audited
              financials or transparent operating metrics that would be required in an S-1 filing, (2) uncertainty about
              the preference stack's impact on common equity at various IPO valuations, and (3) competitive narrative
              risk from Microsoft and CrowdStrike's continued bundling expansion. The most likely exit path is an IPO on
              Nasdaq or NYSE, consistent with the PE sponsor mix and company scale; an M&A exit at full valuation
              requires a strategic buyer willing to pay $5–10 billion for a managed SOC platform, with Microsoft, Palo
              Alto Networks, and CrowdStrike the most credible strategic acquirers. A secondary sale at a modest
              discount to the last round mark is possible in a slower IPO environment, particularly for early investors
              (FTV Capital) with a longer hold period. The Thesis-break and kill triggers table identifies the specific
              observable signals that would move this analysis from conditional buy to hold or avoid, including ARR
              growth falling below 15%, NDR below 100%, a formal down-round in new financing, or Microsoft/CrowdStrike
              announcing a competing co-managed MDR product at no incremental charge. The Final diligence asks table
              enumerates the eight highest-priority information requests that a formal investment process must resolve
              before committing capital at the current valuation level.
            claimRefs:
              - CV037
              - CV038
              - CV039
              - CV040
              - CV041
