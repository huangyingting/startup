      - number: '2.3'
        title: Buyer Segmentation and Adoption Dynamics
        blocks:
          - type: paragraph
            body: >-
              The primary buyer for ReliaQuest's GreyMatter platform is the Chief Information Security Officer (CISO) or
              VP of Security at large enterprise organizations—typically companies with 2,000 or more employees, complex
              multi-vendor security stacks, and dedicated security operations teams. The decision to purchase MDR or XDR
              is driven by the CISO who controls the security operations budget, often as a sub-line of the overall IT
              budget or as a separately approved security budget. Users of the platform include SOC analysts, detection
              engineers, and incident responders. Payers are typically the corporate IT or security budget holders. The
              most active buying vertical segments include financial services (CISO pressure from FFIEC, SOX, and SEC
              disclosure rules), healthcare (HIPAA compliance, limited security staff), retail (PCI DSS, high breach
              frequency), manufacturing (OT/IT convergence), and technology companies (complex cloud-native
              environments). Enterprise organizations with 5,000+ employees represent the highest-value buyers due to
              large contract size, multi-year commitment potential, and greater need for multi-vendor unification. Upper
              mid-market (2,000–5,000 employees) represents the largest volume opportunity but at lower average contract
              values. Adoption triggers include a recent breach or near-miss event, regulatory audit failure, leadership
              change in the security function, or board-driven mandate for improved cyber posture.
            claimRefs:
