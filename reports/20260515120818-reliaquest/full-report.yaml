appendices:
  - id: A
    title: Diligence Checklist and Open Questions
    blocks:
      - type: list
        title: Critical Data Room Requests
        items:
          - 'Audited or management-reviewed financial statements: revenue, ARR, gross margin, EBITDA (FY2022–FY2025)'
          - 'Customer cohort data: ARR retention, NRR, gross churn by vintage'
          - 'Customer concentration analysis: top-10 customer ARR as % of total'
          - Cap table with ownership percentages for all investors and management
          - 'Series D and PE-II term sheets: liquidation preferences, anti-dilution provisions, IPO ratchets'
          - Any debt facilities, credit lines, or convertible notes outstanding
          - Full executive compensation and option pool details
          - IP ownership confirmation for Universal Translator patent
          - 'Material contracts: top 10 customer MSAs with expiration dates'
          - Board composition documentation with all independent director biographies
        claimRefs: []
      - type: paragraph
        title: IPO and Exit Timeline Assessment
        body: >-
          CB Insights included ReliaQuest in its November 2025 Tech IPO Pipeline 2026 report. Given the March 2025 PE-II
          round at $500M, the most likely exit scenario within 18–36 months is either (1) an IPO on NASDAQ targeting a
          $5–8B market cap, or (2) a strategic acquisition by a large security platform (e.g., Palo Alto Networks,
          CrowdStrike, or a cloud hyperscaler). The KKR-led Series D at $3.4B and EQT's PE-II participation suggest
          institutional backers are positioning for a public market event. A busted IPO scenario is possible if
          cybersecurity multiples compress further or if financial disclosure at IPO reveals unit economics weaker than
          investors anticipate.
        claimRefs:
          - CO019
          - CO020
