  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest operates at the intersection of three converging security market categories: managed detection
              and response (MDR), extended detection response (XDR), and AI-driven security operations center (SOC)
              automation. The core MDR market encompasses services that combine technology with round-the-clock human
              security expertise to detect, investigate, and respond to threats on behalf of enterprise customers. XDR
              platforms extend this by unifying telemetry across endpoint, cloud, network, email, and identity layers
              into a single detection fabric without requiring data migration. SOC automation uses AI agents and
              orchestration to handle repetitive analyst tasks such as alert triage, investigation workflows, and
              containment playbooks. ReliaQuest's GreyMatter platform spans all three categories: it functions as a
              managed service (MDR), integrates all security tools (XDR approach), and deploys agentic AI to automate
              the majority of Tier 1 and Tier 2 SOC work. Excluded from ReliaQuest's direct competitive scope are pure
              endpoint protection platforms, standalone firewalls, identity governance tools not associated with threat
              detection, and data loss prevention products. The status-quo alternative—an in-house SOC using native SIEM
              tools without a managed overlay—represents the most common competitive displacement target. The broader
              network security market ($84.5B in 2025 growing at 7.2% CAGR) provides market context but is not the
              direct sizing basis for ReliaQuest's TAM.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
          - type: table
            tableRef: TM001
            claimRefs:
