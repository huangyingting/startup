  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Risk heatmap plotting eight primary ReliaQuest risks across likelihood and severity dimensions with mitigation
      maturity and residual exposure noted. Security breach via managed SOC and CEO departure are Critical-severity
      risks despite low likelihood. Competitive bundling by Microsoft and CrowdStrike and SOC analyst quality gaps are
      High-severity Medium-likelihood risks requiring active monitoring. DORA and GDPR regulatory risks are
      High-severity and currently Active. Financial opacity and AI alert accuracy are Medium-High operational concerns.
      The heatmap confirms competitive displacement and key person risk as the two highest-priority thesis-break vectors
      for investment thesis monitoring purposes.
