  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest operates managed detection and response services across six global SOC centers in the US, UK,
              UAE, India, Australia, and Japan, creating a multi-jurisdiction regulatory surface that extends well
              beyond typical US-only cybersecurity companies. As an MDR provider that ingests and analyzes enterprise
              security telemetry, ReliaQuest must comply with the EU Digital Operational Resilience Act, effective
              January 2025, which imposes contractual resilience, incident-reporting, and exit-strategy obligations on
              ICT third-party providers serving EU financial institutions. GDPR applies to ReliaQuest's UK and UAE SOC
              operations that process EU and UK personal data on behalf of enterprise customers. SEC cybersecurity
              disclosure rules establish the standard against which any future ReliaQuest IPO would be measured, and
              private companies handling enterprise security data face similar incident-disclosure expectations from
              enterprise procurement teams. SEC Form D filings confirm ReliaQuest has conducted multiple private
              securities offerings under Regulation D exemptions, demonstrating regulatory compliance with US securities
              law across its fundraising history. NIST Cybersecurity Framework 2.0 creates de facto compliance
              expectations for US federal sector customers and regulated enterprises. No pending litigation or
              enforcement actions against ReliaQuest are confirmed in publicly available sources as of May 2026. The
              regulatory risk register is rated partial because detailed obligations for Japan, India, UAE, and
              Australia have not been fully enumerated from public sources alone.
            claimRefs:
              - CR001
