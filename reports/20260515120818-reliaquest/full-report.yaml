      platform is the central node that depends on cloud infrastructure, 250-plus third-party tool integrations, and SOC
      analyst talent to deliver services. KKR and EQT provide financial dependency. Enterprise customers are the revenue
      dependency. Microsoft, CrowdStrike, and Palo Alto Networks are simultaneously integration partners and competitive
      threats, creating bilateral dependency risk that is unique in the MDR market.
