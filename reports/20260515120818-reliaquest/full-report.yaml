              Finback, and Ten Eleven Ventures in a $500M Private Equity-II round. The company rebranded GreyMatter as
              an 'Agentic AI Security Operations Platform' in 2025, repositioning from MDR/XDR messaging to AI-first
              identity. As of May 2026, the company operates in six countries with 1,200+ employees and 1,300+
              customers. The CB Insights 2026 IPO pipeline report identified ReliaQuest as a potential public market
