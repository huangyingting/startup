      - number: '8.2'
        title: Recommendation, Risk Rating, and Valuation Stance
        blocks:
          - type: paragraph
            body: >-
              Based on the weight of public evidence, the investment recommendation for ReliaQuest is a conditional buy
              contingent on verification of the following: (1) ARR and growth rate from a formal data room, (2) net
              dollar retention above 110%, and (3) gross margin profile consistent with enterprise SaaS benchmarks
              (65–75% subscription gross margin). Without these verifications, the appropriate alternative is
              research-more with a 90-day deadline to access management financials before making a go/no-go decision.
              The risk rating is medium-high: the MDR market tailwind and AI differentiation are real, but the platform
              bundling threat from Microsoft and CrowdStrike, the absence of disclosed financials, and the premium
              valuation multiple (10–14x estimated ARR at Series D) all create material downside scenarios that cannot
              be ruled out. The valuation stance is premium-but-conditionally-justified: ReliaQuest's $3.4 billion
              Series D multiple is above legacy MDR peers (Secureworks at ~1–2x ARR, Rapid7 at ~2–3x ARR) and consistent
              with mid-tier AI-SaaS platforms (SentinelOne at ~8–12x ARR), but below CrowdStrike's AI-category-leader
              premium (18–25x ARR). If ARR verification confirms $300+ million with sustained 25%+ growth, the valuation
              is defensible. If ARR is below $200 million or growth has decelerated to below 15%, the current valuation
              implies a multiple that would be difficult to sustain at IPO. The Recommendation summary table codifies
              these ratings, and the Investment KPIs figure provides an IC-ready scoring view.
            claimRefs:
