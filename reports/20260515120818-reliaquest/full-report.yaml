            body: >-
              CrowdStrike (NASDAQ: CRWD) is the dominant endpoint detection and response vendor with a market
              capitalization of $63 billion+. CrowdStrike's Falcon platform has expanded well beyond endpoint to offer
              identity protection, cloud security, and co-managed SOC services. CrowdStrike Falcon Complete is its fully
              managed MDR service; Falcon OverWatch provides proactive threat hunting. CrowdStrike competes with
              ReliaQuest primarily when enterprise customers consider replacing native GreyMatter with a single-vendor
              Falcon-as-MSSP arrangement. Palo Alto Networks (NASDAQ: PANW) with a market cap exceeding $100 billion is
