      - number: '5.2'
        title: Technology Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >-
              GreyMatter's technical architecture is built around four principal layers: (1) a telemetry collection and
              normalization layer powered by the Universal Translator, which translates heterogeneous event and alert
              data from 250+ third-party security tools into a standardized schema without requiring centralized log
              forwarding; (2) a detection layer combining ML-based behavioral analytics, rule-based detection logic, and
              at-source detection capabilities that filter and prioritize signals before they reach a human analyst; (3)
              an agentic AI orchestration layer where 6 named AI Teammates — Alert Triage, Threat Investigation,
              Automated Response, Threat Hunting, Reporting, and Compliance — execute over 200 skills and 400 AI tools
              to reduce analyst workload; and (4) a co-managed SOC delivery layer providing human analyst review,
              escalation, and customer-facing response actions across all 6 global operating centers. The Open XDR
              architecture is intentionally vendor-neutral: unlike Microsoft Sentinel or CrowdStrike Falcon that extract
              value from proprietary data lock-in, GreyMatter's Universal Translator enables customers to keep existing
              tooling while adding AI-driven analysis across all signals. This architecture creates a durable switching
              cost because customers embed GreyMatter into their SOC workflows across their full vendor stack. The
              at-source detection capability allows ReliaQuest to query existing tool environments directly rather than
              ingesting all logs into a central SIEM, which reduces data egress costs and latency. The 2025 product
              announcement confirmed the agentic AI rebranding and expansion of Teammate capabilities, with the $500M
              March 2025 capital raise explicitly attributed in part to AI product investment.
