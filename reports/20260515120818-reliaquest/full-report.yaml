  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Overview and Product Definition
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest GreyMatter is a Security Operations Platform that provides enterprises with co-managed threat
              detection, investigation, and response capabilities at scale. The product is positioned as an Agentic AI
              Security Operations Platform built on an Open XDR (Extended Detection and Response) architectural
              philosophy, meaning it aggregates and normalizes telemetry from a customer's existing security tools
              rather than requiring full stack replacement. The customer value proposition is delivered in the context
              of the CISO's operational workflow: security teams receive unified visibility across endpoint, cloud,
              network, identity, and application domains without ripping out existing vendor investments in CrowdStrike,
              SentinelOne, Microsoft Defender, Palo Alto Networks, or Splunk. The GreyMatter platform comprises five
              primary functional modules — Detect, Respond, Hunt, Automate, and Identify — each targeting a specific
              step in the SOC operational cycle. These modules are accessed via a unified SaaS interface and are backed
              by ReliaQuest's 1,200-person workforce including 6 global 24/7 SOC centers in Tampa FL, Las Vegas NV,
              Sandy UT, Dublin Ireland, London UK, and Pune India. The platform serves 1,300+ enterprise customers,
              primarily in regulated industries including financial services, healthcare, and critical infrastructure.
              The product is not available to SMBs or mid-market buyers; minimum deployment scope implies
              multi-thousand-endpoint environments. Customer-facing outcomes are quantified by ReliaQuest at 90%+ alert
              volume reduction, 35% total cost of ownership (TCO) improvement, 182%+ detection increase, and less than
              5-minute mean time to contain threats. These metrics are company-reported and partially corroborated by G2
              and TrustRadius reviewer sentiment, though independently audited benchmarks are not publicly available.
