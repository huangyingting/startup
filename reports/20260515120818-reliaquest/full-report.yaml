            body: >-
              ReliaQuest was founded in 2007 in Tampa, Florida by Brian Murphy as an IT and cybersecurity services
              company. The company began as a managed services provider and gradually shifted toward a platform-centric
              model. In 2016, the company raised its first institutional growth equity round, funding early platform
              development. In 2020, the company raised a private equity round to accelerate its GreyMatter platform
              build-out. In December 2021, ReliaQuest raised a reported ~$300M+ at a $1.2 billion valuation (later cited
