      - number: '8.3'
        title: Current Financing Context and Entry Discipline
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest's capital structure as of May 2026 is dominated by institutional PE investors: KKR (Series D
              lead, October 2024, $300 million at $3.4 billion post-money valuation, confirmed by SEC EDGAR Form D
              filings and multiple independent press sources including TechCrunch, BusinessWire, and SecurityWeek) and
              EQT Private Equity (March 2025 growth round lead, $500 million, valuation undisclosed). FTV Capital, the
              early investor since approximately 2014–2016, retains a position confirmed by its co-investor
              participation in both rounds. Total confirmed capital raised is approximately $830 million. The March 2025
              round did not disclose a post-money valuation; consistent with typical PE growth-round pricing at 1.3–2x
              the prior valuation, the implied range is $4.5–7 billion. Entry discipline at the current stage requires
              accounting for dilution from the PE preference stack. KKR and EQT hold preferred equity with typical
              liquidation preferences; at an IPO valuation below $5 billion, common shareholder economics deteriorate
              materially depending on the preference terms. Diligence teams must model the cap table waterfall before
              committing to a target return. The absence of disclosed convertible notes or debt facilities reduces the
              complexity of the preference waterfall analysis, but the cap table itself remains undisclosed. Secondary
              market participation (acquiring existing preferred or common from early employees or FTV Capital) may be
              available at a discount to the last round valuation in a slower-than-expected IPO environment. The CB
              Insights 2026 Tech IPO Pipeline Scouting Report lists ReliaQuest as a candidate for public market entry
              within a 12–24 month horizon, consistent with PE sponsor hold-period objectives for both KKR (entering at
              $3.4 billion in 2024) and EQT (entering at an estimated $5–7 billion equivalent in 2025).
            claimRefs:
              - CV016
