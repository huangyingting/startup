      - number: '3.5'
        title: Moat Durability and Competitive Risk Assessment
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest's competitive moat rests on four pillars: (1) switching costs from accumulated
              customer-specific detection logic, tuned use cases, and integrated workflows that are hard to migrate; (2)
              the patented Universal Translator enabling vendor-neutral telemetry normalization across 250+ tools; (3)
              18+ years of enterprise SOC operational depth and threat intelligence accumulation; and (4) a pre-IPO
              capital position (~$830M raised) that funds continued AI R&D and integration development. The durability
              of these moats faces two primary threats. First, platform commoditization: as CrowdStrike, Palo Alto, and
              Microsoft continue to bundle more MDR-like capabilities at no additional cost, the 'augmentation over
              replacement' value proposition weakens. Second, AI commoditization: the agentic AI differentiation is
              time-limited if open-source or platform-native AI agents can replicate GreyMatter's 200+ agent skills at
              lower cost. The switching cost moat is real but asymmetric—it protects existing customers but raises
              friction for new customer acquisition when platform vendors offer migration incentives. An adverse signal
              in the competitive landscape is Secureworks' revenue contraction (disclosed in public filings), which
              suggests that mid-tier MDR vendors face structural pressure that could eventually affect all pure-play MDR
              providers unless they differentiate on AI and platform capabilities.
