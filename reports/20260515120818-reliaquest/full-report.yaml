      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >-
              The primary MDR market segment—ReliaQuest's core category—is sized at $6.28 billion in 2026 by
              MarketsAndMarkets, growing to $19.01 billion by 2031 at a 24.8% compound annual growth rate. This growth
              rate makes MDR one of the fastest-growing segments of the broader cybersecurity market. The adjacent SIEM
              market is sized at $8.39 billion in 2026 growing to $13.67 billion by 2031 at 10.3% CAGR, representing an
              important adjacent opportunity given GreyMatter's ability to layer over or displace traditional SIEM
              deployments. The XDR market is estimated at approximately $1.5–3 billion in 2026 by multiple analysts,
              with projections ranging from $10–15 billion by 2028–2030 as enterprises consolidate detection functions.
              Combining MDR core, XDR, and SOC automation adjacencies, ReliaQuest's total addressable market is
              estimated at $10–15 billion in 2026. The serviceable addressable market (SAM) for ReliaQuest—focused on
              large enterprise organizations with 2,000+ employees that require integrated multi-vendor environments—is
              estimated at $3–6 billion in 2026. The serviceable obtainable market (SOM), reflecting ReliaQuest's
              current scale and brand recognition at 1,300+ enterprise customers and approximately $200–400 million
              estimated ARR, represents approximately $0.5–1.5 billion depending on market share assumptions.
              Significant evidence gaps exist in the SOM and SAM figures, as these are analyst-inferred ranges, not
              publicly reported company data.
