      - number: '8.4'
        title: Bull, Base, and Bear Case Scenarios
        blocks:
          - type: paragraph
            body: >-
              Scenario analysis for ReliaQuest must grapple with a fundamental evidence constraint: ARR, gross margin,
              NDR, and operating cash flow are all undisclosed. Consequently, the three scenarios below are constructed
              from: (1) the triangulated ARR range of $250–340 million estimated by applying MDR sector growth rates to
              the CB Insights 2021 estimate of ~$100 million ARR; (2) public comparable ARR multiples for enterprise
              cybersecurity SaaS in 2026 (CrowdStrike ~18–25x, SentinelOne ~8–12x, Rapid7 ~2–3x); and (3)
              MarketsAndMarkets' MDR market growth forecast of 24.8% CAGR through 2031. In the bull case, ReliaQuest
              reaches $600–700 million ARR by 2028 driven by strong enterprise expansion and AI-led platform upsell,
              commands a 18–22x ARR multiple at IPO as the AI-native MDR category leader, and delivers an equity value
              of $10–14 billion — a 3–4x return from the Series D. In the base case, ARR reaches $450–550 million by
              2028 with 15–20% growth, the company prices at 10–12x ARR at IPO consistent with SentinelOne precedent,
              and delivers a $5–7 billion equity value — a 1.5–2x return from Series D, meeting minimum PE hurdle
              expectations. In the bear case, platform bundling by Microsoft and CrowdStrike erodes ARR growth to 8–12%,
              ARR reaches only $350–450 million by 2028, the IPO multiple compresses to 6–8x as MDR commoditizes, and
              equity value falls to $2.5–3.5 billion — a near-zero to negative return for KKR at its $3.4 billion entry.
              The probability signals for each scenario and the valuation sensitivity to multiple compression are
              presented in the Bull / base / bear scenario table, Valuation sensitivity figure, and Valuation / return
              range figure below.
