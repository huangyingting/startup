      - number: '7.2'
        title: Operational and Security Risks
        blocks:
          - type: paragraph
            body: >-
              ReliaQuest's core operational risk is inherent to its MDR business model: the company sits inside
              customers' security environments with privileged access to sensitive telemetry, making it a high-value
              target for adversaries seeking a single-point compromise to access multiple enterprise customers
              simultaneously. A material security incident within ReliaQuest's managed environment would cause
              existential brand damage and mass customer churn, as enterprise security buyers uniquely cannot tolerate a
              breach by their security provider. TrustRadius reviews note concerns about analyst experience levels among
              newer SOC staff, suggesting a quality-consistency risk as ReliaQuest scales headcount across six global
              SOC centers. G2 and Gartner reviews generally confirm competitive capabilities but also surface concerns
              about onboarding complexity and alert fidelity. The GreyMatter platform's 250-plus integrations create a
              broad attack surface where each integration point is a potential vulnerability, and a supply-chain
              compromise in a widely used integrated tool could propagate into ReliaQuest's platform. AI and autonomous
              ML-driven alert triage introduces false-positive and false-negative risks. The 2025 Annual Threat Report
              demonstrates active investment in threat intelligence capability as a partial mitigation. Mitigation
              maturity for analyst quality risk remains unvalidated through independent audit, representing a residual
              risk as the company scales its global workforce.
            claimRefs:
