callouts:
  - calloutType: risk
    title: "Complete Absence of Audited Financials Is the Core Financial Risk"
    body: "ReliaQuest is a private company with no obligation to disclose financial statements. Despite raising $830M in two rounds over 18 months, the company has disclosed zero operating metrics: no ARR, no growth rate, no margin profile, no burn rate. This is not unusual for a PE-backed growth company pre-IPO, but it makes all financial estimates in this chapter unverifiable extrapolations. Any investment decision must be conditioned on receiving audited financials under formal data room procedures."
    claimRefs: [CI022, CI023]

  - calloutType: strength
    title: "$830M Capital Position Provides Multi-Year Competitive Runway"
    body: "The combination of $300M in October 2024 and $500M in March 2025 creates a substantial capital position that funds continued AI R&D, international expansion, and competitive response to platform vendor bundling. At an estimated $100–200M annual cash burn associated with SOC operations and growth investment, the 2025 raise alone provides approximately 2–4 years of operating runway. This capital advantage is meaningful in the context of a competitive market where smaller MDR vendors lack the capital to invest in AI at comparable scale."
    claimRefs: [CI013, CI014, CI015, CI016]

  - calloutType: risk
    title: "Two Raises in 18 Months May Signal Higher-Than-Expected Burn"
    body: "ReliaQuest raised $300M in October 2024 and $500M in March 2025—two large rounds within 18 months totaling $800M. While the stated rationale for both rounds was growth capital (AI investment and international expansion), the frequency of large raises could also be consistent with higher-than-expected cash consumption. This is an adverse signal that warrants direct investigation of cash burn rate and EBITDA trajectory in any formal diligence process."
    claimRefs: [CI015, CI016, CI022]

