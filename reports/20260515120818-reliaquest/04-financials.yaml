company:
  name: "ReliaQuest"
chapter:
  number: 4
  title: "Financials"
  summary: "ReliaQuest has raised approximately $830 million in total equity capital across at least four funding rounds, most recently a $500 million financing in March 2025 led by EQT and joined by existing investor KKR and early investor FTV Capital. The company's latest disclosed valuation was $3.4 billion at the October 2024 Series D; the March 2025 raise did not publish a new valuation, though secondary signals suggest it may exceed $5 billion on a post-money basis. Revenue is private and undisclosed; CB Insights estimated approximately $100 million ARR in 2021, and at observed MDR growth rates of 25–30%, analysts estimate $250–400 million ARR in 2025. Unit economics are characteristic of enterprise SaaS: high gross margins (estimated 65–75%), low net dollar churn, and multi-year contracts with renewal. Capital intensity reflects the co-managed SOC model (6 global centers) and AI R&D investment. The company is considered a credible IPO candidate within a 12–24 month horizon, depending on market conditions, and its pre-IPO capital structure includes both PE sponsor influence (KKR, EQT) and early-stage VC (FTV Capital)."

sections:
  - id: revenue-model-structure
    title: "Revenue Model and Streams"
    body: "ReliaQuest generates revenue primarily through enterprise subscription contracts for its GreyMatter Security Operations Platform. The subscription is structured as a multi-year commitment (typically 2–3 years) priced on a per-endpoint, per-user, or a platform-access basis depending on the deployment scope. The contract structure reflects standard enterprise SaaS recurring revenue dynamics with annual prepayment terms and renewal options. A secondary revenue stream includes professional services—onboarding, tuning, and integration services—that are delivered at implementation and during major platform expansions. Professional services revenue is non-recurring and materially smaller than subscription revenue. A third emerging stream is analytics and threat intelligence licensing: ReliaQuest offers threat research outputs (including the 2025 Annual Threat Report) that may be licensed separately or bundled into premium subscription tiers. The platform's 250+ integration ecosystem also creates an indirect revenue benefit: high integration breadth reduces churn risk and increases the perceived value of the platform without requiring an incremental charge per integration. ReliaQuest does not publicly disclose revenue, ARR, or revenue growth rates. The most recent published revenue estimate from CB Insights was approximately $100 million ARR in 2021. At observed MDR industry growth rates of 25–30% CAGR and assuming reliaquest maintained or exceeded sector growth, ARR in 2025 would range from approximately $244 million (applying 25% CAGR from 2021 base) to $341 million (applying 30% CAGR). This estimate is unverified; actual revenue may differ materially. Form D filings with the SEC confirm the investment rounds but do not disclose operating metrics."
    claimRefs: [CI001, CI002, CI003, CI004, CI005]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: unit-economics-gross-margins
    title: "Unit Economics and Margin Structure"
    body: "Enterprise MDR providers with software-driven delivery typically achieve gross margins in the 65–75% range for the subscription component, with professional services margins in the 20–35% range. ReliaQuest's unit economics are not publicly disclosed; the following analysis is based on MDR industry benchmarks, comparable public companies (Secureworks, Rapid7), and observable cost drivers. The co-managed SOC model requires significant human capital investment across 6 global SOC centers. Personnel costs (security analysts, threat hunters, detection engineers) are the primary cost of goods sold item. At an estimated 250+ analyst-level employees in delivery roles at a blended cost of $80–100K fully-loaded per analyst, personnel delivery cost ranges from $20M–$25M annually. This implies a break-even point that depends heavily on revenue base and headcount efficiency. Customer acquisition cost (CAC) is elevated by ReliaQuest's enterprise-direct sales motion: enterprise security deals typically require 6–12 months sales cycles, senior AE involvement, and proof-of-concept evaluation. CAC payback at enterprise-level ARR per customer ($500K–$1M+ estimated range for anchor accounts) would be measured in 12–18 months assuming 3-year contract terms. Net Dollar Retention (NDR) is not disclosed. Enterprise MDR providers with strong platform adoption typically achieve NDR of 110–130%; analysts estimate ReliaQuest's NDR is in this range based on the multi-year contract structure and product expansion pattern. Customer lifetime value (LTV) is therefore materially high, but cannot be independently verified without access to cohort retention data."
    claimRefs: [CI006, CI007, CI008, CI009, CI010]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: funding-capital-structure
    title: "Funding History and Capital Structure"
    body: "ReliaQuest has raised approximately $830 million in total equity capital as of May 2026. The documented rounds include: an early venture-backed raise of approximately $30 million led by FTV Capital (exact date and terms undisclosed beyond 2015–2016 era); a Series C led by KKR in early 2020 at an approximately $1 billion valuation (disclosed via press releases); a Series D of $300 million led by KKR at an approximately $3.4 billion valuation in October 2024; and a $500 million financing in March 2025 led by EQT Private Equity, joined by KKR and FTV Capital. The March 2025 round's post-money valuation was not officially disclosed; a post-money valuation of $5–6 billion is consistent with observed valuation multiple expansion in enterprise cybersecurity and the absence of a downround signal. SEC Form D filings confirm the existence and approximate timing of the investment rounds through the EDGAR search system. The capital structure is characterized by PE sponsor concentration (KKR since 2020, EQT since 2025) with early VC (FTV Capital) retaining a meaningful stake. The $500 million 2025 raise is described as 'capital for AI-driven product expansion and international growth'—this represents deployment capital, not an exit liquidity event for existing shareholders. No debt financing, convertible notes, or revenue-based financing facilities have been disclosed publicly."
    claimRefs: [CI012, CI013, CI014, CI015, CI016]
    tableRefs: [TI004]
    figureRefs: [FI003]

  - id: ipo-path-valuation
    title: "IPO Path, Valuation Framework, and Burn Rate"
    body: "ReliaQuest is considered a credible IPO candidate within the 12–24 month horizon given its capital structure, PE sponsor ownership (KKR and EQT both have typical hold periods of 4–7 years), and the broader enterprise security IPO environment. PE sponsors would typically target an IPO valuation of 2–4x their entry valuation to achieve target returns. KKR invested at approximately $3.4 billion in October 2024; an IPO at $6–10 billion in 2026–2027 would represent a 1.8–3x return on deployed capital—consistent with PE sponsor return expectations for high-growth enterprise SaaS. The CB Insights 2026 Tech IPO Pipeline report identifies ReliaQuest as a potential IPO candidate. Applying a revenue multiple valuation framework: at estimated $250–350 million ARR, enterprise security SaaS comparables trade at 8–15x ARR in current (2026) market conditions, implying a valuation range of $2–5.25 billion on revenue alone. However, applying a premium for AI differentiation and category leadership (as MDR vendors like CrowdStrike trade at 20–30x ARR), a $6–10 billion range is achievable if revenue is at the high end of estimates and AI positioning is validated. Burn rate is not disclosed; the $500 million 2025 raise likely provides 2–4 years of operating runway at an estimated $100–200 million annual cash burn associated with SOC operations, AI R&D, and sales expansion, though the actual burn rate could be materially lower if the company is approaching operating profitability."
    claimRefs: [CI017, CI018, CI019, CI020, CI021]
    tableRefs: [TI005]
    figureRefs: [FI004]

  - id: financial-evidence-gaps
    title: "Public Financial Gaps and Disclosure Limitations"
    body: "ReliaQuest is a private company with no obligation to disclose audited financial statements, revenue figures, margin profile, or operating metrics. The financial analysis in this chapter is therefore constructed from triangulated signals: disclosed investment round valuations, SEC Form D filings, CB Insights estimates, analyst market reports, and MDR industry comparables. The absence of audited financials is a material evidence gap for any diligence exercise. Critical unknowns include: actual ARR and growth rate (3 years of estimates suggest a range but not a point estimate); gross margin by revenue line (subscription vs. professional services); net dollar retention and cohort churn data; EBITDA or operating cash flow; debt financing or debt covenants; and the exact cap table including option pool, liquidation preferences, and secondary sale provisions. The 'Public financial gaps table' artifact in this chapter systematically enumerates these gaps, their estimated materiality, and the diligence ask required to close each. An adverse signal in the financial picture is the complete absence of disclosed operating metrics despite two very large funding rounds in 18 months ($300M in Oct 2024 and $500M in Mar 2025). This may reflect normal PE-stage confidentiality standards, but could also indicate that operating metrics contain information that management prefers not to disclose pre-IPO. Diligence teams should treat the absence of disclosure as an evidence gap requiring direct access to management financials."
    claimRefs: [CI022, CI023, CI024, CI025]

