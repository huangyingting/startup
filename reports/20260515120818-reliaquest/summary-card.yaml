  topStrengths:
    - >-
      Vendor-neutral Open XDR creates platform stickiness across multi-tool enterprise environments without displacement
      sales cycles
    - >-
      Patented Universal Translator and 250+ integrations represent a defensible technical moat that competitors cannot
      easily replicate
    - >-
      $830M raised from KKR, EQT, and FTV Capital provides deep pre-IPO runway and signals strong institutional
      conviction
    - >-
      1,300+ enterprise customer base and 24/7 managed SOC model generates recurring, sticky multi-year revenue with
      high switching costs
    - >-
      Agentic AI repositioning (2025) aligns with the top Gartner/analyst trend in security operations; 6 AI Teammates
      are differentiated
  topRisks:
    - >-
      Microsoft Sentinel + Defender XDR bundled free with E5 licenses creates a structural cost disadvantage that is
      difficult for any MDR/XDR vendor to overcome
    - >-
      Revenue and unit economics are entirely undisclosed; the $3.4B valuation cannot be independently validated against
      ARR multiples
    - >-
      Key-person risk: Brian Murphy's departure as founder/CEO would be culturally disruptive and could affect
      enterprise customer retention
    - >-
      Platform consolidation trend (Palo Alto XSIAM, CrowdStrike Falcon) directly threatens ReliaQuest's multi-vendor
      positioning
    - >-
      Managed SOC quality concerns (TrustRadius: some fresh analysts on large infrastructure) could drive churn if
      service quality is inconsistent
