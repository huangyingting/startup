    title: Customer workflow / operating flow
    type: flow
    layout: standard
    summary: >-
      Operational flow showing how a security or IT operations team deploys Axonius from initial tool connection through
      continuous policy enforcement and remediation automation.
    data:
      nodes:
        - id: tool-connect
          label: Connect existing tools (adapters)
          detail: >-
            Customer activates adapters for EDR, MDM, CMDB, cloud, identity tools; provides API credentials; typically
            40-80 adapters per enterprise deployment.
          tone: neutral
        - id: data-collect
          label: Automated data collection (agentless)
          detail: >-
            Adapters poll tools on schedule (hourly or daily); no agents installed on endpoints; Axonius pulls telemetry
            to the platform.
          tone: positive
        - id: normalize
          label: Normalization and deduplication
          detail: >-
            Raw telemetry mapped to unified asset schema; duplicates merged; single authoritative record per device,
            user, or cloud resource.
          tone: positive
        - id: gap-detect
          label: Coverage gap detection
          detail: >-
            Policy engine compares asset inventory against expected tool coverage; flags assets missing EDR agent,
            patch, or other controls.
          tone: positive
        - id: alert-ticket
          label: Alert and ticket creation
          detail: >-
            Policy violations trigger alerts in Axonius dashboard; ITSM tickets created in ServiceNow/Jira; SOAR
            playbooks invoked for automated remediation.
          tone: positive
        - id: remediate
          label: Remediation and re-scan
          detail: >-
            IT/security teams remediate gaps; Axonius re-scans on next adapter cycle; closure tracked in policy
            dashboard.
          tone: positive
      edges:
        - from: tool-connect
          to: data-collect
        - from: data-collect
          to: normalize
        - from: normalize
          to: gap-detect
        - from: gap-detect
          to: alert-ticket
        - from: alert-ticket
          to: remediate
        - from: remediate
          to: data-collect
