      - number: '8.3'
        title: Scenario analysis and exit readiness
        blocks:
          - type: paragraph
            body: >-
              Bull case (probability signal: 25-30%): Axonius hires a permanent CEO with strong public company
              credentials by Q3 2026, achieves HIPAA certification for Cynerio by Q4 2026, reports $220M+ ARR with NRR >
              115%, and IPOs in 2026-2027 into a favorable cybersecurity SaaS market with AI-driven demand for automated
              asset management. Market assigns 18-22x NTM Revenue (comparable to CrowdStrike-tier execution). Valuation
              range: $3.5-5.0B. Return on Series E: 35-92% appreciation. This scenario requires no major operational
              setbacks, successful Cynerio integration, DoD contract renewal, and public market confidence in
              leadership.

              Base case (probability signal: 50-55%): Permanent CEO hired by Q4 2026, HIPAA certification achieved but
              healthcare revenue ramp is slower than projected, $200-220M ARR at IPO in 2027 with NRR 105-115%, public
              market assigns 12-16x NTM Revenue. Valuation range: $2.4-3.5B. Return on Series E: -7% to +35%. This
              scenario is consistent with a solid but not exceptional cybersecurity SaaS IPO. Late-stage investors at
              $2.6B face minimal-to-modest positive returns.

              Bear case (probability signal: 15-20%): CEO transition extends beyond 12 months, ARR growth decelerates to
              25-35% due to sales cycle elongation and competitive pressure, DoD CMRS contract renewal faces delays,
              Cynerio integration underperforms, and the company exits via M&A at $1.5-2.0B or IPOs at a compressed
              multiple of 8-10x NTM Revenue. Return on Series E: -23% to -42%. Series D and E investors face significant
              principal loss; common stockholders receive minimal proceeds after preferred liquidation preferences.

              Exit readiness for an IPO is partially confirmed: CFO Avi Kramer (Sumo Logic IPO veteran) is in place; SEC
              Form D filings indicate awareness of public market disclosure obligations; Forbes reports indicate
              investment banks are engaged. Blockers: no permanent CEO; HIPAA not confirmed; key metrics (NRR, gross
              margin) not publicly disclosed; Cynerio integration still in early stages. A 2026 H2 or 2027 IPO is
              achievable if blockers are resolved by mid-2026.
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
          - type: table
            tableRef: TV003
