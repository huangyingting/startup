  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and operating model
        blocks:
          - type: paragraph
            body: >-
              Axonius Inc. was founded in 2017 in New York City by Dean Sysman, Ofri Shur, and Avidor Bartov, all alumni
              of the Israeli Defense Forces' elite cyber intelligence units. The company is headquartered in New York
              City with primary research and development operations in Tel Aviv, Israel. A wholly owned federal
              subsidiary, Axonius Federal Systems LLC, was established to serve U.S. government and Department of
              Defense customers. The business describes its mission as transforming cybersecurity asset intelligence
              into actionability: helping organizations move beyond passive visibility of their digital environments
              toward automated, verified remediation of exposures and policy gaps.

              The core product is the Axonius Asset Cloud, a unified platform covering five domains: cyber assets, SaaS
              applications, software assets, exposures, and identities. The platform is agentless and API-based,
              requiring no agents, sensors, or network scanners. Instead, Axonius connects to over 400 existing security
              and IT tools through adapters, collects asset data in near real-time, deduplicates and normalizes it, and
              surfaces gaps, misconfigurations, and policy violations. Workflows provide no-code automation with over
              500 prebuilt actions. Deployment is flexible: on-premises, private cloud, or full SaaS in hours. As of
              2024, the company serves 670+ enterprise customers and reported $151.5M annual recurring revenue, growing
              approximately 51.5% year-over-year from 2023. Axonius has been described as one of the fastest
              cybersecurity companies in history to reach $100M ARR.
