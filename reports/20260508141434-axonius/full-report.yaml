              Large security platform vendors with existing enterprise relationships could embed CAASM-equivalent
              functionality into their XDR, SASE, or CNAPP platforms. This is not imminent — Axonius's integration depth
              (400+ adapters) is a meaningful moat — but the risk increases as Palo Alto Networks and CrowdStrike expand
              their platform ambitions. The Cisco acquisition denial in early 2026 suggests acqui-hire paths have been
              considered at the ecosystem level.
            calloutType: risk
