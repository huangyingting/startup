      - number: '1.2'
        title: Leadership, governance, and key-person structure
        blocks:
          - type: paragraph
            body: >-
              Axonius experienced a significant leadership transition in February 2026. Co-founder and CEO Dean Sysman
              announced he was moving into an Executive Chairman role, citing personal reflection and a desire to
              separate the mindsets required to build versus scale a business. Joe Diamond, who had been Chief Marketing
              Officer before being elevated to President in August 2025, assumed the additional role of Interim CEO. The
              transition was framed publicly as pre-IPO preparation, with Sysman committing to remain engaged on
              strategic vision while Diamond takes operational control.

              The broader leadership team reflects an intentional build-out toward public-company readiness. Chris
              Kramer serves as CFO, recruited specifically for pre-IPO preparation; he has publicly acknowledged
              elongated enterprise sales cycles as a challenge. Klaus Moser joined as SVP Global Sales in late 2025,
              bringing prior experience at Qualys and MobileIron. Ernesto Tey joined as VP Global Partners and
              Alliances, with a background spanning Okta, VMware, and Meta, known for building partner-driven revenue
              ecosystems. Tom Kennedy leads Axonius Federal Systems as General Manager. Co-founders Ofri Shur and Avidor
              Bartov remain with the company, though their current operating roles are less publicly specified. The
              company's governance structure is conventional private-company board governance, with backers including
              Accel, Lightspeed Venture Partners, Stripes, Bessemer Venture Partners, OpenView, and Silver Lake
              Waterman. The concentration of company identity in founders and particularly Dean Sysman — who built the
              company's public profile and key customer relationships — represents an ongoing key-person risk even as
              Diamond assumes operational leadership.
