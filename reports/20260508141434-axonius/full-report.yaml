      - number: '6.4'
        title: Adverse evidence and customer risks
        blocks:
          - type: paragraph
            body: >-
              Adverse customer evidence for Axonius is limited but present. G2 reviews include criticisms of Axonius's
              pricing as "opaque" and "difficult to justify for smaller asset estates"; multiple reviews note that
              pricing is quote-based and "expensive" for mid-market prospects, suggesting Axonius may have limited
              addressable market outside large enterprises. One PeerSpot reviewer noted that the "initial setup and
              adapter configuration took longer than expected" and that certain adapters had data quality issues with
              specific tool versions.

              The Cisco acquisition discussion (2023-2024, $2B offer reportedly denied by Axonius) creates customer
              uncertainty: if Axonius is perceived as a potential acquisition target, some customers may delay renewals
              or pilot competing solutions to reduce dependency risk. The ~100 employee layoffs in late 2024 also
              created uncertainty about product roadmap velocity and customer success coverage, though no public
              evidence of customer loss due to the layoffs was found.

              The Cynerio acquisition introduces a new category of risk: healthcare customers adopting the combined
              platform need HIPAA compliance assurance that is not yet confirmed; any delay in HIPAA certification could
              block hospital procurement. No public lawsuits, contract disputes, or regulatory actions against Axonius
              related to customer relationships were found in public databases.
