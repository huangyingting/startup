  - id: FV001
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      Decision logic flow from evidence inputs (market, product, customers, financials, risks, valuation) through key
      conditions to the final TRACK / CONDITIONAL BUY recommendation with upgrade conditions.
    data:
      nodes:
        - id: market
          label: Market — $8.5B CAASM TAM; 28% CAGR; zero trust mandates
          category: input
        - id: product
          label: Product — 400+ adapters;
          category: input
        - id: customers
          label: Customers — 670+ enterprise; DoD CMRS; Forrester TEI 156% ROI
          category: input
        - id: financials
          label: Financials — $151.5M ARR; 51.5% growth; NRR UNCONFIRMED
          category: input
        - id: risks
          label: Risks — CEO interim; HIPAA gap; CAASM commoditization; capital unknown
          category: input
        - id: valuation
          label: Valuation — $2.6B at 17x ARR; full at entry; base case flat-to-modest return
          category: input
        - id: thesis
          label: Strong market + product + customer evidence → thesis intact
          category: logic
        - id: antithesis
          label: CEO risk + HIPAA gap + NRR unknown + full valuation → anti-thesis material
          category: logic
        - id: condition1
          label: CONDITION 1 — Permanent CEO hired (public company operator)
          category: condition
        - id: condition2
          label: CONDITION 2 — HIPAA certification confirmed for Cynerio
          category: condition
        - id: condition3
          label: CONDITION 3 — NRR > 110% confirmed in data room
          category: condition
        - id: track
          label: TRACK — Monitor for 3-6 months; await condition confirmation
          category: output
        - id: buy
          label: CONDITIONAL BUY — All 3 conditions met; entry at $2.0-2.6B
          category: output
        - id: exit
          label: AVOID / EXIT — Thesis-break trigger confirmed
          category: output
      edges:
        - from: market
          to: thesis
          label: Market evidence
        - from: product
          to: thesis
          label: Product evidence
        - from: customers
          to: thesis
          label: Customer evidence
        - from: financials
          to: antithesis
          label: Unconfirmed metrics
        - from: risks
          to: antithesis
          label: Execution risk
        - from: valuation
          to: antithesis
          label: Full at $2.6B
        - from: thesis
          to: track
          label: Thesis valid but conditions unresolved
        - from: antithesis
          to: track
          label: Anti-thesis material; wait for conditions
        - from: condition1
          to: buy
          label: CEO resolved
        - from: condition2
          to: buy
          label: HIPAA confirmed
        - from: condition3
          to: buy
          label: NRR confirmed
        - from: track
          to: exit
          label: Thesis-break trigger fires
