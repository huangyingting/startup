    and government customers, achieved $151.5M ARR in 2024 (51.5% YoY growth), and acquired Cynerio (healthcare IoT
    security) in July 2025 for ~$180M. Axonius laid off ~100 employees in November 2025 and had unconfirmed Cisco
    acquisition talks in early 2026.
