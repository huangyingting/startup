  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk landscape
        blocks:
          - type: paragraph
            body: >-
              Axonius operates across multiple regulatory jurisdictions that create compliance obligations and risks.
              The most imminent regulatory risk is HIPAA compliance for the Cynerio healthcare IoT integration: Axonius
              has not confirmed that the combined platform has HIPAA Business Associate Agreement (BAA) coverage or
              HITRUST certification; hospital customers handling Protected Health Information (PHI) via medical device
              data cannot deploy without confirmed HIPAA compliance. Integration delays in HIPAA certification could
              block the entire healthcare vertical expansion.

              GDPR compliance is claimed by Axonius for EU data handling, but no independent audit certificate is
              publicly available; the Dublin EU presence creates ongoing GDPR obligations including Data Processing
              Agreement (DPA) maintenance, cross-border data transfer mechanisms (Standard Contractual Clauses), and
              potential supervisory authority (DPC Ireland) inquiry risk. The CCPA and emerging state privacy laws
              (Virginia, Colorado, Connecticut) apply to U.S. customer data handling; Axonius's privacy terms compliance
              with these state laws is not independently verified.

              FedRAMP compliance is a regulatory risk in the federal market: maintaining FedRAMP Moderate authorization
              requires annual third-party assessment; any discovered deficiency could trigger remediation requirements
              or temporary authorization suspension. FedRAMP High authorization — required for the most sensitive DoD
              and intelligence environments — has not been obtained; pursuing FedRAMP High adds 12-24 months of
              remediation and audit cost. Export control regulations (EAR) apply to Axonius's technology; the platform
              likely qualifies as encryption software and may require classification review under Commerce Department
              rules for international distribution.

              No active litigation, SEC enforcement actions, or regulatory investigations against Axonius were
              identified in public legal databases as of the research date; the company's clean legal record is
              consistent with its early private market stage.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
