      - number: '2.3'
        title: Buyer segmentation and adoption path
        blocks:
          - type: paragraph
            body: >-
              The primary buyer for Axonius and CAASM solutions is the enterprise CISO and their IT security operations
              team. The budget owner is typically the CISO or VP of Security, with procurement involving IT operations
              and enterprise architecture stakeholders. The payer is the organization's cybersecurity capital budget,
              which has grown consistently across enterprise verticals. The user is the security analyst or IT
              administrator running asset queries, configuring policies, and responding to incidents.

              Customer segmentation breaks into three primary tiers. First, large enterprises (5,000+ employees) with
              complex hybrid environments are the primary target; these organizations face the greatest visibility gap
              and have the budget to pay $775,000+ annually for a 400,000–700,000 device deployment per Forrester TEI
              data. Second, mid-market enterprises (1,000–5,000 employees) are an emerging segment as the platform
              becomes more accessible. Third, federal government customers represent a highly strategic vertical,
              requiring FedRAMP authorization and specialized compliance capabilities; Axonius Federal Systems has built
              a dedicated unit for this segment. Vertical concentrations include manufacturing, healthcare
              (post-Cynerio), financial services, media, and government/defense. Customer adoption typically follows a
              procurement and pilot path: a proof-of-value engagement, integration with existing tool stack, data
              quality validation, and policy automation deployment — often taking 3–9 months from initial evaluation to
              full deployment.
