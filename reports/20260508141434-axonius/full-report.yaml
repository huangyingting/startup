  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and pricing structure
        blocks:
          - type: paragraph
            body: >-
              Axonius generates revenue through asset count-based annual enterprise subscriptions. Customers pay based
              on the number of assets managed within the platform; the Forrester TEI study (March 2025) documents a list
              price example of $775,000 per year for a deployment covering 400,000 to 699,999 devices, providing a
              reference pricing point for large enterprise contracts. There is no free tier, community edition, or
              publicly disclosed entry price for mid-market customers; Axonius explicitly positions as a premium
              enterprise vendor.

              Revenue recognition follows standard SaaS subscription accounting: customers pay annually or multi-
              annually in advance, and revenue is recognized ratably over the contract period. The primary revenue
              streams are software subscriptions (the core CAASM platform), plus incremental modules for SaaS
              application management, software asset management, and the Axonius Federal Systems subsidiary. The Cynerio
              acquisition (July 2025) adds a healthcare IoT security revenue stream; Calcalist reports the acquisition
              was projected to increase ARR by tens of millions in the first year. There is no confirmed services or
              professional services revenue stream, though customer success and onboarding services likely exist at cost
              as part of the subscription.

              Axonius does not publish its revenue or ARR publicly; the $151.5M ARR figure for 2024 comes from Getlatka
              (an analyst that tracks private SaaS company metrics via founder interviews and public signals). Forbes
              projects Axonius will cross $200M ARR in 2025. ARR growth of 51.5% from 2023 to 2024 implies approximately
              $100M ARR in 2023, consistent with a company that reportedly hit $100M ARR in approximately 2022 per
