      - number: '1.3'
        title: Funding history, valuation, and capital structure
        blocks:
          - type: paragraph
            body: >-
              Axonius has raised approximately $700M to $856M across multiple rounds since its founding, with a range
              reflecting discrepancies between sources — Calcalist reported approximately $700M in February 2026 while
              CRN cited approximately $856M in 2026. The funding history includes a 2021 Series D of $100M at a $1.2B
              valuation; a March 2022 Series E of $200M led by Accel and Silver Lake Waterman at a $2.6B valuation; and
              a March 2024 Series E extension of $200M co-led by Lightspeed Venture Partners and Accel at the same $2.6B
              valuation, described by CEO Dean Sysman as an intentional decision not to optimize for a higher valuation.
              An additional undisclosed raise was completed in October 2025.

              Key investors include Accel, Lightspeed Venture Partners, Stripes, Bessemer Venture Partners, OpenView,
              and Silver Lake Waterman. The company is unprofitable, with ARR growth as its primary KPI. CFO Chris
              Kramer has publicly acknowledged elongated enterprise sales cycles. Axonius has expressed plans to pursue
              an IPO and has framed leadership hires and operational decisions as steps toward that goal. In early 2026,
              Israeli tech outlet Calcalist reported that Cisco was in advanced talks to acquire Axonius for
              approximately $2 billion. Axonius publicly denied the report, stating it "is not in talks to be acquired
              by Cisco" and that its strategy is to build a durable, independent company. Cisco did not comment. The
              flat valuation from 2022 to 2024 — a period during which ARR grew significantly — reflects broader market
              multiple compression for growth-stage software companies rather than a reversal in business performance.
