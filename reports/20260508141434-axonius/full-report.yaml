  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - trigger
      - threshold/event
      - transmission to thesis
      - action implication
    rows:
      - - NRR disclosed below 90%
        - S-1 NRR < 90% gross dollar retention; or data room NRR < 100% net dollar retention
        - Customer durability thesis broken; ARR is new-logo dependent; churn is structural
        - Exit position or don't invest; model revenue with 15-25% ARR haircut
      - - Permanent CEO not hired within 12 months (by Feb 2027)
        - >-
          Interim CEO status persists beyond Feb 2027; or CEO hire is internal promotion without public company
          experience
        - IPO delayed; execution variance unacceptable for institutional investors; board effectiveness questioned
        - Do not invest at any price until CEO situation resolved; apply 25-30% execution discount to valuation
      - - DoD CMRS contract non-renewal
        - Contract expiry without renewal; or competitor wins replacement federal CAASM contract
        - Federal ARR (est. 15-25% of total) collapses; federal reference logo lost; growth resets
        - Exit or dramatically reduce position; re-model ARR ex-federal; expect 30-40% valuation compression
      - - HIPAA certification not achieved by Q4 2026
        - No public HIPAA BAA or HITRUST announcement for combined Axonius-Cynerio platform by end 2026
        - Cynerio acquisition return impaired; healthcare vertical expansion delayed 12-18 months beyond Q4 2026
        - Do not give credit for Cynerio TAM expansion in valuation model; take $50-100M haircut on bull-case valuation
      - - Financing at below $2.0B valuation
        - SEC Form D or public announcement of capital raise at <$2.0B valuation
        - >-
          Down-round confirmed; Series D/E investors marked down; anti-dilution triggers; exit at Series E price
          impossible
        - Exit if possible; down-round is thesis-break for pre-IPO investors at $2.6B
      - - Gross margin disclosed below 65%
        - S-1 gross margin < 65% at scale (>$150M ARR)
        - Operating leverage thesis impaired; path to 20%+ EBIT margin questionable; IPO multiple compressed
        - Re-model FCF projections; apply 15-25% multiple compression from cybersecurity SaaS norms
    notes: >-
      Thesis-break triggers are monitoring tools for the investment holding period. Each trigger is independently
      actionable — any one event constitutes a re-underwriting moment. NRR and CEO resolution are the two
      highest-priority monitoring indicators before investment commitment.
