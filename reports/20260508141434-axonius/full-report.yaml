      - number: '3.2'
        title: Feature and capability comparison
        blocks:
          - type: paragraph
            body: >-
              Axonius's core differentiation is integration breadth and depth: its 400+ tool adapters aggregate asset
              data from across the existing security and IT tool stack, including endpoint agents (CrowdStrike,
              SentinelOne, Defender), cloud providers (AWS, Azure, GCP), identity providers (Okta, Azure AD), network
              devices, and SaaS applications. This adapter-first architecture means Axonius does not require agent
              deployment on every endpoint — it compiles a unified asset record by pulling from tools already deployed.
              Armis, by contrast, uses passive network traffic analysis and an agentless approach for OT/IoT
              environments where agents cannot be installed. runZero uses active network scanning (built by HD Moore,
              the creator of the Metasploit framework) with a no-agent, no-credentials approach, giving it a faster
              time-to-value in environments without tool standardization.

              In the feature capability matrix, Axonius leads on adapter count, enterprise compliance posture (FedRAMP,
              SOC 2, ISO 27001), and asset-level policy automation. Armis leads on passive OT/IoT discovery without any
              network disruption. runZero leads on scanning speed and time-to-value in small- to mid-market accounts.
              ServiceNow leads on CMDB workflow integration and change management. Qualys leads on vulnerability context
              (CVE correlation) depth, given its native vulnerability data. Tanium leads on real-time endpoint command
              execution and patch management post-discovery. No single competitor matches Axonius's combination of
              integration breadth, enterprise compliance, and policy enforcement. The major known weaknesses for Axonius
              are: limited passive OT/IoT discovery (partially addressed by Cynerio for healthcare), no native
              vulnerability scanning (relies on third-party integrations), and asset-based pricing complexity.
