      - number: '8.2'
        title: Valuation context and comparable analysis
        blocks:
          - type: paragraph
            body: >-
              Axonius's Series E valuation of $2.6B (March 2024) was set when cybersecurity SaaS multiples were
              recovering from their 2022 trough but before the AI-driven multiple expansion of 2024-2025 primarily
              benefited AI-native security vendors. At the Series E, $2.6B represented approximately 17x the trailing
              twelve months ARR of ~$150M — at the high end of the 10-20x range for high-growth private cybersecurity
              companies at the time.

              Comparable public company analysis provides market calibration. CrowdStrike trades at approximately 15-18x
              NTM Revenue — justified by its 35%+ growth, expanding platform breadth, and AI-driven product momentum.
              SentinelOne trades at 10-14x NTM Revenue despite lower revenue than CrowdStrike but maintains strong
              growth credentials. Qualys trades at 7-9x NTM Revenue as a more mature, lower-growth asset, while Tenable
              trades at 7-9x. Rapid7, with slower growth and a challenged competitive position, trades at 3-5x NTM
              Revenue — the floor for public cybersecurity SaaS. Applying these multiples to Axonius's projected
              $200-220M NTM Revenue (2025 or fiscal 2026) yields a public-company-equivalent range of $600M-$3.9B before
              IPO execution premium or private market premium.

              The most directly relevant private comparable is Armis, which raised at $4.6B in 2023 at an estimated
              $150-180M ARR — implying a 25-30x ARR multiple reflective of OT/IoT scarcity premium. Axonius's IT-centric
              CAASM has broader horizontal applicability but less of an OT scarcity premium; the $2.6B at 17x ARR
              implies Axonius is priced at a discount to Armis but at a premium to public comps. The Cisco acquisition
              discussion at $2B implies a corporate buyer's floor valuation for a strategic acquisition — approximately
              13x ARR — representing a 23% discount to the last round and a loss for Series E investors.
            claimRefs:
