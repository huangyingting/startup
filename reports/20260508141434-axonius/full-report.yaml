  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and definition
        blocks:
          - type: paragraph
            body: >-
              Axonius competes primarily in the Cyber Asset Attack Surface Management (CAASM) market, a segment of
              enterprise cybersecurity that focuses on continuous discovery, inventory, and contextual analysis of all
              digital assets across on-premises, cloud, and hybrid environments. The primary problem CAASM addresses is
              the visibility gap: enterprise security teams cannot defend what they cannot see, and modern IT
              environments — spanning cloud workloads, IoT devices, SaaS applications, remote endpoints, and third-party
              integrations — have outgrown traditional configuration management databases (CMDBs) and IT asset
              management (ITAM) tools.

              The market boundary includes: software platforms for automated asset discovery and inventory, attack
              surface visibility and gap analysis, policy validation and enforcement automation, and exposure and
              vulnerability prioritization tied to asset context. It excludes: raw vulnerability management (Qualys,
              Tenable) unless tied to asset context, pure endpoint management (Tanium), standalone cloud security
              posture management (Wiz, Orca), and traditional ITSM/CMDB platforms (ServiceNow) whose asset management
              capabilities are incidental to their workflow automation mission. The key substitutes are manual CMDB
              processes, spreadsheet- based asset inventories, and incumbent tools repurposed for asset tracking.

              Adjacencies that Axonius competes in or is expanding into include SaaS management (often under the SMP or
              SSPM umbrella), software asset management (SAM), identity governance and administration (IGA, for asset-
              identity correlation), and healthcare IoT security (via the Cynerio acquisition). The addressable market
              expands materially when these adjacent segments are included, moving from the pure CAASM base of $1.47B
              toward a broader security management platform opportunity that multiple analyst firms estimate in the
              $5B–$10B range over the medium term.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
