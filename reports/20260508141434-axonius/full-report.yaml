companyProfile:
  summary: >-
    Axonius is a New York-based private cybersecurity company that pioneered the Cyber Asset Attack Surface Management
    (CAASM) category. Its platform aggregates data from 1,000+ adapters to provide unified asset visibility, security
    control gap detection, and automated remediation across cloud, on-premises, and OT environments. The company was
    co-founded in 2017 by Dean Sysman, Ofri Ben-Ari, and Nathaniel Hawthorne; experienced a CEO transition in February
