      - number: '6.3'
        title: Retention, expansion, and durability
        blocks:
          - type: paragraph
            body: >-
              Axonius does not disclose net revenue retention (NRR), gross dollar retention (GDR), churn rate, or
              renewal rate; these are the most critical undisclosed metrics for assessing the durability of the 670+
              customer base. However, multiple structural factors support a high NRR hypothesis: the adapter-based
              integration model creates deep switching costs (customers configure 40-80+ adapters and build custom
              policy rules); the asset count pricing model provides natural expansion as customer estates grow; and the
              platform's role in compliance reporting (FISMA for federal, SOC 2 audit prep for commercial) makes it
              difficult to remove without degrading compliance workflows.

              The Forrester TEI study cites a <6 month customer payback period, which suggests rapid realized value and
              a strong retention driver; customers who achieve payback within the first year are statistically less
              likely to churn. Proxy indicators of retention health include the linear ARR growth rate (51.5% YoY in
              2024) at the 670+ customer scale — this growth rate is consistent with new logo additions plus expansion,
              though the exact split is unknown.

              Expansion risk is primarily macro-driven: if customer asset counts flatten (economic slowdown, asset
              optimization programs), ARR growth from the installed base slows; Axonius has no minimum seat expansion
              requirement to maintain the platform. Concentration risk is moderate: no single customer is publicly
              confirmed to represent more than 5% of ARR, but the DoD CMRS contract may represent a meaningful
              concentration of government revenue; if DoD does not renew, federal ARR could decline materially. The
              long-tail (600+ smaller enterprise customers) provides diversification.
