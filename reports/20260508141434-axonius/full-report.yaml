          - type: paragraph
            body: >-
              Axonius has built a dense milestone record in under a decade. The company launched commercially around
              2017 to 2018, achieved $100M ARR by 2023, and reached $151.5M ARR in 2024 with 670+ enterprise customers.
              The company projects $200M+ ARR for 2025. In March 2023, its federal subsidiary received DoD approval
