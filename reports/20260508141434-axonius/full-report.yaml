      - number: '7.3'
        title: People and execution risks
        blocks:
          - type: paragraph
            body: >-
              The CEO transition (Dean Sysman to Executive Chairman; Joe Diamond as Interim CEO, February 2026) is the
              highest-profile execution risk for Axonius. CEO transitions at pre-IPO companies routinely create 6-12
              months of internal distraction, sales cycle elongation, and investor uncertainty. Sysman's 9-year tenure
              as co-founder CEO means institutional knowledge, key customer relationships, and culture are closely tied
              to him; the Interim CEO title (rather than permanent) signals the search for a permanent CEO is ongoing,
              adding uncertainty. If the permanent CEO hire is a poor cultural fit or fails to maintain the growth
              trajectory, it could delay or block an IPO.

              Axonius's cybersecurity and infrastructure engineering talent is concentrated in Tel Aviv, Israel;
              geopolitical risk in the Israel-Gaza conflict (ongoing as of the research date) creates talent risk,
              infrastructure risk, and investor perception risk; extended conflict could affect R&D productivity,
              increase talent attrition, and complicate fundraising from some institutional investors with ESG
              restrictions. Talent concentration in one geography is a standard venture diligence concern for pre-IPO
              Israeli technology companies.

              Key person risk extends to the founding team and senior engineering leaders; if multiple senior engineers
              leave following the CEO transition or layoffs, adapter quality and platform development velocity could be
              materially affected. No succession plans for technical leadership are publicly disclosed. The CFO (Avi
              Kramer) brings public company experience from Sumo Logic, which reduces CFO-level execution risk ahead of
              an IPO, but a permanent CEO hire with public company operations experience is still needed.
            claimRefs:
              - CR015
              - CR016
              - CR017
