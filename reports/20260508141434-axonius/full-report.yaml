      - number: '6.2'
        title: Named customer proof and deployment evidence
        blocks:
          - type: paragraph
            body: >-
              Named customer evidence for Axonius spans government, financial services, and technology verticals. The
              most prominent named customer is the U.S. Department of Defense, where the Axonius CMRS contract covers 4
              of 5 DoD branches (Army, Navy, Air Force, Marines confirmed; Space Force unconfirmed) and represents a
              multi-year platform commitment — the clearest public proof of production deployment at scale. Additional
              DoD-adjacent evidence includes FedRAMP Moderate authorization enabling civilian agency deployments.

              Gartner Peer Insights reviews for the CAASM category include Axonius ratings from enterprise IT security
              professionals confirming production deployments. G2 reviews corroborate that customers use Axonius for
              unified asset inventory and security coverage gap analysis. The Forrester TEI study (March 2025) documents
              a composite of real Axonius deployments across organizations managing 400,000-699,999 assets, reporting
              $775K/year in savings, $3.22M NPV, and <6 month payback. While the study is vendor-commissioned, it draws
              on interviews with actual customers.

              Customer satisfaction reviews across G2, Gartner Peer Insights, and PeerSpot cite strengths including
              breadth of adapters, ease of deployment relative to alternatives, and quality of the unified asset view.
              Adverse feedback includes complaints about pricing opacity and total cost for large asset estates, long
              initial setup time for first adapters, and limited out-of-box report templates. One reviewer on G2 noted
              that pricing was "significantly higher than alternatives" for mid-market deployments, suggesting Axonius
              may price out of the sub-10,000 asset market.
