  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product suite and module overview
        blocks:
          - type: paragraph
            body: >-
              Axonius delivers a multi-module cybersecurity asset management platform. The core product is CAASM (Cyber
              Asset Attack Surface Management): a unified asset inventory that collects telemetry from all existing
              security and IT tools via API-based adapters, normalizes and deduplicates the data into a single record
              per asset, and surfaces policy violations, coverage gaps, and risk prioritization for security and IT
              operations teams. CAASM is the primary revenue driver and the foundation module that all other products
              extend.

              Beyond core CAASM, Axonius has expanded into two adjacent modules: SaaS Management (SaaS Security Posture
              Management / SSPM) discovers authorized and unauthorized SaaS applications, manages user access, and
              enforces governance policies across the SaaS estate; and Software Asset Management (SAM) consolidates
              software license data with the asset inventory to automate license compliance, reduce audit risk, and
              identify wasteful spend. Both modules operate within the same platform and leverage the existing adapter
              ecosystem, minimizing incremental deployment friction for existing CAASM customers.

              The Axonius Federal Systems subsidiary delivers a FedRAMP Moderate-authorized edition of the platform for
              U.S. government customers, with separate infrastructure and security controls that meet FISMA and DoD
              requirements. Cynerio, acquired July 2025 for up to $250M, contributes a healthcare IoT and medical device
              security capability; the integration timeline and combined product architecture are not yet publicly
              disclosed. No freemium, community, or trial editions are offered; all products require enterprise
              procurement through direct sales.
            claimRefs:
