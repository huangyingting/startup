      - number: '5.2'
        title: Architecture, integration model, and developer platform
        blocks:
          - type: paragraph
            body: >-
              The Axonius platform's core technical architecture is an agentless, adapter-based integration model.
              Adapters are API connectors — one per third-party tool — that pull asset telemetry from existing customer
              tools on a scheduled basis without deploying software agents on managed endpoints. The adapter library
              covers 400+ tools spanning endpoint detection and response (EDR), mobile device management (MDM), cloud
              security posture, CMDB, identity providers, network scanners, vulnerability management, and SaaS
              platforms. Adapters are managed and updated by Axonius; customers activate adapters and configure
              credentials; the architecture deliberately minimizes configuration burden on customer IT teams.

              Data collected by adapters flows through a multi-stage data pipeline: raw collection is followed by
              normalization (mapping heterogeneous tool schemas to a unified asset schema), deduplication (identifying
              that the same physical asset appears in multiple tools under different identifiers), and enrichment
              (adding metadata, classification, and relationship mapping). The output is a single authoritative asset
              record per device, user, or cloud resource. A policy enforcement engine then applies user-defined and
              pre-built rules to detect violations, trigger alerts, create ITSM tickets, and initiate automated
              remediation workflows via REST API integrations with SIEM, SOAR, and ITSM platforms.

              Axonius exposes a REST API for programmatic access and provides a developer SDK for customers building
              custom adapters or automating workflows. Documentation is available at docs.axonius.com. GitHub activity
              under the Axonius organization is minimal — reflecting the proprietary, enterprise SaaS nature of the
              platform — with no significant OSS contribution or community framework. The limited developer ecosystem is
              a gap relative to more platform-oriented security vendors (e.g., Splunk, ServiceNow) that have built large
              third-party developer communities.
