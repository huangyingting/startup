  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer base segmentation and verticals
        blocks:
          - type: paragraph
            body: >-
              Axonius has disclosed 670+ enterprise customers as of 2024, growing from a sub-500 count in 2022. The
              platform targets large enterprises with complex, heterogeneous IT environments — specifically
              organizations managing 10,000+ assets across multiple on-premises, cloud, and SaaS environments. The ideal
              customer profile (ICP) is a Fortune 1000 company with a mature security operations team and existing
              investments in multiple endpoint, identity, and cloud security tools that generate fragmented,
              unreconciled asset data. Axonius monetizes the need to aggregate these tools into a unified asset
              inventory without replacing them.

              Verticals represented in public customer evidence include financial services (banks, insurance, asset
              managers), technology companies, healthcare organizations, U.S. federal government and DoD, manufacturing,
              retail, and telecommunications. The DoD CMRS multi-year contract (December 2024) with 4 of the 5 major DoD
              branches is the most significant single customer relationship by strategic value. Geographically,
              Axonius's customer base is predominantly North American, with EMEA expansion underway from the Dublin
              office; international revenue as a proportion of total ARR is not disclosed.

              Buyer personas are primarily security-focused: CISO, Director of Security Operations, and VP of IT
              Security are the most common titles in published customer testimonials and G2 reviews. IT Operations
              leadership (CTO, IT Director) appears as a secondary buyer, particularly for SAM and SaaS Management
              modules. The typical deal is procured at the CISO level with IT Operations as the operator, and
              Finance/Procurement as approver. There is no self-serve or product-led growth path; all customer
              relationships begin with direct enterprise sales, contributing to long sales cycles (3-9 months).
