        - id: sales-friction
          label: Enterprise sales cycle elongation
          category: impact
        - id: customer-churn
          label: Customer inventory quality erosion / churn
          category: impact
        - id: bridge-financing
          label: Bridge financing at unfavorable terms
          category: impact
        - id: ipo-delay
          label: IPO delay / valuation markdown
