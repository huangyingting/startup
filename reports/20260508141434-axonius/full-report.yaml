      - number: '7.2'
        title: Operational and technical risks
        blocks:
          - type: paragraph
            body: >-
              Axonius's adapter-based integration model creates a structural operational risk: when a third-party tool
              vendor changes its API (deprecates endpoints, changes authentication, modifies data schemas), the
              corresponding Axonius adapter may break, causing data gaps in the customer's asset inventory without
              immediate customer visibility. With 400+ adapters maintained by Axonius, API breakage incidents are
              expected to occur regularly; the quality and speed of adapter maintenance directly affects customer
              satisfaction and retention. No public SLA for adapter update SLA or mean-time-to- repair (MTTR) for broken
              adapters is disclosed.

              The normalization engine's accuracy is a core operational risk: deduplication errors (false positives
              merging distinct assets, false negatives creating ghost records) undermine the value proposition of a
              "single source of truth" asset inventory. These errors are invisible to customers unless they
              independently audit the Axonius asset database against ground truth; systematic normalization failures
              could erode trust and trigger churn without prior warning. Normalization accuracy benchmarks are not
              publicly disclosed.

              Cloud infrastructure reliability risk exists for the commercial SaaS edition: an extended outage (3+
              hours) at the cloud provider level would leave customers unable to run policy enforcement or access their
              asset inventory; for customers using Axonius in security incident response workflows, this creates a
              material operational impact. The status page exists but SLA terms and historical uptime are not published.

              The ~100 employee layoffs in late 2024 reduced Axonius's engineering and customer success headcount; if
              engineering headcount cuts affected the adapter team, adapter maintenance velocity may have slowed; if
              customer success cuts reduced CSM coverage, enterprise customers may have reduced support quality. Neither
              impact is confirmed from public sources.
            claimRefs:
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
              - CR013
