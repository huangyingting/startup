            body: >-
              The public financial picture for Axonius shows a well-capitalized, high-growth SaaS company with a clear
              revenue model and strong market position, but with critical gaps in every unit economics metric that
              matters for underwriting. The 51.5% ARR growth, $151.5M 2024 ARR, and projected $200M+ 2025 ARR are
              positive momentum signals. The flat Series E valuation, subsequent layoffs, and the scale of the Cynerio
