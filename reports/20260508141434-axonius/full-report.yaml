      - number: '8.4'
        title: Recommendation, risk rating, and final diligence asks
        blocks:
          - type: paragraph
            body: >-
              Recommendation: TRACK / CONDITIONAL BUY. Risk rating: HIGH. Confidence: MEDIUM. At the last-round
              valuation of $2.6B, the risk/reward profile is asymmetric to the downside: the base case implies
              flat-to-modest returns, the bear case implies principal loss, and the bull case requires multiple
              conditions to be confirmed simultaneously. The investment is not a buy at $2.6B without three confirmed
              conditions: (1) permanent CEO hired; (2) HIPAA certification for Cynerio confirmed; (3) NRR > 110%
              confirmed in data room.

              At $2.0-2.2B entry (representing a 15-23% discount to the Series E), the base case provides 20-40% return,
              the bull case provides 60-125%, and the bear case limits loss to 0-10% at the M&A floor. This entry
              discipline is achievable in a secondary transaction or bridge round if market conditions deteriorate.
              Investors without secondary access should track the company through the CEO transition and HIPAA
              certification milestones before committing at Series E price.

              Key diligence asks are organized in the final table. The highest-priority items are: (1) NRR and gross
              retention confirmation; (2) post-Cynerio cash runway; (3) CEO search timeline and board criteria; (4)
              HIPAA certification roadmap; (5) DoD CMRS renewal probability and timeline. The thesis-break triggers from
              Chapter 7 apply directly: NRR below 90%, DoD non-renewal, CEO search failure, or financing at below $2B
              valuation would each individually constitute thesis-break events requiring position exit.
