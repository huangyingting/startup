            title: CrowdStrike's Falcon platform is the highest-probability commoditization threat
            body: >-
              CrowdStrike already has its endpoint agent deployed in the majority of large enterprises. As it adds asset
              discovery capabilities for non-endpoint assets and bundles them into Falcon modules at no incremental
              cost, it can erode Axonius's value proposition in the installed base without needing to win a competitive
