  - id: TR002
    title: Operational / quality / security risk register
    columns:
      - failure mode
      - likelihood
      - severity
      - mitigation maturity
      - residual exposure
      - unresolved gap
    rows:
      - - Adapter API breakage (third-party tool vendor changes API)
        - High (occurs regularly across 400+ adapters)
        - Material (data gaps in customer asset inventory; invisible to customer)
        - Medium (Axonius adapter maintenance team; adapter update SLA not disclosed)
        - Customer asset inventory silently incomplete until adapter repaired
        - No public adapter update SLA or MTTR; breakage monitoring not confirmed
      - - Normalization accuracy failure (deduplication error)
        - Medium (complex environments with many tools; version skew)
        - Material (false asset records undermine single-pane-of-glass value proposition)
        - Low-medium (no public accuracy benchmarks; no disclosed testing methodology)
        - Ghost or merged asset records erode customer trust; invisible without audit
        - Normalization accuracy benchmarks not disclosed; no third-party validation
      - - Cloud infrastructure outage (commercial SaaS edition)
        - Low (major cloud providers target 99.9%+ uptime)
        - Material (customers lose access to asset inventory and policy enforcement)
        - Medium (SaaS architecture; cloud redundancy inferred; SLA not disclosed)
        - During outage, security teams lose coverage gap visibility; incident response impacted
        - SLA terms not published; historical uptime not confirmed; disaster recovery plan not public
      - - Data breach of customer asset inventory data
        - Low (SOC 2 Type II controls; multi-tenant SaaS)
        - Severe (customer asset data is a high-value target; breach would be reputational catastrophe)
        - High (SOC 2 Type II; ISO 27001; penetration testing assumed; bug bounty absent)
        - Customer asset inventory contains sensitive infrastructure topology data; breach = significant liability
        - Bug bounty program not identified; responsible disclosure policy not prominent
      - - Cynerio integration technical failure (healthcare IoT pipeline)
        - Medium (architectural mismatch between passive capture and API-based models)
        - Material (delays healthcare revenue expansion; hospital customer deployments stalled)
        - Low (integration in early stages; architecture not disclosed)
        - Healthcare customers unable to deploy integrated product; Cynerio revenue below projection
        - No public integration architecture or timeline; HIPAA compliance for combined product unconfirmed
      - - Federal on-premises deployment configuration error
        - Low (dedicated deployment team; FedRAMP-trained personnel)
        - Material (misconfiguration in DoD environment could trigger contract termination)
        - Medium (FedRAMP authorization process; change management controls)
        - Contract cancellation and reputational damage in federal market
        - Federal incident response procedures not publicly confirmed; on-prem update process not documented
    notes: >-
      Likelihood and severity are qualitative assessments based on structural analysis and industry benchmarks. Axonius
      does not publicly disclose operational metrics, incident history, or SLA terms.
