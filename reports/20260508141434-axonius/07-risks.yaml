    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Risk assessment matrix for Axonius across key risk categories. Rows represent risk categories; columns represent
      assessment dimensions. Cell values reflect qualitative severity assessment (High/Medium/Low/Unknown) based on
      public evidence and structural analysis.
    data:
      columns:
        - Likelihood
        - Impact if realized
        - Mitigation maturity
        - Residual severity
      rows:
        - label: Regulatory (HIPAA/FedRAMP/GDPR)
          values:
            - High (HIPAA not confirmed; FedRAMP annual risk; GDPR ongoing)
            - Material to Blocking (HIPAA blocks healthcare; FedRAMP loss = federal revenue loss)
            - Medium (FedRAMP well-managed; HIPAA/GDPR gaps open)
            - Material (HIPAA gap is near-term blocker; FedRAMP residual low)
        - label: Legal (employment/export controls)
          values:
            - Low (no active litigation; WARN Act likely compliant)
            - Minor (fines; reputational risk)
            - High (standard legal compliance expected)
            - Minor (clean legal record; low residual risk)
        - label: Operational (adapter breakage/outage)
          values:
            - High (adapter breakage is routine; outage low but possible)
            - Material (data gaps in customer inventory; CSM satisfaction)
            - Medium (adapter team maintains library; SLA not disclosed)
            - Material (no public SLA or MTTR commitment; customer trust risk)
        - label: People/Execution (CEO transition)
          values:
            - High (interim CEO; permanent search ongoing)
            - Severe (pre-IPO CEO transition is highest-impact execution risk)
            - Low (Sysman as Executive Chairman; Kramer CFO; board active)
            - Severe (no permanent CEO = blocking risk for IPO timeline)
        - label: Financial (capital/burn/IPO timing)
          values:
            - Medium (Cynerio acquisition cost; IPO market volatility)
            - Severe (capital shortfall = bridge at unfavorable terms)
            - Low (financial details undisclosed; runway unknown)
            - Material (cash runway unknown; 2025 Form D ambiguous)
        - label: Competitive (platform commoditization)
          values:
            - Medium (Microsoft/CrowdStrike investing in CAASM adjacency)
            - Severe (platform bundling could erode standalone CAASM value)
            - Low (Axonius has adapter breadth advantage; switching costs)
            - Material (long-term strategic risk if major platform adds CAASM)
        - label: Geopolitical (Tel Aviv R&D concentration)
          values:
            - Medium (Israel-Gaza conflict ongoing as of research date)
            - Material (R&D disruption; talent attrition; investor ESG concerns)
            - Low (no public continuity plans; talent concentration persists)
            - Material (geopolitical escalation could disrupt R&D for extended period)
    notes: >-
      Qualitative assessments based on public evidence and structural analysis. Axonius does not publish a formal risk
      register. High/Material/Low ratings reflect diligence team judgment.
