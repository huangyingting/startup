  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: hipaa-hitrust-certification-timeline
      missingEvidence: >-
        The HIPAA BAA availability timeline and HITRUST certification roadmap for the combined Axonius-Cynerio platform
        are not publicly disclosed; without confirmed HIPAA coverage, hospital customers cannot deploy; the gap is a
        near-term blocking risk for healthcare vertical expansion.
      whyItMatters: >-
        Healthcare IoT is the primary strategic rationale for the $250M Cynerio acquisition; if HIPAA certification is
        delayed past Q4 2026, the acquisition return model is materially impaired; this is the highest-priority
        near-term risk requiring diligence confirmation.
      diligencePath: >-
        Request HIPAA BAA availability timeline from Axonius management; confirm HITRUST assessment start date; review
        Cynerio's pre-acquisition HIPAA compliance posture; assess integration engineering roadmap for HIPAA-relevant
        data handling.
      relatedQuestionRefs:
        - QR001
        - QR002
      relatedTableRefs:
        - TR001
    - type: private-evidence-only
      severity: blocking
      topic: capital-adequacy-and-cash-runway
      missingEvidence: >-
        Post-Cynerio acquisition cash position and burn rate are not publicly disclosed; the 2025 Form D suggests
        additional capital activity but terms and amount are not confirmed; cash runway to IPO is a critical risk
        requiring data room confirmation.
      whyItMatters: >-
        If cash runway is below 12 months without a confirmed IPO or financing commitment, Axonius may require a bridge
        at unfavorable terms; dilutive financing below $2.6B valuation could mark down late-stage investor positions.
      diligencePath: >-
        Request audited balance sheet as of Q4 2025; confirm post-Cynerio cash position; review 2025 Form D details;
        request 12-month cash flow forecast; confirm IPO readiness assessment from investment banks.
      relatedQuestionRefs:
        - QR021
    - type: private-evidence-only
      severity: material
      topic: adapter-reliability-and-mttr
      missingEvidence: >-
        Axonius's adapter breakage frequency, mean-time-to-repair (MTTR) for broken adapters, and customer notification
        processes for data quality gaps are not publicly disclosed; these metrics are directly related to customer
        satisfaction and retention quality.
      whyItMatters: >-
        High adapter breakage frequency without fast MTTR erodes the single-source-of-truth value proposition; customers
        may not detect silent data gaps until they discover compliance or security failures attributable to incomplete
        inventory.
      diligencePath: >-
        Request adapter incident log for last 12 months; confirm adapter MTTR SLA; request number of adapter incidents
        per quarter; review customer escalation records related to adapter quality.
      relatedQuestionRefs:
        - QR011
    - type: private-evidence-only
      severity: material
      topic: ceo-search-timeline-and-candidate-quality
      missingEvidence: >-
        The permanent CEO search timeline, candidate quality, and board criteria for the permanent CEO hire are not
        publicly disclosed; the quality and speed of the CEO hire directly determines the IPO execution risk.
      whyItMatters: >-
        A CEO hire that fails to meet public company requirements or takes more than 12 months to confirm could delay
        the IPO by 12-24 months, increasing burn and investor pressure; the permanent CEO quality is the single most
        important near-term execution variable.
      diligencePath: >-
