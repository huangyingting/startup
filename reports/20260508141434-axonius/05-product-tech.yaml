  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: normalization-accuracy-benchmarks
      missingEvidence: >-
        Axonius's data normalization and deduplication accuracy — false-positive and false-negative
        rates across heterogeneous enterprise environments — is not publicly benchmarked or disclosed.
        The normalization engine is the core value proposition and the primary technical risk; degraded
        accuracy in complex environments undermines the single-pane-of-glass promise.
      whyItMatters: >-
        Without accuracy benchmarks, it is impossible to independently verify that Axonius delivers
        the complete and accurate asset inventory it promises; this is the most critical technical
        due diligence requirement for any investment or procurement decision.
      diligencePath: >-
        Request normalization accuracy benchmarks from internal test datasets; conduct proof-of-value
        (POV) pilot across a sample of the customer's environment with known asset population; request
        reference customers willing to discuss accuracy experience.
      relatedQuestionRefs:
        - QE003

    - type: private-evidence-only
      severity: material
      topic: cynerio-integration-architecture
      missingEvidence: >-
        The technical integration plan and architecture for combining Cynerio's passive network monitoring
        engine with the Axonius adapter-based normalization pipeline is not publicly disclosed; the two
        data collection models (API pull vs. passive capture) require significant integration work.
      whyItMatters: >-
        Integration complexity may delay the combined product timeline, increase development costs, and
        create customer-visible inconsistencies between medical device inventory and IT asset inventory;
        affects the Cynerio acquisition return model.
      diligencePath: >-
        Request Cynerio integration roadmap; evaluate combined data schema design; assess engineering
        team capacity dedicated to integration; request HIPAA/HITRUST compliance plan for combined product.
      relatedQuestionRefs:
        - QE007
        - QE025

    - type: private-evidence-only
      severity: material
      topic: cloud-infrastructure-and-sla
      missingEvidence: >-
        Axonius's cloud infrastructure provider (likely AWS but unconfirmed), data center regions,
        historical uptime, SLA guarantees, and SLA penalty terms are not publicly disclosed; the status
        page exists but does not provide audit-quality reliability data.
      whyItMatters: >-
        Cloud provider dependency and uptime SLA terms are standard enterprise procurement requirements;
        undisclosed SLA terms prevent enterprise customers from validating Axonius's reliability
        commitments against internal service level requirements.
      diligencePath: >-
        Request SLA terms and historical uptime data; review DPA for cloud provider dependency
        disclosures; review incident response records.
      relatedQuestionRefs:
        - QE009

    - type: private-evidence-only
      severity: minor
      topic: developer-ecosystem-depth
      missingEvidence: >-
        Axonius's developer ecosystem (GitHub activity, SDK adoption, third-party adapter community,
        API usage metrics) is not publicly disclosed; the minimal GitHub org activity and absence of a
        third-party adapter marketplace are indicators of a nascent developer ecosystem.
      whyItMatters: >-
        A nascent developer ecosystem limits platform extensibility and slows customer adoption of
        custom integrations; competitors with stronger developer programs (e.g., Splunk, ServiceNow)
        may attract more complex enterprise deployments requiring custom workflows.
      diligencePath: >-
        Request API usage metrics; assess SDK documentation completeness; check for third-party adapter
        contributions in GitHub org; evaluate API developer community (forums, support channels).
      relatedQuestionRefs:
        - QE006
        - QE018
        - QE023

    - type: enumeration-incomplete
      severity: material
      topic: product-module-revenue-contribution
      missingEvidence: >-
        Revenue contribution by product module (CAASM vs SaaS Management vs SAM vs Federal vs Cynerio)
        is not publicly disclosed; without module-level revenue data, the diversification and cross-sell
        thesis cannot be independently validated.
      whyItMatters: >-
        If 90%+ of ARR is concentrated in core CAASM with negligible SAM and SaaS Management attachment,
        the multi-product expansion thesis is undermined; module-level breakdown is a standard investment
        due diligence question.
      diligencePath: >-
        Request ARR breakdown by product module; request cross-sell attach rate (CAASM customers who
        also purchase SAM or SaaS Management); request Cynerio standalone ARR before acquisition.
      relatedTableRefs:
        - TE001
      relatedQuestionRefs:
        - QE001
        - QE011

    - type: private-evidence-only
      severity: minor
      topic: scalability-limits-and-release-cadence
      missingEvidence: >-
        Axonius's scalability architecture (maximum asset count, maximum adapter count, query response
        time at enterprise scale) and product release cadence (update frequency, patch delivery mechanism,
        change management for federal edition) are not publicly disclosed or benchmarked.
      whyItMatters: >-
        Customers deploying Axonius at 500K+ asset scale need scalability assurance; the federal on-prem
        edition release cadence affects compliance posture as new threats emerge; both are standard
        enterprise SaaS procurement questions.
      diligencePath: >-
        Request scalability benchmarks from engineering team; request production deployment metrics from
        reference customers with 500K+ asset deployments; request federal edition release cadence and
        change advisory board process.
      relatedQuestionRefs:
        - QE022
        - QE024
