figures:
    - id: FE001
      title: Product architecture map
      type: stack
      layout: wide
      summary: >-
        Technology stack layers for the Axonius CAASM platform from data collection at the bottom to
        user-facing policy enforcement at the top. Each layer depends on the layer below it; failure or
        gaps at any layer propagate upward.
      data:
        items:
          - label: "User Interface and Reporting Layer"
            note: "Web dashboard; asset search and query; policy violation alerts; executive reporting; custom dashboards."
          - label: "Policy Enforcement and Automation Layer"
            note: "Rule-based policy engine; alert triggers; ITSM ticket creation (ServiceNow, Jira); SOAR playbook invocation; REST API webhooks."
          - label: "Asset Relationship and Graph Layer"
            note: "Relationship mapping between assets, users, cloud resources, and software; entity resolution; coverage gap identification."
          - label: "Data Normalization and Deduplication Engine"
            note: "Schema translation from 400+ tool-specific schemas to unified Axonius asset schema; entity deduplication via MAC, hostname, serial number correlation."
          - label: "Adapter Collection and Integration Layer"
            note: "400+ API-based adapters; agentless; scheduled polling of EDR, MDM, CMDB, cloud, identity, network, vulnerability, and SaaS tools."
          - label: "Security and Compliance Infrastructure"
            note: "SOC 2 Type II; ISO 27001; FedRAMP Moderate (Federal edition); multi-tenant SaaS (AWS inferred) + on-prem Federal deployment option."
      approximationNotes: >-
        Architecture layers inferred from public Axonius product documentation, adapters page, and
