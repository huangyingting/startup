    - id: TE003
      title: Technology / operating architecture table
      columns:
        - layer/process/component
        - role
        - dependency
        - risk
      rows:
        - - Adapter collection layer
          - API connectors to 400+ third-party tools; scheduled telemetry pull; no agents on endpoints
          - Third-party tool REST APIs; API credentials managed by customer
          - API deprecation, rate-limiting, or credential rotation by vendors disrupts data freshness
        - - Data normalization engine
          - Schema translation; maps heterogeneous tool data to unified Axonius asset schema
          - Proprietary internal algorithm; adapter-specific normalization rules
          - Normalization accuracy degrades when adapters are missing or tool data is inconsistent; benchmarks not public
        - - Deduplication engine
          - Entity resolution; identifies same physical asset appearing in multiple tools under different IDs
          - Proprietary correlation algorithm (MAC address, hostname, IP, serial number matching)
          - False positives/negatives in deduplication create ghost records or merged records; error rate not disclosed
        - - Asset relationship graph
          - Maps relationships between assets, users, software, cloud resources, and policies
          - Internal graph data store (technology stack not disclosed)
          - Schema complexity grows with adapter breadth; query performance at scale not benchmarked publicly
        - - Policy enforcement engine
          - Rule-based automation; triggers alerts, ITSM tickets, and remediation workflows on policy violations
          - REST API integrations with SIEM, SOAR, ITSM (ServiceNow, Jira, Splunk, others)
          - Policy library update cadence not disclosed; rule complexity may require security engineering expertise
        - - Cloud SaaS delivery (multi-tenant)
