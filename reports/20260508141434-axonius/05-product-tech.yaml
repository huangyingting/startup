  claims:
    - id: CE001
      statement: >-
        Axonius's primary product is a CAASM (Cyber Asset Attack Surface Management) platform that creates
        a unified, normalized inventory of all assets across IT, cloud, OT, IoT, and SaaS environments
        by connecting to existing security and IT tools via API-based adapters without deploying agents
        on managed endpoints.
      type: third-party-reported
      topic: core-product-definition
      sourceRefs:
        - SE001
        - SE002
        - SE017
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
      contradictsClaimRefs: []

    - id: CE002
      statement: >-
        Axonius offers 400+ pre-built adapter integrations covering endpoint security (EDR), mobile device
        management (MDM), cloud infrastructure, identity providers, network discovery, vulnerability
        management, CMDB, and SaaS platforms; the adapter breadth is a primary competitive differentiator
        versus CAASM competitors with smaller libraries.
      type: third-party-reported
      topic: adapter-breadth
      sourceRefs:
        - SE002
        - SE003
        - SE011
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
        - QE020
      contradictsClaimRefs: []

    - id: CE003
      statement: >-
        The Axonius platform uses an agentless architecture: adapters pull telemetry from existing tools
        via scheduled API calls without installing any software on managed endpoints or assets; this
        reduces deployment friction and eliminates agent management overhead for customers.
      type: third-party-reported
      topic: agentless-architecture
      sourceRefs:
        - SE002
        - SE007
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE002
        - QE021
      contradictsClaimRefs: []

    - id: CE004
      statement: >-
        The Axonius data pipeline includes normalization (mapping heterogeneous tool schemas to a unified
        asset schema), deduplication (entity resolution using MAC address, hostname, serial number, and
        IP correlations), and enrichment (relationship mapping between assets, users, software, and
        cloud resources); this produces a single authoritative asset record per managed entity.
      type: third-party-reported
      topic: data-normalization-pipeline
      sourceRefs:
