    - id: TE002
      title: Workflow / use-case table
      columns:
        - user job
        - current workflow
        - Axonius solution
        - measurable benefit
        - limitation
      rows:
        - - Unified asset discovery and inventory
          - Manual spreadsheets; disparate tool reports; CMDB hygiene projects; periodic audits
          - CAASM adapters pull from all tools; single normalized record per asset; real-time coverage gap detection
          - 156% ROI; $3.22M NPV; <6 month payback (Forrester TEI, March 2025; N=composite)
          - Forrester TEI is vendor-commissioned composite; individual customer outcomes vary; NPS not disclosed
        - - Security coverage gap detection
          - Manual cross-reference of MDM vs EDR vs vulnerability scanner; error-prone; no unified view
          - Policy engine identifies assets missing security controls (e.g., device not in EDR, no patch applied)
          - Estimated $775K savings/year in risk reduction for 400K-700K device deployment per Forrester TEI
          - Gap detection quality depends on adapter completeness; adapter failure modes not published
        - - SaaS application governance
          - Shadow IT discovery via network monitoring; manual SaaS subscription audits; Okta license review
          - SaaS Management discovers unauthorized apps via identity/SSO adapters; enforces access lifecycle policy
          - Reduces SaaS sprawl; prevents orphaned accounts; decreases SaaS audit prep time
          - Dedicated SSPM vendors (Obsidian, Grip) may offer deeper SaaS analytics; depth comparison not available
        - - Software license compliance and SAM
          - Separate SAM tool; manual license reconciliation; audit response preparation
          - SAM module consolidates license data from software discovery adapters + asset context
          - Eliminates standalone SAM tool cost; reduces audit response time
          - SAM depth (concurrent license tracking, complex license models) vs specialized SAM vendors not benchmarked
        - - Federal/DoD asset management and CMRS
          - FISMA compliance reporting; manual CMDB updates; multi-tool reconciliation; audit burden
          - Axonius Federal Systems delivers FedRAMP-authorized CAASM; automates CMRS reporting
          - Multi-year DoD contract; 4 of 5 DoD branches adopting; reduces compliance reporting burden
          - Federal-specific SLA, deployment architecture, and audit trail details not publicly documented
        - - Automated remediation and SOAR integration
          - Manual analyst review of coverage gaps; ticket creation in ITSM; multi-step remediation playbooks
          - Policy enforcement engine creates ITSM tickets, triggers SOAR playbooks, or calls REST API endpoints
          - Reduces mean time to remediation (MTTR) for discovered gaps; reduces analyst manual workload
          - Remediation effectiveness varies by SOAR integration quality; playbook library depth not published
      notes: >-
        Workflow benefits based on Forrester TEI composite (vendor-commissioned). Individual outcomes vary.
        Federal/DoD workflow SLA and audit trail details are not public. Remediation effectiveness depends on SOAR integration quality.
      claimRefs:
