company:
  name: Axonius Inc.
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Axonius operates a cloud-delivered CAASM (Cyber Asset Attack Surface Management) platform built around
    an agentless, adapter-based integration model connecting 400+ third-party tools. The platform normalizes
    disparate asset data into a unified inventory and applies policy enforcement automation. Three core
    commercial modules (CAASM, SaaS Management, Software Asset Management) plus a FedRAMP Moderate-authorized
    federal edition comprise the product line. The Cynerio acquisition (July 2025) adds healthcare IoT
    security. Technical differentiation rests on adapter breadth, normalization depth, and policy engine
    flexibility. Key gaps are AI/ML roadmap maturity, Cynerio integration architecture, and scalability
    benchmarks at enterprise scale.

sections:
  - id: section-1
    title: Product suite and module overview
    body: >-
      Axonius delivers a multi-module cybersecurity asset management platform. The core product is CAASM
      (Cyber Asset Attack Surface Management): a unified asset inventory that collects telemetry from all
      existing security and IT tools via API-based adapters, normalizes and deduplicates the data into a
      single record per asset, and surfaces policy violations, coverage gaps, and risk prioritization for
      security and IT operations teams. CAASM is the primary revenue driver and the foundation module
      that all other products extend.

      Beyond core CAASM, Axonius has expanded into two adjacent modules: SaaS Management (SaaS Security
      Posture Management / SSPM) discovers authorized and unauthorized SaaS applications, manages user
      access, and enforces governance policies across the SaaS estate; and Software Asset Management (SAM)
      consolidates software license data with the asset inventory to automate license compliance, reduce
      audit risk, and identify wasteful spend. Both modules operate within the same platform and leverage
      the existing adapter ecosystem, minimizing incremental deployment friction for existing CAASM
      customers.

      The Axonius Federal Systems subsidiary delivers a FedRAMP Moderate-authorized edition of the platform
      for U.S. government customers, with separate infrastructure and security controls that meet FISMA and
      DoD requirements. Cynerio, acquired July 2025 for up to $250M, contributes a healthcare IoT and
      medical device security capability; the integration timeline and combined product architecture are not
      yet publicly disclosed. No freemium, community, or trial editions are offered; all products require
      enterprise procurement through direct sales.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE009
      - CE010
      - CE011
      - CE012

  - id: section-2
    title: Architecture, integration model, and developer platform
    body: >-
      The Axonius platform's core technical architecture is an agentless, adapter-based integration model.
      Adapters are API connectors — one per third-party tool — that pull asset telemetry from existing
      customer tools on a scheduled basis without deploying software agents on managed endpoints. The
      adapter library covers 400+ tools spanning endpoint detection and response (EDR), mobile device
      management (MDM), cloud security posture, CMDB, identity providers, network scanners, vulnerability
      management, and SaaS platforms. Adapters are managed and updated by Axonius; customers activate
      adapters and configure credentials; the architecture deliberately minimizes configuration burden on
      customer IT teams.

      Data collected by adapters flows through a multi-stage data pipeline: raw collection is followed by
      normalization (mapping heterogeneous tool schemas to a unified asset schema), deduplication
      (identifying that the same physical asset appears in multiple tools under different identifiers), and
      enrichment (adding metadata, classification, and relationship mapping). The output is a single
      authoritative asset record per device, user, or cloud resource. A policy enforcement engine then
      applies user-defined and pre-built rules to detect violations, trigger alerts, create ITSM tickets,
      and initiate automated remediation workflows via REST API integrations with SIEM, SOAR, and ITSM
      platforms.

      Axonius exposes a REST API for programmatic access and provides a developer SDK for customers
      building custom adapters or automating workflows. Documentation is available at docs.axonius.com.
      GitHub activity under the Axonius organization is minimal — reflecting the proprietary, enterprise
      SaaS nature of the platform — with no significant OSS contribution or community framework. The
      limited developer ecosystem is a gap relative to more platform-oriented security vendors (e.g.,
      Splunk, ServiceNow) that have built large third-party developer communities.
    claimRefs:
      - CE003
      - CE004
      - CE005
      - CE008
      - CE017
      - CE018
      - CE023
      - CE024
      - CE031

  - id: section-3
    title: Trust, security, compliance, and reliability
    body: >-
      Axonius holds SOC 2 Type II certification for its commercial cloud environment, demonstrating
      operational controls for security, availability, and confidentiality. ISO 27001 certification is
      also claimed on the Axonius Security Center page. The Axonius Federal Systems subsidiary has
      achieved FedRAMP Moderate authorization, enabling deployment in federal agency environments;
      FedRAMP High authorization — required for the most sensitive government systems — has not been
      publicly confirmed, limiting access to the highest-classification federal environments.

      GDPR compliance is claimed for EU customer data handling, though no independent GDPR audit
      certificate is publicly disclosed. The integration of Cynerio introduces healthcare IoT and medical
      device data; HIPAA Business Associate Agreement (BAA) availability and HITRUST certification for
      the combined Cynerio product line have not been confirmed in public sources, representing a
      compliance gap for hospital customers requiring HIPAA coverage. Axonius operates a public status
      page; historical uptime data and SLA terms are not published, making it difficult to independently
      assess reliability commitments. No public CVE record for Axonius was found in the National
      Vulnerability Database; however, a formal bug bounty program or public responsible disclosure
      policy is not prominently published.
    claimRefs:
      - CE006
      - CE007
      - CE015
      - CE025
      - CE026
      - CE027
      - CE028
      - CE032
      - CE035

  - id: section-4
    title: Competitive differentiation and roadmap
    body: >-
      Axonius's primary technical differentiation is the breadth of its adapter library (400+ connectors),
      the accuracy of its normalization engine, and the depth of policy enforcement integration with existing
      customer toolsets. Competitors (Armis, runZero, Lansweeper) have fewer adapters or focus on specific
      asset classes (OT/IoT, network discovery). The deep adapter integration creates switching costs: once
      a customer has configured 40-80 adapters and built automated policies around the normalized asset
      view, replacing Axonius requires reconfiguring all integrations and rebuilding policies in a competing
      platform — a multi-month effort with significant security risk during transition.

      Announced roadmap investments include AI/ML-powered policy recommendations (reducing manual rule
      authoring for security teams), deeper integration of Cynerio's healthcare IoT capabilities within
      the main Axonius platform, and continued international expansion with support for EMEA-specific
      data residency and compliance requirements. Axonius has not published a detailed feature roadmap
      with committed dates; all roadmap claims from public sources should be treated as unverified
      management guidance. The CEO transition to Joe Diamond (February 2026) and CFO Kramer's background
      (previously Sumo Logic) signal preparation for a public company operating model, which will require
      faster feature delivery transparency and investor-grade reporting discipline.
    claimRefs:
      - CE013
      - CE019
      - CE020
      - CE022
      - CE029
      - CE033
      - CE036
      - CE037

