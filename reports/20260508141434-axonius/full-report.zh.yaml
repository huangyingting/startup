      - number: '8.4'
        title: 建议、风险评级与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              建议：观察 / 有条件买入。风险评级：高。信心：中。在上一轮 $2.6B
              估值下，风险/回报曲线下行不对称：基准情景意味着持平到温和回报，悲观情景意味着本金损失，乐观情景需要多个条件同时确认。若没有三个已确认条件，这笔投资在 $2.6B 不是买入：（1）聘任正式 CEO；（2）确认
              Cynerio 的 HIPAA 认证；（3）资料室确认 NRR > 110%。

              若以 $2.0-2.2B 进入（较 Series E 折价 15-23%），基准情景提供 20-40% 回报，乐观情景提供 60-125%，悲观情景在 M&A 底部把损失限制在
              0-10%。如果市场条件恶化，这一进入纪律可通过老股交易或过桥轮实现。没有老股交易渠道的投资者应先跟踪 CEO 交接和 HIPAA 认证里程碑，再决定是否按 Series E 价格投入。

              关键尽调问题整理在最终表中。最高优先级包括：（1）确认 NRR 和总留存；（2）Cynerio 收购后的现金跑道；（3）CEO 搜索时间线和董事会标准；（4）HIPAA 认证路线图；（5）DoD CMRS
              续约概率和时间线。第 7 章中的投资逻辑失效触发器直接适用：NRR 低于 90%、DoD 不续约、CEO 搜索失败，或以低于 $2B 估值融资，任何一项都单独构成投资逻辑失效事件，需要退出仓位。
