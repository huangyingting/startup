      - number: '7.4'
        title: 财务与竞争风险
        blocks:
          - type: paragraph
            body: >-
              资本充足性是财务风险：Axonius 2025 年 7 月花费约 $200M 收购 Cynerio，而 Series E 后资本基础未确认（2024 年 3 月融资 $200M）；剩余现金跑道未知；如果在成功
              IPO 或追加融资前，现金低于 12 个月烧钱需求，Axonius 将面临过桥融资风险，条款可能不利。2025 年 Form D 文件暗示公司已经或可能正在融资，但金额和条款未确认。

              随着 CAASM 市场吸引大型平台厂商，竞争风险正在上升。Microsoft（Defender for Endpoint/EASM）、Palo Alto Networks（Cortex
              XSIAM）、CrowdStrike（Falcon platform）和 Cisco（SecureX/Vulnerability Management）都有能力把类似 CAASM
              的功能嵌入更大的平台，进而商品化独立 CAASM。若大型平台厂商（如 Microsoft）向现有客户以零增量成本提供“够用的”CAASM，Axonius 在以 Microsoft
              为中心的企业客户群中可能面临显著流失。这是最重要的长期战略风险。

              IPO 市场风险：Axonius 预期 IPO 取决于公开市场对网络安全 SaaS IPO 的胃口；2022 年以来该胃口 波动较大。如果公开市场环境恶化（利率上行、倍数压缩、避险情绪），IPO
              窗口可能关闭；若到 2027 年仍未 IPO，投资者会加大推动 M&A 退出的压力，估值可能低于 $2.6B Series E 价格，令后期投资者确认损失。Cisco 以 $2B 讨论收购（据报道被拒）表明
              M&A 场景下底部估值可能低于上一轮价格。
