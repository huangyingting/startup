      - number: '6.3'
        title: 留存、扩张与耐久性
        blocks:
          - type: paragraph
            body: >-
              Axonius 未披露净留存率（NRR）、总美元留存（GDR）、流失率或续约率；这些是评估 670+ 客户群耐久性最关键的未披露指标。不过，多重结构因素支持高 NRR
              假设：基于适配器的集成模型形成深切换成本（客户配置 40-80+ 适配器并搭建自定义策略规则）；按资产数定价的模型会随客户资产规模增长自然扩张；平台在合规报告中的作用（联邦 FISMA、商业 SOC 2
              审计准备）也让客户很难在不损害合规流程的情况下移除它。

              Forrester TEI 研究称客户回本周期 <6 个月，说明价值兑现快，也支撑留存；第一年内回本的客户从统计上更不容易流失。留存健康度的代理指标包括：在 670+ 客户规模下，2024 年 ARR
              同比线性增长 51.5%；这一增速与新增客户加扩张相符，但具体拆分未知。

              扩张风险主要由宏观因素驱动：如果客户资产数持平（经济放缓、资产优化计划），来自存量客户的 ARR 增长会放慢；Axonius 没有维持平台所需的最低席位扩张要求。集中度风险中等：没有公开确认单一客户占 ARR
              超过 5%，但 DoD CMRS 合同可能构成政府收入的实质集中；如果 DoD 不续约，联邦 ARR 可能明显下滑。长尾的 600+ 较小企业客户提供了分散化。
