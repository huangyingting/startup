      - number: '2.5'
        title: 佐证要点
        blocks:
          - type: callout
            title: CAASM 市场 21% CAGR 增长来自结构性需求，而非周期波动
            body: >-
              资产蔓延、上云和监管要求创造了独立于 IT 预算周期的结构性需求。零信任架构要求让资产盘点成为不可自由裁量的安全投入，相比可选安全工具，需求更持久。Axonius
              受益于品类开创者身份，也是这一细分市场中少数达到规模的独立供应商之一。
            calloutType: strength
            claimRefs:
              - CM006
              - CM020
              - CM021
              - CM022
          - type: callout
            title: Palo Alto 或 CrowdStrike 的平台整合是中期品类风险
            body: >-
              拥有既有企业关系的大型安全平台厂商，可以把等同 CAASM 的功能嵌入其 XDR、SASE 或 CNAPP 平台。风险并非迫在眉睫——Axonius 的集成深度（400+ 适配器）是有意义的护城河——但随着
              Palo Alto Networks 和 CrowdStrike 扩大平台野心，风险会升高。2026 年初 Cisco 收购传闻被否认，说明生态层面已经考虑过收购式路径。
            calloutType: risk
            claimRefs:
              - CM026
              - CM027
          - type: callout
            title: 联邦市场用非自由裁量预算提供结构性底线
            body: >-
              CISA CDM 项目和 DoD CMRS 合同为 Axonius Federal Systems 创造由监管要求而非 CISO 自由裁量支配的联邦资金需求底线。CMMC Phase 2/3
              推进（2025–2026）还会为国防承包商带来一轮合规驱动采购。
            calloutType: insight
            claimRefs:
              - CM022
