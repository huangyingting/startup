  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: wide
    summary: 决策流程从证据输入（市场、产品、客户、财务、风险、估值）出发，经过关键条件，落到最终的观察 / 条件买入建议及升级条件。
    data:
      nodes:
        - id: market
          label: 市场 — CAASM TAM 为 $8.5B；28% CAGR；零信任强制要求
          category: input
        - id: product
          label: 产品 — 400+ 个适配器；
          category: input
        - id: customers
          label: 客户 — 670+ 家企业；DoD CMRS；Forrester TEI 156% ROI
          category: input
        - id: financials
          label: 财务 — $151.5M ARR；增长 51.5%；NRR 未确认
          category: input
        - id: risks
          label: 风险 — 临时 CEO；HIPAA 缺口；CAASM 商品化；资本状况未知
          category: input
        - id: valuation
          label: 估值 — $2.6B，对应 17x ARR；入场估值已满；基准情景回报持平至小幅上行
          category: input
        - id: thesis
          label: 市场 + 产品 + 客户证据强 → 投资逻辑仍成立
          category: logic
        - id: antithesis
          label: CEO 风险 + HIPAA 缺口 + NRR 未知 + 估值已满 → 反向逻辑重大
          category: logic
        - id: condition1
          label: 条件 1 — 聘任正式 CEO（上市公司操盘手）
          category: condition
        - id: condition2
          label: 条件 2 — Cynerio HIPAA 认证已确认
          category: condition
        - id: condition3
          label: 条件 3 — 数据室确认 NRR > 110%
          category: condition
        - id: track
          label: 观察 — 跟踪 3-6 个月；等待条件确认
          category: output
        - id: buy
          label: 条件买入 — 3 个条件全部满足；以 $2.0-2.6B 入场
          category: output
        - id: exit
          label: 回避 / 退出 — 投资逻辑破裂触发项已确认
          category: output
      edges:
        - from: market
          to: thesis
          label: 市场证据
        - from: product
          to: thesis
          label: 产品证据
        - from: customers
          to: thesis
          label: 客户证据
        - from: financials
          to: antithesis
          label: 未确认指标
        - from: risks
          to: antithesis
          label: 执行风险
        - from: valuation
          to: antithesis
          label: $2.6B 估值已满
        - from: thesis
          to: track
          label: 投资逻辑有效，但条件未解决
        - from: antithesis
          to: track
          label: 反向逻辑重大；等待条件
        - from: condition1
          to: buy
          label: CEO 问题解决
        - from: condition2
          to: buy
          label: HIPAA 已确认
        - from: condition3
          to: buy
          label: NRR 已确认
        - from: track
          to: exit
          label: 投资逻辑破裂触发
    claimRefs:
      - CV001
      - CV021
      - CV022
      - CV023
      - CV024
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: >-
      将 EV/NTM Revenue 倍数套用到预计 $200-220M 的 NTM Revenue 区间，展示从悲观情景倍数（Rapid7 档）到乐观情景倍数（CrowdStrike 档）的估值结果。数值以 $M
      表示。Series E 入场估值 $2,600M 作为参考。
    data:
      items:
        - label: 悲观：5x NTM Revenue
          value: 1050
          detail: Rapid7 档：低速增长 / 增长放缓情景；$210M NTM Revenue
          tone: negative
        - label: 压力：7x NTM Revenue
          value: 1470
          detail: Qualys/Tenable 档：成熟网络安全 SaaS 倍数；$210M NTM Revenue
          tone: negative
        - label: 基准低位：10x NTM Revenue
          value: 2100
          detail: 中档上市可比公司：SentinelOne 底部；$210M NTM Revenue
          tone: neutral
        - label: 基准：12x NTM Revenue
          value: 2520
          detail: 基准情景 IPO 倍数；$210M NTM Revenue；约等于 Series E 价格
          tone: neutral
        - label: 基准高位：15x NTM Revenue
          value: 3150
          detail: IPO 执行强：CEO 已确认 + NRR 115%+；$210M NTM Revenue
          tone: positive
        - label: 乐观：18x NTM Revenue
          value: 3780
          detail: 接近 CrowdStrike 档：AI 驱动需求；条件已确认；$210M NTM Revenue
          tone: positive
        - label: 溢价：22x NTM Revenue
          value: 4620
          detail: CrowdStrike 档：持续 40%+ 增长 + NRR 120%+ + AI 定位；$210M NTM Revenue
          tone: positive
    notes: >-
      所有估值均按 $210M NTM Revenue 计算（$200-220M 的 2025 年预测中点）。EV/NTM Revenue 倍数来自公开可比公司分析。Series E 入场价格 $2,600M 意味着在 $210M
      NTM Revenue 下为 12.4x。数值以 $M USD 表示。
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 各投资情景（悲观、基准、乐观）和具体参考点（M&A 底价、Series E 入场、IPO 目标）的估值结果区间。数值以 $M USD 表示。
    data:
      items:
        - label: M&A 底价（Cisco 情景）
          low: 1800
          high: 2200
          value: $1.8-2.2B
          detail: 公司收购方底部估值（Cisco $2B 报道；战略 M&A 区间）
          tone: negative
        - label: 悲观情景（IPO 估值压缩或 M&A）
          low: 1500
          high: 2100
          value: $1.5-2.1B
          detail: 按 $185M ARR 给 8-10x NTM Revenue；增长放缓 + CEO 风险 + 平台竞争
          tone: negative
        - label: Series E 入场
          low: 2600
          high: 2600
          value: $2.6B
          detail: Series E 估值（2024 年 3 月）；后期投资者的盈亏平衡参考
          tone: neutral
        - label: 基准情景（2027 年 IPO）
          low: 2400
          high: 3500
          value: $2.4-3.5B
          detail: 按 $200-220M ARR 给 12-16x NTM Revenue；CEO + HIPAA + NRR 105-115% 均已确认
          tone: neutral
        - label: 乐观情景（2026-2027 年 IPO）
          low: 3500
          high: 5000
          value: $3.5-5.0B
          detail: 按 $220M+ ARR 给 18-22x NTM Revenue；所有条件均确认；网络安全 SaaS 市场强劲
          tone: positive
        - label: 优先入场点（老股交易）
          low: 2000
          high: 2200
          value: $2.0-2.2B
          detail: 较 Series E 折价 15-23%；基准情景回报 20-40%；M&A 底价下悲观情景亏损有限
          tone: positive
    notes: 上述区间是情景估计，不是正式估值模型输出。$2.0-2.2B 的优先入场点在 M&A 底价下提供有意义的下行保护，同时保留基准和乐观情景中的较大上行。Series E 投资方以 $2.6B 入场，基准情景回报有限。
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: wide
    summary: 可直接进 IC 的 Axonius 关键投资维度评分卡。每一项代表一个评估维度，并给出评分和支撑理由。
    data:
      items:
        - label: 市场机会
          value: HIGH — $8.5B CAASM TAM; 28% CAGR; zero trust mandates drive structural demand
        - label: 品类领导力 / 护城河
          value: HIGH — Largest adapter library (400+); widest enterprise base (670+); Gartner leader
        - label: 客户韧性
          value: MEDIUM-HIGH — Forrester TEI 156% ROI; high G2/Gartner satisfaction; NRR UNCONFIRMED
        - label: 收入增长
          value: HIGH — $151.5M ARR; 51.5% YoY growth; projected $200M+ in 2025
        - label: 财务指标质量
          value: LOW — NRR, gross margin, burn rate all undisclosed; significant blind spots
        - label: 管理团队
          value: MEDIUM — CFO IPO-ready; CEO transition unresolved; geopolitical R&D risk
        - label: 竞争位置
          value: 'MEDIUM-HIGH — #1 CAASM by adapters; platform vendor CAASM threat is credible'
        - label: 联邦市场验证
          value: HIGH — DoD CMRS multi-year; 4 of 5 branches; FedRAMP Moderate authorized
        - label: 估值纪律
          value: MEDIUM — $2.6B (17x ARR) is full; secondary entry at $2.0-2.2B provides margin of safety
        - label: 执行风险
          value: HIGH RISK — CEO interim; HIPAA gap; Cynerio integration; capital adequacy unknown
        - label: 证据质量
          value: MEDIUM — Strong product/market evidence; financial metrics require data room confirmation
        - label: 总体建议
          value: 'TRACK / CONDITIONAL BUY — Upgrade on: CEO hire + HIPAA + NRR > 110% at $2.0-2.6B entry'
    notes: IC 评分为定性、基于证据。每个维度反映公开可得证据和推断出的缺口。财务指标维度为低，是因为 NRR 和利润率数据完全缺失；这个单一缺口是整个评估中最重大的承销风险。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV021
      - CV024
      - CV025
