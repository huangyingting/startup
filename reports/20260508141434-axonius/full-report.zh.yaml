      - number: '5.2'
        title: 架构、集成模式与开发者平台
        blocks:
          - type: paragraph
            body: >-
              Axonius 平台的核心技术架构，是无代理、基于适配器的集成模式。适配器是 API 连接器——每个第三方工具一个——按计划从客户既有工具拉取资产遥测数据，而不需要在托管终端上部署软件代理。适配器库覆盖 400+
              个工具，横跨终端检测与响应（EDR）、移动设备管理（MDM）、云安全态势、CMDB、身份提供商、网络扫描器、漏洞管理和 SaaS 平台。适配器由 Axonius
              管理和更新；客户启用适配器并配置凭据；该架构有意降低客户 IT 团队的配置负担。

              适配器采集的数据进入多阶段数据管道：先做原始采集，再做标准化（把异构工具数据结构映射到统一资产数据结构）、去重（识别同一物理资产在多个工具中以不同标识出现）和增强（添加元数据、分类和关系映射）。输出是一台设备、一个用户或一个云资源对应的一条权威资产记录。随后，策略执行引擎应用用户定义和预构建规则，检测违规、触发告警、创建
              ITSM 工单，并通过与 SIEM、SOAR 和 ITSM 平台的 REST API 集成发起自动化修复工作流。

              Axonius 暴露 REST API 供程序化访问，并为构建自定义适配器或自动化工作流的客户提供开发者 SDK。文档位于 docs.axonius.com。Axonius 组织名下的 GitHub
              活动很少，反映出平台自研、企业 SaaS 的性质；没有显著 OSS 贡献或社区框架。相比 Splunk、ServiceNow 等已经建立大型第三方开发者社区的平台型安全厂商，有限的开发者生态是一个缺口。
