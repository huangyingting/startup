    rows:
      - - 统一资产发现与清单
        - 手工表格；分散工具报告；CMDB 清理项目；定期审计
        - CAASM 适配器从所有工具拉取数据；每个资产形成单一规范化记录；实时发现覆盖缺口
        - 156% ROI；$3.22M NPV；<6 个月回本（Forrester TEI，2025 年 3 月；N=组合样本）
        - Forrester TEI 是厂商委托的组合样本；单个客户结果会有差异；NPS 未披露
      - - 安全覆盖缺口发现
        - 手工交叉核对 MDM、EDR 和漏洞扫描器；容易出错；没有统一视图
        - 策略引擎识别缺少安全控制的资产（例如设备未纳入 EDR、未打补丁）
        - Forrester TEI 估计，400K-700K 台设备部署每年可节省 $775K 风险降低成本
        - 缺口发现质量取决于适配器完整性；适配器失效模式未公布
      - - SaaS 应用治理
        - 靠网络监控发现影子 IT；手工审计 SaaS 订阅；审核 Okta 许可证
        - SaaS 管理通过身份 / SSO 适配器发现未授权应用；执行访问生命周期策略
        - 减少 SaaS 蔓延；防止孤儿账户；缩短 SaaS 审计准备时间
        - 专用 SSPM 厂商（Obsidian、Grip）可能提供更深的 SaaS 分析；深度对比不可得
      - - 软件许可证合规和 SAM
        - 独立 SAM 工具；手工对账许可证；准备审计响应
        - SAM 模块整合来自软件发现适配器的许可证数据，并叠加资产上下文
        - 省掉独立 SAM 工具成本；缩短审计响应时间
        - SAM 深度（并发许可证跟踪、复杂许可证模型）相对专业 SAM 厂商未对标
      - - 联邦 / DoD 资产管理和 CMRS
        - FISMA 合规报告；手工更新 CMDB；多工具对账；审计负担
        - Axonius Federal Systems 提供获 FedRAMP 授权的 CAASM；自动化 CMRS 报告
        - DoD 多年合同；5 个 DoD 军种中 4 个采用；降低合规报告负担
        - 联邦专属 SLA、部署架构和审计轨迹细节未公开记录
      - - 自动化修复和 SOAR 集成
        - 分析师手工审查覆盖缺口；在 ITSM 创建工单；多步修复剧本
        - 策略执行引擎创建 ITSM 工单、触发 SOAR 剧本，或调用 REST API 端点
        - 缩短已发现缺口的平均修复时间（MTTR）；减少分析师手工工作量
        - 修复效果随 SOAR 集成质量而变；剧本库深度未公布
