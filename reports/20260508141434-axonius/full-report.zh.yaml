      - number: '6.4'
        title: 反向证据与客户风险
        blocks:
          - type: paragraph
            body: >-
              Axonius 的负面客户证据有限，但确实存在。G2 评论批评 Axonius 定价“不透明”，且“小型资产池很难证明合理性”；多条评论指出其采用报价制，对中端市场潜在客户而言“昂贵”，说明 Axonius
              在大型企业之外的可服务市场可能有限。一位 PeerSpot 评论者提到，“初始设置和适配器配置耗时比预期更长”，且某些适配器在特定工具版本上存在数据质量问题。

              Cisco 收购讨论（2023-2024 年，据报道 Axonius 拒绝 $2B 报价）会制造客户不确定性：如果 Axonius 被视为潜在收购目标，部分客户可能推迟续约，或试点竞品以降低依赖风险。2024
              年末约 100 人裁员也让产品路线图速度和客户成功覆盖产生不确定性，尽管公开资料未发现因裁员导致客户流失的证据。

              Cynerio 收购带来一类新风险：采用合并平台的医疗客户需要 HIPAA 合规保证，而这一点尚未确认；HIPAA 认证任何延迟都可能阻挡医院采购。公开数据库未发现 Axonius
              因客户关系卷入公开诉讼、合同纠纷或监管行动。
