      - number: '4.2'
        title: 资本结构、融资历史与资本充足性
        blocks:
          - type: paragraph
            body: >-
              Axonius 已通过六轮已知融资累计融得约 $780M+，并向 SEC 提交了七份 Form D 豁免发行通知（CIK 0001787130），其中包括确认 $200M 融资的 2024 年 Series F
              申报（2024 年 3 月 14 日），以及一份 2025 年申报（2025 年 8 月 14 日），其目的尚未完全公开，但很可能与 Cynerio 融资或过桥资金有关。公司注册于
              Delaware，总部位于纽约州纽约市 41 Madison Avenue, 37th Floor。

              融资历史如下：2017 年种子轮（隐含约 $4M）；2019 年 Series A（$13M）；2020 年 Series B（$58M，估值约 $1B）；2021 年 Series C（$100M，估值
              $1.2B）；2022 年 Series D（$200M，估值 $2.6B）；2024 年 Series E（$200M，估值持平于 $2.6B）。2024 年估值持平是一个反向信号：公司 ARR
              增长，却仍按上一轮同一价格融资，符合「换一种说法的降估值融资」特征，即公司把现金置于估值观感之上。2024 年末约 100 人裁员，说明公司在预期 IPO 前加强成本纪律和现金管理。

              潜在 IPO 的资本充足性：公司拥有 $151.5M ARR，且累计融资约 $780M，资本供给已经很充足。手头现金未披露；最高 $250M 的 Cynerio 收购是一笔重大资本支出。若 2025 年 Form
              D 代表新增股权融资，可能说明 Axonius 需要额外资本来支付 Cynerio 收购。CFO 关于销售周期拉长的公开评论，以及 2026 年初 CEO 转任执行董事长，都更符合 IPO
              准备，而非财务困境——但现金跑道无法独立验证。
