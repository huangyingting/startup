  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: Axonius 关键依赖关系图，展示外部各方的行动或决定如何直接影响平台运营、收入和战略选项。
    data:
      nodes:
        - id: axonius
          label: Axonius Inc.
          category: company
        - id: aws
          label: AWS（推断云托管方）
          category: supplier
          note: 主要 SaaS 交付基础设施；官方未确认；未披露备份方案
        - id: third-party-apis
          label: 400+ 家第三方工具供应商
          category: dependency
          note: EDR、MDM、云、CMDB、身份、SIEM 供应商；每个 API 都是依赖点
        - id: fedramp-pmo
          label: FedRAMP PMO / 美国政府
          category: regulator
          note: 授予联邦市场准入；年度审计和持续监控
        - id: dod-customer
          label: 美国国防部（DoD）
          category: customer
          note: CMRS 多年期合同；覆盖 5 大军种中的 4 个；按战略价值看是最大客户
        - id: microsoft
          label: Microsoft 平台（Azure、M365、Entra ID）
          category: platform
          note: 既是主要适配器依赖，也是竞争风险；可能限制 API 访问
        - id: investors
