        - 适配器越多，数据模式越复杂；大规模查询性能尚无公开基准
      - - 策略执行引擎
        - 基于规则的自动化；策略违规会触发告警、ITSM 工单和修复工作流
        - 通过 REST API 集成 SIEM、SOAR、ITSM（ServiceNow、Jira、Splunk 等）
        - 策略库更新节奏未披露；复杂规则可能需要安全工程能力
      - - 云 SaaS 交付（多租户）
        - 为商业客户提供托管服务；可扩展、持续在线、自动更新
        - AWS（推断，未获官方确认）；多租户架构
        - 依赖云服务商；存在多租户隔离风险；非美国客户有数据驻留约束
      - - 本地部署联邦版
        - 面向 FedRAMP 环境，部署在联邦机构专属基础设施内
        - 客户自管基础设施 + Axonius Federal Systems 支持
        - 功能节奏慢于 SaaS 版；维护负担更重；更新协调成本更高
      - - REST API / 开发者平台
