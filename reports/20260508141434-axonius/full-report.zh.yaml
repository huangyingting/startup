          note: 以 $2.6B 估值投入 $780M+；需要 IPO 或 M&A 实现流动性
        - id: israel-rd
          label: 特拉维夫研发团队
          category: internal
          note: 核心技术和适配器工程；地缘政治集中风险
        - id: cynerio
          label: Cynerio（2025 年 7 月收购）
          category: internal
          note: 医疗 IoT 整合；HIPAA 合规依赖
