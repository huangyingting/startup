      - number: '1.4'
        title: 规模、里程碑、收购与认可
        blocks:
          - type: paragraph
            body: >-
              Axonius 在不到十年里积累了密集的里程碑。公司约在 2017 至 2018 年商业化，2023 年达到 $100M ARR，2024 年达到 $151.5M ARR，并拥有 670+ 企业客户。公司预计
              2025 年 ARR 超过 $200M。2023 年 3 月，其联邦子公司完成两个原型后获得 DoD 批准——一个与 Defense Innovation Unit 合作，另一个与 DISA 的 Emerging
              Technology Directorate 合作——并通过 45 个具体测试用例。2024 年 12 月，DoD 选择 Axonius Federal Systems 现代化 Continuous
              Monitoring and Risk Scoring 项目，此前公司已被纳入 DoD Enterprise Software Initiative Blanket Purchase Agreement 合同。

              2025 年 7 月，Axonius 完成最大一笔收购：以 $180M 收购医疗 IoT 和医疗设备安全公司 Cynerio，若达到里程碑最高可至 $250M。该交易把 Axonius
              扩展到医疗和关键基础设施，并直接促成 2025 年 10 月发布 Axonius for Healthcare 和 Axonius AI，后者是一个用于自动化建议的运营引擎。2025 年 11 月，Axonius
              裁员约 100 人——约占当时约 900 人团队的 10%——公司将其描述为高速增长后的重组。公司拥有 FedRAMP Moderate 授权。所获认可包括 2025 年 Forbes Cloud 100 第
              73 名，以及 2026 年 Forbes America's Best Startup Employers 第 82 名。Axonius Federal Systems
              支持美国国防部五大军种机构中的四个，由总经理 Tom Kennedy 领导。
