  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件与模块概览
        blocks:
          - type: paragraph
            body: >-
              Axonius 提供多模块网络安全资产管理平台。核心产品是 CAASM（网络资产攻击面管理）：一个统一资产清单，通过基于 API 的适配器从所有既有安全和 IT
              工具采集遥测数据，把数据标准化、去重成每项资产的一条记录，并为安全和 IT 运营团队呈现策略违规、覆盖缺口和风险优先级。CAASM 是主要收入驱动，也是所有其他产品延展的基础模块。

              除核心 CAASM 外，Axonius 已扩展到两个邻近模块：SaaS Management（SaaS 安全态势管理 / SSPM）发现已授权和未授权的 SaaS 应用，管理用户访问，并在 SaaS
              资产中执行治理策略；Software Asset
              Management（SAM）把软件许可证数据与资产清单合并，自动化许可证合规、降低审计风险，并识别浪费性支出。两个模块都在同一平台内运行，并复用既有适配器生态，尽量降低现有 CAASM 客户的增量部署摩擦。

              Axonius Federal Systems 子公司为美国政府客户提供获得 FedRAMP Moderate 授权的平台版本，拥有独立基础设施和符合 FISMA、DoD 要求的安全控制。Cynerio 于
              2025 年 7 月被收购，最高价格 $250M，带来医疗 IoT 和医疗设备安全能力；整合时间表和合并后的产品架构尚未公开披露。公司不提供免费增值、社区版或试用版；所有产品都需要通过直接销售进行企业采购。
