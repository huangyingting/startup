      - number: '5.3'
        title: 信任、安全、合规与可靠性
        blocks:
          - type: paragraph
            body: >-
              Axonius 的商业云环境持有 SOC 2 Type II 认证，证明其在安全性、可用性和保密性上的运营控制。Axonius Security Center 页面还称公司获得 ISO 27001 认证。子公司
              Axonius Federal Systems 已取得 FedRAMP Moderate 授权，可部署到联邦机构环境；但最敏感政府系统所需的 FedRAMP High
              授权尚未公开确认，这限制了其进入最高密级联邦环境。

              Axonius 称其处理 EU 客户数据符合 GDPR，但未公开披露独立 GDPR 审计证书。Cynerio 并入后带来医疗 IoT 和医疗设备数据；合并后的 Cynerio 产品线是否提供 HIPAA
              业务伙伴协议（BAA）并取得 HITRUST 认证，公开资料尚未确认。对需要 HIPAA 覆盖的医院客户而言，这是合规缺口。Axonius 有公开状态页；历史可用性数据和 SLA
              条款未发布，外部很难独立评估其可靠性承诺。National Vulnerability Database 未发现 Axonius 的公开 CVE 记录；但公司没有显著发布正式漏洞赏金计划或公开负责任披露政策。
