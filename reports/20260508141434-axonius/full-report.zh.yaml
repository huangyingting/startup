  - id: FP003
    title: 护城河 / 就绪度 KPI
    type: kpi
    layout: standard
    summary: >-
      Axonius 的关键竞争耐久性指标显示：400+ 适配器构成较强集成护城河，670+ 客户、FedRAMP 和 DoD 合同释放健康企业信任信号，2024 年年经常性收入（ARR）增长 51.5%，跑赢 CAASM 市场
      21.3% 复合年增长率（CAGR）。
    data:
      items:
        - label: 适配器 / 集成数量
          value: 400+
          detail: 400+ 工具适配器是主要切换成本护城河；最接近的纯 CAASM 竞争对手 runZero 数量明显少得多。CrowdStrike 和 ServiceNow 的集成库规模相近，但并非专为 CAASM 打造。
          tone: positive
        - label: 企业客户数（2024）
          value: 670+
          detail: 670+ 企业客户，覆盖主要 Fortune 500 公司；标杆销售优势在扩大。客户数增速未知，但 ARR 同比增长 51.5%。
          tone: positive
        - label: 联邦合规认证
          value: FedRAMP Moderate + DoD CMRS
          detail: 已获 FedRAMP Moderate 授权，并拿下 DoD CMRS 多年项目合同。多数 CAASM 原生竞争对手尚未公开确认 FedRAMP 授权，Axonius 因此形成结构性的联邦市场护城河。
          tone: positive
        - label: Axonius ARR 增长 vs CAASM 市场 CAGR
          value: 51.5% vs 21.3%
          detail: Axonius 2024 年 ARR 同比增长 51.5%，约为估计 CAASM 市场 CAGR 的 2.4 倍，说明增长来自抢份额，而不只是市场扩容。
          tone: positive
        - label: 平台整合威胁评级
          value: High (medium-term)
          detail: CrowdStrike Falcon 在大型企业端点渗透率超过 70%，有可能把 CAASM 级资产清单作为既有 agent 的副产品打包出售，这是最大的单一替代风险。
          tone: warning
