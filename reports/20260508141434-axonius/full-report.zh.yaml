      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >-
              Axonius 自创立以来多轮融资约 $700M 至 $856M，区间来自不同来源之间的差异——Calcalist 在 2026 年 2 月报道约 $700M，CRN 在 2026 年引用约
              $856M。融资历史包括：2021 年 $100M Series D，估值 $1.2B；2022 年 3 月由 Accel 和 Silver Lake Waterman 领投的 $200M Series E，估值
              $2.6B；以及 2024 年 3 月由 Lightspeed Venture Partners 和 Accel 共同领投的 $200M Series E 延展轮，估值仍为 $2.6B。CEO Dean
              Sysman 将其称为有意不追求更高估值的决定。2025 年 10 月还完成了一笔未披露金额的融资。

              主要投资方包括 Accel、Lightspeed Venture Partners、Stripes、Bessemer Venture Partners、OpenView 和 Silver Lake
              Waterman。公司尚未盈利，ARR 增长是首要 KPI。CFO Chris Kramer 曾公开承认企业销售周期拉长。Axonius
              已表达推进首次公开募股（IPO）的计划，并把领导层招聘和运营决策包装为通往该目标的步骤。2026 年初，以色列科技媒体 Calcalist 报道称 Cisco 正在深入谈判，以约 $2B 收购
              Axonius。Axonius 公开否认该报道，表示公司「is not in talks to be acquired by Cisco」，其战略是打造一家持久、独立的公司。Cisco 未予置评。2022 至
              2024 年估值持平，而同期 ARR 大幅增长；更准确地说，估值持平反映的是成长型软件公司整体市场倍数压缩，而非业务表现逆转。
