        - 轻微（罚款有限；主要是声誉风险）
        - 隐私政策与 CCPA 对齐；为 California 居民提供退出机制
        - 监管版图在变化；新州法生效后需持续更新合规
        - 确认面向企业客户的 CCPA DPA 条款；审阅数据主体权利流程
      - - 出口管制（EAR / 加密软件分类）
