      - number: '2.4'
        title: 增长驱动、采用约束与监管顺风
        blocks:
          - type: paragraph
            body: >-
              CAASM 的主要增长驱动包括：云和 IoT
              扩散造成难以管理的资产蔓延；零信任架构要求把完整资产可视性作为前提；监管框架（FISMA、CMMC、HIPAA、GDPR、CCPA）要求全面资产跟踪和控制；由未知或未管理资产导致的高知名度泄露事件；以及 CISO
              预算成熟，开始明确为作为安全基础的资产情报拨款。CISA Continuous Diagnostics and Mitigation（CDM）项目要求联邦机构具备资产可视性，直接为 Axonius Federal
              Systems 带来监管驱动。

              采用约束主要包括：初始部署和 API 权限授权复杂（客户必须授予 Axonius 对既有工具的读取权限，会引发内部治理顾虑）；基于资产的定价复杂，买方若不知道准确资产数量就难以预测成本；Axonius CFO
              Chris Kramer 提到的企业销售周期拉长；多轮安全工具整合带来的平台疲劳；以及来自 ServiceNow（ITAM/CMDB）和
              Qualys（CSAM）等既有厂商的竞争，这些厂商已经掌握企业关系。此外，Palo Alto Networks 和 CrowdStrike 等大型平台厂商未来可能进入，在既有平台内复制 CAASM 功能，威胁
              Axonius 的独立品类领导地位。Forrester TEI 研究显示，综合企业 ROI 为 156%、回本周期不到 6 个月，有利于以 ROI 论证采购——但大型部署每年 $775K 的费用仍需要 CISO
              级预算授权。
