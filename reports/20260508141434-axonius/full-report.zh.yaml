        - 持续 3PAO 评估项目；专门联邦合规团队
        - 年度评估缺陷可能触发 POA&M 整改；存在临时授权风险
        - 审阅最新 3PAO 评估报告；确认未关闭 POA&M 项；审查 FedRAMP 持续监控状态
      - - FedRAMP High 授权（尚未取得）
        - 美国联邦（FedRAMP PMO / DoD）
        - 尚未启动（推断）
        - 中（DoD 对 High 有需求）
        - 重大（限制 TS/SCI 和最敏感 DoD 环境）
        - FedRAMP Moderate 授权可作基础；通往 High 还需补充控制
        - 估计需 12-24 个月和 $2-5M+ 额外成本才能取得 FedRAMP High
        - 确认 FedRAMP High 是否在路线图上；评估所需投入；评估 DoD 客户对 High 与 Moderate 的需求差异
      - - GDPR 和 EU 数据驻留（DPC Ireland 监管）
        - EU（GDPR）；主要 DPA：Data Protection Commission Ireland
        - 声称合规；无独立审计证书
        - 中（EU 境内数据处理存在 DPC 调查风险）
        - 重大（GDPR 下最高罚款为 €20M 或全球收入 4%）
        - EMEA 运营设在 Dublin；SCCs 已到位（推断）；隐私政策与 GDPR 对齐
        - 无公开 DPA 或独立 GDPR 审计；任何 EU 客户投诉都可能引发 DPC 问询
        - 索取 GDPR 审计证书；审阅 DPA 条款；确认跨境传输机制
