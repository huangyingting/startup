      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Axonius 基于适配器的集成模型带来结构性运营风险：第三方工具厂商一旦改 API（废弃端点、改变认证、调整数据模式），对应的 Axonius
              适配器可能失效，客户资产清单会出现数据缺口，且客户未必马上看见。Axonius 维护 400+ 适配器，API 失效事件预计会定期发生；适配器维护质量和速度直接影响客户满意度与留存。公司未披露适配器更新 SLA
              或故障适配器平均修复时间（MTTR）的公开 SLA。

              规范化引擎准确性是核心运营风险：去重错误（误把不同资产合并的误报、生成幽灵记录的漏报）会削弱“单一事实来源”资产清单的价值主张。除非客户自行用真实基准审计 Axonius
              资产数据库，否则这些错误不可见；系统性规范化失败可能在没有预警的情况下侵蚀信任并引发流失。规范化准确率基准未公开披露。

              商业 SaaS 版存在云基础设施可靠性风险：云服务商层面若出现长时间中断（3+ 小时），客户将无法执行策略或访问资产清单；对把 Axonius 用在安全事件响应工作流里的客户，这会造成实质运营影响。状态页存在，但
              SLA 条款和历史可用性未发布。

              2024 年末约 100 人裁员削减了 Axonius 的工程和客户成功人手；如果工程裁员影响适配器团队，适配器维护速度可能放慢；如果客户成功裁员减少 CSM
              覆盖，企业客户支持质量可能下降。上述影响均未由公开来源确认。
