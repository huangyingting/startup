      - number: '3.4'
        title: 反向竞争证据与替代风险
        blocks:
          - type: paragraph
            body: >-
              三个反向信号值得关注。第一，Cisco 以约 $2B 收购 Axonius 的谈判传闻（Axonius 已否认）说明 CAASM
              市场对大型平台厂商足够有吸引力，值得考虑收购；但也说明，随着竞争者加速非有机增长，Axonius 可能面临更大的平台整合压力。第二，CrowdStrike 的 Falcon
              平台已在统一智能体安全平台中加入资产发现和管理能力；随着 CrowdStrike 在企业中渗透终端防护（大型企业多数已经部署），它可以把资产盘点作为终端代理的副产品提供，这是 Axonius
              市场走向生存级商品化的一条路径。第三，Armis 公开称其 Centrix 平台监控数十亿资产，模块化能力覆盖 OT、IoT、医疗设备和漏洞优先级排序，直接与 Axonius 正在扩展的医疗和 ICS 野心竞争。

              正面竞争证据包括：Axonius 2024 年 ARR 增长 51.5%，显著高于 CAASM 市场 CAGR，说明它在拿份额而非丢份额；Forrester TEI 研究（156% ROI、不到 6
              个月回本）给客户留用并扩展 Axonius 部署提供了强论据；DoD CMRS 合同形成结构性联邦护城河，没有 FedRAMP Moderate 授权的竞争者无法立即挑战。Cynerio 收购在医疗 IoT
              中增加了一层防御性护城河；该细分里 Claroty 和 Armis 是 Axonius 的主要竞争对手。
            claimRefs:
              - CP019
              - CP020
              - CP021
              - CP022
              - CP023
              - CP024
              - CP025
      - number: '3.5'
        title: 佐证要点
        blocks:
          - type: callout
            title: CrowdStrike Falcon 平台是概率最高的商品化威胁
            body: >-
              CrowdStrike 的终端代理已经部署在多数大型企业。随着它为非终端资产加入资产发现能力，并以零增量成本捆绑进 Falcon 模块，它可以在既有装机基础中侵蚀 Axonius
              的价值主张，而不必赢下一次竞争性评估。不同于 runZero 或 Armis，CrowdStrike 不需要替换 Axonius——它只需要让买方怀疑是否还需要两者并存。
            calloutType: risk
            claimRefs:
              - CP019
              - CP020
              - CP021
          - type: callout
            title: 400+ 适配器库制造持久的集成切换成本
            body: >-
              Axonius 的集成深度并不容易复制。为 400+ 个安全和 IT 工具构建生产级适配器、验证数据标准化，并在 API 演进时持续维护，需要多年工程投入。即便是 CrowdStrike
              这样的庞大平台，也没有等价的专用 CAASM 适配器。这在拥有复杂异构工具栈的企业账户中形成结构性切换成本，尤其持久。
            calloutType: strength
            claimRefs:
              - CP013
              - CP014
              - CP030
          - type: callout
            title: 缺少已确认 NRR 数据，限制护城河耐久性评估
            body: >-
              评估竞争耐久性时，最关键的未知数是 Axonius 的净留存率（NRR）。若 NRR 高于 120%，适配器锁定论点得到确认；若低于 110%，竞争替代已经发生。没有 NRR
              数据，所有护城河耐久性判断都只能基于集成深度逻辑，而非客户留存的经验证据。
            calloutType: insight
            claimRefs:
              - CP033
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价结构
        blocks:
          - type: paragraph
            body: >-
              Axonius 通过按资产数量计价的年度企业订阅获得收入。客户按平台内托管资产数量付费；Forrester TEI 研究（2025 年 3 月）记录了一个标价示例：覆盖 400,000 至 699,999
              台设备的部署，每年 $775,000，为大型企业合同提供了参考价格点。公司没有免费层、社区版，也没有公开披露的中型市场入门价格；Axonius 明确定位为高端企业供应商。

              收入确认遵循标准 SaaS 订阅会计：客户按年度或多年预付，收入在合同期内按比例确认。主要收入流是软件订阅（核心 CAASM 平台），外加 SaaS 应用管理、软件资产管理和 Axonius Federal
              Systems 子公司的增量模块。Cynerio 收购（2025 年 7 月）增加了医疗 IoT 安全收入流；Calcalist 报道称，该收购预计在第一年增加数千万
              ARR。没有已确认的服务或专业服务收入流，不过客户成功和上线服务很可能作为订阅的一部分以成本形式存在。

              Axonius 不公开发布收入或 ARR；2024 年 $151.5M ARR 数据来自 Getlatka（一家通过创始人访谈和公开信号跟踪私营 SaaS 公司指标的分析机构）。Forbes 预计 Axonius
              将在 2025 年突破 $200M ARR。2023 至 2024 年 ARR 增长 51.5%，意味着 2023 年 ARR 约 $100M，与 Calcalist 所称公司约在 2022 年达到 $100M
              ARR 相一致。
