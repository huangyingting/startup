      - number: '1.2'
        title: 领导层、治理与关键人物结构
        blocks:
          - type: paragraph
            body: >-
              Axonius 在 2026 年 2 月经历了一次重大领导层交接。联合创始人兼 CEO Dean Sysman 宣布转任执行董事长，理由是个人反思，以及搭建企业与规模化企业所需心态不同。Joe Diamond
              曾任首席营销官，并于 2025 年 8 月升任总裁；此次又兼任临时 CEO。公司对外将这次交接表述为 IPO 前准备，Sysman 承诺继续参与战略愿景，Diamond 则接手运营控制权。

              更广泛的领导团队也体现出公司有意向上市公司状态搭建。Chris Kramer 担任 CFO，招募目的明确指向 IPO 前准备；他曾公开承认企业销售周期拉长是一项挑战。Klaus Moser 于 2025
              年末加入，担任全球销售 SVP，曾任职 Qualys 和 MobileIron。Ernesto Tey 加入担任全球合作伙伴与联盟 VP，履历覆盖 Okta、VMware 和
              Meta，以搭建伙伴驱动的收入生态著称。Tom Kennedy 领导 Axonius Federal Systems，任总经理。联合创始人 Ofri Shur 和 Avidor Bartov
              仍在公司，但当前运营角色披露较少。公司治理是常规私营公司董事会治理，支持方包括 Accel、Lightspeed Venture Partners、Stripes、Bessemer Venture
              Partners、OpenView 和 Silver Lake Waterman。公司身份高度集中在创始人身上，尤其是 Dean Sysman——他塑造了公司公开形象和关键客户关系。即使 Diamond
              接管运营领导权，这仍是持续的关键人物风险。
