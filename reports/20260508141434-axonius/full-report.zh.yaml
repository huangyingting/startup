        - 可能受加密出口管制约束；分类未公开确认
        - 低（SaaS 出口管制违规并不常见）
        - 轻微-重大（罚款和声誉风险；国际扩张受限）
        - 标准企业 SaaS EAR 合规（可能适用 Mass Market 加密例外）
        - 必须禁止向受制裁辖区（Iran、Russia、North Korea）扩张
        - 确认 EAR 分类；审阅国际客户筛查流程；确认 OFAC 合规
      - - 劳动法（2024 年裁员 — WARN Act 合规）
        - 美国联邦和州
        - 已完成（裁员发生在 2024 年底）
        - 低（WARN Act 风险适用于 >500 名员工的裁员；Axonius 约 100 人）
