        - CEO 问题解决前，任何价格都不投；估值加 25-30% 执行折价
      - - DoD CMRS 合同不续约
        - 合同到期未续约；或竞争对手赢得替代性联邦 CAASM 合同
        - 联邦 ARR（估计占总额 15-25%）塌陷；失去联邦标杆客户；增长重置
        - 退出或大幅减仓；重新建模剔除联邦后的 ARR；预期估值压缩 30-40%
      - - 2026 年 Q4 前未获得 HIPAA 认证
        - 到 2026 年底，合并后的 Axonius-Cynerio 平台仍没有公开 HIPAA BAA 或 HITRUST 公告
        - Cynerio 收购回报受损；医疗垂直扩张比 2026 年 Q4 继续推迟 12-18 个月
        - 估值模型不给 Cynerio TAM 扩张信用；乐观情景估值下调 $50-100M
      - - 以低于 $2.0B 估值融资
        - SEC Form D 或公开公告显示以 <$2.0B 估值融资
        - 降估值融资确认；Series D/E 投资者被下调账面价值；触发反稀释；不可能以 Series E 价格退出
        - 如可行则退出；对以 $2.6B 入场的 IPO 前投资者，降估值融资会击穿投资逻辑
      - - 披露毛利率低于 65%
        - S-1 披露规模化（>$150M ARR）后毛利率 < 65%
        - 经营杠杆逻辑受损；20%+ EBIT 利润率路径存疑；IPO 倍数被压缩
        - 重新建模 FCF 预测；相对网络安全 SaaS 常态，倍数压缩 15-25%
    notes: 投资逻辑破裂触发条件是持有期监控工具。每个触发条件都可单独行动——任一事件都意味着必须重新承销。投资承诺前，NRR 和 CEO 问题解决是优先级最高的两个监控指标。
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 负责人 / 尽调路径
    rows:
      - - 净收入留存率（NRR）和总美元留存率（GDR）
        - NRR 和 GDR 未公开披露；Getlatka ARR 估计无法确认留存
        - NRR 是判断 ARR 可持续性的最关键指标；NRR < 100% 意味着公司离不开持续获新客
        - CFO Avi Kramer / 数据室；索取最近 4 个季度按客户队列拆分的 NRR
      - - 收购 Cynerio 后的现金跑道和烧钱速度
        - 完成 $250M Cynerio 收购后的现金余额未知；2025 年 Form D 表述不清
        - 现金跑道低于 12 个月 = 以不利条款桥接融资的风险；现有投资者面临稀释风险
        - CFO / 数据室；索取 2025 年 Q4 资产负债表和 12 个月现金流预测
      - - 正式 CEO 搜索——时间表和标准
        - 临时 CEO 状态；正式搜索仍在进行；人选质量和时间线未知
        - CEO 质量和招聘速度直接决定 IPO 执行概率和时间线；这是近期最重要的人力资本问题
        - 董事会（审计委员会主席）；确认高管猎头公司和候选人标准
      - - HIPAA BAA 可用性和 Cynerio HITRUST 认证路线图
        - 合并后的 Axonius-Cynerio 平台 HIPAA 合规未确认；医院采购受阻
        - 医疗垂直是 Cynerio 收购的核心逻辑；HIPAA 延迟 = 投资逻辑受损
        - Axonius 管理层 / 法务；确认 BAA 可用性和 HITRUST 评估启动日期
      - - DoD CMRS 合同续约概率和期限
        - 多年合同于 2024 年 12 月授予；续约时间和概率未知
        - DoD 估计占 ARR 15-25%；不续约是最大的单一客户集中度事件
        - Axonius Federal Systems / 政府关系；确认合同期限、到期日和续约渠道
      - - 毛利率和盈利路径
        - 毛利率未披露；云端 COGS、专业服务组合和适配器维护成本未知
        - 毛利率决定经营杠杆、FCF 画像和 IPO 倍数；< 65% 会压缩退出倍数
        - CFO / 数据室；索取按产品线拆分毛利率的 P&L
      - - 适配器事故日志和 MTTR 指标
        - 适配器故障频率、MTTR 和客户通知流程未披露
        - 适配器 MTTR 高 = 客户无声不满和流失风险；这是适配器模式的核心可靠性风险
        - CTO / 工程数据室；索取适配器事故日志和平均解决时间
      - - IP 所有权和专利组合
        - 未确认专利或 IP 诉讼；专利组合尚未公开评估
        - 对适配器标准化方法和关联引擎的 IP 保护构成竞争护城河；缺乏专利会增加收购定价复杂度
        - 首席法务官 / 数据室；索取专利组合摘要和创始人 IP 转让文件
    notes: 优先级：NRR、现金跑道、CEO 搜索、HIPAA、DoD 续约。第 1-5 项是任何价格投资前的阻断项；第 6-8 项重要但不阻断。所有问题都应在最终投资委员会决策前解决。
    claimRefs:
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
