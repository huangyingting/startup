      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >-
              Axonius 和 CAASM 方案的主要买方是企业 CISO 及其 IT 安全运营团队。预算所有者通常是 CISO 或安全 VP，采购过程会牵涉 IT
              运营和企业架构相关方。付款来源是组织的网络安全资本预算，这一预算在企业各垂直行业中持续增长。使用者则是安全分析师或 IT 管理员，他们负责运行资产查询、配置策略并响应事件。

              客户可分为三层。第一，大型企业（5,000+ 员工）且混合环境复杂，是核心目标；这些组织面临最大的可视性缺口，也有预算为 400,000–700,000 台设备部署每年支付 $775,000+，这一价格来自
              Forrester TEI 数据。第二，中型企业（1,000–5,000 员工）是新兴客群，前提是平台更易触达。第三，联邦政府客户是高度战略性的垂直市场，需要 FedRAMP 授权和专门合规能力；Axonius
              Federal Systems 已为该市场建立专门单元。垂直行业集中在制造、医疗（Cynerio
              之后）、金融服务、媒体和政府/国防。客户采用通常遵循采购和试点路径：价值验证、与既有工具栈集成、数据质量验证、策略自动化部署——从初始评估到全面部署通常需要 3–9 个月。
