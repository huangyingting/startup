  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Axonius 主要竞争于网络资产攻击面管理（CAASM）市场。该市场属于企业网络安全的一部分，聚焦于在本地、云和混合环境中，对所有数字资产做持续发现、盘点和上下文分析。CAASM
              解决的核心问题是可视性缺口：企业安全团队看不见就守不住；而现代 IT 环境横跨云工作负载、IoT 设备、SaaS 应用、远程终端和第三方集成，已经超出传统配置管理数据库（CMDB）和 IT
              资产管理（ITAM）工具的能力范围。

              市场边界包括：自动化资产发现和盘点软件平台、攻击面可视化和缺口分析、策略验证与执行自动化，以及与资产上下文绑定的暴露面和漏洞优先级排序。排除项包括：未绑定资产上下文的原始漏洞管理（Qualys、Tenable）、纯终端管理（Tanium）、独立云安全态势管理（Wiz、Orca），以及传统
              ITSM/CMDB 平台（ServiceNow），后者的资产管理能力只是其工作流自动化使命的附带功能。主要替代品是手工 CMDB 流程、基于电子表格的资产盘点，以及被改作资产跟踪的既有工具。

              Axonius 参与或正在扩展的邻近市场包括 SaaS 管理（通常归入 SMP 或 SSPM）、软件资产管理（SAM）、身份治理与管理（IGA，用于资产—身份关联），以及医疗 IoT 安全（通过收购
              Cynerio）。把这些邻近板块纳入后，可服务市场明显扩大，从纯 CAASM 基础的 $1.47B，走向多个分析机构估计中期可达 $5B–$10B 的更广义安全管理平台机会。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
