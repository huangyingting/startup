  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争者版图概览
        blocks:
          - type: paragraph
            body: >-
              网络资产攻击面管理的竞争格局可分为五类。第一，CAASM 原生专家——Armis、runZero、Sevco Security、Cavelo、OctoXLabs 和
              Lansweeper——在同一个核心用例上竞争，但路径、深度和目标客户差异很大。Axonius 在这一类中按 ARR（$151.5M，对比 runZero 估计 $10–15M）和企业客户数领先（670+，对比
              Armis 估计 1,000+，但交易规模和地域不同）。

              第二，安全平台既有厂商——Qualys（CSAM 模块）、Rapid7（InsightVM）和
              Tenable——把网络资产管理作为成熟漏洞管理平台中的功能层提供。这些厂商拥有深厚企业关系，作为组合平台捆绑时切换成本更低，但其 CAASM 功能历史上不如 Axonius 的专用平台全面。

              第三，IT 运营既有厂商——ServiceNow（ITAM/CMDB）、BMC Helix 和 Lansweeper——从 IT 资产管理和 CMDB
              视角切入。它们的强项是工作流集成和庞大装机基础，弱项是安全上下文和策略执行有限。第四，OT 与网络物理安全厂商——Claroty、Dragos——在 IoT/OT 资产可视性上直接竞争，这是 Axonius 通过
              Cynerio 扩展进入的领域。第五，巨型平台厂商——CrowdStrike（Falcon 平台）和 Palo Alto Networks（Cortex
              XSIAM）——代表中期整合威胁，它们正在向一体化安全运营平台中加入资产发现和管理能力。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
