  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险图谱
        blocks:
          - type: paragraph
            body: >-
              Axonius 横跨多个监管辖区运营，因此承担合规义务和风险。最迫近的监管风险是 Cynerio 医疗 IoT 集成的 HIPAA 合规：Axonius 尚未确认合并平台已覆盖 HIPAA
              业务伙伴协议（BAA）或取得 HITRUST 认证；医院客户若通过医疗设备数据处理受保护健康信息（PHI），没有确认的 HIPAA 合规就无法部署。HIPAA 认证集成延迟可能阻断整个医疗垂直扩张。

              Axonius 称 EU 数据处理符合 GDPR，但没有公开的独立审计证书；Dublin 的 EU 存在带来持续 GDPR
              义务，包括维护数据处理协议（DPA）、跨境数据传输机制（标准合同条款），以及潜在监管机构（DPC Ireland）问询风险。CCPA
              和新兴州隐私法（Virginia、Colorado、Connecticut）适用于美国客户数据处理；Axonius 隐私条款是否符合这些州法，尚未获得独立验证。

              FedRAMP 合规是联邦市场的监管风险：维持 FedRAMP Moderate 授权需要年度第三方评估；一旦发现缺陷，可能触发整改要求或临时暂停授权。最敏感 DoD 和情报环境所需的 FedRAMP High
              授权尚未取得；推进 FedRAMP High 会增加 12-24 个月整改和审计成本。出口管制法规（EAR）适用于 Axonius 技术；该平台很可能被归类为加密软件，国际分发可能需要按美国商务部规则做分类审查。

              截至研究日期，公开法律数据库未发现针对 Axonius 的未决诉讼、SEC 执法行动或监管调查；公司法律记录干净，与其早期私营市场阶段一致。
