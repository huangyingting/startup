companyProfile:
  summary: >-
    Axonius 是一家总部位于纽约的私营网络安全公司，开创了网络资产攻击面管理（CAASM）品类。其平台通过 1,000+ 个适配器汇聚数据，为云、本地部署和 OT 环境提供统一资产可视性、安全控制缺口检测和自动化修复。公司由
    Dean Sysman、Ofri Ben-Ari 和 Nathaniel Hawthorne 于 2017 年共同创立；2026 年 2 月发生 CEO 交接，Sysman 转任执行董事长，Joe Diamond 出任临时
    CEO。公司服务 670+ 企业和政府客户，2024 年达到 $151.5M ARR（同比增长 51.5%），并于 2025 年 7 月以约 $180M 收购 Cynerio（医疗 IoT 安全）。Axonius 于 2025 年
    11 月裁员约 100 人，2026 年初还曾传出未经证实的 Cisco 收购谈判。
