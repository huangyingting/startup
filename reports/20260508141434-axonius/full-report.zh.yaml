      - number: '6.2'
        title: 具名客户证明与部署证据
        blocks:
          - type: paragraph
            body: >-
              Axonius 的具名客户证据横跨政府、金融服务和科技行业。最突出的具名客户是美国国防部；Axonius CMRS 合同覆盖 5 个 DoD 分支中的 4 个（Army、Navy、Air
              Force、Marines 已确认；Space Force 未确认），代表多年平台承诺，也是公开资料中最清楚的大规模生产部署证据。其他邻近 DoD 的证据包括 FedRAMP Moderate
              授权，使其可服务民用机构部署。

              Gartner Peer Insights 的 CAASM 类别评论包括企业 IT 安全专业人士给 Axonius 的评分，确认存在生产部署。G2 评论也佐证客户使用 Axonius
              做统一资产清单和安全覆盖缺口分析。Forrester TEI 研究（2025 年 3 月）记录了一个真实 Axonius 部署的综合样本，覆盖管理 400,000-699,999 资产的组织，报告每年节省
              $775K、NPV 为 $3.22M、回本周期 <6 个月。虽然该研究由厂商委托，但基于真实客户访谈。

              G2、Gartner Peer Insights 和 PeerSpot
              的客户满意度评论提到的优势包括：适配器覆盖广、相比替代方案更易部署、统一资产视图质量高。反向反馈包括定价不透明、大型资产池总成本高、首批适配器初始设置时间长，以及开箱即用报告模板有限。一位 G2
              评论者指出，中端市场部署的价格“明显高于替代方案”，说明 Axonius 可能会因价格排除 10,000 资产以下市场。
