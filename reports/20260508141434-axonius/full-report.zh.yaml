  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: Axonius 关键风险类别评估矩阵。行代表风险类别；列代表评估维度。单元格根据公开证据和结构分析给出定性严重性评估（高 / 中 / 低 / 未知）。
    data:
      columns:
        - 发生概率
        - 一旦发生的影响
        - 缓释成熟度
        - 剩余严重性
      rows:
        - label: 监管（HIPAA/FedRAMP/GDPR）
          values:
            - 高（HIPAA 未确认；FedRAMP 年度风险；GDPR 持续存在）
            - 重大至阻断（HIPAA 阻断医疗业务；失去 FedRAMP = 失去联邦收入）
            - 中（FedRAMP 管理较好；HIPAA/GDPR 缺口仍在）
            - 重大（HIPAA 缺口是近期阻断项；FedRAMP 剩余风险低）
        - label: 法律（雇佣 / 出口管制）
          values:
            - 低（无活跃诉讼；WARN Act 可能合规）
            - 轻微（罚款；声誉风险）
            - 高（预计需符合标准法律合规要求）
            - 轻微（法律记录干净；剩余风险低）
        - label: 运营（适配器失效 / 服务中断）
          values:
            - 高（适配器失效很常见；服务中断概率低但可能发生）
            - 重大（客户资产清单出现数据缺口；CSM 满意度受影响）
            - 中（适配器团队维护库；SLA 未披露）
            - 重大（未公开 SLA 或 MTTR 承诺；客户信任风险）
        - label: 人员 / 执行（CEO 过渡）
          values:
            - 高（临时 CEO 在任；正式人选仍在寻找）
            - 严重（IPO 前 CEO 更替是影响最大的执行风险）
            - 低（Sysman 任执行董事长；Kramer 任 CFO；董事会积极介入）
            - 严重（没有正式 CEO = IPO 时间表的阻断风险）
        - label: 财务（资本 / 烧钱 / IPO 时点）
          values:
            - 中（Cynerio 收购成本；IPO 市场波动）
            - 严重（资本短缺 = 以不利条款桥接融资）
            - 低（财务细节未披露；现金跑道未知）
            - 重大（现金跑道未知；2025 年 Form D 含义不清）
        - label: 竞争（平台打包商品化）
          values:
            - 中（Microsoft/CrowdStrike 加码 CAASM 邻近领域）
            - 严重（平台打包可能侵蚀独立 CAASM 价值）
            - 低（Axonius 有适配器广度优势；存在切换成本）
            - 重大（大型平台加入 CAASM 后会带来长期战略风险）
        - label: 地缘政治（特拉维夫研发集中）
          values:
            - 中（截至研究日，以色列—加沙冲突仍在持续）
            - 重大（研发受扰；人才流失；投资者 ESG 顾虑）
            - 低（未公开连续性计划；人才集中仍在）
            - 重大（地缘局势升级可能长期扰动研发）
    notes: 上述定性判断基于公开证据和结构分析。Axonius 未发布正式风险台账。高 / 重大 / 低评级反映尽调团队判断。
