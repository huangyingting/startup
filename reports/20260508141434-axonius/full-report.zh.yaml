      - number: '4.3'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >-
              Axonius 的单位经济数据在公开来源中基本不可得。Forrester TEI 研究提供的是客户侧 ROI 视角（156% ROI、$3.22M NPV、不到 6
              个月回本），但没有披露供应商侧毛利率、获客成本或净留存率。参照企业安全软件的 SaaS 行业基准（Qualys、Tenable、SentinelOne 等可比公司），Axonius 毛利率很可能在 65–80%
              区间；基于适配器的集成模式单单位交付成本相对较低（无硬件），但复杂企业部署会带来较高客户成功成本。

              获客成本未披露；Axonius 主要依赖直接企业销售，估计销售周期为 3–9 个月（来自 CFO 评论和 Forrester TEI 上线数据）。较长销售周期会让 CAC 高于 PLG 或自助式 SaaS
              模式。净留存率未披露；该缺口很重大——考虑到报告中的集成锁定深度，NRR 高于 120% 合理但未经证实。

              Forrester TEI 的客户经济数据仍有参考意义：一个综合企业每年支付约 $775K，三年 ROI 达到 156%，意味着三年总投入约 $2.3M，对应 $5.5M 收益。安全运营工作流节省 60–70%
              时间、资产分类提升 150%、外部泄露风险降低 5%，是其声称的价值驱动。若真实 NRR 数据能够确认，这些客户侧经济性将支持强劲的先落地再扩张动态。缺少 NRR 数据仍是最重要的财务尽调缺口。
