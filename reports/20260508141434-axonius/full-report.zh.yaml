          value: Up to $250M, July 2025
          detail: 收购 Cynerio 将 Axonius 拓展到医疗 IoT 和医疗设备安全；据 Calcalist，首年新增数千万级 ARR。在医疗场景中，这也是对 Claroty 和 Armis 的防守性护城河。
          tone: positive
