      - number: '3.3'
        title: 护城河、切换成本与锁定效应
        blocks:
          - type: paragraph
            body: >-
              Axonius 的竞争护城河分三层。第一，集成深度制造切换成本：把 50–400+ 个适配器部署到组织既有安全栈中，需要数周到数月；替换 Axonius
              就必须用新供应商重做这些集成。第二，策略自动化带来运营锁定：一旦 Axonius 嵌入事件响应、漏洞管理和合规工作流——Forrester TEI
              研究已经展示这一点——移除它会中断持续运营，而不只是换一个数据库。第三，信任和合规态势形成企业与联邦壁垒：FedRAMP Moderate 授权和 DoD CMRS 合同让 Axonius
              成为联邦市场中已建立的合规认证供应商，抬高新进入者门槛。

              多供应商并用风险真实存在，但受限：企业通常把 Axonius 作为主资产记录，并用其他工具（Qualys、Tenable）做漏洞扫描，因此部分重叠不会直接威胁 Axonius 的核心位置。Axonius
              的分销能力主要来自直接企业销售（未披露重大渠道）和联邦合作关系；它没有 ServiceNow 或 Palo Alto
              合作伙伴生态的分销杠杆，该短板在中型市场扩张中构成结构性劣势。最持久的护城河是适配器库和多年期联邦合同（DoD CMRS 是多年项目）。最脆弱的一面，是 CrowdStrike 或 Palo Alto
              以零增量成本把高质量 CAASM 捆绑进既有平台，使品类商品化。
