          label: 最大客户分部 ARR 下滑
        - from: sales-friction
          to: ipo-delay
          label: ARR 增长低于目标
        - from: bridge-financing
          to: valuation-compression
          label: 低于 Series E 估值融资导致稀释
        - from: ipo-delay
          to: valuation-compression
          label: 私有市场停留时间延长
    approximationNotes: 风险传导路径基于结构分析和行业先例。传导概率和幅度未量化；该图用于风险优先级排序，是方向性工具而非定量模型。
