      - number: '7.3'
        title: 人才与执行风险
        blocks:
          - type: paragraph
            body: >-
              CEO 交接（Dean Sysman 转任执行董事长；Joe Diamond 于 2026 年 2 月任临时 CEO）是 Axonius 最显眼的执行风险。上市前 公司 CEO 交接通常会造成 6-12
              个月内部分心、销售周期拉长和投资者不确定性。Sysman 作为联合创始人 CEO 任职 9 年，机构知识、关键客户关系和文化都与他高度绑定；临时 CEO 头衔（而非正式任命）说明正式 CEO
              仍在寻找，增加不确定性。若最终 CEO 与文化不匹配，或无法维持增长轨迹，IPO 可能延迟或受阻。

              Axonius 的网络安全和基础设施工程人才集中在以色列 Tel Aviv；Israel-Gaza 冲突的地缘政治风险（截至研究日期仍在持续）带来人才、基础设施和投资者认知风险；冲突拉长可能影响 R&D
              产出、增加人才流失，并让部分受 ESG 限制的机构投资者融资更复杂。人才集中在单一地区，是上市前 以色列科技公司常见的风投尽调关注点。

              关键人风险延伸到创始团队和资深工程负责人；如果多名资深工程师在 CEO 交接或裁员后离职，适配器质量和平台开发速度可能受到实质影响。公司未公开技术领导层继任计划。CFO Avi Kramer 有 Sumo
              Logic 上市公司经验，在 IPO 前降低了 CFO 层面的执行风险；但公司仍需要一位具备上市公司运营经验的正式 CEO。
