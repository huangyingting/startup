      - number: '8.3'
        title: 情景分析与退出准备度
        blocks:
          - type: paragraph
            body: >-
              乐观情景（概率信号：25-30%）：Axonius 在 2026 年 Q3 前聘任具备强上市公司资历的正式 CEO，2026 年 Q4 前为 Cynerio 取得 HIPAA 认证，报告 $220M+ ARR 且
              NRR > 115%，并在 2026-2027 年趁网络安全 SaaS 市场有利、自动化资产管理受 AI 驱动需求推动时 IPO。市场给予 18-22x NTM Revenue（接近 CrowdStrike
              级执行）。估值区间：$3.5-5.0B。Series E 回报：升值 35-92%。该情景要求没有重大运营挫折、Cynerio 整合成功、DoD 合同续约，且公开市场信任领导层。

              基准情景（概率信号：50-55%）：2026 年 Q4 前聘任正式 CEO，HIPAA 认证完成但医疗收入爬坡慢于预期，2027 年 IPO 时 ARR 为 $200-220M、NRR 为
              105-115%，公开市场给予 12-16x NTM Revenue。估值区间：$2.4-3.5B。Series E 回报：-7% 至 +35%。该情景符合一家扎实但不突出的网络安全 SaaS IPO。以
              $2.6B 进入的后期投资者获得微小到中等正回报。

              悲观情景（概率信号：15-20%）：CEO 交接超过 12 个月，销售周期拉长和竞争压力使 ARR 增速降至 25-35%，DoD CMRS 合同续约延迟，Cynerio 整合不及预期，公司以 $1.5-2.0B
              M&A 退出，或按 8-10x NTM Revenue 的压缩倍数 IPO。Series E 回报：-23% 至 -42%。Series D 和 E
              投资者面临显著本金损失；普通股股东在优先清算权后拿到的收益很少。

              IPO 退出准备已部分确认：CFO Avi Kramer（Sumo Logic IPO 老将）已到位；SEC Form D 文件显示公司意识到公开市场披露义务；Forbes 报道显示投行已介入。阻碍项：没有正式
              CEO；HIPAA 未确认；关键指标（NRR、毛利率）未公开披露；Cynerio 整合仍处早期。若到 2026 年中解决阻碍项，2026 H2 或 2027 年 IPO 可实现。
            claimRefs:
