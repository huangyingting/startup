      - - 去重引擎
        - 实体解析；识别同一物理资产在多个工具中以不同 ID 出现的情况
        - 自研关联算法（匹配 MAC 地址、主机名、IP、序列号）
        - 去重误判或漏判会产生幽灵记录或错误合并记录；错误率未披露
      - - 资产关系图谱
        - 映射资产、用户、软件、云资源和策略之间的关系
