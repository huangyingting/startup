      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >-
              Axonius 的核心差异化在于集成广度和深度：其 400+ 工具适配器从既有安全和 IT
              工具栈中汇聚资产数据，包括终端代理（CrowdStrike、SentinelOne、Defender）、云供应商（AWS、Azure、GCP）、身份提供商（Okta、Azure AD）、网络设备和 SaaS
              应用。这种适配器优先架构意味着 Axonius 不需要在每个终端上部署代理；它从已经部署的工具中拉取数据，拼成统一资产记录。相比之下，Armis 在无法安装代理的 OT/IoT
              环境中使用被动网络流量分析和无代理方法。runZero 使用主动网络扫描（由 Metasploit 框架创建者 HD Moore 打造），不需要代理或凭据，因此在工具未标准化的环境中上线更快。

              在功能能力矩阵中，Axonius 在适配器数量、企业合规态势（FedRAMP、SOC 2、ISO 27001）和资产级策略自动化上领先。Armis 在无网络扰动的被动 OT/IoT 发现上领先。runZero
              在中小型客户中的扫描速度和价值实现速度上领先。ServiceNow 在 CMDB 工作流集成和变更管理上领先。Qualys 凭借原生漏洞数据，在漏洞上下文（CVE 关联）深度上领先。Tanium
              在发现后的实时终端命令执行和补丁管理上领先。没有单一竞争者能同时匹配 Axonius 的集成广度、企业合规和策略执行。Axonius 的主要已知弱点是：被动 OT/IoT 发现能力有限（Cynerio
              在医疗场景中部分补足）、没有原生漏洞扫描（依赖第三方集成），以及基于资产定价的复杂性。
            claimRefs:
              - CP006
              - CP007
              - CP008
              - CP009
              - CP010
              - CP011
