  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层与垂直行业
        blocks:
          - type: paragraph
            body: >-
              截至 2024 年，Axonius 披露拥有 670+ 企业客户，高于 2022 年不足 500 家。平台瞄准 IT 环境复杂、异质的大型企业——尤其是管理 10,000+ 资产，且横跨本地部署、云和 SaaS
              环境的组织。理想客户画像（ICP）是 Fortune 1000 公司，拥有成熟安全运营团队，已经采购多种 端点、身份和云安全工具；这些工具会产生碎片化、未对账的资产数据。Axonius
              把聚合这些工具、形成统一资产清单且不替换原工具的需求变成收入。

              公开客户证据覆盖金融服务（银行、保险、资产管理人）、科技公司、医疗机构、美国联邦政府和 DoD、制造、零售、电信。2024 年 12 月签下的 DoD CMRS 多年合同覆盖 5 大 DoD 分支中的 4
              个，是战略价值最高的单一客户关系。地域上，Axonius 客户群主要在北美；公司正依托 Dublin 办公室推进 EMEA 扩张，但国际收入占总 ARR 的比例未披露。

              买方画像以安全负责人为主：CISO、安全运营总监和 IT 安全副总裁是公开客户证言与 G2 评论中最常见的头衔。IT 运营负责人（CTO、IT Director）是次级买方，尤其对应 SAM 和 SaaS
              管理模块。典型交易由 CISO 层级采购，IT 运营负责使用，财务/采购审批。公司没有自助式或产品驱动增长路径；所有客户关系都从直销大企业开始，因此销售周期较长（3-9 个月）。
