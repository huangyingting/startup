chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >-
              Axonius Inc. 于 2017 年在纽约市成立，创始人为 Dean Sysman、Ofri Shur 和 Avidor
              Bartov，三人均出身以色列国防军精英网络情报部队。公司总部位于纽约市，主要研发运营设在以色列特拉维夫。全资联邦子公司 Axonius Federal Systems LLC
              则为美国政府和国防部客户服务。公司将自身使命定义为把网络安全资产情报转化为可执行行动：帮助组织不再停留于被动看见数字环境，而是自动化、可验证地修复暴露面和策略缺口。

              核心产品是 Axonius Asset Cloud，一个统一平台覆盖五个领域：网络资产、SaaS 应用、软件资产、暴露面和身份。平台无代理、基于 API，不需要代理、传感器或网络扫描器。Axonius
              通过适配器连接 400+ 个既有安全和 IT 工具，近实时采集资产数据，去重并标准化，再呈现缺口、错误配置和策略违规。工作流提供无代码自动化，并内置 500+ 个预构建动作。部署方式灵活：本地、私有云或全
              SaaS，数小时内即可上线。截至 2024 年，公司服务 670+ 企业客户，并报告年经常性收入（ARR）为 $151.5M，较 2023 年同比增长约 51.5%。Axonius 被称为史上最快达到 $100M
              ARR 的网络安全公司之一。
