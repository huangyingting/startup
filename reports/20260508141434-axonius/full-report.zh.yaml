      - number: '8.2'
        title: 估值背景与可比分析
        blocks:
          - type: paragraph
            body: >-
              Axonius 2024 年 3 月 Series E 估值为 $2.6B，当时网络安全 SaaS 倍数正从 2022 年低谷修复，但 2024-2025 年 AI 驱动的倍数扩张主要惠及 AI
              原生安全厂商。Series E 时，$2.6B 约等于过去 12 个月 ARR（约 $150M）的 17x，处在当时高增长私有网络安全公司 10-20x 区间的高端。

              可比上市公司分析提供市场校准。CrowdStrike 交易约为 15-18x NTM Revenue，支撑因素是 35%+ 增长、平台宽度扩张和 AI 驱动的产品动能。SentinelOne 收入低于
              CrowdStrike，但增长资质强，交易约为 10-14x NTM Revenue。Qualys 是更成熟、低增长资产，交易约 7-9x NTM Revenue；Tenable 也是 7-9x。Rapid7
              增速更慢、竞争位置承压，交易约 3-5x NTM Revenue，是公开网络安全 SaaS 的底部。把这些倍数套到 Axonius 预计 $200-220M NTM Revenue（2025 年或 2026
              财年），在 IPO 执行溢价或私有市场溢价前，对应上市公司等价估值区间为 $600M-$3.9B。

              最直接的私有可比是 Armis：2023 年以 $4.6B 估值融资，估计 ARR 为 $150-180M，隐含 25-30x ARR 倍数，反映 OT/IoT 稀缺性溢价。Axonius 偏 IT 的
              CAASM 横向适用性更广，但 OT 稀缺性溢价更低；$2.6B、17x ARR 意味着 Axonius 较 Armis 折价，但较公开可比溢价。Cisco 以 $2B
              讨论收购，暗示公司买家对战略收购的底部估值约为 13x ARR——较上一轮折价 23%，Series E 投资者会亏损。
