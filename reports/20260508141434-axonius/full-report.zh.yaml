      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              多家独立分析机构对 CAASM 市场都有记录。Dataintelo 估算，2024 年全球 CAASM 市场为 $1.47B，并以 21.3% CAGR 增长，到 2033 年达到
              $10.33B。DataInsightsMarket 同样确认 CAASM 软件板块到 2034 年仍有强劲双位数增长。这些估算方向一致，但应视为分析预测，而非已观测收入数据——CAASM
              作为命名品类相对较新，供应商层面的收入数据并不公开。

              从自下而上的视角看，Axonius 仅自己就在 2024 年报告 $151.5M ARR，年增速 51.5%。如果 Axonius 占约 $1.47B 市场的 10%（意味着按其规模对应约 $147M
              市场收入），自下而上的计算与自上而下估算大体一致。2024 年由专门供应商服务的实际 CAASM 板块（排除 ITAM 和 CMDB 收入）很可能在 $1B–$2B 区间。把 SaaS
              管理、软件资产管理和安全管理平台计入后，更广义可服务市场到 2025–2026 年估计为 $5B–$10B，取决于品类定义。

              相邻且部分重叠的 ITAM 板块由 ServiceNow 主导。按 6sense 数据，ServiceNow 市占率约 30%，Jira Service Desk 为 15.5%，UpKeep 为
              9.3%。Axonius 在 ITAM 品类中的份额较小；其竞争优势在于网络安全资产上下文深度，而非工单管理或工作流集成。作为对比，整体网络安全市场每年约 $200B，并以 10–12% CAGR
              增长，CAASM 因而是一个大且扩张中的行业里的高增长细分市场。
