              Axonius 2024 年以与 2022 年 Series D 相同的 $2.6B 估值融资 $200M，尽管 ARR 增长超过 50%。在 ARR
              强劲增长期做平轮，说明投资者不愿在上一轮估值基础上加价——要么因为公开市场可比公司倍数压缩，要么因为公司无法维持此前增长轨迹。IPO 估值预期因此亮起红旗。
