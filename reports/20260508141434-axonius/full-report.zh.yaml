  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: 企业 CISO 或 IT 安全总监采购和部署 Axonius 的客户旅程，从最初认知到续约和扩张。该图展示推动 NRR 的采用触点和扩张循环。
    data:
      items:
        - label: 认知与问题识别
          detail: CISO 或安全总监发现资产清单盲区——工具之间不互通；通过 Gartner CAASM 品类、同行推荐或安全会议发现 Axonius。
        - label: 评估与价值验证（POV）
          detail: 企业销售周期 3-9 个月；Axonius 部署 POV 环境，连接 10-20 个适配器；展示覆盖缺口和标准化准确性；关键利益相关方为 CISO + IT Director。
        - label: 企业采购与合同签署
          detail: 采购审查（财务、法务、安全）；SOC 2 审查；主服务协议；按资产数量定价；大型企业典型 ACV 为 $300K-$1M+；年度或多年期限。
        - label: 初始部署与适配器铺开
          detail: 客户 IT 团队启用适配器（优先级：EDR、MDM、CMDB、云）；Axonius CSM 指导上线；配置首批策略规则；覆盖缺口仪表盘上线。
        - label: 全量生产与策略执行
          detail: 所有关键适配器上线；自动化策略执行启用；缺口违规生成 ITSM 工单；向 CISO 和董事会共享安全覆盖缺口报告；按 Forrester TEI，回本周期 <6 个月。
        - label: 扩张（资产数量增长）
          detail: 客户资产版图扩大（新云工作负载、M&A、新设备）后，Axonius 中的资产数量自动增加；下一次续约时通过按资产计价阶梯推动 ARR 扩张。
        - label: 模块交叉销售（SAM、SaaS 管理）
          detail: Axonius 销售团队提出 SAM 或 SaaS Management 附加模块；客户用同一批适配器覆盖新增用例；单一平台 vs. 单点工具的论证；ACV 增量提升。
        - label: 续约与 NRR 扩张
          detail: 年度或多年续约；切换成本高（40-80 个适配器配置、自定义策略规则和报告工作流都必须在替代方案中重建）；如果资产版图增长，NRR 可能 >100%。
    approximationNotes: 客户旅程阶段基于 Axonius 销售流程描述、Forrester TEI 客户访谈、G2 和 Gartner Peer Insights 评论。周期长度和 ACV 区间是基准值；实际值随客户细分和地区变化。
    claimRefs:
      - CU003
      - CU004
      - CU008
      - CU014
      - CU015
      - CU016
      - CU019
