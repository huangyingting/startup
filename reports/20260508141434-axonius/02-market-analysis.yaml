  evidenceGaps:
    - type: missing-source
      severity: material
      topic: caasm-market-size-independent-verification
      missingEvidence: >-
        No publicly accessible, independently verified market size data for CAASM exists from a major analyst firm
        (Gartner, IDC, Forrester) that is not paywall-protected; the primary estimates are from lesser-known firms
        (Dataintelo, DataInsightsMarket) whose methodology is not disclosed.
      whyItMatters: >-
        Market size estimates are central to valuation analysis and TAM claims; unverified estimates from
        lesser-known firms carry low confidence and cannot be used as anchor numbers in formal diligence.
      diligencePath: >-
        Request Gartner Magic Quadrant or IDC MarketScape for CAASM; purchase Forrester Wave cybersecurity
        asset management report; cross-reference with public-company disclosures from adjacent market vendors.
      relatedQuestionRefs:
        - QM005
        - QM007
        - QM028

    - type: conflicting-data
      severity: minor
      topic: tam-boundary-variance
      missingEvidence: >-
        Analyst firms define CAASM category boundaries differently; Dataintelo includes SaaS management and
        software assets while others define a narrower pure-CAASM segment; this creates $1B to $10B variance
        in TAM depending on definition.
      whyItMatters: >-
        Without a consistent boundary, TAM comparisons across analyst reports and Axonius's own TAM claims
        are not directly comparable.
      diligencePath: >-
        Standardize category definition in data room discussions; request Axonius's own market sizing analysis.
      relatedQuestionRefs:
        - QM027

    - type: missing-source
      severity: minor
      topic: caasm-cdm-approved-products-list
      missingEvidence: >-
        It is unclear whether Axonius is currently listed on the CISA CDM Approved Products List (APL), which
        would be a significant federal market access credential; no public source confirms this.
      whyItMatters: >-
        CDM APL status enables direct procurement by federal civilian agencies through the CDM program; absence
        could limit federal TAM for non-DoD agencies.
      diligencePath: >-
        Check CISA CDM APL database; request federal compliance documentation from Axonius.
      relatedQuestionRefs:
        - QM017

    - type: private-evidence-only
      severity: material
      topic: customer-acquisition-cost-and-ltv
      missingEvidence: >-
        Customer acquisition cost, lifetime value, net revenue retention, and cohort-level churn data are not
        publicly disclosed by Axonius; the Forrester TEI provides ROI for one composite customer but does not
        address portfolio-level retention metrics.
      whyItMatters: >-
        Without LTV and NRR data, market capture efficiency cannot be assessed; elongated sales cycles noted
        by CFO suggest high CAC without confirmed LTV offset.
      diligencePath: >-
        Request customer cohort analysis, NRR, churn, and CAC data in data room.
      relatedQuestionRefs:
        - QM012
        - QM021

    - type: enumeration-incomplete
      severity: minor
      topic: vertical-customer-count-breakdown
      missingEvidence: >-
        Axonius does not publicly disclose the breakdown of its 670+ customers by industry vertical; the
        segment/buyer map is based on named customer examples and market inference rather than confirmed data.
      whyItMatters: >-
        Customer concentration in specific verticals (e.g., defense, financial services) could represent
        concentration risk; without the breakdown, portfolio diversification cannot be confirmed.
      diligencePath: >-
        Request customer segmentation by vertical, geography, and deal size in data room.
      relatedQuestionRefs:
        - QM014
      relatedTableRefs:
        - TM003

    - type: enumeration-incomplete
      severity: minor
      topic: growth-driver-table-completeness
      missingEvidence: >-
        The growth drivers and constraints table covers the eight most visible factors but may not capture all
        constraints specific to mid-market expansion or non-US geographies; APAC regulatory landscape is
        particularly underrepresented.
      whyItMatters: >-
        Missing constraints could lead to underestimation of mid-market or international adoption friction.
      diligencePath: >-
        Interview Axonius sales leadership on mid-market and APAC expansion challenges.
      relatedQuestionRefs:
        - QM018
        - QM019
      relatedTableRefs:
        - TM004
