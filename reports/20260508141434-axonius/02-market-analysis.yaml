callouts:
  - calloutType: strength
    title: 21% CAGR CAASM market growth is structurally driven, not cyclical
    body: >-
      Asset sprawl, cloud adoption, and regulatory mandates create structural demand that is independent of IT
      budget cycles. Zero-trust architecture requirements make asset inventory a non-discretionary security
      investment, providing more durable demand than discretionary security tools. Axonius benefits from being
      the category pioneer and one of the few scaled independent vendors in this segment.
    claimRefs:
      - CM006
      - CM020
      - CM021
      - CM022

  - calloutType: risk
    title: Platform consolidation by Palo Alto or CrowdStrike is a medium-term category risk
    body: >-
      Large security platform vendors with existing enterprise relationships could embed CAASM-equivalent
      functionality into their XDR, SASE, or CNAPP platforms. This is not imminent — Axonius's integration
      depth (400+ adapters) is a meaningful moat — but the risk increases as Palo Alto Networks and CrowdStrike
      expand their platform ambitions. The Cisco acquisition denial in early 2026 suggests acqui-hire paths
      have been considered at the ecosystem level.
    claimRefs:
      - CM026
      - CM027

  - calloutType: insight
    title: Federal market provides a structural floor with non-discretionary budget
    body: >-
      The CISA CDM program and DoD CMRS contract create a federally-funded demand floor for Axonius Federal
      Systems that is governed by regulatory mandate rather than CISO discretion. CMMC Phase 2/3 rollout
      (2025–2026) creates an additional compliance-driven procurement wave for defense contractors.
    claimRefs:
      - CM022
      - CM023
      - CM028

