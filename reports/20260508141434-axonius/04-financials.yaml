callouts:
  - calloutType: risk
    title: Flat Series E valuation signals investor caution at $2.6B
    body: >-
      Axonius raised $200M in 2024 at the same $2.6B valuation as the 2022 Series D, despite growing ARR
      by over 50%. A flat round in a period of strong ARR growth suggests investors were unwilling to mark
      up at the prior valuation — either because public market comps had compressed or because the company
      could not sustain the prior growth trajectory. This is a red flag for IPO valuation expectations.
    claimRefs:
      - CI007
      - CI008
