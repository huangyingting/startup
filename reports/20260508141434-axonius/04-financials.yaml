company:
  name: Axonius Inc.
chapter:
  number: 4
  title: Financials
  summary: >-
    Axonius is a private company with $151.5M ARR in 2024 (51.5% YoY growth) and has raised approximately
    $780M+ across six rounds at a peak $2.6B valuation. Revenue comes from asset count-based enterprise
    subscriptions; gross margin and unit economics are not disclosed. Capital deployed since early 2025 includes
    the Cynerio acquisition (up to $250M) while the company simultaneously undertook layoffs (~100 employees),
    signaling cost discipline ahead of an anticipated IPO. Core financial diligence blockers are gross margin,
    NRR, CAC/LTV, and operating cash flow — none publicly confirmed.

sections:
  - id: section-1
    title: Revenue model and pricing structure
    body: >-
      Axonius generates revenue through asset count-based annual enterprise subscriptions. Customers pay based
      on the number of assets managed within the platform; the Forrester TEI study (March 2025) documents a
      list price example of $775,000 per year for a deployment covering 400,000 to 699,999 devices, providing
      a reference pricing point for large enterprise contracts. There is no free tier, community edition, or
      publicly disclosed entry price for mid-market customers; Axonius explicitly positions as a premium
      enterprise vendor.

      Revenue recognition follows standard SaaS subscription accounting: customers pay annually or multi-
      annually in advance, and revenue is recognized ratably over the contract period. The primary revenue
      streams are software subscriptions (the core CAASM platform), plus incremental modules for SaaS
      application management, software asset management, and the Axonius Federal Systems subsidiary. The
      Cynerio acquisition (July 2025) adds a healthcare IoT security revenue stream; Calcalist reports the
      acquisition was projected to increase ARR by tens of millions in the first year. There is no confirmed
      services or professional services revenue stream, though customer success and onboarding services likely
      exist at cost as part of the subscription.

      Axonius does not publish its revenue or ARR publicly; the $151.5M ARR figure for 2024 comes from
      Getlatka (an analyst that tracks private SaaS company metrics via founder interviews and public signals).
      Forbes projects Axonius will cross $200M ARR in 2025. ARR growth of 51.5% from 2023 to 2024 implies
      approximately $100M ARR in 2023, consistent with a company that reportedly hit $100M ARR in approximately
      2022 per Calcalist.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006

  - id: section-2
    title: Capital structure, funding history, and capital adequacy
    body: >-
      Axonius has raised approximately $780M+ across six known financing rounds and has filed seven Form D
      notices of exempt offering with the SEC (CIK 0001787130), including a 2024 Series F filing (March 14,
      2024) confirming the $200M raise and a 2025 filing (August 14, 2025) whose purpose is not yet fully
      public but likely relates to Cynerio financing or a bridge. The company was incorporated in Delaware
      and headquartered at 41 Madison Avenue, 37th Floor, New York, NY.

      The funding history: Seed 2017 (~$4M implied); Series A 2019 ($13M); Series B 2020 ($58M at ~$1B
      valuation); Series C 2021 ($100M at $1.2B valuation); Series D 2022 ($200M at $2.6B valuation); Series E
      2024 ($200M at flat $2.6B valuation). The flat valuation in the 2024 round is an adverse signal: the
      company raised at the same price as the prior round despite growing ARR, consistent with a down-round-
      by-another-name in which the company prioritized cash over valuation optics. The layoff of approximately
      100 employees in late 2024 suggests cost discipline and cash management ahead of an anticipated IPO.

      Capital adequacy for a potential IPO: with $151.5M ARR and approximately $780M raised, the company has
      had substantial capital. Cash on hand is not disclosed; the Cynerio acquisition at up to $250M represents
      a significant capital deployment. If the 2025 Form D represents additional equity raising, it may indicate
      Axonius needed additional capital to fund the Cynerio acquisition. The CFO's public comments on elongated
      sales cycles and the CEO transition to Executive Chairman in early 2026 are consistent with IPO preparation
      rather than financial distress — but independent verification of cash runway is unavailable.
    claimRefs:
      - CI007
      - CI008
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014

  - id: section-3
    title: Unit economics and cost structure
    body: >-
      Unit economics for Axonius are largely unavailable from public sources. The Forrester TEI study provides
      a customer-side ROI perspective (156% ROI, $3.22M NPV, sub-6 month payback) but does not disclose
      vendor-side gross margin, customer acquisition cost, or net revenue retention. Based on SaaS sector
      benchmarks for enterprise security software (Qualys, Tenable, SentinelOne comparables), Axonius likely
      operates at gross margins in the range of 65–80%; the adapter-based integration model has relatively
      low per-unit delivery cost (no hardware) but high customer success costs for complex enterprise deployments.

      Customer acquisition cost is not disclosed; Axonius relies primarily on direct enterprise sales with an
      estimated 3-to-9-month sales cycle (per CFO commentary and Forrester TEI onboarding data). Sales cycle
      length increases CAC relative to PLG or self-serve SaaS models. Net revenue retention is not disclosed;
      its absence is a significant diligence gap — given the reported integration lock-in depth, NRR above 120%
      is plausible but unconfirmed.

      The Forrester TEI data for customer economics is relevant: a composite enterprise paid approximately
      $775K/year and achieved 156% ROI over three years, implying a total 3-year investment of approximately
      $2.3M against $5.5M in benefits. The 60–70% time savings in security operations workflows, 150% asset
      classification improvement, and 5% external breach risk reduction are the claimed value drivers. These
      customer-side economics support robust land-and-expand dynamics if confirmed by actual NRR data. The
      absence of NRR data remains the single most important financial diligence gap.
    claimRefs:
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021

  - id: section-4
    title: Financial verdict and diligence blockers
    body: >-
      The public financial picture for Axonius shows a well-capitalized, high-growth SaaS company with a
      clear revenue model and strong market position, but with critical gaps in every unit economics metric
      that matters for underwriting. The 51.5% ARR growth, $151.5M 2024 ARR, and projected $200M+ 2025 ARR
      are positive momentum signals. The flat Series E valuation, subsequent layoffs, and the scale of the
      Cynerio acquisition ($250M) relative to estimated cash reserves create meaningful capital adequacy
      uncertainty.

      Revenue quality is likely high by SaaS standards: annual subscriptions, long enterprise renewal cycles,
      and integration depth suggest durable ARR rather than transient revenue. But quality cannot be confirmed
      without NRR data. Gross margin path is directionally favorable (asset count-based pricing with low
      marginal cost per additional asset), but the fixed cost of 400+ adapter maintenance, customer success
      for complex deployments, and the Cynerio integration costs could compress margins in the near term.

      The most significant financial risk is capital intensity from the Cynerio acquisition combined with
      the cost of IPO preparation. If the 2025 Form D filing reflects additional equity capital for the
      acquisition, the company's total dilution burden increases. The DoD CMRS multi-year contract provides
      a durable government revenue floor that partially offsets downside scenarios. The primary financial
      diligence blockers are: (1) gross margin and operating loss/income not public; (2) NRR not disclosed;
      (3) CAC and sales efficiency not disclosed; (4) cash on hand and burn rate post-Cynerio not disclosed;
      (5) Cynerio integration costs and synergy timeline not disclosed.
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
      - CI027

