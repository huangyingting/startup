  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: gross-margin-operating-income
      missingEvidence: >-
        Axonius's gross margin, operating income/loss, EBITDA, and operating cash flow are not publicly
        disclosed. The company has no obligation to publish financial statements as a private entity.
      whyItMatters: >-
        Without gross margin, profitability potential and unit economics cannot be assessed; without operating
        income, capital needs and runway cannot be confirmed; these are blocking diligence requirements for any
        pre-IPO investment.
      diligencePath: >-
        Request audited financial statements or management accounts for 2023 and 2024; request income statement
        with COGS breakdown; compare to public SaaS cybersecurity comparables as benchmarks.
      relatedQuestionRefs:
        - QI013
        - QI017

    - type: private-evidence-only
      severity: blocking
      topic: net-revenue-retention
      missingEvidence: >-
        Axonius's net revenue retention (NRR) rate is not publicly disclosed; without NRR, the thesis that
        integration depth creates expansion revenue cannot be confirmed; it is possible that ARR growth is
        entirely new-logo driven with flat or negative NRR from the installed base.
      whyItMatters: >-
        NRR is the single most important SaaS metric for assessing growth quality and competitive moat durability;
        blocking for underwriting.
      diligencePath: >-
        Request NRR by cohort for 2022, 2023, and 2024; request gross dollar retention separately; request
        breakdown of ARR growth into new logo vs expansion vs churn.
      relatedQuestionRefs:
        - QI014

    - type: private-evidence-only
      severity: material
      topic: cash-position-post-cynerio
      missingEvidence: >-
        Cash on hand and burn rate post-Cynerio acquisition are not publicly disclosed; the range of estimates
        ($100M-$400M remaining) is too wide for investment underwriting; the 2025 Form D suggests but does not
        confirm additional equity financing.
      whyItMatters: >-
        If cash runway is below 12 months, Axonius may require bridge financing before IPO, creating execution
        risk and potential dilution.
      diligencePath: >-
        Request balance sheet as of most recent quarter-end (Q3 or Q4 2025); request 2025 Form D details and
        purpose; confirm Cynerio financing structure (cash vs stock vs earnout).
      relatedQuestionRefs:
        - QI007
        - QI009

    - type: private-evidence-only
      severity: material
      topic: cac-and-sales-efficiency
      missingEvidence: >-
        Customer acquisition cost, sales efficiency metrics (Magic Number, CAC payback), and average contract
        value are not publicly disclosed; the elongated enterprise sales cycles noted by CFO Kramer suggest
        potentially high CAC relative to ARR gains.
      whyItMatters: >-
        High CAC without confirmed LTV/NRR creates an unknown unit economics risk; needed for IPO readiness
        assessment and comparable investor return modeling.
      diligencePath: >-
        Request S&M expense by quarter, new ARR added by quarter, and average contract value by segment.
      relatedQuestionRefs:
        - QI015

    - type: private-evidence-only
      severity: material
      topic: cynerio-standalone-financials
      missingEvidence: >-
        Cynerio's standalone ARR, gross margin, and customer count before the acquisition are not publicly
        disclosed; the "tens of millions ARR in year one" projection from Calcalist is secondhand and unverified.
      whyItMatters: >-
        Without Cynerio's standalone financial profile, the acquisition economics (price vs revenue multiple)
        cannot be validated; integration costs may be material and dilutive to near-term margins.
      diligencePath: >-
        Request Cynerio standalone financial data for 2024; request integration plan including cost, timeline,
        and revenue synergy expectations.
      relatedQuestionRefs:
        - QI020
