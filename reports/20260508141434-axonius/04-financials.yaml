  - calloutType: insight
    title: DoD CMRS contract provides a non-discretionary government revenue floor
    body: >-
      The multi-year DoD CMRS program modernization contract, combined with FedRAMP Moderate authorization
      and support for four DoD service branches, provides a structurally secure government ARR component
      that is renewed through program funding rather than CISO discretion. This reduces tail-risk in an
      economic downturn and provides IPO narrative support for "mission-critical" positioning.
    claimRefs:
      - CI012
      - CI013

  - calloutType: risk
    title: Cynerio acquisition depletes an estimated 40-60% of available cash reserves
    body: >-
      At up to $250M, the Cynerio acquisition represents a material capital event relative to Axonius's
      estimated cash position. If the 2025 SEC Form D represents additional equity financing for this
      purpose, it implies the company was not self-funding the acquisition from existing cash — increasing
      dilution and raising questions about the financing strategy ahead of a planned IPO.
    claimRefs:
      - CI011
      - CI014
      - CI022

