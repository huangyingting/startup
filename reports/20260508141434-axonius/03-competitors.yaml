callouts:
  - calloutType: risk
    title: CrowdStrike's Falcon platform is the highest-probability commoditization threat
    body: >-
      CrowdStrike already has its endpoint agent deployed in the majority of large enterprises. As it adds
      asset discovery capabilities for non-endpoint assets and bundles them into Falcon modules at no incremental
      cost, it can erode Axonius's value proposition in the installed base without needing to win a competitive
      evaluation. Unlike runZero or Armis, CrowdStrike doesn't need to replace Axonius — it just needs to
      make the buyer question whether they need both.
    claimRefs:
      - CP019
      - CP020
      - CP021

  - calloutType: strength
    title: 400+ adapter library creates durable integration switching cost
    body: >-
      Axonius's integration depth is not easily replicated. Building production-grade adapters for 400+ security
      and IT tools, validating data normalization, and maintaining them as APIs evolve is years of engineering
      effort. Even CrowdStrike's massive platform does not have equivalent purpose-built CAASM adapters.
      This creates a structural switching cost that is particularly durable in enterprise accounts with complex
      heterogeneous tool stacks.
    claimRefs:
      - CP013
      - CP014
      - CP030

  - calloutType: insight
    title: No confirmed net revenue retention data limits moat durability assessment
    body: >-
      The most critical unknown in assessing competitive durability is Axonius's net revenue retention (NRR).
      If NRR is above 120%, the adapter lock-in thesis is confirmed; if below 110%, competitive displacement
      is already occurring. Without NRR data, all moat durability claims are based on integration depth logic
      rather than empirical customer retention evidence.
    claimRefs:
      - CP033

