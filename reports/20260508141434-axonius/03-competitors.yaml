  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - moat claim
      - threat
      - severity
      - mitigation / diligence ask
    rows:
      - - 400+ adapter library creates integration switching cost
        - Competitors building adapter libraries; open-source connector ecosystems; Zapier/Make-style automation
        - medium
        - Verify adapter count growth rate; assess quality/reliability of top 50 adapters vs alternatives; benchmark time-to-deploy vs runZero
      - - FedRAMP Moderate authorization and DoD CMRS contract provide federal moat
        - Competitors achieving FedRAMP; CDM program extending to new authorized vendors; DoD contract renewal risk
        - medium
        - Confirm DoD CMRS contract duration and renewal terms; track Armis/runZero FedRAMP pursuit
      - - Enterprise trust (670+ Fortune enterprise customers) creates reference-sell advantage
        - Customer churn in economic downturn; platform consolidation by CrowdStrike/PANW displacing Axonius in existing accounts
        - high
        - Request NRR (net revenue retention) data; assess customer concentration by vertical
      - - Cynerio acquisition builds healthcare IoT moat
        - Armis and Claroty already established in healthcare/medical device security; Cynerio integration risk
        - medium
        - Verify Cynerio ARR contribution; assess integration progress; check if Axonius is gaining or losing healthcare accounts vs Claroty
      - - Policy automation engine (enforcement, not just visibility) creates operational lock-in
        - Competitors adding enforcement capabilities; CrowdStrike Falcon Fusion already provides SOAR-level automation
        - medium
        - Assess depth of automation engine vs CrowdStrike; quantify customer workflows dependent on Axonius automation
      - - 2,400 API integrations and data enrichment assets create data moat
        - Competitors can replicate API integrations; no exclusive data partnership barriers identified
        - low
        - Verify exclusivity of any data partnership; assess whether any adapters are proprietary or licensed
      - - Strong growth (51.5% YoY ARR) signals market share capture, not just market growth
        - Slowing growth as market matures; increased competition from platform vendors in 2025-2026
        - medium
        - Request 2025 ARR and growth rate; assess whether growth is NRR-driven or new logo-driven
    notes: >-
      Severity ratings reflect estimated impact to Axonius's revenue and valuation if the threat materializes.
      High severity threats can reduce projected valuation by 30%+; medium by 10-30%; low by <10%.
