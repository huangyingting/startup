  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: axonius-net-revenue-retention
      missingEvidence: >-
        Axonius's net revenue retention (NRR) rate is not publicly disclosed; without NRR data, it is impossible
        to distinguish whether 51.5% ARR growth is driven by new logo acquisition or expansion in existing accounts;
        NRR also confirms or denies competitive displacement hypothesis.
      whyItMatters: >-
        High NRR (>120%) would confirm durable competitive moat; low NRR (<110%) would indicate competitive
        displacement is already occurring in the installed base.
      diligencePath: >-
        Request NRR by cohort, customer churn rate, expansion revenue, and gross revenue retention in data room.
      relatedQuestionRefs:
        - QP022

    - type: missing-source
      severity: material
      topic: armis-fedramp-status
      missingEvidence: >-
        Armis's FedRAMP authorization status is not confirmed in any public source; if Armis achieves FedRAMP
        Moderate authorization, it could challenge Axonius's federal market moat directly.
      whyItMatters: >-
        FedRAMP Moderate is a key competitive barrier protecting Axonius's federal revenue from direct Armis
        competition; removing that barrier would open the federal segment to the most capable CAASM competitor.
      diligencePath: >-
        Check FedRAMP marketplace for Armis authorization status; request Axonius's assessment of Armis federal pursuit.
      relatedQuestionRefs:
        - QP011

    - type: missing-source
      severity: minor
      topic: competitor-pricing-data
      missingEvidence: >-
        Realized pricing for Armis, Sevco, and runZero is not publicly available; Axonius's realized pricing
        (post-discount) is also unknown; the Forrester TEI example of $775K/year is a list price example
        for one configuration, not an average or floor price.
      whyItMatters: >-
        Without realized pricing comparison, pricing power assessment is based on list price only; pricing
        pressure may be greater or lesser than estimated.
      diligencePath: >-
        Request actual contract samples or win/loss analysis with competitor pricing in data room; interview
        channel partners on pricing dynamics.
      relatedQuestionRefs:
        - QP019

    - type: missing-source
      severity: minor
      topic: crowdstrike-caasm-roadmap
      missingEvidence: >-
        CrowdStrike's specific roadmap for CAASM-equivalent asset management features within Falcon is not
        publicly disclosed; the timeline and depth of planned capabilities is unknown.
      whyItMatters: >-
        If CrowdStrike delivers comprehensive asset management for non-endpoint assets within 12-18 months,
        it would accelerate commoditization risk significantly beyond the medium-term estimate.
      diligencePath: >-
        Review CrowdStrike product roadmap announcements; interview enterprise customers running both Axonius
        and CrowdStrike on whether they see overlap.
      relatedQuestionRefs:
        - QP004
        - QP015

    - type: missing-source
      severity: material
      topic: win-loss-data
      missingEvidence: >-
        No public win-loss data or competitive win rates are available for Axonius vs any specific competitor;
        the assessment of competitive moat durability is based on product analysis and market evidence rather
        than confirmed sales outcomes.
      whyItMatters: >-
        Win-loss rates against specific competitors (especially CrowdStrike, Armis, and Qualys) would confirm
        or deny the thesis that Axonius's integration depth translates into sales victories.
      diligencePath: >-
        Request win-loss analysis by competitor in data room; look for patterns in where Axonius loses and why.
      relatedQuestionRefs:
        - QP017
        - QP022
