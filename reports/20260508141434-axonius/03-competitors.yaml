  - id: FP003
    title: Moat / readiness KPIs
    type: kpi
    layout: standard
    summary: >-
      Key competitive durability metrics for Axonius show strong integration moat (400+ adapters), healthy
      enterprise trust signals (670+ customers, FedRAMP, DoD contract), and 51.5% ARR growth outpacing the
      21.3% CAASM market CAGR.
    data:
      items:
        - label: Adapter / integration count
          value: "400+"
          detail: >-
            400+ tool adapters is the primary switching cost moat; nearest pure-play CAASM competitor (runZero)
            has significantly fewer. CrowdStrike and ServiceNow have comparable integration libraries but not
            purpose-built for CAASM.
          tone: positive
        - label: Enterprise customer count (2024)
          value: "670+"
          detail: >-
            670+ enterprise customers representing major Fortune 500 companies; growing reference-sell advantage.
            Customer count growth rate is unknown but ARR grew 51.5% YoY.
          tone: positive
        - label: Federal compliance certifications
          value: "FedRAMP Moderate + DoD CMRS"
          detail: >-
            FedRAMP Moderate authorization and DoD CMRS multi-year program contract. Most CAASM-native competitors
            have not publicly confirmed FedRAMP authorization, creating a structural federal market moat.
          tone: positive
        - label: Axonius ARR growth vs CAASM market CAGR
          value: "51.5% vs 21.3%"
          detail: >-
            Axonius's 51.5% ARR YoY growth in 2024 is 2.4x the estimated CAASM market CAGR, indicating
            market share capture rather than market growth alone.
          tone: positive
        - label: Platform consolidation threat rating
          value: "High (medium-term)"
          detail: >-
            CrowdStrike Falcon platform with 70%+ large enterprise endpoint penetration could bundle CAASM-quality
            asset inventory as a byproduct of its existing agent, representing the single highest displacement risk.
          tone: warning
        - label: Cynerio acquisition (healthcare IoT expansion)
          value: "Up to $250M, July 2025"
