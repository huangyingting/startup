  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: nrr-and-gross-retention-confirmation
      missingEvidence: >-
        Net Revenue Retention and Gross Dollar Retention are not publicly disclosed; G2 and Gartner
        reviews are proxies but not substitutes for confirmed cohort-level NRR data; without NRR
        confirmation, the ARR durability and land-and-expand thesis cannot be underwritten.
      whyItMatters: >-
        NRR is the single most important financial metric for a recurring revenue business; NRR
        below 90% changes the investment thesis from a compounding platform to a churn-sensitive
        new-logo treadmill; NRR above 115% confirms expansion economics and supports premium multiple.
      diligencePath: >-
        Request last 4 quarters of net dollar retention by customer cohort from CFO in data room;
        confirm calculation methodology (logo-weighted vs ARR-weighted); request GDR separately
        from NRR to understand gross churn rate.
      relatedQuestionRefs:
        - QV011
        - QV012
      relatedTableRefs:
        - TV004

    - type: private-evidence-only
      severity: blocking
      topic: post-cynerio-cash-runway
      missingEvidence: >-
        Post-Cynerio acquisition cash position and 12-month burn rate are not publicly disclosed;
        the 2025 Form D ambiguity means the true capital adequacy is unknown; Series E proceeds
        of $200M minus Cynerio ($250M) suggests potential cash shortfall requiring additional capital.
      whyItMatters: >-
        Capital shortfall before IPO forces a bridge at potentially unfavorable terms or a down-round
        that marks Series E investors below entry; cash runway confirmation is prerequisite for any
        investment commitment at any price.
      diligencePath: >-
        Request Q4 2025 audited balance sheet; confirm post-Cynerio cash position; request 12-month
        operating cash flow forecast; confirm 2025 Form D terms (if a new round, what were the
        price and investor composition?).
      relatedQuestionRefs:
        - QV018
        - QV019

    - type: private-evidence-only
      severity: material
      topic: gross-margin-and-unit-economics
      missingEvidence: >-
        Gross margin is not publicly disclosed; infrastructure COGS, professional services margin,
        and adapter maintenance cost are unknown; without gross margin confirmation, the FCF profile
        and public-market IPO multiple cannot be accurately modeled.
      whyItMatters: >-
        Enterprise SaaS at scale should achieve 70-80%+ gross margin; below 65% would reduce the
        appropriate IPO multiple by 3-5x turns; gross margin confirmation is necessary for accurate
        DCF and comparable company analysis.
      diligencePath: >-
        Request management P&L with GAAP gross margin segmented by product line (platform vs
        professional services); confirm infrastructure cost allocation; assess gross margin trend
        over last 8 quarters.
      relatedQuestionRefs:
        - QV017

    - type: stale
      severity: material
      topic: ceo-search-outcome
      missingEvidence: >-
        Permanent CEO search outcome is unknown as of the research date; the search may have resolved
        by the time of an investment decision; the quality and credentials of the permanent CEO hire
        directly determine the trajectory of each scenario.
      whyItMatters: >-
        A strong permanent CEO hire (public company operations experience) upgrades the scenario
        probabilities significantly toward the bull case; a weak hire or extended search duration
        depresses scenarios toward the bear case; this is the most time-sensitive variable in
        the investment model.
      diligencePath: >-
        Confirm permanent CEO hire announcement; assess credentials against public company CEO standard;
        conduct reference checks on permanent CEO's prior company performance.
      relatedQuestionRefs:
        - QV014
        - QV016

    - type: missing-source
      severity: minor
      topic: ip-patent-portfolio
      missingEvidence: >-
        No confirmed patent portfolio or IP assignment documentation found in public sources; the
        normalization and deduplication algorithms that form Axonius's technical moat may not be
        patented; absent IP protection, the moat depends entirely on adapter count and customer
        switching costs rather than legally defensible technology.
      whyItMatters: >-
        For an M&A valuation, IP protection adds strategic value and acquisition optionality; the
        absence of patents reduces the defensibility argument and could affect strategic buyer pricing;
        patent protection is standard in enterprise SaaS at this scale.
      diligencePath: >-
        Request USPTO patent search by inventor (Dean Sysman, Avidor Bartov, Ofri Mann) and Axonius
        Inc.; review any patent applications filed; request IP ownership assignments from founders.
      relatedQuestionRefs:
        - QV025
