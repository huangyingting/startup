  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - trigger
      - threshold/event
      - transmission to thesis
      - action implication
    rows:
      - - NRR disclosed below 90%
        - S-1 NRR < 90% gross dollar retention; or data room NRR < 100% net dollar retention
        - Customer durability thesis broken; ARR is new-logo dependent; churn is structural
        - Exit position or don't invest; model revenue with 15-25% ARR haircut
      - - Permanent CEO not hired within 12 months (by Feb 2027)
        - Interim CEO status persists beyond Feb 2027; or CEO hire is internal promotion without public company experience
        - IPO delayed; execution variance unacceptable for institutional investors; board effectiveness questioned
        - Do not invest at any price until CEO situation resolved; apply 25-30% execution discount to valuation
      - - DoD CMRS contract non-renewal
        - Contract expiry without renewal; or competitor wins replacement federal CAASM contract
        - Federal ARR (est. 15-25% of total) collapses; federal reference logo lost; growth resets
        - Exit or dramatically reduce position; re-model ARR ex-federal; expect 30-40% valuation compression
      - - HIPAA certification not achieved by Q4 2026
        - No public HIPAA BAA or HITRUST announcement for combined Axonius-Cynerio platform by end 2026
        - Cynerio acquisition return impaired; healthcare vertical expansion delayed 12-18 months beyond Q4 2026
        - Do not give credit for Cynerio TAM expansion in valuation model; take $50-100M haircut on bull-case valuation
      - - Financing at below $2.0B valuation
        - SEC Form D or public announcement of capital raise at <$2.0B valuation
        - Down-round confirmed; Series D/E investors marked down; anti-dilution triggers; exit at Series E price impossible
        - Exit if possible; down-round is thesis-break for pre-IPO investors at $2.6B
      - - Gross margin disclosed below 65%
        - S-1 gross margin < 65% at scale (>$150M ARR)
        - Operating leverage thesis impaired; path to 20%+ EBIT margin questionable; IPO multiple compressed
        - Re-model FCF projections; apply 15-25% multiple compression from cybersecurity SaaS norms
    notes: >-
      Thesis-break triggers are monitoring tools for the investment holding period. Each trigger is
      independently actionable — any one event constitutes a re-underwriting moment. NRR and CEO
      resolution are the two highest-priority monitoring indicators before investment commitment.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025

  - id: TV006
    title: Final diligence asks table
    columns:
      - topic
      - missing evidence
      - why it matters
      - owner / diligence path
    rows:
      - - Net Revenue Retention (NRR) and Gross Dollar Retention (GDR)
        - NRR and GDR are not publicly disclosed; Getlatka ARR estimate does not confirm retention
        - NRR is the single most important metric for ARR sustainability; < 100% NRR means the company cannot grow without continuous new logo acquisition
        - CFO Avi Kramer / data room; request last 4 quarters of NRR by customer cohort
      - - Post-Cynerio cash runway and burn rate
        - Cash position post-$250M Cynerio acquisition unknown; 2025 Form D ambiguous
        - Cash runway below 12 months = bridge financing risk at unfavorable terms; dilution risk for existing investors
        - CFO / data room; request Q4 2025 balance sheet and 12-month cash flow forecast
      - - Permanent CEO search — timeline and criteria
        - Interim CEO status; permanent search ongoing; quality and timeline unknown
        - CEO quality and hire speed directly determines IPO execution probability and timeline; most important near-term human capital question
        - Board of Directors (audit committee chair); confirm executive search firm and candidate criteria
      - - HIPAA BAA availability and HITRUST certification roadmap for Cynerio
        - HIPAA compliance for combined Axonius-Cynerio platform not confirmed; hospital procurement blocked
        - Healthcare vertical is the primary Cynerio acquisition thesis; HIPAA delay = thesis impairment
        - Axonius management / legal; confirm BAA availability and HITRUST assessment start date
      - - DoD CMRS contract renewal probability and term
        - Multi-year contract awarded December 2024; renewal timing and probability unknown
        - DoD represents est. 15-25% of ARR; non-renewal is the single largest customer concentration event
        - Axonius Federal Systems / government relations; confirm contract term, expiry, renewal vehicle
      - - Gross margin and path to profitability
        - Gross margin not disclosed; cloud COGS, professional services mix, and adapter maintenance cost unknown
        - Gross margin determines operating leverage, FCF profile, and IPO multiple; < 65% would compress exit multiple
        - CFO / data room; request P&L with gross margin segmented by product line
      - - Adapter incident log and MTTR metrics
        - Adapter breakage frequency, MTTR, and customer notification process not disclosed
        - High adapter MTTR = silent customer dissatisfaction and churn risk; this is the core reliability risk of the adapter model
        - CTO / engineering data room; request adapter incident log and average resolution time
      - - IP ownership and patent portfolio
        - No confirmed patents or IP litigation; patent portfolio not publicly assessed
        - IP protection for adapter normalization methods and correlation engine is a competitive moat; absence of patents increases acquisition pricing complexity
        - Chief Legal Officer / data room; request patent portfolio summary and IP assignment from founders
    notes: >-
      Priority order: NRR, cash runway, CEO search, HIPAA, DoD renewal. Items 1-5 are blocking for
      investment at any price; items 6-8 are material but not blocking. All items should be addressed
      before a final investment committee decision.
    claimRefs:
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030

