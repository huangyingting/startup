  - id: section-4
    title: Scale, milestones, acquisitions, and recognition
    body: >-
      Axonius has built a dense milestone record in under a decade. The company launched commercially around 2017
      to 2018, achieved $100M ARR by 2023, and reached $151.5M ARR in 2024 with 670+ enterprise customers.
      The company projects $200M+ ARR for 2025. In March 2023, its federal subsidiary received DoD approval after
      completing two prototypes — one with the Defense Innovation Unit and one with DISA's Emerging Technology
      Directorate — passing 45 specific test cases. In December 2024, the DoD selected Axonius Federal Systems to
      modernize the Continuous Monitoring and Risk Scoring program, building on inclusion in the DoD Enterprise
      Software Initiative Blanket Purchase Agreement contract.

      July 2025 marked Axonius's largest acquisition: healthcare IoT and medical device security company Cynerio,
      for $180M with up to $250M contingent on milestones. This expanded Axonius into healthcare and critical
      infrastructure, and led directly to the October 2025 launch of Axonius for Healthcare and Axonius AI, an
      operational engine for automated recommendations. In November 2025, Axonius reduced its workforce by
      approximately 100 employees — roughly 10% of its then ~900-person team — described as restructuring after
      rapid growth. The company holds FedRAMP Moderate authorization. Recognition includes #73 on the Forbes Cloud
      100 in 2025 and #82 on Forbes America's Best Startup Employers in 2026. Axonius Federal Systems supports
      four of the five major U.S. Department of Defense service agencies and is led by General Manager Tom Kennedy.
    claimRefs:
