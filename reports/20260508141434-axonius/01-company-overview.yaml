  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: cap-table-ownership-percentages
      missingEvidence: >-
        Exact cap table ownership percentages, preference stack, liquidation waterfalls, and board seat allocations
        are not publicly disclosed. The total funding amount discrepancy ($700M vs $856M) cannot be reconciled from
        public sources alone.
      whyItMatters: >-
        Without a full cap table, the preference overhang, anti-dilution rights, and founder dilution level
        cannot be assessed ahead of an IPO or acquisition.
      diligencePath: >-
        Request investor schedule and cap table from company or lead investors (Accel, Lightspeed); review full
        share rights agreement and voting agreements.
      relatedQuestionRefs:
        - QO003
        - QO011
      relatedTableRefs:
        - TO003

    - type: missing-source
      severity: minor
      topic: co-founder-current-roles
      missingEvidence: >-
        Ofri Shur and Avidor Bartov's current operating roles within Axonius are not specified in public sources;
        they are listed as co-founders but their functional responsibilities are unclear.
      whyItMatters: >-
        If co-founders hold material technical or product leadership roles, their departures would be a key-person
        risk; if they are primarily in advisory roles, that risk is different.
      diligencePath: >-
        Request current org chart and confirm co-founder roles in leadership team documentation.
      relatedQuestionRefs:
        - QO002
      relatedTableRefs:
        - TO002

    - type: private-evidence-only
      severity: material
      topic: profitability-and-unit-economics
      missingEvidence: >-
        Axonius has not publicly disclosed profitability metrics, operating margins, burn rate, or path-to-
        profitability timeline; all financial data beyond ARR is unavailable publicly.
      whyItMatters: >-
        IPO readiness and valuation multiples depend critically on understanding the path from $151.5M ARR to
        profitability; elongated sales cycles noted by CFO suggest customer acquisition cost pressure.
      diligencePath: >-
        Request audited financial statements, board-level financial reports, and CFO commentary on unit economics
        and burn rate.
      relatedQuestionRefs:
        - QO025

    - type: conflicting-data
      severity: minor
      topic: platform-integration-count
      missingEvidence: >-
        Total platform integrations variously cited as 400+ (Axonius official) and 1,000+ (Lightspeed quote);
        discrepancy may reflect different counting methodologies (adapters vs total integration touchpoints).
      whyItMatters: >-
        Integration breadth is a core competitive moat claim; reconciling the count matters for competitive
        positioning analysis.
      diligencePath: >-
        Request current integration count breakdown by category from product team.
      relatedQuestionRefs:
        - QO028

    - type: missing-source
      severity: minor
      topic: competitor-differentiation-detail
      missingEvidence: >-
        Public sources do not provide a rigorous side-by-side comparison of Axonius vs Armis or Claroty feature
        sets; differentiation claims are primarily from company materials.
      whyItMatters: >-
        Understanding genuine differentiation from well-funded competitors is essential for assessing competitive
        moat and pricing power.
      diligencePath: >-
        Obtain Gartner Magic Quadrant or Forrester Wave positioning; conduct customer reference calls.
      relatedQuestionRefs:
        - QO015

    - type: private-evidence-only
      severity: minor
      topic: valuation-comparable-multiples
      missingEvidence: >-
        No public source provides a formal comparable company analysis for Axonius at $2.6B on $151.5M ARR
        (~17x ARR multiple); peer multiples are inferred from market reports.
      whyItMatters: >-
        Valuation context requires peer comparison; flat valuation may reflect fair market pricing or material
        discount depending on comparable universe selected.
      diligencePath: >-
        Build formal comparable analysis using cybersecurity company public market multiples and recent M&A comps.
      relatedQuestionRefs:
        - QO027
