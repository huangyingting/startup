company:
  name: Axonius Inc.
chapter:
  number: 6
  title: Customers
  summary: >-
    Axonius serves 670+ enterprise and government customers across financial services, healthcare,
    manufacturing, retail, and public sector verticals. The customer base is concentrated in large
    enterprises ($1B+ revenue) with complex multi-tool IT environments. Named public customers include
    multiple U.S. DoD branches (DoD CMRS contract), along with marquee commercial enterprises. Proxy
    evidence from Gartner Peer Insights, G2, and Forrester TEI confirms production deployments with
    measurable security outcomes. Core retention data (NRR, GRR, churn) is undisclosed; the platform's
    deep integration architecture implies high switching costs. Adverse evidence includes pricing complaints
    from mid-market prospects and a long-cycle sales friction point noted in customer reviews.

sections:
  - id: section-1
    title: Customer base segmentation and verticals
    body: >-
      Axonius has disclosed 670+ enterprise customers as of 2024, growing from a sub-500 count in 2022.
      The platform targets large enterprises with complex, heterogeneous IT environments — specifically
      organizations managing 10,000+ assets across multiple on-premises, cloud, and SaaS environments.
      The ideal customer profile (ICP) is a Fortune 1000 company with a mature security operations team
      and existing investments in multiple endpoint, identity, and cloud security tools that generate
      fragmented, unreconciled asset data. Axonius monetizes the need to aggregate these tools into a
      unified asset inventory without replacing them.

      Verticals represented in public customer evidence include financial services (banks, insurance,
      asset managers), technology companies, healthcare organizations, U.S. federal government and DoD,
      manufacturing, retail, and telecommunications. The DoD CMRS multi-year contract (December 2024)
      with 4 of the 5 major DoD branches is the most significant single customer relationship by strategic
      value. Geographically, Axonius's customer base is predominantly North American, with EMEA expansion
      underway from the Dublin office; international revenue as a proportion of total ARR is not disclosed.

      Buyer personas are primarily security-focused: CISO, Director of Security Operations, and VP of IT
      Security are the most common titles in published customer testimonials and G2 reviews. IT Operations
      leadership (CTO, IT Director) appears as a secondary buyer, particularly for SAM and SaaS Management
      modules. The typical deal is procured at the CISO level with IT Operations as the operator, and
      Finance/Procurement as approver. There is no self-serve or product-led growth path; all customer
      relationships begin with direct enterprise sales, contributing to long sales cycles (3-9 months).
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006

  - id: section-2
    title: Named customer proof and deployment evidence
    body: >-
      Named customer evidence for Axonius spans government, financial services, and technology verticals.
      The most prominent named customer is the U.S. Department of Defense, where the Axonius CMRS contract
      covers 4 of 5 DoD branches (Army, Navy, Air Force, Marines confirmed; Space Force unconfirmed) and
      represents a multi-year platform commitment — the clearest public proof of production deployment at
      scale. Additional DoD-adjacent evidence includes FedRAMP Moderate authorization enabling civilian
      agency deployments.

      Gartner Peer Insights reviews for the CAASM category include Axonius ratings from enterprise IT
      security professionals confirming production deployments. G2 reviews corroborate that customers use
      Axonius for unified asset inventory and security coverage gap analysis. The Forrester TEI study
      (March 2025) documents a composite of real Axonius deployments across organizations managing
      400,000-699,999 assets, reporting $775K/year in savings, $3.22M NPV, and <6 month payback. While
      the study is vendor-commissioned, it draws on interviews with actual customers.

      Customer satisfaction reviews across G2, Gartner Peer Insights, and PeerSpot cite strengths
      including breadth of adapters, ease of deployment relative to alternatives, and quality of the
      unified asset view. Adverse feedback includes complaints about pricing opacity and total cost for
      large asset estates, long initial setup time for first adapters, and limited out-of-box report
      templates. One reviewer on G2 noted that pricing was "significantly higher than alternatives" for
      mid-market deployments, suggesting Axonius may price out of the sub-10,000 asset market.
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013

  - id: section-3
    title: Retention, expansion, and durability
    body: >-
      Axonius does not disclose net revenue retention (NRR), gross dollar retention (GDR), churn rate,
      or renewal rate; these are the most critical undisclosed metrics for assessing the durability of
      the 670+ customer base. However, multiple structural factors support a high NRR hypothesis:
      the adapter-based integration model creates deep switching costs (customers configure 40-80+
      adapters and build custom policy rules); the asset count pricing model provides natural expansion
      as customer estates grow; and the platform's role in compliance reporting (FISMA for federal,
      SOC 2 audit prep for commercial) makes it difficult to remove without degrading compliance workflows.

      The Forrester TEI study cites a <6 month customer payback period, which suggests rapid realized
      value and a strong retention driver; customers who achieve payback within the first year are
      statistically less likely to churn. Proxy indicators of retention health include the linear ARR
      growth rate (51.5% YoY in 2024) at the 670+ customer scale — this growth rate is consistent with
      new logo additions plus expansion, though the exact split is unknown.

      Expansion risk is primarily macro-driven: if customer asset counts flatten (economic slowdown,
      asset optimization programs), ARR growth from the installed base slows; Axonius has no minimum
      seat expansion requirement to maintain the platform. Concentration risk is moderate: no single
      customer is publicly confirmed to represent more than 5% of ARR, but the DoD CMRS contract may
      represent a meaningful concentration of government revenue; if DoD does not renew, federal ARR
      could decline materially. The long-tail (600+ smaller enterprise customers) provides diversification.
    claimRefs:
      - CU014
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020

  - id: section-4
    title: Adverse evidence and customer risks
    body: >-
      Adverse customer evidence for Axonius is limited but present. G2 reviews include criticisms of
      Axonius's pricing as "opaque" and "difficult to justify for smaller asset estates"; multiple reviews
      note that pricing is quote-based and "expensive" for mid-market prospects, suggesting Axonius may
      have limited addressable market outside large enterprises. One PeerSpot reviewer noted that the
      "initial setup and adapter configuration took longer than expected" and that certain adapters had
      data quality issues with specific tool versions.

      The Cisco acquisition discussion (2023-2024, $2B offer reportedly denied by Axonius) creates
      customer uncertainty: if Axonius is perceived as a potential acquisition target, some customers may
      delay renewals or pilot competing solutions to reduce dependency risk. The ~100 employee layoffs in
      late 2024 also created uncertainty about product roadmap velocity and customer success coverage,
      though no public evidence of customer loss due to the layoffs was found.

      The Cynerio acquisition introduces a new category of risk: healthcare customers adopting the
      combined platform need HIPAA compliance assurance that is not yet confirmed; any delay in HIPAA
      certification could block hospital procurement. No public lawsuits, contract disputes, or regulatory
      actions against Axonius related to customer relationships were found in public databases.
    claimRefs:
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025

