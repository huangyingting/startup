  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: retention-metrics
      missingEvidence: >-
        Net revenue retention (NRR), gross dollar retention (GDR), and annual customer churn rate for
        Axonius are not publicly disclosed; these are the most critical customer durability metrics
        for investment underwriting; structural evidence suggests high retention but cannot confirm
        actual rates without data room access.
      whyItMatters: >-
        Without NRR/GDR, the 670+ customer base could have high hidden churn masked by new logo additions;
        ARR growth rate alone does not confirm retention quality; NRR is a prerequisite for IPO readiness
        and public market comparisons.
      diligencePath: >-
        Request NRR by segment (commercial vs federal) for 2022, 2023, 2024; request GDR; request expansion
        ARR as % of total ARR; request customer cohort survival curves; confirm methodology.
      relatedQuestionRefs:
        - QU012

    - type: private-evidence-only
      severity: blocking
      topic: named-customer-list
      missingEvidence: >-
        No publicly named commercial enterprise customers beyond the DoD CMRS contract have been
        confirmed; the 670+ customer base appears to be under systematic NDA; without named references
        by segment, customer quality and vertical concentration cannot be independently assessed.
      whyItMatters: >-
        Named reference customers are required for investor due diligence, channel validation, and
        independent outcome confirmation; customer name availability for confidential diligence
        conversations should be confirmed before investment.
      diligencePath: >-
        Request customer reference list by segment with willingness to speak; confirm NDA scope;
        request at least 3-5 named customers in each primary vertical for reference calls.
      relatedQuestionRefs:
        - QU003

    - type: private-evidence-only
      severity: material
      topic: acv-and-contract-terms
      missingEvidence: >-
        Average contract value (ACV), average contract length, and multi-year vs annual contract mix
        are not publicly disclosed; without ACV, the per-customer revenue distribution and top-customer
        concentration cannot be confirmed.
      whyItMatters: >-
        If ACV is highly skewed (top 10 customers represent 50%+ of ARR), the concentration risk is
        material regardless of the 670+ total count; ACV and contract term determine visibility of
        future ARR.
      diligencePath: >-
        Request median and mean ACV; request top-10 customer concentration as % of ARR; request contract
        term mix (annual vs multi-year); request average contract duration.
      relatedQuestionRefs:
        - QU023

    - type: private-evidence-only
      severity: material
      topic: cross-sell-attach-rate
      missingEvidence: >-
        Module cross-sell attach rate (% of CAASM customers also purchasing SAM or SaaS Management)
        and expansion ARR from module cross-sell are not publicly disclosed; the multi-module expansion
        thesis depends on confirmed cross-sell traction.
      whyItMatters: >-
        If the cross-sell attach rate is <10%, the multi-module expansion thesis is not validated;
        a high attach rate would demonstrate platform stickiness and NRR above 100% from module
        cross-sell alone; critical for modeling revenue durability.
      diligencePath: >-
        Request cross-sell attach rate by module; request SAM and SaaS Management ARR as % of total;
        request average deal size with and without cross-sell; confirm average number of modules per customer.
      relatedQuestionRefs:
        - QU024

    - type: enumeration-incomplete
      severity: material
      topic: named-customer-proof-completeness
      missingEvidence: >-
        The Named Customer Proof Table (TU003) contains only 6 entries, all anonymized or composite.
        Only the DoD CMRS is a fully confirmed named customer. The 670+ customer base is not accessible
        from public sources for named proof enumeration.
      whyItMatters: >-
        Sparse named customer evidence limits independent assessment of customer quality, deployment
        scale, and outcome diversity; reliance on composite (Forrester TEI) and anonymized reviews
        reduces confidence in the adoption narrative.
      diligencePath: >-
        Request customer reference contacts by vertical; request permission to disclose top-5 customers
        for investor diligence purposes; validate DoD CMRS contract scope and renewal provisions.
      relatedTableRefs:
        - TU003
      relatedQuestionRefs:
        - QU003
        - QU007
        - QU008
