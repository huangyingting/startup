figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      Customer journey for an enterprise CISO or IT security director purchasing and deploying Axonius,
      from initial awareness through renewal and expansion. Illustrates adoption surfaces and expansion
      loops that drive NRR.
    data:
      items:
        - label: Awareness and problem recognition
          detail: "CISO or security director identifies asset inventory blindspot — tools don't talk to each other; discovers Axonius through Gartner CAASM category, peer referral, or security conference."
        - label: Evaluation and proof-of-value (POV)
          detail: "3-9 month enterprise sales cycle; Axonius deploys POV environment connecting 10-20 adapters; demonstrates coverage gaps and normalization accuracy; key stakeholders: CISO + IT Director."
        - label: Enterprise procurement and contract signature
          detail: "Procurement review (Finance, Legal, Security); SOC 2 review; Master Service Agreement; pricing based on asset count; typical ACV $300K-$1M+ for large enterprise; annual or multi-year term."
        - label: Initial deployment and adapter rollout
          detail: "Customer IT team activates adapters (priority: EDR, MDM, CMDB, cloud); Axonius CSM guides onboarding; first policy rules configured; coverage gap dashboard goes live."
        - label: Full production and policy enforcement
          detail: "All critical adapters live; automated policy enforcement active; ITSM tickets generated for gap violations; security coverage gap reports shared with CISO and board; <6 month payback per Forrester TEI."
        - label: Expansion (asset count growth)
          detail: "As customer's asset estate grows (new cloud workloads, M&A, new devices), asset count in Axonius increases automatically; ARR expands at next renewal via price-per-asset ratchet."
        - label: Module cross-sell (SAM, SaaS Management)
          detail: "Axonius sales proposes SAM or SaaS Management add-on; customer uses same adapters for additional use case; single platform vs. point tool argument; incremental ACV increase."
        - label: Renewal and NRR expansion
          detail: "Annual or multi-year renewal; switching cost is high (40-80 adapter configurations, custom policy rules, reporting workflows all must be rebuilt in alternative); NRR likely >100% if estate grows."
    approximationNotes: >-
      Customer journey stages based on Axonius sales process descriptions, Forrester TEI customer interviews,
      G2 and Gartner Peer Insights reviews. Cycle lengths and ACV ranges are benchmarks; actual values vary
      by customer segment and geography.
    claimRefs:
      - CU003
      - CU004
      - CU008
      - CU014
      - CU015
      - CU016
      - CU019

