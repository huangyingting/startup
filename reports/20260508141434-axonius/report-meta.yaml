companyProfile:
  summary: Axonius is a New York-based private cybersecurity company that pioneered the Cyber Asset Attack Surface Management (CAASM) category. Its platform aggregates data from 1,000+ adapters to provide unified asset visibility, security control gap detection, and automated remediation across cloud, on-premises, and OT environments. The company was co-founded in 2017 by Dean Sysman, Ofri Ben-Ari, and Nathaniel Hawthorne; experienced a CEO transition in February 2026 when Sysman moved to Executive Chairman and Joe Diamond became Interim CEO. The company serves 670+ enterprise and government customers, achieved $151.5M ARR in 2024 (51.5% YoY growth), and acquired Cynerio (healthcare IoT security) in July 2025 for ~$180M. Axonius laid off ~100 employees in November 2025 and had unconfirmed Cisco acquisition talks in early 2026.
  foundedDate: '2017-01-01'
  founders:
    - name: Dean Sysman
      role: Co-founder and Executive Chairman (formerly CEO)
      background: Led Axonius from inception through $700M+ total raise and CAASM category creation; moved to Executive Chairman in February 2026.
      claimRefs: [CO006, CO007]
    - name: Ofri Ben-Ari
      role: Co-founder and CTO
      background: Technical co-founder responsible for the platform's adapter-based architecture and product vision.
      claimRefs: [CO006]
    - name: Nathaniel Hawthorne
      role: Co-founder and President
      background: Co-founder responsible for go-to-market and enterprise partnerships.
      claimRefs: [CO006]
  foundingLocation: Israel / New York
  headquarters: New York, New York
  productSummary: Axonius Asset Cloud aggregates asset data from 1,000+ integrations spanning cloud (AWS, Azure, GCP), endpoint management (CrowdStrike, Defender, Jamf), identity (Okta, AD), SaaS, networking, OT, and IoT. Key capabilities include automated device discovery, security control gap detection, actionable remediation workflows, SaaS security posture management, and software asset management. Axonius AI (announced October 2025) adds LLM-powered querying and workflow automation. Cynerio acquisition (July 2025) adds purpose-built healthcare IoT/OT security.
  customerFocus: Enterprise and government organizations with complex hybrid infrastructure and compliance requirements; financial services, healthcare, technology, and U.S. federal government (DoD, IC) verticals.
  businessModel: Annual enterprise subscriptions priced by managed asset count; land-and-expand via module additions (SaaS management, SAM, OT); sold via direct enterprise sales team and channel partners.
  stage: late-stage private / unicorn
  fundingStatus: ~$700M total raised through Series E extension (March 2024) at a flat $2.6B post-money valuation; investors include Accel, Stripes, Lightspeed, Bessemer, and WestCap; potential for IPO or M&A exit.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO006, CO022, CO025, CO026, CI003, CU001]

summary:
  headline: Axonius has durable CAASM leadership and government penetration, but the $2.6B flat valuation, CEO transition, and unresolved financial opacity demand private diligence before institutional commitment.
  overallScore: 6.5
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched
  keyMetrics:
    valuationUsdM: 2600
    revenueRunRateUsdM: 200
    arrUsdM: 151.5
    revenueGrowthYoYPct: 51.5
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 700
    customerCount: 670
    headcount: 825
  topStrengths:
    - CAASM category creator and market leader with 670+ enterprise customers and 1,000+ native integrations, creating deep switching costs and platform stickiness.
    - ARR growth of 51.5% YoY to $151.5M in 2024 demonstrates continued enterprise demand despite a $2.6B flat round valuation.
    - DoD CMRS contract (Dec 2024) and IC authorization validate Axonius's ability to serve the highest-security government environments, a moat that competitor startups cannot easily replicate.
    - Cynerio acquisition (July 2025) adds healthcare IoT/OT security, expanding TAM and creating a differentiated vertical offering at a time when healthcare cyber attacks are accelerating.
    - Forrester TEI showed 156% ROI over 3 years with 9-month payback; strong customer NPS and G2/Gartner Peer Insights ratings confirm platform stickiness.
  topRisks:
    - CEO transition (Dean Sysman → Joe Diamond, Interim, Feb 2026) creates key-person risk at a critical pre-IPO inflection point; succession uncertainty may slow enterprise deals and fundraising.
    - Valuation has been flat at $2.6B since 2022 despite strong ARR growth; current 17x ARR multiple is compressed vs. category leaders (Wiz at 50x+, CrowdStrike at 20x+), signaling investor hesitation or overhang.
    - No public disclosure of gross margin, NRR, burn rate, or cash runway post-Cynerio; integration risk from $180M acquisition may pressure margins and distract product roadmap in 2025-2026.
    - November 2025 layoffs (~100 employees, ~10% of workforce) and Cisco acquisition reports (denied by Axonius) create combined narrative of distress that may affect enterprise confidence and talent retention.
    - Microsoft Defender for Endpoint, ServiceNow, and bundled cloud-native tools are eroding CAASM addressable market from the top-down; Armis, Qualys, and Tanium attack from the enterprise TAM base.
  unresolvedGaps:
    - Audited gross margin, NRR by cohort, churn rate, and unit economics (CAC, LTV, payback) are not publicly disclosed.
    - Cash position and burn rate post-Cynerio acquisition; runway to profitability or IPO; Series E preference stack and ratchet provisions.
    - Full operational and financial details of Cynerio integration including standalone ARR, integration timeline, and cost synergies.
    - Impact and resolution of CEO transition — whether Joe Diamond's interim status will be confirmed permanent and whether Dean Sysman's exit from the CEO role affects key customer relationships.
    - Independent verification of $200M+ ARR projection for 2025 and confirmation that growth is durable vs. one-time government contract wins.

