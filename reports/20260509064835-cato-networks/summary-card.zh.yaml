summary:
  headline: |
    Cato Networks 是 Gartner 认可的单一厂商 SASE 龙头，架构差异真实，中端市场势头强，客户超过 4,000 家；但 NRR/利润率未披露，IPO 暂停，使 $4.8B 要价存在估值不确定性。
