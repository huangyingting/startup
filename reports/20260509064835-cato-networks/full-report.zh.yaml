      - number: '4.4'
        title: 公开规模指标与私有披露缺口
        blocks:
          - type: paragraph
            body: >
              Cato Networks 公开确认了三个 ARR 里程碑：2021 年达到 $100M ARR（成立五年后，被称为最快达到该里程碑的企业网络初创公司）、2024 年 7 月达到 $200M ARR、到 2025
              年 9 月达到 $300M+ ARR。公司还披露，截至 2025 年末，企业客户数超过 3,500 家。$300M ARR 里程碑得到 Reuters、BusinessWire、TechCrunch
              等多家独立新闻来源佐证，因此可信度较高。在 $300M ARR 和 3,500 家客户下，隐含平均合同价值（ACV）约为每年 $85,000，符合中端市场到偏低的大型企业定位。


              但以下对财务判断重要的指标并未公开：毛利率、净收入留存率、总美元留存率、获客成本、回本周期、自由现金流、经营利润率、递延收入余额，以及按职能划分的员工数。基于 Cato 披露的先落地再扩张打法和可比 SaaS
              基准，净收入留存率估计为 110–120%；基于公司披露的低流失表述，总美元留存率估计为 95%+。这些估计存在明显不确定性，没有 Cato 内部数据室权限无法验证。客户收入集中度——尤其是前 10 大客户是否占
              ARR 的不成比例份额——尚未披露，对投资者构成尾部风险。公司披露的 ARR 里程碑，与投资级尽调所需完整财务图景之间存在显著缺口。
