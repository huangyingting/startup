      - number: '7.2'
        title: 监管、法律与地缘政治风险
        blocks:
          - type: paragraph
            body: >
              截至研究日期，Cato Networks 未披露任何重大诉讼、监管执法行动或知识产权争议。公司持有 SOC 2 Type II、ISO 27001、PCI DSS Level 1、HIPAA、GDPR 和
              Cyber Essentials UK 认证，为企业和受监管行业合规提供了扎实基线。不过，仍有几类结构性监管和法律风险需要尽调。


              数据驻留风险是最重要的监管暴露：Cato 在 150+ 个国家拥有 85+ 个 PoP，带来复杂的 GDPR 第 44–49 条跨境传输义务、德国（BDSG）、法国（CNIL）、印度（DPDP
              Act）和中国等市场的数据主权问题，以及 EU AI Act 引入的 AI 数据处理新义务。随着 Cato 通过 Aim Security 收购和 SPACE 引擎增加 AI 驱动安全功能，监管机构对由 AI
              处理的网络流量数据会更严格审视。


              寻求美国资本市场上市的以色列公司，在地缘政治事件以及以色列与美国市场之间跨境数据流更广泛审查之后，面临 SEC 更高审查。自 2023 年 10
              月以来以色列持续冲突，使受预备役（miluim）义务影响的工程和运营人员面临不可抗力与业务连续性风险。货币风险显著：Cato 约 50% 的成本基础以 ILS 计价，而收入以 USD 计价，每一次 ILS
              升值都会放大 FX 暴露。公开信息未披露债务或监管融资义务。
