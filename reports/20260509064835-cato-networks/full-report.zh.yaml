      - number: '5.2'
        title: 核心架构：SPACE、全球 PoP 骨干网与单次通过安全
        blocks:
          - type: paragraph
            body: >
              Cato 平台的核心架构创新是 Single Pass Cloud
              Engine（SPACE）：这套软件栈只解密一次企业流量，在同一个处理上下文中以顺序管线施加所有安全检测功能，然后重新加密并交付流量。施加的功能包括：用于分段的 NGFW，用于威胁防护的 SWG 和
              IPS，用于载荷检测的 NGAM，用于浏览器隔离的 RBI，DNS 安全，用于应用与数据保护的 CASB 和 DLP，以及用于访问控制的
              ZTNA——全部在单次通过中完成，并共享流量上下文。新增安全能力不会带来额外解密开销；新功能接入 SPACE 管线，并继承同一性能边界。


              SPACE 引擎以数千个实例运行在全球一线托管数据中心的 85+ 个 PoP 上。Cato 自有并管理这些设施内的裸金属计算资源，并通过多家 Tier-1 运营商互联 PoP，形成私有全球骨干网，提供有 SLA
              支撑、等同 MPLS 的 WAN 连接。Cato 直接持有计算基础设施，而不是租用超大规模云厂商容量，因此能自主控制软件更新、容量扩展和 PoP 扩张。


              支撑 Cato AI/ML 与分析能力的数据湖，摄取所有由 SPACE 生成的流量上下文、来自 Cato Client ZTNA 和 EPP 引擎的终端遥测、来自 Microsoft Defender 与
              CrowdStrike 的第三方终端数据，以及数百个外部威胁情报源。Cato Security Research 用 AI/ML 验证情报源质量，并在全球部署前，先用真实客户流量模拟新的防护规则，随后在
              24–48 小时内全球上线。平台可靠性靠四套自管理机制维持：自愈（自动 PoP 故障切换）、自优化（动态路径选择）、自扩展（SPACE 实例横向扩展）和自演进（无中断软件更新）。Cato 声称服务可用性为
              99.999%。
