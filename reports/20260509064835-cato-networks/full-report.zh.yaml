  - id: TV005
    title: 投资逻辑破裂与止损触发表
    notes: 止损触发事件会要求立即重评投资逻辑。监控触发信号来自公开来源或定期沟通。阈值反映编辑部对重大性的判断，不是合同约束条款。
    columns:
      - 风险
      - 可监控触发信号
      - 止损阈值
      - 行动含义
    rows:
      - - ARR 增长减速
        - 公开 ARR 公告；新闻稿节奏
        - 连续 2 个披露期同比增长 < 25%
        - 下调至持有；按 8–10x ARR 的悲观情景重估
      - - NRR 披露低于阈值
        - 首次 NRR 披露（IPO S-1、投资人材料或访谈）
        - 首次公开披露 NRR < 105%
        - 下调至卖出；先落地再扩张逻辑失效
      - - 平台安全事故
        - 安全事件披露；CVE 记录；状态页；新闻监控
        - 确认管理平面被攻破，或多客户数据暴露
        - 立即卖出信号；监管与流失可能连锁爆发
      - - FedRAMP 授权失败
        - FedRAMP 市场状态；管理层评论
        - 自 3PAO 评估启动起 36 个月后仍为「In Process」；或撤回申请
        - 减仓 20–30%；政府 TAM 被永久压缩
      - - CEO 离任（Shlomo Kramer）
        - LinkedIn；新闻稿；公开访谈缺席
        - 确认离任且未指定继任者
        - 下调至持有，等待评估新 CEO 履历
      - - 低价融资或 M&A 低于 $4.0B
        - 新闻稿；Crunchbase；PitchBook 监控
        - 下一轮融资或 M&A 交易定价低于 $4.0B
        - 被迫减记；优先股堆叠可部分保护后期投资人，但也释放增长失败信号
      - - Palo Alto 在竞争评测中胜率 >25%
        - 渠道合作伙伴访谈；Gartner MQ 同业数据；销售评论
        - 渠道合作伙伴报告 Cato 在竞争评估中败率 >25%
        - 提高竞争监控频率；重评增长韧性
      - - 重大多客户 SASE 中断
        - 状态页；Twitter/X 监控；企业媒体
        - 多家企业、持续多小时的中断获公开确认
        - 评估流失影响、SLA 赔付敞口和声誉损害
    claimRefs:
