      - number: '4.5'
        title: 资本充足性、融资历史与现金跑道
        blocks:
          - type: paragraph
            body: >
              Cato Networks 自 2015 年成立以来通过 8 轮融资累计募集超过 $1B 股权资金。最近一次融资是 Series G：2025 年 1 月先以 $359M 关闭，随后在 2025 年 9 月由
              Acrew Capital 按相同条款追加 $50M 承诺，扩展至 $409M。本轮由 Vitruvian Partners 和 ION Crossover Partners 领投，LightSpeed
              Venture Partners、Acrew Capital、Adams Street Partners 参投。$4.8B 估值在 $300M ARR 下隐含约 16× ARR 倍数——高于交割时公开 SASE
              同行 Zscaler、Palo Alto Networks 10–12× NTM ARR 交易倍数，反映市场为 Cato 的增长轨迹和平台差异化支付溢价。


              Series G 募资中约 $120M 用于员工老股出售，为长期员工和联合创始人在推迟 IPO 前提供流动性。剩余约 $289M 为可用于运营的新股资金。按估计每月烧钱 $12–25M 计算，2025 年 1
              月交割后新股资金现金跑道约为 12–24 个月，意味着下一次潜在融资事件落在 2026 年中后期，与预期 IPO
              窗口一致。公司未公开披露债务额度或项目融资义务，但基础设施机房托管合同和硬件租赁构成表外承诺。IPO 时间表已从最初的 2023 年预期多次后推，使外界无法判断卡点是市场环境还是内部盈利里程碑。AIM
              Security 收购（条款未披露）又是一笔额外资本投放，会缩短可用现金跑道。
