        title: 融资历史、估值与投资人版图
        blocks:
          - type: paragraph
            body: >
              自 2015 年以来，Cato 累计融资超过 $1B，经历了八轮融资。公司在 2020 年 11 月通过 $130M Series E 达到独角兽状态，估值超过 $1B。最近一轮机构融资是 2025 年 6 月的
              Series G，募资 $359M，估值 $4.8B，由 Vitruvian Partners 和 ION Crossover Partners 领投，LightSpeed、Acrew Capital 和
              Adams Street Partners 参投。2025 年 9 月，Acrew Capital 按相同条款追加 $50M，把 Series G 总额推至 $409M。Series G 资金中约 $120M
              用于员工老股出售，在 IPO 延后之际为长期员工提供流动性。


              此前融资包括：Series A（$20M，2015）、Series B（$50M，2016）、Series C（$55M，2019）、Series D（$77M，2020 年 4 月）、Series
              E（$130M，2020 年 11 月）和 2021 年 Series F（$200M，估值 $2.5B）。2023 年融资（$238M，估值 $3B+）由 LightSpeed 领投，累计融资达到
              $773M。历史投资人包括 Greylock、Coatue、SoftBank Vision Fund 2、Singtel Innov8、Adams Street Partners 和 US Venture
              Partners。
