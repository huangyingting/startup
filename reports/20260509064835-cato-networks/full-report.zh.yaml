              Cato 的轨迹横跨产品萌芽（2015–16）、远程办公顺风推动的高速增长（2019–22）、多轮大额融资（2020–23）和 IPO 前阶段（2024–26）。2022 年 11 月的 ARR
              里程碑证明，公司从 $0 到 $100M 走出了企业网络安全史上最快路径。尽管 VC 市场整体承压，公司 2023 年融资仍快于此前节奏，估值达到 $3B+。


              反向事件包括联合创始人 Gur Shatz 在 2024 年 1 月因据报道的分歧离职——这是实质性的治理和关键人物风险。IPO 进程最初目标为 2024 年末，后来推迟到 2025 年初；到 2025 年 5
              月又被冻结。据报道，潜在收购方对估值提出担忧后，Cato 开始探索出售。公司转而在 2025 年 6 月完成 Series G，部分目的是给员工提供老股流动性。截至本报告运行日，尚未宣布 IPO 或出售。2025
              年 9 月，Cato 完成首次收购，买下 AI 安全初创公司 Aim Security，以扩展企业 AI 安全；同一时期，公司宣布 ARR 达到 $300M。
