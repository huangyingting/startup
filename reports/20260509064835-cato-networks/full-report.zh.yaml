  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图概览
        blocks:
          - type: paragraph
            body: >
              SASE 市场由八类厂商争夺：云原生单一供应商平台、先做 SSE 再加入 SD-WAN 的厂商、向云延伸的传统网络安全厂商、叠加安全能力的传统网络厂商、托管 SASE 提供商、电信运营商 SASE
              套餐、超大规模云厂商的零信任产品，以及内部自建替代方案。Cato 最直接竞争的是第一类，同时也要防御其他类别的侵蚀。


              根据 Gartner 2024 年单一供应商 SASE 魔力象限，市场有三家领导者：Cato Networks、Zscaler 和 Palo Alto Networks。象限还包括 Netskope
              等挑战者，以及覆盖 Fortinet、Cisco、Cloudflare 等公司的远见者和利基玩家。此前碎片化的市场整合成大约三家领导者，说明企业越来越偏好集成平台，而不是同类最佳点产品；这在结构上利好 Cato
              的定位。


              Dell'Oro Group 2024 年 Q3 数据显示，前六大 SASE 厂商控制约 72% 的 $2.4B 季度 SASE
              市场，集中度很高。大型企业标准化到完整平台提供商后，不再自己拼装点产品，头部之外的厂商面临越来越强的商品化压力。这一趋势加速领导者累积切换成本，抬高新进入者门槛，同时也提高了产品架构碎片化的既有厂商被替换的风险。


              相邻替代方案包括内部自建项目（大型云原生公司用 AWS Transit Gateway、Google BeyondCorp 或 Azure Virtual WAN 加原生安全控制）、AT&T、Verizon 和
              Orange Business 的电信托管 SASE 套餐，以及区域 MSSP 解决方案。这些替代方案最适用于拥有专门工程团队的超大型企业，以及有特定数据驻留要求的受监管公司。对多数企业来说，现状仍是 MPLS
              线路、硬件防火墙、VPN 集中器和点状安全产品的混合配置——Cato 及其他 SASE 竞争对手正在替换这种配置。
            claimRefs:
              - CP001
              - CP016
              - CP027
              - CP033
