      - number: '6.5'
        title: 扩张、集中度与渠道风险
        blocks:
          - type: paragraph
            body: >
              Cato Networks 的先落地再扩张由模块化安全附加项（DLP、XDR、EPP、AI 安全）以及地点 / 席位扩张驱动。2025 年改版的「Powered by Cato」渠道计划提供 150+ 家独家
              MSP 伙伴，他们转售平台，并在直销团队触达不到的 SMB 到中端市场层级推动扩张。渠道约占新增订单 40–50%，降低了直销账本中的头部客户集中度风险。不过，Cato
              不公开披露头部客户收入集中度，也不披露是否有单一客户超过总 ARR 的 5%；这是集中度评估的重大尽调缺口。ACV/CAC/LTV 数据同样不公开，因此无法评估渠道账本相对直销账本的盈利性。「Powered by
              Cato」独家性形成伙伴锁定，有助于留存，但若大型 MSP 伙伴流失或被收购，也会带来集中度风险。多年期企业合同、高 GDR 和渠道广度让收入基础耐久性具备合理可信度，但缺少 NRR
              和集中度数据，限制了完整投资判断确定性。
