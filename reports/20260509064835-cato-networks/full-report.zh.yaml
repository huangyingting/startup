      - number: '4.3'
        title: 成本结构、毛利率与资本强度
        blocks:
          - type: paragraph
            body: >
              Cato 的成本结构由其私有全球骨干网决定：这是一个由 85+ 个 PoP 节点构成的专用网络，作为交付 SASE 服务的云原生底座。Zscaler、Netskope 等纯软件 SSE
              同行借助第三方云厂商（AWS、Azure、GCP）完成计算和交付，Cato
              则自有并运营一张专有全球私有骨干网。该架构选择带来可观的基础设施资本开支（机房托管、硬件、带宽合同）和持续运营成本，并直接进入销售成本（COGS），因此相对纯软件同行结构性压低毛利率。


              Zscaler 2024 财年报告毛利率约 79%；Cloudflare 约 77%；Fortinet 约 76%。对运营私有骨干网的 SASE 供应商而言，估计 62–72%
              的毛利率更符合其基础设施成本画像——相对 Zscaler 在毛利率线上存在 7–17 个百分点的结构性劣势。Cato 并未公开确认毛利率。毛利以下，销售与营销估计占收入 35–40%（符合高速增长
              SaaS），研发占 20–25%，一般及行政占 8–12%，意味着经营利润率显著为负。营运资本结构上有利（订阅预付款），但被未披露的递延收入余额遮住。PoP 扩张和硬件更新的年度资本开支估计为
              $20–40M。AIM Security 收购增加整合和研发成本。自由现金流估计明显为负，符合公司持续依赖外部融资的状态。
            claimRefs:
              - CI008
