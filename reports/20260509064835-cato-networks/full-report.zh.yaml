      - number: '7.6'
        title: 图表
        blocks:
          - type: callout
            title: IPO 冻结与治理叠加制造近期投资不确定性
            body: >
              2025 年 5 月 IPO 冻结、2024 年 1 月联合创始人离职，以及 CEO Shlomo Kramer 的年龄和唯一创始人身份叠加，形成治理与流动性不确定性集群；对 Cato 这种 ARR
              规模的公司而言并不常见。IPO 冻结说明，市场环境或潜在收购方估值预期可能低于 Cato 在 Series G 中确立的 $4.8B 估值。若 Cato 以显著更低估值推进 IPO，超过 $1B
              融资形成的优先权悬垂会带来稀释复杂性。若 Cato 选择被收购，2025 年 5 月关于收购方估值顾虑的报道提示交易风险。Shatz 离职进一步增加不确定性：战略方向，尤其是 IPO
              时点和产品范围，是否得到领导层充分一致支持。投资者在投入资本前，应要求公司明确 IPO 路径、继任规划和董事会动态。
