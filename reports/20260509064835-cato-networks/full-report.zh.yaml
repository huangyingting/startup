  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Gartner 定义、行业采纳的 SASE 市场，把软件定义广域网（SD-WAN）与云交付安全栈合并到一个收敛平台；安全栈包括安全 Web
              网关（SWG）、云访问安全代理（CASB）、零信任网络访问（ZTNA）和防火墙即服务（FWaaS）。Cato Networks 正面参与这一市场，目标是替换传统 MPLS 线路、本地防火墙、VPN 集中器和独立
              SD-WAN 设备。


              纳入的支出包括企业在 SD-WAN、SSE 组件（SWG、CASB、ZTNA、FWaaS、DLP、IPS）、全球私有骨干网服务和托管 SASE 交付上的订阅。排除的支出包括消费级 VPN
              产品、不含安全层的运营商托管 MPLS 服务、脱离网络语境销售的端点检测与响应（EDR）平台，以及没有网络访问组件的纯身份厂商。


              能带来 TAM 扩张选择权的相邻市场包括扩展检测与响应（XDR）、安全运营中心即服务（SOCaaS）、AI 驱动网络分析和 IoT/OT 安全网关。现状替代方案——企业当前用来替代 SASE
              的东西——是最主要的竞争壁垒：私有 WAN 使用传统 Multiprotocol Label Switching（MPLS），边界安全使用 Palo Alto Networks、Fortinet 和 Check
              Point 的硬件防火墙，远程访问使用 Cisco 和 Juniper 的点状 VPN 集中器。已经签下长期 MPLS 承诺的企业面临真实切换成本和合同锁定，拖慢 SASE
              采用；在金融服务、医疗健康等受监管行业，既有基础设施绑定的合规证明还会增加迁移风险。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
