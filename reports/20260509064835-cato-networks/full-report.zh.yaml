              - CU010
              - CU011
              - CU034
          - type: callout
            title: NRR 缺口限制完整留存判断
            body: >
              Cato 的 GDR >95% 是强底线信号，但未公开披露净收入留存率，阻碍了对扩张 ARR 质量的完整评估。对一家 $300M ARR、采用先落地再扩张模型的公司，NRR 是关键价值创造驱动因素——120%
              NRR 意味着每年从现有客户中产生 $36M ARR，且没有新增客户成本。没有 NRR，就无法把扩张动作对 ARR 增长的贡献与新增客户贡献拆开，也无法评估一旦新增客户获取放缓，增长是否会降速。NRR
              披露缺口是重大尽调要求，也应成为任何投资条款书谈判的前置条件。
