  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 区间图展示 Cato Networks 退出时在乐观、基准和悲观情景下的估值结果，并与当前 Series G $4.8B 入场价对比隐含回报。
    data:
      items:
        - label: 悲观情景退出估值（并购或降价轮）
          low: 2800
          high: 3500
          mid: 3150
        - label: 基准情景退出估值（IPO 或并购）
          low: 5000
          high: 6200
          mid: 5600
        - label: 乐观情景退出估值（IPO）
          low: 6500
          high: 7500
          mid: 7000
        - label: 当前入场价（参考）
          low: 4800
          high: 4800
          mid: 4800
    approximationNotes: >-
      所有估值区间均为编辑估算。悲观情景对应 $280–350M ARR 上的 8–10x ARR（增长放缓至接近持平）。 基准情景对应 $385–415M ARR 上的 13–15x NTM ARR（温和放缓）。乐观情景对应
      $420–440M ARR 上的 15–18x NTM ARR（增速维持在 20–23%）。所有数值单位为 $M USD。
    claimRefs:
      - CV022
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
