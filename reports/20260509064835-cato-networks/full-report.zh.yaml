          - type: callout
            title: MPLS 合同锁定是主要采用逆风
            body: >-
              大多数中大型企业与一级运营商签有 3–5 年 MPLS 合同。SASE 采用——包括 Cato 的销售管线——更多受合同到期周期节奏影响，而不只是技术准备度。这带来可预测但拉长的 S
              曲线采用模式，也限制了即便技术更优的 SASE 平台获取市场份额的速度。
            calloutType: risk
