      - number: '7.5'
        title: 领导层、治理与执行风险
        blocks:
          - type: paragraph
            body: >
              2024 年 1 月联合创始人兼 President/COO Gur Shatz 离职后，Cato Networks 面临更高的关键人和治理风险。据报道，他与 CEO Shlomo Kramer
              发生争议。Shatz 在此前联合创立 Incapsula（后被 Imperva 收购）之后，与 Kramer 共同创立 Cato，是基础性的运营和技术领导者。虽然 Shatz
              仍保留董事会席位，但近九年合作后的执行联合创始人离开，是治理拐点，也可能释放出围绕 IPO 时点、估值或运营方向存在战略分歧的信号。


              Shlomo Kramer（68+ 岁）是目前唯一仍在运营岗位上的创始人。Shatz 离职后，公司没有公开宣布继任计划或 COO 接替人选。预期 IPO 前，领导层厚度有所增加：Eyal
              Heiman（CTO）、Ofir Agasi（CPO）、Tomer Wald（CFO）、Nick Fan（CRO）和 Alon Alter（Chief Business Officer）覆盖了各职能，但他们均由
              Kramer 任命，属于第二代高管，不具备 Kramer-Shatz 创始组合的创始人资历权重。IPO 冻结（2025 年 5
              月）延长了管理团队对私营公司薪酬结构的暴露，提高了持有非流动性股权的高管留任风险。公开记录中没有披露法律纠纷、调查或治理违规。不过，创始人中心化治理模式、联合创始人离职、IPO
              冻结和地缘政治运营环境叠加，形成多因素执行风险，可能实质影响战略决策。
