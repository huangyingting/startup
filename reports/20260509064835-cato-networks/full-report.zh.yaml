      - number: '1.2'
        title: 创始人、领导层、董事会与治理
        blocks:
          - type: paragraph
            body: >
              Cato 由两位以色列网络安全老兵共同创办。CEO Shlomo Kramer 之前曾联合创办 Check Point Software Technologies（全球防火墙先驱）和 Imperva（先以
              $2.1B 出售给 Thoma Bravo，随后以 $3.6B 出售给 Thales）。联合创始人 Gur Shatz 此前创办 Incapsula（被 Imperva 收购），并担任 Cato 总裁兼
              COO，直到 2024 年 1 月在据报道与 Kramer 发生分歧后离职。Shatz 仍保留董事会席位。Kramer 与 Shatz 近 20
              年合作关系破裂，是值得关注的关键人物与治理风险，风险章节会进一步讨论。


              现任领导层包括 Eyal Heiman（CTO）、Ofir Agasi（CPO）、Tomer Wald（CFO）、Nick Fan（CRO）和 Alon Alter（首席商务官）。公司在预期 IPO
              前补强了管理梯队。董事会体现出强 VC 代表性：Ravi Mhatre 和 Yoni Cheifetz（LightSpeed）、Jerry Chen（Greylock），再加上独立董事 Eyal
              Waldman（Mellanox 创始人，后以 $7B 出售给 Nvidia）和 Gili Iohan（Varonis 前 CFO、ION Crossover Partners 合伙人；2024 年 10
              月加入）。Ronen Faier 也是独立董事。董事会构成释放出 IPO 前专业化信号，也反映公司在为公开市场做准备。
