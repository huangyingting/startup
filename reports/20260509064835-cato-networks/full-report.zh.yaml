            body: >-
              $8–12B 的 SAM 计算假设市场持续转向单一供应商 SASE 架构，而不是同类最佳的多供应商做法。如果企业继续维持碎片化的 Zscaler + Cisco SD-WAN 姿态，Cato 的实际 SAM
              会小得多。这个假设需要持续用赢单 / 输单数据验证。
