      - CV040
      - CV041
      - CV042
  - id: TV006
    title: 最终尽调事项表
    notes: 在按 $4.8B 估值投入资本前，需要优先确认的尽调事项清单。标记为「必须具备」的事项不可妥协；标记为「重要」的事项能显著提高信心，但若未确认，仍可在降低配置后投资。
    columns:
      - 尽调问题
      - 优先级
      - 需获取的信息
      - 反向结果含义
    rows:
      - - 按队列划分的净留存率（2022、2023、2024）
        - 必须具备
        - 确认 NRR ≥ 110%；趋势方向
        - NRR < 105% → 下调至持有 / 卖出
      - - 月度烧钱速度与 2026 年 Q1 现金余额
        - 必须具备
        - 确认以当前资金可支撑 ≥ 18 个月现金跑道
        - 月烧钱 > $30M → 融资风险；降低配置
      - - FedRAMP 3PAO 评估机构名称与预计 ATO 日期
        - 必须具备
        - 确认时间线 ≤ 24 个月；或决定不推进
        - 时间线 > 36 个月 → TAM 模型下调 20%；降低配置
      - - 总美元留存率（当前周期）
        - 必须具备
        - 确认 2023 年披露后的最新 GDR ≥ 95%
        - GDR < 90% → 重大流失信号；卖出
      - - 前 10 大客户 ARR 集中度
        - 必须具备
        - 确认前 10 大客户占总 ARR < 25%
        - 前 10 大客户占 ARR > 40% → 客户集中度风险；降低配置
      - - 模块附加率（使用 >2 个模块的客户）
        - 重要
        - 确认扩张动作跑通；>40% 客户使用多模块
        - 附加率 < 20% → 先落地再扩张逻辑走弱
      - - 渠道合作伙伴集中度（前 5 大 MSP 占比）
        - 重要
        - 确认没有单一合作伙伴占渠道 ARR > 10%
        - 单一合作伙伴 > 20% → GTM 依赖风险
      - - 按地区划分的员工数
        - 重要
        - 确认以色列工程师占总工程师比例 ≤ 70%
        - 以色列占比 > 80% → 地缘政治下的人才集中风险上升
      - - AIM Security 整合计划与 2025 年 Q4 进展
        - 重要
        - 确认整合按计划推进；关键 AIM 员工留任
        - 整合延迟 > 12 个月 → 路线图可信度受疑
      - - CFO 任期与审计机构
        - 重要
        - 确认已聘用四大审计机构，且 CFO 任期 ≥ 18 个月
        - 未聘用四大审计机构或 CFO 任期 < 12 个月 → IPO 时间线可能推迟
    claimRefs:
      - CV039
      - CV040
      - CV041
      - CV042
