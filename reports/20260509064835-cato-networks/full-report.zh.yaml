      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Cato 维持一套覆盖受监管行业的完整合规组合。当前认证包括 SOC 2 Type II 和 SOC 3；ISO 27001:2013（信息安全管理）、ISO 27017（云安全控制）、ISO 27018（云
              PII 隐私）、ISO 27701（隐私信息管理）；HIPAA（可提供 Business Associate Agreement）；PCI DSS Level 1；CSA STAR Level 2。这些认证通过
              Cato Trust Center（security.catonetworks.com）维护，企业采购团队可直接访问鉴证报告和合规文档。


              FedRAMP High Authorization 于 2026 年 3 月启动，Coalfire 担任第三方评估机构。FedRAMP High 是最严格等级，要求满足 NIST SP 800-53 High
              基线下的 400+ 项控制，代表 Cato 战略性切入美国联邦政府市场，驱动力来自机构对 SASE 和 AI 安全能力的需求。截至 2026 年 5 月，该流程尚未完成；联邦部署尚未获得授权。


              SPACE 的集中管理、单次通过架构带来内生合规优势：所有企业流量都经过区域 PoP 上统一管理的检测点，策略执行可审计且一致。这简化了对要求证明全流量检测框架的合规，例如 PCI DSS 持卡人数据、HIPAA
              PHI 传输；当 Cato 作为完整网络边缘部署时，不存在绕过 SPACE 的路由路径。Cato 的 Trust Center 模式向客户直接开放合规报告和鉴证函，反映出企业安全采购中「透明度即功能」的行业趋势。
            claimRefs:
              - CE010
              - CE011
              - CE033
