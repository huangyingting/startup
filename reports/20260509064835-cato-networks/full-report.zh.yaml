    data:
      layers:
        - label: 边缘与客户端层
          detail: 物理与软件连接点：Cato Socket（分支 SD-WAN）、vSocket（云 DC）、Cato Client （移动 / 远程 ZTNA + EPP），以及无代理浏览器门户（BYOD / 承包商）。
        - label: 传输与骨干网层
          detail: 全球 85+ 个由 Cato 管理的 PoP 部署在顶级托管数据中心，通过多条 Tier-1 运营商私有骨干网链路互联， 提供等同 MPLS、带 SLA 保障的 WAN。
        - label: 安全处理层（SPACE）
          detail: 每个 PoP 里的单遍处理引擎：流量只解密一次，随后 NGFW/FWaaS、SWG、IPS、NGAM、RBI、DNS 安全、 CASB、DLP 和 ZTNA 在同一处理上下文中依次执行。
        - label: 情报与数据层
          detail: 统一数据湖摄取 SPACE 事件、Cato Client/EPP 端点遥测和第三方情报源。Cato Security Research AI/ML 验证情报源；XDR 引擎运行 UEBA 和威胁狩猎。
        - label: 管理与集成层
