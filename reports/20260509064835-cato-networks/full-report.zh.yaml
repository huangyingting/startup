          - type: callout
            title: 地缘政治暴露是结构性的，无法完全缓释
            body: >
              Cato Networks 的工程、研发和运营领导层集中在以色列，这是结构性风险，短期没有缓释手段。自 2023 年 10
              月以来，地区冲突持续，军队预备役义务（miluim）和安全成本上升已经间歇性扰动运营。汇率风险更直接：Cato 约 50% 的成本以 ILS 计价，收入几乎全部以 USD 计价。ILS
              升值（历史上常出现在以色列经济走强时期）会压缩毛利率。Tel Aviv 运营的业务连续性计划未公开披露。美国和欧洲企业客户如果把 Cato SASE
              作为关键网络安全供应商评估，采购时可能更严格审视地缘政治运营风险，在国防、政府、关键基础设施等敏感垂直行业拖累赢率。
