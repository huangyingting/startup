companyProfile:
  summary: >
    Cato Networks 是一家总部在 Tel Aviv 的网络安全与网络公司，由 Shlomo Kramer（Check Point Software 和 Imperva 联合创始人）参与创立，也与他一起开创了商业化
    SASE（安全访问服务边缘）品类。公司成立于 2015 年，打造了唯一大规模、从底层自研的单一供应商 SASE 平台：覆盖 85+ 个 PoP 的全球私有骨干网，包含
    NGFW、SWG、IPS、CASB、DLP、ZTNA、RBI、DNS 安全以及托管 EPP/EDR 的完整安全服务边缘（SSE 360）栈，并全部通过一个云原生控制台管理。Cato 在 2025 年 1 月 Series G
    融资中估值 $4.8B、募资 $359M，是 Gartner 魔力象限领导者，也是规模最大的纯 SASE 厂商；全球约有 4,000 家客户，估算 ARR 为 $350M。
  foundedDate: '2015-01-01'
  founders:
    - name: Shlomo Kramer
      role: CEO 兼联合创始人
      background: |
        连续网络安全创业者；曾联合创办 Check Point Software（1993）和 Imperva（2002）。与 Gartner 分析师一起被称为 SASE 品类开创者。带来 30+ 年网络安全信誉和深厚企业客户关系。
      claimRefs:
        - CE001
    - name: Gur Shatz
      role: 总裁兼联合创始人
      background: |
        曾任工程副总裁和产品副总裁；负责推动产品路线图和商业化执行。
      claimRefs:
        - CE001
  foundingLocation: Tel Aviv, Israel
  headquarters: Tel Aviv, Israel (with U.S. HQ in New York, NY)
  productSummary: >
    Cato SASE Cloud Platform 把 SD-WAN、全球私有骨干网（85+ 个 PoP）和完整安全服务边缘（SSE 360）合并成一个云原生服务。核心创新是 Single Pass Cloud
    Engine（SPACE）：流量只解密一次，所有安全功能在统一流水线里执行，然后重新加密并转发——消除了服务链式点产品带来的延迟和策略碎片化。2024 年，Cato 又加入 SASE 托管的 EPP/EDR，以及首个 SASE 原生
    XDR。Cato 与 Palo Alto Networks、Netskope 一起，被评为 2024 年 Gartner 单一供应商 SASE 魔力象限领导者。
  customerFocus: >
    中型市场到企业客户（500–10,000 名员工），在制造、物流、零售、金融服务和医疗健康行业更强。地域覆盖 North America、Europe 和 APAC。受 FedRAMP 授权（In Process）尚未完成影响，联邦
    / 公共部门渗透有限。
  businessModel: >
    完全通过云交付的年度订阅 SaaS；不需要硬件。定价按席位 / 带宽计费，并可围绕完整 SSE 栈增购（加入 ZTNA、CASB、DLP、XDR、EPP/EDR 模块）。通过 MSSP、VAR 和全球
    SI（Deloitte、Accenture、CDW）等渠道合作伙伴销售。直销企业客户与渠道并行。
  stage: Series G
