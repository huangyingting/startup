      - number: '6.3'
        title: 具名客户部署与证据质量
        blocks:
          - type: paragraph
            body: >
              Cato Networks 已发布至少 10 家具名企业客户的生产环境案例研究，构成高质量部署证据。Carlsberg Group（全球啤酒）在 200+ 个地点和 25,000+ 名远程用户中部署 Cato
              SASE，替换遗留 VPN 和 SD-WAN 基础设施。O-I Glass 是一家 $7B 包装制造商，在 20 个国家的 150+ 家工厂、23,000 名员工中部署。Ryohin
              Keikaku（MUJI）连接了日本及国际市场的 820+ 个地点和 3,200+ 名员工。Vitesco Technologies 是一家 $10B 德国汽车供应商，为 90+ 个地点和 24,000
              名远程用户部署。Sixt（全球租车）在欧洲和美洲部署分支与远程访问。Swissport（航空地勤）部署用于机场连接。ACCO Brands、Haulotte（建筑设备）、Juki（缝纫机）和 Flügger
              Group（北欧零售与制造）补全了已发布的具名客户组合。


              核心六个部署（Carlsberg、O-I、MUJI、Vitesco、Sixt、Swissport）的证据质量较高：全部拥有 Cato
              官方案例研究，且具体说明部署规模、实现结果和使用场景。所有案例都被描述为正在活跃使用的生产部署——已发布案例研究中没有任何一个被标识为已停止的试点。按具名部署数量看，制造和汽车垂直占主导，反映出 Cato
              在多站点、地域分散的运营技术环境中似乎更强。
