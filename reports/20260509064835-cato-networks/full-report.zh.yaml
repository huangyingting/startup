      - number: '3.2'
        title: 主要竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Zscaler（NASDAQ: ZS）按市值是最大的纯云安全厂商；截至 FY2025 Q2 业绩（截至 2025 年 1 月 31 日的季度），过去十二个月收入约为 $2.16B。公司服务 185 个国家超过
              10,000 家企业客户。Zscaler 的平台以 Zero Trust Exchange 为核心，交付安全 Web
              网关（SWG）、云访问安全代理（CASB）、零信任网络访问（ZTNA）和数据防泄漏（DLP）。Zscaler 不提供原生 SD-WAN，定位为 SSE
              优先厂商，需要客户自带底层网络。在网络转型纳入评估范围的正面对比中，这是 Cato 最重要的结构性优势。


              Palo Alto Networks（NASDAQ: PANW）按收入是全球最大的纯网络安全公司，FY2024 年收入超过 $8B。其 Prisma SASE 产品结合 Prisma SD-WAN（2020
              年收购 CloudGenix 得来）、Prisma Access（SSE）和来自更广平台的 AI 驱动安全。Palo Alto 在防火墙和安全产品上拥有超过 80,000
              家企业客户的庞大安装基础，能形成强大的交叉销售动作。但 Prisma SASE 的架构来自收购拼装，而不是原生构建，这可能带来集成复杂度。


              Netskope 是最大的私营纯 SSE 厂商，估算 ARR 为 $300M+，估值在 2022 年一度达到 $7.5B，后压缩至约 $3.4B。Netskope 深耕以数据为中心的安全——其 DLP、CASB
              和威胁防护被认为行业领先——但缺少原生 SD-WAN，因此在需要网络转型时吸引力受限。公司在 2024 年受私募市场环境挑战影响而裁员。


              Fortinet FY2024 年收入约为 $5.6B，并通过 FortiGate 硬件集成路线在 SD-WAN 市场持有重要份额。Fortinet SASE（FortiSASE）把 FortiGate
              SD-WAN 与云交付 SSE 结合起来，但其硬件设备根基意味着部署往往包含本地依赖，可能拖慢全面云迁移。Fortinet 的渠道实力和安装基础让它在硬件更新周期里成为强劲竞争对手。


              Cloudflare FY2024 年收入约为 $1.625B，并以 Cloudflare One 提供零信任 / SASE 产品套件。Cloudflare
              受益于庞大的开发者和基础设施受众、强品牌认知和有竞争力的价格。其 330+ 个 PoP 网络超过 Cato 的 80+，anycast 路由架构也提供强性能。但 Cloudflare One 目前缺少企业
              SASE 评估通常需要的企业级 SD-WAN 能力和完整安全宽度（XDR、EPP）。


              Cisco 通过 Cisco Umbrella（SSE）、Cisco SD-WAN（Viptela/Meraki）和 Cisco+ SASE（托管套餐）提供碎片化 SASE 组合，公司年收入超过
              $50B。Cisco 庞大的企业关系带来强分发杠杆，但其 SASE 产品缺乏原生收敛，需要跨多条产品线和多个管理控制台集成。客户反馈经常把复杂度列为采用 Cisco SASE 的障碍。


              Aryaka Networks 是托管 SASE 提供商，以全托管服务交付 SD-WAN 和安全。Aryaka 争夺的是想要 SASE 成果、但没有内部专业能力部署和运营平台的企业。Aryaka
              的托管模式降低了运营负担，但安全能力比 Cato 更窄，定价也包含托管服务溢价。


              VMware VeloCloud SD-WAN 在 Broadcom 于 2023 年完成 $69B VMware 收购后，已成为 Broadcom 产品组合的一部分，但仍是大型企业账户中的重要 SD-WAN
              既有厂商。Broadcom 的产品精简策略给 VeloCloud 客户带来不确定性，Cato 和其他厂商正积极瞄准这些客户进行替换。
