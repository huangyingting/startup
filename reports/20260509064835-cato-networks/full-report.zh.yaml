  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 条形图将 Cato Networks 当前 $4.8B 估值，与不同 ARR 倍数和两种 ARR 情景（当前 ARR $350M、 2026E 预计 ARR $420M）下的隐含估值对比，展示估值对倍数压缩或扩张的敏感度。
    data:
      items:
        - label: 8x 当前 ARR（$350M）
          value: 2800
        - label: 10x 当前 ARR（$350M）
          value: 3500
        - label: 12x 当前 ARR（$350M）
          value: 4200
        - label: 13.7x 当前 ARR（当前轮）
          value: 4800
        - label: 15x 2026E ARR（$420M，估值倍数）
          value: 6300
        - label: 16x 2026E ARR（$420M，估值倍数）
          value: 6720
        - label: 18x 2026E ARR（$420M，乐观情景）
          value: 7560
    approximationNotes: >-
      2026E ARR $420M 是编辑估算：以 $350M 为基数、参考最近 43% 的增长，并假设增速温和降至 ~20%。当前轮 $4.8B、13.7x ARR 的定价来自 Cato 披露的 $350M ARR 和
      Series G 估值。所有数值单位为 $M USD。
