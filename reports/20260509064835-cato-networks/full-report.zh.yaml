  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险图谱与严重性排序
        blocks:
          - type: paragraph
            body: >
              Cato Networks 的风险图谱横跨竞争、治理、地缘政治、监管、运营、技术和财务维度。严重性最高的是竞争风险：Palo Alto Networks（市值 $110B）和 Zscaler（市值
              $33B）掌握的研发与销售资源是 Cato 的 5–10×；Palo Alto 的「platformization」策略明确要把客户从单点方案中拉走——尽管 Cato 严格说并不是单点方案，这仍直接威胁 Cato
              的 TAM。SD-WAN 市场增长在 2024 年显著放缓（同比约 +1%），给 Cato 平台的网络支柱带来需求断档风险。治理风险因 2024 年 1 月联合创始人 Gur Shatz 离职而上升；据报道，他与
              CEO Shlomo Kramer 发生争议，Kramer（68+ 岁）又没有公开指定继任者，形成关键人集中风险。财务风险来自 2025 年 5 月 IPO 冻结：据报道 Cato 曾探索 2025 年
              IPO，但因市场环境暂停，投资者流动性时间表不确定。地缘政治风险来自 Cato 以色列总部；自 2023 年 10 月以来持续的地区冲突影响招聘和业务连续性。监管风险中等：虽无披露诉讼，但在 150+
              个司法辖区、85+ 个 PoP 中处理数据驻留合规，运营上很复杂。技术风险包括 PoP 供应商集中，以及 Aim Security
              收购后的整合。综合来看，剩余风险评估为重大：识别出的风险没有任何单项会击穿投资逻辑，但叠加后会提高增长放缓概率。
