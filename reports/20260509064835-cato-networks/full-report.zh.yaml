      - - Cato Management Application（CMA）
        - 统一策略管理；网络与安全分析；XDR 工作台；EPP 控制台
        - 完全：自研多租户 SaaS 应用
        - 云托管提供商（未披露）；CMA 可用性牵动 SASE 策略运行
        - CMA 是高价值管理攻击面；一旦被攻破，攻击者可能篡改所有租户的策略
      - - 开放数据湖
        - 摄取 SPACE 事件、端点遥测和威胁情报源；支持 AI/ML、XDR 与客户 API 访问
        - 完全：Cato 管理的多租户数据湖
        - 第三方威胁情报源提供商；多租户数据隔离架构
        - 多租户数据隔离架构未公开成文；跨租户数据泄露仍是理论风险
      - - Cato Socket 硬件
        - 站点级 SD-WAN 边缘设备；多链路聚合；ZTP；本地流量管理
        - 部分：硬件由第三方制造；固件和软件由 Cato 提供
        - 硬件供应链；芯片组和组件供应商
        - 供应链中断可能影响 Socket 供应；硬件退役和更新周期未公开成文
      - - Cato Client 软件代理
        - 端点 ZTNA + SD-WAN + EPP；操作系统级流量引导；设备态势评估
        - 完全：自研软件；可通过 MDM 部署
        - 操作系统厂商 API（Windows 网络扩展、macOS 系统扩展、iOS/Android VPN API）
        - 操作系统安全模型变化（例如 macOS 弃用网络扩展）可能迫使代理重构
      - - 威胁情报与安全研究
        - 摄取数百家外部提供商的情报源；用 AI/ML 验证质量；部署前模拟规则
        - 部分：Cato 掌握验证和部署逻辑；情报源来自外部
        - 第三方情报源质量和连续性；Cato Security Research 团队产能
        - 第三方情报源提供商中断或情报源投毒，会同时影响所有客户的检测效果
