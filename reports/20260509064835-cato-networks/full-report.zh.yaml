          - type: callout
            title: 近期资本充足性看似足够，但烧钱速度未验证
            body: >
              $4.8B 估值下的 $409M Series G，在扣除约 $120M 员工老股部分后，为 Cato 提供约 $289M 新股资金。按估计每月烧钱 $12–25M 计算，2025 年 1 月交割后现金跑道为
              12–24 个月，推算下一次流动性事件需求落在 2026 年 Q1 至 2027 年 Q1。该窗口与预期 IPO 时间线一致，尽管 IPO 已从最初 2023
              年预期推迟。资本充足性风险为中等：公司已经证明能大规模融资，但若持续烧钱且收入驱动的现金流没有改善，就会更依赖有利的公开市场环境。AIM Security 收购增加了未量化的整合成本。
