      - number: '3.7'
        title: 图表
        blocks:
          - type: callout
            title: Cato 的原生收敛是最清晰的结构性优势
            body: >
              在 Gartner 2024 年 SASE 魔力象限领导者层级中，没有任何竞争对手从创立起就把 SD-WAN 和 SSE 放在同一个云平台中原生构建。Zscaler 没有收购
              SD-WAN，需要单独的底层网络。Palo Alto 在另行构建 Prisma Access 之后才收购 CloudGenix SD-WAN。这个架构优势很难通过收购和集成复制，在企业评估涉及完整网络转型时，是
              Cato 最持久的护城河。
            calloutType: insight
            claimRefs:
              - CP017
              - CP018
              - CP019
              - CP027
          - type: callout
            title: Zscaler 的 SSE 深度在受监管行业带来替换风险
            body: >
              在受监管行业评估（金融服务、医疗健康、政府）中，Zscaler 的 DLP、CASB 和威胁防护能力被广泛认为比 Cato 更深。G2 和 PeerSpot
              上的客户评论显示，拥有严格数据分类和内容检测策略的企业，常常即便面对更高复杂度也更偏好 Zscaler。这对 Cato 在合规要求把安全深度置于网络简洁性之上的行业构成真实竞争风险。
            calloutType: risk
            claimRefs:
              - CP032
              - CP003
          - type: callout
            title: Palo Alto 的平台化策略是长期留存威胁
            body: >
              Palo Alto Networks 的平台化策略把 SASE、端点、云安全和 SOC 能力打包，并给出点产品供应商无法提供的总价折扣。对已经运行 Palo Alto 防火墙的大型企业来说，整合到 Prisma
              SASE 而不是新增 Cato，在经济和运营上都有显著激励。Cato 的缓解因素是网络集成优势，但随着 Palo Alto 持续投入 CloudGenix-Prisma Access 统一，这一论点会变弱。
            calloutType: risk
            claimRefs:
              - CP031
              - CP019
          - type: callout
            title: VMware VeloCloud 不确定性创造近期替换机会
            body: >
              Broadcom 收购 VMware 及后续产品精简，在 VMware VeloCloud SD-WAN 客户中制造了显著不确定性。面临 VeloCloud 生命周期结束或支持变化的企业账户，是 Cato
              和其他具备 SD-WAN 能力的 SASE 厂商的自然替换窗口。这个机会有时间限制，并集中在 2024–2026 年企业评估迁移路径的窗口期。
            calloutType: insight
            claimRefs:
              - CP015
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式、收入来源与定价
        blocks:
          - type: paragraph
            body: >
              Cato Networks 的收入模型几乎完全靠订阅，核心指标是年经常性收入（ARR）。主要收入流估计占总收入 90–93%，来自企业客户为使用 Cato SASE Cloud
              平台支付的云订阅费。这些订阅通常以多年企业合同出售，定价主要看两项：按用户计费（远程接入 / ZTNA 席位）和按站点计费（SD-WAN Socket）。公开标价约为每名用户每年
              $150–$300（全平台套件），站点价格则随带宽档位和站点数量变化。


              次级收入包括专业服务和实施（估计 5–7%）、本地部署 Cato Sockets 的硬件 / CPE 租赁（估计 2–3%）、培训与认证项目，以及通过新增安全模块带来的扩张和增购，例如
              DLP、XDR、EPP，以及通过 AIM Security 收购补入的 AI 安全能力。企业承诺合同锁定基础 ARR，撑起稳定收入底座；扩张来自新增网点、用户席位增长和模块附着率提升。MSP 和白标合作伙伴把
              Cato 平台转售给自己的客户，形成间接分销渠道，约占新增订单的 40–50%。收入确认遵循标准 SaaS 订阅处理：合同价值递延，并在合同期内按比例确认。Cato
              未披露递延收入余额，因此无法验证未来确认收入的管线。平台的多服务模型天然适合「先落地再扩张」：客户通常先从 SD-WAN 或 ZTNA 起步，再在 12–24 个月扩张窗口内叠加完整安全服务。
