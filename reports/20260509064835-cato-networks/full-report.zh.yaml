      - number: '8.6'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              **退出准备度评估：** Cato Networks 已部分具备 IPO 条件。公司有机构投资者支持（Lightspeed、Morgan Stanley、GP Bullhound、Accel），CEO
              可信且有上市公司经验，收入增长指标强，客户满意度数据突出。但 NRR、现金消耗率、FedRAMP 时间表均未披露，而这些都是 IPO 前重要披露项，说明财务组织和外部审计关系可能还要补投入，才足以提交
              S-1。IPO 冻结与管理层判断一致：公司距离 IPO 就绪还有 12–24 个月。


              **最终尽调问题（以 $4.8B 投资前必须拿到）：**

              1. 按 2022、2023、2024 客户群年份拆分的净收入留存（NRR）——至少需要 3 年趋势

              2. 当前期总美元留存（GDR）（超出 2023 年披露）

              3. 截至 2026 年 Q1 的月度现金消耗和当前现金余额

              4. FedRAMP 评估机构（3PAO）名称和预期运营授权（ATO）日期

              5. 前 10 大客户 ARR 占总 ARR 百分比（客户集中度）

              6. 渠道伙伴集中度——前 5 大 MSP 伙伴占渠道 ARR 比例

              7. 按地区拆分的员工人数（以色列 vs. 美国 vs. EMEA vs. APAC）

              8. 模块附加率：使用 >2 个 Cato SASE 模块的客户比例

              9. CFO 任期和审计师事务所确认

              10. AIM Security 整合计划和已承诺路线图时间表


              **论点破坏触发器（任一触发器都要求立即重估论点）：**

              - 数据室披露 NRR < 105%

              - 月度现金消耗 > $30M，意味着 Series G 后现金跑道 < 14 个月

              - FedRAMP ATO 时间表距启动 > 36 个月

              - 下一披露期报告 ARR 增长低于 25%

              - Shlomo Kramer 宣布离职
