      - number: '3.5'
        title: 切换成本、锁定效应与多平台并用
        blocks:
          - type: paragraph
            body: >
              SASE 的切换成本在企业软件中属于最高一档，由四个因素叠加推高：物理 SD-WAN 边缘硬件替换、网络拓扑完全重构、网络运营人员重新培训，以及跨所有云访问点重新集成安全策略。


              对 Cato 而言，专有 Cato Socket 边缘设备部署在分支位置，一旦客户转向竞争平台，就需要物理替换，因此切换成本更高。企业级 SASE
              部署通常覆盖数十到数百个分支站点，拆掉重建式迁移在运营上复杂且昂贵。典型 SASE 合同期限为 3 年，也进一步锚定客户关系。


              多平台并用——同时运行两个 SASE 平台——技术上可行，但因路由复杂度和安全策略重复，运营上并不常见。实践中，大型企业偶尔会用 6–12 个月过渡期并行连接，但长期多供应商 SASE 部署很少见。


              供给侧和合作伙伴准入因素包括 Cato 专有全球骨干网（80+ 个 PoP），这不是共享基础设施。竞争对手建设 PoP 网络需要 12–24
              个月，并投入大量资本支出，才能达到类似地理覆盖。这为新进入者构成结构性壁垒，并在中期强化 Cato 的网络性能优势。


              从客户视角看，锁定风险包括依赖 Cato 专有控制平面来管理策略、报告和分析。Cato 平台支持通过集成把数据导出到第三方 SIEM
              或可观测性工具，但历史流量分析和策略配置无法用标准化格式迁移，形成额外切换摩擦。
            claimRefs:
              - CP029
              - CP030
              - CP033
      - number: '3.6'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Cato 的主要护城河主张是：（1）网络与安全的专门构建型单一供应商收敛，竞争对手只能通过收购和集成近似实现；（2）自建全球私有骨干网，拥有 80+ 个 PoP，耗时十年建成；（3）从零为 SASE
              设计的云原生多租户架构，相比迁移传统架构的厂商能更快发布功能；（4）SD-WAN 硬件锁定和完整网络重构要求带来的高切换成本。


              这些护城河面临可信威胁。Palo Alto Networks 正大力投入平台化，随着时间推移，其由收购拼装的 SASE 架构可能变得越来越无缝。Zscaler 已宣布与 Juniper 等公司的 SD-WAN
              合作，在不原生构建 SD-WAN 的情况下部分补足网络缺口。Cloudflare 的基础设施规模、开发者生态和激进定价，在数字原生和云优先细分市场构成慢燃式替换风险。Fortinet
              的硬件更新周期会持续在其安装基础中制造自然的 SASE 评估窗口。


              最紧迫的竞争风险，是 Zscaler 在金融服务、医疗健康和政府等受监管行业中 SSE 能力更深。拥有高级 DLP 和数据分类要求的企业——尤其在 GDPR、HIPAA 或 FedRAMP 语境下——可能认为
              Zscaler 的能力比 Cato 更成熟，特别是细粒度内容检测策略。竞争评估中已有记录显示，企业因合规要求选择 Zscaler，尽管复杂度和成本更高。


              市场低端存在商品化风险。Cloudflare 和新兴超大规模云原生方案（Google BeyondCorp、Microsoft Entra Global Secure Access）能以接近零的边际成本交付基础
              ZTNA 和 SWG 能力。这种商品化压力可能在未来 3–5 年侵蚀 Cato 的中型市场定价权。


              反向证据：评论平台显示，客户抱怨 Cato 的 DLP 能力不如 Zscaler 细；一些企业评估者也指出，Cato 的 XDR 和 EPP 产品不如 CrowdStrike、SentinelOne
              等专门端点安全厂商成熟。这些缺口是真实产品风险，Cato 必须补齐，才能守住受监管或安全成熟企业账户。
            claimRefs:
              - CP032
              - CP033
              - CP034
              - CP035
              - CP036
