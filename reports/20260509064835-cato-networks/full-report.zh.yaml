      - number: '6.4'
        title: 留存、满意度与耐久性证据
        blocks:
          - type: paragraph
            body: >
              Cato Networks 披露的总美元留存率（GDR）>95%（2023 年 9 月）是主要公开留存信号。对企业 SaaS 而言，GDR >95% 是强留存指标；顶尖 SaaS 基准（Bessemer、SaaS
              Capital）把 95%+ GDR 置于约第 95 百分位。净收入留存率未公开披露，因此无法完整评估扩张 ARR 贡献。Gartner Peer Insights 的满意度证据较强：183
              条经验证评论下总体评分 4.7/5.0，且 Gartner 在 2024 年将 Cato 评为「Customers' Choice」。PeerSpot 和 G2 上的企业评论者总体通常给平台 4.0/5.0
              以上评分，最常提到的短板是初始配置复杂和初始学习曲线——这是采用障碍，而不是流失驱动因素。少数 Gartner Peer Insights 评论者指出特定 PoP
              路由路径上的延迟波动和实施复杂度，对占主导的正面评论形成温和反向信号。截至研究日期，公开记录中没有重大流失活动、竞争对手直接从 Cato 装机基础夺客，或重大产品召回的证据。
