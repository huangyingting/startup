      - number: '6.2'
        title: 采用轨迹与规模证据
        blocks:
          - type: paragraph
            body: >
              Cato Networks 展示了企业网络安全领域最快的 ARR 增长轨迹之一。公司在 2021 年达到 $100M ARR（成立后约 5–6 年），到 2024 年 7 月翻倍至 $200M ARR，2024
              年底达到 $250M ARR（同比增长 46%），并在 2025 年 9 月突破 $300M ARR。对应客户数从 $100M 里程碑时约 1,000–1,500 家，增长到 2024 年 7 月的 2,500+
              家、2025 年 2 月的 3,000+ 家，以及 2025 年 6 月的 3,500+ 家——不到 12 个月增长 40%。


              该轨迹得到 Cato 全球部署基础设施佐证：遍布 150+ 个国家的 85+ 个 PoP 是物理层面的采用证据。渠道动能进一步确认采用情况：150+ 家独家「Powered by Cato」托管服务伙伴表明第三方
              MSP 正在承诺平台独家的 GTM 动作，这比非独家 VAR 关系更能说明采用深度。Gartner Peer Insights 评论量（截至 2024 年 7 月 183 条经验证评论，是其他任何 SASE
              Leader 的 10× 以上）说明 Cato 拥有规模较大且活跃参与的装机用户群，愿意留下公开反馈，是实际部署广度的可靠代理指标。85+ 个 PoP 的覆盖足迹，在运营上也与以企业 SLA 水平服务 150+
              个国家相一致。
