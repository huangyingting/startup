  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Cato Networks 通过 Cato SASE Cloud Platform 交付网络与安全能力。这是一套单一供应商服务，用统一云服务替代 MPLS 专线、硬件防火墙、VPN
              集中器和独立云安全代理的组合。站在企业客户视角，核心价值是运营简单：客户不再需要管理来自多个供应商的 SD-WAN 设备、下一代防火墙、CASB 代理、DLP
              工具和终端保护软件，也不必处理多套控制台和支持合同；客户用 Cato Sockets 连接站点，在用户设备上部署 Cato Client，并通过 Cato Management
              Application（CMA）配置所有网络和安全策略。


              所有流量——站点间 WAN、面向互联网的用户流量、云数据中心访问、SaaS 应用流量——都会路由到最近的 Cato Point of Presence（PoP）。在 PoP 内，SPACE
              引擎以单次处理同时施加所有网络优化和安全检测。客户获得的收益包括：不论用户和站点在哪里，策略执行都统一；网络和安全由同一供应商负责；一个管理控制台里获得整合可见性。


              企业客户报告的关键可量化收益包括：在相当或更低成本下，带宽相对 MPLS 提升 5–30×；取消防火墙和设备的硬件更新周期；安全工具蔓延从数十个单点产品压缩到一个平台。平台支持渐进式采用：客户可先替换
              MPLS，再叠加 ZTNA，随后增加 SSE 和 XDR，全部在同一平台内完成，无需重构架构。
