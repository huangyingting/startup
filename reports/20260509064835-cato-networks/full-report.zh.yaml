          value: 13.7x ARR
        - label: 投资建议
          value: BUY (conditional)
        - label: NPS 分数（2024 AVANT）
          value: '93 — #1 SASE'
        - label: 企业客户数
          value: 3,500+
        - label: Gartner MQ 状态
          value: Leader (2x)
        - label: FedRAMP 状态
          value: In Process
        - label: NRR
          value: Not disclosed
    approximationNotes: KPI 数值来自公开披露，并经研究交叉核对；报告日（2026 年 Q2）的准确当前 ARR 可能不同于 2025A 数字。NRR“未披露”反映缺少公开披露——这是关键尽调缺口，不是已确认指标。
