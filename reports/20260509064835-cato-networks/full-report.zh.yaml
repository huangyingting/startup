      - number: '3.4'
        title: 定价、打包与渠道分发
        blocks:
          - type: paragraph
            body: >
              各家 SASE 定价模型差异很大，直接对比并不容易。Cato Networks 按站点或用户订阅定价，把网络和安全打包进一个
              SKU。这简化了采购，也减少企业必须管理的供应商关系数量；但当客户只孤立比较单一能力时，Cato 的全包价格可能显得高于点产品替代方案。


              Zscaler 使用按用户、按模块定价模型，ZIA（互联网访问）、ZPA（私有访问）、ZDX（数字体验）和额外附加项都有单独 SKU。企业合同通常按套餐深度不同在每用户每月 $15–$50+。Zscaler
              庞大的直销组织和强 GSI（全球系统集成商）合作关系带来广泛企业覆盖，但其销售动作更偏安全优先买方，而不是网络运营团队。


              Palo Alto Networks 对 Prisma Access 使用基于额度的消费模型，对 Prisma SD-WAN 则使用传统订阅定价。公司通过 PANW
              防火墙建立的企业关系，使其能够提供平台捆绑折扣和有竞争力的升级交易。Palo Alto 的平台化策略把多款 PANW 产品以折扣后的总价打包，是强大的留存和扩张机制；考虑到产品足迹更窄，Cato 不容易复制。


              Fortinet 受益于大量 FortiGate 客户安装基础，这些客户可以把既有关系延伸到 FortiSASE。FortiGate 到 FortiSASE 的升级路径降低了现有 Fortinet
              客户的切换摩擦，相比迁移到新供应商也可能显得更有成本效益。这一留存优势具有结构性意义。


              Cloudflare 的零信任定价从免费层起步，再扩展到企业合同，单席位成本通常低于 Cato 或 Zscaler。Cloudflare 的网络即服务平台带来基础设施效率，使其能够采取激进定价。对 SMB
              和数字原生企业来说，Cloudflare 的价格提供了有吸引力的低成本入口，能替换 SSE 既有厂商。但大型企业部署经常认为 Cloudflare 的专业服务和支持成熟度不足。


              Cato 的市场拓展依赖渠道合作伙伴模式，通过不断扩大的 MSSP、VAR 和 SI 生态提供托管 SASE 服务。这与 Zscaler 对重直销的依赖不同，也让 Cato 更适合高效扩张。不过，Cato
              的渠道生态不如 Palo Alto 或 Cisco 成熟，后两者在企业账户中拥有几十年的渠道关系。
            claimRefs:
              - CP020
              - CP023
              - CP026
              - CP031
