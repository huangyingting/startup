          - type: callout
            title: 单一供应商 SASE 市场仍高度集中
            body: >-
              Dell'Oro 数据显示，前六大 SASE 厂商控制 $2.4B 市场的 72%。仅 Zscaler 一家就持有约 21% 份额。Cato 虽然是 Gartner 魔力象限领导者，并以约 50%
              同比增速增长（2024 年 Q3），但它所在市场正在整合，主导者是资本更充足的上市公司竞争对手，拥有更大的销售团队和更广的合作伙伴生态。
