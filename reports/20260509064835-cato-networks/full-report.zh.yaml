          - type: callout
            title: 零信任监管顺风创造结构性需求
            body: >-
              OMB M-22-09 要求美国联邦机构在 FY2024 结束前采用零信任，并引用 NIST SP
              800-207。该要求已经把合规压力传导到联邦承包商、国防工业基础（CMMC）、银行业（FFIEC）和医疗健康（HIPAA），显著扩大了 ZTNA 和 SASE 在自然云迁移需求之外的企业可寻址市场。
            calloutType: strength
