      - number: '2.5'
        title: 规模测算缺口与相互矛盾的估计
        blocks:
          - type: paragraph
            body: >
              在企业技术领域，SASE 市场呈现出最分化的一组分析师估算。Dell'Oro 的已实现收入跟踪（截至 2024 年 Q3 的 TTM 为 $2.4B），比 Grand View Research（$4.2B）或
              MarketsandMarkets 对同期给出的自上而下 TAM 估算低了超过 50%。一些纳入相邻 SD-WAN 和 SSE 收入的更宽口径定义给出超过 $9B 的数字——从最窄到最宽相差 4 倍。


              CAGR 估算从 22%（Grand View Research）到 38.9%（P&S Market Research，专指 SD-WAN）不等，导致 2030 年市场规模预测高度不确定，范围从 $17B
              到超过 $42B。这些矛盾来自真实的方法差异：已实现收入口径（Dell'Oro）对比可寻址市场外推（多数研究机构）、组件纳入口径差异（纯 SD-WAN 或纯 SSE 是否计入？），以及地理范围差异（全球还是仅
              North America）。


              开放尽调问题包括：（1）Dell'Oro 跟踪的 $2.4B 市场中，Cato 的真实 ARR 占多少？（2）Cato 的 ARR 增长有多少来自既有账户增购，多少来自新客户？（3）SASE
              市场是否已经到达真正拐点，还是仍处于早期采用者阶段？这些缺口限制了投资人用任何单一分析师来源验证前瞻预测的信心。
            claimRefs:
              - CM027
              - CM028
              - CM029
              - CM030
      - number: '2.6'
        title: 图表
        blocks:
          - type: callout
            title: 分析师市场定义造成 4 倍 TAM 差距
            body: >-
              Dell'Oro 的已实现收入跟踪显示，2024 年 SASE 市场为 $2.4B，而更宽口径的 SSE+SD-WAN 合并估算超过 $9B。投资人应以 Dell'Oro 作为已实现市场规模锚点，把自上而下
              TAM 数字视为愿景上限。Cato 的 $300M+ ARR 占 Dell'Oro 跟踪市场的 12.5%，这与在 $9B TAM 中不到 3% 的份额叙事有实质差异。
