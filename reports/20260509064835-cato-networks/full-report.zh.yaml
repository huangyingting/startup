      - number: '8.7'
        title: 附录
        blocks:
          - type: callout
            title: Shlomo Kramer 履历是最被低估的估值输入
            body: >
              Shlomo Kramer 作为 Check Point Software（CHKP，市值 $18B+）和 Imperva（2019 年被 Thoma Bravo 以 $2.1B
              收购）联合创始人的退出履历，代表一种难以定价的质性溢价，但历史上能撑起显著的企业安全退出倍数。在 Check Point，Kramer 帮助打造了全球最大的独立防火墙公司。在 Imperva，他打造出 Web
              应用安全领导者，并以约 8x ARR 被收购——低于 Cato 当前倍数，但当时市场更弱。Kramer 已证明自己能吸引顶级机构投资者（Lightspeed、Morgan
              Stanley、Accel、Goldman Sachs）、搭建企业销售组织、执行大规模企业交易，这带来信心溢价，部分支撑 Cato 的溢价倍数。早期轮次低估 Snowflake、Datadog、Palo Alto
              类似创始人质量溢价的投资人，系统性低估了这些公司最终实现的退出价值。
            calloutType: insight
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV017
              - CV018
          - type: callout
            title: NRR 是投资案例最大未知数
            body: >
              Cato Networks 尚未披露净收入留存率；以 13.7x ARR 承销一个先落地再扩张业务时，NRR 是最重要的 SaaS 财务指标。Zscaler 报告 NRR 为 115–120%。如果 Cato 的
              NRR 为 110%+，当前估值合理：$350M ARR 靠既有客户每年自然增长 10%，就能贡献 $35M ARR 增长，且无需新客户获取成本。如果 NRR 低于
              105%，增长故事几乎完全依赖新客户获取——这个模型结构更弱，容易受宏观放缓和竞争替换影响。投资者无法从公开来源解决这个问题。关于 Cato
              留存质量的每一句论点，都不是建立在决定性指标上，而是建立在间接证据上（GDR >95%、NPS 93、多年合同）。以 $4.8B 投资前，这是不可让步的数据室要求。
            calloutType: risk
            claimRefs:
              - CV003
              - CV009
              - CV010
              - CV030
              - CV039
