      - number: '5.6'
        title: 部署、集成、路线图与技术风险
        blocks:
          - type: paragraph
            body: >
              Cato 支持从遗留基础设施渐进迁移，过渡期可与既有防火墙、MPLS 专线和 VPN 集中器共存。Cato Sockets 零接触开通和 Client 自助部署降低 IT 部署摩擦。开放 API 支持为
              SIEM、SOAR、ITSM 等企业系统自动化开通、策略管理和事件数据提取。100+ MSP 和系统集成商伙伴生态扩大了地理和垂直覆盖，服务偏好托管部署与运营的客户。


              主要技术风险是单一供应商平台锁定：一旦 Cato 替换多套网络和安全技术栈，企业对该平台的运营依赖会非常高。Cato 平台故障会同时损害所有受影响站点和用户的网络与安全。SPACE 或 CMA
              中的漏洞可能影响全球所有租户。公开信息没有披露共享数据湖的多租户隔离架构，也没有披露 CMA 作为高价值管理目标的安全加固情况。


              次级风险包括：Gartner 指出的 SaaS 应用控制深度和本地防火墙缺口；复杂模块化定价带来的预算不确定性；新兴市场 PoP
              覆盖可能较薄；以及缺少经过独立审计的骨干网延迟与可用性性能指标。对于要求在合同和网络设计文档中记录 SLA 达成证据的大型企业，这些指标至关重要。


              路线图优先事项（根据公告推断）：完成 FedRAMP High 授权；提升 SaaS 应用控制颗粒度；扩展 GenAI 安全；深化 SIEM 和 SOAR 集成。公司未发布带有承诺功能日期的正式公开路线图。
            claimRefs:
              - CE021
              - CE022
              - CE023
              - CE029
              - CE030
              - CE031
              - CE035
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览与分层
        blocks:
          - type: paragraph
            body: >
              截至 2025 年 6 月，Cato Networks 服务 150+ 个国家的 3,500+ 家企业客户，按公开报告客户数计算，是最大的单一供应商 SASE
              提供商。客户基础横跨六个已确认行业垂直：制造业（按具名部署数量看是主导类别）、汽车、零售、专业服务、航空和办公用品。地域上，Cato
              部署集中在欧洲（多个最大具名部署来自该地区）和北美；通过日本零售部署（Ryohin Keikaku/MUJI）以及 APAC PoP 扩张，公司在亚太覆盖正在扩大。


              在 $300M ARR 和 3,500 家客户下，隐含平均合同价值（ACV）约为每年 $85,000，符合中端市场到偏低大型企业定位。具名部署覆盖从 3,200 名员工的 MUJI，到 23,000+
              名员工的全球企业（O-I Glass、Vitesco Technologies），说明 Cato 在企业层级内服务的 ACV 区间较宽。买方画像是分布式员工组织中的 CISO 或 IT 基础设施
              VP，他们需要多站点网络与安全融合。Cato 的认证（SOC 2 Type II、ISO 27001、PCI DSS Level 1、HIPAA、GDPR、Cyber Essentials
              UK）覆盖金融服务、医疗和零售等受监管行业买方。付款方主要是企业直接采购，约 40–50% 的新增订单来自 MSP 和 VAR 渠道伙伴，他们在「Powered by Cato」计划下转售 Cato 平台。
