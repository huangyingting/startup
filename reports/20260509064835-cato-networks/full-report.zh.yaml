      - number: '2.2'
        title: 市场规模测算——多视角
        blocks:
          - type: paragraph
            body: >
              各家分析师对 SASE 的市场规模估算差异很大，反映出边界定义、地理范围和组件纳入标准不同。Dell'Oro Group 被普遍视为企业网络与安全收入最严谨的跟踪机构；其测算显示，截至 2024 年 Q3
              的过去十二个月 SASE 市场约为 $2.4B，前六大厂商占 72%。这种基于已实现收入的方法捕捉实际订阅和授权收入，因此比前瞻性 TAM 估算更窄。


              更广泛的分析机构采用自上而下的可服务市场框架。Grand View Research 估算 2024 年 SASE TAM 约为 $4.2B，并预计到 2030 年增至约 $30B，CAGR 为
              27.4%。Market.us 估算 CAGR 为 24.3%，2024 年基线约为 $4B。Straits Research 认为 2024 年市场为 $3.8B，到 2030 年增至 $22B，CAGR 为
              25.7%。这些估算围绕 2024 年核心 SASE 品类 $3.8–4.2B 的共识区间聚集。


              相邻 SD-WAN 市场贡献了可观的可寻址支出：P&S Market Research 估算 2024 年 SD-WAN 为 $5.9B，SNS Insider 估算为 $5.2B。安全服务边缘（SSE）与
              SASE 安全栈重叠，Grand View Research 对其 2024 年规模估算为 $6.1B，MarketsandMarkets 估算为 $6.8B。零信任网络访问（ZTNA）是 SASE
              的子组件，Grand View Research 估算 2024 年规模为 $3.4–3.5B。


              用自下而上的 SAM 视角，范围限定在 North America 和 Western Europe 的中型市场与企业账户（500+ 员工、全球分布式员工），像 Cato 这样的单一供应商 SASE
              平台当前可服务市场保守估计为 $8–12B；随着 MPLS 替换提速，到 2030 年可扩至 $25–35B。Cato 目前 $300M+ 的 ARR 约占该 SAM 的
              2–4%，如果净收入留存和扩张销售保持健康，仍有明显空间。
