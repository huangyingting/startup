      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              SASE 采用最核心的结构性驱动，是云和混合办公的长期迁移。企业网络流量越来越多从分支办公室、家庭办公室和移动端点出发，流向 SaaS 应用；传统 hub-and-spoke WAN
              模式还要从数据中心出网，效率低且成本高。云原生 SASE 架构靠直连云的连接和集成安全检测解决这一问题，消除把流量回传到企业数据中心带来的延迟惩罚。


              监管要求是第二个重要驱动。White House Executive Order 14028（2021 年 5 月）要求美国联邦机构采用零信任架构；OMB memorandum M-22-09（2022 年 1
              月）把具体实施期限设在 2024 财年末，并将 NIST SP 800-207 列为主要标准。这一联邦要求引发了合规传导：联邦承包商和受监管行业（银行业遵循 FFIEC 指引，医疗健康遵循
              HIPAA，国防承包商遵循 CMMC）正在加速采用零信任和 SASE。网络安全保险承保人也越来越多把零信任网络控制作为承保条件。


              采用约束同样显著。传统基础设施锁定是最常被提到的障碍：拥有长期 MPLS 合同、已折旧硬件设备和现有安全策略工具的企业，迁移复杂度和切换成本都很高。多供应商 SASE 架构——企业从一个供应商采用
              ZTNA、从另一个供应商采用 SD-WAN——会增加集成和管理负担，拖慢整合。人才短缺进一步放大挑战：网络与安全收敛需要跨学科技能，而目前很少企业 IT 团队具备。数据主权和合规顾虑在 European
              Union（GDPR）、金融服务和医疗健康行业带来额外摩擦；这些行业在把流量路由到第三方云 PoP 前，需要做严格尽调。
