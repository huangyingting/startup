      - number: '8.4'
        title: 多头、基准与空头情景
        blocks:
          - type: paragraph
            body: >
              **多头情景（30% 概率）：**

              - 到 2026 年底 ARR 增至 $430M（较 $350M 增长 23%，相对过去 43% 增速偏保守）

              - IPO S-1 文件确认 NRR 115%+

              - 2026 年 Q4 前取得 FedRAMP 授权，打开政府 TAM

              - 2027 年 H1 以 $7.0B 完成 IPO（约 $430M NTM ARR 的 16.5x）

              - 隐含回报：较 $4.8B 入场价回报 46%


              **基准情景（50% 概率）：**

              - 到 2026 年底 ARR 增至 $400M（较 $350M 增长 14%；过去增速温和放缓）

              - 尽调确认 NRR 为 110–115%

              - IPO 推迟至 2027 年 H2，或以 $5.5–6.0B 战略出售（13–15x NTM ARR）

              - 隐含回报：18–24 个月内较 $4.8B 入场价回报 15–25%


              **空头情景（20% 概率）：**

              - 受 Palo Alto 平台化和宏观放缓影响，ARR 增长降至 <25%

              - 披露 NRR <105%，削弱先落地再扩张论点

              - IPO 窗口继续关闭；被迫以 $3.0–3.5B（8–10x ARR）并购退出

              - 隐含亏损：较 $4.8B 入场价亏损 -27% 至 -37%


              基准情景 18–24 个月回报 15–25%，对后期私募股权或成长股权投资来说偏温和——相当于年化 7–14%。多头情景年化 IRR 约 25–30%，更有吸引力，但需要 FedRAMP、NRR 确认以及有利
              IPO 市场。空头情景并非尾部想象：Palo Alto 平台化正在积极、强势推进；截至 2026 年 Q1，未盈利安全公司的 IPO 市场仍然艰难。
