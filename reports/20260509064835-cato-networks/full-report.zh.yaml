      - number: '3.3'
        title: 能力与功能对比
        blocks:
          - type: paragraph
            body: >
              SASE 评估中最关键的差异轴，是供应商能否从一个云平台同时提供原生 SD-WAN（网络转型）和完整 SSE 栈（安全转型）。在同组厂商中，Cato Networks
              是唯一一家从第一天起就以云原生方式同时集成这两类能力的公司。


              Zscaler 的 Zero Trust Exchange 是市场上最深的 SSE 平台，尤其强在 DLP、CASB 和威胁防护。但缺少原生 SD-WAN，意味着企业若用 Zscaler 做安全，仍必须保留单独的
              SD-WAN 或 MPLS 覆盖层，增加总拥有成本和管理复杂度。在有高级数据分类要求的受监管行业，Zscaler 的 DLP 能力可能强于 Cato。


              Palo Alto Prisma SASE 覆盖所有竞争对手中最广的功能集，包括 SD-WAN、SWG、CASB、ZTNA、FWaaS、DLP、XDR，以及与 Cortex AI
              的集成。它的限制在架构：Prisma SD-WAN 来自 CloudGenix 收购，Prisma Access
              则另行构建，收敛是软件集成出来的，不是为此原生打造。这会造成管理复杂度，也会在网络与安全控制平面之间偶尔留下功能缺口。


              Netskope 擅长以数据为中心的安全，其 Intelligent Security Service Edge（SSE）被分析机构评为 DLP 和 CASB 领导者。Netskope New Edge 的
              PoP 基础设施已明显扩张，但公司仍缺少原生 SD-WAN 产品，因此与 Zscaler 一样，更适合主要需求是云安全、而非网络转型的客户。


              Fortinet 的 FortiSASE 提供相对完整的功能集——SD-WAN、SWG、CASB、ZTNA、FWaaS——但许多部署依赖 FortiGate 设备，意味着它不是纯云原生平台。Fortinet
              的强项是混合环境：客户保留本地硬件，同时叠加云安全覆盖层。


              Cloudflare One 的能力宽度增长很快，但相对企业 SASE 需求仍不完整。它通过全球 anycast 网络提供强 SWG、ZTNA 和 FWaaS 能力，但 CASB 成熟度、DLP 深度和
              SD-WAN 功能仍在发展。Cloudflare 是面向开发者组织和云原生公司的强选择，但在传统企业 SD-WAN 替换场景中仍有缺口。


              Cato 的 XDR 和 EPP 模块分别在 2023 年和 2024 年推出，把平台从网络与网络安全延伸到端点和扩展检测与响应——没有其他纯 SASE 厂商原生提供这些能力。这扩大了 Cato
              在每个企业账户内的可寻址平台范围。
