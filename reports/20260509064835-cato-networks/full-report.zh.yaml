      - number: '5.3'
        title: 产品模块图：SD-WAN、SSE 360、XDR、EPP 与扩展能力
        blocks:
          - type: paragraph
            body: >
              Cato 的产品组合对应五个主要功能模块，全部通过 SPACE 交付，并在 CMA 中管理。


              SD-WAN 与连接：Cato Socket（分支站点物理硬件）和 vSocket（云环境虚拟设备）提供 SD-WAN，具备多链路聚合、应用感知 QoS、动态路径选择和零接触开通。Cato Client
              软件代理为移动和远程用户提供跨 Windows、macOS、iOS、Android、Linux 的 SD-WAN 和 ZTNA。无代理浏览器门户访问服务于承包商和 BYOD 设备，但策略执行力度较弱。


              SSE 360：完整 Security Service Edge 栈——FWaaS、SWG、IPS、NGAM、RBI、DNS 安全、CASB、DLP 和 ZTNA——通过 SPACE 在 PoP
              对所有流量施加。相对独立 SSE 厂商的关键差异：SSE 360 覆盖 WAN 东西向流量和互联网 / 云南北向流量，而独立 SSE 通常只检测面向互联网的流量。


              XDR 与 MXDR：2024 年 1 月作为业内首个基于 SASE 的 XDR 推出，把网络和终端遥测摄入统一数据湖，并提供 AI/ML 驱动的威胁狩猎、UEBA 和生成式 AI 支撑的分析师工作台。使用
              Cato 自有分析师的 MXDR（Managed XDR）自 2019 年起可用，比产品发布早五年。


              EPP/EDR：首个由 SASE 管理的 EPP，2024 年全面可用；用 ML 和行为分析扫描 300+ 种文件类型；完全在 CMA 中管理，并在同一数据湖里把终端与网络事件做 XDR 关联。


              扩展能力：DEM（Digital Experience Monitoring）无需单独传感器即可主动提供性能可见性；IoT/OT Security 用于设备发现和 OT 策略执行；GenAI Security
              用于 Shadow AI 治理，并在运行时保护 AI 应用免受提示注入和数据泄漏。
