chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部、成立日期与商业模式
        blocks:
          - type: paragraph
            body: >
              Cato Networks Ltd. 是一家以色列私营网络安全公司，总部位于 Tel Aviv（Landmark Tower）。公司在美国也有重要布局，在 California 的 San Jose
              设有办公室，并面向全球运营。连续创业者 Shlomo Kramer 和 Gur Shatz 于 2015 年创办 Cato；公司在 2016 年 2
              月正式发布平台，定位为安全访问服务边缘（SASE）品类的先行者。Gartner 后来在 2019 年提出 SASE 这一术语，基础很大程度上来自 Cato 的架构愿景。


              商业模式是云交付订阅平台，把企业网络（SD-WAN）和网络安全（SWG、CASB、ZTNA、FWaaS、DLP、IPS、XDR、EPP）收敛到一个全球云服务里。企业支付经常性订阅费，用 Cato
              托管云骨干网替换碎片化的传统设备和 MPLS 线路。平台服务全球各种规模的组织，在零售、制造、金融服务等拥有分布式员工的中型到大型企业中尤其有牵引力。收入几乎全部来自 ARR，总美元留存率超过 95%；Cato
              扩大托管 SASE 服务生态后，渠道合作伙伴的作用也在上升。


              公司属于私营但有选择披露状态——会公开 ARR 里程碑、客户数和重大融资事件，但不披露经营利润率、绝对收入、员工数和客户层面的经济指标。
