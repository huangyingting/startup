      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              企业采购 SASE 涉及三个不同角色：买方（发起并评估）、用户（使用服务）和付款方（控制预算）。在大型企业中，CISO 通常因安全要求或入侵事件发起评估；网络工程副总裁或网络运营负责人担任技术买方，验证
              SD-WAN 性能。CFO 或 CIO 掌握多年平台交易的最终预算批准。


              中型市场企业（500–2,000 名员工）的决策结构更简单：IT 总监往往同时扮演三个角色，评估周期因此更快，但也意味着供应商必须在不投入大量专业服务的情况下证明即时价值。Cato 明确称这一客群是自己的甜蜜点。


              Gartner 预测，到 2025 年，至少 70% 的新远程访问部署会使用 ZTNA 而非 VPN——2021 年这一比例低于
              10%——说明各细分市场的偏好正在快速转向。受监管行业（金融服务、医疗健康、政府）因零信任要求而采用紧迫度高，但既有基础设施绑定的合规证明也让它们面临最高切换摩擦。零售和制造业拥有大量分布式分支网点，SASE
              能通过替换 MPLS 带来有吸引力的经济性，通常要求 12–24 个月 ROI 回本周期。


              预算通常落在两个科目：网络基础设施（SD-WAN、MPLS 替换）和网络安全（防火墙、VPN、SWG）。能同时跨过两个预算池的 SASE 厂商——Cato
              的单一供应商方案就是如此——每个账户可拿到更多钱包份额；但销售动作也更复杂，需要同时处理网络和安全利益相关方。
