      - number: '8.3'
        title: 融资背景、资本结构与入场纪律
        blocks:
          - type: paragraph
            body: >
              Cato Networks 已在六轮融资中累计融资约 $647M：

              - 种子轮：~$10M（2016，Greylock Partners / Aspect Ventures）

              - Series A 轮：$30M（2016）

              - Series B 轮：$25M（2018）

              - Series C 轮：$55M（2019）

              - Series D 轮：$130M（2020，Lightspeed、Greylock）

              - Series E 轮：$200M（2022）

              - Series F 轮：$238M，估值 $3.5B（2023 年 9 月，Morgan Stanley Expansion Capital、
                Accel、Goldman Sachs Asset Management）
              - Series G 轮：$409M，估值 $4.8B（2025 年 1 月，Lightspeed、GP Bullhound）
                [2025 年 9 月扩展，新投资者追加 $238M]

              核心 Series G 周期（2025 年 1 月 + 2025 年 9 月扩展）合计融资约 $647M。来自 $647M 融资、附带不同清算优先权的优先权堆栈，为后期投资者提供了有意义的下行保护；但如果退出低于
              $1–1.5B，普通股持有人（员工、早期股东）会承压。按当前 $4.8B 估值，所有投资人很可能都处于价内。


              入场纪律说明：$4.8B 轮次按 13.7x ARR 定价——本轮发生时，Cato 已确认 $300M+ ARR（2025 年 9 月）。估值时的 NTM ARR 约 $350M（对应 13.7x
              NTM）。Cato 股份的二级市场价格未公开报道；如果能以较本轮价格折让 10–12%（$4.2–4.3B）进入二级市场，入场经济性会明显改善。


              IPO 搁置带来融资风险：如果 Cato 18–30 个月内无法完成 IPO 或战略出售，可能需要再融一轮后期融资；若市场环境恶化，稀释可能加重。
