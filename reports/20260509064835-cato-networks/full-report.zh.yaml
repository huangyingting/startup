              2024 年 7 月，Gartner 首次将 Cato 评为单一供应商 SASE 魔力象限领导者，位置仅次于 Palo Alto Networks。Forrester Wave Q3 2023 将 Cato 评为
              “ZTE/SASE Leader”。截至 2024 年 7 月，Cato 在 Gartner Peer Insights 上评分为 4.7/5，拥有 183+ 条已验证评论——评论数量超过任何其他领导者的 10
