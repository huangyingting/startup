  - id: TE002
    title: 工作流 / 用例表
    columns:
      - 用户任务 / 用例
      - 现有传统工作流
      - Cato 方案
      - 可衡量收益
      - 限制
    rows:
      - - 分支 WAN 的 MPLS 替代
        - 专用 MPLS 价格 $500-1500/Mbps/月；僵硬；运营商托管；变更开通要数周
        - 每个站点的 Cato Socket 通过宽带或蜂窝网络连接最近 PoP；私有骨干网提供接近 MPLS 的可靠性
        - WAN 成本降低 30-70%；带宽提升 5-30x；站点开通从数周缩短到数小时
        - 骨干网 SLA 达成率未经独立审计；新兴市场 PoP 密度可能更低
      - - 分布式员工的远程访问和零信任
        - VPN 集中器；轮辐式路由；连接后无检查；设备 CapEx 和扩容复杂度
        - Cato Client 集成 ZTNA；通过 PoP 始终在线路由；基于身份访问；SPACE 持续检查整个会话
        - 消除 VPN 设备 CapEx；微分段；连接后持续威胁检查
        - 需要安装 Cato Client；可用无代理访问，但策略执行能力会降低
      - - 云和 SaaS 安全
        - 独立 CASB 代理；云和本地 DLP 策略割裂；缺少统一 SaaS 可见性
        - SPACE 内置 CASB 和 DLP；所有 SaaS 和云流量都经内联检查；发现 Shadow IT
        - 不论位置，所有用户统一 SaaS 策略；所有流量实时执行 DLP
        - 根据 Gartner 2024 年提醒，SaaS 应用控制粒度弱于 Palo Alto NGFW
      - - 终端威胁检测与响应
        - 单独 EPP 供应商；单独 SIEM 汇聚日志；工具割裂导致告警疲劳
        - 同一平台内集成 Cato EPP 和 XDR；统一数据湖关联事件；AI 标注事件优先级
        - 工具数量减少；网络与终端统一关联降低 MTTR；不再需要 SIEM 集成
        - EPP 相比专业终端安全厂商（CrowdStrike Falcon）的效果未外部基准测试
      - - 多站点全球企业 WAN
        - 按地区使用多家 SD-WAN 厂商；安全层单独采购；策略割裂；多个厂商支持合同
        - 全球统一 Cato 平台；CMA 策略覆盖所有边缘；单一支持关系
        - 运维简化；全球策略一致；支持和账单合并
        - 单一供应商集中风险；迁出平台需要同时替换网络和安全
      - - OT 和 IoT 网络安全
        - 空气隔离或 VLAN 隔离的 OT 网络；手工设备盘点；无在线流量检查
        - Cato IoT/OT Security 发现并分类设备；SPACE 在线执行威胁防护；CMA 管理策略
        - 实时 OT 设备可见性；无需单独 OT 安全产品即可使用 SPACE 威胁防护
        - OT 协议深度（如 Modbus、DNP3）和 ICS 专用检测签名未公开披露
