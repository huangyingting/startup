summary:
  headline: >
    Cato Networks is the Gartner-recognized single-vendor SASE leader with authentic architectural differentiation,
    strong mid-market momentum, and 4,000+ customers — but undisclosed NRR/margin data and an IPO-freeze create
    valuation uncertainty at the $4.8B asking price.
