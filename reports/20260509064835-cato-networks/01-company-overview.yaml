  - id: SO-metrics
    title: Cover metrics, operating performance, and market recognition
    body: |
      Cato has publicly disclosed a series of ARR milestones: $100M in November 2022 (60%+ YoY),
      $200M+ in Q2 2024 (doubled in under two years), $250M at end of 2024 (46% YoY growth),
      and $300M+ in September 2025. The company reported 59% GAAP revenue growth in 2023 versus
      2022. The customer base reached 2,500 in July 2024 and 3,500 large enterprise customers by
      June 2025. Gross dollar retention exceeds 95%. Cato has not publicly disclosed absolute
      net revenue, gross margin, EBITDA, or customer ACV; management acknowledged in mid-2025
      that the company was not yet profitable.

      In July 2024, Gartner named Cato a Leader in the Magic Quadrant for Single-Vendor SASE for
      the first time, placing it second behind Palo Alto Networks. The Forrester Wave Q3 2023
      named Cato "ZTE/SASE Leader." On Gartner Peer Insights, Cato had a 4.7/5 rating with 183+
      verified reviews as of July 2024 — more than 10x the review count of any other Leader.
    claimRefs:
