callouts:
  - calloutType: strength
    title: Fastest Enterprise Network Security Centaur
    body: >-
      Cato reached $100M ARR in just five years from founding — a record pace for enterprise network security, faster
      than LinkedIn and numerous consumer-scale cloud companies. The ARR then doubled to $200M in under two years,
      demonstrating durable compounding growth.
    claimRefs:
      - CO013
      - CO040
  - calloutType: risk
    title: Co-founder Departure and IPO Uncertainty
    body: >-
      Co-founder Gur Shatz left as COO in January 2024 following a reported dispute with CEO Shlomo Kramer, ending a
      20-year partnership. The planned 2024/2025 IPO was subsequently frozen and Cato explored a strategic sale (May
      2025), with potential acquirers reportedly viewing the company as overpriced. Both events create governance and
      liquidity overhang.
    claimRefs:
      - CO020
      - CO029
      - CO030
