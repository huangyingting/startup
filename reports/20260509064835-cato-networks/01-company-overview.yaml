  evidenceGaps:
    - type: enumeration-incomplete
      severity: minor
      topic: Stakeholder or investor map TO003 — beneficial ownership not public
      missingEvidence: >-
        Exact ownership percentages and economic stakes for each investor are not publicly disclosed; cap table data is
        unavailable from public sources.
      whyItMatters: >-
        Board control dynamics and dilution profile cannot be fully assessed without verified cap table data; some
        investors may have pro-rata or governance rights.
      diligencePath: Request cap table and shareholder agreement summary from Cato during due diligence.
      relatedTableRefs:
        - TO003
    - type: enumeration-incomplete
      severity: minor
      topic: Milestone table TO004 — pre-2019 milestones partially sourced from secondary sources
      missingEvidence: >-
        Early-stage milestones (2015–2018) are primarily sourced from Wikipedia and press summaries rather than
        first-party announcements; some dates and amounts may vary by source.
      whyItMatters: >-
        Accurate founding-through-growth timeline supports founder narrative verification and detection of any
        undisclosed pivots or investor-relations discrepancies.
      diligencePath: Verify early milestones against Israeli corporate registry filings and investor press releases.
      relatedTableRefs:
        - TO004
    - type: enumeration-incomplete
      severity: minor
      topic: Leadership table TO002 — VP-level and below not fully enumerated
      missingEvidence: >-
        Only C-suite and co-founders are confirmed via press sources. VP-level and department-lead positions are not
        publicly enumerated; no official org chart is available.
      whyItMatters: >-
        Incomplete leadership bench data may obscure single points of failure below the C-suite and complicates
        assessment of functional depth ahead of a potential IPO.
      diligencePath: Request a current org chart and VP-level roster from management during due diligence.
      relatedTableRefs:
        - TO002
    - type: private-evidence-only
      severity: material
      topic: Absolute net revenue, gross margin, EBITDA, and unit economics
      missingEvidence: >-
        Cato discloses ARR milestones and growth rates but has not publicly disclosed GAAP revenue in absolute terms,
        gross margin, EBITDA/EBIT, customer ACV, or CAC/LTV ratios.
      whyItMatters: >-
        Valuation chapter cannot anchor to revenue multiples or margin profiles without these figures; comparisons to
        public SASE peers are limited to ARR growth rate only.
      diligencePath: >-
        Request management accounts, audited financials, and unit economics directly from Cato during due diligence.
        Audited figures from filing-ready financials (pre-IPO) should be available.
      relatedQuestionRefs:
        - QO025
    - type: private-evidence-only
      severity: minor
      topic: Official headcount and office footprint
      missingEvidence: >-
        Headcount figures (~1,200 Sep 2024; ~1,400 Jun 2025) are derived from press articles, not official company
        disclosures. Office locations beyond Tel Aviv and San Jose are not publicly confirmed.
      whyItMatters: >-
        Accurate headcount supports cost structure analysis and burn rate estimation; office footprint affects
        legal/regulatory jurisdiction analysis.
      diligencePath: Request official headcount by department and location from Cato HR or management.
      relatedQuestionRefs:
        - QO004
    - type: missing-source
      severity: minor
      topic: Regulatory and legal proceedings
      missingEvidence: >-
        No independent regulatory, legal, or sanctions review was found in public sources. Israel-based companies may
        have additional regulatory considerations under Israeli law.
      whyItMatters: >-
        A SASE vendor handling enterprise network traffic could face data residency or export control issues; no public
        litigation or regulatory action found but not verified.
      diligencePath: >-
        Conduct legal due diligence; search Israeli regulatory databases; review US/EU data residency compliance
        certifications.
      relatedQuestionRefs:
        - QO025
