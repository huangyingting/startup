      - CO024
    figureRefs:
      - FO001
  - id: SO-founders
    title: Founders, leadership, board, and governance
    body: |
      Cato was co-founded by two veterans of Israel's cybersecurity industry. Shlomo Kramer,
      CEO, previously co-founded Check Point Software Technologies (global firewall pioneer) and
      Imperva (sold to Thoma Bravo for $2.1B and subsequently to Thales for $3.6B). Gur Shatz,
      co-founder, previously founded Incapsula (acquired by Imperva) and served as Cato's
      president and COO until January 2024, when he departed after a reported dispute with
      Kramer. Shatz retains a board seat. The Kramer-Shatz split after nearly 20 years of
      partnership is a notable key-person and governance risk, addressed further in the risks
      chapter.

      The current leadership bench includes Eyal Heiman (CTO), Ofir Agasi (CPO), Tomer Wald
      (CFO), Nick Fan (CRO), and Alon Alter (Chief Business Officer). The bench was deepened
      ahead of the anticipated IPO. The board reflects strong VC representation: Ravi Mhatre and
      Yoni Cheifetz (LightSpeed), Jerry Chen (Greylock), plus independent directors Eyal Waldman
      (founder of Mellanox, sold to Nvidia for $7B) and Gili Iohan (former CFO of Varonis,
      partner at ION Crossover Partners) who joined in October 2024. Ronen Faier serves as a
      further independent director. The board composition signals pre-IPO professionalization and
      reflects preparation for public markets.
    claimRefs:
