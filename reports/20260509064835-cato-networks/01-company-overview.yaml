  - id: SO-capital
    title: Funding history, valuation, and investor map
    body: |
      Cato has raised over $1 billion in total since 2015, progressing through eight funding
      rounds. The company achieved unicorn status in November 2020 with a $130M Series E that
      valued it above $1B. The most recent institutional round, Series G in June 2025, raised
      $359M at a $4.8B valuation, led by Vitruvian Partners and ION Crossover Partners, with
      participation from LightSpeed, Acrew Capital, and Adams Street Partners. In September 2025,
      the Series G was extended by $50M from Acrew Capital on the same terms, bringing the total
      to $409M. Approximately $120M of the Series G proceeds were allocated to an employee
      secondary sale, providing liquidity for long-tenured staff ahead of a delayed IPO.

      Prior rounds include: Series A ($20M, 2015), Series B ($50M, 2016), Series C ($55M, 2019),
      Series D ($77M, April 2020), Series E ($130M, November 2020), and the 2021 Series F
      ($200M, $2.5B valuation). The 2023 round ($238M, $3B+ valuation) was led by LightSpeed
      and brought total raised to $773M. Historical investors include Greylock, Coatue, SoftBank
      Vision Fund 2, Singtel Innov8, Adams Street Partners, and US Venture Partners.
