  - id: SO-milestones
    title: Key milestones, adverse events, and strategic trajectory
    body: |
      Cato's trajectory spans product inception (2015-16), rapid growth powered by remote-work
      tailwinds (2019-22), multiple large funding rounds (2020-23), and a pre-IPO phase (2024-26).
      The November 2022 ARR milestone demonstrated the fastest $0-$100M path in enterprise
      network security history. The company beat its prior fundraise pace with the 2023 round
      reaching a $3B+ valuation despite broader VC market headwinds.

      Adverse events include the January 2024 departure of co-founder Gur Shatz after a reported
      dispute — a material governance and key-person risk. The IPO process, initially targeting
      late 2024, was subsequently pushed to early 2025, then frozen in May 2025 as Cato
      reportedly explored a sale amid valuation concerns raised by potential acquirers. The
      company raised the Series G in June 2025 instead, partly to provide secondary liquidity to
      employees. As of the run date, no IPO or sale has been announced. Cato made its first
      acquisition in September 2025, buying Aim Security (an AI security startup) to expand into
      enterprise AI security, concurrent with the $300M ARR announcement.
    claimRefs:
