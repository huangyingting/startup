        - Press release; Crunchbase; PitchBook monitoring
        - Next financing or M&A transaction priced below $4.0B
        - Forced mark-down; preference stack protects late investors partially but signals growth failure
      - - Palo Alto win rate >25% in bake-offs
        - Channel partner checks; Gartner MQ peer data; sales commentary
        - Channel partner reports >25% Cato loss rate in competitive evaluations
        - Increase competitive monitoring frequency; re-evaluate growth durability
      - - Major multi-customer SASE outage
        - Status page; Twitter/X monitoring; enterprise press
        - Multi-enterprise, multi-hour outage publicly confirmed
        - Assess churn impact; SLA credit exposure; reputational damage assessment
    claimRefs:
