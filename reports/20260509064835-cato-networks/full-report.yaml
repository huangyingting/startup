              proceeds after the ~$120M employee secondary component. At an estimated monthly burn of
              $12–25M, this implies a post-raise runway of 12–24 months from the January 2025 close,
              projecting a next liquidity event need in Q1 2026–Q1 2027. The window aligns with the
              anticipated IPO timeline, though the IPO has already been delayed from original 2023
              expectations. Capital adequacy risk is moderate: the company has demonstrated the ability
              to raise at scale, but continued burn without revenue-driven cash flow improvement
