      - number: '7.2'
        title: Regulatory, Legal, and Geopolitical Risks
        blocks:
          - type: paragraph
            body: |
              Cato Networks has not disclosed any material litigation, regulatory enforcement actions,
              or IP disputes as of the research date. The company holds SOC 2 Type II, ISO 27001,
              PCI DSS Level 1, HIPAA, GDPR, and Cyber Essentials UK certifications, providing a
              strong baseline for enterprise and regulated-industry compliance. However, several
              structural regulatory and legal risks warrant diligence investigation.

              Data residency risk is the most material regulatory exposure: Cato's 85+ PoPs in 150+
              countries create complex GDPR Article 44-49 cross-border transfer obligations, data
              sovereignty questions in markets such as Germany (BDSG), France (CNIL), India (DPDP Act),
              and China, and evolving AI data processing obligations introduced by the EU AI Act. As
              Cato adds AI-powered security features (through the Aim Security acquisition and its
              SPACE engine), regulatory scrutiny of AI-processed network traffic data will increase.

              Israeli companies seeking US capital markets listings face heightened scrutiny from the
              SEC following geopolitical events and the broader review of cross-border data flows
              between Israel and US markets. The ongoing conflict in Israel since October 2023 raises
              force majeure and business continuity risk for engineering and operations staff subject
              to military reserve (miluim) obligations. Currency risk is significant: approximately
              50% of Cato's cost base is ILS-denominated against USD-denominated revenue, creating
              FX exposure that grows with each ILS appreciation episode. No debt or regulatory
              financing obligations are publicly disclosed.
            claimRefs:
