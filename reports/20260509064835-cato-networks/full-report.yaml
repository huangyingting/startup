companyProfile:
  summary: >
    Cato Networks is a Tel Aviv–based cybersecurity and networking company that invented the commercial SASE (Secure
    Access Service Edge) category alongside its founder Shlomo Kramer (co-founder of Check Point Software and Imperva).
    Founded in 2015, Cato has built the only large-scale, ground-up single-vendor SASE platform: a global private
    backbone of 85+ PoPs, a full Security Service Edge (SSE 360) stack including NGFW, SWG, IPS, CASB, DLP, ZTNA, RBI,
    DNS security, and managed EPP/EDR, all managed through a single cloud-native pane. At a $4.8B Series G valuation
    (January 2025, $359M raised), Cato is a Gartner Magic Quadrant Leader and the largest pure-play SASE vendor, with
    approximately 4,000 customers globally and an estimated $350M ARR.
  foundedDate: '2015-01-01'
