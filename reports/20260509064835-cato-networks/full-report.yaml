      - number: '4.4'
        title: Public Traction Metrics and Private Disclosure Gaps
        blocks:
          - type: paragraph
            body: |
              Cato Networks has publicly confirmed three ARR milestones: $100M ARR in 2021 (five years
              post-founding, cited as the fastest enterprise networking startup to reach that milestone),
              $200M ARR in July 2024, and $300M+ ARR by September 2025. The company also discloses a
              customer count exceeding 3,500 enterprises as of late 2025. The $300M ARR milestone is
              corroborated by multiple independent news sources including Reuters, BusinessWire, and
              TechCrunch, providing reasonable confidence. The implied average contract value (ACV) at
              $300M ARR and 3,500 customers is approximately $85,000/year — consistent with mid-market
              to lower-large-enterprise positioning.

              However, the following financially material metrics are not publicly disclosed: gross
              margin percentage, net revenue retention rate, gross dollar retention rate, customer
              acquisition cost, payback period, free cash flow, operating margin, deferred revenue
              balance, and employee count by function. Net revenue retention is estimated at 110–120%
              based on Cato's reported land-and-expand motion and comparable SaaS benchmarks, while
              gross dollar retention is estimated at 95%+ based on the company's disclosed low churn
              messaging. These estimates carry meaningful uncertainty and cannot be validated without
              access to Cato's internal data room. Customer revenue concentration — specifically whether
