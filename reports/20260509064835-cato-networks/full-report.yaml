  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: |
              Cato Networks delivers networking and security through the Cato SASE Cloud Platform - a
              single-vendor service that replaces the combination of MPLS circuits, hardware firewalls,
              VPN concentrators, and standalone cloud security proxies with a unified cloud service.
              From an enterprise customer's perspective, the value proposition is operational simplicity:
              instead of managing separate SD-WAN devices, next-generation firewalls, CASB proxies,
              DLP tools, and endpoint protection software from multiple vendors with multiple consoles
              and support contracts, the customer connects sites via Cato Sockets, deploys the Cato
              Client on user devices, and configures all networking and security policies through the
              Cato Management Application (CMA).

              All traffic - WAN between sites, internet-bound user traffic, cloud datacenter access,
              and SaaS application traffic - is routed through the nearest Cato Point of Presence (PoP),
              where the SPACE engine applies all networking optimizations and security inspections
              simultaneously in a single pass. The customer benefits from uniform policy enforcement
              across all users and sites regardless of location, a single vendor relationship covering
              both networking and security, and consolidated visibility in one management console.

              Key measurable benefits reported by enterprise customers include bandwidth increases of
              5-30x vs. MPLS at comparable or lower cost; elimination of hardware refresh cycles for
              firewalls and appliances; and reduction of security tool sprawl from dozens of point
              products to one platform. The platform supports incremental adoption - customers can start
              with MPLS replacement, then layer on ZTNA, then add SSE and XDR - all within the same
              platform without re-architecture.
