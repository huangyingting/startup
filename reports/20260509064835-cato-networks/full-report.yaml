        title: Key milestones, adverse events, and strategic trajectory
        blocks:
          - type: paragraph
            body: |
              Cato's trajectory spans product inception (2015-16), rapid growth powered by remote-work
              tailwinds (2019-22), multiple large funding rounds (2020-23), and a pre-IPO phase (2024-26).
              The November 2022 ARR milestone demonstrated the fastest $0-$100M path in enterprise
              network security history. The company beat its prior fundraise pace with the 2023 round
