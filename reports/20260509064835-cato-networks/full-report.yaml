      - number: '3.2'
        title: Major Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              Zscaler (NASDAQ: ZS) is the largest pure-play cloud security vendor by market capitalization
              and reported approximately $2.16B in trailing twelve-month revenue as of its Q2 FY2025
              results (quarter ending January 31, 2025). The company serves over 10,000 enterprise
              customers across 185 countries. Zscaler's platform centers on its Zero Trust Exchange,
              delivering Secure Web Gateway (SWG), Cloud Access Security Broker (CASB), Zero Trust
              Network Access (ZTNA), and Data Loss Prevention (DLP). Zscaler does not offer native
              SD-WAN, positioning it as an SSE-first vendor that requires customers to bring their own
              underlay networking. This is Cato's most significant structural advantage in head-to-head
              evaluations where networking transformation is in scope.

              Palo Alto Networks (NASDAQ: PANW) is the world's largest pure-play cybersecurity company
              by revenue, with FY2024 annual revenue exceeding $8B. Its Prisma SASE product combines
              Prisma SD-WAN (acquired from CloudGenix in 2020), Prisma Access (SSE), and AI-powered
              security from its broader platform. Palo Alto benefits from an enormous enterprise installed
              base of over 80,000 customers for its firewall and security products, enabling a powerful
              cross-sell motion. However, Prisma SASE's architecture is assembled from acquisitions rather
              than built natively, which can introduce integration complexity.

              Netskope is the largest private pure-play SSE vendor, with an estimated $300M+ ARR and a
              valuation that peaked at $7.5B in 2022 before compression to approximately $3.4B. Netskope
              is deeply focused on data-centric security — its DLP, CASB, and threat protection are
              considered industry-leading — but lacks native SD-WAN, limiting its appeal when
              networking transformation is required. The company conducted layoffs in 2024 amid
              challenging private market conditions.

              Fortinet reported approximately $5.6B in FY2024 revenue and holds a significant SD-WAN
              market share through its FortiGate hardware-integrated approach. Fortinet SASE (FortiSASE)
              combines FortiGate SD-WAN with cloud-delivered SSE, but its hardware appliance roots mean
              deployments frequently involve on-premises dependencies that can delay full cloud migration.
              Fortinet's channel strength and installed base make it a formidable competitor in
              hardware-refresh cycles.

              Cloudflare reported approximately $1.625B in FY2024 revenue and offers Cloudflare One as
              its Zero Trust / SASE product suite. Cloudflare benefits from a massive developer and
              infrastructure audience, strong brand recognition, and competitive pricing. Its network of
              330+ PoPs exceeds Cato's 80+, and its anycast routing architecture provides strong
              performance. However, Cloudflare One currently lacks the enterprise SD-WAN capabilities
              and the full security breadth (XDR, EPP) that enterprise SASE evaluations typically require.

              Cisco offers a fragmented SASE portfolio through Cisco Umbrella (SSE), Cisco SD-WAN
              (Viptela/Meraki), and Cisco+ SASE (managed bundle), with total company revenue exceeding
              $50B annually. Cisco's vast enterprise relationships provide powerful distribution leverage,
              but its SASE product lacks native convergence, requiring integration across multiple product
              lines and management consoles. Customer feedback frequently cites complexity as a barrier
              to Cisco SASE adoption.

              Aryaka Networks operates as a managed SASE provider, delivering SD-WAN and security
              as a fully managed service. Aryaka competes for enterprises that want SASE outcomes without
              in-house expertise to deploy and operate the platform. While Aryaka's managed model reduces
              operational burden, its security capabilities are narrower than Cato's and its pricing
              carries a managed-service premium.

              VMware VeloCloud SD-WAN, now part of Broadcom's portfolio following the $69B VMware
              acquisition completed in 2023, remains a significant SD-WAN incumbent in large enterprise
              accounts. Broadcom's product rationalization strategy has created uncertainty among
              VeloCloud customers, which Cato and others are actively targeting for displacement.
