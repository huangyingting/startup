      - number: '5.3'
        title: 'Product Module Map: SD-WAN, SSE 360, XDR, EPP, and Extended Capabilities'
        blocks:
          - type: paragraph
            body: |
              Cato's product portfolio maps to five primary functional modules - all delivered through
              SPACE and managed in the CMA.

              SD-WAN and Connectivity: The Cato Socket (physical hardware for branch sites) and
              vSocket (virtual for cloud environments) provide SD-WAN with multi-link aggregation,
              application-aware QoS, dynamic path selection, and zero-touch provisioning. The Cato
              Client software agent provides SD-WAN and ZTNA for mobile and remote users across
              Windows, macOS, iOS, Android, and Linux. Agentless browser-portal access serves
              contractors and BYOD devices with reduced policy enforcement.

              SSE 360: The full Security Service Edge stack - FWaaS, SWG, IPS, NGAM, RBI, DNS
              security, CASB, DLP, and ZTNA - applied to all traffic at the PoP via SPACE. A critical
              differentiator vs. standalone SSE vendors: SSE 360 covers WAN east-west traffic and
              internet/cloud north-south traffic, whereas standalone SSE typically inspects only
              internet-bound flows.

              XDR and MXDR: Launched January 2024 as the industry's first SASE-based XDR, ingesting
              network and endpoint telemetry into a unified data lake with AI/ML-driven threat hunting,
              UEBA, and a generative-AI-powered analyst workbench. MXDR (Managed XDR) using Cato's
              own analysts has been available since 2019, predating the product launch by five years.

              EPP/EDR: First SASE-managed EPP, generally available 2024; scans 300+ file types using
              ML and behavioral analysis; fully managed in CMA with XDR correlation of endpoint
              and network events in a single data lake.

              Extended capabilities: DEM (Digital Experience Monitoring) for proactive performance
              visibility without separate sensors; IoT/OT Security for device discovery and OT
              policy enforcement; and GenAI Security for Shadow AI governance and AI application
              runtime protection against prompt injection and data leakage.
