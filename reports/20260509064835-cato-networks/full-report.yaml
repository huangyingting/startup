            body: |
              Cato Networks serves 3,500+ enterprise customers across 150+ countries as of June 2025,
              making it the largest single-vendor SASE provider by publicly reported customer count.
              The customer base spans six confirmed industry verticals: manufacturing (the dominant
              category by named deployment volume), automotive, retail, professional services, aviation,
              and office products. Geographically, Cato's deployments are concentrated in Europe (where
              several of the largest named deployments originate) and North America, with growing
              presence in Asia-Pacific through its Japanese retail deployments (Ryohin Keikaku/MUJI)
