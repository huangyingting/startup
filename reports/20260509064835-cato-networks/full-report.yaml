      - number: '5.2'
        title: 'Core Architecture: SPACE, Global PoP Backbone, and Single-Pass Security'
        blocks:
          - type: paragraph
            body: |
              The central architectural innovation of Cato's platform is the Single Pass Cloud Engine
              (SPACE): a software stack that decrypts enterprise traffic once, applies all security
              inspection functions in a sequential pipeline within a single processing context, and
              re-encrypts the traffic for delivery. Functions applied include NGFW for segmentation,
              SWG and IPS for threat prevention, NGAM for payload inspection, RBI for browser isolation,
              DNS security, CASB and DLP for application and data protection, and ZTNA for access
              control - all in one pass with shared traffic context. Adding new security capabilities
              does not add additional decryption overhead; new functions are integrated into the SPACE
              pipeline and inherit the same performance envelope.

              The SPACE engine runs as thousands of instances across 85+ PoPs in top-tier colocation
              datacenters worldwide. Cato owns and manages the bare-metal compute within these facilities
              and interconnects PoPs via multiple Tier-1 carriers, forming a private global backbone
              that provides SLA-backed, MPLS-equivalent WAN connectivity. Cato's direct ownership of
              compute infrastructure - not leased hyperscaler capacity - enables autonomous control over
              software updates, capacity scaling, and PoP expansion.

              The data lake underpinning Cato's AI/ML and analytics capabilities ingests all SPACE-
              generated traffic context, endpoint telemetry from the Cato Client ZTNA and EPP engines,
              third-party endpoint data from Microsoft Defender and CrowdStrike, and hundreds of
              external threat intelligence feeds. Cato Security Research uses AI/ML to validate feed
              quality and simulates new prevention rules against actual customer traffic before deploying
              globally within 24-48 hours. Platform reliability is maintained by four self-managing
              mechanisms: self-healing (automatic PoP failover), self-optimizing (dynamic path
              selection), self-scaling (horizontal SPACE instance scaling), and self-evolving
              (non-disruptive software updates). Cato claims 99.999% service availability.
            claimRefs:
              - CE002
              - CE003
              - CE012
              - CE013
              - CE024
