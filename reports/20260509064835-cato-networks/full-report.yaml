      - number: '4.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Private Backbone COGS Creates Structural Gross Margin Disadvantage
            body: |
              Cato's decision to build and operate a proprietary global backbone of 85+ PoPs rather than
              leverage hyperscaler infrastructure (AWS, Azure, GCP) creates a structural gross margin
              disadvantage relative to software-only SSE peers. Zscaler achieves ~79% gross margin and
              Cloudflare ~77% by outsourcing compute and delivery to cloud providers. Cato's estimated
              gross margin of 62–72% reflects the ongoing cost of PoP colocation, hardware refresh,
              and bandwidth contracts. While the private backbone provides latency and security
              differentiation, it caps gross margin expansion and extends the path to operating
              profitability. Investors should model a persistent 7–17 percentage point gross margin gap
              versus public software-only peers when comparing operating leverage trajectories.
