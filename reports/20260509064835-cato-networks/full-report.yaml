      - number: '4.5'
        title: Capital Adequacy, Financing History, and Runway
        blocks:
          - type: paragraph
            body: |
              Cato Networks has raised over $1 billion in total equity since its 2015 founding across
              eight funding rounds. The most recent financing event was the Series G round, initially
              closed in January 2025 at $359M and subsequently extended to $409M in September 2025
              with an additional $50M commitment from Acrew Capital on the same terms. The round was
              led by Vitruvian Partners and ION Crossover Partners, with participation from LightSpeed
              Venture Partners, Acrew Capital, and Adams Street Partners. The valuation of $4.8B
              implies an ARR multiple of approximately 16× at $300M ARR — a premium to the 10–12×
              NTM ARR trading multiples of public SASE peers Zscaler and Palo Alto Networks at the
              time of closing, reflecting Cato's growth trajectory and platform differentiation.

              Approximately $120M of the Series G proceeds were allocated to an employee secondary
              sale, providing liquidity to long-tenured employees and co-founders ahead of a delayed
              IPO. The remaining ~$289M represents primary proceeds available for operations. At an
              estimated monthly cash burn of $12–25M, this implies a post-raise primary cash runway
              of approximately 12–24 months from the January 2025 close — placing the next potential
              financing event in mid-to-late 2026, consistent with the anticipated IPO window. No
              debt facilities or project-finance obligations have been publicly disclosed, though
              infrastructure colo contracts and hardware leases constitute off-balance-sheet
              commitments. The IPO timeline has been repeatedly delayed from initial 2023 expectations,
              raising questions about whether market conditions or internal profitability milestones
              are the gating factor. The AIM Security acquisition (terms undisclosed) represents an
              additional capital deployment that reduces available runway.
