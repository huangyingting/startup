              EPP, AI security) and location/seat expansion as organizations grow. The "Powered by Cato"
              channel program — revamped in 2025 — provides 150+ exclusive MSP partners who resell the
              platform and drive expansion among SMB-to-mid-market tiers that the direct sales force
              does not reach. Channel accounts for approximately 40–50% of new bookings, reducing
              top-customer concentration risk in the direct book of business. However, Cato does not
              publicly disclose top-customer revenue concentration or whether any single customer
              exceeds 5% of total ARR; this is a material diligence gap for concentration assessment.
              ACV/CAC/LTV data is also not publicly available, making it impossible to assess the
              profitability of the channel book versus the direct book. The "Powered by Cato" exclusivity
              creates partner lock-in that supports retention but also creates concentration risk if a
              major MSP partner churns or is acquired. The combination of multi-year enterprise contracts,
              high GDR, and channel breadth provides reasonable confidence that the revenue base is
              durable, but the absence of NRR and concentration data limits full underwriting certainty.
