    data:
      layers:
        - label: Edge and Client Layer
          detail: >-
            Physical and software connection points: Cato Socket (branch SD-WAN), vSocket (cloud DC), Cato Client
            (mobile/remote ZTNA + EPP), and agentless browser portal (BYOD/contractors).
        - label: Transport and Backbone Layer
          detail: >-
            85+ Cato-managed PoPs in top-tier colocation datacenters globally, interconnected by multiple Tier-1 carrier
            private backbone links providing MPLS-equivalent SLA-backed WAN.
        - label: Security Processing Layer (SPACE)
          detail: >-
            Single-pass engine at each PoP: traffic decrypted once, then NGFW/FWaaS, SWG, IPS, NGAM, RBI, DNS Security,
            CASB, DLP, and ZTNA all applied sequentially in one processing context.
        - label: Intelligence and Data Layer
          detail: >-
            Unified data lake ingesting SPACE events, Cato Client/EPP endpoint telemetry, and third-party feeds. Cato
            Security Research AI/ML validates feeds; XDR engine runs UEBA and threat hunting.
        - label: Management and Integration Layer
          detail: >-
            Cato Management Application (CMA) provides single-pane-of-glass policy, analytics, XDR workbench, and EPP
            console. Universal open API connects to SIEM, SOAR, ITSM, and custom integrations.
