  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: |
              The SASE market as defined by Gartner and adopted by industry combines software-defined
              wide-area networking (SD-WAN) with a cloud-delivered security stack—comprising Secure
              Web Gateway (SWG), Cloud Access Security Broker (CASB), Zero Trust Network Access
              (ZTNA), and Firewall-as-a-Service (FWaaS)—into a single converged platform. Cato
              Networks competes squarely in this space, targeting the displacement of legacy MPLS
              circuits, on-premises firewalls, VPN concentrators, and standalone SD-WAN appliances.

              Included spend encompasses enterprise subscriptions for SD-WAN, SSE components (SWG,
              CASB, ZTNA, FWaaS, DLP, IPS), global private backbone services, and managed SASE
              delivery. Excluded spend covers consumer VPN products, carrier-managed MPLS services
              that do not include security layers, endpoint detection and response (EDR) platforms
              sold outside a network context, and pure-play identity providers without network-access
              components.

              Adjacent markets that create TAM expansion optionality include Extended Detection and
              Response (XDR), Security Operations Center-as-a-Service (SOCaaS), AI-powered network
              analytics, and IoT/OT security gateways. Status-quo substitutes—the alternatives
              enterprises currently use instead of SASE—are the primary competitive barrier: legacy
              Multiprotocol Label Switching (MPLS) for private WAN, hardware firewalls from Palo Alto
              Networks, Fortinet, and Check Point for perimeter security, and point-solution VPN
              concentrators from Cisco and Juniper for remote access. Enterprises that have already
              made long-term MPLS commitments face real switching costs and contract lock-in that slow
              SASE adoption, particularly in regulated verticals such as financial services and healthcare
              where compliance attestations tied to existing infrastructure add to transition risk.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
