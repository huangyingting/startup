  - id: TV006
    title: Final diligence asks table
    notes: >-
      Prioritized list of confirmatory diligence items required before committing capital at the $4.8B valuation. Items
      marked 'MUST-HAVE' are non-negotiable; items marked 'IMPORTANT' provide meaningful confidence improvement but the
      investment can proceed without confirmation at reduced allocation.
    columns:
      - Diligence Ask
      - Priority
      - Information Sought
      - Implication if Adverse
    rows:
      - - Net Revenue Retention by cohort (2022, 2023, 2024)
        - MUST-HAVE
        - Confirm NRR ≥ 110%; trend direction
        - NRR < 105% → downgrade to HOLD/SELL
      - - Monthly cash burn and Q1 2026 cash balance
        - MUST-HAVE
        - Confirm ≥ 18 months runway from current capital
        - Burn > $30M/month → financing risk; reduce allocation
      - - FedRAMP 3PAO assessor name and expected ATO date
        - MUST-HAVE
        - Confirm timeline ≤ 24 months; or decision not to pursue
        - Timeline > 36 months → reduce TAM model by 20%; reduce allocation
      - - Gross Dollar Retention (current period)
        - MUST-HAVE
        - Confirm GDR ≥ 95% updated past 2023 disclosure
        - GDR < 90% → significant churn signal; SELL
      - - Top-10 customer ARR concentration
        - MUST-HAVE
        - Confirm top-10 < 25% of total ARR
        - Top-10 > 40% of ARR → customer concentration risk; reduce allocation
      - - Module attach rates (customers with >2 modules)
        - IMPORTANT
        - Confirm expansion motion is working; >40% customers multi-module
        - Attach rate < 20% → land-and-expand thesis weakening
      - - Channel partner concentration (top-5 MSP share)
        - IMPORTANT
        - Confirm no single partner > 10% of channel ARR
        - Single partner > 20% → GTM dependency risk
      - - Employee headcount by geography
        - IMPORTANT
        - Confirm Israel not > 70% of total engineers
        - Israel > 80% → geopolitical workforce concentration risk elevated
      - - AIM Security integration plan and Q4 2025 progress
        - IMPORTANT
        - Confirm integration on track; key AIM staff retained
        - Integration delay > 12 months → roadmap credibility concern
      - - CFO tenure and audit firm
        - IMPORTANT
        - Confirm Big 4 audit firm engagement and CFO tenure ≥ 18 months
        - No Big 4 audit or CFO < 12 months tenure → IPO timeline likely delayed
    claimRefs:
      - CV039
      - CV040
      - CV041
      - CV042
