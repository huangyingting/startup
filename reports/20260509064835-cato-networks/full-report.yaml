  foundingLocation: Tel Aviv, Israel
  headquarters: Tel Aviv, Israel (with U.S. HQ in New York, NY)
  productSummary: >
    The Cato SASE Cloud Platform converges SD-WAN, a global private backbone (85+ PoPs), and a full Security Service
    Edge (SSE 360) into a single cloud-native service. The core innovation is the Single Pass Cloud Engine (SPACE):
    traffic is decrypted once, all security functions are applied in a unified pipeline, then re-encrypted and forwarded
    — eliminating the latency and policy fragmentation of service-chained point solutions. In 2024 Cato extended the
    platform with SASE-managed EPP/EDR and the first SASE-native XDR. Cato was recognized as a Leader in the 2024
    Gartner Magic Quadrant for Single-Vendor SASE alongside Palo Alto Networks and Netskope.
  customerFocus: >
    Mid-market to enterprise (500–10,000 employees), with strength in manufacturing, logistics, retail, financial
    services, and healthcare. Geographic spread spans North America, Europe, and APAC. Federal/public sector penetration
    is limited pending FedRAMP authorization (In Process).
  businessModel: >
    Annual subscription SaaS delivered entirely via the cloud; no hardware required. Pricing is seat/bandwidth-based
    with upsell potential across the full SSE stack (add ZTNA, CASB, DLP, XDR, EPP/EDR modules). Channel-partnered
    through MSSPs, VARs, and global SIs (Deloitte, Accenture, CDW). Direct enterprise sales motion coexists with
    channel.
  stage: Series G
