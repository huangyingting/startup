          - type: callout
            title: SAM Estimate Assumes Converged Single-Vendor SASE Wins Against Multi-Vendor
            body: >-
              The $8–12B SAM calculation assumes continued market shift toward single-vendor SASE architectures rather
              than best-of-breed multi-vendor approaches. If enterprises maintain a fragmented Zscaler + Cisco SD-WAN
              posture, Cato's actual SAM is materially smaller. This assumption requires ongoing validation against
              win/loss data.
