      - number: '8.5'
        title: Comparable Valuation Set and Market Context
        blocks:
          - type: paragraph
            body: |
              The most comparable public company to Cato Networks is Zscaler (ZS), the leading
              pure-play SSE/SASE vendor with $2.3B NTM ARR and a market cap of approximately
              $28–32B as of April 2026 (12–14x NTM ARR). Zscaler's FedRAMP High authorization,
              zero-trust brand positioning, and SASE convergence with ZIA (Internet Access) and ZPA
              (Private Access) make it the closest public proxy for Cato. Palo Alto Networks (PANW),
              with $8B+ security ARR and a $110B+ market cap, trades at approximately 10–12x ARR
              on its security platform segment — less comparable given diversified product mix.
              Netskope (private, ~$1.5B ARR, $7B valuation from 2023 round) implies approximately
              4.5x ARR for a slower-growth competitor.

              In the M&A market, the most relevant precedents are: Cisco's acquisition of Meraki
              (SD-WAN, $1.2B in 2012 at ~10x ARR); Broadcom's acquisition of Symantec Enterprise
              Security (2019, $10.7B); and various SSE bolt-on acquisitions by VMware/Broadcom
              (Velocloud), Fortinet, and Check Point. Strategic acquirers who might pursue Cato
              include Cisco (SASE gap in its Security Cloud), Microsoft (SASE augmentation to
              Entra), and Broadcom (Symantec integration expansion). At $4.8B, Cato is acquirable
              by all three, but the management team's IPO history and Kramer's track record suggest
              preference for public exit.

              SASE market context: Dell'Oro Group estimates the SASE market will reach $28.5B by
              2028 at 26% CAGR. At $350M ARR, Cato holds approximately 2.5% of the current
              ~$14B market — substantial room for market share expansion. The top 6 SASE vendors
              (Palo Alto, Cisco, Zscaler, Cato, Netskope, Cloudflare One) hold approximately
              72% of market share, indicating consolidation risk for smaller peers but strong
              tailwinds for Leaders.
