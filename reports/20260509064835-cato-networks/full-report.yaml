    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, headquarters, founding date, and business model
        blocks:
          - type: paragraph
            body: |
              Cato Networks Ltd. is a private Israeli cybersecurity company headquartered in Tel Aviv
              (Landmark Tower). The company maintains a significant US presence with offices in San Jose,
              California, and operates globally. Founded in 2015 by serial entrepreneur Shlomo Kramer
              and Gur Shatz, Cato officially launched its platform in February 2016, positioning itself
              as a pioneer of the Secure Access Service Edge (SASE) category — a term subsequently
              coined by Gartner in 2019 based largely on Cato's architectural vision.

              The business model is a cloud-delivered subscription platform that converges enterprise
              networking (SD-WAN) and network security (SWG, CASB, ZTNA, FWaaS, DLP, IPS, XDR, EPP) into
              a single global cloud service. Enterprises pay recurring subscriptions to replace
              fragmented legacy appliances and MPLS circuits with Cato's managed cloud backbone. The
              platform serves organizations of all sizes globally, with particular traction among
              mid-market to large enterprises in retail, manufacturing, financial services, and other
              distributed-workforce sectors. Revenue is almost entirely ARR-based, with a gross dollar
              retention rate exceeding 95% and channel partners playing an increasing role as Cato
              expands its managed SASE service ecosystem.

              The company holds Private-Disclosed status — it publicly reports ARR milestones, customer
              counts, and material funding events, but withholds operating margin, absolute revenue,
              headcount, and customer-level economics.
