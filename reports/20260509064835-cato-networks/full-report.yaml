      - number: '2.5'
        title: Sizing Gaps and Contradictory Estimates
        blocks:
          - type: paragraph
            body: |
              The SASE market presents some of the most divergent analyst estimates in enterprise
              technology. Dell'Oro's revenue-actuals tracker ($2.4B TTM through Q3 2024) is more than
              50% smaller than the top-down TAM estimates from Grand View Research ($4.2B) or
              MarketsandMarkets for the same period. Some broader market definitions that include
              adjacent SD-WAN and SSE revenues produce figures exceeding $9B—a 4× spread from the
              narrowest to broadest definition.

              CAGR estimates range from 22% (Grand View Research) to 38.9% (P&S Market Research for
              SD-WAN specifically), creating significant uncertainty in 2030 market-size projections
              that range from $17B to over $42B. These contradictions reflect genuine methodological
              differences: revenue-actuals approaches (Dell'Oro) vs. addressable-market extrapolations
              (most research houses), component-inclusion differences (is pure SD-WAN or pure SSE
              included?), and geographic scope variation (global vs. North America only).

              Open diligence questions include: (1) What share of the Dell'Oro-tracked $2.4B market is
              Cato's actual ARR? (2) How much of Cato's ARR growth comes from upsell within existing
              accounts vs. new logos? (3) Is the SASE market at genuine inflection point or still
              early-adopter phase? These gaps limit the confidence with which an investor can validate
              forward projections using any single analyst source.
            claimRefs:
              - CM027
              - CM028
              - CM029
              - CM030
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Analyst Market Definitions Create a 4× TAM Spread
            body: >-
              Dell'Oro's revenue-actuals tracker puts the 2024 SASE market at $2.4B while broader SSE+SD-WAN combined
              estimates exceed $9B. Investors should anchor to Dell'Oro for realized market size and treat top-down TAM
              numbers as aspirational ceilings. Cato's $300M+ ARR represents 12.5% of the Dell'Oro-tracked market, a
              materially different share story than the <3% of a $9B TAM figure.
            calloutType: insight
            claimRefs:
              - CM006
              - CM007
              - CM027
              - CM028
          - type: callout
            title: Zero-Trust Regulatory Tailwind Creates Structural Demand
            body: >-
              OMB M-22-09 mandated zero-trust adoption for US federal agencies by end of FY2024, referencing NIST SP
              800-207. The mandate has created a compliance cascade into federal contractors, defense industrial base
              (CMMC), banking (FFIEC), and healthcare (HIPAA), materially expanding the enterprise addressable market
              for ZTNA and SASE beyond organic cloud-migration demand.
            calloutType: strength
            claimRefs:
              - CM021
              - CM022
              - CM023
          - type: callout
            title: MPLS Contract Lock-In Is the Primary Adoption Headwind
            body: >-
              Most mid-to-large enterprises have 3–5 year MPLS contracts with tier-1 carriers. SASE adoption—including
              Cato's pipeline—is paced by contract expiry cycles rather than technology readiness alone. This creates a
              predictable but extended S-curve adoption pattern and limits the speed at which even a technically
              superior SASE platform can capture market share.
            calloutType: risk
            claimRefs:
              - CM024
              - CM025
              - CM026
          - type: callout
            title: Single-Vendor SASE Market Remains Highly Concentrated
            body: >-
              Dell'Oro data shows the top six SASE vendors control 72% of the $2.4B market. Zscaler alone holds
              approximately 21% share. While Cato is a Gartner Magic Quadrant Leader and growing at ~50% YoY (Q3 2024),
              it operates in a consolidating market dominated by better-capitalized public-company competitors with
              larger sales forces and broader partner ecosystems.
            calloutType: risk
            claimRefs:
              - CM031
