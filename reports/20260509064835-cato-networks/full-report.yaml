      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Gartner Peer Insights Dominance Signals Unusually Strong Customer Satisfaction
            body: |
              Cato Networks' 4.7/5.0 rating from 183 verified Gartner Peer Insights reviews — 10x
              more than any other Single-Vendor SASE Leader — is a highly credible independent signal
              of customer satisfaction. Gartner's verification process requires reviewers to be
              authenticated enterprise customers with real deployments. At 183 reviews, the sample
              size is statistically meaningful for an enterprise technology segment. The "Customers'
              Choice" designation in 2024 further confirms that active customers regard Cato's platform
              as a strong performer. This breadth of independent review activity at scale is unusual
              in enterprise networking and constitutes a durability signal that is difficult to replicate
              through marketing alone.
            calloutType: strength
            claimRefs:
              - CU009
              - CU010
              - CU011
              - CU034
          - type: callout
            title: NRR Gap Limits Full Retention Underwriting
            body: |
              While Cato's GDR >95% is a strong floor signal, the absence of publicly disclosed net
              revenue retention rate prevents full assessment of expansion ARR quality. For a company
              at $300M ARR with a land-and-expand model, NRR is a critical value-creation driver —
              a 120% NRR implies $36M of ARR generated annually from existing customers with zero new
              logo cost. Without NRR, the expansion motion's contribution to ARR growth cannot be
              separated from new logo additions, making it impossible to assess whether growth
              decelerates if new logo acquisition slows. The NRR disclosure gap is a material
              diligence ask and should be a precondition for any term sheet conversation.
            calloutType: risk
