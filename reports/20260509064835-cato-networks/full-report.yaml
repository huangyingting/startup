      - number: '3.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Cato's Native Convergence Is Its Clearest Structural Advantage
            body: >
              No competitor in the Gartner SASE Magic Quadrant 2024 Leaders tier was purpose-built from inception with
              both SD-WAN and SSE in a single cloud platform. Zscaler acquired no SD-WAN and requires a separate
              networking underlay. Palo Alto acquired CloudGenix SD-WAN after building Prisma Access separately. This
              architectural advantage is difficult to replicate through acquisition and integration and represents
              Cato's most durable moat in enterprise evaluations where full network transformation is in scope.
            calloutType: insight
            claimRefs:
              - CP017
              - CP018
              - CP019
              - CP027
          - type: callout
            title: Zscaler's SSE Depth Poses Displacement Risk in Regulated Verticals
            body: >
              Zscaler's DLP, CASB, and threat prevention capabilities are broadly recognized as deeper than Cato's in
              regulated-industry evaluations (financial services, healthcare, government). Customer reviews on G2 and
              PeerSpot indicate that enterprises with stringent data classification and content-inspection policies
              often prefer Zscaler despite higher complexity. This represents a genuine competitive risk for Cato in
              verticals where compliance requirements drive security depth above networking simplicity.
            calloutType: risk
            claimRefs:
              - CP032
              - CP003
          - type: callout
            title: Palo Alto's Platformization Strategy Is a Long-Term Retention Threat
            body: >
              Palo Alto Networks' platformization strategy bundles SASE, endpoint, cloud security, and SOC capabilities
              at aggregate discounts unavailable to point-product vendors. For large enterprises already running Palo
              Alto firewalls, the economic and operational incentive to consolidate on Prisma SASE rather than adding
              Cato is significant. Cato's mitigation is its networking integration advantage, but this argument weakens
              as Palo Alto continues to invest in CloudGenix-Prisma Access unification.
            calloutType: risk
            claimRefs:
              - CP031
              - CP019
          - type: callout
            title: VMware VeloCloud Uncertainty Creates Near-Term Displacement Opportunity
            body: >
              Broadcom's acquisition of VMware and subsequent product rationalization have created significant
              uncertainty among VMware VeloCloud SD-WAN customers. Enterprise accounts facing VeloCloud end-of-life or
              support changes represent a natural displacement window for Cato and other SD-WAN-capable SASE vendors.
              This opportunity is time-limited and concentrated in the 2024–2026 window as enterprises evaluate
              migration paths.
            calloutType: insight
            claimRefs:
              - CP015
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model, Streams, and Pricing
        blocks:
          - type: paragraph
            body: |
              Cato Networks operates an almost purely subscription-based revenue model anchored to
              annual recurring revenue (ARR). The primary stream — accounting for an estimated 90–93%
              of total revenue — is cloud subscription fees charged to enterprise customers for access
              to the Cato SASE Cloud platform. These subscriptions are typically sold as multi-year
              enterprise contracts priced on two primary dimensions: per-user (remote access/ZTNA
              seats) and per-site (SD-WAN sockets). Published list pricing runs approximately
              $150–$300 per user per year for the full platform stack, with per-site pricing varying
              by bandwidth tier and location count.

              Secondary revenue streams include professional services and implementation (estimated
              5–7% of revenue), hardware/CPE leasing for on-premises Cato Sockets (estimated 2–3%),
              training and certification programs, and expansion/upsell through additional security
              modules such as DLP, XDR, EPP, and AI security capabilities added via the AIM Security
              acquisition. Enterprise commit contracts lock in base ARR and create a durable revenue
              foundation; expansion is driven by location additions, user seat growth, and module
              attach rates. MSP and white-label partners resell Cato's platform to their own customers,
              creating an indirect distribution channel that represents approximately 40–50% of new
              bookings. Revenue recognition follows standard SaaS subscription treatment — contract
              value is deferred and recognized ratably over the contract term. Cato has not disclosed
              a deferred revenue balance, making it impossible to verify the pipeline of future
              recognized revenue. The platform's multi-service model provides natural land-and-expand
              mechanics, as customers typically start with SD-WAN or ZTNA before layering in full
              security services over a 12–24 month expansion window.
            claimRefs:
