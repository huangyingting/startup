        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: |
              **Exit readiness assessment:** Cato Networks is partially IPO-ready. The company has
              institutional investor backing (Lightspeed, Morgan Stanley, GP Bullhound, Accel), a
              credible CEO with public-company experience, strong revenue growth metrics, and
              exceptional customer satisfaction data. However, the disclosed absence of NRR, burn
              rate, and FedRAMP timeline — all material IPO-prerequisite disclosures — suggests the
              finance organization and external audit relationships may need additional investment
              before an S-1 can be filed. The frozen IPO is consistent with management's assessment
              that the company is 12–24 months from IPO readiness.

              **Final diligence asks (must-have before committing capital at $4.8B):**
              1. Net Revenue Retention (NRR) by cohort year for 2022, 2023, 2024 — minimum 3-year
                 trend required
              2. Gross Dollar Retention (GDR) current period (beyond 2023 disclosure)
              3. Monthly cash burn and current cash balance as of Q1 2026
              4. FedRAMP assessor (3PAO) name and expected Authorization to Operate (ATO) date
              5. Top-10 customer ARR as percentage of total ARR (customer concentration)
              6. Channel partner concentration — top-5 MSP partner share of channel ARR
              7. Employee headcount by geography (Israel vs. US vs. EMEA vs. APAC)
              8. Module attach rates: percentage of customers using >2 Cato SASE modules
              9. CFO tenure and audit firm confirmation
              10. AIM Security integration plan and committed roadmap timeline

              **Thesis-break triggers (any single trigger requires immediate thesis re-evaluation):**
              - NRR < 105% upon data room disclosure
              - Monthly burn > $30M implying runway < 14 months from Series G
              - FedRAMP ATO timeline > 36 months from engagement
              - ARR growth reported below 25% in next disclosure period
              - Shlomo Kramer departure announcement
            claimRefs:
