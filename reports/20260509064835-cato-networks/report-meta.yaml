companyProfile:
  summary: >
    Cato Networks is a Tel Aviv–based cybersecurity and networking company that invented the commercial
    SASE (Secure Access Service Edge) category alongside its founder Shlomo Kramer (co-founder of
    Check Point Software and Imperva). Founded in 2015, Cato has built the only large-scale,
    ground-up single-vendor SASE platform: a global private backbone of 85+ PoPs, a full Security
    Service Edge (SSE 360) stack including NGFW, SWG, IPS, CASB, DLP, ZTNA, RBI, DNS security, and
    managed EPP/EDR, all managed through a single cloud-native pane. At a $4.8B Series G valuation
    (January 2025, $359M raised), Cato is a Gartner Magic Quadrant Leader and the largest pure-play
    SASE vendor, with approximately 4,000 customers globally and an estimated $350M ARR.
  foundedDate: "2015-01-01"
  founders:
    - name: Shlomo Kramer
      role: CEO and Co-founder
      background: >
        Serial cybersecurity entrepreneur; co-founded Check Point Software (1993) and Imperva (2002).
        Named SASE category originator alongside Gartner analysts. Brings 30+ years of network security
        credibility and deep enterprise relationships.
      claimRefs: [CE001]
    - name: Gur Shatz
      role: President and Co-founder
      background: >
        Former VP Engineering and VP Products; drives product roadmap and go-to-market execution.
      claimRefs: [CE001]
  foundingLocation: Tel Aviv, Israel
  headquarters: Tel Aviv, Israel (with U.S. HQ in New York, NY)
  productSummary: >
    The Cato SASE Cloud Platform converges SD-WAN, a global private backbone (85+ PoPs), and a full
    Security Service Edge (SSE 360) into a single cloud-native service. The core innovation is the
    Single Pass Cloud Engine (SPACE): traffic is decrypted once, all security functions are applied
    in a unified pipeline, then re-encrypted and forwarded — eliminating the latency and policy
    fragmentation of service-chained point solutions. In 2024 Cato extended the platform with
    SASE-managed EPP/EDR and the first SASE-native XDR. Cato was recognized as a Leader in the
    2024 Gartner Magic Quadrant for Single-Vendor SASE alongside Palo Alto Networks and Netskope.
  customerFocus: >
    Mid-market to enterprise (500–10,000 employees), with strength in manufacturing, logistics,
    retail, financial services, and healthcare. Geographic spread spans North America, Europe,
    and APAC. Federal/public sector penetration is limited pending FedRAMP authorization (In Process).
  businessModel: >
    Annual subscription SaaS delivered entirely via the cloud; no hardware required. Pricing is
    seat/bandwidth-based with upsell potential across the full SSE stack (add ZTNA, CASB, DLP, XDR,
    EPP/EDR modules). Channel-partnered through MSSPs, VARs, and global SIs (Deloitte, Accenture,
    CDW). Direct enterprise sales motion coexists with channel.
  stage: Series G
  fundingStatus: >
    Raised $359M Series G in January 2025 at a $4.8B post-money valuation. Lead investors include
    LightSpeed Venture Partners, Bessemer Venture Partners, Coatue Management, and Singtel Innov8.
    Total disclosed funding approximately $773M across Series A–G. IPO was reportedly frozen in late
    2024 as the company explored strategic sale options.
  claimRefs: [CE001, CU001, CV001, CV002, CV003, CV005]
summary:
  headline: >
    Cato Networks is the Gartner-recognized single-vendor SASE leader with authentic architectural
    differentiation, strong mid-market momentum, and 4,000+ customers — but undisclosed NRR/margin
    data and an IPO-freeze create valuation uncertainty at the $4.8B asking price.
  overallScore: 6.5
  recommendation: buy
  confidence: medium
  riskRating: medium
  valuationStance: fair
