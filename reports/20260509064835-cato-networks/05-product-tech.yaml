    - id: CE035
      statement: |
        Cato's platform convergence creates a concentration risk: a vulnerability in the
        SPACE engine, the CMA (as an administrative control plane), or the multi-tenant data
        lake could simultaneously affect networking and all security functions for all tenants
        globally. No public information is available about Cato's multi-tenant isolation
        architecture, data segregation controls between tenants in the shared data lake, or
        the security hardening of the CMA itself as a high-value administrative attack surface.
      type: inferred
      topic: adverse concentration risk
      confidence: medium
      freshness: current
      sourceRefs: [SE001, SE015, SE021]
      answersQuestionRefs: [QE015]

    - id: CE036
      statement: |
        Cato Socket hardware comes in multiple variants supporting different branch site
        throughput requirements, from small offices to large campus locations. It supports
        active-active multi-link configurations across fiber, cable, ADSL, and 4G/5G for
        resilience and can be deployed in high-availability pairs. Sites that cannot deploy
        a Cato Socket can connect via IPSec from an existing router or firewall, providing
        a backward-compatible migration path that preserves existing hardware investments
        while still benefiting from Cato's backbone and cloud-delivered security.
      type: company-claimed
