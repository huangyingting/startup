  claims:
    - id: CE001
      statement: |
        Cato Networks delivers networking and security through the Cato SASE Cloud Platform - a
        single-vendor, cloud-native service architected from inception as a unified system.
        All capabilities - SD-WAN, private global backbone, SSE 360, XDR, EPP, DEM, IoT/OT
        security, and GenAI security - share a single data lake, policy engine, and management
        console (the Cato Management Application). Unlike "platformization" approaches that
        integrate independently acquired products, Cato's platform was purpose-built as one
        system with a single code base for security processing.
      type: company-claimed
      topic: product definition
      confidence: high
      freshness: current
      sourceRefs: [SE001, SE002]
      answersQuestionRefs: [QE001]

    - id: CE002
      statement: |
        The Single Pass Cloud Engine (SPACE) is Cato's core security processing engine.
        It converges NGFW (flow control and network segmentation), threat prevention (SWG,
        IPS, Next-Gen Anti-Malware, Remote Browser Isolation, DNS security), and application
        and data protection (CASB, DLP, ZTNA) into a cloud-native software stack. Traffic
        is decrypted once, all applicable security functions are applied sequentially in a
        single process context, and traffic is re-encrypted and forwarded. This single-pass
        architecture eliminates the repeated decryption-inspection-re-encryption cycles of
        service-chaining alternatives, reducing latency and ensuring all security functions
        share identical traffic context.
      type: company-claimed
      topic: SPACE architecture
      confidence: high
      freshness: current
      sourceRefs: [SE001, SE003]
      answersQuestionRefs: [QE003]

    - id: CE003
      statement: |
        Cato operates 85+ physical Points of Presence (PoPs) hosted in top-tier colocation
        datacenters worldwide, interconnected via multiple Tier-1 global and regional carriers
        to form a private global backbone. Each PoP runs bare-metal compute nodes managed
        directly by Cato - not leased cloud compute - running thousands of SPACE instances for
        low-latency, high-throughput security processing close to users and sites. Cato owns
        the PoP compute and manages all software, enabling global extensibility independent
        of hyperscaler footprint or pricing. The backbone provides SLA-backed connectivity
        described as MPLS-equivalent in reliability.
      type: company-claimed
      topic: global backbone
      confidence: high
      freshness: current
      sourceRefs: [SE001, SE002, SE025]
      answersQuestionRefs: [QE002]

    - id: CE004
      statement: |
        Cato SSE 360 is the full Security Service Edge stack delivered via SPACE at every
        PoP. It includes Firewall as a Service (FWaaS) for east-west and north-south traffic
        segmentation; Secure Web Gateway (SWG) for web threat prevention; Intrusion Prevention
        System (IPS) with AI/ML and threat intelligence; Next-Gen Anti-Malware (NGAM) for
        payload inspection; DNS Security against tunneling and phishing; Remote Browser
        Isolation (RBI) for high-risk sites; Cloud Access Security Broker (CASB) for SaaS
        visibility and control; Data Loss Prevention (DLP) for data protection across all
        traffic types; and Zero Trust Network Access (ZTNA) for identity-based application
        access with continuous session inspection.
      type: company-claimed
      topic: SSE 360 capabilities
      confidence: high
      freshness: current
      sourceRefs: [SE002, SE003]
      answersQuestionRefs: [QE004]

    - id: CE005
      statement: |
        Cato SD-WAN is delivered through the Cato Socket - a physical edge device connecting
        branch offices and sites to the nearest PoP over any internet link. Features include
        active-active link aggregation across fiber, cable, xDSL, and 4G/5G; application-
        aware QoS prioritization; dynamic path selection to route around link blackouts and
        brownouts; packet duplication to mitigate packet loss; and zero-touch provisioning
        (ZTP) for rapid, configuration-free deployment. The Socket is a primary MPLS
        replacement tool: customers terminate MPLS circuits and route WAN traffic over the
        Cato backbone at substantially lower cost with integrated security.
      type: company-claimed
      topic: SD-WAN and Cato Socket
      confidence: high
      freshness: current
      sourceRefs: [SE002, SE019]
      answersQuestionRefs: [QE005]

    - id: CE006
