callouts:
  - calloutType: risk
    title: "Private Backbone COGS Creates Structural Gross Margin Disadvantage"
    body: |
      Cato's decision to build and operate a proprietary global backbone of 85+ PoPs rather than
      leverage hyperscaler infrastructure (AWS, Azure, GCP) creates a structural gross margin
      disadvantage relative to software-only SSE peers. Zscaler achieves ~79% gross margin and
      Cloudflare ~77% by outsourcing compute and delivery to cloud providers. Cato's estimated
      gross margin of 62–72% reflects the ongoing cost of PoP colocation, hardware refresh,
      and bandwidth contracts. While the private backbone provides latency and security
      differentiation, it caps gross margin expansion and extends the path to operating
      profitability. Investors should model a persistent 7–17 percentage point gross margin gap
      versus public software-only peers when comparing operating leverage trajectories.
    claimRefs:
      - CI008
      - CI009
      - CI011
      - CI037

  - calloutType: insight
    title: "Capital Adequacy Appears Sufficient Near-Term But Burn Rate Is Unverified"
    body: |
      The $409M Series G at $4.8B valuation provides Cato approximately $289M in primary
      proceeds after the ~$120M employee secondary component. At an estimated monthly burn of
      $12–25M, this implies a post-raise runway of 12–24 months from the January 2025 close,
      projecting a next liquidity event need in Q1 2026–Q1 2027. The window aligns with the
      anticipated IPO timeline, though the IPO has already been delayed from original 2023
      expectations. Capital adequacy risk is moderate: the company has demonstrated the ability
      to raise at scale, but continued burn without revenue-driven cash flow improvement
      elevates reliance on favorable public market conditions. The AIM Security acquisition adds
      unquantified integration costs.
    claimRefs:
      - CI005
      - CI006
      - CI025
      - CI026
      - CI027

