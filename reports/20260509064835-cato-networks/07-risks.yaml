  - id: SR-people
    title: Leadership, Governance, and Execution Risks
    body: |
      Cato Networks faces elevated key-person and governance risk following the January 2024
      departure of co-founder and President/COO Gur Shatz following a reported dispute with
      CEO Shlomo Kramer. Shatz, who co-founded Cato with Kramer after previously co-founding
      Incapsula (acquired by Imperva), was a foundational operational and technical leader.
      While Shatz retains a board seat, the loss of the executive co-founder after nearly
      nine years of partnership represents a governance inflection and potential signal of
      strategic disagreement about IPO timing, valuation, or operational direction.

      Shlomo Kramer (age 68+) is the sole founder currently in an operating seat. No publicly
      named succession plan or COO replacement has been announced since Shatz's departure.
      The leadership bench has been deepened ahead of the anticipated IPO: Eyal Heiman (CTO),
      Ofir Agasi (CPO), Tomer Wald (CFO), Nick Fan (CRO), and Alon Alter (Chief Business
      Officer) provide functional coverage, but all were appointed by Kramer and represent
      second-generation executives without the founder-credential weight of the Kramer-Shatz
      partnership. The IPO freeze (May 2025) extends the management team's exposure to
      private-company compensation structures, elevating retention risk for senior leaders
      who may hold illiquid equity. No disclosed legal disputes, investigations, or governance
      violations exist in the public record. However, the combination of a founder-centric
      governance model, co-founder departure, frozen IPO, and geopolitical operating environment
      creates a multi-factor execution risk that could materially affect strategic decision-making.
