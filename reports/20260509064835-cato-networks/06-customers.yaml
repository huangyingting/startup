company:
  name: Cato Networks
chapter:
  number: 6
  title: Customers
  summary: |
    Cato Networks serves 3,500+ enterprise customers globally as of June 2025, up from 2,500+ in
    July 2024 and 3,000+ in February 2025. The company's gross dollar retention rate exceeds 95%
    as disclosed in September 2023, and the Gartner Peer Insights platform shows a 4.7/5 rating
    across 183 verified reviews — 10x more reviews than any other Single-Vendor SASE Magic
    Quadrant Leader. Named enterprise deployments span manufacturing (Carlsberg, O-I Glass,
    Vitesco Technologies, Haulotte, Juki), retail (Ryohin Keikaku/MUJI, Flügger Group), car
    rental (Sixt), aviation (Swissport), and office products (ACCO Brands). Customers operate
    across 150+ countries through Cato's 85+ global PoP network. The channel program includes
    150+ "Powered by Cato" exclusive managed SASE partners. Key evidence gaps: net revenue
    retention rate, customer acquisition cost, top-customer concentration data, and ACV
    distribution by vertical are all undisclosed.

sections:
  - id: SU-segmentation
    title: "Customer Base Overview and Segmentation"
    body: |
      Cato Networks serves 3,500+ enterprise customers across 150+ countries as of June 2025,
      making it the largest single-vendor SASE provider by publicly reported customer count.
      The customer base spans six confirmed industry verticals: manufacturing (the dominant
      category by named deployment volume), automotive, retail, professional services, aviation,
      and office products. Geographically, Cato's deployments are concentrated in Europe (where
      several of the largest named deployments originate) and North America, with growing
      presence in Asia-Pacific through its Japanese retail deployments (Ryohin Keikaku/MUJI)
      and APAC PoP expansion.

      The implied average contract value (ACV) at $300M ARR and 3,500 customers is approximately
      $85,000 per year, consistent with mid-market to lower-large-enterprise positioning. Named
      deployments range from companies with 3,200 employees (MUJI) to global corporations with
      23,000+ employees (O-I Glass, Vitesco Technologies), suggesting Cato serves a broad ACV
      band within the enterprise tier. The buyer persona is the CISO or VP of IT Infrastructure
      at distributed-workforce organizations requiring multi-site networking and security
      convergence. Cato's certifications (SOC 2 Type II, ISO 27001, PCI DSS Level 1, HIPAA,
      GDPR, Cyber Essentials UK) address regulated-industry buyers in financial services,
      healthcare, and retail. The payer profile is primarily direct enterprise procurement,
      with approximately 40–50% of new bookings flowing through MSP and VAR channel partners
      who resell Cato's platform under the "Powered by Cato" program.
    claimRefs:
      - CU001
      - CU002
      - CU023
      - CU025
      - CU026
      - CU027
      - CU029
      - CU033
      - CU035
      - CU037

  - id: SU-adoption
    title: "Adoption Trajectory and Scale Evidence"
    body: |
      Cato Networks has demonstrated one of the fastest ARR growth trajectories in enterprise
      networking security. From $100M ARR in 2021 (approximately 5–6 years post-founding), the
      company doubled to $200M ARR by July 2024, then reached $250M ARR at year-end 2024
      (representing 46% year-on-year growth), and surpassed $300M ARR by September 2025.
      Corresponding customer count grew from approximately 1,000–1,500 at the $100M milestone
      to 2,500+ by July 2024, 3,000+ by February 2025, and 3,500+ by June 2025 — a 40%
      increase in less than 12 months.

      This trajectory is corroborated by Cato's global deployment infrastructure: 85+ PoPs
      across 150+ countries represent physical adoption evidence. Channel momentum further
      confirms adoption: 150+ exclusive "Powered by Cato" managed service partners demonstrate
      that third-party MSPs are committing to platform-exclusive GTM motions, a stronger
      adoption signal than non-exclusive VAR relationships. Gartner Peer Insights review volume
      (183 verified reviews as of July 2024, 10x more than any other SASE Leader) suggests
      a large, actively engaged installed base of users willing to leave public feedback —
      a reliable proxy for real deployment breadth. The 85+ country PoP footprint is
      operationally consistent with serving 150+ countries at enterprise SLA levels.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU012
      - CU013
      - CU029
      - CU033

  - id: SU-named
    title: "Named Customer Deployments and Proof Quality"
    body: |
      Cato Networks has published case studies for at least ten named enterprise customers in
      production, constituting high-quality deployment proof. Carlsberg Group (global brewing)
      deployed Cato SASE across 200+ locations and 25,000+ remote users, replacing legacy VPN
      and SD-WAN infrastructure. O-I Glass, a $7 billion packaging manufacturer, deployed
      across 150+ factories in 20 countries for 23,000 employees. Ryohin Keikaku (MUJI)
      connected 820+ locations with 3,200+ employees across Japan and international markets.
      Vitesco Technologies, a $10 billion German automotive supplier, deployed across 90+
      locations for 24,000 remote users. Sixt (global car rental) deployed for branch and remote
      access in Europe and the Americas. Swissport (aviation ground handling) deployed for
      airport connectivity. ACCO Brands, Haulotte (construction equipment), Juki (sewing
      machines), and Flügger Group (Nordic retail and manufacturing) round out the published
      named customer set.

      Evidence quality is high for the core six deployments (Carlsberg, O-I, MUJI, Vitesco,
      Sixt, Swissport): all have official Cato case studies with specifics on deployment scale,
      outcomes achieved, and use cases. All are described as production deployments in active
      ongoing use — no published case study identifies a discontinued pilot. The manufacturing
      and automotive verticals dominate by named deployment volume, reflecting Cato's apparent
      strength in multi-site, geographically dispersed operational technology environments.
    claimRefs:
      - CU014
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
      - CU021
      - CU022
      - CU023
      - CU036

  - id: SU-retention
    title: "Retention, Satisfaction, and Durability Evidence"
    body: |
      Cato Networks' disclosed gross dollar retention rate of >95% (September 2023) is the
      primary public retention signal. GDR >95% is a strong retention indicator for enterprise
      SaaS; best-in-class SaaS benchmarks (Bessemer, SaaS Capital) place the 95th percentile
      at approximately 95%+ GDR. Net revenue retention is not publicly disclosed, preventing
      full assessment of expansion ARR contribution. Gartner Peer Insights satisfaction evidence
      is strong: 4.7/5.0 overall rating across 183 verified reviews, with Gartner designating
      Cato as a "Customers' Choice" in 2024. Enterprise reviewers on PeerSpot and G2 generally
      rate the platform above 4.0/5.0 overall, with the most cited shortcomings being initial
      configuration complexity and initial learning curve — barriers to adoption rather than
      drivers of churn. A minority of Gartner Peer Insights reviewers flag latency variability
      on specific PoP routing paths and implementation complexity, creating a modest adverse
      signal against the dominant positive reviews. No published evidence of significant churn
      campaigns, customer wins by competitors directly from Cato's installed base, or major
      product recalls exists in the public record as of the research date.
    claimRefs:
      - CU008
      - CU009
      - CU010
      - CU011
      - CU024
      - CU030
      - CU031
      - CU034
      - CU038

  - id: SU-expansion
    title: "Expansion, Concentration, and Channel Risk"
    body: |
      Cato Networks' land-and-expand motion is driven by modular security add-ons (DLP, XDR,
      EPP, AI security) and location/seat expansion as organizations grow. The "Powered by Cato"
      channel program — revamped in 2025 — provides 150+ exclusive MSP partners who resell the
      platform and drive expansion among SMB-to-mid-market tiers that the direct sales force
      does not reach. Channel accounts for approximately 40–50% of new bookings, reducing
      top-customer concentration risk in the direct book of business. However, Cato does not
      publicly disclose top-customer revenue concentration or whether any single customer
      exceeds 5% of total ARR; this is a material diligence gap for concentration assessment.
      ACV/CAC/LTV data is also not publicly available, making it impossible to assess the
      profitability of the channel book versus the direct book. The "Powered by Cato" exclusivity
      creates partner lock-in that supports retention but also creates concentration risk if a
      major MSP partner churns or is acquired. The combination of multi-year enterprise contracts,
      high GDR, and channel breadth provides reasonable confidence that the revenue base is
      durable, but the absence of NRR and concentration data limits full underwriting certainty.
    claimRefs:
      - CU013
      - CU028
      - CU032
      - CU035
      - CU039

