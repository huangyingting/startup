  - id: SP-pricing-gtm
    title: Pricing, Packaging, and GTM Distribution
    body: |
      SASE pricing models vary significantly across vendors, making direct comparison difficult.
      Cato Networks prices on a per-site or per-user subscription basis, bundling networking
      and security in a single SKU. This simplifies procurement and reduces the number of
      vendor relationships an enterprise must manage, but Cato's all-inclusive pricing can
      appear higher than point-product alternatives when customers compare only a single
      capability in isolation.

      Zscaler uses a per-user, per-module pricing model with separate SKUs for ZIA (internet
      access), ZPA (private access), ZDX (digital experience), and additional add-ons. Enterprise
      contracts typically range from $15–$50+ per user per month depending on bundle depth.
      Zscaler's large direct sales organization and strong GSI (Global Systems Integrator)
      partnerships provide broad enterprise reach, but its sales motion skews toward security-first
      buyers rather than network operations teams.

      Palo Alto Networks uses a credit-based consumption model for Prisma Access alongside
      traditional subscription pricing for Prisma SD-WAN. Its enterprise relationships through
      PANW firewalls enable platform bundle discounts and competitive upgrade deals. Palo Alto's
      platformization strategy, which bundles multiple PANW products at discounted aggregate
      rates, is a powerful retention and expansion mechanism that Cato cannot easily replicate
      given its narrower product footprint.

      Fortinet benefits from a large installed base of FortiGate customers who can extend their
      existing relationship to FortiSASE. The FortiGate-to-FortiSASE upgrade path reduces
      switching friction for existing Fortinet customers and can appear cost-effective relative
      to migrating to a new vendor. This retention advantage is structurally significant.

      Cloudflare's Zero Trust pricing starts at a free tier and scales to enterprise contracts,
      typically at lower per-seat cost than Cato or Zscaler. This aggressive pricing is enabled
      by Cloudflare's infrastructure efficiency from its network-as-a-service platform. For SMB
      and digital-native enterprises, Cloudflare's pricing provides a compelling low-cost entry
      that can displace SSE incumbents. However, large enterprise deployments often find
      Cloudflare's professional services and support maturity insufficient.

      Cato's go-to-market relies on a channel-partner model, with managed SASE services
      offered through a growing ecosystem of MSSPs, VARs, and SIs. This is differentiated from
      Zscaler's heavy direct-sales reliance and positions Cato for efficient scaling. However,
      Cato's channel ecosystem is less mature than Palo Alto's or Cisco's, which have decades of
      channel relationships in enterprise accounts.
