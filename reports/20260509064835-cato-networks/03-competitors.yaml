callouts:
  - calloutType: insight
    title: Cato's Native Convergence Is Its Clearest Structural Advantage
    body: >
      No competitor in the Gartner SASE Magic Quadrant 2024 Leaders tier was purpose-built from inception with both
      SD-WAN and SSE in a single cloud platform. Zscaler acquired no SD-WAN and requires a separate networking underlay.
      Palo Alto acquired CloudGenix SD-WAN after building Prisma Access separately. This architectural advantage is
      difficult to replicate through acquisition and integration and represents Cato's most durable moat in enterprise
      evaluations where full network transformation is in scope.
    claimRefs:
      - CP017
      - CP018
      - CP019
      - CP027
  - calloutType: risk
    title: Zscaler's SSE Depth Poses Displacement Risk in Regulated Verticals
    body: >
      Zscaler's DLP, CASB, and threat prevention capabilities are broadly recognized as deeper than Cato's in
      regulated-industry evaluations (financial services, healthcare, government). Customer reviews on G2 and PeerSpot
      indicate that enterprises with stringent data classification and content-inspection policies often prefer Zscaler
      despite higher complexity. This represents a genuine competitive risk for Cato in verticals where compliance
      requirements drive security depth above networking simplicity.
    claimRefs:
      - CP032
      - CP003
  - calloutType: risk
    title: Palo Alto's Platformization Strategy Is a Long-Term Retention Threat
    body: >
      Palo Alto Networks' platformization strategy bundles SASE, endpoint, cloud security, and SOC capabilities at
      aggregate discounts unavailable to point-product vendors. For large enterprises already running Palo Alto
      firewalls, the economic and operational incentive to consolidate on Prisma SASE rather than adding Cato is
      significant. Cato's mitigation is its networking integration advantage, but this argument weakens as Palo Alto
      continues to invest in CloudGenix-Prisma Access unification.
    claimRefs:
      - CP031
      - CP019
  - calloutType: insight
    title: VMware VeloCloud Uncertainty Creates Near-Term Displacement Opportunity
    body: >
      Broadcom's acquisition of VMware and subsequent product rationalization have created significant uncertainty among
      VMware VeloCloud SD-WAN customers. Enterprise accounts facing VeloCloud end-of-life or support changes represent a
      natural displacement window for Cato and other SD-WAN-capable SASE vendors. This opportunity is time-limited and
      concentrated in the 2024–2026 window as enterprises evaluate migration paths.
    claimRefs:
      - CP015
