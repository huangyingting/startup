  - id: SP-switching-lockin
    title: Switching Costs, Lock-In, and Multi-Homing
    body: |
      Switching costs in SASE are among the highest in enterprise software, driven by four
      compounding factors: physical SD-WAN edge hardware replacement, complete re-architecture
      of network topology, re-training of network operations staff, and reintegration of security
      policies across all cloud access points.

      For Cato specifically, switching costs are elevated by the use of proprietary Cato Socket
      edge devices at branch locations, which require physical replacement if a customer moves to
      a competing platform. Enterprise-wide SASE deployments typically span dozens to hundreds
      of branch sites, making rip-and-replace migrations operationally complex and expensive.
      Typical SASE contract durations of 3 years further anchor customer relationships.

      Multi-homing — running two SASE platforms simultaneously — is technically possible but
      operationally unusual due to routing complexity and security policy duplication. In
      practice, large enterprises occasionally run a transition period of 6–12 months with
      parallel connectivity, but sustained multi-vendor SASE deployments are rare.

      Supply-side and partner access factors include Cato's proprietary global backbone (80+
      PoPs), which is not a shared infrastructure. Competitors building PoP networks face 12–24
      month timelines and significant capital expenditure to achieve comparable geographic
      coverage. This creates a structural barrier for new entrants and reinforces Cato's
      network performance advantages over the medium term.

      Lock-in risks from the customer perspective include dependency on Cato's proprietary
      control plane for policy management, reporting, and analytics. Data egress from Cato's
      platform into third-party SIEM or observability tools is supported via integrations, but
      historical traffic analytics and policy configurations are not portable in standardized
      formats, creating incremental switching friction.
