  - id: SV-scenarios
    title: Bull, Base, and Bear Case Scenarios
    body: |
      **Bull Case (30% probability):**
      - ARR grows to $430M by end-2026 (23% growth over $350M, conservative given trailing 43%)
      - NRR confirmed at 115%+ in IPO S-1 filing
      - FedRAMP Authorized by Q4 2026, opening government TAM
      - IPO executed at $7.0B (16.5x NTM ARR of ~$430M) in H1 2027
      - Implied return: 46% from $4.8B entry

      **Base Case (50% probability):**
      - ARR grows to $400M by end-2026 (14% from $350M; trailing growth decelerates moderately)
      - NRR confirmed at 110–115% in due diligence
      - IPO delayed to H2 2027 or strategic sale at $5.5–6.0B (13–15x NTM ARR)
      - Implied return: 15–25% from $4.8B entry over 18–24 months

      **Bear Case (20% probability):**
      - ARR growth decelerates to <25% due to Palo Alto platformization and macro slowdown
      - NRR disclosed at <105%, undermining land-and-expand thesis
      - IPO window remains closed; forced M&A at $3.0–3.5B (8–10x ARR)
      - Implied loss: -27% to -37% from $4.8B entry

      The base case return of 15–25% over 18–24 months is modest for a late-stage private
      equity or growth equity investment — equivalent to a 7–14% annualized return. The
      bull case IRR of ~25–30% annualized is more compelling, but requires FedRAMP and
      NRR confirmation plus favorable IPO market conditions. The bear case is real: Palo
      Alto's platformization is active and aggressive, and the IPO market for pre-profitability
      security companies remains challenging as of Q1 2026.
