  - id: SV-financing-context
    title: Financing Context, Capital Structure, and Entry Discipline
    body: |
      Cato Networks has raised approximately $647M total capital across six rounds:
      - Seed: ~$10M (2016, Greylock Partners / Aspect Ventures)
      - Series A: $30M (2016)
      - Series B: $25M (2018)
      - Series C: $55M (2019)
      - Series D: $130M (2020, Lightspeed, Greylock)
      - Series E: $200M (2022)
      - Series F: $238M at $3.5B valuation (September 2023, Morgan Stanley Expansion Capital,
        Accel, Goldman Sachs Asset Management)
      - Series G: $409M at $4.8B valuation (January 2025, Lightspeed, GP Bullhound)
        [Extended September 2025 with additional $238M from new investors]

      Total raised is approximately $647M in the core Series G cycle (Jan 2025 + Sep 2025
      extension). The preference stack from $647M at various liquidation preferences creates
      meaningful downside protection for late-stage investors but creates an overhang for
      common equity holders (employees, early shareholders) in an exit below $1–1.5B. At
      the current $4.8B valuation, all investors are likely in the money.

      Entry discipline note: The $4.8B round was priced at 13.7x ARR — at the time of the
      round, Cato had confirmed $300M+ ARR (September 2025). NTM ARR at time of valuation
      was approximately $350M (implying 13.7x NTM). Secondary market pricing for Cato shares
      has not been publicly reported; if secondary access is available at 10–12% discount to
      round price ($4.2–4.3B), that represents a meaningful improvement in entry economics.

      The IPO freeze creates financing risk: if Cato cannot execute an IPO or strategic sale
      in 18–30 months, it may need to raise another late-stage round, potentially dilutive
      if market conditions deteriorate.
