callouts:
  - calloutType: insight
    title: Shlomo Kramer's Track Record Is the Most Underappreciated Valuation Input
    body: |
      Shlomo Kramer's exit track record as co-founder of Check Point Software (CHKP, market
      cap $18B+) and Imperva (acquired by Thoma Bravo in 2019 for $2.1B) represents a
      qualitative premium that is difficult to price but historically has delivered significant
      enterprise security exit multiples. At Check Point, Kramer helped build the world's
      largest standalone firewall company. At Imperva, he built a web application security
      leader acquired at approximately 8x ARR — below current Cato's multiple, but during a
      weaker market. Kramer's demonstrated ability to attract top institutional investors
      (Lightspeed, Morgan Stanley, Accel, Goldman Sachs), build enterprise sales organizations,
      and execute large-scale enterprise deals provides a confidence premium that partially
      justifies Cato's premium multiple. Investors who discounted similar founder-quality
      premiums at Snowflake, Datadog, and Palo Alto's early rounds systematically underestimated
      the exit values those companies achieved.
    claimRefs:
      - CV004
      - CV005
      - CV006
      - CV017
      - CV018
  - calloutType: risk
    title: NRR Is the Investment Case's Biggest Unknown
    body: |
      Cato Networks has not disclosed its net revenue retention rate — the single most important
      SaaS financial metric for underwriting a land-and-expand business at 13.7x ARR. Zscaler
      reports NRR of 115–120%. If Cato's NRR is 110%+, the current valuation is reasonable:
      $350M ARR growing organically via existing customers at 10% per year provides $35M of
      ARR growth with zero new logo cost. If NRR is below 105%, the growth story depends almost
      entirely on new logo acquisition — a structurally weaker model subject to macro slowdown
      and competitive displacement. Investors cannot resolve this from public sources. Every
      thesis statement about Cato's retention quality rests on indirect evidence (GDR >95%,
      NPS 93, multi-year contracts) rather than the definitive metric. This is a non-negotiable
      data room ask before committing at $4.8B.
    claimRefs:
      - CV003
      - CV009
      - CV010
      - CV030
      - CV039
