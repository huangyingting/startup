    - id: GV001
      type: private-evidence-only
      severity: material
      description: >-
        Net Revenue Retention (NRR) has not been publicly disclosed by Cato Networks. This is the most critical missing
        financial metric for evaluating a SaaS company at 13.7x ARR. All thesis claims about land-and-expand quality and
        retention durability rest on proxy evidence (GDR >95%, NPS 93, multi-year contracts) rather than the definitive
        metric.
      relatedQuestionRefs:
        - QV007
    - id: GV002
      type: private-evidence-only
      severity: material
      description: >-
        Monthly cash burn and current cash balance are not publicly disclosed. The burn rate estimate of $180–360M
        annually is inferred from comparable SaaS cost structures; actual financial performance requires data room
        access. Runway cannot be confirmed without primary source data.
