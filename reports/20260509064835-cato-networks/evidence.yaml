    statement: |
      Cato provides three cloud datacenter connectivity options: Cato vSocket (a virtual
      SD-WAN appliance deployable in AWS, Azure, and GCP); direct cross-connect from cloud
      provider to Cato PoP; and IPSec tunnel from existing edge router or firewall to Cato
