  - id: CE014
    statement: |
      Cato Client is a software agent available for Windows, macOS, iOS, Android, and
      Linux. It provides always-on ZTNA for identity-based application access, continuous
      traffic routing through the nearest Cato PoP, and device posture assessment integrated
      with enterprise identity providers (SAML, SCIM, Active Directory/LDAP). The Client
      also hosts the EPP/EDR agent, enabling unified endpoint protection and network security
      from a single deployable agent. Agentless browser-based access is available for
      contractors and BYOD users who cannot install the Client, with reduced policy enforcement.
    type: company-claimed
    topic: Cato Client connectivity
    confidence: high
    freshness: current
    sourceRefs:
