  - id: CE029
    statement: |
      Cato's modular pricing structure - base platform licensing with separate add-on pricing
      for XDR, EPP, DEM, IoT/OT security, and MXDR - has been cited by Gartner and analysts
      as a source of complexity and cost uncertainty. Enterprises report that the all-in
      cost of enabling all desired Cato capabilities can exceed initial expectations. Some
      analysts note the total cost of a fully licensed Cato deployment compares favorably
      vs. equivalent multi-vendor stacks but unfavorably vs. certain bundled competitors
      such as Fortinet Secure SD-WAN with FortiSASE.
