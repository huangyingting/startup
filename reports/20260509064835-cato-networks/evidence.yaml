  - id: CE013
    statement: |
      Cato's open data lake ingests SPACE-generated events (device, user, application,
      and data attributes per inspected flow), Cato Client ZTNA and EPP telemetry, and
      third-party endpoint telemetry (Microsoft Defender, CrowdStrike). It also ingests
      hundreds of external threat intelligence feeds, which are continuously validated by
      Cato Security Research using AI/ML to reduce false positives. New prevention rules
      are simulated against actual customer traffic before production deployment and
      distributed globally within 24-48 hours with no customer IT involvement. The data
      lake is accessible via the Cato API for SIEM export.
    type: company-claimed
    topic: data lake and threat intelligence
    confidence: high
    freshness: current
