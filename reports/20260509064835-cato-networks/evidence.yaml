  - id: CE022
    statement: |
      Cato's PoP infrastructure relies on third-party colocation datacenter operators for
      physical facility hosting and multiple Tier-1 carriers for backbone interconnects.
      While Cato owns and manages the bare-metal compute within these facilities, it is not
      a datacenter operator and has dependencies on colocation partner physical availability
      and carrier SLA performance. Independent audits of PoP-level uptime, carrier SLA
      attainment, and backbone latency metrics have not been publicly published, representing
      a diligence gap for enterprises relying on specific performance guarantees.
    type: inferred
    topic: infrastructure dependency risk
