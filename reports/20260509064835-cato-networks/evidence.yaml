  - id: CE032
    statement: |
      Cato MXDR (Managed Extended Detection and Response) has been operational since 2019,
      predating the company's formal XDR product launch in January 2024 by five years.
      Cato's internal security analysts use the same XDR analyst workbench and AI-assisted
      investigation tools available to customers, creating operational continuity between
      managed service and customer self-service. MXDR is positioned for organizations that
      prefer to outsource incident detection and response rather than operate XDR directly.
