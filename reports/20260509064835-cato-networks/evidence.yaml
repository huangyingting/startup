  - id: CE024
    statement: |
      Cato Security Research uses AI/ML systems to continuously validate the quality of
      hundreds of third-party threat intelligence feeds against the universe of feeds
      ingested across the entire customer base, reducing false positives from lower-quality
      feeds. New prevention rules are first simulated against real customer traffic patterns
      and - only after validation - deployed globally to all SPACE instances within 24-48
      hours, with no customer IT involvement or service disruption.
    type: company-claimed
    topic: threat intelligence operations
    confidence: medium
    freshness: current
    sourceRefs:
