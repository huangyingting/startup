  - id: CE023
    statement: |
      Cato's partner ecosystem includes 100+ Managed Service Providers (MSPs) and system
      integrators that resell and manage the Cato SASE platform for enterprise customers.
      MSP partners use the Cato Management Application and open API in a multi-tenant
      configuration, enabling automated provisioning, policy management, and visibility
      across customer deployments. This channel model extends Cato's go-to-market reach
      while keeping the platform architecture centralized and consistent.
    type: company-claimed
    topic: partner ecosystem
    confidence: high
    freshness: current
    sourceRefs:
