  - id: CE018
    statement: |
      Cato's GenAI security capabilities discover and categorize all generative AI usage
      across web, API, and application traffic, enforce intent-based usage policies, and
      detect sensitive data violations to prevent Shadow AI and data leakage risks. For
      organizations' internally developed AI applications and agents, Cato provides runtime
      protection against prompt injection, jailbreaks, and data leakage via AI gateway or
      API deployment across cloud, on-premises, and edge environments.
    type: company-claimed
    topic: GenAI security
    confidence: medium
    freshness: current
    sourceRefs:
