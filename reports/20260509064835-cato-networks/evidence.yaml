  - id: CE033
    statement: |
      SPACE's single-pass, centrally-managed inspection architecture provides an inherent
      compliance advantage: all traffic traverses a uniformly-managed inspection point at
      the regional PoP, making policy enforcement auditable and consistent across all users
      and sites. This simplifies compliance with frameworks requiring demonstrable full-traffic
      inspection, including PCI DSS cardholder data flow inspection and HIPAA protected health
      information transmission security. There are no routing paths that bypass SPACE when
      the Cato platform is fully deployed as the network edge.
    type: inferred
    topic: compliance architecture advantage
    confidence: medium
    freshness: current
