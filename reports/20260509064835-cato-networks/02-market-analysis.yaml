callouts:
  - calloutType: insight
    title: Analyst Market Definitions Create a 4× TAM Spread
    body: >-
      Dell'Oro's revenue-actuals tracker puts the 2024 SASE market at $2.4B while broader SSE+SD-WAN combined estimates
      exceed $9B. Investors should anchor to Dell'Oro for realized market size and treat top-down TAM numbers as
      aspirational ceilings. Cato's $300M+ ARR represents 12.5% of the Dell'Oro-tracked market, a materially different
      share story than the <3% of a $9B TAM figure.
    claimRefs:
      - CM006
      - CM007
      - CM027
      - CM028
  - calloutType: strength
    title: Zero-Trust Regulatory Tailwind Creates Structural Demand
    body: >-
      OMB M-22-09 mandated zero-trust adoption for US federal agencies by end of FY2024, referencing NIST SP 800-207.
      The mandate has created a compliance cascade into federal contractors, defense industrial base (CMMC), banking
      (FFIEC), and healthcare (HIPAA), materially expanding the enterprise addressable market for ZTNA and SASE beyond
      organic cloud-migration demand.
    claimRefs:
      - CM021
      - CM022
      - CM023
  - calloutType: risk
    title: MPLS Contract Lock-In Is the Primary Adoption Headwind
    body: >-
      Most mid-to-large enterprises have 3–5 year MPLS contracts with tier-1 carriers. SASE adoption—including Cato's
      pipeline—is paced by contract expiry cycles rather than technology readiness alone. This creates a predictable but
      extended S-curve adoption pattern and limits the speed at which even a technically superior SASE platform can
      capture market share.
    claimRefs:
      - CM024
      - CM025
      - CM026
  - calloutType: risk
    title: Single-Vendor SASE Market Remains Highly Concentrated
    body: >-
      Dell'Oro data shows the top six SASE vendors control 72% of the $2.4B market. Zscaler alone holds approximately
      21% share. While Cato is a Gartner Magic Quadrant Leader and growing at ~50% YoY (Q3 2024), it operates in a
      consolidating market dominated by better-capitalized public-company competitors with larger sales forces and
      broader partner ecosystems.
    claimRefs:
      - CM031
      - CM032
      - CM033
  - calloutType: assumption
    title: SAM Estimate Assumes Converged Single-Vendor SASE Wins Against Multi-Vendor
    body: >-
      The $8–12B SAM calculation assumes continued market shift toward single-vendor SASE architectures rather than
      best-of-breed multi-vendor approaches. If enterprises maintain a fragmented Zscaler + Cisco SD-WAN posture, Cato's
      actual SAM is materially smaller. This assumption requires ongoing validation against win/loss data.
    claimRefs:
      - CM012
      - CM013
      - CM029
