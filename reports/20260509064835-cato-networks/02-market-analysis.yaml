  - id: SM-sizing
    title: Market Sizing — Multiple Lenses
    body: |
      Market sizing estimates for SASE vary substantially across analysts, reflecting different
      boundary definitions, geographic scope, and component inclusion criteria. The Dell'Oro
      Group—widely regarded as the most rigorous tracker of enterprise networking and security
      revenues—measured the trailing-twelve-month SASE market at approximately $2.4 billion
      through Q3 2024, with the top six vendors accounting for 72% of that spend. This revenue-
      actuals approach captures realized subscription and licensing revenue, making it narrower
      than forward-looking TAM estimates.

      Broader analyst houses employ top-down addressable-market frameworks. Grand View Research
      sizes the SASE TAM at approximately $4.2B in 2024, projecting growth to roughly $30B by
      2030 at a 27.4% CAGR. Market.us estimates a 24.3% CAGR with a 2024 baseline of roughly
      $4B. Straits Research places the 2024 market at $3.8B, growing to $22B by 2030 at a
      25.7% CAGR. These estimates cluster around a $3.8–4.2B 2024 consensus for the core SASE
      category.

      The adjacent SD-WAN market contributes substantial addressable spend: P&S Market Research
      sizes SD-WAN at $5.9B in 2024, while SNS Insider places it at $5.2B. Security Service
      Edge (SSE)—which overlaps with SASE's security stack—is sized by Grand View Research at
      $6.1B for 2024 and by MarketsandMarkets at $6.8B. Zero Trust Network Access (ZTNA)
      alone, a SASE sub-component, is estimated at $3.4–3.5B by Grand View Research in 2024.

      Applying a bottom-up SAM lens scoped to mid-market and enterprise accounts (500+ employees,
      globally distributed workforce) in North America and Western Europe, the serviceable
      addressable market for a single-vendor SASE platform like Cato's is conservatively
      estimated at $8–12B today, expanding toward $25–35B by 2030 as MPLS displacement
      accelerates. Cato's current ARR of $300M+ represents roughly 2–4% penetration of that
      SAM, indicating meaningful headroom if net-revenue-retention and expansion sales remain
      healthy.
