  - id: SM-segments
    title: Buyer, User, and Payer Segmentation
    body: |
      Enterprise SASE purchasing involves three distinct roles: the buyer (who initiates and
      evaluates), the user (who consumes the service), and the payer (who controls the budget).
      In large enterprises, the CISO typically initiates the evaluation driven by a security
      mandate or a breach incident, while the VP of Network Engineering or Network Operations
      lead acts as the technical buyer validating SD-WAN performance. The CFO or CIO controls
      final budget approval for multi-year platform deals.

      Mid-market enterprises (500–2,000 employees) present a simpler decision structure: the
      IT Director often plays all three roles simultaneously, which accelerates evaluation cycles
      but also means the vendor must demonstrate immediate value without extensive professional
      services engagement. This segment is Cato's stated sweet spot.

      Gartner predicts that by 2025, at least 70% of new remote-access deployments will use
      ZTNA rather than VPNs—up from less than 10% in 2021—signaling rapid preference shift
      across all segments. Regulatory verticals (financial services, healthcare, government)
      are high-urgency adopters because of zero-trust mandates, but also face the highest
      switching friction due to compliance attestations tied to existing infrastructure. Retail
      and manufacturing sectors have large distributed-branch footprints that make SASE
      economics compelling through MPLS cost displacement, typically requiring an ROI payback
      period of 12–24 months.

      Budget typically sits in two line items: network infrastructure (SD-WAN, MPLS displacement)
      and network security (firewall, VPN, SWG). SASE vendors that successfully bridge both
      budget pools—as Cato does with its single-vendor approach—can capture more wallet share
      per account than point-solution competitors but must navigate a cross-functional selling
      motion that involves both networking and security stakeholders.
