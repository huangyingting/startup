sections:
- slug: market-boundary
  title: Market Boundary and Scope
  body: 'Twelve competes primarily in the sustainable aviation fuel (SAF) market, specifically in the power-to-liquids (PtL)
    or electrofuel (e-fuel) sub-segment, which uses captured CO2, renewable electricity, and water as inputs rather than biologically
    derived feedstocks. The broader SAF market encompasses multiple production pathways: hydroprocessed esters and fatty acids
    (HEFA), alcohol-to-jet (ATJ), Fischer-Tropsch (FT) from biomass or waste, and PtL/e-fuels. HEFA-based SAF constitutes
    the dominant commercial pathway today, accounting for over 85% of global SAF volumes as of 2024. Twelve''s OPUS reactor
    technology produces ASTM D7566 Annex A1-certified e-fuel SAF (E-Jet) as its primary product, qualifying it for blending
    with conventional jet fuel at up to 50% concentration.


    The spend boundary includes: (1) SAF sold under long-term offtake agreements to airlines (primary), (2) sustainable chemical
    feedstocks (e-naphtha) sold to industrial buyers, and (3) government-contracted fuel and R&D supply. Excluded spend includes
    conventional jet fuel (Jet A/A-1), biofuel blending outside SAF pathways, and ground transport fuels. Adjacencies include
    carbon removal credits, green hydrogen, and synthetic chemicals. The status-quo substitute is conventional fossil-derived
    jet fuel at $0.60-0.90 per gallon, or incumbent HEFA SAF at $2.50-4.00 per gallon. PtL e-fuels command a significant price
    premium but are eligible for policy support (45Z tax credit, EU ETS carbon cost savings, ReFuelEU mandates) that partially
    closes the gap. Twelve''s competitive advantage claim rests on feedstock independence (no biomass land use) and scalability
    via renewable electricity and captured CO2, which are not subject to the feedstock constraints that limit HEFA expansion.'
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM004
  - CM005
  tableRefs:
  - TM001
- slug: market-sizing
  title: Market Sizing and Addressable Opportunity
  body: 'The global SAF market was valued at approximately $1.5-2.0 billion in 2023, with production of approximately 600
    million liters against total aviation fuel consumption of approximately 330 million metric tonnes. Market projections
    from IATA, IEA, and independent analysts vary significantly: IATA targets SAF covering 2% of aviation fuel by 2025 (a
    target already missed) and 10% by 2030, which at 2024 consumption levels implies approximately 30-34 billion liters per
    year of SAF demand by 2030. BloombergNEF and McKinsey project the SAF market could reach $15-25 billion by 2030 under
    accelerated regulatory scenarios. The IEA''s Net Zero Emissions scenario requires aviation fuel carbon intensity to drop
    54% by 2035.


    For Twelve specifically, the most relevant addressable market is PtL e-fuel SAF. Estimates for PtL''s share of SAF by
    2030 range from 1% to 5% of total SAF volumes under base-case regulatory scenarios, implying a 2030 PtL SAF market of
    $150 million to $1.25 billion. By 2035-2040, if PtL costs decline substantially and green electricity costs fall below
    $0.02/kWh, PtL could constitute 10-20% of SAF, implying a $3-10 billion addressable market. These estimates carry significant
    uncertainty and depend on renewable electricity cost trajectories, CO2 capture economics, and the pace of regulatory mandates.
    Rocky Mountain Institute estimates PtL SAF at $130-200/barrel by 2035 (down from $400+/barrel today), implying continued
    premium pricing throughout the decade. Multiple contradictory estimates exist and are documented in the sizing lens table.'
  claimRefs:
  - CM006
  - CM007
  - CM008
  - CM009
  - CM010
  - CM011
  tableRefs:
  - TM002
  figureRefs:
  - FM001
  - FM002
- slug: buyer-segmentation
  title: Buyer Segmentation and Adoption Path
  body: 'Four primary buyer segments exist for Twelve''s products. Airlines (including full-service carriers, low-cost carriers,
    and cargo operators) are the dominant addressable segment, driven by CORSIA Phase 1 (2024-2026) compliance obligations
    and the EU''s ReFuelEU Aviation mandate requiring 2% SAF by 2025 escalating to 70% by 2050. Airlines typically procure
    SAF through long-term offtake agreements (5-14 years) negotiated by fleet sustainability officers with approval from CFOs
    and boards. Adoption trigger is regulatory compliance risk or voluntary net-zero commitments.


    Corporate sustainability buyers (e.g., Microsoft, Shopify, BCG) represent a smaller but high-margin segment purchasing
    SAF credits via book-and-claim or direct purchase to offset Scope 3 business travel emissions. These buyers are price-inelastic
    for small volumes and are driven by voluntary carbon commitments and ESG investor pressure. Defense and government buyers
    (U.S. Air Force, DoD) have strategic energy security motivations, high price tolerance, and procurement via multi-year
    government contracts. Chemical companies (Mercedes-Benz, Procter and Gamble) purchasing e-naphtha for sustainable packaging
    and automotive interiors represent an emerging segment with procurement led by R&D and supply chain teams. Adoption barriers
    vary by segment: airlines face volume scarcity and cost premium; corporate buyers face small available volumes and verification
    complexity; government buyers face procurement cycle length; chemical companies face production scale limitations.'
  claimRefs:
  - CM012
  - CM013
  - CM014
  - CM015
  - CM016
