- slug: growth-drivers
  title: Growth Drivers and Adoption Constraints
  body: 'The SAF market is driven by a convergent set of regulatory, corporate, and economic forces. On the regulatory side,
    the EU''s ReFuelEU Aviation mandate (Regulation 2023/2405) requires 2% SAF blending by 2025, scaling to 6% by 2030 and
    70% by 2050, with a sub-mandate specifically targeting 1.2% PtL by 2030 and 35% by 2050. The U.S. 45Z Clean Fuel Production
    Credit provides up to $1.75/gallon for SAF meeting lifecycle carbon intensity thresholds. CORSIA Phase 1 requires approximately
    10 billion liters of SAF annually by 2030 across participating airlines. The UK''s Sustainable Aviation Fuel Mandate requires
    10% SAF by 2030.


    On the demand side, over 80% of global airline capacity is committed by carriers that have pledged net-zero by 2050 (IATA
    Net Zero Carbon commitment). Corporate sustainability mandates from Scope 3 reporting standards (GHG Protocol, SBTi) and
    investor ESG frameworks (EU Taxonomy, TCFD) are accelerating procurement of SAF credits. Key adoption constraints include:
    the very high production cost of PtL SAF versus incumbent fuels; limited availability of low-cost renewable electricity
    at gigawatt scale; and capital intensity of new production facilities. CO2 feedstock sourcing at industrial scale and
    long construction timelines for electrochemical facilities represent additional constraints specific to Twelve''s technology
    pathway. Electricity costs represent 50-70% of PtL SAF production costs, making renewable electricity pricing the single
    most important variable in e-fuel SAF economics.'
  claimRefs:
  - CM017
  - CM018
  - CM019
  - CM020
  - CM021
  - CM025
  - CM026
  tableRefs:
  - TM004
- slug: sizing-gaps
  title: Sizing Diligence Gaps and Contradictions
  body: 'Multiple material diligence gaps limit the precision of market sizing and TAM/SAM/SOM estimates for Twelve''s specific
    addressable segment. First, no public analyst covers the PtL e-fuel SAF sub-market in isolation with consistent methodology;
    all major market reports aggregate PtL into the broader SAF total without PtL-specific revenue forecasts. Second, the
    2030 and 2035 market estimates reviewed for this chapter range from $5 billion to $25 billion for the broader SAF market,
    reflecting genuine uncertainty in regulatory enforcement rates, cost reduction trajectories, and supply chain development.


    Third, demand estimates from IATA and ICAO assume full regulatory compliance that has historically not materialized: the
    2025 SAF targets were not met in 2024, with actual production representing less than 0.2% of global aviation fuel consumption.
    Fourth, Twelve''s SOM for PtL SAF is further constrained by its single-facility AirPlant One (50,000 gallons/year initial
    capacity), making it a negligible current market participant against even the most conservative SAM estimates. These gaps
    suggest that TAM/SAM estimates are useful for directional analysis but should not be taken as precise inputs to Twelve''s
    revenue forecasting. SOM is more appropriately modeled from the bottom up using Twelve''s current and planned capacity
    and contracted offtake volumes than from top-down market share assumptions.'
  claimRefs:
  - CM022
  - CM023
  - CM024
