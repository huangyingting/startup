    statement: Twelve's E-Jet is certified under ASTM D7566 Annex A1 (power-to-liquids pathway), allowing up to 50% blending
      with conventional jet fuel.
    type: company-claimed
    topic: market-boundary
    sourceRefs:
    - SM001
    - SM016
    confidence: high
    freshness: current
    answersQuestionRefs:
