  claims:
  - id: CM001
    statement: Sustainable aviation fuel (SAF) is a category of jet fuel produced from non-petroleum sources that meets ASTM
      D7566 certification standards and can be blended with conventional jet fuel.
    type: observed
    topic: market-boundary
    sourceRefs:
