companyProfile:
  summary: Twelve (formerly known as Opus 12) is a Berkeley, CA-based climate technology company that has developed the OPUS electrochemical reactor to convert CO2 directly into carbon monoxide (CO), which
    is then synthesized into E-Jet sustainable aviation fuel and E-chemicals via Fischer-Tropsch synthesis. Founded in 2015 by three Stanford-trained electrochemists—Nicholas Flanders (CEO), Etosha Cave
    (Chief Science Officer), and Kendra Kuhl (CTO)—Twelve has raised approximately $934M in total capital and is commissioning its first commercial production facility, AirPlant One, in Moses Lake, Washington
    as of April 2026. The company holds long-term offtake agreements with IAG (14-year) and a memorandum of understanding with United Airlines, and counts Microsoft, BCG, and the US Air Force as customers
    for its SAF certificates.
  foundedDate: '2015-01-01'
  founders:
  - name: Nicholas Flanders
    role: CEO
    background: Stanford MBA; serial cleantech entrepreneur; co-inventor of OPUS CO2 electrolysis technology
  - name: Etosha Cave
    role: Chief Science Officer
    background: PhD in mechanical engineering from Stanford; pioneered CO2 electrolysis research at Stanford Electrochemical Engineering Lab
  - name: Kendra Kuhl
    role: CTO
    background: PhD in chemical engineering from Stanford; led fundamental CO2 electroreduction research that became the basis for OPUS reactor
  foundingLocation: Stanford University, Palo Alto, CA
  headquarters: Berkeley, CA
  productSummary: E-Jet (ASTM-certified drop-in SAF blended up to 50% with fossil jet fuel) and E-chemicals (polycarbonate, cleaning agents, paints) derived from CO2 via the OPUS electrochemical reactor.
  customerFocus: Airlines (IAG, United), corporate sustainability buyers (Microsoft, BCG), and government (US Air Force).
  businessModel: SAF sales and SAF certificate sales; government R&D contracts; planned long-term offtake agreements with volume commitments and floor pricing.
  stage: Series C (closed Sep 2024); pre-commercial (AirPlant One commissioning April 2026)
  fundingStatus: ~$934M raised total; $645M Series C led by TPG Rise Climate (Sep 2024); anticipated Series D following AirPlant One commissioning.
