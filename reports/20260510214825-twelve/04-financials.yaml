- slug: financial-gaps
  title: Public Financial Gaps and Diligence Blockers
  body: 'As a private company in the industrial deep-tech category, Twelve has significant public financial information gaps. The most material gaps are: revenue not disclosed (no ARR, GMV, or annual revenue
    figure published); production cost per gallon at AirPlant One not disclosed, preventing gross margin verification; actual cash on hand and monthly burn rate not disclosed; project finance terms for
    future AirPlant facilities not disclosed; and the contract terms, pricing, and volume commitments in Twelve''s airline and government offtake agreements are confidential. These gaps collectively prevent
    any verified financial underwriting of Twelve as of the public diligence phase. The financial verdict based on available evidence is: Twelve operates at demonstration scale with pre-commercial economics;
    its revenue quality is unverifiable; its margin path depends on a 3-5 order-of-magnitude scale-up that has not been achieved; its capital adequacy depends on its ability to raise project finance and
    subsequent equity rounds; and its key diligence blockers are production cost verification, offtake contract economics, and project finance feasibility for commercial-scale AirPlants.'
  claimRefs:
  - CI016
  - CI017
  - CI018
  - CI019
  tableRefs:
  - TI005
- slug: financial-verdict
  title: Financial Verdict and Diligence Summary
  body: 'Twelve''s financial profile is consistent with an early-commercial deep-tech industrial company: well-capitalized relative to its current stage ($645M raised), pre-revenue at meaningful scale,
    with a credible long-term market opportunity but an unproven commercial production cost curve. Revenue quality at AirPlant One is low because the facility is a demonstration asset; revenue quality of
    future commercial AirPlants depends on offtake agreement pricing, utilization rates, and production cost trajectories that are not yet knowable from public evidence.


    The primary financial risks are: (1) capital intensity risk: each commercial AirPlant requires $500M-$2B in capital before positive EBITDA; (2) production cost risk: PtL economics are highly sensitive
    to electricity cost, CO2 feedstock cost, and electrolyzer efficiency, none of which are verified at commercial scale; (3) policy dependency risk: 45Z credits and ReFuelEU mandates are essential to near-term
    economics and are subject to political change; (4) project finance risk: debt financing requires bankable offtake contracts with investment-grade counterparties; and (5) dilution risk: multiple large
    equity raises will be required before cash flow positivity, with significant dilution to early investors. These are normal risks for an industrial deep-tech company at this stage, but they should inform
    any financial valuation with wide uncertainty bounds. This chapter documents all known public financial data; the diligence blockers listed in the public financial gaps table must be resolved through
    confidential due diligence data requests before any investment underwriting.'
  claimRefs:
  - CI020
  - CI021
  - CI022
  - CI023
  - CI024
