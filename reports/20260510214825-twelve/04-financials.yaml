  - TI002
  figureRefs:
  - FI001
- slug: unit-economics-cost-structure
  title: Unit Economics and Cost Structure
  body: 'Twelve has not publicly disclosed its production cost per gallon at AirPlant One. Third-party estimates for PtL SAF production costs in 2025-2026 range from $5-15 per gallon without subsidies,
    with electricity cost representing 50-70% of total production cost. At Moses Lake, Twelve accesses hydropower-sourced renewable electricity at rates estimated at $0.02-0.05 per kilowatt-hour, which
    represents a favorable feedstock cost compared to solar or wind-dependent sites in other geographies. Based on industry benchmarks for PtL SAF electrochemical processes, the OPUS reactor electricity
    consumption is estimated at 12-25 kWh per kilogram of fuel produced, implying electricity cost of $0.24-1.25 per kilogram, or $0.90-4.70 per gallon (at $0.035/kWh midpoint), before accounting for CO2
    capture, Fischer-Tropsch conversion, purification, and overhead costs.


    Gross margin for Twelve at AirPlant One production economics is likely negative or near-zero in the current phase, consistent with the demonstration-to-commercial transition typical of deep-tech industrial
    companies. Capital expenditure per gallon of annual capacity is very high at pilot scale: for a $100 million+ facility producing 50,000 gallons per year, the capex intensity is $2,000+ per annual gallon,
    well above commercial target ranges of $5-30 per annual gallon. At commercial scale (100+ million gallons per year), PtL producers project capex intensity falling to $10-40 per annual gallon, but this
    requires 2,000-4,000x scale-up from AirPlant One. Working capital is dominated by facility construction financing rather than receivables or inventory in the traditional sense. The company''s R&D expenses
    represent a significant portion of cash burn alongside facilities capex.'
  claimRefs:
  - CI006
  - CI007
  - CI008
  - CI009
  - CI010
  tableRefs:
  - TI003
  figureRefs:
  - FI002
- slug: capital-adequacy-traction
  title: Capital Adequacy, Traction, and Financing
  body: 'Twelve has raised approximately $645 million in cumulative equity financing through its Series D round. The funding chronology is documented in the Company Overview chapter. This chapter focuses
    on capital adequacy and financing adequacy looking forward.


    At Twelve''s current burn rate, which is estimated at $8-20 million per month based on headcount (approximately 200-300 employees) and facility development activities, the $645 million in cumulative
    capital provides an estimated runway of 2-4 years from the most recent closing, depending on the timing and scale of AirPlant expansion commitments and project financing arrangements. Twelve has indicated
    plans to use project finance (debt financing against offtake agreement cash flows) for larger commercial facilities, reducing the equity capital requirement per gigaliter of capacity. This is a standard
    approach for energy project developers; the key risk is that offtake agreement tenors and pricing must support debt service coverage ratios acceptable to project finance lenders.


    Public traction metrics are limited: AirPlant One production capacity (50,000 gal/yr) and multiple confirmed offtake customers are the primary disclosed indicators. Revenue is not disclosed. Burn and
    runway are not disclosed. The next funding trigger is likely tied to AirPlant expansion financial close or a project financing milestone. Capital adequacy risk is significant given the capital intensity
    of e-fuel production facilities: a commercial-scale AirPlant at 100 million gallons per year would require an estimated $500 million to $2 billion in capital investment before reaching positive EBITDA.'
  claimRefs:
  - CI011
  - CI012
  - CI013
  - CI014
  - CI015
