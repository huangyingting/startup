sections:
- slug: revenue-model
  title: Revenue Model and Streams
  body: 'Twelve generates revenue from two primary product streams. The first and largest is E-Jet, its ASTM D7566 Annex A1-certified sustainable aviation fuel sold under long-term offtake agreements to
    airline and government customers. Confirmed offtake customers include Alaska Airlines and the U.S. Air Force, with additional corporate sustainability buyers such as Microsoft purchasing SAF via book-and-claim
    arrangements. The second revenue stream is e-naphtha, a sustainable hydrocarbon feedstock produced as a co-product of the OPUS reactor process, sold to chemical companies including Mercedes-Benz and
    Procter and Gamble for use in sustainable packaging and automotive applications.


    Twelve does not disclose revenue. AirPlant One, its first commercial facility in Moses Lake, Washington, has an initial production capacity of approximately 50,000 gallons per year of E-Jet. At estimated
    pricing of $5-12 per gallon (with policy credits), AirPlant One would generate approximately $250,000 to $600,000 per year at full utilization from SAF alone, representing pre-commercial demonstration-scale
    revenues relative to Twelve''s capital raised of approximately $645 million. AirPlant One is more accurately characterized as a commercial demonstration and technology validation facility than as a
    primary revenue generator. Twelve''s revenue model at scale depends on multi-gigaliter AirPlant facilities generating hundreds of millions of dollars per year in SAF and e-naphtha revenue under long-term
    contracts. The company has disclosed plans for larger-scale facilities but has not announced a commissioned commercial-scale facility beyond AirPlant One as of May 2026.


    Revenue recognition is straightforward: fuel and chemical products are recognized on delivery under offtake agreements. There are no subscription, recurring SaaS, or marketplace revenue components.
    Working capital dynamics are influenced by the capital intensity of facility construction and the timing of offtake agreement payments. Policy credit income (45Z Clean Fuel Production Credit) is recognized
    separately as a tax benefit and may represent a meaningful share of net revenue at current pricing, partially offsetting the cost premium versus fossil jet fuel.'
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
  tableRefs:
