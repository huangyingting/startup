callouts:
- calloutType: recommendation
  title: 'Recommendation: Conditional INVEST — Gate on AirPlant One Production Data'
  body: Twelve is a high-conviction, high-risk investment for climate-focused investors with a 7-10 year horizon. The company has assembled the right technology, the right team, the right customers, and
    significant capital. The one thing it has not yet demonstrated is commercial-scale production. Take an initial position at Series D but condition any significant increase in allocation on 12+ months
    of AirPlant One production data showing cost-per-gallon trajectory on or near plan.
  claimRefs:
  - CV001
  - CV003
- calloutType: risk
  title: 'Adverse View: E-Fuel Economics May Never Achieve Parity Without Continuous Policy Support'
  body: BloombergNEF and ICCT analyses note that PtL SAF will remain 4-7x more expensive than HEFA-SAF through 2030 even with current cost trajectory assumptions. In a world where HEFA supply scales significantly
    and fossil jet stays below $1,000/tonne, airlines may resist paying E-fuel premiums even under mandate. Twelve's economics are dependent on either permanent government policy support or a radical cost
    breakthrough—neither of which is certain.
  claimRefs:
  - CV004
  - CV009
