- id: comparable-valuation
  title: Comparable Company Valuation
  body: 'Valuing Twelve requires comparable analysis across two reference groups: (1) advanced cleantech scale-up companies that have successfully commercialized first-of-kind production facilities, and
    (2) SAF and sustainable fuels companies at comparable stages of development. Within the SAF universe, Neste is the closest public benchmark—trading at approximately 1.0-1.5x forward revenue multiples
    and 8-12x EBITDA as the world''s largest SAF producer. However, Neste operates at full commercial scale while Twelve is pre-commercial, requiring a discount for execution risk.


    Among private pre-commercial SAF companies, LanzaJet completed a $200M Series C at an implied valuation of ~$600M-800M in 2022-2023, but uses a lower-technology-intensity alcohol-to-jet pathway. HIF
    Global has attracted ~$3-5B in total commitments from strategic investors but remains pre-revenue. Twelve''s $645M Series C with $200M equity at an implied valuation of ~$2.5-3.0B (estimated from DCVC
    and TPG participation terms) represents a significant premium over LanzaJet, reflecting the IP value and binding offtake contracts.


    A revenue-based comparable assumes Twelve achieves ~$50-100M revenue from AirPlant One (at $15-20/gallon blended average selling price) by 2027. At a 15-20x forward revenue multiple (growth-stage premium),
    this implies a valuation of $750M-2.0B—lower than the current implied valuation, suggesting the market is pricing in successful Series D and AirPlant Two execution. The patent portfolio (US10898880B2
    and related IP) adds option value that is difficult to quantify but is captured in the strategic investor premium.'
  claimRefs:
  - CV008
  - CV009
  - CV010
  - CV011
  tableRefs:
  - TV004
  figureRefs:
  - FV004
- id: kill-triggers
  title: Thesis-Break Conditions and Kill Triggers
  body: 'The investment thesis for Twelve can be broken by five specific event triggers. These are not merely risks but objective, observable conditions that would require a fundamental reassessment of
    the investment case. Investors should establish monitoring protocols for each trigger.


    First and most critical: AirPlant One production failure. If AirPlant One fails to achieve at least 40% of its stated 50,000 gallon/year production target within 12 months of commissioning, the technology''s
    commercial viability is in question and the Series D will face severe headwinds. Second: Series D failure or severe dilution. If Twelve is unable to close a Series D at a valuation above the Series
    C implied valuation within 18 months of AirPlant One commissioning, it indicates market skepticism about the company''s execution trajectory. Third: 45Z credit expiry without extension. The credit''s
    December 2027 expiry is the most concrete near-term policy risk. Fourth: co-founder departure. The departure of any of the three technical co-founders before AirPlant Two investment decision would remove
    the human capital at the core of the technology moat. Fifth: major safety incident. Any significant safety incident at AirPlant One would trigger regulatory review and damage airline customer relationships.'
  claimRefs:
  - CV012
  - CV013
  - CV014
  tableRefs:
  - TV005
- id: diligence-asks
  title: Final Diligence Asks
  body: 'Before making or increasing an investment commitment in Twelve, five categories of due diligence data should be requested from the company. First, AirPlant One performance data: any available production
    metrics including daily gallons produced, Faradaic efficiency measurements, and cost-per-gallon estimates from the commissioning period. Even preliminary data would significantly reduce technology execution
    risk. Second, financial model: Twelve''s internal financial model for AirPlant One and AirPlant Two, including capital requirements, operating cost assumptions, and revenue projections by customer.
    Third, offtake contract terms: the penalty and force majeure provisions in the IAG 14-year and United MoU agreements, to understand Twelve''s legal exposure if production is delayed. Fourth, Series
    D terms: the planned valuation, investor composition, and use of proceeds for the upcoming Series D round. Fifth, talent retention: current equity compensation packages and vesting schedules for co-founders
    and key technical personnel.


    Beyond these primary diligence items, investors should commission an independent technical review of AirPlant One''s design specifications and expected performance by a credible chemical engineering
    firm. The technology''s commercial-scale performance is the crux of the investment thesis and cannot be assessed from public information alone.'
