company:
  name: Twelve
chapter:
  number: 6
  title: Customers
  summary: Twelve has secured landmark multi-year offtake agreements with IAG (785,000 MT over 14 years) and a 300-million-gallon MoU plus strategic investment from United Airlines. Corporate sustainability
    buyers including Microsoft, Shopify, and BCG, and government customers including the US Air Force, round out a diverse customer base. However, the customer concentration risk is high (IAG and United
    represent the vast majority of contracted volume), pricing terms remain undisclosed, and all agreements are conditional on Twelve successfully scaling production beyond AirPlant One's 50,000 gallon
    per year initial capacity.
sections:
- id: customer-overview
  title: Customer Base Overview and Segmentation
  body: 'Twelve has assembled a customer base spanning three distinct segments: commercial aviation (airlines), corporate sustainability buyers, and government/defense. The commercial aviation segment is
    the largest by committed volume and consists of IAG (International Airlines Group, parent of British Airways and Iberia), United Airlines, and Alaska Airlines. IAG represents Twelve''s flagship commercial
    contract, a 14-year agreement for 785,000 metric tons of E-Jet SAF, making it one of the largest SAF purchase agreements in the industry. United Airlines signed a Memorandum of Understanding for 300
    million gallons of E-Jet and made a strategic equity investment in Twelve in May 2025. Alaska Airlines, whose venture arm Alaska Star Ventures participated in Twelve''s Series C, also has an offtake
    relationship with Twelve.


    The corporate sustainability segment is smaller by volume but diversified across industries: Microsoft uses Twelve''s SAF for business travel on Alaska Airlines flights; Shopify purchases SAF certificates;
    BCG signed a 3-year SAF certificate agreement (2026-2029) for over 4,000 MT of CO2 reduction. These corporate buyers typically do not contract for large volumes but provide revenue diversification and
    marketing validation.


    The government/defense segment is anchored by the US Air Force through AFRL, AFWERX, and SBIR contracts that provided validation of E-Jet as a drop-in aviation fuel and contributed to early revenue
    and credibility. Mercedes-Benz and Procter & Gamble are customers for Twelve''s chemical products (E-Naphtha precursors) in pilot programs, representing a third commercial vertical.'
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  tableRefs:
  - TU001
  figureRefs:
  - FU001
- id: offtake-contracts
  title: Key Offtake Contracts and Partnership Terms
  body: 'Twelve''s most significant customer commitment is the 14-year, multi-million-gallon offtake agreement with IAG (International Airlines Group), announced in 2024. The agreement is for 785,000 metric
    tons of E-Jet SAF, which equates to approximately 260 million gallons of fuel. This represents one of the largest SAF offtake agreements ever signed by volume and duration. The agreement commences deliveries
    in 2025 and runs through approximately 2038-2039. Critically, the pricing terms have not been publicly disclosed, making it impossible to assess the financial value of the contract without direct access
    to its terms.


    United Airlines announced a strategic equity investment in Twelve in May 2025 alongside a Memorandum of Understanding for 300 million gallons of E-Jet SAF. The equity investment component makes United
    a stakeholder in Twelve''s success, aligning incentives. MoUs are non-binding agreements, and translating this MoU into a binding offtake contract with delivery timelines and pricing will be a critical
    milestone to watch.


    Alaska Airlines, through its venture arm Alaska Star Ventures (which participated in Twelve''s Series C), also has an offtake relationship with Twelve. Microsoft and Alaska Airlines have a joint arrangement
    where Microsoft purchases SAF certificates for its employees'' business travel on Alaska flights using Twelve''s E-Jet. BCG signed a 3-year SAF certificate agreement covering approximately 4,000+ metric
    tons of CO2 reduction between 2026 and 2029. The US Air Force has provided both contract revenue (through SBIR and AFWERX programs) and strategic validation.'
  claimRefs:
  - CU006
  - CU007
  - CU008
  - CU009
  - CU010
  - CU011
  tableRefs:
  - TU002
  figureRefs:
  - FU003
- id: adoption-trajectory
  title: Adoption Trajectory and Commercial Readiness
  body: 'Twelve''s commercial adoption trajectory reflects the reality that the company is in the early commercialization phase: all major contracts were signed ahead of meaningful commercial production,
    meaning customers have committed to future volumes contingent on Twelve''s ability to scale. AirPlant One, commissioning in April 2026, has an initial capacity of approximately 50,000 gallons per year.
    This is far below what is needed to fulfill even a small fraction of the IAG or United commitments. The delivery ramp is therefore long-dated and depends entirely on Twelve''s ability to raise additional
    capital and build successive AirPlant facilities.


    For corporate sustainability buyers (Microsoft, Shopify, BCG), the product is typically SAF certificates rather than physical fuel delivery, which lowers the execution risk. A SAF certificate represents
    the GHG reduction benefit of SAF produced and blended into the aviation fuel supply, without requiring the buyer to physically receive fuel. This mechanism is used widely in corporate sustainability
    reporting under CORSIA and EU taxonomy requirements.


    For aviation customers (IAG, United, Alaska), physical fuel delivery is ultimately required. These customers have expressed willingness to pay a premium for SAF to meet their own decarbonization commitments
    (under CORSIA, EU ReFuelEU mandates, and corporate net-zero pledges). The effective net cost premium they pay is somewhat offset by regulatory compliance value and reputational benefits. However, the
    pricing premium relative to conventional jet fuel remains a significant financial burden for airlines that operate on thin margins.'
  claimRefs:
  - CU012
  - CU013
  - CU014
  - CU015
  - CU016
  tableRefs:
  - TU004
- id: concentration-risk
  title: Customer Concentration and Retention Risk
  body: 'Customer concentration is one of the most significant risks in Twelve''s customer profile. IAG alone represents 785,000 metric tons of contracted volume, and United Airlines'' 300 million gallon
    MoU, if converted to a binding agreement, would further concentrate revenue. If either of these relationships were to deteriorate—due to airline financial stress, contract renegotiation, or inability
    of Twelve to deliver at scale—the impact on Twelve''s revenue prospects would be severe.


    Retention dynamics for SAF offtake agreements are structurally different from software SaaS contracts. SAF agreements typically include force majeure clauses that allow termination if the supplier cannot
    deliver at the agreed price or volume. If Twelve''s production costs remain above the agreed contract price (or above what airlines are willing to pay in renegotiation), the contract may be terminated
    or restructured. The long tenure of the IAG agreement (14 years) provides revenue visibility but also locks in pricing terms that may become disadvantageous if SAF costs fall faster than expected (less
    likely) or if Twelve cannot reach the contracted volumes (more likely near-term).


    The diversity of Twelve''s customer base by end-market (airlines + corporate + government) provides some protection, but by contracted volume the concentration in commercial aviation is very high. An
    adverse event at either IAG (e.g., financial distress, merger) or United Airlines could materially affect Twelve''s revenue pipeline.'
  claimRefs:
  - CU017
  - CU018
  - CU019
  - CU020
  tableRefs:
  - TU005
  figureRefs:
  - FU002
- id: expansion-strategy
  title: Expansion Strategy and New Customer Pipeline
  body: 'Twelve''s expansion strategy on the customer side is to grow both airline and corporate sustainability commitments in parallel with its production capacity ramp. The announced United Airlines investment
    in May 2025 expanded Twelve''s airline customer base and provided a strategic investor relationship. Additional airline offtake agreements have been discussed with other carriers but not publicly announced
    as of May 2026.


    In the chemical products segment, the Mercedes-Benz and P&G pilot programs could, if successful, evolve into larger commercial agreements. The CO2-derived chemicals market (polycarbonates, surfactants,
    polymers) operates at higher margins than aviation fuel and could provide near-term revenue while the aviation business scales. This dual-market strategy (aviation fuel + chemicals) is a key component
    of Twelve''s path to revenue diversification and improved unit economics.


    World Fuel Services, as a distribution partner announced in 2025, plays a critical role in Twelve''s go-to-market strategy: World Fuel''s global network of fuel storage, blending, and distribution infrastructure
    can accelerate E-Jet delivery to airline customers that Twelve could not serve independently. However, the nature of revenue sharing with World Fuel and the impact on Twelve''s net revenue per gallon
    have not been disclosed. The Shopify and BCG certificate agreements demonstrate demand from corporate sustainability buyers willing to pay a premium, but these represent relatively small volumes.'
  claimRefs:
  - CU021
  - CU022
  - CU023
  - CU024
