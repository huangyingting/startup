callouts:
- calloutType: strength
  title: IAG's 785,000 MT / 14-Year Deal Is a Landmark Validation
  body: The IAG offtake agreement is one of the largest SAF purchase commitments in history by both volume and duration, providing strong commercial validation that a major global airline group is betting
    on Twelve's E-Jet at scale. Combined with United's equity investment and MoU, Twelve has committed airline customers representing billions of dollars in potential lifetime value.
  claimRefs:
  - CU006
  - CU007
- calloutType: risk
  title: 'All Contracts Are Pre-Production: Zero Revenue at Commercial Scale'
  body: Despite the impressive pipeline, Twelve remains essentially pre-revenue at commercial scale. AirPlant One's 50,000 gallon/year initial capacity cannot even begin to fulfill the IAG or United contracted
    volumes. All offtake agreements are contingent on Twelve's ability to raise additional capital and build successive AirPlant facilities. The risk is that the contracted future volumes create a perception
    of commercial success that obscures the early-stage reality of the business.
  claimRefs:
  - CU012
  - CU016
  - CU019
