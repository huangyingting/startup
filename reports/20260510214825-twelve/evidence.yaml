  - type: enumeration-incomplete
    severity: minor
    topic: milestone table
    missingEvidence: >-
      Pre-2021 milestone dates (seed rounds, early grants, lab demonstrations) are not publicly documented with
      precision; private investor communications would be needed.
    whyItMatters: >-
      The milestone chronology is partial for 2015-2020, which limits the completeness of the founding-to-product
      narrative.
    diligencePath: Request company-provided founding timeline and early investor communications in due diligence.
    relatedTableRefs:
      - TO004
  - type: enumeration-incomplete
    severity: material
    topic: PtL SAF market sizing
    missingEvidence: >-
      No public analyst report isolates the PtL e-fuel SAF sub-market with a dedicated revenue forecast separate from
      the broader SAF market.
    whyItMatters: >-
      Without a PtL-specific market estimate, Twelve's SOM cannot be derived from top-down market share analysis; only
      bottom-up capacity planning is available.
    diligencePath: >-
      Commission a custom market study from Wood Mackenzie or BloombergNEF specifically sizing the PtL SAF sub-market,
      or request internal market models in due diligence.
    relatedQuestionRefs:
      - QM006
      - QM025
  - type: enumeration-incomplete
    severity: material
    topic: Twelve OPUS reactor IP depth
    missingEvidence: >-
      Twelve has not published a comprehensive patent list or claim map for OPUS reactor IP. Independent patent
      landscape analysis is needed to assess depth and defensibility.
    whyItMatters: >-
      Without patent landscape analysis, the depth and defensibility of the OPUS reactor IP moat relative to academic
      SOEC research and potential workarounds by competitors cannot be assessed.
    diligencePath: >-
      Commission patent landscape analysis from a specialized IP firm (e.g., Questel, CPA Global) and review Twelve
      patent portfolio in due diligence.
    relatedQuestionRefs:
