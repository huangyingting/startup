sections:
- slug: competitor-landscape
  title: Competitive Landscape Overview
  body: 'Twelve competes in two overlapping competitive spaces: sustainable aviation fuel (SAF) production and sustainable industrial chemicals (e-naphtha). Within SAF, competition includes producers across
    all pathways (HEFA, ATJ, FT, PtL), with HEFA-based producers dominating current commercial volumes. Direct competition in PtL/e-fuel SAF is limited to a small number of well-funded startups and established
    chemical companies exploring electrolytic CO2 conversion.


    The principal direct PtL SAF competitors are LanzaJet (alcohol-to-jet pathway using ethanol from LanzaTech fermentation), Air Company (CO2-to-ethanol-to-jet via Fischer-Tropsch), Infinium (e-methanol
    from CO2, water, and green H2, converted to jet fuel), and Velocys (Fischer-Tropsch from biomass and waste CO2). The principal indirect competitors via HEFA are Neste (world''s largest SAF producer),
    World Energy, and SkyNRG. In sustainable chemicals, Air Company and specialized electrochemical companies (like Electrochaea and Opus12 spinoffs) compete for e-naphtha supply. No single competitor matches
    Twelve''s specific electrolyzer-direct approach using the OPUS reactor that converts CO2 to CO via solid oxide electrolysis, then to hydrocarbons via Fischer-Tropsch. Twelve''s competitive differentiation
    centers on feedstock independence (no biomass land use, no agricultural inputs), direct CO2-to-jet conversion efficiency, and modular plant design enabling deployment at industrial CO2 emission sites.'
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP004
  tableRefs:
  - TP001
  figureRefs:
  - FP001
- slug: feature-capability
  title: Feature and Capability Comparison
  body: 'Across the competitive set, the most critical capability differentiators for SAF producers are: (1) ASTM D7566 certification pathway and blend ratio, (2) feedstock independence and scalability,
    (3) current production scale and facility pipeline, (4) technology readiness level (TRL), and (5) cost trajectory and input cost sensitivity.


    Neste leads on production scale (>3 billion liters/year SAF capacity globally) and commercial maturity, but is fully dependent on biological feedstocks (UCO, animal fats) that face a structural supply
    ceiling. LanzaJet operates the Freedom Pines Fuels facility in Georgia at 10 million gallons per year using sustainable ethanol, benefiting from LanzaTech carbon capture fermentation but retaining agricultural
    feedstock dependency. Air Company is closest in approach to Twelve, converting CO2 directly to ethanol then to jet fuel, with commercial volumes still in the sub-1-million-gallon range as of 2025 and
    ASTM E7566 pathway differences from Twelve''s A1 pathway. Infinium operates an e-methanol facility in Texas and has offtake partnerships with Amazon, but focuses on road transport fuels rather than
    pure aviation. Velocys targets waste feedstocks including municipal solid waste for Fischer-Tropsch, with a UK facility under development that has faced financing challenges. On TRL, Twelve and Air
    Company are both at TRL 7-8, while LanzaJet is at TRL 9 (commercial). Neste is fully commercial. Infinium is at TRL 7-8. Velocys UK is at TRL 6-7 with construction delays.'
  claimRefs:
  - CP005
  - CP006
  - CP007
  - CP008
  - CP009
  tableRefs:
  - TP002
  figureRefs:
  - FP002
- slug: pricing-packaging
  title: Pricing and Packaging Differentiation
  body: 'SAF pricing across all pathways reflects a premium over conventional jet fuel, but the magnitude varies significantly by pathway and whether policy credits apply. Neste prices HEFA SAF in the range
    of $2.50-4.00 per gallon without subsidies and approximately $1.00-2.50 per gallon after applicable US tax credits (45Z), representing the most competitive pricing in the market. LanzaJet prices its
    ATJ SAF at approximately $4-6 per gallon in early commercial volumes. PtL producers including Twelve, Air Company, and Infinium are estimated at $5-15 per gallon in 2025-2026 without policy credits,
    falling to $3-8 per gallon with 45Z or equivalent credits. Twelve differentiates on several packaging dimensions: long-term offtake agreements with fixed price escalators, co-location pricing at industrial
    CO2 sites (potentially lower capex), and bundled product offering including e-naphtha for chemical buyers as a second revenue stream. Air Company and Infinium do not offer e-naphtha as a co-product;
    LanzaJet and Neste do not either. This secondary market access creates a distinct monetization path for Twelve that competitors lack. Twelve has not publicly disclosed pricing for AirPlant One offtake;
    publicly confirmed customers include Alaska Airlines and Microsoft, suggesting negotiated volumes at competitive premium pricing.'
  claimRefs:
  - CP010
  - CP011
  - CP012
  - CP013
  tableRefs:
  - TP003
- slug: moat-risks
  title: Moat Durability and Competitive Risks
  body: 'Twelve''s primary moats are: (1) OPUS reactor IP and solid oxide electrolysis expertise, which is proprietary and patent-protected; (2) feedstock independence from biological inputs, avoiding the
    land use competition and supply constraints facing HEFA; (3) first-mover advantage in ASTM A1-certified PtL SAF at commercial scale; and (4) established customer relationships with Alaska Airlines,
    Microsoft, and DoD programs. The OPUS reactor is the central technical moat: it converts CO2 directly to CO at high efficiency using solid oxide electrolysis cells (SOECs), which Twelve has developed
    internally and for which it holds key patents. This differentiation is real but fragile against well-resourced incumbents. The most dangerous competitive vectors are: (a) Neste or Shell expanding into
    electrolytic SAF using large balance sheets and existing fuel distribution infrastructure; (b) accelerated cost reduction by Air Company or Infinium ahead of Twelve''s commercial scale-up; (c) hydrogen-to-liquid
    (HtL) technology advancing faster than PtL if green H2 costs fall to $1/kg by 2030 as projected by some analysts; and (d) regulatory change that weakens PtL sub-mandate protection (e.g., ReFuelEU amendment
    allowing HEFA credit toward PtL mandates). Moat durability is assessed as medium: proprietary but not insurmountable, with significant risk from better-capitalized competitors over a 5-10 year horizon.'
  claimRefs:
  - CP014
  - CP015
  - CP016
  - CP017
  - CP018
  tableRefs:
  - TP004
  figureRefs:
  - FP003
- slug: competitive-gaps
  title: Competitive Diligence Gaps
  body: 'Key diligence gaps in the competitive analysis are: (1) Twelve has not disclosed its current production cost per gallon at AirPlant One, making direct cost benchmarking against competitors impossible.
    (2) Air Company''s production scale and claimed CO2-to-fuel efficiency have not been verified by independent third parties. (3) Infinium''s Amazon offtake volumes and commercial pricing are undisclosed.
    (4) Velocys UK project financing status and revised commissioning date are unconfirmed as of Q2 2026. (5) The depth of Twelve''s SOEC IP protection relative to academic SOEC research (e.g., at EPFL,
    DTU, MIT) is not publicly evaluable without patent landscape analysis. These gaps are material for assessing whether Twelve''s cost and technology advantages will persist as the competitive set matures
    through 2028-2030.'
  claimRefs:
  - CP019
  - CP020
