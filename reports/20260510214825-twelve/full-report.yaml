      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >-
              Four primary buyer segments exist for Twelve's products. Airlines (including full-service carriers,
              low-cost carriers, and cargo operators) are the dominant addressable segment, driven by CORSIA Phase 1
              (2024-2026) compliance obligations and the EU's ReFuelEU Aviation mandate requiring 2% SAF by 2025
              escalating to 70% by 2050. Airlines typically procure SAF through long-term offtake agreements (5-14
              years) negotiated by fleet sustainability officers with approval from CFOs and boards. Adoption trigger is
              regulatory compliance risk or voluntary net-zero commitments.


              Corporate sustainability buyers (e.g., Microsoft, Shopify, BCG) represent a smaller but high-margin
              segment purchasing SAF credits via book-and-claim or direct purchase to offset Scope 3 business travel
              emissions. These buyers are price-inelastic for small volumes and are driven by voluntary carbon
              commitments and ESG investor pressure. Defense and government buyers (U.S. Air Force, DoD) have strategic
              energy security motivations, high price tolerance, and procurement via multi-year government contracts.
              Chemical companies (Mercedes-Benz, Procter and Gamble) purchasing e-naphtha for sustainable packaging and
              automotive interiors represent an emerging segment with procurement led by R&D and supply chain teams.
              Adoption barriers vary by segment: airlines face volume scarcity and cost premium; corporate buyers face
              small available volumes and verification complexity; government buyers face procurement cycle length;
              chemical companies face production scale limitations.
            claimRefs:
