      - number: '7.3'
        title: Financial and Capital Risk
        blocks:
          - type: paragraph
            body: >-
              Twelve is a capital-intensive, pre-revenue-at-commercial-scale business. Despite raising ~$934M in total
              capital, the company remains in the pre-commercial phase with AirPlant One just beginning commissioning in
              April 2026. The path to gigascale production will require many billions of additional capital. Each
              successive AirPlant facility will cost hundreds of millions to billions of dollars to build, and the
              company will need to demonstrate reliable performance at AirPlant One before the capital markets will fund
              AirPlant Two at the scale needed to fulfill the IAG and United contracts.


              The funding structure of the $645M September 2024 raise is important: of the total, $400M was project
              equity (dedicated to AirPlant One), $25M was a construction loan from Fundamental Renewables, and $20M was
              a green loan from Sumitomo Mitsui Banking Corporation. The $200M Series C equity represents the actual
              company equity raised. This means Twelve's corporate balance sheet may be less liquid than the headline
              $645M suggests, with the project equity being tied to AirPlant One specifically.


              Series D fundraising is anticipated as Twelve commissions AirPlant One. Investor appetite for cleantech
              companies has been volatile, and the 2023-2024 cleantech funding environment saw multiple high-profile
              failures and valuation resets. If Twelve's Series D does not close on favorable terms or closes at a lower
              valuation than expected, the company may be forced to dilute existing shareholders significantly or reduce
              its expansion timeline. The critical path variable is AirPlant One performance—strong production data will
              catalyze Series D at favorable terms, while production shortfalls could severely damage fundraising
              prospects.
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
          - type: table
