        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >-
              Twelve has not publicly disclosed its production cost per gallon at AirPlant One. Third-party estimates
              for PtL SAF production costs in 2025-2026 range from $5-15 per gallon without subsidies, with electricity
              cost representing 50-70% of total production cost. At Moses Lake, Twelve accesses hydropower-sourced
              renewable electricity at rates estimated at $0.02-0.05 per kilowatt-hour, which represents a favorable
              feedstock cost compared to solar or wind-dependent sites in other geographies. Based on industry
              benchmarks for PtL SAF electrochemical processes, the OPUS reactor electricity consumption is estimated at
              12-25 kWh per kilogram of fuel produced, implying electricity cost of $0.24-1.25 per kilogram, or
              $0.90-4.70 per gallon (at $0.035/kWh midpoint), before accounting for CO2 capture, Fischer-Tropsch
              conversion, purification, and overhead costs.


              Gross margin for Twelve at AirPlant One production economics is likely negative or near-zero in the
              current phase, consistent with the demonstration-to-commercial transition typical of deep-tech industrial
              companies. Capital expenditure per gallon of annual capacity is very high at pilot scale: for a $100
              million+ facility producing 50,000 gallons per year, the capex intensity is $2,000+ per annual gallon,
              well above commercial target ranges of $5-30 per annual gallon. At commercial scale (100+ million gallons
              per year), PtL producers project capex intensity falling to $10-40 per annual gallon, but this requires
              2,000-4,000x scale-up from AirPlant One. Working capital is dominated by facility construction financing
              rather than receivables or inventory in the traditional sense. The company's R&D expenses represent a
              significant portion of cash burn alongside facilities capex.
