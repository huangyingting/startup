      - number: '1.4'
        title: Traction and Key Metrics
        blocks:
          - type: paragraph
            body: >-
              As of mid-2026, Twelve's traction is characterized by large-scale offtake agreements, government
              contracts, and the imminent commissioning of its first commercial production facility. The company has
              secured commitments for over 1 billion gallons of SAF across long-term customer agreements, positioning it
              as a demand-validated player in the emerging e-fuels market.


              The most significant customer relationship is with British Airways (via parent company IAG), which signed
              a 785,000 metric ton (approximately 260 million gallon), 14-year offtake agreement for E-Jet SAF. United
              Airlines has committed to a 300 million gallon MoU and has made a direct equity investment in Twelve via
              United Airlines Ventures. Alaska Airlines is an additional airline customer, supported by equity
              investment from Alaska Star Ventures. Government traction includes contracts with the U.S. Air Force for
              SAF demonstration and supply, positioning Twelve within the military's sustainable fuel procurement
              pipeline.


              Corporate sustainability customers include Microsoft, Shopify, and BCG, which have purchased SAF via Scope
              3 emissions reduction commitments. The Mercedes-Benz partnership, announced in prior years, involved using
              Twelve's E-Naphtha as a feedstock for automotive components, demonstrating the versatility of the carbon
              transformation platform beyond aviation fuel.


              AirPlant One, located in Moses Lake, Washington, began commissioning in April 2026 with an initial design
              capacity of approximately 50,000 gallons of SAF per year. This facility serves as both a pilot-scale
              production site and a proof-of-concept for modular expansion. While the company has not publicly disclosed
              revenue figures, run-rate projections, or profitability timelines, the scale of offtake commitments
              suggests potential revenue in the hundreds of millions of dollars annually once production reaches
              contracted volumes. Headcount has grown to approximately 260 employees as of 2026, reflecting expansion in
              engineering, manufacturing operations, and commercial teams. Twelve operates R&D and pilot facilities in
              Berkeley, California, and the commercial production site in Moses Lake, Washington.
            claimRefs: []
      - number: '1.5'
        title: Major Milestones
        blocks:
          - type: paragraph
            body: >-
              Twelve's development trajectory spans over a decade, from academic spinout to commercial-scale deployment.
              The company was founded in 2015 as Opus 12 by three electrochemistry researchers, with initial operations
              focused on laboratory-scale CO₂ electrolysis. In 2021, the company rebranded to Twelve to reflect its
              ambition to produce twelve distinct products from CO₂, signaling a shift toward commercial market focus.
              The same year, Twelve raised a $57 million Series A, enabling pilot-scale process development.


              In 2022, Twelve secured a $130 million Series B led by investors including DCVC and Capricorn, providing
              capital for the design and permitting of its first commercial facility. That year, the company also
              obtained ASTM D7566 Annex A1 certification for its E-Jet SAF product, a critical regulatory milestone
              enabling commercial aviation use. The certification process involved rigorous testing and validation by
              third-party laboratories to demonstrate that E-Jet meets performance and safety standards for blending
              with conventional jet fuel.


              In 2024, Twelve announced the construction of AirPlant One in Moses Lake, Washington, and subsequently
              closed its $645 million Series C and project equity round in September 2024, led by TPG Rise Climate. This
              financing enabled Twelve to reach unicorn valuation status and provided the capital necessary to complete
              facility construction. In April 2026, the company began commissioning AirPlant One, marking the transition
              from pilot operations to commercial production readiness.


              On the customer and partnership front, Twelve signed its landmark 785,000 metric ton, 14-year offtake
              agreement with IAG/British Airways in 2024, one of the largest SAF commitments by volume globally at the
              time. United Airlines formalized its 300 million gallon MoU and made an equity investment in Twelve. The
              U.S. Air Force partnership, initiated earlier, culminated in the production of demonstration batches of
              SAF from CO₂ for military testing. No material adverse events, leadership departures, or financing
              setbacks have been publicly disclosed. The company's milestone cadence reflects a capital-intensive,
              multi-year path to commercialization typical of deep-tech and climate infrastructure ventures.
