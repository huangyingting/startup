      - number: '1.6'
        title: Business Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >-
              Twelve's business model centers on long-term, volume-committed offtake agreements with airlines and
              corporate buyers, supported by government contracts and sustainability partnerships. The company
              generates—or plans to generate—revenue through three primary streams: (1) sale of E-Jet sustainable
              aviation fuel to airline customers under multi-year contracts, (2) sale of E-Naphtha and other chemical
              intermediates to industrial customers, and (3) government and defense contracts for pilot production and
              fuel supply.


              The SAF revenue stream is anchored by multi-year offtake agreements that provide price certainty and
              demand visibility. Contracts with British Airways, United Airlines, and Alaska Airlines represent hundreds
              of millions of gallons of committed volume, though pricing terms and escalation mechanisms have not been
              publicly disclosed. Industry benchmarks suggest e-fuel SAF pricing ranges from $3 to $10+ per gallon
              depending on production scale, feedstock costs (primarily renewable electricity and CO₂ sourcing), and
              policy incentives such as the U.S. 45Z tax credit or EU mandates under ReFuelEU Aviation.


              The E-Naphtha stream targets chemical producers seeking to decarbonize their feedstock supply chains.
              Mercedes-Benz's pilot use of E-Naphtha in automotive parts production demonstrates proof-of-concept for
              this market, though commercial-scale sales have not been reported. Government contracts, including those
              with the U.S. Air Force, provide early revenue and validation but are unlikely to represent a majority of
              long-term sales.


              Twelve's cost structure is dominated by capital expenditures for electrolyzer infrastructure and operating
              expenses for renewable electricity, CO₂ capture or sourcing, and facility operations. The economics of
              e-fuel production are highly sensitive to electricity costs, with renewable power representing 50-70% of
              total production cost according to industry analyses. The company's competitive positioning depends on
              securing low-cost renewable energy via power purchase agreements (PPAs) and optimizing the efficiency of
              its OPUS reactor to minimize electricity consumption per gallon of fuel produced. As of mid-2026, Twelve
              has not disclosed unit economics, gross margins, or cash flow projections. The path to profitability will
              depend on achieving target production volumes, realizing scale efficiencies, and benefiting from policy
              support mechanisms that narrow the price gap between e-fuels and fossil alternatives.
            claimRefs: []
  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: >-
              Twelve competes primarily in the sustainable aviation fuel (SAF) market, specifically in the
              power-to-liquids (PtL) or electrofuel (e-fuel) sub-segment, which uses captured CO2, renewable
              electricity, and water as inputs rather than biologically derived feedstocks. The broader SAF market
              encompasses multiple production pathways: hydroprocessed esters and fatty acids (HEFA), alcohol-to-jet
              (ATJ), Fischer-Tropsch (FT) from biomass or waste, and PtL/e-fuels. HEFA-based SAF constitutes the
              dominant commercial pathway today, accounting for over 85% of global SAF volumes as of 2024. Twelve's OPUS
              reactor technology produces ASTM D7566 Annex A1-certified e-fuel SAF (E-Jet) as its primary product,
              qualifying it for blending with conventional jet fuel at up to 50% concentration.


              The spend boundary includes: (1) SAF sold under long-term offtake agreements to airlines (primary), (2)
              sustainable chemical feedstocks (e-naphtha) sold to industrial buyers, and (3) government-contracted fuel
              and R&D supply. Excluded spend includes conventional jet fuel (Jet A/A-1), biofuel blending outside SAF
              pathways, and ground transport fuels. Adjacencies include carbon removal credits, green hydrogen, and
              synthetic chemicals. The status-quo substitute is conventional fossil-derived jet fuel at $0.60-0.90 per
              gallon, or incumbent HEFA SAF at $2.50-4.00 per gallon. PtL e-fuels command a significant price premium
              but are eligible for policy support (45Z tax credit, EU ETS carbon cost savings, ReFuelEU mandates) that
              partially closes the gap. Twelve's competitive advantage claim rests on feedstock independence (no biomass
              land use) and scalability via renewable electricity and captured CO2, which are not subject to the
              feedstock constraints that limit HEFA expansion.
            claimRefs:
              - CM001
              - CM002
