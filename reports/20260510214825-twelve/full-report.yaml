              confirmed offtake customers are the primary disclosed indicators. Revenue is not disclosed. Burn and
              runway are not disclosed. The next funding trigger is likely tied to AirPlant expansion financial close or
              a project financing milestone. Capital adequacy risk is significant given the capital intensity of e-fuel
              production facilities: a commercial-scale AirPlant at 100 million gallons per year would require an
