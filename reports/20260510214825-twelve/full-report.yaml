      - number: '5.2'
        title: 'Product Portfolio: E-Jet and E-Naphtha'
        blocks:
          - type: paragraph
            body: >-
              Twelve markets two primary products: E-Jet synthetic aviation fuel and E-Naphtha chemical feedstock. E-Jet
              is a drop-in replacement for conventional fossil jet fuel (Jet A/Jet A-1), meaning it can be blended with
              or used in place of conventional fuel without any modifications to aircraft engines or fueling
              infrastructure. It has achieved ASTM D7566 Annex A1 certification, the primary standard for SAF approval,
              covering the Fischer-Tropsch (FT) synthesis pathway. This certification is critical for commercial
              aviation adoption as it confirms the fuel meets all safety, performance, and compatibility specifications.


              E-Jet's lifecycle carbon intensity is claimed to be up to 90% lower than fossil jet fuel on a well-to-wake
              basis, depending on the renewable electricity source. When powered by hydropower (as at AirPlant One in
              Moses Lake, WA), the carbon footprint is effectively near-zero after accounting for the CO2 feedstock
              captured. The fuel has been tested and validated by the US Air Force Research Laboratory (AFRL) in
              partnership with AFWERX, which designated Twelve's E-Jet as the world's first fossil-free synthetic
              aviation fuel produced via CO2 electrolysis.


              E-Naphtha is the second commercial product, positioned as a CO2-derived replacement for petrochemical
              naphtha feedstocks used in plastics, solvents, and specialty chemicals. Early commercial pilots include
              Mercedes-Benz using CO2-derived polycarbonate precursors for car parts (specifically the C-pillar), and
              Procter & Gamble incorporating CO2-based chemical replacements in Tide laundry detergent formulations.
              These pilots demonstrate Twelve's ability to access premium-priced chemical markets alongside its aviation
              fuel business, potentially improving unit economics through product diversification.
