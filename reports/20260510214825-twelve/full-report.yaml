      - number: '2.2'
        title: Market Sizing and Addressable Opportunity
        blocks:
          - type: paragraph
            body: >-
              The global SAF market was valued at approximately $1.5-2.0 billion in 2023, with production of
              approximately 600 million liters against total aviation fuel consumption of approximately 330 million
              metric tonnes. Market projections from IATA, IEA, and independent analysts vary significantly: IATA
              targets SAF covering 2% of aviation fuel by 2025 (a target already missed) and 10% by 2030, which at 2024
              consumption levels implies approximately 30-34 billion liters per year of SAF demand by 2030. BloombergNEF
              and McKinsey project the SAF market could reach $15-25 billion by 2030 under accelerated regulatory
              scenarios. The IEA's Net Zero Emissions scenario requires aviation fuel carbon intensity to drop 54% by
              2035.


              For Twelve specifically, the most relevant addressable market is PtL e-fuel SAF. Estimates for PtL's share
              of SAF by 2030 range from 1% to 5% of total SAF volumes under base-case regulatory scenarios, implying a
              2030 PtL SAF market of $150 million to $1.25 billion. By 2035-2040, if PtL costs decline substantially and
              green electricity costs fall below $0.02/kWh, PtL could constitute 10-20% of SAF, implying a $3-10 billion
              addressable market. These estimates carry significant uncertainty and depend on renewable electricity cost
              trajectories, CO2 capture economics, and the pace of regulatory mandates. Rocky Mountain Institute
              estimates PtL SAF at $130-200/barrel by 2035 (down from $400+/barrel today), implying continued premium
              pricing throughout the decade. Multiple contradictory estimates exist and are documented in the sizing
              lens table.
            claimRefs:
