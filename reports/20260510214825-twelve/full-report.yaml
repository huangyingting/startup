            body: >-
              Customer concentration is one of the most significant risks in Twelve's customer profile. IAG alone
              represents 785,000 metric tons of contracted volume, and United Airlines' 300 million gallon MoU, if
              converted to a binding agreement, would further concentrate revenue. If either of these relationships were
              to deteriorate—due to airline financial stress, contract renegotiation, or inability of Twelve to deliver
              at scale—the impact on Twelve's revenue prospects would be severe.


              Retention dynamics for SAF offtake agreements are structurally different from software SaaS contracts. SAF
              agreements typically include force majeure clauses that allow termination if the supplier cannot deliver
              at the agreed price or volume. If Twelve's production costs remain above the agreed contract price (or
              above what airlines are willing to pay in renegotiation), the contract may be terminated or restructured.
              The long tenure of the IAG agreement (14 years) provides revenue visibility but also locks in pricing
              terms that may become disadvantageous if SAF costs fall faster than expected (less likely) or if Twelve
              cannot reach the contracted volumes (more likely near-term).


              The diversity of Twelve's customer base by end-market (airlines + corporate + government) provides some
              protection, but by contracted volume the concentration in commercial aviation is very high. An adverse
              event at either IAG (e.g., financial distress, merger) or United Airlines could materially affect Twelve's
              revenue pipeline.
