      - number: '1.3'
        title: Funding and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Twelve has raised approximately $934 million in total capital across equity and debt instruments through
              multiple financing rounds from 2015 to 2024. The company's funding trajectory reflects escalating capital
              requirements as it transitions from laboratory R&D to commercial-scale production infrastructure.


              The most recent and largest financing event occurred in September 2024, when Twelve announced a $645
              million raise structured as a hybrid of project equity, Series C equity, and debt facilities. This round
              was led by TPG Rise Climate, with $400 million allocated as project-specific equity for AirPlant One
              construction, $200 million as Series C equity financing, and $45 million in credit facilities from
              renewable energy-focused lenders. This financing round established Twelve's unicorn status with a
              post-money valuation exceeding $1 billion, though the exact valuation has not been publicly disclosed.


              Prior to the 2024 round, Twelve completed a $130 million Series B in 2022, followed by a $57 million
              Series A in 2021. Early-stage funding included seed and venture rounds supported by DCVC, Capricorn
              Investment Group, and Breakthrough Energy Ventures. Strategic investors include United Airlines (via
              United Airlines Ventures), Alaska Star Ventures (Alaska Airlines' investment arm), and Chan Zuckerberg
              Initiative. Corporate sustainability partnerships with Microsoft, Shopify, and BCG have included
              procurement commitments that provide demand-side validation and, in some cases, prepayment or
              revenue-sharing arrangements.


              The capital structure reflects the capital-intensive nature of electrochemical production facilities, with
              project equity and debt financing playing a substantial role alongside traditional venture equity. The
              company's ability to secure long-term offtake agreements—most notably a 785,000 metric ton, 14-year
              agreement with IAG/British Airways and a 300 million gallon memorandum of understanding (MoU) with United
              Airlines—has been instrumental in de-risking project finance and attracting infrastructure-scale capital.
              No secondary transactions or liquidity events for early shareholders have been publicly reported.
