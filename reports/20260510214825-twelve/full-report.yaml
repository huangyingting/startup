      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The SAF market is driven by a convergent set of regulatory, corporate, and economic forces. On the
              regulatory side, the EU's ReFuelEU Aviation mandate (Regulation 2023/2405) requires 2% SAF blending by
              2025, scaling to 6% by 2030 and 70% by 2050, with a sub-mandate specifically targeting 1.2% PtL by 2030
              and 35% by 2050. The U.S. 45Z Clean Fuel Production Credit provides up to $1.75/gallon for SAF meeting
              lifecycle carbon intensity thresholds. CORSIA Phase 1 requires approximately 10 billion liters of SAF
              annually by 2030 across participating airlines. The UK's Sustainable Aviation Fuel Mandate requires 10%
              SAF by 2030.


              On the demand side, over 80% of global airline capacity is committed by carriers that have pledged
              net-zero by 2050 (IATA Net Zero Carbon commitment). Corporate sustainability mandates from Scope 3
              reporting standards (GHG Protocol, SBTi) and investor ESG frameworks (EU Taxonomy, TCFD) are accelerating
              procurement of SAF credits. Key adoption constraints include: the very high production cost of PtL SAF
              versus incumbent fuels; limited availability of low-cost renewable electricity at gigawatt scale; and
              capital intensity of new production facilities. CO2 feedstock sourcing at industrial scale and long
              construction timelines for electrochemical facilities represent additional constraints specific to
              Twelve's technology pathway. Electricity costs represent 50-70% of PtL SAF production costs, making
              renewable electricity pricing the single most important variable in e-fuel SAF economics.
            claimRefs:
              - CM017
              - CM018
              - CM019
              - CM020
              - CM021
              - CM025
              - CM026
