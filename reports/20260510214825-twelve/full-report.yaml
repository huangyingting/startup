chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Mission
        blocks:
          - type: paragraph
            body: >-
              Twelve, Inc. (formerly Opus 12, Inc.) is a carbon transformation company headquartered in Berkeley,
              California, founded in 2015 by Dr. Nicholas Flanders (CEO), Dr. Kendra Kuhl (CTO), and Dr. Etosha Cave
              (CSO). The company rebranded from Opus 12 to Twelve in 2021 to reflect its focus on transforming CO₂ into
              twelve commercially viable products. Twelve's core technology—the OPUS reactor, a proprietary membrane
              electrode assembly (MEA)-based electrochemical CO₂ conversion system—transforms captured carbon dioxide,
              water, and renewable electricity into sustainable aviation fuel (SAF) branded as E-Jet® and chemical
              precursors including E-Naphtha. As of April 2026, Twelve is commissioning its first commercial-scale
              production facility, AirPlant One, in Moses Lake, Washington, with an initial design capacity of
              approximately 50,000 gallons of SAF per year. The company has achieved unicorn valuation status (>$1
              billion) following its September 2024 financing round and has raised a total of approximately $934 million
              across equity and debt instruments to date.


              Twelve positions itself as enabling a "world made from air," targeting the displacement of fossil-derived
              fuels and chemicals with electrochemically synthesized alternatives produced via direct CO₂ utilization.
              The company's technology is certified under ASTM D7566 Annex A1 for sustainable aviation fuel, positioning
              it as a drop-in replacement for conventional jet fuel. Twelve's business model centers on long-term
              offtake agreements with airlines, government contracts, and corporate sustainability partnerships, with
              strategic customer relationships including British Airways (IAG), United Airlines, Alaska Airlines, the
              U.S. Air Force, Microsoft, Shopify, Mercedes-Benz, and Procter & Gamble. The company's intellectual
              property portfolio includes U.S. Patent No. 10,898,880 B2, covering aspects of its electrochemical CO₂
              reduction technology. As of mid-2026, Twelve employs approximately 260 personnel and is transitioning from
              pilot-scale demonstration to commercial production.
