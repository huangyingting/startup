            body: >-
              Twelve's financial profile is consistent with an early-commercial deep-tech industrial company:
              well-capitalized relative to its current stage ($645M raised), pre-revenue at meaningful scale, with a
              credible long-term market opportunity but an unproven commercial production cost curve. Revenue quality at
              AirPlant One is low because the facility is a demonstration asset; revenue quality of future commercial
              AirPlants depends on offtake agreement pricing, utilization rates, and production cost trajectories that
              are not yet knowable from public evidence.


              The primary financial risks are: (1) capital intensity risk: each commercial AirPlant requires $500M-$2B
              in capital before positive EBITDA; (2) production cost risk: PtL economics are highly sensitive to
              electricity cost, CO2 feedstock cost, and electrolyzer efficiency, none of which are verified at
              commercial scale; (3) policy dependency risk: 45Z credits and ReFuelEU mandates are essential to near-term
