    title: Recommendation Logic
    type: flow
    layout: standard
    summary: Decision logic for the conditional INVEST recommendation, showing key gates and contingent outcomes
    data:
      nodes:
        - id: n1
          label: Does AirPlant One meet 50K gal/yr target?
          type: decision
        - id: n2
          label: YES → Does Series D close at >$2B valuation?
          type: decision
        - id: n3
          label: YES → Is 45Z credit extended or EU demand sufficient?
          type: decision
        - id: n4
          label: YES → STRONG INVEST (scale up position)
          type: outcome
        - id: n5
          label: NO (policy) → HOLD (base case; monitor CORSIA/EU)
          type: outcome
        - id: n6
          label: NO (Series D) → PAUSE (reassess; technology risk remains)
