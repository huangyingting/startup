      - number: '2.5'
        title: Sizing Diligence Gaps and Contradictions
        blocks:
          - type: paragraph
            body: >-
              Multiple material diligence gaps limit the precision of market sizing and TAM/SAM/SOM estimates for
              Twelve's specific addressable segment. First, no public analyst covers the PtL e-fuel SAF sub-market in
              isolation with consistent methodology; all major market reports aggregate PtL into the broader SAF total
              without PtL-specific revenue forecasts. Second, the 2030 and 2035 market estimates reviewed for this
              chapter range from $5 billion to $25 billion for the broader SAF market, reflecting genuine uncertainty in
              regulatory enforcement rates, cost reduction trajectories, and supply chain development.


              Third, demand estimates from IATA and ICAO assume full regulatory compliance that has historically not
              materialized: the 2025 SAF targets were not met in 2024, with actual production representing less than
              0.2% of global aviation fuel consumption. Fourth, Twelve's SOM for PtL SAF is further constrained by its
              single-facility AirPlant One (50,000 gallons/year initial capacity), making it a negligible current market
              participant against even the most conservative SAM estimates. These gaps suggest that TAM/SAM estimates
              are useful for directional analysis but should not be taken as precise inputs to Twelve's revenue
              forecasting. SOM is more appropriately modeled from the bottom up using Twelve's current and planned
              capacity and contracted offtake volumes than from top-down market share assumptions.
            claimRefs:
              - CM022
              - CM023
              - CM024
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Twelve competes in two overlapping competitive spaces: sustainable aviation fuel (SAF) production and
              sustainable industrial chemicals (e-naphtha). Within SAF, competition includes producers across all
              pathways (HEFA, ATJ, FT, PtL), with HEFA-based producers dominating current commercial volumes. Direct
              competition in PtL/e-fuel SAF is limited to a small number of well-funded startups and established
              chemical companies exploring electrolytic CO2 conversion.


              The principal direct PtL SAF competitors are LanzaJet (alcohol-to-jet pathway using ethanol from LanzaTech
              fermentation), Air Company (CO2-to-ethanol-to-jet via Fischer-Tropsch), Infinium (e-methanol from CO2,
              water, and green H2, converted to jet fuel), and Velocys (Fischer-Tropsch from biomass and waste CO2). The
              principal indirect competitors via HEFA are Neste (world's largest SAF producer), World Energy, and
              SkyNRG. In sustainable chemicals, Air Company and specialized electrochemical companies (like Electrochaea
