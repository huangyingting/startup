      - number: '8.2'
        title: Bull and Bear Case Analysis
        blocks:
          - type: paragraph
            body: >-
              The bull case for Twelve is anchored in three reinforcing dynamics: (1) regulatory mandates that make SAF
              procurement mandatory rather than voluntary for airlines; (2) Twelve's unique IP and technological head
              start in the CO2-to-SAF pathway; and (3) long-term contracted demand providing revenue visibility once
              AirPlant One and subsequent facilities are producing at scale. In this scenario, Twelve becomes the Neste
              of synthetic aviation fuel—a dominant platform company with proprietary technology, captive demand from
              strategic investor-customers, and the ability to expand globally wherever renewable electricity is cheap
              and CO2 is available.


              The bear case rests on three compounding failures: (1) AirPlant One does not meet its production cost or
              volume targets; (2) the 45Z credit expires in December 2027 without Congressional extension, eliminating a
              key economic subsidy; and (3) HEFA SAF prices fall further as biological feedstock SAF scales rapidly,
              eroding Twelve's pricing power. In this scenario, Twelve fails to raise Series D at acceptable terms, must
              renegotiate its IAG and United offtake agreements, and faces a multi-year delay before reaching commercial
              viability.


              The base case assumes partial success at AirPlant One (cost 1.5-2x projections), Series D closes at modest
              dilution, 45Z is extended for 3-5 more years, and EU ReFuelEU mandate creates enough European demand to
              sustain growth while US policy remains uncertain. In this scenario, Twelve reaches gigascale by 2032-2035
              and achieves cost parity with HEFA-SAF by 2033.
