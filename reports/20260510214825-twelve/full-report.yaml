      - number: '6.3'
        title: Adoption Trajectory and Commercial Readiness
        blocks:
          - type: paragraph
            body: >-
              Twelve's commercial adoption trajectory reflects the reality that the company is in the early
              commercialization phase: all major contracts were signed ahead of meaningful commercial production,
              meaning customers have committed to future volumes contingent on Twelve's ability to scale. AirPlant One,
              commissioning in April 2026, has an initial capacity of approximately 50,000 gallons per year. This is far
              below what is needed to fulfill even a small fraction of the IAG or United commitments. The delivery ramp
              is therefore long-dated and depends entirely on Twelve's ability to raise additional capital and build
              successive AirPlant facilities.


              For corporate sustainability buyers (Microsoft, Shopify, BCG), the product is typically SAF certificates
              rather than physical fuel delivery, which lowers the execution risk. A SAF certificate represents the GHG
              reduction benefit of SAF produced and blended into the aviation fuel supply, without requiring the buyer
              to physically receive fuel. This mechanism is used widely in corporate sustainability reporting under
              CORSIA and EU taxonomy requirements.


              For aviation customers (IAG, United, Alaska), physical fuel delivery is ultimately required. These
              customers have expressed willingness to pay a premium for SAF to meet their own decarbonization
              commitments (under CORSIA, EU ReFuelEU mandates, and corporate net-zero pledges). The effective net cost
              premium they pay is somewhat offset by regulatory compliance value and reputational benefits. However, the
              pricing premium relative to conventional jet fuel remains a significant financial burden for airlines that
              operate on thin margins.
