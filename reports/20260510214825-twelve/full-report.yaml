            body: >-
              Twelve has raised approximately $645 million in cumulative equity financing through its Series D round.
              The funding chronology is documented in the Company Overview chapter. This chapter focuses on capital
              adequacy and financing adequacy looking forward.


              At Twelve's current burn rate, which is estimated at $8-20 million per month based on headcount
              (approximately 200-300 employees) and facility development activities, the $645 million in cumulative
              capital provides an estimated runway of 2-4 years from the most recent closing, depending on the timing
              and scale of AirPlant expansion commitments and project financing arrangements. Twelve has indicated plans
              to use project finance (debt financing against offtake agreement cash flows) for larger commercial
              facilities, reducing the equity capital requirement per gigaliter of capacity. This is a standard approach
              for energy project developers; the key risk is that offtake agreement tenors and pricing must support debt
              service coverage ratios acceptable to project finance lenders.


