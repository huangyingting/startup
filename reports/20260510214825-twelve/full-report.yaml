  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology and Scale-Up Risk
        blocks:
          - type: paragraph
            body: >-
              Twelve's most fundamental risk is the challenge of scaling the OPUS reactor from the current AirPlant One
              demonstration scale (~50,000 gallons/year) to the gigascale volumes needed to fulfill its contracted
              offtake agreements and compete commercially. The history of energy technology commercialization is replete
              with examples of technologies that performed well at pilot scale but failed to reach economic viability at
              commercial scale—a phenomenon known as the 'valley of death.' For CO2 electrolysis specifically, several
              technical challenges become more acute at scale: current distribution across large MEA (membrane electrode
              assembly) areas, long-term catalyst stability under continuous industrial operation, heat and gas
              management in large reactor stacks, and balance-of-plant reliability.


              The Fischer-Tropsch synthesis step adds additional complexity. FT catalysts are sensitive to syngas
              composition variations, sulfur trace impurities, and operating temperature excursions. Maintaining
              consistent syngas quality from the electrolyzer as the MEA degrades over thousands of operating hours is a
              non-trivial challenge. FT catalyst regeneration costs and downtime add to operating expenses in ways that
              may not be fully understood until AirPlant One has been operating at steady state for an extended period.


              A key risk indicator will be AirPlant One's actual production cost per gallon during its first year of
              operation. If the cost-per-gallon at AirPlant One is significantly above Twelve's projections, it will
              signal that learning curves are slower than modeled and that the capital and operating economics of
              subsequent AirPlant facilities will be worse than expected. Only ~24% of planned 2024 SAF capacity
              actually began producing, illustrating industry-wide execution risk in scaling.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
