      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >-
              Twelve's founding team comprises three deep-tech entrepreneurs with complementary scientific and
              engineering expertise. Dr. Nicholas Flanders serves as CEO, having co-founded the company and led its
              evolution from laboratory-scale research to commercial deployment. Dr. Kendra Kuhl, CTO, oversees
              technology development and scaling of the OPUS reactor platform, while Dr. Etosha Cave, CSO (Chief
              Scientist), leads fundamental research and process optimization. All three founders remain active in
              executive roles as of 2026, representing a continuity of leadership since the company's inception in 2015.


              The company's governance structure includes a board of directors with representation from major investors.
              Following the September 2024 Series C financing, TPG Rise Climate—a climate-focused investment platform
              within TPG—holds a board seat alongside earlier investors including DCVC (Data Collective Venture
              Capital), Capricorn Investment Group, and Chan Zuckerberg Initiative (CZI). Alaska Star Ventures, a
              strategic investor aligned with Alaska Airlines, also participates in governance. The board composition
              reflects a mix of financial, strategic, and mission-driven stakeholders, aligning capital deployment with
              decarbonization objectives in aviation and chemicals.


              Key-person risk is concentrated in the three-founder executive team, particularly CEO Flanders, who serves
              as the company's primary spokesperson and strategic leader. No material leadership changes have been
              publicly disclosed since the 2021 rebrand from Opus 12 to Twelve. The company's advisory network includes
              domain experts in electrochemistry, chemical engineering, and aviation decarbonization, though specific
              advisory board composition has not been publicly detailed. As Twelve scales from pilot to commercial
              production, leadership depth in manufacturing operations, regulatory compliance, and project finance will
              be critical to de-risking execution.
