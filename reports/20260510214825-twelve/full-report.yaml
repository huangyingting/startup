      - number: '7.2'
        title: Regulatory and Policy Risk
        blocks:
          - type: paragraph
            body: >-
              Twelve's economics are significantly dependent on government policy support, particularly in the United
              States. The 45Z Clean Fuel Production Credit provides up to $1.75 per gallon for qualifying SAF
              production, which is a meaningful offset against the high production cost of E-Jet (~$50-70 per gallon at
              current scale). However, this credit is currently legislated to expire at the end of 2027, creating a
              significant cliff for producers who are just reaching commercial scale. Extension of the 45Z credit
              requires Congressional action and faces uncertainty in the current US political environment, particularly
              given concerns about the Inflation Reduction Act's long-term fiscal impact.


              The CORSIA scheme, administered by ICAO, is the primary international regulatory driver of airline SAF
              demand. CORSIA's core CARBON offsetting requirement applies to international aviation, and airlines can
              meet this requirement by purchasing qualifying SAF. Design changes to CORSIA eligibility criteria or
              baseline calculations could affect the value of CORSIA credits that Twelve's customers receive from
              purchasing E-Jet. Similarly, the EU ReFuelEU Aviation mandate's blending requirements (2% SAF in 2025,
              rising to 70% by 2050) drive European airline demand, but specific technical pathway restrictions in
              future EU regulations could disadvantage certain SAF producers.


              US Department of Defense procurement for e-fuels, while a positive signal, remains subject to annual
              appropriations and policy changes. The LPO (Loan Programs Office) and other federal programs that could
              provide non-dilutive capital to Twelve are also subject to policy uncertainty. Any administration-level
              rollback of clean energy incentives could materially harm Twelve's cost structure and market position.
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
