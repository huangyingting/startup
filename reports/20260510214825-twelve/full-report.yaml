  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'Core Technology: The OPUS Reactor'
        blocks:
          - type: paragraph
            body: >-
              Twelve's central technological innovation is the OPUS (Optimized Processes Using Syngas) reactor, an
              electrochemical cell that uses a membrane electrode assembly (MEA) to convert CO2, water, and renewable
              electricity into carbon monoxide (CO) and hydrogen (H2), collectively known as syngas. This syngas is then
              converted via a modified Fischer-Tropsch synthesis pathway into liquid hydrocarbons including jet fuel and
              naphtha. The fundamental chemistry underpinning the OPUS reactor is CO2 electrolysis: CO2 molecules are
              reduced at the cathode of the MEA in the presence of an electrocatalyst, producing CO, while water is
              oxidized at the anode to produce oxygen. The resulting CO/H2 syngas has a composition that can be tuned by
              adjusting reactor parameters to optimize for downstream fuel synthesis.


              The MEA architecture allows Twelve to operate the CO2 reduction reaction at high current densities, making
              the process commercially viable at scale. The key technical advantages include: direct CO2 conversion
              without intermediate steps, high faradaic efficiency for CO production, modular reactor design allowing
              stacked cell configurations, and compatibility with intermittent renewable electricity sources such as
              hydropower and wind. Twelve's co-founders, Dr. Kendra Kuhl and Dr. Etosha Cave, conducted foundational
              research in CO2 electrocatalysis at Stanford University before commercializing the technology. Dr. Kuhl's
              doctoral work on the selectivity of CO2 reduction catalysts directly informs the cathode design of the
              OPUS reactor. The company has continuously improved Faradaic efficiency and current density through
              iterative MEA design, reaching performance levels that enable economic viability at gigascale with
              projected learning-curve improvements.
            claimRefs:
