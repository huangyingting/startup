appendices:
  - id: A
    title: Key Diligence Asks Before Investment
    blocks:
      - type: callout
        calloutType: recommendation
        title: 'P0: AirPlant One Production Data'
        body: >-
          Request monthly production volumes, Faradaic efficiency, and cost-per-gallon data from the commissioning
          period under NDA. This is the single most important data point for investment decision.
        claimRefs:
          - CV015
      - type: callout
        calloutType: recommendation
        title: 'P0: Full Financial Model'
        body: >-
          Request Twelve's internal financial model for AirPlant One and AirPlant Two, including capital requirements,
          operating assumptions, and revenue projections.
        claimRefs:
          - CV016
      - type: callout
        calloutType: risk
        title: 'P1: Offtake Contract Terms'
        body: >-
          Review IAG and United offtake agreements for force majeure, non-delivery penalties, and renegotiation
          provisions to quantify legal exposure from production delays.
        claimRefs:
          - CV015
      - type: list
        title: Additional Diligence Items
        items:
          - 'Series D term sheet: valuation, investor composition, liquidation preferences'
          - 'Talent retention: co-founder and key engineer vesting schedules'
          - Independent technical review of AirPlant One design by chemical engineering firm
          - 'IP landscape: freedom-to-operate analysis for OPUS core patents'
        claimRefs: []
