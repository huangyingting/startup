companyProfile:
  summary: >-
    Twelve (formerly known as Opus 12) is a Berkeley, CA-based climate technology company that has developed the OPUS
    electrochemical reactor to convert CO2 directly into carbon monoxide (CO), which is then synthesized into E-Jet
    sustainable aviation fuel and E-chemicals via Fischer-Tropsch synthesis. Founded in 2015 by three Stanford-trained
    electrochemists—Nicholas Flanders (CEO), Etosha Cave (Chief Science Officer), and Kendra Kuhl (CTO)—Twelve has
    raised approximately $934M in total capital and is commissioning its first commercial production facility, AirPlant
    One, in Moses Lake, Washington as of April 2026. The company holds long-term offtake agreements with IAG (14-year)
    and a memorandum of understanding with United Airlines, and counts Microsoft, BCG, and the US Air Force as customers
    for its SAF certificates.
