              offtake contracts with investment-grade counterparties; and (5) dilution risk: multiple large equity
              raises will be required before cash flow positivity, with significant dilution to early investors. These
              are normal risks for an industrial deep-tech company at this stage, but they should inform any financial
              valuation with wide uncertainty bounds. This chapter documents all known public financial data; the
