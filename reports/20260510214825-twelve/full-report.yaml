      - number: '7.4'
        title: Market and Competitive Risk
        blocks:
          - type: paragraph
            body: >-
              The E-fuel market faces structural headwinds from a persistent cost premium over conventional jet fuel.
              Current Power-to-Liquid SAF costs approximately $7,000-9,000 per metric ton, compared to fossil jet at
              $600-900 per metric ton—a 7-10x premium. Even with the 45Z credit and CORSIA compliance value, airlines
              face significant economic pressure to minimize SAF procurement unless regulatory mandates force their
              hand. The European ReFuelEU mandate is the most binding such requirement, but airlines operating outside
              the EU face less regulatory compulsion.


              Competitors in the SAF space include HEFA producers (Neste, World Energy, HIF Global) who operate at lower
              production costs, and alternative e-fuel producers using different technology pathways. HIF Global is
              developing a gigascale PtL (Power-to-Liquid) facility in Chile and Texas using a different CO2 +
              electrolysis approach. LanzaJet uses an alcohol-to-jet (ATJ) pathway from ethanol, with lower current
              capital costs. Major oil companies (BP, Shell, TotalEnergies) are investing in SAF production capacity and
              could use their existing refinery infrastructure, capital, and customer relationships to undercut startup
              e-fuel producers.


              A key market risk is feedstock price volatility. While Twelve's OPUS reactor uses CO2 (which is abundant)
              and electricity as inputs, renewable electricity prices are not fixed. If hydro-electric availability
              declines due to drought (a material risk for Moses Lake's Columbia River hydropower), or if electricity
              prices rise due to grid congestion, Twelve's production costs could increase significantly. The dependence
              on a single electricity source (Moses Lake hydropower) creates geographic concentration risk in the cost
              structure.
            claimRefs:
              - CR013
              - CR014
              - CR015
              - CR016
          - type: table
            tableRef: TR004
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
      - number: '7.5'
        title: People, Execution, and Adverse Event Risk
        blocks:
          - type: paragraph
            body: >-
              Twelve's founding team consists of three technical co-founders (Flanders, Kuhl, Cave) whose specialized
              expertise in CO2 electrolysis is the foundation of the company's technology moat. Key-person risk is
              elevated: the departure of any founder, particularly the technical co-founders Dr. Kuhl or Dr. Cave, could
              slow technology development and damage investor confidence. As the company scales to ~260 employees and
              beyond, retaining and attracting specialized talent in electrochemistry, chemical engineering, and plant
              operations becomes increasingly critical.


              Execution risk at AirPlant One is the most immediate concern. Commercial-scale plant commissioning is
              inherently complex, and delays in reaching steady-state production are common in first-of-kind facilities.
              Twelve has limited operational experience running a commercial SAF plant, and the learning curve for plant
              operations, safety management, and quality control at scale may be steeper than anticipated. Construction
              cost overruns could consume the project equity faster than planned.


              On the adverse events side, Twelve has not experienced any publicly reported safety incidents, regulatory
              enforcement actions, or material legal disputes as of May 2026. The lack of publicly disclosed adverse
              events is consistent with its early-stage status and does not guarantee future safety performance. Any
              significant safety incident at AirPlant One could trigger regulatory reviews, operational shutdowns, and
              reputational damage with airline customers who are sensitive to safety-related associations.
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
          - type: table
            tableRef: TR005
            claimRefs:
              - CR031
              - CR005
              - CR008
              - CR017
              - CR025
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'AirPlant One Is the Thesis-Break Trigger: One Plant, Everything at Stake'
            body: >-
              Twelve's entire commercial narrative hinges on AirPlant One performing as projected. If AirPlant One fails
              to meet production targets, incurs major cost overruns, or experiences a safety incident, it will impair
              Twelve's ability to raise Series D, fulfill its IAG and United commitments, and maintain investor and
              customer confidence. There is no fallback commercial plant if AirPlant One underperforms.
            calloutType: risk
            claimRefs:
              - CR001
              - CR010
              - CR017
          - type: callout
            title: 'Policy Risk: 45Z Credit Cliff in December 2027'
            body: >-
              The 45Z Clean Fuel Production Credit, worth up to $1.75/gallon, expires in December 2027 unless extended
              by Congress. Twelve is just reaching commercial production in 2026, meaning the credit may expire before
              it has produced at meaningful scale. Without this credit, the economics of E-Jet deteriorate
              significantly, potentially making it unviable without premium customer contracts or alternative policy
              support.
            calloutType: risk
            claimRefs:
              - CR005
              - CR008
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Recommendation
        blocks:
          - type: paragraph
            body: >-
              Twelve receives a conditional INVEST recommendation. The company has assembled an exceptionally strong set
              of assets: a patented CO2 electrolysis technology platform, ASTM-certified SAF product, strategic
              investor-customers including IAG and United Airlines, binding long-term offtake contracts, and a $645M war
              chest that funds AirPlant One to commissioning. The technology's differentiation—being unlimited by
              biomass feedstock constraints and scalable using abundant CO2 and renewable electricity—positions Twelve
              in the largest available market within SAF.


              However, the bull case depends critically on AirPlant One performing at or above its design
              specifications. The company is transitioning from proven pilot-scale technology to commercial-scale
              production for the first time, and this transition is the single biggest binary risk in the investment.
              The 45Z credit cliff in December 2027, the multi-billion dollar capital requirements ahead, and the 7-10x
              cost premium of E-fuel versus fossil jet create material execution dependencies.


              The investment thesis is best structured as: (1) an initial position at current valuations contingent on
              Series D completion, followed by (2) a potential significant increase in allocation once 12 months of
              AirPlant One production data are available and validate the cost-per-gallon trajectory. Early movers who
              can secure allocation in the Series D may benefit from pre-commercial pricing before the company's
              performance de-risks the investment.
            claimRefs:
              - CV001
              - CV002
              - CV003
