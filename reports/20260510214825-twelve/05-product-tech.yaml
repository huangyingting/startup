    statement: The OPUS reactor's MEA architecture allows high current-density CO2 electrolysis at the cathode, enabling commercially viable throughput.
    type: third-party-reported
    topic: technology
    sourceRefs:
    - SE006
    - SE020
    confidence: medium
    freshness: current
  - id: CE003
    statement: AirPlant One in Moses Lake, Washington is powered by renewable hydropower from the Columbia River system, enabling near-zero carbon CO2-to-SAF production.
    type: third-party-reported
    topic: manufacturing
    sourceRefs:
    - SE008
    - SE009
    confidence: medium
    freshness: current
    answersQuestionRefs:
