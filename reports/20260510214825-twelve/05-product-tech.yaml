callouts:
- calloutType: strength
  title: ASTM-Certified Drop-In Fuel with US Air Force Validation
  body: Twelve's E-Jet has achieved ASTM D7566 Annex A1 certification and has been validated by the US Air Force Research Laboratory as the first fossil-free CO2-derived jet fuel. This dual validation from
    both the international aviation standards body and the US defense establishment provides exceptional third-party credibility that competitors cannot easily replicate.
  claimRefs:
  - CE007
  - CE008
- calloutType: risk
  title: 'Scale-Up Valley of Death: AirPlant One Is Still Only 50,000 Gal/Year'
  body: AirPlant One's initial capacity of approximately 50,000 gallons per year is orders of magnitude below what is needed to meet even small portions of global aviation fuel demand. The path from AirPlant
    One to gigascale production requires solving engineering challenges at each order of magnitude, representing a scale-up 'valley of death' that has claimed many clean energy technologies.
  claimRefs:
  - CE016
  - CE024
  - CE025
