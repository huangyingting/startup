  - id: CE004
    statement: In the OPUS reactor, water is oxidized at the anode to produce oxygen as a byproduct, while CO2 is reduced at the cathode to CO.
    type: third-party-reported
    topic: technology
    sourceRefs:
    - SE006
    - SE001
    confidence: high
    freshness: historical
  - id: CE005
    statement: Syngas from the OPUS reactor is converted to liquid hydrocarbons via a Fischer-Tropsch synthesis step, then hydroprocessed and distilled to meet aviation fuel specifications.
