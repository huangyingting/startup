  claims:
  - id: CE001
    statement: Twelve's OPUS reactor uses a membrane electrode assembly (MEA) to reduce CO2 to carbon monoxide (CO) via electrochemistry, then combines CO with hydrogen to produce syngas.
    type: third-party-reported
    topic: technology
    sourceRefs:
    - SE001
    - SE006
    confidence: high
    freshness: current
    answersQuestionRefs:
