- id: ip-moats
  title: Intellectual Property and Technology Moats
  body: 'Twelve''s principal technology moat consists of three reinforcing layers: patent protection, tacit knowledge and know-how, and industry certifications. The foundational patent is US10898880B2,
    titled ''Systems and methods for electrochemical conversion of carbon dioxide,'' which covers key aspects of the MEA design, catalyst composition, and reactor architecture for CO2 electrolysis to produce
    CO and syngas. This patent was issued in 2021 and provides IP protection in the United States. Twelve has additionally filed international patent applications covering related technology domains.


    Beyond formal IP, the company''s most defensible moat may be the tacit know-how accumulated through years of iterative MEA design, electrocatalyst optimization, and reactor engineering. CO2 electrolysis
    at high current densities remains a technically demanding problem involving catalyst degradation, CO2 crossover, water management, and gas diffusion layer optimization. Twelve''s founders and engineering
    team have developed proprietary insights into these challenges that are difficult to replicate even with knowledge of the patent claims.


    The ASTM D7566 Annex A1 certification for Twelve''s Fischer-Tropsch SAF pathway represents a significant regulatory moat: the certification process is lengthy, expensive, and requires extensive fuel
    property testing and safety validation. New entrants using similar production pathways must repeat this certification process, creating a multi-year head start for Twelve. Additionally, the US Air Force
    validation and associated AFWERX and SBIR contracts provide government credibility that can facilitate future defense contracts and government procurement, a market where qualification barriers are
    particularly high.'
  claimRefs:
  - CE017
