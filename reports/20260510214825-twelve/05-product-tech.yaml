- id: manufacturing-scale
  title: Manufacturing and Commercial Scale-Up
  body: 'Twelve''s AirPlant One facility in Moses Lake, Washington represents the company''s first commercial-scale SAF plant and a critical proof-of-concept for the OPUS reactor at industrial scale. The
    Moses Lake location was selected primarily for access to abundant, low-cost hydropower from the Columbia River system, which is essential for cost-competitive CO2 electrolysis. Renewable electricity
    represents the largest variable cost component in E-fuel production, so co-locating with low-cost renewables is strategically essential.


    AirPlant One has an initial target capacity of approximately 50,000 gallons per year of E-Jet, which is a relatively small commercial volume (the SAF market consumes millions of gallons annually at
    major airports) but represents a significant leap from pilot scale. Construction was funded by the $645M capital raise in September 2024, which included $400M in project equity led by TPG Rise Climate
    and a $25M construction loan from Fundamental Renewables plus a $20M green loan from Sumitomo Mitsui Banking Corporation. The plant design is modular, using stacked OPUS reactor arrays, allowing capacity
    to be expanded by adding reactor modules rather than building entirely new facilities.


    Commissioning began in April 2026, with first commercial fuel shipments expected imminently as of the report date. World Fuel Services has been announced as a logistics partner to help advance commercial
    readiness and distribution of E-Jet. Twelve''s long-term manufacturing roadmap envisions scaling to multiple AirPlant facilities, with each subsequent plant benefiting from capital cost reductions as
    the technology matures along the learning curve. The company has stated ambitions for gigascale production, which would require facilities many orders of magnitude larger than AirPlant One and correspondingly
    large capital raises.'
