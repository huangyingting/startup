- id: quality-compliance
  title: Quality, Safety, and Compliance Framework
  body: 'Twelve''s quality and compliance framework is anchored by ASTM D7566 Annex A1 certification, which establishes the production and quality control requirements for Fischer-Tropsch SAF. This standard
    mandates specific fuel property ranges for flash point, freeze point, viscosity, energy density, and aromatic content, among others. Compliance requires rigorous batch testing of every fuel lot before
    it can be certified as meeting aviation fuel specifications. Twelve has established laboratory testing protocols at its research facility and has committed to maintaining the same quality standards
    at AirPlant One.


    From a safety perspective, CO2 electrolysis involves high-pressure gas handling, electrical systems operating at significant power densities, and the production of flammable syngas intermediates. Twelve
    has implemented engineering controls, process safety management protocols, and hazardous area classifications consistent with industrial gas processing standards. The AirPlant One facility is subject
    to Washington State environmental permitting requirements and EPA regulations governing CO2 capture and industrial chemical facilities.


    For aviation customers, the critical compliance requirement is that E-Jet meets the same specifications as conventional Jet A fuel and can be certified under CORSIA (Carbon Offsetting and Reduction
    Scheme for International Aviation) as a qualifying SAF. CORSIA requires that SAFs reduce lifecycle emissions by at least 10% compared to a fossil fuel baseline, and Twelve''s CO2-derived E-Jet comfortably
    exceeds this threshold with its 90% reduction claim when using renewable electricity. Documentation of the full lifecycle carbon accounting is essential for customers seeking CORSIA credit and EU ReFuelEU
    mandate compliance.'
  claimRefs:
  - CE021
  - CE022
  - CE023
- id: technical-risks
  title: Technical Risks and Development Roadmap
  body: 'Twelve''s primary technical risks center on scale-up of the OPUS reactor from the current demo/pilot scale to true commercial and eventually gigascale production. CO2 electrolysis has been demonstrated
    at laboratory and pilot scale but faces well-documented challenges when scaling to industrial cell stacks: current distribution across large MEA areas, heat management, gas diffusion uniformity, and
    long-term catalyst stability. Each order-of-magnitude scale increase introduces new engineering challenges that can require extensive re-engineering of cell architecture, stack design, and balance-of-plant
    systems.


    A second major technical risk is the electricity-to-fuel efficiency, often expressed as the energy efficiency of the overall CO2-to-fuel process. Current published figures for CO2 electrolysis-based
    SAF suggest round-trip efficiencies of 50-60% at best, meaning a substantial fraction of input renewable electricity is lost as heat. As renewable electricity costs decline, this efficiency figure becomes
    less economically critical, but at current grid prices in most markets, the efficiency gap is a significant cost driver.


    The Fischer-Tropsch synthesis step adds additional complexity: the FT catalyst is sensitive to syngas composition, sulfur impurities, and operating temperature and pressure. Maintaining consistent syngas
    quality from the electrolyzer as it degrades over time is a non-trivial engineering challenge. Catalyst lifetime and regeneration costs contribute to the operating expense structure of the plant. Third-party
    technical assessments and independent validation beyond the US Air Force partnership would strengthen investor confidence in the technology''s commercial viability.'
