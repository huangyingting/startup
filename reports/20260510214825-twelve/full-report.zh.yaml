      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >-
              Twelve 的产品有四类主要买方。航空公司（包括全服务航司、低成本航司和货运运营商）是占主导的可触达客群，驱动力来自 CORSIA Phase 1（2024-2026）合规义务，以及 EU 的 ReFuelEU
              Aviation 要求：2025 年 SAF 占比 2%，到 2050 升至 70%。航空公司通常由机队可持续负责人谈判 5-14 年长期承购协议，并获得 CFO
              和董事会批准。采用触发点是监管合规风险或自愿净零承诺。


              企业可持续发展买方（如 Microsoft、Shopify、BCG）规模较小但毛利较高，它们通过 book-and-claim 或直接购买 SAF 凭证，抵消 Scope 3
              商务差旅排放。这些买方面对小体量采购时价格弹性低，驱动力来自自愿碳承诺和 ESG 投资者压力。国防和政府买方（U.S. Air
              Force、DoD）出于战略能源安全考虑，价格容忍度高，采购通过多年政府合同完成。购买 e-naphtha 用于可持续包装和汽车内饰的化工公司（Mercedes-Benz、Procter and
              Gamble）构成新兴客群，采购由 R&D 和供应链团队牵头。采用障碍因客群而异：航空公司面对供给稀缺和成本溢价；企业买方面对可用量小和核证复杂；政府买方面对采购周期长；化工公司面对生产规模限制。
