      - number: '6.4'
        title: 客户集中度与留存风险
        blocks:
          - type: paragraph
            body: >-
              客户集中度是 Twelve 客户画像中最重要的风险之一。仅 IAG 就代表 785,000 公吨合同体量；如果 United Airlines 的 300 million gallon MoU
              转为有约束力协议，收入会进一步集中。如果其中任一关系恶化——原因可能是航空公司财务承压、合同重新谈判，或 Twelve 无法规模化交付——Twelve 的收入前景都会受到严重冲击。

              SAF 承购协议的留存机制，与软件 SaaS 合同有结构性差异。SAF 协议通常包含不可抗力条款；如果供应商无法按约定价格或体量交付，合同可被终止。如果 Twelve
              的生产成本持续高于约定合同价格（或高于重新谈判时航空公司愿意支付的水平），合同可能终止或重组。IAG 协议期限长达 14 年，带来收入可见度，但也锁定了定价条款；如果 SAF 成本下降快于预期（可能性较低），或
              Twelve 无法达到合同体量（近期可能性较高），这些条款可能转为不利。

              Twelve 的客户基础按终端市场分散（航空公司 + 企业 + 政府），提供了一定保护；但按合同体量看，商业航空集中度非常高。IAG（例如财务困境、并购）或 United Airlines
              的任何不利事件，都可能实质影响 Twelve 的收入管线。
