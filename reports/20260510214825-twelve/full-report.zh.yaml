      - number: '1.3'
        title: 融资与资本结构
        blocks:
          - type: paragraph
            body: >-
              2015 至 2024，Twelve 通过多轮融资，围绕股权和债务工具累计融资约 $934 million。融资轨迹反映出公司从实验室 R&D 转向商业规模生产基础设施时，资本需求快速抬升。


              最近且规模最大的一次融资发生在 September 2024：Twelve 宣布完成 $645 million 融资，结构混合了项目股权、Series C 股权和债务工具。该轮由 TPG Rise Climate
              领投，其中 $400 million 被分配为 AirPlant One 建设施工的项目专项股权，$200 million 为 Series C 股权融资，另有 $45 million
              来自聚焦可再生能源的贷款方提供的信贷额度。该轮融资让 Twelve 进入独角兽区间，投后估值超过 $1 billion，但具体估值未公开披露。


              2024 轮之前，Twelve 在 2022 完成 $130 million Series B，并在 2021 完成 $57 million Series A。早期种子轮和风险投资轮由
              DCVC、Capricorn Investment Group 和 Breakthrough Energy Ventures 等支持。战略投资方包括 United Airlines（通过 United
              Airlines Ventures）、Alaska Star Ventures（Alaska Airlines 的投资部门）和 Chan Zuckerberg Initiative。与
              Microsoft、Shopify、BCG 的企业可持续发展合作包含采购承诺，提供需求侧验证；部分安排还包括预付款或收入分享。


              资本结构反映了电化学生产设施的资本密集属性；项目股权和债务融资在传统风险股权之外承担了相当大角色。Twelve 能拿到长期承购协议——尤其是与 IAG/British Airways 签订的 785,000
              metric ton、14-year 协议，以及与 United Airlines 签署的 300 million gallon
              谅解备忘录（MoU）——是降低项目融资风险、吸引基础设施级资本的关键。公司未公开报道早期股东的老股交易或流动性事件。
