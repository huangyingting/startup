      - number: '1.4'
        title: 进展与关键指标
        blocks:
          - type: paragraph
            body: >-
              截至 mid-2026，Twelve 的进展主要体现在大规模承购协议、政府合同，以及首座商业生产设施即将完成调试。公司已在长期客户协议中锁定超过 1 billion gallons 的 SAF 承诺，在新兴
              e-fuels 市场中具备需求验证。


              最重要的客户关系来自 British Airways（通过母公司 IAG），后者签署了 785,000 metric ton（约 260 million gallon）、14-year 的 E-Jet SAF
              承购协议。United Airlines 已承诺 300 million gallon MoU，并通过 United Airlines Ventures 直接投资 Twelve。Alaska Airlines
              是另一家航空客户，背后还有 Alaska Star Ventures 的股权投资支持。政府侧进展包括与 U.S. Air Force 签订 SAF 示范和供应合同，使 Twelve 进入军方可持续燃料采购管线。


              企业可持续发展客户包括 Microsoft、Shopify 和 BCG，它们通过 Scope 3 减排承诺购买 SAF。此前宣布的 Mercedes-Benz 合作，则将 Twelve 的 E-Naphtha
              用作汽车零部件原料，证明这套碳转化平台不止能服务航空燃料。


              位于 Washington 州 Moses Lake 的 AirPlant One 于 April 2026 开始调试，初始设计产能约 50,000 gallons of SAF per
              year。该设施既是试点规模生产基地，也是模块化扩张的概念验证。公司尚未公开收入、运行率预测或盈利时间表；但承购承诺的规模表明，一旦产量达到合同水平，年收入潜力可能达到数亿美元。员工数截至 2026 增至约
              260 人，反映工程、制造运营和商业团队扩张。Twelve 在 Berkeley, California 运营 R&D 和试点设施，并在 Washington 州 Moses Lake 运营商业生产场地。
            claimRefs: []
      - number: '1.5'
        title: 重要里程碑
        blocks:
          - type: paragraph
            body: >-
              Twelve 的发展路径跨过十多年，从学术孵化公司走到商业规模部署。公司于 2015 由三名电化学研究人员以 Opus 12 名义创立，早期运营聚焦实验室规模 CO₂ 电解。2021，公司更名为
              Twelve，以体现从 CO₂ 生产十二种不同产品的愿景，也标志着重心转向商业市场。同年，Twelve 完成 $57 million Series A，用于试点规模工艺开发。


              2022，Twelve 获得 $130 million Series B，投资方包括 DCVC 和 Capricorn，为首座商业设施的设计和许可提供资本。同年，公司还为 E-Jet SAF 获得 ASTM
              D7566 Annex A1 认证；这是允许其进入商业航空使用的关键监管里程碑。认证流程由第三方实验室完成严格测试和验证，证明 E-Jet 达到与常规航空燃料掺混所需的性能和安全标准。


              2024，Twelve 宣布在 Washington 州 Moses Lake 建设 AirPlant One，并随后在 September 2024 完成由 TPG Rise Climate 领投的 $645
              million Series C 与项目股权融资。该融资使 Twelve 达到独角兽估值，并提供完成设施建设所需资本。April 2026，公司开始调试 AirPlant
              One，标志着从试点运营走向商业生产准备。


              客户和合作方面，Twelve 在 2024 与 IAG/British Airways 签署了标志性的 785,000 metric ton、14-year 承购协议，按当时体量看是全球最大的 SAF
              承诺之一。United Airlines 正式确认 300 million gallon MoU，并对 Twelve 进行股权投资。更早启动的 U.S. Air Force 合作，最终产出了用于军方测试的 CO₂
              制 SAF 示范批次。公司未公开披露重大负面事件、领导层离任或融资受挫。其里程碑节奏体现了深科技和气候基础设施公司常见的资本密集、跨多年商业化路径。
