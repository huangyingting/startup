      - number: '6.5'
        title: 扩张策略与新客户管线
        blocks:
          - type: paragraph
            body: >-
              Twelve 在客户侧的扩张策略，是让航空公司承诺和企业可持续发展承诺与产能爬坡同步增长。2025 年 5 月宣布的 United Airlines 投资扩大了 Twelve
              的航空客户基础，也带来一层战略投资者关系。截至 2026 年 5 月，公司已与其他航司讨论更多承购协议，但尚未公开宣布。

              在化工产品板块，Mercedes-Benz 和 P&G 试点如果成功，可能演变为更大的商业协议。CO2
              衍生化学品市场（聚碳酸酯、表面活性剂、聚合物）的利润率高于航空燃料，并可能在航空业务放量期间贡献近端收入。这套双市场策略（航空燃料 + 化学品）是 Twelve 实现收入多元化、改善单位经济模型的关键组成部分。

              World Fuel Services 作为 2025 年宣布的分销合作伙伴，在 Twelve 的 go-to-market 策略中扮演关键角色：World Fuel
              的全球燃料储存、掺混和分销基础设施网络，可以加速 E-Jet 交付给 Twelve 无法独立服务的航空客户。不过，Twelve 与 World Fuel 的收入分成方式，以及对 Twelve
              每加仑净收入的影响，尚未披露。Shopify 和 BCG 的证书协议说明，愿意支付溢价的企业可持续发展买家确有需求，但这些体量相对较小。
