      - number: '8.3'
        title: 可比公司估值
        blocks:
          - type: paragraph
            body: >-
              估值 Twelve 需要横跨两组可比对象：（1）已成功商业化 first-of-kind 生产设施的先进清洁技术放量公司；（2）处于相近发展阶段的 SAF 与可持续燃料公司。在 SAF 宇宙中，Neste
              是最接近的上市基准——作为全球最大 SAF 生产商，其交易水平约为未来收入 1.0-1.5x、EBITDA 8-12x。不过，Neste 已处于完整商业规模，而 Twelve
              仍在商业化前，因此需要因执行风险打折。

              私营、商业化前 SAF 公司中，LanzaJet 于 2022-2023 年完成 $200M Series C，隐含估值约 ~$600M-800M，但其采用技术强度较低的 alcohol-to-jet
              路径。HIF Global 已从战略投资者处吸引约 ~$3-5B 总承诺，但仍未形成收入。Twelve 的 $645M Series C 中包括 $200M 股权，隐含估值约 ~$2.5-3.0B（根据 DCVC
              和 TPG 参与条款估计），相对 LanzaJet 有显著溢价，反映 IP 价值和有约束力的承购合同。

              基于收入的可比估值假设 Twelve 到 2027 年凭 AirPlant One 实现 ~$50-100M 收入（按 $15-20/gallon 混合平均售价）。若给予 15-20x
              未来收入倍数（成长阶段溢价），隐含估值为 $750M-2.0B，低于当前隐含估值，说明市场正在定价 Series D 和 AirPlant Two 执行成功。专利组合（US10898880B2 及相关
              IP）带来难以量化的期权价值，但战略投资者溢价已部分体现。
            claimRefs:
              - CV008
              - CV009
              - CV010
              - CV011
