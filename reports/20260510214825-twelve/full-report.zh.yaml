      - number: '3.4'
        title: 护城河韧性与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Twelve 的主要护城河包括：（1）OPUS 反应器 IP 和固体氧化物电解专长，属于自研并受专利保护；（2）摆脱生物投入的原料独立性，避开 HEFA 面临的土地使用竞争和供给约束；（3）商业规模 ASTM
              A1 认证 PtL SAF 的先发优势；（4）与 Alaska Airlines、Microsoft 和 DoD 项目建立的客户关系。OPUS
              反应器是核心技术护城河：它使用固体氧化物电解电池（SOECs），以高效率将 CO2 直接转化为 CO；Twelve
              内部开发了该技术并持有关键专利。这个差异真实存在，但面对资源雄厚的既有巨头并不稳固。最危险的竞争向量包括：（a）Neste 或 Shell 借助大资产负债表和现有燃料分销基础设施进入电解 SAF；（b）Air
              Company 或 Infinium 在 Twelve 完成商业放大前更快降本；（c）若绿色 H2 成本如部分分析师预测在 2030 降至 $1/kg，hydrogen-to-liquid（HtL）技术可能比
              PtL 进展更快；（d）监管变化削弱 PtL 子强制要求保护，例如 ReFuelEU 修订后允许 HEFA 计入 PtL 强制要求。护城河韧性评估为中等：自研但并非不可攻破，未来 5-10
              年面临资本更充足竞争者的显著风险。
