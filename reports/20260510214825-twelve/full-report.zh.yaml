      - number: '8.2'
        title: 乐观与悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              Twelve 的乐观情景由三股力量支撑：（1）监管强制要求让航空公司采购 SAF 从自愿变成必须；（2）Twelve 在 CO2-to-SAF 路径上拥有独特 IP 和技术先发；（3）长期签约需求在
              AirPlant One 及后续设施规模化生产后提供收入可见度。在这个情景下，Twelve 会成为合成航空燃料领域的
              Neste：一家占主导地位的平台公司，拥有专有技术、来自战略投资者兼客户的锁定需求，并能在可再生电力便宜且 CO2 可获得的地区全球扩张。

              悲观情景建立在三重失败叠加之上：（1）AirPlant One 未达到生产成本或产量目标；（2）45Z 抵免在 2027 年 12 月到期，且国会没有延长，关键经济补贴消失；（3）随着生物原料 SAF
              快速扩张，HEFA SAF 价格进一步下降，侵蚀 Twelve 的定价权。在这个情景下，Twelve 无法以可接受条款完成 Series D，必须重新谈判 IAG 和 United
              承购协议，并在达到商业可行性前经历多年延迟。

              基准情景假设 AirPlant One 部分成功（成本为预测的 1.5-2x）、Series D 以适度稀释完成、45Z 再延长 3-5 年，且 EU ReFuelEU
              强制要求创造足够欧洲需求，在美国政策仍不确定时支撑增长。在这个情景下，Twelve 于 2032-2035 年达到 gigascale，并在 2033 年实现与 HEFA-SAF 的成本平价。
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV007
