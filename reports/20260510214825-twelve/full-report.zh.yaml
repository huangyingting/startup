      - number: '5.7'
        title: 图表
        blocks:
          - type: callout
            title: 获 ASTM 认证、并经美国空军验证的可直接替代燃料
            body: >-
              Twelve 的 E-Jet 已取得 ASTM D7566 Annex A1 认证，并获美国空军研究实验室验证为首个无化石、CO2
              衍生航空燃料。国际航空标准机构和美国国防体系的双重验证，提供了竞争对手难以复制的强第三方背书。
            calloutType: strength
            claimRefs:
              - CE007
              - CE008
          - type: callout
            title: 放量死亡谷：AirPlant One 目前仍只有 50,000 Gal/Year
            body: >-
              AirPlant One 的初始产能约为每年 50,000 加仑，距离满足哪怕一小部分全球航空燃料需求都差多个数量级。从 AirPlant One 走向 gigascale 生产，Twelve
              必须在每一个数量级上解决工程难题；这条放量「死亡谷」已经吞噬过许多清洁能源技术。
            calloutType: risk
