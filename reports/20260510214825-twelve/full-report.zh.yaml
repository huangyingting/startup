      - number: '4.5'
        title: 财务判断与尽调摘要
        blocks:
          - type: paragraph
            body: >-
              Twelve 的财务画像符合早期商业化深科技工业公司：相对当前阶段资本充足（已融资 $645M），有可信的长期市场机会，但有意义规模收入尚未形成，商业生产成本曲线也未被验证。AirPlant One
              的收入质量低，因为该设施是示范资产；未来商业 AirPlants 的收入质量取决于承购协议定价、产能利用率和生产成本路径，而这些还无法从公开证据中判断。


              主要财务风险包括：（1）资本强度风险：每座商业 AirPlant 在 EBITDA 转正前需要 $500M-$2B 资本；（2）生产成本风险：PtL 经济性对电力成本、CO2
              原料成本和电解槽效率高度敏感，三者均未在商业规模得到验证；（3）政策依赖风险：45Z 抵免和 ReFuelEU
              强制要求对近期经济性至关重要，且可能受政治变化影响；（4）项目融资风险：债务融资需要有投资级交易对手支持、可银行化的承购合同；（5）稀释风险：现金流转正前还需要多次大额股权融资，早期投资者会遭遇显著稀释。这些都是当前阶段工业深科技公司的正常风险，但任何财务估值都应使用宽不确定性区间。本章记录了所有已知公开财务数据；在任何投资承销前，公开财务缺口表列出的尽调阻碍必须通过保密尽调数据请求解决。
