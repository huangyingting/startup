      - number: '3.3'
        title: 定价与产品组合差异
        blocks:
          - type: paragraph
            body: >-
              各路径的 SAF 定价都相对常规航空燃料有溢价，但溢价幅度随路径和政策抵免是否适用而明显不同。Neste 的 HEFA SAF 在无补贴情况下约为 $2.50-4.00 per gallon；适用 US
              税收抵免（45Z）后约为 $1.00-2.50 per gallon，是市场中最具竞争力的定价。LanzaJet 早期商业体量中的 ATJ SAF 定价约为 $4-6 per gallon。包括
              Twelve、Air Company 和 Infinium 在内的 PtL 生产商，2025-2026 无政策抵免时估计为 $5-15 per gallon；有 45Z 或同等抵免时降至 $3-8 per
              gallon。Twelve 在几个产品组合维度上形成差异：带固定价格递增机制的长期承购协议、工业 CO2 场地的共址定价（可能降低 capex），以及包含 e-naphtha
              的捆绑产品，后者为化学品买方提供第二收入来源。Air Company 和 Infinium 不提供 e-naphtha 作为联产品；LanzaJet 和 Neste 也不提供。这个二级市场入口为 Twelve
              创造了竞争对手缺少的独立变现路径。Twelve 尚未公开 AirPlant One 承购定价；公开确认客户包括 Alaska Airlines 和 Microsoft，说明其以有竞争力的溢价定价谈下了采购量。
