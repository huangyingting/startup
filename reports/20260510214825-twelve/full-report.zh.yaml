      - number: '7.3'
        title: 财务与资本风险
        blocks:
          - type: paragraph
            body: >-
              Twelve 是资本密集型企业，商业规模收入尚未形成。尽管累计融资约 ~$934M，公司仍处于商业化前阶段，AirPlant One 才刚在 2026 年 4 月开始调试。通往 gigascale
              生产还需要数十亿美元级别的新增资本。后续每座 AirPlant 的建设成本都会达到数亿美元到数十亿美元；在资本市场愿意出资建设足以履行 IAG 和 United 合同规模的 AirPlant Two
              之前，公司必须先证明 AirPlant One 能可靠运行。

              2024 年 9 月 $645M 融资的资金结构很重要：总额中，$400M 是项目股权（专门用于 AirPlant One），$25M 是 Fundamental Renewables 的建设贷款，$20M 是
              Sumitomo Mitsui Banking Corporation 的绿色贷款。真正进入公司股权融资的是 $200M Series C。这意味着 Twelve 的公司层面资产负债表流动性，可能低于 $645M
              标题数字所暗示的水平，因为项目股权专门绑定 AirPlant One。

              市场预期 Twelve 会在 AirPlant One 调试期间推进 Series D 融资。清洁技术公司投资者偏好一直波动，2023-2024 年清洁技术融资环境中，多家高知名度公司失败或估值重置。如果
              Twelve 无法以有利条款完成 Series D，或估值低于预期，公司可能被迫大幅稀释现有股东，或压缩扩张时间表。关键路径变量是 AirPlant One 表现：强劲生产数据会推动 Series D
              以有利条款完成；若生产低于预期，融资前景会严重受损。
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
