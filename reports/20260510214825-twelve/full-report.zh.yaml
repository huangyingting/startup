      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >-
              Twelve 的创始团队由三名深科技创业者组成，科学与工程能力互补。Dr. Nicholas Flanders 担任 CEO；他共同创立公司，并带领 Twelve 从实验室规模研究走到商业部署。CTO Dr.
              Kendra Kuhl 负责 OPUS 反应器平台的技术开发与放大，CSO（Chief Scientist）Dr. Etosha Cave 主导基础研究和工艺优化。三名创始人截至 2026
              仍在管理层任职，领导层自 2015 创立以来保持连续。


              公司治理结构包括一个有主要投资方代表参与的董事会。September 2024 Series C 融资后，TPG 旗下气候投资平台 TPG Rise Climate 获得董事会席位，早期投资方 DCVC（Data
              Collective Venture Capital）、Capricorn Investment Group 和 Chan Zuckerberg Initiative（CZI）也参与治理。与 Alaska
              Airlines 绑定的战略投资方 Alaska Star Ventures 同样参与治理。董事会构成混合了财务投资方、战略投资方和使命驱动型股东，使资本部署与航空、化学品脱碳目标保持一致。


              关键人物风险集中在三名创始人组成的管理团队，尤其是 CEO Flanders；他是公司的主要对外发言人和战略负责人。自 2021 从 Opus 12 更名为 Twelve
              以来，公司未公开披露重大领导层变动。Twelve 的顾问网络包括电化学、化学工程和航空脱碳领域专家，但具体顾问委员会构成尚未公开详列。Twelve
              从试点走向商业生产时，制造运营、监管合规和项目融资方面的管理深度，将直接关系到执行风险能否降下来。
