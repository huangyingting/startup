  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览与分层
        blocks:
          - type: paragraph
            body: >-
              Twelve 已搭起横跨三个细分市场的客户基础：商业航空（航空公司）、企业可持续发展买家，以及政府 / 国防。按已承诺体量看，商业航空是最大板块，客户包括 IAG（International Airlines
              Group，British Airways 和 Iberia 的母公司）、United Airlines、Alaska Airlines。IAG 是 Twelve 的标杆商业合同：一份 14 年、785,000
              公吨 E-Jet SAF 协议，也是行业内规模最大的 SAF 采购协议之一。United Airlines 于 2025 年 5 月签署 300 million gallons E-Jet 谅解备忘录，并对
              Twelve 进行了战略股权投资。Alaska Airlines 的风险投资部门 Alaska Star Ventures 参与了 Twelve 的 Series C，也与 Twelve 建有承购关系。

              企业可持续发展板块按体量较小，但行业更分散：Microsoft 将 Twelve 的 SAF 用于 Alaska Airlines 航班上的商务差旅；Shopify 购买 SAF 证书；BCG 签署了 3 年
              SAF 证书协议（2026-2029），覆盖超过 4,000 MT CO2 减排。这类企业买家通常不会锁定大体量，但能带来收入多元化和市场背书。

              政府 / 国防板块由美国空军通过 AFRL、AFWERX 和 SBIR 合同支撑。这些合同验证了 E-Jet 可作为可直接替代航空燃料，也贡献了早期收入和信誉。Mercedes-Benz 与 Procter &
              Gamble 是 Twelve 化工产品（E-Naphtha 前体）的试点客户，代表第三条商业垂直线。
