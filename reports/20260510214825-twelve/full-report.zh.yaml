      - number: '8.4'
        title: 投资逻辑破裂条件与退出触发器
        blocks:
          - type: paragraph
            body: >-
              Twelve 的投资逻辑可能被五个具体事件触发器打破。这些不只是风险，而是客观、可观察的条件；一旦出现，就需要从根本上重估投资案例。投资人应为每个触发器建立监控机制。

              第一，也是最关键的一项：AirPlant One 生产失败。如果 AirPlant One 在调试后 12 个月内无法达到其 50,000 gallon/year 目标产能的至少
              40%，技术商业可行性就会受到质疑，Series D 也会遇到严重逆风。第二：Series D 失败或严重稀释。如果 Twelve 无法在 AirPlant One 调试后 18 个月内，以高于 Series C
              隐含估值的水平完成 Series D，说明市场怀疑公司的执行轨迹。第三：45Z 抵免到期且未延长。该抵免 2027 年 12 月到期，是最具体的近端政策风险。第四：联合创始人离职。在 AirPlant Two
              投资决策前，三位技术联合创始人中任何一位离开，都会抽走技术护城河核心的人力资本。第五：重大安全事故。AirPlant One 的任何重大安全事故都会触发监管审查，并损害航空客户关系。
            claimRefs:
              - CV012
              - CV013
              - CV014
          - type: table
            tableRef: TV005
            claimRefs:
              - CV012
              - CV013
              - CV014
      - number: '8.5'
        title: 最终尽调问题清单
        blocks:
          - type: paragraph
            body: >-
              在决定投资或提高对 Twelve 的投资承诺前，应向公司索取五类尽调数据。第一，AirPlant One
              绩效数据：调试期内任何可用生产指标，包括每日加仑产量、法拉第效率测量值，以及每加仑成本估计。即便是初步数据，也能显著降低技术执行风险。第二，财务模型：Twelve 针对 AirPlant One 和
              AirPlant Two 的内部财务模型，包括资本需求、运营成本假设和按客户拆分的收入预测。第三，承购合同条款：IAG 14 年协议和 United MoU 中的罚则与不可抗力条款，用于理解生产延迟时
              Twelve 的法律风险敞口。第四，Series D 条款：即将进行的 Series D 的计划估值、投资者构成和资金用途。第五，人才留存：联合创始人和关键技术人员当前股权薪酬方案与归属时间表。

              除上述核心尽调项外，投资人还应委托可信的化学工程机构，对 AirPlant One 的设计规格和预期表现做独立技术审查。商业规模技术表现是投资逻辑的核心，仅靠公开信息无法判断。
            claimRefs:
              - CV015
              - CV016
          - type: table
            tableRef: TV006
            claimRefs:
              - CV015
              - CV016
      - number: '8.6'
        title: 图表
        blocks:
          - type: callout
            title: 建议：有条件 INVEST —— 以 AirPlant One 生产数据设门槛
            body: >-
              对 7-10 年投资周期的气候投资人而言，Twelve 是高信念、高风险投资。公司已经具备正确的技术、团队、客户和可观资本。它唯一尚未证明的，是商业规模生产。可以在 Series D
              建立初始仓位，但任何显著加仓都应以 AirPlant One 12+ 个月生产数据为条件，且数据需显示每加仑成本轨迹符合或接近计划。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV003
          - type: callout
            title: 反向观点：没有持续政策支持，E-fuel 经济性可能永远无法平价
            body: >-
              BloombergNEF 和 ICCT 的分析指出，即便按当前成本轨迹假设，PtL SAF 到 2030 年仍会比 HEFA-SAF 贵 4-7x。如果 HEFA 供应显著扩张，且化石航空燃料保持在
              $1,000/tonne 以下，即便有强制要求，航空公司也可能抗拒支付 E-fuel 溢价。Twelve 的经济性依赖永久性政府政策支持，或激进的成本突破——二者都不确定。
            calloutType: risk
            claimRefs:
              - CV004
              - CV009
