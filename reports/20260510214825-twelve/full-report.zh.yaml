      - number: '5.2'
        title: 产品组合：E-Jet 与 E-Naphtha
        blocks:
          - type: paragraph
            body: >-
              Twelve 主要销售两类产品：E-Jet 合成航空燃料和 E-Naphtha 化工原料。E-Jet 可直接替代传统化石航空燃料（Jet A/Jet
              A-1），既能掺混，也能直接替换使用，飞机发动机和加油基础设施无需改造。该产品已取得 ASTM D7566 Annex A1 认证，这是 SAF 审批的核心标准，覆盖
              Fischer-Tropsch（FT）合成路径。航空商业化采用离不开这项认证，因为它确认燃料满足全部安全、性能和兼容性规格。

              按 well-to-wake 口径，E-Jet 的生命周期碳强度据称最高比化石航空燃料低 90%，具体取决于可再生电力来源。使用水电时（例如位于 Moses Lake, WA 的 AirPlant
              One），计入捕集来的 CO2 原料后，碳足迹实际上接近零。美国空军研究实验室（AFRL）已与 AFWERX 合作测试并验证该燃料，并将 Twelve 的 E-Jet 认定为全球首个靠 CO2
              电解生产的无化石合成航空燃料。

              E-Naphtha 是第二个商业化产品，定位是用 CO2 衍生原料替代塑料、溶剂和特种化学品中使用的石化石脑油原料。早期商业试点包括 Mercedes-Benz 将 CO2 衍生聚碳酸酯前体用于汽车零部件（具体为
              C 柱），以及 Procter & Gamble 在 Tide 洗衣液配方中加入 CO2 基化学替代品。这些试点说明，Twelve
              除了航空燃料业务，也能切入溢价更高的化工市场，并可能通过产品多元化改善单位经济模型。
