        - 立即
        - 调查结果出来前全面暂停
      - - IAG 或 United 合同终止
        - 任一航空公司正式退出承购承诺
        - 新闻稿；公司公告
        - 持续
        - 投资逻辑受到实质损害；重新评估市场地位
    notes: 叫停触发因素代表核心投资逻辑受到实质损害的情形。并非所有触发因素都可修复。
    claimRefs:
      - CV012
      - CV013
      - CV014
  - id: TV006
    title: 最终尽调请求表
    columns:
      - 请求事项
      - 优先级
      - 需索取材料
      - 重要性
      - 来源
    rows:
      - - AirPlant One 产量数据
        - P0 - 关键
        - 日度 / 周度产量、法拉第效率、每加仑成本
        - 验证技术逻辑；这是首要投资风险
        - Twelve 管理层（NDA）
      - - 完整财务模型
        - P0 - 关键
        - AirPlant One 与 AirPlant Two 按年份拆分的 capex、opex、收入预测
        - 支持独立估值；暴露关键假设
        - Twelve CFO（NDA）
      - - 承购合同条款
        - P1 - 高
        - IAG 与 United 合同中的不可抗力、未交付罚则、重谈权
        - 量化执行延误带来的法律风险
        - Twelve 法务团队（NDA）
      - - Series D 条款清单
        - P1 - 高
        - 计划估值、投资人构成、资金用途、清算优先权
        - 对当前投资相较 Series D 的定价至关重要
        - 领投方或 Twelve CFO
      - - 人才留任数据
        - P1 - 高
        - 联合创始人与关键工程师股权包、归属时间表、竞争性聘用报价数据
        - 关键人物风险评估
        - Twelve HR / 法务（NDA）
      - - 独立技术评审
        - P2 - 中
        - 独立化工工程公司对 AirPlant One 的设计评审
        - 验证商业规模设计和成本假设
        - 独立委托
      - - IP 格局分析
        - P2 - 中
        - OPUS 核心专利相对竞争对手的自由实施分析（FTO）
        - 确认技术护城河能否持久
        - 独立委托，或向 Twelve 法务索取
    notes: 优先级：P0 = 投资决策前必须完成；P1 = 大幅加仓前必须完成；P2 = 建议纳入持续监测。
    claimRefs:
      - CV015
      - CV016
