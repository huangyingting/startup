      - number: '6.3'
        title: 采用轨迹与商业准备度
        blocks:
          - type: paragraph
            body: >-
              Twelve 的商业采用轨迹反映出公司仍处于早期商业化阶段：所有主要合同都在形成有意义的商业产量前签署，客户承诺的是未来体量，前提是 Twelve 能够放大产能。AirPlant One 于 2026 年 4
              月进入调试，初始产能约为每年 50,000 加仑。这远不足以履行 IAG 或 United 承诺中的哪怕一小部分。因此交付爬坡周期会很长，且完全取决于 Twelve 继续融资并连续建设 AirPlant
              设施的能力。

              对企业可持续发展买家（Microsoft、Shopify、BCG）而言，产品通常是 SAF 证书，而不是实物燃料交付，因此执行风险更低。SAF 证书代表 SAF 已生产并掺混进航空燃料供应所带来的 GHG
              减排收益，买方无需实际接收燃料。该机制广泛用于 CORSIA 和 EU taxonomy 要求下的企业可持续发展报告。

              对航空客户（IAG、United、Alaska）而言，最终仍需要实物燃料交付。这些客户已表达愿意为 SAF 支付溢价，以满足自身脱碳承诺（包括 CORSIA、EU ReFuelEU
              强制要求和企业净零承诺）。监管合规价值和声誉收益会部分抵消他们实际承担的净成本溢价。不过，相比传统航空燃料，SAF 溢价仍然是航空公司的重大财务负担，而航空公司本身利润率很薄。
