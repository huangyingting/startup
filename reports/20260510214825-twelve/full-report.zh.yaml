      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >-
              Twelve 尚未公开披露 AirPlant One 每加仑生产成本。第三方对 2025-2026 PtL SAF 生产成本的估计为无补贴 $5-15 per gallon，其中电力成本占总生产成本
              50-70%。在 Moses Lake，Twelve 可使用水电来源的可再生电力，费率估计为 $0.02-0.05 per kilowatt-hour；相比其他依赖太阳能或风电的地区，这是更有利的原料成本。基于
              PtL SAF 电化学工艺的行业基准，OPUS 反应器每生产 1 kilogram 燃料估计耗电 12-25 kWh，意味着电力成本为 $0.24-1.25 per kilogram，或 $0.90-4.70
              per gallon（以 $0.035/kWh 中位数计算），且尚未计入 CO2 捕集、Fischer-Tropsch 转化、提纯和间接成本。


              按 AirPlant One 的生产经济性，Twelve 当前阶段毛利率很可能为负或接近零，符合深科技工业公司从示范走向商业化时的典型状态。试点规模下，单位年产能资本开支极高：一座 $100
              million+、年产 50,000 gallons 的设施，capex 强度为每年产能加仑 $2,000+，远高于商业目标区间 $5-30 per annual gallon。商业规模（100+ million
              gallons per year）下，PtL 生产商预计 capex 强度会降至 $10-40 per annual gallon，但这要求从 AirPlant One 放大
              2,000-4,000x。营运资本主要由设施建设融资驱动，而不是传统意义上的应收账款或库存。公司 R&D 支出与设施 capex 一起构成现金消耗的重要部分。
