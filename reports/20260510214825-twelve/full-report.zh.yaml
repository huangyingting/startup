      - number: '4.4'
        title: 公开财务缺口与尽调阻碍
        blocks:
          - type: paragraph
            body: >-
              作为工业深科技领域的私营公司，Twelve 存在显著公开财务信息缺口。最重要的缺口包括：收入未披露（未发布 ARR、GMV 或年收入数字）；AirPlant One
              每加仑生产成本未披露，无法验证毛利率；实际账面现金和月度烧钱速度未披露；未来 AirPlant 设施的项目融资条款未披露；Twelve
              与航空公司和政府的承购协议合同条款、定价和采购量承诺均保密。这些缺口叠加起来，使公开尽调阶段无法对 Twelve 做任何经验证的财务承销。基于现有证据的财务判断是：Twelve
              处于示范规模，经济性仍是商业化前水平；收入质量不可验证；利润率路径依赖尚未实现的 3-5 个数量级放大；资本充足性取决于其筹集项目融资和后续股权轮的能力；关键尽调阻碍是生产成本验证、承购合同经济性，以及商业规模
              AirPlants 的项目融资可行性。
