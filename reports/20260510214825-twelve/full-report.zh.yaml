      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >-
              在竞争组内，SAF 生产商最关键的能力差异包括：（1）ASTM D7566
              认证路径和掺混比例，（2）原料独立性和规模化能力，（3）当前生产规模和设施管线，（4）技术成熟度（TRL），以及（5）成本路径和投入成本敏感性。


              Neste 在生产规模（全球 SAF 产能 >3 billion liters/year）和商业成熟度上领先，但完全依赖生物原料（UCO、动物脂肪），面对结构性供给上限。LanzaJet 在 Georgia 运营
              10 million gallons per year 的 Freedom Pines Fuels 设施，使用可持续乙醇，受益于 LanzaTech 碳捕集发酵，但仍保留农业原料依赖。Air Company
              在路径上最接近 Twelve，先把 CO2 直接转化为乙醇，再转为航空燃料；截至 2025，其商业体量仍低于 1 million gallon，且 ASTM E7566 路径与 Twelve 的 A1
              路径不同。Infinium 在 Texas 运营一座 e-methanol 设施，并与 Amazon 有承购合作，但重心是道路交通燃料，而不是纯航空。Velocys 瞄准城市固废等废弃物原料进行
              Fischer-Tropsch，在 UK 开发中的设施曾遭遇融资挑战。TRL 方面，Twelve 和 Air Company 均处于 TRL 7-8，LanzaJet 处于 TRL 9（商业化），Neste
              已完全商业化。Infinium 处于 TRL 7-8。Velocys UK 因建设延迟处于 TRL 6-7。
