      - number: '5.5'
        title: 质量、安全与合规框架
        blocks:
          - type: paragraph
            body: >-
              Twelve 的质量与合规框架以 ASTM D7566 Annex A1 认证为锚点，该认证确立了 Fischer-Tropsch SAF
              的生产和质量控制要求。标准规定了闪点、冰点、黏度、能量密度、芳香烃含量等燃料属性区间。要合规，每一批燃料在被认证符合航空燃料规格前，都必须经过严格批次测试。Twelve 已在研发设施建立实验室测试规程，并承诺在
              AirPlant One 维持同一套质量标准。

              从安全角度看，CO2 电解涉及高压气体处理、在较高功率密度下运行的电气系统，以及可燃合成气中间体生产。Twelve 已部署工程控制、工艺安全管理规程和危险区域分级，做法与工业气体处理标准一致。AirPlant
              One 设施还受 Washington 州环境许可要求，以及 EPA 针对 CO2 捕集和工业化学设施的监管约束。

              航空客户最关键的合规要求，是 E-Jet 满足传统 Jet A 燃料的同等规格，并可依据 CORSIA（国际航空碳抵消和减排计划）认证为合格 SAF。CORSIA 要求 SAF 相比化石燃料基准至少降低 10%
              生命周期排放；使用可再生电力时，Twelve 的 CO2 衍生 E-Jet 宣称减排 90%，显著高于门槛。若客户希望获得 CORSIA 抵免并满足 EU ReFuelEU
              强制要求，完整生命周期碳核算文件必不可少。
            claimRefs:
              - CE021
              - CE022
              - CE023
      - number: '5.6'
        title: 技术风险与开发路线图
        blocks:
          - type: paragraph
            body: >-
              Twelve 的首要技术风险，集中在 OPUS 反应器从当前示范 / 试点规模放大到真正商业化、最终进入 gigascale 生产。CO2
              电解已在实验室和试点规模跑通，但工业电堆放大时会遇到已有充分记录的挑战：大面积 MEA
              上的电流分布、热管理、气体扩散均匀性，以及长期催化剂稳定性。每提升一个数量级，都会引入新的工程难题，可能需要大幅重做电池结构、电堆设计和工厂辅助系统。

              第二个主要技术风险是电到燃料效率，通常以整体 CO2-to-fuel 流程的能量效率表示。当前公开的 CO2 电解 SAF 数据显示，往返效率最好也只有
              50-60%，意味着相当一部分输入的可再生电力以热的形式损失。随着可再生电力成本下降，这个效率指标对经济性的影响会减弱；但按多数市场当前电网电价，效率缺口仍是重要成本驱动因素。

              Fischer-Tropsch 合成环节又增加了一层复杂性：FT
              催化剂对合成气组成、硫杂质、运行温度和压力都很敏感。电解槽会随时间衰减，在这个过程中维持合成气质量稳定，是不小的工程挑战。催化剂寿命和再生成本也会进入工厂运营成本结构。除了美国空军合作之外，第三方技术评估和独立验证将增强投资人对技术商业可行性的信心。
            claimRefs:
              - CE024
              - CE025
              - CE026
              - CE027
              - CE028
