  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心技术：OPUS 反应器
        blocks:
          - type: paragraph
            body: >-
              Twelve 的核心技术创新是 OPUS（Optimized Processes Using Syngas）反应器。这是一种电化学电池，使用膜电极组件（MEA），把
              CO2、水和可再生电力转化为一氧化碳（CO）和氢气（H2），二者合称合成气。随后，合成气通过改良 Fischer-Tropsch 合成路径转化为液态碳氢化合物，包括航空燃料和石脑油。支撑 OPUS
              反应器的基础化学是 CO2 电解：在电催化剂存在下，CO2 分子在 MEA 阴极被还原生成 CO；水在阳极被氧化生成氧气。生成的 CO/H2 合成气组成可通过调整反应器参数来调节，以优化下游燃料合成。


              MEA 架构让 Twelve 能在高电流密度下运行 CO2 还原反应，使工艺在规模化时具备商业可行性。关键技术优势包括：无需中间步骤的直接 CO2 转化、CO
              生产的高法拉第效率、支持堆叠电池配置的模块化反应器设计，以及与水电、风电等间歇性可再生电力来源兼容。Twelve 联合创始人 Dr. Kendra Kuhl 和 Dr. Etosha Cave 在技术商业化前，于
              Stanford University 开展 CO2 电催化基础研究。Dr. Kuhl 关于 CO2 还原催化剂选择性的博士工作，直接影响了 OPUS 反应器阴极设计。公司通过 MEA
              设计迭代持续提升法拉第效率和电流密度，达到在吉瓦级规模和预期学习曲线改善下支撑经济可行性的性能水平。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
