        - label: 当前产量与 IAG 合同需求
          value: <0.1%
          unit: of contracted volume
          trend: up
          detail: AirPlant One 50K gal/yr 对比 IAG 单独需要 785K MT
        - label: 电子燃料相对化石航油的成本溢价
          value: 7-10x
          unit: cost ratio
          trend: down
          detail: $7,000-9,000/tonne 对比 $600-900/tonne 化石航油
        - label: 45Z 抵免到期时间线
          value: '19'
          unit: months
          trend: stable
          detail: 美国 45Z SAF 抵免于 December 2027 到期；延期不确定
        - label: 累计融资与超大规模产能需求
          value: $934M vs $10B+
          unit: est. needed
          trend: up
          detail: 仍需数十亿美元级额外资金来支撑超大规模生产
        - label: SAF 规划产能实际投产比例
          value: 24%
          unit: of planned 2024
          trend: up
          detail: 全行业执行统计，凸显放大风险
        - label: 公开披露的负面事件
          value: '0'
          unit: as of May 2026
          trend: stable
          detail: 未报告安全事故、执法行动或诉讼
    approximationNotes: 成本溢价和资本需求估计基于 ICCT 与 DOE 分析。SAF 产能投产率来自 IATA 2025 数据。
    claimRefs:
      - CR002
      - CR005
      - CR013
      - CR014
      - CR019
  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: standard
    summary: 条件性投资建议的决策逻辑，展示关键关卡和或有结果
    data:
      nodes:
        - id: n1
          label: AirPlant One 是否达成 50K gal/yr 目标？
          type: decision
        - id: n2
          label: 是 → Series D 是否以 >$2B 估值完成？
          type: decision
        - id: n3
          label: 是 → 45Z 抵免是否延期，或 EU 需求是否足够？
          type: decision
        - id: n4
          label: 是 → 强烈投资（扩大仓位）
          type: outcome
        - id: n5
          label: 否（政策）→ 持有（基准情景；跟踪 CORSIA/EU）
          type: outcome
        - id: n6
          label: 否（Series D）→ 暂停（重新评估；技术风险仍在）
          type: outcome
        - id: n7
          label: 否（AirPlant）→ 退出或最低持有（投资逻辑破裂）
          type: outcome
        - id: n8
          label: Series D 阶段初始建仓（生产数据公布前）
          type: step
    approximationNotes: 决策树是简化表达；实际投资决策会纳入生产数据和市场状况的定量分析。
    claimRefs:
      - CV001
      - CV003
      - CV012
  - id: FV002
    title: Twelve 估值敏感性（Series D 隐含）
    type: range
    layout: standard
    summary: Twelve 在 Series D（预计 2026-2027）下，乐观、基准、悲观情景的估值区间估计
    data:
      items:
        - label: 乐观情景（AirPlant One 按计划推进，45Z 延期）
          low: 4000
          high: 6000
          unit: $M implied valuation
        - label: 基准情景（AirPlant One 部分达成，执行中等）
          low: 2000
          high: 3500
          unit: $M implied valuation
        - label: 悲观情景（AirPlant One 表现不及预期，45Z 到期）
          low: 800
          high: 1500
          unit: $M implied valuation
        - label: 当前隐含估值（Series C 后，估计）
          low: 2500
          high: 3000
          unit: $M implied valuation
        - label: LanzaJet 可比公司（2022-2023 Series C，ATJ 路径）
          low: 600
          high: 800
          unit: $M implied valuation
    approximationNotes: 估值区间为作者估计，基于可比公司分析和 Twelve 披露的融资情况。 实际 Series D 估值将反映市场状况。
    claimRefs:
      - CV008
      - CV009
      - CV010
  - id: FV003
    title: 乐观 / 基准 / 悲观收入轨迹
    type: bar
    layout: standard
    summary: 选定年份（2027、2030、2032）按情景划分的收入预测
    data:
      items:
        - label: 乐观 2027（$M）
          value: 75
          unit: $M revenue
        - label: 基准 2027（$M）
          value: 20
          unit: $M revenue
        - label: 悲观 2027（$M）
          value: 5
          unit: $M revenue
        - label: 乐观 2030（$M）
          value: 750
          unit: $M revenue
        - label: 基准 2030（$M）
          value: 150
          unit: $M revenue
        - label: 悲观 2030（$M）
          value: 15
          unit: $M revenue
        - label: 乐观 2032（$M）
          value: 2000
          unit: $M revenue
        - label: 基准 2032（$M）
          value: 400
          unit: $M revenue
        - label: 悲观 2032（$M）
          value: 30
          unit: $M revenue
    approximationNotes: 收入估计具有推测性，基于产能扩张假设：乐观情景假设到 2030 有 3 座 AirPlant； 基准情景假设 1.5 座 AirPlant；悲观情景假设仅 AirPlant One 且产能打折。
    claimRefs:
      - CV004
      - CV009
      - CV011
      - CV022
  - id: FV004
    title: 投资 KPI：需跟踪的关键指标
    type: kpi
    layout: standard
    summary: 用来跟踪 Twelve 执行是否兑现投资逻辑的优先监控指标
    data:
      items:
        - label: AirPlant One 生产速率（目标 Q4 2026）
          value: 50,000
          unit: gal/yr target
          trend: up
          detail: 最关键指标；从 Q3 2026 开始按季度跟踪
        - label: 隐含估值（Series C 后估计）
          value: $2.5-3.0B
          unit: $ billion
          trend: stable
          detail: 当前隐含估值；关注 Series D，判断市场定价
        - label: 45Z 抵免到期
          value: Dec 2027
          unit: deadline
          trend: stable
          detail: 关键政策日期；按月跟踪美国国会动作
        - label: 已签约承购总量
          value: 785K MT + 300M gal
          unit: contracted volume
          trend: up
          detail: IAG 14-yr + United MoU 对应 $10B+ 收入潜力
        - label: 迄今累计融资
          value: $934M
          unit: total raised
          trend: up
          detail: Series D 预计在 2026-2027；跟踪条款
        - label: 专利组合规模
          value: 10+
          unit: granted/pending US patents
          trend: up
          detail: 技术护城河指标；跟踪 USPTO 新申请
        - label: AirPlant 员工数
          value: ~260
          unit: employees
          trend: up
          detail: 增长指标；关注工厂运营关键招聘
    approximationNotes: KPI 值基于截至 May 2026 的公开可得数据。私营公司指标可能不同于估计值。
    claimRefs:
      - CV001
      - CV002
      - CV011
      - CV015
appendices:
  - id: A
    title: 投资前关键尽调清单
    blocks:
      - type: callout
        calloutType: recommendation
        title: P0：AirPlant One 生产数据
        body: 在 NDA 下索取投产调试期的月度产量、法拉第效率和每加仑成本数据。这是 投资决策最重要的单一数据点。
        claimRefs:
          - CV015
      - type: callout
        calloutType: recommendation
        title: P0：完整财务模型
        body: 索取 Twelve 内部的 AirPlant One 和 AirPlant Two 财务模型，包括资本需求、 运营假设和收入预测。
        claimRefs:
          - CV016
      - type: callout
        calloutType: risk
        title: P1：承购合同条款
        body: 审阅 IAG 和 United 承购协议中的不可抗力、未交付罚则和重新谈判条款， 量化生产延误带来的法律风险敞口。
        claimRefs:
          - CV015
      - type: list
        title: 其他尽调事项
        items:
          - Series D 条款清单：估值、投资者构成、清算优先权
          - 人才留存：联合创始人和关键工程师归属安排
          - 由化学工程公司对 AirPlant One 设计进行独立技术评审
          - IP 格局：针对 OPUS 核心专利的自由实施分析
        claimRefs: []
