      - number: '1.6'
        title: 商业模式与收入来源
        blocks:
          - type: paragraph
            body: >-
              Twelve 的商业模式围绕与航空公司和企业买方签订的长期、带量承诺承购协议展开，并由政府合同和可持续发展合作支撑。公司已经或计划通过三条主要路径产生收入：（1）在多年合同下向航空客户销售 E-Jet
              可持续航空燃料，（2）向工业客户销售 E-Naphtha 和其他化学中间体，（3）面向试点生产和燃料供应的政府及国防合同。


              SAF 收入由多年承购协议托底，这类协议提供价格确定性和需求可见度。British Airways、United Airlines 和 Alaska Airlines
              的合同代表了数亿加仑的承诺量，但定价条款和价格递增机制未公开披露。行业基准显示，e-fuel SAF 定价大约在 $3 到 $10+ per gallon 区间，取决于生产规模、原料成本（主要是可再生电力和
              CO₂ 来源）以及政策激励，例如 U.S. 45Z 税收抵免或 ReFuelEU Aviation 下的 EU 强制要求。


              E-Naphtha 面向希望为原料供应链脱碳的化工生产商。Mercedes-Benz 在汽车零部件生产中试用 E-Naphtha，为该市场提供了概念验证，但商业规模销售尚未见报道。政府合同，包括与 U.S.
              Air Force 的合同，能提供早期收入和验证，但不太可能成为长期销售的大头。


              Twelve 的成本结构主要由电解槽基础设施的资本开支，以及可再生电力、CO₂ 捕集或采购、设施运营的运营开支构成。e-fuel 生产经济性对电力成本高度敏感；行业分析认为，可再生电力占总生产成本的
              50-70%。Twelve 的竞争位置取决于能否通过购电协议（PPAs）拿到低成本可再生能源，并优化 OPUS 反应器效率，尽量降低每加仑燃料耗电量。截至 mid-2026，Twelve
              尚未披露单位经济、毛利率或现金流预测。盈利路径取决于达到目标产量、释放规模效率，并受益于政策支持机制，从而缩小 e-fuels 与化石替代品之间的价差。
            claimRefs: []
  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >-
              Twelve 主要竞争于可持续航空燃料（SAF）市场，尤其是电力制液体燃料（power-to-liquids，PtL）或电燃料（electrofuel，e-fuel）子赛道；该路径使用捕获的
              CO2、可再生电力和水作为投入，而不是生物来源原料。更广义的 SAF 市场包含多条生产路径：加氢处理酯类和脂肪酸（HEFA）、alcohol-to-jet（ATJ）、来自生物质或废弃物的
              Fischer-Tropsch（FT），以及 PtL/e-fuels。HEFA 基 SAF 目前是主导商业路径，截至 2024 占全球 SAF 体量超过 85%。Twelve 的 OPUS 反应器技术生产经
              ASTM D7566 Annex A1 认证的 e-fuel SAF（E-Jet），是其核心产品，可按最高 50% 浓度与常规航空燃料掺混。


              支出边界包括：（1）在长期承购协议下卖给航空公司的 SAF（主要部分），（2）卖给工业买方的可持续化学原料（e-naphtha），以及（3）政府合同下的燃料和 R&D 供应。排除项包括常规航空燃料（Jet
              A/A-1）、SAF 路径之外的生物燃料掺混，以及地面交通燃料。相邻市场包括碳移除信用、绿色氢气和合成化学品。现状替代品是常规化石航空燃料，价格为 $0.60-0.90 per gallon；或既有 HEFA
              SAF，价格为 $2.50-4.00 per gallon。PtL e-fuels 有显著溢价，但可获得政策支持（45Z 税收抵免、EU ETS 碳成本节省、ReFuelEU
              强制要求），部分弥合价差。Twelve 的竞争优势主张建立在原料独立性（不占用生物质土地）和通过可再生电力、捕获 CO2 实现规模化之上；这些投入不受限制 HEFA 扩张的原料瓶颈约束。
