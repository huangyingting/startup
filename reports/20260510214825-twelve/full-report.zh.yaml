      - number: '7.5'
        title: 团队、执行与不利事件风险
        blocks:
          - type: paragraph
            body: >-
              Twelve 创始团队由三位技术联合创始人（Flanders、Kuhl、Cave）组成，他们在 CO2 电解领域的专门能力，是公司技术护城河的根基。关键人风险偏高：任何创始人离开，尤其是技术联合创始人 Dr.
              Kuhl 或 Dr. Cave 离开，都可能拖慢技术开发并削弱投资人信心。随着公司扩张到 ~260 名员工及以上，留住并吸引电化学、化学工程和工厂运营方面的专门人才，会越来越关键。

              AirPlant One 的执行风险是最迫近的问题。商业规模工厂调试本来就复杂，first-of-kind 设施延迟达到稳态生产很常见。Twelve 运行商业 SAF
              工厂的运营经验有限，工厂运营、安全管理和规模化质量控制的学习曲线可能比预期更陡。建设成本超支也可能比计划更快消耗项目股权。

              不利事件方面，截至 2026 年 5 月，Twelve 尚无公开报道的安全事故、监管执法行动或重大法律纠纷。没有公开披露的不利事件，与其早期阶段相符，但不保证未来安全表现。AirPlant One
              若发生重大安全事故，可能触发监管审查、运营停摆，并损害航空客户关系；这类客户对安全相关联想尤其敏感。
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
