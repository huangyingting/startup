      - number: '2.5'
        title: 规模测算尽调缺口与矛盾
        blocks:
          - type: paragraph
            body: >-
              多个重大尽调缺口限制了 Twelve 具体可触达市场的市场规模以及 TAM/SAM/SOM 估计精度。第一，没有公开分析师用一致方法单独覆盖 PtL e-fuel SAF 子市场；所有主要市场报告都把 PtL
              合并进更广义的 SAF 总量，并不提供 PtL 特定收入预测。第二，本章审阅的 2030 和 2035 市场估计，对更广义 SAF 市场的区间从 $5 billion 到 $25 billion
              不等，反映出监管执行率、降本路径和供应链发展存在真实不确定性。


              第三，IATA 和 ICAO 的需求估计假设监管得到完全遵守，但历史上并未兑现：2025 SAF 目标在 2024 未实现，实际产量不到全球航空燃料消费的 0.2%。第四，Twelve 的 PtL SAF SOM
              还受单一设施 AirPlant One（50,000 gallons/year 初始产能）约束；即使与最保守的 SAM 估计相比，当前市场份额也可忽略。这些缺口说明 TAM/SAM
              估计适合做方向性分析，但不应作为 Twelve 收入预测的精确输入。SOM 更适合用 Twelve 当前和计划产能、已签约承购量自下而上建模，而不是从自上而下市场份额假设推出。
            claimRefs:
              - CM022
              - CM023
              - CM024
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Twelve 处在两个重叠的竞争空间：可持续航空燃料（SAF）生产和可持续工业化学品（e-naphtha）。在 SAF 内部，竞争者覆盖所有路径（HEFA、ATJ、FT、PtL），其中 HEFA
              基生产商主导当前商业体量。PtL/e-fuel SAF 的直接竞争只来自少数资金充足的初创公司，以及探索电解 CO2 转化的既有化工公司。


              主要直接 PtL SAF 竞争者包括 LanzaJet（使用 LanzaTech 发酵乙醇的 alcohol-to-jet 路径）、Air Company（CO2-to-ethanol-to-jet，经
              Fischer-Tropsch）、Infinium（由 CO2、水和绿色 H2 制 e-methanol，再转化为航空燃料）和 Velocys（来自生物质和废弃物 CO2 的
              Fischer-Tropsch）。通过 HEFA 构成的主要间接竞争者包括 Neste（全球最大 SAF 生产商）、World Energy 和 SkyNRG。在可持续化学品领域，Air Company 以及
              Electrochaea、Opus12 spinoffs 等专业电化学公司竞争 e-naphtha 供应。没有单一竞争者完全匹配 Twelve 的特定电解槽直连路径：OPUS 反应器通过固体氧化物电解把 CO2
              转化为 CO，再通过 Fischer-Tropsch 转化为碳氢化合物。Twelve 的竞争差异集中在原料独立性（不占用生物质土地、无需农业投入）、CO2-to-jet 直接转化效率，以及支持部署到工业 CO2
              排放现场的模块化工厂设计。
