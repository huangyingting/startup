      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >-
              SAF 市场由监管、企业和经济力量共同推动。监管侧，EU 的 ReFuelEU Aviation mandate（Regulation 2023/2405）要求 2025 年 SAF 掺混比例达到 2%，2030
              升至 6%，2050 升至 70%；其中还对 PtL 单独设定子强制要求，2030 为 1.2%，2050 为 35%。U.S. 45Z Clean Fuel Production Credit
              对符合生命周期碳强度门槛的 SAF 提供最高 $1.75/gallon。CORSIA Phase 1 要求参与航空公司到 2030 每年使用约 10 billion liters SAF。UK 的
              Sustainable Aviation Fuel Mandate 要求 2030 年 SAF 占比 10%。


              需求侧，承诺 2050 净零的航空公司已覆盖全球航空运力超过 80%（IATA Net Zero Carbon commitment）。Scope 3 报告标准（GHG Protocol、SBTi）和投资者
              ESG 框架（EU Taxonomy、TCFD）带来的企业可持续发展要求，正在加速 SAF 凭证采购。关键采用约束包括：PtL SAF
              相对既有燃料生产成本极高；缺少吉瓦级低成本可再生电力；新建生产设施资本强度高。工业规模 CO2 原料来源，以及电化学设施建设周期长，是 Twelve 技术路径的额外约束。电力成本占 PtL SAF 生产成本
              50-70%，使可再生电力价格成为 e-fuel SAF 经济性中最关键的单一变量。
