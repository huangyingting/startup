      - number: '4.3'
        title: 资本充足性、进展与融资
        blocks:
          - type: paragraph
            body: >-
              Twelve 通过 Series D 累计完成约 $645 million 股权融资。融资时间线已在公司概况章节记录。本章聚焦未来资本充足性和融资充足性。


              按 Twelve 当前烧钱速度估计——基于员工数（约 200-300 人）和设施开发活动，每月约 $8-20 million——$645 million 累计资本从最近一次交割起可提供约 2-4
              年现金跑道，具体取决于 AirPlant 扩张承诺和项目融资安排的时点与规模。Twelve 表示，计划用项目融资（以承购协议现金流为基础的债务融资）建设更大的商业设施，降低每 gigaliter
              级产能所需股权资本。这是能源项目开发商的标准打法；关键风险在于，承购协议期限和定价必须支撑项目融资贷款方可接受的债务偿付覆盖率。


              公开进展指标有限：AirPlant One 生产产能（50,000 gal/yr）和多个已确认承购客户，是主要披露指标。收入未披露。烧钱速度和现金跑道未披露。下一次融资触发点很可能与 AirPlant
              扩张财务交割或项目融资里程碑绑定。考虑到 e-fuel 生产设施的资本强度，资本充足性风险显著：一座年产 100 million gallons 的商业规模 AirPlant，在达到正 EBITDA 前估计需要
              $500 million 到 $2 billion 资本投入。
