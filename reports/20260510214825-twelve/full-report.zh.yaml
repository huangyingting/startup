      - number: '6.2'
        title: 核心承购合同与合作条款
        blocks:
          - type: paragraph
            body: >-
              Twelve 最重要的客户承诺，是 2024 年宣布的与 IAG（International Airlines Group）签署的 14 年、数百万加仑承购协议。协议覆盖 785,000 公吨 E-Jet
              SAF，约等于 260 million gallons 燃料。按体量和期限看，这是史上最大的 SAF 承购协议之一。协议从 2025 年开始交付，持续到约 2038-2039
              年。关键问题在于，定价条款未公开披露；如果无法直接看到合同条款，就无法评估合同的财务价值。

              United Airlines 于 2025 年 5 月宣布对 Twelve 进行战略股权投资，并签署 300 million gallons E-Jet SAF 谅解备忘录。股权投资让 United 成为
              Twelve 成功的利益相关方，双方激励更加一致。MoU 不具备约束力；能否把这份 MoU 转为带交付时间表和定价的有约束力承购合同，将是需要重点观察的里程碑。

              Alaska Airlines 通过其风险投资部门 Alaska Star Ventures（参与 Twelve 的 Series C）也与 Twelve 建有承购关系。Microsoft 与 Alaska
              Airlines 有一项联合安排：Microsoft 为员工搭乘 Alaska 航班的商务差旅购买 SAF 证书，底层使用 Twelve 的 E-Jet。BCG 签署了一份 3 年 SAF 证书协议，覆盖
              2026 至 2029 年约 4,000+ 公吨 CO2 减排。美国空军则同时贡献合同收入（通过 SBIR 和 AFWERX 项目）和战略验证。
