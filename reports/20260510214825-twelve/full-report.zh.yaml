  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与来源
        blocks:
          - type: paragraph
            body: >-
              Twelve 的收入来自两条主要产品线。第一条、也是最大的产品线是 E-Jet：这是其 ASTM D7566 Annex A1 认证的可持续航空燃料，通过长期承购协议卖给航空公司和政府客户。已确认的承购客户包括
              Alaska Airlines 和 U.S. Air Force，另有 Microsoft 等企业可持续发展买方通过 book-and-claim 安排购买 SAF。第二条收入线是 e-naphtha；这是
              OPUS 反应器工艺的联产品，一种可持续碳氢原料，卖给 Mercedes-Benz、Procter and Gamble 等化工公司，用于可持续包装和汽车应用。


              Twelve 不披露收入。其位于 Washington 州 Moses Lake 的首座商业设施 AirPlant One，E-Jet 初始年产能约 50,000 gallons per year。按估计
              $5-12 per gallon（含政策抵免）的定价，AirPlant One 满负荷运行时，仅 SAF 每年可产生约 $250,000 到 $600,000；相对于 Twelve 约 $645 million
              的累计融资，这仍是商业化前的示范规模收入。AirPlant One 更准确的定位是商业示范和技术验证设施，而不是主要收入来源。Twelve 的规模化收入模式依赖多 gigaliter 级 AirPlant
              设施，在长期合同下每年产生数亿美元 SAF 和 e-naphtha 收入。公司披露过更大规模设施计划，但截至 May 2026，AirPlant One 之外尚未宣布已有调试完成的商业规模设施。


              收入确认并不复杂：燃料和化学品在承购协议下交付时确认。没有订阅、经常性 SaaS 或交易平台型收入。营运资本动态受设施建设资本强度和承购协议付款时间影响。政策抵免收入（45Z Clean Fuel
              Production Credit）单独作为税收收益确认，在当前定价下可能占净收入有意义的一部分，部分抵消相对化石航空燃料的成本溢价。
