      - number: '7.4'
        title: 市场与竞争风险
        blocks:
          - type: paragraph
            body: >-
              E-fuel 市场面临结构性逆风：相较传统航空燃料，成本溢价长期存在。当前 Power-to-Liquid SAF 成本约为每公吨 $7,000-9,000，而化石航空燃料为每公吨 $600-900，溢价达到
              7-10x。即便计入 45Z 抵免和 CORSIA 合规价值，只要没有监管强制，航空公司仍会承受显著经济压力，并倾向于压低 SAF 采购。European ReFuelEU 是最具约束力的此类要求，但 EU
              之外运营的航空公司受到的监管强制较弱。

              SAF 领域的竞争对手包括成本更低的 HEFA 生产商（Neste、World Energy、HIF Global），以及采用不同技术路径的其他 e-fuel 生产商。HIF Global 正在 Chile 和
              Texas 开发 gigascale PtL（Power-to-Liquid）设施，采用另一套 CO2 + 电解路线。LanzaJet 使用从乙醇出发的
              alcohol-to-jet（ATJ）路径，当前资本成本更低。大型石油公司（BP、Shell、TotalEnergies）也在投资 SAF 产能，并可能利用既有炼厂基础设施、资本和客户关系，压低创业型
              e-fuel 生产商的空间。

              一个关键市场风险是原料价格波动。Twelve 的 OPUS 反应器以 CO2（供应充足）和电力为输入，但可再生电价并不固定。如果干旱导致水电可用性下降（对 Moses Lake 的 Columbia River
              水电而言，这是实质风险），或电网拥堵推高电价，Twelve 的生产成本可能显著上升。成本结构依赖单一电力来源（Moses Lake 水电），也带来地理集中风险。
            claimRefs:
              - CR013
              - CR014
              - CR015
              - CR016
