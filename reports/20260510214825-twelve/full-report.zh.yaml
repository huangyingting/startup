companyProfile:
  summary: >-
    Twelve（前身为 Opus 12）是一家总部位于加州 Berkeley 的气候科技公司，开发了 OPUS 电化学反应器，可将 CO2 直接转化为一氧化碳（CO），再通过 Fischer-Tropsch 合成制成 E-Jet
    可持续航空燃料和 E-chemicals。公司由三名 Stanford 背景的电化学家 Nicholas Flanders（CEO）、Etosha Cave（首席科学官）和 Kendra Kuhl（CTO）于 2015
    创立，累计融资约 $934M；截至 April 2026，首座商业生产设施 AirPlant One 正在 Washington 州 Moses Lake 调试。Twelve 拥有 IAG（14-year）长期承购协议，以及
    United Airlines 的谅解备忘录；Microsoft、BCG 和 US Air Force 则购买其 SAF 证书。
