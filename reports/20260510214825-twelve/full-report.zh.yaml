      - number: '5.3'
        title: 制造与商业化放量
        blocks:
          - type: paragraph
            body: >-
              Twelve 位于 Washington 州 Moses Lake 的 AirPlant One 是公司的首个商业规模 SAF 工厂，也是 OPUS 反应器在工业尺度上的关键概念验证。Moses Lake
              的选址，主要看中 Columbia River 水系带来的充足、低成本水电；要让 CO2 电解具备成本竞争力，这一点必不可少。可再生电力是 E-fuel
              生产中最大的可变成本，因此贴近低成本可再生能源布局具有战略必要性。

              AirPlant One 的初始目标产能约为每年 50,000 加仑 E-Jet。这个商业体量相对很小（大型机场每年消耗数百万加仑 SAF），但相较试点规模已经是一次大跨越。2024 年 9 月的 $645M
              融资为建设提供资金，其中包括 TPG Rise Climate 领投的 $400M 项目股权、Fundamental Renewables 的 $25M 建设贷款，以及 Sumitomo Mitsui
              Banking Corporation 的 $20M 绿色贷款。工厂采用模块化设计，堆叠 OPUS 反应器阵列；扩产时可以增加反应器模块，而不是另建全新设施。

              工厂已于 2026 年 4 月开始调试；截至本报告日期，首批商业燃料发货预计很快启动。World Fuel Services 已宣布成为物流合作伙伴，帮助推进 E-Jet 的商业准备和分销。Twelve
              的长期制造路线图设想建设多座 AirPlant；技术沿学习曲线成熟后，后续每座工厂都应受益于资本成本下降。公司曾表达过 gigascale 生产雄心，这意味着设施规模要比 AirPlant One
              大出多个数量级，也需要相应更大规模的融资。
