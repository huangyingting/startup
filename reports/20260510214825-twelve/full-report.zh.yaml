chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与使命
        blocks:
          - type: paragraph
            body: >-
              Twelve, Inc.（前身 Opus 12, Inc.）是一家总部位于 Berkeley, California 的碳转化公司，2015 年由 Dr. Nicholas Flanders（CEO）、Dr.
              Kendra Kuhl（CTO）和 Dr. Etosha Cave（CSO）创立。2021 年，公司从 Opus 12 更名为 Twelve，强调把 CO₂ 转化为十二种具备商业可行性产品的目标。Twelve
              的核心技术是 OPUS 反应器——一套自研、基于膜电极组件（MEA）的电化学 CO₂ 转化系统；它把捕获的二氧化碳、水和可再生电力转化为 E-Jet® 品牌的可持续航空燃料（SAF），以及包括 E-Naphtha
              在内的化学前驱体。截至 April 2026，Twelve 正在 Washington 州 Moses Lake 调试首座商业规模生产设施 AirPlant One，初始设计产能约 50,000 gallons
              of SAF per year。September 2024 融资后，公司估值进入独角兽区间（>$1 billion），迄今通过股权和债务工具累计融资约 $934 million。


              Twelve 将自身定位为打造「world made from air」的底层使能者，目标是用直接利用 CO₂、电化学合成的替代品，替换化石来源的燃料和化学品。其技术已通过 ASTM D7566 Annex A1
              可持续航空燃料认证，可直接替代常规航空燃料。Twelve 的商业模式围绕航空公司长期承购协议、政府合同和企业可持续发展合作展开；战略客户关系包括 British Airways（IAG）、United
              Airlines、Alaska Airlines、U.S. Air Force、Microsoft、Shopify、Mercedes-Benz 和 Procter & Gamble。公司知识产权组合包括 U.S.
              Patent No. 10,898,880 B2，覆盖电化学 CO₂ 还原技术的若干方面。截至 mid-2026，Twelve 约有 260 名员工，正从试点规模示范转向商业生产。
