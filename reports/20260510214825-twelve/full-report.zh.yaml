      - number: '7.6'
        title: 图表
        blocks:
          - type: callout
            title: AirPlant One 是投资逻辑破裂触发器：一座工厂，押上全部
            body: >-
              Twelve 的整个商业叙事都取决于 AirPlant One 按预测运行。如果 AirPlant One 达不到产量目标、出现重大成本超支或发生安全事故，Twelve 融资 Series D、履行 IAG 与
              United 承诺、维持投资人和客户信心的能力都会受损。如果 AirPlant One 表现不及预期，公司没有备用商业工厂可接上。
            calloutType: risk
            claimRefs:
              - CR001
              - CR010
              - CR017
          - type: callout
            title: 政策风险：45Z 抵免将在 2027 年 12 月断崖
            body: >-
              45Z Clean Fuel Production Credit 价值最高 $1.75/gallon，除非国会延长，否则将在 2027 年 12 月到期。Twelve 到 2026
              年才刚进入商业化生产，意味着尚未形成有意义规模前，抵免就可能到期。没有这项抵免，E-Jet 经济性会显著恶化；若缺少溢价客户合同或替代政策支持，项目可能难以成立。
            calloutType: risk
            claimRefs:
              - CR005
              - CR008
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议
        blocks:
          - type: paragraph
            body: >-
              Twelve 获得有条件 INVEST 建议。公司已集齐一组异常强的资产：获得专利的 CO2 电解技术平台、通过 ASTM 认证的 SAF 产品、包括 IAG 和 United Airlines
              在内的战略投资者兼客户、有约束力的长期承购合同，以及足以支持 AirPlant One 调试的 $645M 资金池。Twelve 的技术差异化在于不受生物质原料约束，并可利用充足 CO2
              和可再生电力扩张，这让公司站在 SAF 内部最大的可触达市场上。

              不过，乐观情景高度依赖 AirPlant One 达到或超过设计规格。公司正首次从已验证的试点规模技术转向商业规模生产，这个转换是投资中最大的单点二元风险。2027 年 12 月 45Z
              抵免到期断崖、前方数十亿美元级资本需求，以及 E-fuel 相比化石航空燃料 7-10x 的成本溢价，都构成实质执行依赖。

              最合适的投资结构是：（1）在当前估值下建立初始仓位，但以前提条件绑定 Series D 完成；随后（2）在取得 12 个月 AirPlant One
              生产数据并验证每加仑成本轨迹后，再考虑显著提高配置。若早期投资人能在 Series D 中拿到额度，就可能在公司用实际表现降低投资风险前，获得商业化前定价优势。
            claimRefs:
              - CV001
              - CV002
              - CV003
