  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与放量风险
        blocks:
          - type: paragraph
            body: >-
              Twelve 最根本的风险，是把 OPUS 反应器从当前 AirPlant One 示范规模（~50,000 gallons/year）放大到 gigascale
              产量，以履行已签署的承购协议并实现商业竞争力。能源技术商业化历史中，试点规模表现良好、却无法在商业规模跑出经济性的案例比比皆是，这就是所谓「死亡谷」。CO2
              电解尤其如此，若进入规模化，几类技术挑战会更尖锐：大面积 MEA（membrane electrode
              assembly）上的电流分布、连续工业运行下的长期催化剂稳定性、大型反应器电堆中的热和气体管理，以及工厂辅助系统可靠性。

              Fischer-Tropsch 合成环节又增加了复杂性。FT 催化剂对合成气组成波动、硫痕量杂质和运行温度偏移很敏感。MEA 经过数千小时运行后会衰减，电解槽输出的合成气质量还要保持稳定，这并不简单。FT
              催化剂再生成本和停机时间也会增加运营费用；这些影响可能要等 AirPlant One 稳态运行较长时间后，才能被充分理解。

              一个关键风险指标，是 AirPlant One 首年运营中的实际每加仑生产成本。如果 AirPlant One 的每加仑成本显著高于 Twelve 的预测，就说明学习曲线比模型更慢，后续 AirPlant
              的资本和运营经济性也会弱于预期。2024 年规划 SAF 产能中，实际投产的只有 ~24%，这说明整个行业在放量执行上都存在风险。
            claimRefs:
              - CR001
