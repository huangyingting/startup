      - number: '2.2'
        title: 市场规模与可触达机会
        blocks:
          - type: paragraph
            body: >-
              2023 全球 SAF 市场规模约为 $1.5-2.0 billion，产量约 600 million liters，而全球航空燃料消费约 330 million metric tonnes。IATA、IEA
              和独立分析师的预测差异很大：IATA 目标是 2025 由 SAF 覆盖 2% 航空燃料（该目标已经错过），2030 达到 10%；按 2024 消费水平计算，2030 年 SAF 需求约为 30-34
              billion liters per year。BloombergNEF 和 McKinsey 预计，在监管加速情景下，SAF 市场到 2030 可能达到 $15-25 billion。IEA 的 Net
              Zero Emissions 情景要求航空燃料碳强度到 2035 下降 54%。


              对 Twelve 来说，最相关的可触达市场是 PtL e-fuel SAF。基准监管情景下，2030 年 PtL 占 SAF 总量的估计在 1% 到 5% 之间，对应 2030 PtL SAF 市场为 $150
              million 到 $1.25 billion。到 2035-2040，如果 PtL 成本显著下降，绿色电力成本降至 $0.02/kWh 以下，PtL 可能占 SAF 的 10-20%，对应 $3-10
              billion 可触达市场。这些估计有很大不确定性，取决于可再生电力成本路径、CO2 捕集经济性和监管强制执行速度。Rocky Mountain Institute 估计 PtL SAF 到 2035 为
              $130-200/barrel（低于当前 $400+/barrel），意味着整个十年仍将维持溢价。多个相互矛盾的估计并存，已在规模测算视角表中记录。
            claimRefs:
