      - number: '5.4'
        title: 知识产权与技术护城河
        blocks:
          - type: paragraph
            body: >-
              Twelve 的主要技术护城河由三层相互强化的资产构成：专利保护、隐性知识和 know-how、行业认证。基础专利是 US10898880B2，题为「Systems and methods for
              electrochemical conversion of carbon dioxide」，覆盖 CO2 电解生成 CO 和合成气所需的 MEA 设计、催化剂组成和反应器架构等关键环节。该专利于 2021
              年获授，在美国提供 IP 保护。Twelve 还围绕相关技术领域提交了国际专利申请。

              正式 IP 之外，公司最难复制的护城河可能是多年迭代 MEA 设计、优化电催化剂和打磨反应器工程后积累的隐性 know-how。高电流密度 CO2 电解仍是高难度技术问题，涉及催化剂衰减、CO2
              交叉渗透、水管理和气体扩散层优化。Twelve 的创始人与工程团队围绕这些难题形成了专有洞察，即便知道专利权利要求，也很难照搬。

              Twelve 的 Fischer-Tropsch SAF 路径获得 ASTM D7566 Annex A1
              认证，本身就是重要的监管护城河：认证流程漫长、昂贵，还需要大量燃料性质测试和安全验证。采用类似生产路径的新进入者必须重复该认证流程，Twelve 因此获得数年先发优势。美国空军验证以及配套的
              AFWERX、SBIR 合同，也带来政府背书，有助于后续争取国防合同和政府采购；这类市场的准入门槛尤其高。
            claimRefs:
