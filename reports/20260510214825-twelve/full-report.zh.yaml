      - number: '7.2'
        title: 监管与政策风险
        blocks:
          - type: paragraph
            body: >-
              Twelve 的经济性高度依赖政府政策支持，尤其是在美国。45Z Clean Fuel Production Credit 对合格 SAF 生产最高提供 $1.75 per gallon 抵免，对冲 E-Jet
              当前规模下高昂生产成本（~$50-70 per gallon）的作用明显。不过，该抵免按现行法律将在 2027 年底到期，对刚进入商业规模的生产商形成显著断崖。延长 45Z
              抵免需要国会行动，在当前美国政治环境下存在不确定性，尤其是在外界担忧 Inflation Reduction Act 长期财政影响的背景下。

              由 ICAO 管理的 CORSIA 机制，是航空公司 SAF 需求的主要国际监管驱动因素。CORSIA 的核心碳抵消要求适用于国际航空，航空公司可通过购买合格 SAF 来满足要求。如果 CORSIA
              资格标准或基准线计算方式调整，Twelve 客户购买 E-Jet 所获得的 CORSIA 抵免价值可能受影响。同样，EU ReFuelEU Aviation 强制掺混要求（2025 年 2% SAF，2050
              年升至 70%）拉动欧洲航司需求；但未来 EU 监管若限制具体技术路径，也可能让某些 SAF 生产商处于不利位置。

              美国国防部对 e-fuels 的采购虽是积极信号，但仍受年度拨款和政策变化约束。LPO（Loan Programs Office）以及其他可向 Twelve
              提供非稀释资本的联邦项目，同样存在政策不确定性。任何行政层面对清洁能源激励的回撤，都可能实质损害 Twelve 的成本结构和市场位置。
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
