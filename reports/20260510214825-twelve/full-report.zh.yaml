      - number: '3.5'
        title: 竞争尽调缺口
        blocks:
          - type: paragraph
            body: >-
              竞争分析中的关键尽调缺口包括：（1）Twelve 尚未披露 AirPlant One 当前每加仑生产成本，无法与竞争者直接做成本基准。（2）Air Company 的生产规模和其声称的 CO2-to-fuel
              效率尚未得到独立第三方验证。（3）Infinium 的 Amazon 承购量和商业定价未披露。（4）Velocys UK 项目融资状态和修订后的调试日期截至 Q2 2026
              仍未确认。（5）若不做专利图谱分析，无法从公开信息评估 Twelve 的 SOEC IP 保护相对于学术 SOEC 研究（如 EPFL、DTU、MIT）的深度。这些缺口很重要，因为它们决定 Twelve
              的成本和技术优势能否在竞争组走向 2028-2030 成熟阶段时继续保持。
            claimRefs:
