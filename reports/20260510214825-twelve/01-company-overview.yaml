sections:
- slug: identity
  title: Identity and Mission
  body: 'Twelve, Inc. (formerly Opus 12, Inc.) is a carbon transformation company headquartered in Berkeley, California, founded
    in 2015 by Dr. Nicholas Flanders (CEO), Dr. Kendra Kuhl (CTO), and Dr. Etosha Cave (CSO). The company rebranded from Opus
    12 to Twelve in 2021 to reflect its focus on transforming CO₂ into twelve commercially viable products. Twelve''s core
    technology—the OPUS reactor, a proprietary membrane electrode assembly (MEA)-based electrochemical CO₂ conversion system—transforms
    captured carbon dioxide, water, and renewable electricity into sustainable aviation fuel (SAF) branded as E-Jet® and chemical
    precursors including E-Naphtha. As of April 2026, Twelve is commissioning its first commercial-scale production facility,
    AirPlant One, in Moses Lake, Washington, with an initial design capacity of approximately 50,000 gallons of SAF per year.
    The company has achieved unicorn valuation status (>$1 billion) following its September 2024 financing round and has raised
    a total of approximately $934 million across equity and debt instruments to date.


    Twelve positions itself as enabling a "world made from air," targeting the displacement of fossil-derived fuels and chemicals
    with electrochemically synthesized alternatives produced via direct CO₂ utilization. The company''s technology is certified
    under ASTM D7566 Annex A1 for sustainable aviation fuel, positioning it as a drop-in replacement for conventional jet
    fuel. Twelve''s business model centers on long-term offtake agreements with airlines, government contracts, and corporate
    sustainability partnerships, with strategic customer relationships including British Airways (IAG), United Airlines, Alaska
    Airlines, the U.S. Air Force, Microsoft, Shopify, Mercedes-Benz, and Procter & Gamble. The company''s intellectual property
    portfolio includes U.S. Patent No. 10,898,880 B2, covering aspects of its electrochemical CO₂ reduction technology. As
    of mid-2026, Twelve employs approximately 260 personnel and is transitioning from pilot-scale demonstration to commercial
    production.'
- slug: leadership-governance
  title: Leadership and Governance
  body: 'Twelve''s founding team comprises three deep-tech entrepreneurs with complementary scientific and engineering expertise.
    Dr. Nicholas Flanders serves as CEO, having co-founded the company and led its evolution from laboratory-scale research
    to commercial deployment. Dr. Kendra Kuhl, CTO, oversees technology development and scaling of the OPUS reactor platform,
    while Dr. Etosha Cave, CSO (Chief Scientist), leads fundamental research and process optimization. All three founders
    remain active in executive roles as of 2026, representing a continuity of leadership since the company''s inception in
    2015.


    The company''s governance structure includes a board of directors with representation from major investors. Following
    the September 2024 Series C financing, TPG Rise Climate—a climate-focused investment platform within TPG—holds a board
    seat alongside earlier investors including DCVC (Data Collective Venture Capital), Capricorn Investment Group, and Chan
    Zuckerberg Initiative (CZI). Alaska Star Ventures, a strategic investor aligned with Alaska Airlines, also participates
    in governance. The board composition reflects a mix of financial, strategic, and mission-driven stakeholders, aligning
    capital deployment with decarbonization objectives in aviation and chemicals.


    Key-person risk is concentrated in the three-founder executive team, particularly CEO Flanders, who serves as the company''s
    primary spokesperson and strategic leader. No material leadership changes have been publicly disclosed since the 2021
    rebrand from Opus 12 to Twelve. The company''s advisory network includes domain experts in electrochemistry, chemical
    engineering, and aviation decarbonization, though specific advisory board composition has not been publicly detailed.
    As Twelve scales from pilot to commercial production, leadership depth in manufacturing operations, regulatory compliance,
    and project finance will be critical to de-risking execution.'
- slug: funding-capital
  title: Funding and Capital Structure
  body: 'Twelve has raised approximately $934 million in total capital across equity and debt instruments through multiple
    financing rounds from 2015 to 2024. The company''s funding trajectory reflects escalating capital requirements as it transitions
    from laboratory R&D to commercial-scale production infrastructure.


    The most recent and largest financing event occurred in September 2024, when Twelve announced a $645 million raise structured
    as a hybrid of project equity, Series C equity, and debt facilities. This round was led by TPG Rise Climate, with $400
    million allocated as project-specific equity for AirPlant One construction, $200 million as Series C equity financing,
    and $45 million in credit facilities from renewable energy-focused lenders. This financing round established Twelve''s
    unicorn status with a post-money valuation exceeding $1 billion, though the exact valuation has not been publicly disclosed.


    Prior to the 2024 round, Twelve completed a $130 million Series B in 2022, followed by a $57 million Series A in 2021.
    Early-stage funding included seed and venture rounds supported by DCVC, Capricorn Investment Group, and Breakthrough Energy
    Ventures. Strategic investors include United Airlines (via United Airlines Ventures), Alaska Star Ventures (Alaska Airlines''
    investment arm), and Chan Zuckerberg Initiative. Corporate sustainability partnerships with Microsoft, Shopify, and BCG
    have included procurement commitments that provide demand-side validation and, in some cases, prepayment or revenue-sharing
    arrangements.


    The capital structure reflects the capital-intensive nature of electrochemical production facilities, with project equity
    and debt financing playing a substantial role alongside traditional venture equity. The company''s ability to secure long-term
    offtake agreements—most notably a 785,000 metric ton, 14-year agreement with IAG/British Airways and a 300 million gallon
    memorandum of understanding (MoU) with United Airlines—has been instrumental in de-risking project finance and attracting
    infrastructure-scale capital. No secondary transactions or liquidity events for early shareholders have been publicly
    reported.'
- slug: traction-metrics
  title: Traction and Key Metrics
  body: 'As of mid-2026, Twelve''s traction is characterized by large-scale offtake agreements, government contracts, and
    the imminent commissioning of its first commercial production facility. The company has secured commitments for over 1
    billion gallons of SAF across long-term customer agreements, positioning it as a demand-validated player in the emerging
    e-fuels market.


    The most significant customer relationship is with British Airways (via parent company IAG), which signed a 785,000 metric
    ton (approximately 260 million gallon), 14-year offtake agreement for E-Jet SAF. United Airlines has committed to a 300
    million gallon MoU and has made a direct equity investment in Twelve via United Airlines Ventures. Alaska Airlines is
    an additional airline customer, supported by equity investment from Alaska Star Ventures. Government traction includes
    contracts with the U.S. Air Force for SAF demonstration and supply, positioning Twelve within the military''s sustainable
    fuel procurement pipeline.


    Corporate sustainability customers include Microsoft, Shopify, and BCG, which have purchased SAF via Scope 3 emissions
    reduction commitments. The Mercedes-Benz partnership, announced in prior years, involved using Twelve''s E-Naphtha as
    a feedstock for automotive components, demonstrating the versatility of the carbon transformation platform beyond aviation
    fuel.


    AirPlant One, located in Moses Lake, Washington, began commissioning in April 2026 with an initial design capacity of
    approximately 50,000 gallons of SAF per year. This facility serves as both a pilot-scale production site and a proof-of-concept
    for modular expansion. While the company has not publicly disclosed revenue figures, run-rate projections, or profitability
    timelines, the scale of offtake commitments suggests potential revenue in the hundreds of millions of dollars annually
    once production reaches contracted volumes. Headcount has grown to approximately 260 employees as of 2026, reflecting
    expansion in engineering, manufacturing operations, and commercial teams. Twelve operates R&D and pilot facilities in
    Berkeley, California, and the commercial production site in Moses Lake, Washington.'
- slug: milestones
  title: Major Milestones
  body: 'Twelve''s development trajectory spans over a decade, from academic spinout to commercial-scale deployment. The company
    was founded in 2015 as Opus 12 by three electrochemistry researchers, with initial operations focused on laboratory-scale
    CO₂ electrolysis. In 2021, the company rebranded to Twelve to reflect its ambition to produce twelve distinct products
    from CO₂, signaling a shift toward commercial market focus. The same year, Twelve raised a $57 million Series A, enabling
    pilot-scale process development.


    In 2022, Twelve secured a $130 million Series B led by investors including DCVC and Capricorn, providing capital for the
    design and permitting of its first commercial facility. That year, the company also obtained ASTM D7566 Annex A1 certification
    for its E-Jet SAF product, a critical regulatory milestone enabling commercial aviation use. The certification process
    involved rigorous testing and validation by third-party laboratories to demonstrate that E-Jet meets performance and safety
    standards for blending with conventional jet fuel.


    In 2024, Twelve announced the construction of AirPlant One in Moses Lake, Washington, and subsequently closed its $645
    million Series C and project equity round in September 2024, led by TPG Rise Climate. This financing enabled Twelve to
    reach unicorn valuation status and provided the capital necessary to complete facility construction. In April 2026, the
    company began commissioning AirPlant One, marking the transition from pilot operations to commercial production readiness.


    On the customer and partnership front, Twelve signed its landmark 785,000 metric ton, 14-year offtake agreement with IAG/British
    Airways in 2024, one of the largest SAF commitments by volume globally at the time. United Airlines formalized its 300
    million gallon MoU and made an equity investment in Twelve. The U.S. Air Force partnership, initiated earlier, culminated
    in the production of demonstration batches of SAF from CO₂ for military testing. No material adverse events, leadership
    departures, or financing setbacks have been publicly disclosed. The company''s milestone cadence reflects a capital-intensive,
    multi-year path to commercialization typical of deep-tech and climate infrastructure ventures.'
- slug: business-model
  title: Business Model and Revenue Streams
  body: 'Twelve''s business model centers on long-term, volume-committed offtake agreements with airlines and corporate buyers,
    supported by government contracts and sustainability partnerships. The company generates—or plans to generate—revenue
    through three primary streams: (1) sale of E-Jet sustainable aviation fuel to airline customers under multi-year contracts,
    (2) sale of E-Naphtha and other chemical intermediates to industrial customers, and (3) government and defense contracts
    for pilot production and fuel supply.


    The SAF revenue stream is anchored by multi-year offtake agreements that provide price certainty and demand visibility.
    Contracts with British Airways, United Airlines, and Alaska Airlines represent hundreds of millions of gallons of committed
    volume, though pricing terms and escalation mechanisms have not been publicly disclosed. Industry benchmarks suggest e-fuel
    SAF pricing ranges from $3 to $10+ per gallon depending on production scale, feedstock costs (primarily renewable electricity
    and CO₂ sourcing), and policy incentives such as the U.S. 45Z tax credit or EU mandates under ReFuelEU Aviation.


    The E-Naphtha stream targets chemical producers seeking to decarbonize their feedstock supply chains. Mercedes-Benz''s
    pilot use of E-Naphtha in automotive parts production demonstrates proof-of-concept for this market, though commercial-scale
    sales have not been reported. Government contracts, including those with the U.S. Air Force, provide early revenue and
    validation but are unlikely to represent a majority of long-term sales.


    Twelve''s cost structure is dominated by capital expenditures for electrolyzer infrastructure and operating expenses for
    renewable electricity, CO₂ capture or sourcing, and facility operations. The economics of e-fuel production are highly
    sensitive to electricity costs, with renewable power representing 50-70% of total production cost according to industry
    analyses. The company''s competitive positioning depends on securing low-cost renewable energy via power purchase agreements
    (PPAs) and optimizing the efficiency of its OPUS reactor to minimize electricity consumption per gallon of fuel produced.
    As of mid-2026, Twelve has not disclosed unit economics, gross margins, or cash flow projections. The path to profitability
    will depend on achieving target production volumes, realizing scale efficiencies, and benefiting from policy support mechanisms
    that narrow the price gap between e-fuels and fossil alternatives.'
