  - id: CR011
    statement: Scaling Twelve from AirPlant One to gigascale production will require many additional billions of dollars in capital, far exceeding the current $934M raised.
    type: estimated
    topic: capital-risk
    sourceRefs:
    - SR001
    - SR002
    confidence: medium
    freshness: current
    answersQuestionRefs:
