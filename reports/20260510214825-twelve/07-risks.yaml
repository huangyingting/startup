    topic: capital-risk
    sourceRefs:
    - SR016
    - SR025
    confidence: medium
    freshness: recent
  - id: CR013
    statement: Current Power-to-Liquid SAF costs approximately $7,000-9,000 per tonne, creating a 7-10x cost premium over fossil jet fuel at $600-900/tonne.
