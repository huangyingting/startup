callouts:
- calloutType: risk
  title: 'AirPlant One Is the Thesis-Break Trigger: One Plant, Everything at Stake'
  body: Twelve's entire commercial narrative hinges on AirPlant One performing as projected. If AirPlant One fails to meet production targets, incurs major cost overruns, or experiences a safety incident,
    it will impair Twelve's ability to raise Series D, fulfill its IAG and United commitments, and maintain investor and customer confidence. There is no fallback commercial plant if AirPlant One underperforms.
  claimRefs:
  - CR001
  - CR010
  - CR017
- calloutType: risk
  title: 'Policy Risk: 45Z Credit Cliff in December 2027'
  body: The 45Z Clean Fuel Production Credit, worth up to $1.75/gallon, expires in December 2027 unless extended by Congress. Twelve is just reaching commercial production in 2026, meaning the credit may
    expire before it has produced at meaningful scale. Without this credit, the economics of E-Jet deteriorate significantly, potentially making it unviable without premium customer contracts or alternative
    policy support.
  claimRefs:
  - CR005
  - CR008
