  claims:
  - id: CR001
    statement: Twelve's OPUS reactor faces scale-up risk from challenges including MEA catalyst degradation, heat management, current distribution at large cell area, and gas diffusion uniformity.
    type: inferred
    topic: technology-risk
    sourceRefs:
    - SR001
    - SR002
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR004
  - id: CR002
    statement: AirPlant One's 50,000 gallon/year initial capacity represents less than 0.1% of what Twelve would need to produce to fulfill its contracted offtake volumes with IAG and United.
    type: estimated
    topic: scale-risk
    sourceRefs:
    - SR002
    - SR011
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR005
  - id: CR003
    statement: IAG's 14-year offtake deliveries should be commencing in 2025-2026, but AirPlant One's initial 50,000 gal/yr capacity is insufficient to fulfill any meaningful portion of the 785,000 MT contracted.
    type: inferred
    topic: contract-risk
    sourceRefs:
    - SR011
    - SR013
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR009
  - id: CR004
    statement: Only approximately 24% of planned 2024 SAF production capacity actually began producing, illustrating industry-wide execution risk in scaling new production facilities.
    type: third-party-reported
    topic: industry-risk
    sourceRefs:
    - SR003
    - SR002
    confidence: high
    freshness: recent
    answersQuestionRefs:
    - QR013
  - id: CR005
    statement: The US 45Z Clean Fuel Production Credit, worth up to $1.75 per gallon for qualifying SAF, is legislated to expire on December 31, 2027, unless extended by Congress.
    type: observed
    topic: regulatory-risk
    sourceRefs:
    - SR004
    - SR005
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR002
    - QR020
  - id: CR006
    statement: The Inflation Reduction Act's clean energy provisions, including the 45Z SAF credit, face uncertain longevity due to potential rollback by future US administrations or Congresses.
    type: inferred
    topic: policy-risk
    sourceRefs:
    - SR005
    - SR006
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR020
  - id: CR007
    statement: EU ReFuelEU mandates require airlines to use 2% SAF in 2025, rising to 6% in 2030 and 70% by 2050, creating regulatory demand that partially offsets cost premiums.
    type: third-party-reported
    topic: regulatory-risk
    sourceRefs:
    - SR010
    - SR009
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR016
  - id: CR008
    statement: The expiry of the 45Z credit in December 2027 creates a critical policy cliff for Twelve, which is just reaching commercial production in 2026 and may not produce at meaningful scale before
      the credit expires.
    type: inferred
    topic: regulatory-risk
    sourceRefs:
    - SR004
    - SR001
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR011
  - id: CR009
    statement: Twelve has raised approximately $934M in total capital and remains pre-revenue at commercial scale as of May 2026, with AirPlant One in commissioning.
    type: third-party-reported
    topic: financial-risk
    sourceRefs:
    - SR016
    - SR013
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR018
  - id: CR010
    statement: Series D funding for Twelve is anticipated following AirPlant One commissioning, with the amount and valuation dependent critically on AirPlant One's production performance.
    type: inferred
    topic: financial-risk
    sourceRefs:
    - SR011
    - SR015
    confidence: medium
    freshness: current
    answersQuestionRefs:
