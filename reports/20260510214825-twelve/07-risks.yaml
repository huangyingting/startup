company:
  name: Twelve
chapter:
  number: 7
  title: Risks
  summary: 'Twelve faces five principal risk categories: (1) technology/scale-up risk from the ''valley of death'' between pilot and commercial production; (2) regulatory/policy risk from uncertain US SAF
    tax credit extension and CORSIA design changes; (3) financial risk from massive capital requirements and pre-revenue status; (4) market risk from persistent 7-10x E-fuel cost premium over fossil jet
    fuel; and (5) competitive risk from oil majors and better-funded e-fuel competitors. The most acute near-term risk is that AirPlant One does not meet its production targets or cost parameters, which
    would impair Twelve''s ability to raise Series D capital needed for subsequent AirPlant facilities.'
sections:
- id: technology-scale-risk
  title: Technology and Scale-Up Risk
  body: 'Twelve''s most fundamental risk is the challenge of scaling the OPUS reactor from the current AirPlant One demonstration scale (~50,000 gallons/year) to the gigascale volumes needed to fulfill
    its contracted offtake agreements and compete commercially. The history of energy technology commercialization is replete with examples of technologies that performed well at pilot scale but failed
    to reach economic viability at commercial scale—a phenomenon known as the ''valley of death.'' For CO2 electrolysis specifically, several technical challenges become more acute at scale: current distribution
    across large MEA (membrane electrode assembly) areas, long-term catalyst stability under continuous industrial operation, heat and gas management in large reactor stacks, and balance-of-plant reliability.


    The Fischer-Tropsch synthesis step adds additional complexity. FT catalysts are sensitive to syngas composition variations, sulfur trace impurities, and operating temperature excursions. Maintaining
    consistent syngas quality from the electrolyzer as the MEA degrades over thousands of operating hours is a non-trivial challenge. FT catalyst regeneration costs and downtime add to operating expenses
    in ways that may not be fully understood until AirPlant One has been operating at steady state for an extended period.


    A key risk indicator will be AirPlant One''s actual production cost per gallon during its first year of operation. If the cost-per-gallon at AirPlant One is significantly above Twelve''s projections,
    it will signal that learning curves are slower than modeled and that the capital and operating economics of subsequent AirPlant facilities will be worse than expected. Only ~24% of planned 2024 SAF
    capacity actually began producing, illustrating industry-wide execution risk in scaling.'
  claimRefs:
  - CR001
  - CR002
  - CR003
  - CR004
  tableRefs:
  - TR002
  figureRefs:
  - FR001
- id: regulatory-policy-risk
  title: Regulatory and Policy Risk
  body: 'Twelve''s economics are significantly dependent on government policy support, particularly in the United States. The 45Z Clean Fuel Production Credit provides up to $1.75 per gallon for qualifying
    SAF production, which is a meaningful offset against the high production cost of E-Jet (~$50-70 per gallon at current scale). However, this credit is currently legislated to expire at the end of 2027,
    creating a significant cliff for producers who are just reaching commercial scale. Extension of the 45Z credit requires Congressional action and faces uncertainty in the current US political environment,
    particularly given concerns about the Inflation Reduction Act''s long-term fiscal impact.


    The CORSIA scheme, administered by ICAO, is the primary international regulatory driver of airline SAF demand. CORSIA''s core CARBON offsetting requirement applies to international aviation, and airlines
    can meet this requirement by purchasing qualifying SAF. Design changes to CORSIA eligibility criteria or baseline calculations could affect the value of CORSIA credits that Twelve''s customers receive
    from purchasing E-Jet. Similarly, the EU ReFuelEU Aviation mandate''s blending requirements (2% SAF in 2025, rising to 70% by 2050) drive European airline demand, but specific technical pathway restrictions
    in future EU regulations could disadvantage certain SAF producers.


    US Department of Defense procurement for e-fuels, while a positive signal, remains subject to annual appropriations and policy changes. The LPO (Loan Programs Office) and other federal programs that
    could provide non-dilutive capital to Twelve are also subject to policy uncertainty. Any administration-level rollback of clean energy incentives could materially harm Twelve''s cost structure and market
    position.'
  claimRefs:
  - CR005
  - CR006
  - CR007
  - CR008
  tableRefs:
  - TR001
  figureRefs:
  - FR002
- id: financial-risk
  title: Financial and Capital Risk
  body: 'Twelve is a capital-intensive, pre-revenue-at-commercial-scale business. Despite raising ~$934M in total capital, the company remains in the pre-commercial phase with AirPlant One just beginning
    commissioning in April 2026. The path to gigascale production will require many billions of additional capital. Each successive AirPlant facility will cost hundreds of millions to billions of dollars
    to build, and the company will need to demonstrate reliable performance at AirPlant One before the capital markets will fund AirPlant Two at the scale needed to fulfill the IAG and United contracts.


    The funding structure of the $645M September 2024 raise is important: of the total, $400M was project equity (dedicated to AirPlant One), $25M was a construction loan from Fundamental Renewables, and
    $20M was a green loan from Sumitomo Mitsui Banking Corporation. The $200M Series C equity represents the actual company equity raised. This means Twelve''s corporate balance sheet may be less liquid
    than the headline $645M suggests, with the project equity being tied to AirPlant One specifically.


    Series D fundraising is anticipated as Twelve commissions AirPlant One. Investor appetite for cleantech companies has been volatile, and the 2023-2024 cleantech funding environment saw multiple high-profile
    failures and valuation resets. If Twelve''s Series D does not close on favorable terms or closes at a lower valuation than expected, the company may be forced to dilute existing shareholders significantly
    or reduce its expansion timeline. The critical path variable is AirPlant One performance—strong production data will catalyze Series D at favorable terms, while production shortfalls could severely
    damage fundraising prospects.'
  claimRefs:
  - CR009
  - CR010
  - CR011
  - CR012
  tableRefs:
  - TR003
- id: market-competitive-risk
  title: Market and Competitive Risk
  body: 'The E-fuel market faces structural headwinds from a persistent cost premium over conventional jet fuel. Current Power-to-Liquid SAF costs approximately $7,000-9,000 per metric ton, compared to
    fossil jet at $600-900 per metric ton—a 7-10x premium. Even with the 45Z credit and CORSIA compliance value, airlines face significant economic pressure to minimize SAF procurement unless regulatory
    mandates force their hand. The European ReFuelEU mandate is the most binding such requirement, but airlines operating outside the EU face less regulatory compulsion.


    Competitors in the SAF space include HEFA producers (Neste, World Energy, HIF Global) who operate at lower production costs, and alternative e-fuel producers using different technology pathways. HIF
    Global is developing a gigascale PtL (Power-to-Liquid) facility in Chile and Texas using a different CO2 + electrolysis approach. LanzaJet uses an alcohol-to-jet (ATJ) pathway from ethanol, with lower
    current capital costs. Major oil companies (BP, Shell, TotalEnergies) are investing in SAF production capacity and could use their existing refinery infrastructure, capital, and customer relationships
    to undercut startup e-fuel producers.


    A key market risk is feedstock price volatility. While Twelve''s OPUS reactor uses CO2 (which is abundant) and electricity as inputs, renewable electricity prices are not fixed. If hydro-electric availability
    declines due to drought (a material risk for Moses Lake''s Columbia River hydropower), or if electricity prices rise due to grid congestion, Twelve''s production costs could increase significantly.
    The dependence on a single electricity source (Moses Lake hydropower) creates geographic concentration risk in the cost structure.'
  claimRefs:
  - CR013
  - CR014
  - CR015
  - CR016
  tableRefs:
  - TR004
- id: people-execution-risk
  title: People, Execution, and Adverse Event Risk
  body: 'Twelve''s founding team consists of three technical co-founders (Flanders, Kuhl, Cave) whose specialized expertise in CO2 electrolysis is the foundation of the company''s technology moat. Key-person
    risk is elevated: the departure of any founder, particularly the technical co-founders Dr. Kuhl or Dr. Cave, could slow technology development and damage investor confidence. As the company scales to
    ~260 employees and beyond, retaining and attracting specialized talent in electrochemistry, chemical engineering, and plant operations becomes increasingly critical.


    Execution risk at AirPlant One is the most immediate concern. Commercial-scale plant commissioning is inherently complex, and delays in reaching steady-state production are common in first-of-kind facilities.
    Twelve has limited operational experience running a commercial SAF plant, and the learning curve for plant operations, safety management, and quality control at scale may be steeper than anticipated.
    Construction cost overruns could consume the project equity faster than planned.


    On the adverse events side, Twelve has not experienced any publicly reported safety incidents, regulatory enforcement actions, or material legal disputes as of May 2026. The lack of publicly disclosed
    adverse events is consistent with its early-stage status and does not guarantee future safety performance. Any significant safety incident at AirPlant One could trigger regulatory reviews, operational
    shutdowns, and reputational damage with airline customers who are sensitive to safety-related associations.'
  claimRefs:
  - CR017
  - CR018
  - CR019
  - CR020
  tableRefs:
  - TR005
