company:
  name: Rapido
chapter:
  number: 4
  title: Financials
  summary: >
    Rapido (Roppen Transportation Services Pvt Ltd) has demonstrated rapid revenue growth and
    material loss reduction over FY22–FY25, reaching Rs 934 crore (~$112M USD) in operating
    revenue in FY25 with EBITDA losses narrowing to Rs 104 crore from Rs 409 crore the prior
    year. The company operates a hybrid monetisation model: commission-based for bike taxis
    and subscription-based (daily/monthly captain fees) for autos and cabs, with delivery
    services now the single largest revenue contributor at 36% of FY25 operating revenue.
    The Series E ($200M, Sep 2024, WestBridge Capital, $1.1B valuation) and subsequent
    tranches brought cumulative lifetime funding to ~$536–575M. Secondary exits by Swiggy
    (Sep 2025, Rs 2,400 crore, ~2.5× return) and TVS Motor (Nov 2025, Rs 288 crore) at
    implied valuations of $2.5–2.7B indicate strong mark-up but require independent
    verification. The company targets EBITDA breakeven in FY26 and an IPO in 2–3 years.
    Key diligence blockers: no public audited gross-margin disclosure by segment, no public
    debt/credit-facility details, and no confirmed post-Series E cash-on-hand figure.

sections:
  - id: revenue-model-streams
    title: Revenue Model and Streams
    body: |
      Rapido earns revenue through four primary mechanisms, reflecting its evolution from a
      single-mode bike-taxi commuter platform to a diversified urban mobility and logistics
      operator. The commission model applies exclusively to bike-taxi rides: Rapido charges
      captains a percentage of each fare (historically 15–30%), though it has reduced rates
      in select markets and shifted portions of the captain base toward a subscription model
      as of FY25. The subscription model applies to three-wheeler autos and four-wheeler
      cabs: captains pay a flat daily platform fee (Rs 19–29/day for bikes transitioning
      markets; Rs 40/day or Rs 500/month for cab drivers) in exchange for access to
      ride-matching, navigation, and payment tools. This daily fee is not tied to ride volume,
      giving Rapido a more predictable revenue base in those segments.

      Delivery services—logistics fulfilment for food, grocery, and parcel clients—became
      Rapido's single largest revenue segment in FY25, contributing Rs 340 crore (36.4% of
      operating revenue), up 28.3% year-on-year from Rs 265 crore in FY24. This revenue
      flows through B2B partnerships and ONDC logistics integrations rather than direct
      consumer charging. Subscription income from captains surged 14.5× to Rs 275 crore in
      FY25 (from only Rs 19 crore in FY24), reflecting the broad rollout of the per-day
      subscription model across auto and cab segments. Platform commissions (primarily bike
      taxi) declined 23.5% to Rs 277 crore in FY25, partly due to Karnataka's regulatory
      disruption causing Rapido to shift Karnataka bike-taxi operations to a
      lead-generation-only model rather than full commission collection. Advertising revenue
      (in-app sponsored listings) grew 6× to Rs 16 crore, and interest income on cash
      investments contributed Rs 69 crore, bringing total FY25 income to Rs 1,003 crore.

      The transition to subscription-heavy monetisation has meaningfully changed the revenue
      quality profile. Subscription fees are recognised over time regardless of individual
      ride count, reducing revenue volatility. However, this model works best at supply
      density, and Rapido's ability to charge and retain subscription fees depends on
      captains earning enough rides to justify the daily outlay—a sensitivity that regulators
      and driver unions can disrupt.
    claimRefs: [CI016, CI017, CI018, CI019, CI008, CI009, CI010, CI041, CI042]
    tableRefs: [TI003]

  - id: financial-performance
    title: Historical Financial Performance FY22–FY25
    body: |
      Rapido's financials from FY22 through FY25 show a consistent revenue expansion curve
      alongside a materially improving loss profile, though the company remains pre-net-profit
      as of the latest confirmed filing period (FY25, ending March 2025).

      Revenue grew from Rs 145 crore in FY22 to Rs 443 crore in FY23 (205% growth), then
      to Rs 648 crore in FY24 (+46.3% YoY), and Rs 934 crore in FY25 (+44% YoY). Total
      income including interest reached Rs 1,003 crore in FY25, crossing the Rs 1,000 crore
      threshold the company had targeted. The FY22–FY25 revenue CAGR is approximately 86%,
      which is exceptional for a ride-hailing company in a regulated market.

      Losses peaked at Rs 675 crore in FY23 at a -152% EBITDA margin relative to revenue.
      By FY24, net loss had narrowed 45% to Rs 371 crore (EBITDA loss Rs 409 crore, margin
      -52.5%), driven by effective cost management—partner incentives fell 11%, employee costs
      fell 17%, and marketing fell 11%. By FY25, net loss narrowed a further 30% to Rs 258
      crore, while the EBITDA loss shrank dramatically to Rs 104 crore (margin ~-11%),
      indicating that operating leverage is beginning to materialise. The company spent Rs 1.65
      per rupee of operating revenue earned in FY24, improving to Rs 1.35 per rupee in FY25.

      Co-founder Aravind Sanka told Inc42 in March 2025 that Rapido expected FY25 revenue to
      nearly double FY24, consistent with the Rs 934 crore RoC filing outcome. Management has
      also publicly stated that ride-hailing operations specifically (excluding food delivery
      and other newer verticals) became profitable in H2 FY25, though consolidated net
      profitability has not yet been achieved as of FY25.

      All financial figures above are sourced from the company's consolidated financial
      statements filed with the Registrar of Companies (RoC), as reviewed and reported by
      Entrackr (FinTrackr), MediaNama, and The Economic Times. No independently audited
      summary is available in English on a public portal as of May 2026; FY26 results
      are not yet filed.
    claimRefs: [CI002, CI003, CI004, CI005, CI006, CI007, CI020, CI036, CI037, CI038]
    tableRefs: [TI002]
    figureRefs: [FI002, FI003]

  - id: cost-structure-unit-economics
    title: Cost Structure and Unit Economics
    body: |
      Captain incentives and delivery charges are Rapido's dominant cost item, consuming 40%
      of total expenses in FY25 at Rs 500 crore, up 8.7% from Rs 460 crore in FY24. This
      growth rate (8.7% vs revenue growth of 44%) demonstrates improving operating leverage
      on the supply-incentive line—the historically largest driver of losses for Indian
      ride-hailing platforms. Marketing and promotional expenses rose 18% to Rs 252 crore
      in FY25 as the company invested aggressively in user acquisition and brand awareness
      to expand its four-wheeler and delivery segments. Employee costs grew 20% to Rs 207
      crore, and R&D spending increased 20% to Rs 108 crore, signalling continued investment
      in platform capability and technology differentiation. Total expenses were Rs 1,261 crore
      in FY25 versus Rs 1,066 crore in FY24 (18.3% growth), substantially below the 44%
      revenue growth rate—a key indicator of improving unit economics.

      The improvement in spend-per-rupee from Rs 1.65 (FY24) to Rs 1.35 (FY25) reflects
      this operating leverage, but the company remains loss-making at both net and EBITDA
      levels. EBITDA breakeven (implying a spend-per-rupee ratio of ~1.00) would require
      approximately an additional Rs 104 crore of loss reduction—roughly 11% of FY25
      operating revenue—which management believes is achievable in FY26 through continued
      revenue growth and cost discipline.

      Per-segment gross margins are not publicly disclosed. Rapido's asset-light model
      (it does not own vehicles or employ captains as direct employees) limits its capex
      exposure, but the subscription and commission revenue structure means that gross profit
      is tightly linked to captain incentive levels. When regulatory changes force shifts
      to lead-generation models (as in Karnataka's bike-taxi market), per-captain economics
      change materially, and the revenue line shrinks without a proportional cost reduction
      since incentives are paid regardless of model.
    claimRefs: [CI011, CI012, CI013, CI014, CI015, CI020, CI037]
    tableRefs: [TI004, TI005]

  - id: capital-adequacy-funding
    title: Capital Adequacy and Funding History
    body: |
      Rapido has raised approximately $536–575M in cumulative funding across all rounds from
      2015 through June 2025, based on secondary database estimates reconciled with press
      reports. The Series E (Sep 2024, $200M) at a $1.1B post-money valuation was the single
      largest round, led by WestBridge Capital ($120M alone), with Nexus Venture Partners,
      Think Investments, and Invus Opportunities as co-investors. Subsequent Series E
      tranches included Rs 250 crore (~$29.8M) from Prosus (Dec 2024) and Rs 125 crore
      (~$15M) from Nexus (Jun 2025), bringing total Series E proceeds to approximately
      $245–250M.

      The capital history references the Company Overview chapter's funding chronology: Series D
      ($180M, Swiggy lead, Apr 2022, ~$800M valuation); Series C (~$52M, WestBridge/Shell, 2021);
      Series B (~$55M, WestBridge, 2019); Series A (~$11M, Nexus, 2019); and Seed rounds 2015–2018.
      Total lifetime capital raised is estimated at $536M (Inc42 database, Nov 2025) to ~$575M
      (IndianStartupNews citing broader secondary rounds).

      As of May 2026, no confirmed public disclosure exists of Rapido's current cash and bank
      balance or monthly operating cash burn. The most recent RoC balance sheet data (FY24,
      available via Entrackr) showed bank balances plus cash equivalents of approximately
      Rs 88 crore—a significant decline from FY23 levels prior to the Series E. The Series E
      close in September 2024 injected substantial fresh capital; management commentary implies
      ample runway, but exact figures are not public. Monthly burn is inferred from the FY25
      EBITDA loss of Rs 104 crore (implying approximately Rs 8.7 crore per month in EBITDA
      cash consumption), though working capital movements and capex are not separately disclosed.
      The company has no publicly disclosed debt or credit facilities; this is a material gap
      for capital adequacy assessment, particularly as Rapido scales its food delivery vertical.
    claimRefs: [CI001, CI021, CI022, CI023, CI024, CI025, CI026, CI027, CI028]
    tableRefs: [TI001, TI006]
    figureRefs: [FI001]

  - id: investor-secondary-transactions
    title: Investor Cap Table and Secondary Transactions
    body: |
      Rapido's cap table has materially changed since the Series D (2022) through a series of
      strategic exits and new-investor entries. WestBridge Capital held approximately 32.88%
      as of August 2024 (per Entrackr's review of internal documents), making it the largest
      external stakeholder. Nexus Venture Partners held approximately 8.19% and Swiggy held
      approximately 12.32% at the same date.

      Swiggy completed a full exit from Rapido in September 2025, selling its entire ~12%
      stake to Prosus (MIH Investments One B.V., Rs 1,968 crore) and WestBridge Capital
      (Setu AIF Trust, Rs 431.5 crore), totalling Rs 2,400 crore (~$270M). This transaction
      valued Rapido at approximately $2.5–2.7 billion—a ~2.3–2.5× uplift from the $1.1B
      Series E valuation—and delivered Swiggy approximately 2.5× return on its $180M
      Series D investment over approximately three years. The exit was driven by strategic
      conflict of interest: Rapido had launched food delivery platform "Ownly" in mid-2025,
      directly competing with Swiggy's core business.

      TVS Motor Company also fully exited in November 2025, selling its stake for Rs 287.93
      crore to Accel India VIII (Mauritius) Ltd and MIH Investments One B.V. (Prosus). TVS
      cited "monetisation of investment" and strategic portfolio rebalancing as reasons.
      These exits concentrated ownership further among WestBridge, Prosus, and Nexus, which
      now form the core institutional shareholder base.

      The implied $2.5–2.7B valuation from the Swiggy exit is not independently confirmed by
      a primary-round term sheet or audited valuation report; it is inferred from the secondary
      transaction price. Tracxn records a $2.3B post-money valuation as of September 2025,
      corroborating the directional uplift. No prospectus, DRHP, or SEBI filing is publicly
      available as of May 2026, consistent with the company's pre-IPO status. The exact
      post-exit cap table percentages are not publicly disclosed.
    claimRefs: [CI029, CI030, CI031, CI032, CI033]
    tableRefs: []

  - id: financial-verdict
    title: Financial Verdict and Diligence Blockers
    body: |
      Rapido's financial trajectory is genuinely compelling: a 4.4× revenue expansion over
      three years (FY22–FY25), paired with a 90%+ reduction in EBITDA losses from peak FY23
      levels, suggests the company has found a model that scales. The subscription pivot for
      autos and cabs was the decisive intervention—generating Rs 275 crore in FY25 versus
      Rs 19 crore in FY24 while simultaneously reducing the friction that high commissions
      created with captains. The EBITDA margin trajectory (–152% in FY23 → –52.5% in FY24
      → ~–11% in FY25) supports management's claim that EBITDA breakeven in FY26 is plausible.

      Nevertheless, several structural risks temper the outlook. First, unit economics remain
      negative at the consolidated level: the company still spends Rs 1.35 for every rupee
      earned, a ratio that must converge to 1.0 before net profitability can be targeted.
      Second, the revenue mix shift is double-edged: subscription income grew 14× but was
      partly driven by geographic expansion across auto/cab, meaning future growth requires
      either further geographic rollout or deepening urban utilisation—both capital-intensive.
      Third, platform commission revenue fell 23.5% in FY25, reflecting real regulatory risk:
      Karnataka's bike-taxi ban disrupted Rapido's highest-volume segment. While the January
      2026 HC ruling provides relief, state-level regulatory uncertainty remains a persistent
      top-line risk. Fourth, the new food delivery vertical (Ownly) has triggered the Swiggy
      exit and adds cost and execution risk without yet contributing material revenue to the
      FY25 filing.

      Key diligence blockers: (1) No segment-level gross margin disclosure—impossible to
      assess which verticals subsidise losses. (2) No public confirmation of cash balance or
      burn rate post-Series E injections. (3) No debt/credit facility disclosure—a gap that
      becomes material if Rapido pursues asset-heavy quick-commerce infrastructure.
      (4) FY26 financials not yet filed; management targets are company-stated, not
      independently verified. (5) The $2.5–2.7B implied valuation from the Swiggy
      secondary exit reflects a single arm's-length transaction, not an audited DRHP
      valuation; a primary-round re-pricing would be the true test of enterprise value.
    claimRefs: [CI002, CI003, CI004, CI005, CI034, CI035, CI036, CI037, CI020, CI038, CI039, CI040, CI043]
    tableRefs: []

