company:
  name: Rapido
chapter:
  number: 7
  title: Risks
  summary: >
    Rapido faces a multi-layered risk profile spanning regulatory uncertainty at the state level
    in India, intensifying competition from Ola and Uber in the bike-taxi segment, structural
    cash burn driven by high customer and captain acquisition costs, and emerging gig-worker
    regulatory exposure. The Karnataka bike-taxi ban — resolved by the High Court in January 2026
    after a 22-month dispute — exemplifies the regulatory tail risk inherent to Rapido's model,
    which depends on permissive state interpretations of the Motor Vehicles Act. Persistent Delhi
    NCR exclusion caps Rapido's total addressable urban market. Safety incidents, people and
    execution risks, partner dependencies, and FX risks for international investors round out
    a risk profile rated high overall.

sections:
  - id: s1
    title: Regulatory and Legal Risk
    body: >
      Rapido's single most material risk category is the fragmented and evolving regulatory
      landscape governing bike-taxi operations across Indian states. The Motor Vehicles Act (MVA)
      1988 and its 2019 amendment do not contain an explicit national framework permitting or
      regulating bike-taxi aggregators, leaving state governments to interpret the law
      independently. This structural ambiguity has already produced direct financial and
      operational harm: Karnataka's 22-month bike-taxi ban (March 2024 – January 2026) forced
      Rapido to shift its Karnataka bike-taxi revenue model from full commission collection to a
      lead-generation-only model, directly reducing commission revenue by an estimated 23.5% in
      FY2025 and costing the platform Rs 200–300 crore in lost commission income.

      The Karnataka High Court's January 2026 ruling — lifting the ban and affirming that
      motorcycles qualify as transport vehicles under the MVA — was a significant positive for
      Rapido, but the ruling came with conditions: permit and operational compliance requirements
      must still be formalised by the state transport department, and the political risk of a
      future government reimposing restrictions through administrative order remains non-zero.
      Karnataka is Rapido's home state and historically among its top revenue markets; any
      re-escalation of the ban would be a material operational setback.

      Delhi NCR represents the second major regulatory flashpoint. The National Capital Region's
      transport authority has not permitted bike-taxi operations under current Motor Vehicles
      rules, and no near-term regulatory pathway is publicly visible as of May 2026. Delhi NCR
      is the largest metro market in India by population; its continued exclusion caps Rapido's
      total addressable urban market and forces the company to compete on non-premium routes.
      Maharashtra imposes partial restrictions in the Mumbai metropolitan area. At the national
      level, the Ministry of Road Transport and Highways has not issued a central notification
      specifically permitting or regulating bike-taxi aggregators, creating a patchwork where
      any of the 15+ states where Rapido currently operates could initiate a Karnataka-style
      challenge. The Platform Workers legislation circulating in Parliament adds another
      regulatory dimension: reclassification of captains as employees would require provident
      fund contributions, ESI, and other employment benefits, materially increasing per-captain
      costs.
    tableRefs:
      - TR001
    figureRefs:
      - FR001
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
      - CR010

  - id: s2
    title: Competitive Risk
    body: >
      Rapido's position as India's leading bike-taxi platform faces intensifying pressure from
      well-capitalised incumbents and structurally disruptive new entrants. In the bike-taxi
      segment, the primary competitive threat comes from Ola (via its Ola Express service) and
      Uber (via Uber Moto). Ola Express operates on a commission model with aggressive captain
      incentives in Bengaluru, Hyderabad, and Mumbai; its parent has deep pockets following
      recent fundraising. Uber Moto benefits from Uber's global playbook, including international
      technology infrastructure, algorithmic pricing optimisation, and the ability to cross-
      subsidise Indian operations from profitable geographies. Both competitors have been
      expanding captain onboarding in tier-1 cities, narrowing Rapido's supply-side moat.

      InDrive, the Kazakhstan-origin ride-hailing platform that entered India in 2022, presents
      a structurally different threat. InDrive's peer-to-peer pricing model — where passengers
      and drivers negotiate fares — is popular in price-sensitive tier-2 markets where Rapido is
      also expanding. InDrive's India captain base has been growing rapidly, particularly in
      Lucknow, Patna, and Guwahati, markets where Rapido has invested significantly in supply
      acquisition. The government-backed Namma Yatri and the ONDC (Open Network for Digital
      Commerce) ecosystem represent a distinctly different category of competitive risk. Namma
      Yatri charges zero commission to auto and cab drivers, funded via a non-profit operating
      model in Bengaluru. Its success in acquiring auto driver supply in Bengaluru has been
      notable, reducing Rapido's auto supply density in certain corridors. ONDC could enable
      multiple zero-commission apps to route rides without paying Rapido any subscription or
      commission fee, potentially bypassing Rapido's platform entirely.
    tableRefs: []
    figureRefs:
      - FR002
    claimRefs:
      - CR011
