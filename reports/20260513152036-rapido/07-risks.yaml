  - id: s5
    title: Partner and Technology Dependency Risk
    body: >
      Rapido's platform relies on a set of critical third-party dependencies that, if disrupted
      or re-priced, could materially impair service delivery or unit economics. Google Maps
      Platform provides the routing and ETA infrastructure core to every ride dispatch; Rapido
      has not publicly disclosed an alternative mapping layer, creating concentration risk if
      Google raises API pricing or imposes usage restrictions. Amazon Web Services hosts
      Rapido's core platform, dispatch engine, and ML inference workloads; while multi-region
      deployment is reported, no formal business continuity disclosure has been made. Razorpay
      and the broader UPI ecosystem handle fare collection; the multi-PSP UPI architecture offers
      partial fallback, but payment infrastructure failures during high-demand periods could cause
      significant revenue leakage.

      State government operating licences represent perhaps the most critical dependency of all:
      as the Karnataka experience demonstrates, a state government can rescind the effective
      operating licence through administrative order with limited advance notice, converting a
      regulatory permit dependency into an existential operational risk. Swiggy's strategic stake
      in Rapido creates a dependency and opportunity simultaneously; Swiggy's own competitive
      position, following its November 2024 IPO, could affect partnership terms and resource
      allocation. The dependency map figure below shows how these dependencies interconnect and
      where single points of failure concentrate.
    tableRefs:
      - TR003
    figureRefs:
      - FR003
    claimRefs:
