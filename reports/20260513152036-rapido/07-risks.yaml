      topic: "Delhi NCR bike-taxi legalisation pathway"
      missingEvidence: >-
        No public evidence exists of an active regulatory consultation, proposed rule change, or
        court petition with a realistic pathway to legalising bike-taxi operations in Delhi NCR
        as of May 2026. No timeline for resolution has been publicly stated by Delhi transport
        authorities.
      whyItMatters: >-
        Delhi NCR represents the largest metropolitan population in India. Its continued exclusion
        from Rapido's addressable market is a structural constraint on revenue growth, total
        ride volume projections, and investor TAM narrative. Investors must model this as a
        potential permanent restriction rather than a temporary gap.
      diligencePath: >-
