  - id: s3
    title: Financial and Operational Risk
    body: >
      Rapido's financial risk profile centres on three interrelated challenges: a sustained net
      loss position, opacity around current cash runway, and an unproven path to profitability
      in its core ride-hailing business. The company reported net losses of Rs 675 crore in
      FY2023, Rs 371 crore in FY2024, and Rs 258 crore in FY2025 — a clear improvement trend
      but one that still leaves the company burning through capital. Management has set a target
      of EBITDA breakeven in FY2026, with ride-hailing declared operationally profitable in
      H2 FY2025, but the consolidated entity was still loss-making as of the latest RoC filing.

      The Series E ($200M, September 2024, led by WestBridge Capital) and subsequent extension
      tranches raised total Series E proceeds to approximately $245–250M. Rapido has not publicly
      disclosed its current cash-on-hand or monthly operating cash burn since the Series E close.
      Monthly EBITDA-level cash consumption is estimated at approximately Rs 8.7 crore based on
      the FY2025 EBITDA loss of Rs 104 crore divided by 12, but actual cash burn depends on
      working capital movements and capex, which are not separately disclosed.

      Captain supply volatility is an underappreciated operational risk. Rapido's subscription
      model creates a fixed daily cost for captains (Rs 19–29/day); during periods of low demand
      or regulatory uncertainty, captains may pause or cancel their subscriptions, collapsing
      revenue without a corresponding cost reduction. An emerging operational risk is the growing
      captain collective bargaining and unionisation movement. Several informal captain
      associations have protested platform subscription fee increases, demanding lower daily
      charges and better safety protections. While no formal union has been legally recognised
      under Indian labour law as of 2026, the risk of coordinated captain strikes could disrupt
      supply in Rapido's major markets. Rapido's dependency on third-party infrastructure
      (mapping, payments, and cloud) creates additional operational fragility.
    tableRefs:
      - TR002
    figureRefs: []
    claimRefs:
      - CR019
