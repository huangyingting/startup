callouts:
  - calloutType: risk
    title: "Karnataka Win Is Fragile: Permit Formalisation and Political Reversal Risk Persist"
    body: >-
      Although the Karnataka HC January 2026 ruling restored bike-taxi operations, the ruling
      requires permit and compliance conditions to be formalised by the state transport
      department — a process that could be delayed or shaped adversely by political pressure
      from traditional taxi unions. The Congress-governed Karnataka administration that imposed
      the original ban remains in office; the risk of administrative order reimposing restrictions
      is non-trivial and is the primary regulatory monitoring priority for Rapido investors.
    claimRefs:
      - CR001
      - CR007
      - CR008

  - calloutType: risk
    title: "Delhi NCR Exclusion Creates Structural TAM Ceiling"
    body: >-
      Delhi NCR is India's largest metropolitan population cluster by headcount. With bike-taxi
      operations banned and no regulatory pathway to legalisation visible as of May 2026, Rapido
      is structurally excluded from its biggest potential market. Every year of exclusion widens
      the competitive gap with any future entrant that secures Delhi legalisation first. The
      Delhi ban, absent reversal, should be modelled as a permanent TAM reduction of 15–20% in
      urban ride-hailing addressable market.
    claimRefs:
      - CR004
      - CR026

  - calloutType: risk
    title: "Platform Workers Bill: Low Probability, Very High Impact if Enacted"
    body: >-
      The draft Platform Workers (Registration and Social Security) Bill proposes a 1–2% of
      turnover contribution per gig worker. At Rapido's FY2025 operating revenue of Rs 934
      crore, a 2% levy would add approximately Rs 18–19 crore per year in social security costs
      before any reclassification of captains as employees. Rapido's subscription model provides
      structural but incomplete insulation: captains paying fixed daily fees are not on Rapido's
      payroll, but platform contribution obligations under the Bill may still apply based on
      facilitated transactions.
    claimRefs:
      - CR009
      - CR022
      - CR038

