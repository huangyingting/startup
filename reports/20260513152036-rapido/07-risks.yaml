  - id: s4
    title: Safety and Reputational Risk
    body: >
      Rapido's safety record and brand reputation are directly correlated risks given that
      consumer trust is central to a mass-market ride-hailing platform. Road accident liability
      remains Rapido's most persistent safety concern: India has among the highest per-capita
      road fatality rates globally, with two-wheelers accounting for approximately 44% of road
      fatalities in 2025. Any high-profile fatality or serious injury involving a Rapido captain
      and passenger could trigger regulatory action, media scrutiny, and demand-side churn.

      MediaNama and Times of India reported multiple incidents in Karnataka in late 2024 where
      passengers alleged assault by Rapido captains, including notable cases in Bengaluru that
      received significant local media attention. These incidents occurred during the Karnataka
      ban period, when Rapido was operating under a lead-generation model rather than a full
      platform, potentially reducing the company's ability to enforce safety standards on captains
      who were nominally operating outside the regulated platform structure.

      Rapido's AI helmet compliance detection system — deployed to verify that captains wear
      helmets before accepting rides — has been marketed as a key safety differentiator. However,
      the system's accuracy under varied lighting conditions, helmet shapes, and camera angles
      is not publicly validated. Industry experts have noted that computer vision systems trained
      on limited datasets can have accuracy rates of 85–90% rather than the near-100% required
      for a reliable safety gate. If captains systematically evade the detection mechanism, the
      safety guarantee Rapido markets becomes a liability. The reputational risk extends to data
      privacy: Rapido collects location data on millions of daily users, and any breach could
      trigger enforcement under India's Digital Personal Data Protection Act 2023 (DPDPA 2023),
      with fines reaching Rs 250 crore per incident.
    tableRefs: []
    figureRefs: []
    claimRefs:
      - CR029
