      - ["Cash runway and current burn rate", "Latest balance sheet (FY2025 or Q4 FY2025), current cash-on-hand, monthly operating cash burn, and any venture debt or structured finance obligations", "Series E closed Sep 2024; with ~$250M raised and monthly EBITDA losses, runway calculation is critical before any new investment; undisclosed debt would affect equity returns", "Request from Rapido CFO; review latest RoC balance sheet filing; ask specifically about venture debt (CPPIB, HDFC Bank, others)"]
    notes: "Diligence asks reflect gaps identified in public evidence as of May 2026. Items 1 and 3 are blocking for primary investment decisions; items 2 and 4 are material for accurate scenario modelling. Some information may be available in a formal data room under NDA."
