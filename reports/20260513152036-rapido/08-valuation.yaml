callouts:
  - calloutType: risk
    title: "Delhi NCR Ban Is the Primary Binary Risk"
    body: >-
      Delhi NCR bike-taxi ban, with no published resolution timeline as of May 2026, represents
      the single largest binary risk to the Rapido investment thesis. Delhi NCR constitutes
      approximately 25-30% of India's urban ride-hailing TAM. A permanent ban would undercut
      the base case valuation, make FY2026 EBITDA breakeven materially harder to achieve, and
      delay the IPO timeline. Investors must treat this as a live binary risk, not a temporary
      operational headwind.
    claimRefs:
      - CV036
      - CV022
  - calloutType: insight
    title: "September 2025 Secondary at $2.3B Is the Most Credible Valuation Signal"
    body: >-
      Swiggy's exit at Rs 2,400 crore for a 12% stake, a 2.5x return on cost in three years,
      and Prosus's acquisition of that stake signal that two sophisticated institutional investors
      with deep India context have independently confirmed the $2.3B mark. This is a stronger
      valuation signal than a single lead-investor-priced primary round, because it reflects an
      arm's-length transaction between two institutional counterparties. The pending Prosus $350M
      primary at reportedly $2.7-3B further reinforces upward momentum.
    claimRefs:
      - CV004
      - CV005
  - calloutType: risk
    title: "20.5x FY2025 Revenue Multiple Requires Sustained Execution"
    body: >-
      The September 2025 secondary values Rapido at approximately 20.5x FY2025 revenue for a
      company that has never been EBITDA-positive. Sustaining this multiple requires: (i) FY2026
      EBITDA breakeven as guided, (ii) continued 30%+ revenue growth, and (iii) a constructive
      Indian capital market for a 2027-2028 IPO. Any miss on these three conditions, particularly
      the EBITDA target, would compress the multiple toward the 8-12x range observable for
      comparable loss-making platforms, implying significant downside from the current price.
    claimRefs:
      - CV019
      - CV039

