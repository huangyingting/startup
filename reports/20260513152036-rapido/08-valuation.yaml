  - id: s2
    title: Comparable Company Analysis
    body: |
      India's ride-hailing market lacks a precise public-market equivalent for Rapido's bike-taxi-
      focused model. The closest listed peers are Southeast Asian super-apps that share platform
      structure and emerging-market dynamics. Grab Holdings (Nasdaq: GRAB), a Southeast Asian
      ride-hailing and delivery platform, generated approximately $2.4B in FY2025 revenue and
      maintains a market capitalisation of approximately $15B, implying a 6-7x forward revenue
      multiple as the primary listed benchmark. GoTo Group (Jakarta: GOTO), the Indonesian ride-
      hailing and e-commerce conglomerate, trades at approximately 2-3x forward revenue, depressed
      by ongoing losses and a complex structure. Uber Technologies (Nasdaq: UBER, ~$150B market
      cap) cannot be used for India-specific multiples; its India operations are subsumed within
      the global entity.

      On the Indian private side, Ola Cabs India (ANI Technologies) provides the most direct
      comparable. Vanguard marked Ola's valuation down to approximately $1.25B as of May 2025,
      an 83% decline from its 2021 peak of $7.3B, reflecting FY2025 revenue that plunged 42% to
      Rs 1,171 crore and net losses that ballooned to Rs 662 crore. By contrast, Rapido's FY2025
      revenue grew 44% to Rs 934 crore with net losses narrowing to Rs 258 crore. This divergence
      is the clearest evidence that Rapido has structurally displaced Ola as India's dominant
      ride-hailing platform by volume. Uber India invested Rs 3,000 crore to compete against
      Rapido in FY2025. InDrive carries an estimated global valuation of approximately $1.2-1.5B
      with a bid-based model that competes in India's tier-2/3 cities.

      Applying the 6-10x comparable-operator range to Rapido's FY2025 revenue of Rs 934 crore
      (~$111M) yields $667M-$1.11B, broadly consistent with the $1.1B Series E price at the
      upper end. The September 2025 secondary at $2.3B implies ~20.5x FY2025 revenue, pricing
      in an IPO premium and market-leadership premium not yet reflected in the comparable set.
