  - id: s3
    title: Scenario Analysis and Valuation Range
    body: |
      Three scenarios capture the range of outcomes for Rapido from a mid-2026 perspective,
      anchored by the September 2025 secondary at $2.3B as the current observable market price.

      The bear case ($1.1B, ~20% probability) reflects a scenario in which the Delhi NCR bike-
      taxi ban becomes permanent, competitive share loss to Uber Moto and Ola Express exceeds 10
      percentage points in tier-1 cities, EBITDA breakeven is delayed to FY2028 or beyond, and
      the planned $350M Prosus primary round is not completed. This would represent a reversion
      to the September 2024 Series E price, applying a 6-10x multiple on FY2025 revenue,
      consistent with GoTo Group's compressed multiple for a loss-making platform.

      The base case ($2.5B, ~55% probability) reflects continuation of the current trajectory:
      EBITDA breakeven in FY2026 as guided, FY2026 revenue of approximately Rs 1,200-1,400 crore,
      completion of the Prosus $350M primary round, and maintained market leadership. The $2.5B
      base case is modestly above the September 2025 secondary and below the Prosus round's
      reported upper valuation range, implying a 22-24x FY2025 revenue multiple that prices in
      IPO optionality. The bull case ($3.5B, ~25% probability) envisions Delhi NCR legalisation
      in 2026-2027, 40%+ revenue growth into FY2027, successful IPO or strategic acquisition at
      a premium, and material new vertical contributions from food delivery and corporate
      transport. The probability-weighted expected value across scenarios is approximately $2.5B.
