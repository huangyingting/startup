  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "Rapido FY2026 monthly burn rate and cash position"
      missingEvidence: >-
        Rapido has not publicly disclosed its current cash position, monthly burn rate, or
        FY2026 cash guidance. The FY2025 RoC filing (when available) will provide the next
        balance-sheet checkpoint, but post-Swiggy-exit and pre-Prosus-primary cash position
        is not available from public sources.
      whyItMatters: >-
        Without current cash data it is impossible to assess runway against the FY2026 EBITDA
        breakeven target; if burn is running above the FY2025 Rs 104 crore EBITDA loss run-rate,
        the company may need to complete the Prosus primary round before achieving breakeven.
      diligencePath: >-
        Request CFO data room access for cash position and monthly burn schedule; review FY2025
        RoC filing when publicly filed; cross-check with Entrackr FinTrackr quarterly estimates.
      relatedQuestionRefs:
        - QV017
        - QV028

    - type: missing-source
      severity: material
      topic: "Comparable valuation table (TV004) - DiDi, Lyft, Namma Yatri exclusions"
      missingEvidence: >-
        The comparable valuation table (TV004) covers five peers but excludes DiDi (China-domiciled
        with regulatory restrictions), Lyft (US-only, minimal India relevance), and Namma Yatri
        (ONDC nonprofit cooperative with no investable equity structure).
      whyItMatters: >-
        Full coverage of all plausible comparables is important for completeness; DiDi's global
        market position and revenue multiple would provide an additional data point, but its
        China-regulatory and US-delisting context limits direct applicability.
      diligencePath: >-
        Track DiDi's Hong Kong relisting progress; review ONDC Namma Yatri annual reports for
        any monetisation disclosures; no coverage gap for Lyft given US-only operations.
      relatedTableRefs:
        - TV004
      relatedQuestionRefs:
        - QV025

    - type: missing-source
      severity: material
      topic: "Delhi NCR bike-taxi legalisation pathway and timeline"
      missingEvidence: >-
        No public evidence exists of an active regulatory consultation, proposed rule change, or
        court petition with a realistic pathway to legalising bike-taxi operations in Delhi NCR
        as of May 2026. The Delhi Transport Department has not published any legalisation timeline.
      whyItMatters: >-
        Delhi NCR represents approximately 25-30% of India's urban ride-hailing TAM; its continued
        exclusion from Rapido's addressable market constrains revenue growth in the base and bull
        cases. Permanent exclusion is the primary driver of the bear case.
      diligencePath: >-
        Monitor Delhi High Court listings and transport authority public notices; engage legal
        counsel tracking Delhi transport regulation; request Rapido government affairs team update.
      relatedQuestionRefs:
        - QV015
        - QV022

    - type: missing-source
      severity: material
      topic: "Full cap table and liquidation preference waterfall"
      missingEvidence: >-
        Rapido has not publicly disclosed its full cap table, WestBridge Series E liquidation
        preference terms, Prosus secondary/primary investment conditions, or anti-dilution
        provisions. These are required for common equity upside analysis at exit prices.
      whyItMatters: >-
        Material preference overhang could eliminate common equity upside at exit prices below
        the preference threshold; without this data, return calculations at secondary entry
        price cannot be confirmed from a common equity perspective.
      diligencePath: >-
        Formal data room request; engage WestBridge and Prosus IR; cross-reference Swiggy RoC
        filing for historical Rapido stake terms; review Financial Express cap table disclosures.
      relatedQuestionRefs:
        - QV023
        - QV026

    - type: private-evidence-only
      severity: material
      topic: "Captain subscription fee pricing power and churn"
      missingEvidence: >-
        Rapido has not publicly disclosed captain daily subscription fee levels, churn rate,
        or pricing sensitivity data. Whether Rapido has pricing power to increase the subscription
        fee without captain attrition is unknown from public data.
      whyItMatters: >-
        The subscription model's unit economics depend critically on fee levels and churn; if
        captains switch to commission-based alternatives when subscription fees rise, the model's
        margin advantage narrows and the thesis weakens.
      diligencePath: >-
        Request captain economics breakdown in data room; commission independent survey of
        captain preferences and fee sensitivity; cross-check captain acquisition cost against
        any Rapido investor day disclosures.
      relatedQuestionRefs:
        - QV027

    - type: private-evidence-only
      severity: moderate
      topic: "India technology M&A precedents for strategic acquisition premium"
      missingEvidence: >-
        No specific completed India ride-hailing or mobility M&A transaction has been identified
        that directly benchmarks a 20-40% strategic premium for a platform comparable to Rapido
        as of May 2026; global precedents exist but are not India-specific.
      whyItMatters: >-
        The 20-40% strategic acquisition premium assumption in the bull case is based on global
        analogy rather than India-specific transaction evidence; overstating this premium inflates
        the bull case return profile.
      diligencePath: >-
        Survey GlobalData / Refinitiv India M&A database for completed ride-hailing and consumer
        mobility transactions 2019-2026; engage M&A banker with India consumer internet track record.
      relatedQuestionRefs:
        - QV030

    - type: private-evidence-only
      severity: moderate
      topic: "City-level daily revenue contribution for Bengaluru and Mumbai"
      missingEvidence: >-
        No public data exists on Rapido's city-level daily revenue contribution for Bengaluru,
        Mumbai, or other major metros; the cost and recovery timeline of a metro-wide platform
        suspension order cannot be estimated from public sources alone.
      whyItMatters: >-
        A suspension order in Bengaluru (Rapido's home market and likely revenue core) would be
