callouts:
  - calloutType: strength
    title: Zero-Commission SaaS Model as Structural Differentiator
    body: >
      Rapido's 2023 pivot to a zero-commission SaaS model, where captains pay a fixed daily fee
      rather than a percentage of each fare, fundamentally re-aligns supply-side incentives vs.
      Ola and Uber. The model removes the "cancel and pay direct" arbitrage common on commission
      platforms, reduces per-ride incentive spend, and provides a more predictable subscription
      revenue base. The 171% growth in subscription revenue (FY2024) and accelerating captain supply
      are early evidence of model success.
    claimRefs: [CO006, CO007, CO033, CO039]

  - calloutType: risk
    title: Multi-State Regulatory Uncertainty on Bike-Taxi Operations
    body: >
      Karnataka's two-year bike-taxi ban (March 2024–January 2026), while now partly resolved, exposed
      the structural vulnerability of Rapido's core bike-taxi product to state-level regulatory action.
      Similar bans or enforcement actions have occurred in Maharashtra, Assam, and other states. The
      Central Motor Vehicle Aggregator Guidelines 2025 provide a national framework permitting bike
      taxis, but each state must still frame its own rules—leaving a patchwork of permit requirements
      that elevates compliance costs and creates operational uncertainty in any given market.
    claimRefs: [CO041, CO042, CO043, CO044, CO048]

  - calloutType: risk
    title: Key-Person Concentration in Founding Trio
    body: >
      All three co-founders—Sanka, SR, and Guntupalli—hold combined CEO/COO/CTO roles with no
      publicly disclosed independent directors, CFO, or C-suite below the founding level. This
      concentration creates succession risk, limits governance checks, and may complicate any
      future IPO readiness process that requires SEBI-mandated board independence. The absence of
      public governance disclosures at a $1.1B valuation is an unusual opacity for a company of
      this scale in the Indian market.
    claimRefs: [CO011, CO012, CO013, CO018]

