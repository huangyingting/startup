company:
  name: Rapido
chapter:
  number: 5
  title: Product & Technology
  summary: >
    Rapido's product suite spans three consumer-facing service modes (bike taxi, auto-rickshaw,
    cab) within a single Android/iOS app, augmented by metro ticketing via ONDC, integrated
    travel booking through Goibibo/redBus/ConfirmTkt, and in-app parcel delivery—with 210M+
    total downloads and a 4.77/5 Google Play rating as of May 2026. The platform runs on
    Google Cloud (GKE, Firebase, BigQuery, Cloud Vision AI) and sustains 10–15 minor app
    releases per day; ML drives ride matching, demand forecasting, and dynamic pricing. Key
    technology gaps include the absence of a public developer API portal, limited disclosure
    of current ML architecture beyond an outdated 2019 Google Cloud case study, and
    concentration risk in a single cloud provider.

sections:
  - id: product-platform-overview
    title: Product Suite and Platform Overview
    body: |
      Rapido's consumer app delivers three vehicle classes—Bike (two-wheeler taxi), Auto
      (auto-rickshaw), and Cab (four-wheeler)—through a single interface available on Android
      6.0+ and iOS. Within these modes, the app surfaces sub-variants: Bike Lite (cheaper
      fares with longer wait times assigned to local captains), Bike Metro (first-/last-mile
      rides to metro stations), Auto Share, Auto Pet, Auto Parcel, and standalone Parcel
      delivery. Metro ticket booking for Delhi, Mumbai (Lines 2A/2B/7/9), Hyderabad, Chennai,
      and Kochi metros is integrated via ONDC, eliminating the need for a separate ticketing
      app. In October 2025, Rapido added flights, hotels, trains, and inter-city bus booking
      through partnerships with Goibibo, redBus, and ConfirmTkt, positioning the app as a
      unified mobility-and-travel super-app.

      The passenger UX relies on PIN-based ride authentication rather than OTPs, reducing
      friction at pickup. Riders can save favorite locations and share live tracking links
      via WhatsApp or SMS. The Power Pass subscription (₹69) delivers up to 25% fare
      discounts on select rides, protecting frequent users from surge pricing. Rapido Coins
      (one coin = ₹1) accrue from rides, referrals, and promotions. As of May 2026 the app
      has 210M+ total downloads, 50M monthly active users, a 4.77/5 rating on Google Play
      from 4.1M+ reviews, and a 4.9/5 rating on the iOS App Store.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008, CE009, CE010, CE011, CE012, CE013]
    tableRefs: [TE001]
    figureRefs: [FE001, FE002]

  - id: tech-stack-engineering
    title: Technology Stack and Engineering Architecture
    body: |
      Rapido's infrastructure is built on Google Cloud, with Google Kubernetes Engine (GKE)
      providing containerized, auto-scaling compute across its microservices. Firebase Dynamic
      Links, Cloud Messaging, Firestore, and the Firebase Realtime Database handle deep
      linking, push notifications, and sub-second data synchronisation for live ride tracking.
      Cloud SQL manages relational data while Cloud Key Management secures cryptographic keys.
      BigQuery supports analytics at scale, and Rapido has begun building ML pipelines on
      Google Cloud AI, with demand forecasting and ride-matching algorithms among the first
      production workloads. Cloud Vision AI automates captain document verification—processing
      driving licenses and vehicle registration certificates in minutes rather than days.

      The platform's city-launch architecture is deliberately configurable: new cities are
      activated through feature flags without engineering intervention, enabling a sustained
      pace of 30–40 city additions per month. CI/CD pipelines support 10–15 minor app
      releases per day and a consolidated major release fortnightly. The analytics team uses
      the company's accumulated trip dataset (9+ years, billions of trips) to train ETA
      prediction models and spatial demand-hot-zone classifiers. The full ML architecture,
      microservices topology, failover design, and SLA commitments are not publicly
      disclosed, leaving the actual resilience posture unverifiable from open sources.
    claimRefs: [CE020, CE021, CE022, CE023, CE024, CE025, CE026, CE027, CE043]
    tableRefs: [TE002]
    figureRefs: [FE003]

  - id: captain-app-driver-experience
    title: Captain App and Driver-Side Technology
    body: |
      The Rapido Captain app provides a fully digital onboarding funnel: drivers download the
      app, create an account with their mobile number, upload DL, RC, PUC, Aadhaar/PAN card,
      and a recent photograph, and can begin receiving rides within 48 hours of Google Cloud
      Vision–powered document verification. The Captain app surfaces an earnings dashboard
      showing per-ride income and cumulative balances redeemable to a linked bank account via
      automated payout. A built-in navigation layer handles route display and rerouting;
      ride requests appear on-screen from nearby riders, and the captain accepts or declines.
      All captains receive ₹5 lakh accident insurance coverage per ride from Acko Insurance
      at no additional cost.

      Rapido's dual revenue model—commission for bike taxis, daily subscription fees of
      Rs 19–40/day for auto and cab captains—creates two operationally distinct captain
      experiences within the same app. Bike-taxi captains share a percentage of each fare
      with Rapido; auto and cab captains pay a flat daily access fee regardless of ride
      volume. This model divergence requires the captain app to surface different earnings
      and incentive structures per vehicle type. The platform also uses a rating and review
      system post-ride to inform future matching and highlight high-performing captains for
      premium incentive tiers.
    claimRefs: [CE014, CE015, CE016, CE017, CE018, CE019, CE045]
    tableRefs: [TE004]
    figureRefs: []

  - id: safety-trust-compliance
    title: Safety, Trust, and Quality Controls
    body: |
      Rapido's safety architecture combines in-app tooling, captain verification, and physical
      programme components. Riders access a Safety Toolkit within the active-ride screen that
      includes: an SOS button connecting to Rapido's 24×7 emergency response team, a
      one-tap call to the national police helpline (112), the ability to share a live tracking
      link with emergency contacts, and route-deviation alerts triggered automatically if the
      captain deviates from the planned route, makes unexpected halts, or drops the rider at
      a location different from the booked destination. All rides—bike, auto, and cab—are
      insured by Acko Insurance at no extra cost to the rider.

      Captain onboarding uses a four-step background verification process (document
      validation, physical vehicle inspection, training, and digital activation). Google Cloud
      Vision AI audits uploaded documents and, in production, is being extended to detect
      helmet and mask compliance during rides. Rapido's Rapido Safety First campaign has added
      seat belts to Bengaluru auto-rickshaws and conducted CPR and road-safety training in
      partnership with city traffic police departments across Gurgaon, Hyderabad, Chennai,
      Bengaluru, Vijayawada, and Madurai. The absence of publicly disclosed safety KPIs
      (incident rate, SOS activation rate, false-positive route-deviation alerts) limits
      third-party auditability of these controls.
    claimRefs: [CE028, CE029, CE030, CE031, CE032, CE033, CE044]
    tableRefs: [TE003]
    figureRefs: []

  - id: integrations-payments-ecosystem
    title: Integrations, Payments, and Ecosystem Expansion
    body: |
      Rapido's ecosystem strategy hinges on ONDC as the open-network rail for metro ticket
      integration and logistics partnerships. Metro ticketing covers Delhi (with ₹25 last-mile
      fares, free first ride), Mumbai (Lines 2A, 2B, 7, 9 via QR codes), Hyderabad, Chennai,
      and Kochi, with Bengaluru pending. DMRC's Managing Director described the integration
      as "the first time globally where a metro ticket and last-mile booking are integrated
      in a single app." Rapido processes 500,000 metro-adjacent rides per day across India,
      including 100,000 in Delhi alone. The travel booking integration launched in October
      2025 adds flights, hotels, trains, and inter-city buses via Goibibo, redBus, and
      ConfirmTkt, targeting India's ₹5.8-trillion travel market.

      On the payments side, Rapido removed in-app wallet payments for auto rides in 2024,
      shifting to direct UPI and cash settlement between riders and captains. This reduced
      GST liability for the platform but introduced consumer friction around fare transparency,
      with some riders reporting drivers requesting informal premiums over the app-displayed
      fare. For EV fleet expansion, Rapido has partnered with IndoFast Energy (a JV of Indian
      Oil Corporation and Sun Mobility) to deploy 10,000 Piaggio Ape E-City Max
      battery-swap electric autos over 24 months in Hyderabad and Bengaluru, with Delhi and
      Chennai slated for subsequent phases. A public developer API for corporate accounts
      and white-label integrations has not been located in any open source.
    claimRefs: [CE034, CE035, CE036, CE037, CE038, CE039, CE040, CE041, CE042, CE046]
    tableRefs: [TE005]
    figureRefs: [FE004]

