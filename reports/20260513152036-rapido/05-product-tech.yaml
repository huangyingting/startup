  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: tech-stack
      missingEvidence: "Current infrastructure architecture documentation (microservices topology, failover, SLAs, disaster recovery plan) for Rapido's platform at present scale."
      whyItMatters: "The only public architecture reference dates from 2019 at 1.5M captains. A platform now handling 6.5M daily requests needs independently verified resilience design; any material outage would affect millions of daily commuters."
      diligencePath: "Request Rapido's current system architecture diagram, SLA commitments, and business continuity/disaster recovery plan during due diligence."
      relatedQuestionRefs: [QE021]

    - type: missing-source
      severity: material
      topic: api-integration
      missingEvidence: "Public or documented corporate/developer API for Rapido enabling enterprise integrations, white-label deployments, or B2B fleet management."
      whyItMatters: "Enterprise API access is a revenue diversification path and a defensibility signal; its absence may indicate Rapido has not yet invested in B2B platform infrastructure beyond ONDC."
      diligencePath: "Ask Rapido directly for corporate integration documentation, active enterprise clients, and API roadmap. Check LinkedIn/GitHub for developer outreach signals."
      relatedQuestionRefs: [QE025]

    - type: missing-source
      severity: minor
      topic: safety
      missingEvidence: "Published safety incident rates, SOS activation frequency, route-deviation alert false-positive rates, and any regulatory enforcement actions related to Rapido's platform safety."
      whyItMatters: "Without published safety KPIs or regulatory findings, third-party assessment of Rapido's safety programme effectiveness is limited to qualitative feature descriptions."
      diligencePath: "Request Rapido's internal safety dashboard and incident report data; review any Consumer Affairs / CCPA / MCA enforcement orders; check news archives for unreported incidents."
      relatedQuestionRefs: [QE010, QE027]

    - type: private-evidence-only
      severity: minor
      topic: ml-platform
      missingEvidence: "Details of Rapido's current ML architecture including dynamic pricing model design, demand forecasting accuracy, ETA prediction error rate, and any bias audit results."
      whyItMatters: "Surge pricing algorithms can create consumer trust and regulatory risk; algorithmic fairness and auditability are increasingly scrutinised by regulators in India's ride-hailing sector."
      diligencePath: "Request Rapido's ML model documentation, pricing algorithm design, and any internal fairness or bias assessments from the data science team during technical due diligence."
      relatedQuestionRefs: [QE004, QE022]
