      Illustrative conversion funnel from cumulative app installs to daily ride sessions. The gap between
      210M total downloads and 74M MAUs reflects inactive or dormant installs; the further gap to 17M
      company-disclosed monthly active customers (Q2 FY25) reflects Rapido's stricter internal definition
      requiring a completed ride. Daily sessions (2.6M) are from Q2 FY25 and are likely higher as of
      May 2026 given continued MAU growth. All figures in millions.
    claimRefs: [CU004, CU001, CU008, CU012]
    sourceRefs: [SU004, SU001, SU009, SU007]

