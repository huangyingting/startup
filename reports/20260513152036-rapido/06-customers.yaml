  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: NPS-CSAT-retention-metrics
      missingEvidence: "Rapido does not publicly disclose any NPS, CSAT, cohort retention, repeat-booking rate, or churn metrics for its consumer segment; no official SLA, satisfaction dashboard, or independent customer satisfaction audit exists."
      whyItMatters: "Without NPS, CSAT, or cohort retention data, the durability of Rapido's MAU leadership cannot be assessed against competitor counter-investments in pricing or driver supply incentives. The platform's high MAU count may include a large proportion of low-frequency or churning users."
      diligencePath: "Request management's internal NPS and CSAT dashboards; obtain cohort retention data by registration vintage (30-day, 90-day, 12-month by cohort); review monthly repeat-booking rates; ask for a third-party customer satisfaction audit if available."
      relatedQuestionRefs: [QU014]

    - type: private-evidence-only
      severity: material
      topic: CAC-unit-economics
      missingEvidence: "Customer acquisition cost (CAC), customer lifetime value (CLV), and per-segment unit economics are not disclosed by Rapido. The trade-off between B2B and consumer CAC is unverifiable from public data."
      whyItMatters: "Without CAC and CLV data, it is impossible to assess the sustainability of MAU growth or determine whether current growth is funded by unsustainable promotional subsidies. The 76% MAU growth in twelve months could reflect organic virality or expensive incentive spending."
      diligencePath: "Request segment-level P&L including marketing spend per acquired customer by channel; ask for monthly average CAC trend over FY25; compare incentive spend per ride to the FY24 benchmark available from public RoC filings."
      relatedQuestionRefs: [QU015]

    - type: private-evidence-only
      severity: material
      topic: women-segment-penetration
      missingEvidence: "Women's share of total Rapido MAU, Pink Rapido and Rapido Shakti ride volumes, female captain conversion rates, and female passenger satisfaction scores are not publicly disclosed. The named corporate client registry for B2B enterprise accounts is also undisclosed."
      whyItMatters: "Rapido has made women's safety a core brand pillar and invested in dedicated products; inability to quantify female user penetration limits assessment of both the social-impact thesis and the addressable market expansion potential from this segment."
      diligencePath: "Request female passenger and captain count by city from management; obtain Rapido Shakti and Pink Rapido ride volume data; review the KSRTC partnership contract for stated outcome targets."
      relatedQuestionRefs: [QU019]
      relatedTableRefs: [TU003]

