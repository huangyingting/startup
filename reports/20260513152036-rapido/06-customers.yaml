company:
  name: Rapido
chapter:
  number: 6
  title: Customers
  summary: >
    Rapido has emerged as India's largest ride-hailing platform by monthly active users, reaching
    approximately 74 million MAUs in February 2026—up 76% year-on-year from 42 million in February
    2025—and surpassing both Uber India (≈39M MAUs) and Ola (≈28M MAUs) in the same period.
    The platform's 210 million cumulative app downloads and a Google Play rating of 4.77/5 from
    over 4.1 million reviews underscore structural adoption, though the 17 million company-disclosed
    monthly active customers as of Q2 FY25 suggests a meaningful gap between installed base and
    engaged riders. Customer growth is primarily driven by price-sensitive urban commuters (23–40
    years old) in IT-hub cities, a rapidly growing Student/Gen Z cohort attracted by sub-₹50
    fares and campus influencer marketing, and a B2B subscription base that reached ₹275 crore
    in FY25 revenue—14× growth year-on-year. Women-safety-oriented services (Pink Rapido, Rapido
    Shakti) and ONDC metro integrations expand serviceable demographics but remain early-stage.
    Named customer proof includes five confirmed institutional and ecosystem partnerships: DMRC
    (metro last-mile), KSRTC (Kerala state transport), Goibibo, redBus, and Magicpin (food
    delivery supply). Satisfaction signals are bifurcated: strong app-store ratings coexist with
    a damaging 1.6/5 MouthShut score and documented complaints about overcharging and refund
    denial. Retention and churn metrics are not publicly disclosed. Geographic concentration in
    Bengaluru, regulatory exclusion from Maharashtra bike-taxi operations, and recurring driver
    strikes (February 2026 nationwide six-hour outage; April 2026 local protests) represent the
    primary customer durability risks.

sections:
  - id: user-scale-growth
    title: User Scale and Growth Trajectory
    body: |
      Rapido's rise to the top of the Indian ride-hailing market in terms of active users is
      among the most striking mobility growth stories in emerging-market tech since 2025.
      Third-party analytics data cited by MoneyControl and Firstpost placed Rapido's monthly
      active user count at approximately 74 million in February 2026, ahead of Uber India
      (≈39 million) and Ola (≈28 million) in the same month. This represents a 76% MAU
      increase from the 42 million recorded in February 2025, a pace that far exceeds typical
      ride-hailing growth benchmarks globally.

      Weekly active user data for the period January 19–February 22, 2026 shows Rapido at
      40.07 million WAUs versus 20.56 million for Uber and 11.63 million for Ola—a roughly
      2× lead over its nearest competitor. The significance of these figures is reinforced by
      a statement from Uber CEO Dara Khosrowshahi, who publicly identified Rapido as the
      tougher competitive threat in India relative to Ola. On the app distribution front,
      Rapido has accumulated 210+ million cumulative installs across Android and iOS, with
      AppBrain analytics estimating an ongoing run-rate of approximately 8.1 million downloads
      per month (≈270,000 per day) as of early 2026.

      The company's own disclosures, via CMV360's reporting of its Q2 FY25 (September–November
      2024) results, describe 17 million monthly active customers and 2.6 million daily rides
      across all categories. The gap between the 74 million MAU figure (third-party analytics)
      and the 17 million company-disclosed monthly active customers is meaningful and likely
      reflects differing methodology: analytics platforms typically measure any app engagement
      (including app opens, price checks, and abandoned bookings), while Rapido's internal
      definition of "active customer" likely requires a completed ride. Diligence should
      clarify which metric is used in investor materials.

      The Karnataka High Court's restoration of bike-taxi licenses in January 2026—after a
      two-year regulatory ban—is expected to have a material positive impact on Rapido's
      Bengaluru-originating ride volumes, its largest market by gross order value. Bengaluru
      was the company's inception city and remains its deepest density market for the bike-taxi
      category. The February 2026 WAU data already captures the early recovery benefit.
    claimRefs: [CU001, CU002, CU003, CU004, CU006, CU007, CU008, CU023]
    tableRefs: [TU001]
    figureRefs: [FU001, FU002]

  - id: customer-segments
    title: Customer Segmentation and Personas
    body: |
      Rapido's customer base can be segmented into six primary groups, each with a distinct
      need state, value proposition, and evidence quality.

      Urban daily commuters aged 23–40 years form the platform's largest segment by ride
      volume. Concentrated in IT and ITES hubs—Bengaluru, Hyderabad, Pune, and Gurugram—these
      users rely on bike taxis or autos for the first and last mile of 5–15 km daily commutes.
      Average fares of ₹40–80 for bike taxis represent a 50–70% discount to equivalent Ola
      and Uber cab options for similar distances. Ride volume data and city concentration
      patterns provide high-quality evidence for this segment, though segment-level revenue
      and margin are not disclosed.

      Students and Gen Z users (18–24 years) represent the fastest-growing cohort, drawn
      primarily by sub-₹50 fares and frictionless booking on a mobile-first platform. Rapido's
      "Smart ho toh Rapido" campaign and campus referral programs have driven strong brand
      recall in this demographic. A survey of over 1,000 Gen Z respondents conducted by The
      Youth Talks confirmed that affordability outweighs brand loyalty when selecting a
      ride-hailing service in this segment. Power Pass daily and weekly subscription products
      also provide retention hooks for regular student commuters.

      Daily wage workers and informal-economy participants value Rapido's acceptance of cash
      payments, early-morning availability, and lowest-market fares for short-haul trips.
      This segment is less well-documented in public sources but is evidenced by Rapido's
      penetration in industrial corridors and high volumes in cities with large manufacturing
      and construction workforces.

      Women travelers have been an explicitly targeted growth segment since at least 2024. The
      Bike Pink pilot in Chennai (2024) matched women captains with women passengers on EV
      bikes. Pink Rapido expanded to Karnataka in February 2025 with a stated goal of employing
      25,000 women captains. Rapido Shakti, launched in Thiruvananthapuram in March 2026 in
      partnership with KSRTC, provides women-only bike-taxi services with trained women
      captains and a safety-first protocol. Despite these initiatives, female penetration of
      total MAU and Pink Rapido ride volumes are not publicly disclosed, limiting quantitative
      assessment.

      Corporate B2B accounts represent Rapido's most commercially significant identified
      enterprise segment. B2B subscription revenue grew 14× in FY25 to ₹275 crore, accounting
      for approximately 30% of total operating revenue. The service—marketed under the Rapido
      Corporate brand—provides centralized booking dashboards, cashless ride settlement,
      consolidated billing, and claims of up to 70% cost reduction versus incumbent cab services
      for banking, FMCG, pharma, retail, logistics, IT/ITES, and MSME clients. Named enterprise
      clients are not publicly disclosed in the B2B product context beyond sector verticals.

      Metro and multi-modal commuters represent an emerging segment enabled by Rapido's ONDC
      integrations with Delhi Metro (DMRC), Mumbai Metro Lines 2A/2B/7/9, Hyderabad Metro,
      Chennai Metro, and Kochi Metro. The DMRC integration generates approximately 100,000
      metro-adjacent rides per day in Delhi, with DMRC's Managing Director describing it as
      "the first time globally where a metro ticket and last-mile booking are integrated in a
      single app." This segment's revenue contribution is not separately disclosed.
    claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017, CU018, CU022, CU040]
    tableRefs: [TU002]
    figureRefs: [FU003, FU004]

  - id: named-customer-proof
    title: Named Customer Proof and Ecosystem Partnerships
    body: |
      Rapido has transitioned from a narrow ride-hailing utility to a multi-modal super-app
      with a growing set of confirmed institutional and ecosystem partnerships. As a B2C
      platform, Rapido does not publish a client registry or disclose enterprise customer
      names in the corporate B2B category. The following named partnerships have been confirmed
      via press releases, government statements, and multiple independent media outlets.

      The DMRC partnership is Rapido's highest-visibility institutional integration. Launched
      in 2024–2025 under the ONDC protocol, it enables Delhi Metro passengers to book a
      Rapido bike or auto from within the DMRC app for first/last-mile connectivity. DMRC's
      Managing Director publicly stated that the integration is unique globally in combining
      metro ticketing and ride-hailing in a single digital session. The 100,000 metro-adjacent
      rides per day attributed to this integration represents a material demand-generation
      channel in Delhi-NCR, though the figure is from Rapido's own disclosures and has not
      been independently audited.

      KSRTC (Kerala State Road Transport Corporation), through the Rapido Shakti program
      launched in March 2026 in Thiruvananthapuram, became Rapido's first state transport
      corporation partner for a women's mobility initiative. The partnership involves KSRTC
      providing training and infrastructure support to women captains operating on the Rapido
      platform. Commercial terms and ride volumes have not been disclosed.

      Travel platform integrations announced in October 2025—with Goibibo (MakeMyTrip Group)
      for flights and cars, redBus for intercity bus tickets, and ConfirmTkt for train
      bookings—make Rapido an intermodal booking hub. These integrations are confirmed
      production-live features rather than pilots; however, transaction volumes and revenue-
      sharing terms remain undisclosed.

      The Magicpin partnership (November 2025), which provides 80,000+ restaurant listings for
      Rapido's Ownly food delivery service, is the most commercially complex named relationship.
      The partnership was confirmed by CNBC-TV18 and the Financial Express. Notably, Zomato
      holds approximately 15% equity in Magicpin, creating a potential structural conflict of
      interest with Rapido's ambition to disrupt the Zomato–Swiggy duopoly. Swiggy's exit from
      its Rapido stake in September 2025 for approximately ₹2,400 crore (≈2.5× return) preceded
      and enabled Rapido's food delivery push, eliminating a shareholder conflict. Ownly's
      commission model (8–15% vs 18–22% for incumbents) is designed to attract restaurant
      partners, but monetization at scale remains unproven as of the report date.

      The corporate B2B segment, while serving named enterprise clients across six declared
      sectors, does not publish individual client names for competitive reasons. The ₹275 crore
      FY25 revenue figure and Rapido's Corporate Partners page provide sector-level proof of
      market adoption but fall short of individual account validation.
    claimRefs: [CU012, CU014, CU022, CU034, CU035, CU036, CU037, CU038, CU039]
    tableRefs: [TU003]

  - id: retention-satisfaction
    title: Customer Retention and Satisfaction Signals
    body: |
      Rapido's satisfaction profile reveals a persistent bifurcation between its app-store
      ratings and independent consumer review platforms—a pattern common in high-volume
      consumer apps where users who complete transactions tend to leave positive reviews,
      while dissatisfied users are disproportionately represented on specialist complaint
      platforms.

      On the Google Play Store, Rapido holds a 4.77/5 rating from over 4.1 million reviews
      as of May 2026, placing it among the highest-rated ride-hailing apps globally. The iOS
      App Store rating is 4.9/5 per AppBrain's aggregation. These figures represent an
      enormous cross-section of users and provide meaningful positive signal about the core
      booking and riding experience. However, all-time averages can mask recency trends, and
      no breakdown by issue category or recency is publicly available.

      Against this, MouthShut.com—India's largest consumer review aggregator for services—
      shows Rapido at approximately 1.6/5 from hundreds of reviews, dominated by complaints
      about overcharging, driver misconduct, poor customer support responsiveness, payment and
      wallet issues, and app technical failures. ConsumerComplaints.in documents specific
      pricing anomalies: a user was charged ₹191 for a 3.26 km ride where the original fare
      estimate for an 8.56 km journey was ₹185, and Rapido's support declined a refund
      request. PissedConsumer and Voxya add to the adverse corpus. A secondary analysis of
      consumer forum data suggests approximately 60% of registered complaints are marked as
      resolved, but Rapido does not publish an official SLA, complaint resolution methodology,
      or aggregate complaint rate.

      Rapido's removal of in-app wallet support for auto rides in 2024—forcing a shift to
      UPI or cash—drew significant criticism from users who had pre-loaded wallet balances
      and faced access difficulties. This product decision is documented in ConsumerComplaints.in
      and PissedConsumer records and represents a reversible but real friction for existing
      customers.

      The most consequential retention risk is supply-side disruption. The February 7, 2026
      nationwide "All India Breakdown" strike—coordinated by the Telangana Gig and Platform
      Workers' Union (TGPWU) and spanning Rapido, Ola, and Uber captains across Delhi,
      Mumbai, Bengaluru, Hyderabad, and other major cities—resulted in a six-hour service
      outage. Captain demands centered on government-notified minimum fares and a ban on
      private non-commercial vehicles operating as de facto taxis. An April 2026 protest by
      Rapido captains in at least one city over falling earnings, with warnings of an
      indefinite service suspension, signals that labor-supply tensions have not been resolved.
      These disruptions directly affect customer experience and create switching opportunities
      for Uber and Ola; the churn impact cannot be quantified from available data.

      Critically, Rapido does not publicly disclose any NPS, CSAT, cohort retention, repeat-
      booking rate, or gross/net revenue retention figures. No audited customer satisfaction
      survey has been published. This is a material diligence gap: without these metrics,
      the durability of Rapido's MAU lead cannot be assessed against competitor counter-
      investments in pricing or driver supply.
    claimRefs: [CU005, CU025, CU026, CU027, CU028, CU029, CU030, CU031, CU032, CU033]
    tableRefs: [TU004]

  - id: expansion-concentration-risk
    title: Geographic Expansion and Concentration Risk
    body: |
      Rapido operates in 450+ Indian cities as of early 2026 and has publicly stated a plan
      to expand to all 800 district headquarters, providing a clear long-run serviceable
      addressable market. The company's 70–75% bike-taxi market share in tier-2 and tier-3
      cities is its most defensible position: Uber and Ola have historically focused capital
      on Tier-1 metro markets, leaving the two-wheeler last-mile in smaller cities largely to
      Rapido's network density advantage.

      Bengaluru remains the single largest market by gross order value, and Rapido's dominance
      there was partially disrupted by Karnataka's two-year regulatory ban on bike taxis, which
      was resolved by the Karnataka High Court's January 2026 judgment restoring licenses. The
      normalization of Bengaluru operations is expected to accelerate FY26 revenue recovery in
      the commission segment, which had been forced into a lead-generation-only model during the
      ban period.

      Maharashtra—India's largest state economy and home to Mumbai, the country's commercial
      capital—represents a structural constraint. Bike-taxi operations are not permitted in
      Maharashtra under existing state transport regulations; Rapido is limited to auto-rickshaws
      and cabs there. This excludes its highest-unit-economics product from a TAM that could
      materially move topline metrics. Regulatory change in Maharashtra would be a significant
      positive catalyst, but no timeline exists as of the report date.

      B2B subscription revenue concentration at approximately 30% of total operating revenue
      (₹275 crore FY25) provides portfolio diversification. The B2B segment appears to have
      multiple clients across six industry verticals, limiting top-account concentration risk,
      but no individual client represents a disclosed revenue percentage, preventing a
      Herfindahl-type concentration assessment.

      Rapido's Ownly food delivery expansion (late 2025, Bengaluru pilot) and the broader
      super-app positioning with travel and transit integrations offer additional channels for
      deepening customer wallet share without proportional CAC increases. However, Ownly
      introduction risks cannibalizing off-peak captain capacity—a risk that, if it materializes
      as commission earnings pressure, could amplify driver attrition and worsen the labor
      supply dynamics already visible in the February and April 2026 protests.

      Ownly's lower-commission model (8–15% vs 18–22% for Zomato and Swiggy) is designed to
      attract restaurant supply, but order economics and contribution margin at the stated rates
      remain unverified at scale. As of May 2026, Ownly's adoption metrics, captain supply
      utilization in food delivery, and restaurant retention are not publicly disclosed.
    claimRefs: [CU019, CU020, CU021, CU023, CU024, CU035, CU039, CU040]
    tableRefs: [TU005]

tables:
  - id: TU001
    title: "Customer Growth Adoption Trajectory Table"
    columns: ["Metric", "Value", "Period / Date", "Source", "Confidence"]
    rows:
      - ["Monthly Active Users (MAU)", "~74 million", "February 2026", "MoneyControl citing third-party analytics", "Medium"]
      - ["Weekly Active Users (WAU)", "40.07 million", "Jan 19–Feb 22, 2026", "MoneyControl citing analytics", "Medium"]
      - ["MAU year-ago comparator", "~42 million", "February 2025", "NewsBytesApp analysis", "Medium"]
      - ["Monthly Active Customers (company-disclosed)", "~17 million", "Q2 FY25 (Sep–Nov 2024)", "CMV360 citing Rapido", "Medium"]
      - ["Daily rides (all categories)", "~2.6 million", "Q2 FY25 (Sep–Nov 2024)", "CMV360 citing Rapido", "Medium"]
      - ["Total app downloads (Android + iOS)", "210M+", "May 2026", "AppBrain / Google Play", "Medium"]
      - ["Monthly download run-rate", "~8.1M/month (~270K/day)", "Early 2026", "AppBrain analytics", "Medium"]
      - ["Google Play rating", "4.77/5 (4.1M+ reviews)", "May 2026", "Google Play Store (via AppBrain)", "Medium"]
    notes: >
      MAU figures are from third-party analytics platforms as cited by MoneyControl and Firstpost;
      Rapido has not independently confirmed the 74M figure. The company-disclosed 17M monthly active
      customers (Q2 FY25) and 2.6M daily rides are from an earlier reporting period and use Rapido's
      internal definition, which likely requires a completed ride transaction rather than any app
      engagement. The MAU gap (74M vs 17M) reflects definitional differences and a four-month
      measurement lag; both figures are directionally consistent with strong adoption. Download data
      and ratings are from AppBrain as of early May 2026.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008]

  - id: TU002
    title: "Customer Segmentation Table"
    columns: ["Segment", "Core Need", "Rapido Value Proposition", "Key Evidence", "Evidence Quality"]
    rows:
      - ["Urban office commuters (23–40 yr)", "Daily 5–15 km commute; speed and cost", "Bike/auto faster than cabs; avg fare ₹40–80; short wait times in high-density zones", "Ride volume data; city concentration in Bengaluru, Hyderabad, Pune, Gurugram IT hubs", "High"]
      - ["Students / Gen Z (18–24 yr)", "Sub-₹50 affordable rides; flexible booking", "Campus influencer marketing; referral programs; Power Pass subscription product", "1,000+ Gen Z survey respondents (The Youth Talks); youth media coverage", "Medium"]
      - ["Daily wage workers / informal economy", "Low-cost 3–10 km trips; cash accepted; early AM availability", "Lowest market fares; cash payment option; early-morning/late-PM availability", "Qualitative evidence; industrial-city platform presence", "Low"]
      - ["Women travelers", "Safe, harassment-free last-mile transport", "Pink Rapido (Karnataka, Feb 2025); Rapido Shakti KSRTC (Mar 2026); Bike Pink pilot (Chennai, 2024)", "Initiative announcements; KSRTC partnership; 25,000 women captain recruitment target", "Medium"]
      - ["Corporate / B2B accounts", "Centralized employee commute management", "Dashboard; cashless settlement; consolidated billing; claimed 70% cost savings", "B2B revenue ₹275 crore FY25 (14× growth); Rapido Corporate Partners official page", "Medium"]
      - ["Metro / multi-modal commuters", "Combined metro ticket + last-mile in single session", "ONDC metro integration with DMRC, Mumbai, Hyderabad, Chennai, Kochi metros", "DMRC 100K metro-adjacent rides/day; DMRC MD global-first quote", "Medium"]
    notes: >
      Segment definitions are based on triangulation of third-party market analyses (Pocketful, Digitofy,
      The Youth Talks), company marketing materials, and news coverage. No segment-level revenue, rides,
      or MAU breakdown has been disclosed by Rapido. Evidence quality reflects depth and independence of
      available sourcing, not relative segment size. The corporate B2B and urban commuter segments are
      best evidenced; daily wage worker, women traveler, and metro/multi-modal penetration rates are
      undisclosed.
    claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017, CU018, CU022]

