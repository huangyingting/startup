companyProfile:
  summary: >
    Rapido (Roppen Transportation Services Pvt. Ltd.) was founded in 2015 in Bengaluru by Aravind
    Sanka (CEO), Rishikesh SR (COO), and Pavan Guntupalli (CTO) — three IIT alumni who previously
    built theKarrier, a logistics startup. Rapido launched as a bike-taxi aggregator and grew to
    become India's largest bike-taxi platform, pivoting in 2023 to a zero-commission SaaS model
    where driver-partners ("captains") pay a fixed daily fee instead of per-ride commissions. In
    September 2024, the company raised $200M in Series E led by WestBridge Capital, achieving a
    $1.1B post-money valuation and joining India's unicorn club as the 108th member. As of 2025,
    Rapido operates across 100+ Indian cities with Bike, Auto, and Cab service lines.
  foundedDate: "2015-01-01"
  founders:
    - name: Aravind Sanka
      role: CEO
      background: >
        Former Flipkart/Ekart logistics executive who scaled Ekart from 10 to 100 cities; IIT
        Bhubaneswar (B.Tech Mechanical Engineering, 2012).
      claimRefs: [CO001, CO011, CO014]
    - name: Rishikesh SR
      role: COO
      background: >
        Co-founder responsible for platform operations since founding; drove Rapido's multi-city
        expansion and captain-onboarding programs.
      claimRefs: [CO001, CO012]
    - name: Pavan Guntupalli
      role: CTO
      background: >
        Co-founder and technology lead; architected Rapido's 2023 transition to the SaaS
        zero-commission platform model.
      claimRefs: [CO001, CO013]
  foundingLocation: Bengaluru, Karnataka, India
  headquarters: Bengaluru, Karnataka, India
  productSummary: >
    Rapido operates three service lines: Rapido Bike (two-wheeler taxi), Rapido Auto
    (auto-rickshaw hailing), and Rapido Cab (four-wheeler taxi). Captains access the platform
    via a daily SaaS subscription (approximately Rs 19–29/day) with no per-ride commission
    deduction. Riders book on-demand through the Rapido app; the company also offers
    enterprise/B2B mobility and intercity travel integrations.
  customerFocus: >
    Primary: urban and peri-urban Indian commuters seeking affordable last-mile and short-haul
    mobility (Tier-1 and Tier-2 cities). Secondary: driver-entrepreneurs ("captains") seeking
    supplemental or primary income via a flexible gig platform. Enterprise: corporate mobility
    and last-mile delivery operators.
  businessModel: >
    Zero-commission SaaS platform: captains pay a fixed daily subscription fee of ~Rs 19–29
    rather than a per-ride commission. Revenue also includes advertising, intercity booking
    commissions, and potential monetization of the captains' financing and insurance ecosystem.
    Gross Order Value (GOV) is not retained — only the platform fee is Rapido's revenue.
  stage: Series E (private)
  fundingStatus: >
    $200M Series E closed September 2024 at $1.1B post-money valuation, led by WestBridge Capital;
    co-investors: Nexus Venture Partners, Swiggy, Think Investments, Invus Opportunities. Total
    raised ~$600M across 13+ rounds since 2015. Swiggy exited its ~12% stake in September 2025
    for Rs 2,400 crore (~$270M) via a secondary to Prosus and WestBridge.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO003, CO004, CO005]

summary:
  headline: >
    Market-leading Indian bike-taxi platform with strong revenue growth and rapid loss compression,
    but elevated valuation multiple and persistent regulatory risk warrant a cautious buy stance.
  overallScore: 7.0
  recommendation: buy
  confidence: medium
  riskRating: high
  valuationStance: fair
