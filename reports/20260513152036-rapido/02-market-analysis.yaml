          detail: "Deloitte: India reaches 1B smartphone users by 2026; rural CAGR 6% (2021–2026); UPI 15B txns/month"
        - id: "gig-supply"
          label: "Gig Worker Supply Pool (12M FY2025 → 23.5M by 2030)"
          type: enabler
          detail: "NITI Aayog / Economic Survey 2025-26: gig workers to form 6.7% of non-agricultural workforce by 2029-30"
        - id: "regulatory-framework"
          label: "Regulatory Framework (MVAG 2025)"
          type: constraint
          detail: "MoRTH MVAG 2025 (July 2025): national framework for private-motorcycle bike taxis; state adoption discretionary"
        - id: "platform"
          label: "Ride-Hailing Platform (Rapido, Ola, Uber)"
          type: system
          detail: "Aggregator connects captain supply with rider demand; earns subscription fee (Rapido) or commission (Ola/Uber)"
        - id: "ev-tailwind"
          label: "EV Two-Wheeler Adoption (28% CAGR 2026–2034)"
          type: enabler
          detail: "IMARC: 1,233.6K EV 2W units in 2025; fleet segment 40% CAGR 2026–2030; lower captain operating cost"
        - id: "congestion"
          label: "Urban Congestion (structural)"
          type: enabler
          detail: "Bikes 30–40% faster than cars in Indian urban corridors; TomTom: Bengaluru congestion +20% post bike-taxi ban"
        - id: "rider-demand"
          label: "Rider Demand (74M MAUs Rapido Feb 2026)"
          type: outcome
          detail: "High-frequency, price-sensitive urban commuters; 5M+ daily rides; 70% market share in bike taxis (Rapido claim)"
      edges:
        - from: "smartphone-infra"
          to: "platform"
          label: "enables app adoption and digital payments"
        - from: "gig-supply"
          to: "platform"
          label: "provides captain supply"
        - from: "regulatory-framework"
          to: "platform"
