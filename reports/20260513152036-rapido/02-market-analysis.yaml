  evidenceGaps:
    - type: missing-source
      severity: material
      topic: market-size
      missingEvidence: "An independent third-party analyst estimate specifically sized for India's bike-taxi (two-wheeler passenger) sub-segment in revenue terms, separated from commercial delivery and cab-hailing."
      whyItMatters: "All current public sizing estimates cover either the broad India taxi market (Mordor, USD 23.98B) or the commercial two-wheeler market inclusive of delivery (Marqstats, USD 3.28B). Neither cleanly isolates Rapido's bike-taxi SAM. Without a clean SAM figure, valuation multiples derived from market-size comparables carry significant scope-definition risk."
      diligencePath: "Commission or acquire a custom deep-dive from RedSeer, Redseer Strategy Consulting, or Elara Capital specifically on the India bike-taxi passenger segment revenue in FY2025 and FY2026; alternatively, triangulate from Rapido's RoC filings (subscription fee volume × captain count × days) as a proxy for SAM penetration."
      relatedQuestionRefs: [QM002, QM015]
      relatedTableRefs: [TM002]

    - type: private-evidence-only
      severity: material
      topic: market-share
      missingEvidence: "Independent verification of Rapido's claimed 70% bike-taxi market share, ~40% auto-rickshaw share, and 22% cab share by a third-party research firm."
      whyItMatters: "Market-share claims are made by Rapido's own CEO (Inc42 interview) and repeated in trade press without independent audit. Competitor filings (Ola is private; Uber India filings differ from ride-volume data) do not directly cross-validate the claims. Overstated market share would distort SOM calculations and growth projections."
      diligencePath: "Request confidential market data from RedSeer, Sensor Tower ride-hailing MAU comparisons, and Appsflyer install/active-user comparisons; cross-check Rapido subscription fee volumes against implied captain-count × subscription price."
      relatedQuestionRefs: [QM002, QM014]
      relatedTableRefs: [TM002]

    - type: missing-source
      severity: minor
      topic: regulatory
      missingEvidence: "Official MVAG 2025 implementation notifications from at least 10 individual Indian state transport departments confirming adoption, and the outcome of Karnataka's Supreme Court SLP."
      whyItMatters: "MVAG 2025 is a framework; actual operationalization requires state-specific notifications. Without tracking which states have formally adopted compatible rules, the serviceable geographic SAM cannot be precisely determined. Karnataka's SC outcome is the single highest-impact unknown."
      diligencePath: "Monitor Karnataka Supreme Court case docket (Civil Appeal); track state transport department notifications on MoRTH portal; verify Maharashtra draft e-bike-taxi rules finalization timeline with Maharashtra Transport Department."
      relatedQuestionRefs: [QM006, QM020, QM028]
      relatedTableRefs: [TM005]

    - type: conflicting-data
      severity: material
      topic: market-size
      missingEvidence: "Reconciliation between Mordor Intelligence's USD 23.98B India taxi market (2026) and Grand View Research's ~USD 4.5B India ride hailing figure (2026 extrapolated), which differ by more than 5x."
      whyItMatters: "The divergence is not explainable by growth-rate differences alone; it reflects different market definitions. Anchoring any valuation model or market-sizing table to either estimate without resolving the definition gap leads to wildly different market-size multiples. Investors should not conflate the two estimates."
      diligencePath: "Obtain methodology footnotes from both Mordor Intelligence and GVR; determine whether Mordor includes offline taxi dispatch and all vehicle types, while GVR excludes traditional metered taxis; build a scope-normalized comparison."
      relatedQuestionRefs: [QM001, QM025]
