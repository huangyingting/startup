        - from: "ev-tailwind"
          to: "gig-supply"
          label: "lowers captain operating cost, improves retention"
        - from: "congestion"
          to: "rider-demand"
          label: "drives preference for faster two-wheeler rides"
        - from: "platform"
          to: "rider-demand"
          label: "delivers on-demand mobility"
    approximationNotes: "Value-chain flow based on synthesis of RedSeer, Mordor Intelligence, Deloitte, NITI Aayog, IMARC, and MoRTH sources. Edge labels are directional relationships, not quantified flows."
