  - id: FM004
    title: India Ride-Hailing Market Adoption Value Chain
    type: flow
    layout: standard
    summary: "Value-chain flow showing how smartphone/connectivity infrastructure, regulatory enablement, driver supply, and consumer demand combine to deliver ride-hailing market growth in India."
    data:
      nodes:
        - id: "smartphone-infra"
          label: "Smartphone / Internet Infrastructure (1B users by 2026)"
