      - ["Tamil Nadu, Gujarat (high-urbanization states)", "Status unclear / grey zone as of May 2026", "No state-specific bike-taxi notification; MVAG 2025 not yet adopted", "Potential mid-size markets; currently in regulatory limbo", "Watch-list — state transport departments expected to notify rules within 6–12 months"]
      - ["Goa", "Permitted (pioneer since 1980s)", "Historical state-level permission; oldest legal bike-taxi market in India", "Small market; operational; used as regulatory benchmark", "Stable; minimal material impact on Rapido scale"]
    notes: "Regulatory status is based on press reports (The Hindu, Livemint, Scroll.in, Medianama) as of May 2026. The MVAG 2025 framework (issued July 1, 2025) allows states to formally permit private motorcycle aggregation under Section 67(3) of the MV Act; actual state adoption is not automatic. States with no formal prohibition may still require specific transport department notifications. Karnataka's Supreme Court SLP (Special Leave Petition) outcome is the single highest-impact regulatory event for Rapido in 2026. Rapido's public statements welcomed MVAG 2025 and its Clause 23 specifically."
    claimRefs: [CM021, CM022, CM023, CM027, CM028, CM030, CM049]

figures:
  - id: FM001
    title: India Ride-Hailing Market Sizing Pyramid (TAM–SAM–SOM)
    type: pyramid
    layout: standard
    summary: "Nested TAM/SAM/SOM sizing pyramid for Rapido's India ride-hailing market opportunity, based on Mordor Intelligence (broad taxi market), Marqstats (commercial two-wheeler), and inferred SOM from Rapido market-share claims."
    data:
      items:
        - label: "TAM — India Taxi Market (all categories, 2026)"
          value: "USD 23.98B"
          detail: "All app-based and offline taxi, cab, auto-rickshaw, and bike-taxi bookings in India. Source: Mordor Intelligence 2026. CAGR 7.78% through 2031."
        - label: "SAM — India Commercial Two-Wheeler Market (2026)"
          value: "USD 3.28B"
          detail: "App-based and commercial bike-taxi plus delivery segments using two-wheelers. Source: Marqstats 2026. CAGR 17.24% through 2030."
        - label: "SOM — Rapido-Addressable Bike Taxi + Auto Segment (est.)"
          value: "~USD 0.9–1.2B (inferred)"
          detail: "Estimated from Rapido's 70% bike-taxi market share and ~40% auto share of the two-wheeler SAM. No independent third-party SOM estimate is publicly available; this is a Rapido-company-claimed inference."
        - label: "Rapido Revenue Capture (FY2025)"
          value: "Rs 934 crore (~USD 112M)"
          detail: "Actual FY25 operating revenue (subscription fees + delivery + transport). Reflects current platform monetization of the SOM. Source: Medianama / RoC filing."
    approximationNotes: "SOM figure is inferred from company market-share claims (Inc42/Rapido CEO) applied to Marqstats SAM. It is not independently corroborated and should be treated as a working estimate. The TAM figure uses Mordor Intelligence's broad India Taxi Market definition, which includes all vehicle types and booking channels; pure digital TAM (ride-hailing only) is smaller (~USD 15.6B using 65.10% ride-hailing share). Revenue Capture is in Rs crore from audited RoC filing; converted at ~Rs 83/USD."
    claimRefs: [CM001, CM003, CM013, CM014, CM018]

  - id: FM002
    title: India Ride-Hailing Market Size Estimates — 2026 Range by Source
    type: range
    layout: standard
    summary: "Low/base/high range of 2026 market size estimates for key India ride-hailing market segments, across four analyst lenses. All values in USD billions. Scope definitions differ materially; ranges reflect analyst divergence, not forecast uncertainty within a single model."
    data:
      items:
        - label: "India Taxi Market — broad scope (Mordor Intelligence)"
          low: 22.0
          mid: 23.98
          high: 26.0
          unit: "USD B"
          detail: "All taxi categories including traditional dispatch + app-based; CAGR 7.78% 2026–2031. Low/high reflect conservative/bullish extrapolation from 2025 base."
        - label: "India Commercial Two-Wheeler Market (Marqstats)"
          low: 3.0
          mid: 3.28
          high: 3.6
          unit: "USD B"
          detail: "Commercial 2W including ride-hailing and delivery fleet; CAGR 17.24% 2026–2030. Most directly applicable to Rapido's SAM."
        - label: "India Ride Hailing Services — narrow scope (Grand View Research)"
          low: 3.5
          mid: 4.5
          high: 5.5
          unit: "USD B"
          detail: "App-based ride hailing only (extrapolated from USD 2.51B in 2025 at 20.7% CAGR 2026–2033). GVR base year definition excludes traditional dispatch."
        - label: "India Ride Hailing Market — 6Wresearch (no absolute base)"
          low: 5.0
          mid: 6.5
          high: 8.0
          unit: "USD B"
          detail: "6Wresearch provides CAGR of 6.4% for 2026–2032 but no published absolute base. Range is analyst-estimated from CAGR applied to implied base consistent with peer estimates."
        - label: "Rapido-Addressable SOM — inferred (bike taxi + auto)"
          low: 0.8
          mid: 1.05
          high: 1.3
          unit: "USD B"
          detail: "Inferred from 70% bike-taxi share + ~40% auto share of Marqstats SAM. Not independently corroborated. Confidence: low; diligence required."
    approximationNotes: "Items 1–4 reflect different market definitions; they cannot be ranked or summed. Item 5 is inferred from company-claimed market shares and Marqstats SAM. All INR figures converted at Rs 83/USD. GVR 2025 base of USD 2.51B grows to ~USD 4.5B in 2026 at 20.7% CAGR. Low/high ranges for Mordor and Marqstats represent confidence intervals around their published central estimate. 6Wresearch range is analyst-estimated without a disclosed base year figure."
    claimRefs: [CM001, CM002, CM003, CM004, CM005, CM010, CM013]

