      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              多股宏观经济、技术和结构性力量正在汇合，推动印度网约车市场加速。


              智能手机和互联网普及是基础驱动。Deloitte 曾预计，印度智能手机用户到 2026 年将达到 1 billion，农村采用率 CAGR 为 6%，高于城市的 2.5%。到 2025 年末，印度约有 1.03
              billion 互联网用户；这一渗透率足以支撑网约车 app 达到大众市场规模。到 2025 年初，UPI 每月 15 billion 笔交易消除了无现金车费支付摩擦，使没有信用卡的用户也能使用数字化网约车。


              城市拥堵是持续的结构性顺风。印度一线城市位居全球最拥堵城市之列；TomTom Index 数据显示，2025 年 6 月两轮车网约车禁令出台后数日内，Bengaluru 拥堵程度约上升
              20%——这是两轮车替代价值的直接量化。在拥堵的城市走廊中，两轮车平均比汽车行程快 30–40%。


              零工经济供给扩张既是平台运力驱动，也是市场增长信号。印度零工劳动力在 FY2025 达到 12 million（Economic Survey 2025-26），较 FY2021 的 7.7 million 增长
              55%。NITI Aayog 基准情景预计，2029–30 年零工劳动者将达到 23.5 million。更大的供给池降低司机获取成本，提高供给密度，进而改善新开城市的等待时间和乘客满意度。


              EV 采用带来另一股顺风，因为它压低了两轮车运营者的成本。India Electric Two-Wheeler Market 在 2025 年达到 1,233.6 thousand units，IMARC 预计到
              2034 年 CAGR 为 28.20%。车队板块在 2026–2030 年约以 40% CAGR 增长。EV 更低的每公里燃料和维护成本，即使在固定订阅模式下也能改善 captain
              利润，进而提升司机留存和车队质量。
