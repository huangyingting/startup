chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Rapido 的法律名称为 Roppen Transportation Services Private Limited，是印度最大的两轮车网约车和按需出行平台，总部位于 Karnataka 的
              Bengaluru。公司由 Aravind Sanka、Rishikesh SR 和 Pavan Guntupalli 于 2015 年创立，在印度 100+ 个城市运营，通过移动应用连接城市通勤者与
              “captains”（司机伙伴）。


              公司提供三条核心服务线：Rapido Bike（两轮车网约车）、Rapido Auto（三轮车叫车）和 Rapido Cab（四轮车网约车）。按乘车量看，两轮车网约车占总订单的 50%
              以上；按订单总额（GOV）看，三轮车约占 40%，两轮车约占 30%，四轮车约占 30%。截至 2024 年 Series E 轮完成时，公司每天处理约 2.3–2.5 million 笔全品类订单。


              2023 年，Rapido 做出关键战略转向：从按单抽佣的出行聚合平台，转为零佣金软件即服务（SaaS）平台。在该模式下，captain 每天支付 Rs 19–29 的固定平台订阅费，换取 Rapido
              的技术和订单匹配工具，而不是交出每笔车费的一定比例。Pavan Guntupalli 曾公开表示：“每位 captain 每天支付一个固定金额，比如 19 卢比或 29 卢比。这就是 Rapido
              的收入来源。”该模式显著改写了司机伙伴的激励结构，也给 Rapido 带来部分不受乘车量波动影响的订阅收入基础。公司称，在 Ola 和 Uber 仍保留佣金模式时完成这一转型，是吸引更大 captain
              供给并加速增长的关键差异点。


              Rapido 面向价格敏感的日常通勤者，他们在印度城市中寻找最后一公里连接，尤其是 2–15 km
              的行程：两轮车通常比三轮车或四轮车更快、更便宜。平台把自己定位为大众市场方案，而非高端出行服务。按两轮车网约车乘车量计算，公司称自己已是印度仅次于 Uber 的第二大网约车平台；据 Entrackr
              审阅的公司内部文件，Rapido 据称已在 2024 年超过 Ola。
