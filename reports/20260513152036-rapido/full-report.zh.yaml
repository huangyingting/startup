        - 若该轮低于 $2.3B 完成，意味着降价轮；若高于该水平，则验证基准情景轨迹
        - 跟踪 Moneycontrol/Entrackr 的交割公告；跟踪 Prosus 季度投资者披露
      - - FY2026 EBITDA 指引确认
        - 管理层指引 FY2026 实现 EBITDA 盈亏平衡；月度烧钱速度和 FY2026 损益表未公开披露
        - EBITDA 盈亏平衡是 IPO 准备度和估值重估的核心催化剂；未经确认的指引无法建模
        - 索取 CFO 数据室；复核 FY2025 RoC 文件；交叉核验 Entrackr FinTrackr 季度估计
      - - 股权结构表与清算优先权瀑布
        - 轮后完整股东名册、WestBridge 优先权条款和 Prosus 持股条款未公开
        - WestBridge Series E 和 Prosus 轮带来的优先权压力可能限制普通股上行空间
        - 正式数据室；联系 WestBridge 和 Prosus IR；交叉比对 Swiggy RoC 文件披露
      - - Delhi NCR 监管策略与法律时间表
        - 未见关于 Delhi NCR 合法化的主动请愿、拟议规则修改或邦级磋商公开记录
        - Delhi NCR 约占印度城市网约出行 TAM 的 25-30%；永久排除会造成结构性损伤
        - 接触 Rapido 政府事务团队；监测 Delhi HC 案件排期；跟踪 MoRTH MVAG 2025 落地
      - - Captain 单位经济：CAC、LTV、日活流失率
        - Rapido 未公开 captain 获客成本、生命周期价值和日流失率
        - 订阅模式单位经济是盈利投资逻辑的根基；假设尚未验证
        - 索取包含 captain 经济拆分的管理账目；委托独立市场调研
    notes: 第 1、2 项（Prosus 轮和 EBITDA 指引）具备时效性，可能在 2026 年 5 月后的六个月内解决。第 3-5 项需要正式数据室权限，仅靠公开信息渠道仍会悬而未决。
figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: standard
    summary: Rapido 自 2015 年创立至 Karnataka 高等法院裁决（2026 年 1 月）的关键融资、产品、监管和反向事件。
    data:
      items:
        - label: '2015'
          value: Founded — India's first bike-taxi
          detail: Aravind Sanka、Rishikesh SR 和 Pavan Guntupalli 在 Bengaluru 创立 Rapido；从 theKarrier 物流创业公司转型后，它成为印度首个摩托车出租平台
          tone: positive
        - label: 2022-04
          value: Series D — $180M (Swiggy-led)
          detail: Swiggy 领投 $180M Series D，估值约 $800M；TVS Motor、WestBridge、Nexus、Shell 跟投；公司接近独角兽
          tone: positive
        - label: '2023'
          value: Zero-commission SaaS pivot
          detail: Rapido 从按单抽佣转向 captain 日订阅费（Rs 19–29/天）；Pavan Guntupalli 主导平台转型
          tone: positive
        - label: 2024-03
          value: Karnataka bans bike taxis
          detail: Karnataka Congress 政府以缺少《Motor Vehicles Act》框架为由禁止摩托车出租服务；一场持续 22 个月的法律争议由此开始
          tone: risk
        - label: 2024-09
          value: Series E — $200M, unicorn at $1.1B
          detail: WestBridge Capital 领投 $200M Series E；Nexus、Swiggy、Think Investments、Invus 跟投；Rapido 成为印度第 108 家独角兽
          tone: positive
        - label: 2025-06
          value: Karnataka HC halts bike-taxi ops
          detail: Karnataka 高等法院裁定自 2025 年 6 月 16 日起停运；Rapido 暂停其大本营 Bengaluru 的摩托车出租业务
          tone: risk
        - label: 2025-11
          value: Ride-hailing ops declared profitable
          detail: 管理层称网约出行业务已退出烧钱阶段；截至 2026 年 5 月，FY2025 审计结果仍未发布
          tone: positive
        - label: 2026-01
          value: Karnataka HC lifts ban
          detail: 高等法院裁定摩托车属于运输车辆；允许申请许可证；Rapido 可在符合邦条件后恢复 Karnataka 运营
          tone: positive
    approximationNotes: 时间线日期来自媒体报道；2022 年前事件颗粒度约略到年份，而非精确到日历季度。
