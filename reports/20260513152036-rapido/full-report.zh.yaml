      - number: '1.4'
        title: 运营规模与关键指标
        blocks:
          - type: paragraph
            body: >
              Rapido 的 FY2024（2023 年 4 月–2024 年 3 月）经营收入为 Rs 648 crore，较 FY2023 的 Rs 443 crore 同比增长
              46.3%。计入相关服务和非经营收入后，总收入约 Rs 695 crore。配送（两轮物流）板块贡献 Rs 265 crore；订阅收入（captain 平台费）增长 171.4% 至 Rs 19
              crore，反映 SaaS 模式下 captain 基数快速扩张。最大费用项——激励成本——下降 11% 至 Rs 460 crore。净亏损从 FY2023 的 Rs 675 crore 大幅改善至 Rs
              371 crore，收窄 45%，显示出明显经营杠杆。


              GOV 几乎翻倍，从 Rs 2,419 crore（FY2023）增至 Rs 4,257 crore（FY2024）。FY2025 Q2（2024 年 7–9 月）动能进一步加速：平台处理 207 million
              次出行，GOV 同比增长 2.5x，亏损较上年同期下降 77%。Rapido 公开称，网约车业务已在 FY2025 H2 进入盈利，结束管理层所称的“烧钱阶段”。这些经营盈利说法尚未得到 FY2025
              审计年报独立印证；截至 runDate，该年报尚未公开。


              供给侧规模方面，截至 2024 年，Rapido 拥有超过 2 million 名活跃 captain，服务约 17 million 月度乘客。公司目标是在 FY2027 通过 SaaS 模式达到 5
              million（50 lakh）名活跃 captain。这些增长目标说明，公司更想加深现有市场供给密度，而不是把城市数量扩到当前 100+ 之外。
