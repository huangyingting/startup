  - id: FV002
    type: bar
    layout: standard
    title: 估值敏感性 - 收入倍数情景（USD millions）
    summary: >-
      柱状图展示不同收入倍数下的 Rapido 隐含估值，这些倍数作用于 FY2025 收入 Rs 934 crore（~$111M），覆盖上市可比公司悲观情景（6x）、2025 年 9
      月老股交易标记（20.5x）和乐观情景（31.5x）。
    approximationNotes: 收入按 USD/INR 84 换算。所有倍数均为分析师估计；实际结果取决于财务表现、监管进展和市场条件，截至 2026 年 5 月尚未确认。
    data:
      items:
        - label: GoTo 可比公司底部（6x FY25 收入）
          value: 667
          unit: USD millions
          detail: 6x FY2025 收入（$111M）= $667M；GoTo 可比的低迷倍数；悲观情景底部
          claimRefs:
            - CV016
        - label: Series E 标记（9.8x FY25 收入）
          value: 1087
          unit: USD millions
          detail: $1.1B 2024 年 9 月 Series E = 9.8x FY2025 收入；WestBridge 的历史进入标记
          claimRefs:
            - CV001
        - label: Grab 可比公司中点（12x FY25）
          value: 1332
          unit: USD millions
          detail: 12x FY2025 收入；Grab/上市可比区间中点，带增长溢价；基准可比底部
          claimRefs:
            - CV008
        - label: 2025 年 9 月老股交易（20.5x FY25）
          value: 2277
          unit: USD millions
          detail: $2.3B 2025 年 9 月老股交易 = 20.5x FY2025 收入；当前可观察市场价格
          claimRefs:
            - CV005
        - label: 基准情景（22.5x FY25 收入）
          value: 2498
          unit: USD millions
          detail: 22.5x FY2025 收入；需要 FY2026 EBITDA 盈亏平衡、Prosus 融资和 IPO 轨迹同时成立
          claimRefs:
            - CV017
        - label: 乐观情景（31.5x FY25 收入）
          value: 3497
          unit: USD millions
          detail: 31.5x FY2025 收入；具备 IPO 准备状态，加上 Delhi NCR 放开和新垂类规模化；乐观上限
          claimRefs:
            - CV018
  - id: FV003
    type: range
    layout: standard
    title: 估值 / 回报区间 - Rapido 情景结果（USD millions）
    summary: Rapido 悲观、基准、乐观估值区间，并叠加战略收购情景，展示从 2025 年 9 月约 $2.3B 老股交易价格出发的概率加权回报画像。
    approximationNotes: 所有区间均为分析师估计，并以 2025 年 9 月老股交易为锚。收购溢价区间假设较独立价值高出 20-40% 的战略溢价。概率分配只作方向参考，并非精算结果。
    data:
      items:
        - label: 悲观情景（~20% 概率）
          low: 900
          high: 1300
          unit: USD millions
          detail: Delhi NCR 永久关闭；市场份额流失；EBITDA 推迟；Prosus 融资失败；~20% 概率
        - label: 基准情景（~55% 概率）
          low: 2300
          high: 2800
          unit: USD millions
          detail: FY2026 EBITDA 盈亏平衡；Prosus $350M 完成交割；2026 年底提交 IPO 文件；份额稳定；~55% 概率
        - label: 乐观情景（~25% 概率）
          low: 3000
          high: 4000
          unit: USD millions
          detail: Delhi NCR 2026 年开放；到 FY2027 增长 40%+；IPO 或战略 M&A 取得溢价；~25% 概率
        - label: 战略收购溢价（基准）
          low: 2700
          high: 3400
          unit: USD millions
          detail: 较基准情景独立价值高 20-40% 的 M&A 溢价；物流收购方或全球网约车平台
        - label: 概率加权 EV
          low: 2200
          high: 2800
          unit: USD millions
          detail: 悲观 / 基准 / 乐观按 20/55/25 加权；与 $2.3B 老股交易一致；从当前价格看上行有限
  - id: FV004
    type: kpi
    layout: standard
    title: 投资 KPI - Rapido 尽调评分卡
    summary: 面向 IC 的评分，覆盖市场机会、技术验证、竞争护城河、财务健康、商业牵引力、风险调整后回报，以及 Rapido 截至 2026 年 5 月的证据质量。
    sourceRefs:
      - SV001
      - SV002
      - SV007
    claimRefs:
      - CV001
      - CV023
      - CV030
    data:
      items:
        - label: 市场机会
          value: 8
          score: 8
          detail: 印度网约车 CAGR 18-20%；2025 年市场 $2.5B+；城市化和智能手机顺风；8/10
        - label: 技术验证
          value: 6
          score: 6
          detail: 平台日订单 2.5M+；订阅模式规模化运转；AI 安全功能；无前沿技术护城河；6/10
        - label: 竞争护城河
          value: 7
          score: 7
          detail: ~50% 总行程份额；Captain 供给网络；订阅忠诚模式；Ola 下滑但 Uber 加码；7/10
        - label: 财务健康
          value: 6
          score: 6
          detail: FY25 EBITDA 亏损收窄 75%；Rs 258Cr 净亏损对应 Rs 934Cr 收入；指引 FY26 EBITDA 盈亏平衡；6/10
        - label: 商业牵引力
          value: 8
          score: 8
          detail: FY25 收入增长 44%；订阅收入 14x；450+ 城市；2.5M 日订单；Swiggy 3 年 2.5x 回报；8/10
        - label: 风险调整后回报
          value: 5
          score: 5
          detail: 在 $2.3B 估值已达 FY25 收入 20.5x；悲观 $1.1B，乐观 $3.5B；上行有限 / 下行显著的不对称；5/10
        - label: 证据质量
          value: 6
          score: 6
          detail: FY25 财务已确认；老股交易估值已确认；股权结构未披露；EBITDA 指引未确认；6/10
