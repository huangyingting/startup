      - number: '1.6'
        title: 战略方向与增长展望
        blocks:
          - type: paragraph
            body: >
              Rapido 的近期战略围绕三条线展开：（1）加深四轮车（Rapido Cab）渗透，在一线城市直接对抗 Ola 和 Uber；（2）将 captain 基数扩向 FY2027 5 million
              目标，提高供给密度和利用率；（3）借两轮车车队服务即时零售和超本地配送合作，在 FY2024 已实现 Rs 265 crore 配送收入的基础上继续放大。


              零佣金 SaaS 模式是 Rapido 相对竞争对手的核心结构性差异。公司认为，该模式能降低 captain 流失，吸引更多供给，并在不承担按量波动风险的情况下提供更可预测的收入。不过 FY2024 订阅收入只有
              Rs 19 crore（总经营收入 Rs 648 crore），说明当前大部分收入仍来自配送板块，以及可能的平台费或广告等其他来源。能否在维持有竞争力的出行经济性的同时，把 SaaS
              订阅线真正做大，将是关键运营挑战。


              $1.1 billion 的独角兽估值（Series E，2024 年 9 月）截至 runDate（2026 年 5 月）没有被任何后续公开融资轮更新，因此该估值已有约 20 个月历史。公司未释放 IPO
              时间表。2026 年 1 月 Karnataka 监管问题解决，移除了公司本土市场的一大运营扰动；不过取得正式摩托车运输许可所需合规成本，可能带来新的开销。未来 IPO 或后期融资事件的关键指标，仍是合并 P&L
              层面经审计盈利，而不仅是网约车分部盈利。
