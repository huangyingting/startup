      - number: '2.5'
        title: 采用约束与市场壁垒
        blocks:
          - type: paragraph
            body: >
              尽管顺风强劲，印度 app 化两轮车网约车的市场增长速度和可持续性仍受几类采用约束限制。


              监管碎片化是最重要的近期风险。MVAG 2025 框架为私人摩托车作为两轮车网约车建立了全国许可路径，但执行由各州自行决定。Karnataka——Rapido 所在州，也是 Bengaluru
              这一最高量城市所在州——在 High Court 裁决后，自 2025 年 6 月 16 日起禁止两轮车网约车。虽然后来 HC 在 2026 年初有条件允许运营，Karnataka 政府仍向 Supreme
              Court 申请恢复禁令。Maharashtra 的电动两轮车出租规则草案仍在审查。多个州处于监管悬而未决状态，限制了可服务供给。由此产生运营不可预测性：Rapido 在任一州的 captain
              供给，可能在预警很有限的情况下失去合法运营能力。


              收入波动和零工福利既是经济约束，也是监管约束。印度约 40% 零工劳动者月收入低于 Rs 15,000（Economic Survey
              2025-26）。波动市场中的司机流失率较高，最低车费保障和社会保障倡议也在升温——这可能带来成本上升或监管强制要求，削弱平台灵活性。2025–26 年，多个城市发生过司机罢工。


              安全感知是需求侧约束，尤其影响女性乘客。鲁莽驾驶和不戴头盔等事件制造声誉风险，也让部分用户转向四轮车替代方案。平台必须投入安全培训、实时监控和纠纷处理，才能降低安全敏感人群流失。


              竞争和利润率压缩构成结构性盈利壁垒。Uber 在 FY2026 向其印度子公司投入约 Rs 3,000 crore，以反击 Rapido
              的增长。既有巨头的资本强度可以支撑折扣驱动竞争，压低乘客获取成本，但也会同步挤压 captain 经济性和平台利润率。
