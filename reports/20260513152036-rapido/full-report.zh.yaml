      - number: '7.6'
        title: 人员、执行与宏观风险
        blocks:
          - type: paragraph
            body: >
              Rapido 的三位创始人 Aravind Sanka（CEO）、Rishikesh SR（COO）和 Pavan
              Guntupalli（CTO）带领公司从种子期走到独角兽，但高管梯队不深，使公司在关键执行窗口面临关键人风险。公司没有公开披露继任安排，也没有披露副 CEO/COO 结构。从 100+
              城市扩展到更广泛的全国覆盖，需要产品、运营、司机供给、监管事务和企业 SaaS 销售同时做到优秀；随着地理范围扩大，执行复杂度会非线性上升。

              除公司自身风险外，Rapido 还面临多项宏观和外部风险。印度正在演进的零工监管——平台工作者（登记与社会保障）法案草案——提出强制登记零工、平台缴纳社会保障（估计为每名工作者收入的
              1–2%）以及最低收入保障。若立法以接近草案的形式通过，Rapido 的单司机成本结构将显著抬升。对持有 Rapido USD 或 EUR 仓位的国际投资者而言，外汇风险也相关：印度卢比长期相对美元贬值，若
              INR 持续贬值 5–10%，以 USD 计的回报将等幅下降。燃油价格波动影响司机供给经济性：原油价格高企时，司机运营成本上升，但 Rapido
              固定订阅收入不会同步增加，激励错配可能触发供给侧流失。下方人员与执行风险登记表、投资逻辑监控表总结了关键监控阈值。
