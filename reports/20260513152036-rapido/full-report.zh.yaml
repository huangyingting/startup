  - id: FI001
    title: Rapido 融资时间线
    type: timeline
    layout: standard
    summary: |
      梳理 Rapido 自 2015 年创立以来至 2025 年已知最新 Series E 延展轮和投资者退出中的关键融资轮次与老股交易，展示其从种子期走到独角兽、再向后推进的过程。
    data:
      items:
        - label: 2015–2018
          value: Seed rounds (~$3–4M)
          detail: Astarc Ventures、AdvantEdge、Skycatcher、Integrated Capital 参与多笔早期交割；在 Bengaluru 靠自筹资金跑通两轮网约车概念验证
          tone: positive
        - label: 2019-04
          value: Series A–B (~$66M total)
          detail: >-
            Nexus Venture Partners 领投 Series A（~$11M）；WestBridge Capital 领投 Series B（~$55M）；两轮均在 2019 年完成；Rapido
            扩至机动三轮车和更多城市
          tone: positive
        - label: 2021-05
          value: Series C (~$52M)
          detail: WestBridge Capital 与 Shell Ventures 共同领投；India Yamaha Motor、Pawan Munjal Family Trust 参投；设定扩张至 100 个城市的目标
          tone: positive
        - label: 2022-04
          value: Series D — $180M (Swiggy lead, ~$800M val.)
          detail: Swiggy 作为战略投资方投入 ~$124–125M；TVS Motor、WestBridge、Nexus 跟投；Rapido 估值 ~$800M，略低于独角兽门槛
          tone: positive
        - label: 2024-09
          value: Series E — $200M (WestBridge, $1.1B unicorn)
          detail: WestBridge Capital 领投 $120M；Nexus、Think Investments、Invus 跟投；Rapido 以 $1.1B 投后估值进入独角兽行列
          tone: positive
        - label: 2025-09
          value: Swiggy exits — Rs 2,400 crore (~$270M)
          detail: Swiggy 将 ~12% 持股全部出售给 Prosus 和 WestBridge；对应 Rapido $2.5–2.7B 估值；Swiggy 在 ~3 年内回报 2.5×
          tone: neutral
        - label: 2025-11
          value: TVS Motor exits — Rs 288 crore
          detail: TVS Motor 将其 Rapido 持股全部出售给 Accel India 和 Prosus（MIH Investments）；股权结构向 WestBridge、Prosus、Nexus 集中
          tone: neutral
    approximationNotes: >
      种子轮和早期轮次金额来自二级数据库估算（Tracxn、Inc42、PitchBook）。Series D–E 数据经媒体、Entrackr 和 VCCircle
      确认。老股交易日期来自交易所披露和媒体报道。为避免时间线过载，Prosus Series E 延展轮（~Rs 250 crore，2024 年 12 月）和 Nexus 延展轮（~Rs 125 crore，2025 年 6
      月）未单独展示。
    claimRefs:
      - CI001
      - CI021
      - CI022
      - CI023
      - CI024
      - CI026
      - CI029
      - CI032
