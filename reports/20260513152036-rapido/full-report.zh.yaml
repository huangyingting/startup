      - number: '5.6'
        title: 展示材料
        blocks:
          - type: callout
            title: Google Cloud 原生架构支撑快速产品迭代
            body: >
              Rapido 早期采用 GKE、Firebase 和 BigQuery，使其能够做到每天 10–15 次小版本部署——对这一规模的平台来说异常高频——并且无需工程直接介入即可上线城市。Cloud Vision
              AI 驱动的 captain KYC 管道把入驻时间压缩到数小时。这些能力实质降低了扩张边际成本，并得到 Google Cloud 客户案例研究和 Analytics India Magazine CTO
              级访谈的印证。
            calloutType: strength
            claimRefs:
              - CE020
              - CE023
              - CE026
              - CE017
          - type: callout
            title: 单一云集中度与过时架构披露
            body: >
              Rapido 的实时派单、实时追踪和 captain 验证基础设施全部运行在 Google Cloud 上，未披露多云备份。GKE 或 Firebase
              一旦宕机，会让全平台运营停摆。此外，唯一详细的公开架构参考（Google Cloud 案例研究）发布于 2019 年，当时 Rapido 有 1.5M 名 captain；在当前规模扩大 6×
              后，实际现态架构未获独立验证。尽调应要求公司提供当前架构文档，以及业务连续性 / 灾难恢复计划。
            calloutType: risk
            claimRefs:
              - CE020
              - CE041
              - CE043
          - type: callout
            title: 司机行为与支付摩擦制造信任和留存风险
            body: >
              2024 年取消 auto 应用内钱包支付后，用户评论和 Moneycontrol 报道记录了一种反复出现的模式：captain
              要求支付高于应用显示车费的非正式加价、接单后取消，以及客服响应缓慢。这些摩擦点侵蚀了平台的消费者信任主张，并为用户流向 Namma Yatri 等零佣金替代品创造条件。
            calloutType: risk
            claimRefs:
              - CE039
              - CE042
          - type: callout
            title: ONDC 地铁集成是构建耐久护城河的一步
            body: >
              Rapido 通过 ONDC 在 Delhi、Mumbai、Hyderabad、Chennai 和 Kochi 地铁系统接入票务，创造了纯网约车竞争对手没有的日频触点。DMRC MD 称这是「全球首个地铁 +
              首末程单一应用集成」，使 Rapido 在多模式集成上领先 Ola 和 Uber。每天 500,000 笔地铁相邻行程，以及 Delhi 40%
              乘客是寻求安全首末程交通的女性，说明该集成同时解决了参与度和安全两个维度。
