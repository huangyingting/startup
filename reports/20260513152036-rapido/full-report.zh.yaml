      - number: '7.3'
        title: 财务与运营风险
        blocks:
          - type: paragraph
            body: >
              Rapido 的财务风险集中在三个相互关联的问题上：净亏损仍在持续、当前现金跑道不透明、核心网约出行业务的盈利路径尚未被验证。公司 FY2023 净亏损 Rs 675 crore，FY2024 为 Rs 371
              crore，FY2025 为 Rs 258 crore——趋势明显改善，但公司仍在消耗资本。管理层将 FY2026 EBITDA 打平设为目标，并称 FY2025 H2 网约出行业务已实现运营盈利，但截至最新
              RoC 备案，合并主体仍处亏损。

              Series E 轮（$200M，2024 年 9 月，由 WestBridge Capital 领投）及后续扩展轮次将 Series E 总融资额推至约 $245–250M。Series E
              关闭后，Rapido 没有公开披露当前在手现金或月度运营现金消耗。按 FY2025 EBITDA 亏损 Rs 104 crore 除以 12 估算，月度 EBITDA 口径现金消耗约 Rs 8.7
              crore；但实际烧钱速度取决于营运资本变动和资本开支，而这些项目没有单独披露。

              司机供给波动是一项被低估的运营风险。Rapido 的订阅模式会给司机带来固定日成本（Rs
              19–29/天）；需求低迷或监管不确定期间，司机可能暂停或取消订阅，收入会坍缩，而成本不会同步下降。另一个正在浮现的运营风险，是司机集体谈判和工会化运动增强。多个非正式司机协会曾抗议平台上调订阅费，要求降低每日收费并改善安全保护。截至
              2026 年，尚无正式工会依据印度劳动法获得法律承认，但协调性司机罢工可能扰乱 Rapido 主要市场供给。Rapido 对第三方基础设施（地图、支付和云）的依赖，也增加了运营脆弱性。
