      - number: '2.7'
        title: 市场展望与尽调缺口
        blocks:
          - type: paragraph
            body: >
              印度 app 化两轮车网约车市场具备持续双位数增长的结构性位置。智能手机大众市场渗透、零工供给扩张、EV 车队经济性改善和有利城市人口结构共同支撑 Marqstats 对商用两轮车市场到 2030 年
              17.24% CAGR 的预测。Rapido 70% 两轮车网约车市场份额（公司声称，Inc42 报道）和 5+ million 日订单，与市场领先的前瞻指标一致。


              不过，三项重大尽调缺口削弱了对精确规模估计的信心。第一，公开资料中没有独立第三方专门估算两轮车网约车子板块的
              SAM/SOM；多数分析师报告衡量的是更宽泛的出租车或网约车市场，而非两轮车部分。第二，估计彼此矛盾——Mordor 的 USD 23.98B 广义市场，与 GVR 较窄的 2026 年网约车数字约 USD
              4.5B——说明方法论存在分歧，估值模型锚定前需要先解决。第三，Rapido 的市场份额说法来自公司自身陈述，尚未由第三方审计独立验证；两轮车网约车、auto 和 cab 细分市场的实际份额还需佐证。


              从监管轨迹看，2026–2027 年最可能的情景，是各州逐步采用与 MVAG 2025 兼容的框架，Karnataka 则是赌注最高的变量。若 Supreme Court 在 Karnataka
              作出不利于两轮车网约车的裁决，鉴于 Bengaluru 是平台最高密度市场，Rapido 增长会受到显著拖累。反过来，若裁决有利，且 Maharashtra、Tamil Nadu 和其他主要州快速采纳 MVAG
              2025，SAM 将实质扩大。
