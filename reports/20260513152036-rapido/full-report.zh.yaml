    title: 印度网约出行市场规模金字塔（TAM–SAM–SOM）
    type: pyramid
    layout: standard
    summary: Rapido 在印度网约出行市场的嵌套 TAM/SAM/SOM 机会金字塔，基于 Mordor Intelligence（广义出租车市场）、Marqstats（商用两轮车）以及由 Rapido 市占声明推导的 SOM。
    data:
      items:
        - label: TAM — 印度出租车市场（所有类别，2026）
          value: USD 23.98B
          detail: 印度所有基于 app 和线下的出租车、网约车、三轮车、摩托车出租预订。来源：Mordor Intelligence 2026。到 2031 年 CAGR 7.78%。
        - label: SAM — 印度商用两轮车市场（2026）
          value: USD 3.28B
          detail: 基于 app 的摩托车出租、商用摩托车出租，以及使用两轮车的配送细分。来源：Marqstats 2026。到 2030 年 CAGR 17.24%。
        - label: SOM — Rapido 可触达的摩托车出租 + 三轮车细分（估计）
          value: ~USD 0.9–1.2B (inferred)
          detail: 由 Rapido 70% 的摩托车出租市占和两轮车 SAM 中约 40% 的三轮车份额估算。没有公开可得的独立第三方 SOM 估计；这是基于 Rapido 公司声明的推导。
        - label: Rapido 收入捕获（FY2025）
          value: Rs 934 crore (~USD 112M)
