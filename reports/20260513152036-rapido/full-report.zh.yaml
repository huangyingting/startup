      - number: '7.2'
        title: 竞争风险
        blocks:
          - type: paragraph
            body: >
              Rapido 作为印度领先摩托车网约车平台，正承受资金充足的既有玩家和结构性颠覆新进入者的双重压力。摩托车网约车赛道的主要威胁来自 Ola（通过 Ola Express）和 Uber（通过 Uber
              Moto）。Ola Express 在 Bengaluru、Hyderabad 和 Mumbai 采用佣金模式，并给司机提供激进激励；其母公司近期融资后资金充足。Uber Moto 则受益于 Uber
              的全球打法，包括国际化技术基础设施、算法定价优化，以及用盈利地区补贴印度业务的能力。两家公司都在一线城市扩大司机入驻，压缩 Rapido 的供给侧护城河。

              2022 年进入印度的哈萨克斯坦网约车平台 InDrive，带来的是结构完全不同的威胁。InDrive 的点对点议价模式让乘客和司机协商车费，在价格敏感的二线市场很受欢迎，而这些市场也是 Rapido
              扩张重点。InDrive 在印度的司机基数增长很快，尤其是 Lucknow、Patna 和 Guwahati；Rapido 已在这些市场投入大量资源获取供给。政府支持的 Namma Yatri 和
              ONDC（Open Network for Digital Commerce）生态，则代表另一类竞争风险。Namma Yatri 在 Bengaluru
              以非营利运营模式为资金来源，对机动三轮车和出租车司机零佣金。它在 Bengaluru 获取机动三轮车司机供给成效明显，已经降低 Rapido 在部分走廊的机动三轮车供给密度。ONDC 可能让多个零佣金 App
              在无需向 Rapido 支付订阅费或佣金的情况下分发订单，进而完全绕开 Rapido 平台。
            claimRefs:
