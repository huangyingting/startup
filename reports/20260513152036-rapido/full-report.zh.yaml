  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              自 2023 年以来，印度网约车市场经历了结构性重排。曾经稳定的 Ola（ANI Technologies）与 Uber India
              双寡头，已裂变成至少五个有意义细分赛道的多玩家竞争：四轮车、三轮车、两轮车网约车、纯 EV 网约车，以及接入 ONDC 网络的开放平台。Rapido 是主要破局者，先在两轮车网约车和 auto-rickshaw
              中建立主导地位，再于 2024 年末推进四轮网约车。


              Rapido 的直接竞争者横跨两轮车（Ola Bike、Uber Moto）、四轮车（Ola Cabs、Uber India）和相邻平台（InDrive、Namma Yatri）。现状替代方案包括
              BEST/DTC 公共巴士、共享 auto 和个人摩托车，面向能够接受非正式方案的通勤者。BluSmart（EV 四轮车）曾是重要相邻竞争者，但 2025 年 4
              月在治理和融资崩盘中基本停止运营，移除了市场上的高端 EV 选项，其搁浅用户主要流向 Rapido、Ola 和 Uber。Yulu 占据非 P2P
              小众赛道——电动两轮车租赁，而不是出租车撮合——并争夺同样寻求低价最后一公里出行的预算敏感通勤者。


              Motor Vehicle Aggregator Guidelines（MVAG）2025 的到来，在州级碎片化之上增加了一层联邦监管。指南将动态加价限制在基础票价的 2×，要求警方核验司机、强制 GPS /
              紧急按钮，并在全国范围内正式合法化两轮车网约车运营——尽管州级采纳时间表不同。尽管有中央规则，Maharashtra
              仍继续对三大聚合平台采取执法行动，说明影响所有玩家的双重管辖风险尚未解决。因此，竞争强度不只由产品差异决定，也同样由监管塑造。
            claimRefs:
