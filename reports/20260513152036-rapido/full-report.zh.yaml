      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              自 2015 年以来，Rapido 在 13+ 轮融资中累计融资约 $500M+，并在 2024 年 9 月 Series E 轮达到独角兽里程碑。最近最重要的事件，是回归投资方 WestBridge
              Capital 领投 $200M Series E 轮，投后估值 $1.1 billion，使 Rapido 成为印度第 108 家独角兽。Series E 轮共同投资方包括 Nexus Venture
              Partners、Swiggy（自 Series D 轮起成为战略投资方）、Think Investments 和 Invus Opportunities。该轮资金部分指定用于扩张 Rapido
              四轮车（cab）品类，让公司直接对上 Ola 和 Uber。


              上一个标志性融资节点是 2022 年 4 月由 Swiggy 领投的 Series D 轮（$180M），其中 Swiggy 出资约 $124–125M——这是食品配送平台战略入股出行同行的典型案例。其他
              Series D 轮参与方包括 TVS Motor Company、WestBridge Capital、Nexus Venture Partners 和 Shell Ventures。Series D
              轮后估值约为 $800–830M，当时 Rapido 已接近但尚未达到独角兽门槛。


              更早的轮次包括 2019–2021 年的 Series B 和 Series C，参与方有 TVS Motor、Nexus Venture Partners 和 Shell Ventures；不过 Series
              D 轮之前的精确条款主要依赖二级数据库，而非公司一手披露。公开资料中没有债务融资或授信额度细节。Rapido 是私营公司，印度法律下没有面向公众披露的义务。


              投资方控制权、董事会构成和老股交易历史均未公开披露。Swiggy 于 2024 年 11 月 IPO，持有 Rapido 的重要股份，需要在其资产负债表上按市值重估；但 Swiggy 和 Rapido
              均未公布当前持股比例。WestBridge Capital 在 Series D 和 Series E 轮中持续活跃，是承诺度最高的财务投资方。
