      - number: '8.3'
        title: 情景分析与估值区间
        blocks:
          - type: paragraph
            body: >
              从 2026 年中视角看，三个情景覆盖 Rapido 的结果区间；当前可观察市场价格以 2025 年 9 月 $2.3B 老股交易为锚。


              悲观情景（$1.1B，约 20% 概率）假设 Delhi NCR 摩托车网约车禁令永久化，Uber Moto 和 Ola Express 在一线城市夺走的竞争份额超过 10 个百分点，EBITDA 打平延后至
              FY2028 或更晚，计划中的 Prosus $350M 新股融资没有完成。这意味着估值回到 2024 年 9 月 Series E 价格，并按 FY2025 收入使用 6-10x 倍数，符合 GoTo
              Group 作为亏损平台的压缩倍数。


              基准情景（$2.5B，约 55% 概率）延续当前轨迹：按指引在 FY2026 EBITDA 打平，FY2026 收入约 Rs 1,200-1,400 crore，完成 Prosus $350M
              新股融资，并维持市场领导地位。$2.5B 基准情景略高于 2025 年 9 月老股交易，低于 Prosus 融资据报道的估值区间上端，隐含 22-24x FY2025 收入倍数，并计入 IPO
              选择权。乐观情景（$3.5B，约 25% 概率）假设 Delhi NCR 在 2026-2027 年合法化，FY2027 之前收入保持 40%+ 增长，成功 IPO
              或以溢价被战略收购，并从食品配送和企业交通获得实质性新垂直贡献。各情景按概率加权后的预期价值约为 $2.5B。
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
