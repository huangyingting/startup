  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Rapido 最重大的单一风险，是印度各邦围绕摩托车网约车运营形成的碎片化且不断变化的监管环境。《机动车辆法》（MVA）1988 及其 2019
              年修正案没有给摩托车网约车聚合平台提供明确的全国性许可或监管框架，各邦政府只能自行解释法律。这种结构性模糊已经造成直接的财务和运营损害：Karnataka 为期 22 个月的摩托车网约车禁令（2024 年 3
              月–2026 年 1 月）迫使 Rapido 将 Karnataka 摩托车网约车收入模式从全额佣金收取改为仅导流模式，FY2025 佣金收入估计因此直接减少 23.5%，平台损失 Rs 200–300
              crore 佣金收入。

              Karnataka 高等法院 2026 年 1 月的裁决取消禁令，并确认摩托车属于 MVA 下的运输车辆，这对 Rapido
              是重大利好。但裁决附带条件：许可证和运营合规要求仍需由邦交通部门正式落地，未来政府通过行政命令重新施加限制的政治风险并非为零。Karnataka 是 Rapido
              总部所在地，历史上也是其最重要的收入市场之一；禁令若再次升级，将构成重大的运营挫折。

              Delhi NCR 是第二个主要监管爆点。按现行机动车辆规则，国家首都地区交通主管机关尚未允许摩托车网约车运营；截至 2026 年 5 月，公开层面也看不到近期监管通道。Delhi NCR
              是印度人口最大的都市市场；持续被排除在外，会压住 Rapido 的城市总可用市场（TAM），并迫使公司在非高端线路上竞争。Maharashtra 对 Mumbai
              大都市区施加部分限制。全国层面，道路交通与高速公路部尚未发布专门允许或监管摩托车网约车聚合平台的中央通知，导致 Rapido 目前运营的 15+ 个邦里，任何一邦都可能发起 Karnataka
              式挑战。国会流转中的平台工作者立法又增加了一层监管变量：如果司机被重新分类为雇员，Rapido 将承担公积金缴款、ESI 和其他雇佣福利，单司机成本会显著上升。
