      - number: '4.2'
        title: FY22–FY25 历史财务表现
        blocks:
          - type: paragraph
            body: >
              FY22 到 FY25 的财务数据显示，Rapido 收入曲线持续扩张，亏损情况也显著改善；不过截至最新已确认申报期（FY25，截至 2025 年 3 月），公司仍未实现净利润。


              收入从 FY22 的 Rs 145 crore 增至 FY23 的 Rs 443 crore（增长 205%），随后到 FY24 的 Rs 648 crore（同比 +46.3%），再到 FY25 的 Rs
              934 crore（同比 +44%）。含利息的总收入在 FY25 达到 Rs 1,003 crore，跨过公司此前设定的 Rs 1,000 crore 门槛。FY22–FY25 收入 CAGR 约
              86%，对一个受监管市场中的网约车公司来说非常突出。


              亏损在 FY23 见顶，达到 Rs 675 crore；相对收入，EBITDA 利润率为 -152%。到 FY24，净亏损收窄 45% 至 Rs 371 crore（EBITDA 亏损 Rs 409
              crore，利润率 -52.5%），核心驱动是有效控费——合作伙伴激励下降 11%，员工成本下降 17%，营销下降 11%。到 FY25，净亏损进一步收窄 30% 至 Rs 258 crore，EBITDA
              亏损大幅缩至 Rs 104 crore（利润率约 -11%），说明经营杠杆开始释放。公司在 FY24 每获得 Rs 1 经营收入需要花 Rs 1.65，FY25 改善为每 Rs 1 收入花 Rs 1.35。


              联合创始人 Aravind Sanka 于 2025 年 3 月告诉 Inc42，Rapido 预计 FY25 收入接近 FY24 的两倍，这与 RoC 申报的 Rs 934 crore
              结果一致。管理层也公开称，单看网约车业务（不含食品配送和其他较新垂直业务）已在 FY25 下半年盈利；不过截至 FY25，合并口径净利润尚未实现。


              上述所有财务数字来自公司提交给 Registrar of Companies（RoC）的合并财务报表，并由 Entrackr（FinTrackr）、MediaNama 和 The Economic Times
              审阅报道。截至 2026 年 5 月，公开门户上没有英文版独立审计摘要；FY26 结果尚未提交。
