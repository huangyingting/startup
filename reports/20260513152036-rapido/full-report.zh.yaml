      - number: '5.3'
        title: Captain 应用与司机侧技术
        blocks:
          - type: paragraph
            body: >
              Rapido Captain 应用提供全数字化入驻漏斗：司机下载应用，用手机号创建账户，上传 DL、RC、PUC、Aadhaar/PAN card 和近照；Google Cloud Vision
              驱动的文件验证完成后，48 小时内即可开始接单。Captain
              应用展示收入仪表盘，列出单程收入和累计余额，并可通过自动打款兑付到绑定银行账户。内置导航层负责路线显示和重规划；附近乘客的行程请求会显示在屏幕上，captain 可接受或拒绝。所有 captain 每程都获得
              Acko Insurance 提供的 ₹5 lakh 意外保险，无需额外成本。


              Rapido 的双收入模式——bike taxi 收佣金，auto 和 cab captain 收 Rs 19–40/天的日订阅费——在同一应用内创造了两种运营体验。Bike-taxi captain 与
              Rapido 分成每笔车费；auto 和 cab captain 无论接单量多少，都支付固定日访问费。这种模式分化要求 captain
              应用按车型展示不同收入和激励结构。平台还在行程后使用评分和评论系统，辅助未来匹配，并把高表现 captain 标记到更高激励等级。
