      - number: '2.6'
        title: 监管格局
        blocks:
          - type: paragraph
            body: >
              印度两轮车网约车监管分两层：全国性指南框架（MoRTH）和州级执行。这种双层结构制造了许可、禁令和灰色地带拼成的格局，也是平台运营商的首要运营风险。


              2025 年标志性监管事件，是 MoRTH 于 2025 年 7 月 1 日发布 Motor Vehicles Aggregator Guidelines 2025（MVAG 2025）。根据第 23
              条，州政府可以允许聚合平台使用非营运（私人注册）摩托车载客——这首次为白牌两轮车网约车规模化提供了合法路径。指南要求司机安全标准，包括
              GPS、紧急按钮、急救包和警方背景核查。票价监管也被引入：各州设定基础票价，高峰需求下动态定价最高为基础价的 2x。使用私家车的司机必须获得至少 80% 车费；聚合平台自有车辆司机至少获得 60%。


              不过，各州是否采纳是自愿的。Karnataka 2025 年 6 月 HC 禁令——自 6 月 16 日生效——早于 MVAG 2025，触发原因是州政府认为白牌摩托车在现有 MV Act
              规则下不能作为商用车辆。即使 MVAG 2025 发布后，Karnataka 仍在 Supreme Court 挑战 HC 的部分撤销，使
              Bengaluru——印度最大两轮车网约车市场——继续处于法律不确定中。Maharashtra 于 2025 年 5 月发布电动两轮车出租监管草案，预计在公众反馈后最终定稿。其他 21
              个或更多州和中央直辖区普遍允许两轮车网约车运营，但没有具体通知，形成隐性灰区。


              监管轨迹方向上是正面的：中央政府的 MVAG 2025 为全国正常化搭起框架。不过，节奏慢于平台增长需要；州级政治动态——尤其是 autorickshaw 和出租车工会的反对——仍是关键摇摆因素。
