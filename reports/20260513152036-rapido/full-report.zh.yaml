      - number: '6.3'
        title: 具名客户证明与生态合作伙伴
        blocks:
          - type: paragraph
            body: >
              Rapido 已从单一网约车工具，转向多模式超级应用，并拥有一组不断增加的已确认机构和生态合作伙伴。作为 B2C 平台，Rapido 不发布客户名录，也不披露企业 B2B
              类别中的企业客户名称。以下具名合作已通过新闻稿、政府表态和多家独立媒体确认。


              DMRC 合作是 Rapido 可见度最高的机构集成。该合作于 2024–2025 年在 ONDC 协议下上线，使 Delhi Metro 乘客可以在 DMRC 应用内预订 Rapido bike 或
              auto，用于首末程连接。DMRC Managing Director 公开表示，该集成在全球范围内独一无二，把地铁票务和网约车放进同一个数字会话。该集成每天带来 100,000 笔地铁相邻行程，是
              Delhi-NCR 的实质获客渠道；不过该数字来自 Rapido 自身披露，未经过独立审计。


              KSRTC（Kerala State Road Transport Corporation）通过 2026 年 3 月在 Thiruvananthapuram 推出的 Rapido Shakti 项目，成为
              Rapido 首个女性出行项目的邦交通公司合作伙伴。合作内容包括 KSRTC 为在 Rapido 平台运营的女性 captain 提供培训和基础设施支持。商业条款和行程量未披露。


              2025 年 10 月宣布的旅行平台集成——与 Goibibo（MakeMyTrip Group）合作机票和汽车，与 redBus 合作城际巴士票，与 ConfirmTkt 合作火车票——使 Rapido
              成为跨模式预订枢纽。这些集成是已确认的线上生产功能，不是试点；不过交易量和收入分成条款仍未披露。


              Magicpin 合作（2025 年 11 月）为 Rapido 的 Ownly 食品配送服务提供 80,000+ 餐厅列表，是商业上最复杂的具名关系。CNBC-TV18 和 Financial Express
              已确认该合作。值得注意的是，Zomato 持有 Magicpin 约 15% 股权，与 Rapido 试图撼动 Zomato–Swiggy 双寡头的目标形成潜在结构性利益冲突。Swiggy 于 2025 年 9
              月以约 ₹2,400 crore（约 2.5× 回报）退出 Rapido 股权，发生在 Rapido 发力食品配送之前，也为其扫除了股东冲突。Ownly 的佣金模式（8–15%，对比既有平台
              18–22%）旨在吸引餐厅伙伴，但截至报告日，大规模变现仍未被证明。


              企业 B2B 细分虽然服务横跨六个已声明行业的具名企业客户，但出于竞争原因不披露单个客户名称。₹275 crore 的 FY25 收入数字和 Rapido Corporate Partners
              页面提供了行业层面的市场采用证明，但不足以验证单个账户。
