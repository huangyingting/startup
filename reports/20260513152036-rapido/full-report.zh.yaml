      - number: '7.4'
        title: 安全与声誉风险
        blocks:
          - type: paragraph
            body: >
              对大众网约出行平台而言，消费者信任是核心，因此 Rapido 的安全记录和品牌声誉风险直接相关。道路事故责任仍是 Rapido 最持续的安全隐患：印度人均道路死亡率位居全球高位，两轮车约占 2025
              年道路死亡人数的 44%。任何涉及 Rapido 司机和乘客的高关注度死亡或重伤事件，都可能引发监管行动、媒体审视和需求侧流失。

              MediaNama 和 Times of India 报道称，2024 年底 Karnataka 发生多起乘客指称遭 Rapido 司机袭击的事件，其中 Bengaluru
              的重点案例获得大量本地媒体关注。这些事件发生在 Karnataka 禁令期间，当时 Rapido 以导流模式而非完整平台模式运营，可能削弱了公司对名义上在受监管平台结构之外运营的司机执行安全标准的能力。

              Rapido 已将 AI
              头盔合规检测系统作为关键安全差异化卖点，该系统用于验证司机接单前是否佩戴头盔。但在不同光照、头盔形状和摄像头角度下，系统准确率并未得到公开验证。行业专家指出，使用有限数据集训练的计算机视觉系统，准确率可能只有
              85–90%，达不到可靠安全闸门所需的接近 100%。如果司机系统性规避检测机制，Rapido 对外宣传的安全保证就会变成负债。声誉风险还延伸到数据隐私：Rapido
              收集数百万日活用户的位置数据，任何泄露都可能触发印度《2023 年数字个人数据保护法》（DPDPA 2023）执法，单次事件罚款最高可达 Rs 250 crore。
            claimRefs:
              - CR029
              - CR030
              - CR031
              - CR032
              - CR033
              - CR034
      - number: '7.5'
        title: 合作伙伴与技术依赖风险
        blocks:
          - type: paragraph
            body: >
              Rapido 平台依赖一组关键第三方；一旦中断或重新定价，服务交付或单位经济性都可能受到重大损害。Google Maps Platform 提供每次派单都离不开的路径和 ETA 基础设施；Rapido
              没有公开披露替代地图层，一旦 Google 提高 API 价格或限制用量，就会形成集中风险。Amazon Web Services 托管 Rapido 核心平台、派单引擎和 ML
              推理工作负载；虽有报道称其采用多区域部署，但公司没有正式披露业务连续性方案。Razorpay 和更广泛的 UPI 生态处理车费收取；多 PSP 的 UPI
              架构提供部分备份，但高需求时段支付基础设施故障会造成显著收入流失。

              邦政府运营许可可能是最关键的依赖。Karnataka 的经历已经说明，邦政府可以几乎不提前通知，就通过行政命令撤销事实运营许可，把监管许可证依赖转化为生存级运营风险。Swiggy 对 Rapido
              的战略持股既是依赖，也是机会；Swiggy 在 2024 年 11 月 IPO 后的自身竞争位置，可能影响合作条款和资源分配。下方依赖地图图示展示了这些依赖如何相互连接，以及单点故障集中在哪里。
