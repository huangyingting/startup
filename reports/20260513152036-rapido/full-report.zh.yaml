      - number: '7.7'
        title: 展示材料
        blocks:
          - type: callout
            title: Karnataka 胜利并不稳固：许可证正式化与政治反转风险仍在
            body: >-
              虽然 Karnataka 高等法院 2026 年 1 月的裁决恢复了摩托车网约车运营，但裁决要求邦交通部门正式落地许可证和合规条件——这一过程可能被传统出租车工会的政治压力拖延或向不利方向塑形。最初下达禁令的
              Karnataka 国大党政府仍在执政；通过行政命令重新施加限制的风险并不低，这是 Rapido 投资者最需要监控的监管事项。
            calloutType: risk
            claimRefs:
              - CR001
              - CR007
              - CR008
          - type: callout
            title: Delhi NCR 被排除在外，形成结构性 TAM 天花板
            body: >-
              按人口计算，Delhi NCR 是印度最大的都市圈。摩托车网约车运营被禁，且截至 2026 年 5 月看不到合法化监管路径，Rapido 因此被结构性排除在最大潜在市场之外。每被排除一年，Rapido
              与任何未来率先拿到 Delhi 合法化的进入者之间的竞争差距都会扩大。若 Delhi 禁令不逆转，模型中应把它视为城市网约出行可触达市场 15–20% 的永久性 TAM 削减。
            calloutType: risk
            claimRefs:
              - CR004
              - CR026
          - type: callout
            title: 平台工作者法案：概率低，但一旦通过影响极高
            body: >-
              平台工作者（登记与社会保障）法案草案提出，按每名零工贡献 1–2% 营业额。以 Rapido FY2025 营业收入 Rs 934 crore 计算，2% 征费会在任何司机被重新分类为雇员之前，每年增加约 Rs
              18–19 crore 社保成本。Rapido 的订阅模式提供了结构性但不完整的隔离：支付固定日费的司机不在 Rapido 工资单上，但法案下的平台贡献义务仍可能按促成交易适用。
            calloutType: risk
