      - number: '1.2'
        title: 创始人与管理层
        blocks:
          - type: paragraph
            body: >
              Rapido 由三位亲身经历 Bengaluru 城市拥堵的技术从业者共同创立。Aravind Sanka（CEO）拥有 IIT Bhubaneswar 机械工程 B.Tech 学位（2012 届），此前在
              2012–2014 年就职于 Flipkart 的 Ekart 物流部门，帮助其配送业务从印度 10 个城市扩至 100 个城市。这段供应链和城市扩张经验，与 Rapido 后来招募
              captain、开拓新市场的路径高度贴合。Rishikesh SR（COO）给创始团队带来运营管理深度，自公司成立以来一直管理平台日常运营。Pavan Guntupalli（CTO）是 Rapido
              平台技术的架构者，包括 2023 年 SaaS 模式转型，也是公司产品战略的重要对外发言人。


              创立 Rapido 之前，三人在 2014 年共同创办物流创业公司 theKarrier，后来转向两轮车网约车概念；也就是说，创始团队已在相邻商业模式上完成过迭代。Guntupalli 对 SaaS
              模式的公开阐述相当具体，说明 CTO 层面深度介入运营，而非只承担纯技术角色。


              三位创始人构成实质性的关键人集中风险。三人都参与日常运营，公司也没有公开可见的继任计划或资深独立董事任命。Rapido 未在任何公开来源披露董事会构成、创始人以外的 C-suite 成员或治理结构。Sanka
              是主要对外发言人；若其缺席或离职，公司很可能需要重大过渡管理。对于一家估值 $1.1 billion 的公司，缺少公开点名的独立董事意味着治理透明度风险。Roppen Transportation
              Services Private Limited 的 MCA 备案应包含董事披露，但这些信息无法通过公共渠道轻易获取。
