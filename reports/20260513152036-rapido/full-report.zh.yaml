      - number: '5.4'
        title: 安全、信任与质量控制
        blocks:
          - type: paragraph
            body: >
              Rapido 的安全架构结合了应用内工具、captain 验证和线下项目。乘客在行程中可打开 Safety Toolkit，其中包括：连接 Rapido 24×7 应急响应团队的 SOS
              按钮；一键拨打全国警察热线（112）；向紧急联系人分享实时追踪链接；以及自动触发的路线偏离提醒——如果 captain
              偏离规划路线、意外停留，或把乘客送到与预订目的地不同的位置，系统会提示。所有行程——bike、auto 和 cab——均由 Acko Insurance 承保，乘客无需额外付费。


              Captain 入驻采用四步背景验证流程（文件验证、线下车辆检查、培训和数字激活）。Google Cloud Vision AI 审核上传文件；在生产环境中，公司正把它扩展到骑行中头盔和口罩合规检测。Rapido
              的 Rapido Safety First 活动已为 Bengaluru auto-rickshaw 加装安全带，并与 Gurgaon、Hyderabad、Chennai、Bengaluru、Vijayawada
              和 Madurai 等城市交警部门合作开展 CPR 和道路安全培训。公司未公开安全 KPI（事故率、SOS 激活率、路线偏离提醒误报率），限制了第三方对这些控制的可审计性。
