  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件与平台概览
        blocks:
          - type: paragraph
            body: >
              Rapido 的消费者应用通过单一界面提供三类车型——Bike（两轮 taxi）、Auto（auto-rickshaw）和 Cab（四轮车），覆盖 Android 6.0+ 和
              iOS。在这些模式下，应用还展示细分变体：Bike Lite（价格更低、等待时间更长，由本地 captain 接单）、Bike Metro（通往地铁站的首末程行程）、Auto Share、Auto
              Pet、Auto Parcel，以及独立 Parcel 配送。Delhi、Mumbai（Lines 2A/2B/7/9）、Hyderabad、Chennai 和 Kochi 地铁的车票预订通过 ONDC
              集成，用户无需另装票务应用。2025 年 10 月，Rapido 通过与 Goibibo、redBus 和 ConfirmTkt 合作，加入机票、酒店、火车和城际巴士预订，把应用定位为统一的出行与旅行超级应用。


              乘客 UX 使用基于 PIN 的行程认证，而不是 OTP，从而降低上车摩擦。乘客可以保存常用地点，并通过 WhatsApp 或 SMS 分享实时追踪链接。Power Pass 订阅（₹69）在特定行程上提供最高
              25% 车费折扣，保护高频用户免受动态加价影响。Rapido Coins（1 coin = ₹1）来自行程、推荐和促销。截至 2026 年 5 月，该应用总下载量 210M+，月活跃用户 50M，Google
              Play 上 4.1M+ 条评论评分 4.77/5，iOS App Store 评分 4.9/5。
