      - number: '6.5'
        title: 地理扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，Rapido 在印度 450+ 个城市运营，并公开表示计划扩张到全部 800 个 district headquarters，给出了清晰的长期可服务市场。公司在 tier-2 和
              tier-3 城市拥有 70–75% bike-taxi 市占率，这是其最可防守的位置：Uber 和 Ola 历来把资本集中在 Tier-1 都市市场，使小城市两轮首末程市场基本留给 Rapido
              的网络密度优势。


              Bengaluru 仍是按 gross order value 计的最大单一市场；Rapido 在该市场的优势曾被 Karnataka 为期两年的 bike taxi 监管禁令部分打断。该禁令已因
              Karnataka High Court 2026 年 1 月判决恢复牌照而解决。Bengaluru 运营正常化预计会加速 FY26 佣金板块收入恢复；禁令期间，该板块曾被迫转为只做线索生成模式。


              Maharashtra——印度最大邦级经济体，也是该国商业首都 Mumbai 所在地——构成结构性约束。根据现行邦交通法规，Maharashtra 不允许 bike-taxi 运营；Rapido 在当地只能做
              auto-rickshaw 和 cab。这使其单位经济最好的一款产品无法进入一个可能实质拉动收入指标的 TAM。Maharashtra 监管变化会是重大正向催化剂，但截至报告日没有时间表。


              B2B 订阅收入约占总经营收入 30%（FY25 为 ₹275 crore），提供了组合多元化。B2B 细分似乎在六个行业垂直拥有多个客户，限制了头部账户集中风险；但公司未披露任何单个客户的收入占比，因此无法做
              Herfindahl 式集中度评估。


              Rapido 的 Ownly 食品配送扩张（2025 年末，Bengaluru 试点）和更广义的超级应用定位（旅行与公共交通集成）为深化客户钱包份额提供了额外渠道，且不需要同比例增加 CAC。不过，Ownly
              上线可能挤占 captain 的非高峰运力——如果最终表现为佣金收入压力，可能放大司机流失，并恶化 2026 年 2 月和 4 月抗议中已经可见的劳动力供给动态。


              Ownly 的低佣金模式（8–15%，对比 Zomato 和 Swiggy 的 18–22%）旨在吸引餐厅供给，但在所述费率下，订单经济和贡献利润率尚未在规模化状态下验证。截至 2026 年 5 月，Ownly
              的采用指标、食品配送中的 captain 供给利用率，以及餐厅留存均未公开披露。
