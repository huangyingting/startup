      - number: '4.4'
        title: 资本充足性与融资历史
        blocks:
          - type: paragraph
            body: >
              根据二级数据库估算并与新闻报道交叉校准，Rapido 自 2015 年至 2025 年 6 月各轮累计融资约 $536–575M。Series E（2024 年 9 月，$200M，post-money 估值
              $1.1B）是最大单轮融资，由 WestBridge Capital 领投（单独出资 $120M），Nexus Venture Partners、Think Investments 和 Invus
              Opportunities 共同参投。后续 Series E 分批还包括 Prosus 于 2024 年 12 月投入 Rs 250 crore（约 $29.8M），以及 Nexus 于 2025 年 6 月投入
              Rs 125 crore（约 $15M），使 Series E 总募资约 $245–250M。


              资本历史可参照「公司概况」章节的融资时间线：Series D（$180M，Swiggy 领投，2022 年 4 月，估值约 $800M）；Series C（约
              $52M，WestBridge/Shell，2021）；Series B（约 $55M，WestBridge，2019）；Series A（约 $11M，Nexus，2019）；以及 2015–2018
              年种子轮。生命周期累计融资估计在 $536M（Inc42 数据库，2025 年 11 月）至约 $575M（IndianStartupNews 纳入更广的二级交易轮次）之间。


              截至 2026 年 5 月，Rapido 当前现金和银行余额或月度经营现金消耗没有已确认公开披露。最近的 RoC 资产负债表数据（FY24，可通过 Entrackr 获取）显示，银行余额加现金等价物约 Rs 88
              crore——较 Series E 前的 FY23 水平显著下降。2024 年 9 月 Series E 完成后注入了大量新资本；管理层表述暗示跑道充足，但精确数字不公开。月度烧钱速度可由 FY25 EBITDA
              亏损 Rs 104 crore 推算（意味着 EBITDA 口径现金消耗约 Rs 8.7 crore/月），但营运资本变动和 capex
              未单独披露。公司没有公开披露债务或授信安排；这对资本充足性评估是实质缺口，尤其是在 Rapido 扩张食品配送垂直业务时。
