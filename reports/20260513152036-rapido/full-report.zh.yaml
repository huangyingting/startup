      - number: '6.2'
        title: 客户分层与画像
        blocks:
          - type: paragraph
            body: >
              Rapido 的客户群可以分成六个主要群体，每一类都有不同的需求状态、价值主张和证据质量。


              23–40 岁城市日常通勤者按行程量构成平台最大板块。这些用户集中在 Bengaluru、Hyderabad、Pune 和 Gurugram 等 IT 与 ITES 枢纽，依赖 bike taxi 或 auto
              完成 5–15 km 日常通勤的首末程。bike taxi 平均车费 ₹40–80，相比同等距离的 Ola 和 Uber cab 选项折扣达
              50–70%。行程量数据和城市集中模式为该细分提供高质量证据，但分细分收入和利润率未披露。


              学生和 Gen Z 用户（18–24 岁）是增长最快的队列，主要被低于 ₹50 的车费和移动优先平台的无摩擦预订吸引。Rapido 的「Smart ho toh
              Rapido」活动和校园推荐项目在该人群中带来强品牌记忆。The Youth Talks 对 1,000 多名 Gen Z 受访者的调查确认，在该细分选择网约车服务时，价格可负担性压过品牌忠诚。Power
              Pass 日订阅和周订阅产品也为经常通勤的学生提供留存钩子。


              日薪工人和非正规经济参与者看重 Rapido 支持现金支付、清晨可用，以及短途出行全市场最低车费。公开来源对这一细分记录较少，但 Rapido
              在工业走廊的渗透，以及制造和建筑劳动力大城市的高行程量，可以作为证据。


              女性出行者至少自 2024 年起就是 Rapido 明确瞄准的增长细分。Chennai 的 Bike Pink 试点（2024）用 EV bikes 将女性 captain 与女性乘客匹配。Pink Rapido
              于 2025 年 2 月扩展到 Karnataka，并设定雇用 25,000 名女性 captain 的目标。Rapido Shakti 于 2026 年 3 月在 Thiruvananthapuram 与
              KSRTC 合作推出，提供仅限女性的 bike-taxi 服务，配备受训女性 captain 和安全优先协议。尽管有这些举措，总 MAU 中女性渗透率和 Pink Rapido 行程量未公开披露，限制了量化评估。


              企业 B2B 账户是 Rapido 已识别企业细分中商业意义最大的部分。B2B 订阅收入 FY25 增长 14× 至 ₹275 crore，约占总经营收入 30%。该服务以 Rapido Corporate
              品牌推广，提供集中预订仪表盘、无现金行程结算、合并账单，并声称相较既有 cab 服务，可为银行、FMCG、医药、零售、物流、IT/ITES 和 MSME 客户最多降低 70% 成本。在 B2B
              产品语境中，除行业垂直外，公司没有公开披露具名企业客户。


              地铁和多模式通勤者是 Rapido 通过 ONDC 与 Delhi Metro（DMRC）、Mumbai Metro Lines 2A/2B/7/9、Hyderabad Metro、Chennai Metro 和
              Kochi Metro 集成后形成的新兴细分。DMRC 集成在 Delhi 每天产生约 100,000 笔地铁相邻行程；DMRC Managing Director
              称其为「全球首次在单一应用中整合地铁票和首末程预订」。该细分的收入贡献未单独披露。
