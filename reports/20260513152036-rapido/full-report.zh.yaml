  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Rapido 通过四种主要机制赚钱，也反映了它从单一 bike-taxi 通勤平台，演进为多元城市出行与物流运营商。佣金模式只用于 bike-taxi 行程：Rapido 从每笔车费中向 captain
              收取一定比例（历史上为 15–30%），不过截至 FY25，公司已在部分市场下调费率，并把一部分 captain 基数转向订阅模式。订阅模式用于三轮 auto 和四轮 cab：captain
              支付固定日平台费（转型市场的 bike 为 Rs 19–29/天；cab 司机为 Rs 40/天或 Rs 500/月），换取派单、导航和支付工具使用权。这笔日费不与行程量挂钩，使 Rapido
              在这些细分市场拥有更可预测的收入基底。


              配送服务——为食品、杂货和包裹客户提供物流履约——在 FY25 成为 Rapido 最大单一收入板块，贡献 Rs 340 crore（经营收入的 36.4%），较 FY24 的 Rs 265 crore 同比增长
              28.3%。这部分收入来自 B2B 合作和 ONDC 物流集成，而不是直接向消费者收费。captain 订阅收入在 FY25 激增 14.5× 至 Rs 275 crore（FY24 仅 Rs 19
              crore），反映按日订阅模式已在 auto 和 cab 板块广泛铺开。平台佣金（主要来自 bike taxi）在 FY25 下降 23.5% 至 Rs 277 crore，部分原因是 Karnataka
              监管扰动迫使 Rapido 将 Karnataka 的 bike-taxi 业务转为只做线索生成，而不是完整收取佣金。广告收入（应用内赞助展示）增长 6× 至 Rs 16 crore，现金投资利息收入贡献 Rs
              69 crore，推动 FY25 总收入达到 Rs 1,003 crore。


              转向以订阅为主的变现之后，Rapido 的收入质量画像明显变化。订阅费按时间确认，不受单次行程数量影响，降低了收入波动。不过该模式最适合供给密度足够高的市场；Rapido 能否收费并留住订阅费，取决于
              captain 能否赚到足够行程来覆盖每日支出——监管方和司机工会都可能扰动这一敏感点。
