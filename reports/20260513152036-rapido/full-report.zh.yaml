  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              印度 app 化城市出行市场涵盖所有由技术撮合的出行预订服务，运营范围覆盖印度城市和半城市地区。就本分析而言，市场包括：（1）两轮车网约车服务（通过 app 预订的两轮载客交通），（2）auto-rickshaw
              叫车（三轮车按需出行），（3）app 化出租车叫车（四轮私人雇佣车辆），以及（4）使用上述任何车型的拼车服务。市场明确不包括公共交通（地铁、BEST/DTC
              巴士、郊区铁路）、固定班次城际客车、私家车拥有权和线下出租车计价器。


              最相关的两个相邻市场是：（i）超本地配送（包裹、餐饮），它使用同一套两轮车司机网络，且已通过 Rapido 的 Ownly
              食品配送子公司和包裹服务成为收入线；（ii）企业员工通勤，它使用四轮车队，是新兴增长方向。现状替代方案——消费者在没有 app 化网约车时使用的服务——包括：共享 autorickshaw（固定线路的非正式
              “share autos”）、e-rickshaw、步行和公共交通接驳。


              印度网约车市场与西方市场的核心差异，在于两轮车和三轮车占主导。北美和欧洲的全球网约车几乎全是四轮车；印度两轮车则是最高量、最高频的出行品类。这一差异界定了 Rapido
              的可服务市场，也使其远窄于全球可比公司。根据 Mordor Intelligence，线上预订在 2025 年占印度出租车市场 70.84% 份额，证明市场结构上已经数字化。app 化网约车服务在 2025
              年占更广义出租车市场 65.10%，进一步验证了数字化板块在城市地面交通总量中的可服务份额。
