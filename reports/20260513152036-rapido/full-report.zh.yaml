  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与方法
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Rapido 有两个公开可观察的估值锚。第一个是 2024 年 9 月 Series E 轮的 $1.1 billion 投后估值；该轮由 WestBridge Capital
              领投，Nexus Venture Partners、Think Investments 和 Invus Opportunities 参投，融资 $200M。按这个价格，已披露累计融资约 $500M。$1.1B
              估值对应 FY2024 收入 Rs 648 crore（约 $77M）的 14.3x 倍数，以及 FY2025 收入 Rs 934 crore（约 $111M）的 9.8x 倍数。


              第二个、也更新的锚是 2025 年 9 月的老股交易：Swiggy 以约 Rs 2,400 crore（约 $272M）将其持有的 Rapido 全部 12% 股份出售给 Prosus（约 10%）和
              WestBridge Capital（约 2%），隐含 Rapido 估值约 $2.3 billion。Swiggy 在三年内基于 Rs 950 crore 成本实现 2.5x 回报。市场进一步预期 Prosus
              将领投约 $350M 的新股融资，估值据报道在 $2.7-3B 区间；若完成，Prosus 将成为仅次于 WestBridge 的第二大股东。


              由于没有公开的 EBITDA 转正经营记录，贴现现金流法不适用；主要方法应是收入倍数法，以上市可比公司（Grab、GoTo）和私营同行交易为锚。Rapido $2.3B 老股估值隐含约 20.5x FY2025
              收入，处在东南亚上市网约出行运营商可观察 6-10x 区间的高端之上，反映了显著的增长和市场领导溢价。估值逻辑押注于收入继续保持 40%+ 增长、2027-2028 年 IPO 选择权，以及管理层指引的
              FY2026 EBITDA 打平。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              印度网约出行市场没有与 Rapido 以摩托车网约车为核心的模式完全匹配的公开市场标的。最接近的上市可比公司，是同样具备平台结构和新兴市场属性的东南亚超级 App。Grab Holdings（Nasdaq:
              GRAB）是东南亚网约出行和配送平台，FY2025 收入约 $2.4B，市值约 $15B，隐含 6-7x 远期收入倍数，是主要上市基准。GoTo Group（Jakarta:
              GOTO）是印尼网约出行和电商集团，受持续亏损和复杂结构拖累，交易倍数约为 2-3x 远期收入。Uber Technologies（Nasdaq: UBER，市值约
              $150B）不能用于推导印度特定倍数；其印度业务被并入全球实体。


              印度私营公司中，Ola Cabs India（ANI Technologies）是最直接的可比对象。Vanguard 截至 2025 年 5 月将 Ola 估值下调至约 $1.25B，较 2021 年峰值
              $7.3B 下降 83%，反映 FY2025 收入暴跌 42% 至 Rs 1,171 crore，净亏损膨胀至 Rs 662 crore。相比之下，Rapido FY2025 收入增长 44% 至 Rs 934
              crore，净亏损收窄至 Rs 258 crore。这一分化是最清晰的证据，说明 Rapido 已在结构上按交易量取代 Ola，成为印度主导网约出行平台。Uber India 在 FY2025 投入 Rs
              3,000 crore 与 Rapido 竞争。InDrive 全球估值估计约 $1.2-1.5B，其竞价模式在印度二、三线城市与 Rapido 竞争。


              将 6-10x 可比运营商区间应用于 Rapido FY2025 收入 Rs 934 crore（约 $111M），得到 $667M-$1.11B，基本与 $1.1B Series E 价格的上端一致。2025
              年 9 月 $2.3B 老股交易隐含约 20.5x FY2025 收入，计入了可比组尚未反映的 IPO 溢价和市场领导溢价。
            claimRefs:
