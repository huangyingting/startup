  - id: FV001
    type: flow
    layout: wide
    title: 投资建议逻辑 - Rapido 投资决策链
    summary: 流程图追踪证据链：从印度网约车市场增长，到 Rapido 的竞争位置、财务轨迹、估值锚点，最终落到中等信心、高风险的选择性买入建议。
    approximationNotes: 所有概率和估值均为分析师推算。市场份额估计来自第三方来源（Entrackr、行业报告），仅作为方向性指标。
    data:
      nodes:
        - id: n1
          label: 印度网约车市场：到 2030 年 CAGR 18-20%；2025 年 $2-2.5B
        - id: n2
          label: 'Rapido 总体 #1：总行程 ~50%；两轮 / 三轮 50%，网约车 20%+'
        - id: n3
          label: FY2025 收入 Rs 934 crore（+44%）；EBITDA 亏损收窄 75% 至 Rs 104 crore
        - id: n4
          label: 净亏损轨迹：Rs 675Cr（FY23）→ Rs 371Cr（FY24）→ Rs 258Cr（FY25）
        - id: n5
          label: 2025 年 9 月老股交易：Swiggy 持股按 $2.3B 隐含估值出售（3 年 2.5x）
        - id: n6
          label: Prosus 计划 $350M 新股投资；据联合创始人称，IPO 准备将在 2026 年底前启动
        - id: n7
          label: 关键风险：Delhi NCR 禁令仍在；~25-30% TAM 被排除
        - id: n8
          label: 关键风险：Uber FY2025 在印度投入 Rs 3,000 crore；竞争对手资本雄厚
        - id: n9
          label: 估值：$1.1B Series E（Sep-24）→ $2.3B 老股交易（Sep-25）；FY25 收入的 20.5x
        - id: n10
          label: 投资建议：选择性买入 | 信心：中 | 风险：高 | 基准：$2.5B
      edges:
