      - 方向
      - 时间窗口
      - 对 Rapido 的影响
      - 尽调问题
    rows:
      - - 智能手机普及（2026 年达 1B 用户）
        - 驱动 ↑
        - 近期（2025–2026）
        - 扩大总可触达用户基数，尤其是农村和二三线城市
        - 验证农村智能手机用户转化为活跃网约车用户的比例
      - - UPI / 数字支付渗透（每月 15B 笔交易）
        - 驱动 ↑
        - 当前
        - 消除无现金支付摩擦；支持 App 内顺畅结算车费
        - 无——可观察的结构性助推因素
      - - 城市拥堵（结构性）
        - 驱动 ↑
        - 持续存在
        - 在密集交通中，两轮车天然更快；支撑摩托车网约车相对汽车的需求
        - 如果印度城市大幅扩建自行车或公共交通基础设施，监测出行方式转移
      - - 零工经济供给扩张（到 2030 年 7.7M→23.5M）
        - 驱动 ↑
        - 中期（2025–2030）
        - 扩大 Captain 司机供给池，降低司机获取成本，提升城市层面密度
        - 跟踪司机留存和收入底线监管，评估潜在成本逆风
      - - 电动两轮车普及（2026–2034 年 CAGR 28%）
        - 驱动 ↑
        - 中期
        - EV 降低 Captain 司机每公里成本，改善利润；车队电动化达到规模后，平台单次出行成本下降
        - 核实 Captain 司机能否获得 EV 融资；二线市场充电基础设施是否可用
      - - 监管碎片化（邦级禁令）
        - 约束 ↓
        - 近期（2025–2026）
        - 限制可服务城市；卡纳塔克邦 SLP 给班加罗尔供给带来不确定性；压低 SAM 兑现
        - 关注最高法院结果；跟踪各邦采纳 MVAG 2025 框架的进展
      - - 收入波动 / 零工福利（40% 月收入 <Rs 15k）
        - 约束 ↓
        - 中期
        - 司机流失、监管强制最低工资或罢工都可能抬高平台成本或限制供给
        - 跟踪邦级零工福利监管；访谈 Captain 司机队列，判断收入稳定性
      - - Uber 和 Ola 竞争（Uber India FY2026 投资 Rs 3,000 crore）
        - 约束 ↓
        - 近期
        - 在位者激进补贴会压缩乘客获客成本与 Captain 司机利润；价格战延续
        - 在公开文件中按单比较 Rapido、Uber 和 Ola 的抽成率与补贴消耗
    notes: >-
      上述因素是基于多家第三方来源（Deloitte、NITI Aayog、IMARC、Mordor Intelligence、Firstpost/Economic Survey
      2025-26、MediaNama）的方向性评估。时间窗口仅供参考，可能随监管事件改变。并非所有约束都是二元风险——它们更像结构性市场摩擦，需要持续监测，而不是立即缓释。
