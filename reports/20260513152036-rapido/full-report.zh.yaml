      - number: '8.5'
        title: 建议与逻辑
        blocks:
          - type: paragraph
            body: >
              本报告建议选择性买入，置信度为中、风险为高；相对 $2.3B 老股估值，估值立场为合理。该建议反映了 Rapido 的市场领导地位（按交易量估计占印度网约出行 50%+）、改善中的财务轨迹（FY2025
              EBITDA 亏损同比收窄 75% 至 Rs 104 crore）、Prosus $350M 新股融资释放的进一步机构信心，以及 2026 年底启动 IPO 的时间线。按当前老股估值，Series E 轮
              $1.1B 进入的投资者隐含约 2x 回报。新投资者以 $2.3B 进入，相当于支付 20.5x FY2025 收入倍数；价格偏高，但在 44% 收入增长和可信的 EBITDA 打平路径下仍可支撑。


              关键重估催化剂包括：（i）联合创始人 Sanka 所称的 2026 年底前启动 IPO 申报；（ii）兑现 FY2026 EBITDA 打平；（iii）Delhi NCR 合法化；（iv）Prosus $350M
              新股融资以 $2.7-3B 估值关闭，从而验证老股估值。$2.3B 的下行来自竞争性市场份额流失、新的邦级禁令、FY2027 前未能实现 EBITDA 打平，或印度资本市场恶化。


              战略退出选择权具有实质价值。全球网约出行运营商、物流集团或印度出行平台，都可能以较独立估值 20-40% 的战略溢价收购 Rapido。若 FY2026 实现 EBITDA
              打平且印度资本市场保持建设性，2027-2028 年窗口 IPO 看起来现实。
            claimRefs:
              - CV030
              - CV031
              - CV032
              - CV033
              - CV034
