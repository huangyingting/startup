      - number: '5.2'
        title: 技术栈与工程架构
        blocks:
          - type: paragraph
            body: >
              Rapido 的基础设施建在 Google Cloud 上，Google Kubernetes Engine（GKE）为其微服务提供容器化、自动扩缩的算力。Firebase Dynamic Links、Cloud
              Messaging、Firestore 和 Firebase Realtime Database 处理深度链接、推送通知，以及实时行程追踪所需的亚秒级数据同步。Cloud SQL 管理关系型数据，Cloud
              Key Management 保护加密密钥。BigQuery 支撑大规模分析；Rapido 已开始在 Google Cloud AI 上搭建 ML 管道，需求预测和行程匹配算法是首批生产负载。Cloud
              Vision AI 自动化 captain 文件验证，把驾照和车辆登记证书处理时间从数天压到数分钟。


              平台的城市上线架构刻意做成可配置：新城市通过功能开关激活，无需工程介入，因此可以持续每月新增 30–40 个城市。CI/CD 管道支持每天 10–15
              个小版本应用发布，并每两周合并一次大版本发布。分析团队使用公司累积的行程数据集（9+ 年、数十亿次行程）训练 ETA 预测模型和空间需求热点分类器。完整 ML 架构、微服务拓扑、故障切换设计和 SLA
              承诺未公开披露，开放来源无法验证实际韧性水平。
