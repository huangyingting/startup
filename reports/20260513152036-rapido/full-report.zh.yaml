      - number: '8.6'
        title: 投资逻辑失效触发点与尽调问题
        blocks:
          - type: paragraph
            body: >
              多类事件会使投资逻辑失效，并要求立即退出或降低仓位。Delhi NCR 摩托车网约车禁令永久化，或 Maharashtra、Tamil Nadu
              出现新禁令，都会结构性缩小印度可触达摩托车网约车市场，并把结果推向悲观情景。一线城市市场份额连续两个季度持续跌破 35%，将表明竞争侵蚀超出模型容忍度，并把倍数压缩至 8-12x 收入。FY2027 前未能实现
              EBITDA 打平，则说明订阅模式没有带来预期的单位经济性改善。如果计划中的 Prosus $350M 新股融资以显著低于 $2.3B 的估值关闭，将释放下轮融资信号，并需要彻底重估投资逻辑。


              关键未决尽调事项包括：（1）确认 FY2026 EBITDA 指引，并提供支持性财务细节或月度烧钱数据；（2）Delhi NCR 监管策略和法律时间表；（3）完整股权结构表披露，包括 WestBridge 和
              Prosus 的清算优先权瀑布、反稀释条款；（4）司机单位经济性、CAC、LTV 和日活司机流失；（5）Prosus 新股融资条款、估值和关闭条件。解决第 1 项和第 3 项，足以将置信度从中上调至高。
            claimRefs:
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
