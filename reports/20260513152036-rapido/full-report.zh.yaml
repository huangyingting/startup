      - number: '2.8'
        title: 附录展示
        blocks:
          - type: callout
            title: 印度拥堵环境放大两轮车结构性优势
            body: >
              印度城市拥堵程度独特，为两轮车网约车创造了多数其他市场不存在的结构性优势。高峰期城市走廊中，两轮车比汽车快 30–40%，两轮车网约车价格也比同等汽车行程低
              30–50%。再叠加印度价格敏感的通勤人群，以及两轮车在印度 300+ million 私人车辆保有量中占最大份额，Rapido 核心产品的总可服务用户池明显大于可比市场中四轮网约车平台能触达的用户池。
            calloutType: strength
            claimRefs:
              - CM037
              - CM038
              - CM031
              - CM032
          - type: callout
            title: 州级监管碎片化构成结构性市场天花板
            body: >
              MVAG 2025 缺少统一州级落地，使有禁令或暂缓期的州形成硬性运营天花板。Karnataka 待决的 Supreme Court 上诉是赌注最高的案例：如果法院恢复禁令，Rapido 的 Bengaluru
              运营将受到实质扰动。更广的模式——Maharashtra 仍处于规则草案阶段，多个州处于灰区——意味着潜在 SAM 中相当一部分当前不可触达。平台必须把逐州监管风险纳入开城时间表和资本配置决策。
            calloutType: risk
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM027
              - CM028
          - type: callout
            title: 零工供给扩张催化供给侧护城河
            body: >
              印度零工劳动力从 FY2021 的 7.7 million 扩至 2029–30 年预计 23.5 million，既是市场规模信号，也是 Rapido
              平台的供给侧投入。寻求灵活收入的零工劳动者池子越大，司机获取成本越低，地理覆盖潜力越大，服务密度越高。不过，40% 零工劳动者月收入低于 Rs 15,000，埋下了监管收入底线压力，未来几年可能推高平台成本结构。
            calloutType: insight
            claimRefs:
              - CM034
              - CM035
              - CM036
              - CM041
          - type: callout
            title: 市场规模估计相互矛盾，削弱估值锚信心
            body: >
              印度网约车市场至少有四个 2026 年主要分析师估计，标题规模差异超过 5x（USD 3.28B 至 USD 23.98B），反映范围定义显著不同。若没有一致方法论，估值模型中使用的任何 TAM
              倍数都会高度依赖所选分析师估计。尽调应先理解每个估计的范围边界，再决定是否锚定。
            calloutType: risk
            claimRefs:
              - CM001
