      - number: '4.3'
        title: 成本结构与单位经济
        blocks:
          - type: paragraph
            body: >
              captain 激励和配送费用是 Rapido 最大成本项，FY25 达 Rs 500 crore，占总费用 40%，高于 FY24 的 Rs 460 crore，增幅 8.7%。该增速（8.7% 对比收入增长
              44%）说明供给激励线的经营杠杆正在改善；这条线历来是印度网约车平台亏损的最大来源。FY25 营销和促销费用上升 18% 至 Rs 252
              crore，因为公司激进投入获客和品牌认知，以扩张四轮车和配送板块。员工成本增长 20% 至 Rs 207 crore，R&D 支出增长 20% 至 Rs 108
              crore，说明公司仍在投入平台能力和技术差异化。FY25 总费用为 Rs 1,261 crore，FY24 为 Rs 1,066 crore（增长 18.3%），明显低于 44%
              的收入增速——这是单位经济改善的关键信号。


              每 Rs 1 收入支出从 Rs 1.65（FY24）改善到 Rs 1.35（FY25），反映了上述经营杠杆；但公司在净利润和 EBITDA 层面仍然亏损。若要实现 EBITDA 盈亏平衡（意味着每 Rs 1
              收入支出比率约为 1.00），还需要大约再减少 Rs 104 crore 亏损——约等于 FY25 经营收入的 11%；管理层认为，依靠 FY26 持续收入增长和成本纪律可以做到。


              分板块毛利率未公开披露。Rapido 的轻资产模式（不拥有车辆，也不把 captain 作为直接雇员）限制了 capex 暴露，但订阅和佣金收入结构意味着毛利与 captain
              激励水平紧密绑定。当监管变化迫使业务转向线索生成模式（如 Karnataka 的 bike-taxi 市场），单 captain
              经济会发生实质变化；由于激励仍会支付，不会随模式变化同比例下降，收入线会收缩而成本不会等比例减少。
