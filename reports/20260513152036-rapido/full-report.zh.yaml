      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM 视角
        blocks:
          - type: paragraph
            body: >
              印度网约车市场存在多组分析师估计，背后的范围定义差异很大；要得出与 Rapido 相关的数字，必须先调和这些口径。


              最宽的视角来自 Mordor Intelligence 的 India Taxi Market，覆盖所有出租车、cab、两轮车网约车和 auto-rickshaw 细分市场。该报告估计，2026 年总市场规模为
              USD 23.98 billion，并以 7.78% CAGR 增至 2031 年 USD 34.87 billion。这构成了跨车型平台运营商竞争的 TAM。在该 TAM 内，线上预订占 70.84%，app
              化网约车占 65.10%，推导出 2026 年数字化 TAM 约 USD 15.6 billion。


              6Wresearch 的较窄视角覆盖印度网约车细分市场，并预计 2026–2032 年 CAGR 为 6.4%；其定义更接近仅包含 app 化预订。Grand View Research 将 India Ride
              Hailing Services 在 2025 年的规模定为 USD 2.51 billion，并预计到 2033 年以 20.7% CAGR 增至 USD 11.06
              billion——基数低得多，反映其范围更严格，排除了传统出租车调度。


              Rapido 核心细分市场——两轮车网约车和 auto-rickshaw——的可服务市场（SAM），对应 India Commercial Two-Wheeler Market。Marqstats 估计该市场
              2026 年规模为 USD 3.28 billion，并以 17.24% CAGR 增至 2030 年 USD 6.20 billion。这是最直接适用于 Rapido 主导收入线的规模口径。按 Rapido
              声称的 70% 两轮车网约车份额和约 40% auto-rickshaw 份额粗算，Rapido 当前可获取收入机会约为 SAM 中 USD 0.9–1.2
              billion；但这只是推断，需要直接验证，因为公开资料中没有独立第三方专门给出两轮车网约车 SOM 估计。


              各组估计之间存在实质矛盾。Mordor 的广义市场数字（USD 23.98 billion）比 GVR 较窄的网约车数字（估计 2026 年约 USD 4.5 billion）高出 5x
              以上，反映的是定义分歧，而非分析错误。尽调不应锚定单一估计，而应结合各家分析师方法论脚注做三角校验。
