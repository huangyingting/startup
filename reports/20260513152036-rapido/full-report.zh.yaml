      - number: '1.7'
        title: 附录展示
        blocks:
          - type: callout
            title: 零佣金 SaaS 模式构成结构性差异
            body: >
              Rapido 在 2023 年转向零佣金 SaaS 模式，captain 支付固定日费而非按车费比例抽佣，从根本上重排了供给侧相对 Ola 和 Uber
              的激励。该模式消除了佣金平台常见的“取消订单后线下付款”套利，降低每单激励开支，并提供更可预测的订阅收入基础。FY2024 订阅收入增长 171%，captain 供给加速，是模式跑通的早期证据。
            calloutType: strength
            claimRefs:
              - CO006
              - CO007
              - CO033
              - CO039
          - type: callout
            title: 两轮车网约车运营面临多州监管不确定性
            body: >
              Karnataka 持续两年的两轮车网约车禁令（2024 年 3 月–2026 年 1 月）虽已部分解决，但暴露了 Rapido 核心两轮车产品对州级监管动作的结构性脆弱。Maharashtra、Assam
              和其他州也出现过类似禁令或执法。Central Motor Vehicle Aggregator Guidelines 2025
              提供了允许两轮车网约车的全国框架，但各州仍需制定本地规则——由此形成的许可要求拼图，会推高合规成本，也让任何单一市场的运营充满不确定性。
            calloutType: risk
            claimRefs:
              - CO041
              - CO042
              - CO043
              - CO044
              - CO048
          - type: callout
            title: 创始三人组关键人集中
            body: >
              三位联合创始人 Sanka、SR 和 Guntupalli 分别承担 CEO/COO/CTO 角色，公司没有公开披露独立董事、CFO 或创始层以下的
              C-suite。这种集中带来继任风险，限制治理制衡，也可能拖慢未来 IPO 准备，尤其是满足 SEBI 对董事会独立性的要求。对一家估值 $1.1B 的印度公司而言，缺少公开治理披露是不寻常的透明度缺口。
            calloutType: risk
