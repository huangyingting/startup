      - number: '3.2'
        title: 主要竞争对手：Ola 和 Uber India
        blocks:
          - type: paragraph
            body: >
              Ola（ANI Technologies Pvt. Ltd.）是印度最大的本土网约车公司，在 250+ 个城市运营四轮车、三轮车和两轮车三类车型。Ola 于 2024
              年末在印度证券交易所（NSE/BSE）上市。FY2024 收入约 ₹1,773 crore（约 $211M），并报告了首个全年经营利润。即便达成这一财务里程碑，Ola 仍被 Uber CEO Dara
              Khosrowshahi 称为因电动车（Ola Electric）业务而“分心”；Rapido 也被 Uber 点名为其在印度的主要竞争威胁——这是竞争叙事的一次重要公开重定位。Ola 的两轮车网约车份额明显落后
              Rapido；估计显示，Ola 在两轮车网约车中位列 Rapido 和 Uber Moto 之后第三。为回应 Rapido 在司机留存上的成功，Ola
              在部分城市采用了局部零佣金模式，但根据公开报道的司机访谈，司机对 Ola 平台的信任仍低于 Rapido。


              Uber India 是 Uber Technologies（NYSE: UBER，市值约 $153B）的本地子公司，以约 50% 乘车份额领先四轮网约车细分市场，在三轮 auto 中位居第二（约
              40%），但在两轮车网约车中明显落后 Rapido。Uber 印度总裁公开表示，公司对两轮车网约车作为“下一波出行浪潮” “非常看好”；Uber 也通过与物流公司 Shadowfax 合作扩张 Uber
              Moto，进入新城市。2025 年，Uber 还进入 Delhi 和其他一线城市的 ONDC 网络地铁票务，拓展其印度平台。Uber 在主要一线城市将四轮车价格下调
              20–25%，并在部分市场试行司机订阅模式，直接复制 Rapido 的 SaaS 定价结构。Uber 的财务纵深——一家盈利的全球实体——赋予其持续资助激励战的能力；一位行业消息人士形容 Rapido
              正在“流血”，而 Uber “有余地打这场仗”。
