  - id: FE002
    title: Rapido 乘客下单流程
    type: flow
    layout: standard
    summary: 展示乘客从打开应用到完成行程并付款的端到端旅程，以及关键系统触点。
    approximationNotes: 流程根据官方应用描述、Google Play 列表和 Indian Express 特写文章重建。精确后端调用顺序和兜底逻辑未见文档披露。
    claimRefs:
      - CE007
      - CE008
      - CE011
      - CE028
      - CE029
    data:
      nodes:
        - id: open-app
          label: 乘客打开 Rapido 应用
          type: start
          detail: Android 或 iOS；首次使用通过手机 OTP 登录
        - id: set-destination
          label: 输入起点和终点
          type: step
          detail: 收藏列表或手动输入；选择两轮 / 三轮车 / 网约车模式
        - id: price-display
          label: 显示预估车费
          type: step
          detail: 动态定价引擎计算车费；需求高时显示溢价提示
        - id: matching
          label: 订单匹配引擎分配 Captain
          type: step
          detail: ML 模型选择最近的可用 Captain；Captain 收到行程请求
        - id: captain-accept
          label: Captain 接单；乘客端显示 PIN
          type: step
          detail: 到达上车点时，基于 PIN 的核验取代 OTP
        - id: live-tracking
          label: 行程进行中——实时追踪开启
          type: step
          detail: 通过 Firebase 获取实时经纬度；可分享位置链接；可使用 SOS
        - id: route-check
          label: 路线偏离监控（始终开启）
          type: gate
          detail: Captain 偏离规划路线或异常停车时触发警报
        - id: payment
          label: 下车付款（UPI / 现金）
          type: end
          detail: 三轮车 / 网约车直接付给 Captain；两轮网约车佣金部分在应用内支付
      edges:
        - from: open-app
          to: set-destination
        - from: set-destination
          to: price-display
        - from: price-display
          to: matching
        - from: matching
          to: captain-accept
        - from: captain-accept
          to: live-tracking
        - from: live-tracking
          to: route-check
        - from: route-check
          to: payment
