      - number: '8.4'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              核心投资逻辑建立在五个结构性支柱上。第一，截至 2025 年，Rapido 按交易量估计持有印度网约出行总量 50%+ 份额；这是九年构建起来的结构性位置，Ola
              等竞争对手即便持续投放资本也未能挑战。第二，订阅模式创造了更可预测的单位经济性和司机忠诚度，司机利用率上升后应推动利润率改善。第三，印度网约出行市场正以估计 18-20% CAGR 向 2030
              年增长，驱动力来自城市化、智能手机渗透，以及两轮车在印度拥堵城市中的结构性优势。第四，财务轨迹明显向好：净亏损从 Rs 675 crore（FY2023）降至 Rs 258
              crore（FY2025），EBITDA 亏损一年内从 Rs 409 crore 收窄至 Rs 104 crore，订阅收入 FY2025 增长 14x。第五，2025 年 9 月老股交易和待完成的 Prosus
              新股融资表明，成熟机构投资者已经在 12 个月内将业务重估超过 2x。


              反向逻辑建立在三个系统性担忧上。Delhi NCR 摩托车网约车禁令截至 2026 年 5 月仍没有确认的解决路径，排除了印度城市网约出行 TAM 约 25-30%。当前 $2.3B
              老股估值，对一个仍亏损运营的业务隐含约 20.5x FY2025 收入；要守住这一倍数，公司必须继续高增长并兑现盈利。Uber 在 FY2025 向印度投入 Rs 3,000 crore，Ola
              仍在四轮车收入上领先，二者带来的竞争动态会在市场份额和单位经济性上形成持久的二元风险。
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
