      - number: '4.6'
        title: 财务结论与尽调阻断点
        blocks:
          - type: paragraph
            body: >
              Rapido 的财务轨迹确实有吸引力：FY22–FY25 三年收入扩张 4.4×，同时 EBITDA 亏损较 FY23 峰值减少 90%+，说明公司已经找到一个可扩张的模式。auto 和 cab
              的订阅转向是决定性干预——FY25 产生 Rs 275 crore，而 FY24 仅 Rs 19 crore，同时降低了高佣金给 captain 带来的摩擦。EBITDA 利润率轨迹（FY23 –152% →
              FY24 –52.5% → FY25 约 –11%）支撑了管理层关于 FY26 EBITDA 盈亏平衡可实现的说法。


              不过，若干结构性风险压低了前景。第一，合并口径单位经济仍为负：公司每赚 Rs 1 仍要花 Rs 1.35，在瞄准净利润前，这一比率必须收敛到 1.0。第二，收入结构转移是一把双刃剑：订阅收入增长 14×，但部分由
              auto/cab 的地理扩张驱动，意味着未来增长需要进一步地域铺开或深化城市利用率——两者都需要资本投入。第三，平台佣金收入在 FY25 下降 23.5%，反映真实监管风险：Karnataka 的
              bike-taxi 禁令扰乱了 Rapido 最高量级的细分市场。虽然 2026 年 1 月 HC 裁决提供了缓解，但邦级监管不确定性仍是持续的收入端风险。第四，新食品配送垂直业务（Ownly）引发 Swiggy
              退出，并增加成本和执行风险，却尚未给 FY25 申报贡献实质收入。


              关键尽调阻断点：（1）没有分板块毛利率披露——无法判断哪些垂直业务在补贴亏损。（2）Series E 注资后现金余额或烧钱速度没有公开确认。（3）没有债务 / 授信安排披露——如果 Rapido 追求资产较重的
              quick-commerce 基础设施，这一缺口会变得实质。（4）FY26 财务尚未提交；管理层目标来自公司表述，未经独立验证。（5）Swiggy 老股退出隐含的 $2.5–2.7B
              估值只反映一笔公平交易，不是经审计的 DRHP 估值；新股轮重定价才是企业价值的真正测试。
