      - number: '6.4'
        title: 客户留存与满意度信号
        blocks:
          - type: paragraph
            body: >
              Rapido 的满意度画像显示，应用商店评分与独立消费者评价平台之间长期分化——这种模式在高频消费者应用中很常见：完成交易的用户更倾向留下正面评价，而不满意用户在专门投诉平台上的占比更高。


              截至 2026 年 5 月，Rapido 在 Google Play Store 上基于 4.1 million 多条评论评分 4.77/5，位居全球评分最高的网约车应用之列。AppBrain 汇总的 iOS
              App Store 评分为 4.9/5。这些数字覆盖极大用户横截面，对核心预订和乘车体验提供了有意义的正面信号。不过，全周期均值可能掩盖近期趋势；按问题类别或时间近因拆分的数据未公开。


              与此相对，印度最大服务类消费者评论聚合平台 MouthShut.com 显示 Rapido 在数百条评论中的评分约
              1.6/5，投诉集中在多收费、司机不当行为、客服响应差、支付和钱包问题，以及应用技术故障。ConsumerComplaints.in 记录了具体价格异常：一名用户 3.26 km 行程被收取 ₹191，而原本
              8.56 km 行程的预估车费为 ₹185，Rapido 支持拒绝退款请求。PissedConsumer 和 Voxya 也增加了反向语料。一项对消费者论坛数据的二级分析显示，约 60%
              登记投诉被标记为已解决，但 Rapido 不发布官方 SLA、投诉解决方法或总体投诉率。


              Rapido 于 2024 年取消 auto 行程的应用内钱包支持——强制转向 UPI 或现金——遭到用户明显批评，尤其是已预充值钱包余额且遇到访问困难的用户。该产品决定记录在
              ConsumerComplaints.in 和 PissedConsumer 资料中，对既有客户构成可逆但真实的摩擦。


              最关键的留存风险来自供给侧中断。2026 年 2 月 7 日全国性「All India Breakdown」罢工由 Telangana Gig and Platform Workers'
              Union（TGPWU）协调，覆盖 Delhi、Mumbai、Bengaluru、Hyderabad 和其他主要城市的 Rapido、Ola、Uber captain，造成六小时服务中断。captain
              诉求集中在政府通知的最低车费，以及禁止私人非商业车辆作为事实上的 taxi 运营。2026 年 4 月，至少一座城市的 Rapido captain
              因收入下降而抗议，并警告可能无限期暂停服务，说明劳动力供给紧张尚未解决。这些中断会直接影响客户体验，并为 Uber 和 Ola 创造切换机会；现有数据无法量化流失影响。


              关键问题是，Rapido 不公开披露任何 NPS、CSAT、队列留存、重复预订率或总 / 净收入留存数据。公司没有发布经审计的客户满意度调查。这是实质尽调缺口：没有这些指标，就无法评估 Rapido 的 MAU
              领先优势在竞争对手加码价格或司机供给后还能维持多久。
