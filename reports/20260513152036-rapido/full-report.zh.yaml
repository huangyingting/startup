      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >
              印度网约车市场服务几类清晰用户原型，彼此在出行频率、价格敏感度、地理位置和采用路径上都不同。理解这些细分人群，是评估 Rapido 市场位置和增长跑道的关键。


              最大细分人群是城市日常通勤者——通常年龄 18–40 岁，居住在 tier-1 或 tier-2 城市，工作于有组织或半正式部门，需要 3–12 km
              的短途出行，以到达公共交通枢纽、工作场所或商业中心。该人群带来高频、低客单交易量，也定义了两轮车网约车经济性。在该细分人群中，价格可承受性是首要采用驱动；两轮车网约车比同等汽车网约车便宜
              30–50%，具备结构性价格优势。


              增长最快的细分人群，是非一线 / tier-2 和 tier-3 城市通勤者——这些市场 Rapido 已声称领先，RedSeer
              分析也确认其增速快于一线城市。这些用户往往缺少可靠的公共交通替代方案，因此按需两轮车不是补充工具，而是主要出行方案。


              零工经济供给侧——司机伙伴或 “captains”——也是关键利益相关方。他们既是运力供给者，也是 Rapido SaaS 订阅产品的客户（支付 Rs 9–29/day）。印度零工劳动力从 FY2021 的
              7.7 million 增至 FY2025 的 12 million；NITI Aayog 预计到 2029–30 年将达到 23.5 million，扩大了网约车平台可用供给池。付款方始终是乘客（B2C），企业
              / B2B 出行占比很小。预算由个人通勤者掌握，没有机构采购流程；因此采用路径由消费者 app 驱动，而非企业销售驱动。
