      - number: '1.5'
        title: 里程碑与监管格局
        blocks:
          - type: paragraph
            body: >
              Rapido 的公司历史可分为六个阶段：创立与自举（2015–2018）、早期机构资本和城市扩张（2019–2021）、Swiggy 领投 Series D 轮并接近独角兽（2022）、战略转向
              SaaS（2023）、独角兽里程碑与 cab 扩张（2024）、Karnataka 监管战解决（2025–2026）。


              Rapido 历史上影响最深的负面事件，是 Karnataka 两轮车网约车监管争议。2024 年 3 月，Karnataka 政府以 Motor Vehicles Act, 1988
              下缺少正式监管框架、安全担忧以及 auto-rickshaw 工会压力为由，禁止两轮车网约车服务。Karnataka High Court 将该禁令正式化，并要求自 2025 年 6 月 16
              日起，Rapido、Ola 和 Uber 停止两轮车网约车服务。Rapido 于 2025 年 6 月暂停 Karnataka 的两轮车网约车运营。2026 年 1 月，Karnataka HC
              转向，裁定摩托车在印度法律下属于“运输车辆（transport vehicles）”，不能一概禁止；法院允许平台在满足州政府附加条件的前提下，申请摩托车运输许可。


              多州监管挑战长期困扰 Rapido。公司曾在 Assam 遭遇禁令或限制，其 Guwahati 办公室被交通部门查封；在 Maharashtra 和 Mumbai 遭遇多次执法；在 Bengaluru 和
              Pune 出现 RTO 扣押摩托车事件。这些事件说明，印度缺少统一的全国两轮车网约车聚合平台监管框架。Central Motor Vehicle Aggregator Guidelines, 2025
              现已明确允许两轮车网约车，但需州级批准；这应能降低未来各辖区监管模糊度。


              安全事件也带来负面报道。2025 年 7 月，一名 Delhi 乘客记录了 Rapido 行程中的事故视频，暴露 captain 未按要求佩戴头盔和鲁莽驾驶问题。2025 年 6 月 Bengaluru
              的另一事件中，司机殴打一名女性乘客，引发社交媒体愤怒和警方调查。这些事件让外界质疑 Rapido 在 2M+ captain 基础上的司机筛选、持续监控和安全执行机制。
