  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 用户规模与增长轨迹
        blocks:
          - type: paragraph
            body: >
              按活跃用户看，Rapido 登顶印度网约车市场，是 2025 年以来新兴市场科技中最醒目的出行增长故事之一。MoneyControl 和 Firstpost 引用的第三方分析数据显示，2026 年 2 月
              Rapido 月活跃用户约 74 million，领先同期 Uber India（约 39 million）和 Ola（约 28 million）。这意味着 MAU 较 2025 年 2 月的 42
              million 增长 76%，增速远高于全球典型网约车增长基准。


              2026 年 1 月 19 日至 2 月 22 日期间的周活跃用户数据显示，Rapido WAU 为 40.07 million，Uber 为 20.56 million，Ola 为 11.63
              million——约为最近竞争对手的 2×。Uber CEO Dara Khosrowshahi 公开把 Rapido 视为印度市场相对 Ola
              更难应对的竞争威胁，也强化了这些数字的重要性。应用分发方面，Rapido 在 Android 和 iOS 累计安装量已达 210+ million；AppBrain 分析估计，截至 2026
              年初，其持续下载运行率约 8.1 million/月（约 270,000/天）。


              公司自身披露的数据来自 CMV360 对其 Q2 FY25（2024 年 9–11 月）业绩的报道，显示所有品类月活客户 17 million、日行程 2.6 million。第三方分析的 74 million
              MAU 与公司披露的 17 million 月活客户之间差距很大，很可能反映方法差异：分析平台通常衡量任何应用互动（包括打开应用、查价和放弃预订），而 Rapido 内部对「active
              customer」的定义可能要求完成行程。尽调应澄清投资者材料使用哪一项指标。


              Karnataka High Court 于 2026 年 1 月恢复 bike-taxi 牌照——结束两年监管禁令——预计会对 Rapido 来自 Bengaluru
              的行程量产生实质正面影响；Bengaluru 是其按 gross order value 计的最大市场。Bengaluru 是公司起步城市，也仍是 bike-taxi 品类密度最深的市场。2026 年 2 月
              WAU 数据已经捕捉到早期恢复收益。
