      - number: '4.5'
        title: 投资者股权结构表与老股交易
        blocks:
          - type: paragraph
            body: >
              自 Series D（2022）以来，Rapido 的股权结构表经历一系列战略退出和新投资者进入，已发生实质变化。根据 Entrackr 对内部文件的审阅，截至 2024 年 8 月，WestBridge
              Capital 持股约 32.88%，是最大外部股东。同期 Nexus Venture Partners 持股约 8.19%，Swiggy 持股约 12.32%。


              Swiggy 于 2025 年 9 月完全退出 Rapido，将其全部约 12% 股权出售给 Prosus（MIH Investments One B.V.，Rs 1,968 crore）和 WestBridge
              Capital（Setu AIF Trust，Rs 431.5 crore），总额 Rs 2,400 crore（约 $270M）。该交易对 Rapido 的估值约为 $2.5–2.7 billion，较
              $1.1B 的 Series E 估值提升约 2.3–2.5×，也让 Swiggy 在约三年内从其 $180M Series D 投资获得约 2.5× 回报。退出由战略利益冲突驱动：Rapido 于 2025
              年中推出食品配送平台「Ownly」，直接竞争 Swiggy 的核心业务。


              TVS Motor Company 也在 2025 年 11 月完全退出，以 Rs 287.93 crore 将其股权出售给 Accel India VIII（Mauritius）Ltd 和 MIH
              Investments One B.V.（Prosus）。TVS 将原因称为「投资变现」和战略组合再平衡。这些退出进一步把所有权集中到 WestBridge、Prosus 和 Nexus
              手中，三者如今构成核心机构股东基础。


              Swiggy 退出交易隐含的 $2.5–2.7B 估值没有得到新股轮 term sheet 或审计估值报告的独立确认，而是从老股交易价格推算。Tracxn 记录 2025 年 9 月 post-money 估值为
              $2.3B，印证了估值上行方向。截至 2026 年 5 月，没有公开的招股书、DRHP 或 SEBI 文件，符合公司仍处于 pre-IPO 阶段的状态。退出后的精确股权比例未公开披露。
            claimRefs:
