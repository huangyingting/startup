      - number: '5.5'
        title: 集成、支付与生态扩张
        blocks:
          - type: paragraph
            body: >
              Rapido 的生态策略押注 ONDC，把它作为地铁票务集成和物流合作的开放网络轨道。地铁票务覆盖 Delhi（₹25 首末程车费，首单免费）、Mumbai（Lines 2A、2B、7、9，经 QR
              码）、Hyderabad、Chennai 和 Kochi，Bengaluru 尚未上线。DMRC 的 Managing Director 将该集成描述为「全球首次在单一应用中整合地铁票和首末程预订」。Rapido
              每天在印度处理 500,000 笔地铁相邻行程，其中仅 Delhi 就有 100,000 笔。2025 年 10 月上线的旅行预订集成，通过 Goibibo、redBus 和 ConfirmTkt
              增加机票、酒店、火车和城际巴士，瞄准印度 ₹5.8-trillion 的旅行市场。


              支付侧，Rapido 于 2024 年取消 auto 行程的应用内钱包支付，转向乘客与 captain 之间直接 UPI 和现金结算。这降低了平台 GST
              负担，但在车费透明度上引入消费者摩擦；部分乘客报告称，司机会要求支付高于应用显示车费的非正式加价。EV 车队扩张方面，Rapido 已与 IndoFast Energy（Indian Oil
              Corporation 和 Sun Mobility 的 JV）合作，计划 24 个月内在 Hyderabad 和 Bengaluru 部署 10,000 辆 Piaggio Ape E-City Max
              换电电动 auto，Delhi 和 Chennai 排在后续阶段。公开来源未发现面向企业账户和白标集成的公开开发者 API。
