      - number: '3.5'
        title: 切换成本、锁定与多平台接入
        blocks:
          - type: paragraph
            body: >
              在印度网约车市场，乘客多平台使用极其普遍。多数城市通勤者至少装着两到三个应用，临下单时选择价格最低或最快可用的平台。除了对应用的熟悉度，乘客几乎没有实质性的数据锁定、会员忠诚计划或切换成本。需求侧看，印度网约车接近完全商品化：约
              60–70% 用户把车费作为首要选择标准，其次才是等待时间和可得性。这个结构现实限制了任何平台的定价权，也让乘客忠诚度很脆弱。


              供给侧 captain 的锁定效应略强，原因是日订阅模式——captain 付费后，当天会更愿意在同一平台接单，以摊回沉没成本。不过 captain 也会跨平台接单：调研和司机访谈显示，许多 captain
              会根据激励和需求高低，在 Rapido、Ola、Uber 之间切换。Rapido 的订阅费足够低（约 ₹19–29/天），切换摩擦很小。


              数据网络效应有限：用户越多，Rapido 的路线优化和需求预测越好，但乘客很难直接感知这些收益。地理密度才是更强的锁定形式——在 Rapido captain
              密度最高的城市，等待时间最短，从而形成正循环。Rapido 一直在 tier-2/3 城市建立这种密度优势，而 Uber/Ola 在这些城市更薄。分发能力（captain 供给深度）是最耐久的竞争护城河，但
              Namma Yatri 的零佣金模式正在威胁这道护城河，因为它给 captain 的经济账更有利。
            claimRefs:
              - CP029
              - CP030
              - CP031
              - CP032
      - number: '3.6'
        title: 护城河耐久性与竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Rapido 的竞争护城河压在三根支柱上：（1）100+ 城市中领先的 bike-taxi 供给密度；（2）在价格敏感的两轮车通勤者中的品牌认知；（3）面向 captain 的先发 SaaS
              订阅模式。每根支柱都有明确威胁。


              供给密度面临 Namma Yatri 的压力。后者有政府背书、采取零佣金模式，给 captain 更好的经济账，也具备监管合法性。Namma Yatri 每季度扩张 5–6 个城市之后，可以在这些市场侵蚀
              Rapido 的 captain 供给，而不必直接打价格战。面向预算型通勤者的品牌护城河短期还算稳，但取决于价格持平或更低：Rapido 的 bike 车费比可比四轮车选项便宜 40–60%，但在 InDrive
              运营的城市，其议价车费模式可以压低 Rapido 的价格。


              SaaS 模式差异化已经部分商品化：Uber 和 Ola 都在部分市场推出了类似订阅的司机定价。该模式不再是 Rapido 独有优势，而是变成行业入场券。Rapido 扩张到四轮出租车，会进入 Ola 和
              Uber 已经领先 10+ 年的战场；对手有更强的车辆品质心智和企业差旅关系，而 Rapido 现有差异化无法直接迁移过去。


              监管碎片化仍是反向结构性风险：2026 年 5 月 Maharashtra 打击行动撤销临时 bike-taxi 牌照，并要求 EV 车队和商业注册，说明即便中央 MVAG 2025
              已合法化，邦级执法仍能实质性扰乱运营。Maharashtra 当局指出 Rapido 是聚合平台中违规数量最高的一家——这是具体的合规执行风险，并非 Ola 或 Uber 同等承担。商品化风险很高：如果
              Rapido 不能持续在 captain 供给、EV 车队激励和相邻服务（通过「Ownly」做食品配送）上创新，3–5 年内可能被重估为普通出行商品。
