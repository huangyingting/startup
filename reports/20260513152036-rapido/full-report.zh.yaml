      - number: '3.3'
        title: 新兴与相邻竞争者
        blocks:
          - type: paragraph
            body: >
              InDrive（前身为 iDrive）是一家总部位于 Delaware、具有俄罗斯根源的全球网约车平台。截至 2025 年初，它在印度约 13 个城市运营，在 Chandigarh 和 Kolkata
              具备强势地位。InDrive 的结构性差异是点对点车费协商：乘客提出价格，司机接受或还价，从而移除其他平台上产生动态加价的算法定价。InDrive 向司机仅收约 10% 佣金，低于 Ola 和 Uber 的
              20–30% 区间。其首席增长官表示，公司在印度的目标是“盈利增长，而不是市场份额”——这有意区别于 Rapido 的规模优先扩张。InDrive 计划每年进入 2–3 个额外印度城市，瞄准 tier-2 和
              tier-3 相邻市场。该平台在印度不提供两轮车网约车，因此与 Rapido 核心细分市场的直接重叠有限。


              Namma Yatri 由 Juspay 孵化并运行在 ONDC 协议上，是一个零佣金出行平台，注册用户已超过 1 crore，行程达到 7.49 crore。它从 Bengaluru 起步，并扩至
              Kolkata、Chennai、Kochi、Siliguri、Mysuru 和更小城市。Namma Yatri 计划每季度进入 5–6 个新城市，并获得 Google 支持。其模式——固定订阅费而非按单抽佣、开放
              ONDC 协议、政府合作——在理念上与 Rapido 的 SaaS 结构一致，但目标更多是三轮车和四轮车，而非两轮车。它获得了 “Bharat Taxi” 的政府支持，后者可能成为使用 Namma Yatri
              技术的全国性政府背书出行服务。这给了它私营平台没有的监管顺风。


              BluSmart 曾是印度最知名的纯 EV 网约车平台，在 Delhi、Bengaluru 和 Mumbai 运营约 8,700 辆 EV，但在 2025 年 4 月基本崩盘。SEBI
              发现来自关联方（Gensol Engineering）的 ₹262 crore 贷款资金被挪用；创始人受到限制，运营停摆，员工未获薪酬。截至 2025 年 5 月，投资方正在讨论一笔 $30M
              过桥融资，以在新领导层下重启 BluSmart，但能否复活仍不确定。Yulu 是一家由 Bajaj Auto 支持的电动滑板车租赁平台，在 Bengaluru、Delhi 和 Mumbai
              运营，目标客群是零工配送员（贡献 60%+ 收入）和通勤者。它不是 P2P 出租车聚合平台，也不直接在网约车中与 Rapido 竞争，但占据同一低价出行细分市场。
            claimRefs:
              - CP016
              - CP017
              - CP018
              - CP019
              - CP020
              - CP021
              - CP022
              - CP023
      - number: '3.4'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              在五个关键竞争维度——车型覆盖、定价模式、司机经济性、地理覆盖和监管姿态——上，Rapido 最强的差异化来自两轮 / 三轮车覆盖和司机经济性；但在四轮网约车和安全技术上，它仍是挑战者。Ola
              在地理广度上领先（250+ 城市 vs. Rapido 的 100+），并提供租车和城际等多模式服务。Uber 在四轮车高端 UX、客户支持质量和全球品牌信任上领先。InDrive
              在票价透明度和司机到手比例上领先。


              app 体验方面，三大平台（Rapido、Ola、Uber）在 2025 年 Play Store 评分均为 4.4–4.7，Rapido 和 Ola 略高。到 2025 年中，Rapido 的 Android
              月活跃用户已超过 Ola 和 Uber——在 Android 占主导的印度市场，这是关键指标。Rapido 的 SaaS 订阅模式（captain 支付 ₹19–29/day，保留 100% 车费）于 2023
              年采用，随后被 Ola 和 Uber 在部分地区部分复制；这削弱了差异化，但也证明它作为司机留存工具有效。安全功能——司机核验、GPS 追踪、紧急 SOS、保险——在 Uber 和 Ola
              之间大体可比；Rapido 则因在 Maharashtra 使用未商业注册的汽油摩托车运营而被当局点名，显示其在该州相对大型既有玩家存在合规缺口。


              进入市场（GTM）分发方面，Ola 依靠 12 年先发优势拥有最广城市足迹。Uber 受益于全球品牌认知和企业出行整合。Rapido 的分发强项在于 captain
              供给：订阅模式吸引不愿分佣的价格敏感司机伙伴。Namma Yatri 通过 ONDC 互操作性和政府试点项目拥有独特分发渠道，相比私营竞争者能降低客户获取成本。
