      - number: '8.7'
        title: 展示材料
        blocks:
          - type: callout
            title: Delhi NCR 禁令是首要二元风险
            body: >-
              截至 2026 年 5 月，Delhi NCR 摩托车网约车禁令没有公布解决时间表，是 Rapido 投资逻辑中最大的单一二元风险。Delhi NCR 约占印度城市网约出行 TAM 的
              25-30%。永久禁令会削弱基准情景估值，显著提高 FY2026 EBITDA 打平难度，并推迟 IPO 时间线。投资者必须把它视为仍在发生的二元风险，而不是暂时性运营逆风。
            calloutType: risk
            claimRefs:
              - CV036
              - CV022
          - type: callout
            title: 2025 年 9 月 $2.3B 老股交易是最可信的估值信号
            body: >-
              Swiggy 以 Rs 2,400 crore 出售 12% 股份，三年实现 2.5x 成本回报；Prosus 接手该股份，说明两家深耕印度的成熟机构投资者已经独立确认 $2.3B
              估值。这个估值信号强于单一领投方定价的新股融资，因为它反映了两个机构对手方之间的公平交易。据报道估值 $2.7-3B 的 Prosus $350M 新股融资待完成，进一步强化了上行动能。
            calloutType: insight
            claimRefs:
              - CV004
              - CV005
          - type: callout
            title: 20.5x FY2025 收入倍数要求持续执行
            body: >-
              2025 年 9 月老股交易给 Rapido 的估值约为 FY2025 收入的 20.5x，而公司从未实现 EBITDA 转正。要维持这一倍数，Rapido 必须做到：（i）按指引在 FY2026 EBITDA
              打平，（ii）收入继续增长 30%+，（iii）印度资本市场支持 2027-2028 年 IPO。这三项任何一项落空，尤其是 EBITDA 目标落空，都会把倍数压向可比亏损平台可观察的 8-12x
              区间，意味着当前价格存在显著下行。
            calloutType: risk
            claimRefs:
              - CV019
              - CV039
