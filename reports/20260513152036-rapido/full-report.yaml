      - number: '7.2'
        title: Competitive Risk
        blocks:
          - type: paragraph
            body: >
              Rapido's position as India's leading bike-taxi platform faces intensifying pressure from well-capitalised
              incumbents and structurally disruptive new entrants. In the bike-taxi segment, the primary competitive
              threat comes from Ola (via its Ola Express service) and Uber (via Uber Moto). Ola Express operates on a
              commission model with aggressive captain incentives in Bengaluru, Hyderabad, and Mumbai; its parent has
              deep pockets following recent fundraising. Uber Moto benefits from Uber's global playbook, including
              international technology infrastructure, algorithmic pricing optimisation, and the ability to cross-
              subsidise Indian operations from profitable geographies. Both competitors have been expanding captain
              onboarding in tier-1 cities, narrowing Rapido's supply-side moat.

              InDrive, the Kazakhstan-origin ride-hailing platform that entered India in 2022, presents a structurally
              different threat. InDrive's peer-to-peer pricing model — where passengers and drivers negotiate fares — is
              popular in price-sensitive tier-2 markets where Rapido is also expanding. InDrive's India captain base has
              been growing rapidly, particularly in Lucknow, Patna, and Guwahati, markets where Rapido has invested
              significantly in supply acquisition. The government-backed Namma Yatri and the ONDC (Open Network for
              Digital Commerce) ecosystem represent a distinctly different category of competitive risk. Namma Yatri
              charges zero commission to auto and cab drivers, funded via a non-profit operating model in Bengaluru. Its
              success in acquiring auto driver supply in Bengaluru has been notable, reducing Rapido's auto supply
              density in certain corridors. ONDC could enable multiple zero-commission apps to route rides without
              paying Rapido any subscription or commission fee, potentially bypassing Rapido's platform entirely.
