  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Rapido's single most material risk category is the fragmented and evolving regulatory landscape governing
              bike-taxi operations across Indian states. The Motor Vehicles Act (MVA) 1988 and its 2019 amendment do not
              contain an explicit national framework permitting or regulating bike-taxi aggregators, leaving state
              governments to interpret the law independently. This structural ambiguity has already produced direct
              financial and operational harm: Karnataka's 22-month bike-taxi ban (March 2024 – January 2026) forced
              Rapido to shift its Karnataka bike-taxi revenue model from full commission collection to a
              lead-generation-only model, directly reducing commission revenue by an estimated 23.5% in FY2025 and
              costing the platform Rs 200–300 crore in lost commission income.

              The Karnataka High Court's January 2026 ruling — lifting the ban and affirming that motorcycles qualify as
              transport vehicles under the MVA — was a significant positive for Rapido, but the ruling came with
              conditions: permit and operational compliance requirements must still be formalised by the state transport
              department, and the political risk of a future government reimposing restrictions through administrative
              order remains non-zero. Karnataka is Rapido's home state and historically among its top revenue markets;
              any re-escalation of the ban would be a material operational setback.

              Delhi NCR represents the second major regulatory flashpoint. The National Capital Region's transport
              authority has not permitted bike-taxi operations under current Motor Vehicles rules, and no near-term
              regulatory pathway is publicly visible as of May 2026. Delhi NCR is the largest metro market in India by
              population; its continued exclusion caps Rapido's total addressable urban market and forces the company to
              compete on non-premium routes. Maharashtra imposes partial restrictions in the Mumbai metropolitan area.
              At the national level, the Ministry of Road Transport and Highways has not issued a central notification
              specifically permitting or regulating bike-taxi aggregators, creating a patchwork where any of the 15+
              states where Rapido currently operates could initiate a Karnataka-style challenge. The Platform Workers
              legislation circulating in Parliament adds another regulatory dimension: reclassification of captains as
              employees would require provident fund contributions, ESI, and other employment benefits, materially
              increasing per-captain costs.
