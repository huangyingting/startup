figures:
  - id: FO001
    title: Company Milestone Timeline
    type: timeline
    layout: standard
    summary: >-
      Key financing, product, regulatory, and adverse events from Rapido's founding (2015) to the Karnataka HC ruling
      (January 2026).
    data:
      items:
        - label: '2015'
          value: Founded — India's first bike-taxi
          detail: >-
            Aravind Sanka, Rishikesh SR, and Pavan Guntupalli launch Rapido in Bengaluru as India's first bike-taxi
            platform after pivoting from theKarrier logistics startup
          tone: positive
        - label: 2022-04
          value: Series D — $180M (Swiggy-led)
          detail: >-
            Swiggy leads $180M Series D at ~$800M valuation; TVS Motor, WestBridge, Nexus, Shell co-invest; near-unicorn
            status
          tone: positive
        - label: '2023'
          value: Zero-commission SaaS pivot
          detail: >-
            Rapido transitions from per-ride commission to daily captain subscription fee (Rs 19–29/day); Pavan
            Guntupalli leads platform transformation
          tone: positive
        - label: 2024-03
