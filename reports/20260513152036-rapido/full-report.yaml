      - number: '6.4'
        title: Customer Retention and Satisfaction Signals
        blocks:
          - type: paragraph
            body: |
              Rapido's satisfaction profile reveals a persistent bifurcation between its app-store
              ratings and independent consumer review platforms—a pattern common in high-volume
              consumer apps where users who complete transactions tend to leave positive reviews,
              while dissatisfied users are disproportionately represented on specialist complaint
              platforms.

              On the Google Play Store, Rapido holds a 4.77/5 rating from over 4.1 million reviews
              as of May 2026, placing it among the highest-rated ride-hailing apps globally. The iOS
              App Store rating is 4.9/5 per AppBrain's aggregation. These figures represent an
              enormous cross-section of users and provide meaningful positive signal about the core
              booking and riding experience. However, all-time averages can mask recency trends, and
              no breakdown by issue category or recency is publicly available.

              Against this, MouthShut.com—India's largest consumer review aggregator for services—
              shows Rapido at approximately 1.6/5 from hundreds of reviews, dominated by complaints
              about overcharging, driver misconduct, poor customer support responsiveness, payment and
              wallet issues, and app technical failures. ConsumerComplaints.in documents specific
              pricing anomalies: a user was charged ₹191 for a 3.26 km ride where the original fare
              estimate for an 8.56 km journey was ₹185, and Rapido's support declined a refund
              request. PissedConsumer and Voxya add to the adverse corpus. A secondary analysis of
              consumer forum data suggests approximately 60% of registered complaints are marked as
              resolved, but Rapido does not publish an official SLA, complaint resolution methodology,
              or aggregate complaint rate.

              Rapido's removal of in-app wallet support for auto rides in 2024—forcing a shift to
              UPI or cash—drew significant criticism from users who had pre-loaded wallet balances
              and faced access difficulties. This product decision is documented in ConsumerComplaints.in
              and PissedConsumer records and represents a reversible but real friction for existing
              customers.

              The most consequential retention risk is supply-side disruption. The February 7, 2026
              nationwide "All India Breakdown" strike—coordinated by the Telangana Gig and Platform
              Workers' Union (TGPWU) and spanning Rapido, Ola, and Uber captains across Delhi,
              Mumbai, Bengaluru, Hyderabad, and other major cities—resulted in a six-hour service
              outage. Captain demands centered on government-notified minimum fares and a ban on
              private non-commercial vehicles operating as de facto taxis. An April 2026 protest by
              Rapido captains in at least one city over falling earnings, with warnings of an
              indefinite service suspension, signals that labor-supply tensions have not been resolved.
              These disruptions directly affect customer experience and create switching opportunities
              for Uber and Ola; the churn impact cannot be quantified from available data.

              Critically, Rapido does not publicly disclose any NPS, CSAT, cohort retention, repeat-
              booking rate, or gross/net revenue retention figures. No audited customer satisfaction
              survey has been published. This is a material diligence gap: without these metrics,
              the durability of Rapido's MAU lead cannot be assessed against competitor counter-
              investments in pricing or driver supply.
