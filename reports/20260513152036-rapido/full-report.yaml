      - number: '7.7'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Karnataka Win Is Fragile: Permit Formalisation and Political Reversal Risk Persist'
            body: >-
              Although the Karnataka HC January 2026 ruling restored bike-taxi operations, the ruling requires permit
              and compliance conditions to be formalised by the state transport department — a process that could be
              delayed or shaped adversely by political pressure from traditional taxi unions. The Congress-governed
              Karnataka administration that imposed the original ban remains in office; the risk of administrative order
              reimposing restrictions is non-trivial and is the primary regulatory monitoring priority for Rapido
              investors.
            calloutType: risk
            claimRefs:
              - CR001
              - CR007
              - CR008
          - type: callout
            title: Delhi NCR Exclusion Creates Structural TAM Ceiling
            body: >-
              Delhi NCR is India's largest metropolitan population cluster by headcount. With bike-taxi operations
              banned and no regulatory pathway to legalisation visible as of May 2026, Rapido is structurally excluded
              from its biggest potential market. Every year of exclusion widens the competitive gap with any future
              entrant that secures Delhi legalisation first. The Delhi ban, absent reversal, should be modelled as a
              permanent TAM reduction of 15–20% in urban ride-hailing addressable market.
            calloutType: risk
            claimRefs:
              - CR004
              - CR026
          - type: callout
            title: 'Platform Workers Bill: Low Probability, Very High Impact if Enacted'
            body: >-
              The draft Platform Workers (Registration and Social Security) Bill proposes a 1–2% of turnover
              contribution per gig worker. At Rapido's FY2025 operating revenue of Rs 934 crore, a 2% levy would add
              approximately Rs 18–19 crore per year in social security costs before any reclassification of captains as
              employees. Rapido's subscription model provides structural but incomplete insulation: captains paying
              fixed daily fees are not on Rapido's payroll, but platform contribution obligations under the Bill may
              still apply based on facilitated transactions.
            calloutType: risk
            claimRefs:
              - CR009
              - CR022
              - CR038
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context and Methodology
        blocks:
          - type: paragraph
            body: |
              Rapido has two publicly observable valuation anchors as of May 2026. The first is the
              September 2024 Series E post-money mark of $1.1 billion, established when WestBridge Capital
              led a $200M financing round with participation from Nexus Venture Partners, Think Investments,
              and Invus Opportunities. At this price, total disclosed cumulative funding reached approximately
              $500M. The $1.1B mark implied a 14.3x multiple on FY2024 revenue of Rs 648 crore (~$77M) and
              a 9.8x multiple on FY2025 revenue of Rs 934 crore (~$111M).

              The second and more current anchor is the September 2025 secondary transaction in which
              Swiggy sold its full 12% stake in Rapido to Prosus (~10%) and WestBridge Capital (~2%) for
              approximately Rs 2,400 crore (~$272M), implying a Rapido valuation of approximately $2.3
              billion. Swiggy recorded a 2.5x return on its Rs 950 crore cost basis over three years. Prosus
              is further expected to lead a fresh primary round of approximately $350M at a valuation
              reportedly in the $2.7-3B range, which would make Prosus the second-largest shareholder after
              WestBridge.

              Given the absence of public EBITDA-positive operations, a discounted cash flow approach is
              not applicable; the primary methodology is the revenue multiple approach anchored by listed
              comparables (Grab, GoTo) and private peer transactions. Rapido's $2.3B secondary valuation
              implies approximately 20.5x FY2025 revenue, at the high end of the 6-10x range observable
              for listed Southeast Asian ride-hailing operators, reflecting a significant growth and
              market-leadership premium. The valuation thesis rests on continued 40%+ revenue growth,
              IPO optionality by 2027-2028, and EBITDA breakeven in FY2026 as management has guided.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
      - number: '8.2'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: |
              India's ride-hailing market lacks a precise public-market equivalent for Rapido's bike-taxi-
              focused model. The closest listed peers are Southeast Asian super-apps that share platform
              structure and emerging-market dynamics. Grab Holdings (Nasdaq: GRAB), a Southeast Asian
              ride-hailing and delivery platform, generated approximately $2.4B in FY2025 revenue and
              maintains a market capitalisation of approximately $15B, implying a 6-7x forward revenue
              multiple as the primary listed benchmark. GoTo Group (Jakarta: GOTO), the Indonesian ride-
              hailing and e-commerce conglomerate, trades at approximately 2-3x forward revenue, depressed
              by ongoing losses and a complex structure. Uber Technologies (Nasdaq: UBER, ~$150B market
              cap) cannot be used for India-specific multiples; its India operations are subsumed within
              the global entity.

              On the Indian private side, Ola Cabs India (ANI Technologies) provides the most direct
              comparable. Vanguard marked Ola's valuation down to approximately $1.25B as of May 2025,
              an 83% decline from its 2021 peak of $7.3B, reflecting FY2025 revenue that plunged 42% to
              Rs 1,171 crore and net losses that ballooned to Rs 662 crore. By contrast, Rapido's FY2025
              revenue grew 44% to Rs 934 crore with net losses narrowing to Rs 258 crore. This divergence
              is the clearest evidence that Rapido has structurally displaced Ola as India's dominant
              ride-hailing platform by volume. Uber India invested Rs 3,000 crore to compete against
              Rapido in FY2025. InDrive carries an estimated global valuation of approximately $1.2-1.5B
              with a bid-based model that competes in India's tier-2/3 cities.

              Applying the 6-10x comparable-operator range to Rapido's FY2025 revenue of Rs 934 crore
              (~$111M) yields $667M-$1.11B, broadly consistent with the $1.1B Series E price at the
              upper end. The September 2025 secondary at $2.3B implies ~20.5x FY2025 revenue, pricing
              in an IPO premium and market-leadership premium not yet reflected in the comparable set.
            claimRefs:
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
          - type: table
            tableRef: TV004
            claimRefs:
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
          - type: figure
            figureRef: FV002
            claimRefs: []
      - number: '8.3'
        title: Scenario Analysis and Valuation Range
        blocks:
          - type: paragraph
            body: |
              Three scenarios capture the range of outcomes for Rapido from a mid-2026 perspective,
              anchored by the September 2025 secondary at $2.3B as the current observable market price.

              The bear case ($1.1B, ~20% probability) reflects a scenario in which the Delhi NCR bike-
              taxi ban becomes permanent, competitive share loss to Uber Moto and Ola Express exceeds 10
              percentage points in tier-1 cities, EBITDA breakeven is delayed to FY2028 or beyond, and
              the planned $350M Prosus primary round is not completed. This would represent a reversion
              to the September 2024 Series E price, applying a 6-10x multiple on FY2025 revenue,
              consistent with GoTo Group's compressed multiple for a loss-making platform.

              The base case ($2.5B, ~55% probability) reflects continuation of the current trajectory:
              EBITDA breakeven in FY2026 as guided, FY2026 revenue of approximately Rs 1,200-1,400 crore,
              completion of the Prosus $350M primary round, and maintained market leadership. The $2.5B
              base case is modestly above the September 2025 secondary and below the Prosus round's
              reported upper valuation range, implying a 22-24x FY2025 revenue multiple that prices in
              IPO optionality. The bull case ($3.5B, ~25% probability) envisions Delhi NCR legalisation
              in 2026-2027, 40%+ revenue growth into FY2027, successful IPO or strategic acquisition at
              a premium, and material new vertical contributions from food delivery and corporate
              transport. The probability-weighted expected value across scenarios is approximately $2.5B.
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
          - type: table
            tableRef: TV003
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.4'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: |
              The core investment thesis rests on five structural pillars. First, Rapido holds an estimated
              50%+ share of total India ride-hailing by volume as of 2025, a structural position built over
              nine years that competitors including Ola have been unable to challenge despite sustained
              capital deployment. Second, the subscription model creates predictable unit economics and
              captain loyalty that should improve margins as captain utilisation rises. Third, India's
              ride-hailing market is growing at an estimated 18-20% CAGR toward 2030, driven by
              urbanisation, smartphone penetration, and the structural advantage of two-wheelers in India's
              congested cities. Fourth, the financial trajectory is clearly positive: net losses fell from
              Rs 675 crore (FY2023) to Rs 258 crore (FY2025), EBITDA loss narrowed from Rs 409 crore to
              Rs 104 crore in a single year, and subscription revenue grew 14x in FY2025. Fifth, the
              September 2025 secondary transaction and pending Prosus primary round signal that
              sophisticated institutional investors have re-rated the business upward by more than 2x
              in twelve months.

              The anti-thesis rests on three systemic concerns. The Delhi NCR ban on bike taxis, with no
              confirmed resolution pathway as of May 2026, excludes approximately 25-30% of India's urban
              ride-hailing TAM. The current $2.3B secondary valuation implies approximately 20.5x FY2025
              revenue for a business still operating at a loss, a multiple that requires continued high
              growth and profitability delivery to be sustained. Competitive dynamics from Uber, which
              invested Rs 3,000 crore in India in FY2025, and from Ola, which still leads in four-wheeler
              revenue, create durable binary risk on market share and unit economics.
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
          - type: table
            tableRef: TV002
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV023
              - CV030
      - number: '8.5'
        title: Recommendation and Logic
        blocks:
          - type: paragraph
            body: |
              This report recommends SELECTIVE BUY at medium confidence and high risk, with a fair
              valuation stance relative to the $2.3B secondary mark. The recommendation reflects Rapido's
              market leadership position (estimated 50%+ of India ride-hailing by volume), improving
              financial trajectory (FY2025 EBITDA loss narrowed 75% YoY to Rs 104 crore), the $350M
              Prosus primary round signalling further institutional conviction, and an IPO timeline of
              end-2026 start. Investors who entered at the Series E $1.1B mark have an implied ~2x return
              on the current secondary mark. New investors at $2.3B are paying a 20.5x FY2025 revenue
              multiple, rich but supportable given 44% revenue growth and a credible path to EBITDA
              breakeven.

              The key re-rating catalysts are: (i) IPO filing commencement by end-2026 per co-founder
              Sanka's statement; (ii) FY2026 EBITDA breakeven delivery; (iii) Delhi NCR legalisation;
              (iv) Prosus $350M primary round closure at $2.7-3B validating the secondary mark.
              Downside from $2.3B is driven by: competitive market share loss, a new state ban, failure
              to achieve EBITDA breakeven by FY2027, or a deterioration in India capital markets.

              Strategic exit optionality is material. A global ride-hailing operator, logistics
              conglomerate, or Indian mobility platform could acquire Rapido at a 20-40% strategic
              premium above the standalone valuation. The IPO appears realistic in the 2027-2028 window
              if EBITDA breakeven is achieved in FY2026 and India capital markets remain constructive.
            claimRefs:
              - CV030
              - CV031
              - CV032
              - CV033
              - CV034
          - type: table
            tableRef: TV001
            claimRefs:
              - CV001
              - CV030
              - CV034
          - type: figure
            figureRef: FV001
            claimRefs:
              - CV001
              - CV005
              - CV023
              - CV030
      - number: '8.6'
        title: Thesis-Break Triggers and Diligence Asks
        blocks:
          - type: paragraph
            body: |
              Several events would invalidate the investment thesis and require immediate exit or position
              reduction. A permanent Delhi NCR bike-taxi ban or a new ban in Maharashtra or Tamil Nadu
              would structurally reduce India's addressable bike-taxi market and drive the bear case.
              A sustained market share decline below 35% in tier-1 cities for two consecutive quarters
              would signal competitive erosion beyond the model's tolerance and compress the multiple to
              8-12x revenue. Failure to achieve EBITDA breakeven by FY2027 would indicate the subscription
              model is not generating the expected unit economics improvement. If the planned Prosus $350M
              primary round closes at a valuation materially below $2.3B, that would signal a down-round
              and require complete thesis reassessment.

              Key outstanding diligence items include: (1) Confirmation of FY2026 EBITDA guidance with
              supporting financial detail or monthly burn data; (2) Delhi NCR regulatory strategy and
              legal timeline; (3) Full cap table disclosure including liquidation preference waterfall and
              anti-dilution provisions for WestBridge and Prosus; (4) Captain unit economics, CAC, LTV,
              and daily active captain churn; (5) Prosus primary round terms, valuation, and closing
              conditions. Resolving items 1 and 3 would be sufficient to upgrade confidence from medium
              to high.
            claimRefs:
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
          - type: table
            tableRef: TV005
            claimRefs:
              - CV035
              - CV036
              - CV037
              - CV038
          - type: table
            tableRef: TV006
            claimRefs:
              - CV039
              - CV040
      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Delhi NCR Ban Is the Primary Binary Risk
            body: >-
              Delhi NCR bike-taxi ban, with no published resolution timeline as of May 2026, represents the single
              largest binary risk to the Rapido investment thesis. Delhi NCR constitutes approximately 25-30% of India's
              urban ride-hailing TAM. A permanent ban would undercut the base case valuation, make FY2026 EBITDA
              breakeven materially harder to achieve, and delay the IPO timeline. Investors must treat this as a live
              binary risk, not a temporary operational headwind.
            calloutType: risk
            claimRefs:
              - CV036
              - CV022
          - type: callout
            title: September 2025 Secondary at $2.3B Is the Most Credible Valuation Signal
            body: >-
              Swiggy's exit at Rs 2,400 crore for a 12% stake, a 2.5x return on cost in three years, and Prosus's
              acquisition of that stake signal that two sophisticated institutional investors with deep India context
              have independently confirmed the $2.3B mark. This is a stronger valuation signal than a single
              lead-investor-priced primary round, because it reflects an arm's-length transaction between two
              institutional counterparties. The pending Prosus $350M primary at reportedly $2.7-3B further reinforces
              upward momentum.
            calloutType: insight
            claimRefs:
              - CV004
              - CV005
          - type: callout
            title: 20.5x FY2025 Revenue Multiple Requires Sustained Execution
            body: >-
              The September 2025 secondary values Rapido at approximately 20.5x FY2025 revenue for a company that has
              never been EBITDA-positive. Sustaining this multiple requires: (i) FY2026 EBITDA breakeven as guided, (ii)
              continued 30%+ revenue growth, and (iii) a constructive Indian capital market for a 2027-2028 IPO. Any
              miss on these three conditions, particularly the EBITDA target, would compress the multiple toward the
              8-12x range observable for comparable loss-making platforms, implying significant downside from the
              current price.
            calloutType: risk
            claimRefs:
              - CV019
              - CV039
