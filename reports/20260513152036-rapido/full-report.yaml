      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Google Cloud-Native Architecture Enables Rapid Product Velocity
            body: >
              Rapido's adoption of GKE, Firebase, and BigQuery from an early stage has enabled a release cadence of
              10–15 minor deployments per day—unusually high for a platform of this scale—and city launches without
              direct engineering involvement. The Cloud Vision AI-powered captain KYC pipeline reduces onboarding to
              hours. These capabilities have materially reduced marginal cost of expansion and are corroborated by a
              Google Cloud customer case study and CTO-level interview with Analytics India Magazine.
            calloutType: strength
            claimRefs:
              - CE020
              - CE023
              - CE026
              - CE017
          - type: callout
            title: Single-Cloud Concentration and Stale Architecture Disclosure
            body: >
              Rapido's entire real-time ride-matching, live tracking, and captain verification infrastructure runs on
              Google Cloud with no disclosed multi-cloud fallback. A GKE or Firebase outage would halt platform-wide
              operations. Additionally, the only detailed public architecture reference (Google Cloud case study) was
              published in 2019 when Rapido had 1.5M captains; the actual current-state architecture at 6× that scale is
              not independently verified. Diligence should request current architecture documentation and business
              continuity / disaster recovery plans from the company.
            calloutType: risk
            claimRefs:
              - CE020
              - CE041
              - CE043
          - type: callout
            title: Driver Behavior and Payment Friction Create Trust and Retention Risk
            body: >
              After removing in-app wallet payments for autos in 2024, user reviews and Moneycontrol reporting document
              a recurring pattern of captains requesting informal premiums over the app-displayed fare, cancellations
              after accepting rides, and slow customer service responses. These friction points erode the platform's
              consumer trust proposition and create conditions for churn to zero-commission alternatives such as Namma
              Yatri.
            calloutType: risk
            claimRefs:
              - CE039
              - CE042
          - type: callout
            title: ONDC Metro Integration Is a Durable Moat-Building Move
            body: >
              Rapido's ONDC-enabled metro ticketing across Delhi, Mumbai, Hyderabad, Chennai, and Kochi metro systems
              creates a daily-frequency touchpoint absent from pure ride-hailing competitors. The DMRC MD's statement
              that this is the "first globally integrated metro+last-mile single-app" positions Rapido ahead of Ola and
              Uber on multi-modal integration. With 500,000 metro-adjacent rides per day and 40% of Delhi riders being
              women seeking safe last-mile transit, the integration addresses both engagement and safety dimensions
              simultaneously.
            calloutType: insight
            claimRefs:
