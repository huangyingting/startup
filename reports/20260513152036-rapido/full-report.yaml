          - type: callout
            title: Gig Worker Supply Expansion as Supply-Side Moat Catalyst
            body: >
              India's gig workforce expansion—from 7.7 million in FY2021 to 23.5 million projected by 2029-30—is both a
              market-sizing signal and a supply-side input for Rapido's platform. A larger pool of gig-economy workers
              seeking flexible income reduces driver acquisition costs, expands geographic coverage potential, and
              supports higher service density. However, 40% of gig workers earn below Rs 15,000/month, creating latent
              pressure for regulatory income floors that could increase platform cost structures in coming years.
            calloutType: insight
