      - number: '4.5'
        title: Investor Cap Table and Secondary Transactions
        blocks:
          - type: paragraph
            body: |
              Rapido's cap table has materially changed since the Series D (2022) through a series of
              strategic exits and new-investor entries. WestBridge Capital held approximately 32.88%
              as of August 2024 (per Entrackr's review of internal documents), making it the largest
              external stakeholder. Nexus Venture Partners held approximately 8.19% and Swiggy held
              approximately 12.32% at the same date.

              Swiggy completed a full exit from Rapido in September 2025, selling its entire ~12%
              stake to Prosus (MIH Investments One B.V., Rs 1,968 crore) and WestBridge Capital
              (Setu AIF Trust, Rs 431.5 crore), totalling Rs 2,400 crore (~$270M). This transaction
              valued Rapido at approximately $2.5–2.7 billion—a ~2.3–2.5× uplift from the $1.1B
              Series E valuation—and delivered Swiggy approximately 2.5× return on its $180M
              Series D investment over approximately three years. The exit was driven by strategic
              conflict of interest: Rapido had launched food delivery platform "Ownly" in mid-2025,
              directly competing with Swiggy's core business.

              TVS Motor Company also fully exited in November 2025, selling its stake for Rs 287.93
              crore to Accel India VIII (Mauritius) Ltd and MIH Investments One B.V. (Prosus). TVS
              cited "monetisation of investment" and strategic portfolio rebalancing as reasons.
              These exits concentrated ownership further among WestBridge, Prosus, and Nexus, which
              now form the core institutional shareholder base.

              The implied $2.5–2.7B valuation from the Swiggy exit is not independently confirmed by
              a primary-round term sheet or audited valuation report; it is inferred from the secondary
              transaction price. Tracxn records a $2.3B post-money valuation as of September 2025,
              corroborating the directional uplift. No prospectus, DRHP, or SEBI filing is publicly
              available as of May 2026, consistent with the company's pre-IPO status. The exact
              post-exit cap table percentages are not publicly disclosed.
            claimRefs:
              - CI029
              - CI030
              - CI031
              - CI032
              - CI033
      - number: '4.6'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: |
              Rapido's financial trajectory is genuinely compelling: a 4.4× revenue expansion over
              three years (FY22–FY25), paired with a 90%+ reduction in EBITDA losses from peak FY23
              levels, suggests the company has found a model that scales. The subscription pivot for
              autos and cabs was the decisive intervention—generating Rs 275 crore in FY25 versus
              Rs 19 crore in FY24 while simultaneously reducing the friction that high commissions
              created with captains. The EBITDA margin trajectory (–152% in FY23 → –52.5% in FY24
              → ~–11% in FY25) supports management's claim that EBITDA breakeven in FY26 is plausible.

              Nevertheless, several structural risks temper the outlook. First, unit economics remain
              negative at the consolidated level: the company still spends Rs 1.35 for every rupee
              earned, a ratio that must converge to 1.0 before net profitability can be targeted.
              Second, the revenue mix shift is double-edged: subscription income grew 14× but was
              partly driven by geographic expansion across auto/cab, meaning future growth requires
              either further geographic rollout or deepening urban utilisation—both capital-intensive.
              Third, platform commission revenue fell 23.5% in FY25, reflecting real regulatory risk:
              Karnataka's bike-taxi ban disrupted Rapido's highest-volume segment. While the January
              2026 HC ruling provides relief, state-level regulatory uncertainty remains a persistent
              top-line risk. Fourth, the new food delivery vertical (Ownly) has triggered the Swiggy
              exit and adds cost and execution risk without yet contributing material revenue to the
              FY25 filing.

              Key diligence blockers: (1) No segment-level gross margin disclosure—impossible to
              assess which verticals subsidise losses. (2) No public confirmation of cash balance or
              burn rate post-Series E injections. (3) No debt/credit facility disclosure—a gap that
              becomes material if Rapido pursues asset-heavy quick-commerce infrastructure.
              (4) FY26 financials not yet filed; management targets are company-stated, not
              independently verified. (5) The $2.5–2.7B implied valuation from the Swiggy
              secondary exit reflects a single arm's-length transaction, not an audited DRHP
              valuation; a primary-round re-pricing would be the true test of enterprise value.
