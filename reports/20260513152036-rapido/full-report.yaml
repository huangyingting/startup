      - number: '1.4'
        title: Operational Scale and Key Metrics
        blocks:
          - type: paragraph
            body: |
              Rapido's FY2024 (April 2023–March 2024) operating revenue was Rs 648 crore, a 46.3% YoY
              increase from Rs 443 crore in FY2023. Including allied services and non-operating income, total
              revenue reached approximately Rs 695 crore. The delivery (bike logistics) segment contributed
              Rs 265 crore, and subscription revenue (captain platform fees) grew 171.4% to Rs 19 crore,
              reflecting rapid captain base expansion under the SaaS model. Incentive costs—the largest
              expense line—fell 11% to Rs 460 crore. Net losses improved dramatically to Rs 371 crore from
              Rs 675 crore in FY2023, a 45% reduction, indicating significant operating leverage.

              Gross Order Value nearly doubled from Rs 2,419 crore (FY2023) to Rs 4,257 crore (FY2024). In
              Q2 FY2025 (July–September 2024), momentum accelerated: 207 million rides were processed, with
              GOV growing 2.5x year-on-year, and losses fell 77% versus the prior-year quarter. Rapido
              publicly claimed that ride-hailing operations entered profitability in H2 FY2025, marking the
              end of what management described as a "cash burn phase." These operational profitability claims
              have not yet been independently corroborated by audited FY2025 annual results, which are not
              yet publicly available as of the runDate.

              On supply-side scale, Rapido had over 2 million active captains as of 2024, serving
              approximately 17 million monthly passengers. The company targets 5 million (50 lakh) active
              captains by FY2027 under its SaaS model. These growth targets reflect the company's ambition
              to deepen supply density in existing markets rather than expanding the city count beyond the
              current 100+.
