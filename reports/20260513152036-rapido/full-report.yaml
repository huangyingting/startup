      - number: '2.8'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural Two-Wheeler Advantage in India's Congestion Context
            body: >
              India's uniquely congested urban environment creates a structural advantage for two-wheeler ride-hailing
              that does not exist in most other markets. Two-wheelers are 30–40% faster than cars in peak-hour urban
              corridors, and bike taxis are priced 30–50% below equivalent car rides. Combined with India's
              price-sensitive commuter base and the fact that two-wheelers account for the largest share of India's 300+
              million private vehicle fleet, the total addressable user pool for Rapido's core product is substantially
              larger than that available to cab-hailing platforms in comparable markets.
            calloutType: strength
            claimRefs:
              - CM037
              - CM038
              - CM031
              - CM032
          - type: callout
            title: State Regulatory Fragmentation as Structural Market Ceiling
            body: >
              The absence of uniform state-level implementation of MVAG 2025 creates a hard operational ceiling in
              states with bans or moratoriums. Karnataka's pending Supreme Court appeal is the highest-stakes instance:
              if the court reinstates the ban, Rapido's Bengaluru operations would be materially disrupted. The wider
              pattern—Maharashtra still in draft-rules phase, multiple states in grey zones—means that a meaningful
              share of the potential SAM is not currently addressable. Platforms must factor state-by-state regulatory
              risk into city-launch timelines and capital allocation decisions.
            calloutType: risk
