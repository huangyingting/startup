      - number: '3.5'
        title: Switching Costs, Lock-in, and Multi-Homing
        blocks:
          - type: paragraph
            body: |
              Rider multi-homing is extremely prevalent in Indian ride-hailing. Most urban commuters have
              at least two to three apps installed and select the lowest-priced or fastest-available option
              at booking time. There is no meaningful data lock-in, loyalty program, or switching cost for
              riders beyond app familiarity. Ride-hailing is a near-perfect commodity from the demand side
              in India: fare is the primary selection criterion for ~60–70% of users, followed by wait time
              and availability. This structural reality limits any platform's pricing power and makes rider
              loyalty fragile.

              Captain supply-side lock-in is marginally stronger due to the daily subscription model—captains
              who pay the fee are incentivized to complete rides on the same platform that day to recoup the
              sunk cost. However, captains also multi-home across platforms: surveys and driver interviews
              suggest that many captains toggle between Rapido, Ola, and Uber based on where incentives and
              demand are highest. Rapido's subscription fee is low enough (~₹19–29/day) that switching
              friction is minimal.

              Data network effects are limited: Rapido's route optimization and demand prediction improve
              with more users, but these benefits are difficult to observe from the rider's perspective.
              Geographic density is a stronger form of lock-in—in cities where Rapido's captain density is
              highest, wait times are shortest, creating a virtuous cycle. Rapido has been building this
              density advantage in tier-2/3 cities where Uber/Ola are thinner. Distribution power (captain
              supply depth) is the most durable competitive moat, but it is threatened by Namma Yatri's
              zero-commission model, which offers captains even more favorable economics.
            claimRefs:
              - CP029
              - CP030
              - CP031
              - CP032
      - number: '3.6'
        title: Moat Durability and Competitive Risk Assessment
        blocks:
          - type: paragraph
            body: |
              Rapido's competitive moat rests on three pillars: (1) dominant bike-taxi supply density in
              100+ cities, (2) brand recognition among cost-conscious two-wheeler commuters, and (3) the
              first-mover SaaS subscription model for captains. Each pillar faces specific threats.

              Supply density is threatened by Namma Yatri's government-backed zero-commission model, which
              offers captains superior economics and regulatory legitimacy. As Namma Yatri expands to 5–6
              cities per quarter, it can erode Rapido's captain supply in those markets without a direct
              fare war. The brand moat among budget commuters is durable in the near term but depends on
              price parity or advantage: Rapido's bike rides are 40–60% cheaper than comparable four-wheeler
              options, but InDrive's fare-negotiation model can undercut Rapido's pricing in cities where
              InDrive operates.

              The SaaS model differentiation has been partially commoditized: both Uber and Ola have
              implemented subscription-like driver pricing in select markets. The model is no longer a
              unique Rapido advantage; it has become a table-stakes expectation. Rapido's expansion into
              four-wheeler cabs—where Ola and Uber have 10+ year head starts, superior vehicle quality
              perception, and corporate travel relationships—exposes it to a segment where its existing
              differentiation does not transfer directly.

              Regulatory fragmentation remains an adverse structural risk: the Maharashtra crackdown in
              May 2026, revoking provisional bike-taxi licenses and demanding EV fleets and commercial
              registrations, illustrates that state-level enforcement can materially disrupt operations
              regardless of central MVAG 2025 legalization. Rapido was cited by Maharashtra authorities
              for the highest number of violations among aggregators—a specific compliance-execution risk
              not shared equally by Ola or Uber. Commoditization risk is high: absent continued innovation
              in captain supply, EV fleet incentives, and adjacent services (food delivery via "Ownly"),
              Rapido risks being repriced as a generic mobility commodity within 3–5 years.
            claimRefs:
