      - number: '7.6'
        title: People, Execution, and Macro Risk
        blocks:
          - type: paragraph
            body: >
              Rapido's three-founder team — Aravind Sanka (CEO), Rishikesh SR (COO), and Pavan Guntupalli (CTO) — has
              guided the company from seed stage to unicorn status, but the absence of a deep senior bench creates
              key-person risk during a critical execution window. The company has not publicly disclosed succession
              planning arrangements or a deputy CEO/COO structure. Scaling from 100+ cities to broader national coverage
              requires simultaneous excellence in product, operations, captain supply, regulatory affairs, and
              enterprise SaaS sales — execution complexity that increases non-linearly with geographic scope.

              Beyond company-specific risks, Rapido faces several macro and external risks. India's evolving gig worker
              regulation — the draft Platform Workers (Registration and Social Security) Bill — proposes mandatory
              registration of gig workers, social security contributions from platforms (estimated at 1–2% of revenue
              per worker), and minimum earnings guarantees. If enacted in a form close to the draft, the legislation
              would materially increase Rapido's per-captain cost structure. FX risk is relevant for international
              investors holding USD or EUR positions in Rapido: the Indian rupee has depreciated against the US dollar
              over the long term, and a sustained INR depreciation of 5–10% would reduce USD-equivalent returns by the
              same magnitude. Fuel price volatility affects captain supply economics: during periods of elevated crude
              prices, captains' operating costs rise without a corresponding increase in Rapido's fixed subscription
              revenue, creating incentive misalignment that could trigger supply-side churn. The people and execution
              risk register and the thesis monitoring table below summarise key monitoring thresholds.
