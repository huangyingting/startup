      - CE029
    data:
      nodes:
        - id: open-app
          label: Rider Opens Rapido App
          type: start
          detail: Android or iOS; login via mobile OTP on first use
        - id: set-destination
          label: Enters Origin & Destination
          type: step
          detail: Favourites list or manual entry; Bike/Auto/Cab mode selected
        - id: price-display
          label: Fare Estimate Displayed
          type: step
          detail: Dynamic pricing engine computes fare; surge indicator if demand high
        - id: matching
          label: Ride-Matching Engine Assigns Captain
          type: step
          detail: ML model selects nearest available captain; captain receives ride request
        - id: captain-accept
          label: Captain Accepts; PIN Shown to Rider
          type: step
          detail: PIN-based verification replaces OTP at pickup
        - id: live-tracking
          label: Ride in Progress — Live Tracking Active
          type: step
          detail: Real-time lat/long via Firebase; share-location link available; SOS accessible
        - id: route-check
          label: Route-Deviation Monitor (Always On)
          type: gate
          detail: Alert if captain deviates from planned route or makes unexpected halt
        - id: payment
          label: Payment at Drop-Off (UPI / Cash)
          type: end
          detail: Direct to captain for auto/cab; in-app for bike taxi commission portion
      edges:
        - from: open-app
          to: set-destination
        - from: set-destination
          to: price-display
        - from: price-display
          to: matching
        - from: matching
          to: captain-accept
        - from: captain-accept
          to: live-tracking
        - from: live-tracking
          to: route-check
        - from: route-check
          to: payment
  - id: FE003
    title: Rapido Product Feature Timeline
    type: timeline
    layout: standard
    summary: Chronological milestones in Rapido's product and technology evolution from 2015 founding through May 2026.
    approximationNotes: >-
      Dates sourced from official announcements, Google Cloud case study, YourStory, Fortune India, Economic Times, and
      reMumbai. Some dates approximate quarter of launch.
    claimRefs:
      - CE001
      - CE023
      - CE034
      - CE035
      - CE036
      - CE040
    data:
      items:
        - label: Rapido Bike Taxi App Launched
          date: '2015-01-01'
          detail: GPS tracking, driver verification, cashless payments from launch; Bengaluru first market
        - label: Google Cloud Partnership — GKE & Firebase Adoption
          date: '2019-06-01'
          detail: Migrated to Google Kubernetes Engine; Firebase for real-time ride tracking; Cloud Vision AI for captain KYC
        - label: Auto & Cab Services Added; SaaS Model Transition
          date: '2023-12-01'
          detail: Rapido Auto (SaaS ₹5/day) and Rapido Cab launched; bike taxi remains commission-based
        - label: Delhi Metro + ONDC Last-Mile Integration
          date: '2025-06-01'
          detail: >-
            ₹25 flat bike fare to/from DMRC stations; in-app metro ticket booking via ONDC; first globally integrated
            metro+last-mile app per DMRC MD
        - label: Integrated Travel Booking (Goibibo/redBus/ConfirmTkt)
          date: '2025-10-16'
          detail: Flights, hotels, trains, buses bookable in-app; targets India's ₹5.8T travel market
        - label: Mumbai Metro ONDC Integration Live
          date: '2026-04-24'
          detail: QR-based metro tickets for Lines 2A, 2B, 7, 9; free first ride offer for adoption
        - label: IndoFast Energy EV Auto Partnership Announced
          date: '2025-01-01'
          detail: 10,000 Piaggio E-City Max battery-swap autos over 24 months; Hyderabad + Bengaluru first
        - label: 210M+ Downloads; 74M MAU (Feb 2026)
          date: '2026-05-01'
          detail: Platform milestone disclosed in company statements and app store analytics as of mid-2026
