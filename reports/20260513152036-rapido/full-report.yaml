  - id: FV001
    type: flow
    layout: wide
    title: Recommendation Logic - Rapido Investment Decision Chain
    summary: >-
      Flow diagram tracing the evidence chain from India ride-hailing market growth through Rapido's competitive
      position, financial trajectory, valuation anchors, and the SELECTIVE BUY recommendation at medium confidence and
      high risk.
    approximationNotes: >-
      All probability and valuation estimates are analyst-derived. Market share estimates from third-party sources
      (Entrackr, sector reports) are directional indicators only.
    data:
      nodes:
        - id: n1
          label: 'India ride-hailing market: 18-20% CAGR to 2030; $2-2.5B in 2025'
        - id: n2
          label: 'Rapido #1 overall: ~50% of total rides; 50% bike/auto, 20%+ cab'
        - id: n3
          label: FY2025 revenue Rs 934 crore (+44%); EBITDA loss narrowed 75% to Rs 104 crore
        - id: n4
          label: 'Net loss trajectory: Rs 675Cr (FY23) to Rs 371Cr (FY24) to Rs 258Cr (FY25)'
        - id: n5
          label: 'Sept 2025 secondary: Swiggy stake sold at $2.3B implied valuation (2.5x in 3 yrs)'
        - id: n6
          label: Prosus $350M primary planned; IPO preparations by end-2026 per co-founder
        - id: n7
          label: 'KEY RISK: Delhi NCR ban ongoing; ~25-30% TAM excluded'
        - id: n8
          label: 'KEY RISK: Uber invested Rs 3,000 crore in India FY2025; deep capital competition'
        - id: n9
          label: 'Valuation: $1.1B Series E (Sep-24) to $2.3B secondary (Sep-25); 20.5x FY25 revenue'
        - id: n10
          label: 'RECOMMENDATION: SELECTIVE BUY | Confidence: Medium | Risk: High | Base: $2.5B'
      edges:
        - from: n1
          to: n2
        - from: n2
          to: n9
        - from: n3
          to: n4
        - from: n4
          to: n9
        - from: n5
          to: n9
        - from: n6
          to: n10
        - from: n7
          to: n10
          label: bear-case risk
        - from: n8
          to: n10
          label: competition risk
        - from: n9
          to: n10
    claimRefs:
      - CV001
      - CV005
      - CV023
      - CV030
  - id: FV002
    type: bar
    layout: standard
    title: Valuation Sensitivity - Revenue Multiple Scenarios (USD millions)
    summary: >-
      Bar chart illustrating implied Rapido valuations under different revenue multiples applied to FY2025 revenue of Rs
      934 crore (~$111M), spanning listed-comp bear (6x) through the September 2025 secondary mark (20.5x) and bull case
      (31.5x) scenarios.
    approximationNotes: >-
      Revenue converted at USD/INR 84. All multiples are analyst estimates; actual outcomes depend on financial
      performance, regulatory developments, and market conditions not confirmed as of May 2026.
    data:
      items:
        - label: GoTo comparable floor (6x FY25 revenue)
          value: 667
          unit: USD millions
          detail: 6x FY2025 revenue ($111M) = $667M; GoTo-comparable depressed multiple; bear scenario floor
          claimRefs:
            - CV016
        - label: Series E mark (9.8x FY25 revenue)
          value: 1087
          unit: USD millions
          detail: $1.1B September 2024 Series E = 9.8x FY2025 revenue; historical entry mark for WestBridge
          claimRefs:
            - CV001
        - label: Grab comparable midpoint (12x FY25)
          value: 1332
          unit: USD millions
          detail: 12x FY2025 revenue; midpoint of Grab/listed-comp range with growth premium; base comp floor
          claimRefs:
            - CV008
        - label: September 2025 secondary (20.5x FY25)
          value: 2277
          unit: USD millions
          detail: $2.3B September 2025 secondary = 20.5x FY2025 revenue; current observable market price
          claimRefs:
            - CV005
        - label: Base case (22.5x FY25 revenue)
          value: 2498
          unit: USD millions
          detail: 22.5x FY2025 revenue; requires EBITDA breakeven FY2026 plus Prosus round plus IPO trajectory
          claimRefs:
            - CV017
        - label: Bull case (31.5x FY25 revenue)
          value: 3497
          unit: USD millions
          detail: 31.5x FY2025 revenue; IPO-ready profile plus Delhi NCR plus new verticals at scale; bull ceiling
          claimRefs:
            - CV018
  - id: FV003
    type: range
    layout: standard
    title: Valuation / Return Range - Rapido Scenario Outcomes (USD millions)
    summary: >-
      Bear, base, and bull valuation ranges for Rapido with strategic acquisition overlay, illustrating the
      probability-weighted return profile from the September 2025 secondary price of approximately $2.3B.
    approximationNotes: >-
      All ranges are analyst estimates anchored by the September 2025 secondary. Acquisition premium ranges assume
      20-40% strategic premium above standalone value. Probability assignments are directional and not actuarial.
    data:
      items:
        - label: Bear Case (~20% probability)
          low: 900
          high: 1300
          unit: USD millions
          detail: Delhi NCR permanent; market share loss; EBITDA delayed; Prosus round fails; ~20% probability
        - label: Base Case (~55% probability)
          low: 2300
          high: 2800
          unit: USD millions
          detail: EBITDA breakeven FY2026; Prosus $350M closes; IPO filing end-2026; share stable; ~55% probability
        - label: Bull Case (~25% probability)
          low: 3000
          high: 4000
          unit: USD millions
          detail: Delhi NCR opens 2026; 40%+ growth into FY2027; IPO or strategic M&A at premium; ~25% probability
        - label: Strategic Acquisition Premium (Base)
          low: 2700
          high: 3400
          unit: USD millions
          detail: 20-40% M&A premium above base case standalone; logistics acquirer or global ride-hailing platform
        - label: Probability-Weighted EV
          low: 2200
          high: 2800
          unit: USD millions
          detail: Weighted 20/55/25 across bear/base/bull; consistent with $2.3B secondary; limited upside from here
