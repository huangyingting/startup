      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Rapido has raised approximately $500M+ across 13+ funding rounds since 2015, culminating in its
              unicorn milestone with the September 2024 Series E. The most significant recent event was the
              $200M Series E led by WestBridge Capital—a returning investor—at a $1.1 billion post-money
              valuation, making Rapido the 108th Indian unicorn. Co-investors in the Series E included Nexus
              Venture Partners, Swiggy (strategic investor since Series D), Think Investments, and Invus
              Opportunities. The round was partly earmarked for expansion of Rapido's four-wheeler (cab)
              category, positioning it directly against Ola and Uber.

              The prior landmark was the April 2022 Series D ($180M) led by Swiggy, with Swiggy contributing
              approximately $124–125M—a notable case of a food-delivery platform taking a strategic stake in
              a mobility peer. Other Series D participants included TVS Motor Company, WestBridge Capital,
              Nexus Venture Partners, and Shell Ventures. Post-Series D valuation was approximately
              $800–830M, putting Rapido close to but just short of unicorn status at that time.

              Earlier rounds included a Series B and Series C through 2019–2021 involving TVS Motor, Nexus
              Venture Partners, and Shell Ventures, though precise terms for pre-Series D rounds rely on
              secondary databases rather than primary company disclosures. No debt financing or credit
              facility details are publicly available. Rapido is a private company with no public filing
              obligations under Indian law.

              Investor control rights, board composition, and secondary transaction history are not publicly
              disclosed. Swiggy, which IPO'd in November 2024, holds a significant stake in Rapido that
              would be marked to market on its balance sheet; neither Swiggy nor Rapido has published
              current stake percentages. WestBridge Capital's active participation across both the Series D
              and Series E positions it as the most committed financial investor.
