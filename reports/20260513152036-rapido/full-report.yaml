      - number: '6.3'
        title: Named Customer Proof and Ecosystem Partnerships
        blocks:
          - type: paragraph
            body: |
              Rapido has transitioned from a narrow ride-hailing utility to a multi-modal super-app
              with a growing set of confirmed institutional and ecosystem partnerships. As a B2C
              platform, Rapido does not publish a client registry or disclose enterprise customer
              names in the corporate B2B category. The following named partnerships have been confirmed
              via press releases, government statements, and multiple independent media outlets.

              The DMRC partnership is Rapido's highest-visibility institutional integration. Launched
              in 2024–2025 under the ONDC protocol, it enables Delhi Metro passengers to book a
              Rapido bike or auto from within the DMRC app for first/last-mile connectivity. DMRC's
              Managing Director publicly stated that the integration is unique globally in combining
              metro ticketing and ride-hailing in a single digital session. The 100,000 metro-adjacent
              rides per day attributed to this integration represents a material demand-generation
              channel in Delhi-NCR, though the figure is from Rapido's own disclosures and has not
              been independently audited.

              KSRTC (Kerala State Road Transport Corporation), through the Rapido Shakti program
              launched in March 2026 in Thiruvananthapuram, became Rapido's first state transport
              corporation partner for a women's mobility initiative. The partnership involves KSRTC
              providing training and infrastructure support to women captains operating on the Rapido
              platform. Commercial terms and ride volumes have not been disclosed.

              Travel platform integrations announced in October 2025—with Goibibo (MakeMyTrip Group)
              for flights and cars, redBus for intercity bus tickets, and ConfirmTkt for train
              bookings—make Rapido an intermodal booking hub. These integrations are confirmed
              production-live features rather than pilots; however, transaction volumes and revenue-
              sharing terms remain undisclosed.

              The Magicpin partnership (November 2025), which provides 80,000+ restaurant listings for
              Rapido's Ownly food delivery service, is the most commercially complex named relationship.
              The partnership was confirmed by CNBC-TV18 and the Financial Express. Notably, Zomato
              holds approximately 15% equity in Magicpin, creating a potential structural conflict of
              interest with Rapido's ambition to disrupt the Zomato–Swiggy duopoly. Swiggy's exit from
              its Rapido stake in September 2025 for approximately ₹2,400 crore (≈2.5× return) preceded
              and enabled Rapido's food delivery push, eliminating a shareholder conflict. Ownly's
              commission model (8–15% vs 18–22% for incumbents) is designed to attract restaurant
              partners, but monetization at scale remains unproven as of the report date.

              The corporate B2B segment, while serving named enterprise clients across six declared
              sectors, does not publish individual client names for competitive reasons. The ₹275 crore
              FY25 revenue figure and Rapido's Corporate Partners page provide sector-level proof of
              market adoption but fall short of individual account validation.
