  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: User Scale and Growth Trajectory
        blocks:
          - type: paragraph
            body: |
              Rapido's rise to the top of the Indian ride-hailing market in terms of active users is
              among the most striking mobility growth stories in emerging-market tech since 2025.
              Third-party analytics data cited by MoneyControl and Firstpost placed Rapido's monthly
              active user count at approximately 74 million in February 2026, ahead of Uber India
              (≈39 million) and Ola (≈28 million) in the same month. This represents a 76% MAU
              increase from the 42 million recorded in February 2025, a pace that far exceeds typical
              ride-hailing growth benchmarks globally.

              Weekly active user data for the period January 19–February 22, 2026 shows Rapido at
              40.07 million WAUs versus 20.56 million for Uber and 11.63 million for Ola—a roughly
              2× lead over its nearest competitor. The significance of these figures is reinforced by
              a statement from Uber CEO Dara Khosrowshahi, who publicly identified Rapido as the
              tougher competitive threat in India relative to Ola. On the app distribution front,
              Rapido has accumulated 210+ million cumulative installs across Android and iOS, with
              AppBrain analytics estimating an ongoing run-rate of approximately 8.1 million downloads
              per month (≈270,000 per day) as of early 2026.

              The company's own disclosures, via CMV360's reporting of its Q2 FY25 (September–November
              2024) results, describe 17 million monthly active customers and 2.6 million daily rides
              across all categories. The gap between the 74 million MAU figure (third-party analytics)
              and the 17 million company-disclosed monthly active customers is meaningful and likely
              reflects differing methodology: analytics platforms typically measure any app engagement
              (including app opens, price checks, and abandoned bookings), while Rapido's internal
              definition of "active customer" likely requires a completed ride. Diligence should
              clarify which metric is used in investor materials.

              The Karnataka High Court's restoration of bike-taxi licenses in January 2026—after a
              two-year regulatory ban—is expected to have a material positive impact on Rapido's
              Bengaluru-originating ride volumes, its largest market by gross order value. Bengaluru
              was the company's inception city and remains its deepest density market for the bike-taxi
              category. The February 2026 WAU data already captures the early recovery benefit.
