      - number: '3.4'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: |
              Across the five key competitive dimensions—vehicle coverage, pricing model, driver economics,
              geographic reach, and regulatory posture—Rapido's differentiation is strongest in two-/three-
              wheeler coverage and driver economics, while it remains a challenger in four-wheeler cabs and
              safety technology. Ola leads in geographic breadth (250+ cities vs. Rapido's 100+) and multi-
              modal offerings including rentals and outstation services. Uber leads in four-wheeler premium
              UX, customer support quality, and global brand trust. InDrive leads on fare transparency and
              driver take-home percentage.

              In the app experience dimension, all three major platforms (Rapido, Ola, Uber) have received
              4.4–4.7 Play Store ratings in 2025, with Rapido and Ola rated slightly higher. Rapido has
              surpassed Ola and Uber in Android monthly active users as of mid-2025—a key metric in India's
              Android-dominant market. Rapido's SaaS subscription model (captains pay ₹19–29/day, retain
              100% of fare) was adopted in 2023 and has since been partially copied by Ola and Uber in
              select geographies, reducing its differentiation but demonstrating its validity as a driver-
              retention tool. Safety features—driver verification, GPS tracking, emergency SOS, insurance—
              are broadly comparable across Uber and Ola, while Rapido has been cited by Maharashtra
              authorities for operating petrol bikes without commercial registration, indicating a relative
              compliance gap versus larger incumbents in that state.

              On GTM distribution, Ola has the broadest city footprint from its 12-year first-mover
              advantage. Uber benefits from a globally recognized brand and corporate travel integrations.
              Rapido's distribution strength lies in its captain supply: the subscription model attracts
              price-sensitive driver-partners unwilling to share commissions. Namma Yatri has a unique
              distribution channel via ONDC interoperability and government pilot programs, reducing customer
              acquisition cost relative to private competitors.
