        - label: Technology Proof
          value: 6
          score: 6
          detail: >-
            Platform at 2.5M+ daily orders; subscription model operational at scale; AI safety features; no frontier
            tech moat; 6/10
        - label: Competitive Moat
          value: 7
          score: 7
          detail: >-
            ~50% total ride share; captain supply network; subscription loyalty model; Ola declining but Uber
            escalating; 7/10
        - label: Financial Health
          value: 6
          score: 6
          detail: EBITDA loss 75% narrower in FY25; Rs 258Cr net loss on Rs 934Cr revenue; EBITDA breakeven guided FY26; 6/10
        - label: Commercial Traction
          value: 8
          score: 8
          detail: >-
            44% revenue growth FY25; subscription revenue 14x; 450+ cities; 2.5M daily orders; Swiggy 2.5x return in
            3yr; 8/10
        - label: Risk-Adjusted Return
          value: 5
          score: 5
          detail: >-
            At $2.3B already 20.5x FY25 revenue; bear $1.1B, bull $3.5B; modest upside/significant downside asymmetry;
            5/10
        - label: Evidence Quality
          value: 6
          score: 6
          detail: >-
            FY25 financials confirmed; secondary valuation confirmed; cap table undisclosed; EBITDA guidance
            unconfirmed; 6/10
