      - number: '1.5'
        title: Milestones and Regulatory Landscape
        blocks:
          - type: paragraph
            body: |
              Rapido's corporate history spans six phases: founding and bootstrapping (2015–2018), early
              institutional capital and city expansion (2019–2021), the Swiggy-led Series D and near-unicorn
              status (2022), a strategic pivot to SaaS (2023), the unicorn milestone and cab expansion
              (2024), and the Karnataka regulatory battle resolution (2025–2026).

              The most consequential adverse event in Rapido's history is the Karnataka bike-taxi regulatory
              dispute. In March 2024, the Karnataka government imposed a ban on bike-taxi services, citing
              the absence of a formal regulatory framework under the Motor Vehicles Act, 1988, alongside
              safety concerns and pressure from auto-rickshaw unions. The Karnataka High Court formalized
              this ban effective June 16, 2025, requiring Rapido, Ola, and Uber to halt bike-taxi services.
              Rapido suspended bike-taxi operations in Karnataka in June 2025. In January 2026, the
              Karnataka HC reversed course, ruling that motorcycles qualify as "transport vehicles" under
              Indian law and cannot be categorically banned; the court allowed platforms to apply for
              motorcycle transport permits subject to state-imposed conditions.

              Multi-state regulatory challenges have been a persistent issue for Rapido. The company has
              faced historical bans or restrictions in Assam (where its Guwahati office was sealed by
              transport authorities), multiple enforcement actions in Maharashtra and Mumbai, and RTO
              seizures of motorcycles in Bengaluru and Pune. These incidents reflect a systemic absence of
              a unified national regulatory framework for bike-taxi aggregators in India. The Central Motor
              Vehicle Aggregator Guidelines, 2025, now explicitly permit bike taxis subject to state
              approval, which should reduce future regulatory ambiguity across jurisdictions.

              Safety incidents have also attracted adverse press. In July 2025, a Delhi passenger recorded a
              video of an accident during a Rapido ride, highlighting helmet non-compliance and reckless
              driving by the captain. A separate Bengaluru incident in June 2025 involved a driver assaulting
              a female passenger, prompting social-media outrage and a police investigation. These incidents
              raise concerns about Rapido's driver vetting, ongoing monitoring, and safety enforcement
              protocols across its 2M+ captain base.
