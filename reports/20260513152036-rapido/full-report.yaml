        - Revenue growth; TAM addressability; regulatory trend
        - Bear case becomes base case; re-rate to $1.1B range; EBITDA breakeven materially harder
        - Exit or reduce to minimum; re-enter only on confirmed reversal with legal precedent
      - - Prosus primary round closes below $2.3B (down-round)
        - Public announcement of Prosus round closing at valuation below Sept 2025 secondary mark
        - Valuation momentum; institutional confidence; IPO readiness
        - Immediate sentiment-driven compression; secondary liquidity dries up; IPO timeline extends
        - Reassess thesis; determine whether fundamentals or macro drove the down-round
