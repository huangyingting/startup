      - number: '3.3'
        title: Emerging and Adjacent Competitors
        blocks:
          - type: paragraph
            body: |
              InDrive (formerly iDrive), a global ride-hailing platform headquartered in Delaware with
              Russian roots, operates in approximately 13 Indian cities as of early 2025, with strongholds
              in Chandigarh and Kolkata. InDrive's structural differentiation is peer-to-peer fare negotiation:
              riders propose a fare, drivers accept or counter, removing the algorithmic pricing that generates
              surge on other platforms. InDrive charges only ~10% driver commission versus the 20–30% range
              at Ola and Uber. Its chief growth officer has stated that the company's India ambition is
              "profitable growth, not market share"—a deliberate contrast with Rapido's volume-first
              expansion. InDrive plans to enter 2–3 additional Indian cities annually, targeting tier-2 and
              tier-3 adjacencies. The platform does not offer bike taxis in India, limiting its direct
              competitive overlap with Rapido's core segment.

              Namma Yatri, incubated by Juspay and operating on the ONDC protocol, is a zero-commission
              mobility platform that has crossed 1 crore registered users and 7.49 crore trips. It began in
              Bengaluru and has expanded to Kolkata, Chennai, Kochi, Siliguri, Mysuru, and smaller cities.
              Namma Yatri aims to launch in 5–6 new cities per quarter and is backed by Google. Its model—
              fixed subscription fees rather than per-ride commissions, open ONDC protocol, government
              partnerships—is philosophically aligned with Rapido's SaaS structure but targeted at autos
              and cabs more than bikes. It has received government support for "Bharat Taxi," a potential
              nationwide government-backed mobility service using Namma Yatri's technology. This gives it
              regulatory tailwinds that private platforms lack.

              BluSmart, once India's most prominent EV-only ride-hailing platform operating ~8,700 EVs
              in Delhi, Bengaluru, and Mumbai, effectively collapsed in April 2025. SEBI uncovered
              ₹262 crore in misappropriated loan proceeds from a related party (Gensol Engineering); founders
              faced restrictions, operations halted, and employees went unpaid. As of May 2025, investors
              were discussing a $30M bridge to revive BluSmart under new leadership, but revival remains
              uncertain. Yulu, an electric scooter rental platform backed by Bajaj Auto, operates in
              Bengaluru, Delhi, and Mumbai, targeting gig-delivery workers (60%+ of revenue) and commuters.
              It is not a P2P taxi aggregator and does not compete directly with Rapido in ride-hailing,
              but occupies the same budget mobility segment.
            claimRefs:
              - CP016
              - CP017
              - CP018
              - CP019
              - CP020
              - CP021
              - CP022
