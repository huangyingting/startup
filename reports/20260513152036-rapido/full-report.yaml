      - number: '7.4'
        title: Safety and Reputational Risk
        blocks:
          - type: paragraph
            body: >
              Rapido's safety record and brand reputation are directly correlated risks given that consumer trust is
              central to a mass-market ride-hailing platform. Road accident liability remains Rapido's most persistent
              safety concern: India has among the highest per-capita road fatality rates globally, with two-wheelers
              accounting for approximately 44% of road fatalities in 2025. Any high-profile fatality or serious injury
              involving a Rapido captain and passenger could trigger regulatory action, media scrutiny, and demand-side
              churn.

              MediaNama and Times of India reported multiple incidents in Karnataka in late 2024 where passengers
              alleged assault by Rapido captains, including notable cases in Bengaluru that received significant local
              media attention. These incidents occurred during the Karnataka ban period, when Rapido was operating under
              a lead-generation model rather than a full platform, potentially reducing the company's ability to enforce
              safety standards on captains who were nominally operating outside the regulated platform structure.

              Rapido's AI helmet compliance detection system — deployed to verify that captains wear helmets before
              accepting rides — has been marketed as a key safety differentiator. However, the system's accuracy under
              varied lighting conditions, helmet shapes, and camera angles is not publicly validated. Industry experts
              have noted that computer vision systems trained on limited datasets can have accuracy rates of 85–90%
              rather than the near-100% required for a reliable safety gate. If captains systematically evade the
              detection mechanism, the safety guarantee Rapido markets becomes a liability. The reputational risk
              extends to data privacy: Rapido collects location data on millions of daily users, and any breach could
              trigger enforcement under India's Digital Personal Data Protection Act 2023 (DPDPA 2023), with fines
              reaching Rs 250 crore per incident.
            claimRefs:
              - CR029
              - CR030
              - CR031
              - CR032
              - CR033
              - CR034
      - number: '7.5'
        title: Partner and Technology Dependency Risk
        blocks:
          - type: paragraph
            body: >
              Rapido's platform relies on a set of critical third-party dependencies that, if disrupted or re-priced,
              could materially impair service delivery or unit economics. Google Maps Platform provides the routing and
              ETA infrastructure core to every ride dispatch; Rapido has not publicly disclosed an alternative mapping
              layer, creating concentration risk if Google raises API pricing or imposes usage restrictions. Amazon Web
              Services hosts Rapido's core platform, dispatch engine, and ML inference workloads; while multi-region
              deployment is reported, no formal business continuity disclosure has been made. Razorpay and the broader
              UPI ecosystem handle fare collection; the multi-PSP UPI architecture offers partial fallback, but payment
              infrastructure failures during high-demand periods could cause significant revenue leakage.

              State government operating licences represent perhaps the most critical dependency of all: as the
              Karnataka experience demonstrates, a state government can rescind the effective operating licence through
              administrative order with limited advance notice, converting a regulatory permit dependency into an
              existential operational risk. Swiggy's strategic stake in Rapido creates a dependency and opportunity
              simultaneously; Swiggy's own competitive position, following its November 2024 IPO, could affect
              partnership terms and resource allocation. The dependency map figure below shows how these dependencies
              interconnect and where single points of failure concentrate.
