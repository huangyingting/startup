chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Rapido, legal name Roppen Transportation Services Private Limited, is India's largest bike-taxi
              and on-demand mobility platform, headquartered in Bengaluru, Karnataka. Founded in 2015 by
              Aravind Sanka, Rishikesh SR, and Pavan Guntupalli, Rapido operates across 100+ Indian cities,
              connecting urban commuters with "captains" (driver-partners) through a mobile application.

              The company offers three primary service lines: Rapido Bike (two-wheeler taxi), Rapido Auto
              (auto-rickshaw hailing), and Rapido Cab (four-wheeler taxi). In ride volume, bike taxis account
              for over 50% of total rides; in Gross Order Value (GOV) terms, autos contribute approximately
              40%, bikes approximately 30%, and cabs approximately 30%. The company processes approximately
              2.3–2.5 million orders per day across all categories as of the Series E close in 2024.

              In a pivotal strategic move in 2023, Rapido transitioned from a commission-based ride aggregator
              to a zero-commission Software-as-a-Service (SaaS) platform. Under this model, captains pay a
              fixed daily platform subscription fee of Rs 19–29 per day to access Rapido's technology and
              ride-matching tools, rather than surrendering a percentage of each fare. Pavan Guntupalli has
              publicly stated: "Each captain pays a fixed amount of let's say 19 rupees or 29 rupees per day.
              And that is how our income is generated for Rapido." This model significantly alters the
              incentive structure for driver-partners, giving Rapido a subscription-based revenue base
              partially insulated from ride volumes. The company claims this transition—executed while Ola
              and Uber retained commission models—was a key differentiator that attracted a larger captain
              supply base and accelerated growth.

              Rapido targets the cost-conscious daily commuter seeking last-mile urban connectivity in Indian
              cities, particularly for trips of 2–15 km where two-wheelers are faster and cheaper than autos
              or cabs. The platform positions itself as a mass-market solution rather than a premium mobility
              service. By bike-taxi ride volume, the company claims to be the second-largest ride-hailing
              platform in India after Uber, having reportedly surpassed Ola as of 2024 per internal company
              documents reviewed by Entrackr.
