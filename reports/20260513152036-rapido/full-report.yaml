      - number: '1.6'
        title: Strategic Direction and Growth Outlook
        blocks:
          - type: paragraph
            body: |
              Rapido's near-term strategy centers on three vectors: (1) deepening four-wheeler (Rapido Cab)
              penetration to compete directly with Ola and Uber in metro markets; (2) expanding the captain
              base toward the 5 million FY2027 target to improve supply density and utilization rates; and
              (3) leveraging its two-wheeler fleet for quick-commerce and hyperlocal delivery partnerships,
              building on the Rs 265 crore delivery revenue achieved in FY2024.

              The zero-commission SaaS model is Rapido's primary structural differentiator versus competitors.
              The company contends that this model reduces captain churn, attracts higher supply, and provides
              more predictable revenue without volume-linked exposure. However, subscription revenue was
              only Rs 19 crore in FY2024 (out of Rs 648 crore total operating revenue), indicating that the
              majority of revenue currently flows from other sources such as the delivery segment and possibly
              platform fees or advertising. The ability to meaningfully scale the SaaS subscription line while
              maintaining competitive ride economics will be a key operating challenge.

              The unicorn valuation of $1.1 billion (Series E, September 2024) has not been updated by any
              subsequent publicly announced funding round as of the runDate (May 2026), making the stated
              valuation approximately 20 months old. No IPO timeline has been signalled by the company. The
              Karnataka regulatory resolution in January 2026 removes a major operational disruption in the
              company's home market, though compliance costs associated with obtaining formal motorcycle
              transport permits may introduce new overhead. Achieving audited profitability at the
              consolidated P&L level—not just at the ride-hailing segment level—remains the critical
              metric for any future IPO or late-stage funding event.
