      - number: '6.5'
        title: Geographic Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Rapido operates in 450+ Indian cities as of early 2026 and has publicly stated a plan
              to expand to all 800 district headquarters, providing a clear long-run serviceable
              addressable market. The company's 70–75% bike-taxi market share in tier-2 and tier-3
              cities is its most defensible position: Uber and Ola have historically focused capital
              on Tier-1 metro markets, leaving the two-wheeler last-mile in smaller cities largely to
              Rapido's network density advantage.

              Bengaluru remains the single largest market by gross order value, and Rapido's dominance
              there was partially disrupted by Karnataka's two-year regulatory ban on bike taxis, which
              was resolved by the Karnataka High Court's January 2026 judgment restoring licenses. The
              normalization of Bengaluru operations is expected to accelerate FY26 revenue recovery in
              the commission segment, which had been forced into a lead-generation-only model during the
              ban period.

              Maharashtra—India's largest state economy and home to Mumbai, the country's commercial
              capital—represents a structural constraint. Bike-taxi operations are not permitted in
              Maharashtra under existing state transport regulations; Rapido is limited to auto-rickshaws
              and cabs there. This excludes its highest-unit-economics product from a TAM that could
              materially move topline metrics. Regulatory change in Maharashtra would be a significant
              positive catalyst, but no timeline exists as of the report date.

              B2B subscription revenue concentration at approximately 30% of total operating revenue
              (₹275 crore FY25) provides portfolio diversification. The B2B segment appears to have
              multiple clients across six industry verticals, limiting top-account concentration risk,
              but no individual client represents a disclosed revenue percentage, preventing a
              Herfindahl-type concentration assessment.

              Rapido's Ownly food delivery expansion (late 2025, Bengaluru pilot) and the broader
              super-app positioning with travel and transit integrations offer additional channels for
              deepening customer wallet share without proportional CAC increases. However, Ownly
              introduction risks cannibalizing off-peak captain capacity—a risk that, if it materializes
              as commission earnings pressure, could amplify driver attrition and worsen the labor
              supply dynamics already visible in the February and April 2026 protests.

              Ownly's lower-commission model (8–15% vs 18–22% for Zomato and Swiggy) is designed to
              attract restaurant supply, but order economics and contribution margin at the stated rates
              remain unverified at scale. As of May 2026, Ownly's adoption metrics, captain supply
              utilization in food delivery, and restaurant retention are not publicly disclosed.
