      - number: '6.2'
        title: Customer Segmentation and Personas
        blocks:
          - type: paragraph
            body: |
              Rapido's customer base can be segmented into six primary groups, each with a distinct
              need state, value proposition, and evidence quality.

              Urban daily commuters aged 23–40 years form the platform's largest segment by ride
              volume. Concentrated in IT and ITES hubs—Bengaluru, Hyderabad, Pune, and Gurugram—these
              users rely on bike taxis or autos for the first and last mile of 5–15 km daily commutes.
              Average fares of ₹40–80 for bike taxis represent a 50–70% discount to equivalent Ola
              and Uber cab options for similar distances. Ride volume data and city concentration
              patterns provide high-quality evidence for this segment, though segment-level revenue
              and margin are not disclosed.

              Students and Gen Z users (18–24 years) represent the fastest-growing cohort, drawn
              primarily by sub-₹50 fares and frictionless booking on a mobile-first platform. Rapido's
              "Smart ho toh Rapido" campaign and campus referral programs have driven strong brand
              recall in this demographic. A survey of over 1,000 Gen Z respondents conducted by The
              Youth Talks confirmed that affordability outweighs brand loyalty when selecting a
              ride-hailing service in this segment. Power Pass daily and weekly subscription products
              also provide retention hooks for regular student commuters.

              Daily wage workers and informal-economy participants value Rapido's acceptance of cash
              payments, early-morning availability, and lowest-market fares for short-haul trips.
              This segment is less well-documented in public sources but is evidenced by Rapido's
              penetration in industrial corridors and high volumes in cities with large manufacturing
              and construction workforces.

              Women travelers have been an explicitly targeted growth segment since at least 2024. The
              Bike Pink pilot in Chennai (2024) matched women captains with women passengers on EV
              bikes. Pink Rapido expanded to Karnataka in February 2025 with a stated goal of employing
              25,000 women captains. Rapido Shakti, launched in Thiruvananthapuram in March 2026 in
              partnership with KSRTC, provides women-only bike-taxi services with trained women
              captains and a safety-first protocol. Despite these initiatives, female penetration of
              total MAU and Pink Rapido ride volumes are not publicly disclosed, limiting quantitative
              assessment.

              Corporate B2B accounts represent Rapido's most commercially significant identified
              enterprise segment. B2B subscription revenue grew 14× in FY25 to ₹275 crore, accounting
              for approximately 30% of total operating revenue. The service—marketed under the Rapido
              Corporate brand—provides centralized booking dashboards, cashless ride settlement,
              consolidated billing, and claims of up to 70% cost reduction versus incumbent cab services
              for banking, FMCG, pharma, retail, logistics, IT/ITES, and MSME clients. Named enterprise
              clients are not publicly disclosed in the B2B product context beyond sector verticals.

              Metro and multi-modal commuters represent an emerging segment enabled by Rapido's ONDC
              integrations with Delhi Metro (DMRC), Mumbai Metro Lines 2A/2B/7/9, Hyderabad Metro,
              Chennai Metro, and Kochi Metro. The DMRC integration generates approximately 100,000
              metro-adjacent rides per day in Delhi, with DMRC's Managing Director describing it as
              "the first time globally where a metro ticket and last-mile booking are integrated in a
              single app." This segment's revenue contribution is not separately disclosed.
