      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: |
              Rapido was co-founded by three technology professionals who experienced Bengaluru's urban
              traffic challenges first-hand. Aravind Sanka (CEO), who holds a B.Tech in Mechanical Engineering
              from IIT Bhubaneswar (2012 batch), previously worked at Flipkart's Ekart logistics division
              from 2012 to 2014, where he helped scale delivery operations from 10 to 100 cities across India.
              This supply-chain and city-expansion experience maps directly to Rapido's trajectory of
              onboarding captains and launching new markets. Rishikesh SR (COO) brings operational leadership
              depth to the founding team and has managed day-to-day platform operations since inception.
              Pavan Guntupalli (CTO) has been the architect of Rapido's platform technology, including the
              2023 SaaS model transition, and serves as a key external spokesperson on product strategy.

              Before Rapido, the trio co-founded theKarrier in 2014, a logistics startup that pivoted into the
              bike-taxi concept, meaning the founding team had already iterated on a related business model.
              Guntupalli's public commentary on the SaaS model has been substantive and detailed, indicating
              deep operational involvement at the CTO level rather than a purely technical role.

              The founding trio constitutes a material key-person concentration. All three are active in
              day-to-day operations and no succession planning or senior independent board appointments are
              publicly visible. Rapido has not disclosed its board composition, C-suite members beyond the
              founders, or governance structure in any publicly available source. Sanka is the primary
              external spokesperson; his absence or departure would likely require significant transition
              management. The absence of publicly named independent directors represents a governance
              opacity risk, particularly for a company of $1.1 billion valuation. MCA filings for Roppen
              Transportation Services Private Limited would contain director disclosures but are not readily
              accessible via public channels.
