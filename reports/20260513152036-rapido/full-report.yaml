      - number: '3.2'
        title: 'Primary Competitors: Ola and Uber India'
        blocks:
          - type: paragraph
            body: |
              Ola (ANI Technologies Pvt. Ltd.), India's largest domestically founded ride-hailing company,
              operates across all three vehicle segments—cabs, autos, and bikes—in more than 250 cities.
              Ola went public on Indian stock exchanges (NSE/BSE) in late 2024. Its FY2024 revenue was
              approximately ₹1,773 crore (~$211M), and the company reported its first full-year operating
              profit. Despite this financial milestone, Ola has been identified by Uber's own CEO Dara
              Khosrowshahi as "distracted" by its electric vehicle (Ola Electric) business, and Rapido has
              been named Uber's primary competitive threat in India—a significant public repositioning of
              competitive framing. Ola's bike-taxi market share lags Rapido by a wide margin; estimates put
              Ola third in bike taxis behind Rapido and Uber Moto. Ola has adopted a partial zero-commission
              model in some cities in response to Rapido's driver-retention success, but driver trust in the
              Ola platform remains lower than in Rapido based on publicly reported driver interviews.

              Uber India, the local subsidiary of Uber Technologies (NYSE: UBER, market cap ~$153B), leads
              the four-wheeler cab segment with approximately 50% market share by rides, is the second-largest
              in three-wheeler autos (~40%), and trails Rapido significantly in bike taxis. Uber's India
              president has publicly stated the company is "very bullish" on bike taxis as the "next wave
              of mobility," and Uber is expanding Uber Moto via a partnership with logistics company
              Shadowfax to reach new cities. Uber also entered ONDC-networked metro ticketing in Delhi and
              other metros in 2025, diversifying its India platform. Uber has reduced cab fares by 20–25%
              in major metros and trialled a driver subscription model in select markets, directly copying
              Rapido's SaaS pricing structure. Uber's financial depth—a profitable global entity—gives it
              sustained ability to fund incentive wars; one industry source described Rapido as "bleeding"
              while Uber "has the headroom to fight this battle."
            claimRefs:
              - CP007
              - CP008
              - CP009
              - CP010
              - CP011
              - CP012
              - CP013
              - CP014
              - CP015
