              The India ride-hailing market has at least four major analyst estimates for 2026 that diverge by more than
              5x in headline value (USD 3.28B to USD 23.98B), reflecting materially different scope definitions. Without
              a consensus methodology, any TAM multiple used in a valuation model is highly sensitive to which analyst
              estimate is chosen. Diligence should require understanding each estimate's scope boundary before anchoring
              to it.
