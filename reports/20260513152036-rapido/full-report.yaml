  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Suite and Platform Overview
        blocks:
          - type: paragraph
            body: |
              Rapido's consumer app delivers three vehicle classes—Bike (two-wheeler taxi), Auto
              (auto-rickshaw), and Cab (four-wheeler)—through a single interface available on Android
              6.0+ and iOS. Within these modes, the app surfaces sub-variants: Bike Lite (cheaper
              fares with longer wait times assigned to local captains), Bike Metro (first-/last-mile
              rides to metro stations), Auto Share, Auto Pet, Auto Parcel, and standalone Parcel
              delivery. Metro ticket booking for Delhi, Mumbai (Lines 2A/2B/7/9), Hyderabad, Chennai,
              and Kochi metros is integrated via ONDC, eliminating the need for a separate ticketing
              app. In October 2025, Rapido added flights, hotels, trains, and inter-city bus booking
              through partnerships with Goibibo, redBus, and ConfirmTkt, positioning the app as a
              unified mobility-and-travel super-app.

              The passenger UX relies on PIN-based ride authentication rather than OTPs, reducing
              friction at pickup. Riders can save favorite locations and share live tracking links
              via WhatsApp or SMS. The Power Pass subscription (₹69) delivers up to 25% fare
              discounts on select rides, protecting frequent users from surge pricing. Rapido Coins
              (one coin = ₹1) accrue from rides, referrals, and promotions. As of May 2026 the app
              has 210M+ total downloads, 50M monthly active users, a 4.77/5 rating on Google Play
              from 4.1M+ reviews, and a 4.9/5 rating on the iOS App Store.
