companyProfile:
  summary: >
    Ramp Financial Inc. is a New York-headquartered corporate card and spend-management platform founded in 2019 by Eric
    Glyman (CEO) and Karim Atiyeh (CTO). Its core product — a Visa corporate card with real-time spend controls — is
    augmented by an AI-native intelligence layer covering receipt matching, policy enforcement, contract negotiation
    insights, and CFO-grade analytics. Ramp's go-to-market targets cost-conscious US small-to-mid-market businesses
    (10–1,000 employees) seeking to replace manual expense reports and displace legacy T&E incumbents (Concur,
    Expensify). With $150M raised at $7.65B in March 2024 and secondary trades implying ~$13B in late 2024, Ramp has
    re-rated sharply upward after a brief 2022 down-round overhang. Estimated ARR of $500–700M growing 100%+ YoY,
    25,000+ enterprise customers, and ~$25B in annualised card volume position Ramp as the most credible challenger to
    Brex in the US corporate card market.
  foundedDate: '2019-01-01'
  founders:
    - name: Eric Glyman
      role: CEO and co-founder
      background: >
        Former co-founder of Paribus (acquired by Capital One 2016); primary strategic and commercial leader responsible
        for go-to-market, fundraising, and investor relationships. Controls majority of voting shares via dual-class
        structure.
      claimRefs:
        - C006
    - name: Karim Atiyeh
      role: CTO and co-founder
      background: >
        Former software engineer; leads product engineering, infrastructure, and AI development. Architect of Ramp's
        real-time spend intelligence platform.
      claimRefs:
        - C007
  productSummary: >
    Ramp's product suite spans the full corporate spend lifecycle: a zero-fee Visa corporate card with real-time
    controls, an AI Intelligence layer for duplicate detection and benchmarking, Bill Pay for AP automation, Procurement
    for purchase-order workflows, and a Travel booking module with embedded policy guardrails — all backed by 1,000+
    ERP/HRIS integrations.
  keyProducts:
    - name: Ramp Corporate Card
      description: >
        Visa-network corporate card with real-time spend controls, virtual card issuance, and automated receipt
        matching. No fees, no minimums.
      claimRefs:
        - C003
    - name: Ramp Intelligence
      description: >
        AI layer providing duplicate vendor detection, contract renewal alerts, spend benchmarking, and CFO-grade
        reporting. Differentiated moat versus legacy players.
      claimRefs:
        - C150
    - name: Ramp Bill Pay
      description: >
        Accounts payable automation — vendor onboarding, invoice parsing, approval workflows, and ACH/check payment
        execution integrated with NetSuite, QuickBooks, Sage Intacct.
      claimRefs:
        - C170
    - name: Ramp Procurement
      description: |
        Purchase-order management and approval workflows for mid-market buying teams.
      claimRefs:
        - C018
    - name: Ramp Travel
      description: >
        Corporate travel booking (flights, hotels) with policy guardrails embedded at point-of-booking; acquired Pleo
        travel capabilities in partnership ecosystem.
      claimRefs:
        - C156
  customerFocus: >
    Primary: US SMB and mid-market companies (10–1,000 employees) across technology, professional services, e-commerce,
    and retail verticals. Notable logos include Shopify, OpenAI, Spotify, and 1Password. 85%+ of customers are in the
    US.
  businessModel: >
    Revenue from Visa interchange on card spend (~1.0–1.5% of volume), SaaS subscription fees for premium intelligence
    and bill-pay modules, and treasury yield on float. Zero consumer fees is a deliberate CAC tool. Interchange is the
    dominant revenue driver at ~$25B annualised volume. Gross margins estimated at 50–60% (unconfirmed).
  stage: late-stage private
  fundingStatus: >
    Total primary capital approximately $1.37B. Key rounds: $15M seed (2020, Founders Fund); $115M Series B at $1.6B
