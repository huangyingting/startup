    $7.65B (March 2024, down-round from $8.1B). Secondary market transactions in late 2024 implied ~$13B valuation.
    Investors include Thrive Capital, D1 Capital, Founders Fund, Redpoint Ventures, Khosla Ventures, and Stripe.
