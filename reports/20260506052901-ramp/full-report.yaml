  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Structure
        blocks:
          - type: paragraph
            body: >
              Ramp competes in a hybrid market: the corporate spend management software market layered on top of the
              commercial card payments market. These two have different dynamics but are deeply interconnected for
              Ramp's business model. [C036] [C037]

              The **commercial card market** (total spend) is vast: $25 trillion+ in global commercial card spend, of
              which approximately $800B occurs on US corporate cards annually. The addressable interchange pool from US
              commercial card spend is approximately $8–16B per year (1–2% of $800B), shared among card networks
              (Visa/Mastercard ~0.1–0.3%), issuing banks (Sutton Bank, etc.), and the fintech operator (Ramp). Ramp's
              net take rate after 1.5% cash back rebate is narrow but scalable with volume. [C038]

              The **corporate spend management SaaS market** is estimated at $8–12B in total addressable software
              revenue (IDC/Gartner 2024), growing at 15–20% CAGR driven by digital transformation of finance teams,
              cloud-native ERP adoption, and AI automation. The SAM for Ramp is US-based companies with 10–5,000
              employees — approximately 200,000 businesses — that have not yet adopted modern spend management
              platforms. Most remain on legacy tools (SAP Concur, Excel, QuickBooks) or manual processes. [C039] [C040]
            claimRefs: []
      - number: '2.2'
        title: TAM, SAM, SOM Sizing
        blocks:
          - type: paragraph
            body: >
              **Bottom-up TAM (card + SaaS)**: US corporate card market at $800B spend × 0.1% net interchange after
              rebate = $800M pure card TAM; US SMB/mid-market spend management SaaS at 1M+ potential users × $15/month =
              $180M+ SaaS TAM; combined $1B+ addressable revenue per year at current scale — but this understates the
              long-term TAM as Ramp expands to enterprise and globally. [C041] [C042]

              **Top-down TAM**: The broader corporate spend management category (including ERP modules, AP automation,
              travel management, treasury) represents a $25–35B global software market (IDC 2024), of which the US
              cloud-native sub-segment is approximately $8–12B. Ramp's current ~$500–700M ARR represents ~6–9%
              penetration of this US sub-segment. [C043]

              **SAM**: Ramp's realistic serviceable market is US mid-market companies (10–5,000 employees) —
              approximately 200,000 businesses; a $3,000–10,000 annual platform spend per company (cards + SaaS) implies
              a $0.6–2B SAM. At 25,000 customers today, Ramp has penetrated 12% of its SAM. [C044]

              **SOM (3–5 year)**: Ramp's serviceable obtainable market in 3–5 years, assuming continued ~30–40% customer
              growth, is 75,000–100,000 customers with $1.5–3B ARR — implying a 2–3x increase from current levels and
              10–15% SAM penetration. Enterprise and international expansion could extend the SOM meaningfully. [C045]
            claimRefs: []
      - number: '2.3'
        title: Buyer Segments and Growth Drivers
        blocks:
          - type: paragraph
            body: >
              Ramp's primary buyer segments are (1) venture-backed startups (acquired via VC partnership programs), (2)
              high-growth SMBs ($5M–$50M ARR), (3) mid-market companies ($50M–$500M revenue), and (4) early-stage
              enterprise ($500M+). Each segment has distinct buying motivations, card spend volumes, and software
              budgets. [C046] [C047]

              **Growth drivers**: (1) Generational shift — finance teams at digital-native companies expect modern,
              API-first software, not SAP Concur; (2) AI automation — Ramp's AI suite reduces manual work, justifying
              replacement of legacy tools; (3) cost pressure — in a post-ZIRP environment, CFOs actively want spend
              visibility and savings insights; (4) VC channel — hundreds of investors recommend Ramp to portfolio
              companies, creating a compounding distribution flywheel. [C048] [C049]

              **Growth constraints**: (1) Interchange compression — Visa/Mastercard fee pressure and potential Durbin
              Amendment extension to credit cards could compress Ramp's net take rate; (2) Enterprise sales complexity —
              large enterprises have longer cycles, require compliance certifications, and often have SAP/Oracle
              lock-in; (3) International limitation — Ramp's card is currently US-only, capping TAM; (4) Competition —
              Brex is investing heavily in AI-first features and enterprise, directly competing in Ramp's core segments.
              [C050] [C051]
            claimRefs: []
      - number: '2.4'
        title: Competitive Dynamics and Market Maturity
        blocks:
          - type: paragraph
            body: >
              The US corporate spend management market is in mid-innings disruption: legacy players (SAP Concur, Oracle,
              Coupa) hold the enterprise installed base but are losing mid-market to cloud-native challengers. The
              cloud-native segment is bifurcating between all-in-one platforms (Ramp, Brex) and point solutions
              (Expensify, BILL). [C052] [C053]

              Market timing analysis suggests Ramp entered at an inflection point: the 2020–2022 VC funding boom seeded
              the startup customer base; the 2022–2024 cost-consciousness wave made spend reduction a CFO priority; the
              2024–2026 AI wave created a product differentiation opportunity that Ramp has moved early to capture with
              Ramp Intelligence. The company is growing faster than the overall market, indicating share gain. [C054]
              [C055]

              Regulatory tailwinds: ACH and open banking mandates support the move to integrated treasury and payment
              platforms; conversely, potential credit card interchange regulations (post-Durbin for business cards)
              could compress the revenue model. [C056]
            claimRefs: []
