  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Overview and Market Structure
        blocks:
          - type: paragraph
            body: >
              The US corporate spend management market has several distinct competitive tiers that map to customer
              segments. At the modern fintech layer, Ramp and Brex are the two dominant challengers — similar in product
              scope, pricing model, and VC backing, but with different strategic emphases. Ramp has focused on the
              mid-market intelligence and savings narrative while Brex has oscillated between startup-focus and
              enterprise. [C071] [C072]

              At the legacy enterprise layer, SAP Concur (owned by SAP) remains the dominant expense management platform
              with deep ERP integration and millions of users at Fortune 500 companies. Concur's weakness is UX
              complexity, slow deployments, and pricing that is opaque and high for mid-market. Oracle Expense (part of
              Oracle Fusion) serves a similar segment. These players have high retention via switching costs but are
              losing new mid-market deals to cloud-native alternatives. [C073]

              BILL (public, ~$4–5B market cap) dominates small business AP automation with 500K+ customers and deep
              integration with QuickBooks; its acquisition of Divvy gave it a corporate card product, creating a direct
              competitive offering to Ramp in the SMB segment. Expensify (public, ~$500M market cap) is a smaller direct
              competitor in expense tracking with 10M+ users but declining growth. [C074] [C075]
            claimRefs: []
      - number: '3.2'
        title: Competitor Profiles and Positioning
        blocks:
          - type: paragraph
            body: >
              **Brex** is Ramp's most direct competitor: founded by Pedro Franceschi and Henrique Dubugras in 2017,
              raised $2.5B+, valued at ~$12.3B (2024). After a controversial pivot away from SMBs in 2022, Brex has
              refocused on high-growth tech companies and mid-market with an "AI-powered finance for ambitious
              companies" positioning. Brex's AI CFO assistant and global corporate card create direct feature overlap
              with Ramp. Ramp's edge over Brex: stronger mid-market ERP integrations, simpler per-user pricing, and the
              5% savings narrative backed by Intelligence data. Brex's edge: more enterprise features (controls,
              global), longer track record, and better brand recognition in the startup ecosystem. [C076]

              **SAP Concur** dominates enterprise with millions of seat-based users; its weakness is deploying in months
              (vs. Ramp's hours), costing 3–5x more per user, and requiring IT resources. SAP Concur's incumbent status
              at Fortune 500 is protected by SAP ERP lock-in, but CFOs at $100–500M revenue companies increasingly
              choose Ramp or Brex over Concur during ERP migrations. [C077]

              **BILL (fka Bill.com) + Divvy** serves 500K+ US SMB customers primarily via accounting firm distribution;
              the Divvy corporate card integration gives BILL a full spend management stack competitive with Ramp for
              sub-$10M revenue companies. BILL's advantage: bookkeeper ecosystem distribution; disadvantage: product
              quality and user experience lag behind Ramp and Brex. [C078]
            claimRefs: []
      - number: '3.3'
        title: Ramp's Competitive Advantages and Moat
        blocks:
          - type: paragraph
            body: >
              Ramp's competitive moat has three layers: (1) **Data network effect** — vendor benchmarking accuracy
              improves with each of 25,000+ customers added to the anonymised spend dataset, making the AI intelligence
              product more valuable as scale grows; (2) **Unit economics alignment** — 1.5% unlimited cashback creates
              customer-aligned incentives that legacy players cannot match without restructuring their revenue model;
              (3) **Speed and simplicity** — Ramp's deployment in hours vs. weeks/months for SAP Concur creates a strong
              evaluation-to-close advantage, especially for digital-native mid-market companies. [C079] [C080]

              Moat durability risk: the data network effect is the most defensible advantage (genuinely hard to
              replicate), but the cashback model can be matched by any well-capitalized competitor willing to accept
              lower margins. Brex already offers competitive cashback. SAP Concur could respond with better pricing if
              threat intensifies. The AI intelligence is currently differentiated but is not a permanent barrier —
              well-funded competitors can build similar models given enough data. [C081]
            claimRefs: []
      - number: '3.4'
        title: Feature Comparison and Market Dynamics
        blocks:
          - type: paragraph
            body: >
              A head-to-head feature comparison shows Ramp leading on AI intelligence, ERP integration breadth,
              deployment speed, and SMB/mid-market value; Brex leads on enterprise global card features and brand
              awareness; SAP Concur leads on enterprise compliance depth. The market is converging toward AI-first
              platforms, and Ramp's early investment in Intelligence creates a 12–18 month lead over legacy competitors
              in that dimension. [C082] [C083]

              Pricing comparison: Ramp's core product is free (card + expense) with Ramp Plus at $15/user/month; Brex is
              similarly free at base with paid tiers; SAP Concur charges $8–12/user/month base with significant
              implementation fees; BILL charges $45–55/month for its platform. Ramp's freemium model creates
              low-friction adoption but monetisation depends heavily on card volume and SaaS upsell. [C084]
            claimRefs: []
