  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Ramp's primary buyer is the CFO, VP of Finance, or financial controller at small and mid-market companies
              — typically 50–2,000 employees in the United States. This segment is the company's volume engine: as of
              late 2024, Ramp reported serving 25,000+ business customers [C177], spanning early-stage startups using
              the free tier through to fast-growing mid-market companies on paid Ramp Plus or Ramp Enterprise plans. The
              finance team is both buyer and power user; employees are secondary users (card holders), while accounting
              and ERP teams are downstream beneficiaries of the automated GL-coding and close-acceleration workflow
              [C178].

              By industry, Ramp's best-fit verticals are technology, professional services, and financial services —
              companies with high transaction velocity, distributed spend across many employees, and motivation to
              reduce month-end close friction [C179]. The company has expanded meaningfully into enterprise segments
              (500–5,000 employees), where larger card volume per customer drives higher interchange revenue and upsell
              opportunity into BILL Pay, Travel, and Accounting products [C180]. Ramp also serves a growing number of
              venture-backed startups — many of which are customers via the Ramp Startup Program, which waives fee
              thresholds for qualifying early-stage companies [C181].

              Geographic concentration is predominantly US-based, with limited international expansion as of 2025.
              Ramp's card program is Visa-based and restricted to US legal entities; international customers must be US
              incorporated, or wait for Ramp's planned international card expansion [C182]. Payers are always the
              business entity; the company does not offer personal consumer cards [C183].
            claimRefs: []
      - number: '6.2'
        title: Adoption Trajectory and Growth Metrics
        blocks:
          - type: paragraph
            body: >
              Ramp has grown from approximately 1,000 customers at public launch (February 2020) to over 25,000 by late
              2024 — a 25× increase in under five years [C184]. This trajectory accelerates further when measured by
              card spend: annualised card volume reached approximately $25 billion by late 2024 [C185], implying average
              per-customer card volume of roughly $1 million per year — consistent with a mid-market SMB that processes
              significant employee and vendor spend through the platform. Revenue (estimated at $500–700 million ARR)
              has grown roughly 4× year-over-year from 2022 to 2024 [C186].

              Ramp's acquisition funnel is dominated by bottom-up, product-led growth (PLG): finance admins typically
              discover Ramp via peer recommendations, software review sites (G2, Capterra), or VC-network introductions,
              sign up with a free trial, integrate their bank account, and generate a virtual card within days [C187].
              This fast time-to-value is a key differentiator versus SAP Concur, which typically requires months of
              IT-led implementation. Ramp's top-of-funnel conversion is also boosted by Ramp for Startups partnerships
              with major VC firms, accelerators (Y Combinator), and law firms, which drive warm referrals into Ramp's
              sales funnel [C188].

              In 2023 and 2024, Ramp's upmarket expansion into the 500–2,000 employee segment drove the highest growth
              in average contract value (ACV); the company added enterprise-grade features — SSO, SCIM, multi-entity
              consolidation, and advanced approval workflows — to reduce enterprise churn risk and increase seat depth
              [C189]. Headcount per deal rose materially in 2024 as sales teams were expanded to handle inbound from
              larger prospects [C190].
            claimRefs: []
      - number: '6.3'
        title: Named Customer Proof and Case Studies
        blocks:
          - type: paragraph
            body: >
              Ramp maintains a publicly accessible customer stories library on its website with named case studies and
              outcome metrics [C191]. Named customers confirmed across multiple credible public sources include OpenAI,
              Shopify, Anduril, Lemonade, Pave, Ro Health, Attentive, Hims & Hers, and Webflow [C192]. The most
              illustrative cases are: Shopify (enterprise-scale global deployment for employee expenses and corporate
              card), where Ramp was selected over Brex specifically for its ERP integration quality [C193]; OpenAI
              (replacing their prior card and expense provider; Ramp's rapid card issuance was cited as key) [C194]; and
              Anduril Industries (defence tech, notable for showing Ramp's expansion into higher-security-requirement
              industries) [C195].

              Review platform data adds independent corroboration: Ramp holds a 4.8/5.0 average on G2 from 1,900+
              reviews as of early 2025, with reviewers citing ease of setup, AI receipt matching, and ERP integrations
              as top strengths [C196]. Capterra (800+ reviews) shows a similar 4.9/5.0 average, with frequent praise for
              automated expense reports and virtual card management [C197]. Common adverse themes in reviews include:
              limitations in international card support, occasional sync delays with QuickBooks, and the learning curve
              for companies transitioning from Concur's travel booking features [C198]. These adverse signals are
              consistent with known product gaps rather than fundamental platform problems.

              Third-party analysts from software review platforms note that Ramp's NPS is above industry average for B2B
              SaaS (estimated 40–60), though Ramp has not published an official NPS figure [C199]. G2 satisfaction
              scores have held above 4.7/5.0 continuously since Ramp first appeared on the platform in 2021, indicating
              stable customer satisfaction rather than honeymoon-period reviews [C200].
            claimRefs: []
      - number: '6.4'
        title: Retention, Durability, and Expansion Economics
        blocks:
          - type: paragraph
            body: >
              Ramp does not publicly disclose precise net revenue retention (NRR) or gross revenue retention (GRR)
              figures. Based on analyst estimates, customer reference checks cited in press, and comparable benchmarks
              for the corporate card and spend-management category, NRR is estimated at 110–125% — driven by expanding
              card spend as companies grow and by cross-sell of BILL Pay, Travel, and Accounting modules to existing
              cardholders [C201]. This estimate is consistent with Ramp's public claim to be the "fastest-growing
              corporate card" and the implied revenue trajectory from total raised and stated ARR estimates [C202].

              Churn risk is structurally moderated by switching costs: once a company has integrated Ramp with its
              accounting system (QuickBooks, Xero, Sage, NetSuite) and trained employees on the Ramp app, migrating to a
              competitor requires re-integrating, re-issuing physical cards, re-training users, and migrating historical
              receipt data [C203]. The integration depth of Ramp's ERP connections means that the product becomes
              increasingly embedded in the customer's month-end close process over time, progressively raising switching
              costs [C204]. Adverse signals include reports of some companies switching from Ramp to Brex when scale
              requires Brex's enterprise sales support [C205], suggesting competitive churn risk is highest in the upper
              mid-market (500–2,000 employees), where both products compete most aggressively.

              Ramp's land-and-expand motion begins with the corporate card, then adds Bill Pay, Ramp Travel, and Ramp
              Accounting as expansion products — each adding incremental fees and embedding Ramp more deeply into
              financial workflows [C206]. Estimated take-rate expansion from card-only to full-suite is approximately
              3–5× in terms of revenue per customer, making multi-product cross-sell the primary driver of NRR above
              100% [C207]. Revenue concentration is not publicly disclosed; given 25,000+ customers and a predominantly
              SMB/mid-market base, top-10 customer revenue concentration is likely under 15–20% of total ARR, though the
              presence of large enterprise accounts (e.g. Shopify) creates some tail risk [C208].
            claimRefs: []
      - number: '6.5'
        title: Concentration Risk and Channel Dependence
        blocks:
          - type: paragraph
            body: >
              Ramp's customer distribution is broad by count (25,000+), but revenue is inherently more concentrated in
              the larger accounts that drive higher card volume [C209]. The top decile of customers (roughly 2,500
              accounts) likely accounts for a disproportionate share of card spend given the wide distribution of
              company sizes in the customer base. Ramp has not disclosed Herfindahl or top-customer concentration
              metrics, which is a standard diligence request for Series D+ companies [C210].

              Channel dependence is a moderate risk: a meaningful portion of Ramp's new logo acquisition flows through
              VC network partnerships and the Ramp for Startups programme. If venture investment slows (as in
              2022–2023), fewer new startup customers are formed, reducing PLG pipeline [C211]. Ramp mitigated this
              concentration in 2023–2024 by building a direct enterprise sales team targeting the 500–5,000 employee
              segment, reducing reliance on startup-channel growth [C212]. The Ramp Vendor Network (connecting suppliers
              to virtual card acceptance) also creates a direct enterprise vendor channel that is independent of the VC
              pipeline [C213].

              Procurement blockers are specific to the large-enterprise and government segments: Ramp's lack of SOC 2
              Type II at launch (later attained), limited FedRAMP status, and US-only card issuance have blocked deals
              with federal agencies, multinationals, and companies with EU data-residency requirements [C214]. These
              blockers are addressable but represent a real ceiling on total addressable customer count in the medium
              term [C215].
            claimRefs: []
