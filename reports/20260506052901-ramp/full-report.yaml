  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >
              Ramp's product is designed around the corporate finance team's daily workflow: from issuing corporate
              cards to employees, capturing receipts automatically, enforcing spending policies in real time, routing
              invoices for approval, coding transactions to the right ERP GL accounts, booking travel with policy
              guardrails, and optimising vendor contracts through AI-powered benchmarking. The platform replaces 3–5
              point solutions (separate card, expense tool, AP software, travel tool, treasury account) with a single
              integrated suite. [C142] [C143]

              The customer workflow begins with card issuance: finance teams issue unlimited virtual or physical Visa
              cards to employees with spending limits, merchant category restrictions, and automatic receipt matching.
              Transactions are automatically coded to GL accounts via AI rules, reducing manual reconciliation from
              hours to minutes. Bill Pay automates vendor invoice ingestion, approval routing, and payment via ACH/wire.
              Accounting auto-syncs to NetSuite, QuickBooks, Sage, Workday, SAP, and 200+ other ERP systems. [C144]
              [C145]
            claimRefs: []
      - number: '5.2'
        title: Product Module Map and Platform Architecture
        blocks:
          - type: paragraph
            body: >
              Ramp's platform has seven modules on a unified data model: (1) **Ramp Card** — Visa corporate card with
              1.5% unlimited cashback, virtual + physical, employee spend controls; (2) **Ramp Expense** — AI receipt
              capture, mileage tracking, policy enforcement, manager approvals; (3) **Ramp Bill Pay** — vendor invoice
              management, OCR extraction, approval routing, ACH/wire payment; (4) **Ramp Accounting** — GL coding
              automation, ERP sync, month-end close acceleration; (5) **Ramp Intelligence** — AI vendor benchmarking,
              duplicate detection, savings insights, contract analysis; (6) **Ramp Travel** — direct flight/hotel
              booking, travel policy enforcement, receipt auto-capture; (7) **Ramp Treasury** — yield-bearing corporate
              cash management, money market sweep accounts. [C146] [C147]

              The architecture is cloud-native (AWS), with a core data warehouse aggregating all transaction data across
              modules; this unified data model is what enables the AI intelligence features to operate across all spend
              categories. The platform exposes a REST API for custom integrations and supports SSO via SAML 2.0, OAuth
              2.0, and SCIM for enterprise directory provisioning. [C148] [C149]
            claimRefs: []
      - number: '5.3'
        title: Technology Differentiation and AI Capabilities
        blocks:
          - type: paragraph
            body: >
              Ramp's primary technology differentiator is its AI Intelligence suite, powered by anonymised aggregate
              spend data from 25,000+ customers. The core capabilities include: (1) **Vendor price benchmarking** —
              shows each customer how their vendor prices compare to peers in the same industry and company size; (2)
              **Duplicate detection** — surfaces overlapping SaaS subscriptions (e.g., multiple Zoom accounts); (3)
              **Contract intelligence** — AI analysis of vendor contracts for renewal dates, auto-renew clauses, and
              hidden fees; (4) **Spend anomaly detection** — alerts for unusual spending patterns that may indicate
              policy violations or fraud. [C150] [C151]

              The data network effect: the more customers use Ramp, the larger the anonymised benchmark dataset; the
              larger the dataset, the more accurate and industry-specific the benchmarks; more accurate benchmarks
              create higher customer savings, driving higher loyalty and lower churn — a compounding flywheel that
              increases in value over time. This data moat is not easily replicable and is Ramp's most defensible
              technological asset. [C152]
            claimRefs: []
      - number: '5.4'
        title: Integration, Deployment, Reliability, and Roadmap
        blocks:
          - type: paragraph
            body: >
              Ramp deploys in hours, not months: the self-serve onboarding flow allows new customers to apply for a
              corporate card, set up expense policies, and connect their ERP in a single-day process. This is a
              structural architectural advantage over SAP Concur, which requires months-long implementation projects.
              Ramp's 200+ ERP integrations are maintained via a combination of native partner integrations (QuickBooks,
              NetSuite, Xero, Sage Intacct, Workday, SAP) and middleware-based connections. [C153] [C154]

              The product roadmap through 2026–2027 focuses on: (1) enterprise-grade security and compliance (SOC 2 Type
              II achieved; working on FedRAMP for government customers); (2) global card expansion (UK launch reportedly
              in planning for 2026); (3) deeper AI procurement and contract intelligence; (4) Ramp for Accounts
              Receivable (AR) as the next major module. The company publishes a public changelog and engineering blog,
              providing transparency into product velocity. [C155] [C156]
            claimRefs: []
      - number: '5.5'
        title: Trust, Security, Privacy, and Compliance
        blocks:
          - type: paragraph
            body: >
              Ramp holds SOC 2 Type II certification for security, availability, and confidentiality. The card program
              is regulated under Sutton Bank's banking license and compliance framework; Ramp as the program manager
              complies with Visa's card program rules, PCI-DSS for cardholder data, and BSA/AML requirements via Sutton
              Bank. Customer data is encrypted at rest (AES-256) and in transit (TLS 1.3); GDPR compliance is relevant
              for any EU customer data handling. [C157] [C158]

              Privacy controls: Ramp does not sell individual customer spend data; anonymised and aggregated data is
              used only for the benchmark intelligence features; customers opt-in to the benchmark program. A dedicated
              security team handles vulnerability disclosure, penetration testing, and incident response. [C159]
            claimRefs: []
