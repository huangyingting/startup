  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Ramp's revenue has two primary streams: (1) **Net interchange income** from corporate Visa card spend —
              Ramp earns gross interchange of approximately 1.5–2% per transaction from Visa network, then returns 1.5%
              to customers as cash back, retaining the spread above 1.5%; at $25B in annualised card volume, the
              estimated net interchange revenue is approximately $25–75M (0.1–0.3% net take rate). (2) **SaaS
              subscription fees** — Ramp Plus at ~$15/user/month, generating subscription revenue from paying customers
              who upgrade from the free tier. [C106] [C107]

              Secondary revenue streams include: bill pay transaction fees (flat fee or percentage per payment),
              treasury NII (interest income on customer deposits held in money market instruments — significant at
              current 4–5% rates), and potential premium API/integration fees. At $500–700M estimated ARR with $25B card
              volume, the implied average annual revenue per customer is approximately $20,000–28,000, suggesting
              meaningful SaaS subscription contribution beyond interchange alone. [C108] [C109]

              **Critical gap**: Ramp does not disclose official revenue figures. All estimates are triangulated from
              card volume disclosures, customer count, and pricing data — carrying substantial uncertainty. The actual
              revenue mix between interchange and SaaS is not publicly confirmed. [C110]
            claimRefs: []
      - number: '4.2'
        title: Unit Economics and Operating Efficiency
        blocks:
          - type: paragraph
            body: >
              Ramp's unit economics are estimated to be among the most efficient in B2B fintech: ~$250,000–470,000
              estimated revenue per employee at 1,500–2,000 employees and $500–700M ARR (vs. industry median of
              approximately $150–200K). The PLG acquisition model with VC distribution reduces CAC relative to
              traditional SaaS enterprise sales. [C111] [C112]

              The LTV/CAC dynamic is favourable: corporate card customers have inherently high switching costs (moving
              expense data, changing card numbers, reconfiguring ERP integrations); average card spend per customer
              increases as the customer company grows; and the free tier has minimal direct CAC while viral/network
              growth compounds customer acquisition. However, without public NRR or churn data, these estimates carry
              significant uncertainty. [C113] [C114]

              Gross margin is structurally challenged by the interchange model: SaaS revenue has 80–90%+ gross margins,
              but net interchange after rebates has thin margins (approximately 1–3% of net revenue). Overall blended
              gross margin is estimated at 60–75% depending on revenue mix — lower than pure SaaS companies but
              consistent with fintech platforms with embedded payments. [C115]
            claimRefs: []
      - number: '4.3'
        title: Capital Structure and Funding
        blocks:
          - type: paragraph
            body: >
              Ramp has raised approximately $1.37B in primary equity across 5 rounds (seed, Series A–C, 2024 growth
              round). The March 2024 growth round at $7.65B was a down-round from the $8.1B Series C December 2021 peak
              — a 5.5% valuation haircut that reflects the 2022–2023 fintech multiple compression from ZIRP-era peak
              multiples. [C116] [C117]

              No venture debt or credit facilities have been publicly disclosed; Ramp's recurring interchange income
              provides organic cash generation. The 2024 down-round suggests Ramp consumed capital in 2022–2023 and
              needed growth funding despite positive revenue trajectory — implying either operating losses or
              significant growth investment spending that consumed primary round proceeds. [C118]

              Capital adequacy: at $150M in the 2024 round and an estimated $500–700M ARR with possible positive unit
              economics, Ramp's runway should be substantial unless it is heavily investing in enterprise sales,
              international expansion, or AI product development. Without burn rate disclosure, actual runway cannot be
              calculated. [C119]
            claimRefs: []
      - number: '4.4'
        title: Financial Gaps and Risks
        blocks:
          - type: paragraph
            body: >
              The primary financial risk is the lack of disclosed profitability: Ramp has not confirmed whether it is
              EBITDA-positive or still burning cash. The 2024 down-round and ongoing need for growth capital suggests
              the company has not yet achieved sustained profitability. Interchange revenue is also inherently cyclical
              (tied to card spend volume which declines in recessions), and the SaaS revenue depends on customer
              retention assumptions that are not publicly reported. [C120] [C121]

              Regulatory risk to revenue: the CFPB interchange regulation risk could materially compress Ramp's net
              interchange take rate; a 50% reduction in net interchange would reduce this revenue stream by $12–38M
              annually — a meaningful hit if interchange represents 30–40% of total revenue. The SaaS layer provides
              some diversification against this risk. [C122]

              ARR growth sustainability: at 100% estimated YoY growth in FY2023–2024, Ramp needs to sustain ~30–50%
              growth to justify the $13B implied valuation at current EV/ARR multiples. Growth deceleration is the
              primary financial valuation risk; without official disclosure, this cannot be verified independently.
              [C123]
            claimRefs: []
