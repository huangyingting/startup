summary:
  headline: |
    Ramp 100%+ 增长、25,000 客户和 AI 原生护城河足以支撑观察评级；$13B 老股估值相当于 18–26× 未确认 ARR，定价激进，必须先做一手尽调。
  overallScore: 6.4
