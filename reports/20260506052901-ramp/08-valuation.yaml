        Ramp's $1.37B total primary capital creates a significant liquidation preference overhang; preferred
        shareholders hold liquidation preferences ahead of common equity, meaning early employees and common holders see
        diluted returns in downside scenarios below 2–3× the last primary round.
      type: inferred
