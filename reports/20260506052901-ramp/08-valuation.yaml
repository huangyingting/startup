        Investors entering at the $13B secondary should model a 30–40% markdown to primary equity price in stress
        scenarios; the $7.65B primary (March 2024) represents the most recent arm's-length price discovery, and the gap
        between $7.65B primary and $13B secondary reflects secondary liquidity premium and market re-rating, not
