  claims:
    - id: CV001
      statement: >-
        Ramp's investment thesis is grounded in three compounding advantages: a best-in-class AI-automated product that
        delivers faster time-to-value than any incumbent, a data moat from $25B+ annualised card volume that becomes
        harder for new entrants to replicate each year, and a land-and-expand motion that drives compounding NRR without
        proportional customer acquisition cost.
      type: inferred
      topic: investment-thesis
      sourceRefs:
        - SV022
        - SV009
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV001
      contradictsClaimRefs: []
    - id: CV002
      statement: >-
        Ramp's AI Intelligence suite aggregates anonymised transaction data from 25,000+ businesses to generate spend
        benchmarks, GL-coding accuracy improvements, and anomaly detection models; this cross-customer data aggregation
        creates a proprietary training dataset that gives Ramp an AI accuracy advantage that scales with customer count
        — a structural moat for new entrants.
      type: inferred
      topic: AI-data-moat
      sourceRefs:
        - SV022
        - SV024
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV002
      contradictsClaimRefs: []
    - id: CV003
      statement: >-
        Ramp's estimated NRR of 110–125% creates a compounding revenue effect where each customer cohort grows in value
        over time without proportional CAC; if sustained, this means Ramp's revenue compounds at NRR× each year from
        existing customers, in addition to new customer acquisition.
      type: estimated
      topic: NRR-compounding-value
      sourceRefs:
        - SV024
        - SV009
      confidence: low
      freshness: current
      answersQuestionRefs:
        - QV003
      contradictsClaimRefs: []
    - id: CV004
      statement: >-
        The Credit Card Competition Act (anti-thesis: interchange compression) represents a thesis-level risk: a 30–50%
        cut in commercial card interchange rates would remove the primary revenue source that funds Ramp's card reward
        programme and economics, requiring 2–3× SaaS subscription growth to maintain margin neutrality — not yet
        demonstrated.
      type: inferred
      topic: CCCA-anti-thesis
      sourceRefs:
        - SV015
        - SV016
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV004
      contradictsClaimRefs: []
    - id: CV005
      statement: >-
        Competitive durability is the second anti-thesis pillar: Brex ($12.3B private), BILL/Divvy, and SAP Concur are
        all investing in AI features converging with Ramp's differentiation; Ramp has not demonstrated a 5-year moat at
        scale, and the current AI advantage may compress as the market matures.
      type: inferred
      topic: competitive-durability-anti-thesis
      sourceRefs:
        - SV022
        - SV023
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV004
      contradictsClaimRefs: []
    - id: CV006
      statement: >-
        Valuation discipline is the third anti-thesis: at $13B secondary (18–26× estimated ARR), Ramp has no margin of
        safety if growth decelerates to 60% YoY — a 60% growth scenario implies 10–12× ARR at IPO, or $6–8B vs $13B
        entry, representing a 40–50% loss of invested capital.
      type: estimated
      topic: valuation-anti-thesis
      sourceRefs:
        - SV015
        - SV026
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV005
      contradictsClaimRefs: []
    - id: CV007
      statement: >-
        Ramp's most recent primary financing was $150M at $7.65B (March 2024), a confirmed 6% down-round from the $8.1B
        December 2021 Series C peak; the $7.65B primary is the last price-confirmed equity event.
      type: observed
      topic: primary-valuation-history
      sourceRefs:
        - SV003
        - SV018
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV006
      contradictsClaimRefs: []
