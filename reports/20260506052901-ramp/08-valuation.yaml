      statement: >-
        Secondary market transactions in late 2024 implied Ramp valuations of approximately $13B, driven by insider
        tender offers and secondary platform trades; these secondary valuations reflect more limited price discovery
        than primary rounds and cannot be treated as equivalent to a primary equity raise at that price.
      type: observed
      topic: secondary-valuation
      sourceRefs:
        - SV001
        - SV002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV006
      contradictsClaimRefs: []
    - id: CV009
      statement: >-
        At the $13B secondary implied valuation and an estimated $500–700M ARR midpoint of $600M, Ramp trades at
        approximately 18–26× ARR — a premium to public fintech benchmarks (5–10× for mature growers) but consistent with
        private market pricing for 100%+ ARR growth companies in 2024.
      type: estimated
