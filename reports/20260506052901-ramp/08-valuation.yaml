callouts:
  - title: Track / conditional buy — strong product; high valuation; key financials unconfirmed
    body: >
      Ramp is the strongest independent evidence-backed spend management platform of the cohort, with compelling
      product-market fit, elite named logos, and an AI moat that is still being built. The $13B secondary valuation is
      mathematically supportable in the bull and base scenarios, but the absence of confirmed NRR, audited ARR, and the
      unresolved CCCA/Sutton Bank risks prevent full conviction. Recommendation: Track as a high-priority investment;
      initiate conditional buy position pending successful diligence on NRR, credit facility, and regulatory exposure.
    calloutType: recommendation
    claimRefs:
      - CV001
      - CV007
      - CV014
      - CV025
