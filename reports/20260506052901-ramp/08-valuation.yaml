      statement: >-
        SEC Form D filings confirm Ramp's primary funding history: $15M seed, $115M Series A ($1.6B valuation, March
        2021), $300M Series B ($3.9B, August 2021), $750M Series C ($8.1B, December 2021), $150M Growth ($7.65B, March
