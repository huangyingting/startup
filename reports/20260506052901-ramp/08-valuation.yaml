        - Market cap ~$7–9B; ~5.8–7× revenue
        - 'Relevant: AP automation + corporate card (Divvy) at larger scale'
        - Mature growth; Ramp's 100%+ growth deserves significant premium to BILL
      - - Expensify (public)
        - ARR ~$50M; growth ~flat to -5%
        - Market cap ~$300–500M; ~6× revenue
        - 'Relevant: expense management SaaS but at much smaller scale and declining'
        - Growth too different — negative growth → 5–6× multiple not applicable to Ramp
      - - Coupa Software (private, Thoma Bravo)
        - ARR ~$1B at acquisition; growth ~25%
        - Acquisition price $8B (2023); ~8× ARR
        - 'Relevant: spend management at scale — shows M&A floor for category leader'
        - Strategic acquirer premium; PE buyout comps tend to compress to cash flow multiples
      - - Navan (private, ex-TripActions)
        - Est. ARR ~$500M; growth ~60% YoY
        - ~$9.2B private (2022); ~18× ARR
        - 'Adjacent: travel + expense; competing with Ramp Travel module'
        - Last round was 2022 peak; not refreshed; travel focus limits applicability
      - - Rippling (private)
        - Est. ARR ~$400M; growth ~100% YoY
        - ~$13.5B private (2024); ~34× ARR
        - 'Adjacent: HR/finance automation for SMB; closest growth-rate comp'
        - HR-first product; not a pure spend-management comparable
      - - Palantir / Veeva (public, high-growth SaaS)
        - High-growth SaaS at 50–80% growth
        - 20–30× NTM revenue at comparable growth phase
        - 'Framework reference: market rate for high-growth vertical SaaS'
        - Not fintech; limited comparability to interchange-revenue model
    notes: Enumeration is partial. Only public or widely reported private valuations included.
  - id: TV005
    title: Thesis-break and kill triggers table
    subtitle: Conditions that would invalidate the investment thesis for Ramp
    claimRefs:
      - CV004
      - CV005
      - CV015
      - CV022
      - CV024
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - CCCA passage / commercial interchange cap
        - CCCA Senate floor vote passes or Visa announces voluntary commercial rate reduction >15%
        - Removes 30–50% of gross revenue; SaaS offset requires 2–3× expansion not yet demonstrated
        - Exit position or hedge; request revenue bridge from management
      - - Sutton Bank BIN exit
        - OCC enforcement against Sutton; Sutton announces BaaS wind-down
        - 12–18 month card programme disruption; customer churn during migration
        - Immediate valuation impact; exit recommendation if no confirmed replacement bank
      - - NRR falls below 100%
        - Management discloses NRR below 100% or G2 reviews trend below 4.5/5.0 for 2 consecutive quarters
        - Land-and-expand thesis broken; revenue model dependent on new customer acquisition only
        - Re-evaluate at 6–8× ARR vs current 18–26×
      - - Revenue growth decelerates below 60% YoY
        - Two consecutive quarters of <60% YoY growth confirmed in diligence or subsequent reporting
        - Valuation compression to 10–12× ARR floor; IPO premium evaporates
        - Model down-round risk; negotiate ratchet protection if Series E investor
      - - Key person exit (Glyman or Atiyeh)
        - CEO or CTO departs; no confirmed successor within 90 days
        - Market confidence shock; talent exodus risk; AI roadmap uncertainty
        - Evaluate board response; consider reducing position if succession unclear
      - - Data breach / CFPB enforcement order
        - Material data breach confirmed or CFPB consent order filed
        - Customer churn; regulatory cost; enterprise pipeline freeze
        - Exit recommendation if consent order restricts core card or expense features
  - id: TV006
    title: Final diligence asks table
    subtitle: Critical evidence needed before Series E or secondary investment in Ramp
    claimRefs:
      - CV024
      - CV025
      - CV011
      - CV012
      - CV007
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Audited financials FY2023–2024
        - Income statement, balance sheet, cash flow; total ARR confirmed
        - Required to confirm revenue mix (interchange vs SaaS), burn rate, and path to profitability
        - CFO / financial data room; auditor letter if available
      - - NRR and GRR by customer vintage
        - Cohort retention waterfall; enterprise vs SMB NRR split
        - NRR is the primary lever for the land-and-expand thesis; current 110–125% estimate is unconfirmed
        - CFO data room; confirm with 2021 cohort retention (5-year track record)
      - - Top-10 customer revenue concentration
        - Revenue schedule showing top 10 customers as % of ARR
        - Single-customer concentration risk at enterprise tier (e.g. Shopify)
        - Management diligence session; term sheet condition
      - - Credit facility terms and covenants
        - Facility size, drawdown, maturity, covenants (ARR, NRR, liquidity triggers)
        - Working capital risk at $2B/month float; covenant breach risk in stress scenario
        - CFO / debt document room
      - - Sutton Bank programme agreement
        - Exit provisions; regulatory exam history; programme fees; exclusivity
        - BIN sponsor concentration is thesis-critical; exit provisions determine transition cost
        - Legal due diligence; request BIN agreement redacted except exit provisions
      - - CCCA sensitivity model
        - Revenue bridge under 50% interchange cut; SaaS revenue as % of total
        - Interchange compression is the largest single risk; model should confirm survivability
        - CFO / product pricing team
      - - CFO appointment
        - Name, start date, compensation
        - CFO role critical for IPO readiness and institutional investor confidence
        - Board chair / recruiter confirmation
