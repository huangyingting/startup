      relatedTableRefs: []
    - type: missing-source
      severity: moderate
      topic: Comparable valuation table — private comparables use last-primary-round valuations
      missingEvidence: >-
        Brex, Navan, and Rippling private valuations are from primary rounds that may not reflect current secondary
        market pricing; Ramp's own secondary valuation vs primary divergence suggests all private comps should be
        adjusted.
      whyItMatters: >-
        Using stale primary valuations for private comps may overstate the peer valuation multiple, making Ramp's own
        multiple look more reasonable than it is.
      relatedTableRefs:
        - TV004
      relatedQuestionRefs: []
    - type: missing-source
      severity: minor
      topic: CCCA probability — no authoritative probability estimate available
      missingEvidence: >-
