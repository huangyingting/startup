  evidenceGaps:
    - type: missing-source
      severity: major
      topic: Audited financials — Ramp has not published audited financial statements
      missingEvidence: >-
        Ramp has not disclosed audited income statement, balance sheet, or cash flow statement. ARR, NRR, burn rate, and
        gross margin are analyst estimates.
      whyItMatters: >-
        Without audited financials, the valuation multiple analysis rests on unconfirmed ARR; a 20% error in ARR
        estimate changes the implied multiple by 4–5× points.
      relatedQuestionRefs:
        - QV020
      relatedTableRefs: []
    - type: missing-source
      severity: major
      topic: IPO filing status — no S-1 or confidential filing confirmed
      missingEvidence: >-
        Ramp has not confirmed plans for a public offering; no confidential S-1 has been publicly indicated as of Q1
        2026.
      whyItMatters: >-
        Without an IPO timeline, secondary investors have no confirmed path to liquidity and must rely on secondary
        platform trades or strategic acquisition.
      relatedQuestionRefs:
