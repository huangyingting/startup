      - number: '3.4'
        title: 功能对比与市场动态
        blocks:
          - type: paragraph
            body: >
              正面对比显示，Ramp 在 AI 智能、ERP 集成广度、部署速度和 SMB/中端市场性价比上领先；Brex 在企业级全球卡功能和品牌认知上领先；SAP Concur 在企业级合规深度上领先。市场正在向 AI
              优先平台收敛，Ramp 对 Intelligence 的早期投入在这一维度上相对传统竞争对手形成 12–18 个月领先。 [CP012] [CP013]

              定价对比：Ramp 核心产品免费（卡 + 费用），Ramp Plus 为 $15/用户/月；Brex 基础层同样免费并设付费层；SAP Concur 基础价 $8–12/用户/月，实施费可观；BILL 平台收费
              $45–55/月。Ramp 的免费增值模式降低采用摩擦，但变现高度依赖卡交易额和 SaaS 增购。 [CP014]
