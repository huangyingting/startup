      - number: '7.6'
        title: 图表附录
        blocks:
          - type: callout
            title: Sutton Bank 依赖和交换费压缩是投资逻辑的关键风险
            body: >
              Ramp 面临两类结构上难以分散的风险：（1）Sutton Bank BIN 赞助集中——如果 Sutton 在监管压力下退出 BaaS 关系，Ramp 必须迁移 25,000+ 个客户卡项目，扰动期 6–18
              个月；（2）CCCA / Durbin 延伸导致交换费压缩——商业卡交换费若被砍 50%，SaaS 绑定必须提升 2–3× 才能维持利润率中性。两类风险都是行业性风险，并非 Ramp 独有，但相对于 Ramp
              当前收入结构，量级足以影响投资逻辑。两项风险的缓释进展都应成为标准 term sheet 要求。
            calloutType: risk
            claimRefs:
              - CR002
              - CR004
              - CR016
              - CR031
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Ramp 的乐观逻辑，是押注它能成为美国 SMB 和中端市场支出管理的品类定义型金融科技平台。Ramp 做出的产品比任何既有厂商（SAP
              Concur、Coupa）更快交付价值，自动化密度更高，同时在产品宽度上匹配或超过最接近的私有竞争对手 Brex；客户入驻后，交付边际成本为负或为零 [CV001]。AI Intelligence
              套件构成真实的数据护城河：来自 25,000+ 家企业的聚合交易数据、$25B+ 年化卡交易量，以及在数十亿笔已分类交易上训练的 AI 模型，共同形成准确率和基准比较优势，新进入者结构上很难复制
              [CV002]。先落地再扩张的打法（企业卡 → Bill Pay → Travel → Accounting）推动估计 NRR 达到
              110–125%，意味着每一年度队列都能贡献复利式收入，而无需等比例增加获客成本 [CV003]。

              反向逻辑有三根支柱：（1）交换费压缩——如果 CCCA 通过，或 Visa 商业费率被谈低，Ramp 的主要收入流会面临 30–50% 的结构性压缩，需要 SaaS 增长 2–3× 来补偿，而这一点尚未被证明
              [CV004]；（2）竞争耐久性——Brex、BILL/Divvy 和 SAP Concur 都在积极投入 AI 功能，正在向 Ramp 的差异化收敛，Ramp 尚未证明 5 年护城河可持续
              [CV005]；（3）估值纪律——按老股交易隐含的估计 ARR 18–26×，风险调整后的回报对增长放缓高度敏感；若 YoY 增长降至 60%，按公开市场可比公司估值，会隐含 40–50% 的估值下调
              [CV006]。
            claimRefs: []
