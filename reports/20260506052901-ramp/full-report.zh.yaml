      - number: '2.4'
        title: 竞争动态与市场成熟度
        blocks:
          - type: paragraph
            body: >
              美国企业支出管理市场处在中局扰动阶段：传统玩家（SAP
              Concur、Oracle、Coupa）握有企业级装机基础，但中端市场正输给云原生挑战者。云原生赛段正在分化为一体化平台（Ramp、Brex）和点状解决方案（Expensify、BILL）。 [CM017]
              [CM018]

              市场时点分析显示 Ramp 卡在拐点进入：2020–2022 年 VC 融资潮孕育了创业公司客户底盘；2022–2024 年成本意识上升让降本成为 CFO 优先事项；2024–2026 年 AI
              浪潮创造了产品差异化窗口，Ramp 已用 Ramp Intelligence 提前切入。公司增速快于整体市场，说明其在拿份额。 [CM019] [CM020]

              监管顺风：ACH 和开放银行要求推动市场转向一体化资金与支付平台；反过来，潜在信用卡交换费监管（Durbin 后扩展至商业卡）可能压缩收入模型。 [CM021]
