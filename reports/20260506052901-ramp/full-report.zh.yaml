      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Ramp 最关键的单点失效依赖是 Sutton Bank。这家 Iowa 州特许银行同时担任 Ramp 的 BIN 赞助方、发卡行和主要监管接口。如果 Sutton Bank 退出 Ramp
              项目（原因可能是监管执法、资本充足率问题，或战略性退出 BaaS），Ramp 必须寻找新的发卡银行，并迁移 25,000+ 个客户卡项目——过程可能耗时 6–18 个月，迁移期间会扰动所有客户的发卡
              [CR016]。这是 BaaS 生态里的已知风险；Brex 等竞争对手曾迁移银行合作伙伴，并经历客户扰动 [CR017]。

              Visa 的卡网络规则是第二个重要依赖：Visa 的交换费表、争议解决规则或商业卡项目要求一旦变化，都可能显著影响 Ramp 的经济模型。Visa 正在积极与商户重新谈判商业交换费率，并探索替代支付轨道
              [CR018]。AWS 基础设施依赖：Ramp 的平台在 AWS 上采用多区域部署；除非多区域故障切换已完整落地，否则 AWS US-East 宕机会影响核心平台
              [CR019]。按客户数看，QuickBooks（Intuit）是 Ramp 最大的集成伙伴；Intuit API 变更或有意的竞争限制，可能扰动 ERP 集成，而这一集成是 Ramp 对 60–70% SMB
              客户的主要粘性来源 [CR020]。

              资本提供方依赖：Ramp 使用信贷额度为卡消费与客户付款之间的浮款融资。如果信贷市场收紧（如 Q4 2022），Ramp 以优惠利率获取营运资本的能力可能受限，进而迫使公司提高费用，或下调客户卡额度
              [CR021]。如果失去 VC 合作伙伴关系（例如 Founders Fund 或 Thrive Capital 大幅退出），Ramp 的初创客户管线也可能受影响，因为这些机构会向其被投公司联合推广 Ramp
              [CR022]。
