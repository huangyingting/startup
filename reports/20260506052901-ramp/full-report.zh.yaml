      - number: '2.3'
        title: 买方分层与增长驱动因素
        blocks:
          - type: paragraph
            body: >
              Ramp 的核心买方分层包括：(1) VC 支持的创业公司（通过 VC 合作计划获取），(2) 高增长 SMB（$5M–$50M ARR），(3) 中端市场公司（$50M–$500M 收入），以及 (4)
              早期企业级客户（$500M+）。每个分层的购买动机、卡消费额和软件预算都不同。 [CM011] [CM012]

              **增长驱动因素**：(1) 代际切换——数字原生公司的财务团队期待现代、API 优先的软件，而不是 SAP Concur；(2) AI 自动化——Ramp 的 AI 套件减少手工工作，支撑替换传统工具；(3)
              成本压力——后 ZIRP 环境下，CFO 主动追求支出可见性和节省洞察；(4) VC 渠道——数百家投资机构向被投公司推荐 Ramp，形成复利式分发飞轮。 [CM013] [CM014]

              **增长约束**：(1) 交换费压缩——Visa/Mastercard 费率压力，以及 Durbin Amendment 可能扩展至信用卡，都可能压缩 Ramp 净抽成率；(2)
              企业级销售复杂度——大型企业周期更长，需要合规认证，且通常被 SAP/Oracle 锁定；(3) 国际限制——Ramp 的卡目前仅限美国，压住 TAM；(4) 竞争——Brex 正在重金投入 AI
              优先功能和企业级市场，直接在 Ramp 核心分层竞争。 [CM015] [CM016]
            claimRefs: []
