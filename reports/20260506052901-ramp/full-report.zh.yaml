      - number: '5.3'
        title: 技术差异化与 AI 能力
        blocks:
          - type: paragraph
            body: >
              Ramp 的主要技术差异化来自 AI Intelligence 套件，动力是 25,000+ 客户的匿名聚合支出数据。核心能力包括：(1)
              **供应商价格基准**——显示每个客户的供应商价格相对同业、同规模公司处在什么位置；(2) **重复检测**——发现重叠的 SaaS 订阅（例如多个 Zoom 账号）；(3) **合同智能**——用 AI
              分析供应商合同的续约日期、自动续约条款和隐藏费用；(4) **支出异常检测**——对可能指向政策违规或欺诈的异常支出模式发出提醒。 [CE009] [CE010]

              数据网络效应：使用 Ramp 的客户越多，匿名基准数据集越大；数据集越大，基准越准确、越贴近行业；基准越准，客户节省越多，忠诚度越高、流失越低——这个复利飞轮会随时间增值。数据护城河不易复制，是 Ramp
              最可防守的技术资产。 [CE011]
            claimRefs: []
