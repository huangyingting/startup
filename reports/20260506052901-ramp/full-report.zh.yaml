        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >
              Ramp 已募集约 $1.37B 一级股权资本：种子轮（$15M，2020）、Series A（$115M，估值 $1.6B，2021 年 3 月，Founders Fund）、Series B（$300M，估值
              $3.9B，2021 年 8 月，Thrive Capital）、Series C（$750M，估值 $8.1B，2021 年 12 月，Coatue/D1 Capital），以及 2024 年 3
              月增长轮（$150M，估值 $7.65B，Khosla Ventures）。2024 年轮次较 2021 年 $8.1B 峰值为估值下调轮，反映 2022–2023 年金融科技估值倍数压缩周期。 [CO010]
              [CO011]

              2024 年底二级市场交易隐含估值约 $13B，较 2024 年 3 月一级轮溢价 70%，反映 Ramp ARR 增速上行和 AI 产品动能。按 $13B 估值和估计 $500–700M ARR 计算，隐含
              EV/ARR 倍数约 18–26x——这是由 AI 平台叙事支撑的溢价倍数。 [CO012] [CO013]

              主要投资者包括 Founders Fund（Peter Thiel）、Thrive Capital（Josh Kushner）、Coatue Management、Khosla Ventures、D1
              Capital Partners、Goldman Sachs（战略）、Stripe（战略）、Excel Venture Management、Spark Capital 和 Ali
              Rowghani。Goldman Sachs 和 Stripe 的战略投资带来纯财务资本之外的企业级分发可选性。 [CO014]
