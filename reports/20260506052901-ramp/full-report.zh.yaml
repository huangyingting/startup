  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争概览与市场结构
        blocks:
          - type: paragraph
            body: >
              美国企业支出管理市场有几个清晰竞争梯队，对应不同客户分层。在现代金融科技层，Ramp 和 Brex 是两大主导挑战者——产品范围、定价模型和 VC 背书相似，但战略重点不同。Ramp
              聚焦中端市场智能化与省钱叙事；Brex 则在创业公司聚焦和企业级之间反复摆动。 [CP001] [CP002]

              在传统企业级层，SAP Concur（SAP 旗下）仍是主导费用管理平台，在 ERP 集成上深、服务 Fortune 500 数百万用户。Concur 的弱点是 UX
              复杂、部署慢，且对中端市场而言定价不透明且偏高。Oracle Expense（Oracle Fusion 的一部分）服务类似客群。这些玩家靠切换成本保持高留存，但新中端市场订单正流向云原生替代品。 [CP003]

              BILL（上市公司，市值约 $4–5B）凭 500K+ 客户和与 QuickBooks 的深度集成主导小企业 AP 自动化；收购 Divvy 后获得公司卡产品，在 SMB 赛段形成对 Ramp
              的直接竞争。Expensify（上市公司，市值约 $500M）是费用追踪领域较小的直接竞争对手，拥有 10M+ 用户但增长下滑。 [CP004] [CP005]
            claimRefs: []
