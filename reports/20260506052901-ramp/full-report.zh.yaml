      - number: '5.2'
        title: 产品模块图与平台架构
        blocks:
          - type: paragraph
            body: >
              Ramp 平台基于统一数据模型包含七个模块：(1) **Ramp Card**——带 1.5% 无限返现的 Visa 公司卡，支持虚拟 + 实体卡和员工支出控制；(2) **Ramp Expense**——AI
              收据抓取、里程追踪、政策执行、经理审批；(3) **Ramp Bill Pay**——供应商发票管理、OCR 提取、审批路由、ACH/wire 支付；(4) **Ramp
              Accounting**——总账编码自动化、ERP 同步、月结提速；(5) **Ramp Intelligence**——AI 供应商基准、重复检测、节省洞察、合同分析；(6) **Ramp
              Travel**——机票 / 酒店直订、差旅政策执行、收据自动抓取；(7) **Ramp Treasury**——带收益的企业现金管理、货币市场扫款账户。 [CE005] [CE006]

              架构为云原生（AWS），核心数据仓库聚合各模块交易数据；正是这个统一数据模型，让 AI 智能功能能跨所有支出类别运行。平台开放 REST API 用于自定义集成，并支持 通过 SAML 2.0 和 OAuth
              2.0 实现 SSO，并用 SCIM 做企业目录配置。 [CE007] [CE008]
            claimRefs: []
