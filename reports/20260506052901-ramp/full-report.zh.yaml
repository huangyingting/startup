      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Ramp 的三人创始团队把金融科技、工程和运营能力拼在一起。**Eric Glyman (CEO)** 曾联合创立消费者省钱自动化创业公司 Paribus，并在 2016 年被 Capital One
              收购；他具备金融科技产品创始人背景和强投资者关系。**Karim Atiyeh (CTO)** 是 MIT 训练的计算机科学家，曾任职 Palantir，深厚的 ML/数据系统经验可直接用于 Ramp 的 AI
              智能路线图。**Gene Lee (COO)** 有 McKinsey 背景和运营专长，推动 Ramp 的获客与收入组织。 [CO006] [CO007]

              Ramp 董事会包括所有主要机构轮次的代表：Founders Fund（Series A）、Thrive Capital（Series B）、Coatue（Series C）和 Khosla
              Ventures（2024 年增长轮）。公司未公开披露独立董事；治理结构与典型后期私营公司类似，由投资方主导。 [CO008]

              关键人集中度是实质风险：Eric Glyman 是主要公众面孔、产品愿景负责人和投资者关系持有人；若他离职，很可能造成显著扰动。鉴于 Ramp 的 AI 差异化策略，Atiyeh
              的技术领导同样关键。公司没有公开继任计划。 [CO009]
