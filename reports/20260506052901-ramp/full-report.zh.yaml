      - number: '6.2'
        title: 采用轨迹与增长指标
        blocks:
          - type: paragraph
            body: >
              Ramp 从公开发布时（2020 年 2 月）约 1,000 客户，增长到 2024 年底超过 25,000 客户——不到五年增长 25× [CU008]。用卡消费衡量，这条曲线更陡：年化卡交易额到 2024
              年底约 $25B [CU009]，意味着单客户平均卡交易额约每年 $1M——符合一家中端市场 SMB 通过平台处理大量员工和供应商支出的画像。收入（估计 ARR $500–700M）从 2022 到 2024
              年约同比增长 4× [CU010]。

              Ramp 获客漏斗主要由自下而上的 PLG 主导：财务管理员通常通过同行推荐、软件评测网站（G2、Capterra）或 VC 网络介绍发现 Ramp，注册免费试用，集成银行账户，并在数天内生成虚拟卡
              [CU011]。快速见效是相对 SAP Concur 的关键差异点，后者通常需要 IT 主导的数月实施。Ramp for Startups 与头部 VC、加速器（Y
              Combinator）和律所合作，也提升漏斗顶部转化，把高意向推荐导入 Ramp 销售漏斗 [CU012]。

              2023 和 2024 年，Ramp 向上进入 500–2,000 员工分层，拉动平均合同价值（ACV）最高增长；公司增加企业级功能——SSO、SCIM、多实体合并和高级审批工作流——以降低企业级流失风险并增加
              seat 深度 [CU013]。2024 年销售团队扩编以承接更大潜在客户的入站需求，每单员工数显著上升 [CU014]。
