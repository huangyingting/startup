      - number: '8.4'
        title: 可比估值组
        blocks:
          - type: paragraph
            body: >
              Ramp 的可比公司集合横跨私有金融科技同业、公开支出管理软件公司，以及近期私募股权收购案例。主要私有可比公司是 Brex（2024 年私有估值约 $12.3B）、Navan（私有估值约 $9.2B）和
              Rippling（私有估值约 $13.5B）——它们都在相邻的 SMB 金融基础设施市场竞争 [CV017]。公开市场可比公司包括 BILL.com（FY2024 收入约 $1.3B，市值约 $7–9B，即约
              5.8–7x 收入）、Expensify（$50M ARR，市值约 $300–500M，即约 6x），以及 Paylocity/Paycom（HR/payroll SaaS，8–10x 收入）[CV018]。

              最相关的 M&A 可比交易是 Coupa Software，Thoma Bravo 在 2023 年以 $8B 收购，约为 8–9× forward ARR；不过 Coupa 当时增长为 20–30%，而
              Ramp 为 100%+，这使 Ramp 享有显著增长溢价 [CV019]。在当前 2024 年市场条件下，增长 40–80% 的公开金融科技 / SaaS 公司 EV/Revenue 倍数为 8–15× NTM
              revenue；Ramp 若保持 100%+ 增长，可获得 15–25× NTM multiple，对 $700M ARR 的公允价值为 $9–17.5B [CV020]。隐含 $13B
              的老股交易位于该区间高端，需要持续保持上四分位增长才站得住 [CV021]。
            claimRefs: []
