            body: >
              就早期尽调而言，Ramp 的客户证据扎实：25,000+ 具名客户、头部具名标杆客户（Shopify、OpenAI、Anduril）、G2 上 1,900+ 条评价给出 4.8/5.0，以及估计 110–125%
