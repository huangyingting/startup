      - number: '6.3'
        title: 具名客户证据与案例研究
        blocks:
          - type: paragraph
            body: >
              Ramp 在官网维护公开客户故事库，包含具名案例和成果指标 [CU015]。经多个可信公开来源确认的具名客户包括 OpenAI、Shopify、Anduril、Lemonade、Pave、Ro
              Health、Attentive、Hims & Hers 和 Webflow [CU016]。最具说明性的案例是：Shopify（企业级全球部署，用于员工费用和公司卡），其选择 Ramp 而非 Brex，明确因为
              Ramp 的 ERP 集成质量 [CU017]；OpenAI（替换原卡和费用供应商；Ramp 快速发卡被列为关键原因）[CU018]；以及 Anduril Industries（防务科技，显示 Ramp
              进入更高安全要求行业）[CU019]。

              评测平台数据提供独立印证：截至 2025 年初，Ramp 在 G2 上来自 1,900+ 条评价的平均分为 4.8/5.0，评价者将易设置、AI 收据匹配和 ERP 集成列为主要优势
              [CU020]。Capterra（800+ 条评价）显示类似的 4.9/5.0 平均分，自动报销单和虚拟卡管理常被称赞 [CU021]。评价中的常见负面主题包括：国际卡支持有限、与 QuickBooks
              偶发同步延迟，以及从 Concur 差旅预订功能迁移的公司存在学习曲线 [CU022]。这些负面信号与已知产品缺口一致，而不是根本性平台问题。

              来自软件评测平台的第三方分析师指出，Ramp 的 NPS 高于 B2B SaaS 行业平均（估计 40–60），但 Ramp 未发布官方 NPS 数据 [CU023]。自 Ramp 2021 年首次出现在 G2
              以来，G2 满意度得分持续高于 4.7/5.0，说明客户满意度稳定，并非蜜月期评价 [CU024]。
