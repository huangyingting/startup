  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Ramp 收入有两条主线：(1) **净交换费收入**，来自公司 Visa 卡消费——Ramp 从 Visa 网络每笔交易赚取约 1.5–2% 毛交换费，再向客户返还 1.5% 作为返现，留存 1.5%
              以上的利差；以 $25B 年化卡交易额计，估计净交换费收入约 $25–75M（0.1–0.3% 净抽成率）。(2) **SaaS 订阅费**——Ramp Plus 约
              $15/用户/月，由从免费层升级的付费客户贡献订阅收入。 [CI001] [CI002]

              第二收入来源包括：账单支付交易费（按笔固定费或按支付金额比例）、资金管理 NII（客户存款放在货币市场工具中的利息收入——当前 4–5% 利率下很可观），以及潜在高级 API/集成费。按估计 $500–700M
              ARR 和 $25B 卡交易额计算，隐含每客户年均收入约 $20,000–28,000，说明除交换费外，SaaS 订阅贡献也很可观。 [CI003] [CI004]

              **关键缺口**：Ramp 未披露官方收入数据。所有估计都由卡交易额披露、客户数和定价数据交叉推算而来，不确定性很高。交换费与 SaaS 的实际收入结构未获公开确认。 [CI005]
