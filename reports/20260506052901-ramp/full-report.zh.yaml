      - number: '7.2'
        title: 运营、安全与基础设施风险
        blocks:
          - type: paragraph
            body: >
              Ramp 的平台是托管在 AWS 上的云原生 SaaS 应用，数据分析用 Snowflake，架构采用微服务。运营风险集中在服务可用性、数据完整性和欺诈 [CR009]。如果月末关账期间平台宕机——报销提交和
              ERP 同步最集中的时候——客户痛感最大，也最可能转向竞争对手 [CR010]。Ramp 未公布历史 uptime SLA 指标；典型 B2B 金融科技目标是 99.9%+（年度停机 < 9
              小时），但若重大故障打到 Sutton Bank 与 Visa 共同参与的卡授权链路，持卡人会直接受影响 [CR011]。

              欺诈和信用风险敞口：Ramp 发行企业卡，消费限额由客户设置；欺诈损失（盗刷卡号、欺诈商户扣款）和信用损失（客户未能还款）最终由 Sutton Bank 根据 BIN 赞助协议承担，但欺诈导致的拒付会压低
              Ramp 的交换费收入，并触发项目审计 [CR012]。Ramp 的 AI 异常检测声称欺诈检测准确率高，但随着卡交易规模向 $25B+ 年化推进，攻击面也在扩大 [CR013]。安全方面，Ramp 已获得
              SOC 2 Type II 认证；截至 2025 年，公开信息未显示重大数据泄露，但若存储的金融交易数据、PII 或 ERP 集成凭证泄露，将构成重大事件 [CR014]。

              鉴于 Ramp 的产品路线图激进（AI finance suite、国际扩张、FedRAMP、Vendor Network），工程执行风险不低。公司约有 1,500–2,000 名员工，工程团队估计
              400–600 人。Ramp 在短时间内连续推出多个重大产品（Ramp Intelligence、Ramp Copilot、Bill Pay 2.0、Ramp
              Travel）——新品出货的同时，核心模块质量回退风险上升 [CR015]。
