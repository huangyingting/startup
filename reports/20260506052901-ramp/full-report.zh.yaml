      - number: '5.5'
        title: 信任、安全、隐私与合规
        blocks:
          - type: paragraph
            body: >
              Ramp 持有涵盖安全性、可用性和保密性的 SOC 2 Type II 认证。卡项目在 Sutton Bank 银行牌照和合规框架下受监管；Ramp 作为项目管理方，遵守 Visa 卡项目规则、针对持卡人数据的
              PCI-DSS，以及通过 Sutton Bank 履行的 BSA/AML 要求。客户数据静态加密（AES-256）、传输中加密（TLS 1.3）；任何欧盟客户数据处理都会涉及 GDPR 合规。 [CE016]
              [CE017]

              隐私控制：Ramp 不出售单个客户的支出数据；匿名聚合数据只用于基准智能功能；客户需选择加入基准计划。专门安全团队负责漏洞披露、渗透测试和事件响应。 [CE018]
