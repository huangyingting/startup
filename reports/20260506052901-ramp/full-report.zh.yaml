        - Sutton Bank 被纳入正式 OCC 协议；或 Sutton 宣布退出 BaaS
        - 立即触发银行合作方迁移项目；通知董事会
      - - 收入同比增速降至 80% 以下
        - ARR 披露（如有 / 何时披露）；融资公告；员工数增长放缓
        - 连续两个季度同比增长 <80%，低于分析师估计
        - 重新评估估值倍数；测算 IPO 估值下调风险
      - - 客户流失激增（NRR 降至 100% 以下）
        - G2 评价趋势（每月）；竞争对手营销宣称赢下 Ramp 客户
        - G2 满意度评分降至 4.5/5.0 以下；多个企业标杆客户转向竞争对手
        - 流失分析；产品紧急响应；考虑投资人披露
      - - 关键人物离职（CEO 或 CTO）
        - LinkedIn / 媒体；Ramp 投资人更新；Glassdoor 领导层评价
        - Eric Glyman 或 Karim Atiyeh 离职或宣布离职
        - 董事会介入；战略复盘；通知投资人
      - - CFPB 执法行动立案
        - CFPB 执法新闻稿；法院文件
        - CFPB 针对 Ramp 提交同意令或民事调查要求
        - 监管应对小组；必要时暂停受影响产品功能；投资人披露
      - - 规模化后欺诈率飙升
        - 卡项目拒付率；Sutton Bank 项目审计触发项
        - 年化欺诈 / 拒付率超过卡交易量 0.1%（按当前规模为 $25M+）
        - 项目审计；收紧 AI 异常检测阈值；降低卡额度
  - id: TV001
    title: 投资建议摘要表
    subtitle: Ramp investment recommendation — May 2026
    claimRefs:
      - CV001
      - CV003
      - CV006
      - CV008
      - CV025
    columns:
      - 维度
      - 评估
    rows:
      - - 投资建议
        - 观察 — 尽调确认后有条件买入
      - - 置信度
        - 中 — 定性逻辑强；关键财务数据未确认
      - - 风险评级
        - 中高 — 交换费压缩、Sutton Bank 依赖、竞争强度
      - - 估值立场
        - 偏贵但并非不合理 — $13B 老股交易按 18–26× ARR 计，处于 100%+ 增长公司区间高端
      - - 决策含义
        - 若 Series E 轮为新股融资，隐含估值 ≤$10B 时建仓；若以 $13B+ 承诺投资，需先谈妥完整尽调权利
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    subtitle: Investment arguments for and against Ramp
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
    columns:
      - 投资逻辑论点
      - 什么会改变判断
    rows:
      - - AI 数据护城河：25,000 家客户和 $25B+ 卡交易量能沉淀自有支出基准，新进入者无法快速复制
        - 竞争对手（Brex、BILL）在 3 年内达到可比数据规模；AI 准确率优势收窄至 <5%
      - - 先落地、再扩张式 NRR 110–125%：多产品交叉销售让收入复利增长，CAC 不需同比例增加
        - 官方披露 NRR 且低于 100%；多产品附着率 <20%
      - - 市场时点：SMB 财务自动化有 10 年结构性顺风；Ramp 最适合承接 AI 优先浪潮
        - 企业软件巨头（SAP、Oracle）在 12 个月内推出真正有竞争力的 AI 费用平台
      - - 产品速度：Ramp 推出重大功能快于任何竞争对手；G2 4.8/5.0、1,900+ 条评价是耐久信号
        - G2 连续两个季度趋势读数降至 4.5/5.0 以下；披露的企业 NPS 低于 30
      - - 反向逻辑：若 CCCA 通过，交换费压缩就是投资逻辑级风险——缺少 SaaS 增长抵消时，收入会被砍 50%
        - 确认 SaaS 订阅收入占总收入 40%+；Ramp 不再主要依赖交换费
      - - 反向逻辑：若增长放缓至同比 60%，$13B 估值（18–26× ARR）没有安全边际
        - IPO 市场将高增长金融科技公司重估至 20–25× ARR 倍数，$13B 入场在 1.5–2× 退出回报下变得有吸引力
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    subtitle: Ramp valuation scenario analysis — 2026 exit
    claimRefs:
      - CV013
      - CV014
      - CV015
      - CV016
    columns:
      - 情景
      - 关键假设
      - 退出估值
      - 相对 $13B 入场的隐含回报
      - 概率信号
      - 关键风险
    rows:
      - - 乐观
        - ARR 年同比增长 100%+；NRR 120%+；以 20–25× 未来 ARR 成功 IPO；无 CCCA；企业级扩张获确认
        - $24–37B
        - 1.8–2.9×（持有 2 年）
        - 25%
        - 企业转化率执行依赖
      - - 基准
        - 同比增长 80–90%；NRR 110–115%；以 15–20× ARR IPO；轻微监管逆风可控
        - $15–20B
        - 1.15–1.54×（持有 2–3 年）
        - 50%
        - Brex/BILL 在中端市场施压
      - - 悲观
        - 同比增长 50–60%；CCCA 或 Sutton Bank 退出冲击模型；以 10–12× ARR IPO 或新股降价融资
        - $7–10B
        - 0.54–0.77×（资本亏损）
        - 25%
        - CCCA 通过或 Sutton Bank 因监管退出
      - - 期望值（概率加权）
        - 25%×$30B + 50%×$17.5B + 25%×$8.5B
        - ~$18.4B
        - ~1.4×（2–3 年）
        - 100%
        - CCCA 概率是单一最大不确定性
  - id: TV004
    title: 可比估值表
    subtitle: Selected comps for Ramp valuation benchmarking — 2024
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
      - CV021
    enumerationScope:
      coverage: partial
      basis: >-
        Sample of most comparable private and public fintech/SaaS companies; M&A comps included where acquisition
        multiples are publicly known. Universe is limited to companies with disclosed revenue and public valuation data.
    columns:
      - 可比公司
      - 指标
      - 倍数 / 估值 / 状态
      - 与 Ramp 的相关性
      - 局限
    rows:
      - - Brex（未上市）
        - 估计 ARR ~$500M；同比增长 ~70–80%
        - 未上市估值 ~$12.3B（2023）；约 25× ARR
        - 直接可比 — 同一产品类别、规模相近、融资相近
        - 未上市估值；无审计收入；Brex 2022 年下滑后部分修复
      - - BILL.com（上市）
        - FY2024 收入 $1.3B；同比增长 ~15%
        - 市值 ~$7–9B；约 5.8–7× 收入
        - 相关：应付账款（AP）自动化 + 更大规模企业卡（Divvy）
        - 增长成熟；Ramp 100%+ 增长应相对 BILL 享有显著溢价
      - - Expensify（上市）
        - ARR ~$50M；增长约持平至 -5%
        - 市值 ~$300–500M；约 6× 收入
        - 相关：费用管理 SaaS，但规模小得多且在下滑
        - 增长差异过大 — 负增长 → 5–6× 倍数不适用于 Ramp
      - - Coupa Software（未上市，Thoma Bravo）
        - 收购时 ARR ~$1B；增长 ~25%
        - 收购价 $8B（2023）；约 8× ARR
        - 相关：规模化支出管理 — 显示类别龙头的 M&A 地板价
        - 战略买方溢价；PE 收购可比对象往往压缩到现金流倍数
      - - Navan（未上市，原 TripActions）
        - 估计 ARR ~$500M；同比增长 ~60%
        - 未上市估值 ~$9.2B（2022）；约 18× ARR
        - 相邻：差旅 + 费用；与 Ramp Travel 模块竞争
        - 上一轮处在 2022 年高点；未刷新；差旅重心限制适用性
      - - Rippling（未上市）
        - 估计 ARR ~$400M；同比增长 ~100%
        - 未上市估值 ~$13.5B（2024）；约 34× ARR
        - 相邻：面向 SMB 的 HR / 财务自动化；增长率最接近
        - HR 优先产品；不是纯支出管理可比对象
      - - Palantir / Veeva（上市，高增长 SaaS）
        - 50–80% 增长的高增长 SaaS
        - 在可比增长阶段，NTM 收入 20–30×
        - 框架参考：高增长垂直 SaaS 的市场价格
        - 不是金融科技公司；与交换费收入模型可比性有限
    notes: 枚举不完整。仅纳入上市公司或广泛报道的未上市估值。
  - id: TV005
    title: 投资逻辑破裂和终止触发因素表
    subtitle: Conditions that would invalidate the investment thesis for Ramp
    claimRefs:
      - CV004
      - CV005
      - CV015
      - CV022
      - CV024
    columns:
      - 触发因素
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - CCCA 通过 / 商业交换费封顶
        - CCCA 参议院全院表决通过，或 Visa 宣布自愿将商业费率下调 >15%
        - 拿走总收入 30–50%；SaaS 需要扩张 2–3× 才能抵消，但尚未证明
        - 退出持仓或对冲；要求管理层提供收入桥接
      - - Sutton Bank BIN 退出
        - OCC 对 Sutton 执法；Sutton 宣布 BaaS 收缩退出
        - 卡项目中断 12–18 个月；迁移期间客户流失
        - 立即影响估值；若无确认替代银行，建议退出
      - - NRR 降至 100% 以下
        - 管理层披露 NRR 低于 100%，或 G2 评价趋势连续 2 个季度低于 4.5/5.0
        - 先落地、再扩张逻辑破裂；收入模型只依赖新客户获取
        - 按 6–8× ARR 重新评估，而非当前 18–26×
      - - 收入同比增速降至 60% 以下
        - 尽调或后续报告确认连续两个季度同比增长 <60%
        - 估值压缩至 10–12× ARR 地板；IPO 溢价消失
        - 测算降价融资风险；若为 Series E 轮投资人，谈判棘轮保护
      - - 关键人物退出（Glyman 或 Atiyeh）
        - CEO 或 CTO 离职；90 天内没有确认继任者
        - 市场信心受冲击；人才外流风险；AI 路线图不确定
        - 评估董事会应对；若继任不清晰，考虑减仓
      - - 数据泄露 / CFPB 执法令
        - 确认重大数据泄露，或 CFPB 提交同意令
        - 客户流失；监管成本；企业级销售管线冻结
        - 若同意令限制核心卡或费用功能，建议退出
  - id: TV006
    title: 最终尽调问题表
    subtitle: Critical evidence needed before Series E or secondary investment in Ramp
    claimRefs:
      - CV024
      - CV025
      - CV011
      - CV012
      - CV007
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - FY2023–2024 审计财务报表
        - 利润表、资产负债表、现金流；总 ARR 确认
        - 必须确认收入结构（交换费 vs SaaS）、烧钱速度和盈利路径
        - CFO / 财务数据室；如可取得，索取审计师函
      - - 按客户批次划分的 NRR 和 GRR
        - 队列留存瀑布图；企业级 vs SMB NRR 拆分
        - NRR 是先落地、再扩张逻辑的核心杠杆；当前 110–125% 估计未确认
        - CFO 数据室；用 2021 队列留存确认（5 年记录）
      - - 前 10 大客户收入集中度
        - 显示前 10 大客户占 ARR 百分比的收入明细
        - 企业级单一客户集中风险（如 Shopify）
        - 管理层尽调会议；投资条款清单条件
      - - 授信额度条款和契约
        - 授信规模、提款、到期、契约（ARR、NRR、流动性触发项）
        - 每月 $2B 垫资带来营运资金风险；压力情景下有违反契约风险
        - CFO / 债务文件数据室
      - - Sutton Bank 项目协议
        - 退出条款；监管检查历史；项目费用；排他性
        - BIN 赞助方集中度对投资逻辑至关重要；退出条款决定切换成本
        - 法律尽调；要求提供 BIN 协议，除退出条款外可脱敏
      - - CCCA 敏感性模型
        - 交换费削减 50% 时的收入桥接；SaaS 收入占总收入比例
        - 交换费压缩是最大单点风险；模型应确认公司能撑住
        - CFO / 产品定价团队
      - - CFO 任命
        - 姓名、入职日期、薪酬
        - CFO 对 IPO 准备和机构投资者信心至关重要
        - 董事会主席 / 猎头确认
