  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Ramp 运营在银行监管、卡组织规则和金融科技法律的交汇处——即便 Ramp 本身不持有银行牌照，这种组合也带来分层监管敞口。最重要的监管风险是 Durbin Amendment 扩展带来的交换费压缩：2010
              年 Durbin Amendment 对资产超过 $10B 银行发行的借记卡交换费设限；若立法提案把类似上限扩展到信用卡 / 商业卡，将直接削减 Ramp 的交换费收入，而这笔收入为卡奖励计划提供资金，也是
              Sutton Bank 经济模型的驱动 [CR001]。行业分析显示，商业卡交换费若套用 Durbin 式上限，Ramp 每美元卡消费的总收入可能下降 30–50%；若 SaaS
              费用增长无法抵消，利润率会被显著压缩 [CR002]。

              Ramp 与 Sutton Bank（一家爱荷华州特许银行）的 BIN 赞助安排，使 Ramp 处在 “bank-as-a-service”（BaaS）监管结构中。Sutton Bank 是 Ramp
              的发卡银行，承担卡项目的主要 BSA/AML、KYC 和 Regulation E 义务；Ramp 必须遵守 Sutton Bank 的项目要求，以及 OCC/FDIC 关于第三方金融科技关系的指引
              [CR003]。如果 OCC 或州监管机构要求更严格监督 BaaS 安排（正如其 2023–2024 年指引所释放的信号），Sutton Bank 可能向 Ramp 施加额外合规成本，或退出 BIN 赞助，迫使
              Ramp 寻找新的发卡合作伙伴——这是实质运营风险 [CR004]。随着 Ramp ARR 接近 $1B，CFPB 对较大型金融科技公司的监督（非银监督计划）风险也在上升；CFPB
              检查员已依据不公平、欺骗或滥用行为（UDAAP）权限，盯上费用管理和公司卡玩家 [CR005]。

              法律侧，截至 2025 年，Ramp 没有已知重大未决诉讼。公司拥有覆盖 AI 驱动费用分类和异常检测的专利申请 [CR006]。SAP、Coupa 或 BILL.com 主张费用管理专利侵权的 IP
              风险存在可能，但尚未确认 [CR007]。隐私方面，Ramp 为 25,000+ 企业处理敏感金融交易数据；重大数据泄露或违反 CCPA / 州隐私法可能触发监管执法、民事诉讼和客户流失 [CR008]。
