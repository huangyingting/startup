      - number: '8.5'
        title: 退出准备度与最终尽调清单
        blocks:
          - type: paragraph
            body: >
              IPO 准备度：上市前，Ramp 需要任命 CFO（截至 2025 年无确认聘任）、准备 2 年经审计财务报表，并搭建 SOX 合规基础设施。最早合理 IPO 窗口是 H2 2026 或 2027，前提是收入达到
              $1B+（当前市场中金融科技 IPO 的机构投资者门槛）且经营现金流转正 [CV022]。$13B 的 Pre-IPO 老股交易已让现有股东获得部分流动性，降低了立即 IPO 的紧迫性，也让 Ramp
              可以更挑剔地选择时点 [CV023]。

              最终尽调清单：投资者应要求提供：（1）FY2023 和 FY2024 经审计或审阅的财务报表，包括利润表、资产负债表和现金流量表；（2）按客户年度队列拆分的 cohort NRR、GRR
              和留存瀑布；（3）前十大客户集中度表；（4）信贷额度条款和契约；（5）Sutton Bank 项目协议条款，包括退出条款；（6）OCC/FinCEN 项目检查历史；（7）CCCA 立法风险分析，以及交换费砍
              50% 情景下的收入桥 [CV024]。投资决策质量几乎完全取决于 ARR、NRR 和留存数据是否可得——没有这些数据，$13B 估值主要是动量下注，而不是基本面信念投资 [CV025]。
            claimRefs: []
