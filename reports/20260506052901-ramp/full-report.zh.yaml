chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、商业模式与使命
        blocks:
          - type: paragraph
            body: >
              Ramp 于 2019 年注册成立，并在 2020 年 2 月公开发布。总部位于纽约市（旧金山也设有办公室）。Ramp 是一家从早期走向增长期的私营公司，业务落在 B2B 金融科技的企业支出管理赛道。
              [CO001] [CO002]

              Ramp 的一句话产品描述：一个 AI 驱动的企业支出管理平台，发行带 1.5% 无限返现的 Visa
              公司卡，并提供一体化费用管理、应付账款自动化、差旅管理和财务智能软件——帮助财务团队降低运营负担，同时自动发现供应商成本节省机会。 [CO003]

              Ramp 的商业模式主要靠交换费：公司卡交易从 Visa 网络产生 1–2% 交换费；Ramp 将约 1.5% 以返现返还客户，自己留存利差。第二收入来自 SaaS 订阅（Ramp Plus 约
              $15/用户/月）、账单支付交易费，以及闲置客户存款的资金收益。使命——“帮助企业少花钱”——让激励一致：客户省得越多，忠诚度越高；卡交易额随之增长，Ramp 收入也随之增长。 [CO004] [CO005]
