  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户流程
        blocks:
          - type: paragraph
            body: >
              Ramp 的产品围绕企业财务团队日常工作流设计：给员工发放公司卡、自动抓取收据、实时执行支出政策、路由发票审批、将交易编码到正确的 ERP 总账科目、在政策护栏内预订差旅，并借助 AI
              驱动的基准比较优化供应商合同。平台用一个一体化套件替代 3–5 个点状工具（独立卡、费用工具、AP 软件、差旅工具、资金账户）。 [CE001] [CE002]

              客户流程从发卡开始：财务团队向员工发放不限量虚拟或实体 Visa 卡，并设置支出额度、商户类别限制和自动收据匹配。交易通过 AI 规则自动编码到总账科目，将手工对账从数小时压缩到数分钟。Bill Pay
              自动完成供应商发票录入、审批路由和 ACH/wire 支付。Accounting 自动同步 NetSuite、QuickBooks、Sage、Workday、SAP 及 200+ 其他 ERP 系统。
              [CE003] [CE004]
