      - number: '4.4'
        title: 财务缺口与风险
        blocks:
          - type: paragraph
            body: >
              主要财务风险是盈利能力未披露：Ramp 尚未确认 EBITDA 为正还是仍在烧钱。2024
              年估值下调轮和持续增长资金需求说明公司可能尚未实现持续盈利。交换费收入也天然具有周期性（绑定卡消费额，衰退中会下滑），SaaS 收入则依赖未公开报告的客户留存假设。 [CI015] [CI016]

              收入监管风险：CFPB 交换费监管风险可能实质压缩 Ramp 净交换费抽成率；若净交换费下降 50%，该收入流每年将减少 $12–38M——如果交换费占总收入 30–40%，这会是有意义的冲击。SaaS
              层可对该风险提供一定分散。 [CI017]

              ARR 增长可持续性：FY2023–2024 估计同比增长 100%，Ramp 需要维持约 30–50% 增长，才能在当前 EV/ARR 倍数下支撑 $13B
              隐含估值。增长放缓是首要财务估值风险；缺少官方披露，外部无法独立验证。 [CI018]
