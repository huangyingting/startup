      - number: '3.2'
        title: 竞争对手画像与定位
        blocks:
          - type: paragraph
            body: >
              **Brex** 是 Ramp 最直接的竞争对手：2017 年由 Pedro Franceschi 和 Henrique Dubugras 创立，累计融资 $2.5B+，2024 年估值约 $12.3B。2022
              年有争议地转离 SMB 后，Brex 重新聚焦高增长科技公司和中端市场，定位为“面向雄心型公司的 AI 驱动财务”。Brex 的 AI CFO 助手和全球公司卡与 Ramp 功能直接重叠。Ramp 相对 Brex
              的优势：更强的中端市场 ERP 集成、更简单的按用户定价，以及由 Intelligence 数据支撑的 5% 节省叙事。Brex
              的优势：更多企业级功能（控制、全球化）、更长经营记录，以及在创业生态中更高的品牌认知。 [CP006]

              **SAP Concur** 凭数百万按席位计费用户主导企业级市场；弱点是部署要数月（而 Ramp 只需数小时）、单用户成本高出 3–5x，并且需要 IT 资源。SAP Concur 在 Fortune 500
              的存量地位受 SAP ERP 锁定保护，但收入 $100–500M 的公司在 ERP 迁移时越来越多选择 Ramp 或 Brex，而不是 Concur。 [CP007]

              **BILL (fka Bill.com) + Divvy** 主要通过会计师事务所渠道服务 500K+ 美国 SMB 客户；Divvy 公司卡集成让 BILL 拥有完整支出管理栈，可在收入低于 $10M
              的公司中与 Ramp 竞争。BILL 的优势是簿记员生态分发；劣势是产品质量和用户体验落后于 Ramp 与 Brex。 [CP008]
