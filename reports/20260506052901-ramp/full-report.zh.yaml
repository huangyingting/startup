      - CV028
      - CV034
      - CV037
      - CV040
    data:
      items:
        - label: 市场机会
          value: 9
          detail: $55B+ 总可用市场（TAM）；10 年自动化长期顺风；在 SMB / 中端市场产品市场契合度高
          score: 9
        - label: 产品与技术验证
          value: 8
          detail: 25,000 家客户；G2 4.8/5.0（1,900+ 条评论）；规模化数据带来 AI 护城河；功能迭代快
          score: 8
        - label: 客户韧性
          value: 7
          detail: 具名客户（Shopify、OpenAI）；估计 NRR 110–125%；ERP 集成带来切换成本；官方 NRR 未证实
          score: 7
        - label: 竞争护城河
          value: 6
          detail: AI 数据优势真实，但能否撑过 5+ 年尚未证明；Brex 和 BILL 在收敛；交换费收入模型 暴露在风险下
          score: 6
        - label: 财务模型
          value: 5
          detail: 缺少经审计财务数据；依赖交换费本身就是模型风险；SaaS 附加收入在增长，但仍占少数
          score: 5
        - label: 风险与监管
          value: 4
          detail: CCCA 是关键风险；Sutton Bank 是单点依赖；CFPB 风险开始浮现；BaaS 执法先例 不断升级
          score: 4
        - label: 估值纪律
          value: 5
          detail: $13B 老股交易对应 18–26× ARR，处于区间高端；预期价值略有吸引力；没有安全边际
          score: 5
        - label: 证据质量
          value: 5
          detail: 关键财务指标（NRR、GRR、ARR、烧钱速度）未证实；产品 / 客户公开证据强；商业模型 证据弱
          score: 5
