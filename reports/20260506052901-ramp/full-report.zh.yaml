      - number: '6.5'
        title: 集中度风险与渠道依赖
        blocks:
          - type: paragraph
            body: >
              按客户数看，Ramp 客户分布很广（25,000+），但收入天然更集中在拉动更高卡交易额的大客户上 [CU033]。前十分位客户（约 2,500
              个账户）考虑到客户公司规模分布很宽，可能贡献了不成比例的卡消费份额。Ramp 未披露 Herfindahl 或头部客户集中度指标，而这是 Series D+ 公司标准尽调请求 [CU034]。

              渠道依赖是中等风险：Ramp 新客户获取中有相当一部分来自 VC 网络合作和 Ramp for Startups 计划。若风险投资放缓（如 2022–2023 年），新成立创业客户减少，PLG 管道会收缩
              [CU035]。2023–2024 年，Ramp 通过组建直销企业团队、瞄准 500–5,000 员工分层来缓释这类集中度，降低对创业渠道增长的依赖 [CU036]。Ramp Vendor
              Network（把供应商接入虚拟卡受理）也创造了一个独立于 VC 管道的直接企业供应商渠道 [CU037]。

              采购阻碍集中在大型企业和政府分层：Ramp 初期缺少 SOC 2 Type II（后来取得）、FedRAMP 状态有限、且仅能在美国发卡，这些因素阻挡了联邦机构、跨国公司和有欧盟数据驻留要求公司的交易
              [CU038]。这些阻碍可以解决，但中期内确实限制了可寻址客户总数 [CU039]。
