      - number: '8.6'
        title: 图表附录
        blocks:
          - type: callout
            title: 观察 / 有条件买入 — 产品强；估值高；关键财务未确认
            body: >
              在同组公司中，Ramp 是证据支撑最强的独立支出管理平台，产品市场契合有说服力，标杆客户质量高，AI 护城河仍在搭建。$13B 老股估值在乐观和基准情景下数学上可以支撑，但 NRR 未确认、ARR 未经审计，加上
              CCCA/Sutton Bank 风险未解决，仍不足以形成完整信念。建议：列为高优先级观察标的；在 NRR、信贷额度和监管敞口尽调通过后，启动有条件买入仓位。
            calloutType: recommendation
            claimRefs:
