      - number: '1.4'
        title: 规模、封面指标与里程碑
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，Ramp 服务 25,000+ 企业客户，处理估计 $25B+ 年化卡消费，员工约 1,500–2,000 人，总部位于纽约市。估计 ARR 为 $500–700M，基于卡交易额、客户数和
              SaaS 定价的分析师交叉测算——Ramp 未正式披露。$13B 隐含估值建立在这些未审计估计之上。 [CO015] [CO016]

              2020–2026 年关键里程碑：2020 年 2 月（公开发布）、2021 年 3 月（Series A，成为独角兽）、2021 年 8 月（Series B）、2021 年 12 月（Series C，估值
              $8.1B）、2022 年（推出 Bill Pay + Accounting 模块）、2023 年（推出 Ramp Intelligence AI 套件）、2024 年 3 月（增长轮，估值
              $7.65B）、2024 年 9 月（推出 Travel + Treasury）、2024 年底（25,000+ 客户；二级隐含估值 $13B）、2025 年初（AI Procurement + 合同智能）。
              [CO017] [CO018]

              截至 2026 年 5 月，未公开披露重大不利事件（监管行动、数据泄露、诉讼）。Ramp 作为技术公司运营，由银行合作伙伴（Sutton Bank）负责发卡；监管合规主要由银行合作伙伴承担。 [CO019]
              [CO020]
