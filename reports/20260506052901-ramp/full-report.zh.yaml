      - number: '4.3'
        title: 资本结构与融资
        blocks:
          - type: paragraph
            body: >
              Ramp 已通过 5 轮一级股权融资募集约 $1.37B（种子轮、Series A–C、2024 年增长轮）。2024 年 3 月增长轮估值 $7.65B，低于 2021 年 12 月 Series C 峰值
              $8.1B——估值折让 5.5%，反映金融科技估值倍数从 ZIRP 时代峰值在 2022–2023 年压缩。 [CI011] [CI012]

              公司未公开披露风投债或信贷额度；Ramp 经常性交换费收入可带来内生现金生成。2024 年估值下调轮表明 Ramp 在 2022–2023
              年消耗了资本，尽管收入轨迹向好仍需要增长资金——意味着公司可能仍有经营亏损，或大额增长投入吃掉了一级轮融资。 [CI013]

              资本充足性：2024 年融资 $150M，估计 ARR 为 $500–700M，且单位经济模型可能为正；除非公司重金投入企业级销售、国际扩张或 AI 产品开发，否则 Ramp
              现金跑道应当较长。没有烧钱速度披露，实际跑道无法计算。 [CI014]
