      - number: '8.2'
        title: 当前估值背景与入场纪律
        blocks:
          - type: paragraph
            body: >
              Ramp 最近一次新股融资是 March 2024 增长轮，融资 $150M、估值 $7.65B——较 December 2021 的 $8.1B 峰值下调 6% [CV007]。Late 2024
              老股市场交易隐含估值约 $13B，动力来自内部 tender offers 和二级平台交易；这些老股估值不是新股融资，价格发现也更有限 [CV008]。$13B 老股估值对应的 ARR 倍数约为
              18–26×（基于估计 ARR $500–700M），相对公开金融科技基准有溢价，但低于以 20–30× forward ARR 交易的高增长 AI-first SaaS 公司 [CV009]。

              SEC Form D 文件确认了新股融资历史：$15M 种子轮、估值 $1.6B 的 $115M Series A、估值 $3.9B 的 $300M Series B、估值 $8.1B 的 $750M
              Series C（均在 2021 年），以及 March 2024 估值 $7.65B 的 $150M 增长轮——累计新股融资约 $1.37B [CV010]。优先股类别上的清算优先权堆叠估计为
              $1.37B；因此，在下行情景下，普通股和早期员工会承受有意义的清算优先权稀释 [CV011]。以 $13B 老股价格入场，隐含相对峰值估值 1.7× 的折减（$8.1B → $13B 实际上较新股轮溢价
              1.6×），但老股流动性相对 IPO 价格有折扣，说明投资者应在压力情景下计入 30–40% 的降价 [CV012]。
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
