      - number: '6.4'
        title: 留存、粘性与扩张经济性
        blocks:
          - type: paragraph
            body: >
              Ramp 不公开披露准确净收入留存率（NRR）或总收入留存率（GRR）。基于分析师估计、媒体引用的客户背调，以及公司卡与支出管理品类的可比基准，NRR 估计为
              110–125%——由客户公司成长带来的卡消费扩张，以及向既有持卡客户交叉销售 BILL Pay、Travel 和 Accounting 模块驱动 [CU025]。这一估计与 Ramp
              公开声称自己是“增长最快的公司卡”，以及从累计融资和披露 ARR 估计推导出的收入轨迹一致 [CU026]。

              切换成本在结构上压低流失风险：一家公司把 Ramp 接入会计系统（QuickBooks、Xero、Sage、NetSuite）并培训员工使用 Ramp app
              后，迁移到竞争对手需要重新集成、重发实体卡、重新培训用户并迁移历史收据数据 [CU027]。Ramp 的 ERP 连接深度意味着产品会随时间更深嵌入客户月结流程，逐步抬高切换成本
              [CU028]。负面信号包括有公司在规模要求 Brex 企业级销售支持时从 Ramp 转向 Brex 的报道 [CU029]，说明竞争性流失风险在高端中端市场（500–2,000
              名员工）最高，两款产品在这里竞争最激烈。

              Ramp 的“落地再扩张”打法从公司卡开始，再叠加 Bill Pay、Ramp Travel 和 Ramp Accounting 等扩张产品——每个模块都增加增量费用，并让 Ramp 更深嵌入财务工作流
              [CU030]。从纯卡到全套件，单客收入估计提升约 3–5×，使多产品交叉销售成为 NRR 超过 100% 的主要驱动 [CU031]。收入集中度未公开披露；考虑 25,000+ 客户和以
              SMB/中端市场为主的客群，前 10 大客户收入集中度可能低于总 ARR 的 15–20%，但 Shopify 等大型企业账户带来一定尾部风险 [CU032]。
