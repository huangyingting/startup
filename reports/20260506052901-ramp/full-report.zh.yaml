      - number: '2.2'
        title: TAM、SAM、SOM 规模测算
        blocks:
          - type: paragraph
            body: >
              **自下而上 TAM（卡 + SaaS）**：美国公司卡市场 $800B 支出 × 返现后 0.1% 净交换费 = $800M 纯卡 TAM；美国 SMB/中端市场支出管理 SaaS 以 1M+ 潜在用户 ×
              $15/月 = $180M+ SaaS TAM；按当前规模，合计每年可寻址收入 $1B+——但 Ramp 向企业级和全球扩张后，长期 TAM 会更大，上述口径低估了空间。 [CM006] [CM007]

              **自上而下 TAM**：更广义的企业支出管理品类（包括 ERP 模块、AP 自动化、差旅管理、资金管理）对应 $25–35B 全球软件市场（IDC 2024），其中美国云原生子赛道约 $8–12B。Ramp
              当前约 $500–700M ARR，意味着对美国子赛道约 6–9% 渗透率。 [CM008]

              **SAM**：Ramp 现实可服务市场是美国中端市场公司（10–5,000 名员工）——约 200,000 家；每家公司年平台支出 $3,000–10,000（卡 + SaaS），对应 $0.6–2B
              SAM。以今天 25,000 客户计，Ramp 已渗透其 SAM 的 12%。 [CM009]

              **SOM（3–5 年）**：假设客户数继续以约 30–40% 增长，Ramp 未来 3–5 年可获取市场为 75,000–100,000 客户、$1.5–3B ARR——意味着较当前水平增长 2–3x，SAM
              渗透率达到 10–15%。企业级和国际扩张可能显著拉大 SOM。 [CM010]
