companyProfile:
  summary: >
    Ramp Financial Inc. 是一家总部位于纽约的公司卡与支出管理平台，2019 年由 Eric Glyman（CEO）和 Karim Atiyeh（CTO）创立。核心产品是一张具备实时支出控制的 Visa
    公司卡；其上叠加 AI 原生智能层，覆盖收据匹配、政策执行、合同谈判洞察和 CFO 级分析。Ramp 的获客打法瞄准美国成本敏感的中小与中端市场企业（10–1,000 名员工），这些企业希望替代手工报销，并挤出
    Concur、Expensify 等传统差旅与报销（T&E）厂商。2024 年 3 月以 $7.65B 估值融资 $150M，2024 年底二级交易隐含估值约 $13B；短暂的 2022 年估值下调轮阴影过去后，Ramp
    估值快速上修。估计 ARR 为 $500–700M、同比增长 100%+，企业客户 25,000+，年化卡交易额约 $25B，这些指标让 Ramp 成为美国公司卡市场最可信的 Brex 挑战者。
