      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: >
              乐观情景（概率信号：25%）：Ramp 到 2026 年底达到 $1.2–1.5B ARR，证明 NRR 高于 120%，并以 20–25× forward ARR 成功 IPO，实现 $24–37.5B
              市值；以 $13B 老股估值入场的投资者，2 年持有回报为 1.8–2.9×。该情景需要 ARR 持续 100%+ YoY 增长、没有重大交换费压缩，并且企业客户扩张成功 [CV013]。

              基准情景（概率信号：50%）：Ramp 到 2026 年底达到 $900M–$1.1B ARR，维持 80–90% YoY 增长，并以 $15–20B 市值提交 IPO（15–20× forward ARR）；以
              $13B 老股估值入场的投资者，2–3 年持有回报约 1.15–1.54×。该情景需要竞争执行适中，且没有重大监管挫折 [CV014]。

              悲观情景（概率信号：25%）：收入增长放缓至 50–60% YoY，NRR 降至 110% 以下，Ramp 以 $8–10B 定价 IPO（10–12× forward ARR），或进一步进行新股下轮融资；以
              $13B 老股估值入场的投资者回报为 0.6–0.77×（资本损失）。触发因素包括 CCCA 通过、Sutton Bank BIN 退出，或 Brex/BILL 造成重大竞争替代 [CV015]。

              三个情景的概率加权预期价值约为 $15.6B 隐含退出价值，说明 $13B 入场略有吸引力，但安全边际并不强 [CV016]。
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs:
