      - number: '4.2'
        title: 单位经济模型与运营效率
        blocks:
          - type: paragraph
            body: >
              Ramp 的单位经济模型估计处在 B2B 金融科技最高效一档：在 1,500–2,000 名员工和 $500–700M ARR 下，估计人均收入约 $250,000–470,000（行业中位数约
              $150–200K）。PLG 获客模型叠加 VC 分发，相比传统 SaaS 企业销售降低 CAC。 [CI006] [CI007]

              LTV/CAC 动态有利：公司卡客户天然切换成本高（迁移费用数据、更换卡号、重配 ERP 集成）；客户公司增长后，平均卡消费随之增加；免费层直接 CAC 很低，病毒式 / 网络增长又放大获客。不过缺少公开 NRR
              或流失数据，这些估计仍有显著不确定性。 [CI008] [CI009]

              交换费模式给毛利率带来结构性压力：SaaS 收入毛利率超过 80–90%，但返现后的净交换费利润很薄（约为净收入的 1–3%）。整体混合毛利率估计为 60–75%，取决于收入结构——低于纯 SaaS
              公司，但符合嵌入支付的金融科技平台。 [CI010]
            claimRefs: []
