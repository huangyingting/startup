  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >
              Ramp 的主要买方是美国中小与中端市场公司的 CFO、财务 VP 或财务控制人，通常为 50–2,000 名员工。这一分层是公司的规模引擎：截至 2024 年底，Ramp 报告服务 25,000+ 企业客户
              [CU001]，从使用免费层的早期创业公司到使用付费 Ramp Plus 或 Ramp Enterprise 计划的快速增长中端市场公司都有。财务团队既是买方也是高频用户；员工是次级用户（持卡人），会计和 ERP
              团队则是自动总账编码和结账提速流程的下游受益者 [CU002]。

              按行业看，Ramp 最匹配的垂直领域是科技、专业服务和金融服务——这些公司交易频率高、支出分散在大量员工之间，并有动力降低月结摩擦 [CU003]。公司已明显进入企业级分层（500–5,000
              名员工），更大的单客卡交易额带来更高交换费收入，也提高向 BILL Pay、Travel 和 Accounting 产品增购的机会 [CU004]。Ramp 还服务越来越多 VC 支持的创业公司——其中许多通过
              Ramp Startup Program 成为客户，该计划为符合条件的早期公司豁免费用门槛 [CU005]。

              地域集中度以美国为主，截至 2025 年国际扩张有限。Ramp 的卡项目基于 Visa，限美国法律实体使用；国际客户必须在美国注册，否则需要等待 Ramp 规划中的国际卡扩张
              [CU006]。付款方始终是企业实体；公司不提供个人消费卡 [CU007]。
