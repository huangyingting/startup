  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与结构
        blocks:
          - type: paragraph
            body: >
              Ramp 竞争的是一个混合市场：商业卡支付市场之上的企业支出管理软件市场。两者动态不同，但对 Ramp 商业模式高度耦合。 [CM001] [CM002]

              **商业卡市场**（总支出）规模巨大：全球商业卡支出超过 $25T，其中美国公司卡年支出约 $800B。来自美国商业卡支出的可寻址交换费池约为每年 $8–16B（$800B 的
              1–2%），由卡组织（Visa/Mastercard 约 0.1–0.3%）、发卡银行（Sutton Bank 等）和金融科技运营商（Ramp）分成。扣除 1.5% 返现后，Ramp
              的净抽成率很窄，但可随交易额放大。 [CM003]

              **企业支出管理 SaaS 市场**估计为 $8–12B 的总可用软件收入（IDC/Gartner 2024），受财务团队数字化转型、云原生 ERP 采用和 AI 自动化推动，CAGR 为 15–20%。Ramp
              的 SAM 是美国 10–5,000 名员工公司——约 200,000 家——它们尚未采用现代支出管理平台。多数仍使用传统工具（SAP Concur、Excel、QuickBooks）或手工流程。 [CM004]
              [CM005]
            claimRefs: []
