chapter:
  number: 1
  title: Company Overview
  summary: >
    Ramp is a New York-based corporate spend management platform founded in 2019 by Eric Glyman (CEO), Karim Atiyeh
    (CTO), and Gene Lee (COO). It offers corporate cards, expense management, accounts payable automation, travel, and
    AI-powered financial intelligence as an integrated SaaS platform targeting US SMBs and mid-market companies. Ramp
    processes over $25 billion in annualised card spend (2025 estimate), serves 25,000+ corporate customers, and has an
    estimated ARR of $500–700M as of early 2026. The company was last publicly valued at approximately $13 billion in
    late-2024 secondary transactions and has raised approximately $1.37B in primary capital. Core differentiator: an AI
    spend intelligence platform that automatically surfaces cost savings, enforces policies, and integrates with 200+
    accounting and ERP systems.
sections:
  - id: s1
    title: Identity, Business Model, and Mission
    body: >
      Ramp was incorporated in 2019 and publicly launched in February 2020. It is headquartered in New York City (with
      offices in San Francisco). Ramp is an early-stage-to-growth private company operating in the corporate spend
      management segment of B2B fintech. [CO001] [CO002]

      Ramp's one-line product description: an AI-powered corporate spend management platform that issues corporate Visa
      cards with 1.5% unlimited cash back and provides integrated expense management, accounts payable automation,
      travel management, and financial intelligence software — enabling finance teams to reduce operational overhead
      while automatically surfacing vendor cost savings. [CO003]

      Ramp's business model is primarily interchange-based: corporate card transactions generate 1–2% interchange from
      the Visa network; Ramp shares approximately 1.5% as cash-back rebates to customers, retaining the spread.
      Secondary revenue comes from SaaS subscriptions (Ramp Plus ~$15/user/month), bill pay transaction fees, and
      treasury yield on idle customer deposits. The mission — "help businesses spend less" — creates aligned incentives:
      higher customer savings drives loyalty, which drives card volume, which drives Ramp's revenue. [CO004] [CO005]
    tableRefs:
      - TO001
    figureRefs:
      - FO001
  - id: s2
    title: Founders, Leadership, and Governance
    body: >
      Ramp's founding team of three brings complementary skills from fintech, engineering, and operations. **Eric Glyman
      (CEO)** previously co-founded Paribus, a consumer savings automation startup acquired by Capital One in 2016, and
      brings a fintech product founder background and strong investor relationships. **Karim Atiyeh (CTO)** is an
      MIT-trained computer scientist who previously worked at Palantir and brings deep ML/data systems experience
      directly applicable to Ramp's AI intelligence roadmap. **Gene Lee (COO)** has a McKinsey background and
      operational expertise that drives Ramp's go-to-market and revenue organisation. [CO006] [CO007]

      Ramp's board includes representatives from all major institutional rounds: Founders Fund (Series A), Thrive
      Capital (Series B), Coatue (Series C), and Khosla Ventures (2024 growth round). The company has no independent
      board members publicly disclosed; governance is investor-dominated in the typical late-stage private company
      structure. [CO008]

      Key-person concentration is a meaningful risk: Eric Glyman is the primary public face, product vision leader, and
      investor relationship holder; his departure would likely trigger a significant disruption. Atiyeh's technical
      leadership is equally critical given Ramp's AI differentiation strategy. No public succession plan exists. [CO009]
    tableRefs:
      - TO002
    figureRefs:
      - FO002
  - id: s3
    title: Funding History, Valuation, and Capital Structure
    body: >
      Ramp has raised approximately $1.37B in primary equity capital: seed ($15M, 2020), Series A ($115M at $1.6B, March
      2021, Founders Fund), Series B ($300M at $3.9B, August 2021, Thrive Capital), Series C ($750M at $8.1B, December
      2021, Coatue/D1 Capital), and a March 2024 growth round ($150M at $7.65B, Khosla Ventures). The 2024 round was a
      down-round from the $8.1B 2021 peak, reflecting the 2022–2023 fintech multiple compression cycle. [CO010] [CO011]

      Secondary market transactions in late 2024 implied a valuation of approximately $13B, representing a 70% premium
      to the March 2024 primary round and reflecting Ramp's accelerating ARR growth and AI product momentum. At $13B and
      estimated $500–700M ARR, the implied EV/ARR multiple is approximately 18–26x — a premium multiple reflecting the
      AI-enabled platform narrative. [CO012] [CO013]

      Key investors include Founders Fund (Peter Thiel), Thrive Capital (Josh Kushner), Coatue Management, Khosla
      Ventures, D1 Capital Partners, Goldman Sachs (strategic), Stripe (strategic), Excel Venture Management, Spark
      Capital, and Ali Rowghani. The Goldman Sachs and Stripe strategic investments add enterprise distribution
      optionality beyond pure financial capital. [CO014]
    tableRefs:
      - TO003
    figureRefs:
      - FO003
  - id: s4
    title: Scale, Cover Metrics, and Milestones
    body: >
      As of early 2026, Ramp serves 25,000+ corporate customers, processes an estimated $25B+ in annualised card spend,
      has approximately 1,500–2,000 employees, and is based in New York City. Estimated ARR is $500–700M based on
      analyst triangulation from card volume, customer count, and SaaS pricing — not officially disclosed by Ramp. The
      $13B implied valuation rests on these unaudited estimates. [CO015] [CO016]

      Key milestones from 2020 to 2026: February 2020 (public launch), March 2021 (Series A, unicorn status), August
      2021 (Series B), December 2021 (Series C at $8.1B), 2022 (Bill Pay + Accounting modules launched), 2023 (Ramp
      Intelligence AI suite launched), March 2024 (growth round, $7.65B), September 2024 (Travel + Treasury launched),
      late 2024 (25,000+ customers; $13B implied secondary), early 2025 (AI Procurement + contract intelligence).
      [CO017] [CO018]

      No material adverse events (regulatory actions, data breaches, litigation) have been publicly disclosed as of May
      2026. Ramp operates as a technology company with bank partners (Sutton Bank) handling card issuance; regulatory
      compliance is primarily the bank partner's responsibility. [CO019] [CO020]
    tableRefs:
      - TO004
