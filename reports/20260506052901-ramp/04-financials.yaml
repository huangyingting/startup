        Interchange compression is Ramp's primary regulatory financial risk: if the Credit Card Competition Act or
        Durbin Amendment extension reduces net interchange on commercial credit cards by 50%, Ramp's net card revenue
        would decline by $12–38M annually — a meaningful hit representing 2–7% of estimated ARR, partially offset by the
        SaaS diversification.
