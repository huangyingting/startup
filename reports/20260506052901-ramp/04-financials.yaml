    - id: C416
      statement: >-
        The 2022–2023 fintech multiple compression had a material impact on Ramp: the company's Series C implied 30x+
        ARR multiple at peak was unsustainable; as growth-stage ARR multiples compressed to 10–20x by 2024, Ramp needed
        to demonstrate accelerating ARR growth to maintain valuation — creating pressure on the company to show visible
        metrics like the 25,000 customer count and $25B card volume milestones.
      type: inferred
      topic: valuation-compression-impact
      sourceRefs:
