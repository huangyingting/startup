        Ramp's profitability status is unknown: the company has not confirmed EBITDA positivity or operating income; the
        down-round in 2024 despite strong ARR growth suggests the company is likely still operating at a loss while
        investing heavily in AI product development, enterprise sales expansion, and headcount — consistent with
