  claims:
    - id: C401
      statement: >-
        Ramp's primary revenue stream is SaaS subscription (Ramp Plus at ~$15/user/month, Enterprise at custom pricing)
        — estimated to represent approximately 60–70% of total ARR; the SaaS layer generates ~85–90% gross margins and
        provides the recurring, predictable revenue component of the business model.
      type: estimated
      topic: SaaS-revenue
      sourceRefs:
        - S411
        - S412
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ402
    - id: C402
      statement: >-
        Ramp's secondary revenue stream is net interchange from corporate Visa card transactions: the company earns
        approximately 1.5–2% gross interchange but returns 1.5% as cash back, retaining approximately 0.1–0.3% net
        spread; at $25B in annualised card volume, this generates approximately $25–75M in net card revenue annually.
      type: estimated
      topic: interchange-revenue
      sourceRefs:
        - S409
        - S417
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ402
        - RQ403
    - id: C403
      statement: >-
        Ramp Treasury (launched September 2024) generates NII by deploying customer idle cash into money market funds;
        at current 4–5% interest rates and estimated $500M+ in customer assets under management, this generates
        approximately $20–50M in annual NII — an emerging revenue stream sensitive to Federal Reserve rate
        normalisation.
      type: estimated
      topic: treasury-NII
      sourceRefs:
        - S413
        - S409
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ413
    - id: C404
      statement: >-
        Ramp's bill pay transaction fees represent a growing secondary revenue stream: as the company processes more
        vendor payments through Ramp Bill Pay, flat fees or percentage fees per payment create a volume-based revenue
        component that is more durable than interchange but smaller in scale at current customer adoption rates.
      type: inferred
      topic: bill-pay-fees
      sourceRefs:
        - S411
        - S412
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ402
    - id: C405
      statement: >-
        Ramp does not publish audited financial statements or official ARR disclosures; all revenue estimates ($500–700M
        ARR) are analyst triangulations based on card volume disclosures, customer count, and pricing data — carrying
        high uncertainty; the actual revenue, profitability, and cash position are unknown to public market
        participants.
      type: observed
      topic: financial-disclosure-gap
      sourceRefs:
        - S403
        - S404
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ421
    - id: C406
      statement: >-
        Ramp's estimated revenue per employee of $250,000–470,000 at $500–700M ARR and 1,500–2,000 headcount is among
        the highest in B2B fintech — reflecting the high-leverage interchange + SaaS model where revenue scales with
        card volume without proportional headcount growth; this metric compares favourably to the $150–200K industry
        median.
      type: estimated
      topic: revenue-per-employee
      sourceRefs:
        - S420
        - S401
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ408
    - id: C407
      statement: >-
        Ramp's PLG acquisition model creates structurally lower CAC versus enterprise SaaS peers: VC partner
        recommendations remove sales friction; free onboarding requires no budget approval; and the card product ships
        within hours — creating an efficient acquisition funnel where the primary marketing cost is the VC relationship
        investment (personnel cost, not direct spend).
      type: inferred
      topic: CAC-advantage
      sourceRefs:
        - S409
        - S401
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ409
    - id: C408
      statement: >-
        Ramp's LTV is enhanced by inherently high switching costs: moving expense data and card configurations to a new
        platform is complex; ERP integrations are embedded deeply into customer workflows; and customer companies' card
        spend grows as they scale — making Ramp's revenue per customer compound over time even without active upsell.
      type: inferred
      topic: LTV-switching-costs
      sourceRefs:
        - S412
        - S401
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ410
    - id: C409
      statement: >-
        Net Revenue Retention (NRR) is not publicly disclosed by Ramp; analyst estimates suggest NRR above 120% based on
        customer expansion behaviour (growing card spend as companies scale), but this is unverified; NRR is the single
        most important missing financial metric for evaluating Ramp's SaaS quality.
      type: estimated
      topic: NRR-gap
      sourceRefs:
        - S401
        - S406
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ410
    - id: C410
      statement: >-
        Ramp's blended gross margin is estimated at 60–75%: SaaS subscription revenue has ~85–90% gross margin; net
        interchange after rebates has ~40–60% margin (accounting for bank partner fees, network costs, and fraud
        losses); the revenue mix weighted to SaaS (~65%) produces a blended margin superior to interchange-only card
        businesses.
      type: estimated
      topic: gross-margin
      sourceRefs:
        - S409
        - S417
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ407
    - id: C411
      statement: >-
        Ramp has raised approximately $1.37B in primary equity across 5 rounds from 2020 to 2024: seed ($15M), Series A
        ($115M, $1.6B, March 2021), Series B ($300M, $3.9B, August 2021), Series C ($750M, $8.1B, December 2021), growth
        round ($150M, $7.65B, March 2024); all rounds are evidenced by SEC Form D filings in the public EDGAR database.
      type: observed
      topic: capital-raises
      sourceRefs:
        - S403
        - S404
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ405
    - id: C412
      statement: >-
        The March 2024 growth round at $7.65B was a 5.5% down-round from the $8.1B Series C valuation of December 2021;
        this was smaller in proportional terms than many fintech down-rounds (some saw 50–70% cuts) but nonetheless
        confirms that Ramp did not achieve valuation growth despite strong revenue growth — reflecting the market-wide
        multiple compression cycle.
      type: observed
      topic: down-round-analysis
      sourceRefs:
        - S407
        - S408
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ406
        - RQ423
    - id: C413
      statement: >-
        No venture debt or public credit facilities have been disclosed by Ramp; the company's interchange income
        provides continuous cash generation, reducing debt requirements; however, the need for the 2024 growth round
        despite multi-year revenue growth implies ongoing cash consumption — likely driven by aggressive product
        investment, sales team build-out, and potential operating losses.
      type: inferred
      topic: capital-structure
      sourceRefs:
        - S403
        - S406
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ412
    - id: C414
      statement: >-
        Ramp's capital adequacy appears adequate in the near term: the March 2024 $150M round provides runway, and the
        $500–700M ARR scale should generate meaningful cash unless the company is burning $150M+ annually; given the
        PLG-efficient model, annual burn is estimated below $100M at current scale, implying 18+ months of runway from
        the 2024 round.
      type: estimated
      topic: runway-estimate
      sourceRefs:
        - S414
