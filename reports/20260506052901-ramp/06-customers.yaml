  evidenceGaps:
    - type: missing-source
      severity: major
      topic: Official NRR and GRR — Ramp has not published net or gross revenue retention
      missingEvidence: >-
        Ramp has not disclosed NRR, GRR, cohort churn, or dollar churn metrics in any public filing or press release.
        Analyst estimates of 110–125% NRR are inferred.
      whyItMatters: >-
        NRR is the single most important SaaS retention metric; absence prevents confident assessment of revenue
        durability and expansion economics.
      relatedQuestionRefs:
        - RQ606
        - RQ608
    - type: missing-source
      severity: major
      topic: Named customer proof table — sample only; full 25,000+ customer list is confidential
      missingEvidence: >-
        Ramp's full customer roster is not publicly available. Named case studies are company-authored and may not
        represent the broader customer base.
      whyItMatters: >-
        Without a statistically representative sample of named deployments, it is difficult to assess Ramp's penetration
        in non-technology verticals or its production deployment rate versus logo collection.
      relatedTableRefs:
        - T603
      relatedQuestionRefs:
        - RQ622
    - type: missing-source
      severity: moderate
      topic: Customer revenue concentration schedule — top-10 customer % of ARR not disclosed
      missingEvidence: >-
        Ramp has not disclosed customer revenue concentration data. Given 25,000+ customers, top-10 concentration is
        likely moderate, but marquee enterprise logos (Shopify) could contribute disproportionately.
      whyItMatters: >-
        Concentration risk is a material diligence consideration at Series D+ when single customer losses can have
        meaningful revenue impact.
      relatedQuestionRefs:
        - RQ613
    - type: missing-source
      severity: moderate
      topic: Multi-product attach rate — percentage of customers using 2+ Ramp modules not disclosed
      missingEvidence: >-
        Ramp has not disclosed what percentage of its 25,000+ customers use Bill Pay, Travel, or Accounting in addition
        to the core card product.
      whyItMatters: >-
        Multi-product attach is the primary driver of NRR above 100%; without this data, the land-and-expand growth
        thesis cannot be verified.
      relatedQuestionRefs:
        - RQ616
    - type: enumeration-incomplete
      severity: minor
      topic: Named customer proof table is a sample of publicly available names; not exhaustive
      missingEvidence: >-
        Ramp maintains a larger unstated customer list. The 8 named customers in T603 represent publicly confirmed
        deployments only.
      whyItMatters: >-
        Sample bias risk: publicly named customers tend to be the most successful and satisfied; adverse deployments or
        churned enterprise logos would not appear in the sample.
      relatedTableRefs:
        - T603
    - type: missing-source
      severity: minor
      topic: GRR and cohort retention by vintage — no public cohort data available
      missingEvidence: Ramp has published no cohort retention data. F604 values are illustrative estimates only.
      whyItMatters: >-
        Cohort retention reveals whether early vintages hold or decay over time — a key indicator of product durability
        versus retention via new customer replacement.
      relatedQuestionRefs:
        - RQ619
        - RQ620
    - type: missing-source
      severity: moderate
      topic: Card volume per customer lifecycle — no cohort spend trajectory data published
      missingEvidence: >-
        Ramp has not published data on how average card volume per customer changes over the customer lifecycle. It is
        unclear whether spend grows steadily, plateaus, or declines after the initial onboarding period.
      whyItMatters: >-
        Increasing spend per customer over time is a key indicator of the land-and-expand flywheel working; without this
        data, NRR expansion can only be estimated.
      relatedQuestionRefs:
        - RQ624
    - type: missing-source
      severity: minor
      topic: Regulatory or CFPB complaints against Ramp card program — no public record found
      missingEvidence: >-
        No CFPB, FTC, or state banking regulator complaint data referencing Ramp's corporate card or expense management
        product is publicly available; absence of adverse regulatory signal is noted but cannot be confirmed as
        exhaustive.
      whyItMatters: >-
        Systemic cardholder complaints would signal underwriting, dispute resolution, or customer service problems that
        could drive churn or regulatory action.
      relatedQuestionRefs:
        - RQ625
