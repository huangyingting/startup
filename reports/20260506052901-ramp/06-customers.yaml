callouts:
  - title: Strong adoption proof; retention data is a critical diligence gap
    body: >
      Ramp's customer evidence is robust for an early-stage diligence exercise: 25,000+ named customers, top-tier named
      logos (Shopify, OpenAI, Anduril), 4.8/5.0 on G2 from 1,900+ reviews, and strong estimated NRR of 110–125%.
      However, the absence of official NRR, GRR, cohort retention, and customer concentration data is a material gap at
      the Series D+ stage. Investors should demand a cohort retention schedule, top-10 customer revenue concentration,
      and enterprise vs. SMB NRR split before committing capital.
    calloutType: risk
    claimRefs:
      - CU001
      - CU008
      - CU020
      - CU025
      - CU034
