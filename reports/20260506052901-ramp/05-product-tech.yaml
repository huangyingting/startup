      statement: >-
        Ramp's enterprise authentication stack includes SAML 2.0 for SSO integration with corporate identity providers
        (Okta, Azure AD, OneLogin), SCIM 2.0 for automated user provisioning/deprovisioning, and OAuth 2.0 for API
