  claims:
    - id: C501
      statement: >-
        Ramp's product addresses the corporate finance team's end-to-end daily workflow: card issuance with spend
        controls, AI receipt capture, invoice processing, GL coding, ERP sync, travel booking, and AI savings
        intelligence — replacing 3–5 point solutions (separate card, expense tool, AP software, travel platform,
        treasury account) with a single integrated platform.
      type: observed
      topic: product-definition
      sourceRefs:
        - S503
        - S514
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ501
    - id: C502
      statement: >-
        Ramp's self-serve onboarding deploys in hours: a finance admin applies for a corporate card, sets spending
        policies, connects their ERP, and issues cards to employees within a single working day; this contrasts with SAP
        Concur's typical 3–6 month implementation project requiring IT resources and SI involvement — a structural
        architectural advantage of building self-serve first.
      type: observed
      topic: deployment-speed
      sourceRefs:
        - S525
        - S507
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ507
    - id: C503
      statement: >-
        Ramp supports 200+ ERP and accounting integrations including NetSuite, QuickBooks Online, Sage Intacct, Xero,
        Workday, SAP S/4HANA, Microsoft Dynamics, and Oracle; the integration architecture uses native partner APIs
        where available and REST API connectors with webhook-based synchronisation for others — enabling real-time
        two-way transaction sync.
      type: observed
      topic: ERP-integrations
      sourceRefs:
        - S503
        - S512
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ503
    - id: C504
      statement: >-
        Ramp's AI expense coding uses machine learning trained on anonymised transaction data to automatically assign GL
        codes, cost centres, and expense categories to each transaction; accuracy rates in customer case studies are
        reported at 90%+ for trained customers, dramatically reducing manual coding time for finance teams.
      type: observed
      topic: AI-expense-coding
      sourceRefs:
        - S514
        - S515
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ520
    - id: C505
      statement: >-
        Ramp's platform has seven modules: (1) Card (Visa, 1.5% cashback, virtual + physical), (2) Expense (AI receipt
        capture, policy enforcement, approvals), (3) Bill Pay (invoice OCR, approval routing, ACH/wire payment), (4)
        Accounting (GL coding, ERP sync, month-end close), (5) Intelligence (AI benchmarking, savings, contract
        analysis), (6) Travel (booking, policy, receipt auto-capture), (7) Treasury (yield-bearing corporate cash
        management).
      type: observed
      topic: product-modules
      sourceRefs:
        - S503
        - S505
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ501
    - id: C506
      statement: >-
        Ramp's seven modules are designed on a unified data model: all card, expense, invoice, and travel transactions
        flow into a single data warehouse, enabling cross-module analytics, AI intelligence features, and consistent ERP
        coding — a deliberate architectural choice that competitors who built modules separately or through acquisitions
        cannot easily replicate.
      type: inferred
      topic: unified-data-model
      sourceRefs:
        - S507
        - S501
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ502
    - id: C507
      statement: >-
        Ramp's technology infrastructure is cloud-native on AWS multi-region; the platform uses a REST API with OAuth
        2.0 authentication, webhook events for real-time notifications, and SCIM 2.0 for enterprise directory
        provisioning; the API is publicly documented at docs.ramp.com and is used by customers for custom enterprise
        integrations.
      type: observed
      topic: cloud-architecture
      sourceRefs:
        - S501
        - S502
      confidence: medium
      freshness: current
      answersQuestionRefs:
