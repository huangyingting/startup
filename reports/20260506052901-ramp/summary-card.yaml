summary:
  headline: >
    Ramp's 100%+ growth, 25,000 customers, and AI-native moat justify TRACK status; the $13B secondary valuation at
    18–26× unconfirmed ARR is aggressive and demands primary diligence before conviction.
  overallScore: 6.4
