companyProfile:
  summary: >
    Ramp Financial Inc. is a New York-headquartered corporate card and spend-management
    platform founded in 2019 by Eric Glyman (CEO) and Karim Atiyeh (CTO). Its core
    product — a Visa corporate card with real-time spend controls — is augmented by an
    AI-native intelligence layer covering receipt matching, policy enforcement, contract
    negotiation insights, and CFO-grade analytics. Ramp's go-to-market targets
    cost-conscious US small-to-mid-market businesses (10–1,000 employees) seeking to
    replace manual expense reports and displace legacy T&E incumbents (Concur, Expensify).
    With $150M raised at $7.65B in March 2024 and secondary trades implying ~$13B in
    late 2024, Ramp has re-rated sharply upward after a brief 2022 down-round overhang.
    Estimated ARR of $500–700M growing 100%+ YoY, 25,000+ enterprise customers, and
    ~$25B in annualised card volume position Ramp as the most credible challenger to
    Brex in the US corporate card market.
  foundedDate: '2019-01-01'
  founders:
    - name: Eric Glyman
      role: CEO and co-founder
      background: >
        Former co-founder of Paribus (acquired by Capital One 2016); primary strategic
        and commercial leader responsible for go-to-market, fundraising, and investor
        relationships. Controls majority of voting shares via dual-class structure.
      claimRefs: [CO006]
    - name: Karim Atiyeh
      role: CTO and co-founder
      background: >
        Former software engineer; leads product engineering, infrastructure, and AI
        development. Architect of Ramp's real-time spend intelligence platform.
      claimRefs: [CO007]
  foundingLocation: New York, NY, USA
  headquarters: New York, NY, USA
  productSummary: >
    Ramp's product suite spans the full corporate spend lifecycle: a zero-fee Visa
    corporate card with real-time controls, an AI Intelligence layer for duplicate
    detection and benchmarking, Bill Pay for AP automation, Procurement for
    purchase-order workflows, and a Travel booking module with embedded policy
    guardrails — all backed by 1,000+ ERP/HRIS integrations.
  keyProducts:
    - name: Ramp Corporate Card
      description: >
        Visa-network corporate card with real-time spend controls, virtual card issuance,
        and automated receipt matching. No fees, no minimums.
      claimRefs: [CO003]
    - name: Ramp Intelligence
      description: >
        AI layer providing duplicate vendor detection, contract renewal alerts, spend
        benchmarking, and CFO-grade reporting. Differentiated moat versus legacy players.
      claimRefs: [CE009]
    - name: Ramp Bill Pay
      description: >
        Accounts payable automation — vendor onboarding, invoice parsing, approval workflows,
        and ACH/check payment execution integrated with NetSuite, QuickBooks, Sage Intacct.
      claimRefs: [CE029]
    - name: Ramp Procurement
      description: >
        Purchase-order management and approval workflows for mid-market buying teams.
      claimRefs: [CO018]
    - name: Ramp Travel
      description: >
        Corporate travel booking (flights, hotels) with policy guardrails embedded at
        point-of-booking; acquired Pleo travel capabilities in partnership ecosystem.
      claimRefs: [CE015]
  customerFocus: >
    Primary: US SMB and mid-market companies (10–1,000 employees) across technology,
    professional services, e-commerce, and retail verticals. Notable logos include Shopify,
    OpenAI, Spotify, and 1Password. 85%+ of customers are in the US.
  businessModel: >
    Revenue from Visa interchange on card spend (~1.0–1.5% of volume), SaaS subscription
    fees for premium intelligence and bill-pay modules, and treasury yield on float.
    Zero consumer fees is a deliberate CAC tool. Interchange is the dominant revenue
    driver at ~$25B annualised volume. Gross margins estimated at 50–60% (unconfirmed).
  stage: late-stage private
  fundingStatus: >
    Total primary capital approximately $1.37B. Key rounds: $15M seed (2020, Founders Fund);
    $115M Series B at $1.6B (March 2021); $300M Series C at $3.9B (August 2021); $750M
    Series D at $8.1B (December 2021); $150M extension at $7.65B (March 2024, down-round
    from $8.1B). Secondary market transactions in late 2024 implied ~$13B valuation.
    Investors include Thrive Capital, D1 Capital, Founders Fund, Redpoint Ventures,
    Khosla Ventures, and Stripe.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO002, CO006, CO007, CO012, CO021, CO015, CI011]

summary:
  headline: >
    Ramp's 100%+ growth, 25,000 customers, and AI-native moat justify TRACK status;
    the $13B secondary valuation at 18–26× unconfirmed ARR is aggressive and demands
    primary diligence before conviction.
  overallScore: 6.4
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched
  keyMetrics:
    valuationUsdM: 13000
    revenueRunRateUsdM: null
    arrUsdM: 600
    revenueGrowthYoYPct: 100
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 1370
    customerCount: 25000
    headcount: 900
  topStrengths:
    - "AI-native spend intelligence layer (Ramp Intelligence) creates genuine switching costs and benchmarking moat absent from legacy Concur/SAP and challenger Brex"
    - "25,000+ enterprise customers and ~$25B annualised card volume at 100%+ ARR growth demonstrates product-market fit across US mid-market cost-conscious buyers"
    - "Zero-fee, zero-minimum pricing removes the primary objection in SMB sales and enables viral referral loops that keep CAC structurally low"
    - "Broad integration ecosystem (NetSuite, QuickBooks, Sage Intacct, 1,000+ ERP/HRIS connectors) creates multi-product switching costs beyond the card itself"
    - "Secondary trade re-rating from $7.65B (March 2024) to ~$13B (late 2024) signals strong investor sentiment and market confidence in the growth trajectory"
  topRisks:
    - "Sutton Bank BIN-sponsorship dependency: Ramp is not a chartered bank; if Sutton exits or regulators impose restrictions, card issuance could be disrupted with no immediate alternative"
    - "Credit Card Competition Act (CCCA): if enacted, interchange routing competition for corporate Visa/Mastercard transactions could compress the primary revenue driver by 25–50%"
    - "Brex and Navan well-funded competition: Brex's international expansion and $12B valuation create persistent head-to-head competition; Navan's travel-plus-card bundle threatens from above"
    - "Valuation risk: $13B secondary at 18–26× estimated ARR is at the high end of the range for an unconfirmed business; a growth deceleration to 50% YoY would imply a significant mark-down"
    - "CFO vacancy (reported Q1 2025) and founder-dominated governance create financial-controls and succession risk heading into a pre-IPO regulatory window"
  unresolvedGaps:
    - "Exact ARR and revenue composition (interchange vs SaaS vs float) — not publicly disclosed; $500–700M is analyst estimation only"
    - "Net Revenue Retention rate — Ramp does not disclose publicly; critical for SaaS valuation; estimated 110–125% but unconfirmed"
    - "Gross margin and unit economics — no public disclosure; interchange-heavy model may carry lower gross margin than pure SaaS comparables"
    - "Capitalisation table preference stack from 2021 triple-down ($1.35B in 11 months) — liquidation preference economics not public"
    - "Sutton Bank contract terms and renewal date — full BIN-sponsorship agreement is non-public; duration and exit provisions unknown"
    - "CFO hire and corporate governance improvements since Q1 2025 vacancy — status unconfirmed"
