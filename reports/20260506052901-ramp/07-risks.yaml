  claims:
    - id: CR001
      statement: >-
        Interchange fees (typically 1.8–2.4% for commercial Visa cards issued via Sutton Bank) are the primary revenue
        source funding Ramp's card reward programme and driving the overall fintech model; this makes Ramp structurally
        exposed to any legislative or regulatory action that compresses commercial card interchange rates.
      type: observed
      topic: interchange-revenue-dependency
      sourceRefs:
        - SR024
        - SR025
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR001
      contradictsClaimRefs: []
    - id: CR002
      statement: >-
        Industry analysis from Sacra and a16z suggests that a Durbin-style cap applied to commercial cards (as proposed
        in the Credit Card Competition Act) could reduce Ramp's gross revenue per card dollar by 30–50%, requiring a
        2–3× increase in SaaS attach rate to maintain margin neutrality.
      type: estimated
      topic: interchange-compression-impact
      sourceRefs:
        - SR024
        - SR025
        - SR002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR002
      contradictsClaimRefs: []
    - id: CR003
      statement: >-
        Ramp's BIN sponsorship arrangement with Sutton Bank (Iowa) places Ramp in a bank-as-a-service (BaaS) regulatory
        structure; Sutton Bank holds primary BSA/AML, KYC, and Regulation E obligations, with Ramp co-obligated as a
        programme participant under Sutton's OCC examination framework.
      type: observed
      topic: BaaS-structure
