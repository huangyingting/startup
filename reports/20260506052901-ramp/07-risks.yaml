analysisCallout:
  title: Sutton Bank dependency and interchange compression are thesis-critical risks
  body: >
    Ramp faces two structurally non-diversifiable risks: (1) Sutton Bank BIN sponsorship concentration — if Sutton exits
    the BaaS relationship under regulatory pressure, Ramp must migrate 25,000+ customer card programmes, a 6–18 month
    disruption; and (2) interchange compression via CCCA/Durbin extension — a 50% cut in commercial card interchange
    would require 2–3× SaaS attach to maintain margin neutrality. Both risks are industry-wide, not Ramp-specific, but
    their magnitude relative to Ramp's current revenue mix makes them thesis-critical. Mitigation progress on both
    should be a standard term sheet request.
  calloutType: risk
  claimRefs:
    - CR002
    - CR004
    - CR016
    - CR031
