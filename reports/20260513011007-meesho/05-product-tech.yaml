  evidenceGaps:
    - id: GE001
      summary: "ML model accuracy metrics not publicly disclosed"
      detail: >
        Meesho's engineering blog describes the Catalog Intelligence Platform, GenAI search,
        and recommendation engine at a system-design level but does not publish accuracy
        benchmarks, precision/recall figures, or A/B test lift outcomes. Investors and sellers
        cannot independently assess the reliability of automated catalog tagging or fraud detection.
      relatedQuestionRefs: [QE013, QE016]
      severity: moderate

    - id: GE002
      summary: "Third-party security certifications not publicly confirmed"
      detail: >
        No public statements from Meesho confirm ISO 27001, SOC 2, or PCI-DSS compliance audits.
        Given that Meesho processes over 199M user payment transactions annually — including sensitive
        UPI and bank account data — the absence of disclosed third-party certification is a meaningful
        due-diligence gap for enterprise vendors and institutional investors.
      relatedQuestionRefs: [QE014]
      severity: significant

    - id: GE003
      summary: "Documented fraud bypass incidents not publicly disclosed"
      detail: >
        Meesho's trust and safety controls rely on ML classifiers whose false-negative rates are
        undisclosed. Public seller forums indicate instances of fake reviews and counterfeit listings
        bypassing automated detection, but the company has not published incident rates, remediation
        data, or enforcement volume statistics.
      relatedQuestionRefs: [QE018]
      severity: moderate
