company:
  name: Meesho

chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Meesho operates a zero-commission mobile-first marketplace built on three core applications — the
    buyer app, the Meesho Supplier app, and the Valmo logistics platform. The tech stack is a
    microservices architecture on AWS using Java/Kotlin, Python ML, Kafka, Spark, and Elasticsearch.
    Meesho's differentiation lies in its Catalog Intelligence Platform (automated tagging at scale),
    GenAI-enhanced search (LLMs deployed FY2024), and Valmo's in-house route optimization reducing
    per-shipment logistics cost by over 25%. IPO proceeds allocate ₹1,390 crore for hybrid cloud
    migration (FY2026-FY2028) and ₹480 crore for AI/ML talent — signalling the largest product
    investment cycle in the company's history. Key gaps include undisclosed ML accuracy metrics,
    no public developer API, and unconfirmed third-party security certifications.

sections:
  - id: product-platform
    title: "Product Platform and Module Map"
    body: >
      Meesho's product surface is entirely mobile-first. The buyer app (Android and iOS) provides
      end consumers access to a curated value catalog spanning women's fashion, home décor,
      electronics accessories, and 25+ categories priced 50-80% below MRP. The Meesho Supplier app
      (Android) enables over 1.2 million active MSMEs and individual resellers to upload catalogs,
      manage orders, track returns, and receive payments through a single interface. A social-sharing
      feature in the buyer app supports zero-inventory reselling via WhatsApp and social networks,
      a workflow unique among Indian e-commerce platforms. The platform also provides a web storefront
      and self-serve seller portal accessible via browser. No public developer API or affiliate
      integration channel comparable to Amazon MWS or Flipkart Affiliate API is available, limiting
      third-party ecosystem extensibility.
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: seller-buyer-workflows
    title: "Seller and Buyer Workflows"
    body: >
      Sellers onboard through a guided Supplier app flow: GSTIN verification, bank account linking,
      catalog upload (photo + description), and pricing. Meesho's Catalog Intelligence Platform (CIP)
      auto-suggests category, subcategory, and attributes from product images, reducing manual effort
      from hours to minutes. Buyers browse via algorithmically curated feeds and a GenAI-powered
      search bar supporting natural language and voice queries. A WISMO (Where Is My Order) in-app
      tracker delivers real-time delivery status and ETA predictions through Valmo's logistics APIs.
      COD (Cash on Delivery), which accounts for approximately 76% of orders, is reconciled through
      a dedicated pipeline that aggregates cash deposits from 19,000+ pin-code delivery agents, verifies
      against order records, and triggers seller payment within 7-10 days. Buyer returns trigger an
      automated pickup scheduling flow, with refunds processed within 5-7 days for prepaid orders.
    tableRefs: [TE002]
    figureRefs: [FE002]

  - id: technology-architecture
    title: "Technology Architecture"
    body: >
      Meesho's core backend is a polyglot microservices system. Java and Kotlin services handle
      high-throughput order, catalog, and user domains; Python handles ML inference and data
      pipelines. Amazon Web Services (AWS) is the primary cloud, hosting compute (EC2/EKS),
      storage (S3), and managed services. Apache Kafka ingests billions of daily events from buyer
      sessions, seller actions, and Valmo delivery updates; Apache Spark and Flink process these
      in batch and near-real-time for analytics and model training. Elasticsearch powers catalog
      search and relevance scoring across 500 million+ SKUs. MySQL and PostgreSQL serve as the
      primary relational stores, with Redis providing caching for high-frequency reads. The web
      frontend employs Cloudflare, Amazon CloudFront, and Nginx as reported by BuiltWith, delivering
      low-latency catalog pages. A planned hybrid cloud migration (FY2026-FY2028, funded with
      ₹1,390 crore IPO proceeds) will supplement AWS capacity with private data-center infrastructure
      for latency-sensitive and compliance-driven workloads.
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: ai-ml-differentiation
    title: "AI, ML, and GenAI Differentiation"
    body: >
      Meesho's technology moat is concentrated in three ML systems. First, the Catalog Intelligence
      Platform (CIP) uses computer vision and NLP to auto-tag product attributes (color, size, pattern,
      material) from seller-uploaded images, substantially reducing listing latency and improving
      catalog quality at scale. Second, a recommendation engine combines collaborative filtering
      with content-based signals to personalize buyer feeds for 199 million annual transacting users.
      Third, a GenAI-powered search layer deployed in FY2024 uses large language models (LLMs) to
      parse natural-language and colloquial Hindi/regional-language queries. A visual search feature
      uses image embeddings to match user-uploaded photos against catalog products. Meesho's fraud
      detection system applies real-time ML classifiers to flag fake reviews, coupon abuse, and
      seller gaming behaviors. The company publishes technical depth on these systems via its
      engineering blog (medium.com/meesho-tech) but does not publicly disclose accuracy benchmarks,
      recall/precision figures, or A/B test outcomes.
    tableRefs: []
    figureRefs: [FE004]

  - id: trust-safety-compliance
    title: "Trust, Safety, and Compliance"
    body: >
      Meesho operates multiple layers of trust controls. Automated image moderation scans all new
      catalog listings for counterfeit brand imagery. A seller quality score tracks return rates,
      defect reports, and fulfilment reliability, with suspensions triggered above threshold breaches.
      The trust and safety team combines ML-based detection with human review for seller appeals and
      buyer dispute escalations. On the regulatory side, Meesho is subject to India's IT Act 2000,
      Consumer Protection (E-Commerce) Rules 2020, and the forthcoming Digital Personal Data
      Protection Act 2023 whose implementation timeline remains uncertain. As a newly listed company
      (December 2025), Meesho is now bound by SEBI's LODR disclosure framework. Third-party
      security certifications (ISO 27001, SOC 2, PCI-DSS audits) have not been publicly disclosed,
      a meaningful diligence gap given the scale of payment and personal-data handling.
    tableRefs: [TE004]
    figureRefs: []

  - id: roadmap-technology-investment
    title: "Roadmap and Technology Investment"
    body: >
      Meesho's published IPO use-of-proceeds provides the most granular public roadmap signal.
      ₹1,390 crore is earmarked for cloud infrastructure expansion (hybrid cloud migration
      FY2026-FY2028), enabling greater control over latency, data residency, and cost per
      transaction at scale. ₹480 crore targets AI/ML and engineering talent acquisition.
      The engineering blog and news coverage suggest active development of GenAI-powered buyer search,
      catalog quality automation, and Valmo predictive logistics. Meesho in-housed logistics via
      Valmo in FY2023, completing a critical operational shift that reduced per-shipment costs by
      over 25% versus third-party carriers. No public product changelog or version-release cadence
      is disclosed. Job postings on Naukri reveal active hiring in Flink, Golang, Kubernetes, and
      large-scale distributed systems, signalling ongoing infrastructure maturation.
    tableRefs: [TE005]
    figureRefs: []

