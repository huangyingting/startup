callouts:
  - calloutType: strength
    title: "Proprietary AI and Logistics Technology Moat"
    body: >
      Meesho's Catalog Intelligence Platform and Valmo logistics stack represent genuine
      proprietary technology assets: CIP auto-tags millions of listings daily from seller
      images (eliminating manual effort at scale), while Valmo's route optimization cut
      per-shipment delivery costs by over 25% versus third-party logistics carriers.
      Both systems are backed by large proprietary datasets not easily replicable by
      new entrants targeting India's Tier 3+ market.
    claimRefs: [CE011, CE034, CE016]

  - calloutType: risk
    title: "AWS Cloud Concentration Risk"
    body: >
      Meesho's technology stack carries a high AWS concentration risk: compute, storage,
      streaming (MSK/Kafka), search (OpenSearch), and ML training (SageMaker) all depend
      on a single cloud provider. A sustained AWS India region outage would impair
      all platform services simultaneously. The hybrid cloud migration (FY2026-FY2028)
      should reduce but not eliminate this exposure; transition execution risk is material
      given the scale of the migration funded by IPO proceeds.
    claimRefs: [CE006, CE020, CE035]

  - calloutType: risk
    title: "Technology Transparency Gap: No Disclosed Metrics or Certifications"
    body: >
      The absence of publicly disclosed ML model accuracy metrics, third-party security
      certifications (ISO 27001 / SOC 2 / PCI-DSS), and a public developer API creates
      meaningful trust and due-diligence opacity. Post-IPO SEBI scrutiny may surface
      data governance gaps; Digital Personal Data Protection Act 2023 compliance timelines
      remain unclear. Enterprise or institutional investors relying on technology due
      diligence lack sufficient transparency to independently verify system reliability.
    claimRefs: [CE028, CE040, CE023]

