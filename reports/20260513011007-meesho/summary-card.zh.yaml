summary:
  headline: >
    Meesho 的零佣金模式和二三线城市覆盖，让这次 IPO 具备结构性差异；1.4x EV/NTM Revenue 估值有吸引力，但抽佣率太薄、盈利时间表未完全落地，Flipkart 与 Amazon
    竞争也很硬，因此更适合选择性积累，而不是直接买入。
