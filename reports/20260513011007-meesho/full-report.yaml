        - Forces EBITDA into negative territory; creates regulatory uncertainty that compresses multiple
        - Downgrade to Hold; re-evaluate within 3 months
      - - Regulatory reclassification as inventory platform
        - Any MeitY or MoCI directive or binding court order reclassifying Meesho's model
        - Eliminates intermediary safe-harbor; transforms product liability, GST, and FDI exposure
        - Immediate Sell; thesis fundamentally breaks
      - - Profitability reversal
        - Two consecutive post-IPO quarters with negative EBITDA at group level
        - Demonstrates the Q4 FY2025 FCF positive was not structural; makes multiple expansion implausible
        - Downgrade to Sell; exit within 30 days
      - - Competitive GMV subsidy war
        - Meesho NPS falling below 35 or system-wide RTS rate rising above 30% for two quarters
