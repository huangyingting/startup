      - number: '1.3'
        title: Funding History and Investors
        blocks:
          - type: paragraph
            body: |
              Meesho has raised approximately $1.36 billion across twelve-plus funding rounds from its founding
              in 2015 through the January 2025 close of a $550 million secondary-heavy round. Early backers
              include Y Combinator (2016 batch), Elevation Capital (Series A, 2017), and Peak XV Partners
              (formerly Sequoia India, Series B, 2018). The company raised $50 million in Series C in October
              2018, followed by two Series D tranches totalling $150 million in mid-2019 from Facebook (now Meta)
              and Naspers (now Prosus).

              The 2021 capital markets boom brought two landmark rounds: a $300 million Series E in April 2021
              at a $2.1 billion valuation led by SoftBank Vision Fund, and a $570 million Series F in September
              2021 at a $4.9 billion peak valuation led by Fidelity and B Capital. After a funding winter, Meesho
              returned to markets in April 2024 raising $275 million at $3.9 billion from Tiger Global (first
              investment in Meesho) and Peak XV, followed by a larger $270 million tranche in January 2025
              (total round $550 million) bringing in Think Investments and Mars Growth Capital. A majority of
              recent rounds were secondary transactions.

              Post-IPO in December 2025, the company has public shareholders on NSE and BSE. The primary
              fund-raise of ₹4,250 crore (approximately $500 million) at IPO was earmarked partly to cover the
              $280–300 million U.S. tax liability incurred from the reverse domicile flip.
