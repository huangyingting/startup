        title: Expansion and Concentration Risks
        blocks:
          - type: paragraph
            body: >
              Meesho's buyer concentration risk is structurally low: no single buyer accounts for more than 1% of GMV in
              a consumer marketplace model. Seller concentration risk is also limited — no seller contributes more than
              0.5% of GMV per SEBI DRHP disclosures. However, category concentration in fashion and apparel (estimated
