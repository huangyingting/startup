  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Architecture and Business Model
        blocks:
          - type: paragraph
            body: |
              Meesho operates a zero-commission marketplace: sellers list products and transact for free.
              Revenue is generated through two primary mechanisms—logistics fulfilment fees charged to sellers
              who opt into the Valmo-powered fulfilment network, and platform advertising fees (CPC and CPM)
              for sponsored placements. A nascent third stream, value-added services, includes seller analytics
              tools and credit facilitation partnerships, but contributed less than 3% of total revenue as of
              FY2025. Cross-sell revenue from financial services remained negligible in the disclosed period.

              Logistics fees are charged on a per-order basis with weight-and-distance slabs. The gross fee
              charged to sellers is approximately ₹82–85 per order (blended, including last-mile surcharges),
              against which Meesho bears the actual fulfillment cost paid to Valmo and third-party logistics
              providers. As Valmo's cost base improved, the net logistics margin per order turned positive in
              FY2024. Advertising is sold via a self-serve auction platform integrated into the Meesho seller
              dashboard; as seller count exceeded 1.6 million, ad inventory depth increased and average
              spend-per-active-seller rose. Advertising's margin profile is structurally superior to logistics
              fees because incremental revenue carries near-zero delivery cost.

              Revenue from operations grew 33% in FY2024 to ₹7,615.1 crore and a further 23% in FY2025 to
              ₹9,389.9 crore, tracking well below the order volume growth rate of approximately 36%, which
              implies net revenue per order grew modestly—from ~₹43 in FY2024 to ~₹51 in FY2025—as
              advertising monetisation per order improved. Management expects the advertising revenue share
              to expand from approximately 17% to above 20% by FY2027, supporting overall margin uplift
              even at stable logistics take rates.
