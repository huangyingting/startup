chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Meesho Limited (NSE: MEESHO) is India's leading value-focused e-commerce marketplace headquartered
              at Helios Business Park, Bengaluru, Karnataka. Incorporated in 2015 as Fashnear Technologies Private
              Limited (the Indian operating entity), the company originally started as a social commerce platform
              enabling small businesses and home-based entrepreneurs—primarily women in non-metro India—to resell
              products through WhatsApp, Facebook, and Instagram without maintaining inventory. Over 2022–2024
              Meesho broadened its model to serve direct consumers under the "Bharat" (Tier 2/3/4 cities) thesis
              while retaining its zero-commission-to-sellers positioning.

              The core business model is marketplace-based: Meesho does not charge commission to the roughly
              1.5 million sellers who list products on its platform; instead it monetizes through advertising
              (promoted listings and sponsored products) and logistics services offered to sellers. In 2024
              Meesho supplemented this with Meesho Mall, a brand-focused curated storefront where large brands
              pay a commission, adding a second monetization lever. The company's in-house logistics marketplace,
              Valmo (launched February 2024), aggregates smaller regional logistics providers and handled more
              than half of all shipments by December 2024, significantly reducing per-order shipping costs.

              As of the IPO in December 2025, Meesho is classified as an Internet Retail company in the
              Consumer Discretionary sector, with fiscal year running April through March, and reporting currency
              Indian Rupee (INR).
