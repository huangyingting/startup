      - number: '3.3'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >
              Across key buying criteria for both consumers and sellers, Meesho, Flipkart, and Amazon exhibit
              meaningfully different capability profiles. For consumer capabilities: breadth of catalog, Meesho offers
              1.3M+ sellers with 500M+ SKUs predominantly in unbranded fashion, home goods, and accessories. Flipkart
              leads in electronics and branded fashion. Amazon leads in international brands, premium electronics, and
              subscription (Prime) bundling. Logistics speed is a persistent Meesho weakness: typical delivery is 5–7
              days versus 1–2 days for Flipkart Fulfilled and Amazon FBA for eligible products.

              For seller capabilities: Meesho's zero-commission model and no-GST onboarding are unique differentiators
              that neither Flipkart nor Amazon can easily match without structurally changing their revenue models.
              However, Meesho's advertising toolkit remains nascent—sellers on Meesho have limited sponsored placement
              options compared to Amazon's mature Sponsored Products and Flipkart's growing ad stack (₹6,317 crore
              FY2025 ad revenue). Returns management is a pain point: Meesho's return rates of 15–25%+ create cost and
              operational complexity for sellers absent sophisticated category management tools.

              Payment and checkout capabilities are broadly equivalent—all three platforms support UPI, debit/credit
              cards, wallets, and EMI. Loyalty programs differ materially: Amazon Prime bundles delivery, video, and
              music; Flipkart offers Plus membership with SuperCoins; Meesho has no equivalent loyalty subscription,
              which limits its ability to raise retention-linked average order values. Social and live commerce
              capabilities are growing across all three: Meesho's WhatsApp-driven sharing model and affiliate
              architecture were first-movers; Flipkart Shopsy and Amazon affiliate programs are fast followers. ONDC
              integration is a differentiator Meesho has embraced (Meesho joined ONDC as a buyer-side app), while Amazon
              and Flipkart have been slower to engage—a risk if ONDC enables smaller platforms to aggregate Meesho's
              supplier base.
