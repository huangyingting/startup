      - number: '4.4'
        title: Financial Outlook and Estimates
        blocks:
          - type: paragraph
            body: |
              CLSA's April 2025 research note (covering Meesho ahead of the IPO) projected GMV growth of
              26% CAGR through FY2031, with Meesho reaching $6.2 billion GMV run rate in FY2025 and
              potentially $20+ billion by FY2031 in the base case. CLSA's bull case models EBITDA breakeven
              by FY2027 if advertising take-rate expansion and continued Valmo cost compression materialise
              on schedule. The FY2026 revenue trajectory is estimated at ₹11,000–₹13,000 crore by consensus
              analysts, representing 17–38% growth depending on GMV acceleration and advertising monetisation
              assumptions.

              FY2025 free cash flow of ₹591 crore (some sources cite ₹1,032 crore due to different working
              capital adjustment methodologies) represents the second consecutive positive FCF year and
              provides a structural buffer for the planned ₹1,390 crore cloud infrastructure investment.
              Combined with the IPO proceeds deployed into capex over FY2026–FY2028, Meesho is unlikely
              to require additional equity financing at its stated growth trajectory. The zero-debt policy
              eliminates interest cost as a margin drag, keeping the path to EBITDA profitability clean.

              Key upside risks to analyst estimates include faster-than-expected Valmo order share
              expansion (currently 62%, with a potential ceiling of 80–85%), an advertising revenue
              monetisation acceleration beyond current projections, and category expansion into higher-
              AOV segments (electronics, furniture) which would improve revenue yield per GMV rupee.
              Downside risks include a sustained high COD mix preventing return-rate improvement, regulatory
              pricing scrutiny on logistics fee structures, and any deterioration in the macro environment
              for discretionary spending in Tier 2–4 cities.
