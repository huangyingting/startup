      - number: '1.5'
        title: Milestones, IPO, and Corporate Events
        blocks:
          - type: paragraph
            body: |
              Meesho's history from founding to public listing spans eleven years of rapid growth punctuated
              by pivots, adversity, and regulatory milestones. The company was incorporated in 2015 in Bangalore,
              participated in Y Combinator's 2016 batch, and began scaling its social reseller model from 2017
              onward. Product and operational pivots included the 2022 wind-down of its grocery vertical (Farmiso
              / Superstore), accompanied by a round of approximately 400 employee separations, and a May 2023
              workforce reduction of 251 employees (15% of headcount) in which CEO Vidit Aatrey publicly
              acknowledged "judgment errors in over-hiring." These adverse events were consequential in
              resetting the company's cost structure and accelerating its profitability path.

              In January 2025 Meesho filed an application with the NCLT Bengaluru for a reverse merger of
              Fashnear Technologies (India) with Meesho Inc. (US), receiving NCLT approval on May 27, 2025.
              The company then became a fully Indian entity and filed its DRHP confidentially with SEBI in
              October 2025. The IPO subscription window ran December 3–5, 2025, with the issue 79–81x
              oversubscribed; the price band was ₹105–₹111 per share and total issue size was ₹5,421.20 crore
              (₹4,250 crore fresh + ₹1,171.20 crore OFS). Shares listed on NSE and BSE on December 10, 2025
              at ₹196 per share (a 76% premium to issue price). A controversy erupted during the anchor
              round when Capital Group, Norges Bank, Nippon India, and others withdrew, alleging that SBI
              Mutual Fund's ₹603 crore allocation (25% of the ₹2,439 crore anchor book) was disproportionate.
