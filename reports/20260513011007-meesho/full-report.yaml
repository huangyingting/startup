      - number: '5.2'
        title: Seller and Buyer Workflows
        blocks:
          - type: paragraph
            body: >
              Sellers onboard through a guided Supplier app flow: GSTIN verification, bank account linking, catalog
              upload (photo + description), and pricing. Meesho's Catalog Intelligence Platform (CIP) auto-suggests
              category, subcategory, and attributes from product images, reducing manual effort from hours to minutes.
              Buyers browse via algorithmically curated feeds and a GenAI-powered search bar supporting natural language
              and voice queries. A WISMO (Where Is My Order) in-app tracker delivers real-time delivery status and ETA
              predictions through Valmo's logistics APIs. COD (Cash on Delivery), which accounts for approximately 76%
              of orders, is reconciled through a dedicated pipeline that aggregates cash deposits from 19,000+ pin-code
              delivery agents, verifies against order records, and triggers seller payment within 7-10 days. Buyer
              returns trigger an automated pickup scheduling flow, with refunds processed within 5-7 days for prepaid
              orders.
