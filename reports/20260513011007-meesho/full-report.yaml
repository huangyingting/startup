  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Platform and Module Map
        blocks:
          - type: paragraph
            body: >
              Meesho's product surface is entirely mobile-first. The buyer app (Android and iOS) provides end consumers
              access to a curated value catalog spanning women's fashion, home décor, electronics accessories, and 25+
              categories priced 50-80% below MRP. The Meesho Supplier app (Android) enables over 1.2 million active
              MSMEs and individual resellers to upload catalogs, manage orders, track returns, and receive payments
              through a single interface. A social-sharing feature in the buyer app supports zero-inventory reselling
              via WhatsApp and social networks, a workflow unique among Indian e-commerce platforms. The platform also
              provides a web storefront and self-serve seller portal accessible via browser. No public developer API or
              affiliate integration channel comparable to Amazon MWS or Flipkart Affiliate API is available, limiting
              third-party ecosystem extensibility.
