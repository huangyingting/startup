  - id: FR002
    title: Risk transmission map
    type: dag
    layout: wide
    summary: >-
      Directed graph showing how regulatory, operational, and partner risks propagate through user trust, GMV, and
      valuation.
    data:
      nodes:
        - label: DPDPA Regulatory Enforcement
          detail: Fine or reclassification from DPA authority or MeitY
        - label: Counterfeit IP Litigation
          detail: Brand-owner injunctions and consumer complaints
        - label: AWS Outage / Platform Risk
          detail: Cloud infrastructure failure during peak events
        - label: Logistics SLA Failure
          detail: Valmo scaling failure or 3PL disruption
        - label: User Trust and NPS
          detail: Buyer and seller net promoter score
        - label: Platform GMV
          detail: Gross merchandise value
        - label: Revenue
          detail: Meesho take-rate revenue from GMV
        - label: Operating Margin
          detail: Net margin after logistics and compliance costs
        - label: Post-IPO Valuation
          detail: Market cap and EV/Revenue multiple at listing
      edges:
        - from: DPDPA Regulatory Enforcement
          to: User Trust and NPS
          label: Erodes buyer confidence in data handling
        - from: DPDPA Regulatory Enforcement
          to: Operating Margin
          label: Compliance investment and fine provisioning
        - from: Counterfeit IP Litigation
          to: User Trust and NPS
          label: Quality incidents reduce buyer NPS
        - from: Counterfeit IP Litigation
          to: Operating Margin
          label: Legal costs and seller category restrictions
        - from: AWS Outage / Platform Risk
          to: Platform GMV
          label: Direct checkout loss during peak events
        - from: Logistics SLA Failure
          to: User Trust and NPS
          label: Late or failed deliveries reduce NPS
        - from: Logistics SLA Failure
          to: Platform GMV
          label: Seller attrition and repeat buyer loss
        - from: User Trust and NPS
          to: Platform GMV
          label: Low NPS reduces buyer and seller retention
        - from: Platform GMV
          to: Revenue
          label: Revenue is a percentage of GMV
        - from: Revenue
          to: Operating Margin
          label: Top-line compression reduces margin
        - from: Operating Margin
          to: Post-IPO Valuation
          label: Margin deterioration compresses EV/Revenue multiple
    claimRefs:
      - CR037
      - CR033
      - CR039
  - id: FR003
    title: Dependency map
    type: dag
    layout: wide
    summary: Critical external dependencies for Meesho's platform, showing counterparty concentration and failure pathways.
    data:
      nodes:
        - label: Meesho Platform
          detail: 'Core marketplace: buyer app, seller app, catalog, payments, logistics'
        - label: AWS Cloud (100%)
          detail: Sole cloud provider; all production workloads
        - label: Valmo Logistics (62%)
          detail: Meesho-owned last-mile delivery subsidiary
        - label: Delhivery and Ecom Express (38%)
          detail: Third-party logistics providers for remaining volume
        - label: Razorpay and NPCI-UPI
          detail: Payment processing and digital payment rails
        - label: Meta WhatsApp
          detail: Reseller catalog sharing and buyer discovery
        - label: SEBI and MCA
          detail: Listing and corporate governance regulator
        - label: MeITY and CERT-In
          detail: IT Act compliance and cybersecurity regulator
      edges:
        - from: Meesho Platform
          to: AWS Cloud (100%)
          label: 100% infrastructure dependency — critical
        - from: Meesho Platform
          to: Valmo Logistics (62%)
          label: Majority fulfillment via owned subsidiary
        - from: Meesho Platform
          to: Delhivery and Ecom Express (38%)
          label: Minority fulfillment via 3PL fallback
        - from: Meesho Platform
          to: Razorpay and NPCI-UPI
          label: Payment collection and COD settlement
        - from: Meesho Platform
          to: Meta WhatsApp
          label: Reseller channel and catalog distribution
        - from: SEBI and MCA
          to: Meesho Platform
          label: Listing, governance, and disclosure obligations
        - from: MeITY and CERT-In
          to: Meesho Platform
          label: IT Act, DPDPA, and breach notification obligations
    claimRefs:
      - CR023
      - CR028
      - CR027
      - CR005
  - id: FV001
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      Logic chain from market scale, platform proof, and competitive moat through valuation discipline and risk overlay
      to the conditional buy recommendation.
    data:
      nodes:
        - id: market
          label: 'Bharat E-Commerce: $80B+ TAM, 20-26% CAGR — large and underserved'
          type: input
        - id: proof
          label: 'Platform Proof: 199M ATUs, 34% order growth, FCF positive Q4 FY2025'
          type: process
        - id: moat
          label: 'Competitive Moat: 1.2M seller network, zero-commission model, social distribution'
          type: process
        - id: valuation
          label: 'Valuation Discipline: 1.4-1.5x NTM Revenue — 60-70% discount to Indian peers'
          type: process
        - id: risk
          label: 'Risk Overlay: DPDPA unresolved, AWS single-cloud, profitability Q1 only'
          type: process
        - id: recommendation
          label: Conditional Buy — Rs 105-111/share range; Strong Buy below Rs 95
          type: output
      edges:
        - from: market
          to: proof
          label: Scale justifies platform investment thesis
        - from: proof
          to: moat
          label: User and seller scale reinforces network effects
        - from: moat
          to: valuation
          label: Durable moat supports multiple vs. peers
        - from: valuation
          to: recommendation
          label: Discount to peers creates margin of safety
        - from: risk
          to: recommendation
          label: 'Conditions: EBITDA sustained, DPDPA addressed, DR plan disclosed'
        - from: proof
          to: recommendation
          label: FCF proof supports base-case thesis
    approximationNotes: Logic chain represents analyst judgment; weights and relationships are qualitative.
    claimRefs:
      - CV001
      - CV007
      - CV009
      - CV024
  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: >-
      Implied market cap at three EV/NTM Revenue multiples versus the IPO price, illustrating the bear-to-bull valuation
      range.
    data:
      xAxis: Valuation Scenario
      yAxis: Implied Market Cap (Rs Crore)
      items:
        - label: 'Bear Case: 1.1x NTM Revenue'
          value: 9900
          note: 15% GMV CAGR, profitability delayed to FY2028
        - label: 'IPO Price Midpoint: Rs 108/share'
          value: 14500
          note: 1.4-1.5x NTM Revenue at IPO pricing range
        - label: 'Base Case: 1.4x NTM Revenue'
          value: 15400
          note: 26% GMV CAGR, gradual EBITDA improvement by FY2027
        - label: 'Bull Case: 1.7x NTM Revenue'
          value: 18700
          note: Rapid profitability improvement, DPDPA resolution, share gains
        - label: 'Nykaa Comparable: 4.5x NTM Revenue'
          value: 49500
          note: Listed Indian marketplace for reference; different profit profile
    approximationNotes: >-
      NTM Revenue estimated at Rs 11,000 crore. Nykaa comparable shown for reference at its current EV/Revenue multiple
      applied to Meesho's NTM revenue.
    claimRefs:
      - CV004
      - CV017
      - CV019
      - CV020
  - id: FV003
    title: Valuation / return range
    type: range
    layout: standard
    summary: Bull-base-bear implied market cap range at different EV/NTM Revenue multiples, with IPO price benchmark.
    data:
      items:
        - label: 'Bear Case: 1.0-1.1x NTM Revenue — profitability delay, competitive pressure'
          low: 9350
          high: 10500
          mid: 9900
          unit: Rs crore
          note: Triggered by profitability reversal or competitive GMV subsidy war
        - label: 'Base Case: 1.3-1.5x NTM Revenue — inline with IPO, gradual improvement'
          low: 14000
          high: 16000
          mid: 14500
          unit: Rs crore
          note: IPO midpoint Rs 14,500 crore falls within base range; 26% GMV CAGR assumed
        - label: 'Bull Case: 1.6-1.9x NTM Revenue — rapid profitability, multiple expansion'
          low: 18000
          high: 21000
          mid: 18700
          unit: Rs crore
          note: Requires EBITDA >4% by FY2027, DPDPA resolution, and no major competitive shock
    approximationNotes: >-
      Ranges reflect analyst scenario probabilities; NTM Revenue estimated at Rs 11,000 crore based on 26% GMV CAGR at
      3.9% take rate.
    claimRefs:
      - CV003
      - CV019
      - CV020
      - CV021
