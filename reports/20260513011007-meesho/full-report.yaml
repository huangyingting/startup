      - number: '4.2'
        title: Unit Economics and Operational Efficiency
        blocks:
          - type: paragraph
            body: |
              Meesho's per-order economics improved materially across the FY2023–FY2025 period, driven by
              three concurrent factors: logistics cost deflation via Valmo, declining customer acquisition
              cost per order, and operating leverage on fixed costs as order volume scaled.

              Valmo, Meesho's in-house logistics subsidiary incorporated in 2023, handled less than 2% of
              orders in FY2023, approximately 50% in FY2024, and approximately 62% by Q1 FY2026. As Valmo
              captured a greater share of Meesho's shipments, the blended per-order fulfillment cost fell
              from ₹50.45 (FY2023) to approximately ₹43 (FY2024) to ₹37.70 (Q1 FY2026). This trajectory
              alone contributed roughly ₹23 per order improvement, equivalent to approximately ₹4,200 crore
              in annual cost savings at the FY2025 order run rate.

              Simultaneously, ad spend per delivered order compressed from ₹13.6 (FY2023) to ₹4.9 (FY2025),
              reflecting a structural shift from paid acquisition to organic re-engagement—Meesho's survey-
              based retention data (referenced in the DRHP) indicates that word-of-mouth is the primary
              acquisition channel for over 50% of new buyers. Total marketing expenses fell from ₹928 crore
              (FY2023) to ₹459 crore (FY2024) before a planned increase to ₹644 crore (FY2025) ahead of IPO.

              Contribution margin (revenue minus variable costs of logistics and marketing) improved from
              2.9% of net merchandise value in FY2023 to 4.9% in FY2025, translating to contribution profit
              growth from ₹566 crore to ₹1,484 crore. The adjusted EBITDA loss, which strips ESOPs and
              one-time items, narrowed from ₹1,694 crore (FY2023) to ₹230.2 crore (FY2024) to ₹219.6 crore
              (FY2025), a margin of −2.3% on revenue. The path to EBITDA breakeven requires either an
              advertising revenue mix shift above 20%, a further ₹5–8/order logistics cost reduction from
              Valmo, or both in combination.

              A structural overhang is cash on delivery (COD): approximately 76% of orders in FY2025 are
              COD, creating reverse-logistics costs when returns occur and requiring cash reconciliation
              across Meesho's logistics agent network. Return rates for COD orders are materially higher
              than prepaid—estimated at 30–35%—inflating variable costs per net delivered order.
            claimRefs:
