      - number: '2.2'
        title: TAM/SAM/SOM Sizing and Analyst Estimates
        blocks:
          - type: paragraph
            body: |
              Multiple analyst estimates size the India e-commerce opportunity from different methodological
              angles, producing a wide but coherent range. Bain's 2025 edition of "How India Shops Online"—
              based on surveys of over 6,000 shoppers plus platform data triangulation—estimates India e-retail
              GMV at $60 billion in FY2024, growing at 18–20% CAGR to reach $170–190 billion by FY2030.
              The government-linked India Brand Equity Foundation (IBEF) uses a broader definition inclusive
              of B2B and estimates India's total e-commerce at $163 billion by 2026, reaching $350 billion
              by 2030 at a 20–21% CAGR. Mordor Intelligence focuses specifically on social commerce—the
              segment including reseller-led and social-discovery transactions—and estimates $29.3 billion in
              2025 growing to $143.9 billion by 2030 at an exceptional 37.5% CAGR.

              Meesho's own SEBI-filed industry report, authored by Redseer, sizes the total India retail at
              ₹83 lakh crore and projects e-commerce reaching ₹15–18 lakh crore ($174–214 billion) by FY2030,
              with value-segment retail representing a ₹33 lakh crore opportunity across online and offline
              channels. This commissioned report should be read with caution as a primary-but-interested
              source: it was submitted to justify the IPO valuation thesis and its growth assumptions may
              reflect optimism about Meesho's addressable expansion.

              Against these market estimates, CLSA's April 2025 initiation note sets Meesho's current serviceable
              obtained market (SOM) at $6.2 billion GMV run rate for FY2025, representing 8.5% of total India
              e-retail GMV and 37% of order volume—the latter ratio reflecting Meesho's structural position
              as the high-volume, low-AOV market leader rather than high-GMV. CLSA projects Meesho's GMV
              growing at 26% CAGR through FY2031 to approximately $24 billion. Disconfirming evidence
              exists: India's e-retail growth decelerated to approximately 10–12% in FY2024 from the 20%+
              levels seen pre-2022, suggesting prior bullish projections required revision.

              The $170–214B FY2030 range from Bain and Redseer respectively implies Meesho, even at 26% CAGR,
              would represent only 10–14% of total market GMV by FY2031 under base assumptions—reflecting
              the structural challenge of growing market share in a market where competitors Flipkart and
              Amazon India also possess massive capital and network advantages.
            claimRefs:
