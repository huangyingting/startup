      - number: '3.4'
        title: Pricing and Commission Structures
        blocks:
          - type: paragraph
            body: >
              Commission and fee structures are the most visible competitive differentiator in Indian e-commerce. Amazon
              India charges 5–25% category commission plus closing fees, shipping fees, and optional FBA fulfillment
              fees; GST registration is mandatory; effective take rates for mid-tier sellers are estimated at 15–25%
              all-in. Flipkart charges 5–20% commission, similar in structure to Amazon with category-level variation
              and promotional billing. Meesho's headline commission rate is 0% on most categories—a radical departure
              that removes the largest single cost for small sellers. Meesho monetizes through logistics (negotiated 3PL
              rates passed to sellers at a markup), advertising products (promoted listings), and payment float. This
              zero-commission structure is partially responsible for Meesho's low average order value (~₹300–₹400 per
              order) and high order volume (1.3B orders in the first nine months of FY2025), since sellers price
              competitively knowing they are not surrendering a 15%+ commission.

              The pricing comparison table (TP003) provides a standardized view across platforms. Key implication:
              Meesho's zero-commission model is a structural choice—reverting to commissions would risk seller attrition
              and cede the low-AOV segment to ONDC or new entrants. Competitors attempting to match Meesho's pricing
              face commission revenue cannibalization. Flipkart Shopsy currently offers very low (sub-5%) commissions as
              part of this competitive dynamic. However, as Meesho scaled its ad revenue and logistics fee income in
              FY2025, it demonstrated that a take rate approaching 5–6% of GMV is achievable without formal commission
              charging—suggesting the zero-commission label, while accurate, does not mean zero monetization.
