  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Meesho's marketplace serves two primary customer groups. The buyer segment comprises approximately 199
              million Annual Transacting Users (ATUs) in FY2024, with over 70% located in Tier 3 and smaller cities
              (population under 100,000). The demographic skews 55-60% female, age 18-35, low-to-middle income, and
              mobile-first. Value-for-money is the primary purchase motivation for approximately 68% of surveyed buyers.
              The seller segment comprises approximately 1.2 million active MSMEs and individual entrepreneurs,
              primarily from textile-manufacturing hubs such as Surat, Ahmedabad, and Jaipur. Social resellers —
              individuals who distribute Meesho product links via WhatsApp with zero inventory investment — form a third
              segment monetised through commissions. Meesho has no disclosed B2B or enterprise buyer segment. Geographic
              concentration in Tier 3+ markets is simultaneously Meesho's strategic differentiation and its potential
              ceiling for average order value expansion.
