      - number: '5.5'
        title: Trust, Safety, and Compliance
        blocks:
          - type: paragraph
            body: >
              Meesho operates multiple layers of trust controls. Automated image moderation scans all new catalog
              listings for counterfeit brand imagery. A seller quality score tracks return rates, defect reports, and
              fulfilment reliability, with suspensions triggered above threshold breaches. The trust and safety team
              combines ML-based detection with human review for seller appeals and buyer dispute escalations. On the
              regulatory side, Meesho is subject to India's IT Act 2000, Consumer Protection (E-Commerce) Rules 2020,
              and the forthcoming Digital Personal Data Protection Act 2023 whose implementation timeline remains
              uncertain. As a newly listed company (December 2025), Meesho is now bound by SEBI's LODR disclosure
              framework. Third-party security certifications (ISO 27001, SOC 2, PCI-DSS audits) have not been publicly
              disclosed, a meaningful diligence gap given the scale of payment and personal-data handling.
