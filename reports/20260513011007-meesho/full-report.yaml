              - CV007
              - CV009
              - CV024
      - number: '8.2'
        title: IPO Pricing Context and Comparable Benchmarks
        blocks:
          - type: paragraph
            body: >
              The Meesho IPO at Rs 5,421 crore (Rs 4,250 crore fresh + Rs 1,171 crore OFS) is one of the largest Indian
              technology IPOs of 2026. At the midpoint price of Rs 108 per share, the implied post-money market cap is
              approximately Rs 14,500 crore (~$1.7B). This implies EV/NTM Revenue of approximately 1.4-1.5x, based on
              estimated FY2026 (NTM) revenue of Rs 9,800-10,200 crore. Listed Indian marketplace peers trade at notably
              higher multiples: Nykaa (FSN E-Commerce) at ~4.5x NTM revenue, IndiaMART Intermesh at ~8x NTM revenue
              (fully profitable B2B marketplace). Global emerging-market e-commerce comparables are closer: Sea Limited
              (Shopee) at 2.5-3x and PDD Holdings at ~4x. The IPO discount is partially explained by Meesho's
              earlier-stage profitability profile versus both Indian peers; narrowing that gap as EBITDA proves durable
              should drive multiple expansion.
            claimRefs:
              - CV003
              - CV004
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
          - type: table
            tableRef: TV004
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
          - type: figure
            figureRef: FV002
            claimRefs:
              - CV004
              - CV017
              - CV019
              - CV020
      - number: '8.3'
        title: Bull, Base, and Bear Case Scenarios
        blocks:
          - type: paragraph
            body: >
              The bull case assumes Meesho achieves CLSA's 26% GMV CAGR through FY2031, with GMV reaching $8.5B by
              FY2027 and EBITDA turning structurally positive at ≥4% margin by FY2027. In this scenario, EV/Revenue
              multiple expansion from 1.4x to 1.7x is supported by proven profitability, yielding a target valuation of
              Rs 18,000-21,000 crore. The base case assumes 20-22% GMV CAGR and gradual EBITDA improvement from Q4
              FY2025's baseline, with multiple remaining at 1.4x and valuation of Rs 14,000-16,000 crore — inline with
              the IPO price. The bear case occurs if a competitive GMV subsidy war from Flipkart/Amazon or a regulatory
              enforcement action delays profitability beyond FY2028, compresses GMV growth to 12-15%, and the multiple
              contracts to 1.0-1.1x, implying Rs 9,000-11,000 crore. The bull-to-bear range of 2.1x reflects genuine
              uncertainty around the profitability inflection point.
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV034
              - CV035
              - CV036
              - CV037
          - type: table
            tableRef: TV003
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV003
              - CV019
              - CV020
              - CV021
      - number: '8.4'
        title: Recommendation and Confidence Assessment
        blocks:
          - type: paragraph
            body: >
              We issue a Conditional Buy at the IPO price range of Rs 105-111 per share with medium confidence. The
              recommendation is conditional on: (1) at least two consecutive quarters of positive EBITDA before or
              shortly after IPO; (2) DPDPA Data Protection Officer appointment and consent management architecture
              confirmed; and (3) a disclosed multi-cloud or disaster-recovery architecture roadmap before close. At Rs
              108 (midpoint), the base-case 12-month return is approximately flat (0-10%), with asymmetric upside in the
              bull case (+25-45%) versus downside in the bear case (-25-35%). The risk rating is Medium-High, reflecting
              regulatory (DPDPA, IT Act), operational (AWS concentration, RTS rates), and execution (profitability
              proven for only one quarter) risks partially offset by financial resilience and network-effects moat. A
              price below Rs 95 per share would represent a Strong Buy as the bear-case downside narrows materially.
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV038
              - CV039
              - CV040
          - type: table
            tableRef: TV001
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV008
              - CV034
              - CV035
      - number: '8.5'
        title: Diligence Asks and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              Five pre-closing diligence asks are critical: (1) EBITDA confirmation for Q4 FY2025 and Q1 FY2026,
              independently verified from audited accounts; (2) DPDPA compliance — DPO appointment, consent framework,
              CERT-In breach history; (3) AWS multi-cloud or DR architecture roadmap; (4) complete litigation and
              regulatory proceedings schedule; (5) post-IPO board composition with named independent directors.
              Thesis-break triggers that would move the recommendation to Sell are: a DPDPA enforcement penalty
              exceeding Rs 250 crore; an adverse regulatory ruling reclassifying Meesho as inventory-led; two or more
              consecutive quarters of negative EBITDA post-IPO; or a sustained competitive price war from
              Amazon/Flipkart causing Meesho's NPS to fall below 35 for two quarters.
            claimRefs:
              - CV029
              - CV030
              - CV031
              - CV032
              - CV033
              - CV037
              - CV038
          - type: table
            tableRef: TV005
            claimRefs:
              - CV037
              - CV038
              - CV039
              - CV040
              - CV033
          - type: table
            tableRef: TV006
            claimRefs:
              - CV029
              - CV030
              - CV031
              - CV032
              - CV033
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Deep Valuation Discount to Peers Creates Margin of Safety
            body: >
              Meesho's 1.4-1.5x NTM Revenue at IPO is a 60-70% discount to listed Indian marketplace peers (Nykaa 4.5x,
              IndiaMART 8x) and a 40-50% discount to the nearest global analog (PDD 4x, Sea Limited 2.5-3x). While the
              discount is partially justified by unproven multi-quarter profitability, it leaves significant upside if
              the company demonstrates two consecutive quarters of positive EBITDA. A bear case of 1.1x NTM Revenue
              implies only Rs 9,350 crore market cap, a 35% downside from IPO — manageable for a platform with zero debt
              and Rs 591-1032 crore FCF buffer.
            calloutType: strength
            claimRefs:
              - CV004
              - CV017
              - CV021
              - CV008
          - type: callout
            title: Profitability Proven for Only One Quarter — Multiple Expansion Requires Evidence
            body: >
              Meesho achieved FCF-positive operations for the first time in Q4 FY2025. The entire bull and base-case
              valuation thesis depends on this being a structural turning point, not a seasonal peak. Until at least two
              consecutive quarters of positive EBITDA are confirmed with audited accounts, multiple expansion from the
              current 1.4-1.5x level is unlikely. This is the single most important diligence ask before closing an IPO
              position at the offered price range.
            calloutType: risk
            claimRefs:
              - CV007
              - CV011
              - CV024
              - CV025
          - type: callout
            title: Conditional Buy at Rs 105-111; Strong Buy Below Rs 95
            body: >
              Conditional Buy at the IPO price range of Rs 105-111 per share, contingent on EBITDA confirmed positive
              for at least one additional quarter and DPDPA DPO appointment disclosed before close. Strong Buy threshold
              is Rs 95 per share or below, where bear-case downside narrows to under 5%. Do not increase position if two
              consecutive EBITDA-negative quarters occur post-IPO or if a DPDPA enforcement action exceeding Rs 100
              crore is initiated within 12 months of listing.
            calloutType: recommendation
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
