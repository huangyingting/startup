      - number: '5.3'
        title: Technology Architecture
        blocks:
          - type: paragraph
            body: >
              Meesho's core backend is a polyglot microservices system. Java and Kotlin services handle high-throughput
              order, catalog, and user domains; Python handles ML inference and data pipelines. Amazon Web Services
              (AWS) is the primary cloud, hosting compute (EC2/EKS), storage (S3), and managed services. Apache Kafka
              ingests billions of daily events from buyer sessions, seller actions, and Valmo delivery updates; Apache
              Spark and Flink process these in batch and near-real-time for analytics and model training. Elasticsearch
              powers catalog search and relevance scoring across 500 million+ SKUs. MySQL and PostgreSQL serve as the
              primary relational stores, with Redis providing caching for high-frequency reads. The web frontend employs
              Cloudflare, Amazon CloudFront, and Nginx as reported by BuiltWith, delivering low-latency catalog pages. A
              planned hybrid cloud migration (FY2026-FY2028, funded with ₹1,390 crore IPO proceeds) will supplement AWS
              capacity with private data-center infrastructure for latency-sensitive and compliance-driven workloads.
            claimRefs: []
