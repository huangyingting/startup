      - number: '1.4'
        title: Operational Scale and Key Metrics
        blocks:
          - type: paragraph
            body: |
              In FY2024 (April 2023 – March 2024), Meesho reported operating revenue of ₹7,615 crore, a 33%
              year-on-year increase from ₹5,735 crore in FY2023. The ESOP-adjusted net loss fell 97% to
              ₹53 crore from ₹1,569 crore the prior year, and the company achieved operating cash flow
              positivity of ₹232 crore—a first for a horizontal e-commerce platform in India. Free cash flow
              reached ₹197 crore.

              The platform delivered 843 million orders in FY2024, representing a 36% increase year-on-year.
              Annual transacting users (ATUs) reached 145 million by March 2024 and grew to 187 million as of
              December 31, 2024. In the April–December 2024 period alone, Meesho recorded 1.3 billion orders—
              equalling total FY2024 order volume—demonstrating significant acceleration. Approximately 50% of
              the user base comes from Tier 4+ towns. According to a March 2025 CLSA research note, Meesho's
              GMV run rate was $6.2 billion with a 37% order-volume market share in Indian e-commerce for
              CY2024, though its GMV share was approximately 8.5% reflecting its lower-ASP product mix.

              The FY2023 comparison baseline showed Meesho's loss reduction journey: FY2022 net loss was
              ₹3,251 crore; FY2023 net loss was ₹1,675 crore; FY2024 ESOP-adjusted loss was ₹53 crore. The
              company's stated north-star metric is long-term free cash flow per share, signalling continued
              focus on capital efficiency as it enters its post-IPO phase.
