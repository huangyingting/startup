      - number: '5.4'
        title: AI, ML, and GenAI Differentiation
        blocks:
          - type: paragraph
            body: >
              Meesho's technology moat is concentrated in three ML systems. First, the Catalog Intelligence Platform
              (CIP) uses computer vision and NLP to auto-tag product attributes (color, size, pattern, material) from
              seller-uploaded images, substantially reducing listing latency and improving catalog quality at scale.
              Second, a recommendation engine combines collaborative filtering with content-based signals to personalize
              buyer feeds for 199 million annual transacting users. Third, a GenAI-powered search layer deployed in
              FY2024 uses large language models (LLMs) to parse natural-language and colloquial Hindi/regional-language
              queries. A visual search feature uses image embeddings to match user-uploaded photos against catalog
              products. Meesho's fraud detection system applies real-time ML classifiers to flag fake reviews, coupon
              abuse, and seller gaming behaviors. The company publishes technical depth on these systems via its
              engineering blog (medium.com/meesho-tech) but does not publicly disclose accuracy benchmarks,
              recall/precision figures, or A/B test outcomes.
