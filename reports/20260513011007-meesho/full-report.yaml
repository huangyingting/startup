  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >
              Meesho operates at the intersection of India's rapidly evolving digital regulation stack. The Digital
              Personal Data Protection Act 2023 (DPDPA) imposes fines up to Rs 250 crore per breach, requires
              appointment of a Data Protection Officer, and mandates consent management frameworks for all significant
              data fiduciaries — a category Meesho almost certainly falls into with 199 million annual transacting
              users. Separately, the Consumer Protection (E-Commerce) Rules 2020 and IT Act 2000 Intermediary Guidelines
              (2021) impose grievance redressal timelines, content moderation obligations, and annual compliance audits
              for platforms with 50M+ users. GST tax-collected-at-source (TCS) at 1% applies to all marketplace
              transactions, and with 1.2 million MSME sellers of varied tax compliance maturity, the aggregate GST audit
              risk is non-trivial. IP and counterfeit goods litigation from branded goods holders represents an ongoing
              legal exposure on an open marketplace at this scale. Meesho's DRHP acknowledges regulatory risk but
              discloses no material pending litigation; independent reporting suggests consumer forum complaints and
              some IP proceedings are active.
