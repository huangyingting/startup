        - Reduce to 50% position; reassess in 6 months
      - - Post-IPO governance failure
        - Failure to appoint majority independent directors within 12 months of listing
        - SEBI LODR enforcement action risk; signals governance immaturity that makes premium multiple impossible
        - Engage board via shareholder letter; escalate to Sell if not resolved within quarter
