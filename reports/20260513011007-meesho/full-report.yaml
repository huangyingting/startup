companyProfile:
  summary: >
    Meesho was founded in 2015 in Bengaluru, India, by IIT-Delhi alumni Vidit Aatrey (CEO) and Sanjeev Barnwal (CTO). It
    began as a social reselling platform on WhatsApp and evolved into India's largest value-commerce marketplace,
    targeting price-sensitive buyers in Tier-2 and Tier-3 cities with unbranded and private-label fashion, home, and
    lifestyle products priced below Rs 400 per item. Meesho pioneered the zero-commission model — no seller listing fee,
    no commission on GMV — replacing that revenue with advertising and logistics income. The company raised
    approximately $1.7 billion from investors including SoftBank, Meta, Fidelity, and B Capital, reaching a peak private
    valuation of $4.9 billion in 2021, and filed a DRHP in 2025 for a Rs 5,421 crore IPO. Meesho achieved free cash flow
    positivity in Q4 FY2025, the first Indian e-commerce player to do so, validating its capital-efficient operating
    model.
