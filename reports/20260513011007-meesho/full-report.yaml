              Meesho's December 2025 IPO was a landmark for Indian e-commerce: the first horizontal marketplace to list
              domestically after completing the reverse domicile flip from Delaware to India. The 79–81x subscription
              and ₹196 listing price (76% above ₹111 issue price) signal strong institutional demand.
