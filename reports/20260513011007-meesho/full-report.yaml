      - number: '2.4'
        title: Growth Drivers and Market Constraints
        blocks:
          - type: paragraph
            body: |
              The single largest structural driver for India value e-commerce is the digital payments revolution
              led by UPI. In 2026, UPI processes approximately 18.4 billion transactions per month and accounts
              for 60–65% of all e-commerce payments in India. Cash-on-delivery—once the dominant payment
              mode at ~55% of e-commerce transactions in 2020—has declined to 25–30% nationally, though it
              remains above 40% for Meesho's Tier 3/4 buyer base, indicating the structural shift is still
              underway in its core geography. The Jio effect—Reliance's disruptive ~₹1-2/GB mobile data
              pricing since 2016—expanded internet access to over 1 billion users and gave India 660 million
              smartphone users as of 2026. With 78–82% of e-commerce transactions happening on mobile, this
              directly enables Meesho's app-first model.

              Government policy provides three additional tailwinds. First, the Open Network for Digital
              Commerce (ONDC), launched in 2022–2023 and scaling through 2025, democratises seller access
              by enabling any buyer app to serve any seller app—reducing friction for SMB seller onboarding.
              Second, the National Logistics Policy targets reducing India's logistics cost from 13–14% of
              GDP to 8% by 2030, which would structurally improve last-mile unit economics for platforms
              like Meesho. Third, the Digital India programme continues to expand digital infrastructure
              into rural areas.

              The primary constraints are logistical and behavioural. Last-mile delivery complexity across
              India's 500,000+ pin codes remains expensive, particularly in Tier 4 and rural geographies
              where Meesho's Valmo logistics marketplace is still scaling. Fashion returns run at 15–25%
              for unbranded products—a direct margin drain that is structurally higher for Meesho than for
              curated premium platforms with size standardisation. Quick commerce at 10% of e-retail GMV
              and growing at 40%+ CAGR creates an adjacent competitive threat in beauty, accessories, and
              FMCG. Regulatory uncertainty from India's evolving FDI rules, the Digital Personal Data
              Protection Act 2023, and draft e-commerce consumer protection rules adds compliance cost and
              operating risk. Finally, approximately 400 million Indians remain offline or underconnected
              as of 2025—a long-tail opportunity but one requiring multi-year digital literacy investment
              beyond Meesho's current operational perimeter.
