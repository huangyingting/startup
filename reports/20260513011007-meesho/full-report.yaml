  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Segmentation
        blocks:
          - type: paragraph
            body: |
              Meesho competes in India's horizontal value e-commerce market, defined as the sale of unbranded
              and SMB-listed goods at sub-₹500 average order values to price-sensitive consumers in Tier 1–4
              cities, with particular depth in non-metro geographies. The company's own IPO industry report,
              commissioned from Redseer and filed with SEBI in October 2025, characterises the total India
              retail market at ₹83 lakh crore (~$960 billion) in FY2025, of which organized retail represents
              21% and e-commerce a fast-growing subset.

              The relevant segments for Meesho are three nested rings. The outermost total retail layer
              encompasses all channels—organized and unorganized, offline and online. Within it, the e-retail
              GMV addressable by online-native platforms is estimated at approximately $60 billion in FY2024
              by Bain & Company's annual India shopper survey, growing to $170–190 billion by FY2030. Further
              inward, the value commerce segment—orders below ₹500 AOV in fashion, home/kitchen, beauty, and
              general merchandise—represents roughly 45% of order volume but only 15–20% of total e-retail
              GMV because of lower ticket sizes relative to electronics and premium categories.

              Excluded from Meesho's current core TAM are: premium-branded fashion (dominated by Myntra),
              luxury goods, B2B commerce, quick-commerce (10-minute delivery for grocery/FMCG), and cross-
              border exports. The most strategically relevant adjacent markets are quick commerce (Blinkit,
              Zepto, Swiggy Instamart) in beauty and accessories, and D2C brand storefronts in fashion—both
              of which represent future competitive pressure rather than current core substitutes.

              Status-quo alternatives to Meesho include local kiranas, weekly haats (bazaars), and unorganized
              street markets—the infrastructure through which an estimated 70%+ of Indian retail consumption
              still flows as of FY2025. These offline channels are the primary target of Meesho's seller
              onboarding, which converts unorganized supply into digital storefronts accessible to 187 million
              active online buyers.
