      - number: '4.5'
        title: Exhibits
        blocks:
          - type: callout
            title: FY2024 Cash-Flow Turnaround Validates Valmo-Led Unit Economics Improvement
            body: >
              FY2024 operating cash flow turned positive at +₹232 crore and free cash flow at +₹197 crore— Meesho's
              first year of sustained cash generation. This was not a one-time event: FY2025 FCF improved further to
              ₹591–₹1,032 crore. The turnaround is structurally tied to Valmo's per-order cost reduction (₹50.45 →
              ₹37.70) and the compression of marketing spend per order (₹13.6 → ₹4.9). The milestone eliminates the most
              critical pre-IPO investor objection—that Meesho was a perpetual cash incinerator—and underpins the
              credibility of the path to EBITDA profitability.
            calloutType: strength
            claimRefs:
              - CI007
              - CI008
              - CI013
              - CI015
          - type: callout
            title: 76% COD Exposure Creates Structural Working-Capital and Return-Rate Overhang
            body: >
              Cash-on-delivery orders comprise approximately 76% of Meesho's FY2025 order volume, compared to
              approximately 30% on Flipkart and 25% on Amazon India. COD creates two compounding cost risks: elevated
              return rates (estimated 30–35% for COD vs. 10–15% for prepaid) and delayed cash conversion as collected
              amounts must be remitted back through the logistics agent network. At 1.83 billion annual orders, a 1%
              improvement in prepaid conversion would save an estimated ₹150–₹200 crore in annual return-handling costs.
              UPI adoption in Tier 2–4 cities is the primary lever, but adoption remains nascent for e-commerce
              transactions.
            calloutType: risk
            claimRefs:
              - CI017
              - CI029
              - CI035
          - type: callout
            title: FY2025 Net Loss Is Predominantly Non-Cash; Recurring Economic Loss Far Smaller
            body: >
              The FY2025 statutory net loss of ₹3,941.7 crore has alarmed some analysts, but the recurring economic loss
              was ₹219.6 crore on an adjusted EBITDA basis. The gap arises from a one-time deferred-tax charge of
              approximately ₹3,500+ crore triggered by the NCLT-approved reverse-flip merger in May 2025. This non-cash
              accounting entry does not affect Meesho's cash position or operational cash flow, which remained positive.
              Investors should evaluate Meesho on adjusted EBITDA, contribution margin, and free cash flow trajectories
              rather than the statutory P&L, which is materially distorted by this non-recurring item.
            calloutType: insight
            claimRefs:
              - CI004
