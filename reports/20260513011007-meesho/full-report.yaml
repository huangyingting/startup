      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Zero-Commission Model Drives Seller Network Effects
            body: >
              Meesho's differentiated decision not to charge commission to sellers has created a powerful flywheel:
              lower seller costs translate to lower consumer prices, driving adoption in price-sensitive Tier 2/3/4
              markets. With ~1.5 million active sellers and 187 million ATUs, the network effect is now
              self-reinforcing.
