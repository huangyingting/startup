      - number: '4.3'
        title: Capital Structure and IPO
        blocks:
          - type: paragraph
            body: |
              Prior to the December 2025 IPO, Meesho had raised approximately $1.36 billion across all
              disclosed funding rounds from investors including Prosus, SoftBank, Peak XV Partners, B Capital,
              CDPQ, and Meta. Despite this cumulative equity deployment, the company maintained a zero-debt
              balance sheet through FY2025—total assets of ₹7,226 crore financed entirely by equity and
              accumulated reserves. Net worth stood at ₹1,445 crore as of FY2025, before the material increase
              from IPO proceeds.

              The SEBI-registered Red Herring Prospectus (RHP) filed in November 2025 constituted Meesho's
              first public financial disclosure, covering audited FY2023–FY2025 financials. The IPO comprised
              a fresh issue of ₹4,250 crore and an offer-for-sale of ₹1,171.2 crore by existing shareholders,
              totalling ₹5,421.2 crore at the upper price band of ₹111 per share. Meesho listed on NSE and
              BSE on December 10, 2025 at a post-IPO market capitalisation of approximately $3.9–4.2 billion.

              Fresh issue proceeds are allocated per the DRHP: cloud infrastructure investment (₹1,390 crore
              over three years), marketing and new-user acquisition (₹1,020 crore), AI and technology talent
              and R&D (₹480 crore), and inorganic acquisitions or general corporate purposes (balance ~₹1,360
              crore). The cloud infrastructure allocation—the single largest bucket—reflects Meesho's stated
              strategy to migrate from heavy third-party cloud dependency to a partially self-managed hybrid
              architecture over 2025–2028.

              The reverse-flip merger (Meesho Inc Delaware merged into Meesho Private Limited India) was
              completed in May 2025 with NCLT approval. The merger triggered a deferred-tax liability of
              approximately ₹3,500+ crore, inflating the FY2025 statutory net loss to ₹3,941.7 crore while
              recurring economic losses remained at ₹219.6 crore on an adjusted EBITDA basis.
