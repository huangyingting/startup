summary:
  headline: >
    Meesho's zero-commission model and Tier-2/3 reach make it a structurally differentiated IPO at an attractive 1.4x
    EV/NTM Revenue, but thin take rate, profitability timeline, and intense competition from Flipkart and Amazon justify
    a selective accumulate stance rather than outright buy.
