  evidenceGaps:
    - id: GV001
      type: enumeration-incomplete
      severity: material
      topic: comparable-valuation
      missingEvidence: >
        Audited financial statements and valuation data for private-company comparables
        including Flipkart (Walmart-owned), Reliance JioMart, and Meesho's Indian Tier-2
        e-commerce peers; and detailed post-IPO order book and institutional subscription data.
      whyItMatters: >
        Without private-company comparables disclosed at arm's length, the comparable set
        is limited to public companies with materially different profitability profiles, making
        the EV/Revenue discount for Meesho's unproven profitability difficult to calibrate precisely.
      diligencePath: >
        Track Flipkart/Reliance JioMart secondary market trades and press-disclosed valuation
        marks; request Meesho institutional subscription breakdown from SEBI-registered
        book-running lead managers.
      relatedQuestionRefs: [QV001, QV030]
      relatedTableRefs: [TV004]

    - id: GV002
      type: private-evidence-only
      severity: material
      topic: profitability
      missingEvidence: >
        Audited or SEBI-reviewed quarterly financial statements for Q4 FY2025 and Q1 FY2026
        confirming EBITDA and FCF; management discussion of sustainability of FCF-positive status;
        detailed unit economics disclosure by category and geography.
      whyItMatters: >
        The entire valuation case depends on Meesho having turned structurally profitable.
        Only one quarter of FCF-positive data is publicly available; multi-quarter audited
        confirmation is essential before paying 1.4-1.5x NTM Revenue.
      diligencePath: >
        Request from Meesho CFO; verify against SEBI DRHP supplement filings;
        review auditors' limited-review report for Q4 FY2025 in the RHP.
      relatedQuestionRefs: [QV024, QV014]

    - id: GV003
      type: missing-source
      severity: minor
      topic: analyst-coverage
      missingEvidence: >
        Named analyst price targets and formal recommendations from JM Financial, Morgan Stanley,
        Kotak Securities, or ICICI Securities as co-managers of the IPO; institutional allocation
        data post-subscription.
      whyItMatters: >
        IPO co-manager analyst reports are standard valuation anchors for Indian IPOs; their
        absence from public sources makes it difficult to triangulate the base-case multiple.
      diligencePath: >
        Request research reports from book-running lead managers upon IPO filing; access
        Bloomberg or Refinitiv for analyst consensus post-listing.
      relatedQuestionRefs: [QV023, QV015, QV026]
