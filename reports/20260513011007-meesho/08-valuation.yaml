callouts:
  - calloutType: strength
    title: "Deep Valuation Discount to Peers Creates Margin of Safety"
    body: >
      Meesho's 1.4-1.5x NTM Revenue at IPO is a 60-70% discount to listed Indian marketplace
      peers (Nykaa 4.5x, IndiaMART 8x) and a 40-50% discount to the nearest global analog
      (PDD 4x, Sea Limited 2.5-3x). While the discount is partially justified by unproven
      multi-quarter profitability, it leaves significant upside if the company demonstrates
      two consecutive quarters of positive EBITDA. A bear case of 1.1x NTM Revenue implies
      only Rs 9,350 crore market cap, a 35% downside from IPO — manageable for a platform
      with zero debt and Rs 591-1032 crore FCF buffer.
    claimRefs: [CV004, CV017, CV021, CV008]

  - calloutType: risk
    title: "Profitability Proven for Only One Quarter — Multiple Expansion Requires Evidence"
    body: >
      Meesho achieved FCF-positive operations for the first time in Q4 FY2025. The entire
      bull and base-case valuation thesis depends on this being a structural turning point,
      not a seasonal peak. Until at least two consecutive quarters of positive EBITDA are
      confirmed with audited accounts, multiple expansion from the current 1.4-1.5x level
      is unlikely. This is the single most important diligence ask before closing an IPO
      position at the offered price range.
    claimRefs: [CV007, CV011, CV024, CV025]

  - calloutType: recommendation
    title: "Conditional Buy at Rs 105-111; Strong Buy Below Rs 95"
    body: >
      Conditional Buy at the IPO price range of Rs 105-111 per share, contingent on EBITDA
      confirmed positive for at least one additional quarter and DPDPA DPO appointment
      disclosed before close. Strong Buy threshold is Rs 95 per share or below, where bear-case
      downside narrows to under 5%. Do not increase position if two consecutive EBITDA-negative
      quarters occur post-IPO or if a DPDPA enforcement action exceeding Rs 100 crore is
      initiated within 12 months of listing.
    claimRefs: [CV024, CV025, CV026, CV027, CV028]

