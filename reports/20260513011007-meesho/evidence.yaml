    severity: significant
  - id: GE003
    summary: Documented fraud bypass incidents not publicly disclosed
    detail: >
      Meesho's trust and safety controls rely on ML classifiers whose false-negative rates are undisclosed. Public
      seller forums indicate instances of fake reviews and counterfeit listings bypassing automated detection, but the
      company has not published incident rates, remediation data, or enforcement volume statistics.
    relatedQuestionRefs:
      - QE018
    severity: moderate
  - id: GU001
    summary: Cohort buyer retention rates and NRR not disclosed
    detail: >
      Meesho has never publicly disclosed buyer cohort retention rates, Net Revenue Retention for seller GMV cohorts, or
      annual seller churn. This prevents independent assessment of the durability of Meesho's 199M ATU base and 1.2M
      seller base. Estimated second-year buyer retention of 35-42% is model-derived from ATU trajectory, not a disclosed
      metric. Post-IPO SEBI disclosures may eventually include cohort data, but as of May 2026 it remains unavailable.
    relatedQuestionRefs:
      - QU019
      - QU021
    severity: significant
  - id: GU002
    summary: Named buyer proof is aggregated, not individual; G2/Trustpilot reviews limited
    detail: >
      Unlike B2B SaaS companies with G2 or Gartner Peer Insights profiles, Meesho has no formal third-party review
      aggregation for buyers. Buyer testimonials are primarily aggregated in company-commissioned surveys (Consumer
      Insights Report, Smart Shopper Report). Named individual buyer profiles exist only in editorial journalism and are
      demographically characterised rather than providing specific outcome data. This limits the robustness of the
      named-customer-proof evidence base relative to the seller-side.
    relatedQuestionRefs:
