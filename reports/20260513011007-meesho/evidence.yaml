  - id: GE002
    summary: Third-party security certifications not publicly confirmed
    detail: >
      No public statements from Meesho confirm ISO 27001, SOC 2, or PCI-DSS compliance audits. Given that Meesho
      processes over 199M user payment transactions annually — including sensitive UPI and bank account data — the
      absence of disclosed third-party certification is a meaningful due-diligence gap for enterprise vendors and
      institutional investors.
    relatedQuestionRefs:
