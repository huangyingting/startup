company:
  name: Meesho
chapter:
  number: 1
  title: Company Overview
  summary: >
    Meesho is a Bengaluru-based value e-commerce marketplace founded in 2015 by IIT Delhi alumni
    Vidit Aatrey (CEO) and Sanjeev Barnwal (CTO) that targets Bharat's Tier 2/3/4 cities by offering
    a zero-commission model to sellers and generating revenue from advertising and logistics. In FY2024
    the company recorded ₹7,615 crore in revenue and ₹53 crore adjusted net loss; it completed its
    reverse flip to India in May 2025 and listed on NSE/BSE in December 2025, raising ₹5,421 crore
    at an issue price of ₹111 per share.

sections:
  - id: identity-business-model
    title: Identity and Business Model
    body: |
      Meesho Limited (NSE: MEESHO) is India's leading value-focused e-commerce marketplace headquartered
      at Helios Business Park, Bengaluru, Karnataka. Incorporated in 2015 as Fashnear Technologies Private
      Limited (the Indian operating entity), the company originally started as a social commerce platform
      enabling small businesses and home-based entrepreneurs—primarily women in non-metro India—to resell
      products through WhatsApp, Facebook, and Instagram without maintaining inventory. Over 2022–2024
      Meesho broadened its model to serve direct consumers under the "Bharat" (Tier 2/3/4 cities) thesis
      while retaining its zero-commission-to-sellers positioning.

      The core business model is marketplace-based: Meesho does not charge commission to the roughly
      1.5 million sellers who list products on its platform; instead it monetizes through advertising
      (promoted listings and sponsored products) and logistics services offered to sellers. In 2024
      Meesho supplemented this with Meesho Mall, a brand-focused curated storefront where large brands
      pay a commission, adding a second monetization lever. The company's in-house logistics marketplace,
      Valmo (launched February 2024), aggregates smaller regional logistics providers and handled more
      than half of all shipments by December 2024, significantly reducing per-order shipping costs.

      As of the IPO in December 2025, Meesho is classified as an Internet Retail company in the
      Consumer Discretionary sector, with fiscal year running April through March, and reporting currency
      Indian Rupee (INR).
    claimRefs: [CO001, CO006, CO007, CO036, CO037, CO038, CO041, CO042]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: founders-leadership
    title: Founders and Leadership
    body: |
      Meesho was co-founded in 2015 by Vidit Aatrey and Sanjeev Barnwal, both 2012-batch alumni of the
      Indian Institute of Technology (IIT) Delhi. Before founding Meesho, Vidit worked briefly at ITC
      Limited and Sanjeev at Sony Mobile. They first met at IIT Delhi, and the idea for Meesho arose from
      observing small-business owners informally selling products via WhatsApp and Facebook without any
      formal support infrastructure.

      Vidit Aatrey serves as Chairman, Managing Director and Chief Executive Officer, while Sanjeev
      Barnwal is Whole-time Director and Chief Technology Officer. Dhiresh Bansal leads as Chief Financial
      Officer; Prasanna Arunachalam is Chief Product Officer; Debdoot Mukherjee is Chief Data Scientist;
      Ashish Kumar Singh is Chief Human Resources Officer; and Rahul Bhardwaj is Company Secretary and
      Compliance Officer.

      The board includes several independent directors: Rohit Bhagat (Independent Director, Audit
      Committee Chair), Hari Shanker Bhartia, Surojit Chatterjee, and Kimsuka Narasimhan. Non-executive
      non-independent directors include Mukul Arora and Mohit Bhatnagar (representing institutional
      investors). Vidit Aatrey is considered a key-person dependency given his dual role as founder-CEO
      and public face of the company's mission; leadership stability remains a monitor point for investors.
      At the time of IPO, Meesho had approximately 2,082 direct employees.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO039]
    tableRefs: [TO002]

  - id: funding-investors
    title: Funding History and Investors
    body: |
      Meesho has raised approximately $1.36 billion across twelve-plus funding rounds from its founding
      in 2015 through the January 2025 close of a $550 million secondary-heavy round. Early backers
      include Y Combinator (2016 batch), Elevation Capital (Series A, 2017), and Peak XV Partners
      (formerly Sequoia India, Series B, 2018). The company raised $50 million in Series C in October
      2018, followed by two Series D tranches totalling $150 million in mid-2019 from Facebook (now Meta)
      and Naspers (now Prosus).

      The 2021 capital markets boom brought two landmark rounds: a $300 million Series E in April 2021
      at a $2.1 billion valuation led by SoftBank Vision Fund, and a $570 million Series F in September
      2021 at a $4.9 billion peak valuation led by Fidelity and B Capital. After a funding winter, Meesho
      returned to markets in April 2024 raising $275 million at $3.9 billion from Tiger Global (first
      investment in Meesho) and Peak XV, followed by a larger $270 million tranche in January 2025
      (total round $550 million) bringing in Think Investments and Mars Growth Capital. A majority of
      recent rounds were secondary transactions.

      Post-IPO in December 2025, the company has public shareholders on NSE and BSE. The primary
      fund-raise of ₹4,250 crore (approximately $500 million) at IPO was earmarked partly to cover the
      $280–300 million U.S. tax liability incurred from the reverse domicile flip.
    claimRefs: [CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO024, CO043]
    tableRefs: [TO003]

  - id: operational-metrics
    title: Operational Scale and Key Metrics
    body: |
      In FY2024 (April 2023 – March 2024), Meesho reported operating revenue of ₹7,615 crore, a 33%
      year-on-year increase from ₹5,735 crore in FY2023. The ESOP-adjusted net loss fell 97% to
      ₹53 crore from ₹1,569 crore the prior year, and the company achieved operating cash flow
      positivity of ₹232 crore—a first for a horizontal e-commerce platform in India. Free cash flow
      reached ₹197 crore.

      The platform delivered 843 million orders in FY2024, representing a 36% increase year-on-year.
      Annual transacting users (ATUs) reached 145 million by March 2024 and grew to 187 million as of
      December 31, 2024. In the April–December 2024 period alone, Meesho recorded 1.3 billion orders—
      equalling total FY2024 order volume—demonstrating significant acceleration. Approximately 50% of
      the user base comes from Tier 4+ towns. According to a March 2025 CLSA research note, Meesho's
      GMV run rate was $6.2 billion with a 37% order-volume market share in Indian e-commerce for
      CY2024, though its GMV share was approximately 8.5% reflecting its lower-ASP product mix.

      The FY2023 comparison baseline showed Meesho's loss reduction journey: FY2022 net loss was
      ₹3,251 crore; FY2023 net loss was ₹1,675 crore; FY2024 ESOP-adjusted loss was ₹53 crore. The
      company's stated north-star metric is long-term free cash flow per share, signalling continued
      focus on capital efficiency as it enters its post-IPO phase.
    claimRefs: [CO008, CO009, CO010, CO011, CO012, CO013, CO014, CO033, CO034, CO035, CO044, CO045]
    tableRefs: []
    figureRefs: [FO003]

  - id: milestones-corporate-events
    title: Milestones, IPO, and Corporate Events
    body: |
      Meesho's history from founding to public listing spans eleven years of rapid growth punctuated
      by pivots, adversity, and regulatory milestones. The company was incorporated in 2015 in Bangalore,
      participated in Y Combinator's 2016 batch, and began scaling its social reseller model from 2017
      onward. Product and operational pivots included the 2022 wind-down of its grocery vertical (Farmiso
      / Superstore), accompanied by a round of approximately 400 employee separations, and a May 2023
      workforce reduction of 251 employees (15% of headcount) in which CEO Vidit Aatrey publicly
      acknowledged "judgment errors in over-hiring." These adverse events were consequential in
      resetting the company's cost structure and accelerating its profitability path.

      In January 2025 Meesho filed an application with the NCLT Bengaluru for a reverse merger of
      Fashnear Technologies (India) with Meesho Inc. (US), receiving NCLT approval on May 27, 2025.
      The company then became a fully Indian entity and filed its DRHP confidentially with SEBI in
      October 2025. The IPO subscription window ran December 3–5, 2025, with the issue 79–81x
      oversubscribed; the price band was ₹105–₹111 per share and total issue size was ₹5,421.20 crore
      (₹4,250 crore fresh + ₹1,171.20 crore OFS). Shares listed on NSE and BSE on December 10, 2025
      at ₹196 per share (a 76% premium to issue price). A controversy erupted during the anchor
      round when Capital Group, Norges Bank, Nippon India, and others withdrew, alleging that SBI
      Mutual Fund's ₹603 crore allocation (25% of the ₹2,439 crore anchor book) was disproportionate.
    claimRefs: [CO023, CO024, CO025, CO026, CO027, CO028, CO029, CO030, CO031, CO032, CO040, CO046]
    tableRefs: [TO004]
    figureRefs: [FO001]

