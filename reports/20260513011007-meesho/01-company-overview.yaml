callouts:
  - calloutType: strength
    title: Zero-Commission Model Drives Seller Network Effects
    body: >
      Meesho's differentiated decision not to charge commission to sellers has created a powerful
      flywheel: lower seller costs translate to lower consumer prices, driving adoption in price-sensitive
      Tier 2/3/4 markets. With ~1.5 million active sellers and 187 million ATUs, the network effect is
      now self-reinforcing.
    claimRefs: [CO006, CO007, CO013, CO014, CO042]

  - calloutType: insight
    title: First Horizontal E-Commerce Platform to IPO on Indian Exchanges
    body: >
      Meesho's December 2025 IPO was a landmark for Indian e-commerce: the first horizontal marketplace
      to list domestically after completing the reverse domicile flip from Delaware to India. The 79–81x
      subscription and ₹196 listing price (76% above ₹111 issue price) signal strong institutional demand.
    claimRefs: [CO023, CO025, CO026, CO029, CO030]

  - calloutType: risk
    title: Key-Person Dependency and Leadership Concentration
    body: >
      Meesho's brand, vision, and public narrative remain heavily concentrated in co-founder and CEO
      Vidit Aatrey. The 2023 layoffs, in which Aatrey publicly admitted judgment errors, tested
      employee trust. Any leadership transition risk should be closely monitored, particularly given
      the demands of navigating the post-IPO public-company environment.
    claimRefs: [CO001, CO003, CO031, CO032]

  - calloutType: risk
    title: Pre-IPO Anchor Allocation Controversy
    body: >
      A transparency dispute during Meesho's December 2025 anchor round—in which SBI Mutual Fund
      received ~25% of the ₹2,439 crore anchor book while comparable institutional bids from Capital
      Group, Norges Bank, and Nippon India received far smaller allotments—highlighted governance
      concerns. While legally compliant under SEBI ICDR norms, the episode drew scrutiny to discretionary
      anchor allocation practices.
    claimRefs: [CO040]

