callouts:
  - calloutType: risk
    title: "DPDPA Plus Single-Cloud: Dual High-Severity Exposure"
    body: >
      Meesho faces two overlapping high-residual-exposure risks with no fully disclosed mitigations:
      DPDPA regulatory enforcement with fines up to Rs 250 crore and data-processing injunctions
      possible, plus AWS single-cloud dependency with no multi-cloud architecture disclosed.
      Either event alone could materially impair operations; a simultaneous regulatory enforcement
      action during a cloud outage represents a tail scenario with valuation-level impact.
      Investors should require evidence of DPO appointment and cloud DR architecture before closing.
    claimRefs: [CR001, CR013, CR023]

  - calloutType: strength
    title: "Zero-Debt Balance Sheet Buffers Regulatory and Legal Risk"
    body: >
      Meesho's zero external debt and FY2025 FCF of Rs 591-1032 crore mean the company can absorb
      significant compliance investments and regulatory fines without impairing operations. A
      Rs 250 crore DPDPA fine (the statutory maximum) would represent less than 30% of a single
      year's FCF at current generation rates. This financial buffer materially de-risks the
      regulatory scenarios relative to a loss-making company.
    claimRefs: [CR038, CR036]

  - calloutType: recommendation
    title: "Pre-Closing Diligence: Require DPO, Multi-Cloud Plan, and Litigation Schedule"
    body: >
      Investors should require: (1) confirmation of DPDPA Data Protection Officer appointment and
      consent management architecture; (2) a multi-cloud or active disaster recovery architecture
      roadmap with a committed timeline; (3) a comprehensive litigation schedule including all IP,
      consumer court, and regulatory proceedings not disclosed in the DRHP; and (4) post-IPO
      independent director composition and board committee charter disclosures.
    claimRefs: [CR002, CR016, CR031]

