  evidenceGaps:
    - id: GR001
      type: enumeration-incomplete
      severity: material
      topic: regulatory-legal
      missingEvidence: >
        A complete registry of all active legal proceedings, regulatory notices, and consumer court
        orders against Meesho, sourced from official court databases (NCLT, High Courts, consumer
        forums) and MCA enforcement records.
      whyItMatters: >
        The DRHP discloses no material litigation, but independent sources document consumer forum
        cases, IP complaints, and regulatory inquiries. Without a complete legal registry the
        aggregate liability exposure cannot be assessed.
      diligencePath: >
        Request full litigation and regulatory proceedings schedule from Meesho legal counsel;
        cross-check against Indian Kanoon, NCLT portal, and SEBI enforcement databases.
      relatedQuestionRefs: [QR028]
      relatedTableRefs: [TR001]

    - id: GR002
      type: private-evidence-only
      severity: material
      topic: technology-risk
      missingEvidence: >
        Meesho's actual platform uptime metrics, AWS disaster recovery architecture, RTO/RPO
        commitments, and any multi-cloud or active-active DR roadmap documentation.
      whyItMatters: >
        An AWS regional outage during a peak sale event would result in material GMV loss. Without
        DR architecture disclosure, residual severity of cloud concentration risk cannot be
        accurately estimated.
      diligencePath: >
        Request cloud architecture design documents, uptime SLA commitments, and DR test results
        from Meesho engineering leadership during technical due diligence.
      relatedQuestionRefs: [QR011, QR016]

    - id: GR003
