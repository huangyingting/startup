  - id: competitor-profiles
    title: Competitor Profiles — Scale, Funding, and Strategic Direction
    body: >
      Flipkart is Meesho's most formidable adversary. Walmart-backed and valued at approximately $35–36 billion
      in 2025, Flipkart Internet reported GMV of ₹70,542 crore ($8.5B) in FY2024, growing 26.4% YoY, and
      marketplace revenue of ₹20,493 crore in FY2025 (+14% YoY) with net losses narrowed to ₹1,494 crore
      (down 37%). Advertising revenue surged 27% to ₹6,317 crore in FY2025, representing 31% of marketplace
      revenue—a testament to Flipkart's monetization depth. Flipkart's consolidated India entity lost ₹5,189
      crore in FY2025 on total revenue of ₹82,787 crore but is preparing a domestic IPO (targeting 2026) with
      a Singapore-to-India domicile flip. Flipkart's Shopsy sub-brand directly targets Meesho's value segment
      with low-commission social commerce. Flipkart's Ekart logistics network spans 800+ cities, providing
      faster fulfillment than Meesho's third-party logistics model.

      Amazon India (Amazon Seller Services) reported revenue of ₹30,139 crore in FY2025 (+19% YoY) with net
      loss reduced 89% to ₹374 crore. Advertising revenue reached ₹8,342 crore (+25%), dwarfing Meesho's
      ad revenue. Amazon holds 28–32% GMV market share and has announced an "Amazon Now" quick commerce
      initiative competing with Blinkit and Zepto. Amazon's primary moat relative to Meesho is superior
      brand-building infrastructure (Brand Registry, A+ Content, FBA fulfillment) and a premium/urban buyer
      base with higher average order values. Amazon and Flipkart both require GST from sellers, excluding the
      informal MSME segment that Meesho serves.

      JioMart (Reliance Retail) combines offline Reliance Fresh/Digital stores with a digital marketplace and
      WhatsApp-based conversational commerce. It commands approximately 8% of Indian e-commerce by GMV and
      is strongest in grocery and daily essentials—a category Meesho does not prioritize. Reliance's $8–10B
      GMV makes JioMart a top-5 player but its category focus limits head-to-head competition with Meesho's
      fashion-and-home value commerce. Myntra (Flipkart-owned) leads online fashion with 32–35% share and
      6,000+ brands, targeting Gen Z in Tier 1 cities with premium labels—opposite end of the fashion market
      from Meesho's unbranded ₹200–₹500 value segment. AJIO (Reliance) competes in premium/indie fashion with
      urban buyers. Snapdeal's "Snapdeal 2.0" repositioning shrinks it to a $300–500M GMV rump with no
      realistic path back to Meesho's scale. DealShare's group-buying grocery model has raised ~$165M but
      remains constrained to select regional markets.
