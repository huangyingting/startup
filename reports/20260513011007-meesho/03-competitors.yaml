  evidenceGaps:
    - type: no-access-to-primary-source
      severity: material
      topic: flipkart-shopsy-scale
      missingEvidence: "Audited or officially disclosed GMV and user count for Flipkart Shopsy as a standalone entity separate from Flipkart total GMV"
      whyItMatters: "Shopsy is Meesho's most direct competitor; without independent Shopsy-specific GMV data, the scale of the direct competitive threat cannot be precisely quantified."
      diligencePath: "Request Shopsy GMV and MAU from Flipkart investor relations; review Walmart annual reports for Flipkart subsidiary disclosures; review SEBI/MCA filings if Flipkart completes its India IPO in 2026."

    - type: private-evidence-only
      severity: material
      topic: meesho-ad-revenue
      missingEvidence: "Meesho's advertising revenue as a percentage of GMV or in absolute terms for FY2025"
      whyItMatters: "Ad monetization is Meesho's primary path from zero-commission to sustainable take rates; without this data, the comparison to Amazon (₹8,342 cr) and Flipkart (₹6,317 cr) ad revenues lacks Meesho's actual data point."
      diligencePath: "Review Meesho's IPO prospectus (DRHP/RHP) for advertising revenue disclosure; check NSE quarterly filings post-IPO for revenue breakdown."
      relatedQuestionRefs: [QP019, QP029]

    - type: no-access-to-primary-source
      severity: low
      topic: informal-msme-seller-count
      missingEvidence: "An independently verified count of India's unregistered MSME businesses eligible for Meesho-style informal e-commerce participation"
      whyItMatters: "The '60M+ unregistered MSME' figure is widely cited but not verifiable from a primary source in this research; it underpins Meesho's seller moat narrative."
      diligencePath: "Cross-reference Ministry of MSME Udyam registration data with CMIE or RBI surveys of informal enterprise counts."
      relatedQuestionRefs: [QP023]

    - type: no-public-data
      severity: low
      topic: seller-return-rate-primary
      missingEvidence: "Meesho's officially disclosed return rate data from quarterly or annual filings, broken down by category"
