      Positioning of six major India e-commerce platforms on two axes: X = Average Order Value (Low → High,
      1–10 ordinal score) and Y = Seller Base Breadth (Informal MSME reach, Low → High, 1–10 ordinal score).
      Meesho occupies the top-left quadrant: lowest average order value with the widest informal seller reach.
      Amazon occupies the bottom-right: highest average order value, lowest informal seller accessibility.
      Flipkart sits in the center-right. JioMart is center-left (low AOV grocery, moderate seller breadth).
      Myntra and AJIO are bottom-right (premium fashion). Shopsy is adjacent to Meesho at top-left.
