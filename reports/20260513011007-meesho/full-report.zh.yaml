  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局与对手类别
        blocks:
          - type: paragraph
            body: >
              Meesho 在印度电商中占据一个清晰但竞争激烈的位置。五类竞争者塑造了威胁版图。第一，横向市场既有巨头：Flipkart（Walmart 控股，GMV 份额约 48%）和 Amazon India（GMV
              份额约 28–32%）靠规模、物流和品牌力主导市场。两者向卖家收取 5–25% 佣金，要求 GST 注册，主要面向一线和 Tier 1 买家，同时也投资 Tier 2+
              扩张。第二，价值电商和社交电商复制者：Flipkart 的 Shopsy 是最直接的结构性竞争者，依托 Flipkart 的库存和物流骨干，复制 Meesho 的低价、联盟驱动模式。Shopsy 目标到 2025
              年达到 160 million 用户，并明确争夺本地语言、移动优先、非一线买家——也就是 Meesho 的核心。第三，相邻电商垂类：JioMart（Reliance，杂货优先，电商份额约
              8%）、Myntra（Flipkart 旗下，时尚优先，线上时尚份额 32–35%）、AJIO（Reliance，高端 / 独立时尚）和 Nykaa（美妆）共同挤压品类边缘——每家公司都在一个 Meesho
              并非专为取胜而设计的垂类中很强。第四，走弱的价值段同行：Snapdeal 已重新定位为预算型市场，年度 GMV 只有 $300–500M，远低于 Meesho 的 $6.2B GMV 年化规模；DealShare
              做小规模团购杂货电商。第五，结构性颠覆者：ONDC（Open Network for Digital Commerce）由印度政府支持，是一套可互操作协议，让买家和卖家跨应用交易。ONDC 收取约 1%
              交易费，相比 Meesho 的零佣金模式并不更低，但它也消除了 Meesho 卖家和买家基础的排他性，可能把发现环节商品化。

              Meesho 在这张版图中的结构性优势有三点。第一，零佣金、免 GST 模式吸引非正式 MSME 卖家——未注册商户估计超过 60M——这些卖家被 Amazon 和 Flipkart
              的入驻要求排除在外。这形成了卖家供给护城河；既有巨头若不牺牲佣金收入，很难复制。第二，截至 2024 年 12 月，Meesho 拥有 187M 年度交易用户，主要来自 Tier 2–5
              城市，已经形成需求飞轮：低收入买家信任 Meesho 的价格信号。第三，Meesho 2025 年 12 月 IPO 上市带来资产负债表透明度和可信度，有助于商户和合作伙伴建立信任，也提高了已有 Meesho
              店面的卖家切换成本。

              竞争风险是不对称的：只要战略意图足够强，Flipkart 和 Amazon 有规模与资本在任何功能维度压低 Meesho；但那要求它们降低佣金，削弱自身变现。ONDC
              则绕开了这个两难——它提供一条开放轨道，可以承载类 Meesho 商务，而不需要 Meesho 平台。在 ONDC 赋能的世界里，Meesho
              如何凭数据、策展、物流质量或金融科技附加服务实现差异化，是未来三到五年的核心战略问题。
