      - number: '5.2'
        title: 卖家与买家工作流
        blocks:
          - type: paragraph
            body: >
              卖家通过 Supplier App 的引导流程入驻：GSTIN 验证、绑定银行账户、上传商品目录（照片 + 描述）并定价。Meesho 的 Catalog Intelligence
              Platform（CIP）会从商品图片自动建议品类、子品类和属性，把手工工作从数小时压缩到数分钟。买家通过算法策展的信息流浏览，也可使用 GenAI 驱动的搜索框发起自然语言和语音查询。应用内
              WISMO（Where Is My Order）跟踪器借助 Valmo 物流 API 提供实时配送状态和 ETA 预测。COD（Cash on Delivery，货到付款）约占订单
              76%，通过专用管道对账：汇总来自 19,000+ 个邮编配送代理的现金存款，与订单记录核验，并在 7–10 天内触发卖家付款。买家退货会启动自动上门取件排期；预付订单的退款在 5–7 天内处理。
