      - number: '1.3'
        title: 融资历史与投资方
        blocks:
          - type: paragraph
            body: >
              从 2015 年创立到 2025 年 1 月完成一轮以老股转让为主的 $550 million 融资，Meesho 在十二余轮融资中累计募集约 $1.36 billion。早期支持者包括 Y
              Combinator（2016 批次）、Elevation Capital（Series A，2017 年）和 Peak XV Partners（前 Sequoia India，Series B，2018
              年）。公司 2018 年 10 月完成 $50 million Series C，随后在 2019 年中从 Facebook（现 Meta）和 Naspers（现 Prosus）完成两笔 Series D，合计
              $150 million。


              2021 年资本市场热潮带来两轮标志性融资：2021 年 4 月，SoftBank Vision Fund 领投 $300 million Series E，估值 $2.1 billion；2021 年 9
              月，Fidelity 和 B Capital 领投 $570 million Series F，估值达到 $4.9 billion 峰值。经历融资寒冬后，Meesho 于 2024 年 4 月重返市场，从
              Tiger Global（首次投资 Meesho）和 Peak XV 募集 $275 million，估值 $3.9 billion；2025 年 1 月又完成更大的一笔 $270 million（整轮合计
              $550 million），引入 Think Investments 和 Mars Growth Capital。近期多数轮次以二级交易为主。


              2025 年 12 月 IPO 后，公司在 NSE 和 BSE 拥有公众股东。IPO 的 ₹4,250 crore（约 $500 million）新股募资，部分用于覆盖从反向迁册产生的 $280–300
              million 美国税负。
