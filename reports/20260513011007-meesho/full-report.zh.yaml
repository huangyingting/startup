            body: >
              我们在 Rs 105–111/股 IPO 价格区间给出有条件买入，信心中等。建议取决于：（1）IPO 前或上市后不久至少连续两个季度 EBITDA 为正；（2）DPDPA
              数据保护官（DPO）任命和同意管理架构得到确认；（3）交割前披露多云或灾难恢复架构路线图。按 Rs 108（中间价），基准情景 12
              个月回报约持平（0–10%）；乐观情景上行不对称（+25–45%），悲观情景下行（-25–35%）。风险评级为中高，反映监管（DPDPA、IT Act）、运营（AWS 集中、RTS
              率）和执行（盈利仅被一个季度证明）风险；财务韧性和网络效应护城河部分抵消这些风险。若价格低于 Rs 95/股，随着悲观情景下行明显收窄，将构成强烈买入。
