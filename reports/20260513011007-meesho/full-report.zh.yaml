      - number: '3.3'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              从消费者和卖家的关键购买标准看，Meesho、Flipkart 和 Amazon 的能力画像差异明显。消费者能力方面，先看目录广度：Meesho 拥有 1.3M+ 卖家和 500M+
              SKU，主要是无品牌时尚、家居用品和配饰。Flipkart 在电子产品和品牌时尚上领先。Amazon 在国际品牌、高端电子产品和订阅（Prime）捆绑上领先。物流速度是 Meesho 的长期弱项：典型配送需要
              5–7 天，而符合条件的 Flipkart Fulfilled 和 Amazon FBA 商品只需 1–2 天。

              卖家能力方面，Meesho 的零佣金模式和免 GST 入驻是独特差异点；Flipkart 或 Amazon 若不结构性改变收入模式，很难轻易匹配。但 Meesho 的广告工具仍处早期——相比 Amazon 成熟的
              Sponsored Products 和 Flipkart 正在增长的广告栈（FY2025 广告收入 ₹6,317 crore），Meesho 卖家的赞助位置选择有限。退货管理是痛点：Meesho 无品牌 SKU
              的退货率达到 15–25%+，缺少成熟品类管理工具时，会给卖家带来成本和运营复杂性。

              支付和结账能力大体相当——三家平台都支持 UPI、借记卡 / 信用卡、钱包和 EMI。忠诚度计划差异更大：Amazon Prime 捆绑配送、视频和音乐；Flipkart 通过 SuperCoins 提供
              Plus 会员；Meesho 没有同等的忠诚度订阅，这限制了其提高留存相关 AOV 的能力。社交和直播电商能力在三家都在增长：Meesho 的 WhatsApp 驱动分享模式和联盟架构是先行者；Flipkart
              Shopsy 和 Amazon 联盟计划是快速跟随者。ONDC 集成是 Meesho 已经拥抱的差异点（Meesho 作为买方 app 加入 ONDC），而 Amazon 和 Flipkart 动作较慢；如果
              ONDC 让小平台聚合 Meesho 的供应商基础，这会构成风险。
