          - type: callout
            title: Amazon 的广告收入优势带来长期补贴风险
            body: >
              Amazon India FY2025 广告收入为 ₹8,342 crore（同比 +25%），这意味着 Amazon 可以在竞争品类中补贴买家获取或卖家激励，而不牺牲盈利能力。Meesho
              的广告变现仍处早期，规模只是 Amazon 的一小部分；如果 Amazon 或 Flipkart 发起持续的品类级价格战，Meesho 会暴露在风险中。
