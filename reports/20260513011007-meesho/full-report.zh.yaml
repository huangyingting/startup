            body: >
              Meesho 在 Q4 FY2025 首次实现 FCF 为正的运营。整个乐观和基准估值逻辑，都取决于这是否是结构性拐点，而不是季节性峰值。至少连续两个季度 EBITDA 为正并经审计账目确认之前，当前
              1.4–1.5x 水平上的倍数扩张可能性不高。这是以发行价区间建立 IPO 仓位前最重要的单项尽调要求。
