      - number: '7.2'
        title: 运营、质量与技术风险
        blocks:
          - type: paragraph
            body: >
              Meesho 的运营风险由三条主线锚定：物流可靠性、规模化下的商品质量，以及云基础设施集中。公司 62% 的 Valmo 自配送份额降低了对第三方承运商的依赖，但如果 Valmo 无法扩张，也会引入执行风险；剩余
              38% 通过 Delhivery 和 Ecom Express，也有交易对手风险。时尚品类 15–25% 的退回发件人（RTS）率，由 COD 拒收和尺码 /
              版型不匹配驱动，会压缩单位经济，并在失控时造成卖家流失螺旋。技术基础设施方面，所有生产工作负载都运行在 AWS India，未披露多云备用；若大型促销期间 AWS 区域发生重大宕机，将造成实质 GMV
              损失。CERT-In 6 小时漏洞通知要求，也给数据安全团队增加运营负担。开放市场叠加 MSME 卖家基础，商品质量风险具有系统性；Meesho 依赖事后审核，而不是发货前实物检查。
