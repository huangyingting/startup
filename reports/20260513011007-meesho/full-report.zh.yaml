chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Meesho Limited（NSE: MEESHO）是印度领先的价值导向电商市场，总部位于 Karnataka Bengaluru 的 Helios Business Park。公司 2015 年以
              Fashnear Technologies Private Limited（印度运营实体）注册成立，最初是一家社交电商平台，让小商户和居家创业者——主要是非一线印度城市的女性——无需持有库存，就能通过
              WhatsApp、Facebook 和 Instagram 转售商品。2022–2024 年间，Meesho 在保留卖家零佣金定位的同时，把模式扩展到直接面向消费者，主打「Bharat」（Tier 2/3/4
              城市）叙事。


              核心商业模式是市场平台：Meesho 不向约 1.5 million 名在平台上架商品的卖家收取佣金，而是靠广告（推广列表、赞助商品）和向卖家提供的物流服务变现。2024 年，Meesho
              推出以品牌为核心的精选店面 Meesho Mall，大品牌在其中支付佣金，公司因此增加了第二条变现杠杆。内部物流市场 Valmo（2024 年 2 月上线）聚合小型区域物流商，到 2024 年 12
              月已处理超过一半的发货量，显著压低了单均配送成本。


              截至 2025 年 12 月 IPO 时，Meesho 被归类为非必需消费品板块的互联网零售公司，财年为 4 月至次年 3 月，报告货币为印度卢比（INR）。
