      - number: '8.2'
        title: IPO 定价背景与可比基准
        blocks:
          - type: paragraph
            body: >
              Meesho IPO 规模 Rs 5,421 crore（Rs 4,250 crore 新股 + Rs 1,171 crore 老股出售（OFS）），是 2026 年印度最大科技 IPO 之一。按每股 Rs
              108 的中间价计算，IPO 后隐含市值约 Rs 14,500 crore（~$1.7B）。基于 FY2026（NTM）收入估计 Rs 9,800–10,200 crore，对应 EV/NTM 收入约
              1.4–1.5x。印度上市市场平台同业交易倍数明显更高：Nykaa（FSN E-Commerce）约 4.5x NTM 收入，IndiaMART Intermesh 约 8x NTM 收入（已完全盈利的 B2B
              市场）。全球新兴市场电商可比公司更接近：Sea Limited（Shopee）为 2.5–3x，PDD Holdings 约 4x。IPO 折价部分来自 Meesho 相比印度同业仍处更早的盈利阶段；若
              EBITDA 被证明可持续，差距收窄应推动倍数扩张。
