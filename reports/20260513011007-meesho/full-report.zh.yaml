  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >
              Meesho 的市场平台服务两类主要客户。买家群体在 FY2024 约有 199 million 年度交易用户（ATUs），70% 以上位于 Tier 3 及更小城市（人口低于 100,000）。人口画像偏向
              55–60% 女性、18–35 岁、低至中等收入，并且移动端优先。约 68% 受访买家的首要购买动机是性价比。卖家群体约有 1.2 million 活跃 MSME 和个体创业者，主要来自
              Surat、Ahmedabad、Jaipur 等纺织制造枢纽。社交分销者——通过 WhatsApp 分发 Meesho 商品链接且不投入库存的个人——构成第三类群体，平台通过佣金变现。Meesho 未披露 B2B
              或企业买家群体。Tier 3+ 市场的地域集中，既是 Meesho 的战略差异化，也是其客单价扩张的潜在天花板。
