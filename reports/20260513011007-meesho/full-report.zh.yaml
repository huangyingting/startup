  - id: TM001
    title: 市场定义表
    columns:
      - 细分 / 类别
      - 纳入口径
      - 排除口径
      - 买方 / 付款方
      - 对 Meesho 的意义
    rows:
      - - 印度性价比电商
        - 无品牌 / SMB 上架商品，AOV <₹500；时尚、家居、美妆、日用百货；Tier 1–4 地域
        - 品牌电子、奢侈品、高端时尚 >₹2,000；批发 / B2B；灰色市场进口
        - 个人消费者（主要为 18–40 岁女性）；自付；无雇主 / 保险中介
        - 核心 TAM；Meesho 的主要收入基础；印度电商订单份额 37%
      - - 社交 / 转售电商
        - 通过 WhatsApp/Instagram 转售链销售；社交发现 → 购买漏斗
        - 平台直达的 SEO / 搜索发现；D2C 品牌店铺；即时零售
        - 转售者充当微型中介；终端消费者付款；转售者赚取差价
        - 历史护城河；Meesho 转向直接购物者模型后占比下降
      - - Tier 2/3/4 非一线城市
        - 来自人口 <1M 城市的订单；农村邮编；总计 500,000 个邮编
        - Tier 1 大都市高端 SKU，期待当日达；奢侈品电商
        - 月收入 ₹10,000–₹50,000、价格敏感家庭；自付
        - Meesho ATU 基础的 85–90%；FY2025–FY2030 增长最快队列
      - - SMB 卖家入驻（供给侧）
        - 个人手艺人、家庭工人、区域制造商，在零佣金模式下上架
        - 大型品牌店铺；面向 Tier 1 品牌卖家的排他性 FBA 式物流协议
        - SMB 卖家是物流和广告服务的供给侧买方
        - 靠卖家广告和 Valmo 物流分散收入；供给侧护城河
      - - 即时零售（相邻）
        - 10–30 分钟配送窗口内的高频 FMCG 和日用品
        - 时尚、家居、美妆（Meesho 核心）；可接受更长配送时间的非易腐品
        - 城市消费者更看重便利而非价格；收入层更高
        - 相邻威胁：2025 年占电商零售 GMV 的 10%；Meesho 尚未在此竞争
    notes: 市场边界来自 Meesho SEBI DRHP 申报文件中的行业报告（Redseer）、Bain How India Shops Online 2025 和 CLSA Apr 2025 首次覆盖报告。
