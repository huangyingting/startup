      - number: '1.5'
        title: 里程碑、IPO 与公司事件
        blocks:
          - type: paragraph
            body: >
              Meesho 从创立到公开上市历时十一年，期间快速增长，也伴随业务转向、逆境和监管里程碑。公司 2015 年在 Bangalore 注册成立，参加 Y Combinator 2016 批次，并从 2017
              年起扩大社交转售模式。产品和运营转向包括 2022 年关停杂货业务（Farmiso / Superstore），同时约 400 名员工离开；以及 2023 年 5 月裁员 251 人（占员工总数 15%），CEO
              Vidit Aatrey 公开承认「过度招聘中的判断错误」。这些负面事件重塑了公司的成本结构，也加快了盈利路径。


              2025 年 1 月，Meesho 向 NCLT Bengaluru 申请 Fashnear Technologies（India）与 Meesho Inc.（US）反向合并，并于 2025 年 5 月 27
              日获得 NCLT 批准。随后公司成为完全印度实体，并于 2025 年 10 月向 SEBI 保密提交 DRHP。IPO 认购窗口为 2025 年 12 月 3–5 日，发行获得 79–81
              倍超额认购；价格区间为每股 ₹105–₹111，总发行规模 ₹5,421.20 crore（新股 ₹4,250 crore + OFS ₹1,171.20 crore）。股票 2025 年 12 月 10 日在
              NSE 和 BSE 上市，开盘价每股 ₹196（较 ₹111 发行价溢价 76%）。锚定轮爆发争议：Capital Group、Norges Bank、Nippon India 等撤回认购，指称 SBI
              Mutual Fund 获配 ₹603 crore（占 ₹2,439 crore 锚定书的 25%）比例过高。
