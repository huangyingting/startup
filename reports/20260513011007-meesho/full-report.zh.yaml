      - number: '5.4'
        title: AI、ML 与 GenAI 差异化
        blocks:
          - type: paragraph
            body: >
              Meesho 的技术护城河集中在三套 ML 系统。第一，Catalog Intelligence Platform（CIP）用计算机视觉和 NLP
              从卖家上传图片中自动标注商品属性（颜色、尺寸、图案、材质），显著降低上架延迟，并在规模化下提升目录质量。第二，推荐引擎将协同过滤与内容信号结合，为 199 million
              年度交易用户个性化买家信息流。第三，FY2024 部署的 GenAI 搜索层用大语言模型（LLM）解析自然语言、口语化 Hindi
              和地区语言查询。视觉搜索功能使用图像嵌入，将用户上传照片与目录商品匹配。Meesho 的欺诈检测系统用实时 ML
              分类器标记虚假评论、优惠券滥用和卖家博弈行为。公司通过工程博客（medium.com/meesho-tech）发布这些系统的技术深度，但不公开准确率基准、召回率 / 精确率或 A/B 测试结果。
