            body: >
              Meesho 不公开披露队列留存率、净留存率（NRR）或年度卖家流失率，这是重要尽调缺口。间接信号显示复购参与度有一定深度：每个 ATU 每年 9.2 单（FY2024）的订单频次，与 Amazon India
              的高性价比客群相当；CLSA 预测到 FY2031 GMV 以 26% CAGR 增长，也隐含买家粘性可持续。基于 ATU 轨迹建模，第二年买家留存估计约 35–42%。Meesho 买家 App 在
