      - number: '3.2'
        title: 竞争对手画像——规模、融资与战略方向
        blocks:
          - type: paragraph
            body: >
              Flipkart 是 Meesho 最强的对手。它有 Walmart 支持，2025 年估值约 $35–36 billion；Flipkart Internet 在 FY2024 披露 GMV ₹70,542
              crore（$8.5B），同比增长 26.4%，FY2025 市场收入 ₹20,493 crore（同比 +14%），净亏损收窄至 ₹1,494 crore（下降 37%）。FY2025 广告收入跃升 27% 至
              ₹6,317 crore，占市场收入 31%，证明 Flipkart 变现深度很强。Flipkart 印度合并实体 FY2025 在总收入 ₹82,787 crore 上亏损 ₹5,189
              crore，但正准备本土 IPO（目标 2026 年），并进行从 Singapore 到印度的迁册。Flipkart 的 Shopsy 子品牌直接瞄准 Meesho 的价值段，主打低佣金社交电商。Flipkart
              的 Ekart 物流网络覆盖 800+ 城市，比 Meesho 的第三方物流模式履约更快。

              Amazon India（Amazon Seller Services）FY2025 披露收入 ₹30,139 crore（同比 +19%），净亏损下降 89% 至 ₹374 crore。广告收入达到
              ₹8,342 crore（+25%），远高于 Meesho 的广告收入。Amazon 持有 28–32% GMV 份额，并已宣布推出「Amazon Now」即时零售计划，与 Blinkit 和 Zepto
              竞争。相对 Meesho，Amazon 的主要护城河是更强的品牌建设基础设施（Brand Registry、A+ Content、FBA 履约）以及客单价更高的高端 / 城市买家群。Amazon 和
              Flipkart 都要求卖家提供 GST，因此排除了 Meesho 服务的非正式 MSME 群体。

              JioMart（Reliance Retail）把线下 Reliance Fresh/Digital 门店与数字市场、WhatsApp 对话式商务结合起来。按 GMV 计，它掌握印度电商约 8%
              份额，在杂货和日用品上最强——这不是 Meesho 优先投入的品类。Reliance 的 $8–10B GMV 使 JioMart 成为前五玩家，但其品类重点限制了与 Meesho
              时尚和家居价值电商的正面竞争。Myntra（Flipkart 旗下）以 32–35% 份额领跑线上时尚，拥有 6,000+ 品牌，面向 Tier 1 城市 Gen Z 和高端标签——与 Meesho 无品牌
              ₹200–₹500 价值段处在时尚市场的相反端。AJIO（Reliance）以城市买家为目标，竞争高端 / 独立时尚。Snapdeal 的「Snapdeal 2.0」重新定位把它缩小成 $300–500M GMV
              的残余盘子，看不到回到 Meesho 规模的现实路径。DealShare 的团购杂货模式已融资约 $165M，但仍受限于少数区域市场。
