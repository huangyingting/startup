  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与细分
        blocks:
          - type: paragraph
            body: >
              Meesho 竞争的市场，是印度横向价值电商：向 Tier 1–4 城市价格敏感消费者销售平均订单价值低于 ₹500 的无品牌和中小商户上架商品，在非一线地区尤其深。公司为 IPO 委托 Redseer
              撰写、并于 2025 年 10 月向 SEBI 提交的行业报告，把 FY2025 印度总零售市场描述为 ₹83 lakh crore（约 $960 billion），其中有组织零售占
              21%，电商是其中快速增长的子集。


              Meesho 的相关市场可以看作三层嵌套圆环。最外层是全量零售，覆盖所有渠道——有组织与无组织、线下与线上。内层是线上原生平台可触达的电商 GMV，Bain & Company 年度印度购物者调查估算
              FY2024 约为 $60 billion，到 FY2030 将增至 $170–190 billion。再向内是价值电商细分——时尚、家居 / 厨房、美妆和综合商品中 AOV 低于 ₹500 的订单——订单量约占
              45%，但由于客单价低于电子产品和高端品类，GMV 仅占电商总 GMV 的 15–20%。


              Meesho 当前核心 TAM 不包括：高端品牌时尚（Myntra 主导）、奢侈品、B2B 商务、即时零售（杂货 / FMCG 的 10
              分钟配送）和跨境出口。战略上最相关的邻近市场，是美妆和配饰中的即时零售（Blinkit、Zepto、Swiggy Instamart），以及时尚中的 D2C
              品牌店面；两者更多代表未来竞争压力，而非当前核心替代品。


              Meesho 的现状替代品包括本地 kirana 小店、每周 haat（集市）和无组织街市；截至 FY2025，印度零售消费中估计超过 70% 仍通过这些基础设施流动。这些线下渠道正是 Meesho
              卖家入驻的主要目标：公司把无组织供给转为数字店面，使其能够触达 187 million 活跃线上买家。
