      - number: '4.5'
        title: 证据图表
        blocks:
          - type: callout
            title: FY2024 现金流转正，验证 Valmo 带动的单位经济改善
            body: >
              FY2024 经营现金流转正，达到 +₹232 crore，自由现金流达到 +₹197 crore——这是 Meesho 首次实现全年持续现金生成。这不是一次性事件：FY2025 FCF 进一步改善至
              ₹591–₹1,032 crore。这一转折和 Valmo 的每单成本下降（₹50.45 → ₹37.70）以及每单营销支出压缩（₹13.6 → ₹4.9）直接相关。里程碑消除了 IPO
              前投资者最核心的质疑——Meesho 是否只是长期烧钱机器——也支撑了 EBITDA 盈利路径的可信度。
            calloutType: strength
            claimRefs:
              - CI007
              - CI008
              - CI013
              - CI015
          - type: callout
            title: 76% COD 敞口带来结构性营运资本和退货率压力
            body: >
              货到付款订单约占 Meesho FY2025 订单量的 76%，而 Flipkart 约 30%、Amazon India 约 25%。COD 带来两类叠加成本风险：退货率更高（估计 COD 为
              30–35%，预付为 10–15%），以及现金回笼更慢，因为已收款项必须通过物流代理网络回汇。按年订单 1.83 billion 计算，预付转化率每提升 1%，估计可节省 ₹150–₹200 crore
              年度退货处理成本。Tier 2–4 城市的 UPI 普及是主要杠杆，但电商交易中的采用仍处早期。
            calloutType: risk
            claimRefs:
              - CI017
              - CI029
              - CI035
          - type: callout
            title: FY2025 净亏损主要是非现金项；经常性经济亏损小得多
            body: >
              FY2025 法定净亏损 ₹3,941.7 crore 让部分分析师担忧，但按调整后 EBITDA 口径，经常性经济亏损为 ₹219.6 crore。差额来自 2025 年 5 月 NCLT
              批准的反向回迁合并触发的一次性递延所得税费用，约 ₹3,500+ crore。这个非现金会计分录不影响 Meesho 现金状况或经营现金流，后者仍为正。投资者应更多看调整后
              EBITDA、贡献利润率和自由现金流轨迹，而不是被该非经常性项目显著扭曲的法定 P&L。
            calloutType: insight
            claimRefs:
              - CI004
              - CI005
              - CI006
              - CI033
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品平台与模块图谱
        blocks:
          - type: paragraph
            body: >
              Meesho 的产品界面完全以移动端优先。买家 App（Android 和 iOS）让终端消费者进入一个精选高性价比商品目录，覆盖女装、家居装饰、电子配件等 25+ 个品类，价格比 MRP 低
              50–80%。Meesho Supplier App（Android）让超过 1.2 million 活跃 MSME 和个人分销者可在一个界面中上传商品目录、管理订单、跟踪退货并收款。买家 App
              的社交分享功能支持通过 WhatsApp 和社交网络零库存转售，这一工作流在印度电商平台中独特。平台还提供网页版店面和可通过浏览器访问的自助卖家门户。Meesho 没有公开开发者 API，也没有类似 Amazon
              MWS 或 Flipkart Affiliate API 的联盟集成渠道，限制了第三方生态扩展。
