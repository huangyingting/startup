          - type: callout
            title: 订单份额 37%、GMV 份额仅 8.5%，揭示 Meesho 的结构位置
            body: >
              Meesho 按订单量处理印度 37% 的电商订单，但按 GMV 只占 8.5%；这一比例量化了其价值电商领导者的结构位置。Meesho AOV 约为 ₹315-350，而 Flipkart/Amazon
              来自电子产品和品牌时尚的 AOV 明显更高；因此，其变现路径要么把 AOV 扩展到更高客单价品类，要么在现有卖家基础上提高平台抽成率。CLSA 的 26% CAGR 假设两者都会在 FY2031 前逐步发生。
