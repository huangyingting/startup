      - number: '4.3'
        title: 资本结构与 IPO
        blocks:
          - type: paragraph
            body: >
              在 2025 年 12 月 IPO 前，Meesho 已在所有已披露融资轮中累计募资约 $1.36 billion，投资方包括 Prosus、SoftBank、Peak XV Partners、B
              Capital、CDPQ 和 Meta。尽管累计投入了这些股权资本，公司到 FY2025 仍保持零债务资产负债表——₹7,226 crore 总资产完全由股本和累计留存支撑。FY2025 净资产为 ₹1,445
              crore，尚未计入 IPO 募资带来的大幅增加。


              2025 年 11 月提交并经 SEBI 注册的红鲱鱼招股说明书（RHP），是 Meesho 首次公开披露财务数据，覆盖 FY2023–FY2025 经审计财务。IPO 包括 ₹4,250 crore
              新股发行和现有股东 ₹1,171.2 crore 老股出售，按每股 ₹111 的价格区间上限合计 ₹5,421.2 crore。Meesho 于 2025 年 12 月 10 日在 NSE 和 BSE
              上市，IPO 后市值约 $3.9–4.2 billion。


              按 DRHP 披露，新股发行募资用途包括：云基础设施投入（三年 ₹1,390 crore）、营销和新用户获取（₹1,020 crore）、AI 和技术人才及研发（₹480
              crore），以及非有机收购或一般公司用途（余额约 ₹1,360 crore）。云基础设施是最大单项用途，反映 Meesho 所述战略：2025–2028 年从高度依赖第三方云，迁移到部分自管的混合架构。


              反向回迁合并（Meesho Inc Delaware 并入印度 Meesho Private Limited）已于 2025 年 5 月获 NCLT 批准完成。合并触发约 ₹3,500+ crore
              递延所得税负债，将 FY2025 法定净亏损推高至 ₹3,941.7 crore；但按调整后 EBITDA 口径，经常性经济亏损仍为 ₹219.6 crore。
