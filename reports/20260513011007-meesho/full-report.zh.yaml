            body: >
              Open Network for Digital Commerce 收取约 1% 交易费，相比 Meesho 的零佣金并不更低，但它消除了平台排他性。如果 ONDC 到 2029 年达到每月 15 crore
              笔订单（按行业预测），它将直接竞争 Meesho 的核心交易量。Meesho 作为买方侧 ONDC 应用 参与其中，能部分缓释但不能消除这一风险。
            calloutType: risk
