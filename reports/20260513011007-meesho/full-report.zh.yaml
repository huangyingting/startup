      - number: '5.5'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >
              Meesho 运行多层信任控制。自动图像审核会扫描所有新商品目录，识别假冒品牌图像。卖家质量评分跟踪退货率、缺陷报告和履约可靠性，超过阈值即触发暂停。信任与安全团队将 ML
              检测和人工复核结合，用于卖家申诉和买家纠纷升级。监管侧，Meesho 受印度 IT Act 2000、Consumer Protection (E-Commerce) Rules
              2020，以及即将实施但时间表仍不确定的 Digital Personal Data Protection Act 2023 约束。作为新上市公司（2025 年 12 月），Meesho 现在还受 SEBI 的
              LODR 披露框架约束。公司未公开披露第三方安全认证（ISO 27001、SOC 2、PCI-DSS 审计）；考虑到支付和个人数据处理规模，这是重要尽调缺口。
