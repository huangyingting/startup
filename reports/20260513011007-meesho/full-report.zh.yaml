      - number: '3.4'
        title: 定价与佣金结构
        blocks:
          - type: paragraph
            body: >
              佣金和费用结构，是印度电商最可见的竞争差异点。Amazon India 收取 5–25% 品类佣金，另有成交费、配送费和可选 FBA 履约费；GST 注册为强制要求；中端卖家的综合有效 take rate 估计为
              15–25%。Flipkart 收取 5–20% 佣金，结构与 Amazon 类似，并按品类变化，还包含促销账单。Meesho 的核心佣金率在多数品类为
              0%——这是激进的转向，拿掉了小卖家最大的单项成本。Meesho 通过物流（协商后的 3PL 费率加价转嫁给卖家）、广告产品（推广列表）和支付沉淀资金变现。零佣金结构部分解释了 Meesho
              的低平均订单价值（每单约 ₹300–₹400）和高订单量（FY2025 前九个月 1.3B 笔订单），因为卖家知道自己不用交出 15%+ 佣金，定价就更有竞争力。

              定价对比表（TP003）提供了跨平台标准化视图。关键含义是：Meesho 的零佣金模式是结构性选择——若回到佣金模式，公司会冒卖家流失风险，并把低 AOV 细分让给 ONDC 或新进入者。试图匹配 Meesho
              定价的竞争对手，会面临佣金收入自我蚕食。Flipkart Shopsy 目前提供很低（低于 5%）的佣金，也是这一竞争动态的一部分。不过，随着 Meesho 在 FY2025
              扩大广告收入和物流费收入，它证明在不正式收佣金的情况下，接近 GMV 5–6% 的平台抽成率是可以做到的；也就是说，「零佣金」标签虽然准确，但不等于零变现。
