      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景假设 Meesho 实现 CLSA 到 FY2031 的 26% GMV CAGR，GMV 到 FY2027 达到 $8.5B，EBITDA 在 FY2027 以 ≥4%
              利润率转为结构性正值。在这一情景下，盈利被验证支撑 EV/收入倍数从 1.4x 扩张至 1.7x，对应目标估值 Rs 18,000–21,000 crore。基准情景假设 GMV CAGR 为
              20–22%，EBITDA 从 Q4 FY2025 基线逐步改善，倍数维持 1.4x，对应估值 Rs 14,000–16,000 crore，与 IPO 价格基本一致。悲观情景发生在
              Flipkart/Amazon 发起竞争性 GMV 补贴战，或监管执法将盈利推迟到 FY2028 之后，GMV 增长压缩至 12–15%，倍数收缩到 1.0–1.1x，对应 Rs 9,000–11,000
              crore。乐观到悲观区间为 2.1x，反映盈利拐点确有不确定性。
