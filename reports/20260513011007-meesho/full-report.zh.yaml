      - number: '7.6'
        title: 证据图表
        blocks:
          - type: callout
            title: DPDPA 叠加单一云：双重高严重性敞口
            body: >
              Meesho 面临两项重叠的高剩余敞口风险，且未充分披露缓释措施：DPDPA 监管执法最高可罚 Rs 250 crore，并可能实施数据处理禁令；同时，公司依赖 AWS
              单一云，未披露多云架构。任一事件单独发生都可能实质削弱运营；若云宕机期间同时出现监管执法，则是会影响估值的尾部情景。投资者在交割前应要求公司提供 DPO 任命和云 DR 架构证据。
            calloutType: risk
            claimRefs:
              - CR001
              - CR013
              - CR023
          - type: callout
            title: 零债务资产负债表缓冲监管与法律风险
            body: >
              Meesho 零外部债务，FY2025 FCF 为 Rs 591–1032 crore，意味着公司可吸收显著合规投入和监管罚款，而不伤及运营。Rs 250 crore 的 DPDPA
              罚款（法定上限）按当前现金生成率计算，低于单年 FCF 的 30%。相较亏损企业，这一财务缓冲显著降低了监管情景的风险。
            calloutType: strength
            claimRefs:
              - CR038
              - CR036
          - type: callout
            title: 交割前尽调：要求 DPO、多云计划和诉讼清单
            body: >
              投资者应要求：（1）确认 DPDPA 数据保护官（DPO）任命及同意管理架构；（2）提供多云或主动灾难恢复架构路线图，并承诺时间表；（3）提供完整诉讼清单，涵盖 DRHP 未披露的所有
              IP、消费者法院和监管程序；（4）披露 IPO 后独立董事构成及董事会委员会章程。
            calloutType: recommendation
            claimRefs:
              - CR002
