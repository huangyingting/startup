  - id: TV004
    title: 可比估值表
    columns:
      - 可比公司
      - 市值 / 最新估值
      - EV/NTM 收入
      - 与 Meesho 的相关性
      - 局限
    rows:
      - - Nykaa / FSN E-Commerce（NSE 上市）
        - ~Rs 44,000 crore（~$5.2B）
        - ~4.5x NTM 收入
        - 印度上市消费者交易平台；证明公开市场愿意买印度数字商业资产
        - 高端美妆赛道；毛利率更高；买家画像不同于 Meesho 的性价比客群
      - - IndiaMART Intermesh（BSE 上市）
        - ~Rs 18,000 crore（~$2.1B）
        - ~8x NTM 收入
        - 盈利的印度 B2B 数字交易平台；证明印度市场愿意给盈利平台支付溢价
        - B2B 模式，单位经济差异很大；规模远小于 Meesho
      - - PDD Holdings / Pinduoduo（Nasdaq）
        - ~$120 billion
        - ~4x NTM 收入
        - 中国低 AOV 社交电商；最接近 Meesho 性价比社交电商模式的全球类比
        - 中国市场动态、监管环境和规模差异很大；PDD 盈利能力强得多
      - - Sea Limited / Shopee（NYSE）
        - ~$25 billion
        - ~2.5-3x NTM 收入
        - 具备社交分发和物流的新兴市场电商；比纯西方可比公司更接近 Meesho
        - 东南亚物流基础设施和人口结构不同于印度；Shopee 比 Meesho 更赚钱
      - - CartTrade Technologies（NSE 上市）
        - ~Rs 2,400 crore
        - ~3x NTM 收入
        - 印度上市在线交易平台；显示公开市场如何给低盈利印度交易平台定价
        - 汽车 / 二手车领域；相对 Meesho 规模小；GMV 可比性有限
      - - Flipkart（未上市，Walmart 持有）
        - ~$35 billion（上一轮）
        - 未公开披露
        - 印度电商直接竞争对手；主导 Tier-1 城市电子和时尚品类
        - 未上市公司；没有经审计财务；二级市场估值不能直接比较
    notes: >
      市值和 EV/收入倍数来自 StockAnalysis、Groww、Moneycontrol 及截至 2026 年 5 月的公开报道。PDD 和 Sea 倍数是分析师一致预期。Flipkart 估值来自 Walmart
      披露和二手来源。
    enumerationScope:
      coverage: partial
      basis: >
        Comparable set covers all publicly listed Indian digital marketplaces and closest global social-commerce peers
        identified through StockAnalysis, Moneycontrol, and Groww databases as of May 2026; private-company comparables
        (Flipkart, Reliance JioMart) included where valuation data is publicly available.
    claimRefs:
      - CV013
      - CV014
      - CV015
      - CV016
      - CV017
      - CV018
  - id: TV005
    title: 投资逻辑破裂与行动触发表
    columns:
      - 风险触发点
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - DPDPA 执法罚款
        - 首笔超过 Rs 250 crore 的 DPA 罚款，或数据处理限制令
        - 将 EBITDA 推入负值区间；制造监管不确定性并压缩估值倍数
        - 下调至持有；3 个月内重新评估
      - - 监管重新归类为库存平台
        - 任何将 Meesho 模式重新归类的 MeitY 或 MoCI 指令，或有约束力的法院命令
        - 取消中介安全港；改变产品责任、GST 和 FDI 风险敞口
        - 立即卖出；投资逻辑根本破裂
      - - 盈利反转
        - IPO 后集团层面 EBITDA 连续两个季度为负
        - 证明 FY2025 Q4 FCF 为正不是结构性改善；估值倍数扩张难以成立
        - 下调至卖出；30 天内退出
      - - 竞争性 GMV 补贴战
        - Meesho NPS 连续两个季度低于 35，或全平台 RTS 率高于 30%
        - 表明买卖双方网络优势流失；价值主张被竞争压力侵蚀
        - 仓位降至 50%；6 个月后重评
      - - IPO 后治理失灵
        - 上市后 12 个月内未任命多数独立董事
        - 存在 SEBI LODR 执法风险；也暴露治理不成熟，难以支撑溢价倍数
        - 通过股东信接触董事会；若一个季度内未解决，则升级为卖出
    notes: |
      行动触发点是分析师定义的投资者监控阈值。它们代表投资逻辑显著走弱、必须主动做出组合决策的节点。阈值不来自 Meesho 管理层。
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
      - CV033
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 负责人 / 尽调路径
    rows:
      - - EBITDA 多季度确认
        - 经审计或审阅的 FY2025 Q4 和 FY2026 Q1 EBITDA / FCF 报表
        - 仅披露一个季度 FCF 为正；可持续性是估值打开的关键
        - 向 Meesho CFO / 财务顾问索取；对照经 SEBI 审阅的 DRHP 更新验证
      - - DPDPA 合规状态
        - DPO 任命证据、同意管理架构文件、CERT-In 数据泄露历史
        - DPDPA 执法是剩余严重度最高的监管风险；每次违规最高罚款 Rs 250 crore
        - 向 Meesho 法务 / 合规索取；在 MCA 记录中验证 DPO 身份
      - - 云灾备 / 多云架构
        - AWS 灾备架构方案、RTO/RPO 承诺、多云或双活路线图
        - AWS 单一云依赖是关键单点故障；未披露 DRP
        - 向 Meesho CTO 索取；审阅架构图和 SLA 承诺
      - - 诉讼清单
        - DRHP 未披露的 IP、消费者法院、监管和税务程序完整清单
        - DRHP 承认监管风险，但未披露重大诉讼；独立来源显示仍有进行中的程序
        - 向 Meesho 法律顾问索取；用 Indian Kanoon 和 NCLT 门户交叉核验
      - - IPO 后董事会构成
        - 具名独立董事、审计委员会章程、董事会委员会构成
        - SEBI LODR 要求上市后独立董事占多数；IPO 前未披露
        - 通过 MCA 董事会备案确认；审阅提名委员会章程
    notes: |
      尽调要求是机构投资者的交割前条件。若交割前无法提供这些证据，应考虑将建议下调至观察。
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV032
      - CV033
