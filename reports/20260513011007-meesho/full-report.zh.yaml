  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险图谱
        blocks:
          - type: paragraph
            body: >
              Meesho 处在印度快速演进的数字监管体系交汇处。Digital Personal Data Protection Act 2023（DPDPA）对每次违规最高可罚 Rs 250
              crore，要求任命数据保护官（DPO），并要求所有重要数据受托方建立同意管理框架；Meesho 拥有 199 million 年度交易用户，几乎肯定落入这一类别。另有 Consumer Protection
              (E-Commerce) Rules 2020 和 IT Act 2000 Intermediary Guidelines（2021），要求拥有 50M+
              用户的平台遵守投诉处理时限、内容审核义务和年度合规审计。GST 源头代扣税（TCS）按 1% 适用于所有市场交易；面对 1.2 million 税务合规成熟度不一的 MSME 卖家，整体 GST
              审计风险不低。品牌商品权利人发起的知识产权和假货诉讼，是这种规模开放市场的持续法律敞口。Meesho DRHP 承认监管风险，但未披露重大未决诉讼；独立报道显示，消费者论坛投诉和部分 IP 程序仍在推进。
