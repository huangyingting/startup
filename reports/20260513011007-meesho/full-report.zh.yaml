      - number: '5.3'
        title: 技术架构
        blocks:
          - type: paragraph
            body: >
              Meesho 核心后端是一套多语言微服务系统。Java 和 Kotlin 服务承载高吞吐订单、商品目录和用户域；Python 负责 ML 推理和数据管道。Amazon Web
              Services（AWS）是主云，托管计算（EC2/EKS）、存储（S3）和托管服务。Apache Kafka 每日接入来自买家会话、卖家动作和 Valmo 配送更新的数十亿事件；Apache Spark 和
              Flink 以批处理和近实时方式处理这些数据，用于分析和模型训练。Elasticsearch 支撑 500 million+ SKU 的商品目录搜索和相关性打分。MySQL 和 PostgreSQL
              是主要关系型存储，Redis 为高频读取提供缓存。BuiltWith 报告显示，网页前端使用 Cloudflare、Amazon CloudFront 和
              Nginx，交付低延迟商品目录页面。计划中的混合云迁移（FY2026–FY2028，由 ₹1,390 crore IPO 募资支持）将以私有数据中心基础设施补充 AWS 容量，承载对延迟敏感和合规驱动的工作负载。
            claimRefs: []
