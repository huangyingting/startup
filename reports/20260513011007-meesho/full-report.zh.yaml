      - number: '7.3'
        title: 合作方与依赖风险
        blocks:
          - type: paragraph
            body: >
              Meesho 的平台架构把依赖集中在少数关键交易对手。AWS India 是所有计算、存储和 ML 工作负载的唯一云供应商；公司未公开披露多云迁移计划，也未披露在第二云供应商上的主动灾难恢复架构。Meta 的
              WhatsApp 平台支撑分销者分发渠道，WhatsApp 商业消息 API 的定价或政策若有变化，将直接冲击推动早期增长的商品目录分享模式。Razorpay 和 NPCI/UPI
              通道处理收款；高流量事件中，UPI 服务大规模中断会直接导致结账失败和 GMV 损失。供给侧集中度低，单一卖家均不超过 GMV 的 0.5%；但时尚品类贡献超过 50% 订单，形成品类层面敞口。Valmo
              物流角色上升，也把运营执行集中到一个新的、未经充分验证的子公司。
            claimRefs:
              - CR023
