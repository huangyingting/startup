      - number: '1.4'
        title: 运营规模与关键指标
        blocks:
          - type: paragraph
            body: >
              FY2024（2023 年 4 月至 2024 年 3 月），Meesho 披露经营收入 ₹7,615 crore，较 FY2023 的 ₹5,735 crore 同比增长 33%。剔除 ESOP
              后净亏损从上一年的 ₹1,569 crore 下降 97% 至 ₹53 crore；公司实现经营现金流转正，金额 ₹232 crore，成为印度首家做到这一点的横向电商平台。自由现金流达到 ₹197 crore。


              FY2024，平台完成 843 million 笔订单，同比增长 36%。年度交易用户（ATU）到 2024 年 3 月达到 145 million，截至 2024 年 12 月 31 日增至 187
              million。仅 2024 年 4–12 月，Meesho 就录得 1.3 billion 笔订单——相当于 FY2024 全年订单量——显示出明显加速。约 50% 用户来自 Tier 4+ 城镇。根据
              CLSA 2025 年 3 月研究笔记，Meesho 的 GMV 年化规模为 $6.2 billion，CY2024 在印度电商订单量中的份额为 37%；但 GMV 份额约 8.5%，反映其产品结构 ASP
              较低。


              FY2023 对比基线展示了 Meesho 的减亏路径：FY2022 净亏损 ₹3,251 crore；FY2023 净亏损 ₹1,675 crore；FY2024 剔除 ESOP 后亏损 ₹53
              crore。公司披露的北极星指标是长期每股自由现金流，说明进入 IPO 后阶段后，资本效率仍是核心重点。
