      - number: '3.5'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Meesho 的竞争护城河真实存在，但部分可以复制。最强护城河是 1.3M+ 非正式 MSME 卖家网络，他们无法在 Amazon 或 Flipkart 注册；这批供给有粘性，因为 Meesho
              往往是他们能使用的唯一全国性平台。叠加 187M 年度交易用户，且绝大多数来自 Tier 2–5 城市，这个双边网络具备规模，新进入者需要多年才能复制。零佣金模式是战略选择，不是能力护城河——如果
              Flipkart 愿意承受收入影响，明天就能推出零佣金价值市场。真正的锁定来自 Meesho 已经形成的卖家目录、买家熟悉度和价格基准。

              ONDC 是最重要的结构性风险。通过创建一个交易费约 1% 的开放协议，ONDC 拿掉了 Meesho 依赖的平台排他性。如果某个买方应用 凭更好的 UX 或 WhatsApp 原生结账体验，通过 ONDC 触达
              Meesho 的供应商基础，Meesho 买方侧护城河就会被侵蚀。行业估计到 2029 年 ONDC 月订单量将达到 15 crore，约占印度总订单量的 10–12%；这是一个有意义的份额，会直接竞争
              Meesho 当前交易基础。Meesho 作为买方应用加入 ONDC，已经部分缓释风险；但如果卖家在多个 ONDC 兼容应用上同时经营，平台卖家锁定会变弱。

              Flipkart Shopsy 是近期竞争风险，因为它能利用 Flipkart 既有卖家关系和 Ekart 物流，同时提供类似 Meesho 的低价。退货率风险属于运营层面：Meesho 无品牌 SKU
              15–25%+ 的退货率会产生逆向物流成本，压低卖家经济性，也限制 Meesho 上探高端市场的能力。Amazon 广告收入优势持续扩大（FY2025 为 ₹8,342 crore），而 Meesho
              广告栈仍处早期，这意味着在有争议的品类中，Amazon 可以补贴更低价格。Meesho 的主要缓释路径，是卖家服务变现（物流、金融科技、营运资金）、品牌建设工具，以及扩展到更高
              AOV、能支撑更好卖家经济性的品类。
