        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Meesho 投资逻辑建立在五个相互连接的支柱上：（1）印度 Tier 2 和 Tier 3 城市的高性价比电商市场结构性庞大且服务不足；（2）1.2 million MSME 卖家和 199 million
              年度交易用户在零佣金模式上形成网络效应，复制难度高；（3）经营杠杆已被验证——FY2024 收入增长 33%，亏损大幅收窄；（4）IPO 定价为 1.4–1.5x NTM
              收入，较所有印度及新兴市场可比上市平台有大幅折价；（5）零债务资产负债表和 Rs 591–1032 crore FCF 缓冲，提供合规投入韧性。反向逻辑集中在三处脆弱点：Meesho 仅有一个季度实现正
              FCF，尚未证明多年持续盈利；DPDPA 与单一云运营风险仍未解决；SoftBank 和 Sequoia（合计持有 IPO 前约 45% 股权）IPO 后锁定期届满，可能在上市后最初 180 天带来系统性抛压。
