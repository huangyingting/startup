      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >
              Meesho 由 Vidit Aatrey 和 Sanjeev Barnwal 于 2015 年共同创立，两人都是 Indian Institute of Technology（IIT）Delhi 2012
              届校友。创立 Meesho 之前，Vidit 曾短暂任职于 ITC Limited，Sanjeev 任职于 Sony Mobile。两人在 IIT Delhi 相识；Meesho
              的想法来自他们观察到的小商户：这些人没有正式支持基础设施，却已经在 WhatsApp 和 Facebook 上非正式销售商品。


              Vidit Aatrey 担任董事长、董事总经理兼首席执行官；Sanjeev Barnwal 担任全职董事兼首席技术官。Dhiresh Bansal 负责财务，任首席财务官；Prasanna
              Arunachalam 任首席产品官；Debdoot Mukherjee 任首席数据科学家；Ashish Kumar Singh 任首席人力资源官；Rahul Bhardwaj 任公司秘书兼合规官。


              董事会包括多名独立董事：Rohit Bhagat（独立董事、审计委员会主席）、Hari Shanker Bhartia、Surojit Chatterjee 和 Kimsuka
              Narasimhan。非执行非独立董事包括 Mukul Arora 和 Mohit Bhatnagar（代表机构投资者）。Vidit Aatrey 兼具创始人 CEO
              和公司使命公众代言人双重角色，因此构成关键人依赖；领导层稳定性仍是投资者需要持续跟踪的事项。IPO 时，Meesho 约有 2,082 名直接雇员。
