            body: >
              印度拥有 850 million 互联网用户，但年度线上购物者只有 270 million，电商转化率在大型数字经济体中处于最低梯队。580 million
              不购物的互联网人口，是全球最大的结构性未开发电商机会。Meesho 聚焦 Tier 2/3，采用零费用模式和本地语言 UX，使其有望成为许多首次线上购物者的第一站。
