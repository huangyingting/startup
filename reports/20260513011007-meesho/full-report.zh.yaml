      - number: '4.2'
        title: 单位经济与运营效率
        blocks:
          - type: paragraph
            body: >
              FY2023–FY2025 期间，Meesho 单均经济性显著改善，由三项因素共同推动：Valmo 拉低物流成本、单均获客成本下降，以及订单量扩大后固定成本产生经营杠杆。


              Valmo 是 Meesho 2023 年成立的内部物流子公司；FY2023 处理订单不到 2%，FY2024 约 50%，到 FY2026 Q1 约 62%。随着 Valmo 承接 Meesho
              更大比例的发货量，混合单均履约成本从 ₹50.45（FY2023）降至约 ₹43（FY2024），再降至 ₹37.70（FY2026 Q1）。仅这一路径就带来约每单 ₹23 的改善，按 FY2025
              订单年化规模计算，相当于每年节省约 ₹4,200 crore 成本。


              同期，单个已送达订单的广告支出从 ₹13.6（FY2023）压缩到 ₹4.9（FY2025），反映出从付费获客转向有机再激活的结构性变化——Meesho 在 DRHP 中引用的基于调查的留存数据表明，超过 50%
              新买家的主要获客渠道是口碑。总营销费用从 ₹928 crore（FY2023）降至 ₹459 crore（FY2024），随后在 IPO 前按计划升至 ₹644 crore（FY2025）。


              贡献利润率（收入减去物流和营销等可变成本）从 FY2023 净商品价值的 2.9% 提高到 FY2025 的 4.9%，对应贡献利润从 ₹566 crore 增至 ₹1,484 crore。调整后 EBITDA
              亏损剔除了 ESOP 和一次性项目，从 ₹1,694 crore（FY2023）收窄至 ₹230.2 crore（FY2024），再到 ₹219.6 crore（FY2025），相当于收入利润率 −2.3%。通往
              EBITDA 盈亏平衡的路径，需要广告收入组合提升至 20% 以上，或 Valmo 进一步把物流成本降低每单 ₹5–8，或者两者同时发生。


              一个结构性压力是货到付款（COD）：FY2025 约 76% 订单为 COD，退货发生时会产生逆向物流成本，还要求 Meesho 在物流代理网络中进行现金对账。COD 订单退货率明显高于预付订单，估计为
              30–35%，推高了每个净送达订单的可变成本。
