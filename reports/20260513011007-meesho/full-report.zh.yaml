            title: 即时零售威胁 Meesho 低 AOV 美妆和配饰品类
            body: >
              即时零售（Blinkit、Zepto、Swiggy Instamart）如今约占印度电商 GMV 的 10%，并以 40%+ CAGR 增长。它与 Meesho 美妆（订单份额
              15-17%）和配饰品类的重叠度不低。当 10 分钟配送在一线和 Tier 1 城市成为消费者预期，Meesho 的 2-5 天配送窗口在冲动型、时间敏感购买上就处于结构性劣势——即便价格更低。
