      - number: '2.4'
        title: 增长驱动因素与市场约束
        blocks:
          - type: paragraph
            body: >
              印度价值电商最大的结构性驱动因素，是 UPI 引领的数字支付革命。2026 年，UPI 每月处理约 18.4 billion 笔交易，占印度全部电商支付的 60–65%。货到付款（COD）曾在 2020
              年占电商交易约 55%，如今全国占比降至 25–30%；但在 Meesho 的 Tier 3/4 买家群中仍高于 40%，说明其核心地区的结构性迁移仍在进行。Jio 效应——Reliance 自 2016
              年以来颠覆性地把移动数据价格压到约 ₹1-2/GB——把互联网接入扩大到超过 1 billion 用户，并使印度到 2026 年拥有 660 million 智能手机用户。电商交易中 78–82%
              发生在移动端，这直接支撑了 Meesho 的应用优先模式。


              政策提供了三股额外顺风。第一，Open Network for Digital Commerce（ONDC）在 2022–2023 年推出，并在 2025 年持续扩张；它允许任何买家应用服务任何卖家应用，从而降低
              SMB 卖家入驻摩擦，民主化卖家接入。第二，National Logistics Policy 目标是到 2030 年把印度物流成本从 GDP 的 13–14% 降至 8%，这会结构性改善 Meesho
              等平台的末端配送单位经济。第三，Digital India 计划继续把数字基础设施延伸到农村地区。


              主要约束来自物流和行为。印度超过 500,000 个邮政编码上的末端配送仍然复杂且昂贵，在 Tier 4 和农村地区尤其如此，而这些地区正是 Meesho 的 Valmo
              物流市场仍在扩张的地方。无品牌产品的时尚退货率为 15–25%，直接侵蚀利润；相比尺码更标准化的精选高端平台，Meesho 的结构性退货率更高。即时零售已占电商 GMV 的 10%，并以 40%+ CAGR
              增长，在美妆、配饰和 FMCG 中形成邻近竞争威胁。印度 FDI 规则仍在演进，《Digital Personal Data Protection Act
              2023》和电商消费者保护规则草案带来监管不确定性，抬高合规成本和运营风险。最后，截至 2025 年，约 400 million 印度人仍离线或连接不足；这是长尾机会，但需要多年数字素养投入，超出 Meesho
              当前运营边界。
