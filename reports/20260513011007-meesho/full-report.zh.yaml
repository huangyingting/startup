companyProfile:
  summary: >
    Meesho 由 IIT-Delhi 校友 Vidit Aatrey（CEO）和 Sanjeev Barnwal（CTO）于 2015 年在印度 Bengaluru 创立。公司最初是 WhatsApp
    上的社交转售平台，后来演进为印度最大的价值电商市场，面向 Tier 2 和 Tier 3 城市价格敏感型买家，销售单件价格低于 Rs 400 的无品牌和自有品牌时尚、家居及生活方式商品。Meesho
    率先采用零佣金模式——卖家不付上架费，也不按 GMV 交佣金——并用广告和物流收入替代这部分收入。公司累计从 SoftBank、Meta、Fidelity 和 B Capital 等投资方融资约 $1.7 billion，2021
    年私募估值峰值达到 $4.9 billion，并于 2025 年提交 DRHP，拟进行 Rs 5,421 crore 的 IPO。Meesho 在 FY2025 Q4
    实现自由现金流转正，成为首家做到这一点的印度电商公司，也验证了其资本效率导向的运营模式。
