      - number: '2.3'
        title: 买家与用户细分
        blocks:
          - type: paragraph
            body: >
              FY2024 印度年度线上购物者约 270 million，预计 FY2025 达到 342 million，FY2030 达到 500–700 million（Bain/GrabOn）。尽管印度互联网用户超过
              850 million，只有 20–25% 会在线购物；这一比例远低于中国（50%+）和美国（75%+），意味着 637–680 million 名不上网购物的用户构成结构性未开发需求。McKinsey 预计，到
              FY2030，电商在零售中的份额将翻倍至约 15%，这需要把现有但尚不购物的互联网用户中的 170–213 million 人转化为新购物者。


              Meesho 的买家画像非常鲜明：非一线、价格敏感。在 187 million 活跃交易用户中，超过 85–90% 来自 Tier 2 和 Tier 3 城市；典型 Meesho 买家为女性，18–40
              岁，家庭月收入低于 ₹40,000–₹50,000。Meesho 官方研究文件《Smart Shopper Report H1
              2024》把这些用户描述为「精明购物者」：她们对价格极度敏感，经常使用组合优惠，复购行为强（年度复购率 >60%）。平均重度用户每年约购买 10 次，说明在低客单价下仍有高频需求。


              Meesho GMV 的品类分布由女性时尚（订单份额 21–31%，AOV ₹300–350）、家居和厨房产品（23–25%，AOV ₹250–300）、美妆 / 个护（15–17%，AOV
              ₹180–220）领跑。多数高频购买集中在单件 ₹99 至 ₹399 之间。这种价格集中既带来战略清晰度——Meesho 拿下了 ₹400 以下细分——也带来变现天花板，因为极高的价格弹性意味着，价格上调 10%
              可能压缩 14–33% 的订单量。


              卖家供给端与买家地理分布相互映射：2021 年以来，印度电商平台 60% 的新卖家来自 Tier 2 或更小城市。Meesho 的零佣金模式吸引了印度平台中数量最多的微型 SMB 卖家，拥有超过 1.3
              million 个活跃店面，配送覆盖约 500,000 个邮政编码。
