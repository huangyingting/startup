              混合云迁移），让公司在规模化后更能控制延迟、数据驻留和单笔交易成本。₹480 crore 用于 AI/ML 与工程人才获取。工程博客和新闻报道显示，公司正推进 GenAI 买家搜索、商品目录质量自动化和
              Valmo 预测物流。Meesho 于 FY2023 通过 Valmo 将物流自营，完成关键运营转向；相较第三方承运商，单票成本降低超过 25%。公司未公开产品变更日志或版本发布节奏。Naukri
