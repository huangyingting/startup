      - number: '4.4'
        title: 财务展望与估算
        blocks:
          - type: paragraph
            body: >
              CLSA 2025 年 4 月研究报告（IPO 前覆盖 Meesho）预计 GMV 到 FY2031 将以 26% CAGR 增长，Meesho 在 FY2025 的 GMV 运行率达到 $6.2
              billion，基准情景下 FY2031 可能超过 $20 billion。CLSA 的乐观情景假设：若广告变现率扩张和 Valmo 成本持续压缩按计划兑现，EBITDA 可在 FY2027
              达到盈亏平衡。共识分析师估计 FY2026 收入轨迹为 ₹11,000–₹13,000 crore；增速 17–38%，取决于 GMV 加速和广告货币化假设。


              FY2025 自由现金流为 ₹591 crore（部分来源因营运资本调整方法不同，引用 ₹1,032 crore），连续第二年 FCF 转正，也为计划中的 ₹1,390 crore
              云基础设施投入提供结构性缓冲。叠加 FY2026–FY2028 将 IPO 募资投入资本开支，按当前披露的增长轨迹，Meesho 大概率不需要额外股权融资。零债务政策消除了利息成本对利润率的拖累，让 EBITDA
              盈利路径更干净。


              分析师估算的主要上行风险包括：Valmo 订单份额扩张快于预期（当前 62%，潜在上限 80–85%）、广告收入货币化超出当前预测、以及向更高 AOV 品类扩张（电子产品、家具），从而提高每 1 rupee
              GMV 的收入收益率。下行风险包括：COD 占比长期偏高，阻碍退货率改善；物流费结构受到监管定价审查；以及 Tier 2–4 城市可选消费宏观环境恶化。
