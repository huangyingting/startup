  - id: FP001
    title: 竞争定位图
    type: quadrant
    layout: wide
    summary: >
      六家主要印度电商平台按两条轴定位：X = 平均订单价值（低 → 高，1–10 序数评分），Y = 卖家基础广度（非正规 MSME 触达，低 → 高，1–10 序数评分）。Meesho
      位于左上象限：平均订单价值最低，非正规卖家触达最广。Amazon 位于右下：平均订单价值最高，非正规卖家可进入性最低。Flipkart 在中右区域。JioMart 位于中左（低 AOV 杂货，卖家广度中等）。Myntra 和
      AJIO 位于右下（高端时尚）。Shopsy 紧邻 Meesho，同在左上。
    approximationNotes: >
      X 轴序数分来自已披露 GMV 与订单量：Meesho AOV 约 ₹300–400（得分 1），JioMart 杂货 AOV 约 ₹400–600（得分 2），Flipkart AOV 约 ₹800–1200（得分
      5），Amazon AOV 约 ₹1200+（得分 8），Myntra AOV 约 ₹1000–1500（得分 7），AJIO AOV 约 ₹1200+（得分 8）。Y 轴分数来自 GST
