      - number: '2.2'
        title: TAM/SAM/SOM 规模与分析师估算
        blocks:
          - type: paragraph
            body: >
              多家机构从不同方法论切入，给出了印度电商机会的规模估算；区间很宽，但逻辑基本一致。Bain 2025 版《How India Shops Online》基于 6,000 多名购物者调查和平台数据三角校验，估算
              FY2024 印度电商 GMV 为 $60 billion，并将以 18–20% CAGR 增长，到 FY2030 达到 $170–190 billion。与政府相关的 India Brand Equity
              Foundation（IBEF）采用更宽口径，纳入 B2B，估算印度整体电商到 2026 年为 $163 billion，到 2030 年在 20–21% CAGR 下达到 $350 billion。Mordor
              Intelligence 聚焦社交电商——包括转售者主导和社交发现交易的细分市场——估算 2025 年规模为 $29.3 billion，到 2030 年以 37.5% 的极高 CAGR 增至 $143.9
              billion。


              Meesho 自己提交 SEBI 的行业报告由 Redseer 撰写，将印度总零售规模测算为 ₹83 lakh crore，并预测电商到 FY2030 将达到 ₹15–18 lakh crore（$174–214
              billion），价值零售细分在线上和线下渠道合计代表 ₹33 lakh crore 的机会。阅读这份委托报告时需要谨慎：它是一手资料，但带有利益立场，提交目的在于支撑 IPO 估值叙事，增长假设可能反映了对
              Meesho 可触达扩张的乐观判断。


              放在这些市场估算之下，CLSA 2025 年 4 月首评报告把 Meesho 当前已获得可服务市场（SOM）定为 FY2025 年化 GMV $6.2 billion，占印度电商总 GMV 的 8.5%、订单量的
              37%；后一个比例体现了 Meesho 作为高订单量、低 AOV 市场领导者的结构位置，而不是高 GMV 领导者。CLSA 预计 Meesho 的 GMV 到 FY2031 将以 26% CAGR 增至约 $24
              billion。也有反证：印度电商增速从 2022 年前超过 20% 的水平，放缓到 FY2024 约 10–12%，说明此前偏多的预测需要下修。


              Bain 与 Redseer 分别给出的 FY2030 $170–214B 区间意味着，即便 Meesho 按 26% CAGR 增长，到 FY2031 在基准假设下也只占总市场 GMV 的
              10–14%；这反映出一个结构性挑战：在 Flipkart 和 Amazon India 同样拥有巨额资本与网络优势的市场中，扩大份额并不容易。
