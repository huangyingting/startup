        - 相对同行 2.5-5x，1.4-1.5x NTM 收入算便宜；持续盈利尚未验证，监管风险也在，折价合理
        - 若确认 EBITDA 连续 2 个以上季度为正，可在 IPO 买入；低于 Rs 95/股则强力买入；若 DPDPA 执法落地或盈利反转，则减仓
    notes: |
      建议对价格和证据敏感。IPO 中点 Rs 108/股对应约 Rs 14,500 crore 市值。建议基于 2026 年 5 月证据。
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 维度
      - 投资逻辑论据
      - 反向逻辑反驳
    rows:
      - - 市场机会
        - 印度 Bharat 电商的 TAM 超过 $80B，CAGR 为 20-26%；Tier-2/3 渗透率仍低
        - GMV 增长依赖非正式 MSME 卖家；经济冲击和零工劳动监管都会打到他们
      - - 平台验证
        - 199M 年交易用户；2025 财年 4–12 月订单增长 34%；2025 财年 Q4 FCF 为正
        - 盈利只跑通了一个季度；FCF 能否跨多个经济周期持续为正，尚未证明
      - - 竞争护城河
        - 低 AOV 场景下，零佣金模式和 MSME 卖家网络效应结构性难复制
        - Amazon India 和 Flipkart 的资本资源是 10-50 倍，可能补贴低 AOV 品类夺回份额
      - - 估值
        - 1.4-1.5x NTM 收入较印度同行折价 60-70%，较新兴市场电商同行折价 40-50%
        - 盈利未被验证，折价合理；IPO 后若利润率不及预期，估值倍数可能压缩
      - - 监管 / 合规
        - 零负债资产负债表让公司有余力吸收 DPDPA 罚款和合规投入
        - DPDPA 执法、IT Act 重新归类和 IP 诉讼都是未解决的重大风险，缓释措施尚未充分披露
      - - IPO 后动态
        - IPO 新股募集 Rs 4,250 crore，用于技术、物流和品牌投入
        - SoftBank 和 Sequoia 解禁形成技术性抛压；灰市需求可能反映散户热度，而非机构确信
    notes: |
      论据是分析师基于 SEBI DRHP、CLSA 报告和截至 2026 年 5 月的独立新闻所作评估。本表不来自 Meesho 管理层。
