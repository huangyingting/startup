            body: >
              Meesho IPO 时 1.4–1.5x NTM 收入较印度上市市场平台同业（Nykaa 4.5x、IndiaMART 8x）折价 60–70%，较最近全球可比公司（PDD 4x、Sea Limited
              2.5–3x）折价 40–50%。虽然多季度盈利尚未被验证，折价有部分合理性；但只要公司证明连续两个季度 EBITDA 为正，上行空间仍然显著。1.1x NTM 收入的悲观情景意味着市值仅 Rs 9,350
              crore，较 IPO 下行 35%；对一家零债务且有 Rs 591–1032 crore FCF 缓冲的平台来说，这一下行可控。
