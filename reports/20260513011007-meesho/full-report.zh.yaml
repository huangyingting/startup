            body: >
              在 Rs 105–111/股 IPO 价格区间给出有条件买入，前提是 EBITDA 至少再有一个季度确认转正，且交割前披露 DPDPA DPO 任命。强烈买入阈值为 Rs 95/股或以下，此时悲观情景下行收窄至
