  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入架构与商业模式
        blocks:
          - type: paragraph
            body: >
              Meesho 运营一个零佣金市场：卖家可以免费上架和交易。收入主要来自两套机制——向选择接入 Valmo 履约网络的卖家收取物流履约费，以及针对赞助位置收取平台广告费（CPC 和
              CPM）。第三条收入流仍处早期，即增值服务，包括卖家分析工具和信贷撮合合作；截至 FY2025，它贡献的收入不到总收入 3%。披露期内，金融服务交叉销售收入仍可忽略不计。


              物流费按单计费，并按重量和距离分档。向卖家收取的总费用约为每单 ₹82–85（混合口径，含末端附加费）；对应地，Meesho 承担向 Valmo 和第三方物流商支付的实际履约成本。随着 Valmo
              成本基础改善，FY2024 单均净物流利润转正。广告通过整合进 Meesho 卖家仪表盘的自助竞价平台销售；卖家数量超过 1.6 million
              后，广告库存深度增加，活跃卖家平均花费上升。广告利润率结构上优于物流费，因为增量收入几乎不带来配送成本。


              经营收入 FY2024 增长 33% 至 ₹7,615.1 crore，FY2025 又增长 23% 至 ₹9,389.9 crore，明显低于约 36% 的订单量增速。这意味着单均净收入只是温和提升——从
              FY2024 约 ₹43 增至 FY2025 约 ₹51——主要来自单均广告变现改善。管理层预计广告收入占比将从约 17% 提高到 FY2027 的 20% 以上，即便物流平台抽成率稳定，也能支撑整体利润率抬升。
            claimRefs:
