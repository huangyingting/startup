      - number: '6.5'
        title: 扩张与集中风险
        blocks:
          - type: paragraph
            body: >
              Meesho 的买家集中风险结构上较低：在消费者市场模式下，没有单一买家贡献超过 GMV 的 1%。卖家集中风险也有限——根据 SEBI DRHP 披露，没有单一卖家贡献超过 GMV 的
              0.5%。不过，时尚与服饰品类集中（估计占 GMV 50–55%）使公司暴露于季节性需求周期。失败的生鲜杂货垂直业务（Meesho Superstore，2023 年 3
              月关闭）显示，向需要供应链投入或同日达能力、超出 Meesho 能力圈的市场扩张存在风险。扩张上行空间包括更高 AOV 品类（电子配件、美妆、运动）吸引 Tier 1–2 城市买家，以及潜在
              B2B/企业卖家工具；两者均未宣布。平台锁定效应中等：卖家切换成本低（竞争平台零佣金），买家没有合同义务。社交分销飞轮——买家同时成为获客渠道——提供了结构性差异化的留存机制，竞争对手不易复制。
