      - number: '7.4'
        title: 人员、执行与竞争风险
        blocks:
          - type: paragraph
            body: >
              Vidit Aatrey 和 Sanjeev Barnwal 自 2015 年创立 Meesho 起一直联合创办并领导公司；公司未披露具名继任者，形成创始人主导企业进入公开市场时常见的关键人依赖风险。IPO 后
              SEBI Listing Regulations 将要求独立董事占多数；若不能满足 LODR 合规，可能引发执法行动。在 Bengaluru 这个与 FAANG
              竞争的人才市场，工程人才流失风险真实存在。Meesho 正从分销者驱动模式转向直接面向消费者的开放市场，在没有社交电商飞轮的情况下，买家获取和留存存在执行风险。2023 年 Meesho Superstore
              关闭显示公司愿意退出失败垂直业务，但也凸显品类资源错配风险。IPO 后 SoftBank、Sequoia 和其他主要 IPO 前投资者锁定期届满，可能放大早期交易价格波动。
            claimRefs:
              - CR029
              - CR030
