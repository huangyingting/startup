        title: 图表
        blocks:
          - type: callout
            title: 零佣金 + 免 GST 护城河在结构上难以复制
            body: >
              Meesho 把零佣金与免 GST 卖家入驻结合起来，形成独特的供给侧护城河。Amazon 和 Flipkart 若不牺牲核心佣金收入流，就无法匹配零佣金（两者 FY2025 广告 / 变现收入分别为
              ₹8,342 crore 和 ₹6,317 crore）。即便资本更充足的竞争对手继续投资 Tier 2+ 扩张，这种结构性不对称仍支撑 Meesho 对 MSME 卖家的锁定。
