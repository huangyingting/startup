  evidenceGaps:
    - id: GI001
      description: >
        Advertising revenue as a standalone percentage of total revenue is not separately disclosed
        in Meesho's SEBI RHP; it is aggregated under a consolidated service revenue line item.
        Analyst estimates place advertising at 17–20% of total revenue in FY2025 but this cannot
        be independently verified from public filings.
      impact: >
        Cannot independently verify advertising margin contribution, constraining assessment of
        Meesho's long-run margin trajectory; advertising segment is the key determinant of whether
        EBITDA breakeven is achievable by FY2027.
      relatedQuestionRefs: [QI006, QI028]

    - id: GI002
      description: >
        Valmo's standalone P&L is not published separately; results are consolidated into Meesho
        group accounts. Per-order logistics cost data is inferred from DRHP disclosures and
        management commentary rather than from an audited Valmo standalone filing.
      impact: >
        Hidden logistics unit economics limit precision in assessing whether Valmo's cost advantage
        over third-party logistics is sustainable at full scale (80–85% order share) and whether
        the fulfilment gross margin will remain positive.
      relatedQuestionRefs: [QI010]

    - id: GI003
      description: >
        FY2026 quarterly financial data is not yet available; the company listed in December 2025
        and is subject to quarterly SEBI LODR reporting, but only partial operational metrics
        (Valmo order share ~62% in Q1 FY2026) have been cited in secondary sources as of this date.
      impact: >
        Forward projections for FY2026 revenue, EBITDA, and cash flow rely on analyst estimates
        rather than audited actuals; uncertainty is material for any investment thesis relying on
        near-term financial performance.
      relatedQuestionRefs: [QI023, QI024, QI025]

    - id: GI004
      description: >
        Category-level gross merchandise margin and return rates by product category are not
        publicly disclosed; the blended COD return rate (~30–35%) is an analyst estimate rather
        than a company-reported metric.
      impact: >
        Without category-level return-rate data, the true cost of COD exposure at scale cannot
        be precisely quantified; investors must rely on blended assumptions that may materially
        understate risk in high-return fashion categories.
      relatedQuestionRefs: [QI016, QI019]
