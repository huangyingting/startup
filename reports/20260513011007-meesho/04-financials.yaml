      Capital adequacy metrics as of FY2025 balance sheet (pre-IPO). Post-IPO net worth increases by
      approximately ₹4,250 crore from the fresh issue, improving the equity base substantially. The
      deferred-tax liability from the reverse-flip merger (~₹3,500+ crore) appears on the FY2025
      balance sheet but does not represent a cash obligation in the near term. Total liabilities
      therefore include this non-cash item. Meesho has no bond issuance, no term loans, and no
      revolving credit facilities disclosed in the RHP.
