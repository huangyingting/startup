  - id: TI005
    slug: public-financial-gaps-table
    title: Public Financial Gaps Table
    columns:
      - Data Gap
      - Last Available Disclosure
      - Reason Unknown
      - Impact on Analysis
    rows:
      - - Advertising revenue as % of total revenue
        - Not separately disclosed in RHP
        - Aggregated under "platform services revenue" line
        - Cannot independently verify ad margin mix; analyst estimates 17-20%
      - - Valmo subsidiary standalone P&L
        - Not published separately
        - Consolidated into Meesho group accounts with eliminations
        - Hidden logistics unit economics; Valmo cost data inferred from blended metrics
      - - FY2026 quarterly financial data
        - Q1 FY2026 metrics partially cited in DRHP (Valmo order share ~62%)
        - Post-listing quarterly reports pending under SEBI Listing Obligations
        - Forward projections are estimates only; no audited in-period data available
      - - Category-level gross merchandise margin
        - Not disclosed
        - Operational data considered commercially sensitive
        - Cannot quantify category-level monetisation risk; return-rate exposure by category unknown
    notes: >
      These gaps represent the principal limitations on financial analysis confidence. Post-IPO SEBI
      Listing Obligations and Disclosure Requirements (LODR) mandate quarterly financial statements,
      which will progressively close gaps in FY2026 data. Advertising revenue disclosure is expected
      to improve as Meesho is now a listed entity subject to segment reporting requirements if any
      segment meets the 10% revenue materiality threshold.
    claimRefs: [CI034, CI036, CI037, CI038]

