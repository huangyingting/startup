company:
  name: Meesho

chapter:
  number: 6
  title: "Customers"
  summary: >
    Meesho's customer base divides into two interdependent segments: ~199 million annual transacting
    buyers (FY2024, ATUs) — predominantly female, value-seeking consumers in Tier 3+ cities — and
    ~1.2 million active MSME sellers who list products at zero commission. Named seller success
    stories document 2-5x revenue uplift cases, and the social-reseller WhatsApp flywheel lowers
    buyer acquisition cost. However, key durability metrics — cohort retention rates, NRR, and
    seller churn — are not publicly disclosed. Adverse signals include a 15-25% return-to-sender
    rate in fashion categories straining seller working capital, the failed grocery vertical
    shutdown in 2023, and the absence of any B2B or enterprise customer base diversification.

sections:
  - id: customer-segmentation
    title: "Customer Base Segmentation"
    body: >
      Meesho's marketplace serves two primary customer groups. The buyer segment comprises
      approximately 199 million Annual Transacting Users (ATUs) in FY2024, with over 70% located
      in Tier 3 and smaller cities (population under 100,000). The demographic skews 55-60% female,
      age 18-35, low-to-middle income, and mobile-first. Value-for-money is the primary purchase
      motivation for approximately 68% of surveyed buyers. The seller segment comprises approximately
      1.2 million active MSMEs and individual entrepreneurs, primarily from textile-manufacturing
      hubs such as Surat, Ahmedabad, and Jaipur. Social resellers — individuals who distribute
      Meesho product links via WhatsApp with zero inventory investment — form a third segment
      monetised through commissions. Meesho has no disclosed B2B or enterprise buyer segment.
      Geographic concentration in Tier 3+ markets is simultaneously Meesho's strategic differentiation
      and its potential ceiling for average order value expansion.
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-trajectory
    title: "Adoption Trajectory and Scale"
    body: >
      Meesho grew ATUs from 151 million in FY2023 to 199 million in FY2024, a 32% increase.
      FY2025 estimates suggest approximately 230 million ATUs based on CLSA projections of
      26% GMV CAGR. Total orders reached 1.83 billion in FY2025, implying approximately
      9.2 orders per ATU per year — a signal of deepening purchase frequency. Registered users
      are estimated at 530+ million, of whom 37.5% transacted in FY2024. Meesho's seller base
      grew to 1.2 million active sellers in FY2025 from approximately 800,000 in FY2022.
      CLSA projects ATU growth to reach approximately 300 million by FY2027 at 13% CAGR.
      Customer acquisition is primarily driven by social-reseller networks and word-of-mouth,
      giving Meesho structurally lower acquisition costs than Flipkart or Amazon India.
      The app has been downloaded over 100-130 million times on Google Play Store based on
      official and third-party estimates.
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: named-customer-proof
    title: "Named Customer and Seller Proof"
    body: >
      Meesho's official blog and YourStory journalism provide named MSME seller case studies
      documenting 2-5x revenue growth after joining the platform. Sellers from Surat's textile
      cluster, Jaipur's handicraft belt, and Ahmedabad's fashion manufacturing ecosystem dominate
      published success stories. Women entrepreneurs and first-time e-commerce sellers are
      prominently featured, consistent with Meesho's stated mission to democratise internet
      commerce. The Meesho Smart Shopper Report H1 2024 (SlideShare) provides aggregated
      buyer data with named segment profiles. Named buyer testimonials are sparse relative to
      seller stories. A BrandEquity analysis describes the buyer profile in detail as
      "mobile-first, value-seeking housewives and first-time internet commerce buyers" from
      Tier 3+ India, with consumer insights from YourStory and Meesho's own reports confirming
      kitchen, fashion, and home décor as top purchase categories. Social resellers cite
      zero upfront cost as the primary adoption driver, with WhatsApp network leverage
      enabling 50-200 orders per month for active resellers.
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: retention-repeat-purchase
    title: "Retention and Repeat Purchase Patterns"
    body: >
      Meesho does not publicly disclose cohort retention rates, Net Revenue Retention (NRR),
      or annual seller churn — a significant due-diligence gap. Indirect signals suggest
      meaningful repeat engagement: order frequency of 9.2 per ATU per year (FY2024) is
      comparable to Amazon India's value segment, and CLSA's 26% GMV CAGR projection through
      FY2031 implicitly assumes durable buyer stickiness. Estimated second-year buyer retention
      is approximately 35-42% based on ATU trajectory modelling. Meesho's buyer app achieves
      a 4.7/5 rating on Google Play Store (buyer app), suggesting positive post-purchase
      experience. However, no third-party NPS or independent buyer satisfaction survey data
      is publicly available. Seller forum evidence suggests higher dropout among newly
      onboarded sellers who fail to generate sufficient orders in their first 90 days.
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: expansion-concentration-risks
    title: "Expansion and Concentration Risks"
    body: >
      Meesho's buyer concentration risk is structurally low: no single buyer accounts for
      more than 1% of GMV in a consumer marketplace model. Seller concentration risk is
      also limited — no seller contributes more than 0.5% of GMV per SEBI DRHP disclosures.
      However, category concentration in fashion and apparel (estimated 50-55% of GMV) creates
      exposure to seasonal demand cycles. Meesho's failed grocery vertical (Meesho Superstore,
      shut March 2023) demonstrates the risk of category expansion into markets requiring
      supply-chain investment or same-day delivery capabilities outside Meesho's competence.
      Expansion upside includes higher-AOV categories (electronics accessories, beauty, sports)
      attracting urban Tier 1-2 buyers, and potential B2B/enterprise seller tools — neither
      of which has been announced. Platform lock-in is moderate: seller switching costs are
      low (zero commission on competing platforms), and buyers face no contractual obligations.
      The social-reseller flywheel — whereby buyers become acquisition channels — provides
      a structurally differentiated retention mechanism not easily replicated by competitors.
    tableRefs: [TU005]
    figureRefs: []

