callouts:
  - calloutType: strength
    title: "Social Reseller Flywheel Lowers CAC and Creates Self-Reinforcing Growth"
    body: >
      Meesho's social-reseller model converts buyers into distribution agents — WhatsApp resellers
      share product links to their personal networks, earning commissions without holding inventory.
      This creates a structurally lower customer acquisition cost than Flipkart or Amazon India,
      which rely primarily on paid search and advertising. The flywheel is self-reinforcing:
      more resellers attract more buyers, who in turn become resellers. Named reseller case
      studies document ₹20,000-50,000/month incomes for active resellers, validating the
      economic incentive for sustained participation.
    claimRefs: [CU010, CU016, CU031, CU037]

  - calloutType: risk
    title: "Undisclosed Cohort Retention and Seller Churn Are Critical Due-Diligence Gaps"
    body: >
      Meesho's most critical customer durability metrics — cohort buyer retention, NRR, and
      annual seller churn — are not publicly disclosed. Estimated second-year buyer retention
      of 35-42% implies moderate stickiness, but without official data, investor models carry
      significant uncertainty. Seller forum reports of high dropout among new sellers in the
      first 90 days suggest onboarding conversion may be weaker than the aggregate active-seller
      headline implies. Post-IPO SEBI disclosures may surface some of this data, but the
      current opacity limits independent durability assessment.
    claimRefs: [CU030, CU032, CU040, CU018]

  - calloutType: risk
    title: "High RTS Rates and Grocery Exit Signal Platform Friction and Expansion Limits"
    body: >
      Return-to-sender rates of 15-25% in fashion categories create substantial working-capital
      strain for MSME sellers, with forum evidence of delayed reconciliation by Meesho.
      The shutdown of the grocery vertical (Meesho Superstore) in March 2023 — after failing
      to demonstrate viable unit economics — demonstrates that Meesho's platform strengths
      (zero-commission, social-sharing, mobile-first) do not transfer to supply-chain-intensive
      or same-day-delivery categories. These adverse signals constrain the credible addressable
      market to the value-fashion-home Tier 3+ segment and moderate AOV.
    claimRefs: [CU012, CU013, CU036, CU040]

