  evidenceGaps:
    - id: GU001
      summary: "Cohort buyer retention rates and NRR not disclosed"
      detail: >
        Meesho has never publicly disclosed buyer cohort retention rates, Net Revenue Retention
        for seller GMV cohorts, or annual seller churn. This prevents independent assessment of
        the durability of Meesho's 199M ATU base and 1.2M seller base. Estimated second-year
        buyer retention of 35-42% is model-derived from ATU trajectory, not a disclosed metric.
        Post-IPO SEBI disclosures may eventually include cohort data, but as of May 2026 it
        remains unavailable.
      relatedQuestionRefs: [QU019, QU021]
      severity: significant

    - id: GU002
      summary: "Named buyer proof is aggregated, not individual; G2/Trustpilot reviews limited"
      detail: >
        Unlike B2B SaaS companies with G2 or Gartner Peer Insights profiles, Meesho has
        no formal third-party review aggregation for buyers. Buyer testimonials are primarily
        aggregated in company-commissioned surveys (Consumer Insights Report, Smart Shopper
        Report). Named individual buyer profiles exist only in editorial journalism and are
        demographically characterised rather than providing specific outcome data. This limits
        the robustness of the named-customer-proof evidence base relative to the seller-side.
      relatedQuestionRefs: [QU019]
      relatedTableRefs: [TU003]
      severity: moderate

    - id: GU003
      summary: "Return-to-sender rate and reconciliation delay officially undisclosed"
      detail: >
        The 15-25% RTS rate reported in seller forums and third-party journalism is not
        confirmed or denied in Meesho's SEBI DRHP or official communications. Official
        reconciliation timelines (7-10 days) and their actual achievement rate remain
        unverified. The impact on seller working capital, dropout rates, and catalog
        quality is a material operational risk without disclosed mitigation data.
      relatedQuestionRefs: []
      severity: moderate
