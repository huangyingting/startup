companyProfile:
  summary: >
    Meesho was founded in 2015 in Bengaluru, India, by IIT-Delhi alumni Vidit Aatrey (CEO) and
    Sanjeev Barnwal (CTO). It began as a social reselling platform on WhatsApp and evolved into
    India's largest value-commerce marketplace, targeting price-sensitive buyers in Tier-2 and
    Tier-3 cities with unbranded and private-label fashion, home, and lifestyle products priced
    below Rs 400 per item. Meesho pioneered the zero-commission model — no seller listing fee,
    no commission on GMV — replacing that revenue with advertising and logistics income. The
    company raised approximately $1.7 billion from investors including SoftBank, Meta, Fidelity,
    and B Capital, reaching a peak private valuation of $4.9 billion in 2021, and filed a DRHP
    in 2025 for a Rs 5,421 crore IPO. Meesho achieved free cash flow positivity in Q4 FY2025,
    the first Indian e-commerce player to do so, validating its capital-efficient operating model.
  foundedDate: "2015-12-01"
  founders:
    - name: Vidit Aatrey
      role: Co-founder & CEO
      background: >
        IIT-Delhi computer science alumnus; previously at InMobi. Leads Meesho's overall strategy,
        fundraising, and go-to-market vision.
      claimRefs: [CO001]
    - name: Sanjeev Barnwal
      role: Co-founder & CTO
      background: >
        IIT-Delhi computer science alumnus; previously at Google India. Leads technology,
        ML/AI platform, and engineering at Meesho.
      claimRefs: [CO002]
  foundingLocation: Bengaluru, Karnataka, India
  headquarters: Bengaluru, Karnataka, India
  productSummary: >
    Meesho operates a zero-commission mobile marketplace (iOS/Android app and website) connecting
    1.2 million MSME sellers to 140 million+ monthly active buyers. Its catalog includes 120 million+
    SKUs with average order value of Rs 315–320, dominated by unbranded apparel, fashion accessories,
    home goods, and lifestyle products. Meesho also operates Meesho Supply (B2B wholesale), MeeshoMall
    (branded goods), and runs its own shared logistics network.
  customerFocus: >
    Primary: price-sensitive women shoppers aged 25–45 in India's Tier-2, Tier-3, and rural towns
    (500+ million underserved digital shoppers). Secondary: MSME and micro-entrepreneurs selling
    unbranded goods online.
  businessModel: >
    Revenue from: (1) seller advertising fees (performance ads, sponsored listings); (2) logistics
    revenue from end-to-end fulfilment services; (3) nascent financial services (seller credit,
    payments). Zero commission on GMV. Blended take rate ~3.9% of GMV as of FY2024.
  stage: Pre-IPO (IPO DRHP filed 2025; IPO pending as of May 2026)
  fundingStatus: >
    Total raised ~$1.7 billion pre-IPO: Series F $570M led by SoftBank (2021, $4.9B valuation),
    Series E $300M (2021), earlier rounds from Meta, Sequoia India, SAIF Partners, Fidelity.
    IPO seeks Rs 5,421 crore (fresh Rs 4,250 crore + OFS Rs 1,171 crore) at ~Rs 14,000–15,000 crore
    implied market cap.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO002, CO003, CO005, CI001, CI002]

summary:
  headline: >
    Meesho's zero-commission model and Tier-2/3 reach make it a structurally differentiated IPO
    at an attractive 1.4x EV/NTM Revenue, but thin take rate, profitability timeline, and intense
    competition from Flipkart and Amazon justify a selective accumulate stance rather than outright buy.
  overallScore: 6.8
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: attractive
