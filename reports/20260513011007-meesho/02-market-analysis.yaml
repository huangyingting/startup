      Funnel step 'Active E-Commerce Shoppers (FY2025 est.)' = 342M is a projection, not a measured figure.
      Funnel step 4 and 5 may have overlap (one shopper counted on both Meesho and Flipkart).
      'Meesho Repeat Buyers' is author-derived from disclosed 60%+ repeat rate × ATU base; not directly published.
