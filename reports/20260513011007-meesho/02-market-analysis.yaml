        - label: "TAM — India Total Retail (FY2025)"
          value: 960
          unit: "USD billion (₹83 lakh crore at ₹86/$)"
          note: "Meesho SEBI IPO industry report (Redseer); includes organized + unorganized retail across all channels"
        - label: "SAM — India E-Retail GMV (FY2024/25)"
          value: 60
          unit: "USD billion"
          note: "Bain How India Shops Online 2025; e-retail only; value commerce est. 30-35% of this by order mix"
        - label: "SOM — Meesho GMV Run Rate (FY2025)"
          value: 6.2
          unit: "USD billion"
          note: "CLSA April 2025; 8.5% GMV share, 37% order share; low AOV explains GMV/order share gap"
