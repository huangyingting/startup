    tone: positive

callouts:
  - calloutType: insight
    title: "Only 20-25% of India's Internet Users Shop Online"
    body: >
      With 850 million internet users but only 270 million annual online shoppers, India's e-commerce
      conversion rate is among the lowest of any large digital economy. The 580-million-user non-shopping
      internet population represents the largest structural untapped e-commerce opportunity globally.
      Meesho's Tier 2/3 focus, zero-fee model, and vernacular UX position it as the natural first
      platform for many of these first-time shoppers.
    claimRefs: [CM007, CM008, CM031]

  - calloutType: risk
    title: "Quick Commerce Threatens Meesho's Low-AOV Beauty and Accessories Categories"
    body: >
      Quick commerce (Blinkit, Zepto, Swiggy Instamart) now accounts for approximately 10% of India's
      e-retail GMV and is growing at 40%+ CAGR. Its overlap with Meesho's beauty (15-17% order share)
      and accessories categories is material. As 10-minute delivery becomes the consumer expectation
      in metro and Tier 1 cities, Meesho's 2-5 day delivery window becomes structurally disadvantaged
      for impulsive, time-sensitive purchases—even at lower prices.
    claimRefs: [CM013, CM030]

  - calloutType: insight
    title: "37% Order Share Despite Only 8.5% GMV Share Reveals Meesho's Structural Position"
    body: >
      Meesho processes 37% of India's e-commerce orders by volume but only 8.5% by GMV—a ratio that
      quantifies its structural position as the value-commerce leader. With an AOV of ~₹315-350 versus
      Flipkart/Amazon's significantly higher AOV from electronics and branded fashion, Meesho's
      monetisation path requires either AOV expansion into higher-ticket categories or take-rate
      expansion on its existing seller base. CLSA's 26% CAGR assumes both occur gradually through FY2031.
    claimRefs: [CM005, CM006, CM036]

