  evidenceGaps:
    - id: EO001
      type: private-evidence-only
      severity: material
      topic: financials
      missingEvidence: >-
        No audited financial statements, revenue figures, or management accounts are publicly available for
        NEURA Robotics GmbH. The company has not disclosed ARR, gross margin, or burn rate.
      whyItMatters: >-
        Without financial data, investors cannot assess revenue trajectory, runway, or whether the company is
        approaching commercial viability. Standard gap for private German GmbHs.
      diligencePath: >-
        Request audited financial statements (Jahresabschluss), management accounts, and investor updates for
        the prior 3 fiscal years.
      relatedQuestionRefs:
        - QO009
        - QO022
      relatedTableRefs:
        - TO003
    - id: EO002
      type: private-evidence-only
      severity: material
      topic: governance and TO002 leadership coverage
      missingEvidence: >-
        NEURA Robotics has not publicly disclosed its board of directors, investor governance rights (pro-rata,
        information rights, board seats), or any succession plan for David Reger. The leadership table TO002
        cannot be fully populated without this information.
      whyItMatters: >-
        Key-person risk is very high given David Reger is the sole founder and only named executive. Without
        governance details, investors cannot assess control risk or downside protection.
      diligencePath: >-
        Request shareholder agreement (Gesellschaftsvertrag), board composition, and investor rights letter.
      relatedQuestionRefs:
        - QO003
        - QO022
      relatedTableRefs:
        - TO002
    - id: EO003
      type: contested-interpretation
      severity: moderate
      topic: commercial traction
      missingEvidence: >-
        No confirmed commercial robot deployment at scale has been publicly disclosed. The company has announced
        prototypes and partnerships but not disclosed production volumes, named paying customers, or contract
        values.
      whyItMatters: >-
        The gap between demonstration capability and production-at-scale is the primary credibility risk for all
        humanoid robot companies. Promotional videos from NEURA Robotics have been publicly questioned.
      diligencePath: >-
        Request customer references from any paying deployments; obtain production unit numbers and commercial
        contract terms.
      relatedQuestionRefs:
        - QO009
        - QO010
        - QO025
      relatedTableRefs:
        - TO004
