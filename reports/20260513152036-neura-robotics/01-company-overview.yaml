callouts:
  - calloutType: strength
    title: Europe's Deepest Cognitive Robotics Stack
    body: >-
      NEURA Robotics' in-house development across AI (AURA), robot hardware, power electronics (Neura Electronics),
      and Neuraverse software creates a proprietary end-to-end stack rare among European robotics companies, reducing
      dependency on third-party AI or chip vendors and enabling faster iteration cycles.
    claimRefs:
      - CO039
      - CO042
  - calloutType: strength
    title: Strategic Partner Accumulation in 2026
    body: >-
      Four major technology partnerships — Qualcomm (compute), AWS (cloud), Dassault Systèmes (digital twin), and
      Zimmer Systems (automation) — announced in the first four months of 2026 signal institutional validation of
      NEURA's technology stack and materially expand its go-to-market surface across industrials and cloud.
    claimRefs:
      - CO028
      - CO029
      - CO031
      - CO032
  - calloutType: risk
    title: Key-Person Dependency on David Reger
    body: >-
      David Reger is the sole founder, Managing Director, and public face of NEURA Robotics. No succession plan,
      board composition, or governance framework has been publicly disclosed. This creates significant key-person
      risk for a company with 1,200+ employees and $200M+ in investor capital.
    claimRefs:
      - CO021
      - CO022
  - calloutType: risk
    title: No Disclosed Financials or Confirmed Commercial Revenue
    body: >-
      NEURA Robotics has not published audited financials, disclosed ARR, or confirmed large-scale commercial robot
      deployments. The company remains pre-commercial-revenue for humanoid robots as of May 2026. This is a material
      gap for investor due diligence.
    claimRefs:
      - CO020
      - CO035
  - calloutType: risk
    title: Promotional Video Skepticism
    body: >-
      TechCrunch's hardware editor (July 2024) noted that humanoid robot demonstration videos — including coverage of
      NEURA Robotics' 4NE1 — should be approached with skepticism until robots demonstrate repeatable real-world tasks
      at scale. This reflects a sector-wide credibility challenge NEURA has not yet publicly resolved.
    claimRefs:
      - CO034
