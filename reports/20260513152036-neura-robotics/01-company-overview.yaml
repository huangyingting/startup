company:
  name: Neura Robotics
chapter:
  number: 1
  title: Company Overview
  summary: >
    NEURA Robotics GmbH, founded in 2019 by David Reger in Metzingen, Germany, is a pioneering developer of cognitive
    humanoid robots and proprietary AI. Its portfolio spans MAiRA (world's first cognitive robot), LARA, MAV, MiPA, and
    the 4NE1 humanoid ("For Anyone"), positioned as the first designed for series production. Backed by approximately
    $200 million across three rounds including a €120 million Series B in January 2025, the company employs 1,200+
    people from 45+ countries across 8+ locations. By Q2 2026 NEURA had secured strategic partnerships with NVIDIA,
    Qualcomm, AWS, and Dassault Systèmes, and launched Neuraverse — its proprietary robotics app-store ecosystem.
    No publicly audited financials or confirmed commercial revenue at scale are available.
sections:
  - id: S01
    title: Company Identity and Business Model
    body: >
      NEURA Robotics GmbH is a private German robotics company founded in 2019 by David Reger and headquartered at
      Gutenbergstrasse 44, 72555 Metzingen, Baden-Württemberg, near Stuttgart. The company's stated mission is
      "We serve humanity," and it develops cognitive robots and humanoid platforms combining advanced machine vision,
      spatial audio processing, and proprietary artificial intelligence to enable machines to sense, respond, and
      adapt. NEURA's core thesis is that cognitive capabilities — rather than task-specific automation — represent
      the next inflection point in industrial and service robotics.

      The company's business model targets both industrial and service markets: industrial collaborative robots
      (MAiRA, LARA, MAV) address manufacturing automation, while humanoid platforms (4NE1, MiPA) aim at broader
      task-agnostic human-robot collaboration. NEURA also operates Neuraverse, described as the world's first
      scalable robotics app store, enabling robots to receive new skills as easily as smartphones receive updates.
      All key technologies — including the proprietary AURA AI system and hardware components — are developed
      in-house, reflecting a deliberate vertical integration strategy. As of May 2026, NEURA Robotics operates from
      8+ locations including Metzingen (HQ), Hangzhou (China), and Zurich (Switzerland).
    claimRefs:
