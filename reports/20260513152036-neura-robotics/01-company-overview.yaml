  - id: S02
    title: Founders, Leadership, and Governance
    body: >
      NEURA Robotics was founded solely by David Reger, who serves as Managing Director (CEO equivalent) and is the
      company's primary public face, product visionary, and fundraising driver. Reger founded the company in Metzingen
      and has maintained day-to-day operational leadership through the company's growth from a startup to 1,200+
      employees. The company has not publicly disclosed a formal board of directors, investor governance structure, or
      succession plan. This concentrated key-person dependency on the founder-CEO is a material governance
      consideration for potential investors.

      By early 2026, NEURA Robotics had expanded its workforce to support a growing multinational organization. The
      company employs over 1,200 people from more than 45 nationalities across 8+ locations. Subsidiary Neura
      Electronics provides in-house industrial electronics capabilities, including control cabinets, power electronics,
      and sensor integrations. The workforce model emphasizes multi-disciplinary engineering talent across robotics, AI,
      manufacturing, and software, consistent with the company's in-house technology development strategy. Beyond
      David Reger, no other named executives have been publicly identified in press releases or official communications
      reviewed through May 2026. Governance details remain undisclosed for this private GmbH.
    claimRefs:
      - CO005
      - CO006
      - CO021
      - CO022
      - CO023
      - CO039
      - CO042
    tableRefs:
      - TO002
  - id: S03
    title: Funding History and Investor Composition
    body: >
      NEURA Robotics has raised approximately $200 million or more in total capital across three disclosed rounds.
      The first major institutional round, closed in July 2023, raised approximately $55 million (€50 million),
      led by Lingotto Investment Management, Vsquared Ventures, PRIMEPULSE, and HV Capital. Notably, the order book
      at announcement exceeded $450 million — more than eight times the round size — signaling substantial investor
      demand beyond the closed amount. In October 2023, InterAlpen Partners contributed an additional $16 million as
      a round extension.

      In January 2025, NEURA closed a €120 million Series B. Investors included Lingotto Investment Management,
      PRIMEPULSE, Vsquared Ventures, HV Capital, InterAlpen Partners (all returning), plus new entrants BlueCrest
      Capital Management and L-Bank Baden-Württemberg — a German state development bank, adding a quasi-strategic
      government-adjacent dimension. The company has not disclosed a formal valuation in connection with any round.
      No audited financial statements are publicly available, and revenue at scale from robot deployments has not
      been confirmed. The investor base is dominated by European growth capital and strategic industrial investors,
      consistent with NEURA's German market positioning.
    claimRefs:
