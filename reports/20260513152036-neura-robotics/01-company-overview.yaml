  - id: S04
    title: Scale, Headcount, and Key Milestones
    body: >
      NEURA Robotics has grown rapidly since its 2019 founding. By 2025/2026 the company employed more than 1,200
      people from over 45 nationalities and operated from 8+ locations. International expansion to Hangzhou (China)
      and Zurich (Switzerland) was completed in 2025.

      Key milestones include the 2022 automatica debut (first public appearance with 1st-gen 4NE1), the July 2023
      $55M funding and $450M+ order book, the January 2025 €120M Series B, and the 2025 launch of MiPA and Neuraverse.
      NVIDIA early-access partnership in 2024 embedded NEURA in the leading robotics AI compute ecosystem. In 2026,
      NEURA secured partnerships with Zimmer Systems (February), Qualcomm (March), TU Munich for Europe's largest
      Physical AI training center (March), AWS (April), and Dassault Systèmes (April). Each partnership extends
      NEURA's reach across industrial automation, semiconductor AI acceleration, cloud computing, and digital
      manufacturing simulation, collectively validating the company's technology platform ahead of anticipated
      series production of 4NE1.
    claimRefs:
