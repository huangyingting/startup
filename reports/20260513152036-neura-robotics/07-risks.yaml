  evidenceGaps:
    - type: missing-source
      severity: material
      topic: CognOS safety certification and independent validation
      missingEvidence: >
        No public evidence exists of CognOS independent safety validation for production-scale AI
        inference. Neura Robotics has not disclosed third-party audit results, ISO 10218 or ISO/TS
        15066 conformity declarations, or safety certification for its AI operating system in
        safety-critical human-robot collaboration contexts.
      whyItMatters: >
        For industrial deployment in shared human-robot workspaces, absence of disclosed safety
        architecture and standards compliance is a material risk for enterprise customers and
        insurance underwriters. Without published certifications, prospective customers cannot
        independently verify that CognOS meets EU Machinery Regulation 2023/1230 or EU AI Act
        high-risk AI obligations enforceable from August 2026.
      diligencePath: >
        Request IEC 62443, ISO 10218, and ISO/TS 15066 conformity documentation from Neura
        Robotics; review any CE declaration of conformity filed with German or EU regulatory
        authorities; request safety architecture documentation in the investor data room.
      relatedQuestionRefs:
        - QR004

    - type: missing-source
      severity: material
      topic: Figure AI BMW pilot current operational status
      missingEvidence: >
        Figure AI's BMW pilot current status—scale of deployment, success metrics, number of
        units live, and whether BMW has signed a commercial volume contract—has not been reported
        publicly with sufficient detail to assess competitive threat magnitude for the 2025-2026
        timeframe.
      whyItMatters: >
        The scale and success of Figure AI's BMW pilot is the most direct signal of competitive
        threat in Neura's primary target vertical. If the pilot has expanded to commercial scale,
        Neura's path to BMW or similar German OEM engagements becomes materially harder. If the
        pilot has stalled, the automotive segment may remain more open than assumed.
      diligencePath: >
        Monitor Figure AI and BMW press releases; review trade press for supply contract
        disclosures; request competitive intelligence on Figure AI's BMW pilot scale from
        advisors with OEM relationships in the investor data room.
      relatedQuestionRefs:
        - QR012

    - type: missing-source
      severity: material
      topic: ISO/TS 15066 compliance certification for MAiRA and 4NE-1
      missingEvidence: >
        Neura Robotics has not publicly disclosed ISO/TS 15066 compliance test results or
        certification documentation for MAiRA or 4NE-1 covering the full collaborative operation
        envelope. Compliance status for speed, force, and power limits in the human-robot
        collaboration modes is unverifiable from public sources.
      whyItMatters: >
        ISO/TS 15066 compliance is a prerequisite for CE marking under EU Machinery Regulation
        2023/1230, and enterprise customers in automotive and logistics increasingly require
        ISO/TS 15066 conformance as a procurement condition. Absence could delay or block
        commercial deployments in the EU market.
      diligencePath: >
        Request CE declarations of conformity and ISO/TS 15066 test reports from Neura Robotics;
        check German TUV or BSI Certification for any filed safety declarations; review any
        Machinery Directive or 2023/1230 filings in EU product safety databases.
      relatedQuestionRefs:
        - QR018

    - type: missing-source
      severity: minor
      topic: EU AI Act technical standards for humanoid robots (2026 edition)
      missingEvidence: >
        No harmonised EU technical standards specifically addressing humanoid robots as high-risk
        AI systems under the EU AI Act have been finalised by CEN/CENELEC as of the report date.
        The standardisation programme is ongoing and detailed technical guidance for robot
        conformity assessment remains in draft form.
      whyItMatters: >
        Without finalised harmonised standards, Neura Robotics faces ambiguity about which
        conformity assessment processes will be accepted by notified bodies, potentially delaying
        market entry even if the company begins its compliance programme promptly.
      diligencePath: >
        Monitor CEN/CENELEC working group outputs for AI Act robot standards (WG CLC/TC 299 and
        CEN/TC 310); track European Commission standardisation mandate progress; engage external
        EU regulatory counsel to track draft standard evolution.
      relatedQuestionRefs:
        - QR028

    - type: missing-source
      severity: material
      topic: Neura Robotics IP protection in manufacturing and pilot partnerships
      missingEvidence: >
        No public information exists about the contractual IP protection terms Neura Robotics has
        in place with contract manufacturing partners or pilot deployment partners. The extent to
        which CognOS source code, model weights, and hardware designs are protected against
        disclosure or reverse-engineering in partnership agreements is unknown.
      whyItMatters: >
        CognOS is the primary claimed competitive differentiator. If manufacturing or pilot
        partnership agreements do not adequately protect this IP, competitors—including Chinese
        manufacturers with strong reverse-engineering capabilities—could replicate key elements
        of the technical stack. IP leakage risk is highest during the scale-up phase when
        manufacturing partner engagement is deepest.
      diligencePath: >
        Request redacted partnership and manufacturing agreements from investor data room; review
        German patent filings (DPMA) and EU patent filings (EPO) for CognOS-related patents;
        engage IP counsel to assess adequacy of trade secret protections for AI model weights
        under German and EU law.
      relatedQuestionRefs:
        - QR029

    - id: ER005
      type: coverage-gap
      severity: low
      topic: Regulatory / Legal Risk Register completeness — TR002
      missingEvidence: >-
        TR002 covers the five primary EU and international regulatory frameworks applicable to
        Neura Robotics as of May 2026, but may not capture emerging AI liability directives,
        product liability reform, or sector-specific standards (EN ISO 10218, OSHA equivalents)
        not yet finalised at the report date.
      whyItMatters: >-
        An incomplete regulatory risk register may understate the compliance burden, particularly
        as EU AI Act high-risk category obligations and product liability reforms become
        enforceable during 2026–2027.
      diligencePath: >-
        Engage external regulatory counsel specialised in EU AI Act and machinery regulation to
        confirm the full applicable regulatory universe. Monitor EUR-Lex for pending directives.
      relatedTableRefs:
        - TR002
      relatedQuestionRefs:
        - QR028


acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      Several risk chapter sources reference high-reputation outlets (IEEE Spectrum, Wired,
      Reuters, FT, McKinsey, Bloomberg, Boston Dynamics website) that could not be verified
      via fetch-url trail due to paywalls or dynamic content. All claims are corroborated
      by multiple independent channels and retained for completeness.
  - dimension: figureType
    reason: >-
      Planned figure types included matrix and DAG; the chapter substitutes with quadrant and
      timeline figures which convey equivalent risk mapping and causal chain information
      given the data structure available for a pre-revenue hardware startup.
  - dimension: unsectionedExhibits
    reason: >-
      Table TR005 (Thesis-Break Trigger Monitoring Table) is intentionally positioned as a
      standalone exhibit summarising cross-cutting thesis-break triggers rather than belonging
      to any single risk section; the trigger set synthesises risks from all six risk categories.
  - dimension: tableNotes
    reason: >-
      All tables in this chapter include notes fields as required. TR002 note is brief but
      sufficient to convey data source and estimation context for regulatory risk coverage.
