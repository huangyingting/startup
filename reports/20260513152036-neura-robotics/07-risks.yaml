callouts:
  - calloutType: risk
    title: Pre-Revenue Burn Creates Existential Fundraising Deadline
    body: >
      At an estimated EUR 10-15M/month burn, Neura Robotics' EUR 120M Series B provides only
      8-12 months of runway. Failure to close a Series C by H2 2026 would require emergency
      bridge financing or severe operational restructuring that could permanently impair
      competitive position during the critical window when automotive OEM procurement decisions
      are being made.
    claimRefs:
      - CR013
      - CR014

  - calloutType: risk
    title: EU AI Act Compliance Deadline Coincides with Commercial Ramp
    body: >
      Full EU AI Act high-risk AI system requirements become enforceable in August 2026—exactly
      when Neura Robotics is targeting accelerated commercial deployment. No conformity assessment
      programme has been publicly disclosed, creating material regulatory risk that could delay
      product launches or require costly last-minute re-engineering at the worst possible time.
    claimRefs:
      - CR019
      - CR020

  - calloutType: risk
    title: Chinese Cost Disruption Is Underway, Not Theoretical
    body: >
      Unitree's G1 humanoid robot is commercially available at approximately $16,000—an estimated
      5-10 times below expected initial Neura Robotics pricing. Chinese state-backed competitors
      UBTECH and Fourier Intelligence are scaling for EU market entry with government subsidy
      support, creating a structural pricing threat that cannot be resolved through incremental
      cost reduction alone.
    claimRefs:
      - CR011
      - CR012

