      - number: '7.4'
        title: Regulatory and Compliance Risk
        blocks:
          - type: paragraph
            body: >
              The EU regulatory environment for autonomous systems is tightening rapidly, with direct implications for
              Neura Robotics' commercialisation timeline. The EU AI Act, which entered into force in August 2024 with
              phased implementation, classifies autonomous robots operating in proximity to humans in industrial or
              domestic settings as high-risk AI systems subject to mandatory conformity assessment, technical
              documentation requirements, and human oversight provisions. Full high-risk requirements become enforceable
              in August 2026—within Neura's anticipated commercial ramp window. EU Machinery Regulation 2023/1230, which
              replaces the former Machinery Directive and is fully enforceable from January 2027, introduces updated CE
              marking requirements for collaborative robots, including mandatory ESRB risk assessment and functional
              safety documentation. ISO/TS 15066 sets technical requirements for collaborative robot speed, force, and
              power limits, and compliance must be demonstrable to achieve CE marking. GDPR imposes obligations on the
              collection and processing of sensor data—camera imagery, microphone captures, and positional
              logs—generated by deployed units in EU workplaces. In the United States, FDA oversight applies to
              healthcare-adjacent robotic applications, and the FTC has signalled increased scrutiny of AI systems
              making automated decisions. Non-compliance in any jurisdiction creates product liability exposure and
              could block market entry at a critical juncture for revenue acceleration.
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
          - type: table
            tableRef: TR002
            claimRefs:
