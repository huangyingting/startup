      - number: '6.5'
        title: Customer Acquisition and Retention Model
        blocks:
          - type: paragraph
            body: >
              Neura Robotics pursues a direct enterprise sales model targeting OEM procurement, automation engineering,
              and operations teams. The customer acquisition process begins with technical demonstrations at Neura's
              Metzingen facility or at the customer's site, followed by a structured pilot agreement for a defined task
