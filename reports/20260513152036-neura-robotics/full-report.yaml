      - number: '4.2'
        title: Business Model and Revenue Architecture
        blocks:
          - type: paragraph
            body: >
              Neura Robotics has designed a multi-layer revenue architecture combining upfront hardware sales with
              recurring software subscription and service income -- a structure mirroring the playbook of industrial
              automation leaders applied to the emerging humanoid robot category. The primary revenue stream is
              per-robot hardware sales of the MAiRA platform and its successors, with market estimates placing unit
              prices in the EUR 100,000-250,000 range. At these price points, a commercial deployment of 100 units would
              generate EUR 10M-25M in hardware revenue, though initial unit economics are likely insufficient for
              gross-margin breakeven given bespoke manufacturing processes and limited production volumes.

              The second layer is the Neuraverse software subscription platform, which provides AI task modules, cloud
              fleet management, and remote software update capabilities. This subscription component is designed to
              create a recurring revenue moat analogous to enterprise SaaS businesses, with fees charged per robot
              annually. Service and maintenance contracts -- typically priced as a percentage of hardware value -- form
              a third revenue stream, providing predictable recurring income. Long-term enterprise deployment contracts
              targeting multi-year commitments include upfront fees that improve cash-flow predictability ahead of full
              commercial scale. Together these streams represent a credible path to durable recurring revenue, though
              the timing to meaningful commercial volume remains dependent on customer adoption rates in automotive and
              adjacent industrial verticals.
