  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology and Reliability Risk
        blocks:
          - type: paragraph
            body: >
              Humanoid robotics remains one of the most technically demanding fields in engineering. Neura Robotics'
              4NE-1 and MAiRA platforms must operate reliably in unstructured environments—factories, logistics centres,
              and eventually homes—where sensor noise, variable lighting, and unpredictable human behaviour create acute
              failure modes. Mean Time Between Failures (MTBF) for industrial humanoid robots remains far below that of
              established fixed-arm industrial robots; leading technical assessments estimate MTBF for current humanoid
              platforms in the hundreds of hours, versus thousands for mature articulated-arm robots. Neura's
              proprietary CognOS operating system adds a layer of AI inference dependency: any degradation in perception
              models or edge-case failures in the neural planning stack can propagate into physical safety incidents
              with legal and reputational consequences. Actuator durability at scale is unproven; the custom servo and
              joint designs in MAiRA must survive tens of thousands of operating cycles without performance degradation,
              and no long-term field data have been publicly disclosed to validate this. AI model safety risks—including
              adversarial inputs, distributional shift, and sim-to-real transfer gaps—represent further sub-risks that
              human safeguards alone cannot fully mitigate in dynamic shared workspaces.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
          - type: table
            tableRef: TR001
            claimRefs: []
          - type: figure
