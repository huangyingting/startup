      - number: '2.4'
        title: Market Constraints and Adverse Signals
        blocks:
          - type: paragraph
            body: >
              The IFR's May 2026 assessment is unambiguous: "mass adoption as universal humanoid factory helpers or in
              private households will not happen within the near- and medium-term future." This expert caution from the
              world's primary industrial robotics statistical authority is the most significant adverse signal in the
              market analysis. The IFR also cites the "form follows function" limitation — the human body may not be
              physically suited to high-speed precision industrial tasks where traditional robots excel. In industrial
              production environments demanding millimetre-level precision at high throughput, industrial robots
              outperform humanoids. The IFR expects the 15th Five-Year Plan to see humanoid commercialization only
              "towards the end" of the plan's period, i.e., closer to 2030.

              Second adverse signal: no humanoid robot company — including Boston Dynamics, Figure AI, Apptronik, or
              NEURA — has publicly confirmed commercial production exceeding 1,000 units as of May 2026. This absence of
              production-at-scale evidence materially undermines near-term SOM estimates.

              Third, Chinese manufacturers including Unitree, UBTECH, and Fourier Intelligence are producing lower-cost
              humanoid and service robot alternatives at price points that European premium manufacturers cannot match.
              China's domestic robot supplier share increased from 30% to 57% between 2020 and 2024 (IFR), demonstrating
              rapid competitive maturation. For NEURA, competing on price in the mass market against Chinese vendors is
              not a viable strategy; differentiation through cognitive capability and safety certification is the only
              sustainable moat.
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM014
              - CM015
              - CM017
              - CM018
              - CM025
              - CM036
      - number: '2.5'
        title: Geographic and Segment Opportunities
        blocks:
          - type: paragraph
            body: >
              Europe — specifically Germany and the DACH region — represents NEURA's primary near-term market. Germany
              is the fourth-largest industrial robot market globally and hosts a dense concentration of automotive OEMs,
              Tier 1 suppliers, and precision engineering SMEs with automation budgets. Baden-Württemberg (NEURA's home
              state) is home to Bosch, Mercedes-Benz, Porsche, and thousands of engineering SMEs. The EU AI Act creates
              a compliance infrastructure that European-native vendors like NEURA can turn into a structural moat versus
              non-EU competitors, who face more complex certification paths. EU industrial policy (including the
              European Chips Act and robotics research frameworks) is directionally supportive.

              China is the single largest robot installation market globally, and NEURA's Hangzhou office is a direct
              response to this opportunity. However, the China market is simultaneously the most intensely competitive:
              state-backed vendors with lower-cost production and deep government customer relationships dominate.
              NEURA's China play is likely a partnership/licensing or high-end cognitive robot niche rather than volume
              competition.

              North America presents a growing opportunity driven by manufacturing reshoring incentives, but NEURA has
              no confirmed North American presence or partnerships as of May 2026. Healthcare and logistics are
              cross-geography verticals with large budgets and demonstrated willingness to deploy automation (AGVs/AMRs
              are proven; humanoid extension is a natural next step). Consumer/residential remains a long-horizon
              opportunity with high uncertainty.
            claimRefs:
