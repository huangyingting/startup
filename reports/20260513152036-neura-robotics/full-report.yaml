      - number: '7.3'
        title: Financial and Runway Risk
        blocks:
          - type: paragraph
            body: >
              Neura Robotics is pre-revenue with an estimated burn rate of EUR 10–15 million per month, reflecting
              substantial headcount of 1,200+ employees, hardware R&D investment, and facility expenditures. The EUR
              120M Series B closed in 2024 provides an estimated eight to twelve months of runway, implying that a
              Series C must be secured by mid-to-late 2026 at the latest to avoid operational disruption. Hardware
              startup financing presents distinctive risks: investors face long J-curves, manufacturing cost structures
              are volume-dependent and unfavourable at prototype scale, and bill-of-materials costs for humanoid robots
              remain high relative to anticipated early commercial pricing. No confirmed large-volume customer
              commitments have been publicly disclosed, materially limiting Neura's ability to provide revenue
              visibility to prospective Series C investors and increasing perceived fundraising risk. A prolonged
              fundraising cycle, an adverse macro environment for growth capital, or a competitor technology
              breakthrough could leave Neura without sufficient capital to reach production-scale unit economics.
              Dilution risk and down-round scenarios are non-trivial: if the Series C does not achieve the expected
              valuation step-up, governance complications and employee option-pool erosion could accelerate talent
              attrition precisely when execution risk is highest.
            claimRefs:
