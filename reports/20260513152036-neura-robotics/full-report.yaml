            body: >
              Neura Robotics' near-term roadmap centers on three parallel tracks: hardware series production, consumer
              product introduction, and platform ecosystem growth. Series production of the 4NE1 humanoid is the
              highest-stakes milestone, targeted for the 2026–2027 window, representing the transition from
              prototype-grade deployments to repeatable, volume manufacturing with cost efficiency required for broader
              commercial adoption. 4NE1 Mini's Spring 2026 reserve launch provides an early consumer demand signal and
