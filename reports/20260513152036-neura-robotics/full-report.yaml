      - number: '3.2'
        title: Direct Humanoid Robot Competitors
        blocks:
          - type: paragraph
            body: >
              Figure AI (USA) is NEURA's most directly comparable pure-play humanoid competitor. Having raised $675
              million in February 2024 at a $2.6 billion valuation from investors including Microsoft, Jeff Bezos,
              NVIDIA, and Intel, Figure AI is the best-capitalized pure-play humanoid startup globally. Its Figure 03
              robot paired with the Helix visual-language-action (VLA) AI model represents state-of-the-art end-to-end
              embodied intelligence. A BMW manufacturing pilot has been announced. Figure AI's capital advantage and
              Microsoft partnership make it the most formidable near-term competitor.

              Apptronik (USA) has raised approximately $1 billion and achieved a ~$5 billion valuation as of 2025. Its
              Apollo humanoid stands 5'8" (173cm), weighs 160lbs (73kg), carries 55lbs (25kg) payload, and runs on a
              4-hour battery. Apptronik has deep NASA heritage and backing from GV (Google Ventures), with a
              Mercedes-Benz manufacturing pilot underway. The combination of $1B capitalization, automotive pilot
              traction, and GV backing makes Apptronik the strongest capital-plus-deployment competitor to NEURA in the
              industrial segment.

              Boston Dynamics (USA, owned by Hyundai) has the most technically advanced mobility platform in Atlas,
              which is all-electric and benefits from a Google DeepMind AI partnership announced in January 2026.
              Hyundai ownership provides both manufacturing capability and deep capital. Boston Dynamics/DeepMind
              represents the highest-credibility AI-hardware combination in the market.

              Tesla Optimus (USA) was announced at Tesla AI Day 2022 and released Gen 2 in 2024. Tesla's competitive
              advantage is not current robot capability but the potential to manufacture humanoid robots at automotive
              scale — an asymmetric threat that no startup competitor can match with current capitalization.

              Agility Robotics (USA, owned by Amazon) operates Digit humanoid robots in active Amazon warehouse
              deployments, making it the only competitor with confirmed commercial-scale deployment. Amazon ownership
              provides access to the world's largest logistics network as both a customer and capital source.

              1X Technologies (Norway) develops the NEO home robot backed by OpenAI and EQT, with a $200 deposit
              pre-order model. Sanctuary AI (Canada) develops the Phoenix humanoid with Carbon AI for general-purpose
              tasks.
