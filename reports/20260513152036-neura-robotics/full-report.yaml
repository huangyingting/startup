      - number: '7.2'
        title: Competitive and Market Position Risk
        blocks:
          - type: paragraph
            body: >
              The humanoid robotics space has attracted extraordinary capital concentration, placing Neura Robotics in
              direct competition with organisations possessing vastly superior financial and manufacturing resources.
              Tesla's Optimus programme benefits from a captive supply chain, gigafactory manufacturing infrastructure,
              and cross-subsidisation from Tesla's core automotive business—structural advantages no startup can
              replicate. Figure AI has raised approximately $675M at a $2.6B valuation and secured a pilot deployment
              with BMW, directly targeting the automotive manufacturing segment Neura pursues. Apptronik raised
              approximately $1B at a roughly $5B valuation and is piloting Apollo at Mercedes-Benz. Agility Robotics,
              wholly owned by Amazon, is already deploying its Digit platform in Amazon fulfilment centres, establishing
              operational data moats that late entrants will struggle to overcome. Chinese competitors represent an
              emerging cost disruption: Unitree's G1 is commercially available at approximately $16,000—estimated 5–10
              times below expected early Neura pricing—while UBTECH and Fourier Intelligence scale with Chinese state
              industrial policy backing. Boston Dynamics maintains strong brand equity and established enterprise
              relationships. Neura's CognOS cognitive layer and claimed superior dexterity must translate into
              customer-verifiable performance advantages quickly enough to justify European premium pricing before
              lower-cost alternatives commoditise the humanoid robot value proposition.
            claimRefs:
              - CR006
