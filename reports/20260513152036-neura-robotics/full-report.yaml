  - id: FU002
    type: quadrant
    layout: standard
    title: Customer Segment Value Map
    summary: >-
      Positioning of Neura Robotics' five target customer segments by addressable market size (x-axis, relative scale)
      and estimated NEURA platform fit (y-axis, based on technical and commercial alignment as of May 2026). Segment
      positions reflect current product capabilities, not long-term roadmap potential.
    approximationNotes: >-
      Both axes use relative scales based on qualitative assessment of current product-market fit and published market
      sizing. X-axis values are normalized; y-axis reflects current platform fit, not future roadmap.
    data:
      xAxis: Addressable Market Size (Relative)
      yAxis: NEURA Platform Fit (Current)
      points:
        - label: Automotive OEMs
          x: 0.85
          'y': 0.9
          detail: >-
            Largest near-term target with strongest product-market alignment; MAiRA payload and factory compatibility
            directly address primary use cases.
        - label: Logistics & Warehousing
          x: 0.8
          'y': 0.55
          detail: >-
            Large market but significant competition from specialized picking robots; speed and dexterity requirements
            partially met by current generation.
        - label: General Manufacturing
          x: 0.6
          'y': 0.45
          detail: >-
            Broad volume potential across SMEs and Tier 1 suppliers but requires lower unit costs than current hardware
            economics support.
        - label: Healthcare
          x: 0.4
          'y': 0.35
          detail: >-
            Meaningful long-term opportunity but extended regulatory timelines and liability concerns limit near-term
            fit despite compelling use case appeal.
        - label: Research & Education
          x: 0.2
          'y': 0.65
          detail: >-
            Moderate fit via 4NE1 Mini platform; smaller absolute market but high ecosystem-building value and near-term
            addressability.
        - label: Consumer / Home
          x: 0.5
          'y': 0.2
          detail: >-
            Aspirational long-term market through MiPA platform; not currently commercially addressable at scale by
            Neura Robotics' existing product lineup.
