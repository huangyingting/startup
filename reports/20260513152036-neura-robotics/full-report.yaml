    type: range
    layout: standard
    title: Neura Robotics Scenario Valuation Range (EUR millions)
    summary: >-
      Bear, base, and bull scenario valuation ranges for Neura Robotics in EUR millions, with acquisition-premium
      overlays illustrating potential upside from strategic M&A. Ranges express the breadth of outcomes dependent on
      commercialisation timing and competitive dynamics as of 2026.
    approximationNotes: >-
      All ranges are analyst estimates derived from comparable-transaction benchmarking; no confirmed Neura Robotics
      valuation exists at any round. Acquisition premium ranges assume 30% (bear) and 40% (bull) strategic premiums over
      standalone values based on industrial robotics M&A precedents.
