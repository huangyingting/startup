      items:
        - label: Bear Case
          low: 300
          high: 500
          unit: EUR millions
          detail: Delayed commercialisation; down-round Series C; ~25% probability
        - label: Base Case
          low: 700
          high: 1000
          unit: EUR millions
          detail: ≥1 OEM deployment 2026; Series C at modest premium; ~50% probability
        - label: Bull Case
          low: 1500
          high: 2500
          unit: EUR millions
          detail: Multiple OEM contracts + Neuraverse revenue + acquirer interest; ~25% probability
        - label: Acq. Premium (Bear)
          low: 390
          high: 650
          unit: EUR millions
          detail: 30% M&A premium applied to bear standalone standalone range; scenario overlay
        - label: Acq. Premium (Bull)
          low: 2100
          high: 3500
          unit: EUR millions
          detail: 40% M&A premium applied to bull standalone range; multi-bidder auction scenario
  - id: FV003
