      - number: '2.3'
        title: Market Drivers and Structural Tailwinds
        blocks:
          - type: paragraph
            body: >
              Four structural forces underpin the robotics automation investment thesis and directly benefit NEURA's
              market positioning. First, labor shortages in manufacturing across Germany, Japan, and the United States
              create a sustained demand for automation that is not cyclically reversible; aging workforces in these
              markets mean the structural driver will intensify through 2030. IFR data confirms this as the primary
              macro driver for cobot adoption in European manufacturing.

              Second, China's 15th Five-Year Plan (2026–2030) — documented by the IFR in May 2026 — formally places
              robotics at the heart of China's modern industrial system, mandating subordinate sectoral and regional
              plans to align with AI-integrated robotics objectives. This creates an enormous domestic Chinese market
              for robotics while simultaneously intensifying competitive pressure from state-backed Chinese vendors. For
              NEURA, the Hangzhou office positions it to benefit from Chinese industrial robot demand.

              Third, a surge in venture capital and institutional investment in humanoid robotics from 2024 through 2026
              — with Figure AI raising $675M+, 1X Technologies raising significant capital, and NEURA itself securing
              €120M — demonstrates strong institutional conviction that humanoid platforms are commercially viable. This
              capital inflow funds technical progress and legitimizes the category to potential customers.

              Fourth, the convergence of physical AI and large language models is enabling cognitive capabilities —
              instruction following, environment mapping, unstructured task execution — that were unavailable to
              previous robot generations. NEURA's AURA AI system and Qualcomm partnership reflect this technical wave.
            claimRefs:
