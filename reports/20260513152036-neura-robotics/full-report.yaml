      - number: '1.5'
        title: Product Portfolio and Technology Overview
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics offers a portfolio of five robot product lines plus ecosystem software. MAiRA is described
              as the world's first commercially available cognitive robot, with advanced machine vision, spatial audio
              processing, and self-optimizing workflows. LARA is a collaborative robot arm designed for industrial and
              human-adjacent environments. MAV is a mobile automated vehicle for industrial use. MiPA, debuted at
              automatica 2025, is an AI-powered versatile robotic assistant targeted at home and service settings.

              4NE1 ("For Anyone") is the company's humanoid robot flagship, currently in its third generation (revealed
              at automatica 2025), marketed as the first humanoid designed for series production. A 4NE1 Mini variant
              targeting research, education, and entertainment was announced for Spring 2026 delivery. All products are
              powered by AURA, NEURA's proprietary AI. The Neuraverse platform functions as a robotics app store,
              allowing robots to acquire new skills via software updates, analogous to a smartphone app ecosystem. Neura
              Electronics, an in-house subsidiary, manufactures control cabinets, power electronics, and sensor
              integrations supporting both NEURA robots and Neuraverse-connected fleets. NEURA's in-house development
              model — covering AI, hardware, electronics, and software — is a stated differentiator from competitors
              relying on third-party AI or component suppliers.
