      - number: '7.5'
        title: Manufacturing Scale and Supply Chain Risk
        blocks:
          - type: paragraph
            body: >
              Hardware startups face a well-documented valley of death when transitioning from prototypes and pilot
              units to volume production. Neura Robotics, still at the hundreds-of-units scale, must negotiate a complex
              ramp: tooling investment, supply-chain qualification for precision actuators and custom silicon
              accelerator components, and logistics for field service and warranty returns each introduce capital
              requirements and schedule risk that compounds with scale. Precision harmonic drives, force-torque sensors,
              and the custom ASIC components used in CognOS inference are sourced from a limited supplier base, with
              single-source dependencies creating critical path exposure. Geopolitical tensions affecting semiconductor
              supply chains—particularly NVIDIA Jetson and Qualcomm Snapdragon chips critical for edge AI
              inference—introduce additional sourcing risk that cannot be fully mitigated through inventory buffers
              alone. Moving to thousands of units requires either a significant contract manufacturing
              partnership—introducing margin compression and IP exposure risk—or a dedicated factory build-out requiring
              capex that competes with R&D and commercial deployment budgets. Quality control at volume is a separate
              challenge: the complexity and tight mechanical tolerances of humanoid robot assembly make automated
              manufacturing difficult, and high human-labour content in assembly raises unit costs in European labour
              markets. Component shortages or quality escapes at scale could trigger field recalls with severe
              reputational and financial consequences at a stage when the company cannot afford reputational setbacks.
            claimRefs:
              - CR025
              - CR026
              - CR027
              - CR028
              - CR029
      - number: '7.6'
        title: Talent, Geopolitical, and Macro Risks
        blocks:
          - type: paragraph
            body: >
              Robotics engineering talent is among the most globally contested in the technology sector. Neura Robotics
              competes for perception engineers, controls specialists, and AI researchers with well-capitalised US-based
              peers, large German automotive OEMs with substantial R&D budgets, and a growing cohort of funded European
              robotics startups. Germany's tight labour market and wage inflation create structural cost pressure that
              is unlikely to ease within the planning horizon. Key-person risk is acute: David Reger, founder and CEO,
              is the sole publicly prominent executive, and the company's vision, investor relations, and strategic
              partner negotiations are closely associated with his personal brand. Any incapacity or departure would
              create significant organisational uncertainty during a critical commercial ramp period. Geopolitically,
              China's state-backed robotics industry is targeting European markets with lower-cost hardware and
              increasingly capable software stacks, potentially undercutting Neura's pricing power within 24 months.
              US–China technology export control tensions create dual exposure: access to US chip technology could be
              restricted, while European customers may impose supply-chain provenance requirements that complicate
              component sourcing. At the macro level, a recession or extended capital markets downturn would defer
              enterprise robot adoption as customers prioritise OpEx reduction over capital expenditure, extending time
              to revenue and compressing runway further at the worst possible moment.
            claimRefs:
