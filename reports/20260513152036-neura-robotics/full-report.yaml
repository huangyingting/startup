      - number: '6.2'
        title: Target Customer Segments
        blocks:
          - type: paragraph
            body: >
              Neura Robotics targets five primary customer segments with its robot product line. Automotive OEMs
              represent the primary near-term addressable market given the structured nature of assembly environments,
              clear labor cost pressures, ergonomic risk in heavy-component roles, and significant precedent for
              industrial robot adoption. MAiRA's 60 kg payload capacity directly addresses heavy-component handling,
              quality inspection, and material transport tasks common in automotive plants. The logistics and
              warehousing segment offers large scale—estimated at $10–20 billion globally—but requires competitive speed
              and dexterity for order picking and palletizing against established specialized vendors. Healthcare
              represents a longer-term segment with applications in medication dispensing, patient transport assistance,
              and clinical supply management, though regulatory barriers and liability concerns create extended sales
              cycles uncommon in industrial contexts. General manufacturing—particularly small and medium-sized
              enterprises and Tier 1 automotive suppliers—offers volume potential but requires unit-cost reductions
              beyond current hardware economics. Finally, the 4NE1 Mini variant targets research institutions and
              universities, building ecosystem familiarity and potential talent pipelines. Each segment requires a
              distinct go-to-market approach, and Neura's current resources most naturally serve the automotive segment
              given product specifications and existing pilot relationships.
