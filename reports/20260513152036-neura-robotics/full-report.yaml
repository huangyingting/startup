    title: Financials
    sections:
      - number: '4.1'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Neura Robotics has assembled a multi-round capital structure totalling approximately $200M+ (EUR 185M+)
              since its founding in Metzingen, Germany in 2019. The company's first major external fundraise occurred in
              July 2023 when it closed approximately $55M (EUR 50M) widely characterised as a Series A, led by Lingotto
              Investment Management -- the family office of the Agnelli dynasty -- with co-investment from Vsquared
              Ventures, PRIMEPULSE AG, and HV Capital. Remarkably, the company disclosed that its order book had already
              exceeded $450M at close, signalling substantial enterprise demand well ahead of commercial product
              availability. A bridge extension of $16M followed in October 2023, provided by InterAlpen Partners, to
              accelerate product development and international market entry.

              The flagship financing event came in January 2025 when Neura closed a EUR 120M Series B, again led by
              Lingotto, with all major Series A investors re-investing. Two significant new entrants joined the cap
              table: BlueCrest Capital Management, a prominent UK-based hedge fund, and L-Bank Baden-Wuerttemberg, the
              German state development bank, whose participation signals public-sector confidence in Neura's regional
              economic importance and technological credentials. No external valuation has been publicly disclosed at
              any round, limiting mark-to-market analysis to comparable-company benchmarks. The cumulative capital
              raised of $200M+ positions Neura as the best-capitalised independent humanoid robotics company in Europe.
