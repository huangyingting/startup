      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Sizing the addressable market for NEURA requires assembling estimates across three analyst lenses. The
              broadest TAM is global industrial automation plus service robots, approximately $35–55 billion by 2030
              based on IFR and analyst consensus. The IFR reported 4.28 million industrial robots in operational stock
              globally in 2024, with annual installation rates growing. Goldman Sachs projects that the humanoid robot
              component alone could represent $38 billion by 2035, though their source page is currently unavailable;
              this figure is widely cited in industry coverage and consistent with MarketsandMarkets and Grand View
              Research analyst projections pointing to double-digit CAGR for humanoids.

              The SAM for NEURA narrows to European and Asia-Pacific markets for cognitive cobots and advanced humanoid
              platforms — estimated at $4–8 billion addressable by 2028. Germany alone has the highest robot density per
              manufacturing worker in Europe, making the domestic market a direct proving ground. NEURA's Hangzhou
              office positions it to participate in the Asia-Pacific segment, where China alone deploys 54% of global
              annual robot installations.

              The SOM in the 3–5 year horizon is constrained by NEURA's pre-commercial production stage. A reasonable
              near-term SOM is $50–150 million based on converting the $450M+ reported order book at even partial fill
              rates, with an extended SOM of $150–300 million if the Neuraverse platform generates recurring software
              revenue. Contradictory estimates exist: Goldman Sachs' humanoid market forecast assumes mass commercial
              adoption that the IFR explicitly qualifies as not near-term, and no humanoid company has confirmed
              production above 1,000 units commercially.
