            body: >
              Neura Robotics' visible deployment pipeline as of May 2026 consists of a confirmed Daimler Truck pilot, a
              reported BMW Group evaluation, and undisclosed engagements with additional automotive OEMs. The Daimler
              Truck engagement—announced publicly in 2025—represents the company's most advanced customer relationship,
              with MAiRA performing logistics and materials handling tasks within a Daimler production facility. Scope,
              duration, and commercial terms have not been publicly disclosed, limiting the ability to assess conversion
              probability or potential contract value. BMW Group is reported to be assessing MAiRA for assembly
