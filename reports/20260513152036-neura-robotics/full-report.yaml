  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio Overview
        blocks:
          - type: paragraph
            body: >
              Neura Robotics offers one of the most comprehensive humanoid and collaborative robot product lines among
              European startups, covering payloads from 5 kg to 60 kg across five distinct lines. MAiRA (Multipurpose AI
              Robot Assistant), commercially launched in 2023, stands 165 cm tall and delivers a 60 kg payload capacity,
              making it the flagship for manufacturing and logistics deployment. Neura markets MAiRA as the "world's
              first cognitive robot," grounded in its integration of the CognOS operating system, which enables
              natural-language task instruction rather than conventional teach-pendant programming.

              The 4NE1 ("For-any-one") general-purpose humanoid has been iterated through three successive generations
              (2022, 2024, and 2025), demonstrating a rapid development cadence for a capital-intensive domain. A
              consumer-oriented 4NE1 Mini targets education and home-assistance markets, with reservation availability
              announced for Spring 2026. MiPA (Multipurpose Intelligent Powerhouse Assistant), debuted at Automatica
              2025, extends the portfolio toward heavy-duty service applications. LARA (Lightweight Agile Robotic
              Assistant) is a collaborative arm rated at 5 kg payload for precision assembly, while the MAV (Mobile
              Autonomous Vehicle) provides an autonomous logistics navigation platform designed to complement the
              humanoid fleet. Together, the portfolio addresses manufacturing, logistics, service, consumer, and
              assembly verticals—a breadth unusual at this stage of company maturity.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
