              reflecting the company's home-market advantage and proximity to major automotive OEM headquarters. North
              American pilot programs are also underway as of early 2026, expanding the geographic pipeline footprint.
              Industry-wide, the conversion timeline from humanoid robot pilot to commercial deployment is estimated at
              12 to 36 months, meaning near-term revenue generation from current pilots remains uncertain and dependent
