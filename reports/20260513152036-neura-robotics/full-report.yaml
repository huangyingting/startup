    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics GmbH is a private German robotics company founded in 2019 by David Reger and headquartered
              at Gutenbergstrasse 44, 72555 Metzingen, Baden-Württemberg, near Stuttgart. The company's stated mission
              is "We serve humanity," and it develops cognitive robots and humanoid platforms combining advanced machine
              vision, spatial audio processing, and proprietary artificial intelligence to enable machines to sense,
              respond, and adapt. NEURA's core thesis is that cognitive capabilities — rather than task-specific
              automation — represent the next inflection point in industrial and service robotics.

              The company's business model targets both industrial and service markets: industrial collaborative robots
              (MAiRA, LARA, MAV) address manufacturing automation, while humanoid platforms (4NE1, MiPA) aim at broader
              task-agnostic human-robot collaboration. NEURA also operates Neuraverse, described as the world's first
              scalable robotics app store, enabling robots to receive new skills as easily as smartphones receive
              updates. All key technologies — including the proprietary AURA AI system and hardware components — are
              developed in-house, reflecting a deliberate vertical integration strategy. As of May 2026, NEURA Robotics
              operates from 8+ locations including Metzingen (HQ), Hangzhou (China), and Zurich (Switzerland).
