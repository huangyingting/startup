      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics was founded solely by David Reger, who serves as Managing Director (CEO equivalent) and is
              the company's primary public face, product visionary, and fundraising driver. Reger founded the company in
              Metzingen and has maintained day-to-day operational leadership through the company's growth from a startup
              to 1,200+ employees. The company has not publicly disclosed a formal board of directors, investor
              governance structure, or succession plan. This concentrated key-person dependency on the founder-CEO is a
              material governance consideration for potential investors.

              By early 2026, NEURA Robotics had expanded its workforce to support a growing multinational organization.
              The company employs over 1,200 people from more than 45 nationalities across 8+ locations. Subsidiary
              Neura Electronics provides in-house industrial electronics capabilities, including control cabinets, power
              electronics, and sensor integrations. The workforce model emphasizes multi-disciplinary engineering talent
              across robotics, AI, manufacturing, and software, consistent with the company's in-house technology
              development strategy. Beyond David Reger, no other named executives have been publicly identified in press
              releases or official communications reviewed through May 2026. Governance details remain undisclosed for
              this private GmbH.
