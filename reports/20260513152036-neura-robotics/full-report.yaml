  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Taxonomy
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics competes across three overlapping but distinct robotics market segments. The industrial
              robot market — conventional articulated arms, SCARA, and delta robots — is the largest at over $18 billion
              globally, serving automotive, electronics, and heavy manufacturing. The collaborative robot (cobot)
              sub-segment, estimated at approximately $1.4 billion in 2024, is growing at 20%+ CAGR as manufacturers
              seek flexible automation that works alongside humans rather than behind safety cages. NEURA's MAiRA, LARA,
              and MAV products compete primarily in this cobot sub-segment.

              The service robot market exceeded $19 billion in 2024 (IFR data) and includes logistics, healthcare, field
              service, and emerging consumer robots. NEURA's MiPA and 4NE1 humanoid target this segment's human-centric
              task environment. The humanoid robot sub-category is a distinct sub-segment of both service robots and
              advanced industrial automation, currently below $1 billion in annual revenue but the subject of intense
              analyst and investor focus given Goldman Sachs' projection of $38 billion by 2035.

              Status-quo substitutes include: traditional industrial robots (faster, cheaper for repetitive tasks),
              dedicated AMRs/AGVs for logistics, and human labor (still price-competitive in low-wage markets). NEURA's
              thesis is that cognitive cobots and humanoids unlock workflows that neither traditional robots nor
              single-task automation can address — a differentiated but unproven at scale claim.
            claimRefs:
              - CM001
              - CM003
              - CM004
              - CM005
              - CM006
