      - number: '1.3'
        title: Funding History and Investor Composition
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics has raised approximately $200 million or more in total capital across three disclosed
              rounds. The first major institutional round, closed in July 2023, raised approximately $55 million (€50
              million), led by Lingotto Investment Management, Vsquared Ventures, PRIMEPULSE, and HV Capital. Notably,
              the order book at announcement exceeded $450 million — more than eight times the round size — signaling
              substantial investor demand beyond the closed amount. In October 2023, InterAlpen Partners contributed an
              additional $16 million as a round extension.

              In January 2025, NEURA closed a €120 million Series B. Investors included Lingotto Investment Management,
              PRIMEPULSE, Vsquared Ventures, HV Capital, InterAlpen Partners (all returning), plus new entrants
              BlueCrest Capital Management and L-Bank Baden-Württemberg — a German state development bank, adding a
              quasi-strategic government-adjacent dimension. The company has not disclosed a formal valuation in
              connection with any round. No audited financial statements are publicly available, and revenue at scale
              from robot deployments has not been confirmed. The investor base is dominated by European growth capital
              and strategic industrial investors, consistent with NEURA's German market positioning.
