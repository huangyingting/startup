        blocks:
          - type: paragraph
            body: >
              Neura Robotics faces significant customer concentration risk stemming from its early pre-commercial
              status. The company's visible pipeline consists of a small number of automotive OEM engagements, making
              prospective revenue highly vulnerable to single-customer pilot failure, procurement freeze, or automotive
              sector cyclicality. Unlike established industrial robot vendors such as KUKA, Fanuc, and Yaskawa that
              serve hundreds of customers across diverse industries, Neura Robotics enters 2026 without a publicly
              confirmed multi-customer revenue base. This creates binary risk: if the Daimler Truck pilot fails to
              convert, or BMW Group concludes evaluation without commitment, Neura would lose its two most visible
              customer references and face significant market credibility risk. The automotive sector itself is under
              structural and cyclical pressure in 2025–2026, including EV transition costs, labor negotiations, and
              capital allocation constraints that may extend pilot-to-deployment timelines beyond initial projections.
              Analyst and investor commentary has raised questions about whether humanoid robots can achieve economic
              viability on timelines consistent with current venture capital investment cycles. Neura Robotics has not
              publicly disclosed customer churn metrics, pilot success rates, or conversion rates, leaving commercial
              momentum difficult to assess objectively. The heavy dependence on automotive customers also means that a
