      - number: '6.4'
        title: Use Cases and Value Proposition
        blocks:
          - type: paragraph
            body: >
              Neura Robotics' customer value proposition centers on the combination of high payload capacity, bipedal
              mobility enabling deployment in human-designed factory infrastructure, and integrated AI-driven task
              planning. MAiRA's 60 kg payload capacity differentiates it from lighter humanoid competitors and directly
              addresses automotive and logistics use cases involving heavy component transport and ergonomically
              demanding assembly tasks that generate high worker injury rates. The robot's ability to operate in
              standard factory aisles, workstations, and existing equipment layouts reduces customer capital expenditure
              compared to purpose-built automation requiring facility redesign or dedicated work cells. Key use cases
              include heavy lifting and material transport, quality inspection with embedded machine vision, assembly
              assistance for semi-structured repetitive tasks, pick-and-place and palletizing logistics operations, and
              early-stage healthcare applications. The Neuraverse platform adds recurring software value through remote
              diagnostics, task programming, and fleet management, creating a software subscription revenue stream that
              accompanies hardware sales and generates switching costs for customers who have trained the system on
              their specific environments. For automotive OEM customers, the primary financial driver is labor cost
              substitution in ergonomically demanding, high-turnover roles. For logistics customers, throughput
              optimization and 24/7 operational availability are central to the business case.
