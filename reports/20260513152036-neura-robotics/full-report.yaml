    layout: wide
    title: Exit Optionality Map — Probability vs. Expected Value Score
    summary: >-
      Two-dimensional map of exit options for Neura Robotics investors. The x-axis represents estimated realisation
      probability (0=very low, 10=very high) over a five-year horizon; the y-axis represents expected value creation
      score (0=minimal, 10=maximum). Positions are directional and based on analyst judgment as of mid-2026.
    approximationNotes: >-
      All positions are analyst estimates based on comparable M&A transactions, market conditions, and strategic
      rationale. The partial exit (strategic minority) is treated as highest probability but lower absolute value than a
      full acquisition. Down-round/distress scenario included to represent the left-tail risk case.
    data:
      points:
        - label: Strategic M&A — Automotive OEM
          x: 6
          'y': 7
          detail: BMW/Mercedes/Daimler — high strategic fit; existing pilots; medium-high 5-yr probability
        - label: Strategic M&A — Industrial Automation
          x: 5
          'y': 8
          detail: Siemens/ABB/Bosch — very high potential value; slightly lower near-term probability
        - label: IPO — Frankfurt / Nasdaq
          x: 3
          'y': 9
          detail: Highest absolute value creation potential; lowest probability (2030-2033 earliest)
        - label: Secondary PE Buyout
          x: 2
          'y': 4
          detail: Below-average fit and probability for pre-revenue hardware; modest value range
        - label: Strategic Minority Stake
          x: 8
          'y': 4
          detail: Qualcomm/NVIDIA/Tier-1 — highest near-term probability; partial value only
        - label: Down-round / Distress M&A
          x: 2
          'y': 2
          detail: Bear tail risk — low probability, low value if commercialisation fails entirely
