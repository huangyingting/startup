  - id: FM001
    type: pyramid
    layout: standard
    title: Market Sizing Lens
    summary: >-
      TAM/SAM/SOM hierarchy for NEURA Robotics across global industrial automation and humanoid robot markets, with
      estimates in USD billions by 2028–2030. Each layer narrows scope from total addressable to near-term attainable.
    approximationNotes: >-
      All estimates are derived from IFR, Goldman Sachs (via secondary sources), and analyst paywalled reports. Ranges
      are wide due to high uncertainty in humanoid market forecasts. SOM figures are scenario-based, not
      company-disclosed.
    data:
      nodes:
        - id: tam
          label: 'TAM: Global Industrial Automation + Service Robots + Humanoid (~$38–55B by 2030E)'
          detail: >-
            IFR: $18B+ industrial robots, $19B+ service robots. Goldman Sachs: humanoid alone $38B by 2035. Total
            automation market convergence drives upside case.
        - id: sam-eu-asia
          label: 'SAM: EU + Asia-Pacific Cognitive Cobots and Advanced Humanoids (~$4–8B by 2028E)'
          detail: >-
            Cobots $1.4B in 2024 growing 20%+ CAGR. Service robots $19B+ with humanoid sub-segment emerging. NEURA's
            geographic footprint narrows to Europe and China/Japan.
        - id: som-cobot
          label: 'SOM (Y1–Y3): MAiRA/LARA Cobot Deployments — ~$50–150M (based on order-book conversion)'
          detail: >-
            NEURA's $450M+ order book at partial fill rates. Cobots are the near-term revenue engine; priced at premium
            versus mass-market cobots.
        - id: som-humanoid
          label: 'SOM (Y3–Y5): Extended Humanoid + Service Robot Deployments — ~$150–300M+'
          detail: >-
            4NE1 commercial deployment at scale. MiPA/service robot expansion. Depends on resolving production ramp
            risk. IFR cautions mass adoption not near-term.
        - id: som-platform
          label: 'Adj. SOM: Neuraverse Platform Recurring Revenue — Incremental Upside'
          detail: >-
            App store model could layer recurring software revenue onto hardware installs. Magnitude unknown; not
            publicly quantified.
