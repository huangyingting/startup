  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The humanoid and cognitive robotics market in 2026 presents a highly fragmented competitive landscape
              characterized by rapid capital formation, divergent product strategies, and the complete absence of any
              competitor — including NEURA Robotics — at mass commercial production scale. At least eight well-funded
              humanoid robot programs are active globally, alongside established cobot incumbents (Universal Robots,
              ABB, KUKA, Fanuc) in NEURA's industrial segment.

              Competitors divide across three strategic dimensions. First, geography: NEURA is the sole European-native
              scaled humanoid player, competing against North American startups (Figure AI, Apptronik, Agility Robotics,
              1X Technologies, Sanctuary AI, Tesla) and Chinese producers (Unitree, Fourier Intelligence). Second,
              product scope: NEURA offers the industry's broadest portfolio — cobots (MAiRA, LARA), AMRs (MAV), personal
              assistants (MiPA), and humanoids (4NE1) — while all direct humanoid competitors are single-product or
              narrow-portfolio. Third, business strategy: most humanoid competitors target either industrial automation
              (Figure AI, Apptronik, Agility) or consumer (1X Technologies, Tesla Optimus), while NEURA targets both
              concurrently via its platform ecosystem.

              NEURA's 1,200+ employee workforce is notable for a European robotics company of its funding stage,
              suggesting significant operational scale relative to capital raised. The company's EU regulatory alignment
              and Neuraverse platform ecosystem represent structural differentiation that is architecturally difficult
              for US-based or Chinese competitors to replicate quickly.
            claimRefs:
