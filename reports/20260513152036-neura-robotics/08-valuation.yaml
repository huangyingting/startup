    body: >-
      Neura Robotics has not publicly disclosed a post-money valuation at any financing round
      including the EUR 120M Series B closed January 2025. All valuation figures cited in this
      chapter are analyst estimates derived from comparable-transaction benchmarking and should
      not be presented as confirmed, market-clearing, or audited prices to any investor audience.
    claimRefs:
      - CV001
      - CV002
      - CV036
  - calloutType: risk
    title: Pre-Revenue Execution Risk Compresses Valuation Confidence Interval
    body: >-
      Neura Robotics remains definitively pre-commercial as of mid-2026. The implied valuation
      range of EUR 500M–1B is entirely forward-looking and contingent on first commercial
      deployments materialising in the 2026–2027 timeframe. Any significant delay compresses
      the valuation toward the bear case range of EUR 300–500M and raises near-term financing
      risk as Series B runway is estimated at 8-12 months from close.
    claimRefs:
      - CV023
      - CV037
      - CV041
  - calloutType: insight
    title: EU Regulatory Tailwind Creates Structural Competitive Advantage
    body: >-
      The EU AI Act and GDPR data-sovereignty requirements create structural advantages for a
      European humanoid robotics platform within European supply chains, potentially commanding
      a valuation premium relative to US or Chinese alternatives when competing for automotive
      OEM contracts. This regulatory moat is a differentiating factor in the investment thesis
      not available to US-domiciled competitors.
    claimRefs:
      - CV032

