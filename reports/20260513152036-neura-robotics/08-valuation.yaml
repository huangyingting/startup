chapter:
  number: 8
  title: Valuation
  summary: >
    Neura Robotics GmbH has not publicly disclosed a valuation at any financing round, making all
    pricing analysis dependent on comparable-transaction benchmarks against US and European humanoid
    robotics peers. Analyst estimates place the implied pre-money valuation at EUR 500M–1B following
    the January 2025 Series B, with a scenario range spanning EUR 300M (bear) to EUR 2.5B (bull)
    depending on commercialisation timing, competitive dynamics, and progress toward first paid
    deployments in automotive manufacturing environments.

sections:
  - id: S01
    title: Valuation Basis and Methodology
    body: >
      Neura Robotics GmbH operates as a privately held German limited liability company and has not
      disclosed a post-money valuation at any stage of its funding history, including the EUR 120M
      Series B closed in January 2025. This absence of a confirmed mark-to-market figure is common
      among European deep-tech hardware startups, where investors and management frequently elect to
      suppress public valuations to avoid creating anchors that complicate future financing rounds or
      acquirer negotiations. As a consequence, all valuation estimates for Neura Robotics are
      analyst-derived and should be treated as informed ranges rather than confirmed figures.

      Standard valuation methodologies applicable to pre-revenue hardware companies include the
      discounted cash flow (DCF) approach, revenue or EBITDA multiples, and comparable transaction
      analysis. The DCF method is not applicable to Neura Robotics in the absence of commercial
      revenue or validated unit economics. Revenue multiples are similarly not meaningful without an
      ARR base. The most analytically useful framework is therefore the comparable transaction
      approach, benchmarking Neura's capital raised, stage, and technology differentiation against
      recent financing events and acquisitions in humanoid and advanced robotics. A secondary
      cross-check using a stage-matched venture capital multiple on invested capital can provide a
      broad calibration range. European deep-tech hardware companies have historically traded at a
      20-30% discount to US peers due to lower institutional investor liquidity, a smaller domestic
      tech investor base, and higher cost of capital — a discount that must be factored explicitly
      into any US peer comparison applied to Neura Robotics.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
