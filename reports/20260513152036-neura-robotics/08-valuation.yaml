  - id: S04
    title: Exit Optionality and Strategic Acquirer Map
    body: >
      Neura Robotics' most probable near-to-medium-term exit path is a strategic acquisition by
      an automotive OEM or industrial automation conglomerate with a compelling strategic rationale
      for owning a proprietary humanoid robotics capability. BMW, Mercedes-Benz, and Daimler Truck
      are the most logical automotive acquirers given their existing pilot engagements with Neura
      and their publicly stated manufacturing automation investment priorities. A deal structure
      involving staged equity acquisition — beginning with a minority strategic stake and
      progressing to full acquisition following commercial proof points — would be consistent with
      precedents in German industrial M&A and would allow both parties to de-risk the transaction.

      Industrial automation conglomerates represent a second tier of potential acquirers. Siemens,
      ABB, and Bosch each have established industrial robotics and factory automation franchises
      that would benefit strategically from humanoid robot capabilities for unstructured-environment
      tasks beyond the reach of current fixed-arm systems. Siemens Digital Industries and ABB
      Robotics divisions carry both the financial capacity and strategic motivation for a
      transaction in the EUR 1-3B value range. An IPO is a plausible but longer-dated exit,
      realistically achievable in the 2030-2033 timeframe assuming successful revenue scaling and
      favourable conditions for deep-tech hardware listings on the Frankfurt Stock Exchange or
      Nasdaq. Secondary private equity buyout is not considered a natural fit given the
      capital-intensive pre-revenue profile and the long payback horizon that PE return
      requirements typically demand. The Qualcomm partnership announced in March 2026 introduces
      a fourth optionality vector: a staged strategic equity acquisition by a semiconductor or
      technology platform company seeking to own the reference design for AI-on-device humanoid
      robotics compute.
