  evidenceGaps:
    - id: EV001
      type: private-evidence-only
      severity: material
      topic: Confirmed Series B post-money valuation
      missingEvidence: >-
        No public disclosure of a post-money valuation exists for the Neura Robotics Series B
        closed in January 2025, or for any prior financing round. The EUR 500M-1B implied range
        is an analyst estimate based on comparable transactions and has not been confirmed by
        the company, any investor communication, or any regulatory filing in any jurisdiction.
      whyItMatters: >-
        Without a confirmed valuation, investors cannot assess historical dilution, the relative
        entry price across financing rounds, whether future financing terms represent an up-round
        or down-round, or what implied return multiple existing investors are targeting at exit.
        All valuation judgments remain anchored to unverified comparable estimates that could be
        materially wrong in either direction.
      diligencePath: >-
        Request post-money valuation at Series A and Series B directly from Neura Robotics
        management via a formal data room process. Cross-reference with German commercial registry
        (Handelsregister) filings for GmbH shareholder structure data. Engage Lingotto and
        PRIMEPULSE investor relations for cap table confirmation.
      relatedQuestionRefs:
        - QV002
        - QV003
        - QV029

    - id: EV002
      type: no-public-data
      severity: low
      topic: Series C fundraising status as of mid-2026
      missingEvidence: >-
        No public announcement of a Series C fundraising process has been identified as of May
        2026. Given the estimated 8-12 month runway from the January 2025 Series B close, a
        Series C process would be expected by mid-2026 at the latest, but no public confirmation,
        leaks, or press reporting of an active process have been identified.
      whyItMatters: >-
        If Series C terms are below the implied Series B entry price, it constitutes a down-round
        that resets valuation expectations and signals commercial execution risk. Absence of
        announcement may indicate a confidential process, a delayed timeline due to difficult
        market conditions, or prior quiet financing not yet publicly reported.
      diligencePath: >-
        Monitor PitchBook, CB Insights, and German financial press (Handelsblatt, Manager Magazin)
        for Series C announcements. Engage directly with existing investors Lingotto and PRIMEPULSE
        to confirm current funding status, target raise size, and Series C timeline expectations.
      relatedQuestionRefs:
        - QV013
        - QV030

    - id: EV003
      type: coverage-gap
      severity: low
      topic: Comparable valuation table completeness — TV001
      missingEvidence: >-
        The comparable valuation table (TV001) covers the most relevant publicly available
        comparables but cannot be exhaustive; private round data, undisclosed M&A multiples,
        and secondary market marks remain unavailable. Several robotics-adjacent comparables
        (e.g., Apptronik, 1X Technologies) have no verified valuation disclosure.
      whyItMatters: >-
        An incomplete comparable set may systematically over- or under-state implied valuation
        ranges, distorting the bull/base/bear scenario probabilities.
