  - id: S02
    title: Comparable Company Analysis
    body: >
      The global humanoid robotics investment landscape provides a growing set of comparable
      financing transactions against which Neura Robotics can be benchmarked. Figure AI, the
      San Francisco-based startup backed by a consortium including Microsoft, OpenAI, and NVIDIA,
      raised $675M in February 2024 at a reported pre-money valuation of $2.6B — the most
      prominent publicly disclosed valuation data point in the category. Apptronik, an
      Austin-based competitor with NASA heritage, has raised approximately $1B in total capital
      and is reported to carry an implied valuation of approximately $5B following its 2024-2025
      financing activity, though this figure has not been independently confirmed from primary
      sources.

      Boston Dynamics, the gold standard of advanced robotics commercialisation, was acquired by
      Hyundai Motor Group in 2021 for approximately $1.1B; analysts estimate its current
      standalone value at $2-3B following years of Atlas and Spot platform commercialisation.
      Agility Robotics was acquired by Amazon in 2023 to anchor its warehouse automation
      strategy, but deal terms were not publicly disclosed by either party. In Europe, 1X
      Technologies (Norwegian) raised approximately EUR 100M in its Series B, with an implied
      valuation estimated at approximately EUR 500M — a direct European peer comparison. Unitree
      Robotics distributes its G1 humanoid product at approximately $16,000, implying a
      volume-based model distinct from the platform-value approach pursued by Neura Robotics and
      US peers. Applying a 20-30% EU discount to the Figure AI and Apptronik reference points,
      and adjusting for Neura's EUR 120M Series B scale, yields an implied valuation range of
      EUR 500M–1B for Neura Robotics on a pre-money basis. The weighted midpoint of disclosed
      and estimated comparable transaction data anchors the base case at approximately EUR 700M–1B.
