  - id: S06
    title: Valuation Risks and Diligence Gaps
    body: >
      Multiple material risk factors constrain the valuation thesis and must be explicitly
      acknowledged in any investment analysis of Neura Robotics. The most fundamental is the
      complete absence of a publicly disclosed valuation at any round: all figures cited in this
      chapter are analyst estimates derived from comparable transactions and should not be
      presented as confirmed or market-clearing prices to any investor audience. The absence of
      disclosed revenue — Neura Robotics is definitively pre-commercial as of mid-2026 — means
      no ARR-based or EBITDA-based multiple approach can be grounded in observed company
      financials, making the analysis entirely forward-looking and assumption-dependent.

      The competitive landscape has intensified materially since Neura's Series A: Figure AI,
      Tesla Optimus, Apptronik, and Chinese competitors Unitree and Xiaomi all represent
      well-funded threats. Tesla's ability to fund Optimus development internally and deploy at
      Tesla manufacturing scale represents an asymmetric competitive risk that could compress
      the addressable market available to independent humanoid robotics companies. Hardware
      manufacturing at commercial scale poses execution challenges that software-focused companies
      do not face: supply chain complexity, component yield rates, field reliability requirements,
      and safety certification timelines all increase cost structures and extend the path to
      profitability. The EUR 120M Series B, while the largest European humanoid robotics raise,
      provides a limited estimated runway of 8-12 months at current burn rates, creating a
      near-term financing risk if Series C terms prove unfavourable or if the process is delayed.
      Investors conducting diligence should request full cap table disclosure, liquidation
      preference waterfall documentation, and any existing shareholder agreements before making
      valuation judgments or investment commitments.
