  - id: S03
    title: Scenario Analysis and Valuation Range
    body: >
      Given the absence of a disclosed valuation and the binary nature of commercialisation
      risk, a three-scenario framework is the most appropriate method for expressing the
      uncertainty range around Neura Robotics' implied value. The bear case assigns an implied
      valuation of EUR 300–500M, reflecting a scenario in which commercial deployments are
      delayed beyond 2026, competition from Tesla Optimus and well-capitalised US peers erodes
      first-mover advantage, and a Series C is raised at flat or down-round terms relative to
      the inferred Series B entry price. This scenario is assigned a probability of approximately
      25%, reflecting meaningful but not dominant downside risk.

      The base case — assigned approximately 50% probability — places the implied valuation at
      EUR 700M–1B, contingent on at least one publicly announced commercial automotive OEM
      deployment by end-2026 and a Series C raise at a modest premium to current implied
      levels. The bull case (25% probability) envisions multiple automotive contracts, early
      Neuraverse subscription revenue materialising as a recurring income layer, and strategic
      acquirer interest driving a valuation of EUR 1.5B–2.5B. A strategic acquisition premium
      of 30-50% above standalone value would be typical in industrial robotics M&A, potentially
      extending the bull case ceiling further to EUR 2.1B–3.5B. The probability-weighted
      expected value across all three scenarios is approximately EUR 850M–1.2B, broadly
      consistent with the comparable transaction midpoint range. Any scenario outcome remains
      highly sensitive to the timing of first publicly disclosed commercial revenue, which
      constitutes the primary valuation catalyst to monitor in the near term.
