  evidenceGaps:
    - type: missing-source
      severity: material
      topic: humanoid robot commercial pricing
      missingEvidence: >-
        Pricing for NEURA 4NE1, Figure AI Figure 03, Apptronik Apollo, Agility Robotics Digit,
        and Boston Dynamics Atlas is not publicly disclosed by any of these companies as of May 2026.
        No third-party purchasing data or lease terms have been publicly reported. Only Unitree
        (G1 at ~$16K, H1 at ~$90K) and Tesla's stated target price ($20K–$30K goal, unconfirmed)
        provide public benchmarks.
      whyItMatters: >-
        Without pricing data, competitive price positioning analysis is speculative. Buyers cannot
        independently evaluate whether NEURA's premium cognitive cobot and humanoid pricing is
        defensible versus enterprise alternatives. The absence of pricing evidence makes the
        "Pricing and Packaging Comparison" table partially empty with evidence gaps rather than
        confirmed competitive intelligence.
      diligencePath: >-
        Request NEURA management for their internal competitive pricing intelligence. Review any
        government procurement databases or industry analyst paywalled reports covering robot
        contract values. Interview enterprise customers of both NEURA and competitors under NDA.
      relatedTableRefs:
        - TP003

    - type: private-evidence-only
      severity: material
      topic: Agility Robotics Digit commercial scale and revenue
      missingEvidence: >-
        The commercial scale, unit count, revenue terms, and specific deployment details for
        Agility Robotics Digit at Amazon facilities are not publicly disclosed. While "active
        deployment" is publicly confirmed, the fleet size, deployment locations, performance
        metrics, and financial terms of the Amazon relationship are internal.
      whyItMatters: >-
        Agility Robotics represents the only confirmed commercial-scale humanoid deployment in
        the competitive set. Understanding deployment scale and economics would provide the
        clearest signal of what commercial humanoid unit economics look like in practice —
        essential context for evaluating NEURA's $450M+ order book credibility.
      diligencePath: >-
        Monitor Amazon logistics operational disclosures. Seek industry analyst reports on
        Amazon warehouse automation spend and robot unit economics. Track Agility Robotics
        press releases and public statements from Amazon operational leadership about Digit performance.
      relatedTableRefs:
        - TP003

