    title: Competitive Moat and Readiness KPIs
    summary: >-
      Key competitive moat indicators and readiness signals assessing NEURA Robotics' current position
      on dimensions material to competitive durability as of May 2026. KPI values are qualitative
      assessments based on publicly available information.
    approximationNotes: >-
      No third-party audit has validated these positions. Values represent the research team's assessment
      of NEURA's relative standing on each dimension based on public information, company announcements,
      and press coverage as of May 2026.
    data:
      items:
        - label: EU Regulatory Moat
          value: Strong
          detail: >-
            EU AI Act native compliance; non-EU entrants face significant retrofit burden to access NEURA's
            home market and broader European enterprise customers
        - label: Portfolio Breadth vs Peers
          value: Market-Leading
          detail: >-
            Only major player with cobots + AMR + humanoid + personal assistant; all direct humanoid
            competitors are single-product or narrow-portfolio
        - label: Capitalization Relative to Peers
          value: Below-Peer
          detail: >-
            ~$200M raised vs Figure AI $675M and Apptronik ~$1B; material funding gap creates R&D
            velocity and manufacturing scale risk
        - label: AI Ecosystem Depth
          value: Developing
          detail: >-
            AURA + Neuraverse + NVIDIA + Qualcomm partnerships; not yet at DeepMind or Tesla AI scale;
            platform approach is architecturally differentiating
        - label: Commercial Traction
          value: Pre-Commercial
          detail: >-
            $450M+ order book (company-claimed); no confirmed mass production revenue; comparable to
            Figure AI and Apptronik pilot stages but behind Agility Robotics (Amazon deployments)
        - label: Manufacturing Scale Risk
          value: High Risk
          detail: >-
            Tesla manufacturing scale potential represents existential price pressure if Optimus reaches
            automotive production volumes; NEURA must lock in enterprise customers before this scenario
        - label: Chinese Low-Cost Threat
          value: Active
          detail: >-
            Unitree G1 at ~$16K is commercially available now; defines the market price floor that
            NEURA must differentiate against with every enterprise sales engagement
    claimRefs:
      - CP012
      - CP030
      - CP031
      - CP040

