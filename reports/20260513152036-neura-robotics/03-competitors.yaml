  - id: S06
    title: Competitive Risks and Threats
    body: >
      Three material competitive risks demand diligence attention.

      First, Tesla's manufacturing scale advantage. Tesla's potential to manufacture Optimus at automotive
      scale — potentially targeting $20,000–$30,000 per unit against NEURA's enterprise pricing — represents
      an asymmetric threat. If Tesla achieves automotive-scale humanoid production, NEURA's premium pricing
      model would face existential pressure in any application where raw capability parity is sufficient.
      Tesla's AI infrastructure, Full-Self-Driving stack, and Dojo training system provide AI capabilities
      that NEURA's AURA system has not yet been tested against at comparable scale.

      Second, the Chinese cost floor. Unitree G1 at approximately $16,000 is commercially available today
      and represents a credible general-purpose research and light-industrial platform. Chinese manufacturers
      can iterate rapidly due to policy support and domestic supply chain depth. NEURA must consistently
      justify a significant price premium across every customer engagement.

      Third, the capitalization gap. NEURA's approximately $200 million total raised compares unfavorably
      to Figure AI ($675M), Apptronik (~$1B), and the implicit resources of Hyundai/Boston Dynamics and
      Amazon/Agility Robotics. No humanoid robot company has demonstrated mass commercial production at
      scale. In a capital-intensive hardware scale-up race, NEURA's funding gap is a structural risk that
      must be addressed via its next fundraising round.
    claimRefs:
      - CP012
      - CP029
      - CP030
      - CP031
    tableRefs:
      - TP004
    figureRefs:
      - FP003

