      - number: '8.6'
        title: 估值风险与尽调缺口
        blocks:
          - type: paragraph
            body: >
              多个实质风险因素会压住估值逻辑，任何 Neura Robotics
              投资分析都必须明说。最根本的一点是，公司从未公开披露任何轮次估值：本章所有数字都是分析师基于可比交易推导出的估计，不能向任何投资者当作已确认或市场出清价格呈现。收入同样未披露——截至 2026 年中，Neura
              Robotics 明确仍处于商业化前阶段——因此无法用已观察到的公司财务数据支撑 ARR 或 EBITDA 倍数法，分析完全取决于前瞻假设。

              自 Neura Series A 以来，竞争强度显著上升：Figure AI、Tesla Optimus、Apptronik，以及中国竞争者 Unitree、小米，都是资金充足的威胁。Tesla 能用自有资金推进
              Optimus，并在 Tesla
              制造体系的规模上部署，这是一种非对称竞争风险，可能压缩独立仿人机器人公司可触达市场。商业规模硬件制造带来软件公司不面对的执行难题：供应链复杂度、零部件良率、现场可靠性要求、安全认证时间表，都会抬高成本结构、拉长盈利路径。EUR
              120M Series B 虽然是欧洲仿人机器人领域最大一笔融资，但按当前烧钱速度估计，只提供 8-12 个月有限现金跑道；如果 Series C
              条款不利或流程延迟，近期融资风险会升高。做尽调的投资者在判断估值或作出投资承诺前，应要求完整披露股权结构表、清算优先权瀑布文件，以及任何现有股东协议。
            claimRefs:
              - CV036
              - CV037
              - CV038
              - CV039
              - CV041
