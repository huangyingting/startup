  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合概览
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 在欧洲创业公司中拥有最完整的人形机器人和协作机器人产品线之一，五条产品线覆盖 5 kg 到 60 kg 载荷。MAiRA（Multipurpose AI Robot
              Assistant）于 2023 年商业发布，身高 165 cm，载荷 60 kg，是制造和物流部署的旗舰产品。Neura 将 MAiRA 定位为“全球首款认知机器人”；这背后是 CognOS
              操作系统的集成，让用户可用自然语言下达任务，而不是用传统示教器编程。

              4NE1（“For-any-one”）通用人形机器人已连续迭代三代（2022、2024、2025），在资本密集领域里展现出很快开发节奏。面向消费者的 4NE1 Mini 瞄准教育和家庭辅助市场，已宣布将于
              2026 年春开放预订。MiPA（Multipurpose Intelligent Powerhouse Assistant）在 Automatica 2025
              首发，把组合延伸到重型服务场景。LARA（Lightweight Agile Robotic Assistant）是一款协作机械臂，额定载荷 5 kg，服务精密装配；MAV（Mobile Autonomous
              Vehicle）则提供自主物流导航平台，补足人形机器人队列。合起来看，产品组合覆盖制造、物流、服务、消费和装配等垂直场景——以公司当前成熟度，这种宽度并不常见。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
