  - id: FM001
    type: pyramid
    layout: standard
    title: 市场规模测算视角
    summary: NEURA Robotics 横跨全球工业自动化和人形机器人市场的 TAM/SAM/SOM 层级，估计值为 2028–2030 年的十亿美元规模。每一层都从总可用市场收窄到短期可获取市场。
    approximationNotes: 所有估计均来自 IFR、Goldman Sachs（二手来源）和分析师付费报告。人形机器人市场预测高度不确定，区间很宽。SOM 数字基于情景，不是公司披露。
    data:
      nodes:
        - id: tam
          label: TAM：全球工业自动化 + 服务机器人 + 人形机器人（2030E 约 $38–55B）
          detail: IFR：工业机器人 $18B+，服务机器人 $19B+。Goldman Sachs：仅人形机器人到 2035 年为 $38B。整体自动化市场收敛带来上行情景。
        - id: sam-eu-asia
          label: SAM：欧盟 + 亚太认知协作机器人和高阶人形机器人（2028E 约 $4–8B）
          detail: 协作机器人 2024 年为 $1.4B，CAGR 超过 20%。服务机器人 $19B+，人形细分刚开始成形。NEURA 的地域足迹收窄到欧洲和中国 / 日本。
        - id: som-cobot
          label: SOM（Y1–Y3）：MAiRA/LARA 协作机器人部署 — ~$50–150M（基于订单簿转化）
          detail: NEURA 的订单簿超过 $450M，按部分转化率测算。协作机器人是短期收入引擎；定价高于大众市场协作机器人。
        - id: som-humanoid
          label: SOM（Y3–Y5）：扩展人形机器人 + 服务机器人部署 — ~$150–300M+
          detail: 4NE1 实现规模化商业部署。MiPA/服务机器人扩张。取决于能否化解生产爬坡风险。IFR 提醒，大规模采用不会很快到来。
        - id: som-platform
          label: 调整后 SOM：Neuraverse 平台经常性收入 — 增量上行
          detail: 应用商店模式可能在硬件装机基础上叠加经常性软件收入。规模未知，公开信息没有量化。
    claimRefs:
      - CM001
      - CM003
      - CM004
      - CM006
      - CM019
      - CM024
