      - SV002
      - SV005
      - SV006
    claimRefs:
      - CV001
      - CV010
      - CV015
      - CV025
    data:
      items:
        - label: 市场机会
          value: 8
        - label: 技术验证
          value: 6
        - label: 竞争护城河
          value: 7
        - label: 财务健康
          value: 4
        - label: 商业进展
          value: 3
        - label: 风险调整后回报
          value: 5
        - label: 证据质量
