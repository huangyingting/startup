      - number: '7.5'
        title: 制造规模化与供应链风险
        blocks:
          - type: paragraph
            body: >
              硬件创业公司从原型和试点设备转向批量生产时，会遇到已有充分记录的“死亡之谷”。Neura Robotics
              仍处在数百台规模，必须完成复杂爬坡：模具投资、精密执行器和定制硅加速器组件的供应链认证、现场服务和质保退回物流，都会引入资本需求和进度风险，并随规模放大而叠加。CognOS 推理所用的精密谐波减速器、力 /
              力矩传感器和定制 ASIC 组件来自有限供应商群，单一来源依赖形成关键路径暴露。影响半导体供应链的地缘政治紧张——尤其是边缘 AI 推理所需的 NVIDIA Jetson 和 Qualcomm
              Snapdragon 芯片——带来额外采购风险，仅靠库存缓冲无法完全化解。要提升到数千台，公司要么建立重要合同制造合作——带来毛利压缩和 IP 暴露风险——要么建设专用工厂，所需资本开支将与 R&D
              和商业部署预算竞争。大批量质量控制是另一道难题：人形机器人装配复杂、机械公差很紧，使自动化制造变难；欧洲劳动力市场中装配环节人工作业占比高，也会推高单位成本。规模化时的零部件短缺或质量逃逸，可能触发现场召回，在公司承受不起声誉受损的阶段造成严重声誉和财务后果。
            claimRefs:
              - CR025
              - CR026
              - CR027
              - CR028
              - CR029
      - number: '7.6'
        title: 人才、地缘政治与宏观风险
        blocks:
          - type: paragraph
            body: >
              机器人工程人才是科技行业全球争夺最激烈的人才之一。Neura Robotics 争夺感知工程师、控制专家和 AI 研究人员，对手包括资金充足的美国同行、拥有庞大 R&D 预算的德国大型汽车
              OEM，以及越来越多已获融资的欧洲机器人创业公司。德国劳动力市场紧张和工资通胀形成结构性成本压力，在规划期内不太可能缓解。关键人物风险突出：创始人兼 CEO David Reger
              是唯一公开知名度很高的高管，公司愿景、投资者关系和战略伙伴谈判都与其个人品牌紧密绑定。若其无法履职或离职，公司在关键商业爬坡期会面临显著组织不确定性。地缘政治层面，中国国家支持的机器人产业正以成本更低的硬件和越来越强的软件栈瞄准欧洲市场，可能在
              24 个月内削弱 Neura 的定价能力。US–China
              技术出口管制紧张带来双重暴露：公司获取美国芯片技术可能受限，而欧洲客户可能提出供应链来源要求，使组件采购复杂化。宏观层面，衰退或资本市场长期下行会推迟企业采用机器人；客户会优先削减运营开支，而不是增加资本开支，导致收入时间拉长，并在最糟糕的时点进一步压缩现金跑道。
