      - number: '2.5'
        title: 地域与细分机会
        blocks:
          - type: paragraph
            body: >
              欧洲——尤其德国和 DACH 地区——是 NEURA 近期的主要市场。德国是全球第四大工业机器人市场，聚集了大量汽车 OEM、Tier 1
              供应商和拥有自动化预算的精密工程中小企业。Baden-Württemberg（NEURA 所在州）有 Bosch、Mercedes-Benz、Porsche，以及数千家工程中小企业。EU AI Act
              创造了一套合规基础设施，NEURA 这类欧洲本土厂商可以把它转化为相对非欧盟竞争者的结构性护城河，后者面临更复杂的认证路径。欧盟产业政策（包括 European Chips Act
              和机器人研究框架）方向上也提供支持。

              中国是全球最大的单一机器人安装市场，NEURA 的 Hangzhou 办公室正是对这一机会的直接回应。不过，中国市场同时也是竞争最激烈的市场：成本更低、拥有深厚政府客户关系的国资支持厂商占据主导。NEURA
              在中国更可能选择合作 / 授权或高端认知机器人利基，而不是拼规模竞争。

              北美在制造回流激励推动下提供了增长机会，但截至 2026 年 5 月，NEURA 没有确认北美存在或合作。医疗和物流是跨地域垂直市场，预算大，且已证明愿意部署自动化（AGV/AMR
              已被验证；向人形机器人延伸是自然下一步）。消费 / 住宅仍是长周期机会，不确定性很高。
