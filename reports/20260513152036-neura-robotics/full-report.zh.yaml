      - number: '3.3'
        title: 协作机器人与工业机器人竞争
        blocks:
          - type: paragraph
            body: >
              在协作机器人（cobot）细分中，NEURA 的 MAiRA、LARA 和 MAV 产品对阵成熟全球龙头：Universal Robots（全球协作机器人市场领导者，Teradyne 所有）、ABB
              Collaborative Robots、KUKA 和 Fanuc。全球协作机器人市场在 2024 年约 $1.4 billion，并以 20%+ CAGR
              增长。这些成熟玩家受益于数十年的客户关系、广泛系统集成商生态和制造规模，都是 NEURA 当前无法匹配的。

              NEURA 将其协作机器人定位为“认知型”——AURA AI 支持自适应行为，自研视觉系统和 Neuraverse
              平台支持软件技能更新。这种高端定位意味着更高的平均售价，也意味着客户群更窄，集中在愿意为认知适应性而非纯任务吞吐付费的组织。Universal Robots、ABB 和 KUKA 尚未公开推出规模化的 AI
              优先认知协作机器人平台，这就是 NEURA 的近期机会窗口。

              重要的是，主要协作机器人在位厂商（Universal
              Robots、ABB、KUKA、Fanuc）都尚未推出人形平台，使人形机器人细分在近期仍相对隔离于传统协作机器人竞争。不过，成熟协作机器人厂商拥有制造规模、广泛服务基础设施、全球集成伙伴生态和经过认证的安全记录，这些都会形成
              NEURA 必须跨越的显著切换成本。
            claimRefs:
              - CP028
      - number: '3.4'
        title: 低成本中国竞争
        blocks:
          - type: paragraph
            body: >
              对 NEURA Robotics 最具结构性破坏力的竞争威胁，可能来自正在部署低得多成本人形平台的中国制造商。Unitree Robotics 已将 G1 人形机器人商业化，单价约
              $16,000——比任何西方竞争者低一个数量级——并为研究应用推出单价约 $90,000 的 H1。Fourier Intelligence（GR-2）和 UBTECH（Walker
              系列）也是资金充足的中国人形机器人开发商，受益于中国“十五五”规划政策支持和深厚制造供应链优势。中国约占全球年度机器人安装量的 54%，并拥有约 2 million
              台运营中的工业机器人，形成欧洲初创公司无法获得的本土规模优势。

              对 NEURA 而言，中国竞争威胁体现在三条路径：（1）价格压力迫使高端定价必须被证明合理——NEURA 必须持续证明其认知和可靠性优势值得相对 Unitree
              价格支付显著倍数；（2）政府支持资本造成不均衡竞技场，尤其当中国人形机器人公司开始瞄准欧洲和亚太出口市场；（3）潜在质量收敛，中国制造商借助低单位经济性下的迭代部署缩小能力差距。欧盟贸易政策和 EU AI Act
              合规要求目前在欧洲市场为 NEURA 提供一定缓冲，但这种保护既非永久，也非普遍。
            claimRefs:
              - CP016
              - CP026
              - CP027
              - CP037
      - number: '3.5'
        title: NEURA 的竞争定位与差异化
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics 占据一个结构上独特的竞争位置，因为它组合了没有任何单一直接竞争者能够复制的因素。公司的欧盟本土身份使其整个产品架构——硬件、软件和 AI——原生对齐 EU AI Act
              合规要求，而北美和中国竞争者进入欧洲市场时必须补做合规。这在 NEURA 的本土市场和更广泛欧盟区域创造了结构性护城河。

              NEURA 的产品组合宽度无人匹敌：MAiRA 和 LARA 认知协作机器人、MAV 自主移动机器人、MiPA 个人助手、4NE1 人形机器人，共同覆盖四个不同机器人类别，并运行在同一个平台之上。4NE1 身高
              180cm，重 80kg，支持 10-100kg 载荷范围，速度 5 km/h，并被 NEURA 称为“欧洲首款可量产人形机器人。” 第三代 4NE1 已在 automatica 2025
              发布。这种宽度带来交叉销售机会，也形成“全栈自动化”供应商定位，是只做人形机器人的竞争者无法提供的。

              Qualcomm Dragonwing IQ10 处理器集成（2026 年 3 月）和 NVIDIA 生态合作，让 NEURA 获得通常只有大得多玩家才能拿到的芯片级性能。Neuraverse
              平台被设想为机器人应用商店，让机器人通过软件更新获得技能；这一商业模式差异化尚未被任何直接人形机器人竞争者公开复制，未来可能在硬件之外创造经常性软件收入。4NE1 的 10–100kg
              载荷规格超过多数公开报道的人形机器人竞争者载荷，是有意义的工业能力优势。
