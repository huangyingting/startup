      - number: '6.2'
        title: 目标客户细分
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 以机器人产品线瞄准五类主要客户。汽车 OEM 是近期最主要的可寻址市场：装配环境结构化，劳动成本压力明确，重型部件岗位存在人体工学风险，也有工业机器人采用先例。MAiRA 的 60
              kg 载荷能力直接对应汽车工厂常见的重型部件搬运、质量检测和物料运输任务。物流与仓储细分规模很大——全球估计 $10–20
              billion——但在拣选和码垛上必须以速度和灵巧度对抗成熟专用厂商。医疗健康是更长期市场，应用包括药物分发、患者转运辅助和临床供应管理，但监管门槛和责任问题会拉长销售周期，这在工业场景中并不常见。一般制造业——尤其是中小企业和
              Tier 1 汽车供应商——具备销量潜力，但需要单位成本降到当前硬件经济性以下。最后，4NE1 Mini
              瞄准研究机构和大学，用于建立生态熟悉度和潜在人才管线。每个细分都需要不同销售打法；从产品规格和已有试点关系看，Neura 现有资源最自然服务汽车细分。
