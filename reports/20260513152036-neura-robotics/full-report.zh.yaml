      - number: '5.2'
        title: 技术架构与 CognOS
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 的核心技术差异化集中在 CognOS——内部也称为 AURA。这是一套自研认知操作系统，把具身 AI 和大语言模型（LLM）能力直接接入机器人运行时。CognOS
              让操作人员可用自然语言指令给机器人编程，相比传统工业自动化中的示教器或脚本编程，部署门槛大幅降低。系统支持 ROS 2 中间件和 URDF
              机器人模型描述，既保留与更广泛开源机器人生态的兼容性，也简化了与第三方仿真环境、传感器载荷和企业软件的集成。

              计算层面，Neura 机器人采用 NVIDIA Jetson 处理器承载高性能边缘推理。2026 年 3 月与 Qualcomm 的合作加入 Snapdragon 芯片组集成，瞄准低功耗、更高吞吐的端侧 AI
              工作负载，形成可按机器人推理需求调整的双计算策略。感知由多模态传感器套件处理，包括深度摄像头、LIDAR 和 360
              度环视系统，用于动态环境中的态势感知。力觉和触觉感知支撑安全的人机协作（HRC），确保共享工作空间中的柔顺行为。MAiRA 单次充电运行 8
              小时，并支持无线充电——与可比人形机器人平台相比具有竞争力。这套技术栈从 CognOS 认知推理延伸到自研执行器电子系统，深度足够，使 Neura 相比主要依赖第三方计算或感知模块的创业公司处在更有利位置。
            claimRefs:
