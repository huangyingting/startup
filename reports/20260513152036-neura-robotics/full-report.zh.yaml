      - number: '7.3'
        title: 财务与现金跑道风险
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 尚无收入，估计烧钱速度为每月 EUR 10–15 million，反映出 1,200+ 名员工、硬件 R&D 投资和设施开支。2024 年完成的 EUR 120M Series B
              估计只能提供 8 到 12 个月现金跑道，意味着公司最迟必须在 2026 年中至下半年之前拿到 Series C，才能避免运营中断。硬件创业融资有独特风险：投资者面对漫长 J
              曲线，制造成本结构依赖产量，原型规模下并不有利；人形机器人的物料清单成本相对预期早期商业定价仍然偏高。公司尚未公开披露已确认的大批量客户承诺，显著削弱 Neura 向潜在 Series C
              投资者提供收入可见性的能力，并提高感知融资风险。融资周期拉长、增长资本宏观环境恶化，或竞争者出现技术突破，都可能让 Neura 没有足够资金抵达生产规模单位经济性。稀释风险和降价融资情景不可忽视：如果
              Series C 未实现预期估值上台阶，治理复杂性和员工期权池侵蚀可能加速人才流失，而那恰恰是执行风险最高的时点。
            claimRefs:
              - CR013
              - CR014
