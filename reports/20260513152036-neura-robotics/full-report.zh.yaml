      - number: '5.3'
        title: Neuraverse 平台生态
        blocks:
          - type: paragraph
            body: >
              Neuraverse 于 2025 年推出，代表 Neura Robotics 从硬件向经常性软件收入的战略延伸。Neura 将其定位为全球首个可扩展的机器人应用商店；开发者和系统集成商可向已部署的 Neura
              机器人发布、分发并安装机器人技能包，类似 iOS 或 Android
              应用商店向移动设备交付软件更新。平台包含四个核心支柱：用于多机器人协同的车队管理、用于运营遥测和正常运行时间报告的数据分析、用于实时诊断的远程监控，以及用于技能和固件无缝部署的 OTA 更新管理。

              这一模式可能形成平台护城河：部署机器人越多，第三方开发者创建的技能越多，生态价值就越会复利增长，推高切换成本和每台已部署设备收入。移动机器人领域最接近的可比对象是 Boston Dynamics 的 Orbit
              车队管理平台；Universal Robots 的 UR+ 生态和 ABB 的 RobotStudio 也有相似参照。Neuraverse 计划服务 Neura 全组合的多种形态——从 LARA 机械臂到
              4NE1 人形机器人——相比单一平台生态具备结构性宽度。第三方开发者采用指标和应用目录深度仍未披露；相对 2025 年上线时间，平台商业成熟度将是 Neura 接近 2026–2027 年 4NE1
              量产里程碑时的重要信号。
            claimRefs:
              - CE016
              - CE017
              - CE018
              - CE019
              - CE020
          - type: table
            tableRef: TE003
            claimRefs: []
      - number: '5.4'
        title: 制造与硬件工程
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 有意推进垂直整合，运营内部子公司 Neura
              Electronics，负责控制柜、电力电子模块和定制传感器集成组件的设计与生产。人形机器人创业公司通常更依赖第三方电子合同制造商；Neura
              这种垂直控制程度并不常见，带来更紧的质量控制、更快的硬件迭代周期，也降低了机器人硬件项目长期受困的零部件供应中断暴露。

              主要制造运营设在德国 Metzingen 总部，可受益于德国精密制造生态、深厚工程人才池，以及靠近欧洲汽车和物流客户。Neura 已释放欧盟制造扩张计划，以支撑 4NE1 量产爬坡前预期的销量增长。2026 年
              2 月与 Zimmer Group 的末端执行器集成，体现了在自研不产生竞争优势的部件上选择性使用专业伙伴，同时把电子和软件控制权留在内部。这一组合形成了相对浅垂直整合创业公司的可防御生产架构，也为
              2026–2027 年量产窗口内随产量增长而降本奠定基础。
            claimRefs:
              - CE021
              - CE022
              - CE023
              - CE024
      - number: '5.5'
        title: 技术合作伙伴与计算策略
        blocks:
          - type: paragraph
            body: >
              2024 年初至 2026 年 4 月，Neura Robotics 密集达成一批高价值技术合作，显著增强了计算、仿真、云和生态能力。NVIDIA 在 2024 年提供 Isaac ROS
              人形机器人开发工具的早期访问权，使 Neura 在更广泛的人形机器人开发者社区之前优先拿到 GPU 加速感知算法和训练流水线。2026 年 3 月的 Qualcomm 合作集成 Snapdragon
              芯片组，用于端侧 AI，并推进双计算策略——NVIDIA Jetson 承担密集 GPU 工作负载，Qualcomm Snapdragon 负责高效边缘推理——为架构提供弹性，也让 Neura
              的计算栈能应对未来模型尺寸需求变化。

              AWS 于 2026 年 4 月加入，成为云机器人基础设施伙伴，贡献 ROS 2 集成能力和可扩展计算，支持车队运营、远程诊断和仿真工作负载，并直接接入 Neuraverse 平台后端。Dassault
              Systèmes 2026 年 4 月的 3DEXPERIENCE 合作，可为机器人验证和客户部署规划提供高保真数字孪生仿真，减少实体测试周期。TU Munich 2026 年 3 月与 Neura
              共建欧洲最大的 Physical AI 训练中心，为下一代具身 AI 建立专属研究管线。Zimmer Group 的末端执行器集成扩大了操作类用例的可寻址任务空间。2026
              年初七周内出现四个重要合作伙伴，密度和级别都显示机构对 Neura 技术方向有强信心，发生时间也早于 4NE1 量产门槛。
