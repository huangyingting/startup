      - number: '1.4'
        title: 规模、员工数与关键里程碑
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics 自 2019 年创立以来扩张很快。到 2025/2026 年，公司拥有超过 1,200 名员工，团队来自 45+ 个国籍，并在 8+ 个地点运营。2025 年，公司完成向
              Hangzhou（中国）和 Zurich（瑞士）的国际扩张。

              关键里程碑包括 2022 年 automatica 首秀（第一代 4NE1 首次公开亮相）、2023 年 7 月 $55M 融资和 $450M+ 订单簿、2025 年 1 月 €120M B 轮，以及 2025
              年 MiPA 和 Neuraverse 发布。2024 年与 NVIDIA 的早期访问合作，把 NEURA 嵌入领先的机器人 AI 计算生态。2026 年，NEURA 获得了与 Zimmer Systems（2
              月）、Qualcomm（3 月）、TU Munich 欧洲最大物理 AI 训练中心（3 月）、AWS（4 月）和 Dassault Systèmes（4 月）的合作。每一项合作都把 NEURA
              的覆盖面延伸到工业自动化、半导体 AI 加速、云计算和数字化制造仿真，也在 4NE1 预期量产前共同验证了公司的技术平台。
