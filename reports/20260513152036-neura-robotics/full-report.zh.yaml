      - number: '4.5'
        title: 可比公司财务基准
        blocks:
          - type: paragraph
            body: >
              人形机器人领域在全球吸引了大量风投和战略资本，为评估 Neura Robotics 的财务定位提供了重要基准。在美国市场，Figure AI 是最直接可比公司，截至 2024 年 2 月以 $2.6B 估值融资约
              $675M，资本化规模约为 Neura 累计融资的 3.4x。这一溢价反映美国市场流动性、OpenAI 共同投资和激进的 BMW 合作公告。Agility Robotics 专注 Amazon
              仓库物流自动化，2023 年在累计约 $250M 风险融资后被 Amazon 收购，为整个品类建立了战略收购先例。

              动态机器人先驱 Boston Dynamics 于 2021 年以 $1.1B 售予 Hyundai Motor Group，提供了有意义的 M&A 退出基准。在欧洲，挪威 1X Technologies
              已融资约 EUR 100M，意味着 Neura 是欧洲大陆资本最充足的独立人形机器人公司。Tesla Optimus 则是不可比的内部融资项目，背后是 Tesla
              资产负债表。可比数据揭示出明显的跨大西洋估值差距：美国人形机器人公司在相近技术成熟度下持续以更高估值融资，说明除非 Neura 在美国对手之前证明付费商业部署，或为下一轮引入美国战略型共同领投方，否则 C
              轮可能面临估值折扣。
