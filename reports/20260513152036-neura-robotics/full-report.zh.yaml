  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与分类
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics 竞争的机器人市场横跨三个相互重叠但彼此不同的细分。工业机器人市场——传统关节臂、SCARA 和 delta 机器人——规模最大，全球超过 $18
              billion，服务汽车、电子和重型制造。协作机器人（cobot）子市场 2024 年估计约 $1.4 billion，随着制造商寻找可在人身边工作、而非被安全围栏隔开的灵活自动化方案，该市场正以 20%+
              CAGR 增长。NEURA 的 MAiRA、LARA 和 MAV 产品主要在这一协作机器人子市场竞争。

              服务机器人市场在 2024 年超过 $19 billion（IFR 数据），覆盖物流、医疗、现场服务和新兴消费机器人。NEURA 的 MiPA 和 4NE1
              人形机器人瞄准其中以人为中心的任务环境。人形机器人子类既是服务机器人细分，也是先进工业自动化细分，目前年收入低于 $1 billion；但 Goldman Sachs 预测到 2035 年可达 $38
              billion，因此成为分析师和投资人高度关注的方向。

              现状替代品包括：传统工业机器人（在重复任务中更快、更便宜）、面向物流的专用 AMR/AGV，以及人力（在低工资市场仍有价格竞争力）。NEURA
              的判断是，认知协作机器人和人形机器人能够打开传统机器人与单任务自动化都无法覆盖的工作流——这是一个有差异化但尚未在规模上验证的主张。
