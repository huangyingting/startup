      - number: '1.5'
        title: 产品组合与技术概览
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics 提供五条机器人产品线和生态软件。MAiRA 被称为全球首个商用认知机器人，具备先进机器视觉、空间音频处理和自优化工作流。LARA 是面向工业和近人环境的协作机器人手臂。MAV
              是工业用途的移动自动车辆。MiPA 于 automatica 2025 首次亮相，是一款 AI 驱动的多功能机器人助手，面向家庭和服务场景。

              4NE1（“为所有人”）是公司的人形机器人旗舰，目前已进入第三代（在 automatica 2025 亮相），被营销为首款面向量产设计的人形机器人。面向研究、教育和娱乐的 4NE1 Mini 变体已宣布将在
              2026 年春季交付。所有产品都由 NEURA 自研 AI——AURA 驱动。Neuraverse 平台是一个机器人应用商店，让机器人可以通过软件更新获得新技能，类似智能手机应用生态。内部子公司 Neura
              Electronics 生产控制柜、电力电子和传感器集成，支撑 NEURA 机器人以及接入 Neuraverse 的机队。NEURA 宣称，从 AI、硬件、电子到软件的内部开发模型，是其区别于依赖第三方 AI
              或组件供应商的竞争者的差异化因素。
