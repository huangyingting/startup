      - number: '4.2'
        title: 商业模式与收入架构
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 设计了多层收入架构，把一次性硬件销售与经常性软件订阅和服务收入结合起来——相当于把工业自动化龙头的打法套用到新兴人形机器人品类。主要收入流是按台销售 MAiRA
              平台及其后续产品硬件，市场估计单价在 EUR 100,000-250,000 区间。按这一价格点，100 台商业部署可产生 EUR 10M-25M
              硬件收入；不过考虑到定制化制造流程和有限产量，初期单位经济性很可能不足以达到毛利率盈亏平衡。

              第二层是 Neuraverse 软件订阅平台，提供 AI 任务模块、云端机队管理和远程软件更新能力。这一订阅部分旨在形成类似企业 SaaS
              业务的经常性收入护城河，按每台机器人每年收费。服务和维护合同通常按硬件价值的一定比例定价，构成第三条收入流，提供可预测经常性收入。面向多年期承诺的长期企业部署合同包含前期费用，可在完全商业规模化之前改善现金流可预测性。合起来看，这些收入流提供了一条通往持久经常性收入的可信路径；但能否形成有意义商业体量，仍取决于汽车和相邻工业垂直领域的客户采用速度。
            claimRefs:
