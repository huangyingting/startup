      - number: '2.4'
        title: 市场约束与反向信号
        blocks:
          - type: paragraph
            body: >
              IFR 在 2026 年 5 月的评估非常明确：“作为通用人形工厂助手或进入私人家庭的大规模采用，不会在中短期发生。” 这条来自全球主要工业机器人统计权威的专家警示，是市场分析中最重要的反向信号。IFR
              还提到“形态服从功能”的限制——人体形态未必适合传统机器人擅长的高速、高精度工业任务。在要求毫米级精度和高吞吐的工业生产环境中，工业机器人表现优于人形机器人。IFR
              预计，“十五五”规划期内人形机器人的商业化只会在规划“末期”出现，也就是更接近 2030 年。

              第二个反向信号：截至 2026 年 5 月，没有任何人形机器人公司——包括 Boston Dynamics、Figure AI、Apptronik 或 NEURA——公开确认商业化生产超过 1,000
              台。缺少规模化生产证据，实质性削弱了近期 SOM 估算。

              第三，Unitree、UBTECH、Fourier Intelligence 等中国制造商正在生产成本更低的人形和服务机器人替代品，价格点是欧洲高端制造商无法匹配的。中国本土机器人供应商份额在 2020 至
              2024 年间从 30% 提升到 57%（IFR），显示竞争成熟速度很快。对 NEURA 而言，在大众市场与中国厂商打价格战不可行；靠认知能力和安全认证形成差异化，才是可持续护城河。
            claimRefs:
