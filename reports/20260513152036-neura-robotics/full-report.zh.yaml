      - number: '4.6'
        title: 财务风险与尽调缺口
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 面临多项重大财务风险，投资人和商业伙伴必须谨慎评估。最紧迫的近期风险是现金跑道压缩：如果烧钱速度位于估算高端（EUR 15M+/month），且商业收入延后到 2026 年 Q1
              之后，公司可能在 B
              轮现金跑道窗口内遭遇现金危机，被迫进行稀释性紧急融资或收缩运营。深科技中的硬件优先商业模式，在低产量下单位经济性结构上很难做；人形机器人初期硬件毛利率被普遍预期为负，因而需要依赖高毛利软件和服务收入，才能在规模化后实现整体单位层面盈利。

              一个关键尽调缺口是缺少公开财务报表：作为德国私人 GmbH，Neura Robotics
              无需按上市公司标准发布经审计账目。估值未披露，使外部无法独立评估稀释历史或各轮投资人的相对议价能力。来自资本储备大得多的美国对手的竞争压力——Figure AI 的 $675M 和 Tesla
              内部项目——构成结构性劣势。进行尽调的投资人应争取直接访问管理账、详细员工成本中心拆分、实际试点合同条款和收入确认时间表，并独立确认自 2023 年以来被引用的 $450M+
              订单簿。缺少公开收入数据或经审计财务数据，使本章结论必然依赖第三方估算和已披露融资公告。
