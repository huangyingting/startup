      - number: '8.4'
        title: 退出可选路径与战略收购方地图
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 最可能的近中期退出路径，是被汽车 OEM 或工业自动化集团战略收购；这类买方拥有持有自主人形机器人能力的强战略理由。BMW、Mercedes-Benz 和 Daimler Truck
              是最合理的汽车收购方，因为它们已经与 Neura 有试点合作，并公开表态把制造自动化作为投资优先事项。采用分阶段股权收购结构——先从少数战略股权开始，再在商业验证点出现后推进全资收购——符合德国工业 M&A
              先例，也能让双方降低交易风险。

              工业自动化集团构成第二梯队潜在收购方。Siemens、ABB 和 Bosch 均拥有成熟工业机器人和工厂自动化业务；在当前固定臂系统触及不到的非结构化环境任务中，人形机器人能力会带来战略收益。Siemens
              Digital Industries 和 ABB Robotics 部门都有能力、也有战略动机完成 EUR 1-3B 价值区间的交易。IPO 可行但时间更远；现实上要等到 2030-2033
              年，前提是公司成功扩大收入规模，且法兰克福证券交易所或 Nasdaq 对深科技硬件上市条件有利。二级私募股权收购不算自然适配，因为公司资本密集、仍在收入前，回本周期又长，难以满足 PE 回报要求。2026 年 3
              月宣布的 Qualcomm 合作引入第四条可选路径：由希望掌握端侧 AI 人形机器人计算参考设计的半导体或技术平台公司，分阶段进行战略股权收购。
            claimRefs:
