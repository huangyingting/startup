  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值基础与方法
        blocks:
          - type: paragraph
            body: >
              Neura Robotics GmbH 是一家私人持有的德国有限责任公司，融资历史上任何阶段都未披露投后估值，包括 2025 年 1 月完成的 EUR 120M Series
              B。欧洲深科技硬件创业公司常见这种缺少确认公允估值数字的情况；投资者和管理层经常选择压低公开估值信息，以避免形成会让未来融资轮或收购谈判复杂化的锚。因此，所有 Neura Robotics
              估值估计都来自分析师，应被视为有依据的区间，而非确认数字。

              适用于预收入硬件公司的标准估值方法包括折现现金流（DCF）、收入或 EBITDA 倍数，以及可比交易分析。在缺少商业收入或经验证单位经济性的情况下，DCF 方法不适用于 Neura Robotics。没有 ARR
              基础，收入倍数同样意义有限。因此，最有分析价值的框架是可比交易法，将 Neura
              的融资额、阶段和技术差异化，与人形机器人和先进机器人领域近期融资事件及收购交易对标。再用阶段匹配的风投投入资本倍数作交叉校验，可提供宽泛校准区间。欧洲深科技硬件公司相对美国同行历史上存在 20-30%
              折价，原因包括机构投资者流动性较低、本土科技投资者基础较小，以及资本成本更高；将任何美国同行比较套用于 Neura Robotics 时，必须显式计入这一折价。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              全球人形机器人投资格局提供了越来越多可比融资交易，可作为 Neura Robotics 的基准。Figure AI 是一家位于旧金山的创业公司，背后投资方包括 Microsoft、OpenAI 和 NVIDIA
              在内的财团，2024 年 2 月以据报道 $2.6B 的投前估值融资 $675M——这是该类别最突出的公开估值数据点。Apptronik 是一家拥有 NASA 背景、位于奥斯汀的竞争者，累计融资约
              $1B；据报道，其 2024-2025 年融资活动后隐含估值约 $5B，但这一数字尚未从一手来源独立确认。

              Boston Dynamics 是先进机器人商业化的黄金标准，2021 年被 Hyundai Motor Group 以约 $1.1B 收购；分析师估计，在 Atlas 和 Spot
              平台多年商业化之后，其当前独立价值为 $2-3B。Agility Robotics 于 2023 年被 Amazon 收购，成为其仓库自动化战略支点，但双方均未公开交易条款。在欧洲，1X
              Technologies（挪威）Series B 融资约 EUR 100M，隐含估值估计约 EUR 500M，是直接欧洲同行参照。Unitree Robotics 以约 $16,000 销售 G1
              人形机器人产品，意味着其走的是基于销量的模式，不同于 Neura Robotics 和美国同行追求的平台价值路径。对 Figure AI 和 Apptronik 参考点应用 20-30% 欧盟折价，并按
              Neura 的 EUR 120M Series B 规模调整，可得到 Neura Robotics 投前隐含估值区间 EUR 500M–1B。已披露和估计的可比交易数据加权中点，将基准情景锚定在约 EUR
              700M–1B。
