      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              估算 NEURA 的可寻址市场，需要拼接三种分析师视角。最宽口径的 TAM 是全球工业自动化加服务机器人，到 2030 年约 $35–55 billion，依据 IFR 和分析师共识。IFR 报告称，2024
              年全球运营中的工业机器人存量为 4.28 million 台，年度安装量仍在增长。Goldman Sachs 预计，仅人形机器人这一部分到 2035 年就可能达到 $38
              billion，尽管其来源页面目前不可用；这一数字在行业报道中被广泛引用，也与 MarketsandMarkets 和 Grand View Research 对人形机器人双位数 CAGR 的分析师预测一致。

              NEURA 的 SAM 收窄到欧洲和亚太的认知协作机器人与先进人形平台市场——估计到 2028 年可服务规模为 $4–8
              billion。仅德国就是欧洲制造业工人机器人密度最高的国家，使本土市场成为直接试验场。NEURA 的 Hangzhou 办公室让它能够参与亚太市场，而中国一国就贡献全球年度机器人安装量的 54%。

              3–5 年维度的 SOM 受限于 NEURA 尚处商业化生产前阶段。合理的近期 SOM 可按 $450M+ 披露订单簿的部分交付率估算，为 $50–150 million；如果 Neuraverse
              平台产生经常性软件收入，扩展 SOM 可达 $150–300 million。市场估算存在矛盾：Goldman Sachs 的人形机器人市场预测假设大规模商业采用，而 IFR
              明确限定这不会在近期发生；也没有任何人形机器人公司确认商业化产量超过 1,000 台。
