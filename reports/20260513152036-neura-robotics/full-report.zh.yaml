      - number: '7.4'
        title: 监管与合规风险
        blocks:
          - type: paragraph
            body: >
              欧盟对自主系统的监管环境正快速收紧，并直接影响 Neura Robotics 的商业化时间表。2024 年 8 月生效并分阶段实施的 EU AI
              Act，将在工业或家庭环境中近距离接触人类运行的自主机器人归类为高风险 AI 系统，要求强制合格评定、技术文档和人工监督。高风险要求将于 2026 年 8 月全面执行——正落在 Neura
              预期商业爬坡窗口内。EU Machinery Regulation 2023/1230 取代原 Machinery Directive，并将从 2027 年 1 月起全面执行，为协作机器人引入更新后的 CE
              标志要求，包括强制 ESRB 风险评估和功能安全文档。ISO/TS 15066 规定协作机器人的速度、力和功率限制技术要求，必须可证明合规才能取得 CE 标志。GDPR
              对部署设备在欧盟工作场所生成的传感器数据——摄像头图像、麦克风采集和位置日志——的收集和处理施加义务。在美国，FDA 监督适用于医疗相关机器人应用，FTC 也已表示会加强审查作出自动化决策的 AI
              系统。任何司法辖区的不合规都会带来产品责任暴露，并可能在收入加速关键节点阻断市场进入。
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
