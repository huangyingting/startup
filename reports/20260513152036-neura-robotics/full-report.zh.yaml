      - number: '8.3'
        title: 情景分析与估值区间
        blocks:
          - type: paragraph
            body: >
              鉴于公司未披露估值，且商业化风险呈二元特征，用三情景框架表达 Neura Robotics 隐含价值的不确定区间最合适。悲观情景给出 EUR 300–500M 隐含估值，对应商业部署推迟到 2026
              年以后、Tesla Optimus 和资金充足的美国同行侵蚀先发优势，以及 Series C 以相对推断 Series B 入场价格持平或下行条款完成融资。该情景赋予约 25%
              概率，反映有意义但并非主导的下行风险。

              基准情景赋予约 50% 概率，隐含估值为 EUR 700M–1B，前提是到 2026 年底至少公开宣布一个商业汽车 OEM 部署，并以相对当前隐含水平的小幅溢价完成 Series C。乐观情景（25%
              概率）假设拿下多个汽车合同、早期 Neuraverse 订阅收入作为经常性收入层开始兑现，并由战略收购方兴趣推动估值达到 EUR 1.5B–2.5B。工业机器人 M&A 中，高于独立价值 30-50%
              的战略收购溢价属于典型水平，可能把乐观情景上限进一步推至 EUR 2.1B–3.5B。三种情景的概率加权预期价值约为 EUR
              850M–1.2B，大体符合可比交易中点区间。任何情景结果都高度敏感于首次公开披露商业收入的时间，这也是近期最需要跟踪的主要估值催化剂。
