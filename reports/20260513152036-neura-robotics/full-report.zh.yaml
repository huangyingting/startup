      - number: '7.2'
        title: 竞争与市场位置风险
        blocks:
          - type: paragraph
            body: >
              人形机器人赛道吸引了异常集中的资本，Neura Robotics 直接面对财务和制造资源远强于自己的组织。Tesla Optimus 受益于自有供应链、超级工厂制造基础设施，以及来自 Tesla
              核心汽车业务的交叉补贴——这些结构性优势没有创业公司能够复制。Figure AI 已按 $2.6B 估值融资约 $675M，并拿到 BMW 试点部署，直接瞄准 Neura 追逐的汽车制造细分。Apptronik
              按约 $5B 估值融资约 $1B，并在 Mercedes-Benz 试点 Apollo。Agility Robotics 由 Amazon 全资拥有，已在 Amazon 履约中心部署 Digit
              平台，建立了后来者难以追赶的运营数据护城河。中国竞争者构成新兴成本冲击：Unitree G1 已按约 $16,000 商业销售，估计比 Neura 早期预期定价低 5–10 倍；UBTECH 和 Fourier
              Intelligence 则在中国国家产业政策支持下扩张。Boston Dynamics 保持强品牌资产和既有企业关系。Neura 的 CognOS
              认知层和声称更强的灵巧度，必须尽快转化为客户可验证的性能优势，在低成本替代品把人形机器人价值主张商品化之前，支撑欧洲溢价定价。
