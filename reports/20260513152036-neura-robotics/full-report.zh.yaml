      - number: '6.6'
        title: 客户集中风险与反向评估
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 因仍处在早期商业化前阶段，面临显著客户集中风险。公司可见管线由少数汽车 OEM
              合作构成，潜在收入高度暴露于单一客户试点失败、采购冻结或汽车行业周期波动。KUKA、Fanuc、Yaskawa 等成熟工业机器人厂商服务数百个横跨不同行业的客户；相比之下，Neura Robotics 进入
              2026 年时仍没有公开确认的多客户收入基础。这形成二元风险：如果 Daimler Truck 试点未能转化，或 BMW Group 评估后不作承诺，Neura
              将失去两个最可见客户背书，并面临显著市场信誉风险。2025–2026 年，汽车行业本身承受结构性和周期性压力，包括 EV
              转型成本、劳资谈判和资本配置约束，可能把从试点到部署的周期拉长到初始预测之外。分析师和投资者评论已质疑，人形机器人能否在与当前风险投资周期相匹配的时间线上实现经济可行性。Neura Robotics
              尚未公开披露客户流失指标、试点成功率或转化率，商业动能难以客观评估。对汽车客户的高度依赖也意味着，如果行业下行，公司的商业规模化路径可能受到实质冲击，尤其是在 OEM
              资本开支冻结推迟自动化投资周期、而公司正处关键验证节点时。
