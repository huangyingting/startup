    title: 最终尽调问题表
    summary: >-
      Outstanding diligence questions and data-room requests that must be resolved before any investment conviction can
      be established for Neura Robotics.
    sourceRefs:
      - SV001
      - SV002
    claimRefs:
      - CV001
      - CV015
    columns:
      - 议题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 已确认估值
        - Series B 和 Series A 投后估值未公开披露
        - 没有估值就无法评估入场纪律或回报倍数
        - 正式数据室；交叉核对 Handelsregister 备案
      - - 收入运行率
        - 实际收入或已签 LOI 金额未确认
        - 尚未产生收入是核心商业执行风险
        - 管理层电话；索取经审计财务或 LOI 数据
      - - 股权结构表
        - 股东名单、清算优先权、反稀释条款缺失
        - 优先权堆叠可能完全吃掉普通股上行空间
        - 数据室；与 Lingotto 和 PRIMEPULSE IR 沟通
      - - 客户证据
        - 具名试点客户、交付时间线和商业条款
        - 媒体披露的试点未获验证；真实牵引需要合同证据
        - 客户参考访谈；第三方来源验证
      - - 现金跑道与烧钱速度
        - 当前现金余额、月度烧钱速度和 Series C 时间线未披露
        - 按典型深科技烧钱速度，EUR 120M Series B 现金跑道为 12–18 个月
        - CFO 披露；投资者 IR 沟通
    notes: 任何投资承诺讨论前，必须完成尽调。
