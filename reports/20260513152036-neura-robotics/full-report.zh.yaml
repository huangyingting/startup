      - number: '8.7'
        title: 展品
        blocks:
          - type: callout
            title: 未确认估值：所有估计均由分析师推导
            body: >-
              Neura Robotics 尚未公开披露任何融资轮次的投后估值，包括 2025 年 1 月完成的 EUR 120M Series
              B。本章引用的所有估值数字均为分析师基于可比交易基准推导的估计，不应向任何投资者呈现为已确认、市场出清或经审计的价格。
            calloutType: risk
            claimRefs:
              - CV001
              - CV002
              - CV036
          - type: callout
            title: 商业化前执行风险压缩估值置信区间
            body: >-
              截至 2026 年中，Neura Robotics 仍明确处于商业化前阶段。EUR 500M–1B 的隐含估值区间完全是前瞻性的，取决于 2026–2027 年期间首批商业部署能否落地。任何重大延误都会把估值压向
              EUR 300–500M 的悲观情景，并抬高近期融资风险，因为 Series B 现金跑道估计只有交割后 8-12 个月。
            calloutType: risk
            claimRefs:
              - CV023
              - CV037
              - CV041
          - type: callout
            title: 欧盟监管顺风带来结构性竞争优势
            body: >-
              EU AI Act 和 GDPR 的数据主权要求，为欧洲供应链中的欧洲仿人机器人平台创造结构性优势；在争夺汽车 OEM
              合同时，相比美国或中国替代方案可能获得估值溢价。这个监管护城河是投资逻辑中的差异化因素，美国注册地竞争者不具备。
            calloutType: insight
            claimRefs:
              - CV032
