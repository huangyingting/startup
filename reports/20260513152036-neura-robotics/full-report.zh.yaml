      - number: '3.6'
        title: 竞争风险与威胁
        blocks:
          - type: paragraph
            body: >
              三项重大竞争风险需要尽调重点关注。

              第一，Tesla 的制造规模优势。Tesla 可能以汽车级规模制造 Optimus——潜在目标单价 $20,000–$30,000，对比 NEURA 的企业级定价——这构成非对称威胁。如果 Tesla
              实现汽车级人形机器人生产，在任何只需原始能力达到相近水平的应用中，NEURA 的高端定价模型都会面临生存压力。Tesla 的 AI 基础设施、Full-Self-Driving 技术栈和 Dojo 训练系统提供的
              AI 能力，NEURA 的 AURA 系统尚未在可比规模上接受检验。

              第二，中国成本底线。Unitree G1 约 $16,000，今天已经商业可得，并可作为可信的通用研究和轻工业平台。中国制造商可借助政策支持和本土供应链深度快速迭代。NEURA
              必须在每一次客户互动中持续证明显著价格溢价合理。

              第三，资本化差距。NEURA 累计融资约 $200 million，明显低于 Figure AI（$675M）、Apptronik（~$1B），也低于 Hyundai/Boston Dynamics 和
              Amazon/Agility Robotics 的隐性资源。没有任何人形机器人公司证明自己能够大规模商业化生产。在资本密集型硬件规模化竞赛中，NEURA 的融资差距是一项结构性风险，必须通过下一轮融资解决。
