      - number: '1.3'
        title: 融资历史与投资人构成
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics 已在三轮公开披露融资中累计筹集约 $200 million 或更多资本。第一轮主要机构融资于 2023 年 7 月完成，融资约 $55 million（€50 million），由
              Lingotto Investment Management、Vsquared Ventures、PRIMEPULSE 和 HV Capital 领投。值得注意的是，公告时订单簿已超过 $450
              million，是该轮融资规模的八倍以上，显示出已成交金额之外还有大量投资人需求。2023 年 10 月，InterAlpen Partners 又追加 $16 million 作为该轮延伸融资。

              2025 年 1 月，NEURA 完成 €120 million B 轮。投资方包括 Lingotto Investment Management、PRIMEPULSE、Vsquared Ventures、HV
              Capital、InterAlpen Partners（均为老股东），以及新进入的 BlueCrest Capital Management 和 L-Bank
              Baden-Württemberg。后者是一家德国州级开发银行，为融资加入了近似战略、贴近政府的维度。公司没有在任何一轮融资中披露正式估值。公开渠道也没有经审计财务报表，机器人部署形成的规模化收入尚未得到确认。投资人基础以欧洲成长资本和战略型工业投资人为主，与
              NEURA 的德国市场定位一致。
