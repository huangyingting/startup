          detail: 截至 2026 年 5 月，未有公开确认的完整商业量产部署。管线转化为部署仍是近期首要商业里程碑。
    claimRefs:
      - CU001
      - CU004
      - CU015
      - CU022
      - CU027
  - id: FU002
    type: quadrant
    layout: standard
    title: 客户细分价值图
    summary: >-
      按可触达市场规模（x 轴，相对尺度）和估计 NEURA 平台匹配度（y 轴，基于截至 2026 年 5 月的技术与商业契合度），定位 Neura Robotics
      的五个目标客户细分。细分位置反映当前产品能力，而非长期路线图潜力。
    approximationNotes: 两条轴均采用相对尺度，基于对当前产品市场契合度和公开市场规模的定性评估。X 轴数值已归一化；y 轴反映当前平台匹配度，而非未来路线图。
    data:
      xAxis: 可触达市场规模（相对）
      yAxis: NEURA 平台适配度（当前）
      points:
        - label: 汽车 OEM
          x: 0.85
          'y': 0.9
          detail: 近期最大目标市场，产品—市场匹配度也最强；MAiRA 的有效载荷和工厂兼容性直接覆盖主要用例。
        - label: 物流与仓储
          x: 0.8
          'y': 0.55
          detail: 市场很大，但专用拣选机器人竞争激烈；当前一代只能部分满足速度和灵巧度要求。
        - label: 通用制造
          x: 0.6
          'y': 0.45
          detail: 中小企业和 Tier 1 供应商带来广泛放量空间，但单机成本必须低于当前硬件经济性能支撑的水平。
        - label: 医疗健康
          x: 0.4
          'y': 0.35
          detail: 长期机会可观，但监管周期长、责任风险高；即使用例吸引力强，近期适配度仍有限。
        - label: 科研与教育
          x: 0.2
          'y': 0.65
          detail: 依托 4NE1 Mini 平台，适配度中等；绝对市场较小，但生态建设价值高，近期可触达。
        - label: 消费 / 家庭
          x: 0.5
          'y': 0.2
          detail: MiPA 平台面向长期愿景市场；Neura Robotics 现有产品线目前还无法大规模商业化触达。
    claimRefs:
      - CU011
      - CU016
      - CU026
      - CU034
      - CU035
      - CU038
  - id: FU003
    type: bar
    layout: standard
    title: 竞争对手客户进展对比（2026 年 5 月）
    summary: 截至 2026 年 5 月，基于公开来源报道的已确认试点、部署和客户公告，对头部人形机器人厂商公开披露的客户 / 部署进展作横向评估。数值代表近似已确认客户合作数量。
    approximationNotes: 竞争对手进展数量仅依据公开新闻稿和媒体报道估算；所有厂商实际管线规模很可能更高。Boston Dynamics 数值反映其成熟的多平台客户基础，属于低估。
    data:
      items:
        - label: Neura Robotics
          value: 1
          detail: 一项已确认试点（Daimler Truck，2025）；BMW Group 评估有报道但未确认；另有未具名 OEM 讨论仍在推进。
        - label: Figure AI
          value: 2
          detail: 2024 年宣布 BMW 试点项目；Helix AI 家庭机器人项目作为第二条计划；更多 BMW 相关公告仍在推进。
        - label: Agility Robotics (Digit)
          value: 4
          detail: Amazon 仓储部署在收购后继续推进；已确认多个设施地点；是商业化规模部署最领先的人形机器人。
        - label: Apptronik (Apollo)
          value: 1
          detail: Mercedes-Benz 试点已确认，是主要公开披露客户合作；其他潜在客户未公开宣布。
        - label: Boston Dynamics
          value: 10
          detail: Spot 和 Stretch 平台已建立跨行业客户基础；全球客户达数百家；图中数值为保守示意。
        - label: Unitree
          value: 3
          detail: 以更低价格触达消费和科研客户（G1 约 $16,000）；销量更高但单机收入更低；市场定位不同。
    claimRefs:
      - CU001
      - CU006
      - CU007
      - CU008
      - CU018
      - CU020
      - CU042
  - id: FU004
    type: matrix
    layout: standard
    title: 客户证据质量矩阵
    summary: 截至 2026 年 5 月，对 Neura Robotics 具名客户和伙伴合作的证据质量评估，从公开确认、量产或试点状态、结果披露、证据时效四个维度衡量。红色单元格表示重大缺口。
    approximationNotes: 证据质量评级仅基于公开信息作定性评估；Neura Robotics 掌握的内部商业证据可能显著改变评级。
    data:
      columns:
        - 公开确认
        - 量产 / 试点
        - 结果披露
        - 证据时效
      rows:
        - label: Daimler Truck
          values:
            - 已确认（新闻稿）
            - 试点—评估阶段
            - 未披露
            - '2025'
        - label: BMW Group
          values:
            - 已报道（未确认）
            - 评估—试点前
            - 未披露
            - 2025–2026（未核实）
        - label: 未具名 OEM 1
          values:
            - 未确认
            - 早期洽谈
            - 未披露
            - Unknown
        - label: 科研 / 学术
          values:
            - 间接表明（产品可购买）
            - 试点—4NE1 Mini
            - 未披露
            - '2025'
    claimRefs:
      - CU001
      - CU004
      - CU009
      - CU015
  - id: FR001
    title: 风险热力图——概率与影响
    type: quadrant
    claimRefs:
      - CR001
      - CR006
      - CR013
      - CR019
      - CR025
      - CR030
    data:
      points:
        - label: 技术可靠性
          x: 8
          'y': 9
          detail: 人形机器人 MTBF 仍在数百小时级；CognOS 尚未在生产规模验证
        - label: 制造放量
          x: 7
          'y': 8
          detail: 死亡谷阶段切换；供应链单一来源；资本开支要求高
        - label: 资金续航
          x: 6
          'y': 9
          detail: 尚未产生收入；资金续航期约 8-12 个月；Series C 到 2026 年中至关重要
        - label: 竞争替代
          x: 7
          'y': 9
          detail: Tesla / Figure AI / Apptronik 资金充足；中国厂商成本压力上升
        - label: 监管合规
          x: 5
          'y': 8
          detail: EU AI Act 2026 年 8 月；Machinery Regulation 2027 年 1 月；ISO/TS 15066 缺口
        - label: 地缘政治与供应链
          x: 4
          'y': 7
          detail: 暴露于 NVIDIA / Qualcomm 出口管制；中国竞争对手补贴
        - label: 市场时点
          x: 5
          'y': 6
          detail: 企业采用人形机器人周期 3-5 年；汽车行业资本开支受限
        - label: 关键人风险
          x: 4
          'y': 7
          detail: David Reger 是唯一高曝光核心高管；关键扩张阶段存在接班缺口
  - id: FR002
    title: 竞争威胁时间线——风险何时转急
    type: timeline
    claimRefs:
      - CR006
      - CR007
      - CR009
      - CR019
      - CR013
    data:
      items:
        - date: 2024 Q4
          label: Figure AI BMW 试点扩大
          details: |
            Figure AI 启动扩大版 BMW 制造试点；在 Neura 核心汽车细分市场，资金充足的同类公司在同一 OEM 处加剧直接竞争。
          tone: negative
          claimRefs:
            - CR007
        - date: 2025 Q2
          label: Agility Robotics Amazon 放量
          details: |
            Agility Robotics 的 Digit 部署扩展至 Amazon 履约网络；物流运营数据护城河拉宽；后来者面临更高切换成本壁垒。
          tone: negative
          claimRefs:
            - CR009
        - date: 2025 Q3
          label: Unitree G1 欧盟渠道扩张
          details: |
            Unitree 售价 $16K 的 G1 人形机器人开始在欧盟分销；在价格敏感细分市场，高价西方厂商面临的成本颠覆压力变得具体。
          tone: negative
          claimRefs:
            - CR011
        - date: 2026 Q1
          label: Tesla Optimus 量产目标
          details: |
            Tesla 目标推进 Optimus 量产；人形机器人成本基准可能承受市场定价压力，企业认知也可能转向。
          tone: negative
          claimRefs:
            - CR006
        - date: 2026 Q2
          label: NEURA Series C 融资窗口
          details: |
            预计资金耗尽节点；Series C 必须在 2026 年中前完成，否则关键商业爬坡期可能出现运营中断。
          tone: warning
          claimRefs:
            - CR013
        - date: 2026 Q3
          label: EU AI Act 高风险全面合规截止
          details: |
            高风险 AI 系统的完整合格评定和技术文档要求开始执行；不合规将阻断欧盟产品商业化。
          tone: negative
          claimRefs:
            - CR019
  - id: FR003
    title: 各类风险严重度评分（0-10 分）
    type: bar
    claimRefs:
      - CR001
      - CR006
      - CR013
      - CR019
      - CR025
      - CR030
      - CR034
    data:
      items:
        - label: 技术可靠性
          value: 9
          detail: 极高严重度；MTBF 缺口，CognOS 尚未规模化验证
        - label: 资金续航
          value: 9
          detail: 极高严重度；收入前阶段烧钱，对有限资金续航期形成压力
        - label: 竞争替代
          value: 8
          detail: 高严重度；资本不对称竞争，中国厂商成本颠覆
        - label: 制造放量
          value: 8
          detail: 高严重度；死亡谷阶段切换，供应链单一来源风险
        - label: 监管合规
          value: 7
          detail: 中高严重度；EU AI Act 2026 年 8 月和 Machinery Regulation 截止期
        - label: 地缘政治 / 供应链
          value: 6
          detail: 中高严重度；芯片出口管制，中国市场扩张
        - label: 人才 / 关键人
          value: 6
          detail: 中等严重度；关键人依赖，德国工资通胀压力
  - id: FV001
    type: bar
    layout: standard
    title: 可比公司累计融资额（百万美元 / 欧元）
    summary: 截至 2026 年中，以柱状图对比 Neura Robotics 与全球头部人形及先进机器人同行的累计融资额，展示相对资本化水平，以及 Neura 作为欧洲资本最充足的独立人形机器人公司的位置。
    approximationNotes: >-
      所有数字均为近似值，依据公开披露的美元或欧元融资轮。Boston Dynamics 数值包括 Hyundai 收购前累计风险投资和报道的交易对价。Apptronik
      未确认单一披露总额，图中数字为分析师共识估算。为可比性，Neura Robotics 按约 1.10 USD/EUR 折算。
    data:
      items:
        - label: Figure AI
          value: 675
          unit: USD millions
          detail: $675M 已融资；披露估值 $2.6B（2024 年 2 月）；投资方包括 Microsoft、OpenAI、NVIDIA
          claimRefs:
            - CV008
        - label: Apptronik
          value: 1000
          unit: USD millions
          detail: 累计融资约 $1B；隐含估值约 $5B（分析师估算，2025）
          claimRefs:
            - CV010
        - label: Boston Dynamics
          value: 1500
          unit: USD millions
          detail: 累计融资约 $1.5B+；2021 年被 Hyundai 以 $1.1B 收购；当前估值估算 $2-3B
          claimRefs:
            - CV012
        - label: Agility Robotics
          value: 300
          unit: USD millions
          detail: 融资约 $300M；2023 年被 Amazon 收购，条款未披露
          claimRefs:
            - CV014
        - label: 1X Technologies
          value: 110
          unit: USD millions
          detail: 融资约 €100M（约 $110M）；隐含估值约 €500M；欧洲直接可比公司
          claimRefs:
            - CV016
        - label: Neura Robotics
          value: 200
          unit: USD millions
          detail: 融资约 €185M（约 $200M）；未披露估值；估算 €500M–1B（分析师）
          claimRefs:
            - CV003
  - id: FV002
    type: range
    layout: standard
    title: Neura Robotics 情景估值区间（百万欧元）
    summary: Neura Robotics 在悲观、基准和乐观三种情景下的估值区间（百万欧元），并叠加收购溢价，展示战略 M&A 可能带来的上行空间。区间反映截至 2026 年商业化节奏和竞争动态决定的结果宽度。
    approximationNotes: 所有区间均为分析师估算，来自可比交易基准；Neura Robotics 任何一轮均无已确认估值。收购溢价区间假设在独立估值基础上给予 30%（悲观）和 40%（乐观）的战略溢价，依据工业机器人 M&A 先例。
    data:
      items:
        - label: 悲观情景
          low: 300
          high: 500
          unit: EUR millions
          detail: 商业化延后；Series C 降价轮；概率约 25%
        - label: 基准情景
          low: 700
          high: 1000
          unit: EUR millions
          detail: 2026 年 ≥1 个 OEM 部署；Series C 小幅溢价；概率约 50%
        - label: 乐观情景
          low: 1500
          high: 2500
          unit: EUR millions
          detail: 多个 OEM 合同 + Neuraverse 收入 + 收购方兴趣；概率约 25%
        - label: 收购溢价（悲观）
          low: 390
          high: 650
          unit: EUR millions
          detail: 对悲观独立估值区间施加 30% M&A 溢价；情景叠加项
        - label: 收购溢价（乐观）
          low: 2100
          high: 3500
          unit: EUR millions
          detail: 对乐观独立估值区间施加 40% M&A 溢价；多买方竞价情景
  - id: FV003
    type: quadrant
    layout: wide
    title: 退出路径可选性图——概率与预期价值评分
    summary: Neura Robotics 投资者退出选项二维图。x 轴表示五年期内估计实现概率（0=很低，10=很高）；y 轴表示预期价值创造评分（0=最低，10=最高）。点位为方向性判断，基于截至 2026 年中的分析师判断。
    approximationNotes: 所有点位均为分析师估算，依据可比 M&A 交易、市场条件和战略逻辑。部分退出（战略少数股权）被视为概率最高，但绝对价值低于全资收购。降价轮 / 困境情景纳入左尾风险。
    data:
      points:
        - label: 战略 M&A——汽车 OEM
          x: 6
          'y': 7
          detail: BMW/Mercedes/Daimler——战略契合度高；已有试点；5 年概率中高
        - label: 战略 M&A——工业自动化
          x: 5
          'y': 8
          detail: Siemens/ABB/Bosch——潜在价值很高；近期概率略低
        - label: IPO——法兰克福 / Nasdaq
          x: 3
          'y': 9
          detail: 绝对价值创造潜力最高；概率最低（最早 2030-2033）
        - label: 二级 PE 收购
          x: 2
          'y': 4
          detail: 对收入前硬件公司，契合度和概率低于平均；价值区间有限
        - label: 战略少数股权
          x: 8
          'y': 4
          detail: Qualcomm/NVIDIA/Tier-1——近期概率最高；仅有部分价值
        - label: 降价轮 / 困境 M&A
          x: 2
          'y': 2
          detail: 悲观尾部风险——如果商业化彻底失败，概率低、价值低
  - id: FV004
    type: kpi
    layout: standard
    title: 投资 KPI——Neura Robotics 尽调评分卡
    summary: 面向投委会的评分，覆盖市场、技术验证、竞争护城河、财务健康、风险、估值和证据质量维度。
