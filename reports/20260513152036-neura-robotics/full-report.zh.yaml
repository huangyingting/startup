      - number: '3.2'
        title: 直接人形机器人竞争者
        blocks:
          - type: paragraph
            body: >
              Figure AI（美国）是与 NEURA 最可比的纯人形机器人竞争者。Figure AI 于 2024 年 2 月以 $2.6 billion 估值融资 $675 million，投资方包括
              Microsoft、Jeff Bezos、NVIDIA 和 Intel，是全球资本最充足的纯人形机器人初创公司。其 Figure 03 机器人与 Helix 视觉-语言-动作（VLA）AI
              模型组合，代表端到端具身智能的前沿水平。BMW 制造试点已经宣布。Figure AI 的资本优势和 Microsoft 合作，使其成为近期最强的竞争对手。

              Apptronik（美国）已融资约 $1 billion，截至 2025 年估值约 $5 billion。其 Apollo 人形机器人高 5'8"（173cm）、重 160lbs（73kg）、载荷
              55lbs（25kg），电池续航 4 小时。Apptronik 拥有深厚 NASA 背景，并获得 GV（Google Ventures）支持，Mercedes-Benz 制造试点正在推进。$1B
              资本、汽车试点进展和 GV 背书结合起来，使 Apptronik 成为 NEURA 在工业细分中最强的“资本 + 部署”竞争者。

              Boston Dynamics（美国，Hyundai 所有）拥有 Atlas，这是市场上技术最先进的移动平台之一，已全电动化，并受益于 2026 年 1 月宣布的 Google DeepMind AI
              合作。Hyundai 所有权同时带来制造能力和深厚资本。Boston Dynamics/DeepMind 代表市场上可信度最高的 AI-硬件组合。

              Tesla Optimus（美国）在 Tesla AI Day 2022 上发布，并于 2024 年推出 Gen 2。Tesla
              的竞争优势不在当前机器人能力，而在于未来可能以汽车级规模制造人形机器人——这是任何初创竞争者在现有资本下都无法匹配的非对称威胁。

              Agility Robotics（美国，Amazon 所有）已在 Amazon 仓库部署 Digit 人形机器人，是唯一确认有商业规模部署的竞争者。Amazon 所有权使其能够接入全球最大的物流网络，同时把
              Amazon 作为客户和资本来源。

              1X Technologies（挪威）开发 NEO 家用机器人，由 OpenAI 和 EQT 支持，并采用 $200 订金预购模型。Sanctuary AI（加拿大）开发面向通用任务的 Phoenix
              人形机器人，并使用 Carbon AI。
