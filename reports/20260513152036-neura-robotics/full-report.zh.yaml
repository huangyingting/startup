      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics 由 David Reger 独自创立。Reger 担任董事总经理（相当于 CEO），也是公司最主要的公众面孔、产品愿景负责人和融资推动者。他在 Metzingen
              创立公司，并在公司从初创企业扩张到 1,200+ 名员工的过程中一直掌握日常运营领导权。公司尚未公开披露正式董事会、投资人治理架构或继任计划。创始人兼 CEO
              身上的关键人依赖高度集中，这是潜在投资人必须重点评估的治理问题。

              到 2026 年初，NEURA Robotics 已扩张团队以支撑不断增长的跨国组织。公司在 8+ 个地点雇用超过 1,200 名员工，团队来自 45+ 个国籍。子公司 Neura Electronics
              提供内部工业电子能力，包括控制柜、电力电子和传感器集成。团队模型强调机器人、AI、制造和软件的跨学科工程人才，与公司内部开发技术的战略一致。除 David Reger 外，截至 2026 年 5
              月审阅的新闻稿和官方沟通中，尚未看到其他具名高管。作为一家私人 GmbH，公司治理细节仍未披露。
