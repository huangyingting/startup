      - number: '4.3'
        title: 收入展望与商业化路径
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 公开表示，BMW、Mercedes-Benz 和 Daimler Truck 是正在制造环境中评估或积极试点其人形机器人的汽车 OEM
              合作方。这些合作是最可信的近期收入催化剂，因为汽车制造商既有财务能力，也有运营动机去规模化采用自动化。不过，从试点项目走向付费商业合同，仍是关键未知数：OEM
              采购周期很长，安全认证要求严格，初始部署在获得全面推广批准前通常范围和周期都有限。

              管理层指引称，首批商业部署目标落在 2025-2026 年。若能实现，早期收入绝对值可能不大——潜在为数千万欧元——不足以抵消当前月度烧钱速度，但对 C
              轮融资而言，作为商业可行性证明非常重要。Neuraverse
              软件订阅平台提供了重要的经常性收入叠加层：机器人一旦部署，持续订阅可带来高毛利收入，并随时间改善整体单位经济性。跟踪人形机器人行业的分析师指出，第一家宣布公开披露、付费商业部署合同的欧洲玩家，会在下一轮融资中获得显著估值溢价；因此，对即将在
              2026 年接近 B 轮现金跑道末端的 Neura Robotics 来说，抢到第一笔收入具有关键战略意义。
            claimRefs:
              - CI013
