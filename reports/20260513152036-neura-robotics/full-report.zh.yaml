      - number: '4.4'
        title: 烧钱速度与现金跑道分析
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 拥有约 1,200 名员工——包括机器人工程师、AI
              研究员、软件开发者和商业团队——因此固定成本基础很重，月度烧钱速度很高。按机器人行业保守基准，单名员工每月全负担成本（工资、福利、场地、设备和管理费用）为 EUR 8,000-12,000，估算总运营支出为每月
              EUR 10M-15M。这让 Neura 的成本强度接近后期深科技初创公司和正在向商业化生产扩张的早期硬件制造商。

              按基准情景每月 EUR 12M 估算，2025 年 1 月完成的 EUR 120M B 轮提供约 10 个月现金跑道，意味着在当前条件下融资截止点大约落在 2025 年底至 2026 年初。保守情景（EUR
              8M/month）把现金跑道延长至约 15 个月，高烧钱情景（EUR 15M/month）则压缩到 8
              个月。关键在于，这些情景都没有计入实质性商业收入；如果部分试点合同转为付费部署，现金跑道可能显著延长。公司已公开释放信号，目标是在 2026-2027 年完成 C
              轮融资或实现收入拐点。维持足够现金缓冲、避免降估值融资或困境融资，是关键财务管理优先事项；紧迫时间表也让早期收入胜利的战略意义超过其直接财务贡献。
