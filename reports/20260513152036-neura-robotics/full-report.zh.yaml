  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 自 2019 年在德国 Metzingen 创立以来，已搭建起多轮资本结构，累计融资约 $200M+（EUR 185M+）。公司第一轮主要外部融资发生在 2023 年 7 月，完成约
              $55M（EUR 50M），普遍被视为 A 轮，由 Lingotto Investment Management——Agnelli 家族的家族办公室——领投，Vsquared
              Ventures、PRIMEPULSE AG 和 HV Capital 共同投资。值得注意的是，公司披露融资交割时订单簿已超过 $450M，说明在商业产品可得之前很久，企业需求已经相当可观。2023 年 10
              月，InterAlpen Partners 提供 $16M 过桥延伸融资，用于加速产品开发和国际市场进入。

              旗舰融资事件发生在 2025 年 1 月，Neura 完成 EUR 120M B 轮，仍由 Lingotto 领投，所有主要 A 轮投资人继续跟投。两家重要新投资人进入股权结构表：BlueCrest
              Capital Management，一家知名英国对冲基金；以及 L-Bank Baden-Wuerttemberg，德国州级开发银行，其参与释放出公共部门对 Neura
              区域经济重要性和技术资质的信心。公司没有在任何一轮公开披露外部估值，因此按市值重估只能参考可比公司基准。累计 $200M+ 融资让 Neura 成为欧洲资本最充足的独立人形机器人公司。
