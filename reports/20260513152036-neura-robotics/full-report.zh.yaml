  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与可靠性风险
        blocks:
          - type: paragraph
            body: >
              人形机器人仍是工程领域技术难度最高的方向之一。Neura Robotics 的 4NE-1 和 MAiRA
              平台必须在非结构化环境中可靠运行——工厂、物流中心，最终还包括家庭；这些场景里的传感器噪声、可变光照和不可预测的人类行为，都会制造尖锐故障模式。工业人形机器人的平均故障间隔时间（MTBF）仍远低于成熟固定臂工业机器人；领先技术评估估计，当前人形机器人平台的
              MTBF 以数百小时计，而成熟关节臂机器人可达数千小时。Neura 自研 CognOS 操作系统增加了一层 AI
              推理依赖：感知模型任何退化，或神经规划栈在边缘场景中失效，都可能传导为实体安全事故，并带来法律和声誉后果。执行器规模化耐久性尚未证明；MAiRA
              的定制伺服与关节设计必须在数万次运行循环中不出现性能衰减，但公司尚未公开披露长期现场数据来验证这一点。AI
              模型安全风险——包括对抗性输入、分布偏移和仿真到现实迁移缺口——构成额外子风险，在动态共享工作空间中，仅靠人工保护无法完全缓释。
