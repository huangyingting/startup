  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年的人形与认知机器人市场高度分散，资本快速形成，产品战略分化，而且没有任何竞争者——包括 NEURA
              Robotics——达到大规模商业化生产。全球至少有八个资金充足的人形机器人项目活跃，同时还有成熟协作机器人在位厂商（Universal Robots、ABB、KUKA、Fanuc）参与 NEURA
              所在的工业细分。

              竞争者可沿三条战略维度划分。第一，地域：NEURA 是唯一具备规模的欧洲本土人形机器人玩家，竞争对手包括北美初创公司（Figure AI、Apptronik、Agility Robotics、1X
              Technologies、Sanctuary AI、Tesla）和中国制造商（Unitree、Fourier Intelligence）。第二，产品范围：NEURA
              拥有行业最宽的产品组合——协作机器人（MAiRA、LARA）、AMR（MAV）、个人助手（MiPA）和人形机器人（4NE1）——而直接人形机器人竞争者都只有单一产品或窄产品组合。第三，商业战略：多数人形机器人竞争者瞄准工业自动化（Figure
              AI、Apptronik、Agility）或消费市场（1X Technologies、Tesla Optimus），NEURA 则借助平台生态同时瞄准两端。

              对一家处于这一融资阶段的欧洲机器人公司而言，NEURA 的 1,200+ 名员工团队规模值得注意，说明其相对已融资资本拥有显著运营规模。公司的欧盟监管对齐和 Neuraverse
              平台生态形成结构性差异化，美国或中国竞争者很难在架构上快速复制。
            claimRefs:
              - CP007
              - CP025
              - CP034
              - CP039
