      - number: '5.6'
        title: 产品路线图与技术缺口
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 近期路线图围绕三条并行轨道：硬件量产、消费者产品导入和平台生态增长。4NE1 人形机器人量产是风险最高的里程碑，目标窗口为 2026–2027
              年，意味着公司要从原型级部署转向可重复、有批量、并具备成本效率的制造，以支撑更广泛商业采用。4NE1 Mini 计划在 2026
              年春开放预订，既能提供早期消费者需求信号，也能在更小形态上验证制造；经验可直接用于完整 4NE1 的产量爬坡。MiPA 在 Automatica 2025 首发后，预计于 2025–2026
              年实现商业可用，将扩展重型服务机器人可寻址市场。

              尽管技术基础较强，若干实质缺口仍限制独立第三方验证。MAiRA 自 2023 年起已商业部署，但 Neura 尚未公布 MTBF 或现场可靠性数据。除 MAiRA 披露的 8 小时运行时间外，MiPA 和
              4NE1 的电池与续航规格尚未披露。可与 Figure AI、Apptronik Apollo 或 Boston Dynamics 同行直接比较的性能基准——操作成功率、导航精度、任务循环时间——尚未发布。第三方
              Neuraverse 开发者活跃度指标和应用目录深度仍未披露。4NE1
              量产爬坡的产量目标和单位成本目标也未公开承诺。这些缺口符合早期人形机器人创业公司接近规模化时的特征，但在公司从研发转向批量制造时，仍是需要跟踪的风险。
