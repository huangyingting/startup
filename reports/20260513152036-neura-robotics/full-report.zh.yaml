      - number: '6.5'
        title: 客户获取与留存模式
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 采用直接企业销售模式，面向 OEM 采购、自动化工程和运营团队。客户获取流程先在 Neura 的 Metzingen
              设施或客户现场进行技术演示，再围绕明确任务环境签署结构化试点协议。Neura 现场工程师支持试点，为客户特定任务配置机器人，并在评估期间维持正常运行时间。成功试点预期会转化为多年部署合同，将硬件设备与
              Neuraverse 软件订阅打包。Neuraverse
              平台是留存模式的核心：持续软件更新、远程诊断和车队分析，会让已在自身生产环境和工作流中训练系统的客户承担明显切换成本。客户成功以正常运行时间、任务完成率，以及相对人工劳动的单任务成本基准衡量。价格尚未公开披露，但行业同行表明，人形机器人平台目前单台定价大致在
              $70,000 到 $150,000 区间，并叠加年度软件订阅费。截至 2026
              年的招聘信息显示，公司正在积极招聘客户成功和现场应用工程岗位，这与一个尚未规模化、但正在扩张的商业组织相符：它正为预期部署管线转化提前建设面向客户的能力。
