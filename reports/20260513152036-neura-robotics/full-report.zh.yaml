      - number: '6.4'
        title: 用例与价值主张
        blocks:
          - type: paragraph
            body: >
              Neura Robotics 的客户价值主张集中在高载荷能力、可在为人设计的工厂基础设施中部署的双足移动能力，以及集成 AI 驱动的任务规划。MAiRA 的 60 kg
              载荷能力让它区别于更轻的人形机器人竞争者，并直接对应汽车和物流场景中的重型部件运输，以及会导致高工伤率的人体工学高负荷装配任务。机器人可在标准工厂通道、工位和现有设备布局中运行，相比需要改造设施或设置专用工作单元的定制自动化，可降低客户资本开支。关键用例包括重物搬运和物料运输、嵌入式机器视觉质量检测、半结构化重复任务装配辅助、拣选与放置和码垛物流作业，以及早期医疗应用。Neuraverse
              平台通过远程诊断、任务编程和车队管理增加经常性软件价值，形成伴随硬件销售的软件订阅收入流；客户一旦在自身环境中训练系统，切换成本也随之产生。对汽车 OEM
              客户而言，主要财务驱动是替代人体工学负荷高、人员流动率高岗位的人力成本。对物流客户而言，业务案例核心是吞吐优化和 24/7 运行可用性。
