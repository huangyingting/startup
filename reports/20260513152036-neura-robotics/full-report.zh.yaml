              - CM035
      - number: '2.3'
        title: 市场驱动因素与结构性顺风
        blocks:
          - type: paragraph
            body: >
              四股结构性力量支撑机器人自动化投资逻辑，也直接利好 NEURA 的市场定位。第一，德国、日本和美国制造业劳动力短缺，带来持续的自动化需求，而且不会随周期轻易逆转；这些市场劳动力老龄化，意味着到 2030
              年这一结构性驱动会进一步增强。IFR 数据确认，劳动力短缺是欧洲制造业采用协作机器人的首要宏观驱动。

              第二，IFR 于 2026 年 5 月记录的中国“十五五”规划（2026–2030）正式把机器人置于中国现代化产业体系核心，要求下级行业和区域规划与 AI
              集成机器人目标对齐。这为机器人创造了巨大的中国内需市场，同时也加剧了国资支持中国厂商带来的竞争压力。对 NEURA 而言，Hangzhou 办公室使其能够受益于中国工业机器人需求。

              第三，2024 年至 2026 年，人形机器人领域的风投和机构投资激增——Figure AI 融资 $675M+，1X Technologies 获得大量资本，NEURA 自身也拿到
              €120M——显示机构强烈相信人形平台具有商业可行性。这些资本流入为技术进步提供资金，也让潜在客户更认可这一品类。

              第四，物理 AI 与大语言模型正在汇合，使上一代机器人不具备的认知能力成为可能：遵循指令、映射环境、执行非结构化任务。NEURA 的 AURA AI 系统和 Qualcomm 合作正映射这波技术浪潮。
