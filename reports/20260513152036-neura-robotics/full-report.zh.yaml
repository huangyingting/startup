chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              NEURA Robotics GmbH 是一家德国私人机器人公司，由 David Reger 于 2019 年创立，总部位于 Gutenbergstrasse 44, 72555 Metzingen,
              Baden-Württemberg，靠近
              Stuttgart。公司的公开使命是「服务人类」，它开发认知机器人和人形平台，把先进机器视觉、空间音频处理与自研人工智能结合起来，让机器能够感知、回应并适应环境。NEURA
              的核心判断是，下一轮工业和服务机器人拐点来自认知能力，而不是面向单一任务的自动化。

              NEURA 的商业模式同时瞄准工业和服务市场：工业协作机器人（MAiRA、LARA、MAV）服务制造自动化，人形平台（4NE1、MiPA）则面向更广泛、任务不固定的人机协作。NEURA 还运营
              Neuraverse，并称其为全球首个可扩展机器人应用商店，让机器人像智能手机更新应用一样获得新技能。所有关键技术——包括自研 AURA AI 系统和硬件组件——都由内部开发，体现出有意推进的垂直整合战略。截至
              2026 年 5 月，NEURA Robotics 在 8+ 个地点运营，包括 Metzingen（总部）、Hangzhou（中国）和 Zurich（瑞士）。
