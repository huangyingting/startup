chapter:
  number: 4
  title: Financials
  summary: >
    Neura Robotics has raised approximately $200M+ (EUR 185M+) across multiple rounds culminating in a
    EUR 120M Series B in January 2025 led by Lingotto Investment Management, with investors spanning
    European venture capital, strategic partners, and L-Bank Baden-Wuerttemberg. As a pre-revenue company
    with approximately 1,200 employees and an estimated EUR 10-15M monthly burn rate, the Series B provides
    roughly 8-12 months of runway, making a Series C fundraise or commercial revenue inflection by 2026-2027
    a critical near-term financial milestone.
sections:
  - id: S01
    title: Funding History and Capital Structure
    body: >
      Neura Robotics has assembled a multi-round capital structure totalling approximately $200M+ (EUR 185M+)
      since its founding in Metzingen, Germany in 2019. The company's first major external fundraise occurred
      in July 2023 when it closed approximately $55M (EUR 50M) widely characterised as a Series A, led by
      Lingotto Investment Management -- the family office of the Agnelli dynasty -- with co-investment from
      Vsquared Ventures, PRIMEPULSE AG, and HV Capital. Remarkably, the company disclosed that its order
      book had already exceeded $450M at close, signalling substantial enterprise demand well ahead of
      commercial product availability. A bridge extension of $16M followed in October 2023, provided by
      InterAlpen Partners, to accelerate product development and international market entry.

      The flagship financing event came in January 2025 when Neura closed a EUR 120M Series B, again led
      by Lingotto, with all major Series A investors re-investing. Two significant new entrants joined the
      cap table: BlueCrest Capital Management, a prominent UK-based hedge fund, and L-Bank
      Baden-Wuerttemberg, the German state development bank, whose participation signals public-sector
      confidence in Neura's regional economic importance and technological credentials. No external
      valuation has been publicly disclosed at any round, limiting mark-to-market analysis to
      comparable-company benchmarks. The cumulative capital raised of $200M+ positions Neura as the
      best-capitalised independent humanoid robotics company in Europe.
