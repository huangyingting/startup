  - id: S05
    title: Comparable Company Financial Benchmarks
    body: >
      The humanoid robotics sector has attracted substantial venture and strategic capital globally,
      providing important benchmark context for evaluating Neura Robotics' financial positioning. In
      the US market, Figure AI is the most directly comparable company, having raised approximately
      $675M at a $2.6B valuation as of February 2024 -- capitalization roughly 3.4x Neura's cumulative
      raise. This premium reflects US market liquidity, OpenAI co-investment, and an aggressive BMW
      partnership announcement. Agility Robotics, focused on logistics automation in Amazon warehouses,
      was acquired by Amazon in 2023 following approximately $250M in total venture funding,
      establishing a strategic-acquisition precedent for the entire category.

      Boston Dynamics, the pioneer of dynamic robotics, was sold to Hyundai Motor Group for $1.1B in
      2021, providing a meaningful M&A exit benchmark. In Europe, 1X Technologies of Norway has raised
      approximately EUR 100M, positioning Neura as the best-capitalised independent humanoid robotics
      company on the continent. Tesla Optimus represents an incomparable internally-funded programme
      backed by Tesla's balance sheet. The comparative data reveals a notable transatlantic valuation
      gap: US humanoid robotics companies consistently raise at higher valuations relative to equivalent
      technology readiness levels, suggesting Neura may face a valuation discount at Series C unless it
      demonstrates paid commercial deployments ahead of US rivals or attracts a US-based strategic
      co-lead investor to its next round.
    claimRefs:
      - CI018
      - CI019
      - CI020
      - CI021
      - CI022
      - CI038
