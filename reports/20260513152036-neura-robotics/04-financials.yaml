  evidenceGaps:
    - id: EI001
      type: no-public-data
      severity: low
      topic: 2026 fundraising activity
      missingEvidence: >-
        No public announcements of a Series C fundraise or new equity round for Neura Robotics have
        been identified as of May 2026. The Qualcomm partnership (March 2026) is the most recent
        major news event but is a commercial partnership rather than a capital raise.
      whyItMatters: >-
        Given the estimated 8-12 month runway from January 2025, a Series C announcement would be
        expected by late 2025 or early 2026. Absence of public news may indicate the process is
        confidential, delayed, or has not yet been formally launched. This creates uncertainty about
        the company's funding status.
      diligencePath: >-
        Engage directly with Neura Robotics investor relations and existing investors (Lingotto,
        PRIMEPULSE) to confirm Series C timeline, target raise size, and lead investor discussions.
        Monitor PitchBook and CB Insights for any registered funding activity.
      relatedQuestionRefs:
        - QI017
        - QI026
    - id: EI002
      type: private-evidence-only
      severity: material
      topic: valuation
      missingEvidence: >-
        Neura Robotics has not disclosed a valuation at any funding round. Implied valuation based on
        comparable transactions ranges from EUR 300M to EUR 1B+ depending on revenue stage assumptions,
        but no primary evidence is available to anchor this estimate with confidence.
      whyItMatters: >-
        Without a disclosed valuation, investors cannot assess the dilution history of existing
        shareholders, the relative entry price of each investor tranche, or whether Series C terms
        would represent an up-round or down-round relative to the Series B entry price.
      diligencePath: >-
        Request cap table, post-money valuation for Series A and Series B, and liquidation preference
        waterfall directly from Neura Robotics management in a formal data room process.
      relatedQuestionRefs:
        - QI018
      relatedTableRefs:
        - TI001
        - TI003

