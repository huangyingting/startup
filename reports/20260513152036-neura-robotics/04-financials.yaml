  - id: S06
    title: Financial Risks and Diligence Gaps
    body: >
      Neura Robotics faces several material financial risks that investors and commercial partners must
      evaluate carefully. The most acute near-term risk is runway compression: if burn rate is at the
      high end of estimates (EUR 15M+/month) and commercial revenue is delayed beyond Q1 2026, the
      company could face a cash crisis requiring a dilutive emergency raise or operational contraction
      within the Series B runway window. Hardware-first business models in deep-tech present structurally
      challenging unit economics at low production volumes, and initial hardware gross margins for
      humanoid robots are widely expected to be negative, creating dependency on high-margin software
      and service revenues to achieve overall unit-level profitability at scale.

      A critical diligence gap is the absence of public financial statements: as a private German GmbH,
      Neura Robotics is not required to publish audited accounts to the same standard as a listed
      company. The undisclosed valuation makes it impossible to independently assess dilution history
      or the relative bargaining power of investor tranches. Competitive pressure from US rivals with
      substantially larger capital reserves -- Figure AI at $675M and Tesla's internal programme --
      represents a structural disadvantage. Investors conducting diligence should seek direct access
      to management accounts, detailed employee cost-centre breakdowns, actual pilot contract terms
      and revenue recognition schedules, and independent confirmation of the $450M+ order book cited
      since 2023. The absence of public revenue data or audited financials makes this chapter's
      conclusions necessarily reliant on third-party estimates and disclosed fundraising announcements.
    claimRefs:
      - CI015
      - CI016
      - CI023
      - CI035
      - CI036
      - CI038
      - CI039
