callouts:
  - calloutType: risk
    title: "Runway Risk: Series C Required Within ~10 Months of Series B Close"
    body: >-
      At the base-case monthly burn of EUR 12M, the EUR 120M Series B raised in January 2025 provides
      approximately 10 months of runway, placing a de-facto funding deadline around November 2025.
      Failure to secure a Series C or achieve meaningful commercial revenue before cash depletion would
      force Neura Robotics into a materially weaker negotiating position, risking dilutive bridge
      financing or operational downsizing at a critical stage of product commercialisation.
    claimRefs:
      - CI015
      - CI016
      - CI035
  - calloutType: insight
    title: German State Bank Participation Signals Strategic Regional Importance
    body: >-
      L-Bank Baden-Wuerttemberg's participation in the Series B round is a meaningful signal of
      public-sector confidence in Neura Robotics as a regionally and nationally significant technology
      company. State development bank co-investment often correlates with preferential access to
      government grants, subsidised loan facilities, and political support for domestic manufacturing
      scale-up, potentially providing partial offset to the company's capital intensity.
    claimRefs:
      - CI028
      - CI040
  - calloutType: risk
    title: No Public Financial Statements Available for Independent Verification
    body: >-
      Neura Robotics GmbH has not published audited financial statements through public filing channels
      as of May 2026. As a private German GmbH below relevant mandatory disclosure thresholds, financial
      transparency requirements are limited. Investors must negotiate direct data room access to obtain
      management accounts, cap table, employee cost breakdowns, and revenue pipeline details essential
      for independent financial assessment.
    claimRefs:
      - CI039
      - CI023
