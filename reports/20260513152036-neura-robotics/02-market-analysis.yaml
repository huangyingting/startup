  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Neuraverse platform market impact
      missingEvidence: >-
        The revenue potential and market sizing contribution of NEURA's Neuraverse robotics app store
        platform is not quantified in any publicly available source. No third-party analyst has modeled
        the platform revenue separately from hardware. No monetization rates, app developer counts, or
        API pricing are publicly disclosed.
      whyItMatters: >-
        The Neuraverse platform is a key component of NEURA's SOM extension argument. Without revenue
        data or independent market sizing, the platform's contribution to the addressable market cannot
        be assessed, potentially overstating the SOM.
      diligencePath: >-
        Request NEURA management presentation on Neuraverse commercial model: pricing per skill, app
        developer pipeline, revenue share structure, and any committed enterprise licensing agreements.
      relatedQuestionRefs:
        - QM020

    - type: conflicting-data
      severity: material
      topic: humanoid market sizing contradictions
      missingEvidence: >-
        Analyst forecasts for the humanoid robot market diverge by an order of magnitude (from sub-$1B
        to $38B+ by 2035). The IFR's qualitative caution that mass adoption is not near-term contradicts
        Goldman Sachs' headline growth scenario. No single authoritative bottom-up model exists that is
        publicly accessible.
      whyItMatters: >-
        Contradictory estimates make it impossible to validate NEURA's implied TAM without access to
        methodology details that are paywalled or not yet published. Investors relying on headline
        analyst figures risk overstating the near-term market.
      diligencePath: >-
        Obtain non-paywalled methodology notes from Grand View Research or MarketsandMarkets. Commission
        independent bottom-up market model using IFR installation data, average robot revenue, and
        market penetration assumptions segmented by use case.
      relatedTableRefs:
        - TM002

    - type: missing-source
      severity: minor
      topic: NEURA commercial deployment evidence
      missingEvidence: >-
        No independent third-party confirmation of paid commercial robot deployments at any customer
        site has been publicly disclosed as of May 2026. The $450M+ order book figure is company-claimed
        and not auditable from public sources.
      whyItMatters: >-
        The SOM estimation relies on order-book conversion assumptions. Without confirmed deployments
        or customer references, the commercial traction narrative cannot be verified, and SOM scenarios
        may be optimistic.
      diligencePath: >-
        Request customer reference list with deployment details (customer name, robot model, unit count,
        deployment date, recurring vs. one-time contract) from NEURA management. Validate $450M+ order
        book figure against signed contract documents.
      relatedTableRefs:
        - TM002

