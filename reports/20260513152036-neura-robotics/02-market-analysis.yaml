  - id: S04
    title: Market Constraints and Adverse Signals
    body: >
      The IFR's May 2026 assessment is unambiguous: "mass adoption as universal humanoid factory helpers or in
      private households will not happen within the near- and medium-term future." This expert caution from the
      world's primary industrial robotics statistical authority is the most significant adverse signal in the
      market analysis. The IFR also cites the "form follows function" limitation — the human body may not be
      physically suited to high-speed precision industrial tasks where traditional robots excel. In industrial
      production environments demanding millimetre-level precision at high throughput, industrial robots outperform
      humanoids. The IFR expects the 15th Five-Year Plan to see humanoid commercialization only "towards the end"
      of the plan's period, i.e., closer to 2030.

      Second adverse signal: no humanoid robot company — including Boston Dynamics, Figure AI, Apptronik, or
      NEURA — has publicly confirmed commercial production exceeding 1,000 units as of May 2026. This absence
      of production-at-scale evidence materially undermines near-term SOM estimates.

      Third, Chinese manufacturers including Unitree, UBTECH, and Fourier Intelligence are producing lower-cost
      humanoid and service robot alternatives at price points that European premium manufacturers cannot match.
      China's domestic robot supplier share increased from 30% to 57% between 2020 and 2024 (IFR), demonstrating
      rapid competitive maturation. For NEURA, competing on price in the mass market against Chinese vendors is
      not a viable strategy; differentiation through cognitive capability and safety certification is the only
      sustainable moat.
