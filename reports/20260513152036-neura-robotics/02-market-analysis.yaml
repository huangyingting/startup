chapter:
  number: 2
  title: Market Analysis
  summary: >
    The global robotics and automation market spans three overlapping segments relevant to NEURA Robotics: industrial
    robots ($18B+), collaborative robots/cobots (~$1.4B in 2024 growing 20%+ CAGR), and the nascent humanoid robot
    market projected by Goldman Sachs to reach $38B+ by 2035. The IFR's World Robotics 2025 Report confirms a record
    4.28 million industrial robots in operational stock globally, with China accounting for ~54% of annual global
    installations. Structural tailwinds — labor shortages, China's 15th Five-Year Plan (2026–2030), EU AI policy, and
    a surge in VC investment — are accelerating demand. However, the IFR (May 2026) explicitly cautions that mass
    adoption of humanoid robots as universal factory helpers or household assistants will not happen in the near- or
    medium-term future. NEURA's TAM spans the addressable industrial automation plus service robot market
    (approximately $35–55B by 2030), with a SAM focused on cognitive cobots and advanced humanoids in Europe and
    Asia-Pacific (~$4–8B). SOM near-term attainability depends on converting its $450M+ order book and pre-commercial
    product pipeline into recurring deployments. Key diligence gaps: no confirmed commercial scale deployment, no
    disclosed revenue, and Chinese low-cost competition intensifying.

sections:
  - id: S01
    title: Market Boundary and Taxonomy
    body: >
      NEURA Robotics competes across three overlapping but distinct robotics market segments. The industrial robot
      market — conventional articulated arms, SCARA, and delta robots — is the largest at over $18 billion globally,
      serving automotive, electronics, and heavy manufacturing. The collaborative robot (cobot) sub-segment, estimated
      at approximately $1.4 billion in 2024, is growing at 20%+ CAGR as manufacturers seek flexible automation that
      works alongside humans rather than behind safety cages. NEURA's MAiRA, LARA, and MAV products compete primarily
      in this cobot sub-segment.

      The service robot market exceeded $19 billion in 2024 (IFR data) and includes logistics, healthcare, field
      service, and emerging consumer robots. NEURA's MiPA and 4NE1 humanoid target this segment's human-centric
      task environment. The humanoid robot sub-category is a distinct sub-segment of both service robots and advanced
      industrial automation, currently below $1 billion in annual revenue but the subject of intense analyst and
      investor focus given Goldman Sachs' projection of $38 billion by 2035.

      Status-quo substitutes include: traditional industrial robots (faster, cheaper for repetitive tasks), dedicated
      AMRs/AGVs for logistics, and human labor (still price-competitive in low-wage markets). NEURA's thesis is that
      cognitive cobots and humanoids unlock workflows that neither traditional robots nor single-task automation can
      address — a differentiated but unproven at scale claim.
    claimRefs:
      - CM001
      - CM003
