  - id: S05
    title: Customer Acquisition and Retention Model
    body: >
      Neura Robotics pursues a direct enterprise sales model targeting OEM procurement, automation
      engineering, and operations teams. The customer acquisition process begins with technical
      demonstrations at Neura's Metzingen facility or at the customer's site, followed by a structured
      pilot agreement for a defined task environment. Pilots are supported by Neura field engineers who
      configure the robot for customer-specific tasks and maintain uptime during evaluation. Successful
      pilots are expected to convert to multi-year deployment contracts bundling hardware units with
      Neuraverse software subscriptions. The Neuraverse platform is integral to the retention model:
      ongoing software updates, remote diagnostics, and fleet analytics create meaningful switching costs
      for customers who have trained the system on their specific production environments and workflows.
      Customer success is measured by uptime metrics, task completion rates, and cost-per-task benchmarks
      versus human labor. Pricing has not been publicly disclosed, but industry peers suggest humanoid
      robot platforms currently price in the $70,000 to $150,000 per-unit range with annual software
      subscription fees layered on top. Job listings as of 2026 indicate active hiring for customer
      success and field application engineering roles, consistent with a pre-scale but expanding
      commercial organization building out customer-facing capacity ahead of anticipated deployment
      pipeline conversion.
    claimRefs:
      - CU013
      - CU017
      - CU023
      - CU024
      - CU030
      - CU031
    tableRefs:
      - TU004

  - id: S06
    title: Customer Concentration Risk and Adverse Assessment
    body: >
      Neura Robotics faces significant customer concentration risk stemming from its early pre-commercial
      status. The company's visible pipeline consists of a small number of automotive OEM engagements,
      making prospective revenue highly vulnerable to single-customer pilot failure, procurement freeze,
      or automotive sector cyclicality. Unlike established industrial robot vendors such as KUKA, Fanuc,
      and Yaskawa that serve hundreds of customers across diverse industries, Neura Robotics enters 2026
      without a publicly confirmed multi-customer revenue base. This creates binary risk: if the Daimler
      Truck pilot fails to convert, or BMW Group concludes evaluation without commitment, Neura would lose
      its two most visible customer references and face significant market credibility risk. The automotive
      sector itself is under structural and cyclical pressure in 2025–2026, including EV transition costs,
      labor negotiations, and capital allocation constraints that may extend pilot-to-deployment timelines
      beyond initial projections. Analyst and investor commentary has raised questions about whether
      humanoid robots can achieve economic viability on timelines consistent with current venture capital
      investment cycles. Neura Robotics has not publicly disclosed customer churn metrics, pilot success
      rates, or conversion rates, leaving commercial momentum difficult to assess objectively. The heavy
      dependence on automotive customers also means that a sector downturn could materially impair the
      company's path to commercial scale, particularly if OEM capital expenditure freezes delay automation
      investment cycles at a critical validation juncture for the company.
    claimRefs:
      - CU015
      - CU019
      - CU027
      - CU028
      - CU029
      - CU033
      - CU036
      - CU041
