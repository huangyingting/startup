  evidenceGaps:
    - id: EU001
      type: private-evidence-only
      severity: material
      topic: paying customer count and revenue
      missingEvidence: >-
        Neura Robotics has not disclosed the number of paying customers, total contract value, or
        any revenue metrics from commercial robot deployments. The company has no publicly confirmed
        revenue-generating customer relationships as of May 2026.
      whyItMatters: >-
        Without confirmed paying customers or disclosed contract values, investors cannot assess the
        company's commercial conversion rate, revenue trajectory, or whether pilots are translating
        into commercial agreements. This is the primary financial visibility gap for the company.
      diligencePath: >-
        Request customer reference list with confirmed contract status, contract value ranges,
        deployment volumes, and pilot-to-commercial conversion rate from any existing pilots. Obtain
        management accounts showing any revenue from robot deployments.
      relatedQuestionRefs:
        - QU002
        - QU008
      relatedTableRefs:
        - TU002
        - TU005
    - id: EU002
      type: private-evidence-only
      severity: material
      topic: contract terms and commercial conversion metrics
      missingEvidence: >-
        Contractual terms, contract duration, revenue per unit, and commercial conditions for the
        Daimler Truck pilot and BMW Group evaluation are entirely undisclosed. No pipeline conversion
        rates, pilot success criteria, or customer ROI data have been published.
      whyItMatters: >-
        The absence of disclosed contract terms makes it impossible to assess the likelihood of pilot
        conversion, expected revenue per deployment, or the financial model's unit economics. This
        limits the ability to forecast revenue milestones or assess the commercial viability of
        current pilots.
      diligencePath: >-
        Request non-anonymized pilot agreement summaries, commercial term sheets from any customer
        negotiations, and internal forecasts for pilot conversion and deployment timelines.
      relatedQuestionRefs:
        - QU008
        - QU015
      relatedTableRefs:
        - TU002
        - TU004
    - id: EU003
      type: incomplete-coverage
      severity: moderate
      topic: new 2026 customer announcements
      missingEvidence: >-
        Research conducted in May 2026 identified only the Daimler Truck pilot as a confirmed 2025
        customer engagement. No additional confirmed customer announcements from the period January–May
        2026 have been identified beyond press materials referencing unnamed OEM discussions.
      whyItMatters: >-
        If Neura Robotics has made additional customer announcements in early 2026 that were not
        captured in available search results, the actual traction picture may be more developed than
        reflected in this chapter. Conversely, the absence of new announcements after 18+ months
        since the Daimler announcement could indicate pipeline conversion difficulty.
      diligencePath: >-
        Monitor Neura Robotics press releases and company news in real-time; request a complete list
        of active customer engagements from management. Search for European trade press announcements
        not indexed in English-language sources.
      relatedQuestionRefs:
        - QU014
      relatedTableRefs:
        - TU002
    - id: EU004
      type: market-opacity
      severity: moderate
      topic: humanoid robot contract pricing and unit economics
      missingEvidence: >-
        No humanoid robot vendor has publicly disclosed per-unit pricing or multi-year deployment
        contract structures. The $70,000–$150,000 per-unit range cited in this chapter is an
        estimate derived from analyst and media coverage of comparable platforms, not confirmed Neura
        Robotics pricing.
      whyItMatters: >-
        Without confirmed pricing, the financial model for customer ROI—and by extension Neura's
        revenue per deployment—cannot be accurately assessed. This gap affects both the size of
        addressable deals and the company's path to profitability.
      diligencePath: >-
        Request Neura Robotics' standard pricing deck, enterprise deployment contract template, and
        Neuraverse subscription fee schedule. Compare against competitor pricing disclosed in any
        available customer case studies.
      relatedQuestionRefs:
        - QU015
      relatedTableRefs:
        - TU004
    - id: EU005
      type: incomplete-coverage
      severity: moderate
      topic: analyst critiques of Neura Robotics commercial timeline
      missingEvidence: >-
        Publicly available analyst commentary specific to Neura Robotics' commercial viability
        timeline is limited. General humanoid robot skepticism articles exist but company-specific
        critical assessments from investment analysts or sector experts are not publicly available.
        The adverse source (SU022) addresses general demo credibility rather than Neura-specific
        commercial timeline concerns.
      whyItMatters: >-
        Without specific analyst assessments of Neura's commercial timeline, it is difficult to
        triangulate the company's position relative to peers in terms of commercialization risk and
        milestone achievability. Investor expectations may be calibrated against unverifiable
        internal projections.
      diligencePath: >-
        Obtain research notes from European technology and robotics sector analysts; request Neura
        Robotics' internal roadmap milestones and commercial targets for 2026–2027 for comparison
        with analyst consensus.
      relatedQuestionRefs:
        - QU025
      relatedTableRefs:
        - TU002
