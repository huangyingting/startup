callouts:
  - calloutType: strength
    title: Automotive-Ready Payload and Factory Compatibility
    body: >-
      MAiRA's 60 kg payload capacity and bipedal form factor designed for human-scale factory infrastructure
      directly address the highest-value near-term use cases in automotive OEM plants—heavy component
      transport, ergonomically demanding assembly tasks, and quality inspection—without requiring facility
      redesign. This specification differentiation is a genuine competitive advantage versus lighter
      humanoid competitors in the automotive segment.
    claimRefs:
      - CU002
      - CU025
      - CU036
  - calloutType: risk
    title: No Disclosed Revenue or Contract Values
    body: >-
      Neura Robotics has not publicly disclosed any named paying customers with confirmed contract values,
      deployment volumes, or commercial conversion metrics as of May 2026. All visible traction consists
      of pilot evaluations and reported assessments. This creates material uncertainty about the company's
      path to commercial revenue and the ROI framework customers use to justify deployment.
    claimRefs:
      - CU015
      - CU027
      - CU033
  - calloutType: risk
    title: Acute Customer Concentration in Automotive
    body: >-
      The company's entire visible customer pipeline is concentrated in the automotive OEM sector, which
      itself faces EV transition costs, capital allocation pressure, and procurement cycle delays in
      2025–2026. A procurement freeze or single-pilot failure could eliminate Neura's two most visible
      customer references simultaneously, creating binary near-term revenue risk that is characteristic
      of pre-commercial hardware companies at this stage.
    claimRefs:
      - CU028
      - CU029
      - CU036
      - CU041
