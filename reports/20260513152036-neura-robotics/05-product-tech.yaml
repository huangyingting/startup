company:
  name: Neura Robotics
chapter:
  number: 5
  title: Product & Technology
  summary: >
    Neura Robotics has assembled a diversified humanoid and collaborative robot portfolio anchored
    by MAiRA—described as the world's first cognitive robot—alongside 4NE1, MiPA, LARA, and the
    MAV platform, with payloads spanning 5 kg to 60 kg and the proprietary CognOS cognitive
    operating system enabling natural-language robot programming. The Neuraverse platform, launched
    in 2025 as the industry's first scalable robotics app store, establishes recurring software
    revenue potential as hardware scales toward series production targeted for 2026–2027.
    Strategic partnerships with Qualcomm, AWS, Dassault Systèmes, TU Munich, NVIDIA, and Zimmer
    Group accelerate compute, simulation, and ecosystem capabilities, though meaningful gaps remain
    in published performance benchmarks, MTBF reliability data, and third-party Neuraverse developer
    traction.

sections:
  - id: section-product-portfolio
    title: Product Portfolio Overview
    body: >
      Neura Robotics offers one of the most comprehensive humanoid and collaborative robot product
      lines among European startups, covering payloads from 5 kg to 60 kg across five distinct
      lines. MAiRA (Multipurpose AI Robot Assistant), commercially launched in 2023, stands 165 cm
      tall and delivers a 60 kg payload capacity, making it the flagship for manufacturing and
      logistics deployment. Neura markets MAiRA as the "world's first cognitive robot," grounded in
      its integration of the CognOS operating system, which enables natural-language task instruction
      rather than conventional teach-pendant programming.

      The 4NE1 ("For-any-one") general-purpose humanoid has been iterated through three successive
      generations (2022, 2024, and 2025), demonstrating a rapid development cadence for a
      capital-intensive domain. A consumer-oriented 4NE1 Mini targets education and home-assistance
      markets, with reservation availability announced for Spring 2026. MiPA (Multipurpose
      Intelligent Powerhouse Assistant), debuted at Automatica 2025, extends the portfolio toward
      heavy-duty service applications. LARA (Lightweight Agile Robotic Assistant) is a collaborative
      arm rated at 5 kg payload for precision assembly, while the MAV (Mobile Autonomous Vehicle)
      provides an autonomous logistics navigation platform designed to complement the humanoid fleet.
      Together, the portfolio addresses manufacturing, logistics, service, consumer, and assembly
      verticals—a breadth unusual at this stage of company maturity.
    tableRefs:
      - TE001
    figureRefs:
