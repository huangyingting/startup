  evidenceGaps:
    - type: missing-source
      severity: material
      topic: MiPA and 4NE1 battery and payload
      missingEvidence: >
        MiPA and 4NE1 payload capacities and operational battery runtimes have not been publicly
        disclosed. Only MAiRA's 60 kg payload and 8-hour runtime are confirmed. Direct competitive
        benchmarking of these products is therefore limited.
      whyItMatters: >
        Without confirmed payload and battery figures, it is not possible to independently assess
        MiPA or 4NE1's competitive positioning against Apptronik Apollo, Figure AI, or Unitree G1
        on core performance dimensions that drive customer purchasing decisions.
      diligencePath: >
        Request confirmed product datasheets from Neura Robotics directly; check Automatica 2025
        trade press for any specification disclosures made during the MiPA launch; contact Zimmer
        Group for end-effector payload compatibility documentation that may imply robot payload.
      relatedQuestionRefs:
        - QE002

    - type: missing-source
      severity: material
      topic: CognOS safety and error handling
      missingEvidence: >
        No public documentation exists describing how CognOS handles task failure, error recovery,
        or safety interlocks at the software level. ISO 10218 or ISO/TS 15066 compliance claims
        have not been published, and the underlying LLM model providers used in CognOS have not
        been named.
      whyItMatters: >
        For industrial deployment in shared human-robot workspaces (HRC), absence of disclosed
        safety architecture and standards compliance is a material risk for enterprise customers
        and insurance underwriters. It also limits technical due diligence on whether the
        AI-native approach creates edge-case safety risks not present in classical robot controllers.
      diligencePath: >
        Request IEC 62443 and ISO 10218 conformity documentation from Neura Robotics; review any
        CE declaration of conformity filed with German or EU regulatory authorities; examine the
        Neuraverse security whitepaper if available; interview former or current engineers via
        LinkedIn for architecture insights.
      relatedQuestionRefs:
        - QE006

    - type: missing-source
      severity: material
      topic: 4NE1 series production volume and cost
      missingEvidence: >
        No public commitment has been made on target production volumes, per-unit cost objectives,
        or manufacturing yield targets for the 4NE1 series production program in 2026–2027.
        The scope and capacity of the planned EU manufacturing expansion are also undisclosed.
      whyItMatters: >
        Production volume and unit cost targets are the primary variables determining whether
        series production generates positive gross margin and addresses the addressable market at
        scale. Without these figures, investor modelling of the 4NE1 commercial ramp is highly
        speculative.
      diligencePath: >
        Request manufacturing capacity and cost model in investor data room; review any German
        trade press (Automobilwoche, Handelsblatt) for facility expansion announcements; check
        Metzingen planning authority filings for facility expansion permits.
      relatedQuestionRefs:
        - QE021

    - type: missing-source
      severity: minor
      topic: 4NE1 Mini consumer demand signal
      missingEvidence: >
        While the 4NE1 Mini reservation program launched in Spring 2026, no waitlist size, pre-order
        volume, or pricing data has been publicly disclosed. The demand signal for the consumer
        humanoid segment remains unquantified.
      whyItMatters: >
        4NE1 Mini is the first consumer-facing product from Neura Robotics. Reservation volume
        would provide the earliest external signal of consumer demand for affordable humanoid robots,
        and would inform projections for the full 4NE1 series production ramp.
      diligencePath: >
        Monitor Neura Robotics press releases and social media for reservation milestone
        announcements; review German tech media (t3n, Heise) for coverage of 4NE1 Mini demand;
        request order book data in investor data room.
      relatedQuestionRefs:
        - QE026

