  - id: section-neuraverse
    title: Neuraverse Platform Ecosystem
    body: >
      Neuraverse, launched in 2025, represents Neura Robotics' strategic extension beyond hardware
      into recurring software revenue. Positioned as the world's first scalable robotics application
      store, Neuraverse enables developers and system integrators to publish, distribute, and install
      robot skill packages to deployed Neura robots—analogous to iOS or Android app stores
      delivering software updates to mobile devices. The platform encompasses four core pillars:
      fleet management for multi-robot coordination, analytics for operational telemetry and uptime
      reporting, remote monitoring for real-time diagnostics, and over-the-air (OTA) update
      management for seamless skill and firmware deployment.

      This model creates a potential platform moat: as more robots are deployed and more third-party
      developers create skills, the ecosystem compounds in value, increasing switching costs and
      revenue per deployed unit. The closest comparable in the mobile robot sector is Boston
      Dynamics' Orbit fleet management platform; analogues also exist in Universal Robots' UR+
      ecosystem and ABB's RobotStudio. Neuraverse's ambition to serve multiple form factors across
      the full Neura portfolio—from LARA arms to 4NE1 humanoids—provides structural breadth over
      single-platform ecosystem efforts. Third-party developer adoption metrics and app catalog
      depth remain undisclosed, and platform commercial maturity relative to its 2025 launch will
      be a meaningful signal as Neura approaches the 4NE1 series production milestone in 2026–2027.
    tableRefs:
