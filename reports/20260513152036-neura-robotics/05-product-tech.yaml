  - id: section-partnerships
    title: Technology Partnerships and Compute Strategy
    body: >
      Neura Robotics executed a concentrated burst of high-value technology partnerships between
      early 2024 and April 2026 that substantially strengthens its compute, simulation, cloud, and
      ecosystem capabilities. NVIDIA's 2024 provision of early access to Isaac ROS humanoid
      developer tools granted Neura preferential access to GPU-accelerated perception algorithms
      and training pipelines ahead of the broader humanoid developer community. The March 2026
      Qualcomm partnership integrates Snapdragon chipsets for on-device AI, pursuing a dual-compute
      strategy—NVIDIA Jetson for intensive GPU workloads, Qualcomm Snapdragon for efficient edge
      inference—that provides architectural flexibility and future-proofs Neura's compute stack
      against evolving model size requirements.

      AWS joined as a cloud robotics infrastructure partner in April 2026, contributing ROS 2
      integration capabilities and scalable compute for fleet operations, remote diagnostics, and
      simulation workloads that feed directly into the Neuraverse platform backend. Dassault
      Systèmes' April 2026 3DEXPERIENCE partnership enables high-fidelity digital twin simulation
      for robot validation and customer deployment planning, reducing physical test cycles. TU
      Munich's March 2026 establishment of Europe's largest Physical AI training center in
      partnership with Neura creates a captive research pipeline for next-generation embodied AI.
      Zimmer Group's end-effector integration extends the addressable task space for manipulation
      use cases. The density and caliber of four major partnerships in a seven-week window in
      early 2026 signals strong institutional confidence in Neura's technical direction ahead of
      the 4NE1 series production threshold.
