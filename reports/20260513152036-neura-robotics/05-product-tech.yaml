  - id: section-roadmap
    title: Product Roadmap and Technology Gaps
    body: >
      Neura Robotics' near-term roadmap centers on three parallel tracks: hardware series
      production, consumer product introduction, and platform ecosystem growth. Series production
      of the 4NE1 humanoid is the highest-stakes milestone, targeted for the 2026–2027 window,
      representing the transition from prototype-grade deployments to repeatable, volume
      manufacturing with cost efficiency required for broader commercial adoption. 4NE1 Mini's
      Spring 2026 reserve launch provides an early consumer demand signal and manufacturing proof
      at a smaller form factor, with lessons directly applicable to the full 4NE1 production ramp.
      MiPA's commercial availability, anticipated in the 2025–2026 timeframe following its
      Automatica 2025 debut, expands the heavy-duty service robot addressable market.

      Despite the strong technology foundation, several material gaps limit independent third-party
      validation. Neura has not published MTBF or field reliability data for MAiRA despite
      commercial deployment since 2023. Battery and runtime specifications for MiPA and 4NE1 have
      not been disclosed beyond MAiRA's stated 8-hour figure. Performance benchmarks—manipulation
      success rates, navigation accuracy, and task cycle times—that would enable direct comparison
      with Figure AI, Apptronik Apollo, or Boston Dynamics peers have not been released. Third-party
      Neuraverse developer activity metrics and app catalog depth remain undisclosed. Production
      volume targets and unit cost objectives for the 4NE1 series ramp have not been publicly
      committed. These gaps are characteristic of an early-stage humanoid startup approaching scale
      but represent risks to monitor as the company transitions from development to volume
      manufacturing.
