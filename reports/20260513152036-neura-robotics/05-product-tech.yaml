callouts:
  - calloutType: strength
    title: First-Mover App Store in Robotics
    body: >
      Neuraverse (2025) is positioned as the world's first scalable robotics application store,
      creating a platform moat that compounds as third-party skill developers join the ecosystem.
      If the mobile app store analogy holds, the platform layer may ultimately generate higher
      margins than hardware, and switching costs grow with each new skill installed.
    claimRefs:
      - CE016
      - CE018
      - CE020

  - calloutType: risk
    title: Absence of Published Performance and Reliability Benchmarks
    body: >
      Neura Robotics has not published MTBF reliability figures, manipulation success rates, or
      navigation accuracy benchmarks for any product despite MAiRA being in commercial deployment
      since 2023. This absence limits independent technical due diligence and represents execution
      risk for investors evaluating the transition to series production in 2026–2027.
    claimRefs:
      - CE035
      - CE038

  - calloutType: strength
    title: Exceptional Partnership Velocity in Early 2026
    body: >
      Four major technology partnerships—Qualcomm, AWS, Dassault Systèmes, TU Munich—were
      announced in a seven-week window in March–April 2026, reflecting strong institutional
      confidence in Neura's technical direction and accelerating compute, simulation, cloud, and
      research capabilities ahead of 4NE1 series production.
    claimRefs:
      - CE025
      - CE026
      - CE027
      - CE028

