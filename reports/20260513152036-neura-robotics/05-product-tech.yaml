  - id: section-manufacturing
    title: Manufacturing and Hardware Engineering
    body: >
      Neura Robotics pursues deliberate vertical integration, operating Neura Electronics as an
      in-house subsidiary responsible for the design and production of control cabinets, power
      electronics modules, and custom sensor integration assemblies. This degree of vertical control
      is unusual among humanoid robotics startups, which more typically rely on third-party
      electronics contract manufacturers, and provides Neura with tighter quality control, faster
      hardware iteration cycles, and reduced exposure to component supply disruptions that have
      historically plagued robotics hardware programs.

      Primary manufacturing operations are located at the company's Metzingen, Germany headquarters,
      benefiting from Germany's precision manufacturing ecosystem, deep engineering talent pool, and
      proximity to European automotive and logistics customers. Neura has signaled plans for EU
      manufacturing expansion to support anticipated volume increases ahead of the 4NE1 series
      production ramp. The February 2026 Zimmer Group end-effector integration exemplifies selective
      use of specialized partners for components where proprietary development yields no competitive
      advantage, while retaining in-house control of electronics and software. This combination
      creates a defensible production architecture relative to startups with shallower vertical
      integration, and provides a foundation for cost reduction at scale as production volumes grow
      through the 2026–2027 series production window.
