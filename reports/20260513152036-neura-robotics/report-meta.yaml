companyProfile:
  summary: >-
    NEURA Robotics GmbH was founded in 2019 in Metzingen, Germany, by robotics entrepreneur
    David Reger. The company develops cognitive humanoid robots and AI-powered automation
    platforms for industrial and commercial applications. Its proprietary CognOS cognitive
    architecture and AURA AI runtime enable robots to be programmed in natural language,
    differentiating it from conventional programmable cobots. NEURA has grown from zero to
    1,200+ employees and raised approximately €160M (≈$175M) across its Series A and Series B
    rounds. The investor base includes Exor/Lingotto, PRIMEPULSE, and L-Bank Baden-Württemberg.
    Key strategic partnerships include NVIDIA, Qualcomm, AWS, and Dassault Systèmes.
  foundedDate: "2019-01-01"
  founders:
    - name: David Reger
      role: CEO & Founder
      background: >-
        Robotics entrepreneur and sole founder; prior experience in industrial automation;
        built NEURA from zero to 1,200+ employees and €185M+ raised.
      claimRefs: [CO001, CO002]
  foundingLocation: Metzingen, Germany
  headquarters: Metzingen, Germany
  productSummary: >-
    NEURA Robotics sells cognitive humanoid robots and collaborative automation hardware:
    MAiRA (cognitive robot arm), 4NE1 (full humanoid), LARA (lightweight cobot arm),
    MAV (autonomous mobile platform), MiPA (service assistant robot), and the Neuraverse
    app store for robotics software and third-party integrations.
  customerFocus: >-
    Primary: European industrial manufacturers seeking AI-native automation and EU data
    sovereignty compliance. Secondary: logistics, healthcare, and service sectors requiring
    flexible humanoid or collaborative robot deployments.
  businessModel: >-
    Hardware sales (robots and cobot arms), platform licensing (CognOS/AURA runtime),
    and marketplace revenue via the Neuraverse app store. Pre-revenue as of May 2026.
  stage: Series B
  fundingStatus: >-
    Series B (2025): ~€120M led by Exor/Lingotto; Series A (2023): ~€50M + €16M extensions.
    Total raised approximately €160M (≈$175M USD). No public valuation disclosed.
