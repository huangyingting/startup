  evidenceGaps:
  - type: enumeration-incomplete
    severity: material
    topic: public-counterparty-universe
    missingEvidence: A management list of all active counterparties and all live programs by collaborator
      as of run date.
    whyItMatters: Without a full collaborator inventory, public customer breadth can only be described
      as the named proof set rather than a verified total customer count.
    diligencePath: Request a current collaboration roll-forward showing every active counterparty, program
      count, and whether the program is discovery, translational, or clinical.
    relatedQuestionRefs:
    - QU026
    - QU029
    relatedTableRefs:
    - TU003
  - type: private-evidence-only
    severity: material
    topic: renewal-and-contract-duration
    missingEvidence: Executed contract summaries showing term length, renewal mechanics, opt-out rights,
      and termination triggers for each relationship.
    whyItMatters: Durability is currently inferred from activity and expansion proxies rather than from
      actual renewal or non-renewal mechanics.
    diligencePath: Request redlined or board-approved contract summaries for Amgen, Novartis, MD Anderson,
      and Roswell that specify term and renewal structure.
    relatedQuestionRefs:
    - QU027
    relatedTableRefs:
    - TU004
  - type: private-evidence-only
    severity: material
    topic: retention-and-satisfaction-metrics
    missingEvidence: Account-level NRR, GRR, churn, satisfaction, usage intensity, and any partner reference-survey
      results.
    whyItMatters: The chapter can show current proof and relationship continuation, but it cannot quantify
      stickiness or satisfaction without internal account analytics.
    diligencePath: Request account-review materials, QBR slides, or customer-success metrics for each
      named counterparty and any broader customer cohort.
    relatedQuestionRefs:
    - QU028
    relatedTableRefs:
    - TU004
  - type: private-evidence-only
    severity: material
    topic: program-level-outcomes-by-collaborator
    missingEvidence: Per-target progress, milestone attainment, and outcome scorecards for Amgen, Novartis,
      MD Anderson, and Roswell programs.
    whyItMatters: Public sources validate that the relationships exist and remain active, but they do
      not show whether the counterparties are seeing repeatable scientific or commercial returns.
    diligencePath: Request collaborator-by-collaborator program dashboards with target count, stage, milestone
      history, attrition, and next expected decision points.
    relatedQuestionRefs:
    - QU026
    - QU027
    relatedTableRefs:
    - TU003
