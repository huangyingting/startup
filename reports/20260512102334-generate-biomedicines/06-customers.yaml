- id: retention-and-durability-visibility
  title: Retention and durability are mostly visible through proxies, not KPIs
  body: >-
    Retention and repeat-usage visibility is mostly proxy-based. The strongest public durability signal
    is Amgen expanding from the original five-program scope to six programs, which is more meaningful
    than a generic partner logo because it implies repeat buying behavior inside an existing account.
    Novartis shows early durability through continued 2026 revenue recognition and remaining fixed transaction
    price, but the public package does not disclose contract length, renewal dates, or target-by-target
    progress. MD Anderson and Roswell each show durability through continuing 2026 accounting lines and
    operational roles, with Roswell also tied to a still-active GB-5267 clinical plan. What is missing
    is the standard customer-retention toolkit: no NRR, GRR, churn, cohort, satisfaction, or deployment-utilization
    metrics are public, and no source in the reviewed pack gives contract duration, explicit renewal triggers,
    or counterparty-level usage intensity. The right diligence posture is therefore to treat retention
    as partially evidenced by relationship continuation and expansion, not as a quantified KPI.
  claimRefs:
  - CU033
  - CU034
  - CU035
  - CU036
  - CU044
  - CU045
  tableRefs:
  - TU004
- id: concentration-and-expansion-risk
  title: Proof quality is decent, but concentration and partner dependence stay high
  body: >-
    The customer conclusion is positive on proof quality but cautious on breadth and concentration. Public
    proof is stronger than a simple logo wall because four sophisticated counterparties have committed
    real cash, shared R&D budgets, or translational and manufacturing resources against named programs.
    But current breadth is still shallow. All recognized Q1 2026 revenue came from just Amgen and Novartis,
    and the filing implies Novartis supplied roughly 90% of that quarter’s total. MD Anderson and Roswell
    help validate adoption quality, yet they do not offset top-line concentration because their economics
    currently appear as shared-risk development arrangements rather than diversified recurring revenue.
    Independent coverage sharpens the same concern from another angle: Generate’s own CEO has said AI
    is not a panacea across discovery, development, and commercialization and that the company needs many
    partners to cover the full stack. Expansion upside is real, but partner dependence remains a structural
    customer risk until Generate has broader commercial adoption or a larger set of paying accounts.
  claimRefs:
  - CU027
  - CU037
  - CU038
  - CU039
  - CU040
  - CU041
  - CU042
