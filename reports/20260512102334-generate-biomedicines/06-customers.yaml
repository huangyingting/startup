chapter:
  number: 6
  title: Customers
summary: >-
  Generate is precommercial, so current “customers” are not prescribers or payers but a small set of adoption-proving
  counterparties: Amgen and Novartis as paying discovery collaborators, plus MD Anderson and Roswell Park
  as shared-risk co-development partners. Public proof is real but shallow: Amgen expanded to a sixth
  program, Amgen and Novartis produced all Q1 2026 revenue, Roswell’s GB-5267 remained active for second-half
  2026 first-patient dosing, and MD Anderson / Roswell still appeared in 2026 filing lines. But customer
  breadth is narrow, Novartis concentration is high, and no public NRR, churn, renewal, or satisfaction
  metrics exist.
sections:
- id: current-customer-boundary
  title: Current customer boundary and segmentation
  body: >-
    Generate is precommercial, so the only defensible definition of “customer” today is the set of counterparties
    that currently pay for or materially adopt the platform, not the future prescribers, payers, and patients
    who would matter only after product launch. The March 2026 10-Q says Generate has not generated product-sales
    revenue and expects substantially all foreseeable revenue from Novartis and Amgen, which makes those
    two large-pharma collaborators the only clear paying customers today. MD Anderson and Roswell Park
    still belong in this chapter because public filings and official announcements show them using the
    platform inside shared-risk co-development structures, contributing translational, manufacturing,
    and clinical-trial capabilities rather than simply lending brand association. Future pulmonologists,
    oncologists, payers, and patients sit downstream of GB-0895 or GB-5267 and are therefore not current
    customer proof. Public segmentation is accordingly narrow: two revenue-generating discovery collaborators,
    two active co-development partners, and no broad commercial buyer base yet.
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU006
  - CU028
  - CU041
  tableRefs:
  - TU001
  figureRefs:
  - FU001
- id: named-counterparty-proof
  title: Named customer proof is real, but relationship type matters
  body: >-
    Named customer proof exists, but it is partnership-driven rather than market-wide. Amgen is the clearest
    production-like discovery customer: the original five-target collaboration carried large upfront and
    milestone economics, and the relationship later expanded to a sixth program. Novartis is similarly
    substantive but younger; official materials show a $65 million upfront package, named Novartis executive
    sponsorship, and Q1 2026 revenue recognition, even though target count and program outputs remain
    confidential. MD Anderson and Roswell Park provide a different type of proof. They are not top-line
    revenue customers, but their official agreements go beyond logos by assigning shared R&D economics,
    clinical-trial site roles, and translational or manufacturing responsibilities. Roswell is especially
    tangible because GB-5267 is publicly described as a Roswell-developed program with first-patient dosing
    targeted for the second half of 2026. The limit across all four relationships is the same: public
    sources validate adoption and durability better than they validate program-level outcomes or ROI.
  claimRefs:
