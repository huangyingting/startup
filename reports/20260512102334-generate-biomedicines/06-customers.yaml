- id: adoption-and-expansion-trajectory
  title: Adoption trajectory is visible as deeper relationships, not broader account count
  body: >-
    Adoption trajectory is visible as a sequence of deepening counterparty commitments rather than as
    account-count or deployment-seat growth. Generate started with the Amgen collaboration in 2022, added
    MD Anderson in 2023, added Roswell Park later in 2023, expanded Amgen to a sixth program in early
    2024, and signed Novartis in September 2024. By January 2025 the company was talking about nearly
    20 programs underway and multi-target collaborations with Amgen and Novartis, while the April 2026
    corporate presentation still highlighted Amgen, Novartis, MD Anderson, and Roswell as strategic collaborations.
    The Q1 2026 filing and earnings release add the most concrete current-activity proof: Amgen and Novartis
    still generated all recognized collaboration revenue, MD Anderson still had a reimbursement payable
    recorded under its ASC 808 arrangement, Roswell reimbursed Generate during the quarter, and GB-5267
    was still expected to reach first-patient dosing in 2H 2026. That is enough to show active relationships
    and at least one land-and-expand case, but not enough to show broad customer proliferation.
  claimRefs:
