        - Uncontrolled symptoms on controller therapy → phenotype workup → biologic selection → response monitoring
        - Prescriber influence rather than direct budget ownership
        - Clinically meaningful reduction in exacerbations, steroid burden, or symptom instability versus incumbents
      - - Commercial payers / PBMs / medical-benefit managers
        - Coverage and utilization-management committees
        - Prior-auth reviewers, medical directors, pharmacy teams
        - Employer-sponsored plans, Medicare Advantage / Part D / medical-benefit budgets
        - Policy criteria → benefit verification → authorization / denial → renewal review
        - Medical and pharmacy trend budgets
        - Evidence of budget-manageable outcomes and a rule set that fits existing phenotype and step-therapy frameworks
      - - Health systems / IDNs / specialty pharmacies
        - P&T committees, specialty-pharmacy operators, infusion or injection programs
        - Pharmacists, nurses, financial navigators, scheduling teams
        - Reimbursement from plans plus patient cost share
        - >-
          Benefit investigation → scheduling / training → dispensing or clinic administration → refill and renewal
          support
        - Specialty-pharmacy / ambulatory operations budgets
        - Clean reimbursement workflow and manageable administration burden
      - - Patients and caregivers
        - Not the economic buyer, but critical for consent, adherence, and persistence
        - Patients and caregivers
        - Insurer plus household out-of-pocket burden
        - Referral → authorization → initiation → adherence → persistence or switch
        - Household time and affordability burden
        - Fewer attacks, easier administration, and credible safety / efficacy
      - - Generate internal launch organization
        - Portfolio, clinical, access, and commercial planning teams
        - Clinical development, regulatory, market-access, and medical teams
        - Generate balance sheet
        - Phase 3 readout → filing → payer evidence package → launch sequencing
        - R&D and G&A allocation
        - Positive pivotal data and a financing plan that supports launch investment
