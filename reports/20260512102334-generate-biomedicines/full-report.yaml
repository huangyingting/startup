      - number: '4.5'
        title: Financial verdict and open questions
        blocks:
          - type: paragraph
            body: >-
              Financially, Generate is better framed as a funded option on late-stage respiratory proof plus continued
              platform partnering than as a company with established revenue quality. The positives are real: the IPO
              eliminated the immediate going-concern problem flagged in the pre-IPO S-1/A, liquidity is now meaningful,
              and both Amgen and Novartis have written material checks. But the current revenue stream remains
              concentrated, milestone-constrained, and small relative to burn. Expense growth is still research-led,
              public-company overhead has stepped up, and filings explicitly say future capital needs will continue to
              rise with clinical development, platform work, and eventual commercialization requirements.


              The biggest remaining blocker is not whether Generate has enough cash for the next several quarters; it is
              whether the current cash base and collaboration model are enough to get the company from Phase 3
              enrollment to a commercially financeable launch without another major capital event. McKinsey’s 2025
              dealmaking note strengthens the adverse framing: partners and acquirers are becoming more selective and
              later-stage oriented, which is good for a company with Phase 3 exposure but bad for any business still
              relying on ambiguous platform economics. Investors therefore have a clear financial posture today: respect
              the liquidity reset, discount the collaboration revenue quality, and treat valuation, fully diluted
              capitalization, and post-2028 funding needs as open diligence items rather than solved facts.
