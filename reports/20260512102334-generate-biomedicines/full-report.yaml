  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Operating Model, and Footprint
        blocks:
          - type: paragraph
            body: >-
              Generate:Biomedicines was founded by Flagship Pioneering in 2018 and launched in 2020, then crossed the
              next financing threshold in early 2026 by becoming a public clinical-stage biotech. The March 2026 10-Q
              lists the principal executive offices at 101 South Street, Suite 900, Somerville, Massachusetts, while the
              company homepage frames the broader operating footprint as more than 140,000 square feet across Boynton
              Yards and Andover.


              Management consistently describes the company as a generative biology business rather than a pure software
              platform: the Generate Platform links machine-learning design to a continuous generate-build-measure-learn
              experimentation loop, and the homepage says the company has studied millions of proteins and generated,
              built, and tested more than 42,000 of them. Those scale claims matter because Generate still has no
              product sales. Public filings and the first-quarter 2026 earnings release make clear that current revenue
              comes from research collaborations—principally Amgen and Novartis—while the company funds a proprietary
              clinical pipeline led by GB-0895. The usable overview conclusion is that Generate is a capital-intensive
              therapeutics company with a differentiated discovery engine, not a software-style recurring-revenue story.
