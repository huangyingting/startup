      - number: '2.5'
        title: What the market evidence means for Generate valuation and diligence
        blocks:
          - type: paragraph
            body: >-
              The market evidence supports a focused but cautious interpretation of Generate. There is a real, already
              reimbursed severe-asthma biologic category with clear specialist users, real payer budgets, and
              blockbuster incumbents. That validates why GB-0895 matters far more to valuation than generic platform
              rhetoric. It also explains why Tezspire is the closest direct benchmark and why Generate’s six-month
              aspiration could matter commercially if the company can produce compelling Phase 3 data.


              At the same time, the public record does not support a precise GB-0895 SAM or SOM model. Comparator brands
              mix asthma with other indications, public sources do not disclose payer-approved treated counts or rebated
              net prices, and collaboration disclosures are too thin to infer a stable recurring discovery-market SAM.
              Those are not cosmetic data gaps. They are the main reasons this chapter keeps multiple sizing lenses
              instead of one TAM claim. Later valuation work should therefore treat severe-asthma biologics as the
              primary market, model collaboration economics separately, and avoid crediting COPD or broad type-2 revenue
              pools until Generate produces much stronger evidence.
            claimRefs:
              - CM001
              - CM025
              - CM038
              - CM039
              - CM042
              - CM044
              - CM045
              - CM046
