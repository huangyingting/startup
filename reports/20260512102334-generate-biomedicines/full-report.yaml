        title: Leadership, Governance, and Sponsor Influence
        blocks:
          - type: paragraph
            body: >-
              Leadership is built around a hybrid of big-pharma operating experience, internal platform continuity, and
              continuing Flagship influence. Mike Nally has led Generate since 2021 and brings Merck commercial and
              portfolio experience that appears central to fundraising, partner acquisition, and the transition into
              public markets. Jason Silvers now spans the president and CFO roles and has been the public finance voice
              on the Series C, IPO, and runway narrative. Technical continuity sits with co-founder and CTO Gevorg
              Grigoryan, who is closely associated with Chroma and the company’s broader generative protein-design
              stack.


              The 2025-2026 bench additions around Aarif Khakoo and Laurie Lee strengthened the scientific and medical
              layer as GB-0895 moved toward late-stage respiratory development, while Sean Martin anchors legal and
              governance execution. Board composition is also notable. Chair Noubar Afeyan ties Generate directly to
              Flagship Pioneering, and the current board also includes Frances Arnold, Stéphane Bancel, Marsha Fanucci,
              Jane Mendillo, Paul Parker, Nancy Simonian, Rupert Vessey, and Nally himself. The mix adds scientific
              prestige and public-company experience, but it also means sponsor influence remains part of the operating
              reality investors have to underwrite.
