  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Generate competes in two primary modes, plus a status-quo substitute
        blocks:
          - type: paragraph
            body: >-
              Generate’s competitor set is not one flat matrix. The first and commercially dominant layer is direct
              product competition in severe asthma. If GB-0895 reaches market, pulmonologists, allergists, and payers
              will compare it against approved biologics that already have label, reimbursement precedent, field
              support, and monitoring workflows. Tezspire is the cleanest mechanistic benchmark because it is the only
              scaled anti-TSLP asset already sold into severe asthma; Dupixent, Nucala, Fasenra, and Xolair are the
              entrenched alternative-mechanism options that physicians already know how to sequence. Exdensur matters
              because it shows twice-yearly convenience is already becoming real in respiratory biologics rather than a
              hypothetical future state.


              The second layer is discovery-platform and partnership competition. Here the buyer is not a clinician or
              health plan but a pharma R&D or business-development team comparing Generate against Recursion, Absci,
              Isomorphic Labs, and the option to do the work internally or license assets later. That buyer cares about
              capital base, scientific throughput, external validation, and optionality more than respiratory
              sales-force readiness. The practical implication is that a single blended matrix would obscure the actual
              purchasing decisions. This chapter therefore separates therapeutic competition, platform competition, and
              the internal-build substitute rather than pretending they are interchangeable.
