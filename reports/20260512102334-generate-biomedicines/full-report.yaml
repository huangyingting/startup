  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: 'Revenue quality and concentration: real partner cash, but narrow and lumpy'
        blocks:
          - type: paragraph
            body: >-
              Generate’s public revenue base is collaboration accounting, not drug sales. The 10-Q says Generate has
              never generated product revenue, expects substantially all near-term revenue from Novartis and Amgen, and
              recognized just $7.2 million of collaboration revenue in Q1 2026. That revenue is not a broad subscription
              base; it is recognition of fixed research obligations under two large-pharma contracts. Novartis supplied
              $6.5 million of Q1 revenue and Amgen only $0.7 million, leaving top-customer concentration at roughly 90%.
              On a full-year basis, the mix already flipped once—from Amgen-led in 2024 to Novartis-led in 2025—showing
              how easily the center of gravity can move between counterparties.


              The quality issue is not that the contracts are trivial; the disclosed headline economics are large. The
              issue is that the current recognized revenue stream is narrower and more exhaustible than the headlines
              suggest. As of March 31, 2026 only about $18.5 million of fixed transaction price remained to be
              recognized across Novartis and Amgen, and all contingent milestone payments were still constrained. The
              clearest public commercial proof is account expansion—Amgen added a sixth target—but there is no disclosed
              funnel, renewal cohort, or diversified customer base that would let an investor underwrite repeatable
              sales efficiency the way one would in software.
