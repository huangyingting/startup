      - number: '8.2'
        title: Thesis versus anti-thesis
        blocks:
          - type: paragraph
            body: >-
              Generate’s thesis is real and stage-appropriate. The company has a lead asset already in replicate global
              Phase 3 trials, a dosing profile designed for administration every six months, and enough post-IPO cash to
              remove the immediate solvency problem that showed up in the S-1/A. Novartis and Amgen are also more than
              logo slides: they are the entirety of current collaboration revenue and therefore direct evidence that
              large pharma has been willing to pay for the platform. The anti-thesis is just as real. Generate still has
              no product revenue, Q1 revenue was only $7.2 million, and that revenue came entirely from two partners.
              Novartis contributed most of it, while Amgen is nearing completion of its remaining performance
              obligations. Public pages also show that the broader pipeline exists, but the market’s practical
              underwriting case still runs through GB-0895 and the cash balance. That means a good company is not
              automatically a good stock at any price. The valuation call has to discount single-asset execution risk,
              partner concentration, and the absence of a public launch-economics model.
