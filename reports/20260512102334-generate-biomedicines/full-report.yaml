        title: Expense mix and operating leverage remain precommercial and research-led
        blocks:
          - type: paragraph
            body: >-
              Generate’s cost structure still looks like a late-precommercial techbio company, not a business with
              visible operating leverage. Q1 2026 operating expenses were $71.3 million versus only $7.2 million of
              recognized collaboration revenue, so revenue covered roughly 10% of operating costs. Research and
              development was $57.8 million, or about 81% of operating expenses, while G&A was $13.5 million. That mix
              matters: burn is being driven primarily by science, clinical execution, and platform investment rather
              than by customer acquisition or delivery costs that might fall quickly with scale. Management’s own
              explanation for the R&D step-up was continued investment in GB-0895 Phase 3 plus higher personnel expense.


              The smaller but still important second-order issue is the public-company step-up. G&A rose because of
              stock-based compensation and professional fees tied to being newly listed. That means some cost growth is
              durable rather than one-time. Public filings also show long-dated lease obligations, embedded equipment
              leases tied to GB-0895 Phase 3 work, and a broad pipeline that management says includes nearly 20
              programs. Put differently, the spending base is portfolio-wide and infrastructure-heavy. Public sources do
              not disclose gross margin, CAC, payback, or partner-level delivery margins, so the best public view of
              unit economics is still a burn bridge, not a profitability model.
