      - number: '8.3'
        title: Valuation method and current context
        blocks:
          - type: paragraph
            body: >-
              For Generate, a classical DCF or a simple EV-sales multiple is false precision. The company is newly
              public, precommercial, and still funded primarily to reach more proof, not to harvest cash flows. A
              stage-appropriate method is to combine cash-adjusted public value, cap-table realities, and public
              comparables with explicit scenario ranges. That framing matters because the current market data pages show
              why simple multiples mislead: StockAnalysis listed only $30.30 million of trailing revenue but a roughly
              $1.90 billion market cap, a $1.38 billion enterprise value, and EV-sales of about 45.56x. Those are not
              stable operating-company multiples; they are option-value multiples on clinical success and platform
              durability. Capital structure also matters. The 424B4 showed preferred-stock conversion into 69.33 million
              common shares and a post-offering share count of 127.45 million, while the 10-Q said 128.19 million shares
              were outstanding by April 29. Another 103.1 million shares remained locked up until August 2026, and 7.09
              million plan shares were still available. Investors therefore need to value Generate as cash plus
              late-stage probability minus future dilution risk, not as a finished earnings model.
            claimRefs:
