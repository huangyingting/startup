      - number: '2.2'
        title: Sizing the opportunity with patient and incumbent-revenue lenses
        blocks:
          - type: paragraph
            body: >-
              Public data supports multiple useful sizing lenses, but not one clean published TAM. The top of the funnel
              is broad: CDC-backed analysis says 24.9 million people in the US had asthma in 2021. That does not
              translate directly into GB-0895 demand, because only about 3.6% to 10% of asthma patients are estimated to
              have severe disease, and one review estimates that about 2.8% of all people with asthma may be eligible
              for at least one biologic. Those ranges are the right way to think about the patient base: a large asthma
              population narrows quickly once the analysis moves from diagnosis to severe disease, then narrows again
              once biologic eligibility and coverage constraints are imposed.


              The second lens is incumbent revenue. AstraZeneca reported 2025 sales of $1.131 billion for Tezspire and
              $1.981 billion for Fasenra; GSK reported £2.008 billion for Nucala; Roche reported CHF 3.1 billion for
              Xolair; and Regeneron reported $17.8 billion of full-year 2025 global Dupixent sales. These figures show
              that the market already supports blockbuster biologics, but they should not be naively summed into a
              GB-0895 SAM because several brands span food allergy, urticaria, CRSwNP, atopic dermatitis, COPD, and
              other non-asthma indications. The right takeaway is boundary logic: Tezspire is the closest direct class
              benchmark, the older asthma biologics frame the core reimbursed class, and Dupixent is best treated as an
              upper-bound type-2 biologic proxy rather than an asthma-pure comparator.
