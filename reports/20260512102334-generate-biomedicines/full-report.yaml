        title: Current customer boundary and segmentation
        blocks:
          - type: paragraph
            body: >-
              Generate is precommercial, so the only defensible definition of “customer” today is the set of
              counterparties that currently pay for or materially adopt the platform, not the future prescribers,
              payers, and patients who would matter only after product launch. The March 2026 10-Q says Generate has not
              generated product-sales revenue and expects substantially all foreseeable revenue from Novartis and Amgen,
              which makes those two large-pharma collaborators the only clear paying customers today. MD Anderson and
              Roswell Park still belong in this chapter because public filings and official announcements show them
              using the platform inside shared-risk co-development structures, contributing translational,
              manufacturing, and clinical-trial capabilities rather than simply lending brand association. Future
              pulmonologists, oncologists, payers, and patients sit downstream of GB-0895 or GB-5267 and are therefore
              not current customer proof. Public segmentation is accordingly narrow: two revenue-generating discovery
              collaborators, two active co-development partners, and no broad commercial buyer base yet.
