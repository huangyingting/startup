      - number: '3.2'
        title: Clinical-asset competition is won on proof, convenience, and payer precedent
        blocks:
          - type: paragraph
            body: >-
              On the clinical side, GB-0895 will be judged against assets that already occupy specialist mindshare and
              payer precedent. Tezspire is the cleanest direct comparator because it is the only marketed anti-TSLP
              option, but the real prescribing set is broader. Dupixent brings unmatched commercial scale and broad
              type-2 label familiarity; Nucala, Fasenra, and Xolair remain established options with differentiated
              phenotypic niches and years of real-world use. That matters because a future GB-0895 launch would not
              enter a blank category. It would enter an algorithm in which prescribers already understand when to reach
              for anti-IL-5, anti-IgE, anti-IL-4/13, or anti-TSLP therapy.


              Convenience helps, but convenience alone is no longer enough to define a moat. Generate positions GB-0895
              as a twice-yearly anti-TSLP antibody, which is commercially appealing against monthly Tezspire or Nucala,
              every-2-week Dupixent, and 2- or 4-week Xolair. Yet Fasenra already stretches maintenance dosing to every
              8 weeks, and GSK’s newly approved Exdensur makes twice-yearly respiratory biologic dosing commercially
              real. The clinical question is therefore not whether GB-0895 looks easier on paper; it is whether Phase 3
