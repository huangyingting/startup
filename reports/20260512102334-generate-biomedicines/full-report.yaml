  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product definition and module map
        blocks:
          - type: paragraph
            body: >-
              Generate’s public product is not a self-serve software suite with APIs, pricing, or named enterprise
              customers. The official site instead describes an integrated therapeutics workflow that starts with
              biological questions, uses machine learning to generate and optimize proteins, builds those sequences
              experimentally, measures their properties, and then routes the output into proprietary or partnered
              development programs. That framing matters because it makes the visible product map broader than a normal
              biotech asset table. The public surface includes The Generate Platform itself, the generative-biology
              layer, Chroma as a concrete technical artifact, the CryoEM-enabled validation engine, a proprietary
              respiratory lead asset in GB-0895, 2026 oncology catalysts in GB-4362 and GB-5267, and confidential
              collaboration programs for Amgen and Novartis. In workflow terms, the closest users are internal
              scientists, external pharma collaborators, and academic-clinical partners rather than software buyers. The
              product layer and the technology layer are therefore inseparable: Generate sells or monetizes
              discovery-and-development outcomes, not a public SaaS endpoint.
