        title: Exhibits
        blocks:
          - type: callout
            title: The market win condition is convenience plus evidence, not convenience alone
            body: >-
              Generate’s six-month dosing thesis matters because incumbents already trained payers and specialists to
              buy biologics; it will only change share if Phase 3 data are strong enough to justify switching from
              established class leaders.
            calloutType: insight
            claimRefs:
