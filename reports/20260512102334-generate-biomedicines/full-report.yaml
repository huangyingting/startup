      - number: '3.3'
        title: Platform and partnership competition rewards capital, partner trust, and optionality
        blocks:
          - type: paragraph
            body: >-
              Platform competition works differently. Generate’s unusual strength is that it can show both collaboration
              economics and a late-stage proprietary respiratory asset. That is not the default profile among AI-native
              discovery peers. Recursion discloses the deepest current partnership scale in the reviewed set, with more
              than $500 million of upfront and milestone payments achieved to date plus large Bayer and Sanofi
              economics. Isomorphic Labs pairs almost $3 billion of announced Lilly and Novartis collaboration potential
              with a $600 million external funding round. Absci is smaller on disclosed cash and current partner-program
              revenue, but it still markets an integrated AI-plus-wet-lab biologics creation stack and expects
              additional pharma partnerships.


              This means Generate competes for pharma attention in a crowded market where buyers can compare multiple
              AI-native stacks without committing to any one of them as the sole route to innovation. Recursion sells
              large-scale partnered discovery optionality. Isomorphic sells frontier-model-driven small-molecule design
              with blue-chip pharma validation. Absci sells biologics-specific AI plus wet-lab iteration. Generate sells
              similar platform optionality, but with the extra narrative that one internally generated asset is already
              in Phase 3. That combination is strategically distinctive, yet it does not eliminate the fact that pharma
              can multi-home across several platforms or delay a decision until later clinical proof exists.
