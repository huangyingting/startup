  - id: FE001
    title: Product architecture map
    type: stack
    layout: standard
    summary: >-
      The public Generate stack runs from protein-data priors through generative design into wet-lab validation and
      program translation.
    approximationNotes: Layers reflect only components directly visible in public pages, papers, and partner materials.
    claimRefs:
      - CE003
      - CE004
      - CE008
      - CE009
      - CE013
