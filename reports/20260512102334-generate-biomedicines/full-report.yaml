      - number: '1.5'
        title: Adverse Signals and Explicit Diligence Gaps
        blocks:
          - type: paragraph
            body: >-
              The main caution on Generate is not lack of capital or ambition; it is that the public evidence base still
              trails the company narrative in a few important places. Independent coverage turned the 2023 Series C into
              a symbol of market skepticism, and the current public story still depends on later clinical validation
              rather than on platform novelty alone. The 10-Q itself warns that additional funding will eventually be
              required for long-term operations, even though current liquidity extends runway into the first half of
              2028.


              There are also practical disclosure gaps. Public materials do not provide a reliable current employee
              count, do not disclose a customer count beyond collaboration partners, and do not expose a full post-IPO
              control map beyond filing-based references to Flagship’s large stake and broad share-overhang language.
              Those omissions matter because this chapter is supposed to establish reusable ground truth for later
              diligence. Investors can see cash, collaboration economics, and lead-asset progress, but they still cannot
              fully verify operating leverage, governance concentration, or a durable post-IPO valuation benchmark.
            claimRefs:
              - CO019
              - CO031
              - CO032
              - CO041
              - CO042
              - CO043
