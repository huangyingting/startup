            title: Comparator revenues are real, but they are not clean GB-0895 SAMs
            body: >-
              Dupixent, Xolair, and even Nucala mix asthma with multiple non-asthma indications, so headline product
              sales prove class willingness-to-pay more than they prove a clean asthma-only serviceable market for
              Generate.
