      - number: '8.5'
        title: Thesis-break triggers and final diligence asks
        blocks:
          - type: paragraph
            body: >-
              The thesis-break triggers here should be operational and price-aware, not generic. If GB-0895 execution
              slips, if the company revises runway down before new proof appears, if collaboration economics narrow
              further without replacement validation, or if the stock rerates into the low-$20s before evidence
              improves, the current fair-value posture breaks. The same is true if lock-up expiry or equity issuance
              expands float without a matching increase in conviction. Just as important, the open record still leaves
              several decision-critical gaps. No retained public source discloses a clean launch-pricing model for
              GB-0895, the fully diluted waterfall after option overhang and post-lock-up sales, or the exact financing
              bridge from Phase 3 execution to launch readiness. The analyst target cluster around $25 may ultimately be
              directionally right, but the public pages do not expose the specific severe-asthma share, pricing, margin,
              or dilution assumptions behind those targets. Final posture: track. Respect the strong cash balance,
              collaboration validation, and Phase 3 status, but demand either a cheaper entry point or materially better
              evidence before moving to a stronger recommendation.
