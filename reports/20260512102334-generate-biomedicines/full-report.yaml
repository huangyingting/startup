      - Monitorable trigger
      - Threshold / event
      - Action implication
    rows:
      - - GB-0895 Phase 3 / approval
        - Enrollment pace, exacerbation trend, safety or DSMB signals, regulator feedback
        - >-
          Material enrollment lag, clinical hold, safety signal, or efficacy package that no longer looks clinically
          persuasive
        - Pause multiple expansion, require revised cash plan, and treat lead-asset value as impaired
      - - CMC / supply chain
        - Lonza or Roswell batch failure, comparability issue, raw-material shortage, release-test deviation
        - Any event that threatens uninterrupted clinical supply or pushes commercial-readiness timing materially right
        - Discount launch timing and approval-readiness probability until contingency path is visible
      - - Cash runway
        - Quarterly operating cash use, financing markets, non-dilutive inflows
        - Runway compresses below roughly 12-15 months without a credible financing or partnering path
        - Assume dilutive raise or program cuts and re-underwrite downside
      - - Partner concentration
        - Novartis / Amgen revenue mix, new collaboration wins, milestone realization
        - No new major partner, stalled partner expansion, or Amgen tail revenue completing without replacement
        - Treat collaboration economics as finite rather than compounding
      - - Platform proof
        - Cross-program clinical conversion, external validation, partner outputs
        - >-
          No additional clear clinic-stage wins beyond GB-0895 or no prospective evidence that the platform converts
          repeatedly
        - Reduce platform premium and shift thesis toward a single-asset biotech
      - - People / execution
        - Senior departures, vacancy duration, repeated timetable resets
        - Loss of key scientific or clinical operators or serial reprioritization without cleaner focus
        - Demand refreshed operating model, succession plan, and resourced milestone map before underwriting recovery
