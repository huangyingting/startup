      - number: '7.2'
        title: >-
          Regulatory and legal risk: no current lawsuit overhang, but approval, AI, IP, and privacy process risk are
          real
        blocks:
          - type: paragraph
            body: >-
              The legal and regulatory posture is serious without being scandal-driven. Public filings repeatedly state
              that Generate is not currently party to any material legal proceedings, so this chapter does not
              manufacture litigation drama that the record does not support. The harder problem is process risk. GB-0895
              now sits in two replicate global Phase 3 severe-asthma studies sized around 1,600 patients, while a Phase
              1 COPD study continues in parallel. That means the lead asset still faces ordinary but severe late-stage
              failure paths: efficacy miss, safety surprise, deficient trial execution, or regulatory delay. Cornell's
              summary of 21 CFR 312.42 makes the point explicitly: FDA can place proposed or ongoing Phase 2 or 3
              studies on clinical hold for unreasonable risk or clearly deficient design. Overlaying that with the FDA's
              January 2025 AI guidance and the EMA/FDA 2026 AI principles matters because Generate markets GB-0895 as an
              antibody engineered with AI. The company also has visible lead-asset IP through patent US12110324B2 and
              visible privacy and terms pages, but those sources point toward contractual, freedom-to-operate, and
              data-governance diligence rather than toward a fully settled legal moat.
