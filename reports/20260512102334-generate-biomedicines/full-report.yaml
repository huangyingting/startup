            body: >-
              The comparable set is intentionally imperfect because Generate sits at the intersection of AI drug design,
              respiratory immunology, and late-stage biotech execution. Recursion and Absci anchor the AI-platform side
              of the range. Relay anchors the public therapeutic-platform side. Upstream is useful because it offers a
              TSLP-related respiratory comparator, but it remains earlier stage. Apogee gives an upper-end immunology
              valuation reference, yet its current asthma relevance is still more expansionary than directly comparable.
              Isomorphic’s $600 million 2025 external round helps only as a reminder that private capital still backs AI
              drug-discovery optionality; it is not a price anchor because valuation was not disclosed. In that context,
              Generate’s roughly $1.9 billion public value sits in a defensible middle: above low-proof AI or
              respiratory peers, below premium immunology multiples, and close to a public-clinical-stage base case. The
              public-evidence range is therefore best expressed as about $1.0 billion to $1.4 billion bear, $1.6 billion
              to $2.2 billion base, and $2.8 billion to $4.0 billion bull. Today’s market price lands inside base, not
              obviously below it.
