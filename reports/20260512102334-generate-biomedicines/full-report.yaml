      - number: '2.3'
        title: Buyer, user, and payer chain runs from specialist to plan to patient
        blocks:
          - type: paragraph
            body: >-
              The immediate commercial decision-maker for a severe-asthma biologic is not a single buyer. Prescribing
              influence sits with allergists, pulmonologists, and severe-asthma centers that phenotype patients, compare
              biologic mechanisms, and monitor exacerbation response. Budget authority, however, sits with commercial
              plans, Medicare-related payers, PBMs, and medical-benefit management teams that decide prior-authorization
              rules, site-of-care requirements, and renewal thresholds. Health-system specialty pharmacies and infusion
              or injection operations matter as workflow owners because benefit verification, training, refill
              coordination, and renewal paperwork can all slow adoption even when a physician wants to start treatment.


              Generate’s adjacent collaboration market has a different buyer chain entirely. There the buyer is a pharma
              R&D or BD organization paying upfronts, milestones, and royalties for access to platform output rather
              than a clinician treating a patient. That split is important for valuation. Collaboration revenue can
              support cash generation and external validation, but it does not answer whether GB-0895 can win specialist
              mindshare, secure payer coverage, and hold patients through renewal cycles. This chapter therefore maps
              the respiratory biologic path separately from the collaboration path instead of collapsing them into one
              budget.
            claimRefs:
              - CM014
              - CM015
