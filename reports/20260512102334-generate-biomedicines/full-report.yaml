              describes a generate-build-measure-learn sequence in which algorithms propose protein sequences for a
              specific therapeutic question, proteins are built at scale, next-generation systems measure molecular
              behavior, and the resulting data improve the next round of generation. Generative Biology adds a more
              specific data claim: the models are trained on the natural compendium of protein structures and sequences,
              supplemented with proprietary experimental data. Chroma makes that technical layer tangible. The Nature
              paper and the public Chroma page describe a diffusion-based protein generator with sub-quadratic
              graph-neural-network scaling, conditional sampling under multiple design constraints, and experimental
              characterization of 310 proteins. The wet-lab side is also unusually visible. Generate’s Andover CryoEM
              site is positioned as a 70,000-square-foot structural-data engine with four microscopes, wet-lab
              workflows, and ML-enabled processing that feeds terabytes of data back into the platform. Publicly, that
