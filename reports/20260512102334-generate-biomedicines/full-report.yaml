  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: 'Residual risk hierarchy: one lead asset carries multiple transmission channels'
        blocks:
          - type: paragraph
            body: >-
              Generate's residual risk stack is dominated by one observed fact pattern: GB-0895 is the only visible
              late-stage proof point, and the same asset underwrites clinical credibility, financing flexibility,
              partner confidence, and the argument that the Generate Platform can move beyond discovery into repeatable
              therapeutic outcomes. That makes the lead program's Phase 3 execution, approvability, and CMC bridge the
              first risk to rank, not because other risks are absent, but because most other risks transmit through it.
              The company's own filings reinforce that framing. Generate has no material legal proceedings today, but it
              still depends on third-party manufacturing, partner cash, additional capital, and acceptance of AI-enabled
              drug creation. The right ranking therefore is not generic biotech fear-stacking; it is a severity ordering
              of observed residual exposures. First is GB-0895 Phase 3 and approval risk, second is manufacturing plus
              supply concentration around the same lead asset, and third is the combination of partner concentration,
              future financing need, and unresolved end-to-end platform proof.
