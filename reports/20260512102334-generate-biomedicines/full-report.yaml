        - Only reviewed peer pairing a Phase 3 respiratory asset with platform collaborations
        - Commercial launch, net pricing, and CMC proof remain undisclosed
      - - Tezspire
        - Direct clinical incumbent
        - $1.131B 2025 sales; $303M Q1 2026 sales
        - Severe-asthma prescribers and payers
        - Closest marketed anti-TSLP comparator with established label and field infrastructure
        - Monthly dosing and incumbent positioning still need defense against larger franchises
      - - Dupixent
        - Direct clinical incumbent
        - $17.8B 2025 global net sales; $4.9B Q1 2026
        - Broad type-2 specialists, payers, and patients
        - Massive scale, broad label familiarity, and entrenched specialist awareness
        - Mechanism is less directly comparable to anti-TSLP and dosing is more frequent
      - - Nucala
        - Direct clinical incumbent
        - £2.008B 2025 sales
        - Severe eosinophilic asthma and adjacent eosinophilic disease
        - Deep IL-5 familiarity and simple monthly dosing without loading
        - Less convenient than q8w or twice-yearly options and not anti-TSLP
      - - Fasenra
        - Direct clinical incumbent
        - $1.981B 2025 sales; $483M Q1 2026 sales
        - Severe eosinophilic asthma
        - Every-8-week maintenance dosing already narrows the convenience gap
        - Still an alternative-mechanism biologic rather than an anti-TSLP benchmark
      - - Xolair
        - Direct clinical incumbent
        - CHF 3.1B 2025 sales; top Q1 2026 growth driver
        - Allergic-asthma patients and payers with anti-IgE precedent
        - Long commercial history and the only retained source set with explicit annual list-price disclosure
        - Older mechanism, clinic workflow complexity, and multi-indication revenue contamination
      - - Exdensur / depemokimab
        - Emerging clinical challenger
        - New FDA approval; reviewed set does not yet show commercial sales
        - Severe eosinophilic asthma patients wanting extended-interval dosing
        - Two doses per year plus positive pivotal data
        - Not anti-TSLP, but it removes convenience uniqueness from Generate’s story
      - - Recursion
        - Platform / partnership peer
        - $665.2M cash; >$500M upfront and milestone payments achieved to date
        - Large-pharma R&D and BD teams buying discovery optionality
        - Largest disclosed partnership scale in the reviewed peer set
        - No Phase 3 respiratory asset in the retained source set
      - - Absci
        - Platform / partnership peer
        - $125.7M cash; $0.2M Q1 2026 partner-program revenue
        - Biologics-focused pharma partners
        - Integrated AI plus wet-lab biologics platform
        - Smaller disclosed capital base and weaker current revenue proof than Generate or Recursion
      - - Isomorphic Labs
        - Platform / partnership peer
        - $600M external funding; nearly $3B potential collaboration value
        - Blue-chip pharma partners seeking frontier-model drug design
        - Strong capital signal plus Lilly and Novartis validation
        - Retained source set emphasizes small-molecule partnerships rather than respiratory or biologics proof
      - - Internal build / buy later
        - Status quo substitute
        - Embedded inside pharma R&D and BD budgets; public cost not isolated
        - Pharma organizations choosing self-help or later asset licensing
        - Preserves buyer control over data, timing, and partner concentration
        - Delays access to external platform speed and keeps opportunity cost hard to observe publicly
    notes: >-
      Rows mix product competitors, platform peers, and the internal-build substitute because Generate competes in
      separate buying contexts; scale signals are not additive across rows.
