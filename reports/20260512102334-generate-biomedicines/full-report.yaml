      - number: '4.3'
        title: 'Liquidity and burn: the IPO bought time, but the bridge to launch is still open'
        blocks:
          - type: paragraph
            body: >-
              Liquidity is strong in absolute dollars but still needs to be judged against burn and timeline. Generate
              ended March 31, 2026 with $516.6 million of cash, cash equivalents, and marketable securities, up from
              $221.5 million at year-end 2025 after the IPO added about $369.3 million of net proceeds. Q1 operating
              cash use was $80.4 million. Simple quarterly annualization gives a burn proxy of about $26.8 million per
              month and an implied runway of roughly 19 months from March 31 cash. That is meaningfully shorter than
              management’s stated runway into the first half of 2028, which implies that Q1 burn should not be read as a
              steady-state exit rate without adjustment.


              The problem is not that management’s guidance is necessarily wrong; it is that the public bridge is
              incomplete. The company says it expects additional capital for long-term operations even after the IPO.
              Public filings do not disclose the quarter-by-quarter assumptions behind burn moderation, working-capital
              normalization, or expected cash inflows that might lengthen runway. That matters because the same public
              sources also say GB-0895 Phase 3 full enrollment is expected in the first half of 2028. So the current
              cash runway appears to end around the same period as planned full enrollment, not obviously after it. That
              is enough to remove near-term solvency anxiety, but not enough to declare commercialization fully funded.
            claimRefs:
