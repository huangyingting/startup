      - number: '1.3'
        title: Capital Base, Collaborators, and Stakeholders
        blocks:
          - type: paragraph
            body: >-
              Generate’s capital formation story has three layers: venture equity, strategic collaboration economics,
              and public-market capital. The company raised a $370 million Series B in 2021 and a $273 million Series C
              in 2023; official materials said the Series C took equity financing since 2020 to nearly $700 million,
              while MedCity’s filing-based reporting put cumulative pre-IPO equity sold at $805.3 million. Fierce
              Biotech nevertheless framed the 2023 round as a down round because it came in $100 million below the 2021
              Series B, tying Generate to the broader biotech funding reset even though the round remained very large in
              absolute dollars.


              Strategic collaborators explain why the company could keep scaling through that reset. Amgen committed $50
              million upfront for an initial five-target collaboration and later added a sixth target. Novartis followed
              in 2024 with $50 million upfront cash, a $15 million equity purchase, and up to $1 billion in milestones.
              The February 2026 IPO then added $400 million gross proceeds and about $369.3 million of net proceeds.
              That financing strength is real, but it also changed the proof standard: public investors are now funding
              clinical execution—especially GB-0895—rather than paying purely for a platform promise.
