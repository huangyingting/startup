      - number: '1.4'
        title: Pipeline, Technical Validation, and Milestones
        blocks:
          - type: paragraph
            body: >-
              Pipeline and milestone progression now give the company-overview chapter substance beyond platform
              rhetoric. GB-0895, a long-acting anti-TSLP antibody designed for twice-yearly dosing, moved into two
              global Phase 3 severe-asthma trials in late 2025 and remains in Phase 1 COPD testing, making it the
              central value driver. Management’s first-quarter 2026 update also positioned GB-4362 and GB-5267 as the
              next clinical catalysts, with first-patient dosing expected in mid-2026 and the second half of 2026,
              respectively.


              External validation is broader than the pipeline alone. Chroma’s Nature publication and public Chroma page
              created a tangible technical artifact around Generate’s design stack. MD Anderson and Roswell Park
              collaborations show the platform being applied through shared-risk oncology structures rather than only
              through wholly owned programs. And the January 2025 JPM update said nearly 20 programs were underway. The
              chronology therefore shows a company that has translated platform investment into collaborations,
              technical credibility markers, and clinical-stage assets—but not yet one that has fully closed the loop
              with decisive late-stage efficacy data.
