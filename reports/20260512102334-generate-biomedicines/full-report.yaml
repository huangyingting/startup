      - number: '3.4'
        title: Commercial model and switching economics still favor incumbents today
        blocks:
          - type: paragraph
            body: >-
              Commercial-model comparisons also split cleanly by competition mode. Marketed asthma biologics compete
              inside a specialist-prescribed, prior-authorized reimbursement system. Public sources in this chapter
              support dosing, label, and sales scale well, but they do not support a clean apples-to-apples net-price
              comparison across Tezspire, Dupixent, Nucala, and Fasenra. Xolair is the exception: its official cost page
              gives a broad annual WAC range of roughly $30,000 to $60,000, illustrating how dose, frequency, and
              insurance structure shape realized economics. For the rest of the class, the public evidence set is better
              at showing how much commercial precedent exists than at showing exact rebated price parity.


              That still matters for competition. GINA, payer policies, and the American Lung Association tool all point
              to biologics being late-line, phenotype-gated, and actively managed by plans. Real-world switching
              literature shows that patients can improve after a biologic switch, so incumbency is not absolute, but
              switching is not frictionless either. In the platform market, the commercial model changes from reimbursed
              drug spending to upfronts, milestones, royalties, and research funding. Those economics are lumpy,
              buyer-specific, and inherently multi-homed, which is why partnership win-rates and renewal behavior remain
              harder to infer than branded respiratory sales.
