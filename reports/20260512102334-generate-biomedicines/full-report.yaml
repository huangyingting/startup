            title: Well funded for a pre-commercial biotech entering Phase 3
            body: >-
              Generate entered the public market with two sizeable pharma collaborations already in place and $516.6
              million of March 2026 liquidity. That gives the company unusual balance-sheet room to run a pivotal
              respiratory program while also moving additional oncology assets into the clinic.
