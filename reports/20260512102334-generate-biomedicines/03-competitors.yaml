- id: TP003
  title: Pricing / packaging comparison
  columns:
  - Offering / class
  - Commercial model
  - Public price or deal signal
  - Included capability / product
  - Key unknown
  - Implication for Generate
  rows:
  - - GB-0895 (future product)
    - Preapproval specialty biologic launch model
    - No public launch price or WAC disclosed
    - Potential twice-yearly anti-TSLP severe-asthma therapy
    - Net price, rebates, payer step rules, and site-of-care mix
    - Generate cannot yet claim a price-based wedge; clinical differentiation must come first
  - - Tezspire
    - Marketed specialty biologic reimbursed through payer-managed severe-asthma workflows
    - Retained source set discloses sales and dosing but not explicit WAC
    - Monthly anti-TSLP therapy for severe asthma
    - Rebated net price and preferred-formulary positioning
    - Closest mechanistic benchmark, but public price transparency is limited
  - - Dupixent
    - Marketed specialty biologic with broad type-2 franchise
    - $17.8B 2025 net sales; explicit WAC not retained here
    - Asthma plus broader type-2 label family
    - Asthma-only price and contract terms
    - Commercial scale makes Dupixent the loudest incumbent even if mechanism differs
  - - Nucala
    - Marketed monthly eosinophilic-biologic model
    - £2.008B 2025 sales; explicit WAC not retained here
    - IL-5 asthma therapy with adjacent indications
    - Current net price and rebating depth
    - Mature reimbursement history reduces the burden on payers to adopt another monthly option
  - - Fasenra
    - Marketed q8w-maintenance eosinophilic-biologic model
    - $1.981B 2025 sales; explicit WAC not retained here
    - IL-5R asthma therapy with stretched maintenance interval
    - Net price and contracting depth
    - Already narrows the convenience gap that Generate wants to widen
  - - Xolair
    - Marketed anti-IgE specialty biologic
    - Official cost page states roughly $30k-$60k annual WAC before rebates
    - Asthma plus multi-indication anti-IgE therapy
    - Realized patient cost depends on dose, frequency, and insurance
    - Shows biologic pricing already fits reimbursed specialty budgets
  - - Generate partnership model
    - Upfronts, milestones, royalties, and research funding
    - 'Novartis: $50M upfront + $15M equity + up to $1B milestones; Amgen: $50M upfront + target fees + milestones'
    - Discovery optionality plus internal pipeline validation
    - Active-program count, milestone timing, and renewal rate
    - Current cash support is real, but collaboration economics do not replace launch proof
  - - Recursion partnerships
    - Upfronts, milestones, royalties, multi-program discovery agreements
    - '>$500M upfronts/milestones achieved to date; Sanofi $100M upfront up to $5.2B; Bayer up to $1.5B plus royalties'
    - Large-scale partnered discovery platform
    - Per-program win rate and profitability
    - Strongest disclosed platform packaging in the reviewed set
  - - Isomorphic partnerships
    - Upfronts, milestones, royalties
    - Nearly $3B potential value excluding royalties; Lilly $45M upfront; Novartis $37.5M upfront
    - Small-molecule AI drug design partnerships
    - Current revenue cadence and program conversion
    - Proof that large pharma will pay for frontier AI optionality
  - - Absci partnered programs
    - Partner-program revenue plus future pharma deal flow
    - $0.2M Q1 2026 partner-program revenue; new 2026 large-pharma partnership targeted
    - Biologics-focused AI plus wet-lab creation engine
    - Standard contract template and current partner mix
    - Weaker current commercial proof than Generate, Recursion, or Isomorphic
  - - Internal build / buy later
    - Internal R&D budget or later asset acquisition
    - No public tariff; economics sit inside buyer budgets
    - Full control over data, target choice, and timing
    - Opportunity cost of waiting versus partnering early
    - A credible substitute that caps urgency for early exclusive platform commitments
  notes: Rows intentionally mix reimbursed biologics with partnership economics. The table compares business model and information transparency, not gross margins or like-for-like net price.
