- id: TP004
  title: Moat durability / competitive risk register
  columns:
  - Moat claim
  - Threat / competitor response
  - Severity
  - Evidence today
  - Mitigation / diligence ask
  rows:
  - - TSLP leadership
    - Tezspire already commercialized the pathway and owns current specialist familiarity
    - High
    - Tezspire is the marketed anti-TSLP benchmark with billion-dollar sales
    - Show Phase 3 differentiation that matters beyond pathway match alone
  - - Twice-yearly convenience
    - Exdensur already offers twice-yearly respiratory dosing
    - High
    - GSK now markets a two-dose-per-year severe-asthma biologic
    - Prove efficacy, safety, and payer value on top of convenience
  - - Payer access
    - Incumbents can defend share through prior-authorization precedent and contracting power
    - High
    - GINA plus payer policies show late-line, phenotype-gated use and plan preference risk
    - Model target phenotype, step-therapy strategy, and contracting posture explicitly
  - - Platform differentiation
    - AI discovery tools risk commoditization if they are bolt-on rather than workflow-embedded
    - High
    - McKinsey and regulatory reviews highlight weak automatic ROI and governance friction
    - Disclose proprietary data advantage, partner win-loss reasons, and renewal proof
  - - Internal build / buy later
    - Large pharma can develop internally or wait to license de-risked assets later
    - High
    - Independent sources and peer market structure both support multi-homing and self-help
    - Show why partners choose Generate earlier than they have to
  - - Capital intensity
    - Generate still funds clinical execution without product revenue while peers and incumbents also have strong capital bases
    - High
    - Generate, Recursion, Absci, and Isomorphic all signal that capital remains a gating variable
    - Bridge-launch budget, burn, and next major cash trigger in diligence
  - - Manufacturing and launch readiness
    - Approved incumbents already possess commercial supply and administration workflows
    - High
    - Public GB-0895 CMC detail is sparse compared with commercial peers
    - Request process-validation, fill-finish, and launch-operations evidence
  - - Platform proof risk
    - Partnership headlines may not translate into durable revenue quality
    - Medium
    - Absci and Recursion still report modest revenue relative to capital base
    - Request active-program counts, milestone cadence, and renewal cohorts
  - - Talent and partner competition
    - Recursion and Isomorphic can outbid or outsignal peers on capital and headline partnership scale
    - Medium
    - Recursion and Isomorphic disclose larger partnership economics than Generate
    - Assess retention plans, resource allocation, and partner concentration
  notes: Risk register focuses on moat durability rather than generic execution risk. Severity is an underwriting judgment based on the retained evidence set.
