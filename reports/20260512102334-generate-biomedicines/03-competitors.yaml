callouts:
- calloutType: risk
  title: Twice-yearly is no longer unique
  body: >-
    Generate’s dosing aspiration still matters, but Exdensur makes clear that extended-interval respiratory dosing is already commercial. That shifts the burden from convenience alone to the combined proof package of efficacy, safety, and payer value.
  claimRefs:
  - CP004
  - CP028
  - CP059
- calloutType: insight
  title: Generate is not a pure platform peer
  body: >-
    Recursion, Absci, and Isomorphic mostly compete for partnership budgets. Generate competes there too, but it also carries a Phase 3 respiratory asset, which is the most important reason the company cannot be benchmarked only on generic AI-discovery economics.
  claimRefs:
  - CP002
  - CP043
  - CP048
  - CP064
- calloutType: risk
  title: Pharma can wait, multi-home, or build internally
  body: >-
    The reviewed evidence does not support assuming that pharma must partner early with Generate. Buyers can spread bets across multiple AI vendors, develop internal capability, or wait to license a later-stage asset once more clinical proof exists.
