  - id: operational-manufacturing-and-platform-proof-risk
    title: 'Operational, manufacturing, and platform-proof risk: biologics scale-up and AI credibility remain coupled'
    body: >-
      Operational risk is not abstract here; it is named in the 10-Q. Generate says it relies on third parties for the
      supply and manufacture of product candidates across research, preclinical, clinical, and potentially commercial
      settings. The same filing identifies Lonza as the current sole drug-product provider for GB-0895, WuXi as the
      current sole drug-product provider for GB-4362, and Roswell Park as the intended manufacturing partner for
      GB-5267. It also warns that larger-scale production could prove difficult and that growing monoclonal-antibody
      demand could tighten raw-material supply. The public quality and security record is thinner than the platform
      ambition. Generate's privacy notice promises only reasonable technical, physical, and administrative safeguards
      and explicitly says security cannot be guaranteed. Its terms disclaim service availability. Cornell's cGMP and
      Part 11 pages underscore that serious manufacturing and electronic-record obligations exist, while the reviewed
      public sources do not surface an auditable package mapping the platform into those controls. This operating gap
      becomes more important because even Generate's CEO has publicly said AI is not a panacea across discovery,
      development, and commercialization, and outside reporting shows large pharma now wants measurable AI impact, not
      just narrative advantage.
