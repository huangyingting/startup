    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 支付方
      - 相关性
    rows:
      - - 核心重症哮喘生物制剂
        - 在优化控制药物治疗后，用于重症未控制哮喘的附加生物制剂维持治疗
        - 维持吸入剂、急救支气管扩张剂、未与生物制剂联用的口服激素，以及一般哮喘监测
        - 过敏科医生和呼吸科医生开方；商业保险、Medicare 相关支付方和专科药房流程支付
        - GB-0895 的主要市场边界，因为核心资产已在这里进入 3 期
      - - 抗 TSLP 重症哮喘子集
        - 靶向 TSLP 的商业化和管线重症哮喘生物制剂
        - TSLP 机制之外的 IL-5、IL-4/13 和抗 IgE 生物制剂
        - 与核心市场相同的专科医生和支付方堆栈
        - 最接近的直接可比集合，因为 Tezspire 是唯一已规模化上市的抗 TSLP 基准
      - - 更广泛的呼吸 / 2 型生物制剂代理
        - 影响哮喘专科医生行为和支付方先例的呼吸生物制剂及 2 型炎症品牌
        - 可单独剥离的非呼吸适应症，以及无关的免疫学和皮肤科支出
        - 专科医生、保险计划和卫生系统专科渠道
        - 有用的收入上限视角，但会被 Dupixent 和 Xolair 等多适应症品牌污染
      - - 支付方管理的重症哮喘准入层
        - 与生物制剂使用相关的表型分型、预授权、福利核验、治疗场所管理、补药和续方运营
        - 一般 PCP 哮喘就诊和无关药房管理费用
        - PBMs、医疗福利管理方、IDN 药房运营和使用管理团队
        - 关键采用瓶颈，因为准入规则决定患病率漏斗中有多少会变成可报销需求
      - - 已合作的蛋白发现合作
        - 药企伙伴为 Generate Platform 项目支付的首付款、里程碑、特许权使用费和研究经费
        - 下游已上市呼吸药物销售或泛 AI 平台预算
        - 大型药企 BD、联盟和 R&D 预算
        - 真实的二级市场层，因为它驱动当前公司收入，尽管并不定义 GB-0895 的患者采用
      - - 排除的替代品和邻近项
        - 现状控制治疗、急救治疗、通用 COPD 支出，以及未绑定呼吸商业化的泛 AI 发现叙事
        - n/a
        - 各类
        - 这些是参考点，不是今天应锚定 Generate 估值的核心市场
    notes: 各行不可相加。表格把患者治疗市场、支付方工作流和合作经济拆开，避免本章漂移成泛 AI 药物发现 TAM。
