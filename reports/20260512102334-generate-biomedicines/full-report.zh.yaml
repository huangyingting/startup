      - number: '8.3'
        title: 估值方法与当前背景
        blocks:
          - type: paragraph
            body: >-
              对 Generate 来说，经典 DCF 或简单 EV-sales
              倍数都是伪精确。公司刚上市、尚未商业化，资金主要还是为了抵达更多证据，而不是收割现金流。更适合阶段的方法，是把现金调整后的公开价值、股权结构现实和公开可比公司结合起来，并明确给出情景区间。这个框架重要，是因为当前市场数据页说明简单倍数为什么会误导：StockAnalysis
              只列出 $30.30 million 的过去 12 个月收入，却对应约 $1.90 billion 市值、$1.38 billion 企业价值，以及约 45.56x 的
              EV-sales。这些不是稳定运营公司的倍数，而是押注临床成功和平台持续性的期权价值倍数。资本结构同样重要。424B4 显示优先股转换为 69.33 million 普通股，发行后股份数为 127.45
              million；10-Q 则称到 4 月 29 日已有 128.19 million 股流通。另有 103.1 million 股仍锁定到 2026 年 8 月，7.09 million
              计划股仍可用。因此，投资者应把 Generate 估为现金加后期成功概率，再扣除未来稀释风险，而不是一个已完成的盈利模型。
            claimRefs:
              - CV004
              - CV005
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
              - CV043
          - type: figure
