      - number: '5.2'
        title: 运营工作流与架构
        blocks:
          - type: paragraph
            body: >-
              公司的公开架构是闭环，而不是单一设计模型。平台页描述了一套生成-构建-测量-学习序列：算法围绕特定治疗问题提出蛋白序列，大规模构建蛋白，下一代系统测量分子行为， 再用所得数据改进下一轮生成。Generative
              Biology 页面给出更具体的数据主张：模型基于自然蛋白结构与序列汇编训练， 并补充自有实验数据。Chroma 让这一技术层变得具体。Nature 论文和公开 Chroma 页面描述了一个基于扩散的蛋白生成器，
              具备次二次图神经网络扩展、多重设计约束下的条件采样，并对 310 种蛋白做了实验表征。湿实验室侧也异常可见。Generate 的 Andover CryoEM site 被定位为一个
              70,000-square-foot 结构数据引擎，配有 4 台显微镜、湿实验室工作流和 ML 支撑处理，可将 TB 级数据回流平台。 公开层面，这是靶点或蛋白概念如何从模型走到实证验证的最清晰版本。
