      - number: '4.2'
        title: 费用结构和经营杠杆仍是商业化前、研发主导
        blocks:
          - type: paragraph
            body: >-
              Generate 的成本结构仍像后期商业化前技术生物公司，而不是一家经营杠杆可见的企业。Q1 2026 运营费用为 $71.3 million， 而确认合作收入只有 $7.2 million，收入大约覆盖 10%
              的运营成本。R&D 为 $57.8 million，约占 运营费用的 81%；G&A 为 $13.5 million。这个组合重要：烧钱主要由科学、临床执行和平台投入驱动，而不是客户获取或交付成本，
              后者可能随规模快速下降。管理层自己对 R&D 上行的解释，是继续投资 GB-0895 Phase 3 以及更高人力费用。


              较小但仍重要的二阶问题，是上市公司成本台阶。G&A 上升，原因是股权薪酬和新上市带来的专业服务费。这意味着部分成本增长是耐久的， 不是一次性。公开监管文件还显示长期租赁义务、与 GB-0895 Phase 3
              工作绑定的内嵌设备租赁，以及管理层称包含近 20 个项目的宽管线。换句话说，支出底座覆盖全组合且基础设施很重。公开来源没有披露毛利率、CAC、回本周期或伙伴层面的交付
              利润率，所以最好的公开单位经济性视角仍是烧钱桥，而不是盈利模型。
