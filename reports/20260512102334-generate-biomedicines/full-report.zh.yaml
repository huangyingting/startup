      - number: '2.3'
        title: 买方、使用者与支付链条从专科医生延伸到计划再到患者
        blocks:
          - type: paragraph
            body: >-
              重度哮喘生物药的即时商业决策者不是单一买方。处方影响力掌握在过敏科医生、呼吸科医生和重度哮喘中心手中，他们给患者分型、比较生物药机制并监测急性加重反应。 预算权在商业保险计划、Medicare 相关支付方、PBM
              和医疗福利管理团队手中，由它们决定事先授权规则、治疗地点 要求和续用门槛。医疗系统专科药房及输注或注射运营也重要，因为获益核验、培训、补药协调和续用文书流程都会在医生想启动治疗时拖慢采用。


              Generate 相邻的合作市场买方链条完全不同。那里买方是药企 R&D 或 BD 组织，它们支付预付款、里程碑和特许权使用费，换取平台产出的访问权，
              而不是临床医生治疗患者。这一区分对估值重要。合作收入可以支撑现金生成和外部验证，但不能回答 GB-0895 能否赢得专科医生心智、拿到支付覆盖，
              并让患者留在续用周期。本章因此将呼吸生物药路径和合作路径分开描绘，而不是压成一个预算池。
