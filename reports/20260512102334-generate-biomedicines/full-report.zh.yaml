      - number: '1.2'
        title: 领导层、治理与赞助方影响力
        blocks:
          - type: paragraph
            body: >-
              领导层由三类能力拼起来：大型药企运营经验、内部平台延续性，以及仍在场的 Flagship 影响力。Mike Nally 自 2021 掌舵 Generate；他的 Merck
              商业和组合经验，似乎是融资、拿下合作伙伴和转向公开市场的核心。Jason Silvers 现在兼任 president 和 CFO，也是 Series C、IPO
              和现金跑道叙事中的公开财务声音。技术延续性由联合创始人兼 CTO Gevorg Grigoryan 承接；他与 Chroma 以及公司更广泛的生成式蛋白设计技术栈紧密相关。


              GB-0895 迈向后期呼吸开发时，Aarif Khakoo 和 Laurie Lee 等 2025-2026 人才补强强化了科学和医学层，Sean Martin
              则负责法律和治理执行。董事会构成也值得注意。Chair Noubar Afeyan 将 Generate 直接连到 Flagship Pioneering；当前董事会还包括 Frances
              Arnold、Stéphane Bancel、Marsha Fanucci、Jane Mendillo、Paul Parker、Nancy Simonian、Rupert Vessey 和 Nally
              本人。这套组合带来科学声望和上市公司经验，但也意味着投资者必须把赞助方影响力纳入运营现实。
