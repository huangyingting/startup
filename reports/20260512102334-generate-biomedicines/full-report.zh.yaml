      - number: '3.3'
        title: 平台与合作竞争奖励资本、伙伴信任和可选性
        blocks:
          - type: paragraph
            body: >-
              平台竞争的逻辑不同。Generate 的少见强项在于，它既能展示合作经济性，又拥有一个后期自有呼吸资产。这不是 AI 原生发现同业的默认画像。 在所审视的集合中，Recursion
              披露的当前合作规模最深：迄今已取得超过 $500 million 预付款和里程碑付款，另有大型 Bayer 和 Sanofi 经济权益。Isomorphic Labs 结合了接近 $3 billion 的已公告
              Lilly 和 Novartis 合作潜力，以及一轮 $600 million 外部融资。 Absci 在披露现金和当前合作项目收入上较小，但仍营销一个整合 AI
              与湿实验室的生物药创造技术栈，并预期新增药企合作。


              这意味着，Generate 在拥挤市场里争夺药企注意力。买方可以比较多个 AI 原生技术栈，而不必把任何一家当成唯一创新路径。Recursion 卖的是大规模合作发现可选性。 Isomorphic
              卖的是由前沿模型驱动的小分子设计，并有头部药企验证。Absci 卖的是面向生物药的 AI 加湿实验室迭代。 Generate 卖相似的平台可选性，但额外叙事是一个内部生成资产已经进入 Phase
              3。这个组合在战略上有辨识度，但不能改变现实：药企可以在多个平台上下注， 也可以等到更多临床证据出现后再决定。
