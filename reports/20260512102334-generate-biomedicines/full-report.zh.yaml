      - number: '4.3'
        title: 流动性与烧钱：IPO 买来时间，但通向上市的桥仍未闭合
        blocks:
          - type: paragraph
            body: >-
              流动性绝对金额很强，但仍要放在烧钱和时间线里看。Generate 截至 March 31, 2026 拥有 $516.6 million 现金、现金等价物和有价证券； year-end 2025 为 $221.5
              million，IPO 增加约 $369.3 million 净募资。Q1 运营现金使用为 $80.4 million。简单按季度年化， 烧钱测算值约 $26.8 million per month，March
              31 现金对应隐含现金跑道约 19 months。这明显短于管理层所称延伸至 2028 上半年的 现金跑道，意味着不能在不调整的情况下把 Q1 烧钱当作稳态退出率。


              问题不在于管理层指引必然错误，而在于公开桥梁不完整。公司称，即便 IPO 后，长期运营仍预期需要额外资本。公开监管文件没有披露烧钱放缓、
              营运资本正常化或可能延长现金跑道的预期现金流入逐季假设。这很关键，因为同一批公开来源还称 GB-0895 Phase 3 全面入组预计在 2028
              上半年。因此，当前现金跑道似乎在计划全面入组的同一时期附近结束，并不显然在其之后。这足以消除近期偿付焦虑， 但不足以宣布商业化资金已完全覆盖。
