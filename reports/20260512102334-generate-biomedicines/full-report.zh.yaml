      - number: '3.5'
        title: 护城河耐久性参差：若 Phase 3 成功，上行真实；但执行和商品化风险也很重
        blocks:
          - type: paragraph
            body: >-
              因此，Generate 的竞争位置真实但参差。正面很直接：GB-0895 给公司一个已获报销类别中的有形 Phase 3 资产，TSLP 机制提供了与 Tezspire
              对标的干净基准，按当前指引，Generate 仍有足够资本把平台和管线工作资助到 2028。这比纯发现平台故事证据更强， 也解释了为什么 Generate 似乎可以同时争夺临床价值和合作价值。


              但护城河尚未坐实。现有生物药已经掌握商业基础设施、支付方先例和专科医生熟悉度。Exdensur 压缩了便利性叙事。Recursion 和 Isomorphic 披露了更大的合作经济性和资本信号。 McKinsey
              与开放获取监管综述还给出更广的警告：AI 药物发现尚未证明会自动带来时间线或成功率提升，大型药企仍有充分理由内部自建、在多个平台下注， 或等到之后许可引进已降低风险的资产。Generate
              的尽调负担因此很清楚：证明后期呼吸差异化，证明 CMC 和上市准备，并证明平台验证能转化成比 阶段性发现收入更耐久的东西。
