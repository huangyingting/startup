    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、运营模式与布局
        blocks:
          - type: paragraph
            body: >-
              Generate:Biomedicines 由 Flagship Pioneering 于 2018 创立、2020 推出；2026 年初，公司成为上市临床阶段 生物科技公司，跨过下一道融资门槛。March
              2026 10-Q 将主要执行办公室列在 101 South Street, Suite 900, Somerville, Massachusetts；公司主页则把更广的运营足迹描述为 Boynton Yards
              和 Andover 合计超过 140,000 square feet。


              管理层一贯把公司讲成生成生物学企业，而不是纯软件平台：Generate Platform 把机器学习设计接到连续的生成-构建-测量-学习实验循环； 主页称公司已经研究数百万种蛋白，并生成、构建、测试超过
              42,000 种。这些规模说法重要，因为 Generate 仍没有产品销售。 公开文件和 Q1 2026 业绩新闻稿都说明，当前收入来自研究合作——主要是 Amgen 和
              Novartis——同时公司用这些资金推进以 GB-0895 为首的自有临床管线。可用结论是：Generate 是资本密集型治疗药物公司，有差异化发现引擎，但不是软件式经常性收入故事。
