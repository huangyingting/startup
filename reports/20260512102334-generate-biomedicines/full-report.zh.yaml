  - id: TP001
    title: 竞争对手画像表
    columns:
      - 竞争对手 / 类别
      - 竞争方式
      - 规模 / 融资信号
      - 目标细分市场
      - 差异化
      - 限制
    rows:
      - - Generate:Biomedicines（参考行）
        - 自有资产 + 平台
        - $516.6M 流动性；Phase 3 重症哮喘资产；无产品销售
        - 重症哮喘生物制剂，加药企发现合作伙伴
        - 所审阅同业中，唯一把 Phase 3 呼吸资产与平台合作配对的公司
        - 商业上市、净价和 CMC 证明仍未披露
      - - Tezspire
        - 直接临床现有产品
        - $1.131B 2025 年销售额；$303M Q1 2026 销售额
        - 重症哮喘处方医生和付款方
        - 最接近的已上市抗 TSLP 可比产品，标签和地面团队已成型
        - 月度给药和现有定位仍需抵御更大产品组合
      - - Dupixent
        - 直接临床现有产品
        - $17.8B 2025 全球净销售额；$4.9B Q1 2026
        - 广义 2 型炎症专科医生、付款方和患者
        - 规模巨大，标签熟悉度广，专科医生认知牢固
        - 机制与抗 TSLP 的可比性较低，且给药更频繁
      - - Nucala
        - 直接临床现有产品
        - £2.008B 2025 年销售额
        - 重症嗜酸性哮喘及邻近嗜酸性疾病
        - IL-5 熟悉度深，月度给药简单且无需负荷剂量
        - 便利性不如每 8 周或半年给药选项，也不是抗 TSLP
      - - Fasenra
        - 直接临床现有产品
        - $1.981B 2025 年销售额；$483M Q1 2026 销售额
        - 重症嗜酸性哮喘
        - 每 8 周维持给药已缩小便利性差距
        - 仍是替代机制生物制剂，不是抗 TSLP 基准
      - - Xolair
        - 直接临床现有产品
        - CHF 3.1B 2025 年销售额；Q1 2026 头号增长驱动
        - 过敏性哮喘患者，以及已有抗 IgE 先例的付款方
        - 商业历史长，所保留来源集中唯一明确披露年度标价
        - 机制较老，门诊工作流复杂，收入也受多适应症污染
      - - Exdensur / depemokimab（竞品）
        - 新兴临床挑战者
        - FDA 新近批准；所审阅材料尚未显示商业销售
        - 希望延长给药间隔的重症嗜酸性哮喘患者
        - 每年两剂，加关键性数据为阳性
        - 不是抗 TSLP，但它削弱了 Generate 叙事中的便利性独特性
      - - Recursion
        - 平台 / 合作同业
        - $665.2M 现金；迄今已实现 >$500M 首付款和里程碑付款
        - 购买发现可选性的大型药企 R&D 和 BD 团队
        - 所审阅同业中披露合作规模最大
        - 所保留来源集中没有 Phase 3 呼吸资产
      - - Absci
        - 平台 / 合作同业
        - $125.7M 现金；$0.2M Q1 2026 合作伙伴项目收入
        - 聚焦生物制剂的药企合作伙伴
        - AI 与湿实验室一体化的生物制剂平台
        - 披露资本基础小于 Generate 或 Recursion，当前收入证明也更弱
      - - Isomorphic Labs
        - 平台 / 合作同业
        - $600M 外部融资；潜在合作价值近 $3B
        - 寻求前沿模型药物设计的蓝筹药企合作伙伴
        - 资本信号强，并有 Lilly 和 Novartis 背书
        - 所保留来源集更强调小分子合作，而非呼吸或生物制剂证明
      - - 内部自建 / 以后再买
        - 现状替代方案
        - 嵌在药企 R&D 和 BD 预算中；公开成本未单列
        - 选择自建或以后再做资产授权的药企组织
        - 保留买方对数据、时间和合作伙伴集中度的控制
        - 推迟获得外部平台速度，也让机会成本难以公开观察
    notes: 这些行混合了产品竞争对手、平台同业和内部自建替代，因为 Generate 在不同购买场景中竞争；各行规模信号不可相加。
