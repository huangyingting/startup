      - number: '2.2'
        title: 用患者数和现有产品收入两条线给机会定界
        blocks:
          - type: paragraph
            body: >-
              公开数据支持几种有用的规模视角，但没有一个干净的已发布 TAM。漏斗顶部很宽：CDC 支持的分析称 2021 年美国有 24.9 million 人患有哮喘。 这不能直接转成 GB-0895 需求，因为估计只有约
              3.6% 到 10% 的哮喘患者属于重症，一篇综述估计所有哮喘患者中约 2.8% 可能符合至少一种生物药条件。
              这些区间才是理解患者基数的正确方式：庞大的哮喘人群，一旦从诊断转向重症会迅速收窄；再叠加生物药适用性和覆盖约束，还会再次收窄。


              第二条线是现有产品收入。AstraZeneca 报告 Tezspire 2025 销售额为 $1.131 billion、Fasenra 为 $1.981 billion；GSK 报告 Nucala 为
              £2.008 billion；Roche 报告 Xolair 为 CHF 3.1 billion；Regeneron 报告 full-year 2025 全球 Dupixent 销售额为 $17.8
              billion。这些数字说明市场已经能支撑重磅级生物药，但不应机械相加成 GB-0895 的 SAM， 因为几个品牌覆盖食物过敏、荨麻疹、CRSwNP、特应性皮炎、COPD
              和其他非哮喘适应症。正确结论是边界逻辑： Tezspire 是最接近的直接类别基准，较老的哮喘生物药界定核心已报销类别，Dupixent 更适合作为 2 型生物药上限代理指标，而不是纯哮喘可比对象。
