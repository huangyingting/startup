  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 剩余风险层级：一个核心资产承载多条传导路径
        blocks:
          - type: paragraph
            body: >-
              Generate 的剩余风险堆栈由一个已观察到的事实模式主导：GB-0895 是唯一可见的后期证据点，同一资产同时支撑临床可信度、融资灵活性、伙伴信心，以及 Generate Platform
              能从发现走向可重复治疗结果的论点。因此，核心项目的 3 期执行、获批可能性和 CMC
              衔接应排在第一风险，并不是因为其他风险不存在，而是因为多数其他风险都经由它传导。公司自己的文件也强化了这个框架。Generate 目前没有重大法律程序，但仍依赖第三方制造、伙伴现金、额外资本，以及市场对 AI
              赋能药物创造的接受度。因此，正确排序不是泛泛堆叠生物科技恐惧，而是按已观察剩余暴露的严重性排序。第一是 GB-0895 3
              期和获批风险，第二是围绕同一核心资产的制造和供应集中，第三是伙伴集中、未来融资需求和端到端平台证据未解的组合。
