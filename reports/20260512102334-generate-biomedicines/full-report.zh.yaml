      - number: '7.5'
        title: 人员、执行与投资逻辑破裂触发因素：管理能力如今和模型质量一样关键
        blocks:
          - type: paragraph
            body: >-
              执行压力是真实的剩余风险，因为 Generate 试图运行一个管理负担重、多模态、刚上市的组织，同时还要证明一个核心 3 期项目并推进肿瘤资产。S-1/A 和 424B4
              称，未来成功取决于留住关键员工、咨询顾问、外部顾问，以及合格的科学、技术、医学和管理人才；文件还称，公司没有关键人保险，并且可能难以在大波士顿市场留住人才。公开页面没有反驳这一负荷画像，反而强化了它。招聘内容突出招聘需求，以及对机器学习、生物统计、CryoEM、IT、法律、财务和运营人才的依赖；2026
              年 4 月概览材料列出一支宽广的高管队伍，本身也需要维持和协调。Fierce 给出了更尖锐的反向表述：Generate 把自己描述为一家 300 人小型生物科技公司，每年可以生成 10-15
              个项目，但仍需要伙伴处理最好的项目。落到实践里，投资逻辑破裂触发因素应该具体：如果 GB-0895 延误，如果 CMC
              失速，如果在现金跑道压缩前伙伴基础没有扩宽，或如果关键科学运营人员离开，下行不是局部的，而是会一次性击中整个承销逻辑。
