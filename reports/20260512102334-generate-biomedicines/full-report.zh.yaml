  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议与入场纪律
        blocks:
          - type: paragraph
            body: >-
              在今天公开来源可见的价格带上，Generate 并没有明显错价到足以给出强方向性判断。StockAnalysis 和 CompaniesMarketCap 在 2026 年 5 月 12 日都显示 GENB 约
              $14.92、股权价值约 $1.90 billion；MarketScreener 同期显示实时价格 $14.98，上一收盘价 $14.37。StockAnalysis 在扣除公司现金头寸后，还给出约 $1.38
              billion 的企业价值。这不是困境交易。但当公司仍没有产品收入、Q1 经营现金流烧掉 $80.4
              million，并且只依赖两个产生收入的合作方时，它也不是清晰便宜。正确结论因此是观察，中等置信度，估值合理。股票有足够后期项目和资产负债表支撑，避免直接负面判断；但估值垫和证据清晰度还不足以支撑今天买入。只有价格回落或证据改善快于估值时才上调；如果证据基础显著增强之前，股价先重估到分析师目标附近，则下调。
