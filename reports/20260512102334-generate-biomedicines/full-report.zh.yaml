  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 含义
      - 尽调问题
    rows:
      - - 控制治疗后重症哮喘负担仍然持续
        - 增长驱动
        - 近期且结构性
        - 为可降低发作或激素使用的新生物制剂保留需求
        - 在 Generate 上市地区，由专科医生管理且未受控的人群有多大？
      - - 现有重磅生物制剂报销先例
        - 增长驱动
        - 近期
        - 说明专科医生和医保计划已经为高价哮喘生物制剂付费
        - 当前类别收入中，真正仅来自哮喘的比例有多少，混合适应症又占多少？
      - - GB-0895 半年给药一次的目标
        - 增长驱动
        - 中期
        - 若疗效和安全性仍有竞争力，便利性和持续用药可形成差异化
        - Generate 能否证明足够获益，支撑患者从每月或每 8 周给药的现有产品切换？
      - - 优化控制治疗后的 Step-5 定位
        - 采用约束
        - 即期
        - 生物制剂排在吸入控制治疗优化和专科评估之后，合格漏斗因此收窄
        - 关键美国医保计划主要采用哪些表型和控制治疗失败规则？
      - - 预授权和处方集引导
        - 采用约束
        - 即期
        - PA、续保和医保计划偏好可能拖慢启动，并引导类别份额
        - 上市模型应假设多少拒付、申诉和给药地点摩擦？
      - - 首个生物制剂无应答与切换
        - 采用约束
        - 持续
        - 商业份额取决于现有生物制剂疗效不足或不耐受后，GB-0895 能切入哪里
        - 按临床和准入条件看，哪些现有产品患者群最容易切换？
      - - 现有产品多适应症壁垒
        - 采用约束
        - 持续
        - Dupixent、Xolair、Nucala 和 Fasenra 已经嵌入专科医生习惯和付款方合同
        - 现有产品目前享有多强的医生惯性和合同保护？
      - - 生物制剂制造与专科渠道成本
        - 采用约束
        - 持续
        - 冷链、福利核验和报销运营会挤压实际经济性
        - 哪些总价到净价、给药和给药地点假设站得住脚？
      - - COPD 邻近机会仍处早期
        - 采用约束
        - 较长期
        - Phase 1 COPD 数据太早，当前不足以扩大核心市场边界
        - 需要哪些 Phase 2 或更后期证据，才足以把 COPD 纳入主要市场视角？
      - - 药企合作预算
        - 次级增长驱动
        - 近期
        - 可在产品上市前支撑现金流入，但不能替代呼吸系统产品采用
        - 与现有合作伙伴还有多少活跃靶点和里程碑机会？
    notes: 该登记表强调时间和预算归属，而不是抽象利弊；Generate 的市场结果既取决于证据节奏和覆盖摩擦，也取决于类别规模。
