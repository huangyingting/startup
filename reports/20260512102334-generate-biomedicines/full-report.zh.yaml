      - number: '5.4'
        title: 差异化、IP 与伙伴延伸
        blocks:
          - type: paragraph
            body: >-
              Generate 的护城河主张在被描述为耦合系统时最强，而不是单一模型。公开来源显示三层互相强化。第一，Chroma 和更广泛的生成生物学叙事，给 Generate
              一个真实技术产物，也给可编程蛋白设计一套语言。第二，物理实验层并不抽象：公司公开了 CryoEM site、高通量实验，以及 结构进入学习循环的工作流。第三，伙伴结构把平台延伸到下游开发。Amgen
              用这套技术栈做多靶点、多模态 蛋白发现；Novartis 把 Generate Platform 与自身靶点生物学和生物药开发能力结合；MD Anderson 将系统延伸到转化肿瘤学；Roswell Park
              则补上细胞治疗设计、cGMP 生产和早期临床执行。Patent US12110324B2 也为主导呼吸资产提供了围绕抗 TSLP 抗体和计算优化的可见 IP 锚点。 问题在于，一些最强的广度主张——例如跨 9
              个靶点的 de novo 结合子，或广泛伙伴吞吐——仍是公司自述，而不是逐项目独立基准验证。
