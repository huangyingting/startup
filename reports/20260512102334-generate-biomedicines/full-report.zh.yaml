  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: IC 风格评分卡，衡量 Generate 在证明、现金、经济性、风险、估值支撑和证据质量上的表现。
    approximationNotes: 分数是 0-10 启发式评分，用于判断当前公开价格下的可投性，不是公司质量的绝对衡量。
    claimRefs:
      - CV010
      - CV018
      - CV020
      - CV025
      - CV027
      - CV032
      - CV044
      - CV050
      - CV051
      - CV052
      - CV053
      - CV054
    data:
      items:
        - label: 领先资产证明
          score: 8
          detail: 一个真实的 3 期呼吸系统资产已经摆在市场面前。
        - label: 现金缓冲
          score: 8
          detail: IPO 后流动性有意义，即使还不足以支撑完整商业化。
        - label: 合作验证
          score: 7
          detail: Novartis 和 Amgen 证明药企兴趣真实存在。
        - label: 平台可选性
          score: 7
          detail: 官方管线和平台页面显示价值路径不止一条。
        - label: 收入质量
          score: 3
          detail: 仍无产品收入，合作收入也较集中。
        - label: 融资能见度
          score: 4
          detail: 有现金跑道指引，但 H1 2028 之后的桥接仍不透明。
        - label: 估值支撑
          score: 6
          detail: 当前价格位于可辩护的基准区间，不是明显便宜货。
        - label: 证据质量
          score: 5
          detail: 公开来源对现金和阶段支持强，对上市经济性和稀释支持较弱。
