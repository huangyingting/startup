              管线和里程碑推进让公司概况这一章不止停留在平台话术。GB-0895 是一种长效抗 TSLP 抗体，设计目标为每年两次给药； 2025 年底进入两项全球 Phase 3 重度哮喘试验，并仍处于 Phase 1
