      - number: '8.5'
        title: 投资逻辑破裂触发因素与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              这里的投资逻辑破裂触发因素应当是运营和价格敏感的，而不是泛泛而谈。如果 GB-0895 执行延误，如果公司在新证据出现前下调现金跑道，如果合作经济进一步收窄且没有替代验证，或如果证据改善前股价重估到
              low-$20s，当前合理估值姿态就会破裂。如果锁定期到期或股权发行扩大流通盘，却没有同步提升信心，也同样如此。同样重要的是，公开记录仍留下几个影响决策的关键缺口。审核保留的公开来源没有披露 GB-0895
              清晰的上市定价模型、期权悬置和锁定期后出售之后的完全稀释瀑布，或从 3 期执行到上市准备的确切融资桥。围绕 $25
              的分析师目标簇最终可能方向正确，但公开页面没有披露这些目标背后的具体重症哮喘份额、定价、利润率或稀释假设。最终姿态：观察。尊重强现金余额、合作验证和 3
              期状态，但在给出更强建议之前，要求更便宜的入场点或实质更好的证据。
