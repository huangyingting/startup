  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: Generate 在两种主要模式中竞争，另有现状替代
        blocks:
          - type: paragraph
            body: >-
              Generate 的竞争集不是一张平面矩阵。第一层，也是商业上占主导的一层，是重度哮喘直接产品竞争。若 GB-0895 上市，呼吸科医生、过敏科医生和支付方会把它同已获批生物药比较；
              这些药已经拥有标签、报销先例、地推支持和监测流程。Tezspire 是最干净的机制基准，因为它是唯一已经卖进重度哮喘、具备规模的抗 TSLP 资产； Dupixent、Nucala、Fasenra 和
              Xolair 则是医生已熟悉如何排序的成熟替代机制选择。Exdensur 重要，因为它说明每年两次给药的便利性已经在呼吸生物药中变成商业现实， 而不是假想未来。


              第二层是发现平台和合作竞争。这里买方不是临床医生或医疗计划，而是药企 R&D 或 BD 团队，在 Generate、Recursion、Absci、Isomorphic Labs
              之间比较，也会考虑内部自建或之后再许可引进资产。该买方更关心资本基础、科学产出效率、外部验证和可选性，而不是呼吸销售队伍准备度。
              实际含义是，单一混合矩阵会遮蔽真正的采购决策。本章因此分开讨论治疗竞争、平台竞争和内部自建替代，而不是假装它们可以互换。
