  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与模块图
        blocks:
          - type: paragraph
            body: >-
              Generate 的公开产品不是带 API、定价或具名企业客户的自助式软件套件。官网描述的是一套集成的治疗药物工作流：从生物学问题出发，
              用机器学习生成并优化蛋白，实验性构建序列，测量其性质，再把输出导入自有或合作开发项目。这个框架重要，因为它让可见产品图谱比常规生物科技资产表更宽。 公开表层包括 The Generate Platform
              本身、生成生物学层、Chroma 这一具体技术产物、CryoEM 支撑的验证引擎、GB-0895 这一自有呼吸主导资产、 2026 肿瘤催化剂 GB-4362 和 GB-5267，以及 Amgen 和
              Novartis 的保密合作项目。从工作流看，最接近的用户是内部科学家、 外部药企合作方和学术临床伙伴，而不是软件买家。因此，产品层和技术层不可分割：Generate 销售或变现的是发现与开发成果，不是公开
              SaaS 端点。
