      - number: '7.3'
        title: 运营、制造与平台验证风险：生物制剂放大和 AI 可信度仍绑在一起
        blocks:
          - type: paragraph
            body: >-
              这里的运营风险并不抽象；10-Q 里已经点名。Generate 称，公司在研究、临床前、临床以及潜在商业化环节，依赖第三方供应和制造候选产品。同一文件指出，Lonza 是 GB-0895
              当前唯一药品制剂供应商，WuXi 是 GB-4362 当前唯一药品制剂供应商，Roswell Park 则是 GB-5267
              的拟定制造伙伴。文件还警告，更大规模生产可能很难，单抗需求增长也可能压紧原材料供应。公开质量和安全记录比平台雄心薄。Generate
              的隐私声明只承诺合理的技术、物理和管理防护，并明确说安全无法保证。服务条款也不承诺服务可用性。Cornell 的 cGMP 和 Part 11
              页面强调，制造和电子记录义务很严肃，而审核过的公开来源没有给出一个可审计的资料包，把平台映射到这些控制之中。这个运营缺口更重要，因为即便 Generate 的 CEO 也公开说过，AI
              并非贯穿发现、开发和商业化的万能药；外部报道也显示，大型药企现在要看可衡量的 AI 影响，而不只是叙事优势。
