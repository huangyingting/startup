      - number: '7.2'
        title: 监管与法律风险：当前没有诉讼悬置，但获批、AI、IP 和隐私流程风险真实存在
        blocks:
          - type: paragraph
            body: >-
              法律和监管状态严肃，但不是丑闻驱动。公开文件反复说明 Generate 目前不是任何重大法律程序的当事方，因此本章不制造记录并不支持的诉讼戏剧。更难的是流程风险。GB-0895 现在处于两项重复性全球 3
              期重症哮喘研究，规模约 1,600 名患者，同时一项 1 期 COPD 研究并行推进。这意味着核心资产仍面对普通但严重的后期失败路径：疗效不达标、安全性意外、试验执行不足或监管延误。Cornell 对 21
              CFR 312.42 的摘要把问题说得很清楚：FDA 可因不合理风险或设计明显不足，对拟议或进行中的 2 期或 3 期研究实施临床暂停。再叠加 FDA 2025 年 1 月 AI 指南以及 EMA/FDA
              2026 AI 原则，就更重要，因为 Generate 将 GB-0895 营销为用 AI 工程化的抗体。公司也通过专利 US12110324B2 展示了核心资产
              IP，并有可见的隐私和条款页面，但这些来源指向的是合同、自由实施和数据治理尽调，而不是已经完全稳固的法律护城河。
