      - number: '1.3'
        title: 资本基础、合作方与利益相关者
        blocks:
          - type: paragraph
            body: >-
              Generate 的资本形成有三层：风险股权、战略合作经济性和公开市场资本。公司 2021 年融资 $370 million Series B，2023 年融资 $273 million Series
              C；官方材料称 Series C 之后，2020 年以来的股权融资接近 $700 million；MedCity 基于监管文件 的报道则把 IPO 前累计出售股权列为 $805.3 million。Fierce
              Biotech 仍把 2023 轮描述为降价轮，因为它比 2021 Series B 低 $100 million；即便该轮绝对金额仍很大，Generate 也被放进生物科技融资重估的大背景里。


              战略合作方解释了公司为何能在那轮重估中继续扩张。Amgen 为最初五靶点合作支付 $50 million 预付款，后来又增加第六个靶点。 Novartis 于 2024 跟进，提供 $50 million
              预付现金、$15 million 股权购买，以及至多 $1 billion 里程碑。 February 2026 IPO 又带来 $400 million 总募资和约 $369.3 million
              净募资。融资实力是真实的， 但也抬高了证据标准：公开市场投资者现在资助的是临床执行——尤其是 GB-0895——而不是纯粹为平台承诺买单。
