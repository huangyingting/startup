      - number: '4.4'
        title: 融资历史与资本结构：资本底座大、稀释真实，但没有干净的完全稀释分母
        blocks:
          - type: paragraph
            body: >-
              Generate 的融资历史真实且对一家没有产品销售的公司来说异常庞大，但这段历史也有两面。公司 2021 年融资 $370 million Series B、2023 年融资 $273 million
              Series C，随后在 February 2026 IPO 募资总额 $400 million。仅 IPO 之前，March 2026 10-Q 就称 Generate 已收到超过 $934.0 million
              累计总现金收入，包括优先股销售的 $805.3 million，以及 Novartis 和 Amgen 合作下的 $110.0 million。这是可观的资本底座，也显示商业化前已经需要多少外部资金。Fierce
              将 Series C 描述为比上一轮少 $100 million，提醒投资者即使受认可的技术生物融资也没有免疫于更艰难市场。


              IPO 也实质性重置了股权结构表。交割时，所有已发行优先股转为 69.3 million 普通股。10-Q 称，截至 April 29, 2026，Generate 有 128.2 million
              普通股在外流通。只有 25 million IPO shares 立即可流通；约 103.1 million 其他股份在 August 2026 前仍受限。公开监管文件还披露超过 20 million
              份期权在外，并有额外计划容量。这足以判断稀释和 流通股扩张仍是真实考量，但不足以在没有更完整股权结构表调节的情况下发布干净的完全稀释后股数。
