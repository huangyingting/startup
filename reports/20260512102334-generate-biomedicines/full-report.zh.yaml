      - number: '7.4'
        title: 伙伴集中与融资风险：IPO 买到的是时间，不是独立性
        blocks:
          - type: paragraph
            body: >-
              Generate 仍是一家尚未商业化、依赖合作收入的生物科技公司，不是自我造血的产品公司。10-Q 和 424B4 称，公司没有产品收入，并预计可预见收入几乎全部来自 Novartis 和 Amgen。Q1
              2026 的集中度极端：合作收入总额为 $7.2 million，其中 $6.5 million 来自 Novartis，仅 $0.7 million 来自 Amgen；剩余固定交易价格也只有 Novartis
              到 2027 年的 $16.1 million 和 Amgen 到 2026 年的 $2.4 million。$516.6 million 现金和 $369.3 million IPO
              净收益很有意义，但不是完整解法。Generate 称这些现金只能把运营资金撑到 H1 2028，并同时表示预计需要额外资本。IPO 前 S-1/A 曾提示持续经营存在重大疑虑，独立报道还称，很大一部分 IPO
              募资实际上已经被 3 期哮喘工作、COPD 后续开发、平台投资和肿瘤项目预占。因此，剩余风险不是短期破产，而是融资桥、合作者基础和市场叙事相对支出计划仍然狭窄。
