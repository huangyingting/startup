  - id: TM003
    title: 细分领域 / 买方地图
    columns:
      - 细分领域
      - 买方
      - 用户
      - 付款方
      - 工作流
      - 预算归属
      - 采用触发点
    rows:
      - - 过敏 / 肺科专科医生
        - 医生诊所和重症哮喘中心决定启动治疗与换药
        - 过敏专科医生、肺科医生、哮喘护士和护理团队
        - 商业医保、Medicare 相关计划、患者自付
        - 控制治疗后症状仍未受控 → 表型检查 → 生物制剂选择 → 疗效监测
        - 处方医生有影响力，但不直接拥有预算
        - 相较现有产品，发作、激素负担或症状不稳定性需出现有临床意义的下降
      - - 商业付款方 / PBM / 医疗福利管理方
        - 覆盖与使用管理委员会
        - 预授权审核员、医学总监、药房团队
        - 雇主医保、Medicare Advantage / Part D / 医疗福利预算
        - 政策标准 → 福利核验 → 授权 / 拒绝 → 续保审查
        - 医疗与药房成本趋势预算
        - 结果证据要让预算可控，规则集也要嵌入现有表型和阶梯治疗框架
      - - 医疗系统 / IDN / 专科药房
        - P&T 委员会、专科药房运营方、输注或注射项目
        - 药师、护士、财务导航人员、排期团队
        - 医保报销加患者自付
        - 福利调查 → 排期 / 培训 → 发药或门诊给药 → 补药与续保支持
        - 专科药房 / 门诊运营预算
        - 报销流程清晰，给药负担可控
      - - 患者和照护者
        - 不是经济买方，但对知情同意、依从性和持续用药很关键
        - 患者和照护者
        - 保险方加家庭自付负担
        - 转诊 → 授权 → 启动治疗 → 依从 → 持续用药或换药
        - 家庭时间和支付能力负担
        - 发作更少、给药更方便，安全性 / 有效性可信
      - - Generate 内部上市组织
        - 产品组合、临床、准入和商业规划团队
        - 临床开发、监管、市场准入和医学团队
        - Generate 资产负债表
        - Phase 3 数据读出 → 申报 → 付款方证据包 → 上市节奏安排
        - R&D 和 G&A 分配
        - 关键性数据为阳性，且融资计划能支撑上市投入
      - - 大型药企合作伙伴
        - 商务拓展、联盟和 R&D 负责人
        - 平台科学家和项目团队
        - 合作伙伴 R&D / BD 预算
        - 平台尽调 → 签约 → 研究计划执行 → 里程碑
        - 外部创新与合作预算
        - 需要清晰证据证明 Generate 平台能产出差异化蛋白项目
    notes: 该表把呼吸系统生物制剂路径和合作路径拆开，因为两条路径的核心买方、用户和付款方不同，尽管二者都影响 Generate 经济性。
