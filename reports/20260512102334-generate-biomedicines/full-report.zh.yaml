      - number: '3.4'
        title: 商业模式和切换经济性今天仍偏向现有玩家
        blocks:
          - type: paragraph
            body: >-
              商业模式对比也会按竞争模式清晰分流。已上市哮喘生物药在由专科医生处方、需事先授权的报销体系内竞争。本章公开来源很好地支撑了给药、标签和销售规模， 但不足以在 Tezspire、Dupixent、Nucala 和
              Fasenra 之间做干净的同口径净价比较。Xolair 是例外：其官方成本页给出 约 $30,000 至 $60,000 的宽口径年度 WAC
              区间，说明剂量、频率和保险结构如何塑造实际经济性。对类别其余产品，公开证据更擅长展示商业先例有多厚， 而不是展示返利后价格是否完全平价。


              这仍然影响竞争。GINA、支付方政策和 American Lung Association 工具都指向同一事实：生物药是后线、按表型准入，并由计划主动管理。真实世界切换文献显示，
              患者在更换生物药后可以改善，所以既有优势并非绝对；但切换也不是无摩擦。到了平台市场，商业模式从已报销药物支出变成预付款、里程碑、特许权使用费和研究经费。
              这些经济性不平滑、因买方而异，且天然可多平台并用，因此合作胜率和续约行为比品牌呼吸药销售更难推断。
