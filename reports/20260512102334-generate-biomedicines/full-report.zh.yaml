  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入质量与集中度：伙伴现金真实，但窄且不平滑
        blocks:
          - type: paragraph
            body: >-
              Generate 的公开收入基础是合作会计，而非药品销售。10-Q 称 Generate 从未产生产品收入，预计近期收入基本都来自 Novartis 和 Amgen；Q1 2026 仅确认 $7.2
              million 合作收入。这不是广泛订阅基础，而是两份大型药企合同下固定研究义务的确认。 Novartis 贡献 Q1 收入的 $6.5 million，Amgen 只有 $0.7
              million，使最大客户集中度约 90%。按全年看，结构已经翻转过一次——从 2024 以 Amgen 为主，到 2025 以 Novartis 为主——说明重心可以很容易在交易对手之间移动。


              质量问题不在于合同微不足道；披露的表观经济性很大。问题是当前确认收入流比标题暗示的更窄，也更容易耗尽。截至 March 31, 2026， Novartis 和 Amgen 合计只剩约 $18.5 million
              固定交易价格待确认，所有或有里程碑付款仍受限制。最清晰的公开商业证明是账户扩张—— Amgen 增加第六个靶点——但没有披露销售漏斗、续约队列或多元客户基础，投资者无法像看软件公司那样承保可重复的销售效率。
