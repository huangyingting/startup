            body: >-
              公开信任证据存在，但比产品野心窄。Generate 的 Generative Biology 页面谈到负责任 AI 治理，并引用公开 AI 蛋白设计
              原则；隐私通知称公司使用物理、技术和行政保障措施，且临床试验参与者会收到单独通知。 这些披露真实存在，但还够不上可审计的产品级保证。所审视来源包没有暴露平台的 SOC 2、ISO 27001、GxP 或 21
              CFR Part 11 映射，也没有外部用户的正常运行时间或支持承诺，或后期项目详细 CMC 准备包。10-Q 对执行风险更直接：Generate 依赖平台成功应用、第三方制造和供应、复杂产品处理，以及 AI
              指导候选物 安全有效转入后期研究。公开开发者表层也很窄。Careers 和 job boards 显示，公司在招聘机器学习、软件、 CryoEM、统计编程和 agentic science platform
