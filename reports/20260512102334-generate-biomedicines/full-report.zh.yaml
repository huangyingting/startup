      - number: '3.2'
        title: 临床资产竞争拼的是证据、便利性和支付方先例
        blocks:
          - type: paragraph
            body: >-
              临床侧，GB-0895 会被拿来对比已经占据专科医生心智和支付方先例的资产。Tezspire 是最干净的直接可比对象，因为它是唯一已上市抗 TSLP 选项； 但真实处方集合更宽。Dupixent
              有无可匹敌的商业规模和广义 2 型标签熟悉度；Nucala、Fasenra 和 Xolair 则是成熟选项，各自有差异化表型 生态位和多年真实世界使用经验。这一点重要，因为未来 GB-0895
              上市不会进入空白类别，而是进入一个处方医生已经理解何时使用 anti-IL-5、 anti-IgE、anti-IL-4/13 或 anti-TSLP 疗法的算法。


              便利性有帮助，但仅靠便利性已不足以构成护城河。Generate 将 GB-0895 定位为每年两次给药的抗 TSLP 抗体；相较每月给药的 Tezspire 或 Nucala、每 2 周 Dupixent、每 2
              或 4 周 Xolair，这在商业上有吸引力。但 Fasenra 的维持给药已经拉长到每 8 周，GSK 新获批的 Exdensur 也让每年两次的呼吸生物药给药成为商业现实。因此，临床问题不是 GB-0895
              纸面上是否更方便，而是 Phase 3 疗效、安全性和支付方价值是否强到足以让专科医生和计划从成熟资产切换。
