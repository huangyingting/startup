      - number: '2.4'
        title: 增长驱动存在，但采用受证据、准入和切换摩擦卡住
        blocks:
          - type: paragraph
            body: >-
              GB-0895 的乐观情景始于真实未满足需求。即便控制药物治疗已优化，重度哮喘仍是高负担疾病；生物药已经贡献数十亿美元年销售额；Generate
              明确瞄准六个月给药周期。若疗效和安全性能撑住，这一周期可能明显比每月、每两周甚至每 8 周给药的现有产品更省事。Tezspire、Dupixent、 Nucala、Fasenra 和 Xolair
              已被支付方覆盖，也意味着 Generate 进入的是已经获报销的治疗类别，而不是从零发明一个报销品类。


              约束栈同样重要。GINA 和支付方政策把生物药放在治疗算法后段，排在高剂量控制治疗和专科评估之后。UnitedHealthcare 和 Cigna 政策显示，表型准入、
              嗜酸性粒细胞或类固醇依赖标准，以及明确的事先授权审核都会卡住使用。American Lung Association 工具警告，计划可能偏好某一种生物药，
              也可能要求事先授权。真实世界文献还显示，相当一部分重度哮喘患者对第一种生物药反应不足并可能切换；即便缓解后，停药策略仍不确定。 落到实践中，Generate
              不仅要证明临床疗效，还要拿出足够强的便利性、反应和预算影响论证，才能撬动根深蒂固的类别龙头。
