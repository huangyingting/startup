      - number: '1.5'
        title: 反向信号与明确尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Generate 的主要警示不是缺钱或缺野心，而是公开证据基础在几个关键处仍落后于公司叙事。独立报道把 2023 Series C 变成市场怀疑的象征；
              当前公开故事仍依赖后续临床验证，而不只是平台新颖性。10-Q 也明确警告，尽管当前流动性把现金跑道延至 2028 上半年，长期运营最终仍需要额外资金。


              还有实际披露缺口。公开材料没有可靠的当前员工数，没有披露合作伙伴之外的客户数，也没有给出完整的 IPO 后控制图；可见信息只包括监管文件 中对 Flagship
              大额持股的引用和广泛的股份待售压力表述。这些遗漏重要，因为本章本应为后续尽调建立可复用的事实底座。投资者能看到现金、 合作经济性和主导资产进展，但仍无法充分验证经营杠杆、治理集中度，或一个耐久的 IPO
