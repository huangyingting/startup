      - number: '8.2'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Generate 的投资逻辑真实存在，也符合当前阶段。公司已有一个核心资产进入重复性全球 3 期试验，给药设计为每六个月一次；IPO 后现金也足以移除 S-1/A 中暴露的即时偿付压力。Novartis 和
              Amgen 也不只是 logo 页：它们构成全部当前合作收入，因此直接证明大型药企愿意为平台付费。反向逻辑同样真实。Generate 仍没有产品收入，Q1 收入只有 $7.2
              million，且全部来自两个伙伴。Novartis 贡献了大部分收入，而 Amgen 剩余履约义务接近完成。公开页面也显示更广泛管线存在，但市场实际承销逻辑仍穿过 GB-0895
              和现金余额。因此，好公司不等于任何价格都是好股票。估值判断必须折价单一资产执行风险、伙伴集中，以及缺少公开上市商业化经济模型。
            claimRefs:
              - CV009
