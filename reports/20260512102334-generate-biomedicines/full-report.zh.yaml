              - CV038
              - CV040
              - CV044
      - number: '8.4'
        title: 情景区间与可比公司边界
        blocks:
          - type: paragraph
            body: >-
              可比公司集合有意不完美，因为 Generate 位于 AI 药物设计、呼吸免疫学和后期生物科技执行的交叉点。Recursion 和 Absci 锚定区间的 AI 平台一侧。Relay
              锚定公开治疗平台一侧。Upstream 有用，因为它提供了 TSLP 相关呼吸领域可比项，但阶段仍更早。Apogee
              给出高端免疫学估值参照，但它当前与哮喘的相关性仍更像扩张机会，而不是直接可比。Isomorphic 的 $600 million 2025 外部融资，只能提醒私人资本仍支持 AI
              药物发现可选性；它不是价格锚，因为估值未披露。在这个背景下，Generate 约 $1.9 billion 的公开价值落在一个可辩护的中间位置：高于低证据 AI
              或呼吸同行，低于高溢价免疫学倍数，接近公开临床阶段基准情景。因此，公开证据区间最好表达为悲观情景约 $1.0 billion 至 $1.4 billion，基准情景 $1.6 billion 至 $2.2
              billion，乐观情景 $2.8 billion 至 $4.0 billion。今天市场价格落在基准情景内，并不明显低于它。
