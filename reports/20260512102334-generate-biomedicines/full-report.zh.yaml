  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 核心市场边界：GB-0895 首先是重度哮喘生物药故事
        blocks:
          - type: paragraph
            body: >-
              本章不应按泛泛的“AI 药物发现”叙事给 Generate:Biomedicines 定市场规模。公司没有已获批产品，今天也没有产品销售基数；
              披露的合作收入来自少数药企平台交易，不是经常性软件订阅。真正决定近期估值和采用的是主导资产：GB-0895 已进入两项关键性重度哮喘试验， 而 Generate 仅把同一分子在 COPD 中定位为 Phase 1
              项目。阶段差异很关键：重度哮喘是第一个由临床证据、支付准入、专科医生行为和竞争切换共同决定产品价值的市场。


              因此，最干净的边界是分层边界。一级市场是重度哮喘生物药；抗 TSLP 疗法是最接近的直接可比子集，因为 Tezspire 是同一靶点类别中唯一已经规模化商业化的 基准。更宽但不那么精确的二级视角，是包含
              Dupixent、Nucala、Fasenra 和 Xolair 的呼吸与 2 型生物药池；它证明支付方已经在这一疾病领域报销昂贵生物药， 但也混入非哮喘适应症。Generate
              的合作蛋白发现业务也应放入本章，作为相邻收入层，因为它们今天确有买方；但相较 GB-0895 必须打通的专科医生与支付方采用路径，它们只是次要层。
