      - number: '2.5'
        title: 市场证据对 Generate 估值和尽调的含义
        blocks:
          - type: paragraph
            body: >-
              市场证据支持对 Generate 采取聚焦但谨慎的解读。重度哮喘生物药类别真实存在、已获报销，有清晰的专科使用者、真实支付预算和重磅级现有产品。 这解释了为什么 GB-0895
              对估值的意义远高于泛平台话术，也解释了为什么 Tezspire 是最接近的直接基准，以及如果 Generate 能拿出有说服力的 Phase 3 数据，六个月给药愿景可能具备商业意义。


              同时，公开记录不足以支撑精确的 GB-0895 SAM 或 SOM 模型。可比品牌把哮喘和其他适应症混在一起；公开来源没有披露支付方批准的治疗人数或 返利后净价；合作披露也太薄，无法推断稳定的经常性发现市场
              SAM。这些不是表面数据缺口，而是本章保留多条规模视角、 拒绝单一 TAM 主张的主要原因。后续估值应把重度哮喘生物药作为一级市场，单独建模合作经济性，并在 Generate 拿出强得多的证据前，避免给 COPD
              或广义 2 型收入池计信用。
