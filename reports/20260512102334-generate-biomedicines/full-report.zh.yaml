      - number: '4.5'
        title: 财务结论与未决问题
        blocks:
          - type: paragraph
            body: >-
              财务上，Generate 更应被视为一份押注后期呼吸证据兑现、外加持续平台合作的已融资期权，而不是收入质量已经建立的公司。正面因素真实：IPO 消除了 pre-IPO S-1/A
              中标出的即时持续经营疑虑，流动性现在有意义，Amgen 和 Novartis 都开出了实质性支票。
              但当前收入流仍集中、受里程碑约束，且相对烧钱很小。费用增长仍由研发牵引，上市公司开销上了台阶，监管文件明确称临床开发、平台工作和最终商业化需求会继续推高未来资本需求。


              最大剩余障碍不是 Generate 未来几个季度现金够不够，而是当前现金底座和合作模型是否足以让公司从 Phase 3 入组走到可商业融资的 上市，中间不再发生重大资本事件。McKinsey 2025
              交易报告加强了反向表述：合作方和收购方变得更挑剔、更偏后期，这对有 Phase 3 敞口的公司有利，却不利于仍依赖模糊平台经济性的业务。因此，投资者今天的财务姿态很清楚：尊重流动性重置，折扣合作收入质量，把估值、
              完全稀释后资本结构和 2028 后融资需求当作开放尽调项，而非已解决事实。
