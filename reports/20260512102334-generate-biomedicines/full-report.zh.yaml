      - - 合作方层面的收入质量桥
        - 无法判断收入中有多少来自固定研究服务，多少来自里程碑提前确认或未来或有上行
        - 要求按交易对手和项目提供已签约、已确认和递延收入明细表
      - - 合作 BD 漏斗和续约指标
        - 无公开 CAC、回本周期或漏斗代理指标；除两段大型药企关系外，信息不足
        - 要求提供伙伴管线、转化漏斗和续约历史
      - - GB-0895 开发收尾与上市预算
