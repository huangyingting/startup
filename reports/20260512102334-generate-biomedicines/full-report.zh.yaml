    rows:
      - - GB-0895（未来产品）
        - 获批前专科生物药上市模型
        - 尚未披露公开上市价格或 WAC
        - 潜在每年两次给药的 anti-TSLP 重症哮喘疗法
        - 净价、返利、支付方阶梯规则和给药场所组合
        - Generate 还不能把价格当突破口；必须先拿出临床差异化
      - - Tezspire
        - 已上市专科生物药，报销路径嵌在支付方管理的重症哮喘流程里
        - 留存来源披露销售额和给药频率，但未披露明确 WAC
        - 每月给药的重症哮喘 anti-TSLP 疗法
        - 返利后净价和优先处方集位置
        - 机制上最接近的标杆，但公开价格透明度有限
      - - Dupixent
        - 已上市专科生物药，覆盖广泛的 2 型炎症适应症标签组合
        - $17.8B 2025 年净销售额；此处留存来源未包含明确 WAC
        - 哮喘，以及更广的 2 型炎症适应症标签组合
        - 仅哮喘适应症的价格和合同条款
        - 即便机制不同，商业规模也让 Dupixent 成为声量最大的在位者
      - - Nucala
        - 已上市每月给药的嗜酸粒细胞生物药模型
        - £2.008B 2025 年销售额；此处留存来源未包含明确 WAC
        - IL-5 哮喘疗法，带相邻适应症
        - 当前净价和返利深度
        - 成熟报销历史降低支付方采纳另一款月度方案的负担
      - - Fasenra
        - 已上市、维持期 q8w 给药的嗜酸粒细胞生物药模型
        - $1.981B 2025 年销售额；此处留存来源未包含明确 WAC
        - IL-5R 哮喘疗法，维持期给药间隔更长
        - 净价和合同深度
        - 已经压窄 Generate 想拉开的便利性差距
      - - Xolair
        - 已上市 anti-IgE 专科生物药
        - 官方费用页称，返利前年 WAC 大约 $30k-$60k
        - 哮喘，以及多适应症 anti-IgE 疗法
        - 患者实际成本取决于剂量、频率和保险
        - 说明生物药定价已经能装进报销型专科预算
      - - Generate 合作模式
        - 首付款、里程碑付款、版税和研究经费
        - Novartis：$50M 首付款 + $15M 股权 + 最高 $1B 里程碑付款；Amgen：$50M 首付款 + 靶点费用 + 里程碑付款
        - 发现端可选性 + 内部管线验证
        - 活跃项目数、里程碑时点和续约率
        - 当前现金支持是真实的，但合作经济性替代不了上市验证
      - - Recursion 合作
        - 首付款、里程碑付款、版税、多项目发现协议
        - 迄今已实现 >$500M 首付款 / 里程碑付款；Sanofi $100M 首付款，最高 $5.2B；Bayer 最高 $1.5B 外加版税
        - 大规模合作发现平台
        - 单项目胜率和盈利能力
        - 在已审阅样本中，披露的平台打包方式最强
      - - Isomorphic 合作
        - 首付款、里程碑付款、版税
        - 不含版税的潜在价值接近 $3B；Lilly $45M 首付款；Novartis $37.5M 首付款
        - 小分子 AI 药物设计合作
        - 当前收入节奏和项目转化
        - 证明大型药企愿意为前沿 AI 可选性付费
      - - Absci 合作项目
