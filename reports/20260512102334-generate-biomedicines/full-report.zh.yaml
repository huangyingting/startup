  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 当前客户边界与分层
        blocks:
          - type: paragraph
            body: >-
              Generate 尚未商业化，因此今天唯一站得住脚的「客户」定义，是目前为平台付费或实质采用平台的合作方；未来的处方医生、支付方和患者只有产品上市后才真正相关。2026 年 3 月的 10-Q
              称，Generate 尚未产生产品销售收入，并预计可预见收入几乎全部来自 Novartis 和 Amgen，这使两家大型药企合作者成为今天唯一清晰的付费客户。MD Anderson 和 Roswell Park
              仍应放在本章，因为公开文件和官方公告显示，它们在共担风险的共同开发结构中使用平台，贡献转化、制造和临床试验能力，而不只是借出品牌背书。未来的呼吸科医生、肿瘤科医生、支付方和患者位于 GB-0895 或
