  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: sam-gap
    missingEvidence: Payer-approved treated severe-asthma counts, gross-to-net assumptions, and rebated net-price benchmarks specific to anti-TSLP or close comparator use in severe asthma.
    whyItMatters: Without treated-lives and net-price data, the chapter can bracket the market but cannot credibly publish a precise GB-0895 SAM or SOM.
    diligencePath: Request US medical-benefit and pharmacy-benefit claims data, specialist patient-flow assumptions, and payer net-price benchmarks for severe-asthma biologics from management or third-party commercial datasets.
    relatedQuestionRefs:
    - QM027
    - QM029
    relatedTableRefs:
    - TM002
  - type: private-evidence-only
    severity: material
    topic: collaboration-market
    missingEvidence: Current active-target counts, budget allocations, milestone timing, and renewal probabilities across Generate’s Amgen and Novartis collaborations.
    whyItMatters: Headline upfronts and milestone caps prove that a collaboration market exists, but they do not reveal the recurring revenue cadence that a durable collaboration-SAM would require.
    diligencePath: Request active-program counts, target-stage inventory, and expected milestone schedules from management or partner disclosures before using collaboration economics in forward revenue models.
    relatedQuestionRefs:
    - QM028
    relatedTableRefs:
    - TM001
    - TM002
  - type: missing-source
    severity: material
    topic: reimbursement-assumptions
    missingEvidence: Public evidence on renewal thresholds, approval-to-coverage lag, site-of-care mix, and patient-persistence assumptions for a future GB-0895 launch.
    whyItMatters: Access and renewal mechanics can materially change realized revenue even when clinical efficacy is strong, so reimbursement assumptions remain a core valuation uncertainty.
    diligencePath: Gather payer policy interviews, specialty-pharmacy workflow data, and launch analogs from recent asthma-biologic entrants to stress-test uptake, persistence, and gross-to-net assumptions.
    relatedQuestionRefs:
    - QM029
    relatedTableRefs:
    - TM003
    - TM004
