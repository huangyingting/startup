- id: TM004
  title: Growth drivers and constraints table
  columns:
  - Driver / constraint
  - Direction
  - Timing
  - Implication
  - Diligence ask
  rows:
  - - Persistent severe-asthma burden after controller therapy
    - Growth driver
    - Near-term and structural
    - Keeps demand open for new biologics that can lower exacerbations or steroid use
    - How large is the specialist-managed uncontrolled population in Generate’s launch geographies?
  - - Existing blockbuster biologic reimbursement precedent
    - Growth driver
    - Near-term
    - Shows that specialists and plans already pay for high-cost asthma biologics
    - How much of current class revenue is actually asthma-only versus mixed indications?
  - - GB-0895 six-month dosing ambition
    - Growth driver
    - Medium-term
    - Could differentiate on convenience and persistence if efficacy and safety remain competitive
    - Can Generate prove enough benefit to justify switching from monthly or q8-week incumbents?
  - - Step-5 positioning after optimized controller therapy
    - Adoption constraint
    - Immediate
    - Biologics sit behind inhaled-controller optimization and specialist evaluation, narrowing the eligible funnel
    - Which phenotype and controller-failure rules dominate key US plans?
  - - Prior authorization and formulary steering
    - Adoption constraint
    - Immediate
    - PA, renewals, and plan preference can delay starts and steer class share
    - What denial, appeal, and site-of-care friction should be assumed in launch models?
  - - First-biologic nonresponse and switching
    - Adoption constraint
    - Persistent
    - Commercial share depends on where GB-0895 fits after inadequate response or intolerance to existing biologics
    - Which incumbent patient segments are most switchable on clinical and access grounds?
  - - Incumbent multi-indication entrenchment
    - Adoption constraint
    - Persistent
    - Dupixent, Xolair, Nucala, and Fasenra already sit inside specialist habits and payer contracts
    - How much physician inertia and contracting protection do incumbents currently enjoy?
  - - Biologics manufacturing and specialty-channel cost
    - Adoption constraint
    - Persistent
    - Cold chain, benefit verification, and reimbursement operations can compress realized economics
    - What gross-to-net, administration, and site-of-care assumptions are supportable?
  - - COPD adjacency is still early
    - Adoption constraint
    - Longer-term
    - Phase 1 COPD data are too early to widen the core market boundary today
    - What phase 2 or later evidence would justify adding COPD to the primary market lens?
  - - Pharma collaboration budgets
    - Secondary growth driver
    - Near-term
    - Supports cash inflow before product launch but does not substitute for respiratory adoption
    - How many active targets and milestone opportunities are still live with current partners?
  notes: The register emphasizes timing and budget ownership rather than abstract pros and cons, because Generate’s market outcome depends on evidence sequencing and coverage friction as much as on category size.
