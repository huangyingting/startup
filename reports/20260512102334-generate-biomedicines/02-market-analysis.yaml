tables:
- id: TM001
  title: Market definition table
  columns:
  - Segment / category
  - Included spend
  - Excluded spend
  - Buyer / payer
  - Relevance
  rows:
  - - Core severe-asthma biologics
    - Add-on biologic maintenance therapy for severe uncontrolled asthma after optimized controller therapy
    - Maintenance inhalers, rescue bronchodilators, oral steroids used without biologics, and general asthma monitoring
    - Allergists and pulmonologists prescribe; commercial plans, Medicare-related payers, and specialty-pharmacy workflows pay
    - Primary market boundary for GB-0895 because this is where the lead asset is already in Phase 3
  - - Anti-TSLP severe-asthma subset
    - Commercial and pipeline severe-asthma biologics targeting TSLP
    - IL-5, IL-4/13, and anti-IgE biologics outside the TSLP mechanism
    - Same specialist and payer stack as the core market
    - Closest direct comparator set because Tezspire is the only scaled marketed anti-TSLP benchmark
  - - Broader respiratory / type-2 biologic proxy
    - Respiratory-biologic and type-2 inflammation brands that influence asthma specialist behavior and payer precedent
    - Non-respiratory indications when they can be isolated, plus unrelated immunology and dermatology spend
    - Specialists, plans, and health-system specialty channels
    - Useful upper-bound revenue lens, but contaminated by multi-indication brands such as Dupixent and Xolair
  - - Payer-managed severe-asthma access layer
    - Phenotyping, prior auth, benefit verification, site-of-care management, refill and renewal operations tied to biologic use
    - General PCP asthma visits and unrelated pharmacy administration expense
    - PBMs, medical-benefit managers, IDN pharmacy operations, and utilization-management teams
    - Key adoption bottleneck because access rules determine how much of the prevalence funnel becomes reimbursed demand
  - - Partnered protein-discovery collaborations
    - Upfronts, milestones, royalties, and research funding paid by pharma partners for Generate Platform programs
    - Downstream marketed respiratory drug sales or generic AI-platform budgets
    - Large-pharma BD, alliance, and R&D budgets
    - Real secondary market layer because it drives current company revenue even though it does not define GB-0895 patient adoption
  - - Excluded substitutes and adjacencies
    - Status-quo controller therapy, rescue therapy, generic COPD spend, and broad AI-discovery narratives not tied to respiratory commercialization
    - n/a
    - Various
    - These are reference points, not the core market that should anchor Generate valuation today
  notes: Rows are not additive. The table separates the patient-treatment market from payer workflow and collaboration economics so the chapter does not drift into a generic AI-drug-discovery TAM.
