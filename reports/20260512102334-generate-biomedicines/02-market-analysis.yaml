- id: growth-drivers-and-constraints
  title: Growth drivers exist, but adoption is gated by evidence, access, and switching friction
  body: >-
    The bull case for GB-0895 starts with genuine unmet need. Severe asthma remains a high-burden condition despite optimized controller therapy, biologics already generate billions of dollars in annual sales, and Generate is explicitly aiming for a six-month dosing schedule that could look meaningfully easier than monthly, biweekly, or even q8-week incumbents if efficacy and safety hold up. Existing payer coverage of Tezspire, Dupixent, Nucala, Fasenra, and Xolair also means Generate would be entering an already reimbursed treatment class rather than trying to invent a new reimbursement category from scratch.


    The constraint stack is just as important. GINA and payer policies place biologics late in the treatment algorithm, after high-dose controller therapy and specialist evaluation. UnitedHealthcare and Cigna policies show phenotype gating, eosinophil or steroid-dependence criteria, and explicit prior-authorization review. The American Lung Association tool warns that plans may prefer one biologic over another and may require prior authorization. Real-world literature also shows that a meaningful share of severe-asthma patients do not respond adequately to a first biologic and may switch, while discontinuation strategy remains uncertain even in remission. In practice, that means Generate must prove not only clinical efficacy but also a strong enough convenience, response, and budget-impact case to displace entrenched class incumbents.
