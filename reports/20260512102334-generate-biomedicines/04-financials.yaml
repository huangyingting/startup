- id: TI001
  slug: revenue-streams-table
  title: Revenue streams table
  description: Publicly visible revenue streams and pseudo-revenue items, separated from contingent or non-top-line economics.
  columns:
  - Stream
  - Mechanism
  - Unit
  - Current value / status
  - Quality
  - Diligence ask
  rows:
  - - Novartis collaboration revenue
    - Cost-incurred recognition of combined research services and license obligations
    - GAAP collaboration revenue
    - $6.5M Q1 2026 revenue; $16.1M fixed remaining transaction price through 2027
    - Meaningful but concentrated and not contractually recurring like subscription revenue
    - Request per-target progress, remaining services, and milestone trigger timing
  - - Amgen collaboration revenue
    - Cost-incurred recognition of remaining target-program work
    - GAAP collaboration revenue
    - $0.7M Q1 2026 revenue; $2.4M fixed remaining transaction price through 2026
    - Lower near-term visibility because service obligations are nearing completion
    - Request remaining target scope, sixth-program economics, and renewal or expansion plan
  - - Product sales
    - Commercial sales of approved products
    - Net product sales
    - None; Generate has no approved products and has never generated product revenue
    - Highest long-term quality if approval occurs, but absent today
    - Request launch timing, commercialization partner posture, and price assumptions for GB-0895
  - - Development and commercial milestones
    - Event-driven payments under Novartis or Amgen collaboration contracts
    - $ per milestone
    - Large theoretical pools disclosed, but all contingent milestones remained constrained at March 31, 2026
    - High nominal upside, low current predictability
    - Request milestone grid with probabilities, trigger definitions, and expected timing
  - - Royalties
    - Share of future partner product sales
    - '% of net sales'
    - Mid-single-digit to low-tens percentages disclosed; no royalty-bearing products yet
    - Long-duration optionality, not current cash flow
    - Request retained royalty ladders by program and territory
  - - Cost-sharing reimbursements / offsets
    - Expense sharing with MD Anderson, Roswell Park, and legacy PMCo arrangements
    - Expense offset, not top-line revenue
    - Public filings treat these as R&D offsets or terminated arrangements rather than recurring top-line revenue
    - Helpful to burn but not a substitute for diversified revenue
    - Request 2026 expected reimbursement flows and whether any new cost-sharing structures are planned
  notes: The table distinguishes recognized collaboration revenue from contingent upside and non-revenue cost offsets; no row represents recurring product sales today.
