  slug: pricing-monetization-table
  title: Pricing / monetization table
  description: How Generate is actually monetized today and what remains unknown about realized economics.
  columns:
  - Price / unit / contract
  - List vs realized pricing
  - Discounts / unknowns
  - Source / implication
  rows:
  - - 'Novartis package: $50M upfront + $15M equity + >$1B milestones + royalties'
    - Headline contract economics, not realized annual revenue
    - Undisclosed per-target economics, milestone timing, and revenue-recognition cadence
    - Shows one flagship collaboration can be large on paper without creating diversified recurring revenue
  - - 'Amgen package: $50M upfront + $5M sixth-target fee + up to $370M per program + royalties + $25M Series C equity'
    - Headline contract economics, not realized annual revenue
    - Per-program success probabilities and timing remain unknown
    - Shows strategic-partner willingness to pay, but much of value is back-end loaded
  - - 'Fixed revenue still to be recognized: Novartis $16.1M; Amgen $2.4M'
    - More visible than milestones because it is tied to remaining unsatisfied performance obligations
    - Can shrink as work completes and does not capture new work not yet contracted
    - Near-term monetization visibility is modest relative to current burn
  - - '2025 recognized collaboration mix: Novartis $25.1M; Amgen $6.7M; total $31.9M'
    - Realized GAAP revenue
    - Still dependent on two contracts, not dozens of customers
    - Demonstrates concentration more than scale
  - - 'Q1 2026 recognized collaboration mix: Novartis $6.5M; Amgen $0.7M; total $7.2M'
    - Realized quarterly GAAP revenue
    - Quarterly recognition is lumpy and does not annualize cleanly
    - Reinforces finite Amgen tail revenue and top-partner dependence
  - - Future GB-0895 product price
    - No public list or net price disclosed
    - Net price, rebates, site-of-care mix, self-admin device economics, and patient-support costs are unknown
    - Product-revenue underwriting remains impossible from open sources today
  notes: Collaboration contracts disclose headline economics, but realized revenue recognition remains cost-based and milestone-constrained; product pricing remains undisclosed.
