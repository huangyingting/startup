  evidenceGaps:
  - type: missing-source
    severity: material
    topic: valuation-metrics
    missingEvidence: Same-day run-date share price, net cash treatment, and obligation adjustments needed to calculate clean market cap and enterprise value.
    whyItMatters: Without a clean valuation base, the chapter can judge liquidity and dilution but cannot support reliable EV or multiple-based valuation inputs.
    diligencePath: Pull exchange-close data for 2026-05-12, reconcile basic versus diluted shares, and confirm whether lease liabilities or PMCo-related obligations should enter EV.
    relatedQuestionRefs:
    - QI027
    relatedTableRefs:
    - TI005
  - type: private-evidence-only
    severity: material
    topic: fully-diluted-cap-table
    missingEvidence: Up-to-date option, RSU, warrant, and auto-increase schedules after the IPO.
    whyItMatters: Public filings disclose pieces of dilution, but not a single fully diluted denominator suitable for underwriting or per-share valuation.
    diligencePath: Request current cap table by instrument plus all post-IPO equity grants, exercises, cancellations, and board-approved reserve increases.
    relatedQuestionRefs:
    - QI028
    relatedTableRefs:
    - TI005
  - type: private-evidence-only
    severity: material
    topic: collaboration-commercial-engine
    missingEvidence: Partner-level deferred revenue, gross margin, active target count, renewal history, and BD funnel metrics for Novartis and Amgen.
    whyItMatters: Without those data, the chapter can observe concentration and lumpy revenue recognition but cannot underwrite repeatable collaboration sales efficiency or renewal quality.
    diligencePath: Request booked-to-recognized revenue bridge by partner, target-level program status, and pipeline or win-rate history.
    relatedQuestionRefs:
    - QI010
    - QI029
    relatedTableRefs:
    - TI001
    - TI005
  - type: private-evidence-only
    severity: material
    topic: commercialization-budget
    missingEvidence: GB-0895 Phase 3 completion cost, CMC and device scale-up budget, launch investment, and any commercialization-partner assumptions.
    whyItMatters: The public runway overlaps with planned full Phase 3 enrollment, so launch affordability cannot be judged from cash balance alone.
    diligencePath: Request board-approved use-of-funds model through approval and launch scenarios, including commercial build-versus-partner assumptions.
    relatedQuestionRefs:
    - QI024
    - QI029
    relatedTableRefs:
    - TI004
    - TI005
  - type: missing-source
    severity: material
    topic: runway-bridge
    missingEvidence: Quarter-by-quarter cash forecast explaining how Q1 2026 burn reconciles to runway into H1 2028.
    whyItMatters: Straight annualization of Q1 operating cash use implies materially shorter runway than guidance, creating uncertainty around burn moderation or assumed cash inflows.
    diligencePath: Obtain monthly cash bridge, working-capital assumptions, and any expected milestone receipts embedded in management guidance.
    relatedQuestionRefs:
    - QI013
    - QI014
    - QI024
    relatedTableRefs:
    - TI004
