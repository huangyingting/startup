- id: financing-history-and-capitalization
  title: 'Financing history and capitalization: large capital base, real dilution, no clean fully diluted denominator'
  body: >-
    Generate’s funding history is real and unusually large for a company with no product sales, but that history cuts both ways. The company raised $370 million in Series B in 2021, $273 million in Series C in 2023, and then $400 million gross in the February 2026 IPO. Before the IPO alone, the March 2026 10-Q says Generate had already received aggregate gross cash proceeds in excess of $934.0 million, including $805.3 million from preferred stock sales and $110.0 million under Novartis and Amgen collaborations. That is a substantial capital base. It also shows how much external money has already been required before commercialization. Fierce’s description of the Series C as $100 million smaller than the prior round is a reminder that even well-regarded techbio financings have not been immune to a tougher market.


    The IPO also materially reset the cap table. At closing, all outstanding preferred shares converted into 69.3 million common shares. The 10-Q says Generate had 128.2 million common shares outstanding as of April 29, 2026. Only the 25 million IPO shares were immediately liquid; roughly 103.1 million other shares stayed restricted until August 2026. Public filings also disclose more than 20 million options outstanding plus additional plan capacity. That is enough to conclude dilution and float expansion remain real considerations, but not enough to publish a clean fully diluted share count without a fuller cap-table reconciliation.
