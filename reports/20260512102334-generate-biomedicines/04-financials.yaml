- id: TI005
  slug: public-financial-gaps-table
  title: Public financial gaps table
  description: The missing data points that still block a clean underwriting or valuation model for Generate.
  columns:
  - Missing metric
  - Impact
  - Exact diligence path
  rows:
  - - Clean same-day market cap / enterprise value
    - Without reconciled share count, price, cash, and obligation adjustments, valuation multiples are noisy
    - Request run-date close price, treasury reconciliation, debt and lease treatment, and cap-table support
  - - Fully diluted share count
    - Dilution analysis remains incomplete without all options, warrants, RSUs, and auto-increase schedules
    - Request cap table by instrument plus all post-IPO grants and exercises
  - - Partner-level revenue-quality bridge
    - Cannot tell how much revenue is fixed research services versus milestone pull-forward or future contingent upside
    - Request booked, recognized, and deferred revenue schedule by counterparty and program
  - - Collaboration BD funnel and renewal metrics
    - No public CAC, payback, or funnel proxy exists beyond two large-pharma relationships
    - Request partner pipeline, conversion funnel, and renewal history
  - - GB-0895 completion and launch budget
    - Runway cannot be linked confidently to commercialization timing
    - Request Phase 3, CMC, device, market-access, and launch spending plan
  - - Long-term revenue mix after 2028
    - Cannot model when collaboration revenue yields to product revenue or additional financings
    - Request long-range plan by revenue stream, partner assumption, and capital need
  notes: Every gap here is material to underwriting; the open-source record is strong enough for direction, not for a full valuation model.
