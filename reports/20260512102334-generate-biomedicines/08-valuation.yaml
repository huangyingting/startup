  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - Dimension
      - Thesis
      - Anti-thesis
      - What changes the view
    rows:
      - - Lead asset
        - GB-0895 is already in replicate global Phase 3 and aims for every-six-month dosing.
        - All practical underwriting still flows through one lead asset.
        - Upgrade after clear Phase 3 execution and differentiation evidence.
      - - Balance sheet
        - Post-IPO cash removes the immediate going-concern problem.
        - Runway only reaches into H1 2028 and management still says more capital will be required.
        - Improve after a clearer bridge from enrollment to launch.
      - - Collaboration validation
        - Novartis and Amgen prove that large pharma has paid for the platform.
        - >-
          Those same two partners are the entirety of current revenue and one contract is nearing
          completion.
        - Upgrade after broader partner durability or new validation.
      - - Platform optionality
        - Official pipeline and platform pages show multiple modalities beyond GB-0895.
        - Earlier programs are not yet carrying the public valuation.
        - Upgrade when non-GB-0895 assets create meaningful proof or economics.
      - - Revenue quality
        - Collaboration revenue is real and disclosed.
        - It is small, concentrated, and not product revenue.
        - Upgrade after a commercial model or product revenue becomes visible.
      - - Market context
        - 2026 investors are rewarding later-stage assets again.
        - The same window has still reset platform issuers to lower-than-private valuations.
        - Upgrade only if Generate converts that later-stage status into proof faster than peers.
    notes: >-
      The table separates company quality from stock attractiveness at a specific public-market
      price.
