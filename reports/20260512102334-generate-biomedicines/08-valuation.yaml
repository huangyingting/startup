  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: cap-table-waterfall
      missingEvidence: >-
        The retained public sources do not disclose the full post-IPO waterfall after options, plan
        refreshers, lock-up expiry, and any future share issuance.
      whyItMatters: >-
        A fair headline market cap can still leave poor common-equivalent upside if the fully
        diluted structure is heavier than public pages suggest.
      diligencePath: >-
        Request the current cap table, option schedule, equity-plan burn, lock-up release analysis,
        and exit waterfall under base and downside cases.
      relatedQuestionRefs:
        - QV008
        - QV009
      relatedTableRefs:
        - TV001
        - TV006
    - type: private-evidence-only
      severity: material
      topic: gb0895-commercial-model
      missingEvidence: >-
        No retained public source disclosed GB-0895 gross-to-net pricing, reimbursement assumptions,
        market share, COGS, or launch SG&A.
      whyItMatters: >-
        Without those inputs, no public intrinsic-value model can translate Phase 3 success into a
        durable cash-flow case.
      diligencePath: >-
        Request commercialization assumptions, payer materials, physician uptake scenarios, and
        margin bridges for asthma and COPD.
      relatedQuestionRefs:
        - QV012
        - QV034
      relatedTableRefs:
        - TV003
        - TV006
    - type: private-evidence-only
      severity: material
      topic: phase3-to-launch-financing-bridge
      missingEvidence: >-
        Public sources stop at H1 2028 runway language and do not show the detailed budget bridge
        from Phase 3 execution through launch readiness.
      whyItMatters: >-
        The financing path determines whether the next capital raise is optional, dilutive, or
        value-enhancing.
      diligencePath: >-
        Request FP&A plans, downside runway cases, commercialization-build costs, and any royalty,
        debt, or partnership financing alternatives.
      relatedQuestionRefs:
        - QV035
      relatedTableRefs:
        - TV003
        - TV005
        - TV006
    - type: missing-source
      severity: material
      topic: private-comparable-set
      missingEvidence: >-
        The public record does not provide a clean set of directly comparable private financings or
        M&A transactions for late-stage respiratory or AI-enabled biotech assets with disclosed
        terms.
      whyItMatters: >-
        That limits how sharp the comparable table can be and leaves the chapter intentionally
        public-heavy.
      diligencePath: >-
        Request banker or board comp sets, recent private transaction terms, and any strategic buyer
        indications used internally to frame valuation.
      relatedQuestionRefs:
        - QV033
      relatedTableRefs:
        - TV004
    - type: missing-source
      severity: material
      topic: analyst-model-assumptions
      missingEvidence: >-
        Open analyst pages show target prices but not the full revenue, pricing, probability, and
        dilution assumptions behind those targets.
      whyItMatters: >-
        A $25 consensus is hard to underwrite without knowing whether it rests on reasonable
        severe-asthma share and launch assumptions.
      diligencePath: >-
        Request published initiation notes or management assumptions that reconcile analyst targets
        with patient, price, margin, and dilution cases.
      relatedQuestionRefs:
        - QV010
        - QV011
        - QV034
      relatedTableRefs:
        - TV001
        - TV006
