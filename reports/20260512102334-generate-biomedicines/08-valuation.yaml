        - Broader platform and disclosure do not make it a direct respiratory or Phase 3 peer
      - - Relay Therapeutics
        - ~$2.46B
        - Clinical-stage therapeutic platform with clearer asset framing
        - Useful upper-mid public anchor for a precommercial therapeutic company
        - Not AI-first and not a respiratory or TSLP company
      - - Absci
        - ~$0.90B
        - AI-biologics platform without late-stage proof
        - Useful lower-bound AI-biologics anchor
        - Less late-stage proof and a different product mix than Generate
      - - Upstream Bio
        - ~$0.48B
        - Respiratory-stage company with positive Phase 2 severe-asthma TSLP-receptor data
        - Best mechanistic respiratory comp for earlier-stage TSLP risk
        - Still earlier stage than Generate and much more single-asset
      - - Apogee Therapeutics
        - ~$6.19B
        - Higher-valued immunology company with asthma expansion plans
        - Useful upper-bound reference for what premium inflammatory-disease narratives can command
        - Not a like-for-like Generate peer and not yet a direct severe-asthma Phase 3 match
    notes: >-
