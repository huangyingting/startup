  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold / event
      - Transmission to thesis
      - Action implication
    rows:
      - - Phase 3 slippage
        - Material enrollment, protocol, or timing slip in SOLAIRIA
        - Undercuts the main asset that supports current valuation
        - Move toward bear case immediately
      - - Runway compression
        - Management walks back H1 2028 runway without offsetting proof
        - Raises forced-financing and dilution risk
        - Cut valuation toward cash-adjusted downside
      - - Partner runoff
        - No widening of validation while Amgen economics roll off
        - Leaves revenue quality narrower than current valuation assumes
        - Increase concentration discount
      - - Lock-up / dilution pressure
        - Post-August 2026 selling or equity issuance without better proof
        - Expands supply before conviction expands
        - Demand a larger valuation discount
      - - Rerating without evidence
        - Shares move toward ~$20-$23 before new proof appears
        - Turns a fair setup into an over-extended one
        - Downgrade toward avoid or wait
      - - Commercial model still absent
        - No credible launch pricing or commercialization frame as Phase 3 matures
        - Keeps upside dependent on narrative rather than modeled economics
        - Refuse to underwrite bull-case multiples
    notes: These triggers are meant to be monitorable and price-aware rather than generic risk labels.
    claimRefs:
      - CV023
      - CV024
      - CV047
      - CV048
      - CV049
      - CV050
      - CV051
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner / diligence path
    rows:
      - - Phase 3 operating pack
        - Enrollment curve, site activation, protocol changes, and CMC readiness
        - Most direct determinant of whether base or bull case is realistic
        - Request trial operating dashboard and management review
      - - Launch pricing model
        - Gross-to-net assumptions, market share, reimbursement, and launch SG&A for GB-0895
        - Needed to translate Phase 3 success into value rather than narrative
        - Request commercialization model and payer materials
      - - Fully diluted cap table
        - Options, plan refreshers, lock-up expiry, and waterfall by security class
        - Determines whether headline upside survives dilution
        - Request cap table, option schedule, and exit waterfall
      - - Collaboration durability
        - Renewal mechanics, milestone grid, and any new partner discussions
        - Separates durable validation from finite collaboration runoff
        - Request contract summaries and BD pipeline review
      - - Financing bridge beyond H1 2028
        - Budgeted cash needs from Phase 3 through launch readiness
        - Determines whether next financing is optional or forced
        - Request FP&A model and financing alternatives memo
      - - Analyst and board model assumptions
        - Underlying severe-asthma share, pricing, and margin assumptions behind upside cases
        - Explains whether public targets are conservative, aggressive, or unusable
        - Request board valuation framework or comparable model
    notes: >-
      These asks are ordered by how much they could move recommendation, valuation stance, or
      confidence.
    claimRefs:
      - CV051
      - CV052
      - CV053
      - CV054
