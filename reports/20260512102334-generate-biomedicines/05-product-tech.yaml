      layers:
        - label: Protein knowledge and proprietary data layer
          detail: >-
            Natural protein structures and sequences are combined with Generate-generated
            experimental data to form the base prior.
        - label: Generative biology model layer
          detail: >-
            Machine-learning models generate and co-optimize proteins for a target therapeutic
            question.
        - label: Chroma programmable-design layer
          detail: >-
            Conditional protein generation adds geometry, shape, semantic, and natural-language
            constraints to design time.
        - label: Build and assay layer
          detail: >-
            Generated sequences are built as real proteins and measured for critical molecular and
            functional properties.
        - label: Structural-data and learning layer
          detail: >-
            CryoEM and other next-generation measurements feed terabytes of structural and
            biophysical data back into the platform.
        - label: Program translation layer
          detail: >-
            Outputs move into proprietary assets, pharma collaborations, and academic-oncology
            development paths.
