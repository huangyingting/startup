  - id: TE003
    title: Technology / operating architecture table
    columns:
      - Layer / component
      - Role
      - Key dependency
      - Primary risk
    rows:
      - - Natural and proprietary protein data
        - Provide the sequence/structure prior and experimental feedback base
        - Access to large protein corpora plus Generate-generated data
        - Public sources do not quantify data quality, rights, or update cadence
      - - Generative model layer
        - Produce candidate proteins and optimization hypotheses
        - Compute, model design choices, and human steering
        - Model claims can outrun externally validated outcomes
      - - Chroma programmable design layer
        - Enable conditional protein generation under diverse constraints
        - Diffusion architecture, graph neural networks, and conditioning primitives
        - Public proof is strong technically but not enough to map every later asset back to Chroma
      - - Protein build and assay systems
        - Turn sequences into molecules and measure performance
        - Wet-lab throughput, assay design, and reproducibility
        - No public throughput or QA benchmark
      - - CryoEM structural data engine
        - Resolve structures and feed learning loop with high-value data
        - Andover facility, microscopes, data pipelines, and specialist staff
        - Capacity and data advantage are company-claimed rather than independently audited
      - - Program translation layer
        - Move optimized molecules into respiratory, oncology, and other programs
        - Development teams, regulatory strategy, and budget
        - Asset progression is still concentrated in a few visible programs
      - - External partner layer
        - Extend the stack into confidential discovery, translation, and cell therapy
        - Amgen, Novartis, MD Anderson, and Roswell capabilities
        - Reliance on partner timelines and disclosure choices
      - - Manufacturing and supply layer
        - Provide clinical and eventual commercial material
        - Third-party manufacturers, suppliers, and shipping/storage systems
        - 10-Q flags complex product handling and supply-chain bottlenecks as material risks
    notes: >-
