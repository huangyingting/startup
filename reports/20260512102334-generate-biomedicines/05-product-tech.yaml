    rows:
      - - The Generate Platform
        - Internal discovery teams; pharma collaborators
        - Active foundation layer
        - Closed generate-build-measure-learn loop ties design to experimental feedback
        - No public ROI, hit-rate, or customer-implementation metrics
      - - Generative Biology / model stack
        - Protein-design, biology, and translational teams
        - Active internal operating model
        - >-
          Combines natural-protein priors with proprietary data and multi-modal biologic design
          claims
        - No public ablation of which internal model family drives each asset
      - - Chroma
        - Protein-design researchers and platform scientists
        - Peer-reviewed public technical artifact
        - Programmable protein generator with conditional sampling and experimental validation
        - No public evidence that Chroma alone explains every later pipeline asset
      - - CryoEM + wet-lab validation engine
        - Protein sciences, structural biology, and model teams
        - Operational infrastructure
        - 70,000 sq ft Andover site with four microscopes and data-producing feedback loop
        - Company-claimed throughput and competitive advantage lack external audit
      - - GB-0895
        - Proprietary respiratory development team
        - Phase 3 severe asthma; Phase 1 COPD
        - Lead proof point for long-acting anti-TSLP antibody and six-month dosing strategy
        - Late-stage efficacy, manufacturing, and launch readiness are not yet public
      - - GB-4362
        - Proprietary oncology / ADC program team
        - Clinical-site activation; first patient targeted mid-2026
        - Unusual MMAE-neutralizer positioning with Fast Track status
        - >-
          Public record does not show whether the asset was designed end-to-end by a specific model
          layer
      - - GB-5267
        - Oncology and cell-therapy teams with Roswell Park
        - Phase 1 first patient targeted for 2H 2026
        - Extends Generate into armored CAR-T and partnered clinical/manufacturing workflow
        - Public package is thinner than for GB-0895 and relies heavily on partner execution
      - - Amgen and Novartis collaboration layer
        - External pharma partners plus Generate platform teams
        - Active but largely confidential
        - Converts the platform into multi-target discovery revenue and external validation
        - Program-level outputs and attrition remain mostly undisclosed publicly
    notes: >-
      Rows separate the internal platform, proprietary assets, and partner-facing layers that are
      all part of the public product surface.
