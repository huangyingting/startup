  - id: TE002
    title: Workflow / use-case table
    columns:
      - User job
      - Current workflow
      - Generate solution
      - Visible benefit
      - Key limitation
    rows:
      - - Define a biologic strategy for a hard target
        - Start with target biology and desired therapeutic profile
        - Generate models design proteins around specific molecular constraints
        - Moves the company from generic screening toward intentional molecule design
        - Public sources do not disclose hit-rate versus conventional discovery workflows
      - - Generate de novo proteins or optimized antibodies
        - Search large protein space for sequences with desired properties
        - >-
          Chroma and the broader generative-biology stack condition generation on geometry, shape,
          semantics, and function
        - Public technical artifacts show a real programmable-design layer
        - Only Chroma is peer-reviewed in detail; later asset provenance is less specific
      - - Build proteins at scale
        - Convert computational outputs into real molecules
        - >-
          The platform says computationally generated sequences are created as real proteins at
          scale
        - Supports a practical bridge from model output to wet-lab reality
        - No public throughput or cost-per-build disclosure
      - - Measure function and developability
        - Assess binding, biophysical properties, safety-relevant markers, and structural fit
        - Generate uses next-generation assays and structural determination including CryoEM
        - Public sources support a richer validation loop than pure in silico design
        - Assay menu, reproducibility, and QA standards are not fully public
      - - Optimize a proprietary clinical asset
        - Refine potency, specificity, half-life, and dosing profile before clinical translation
        - GB-0895 is presented as co-optimized for biological effect and patient experience
        - Provides a concrete platform-to-clinic case study
        - Only one late-stage flagship asset is visible today
      - - Run partnered discovery for big pharma
        - Combine Generate design with partner target biology and downstream development
        - >-
          Amgen and Novartis collaborations extend the platform into confidential multi-target
          programs
        - Generates current revenue and external validation
        - Program-by-program outcomes remain confidential
      - - Advance oncology programs with academic centers
        - Pair design and optimization with translational and clinical infrastructure
        - >-
          MD Anderson and Roswell contribute clinical translation, manufacturing, and early-trial
          capabilities
        - Shows the workflow can continue beyond discovery into shared-risk development
        - Execution depends on third-party clinical and manufacturing partners
    notes: >-
      This is an operating-workflow table, not a commercial customer-journey table, because public
      evidence points to internal and partner scientist workflows first.
