callouts:
  - calloutType: strength
    title: Generate has more public technical proof than a typical AI-biotech marketing story
    body: >-
      A Nature paper for Chroma, a visible CryoEM facility, and a Phase 3 lead asset give Generate a
      more inspectable proof package than most AI-native biotech peers.
    claimRefs:
      - CE008
      - CE011
      - CE013
      - CE016
  - calloutType: risk
    title: >-
      Execution risk now sits in translation, CMC, and late-stage proof rather than in platform
      narrative alone
    body: >-
      The 10-Q, partner structures, and public evidence gaps all point to manufacturing, supply,
      partner execution, and late-stage efficacy as the next real bottlenecks.
    claimRefs:
