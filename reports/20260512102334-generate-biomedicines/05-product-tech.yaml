  - id: asset-maturity-and-roadmap
    title: Asset maturity and 2026 roadmap
    body: >-
      Product maturity is strongest where Generate has either clinical registration, external
      publication, or both. GB-0895 is now the central proof point: the pipeline page, Q1 2026
      update, and December 2025 Phase 3 announcement all place it in Phase 3 severe asthma while
      also showing a Phase 1 COPD extension under the same long-acting anti-TSLP antibody. The Phase
      3 package is unusually specific by biotech-platform standards, including roughly 1,600
      severe-asthma patients and a six-month dosing goal supported by earlier biomarker and
      half-life data. The next visible outputs are less mature but still important. Q1 2026 guidance
      points to GB-4362, an MMAE neutralizer with Fast Track designation and mid-2026 first-patient
      timing, plus GB-5267, an IL-18-armored MUC16 CAR-T with first-patient dosing targeted for the
      second half of 2026. The January 2025 JPM update also said nearly 20 programs were underway.
      That breadth matters, but public proof is still concentrated in a small number of flagship
      artifacts and assets rather than spread evenly across the portfolio.
    claimRefs:
      - CE016
      - CE017
      - CE018
      - CE019
      - CE020
