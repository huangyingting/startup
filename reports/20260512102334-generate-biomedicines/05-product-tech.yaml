      - - GMP / GxP / Part 11 / enterprise certifications
        - Not found in reviewed public sources
        - Platform software, wet lab, quality systems, and external-user assurance
        - Requires direct diligence rather than inference
      - - Commercial-support and integration commitments
        - Not found in reviewed public sources
        - External APIs, implementation support, uptime, SLAs, or packaged tooling
        - Reinforces that public product surface is workflow-led, not software-productized
