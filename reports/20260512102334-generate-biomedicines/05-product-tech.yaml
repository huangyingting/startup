  evidenceGaps:
    - type: missing-source
      severity: material
      topic: platform-throughput
      missingEvidence: >-
        Externally audited hit-rate, end-to-end cycle-time, and assay-throughput metrics for the
        generate-build-measure-learn loop.
      whyItMatters: >-
        Generate’s core differentiation depends on whether the loop works at industrial scale better
        than incumbent discovery methods, not just on whether the architecture sounds plausible.
      diligencePath: >-
        Request program-cohort metrics, retrospective design-to-IND timelines, and partner case
        studies showing how often the platform produced decision-worthy molecules.
      relatedQuestionRefs:
        - QE021
      relatedTableRefs:
        - TE003
    - type: private-evidence-only
      severity: material
      topic: asset-provenance
      missingEvidence: >-
        Asset-by-asset attribution showing which internal models, assays, and human decision points
        produced GB-4362 and GB-5267.
      whyItMatters: >-
        Without program provenance, newer assets do not cleanly validate whether Chroma specifically
        or the broader internal stack deserves credit for the pipeline.
      diligencePath: >-
        Ask for discovery histories and model lineage for each visible program, including what was
        designed de novo, what was optimized, and what was partner-originated.
      relatedQuestionRefs:
        - QE022
      relatedTableRefs:
        - TE001
        - TE005
    - type: missing-source
      severity: material
      topic: quality-certifications
      missingEvidence: >-
        Documented GMP, GxP, Part 11, SOC 2, ISO 27001, uptime, support, and integration-control
        evidence across platform and data systems.
      whyItMatters: >-
        Regulated development and any future external productization require auditable controls, and
        the reviewed public package does not provide them.
      diligencePath: >-
        Request QA, validation, security, and IT control packets plus any public or private audit
        reports that map controls to the actual platform and laboratory environment.
      relatedQuestionRefs:
        - QE019
        - QE027
      relatedTableRefs:
        - TE004
    - type: missing-source
      severity: material
      topic: manufacturing-cmc
