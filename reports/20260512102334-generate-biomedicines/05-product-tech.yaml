company:
  name: Generate:Biomedicines
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Generate:Biomedicines’ public product is best understood as a generative-biology operating
    system that joins model-based protein design, at-scale experimental validation, and program
    development rather than as a standalone software SKU. Public technical proof is stronger than
    normal for an AI-native biotech—Chroma has a Nature paper, the company publicly claims 42,000
    proteins generated/built/tested, Andover CryoEM provides a visible feedback engine, and GB-0895
    is already in Phase 3 while GB-4362 and GB-5267 are the next 2026 catalysts. But the maturity
    picture is uneven: partner programs remain confidential, later assets are less clearly
    attributable to specific model layers, and public materials still do not disclose auditable
    hit-rate, GMP/Part 11, uptime, or broad developer-tooling evidence.
sections:
  - id: product-definition-module-map
    title: Product definition and module map
    body: >-
      Generate’s public product is not a self-serve software suite with APIs, pricing, or named
      enterprise customers. The official site instead describes an integrated therapeutics workflow
      that starts with biological questions, uses machine learning to generate and optimize
      proteins, builds those sequences experimentally, measures their properties, and then routes
      the output into proprietary or partnered development programs. That framing matters because it
      makes the visible product map broader than a normal biotech asset table. The public surface
      includes The Generate Platform itself, the generative-biology layer, Chroma as a concrete
      technical artifact, the CryoEM-enabled validation engine, a proprietary respiratory lead asset
      in GB-0895, 2026 oncology catalysts in GB-4362 and GB-5267, and confidential collaboration
      programs for Amgen and Novartis. In workflow terms, the closest users are internal scientists,
      external pharma collaborators, and academic-clinical partners rather than software buyers. The
      product layer and the technology layer are therefore inseparable: Generate sells or monetizes
      discovery-and-development outcomes, not a public SaaS endpoint.
    claimRefs:
      - CE001
      - CE002
      - CE005
      - CE006
      - CE007
      - CE016
      - CE022
      - CE046
    tableRefs:
      - TE001
    figureRefs:
      - FE001
  - id: workflow-and-architecture
    title: Operating workflow and architecture
    body: >-
      The company’s public architecture is a closed loop rather than a single design model. The
      platform page describes a generate-build-measure-learn sequence in which algorithms propose
      protein sequences for a specific therapeutic question, proteins are built at scale,
      next-generation systems measure molecular behavior, and the resulting data improve the next
      round of generation. Generative Biology adds a more specific data claim: the models are
      trained on the natural compendium of protein structures and sequences, supplemented with
      proprietary experimental data. Chroma makes that technical layer tangible. The Nature paper
      and the public Chroma page describe a diffusion-based protein generator with sub-quadratic
      graph-neural-network scaling, conditional sampling under multiple design constraints, and
      experimental characterization of 310 proteins. The wet-lab side is also unusually visible.
      Generate’s Andover CryoEM site is positioned as a 70,000-square-foot structural-data engine
      with four microscopes, wet-lab workflows, and ML-enabled processing that feeds terabytes of
      data back into the platform. Publicly, that is the most legible version of how a target or
      protein concept moves from model to empirical validation.
    claimRefs:
      - CE003
      - CE004
      - CE008
