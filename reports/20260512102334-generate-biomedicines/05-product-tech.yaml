      - FE003
  - id: trust-quality-and-key-dependencies
    title: Trust, quality, compliance, and key dependencies
    body: >-
      Public trust evidence exists, but it is narrower than the product ambition. Generate’s
      Generative Biology page talks about responsible AI stewardship and references public
      AI-for-protein-design principles, while the privacy notice says the company uses physical,
      technical, and administrative safeguards and that clinical-trial participants receive separate
      notices. Those are real disclosures, but they do not amount to auditable product-grade
      assurance. The reviewed source pack did not expose SOC 2, ISO 27001, GxP or 21 CFR Part 11
      mappings for the platform, uptime or support commitments for external users, or detailed CMC
      readiness packages for late-stage programs. The 10-Q is more explicit about execution risk:
      Generate depends on successful platform application, third-party manufacturing and supply,
      complex product handling, and the safe and effective translation of AI-guided candidates into
      later-stage studies. The public developer surface also stays narrow. Careers and job boards
      show active hiring for machine learning, software, CryoEM, statistical programming, and an
      agentic science platform, but there is no obvious public GitHub, SDK, or API layer. That
      leaves a clear diligence posture: the company has more tangible technical proof than most
      AI-native biotech peers, but commercialization- and compliance-grade proof still sits behind
      the curtain.
