companyProfile:
  summary: >-
    Generate:Biomedicines is a Somerville, Massachusetts-based public clinical-stage generative biology company
    founded by Flagship Pioneering in 2018 and launched in 2020. The company combines a generate-build-measure-learn
    protein-design platform with wet-lab validation, monetizes that capability today through collaborations with
    Amgen and Novartis, and is now centered on GB-0895, its lead Phase 3 severe-asthma asset. After its February
    2026 IPO, Generate ended March 31, 2026 with $516.6 million of liquidity and management guidance into the first
    half of 2028.
