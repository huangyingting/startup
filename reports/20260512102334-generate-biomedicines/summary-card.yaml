  topStrengths:
    - GB-0895 gives Generate a real Phase 3 severe-asthma proof point, which is unusual among AI-native techbio peers.
    - >-
      The February 2026 IPO reset liquidity to $516.6 million at March 31, 2026 and removed the immediate going-concern
      overhang.
    - >-
      External validation is real across both science and customers: Chroma has a Nature paper, and Novartis plus Amgen
      provide current platform revenue and strategic proof.
  topRisks:
    - >-
      The underwriting case still runs primarily through GB-0895 Phase 3, approval, and CMC execution, so a lead-program
      failure would hit both asset value and platform credibility.
    - >-
      Generate has no product revenue, and current recognized revenue is small and concentrated in Novartis and Amgen
      while management still expects additional capital over time.
    - >-
      Public valuation support is still thin beyond market-data pages and early analyst targets, with incomplete
      visibility into dilution, launch economics, and commercial readiness.
  unresolvedGaps:
    - >-
      Public sources still do not provide a usable GB-0895 launch-pricing, payer-access, margin, or commercialization
      model, and Generate has no product revenue yet.
    - >-
      Post-IPO valuation evidence is limited: open-source market-cap and analyst-target pages exist, but the underlying
      assumptions on asthma share, pricing, margins, and dilution are not public.
    - >-
      Current headcount, retention, churn, and deeper talent-durability metrics are not publicly disclosed, limiting
      assessment of operating leverage and execution resilience.
    - >-
      Exact current customer/account count beyond the named public counterparties and partner-program outcome detail
      remain incomplete in open sources.
    - >-
      The decisive proof point is still late-stage execution: GB-0895 Phase 3, approval timing, and CMC readiness remain
      the main gates to a stronger recommendation.
