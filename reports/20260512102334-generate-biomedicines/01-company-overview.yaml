  evidenceGaps:
    - type: missing-source
      severity: material
      topic: headcount
      missingEvidence: A current 2026 employee count with functional mix and site split.
      whyItMatters: >-
        Operating leverage, organizational maturity, and commercialization readiness cannot be judged precisely without
        an updated headcount.
      diligencePath: Request the current org chart, total FTE count, and site-level headcount from management or the data room.
      relatedQuestionRefs:
        - QO015
      relatedTableRefs:
        - TO001
    - type: private-evidence-only
      severity: material
      topic: post-ipo-ownership-and-governance
      missingEvidence: >-
        An updated post-IPO cap table, committee composition, voting arrangements, and any planned sponsor or insider
        sell-downs.
      whyItMatters: >-
        Flagship influence is visible, but actual control rights, float evolution, and governance checks cannot be fully
        assessed from public materials alone.
      diligencePath: Request a post-IPO ownership schedule, committee charters, and any insider trading or secondary-sale plans.
      relatedQuestionRefs:
        - QO025
      relatedTableRefs:
        - TO003
    - type: missing-source
      severity: minor
      topic: customer-metric
      missingEvidence: A stage-appropriate customer or commercial-adoption metric beyond collaboration revenue.
      whyItMatters: >-
        The overview brief asks for a customer metric, but Generate is pre-commercial and public sources do not offer a
        comparable count.
      diligencePath: >-
        Confirm whether management tracks any discovery-service, licensing, or partner-engagement metric that can
        substitute for a customer count.
      relatedQuestionRefs:
        - QO016
      relatedTableRefs:
        - TO001
    - type: stale
      severity: minor
      topic: valuation-benchmark
      missingEvidence: A durable post-IPO valuation benchmark that is not just pricing-day evidence or a single trading-day quote.
      whyItMatters: >-
        The company is now public, so valuation moves quickly and cannot be responsibly fixed from one article or one
        market snapshot.
      diligencePath: Defer full normalization to the valuation chapter using a longer trading window and peer-based EV metrics.
      relatedQuestionRefs:
        - QO024
    - type: missing-source
      severity: minor
      topic: leadership-table-coverage
      missingEvidence: >-
        Full public biographies and a formal succession-plan view for every executive omitted from the partial
        leadership table.
      whyItMatters: >-
        The table focuses on decision-critical leaders, but later diligence may require a fuller view of bench depth and
        replacement risk.
      diligencePath: Request complete executive biographies and succession materials during management diligence.
      relatedTableRefs:
        - TO002
