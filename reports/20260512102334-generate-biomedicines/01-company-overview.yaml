callouts:
  - calloutType: strength
    title: Well funded for a pre-commercial biotech entering Phase 3
    body: >-
      Generate entered the public market with two sizeable pharma collaborations already in place and $516.6 million of
      March 2026 liquidity. That gives the company unusual balance-sheet room to run a pivotal respiratory program while
      also moving additional oncology assets into the clinic.
    claimRefs:
      - CO020
      - CO022
      - CO028
      - CO033
  - calloutType: risk
    title: Capital strength does not remove the proof burden
    body: >-
      The key debate has shifted from whether Generate can raise money to whether GB-0895 and the next clinical programs
      can validate the broader generative-biology thesis. The Series C down-round framing, missing operating
      disclosures, and explicit need for future capital all keep diligence anchored on clinical conversion rather than
      narrative.
    claimRefs:
      - CO019
      - CO031
      - CO041
      - CO042
