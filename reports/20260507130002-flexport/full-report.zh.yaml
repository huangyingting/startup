      - number: '8.3'
        title: 退出情景与建议
        blocks:
          - type: paragraph
            body: >
              退出路径：

              IPO 准备度：Flexport 需要先实现 EBITDA 盈利，才具备可信上市条件；按当前轨迹，最早现实 IPO 窗口是 2026 年 H2 - 2027 年 H1（假设 2025 年末 / 2026
              年初实现盈利）。IPO 时，若要支撑接近软件的定价，$4-6B 市值需要来自高利润率业务的 $300-450M 收入——可以做到，但前提是业务组合切换执行成功。


              战略收购：对投资人来说，最现实的退出是由传统货运代理或相邻物流平台进行战略收购。DSV 收购 Schenker（2024-2025）说明传统巨头有兴趣获得数字货代能力。Flexport 若以 $5-8B
              被收购，将较当前估值有溢价，也在 DSV、Kuehne+Nagel 或技术公司（Amazon Logistics、Shopify + 资本伙伴）的财务承受范围内。


              回报情景（以 $3.8B 进入）：

              - 乐观情景（$7-8B 退出，2027）：若实现盈利、Shopify 渠道规模化、CSRD 软件收入呈现经常性 SaaS 特征，较 $3.8B 进入价回报 1.8-2.1x → 估值增加 $3.2B

              - 基准情景（$5-6B 退出，2027-2028）：若按计划实现盈利、货运市场稳定、竞争地位保持，较 $3.8B 进入价回报 1.3-1.6x

              - 悲观情景（$2-3B 退出，2026-2027）：若货运市场下行推迟盈利，并在退出前需要降价轮，较 $3.8B 进入价回报 0.5-0.8x


              建议：观察——不是以 $3.8B 当前买入。

              投资逻辑可信，但进入价留下的安全边际不足。更好的进入点是 $2.5-3.0B（对应 2024E 收入 1.2-1.4x），可在降价轮情景中实现，或通过从寻求流动性的早期投资人手里买老股实现。在该估值下，乐观 /
              基准 / 悲观风险收益更有吸引力。$3.8B 下，预期回报不足以补偿第 7 章识别的投资逻辑风险因素。
            claimRefs: []
          - type: table
            tableRef: TV003
