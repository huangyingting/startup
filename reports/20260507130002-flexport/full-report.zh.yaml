      - number: '5.2'
        title: 技术架构与平台设计
        blocks:
          - type: paragraph
            body: |
              Flexport 平台基于部署在 AWS 上的云原生微服务架构构建，采用 API 优先设计，可支持第三方集成（Shopify、ERP 连接器）。

              核心架构组件：
              (1) 承运商集成层：通过 API（大型承运商优先）和 EDI/EDIFACT（传统承运商）集成 500+ 承运商；实时状态轮询，并以事件驱动方式更新给托运人看的里程碑时间线。

              (2) TMS/WMS 集成：原生连接 SAP S/4HANA Transportation、Oracle GTM 和 Microsoft D365；REST API 支持定制 ERP 集成；
              Shopify 应用集成让商家可在 Shopify 后台内预订货运。

              (3) Flexport Logistics API：公开文档化 API，支持平台伙伴（Shopify、第三方物流市场平台）嵌入物流；覆盖货运订舱、追踪、文档检索和碳数据。

              (4) ML/AI 层：HTS 编码分类引擎（使用 CBP 历史裁定数据库训练）；用于提前预订运力的需求预测；货运费率异常检测。

              (5) 数据仓库：自研货运数据湖，覆盖货运历史、承运商表现、运输时间和碳排放；是 CSRD 碳模块和分析产品的基础。

              (6) 安全 / 合规：SOC 2 Type II 认证；ISO 27001 信息安全；符合 EU 托运人数据 GDPR；符合 CBP 贸易数据保密要求。

              平台主要技术限制在高峰货运期的可靠性：2022 年 Q4，Flexport 在假日高峰季遇到平台可靠性问题——这是 2023 年重组的促成因素之一。
              重组后，工程投入重点从功能开发转向可靠性和性能。
