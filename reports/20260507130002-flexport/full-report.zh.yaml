          - type: callout
            title: 货运费率周期风险：另一次 2022 年式下行，可能在盈利前耗尽资本
            body: >-
              海运费率从 2022 年峰值到 2023 年低点下跌 60-70%，直接导致 Flexport 2023 年收入下降和盈利失约。如果 Flexport 实现调整后 EBITDA 盈亏平衡
              前发生类似的货运费率下行，公司可能被迫在低于当前约 $3.8B 的估值水平上进行稀释性融资——或者面临更大力度的重组。
            calloutType: insight
