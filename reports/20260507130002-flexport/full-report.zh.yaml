      - number: '5.3'
        title: CSRD 碳模块与竞争差异化
        blocks:
          - type: paragraph
            body: |
              Flexport 的 CSRD 碳模块技术含量较高，把运营物流数据与标准化 Scope 3 排放计算结合起来，形成差异化。

              技术方法：Flexport 计算 Scope 3 第 4 类（上游运输）排放时，结合了：（a）承运商实际提供的排放数据（首选方法，来自已签署 Clean Cargo 数据计划的 50+ 承运商）；
              （b）船舶能效评级（海运船舶的 EEDI/AER）+ 承运商数据不可用时的燃料消耗估计；（c）公路和铁路运输模式的 IPCC 运输排放因子。

              CSRD 合规准备：Flexport 碳报告模块按 EU 企业可持续发展报告指令（CSRD）对齐设计。CSRD 要求受影响 EU 公司从 FY2024
              （大型公司）和 FY2025（中端市场）开始报告 Scope 3 物流碳排放。该模块可生成可用于 CSRD 的报告包，并附带 EU 监管提交所需的审计轨迹和方法说明文档。

              竞争壁垒：超过 2 年商业运营中积累的 500+ 托运人数据集形成数据飞轮——跨托运人基准、航线级排放强度数据和承运商效率比较都会随规模改善。
              从零开始的竞争对手不易复制这套数据集；CSRD 执法收紧后，数据集价值继续提升。

              路线图：Flexport 公布的路线图（2025-2026 年）包括：（a）把 CSRD 模块扩展到 Scope 3 第 9 类（下游运输）；（b）与第三方 ESG 报告平台
              （Watershed、Persefoni）集成；（c）推出面向 CSRD 审计准备的 API，把 Flexport 排放数据连接到客户可持续发展报告系统。
