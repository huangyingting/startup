      - number: '4.2'
        title: 成本结构与盈利路径
        blocks:
          - type: paragraph
            body: |
              Flexport 的成本结构由货运收入成本（随货量变化）、报关和物流协调运营成本，以及显著的技术和行政管理（G&A）基础设施组成。

              收入成本（CoR）主要是承运商成本：约 70-75% 的货代收入会支付给承运商（航空公司、海运承运商、卡车公司）。
              Flexport 的货运毛利率约 2-5%——由于承运商货量折扣更低，低于传统玩家（3-7%）。报关代理和软件有结构性更高的毛利率（分别为 50-70% 和 80-85%），
              可在规模化后把公司整体毛利率拉向 20-30%。

              2024 年运营费用（重组后）：
              - 员工：约 2,500 人（低于 2022 年约 3,700 人峰值），此前经历两次重大重组（2022-2023 年裁员 30%，2023 年第二轮）。
              - 技术：继续投入平台；估计占收入 15-20% 的运营费用（OpEx）。
              - 销售与营销（S&M）：Shopify 渠道降低 SME 直接销售与营销（S&M）支出；企业销售周期仍然资本密集。

              盈利目标：Ryan Petersen 表示，目标是在 2025 年底至 2026 年初实现调整后 EBITDA 盈亏平衡。截至 2025 年 Q2，据接近业务的消息源称，
              公司「正在接近盈利」；正式确认尚未公开。盈利路径需要：（a）货运量继续增长，以改善承运商费率折扣；（b）软件和融资收入组合提升至总收入的 10-15%；
              （c）已完成裁员重组后释放行政管理（G&A）杠杆。
