      - number: '8.2'
        title: 融资背景与可比公司组
        blocks:
          - type: paragraph
            body: >
              当前融资背景：

              - 估计估值：约 $3.8B（2025 年 8 月股权轮，未确认）

              - 2025 年 8 月股权融资：$250M（存量投资人轮，由 a16z 牵头）

              - 2024 年 1 月可转债：$260M（转换条款未披露）

              - 累计融资：约 $2.3B+（所有轮次合计）

              - 2022 年 Series E 峰值估值：$8B（SoftBank VF2，融资 $900M）

              - 当前较峰值折价：约 52%（从 $8B 到 $3.8B）


              2024 年 1 月可转债可能带来稀释：如果按未来轮次折价转换，现有股权持有人会在标准股权堆叠之外承受额外稀释。具体转换机制（估值上限、折扣率、利息）未公开披露，但构成实质性稀释不确定性。


              稀释 / 优先权悬顶：

              Flexport 累计融资 $2.3B+，形成显著清算优先权堆叠。在 $3.8B 估值、$2.3B 优先股背景下，普通股（员工、早期投资人）参与分配前，退出价值至少要达到 $2.3B+——这限制了低于约
              $5-6B 退出时的上行分成。Series E 估值 $8B，意味着 SoftBank VF2 的 1x 优先权在 $3.8B 以上具备反稀释效果，但普通股持有人仍排在优先权堆叠之后。


              可比私有轮次（2024-2025）：

              - project44：$2.3B，$260M ARR，已证明盈利——纯物流 SaaS

              - Samsara（上市）：约 $25B 市值，$1.2B ARR，物流远程信息 SaaS

              - Transfix：$1.1B（2022 年，2024 年市场中承压），数字整车经纪

              - Forto：€1.5B（2022 年轮次，德国数字货代），收入下滑


              可比上市公司（货运代理）：

              - DSV：DKK 280B 市值，DKK 175B 收入 → 收入 1.6x（包含 Schenker 整合溢价）

              - Kuehne+Nagel：CHF 25B 市值，CHF 22B 收入 → 收入 1.1x

              - Maersk（货代部门）：嵌在 Maersk Group 中；货代业务约收入 0.4x

              - Expeditors International：约 $16B 市值，约 $9B 收入 → 收入 1.8x（数字化领先的传统企业）
            claimRefs: []
          - type: table
            tableRef: TV002
