    title: 投资逻辑破裂与止损触发表
    description: Events that would break the Flexport investment thesis and trigger exit
    columns:
      - 触发条件
      - 阈值
      - 影响
      - 应对
    rows:
      - - Shopify 首选合作伙伴关系终止
        - Shopify 指定竞争性物流合作伙伴，或关闭首选合作伙伴计划
        - 立即卖出 — 核心增长引擎消失
        - 快速退出持仓；在没有 Shopify 渠道的情况下重估剩余企业价值
      - - 运价周期下行
        - SCFI 较 2024 年均值下跌 >40%
        - 卖出 / 减仓 — 盈利推迟到 2028+
        - 按月监控；若跌破阈值，测算下行情景，并在确认后 90 天内退出
      - - Ryan Petersen 离任
        - CEO 离任且未指定继任者
        - 若没有可信接班方案则卖出 — 投资人与客户信心承压
        - 评估继任质量；若有强 COO 或已知继任者则持有；若董事会随后动荡则卖出
      - - CBP 或 FMC 执法行动
        - CBP 或 FMC 发出牌照暂停通知
        - 卖出 — 核心运营承压
        - 立即退出；监管牌照被吊销就是生死事件
      - - 低于 $2B 的降估值融资
        - 公开宣布以 <$2B 估值融资
        - 卖出 — 估值标记显著低于入场价
        - 在进一步稀释前退出；评估新增资本是否足以支撑恢复
      - - 平台可靠性危机（旺季）
        - Q3-Q4 期间第二次重大平台可靠性事故
        - 减仓 — 企业客户流失风险上升
        - 跟踪客户反应 60 天；若确认流失，考虑退出
    coverage: exhaustive
    notes: null
    enumeration: true
    enumerationScope:
      coverage: exhaustive
      basis: Kill triggers derived from thesis risk analysis in Chapter 7 and standard investment monitoring framework.
    claimRefs:
      - CV009
      - CV010
  - id: TV006
    title: 最终尽调索取清单
    description: Priority information requests before an investment in Flexport
    columns:
      - 尽调事项
      - 重要性
      - 来源
    rows:
      - - 按板块审计的 P&L（货代、报关、SaaS、Capital）
        - 没有披露 P&L，无法判断盈利路径和板块经济性
        - 公司 — 正式数据室
      - - 完整股权结构表与可转债条款
        - 没有完整股权结构表，稀释和优先权压力无法判断；可转债机制未披露
        - 公司 — 正式数据室
      - - 企业客户集中度（前 10 大客户收入占比）
        - 客户集中度风险未知；前 10 大客户可能贡献 40-60% 货代收入
        - 公司 — 正式数据室
      - - 按板块拆分的客户 NRR 与 logo 流失率
        - 留存率是单位经济性的关键信号；公开渠道不可得
        - 公司 — 正式数据室
      - - Shopify 合作协议（期限、独占性、终止权）
        - 不知道商业条款，无法判断渠道耐久性
        - 公司 — 正式数据室
      - - Flexport Capital 应收账款逾期率与信贷额度条款
        - 没有应收账款质量数据，信用风险和资本充足性无法判断
        - 公司 — 正式数据室
      - - 2023-2024 年平台可靠性事故记录
        - 没有正常运行时间和事故数据，无法验证重组后是否改善
        - 公司 — 工程团队
      - - 客户访谈（3+ 家企业客户，3+ 家 Shopify 商户）
        - 没有客户声音，无法判断 NPS 和流失风险
        - 公司 — 客户访谈
    coverage: partial
    notes: null
    claimRefs:
