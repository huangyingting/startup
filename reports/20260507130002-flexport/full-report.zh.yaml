  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流集成
        blocks:
          - type: paragraph
            body: >
              Flexport 的产品套件围绕完整国际货代工作流设计：从下单，到海运 / 空运订舱、起运地提货、清关、目的地交付，再到发货后分析。


              核心产品模块：

              (1) 海运货代：数字订舱平台，包含承运商选择、费率比较和实时集装箱追踪。通过 API + EDI 与 30+ 海运承运商集成。

              Flexport 平台为每票货物提供里程碑级可视化（船舶离港、到港、清关、交付确认）。


              (2) 空运货代：航空运单（AWB）管理、承运商选择，以及通过航空承运商 API 实时追踪。Flexport 为标准快递航线提供成本有竞争力的空运报价，并支持当日订舱。


              (3) 报关代理（持有 US CBP 牌照）：基于 ML 的关税分类引擎自动做 HTS 编码分类；自动提交 CBP 3461、3461 Alt 和 7512 表格；追踪退税；分析 Section
              301/232/201 关税。


              (4) 卡车与铁路（短驳 + 内陆）：Flexport 已集成承运商网络，用于港口短驳、交叉转运和铁路多式联运。卡车网络采用轻资产模式（承运商网络模型）；铁路通过合作伙伴接入。


              (5) Flexport Management Platform（FMP）：供应链可视化 SaaS。核心模块：

              - 货运追踪器：通过承运商 API 集成提供实时里程碑更新

              - 碳报告：Scope 3 物流排放计算（EN 16258 和 GHG Protocol）

              - 分析：定制货运支出分析、供应商交付周期分析

              - 文档管理：自动生成 BOL、海关表格、商业发票


              (6) Flexport Capital：通过 FMP / 货代工作流访问的嵌入式贸易融资。托运人在 Flexport 平台内申请融资；系统把运输历史作为承销替代指标自动审批。
