            title: 传统货代的数字化投资正快速缩小能力差距
            body: >-
              DSV、Kuehne+Nagel 和 Maersk 均在 2022-2024 年推出数字货运平台，并每年投入数亿美元做数字化。如果传统玩家补上可视化和分析能力差距， Flexport
              的主要差异化将收窄为价格透明度——护城河更弱。
            calloutType: insight
