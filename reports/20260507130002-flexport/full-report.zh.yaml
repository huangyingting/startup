      - number: '4.4'
        title: 图表
        blocks:
          - type: callout
            title: Flexport 的盈利路径靠收入结构迁移，不只靠货运量
            body: >-
              货运代理毛利率只有 2-5%，因此单靠货运量增长无法把公司毛利率拉到健康水平。要实现盈利规模，报关代理、Flexport Capital 和 FMP 软件业务需要从当前约 18% 收入占比增长到
              30%+——这是多年结构迁移，既需要 Shopify SME 转化（软件和报关附着），也需要企业 CSRD 合规采用（FMP ARR）。
            calloutType: insight
            claimRefs:
              - CI001
