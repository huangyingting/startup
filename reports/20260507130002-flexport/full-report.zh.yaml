        - id: n5
          label: 下行轮融资
          detail: 需要以低于当前 $3.8B 估算估值融资
          type: process
        - id: n6
          label: 投资人信心削弱
          detail: 下行轮标记估值下调；信任-可信度螺旋下滑
          type: process
        - id: n7
          label: 人才流失风险
          detail: 股权稀释；士气受冲击；关键工程人才离职
          type: output
        - id: n8
          label: 企业客户风险
          detail: 服务连续性疑问加速客户转向在位者
          type: output
      edges:
        - from: n1
          to: n2
          label: 收入直接相关
        - from: n2
          to: n3
          label: 收入低于盈亏平衡
        - from: n2
          to: n4
          label: Flexport Capital 顺周期风险
        - from: n3
          to: n5
          label: 现金续航耗尽
        - from: n4
          to: n5
          label: 资本损失 + 烧钱
        - from: n5
          to: n6
          label: 下行轮公告
        - from: n6
          to: n7
          label: 股权价值下降
        - from: n6
          to: n8
          label: 生存能力担忧
    approximationNotes: 示意性风险级联；实际传导取决于货运市场状况的严重程度和发生时间。
    claimRefs:
      - CR005
      - CR013
      - CR015
  - id: FR003
    title: 依赖图
    type: kpi
    layout: standard
    summary: |
      Flexport 的关键外部依赖及风险评估。
    data:
      items:
        - label: Shopify（SME 分销）
          value: Critical / Low probability of loss
          note: 首选合作伙伴；已集成；商业关系活跃；但也是 SME 增长渠道的单点故障
        - label: a16z / 投资人财团（资本）
          value: Critical / Low probability of default
          note: 2025 年 8 月内部轮显示支持仍在；但盈利前资本依赖是结构性的
        - label: AWS（基础设施）
          value: High / Very low probability
          note: 多区域部署降低风险；按 Flexport 规模没有现实替代方案
        - label: CBP 牌照（监管）
          value: Critical / Very low probability
          note: 合规项目活跃且维护良好；若被吊销会造成灾难性影响
        - label: 海运承运人（费率获取）
          value: Medium / Structural disadvantage
          note: Flexport 无法控制承运人费率；相对在位者的量价折扣差距是长期费率风险
        - label: Clean Cargo 数据（CSRD 质量）
          value: Medium / Low probability
          note: 工作组会员身份；非专有；可获取 50+ 家承运人数据；有直接承运人备选来源
    approximationNotes: null
    claimRefs:
      - CR007
      - CR008
      - CR016
  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: standard
    summary: |
      决策树展示为什么 Flexport 在 $3.8B 估值下建议 TRACK，
      以及要升至 BUY 需要哪些变化。
    data:
      nodes:
        - id: n1
          label: Flexport 当前：约 $3.8B 估算
          detail: 2025 年 8 月内部股权轮；2024E 收入 1.8x
          type: input
        - id: n2
          label: 仍处盈利前吗？
          detail: 是——EBITDA 目标为 2025 年底至 2026 年初
          type: process
        - id: n3
          label: 货运周期风险高吗？
          detail: 是——熊市情景概率 35%；运价波动大
          type: process
        - id: n4
          label: Shopify 渠道稳固吗？
          detail: 未知——商业条款未披露；Shopify 有关闭 SFN 的先例
          type: process
        - id: n5
          label: $3.8B 下 TRACK
          detail: 生意不错，估值偏紧；等待盈利证明或更好入场点
          type: process
        - id: n6
          label: $2.5-3.0B 下 BUY
          detail: 若入场估值下调，风险回报更好；二级市场或下行轮
          type: output
        - id: n7
          label: 若满足条件，$3.8B+ 下 BUY：
          detail: 确认 EBITDA 打平 + 货运市场稳定 + Shopify 转化放量
          type: output
      edges:
        - from: n1
          to: n2
          label: 检查盈利能力
        - from: n2
          to: n3
          label: 是 → 评估周期风险
        - from: n3
          to: n4
          label: 是 → 评估渠道韧性
        - from: n4
          to: n5
          label: 不确定 → TRACK
        - from: n5
          to: n6
          label: 若估值下调
        - from: n5
          to: n7
          label: 若论点验证
    approximationNotes: null
    claimRefs:
      - CV001
      - CV013
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: |
      Flexport 在不同收入倍数情景和收入水平下的估值敏感性。
    data:
      items:
        - label: 1.0x 2024E 收入（$2.1B）
          value: 2100
          note: 底部倍数——低于可比在位者倍数；困境资产定价
        - label: 1.4x 收入（目标买入点）
          value: 2940
          note: 风险回报更好的目标入场估值；较当前低 1 个倍数点；二级市场
        - label: 1.8x 收入（当前估算 $3.8B）
          value: 3780
          note: 当前估算估值——偏紧；盈利前溢价高于在位者倍数
        - label: 2.5x 收入（盈利后目标）
          value: 5250
          note: 若确认 EBITDA 8%+ 则合理；符合盈利型数字货代溢价
        - label: 3.5x 收入（软件组合转型牛市）
          value: 7350
          note: 牛市情景：FMP SaaS 占收入 >15%；EBITDA 12%+；战略收购溢价
        - label: Expeditors 可比项（1.8x，已盈利）
          value: 3780
          note: 与 Expeditors 倍数相同，但 Expeditors 已盈利——凸显估值偏紧判断
    approximationNotes: 收入倍数套用约 $2.1B 的 2024E 收入估算。Expeditors 为公开市场可比对象。
    claimRefs:
      - CV007
      - CV014
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: |
      从 $3.8B 入场点出发，乐观、基准、悲观三种情景下的预期退出估值区间。
    data:
      items:
        - label: 乐观情景退出（2027）
          low: 7000
          base: 7500
          high: 8000
          note: 较 $3.8B 入场价 1.8-2.1x；市场处于峰值时被战略收购或 IPO
        - label: 基准情景退出（2027-2028）
          low: 5000
          base: 5500
          high: 6000
          note: 较 $3.8B 入场价 1.3-1.6x；实现盈利；IPO 或战略收购
        - label: 悲观情景退出（2026-2027）
          low: 2000
          base: 2500
          high: 3000
          note: 较 $3.8B 入场价 0.5-0.8x；降估值融资轮；盈利推迟；被迫出售
        - label: 降估值轮入场机会
          low: 2000
          base: 2750
          high: 3000
          note: 入场点区间更好；收入倍数 1.0-1.4x；按该入场点测算，基准情景回报为 1.8-2.0x
    approximationNotes: 情景区间为定性估计；所有数值均以百万美元计。
    claimRefs:
      - CV005
      - CV015
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: |
      围绕 Flexport 投资逻辑，需要持续跟踪的关键指标。
    data:
      items:
        - label: 当前估值
          value: ~$3.8B (Aug 2025 est.)
          note: 2024E 收入的 1.8x；较 2022 年 $8B 峰值低 52%
        - label: 收入（2024E）
          value: ~$2.1B
          note: 较 2023 年约 $1.6B 同比增长约 30%；货运市场复苏提供顺风
        - label: 收入增长率
          value: ~30% YoY (2024E)
          note: 目标是持续增长 20%+，才能支撑相对传统货代的溢价
        - label: EBITDA 目标
          value: Breakeven end-2025 to early-2026
          note: 截至报告生成日尚未确认；这是投资逻辑的关键里程碑
        - label: 累计融资额
          value: ~$2.3B+
          note: $260M 可转债（2024 年 1 月）+ $250M 股权融资（2025 年 8 月）+ 既往轮次
        - label: 现金跑道估计
          value: 18-24 months from Q4 2025
          note: 下一次融资前必须盈利，否则就要面对稀释性的降估值融资轮
        - label: 可比公司倍数区间
          value: 0.6-1.8x revenue
          note: KN 1.1x（盈利），DSV 1.6x（整合 Schenker），Expeditors 1.8x（盈利）
        - label: 建议
          value: TRACK — not buy at $3.8B
          note: 更合适的入场估值是 $2.5-3.0B；触发条件：EBITDA 确认 + 货运市场稳定
    approximationNotes: null
    claimRefs:
      - CV001
      - CV016
