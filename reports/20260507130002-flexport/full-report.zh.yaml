chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: |
              Flexport 由 Ryan Petersen 于 2013 年创立，使命是让全球贸易对所有人都更简单。公司持有报关代理和货代牌照，
              以数字优先的物流中介形态运营，为 SME 到大型企业托运人管理海运、空运、铁路、卡车运输和最后一公里交付。

              Flexport 总部位于旧金山，在 Amsterdam、Chicago、Frankfurt、Hong Kong、Los Angeles、New York、
              Portland、Seattle 和 Shenzhen 设有办公室，覆盖完整的全球贸易走廊。公司的平台提供实时货运可视化、数据分析、
              金融服务（贸易融资）和海关管理，因此定位更像「供应链操作系统」，而不是传统货运经纪。

              Ryan Petersen 创办 Flexport，是因为他看到货运代理仍是少数主要依赖传真、电话和电子表格运转的大行业之一。
              他的判断是：把货代工作流数字化，能释放显著效率，也能相对 DSV、Maersk、Kuehne+Nagel 等传统玩家做出更好的客户体验。
              Flexport 的自研平台把报关申报、承运商选择、路线优化和供应链分析整合进一个数字界面，托运人可通过手机或桌面端访问。
              公司持有 US Customs Broker 牌照（CBP），也是持牌 NVOCC（无船承运人）。这些监管身份让 Flexport 能代表进口商向
              US Customs 提交入境文件，并与海运承运商签约锁定舱位——也为非传统物流平台设置了有意义的准入门槛。
