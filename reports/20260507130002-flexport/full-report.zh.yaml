      - number: '8.4'
        title: 图表
        blocks:
          - type: callout
            title: 观察——不是以 $3.8B 买入：该估值面对悲观情景没有安全边际
            body: >-
              在 $3.8B（2024E 收入 1.8x）估值下，Flexport 的下行情景——运价下跌迫使其以 $2-3B 降价轮退出——只带来 0.5-0.8x 回报，相当于亏损
              20-50%。对一家尚未盈利、渠道集中、对货运周期敏感的公司来说，这个风险 / 回报比不可接受。更好的进入点（$2.5-3.0B，收入 1.2-1.4x）会在基准情景下提供 1.8-2.0x
              回报，且悲观情景至少保本。纪律性投资人应跟踪 Flexport 穿越盈利里程碑，并在首个确认 EBITDA 转正季度后重新评估。
            calloutType: insight
            claimRefs:
              - CV001
              - CV005
          - type: callout
            title: 可转债悬顶是现有股权持有人的隐性风险
            body: >-
              2024 年 1 月 $260M 可转债的转换机制（估值上限、折扣、利息）未公开披露。如果 Flexport
              在降价轮情景下需要额外资本，可转债会按较低估值折价转换——进一步加重现有优先股持有人的稀释。可转债稀释和清算优先权堆叠（$2.3B+）叠加，意味着普通股持有人（员工、早期天使）在低于 $6-7B
              的退出中参与空间非常有限。任何以 $3.8B 进入的投资人，都应在承诺前要求完整披露股权结构表。
            calloutType: insight
            claimRefs:
              - CV009
              - CV017
