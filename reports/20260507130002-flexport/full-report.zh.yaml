      - number: '2.3'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: |
              主要增长驱动因素：
              (1) 电商跨境贸易增长：全球跨境电商每年增长 20-25%，带动小包裹和 LCL（拼箱）货代需求——这是 Flexport 的目标甜蜜点。
              (2) 供应链韧性投资：COVID 之后，托运人加大对可视化和替代路线的投资，以降低中断暴露。
              (3) CSRD / ESG Scope 3 报告：EU CSRD 要求披露 Scope 3 供应链排放——带来对具备碳数据的货运平台的需求。
              (4) 近岸外包 / 友岸外包：美国-墨西哥贸易增长和近岸化趋势，增加了对美国跨境物流平台的需求。

              主要采用约束：
              (1) 传统关系：DSV、Kuehne+Nagel、Maersk 拥有数十年的托运人关系、货量折扣和服务网络深度，数字平台难以完整复制。
              (2) 切换成本：已建立定制货运项目、EDI 连接和承运商合同的托运人，面临有意义的切换摩擦。
              (3) 信任缺口：大型企业托运人风险厌恶；Flexport 规模化处理复杂、高价值货运的能力仍在积累证据。
              Flexport 的盈利挑战进一步压制采用：管理 $100M+ 年货运支出的企业托运人，在把核心航线交给一家尚未盈利的运营商前，需要多年服务可靠性保证。
              传统玩家在竞争中主动利用这点，把 Flexport 对融资的依赖包装成服务连续性风险。

              2025 年美国关税环境影响混合：中国及全球进口关税上升，增加报关复杂度（利好 Flexport 报关收入），但压低受影响航线货量（利空基于货量的货运收入）。
              净影响大致中性，最终取决于 Flexport 的航线组合和客户贸易模式。
