      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Flexport 的运营风险在 2023 年重组后有所改善，但仍留下几处脆弱点。


              平台可靠性：2022 年 Q4
              的平台可靠性危机（发生在假日货运旺季）仍是最重要的运营风险先例。重组后，工程投入优先保可靠性而非上新功能，但可靠性指标是否改善，外部没有独立验证。未来旺季若再次出可靠性事故，企业客户流失可能提速。


              技术债：2022 年超高速增长期在平台中积累了技术债。公司正在系统性清理，但未必已彻底解决。CSRD Category 9、Shopify Capital 等新功能上线时，残余技术债会提高集成失败概率。


              网络安全与贸易数据安全：Flexport 处理高度敏感的贸易数据（报关单、关税义务、财务发票）。SecurityScorecard 外部安全评级为
              B，说明仍有改善空间。一旦涉及报关单或贸易融资数据的重大泄露，Flexport 可能面临 GDPR 处罚、CBP 合规审查以及企业客户流失。


              海关合规风险：Flexport 是 CBP 持牌报关行，需接受 CBP 合规审计。ML HTS 归类引擎天然存在误归类风险——HTS 错误可能让 Flexport 的货主客户承担少缴关税责任，也会损害
              Flexport 报关牌照声誉。2025 年，Section 301 关税归类复杂度明显抬高了这项风险。
