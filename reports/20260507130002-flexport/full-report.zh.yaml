      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Flexport 的竞争格局横跨四个层级。它们在竞争动态、战略姿态以及对 Flexport 市场地位的影响上差异很大。


              第一层——全球传统货代巨头：DSV（丹麦，2024 年收入 $26B）、Kuehne+Nagel（瑞士，收入 $22B）、Maersk Logistics（丹麦，物流收入 $15B）、

              DB Schenker（德国，收入 $20B）。这些传统玩家有 50-100 年运营历史，承运商关系带来基于货量的费率优势，Flexport 难以匹配；大型企业客户关系也建立在深厚服务历史之上。

              四家公司自 2022 年以来都推出了数字货运平台，并每年投入数亿美元弥合技术差距。


              第二层——数字货代同业：Sennder（欧洲，收入估计 €1.5B）、Freightos（市场平台模式，收入约 $60M）、Flexe（仓储市场平台）、Uber Freight（TMS 和经纪）。

              这些同业在数字化和透明度上竞争，但服务客群不同：Sennder 仅做欧洲公路货运；Freightos 是市场平台（不是运营商）；Uber Freight 聚焦美国国内卡车 TMS。


              第三层——供应链软件公司：project44（估值 $2.3B，约 $260M ARR）、e2open、SAP Transportation Management、Oracle GTM。

              这些公司争夺货运可视化和分析软件的钱包份额——Flexport 正通过 FMP 软件产品进入这一市场。


              第四层——电商物流：ShipBob、Shipwire、Deliverr（Shopify）。它们争夺 Flexport 通过 Shopify 合作锁定的 SME
              电商客户——主要在最后一公里和履约，而不是国际货运代理。
