  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入与商业模式
        blocks:
          - type: paragraph
            body: |
              Flexport 采用多收入流模型，以货运代理交易收入为锚，同时有两个正在兴起的高毛利垂直业务。

              截至 2024 年的收入流：
              (1) 海运 / 空运货代：估计占总收入 75-80%（在 $2.1B 总收入中约 $1.6-1.7B）。按每票货物收取交易收入，基础是货运价差（承运商费率与向托运人收费之间的差额）。
              对海运 / 空运费率周期有周期性暴露：海运费率从 2022 年峰值到 2023 年低点下跌 60-70%，是 Flexport 2023 年收入下滑的主要原因。

              (2) 报关代理：估计占收入 10-15%（约 $200-300M）。美国进出口报关按单收费。收入更稳定（不绑定货运费率周期）；受益于关税复杂度提升。

              (3) Flexport Capital（贸易融资）：估计占收入 2-5%（约 $50-100M）。向托运人提供 60-120 天贸易融资额度并收取费用收入。毛利率高（80-90%），但资本密集；
              需要信贷额度来为应收账款账簿提供资金。

              (4) FMP 软件（Flexport Management Platform）：估计占收入 1-3%（约 $20-60M ARR）。面向货运可视化、碳追踪和供应链分析的 SaaS 订阅。
              这是毛利率最高的收入流（约 80-85%），但仍处早期。

              收入趋势：$1.6B（2023 年）→ $2.1B（2024 年估计）= 约 31% 增长，从 2022-2023 年货运费率周期下行中恢复。
              长期收入目标：分析师估计到 2028-2030 年达到 $4-7B，意味着 15-25% CAGR。
