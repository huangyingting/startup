  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: |
              Flexport 处在两个市场的交叉口：（1）全球货运代理——托运人与承运商之间 $200-250B 的中介层；（2）供应链软件 / 可视化——
              用于追踪、分析和规划的 $15-25B 软件市场。

              全球货运代理覆盖完整物流价值链：海运货代（约 60% 收入）、空运（约 25%）、卡车运输与短驳（约 10%）、报关代理（约 5%）和附加服务。
              货代赚取承运商费率与向托运人收费之间的价差，并收取服务费。全球货运代理行业每年处理约 $10-12T 的贸易商品价值，货代从中抽取 1-3% 作为费用。

              Flexport 的主要可触达市场不包括：（a）拥有专职物流团队和承运商合同的超大型企业（即绕过货代的 $5B+ 进口商）；（b）纯国内卡车运输
              （Flexport 聚焦国际）；（c）快递 / 包裹（DHL、FedEx、UPS——产品不同）；（d）合同物流（仓储 + 履约——不过 Shopify Logistics 收购有部分重叠）。

              数字货代子赛道是最相关的增长市场：2024 年估计 $4.5-6B，到 2028-2030 年按 18-24% CAGR 增至 $12-18B。该赛道由技术优先的运营商定义，
              它们用数字平台替代传真 / 电话驱动的经纪工作流；平台提供实时可视化、自动化报关和数据分析——这正是 Flexport 的核心主张。
