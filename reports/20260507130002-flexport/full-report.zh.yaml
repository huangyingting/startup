      - number: '3.3'
        title: 多归属、切换成本与锁定效应
        blocks:
          - type: paragraph
            body: >
              Flexport 托运人面临中等切换成本，来自 ERP/TMS 集成、海关凭证设置和托运人门户配置。FMP 碳模块还会形成额外数据锁定——累积的 Scope 3 基线和审计轨迹不易迁移到竞争平台。

              企业层面的多归属很常见，大型托运人会在不同航线使用 2-4 家货代来管理承运商费率风险——这削弱但没有消除 Flexport 的切换护城河。


              SME Shopify 商家的切换成本更低：Shopify 集成创造低摩擦入口，但如果竞争方案以更低成本接入 Shopify，退出也同样低摩擦。Flexport 的 SME 护城河取决于更好的 UX
              和更宽的报关代理覆盖，

              以阻止商家转向只做国内物流、但已接入 Shopify 的服务商。


              分销优势是不对称的：相对第一层传统巨头，Flexport 的 Shopify 渠道是真护城河（传统玩家缺少消费级商家分销模型）；但它也面临 Shopify 自有物流产品和其他 Shopify
              应用伙伴（ShipBob、Shipwire）的竞争。

              Shopify 分销护城河取决于 Shopify 继续把 Flexport 作为国际货运首选伙伴。
