      - number: '7.3'
        title: 财务、资本与执行风险
        blocks:
          - type: paragraph
            body: >
              Flexport 的财务风险偏高：公司尚未盈利，仍依赖投资人资金覆盖经营亏损。


              资本充足性风险：公司从 2025 年 Q4 起估计有 18-24 个月现金跑道（2025 年 8 月完成 $250M 融资后）。如果在窗口期内无法实现 EBITDA
              盈亏平衡——原因可能是货运市场下行、业务组合切换慢于预期，或企业市场份额流失——Flexport 将需要再次融资。若新一轮估值低于当前约 $3.8B，投资人与人才稀释会提速，甚至引发信心和信誉螺旋式下滑。


              Flexport Capital 信用风险：贸易融资应收账款簿由 Flexport 自动模型评估的货主信用支撑。货运市场下行时，进口商现金流恶化，应收款逾期上升——形成顺周期风险：Flexport Capital
              的损失会与货运代理收入下滑同时叠加。


              关键人物风险：CEO Ryan Petersen 在 2023 年 9 月回归，是运营企稳、投资人信心修复的催化剂；如果他因健康、外部机会或董事会冲突离任，员工留存、投资人信心和企业客户信任都会受到重大负面冲击。


              接班与人才风险：2022-2023 年 32% 裁员在削减冗余成本的同时，也可能带走机构记忆；若盈利时间表拉长，关键工程和运营人才仍可能流失。
