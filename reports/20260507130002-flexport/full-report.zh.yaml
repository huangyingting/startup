  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与分层
        blocks:
          - type: paragraph
            body: |
              Flexport 的客户基础分为三个客群，它们在获客渠道、产品匹配度和留存特征上不同。

              客群 1——企业与中端市场进口商：
              这是 Flexport 的基础客户——从亚洲（主要是中国、越南、印度）向美国和 EU 进口制成品的公司。它们既包括中端市场进口商（年进口货运支出 $5M-$100M），
              也包括企业账户（年货运支出 $100M+）。企业账户通常在多条贸易航线上使用 Flexport，并附着报关代理、FMP 软件，也可能使用 Flexport Capital。

              具名企业客户画像：Flexport 公开提及的客户基础包括消费电子、服装、体育用品和工业设备领域的数十亿美元级进口商——但出于竞争敏感性，Flexport 很少披露具体公司名称。
              Shopify 合作公告（2023 年 11 月）确认 Shopify 本身也是 Flexport 客户。

              客群 2——SME 电商商家（通过 Shopify）：
              Shopify 的 1.75M 商家代表高增长获客机会。Shopify 集成让商家可直接在 Shopify 后台内预订国际货运（主要是中国到美国）。
              转化率未公开披露；行业分析师估计，截至 2024 年，1-3% 的 Shopify 商家是 Flexport 活跃货运用户。

              客群 3——B2B 物流运营商和 API 伙伴：
              第三方物流公司（3PL）、履约公司和平台运营商接入 Flexport Logistics API，把货运代理嵌入自有产品。该客群仍处早期，但代表平台级收入增长潜力。
