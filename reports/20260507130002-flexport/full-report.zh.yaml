      - number: '6.3'
        title: 扩张策略与渠道动态
        blocks:
          - type: paragraph
            body: >
              Flexport 的主要扩张杠杆是 Shopify 渠道：把 Shopify 商家从偶尔订货运，转化为定期使用 Flexport 货代、报关代理、FMP 分析和 Flexport Capital 的客户。


              扩张动作：Shopify 渠道创造先落地再扩张的动态——商家先通过 Shopify 预订一票货运，再附着报关代理（美国进口自动附着），然后采用 FMP 做分析，最后获得 Flexport Capital 资格。

              每一层都会增加单商家收入，并提高切换成本。


              地理扩张：Flexport 当前客户基础集中在美国始发或美国到达货运（主要是跨太平洋进口）；公司在 Amsterdam、Frankfurt、Hong Kong 和 Shanghai 设有办公室，

              服务 EU 和亚洲源头客户，但 EU 货运在收入中占比更小。EU 扩张是一条增长杠杆——CSRD 合规要求特别为 Flexport 碳模块在 EU 监管企业中创造需求。


              企业扩张：制造和零售垂直行业的企业账户，通过在货代关系上叠加 Flexport Capital（贸易融资）和 FMP 软件扩张——不新增客户也能提高单账户收入。

              企业账户管理是账户扩张的主要驱动。


              伙伴 / API 扩张：使用 Flexport Logistics API 的 3PL 和履约平台代表一个 B2B 客群，它们通过伙伴平台而非 Flexport
              直销产生货运量——在不成比例增加销售与营销成本的情况下扩大触达。
