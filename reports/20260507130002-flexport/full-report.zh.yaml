      - number: '1.2'
        title: 商业模式与收入来源
        blocks:
          - type: paragraph
            body: |
              Flexport 的核心业务是货运代理：它在托运人与承运商（海运公司、航空公司、卡车公司）之间做中介，管理从工厂到目的地的完整物流链。
              收入来自货运价差（承运商费率与向客户收费之间的差额）、报关代理费、仓储和附加服务。

              主要收入来源：
              1. 海运货代——货量最高；覆盖全球海运航线
              2. 空运货代——高时效服务；随电商空运扩张而增长
              3. 卡车运输与短驳——美国国内和跨境
              4. 报关代理——持牌进口登记方；覆盖美国和国际
              5. Flexport Capital（贸易融资）——面向进口商的短期融资
              6. Flexport Platform 软件——供应链可视化订阅 SaaS

              Flexport 2024 年收入约 $2.1B（估计，较 2023 年 $1.6B 增长约 30%）。增长来自海运市场复苏和市场份额提升。
              不过公司仍未盈利，运营亏损仍在延续，因为公司继续投入技术平台和国际扩张。
