  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 宏观与市场风险
        blocks:
          - type: paragraph
            body: |
              Flexport 收入与两个宏观层面因素高度相关，而这些因素很大程度不受管理层控制：海运 / 空运费率水平，以及美国贸易政策（关税）。

              货运费率周期风险是主要宏观风险。海运费率（以上海集装箱运价指数衡量）从 2022 年峰值到 2023 年低点下跌 65-70%，直接导致 Flexport 2023 年收入下降和盈利失约。
              如果这一模式重演——可能由全球需求放缓、新船运力上线，或苏伊士 / 红海局势正常化触发——将显著影响货运代理收入，并可能把盈利目标推迟 12-24 个月。

              美国关税升级是影响混合的风险。2025 年对中国商品的关税升级（很多品类累计有效税率超过 100%）会压低受影响航线的跨太平洋货量（利空货代收入），
              同时增加报关代理复杂度（利好报关收入）。净影响不确定，但分析师共识认为，由于收入权重偏向货运，对 Flexport 轻到中度净负面。

              地缘政治风险：Flexport 跨太平洋集中度高（50-70% 货量在亚洲-美国航线），因此暴露于美中贸易紧张、台湾海峡风险和 APAC 地缘政治不稳定，可能冲击核心贸易航线。
