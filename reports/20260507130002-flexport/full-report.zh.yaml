      - number: '6.2'
        title: 客户采用与留存证据
        blocks:
          - type: paragraph
            body: |
              由于公司仍是私营状态，Flexport 的采用证据主要是定性和渠道层面，而不是量化和队列层面。

              最强采用信号：
              (1) Shopify 首选伙伴认定（2023 年 11 月）：Shopify 选择 Flexport 作为首选全球物流服务商，把 Flexport 的国际货运代理整合进 Shopify 商家体验。
              这是平台层面对 Flexport 产品适配 SME 电商客群的验证。

              (2) 收入恢复至 $2.1B（2024 年）：较 2023 年水平恢复 31%，说明客户数量增长、单客户货运量增加，或两者同时发生；没有单客户数据，难以归因贡献。

              (3) 报关代理附着：Flexport 运营美国较大的报关代理量之一（估计报关收入 $200-300M），意味着其拥有持续活跃的客户基础，数千名进口商定期提交报关单。

              客户留存缺口：
              Flexport 不披露 NRR、GRR、客户账户流失或队列留存数据。主要留存代理指标是货运代理收入稳定性，但该收入取决于货量，而非订阅。
              企业托运人留存只能从费率协议多年期性质和 ERP 集成切换成本中推断。

              客户集中度风险：
              公司未公开披露按账户划分的收入集中度；标准企业 B2B 风险适用——前 20 大企业账户很可能贡献 40-60% 货代收入。
              Shopify 渠道分散了客户基础，但 Shopify 关系本身在渠道层面构成集中度风险。
