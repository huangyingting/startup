companyProfile:
  summary: >-
    Flexport 是 Ryan Petersen 于 2013 年创立、总部位于旧金山的数字货代公司，由其担任 CEO。公司提供端到端全球货运物流： 海运货代、空运、报关代理、国际与国内卡车运输、Flexport
    Management Platform（FMP）SaaS，以及 Flexport Capital 贸易融资。Flexport 持有 US Customs Broker（CBP）和 NVOCC（FMC）牌照。2023 年 11
    月，Flexport 成为 Shopify 首选全球物流伙伴——这也是其 SME 客户获客的主要渠道。收入估计约为 $2.1B（2024E），较 2023 年 $1.6B 同比增长约 30%。累计融资超过 $2.3B，包括 2024
    年 1 月 $260M 可转债，以及 2025 年 8 月按估计 约 $3.8B 估值完成的 $250M 内部股权轮。主要投资者包括 a16z、Founders Fund、DST Global、SoftBank VF2、 MSD
    Partners。员工约 2,500 人（2022-2023 年两轮裁员后，低于 3,700 人峰值）。Dave Clark 短暂接任后， CEO Ryan Petersen 于 2023 年 9 月回归；盈利目标为 2025
    年底至 2026 年初。
