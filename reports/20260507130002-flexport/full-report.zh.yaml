      - number: '2.2'
        title: 市场规模：TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: |
              TAM——总可用市场：全球货运代理市场按货代收入计为 $200-250B（2024 年估计，Gartner / Transport Intelligence）。
              这覆盖所有地域的海运、空运、卡车、铁路和报关。如果 Flexport 能在全球货代市场拿到有意义的份额，收入潜力巨大。

              SAM——可服务市场：Flexport 的 SAM 更受约束——由美国始发 / 到达的国际货运代理，加上全球数字原生托运人客群构成。
              估计 SAM 为 $30-50B（全球 TAM 的 15-20%），权重偏向美国进出口航线（美国-中国、跨大西洋），这些航线也是 Flexport 具备运营深度和报关牌照覆盖的地方。

              SOM——可获取市场：Flexport 2024 年收入约 $2.1B，已拿下其 SAM 约 4-7%。近期 SOM（3-5 年）若增长至
              $4-6B 收入，相当于 8-12% 的 SAM 渗透率——可达成，但需要持续从传统玩家手中夺取市场份额。Shopify 分销渠道是 SOM 扩张的主要杠杆。

              多种测算方法收敛：（a）Gartner：数字货运从 $4.5B 增至 2028 年 $12B；（b）Transport Intelligence：总市场从 $200B 以 3-4%
              CAGR 增至 2028 年 $260B；（c）McKinsey：到 2030 年，数字化颠覆可能把 25-35% 的货代收入转向数字运营商；（d）FreightWaves：
              Flexport 当前占总货代市场 1-2%；5 年目标为 3-5%。
            claimRefs: []
