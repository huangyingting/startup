callouts:
  - id: CAI001
    type: key-finding
    title: Flexport's profitability path depends on mix shift, not freight volume alone
    body: >-
      Freight forwarding gross margin at 2-5% means that freight volume growth alone will not achieve healthy company
      gross margins. The path to profitable scale requires the customs brokerage, Flexport Capital, and FMP software
      businesses to grow from ~18% of revenue today to 30%+ — a multi-year mix shift that requires Shopify SME
      conversion (software and customs attach) and enterprise CSRD compliance adoption (FMP ARR).
    claimRefs:
      - CI001
      - CI007
  - id: CAI002
    type: risk-flag
    title: 'Freight rate cycle risk: another 2022-style downturn could exhaust capital before profitability'
    body: >-
      Ocean freight rates dropped 60-70% from 2022 peak to 2023 trough, directly causing Flexport's 2023 revenue decline
      and profitability miss. If a similar freight rate downturn occurs before Flexport achieves adjusted EBITDA
      breakeven, the company could be forced into a dilutive capital raise at valuation levels below the current ~$3.8B
      — or face more significant restructuring.
    claimRefs:
      - CI010
      - CI013
