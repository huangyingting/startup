callouts:
  - id: CAM001
    type: key-finding
    title: Flexport competes in a $200-250B market but digital freight is only $4.5-6B today
    body: >-
      The total freight forwarding market is enormous but 95%+ is served by traditional incumbents. Flexport's near-term
      opportunity is within the $4.5-6B digital freight segment, where it holds ~35-47% share — a dominant position in a
      high-growth niche. The key question is how fast digital freight gains share from traditional forwarding.
    claimRefs:
      - CM003
      - CM004
  - id: CAM002
    type: risk-flag
    title: Incumbent forwarder digital investment is rapidly closing the capability gap
    body: >-
      DSV, Kuehne+Nagel, and Maersk each launched digital freight platforms in 2022-2024 and are investing hundreds of
      millions annually in digitization. If incumbents close the visibility and analytics gap, Flexport's primary
      differentiation narrows to price transparency — a weaker moat.
    claimRefs:
      - CM010
      - CM014
