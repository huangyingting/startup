callouts:
  - id: CAR001
    type: key-finding
    title: "Freight rate cycle is the existential risk — Flexport has not yet survived a full market cycle at scale"
    body: "The 2022-2023 freight rate downturn (65-70% rate decline) proved Flexport's revenue and profitability are highly correlated with macro freight rate levels. Flexport has not yet demonstrated full-cycle profitability — a second rate downturn before EBITDA breakeven would be an existential challenge. Investors must assess: (1) downside scenario probability in 2025-2026, (2) remaining capital adequacy at trough freight levels, and (3) whether the 18-24 month runway is sufficient to cross the profitability threshold under pessimistic freight assumptions."
    claimRefs: [CR005, CR013]
  - id: CAR002
    type: risk-flag
    title: "The Shopify channel is both the most valuable growth asset and the highest concentration risk"
    body: "Flexport's primary differentiation vs. Tier 1 incumbents is the Shopify distribution channel. But the entire channel depends on a single commercial relationship — Shopify's preferred logistics partner designation. Shopify has demonstrated willingness to enter and exit logistics products (e.g., Shopify Fulfillment Network closure). If Shopify diversifies to multiple freight partners or builds internal freight capability, Flexport's SME growth engine is materially impaired."
    claimRefs: [CR007, CR014]

