callouts:
  - id: CAO001
    type: key-finding
    title: "Flexport is the digital freight forwarder with the most venture capital conviction: $2.3B raised"
    body: "Flexport has raised approximately $2.3B in total, making it one of the best-capitalized digital logistics startups globally. The $8B peak valuation (2022) reflected extreme optimism on supply chain digitization; the reset to ~$3.8B reflects profitability challenges, but investor commitment through the $260M convertible (2024) and $250M raise (2025) signals continued conviction."
    claimRefs: [CO006, CO007]
  - id: CAO002
    type: risk-flag
    title: "Valuation reset from $8B to $3.8B reflects leadership turbulence and profitability miss"
    body: "The 53% valuation decline from $8B (2022) to ~$3.8B (2024) reflects the consequences of rapid over-hiring under Dave Clark and failure to reach profitability. The leadership transition back to Ryan Petersen stabilized the business, but the valuation reset demonstrates that digital freight forwarding is more cyclical and capital-intensive than investors anticipated in 2021-2022."
    claimRefs: [CO002, CO004]

