company:
  name: Flexport

chapter:
  number: 1
  title: Company Overview
  summary: |
    Flexport is a San Francisco-based digital freight forwarding and supply chain platform
    founded in 2013 by Ryan Petersen. The company manages global logistics for shippers —
    covering ocean, air, trucking, and customs — through a technology-first platform that
    combines real-time visibility, data analytics, and freight brokerage. Ryan Petersen
    returned as CEO in 2023 after a brief tenure by Dave Clark. In 2024, Flexport raised
    $260M in convertible notes (January) and an additional $250M (August 2025), totaling
    approximately $2.3B raised. The company's estimated valuation is approximately $3.8B
    (2024), down from a peak of $8B in 2022. Flexport grew revenue to ~$2.1B in 2024
    (up ~30% from $1.6B in 2023), driven by improving ocean freight volumes and global
    trade recovery. Shopify is a marquee commercial partner and customer. Flexport remains
    pre-profitability with an aggressive cost restructuring underway.

sections:
  - id: SO_S1
    title: "Company Identity and Mission"
    body: |
      Flexport was founded in 2013 by Ryan Petersen with the mission to make global trade
      easy for everyone. The company is a licensed customs broker and freight forwarder that
      operates as a digital-first logistics intermediary, managing ocean, air, rail, trucking,
      and last-mile deliveries for shippers ranging from SMEs to large enterprises.

      Headquartered in San Francisco, Flexport operates offices in Amsterdam, Chicago,
      Frankfurt, Hong Kong, Los Angeles, New York, Portland, Seattle, and Shenzhen — covering
      the full global trade corridor. The company's platform provides real-time shipment
      visibility, data analytics, financial services (trade financing), and customs management,
      positioning it as a "supply chain operating system" rather than a traditional freight broker.

      Ryan Petersen founded Flexport after recognizing that freight forwarding was one of the
      last major industries still operating on fax machines, phone calls, and spreadsheets.
      His insight: digitizing the freight forwarding workflow would unlock significant
      efficiency gains and create superior customer experience vs. incumbents like DSV, Maersk,
      and Kuehne+Nagel. Flexport's proprietary platform integrates customs filing, carrier
      selection, route optimization, and supply chain analytics in a single digital interface
      accessible to shippers from a mobile device or desktop. The company holds a US Customs
      Broker license (CBP) and is a licensed NVOCC (non-vessel-operating common carrier),
      regulatory statuses that provide legal authority to file entry documents with US Customs
      on behalf of importers and to contract with ocean carriers for cargo space — creating
      meaningful barriers to entry for non-traditional logistics platforms.

  - id: SO_S2
    title: "Business Model and Revenue Streams"
    body: |
      Flexport's core business is freight forwarding: it acts as an intermediary between
      shippers and carriers (ocean lines, airlines, trucking companies), managing the full
      logistics chain from factory to destination. Revenue is earned through freight margin
      (spread between carrier rates and customer-billed rates), customs brokerage fees,
      warehousing, and ancillary services.

      Key revenue streams:
      1. Ocean freight forwarding — highest volume; global ocean lane coverage
      2. Air freight forwarding — premium speed service; growing as ecommerce air freight expands
      3. Trucking and drayage — domestic US and cross-border
      4. Customs brokerage — licensed importer of record; US and international
      5. Flexport Capital (trade financing) — short-term financing for importers
      6. Flexport Platform software — subscription SaaS for supply chain visibility

      Flexport reported ~$2.1B revenue in 2024 (est., up ~30% from $1.6B in 2023). The
      revenue growth was driven by ocean freight market recovery and market share gains.
      However, the company remains unprofitable, with operating losses continuing as
      the company invests in technology platform and international expansion.

  - id: SO_S3
    title: "Leadership and Governance"
    body: |
      Ryan Petersen returned as CEO in September 2023 after a brief and controversial
      tenure by Dave Clark (former Amazon executive), who presided over a significant
      headcount reduction (about 30% of staff) and was replaced after failing to
      achieve profitability targets. Petersen has refocused the company on its core
      freight forwarding technology product and cost discipline.

      Key executives include Sanne Manders (COO, formerly Maersk, joined 2017 and one
      of the longest-tenured senior leaders), Ben Braverman (Chief Revenue Officer since
      2014 — the longest-serving executive and institutional knowledge anchor), and
      David Balhetchet (CFO, joined during the 2023 restructuring). The board includes
      investors from Andreessen Horowitz (a16z), Founders Fund, DST Global, Softbank,
      and others. Shopify co-founder and CEO Tobi Lütke joined as a board observer as
      part of the Shopify commercial partnership in 2023.

      Flexport's governance reflects its venture-backed startup history: Ryan Petersen
      holds significant founder voting control. No IPO timeline has been confirmed as
      of May 2026; the company has stated it is focused on profitability before considering
      public markets. The leadership team's combination of Petersen's founder vision,
      Manders' incumbent logistics expertise (Maersk), and Braverman's institutional
      revenue knowledge represents a strong profile for executing the growth-to-profitability
      transition. Key-person risk is concentrated in Ryan Petersen: his return stabilized
      the company, and another leadership transition at this stage would represent a
      significant execution setback.

      The board's strong VC representation (a16z, Founders Fund, SoftBank) ensures
      continued access to capital and strategic advice, though the diverse investor
      base may create governance complexity as economic interests evolve. The Shopify
      board observer position creates a natural strategic alignment with Flexport's
      largest commercial distribution channel.

