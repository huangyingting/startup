callouts:
  - id: CAP001
    type: key-finding
    title: "Flexport's Shopify distribution is the one competitive moat incumbents cannot replicate"
    body: "DSV, Kuehne+Nagel, and Maersk have massive scale and accelerating digital investment — but none has a Shopify merchant distribution channel. Flexport's 2023 Shopify partnership creates a potentially transformative SME customer acquisition lever that large incumbents would need 5-10 years to replicate through direct merchant sales."
    claimRefs: [CP003, CP009]
  - id: CAP002
    type: risk-flag
    title: "Incumbent digital investment is the existential competitive risk for Flexport's moat"
    body: "The $1B+ in incumbent digital platform investment since 2022 (DSV, KN, Maersk) is closing the UX and visibility gap that was Flexport's primary competitive advantage. If incumbents achieve comparable digital capability by 2025-2026 while maintaining their scale and carrier rate advantages, Flexport's competitive position may materially erode."
    claimRefs: [CP002, CP010]

