callouts:
  - id: CAV001
    type: key-finding
    title: 'TRACK — not buy at $3.8B: the valuation leaves no margin of safety against the bear case'
    body: >-
      At $3.8B (1.8x 2024E revenue), Flexport's downside scenario — freight rate decline forcing a $2-3B down-round exit
      — yields a 0.5-0.8x return, representing a 20-50% loss. This is an unacceptable risk/reward ratio for a
      pre-profitability company with concentrated channel exposure and freight cycle sensitivity. A better entry point
      ($2.5-3.0B, 1.2-1.4x revenue) would offer a base case 1.8-2.0x return from a bear case that is at least
      capital-preserving. Disciplined investors should track Flexport through the profitability milestone and reevaluate
      on first confirmed EBITDA-positive quarter.
    claimRefs:
      - CV001
      - CV005
  - id: CAV002
    type: risk-flag
    title: The convertible note overhang is the hidden risk for existing equity holders
    body: >-
      The January 2024 $260M convertible note's conversion mechanics (cap, discount, interest) are not publicly
      disclosed. If Flexport requires additional capital in a down-round scenario, the convertible note converts at a
      discount to a lower valuation — compounding dilution for existing preferred equity holders. The combination of
      convertible dilution and liquidation preference stack ($2.3B+) means common equity holders (employees, early
      angels) have very limited participation in exits below $6-7B. Any investor entering at $3.8B should require full
      cap table disclosure before committing.
    claimRefs:
      - CV009
      - CV017
