callouts:
  - id: CAU001
    type: key-finding
    title: Shopify partnership is the strongest customer traction signal — and the highest single concentration risk
    body: >-
      The Shopify preferred partner designation is both Flexport's most credible named customer proof and its largest
      concentration risk. The distribution of 1.75M merchants is transformative for SME customer acquisition, but the
      entire SME channel is contingent on a single relationship. Any change in Shopify's logistics strategy could
      eliminate the primary growth engine for the SME segment.
    claimRefs:
      - CU007
      - CU012
  - id: CAU002
    type: risk-flag
    title: Flexport's enterprise customer proof is limited — named customer disclosure is well below peer standard
    body: >-
      For a company with $2.1B in annual revenue, Flexport's lack of publicly named enterprise customers is notably
      below peer standard. Competitors like project44 actively publish customer case studies and names; Flexport's
      reticence may reflect competitive sensitivity, NDAs, or customer preference — but creates a due diligence gap for
      investors assessing customer quality and concentration.
    claimRefs:
      - CU008
      - CU009
