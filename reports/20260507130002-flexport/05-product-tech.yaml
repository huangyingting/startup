callouts:
  - id: CAE001
    type: key-finding
    title: "CSRD carbon module is Flexport's highest-quality technology moat"
    body: "The CSRD carbon module is technically sophisticated, CSRD-compliant, and backed by a growing shipper data flywheel. As EU CSRD enforcement expands (large companies FY2024, mid-market FY2025), Flexport's Scope 3 logistics reporting module becomes a procurement-linked product — shippers may be required to use a CSRD-compliant forwarder, making the module an account retention mechanism rather than a feature."
    claimRefs: [CE010, CE012]
  - id: CAE002
    type: risk-flag
    title: "Platform reliability history is a key technical risk for enterprise adoption"
    body: "The Q4 2022 Flexport platform reliability issues during peak holiday season contributed to enterprise customer dissatisfaction and the subsequent restructuring. Enterprise freight reliability expectations are high; a repeat of the 2022 reliability event would damage the brand and accelerate customer defection to incumbent forwarders with proven service track records."
    claimRefs: [CE015, CE008]

