  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Segmentation
        blocks:
          - type: paragraph
            body: |
              Flexport's customer base is organized across three segments with distinct
              acquisition channels, product fit, and retention profiles.

              Segment 1 — Enterprise and mid-market importers:
              These are the foundational Flexport customer — companies importing manufactured goods
              from Asia (primarily China, Vietnam, India) to the US and EU. They range from
              mid-market importers ($5M-$100M in annual import freight spend) to enterprise
              accounts ($100M+ annual freight spend). Enterprise accounts typically use Flexport
              across multiple trade lanes and attach customs brokerage, FMP software, and
              potentially Flexport Capital.

              Named enterprise customer profile: Flexport's publicized customer base includes
              multi-billion-dollar importers in consumer electronics, apparel, sporting goods, and
              industrial equipment — though specific company names are rarely disclosed by Flexport
              due to competitive sensitivity. The Shopify partnership announcement (Nov 2023)
              confirmed Shopify itself as a Flexport customer.

              Segment 2 — SME ecommerce merchants (via Shopify):
              Shopify's 1.75M merchants represent the high-growth customer acquisition opportunity.
              The Shopify integration enables merchants to book international freight (primarily
              China-to-US) directly within the Shopify admin. Conversion rates are not publicly
              disclosed; industry analysts estimate 1-3% of Shopify merchants are active Flexport
              freight users as of 2024.

              Segment 3 — B2B logistics operators and API partners:
              Third-party logistics companies (3PLs), fulfillment companies, and platform operators
              integrate the Flexport Logistics API to embed freight forwarding in their own products.
              This segment is early-stage but represents potential for platform-level revenue growth.
            claimRefs: []
      - number: '6.2'
        title: Customer Adoption and Retention Evidence
        blocks:
          - type: paragraph
            body: |
              Flexport's adoption evidence is primarily qualitative and channel-level rather
              than quantitative and cohort-level, due to the company's private status.

              Strongest adoption signals:
              (1) Shopify preferred partner designation (Nov 2023): Shopify selected Flexport as
              its preferred global logistics provider, integrating Flexport's international freight
              forwarding into the Shopify merchant experience. This is a platform-level validation
              of Flexport's product fit for the SME ecommerce segment.

              (2) Revenue recovery to $2.1B (2024): The 31% revenue recovery from 2023 levels
              suggests either customer count growth, freight volume increase per customer, or both;
              without per-customer data, the contribution is difficult to attribute.

              (3) Customs brokerage attach: the fact that Flexport operates one of the larger US
              customs brokerage volumes (estimated $200-300M in customs revenue) implies a sustained
              active customer base of thousands of importers filing customs entries regularly.

              Customer retention gaps:
              Flexport does not disclose NRR, GRR, logo churn, or cohort retention data. The primary
              retention proxy is the stability of freight forwarding revenue, which is volume-dependent
              rather than subscription-based. Enterprise shipper retention is inferred from the
              multi-year nature of rate agreements and ERP integration switching costs.

              Customer concentration risk:
              No public disclosure of revenue concentration by account; standard enterprise B2B risk
              applies — the top 20 enterprise accounts likely represent 40-60% of forwarding revenue.
              The Shopify channel diversifies the customer base but the Shopify relationship itself is
              a concentration risk at the channel level.
            claimRefs: []
      - number: '6.3'
        title: Expansion Strategy and Channel Dynamics
        blocks:
          - type: paragraph
            body: |
              Flexport's primary expansion lever is the Shopify channel: converting Shopify merchants
              from occasional freight bookings to regular users of Flexport forwarding, customs
              brokerage, FMP analytics, and Flexport Capital.

              Expansion motion: the Shopify channel creates a land-and-expand dynamic — merchants
              first book a single shipment via Shopify, then attach customs brokerage (automatically
              for US imports), then adopt FMP for analytics, then qualify for Flexport Capital.
              Each layer adds revenue per merchant and increases switching costs.

              Geographic expansion: Flexport's current customer base is concentrated in US-origin or
              US-destination freight (primarily trans-Pacific imports); the company has offices in
              Amsterdam, Frankfurt, Hong Kong, and Shanghai to serve EU and Asian-origin customers,
              but EU freight is a smaller share of revenue. EU expansion is a growth lever — CSRD
              compliance requirements specifically create demand for Flexport's carbon module in
              EU-regulated companies.

              Enterprise expansion: enterprise accounts in manufacturing and retail verticals expand
              by adding Flexport Capital (trade financing) and FMP software to their freight
              forwarding relationship — increasing revenue per account without adding new customers.
              Enterprise account management is the primary driver of account expansion.

              Partner / API expansion: 3PLs and fulfillment platforms using the Flexport Logistics
              API represent a B2B customer segment that generates freight volume through partner
              platforms rather than direct Flexport sales — expanding reach without proportional
              S&M costs.
            claimRefs: []
      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Shopify partnership is the strongest customer traction signal — and the highest single concentration risk
            body: >-
              The Shopify preferred partner designation is both Flexport's most credible named customer proof and its
              largest concentration risk. The distribution of 1.75M merchants is transformative for SME customer
              acquisition, but the entire SME channel is contingent on a single relationship. Any change in Shopify's
              logistics strategy could eliminate the primary growth engine for the SME segment.
            calloutType: insight
            claimRefs:
              - CU007
              - CU012
          - type: callout
            title: Flexport's enterprise customer proof is limited — named customer disclosure is well below peer standard
            body: >-
              For a company with $2.1B in annual revenue, Flexport's lack of publicly named enterprise customers is
              notably below peer standard. Competitors like project44 actively publish customer case studies and names;
              Flexport's reticence may reflect competitive sensitivity, NDAs, or customer preference — but creates a due
              diligence gap for investors assessing customer quality and concentration.
            calloutType: insight
