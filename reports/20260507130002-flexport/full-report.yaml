          value: Medium / Structural disadvantage
          note: Flexport cannot control carrier rates; volume discount gap vs. incumbents is a permanent rate risk
        - label: Clean Cargo data (CSRD quality)
          value: Medium / Low probability
          note: Working group membership; not proprietary; 50+ carrier data access; direct carrier fallbacks available
    approximationNotes: null
    claimRefs:
      - CR007
      - CR008
      - CR016
  - id: FV001
    title: Recommendation logic
    type: flow
    layout: standard
    summary: |
      Decision tree showing the logic behind the TRACK recommendation for Flexport
      at $3.8B valuation — what would need to change to upgrade to BUY.
    data:
      nodes:
        - id: n1
          label: 'Flexport current: ~$3.8B est.'
          detail: August 2025 insider equity round; 1.8x 2024E revenue
          type: input
        - id: n2
          label: Is it pre-profitability?
          detail: Yes — EBITDA target end-2025 to early-2026
          type: process
        - id: n3
          label: Freight cycle risk high?
          detail: Yes — 35% probability bear case; freight rates volatile
          type: process
        - id: n4
          label: Shopify channel durable?
          detail: Unknown — commercial terms not disclosed; Shopify precedent of closing SFN
          type: process
        - id: n5
          label: TRACK at $3.8B
          detail: Good business, stretched valuation; wait for profitability proof or better entry
          type: process
        - id: n6
          label: BUY at $2.5-3.0B
          detail: Better risk/reward if entry valuation declines; secondary market or down-round
          type: output
        - id: n7
          label: 'BUY at $3.8B+ if:'
          detail: EBITDA breakeven confirmed + freight market stable + Shopify conversion scaling
          type: output
      edges:
        - from: n1
          to: n2
          label: Check profitability
        - from: n2
          to: n3
          label: Yes → assess cycle risk
        - from: n3
          to: n4
          label: Yes → assess channel durability
        - from: n4
          to: n5
          label: Uncertain → TRACK
        - from: n5
          to: n6
          label: If valuation declines
        - from: n5
          to: n7
          label: If thesis validates
    approximationNotes: null
    claimRefs:
      - CV001
      - CV013
  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: |
      Flexport valuation sensitivity across revenue multiple scenarios and revenue levels.
    data:
      items:
        - label: 1.0x 2024E revenue ($2.1B)
          value: 2100
          note: Floor multiple — below comparable incumbent multiples; distressed-asset pricing
        - label: 1.4x revenue (target buy point)
          value: 2940
          note: Target entry valuation for better risk/reward; 1 turn below current; secondary market
        - label: 1.8x revenue (current est. $3.8B)
          value: 3780
          note: Current estimated valuation — STRETCHED; pre-profitability premium above incumbent multiples
        - label: 2.5x revenue (post-profitability target)
          value: 5250
          note: Justified if EBITDA 8%+ confirmed; consistent with profitable digital forwarder premium
        - label: 3.5x revenue (bull software-mix shift)
          value: 7350
          note: 'Bull case: FMP SaaS >15% of revenue; EBITDA 12%+; strategic acquisition premium'
        - label: Expeditors comparable (1.8x, profitable)
          value: 3780
          note: Same multiple as Expeditors but Expeditors is profitable — highlights stretched stance
    approximationNotes: Revenue multiples applied to ~$2.1B 2024E revenue estimate. Expeditors public market comparison.
    claimRefs:
      - CV007
      - CV014
  - id: FV003
    title: Valuation / return range
    type: range
    layout: standard
    summary: |
      Expected exit valuation range across bull/base/bear scenarios from a $3.8B entry point.
    data:
      items:
        - label: Bull case exit (2027)
          low: 7000
          base: 7500
          high: 8000
          note: 1.8-2.1x from $3.8B entry; strategic acquisition or IPO at peak conditions
        - label: Base case exit (2027-2028)
          low: 5000
          base: 5500
          high: 6000
          note: 1.3-1.6x from $3.8B entry; profitability achieved; IPO or strategic acquisition
        - label: Bear case exit (2026-2027)
          low: 2000
          base: 2500
          high: 3000
          note: 0.5-0.8x from $3.8B entry; down-round; delayed profitability; forced sale
        - label: Down-round entry opportunity
          low: 2000
          base: 2750
          high: 3000
          note: Better entry point range; 1.0-1.4x revenue; base case from this entry is 1.8-2.0x
    approximationNotes: Scenario ranges are qualitative estimates. All values in USD millions.
    claimRefs:
      - CV005
      - CV015
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: |
      Key metrics to monitor for the Flexport investment thesis.
    data:
      items:
        - label: Current valuation
          value: ~$3.8B (Aug 2025 est.)
          note: 1.8x 2024E revenue; down 52% from $8B 2022 peak
        - label: Revenue (2024E)
          value: ~$2.1B
          note: ~30% YoY growth from ~$1.6B 2023; freight market recovery tailwind
        - label: Revenue growth rate
          value: ~30% YoY (2024E)
          note: Target 20%+ sustained growth to justify premium to incumbents
        - label: EBITDA target
          value: Breakeven end-2025 to early-2026
          note: Not confirmed as of run date; critical milestone for investment thesis
        - label: Total capital raised
          value: ~$2.3B+
          note: $260M convertible (Jan 2024) + $250M equity (Aug 2025) + prior rounds
        - label: Runway estimate
          value: 18-24 months from Q4 2025
          note: Must achieve profitability before next raise or face dilutive down-round
        - label: Comparable multiple range
          value: 0.6-1.8x revenue
          note: KN 1.1x (profitable), DSV 1.6x (Schenker integration), Expeditors 1.8x (profitable)
        - label: Recommendation
          value: TRACK — not buy at $3.8B
          note: 'Better entry at $2.5-3.0B; trigger: EBITDA confirmation + freight market stability'
    approximationNotes: null
    claimRefs:
      - CV001
      - CV016
