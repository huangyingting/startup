            title: Valuation reset from $8B to $3.8B reflects leadership turbulence and profitability miss
            body: >-
              The 53% valuation decline from $8B (2022) to ~$3.8B (2024) reflects the consequences of rapid over-hiring
              under Dave Clark and failure to reach profitability. The leadership transition back to Ryan Petersen
              stabilized the business, but the valuation reset demonstrates that digital freight forwarding is more
              cyclical and capital-intensive than investors anticipated in 2021-2022.
