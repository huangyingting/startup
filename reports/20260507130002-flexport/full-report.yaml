companyProfile:
  summary: >-
    Flexport is a San Francisco-based digital freight forwarder founded in 2013 by CEO Ryan Petersen. The company
    provides end-to-end global freight logistics: ocean forwarding, air freight, customs brokerage, international and
    domestic trucking, the Flexport Management Platform (FMP) SaaS, and Flexport Capital trade financing. Flexport is
    licensed as a US Customs Broker (CBP) and NVOCC (FMC). In November 2023, Flexport became Shopify's preferred global
    logistics partner — the primary SME customer acquisition channel. Revenue is estimated at ~$2.1B (2024E), up ~30%
    YoY from $1.6B (2023). Total raised exceeds $2.3B including a January 2024 $260M convertible note and an August 2025
    $250M insider equity round at ~$3.8B estimated valuation. Key investors: a16z, Founders Fund, DST Global, SoftBank
    VF2, MSD Partners. Employees: ~2,500 (down from 3,700 peak after two layoff rounds in 2022-2023). CEO Ryan Petersen
    returned in September 2023 after a brief transition to Dave Clark; profitability target: end-2025 to early-2026.
  foundedDate: '2013-01-01'
  founders:
    - name: Ryan Petersen
      role: Founder and CEO (returned Sep 2023)
      background: >-
        Serial entrepreneur; founded ImportGenius before Flexport; deep freight industry expertise; Twitter thought
        leader in freight and supply chain
      claimRefs: []
  foundingLocation: San Francisco, CA, USA
  headquarters: San Francisco, CA, USA
  productSummary: >-
    Four product lines: (1) Global freight forwarding — ocean, air, trucking, customs brokerage (licensed CBP + NVOCC);
    (2) Flexport Management Platform (FMP) — enterprise SaaS for real-time shipment visibility, carbon Scope 3 CSRD
    reporting, HTS AI classification, and supply chain analytics; (3) Flexport Capital — trade financing (accounts
    receivable, purchase order financing) embedded in the freight booking workflow; (4) Flexport Logistics API —
    embedded freight forwarding for 3PLs and platform partners.
  customerFocus: >-
    Two segments: (1) Enterprise shippers — large importers and exporters (large Asian-origin importers, EU
    CSRD-compliance companies, US consumer goods companies); (2) SME ecommerce merchants via Shopify preferred partner
    channel (1.75M merchant addressable base). Geography: primarily trans-Pacific (US-China, US-Asia) and transatlantic
    (US-EU).
  businessModel: >-
    Freight forwarding revenue (transaction-based; correlated with freight rate levels and volume); customs brokerage
    revenue (per-entry fees; growing with tariff complexity); FMP SaaS revenue (subscription/seat-based; high gross
    margin); Flexport Capital revenue (interest and fee income on trade financing). Total blended gross margin:
    estimated 10-15%; forwarding gross margin 3-5%; customs 12-18%; FMP SaaS 60%+.
  stage: growth
  fundingStatus: >-
    Latest: August 2025 equity round, $250M at ~$3.8B estimated valuation (insider-led by a16z). January 2024: $260M
    convertible note (terms not disclosed). Peak: Series E February 2022, $900M at $8B valuation (SoftBank VF2). Total
    raised: ~$2.3B+.
