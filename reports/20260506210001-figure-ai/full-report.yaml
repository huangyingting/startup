      - number: '2.2'
        title: Market Sizing — TAM, SAM, SOM
        blocks:
          - type: paragraph
            body: |
              Multiple analyst firms publish conflicting market size estimates reflecting different scope
              assumptions, adoption pace scenarios, and definitions of "humanoid robot." The consensus
              near-term (2024) market is approximately USD 1.5–2.7 billion globally; the 2030 projections
              range from USD 4 billion (conservative) to USD 48 billion (aggressive). These estimates include
              both hardware revenue and service/software components.

              Figure AI's immediate SAM is the subset of this market addressable with Figure 03 and the Helix
              AI model: automotive manufacturing, general logistics/warehousing, and electronics assembly—
              collectively estimated at USD 5–15 billion globally in 2025–2030 (derived from labor market
              spend analysis and robot deployment pilot ROI data). A bottom-up sizing using the 50 million
              "dangerous, dirty, or dull" manufacturing tasks globally at an implied robot value of $30–50K
              per position-year suggests a long-term SAM exceeding $1 trillion, but this is speculative and
              subject to radical adoption uncertainty.

              SOM for Figure AI over the next 3–5 years is highly constrained by production capacity (BotQ
              12,000/year) and sales cycle length. At $130K average robot price (or $12K/year under RaaS) and
              12,000 units/year capacity, Figure AI's maximum near-term revenue is ~$144M–$1.56B per year
              depending on model, assuming full utilization.
