  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition in Customer Workflow Terms
        blocks:
          - type: paragraph
            body: |
              Figure AI's product solves a specific enterprise problem: replacing human workers in physically
              demanding, repetitive, and ergonomically hazardous manufacturing tasks, without requiring
              facility retrofitting (because humanoid robots operate in environments already built for humans).

              In BMW's Spartanburg deployment, Figure robots perform sheet-metal loading and part-handling
              tasks: picking specific body-panel parts from bins, orienting them correctly, and loading them
              into production jigs at the correct position and force. These tasks were previously performed
              by humans who experienced repetitive strain injuries and fatigue. The robot workflow is:
              (1) Visual perception of part in bin; (2) Grasp planning using Helix; (3) Dexterous manipulation
              with 20 DOF hands; (4) Placement verification; (5) Signal to human co-worker or next step.

              The customer value proposition is: (a) Labor substitution — the robot is available 24/7, does
              not fatigue, does not call in sick; (b) Quality improvement — >99% task accuracy eliminates
              human error in repetitive tasks; (c) Ergonomic compliance — removes humans from injury-prone
              positions; (d) ROI — at $12K/year RaaS, payback vs. $40K+ human labor cost is compelling for
              high-volume tasks.

              The primary limitation: Figure 03 is not yet a general-purpose robot. Tasks must be narrow,
              repetitive, and well-structured. Open-ended, novel, or multi-step unstructured tasks remain
              beyond the system's current commercial deployment capability.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
