      - number: '2.3'
        title: Buyer and Segment Analysis
        blocks:
          - type: paragraph
            body: |
              Figure AI's primary buyers are large industrial enterprises with chronic labor shortage problems,
              high repetitive task burdens, and capital budgets to absorb automation costs. Key buyer segments:

              1. Automotive OEMs and Tier-1 suppliers (BMW is the first; analogues include Mercedes-Benz,
                 Toyota, Volkswagen, Hyundai): High repetitive task density, ergonomic injury pressure, proven
                 willingness to pay for automation, and regulatory scrutiny on worker safety. Budget ownership
                 sits with VP Manufacturing Operations or Plant Directors. Procurement cycle: 12–36 months.

              2. Warehouse/Logistics operators (Amazon, DHL, FedEx, Flexe): High labor turnover (100%+/year),
                 repetitive pick-and-place tasks, documented ROI tolerance for automation. Amazon's participation
                 via its Industrial Innovation Fund signals a potential future commercial customer relationship.

              3. Electronics assembly (Foxconn, Hon Hai, contract manufacturers): Fine-manipulation requirements
                 match Figure 03's 16–20 DOF hand design. Labor cost pressure from Southeast Asia competition.

              4. Longer-term segments (5–10 years): Household consumers (elder care, personal assistance),
                 healthcare facilities, retail/hospitality. Grand View Research estimates personal assistance
                 and caregiving at 31.6% of the 2024 humanoid robot market by application.

              Decision criteria across buyers include: total cost of ownership vs. human labor, reliability/
              uptime, safety certification, task adaptability, and vendor financial stability.
            claimRefs:
              - CM009
              - CM010
              - CM011
              - CM012
          - type: table
            tableRef: TM003
            claimRefs:
              - CM009
              - CM010
              - CM011
