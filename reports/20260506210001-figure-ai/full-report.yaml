      - number: '8.3'
        title: Bull, Base, and Bear Case Scenarios
        blocks:
          - type: paragraph
            body: |
              BULL CASE (~20% probability): Figure AI becomes the dominant enterprise humanoid robot
              platform by 2030. Assumptions: (1) BMW reference closes 5+ additional Fortune 500 automotive
              and logistics customers by 2027; (2) Helix VLA generalizes across industries; (3) BotQ scales
              to 50,000 units/yr by 2029; (4) Tesla Optimus fails to achieve cost targets on schedule;
              (5) Figure AI captures 5–10% of the $165B TAM = $8–16B revenue by 2033. At a 10–15x
              revenue multiple, this yields a $80–240B valuation. An IPO at 2028–2029 at $100B+ would
              return 2.5x on a $39B entry — modest for a bull case. For VC-stage investors (Series B
              entry at $2.6B), bull case returns are 30–50x.

              BASE CASE (~40% probability): Figure AI achieves steady enterprise growth, adds 3–5 new
              anchor customers by 2028, reaches $500M–$1B revenue by 2029. Assumptions: (1) BMW stays
              committed through Leipzig; (2) 2–3 additional automotive or logistics customers announced
              by 2027; (3) BotQ ramp to 20,000 units/yr; (4) No catastrophic safety incident; (5) Tesla
              Optimus delayed but eventually competitive. Valuation at exit (2028–2030 IPO): $15–30B
              at 20–30x revenue. This implies a loss of 25–60% from $39B entry. Return profile for
              Series C investors: negative to flat. For Series B investors: 6–12x. The base case does
              not justify Series C entry at $39B without preferred economics.

              BEAR CASE (~40% probability): BMW concentration persists; Tesla achieves cost parity
              before 2027; no new customers added. Assumptions: (1) BMW reduces fleet due to Tesla Optimus
              or cost pressure; (2) Figure AI revenue stalls at $200–400M; (3) Series D required as
              down-round at $8–12B. Return for Series C investors: -70% to -80%. This scenario is
              plausible given the binary customer risk.
