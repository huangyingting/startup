      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: |
              Key growth drivers include: (1) Global labor shortages in manufacturing and logistics: the US
              alone has ~500,000 unfilled manufacturing jobs as of 2025, with aging demographics in Japan,
              Germany, and China accelerating the structural shortfall. (2) Rising wages in key manufacturing
              regions, improving the ROI math for robot deployment. (3) Rapid improvement in robot AI
              capabilities (vision-language-action models, foundation models), reducing task-specific
              programming overhead. (4) Demonstrated commercial ROI: Figure AI's BMW deployment (400%
              efficiency gain in specific tasks, >99% accuracy) provides the first large-scale proof point.
              (5) Strategic investor ecosystem: Microsoft, NVIDIA, and OpenAI collectively reduce compute cost
              and AI model development burden.

              Key adoption constraints include: (1) High unit cost ($70K–$130K per robot vs. $30K–$50K for
              cobots) limits early adoption to well-capitalized enterprises. (2) Task generalization limits:
              current deployments are narrowly scoped to predictable pick-and-place, not open-ended autonomous
              work. (3) Safety certification gap: no established regulatory framework for humanoid robots in
              industrial settings (OSHA, ISO). (4) Long enterprise procurement cycles (12–36 months). (5)
              Cybersecurity risks from networked autonomous robots in critical production environments.
            claimRefs:
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
