      - number: '8.2'
        title: Valuation Context and Entry Discipline
        blocks:
          - type: paragraph
            body: |
              Series C details: Figure AI raised approximately $1B+ in September 2025 at a post-money
              valuation of $39B. This followed the Series B ($675M at $2.6B, February 2024) — a 15x
              valuation step-up in roughly 18 months, driven by the BMW deployment proving commercial
              viability and Helix VLA demonstrating AI-driven generalization. Total raised: approximately
              $1.9B across seed ($100M self-funded), Series A ($70M, May 2023), Series B ($675M, Feb 2024),
              and Series C ($1B+, Sep 2025).

              Valuation context: The $39B valuation makes Figure AI the most valuable humanoid robotics
              company globally, surpassing the implied valuations of Boston Dynamics (sold to Hyundai for
              $1.1B in 2021) and Agility Robotics ($400M+ raised). It is broadly comparable to Waymo's
              implied enterprise value ($45B based on $5.5B raised). The Series B to Series C 15x jump
              in 18 months is highly unusual and reflects narrative/optionality pricing rather than
              fundamental re-rating.

              Entry discipline: At a $39B entry for a late-stage growth investor, the required revenue
              trajectory to achieve even 1x returns at IPO (assuming 20x revenue exit multiple) is $2B+
              in revenue — requiring roughly 15x revenue growth from 2025 estimates. At a 30x multiple
              (high for hardware at IPO), break-even revenue requirement is $1.3B. Both scenarios require
              customer diversification from BMW to 10+ enterprise accounts before 2028. For an investor
              seeking 3x returns, $117B valuation at exit requires either $5B revenue at 23x or $4B at
              29x — very high bars. The asymmetric risk profile means this is a binary bet, not a
              traditional growth investment.

              Preferred structure recommendation: If investing, negotiate for meaningful downside protection
              (liquidation preference, pro-rata rights, information rights, anti-dilution), given the
              binary outcome distribution.
