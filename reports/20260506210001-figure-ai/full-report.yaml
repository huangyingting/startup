      - number: '1.5'
        title: Key Milestones and Recent Developments
        blocks:
          - type: paragraph
            body: |
              Figure AI has progressed from founding to major commercial deployment in under three years,
              representing one of the fastest ramps in humanoid robotics history. Major milestones include the
              2022 incorporation and self-funded seed, a 2023 Series A establishing institutional backing, the
              February 2024 Series B alongside the OpenAI collaboration and BMW commercial agreement, the
              September 2024 BMW production deployment of Figure 02 (official BMW announcement), and the
              November 2025 reporting of 11-month BMW results.

              In September 2025, Figure announced the Series C at $39B valuation and, concurrently, began
              transitioning its fleet from Figure 02 to Figure 03. Figure 03 incorporates lessons from the BMW
              deployment—particularly forearm/wrist electronics redesign—and features a wireless inductive battery
              charging system, 16 DOF hands with soft textile covering, and the next-generation Helix 2 model.

              Adverse incidents: Figure AI has been criticized for overpromising on autonomous capabilities
              timelines; multiple reviews note that BMW deployment tasks were narrowly scoped to predictable
              pick-and-place operations rather than true general-purpose autonomy. TechCrunch reported in April
              2025 that Figure was sending cease-and-desist letters to unauthorized secondary stock brokers,
              indicating sensitivity around share liquidity and valuation control.
