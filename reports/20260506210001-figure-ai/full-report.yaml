      - number: '5.3'
        title: Technology Architecture and Operating Model
        blocks:
          - type: paragraph
            body: |
              Figure AI's technology stack is vertically integrated by design, providing control over the
              entire stack from robot hardware to the AI model. Key architectural layers:

              1. Perception layer: 6 onboard cameras provide RGB-D visual input. The system must handle
              occlusion, lighting variation, and object deformation in real time. No public disclosure on
              LIDAR or tactile sensors beyond camera and force-torque data.

              2. Action/policy layer: Helix VLA model maps visual observations and task language to joint
              torque commands. The key claim is "zero-shot generalization" — the ability to perform novel
              variations of trained tasks without explicit reprogramming. This has been demonstrated in
              BMW production, but the scope of generalization is bounded by what the model was trained on.

              3. Infrastructure layer: Figure OS (robot operating system), a cloud-connected fleet management
              platform, OTA update delivery, and real-time safety monitoring. The cloud integration introduces
              cybersecurity risks in industrial settings.

              4. Manufacturing layer: BotQ is not just an assembly facility but also the platform for quality
              testing, AI model integration, and robot-level safety certification before deployment.

              Microsoft Azure is the primary cloud provider. NVIDIA hardware (Jetson or custom) is suspected
              for on-device inference, though not officially confirmed. OpenAI's collaboration likely relates
              to large language model integration for task understanding, though details are undisclosed.
            claimRefs:
              - CE009
