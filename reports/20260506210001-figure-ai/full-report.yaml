              - CM006
          - type: callout
            title: Automotive Manufacturing Validates Near-Term SAM
            body: >-
              The BMW deployment provides the first public ROI validation for the automotive manufacturing segment: >99%
              task accuracy, 400% efficiency gain on specific tasks, and BMW's subsequent expansion planning to Leipzig
              confirm real enterprise willingness to pay for humanoid robots in controlled industrial settings.
            calloutType: strength
            claimRefs:
              - CM009
              - CM015
              - CM016
          - type: callout
            title: Tesla Optimus Cost Target Threatens Pricing Power
            body: >-
              Tesla's stated $20K–$30K long-term unit cost target for Optimus — against Figure AI's $70K–$130K current
              range — would dramatically undercut Figure AI's pricing if achieved at scale. Figure AI must establish
              strong software/AI differentiation and customer stickiness before Optimus reaches mass production volumes.
            calloutType: risk
            claimRefs:
