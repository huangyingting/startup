        title: Technology Differentiation and IP
        blocks:
          - type: paragraph
            body: |
              Figure AI's key differentiators relative to competitors:

              1. Helix VLA model (BMW training data): The model's commercial performance (>99% accuracy,
              400% efficiency gain) is the most validated VLA deployment in industrial humanoid robotics.
              The BMW production data is proprietary — competitors cannot access it. This data flywheel
              strengthens Helix as more tasks are completed.

              2. 20 DOF hand design: Among the most dexterous commercial humanoid hands, enabling fine
              manipulation that simpler grippers (Agility Digit hooks) cannot perform. IP includes hand
              mechanism patents and actuation techniques.

              3. Wireless inductive charging: 5-hour battery with wireless charging eliminates charging
              downtime interruption — a practical operational advantage for 24/7 industrial deployment.

              4. Vertical integration: Control of hardware, AI model, and manufacturing gives Figure AI
              the ability to co-optimize across layers — reducing COGS over time and enabling performance
              improvements that benefit from system-level tuning.

              5. IP portfolio: Figure AI has filed patents on robot design, actuation mechanisms, and AI
              training methods, though the breadth and competitive strength of the portfolio have not been
              independently assessed. Brett Adcock has stated the team prioritizes speed of innovation
              over patent filings.

              Key IP risks: VLA model architectures are increasingly open-source (OpenVLA, pi0); hardware
              design can be reverse-engineered by well-funded Chinese competitors; regulatory IP (safety
