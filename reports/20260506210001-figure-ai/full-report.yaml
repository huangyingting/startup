      - number: '2.5'
        title: Competitive Dynamics and Market Structure
        blocks:
          - type: paragraph
            body: |
              The humanoid robotics market in 2025 is characterized by a small number of well-funded US/
              European startups competing with each other and with Big Tech-backed entrants (Tesla Optimus)
              and established players (Boston Dynamics/Hyundai). Market structure is currently fragmented
              with no clear leader by deployed units or revenue, but Figure AI holds the highest valuation
              ($39B) among pure-play humanoid robotics startups. Agility Robotics (Amazon-backed) leads in
              warehouse deployment units with its Digit robot.

              Figure AI's key differentiation is the combination of: (1) the most capital raised ($1.9B),
              (2) the most high-profile commercial pilot (BMW), (3) a proprietary full-stack AI model (Helix),
              and (4) the highest investor ecosystem breadth (Microsoft, OpenAI, NVIDIA, Amazon, BMW).
              However, Tesla's Optimus program represents the largest long-term competitive threat due to
              Tesla's manufacturing scale, AI capabilities (FSD stack), and potential price point
              (target $20K–$30K vs. Figure's $70K–$130K range).

              Chinese competitors (Unitree, Fourier Intelligence, UBTECH) present a long-term cost competition
              risk as they pursue high-volume manufacturing and government subsidization.
            claimRefs:
              - CM018
              - CM019
              - CM020
              - CM021
