            title: Regulatory Vacuum Adds Deployment Friction
            body: >-
              No established regulatory framework (OSHA, ISO, EU AI Act) specifically governs humanoid robot deployment
              in industrial settings. This creates legal ambiguity around liability for accidents, extending enterprise
              procurement cycles and capping initial deployment scale.
            calloutType: risk
