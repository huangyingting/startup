  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              The humanoid robotics market in 2025 comprises three competitive tiers. First, US pure-play
              humanoid robotics startups: Figure AI, Agility Robotics, Apptronik, 1X Technologies,
              Sanctuary AI, Skild AI (AI model layer), and Boston Dynamics (partially). Second, consumer
              electronics and tech giants leveraging existing AI platforms: Tesla Optimus, Apple (rumored),
              and Amazon (through Agility stake). Third, Chinese humanoid competitors: Unitree, Fourier
              Intelligence, UBTECH, and Zhiyuan/HINGE. Each tier has different cost structures, timelines,
              and strategic objectives.

              Figure AI's primary competition is in the enterprise/industrial deployment segment. As of early
              2026, no other pure-play humanoid robotics company has achieved comparable commercial deployment
              scale. However, Agility Robotics has more deployed Digit units in Amazon's warehouse network.
              The competitive dynamic is expected to shift rapidly as Tesla Optimus moves toward production
              and Chinese competitors lower the cost floor.
            claimRefs:
              - CP001
              - CP002
              - CP003
      - number: '3.2'
        title: Key Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              Agility Robotics (Digit): Founded 2015, Eugene OR (now backed by Amazon); Digit is a biped
              robot targeting warehouse picking and logistics. Amazon's Industrial Innovation Fund participation
              provides both capital and a primary customer relationship. As of 2025, Digit has been deployed
              in Amazon distribution centers. Digit's form factor prioritizes lower-body mobility over full
              dexterity; hands are simpler hooks vs. Figure's articulated multi-DOF design. Revenue: private;
              raised >$150M. A key concern: Amazon may vertically integrate Agility rather than commercialize
              broadly, narrowing Agility's TAM.

              Tesla Optimus: Tesla's humanoid robot program, revealed 2021. As of 2025, Optimus Gen 2 demos
              show improved dexterity but remain largely teleoperated with limited in-field autonomous
              deployment. Tesla's cost target is $20K–$30K per unit — structurally below Figure's price range.
              Tesla's FSD neural network training data pipeline is a unique AI asset. Tesla's path to mass
              production is potentially fastest due to Gigafactory infrastructure. IPO'd, public company,
