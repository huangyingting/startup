        title: Product Module and Component Map
        blocks:
          - type: paragraph
            body: |
              Figure AI's product system consists of three integrated modules:

              1. Figure 03 Hardware: The physical robot body — 168cm tall, 60kg, 20 DOF hands (described as
              having near-human dexterity), 6 onboard cameras (stereoscopic and monocular), a 5-hour battery
              with wireless inductive charging. Custom-designed actuators (rotary and linear) are manufactured
              in-house or by dedicated suppliers. Key proprietary components: the hand assembly (16–20 DOF),
              the force-torque sensor array, and the robot operating system (Figure OS).

              2. Helix AI Model: A vision-language-action model that maps camera inputs and natural language
              task descriptions to robot joint actions. The model is trained using reinforcement learning from
              demonstrations (human teleoperation data from BMW and internal labs) plus physics simulation.
              Helix runs inference on-device using a dedicated AI chip (details undisclosed). Model updates
              are delivered over-the-air (OTA). As of Figure 03 launch, Helix represents a significant
              advancement over Figure 02's model, with higher task generalization.

              3. BotQ Manufacturing Platform: Figure AI's purpose-built factory targeting 12,000 robots/year
              initially (aspirational 100,000/year). BotQ integrates robot assembly, quality control, AI
              model deployment, and fleet management infrastructure. The factory location and construction
              status beyond the announced plans are not fully public as of May 2026.
            claimRefs:
