          - type: callout
            title: Bull Case Requires Customer Diversification by 2027
            body: >-
              The bull case (3x+ return from $39B entry) requires 3+ non-BMW enterprise customers signed by 2027 and $1B
              revenue run rate by 2029. If BMW remains the only customer through 2027, the base case implies negative
              returns for Series C investors without protective provisions.
            calloutType: insight
