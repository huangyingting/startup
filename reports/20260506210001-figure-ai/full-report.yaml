        title: Deployment, Integration, and Reliability
        blocks:
          - type: paragraph
            body: |
              Figure AI's deployment model requires a multi-month integration period before a customer can
              reach commercial scale. The BMW Spartanburg deployment involved: (1) 11-month pilot period,
              (2) Task-specific training data collection via human teleoperation, (3) Helix model fine-tuning
              for BMW-specific tasks, (4) Safety protocol development and worker co-existence testing, (5)
              Gradual fleet scale-up from pilot units to 90,000+ parts handled.

              Reliability metrics from BMW: >99% task accuracy is the headline; availability and mean-time-
              between-failure (MTBF) have not been publicly disclosed. The 5-hour battery requires periodic
              recharging (wireless) during shift breaks, or shift-based hot-swap infrastructure. Long-term
              actuator wear rates at industrial operating tempo are not yet established.

              Figure 03 roadmap: (1) Integration into BMW Leipzig plant (planned summer 2026); (2)
              Expansion to additional manufacturing verticals (warehouse, electronics); (3) Consumer/household
              Figure deployment (undisclosed timeline); (4) Helix model expansion to longer task horizons
              and multi-robot coordination.

              Integration requirements are significant: customer must provide structured physical workspace,
              establish OTA connectivity, define task parameters, and develop safety protocols. The absence
              of standardized humanoid robot safety certification (OSHA, ISO) means customers must develop
              site-specific risk assessments.
