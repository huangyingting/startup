            title: Wide TAM Forecast Dispersion Signals Regime Uncertainty
            body: >-
              The 12x spread between conservative ($4B) and aggressive ($48B) 2030 humanoid robot market projections
              reflects genuine regime uncertainty — whether costs fall fast enough to unlock consumer adoption by 2030.
              Figure AI's $39B valuation implicitly assumes the aggressive scenario.
            calloutType: insight
            claimRefs:
