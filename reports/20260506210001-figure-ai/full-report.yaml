      - number: '5.6'
        title: Trust, Safety, and Compliance
        blocks:
          - type: paragraph
            body: |
              Humanoid robots operating alongside humans in industrial settings create significant safety
              and compliance challenges. Key considerations for Figure AI:

              1. Physical safety: A 60kg robot moving at high speed can cause serious injury. Safety
              systems include: velocity and force limits near humans, emergency stop protocols, geofencing
              (robots confined to defined work envelopes), and human proximity detection. BMW's deployment
              includes co-existence protocols where humans and robots share zones with physical barriers
              and speed limitations.

              2. Regulatory compliance: No established OSHA or ISO standard specifically governs humanoid
              robot deployment in industrial settings as of 2026. Figure AI operates in a regulatory gap
              where customers must develop site-specific risk assessments. EU AI Act Article 6/7 may
              classify general-purpose humanoid robots as high-risk AI systems requiring conformity
              assessment before deployment in EU facilities.

              3. Data privacy: Figure AI's 6-camera array captures detailed video of production facilities
              and workers. Cloud-connected operation raises concerns about customer IP exposure (competitors
              could theoretically observe production methods through robot data).

              4. Cybersecurity: Networked industrial robots are potential targets for ransomware or sabotage.
              Cloud connectivity introduces attack surfaces. No public disclosure of Figure AI's security
              architecture or penetration testing results.

              5. AI bias and error: VLA models can produce unexpected outputs ("hallucinations") in novel
              situations. An out-of-distribution task could cause the robot to damage parts, injure a worker,
              or cause a production stoppage. Helix's robustness under distribution shift is not fully
              characterized in public.
            claimRefs:
              - CE021
              - CE022
              - CE023
              - CE024
