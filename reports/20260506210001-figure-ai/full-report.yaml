  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: |
              The humanoid robotics market encompasses the design, manufacture, and deployment of bipedal,
              human-form robots capable of performing physical tasks in environments designed for humans.
              Figure AI operates within this market with a specific focus on "physical AI"—robots that combine
              advanced perception, large language models, and dexterous manipulation to perform open-ended tasks
              without task-specific reprogramming.

              The market is distinct from traditional industrial robotics (fixed-arm, SCARA, delta robots) in
              that humanoid robots can operate in unstructured environments alongside humans without facility
              retrofitting. Adjacent markets include: (1) collaborative robots ("cobots"), (2) autonomous mobile
              robots (AMRs), (3) industrial exoskeletons, and (4) AI-embedded industrial automation software.
              These adjacencies represent competitive and complementary spend pools.

              Figure AI's primary spend pool is capital equipment and automation services budgets at large
              manufacturers, logistics operators, and eventually retail/hospitality operators. The secondary
              (longer-term) spend pool is household consumer electronics and elder-care services. The analysis
              below focuses on the commercial industrial market as the near-term addressable opportunity.
            claimRefs:
              - CM001
              - CM002
              - CM003
          - type: table
            tableRef: TM001
            claimRefs:
