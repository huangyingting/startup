      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Recommendation: CAUTIOUS WATCH'
            body: >-
              At $39B, Figure AI prices near-perfection: 250–650x revenue, single customer, no audited financials, and
              binary outcome distribution. Investable only for specialists with preferred economics (1x+ liquidation
              preference), 5–8 year horizons, and deep robotics sector expertise. Not suitable for generalist growth
              investors.
            calloutType: insight
            claimRefs:
