summary:
  headline: |
    Figure AI has done what no humanoid robotics company has achieved before: a proven,
    multi-month deployment at automotive production scale, with BMW manufacturing metrics
    that are independently corroborated. The $39B valuation prices in a future that
    requires displacing Tesla Optimus, Agility/Amazon, and every industrial automation
    incumbent — at 250–650x estimated revenue. The deployment proof is extraordinary;
    the valuation is extraordinary risk. Specialists with 7–10 year horizons and
    deep robotics domain expertise may find a speculative entry defensible; generalist
    growth investors should avoid at this multiple.
