  topStrengths:
    - >-
      Proven commercial deployment at BMW Spartanburg: 90,000+ parts assembled on 30,000+ vehicles across 11+ months
      with >99% task accuracy — the only verified humanoid-at-manufacturing-scale milestone in the industry
    - >-
      Helix VLA proprietary model trained on 11+ months of BMW real-world data — a continuously compounding dataset moat
      that rivals without automotive partnerships cannot replicate
    - >-
      Strategic investor ecosystem (Microsoft, OpenAI, NVIDIA, Amazon IIF, Bezos, Qualcomm, T-Mobile) creates platform
      stickiness and distribution pathways beyond standalone robot sales
    - >-
      BotQ in-house manufacturing gives margin structure control unavailable to fabless robotics companies; 12,000
      unit/year initial capacity signals industrial seriousness
    - >-
      ~$1.9B total capital raised provides multi-year runway for technology development and customer acquisition without
      immediate dilution pressure
    - >-
      BMW Leipzig expansion (planned summer 2026) would validate multi-site replicability — the most critical next
      milestone for de-risking customer concentration
  topRisks:
    - >-
      Customer concentration: BMW is the only confirmed customer (estimated 85–95% of revenue); any BMW contract
      reduction, delay, or cancellation is an existential risk to the near-term business
    - >-
      Tesla Optimus competitive threat: Tesla's vertical integration (in-house actuators, semiconductors, BEV
      manufacturing at scale) and projected sub-$20,000 unit cost could price Figure AI out of the mass market before it
      scales
    - >-
      Valuation extremity: $39B at 250–650x estimated 2025 revenue implies a market leadership position in a market that
      does not yet exist at that scale; multiple contraction to hardware comparables (2–5x revenue) would eliminate 95%+
      of entry value
    - >-
      No MTBF/reliability disclosure: No mean-time-between-failure data, maintenance intervals, or uptime SLA terms have
      been published; BMW deployment accuracy metrics are company-reported and unaudited
    - >-
      Binary regulatory risk: EU AI Act high-risk classification and OSHA/ANSI safety certification requirements could
      impose 2–3 year delays for every new deployment geography and customer
    - >-
      Founder hardware inexperience: Brett Adcock has no prior industrial hardware scaling experience; his two prior
      companies (Vettery, Archer) were software-heavy; hardware scaling at robotics margins is a distinct operational
      challenge
  unresolvedGaps:
    - >-
      BMW contract financials: The contract value, term length, per-unit pricing, and renewal probability are all
      undisclosed — the entire revenue thesis rests on one unaudited contract
    - >-
      Non-BMW pipeline: No letters of intent, advanced conversations, or named prospective customers outside BMW have
      been disclosed
    - 'Reliability data: No MTBF, uptime SLA, field failure rates, or maintenance cost data is publicly available'
    - 'Gross margin: No manufacturing cost per unit, bill of materials, or gross margin targets have been disclosed'
    - >-
      Series C governance terms: Liquidation preferences, anti-dilution provisions, board composition, and information
      rights from the September 2025 round are private
    - 'BotQ capacity ramp: Actual units shipped to BMW and current BotQ utilization rate are not publicly disclosed'
