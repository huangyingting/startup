      - number: '8.2'
        title: 估值背景与入场纪律
        blocks:
          - type: paragraph
            body: |
              Series C 细节：Figure AI 于 September 2025 融资约 $1B+，投后估值 $39B。此前是 Series B（$675M，$2.6B，
              February 2024）——约 18 个月估值跃升 15x，驱动因素是 BMW 部署证明商业可行性，以及 Helix VLA 展示 AI 驱动的泛化能力。
              累计融资：约 $1.9B，覆盖 Seed（$100M 自筹）、Series A（$70M，May 2023）、Series B（$675M，Feb 2024）和 Series C
              （$1B+，Sep 2025）。

              估值背景：$39B 估值让 Figure AI 成为全球最有价值的人形机器人公司，超过 Boston Dynamics 的隐含估值（2021 年以 $1.1B
              出售给 Hyundai）和 Agility Robotics（已融资 $400M+）。它与 Waymo 的隐含企业价值（基于 $5.5B 融资约 $45B）大体可比。
              Series B 到 Series C 在 18 个月内 15x 跳升极不寻常，更像叙事 / 期权价值定价，而不是基本面重估。

              入场纪律：对后期成长投资人而言，以 $39B 入场，要在 IPO 时实现哪怕 1x 回报（假设退出收入倍数 20x），需要 $2B+ 收入——
              即较 2025 估算收入增长约 15x。若按 30x 倍数（对硬件 IPO 偏高），盈亏平衡收入要求为 $1.3B。两个场景都要求 2028 年前
              客户从 BMW 多元化到 10+ 个企业账户。若投资人追求 3x 回报，退出估值需达 $117B，路径要么是 $5B 收入、23x 倍数，要么是
              $4B 收入、29x 倍数——门槛很高。非对称风险画像意味着这是一笔二元赌注，而不是传统成长投资。

              优先结构建议：如投资，应谈判获得有意义的下行保护（清算优先权、pro-rata 权利、信息权、反稀释），因为结果分布高度二元。
