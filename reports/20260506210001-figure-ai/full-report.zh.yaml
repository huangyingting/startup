      - number: '5.6'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: |
              人形机器人在工业场景中与人并肩作业，会带来显著的安全与合规挑战。Figure AI 需要重点处理：

              1. 物理安全：60kg 机器人高速移动可能造成严重伤害。安全系统包括：在人类附近限制速度和力量、急停协议、地理围栏
              （机器人限制在定义好的工作包络内），以及人体接近检测。BMW 部署包含人机共存协议：人在有物理隔离和速度限制的区域内与机器人共享空间。

              2. 监管合规：截至 2026 年，尚无成熟的 OSHA 或 ISO 标准专门规范工业场景中人形机器人的部署。Figure AI
              处在监管空白里，客户必须制定站点级风险评估。EU AI Act 第 6/7 条可能把通用人形机器人归为高风险 AI 系统，
              在 EU 工厂部署前需要完成合规评估。

              3. 数据隐私：Figure AI 的 6 摄像头阵列会捕捉生产设施和工人的详细视频。云连接运行引发客户 IP 暴露担忧
              （竞争对手理论上可能通过机器人数据观察生产方法）。

              4. 网络安全：联网工业机器人可能成为勒索软件或破坏行动的目标。云连接引入攻击面。Figure AI 尚未公开披露安全架构或渗透测试结果。

              5. AI 偏差与错误：VLA 模型在新情境下可能产生意外输出（“幻觉”）。分布外任务可能让机器人损坏零件、伤害工人，
              或造成生产停线。公开资料尚未充分刻画 Helix 在分布漂移下的稳健性。
            claimRefs:
              - CE021
              - CE022
              - CE023
              - CE024
          - type: table
            tableRef: TE004
