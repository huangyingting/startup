      - number: '5.4'
        title: 部署、集成与可靠性
        blocks:
          - type: paragraph
            body: |
              Figure AI 的部署模式要求客户先经历数月集成，才可能达到商业化规模。BMW Spartanburg 部署包括：（1）11 个月试点期，
              （2）通过人工遥操作采集任务专项训练数据，（3）针对 BMW 任务微调 Helix 模型，（4）制定安全协议并测试人机共存，（5）
              从试点机组逐步扩到已处理 90,000+ 个零件的车队规模。

              BMW 披露的可靠性指标里，>99% 任务准确率是核心指标；可用率和平均故障间隔（MTBF）尚未公开。5 小时电池要求机器人在
              班次休息时周期性无线充电，或配套按班次热插拔的基础设施。工业节奏下执行器的长期磨损率还没有跑出来。

              Figure 03 路线图：（1）接入 BMW Leipzig 工厂（计划于 summer 2026）；（2）扩展到更多制造业垂直场景
              （仓储、电子）；（3）面向消费者 / 家庭的 Figure 部署（时间表未披露）；（4）Helix 模型扩展到更长任务链和
              多机器人协同。

              集成门槛很高：客户必须提供结构化物理工作空间、建立 OTA 连接、定义任务参数，并制定安全协议。人形机器人尚无标准化
              安全认证（OSHA、ISO），意味着客户必须自行形成站点级风险评估。
            claimRefs:
              - CE013
              - CE014
              - CE015
              - CE016
          - type: table
            tableRef: TE005
            claimRefs:
              - CE014
              - CE015
              - CE016
      - number: '5.5'
        title: 技术差异化与 IP
        blocks:
          - type: paragraph
            body: |
              Figure AI 相对竞品的关键差异化点：

              1. Helix VLA 模型（BMW 训练数据）：该模型的商业表现（>99% 准确率、400% 效率提升）是工业人形机器人里
              验证最充分的 VLA 部署。BMW 生产数据是专有资产，竞争对手无法访问。完成的任务越多，数据飞轮越能强化 Helix。

              2. 20 DOF 手部设计：这是商业人形机器人中最灵巧的手部设计之一，能完成更简单夹爪（Agility Digit hooks）
              做不了的精细操作。IP 包括手部机构专利和驱动技术。

              3. 无线感应充电：5 小时电池配合无线充电，消除了充电中断停机，在 24/7 工业部署中是实用的运营优势。

              4. 垂直整合：Figure AI 控制硬件、AI 模型和制造，能够跨层协同优化，随时间压低 COGS，并通过系统级调校持续提升性能。

              5. IP 组合：Figure AI 已就机器人设计、驱动机构和 AI 训练方法提交专利，但组合的覆盖宽度和竞争强度尚未经过
              独立评估。Brett Adcock 称，团队优先追求创新速度，而不是专利申请数量。

              关键 IP 风险：VLA 模型架构正越来越开源（OpenVLA、pi0）；资金充足的中国竞争对手可以逆向硬件设计；
              用来保护先发者的监管型 IP（安全认证）尚不存在。
            claimRefs:
              - CE017
