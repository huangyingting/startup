      - number: '3.3'
        title: Figure AI 的竞争优势与护城河
        blocks:
          - type: paragraph
            body: |
              截至 early 2026，Figure AI 的竞争优势包括：

              1. BMW 部署证明：唯一在 Fortune 100 OEM 拥有已确认、产生收入、工业规模人形机器人部署的公司。
              11 个月、30,000+ 辆车、>99% 准确率。该部署提供了 AI 训练数据和商业验证，尚无竞争者复制。

              2. Helix VLA 模型：自研全栈视觉—语言—动作模型，用真实生产数据训练。VLA 模型需要大规模真实世界
              任务数据——Figure 的 BMW 部署就是一个活的训练数据生成器。竞争者必须从零搭建可比数据集。

              3. 投资者生态作为护城河：Microsoft（算力、Azure / AI 合作）、OpenAI（AI 模型协作）、NVIDIA（硬件 / 软件）
              和 Amazon（未来潜在客户）共同降低 Figure AI 的 AI 开发成本负担，并提供企业销售入口。

              4. 资本：$1.9B 融资额是所有专注人形机器人初创公司中最高的，支撑 BotQ 工厂建设和 700+ 人团队。

              5. 最深的战略合作关系：BMW、NVIDIA（制造自动化）和 Microsoft Azure 集成，形成可复利的商业关系。

              弱点：溢价定价（每台 $70K–$130K）相对 Tesla / 中国替代品限制可触达市场；任务泛化狭窄（仅限受控环境中的
              抓取—放置）；依赖关键人物 Brett Adcock；没有公开收入披露；BotQ 产能（12,000 台 / 年）限制近期规模。
