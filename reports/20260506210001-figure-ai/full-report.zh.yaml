      - number: '1.2'
        title: 创始团队与领导层
        blocks:
          - type: paragraph
            body: |
              Figure AI 由 Brett Adcock 创立，Adcock 担任创始人兼 CEO。他是连续创业者：
              此前共同创办 AI 招聘市场 Vettery，2018 年据称以约 $100M 被 Adecco Group 收购；
              还共同创办电动垂直起降（eVTOL）飞机公司 Archer Aviation，后者于 2021 年通过
              SPAC 上市（NYSE: ACHR）。Adcock 自掏 $100M 种子资金，于 2022 年启动 Figure AI。

              CTO 是 Jerry Pratt，机器人领域老将，曾任职于 Institute for Human and Machine
              Cognition（IHMC），参与双足机器人运动研究，并共同创办 Boardwalk Robotics。
              工程和产品团队包含 Boston Dynamics、Tesla、Google DeepMind 和 Apple 校友，
              体现出公司有意从顶级机器人和 AI 机构招人。

              更广泛的领导团队包括增长副总裁（Lee Randaccio）、业务运营副总裁
              （Logan Berkowitz），以及机器人系统与运营总监（Mathew
              DeDonato，前 Woven Planet Holdings）。截至 early 2026，Figure AI 的高管团队约有
              9 名核心负责人，覆盖工程、AI、商业运营、质量保证和制造。

              关键人物风险偏高：Brett Adcock 的愿景、创始人声誉和投资者关系，都是公司融资和商业
              合作的核心。除 Adcock 和投资者代表外，董事会构成尚未公开披露细节。
