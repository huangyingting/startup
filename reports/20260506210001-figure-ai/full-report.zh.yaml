      - number: '7.2'
        title: 监管、法律与安全风险
        blocks:
          - type: paragraph
            body: |
              Figure AI 处在早期监管环境中。美国联邦层面尚无综合标准专门覆盖人形机器人；OSHA 的 General Duty Clause
              （29 U.S.C. §654）是主要合规框架，并由 ISO 10218-1:2011（工业机器人）和 ISO/TS 15066（协作机器人）补充。
              IEEE Spectrum 在 February 2025 指出，“现行 OSHA 标准是为固定式工业机器人写的，不是为与人类共享工作空间的人形机器人写的。”
              一旦机器人造成严重工伤，将触发 OSHA 调查、最高 $156,259 / 次故意违规的潜在罚款（按 2025 通胀调整）、无限额民事产品责任、
              BMW 停产，以及可能冻结企业销售漏斗的声誉损害。截至 May 2026，公开数据库未发现与 Figure AI 机器人部署有关的 OSHA 传票
              或执法行动。EU AI Act（August 2024 生效，分阶段执行至 2027）把共享人类环境中的自主机器人列为 Annex III 高风险 AI 系统，
              要求在 EU 部署前完成合规评估并取得 CE 标志。BMW Leipzig（计划 summer 2026）面对这一合规要求——Figure AI 尚未披露
              合规评估时间表。GDPR 适用于 EU 工厂中捕捉工人信息的机器人视觉数据。知识产权风险仍是潜在项：Tesla 已提交 100+ 项人形机器人
              专利申请（2022–2025）；未发现将 Figure AI 列名的在审专利诉讼。
