  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: |
              Figure AI 当前客户基础实际上只有一个具名企业：BMW Manufacturing。BMW 是 Fortune 100 德国汽车 OEM，
              在美国、德国、英国、中国和其他市场有制造运营。Spartanburg, SC 工厂按产量计是 BMW 全球最大工厂，每天约生产
              1,500 辆 SUV（X3、X4、X5、X6、X7）。

              目标客户画像（用于扩张）：
              - 行业：汽车 OEM、Tier-1 汽车供应商、物流 / 仓储运营商、电子组装承包商
              - 地域：美国（优先）、德国（BMW 扩张）、日本、韩国（汽车），最终走向全球
              - 公司规模：大型企业（收入 >$1B），有资本自动化预算
              - 买方：制造运营 VP、工厂总监、自动化 / CAPEX 预算负责人
              - 用例：重复、高吞吐任务，且存在人体工学风险或劳动力短缺压力
              - 关键要求：结构化生产环境；具备建立安全协议的能力

              渠道：仅直销企业客户（尚无公开确认的渠道伙伴）。这与 12–36 个月销售周期和集成的技术复杂度相匹配。
