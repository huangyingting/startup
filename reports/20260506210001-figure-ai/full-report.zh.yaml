    Figure 03：168cm、60kg 的双足人形机器人。20 DOF 手部，支持多指抓取。
    6 摄像头立体 + RGB 感知系统。续航 5 小时，支持无线充电。Helix VLA 模型
    用于实时任务理解与执行。端侧推理（无需云端往返）。BotQ 工厂（San Jose）
