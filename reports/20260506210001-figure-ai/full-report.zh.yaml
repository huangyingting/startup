      - number: '2.3'
        title: 买方与客群分析
        blocks:
          - type: paragraph
            body: |
              Figure AI 的主要买方是大型工业企业：它们长期缺人，重复任务负担重，也有资本预算吸收自动化成本。
              关键买方群体包括：

              1. 汽车 OEM 和 Tier-1 供应商（BMW 是首个；类似对象包括 Mercedes-Benz、Toyota、
                 Volkswagen、Hyundai）：重复任务密度高，人体工学伤害压力大，已证明愿意为自动化付费，
                 且员工安全受到监管审视。预算所有权通常在制造运营副总裁或工厂总监。
                 采购周期：12–36 个月。

              2. 仓储 / 物流运营商（Amazon、DHL、FedEx、Flexe）：劳动力流失率高（100%+ / 年），重复
                 抓取—放置任务多，对自动化 ROI 容忍度有记录可查。Amazon 通过 Industrial Innovation Fund
                 参与投资，释放了未来潜在商业客户关系信号。

              3. 电子装配（Foxconn、Hon Hai、合同制造商）：精细操作需求匹配 Figure 03 的 16–20 DOF 手部设计。
                 东南亚竞争带来劳动力成本压力。

              4. 更长期客群（5–10 年）：家庭消费者（养老护理、个人协助）、医疗机构、零售 / 酒店。
                 Grand View Research 估计，个人协助和照护在 2024 年人形机器人市场按应用划分中占 31.6%。

              买方共同决策标准包括：总拥有成本相对于人力、可靠性 / 正常运行时间、安全认证、任务适应性，以及供应商财务稳定性。
