      - number: '6.4'
        title: 留存、续约与满意度
        blocks:
          - type: paragraph
            body: |
              截至 May 2026，Figure AI 与 BMW 的关系看起来仍然稳固：BMW 正扩展到 Leipzig，这是客户满意度和续约意愿的最强信号。
              Leipzig 扩张表明 BMW 已在内部验证 ROI 逻辑，并愿意继续向这段关系投入资本和运营资源。

              但任何 Figure AI 客户的正式留存指标——Net Revenue Retention（NRR）、Gross Revenue Retention（GRR）、
              合同期限、续约率和客户满意度分数——都没有公开数据。除了 BMW 的扩张决定，公司没有发布案例研究、客户证言或公开满意度评级。

              RaaS 模式（如果采用）会产生结构性留存：机器人一旦接入生产流程，切换成本很高（流程重设计、安全再认证、供应商更换）。
              但硬件销售模式的结构性锁定较弱——客户可以结束硬件租赁，回到人工劳动，或改换供应商。

              关键留存风险：（1）BMW 内部政治——董事会施压降低外部服务成本；（2）竞品替代（Tesla Optimus 进入未来 BMW 部署）；
              （3）Leipzig 扩张表现不及预期带来技术失望；（4）安全事故引发暂停。
