      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: |
              Figure AI 已通过四轮主要融资累计筹集约 $1.9B：

              - Seed（2022）：由 Brett Adcock 个人出资 $100M，Bold Capital Partners 等参与。
              - Series A（May 2023）：$70M（另有 $9M 延伸轮），由 Parkway Venture Capital
                领投，Intel Capital、Tamarack Global、FJ Labs 和 Aliya Capital 参与。
              - Series B（February 29, 2024）：以 $2.6B 投后估值融资 $675M。投资者包括
                Microsoft、OpenAI Startup Fund、NVIDIA、Jeff Bezos（通过 Bezos Expeditions）、
                Amazon Industrial Innovation Fund、Intel Capital、Align Ventures、ARK Invest、
                LG Innotek 和 Samsung Venture Investment。Figure 同时与 OpenAI 签署合作协议，
                为人形机器人开发下一代 AI 模型，并承诺把 Microsoft Azure 作为 AI 基础设施伙伴。
              - Series C（September 16, 2025）：融资超过 $1B，投后估值 $39B——18 个月内较
                Series B 上升 15x。该轮由 Parkway Venture Capital 领投，Brookfield Asset
                Management、NVIDIA、Intel Capital、Qualcomm Ventures、T-Mobile Ventures、
                Salesforce 和 Macquarie Capital 参与。Figure 表示，该资金将用于机群扩张、
                机器人训练基础设施和高级数据采集。

