      - number: '4.3'
        title: 定价与市场进入经济性
        blocks:
          - type: paragraph
            body: |
              Figure AI 的市场进入策略是直接面向大型制造商和物流运营商做企业销售。该模式平均合同价值高，但销售周期
              极长（12–36 个月），客户获取成本也高（资深企业销售团队、漫长试点期）。传统 SaaS CAC / 回本指标不能直接套用；
              更接近资本设备的类比，是试点成本 + 部署中由供应商吸收的集成负担。

              据报道，BMW 试点在商业部署前持续 11 个月——这意味着早期客户从销售到部署至少需要 12+ 个月周期。随着 Figure AI
              成熟，若有成熟标杆客户和认证集成协议，周期可能缩短。

              定价杠杆：企业买方有替代选项（Agility Digit、未来 Tesla Optimus、协作机器人自动化），这限制 Figure AI 定价权。
              RaaS 模式一旦采用，可创造可预测年金收入，但 Figure AI 需要把机器人作为资产持有。硬件销售把 CapEx 转给客户，
              但可能降低 LTV。

              客户集中风险：BMW 被认为贡献 Figure AI 2024–2025 年收入的约 90%+。对于一家估值 $39B 的公司，这构成严重单一客户集中风险。
            claimRefs:
              - CI009
              - CI010
              - CI011
              - CI012
      - number: '4.4'
        title: 公开牵引力指标
        blocks:
          - type: paragraph
            body: |
              尽管估值达到 $39B，Figure AI 对外披露的可验证财务指标极少。主要公开牵引力证据是运营数据，而非财务数据：
              - Figure 机器人在 11 个月部署中处理 30,000+ 辆 BMW 汽车
              - 处理 90,000+ 个零部件
              - 完成 1,250+ 小时任务
              - >99% 任务准确率
              - 特定任务相对此前基线效率提升 400%
              - 每支出 $1 带来 $1.41 回报（IIoT World 引用，覆盖早期采用者；来源不清）

              ARR、单台收入、GMV 或合同金额均未得到官方确认。收入估算（2024 年 $60M、2025 年 $158M）完全来自二级分析师来源
              （Sacra）。Figure AI 未提交公开财务文件，也未公开确认任何财务指标。

              公司以 $39B 估值完成 Series C，按 2025 年估算收入 $60M 计算，隐含约 650x 收入倍数；按 $158M 计算约 250x——
              属于 2025–2026 年期间记录到的最高非上市软件或硬件公司倍数之一。
