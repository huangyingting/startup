  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与反论点
        blocks:
          - type: paragraph
            body: |
              投资论点：Figure AI 是第一家在工业规模上实现可信商业部署的通用人形机器人公司，BMW 是概念验证。人形机器人市场仍在早期，
              但结构性空间巨大（按 Goldman Sachs 和 IDC 估算，2030–2034 年 TAM 为 $38–165B）。Figure AI 的 Helix VLA 代表真实的
              AI 护城河——一个基于真实工业部署数据训练的视觉-语言-动作模型，没有等量真实世界经验很难复制。BMW 的 Leipzig 扩张，
              Microsoft、NVIDIA 和 OpenAI 的战略背书，以及 700+ 名员工围绕 $100,000+ / 年 / 台的单位经济目标推进，若客户多元化成功，指向 2028 年
              $1B+ 收入的可信路径。在该收入水平，30–40x 倍数意味着 $30–40B 估值，接近入场价——因此在执行风险下，今天入场可说大致公平。
              超额上行（5–7x）需要在 $165B 市场中拿到 5–10% 份额；如果平台能泛化，这并非不可达。

              反论点：$39B 是当前估计收入的 250x–650x——这种倍数通常留给有网络效应、近零边际成本的软件公司，而不是资本强度高、单台 COGS
              高的硬件公司。Figure AI 只有一个确认客户（BMW），没有公布第二个客户，未披露 MTBF 或质量指标，并面对 Tesla Optimus 披露
              <$20,000 / 台目标带来的生存级竞争威胁。EU AI Act 和 OSHA 监管真空给 Leipzig 带来合规风险。Brett Adcock 离任会严重稀释
              投资人信心。在 BMW 集中度 90%+ 的情况下，Figure AI 是一笔建立在单一关系上的 $39B 赌注。
