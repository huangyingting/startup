      - number: '8.4'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: |
              公开机器人 / 自动化可比公司：ABB Ltd（$30B 市值，约 2.5x 收入）和 FANUC Corp（$17B 市值，约 3x 收入）是标准工业自动化可比公司。
              Rockwell Automation（$11B，约 3x 收入）和 Teradyne（$5B，约 4x 收入，含 Boston Dynamics 部分）位于较低端。按 2024 年收入
              年化规模（约 $60M），Figure AI 的 $39B 等于 650x 收入，而公开可比公司仅 2.5–4x。只有把 Figure AI 定价为 AI 软件公司
              （典型 20–40x ARR）、并相信其会成长为主导市场地位，这一差距才说得通。这要求投资人相信 Figure AI 的收入轨迹复制的是
              超大规模 AI 软件，而非传统机器人硬件。

              私有可比公司：Waymo 的隐含估值 $45B（基于 $5.5B 融资）是最接近的结构类比——AI 驱动的物理世界自主、单客户风险（主要为
              Waymo One）、平台授权潜力。Boston Dynamics 2021 年以 $1.1B 出售；若 3 年增长 10x，可比公司价值也只是 $11B——远低于
              Figure AI 的 $39B。Agility Robotics 已融资 $400M+，隐含估值更低；其 Amazon 合作关系与 Figure AI 的 BMW 关系在结构上相似。

              基于里程碑的方法：VC 里程碑模型显示：（1）BMW Leipzig 成功 → 隐含 $45B；（2）首个非 BMW 锚定客户 → $60B；
              （3）$500M ARR → 按 20x 成长倍数为 $80B；（4）IPO → 若硬件按 15–25x 收入定价，市场倍数收缩至 $25–40B。
              该里程碑模型意味着，在收入规模得到证明前，当前 $39B 仍有下行风险。

              并购溢价：潜在收购方包括 Microsoft（面向 Azure 云的 AI 机器人）、NVIDIA（计算平台 + 推理）、Toyota/BMW
              （垂直整合）或 Amazon（仓库自动化）。在 $39B 估值上支付战略溢价，需要极强协同。Microsoft 以 $39B+ 收购 Figure AI
              将成为史上最大 AI 收购；理论上可能，但需要非同寻常的信念。
