      - number: '8.3'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: |
              牛市情景（约 20% 概率）：Figure AI 到 2030 年成为主导型企业人形机器人平台。假设：（1）BMW 参考客户在 2027 年前带来
              5+ 个额外 Fortune 500 汽车和物流客户；（2）Helix VLA 跨行业泛化；（3）BotQ 到 2029 年扩至 50,000 台 / 年；
              （4）Tesla Optimus 未能按期实现成本目标；（5）Figure AI 拿到 $165B TAM 的 5–10% = 到 2033 年 $8–16B 收入。
              按 10–15x 收入倍数，估值为 $80–240B。2028–2029 年以 $100B+ IPO，相对 $39B 入场回报 2.5x——作为牛市情景并不高。
              对 VC 阶段投资人（Series B 以 $2.6B 入场）而言，牛市回报为 30–50x。

              基准情景（约 40% 概率）：Figure AI 实现稳健企业增长，到 2028 年新增 3–5 个锚定客户，2029 年收入达到 $500M–$1B。
              假设：（1）BMW 通过 Leipzig 持续承诺；（2）2027 年前宣布 2–3 个额外汽车或物流客户；（3）BotQ 爬坡至 20,000 台 / 年；
              （4）无灾难性安全事故；（5）Tesla Optimus 延迟但最终具备竞争力。退出估值（2028–2030 IPO）：按 20–30x 收入为
              $15–30B。这意味着较 $39B 入场亏损 25–60%。Series C 投资人的回报：负到持平。Series B 投资人：6–12x。
              没有优先经济条款时，基准情景不足以支撑以 $39B 进入 Series C。

              熊市情景（约 40% 概率）：BMW 集中度延续；Tesla 在 2027 年前达到成本平价；没有新增客户。假设：（1）BMW 因 Tesla Optimus
              或成本压力缩减车队；（2）Figure AI 收入停滞在 $200–400M；（3）需要 Series D，且以下行轮在 $8–12B 完成。Series C 投资人
              回报：-70% 至 -80%。考虑到二元客户风险，这一情景具有现实可能性。
