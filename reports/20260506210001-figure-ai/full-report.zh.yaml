companyProfile:
  summary: |
    Figure AI 是一家私营通用人形机器人公司，由连续创业者 Brett Adcock 于
    2022 年在加州 Sunnyvale 创立。公司的使命是打造通用双足机器人，能够
    承担目前由人类完成的各类灵巧体力劳动——先从工业制造切入，再扩展到
    物流、仓储，最终进入消费市场。Figure 的旗舰产品（Figure 02 和 Figure 03）
    是人形机器人，配备 20 自由度手部、6 摄像头感知系统，以及公司自研的
    Helix Vision-Language-Action（VLA）模型——该模型用 11+ 个月真实 BMW
    工厂数据训练。截至本报告生成日，唯一确认的商业客户是 BMW Manufacturing
    Spartanburg；Figure 机器人已在 30,000+ 辆汽车上装配 90,000+ 个零部件，
    任务准确率超过 99%。公司在 San Jose 运营自有 BotQ 机器人制造工厂，
    初始年产能 12,000 台，并提出 100,000 台 / 年的愿景目标。关键投资者包括
    Microsoft、OpenAI、NVIDIA、Amazon Industrial Innovation Fund、Jeff Bezos、
    Intel Capital、Parkway VC、Qualcomm、T-Mobile、Salesforce Ventures 和
    Brookfield Asset Management。
