      - number: '5.3'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: |
              Figure AI 的技术栈按垂直整合设计，让公司从机器人硬件到 AI 模型控制整个堆栈。关键架构层包括：

              1. 感知层：6 个机载摄像头提供 RGB-D 视觉输入。系统必须实时处理遮挡、光照变化和物体形变。除摄像头和力矩数据外，
              公司未公开披露 LIDAR 或触觉传感器。

              2. 动作 / 策略层：Helix VLA 模型把视觉观测和任务语言映射为关节扭矩指令。核心主张是「零样本泛化」——
              无需显式重新编程，就能执行已训练任务的新变体。BMW 生产中已经展示过这一点，但泛化范围受限于模型训练内容。

              3. 基础设施层：Figure OS（机器人操作系统）、云连接机群管理平台、OTA 更新交付和实时安全监控。云集成把网络安全风险带入工业场景。

              4. 制造层：BotQ 不只是装配设施，也是部署前进行质量测试、AI 模型集成和机器人级安全认证的平台。

              Microsoft Azure 是主要云提供商。NVIDIA 硬件（Jetson 或定制）疑似用于端侧推理，但官方未确认。OpenAI 合作可能与
              用于任务理解的大语言模型集成有关，但细节未披露。
            claimRefs:
              - CE009
              - CE010
              - CE011
              - CE012
          - type: table
