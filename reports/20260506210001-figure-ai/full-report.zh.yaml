      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: |
              Figure AI 累计融资约 $1.9B，包含：
              - Seed：$100M（Brett Adcock 自筹）
              - Series A：$70M（May 2023）
              - Series B：$675M，估值 $2.6B（February 2024）
              - Series C：约 $1B+，估值 $39B（September 2025）

              Series C 在交割时是人形机器人史上最大融资轮。投资者包括 Microsoft、NVIDIA、OpenAI、Amazon Industrial
              Innovation Fund、Bezos Expeditions、Intel Capital、Brookfield、Parkway VC、Qualcomm、T-Mobile 和 Salesforce。

              估算年度现金消耗：考虑到 700+ 员工和 AI / 机器人薪酬水平（$200K–$300K+ 平均总薪酬 = 仅人员成本就
              $140M–$210M），再加上研发、工厂资本开支和硬件 COGS，当前规模下总年度现金消耗率可能超过 $300–$500M。
              假设现金消耗率为 $300M+，且 Series C 带来 $1B+ 资金，下一轮融资前资金续航约为 3 年（2025–2028）。
              公司需要把收入推向 $500M+ 或 IPO，才能补上缺口。

              2026–2027 年 IPO 猜测活跃；若以 $39B+ 公开发行，可提供额外资本和流动性。尚无官方 IPO 时间表确认。
