    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: |
              Figure AI（法定名称：Figure AI Inc.）于 2022 年注册成立，总部位于加州 Sunnyvale，
              （部分来源称 San Jose），制造和研发也在同一园区。公司的使命是把通用人形机器人部署到
              商业运营中，缓解全球劳动力短缺，并自动化那些对人体工学有害或高度重复的任务。其核心
              产品线——Figure 01、Figure 02 和 Figure 03 人形机器人——把自研硬件与 Helix
              视觉—语言—动作 AI 模型结合起来，让机器人能够理解自然语言指令，通过机载摄像头
              感知环境，并执行需要灵巧操作的体力任务。

              Figure 的商业模式围绕机器人即服务（RaaS）展开：客户支付经常性费用，
              而不是一次性投入大额资本开支，把 Figure 机器人部署到自有设施中。该模式降低了采用门槛，
              为 Figure 带来可预测的经常性收入，也让公司能够向已部署机群持续推送 OTA 软件改进。
              主要目标垂直市场是汽车制造、仓储物流，以及在更长期路线图中的家庭应用。

              公司运营 BotQ，即自有专用机器人制造设施；初始目标年产能 12,000 台，并提出每年
              100,000 台机器人的愿景目标，以满足预期商业需求。
