  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入来源与模式
        blocks:
          - type: paragraph
            body: |
              Figure AI 当前主要收入来源是与 BMW Manufacturing 在 Spartanburg, South Carolina 工厂的商业协议。
              协议结构未公开披露，但行业分析师估计，Figure AI 要么收取硬件销售价格（每台 $70K–$130K），要么收取
              机器人即服务（RaaS）订阅费，估计每台机器人每年约 $12,000。如果 BMW 协议采用 RaaS 合同，
              例如部署 100–200 台机器人，则隐含年收入为 $1.2M–$2.4M——远低于 $60M 的公开收入估算，说明机群部署
              更大，或采用硬件 + 服务混合模式。

              Sacra 估计 Figure AI 2024 年收入约 $60M，2025 年增至 $158M，主要由 BMW 驱动。这意味着单台收入显著
              高于纯 RaaS 定价所暗示水平，可能来自硬件销售、上线费用、集成服务，或公开披露之外的更大机器人机群规模。

              计划中的收入来源：（1）RaaS 经常性订阅费，（2）硬件销售（一次性），（3）AI 模型授权（Helix），（4）软件 /
              OTA 更新服务，以及（5）未来维护和训练服务。截至 2025 年，收入来源 3–5 尚未确认产生重大收入。
