      - number: '6.2'
        title: 采用轨迹与增长
        blocks:
          - type: paragraph
            body: |
              Figure AI 的商业部署走的是有节制的单客户爬坡路径：
              - January 2024：宣布 BMW 商业协议
              - February–December 2024：11 个月试点与生产爬坡（30,000+ 辆车）
              - September 2025：发布 Figure 03；BMW 部署扩展纳入 Figure 03
              - Summer 2026（计划）：BMW Leipzig 扩张启动

              在 BMW Spartanburg，部署覆盖每天 1,500 辆车产线的一部分，只处理单一制造任务类型（钣金上料与零件搬运）。总车队规模
              未披露；根据 90,000+ 个零件、1,250+ 小时的处理量，隐含任务速率指向初始商业阶段部署了约 10–50 台机器人。

              公司尚未宣布其他商业客户部署。Amazon Industrial Innovation Fund 参与 Figure AI 的 Series B，代表潜在未来客户关系，
              但 Amazon 商业部署尚未确认。BMW 计划在 summer 2026 将 Figure 机器人部署扩展到德国 Leipzig 工厂——这是已宣布的
              首个国际部署。

              采用节奏反映了企业硬件部署的结构性现实：从销售到部署需要 12–36 个月、集成周期长，且扩张承诺前通常要先完成单站点验证。
