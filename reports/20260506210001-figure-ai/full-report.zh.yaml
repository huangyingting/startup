              如果 Amazon 在仓库部署 Figure 机器人，这将是最重要的去集中化事件。

              结构性挑战在于：12–36 个月销售周期叠加高集成负担，从签约到商业规模化新增一个制造客户需要 1–3 年。即使已有多个试点在推进
