  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 用客户工作流定义产品
        blocks:
          - type: paragraph
            body: |
              Figure AI 的产品解决一个具体企业问题：在体力强度高、重复、且对人体工学有害的制造任务中替代人类工人，
              同时不要求改造设施（因为人形机器人可在已为人类建造的环境中运行）。

              在 BMW 的 Spartanburg 部署中，Figure 机器人执行钣金上料和零部件处理任务：从料箱中拾取特定车身面板零件，
              正确定向，并以正确位置和力度装入生产夹具。这些任务此前由人类完成，工人会遭遇重复性劳损和疲劳。机器人工作流是：
              （1）视觉感知料箱中的零件；（2）使用 Helix 规划抓取；（3）用 20 DOF 手部进行灵巧操作；（4）放置验证；
              （5）向人类同事或下一步骤发出信号。

              客户价值主张是：（a）劳动力替代——机器人 24/7 可用，不会疲劳，不会请病假；（b）质量提升——>99% 任务准确率
              消除重复任务中的人为错误；（c）人体工学合规——把人从易受伤工位移走；（d）ROI——在 $12K / 年 RaaS 下，
              相比 $40K+ 人力成本，高频任务回本很有吸引力。

              主要限制：Figure 03 尚不是通用机器人。任务必须狭窄、重复且结构良好。开放式、新颖或多步骤非结构化任务，仍超出系统当前商业部署能力。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
