        title: 运营、技术与安全风险
        blocks:
          - type: paragraph
            body: |
              Figure AI 的首要技术风险是任务泛化：Helix VLA 模型已经在 BMW Spartanburg 的特定钣金上料任务上，经 11 个月试点得到证明。
              多样环境中的商业规模泛化仍未验证。BMW 部署没有公开披露机器人 MTBF、现场故障率或保修条款——这是重大尽调缺口。
              NIST 机器人制造路线图把质量管理列为扩张关键瓶颈；Figure AI 必须围绕 BotQ 12,000 台 / 年目标建立等同 ISO 9001 的
              质量体系。供应链风险：位于 Sunnyvale, CA 的 BotQ 是唯一制造基地。NVIDIA 计算模块、精密伺服执行器和光学传感器等关键部件
              来自受限的全球供应链。美中半导体出口管制影响算力可得性。网络安全风险具有系统性：按 CISA 口径，联网人形机器人构成 ICS 级攻击面。
              公司尚未披露 ISO 27001 认证或网络安全审计。人才留存面临 OpenAI、Google DeepMind、Tesla 和 Meta FAIR 对 AI / 机器人
