      - number: '7.6'
        title: 展项
        blocks:
          - type: callout
            title: 否决条件：机器人安全事故
            body: Figure AI 任何部署点若发生机器人造成的严重工伤，将触发 OSHA 调查、BMW 停产、声誉坍塌和企业客户冻结。尽管当前概率相对低， 这是后果最严重的风险。
            calloutType: insight
            claimRefs:
              - CR028
              - CR029
          - type: callout
            title: 否决条件：BMW 客户退出
            body: BMW 贡献了 Figure AI 估计收入的约 85–95%。BMW 退出或显著缩减车队，会在替代客户尚未规模化前击穿收入基础——这是双边生存依赖。
            calloutType: insight
            claimRefs:
              - CR017
              - CR018
              - CR019
          - type: callout
            title: 关注：Tesla Optimus 成本平价
            body: 如果 Tesla Optimus 在 2027 年前实现其披露的 <$20,000 成本目标，Figure AI 的高端企业定价模型将失效，可服务市场会被压缩到 物理能力足以支撑溢价的任务。
            calloutType: insight
