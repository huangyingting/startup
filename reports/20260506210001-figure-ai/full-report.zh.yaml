            title: 建议：谨慎观望
            body: >-
              $39B 估值下，Figure AI 已按近乎完美定价：250–650x 收入、单一客户、无审计财务，且结果分布二元。只有具备优先经济条款 （1x+ 清算优先权）、5–8
              年周期和深厚机器人行业经验的专业投资人适合参与。不适合通用成长投资人。
            calloutType: insight
