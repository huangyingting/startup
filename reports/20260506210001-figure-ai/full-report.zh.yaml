      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: |
              人形机器人的单位经济仍处于早期且高成本阶段。Figure 02 / 03 的硬件制造成本未公开披露，但行业分析师估计，
              按 Figure 03 的部件复杂度（20 DOF 手部、6 个摄像头、定制执行器、高级 AI 推理芯片），当前生产规模下每台
              制造成本为 $40,000–$80,000——在估算 $70K–$130K 价格下，毛利率很薄，甚至可能为负。

              成本结构拆分（估算）：
              - 研发：主导成本（70%+）；700+ 员工，包括机器人工程师、AI 研究员、机械设计师。AI / 机器人平均总薪酬为
                $200K–$300K+。
              - 制造 COGS：机器人硬件材料成本；NVIDIA 芯片、定制执行器、摄像头、传感器、电池系统。
              - BotQ 工厂资本开支：面向 12,000 台 / 年目标产能的建设和工装。
              - 行政管理与销售：企业销售、法务、财务。销售周期为 12–36 个月。

              通向正向单位经济的路径需要：（1）扩大制造规模以压低 COGS（规模化后目标每台低于 $30K），（2）把 Helix AI
              授权发展为高毛利收入层，以及（3）扩大机群规模，将固定研发成本摊到更多已部署机器人上。
