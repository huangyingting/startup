      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: |
              关键增长驱动包括：（1）制造和物流的全球劳动力短缺：到 2025 年，仅美国就约有 500,000 个制造岗位空缺，
              日本、德国和中国的人口老龄化又在加速结构性缺口。（2）关键制造地区工资上涨，改善机器人部署的
              ROI 算账。（3）机器人 AI 能力快速提升（视觉—语言—动作模型、基础模型），降低按任务编程的
              开销。（4）商业 ROI 已被展示：Figure AI 的 BMW 部署（特定任务效率提升 400%、>99% 准确率）提供了首个
              大规模证明点。（5）战略投资者生态：Microsoft、NVIDIA 和 OpenAI 合力降低算力成本和 AI 模型开发负担。

              关键采用约束包括：（1）单台成本高（每台 $70K–$130K，相比协作机器人的 $30K–$50K），早期采用局限在资本充足企业。
              （2）任务泛化受限：当前部署狭窄地聚焦于可预测抓取—放置，而不是开放式自主工作。（3）安全认证缺口：
              工业场景中尚无针对人形机器人的成熟监管框架（OSHA、ISO）。（4）企业采购周期长（12–36 个月）。（5）关键生产
              环境中的联网自主机器人带来网络安全风险。
