          - type: callout
            title: 牛市情景要求 2027 年前完成客户多元化
            body: >-
              牛市情景（从 $39B 入场获得 3x+ 回报）要求到 2027 年签下 3+ 个非 BMW 企业客户，并在 2029 年达到 $1B 收入年化规模。 如果到 2027 年 BMW
              仍是唯一客户，基准情景意味着没有保护性条款的 Series C 投资人会获得负回报。
            calloutType: insight
