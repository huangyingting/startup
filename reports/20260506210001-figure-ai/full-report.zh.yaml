      - number: '3.4'
        title: 竞争定价与商业模式对比
        blocks:
          - type: paragraph
            body: |
              人形机器人价格在竞争者之间差异很大：
              - Figure AI：估计一次性 $70K–$130K，或 RaaS 模式下 $12K / 年（未确认）
              - Tesla Optimus：长期目标 $20K–$30K（尚未商业化）
              - Boston Dynamics Atlas：尚未商业化；Spot 商业产品 $75K
              - Agility Robotics Digit：未公开定价；早期企业价据信息显示约 $150K–$250K
              - Unitree G1：标价 $16,000–$99,000（最便宜，能力有限）
              - 1X Neo：目标 $20,000（消费者）

              商业模式也分化：Figure AI 追求 RaaS（经常性收入、服务、OTA 更新）；Tesla 可能销售硬件并叠加软件订阅；
              中国竞争者强调硬件利润率；Agility 与 Amazon 的物流模式高度绑定。

              Figure AI 的 RaaS 模式如果规模化，相较一次性硬件销售，可产生更可预测的经常性收入和更高单台机器人 LTV。
              但该模式需要大量资本为机器人租赁资产池融资。RaaS 还意味着 Figure AI 保留维护 / 升级风险，而纯硬件卖家会把这些风险转移给买方。
