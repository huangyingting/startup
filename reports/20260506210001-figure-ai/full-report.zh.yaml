  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重程度排序
        blocks:
          - type: paragraph
            body: |
              Figure AI 的风险画像由三项结构性现实决定：它在安全关键的制造环境中部署物理 AI 系统；它尚未多元化，约 85–95% 收入
              集中在一个客户（BMW）；它背负 $39B 估值，隐含未来收入交付，但市场尚未验证。本章按剩余暴露（当前缓释后的可能性 × 影响）
              排列重大风险，评估缓释成熟度，识别打破投资论点的触发条件，并提出投资人尽调问题。风险分为四类：监管 / 法律、运营 / 技术、
              伙伴 / 依赖，以及人员 / 执行。剩余暴露最高的风险是：（1）BMW 客户退出 / 缩减（影响 5、可能性 2 = 剩余 10），
              （2）工作场所安全事故（影响 5、可能性 2 = 剩余 10），（3）Tesla Optimus 达到成本平价（影响 4、可能性 3 = 剩余 12）。
              中国成本竞争是概率最高的风险（可能性 5），但考虑到当前企业级质量差异化，影响中等（3）。
