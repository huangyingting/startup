      - number: '5.7'
        title: 展项
        blocks:
          - type: callout
            title: Helix VLA 模型是生产环境中验证最充分的工业人形机器人 AI
            body: >-
              Helix VLA 模型叠加 BMW 生产训练数据，让 Figure AI 拥有工业场景中验证最充分的商业人形机器人 AI。11 个月、 30,000
              辆车的部署形成训练数据飞轮；没有类似大规模工业伙伴关系，竞争对手很难复制。
            calloutType: strength
            claimRefs:
              - CE017
              - CE002
              - CE003
          - type: callout
            title: 任务泛化仍是 Figure AI 的核心技术短板
            body: >-
              当前商业部署仍被限制在结构化环境里狭窄、重复的取放任务。真正的通用运行——在多样、非结构化任务之间顺畅切换——仍是 基础性 AI 开放问题。任务泛化未实质改善前，Figure AI
              的可服务市场只能覆盖那些足以形式化、可用于模型训练的任务。
            calloutType: risk
            claimRefs:
              - CE004
              - CE016
              - CE024
          - type: callout
            title: 安全监管真空放大部署风险
            body: >-
              OSHA、ISO 或 EU AI Act 尚无任何标准专门规范工业场景中的人形机器人部署，意味着每个客户都必须制定站点级风险协议。
              这会增加部署摩擦、拉长销售周期；若机器人在没有认证安全框架的情况下造成工伤，Figure AI 将暴露在法律风险之下。
