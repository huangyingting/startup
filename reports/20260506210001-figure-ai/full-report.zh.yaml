      - number: '7.5'
        title: 人员、执行、缓释与打破论点触发条件
        blocks:
          - type: paragraph
            body: |
              关键人风险：Brett Adcock 驱动文化、投资人关系和产品愿景；公司尚未宣布具名继任者或副 CEO。十三家战略投资人
              （Microsoft、OpenAI、NVIDIA、Amazon、Qualcomm、Intel、T-Mobile、Salesforce 等）利益可能分化，带来治理冲突风险。
              已有关键缓释：BMW 背书和履约记录提供监管与声誉锚点。已融资 $1.9B 提供近期资本缓冲。战略投资人生态提供技术和分销保护。
              BotQ 垂直整合降低最终组装的单一供应商依赖。建议补齐的缓释缺口：在 Leipzig 之前争取 OSHA Voluntary Protection Program
              状态、ISO 27001 认证和 EU AI Act 合规评估。2027 年前拿下 2+ 个锚定企业客户——这是最关键的执行里程碑。五个打破论点触发条件：
              （1）任何部署站点发生严重机器人安全事故；（2）BMW 终止或显著缩减机器人车队；（3）Tesla Optimus 在 2027 年前低于
              $30,000 / 台；（4）出现 Figure AI 无法满足的强制性新人形机器人安全法规；（5）Brett Adcock 离任且无具名继任者。
              尽调问题：（1）按客户审计收入，（2）机器人 MTBF 和现场故障数据，（3）OSHA 安全协议文件，（4）BotQ 质量良率，
