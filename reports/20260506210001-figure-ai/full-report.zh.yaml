      - number: '1.5'
        title: 关键里程碑与近期进展
        blocks:
          - type: paragraph
            body: |
              Figure AI 从创立到重大商业部署不到三年，是人形机器人历史上爬坡最快的公司之一。关键
              里程碑包括：2022 年注册成立和自筹种子轮；2023 年 Series A 奠定机构背书；February
              2024 Series B，同时达成 OpenAI 合作和 BMW 商业协议；September 2024 Figure 02
              在 BMW 投入生产（BMW 官方公告）；以及 November 2025 报告 11 个月 BMW 结果。

              September 2025，Figure 宣布以 $39B 估值完成 Series C，并同步开始把机群从 Figure 02
              过渡到 Figure 03。Figure 03 吸收了 BMW 部署经验——尤其是前臂 / 手腕电子系统重设计——
              并配备无线感应充电系统、16 DOF 软织物包覆手部，以及下一代 Helix 2 模型。

              负面事件：Figure AI 因对自主能力时间表承诺过高受到批评；多篇评测指出，BMW 部署任务
              只是狭窄、可预测的抓取—放置操作，并非真正通用自主。TechCrunch 在 April 2025
              报道，Figure 正向未经授权的二级股票经纪商发送停止侵权警告函，显示公司对
              股份流动性和估值控制高度敏感。
