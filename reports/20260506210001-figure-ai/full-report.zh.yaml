      - number: '5.2'
        title: 产品模块与组件图谱
        blocks:
          - type: paragraph
            body: |
              Figure AI 的产品系统由三个集成模块构成：

              1. Figure 03 硬件：实体机器人本体——身高 168cm、体重 60kg、20 DOF 手部（被描述为接近人类灵巧度）、
              6 个机载摄像头（立体和单目）、5 小时电池并支持无线感应充电。定制执行器（旋转和线性）由内部或专用供应商制造。
              关键自研组件包括：手部总成（16–20 DOF）、力矩传感器阵列和机器人操作系统（Figure OS）。

              2. Helix AI 模型：视觉—语言—动作模型，把摄像头输入和自然语言任务描述映射为机器人关节动作。
              模型使用从演示中强化学习的数据训练（来自 BMW 和内部实验室的人类遥操作数据），并叠加物理仿真。Helix 在端侧用
              专用 AI 芯片进行推理（细节未披露）。模型通过 OTA 交付更新。截至 Figure 03 发布，Helix 相比 Figure 02 的模型
              有显著进步，任务泛化更强。

              3. BotQ 制造平台：Figure AI 的专用工厂，初始目标年产 12,000 台（愿景目标 100,000 台 / 年）。
              BotQ 集成机器人装配、质量控制、AI 模型部署和机群管理基础设施。截至 May 2026，除已宣布计划外，工厂地点和建设状态
              尚未完全公开。
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
