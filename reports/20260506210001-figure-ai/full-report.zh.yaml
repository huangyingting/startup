      - number: '2.2'
        title: 市场规模——TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: |
              多家分析机构发布的人形机器人市场规模估算彼此冲突，背后是范围假设、采用速度情景和
              「人形机器人」定义不同。市场对近期（2024 年）全球规模的共识大约为 USD 1.5–2.7B；
              2030 年预测从 USD 4B（保守）到 USD 48B（激进）不等。这些估算同时包含硬件收入和服务 /
              软件组成。

              Figure AI 的即时 SAM，是 Figure 03 和 Helix AI 模型可服务的子集：汽车制造、一般物流 /
              仓储和电子装配——合计在 2025–2030 年全球约 USD 5–15B（基于劳动力市场支出分析和机器人
              部署试点 ROI 数据推导）。如果自下而上测算全球 50M 个「危险、肮脏或枯燥」制造任务，并假设
              每个岗位年机器人价值为 $30–50K，长期 SAM 可超过 $1T；但这一测算高度投机，受采用不确定性剧烈影响。

              Figure AI 未来 3–5 年的 SOM 受到产能（BotQ 12,000 台 / 年）和销售周期长度强约束。若平均机器人
              价格为 $130K（或 RaaS 下 $12K / 年），且年产能 12,000 台，在满负荷利用假设下，Figure AI 的
              近期最高收入约为每年 $144M–$1.56B，具体取决于模式。
