      - number: '8.5'
        title: 退出准备度、最终尽调问题与打破论点触发条件
        blocks:
          - type: paragraph
            body: |
              退出路径与时间线：IPO 是最可能的主要退出路径；如果收入多元化里程碑达成，当前目标为 2027–2028 年。Figure AI 必须证明：
              （1）经审计 GAAP 收入超过 $500M，且多客户可见性明确；（2）正毛利（硬件毛利目标 >20%）；（3）清晰的经营杠杆路径。
              没有这些里程碑，IPO 承销商会按硬件倍数（15–25x 收入）而不是 AI 平台倍数（30–50x）给 Figure AI 定价，显著压低退出估值。
              战略收购是次要路径——更可能发生在 IPO 市场关闭或收入多元化失败时。

              提交 IC 前的最终尽调问题：（1）按客户审计收入和合同结构；（2）BMW 部署的机器人 MTBF 数据和保修准备金；（3）非 BMW 已签 LOI
              或合同的管线；（4）EU AI Act 合规评估时间表；（5）Series C 后股权结构表、优先权堆栈和清算条款；（6）BotQ 质量良率和单台制造成本。

              打破论点触发条件（来自第 7 章）：机器人安全事故；BMW 退出；Tesla Optimus 单台成本 <$30K；Brett Adcock 离任。如果这些事件在收入多元化
              达成前发生（即获得 2+ 个非 BMW 锚定客户之前），投资论点不再成立，应在任何可用流动性下退出。

              最终建议：谨慎观望。没有优先经济条款和下行保护（1x+ 清算优先权、pro-rata 权利），不要以 $39B 投资。对深信人形机器人赛道、
              且有 5–8 年周期的专业基金而言，在 $39B 估值配强保护条款投资可以辩护——但前提是关键尽调问题能得到正面回答。没有保护性条款时，
              基准情景无法让 Series C 投资人收回本金。
