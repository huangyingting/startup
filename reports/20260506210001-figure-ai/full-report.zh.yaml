      - number: '2.5'
        title: 竞争动态与市场结构
        blocks:
          - type: paragraph
            body: |
              2025 年的人形机器人市场由少数资金充足的美国 / 欧洲初创公司构成，它们彼此竞争，也与科技巨头背书的
              新进入者（Tesla Optimus）和既有玩家（Boston Dynamics / Hyundai）竞争。当前市场结构分散，按已部署台数或
              收入都没有清晰领导者；但在专注人形机器人的初创公司中，Figure AI 估值最高（$39B）。Agility Robotics
              （Amazon 背书）凭 Digit 机器人，在仓储部署台数上领先。

              Figure AI 的关键差异化来自：（1）融资最多（$1.9B），（2）最受关注的商业试点（BMW），（3）自研全栈 AI 模型
              （Helix），以及（4）最宽的投资者生态（Microsoft、OpenAI、NVIDIA、Amazon、BMW）。不过，Tesla 的 Optimus
              项目构成最大的长期竞争威胁，因为 Tesla 具备制造规模、AI 能力（FSD 技术栈）和潜在价格点（目标 $20K–$30K，
              对比 Figure 的 $70K–$130K 区间）。

              中国竞争者（Unitree、Fourier Intelligence、UBTECH）追求大规模制造并获得政府补贴，长期可能带来成本竞争风险。
