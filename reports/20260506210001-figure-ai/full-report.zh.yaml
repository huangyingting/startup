  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              2025 年的人形机器人市场包含三层竞争者。第一层是美国纯人形机器人初创公司：Figure AI、
              Agility Robotics、Apptronik、1X Technologies、Sanctuary AI、Skild AI（AI 模型层）和
              Boston Dynamics（部分）。第二层是借助现有 AI 平台的消费电子和科技巨头：Tesla Optimus、
              Apple（传闻）以及 Amazon（通过持有 Agility 股权）。第三层是中国人形机器人竞争者：Unitree、
              Fourier Intelligence、UBTECH 和 Zhiyuan / HINGE。每一层都有不同的成本结构、时间表和战略目标。

              Figure AI 的主要竞争发生在企业 / 工业部署细分市场。截至 early 2026，其他专注人形机器人的公司尚未达到
              相当的商业部署规模。不过，Agility Robotics 在 Amazon 仓储网络中部署的 Digit 台数更多。随着 Tesla
              Optimus 走向生产、中国竞争者压低成本底线，竞争动态预计会快速变化。
            claimRefs:
              - CP001
              - CP002
              - CP003
      - number: '3.2'
        title: 关键竞争对手画像
        blocks:
          - type: paragraph
            body: |
              Agility Robotics（Digit）：2015 年创立于 Eugene OR（现由 Amazon 背书）；Digit 是面向仓储拣选和物流的
              双足机器人。Amazon 的 Industrial Innovation Fund 参与投资，既提供资本，也带来主要客户关系。截至 2025 年，
              Digit 已部署在 Amazon 配送中心。Digit 形态优先考虑下肢移动能力，而不是完整灵巧度；其手部是更简单的挂钩，
              相比 Figure 的多自由度关节手更弱。收入：私营未披露；融资 >$150M。一个关键担忧是：Amazon 可能垂直整合
              Agility，而不是广泛商业化，从而压窄 Agility 的 TAM。

              Tesla Optimus：Tesla 的人形机器人项目，2021 年披露。截至 2025 年，Optimus Gen 2 演示显示灵巧度改善，
              但仍主要依赖遥操作，真实场景自主部署有限。Tesla 的成本目标是每台 $20K–$30K——结构性低于 Figure 的价格区间。
              Tesla 的 FSD 神经网络训练数据管线是一项独特 AI 资产。凭借 Gigafactory 基础设施，Tesla 通向量产的路径可能最快。
              已 IPO 的上市公司，截至 2025 年市值 $900B+。

              Boston Dynamics（Electric Atlas）：1992 年创立于 Waltham MA；2021 年起归 Hyundai 所有。Atlas
              （2024 年推出电动版本）按敏捷性指标看是身体能力最强的机器人，但目标是研发和专业工业用途，而非大众市场部署。
              Boston Dynamics 的 SpotEnterprise 和 Stretch 是商业产品；Atlas 尚未商业化。

              Apptronik（Apollo）：Austin TX 初创公司，融资 $767M，2025 年估值 $5B。Apollo 面向制造、物流和零售。
              关键合作伙伴：NASA。相较 Figure AI，公开部署数据更少。

              1X Technologies：Norway 初创公司，融资 $137M。以 Neo 机器人瞄准家庭消费者市场，目标价格 $20K。
              其市场进入路径不同于 Figure AI 的工业 B2B 聚焦。

              中国竞争者（Unitree H1 / G1、Fourier GR-1、UBTECH Walker X）：Unitree 的 G1 标价为
              $16,000–$99,000，在硬件价格上大幅低于美国竞争者。受益于中国政府补贴。虽然受限于美国联邦政府用途，
              但全球商业市场准入开放。
