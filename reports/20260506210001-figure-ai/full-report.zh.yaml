  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: |
              人形机器人市场涵盖双足、类人形态机器人的设计、制造与部署；这类机器人能够在为人类设计的
              环境中执行体力任务。Figure AI 身处这一市场，重点押注「实体 AI」——机器人结合高级感知、
              大语言模型和灵巧操作能力，无需针对每项任务重新编程，也能执行开放式任务。

              该市场不同于传统工业机器人（固定臂、SCARA、delta 机器人）：人形机器人能在非结构化环境中
              与人类并行工作，不需要改造设施。相邻市场包括：（1）协作机器人（「cobots」），（2）自主移动
              机器人（AMRs），（3）工业外骨骼，以及（4）嵌入 AI 的工业自动化软件。这些相邻领域既是竞争性
              支出池，也是互补性支出池。

              Figure AI 的主要支出池来自大型制造商、物流运营商，以及最终零售 / 酒店运营商的资本设备和自动化
              服务预算。次级（更长期）支出池是家庭消费电子和养老护理服务。下文聚焦商业工业市场，因为它是近期可触达机会。
