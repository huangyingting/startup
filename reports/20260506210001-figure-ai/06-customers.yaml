chapter:
  number: 6
  title: Customers
  summary: |
    Figure AI has one confirmed commercial customer — BMW Manufacturing (Spartanburg, SC) — which
    accounts for an estimated 90%+ of its 2024–2025 revenue. The BMW deployment is genuinely
    impressive as a commercial proof point: 30,000+ vehicles, 90,000+ parts handled, >99% task
    accuracy, 400% efficiency gain on specific tasks, and $1.41 ROI per $1 spent (per IIoT World
    citing early adopter data). BMW Leipzig expansion is planned for summer 2026. However, the
    single-customer concentration represents the most critical diligence gap — at a $39B valuation,
    the entire revenue base depends on one relationship. No second commercial customer has been
    publicly confirmed. Amazon's Industrial Innovation Fund investment is a potential future customer
    signal. The customer journey for new buyers requires 12+ months of sales-to-deployment cycle,
    high integration burden, and novel safety protocol development — structural barriers that protect
    against rapid competition but also limit rapid scale.
sections:
  - id: s1
    title: Customer Base Segmentation
    body: |
      Figure AI's current customer base is effectively a single named enterprise: BMW Manufacturing.
      BMW is a Fortune 100 German automotive OEM with manufacturing operations in the US, Germany,
      UK, China, and other markets. The Spartanburg, SC plant is BMW's largest globally by volume,
      producing SUVs (X3, X4, X5, X6, X7) at approximately 1,500 vehicles per day.

      Target customer profile (for expansion):
      - Industry: Automotive OEM, Tier-1 automotive supplier, logistics/warehouse operators,
        electronics assembly contractors
      - Geography: US (priority), Germany (BMW expansion), Japan, South Korea (automotive),
        and eventually global
      - Company size: Large enterprise (>$1B revenue) with capital automation budgets
      - Buyer: VP Manufacturing Operations, Plant Directors, Automation/CAPEX budget owners
      - Use case: Repetitive, high-volume tasks with ergonomic hazard or labor shortage pressure
      - Key requirement: Structured production environment; established safety protocol capacity

      Channel: Direct enterprise sales only (no channel partners publicly confirmed). This is
      consistent with 12–36 month sales cycles and the technical complexity of integration.
    claimRefs:
      - C181
      - C182
      - C183
      - C184
  - id: s2
    title: Adoption Trajectory and Growth
    body: |
      Figure AI's commercial deployment has followed a measured single-customer ramp:
      - January 2024: BMW commercial agreement announced
      - February–December 2024: 11-month pilot and production ramp (30,000+ vehicles)
      - September 2025: Figure 03 announced; BMW deployment expanded to include Figure 03
      - Summer 2026 (planned): BMW Leipzig expansion begins

      At BMW Spartanburg, the deployment covers a single manufacturing task type (sheet-metal loading
      and parts handling) across a portion of the 1,500 vehicles/day production line. The total fleet
      size has not been disclosed; based on the 90,000+ parts handled over 1,250+ hours, the
      implied task rate suggests a fleet of 10–50 robots deployed in the initial commercial phase.

      No other commercial customer deployment has been announced. The Amazon Industrial Innovation
      Fund's participation in Figure AI's Series B represents a potential future customer relationship,
      but no Amazon commercial deployment has been confirmed. BMW is planning to expand Figure robot
      deployment to its Leipzig, Germany plant in summer 2026 — the first announced international
      deployment.

      The adoption pace reflects the structural reality of enterprise hardware deployment: 12–36
      month sales-to-deployment cycles, long integration periods, and single-site proof before
      expansion commitment.
    claimRefs:
      - C185
      - C186
      - C187
      - C188
  - id: s3
    title: Named Customer Proof
    body: |
      BMW Manufacturing is the only publicly confirmed commercial customer. Evidence quality is
      strong for operational metrics but weak for financial terms:

      Confirmed operational facts:
      - 30,000+ vehicles processed during deployment period
      - 90,000+ parts handled
      - 1,250+ hours of robot task operation
      - >99% task accuracy on sheet-metal loading tasks
      - 400% efficiency gain (throughput improvement) vs. prior baseline on specific tasks
      - BMW Leipzig expansion planned for summer 2026

      Not confirmed:
      - Contract value or pricing terms
      - Number of deployed robots
      - Revenue paid to Figure AI
      - Contract renewal terms or length
      - BMW's internal assessment of ROI or satisfaction

      The $1.41 per $1 return ROI figure cited by IIoT World was attributed to "early adopters" broadly
      and may not be specific to Figure AI or BMW. BMW's public statements have been positive but
      generic — no quantified ROI endorsement has been provided directly by BMW.

      Reference quality: BMW is an exceptional reference customer (Fortune 100, brand recognition,
      manufacturing credibility). However, a single reference customer with 90%+ revenue concentration
      is an extreme risk for a $39B company.
    claimRefs:
      - C189
      - C190
      - C191
      - C192
  - id: s4
    title: Retention, Renewal, and Satisfaction
    body: |
      As of May 2026, Figure AI's BMW relationship appears intact: BMW is expanding to Leipzig,
      which is the strongest indicator of customer satisfaction and contract renewal intent. The
      Leipzig expansion signals that BMW has internally validated the ROI case and is willing to
      commit additional capital and operational resources to the relationship.

      However, formal retention metrics — Net Revenue Retention (NRR), Gross Revenue Retention
      (GRR), contract length, renewal rate, and customer satisfaction scores — are not publicly
      available for any Figure AI customer. There are no published case studies, customer testimonials,
      or public satisfaction ratings beyond BMW's expansion decision.

      The nature of the RaaS model (if adopted) creates structural retention: once robots are
      integrated into production workflows, switching costs are high (workflow redesign, safety
      re-certification, supplier change). However, hardware sale models create less structural lock-in
      — a customer could end a hardware lease and return to human labor or switch vendors.

      Key retention risks: (1) BMW internal politics — board pressure to reduce external service
      costs; (2) Competitor displacement (Tesla Optimus for future BMW deployments); (3) Technical
      disappointment if the expansion to Leipzig underperforms; (4) Safety incident risk that
      triggers suspension.
    claimRefs:
      - C193
      - C194
      - C195
      - C196
  - id: s5
    title: Expansion and Customer Concentration Risk
    body: |
      Figure AI's most acute financial risk is customer concentration: one customer (BMW) appears
      to represent approximately 90%+ of 2024–2025 revenue. At a $39B valuation, this is an extreme
      deviation from normal enterprise software norms where the top customer typically represents 10–25%
      of revenue at comparable valuations.

      Expansion vectors:
      1. BMW Leipzig (summer 2026) — confirmed expansion
      2. Additional BMW plants (Munich, Regensburg, etc.) — no announced timeline
      3. Second automotive OEM — no confirmed commercial customer
      4. Logistics/warehouse — potential Amazon relationship; no commercial deployment
      5. Electronics assembly — no announced customer

      Amazon Industrial Innovation Fund's Series B investment creates an implied future customer
      relationship — Amazon is unlikely to invest as a pure financial investor. If Amazon deploys
      Figure robots in warehouses, this would be the most important deconcentration event.

      The structural challenge: given 12–36 month sales cycles and high integration burden, adding
      a new manufacturing customer takes 1–3 years from contract to commercial scale. Even with
      multiple pilots in progress (not publicly known), Figure AI may have only 2–4 commercial
      customers by end of 2027.
    claimRefs:
      - C197
      - C198
      - C199
      - C200
