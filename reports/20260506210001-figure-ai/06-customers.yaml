callouts:
  - calloutType: strength
    title: BMW Is the Most Credible Enterprise Reference Customer in Humanoid Robotics
    body: >-
      BMW Manufacturing's adoption of Figure robots at its largest global plant represents the highest-quality
      commercial proof point in the humanoid robotics industry. No competitor has an equivalent Fortune 100 OEM
      reference at commercial scale. This reference accelerates Figure AI's pipeline credibility with other Tier-1
      automotive buyers.
    claimRefs:
      - C189
      - C191
      - C194
  - calloutType: risk
    title: Single-Customer Concentration Is Existential Risk at $39B Valuation
    body: >-
      With BMW estimated at 90%+ of revenue and no confirmed second commercial customer, Figure AI's $39B valuation
      rests on a single enterprise relationship. Contract non-renewal, scope reduction, or competitor displacement at
      BMW would eliminate the majority of Figure AI's commercial validation and near-term revenue — a scenario that
      could trigger a catastrophic valuation rerating.
    claimRefs:
      - C197
      - C198
      - C200
  - calloutType: insight
    title: BMW Leipzig Expansion Is the Most Important Near-Term Business Catalyst
    body: >-
      BMW's planned expansion of humanoid robot deployment to its Leipzig, Germany plant (summer 2026) is Figure AI's
      most significant near-term business event. Successful Leipzig activation would: (1) validate cross-site
      replication, (2) reduce single-site risk, (3) strengthen BMW relationship durability, and (4) provide the first
      international deployment proof point for future EU market expansion.
    claimRefs:
      - C194
      - C187
      - C188
  - calloutType: risk
    title: Amazon Remains an Investor, Not a Customer
    body: >-
      Despite the Amazon Industrial Innovation Fund's participation in Figure AI's Series B, no Amazon warehouse
      deployment has been confirmed. The implied commercial relationship creates investor narrative value but no actual
      revenue. Until Amazon converts from financial investor to commercial customer, the relationship provides strategic
      optionality but no revenue deconcentration.
    claimRefs:
      - C199
      - C200
