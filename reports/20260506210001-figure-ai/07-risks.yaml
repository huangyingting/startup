chapter:
  number: 7
  title: Risks
  summary: |
    Figure AI faces a multi-dimensional risk profile that is above average for a Series C hardware/AI
    company. The two highest-severity risks are (1) a workplace safety incident triggering regulatory
    shutdown and reputational collapse, and (2) single-customer concentration making Figure AI
    operationally dependent on BMW's continued commitment. Both carry kill-criteria implications.
    A third critical risk — Tesla Optimus achieving mass-market cost advantage — is strategically
    plausible within the 2026–2028 horizon. Additional risks include EU AI Act compliance for Leipzig,
    key-person dependency on Brett Adcock, Chinese cost competition at $16,000–$50,000 per unit,
    undisclosed robot MTBF and cybersecurity architecture, and a $39B valuation implying 250x–650x
    revenue that requires revenue scale milestones Figure AI has not yet achieved.
sections:
  - id: s1
    title: Risk Overview and Severity Ranking
    body: |
      Figure AI's risk profile is shaped by three structural realities: it deploys physical AI systems
      in safety-critical manufacturing environments, it is pre-diversification with ~85–95% revenue
      concentration at one customer (BMW), and it carries a $39B valuation that implies future revenue
      delivery the market has not yet proven. This chapter ranks material risks by residual exposure
      (likelihood × impact after current mitigations), assesses mitigation maturity, identifies
      thesis-break triggers, and proposes investor diligence asks. Risks are grouped into four
      categories: regulatory/legal, operational/technical, partner/dependency, and people/execution.
      The highest residual exposure risks are: (1) BMW customer exit/reduction (impact 5, likelihood 2
      = residual 10), (2) a workplace safety incident (impact 5, likelihood 2 = residual 10), and (3)
      Tesla Optimus achieving cost parity (impact 4, likelihood 3 = residual 12). Chinese cost
      competition is the highest-probability risk (likelihood 5) but carries moderate impact (3) given
      the current enterprise quality differentiation.
    claimRefs:
      - CR001
      - CR017
      - CR012
      - CR014
  - id: s2
    title: Regulatory, Legal, and Safety Risks
    body: |
      Figure AI operates in a nascent regulatory environment. No comprehensive U.S. federal standard
      yet specifically addresses humanoid robots; OSHA's General Duty Clause (29 U.S.C. §654) is the
      primary compliance framework, supplemented by ISO 10218-1:2011 (industrial robots) and ISO/TS
      15066 (collaborative robots). IEEE Spectrum noted in February 2025 that "current OSHA standards
      were written for fixed industrial robots, not humanoids that share workspace with humans."
      A serious robot-caused workplace injury would trigger OSHA investigation, potential fines up to
      $156,259 per willful violation (2025 inflation-adjusted), unlimited civil product liability,
      BMW production shutdown, and reputational damage that could freeze the enterprise sales funnel.
      No OSHA citations or enforcement actions related to Figure AI robot deployments have been found
      in public databases as of May 2026. The EU AI Act (effective August 2024, phased enforcement
      through 2027) classifies autonomous robots in shared human environments as Annex III high-risk
      AI systems, requiring conformity assessment and CE marking before EU deployment. BMW Leipzig
      (planned summer 2026) faces this compliance requirement — Figure AI has not disclosed a
      conformity assessment timeline. GDPR applies to robot vision data capturing worker information
      in EU plants. Intellectual property risk remains latent: Tesla has filed 100+ humanoid robotics
      patent applications (2022–2025); no active patent litigation naming Figure AI has been found.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
      - CR029
  - id: s3
    title: Operational, Technical, and Security Risks
    body: |
      Figure AI's primary technical risk is task generalization: the Helix VLA model has been proven
      on BMW Spartanburg's specific sheet-metal loading tasks across an 11-month pilot. Generalization
      to diverse environments remains unproven at commercial scale. No public disclosure of robot MTBF,
      field failure rate, or warranty provisions from the BMW deployment exists — a material diligence
      gap. NIST's robotics manufacturing roadmap identifies quality management as the key scaling
      bottleneck; Figure AI must establish ISO 9001-equivalent quality systems for BotQ's 12,000 units/yr
      target. Supply chain risk: BotQ in Sunnyvale, CA is the sole manufacturing site. Key components
      including NVIDIA compute modules, precision servo actuators, and optical sensors are sourced from
      a constrained global supply chain. U.S.-China semiconductor export controls affect compute
      availability. Cybersecurity risk is systemic: networked humanoid robots represent an ICS-class
      attack surface (per CISA). No ISO 27001 certification or cybersecurity audit has been disclosed.
      Talent retention faces competition from OpenAI, Google DeepMind, Tesla, and Meta FAIR for
      AI/robotics engineers in a constrained labor market.
    claimRefs:
      - CR023
      - CR024
      - CR025
      - CR026
      - CR037
      - CR038
      - CR039
      - CR040
      - CR030
  - id: s4
    title: Partner, Dependency, Financial, and Competitive Risks
    body: |
      BMW accounts for an estimated 85–95% of Figure AI's 2025 revenue (analyst consensus). BMW has
      not publicly committed to multi-year fixed-volume robot purchase contracts — the Spartanburg
      deployment operated as a performance-based pilot. BMW's Leipzig expansion deepens this
      concentration before customer diversification occurs. Tesla Optimus has a disclosed production
      cost target below $20,000/unit by end of 2026, versus Figure AI's estimated $100,000–200,000.
      Even at 50% of this target, Tesla's Gigafactory manufacturing advantages would undercut
      Figure AI's enterprise pricing model. Chinese competitors Unitree (G1 at $16,000 listed),
      UBTECH, AgiBot, and Fourier are already at $16,000–$50,000. Figure AI's $39B valuation at
      250x–650x revenue requires revenue milestones not yet demonstrated. Sacra Research estimates
      annual operating expenditure at $250–400M (2025), implying a 3–5 year runway on $1.9B raised —
      adequate near-term but dependent on revenue scale before 2028. BMW Leipzig will require
      capital whose funding source has not been disclosed.
    claimRefs:
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
      - CR017
      - CR018
      - CR019
      - CR031
      - CR032
      - CR033
  - id: s5
    title: People, Execution, Mitigations, and Thesis-Break Triggers
    body: |
      Key-person risk: Brett Adcock drives culture, investor relations, and product vision; no named
      successor or deputy CEO has been announced. Thirteen strategic investors (Microsoft, OpenAI,
      NVIDIA, Amazon, Qualcomm, Intel, T-Mobile, Salesforce, and others) with potentially diverging
      interests create governance conflict risk. Key mitigations in place: BMW endorsement and
      track record provide regulatory and reputational anchors. $1.9B raised provides near-term
      capital buffer. Strategic investor ecosystem provides technology and distribution protection.
      BotQ vertical integration reduces single-supplier dependency for final assembly. Proposed
      mitigation gaps: Pursue OSHA Voluntary Protection Program status, ISO 27001 certification,
      and EU AI Act conformity assessment before Leipzig. Achieve 2+ anchor enterprise customers
      before 2027 — the most critical execution milestone. Five thesis-break triggers: (1) serious
      robot safety incident at any deployment site; (2) BMW terminating or significantly reducing
      its robot fleet; (3) Tesla Optimus at less than $30,000/unit before 2027; (4) mandatory new
      humanoid robot safety regulations Figure AI cannot meet; (5) Brett Adcock departure without
      named successor. Diligence asks: (1) audited revenue by customer, (2) robot MTBF and field
      failure data, (3) OSHA safety protocol documentation, (4) BotQ quality yield rate, (5) EU AI
      Act conformity assessment timeline, (6) cap table and governance rights.
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR034
      - CR035
      - CR036
