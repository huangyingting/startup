callouts:
  - id: K701
    title: 'Kill Criterion: Robot Safety Incident'
    type: risk
    severity: critical
    body: >-
      A serious robot-caused workplace injury at any Figure AI deployment would trigger OSHA investigation, BMW
      production shutdown, reputational collapse, and enterprise customer freeze. This is the highest-consequence risk
      despite relatively low current probability.
    claimRefs:
      - CR028
      - CR029
  - id: K702
    title: 'Kill Criterion: BMW Customer Exit'
    type: risk
    severity: critical
    body: >-
      BMW accounts for ~85–95% of Figure AI's estimated revenue. BMW exit or significant fleet reduction would collapse
      the revenue base before alternative customers can scale — a bilateral survivability dependency.
    claimRefs:
      - CR017
      - CR018
      - CR019
  - id: K703
    title: 'Watch: Tesla Optimus Cost Parity'
    type: risk
    severity: high
    body: >-
      Tesla Optimus achieving its disclosed <$20,000 cost target before 2027 would invalidate Figure AI's premium
      enterprise pricing model and compress addressable market to tasks where physical capability justifies the premium.
    claimRefs:
      - CR012
      - CR013
