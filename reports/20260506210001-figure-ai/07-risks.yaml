  claims:
    - id: C701
      statement: >-
        OSHA's General Duty Clause (29 U.S.C. §654) requires employers to furnish employment free from recognized
        hazards; this is the primary current legal framework for humanoid robot deployments in U.S. manufacturing as no
        humanoid-specific OSHA standard exists.
      type: observed
      topic: OSHA compliance framework
      sourceRefs:
        - S701
        - S707
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ701
        - RQ715
    - id: C702
      statement: >-
        ISO 10218-1:2011 (industrial robot safety) and ISO/TS 15066 (collaborative robots) form the international
        standard framework; however, neither was written to address humanoid robots sharing workspaces with humans.
      type: observed
      topic: ISO robot safety standard limitations
      sourceRefs:
        - S708
        - S706
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ723
    - id: C703
      statement: >-
        IEEE Spectrum reported in February 2025 that OSHA standards were written for fixed industrial robots and are not
        designed for humanoids, creating a compliance gap that Figure AI must navigate without clear precedent.
      type: third-party-reported
      topic: regulatory gap for humanoid robots
      sourceRefs:
