companyProfile:
  summary: |
    Figure AI is a private general-purpose humanoid robotics company founded in 2022
    by serial entrepreneur Brett Adcock in Sunnyvale, California. The company's mission
    is to build a general-purpose bipedal robot capable of performing the full range of
    dexterous physical labor currently done by human workers — beginning with industrial
    manufacturing and expanding to logistics, warehousing, and ultimately consumer markets.
    Figure's flagship products (Figure 02 and Figure 03) are humanoid robots with 20
    degrees-of-freedom hands, 6-camera perception, and the company's proprietary Helix
    Vision-Language-Action (VLA) model — trained on 11+ months of real BMW factory data.
    The only confirmed commercial customer as of the run date is BMW Manufacturing
    Spartanburg, where Figure robots have assembled 90,000+ parts on 30,000+ vehicles
    with over 99% task accuracy. The company operates its own BotQ robot manufacturing
    facility in San Jose with a 12,000-unit annual initial capacity, with aspirational
    targets of 100,000 units/year. Key investors include Microsoft, OpenAI, NVIDIA,
    Amazon Industrial Innovation Fund, Jeff Bezos, Intel Capital, Parkway VC, Qualcomm,
    T-Mobile, Salesforce Ventures, and Brookfield Asset Management.
  foundedDate: "2022-01-01"
  founders:
    - name: Brett Adcock
      role: CEO and Founder
      background: |
        Serial entrepreneur. Previously founded Vettery (talent marketplace), acquired by
        Adecco Group in 2018 for ~$100M, and Archer Aviation (electric air taxi), taken
        public via SPAC in 2021 at ~$3.8B valuation. First-time robotics operator;
        background is in marketplace and aerospace software, not industrial robotics.
      claimRefs: []
  foundingLocation: "Sunnyvale, CA, USA"
  headquarters: "Sunnyvale, CA, USA"
  productSummary: |
    Figure 03: 168cm, 60kg bipedal humanoid robot. 20 DOF hands with multi-finger
    grasping. 6-camera stereo + RGB perception system. 5-hour battery life with
    wireless charging. Helix VLA model for real-time task understanding and execution.
    On-device inference (no cloud round-trip required). BotQ factory (San Jose) producing
    initial 12,000 units/year. Key capabilities: picking, placing, part assembly,
    inspection, bin-filling, and sequential multi-step tasks without explicit programming.
    Figure 02 was retired after Figure 03 launch. BMW expansion to Leipzig plant planned
    for summer 2026.
  customerFocus: "Industrial manufacturers (automotive, electronics, logistics) requiring high-volume repetitive task automation at human-equivalent dexterity"
  businessModel: "Robot-as-a-service or direct robot sale to enterprise manufacturers; contract value per unit not disclosed; BMW is sole confirmed deployment"
