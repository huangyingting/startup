company:
  name: Figure AI
chapter:
  number: 1
  title: Company Overview
  summary: |
    Figure AI is a Sunnyvale/San Jose, California-based humanoid robotics company founded in 2022 by
    Brett Adcock. The company builds general-purpose humanoid robots—Figure 01, Figure 02, and the
    next-generation Figure 03—powered by its proprietary Helix vision-language-action AI. Its breakthrough
    commercial deployment at BMW Group Plant Spartanburg (11 months, 90,000+ parts, 30,000 vehicles
    supported) demonstrated industrial viability at scale. Figure raised $675M at $2.6B (Feb 2024) and
    a Series C exceeding $1B at $39B (Sep 2025), backed by Microsoft, OpenAI, NVIDIA, Bezos, Parkway VC,
    and others. With ~700 employees and estimated 2025 revenues of ~$158M, Figure AI is the
    highest-valued private humanoid robotics company globally.
sections:
  - id: s1
    title: Identity, Headquarters, and Business Model
    body: |
      Figure AI (legal name: Figure AI Inc.) was incorporated in 2022 and is headquartered in Sunnyvale,
      California (some sources cite San Jose), with manufacturing and R&D operations at the same campus.
      The company's mission is to deploy general-purpose humanoid robots into commercial operations to
      address global labor shortages and automate ergonomically hazardous or repetitive tasks. Its core
      product line—the Figure 01, Figure 02, and Figure 03 humanoid robots—combines proprietary
      hardware with the Helix vision-language-action AI model, enabling robots to understand natural
      language commands, perceive environments through onboard cameras, and execute dexterous physical
      tasks.

      Figure's business model centers on a robot-as-a-service (RaaS) structure: customers pay recurring
      fees (rather than large upfront capital expenditures) to deploy Figure robots in their facilities.
      This lowers the adoption barrier, creates predictable recurring revenue for Figure, and allows
      continuous over-the-air software improvements to be pushed to deployed fleets. Primary target
      verticals are automotive manufacturing, warehouse logistics, and—in longer-term roadmaps—domestic
      household applications.

      The company operates BotQ, its own dedicated robot manufacturing facility, targeting an annual
      production capacity of 12,000 units initially, with a stated aspirational goal of 100,000 robots
      per year to meet anticipated commercial demand.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
  - id: s2
    title: Founding Team and Leadership
    body: |
      Figure AI was founded by Brett Adcock, who serves as Founder and CEO. Adcock is a serial
      entrepreneur: he previously co-founded Vettery, an AI-powered recruiting marketplace acquired by
      Adecco Group in 2018 for a reported ~$100M, and was a co-founder of Archer Aviation, an electric
      vertical takeoff and landing (eVTOL) aircraft company that went public via SPAC in 2021 (NYSE: ACHR).
      Adcock self-funded the seed round of $100M to launch Figure AI in 2022.

      The CTO is Jerry Pratt, a robotics veteran formerly at the Institute for Human and Machine Cognition
      (IHMC), where he contributed to bipedal robot locomotion research and was a co-founder of Boardwalk
      Robotics. The engineering and product team includes alumni from Boston Dynamics, Tesla, Google
      DeepMind, and Apple, reflecting a deliberate strategy to recruit from the top robotics and AI
      institutions.

      The broader leadership team includes a VP of Growth (Lee Randaccio), VP of Business Operations
      (Logan Berkowitz), and a Director of Robotic Systems and Operations (Mathew DeDonato, ex-Woven
      Planet Holdings). As of early 2026, Figure AI's executive team encompasses approximately nine
      core leaders spanning engineering, AI, commercial operations, quality assurance, and manufacturing.

      Key-person risk is elevated: Brett Adcock's vision, founder reputation, and investor relationships
      are central to the company's fundraising and commercial partnerships. Board composition beyond
      Adcock and investor representatives has not been publicly disclosed in detail.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
  - id: s3
    title: Funding History and Capital Structure
    body: |
      Figure AI has raised approximately $1.9 billion in primary funding across four rounds:

      - Seed (2022): $100M personally funded by Brett Adcock, with participation from Bold Capital
        Partners and others.
      - Series A (May 2023): $70M (+$9M extension) led by Parkway Venture Capital, with Intel Capital,
        Tamarack Global, FJ Labs, and Aliya Capital participating.
      - Series B (February 29, 2024): $675M at a $2.6B post-money valuation. Investors included
        Microsoft, the OpenAI Startup Fund, NVIDIA, Jeff Bezos (via Bezos Expeditions), Amazon Industrial
        Innovation Fund, Intel Capital, Align Ventures, ARK Invest, LG Innotek, and Samsung Venture
        Investment. Figure simultaneously signed a collaboration agreement with OpenAI to develop
        next-generation AI models for humanoid robots and committed to use Microsoft Azure as its AI
        infrastructure partner.
      - Series C (September 16, 2025): Exceeded $1B at a $39B post-money valuation—a 15x increase from
        the Series B in 18 months. Led by Parkway Venture Capital with participation from Brookfield
        Asset Management, NVIDIA, Intel Capital, Qualcomm Ventures, T-Mobile Ventures, Salesforce, and
        Macquarie Capital. Figure stated the capital will fund fleet scaling, robot training
        infrastructure, and advanced data collection.

      Figure AI has issued cease-and-desist letters to secondary stock market brokers operating without
      authorization; the company maintains tight control over secondary market activity. No public debt
      or credit facility has been disclosed.
    claimRefs:
      - CO014
      - CO015
      - CO016
      - CO017
