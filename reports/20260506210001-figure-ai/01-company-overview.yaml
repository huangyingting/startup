  - calloutType: insight
    title: Self-Funded Seed Signals Founder Conviction and Control
    body: >-
      Adcock's $100M self-funded seed gives him unusual founder control relative to external investor dilution at the
      earliest stage, enabling long-horizon vision execution. This differentiates Figure AI from peers that required
      early external risk capital.
