  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Figure AI board composition and governance structure
      missingEvidence: Names and affiliations of all board members, investor board seat allocation, and governance rights.
      whyItMatters: >-
        Board composition determines investor control, CEO independence, and ability to navigate major strategic
        decisions.
      diligencePath: >-
        Direct investor relations inquiry or SEC Form D filings that may list directors; board disclosure for future IPO
        registration statement.
      relatedQuestionRefs:
        - QO014
      relatedTableRefs:
        - TO002
    - type: private-evidence-only
      severity: material
      topic: Audited revenue and gross margin for Figure AI
      missingEvidence: Verified revenue, cost of goods sold, gross margin, and burn rate from audited financial statements.
      whyItMatters: >-
        Revenue estimates from third-party databases ($60M in 2024, $158M in 2025) are unconfirmed and could differ
        materially from actual figures.
      diligencePath: Request audited financials directly from management or via formal data room in a diligence context.
      relatedQuestionRefs:
        - QO008
        - QO018
      relatedTableRefs: []
    - type: missing-source
      severity: minor
      topic: Full list of commercial customers beyond BMW in Stakeholder or Investor Map
      missingEvidence: Named commercial deployments, pilots, or signed commercial agreements outside of BMW.
      whyItMatters: 'Customer concentration risk: if BMW is the only commercial deployment, revenue sustainability is fragile.'
      diligencePath: >-
        Review Figure AI press releases, SEC Form D, and trade publication coverage for any customer announcements
        post-2025.
      relatedQuestionRefs:
        - QO027
      relatedTableRefs:
        - TO003
    - type: conflicting-data
      severity: minor
      topic: 'Headquarters location: Sunnyvale vs San Jose, California'
      missingEvidence: Official registered address from Delaware incorporation or California business filings.
      whyItMatters: Operational HQ matters for regulatory filings, talent pool, and facility mapping.
      diligencePath: >-
        Check California Secretary of State entity registration for Figure AI Inc. or confirmed official address on SEC
        Form D.
      relatedQuestionRefs:
