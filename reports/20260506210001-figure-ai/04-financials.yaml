callouts:
  - calloutType: risk
    title: Single-Customer Revenue Concentration is a Material Diligence Blocker
    body: >-
      BMW is estimated to account for 90%+ of Figure AI's 2024–2025 revenue. At a $39B valuation, any disruption to the
      BMW relationship — contract renegotiation, BMW budget cut, or plant retooling — could eliminate the majority of
      Figure AI's recognized revenue. No second commercial customer has been publicly confirmed.
    claimRefs:
      - CI011
      - CI012
      - CI013
  - calloutType: risk
    title: No Verified Revenue Data — $39B Valuation Has Limited Factual Financial Anchor
    body: >-
      Figure AI has disclosed no official revenue, gross margin, burn rate, or contract values. All financial estimates
      come from secondary analyst sources. The $39B valuation — implying 250x–650x estimated revenue — requires
      investors to underwrite substantial uncertainty about the actual financial model.
    claimRefs:
      - CI013
      - CI015
      - CI016
  - calloutType: risk
    title: Capital-Intensive RaaS Model Requires Continuous External Financing
    body: >-
      Under the RaaS model, Figure AI must carry deployed robots as assets on its balance sheet while collecting monthly
      fees. At 12,000 units/year at $70K+ cost, full capacity deployment would require $840M+ per year in robot asset
      financing — necessitating either substantial debt facilities, customer pre-payments, or additional equity.
    claimRefs:
      - CI007
      - CI019
      - CI020
  - calloutType: insight
    title: Series C at $39B is the Largest Humanoid Robotics Round on Record
    body: >-
      The September 2025 Series C of over $1 billion at $39B valuation is the largest single fundraising round in
      humanoid robotics history. Investor quality — Microsoft, OpenAI, NVIDIA, Amazon Industrial Innovation Fund —
      provides institutional validation of the thesis even absent confirmed revenues.
    claimRefs:
      - CI018
      - CI017
