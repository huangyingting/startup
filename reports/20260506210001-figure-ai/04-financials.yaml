company:
  name: Figure AI
chapter:
  number: 4
  title: Financials
  summary: |
    Figure AI's financials are almost entirely opaque — a private company with no public revenue
    disclosure. External estimates suggest 2024 revenue of approximately $60 million (primarily
    from the BMW commercial agreement) growing to $158 million in 2025 as the BMW deployment
    expands. The company operates with significant cash burn driven by R&D headcount (700+),
    BotQ factory construction, and hardware manufacturing costs. With $1.9 billion raised and the
    most recent Series C closing at over $1 billion in September 2025, Figure AI likely has 3–5
    years of operating runway at current burn, depending on production ramp speed. The core
    financial challenge is bridging from a single customer (BMW) to multi-customer scale while
    managing the capital-intensive RaaS model (robot leasing requires balance-sheet assets).
    Revenue quality is weak: narrow customer concentration, unconfirmed contract values, and
    unaudited private estimates. The path to profitability requires solving for both unit economics
    (robot gross margin + RaaS margin) and production cost reduction at BotQ scale.
sections:
  - id: s1
    title: Revenue Streams and Model
    body: |
      Figure AI's primary current revenue source is its commercial agreement with BMW Manufacturing
      at the Spartanburg, South Carolina plant. The agreement structure is not publicly disclosed,
      but industry analysts estimate Figure AI charges either a hardware sale price ($70K–$130K per
      robot) or a Robot-as-a-Service (RaaS) subscription fee estimated at approximately $12,000 per
      robot per year. If the BMW agreement is structured as a RaaS contract with, for example, 100–200
      robots deployed, implied annual revenue would be $1.2M–$2.4M — far below reported revenue
      estimates of $60M, suggesting a larger fleet deployment or hybrid hardware+service model.

      Sacra estimates Figure AI's 2024 revenue at approximately $60 million, growing to $158 million
      in 2025, primarily driven by BMW. This implies a significantly higher per-unit revenue than
      pure RaaS pricing would suggest, potentially from hardware sales, onboarding fees, integration
      services, or a larger robot fleet count than publicly disclosed.

      Planned revenue streams: (1) RaaS recurring subscription fees, (2) hardware sales (one-time),
      (3) AI model licensing (Helix), (4) software/OTA update services, and (5) future maintenance
      and training services. As of 2025, revenue streams 3–5 are not confirmed to be generating
      material revenue.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
  - id: s2
    title: Unit Economics and Cost Structure
    body: |
      The unit economics of humanoid robots are at an early, costly stage. Hardware manufacturing
      costs for Figure 02/03 are not publicly disclosed, but industry analysts estimate that a
      robot with the component complexity of Figure 03 (20 DOF hands, 6 cameras, custom actuators,
      advanced AI inference chips) costs between $40,000–$80,000 per unit to manufacture at current
      production scale — leaving thin or negative gross margins at the estimated $70K–$130K price.

      Cost structure breakdown (estimated):
      - R&D: The dominant cost (70%+); 700+ employees including robotics engineers, AI researchers,
        mechanical designers. Average total compensation in AI/robotics is $200K–$300K+.
      - Manufacturing COGS: Material costs for robot hardware; NVIDIA chips, custom actuators,
        cameras, sensors, battery systems.
      - BotQ factory capex: Construction and tooling for 12,000 unit/year target capacity.
      - G&A and sales: Enterprise sales, legal, finance. Sales cycles are 12–36 months.

      The path to positive unit economics requires: (1) scale manufacturing to drive COGS down
      (target sub-$30K per robot at volume), (2) developing Helix AI licensing as a high-margin
      revenue layer, and (3) growing fleet size to spread fixed R&D costs over more deployed robots.
    claimRefs:
      - CI005
      - CI006
      - CI007
      - CI008
  - id: s3
    title: Pricing and Go-to-Market Economics
    body: |
      Figure AI's go-to-market strategy is direct enterprise sales to large manufacturers and logistics
      operators. This model has high average contract values but extremely long sales cycles
      (12–36 months) and high customer acquisition costs (senior enterprise sales teams, lengthy
      pilot periods). Traditional SaaS CAC/payback metrics do not apply directly, but the analog
      for capital equipment is the cost of the pilot + integration burden absorbed during deployment.

      BMW's pilot was reported to last 11 months before commercial deployment — suggesting a 12+
      month sales-to-deployment cycle for an early customer. As Figure AI matures, cycle times
      may shorten with established reference customers and certified integration protocols.

      Pricing leverage: Enterprise buyers have alternatives (Agility Digit, future Tesla Optimus,
      cobot automation), limiting Figure AI's pricing power. The RaaS model, if adopted, creates
      predictable annuity revenue but requires Figure AI to carry robots as assets. Hardware sale
      transfers CapEx to customers but may reduce LTV.

      Customer concentration risk: BMW is believed to account for approximately 90%+ of 2024–2025
      revenue. This creates a severe single-customer concentration risk for a company with $39B
      valuation.
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
  - id: s4
    title: Public Traction Metrics
    body: |
      Despite its $39B valuation, Figure AI has disclosed very few verifiable financial metrics
      publicly. The primary public traction evidence is operational (deployment performance) rather
      than financial:
      - 30,000+ BMW vehicles processed by Figure robots during 11-month deployment
      - 90,000+ parts handled
      - 1,250+ hours of task completion
      - >99% task accuracy
      - 400% efficiency gain vs. prior baseline in specific tasks
      - $1.41 return per $1 spent (cited by IIoT World, covering early adopters; source unclear)

      No ARR, unit revenue, GMV, or contract values have been officially confirmed. Revenue estimates
      ($60M for 2024, $158M for 2025) come exclusively from secondary analyst sources (Sacra).
      Figure AI has not filed public financials and has not publicly confirmed any financial metric.

      The company's Series C at $39B valuation implies a ~650x revenue multiple on estimated 2025
      revenue of $60M, or ~250x on $158M — among the highest non-public software or hardware company
      multiples recorded in the 2025–2026 period.
    claimRefs:
      - CI013
      - CI014
      - CI015
      - CI016
  - id: s5
    title: Capital Adequacy and Financing Dependency
    body: |
      Figure AI's total capital raised is approximately $1.9 billion across:
      - Seed: $100M (self-funded by Brett Adcock)
      - Series A: $70M (May 2023)
      - Series B: $675M at $2.6B (February 2024)
      - Series C: ~$1B+ at $39B (September 2025)

      The Series C was the largest humanoid robotics funding round in history at time of close.
      Investors include Microsoft, NVIDIA, OpenAI, Amazon Industrial Innovation Fund, Bezos
      Expeditions, Intel Capital, Brookfield, Parkway VC, Qualcomm, T-Mobile, and Salesforce.

      Estimated annual cash burn: given $700+ headcount at AI/robotics compensation levels
      ($200K–$300K+ average total comp = $140M–$210M people cost alone), plus R&D, factory capex,
      and hardware COGS, total annual burn likely exceeds $300–$500M per year at current scale.
      Assuming $300M+ burn and $1B+ from Series C, runway is approximately 3 years (2025–2028)
      before the next capital raise would be required. Revenue growth toward $500M+ or an IPO
      would be needed to close the gap.

      IPO speculation is active for 2026–2027; a public offering at $39B+ would provide additional
      capital and liquidity. No official IPO timeline has been confirmed.
    claimRefs:
      - CI017
      - CI018
      - CI019
      - CI020
