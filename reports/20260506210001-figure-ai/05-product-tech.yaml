callouts:
  - calloutType: strength
    title: Helix VLA Model Is the Most Validated Industrial Humanoid AI in Production
    body: >-
      The combination of Helix VLA model + BMW production training data provides Figure AI with the most extensively
      validated commercial humanoid robot AI in industrial settings. The 11-month, 30,000-vehicle deployment creates a
      training data flywheel that is difficult for competitors to replicate without similar large-scale industrial
      partnerships.
    claimRefs:
      - CE017
      - CE002
      - CE003
  - calloutType: risk
    title: Task Generalization Remains Figure AI's Core Technical Limitation
    body: >-
      Current commercial deployments are bounded to narrow, repetitive pick-and-place tasks in structured environments.
      True general-purpose operation — moving fluidly between diverse unstructured tasks — remains a fundamental open AI
      problem. Until task generalization improves materially, Figure AI's addressable market is limited to tasks that
      can be sufficiently formalized for model training.
    claimRefs:
      - CE004
      - CE016
      - CE024
  - calloutType: risk
    title: Regulatory Safety Vacuum Creates Deployment Risk
    body: >-
      The absence of any OSHA, ISO, or EU AI Act standard specifically governing humanoid robot deployment in industrial
      settings means each customer must develop site-specific risk protocols. This increases deployment friction,
      extends sales cycles, and leaves Figure AI legally exposed if a robot causes a workplace injury without a
      certified safety framework in place.
    claimRefs:
      - CE021
      - CE022
  - calloutType: strength
    title: Vertical Integration Enables System-Level Co-Optimization
    body: >-
      By owning hardware, AI model, and manufacturing, Figure AI can reduce COGS through hardware-software
      co-optimization in ways that companies dependent on third-party robot hardware (e.g., Apptronik using third-party
      chassis components) cannot. This vertical stack control mirrors the Tesla/Apple model of competitive advantage
      through system-level design.
    claimRefs:
      - CE019
      - CE020
