company:
  name: Figure AI
chapter:
  number: 5
  title: Product and Technology
  summary: |
    Figure AI's product is a vertically integrated physical AI system: humanoid robot hardware
    (Figure 03) combined with the Helix vision-language-action (VLA) model and the BotQ
    manufacturing platform. Figure 03, launched September 2025, is a 168cm, 60kg robot with
    20 DOF hands, 6 onboard cameras, a 5-hour battery with wireless charging, and an onboard
    Helix inference chip. The Helix AI model is a neural visuomotor policy trained on BMW
    production task data, enabling zero-shot generalization across new tasks without task-specific
    programming. The product architecture is full-stack proprietary — Figure AI designs its own
    actuators, sensors, robot OS, and AI model. Key technical differentiators are the BMW training
    data flywheel, the Helix model's demonstrated >99% task accuracy in commercial settings, and
    the BotQ factory designed for 12,000 units/year. Major technical risks include task generalization
    limits beyond pick-and-place, actuator reliability at scale, supply chain for custom components,
    and the regulatory absence of safety certification standards for humanoid robots.
sections:
  - id: s1
    title: Product Definition in Customer Workflow Terms
    body: |
      Figure AI's product solves a specific enterprise problem: replacing human workers in physically
      demanding, repetitive, and ergonomically hazardous manufacturing tasks, without requiring
      facility retrofitting (because humanoid robots operate in environments already built for humans).

      In BMW's Spartanburg deployment, Figure robots perform sheet-metal loading and part-handling
      tasks: picking specific body-panel parts from bins, orienting them correctly, and loading them
      into production jigs at the correct position and force. These tasks were previously performed
      by humans who experienced repetitive strain injuries and fatigue. The robot workflow is:
      (1) Visual perception of part in bin; (2) Grasp planning using Helix; (3) Dexterous manipulation
      with 20 DOF hands; (4) Placement verification; (5) Signal to human co-worker or next step.

      The customer value proposition is: (a) Labor substitution — the robot is available 24/7, does
      not fatigue, does not call in sick; (b) Quality improvement — >99% task accuracy eliminates
      human error in repetitive tasks; (c) Ergonomic compliance — removes humans from injury-prone
      positions; (d) ROI — at $12K/year RaaS, payback vs. $40K+ human labor cost is compelling for
      high-volume tasks.

      The primary limitation: Figure 03 is not yet a general-purpose robot. Tasks must be narrow,
      repetitive, and well-structured. Open-ended, novel, or multi-step unstructured tasks remain
      beyond the system's current commercial deployment capability.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
  - id: s2
    title: Product Module and Component Map
    body: |
      Figure AI's product system consists of three integrated modules:

      1. Figure 03 Hardware: The physical robot body — 168cm tall, 60kg, 20 DOF hands (described as
      having near-human dexterity), 6 onboard cameras (stereoscopic and monocular), a 5-hour battery
      with wireless inductive charging. Custom-designed actuators (rotary and linear) are manufactured
      in-house or by dedicated suppliers. Key proprietary components: the hand assembly (16–20 DOF),
      the force-torque sensor array, and the robot operating system (Figure OS).

      2. Helix AI Model: A vision-language-action model that maps camera inputs and natural language
      task descriptions to robot joint actions. The model is trained using reinforcement learning from
      demonstrations (human teleoperation data from BMW and internal labs) plus physics simulation.
      Helix runs inference on-device using a dedicated AI chip (details undisclosed). Model updates
      are delivered over-the-air (OTA). As of Figure 03 launch, Helix represents a significant
      advancement over Figure 02's model, with higher task generalization.

      3. BotQ Manufacturing Platform: Figure AI's purpose-built factory targeting 12,000 robots/year
      initially (aspirational 100,000/year). BotQ integrates robot assembly, quality control, AI
      model deployment, and fleet management infrastructure. The factory location and construction
      status beyond the announced plans are not fully public as of May 2026.
    claimRefs:
      - CE005
      - CE006
      - CE007
      - CE008
  - id: s3
    title: Technology Architecture and Operating Model
    body: |
      Figure AI's technology stack is vertically integrated by design, providing control over the
      entire stack from robot hardware to the AI model. Key architectural layers:

      1. Perception layer: 6 onboard cameras provide RGB-D visual input. The system must handle
      occlusion, lighting variation, and object deformation in real time. No public disclosure on
      LIDAR or tactile sensors beyond camera and force-torque data.

      2. Action/policy layer: Helix VLA model maps visual observations and task language to joint
      torque commands. The key claim is "zero-shot generalization" — the ability to perform novel
      variations of trained tasks without explicit reprogramming. This has been demonstrated in
      BMW production, but the scope of generalization is bounded by what the model was trained on.

      3. Infrastructure layer: Figure OS (robot operating system), a cloud-connected fleet management
      platform, OTA update delivery, and real-time safety monitoring. The cloud integration introduces
      cybersecurity risks in industrial settings.

      4. Manufacturing layer: BotQ is not just an assembly facility but also the platform for quality
      testing, AI model integration, and robot-level safety certification before deployment.

      Microsoft Azure is the primary cloud provider. NVIDIA hardware (Jetson or custom) is suspected
      for on-device inference, though not officially confirmed. OpenAI's collaboration likely relates
      to large language model integration for task understanding, though details are undisclosed.
    claimRefs:
      - CE009
      - CE010
      - CE011
      - CE012
  - id: s4
    title: Deployment, Integration, and Reliability
    body: |
      Figure AI's deployment model requires a multi-month integration period before a customer can
      reach commercial scale. The BMW Spartanburg deployment involved: (1) 11-month pilot period,
      (2) Task-specific training data collection via human teleoperation, (3) Helix model fine-tuning
      for BMW-specific tasks, (4) Safety protocol development and worker co-existence testing, (5)
      Gradual fleet scale-up from pilot units to 90,000+ parts handled.

      Reliability metrics from BMW: >99% task accuracy is the headline; availability and mean-time-
      between-failure (MTBF) have not been publicly disclosed. The 5-hour battery requires periodic
      recharging (wireless) during shift breaks, or shift-based hot-swap infrastructure. Long-term
      actuator wear rates at industrial operating tempo are not yet established.

      Figure 03 roadmap: (1) Integration into BMW Leipzig plant (planned summer 2026); (2)
      Expansion to additional manufacturing verticals (warehouse, electronics); (3) Consumer/household
      Figure deployment (undisclosed timeline); (4) Helix model expansion to longer task horizons
      and multi-robot coordination.

      Integration requirements are significant: customer must provide structured physical workspace,
      establish OTA connectivity, define task parameters, and develop safety protocols. The absence
      of standardized humanoid robot safety certification (OSHA, ISO) means customers must develop
      site-specific risk assessments.
    claimRefs:
      - CE013
      - CE014
      - CE015
      - CE016
  - id: s5
    title: Technology Differentiation and IP
    body: |
      Figure AI's key differentiators relative to competitors:

      1. Helix VLA model (BMW training data): The model's commercial performance (>99% accuracy,
      400% efficiency gain) is the most validated VLA deployment in industrial humanoid robotics.
      The BMW production data is proprietary — competitors cannot access it. This data flywheel
      strengthens Helix as more tasks are completed.

      2. 20 DOF hand design: Among the most dexterous commercial humanoid hands, enabling fine
      manipulation that simpler grippers (Agility Digit hooks) cannot perform. IP includes hand
      mechanism patents and actuation techniques.

      3. Wireless inductive charging: 5-hour battery with wireless charging eliminates charging
      downtime interruption — a practical operational advantage for 24/7 industrial deployment.

      4. Vertical integration: Control of hardware, AI model, and manufacturing gives Figure AI
      the ability to co-optimize across layers — reducing COGS over time and enabling performance
      improvements that benefit from system-level tuning.

      5. IP portfolio: Figure AI has filed patents on robot design, actuation mechanisms, and AI
      training methods, though the breadth and competitive strength of the portfolio have not been
      independently assessed. Brett Adcock has stated the team prioritizes speed of innovation
      over patent filings.

      Key IP risks: VLA model architectures are increasingly open-source (OpenVLA, pi0); hardware
      design can be reverse-engineered by well-funded Chinese competitors; regulatory IP (safety
      certifications) does not yet exist to protect early movers.
    claimRefs:
      - CE017
      - CE018
      - CE019
      - CE020
  - id: s6
    title: Trust, Safety, and Compliance
    body: |
      Humanoid robots operating alongside humans in industrial settings create significant safety
      and compliance challenges. Key considerations for Figure AI:

      1. Physical safety: A 60kg robot moving at high speed can cause serious injury. Safety
      systems include: velocity and force limits near humans, emergency stop protocols, geofencing
      (robots confined to defined work envelopes), and human proximity detection. BMW's deployment
      includes co-existence protocols where humans and robots share zones with physical barriers
      and speed limitations.

      2. Regulatory compliance: No established OSHA or ISO standard specifically governs humanoid
      robot deployment in industrial settings as of 2026. Figure AI operates in a regulatory gap
      where customers must develop site-specific risk assessments. EU AI Act Article 6/7 may
      classify general-purpose humanoid robots as high-risk AI systems requiring conformity
      assessment before deployment in EU facilities.

      3. Data privacy: Figure AI's 6-camera array captures detailed video of production facilities
      and workers. Cloud-connected operation raises concerns about customer IP exposure (competitors
      could theoretically observe production methods through robot data).

      4. Cybersecurity: Networked industrial robots are potential targets for ransomware or sabotage.
      Cloud connectivity introduces attack surfaces. No public disclosure of Figure AI's security
      architecture or penetration testing results.

      5. AI bias and error: VLA models can produce unexpected outputs ("hallucinations") in novel
      situations. An out-of-distribution task could cause the robot to damage parts, injure a worker,
      or cause a production stoppage. Helix's robustness under distribution shift is not fully
      characterized in public.
    claimRefs:
      - CE021
      - CE022
      - CE023
      - CE024
