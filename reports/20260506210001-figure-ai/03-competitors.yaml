callouts:
  - calloutType: insight
    title: Figure AI Holds Unique Commercial Proof Point Among Pure-Play Peers
    body: >-
      As of early 2026, Figure AI is the only pure-play humanoid robotics startup with a confirmed commercial-scale
      industrial deployment at a Fortune 100 OEM. This 11-month BMW production run (30K+ vehicles) provides a
      qualitative moat — training data, commercial credibility, and reference customer — that competitors cannot quickly
      replicate.
    claimRefs:
      - CP011
      - CP013
  - calloutType: risk
    title: Tesla's Cost Advantage Could Become Structural at Scale
    body: >-
      If Tesla Optimus achieves its $20K–$30K unit cost target — 4–6x below Figure AI's estimated price range — at
      meaningful volume within 3–5 years, it would fundamentally restructure market pricing expectations. Figure AI must
      develop sustainable software/AI differentiation and deep customer lock-in before Tesla reaches mass production.
    claimRefs:
      - CP005
      - CP016
      - CP018
  - calloutType: risk
    title: Chinese Competitors Offer 10x Cost Advantage on Hardware
    body: >-
      Unitree's G1 lists for $16K–$99K — up to 8x cheaper than Figure AI's estimated price range. Chinese government
      subsidization enables sustained low pricing. While US export controls may restrict some government use, Chinese
      competitors are free to compete globally for commercial customers, constraining Figure AI's international pricing
      power.
    claimRefs:
      - CP009
      - CP010
      - CP019
  - calloutType: strength
    title: Investor Ecosystem Creates Unique AI Development Tailwind
    body: >-
      Figure AI's investor base includes Microsoft (cloud compute, AI development resources), OpenAI (foundation model
      collaboration), and NVIDIA (GPU access and robotics software). This ecosystem reduces the marginal cost of AI
      development substantially and creates barriers to replication for competitors who lack equivalent big-tech
      partnerships.
    claimRefs:
      - CP013
      - CP014
