summary:
  headline: |
    Figure AI 做到了此前没有人形机器人公司跑通的事：在汽车量产场景连续多月部署，并且 BMW 制造指标
    获得独立佐证。$39B 估值已经把一个未来全部计入价格——公司需要压过 Tesla Optimus、Agility/Amazon
    以及所有工业自动化既有玩家；对应估计收入的 250–650x。部署证明非常罕见，估值风险同样非常极端。
    具备 7–10 年周期、且深懂机器人领域的专门投资人，或许能为一笔投机性进入辩护；普通成长投资人
    应在这一倍数下回避。
