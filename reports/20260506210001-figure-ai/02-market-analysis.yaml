  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Precise global manufacturing labor shortage quantification by region and sector
      missingEvidence: >-
        Authoritative, disaggregated data on unfilled manufacturing and logistics positions by country (US, EU, China,
        Japan) that directly sizes demand for humanoid robots.
      whyItMatters: >-
        Labor shortage magnitude is the primary demand driver; imprecise estimates limit confidence in bottom-up SAM
        sizing.
      diligencePath: BLS Job Openings and Labor Turnover Survey (JOLTS), EU Labour Force Survey, ILO World Employment Report.
      relatedQuestionRefs:
        - RQ211
    - type: missing-source
      severity: material
      topic: Verified pricing and contract structure for Figure AI's commercial agreements
      missingEvidence: >-
        Public disclosure of robot pricing (RaaS monthly fee, upfront hardware option, service contract terms) and
        contract lengths with BMW or other customers.
      whyItMatters: >-
        Revenue modeling and SOM calculation depend heavily on pricing structure, which has not been officially
        confirmed.
      diligencePath: Request commercial term sheet from Figure AI; review any public filings mentioning contract values.
      relatedQuestionRefs:
        - RQ207
    - type: missing-source
      severity: minor
      topic: Historical robotics sector funding comparison (2023 vs 2025)
      missingEvidence: >-
        Year-over-year comparison of total robotics startup funding to assess whether the $8.5B 2025 figure represents
        acceleration or normalization.
      whyItMatters: Contextualization of funding momentum helps assess whether the sector is at peak hype or early scaling phase.
      diligencePath: Crunchbase or Pitchbook venture funding dataset comparison for 2022–2025.
      relatedQuestionRefs:
        - RQ219
    - type: missing-source
      severity: minor
      topic: Long-term household consumer humanoid robot market sizing with credible source
      missingEvidence: >-
        Independent, credible market sizing for the household consumer humanoid robot segment by 2030–2035 with
