callouts:
  - calloutType: insight
    title: Wide TAM Forecast Dispersion Signals Regime Uncertainty
    body: >-
      The 12x spread between conservative ($4B) and aggressive ($48B) 2030 humanoid robot market projections reflects
      genuine regime uncertainty — whether costs fall fast enough to unlock consumer adoption by 2030. Figure AI's $39B
      valuation implicitly assumes the aggressive scenario.
    claimRefs:
      - C043
      - C044
      - C045
  - calloutType: strength
    title: Automotive Manufacturing Validates Near-Term SAM
    body: >-
      The BMW deployment provides the first public ROI validation for the automotive manufacturing segment: >99% task
      accuracy, 400% efficiency gain on specific tasks, and BMW's subsequent expansion planning to Leipzig confirm real
      enterprise willingness to pay for humanoid robots in controlled industrial settings.
    claimRefs:
      - C048
      - C054
      - C055
  - calloutType: risk
    title: Tesla Optimus Cost Target Threatens Pricing Power
    body: >-
      Tesla's stated $20K–$30K long-term unit cost target for Optimus — against Figure AI's $70K–$130K current range —
      would dramatically undercut Figure AI's pricing if achieved at scale. Figure AI must establish strong software/AI
      differentiation and customer stickiness before Optimus reaches mass production volumes.
    claimRefs:
      - C057
      - C058
      - C059
  - calloutType: risk
    title: Regulatory Vacuum Adds Deployment Friction
    body: >-
      No established regulatory framework (OSHA, ISO, EU AI Act) specifically governs humanoid robot deployment in
      industrial settings. This creates legal ambiguity around liability for accidents, extending enterprise procurement
      cycles and capping initial deployment scale.
    claimRefs:
      - C055
      - C056
