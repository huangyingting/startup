- id: s4
  title: Growth Drivers and Adoption Constraints
  body: >-
    The AI in drug development market is propelled by structural drivers that reinforce the
    case for Formation Bio's approach, while facing meaningful adoption constraints that temper
    near-term market timing.


    Primary driver — Escalating drug development costs: Tufts CSDD's most widely cited estimate
    places the average cost to develop and approve a single drug at $2.6 billion (including the
    cost of capital and failures). Deloitte's 2025 pharmaceutical innovation return analysis
    confirms that industry R&D internal rate of return improved to 7.0 percent but remains
    below historical benchmarks and below the cost of capital for many programs. Cost pressure
    creates urgency for platform solutions that accelerate development timelines.


    Secondary driver — High clinical trial failure rates: Approximately 90 percent of drug
    candidates entering Phase I clinical trials fail to receive regulatory approval. Phase II is
    the highest-attrition stage, with success rates of 25–35 percent depending on therapeutic
    area. Patient recruitment failure is responsible for delays in approximately 80 percent of
    clinical trials, representing the most tractable operational bottleneck. AI-optimized site
    selection, patient matching, and protocol design directly target this constraint.


    Tertiary driver — Post-pandemic digital trial infrastructure: The COVID-19 pandemic
    accelerated adoption of decentralized clinical trial capabilities—remote monitoring, digital
    endpoints, virtual patient engagement—that Formation Bio's AI platform can leverage. Frost &
    Sullivan notes FSP and hybrid outsourcing model adoption expanding as pharma seeks to optimize
    non-core trial operations.


    Constraint 1 — Internal pharma AI buildout: Major pharmaceutical companies are investing
    billions in proprietary AI capabilities. Pfizer, Sanofi, AstraZeneca, Roche, and Novartis have
    all announced significant AI development programs covering clinical trial optimization. If
    large pharma can replicate Formation Bio's AI capabilities internally, the addressable
    out-licensing opportunity narrows.


    Constraint 2 — Regulatory uncertainty on AI-assisted submissions: FDA's posture on
    AI-assisted protocol design, adaptive trial structures, and AI-generated regulatory submissions
    remains evolving. The FDA's drug development and approval process requirements do not yet
    formally integrate AI-generated insights in NDA/BLA submissions. Regulatory delay risk can
    offset technology efficiency gains.


    Constraint 3 — Capital intensity and runway risk: Formation Bio's model requires substantial
    upfront capital for drug asset acquisition and development before revenue from drug sales or
    royalties materializes. A single failed Phase III trial can cost $200–500 million. The company's
    $615 million fundraise provides capital runway, but sustained pre-approval periods require
    continuous investor support.
