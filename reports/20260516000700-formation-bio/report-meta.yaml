companyProfile:
  summary: >-
    Formation Bio is an AI-native pharmaceutical development company founded in 2016 (as TrialSpark) that in-licenses
    clinical-stage drug candidates and uses its AI-powered development engine to accelerate clinical trials. The company
    has raised approximately $615M at a $1.8B valuation through its June 2024 Series D led by Andreessen Horowitz, with
    investors including Sequoia, Sanofi, General Catalyst, Thrive Capital, and individual backers Sam Altman and John
    Doerr. Its disclosed pipeline includes five assets from preclinical through Phase 3, with the most advanced being
    Gusacitinib (licensed to Sanofi, Phase 3). The core thesis rests on AI delivering measurable clinical trial
    acceleration, but no public benchmarks or audited financials exist to validate the model.
  foundedDate: '2016-01-01'
  founders:
    - name: Benjamine Liu
      role: CEO and Co-Founder
      background: Computational biology PhD from Oxford; identified drug development bottleneck during academic research.
      claimRefs: [CO008]
    - name: Linhao Zhang
      role: CTO and Co-Founder
      background: Computer scientist; early engineer at Oscar Health; technology platform architect.
      claimRefs: [CO009]
  foundingLocation: New York City, New York, USA
  headquarters: New York City, New York
  productSummary: >-
    AI-powered drug development engine spanning clinical trial design, protocol optimization, site selection, patient
    recruitment, and regulatory intelligence. The company in-licenses clinical-stage drug candidates and applies its
    platform to accelerate development. Disclosed pipeline includes KMR301 (autoimmune, preclinical), BLKR201 (TYK-2
    inhibitor, Phase 1), RVW101 (anti-CD226, UC), Sprifermin (knee osteoarthritis, Phase 2), and Gusacitinib (hand
    eczema, Phase 3, licensed to Sanofi).
  customerFocus: Pharmaceutical companies (as partners and drug licensors), clinical trial sites, patients
  businessModel: >-
    In-licenses clinical-stage drug candidates from pharma/biotech companies, develops them through clinical trials
    using AI platform, and captures value through drug asset appreciation, licensing deals (e.g. Gusacitinib to Sanofi),
    and partnership revenue with Pfizer and Sanofi.
  stage: late-stage private (Series D, June 2024)
  fundingStatus: >-
    $372M Series D in June 2024 at $1.8B valuation led by Andreessen Horowitz; total disclosed funding approximately
    $615M. No subsequent round announced through May 2026.
  claimRefs: [CO001, CO002, CO004, CO008, CO009, CO014, CO015, CO016, CO017, CO022, CO027, CO028]
summary:
  headline: >-
    Formation Bio has a compelling AI-pharma thesis backed by $615M in blue-chip capital and top-10 pharma partnerships,
    but the $1.8B valuation rests on unverifiable AI performance claims, undisclosed financials, and a high-risk drug
    pipeline where industry-wide failure rates exceed 90%.
  overallScore: 5.5
  recommendation: research-more
  confidence: medium
  riskRating: high
