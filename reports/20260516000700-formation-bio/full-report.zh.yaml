      - number: '1.5'
        title: 里程碑、更名和反向事件
        blocks:
          - type: paragraph
            body: >
              Formation Bio 的轨迹体现出一次有意为之的演进：从临床试验技术创业公司，转向 AI 原生制药公司。公司 2016 年以 TrialSpark 名义创立，最初为制药赞助方搭建临床试验软件和服务。入选 Y
              Combinator 2017 届，带来早期背书和网络效应。随后，公司逐步从纯技术扩展到完整药物持有，收购临床阶段资产并建设内部开发能力。


              2024 年 6 月，TrialSpark 更名为 Formation Bio，标志着公司的战略转向：药物开发而非试验技术，成为主业。同期完成的 $372 million Series D
              提供了扩充药物组合的资本。Andreessen Horowitz 将这一机会描述为规模化打造一家技术原生制药公司，并指出过去一个世纪中，很少有大型制药公司被创建出来或由创始人持续领导。


              截至 2026 年 5 月 16 日，公开资料未显示 Formation Bio 或 TrialSpark 遭遇重大法律事件、监管执法、制裁、泄露披露或产品召回。不过，制药开发业务天然带有临床试验风险——10
              个引进授权候选药物中的任何一个都可能在临床试验中失败，造成资本沉没。公司成立时间相对较短（2016 年），公开财务披露有限，因此外部资料几乎无法观察其能否兑现宏大的药物组合战略。AI
              制药商业模式可持续性和临床试验失败率，是尽调中的重大反向因素。
