      - number: '1.3'
        title: 融资历史和资本形成
        blocks:
          - type: paragraph
            body: >
              Formation Bio 已披露累计融资约 $615 million，估值据报道达到 $1.8 billion。最早资金来自 2017 年 Y Combinator，当时公司仍以 TrialSpark 运营。前
              Sequoia 董事长 Michael Moritz 开出了公司第一张机构支票；此后，公司吸引了横跨科技与医疗健康风投的一线投资人组合。


              最近一次宣布的融资是 2024 年 6 月 $372 million Series D，由 Andreessen Horowitz 领投。参与方包括 Sanofi（战略投资人）、Sequoia、General
              Catalyst、Lux Capital、Thrive Capital、SV Angel、Y Combinator、John Doerr（Kleiner Perkins 董事长）和 Emerson
              Collective。此外，OpenAI CEO Sam Altman 以个人投资人身份参与。Andreessen Horowitz 的 Scott Kupor 将 Formation Bio
              描述为在科技与生物学交汇处打造未来制药公司。


              此前轮次包括未披露的早期融资，Forbes 报道的累计资本由此达到 $615 million。Series D 与 TrialSpark 更名为 Formation Bio
              同步发生，也标志着公司从临床试验技术提供商转为垂直整合的 AI 原生制药公司。自 Series D 到 2026 年 5 月 16
              日报告日，公司未公开宣布后续融资轮。公司未披露任何债务额度、老股交易或可转债安排。
