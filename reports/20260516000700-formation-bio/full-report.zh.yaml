  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场范围、定义边界与现状替代方案
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 竞争的是一组相互重叠的市场，而不是一个边界清晰的单一市场。最宽口径下，公司面对全球制药研发市场；根据 PhRMA 和 Deloitte 年度回报率测算等行业数据，2024–2025
              年该市场年支出超过 $260 billion。临床开发——覆盖 Phase I 到 Phase III 试验执行、监管申报和临床运营——约占总研发支出的 40–60%，即每年约 $100–160
              billion。作为开发平台，这就是 Formation Bio 可能触达的最宽 TAM。


              纳入 Formation Bio 可服务支出的项目包括：临床试验执行成本（中心管理、患者招募和留存、数据管理、监查）、监管策略和申报准备，以及通过引进授权获取药物资产所投入的资本成本。公司的 AI
              平台还覆盖相邻的临床运营技术支出；这些支出目前分散在电子数据采集系统、中心管理平台和患者互动供应商之间。不纳入主要可服务市场的项目包括：早期药物发现（靶点识别、从命中化合物到先导化合物的化学、先导化合物优化）、制造与化学-生产-控制（CMC）放大、商业销售和营销运营，以及上市后监测。Formation
              Bio 的管线包含一个临床前资产（KMR301），但核心模型仍围绕临床阶段资产。


              Formation Bio 取代或竞争的现状替代方案包括大型合同研究组织（CRO）——ICON plc、Syneos Health、PPD（Thermo Fisher Scientific）、Labcorp
              Drug Development 和 Covance——它们合计代表约 $80 billion
              的全球外包临床服务市场。传统大型制药公司的内部临床运营团队也是替代方案；此外，随着制药公司寻求更具成本效率的非核心外包，混合功能服务提供商（FSP）/CRO 模型也在升温。Formation Bio
              与这些替代方案的差异在于药物资产所有权经济模型：公司不是收服务费，而是持有药物，并捕获获批产品的完整经济价值，包括 Gusacitinib 与 Sanofi 授权交易等安排中的版税。
