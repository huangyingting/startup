      - number: '7.2'
        title: 监管与 AI 治理风险
        blocks:
          - type: paragraph
            body: >-
              AI 辅助药物开发的 FDA 监管风险真实存在，并且仍在快速演进。2025 年 1 月，FDA 发布题为《使用人工智能支持药物和生物制品监管决策的考量》的草案指南， 对使用 AI
              生成或处理信息、以支持安全性、有效性或质量监管决策的申办方提出新的预期。该指南覆盖临床试验设计、患者队列定义、 终点选择和数据结构化中的 AI 使用——这些领域直接对应 Formation Bio 的 ATLAS
              适应症评估、Muse 患者招募和临床数据结构化 AI 工具。 如果最终指南要求大规模申报前 AI 验证研究，或施加 Formation Bio
              当前平台无法在不进行重大工程返工情况下满足的算法透明度和可审计性要求， 公司所称的效率优势可能被推迟或受限。


              2024 年成立的 FDA CDER AI Council 正在积极制定审查 AI 相关申报的内部政策；2016 至 2023 年间，该机构已收到 500 多份含 AI
              组件的药物申请。监管审查加码提高了风险：IND、NDA 或 BLA 申报中的 AI 生成数据，可能遭遇更长审查周期、被要求补充验证数据， 或因不符合当前证据标准而被拒绝作为 AI 生成证据。国际上，EMA 和
              ICH 正在制定平行 AI 框架；多区域要求若出现分歧， 可能会使 Formation Bio 对大适应症资产所需的全球临床开发计划更复杂。
            claimRefs: []
