      - number: '3.2'
        title: AI 原生药物发现与开发同业
        blocks:
          - type: paragraph
            body: >-
              Recursion Pharmaceuticals（NASDAQ: RXRX）是结构上最相关的 AI 制药同业，因为它明确把自己定位为“临床阶段 TechBio
              公司”，把生物学、化学和临床开发整合进统一智能系统——这套语言与 Formation Bio 的投资人叙事直接重叠。Recursion 已生成超过 50 PB 生物和化学数据，搭建了
              BioHive-2（公司称为生物制药最强超级计算机），并在 2024 年底收购 Exscientia，以加深 AI 药物设计能力。不过，Recursion 的管线来自内部发现，而非引进授权；截至 2026 年 5
              月 15 日，其市值约 $1.555 billion，低于 52 周高点 $7.18，跌幅 59%，说明公开市场投资人尚未在规模化层面验证 AI 药物开发假说。

              Insilico Medicine（SEHK: 3696）拥有最先进的 AI 发现且已进入临床开发的药物之一：ISM001-055，一款用于特发性肺纤维化的 TNIK 抑制剂，处于 Phase
              2。Insilico 成立于 2014 年，聚焦用基因组学、大数据和深度学习做 AI 药物发现，在 Boston、Hong Kong 和 New York 运营。其模型以发现为中心，而非开发为中心；与
              Formation Bio 的重叠主要在资产竞争层面（争夺同一类可授权治疗领域），而不是执行方法。

              Isomorphic Labs 是 Alphabet Inc.（DeepMind）的子公司，2025 年 4 月完成首轮外部融资 $600 million，并在 2024 年 1 月宣布与 Novartis 和
              Eli Lilly 合作。Isomorphic 于 2026 年 2 月发布的 Drug Design Engine 宣称，在蛋白-配体预测上实现 AlphaFold 3
              两倍性能，代表了有意义的计算药物设计进展。Alphabet 背书带来非对称竞争威胁：Isomorphic 不需要外部资本，并可利用 Google 的 AI 基础设施；不过截至 2026
              年，它尚未披露临床开发能力。

              BenevolentAI 的竞争位置建立在用于药物靶点识别的自有知识图谱上，但在 2023 年 AstraZeneca 合作结束后重新定位。Relay Therapeutics（NASDAQ: RLAY，2026
              年 5 月市值约 $2.337B）聚焦精准肿瘤学中的蛋白运动计算。Absci Corporation 用生成式 AI 做生物制剂创造，声称从概念到临床管线只需 24
              个月。三家公司主要在药物发现阶段竞争，而非临床开发执行。
