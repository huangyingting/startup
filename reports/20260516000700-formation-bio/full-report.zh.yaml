            body: >-
              2025 年 6 月把 Gusacitinib 授权给 Sanofi（最高 EUR 545M）是合理的风险管理：Formation Bio 移除了近期最消耗资本的风险（Phase 3
              执行），同时锁定了或有里程碑价值。代价是，Formation Bio 不再控制这项最成熟资产的 Phase 3 执行决策、上市批准策略或商业上市节奏。Formation Bio
              的估值现在取决于能否说服新的许可方和投资人相信，ATLAS 能找到并推进下一批 10-15 个资产，而不只是靠已经授权出去的资产兑现里程碑。
