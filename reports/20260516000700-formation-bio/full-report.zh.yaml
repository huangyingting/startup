        - 索取完整交易条款；Formation 在任何新股融资资料室中都必须披露
      - - KMR301、BLKR201、RVW101 的管线阶段确认
        - 已列出 5 个资产，但截至 2026 年 5 月，其中 3 个的阶段 / 适应症未公开
        - 阶段决定成功概率和 rNPV 贡献；未经验证的阶段会抬高或压低分析
        - 检索 ClinicalTrials.gov 注册；公司资料室
      - - 当前现金余额和月度烧钱速度
        - 未公开披露资产负债表数据；年烧钱速度估计为 $80–200M，区间很宽
        - 没有现金余额就无法判断现金跑道；2 年跑道 vs. 3 年跑道会显著影响下一轮融资风险
        - 截至 2025 年 Q4 的经审计资产负债表；按类别列示月度烧钱速度的管理账
      - - 股权结构表和优先股堆叠
        - a16z、Sequoia、Sanofi 的优先股条款未披露；清算优先权悬顶未知
        - 优先股堆叠决定普通股有效价值；优先权堆得过高时，$3B 以下退出会让 $1.8B 入场价值归零
        - 法律尽调；签署投资条款清单前必须完成瀑布分析
      - - AI 平台效率的第三方验证
        - 公司称试验速度提升 50%；没有独立审计、监管文件或合作伙伴确认其基准对比
        - AI 效率溢价隐含平台价值约 ~$400–600M；若无法验证，应移除该溢价
        - 索取 3–5 个已完成试验案例；数据库锁定时间 vs. CRO 基准；Sanofi 合作伙伴证词
    notes: 第 1–4 项是在当前估值标记下签署投资条款清单前的阻断项；第 5–6 项是法律和回报模型尽调的必需项。
