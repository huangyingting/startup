      - number: '4.5'
        title: 估值分析与可比公司
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 在 Series D 后约 $1.8 billion 的估值（Forbes，2026 年 4 月）使其进入全球领先私营 AI
              制药公司之列。几组估值框架都有参考意义，但各有局限。相对累计融资额（约 $615M），$1.8B 标记意味着投入资本倍数为 2.9×——对成长期平台公司算合理，但相对于顶级 AI
              公司的风险投资预期并不激进。相对第三方收入估计 $39–42 million， 隐含 EV/收入倍数约 43–46×，远高于 2024 年上市生物技术公司 EV/收入倍数中位数约 6.5×；不过考虑到
              Formation 的收入由里程碑驱动，这一比较意义有限。公司应按管线 NPV 和交易流期权价值来估，而不是当前收入运行率。PitchBook 研究显示， 2024–2025 年 AI
              原生生物技术公司相较传统生物技术同行享有“接近 100% 的估值溢价”，为 Formation 的溢价定位提供市场背景。 可比公司显示 AI 药物发现板块波动很大。Recursion
              Pharmaceuticals（RXRX）市值从峰值约 $9 billion 下滑至 2025 年末并购 Exscientia 后约 $2.3 billion（收购价 $688M），尽管公司拥有 10+
              个临床管线项目和大型药企合作。Insitro 最近一次私营估值超过 $2 billion（2021 年），Owkin 也跨过独角兽门槛；这些案例把 Formation 的 $1.8B 放在可信私营 AI
              制药平台估值区间内。 Forbes（$1.8B）、TechCrunch（$1.6B）和 PremierAlts（$1.7B）披露的估值差异，反映出缺乏公司确认数字； Formation 拒绝向
              TechCrunch 披露 Series D 后精确估值。投资人应注意，2022 年后 AI 药物发现上市公司倍数压缩明显； 如果 Formation
              按当前上市可比公司水平寻求公开退出，其私营估值标记存在实质盯市风险。
