          detail: 年度新药批准（NME + 生物制品）；约占原始 Phase I 进入者的 ~1%
    approximationNotes: >-
      管线漏斗估计基于 FDA 获批率数据和 ClinicalTrials.gov 注册统计。年度数量会随年份和治疗领域变化。Phase II 25–28% 的成功率反映跨治疗领域平均值；肿瘤成功率更低（约
