        - date: '2016-01-01'
          label: Formation Bio 以 TrialSpark 名义创立
          detail: Benjamine Liu 和 Linhao Zhang 在 New York City 联合创办 TrialSpark，聚焦用 AI 加速临床试验站点运营。公司完成早期天使融资并搭建团队。
          tone: positive
        - date: '2017-03-01'
          label: Y Combinator W17 批次 — 种子轮融资约 $6M
          detail: >-
            TrialSpark 参加 YC Winter 2017 批次；从 Omidyar Network、YC、Social Capital 和 F-Prime Capital 融资约 $6M。Sequoia
            Capital 和 Thrive Capital 在后续早期轮次加入。
          tone: positive
        - date: '2021-06-01'
          label: Series C 轮 — 融资约 $156M，估值约 $1.0B
          detail: >-
            Formation Bio 完成约 $156M Series C 融资，由 Sequoia 和 Thrive Capital 领投，Sam Altman、John Doerr 以个人身份参与。投后估值约
            $1B。公司从试验站点运营转向 AI 原生药物开发平台。
          tone: positive
        - date: '2022-01-01'
          label: 更名为 Formation Bio — 拓展使命
          detail: TrialSpark 正式更名为 Formation Bio，意味着战略从临床站点运营扩展到完整的 AI 驱动药物开发，包括资产收购和药企合作模式。
          tone: positive
        - date: '2024-06-26'
          label: Series D 轮 — 融资 $372M，估值约 $1.8B
          detail: >-
            Andreessen Horowitz 领投 $372M Series D，Sanofi 大额参与，Sequoia、Thrive、Emerson Collective 继续支持。董事会新增 Scott
            Kupor（a16z）和 Alfred Lin（Sequoia）。累计融资超过 $600M。资金用途指定为管线收购和研发。
          tone: positive
        - date: '2025-04-02'
          label: Mikael Dolsten（前 Pfizer 研发负责人）出任战略顾问
          detail: >-
            前 Pfizer 首席科学官 Mikael Dolsten 加入 Formation Bio，担任 Drug Picking Committee 主席和 Investment Advisory Committee
            联席主席，为公司补上数十年顶级药企研发可信度。
          tone: positive
        - date: '2025-06-23'
          label: Sanofi Gusacitinib 交易 — 最高 €545M（约 $626M）
          detail: >-
            Libertas Bio（Formation Bio 子公司）将 gusacitinib 的新适应症许可给 Sanofi。交易包括未披露的首付款、合计最高 €545M
            的里程碑付款，以及净销售额低十几个百分点到中十几个百分点的特许权使用费。这是许可模式财务规模首次获得重大公开验证。
          tone: positive
