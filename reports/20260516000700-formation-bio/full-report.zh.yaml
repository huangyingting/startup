  - id: TE004
    title: 技术风险登记表——Formation Bio AI 平台
    columns:
      - 风险
      - 类别
      - 严重程度
      - 现有证据
      - 概率评估
      - 缓释措施或尽调路径
    rows:
      - - 未验证的研发提速主张
        - 性能风险
        - 高
        - 无公开基准；一周完成 Sprifermin 分析只是单个案例；Formation Bio 管理下尚无 Phase 3 结果发表
        - 该风险高概率会在 IPO 或许可谈判时变得实质化
        - 要求按管线资产提供内部审计过的周期数据；委托第三方做基准审计
      - - OpenAI API 供应商集中
        - 技术风险
        - 中
        - 两个核心工作流已记录对 OpenAI 向量嵌入和 LLM 查询的依赖
        - 中——OpenAI 定价目前稳定，但企业 API 访问不保证长期可得
        - 评估备用 LLM 供应商（Anthropic、Azure OpenAI、开源方案）；测算切换成本影响
      - - 临床数据工作流中的 LLM 可靠性
        - 技术风险
        - 中
        - 博客承认初始处理后的组件重叠仅约 9%；终点去重需要多轮提示词工程
        - 中——当前用途是决策支持，不是自主行动；人工验证可部分缓释
        - 要求按工作流步骤提供错误率数据；验证 Muse 人工审批关口协议
      - - 平台页面无法访问（外部尽调缺口）
        - 披露风险
        - 中等
        - 平台页和关于页由 JS 渲染，对爬虫不返回内容；没有正式公开的平台规格说明
        - 故意隐藏的概率低；更可能是技术疏忽
        - 在 NDA 下索取正式平台规格和架构文档
      - - 工程领导层关键人物集中
        - 人才风险
        - 高
        - 平台完全自研；平台架构没有公开文档；CTO Linhao Zhang 似乎是技术愿景的核心
        - 中——这一阶段常见；药企侧聘请 Mikael Dolsten 可部分缓释
        - 要求提供工程组织架构；评估 CTO 和平台团队负责人的继任计划
      - - FDA AI 监管要求演进
        - 监管风险
        - 中等
        - FDA 2025 年 1 月指南草案和 2026 年 1 月 FDA-EMA 原则要求申报材料包含 AI 验证文档；Formation Bio 的 AI 目前用于决策支持，不是申报内容
        - 近期风险低到中；平台进入申报工作流后风险上升
        - 监测 FDA CDER AI Council 指引更新；确保法规事务团队跟踪监管要求变化
    notes: 风险登记表依据工程博客披露、GitHub 分析和 FDA 监管指引文件编制。风险概率和严重程度是分析师基于可得证据的评估，并非来自 Formation Bio 管理层陈述。
    enumerationScope:
