        - 中 — Recursion 有资本，但管线来源不同（内部发现 vs. 引进授权）
        - 扩大并加深引进授权管线多样性；把资产更快推到经济价值最高的后期阶段
        - 要求披露 10 个引进授权资产的当前管线状态；核验 2/3 期推进率与初始预测的差异
      - - 经验证的大药企合作证据（Pfizer、Sanofi）
        - 强 — Pfizer 和 Sanofi 交易已公开披露；Gusacitinib 授权确认结果层面验证
        - Pfizer 和 Sanofi 正在建设内部 AI 平台，长期可能降低对 Formation Bio 的依赖
        - 中（3-5 年周期）— 当前合作已承诺，但续约不确定
        - 把合作方从 2 家药企向外扩；再增加 2-3 家大型药企共同开发关系
        - 获取 Pfizer 和 Sanofi 合作协议条款及续约 / 延长期权；核验里程碑完成情况是否符合计划
      - - AI 药物开发赛道的先发位置
        - 截至 May 2026，Formation Bio 仍是先行者，尚无直接同类竞争者；Isomorphic Labs 和 Recursion 还没有跑同一种模式
        - Isomorphic Labs 拿到 $600M，背靠 Alphabet；如果赛道跑通，可能很快补齐开发能力
        - 中高（3-7 年视角）— Alphabet 支持的竞争者入场，是品类层面的生存风险
        - 在资金充足的入场者追到同一阶段前，加快管线扩张，把 >3 个资产推到获批
        - 索取 Formation Bio 内部竞争监测方案，以及关于 Isomorphic Labs 或 Recursion 临床开发计划的任何情报
      - - 引进管线质量与供给
        - 约 10 个临床阶段引进候选药；治疗领域覆盖自身免疫、TYK-2、骨关节炎、皮肤科
        - AI 制药上游拥挤（150+ 家公司争抢同一批可授权资产）；TYK-2 类别也拥挤（Deucravacitinib 已获批）
        - 中 — 高质量可授权资产竞争加剧；BLKR201 面临 TYK-2 类别风险
        - 强化资产筛选 AI，找出监管路径最清晰的资产；把治疗领域从拥挤类别向外分散
        - 索取 Formation Bio 的资产筛选 AI 标准和管线筛查方法；如有 BLKR201 与 Deucravacitinib 的头对头差异化数据，审阅这些数据
    notes: >-
      威胁严重性是基于公开证据的定性研究判断。所有护城河评估都反映 Formation Bio 当前（May 2026）的竞争位置；格局变化很快。尽调问题是正式尽调中可执行的索取事项，并非基于 Formation Bio
      已披露信息。150+ 家 AI 制药公司数据来自 Deep Pharma Intelligence；这只是粗略估计，可能涵盖从种子轮到接近商业化的不同发展阶段公司。
