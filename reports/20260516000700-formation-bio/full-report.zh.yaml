      - number: '5.3'
        title: 相对 CRO 和 AI 新药发现公司的技术差异
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 在药物技术版图中位置独特：它既不是合同研究组织（CRO），也不是 AI 药物发现公司，而是一家 AI 原生、纵向整合的制药公司， 自己持有药物资产并控制完整开发流程。


              相比传统和技术赋能型 CRO（IQVIA、Medidata、Parexel），Formation Bio 最关键的结构差异是激励对齐。CRO 按服务收费，
              从单个药物项目提速中获得的上行空间有限；Formation Bio 对管线资产承担完整商业风险，因此有直接财务动力去最大化开发速度和资本效率。 Medidata 报告称，2025 年 100% 的 FDA
              新药批准都使用其平台，说明 CRO 有很深的市场渗透和临床基础设施，Formation Bio 无法在规模上复制。但 CRO 的 AI 工具运行在既有、由申办方定义的方案和工作流之内；Formation Bio
              则用 Inverse Conway Maneuver 理念重做工作流本身。


              相比 AI 药物发现公司（Recursion Pharmaceuticals、Insilico Medicine、Absci），Formation Bio 不靠 AI 靶点识别或分子设计生成新的药物候选物；
              它引进已展示临床生物学基础的候选物，再用 AI 压缩开发阶段，而不是发现阶段。这把技术风险集中在运营效率，而不是同类首创 靶点识别上，也让管线扩张速度取决于交易团队能多快找到并尽调临床阶段资产。


              Formation Bio 最持久的技术优势包括：(1) 自研结构化临床试验知识库（260,000+ 项研究、6.5M 个组件），竞争对手很难复制； (2) Muse 患者招募平台，专为 Formation
              Bio 的具体运营模式搭建；(3) 通过 Atlas 形成可复利的组织记忆，每一轮药物评估都会提升它； (4) Sanofi/OpenAI 合作带来药企领域专用模型微调能力，超过通用 LLM API
              所能提供的水平。


              纯 AI 差异化的竞争窗口正在收窄：IQVIA 已与 NVIDIA 在医疗 AI 上合作，Medidata 有自己的 AI 平台，Parexel 提供 AI 赋能的试验设计。 Formation Bio
              的长期护城河必须来自药物资产组合的复利价值，以及用 AI 系统端到端管理多项试验后沉淀的组织知识。
