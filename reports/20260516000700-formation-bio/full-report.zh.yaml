      - number: '6.4'
        title: 临床试验中心与患者参与
        blocks:
          - type: paragraph
            body: |
              Formation Bio 运营——此前以 TrialSpark 名义运营——一个自有专属研究中心网络，品牌为“TrialSpark Investigative Site”，
              并带有唯一数字编码。ASN008 特应性皮炎 2 期试验（NCT05870865）覆盖美国 18 个州的 27 个此类中心，
              入组 144 名患者（ClinicalTrials.gov 显示为实际入组），且已完成。覆盖州包括 California、New York、Florida、Texas、Ohio、
              Arizona、Virginia、Indiana、Washington、Utah、Louisiana、Kentucky、Missouri、North Carolina、Oklahoma、Michigan、
              Arkansas 和 Pennsylvania；这种分布显示它拥有覆盖主要都会区和二线皮肤科市场的全国性中心网络。BLKR201 1 期研究（NCT07501039）
              正在 Nebraska 的 Lincoln 一家中心招募；对 1 期健康志愿者剂量递增研究而言，单中心设计很常见。

              在更名为 Formation Bio 之前，Andreessen Horowitz 投资公告称 TrialSpark 曾支持 10+ 个治疗领域的 300+ 项试验。
              这一历史规模表明，中心网络和临床运营能力并非刚起步，而是在约七年的活跃临床运营中建立起来的。Formation Bio 临床试验页面明确邀请患者、
              医生和研究者加入即将开展的试验，并承诺患者多样性、数据透明和扩大用药可及性。当前已确认的所有试验中心都在美国；后续 3 期项目或全球监管申报需要的美国以外中心开发，
              可能要由 Sanofi 这类被授权方处理，或通过新的国际中心建设完成。
