      - number: '4.4'
        title: 现金消耗、现金跑道与资本投放
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 不公开披露现金余额、月度烧钱速度或资产负债表；所有烧钱分析都只能依赖可观察代理变量和已披露融资数据。 公司约 190–207 名员工（Growjo 和 CompWorth，2026
              年初）相对于 10 个资产的临床管线显得精简，支撑其 AI 效率逻辑。 按每名员工每年 $150,000–$200,000 的全成本估算，年度人员支出约 $30–40
              million。最大成本驱动项是临床试验运营： 免疫学、皮肤病等治疗领域的 2 期和 3 期临床试验通常每个项目每年需要 $10–50 million，用于外部 CRO 费用、中心成本和试验用药供应。
              若任一时点约 5–8 个项目处于活跃状态，Formation 与试验相关的年度支出可能为 $50–150 million，合计估计年度烧钱速度为 $80–200 million。对照 2024 年 6 月完成的
              $372 million Series D，截至 2026 年 5 月（交割后约 23 个月）估计剩余资本约 $172–292 million，在下一次融资事件前还能支撑约 1.5–3.5 年。该估计尚未计入
              2025 年 6 月 Sanofi gusacitinib 交易中的现金首付款；该金额未披露，但按 €545M 名义价值的 10–20% 估计，可能贡献 $63–125 million，
              并实质延长现金跑道。Formation 将 Series D 资金指定“主要用于合作伙伴获取和 R&D”，说明资本正在主动投向新资产获取，而不是保守留存。 截至 2026 年 5
              月，没有公开报道裁员、运营收缩、紧急过桥融资或困境信号等负面财务迹象；2025 年 4 月 Dolsten 加盟、管线持续扩张以及 Sanofi
              交易，都符合资金充足的运营状态。关键未知数在于，在第一款药物商业化之前（这仍是多年周期），Formation Bio 是否需要 Series E； 答案取决于更多授权交易带来的交易流收入规模。
