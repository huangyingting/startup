            title: FDA AI 指引定稿是优先级最高的监管观察项
            body: >-
              2025 年 1 月 FDA 关于药物开发中使用 AI 的指南草案，是 Formation Bio 近期最关键的外部风险事件。公司应积极参与意见征询期、pre-IND 会议和 CDER AI Council
              沟通。投资人应要求确认 Formation Bio 是否提交了公开意见、是否收到 FDA 对其 AI 方法的任何反馈，以及是否已有计划遵守最终指南。若未主动参与，现有 IND
              申报可能面临追溯性合规要求，风险会上升。
