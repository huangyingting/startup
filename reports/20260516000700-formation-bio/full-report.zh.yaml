  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局分层与 Formation Bio 的市场位置
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的竞争格局需要横跨三个结构上不同的分层来分析，因为其商业模式站在药物开发资产所有权和 AI 驱动试验执行的交汇处——现有分析师框架无法干净覆盖这一类别。第一层是 AI
              原生药物发现和开发公司（Recursion Pharmaceuticals、Insilico Medicine、Isomorphic Labs、BenevolentAI、Absci、Relay
              Therapeutics），它们主要在临床试验上游用 AI 做靶点识别和分子生成。这些公司与 Formation Bio
              争夺投资人叙事，也在交易管线中争夺可引进授权的临床阶段资产；但它们的核心价值主张位于临床前阶段，Formation Bio 并不在这一环节运营。第二层是传统合同研究组织——IQVIA（市值
              $28.2B）、Medpace（市值 $11.86B）、ICON plc 和 Parexel——它们按服务收费执行临床开发。这些既有厂商
              拥有深厚制药客户关系和全球基础设施，但不持有药物资产，也不分享获批后的上行。第三层是大型制药企业内部 AI——Pfizer 和 Sanofi 正在扩张的内部计算项目；它们同时是 Formation Bio
              的合作伙伴，也可能在未来把其平台能力内部化。

              Formation Bio 的独特位置由一个组合定义，目前没有竞争对手能在可比规模上复制：通过引进授权获得临床阶段资产，再用 AI
              优化的试验执行推动这些资产走向监管批准，并在成功后捕获完整药物经济价值。这个模型在类别上不同于 CRO（为客户服务但不持有资产），也不同于 AI 发现公司（从零搭建自有管线但不专攻执行）。Sanofi 的
              Gusacitinib 授权交易——Formation Bio 把一个临床资产管理到 Phase 3 后再授权给 Sanofi——是目前最强的公开证据，证明这一模型在实践中可行，并被大型制药伙伴认可。
