  - id: FI002
    title: Formation Bio 收入模式流向
    type: flow
    data:
      nodes:
        - id: asset-sourcing
          label: 药物资产来源
          detail: 从小型生物技术公司、学术衍生公司和药企剥离资产引进许可或收购临床阶段化合物（例如来自 Asana BioSciences 的 gusacitinib）
        - id: ai-development
          label: AI 加速开发
          detail: 在试验设计、患者招募、方案优化、监管写作和临床数据分析中使用自研 AI 平台，相比传统 CRO 模式压低成本、缩短时间
        - id: licensing-decision
          label: 许可授权与商业化决策
          detail: 每个资产成熟后，Formation 决定对外许可（里程碑 / 特许权使用费模式）或直接商业化；大多数资产以许可为主
        - id: milestone-revenue
          label: 里程碑和首付款收入
          detail: 签约时收取首付款，Phase 完成、监管申报、获批和商业门槛触发里程碑付款；毛利率接近 100%
        - id: royalty-revenue
          label: 特许权使用费收入
          detail: 按合作伙伴净销售额收取低十几个百分点到中十几个百分点的特许权使用费；药物上市后开始重复发生；周期很长（许可后 3–7+ 年）
        - id: direct-commercialization
          label: 直接商业化收入
          detail: Formation 选择直接商业化的药物带来产品销售收入；同时承担制造和分销成本；目前还不是主要收入路径
      edges:
        - from: asset-sourcing
          to: ai-development
          label: 推进临床阶段
        - from: ai-development
          to: licensing-decision
          label: 资产达到可许可里程碑
        - from: licensing-decision
          to: milestone-revenue
          label: 对外许可给药企合作伙伴
        - from: milestone-revenue
          to: royalty-revenue
          label: 药物实现商业化
        - from: licensing-decision
          to: direct-commercialization
          label: 自行商业化（选择性）
    claimRefs:
      - CI015
      - CI016
      - CI012
