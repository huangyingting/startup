      - number: '5.2'
        title: 药物管线——资产、机制与研发阶段
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 已披露的管线包含五个引进授权的药物候选物，横跨三个治疗领域，阶段从临床前到 3 期不等。公司的引进授权模式瞄准临床阶段、 生物学已获验证的资产，让 Formation 能用 AI
              平台压缩开发周期，而不承担早期发现成本。


              KMR301 是一种口服小分子 miR-124（microRNA-124）诱导剂，处于自身免疫疾病临床前开发阶段。miR-124 是在脑部和免疫系统中高表达的 microRNA，已有免疫调节功能记录；合成诱导
              miR-124 是一种疾病修饰路径，可能适用于包括多发性硬化在内的神经炎症性自身免疫疾病。 在一个由生物制剂主导的适应症类别中，以口服小分子诱导特定 microRNA，是差异化机制。


              BLKR201 是一种可穿透 CNS 的 TYK-2（Tyrosine Kinase 2）抑制剂，正处于炎症 1 期开发。BMS 的 Deucravacitinib（Sotyktu） 2022 年获 FDA
              批准用于斑块型银屑病后，TYK-2 抑制已获得临床验证。CNS 穿透性使 BLKR201 区别于已上市 TYK-2 抑制剂， 可能支持其用于外周自身免疫疾病之外的神经炎症适应症。


              RVW101 是用于溃疡性结肠炎的抗 CD226 单克隆抗体。CD226（DNAM-1）是细胞毒性 T 细胞和 NK 细胞上的激活受体，参与黏膜免疫监视；
              阻断该通路为黏膜炎症提供一种新的免疫学路径，在更广泛的共刺激通路调节剂领域已有机制先例。截至 2026 年 5 月，公司公开管线页未说明开发阶段。


              Sprifermin 是重组人纤维母细胞生长因子 18（FGF18），用于膝骨关节炎 2 期开发。FGF18 促进关节软骨合成代谢和软骨下骨重塑，
              相比对症止痛药和手术干预，提供一种疾病修饰路径。该资产此前通过引进授权取得，Formation Bio 已使用 MRI 影像数据完成自研 AI 建模的疾病进展分析。


              Gusacitinib 是一种 SYK/JAK 双重抑制剂（同时靶向脾酪氨酸激酶和 Janus kinases），用于慢性手部湿疹（CHE）3 期开发。 这是 Formation Bio
              最成熟的资产，已对外授权给 Sanofi，构成 Formation Bio 通过平台推进资产后再对外授权模式的首个概念验证。 CHE 是已有 JAK 抑制临床先例的适应症（如 abrocitinib），同时抑制
              SYK 可能带来更宽的抗炎覆盖。


              这条管线体现了 Formation 的刻意策略：在已验证通路类别中寻找机制新颖性，降低同类首创项目的二元风险，同时在竞争性适应症中提出差异化主张。 五个资产覆盖两类模态（小分子和生物制剂 / mAb /
              重组蛋白），以及三个治疗领域（自身免疫 / 炎症、胃肠、肌肉骨骼）。
