      - number: '5.5'
        title: 技术风险与平台局限
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的 AI 原生模式带有几类技术风险，尽调需要仔细评估。


              最实质的风险是缺乏独立验证的发展提速基准。Formation Bio 的核心价值主张是其 AI 平台能压缩临床试验周期和成本，但没有公开数据把 Formation Bio
              管理的试验周期与相同适应症、相同阶段的行业基准作对比。Sprifermin MRI 一周分析案例很有说服力， 但它只是一次计算机模拟尽调演练，不是已经完成的关键性试验。在 Gusacitinib 3
              期数据公开、周期时间得到验证之前， 提速主张仍建立在公司报告案例之上，缺乏第三方验证。


              供应商集中风险真实存在。Formation Bio 已记录使用 OpenAI API 做临床数据结构化（终点向量嵌入）和适应症格局梳理 （网页搜索增强的 LLM 查询），这让公司依赖 OpenAI 的定价、API
              稳定性和模型性能。公司自己的工程博客承认了 LLM 局限： 终点去重需要多次迭代才达到可接受准确度，初始处理时在 260,000+ 项试验中只有约 9% 的研究组件被发现存在重叠——说明知识库要释放实际效用，
              需要大量工程投入。


              受监管临床工作流中的 LLM 可靠性仍是活跃挑战。FDA 2025 年 1 月草案指南要求，支持监管申报的 AI 生成数据必须包含验证文件、 性能指标和人工监督方案。Formation Bio 的 LLM
              增强适应症格局工具包含人工反馈回路（通过 Temporal 暂停和恢复信号）， 但这些机制在多大程度上满足 FDA 对 AI 生成临床证据不断成形的验证要求，公开信息尚未说明。


              围绕创始 CTO Linhao Zhang 和核心平台工程团队的工程人才集中风险较高。Formation Bio 的平台是定制开发，并非基于商业现成产品； 工程团队关键人员离职可能造成显著开发中断。GitHub
              仓库部分开源（Bimini、React 工具），能缓解一部分知识锁定风险，但不覆盖专有核心平台。
