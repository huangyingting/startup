      - number: '6.3'
        title: 药物授权交易对手——资产引进与对外授权
        blocks:
          - type: paragraph
            body: |
              Formation Bio 的商业模式依赖从生物技术公司和药企以能留下盈利空间的价格获取高质量临床阶段资产。已有三笔收购或授权交易得到公开确认。
              Asana BioSciences 交易（2022 年 11 月）带来 gusacitinib 和更广的免疫皮肤病组合；Formation Bio 成立 Libertas Bio
              管理这些资产，并随后将 gusacitinib 推进至慢性手部湿疹 3 期。Lynk Pharmaceuticals 交易授权 BLKR201
              （LNK01006 的中国以外权益，一种可穿透 CNS 的 TYK2 抑制剂），由 Endpoints News 独家报道；1 期招募于 2026 年 4 月开始。
              Merck KGaA 交易授权 Sprifermin（用于膝骨关节炎的重组 FGF18），并促使 Formation Bio 成立 High Line Bio；该项目目前处于 2 期。

              对外授权方面，Sanofi gusacitinib 交易（2025 年 6 月）是 Formation Bio 唯一已确认的药物资产出售 / 授权事件。
              Sanofi 获得 gusacitinib 授权，将在一个此前未研究过的新适应症中通过 1 期研究开发；Formation Bio 的 Libertas Bio
              子公司则保留慢性手部湿疹 3 期项目。交易结构——首付款加里程碑加版税——是大型药企授权的标准模式，也确认 Formation Bio
              药物资产的退出路径是授权，而不是母公司的 IPO 或被收购。首付款与各里程碑分期之间的财务拆分未披露，使得该交易的近期现金影响难以建模。
              BLKR201 TYK2 项目所处治疗领域已有可比交易达到数十亿美元估值，因此未来可能成为高价值对外授权候选。
