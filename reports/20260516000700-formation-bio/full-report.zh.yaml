  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 自 2016 年成立至 2024 年 6 月 Series D 轮累计融资约 $615 million， 多个阶段里拼出了一组顶级投资人阵容。公司最初名为 TrialSpark，进入
              Y Combinator 2017 年冬季批次，随后从 Omidyar Network、Y Combinator、Social Capital 和 F-Prime Capital Partners 获得约 $6
              million 种子轮资金。早期机构轮次（Series A/B，2018–2020 年合计估计 $80–87 million）引入 Sequoia Capital 和 Thrive Capital
              领投，并有其他投资方 参与。2021 年 Series C 轮融资约 $156 million，投后估值 $1 billion；除 Sequoia 和 Thrive 外，Sam Altman、John Doerr
              等个人投资者也参与其中。这也是 TrialSpark 在 2022 年前后更名为 Formation Bio 之前的最后一轮融资。最关键的融资事件是 2024 年 6 月完成的 $372 million
              Series D 轮，由 Andreessen Horowitz 领投，药企 Sanofi 以重要战略投资方身份参与，Sequoia、Thrive 和 Emerson Collective 继续跟投；新投资者
              SV Angel Growth 和 FPV Ventures 加入。Formation Bio 拒绝披露精确投后估值；Forbes 在 2026 年 4 月画像中报道为 $1.8
              billion，TechCrunch 引用约 $1.6 billion，PremierAlts 估计为 $1.7 billion。公司只确认 Series D 相比 $1 billion 的 Series C
              标记是一次“实质性上调”。董事会治理也增强：Scott Kupor（a16z 管理合伙人） 和 Alfred Lin（Sequoia 合伙人）加入董事会，与既有董事 Michael Moritz
              共事。资本结构仍是后期私营公司形态， 没有公开经审计财报；提交给 SEC 的 Form D 文件确认了私募融资，但不包含财务报表数据。Sanofi 既是 Series D 财务投资方，又是 2025 年 6 月
              gusacitinib 交易的授权合作伙伴，这让 Formation Bio 最大战略合作方与其资本结构之间形成了少见的激励对齐。
