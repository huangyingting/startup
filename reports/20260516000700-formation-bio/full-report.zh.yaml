      - number: '1.2'
        title: 创始人、领导层和治理
        blocks:
          - type: paragraph
            body: >
              Formation Bio 由 Benjamine Liu（CEO）和 Linhao Zhang（CTO）于 2016 年共同创立。到 2026 年，Liu 约 36 岁，拥有 University of
              Oxford 计算生物学博士学位；他在学术研究中发现药物开发瓶颈，当时制药公司拒绝了他的新型阿尔茨海默病候选药物，理由是待开发药物已经多到负担不起。Zhang 约 34 岁，是计算机科学家，此前曾任 Oscar
              Health 早期工程师，把技术平台搭建经验带进制药领域。


              高管团队包括首席开发官 Gavin Corcoran，他此前在 Allergan 担任首席医疗官；Allergan 曾用类似的引进授权方式搭建药物组合。按 $1.8B 估值测算，Forbes 估计 Liu
              的持股价值超过 $150 million，Zhang 超过 $100 million。投资人称，创始团队已经集结一批高管和顾问，合计参与过 45 个获批药物，在从其他公司引进授权和收购候选药物上经验很深。


              董事会构成并未完全公开。Andreessen Horowitz 的 Scott Kupor 于 2024 年 6 月撰写了该公司的投资公告；据报道，亿万富翁风投家、前 Sequoia 董事长 Michael
              Moritz 开出了公司的第一张支票。Liu（愿景、商务拓展、融资）和 Zhang（技术平台）均存在较高关键人集中度；以公司所处融资阶段看，治理披露有限。
