chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品和商业模式
        blocks:
          - type: paragraph
            body: >
              Formation Bio, Inc.（前身为 TrialSpark, Inc.）是一家私营 AI 原生制药开发公司，总部位于纽约州纽约市。公司由 Benjamine Liu 和 Linhao Zhang 于
              2016 年创立，是 Y Combinator 2017 届成员。Formation Bio 于 2024 年 6 月从 TrialSpark 更名，同时完成 Series D
              融资。公司自称要把人工智能和药物开发经验结合起来，打造未来的制药公司。


              不同于许多聚焦药物发现的 AI 生物技术公司，Formation Bio
              押注药物开发阶段——运行临床试验、把获批药物送到患者手中的漫长且昂贵流程。公司的商业模式围绕从制药和生物技术公司引进授权并收购临床阶段候选药物，再用 AI
              驱动的药物开发引擎推进这些资产完成临床试验，效率高于行业标准。Formation Bio 已经组建了约 10 个引进授权药物资产的管线，覆盖多个治疗领域。


              公司的 AI 平台覆盖临床试验设计与方案优化、中心选择与启动、患者招募与入组、监管情报以及临床运营管理。在转向完整药物开发之前，TrialSpark
              曾是临床试验技术和服务提供商，为制药申办方服务。转型为药物资产持有方，意味着公司从按服务收费的技术供应商，变成拥有直接药物权益的垂直整合制药公司。
