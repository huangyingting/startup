      - number: '5.4'
        title: 合作伙伴技术整合——Pfizer、Sanofi 与 OpenAI
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 有三项战略合作，既提供资本认可，也提供技术入口。


              Pfizer 合作聚焦 AI 临床试验软件。作为全球最大药企之一，Pfizer 同时为 Formation Bio 平台提供商业验证信号 （证明药企愿意为 AI 临床试验工具付费），也可能成为 Formation
              Bio 自有管线之外软件授权收入的参考客户。具体技术范围——究竟是软件许可、 特定 AI 模块共同开发，还是更广的数据合作——截至 2026 年 5 月，公开材料中尚未完整披露。Pfizer 前首席科学官
              Mikael Dolsten 随后加入 Formation Bio，让这层战略关系更深。


              Sanofi 是 Formation Bio 整合度最高的外部合作伙伴。它深度参与了 2024 年 6 月 $372M Series D 融资（由 a16z 领投），
              成为有直接动力推动平台成功的财务股东。Sanofi 也是 Gusacitinib（3 期、慢性手部湿疹）的被授权方，意味着它直接暴露于 Formation Bio
              开发平台的质量。这种投资方、合作伙伴、产品被授权方三位一体的关系，让 Sanofi 既能优先接触平台情报，也在管线执行上有真金白银的利益绑定。


              Sanofi/Formation Bio/OpenAI 三方合作被描述为通过结合 Sanofi 的药企数据和领域知识、Formation Bio 的平台工程和工作流自动化、 OpenAI
              的模型微调能力，开发“覆盖药物开发生命周期的定制 AI 解决方案”。这项合作的重要性在于，它不止是使用通用 API： 在专有制药数据上做定制模型微调，可能产出特定领域 AI 系统，性能优于使用现成 API
              的竞争对手在缺乏类似合作时能复制的通用 LLM。


              这些合作网络叠加后，意味着 Formation Bio 已验证地接入两家全球前五大药企的运营知识，拿到一家大型战略投资方的直接财务押注， 并拥有一条以临床试验数据微调 AI
              模型的共同开发路径——围绕平台形成了可防守的合作伙伴护城河。
