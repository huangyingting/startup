      - number: '3.4'
        title: 护城河耐久性、差异化分析和竞争风险清单
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的主要竞争护城河是资产所有权经济性（捕获获批上行，而非服务费）、合作伙伴验证（Pfizer 和 Sanofi 交易在规模上验证平台）以及其在 AI
              原生药物开发类别中的先发位置。这些护城河真实存在，但也有重要限制：商业模式本身没有专利保护，AI 平台方法尚未公开对照 CRO 基准测试，资本最密集的竞争者（Isomorphic
              Labs、Recursion）正在主动建设临床开发能力，可能向 Formation Bio 的市场位置收敛。

              对 Formation Bio 竞争位置最可信的反向情景，是 IQVIA 加入资产所有权组件——本质上变成一个同时运行试验的药物开发商——这会让 Formation Bio 相对最大 CRO 既有厂商
              的模型差异消失。第二个反向情景是 Recursion 收购 Exscientia 后 平台成熟为有竞争力的引进授权和 AI 开发能力，把一家资本充足的上市公司带入同一临床阶段资产的直接竞争。Recursion
              52 周股价区间为 $2.80-$7.18（当前价格接近低点 $2.93），这是投资人尚未验证 Recursion 路径的反向信号；但对 Formation Bio 的下行影响仍具方向性。

              Formation Bio 的 TYK-2 抑制剂（BLKR201，Phase 1）面对拥挤的治疗类别：Bristol-Myers Squibb 的 Deucravacitinib（Sotyktu）已经获 FDA
              批准用于斑块型银屑病，意味着 BLKR201 必须在疗效、安全性或商业定位上证明临床意义明确的差异。尚无 AI 药物开发公司作为主要设计 / 开发加速者拿到 FDA 批准；Formation Bio
              的获批记录仍是开放问题，并将在未来 3-5 年定义这个类别。

              尽调中最重要的竞争未知数是：（1）Formation Bio 的量化 AI 表现相对 CRO 行业基准如何（无公开数据）；（2）资产筛选 AI 面对复制时的防御力；（3）随着大型制药公司建设内部 AI
              临床能力，制药合作伙伴会不会在 5-10 年周期内把平台内部化。Sanofi 合作中，Sanofi 既共同出资开发，随后又引进授权该资产；这是目前最强的公开证据，说明 Formation Bio
              的模型创造了大型制药公司愿意付费的价值。
