      - number: '4.3'
        title: 药企合作经济性——Sanofi gusacitinib 交易
        blocks:
          - type: paragraph
            body: >-
              2025 年 6 月将 gusacitinib 授权给 Sanofi，是 Formation Bio 历史上公开披露的最重要财务交易， 也最清楚地展示了其合作经济性。Gusacitinib 是一种口服
              JAK/SYK 双重抑制剂，Formation 于 2022 年末从 Asana BioSciences 取得，并通过 AI 加速的试验运营推进到慢性手部湿疹 3 期开发。Formation 子公司
              Libertas Bio 执行了这笔授权交易。Sanofi 获得 gusacitinib 授权，将从 1 期研究开始探索其在一个此前未研究过的新适应症中的潜力； Formation 则保留正在进行的慢性手部湿疹
              3 期项目。财务条款包括一笔未披露的现金首付款，以及与 Sanofi 在新适应症中临床和商业进展挂钩的里程碑付款； 首付款加里程碑合计最高 €545 million（约 $626
              million）。Formation 还保留未来 gusacitinib 净销售额中约 10% 出头至 15% 左右的版税。行业中 3 期阶段资产授权的先例显示，首付款通常占交易总价值的
              10–20%，这意味着潜在首付款可能为 $63–125 million，对 Formation 的现金跑道有实质意义。Sanofi 同时担任 Series D 投资方和授权合作伙伴，
              反映出一种在纯市场化生物技术交易中并不常见的战略对齐；这层关系可能带来更多交易流、共同开发机会和商业化基础设施入口。 这笔交易验证了 Formation 的核心判断：AI
              加速开发可以打造经济性更好的资产。€545M 的名义交易价值明显高于将 gusacitinib 推进至 3 期的估计资本成本基础。若 Formation 在现有管线中另外 2–3
              个资产上复制哪怕部分同类交易结构， 现有组合带来的总交易价值可能接近或超过 $1 billion 的累计里程碑，相对于累计投入资本有吸引力的财务上行空间。
            claimRefs: []
