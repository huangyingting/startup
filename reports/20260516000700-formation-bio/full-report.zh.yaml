      - number: '7.3'
        title: 财务、估值与现金跑道风险
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的财务风险叠加了几层压力：药物开发本身烧钱，里程碑和特许权使用费收入高度离散，上一轮私募估值停留在 2024 年 6 月，同类公司又经历了严重的市值压缩。公司已披露累计融资约
              $615M，其中 $372M Series D 据报以 $1.8B 投后估值完成。收入、毛利率、现金余额和损益表指标均未公开披露。第三方算法估算其年收入为 $39-42M，但 Formation Bio 未确认。


              按估算的 190-207 名员工计算，仅人头驱动的年度现金消耗约 $30-40M。正在推进的临床项目（Phase 1-3 资产）可能再带来每年 $50-160M 临床成本，合计年度现金消耗约
              $80-200M。在这一消耗区间内，Series D 剩余资金——截至 2026 年 5 月估计为 $170-290M——对应 2-3 年资金续航期。$1.8B 估值已经滞后 23 个月。最直接可比的上市 AI
              药物发现公司市值较峰值下跌 70-80% 以上：Recursion Pharmaceuticals (RXRX) 曾超过 $10B，2026 年初交易市值约 $1.5-2.5B。对估算收入套用 5-8x
              收入倍数，隐含公允市场价值为 $200-340M，较 2024 年 6 月 Series D 价格折价 81-89%。Formation Bio 的收入模型完全取决于临床结果：与 Sanofi 的
              Gusacitinib 交易（最高 EUR 545M 里程碑）是近期最主要的收入事件，但里程碑付款取决于 Phase 3 成功、监管批准和商业上市，每一项都存在不确定性。
