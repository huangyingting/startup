      - number: '2.4'
        title: 增长驱动因素和采用约束
        blocks:
          - type: paragraph
            body: >-
              AI 药物开发市场受到结构性驱动因素推动，这些因素强化了 Formation Bio 路线的合理性；但有意义的采用约束也会压低近中期市场时点。


              主要驱动因素——药物开发成本持续上升：Tufts CSDD 最常被引用的估计显示，开发并获批一个药物的平均成本为 $2.6 billion（包含资本成本和失败成本）。Deloitte 2025
              年制药创新回报分析确认，行业研发内部收益率回升至 7.0%，但仍低于历史基准，也低于许多项目的资本成本。成本压力让市场迫切需要能缩短开发周期的平台方案。


              次要驱动因素——临床试验失败率高：进入 Phase I 临床试验的候选药物约 90% 无法获得监管批准。Phase II 是损耗最高阶段，成功率因治疗领域而异，约 25–35%。患者招募失败导致约 80%
              临床试验出现延误，是最容易被运营手段缓解的瓶颈。AI 优化的中心选择、患者匹配和方案设计，正面打向这一约束。


              第三驱动因素——疫情后的数字化试验基础设施：COVID-19 疫情加速了去中心化临床试验能力的采用，包括远程监查、数字终点和虚拟患者互动；Formation Bio 的 AI 平台可以利用这些能力。Frost &
              Sullivan 指出，随着制药公司优化非核心试验运营，FSP 和混合外包模型正在扩大。


              约束 1——制药公司内部 AI 能力建设：大型制药公司正在投入数十亿美元建设自有 AI 能力。Pfizer、Sanofi、AstraZeneca、Roche 和 Novartis 均已宣布覆盖临床试验优化的重要
              AI 开发项目。如果大型制药公司能在内部复制 Formation Bio 的 AI 能力，可服务的对外授权机会将收窄。


              约束 2——AI 辅助申报的监管不确定性：FDA 对 AI 辅助方案设计、适应性试验结构和 AI 生成监管申报的态度仍在演进。FDA 的药物开发和批准流程要求尚未正式把 AI 生成洞察纳入 NDA / BLA
              申报。监管延迟风险可能抵消技术效率收益。


              约束 3——资本密集度和现金跑道风险：Formation Bio 的模型需要在药物销售或版税收入兑现之前，投入大量前置资本来收购和开发药物资产。单个 Phase III 试验失败就可能消耗 $200–500
              million。公司已融资 $615 million，提供了资本跑道，但获批前周期漫长，需要投资人持续支持。
