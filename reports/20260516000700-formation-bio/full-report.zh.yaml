      - number: '2.3'
        title: 买方与支付方分层、预算归属和采用路径
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 处在双边市场。供给侧，大中型制药和生物技术公司持有临床阶段药物资产，可能因为资产不符合自身战略治疗重点、需要其无法高效投入的资本，或能受益于 AI
              专门化开发能力，而选择对外授权或共同开发。需求侧，Formation Bio 通过开发资本与 AI 加速临床执行的组合，争夺这些引进授权机会。


              主要分层 1——大型制药战略合作伙伴：Pfizer、Sanofi、AstraZeneca、Eli Lilly 和 Novartis 等公司，是 Formation Bio 验证最充分的买方 /
              合作伙伴分层。这些公司每年在临床研发上投入 $5–15 billion，并持续管理投资组合优先级，由此产生资产剥离或共同开发机会。预算归属在商务拓展和研发领导层。Formation Bio 与 Pfizer 和
              Sanofi 的公开战略合作——两者也都是股权投资人——提供了早期采用背书。采用路径是通过共同开发证明 AI 平台有效，理想结果是获得监管批准，从而为后续交易验证平台。


              主要分层 2——中型制药和生物技术资产持有方：这些公司拥有有潜力的临床阶段候选药物，但缺少足够资本或运营能力来高效推进。Formation Bio 的开发资本，加上 AI
              增强试验质量、可能缩短开发周期并提高资产成功概率的前景，是它们的主要动机。预算归属在 CEO、CSO 和董事会。采用路径是一笔引进授权交易，可能包括里程碑付款、版税分成或原始公司参股。


              主要分层 3——CRO 和试验中心基础设施合作伙伴：传统 CRO、中心管理组织、中心实验室和专科合同研究供应商，构成 Formation Bio 试验执行模型中的运营基础设施。Formation Bio
              协调并优化这些第三方服务，而不是完全取代它们；因此，既有 CRO 关系更可能促成采用，而不是阻碍采用。


              下游分层——支付方和商业市场：对已获批药物而言，商业保险公司、药房福利管理机构、Medicare 和 Medicaid 是最终支付方，其处方集决定和报销费率决定药物经济性。支付方目前并不会因为药物由 AI
              开发就支付溢价；Formation Bio 的 AI 平台不在支付方层面创造定价溢价，只带来内部效率优势。
