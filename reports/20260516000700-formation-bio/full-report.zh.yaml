      站点（ClinicalTrials.gov），以及临床研究站点重新参与率的一般行业常态。Formation Bio
      不披露实际站点留存、合作伙伴续约或队列层面的重复参与数据。所有数值均为分析师估计，仅用于方向性背景，不应作为事实测量引用。队列 = 首次站点参与的时期；列 = 自首次参与后的年份；数值 = 估计该年仍与 Formation
      Bio 活跃合作的站点百分比。后续队列的 第 2 年和第 3 年数值根据早期队列轨迹外推，并加入温和改善系数，以反映 Formation Bio 站点基础设施和工具随时间扩展。
    data:
      columns:
        - 第 1 年
        - 第 2 年
        - 第 3 年
      rows:
        - label: TrialSpark 时代站点（2018–2020 队列）
          values:
            - 100
            - 65
            - 40
        - label: TrialSpark 时代站点（2021–2022 队列）
          values:
            - 100
            - 72
            - 50
        - label: Formation Bio 时代站点（2023–2024 队列）
          values:
            - 100
            - 74
            - 52
    claimRefs:
      - CU011
      - CU014
      - CU030
  - id: FR001
    title: 风险热力图
    type: matrix
    claimRefs:
      - CR001
      - CR006
      - CR010
      - CR014
      - CR018
      - CR021
    description: 二维矩阵按已知缓释措施后的剩余发生概率（低 / 中 / 高）和剩余影响（中 / 高 / 严重）映射 Formation Bio 每项主要风险。位置反映 TR001-TR005 评估的缓释后暴露度。
    data:
      columns:
        - 低发生概率
        - 中等发生概率
        - 高发生概率
      rows:
        - label: 严重影响
          values:
            - IP 许可资产终止（低概率但有合同风险）
            - 临床试验安全信号或 Phase 3 失败；CEO/CTO 离任
            - AI 平台未验证 — FDA AI 指南定稿；Sanofi 三重集中风险爆发
        - label: 高影响
          values:
            - Pfizer 合作终止；SEC 合规问题
            - Sprifermin Phase 2 失败；BLKR201 安全事件；CDO 离任；OpenAI API 中断
            - 降价轮融资；AI 基准测试显示无效率提升；药企采用放缓
        - label: 中等影响
          values:
            - ICH AI 附录施加新要求；EMA AI 框架分化
            - 招募 AI（Muse）表现不及预期；Lynk Pharmaceuticals 供应纠纷
            - AI 药物发现同业估值倍数压缩
  - id: FR002
    title: 风险传导图
    type: flow
    claimRefs:
      - CR001
      - CR006
      - CR010
      - CR014
      - CR018
      - CR021
      - CR022
    description: 流程图展示主要风险触发因素如何沿因果路径影响管线价值、融资渠道、投资者信心和企业价值。每条边代表本章论据支持的已记录因果机制。
    data:
      nodes:
        - id: n1
          label: AI 平台未验证
          detail: 缺少独立基准测试；FDA 可能要求验证文件
          type: risk
        - id: n2
          label: FDA AI 指南定稿
          detail: 2025 年 1 月指南草案；最终版可能施加约束性要求
          type: risk
        - id: n3
          label: Sanofi 三重角色失效
          detail: Sanofi 退出投资者、合作伙伴或被许可方角色
          type: risk
        - id: n4
          label: 临床试验失败
          detail: Phase 2/3 资产未达到主要终点或收到临床搁置
          type: risk
        - id: n5
          label: 关键人员离任
          detail: Liu、Zhang 或 Corcoran 退出管理层角色
          type: risk
        - id: n6
          label: 管线价值受损
          detail: 失去一个或多个临床资产会降低组合 NPV
          type: impact
        - id: n7
          label: 投资者信心削弱
          detail: 降价轮风险，Series E 或 IPO 能力下降
          type: impact
        - id: n8
          label: 融资约束
          detail: Series E 难度加大；被迫降价轮；现金跑道压力延长
          type: impact
        - id: n9
