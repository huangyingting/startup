  - id: TV005
    title: 投资逻辑破裂与止损触发表
    sectionRef: SV006
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
    columns:
      - 触发项
      - 可观测阈值
      - 对投资逻辑的影响
      - 行动含义
    rows:
      - - Sprifermin Phase 3 失败
        - 膝骨关节炎适应症一线疗效数据为负面或不明确
        - 近期最大的单一价值毁灭事件；意味着当前标记需下调 $600–900M
        - 立即重估入场估值；剔除 Sprifermin 后重算剩余管线 rNPV；可能触发下一轮折价融资
      - - 多个 Phase 2 失败
        - BLKR201 和 RVW101 均在 24 个月内未达到 Phase 2 终点
        - 管线只剩 gusacitinib 残余里程碑和 KMR301 期权价值；投资逻辑破裂
        - 退出或减仓；基准情景向悲观情景（EV $300–800M）坍塌
      - - 稀释性紧急 Series E
        - 在新增里程碑事件前，Series E 定价较 $1.8B 投后估值折价 >30%
        - 确认内部人信心丧失；释放现金跑道耗尽信号
        - 按 Series E 价格下调标记；重估股权结构表中优先股堆叠对回报的拖累
      - - AI 效率主张被证伪
        - 独立审计或合作伙伴披露显示，Formation Bio 试验周期不低于行业基准
        - 关键差异化主张消失；公司被重新定价为没有技术溢价的传统管线组合药企
        - 削减 AI 平台溢价部分；将公允价值下修约 ~20–30%
      - - Sanofi 战略关系终止
        - Sanofi 退出董事会观察员角色，并在 gusacitinib 后拒绝后续合作
        - 失去最大战略背书方和交易管线；提示 Formation Bio 技术可信度出问题
        - 负面先行指标；监测 Sanofi 季度披露和 Formation Bio 新闻稿
      - - Formation 资产遭监管临床暂停
        - FDA 因安全性信号对 Phase 3 项目发出临床暂停
        - 时间线延后 6–18 个月；单资产资本需求上升；被竞品替代的风险上升
        - 监测 FDA 往来函件；评估安全性信号是资产特异性还是平台特异性
    notes: 止损级触发项（第 1–3 行）需要立即上报投委会；监测触发项（第 4–6 行）用于判断观察名单状态。
