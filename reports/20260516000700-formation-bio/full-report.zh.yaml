      - number: '8.3'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的估值需要一组异质可比公司，因为没有上市公司能精准对应其「AI 平台 + 药物所有权」的混合模型。


              上市 AI 制药同业是第一组参照：Recursion Pharmaceuticals (RXRX) 截至 2026 年 5 月 8 日市值约 ~$1.77B，往绩收入（FY2025）为 $65.7M，EV 为
              $1.19B——对应 EV/revenue 约 18×，但年度运营亏损约 ~$585M。Relay Therapeutics (RLAY) 在约 ~$12M 往绩收入基础上拥有约 ~$2.45B
              市值，EV/revenue 约 ~172×，反映临床阶段可选性的定价。Absci (ABSI) 在约 ~$860K 往绩收入上拥有约 ~$919M 市值，EV/revenue 超过 400×。这些 AI
              制药可比公司适合作为情绪指标，但不是好的直接可比对象，因为它们聚焦 AI 辅助药物发现，而 Formation Bio 聚焦 AI 赋能药物开发，后者阶段更靠后、资本强度更高。


              组合型药企可比公司提供结构上更相关的基准。Roivant Sciences (ROIV) 采用显性的平行模式：引进授权临床资产，并搭建新设子公司（「Vants」）开发这些资产；截至 2026 年 5 月 15
              日，其市值约 ~$21B。Roivant 自 2019 年以来完成了 12 项阳性 Phase 3 试验，并实现了商业上市（VTAMA）。Formation Bio 目前只有 4–5 项临床资产（其中一项
              Phase 3 资产已授权出去），阶段明显早于 Roivant 首次进入 $5–10B 区间时；因此应给予大幅折价。


              CRO 可比公司（IQVIA、Medpace、ICON）最能对应 Formation Bio 的服务成分和临床运营平台。IQVIA 在约 ~$16.6B 年收入上拥有约 ~$28B 市值（P/S
              ~1.7×）；Medpace 在 FY26 Q1 季度收入 $706M（年化约 ~$2.8B）上拥有约 ~$11.9B 市值，P/E 为 26×；ICON 市值约 ~$9.1B，年化收入约 ~$8B。这些 CRO
              倍数不能直接套用到 Formation Bio，因为 Formation 主要不是服务业务；但它们为任何服务价值成分提供了底部参照，也说明运营执行层对大型药企有独立价值。


              最不利的可比对象是 BenevolentAI。该公司在临床失败和市值几乎完全崩塌后，于 2025 年 2 月提议从 London Stock Exchange 退市。BenevolentAI 代表了 AI
              原生药企未能把管线资产推进到商业成功时的最差情形。Insilico Medicine（2023 年上一轮约 ~$900M）提供了一个中位区间的私募市场 AI 制药数据点。
