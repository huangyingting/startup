  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资假设、反假设与建议
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的投资假设建立在三根支柱上。第一，AI 原生药物开发能带来持久的资本效率：公司称，通过简化研究启动、患者招募、数据管理和监管申报，临床试验速度可比行业基准快最多 50%——在
              Phase 3 试验每延迟一天都要花掉数百万美元的行业里，这是结构性优势。第二，Sanofi gusacitinib 授权交易（最高 €545M / ~$626M）验证了交易模式：Formation
              以折价收购临床阶段资产，借助 AI 效率推进到关键拐点，再通过对外授权给大型药企变现——这正是 Roivant Sciences 跑出约 $21B
              市值的打法。第三，投资人财团（a16z、Sequoia、Sanofi、General Catalyst、Thrive、Michael Moritz、Sam Altman）以及 Mikael Dolsten
              的加入，既提供资本通道，也带来人力资本；Dolsten 曾作为 Pfizer R&D 总裁监督 35+ 个获批药物和 100+ 个临床项目，有助于降低选药风险。


              反假设同样清晰。第一，已披露的五项管线资产均未获批，药物开发历史整体失败率为 90%；pre-Phase 2 资产最终获批的概率只有约 15%。第二，最直接可比的上市 AI 制药公司 Recursion
              Pharmaceuticals (RXRX)，截至 2026 年 5 月已较 2021 年峰值下跌约 80%，市值约 ~$1.8B，基于 $65.7M 往绩收入的 EV/revenue 约 18×——这证明高倍数
              AI 制药估值在公开市场并不稳固。第三，BenevolentAI 于 2025 年 2 月宣布拟从 London Stock Exchange 退市，几近崩塌，是最不利的 AI
              制药先例；该公司在临床失败后偏离原有科学使命，市值接近归零，说明没有商业化管线里程碑的 AI 药物发现平台面临生存风险。第四，截至 2026 年 5 月，Formation Bio 的 $1.8B
              投后估值已经滞后 24 个月，之后没有新的一级融资轮、二级市场标记或经审计财务披露来刷新价格。


              总体建议为有条件推进。投资假设自洽，Sanofi 交易提供了具体管线验证。但若要按 $1.8B 标记承诺投资，必须在下一个拐点前确认 Phase 3 管线状态、Sanofi
              交易首付款到账情况和资金续航期是否充足。如果 Sprifermin Phase 3 在新增授权收入锁定前读出负面结果，下轮融资下修或被迫稀释的风险会显著上升。
