      - number: '7.6'
        title: 附录
        blocks:
          - type: callout
            title: Sanofi 三重集中是 Formation Bio 最大的单一结构性风险
            body: >-
              已识别风险中，没有其他一项能匹配 Sanofi 的三重角色集中度。Sanofi 同时是 Formation Bio 已披露的最大投资方（Series D 参与者）、战略 AI 合作伙伴（三方
              Sanofi/Formation/OpenAI 合作），以及最成熟临床资产的被许可方（Gusacitinib，Phase 3，最高 EUR 545M 里程碑）。单一关系同时支配 Formation Bio
              当前最重要的收入事件、主要验证合作和部分投资人基础。尽调必须评估这三重角色是否具备结构性独立性，以及任一关系恶化时是否存在合同保护。
            calloutType: risk
            claimRefs:
              - CR010
              - CR011
              - CR025
          - type: callout
            title: AI 平台没有已发表的独立基准
            body: >-
              Formation Bio 的 $1.8B 估值和差异化授权引进模式，建立在其 AI 平台（ATLAS、Muse、临床数据结构化）能较传统 CRO 执行显著缩短临床周期、降低成本之上。截至 2026 年 5
              月，没有独立第三方研究、同行评审论文或 FDA 验证证据支持这些效率主张。所有基准都来自公司工程博客中的自述。这是一条达到投资假设层级、但尚未验证的主张，任何投资决定前都必须解决。
