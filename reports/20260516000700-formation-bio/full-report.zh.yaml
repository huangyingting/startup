      - number: '6.2'
        title: 药企平台合作——Pfizer、Sanofi 与 OpenAI
        blocks:
          - type: paragraph
            body: |
              Pfizer 合作宣布于 2023 年，当时公司仍名为 TrialSpark，合作内容覆盖 AI 驱动的临床试验软件。该合作被列为
              formation.bio/press 上的新闻亮点，也被 a16z 投资公告引用，并在 Formation Bio 投资人材料中反复作为验证信号出现。
              但 Pfizer 新闻稿 URL 返回 404 错误，Pfizer 财报电话会或年报均未提及 Formation Bio，双方也没有披露合同金额、范围、排他性或续约条款。
              Pfizer 前 CSO Mikael Dolsten 在 15+ 年任期内监督过 35+ 款获批药物，2025 年 4 月加入 Formation Bio 担任战略顾问——
              这加深了与 Pfizer 的组织关系，但它是顾问角色，不是续签的商业交易。

              Sanofi 关系在三笔相互咬合的交易中有更充分记录。第一，Sanofi 深度参与 Formation Bio 2024 年 6 月的 $372 million Series D
              融资，既成为财务支持者，也成为战略投资方。第二，Sanofi、Formation Bio 和 OpenAI 于 2024 年 5 月宣布三方合作，
              为药物开发打造定制 AI 模型；a16z 将其描述为“生命科学领域同类首例”。第三，2025 年 6 月，Sanofi 通过 Formation Bio
              的 Libertas Bio 子公司签署授权交易，在新适应症中开发 gusacitinib，里程碑最高 €545 million（约 $632 million），
              另加约 10% 出头至 15% 左右的版税。这个三重角色让 Sanofi 同时成为 Formation Bio 最重要的外部验证方和最集中的商业风险。
              Sanofi/OpenAI 合作自宣布以来十二个月内，尚未产生任何公开披露的 AI 输出、模型部署或交付物。
