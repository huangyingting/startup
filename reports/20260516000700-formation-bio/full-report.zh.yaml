      - number: '4.2'
        title: 收入模式与商业模式经济性
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的财务模型与 SaaS 医疗公司或一体化制药商根本不同。核心模式是一条资产变现型管线： Formation 从较小的生物技术公司或授权方公司取得临床阶段药物候选物，借助自研 AI
              驱动的试验设计、执行和分析平台推进资产成熟， 再将成熟资产授权给大型药企合作伙伴以换取里程碑和版税收入；少数情况下，公司也可能自行商业化药物。因此，收入主要由里程碑触发、与版税挂钩，
              而不是订阅制的经常性收入。这天然带来收入波动：有重大授权交易的年份可能确认数亿美元收入，交易未落地的年份则可能只有少量合作费用和小额里程碑回款。 该模式有三类收入流支撑：(1)
              药企授权协议中的里程碑付款，由临床和监管事件触发（2 期完成、3 期启动、NDA 提交、获批、商业化门槛）； (2) 已授权药物上市后的净销售额版税，Sanofi gusacitinib 交易显示通常约在 10%
              出头至 15% 左右； (3) 战略合作费用，即药企合作伙伴为使用 Formation 的 AI 开发能力支付的预付款或年度研究费用。Formation 不披露收入；
              第三方算法估计（Growjo、CompWorth）显示年收入约 $39–42 million，但这些数字基于员工数和融资代理变量建模，并非公司确认数据。
              公司没有产品销售带来的毛利，也不承担实体药品制造的销售成本，主要投入 R&D（临床运营、AI 平台、资产获取成本）。交易关闭时，毛利率结构性很高 （合作费用和里程碑付款接近 100%
              毛利率），但收入是事件型而非可预测型。SaaS 可用净收入留存率和年度合同价值提供可见度；Formation 的财务前景几乎完全取决于临床试验结果的时间点和交易执行能力。
