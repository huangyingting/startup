      - number: '8.4'
        title: 药物管线风险调整后 NPV
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 已公开披露五项管线资产：Gusacitinib（Phase 3，慢性手部湿疹，依据最高 €545M 的交易授权给 Sanofi）、Sprifermin（Phase
              3，膝骨关节炎）、RVW101（Phase 2）、BLKR201（Phase 2）和 KMR301（Phase 1/2）。此外，Mikael Dolsten 新闻稿（2025 年 4 月）称，Formation
              当时持有四项多数股权资产，并计划在三到五年内达到 10–15 项。


              套用标准行业阶段转换成功率：Phase 3 → NDA 约 65%，Phase 2 → 获批约 27%，Phase 1/2 → 获批约 15%。Gusacitinib 保留价值主要来自 Sanofi
              的里程碑付款（对外授权已移除该资产的执行风险），以及任何最终获批后的特许权使用费。交易首付款未披露；里程碑结构（总额最高 €545M）意味着，Formation 在资产生命周期内可获得 $100–250M
              风险调整后里程碑。Sprifermin 作为膝骨关节炎 Phase 3 资产，面对巨大未满足需求和数亿美元级峰值销售潜力；其 rNPV 约
              $150–350M，取决于最终峰值销售额（$500M–$1.5B）、折现率（12–15%）和成功概率（50–65%）。Phase 2 资产（RVW101、BLKR201）各自 rNPV 为
              $30–80M；Phase 1/2 资产（KMR301）按概率加权贡献 $10–30M。


              在基准假设下（中位概率、12% 折现率），已披露管线合计 rNPV 约 $500–900M。AI
              开发平台本身增加了平台长期价值——以更高速度和更低成本识别、承销并推进更多资产的能力，为未来管线交易带来期权价值；Formation Bio CEO Benjamine Liu 曾明确把这项资产与 Roivant
              模式相比。若按已披露 rNPV 的 1.5–2× 计入平台长期价值，基准条件下总企业价值为 $750M–$1.8B，与 Series D 标记一致。牛市情形下（更强 Phase 3 读出带来 2×
              rNPV，加上平台变现），企业价值可达 $2–4B。熊市情形下（Phase 3 失败、没有新授权交易），剩余价值可能降至 $300–700M。
