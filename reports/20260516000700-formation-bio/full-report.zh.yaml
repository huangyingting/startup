      - number: '7.5'
        title: 关键人、知识产权与运营执行风险
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 对三位核心负责人依赖很高。CEO Benjamine Liu 主导战略、药物授权谈判和融资；他的计算生物学背景以及个人投资人网络（a16z、Sequoia、Sanofi、Sam
              Altman）是交易管线的核心。CTO Linhao Zhang 设计 AI 平台（ATLAS、Muse、临床数据结构化）；这套专有系统公开技术文档有限，短期内很难复制。CDO Gavin Corcoran
              提供药物开发经验，对选药纪律和临床执行策略至关重要。Dr. Mikael Dolsten（前 Pfizer CMO/R&D 负责人）于 2025
              年加入并担任选药委员会主席，增加了验证背书，也让管线决策依赖一位外部顾问的临床判断。Forbes 估算 Liu 持股价值超过 $150M，Zhang 超过
              $100M，个人留任激励很强；但公司没有披露公开继任计划、归属安排或留任协议。


              授权引进模式下的 IP 风险不同于典型生物科技公司。Formation Bio
              持有来自原始公司的许可权，而不是完全自有的核心化学资产或监管申报文件。如果许可方破产、对特许权使用费计算产生争议，或在重大违约情形下行使合同终止权，Formation Bio
              可能失去一项管线资产，且追索空间有限。2024 年 6 月从 TrialSpark 更名为 Formation
              Bio，标志着公司从临床试验服务商转向药物资产所有者——能力要求、风险画像和组织文化都不同。作为一家由科技公司转型而来的制药运营方，管理 Phase 2 和 Phase 3
              临床项目会引入运营执行风险；团队仍需证明自己能在商业规模下驾驭这些风险，尤其是在 Gusacitinib 之前没有 Phase 3 执行记录，而 Gusacitinib 授权后已由 Sanofi 负责。
