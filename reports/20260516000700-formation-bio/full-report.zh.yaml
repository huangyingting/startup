              截至 2026 年 5 月，没有一家上市公司直接同业同时具备 Formation Bio 的三项核心属性：AI 原生试验执行、引进授权临床阶段资产，以及完整捕获药物获批上行。CRO 不持有资产；AI
              发现公司不专攻临床执行。Formation Bio 的 Sanofi Gusacitinib 授权交易——一家 $150B 制药公司选择授权一个由 Formation Bio 管理到 Phase 3
