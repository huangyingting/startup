        - 第三方（HashiCorp、AWS）；Bimini 工具为 Formation Bio 自研
        - GitHub（Bimini 仓库，SE012）
        - 依赖 AWS 云；Vault 许可风险（HashiCorp 2023 年改用 BSL 许可）
      - - 主要编程语言
