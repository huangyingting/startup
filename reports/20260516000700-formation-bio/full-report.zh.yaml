      - number: '3.3'
        title: CRO 与传统开发既有厂商
        blocks:
          - type: paragraph
            body: >-
              IQVIA Holdings（NYSE: IQV）是全球最大合同研究组织；截至 2026 年 5 月 15 日，市值约 $28.2 billion，年收入估计超过 $15 billion。IQVIA 的
              Phase IIb/III 试验优化、AI 驱动中心选择和患者招募工具，构成了一组正在扩张的 AI 临床能力，部分复制了 Formation Bio 的开发加速价值主张。不过，IQVIA
              采用按服务收费模式：它不承担药物资产风险，也不捕获获批后的上行。Formation Bio 相对 IQVIA 的结构性优势并不是 AI 能力本身，而是资产经济性——Formation Bio
              能捕获版税和获批价值，而 IQVIA 的模型在结构上做不到。

              Medpace Holdings（NASDAQ: MEDP，2026 年 5 月市值约 $11.86B）用 30 多年的有机增长和重质量的运营模型，建立了“Trusted by
              Biotech”的定位；从启动到收尾，整合团队持续跟进研究。Medpace 提供全资中央实验室、生物分析实验室、影像核心实验室、ECG 核心实验室和 Phase I 单元，整合服务广度很大；Formation
              Bio 要么外包这些能力，要么通过 CRO 合作复制。Medpace 的选择性承接和团队连续性模型，吸引的是重质量甚于重速度的生物技术申办方，这与 Formation Bio 的资产开发模型面对的是不同买方画像。

              ICON plc（NASDAQ: ICLR）是大型全球 CRO，提供从早期到 Phase IV 的端到端临床研究服务，并有包括 2021 年收购 PRA Health Sciences
              在内的并购历史。Parexel 是私营全球 CRO，在内分泌和代谢研究上拥有 1,390+ 个专属联盟中心，并在北美、欧洲、拉丁美洲和亚太 布局较强。ICON 和 Parexel 都与 IQVIA
              一样采用按服务收费模型，没有资产所有权。关键在于，传统 CRO 不承担临床试验结果风险——这个结构性特征定义了 Formation Bio 与整个 CRO 板块的核心经济差异。

              Deep Pharma Intelligence 跟踪显示，截至 2025–2026 年，全球活跃 AI 药物发现和开发公司超过 150 家，说明上游空间（Formation Bio
              获取引进授权资产的来源）高度拥挤；随着越来越多 AI 发现化合物争夺有限的资产持有型开发者资本，供给侧动态也随之形成。
