      - number: '8.2'
        title: 最近定价轮分析与融资历史
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 最近一次披露的一级融资是 2024 年 6 月完成的 $372 million Series D，由 Andreessen Horowitz 领投，Sanofi
              重要跟投，Sequoia、Thrive Capital、Emerson Collective、Lachy Groom、SV Angel Growth 和 FPV Ventures 继续参与。TechCrunch
              称该轮较 $1B Series C 估值有「显著上调」，但未披露确切新估值。Forbes 在 2026 年 4 月报道称其投后估值为 $1.8B；两组报道值（$1.6B vs. $1.8B）之间的 $200M
              差异，可能来自对该估值是投前还是投后的假设不同，也可能来自稀释表来源不同。


              从 $1B Series C 到 $1.6–1.8B Series D 的抬升，意味着在此前 $243M 融资基础上约 1.6–1.8× 的估值上调，符合拥有已验证早期临床资产的生物科技公司在 Series D
              阶段的风险投资估值上调。Series D 资金指定用于两件事：收购和引进更多临床阶段药物资产，以及扩展 AI 能力。2024 年 7 月 2 日向 SEC 提交的 Form D
              证实，该私募证券发行与公开宣称的轮次规模一致。


              截至 2026 年 5 月 16 日——Series D 完成 24 个月后——公司没有公开披露后续一级融资轮、要约回购或延续载体。估值滞后是当前投资人最大的按市值重估风险：$1.8B
              是一个未刷新的价格，而该板块已经出现显著倍数压缩。不过，2025 年 6 月 Sanofi gusacitinib 交易（最高
              €545M）可能提供非稀释收入，在不需要新一级融资轮的情况下延长资金续航期，这也可能解释为什么公司没有新的融资事件。
