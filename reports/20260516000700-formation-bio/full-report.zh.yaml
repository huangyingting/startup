        - label: NDA/BLA 申报（约 ~160/年；约 ~46% 的 Phase III）
          value: 160
          detail: 成功完成 Phase III 后的监管申报；包含失败申报
        - label: FDA 批准（约 ~50/年；约 ~31% 的申报）
