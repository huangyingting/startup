      - number: '1.4'
        title: 规模指标、合作关系和行业位置
        blocks:
          - type: paragraph
            body: >
              Formation Bio 已经搭建约 10 个引进授权的临床阶段候选药物管线，覆盖多个治疗领域。投资人称，公司的 AI
              驱动开发引擎能显著快于行业标准推进临床试验项目，但具体时间或成本基准尚未公开。员工数未正式披露；LinkedIn 估计显示，公司在纽约市总部和其他办公室有数百名员工。


              公司已经与大型制药公司建立重要合作。Pfizer 于 2023 年宣布与 Formation Bio（当时为 TrialSpark）合作，开发 AI 驱动的临床试验软件。Sanofi 既参与 Series D
              投资，也与公司合作；一家全球前十制药公司由此验证了 Formation Bio 的技术平台。这些战略合作既带来收入，也在 Formation Bio 扩大自身药物开发运营时提供可信度。


              Formation Bio 获得过 Forbes AI 50 等行业认可。公司竞争的赛道是快速增长的 AI 与制药开发交汇处；其差异点在于持有药物资产，而不只是向制药申办方提供软件或服务。但截至 2026 年 5
              月，经审计收入、ARR、毛利率、净收入留存率和烧钱速度均未公开披露。
