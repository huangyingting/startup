  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: AI 平台架构与技术能力
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 的平台更适合被理解为一组内部搭建的 AI 系统，而不是单一产品；这些系统合在一起，替代了临床试验生命周期中碎片化的人工作业。 公开工程博客记录了四个核心平台组件。


              适应症格局梳理和药物评估系统会把候选药物资产与各治疗领域当前及未来的护理标准比较。该平台建立在 Temporal 持久执行编排之上， 通过 LLM 引导的网页搜索，从 FDA 药品标签、同行评议文献、新闻稿和
              ClinicalTrials.gov 摄取数据，并在关键决策点设置人工分析师检查点。 Temporal 引擎确保任一步骤失败后，都能从上一个检查点自动恢复；对跨越数日、由 LLM
              驱动数据收集的长周期适应症研究来说，这一点很关键。


              临床试验知识库通过摄取和结构化 ClinicalTrials.gov 过去十年的 260,000+ 项临床研究搭建而成，产出约 6.5 million 个标准化 JSON
              中的单项研究组件（入排标准、终点、研究臂、干预措施）。LLM 管线负责自由文本抽取、类别分桶和语义标准化；OpenAI 向量嵌入用于终点去重， 在语义相似但表述不同的结局指标上优于 TF-IDF。这个结构化资产让
              Formation Bio 能识别重复出现的试验设计元素，用程序化方式查询先例， 并生成扎根真实世界数据的方案设计。


              Muse 是患者招募自动化平台。传统招募流程有九个步骤，需要患者识别、研究中心协调、IRB 联络、筛查和入组物流等不同专业角色参与； Muse 将这些工作压缩到一个“超级用户”手中，由其操作一组 AI
              智能体。人的角色从产出协调材料，转为设定目标、验证边界情形和批准决策； 智能体群负责执行中间步骤。


              Atlas 模式识别框架把商务拓展会议纪要、尽调发现、数据集结果和治疗领域情报聚合为可复利的组织记忆。Atlas 为 NPV 模型更新供料，
              识别跨药物资产重复出现的信号，并让分析师无需重新翻挖历史记录即可调用过往尽调语境——这落实了公司所称的“工具化思维”： 知识只捕捉一次，却可以无限重组。


              从 trialspark 组织下 27+ 个公开 GitHub 仓库看，工程栈使用 Python（主语言）、Rust（通过 Bimini 做基础设施工具）、 TypeScript 和
              JavaScript（前端和工具）、Confluent Kafka（数据流）、HashiCorp Vault 和 AWS（密钥管理与云基础设施）。 Formation Bio 网站的平台页和关于页由
              JavaScript 渲染，非浏览器代理无法访问，因此不存在正式公开的平台规格或 API 文档。
