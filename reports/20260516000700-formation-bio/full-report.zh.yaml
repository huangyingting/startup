  - id: FM004
    title: 临床药物开发获批漏斗——行业基准
    type: funnel
    layout: standard
    summary: >-
      每年约 5,000 个候选药物进入临床试验；只有约 50 个获得 FDA 批准。Formation Bio 的 AI 平台把 Phase I–III 流失作为主要价值创造机制。鉴于各阶段失败成本高，即使 Phase II
      成功率小幅提高，也会创造可观经济价值。
    data:
      items:
        - label: Phase I 候选药物进入（全球约 ~5,000/年）
