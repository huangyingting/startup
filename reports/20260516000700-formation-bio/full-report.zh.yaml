      - number: '8.5'
        title: 估值方法与资本效率
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 当前阶段可适用四种估值方法，各自的适用性和局限不同。上一轮（风险投资）方法直接采用 2024 年 6 月 Series D 的 $1.6–1.8B 价格；它简单、有锚点，但已经滞后
              24 个月，如果后续可比公司重定价，就存在估值下调风险。rNPV/DCF 方法最适合尚未产生收入的药物开发公司：按临床成功概率加权未来里程碑、特许权使用费和收入现金流，并以 12–20% 的 biotech
              WACC 折现。如第 4 节所示，该方法得到 $750M–$1.8B 的基准区间，牛市最高可达 $4B。可比公司法受限于缺少直接上市可比对象——AI 制药同业按平台可选性定价，而不是收入倍数；CRO
              同业使用服务业务倍数，不适用于 Formation 的药物所有权模型。收入倍数分析基本不适用：Formation Bio 没有披露收入，第三方算法估算的 $39–42M
              年收入来自员工人数模型，而非公司披露，不确定区间很宽。


              Formation Bio 的资本效率主张——临床试验比行业基准快 50%、成本更低——理论上应降低单项资产所需资本，低于每个获批药物约 ~$2.6B 的行业平均水平。即使效率提升
              30%，也意味着每项资产需投入约 ~$1.8B，而不是行业平均水平；放在 10–15 个资产组合中，节省很可观。但效率提升由公司自述，尚未得到独立验证。药物开发成本指标最适合作为下行底部参照：Formation
              累计融资 $615M，低于单个行业平均 Phase 3 项目的成本，意味着公司高度依赖对外授权收入（如 Sanofi 交易）为组合融资，否则会陷入长期稀释。
            claimRefs: []
      - number: '8.6'
        title: 牛市 / 基准 / 熊市情景与尽调调整后的估值立场
        blocks:
          - type: paragraph
            body: >-
              三个情景界定当前投资人的估值区间：


              牛市情形（20% 概率）：Sprifermin Phase 3 成功，Formation Bio 在 2027 年底前再完成两项授权交易；AI 平台被可信地定位为业内最高效的药物开发引擎；Roivant
              式业务版图可选性获得重定价。按当前已披露 rNPV（$1.5–2.7B）的 2–3× 加平台溢价，隐含企业价值为 $4–8B。该情形需要 Sprifermin 成功、a16z/ Sequoia 继续以有利条款支持
              Series E，以及 Dolsten 带来 3+ 个新的 Phase 1/2 资产交易流。


              基准情形（50% 概率）：Sprifermin Phase 3 读出结果混合或部分成功；到 2028 年中再授权一项 Phase 2 资产；AI 效率主张通过独立临床基准比较获得部分验证。隐含企业价值
              $1.2–2.4B；按中点（$1.8B）看，Series D 标记大致公允。该情形与 Formation Bio 作为中型组合型药企运行相一致，类似于处在可比管线阶段的 BridgeBio 或 PureTech
              Health。


              熊市情形（30% 概率）：Sprifermin 以及一项 Phase 2 资产的 Phase 3 均失败；在需要 Series E 之前没有新的授权收入；Formation Bio 于 2027 年底或 2028
              年初以显著低于 $1.8B 标记的价格融资，以维持资金续航期。隐含企业价值 $300–800M。该情形大体符合 BenevolentAI 在临床失败后的轨迹，但 Formation Bio
              的交易模式让它有一定缓冲，因为风险分散在五项资产上，而不是集中于自有发现平台。


              概率加权中枢估计：0.20 × $6B + 0.50 × $1.8B + 0.30 × $0.55B = $1.2B + $0.9B + $0.165B = 约 $2.27B。该概率加权结果显示，$1.8B
              Series D 标记略低于中枢价值——意味着 Series D 定价可以说对期望价值有小幅折价——但区间很宽（$300M–$8B），且估值已滞后 24
              个月，因此没有投资人应在缺少新一轮一手尽调的情况下，把该标记视为可靠的当前公允价值。关键价值杠杆是 Sprifermin 的 Phase 3 结果；它是未来 12–18 个月内最可能显著推高或压低估值的单一资产。
