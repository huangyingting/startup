      - number: '4.6'
        title: 财务尽调缺口与风险清单
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 作为私营临床阶段公司，财务画像存在相当高的不透明度。公开信息无法解决五个关键尽调缺口：(1) 收入——没有任何公开损益表指标； $39–42M
              年收入的第三方估计是算法模型，不是公司数据；交易密集年份与无交易年份之间可能相差数亿美元；(2) 现金余额和烧钱速度——没有资产负债表披露， 现金跑道评估存在 $120M 的不确定区间；(3)
              gusacitinib 与 Sanofi 交易的首付款——未披露，但按可比交易先例可能为 $63–125M，对流动性评估至关重要；(4) 单资产开发成本基础——Formation 没有披露其在约 10
              个临床项目中各自投入了多少资本； (5) 股权结构表和稀释——五轮以上融资中的精确持股和稀释历史未知。主要财务风险包括：临床项目失败（最关键风险，因为所有里程碑和版税收入都取决于临床成功； 行业基准下 3
              期项目失败率约 50–60%）；估值盯市风险（$1.8B 私营估值明显高于 2022 年后调整的 AI 药物发现上市可比公司水平， 抬高了估值下调融资风险）；Sanofi 关系集中度风险（Sanofi
              既是最大已披露财务交易方，也是最大战略投资方——关系恶化会带来超比例财务影响）； 以及管线阶段风险（多数资产处于 2 期或早期 3 期，距离潜在商业化收入还有 3–7 年，资本周期很长）。积极财务信号包括
              gusacitinib 交易验证了授权模式、投资人阵容强、没有公开负面事件，以及持续招聘和科学顾问委员会扩张。这些信号与资本充足但不宽裕、公司主动把烧钱速度管理到下一个里程碑触发收入事件之前的状态相符。
