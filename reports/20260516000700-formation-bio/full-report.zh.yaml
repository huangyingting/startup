      - number: '2.5'
        title: 规模测算信心、尽调缺口与相互矛盾的估计
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 市场机会的规模测算存在结构性挑战，任何单一估计的可信度都会被削弱。


              相互矛盾的估计：2024 年 AI 药物发现 / 开发市场估计从 $1.7 billion（Grand View Research，仅聚焦药物发现）到 $28.6
              billion（MarketsandMarkets，纳入仪器和试剂等更宽药物发现技术）。这些估计无法调和，因为市场边界定义不同。Formation Bio 最具体的竞争位置，是 AI
              赋能临床运营优化子市场，今天可能只占更宽口径中的 $1–2 billion。多家分析机构预计这一子市场 CAGR 为
              20–30%，但基准年份和市场定义无法直接比较。这里保留这些相互矛盾的估计，作为定义不确定性的证据，而不是用平均值强行化解。


              关键尽调缺口：（1）截至 2026 年，Formation Bio 尚无获批药物，因此管线成功率无法被经验验证。SOM 预测依赖从行业基线推导出的获批率假设，而非公司自身证据。（2）在传统 CRO
              管理下，Formation Bio 引进授权资产的反事实临床试验周期未知，因此 AI 价值归因带有推测性。（3）合作经济条款——费用、里程碑、版税结构——均为保密信息，Formation Bio
              或其合作伙伴未公开披露。（4）AI 原生制药公司与制药企业内部 AI 项目之间的长期竞争格局尚未解决；大型制药内部 AI 建设时间表和能力深度未公开。（5）Formation Bio
              能以可承受价格获得的高质量、可引进授权临床阶段资产池，可能比总体管线统计显示的更有限；随着授权交易竞争升温，这一点尤其重要。


              这些缺口意味着，Formation Bio 的 SOM 和最终市场位置无法高置信度测算。$2–5 billion 的 NPV 情景区间基于获批率假设，而这些假设尚未被公司历史业绩验证。
