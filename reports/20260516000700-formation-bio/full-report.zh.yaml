      - number: '5.6'
        title: 临床开发中 AI 的监管考量
        blocks:
          - type: paragraph
            body: >-
              全球临床试验 AI 监管环境正在快速演进，Formation Bio 的平台正落在多个新兴监管框架的交汇处。


              2016 至 2023 年间，FDA 的 CDER 收到 500 多份包含 AI 组件的药物申请，说明从申报量看，AI 辅助药物开发已进入主流。 2025 年 1 月，FDA
              发布草案指南《使用人工智能支持药物和生物制品监管决策的考量》，要求提交 AI 生成或 AI 支持数据的申办方 证明 AI 系统性能、记录开发过程，并提供人工监督证据。如果 Formation Bio 将任何 AI
              生成输出（方案设计、中心选择建议、患者资格评估）纳入监管申报， 该指南就直接相关。


              2026 年 1 月，FDA 和 EMA 共同发布《药物开发中良好 AI 实践指导原则》，形成一套跨司法辖区框架，寻求全球获批的申办方必须应对。 2024 年成立的 FDA CDER AI Council
              现在提供集中监督，并继续制定内部 AI 使用和 AI 申报相关指南——这说明监管演进会持续保持需要 Formation Bio 维持主动监管情报能力的速度。


              Formation Bio 当前 AI 工作流提供的是决策支持（适应症格局梳理、方案建议、患者招募优先级排序），而不是生成由 AI 撰写的监管文件。 相比试图用生成式 AI
              撰写临床研究报告或自动安全叙述的申办方，这让公司处在较低风险的监管类别。但随着平台成熟、输出更直接嵌入申报文件， 合规负担会增加。


              Formation Bio 的临床试验承诺页面将患者多样性、数据透明和扩大用药可及性列为核心原则；这与 ICH E6(R3) GCP 指南一致， 后者现在明确覆盖临床试验中的电子系统和数据完整性，也符合 FDA
              对使用 AI 赋能试验管理工具的申办方的预期：所有 AI 辅助决策都必须保留完整审计轨迹。
            claimRefs: []
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户与合作伙伴分层
        blocks:
          - type: paragraph
            body: |
              Formation Bio 没有单一“客户”类别，而是同时横跨五类客户和合作伙伴。第一类是药物资产授权方：
              向 Formation Bio 出售或授权临床阶段药物候选物的生物技术公司和药企。已确认三家具名授权方：
              Asana BioSciences（gusacitinib 及更广的免疫皮肤病组合，2022 年 11 月收购）、
              中国杭州 Lynk Pharmaceuticals（BLKR201/LNK01006，一种可穿透 CNS 的 TYK2 抑制剂，中国以外权益），
              以及德国 Darmstadt 的 Merck KGaA（用于膝骨关节炎的 Sprifermin/FGF18）。据报道约十个管线资产中，
              约七个在任何公开记录中都没有具名授权交易对手。

              第二类是药企 AI 平台合作伙伴：为使用 Formation Bio 的 AI 开发平台付费的公司。已确认两家合作伙伴——Pfizer
              （AI 临床试验软件合作，2023 年）和 Sanofi（与 OpenAI 的三方 AI 合作，2024 年 5 月）——但两者的财务条款和交易范围均未披露。
              第三类是药物资产被授权方：授权或收购 Formation Bio 已开发药物资产的药企。只有 Sanofi 符合这一类，即 2025 年 6 月最高价值
              €545 million 的 gusacitinib 授权交易。第四类是临床试验研究中心：27 个完成 ASN008 试验的 TrialSpark 品牌美国中心，
              以及一个正在招募 BLKR201 1 期研究的 Nebraska 中心。第五类是试验患者：ClinicalTrials.gov 显示，ASN008 特应性皮炎试验入组了
              144 名患者。Formation Bio 通过子公司组织药物项目——Libertas Bio 负责免疫皮肤病 / gusacitinib，High Line Bio
              负责骨关节炎 / Sprifermin——从而在不暴露母公司资产负债表的情况下，支持资产特定资本结构和合作伙伴共同投资。
