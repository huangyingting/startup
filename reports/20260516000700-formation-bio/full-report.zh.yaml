      - number: '6.5'
        title: 集中度风险、留存证据与满意度缺口
        blocks:
          - type: paragraph
            body: |
              Formation Bio 的核心集中度风险是 Sanofi。作为投资方、AI 合作伙伴和药物资产被授权方，Sanofi 退出任一角色，都会传导到
              Formation Bio 的财务、商业和验证维度。没有其他单一交易对手接近 Sanofi 的多角色暴露。Pfizer 的平台合作提供第二个验证锚点，
              但其财务条款和续约状态完全不透明。

              传统 SaaS 意义上的留存并不完全适用。药物对外授权交易是一次性事件；gusacitinib 交易是首个已确认事件，无法提供重复分析的队列。
              平台合作“留存”需要知道 Pfizer 和 Sanofi 是否续约或扩大协议，但答案未知。研究中心重复参与可从“TrialSpark Investigative Site”
              品牌中推断——它暗示一个可管理、可复用的网络——但没有公开量化数据说明中心流失率或重复使用率。

              独立满意度证据几乎无法取得。Formation Bio 的 G2 评论页返回仅 JavaScript 可见的错误（403），无法访问客户评论。
              Glassdoor 在研究时未能加载。除 Sanofi 以及（隐含的）Pfizer 外，没有其他药企公开确认使用 Formation Bio 平台。
              Formation Bio 没有 FDA 批准药物，因此尚未建立终端患者或商业支付方关系。公司的客户证明基础因此落在两家具名药企平台合作、
              一笔已完成药物授权交易、一笔已披露先前药物引进授权收购，以及 TrialSpark 时代 300+ 项试验历史之上。这是与后期 Series D
              药企平台公司相符的营收前或接近营收客户画像：关键关系处于活跃状态，但尚未产出公开可验证的商业规模结果。
