      - number: '7.4'
        title: 竞争、市场采用与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 所处的 AI 增强药物开发赛道正在快速拥挤，公司还要面对制药行业内部的结构性采用门槛。在 AI 药物发现和开发环节，Recursion Pharmaceuticals（并购
              Exscientia 后）、Insilico Medicine、Isomorphic Labs（DeepMind 子公司）和 AbSci
              都在争夺同一批引进授权机会和合作资本。在临床运营和试验提速环节，IQVIA、Medidata（IQVIA 子公司）、Parexel、Covance/Labcorp 拥有数十年经验证的 GCP 合规 CRO
              基础设施和监管关系；当开发赌注很高时，大型药企更偏好这类体系。


              大型药企——包括 Formation Bio 的软件合作方 Pfizer、投资方兼被许可方 Sanofi，以及 Novartis、J&J——都已经在内部大举投入 AI。Formation Bio 与 Pfizer
              的合作是积极信号，但也埋下长期风险：药企合作方可能在 AI 试验设计上实现自给自足，削弱对外部伙伴的需求。制药行业采用周期长，监管文化保守；要说服药物许可方把前期特许权使用费经济让渡给一家 AI
              优先运营方，Formation Bio 需要拿出大规模临床执行证据，而公司尚未公开证明这一点。Sanofi 关系既是最重要的验证信号，也是最显著的集中度风险：Sanofi 是 Series D
              投资方、战略合作伙伴，也是 Gusacitinib（Formation Bio 最成熟的 Phase 3 资产）的被许可方。如果 Sanofi 决定缩减 Gusacitinib 项目、压缩 AI
              合作范围，或退出股权持仓，Formation Bio 的管线经济性、投资人信心和近期收入预期会同时受损。
