              Formation Bio 没有披露收入、现金头寸、毛利率或任何财务报表数据。$80-200M 年度消耗、2-3 年资金续航期和 $170-290M
              剩余资本的所有估算，都来自员工人数估计、公开临床试验成本和第三方算法收入模型。这些估算存在重大不确定性，只能视为方向性信号，不是已验证指标。任何投资决定前，都需要完成一手财务尽调。
