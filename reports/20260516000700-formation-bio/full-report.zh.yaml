  - id: FV004
    title: 投资 KPI
    type: kpi
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV007
      - CV037
      - CV038
      - CV039
      - CV040
    description: 投委会评分卡，从 8 个维度评估 Formation Bio 是否值得在 2026 年以 $1.8B 估值进入。
    data:
      items:
        - label: 市场机会
          value: 7
          detail: 药物开发瓶颈真实且巨大；AI 提升试验效率，瞄准每个药 $2.6B 的成本问题；总可用市场（TAM）结构性庞大
        - label: 管线 / 临床证明
          value: 5
          detail: 已披露 5 个资产；Gusacitinib 已授权（模型得到证明）；Sprifermin 3 期待定；5 个资产中 4 个尚未获批、尚无收入
        - label: AI 平台差异化
          value: 5
          detail: 公司称试验提速 50%；OpenAI + Sanofi 合作；Dolsten 顾问委员会；效率基准没有独立验证
        - label: 交易模型执行
          value: 7
          detail: 最高 €545M 的 Gusacitinib 交易验证“引进授权 → 推进 → 对外授权”模型；Sanofi 同时作为战略投资方和合作伙伴，提供可信度
        - label: 单位经济性 / 财务可见度
          value: 2
          detail: 未公开收入、毛利率、现金余额或烧钱速度；药物开发模型的里程碑不连续且二元；算法估算收入约 $39M，不可靠
        - label: 风险画像
          value: 2
          detail: 药物开发失败率 90%；AI 制药倍数压缩已确认（Recursion -80%、BenevolentAI 退市）；估值标记滞后 24 个月；没有老股交易标记
        - label: 估值纪律
          value: 5
          detail: $1.8B 大约落在概率加权内在价值附近（中枢 $2.3B）；若 Sprifermin 成功则可辩护；悲观情景承压；需要重新尽调
        - label: 证据质量
          value: 4
          detail: 32 个来源支撑 42 条主张；管线阶段确认、Sanofi 首付款金额和现金余额存在阻断性缺口；没有一手尽调，所有情景都缺少锚点
