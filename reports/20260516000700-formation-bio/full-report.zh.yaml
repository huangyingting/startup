  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 临床试验管线风险
        blocks:
          - type: paragraph
            body: >-
              从 I 期进入到监管批准的 90%+ 失败率，是药物开发的基础风险；无论 Formation Bio 的 AI 平台多高效地运行临床运营，这一风险都适用。 一项 2019 年综合分析覆盖 2000 至 2015
              年间 21,143 个临床开发化合物，发现从 I 期到获批的整体成功率约为 9.6%， 各阶段转换概率约为 ~52%（I 期到 II 期）、~29%（II 期到 III 期）和 ~58%（III
              期到获批）。Formation Bio 引进授权临床阶段资产并部署 AI 加速开发的商业模式，并不会改变这些科学损耗概率；它只试图压缩每次阶段转换的时间和成本。把这一点应用到 10 个资产组合，并假设单资产成功率
              15%（为历史基准的 1.5x，反映优质资产筛选和 ATLAS AI 评分），统计期望是 1–2 款获批药物。


              已披露管线呈现分层风险结构。Gusacitinib（SYK/JAK 抑制剂，3 期，手部湿疹）是风险最低的资产——2025 年 6 月 Sanofi 以最高 EUR 545M（含里程碑）获得授权，事实上把大部分
              III 期执行风险转移给 Sanofi。Sprifermin（重组 FGF18，2 期，膝骨关节炎） 面对一个历史上困难的适应症，多种药物都未能证明疾病修饰获益；2
              期读出是关键节点。BLKR201（LNK01006，TYK2 抑制剂，1 期） 进入了拥挤的 TYK2 赛道，此前 Takeda 在 2022 年以数十亿美元收购 Nimbus Therapeutics 的
              TYK2 项目；Formation Bio 通过 ATLAS 差异化追求一个未披露的新适应症，既带来潜在上行，也带来科学不确定性。RVW101（抗 CD226，溃疡性结肠炎）处于早期，
              公开数据有限。KMR301（自身免疫，临床前）距离上市最远。所有资产还叠加引进授权模式的交易对手风险：若授权方破产、争议版税计算或行使合同终止权， Formation Bio 可能失去该资产。
            claimRefs: []
