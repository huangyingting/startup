  - id: FR003
    title: 管线风险时间线
    type: timeline
    claimRefs:
      - CR023
      - CR024
      - CR025
    description: 展示 Formation Bio 已披露管线资产从 2025 年到估计 2028-2030 年获批窗口之间的关键临床阶段切换、二元风险事件和资本节点。
    data:
      items:
        - date: '2025-01-01'
          label: FDA 发布药物开发中 AI 使用草案指南
          detail: 草案指南为监管申报中的 AI 使用设置新的文档要求
          tone: risk
        - date: '2025-06-01'
          label: Gusacitinib 授权给 Sanofi（3 期）
          detail: 里程碑付款最高 EUR 545M；Sanofi 承担 3 期执行风险
          tone: positive
        - date: '2025-09-01'
          label: BLKR201（TYK2）启动 1 期
          detail: 首次给健康志愿者给药；TYK2 竞争格局拥挤
          tone: neutral
        - date: '2026-05-16'
          label: Series D 估值已滞后 23 个月
          detail: 2024 年 6 月估值 $1.8B；AI 药物发现同行较峰值下跌 70-80%
          tone: risk
        - date: '2026-12-01'
          label: Sprifermin 2 期中期读出（预期）
          detail: 二元结果事件——骨关节炎适应症 2 期成功或失败
          tone: neutral
        - date: '2027-06-01'
          label: Series E 或后续融资决策点（估计）
          detail: 按 2024 年 6 月 Series D 后估计 2-3 年现金跑道推算；管理层必须决定走 IPO、战略轮，还是老股融资路径
          tone: risk
        - date: '2028-01-01'
          label: Gusacitinib 完成 3 期并提交 NDA（估计）
          detail: 若 Sanofi 3 期成功，Formation Bio 在获批时触发里程碑付款
          tone: positive
        - date: '2029-01-01'
          label: BLKR201 完成 2 期（估计）
          detail: BLKR201 TYK2 资产估计完成 2 期；疗效二元读出
          tone: neutral
  - id: FR004
    title: 风险 KPI 仪表盘
    type: kpi
    claimRefs:
      - CR026
      - CR027
      - CR028
      - CR029
    description: 关键风险指标概括截至 2026 年 5 月 Formation Bio 的概率加权管线价值、资本充足度、监管成熟度和竞争定位风险。
    data:
      items:
        - label: 组合平均临床成功概率
          value: ~10-15%
          detail: 行业基准约 9.6%（1 期至获批）；经 AI 调整后估计每个资产 10-15%
          status: risk
        - label: 估计年度烧钱速度
          value: $80-200M
          detail: 员工成本 $30-40M + 活跃 1-3 期临床项目估计 $50-160M
          status: risk
        - label: 估计现金跑道
          value: 2-3 years
          detail: 从 2024 年 6 月 Series D 起算；假设没有新融资或里程碑收款
          status: warning
        - label: Sanofi 收入集中度
          value: '>90% of disclosed milestone value'
          detail: EUR 545M 的 Gusacitinib 交易是已披露的主要收入事件
          status: risk
        - label: FDA AI 指南状态
          value: Draft (Jan 2025)
          detail: 最终指南尚未发布；预计 2026 年发布；对 Formation Bio 的影响仍不清楚
          status: warning
        - label: AI 平台基准证据
          value: None public
          detail: ATLAS、Muse 或数据结构化平台尚无已发布的独立第三方基准
          status: risk
  - id: FV001
    title: 推荐逻辑
    type: flow
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV006
      - CV007
    description: 流程图梳理从管线质量、AI 效率、交易模型验证和可比公司反向信号，到带价格纪律的有条件投资建议之间的证据链。
    data:
      nodes:
        - id: n1
          label: 管线质量
          detail: 已披露 5 个资产；Gusacitinib 3 期以最高 €545M 授权给 Sanofi；Sprifermin 处于膝骨关节炎 3 期
          type: input
        - id: n2
          label: AI 效率主张
          detail: 公司称试验提速 50%；OpenAI + Sanofi 合作；公司有此说法，但未获独立验证
          type: input
        - id: n3
          label: 交易模型已验证
          detail: Gusacitinib 交易 = “引进授权 → 推进 → 对外授权”的首次证明；潜在价值 $626M，隐含较形成成本溢价 5.8×
          type: input
        - id: n4
          label: 可比公司反向信号
          detail: Recursion 较峰值 -80%；BenevolentAI 拟从 LSE 退市；AI 制药倍数被严重压缩
          type: input
        - id: n5
          label: 估值标记滞后
          detail: $1.8B Series D 定价于 2024 年 6 月；已滞后 24 个月；没有刷新事件；未披露收入
          type: input
        - id: n6
          label: 管线价值评估
          detail: rNPV 基准 $750M–$1.8B；平台溢价增加 $300M–$600M；合计基准 $1.2–$2.4B
          type: intermediate
        - id: n7
          label: 市场定价压力
          detail: AI 制药上市同行现金消耗低得多，估值仅 $1–2B；RXRX 估值 $1.77B、收入 $66M
          type: intermediate
        - id: n8
          label: 有条件推进
          detail: $1.8B 价格敏感；解决 6 个尽调问题；以 Sprifermin 3 期时间线为关口
          type: output
      edges:
