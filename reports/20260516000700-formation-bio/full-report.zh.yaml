      - number: '2.2'
        title: 市场规模测算——多重视角下的 TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              Formation Bio 可服务市场的测算需要多重视角，因为公司的垂直整合 AI 原生模型无法对齐任何单一分析师市场定义。分析师对 AI 药物发现与开发市场的估计在 2024–2025 年约为 $1.7
              billion 到 $5.2 billion，并预计到 2028–2030 年达到 $8–20 billion。若用更宽口径纳入药物发现技术（仪器、试剂、信息学软件和 AI），MarketsandMarkets
              估计 2024 年市场为 $28.6 billion，到 2030 年以 11% CAGR 增长至 $51.5 billion。这些数字不能直接比较，必须带着定义边界谨慎解读。


              视角 1——总制药研发 TAM（$260 billion）：全球制药研发年支出超过 $260 billion，其中临床开发约占 40–60%。这个 TAM 高估了 Formation Bio
              的可服务市场，因为它包含了不会与 Formation Bio 合作或向其对外授权资产的公司支出。


              视角 2——CRO / 外包市场 SAM（$80 billion）：2024 年全球 CRO 市场估计约 $80 billion，以 6–8% CAGR 增长，2030 年趋近 $120
              billion。Formation Bio 在这个市场中扮演 CRO 交付服务的优化者和编排者，而不是传统 CRO 竞争者。临床运营中的 AI 赋能子市场约占其中 $2–5 billion。


              视角 3——AI 药物开发市场 SAM（$2–5 billion，20–30% CAGR 增长）：与 Formation Bio 平台最直接相关的是 AI 赋能的临床运营和试验优化市场。多家研究机构估计 2024
              年规模为 $1.7–5.2 billion，预计到 2028–2030 年达到 $8–20 billion。分析师给出的 CAGR 差异很大（20–30%），更多反映定义不一致，而不是真正对增长轨迹存在分歧。


              视角 4——药物价值创造（失败造成的年度沉没成本超过 $230 billion）：每年约 5,000 个候选药物进入临床试验，从进入到获批的失败率为 90%，药物开发失败带来的经济负担每年超过 $230
              billion 的沉没成本。若通过 AI 优化患者分层和试验设计，把 Phase II 成功率提高 5–10 个百分点，就可能释放数百亿美元价值——这为 Formation Bio
              的投资人叙事提供了有吸引力的框架。


              Formation Bio 的 SOM 估计为 $2–5 billion 净现值，基于 10 个资产管线、15–25% 药物获批假设，以及获批产品的版税或一次性授权经济模型。一个获批的自身免疫或 CNS
              适应症药物，峰值年销售额可能达到 $500 million 到 $2 billion。
