summary:
  headline: Formation Bio 的 AI 制药逻辑有吸引力，背后有 $615M 顶级资本和 Top-10 药企合作；但 $1.8B 估值压在无法验证的 AI 表现、未披露财务，以及全行业失败率超过 90% 的高风险药物管线上。
