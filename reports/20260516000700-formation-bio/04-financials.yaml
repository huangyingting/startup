  title: Financials
  summary: Formation Bio has raised approximately $615 million in venture capital across
    multiple rounds since founding in 2016, most recently a $372 million Series D
    in June 2024 led by Andreessen Horowitz at an implied post-money valuation of
    approximately $1.8 billion (Forbes, April 2026). As a private company, Formation
    Bio discloses no revenue, gross margin, cash balance, or income statement metrics;
    third-party algorithmic platforms estimate annual revenues of $39–42 million, though
    these figures are unconfirmed by the company. The business model is fundamentally
    different from SaaS — revenue derives from lumpy milestone and royalty payments
    tied to clinical and regulatory outcomes, illustrated by the June 2025 gusacitinib
    licensing deal with Sanofi (up to €545 million, ~$626 million). An estimated 190–207
    employees implies annual headcount burn of $30–40 million, supplemented by clinical
    trial costs across a ~10-asset portfolio that could push total annual cash consumption
    to $80–200 million. With approximately $170–290 million estimated remaining from
    the Series D as of May 2026, Formation has a likely 2–3 year runway before requiring
    additional capital. Strategic risk centers on binary clinical outcomes — milestone
    and royalty revenue is entirely contingent on trial success — and a private valuation
    mark of $1.8 billion that substantially exceeds public market comparables for AI
    drug discovery peers (Recursion at ~$2.3 billion post-merger despite >75% decline
    from peak).
