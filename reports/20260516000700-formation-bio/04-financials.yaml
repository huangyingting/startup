  evidenceGaps:
  - type: private-evidence-only
    severity: critical
    topic: revenue-and-gross-margin
    missingEvidence: Formation Bio has not publicly disclosed revenue, ARR, gross margin,
      or any income statement metrics; third-party algorithmic estimates of $39–42
      million annual revenue are derived from headcount and funding models, not company
      disclosures, and could be materially inaccurate.
    whyItMatters: Revenue is the foundational input for any investment underwriting
      model; without it, no valuation multiple, growth rate, or breakeven analysis
      can be reliably constructed. The gap between a successful licensing deal year
      ($626M potential) and a year with no deal closings could be hundreds of millions,
      making revenue visibility critically low.
    diligencePath: Request audited income statements for FY2022–FY2025; provide milestone
      and royalty recognition schedule by asset; clarify whether the Sanofi upfront
      payment has been recognized and in which period.
    relatedQuestionRefs:
    - QI001
    - QI002
    - QI010
  - type: private-evidence-only
    severity: critical
    topic: cash-balance-and-burn-rate
    missingEvidence: No cash balance, monthly burn rate, or balance sheet data has
      been publicly disclosed; all burn estimates are derived from headcount proxies
      and clinical trial industry benchmarks, with a very wide range ($80–200M annually).
    whyItMatters: Runway assessment is impossible without cash balance; an undisclosed
      upfront payment from the Sanofi gusacitinib deal could materially extend runway,
      but its magnitude is unknown.
    diligencePath: Request management accounts showing cash balance as of Q1 2026,
      monthly burn by function (headcount, clinical operations, asset acquisition),
      and confirmation of any non-dilutive income received in FY2025.
    relatedQuestionRefs:
    - QI006
    - QI007
    - QI025
  - type: missing-source
    severity: material
    topic: gusacitinib-upfront-payment
    missingEvidence: The Sanofi gusacitinib licensing deal discloses a combined upfront
      plus milestone total of up to €545 million but does not reveal the upfront component;
      the upfront amount is critical for assessing near-term cash position and revenue
      recognition.
    whyItMatters: An upfront payment in the range of $50–200M would materially change
      Formation Bio's runway and near-term financial profile; without this figure,
      burn analysis has an unresolved uncertainty that could represent years of additional
      runway.
    diligencePath: Request full deal term sheet for the Sanofi gusacitinib licensing
      agreement including upfront cash received, milestone schedule, royalty rate confirmation,
      and accounting treatment.
    relatedQuestionRefs:
    - QI011
    - QI012
    - QI024
