- id: FI002
  title: Formation Bio Revenue Model Flow
  type: flow
  data:
    nodes:
    - id: asset-sourcing
      label: Drug Asset Sourcing
      detail: In-license or acquire clinical-stage compounds from smaller biotechs,
        academic spinouts, and pharma divestitures (e.g., gusacitinib from Asana BioSciences)
    - id: ai-development
      label: AI-Accelerated Development
      detail: Apply proprietary AI platform across trial design, patient recruitment,
        protocol optimization, regulatory writing, and clinical data analysis to reduce
        cost and time versus traditional CRO models
    - id: licensing-decision
      label: Licensing vs. Commercialization Decision
      detail: For each matured asset, Formation decides to out-license (milestone/royalty
        model) or commercialize directly; licensing is the primary model for most assets
    - id: milestone-revenue
      label: Milestone and Upfront Revenue
      detail: Upfront cash at signing plus milestone payments triggered by Phase completion,
        regulatory submissions, approval, and commercial thresholds; near-100% gross
        margin
