- id: SI-valuation-comparables
  title: Valuation Analysis and Comparable Companies
  body: 'Formation Bio''s post-Series D valuation of approximately $1.8 billion (Forbes,
    April 2026) positions it among the leading private AI-pharma companies globally.
    Multiple valuation frames are instructive but each carries limitations. Against
    total capital raised (~$615M), the $1.8B mark implies a 2.9× multiple on invested
    capital — reasonable for a growth-stage platform but modest relative to venture
    expectations for a top-tier AI company. Against third-party revenue estimates
    of $39–42 million, the implied EV/revenue multiple is approximately 43–46× — far
    above the 2024 median public biotech EV/revenue multiple of approximately 6.5×
    — but this comparison is not meaningful given Formation''s milestone-driven revenue
    structure; the company should be valued on pipeline NPV and deal-flow optionality,
    not current revenue run rate. PitchBook research indicates AI-native biotechs
    commanded "nearly 100% valuation premium" over traditional biotech peers in 2024–2025,
    providing market context for Formation''s premium positioning. Comparable companies
    illustrate significant volatility in the AI drug discovery sector. Recursion Pharmaceuticals
    (RXRX) saw its market capitalization decline from a peak of approximately $9 billion
    to approximately $2.3 billion as of late 2025 post-merger with Exscientia ($688M
    acquisition price), despite holding a 10+ program clinical pipeline and major
    pharma partnerships. Insitro was last valued privately at over $2 billion (2021),
    and Owkin crossed the unicorn threshold — bracketing Formation''s $1.8B within
    the range of credible private AI-pharma platform valuations. The disclosed valuation
    discrepancy between Forbes ($1.8B), TechCrunch ($1.6B), and PremierAlts ($1.7B)
    reflects the absence of a company-confirmed figure; Formation declined to disclose
    its exact post-Series D valuation to TechCrunch. Investors should note that post-2022
    public market multiple compression in AI drug discovery means Formation''s private
    mark carries meaningful mark-to-market risk if it seeks a public exit at current
    public comparables.'
