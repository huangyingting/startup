    - Medium (commercial uptake risk post-approval)
  - - Strategic Collaboration Fees
    - Upfront and/or annual fees from pharma partners for access to Formation's AI
      development platform for partner-owned compounds
    - More recurring than milestones but not confirmed as a material revenue stream
    - High (software/service delivery)
    - Medium (partner continuation risk)
