    - Cash received at deal signing for exclusive rights to develop/commercialize
      Formation's compounds in specified indications
    - Immediate upon deal close; non-recurring per asset
    - Very high (near 100%)
    - Low (received at signing regardless of outcome)
  - - Direct Commercialization Revenue
    - Revenue from drugs Formation chooses to commercialize itself rather than license
    - Long-horizon; requires commercial infrastructure build-out
    - Lower (manufacturing, distribution, and sales costs)
    - Very high (commercial execution, payer access, competition)
