    - Payments from pharma partners triggered by clinical and regulatory milestones
      (Phase completion, regulatory submission, approval)
    - Lumpy; event-driven; triggered by binary outcomes
    - Very high (near 100% — no COGS)
    - High (contingent on clinical success)
  - - Royalties on Net Sales
    - Low-to-mid-teen percentage royalties on commercial net sales of licensed drugs
    - Long-horizon; recurring once drugs reach market; typically begins 3–7+ years
      after licensing
