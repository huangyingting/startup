acknowledgedWarnings:
- dimension: paywallRisk
  reason: >-
    PitchBook (SI009) is paywalled and FirstWordPharma (SI025) is paywalled; the
    cited PitchBook finding on AI biotech valuation premiums ("nearly 100% premium
    over traditional biotech peers") is supported by corroborating public sources
    including Microcap.co (SI015), Venionaire DealMatrix (SI016), and Finro (SI017)
    that independently document the AI-biotech valuation premium in 2024–2025. The
    Crunchbase source (SI010) is rate-limited but the funding data it contains is
    independently confirmed by the PRNewswire Series D press release (SI001, accessStatus
    ok) and TechCrunch (SI002, accessStatus ok).
- dimension: tableNotes
  reason: >-
    Tables TI003 (Revenue Model Anatomy), TI004 (Burn and Runway Estimates), and
    TI006 (Risk Register) contain estimated or inferred figures that are not company-disclosed.
    Each table includes explicit notes labeling figures as estimates. Early round sizes
    in TI001 (Series A/B combined ~$80M) are derived estimates, not confirmed figures;
    this limitation is noted in the table's enumerationScope and notes fields. These
    estimates are necessary to satisfy the chapter's analytical requirements given
    Formation Bio's complete absence of public financial disclosures as a private company.
- dimension: unverifiedSource
  reason: >-
    Several lower-tier sources (SI011 Growjo, SI012 CompWorth, SI013 PremierAlts,
    SI019 NewsBreak, SI020 FeedTheAI, SI021 Pulse2, SI022 AINvest) are algorithmic
    data aggregators or minor news outlets with low reputation tier. Revenue estimates
    from Growjo and CompWorth (~$39–42M) are explicitly labeled as algorithmic models,
    not company-confirmed data. These sources are included for completeness and to
    provide order-of-magnitude context; no investment-critical claims rely solely on
    these sources without corroboration from higher-tier outlets (PRNewswire, TechCrunch,
    Forbes, FierceBiotech).
