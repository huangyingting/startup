  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: AI-trial-execution-performance
      missingEvidence: >-
        Formation Bio's actual enrollment acceleration rates, cycle time reductions, and cost savings
        per trial relative to CRO industry benchmarks — metrics that would directly validate the AI
        platform's competitive advantage over IQVIA, Medpace, and ICON.
      whyItMatters: >-
        Without quantitative AI platform performance data, the core speed and cost advantage that
        Formation Bio claims over CRO alternatives cannot be independently verified or benchmarked.
        If the advantage is smaller than claimed, the competitive justification for the asset-ownership
        premium narrows materially.
      diligencePath: >-
        Request operational KPIs (average enrollment rate vs. CRO industry median, time from protocol
        approval to first-patient-in, cost per evaluable patient) from Formation Bio management; cross-
        reference with Sanofi and Pfizer partnership satisfaction data if accessible.
      relatedQuestionRefs: [QP006, QP008]
    - type: missing-source
      severity: material
      topic: IQVIA-AI-investment-level
      missingEvidence: >-
        IQVIA's disclosed or analyst-estimated annual spend on AI R&D for clinical trial optimization,
        and the fraction of IQVIA revenue attributable to AI-enhanced trial services — data needed to
        assess the timeline for IQVIA closing the AI development gap with Formation Bio.
      whyItMatters: >-
        If IQVIA is investing $500M+ annually in AI clinical capabilities, it can close the speed gap
        with Formation Bio within 3-5 years; if investment is marginal, Formation Bio's AI advantage
        may persist longer. This difference materially affects the competitive moat durability
        assessment.
      diligencePath: >-
        Review IQVIA investor day presentation recordings, 10-K Management Discussion and Analysis
        sections, and sell-side analyst reports covering IQVIA's technology investment cadence and
        AI product revenue contribution.
      relatedQuestionRefs: [QP007, QP022]
    - type: missing-source
      severity: minor
      topic: asset-selection-AI-moat
      missingEvidence: >-
        Published or independently described methodology for how Formation Bio's AI evaluates
        clinical-stage compounds for in-licensing — the proprietary asset selection mechanism that
        determines pipeline quality and represents the upstream competitive moat.
      whyItMatters: >-
        If the asset selection methodology is replicable, well-funded competitors (Recursion post-
        Exscientia, Isomorphic Labs) could rapidly copy the in-licensing model without needing to
        develop proprietary screening technology. If it is deeply proprietary, Formation Bio's moat
        is substantially stronger than currently estimated.
      diligencePath: >-
        Request technical briefing from Formation Bio management on asset selection AI criteria and
        validation methodology; compare criteria transparency with Recursion's published target
        identification approach; assess patent or trade secret protections.
      relatedQuestionRefs: [QP023, QP025]
    - type: enumeration-incomplete
      severity: minor
      topic: AI-pharma-competitive-landscape
      missingEvidence: >-
        A comprehensive enumeration of the 150+ active AI drug discovery and development companies
        tracked by Deep Pharma Intelligence — particularly any that have adopted the in-licensing plus
        AI-development model that is Formation Bio's core strategy and could emerge as direct competitors.
      whyItMatters: >-
        A well-funded but below-radar AI development company could displace Formation Bio's first-mover
        advantage before Formation Bio achieves sufficient portfolio scale to establish a defensible
        data and clinical track record moat.
      diligencePath: >-
        Commission a Deep Pharma Intelligence competitive scan or equivalent primary research covering
        the full AI drug development company landscape as of Q2 2026, filtered for companies with clinical-
        stage assets and asset-ownership models.
      relatedQuestionRefs: [QP002, QP018]
