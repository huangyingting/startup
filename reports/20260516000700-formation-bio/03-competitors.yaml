callouts:
  - calloutType: strength
    title: Asset Ownership + AI Development Is Structurally Uncontested
    body: >-
      As of May 2026, no direct public-company peer combines Formation Bio's three core attributes:
      AI-native trial execution, in-licensing of clinical-stage assets, and full drug approval
      upside capture. CROs own no assets; AI discovery companies do not specialize in clinical
      execution. Formation Bio's Sanofi Gusacitinib licensing deal — where a $150B pharma
      company chose to license a Formation Bio-managed Phase 3 asset — is the strongest available
      third-party validation that this model creates value at scale.
    claimRefs: [CP001, CP003, CP024]
  - calloutType: risk
    title: IQVIA AI Buildout Could Neutralize the Speed Advantage Without Asset Ownership
    body: >-
      IQVIA ($28.2B market cap, $15B+ revenue) is actively investing in AI clinical trial
      capabilities. If IQVIA achieves parity on trial execution speed, Formation Bio's
      AI platform advantage narrows to the asset-ownership economics — which, while structurally
      different, may not alone justify Formation Bio's development premium over large pharma
      choosing to manage assets internally with IQVIA as CRO. This is the most credible
      medium-term competitive risk.
    claimRefs: [CP014, CP020, CP028]
  - calloutType: risk
    title: Recursion Pharmaceuticals Represents a Converging Competitive Model
    body: >-
      Recursion's post-Exscientia platform and "clinical stage TechBio" positioning create the
      closest narrative overlap with Formation Bio in the public markets. Recursion's market cap
      compression (current $2.93, 52-week high $7.18) is an adverse pricing signal for AI drug
      development companies broadly — applicable as a proxy to Formation Bio's own $1.8 billion
      private valuation. If Recursion redirects to in-licensing third-party clinical-stage assets
      (which its capital position allows), direct competition becomes material.
    claimRefs: [CP005, CP006, CP007, CP032]
  - calloutType: insight
    title: Isomorphic Labs Is a Long-Duration Asymmetric Threat
    body: >-
      Isomorphic Labs (Alphabet/DeepMind) raised $600M in April 2025 with effectively unlimited
      additional capital available from Alphabet. Isomorphic's competitive threat is not current
      but structural: if it adds clinical development capabilities to its AI drug design platform,
      it would enter Formation Bio's market with superior AI infrastructure, zero capital
      constraints, and existing large pharma partnerships (Novartis, Eli Lilly). The timeline
      for this scenario is 3-7 years, but it represents the highest-severity long-horizon risk.
    claimRefs: [CP009, CP023, CP027]
