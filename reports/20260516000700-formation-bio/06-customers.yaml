sections:
- id: SU-segmentation
  title: Customer and Partner Segmentation
  body: |
    Formation Bio does not have a single "customer" category — it operates across five distinct
    customer and partner segments simultaneously. The first segment is drug asset licensors: biotech
    and pharma companies that sell or license clinical-stage drug candidates to Formation Bio. Three
    named licensors are confirmed: Asana BioSciences (gusacitinib and a broader immunodermatology
    portfolio, acquired Nov 2022), Lynk Pharmaceuticals of Hangzhou, China (BLKR201/LNK01006, a
    CNS-penetrant TYK2 inhibitor, ex-China rights), and Merck KGaA, Darmstadt, Germany (Sprifermin/
    FGF18 for knee osteoarthritis). Approximately seven of the reported ten pipeline assets do not
    have named licensor counterparties in any public record.

    The second segment is pharma AI platform partners: companies paying for access to Formation Bio's
    AI development platform. Two partners are confirmed — Pfizer (AI clinical trial software
    collaboration, 2023) and Sanofi (three-party AI collaboration with OpenAI, May 2024) — but
    financial terms and deal scope are not disclosed for either. The third segment is drug asset
    licensees: pharma companies that license or acquire Formation Bio's developed drug assets. Only
    Sanofi qualifies here, via the June 2025 gusacitinib licensing deal worth up to €545 million.
    The fourth segment is clinical trial investigative sites: the 27 TrialSpark-branded US sites
    that completed the ASN008 trial and the single Nebraska site recruiting for the BLKR201 Phase 1
    study. The fifth segment is trial patients: 144 enrolled in the ASN008 atopic dermatitis trial
    per ClinicalTrials.gov. Formation Bio structures its drug programs through subsidiaries — Libertas
    Bio for immunodermatology/gusacitinib, High Line Bio for osteoarthritis/Sprifermin — enabling
    asset-specific capital structures and partner co-investment without exposing the parent balance sheet.
