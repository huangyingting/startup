  - id: CU005
    type: company-claimed
    topic: sanofi-openai-three-party-collaboration
    statement: >
      Sanofi, Formation Bio, and OpenAI announced a three-party collaboration in May 2024 to build
      purpose-built AI models for the drug development lifecycle, combining Sanofi's pharma domain data,
      Formation Bio's clinical engineering platform, and OpenAI's model-tuning capabilities. The a16z
      investment announcement described this as "the first of its kind in the life sciences space."
      No specific AI outputs, model deployments, or deliverables have been disclosed publicly.
    sourceRefs:
    - SU004
    - SU026
    - SU029
    confidence: medium
    freshness: current
    answersQuestionRefs:
