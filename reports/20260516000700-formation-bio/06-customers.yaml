  - type: enumeration-incomplete
    severity: material
    topic: unnamed-drug-licensors
    missingEvidence: >
      Approximately seven of the ~ten in-licensed drug assets in Formation Bio's pipeline do not have
      publicly disclosed licensor counterparties. KMR301 (miR-124 inducer for autoimmune disease) and
      RVW101 (anti-CD226 monoclonal antibody for ulcerative colitis) have no named originator in any
      public source.
    whyItMatters: >
      Without knowing the full licensor counterparty list, analysts cannot assess deal terms, licensor
      concentration, whether multiple assets came from the same licensor (creating a repeat relationship),
