  - type: private-evidence-only
    severity: material
    topic: platform-revenue-zero-disclosure
    missingEvidence: >
      Formation Bio has disclosed zero revenue metrics — no platform fees, no upfront payments from
      drug licensing-in or out, no milestone receipts to date. The company does not disclose ARR,
      platform fee revenue, or any financial proof that the Pfizer and Sanofi platform collaborations
      generate recurring revenue rather than one-time or in-kind arrangements.
    whyItMatters: >
      Without any revenue data, analysts cannot distinguish between a commercial platform business and
      an R&D collaboration. If Pfizer and Sanofi receive Formation Bio platform access as part of
      equity or asset co-development arrangements rather than paid platform subscriptions, the
      platform commercialization thesis is materially weakened.
