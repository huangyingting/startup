    severity: material
    topic: review-platform-inaccessible
    missingEvidence: >
      G2 (403/js-only) and Glassdoor (broken) review profiles for Formation Bio are inaccessible to
      public unauthenticated users. No independent customer satisfaction data, product NPS, or
      complaint patterns are available from any public review platform.
    whyItMatters: >
      Pharma enterprise buyers use G2 and similar platforms for vendor evaluation. The absence of
      accessible reviews either indicates a very limited review footprint (consistent with early-stage
      commercialization) or requires enterprise credentials to access. Either scenario limits the
      ability to triangulate stated customer satisfaction.
    diligencePath: >
      Obtain enterprise-gated G2 and Glassdoor data including aggregate ratings, top complaint
