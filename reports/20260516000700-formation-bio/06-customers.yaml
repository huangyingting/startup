- id: TU005
  title: Expansion and Concentration Risk Table
  columns:
  - Expansion Driver / Concentration Risk
  - Current Status
  - Severity
  - Diligence Path
  rows:
  - - Sanofi multi-layer concentration (investor + partner + licensee)
    - Active across 3 roles; no second entity approaches this exposure
    - Critical
    - Request whether any single Sanofi relationship exit would trigger covenants or obligations in the other agreements; stress-test Formation Bio's financial model assuming Sanofi exits one role
  - - Pfizer platform exclusivity and renewal
    - Collaboration active; terms and renewal date unknown; Pfizer press release inaccessible
    - High
    - Obtain Pfizer collaboration agreement scope, exclusivity clause, annual contract value, and renewal date before close
  - - No FDA-approved drug — no commercial end-customer proven
    - All assets in Phase 1–3; gusacitinib Phase 3 is most advanced Formation Bio program; Sanofi explores new indication
    - High
    - Monitor gusacitinib Phase 3 outcome; request estimated FDA submission timeline for chronic hand eczema indication
  - - Unnamed drug licensor counterparties (~7 of ~10)
    - 3 of ~10 named publicly; ~7 unnamed assets including KMR301 and RVW101
    - High
    - Require disclosure of all ~10 drug licensor names, deal dates, and headline economics before investment close
  - - Platform partnership count (only 2 confirmed)
    - Pfizer and Sanofi only; no third pharma partner announced as of May 2026
    - High
    - Request whether any additional pharma partnerships are in due diligence or negotiation; assess pipeline of potential new platform partners
  - - Pharma partner AI internalization risk
    - Pfizer and Sanofi actively building internal AI drug development capabilities; both are simultaneously Formation Bio's best partners and biggest internalization threat
    - High
    - Assess the contractual lock-in mechanisms in platform partnerships; evaluate whether Formation Bio retains enough platform differentiation to remain competitive in 3–5 years
  - - Dual role conflict of interest
    - Formation Bio develops drugs in same therapeutic areas as pharma partners; information barrier adequacy unknown
    - Medium
    - Request description of information barriers between Formation Bio's own drug programs and AI platform work performed for pharma partners (Pfizer, Sanofi)
  - - US-only clinical trial site network
    - All confirmed sites are in US; ex-US development relies on licensees like Sanofi
    - Medium
    - Determine whether Formation Bio plans to build international site network or outsource ex-US operations to CRO/licensee partners
  - - Sanofi/OpenAI collaboration deliverables gap
    - No AI outputs disclosed 12+ months post-announcement; uncertainty about collaboration progress
    - Medium
    - Request specific AI models, features, or deliverables produced under Sanofi/OpenAI collaboration; clarify whether the collaboration is active or dormant
  notes: >
    Severity ratings are analyst assessments based on publicly available evidence and disclosure gaps
    as of May 2026. Concentration figures reflect confirmed relationships only; additional undisclosed
    partnerships may reduce concentration risk. Internalization risk timeline is estimated at 3–5 years.
