- id: SU-drug-licensing
  title: Drug Licensing Counterparties — Asset In-licensing and Out-licensing
  body: |
    Formation Bio's business model depends on sourcing high-quality clinical-stage assets from
    biotech and pharma companies at prices that allow profitable advancement. Three acquisition
    transactions have been publicly confirmed. The Asana BioSciences deal (November 2022) brought
    in gusacitinib and a broader immunodermatology portfolio; Formation Bio formed Libertas Bio
    to manage these assets and subsequently advanced gusacitinib to Phase 3 for chronic hand
    eczema. The Lynk Pharmaceuticals deal licensed BLKR201 (ex-China rights for LNK01006, a
    CNS-penetrant TYK2 inhibitor) and was exclusively reported by Endpoints News; Phase 1
    recruiting began in April 2026. The Merck KGaA deal licensed Sprifermin (recombinant FGF18
    for knee osteoarthritis) and resulted in Formation Bio forming High Line Bio; the program is
    currently in Phase 2.

    On the out-licensing side, the Sanofi gusacitinib deal (June 2025) is Formation Bio's only
    confirmed drug asset sale event. Sanofi licensed gusacitinib for a new indication not previously
    studied through a Phase 1 study, while Formation Bio's Libertas Bio subsidiary retains the
    Phase 3 program for chronic hand eczema. The deal structure — upfront plus milestones plus
    royalties — is the standard large-pharma licensing model and confirms that Formation Bio's
    exit pathway for drug assets is licensing (not IPO or acquisition of the parent). The financial
    breakdown between upfront payment and milestone tranches was not disclosed, making the near-term
    cash impact of the deal difficult to model. The BLKR201 TYK2 program is positioned in a
    therapeutic space where comparable deals have reached multi-billion-dollar valuations, potentially
    making it a future high-value out-licensing candidate.
