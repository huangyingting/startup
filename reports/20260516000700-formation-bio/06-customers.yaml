chapter:
  number: 6
  title: Customers & Partner Relationships
  summary: >
    Formation Bio operates a dual-sided model as both a buyer (acquiring clinical-stage drug assets
    from biotech/pharma licensors) and a seller (licensing AI platform capabilities to pharma
    partners and developed drug assets to strategic buyers). The customer universe divides into five
    segments: (1) drug asset licensors — Asana BioSciences (gusacitinib, acquired Nov 2022), Lynk
    Pharmaceuticals (BLKR201 ex-China rights, ~2025), and Merck KGaA Darmstadt (Sprifermin, Phase
    2) are the three publicly named counterparties of an approximately ten-asset portfolio; (2) AI
    platform partners — Pfizer (AI clinical trial software partnership, 2023) and Sanofi/OpenAI
    three-party AI collaboration (May 2024); (3) drug asset licensees — Sanofi (gusacitinib, up to
    €545 million/~$632 million in milestones plus low-to-mid-teen royalties, Jun 2025); (4)
    clinical trial investigative sites — 27 US sites engaged for the completed ASN008 atopic
    dermatitis trial (NCT05870865), and 1 site recruiting for BLKR201 Phase 1 (NCT07501039); and
    (5) trial patients — 144 enrolled in the ASN008 trial. No platform revenue, customer count,
    NRR, or retention metrics have been publicly disclosed. Sanofi occupies three simultaneous roles
    — Series D investor, OpenAI collaboration partner, and gusacitinib licensee — creating both the
    highest concentration risk and the strongest single-party validation of the business model.
    Former Pfizer CSO Mikael Dolsten joining as strategic advisor in April 2025 deepens the Pfizer
    institutional relationship beyond the software collaboration. Primary diligence gaps include
    undisclosed Pfizer partnership terms, unnamed licensors for approximately seven of ten pipeline
    assets, and zero accessible independent customer satisfaction reviews.
