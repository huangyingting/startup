- id: SU-clinical-network
  title: Clinical Trial Site and Patient Engagement
  body: |
    Formation Bio operates — and previously operated as TrialSpark — a proprietary network of
    dedicated investigative sites branded "TrialSpark Investigative Site" with unique numeric codes.
    The ASN008 Phase 2 trial (NCT05870865) for atopic dermatitis engaged 27 of these sites across
    18 US states, enrolled 144 patients (actual enrollment, per ClinicalTrials.gov), and was
    completed. States covered included California, New York, Florida, Texas, Ohio, Arizona, Virginia,
    Indiana, Washington, Utah, Louisiana, Kentucky, Missouri, North Carolina, Oklahoma, Michigan,
    Arkansas, and Pennsylvania — a distribution suggesting a national site network covering major
    metro and secondary dermatology markets. The BLKR201 Phase 1 study (NCT07501039) is recruiting
    at one site in Lincoln, Nebraska, which is typical for Phase 1 healthy-volunteer dose-escalation
    studies where single-center designs are standard.

    Prior to the Formation Bio rebrand, TrialSpark supported 300+ trials across more than 10
    therapeutic areas, per the Andreessen Horowitz investment announcement. This historical scale
    demonstrates that the site network and clinical operations capability are not nascent — they
    were developed over approximately seven years of active clinical operations. Formation Bio's
    clinical trials page explicitly invites patients, physicians, and investigators to join
    upcoming trials, with commitments to Patient Diversity, Data Transparency, and Expanded Access.
    All current confirmed trial sites are in the United States; ex-US site development for later
    Phase 3 programs or global regulatory submissions will likely need to be handled by licensees
    like Sanofi or through a new international site build-out.
