  claims:
  - id: CU001
    type: company-claimed
    topic: dual-sided-business-model
    statement: >
      Formation Bio operates a dual-sided customer model: it is simultaneously a buyer of clinical-stage
      drug assets from biotech and pharma licensors and a seller of AI platform capabilities to pharma
      partners (Pfizer, Sanofi) and developed drug assets to strategic pharma buyers (Sanofi for
      gusacitinib), making the distinction between "customer" and "vendor" highly context-dependent.
    sourceRefs:
    - SU001
    - SU004
    - SU016
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QU001
    - QU002
  - id: CU002
    type: third-party-reported
    topic: sanofi-multi-role-relationship
    statement: >
      Sanofi occupies at least three simultaneous roles in Formation Bio's commercial ecosystem: (1)
      Series D investor (significant participation in the June 2024 $372M round led by a16z); (2)
      three-party AI collaboration partner alongside OpenAI (announced May 2024, building purpose-built
      AI models for drug development); and (3) drug asset licensee for gusacitinib (up to €545 million/
      ~$632 million in milestones plus low-to-mid-teen royalties, June 2025). No other single counterparty
      holds this tri-role position.
    sourceRefs:
    - SU004
    - SU005
    - SU006
    - SU026
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QU004
    - QU011
  - id: CU003
    type: third-party-reported
    topic: gusacitinib-sanofi-deal-terms
    statement: >
      In June 2025, Formation Bio's subsidiary Libertas Bio licensed gusacitinib — an oral dual JAK/SYK
      inhibitor it acquired from Asana BioSciences in late 2022 — to Sanofi for up to €545 million
      (approximately $632 million) in combined upfront and milestone payments, plus low-to-mid-teen sales
      royalties. Sanofi will explore gusacitinib in a new indication not previously studied through a
      Phase 1 study, while Formation Bio/Libertas Bio continues the Phase 3 program for chronic hand
      eczema. This is Formation Bio's first publicly disclosed drug asset licensing-out event.
    sourceRefs:
    - SU005
    - SU006
    - SU010
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QU003
    - QU013
  - id: CU004
    type: company-claimed
    topic: pfizer-ai-collaboration
    statement: >
      Pfizer entered a collaboration with Formation Bio (then operating as TrialSpark) in 2023 for
      AI-powered clinical trial software. The scope and financial terms of the collaboration are not
      publicly disclosed; Formation Bio's press page lists this as a major partnership, and the a16z
      investment thesis cites it as third-party validation of the AI platform. The Pfizer press release
      URL returns a 404 error, preventing independent verification of deal terms.
    sourceRefs:
