- id: SU-pharma-partnerships
  title: Pharma Platform Partnerships — Pfizer, Sanofi, and OpenAI
  body: |
    The Pfizer collaboration, announced in 2023 when the company was still TrialSpark, covers
    AI-powered clinical trial software. This is listed as a press highlight on formation.bio/press,
    cited in the a16z investment announcement, and referenced throughout Formation Bio's investor
    materials as a validation signal. However, the Pfizer press release URL returns a 404 error,
    no Pfizer earnings call or annual report names Formation Bio, and neither company has disclosed
    the contract value, scope, exclusivity, or renewal terms. Former Pfizer CSO Mikael Dolsten,
    who oversaw 35+ approved medicines during his 15+ year tenure, joined Formation Bio as
    strategic advisor in April 2025 — deepening the institutional Pfizer relationship beyond the
    software collaboration, though this is an advisory role rather than a renewed commercial deal.

    Sanofi's relationship is more thoroughly documented across three interlocking transactions. First,
    Sanofi participated significantly in Formation Bio's $372 million Series D round in June 2024,
    becoming both a financial backer and a strategic investor. Second, Sanofi, Formation Bio, and
    OpenAI announced a three-party collaboration in May 2024 to build purpose-built AI models for
    drug development — described by a16z as "the first of its kind in the life sciences space."
    Third, in June 2025, Sanofi signed a licensing deal through Formation Bio's Libertas Bio
    subsidiary to develop gusacitinib in a new indication for up to €545 million (~$632 million)
    in milestones plus low-to-mid-teen royalties. This tri-role position makes Sanofi simultaneously
    Formation Bio's most important external validator and its most concentrated commercial risk.
    The Sanofi/OpenAI collaboration has not produced any publicly disclosed AI outputs, model
    deployments, or deliverables in the twelve months since announcement.
