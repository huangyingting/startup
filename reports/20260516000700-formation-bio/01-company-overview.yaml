company:
  name: Formation Bio
chapter:
  number: 1
  title: Company Overview
  summary: |
    Formation Bio is a New York City-based AI-native pharmaceutical development company founded in
    2016 by CEO Benjamine Liu and CTO Linhao Zhang, formerly operating as TrialSpark before
    rebranding in 2024. The company has raised approximately $615 million through a Series D round
    led by Andreessen Horowitz at a reported $1.8 billion valuation, with investors including
    Sequoia, Thrive Capital, General Catalyst, Sanofi, Lux Capital, and OpenAI CEO Sam Altman.
    Formation Bio acquires clinical-stage drug candidates and uses its AI-powered drug development
    engine to accelerate clinical trials, targeting the most expensive bottleneck in bringing
    medicines to patients.
sections:
  - id: s1
    title: Identity, Product and Business Model
    body: |
      Formation Bio, Inc. (formerly TrialSpark, Inc.) is a privately held AI-native pharmaceutical
      development company headquartered in New York City, New York. The company was founded in 2016
      by Benjamine Liu and Linhao Zhang and was a member of Y Combinator's 2017 batch. Formation
      Bio rebranded from TrialSpark in June 2024, coinciding with its Series D fundraise. The
      company describes itself as building the pharma company of the future by combining artificial
      intelligence with drug development expertise.

      Unlike many AI-biotech companies focused on drug discovery, Formation Bio concentrates on the
      drug development phase — the lengthy, costly process of running clinical trials to bring
      approved medicines to patients. The company's business model centers on in-licensing and
      acquiring clinical-stage drug candidates from pharmaceutical and biotech companies, then using
      its AI-powered drug development engine to advance these assets through clinical trials more
      efficiently than industry standards. Formation Bio has assembled a pipeline of approximately
      ten in-licensed drug assets across multiple therapeutic areas.

      The company's AI platform spans clinical trial design and protocol optimization, site
      selection and activation, patient recruitment and enrollment, regulatory intelligence, and
      clinical operations management. Prior to its pivot to full drug development, TrialSpark
      operated as a clinical trial technology and services provider working with pharma sponsors.
      The transition to owning drug assets represents a fundamental shift from a fee-for-service
      technology provider to a vertically integrated pharmaceutical company with direct drug
      ownership economics.
