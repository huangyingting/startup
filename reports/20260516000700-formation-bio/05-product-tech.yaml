- id: SE-drug-pipeline
  title: Drug Pipeline — Assets, Mechanisms, and Development Stages
  body: >-
    Formation Bio's disclosed pipeline comprises five in-licensed drug candidates across three therapeutic domains,
    spanning preclinical through Phase 3. The company's in-licensing model targets clinical-stage assets with
    validated biology, allowing it to apply its AI platform to compress development without bearing the cost of
    early discovery.


    KMR301 is an oral small molecule miR-124 (microRNA-124) inducer in preclinical development for autoimmune
    disease. miR-124 is a highly expressed brain and immune microRNA with documented immunomodulatory function;
    synthetic induction of miR-124 is a disease-modifying approach that may be relevant to neuroinflammatory
    autoimmune conditions including multiple sclerosis. Oral small molecule induction of a specific microRNA
    represents a differentiated mechanism in an indication class dominated by biologics.


    BLKR201 is a CNS-penetrant TYK-2 (Tyrosine Kinase 2) inhibitor in Phase 1 for inflammation. TYK-2
    inhibition has been clinically validated following BMS's Deucravacitinib (Sotyktu) FDA approval in 2022
    for plaque psoriasis. CNS penetration differentiates BLKR201 from marketed TYK-2 inhibitors, potentially
    enabling use in neuroinflammatory indications beyond peripheral autoimmune disease.


    RVW101 is an anti-CD226 monoclonal antibody for ulcerative colitis. CD226 (DNAM-1) is an activating receptor
    on cytotoxic T cells and NK cells involved in mucosal immune surveillance; blockade of this pathway represents
    a novel immunological approach to mucosal inflammation with mechanistic precedent in the broader field of
    co-stimulatory pathway modulators. Development phase was not specified on the company's public pipeline page
    as of May 2026.


    Sprifermin is recombinant human fibroblast growth factor 18 (FGF18) in Phase 2 for knee osteoarthritis.
    FGF18 promotes articular cartilage anabolism and subchondral bone remodelling, offering a disease-modifying
    approach to OA in contrast to symptomatic analgesics and surgical intervention. The asset was previously
    in-licensed and Formation Bio has conducted proprietary AI-modelled disease progression analysis using MRI
    imaging data.


    Gusacitinib is a dual SYK/JAK inhibitor (targeting both spleen tyrosine kinase and Janus kinases) in Phase 3
    for chronic hand eczema (CHE). This is Formation Bio's most advanced asset and has been out-licensed to Sanofi,
    representing the first proof of concept of Formation Bio's licensing-out model for assets advanced through
    its platform. CHE is an indication with validated precedent for JAK inhibition (e.g., abrocitinib), and
    SYK co-inhibition may offer additional anti-inflammatory breadth.


    The pipeline reflects a deliberate strategy of mechanistic novelty within validated pathway classes, reducing
    the binary risk of first-in-class programs while enabling differentiation claims within competitive indications.
    Across the five assets, two modalities are present (small molecule and biologic/mAb/recombinant protein),
    and three therapeutic domains are addressed (autoimmune/inflammation, gastroenterology, musculoskeletal).
