- id: SE-regulatory
  title: Regulatory Considerations for AI in Clinical Development
  body: >-
    The regulatory environment for AI in clinical trials is in active development globally, and Formation Bio's
    platform sits at the intersection of multiple emerging regulatory frameworks.


    FDA's CDER received more than 500 drug application submissions containing AI components between 2016 and
    2023, demonstrating that AI-assisted drug development is already mainstream from a submission volume
    perspective. In January 2025, FDA published its draft guidance, 'Considerations for the Use of Artificial
    Intelligence to Support Regulatory Decision-Making for Drug and Biological Products', which requires
    sponsors submitting AI-generated or AI-supported data to demonstrate the AI system's performance, document
    its development process, and provide evidence of human oversight. This is directly relevant to Formation
    Bio if any AI-generated outputs (protocol designs, site selection recommendations, patient eligibility
    assessments) are incorporated into regulatory submissions.


    In January 2026, FDA and EMA jointly published 'Guiding Principles of Good AI Practice in Drug Development',
    creating a cross-jurisdictional framework that sponsors seeking global approvals must navigate. The FDA's
    CDER AI Council, established in 2024, now provides centralised oversight and is developing further guidance
    on internal AI use and AI submissions — indicating that regulatory evolution will continue at a pace that
    requires Formation Bio to maintain an active regulatory intelligence function.


    Formation Bio's AI workflows currently provide decision support (indications landscaping, protocol
    recommendations, patient recruitment prioritisation) rather than generating AI-authored regulatory
    documents. This positions the company in a lower-risk regulatory category than sponsors attempting to use
    generative AI to write clinical study reports or automated safety narratives. However, as the platform
    matures and outputs become more directly embedded in submission documents, the compliance burden will
    increase.


    Formation Bio's clinical trials commitment page notes patient diversity, data transparency, and expanded
    access as core principles — consistent with ICH E6(R3) GCP guidance which now explicitly addresses
    electronic systems and data integrity in clinical trials, and with FDA's expectation for sponsors using
    AI-enabled trial management tools to maintain full audit trail capability for all AI-assisted decisions.
