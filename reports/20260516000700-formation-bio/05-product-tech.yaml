acknowledgedWarnings:
- dimension: paywallRisk
  reason: Five of 25 sources in this chapter have restricted accessStatus (4 js-only, 1 paywall), representing
    20% of total sources — below the 25% chapter warning threshold. The js-only sources are Formation Bio's
    own platform and about pages (SE009, SE010) and ClinicalTrials.gov search results (SE016, SE017); all
    four represent pages that are publicly intended to be accessible but fail for non-browser automated
    access. The paywall source (SE015, Nature) provides context on AI clinical trial acceleration market
    dynamics. All substantive platform and pipeline claims are corroborated by the four fully accessible
    Formation Bio engineering blog posts (SE005, SE006, SE007, SE025) and the official pipeline page (SE002).
