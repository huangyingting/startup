- id: TE004
  title: Technical Risk Register — Formation Bio AI Platform
  columns:
  - Risk
  - Category
  - Severity
  - Current Evidence
  - Probability Assessment
  - Mitigation or Diligence Path
  rows:
  - - Unvalidated development acceleration claims
    - Performance Risk
    - High
    - No public benchmarks; one-week Sprifermin analysis is one anecdote; no Phase 3 results under Formation
      Bio management published
    - High probability risk materialises at IPO or licensing negotiations
    - Request internally audited cycle-time data per pipeline asset; commission third-party benchmark audit
  - - OpenAI API vendor concentration
    - Technology Risk
    - Medium
    - Documented dependence on OpenAI for embeddings and LLM queries in two core workflows
    - Medium — OpenAI has shown pricing stability; but enterprise API access is not guaranteed
    - Evaluate fallback LLM providers (Anthropic, Azure OpenAI, open-source); assess cost impact of switching
  - - LLM reliability in clinical data workflows
    - Technical Risk
    - Medium
    - Blog acknowledges only ~9% component overlap from initial processing; endpoint deduplication required
      iterative prompt engineering
    - Medium — current use is decision support not autonomous action; manual validation partially mitigates
    - Request error rate data by workflow step; validate Muse human approval gate protocols
  - - Platform page inaccessibility (external diligence gap)
    - Disclosure Risk
    - Moderate
    - Platform and about pages are JS-rendered and return no content to crawlers; no formal public platform spec
    - Low probability of intentional obscurity; likely technical oversight
    - Request formal platform specification and architecture document under NDA
  - - Key-person concentration in engineering leadership
    - Talent Risk
    - High
    - Platform is entirely custom-built; no public documentation of platform architecture; CTO Linhao Zhang
      appears central to technical vision
    - Medium — common at this stage; mitigated by Mikael Dolsten hire on pharma side
    - Request engineering organisation structure; assess succession plan for CTO and platform team leads
  - - Evolving FDA AI regulatory requirements
    - Regulatory Risk
    - Moderate
    - FDA January 2025 draft guidance and January 2026 FDA-EMA principles require AI validation documentation
      for submissions; Formation Bio's AI is currently decision support not submission content
    - Low-medium risk in near term; increases as platform matures into submission workflows
    - Monitor FDA CDER AI Council guidance updates; ensure regulatory affairs team tracks evolving requirements
  notes: Risk register compiled from engineering blog disclosures, GitHub analysis, and FDA regulatory guidance
    documents. Risk probability and severity are analyst assessments based on available evidence and are not
    sourced from Formation Bio management representations.
  enumerationScope:
    coverage: partial
    basis: Six risks identified from available public sources. Additional operational risks (clinical hold risk,
      IP disputes, CMC manufacturing risks for biologics) exist but fall outside this chapter scope.
