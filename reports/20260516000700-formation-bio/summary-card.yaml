  topStrengths:
    - >-
      Blue-chip investor syndicate (a16z, Sequoia, General Catalyst, Thrive) with strategic pharma validation from
      Sanofi as dual investor-partner and Pfizer collaboration.
    - >-
      Differentiated AI-native pharma model targeting drug development bottleneck rather than discovery, with
      in-licensed pipeline spanning preclinical to Phase 3 across multiple therapeutic areas.
    - >-
      Strong founding team with deep domain expertise (Liu Oxford comp bio PhD, Corcoran former Allergan CMO, team with
      45+ approved drugs collectively) and $615M war chest for multi-asset development.
  topRisks:
    - >-
      Clinical trial portfolio risk is existential — all ~10 in-licensed drug candidates face industry-standard 90%+
      failure rates from Phase I to approval, and concentrated failures could impair the company's capital and thesis.
    - >-
      No disclosed revenue, ARR, burn rate, or audited financials; the $1.8B valuation cannot be benchmarked or
      stress-tested against comparable AI-pharma or biotech companies.
    - >-
      AI platform performance is unverifiable — no published trial acceleration benchmarks, cost-reduction metrics, or
      head-to-head comparisons versus traditional CRO timelines exist in public domain.
    - >-
      Concentration risk on Sanofi (investor, partner, Gusacitinib licensee) and key-person dependency on CEO Liu and
      CTO Zhang create operational fragility.
  unresolvedGaps:
    - Audited revenue, ARR, growth rate, gross margin, net revenue retention, and burn rate are not publicly disclosed.
    - >-
      AI platform performance benchmarks (trial speed, cost savings, patient enrollment efficiency) have not been
      published or independently verified.
    - >-
      Drug pipeline detail beyond 5 disclosed assets is unknown; therapeutic area distribution, clinical data readouts,
      and timeline for remaining ~5 assets are private.
    - Post-Series D secondary marks, tender pricing, and cap-table evolution since June 2024 are not confirmed.
    - Full C-suite roster, board composition, and governance structure are not publicly enumerated.
