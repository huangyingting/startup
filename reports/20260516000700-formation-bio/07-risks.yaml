      system, Muse patient-recruitment AI, or clinical data-structuring tools has been published;
      the company's claimed 10x efficiency improvement rests on internal assertions in engineering
      blog posts, not independently verified clinical trial cycle-time data.
    sourceRefs:
    - SR010
    - SR015
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR007
    - QR008
