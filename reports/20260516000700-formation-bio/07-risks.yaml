  claims:
  - id: CR001
    type: third-party-reported
    topic: FDA-AI-drug-development-draft-guidance-2025
    statement: >-
      In January 2025, FDA published a draft guidance titled "Considerations for the Use of
      Artificial Intelligence to Support Regulatory Decision Making for Drug and Biological
      Products," establishing new expectations for sponsors who use AI to generate or process
      information intended to inform safety, efficacy, or quality regulatory decisions — covering
      exactly the type of AI-assisted indication selection, trial design, and data structuring
      that Formation Bio's platform performs.
    sourceRefs:
    - SR001
    - SR002
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR002
  - id: CR002
    type: third-party-reported
    topic: FDA-CDER-AI-Council-2024-regulatory-trajectory
    statement: >-
      The FDA CDER AI Council, established in 2024, is actively developing internal policy for
      AI-containing drug submissions; the FDA has received over 500 drug application submissions
      with AI components from 2016 to 2023, with the pace increasing each year. This escalating
      review volume signals that FDA is building institutional capacity to impose more rigorous
      AI validation requirements.
    sourceRefs:
    - SR001
    - SR002
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR002
    - QR003
  - id: CR003
    type: third-party-reported
    topic: EMA-international-AI-divergence-risk
    statement: >-
      The EMA is developing its own AI guidance for medicines development in parallel with FDA;
      divergent US/EU documentation requirements for AI-assisted clinical data could force
      Formation Bio to maintain separate validation packages for each regulatory jurisdiction,
      increasing costs and potentially delaying international program timelines.
    sourceRefs:
    - SR005
    - SR006
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR003
    - QR004
  - id: CR004
    type: third-party-reported
    topic: NIST-AI-RMF-voluntary-standard-adoption
    statement: >-
      NIST's AI Risk Management Framework (AI RMF) is a voluntary standard but is increasingly
      referenced in federal AI policy and may be cited in final FDA and ICH AI guidance as a
      baseline governance expectation for AI developers in regulated industries including
      pharmaceutical development.
    sourceRefs:
    - SR004
    - SR001
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR003
    - QR004
  - id: CR005
    type: third-party-reported
    topic: ip-licensing-legal-termination-risk-pharma
    statement: >-
      Formation Bio's in-licensing model means it holds contractual rights rather than
      wholly-owned IP for most pipeline assets. Standard pharmaceutical licensing agreements
      include licensor termination rights triggered by material breach (missed milestones,
      sublicensing violations), insolvency events, or regulatory failure conditions, exposing
      Formation Bio to asset loss without corresponding compensation.
    sourceRefs:
    - SR009
    - SR012
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR005
    - QR006
  - id: CR006
