    statement: >-
      Formation Bio's estimated annual cash burn of $80-200M derives from $30-40M headcount
      costs (190-207 employees at standard biotech loaded cost) plus $50-160M in estimated
      clinical program expenses across active Phase 1-3 trials; at the midpoint, this implies
      an estimated 2-3 year runway from the June 2024 Series D with no new financing.
    sourceRefs:
    - SR016
    - SR017
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR010
    - QR011
  - id: CR009
    type: inferred
    topic: Sprifermin-Phase2-binary-risk
    statement: >-
      Sprifermin (recombinant FGF18, Phase 2 osteoarthritis) is the highest-risk near-term
      binary event outside Sanofi's Gusacitinib program; multiple agents have historically
      failed Phase 2/3 trials in osteoarthritis due to difficulty demonstrating disease-
      modifying benefit rather than symptom relief, making the Phase 2 primary endpoint
      read-out a critical credibility signal for Formation Bio's pipeline thesis.
    sourceRefs:
    - SR009
