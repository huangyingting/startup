      - number: '1.5'
        title: Milestones, Rebrand and Adverse Events
        blocks:
          - type: paragraph
            body: |
              Formation Bio's trajectory reflects a deliberate evolution from clinical trial technology
              startup to AI-native pharmaceutical company. Founded in 2016 as TrialSpark, the company
              initially built clinical trial software and services for pharma sponsors. Its participation
              in Y Combinator's 2017 batch provided early validation and network effects. The company
              progressively expanded from technology-only into full drug ownership, acquiring clinical-stage
              assets and building in-house development capabilities.

              The June 2024 rebrand from TrialSpark to Formation Bio marked the company's strategic pivot,
              signaling that drug development — not trial technology — was the primary business. The $372
              million Series D raised simultaneously provided capital to build out the drug portfolio.
              Andreessen Horowitz described the opportunity as creating a tech-native pharma company at
              scale, noting that few large pharma companies have been created or founder-led in the past
              century.

              No material legal, regulatory enforcement, sanctions, breach disclosure, or product recall
              has been publicly reported against Formation Bio or TrialSpark as of May 16, 2026. However,
              the pharmaceutical development business carries inherent clinical trial risk — any of the
              ten in-licensed drug candidates could fail in clinical trials, resulting in sunk capital. The
              company's relatively young age (founded 2016) and limited public financial disclosure mean
              that execution risk against the ambitious drug portfolio strategy remains largely unobservable
              from public sources. Concerns about the sustainability of the AI-pharma business model and
              clinical trial failure rates represent material adverse considerations for diligence.
