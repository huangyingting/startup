      - number: '8.4'
        title: Risk-Adjusted NPV of Drug Pipeline
        blocks:
          - type: paragraph
            body: >-
              Formation Bio has five publicly disclosed pipeline assets: Gusacitinib (Phase 3, chronic hand eczema,
              licensed to Sanofi under a deal worth up to €545M), Sprifermin (Phase 3, knee osteoarthritis), RVW101
              (Phase 2), BLKR201 (Phase 2), and KMR301 (Phase 1/2). Additionally, the Mikael Dolsten press release
              (April 2025) stated Formation held four majority-owned assets at that time with a goal to reach 10–15 over
              three to five years.


              Applying standard industry phase-transition success rates: Phase 3 → NDA ~65%, Phase 2 → approval ~27%,
              Phase 1/2 → approval ~15%. Gusacitinib's retained value is primarily milestone payments from Sanofi (the
              out-licensing has removed execution risk for that asset) plus royalties on any eventual approval. The
              deal's upfront payment is undisclosed; the milestone structure (up to €545M total) implies Formation would
              capture $100–250M in risk-adjusted milestones over the asset's life. Sprifermin, as a Phase 3 asset in
              knee osteoarthritis — a condition with large unmet need and multi-hundred-million-dollar peak sales
              potential — carries an rNPV of approximately $150–350M depending on eventual peak sales ($500M–$1.5B),
              discount rate (12–15%), and probability of success (50–65%). Phase 2 assets (RVW101, BLKR201) carry rNPVs
              of $30–80M each; the Phase 1/2 asset (KMR301) contributes $10–30M on a probability-weighted basis.


              Aggregate disclosed-pipeline rNPV under base assumptions (mid-probability, 12% discount rate):
              approximately $500–900M. The AI development platform itself adds franchise value — the ability to
              identify, underwrite, and advance additional assets at superior speed and cost carries an option value on
              future pipeline deals, an asset Formation Bio CEO Benjamine Liu has compared explicitly to Roivant's
              model. Including platform franchise value at 1.5–2× disclosed rNPV implies a total enterprise value of
              $750M–$1.8B under base conditions — consistent with the Series D mark. Under bull conditions (2× rNPV on
              stronger Phase 3 read-outs plus platform monetization), enterprise value could reach $2–4B. Under bear
              conditions (Phase 3 failures, no new licensing deals), the residual value could fall to $300–700M.
            claimRefs: []
