              Dr. Mikael Dolsten (former Pfizer CMO/R&D Chief) joined in 2025 to chair the drug-picking committee,
              adding validation but creating dependency on an external advisor whose clinical judgment may be material
              for pipeline decisions. Forbes estimates Liu's equity stake at over $150M and Zhang's at over $100M,
              creating strong personal retention incentives, but no public succession plans, vesting schedules, or
              retention agreements have been disclosed.


              IP risk in the in-licensing model differs from typical biotech. Formation Bio holds licensing rights from
              originating companies rather than wholly-owned core chemistry or regulatory filings. If a licensor enters
              bankruptcy, disputes royalty calculations, or exercises contractual termination rights under a
              material-breach scenario, Formation Bio could lose a pipeline asset with limited recourse. The
              TrialSpark-to-Formation Bio rebrand (June 2024) marks a fundamental operational pivot from clinical trial
              services provider to drug asset owner — different capabilities, risk profile, and organizational culture.
              Managing Phase 2 and Phase 3 clinical programs as a technology-company-turned- pharma-operator introduces
              operational execution risks that the team is still proving it can manage at commercial scale, without a
              track record of Phase 3 execution prior to Gusacitinib (which is now Sanofi's responsibility
