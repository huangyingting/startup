      - number: '8.3'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >-
              Formation Bio's valuation requires a heterogeneous comparable set because no public company maps precisely
              onto its hybrid AI-platform + drug-ownership model.


              Public AI-pharma peers are the first reference: Recursion Pharmaceuticals (RXRX) carries a ~$1.77B market
              cap as of May 8, 2026, with $65.7M trailing revenue (FY2025) and an EV of $1.19B — implying an EV/revenue
              of approximately 18×, but with operating losses of ~$585M annually. Relay Therapeutics (RLAY) commands a
              ~$2.45B market cap with a ~$12M trailing revenue base and an EV/revenue of ~172×, reflecting
              clinical-stage optionality pricing. Absci (ABSI) holds a ~$919M market cap on ~$860K trailing revenue, an
              EV/revenue exceeding 400×. These AI-pharma comps are informative as sentiment gauges but are poor direct
              comparables because they focus on AI-assisted drug discovery whereas Formation Bio focuses on AI-enabled
              drug development (a later, higher-capital-intensity stage).


              Portfolio pharma comparables offer the more structurally relevant benchmark. Roivant Sciences (ROIV) —
              which employs an explicitly parallel model of in-licensing clinical assets and building newco subsidiaries
              ("Vants") to develop them — carries a ~$21B market cap as of May 15, 2026. Roivant has conducted 12
              positive Phase 3 trials since 2019 and achieved a commercial launch (VTAMA). Formation Bio at its current
              stage of 4–5 clinical assets (with one Phase 3 asset licensed out) is meaningfully earlier than Roivant
              was when it first reached $5–10B territory; the appropriate discount is substantial.


              CRO comparables (IQVIA, Medpace, ICON) are most relevant for Formation Bio's services component and its
              clinical operations platform. IQVIA carries a ~$28B market cap on ~$16.6B annual revenue (P/S ~1.7×);
              Medpace carries ~$11.9B market cap with P/E of 26× on Q1 FY26 quarterly revenue of $706M (~$2.8B
              annualized); ICON carries ~$9.1B market cap with ~$8B annualized revenue. These CRO multiples are
              irrelevant as direct Formation Bio multiples since Formation is not primarily a services business, but
              they establish the floor for any services-value component and demonstrate that the operational execution
              layer carries meaningful stand-alone value to large pharma.


              The most adverse comparable is BenevolentAI, which proposed to delist from the London Stock Exchange in
              February 2025 following clinical failures and a near-complete collapse of market value. BenevolentAI
              represents the worst-case scenario for an AI-native drug company that fails to advance pipeline assets to
              commercial success. Insilico Medicine (~$900M last round in 2023) provides a mid-range private-market
              AI-pharma data point.
