      - number: '4.6'
        title: Financial Diligence Gaps and Risk Register
        blocks:
          - type: paragraph
            body: >-
              Formation Bio's financial profile presents substantial opacity commensurate with its status as a private,
              clinical-stage company. Five critical diligence gaps cannot be resolved from public information: (1)
              Revenue — no income statement metrics are publicly available; third-party estimates of $39–42M annual
              revenue are algorithmic models, not company data; the difference between a deal-heavy year and a no-deal
              year could span hundreds of millions; (2) Cash position and burn rate — without balance sheet disclosure,
              runway assessment requires a $120M range of uncertainty; (3) Upfront payment from the gusacitinib Sanofi
              deal — undisclosed but potentially $63–125M based on comparable deal precedents, critically important for
              liquidity assessment; (4) Asset-level development cost basis — Formation has not disclosed how much
              capital it has deployed into each of its ~10 clinical programs; and (5) Cap table structure and dilution —
              exact ownership and dilution history across five-plus rounds are unknown. The primary financial risks are:
              clinical program failure (the most consequential risk, as all milestone and royalty revenue is contingent
              on clinical success; Phase 3 programs fail approximately 50–60% of the time in industry benchmarks);
              valuation mark-to-market risk (the $1.8B private mark is substantially above public comparable levels for
              AI drug discovery companies post-2022 correction, raising down-round risk); concentration risk in the
              Sanofi relationship (Sanofi is both largest disclosed financial deal and largest strategic investor — any
              deterioration of this relationship would have outsized financial impact); and pipeline-stage risk (most
              assets are in Phase 2 or early Phase 3, with 3–7 years to potential commercial revenue, creating a long
              capital horizon). Positive financial signals include the validation of the licensing model via the
              gusacitinib deal, the strong investor syndicate quality, no public adverse events, and continued active
              hiring and scientific advisory board expansion. These signals are consistent with adequate but not
              abundant capital, and a company actively managing its burn toward the next milestone-triggered revenue
              event.
