      - number: '4.4'
        title: Cash Burn, Runway, and Capital Deployment
        blocks:
          - type: paragraph
            body: >-
              Formation Bio does not publicly disclose its cash position, monthly burn rate, or balance sheet; all burn
              analysis relies on observable proxies and disclosed funding data. The company's approximately 190–207
              employees (per Growjo and CompWorth, as of early 2026) is lean relative to a 10-asset clinical portfolio,
              supporting its AI-efficiency thesis. At a fully-loaded average cost of $150,000–$200,000 per employee per
              year, annual personnel expenditure is estimated at $30–40 million. The dominant cost driver is clinical
              trial operations: Phase 2 and Phase 3 clinical trials in therapeutic areas such as immunology and
              dermatology typically cost $10–50 million per program per year in external CRO fees, site costs, and
              investigational drug supply. With approximately 5–8 programs active at any given time, Formation's
              trial-related annual spend likely ranges from $50–150 million, yielding a total estimated annual burn of
              $80–200 million. Against the $372 million Series D closed June 2024, estimated remaining capital as of May
              2026 (~23 months post-close) is approximately $172–292 million, providing roughly 1.5–3.5 years of
              additional runway before the next financing event. This estimate does not include the upfront cash
              component of the June 2025 Sanofi gusacitinib deal, which is undisclosed but could contribute an estimated
              $63–125 million (10–20% of €545M headline value) and materially extend runway. Formation earmarked Series
              D proceeds "mainly toward partnership acquisition efforts and R&D," indicating active capital deployment
              into new asset acquisitions rather than capital preservation. No adverse financial signals — layoffs,
              operational scale-backs, emergency bridge financing, or distress signals — have been reported as of May
              2026; the April 2025 Dolsten appointment, ongoing pipeline expansion, and the Sanofi deal are all
              consistent with a well-funded operational posture. The critical unknown is whether Formation Bio will need
              a Series E before its first drug reaches commercialization (a multi-year horizon), which would depend on
              the magnitude of deal-flow revenue from additional licensing transactions.
