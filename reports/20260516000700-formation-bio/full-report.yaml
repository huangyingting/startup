  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Clinical Trial Pipeline Risk
        blocks:
          - type: paragraph
            body: >-
              The 90%+ failure rate from Phase I entry to regulatory approval is the foundational risk in pharmaceutical
              development, and it applies to Formation Bio regardless of how efficiently its AI platform runs clinical
              operations. A comprehensive 2019 analysis of 21,143 compounds in clinical development from 2000 to 2015
              found an overall Phase I-to-approval success rate of approximately 9.6%, with phase-transition
              probabilities of ~52% (Phase I to II), ~29% (Phase II to III), and ~58% (Phase III to approval). Formation
              Bio's business model of in-licensing clinical-stage assets and deploying AI to accelerate development does
              not alter these scientific attrition probabilities; it aims only to compress the time and cost per
              transition. Applied to a 10-asset portfolio with a 15% per-asset success assumption (1.5x the historical
              base rate, reflecting quality asset selection and ATLAS AI scoring), the statistical expectation is 1-2
              approved drugs.


              The disclosed pipeline presents a staged risk hierarchy. Gusacitinib (SYK/JAK inhibitor, Phase 3, hand
              eczema) is the most de-risked asset — in June 2025 Sanofi licensed it for up to EUR 545M including
              milestones, effectively shifting most Phase III execution risk to Sanofi. Sprifermin (recombinant FGF18,
              Phase 2, knee osteoarthritis) faces a historically difficult indication where multiple agents have failed
              to show disease-modifying benefit; the Phase 2 read-out is pivotal. BLKR201 (LNK01006, TYK2 inhibitor,
              Phase 1) entered a crowded TYK2 landscape following Takeda's multibillion-dollar acquisition of Nimbus
              Therapeutics' TYK2 program in 2022; Formation Bio's strategy of pursuing a novel undisclosed indication
              via ATLAS differentiation adds both potential upside and scientific uncertainty. RVW101 (anti-CD226,
              ulcerative colitis) is early-stage with limited public data. KMR301 (autoimmune, preclinical) has the
              longest path to market. Across all assets, the in-licensing model adds counterparty risk: if a licensor
              becomes insolvent, disputes royalty calculations, or exercises contractual termination rights, Formation
              Bio could lose the asset.
            claimRefs: []
