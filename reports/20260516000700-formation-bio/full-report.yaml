              cited in the a16z investment announcement, and referenced throughout Formation Bio's investor
              materials as a validation signal. However, the Pfizer press release URL returns a 404 error,
              no Pfizer earnings call or annual report names Formation Bio, and neither company has disclosed
              the contract value, scope, exclusivity, or renewal terms. Former Pfizer CSO Mikael Dolsten,
              who oversaw 35+ approved medicines during his 15+ year tenure, joined Formation Bio as
              strategic advisor in April 2025 — deepening the institutional Pfizer relationship beyond the
              software collaboration, though this is an advisory role rather than a renewed commercial deal.

              Sanofi's relationship is more thoroughly documented across three interlocking transactions. First,
              Sanofi participated significantly in Formation Bio's $372 million Series D round in June 2024,
