  - id: TR005
    title: Mitigation and Kill Criteria Table
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Action Implication
    rows:
      - - FDA AI guidance finalized with binding validation requirements
        - FDA Federal Register; FDA guidance database
        - Final guidance issued with requirements inconsistent with Formation Bio current platform
        - Diligence blocker — assess whether Formation Bio has completed required validation studies
      - - Gusacitinib Phase 3 clinical hold or Sanofi program termination
        - FDA clinical trials database; Sanofi press releases; ClinicalTrials.gov NCT records
        - Any FDA clinical hold on Gusacitinib or Sanofi announcing program discontinuation
        - Thesis break — Gusacitinib is lead de-risked asset; loss requires full pipeline re-underwrite
      - - CEO Liu or CTO Zhang departure from executive role
        - LinkedIn profile changes; company press releases; Formation Bio leadership page
        - Either founder departs executive role or transitions to advisory/board capacity
        - Yellow flag — assess bench depth, succession plan, and investor alignment on replacement
      - - Down-round financing at Series E below $1B valuation
        - PitchBook; Crunchbase; press releases; SEC Form D
        - Any disclosed financing at post-money valuation below $1B
        - Thesis break — re-underwrite pipeline NPV and investor alignment; assess ratchet/anti-dilution terms
      - - Sprifermin Phase 2 fails primary endpoint
        - ClinicalTrials.gov; Formation Bio press release
        - Phase 2 failure to meet primary endpoint or program discontinuation for futility
        - Yellow flag — only non-Sanofi partnered asset in late clinical stage; assess pivot options
      - - AI platform benchmark published showing no cycle-time advantage
        - Academic journals; peer-reviewed publications; FDA submission disclosures
        - Third-party analysis showing Formation Bio AI tools perform equivalently to traditional CRO methods
        - Thesis break — core efficiency and premium valuation predicated on AI cycle-time advantage
      - - BLKR201 Phase 1 safety signal or competitor TYK2 approved in target indication
        - ClinicalTrials.gov; FDA Adverse Events Reporting; competitor press releases
        - IND safety hold on BLKR201 or Phase 3 competitor TYK2 approval in Formation Bio target indication
        - Yellow flag — reassess BLKR201 indication strategy; evaluate portfolio breadth
    claimRefs:
      - CR018
      - CR019
      - CR020
    notes: >-
      Criteria cover the top-priority risks identified across all five chapter sections. Triggers are externally
      monitorable from public sources. Internal financial, clinical, and personnel events may not be immediately public;
      monitoring requires active investor update access.
