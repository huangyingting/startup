      - number: '1.3'
        title: Funding History and Capital Formation
        blocks:
          - type: paragraph
            body: |
              Formation Bio has raised approximately $615 million in total disclosed funding across multiple
              rounds, reaching a reported valuation of $1.8 billion. The company's earliest funding came
              through Y Combinator in 2017 when it was still operating as TrialSpark. Michael Moritz, the
              former Sequoia chairman, wrote the company's first institutional check, and the company has
              since attracted a blue-chip investor syndicate spanning both technology and healthcare venture
              capital.

              The most recently announced round was a $372 million Series D in June 2024, led by Andreessen
              Horowitz. Participants included Sanofi (strategic investor), Sequoia, General Catalyst, Lux
              Capital, Thrive Capital, SV Angel, Y Combinator, John Doerr (Kleiner Perkins chairman), and
              Emerson Collective. Additionally, OpenAI CEO Sam Altman participated as an individual investor.
              Andreessen Horowitz's Scott Kupor described Formation Bio as building the pharma company of the
              future at the intersection of technology and biology.

              Prior rounds included undisclosed earlier stage rounds, bringing cumulative capital to the $615
              million figure reported by Forbes. The Series D coincided with the TrialSpark-to-Formation Bio
              rebrand and marked the company's transition from clinical trial technology provider to
              vertically integrated AI-native pharma company. No subsequent round has been publicly announced
              between the Series D and the report date of May 16, 2026. The company has not disclosed any
              debt facility, secondary tender, or convertible note arrangements.
