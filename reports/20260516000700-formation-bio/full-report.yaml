      - number: '2.5'
        title: Sizing Confidence, Diligence Gaps, and Contradictory Estimates
        blocks:
          - type: paragraph
            body: >-
              Market sizing for Formation Bio's market opportunity faces structural challenges that reduce confidence in
              any single estimate.


              Contradictory estimates: The AI in drug discovery/development market range spans $1.7 billion (Grand View
              Research, drug discovery focus only) to $28.6 billion (MarketsandMarkets, broader drug discovery
              technologies including instruments and reagents) for 2024. These estimates are not reconcilable because
              they define the market boundary differently. Formation Bio competes most specifically in the AI-enabled
              clinical operations optimization sub-segment, which may represent $1–2 billion of the broader figures
              today. Multiple analyst firms project 20–30 percent CAGRs for this segment, but with base years and market
              definitions that cannot be directly compared. These contradictory estimates are preserved here as evidence
              of definitional uncertainty rather than resolved through averaging.


              Key diligence gaps: (1) Formation Bio has no approved drugs as of 2026, making its pipeline success rate
              empirically unverifiable. SOM projections depend on approval rate assumptions drawn from industry
              baselines rather than company-specific evidence. (2) The counterfactual clinical trial timeline for
              Formation Bio's in-licensed assets under traditional CRO management is unknown, making AI value
              attribution speculative. (3) Partnership economics—fees, milestones, royalty structures—are confidential
              and not publicly disclosed by Formation Bio or its partners. (4) Long-term competitive dynamics between
              AI-native pharma companies and internal pharma AI programs are unresolved; large pharma's internal AI
              buildout timelines and capability depth are not publicly known. (5) The addressable pool of high-quality
              in-licensable clinical-stage assets at prices Formation Bio can afford may be more constrained than
              aggregate pipeline statistics suggest, particularly as the competitive market for licensing deals heats
              up.


              These gaps mean Formation Bio's SOM and ultimate market position cannot be sized with high confidence. The
              $2–5 billion NPV scenario range is based on approval rate assumptions that remain unverified by company
              track record.
