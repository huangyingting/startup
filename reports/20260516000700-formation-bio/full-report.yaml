      - number: '7.2'
        title: Regulatory and AI Governance Risk
        blocks:
          - type: paragraph
            body: >-
              FDA regulatory risk for AI-assisted drug development is real and actively evolving. In January 2025, the
              FDA published a draft guidance titled "Considerations for the Use of Artificial Intelligence to Support
              Regulatory Decision Making for Drug and Biological Products," establishing new expectations for sponsors
              who use AI to generate or process information intended to inform safety, efficacy, or quality regulatory
              decisions. The guidance covers AI used in clinical trial design, patient cohort definition, endpoint
              selection, and data structuring — areas that map directly to Formation Bio's ATLAS indication-evaluation,
              Muse patient-recruitment, and clinical data-structuring AI tools. If the final guidance requires extensive
              pre-submission AI validation studies or imposes algorithmic transparency and auditability requirements
              that Formation Bio's current platform cannot satisfy without significant engineering rework, the company's
              claimed efficiency advantage could be delayed or constrained.


              The FDA CDER AI Council, established in 2024, is actively developing internal policy for reviewing
              AI-containing submissions; the agency has received over 500 drug applications with AI components from 2016
              to 2023. The increasing regulatory scrutiny increases the risk that AI-generated data in IND, NDA, or BLA
              submissions could face enhanced review cycles, requests for additional validation data, or rejection of
              AI-generated evidence as not meeting current evidentiary standards. Internationally, EMA and ICH are
              developing parallel AI frameworks; divergent multi-region requirements could complicate the global
              clinical development plans Formation Bio may need for large-indication assets.
            claimRefs: []
