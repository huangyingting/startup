  - id: FM003
    title: Formation Bio Market Value Chain and Buyer Flow
    type: flow
    layout: standard
    summary: >-
      Formation Bio sits at the center of a value chain connecting pharmaceutical asset owners (suppliers) with clinical
      execution infrastructure, regulatory agencies, and ultimately payers. The company's AI platform intermediates
      between in-licensed drug assets and trial execution networks to produce regulatory-approved products.
    data:
      nodes:
        - id: pharma-owners
          label: Large Pharma / Biotech Asset Owners
          detail: In-license clinical-stage assets to Formation Bio; Pfizer, Sanofi as strategic partners
        - id: formation
          label: Formation Bio (AI Platform + Capital)
          detail: Acquires assets, deploys AI for trial design, site selection, patient recruitment
        - id: cro-sites
          label: CRO Network and Trial Sites
          detail: ICON, Syneos, PPD and 12,000+ registered trial sites execute operations
        - id: patients
          label: Clinical Trial Participants
          detail: Recruited, enrolled, and monitored across trial sites
        - id: fda
          label: Regulatory Agencies (FDA / EMA)
          detail: Review IND, approve NDA/BLA; determine commercial pathway
        - id: payers
          label: Payers and Commercial Market
          detail: Insurers, PBMs, Medicare/Medicaid; set reimbursement; royalty economics realized
      edges:
        - from: pharma-owners
          to: formation
          label: In-license deal (asset + rights)
        - from: formation
          to: cro-sites
          label: AI-optimized trial contracts
        - from: formation
          to: patients
          label: AI-matched patient recruitment
        - from: cro-sites
          to: patients
          label: On-site clinical operations
        - from: formation
          to: fda
          label: IND / NDA / BLA submission
        - from: fda
          to: payers
          label: Approved drug label
    approximationNotes: >-
      Flow diagram is a schematic representation of Formation Bio's business model. Edge labels describe principal
      information and asset flows, not contractual structures. Royalty flows from payers back to Formation Bio (and
      milestone payments back to asset originators) are not shown for diagram clarity.
