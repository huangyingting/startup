      - number: '5.5'
        title: Technical Risks and Platform Limitations
        blocks:
          - type: paragraph
            body: >-
              Formation Bio's AI-native model carries several technical risks that diligence must evaluate carefully.


              The most material risk is the absence of independently validated development acceleration benchmarks.
              Formation Bio's core value proposition is that its AI platform compresses clinical trial timelines and
              costs, but no public data compares Formation Bio-managed trial timelines against industry benchmarks for
              equivalent indications and phases. The one-week Sprifermin MRI analysis case is compelling but represents
              a single in silico diligence exercise, not a completed pivotal trial. Until Gusacitinib's Phase 3 data is
              publicly reported and its cycle time verified, the acceleration claim rests on company-reported examples
              without third-party validation.


              Vendor concentration risk is real. Formation Bio's documented use of OpenAI APIs for clinical data
              structuring (endpoint embeddings) and indication landscaping (web-search augmented LLM queries) creates
              dependency on OpenAI's pricing, API stability, and model performance. The company's own engineering blog
              acknowledges LLM limitations: endpoint deduplication required multiple iterations before reaching
              acceptable accuracy, and only approximately 9% of study components were found to overlap across 260,000+
              trials at initial processing — indicating that the knowledge base required significant engineering effort
              to unlock practical utility.


              LLM reliability in regulated clinical workflows is an active challenge. FDA's January 2025 draft guidance
              requires that AI-generated data supporting regulatory submissions include validation documentation,
              performance metrics, and human oversight protocols. Formation Bio's LLM-augmented indication landscaping
              tool includes human feedback loops (via Temporal pause-and-resume signals), but the extent to which these
              satisfy the FDA's emerging validation requirements for AI-generated clinical evidence is not publicly
              characterised.


              The engineering talent concentration risk around founding CTO Linhao Zhang and the core platform
              engineering team is high. Formation Bio's platform is custom-built and not based on a commercial
              off-the-shelf product; key-person departure from the engineering team could create significant development
              disruption. The GitHub repositories are partially open-source (Bimini, React tooling), which mitigates
              some knowledge-lock risk but does not cover the proprietary core platform.
