  - id: FI002
    title: Formation Bio Revenue Model Flow
    type: flow
    data:
      nodes:
        - id: asset-sourcing
          label: Drug Asset Sourcing
          detail: >-
            In-license or acquire clinical-stage compounds from smaller biotechs, academic spinouts, and pharma
            divestitures (e.g., gusacitinib from Asana BioSciences)
        - id: ai-development
          label: AI-Accelerated Development
          detail: >-
            Apply proprietary AI platform across trial design, patient recruitment, protocol optimization, regulatory
            writing, and clinical data analysis to reduce cost and time versus traditional CRO models
        - id: licensing-decision
          label: Licensing vs. Commercialization Decision
          detail: >-
            For each matured asset, Formation decides to out-license (milestone/royalty model) or commercialize
            directly; licensing is the primary model for most assets
        - id: milestone-revenue
          label: Milestone and Upfront Revenue
          detail: >-
            Upfront cash at signing plus milestone payments triggered by Phase completion, regulatory submissions,
            approval, and commercial thresholds; near-100% gross margin
        - id: royalty-revenue
          label: Royalty Revenue
          detail: >-
            Low-to-mid-teen percentage royalties on partner net sales; recurring once drug reaches market; long time
            horizon (3–7+ years from licensing)
        - id: direct-commercialization
          label: Direct Commercialization Revenue
          detail: >-
            Product sales revenue for drugs Formation chooses to commercialize directly; carries manufacturing and
            distribution costs; not yet a primary revenue path
      edges:
        - from: asset-sourcing
          to: ai-development
          label: Advance through clinical stages
        - from: ai-development
          to: licensing-decision
          label: Asset reaches licensing-ready milestone
        - from: licensing-decision
          to: milestone-revenue
          label: Out-license to pharma partner
        - from: milestone-revenue
          to: royalty-revenue
          label: Drug achieves commercialization
        - from: licensing-decision
          to: direct-commercialization
          label: Self-commercialize (selective)
