  - id: FV004
    title: Investment KPIs
    type: kpi
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV007
      - CV037
      - CV038
      - CV039
      - CV040
    description: >-
      Investment committee scorecard rating Formation Bio across 8 dimensions for a 2026 entry decision at the $1.8B
      mark.
    data:
      items:
        - label: Market opportunity
          value: 7
          detail: >-
            Drug development bottleneck is real and large; AI efficiency in trials addresses a $2.6B-per-drug cost
            problem; TAM structurally large
        - label: Pipeline / clinical proof
          value: 5
          detail: >-
            5 disclosed assets; Gusacitinib licensed (proof of model); Sprifermin Phase 3 pending; 4 of 5 assets
            pre-approval and pre-revenue
        - label: AI platform differentiation
          value: 5
          detail: >-
            Company-claimed 50% faster trials; OpenAI + Sanofi collaboration; Dolsten advisory board; no independent
            verification of efficiency benchmarks
        - label: Deal model execution
          value: 7
          detail: >-
            Gusacitinib deal at up to €545M validates in-license → advance → out-license model; Sanofi as strategic
            investor and partner provides credibility
        - label: Unit economics / financial visibility
          value: 2
          detail: >-
            No public revenue, gross margin, cash balance, or burn rate; drug development model has lumpy, binary
            milestones; algorithmic revenue estimates ~$39M are unreliable
        - label: Risk profile
          value: 2
          detail: >-
            90% drug development failure rate; AI-pharma multiple compression confirmed (Recursion -80%, BenevolentAI
            delisting); 24-month mark staleness; no secondary mark
        - label: Valuation discipline
          value: 5
          detail: >-
            $1.8B is approximately at probability-weighted intrinsic value ($2.3B central); defensible if Sprifermin
            succeeds; challenged in bear case; requires fresh diligence
        - label: Evidence quality
          value: 4
          detail: >-
            42 claims across 32 sources; blocking gaps on pipeline stage confirmations, Sanofi upfront amount, and cash
            balance; all scenarios unanchored without primary diligence
