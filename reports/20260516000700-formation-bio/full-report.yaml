  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Formation Bio has raised approximately $615 million in venture capital from its founding in 2016 through
              the June 2024 Series D, building a blue-chip investor syndicate across multiple stages. The company began
              as TrialSpark in Y Combinator's Winter 2017 batch, raising approximately $6 million in seed funding from
              Omidyar Network, Y Combinator, Social Capital, and F-Prime Capital Partners. Early institutional rounds
              (Series A/B, estimated at $80–87 million combined across 2018–2020) brought Sequoia Capital and Thrive
              Capital as lead investors alongside other participants. The Series C in 2021 raised approximately $156
              million at a $1 billion post-money valuation, attracting individual investor participation from Sam Altman
              and John Doerr alongside Sequoia and Thrive; this was the last round prior to the rebranding from
              TrialSpark to Formation Bio around 2022. The defining financing event was the $372 million Series D closed
              in June 2024, led by Andreessen Horowitz with significant strategic participation from drug maker Sanofi
              and continued investment from Sequoia, Thrive, and Emerson Collective. New investors SV Angel Growth and
              FPV Ventures joined. Formation Bio declined to disclose its exact post-money valuation; Forbes reported
              $1.8 billion in an April 2026 profile, while TechCrunch cited approximately $1.6 billion and PremierAlts
              estimated $1.7 billion. The company confirmed only that the Series D is a "material step up" from the $1
              billion Series C mark. Board governance was strengthened with the addition of Scott Kupor (Managing
              Partner, a16z) and Alfred Lin (Partner, Sequoia) as directors, joining existing director Michael Moritz.
              The capital structure is that of a late-stage private company with no audited public financial statements;
              Form D filings with the SEC confirm private placements but contain no financial statement data. Sanofi's
              dual role — as financial investor in the Series D and licensing partner in the June 2025 gusacitinib deal
              — creates uniquely aligned incentives between Formation's largest strategic partner and its capital
              structure.
