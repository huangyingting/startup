  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: AI Platform Architecture and Technical Capabilities
        blocks:
          - type: paragraph
            body: >-
              Formation Bio's platform is best understood not as a single product but as a collection of internally
              built AI systems that collectively replace fragmented human workflows across the clinical trial lifecycle.
              Four core platform components are publicly documented through engineering blog posts.


              The indication landscaping and drug evaluation system compares candidate drug assets against current and
              future standards of care across therapeutic areas. Built on Temporal durable execution orchestration, the
              platform ingests data from FDA drug labels, peer-reviewed literature, press releases, and
              ClinicalTrials.gov via LLM-guided web search, with human analyst checkpoints at critical decision points.
              The Temporal engine ensures that any step failure results in automatic recovery from the last checkpoint —
              critical for long-running indication research that spans days of LLM-driven data gathering.


              The clinical trial knowledge base was built by ingesting and structuring 260,000+ clinical studies from
              the last decade of ClinicalTrials.gov, producing approximately 6.5 million individual study components
              (eligibility criteria, endpoints, study arms, interventions) in normalised JSON. LLM pipelines handle
              free-text extraction, category bucketing, and semantic normalisation; OpenAI embeddings are used for
              endpoint deduplication, outperforming TF-IDF for semantically similar but differently phrased outcomes.
              This structured asset enables Formation Bio to identify recurring trial design elements, query precedents
              programmatically, and generate protocol designs grounded in real-world data.


              Muse is the patient recruitment automation platform. It collapses a nine-step traditional recruitment
              workflow — involving separate specialist roles for patient identification, site coordination, IRB liaison,
              screening, and enrollment logistics — into a single 'super-user' operating a constellation of AI agents.
              The human role shifts from producing coordination artifacts to setting objectives, validating edge cases,
              and approving decisions; the agent constellation executes the steps in between.


              The Atlas pattern recognition framework aggregates business development meeting notes, diligence findings,
              dataset results, and therapeutic area intelligence into a compounding institutional memory. Atlas feeds
              NPV model updates, identifies recurring signals across drug assets, and allows analysts to retrieve prior
              diligence context without re-excavating historical records — implementing what the company calls the
              'instrumentation mindset', in which knowledge is captured once and recomposed infinitely.


              The engineering stack, as evidenced by 27+ public GitHub repositories under the trialspark organisation,
              uses Python (primary), Rust (infrastructure tooling via Bimini), TypeScript and JavaScript (frontend and
              tooling), Confluent Kafka (data streaming), HashiCorp Vault and AWS (secrets management and cloud
              infrastructure). The platform and about pages on the Formation Bio website are JavaScript-rendered and
              inaccessible to non-browser agents, meaning no formal public platform specification or API documentation
              exists.
