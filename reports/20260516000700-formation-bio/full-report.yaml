      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM Across Multiple Lenses
        blocks:
          - type: paragraph
            body: >-
              Sizing Formation Bio's addressable market requires multiple lenses, because the company's vertically
              integrated AI-native model does not align with any single analyst market definition. Analyst estimates for
              the AI in drug discovery and development market range from approximately $1.7 billion to $5.2 billion for
              2024–2025, with projections of $8–20 billion by 2028–2030. A broader framing that includes drug discovery
              technologies (instruments, reagents, informatics software, and AI) puts the market at $28.6 billion in
              2024, growing to $51.5 billion by 2030 at 11 percent CAGR according to MarketsandMarkets. These figures
              are not directly comparable and must be interpreted with definitional caution.


              Lens 1 — Total Pharma R&D TAM ($260 billion): Global pharmaceutical R&D spending exceeds $260 billion
              annually, with clinical development representing roughly 40–60 percent of the total. This TAM overstates
              Formation Bio's addressable market because it includes spending by companies that will not partner with or
              out-license to Formation Bio.


              Lens 2 — CRO/Outsourcing Market SAM ($80 billion): The global CRO market is estimated at approximately $80
              billion in 2024, growing at 6–8 percent CAGR toward $120 billion by 2030. Formation Bio operates within
              this market as an optimizer and orchestrator of CRO-delivered services rather than a traditional CRO
              competitor. The AI-enabled sub-segment of clinical operations represents $2–5 billion of this total.


              Lens 3 — AI Drug Development Market SAM ($2–5 billion, growing 20–30% CAGR): The most directly relevant
              market for Formation Bio's platform is the AI-enabled clinical operations and trial optimization segment.
              Multiple research firms estimate this at $1.7–5.2 billion in 2024, projected to reach $8–20 billion by
              2028–2030. Wide CAGR divergence (20–30 percent across analyst firms) reflects definitional inconsistency
              rather than genuine disagreement about growth trajectory.


              Lens 4 — Drug Value Creation ($230 billion+ in annual sunk costs from failures): With approximately 5,000
              drug candidates entering clinical trials annually and a 90 percent failure rate through approval, the
              economic burden of drug development failure exceeds $230 billion annually in sunk costs. Even a 5–10
              percentage point improvement in Phase II success rates through AI-optimized patient stratification and
              trial design could unlock tens of billions in value—a compelling framing for Formation Bio's investor
              thesis.


              Formation Bio's SOM is estimated at $2–5 billion in net present value, based on a 10-asset pipeline, 15–25
              percent drug approval assumptions, and royalty or outright licensing economics for approved products. A
              single approved drug in an autoimmune or CNS indication could generate $500 million to $2 billion in peak
              annual sales.
