      - number: '8.2'
        title: Last Priced Round Analysis and Funding History
        blocks:
          - type: paragraph
            body: >-
              Formation Bio's most recent disclosed primary financing was a $372 million Series D closed in June 2024,
              led by Andreessen Horowitz with material co-investment from Sanofi and continued participation from
              Sequoia, Thrive Capital, Emerson Collective, Lachy Groom, SV Angel Growth, and FPV Ventures. TechCrunch
              reported the round as "a material step up" from the $1B Series C valuation without disclosing an exact new
              figure. Forbes, writing in April 2026, reported a $1.8B post-money valuation; the $200M spread between the
              two reported values ($1.6B vs. $1.8B) likely reflects different assumptions about whether the reported
              valuation is pre-money or post-money or uses different sources for the dilution table.


              The step-up from the $1B Series C to the $1.6–1.8B Series D implies a roughly 1.6–1.8× step-up on a $243M
              prior funding base, consistent with biotech venture step-ups at the Series D stage for companies with
              validated early clinical assets. The Series D capital was earmarked for two purposes: acquiring and
              in-licensing additional clinical-stage drug assets, and expanding AI capabilities. The Form D filed with
              the SEC on July 2, 2024 confirms a private securities offering consistent with the stated round size.


              As of May 16, 2026 — 24 months after the Series D close — no subsequent primary round, tender offer, or
              continuation vehicle has been publicly disclosed. This staleness is the single largest mark-to-market risk
              for current investors: the $1.8B is an unrefreshed price in a sector that has experienced material
              multiple compression. However, the June 2025 Sanofi gusacitinib deal (up to €545M) may provide
              non-dilutive revenue that extends runway without requiring a new primary round, potentially explaining the
              absence of a fresh financing event.
