      - number: '8.5'
        title: Valuation Methodology and Capital Efficiency
        blocks:
          - type: paragraph
            body: >-
              Four valuation methodologies apply to Formation Bio at its current stage, each with different
              applicability and limitations. The Last-Round (venture) method applies the June 2024 Series D price of
              $1.6–1.8B directly; it is simple and anchored but now 24 months stale and subject to mark-down risk if
              subsequent comparables have repriced. The rNPV/DCF method is the most analytically appropriate for a
              pre-revenue drug developer: it probability-weights future milestone, royalty, and revenue cash flows by
              clinical success probability and discounts at a biotech WACC of 12–20%. As shown in Section 4, this yields
              a range of $750M–$1.8B base and up to $4B bull. The comparable company method is limited by the absence of
              direct public comparables — AI-pharma peers price on platform optionality rather than revenue multiples,
              and CRO peers use services-business multiples inapplicable to Formation's drug-ownership model. Revenue
              multiple analysis is essentially inapplicable: Formation Bio has not disclosed revenue, and third-party
              algorithmic estimates of $39–42M annual revenue are derived from headcount models, not company
              disclosures, with very wide uncertainty bands.


              Formation Bio's capital efficiency proposition — running clinical trials 50% faster and cheaper than
              industry benchmarks — should theoretically reduce the per-asset capital requirement relative to the
              industry average of ~$2.6B per approved drug. Even a 30% efficiency gain would imply each asset requires
              ~$1.8B vs. industry average, meaningful savings over a 10–15 asset portfolio. However, efficiency gains
              are company-claimed and not independently verified. The drug development cost metric is most relevant as a
              downside floor: Formation's $615M total raised is less than a single industry-average Phase 3 program,
              meaning the company is heavily dependent on out-licensing income (like the Sanofi deal) to fund the
              portfolio without chronic dilution.
            claimRefs: []
      - number: '8.6'
        title: Bull/Base/Bear Scenarios and Diligence-Adjusted Valuation Stance
        blocks:
          - type: paragraph
            body: >-
              Three scenarios define the valuation range for a current investor:


              Bull case (20% probability): Sprifermin Phase 3 succeeds and Formation Bio closes two additional licensing
              deals by late 2027; the AI platform is credibly positioned as the most efficient drug development engine
              in the industry; Roivant-style franchise optionality is repriced. At 2–3× current disclosed rNPV
              ($1.5–2.7B) plus platform premium, implied enterprise value is $4–8B. This scenario requires Sprifermin
              success, continued a16z/ Sequoia support for a Series E at favorable terms, and Dolsten-sourced deal flow
              of 3+ new Phase 1/2 assets.


              Base case (50% probability): Sprifermin Phase 3 reads out with mixed or partial success; one additional
              Phase 2 asset is licensed by mid-2028; AI efficiency claims are partially verified through independent
              clinical benchmark comparisons. Implied enterprise value $1.2–2.4B; at the midpoint ($1.8B), the Series D
              mark is roughly fair. This scenario is consistent with Formation Bio functioning as a mid-tier portfolio
              pharma company, analogous to BridgeBio or PureTech Health at comparable pipeline stages.


              Bear case (30% probability): Phase 3 failures for both Sprifermin and one Phase 2 asset; no new licensing
              income before Series E is required; Formation Bio raises a Series E at a significant discount to the $1.8B
              mark in late 2027 or early 2028 to maintain runway. Implied enterprise value $300–800M. This scenario is
              broadly consistent with BenevolentAI's trajectory following its clinical failures, though Formation Bio's
              deal-model insulates it somewhat because risk is distributed across five assets rather than concentrated
              on proprietary discovery.


              Probability-weighted central estimate: 0.20 × $6B + 0.50 × $1.8B + 0.30 × $0.55B = $1.2B + $0.9B + $0.165B
              = approximately $2.27B. This probability-weighted figure suggests the $1.8B Series D mark is slightly
              below central value — implying the Series D was arguably priced with a modest discount to expected value —
              but the wide range ($300M–$8B) and 24-month staleness mean no investor should treat the mark as a reliable
              current fair value without fresh primary diligence. The key value lever is Sprifermin's Phase 3 outcome;
              it is the single asset most likely to materially move the valuation up or down within the next 12–18
              months.
