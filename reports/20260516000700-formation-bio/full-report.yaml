      - number: '6.5'
        title: Concentration Risk, Retention Evidence, and Satisfaction Gaps
        blocks:
          - type: paragraph
            body: |
              The central concentration risk for Formation Bio is Sanofi. As investor, AI collaboration
              partner, and drug asset licensee, Sanofi's departure from any of these roles would cascade
              across Formation Bio's financial, commercial, and validation dimensions. No other single
              counterparty approaches Sanofi's multi-role exposure. Pfizer's platform partnership provides
              a second validation anchor, but its financial terms and renewal status are completely opaque.

              Retention in the conventional SaaS sense does not apply cleanly here. Drug licensing-out
              transactions are one-time events; the gusacitinib deal is the first confirmed event and
              provides no cohort for repeat analysis. Platform partnership "retention" would require knowing
              whether Pfizer and Sanofi have renewed or expanded their agreements, which is unknown. Site
              repeat engagement is inferred from the "TrialSpark Investigative Site" branding — suggesting
              a managed, repeatable network — but no quantitative data on site churn or repeat-use rates
              is publicly available.

              Independent satisfaction evidence is effectively inaccessible. The G2 review page for
              Formation Bio returns a JavaScript-only error (403), preventing any access to customer reviews.
              Glassdoor failed to load at the time of research. No pharma company other than Sanofi and
              (implicitly) Pfizer has publicly confirmed using the Formation Bio platform. Formation Bio
