  - id: FM004
    title: Clinical Drug Development Approval Funnel — Industry Baseline
    type: funnel
    layout: standard
    summary: >-
      Approximately 5,000 drug candidates enter clinical trials annually; only about 50 receive FDA approval. Formation
      Bio's AI platform targets Phase I–III attrition as its primary value creation mechanism. Even modest improvement
      in Phase II success rates produces substantial economic value given the cost of failure at each stage.
    data:
      items:
        - label: Phase I Candidates Entered (~5,000/yr globally)
          value: 5000
          detail: All clinical-stage candidates entering Phase I trials globally per year
        - label: Phase II Advancement (~1,250/yr; ~25% of Phase I)
          value: 1250
          detail: Candidates advancing to Phase II after Phase I safety/tolerability
        - label: Phase III Advancement (~350/yr; ~28% of Phase II)
          value: 350
          detail: Candidates advancing to pivotal Phase III after Phase II efficacy signal
        - label: NDA/BLA Submissions (~160/yr; ~46% of Phase III)
          value: 160
          detail: Regulatory submissions after successful Phase III; includes failed submissions
        - label: FDA Approvals (~50/yr; ~31% of submissions)
          value: 50
          detail: Novel approvals annually (NMEs + biologics); ~1% of original Phase I entrants
    approximationNotes: >-
      Pipeline funnel estimates are based on FDA approval rate data and ClinicalTrials.gov registry statistics. Annual
      counts vary by year and therapeutic area. Phase II success rate of 25–28% reflects cross-therapeutic-area average;
      oncology success rates are lower (~15%), autoimmune rates higher (~40%). Formation Bio pipeline is concentrated in
      autoimmune/CNS/musculoskeletal areas where success rates are modestly above average.
    claimRefs:
      - CM003
      - CM015
      - CM027
      - CM029
