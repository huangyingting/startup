      - number: '1.2'
        title: Founders, Leadership and Governance
        blocks:
          - type: paragraph
            body: |
              Formation Bio was co-founded in 2016 by Benjamine Liu (CEO) and Linhao Zhang (CTO). Liu,
              approximately 36 years old as of 2026, holds a doctorate in computational biology from the
              University of Oxford and identified the drug development bottleneck during his academic
              research when pharmaceutical companies rejected his novel Alzheimer's drug candidates, saying
              they had more drugs than they could afford to develop. Zhang, approximately 34, is a computer
              scientist who previously served as an early engineer at Oscar Health, bringing technology
              platform-building experience to the pharmaceutical domain.

              The senior leadership team includes Chief Development Officer Gavin Corcoran, who previously
              held the Chief Medical Officer role at Allergan — a company that took a similar in-licensing
              approach to drug portfolio building. Forbes estimates Liu's stake at more than $150 million
              and Zhang's at above $100 million based on the $1.8 billion valuation. The founding team is
              described by investors as having assembled leaders and advisors who have collectively worked
              on 45 approved drugs, bringing deep experience in in-licensing and acquiring drug candidates
              from other companies.

              Board composition is not fully public. Scott Kupor of Andreessen Horowitz authored the firm's
              investment announcement in June 2024, and Michael Moritz, the billionaire venture capitalist
              and former Sequoia chairman, reportedly wrote the company's first check. Key-person
              concentration is high on both Liu (vision, BD, fundraising) and Zhang (technology platform),
              and governance disclosure is limited for a company at this funding stage.
