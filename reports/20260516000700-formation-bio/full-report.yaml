  - id: FI001
    title: Formation Bio Funding Timeline
    type: timeline
    data:
      items:
        - date: '2016-01-01'
          label: Formation Bio Founded as TrialSpark
          detail: >-
            Benjamine Liu and Linhao Zhang co-found TrialSpark in New York City, focusing on AI-accelerated clinical
            trial site operations. Initial angel funding and team formation.
          tone: positive
        - date: '2017-03-01'
          label: Y Combinator W17 Batch — Seed Funding ~$6M
          detail: >-
            TrialSpark participates in YC Winter 2017 batch; raises approximately $6 million in seed funding from
            Omidyar Network, YC, Social Capital, and F-Prime Capital. Sequoia Capital and Thrive Capital join in later
            early-stage rounds.
          tone: positive
        - date: '2021-06-01'
          label: Series C — ~$156M at ~$1.0B Valuation
          detail: >-
            Formation Bio raises approximately $156 million in Series C led by Sequoia and Thrive Capital, with
            individual participation from Sam Altman and John Doerr. Post-money valuation approximately $1 billion.
            Company pivots from trial site operations to AI-native drug development platform.
          tone: positive
        - date: '2022-01-01'
          label: Rebranded to Formation Bio — Expanded Mandate
          detail: >-
            TrialSpark officially rebrands to Formation Bio, signaling strategic expansion beyond clinical site
            operations to full AI-driven drug development including asset acquisition and pharma partnership model.
          tone: positive
        - date: '2024-06-26'
          label: Series D — $372M at ~$1.8B Valuation
          detail: >-
            Andreessen Horowitz leads $372M Series D with significant Sanofi participation and continued Sequoia,
            Thrive, Emerson Collective support. Board additions include Scott Kupor (a16z) and Alfred Lin (Sequoia).
            Total raised exceeds $600M. Use of proceeds earmarked for pipeline acquisition and R&D.
          tone: positive
        - date: '2025-04-02'
          label: Mikael Dolsten (ex-Pfizer R&D Chief) Joins as Strategic Advisor
          detail: >-
            Former Pfizer Chief Scientific Officer Mikael Dolsten joins Formation Bio as Chair of Drug Picking Committee
            and Co-Chair of Investment Advisory Committee, adding decades of top pharma R&D credibility.
          tone: positive
        - date: '2025-06-23'
          label: Sanofi Gusacitinib Deal — Up to €545M (~$626M)
          detail: >-
            Libertas Bio (Formation Bio subsidiary) licenses gusacitinib to Sanofi for a new indication. Deal includes
            undisclosed upfront payment, milestones up to €545M combined, and low-to-mid-teen royalties on net sales.
            First major public validation of the licensing model's financial scale.
          tone: positive
