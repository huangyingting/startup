      - number: '5.6'
        title: Regulatory Considerations for AI in Clinical Development
        blocks:
          - type: paragraph
            body: >-
              The regulatory environment for AI in clinical trials is in active development globally, and Formation
              Bio's platform sits at the intersection of multiple emerging regulatory frameworks.


              FDA's CDER received more than 500 drug application submissions containing AI components between 2016 and
              2023, demonstrating that AI-assisted drug development is already mainstream from a submission volume
              perspective. In January 2025, FDA published its draft guidance, 'Considerations for the Use of Artificial
              Intelligence to Support Regulatory Decision-Making for Drug and Biological Products', which requires
              sponsors submitting AI-generated or AI-supported data to demonstrate the AI system's performance, document
              its development process, and provide evidence of human oversight. This is directly relevant to Formation
              Bio if any AI-generated outputs (protocol designs, site selection recommendations, patient eligibility
              assessments) are incorporated into regulatory submissions.


              In January 2026, FDA and EMA jointly published 'Guiding Principles of Good AI Practice in Drug
              Development', creating a cross-jurisdictional framework that sponsors seeking global approvals must
              navigate. The FDA's CDER AI Council, established in 2024, now provides centralised oversight and is
              developing further guidance on internal AI use and AI submissions — indicating that regulatory evolution
              will continue at a pace that requires Formation Bio to maintain an active regulatory intelligence
              function.


              Formation Bio's AI workflows currently provide decision support (indications landscaping, protocol
              recommendations, patient recruitment prioritisation) rather than generating AI-authored regulatory
              documents. This positions the company in a lower-risk regulatory category than sponsors attempting to use
              generative AI to write clinical study reports or automated safety narratives. However, as the platform
              matures and outputs become more directly embedded in submission documents, the compliance burden will
              increase.


              Formation Bio's clinical trials commitment page notes patient diversity, data transparency, and expanded
              access as core principles — consistent with ICH E6(R3) GCP guidance which now explicitly addresses
              electronic systems and data integrity in clinical trials, and with FDA's expectation for sponsors using
              AI-enabled trial management tools to maintain full audit trail capability for all AI-assisted decisions.
            claimRefs: []
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer and Partner Segmentation
        blocks:
          - type: paragraph
            body: |
              Formation Bio does not have a single "customer" category — it operates across five distinct
              customer and partner segments simultaneously. The first segment is drug asset licensors: biotech
              and pharma companies that sell or license clinical-stage drug candidates to Formation Bio. Three
              named licensors are confirmed: Asana BioSciences (gusacitinib and a broader immunodermatology
              portfolio, acquired Nov 2022), Lynk Pharmaceuticals of Hangzhou, China (BLKR201/LNK01006, a
              CNS-penetrant TYK2 inhibitor, ex-China rights), and Merck KGaA, Darmstadt, Germany (Sprifermin/
              FGF18 for knee osteoarthritis). Approximately seven of the reported ten pipeline assets do not
              have named licensor counterparties in any public record.

              The second segment is pharma AI platform partners: companies paying for access to Formation Bio's
              AI development platform. Two partners are confirmed — Pfizer (AI clinical trial software
              collaboration, 2023) and Sanofi (three-party AI collaboration with OpenAI, May 2024) — but
              financial terms and deal scope are not disclosed for either. The third segment is drug asset
              licensees: pharma companies that license or acquire Formation Bio's developed drug assets. Only
              Sanofi qualifies here, via the June 2025 gusacitinib licensing deal worth up to €545 million.
              The fourth segment is clinical trial investigative sites: the 27 TrialSpark-branded US sites
              that completed the ASN008 trial and the single Nebraska site recruiting for the BLKR201 Phase 1
              study. The fifth segment is trial patients: 144 enrolled in the ASN008 atopic dermatitis trial
              per ClinicalTrials.gov. Formation Bio structures its drug programs through subsidiaries — Libertas
              Bio for immunodermatology/gusacitinib, High Line Bio for osteoarthritis/Sprifermin — enabling
              asset-specific capital structures and partner co-investment without exposing the parent balance sheet.
