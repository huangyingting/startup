              subsidiary to develop gusacitinib in a new indication for up to €545 million (~$632 million)
              in milestones plus low-to-mid-teen royalties. This tri-role position makes Sanofi simultaneously
              Formation Bio's most important external validator and its most concentrated commercial risk.
