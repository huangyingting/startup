  - id: FR001
    title: Risk Heatmap
    type: matrix
    claimRefs:
      - CR001
      - CR006
      - CR010
      - CR014
      - CR018
      - CR021
    description: >-
      Two-axis matrix mapping each major Formation Bio risk by residual likelihood (Low / Medium / High) and residual
      impact (Medium / High / Critical) after known mitigations. Placement reflects post-mitigation exposure as assessed
      in TR001-TR005.
    data:
      columns:
        - Low Likelihood
        - Medium Likelihood
        - High Likelihood
      rows:
        - label: Critical Impact
          values:
            - IP licensing asset termination (low probability but contractual risk)
            - Clinical trial safety signal or Phase 3 failure; CEO/CTO departure
            - AI platform unvalidated — FDA AI guidance finalized; Sanofi triple-concentration failure
        - label: High Impact
          values:
            - Pfizer collaboration termination; SEC compliance issue
            - Sprifermin Phase 2 failure; BLKR201 safety event; CDO departure; OpenAI API disruption
            - Down-round financing; AI benchmark shows no efficiency gain; pharma adoption slowdown
        - label: Medium Impact
          values:
            - ICH AI addendum imposes new requirements; EMA AI framework divergence
            - Recruitment AI (Muse) underperforms; Lynk Pharmaceuticals supply dispute
            - Valuation multiple compression in AI drug discovery peer group
