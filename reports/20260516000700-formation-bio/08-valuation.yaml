        Upfront payment is the single most important determinant of near-term cash position and runway;
        without it, all burn and runway estimates carry a multi-hundred-million-dollar uncertainty
        that could mean the difference between a 2-year and a 4-year runway.
      diligencePath: >-
        Request full deal term sheet from Formation Bio; upfront payment must be disclosed in any
        new primary round data room; Sanofi may disclose in quarterly earnings as a material transaction.
      relatedTableRefs:
        - TV006
      relatedQuestionRefs:
        - QV015
        - QV021
        - QV020
    - type: stale-evidence
      severity: material
      topic: valuation-mark-staleness
      missingEvidence: >-
        The $1.8B post-money Series D valuation from June 2024 is 24 months old with no refreshing
        event; public AI-pharma peer multiples have contracted significantly (Recursion -80%, BenevolentAI
        proposed delisting) in this period; the mark has not been stress-tested against current market conditions.
      whyItMatters: >-
        A stale mark creates information asymmetry between Formation Bio insiders (who may have
        marked the investment internally at a different level) and new investors; entry at $1.8B
        without a fresh reference point embeds significant mark-to-market risk.
      diligencePath: >-
        Request any management-approved 409A or internal valuation prepared after the Series D; check
        for any secondary transactions at prices that would update the mark; monitor for Form D amendments.
      relatedTableRefs:
        - TV004
      relatedQuestionRefs:
        - QV023
        - QV025
        - QV031

