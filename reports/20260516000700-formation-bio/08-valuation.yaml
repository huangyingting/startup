    columns:
      - Argument
      - Evidence
      - What Would Change This View
    rows:
      - - 'Thesis: AI clinical efficiency'
        - Company claims 50% faster trials; OpenAI + Sanofi multi-company AI collaboration validates platform demand
        - Independent third-party verification of trial speed benchmarks; FDA regulatory acceptance of AI-generated submissions
      - - 'Thesis: Deal-making model validated'
        - Gusacitinib Sanofi deal worth up to €545M ($626M); first proof of the in-license → advance → out-license model
        - Second and third asset out-licensings; disclosed upfront payment magnitude from Sanofi deal
      - - 'Thesis: Roivant-comparable franchise'
        - Roivant Sciences traded at ~$21B in May 2026 using same in-license → develop → commercialize model; Dolsten advisory brings Pfizer-grade drug picking
        - Formation Bio reaches 10+ clinical assets with ≥3 Phase 3 programs advancing; Roivant did not reach this size until 8 years post-founding
      - - 'Anti-thesis: Pre-approval pipeline risk'
        - All 5 disclosed assets are pre-approval; drug development overall success rate ~10%; Phase 2 → approval ~27%
        - Any Phase 3 success reduces this to residual risk; binary pipeline outcomes could halve or double valuation
      - - 'Anti-thesis: AI-pharma multiple compression'
        - Recursion (RXRX) declined ~80% from peak to ~$1.8B market cap; BenevolentAI proposed LSE delisting Feb 2025
        - Public re-rating on Sprifermin Phase 3 success or additional partnership announcement
      - - 'Anti-thesis: Valuation mark staleness'
        - $1.8B Series D mark is 24 months old with no subsequent round, secondary, or audited financial disclosure
        - Fresh primary round at same or higher price; secondary tender at $1.8B or above; disclosed Sanofi upfront amount >$150M
    notes: Thesis items supported by company announcements and investor statements; anti-thesis items supported by public market data and comparable company precedents.

