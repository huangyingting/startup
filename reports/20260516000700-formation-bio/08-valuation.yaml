  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    sectionRef: SV006
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
    columns:
      - Trigger
      - Observable Threshold
      - Impact on Thesis
      - Action Implication
    rows:
      - - Sprifermin Phase 3 failure
        - Negative or inconclusive topline efficacy data for knee osteoarthritis indication
        - Single largest near-term value-destruction event; implies $600–900M markdown from current mark
        - Immediately reassess entry valuation; model residual pipeline rNPV ex-Sprifermin; may trigger down-round
      - - Multiple Phase 2 failures
        - Both BLKR201 and RVW101 fail Phase 2 endpoints within 24 months
        - Pipeline falls to residual gusacitinib milestones and KMR301 optionality only; thesis breaks
        - Exit or reduce position; base case collapses toward bear ($300–800M EV)
      - - Dilutive emergency Series E
        - Series E priced at >30% discount to $1.8B post-money before additional milestone events
        - Confirms insiders have lost confidence; signals runway exhaustion
        - Mark down to Series E price; reassess cap table preference overhang impact on returns
      - - AI efficiency claims refuted
        - Independent audit or partner disclosure shows Formation Bio trial timelines at or above industry benchmarks
        - Removes key differentiation claim; repositions company as traditional pharma portfolio without tech premium
        - Reduce AI-platform premium component; revise fair value downward ~20–30%
      - - Sanofi strategic relationship ends
        - Sanofi exits board observer role and declines follow-on partnerships after gusacitinib
        - Loss of largest strategic validator and deal pipeline; signals Formation Bio technology credibility issues
        - Negative leading indicator; monitor Sanofi quarterly disclosures and Formation Bio press
      - - Regulatory clinical hold on Formation asset
        - FDA issues clinical hold on Phase 3 program citing safety signal
        - Delays timeline 6–18 months; increases per-asset capital requirement; increases risk of competitive displacement
        - Monitor FDA correspondence; assess whether safety signal is asset-specific or platform-specific
    notes: Kill-level triggers (rows 1–3) require immediate investment committee escalation; monitoring triggers (rows 4–6) inform watch-list status.

  - id: TV006
    title: Final Diligence Asks Table
    sectionRef: SV006
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Phase 3 status and timeline for Sprifermin
        - No public disclosure of Sprifermin Phase 3 enrollment, data lock, or expected readout date
        - Sprifermin is the largest single rNPV item in the pipeline; readout timing governs runway adequacy
        - Request from company; clinical trial registration (ClinicalTrials.gov) may have partial disclosure
      - - Sanofi upfront payment amount
        - €545M deal discloses combined upfront + milestones; no breakdown of upfront received June 2025
        - An upfront of $50–200M would materially extend runway; the magnitude changes the financing picture entirely
        - Request full deal terms; Formation must disclose in any new primary round data room
      - - Pipeline stage confirmations for KMR301, BLKR201, RVW101
        - Five assets listed but stage/indication for three are not public as of May 2026
        - Stage determines probability of success and rNPV contribution; unverified stages inflate or deflate analysis
        - ClinicalTrials.gov registration search; company data room
      - - Current cash balance and monthly burn
        - No balance sheet data publicly disclosed; burn estimated at $80–200M annually with very wide bounds
        - Runway determination is impossible without cash balance; a 2-year runway vs. 3-year materially affects next financing risk
        - Audited balance sheet as of Q4 2025; management accounts showing monthly burn by category
      - - Cap table and preference stack
        - a16z, Sequoia, Sanofi preferred terms not disclosed; liquidation preference overhang unknown
        - Preference stack determines effective common-share value; over-stacked preference can make $1.8B entry worthless below $3B exit
        - Legal diligence; waterfall analysis required before term sheet commitment
      - - AI platform efficiency third-party validation
        - Company claims 50% faster trials; no independent audit, regulatory filing, or partner confirmation of benchmark comparison
        - AI efficiency premium in valuation is worth ~$400–600M in implied platform value; if unverifiable, remove premium
        - Request case studies from 3–5 completed trials; time-to-database-lock vs. CRO benchmarks; Sanofi partner testimony
    notes: Items 1–4 are blocking before term sheet commitment at current mark; items 5–6 are required for legal and return-model diligence.

