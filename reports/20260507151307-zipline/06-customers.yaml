callouts:
- id: CU-CALL-01
  type: finding
  title: Walmart Concentration Risk
  body: Walmart is identified by WSJ as Zipline's single largest US commercial revenue source. Loss of this partnership or
    non-renewal would materially impair US revenue trajectory. Zipline is actively diversifying but no individual replacement
    customer of comparable scale is yet signed.
  severity: major
  sourceRefs:
  - SU015
  - SU016
  claimRefs:
  - CU013
  - CU023
- id: CU-CALL-02
  type: finding
  title: 'Africa Government Healthcare: Strongest Retention Evidence'
  body: Rwanda (8+ years), Ghana (5+ years), and Nigeria (multi-year expansion) represent the strongest publicly available
    customer retention evidence in Zipline's portfolio. African government healthcare contracts provide durable revenue with
    low churn risk and documented impact outcomes.
  severity: positive
  sourceRefs:
  - SU005
  - SU006
  - SU018
  claimRefs:
  - CU027
  - CU005
- id: CU-CALL-03
  type: risk
  title: Consumer Complaints and Noise Friction May Constrain Urban Expansion
  body: Community noise complaints, HOA opposition, and consumer affairs reports of delivery failures represent real operational
    and reputational risk as Zipline expands into dense suburban and urban US markets. These risks could trigger local regulatory
    action limiting enterprise partners' delivery zones.
  severity: moderate
  sourceRefs:
  - SU013
  - SU014
  claimRefs:
  - CU011
  - CU012
