sections:
- id: SU-S01
  title: Customer Base Overview and Segmentation
  body: 'Zipline serves two primary customer segment archetypes with distinct go-to-market approaches. The first — government
    and institutional healthcare in Africa and emerging markets — comprises multi-year government healthcare contracts in
    Rwanda, Ghana, Nigeria, and Ivory Coast, where Zipline acts as the operational partner for national blood product, vaccine,
    and pharmaceutical delivery systems. These relationships are characterized by coverage mandates, government backing, and
    effectively captive retention dynamics.


    The second segment is commercial enterprise customers in the United States and Japan: retail operators (principally Walmart),
    healthcare systems (Intermountain Healthcare), food service companies (Sweetgreen), and pharmacies. In this model, Zipline''s
    B2B enterprise customer integrates Zipline delivery into their last-mile operations and end consumers receive delivery
    under the enterprise partner''s brand. Zipline never sells directly to individual end consumers.


    As of early 2025, Zipline operates in 7 countries and has 15+ signed enterprise agreements for Platform 2 deployment across
    retail, healthcare, and restaurant segments. The African healthcare segment accounts for the majority of cumulative deliveries
    by volume, while the US commercial segment is growing fastest in revenue opportunity.

    '
- id: SU-S02
  title: Named Customer Evidence and Production Deployments
  body: 'Zipline''s customer portfolio includes publicly confirmed production deployments across multiple segments. Walmart
    represents the flagship US retail customer, with commercial operations in the Bay Area, Dallas, and expanding to Salt
    Lake City and Los Angeles through 2025. Sweetgreen, the publicly traded restaurant chain, announced a commercial partnership
    in August 2024, extending Zipline into food service. Intermountain Healthcare is the most prominently confirmed US hospital
    customer, deploying drone delivery for pharmaceuticals and medical supplies across its Utah network.


    In Africa, Rwanda (since 2016), Ghana (5+ years), and Nigeria (36-state coverage) are the flagship government healthcare
    customers with publicly documented outcomes. AP News, The Guardian, and multiple health policy publications have independently
    verified customer impact — including 60-80% reductions in blood stockout rates and delivery lead times from hours to minutes
    at healthcare facilities served.


    Japan commercial launch in June 2024 added local retailers and pharmacies as the first Asian B2B customer cohort, with
    local Nikkei coverage confirming active operations.

    '
- id: SU-S03
  title: Retention, Churn, and Customer Health Signals
  body: 'Formal retention metrics (NRR, GRR, churn rate) are not publicly disclosed by Zipline. However, implicit retention
    evidence is strong across both segments. In Africa, Rwanda has been a continuous customer for 8+ years without any reported
    contract non-renewal, and Ghana extended its partnership to 5+ years with coverage scaling to all 16 regions. Nigeria''s
    program expanded to all 36 states, indicating an upsell/expansion motion rather than churn risk.


    In the US, Walmart''s partnership was expanded — not merely renewed — in October 2023, moving from pilot to multi-city
    rollout. This expansion signal is among the strongest available public indicators of B2B retention and ROI satisfaction.
    Intermountain Healthcare''s continued and documented deployment since initial launch is a second positive indicator.


    Consumer satisfaction signals are more mixed. Zipline''s internal NPS is reportedly above 70 per CNBC, but consumer affairs
    reports document service failures and missed deliveries as the consumer deployment scales. US hospital customer pilot-to-production
    conversion is reported above 80% by Modern Healthcare — a strong indicator that trialing customers find sufficient value
    to commit to production deployments.

    '
- id: SU-S04
  title: Concentration Risk and Expansion Trajectory
  body: 'Walmart''s disproportionate share of US commercial revenue represents the most cited customer concentration risk.
    WSJ analysis in July 2024 identified Walmart as a material single-point revenue risk, and Bloomberg February 2025 confirmed
    Zipline was actively pursuing customer diversification. This is a documented and material structural risk for the US commercial
    segment.


    Zipline''s geographic expansion trajectory within the US (Bay Area, Dallas, Salt Lake City, Los Angeles) suggests dense
    metro coverage as the growth strategy rather than thin national spread. The 15+ new enterprise agreements signed in 2025
    signal pipeline growth, but signing agreements and achieving production revenue are different milestones.


    Temperature delivery limitations constrain food service customer options — Bloomberg documents that major QSR chains declined
    partnership due to ambient-only temperature capability. This narrows the restaurant customer TAM to ambient-product restaurant
    brands (salads, sushi, packaged foods), reducing the food service expansion opportunity.

    '
