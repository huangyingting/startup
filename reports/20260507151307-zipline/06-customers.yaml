figures:
- id: FU001
  title: Customer journey map
  type: journey-map
  insight: Enterprise B2B customers (hospital, retail, food service) follow a pilot-to-production path while African government
    customers enter directly into multi-year national programs. Consumer experience flows through enterprise partner apps.
  data:
    items:
    - id: stage-awareness
      label: Awareness
      actor: Enterprise buyer (procurement, ops)
      description: Discovers Zipline through industry press, regulatory approval news, or peer referrals. Consumer interest
        driven by enterprise partner marketing.
      channels:
      - Trade press
      - Industry conferences
      - Government health ministry referral
    - id: stage-evaluation
      label: Evaluation / Pilot
      actor: Enterprise buyer
      description: Agrees to a pilot deployment — typically 3-6 months — to test delivery economics, reliability, and consumer/clinical
        acceptance. African government customers skip this stage (direct national rollout).
      channels:
      - Zipline sales team
      - Regulatory coordination
      - Pilot zone FAA/CAA authorization
    - id: stage-conversion
      label: Production Deployment
      actor: Enterprise buyer + operations team
      description: 'Conversion from pilot to production: contract signed (3-5 year), infrastructure established (distribution
        hubs), integration with enterprise partner ops/logistics systems.'
      channels:
      - Zipline ops team
      - Enterprise IT integration
      - Consumer app launch
    - id: stage-expansion
      label: Expansion
      actor: Enterprise buyer + Zipline business development
      description: Geographic expansion within customer (more locations), vertical expansion (new product types), or new use
        case activation. Rwanda and Walmart are examples — both expanded scope over time.
      channels:
      - Renewal negotiations
      - New geography regulatory approval
      - Incremental hub buildout
    - id: stage-retention
      label: Retention / Renewal
      actor: Enterprise account management
      description: Multi-year contracts renew based on demonstrated ROI metrics, outcome documentation, and competitive alternatives
        assessment. Africa HC contracts show 8+ year retention; US enterprise retention rate not publicly disclosed.
      channels:
      - Quarterly business reviews
      - Outcome reporting
      - Contract renewal
  sourceRefs:
  - SU001
  - SU005
  - SU016
  - SU024
