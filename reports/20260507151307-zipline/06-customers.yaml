  title: Customers
  letter: U
  summary: 'Zipline operates production drone delivery partnerships in 7 countries as of 2024, serving

    government healthcare systems in Africa (Rwanda, Ghana, Nigeria, Ivory Coast) and enterprise

    commercial customers in the US (Walmart, Intermountain Healthcare, Sweetgreen) and Japan.

    African government healthcare contracts represent the longest-tenured (8+ years in Rwanda)

    and highest-volume customer relationships with documented 60-80% stockout reduction outcomes.

    US commercial expansion is accelerating with 4 metro markets active through April 2025 and

    15+ new enterprise agreements signed. Walmart concentration risk is the primary customer-side

    concern, with community noise complaints emerging as a secondary friction in US suburban markets.

    '
