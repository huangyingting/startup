  claims:
    - id: CI001
      statement: "Zipline generates revenue through three primary streams: per-delivery fees from Africa government healthcare contracts (established, recurring); per-delivery fees from the Walmart US retail partnership (growing); and emerging revenue from the Japan market launch in 2024."
      type: inferred
      topic: revenue-streams
      sourceRefs: [SI001, SI009]
      confidence: high
      freshness: current
      answersQuestionRefs: [QI001]
    - id: CI002
      statement: "Zipline's total estimated 2024 revenue is $50–200M — derived from an estimated 5–15M total deliveries at a blended $7–15 per delivery — but this estimate carries extreme uncertainty as Zipline has disclosed no financial metrics publicly."
      type: estimated
      topic: total-revenue-estimate
      sourceRefs: [SI002, SI016]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI002]
    - id: CI003
      statement: "Zipline's Africa healthcare contracts are structured as per-delivery fees partially co-funded by international aid organizations (USAID, WHO, GAVI). Estimated per-delivery fees of $7–15 in the healthcare segment are based on analogous government medical logistics contract structures, not public disclosure by Zipline."
      type: inferred
      topic: africa-pricing
      sourceRefs: [SI009, SI020]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI003]
    - id: CI004
      statement: "The Walmart US retail partnership is structured as an enterprise B2B agreement with per-delivery fees paid by Walmart — estimated at $5–12 per delivery based on comparable drone delivery operator pricing (DroneUp: $3.99 disclosed; Wing: $3–6 reported). Zipline's actual Walmart fees are not publicly disclosed."
      type: inferred
      topic: us-retail-pricing
      sourceRefs: [SI003, SI014]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI004]
    - id: CI005
      statement: "Zipline's GTM for government healthcare involves 12–36 month sales cycles per country — encompassing regulatory engagement, health ministry procurement, civil aviation authority approval, and pilot delivery demonstration. Sales cycles in Africa are supported by USAID and WHO facilitation."
      type: inferred
      topic: gtm-sales-cycle
      sourceRefs: [SI009, SI020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI005]
    - id: CI006
      statement: "CAC for a new African country deployment is estimated to exceed $5–15M, encompassing regulatory engagement (1–3 years), demonstration projects, and initial DC buildout. At 5–10 year contract terms and $1–10M annual contract value, CAC payback occurs within the first contract term — implying strong LTV/CAC ratios once contracts are signed."
      type: inferred
      topic: cac-healthcare
      sourceRefs: [SI009, SI016]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI006]
    - id: CI007
      statement: "Zipline sells direct with no channel intermediaries in either segment. Government procurement processes are opened through international aid (USAID, World Bank) facilitation, providing indirect channel support. No reseller or distribution partner revenue-sharing has been disclosed."
      type: inferred
      topic: channel-economics
      sourceRefs: [SI009, SI016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI005]
    - id: CI008
      statement: "PitchBook's analysis of Zipline's capital efficiency notes that $900M+ in capital has been deployed to reach ~8 country deployments and one major retail partnership — implying high per-customer CAC relative to software businesses. Capital efficiency is expected to improve as US retail volume scales within existing DC infrastructure."
      type: third-party-reported
      topic: capital-efficiency
      sourceRefs: [SI012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI006]
    - id: CI009
      statement: "McKinsey estimates drone delivery operating cost at $3–8 per delivery at low DC utilization (200 deliveries/day) and $1–3 per delivery at high utilization (1,000+ deliveries/day). This cost range, combined with estimated $7–12 revenue per delivery, implies gross margins of -15% to +60% depending on utilization level."
      type: third-party-reported
      topic: unit-economics-cost
      sourceRefs: [SI007, SI010]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI007, QI008]
    - id: CI010
      statement: "BCG estimates per-DC capex of $2–5M — consistent with Zipline's fixed-wing launch-and-recovery infrastructure requirements. With an estimated 40 DCs globally, Zipline has likely deployed $80–200M in DC capex — a significant proportion of the $900M+ raised."
      type: third-party-reported
      topic: dc-capex
      sourceRefs: [SI010, SI016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI009]
    - id: CI011
      statement: "Zipline's cost structure is dominated by physical operations (DC maintenance, flight operations, delivery hardware) and DC buildout capex — fundamentally different from software businesses. Working capital is constrained by the requirement to fund DC buildout upfront before delivery revenue generation."
      type: inferred
      topic: cost-structure
      sourceRefs: [SI010, SI012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI018]
    - id: CI012
      statement: "Annual cash burn is estimated at $150–250M, based on: 40 DCs × $500K–1M annual operating cost = $20–40M; 1,000+ employees × $150K average cost = $150M+; R&D and regulatory spend estimated at $20–50M additional. This implies the $330M Series E funds approximately 12–24 months of operations."
      type: estimated
      topic: burn-rate
      sourceRefs: [SI012, SI017]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI010]
    - id: CI013
      statement: "Achieving DC-level gross margin breakeven requires approximately 500+ deliveries/DC/day per BCG analysis — a level Zipline has not confirmed achieving at any US Walmart DC. Africa healthcare DCs operate at estimated 100–200 deliveries/day, implying thin or negative contribution margins at many Africa sites."
      type: estimated
      topic: breakeven-threshold
      sourceRefs: [SI010, SI007]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI007]
    - id: CI014
      statement: "Publicly available traction metrics for Zipline: 1B+ cumulative delivery miles (company-disclosed 2024), 8 countries with active commercial operations (company-stated), 36+ Walmart DCs served in US (company/Walmart-announced), Japan market launch 2024, 99.9% uptime SLA (company-stated). No revenue, ARR, or margin metrics have been disclosed."
