            body: >
              Zipline's customer portfolio includes publicly confirmed production deployments across multiple segments.
              Walmart represents the flagship US retail customer, with commercial operations in the Bay Area, Dallas,
              and expanding to Salt Lake City and Los Angeles through 2025. Sweetgreen, the publicly traded restaurant
              chain, announced a commercial partnership in August 2024, extending Zipline into food service.
              Intermountain Healthcare is the most prominently confirmed US hospital customer, deploying drone delivery
