      - number: '6.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Walmart Concentration Risk
            body: >-
              Walmart is identified by WSJ as Zipline's single largest US commercial revenue source. Loss of this
              partnership or non-renewal would materially impair US revenue trajectory. Zipline is actively diversifying
              but no individual replacement customer of comparable scale is yet signed.
            calloutType: insight
            claimRefs:
              - CU013
              - CU023
          - type: callout
            title: 'Africa Government Healthcare: Strongest Retention Evidence'
            body: >-
              Rwanda (8+ years), Ghana (5+ years), and Nigeria (multi-year expansion) represent the strongest publicly
              available customer retention evidence in Zipline's portfolio. African government healthcare contracts
              provide durable revenue with low churn risk and documented impact outcomes.
            calloutType: insight
            claimRefs:
              - CU027
              - CU005
          - type: callout
            title: Consumer Complaints and Noise Friction May Constrain Urban Expansion
            body: >-
              Community noise complaints, HOA opposition, and consumer affairs reports of delivery failures represent
              real operational and reputational risk as Zipline expands into dense suburban and urban US markets. These
              risks could trigger local regulatory action limiting enterprise partners' delivery zones.
            calloutType: insight
            claimRefs:
              - CU011
              - CU012
  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Zipline's US commercial operations are fundamentally dependent on FAA regulatory approvals that can be
              suspended or revoked. The company holds a Part 135 Air Carrier certificate — required for commercial drone
              delivery — and must obtain site-specific BVLOS waivers for each new operating geography. The site-specific
              waiver requirement is a critical expansion rate limiter: Zipline cannot enter a new US metro market
              without a separate FAA review and authorization for that location.


              The pending FAA BVLOS final rule represents the most significant regulatory risk. Currently in NPRM stage
              and delayed beyond its original 2024 target, the final rule may impose new detect-and-avoid hardware
              requirements, remote ID compliance, and operational specifications changes. Any retroactive compliance
              requirements would apply to Zipline's existing fleet and infrastructure, potentially requiring significant
              capital expenditure.


              On the legal side, Law360 documents a patent dispute with Wing (Alphabet's drone subsidiary) covering
              delivery system designs — creating IP uncertainty about Zipline's freedom-to-operate. Bloomberg Law
              identifies an ambiguous product liability framework for drone delivery: no established US case law on
              consumer drone injury exists, creating first-mover liability exposure for Zipline as the most active US
              consumer operator.
            claimRefs: []
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
              - CR003
              - CR005
              - CR010
              - CR006
              - CR011
          - type: table
            tableRef: TR005
            claimRefs: []
          - type: figure
            figureRef: FR001
            claimRefs: []
      - number: '7.2'
        title: Operational and Safety Risk
        blocks:
          - type: paragraph
            body: >
              Zipline's safety record is strong by any measurable standard: 8+ years of African healthcare operations, 1
              billion+ flight miles, and zero recorded consumer injuries. However, the operational risk context for US
              consumer delivery is materially different from the government-supervised healthcare programs where this
              record was built. Consumer delivery involves more unpredictable delivery addresses, denser suburban
              environments, and end-users who may interact unexpectedly with delivery areas.


              Hardware supply chain risks center on battery technology (20-35% of drone BOM, Chinese supply
              concentration) and semiconductor availability for flight computers. Weather restrictions (winds >25mph,
              heavy rain, icing) create service availability limitations that could affect 20-30 days per year in
              northern and northwestern US markets. Cybersecurity risks including GPS spoofing and C2 link jamming are
              documented by Wired, and are amplified in consumer-facing deployments versus controlled healthcare
              logistics.


              Community noise opposition has escalated, with The Guardian documenting HOA resolutions and Politico
              reporting municipal interest in drone noise ordinances. The legal question of whether FAA preemption
              blocks local noise regulation is unresolved, creating a risk that urban delivery zones could face
              fragmentation from local restrictions.
            claimRefs: []
          - type: table
            tableRef: TR002
            claimRefs: []
          - type: figure
            figureRef: FR002
            claimRefs: []
      - number: '7.3'
        title: Commercial, Financial, and People Risk
        blocks:
          - type: paragraph
            body: >
              Customer concentration risk is the primary commercial risk: Walmart represents a disproportionate share of
              US commercial revenue per WSJ. Loss or non-renewal of the Walmart contract would materially impair US
              revenue trajectory. Zipline is actively diversifying (Bloomberg, 2025) but the pace of alternative
              customer revenue ramping is not publicly disclosed.


              Financially, Zipline does not disclose revenue, margin, burn rate, or runway — creating a fundamental
              opacity in financial risk assessment. The company's hardware-centric model requires continuous capital
              investment for drone manufacturing, hub infrastructure, and fleet deployment. WSJ documents that the path
              to profitability in US consumer delivery has not been demonstrated, and PitchBook implies significant
              ongoing capital requirements.


              Key-person risk centers on CEO Keller Rinaudo Cliffton, a co-founder who is central to fundraising,
              government relationships, and public narrative. TechCrunch confirms talent competition for drone engineers
              from Amazon Prime Air, Wing, Waymo, and Tesla. Both the CEO dependency and engineering talent market
              represent people risks consistent with a rapidly scaling hardware startup.
            claimRefs: []
          - type: table
            tableRef: TR003
            claimRefs: []
          - type: figure
            figureRef: FR003
            claimRefs: []
      - number: '7.4'
        title: Risk Mitigations and Kill Criteria
        blocks:
          - type: paragraph
            body: >
              Zipline's principal mitigations are: (1) mature Safety Management System with redundant C2 links,
              emergency parachute, and lost-link procedures; (2) 8+ years of operational track record as demonstrated
              safety evidence; (3) active customer diversification away from Walmart; (4) Part 135 compliance
              infrastructure with dedicated aviation regulatory expertise; and (5) early engagement with FAA on the
              BVLOS rulemaking process.


              Thesis-break conditions that would warrant re-evaluation include: a first significant US consumer drone
              injury triggering FAA operational suspension; successful municipal noise ordinances fragmenting delivery
              coverage areas; FAA BVLOS final rule imposing retroactive hardware requirements that require major fleet
              upgrades; loss of the Walmart contract without replacement revenue; or inability to raise follow-on
              capital at acceptable terms.


              Key monitoring indicators: FAA rulemaking publication timeline and compliance window; community opposition
              escalation in active delivery zones; Zipline's public disclosures on customer diversification progress;
              incident reporting compliance signals from FAA enforcement actions; and any Wing/Amazon patent litigation
              developments that could constrain Zipline's technical approach.
            claimRefs: []
          - type: table
            tableRef: TR004
            claimRefs: []
      - number: '7.5'
        title: Exhibits
        blocks:
          - type: callout
            title: 'FAA BVLOS Rulemaking: Zipline''s Biggest Regulatory Overhang'
            body: >-
              The pending FAA BVLOS final rule is the single most important regulatory event for Zipline. Delayed beyond
              its 2024 target, the rule could retroactively impose detect-and-avoid hardware requirements that
              necessitate fleet upgrades. The compliance cost and timeline are unknown, creating material capex risk for
              any 2025-2027 investment thesis.
            calloutType: insight
            claimRefs:
              - CR003
              - CR004
              - CR027
          - type: callout
            title: 'Consumer Injury: Low Probability, High Consequence'
            body: >-
              Zipline's safety record is exceptional (1B+ miles, zero consumer injuries) but a first significant injury
              event would be non-linear in consequence — triggering FAA operational holds, congressional scrutiny, and
              potential enterprise partner suspension. This is a fat-tail risk that insurance coverage partially
              addresses but does not eliminate.
            calloutType: insight
            claimRefs:
              - CR006
              - CR032
          - type: callout
            title: Community Opposition Is Growing — Monitor Closely
            body: >-
              The escalation of community noise complaints from informal grumbling to organized HOA resolutions and
              municipal ordinance proposals represents a qualitative risk shift. The legal question of FAA preemption
              over local noise ordinances is unsettled — and if municipalities successfully restrict drone flight times
              or altitudes, Zipline's urban delivery zone economics break.
            calloutType: insight
            claimRefs:
              - CR010
              - CR011
              - CR030
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: >
              Zipline raised its most recent disclosed round — a $330M Series F — in May 2023 at an implied $4.2B
              post-money valuation, confirmed by TechCrunch, Business Wire, and SEC Form D regulatory filing. Total
              financing has exceeded $1.2B across Seed through Series F, with investors including Andreessen Horowitz,
              Sequoia Capital, Dragoneer Investment Group, Google Ventures, and Tiger Global. The investor quality is
              top-tier, providing governance and strategic support quality signal consistent with the premium valuation.


              The financing context shows a company that has consistently raised at increasing valuations from sub-$100M
              (Series B) to $4.2B (Series F) — a 40x+ progression over 6-7 years. This trajectory reflects the company's
              operational maturation from Africa healthcare operations to US consumer delivery commercialization. The
              Series F was set in May 2023, during the early phase of recovery from the 2021-2022 growth-stage valuation
              compression, meaning the price may or may not reflect the current clearing price for comparable assets.
            claimRefs: []
          - type: table
            tableRef: TV001
            claimRefs: []
          - type: table
            tableRef: TV005
            claimRefs: []
          - type: figure
            figureRef: FV001
            claimRefs: []
      - number: '8.2'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Direct drone delivery comparables trade at dramatic discounts to Zipline's $4.2B: Manna Aero (~$45M),
              Matternet (~$50M), DroneUp (~$40M), and Swoop Aero are all valued at 8-80x below Zipline — reflecting
              Zipline's dramatically larger delivery scale (1.3M+ deliveries vs. peers' hundreds of thousands).


              Public market comparables for autonomous aviation hardware include Joby Aviation ($6-8B market cap,
              pre-revenue eVTOL), Archer Aviation (~$1.5-2.5B, pre-revenue), and Symbotic ($8-12B, warehouse automation
              with Walmart anchor). Joby's $6-8B for a pre-revenue eVTOL platform suggests the public market places
              meaningful optionality value on leading autonomous aviation companies — with Zipline's $4.2B looking
              reasonable by that comparison, though Zipline operates in a different segment with different unit
              economics.


              PitchBook data shows 15-30x projected revenue multiples for leading drone delivery companies in 2023
              venture rounds — consistent with Zipline's $4.2B if 2025-2027 projected revenue reaches $140-280M. Whether
              Zipline can achieve this range depends on US consumer delivery economics that have not yet been
              demonstrated.
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs: []
          - type: table
            tableRef: TV006
            claimRefs: []
          - type: figure
            figureRef: FV002
            claimRefs: []
      - number: '8.3'
        title: Bull, Base, and Bear Cases
        blocks:
          - type: paragraph
            body: >
              The bull case (probability 25%): Zipline captures 0.5-1.5% of US last-mile delivery by 2030, generating
              $750M-2.25B in revenue at 20-30% gross margin. A 10-15x revenue exit multiple implies $7.5B-34B valuation,
              yielding 2-8x return from Series F. This scenario requires favorable BVLOS rulemaking, Walmart partnership
              expansion, and demonstration of positive unit economics by 2026.


              The base case (probability 40%): Zipline achieves positive unit economics in select markets by 2027, grows
              to $300-500M revenue by 2030 at 15-20% gross margin, exits at 8-12x revenue ($2.4B-6B). Series F return
              ranges from 0.6-1.4x, with risk of dilution from 1-2 intervening rounds. This scenario requires some US
              regulatory success and customer diversification beyond Walmart.


              The bear case (probability 35%): Regulatory friction, negative unit economics in US consumer delivery, or
              Walmart contract loss causes Zipline to pivot to a narrower B2G model. Revenue is capped at $100-200M by
              2030, exit multiple compresses to 4-6x ($400M-1.2B), resulting in a loss for Series F investors after
              preference overhang.
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs: []
          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.4'
        title: Recommendation, Diligence Asks, and Kill Criteria
        blocks:
          - type: paragraph
            body: >
              Recommendation: Conditional positive for investors with a 5-7 year horizon, deep regulatory risk
              tolerance, and the ability to participate in follow-on rounds. The case for investment rests on Zipline's
              uniquely demonstrated operational track record (1.3M deliveries, 8 years, zero injuries), defensible
              regulatory position (Part 135, BVLOS authorizations), and the optionality on the largest last-mile
              delivery TAM in history.


              Valuation discipline: The $4.2B entry price is aggressive without positive US unit economics. A 20-30%
              discount to last round ($2.9-3.4B) would be required in a follow-on to achieve attractive risk-adjusted
              returns given regulatory, competitive, and capital intensity risks. The preference overhang from $1.2B+ in
              prior preferred is a material dilution factor.


              Final diligence asks: (1) Audited or management-confirmed revenue for 2023 and 2024; (2) per-delivery
              contribution margin by segment; (3) BVLOS compliance roadmap for the anticipated FAA final rule; (4)
              customer concentration as percentage of revenue; (5) board composition and succession planning for CEO.


              Kill criteria: US consumer drone injury event triggering FAA operational hold; FAA BVLOS final rule
              imposing retroactive fleet upgrades; Walmart contract non-renewal without replacement; inability to raise
              follow-on at acceptable terms; or Wing/Amazon making drone delivery economics unworkable through
              capital-intensive predatory pricing.
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV028
          - type: figure
            figureRef: FV004
            claimRefs: []
      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Conditional Positive — Entry Discipline Required
            body: >-
              Zipline has the most compelling operational track record in commercial drone delivery and a defensible US
              market position. However, the $4.2B Series F valuation prices in US consumer delivery unit economics that
              have not yet been demonstrated. A conditional positive recommendation requires: (1) 20-30% entry discount
              to last round; (2) verified positive unit economics in at least 2 US markets; (3) cap table and preference
              stack transparency.
            calloutType: insight
            claimRefs:
              - CV035
              - CV037
          - type: callout
            title: Wing/Alphabet — Structural Competitive Risk That Cannot Be Valued
            body: >-
              Wing (Alphabet) does not need to raise external capital and operates indefinitely at negative unit
              economics if Alphabet chooses to support it. This creates a structural competitor that Zipline cannot
              outspend. Investors must accept this asymmetric competitive risk as a permanent feature of the drone
              delivery market.
            calloutType: insight
            claimRefs:
              - CV012
              - CV029
          - type: callout
            title: 'Financial Opacity: Revenue Disclosure Is the Critical Missing Input'
            body: >-
              All valuation scenarios are built on estimated revenues derived from delivery volume proxies. Without
              disclosed revenue, gross margin, or burn rate, the $4.2B valuation cannot be independently assessed
              against financial fundamentals. Revenue disclosure is the single most important due diligence ask —
              without it, no valuation conclusion is definitive.
            calloutType: insight
            claimRefs:
              - CV025
