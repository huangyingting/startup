      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Zipline was co-founded in 2014 by three principals. Keller Cliffton (CEO) studied philosophy
              at Yale and previously worked at Google's X moonshot laboratory before co-founding Zipline.
              He is the primary external face of the company and drives commercial partnerships and
              fundraising. Will Hetzler (CTO) is the lead aircraft and systems engineer, responsible
              for Zipline's proprietary Platform 1 and Platform 2 aircraft designs. Joshua Hetzler
              (Chief Operating Officer at founding; current title varies by reports) co-founded and
              manages operations expansion. As a late-stage private company, Zipline has not publicly
              disclosed its board composition; known board members include representatives from Andreessen
              Horowitz and Sequoia Capital from their investment rounds. Key-person dependence is notable:
              Keller Cliffton's public profile and investor relationships are central to fundraising and
              government partnerships. No material leadership changes have been publicly reported. Zipline
              has approximately 1,000–1,500 employees (LinkedIn-estimated), with engineering concentrated
              in South San Francisco and operations staff in 8 countries across Africa, the US, and Japan.
            claimRefs:
