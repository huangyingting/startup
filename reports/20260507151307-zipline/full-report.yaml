chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Zipline International Inc. is a South San Francisco-based autonomous logistics company
              that designs, manufactures, and operates drone delivery aircraft commercially. The company's
              mission is "instant logistics" — delivering goods to any location as quickly as a text
              message is received, regardless of road infrastructure. Zipline operates two distinct
              product platforms: Platform 1 (P1), a long-range fixed-wing UAV for rural and healthcare
              deliveries; and Platform 2 "Zip," a VTOL quadcopter for suburban consumer delivery.
              Zipline's business model is delivery-as-a-service, charging governments and hospital
              networks per-delivery fees under multi-year contracts for healthcare logistics, and charging
              retail partners (Walmart) per-delivery fees for consumer delivery. The company HQ is at
              South San Francisco, CA 94080. Stage: late-stage private, pre-IPO. Annual revenue is not
              publicly disclosed; the company is operating at scale but has not published audited financial
              results. Sector: robotics and autonomous logistics. Zipline is distinguished from all other
              drone delivery companies by its operational scale — over 1.3 million deliveries executed
              commercially across 8 countries since 2016, compared to limited pilot deployments by
              Amazon Prime Air, Wing (Alphabet), and other competitors.
            claimRefs:
              - CO001
              - CO002
              - CO005
          - type: table
            tableRef: TO001
            claimRefs: []
          - type: figure
            figureRef: FO002
            claimRefs:
