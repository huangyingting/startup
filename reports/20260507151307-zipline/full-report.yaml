      - number: '1.4'
        title: Key Milestones
        blocks:
          - type: paragraph
            body: |
              Zipline's trajectory spans three phases: pioneering (2014–2018, Africa healthcare proof
              of concept), scaling (2019–2022, multi-country Africa + US planning), and consumer pivot
              (2023–present, Platform 2 and Walmart). The most critical inflection points: (1) October
              2016 — first national drone delivery service (Rwanda); (2) April 2019 — Ghana expansion
              proving multi-country model; (3) May 2021 — Series E at $2.75B (first confirmed unicorn
              status, later corrected to Series F at $4.2B); (4) April 2023 — Platform 2 "Zip" unveiled
              alongside $330M Series G at $4.2B; (5) 2023 — FAA Part 135 certification and BVLOS
              authority; (6) 2023–2024 — Walmart partnership launched in North Carolina, expanded to
              36+ US cities; (7) 2024 — Japan operations launched; (8) 2025 — 1.3M+ cumulative
              deliveries milestone. Adverse events: community noise complaints about Platform 2 in
              suburban US deployments; ongoing debate in media about long-term drone delivery
              profitability at Walmart's required margin structure.
