              In Africa, Rwanda (since 2016), Ghana (5+ years), and Nigeria (36-state coverage) are the flagship
              government healthcare customers with publicly documented outcomes. AP News, The Guardian, and multiple
              health policy publications have independently verified customer impact — including 60-80% reductions in
              blood stockout rates and delivery lead times from hours to minutes at healthcare facilities served.


              Japan commercial launch in June 2024 added local retailers and pharmacies as the first Asian B2B customer
