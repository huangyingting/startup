              enterprise agreements signed in 2025 signal pipeline growth, but signing agreements and achieving
              production revenue are different milestones.


              Temperature delivery limitations constrain food service customer options — Bloomberg documents that major
              QSR chains declined partnership due to ambient-only temperature capability. This narrows the restaurant
