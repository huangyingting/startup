  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Overview and Segmentation
        blocks:
          - type: paragraph
            body: >
              Zipline serves two primary customer segment archetypes with distinct go-to-market approaches. The first —
              government and institutional healthcare in Africa and emerging markets — comprises multi-year government
              healthcare contracts in Rwanda, Ghana, Nigeria, and Ivory Coast, where Zipline acts as the operational
              partner for national blood product, vaccine, and pharmaceutical delivery systems. These relationships are
              characterized by coverage mandates, government backing, and effectively captive retention dynamics.


              The second segment is commercial enterprise customers in the United States and Japan: retail operators
              (principally Walmart), healthcare systems (Intermountain Healthcare), food service companies (Sweetgreen),
              and pharmacies. In this model, Zipline's B2B enterprise customer integrates Zipline delivery into their
              last-mile operations and end consumers receive delivery under the enterprise partner's brand. Zipline
              never sells directly to individual end consumers.


              As of early 2025, Zipline operates in 7 countries and has 15+ signed enterprise agreements for Platform 2
              deployment across retail, healthcare, and restaurant segments. The African healthcare segment accounts for
              the majority of cumulative deliveries by volume, while the US commercial segment is growing fastest in
              revenue opportunity.
