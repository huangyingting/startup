  - id: FV001
    title: Recommendation logic
    type: flow
    insight: >-
      The conditional positive recommendation flows from three converging inputs: operational track record (strong), US
      commercial evidence (emerging), and valuation/financial risk (high). Entry discipline on valuation and
      confirmation of unit economics are the gating factors for upgrading to unconditional positive.
    data:
      nodes:
        - id: f1
          label: Operational Track Record (High)
          description: 1.3M deliveries, 8 years Rwanda, zero consumer injuries, Part 135 certified
        - id: f2
          label: US Commercial Evidence (Emerging)
          description: Walmart anchor, Intermountain HC, Sweetgreen, 4 US metro markets active by Apr 2025
        - id: f3
          label: Valuation & Financial Risk (High)
          description: $4.2B pricing in undemonstrated US consumer unit economics; no revenue disclosure
        - id: f4
          label: Conditional Positive Signal
          description: Strong technology and regulatory moat; market leadership; compelling track record
        - id: f5
          label: Investment Conditions Required
          description: Entry at discount to last round; positive unit economics verified; cap table reviewed
        - id: f6
          label: Conditional Positive Recommendation
          description: Invest at $2.9-3.4B entry with verified unit economics and regulatory roadmap
        - id: f7
          label: Kill Criteria
          description: FAA suspension; consumer injury; Walmart loss; permanent negative unit economics
    sourceRefs:
      - SV001
      - SV010
      - SV016
      - SV023
