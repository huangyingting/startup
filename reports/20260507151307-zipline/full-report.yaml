      - number: '6.3'
        title: Retention, Churn, and Customer Health Signals
        blocks:
          - type: paragraph
            body: >
              Formal retention metrics (NRR, GRR, churn rate) are not publicly disclosed by Zipline. However, implicit
              retention evidence is strong across both segments. In Africa, Rwanda has been a continuous customer for 8+
              years without any reported contract non-renewal, and Ghana extended its partnership to 5+ years with
              coverage scaling to all 16 regions. Nigeria's program expanded to all 36 states, indicating an
              upsell/expansion motion rather than churn risk.


              In the US, Walmart's partnership was expanded — not merely renewed — in October 2023, moving from pilot to
              multi-city rollout. This expansion signal is among the strongest available public indicators of B2B
              retention and ROI satisfaction. Intermountain Healthcare's continued and documented deployment since
              initial launch is a second positive indicator.


              Consumer satisfaction signals are more mixed. Zipline's internal NPS is reportedly above 70 per CNBC, but
              consumer affairs reports document service failures and missed deliveries as the consumer deployment
              scales. US hospital customer pilot-to-production conversion is reported above 80% by Modern Healthcare — a
              strong indicator that trialing customers find sufficient value to commit to production deployments.
