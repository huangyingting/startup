      - number: '5.3'
        title: Technology Architecture and Operating Model
        blocks:
          - type: paragraph
            body: |
              Zipline's technology architecture integrates hardware, embedded software, cloud
              infrastructure, and physical operations in a tightly coupled system. The core
              technical components are:

              **Autonomous flight system**: Platform 2's autonomous flight system uses a multi-
              layer navigation architecture. Primary navigation uses GNSS (GPS + GLONASS) with
              barometric altitude reference. Secondary navigation uses computer vision for final-
              approach positioning and obstacle detection. Communications use LTE 4G cellular
              (multiple SIM cards for redundancy across carriers) as the primary BVLOS command
              channel, with a proprietary RF backup link. The flight management software handles
              path planning, weather avoidance, and real-time route adjustment based on ATC
              airspace data feeds (via FAA's UTM network).

              **LTE BVLOS architecture**: The regulatory-critical technology is Zipline's LTE-based
              BVLOS command-and-control link, which maintains continuous two-way communications
              between the drone and the DC ground station throughout the flight. FAA requires this
              link for BVLOS certification; Zipline uses multiple carrier SIMs (Verizon, AT&T, T-Mobile
              in US) to ensure near-100% coverage. This creates an LTE network dependency: Zipline
              can only operate where LTE coverage is sufficiently dense, limiting operations in
              rural areas without 4G coverage.

              **Manufacturing**: Platform 2 is manufactured in Zipline's San Francisco facility
              and at contract manufacturers. Zipline has not disclosed its manufacturing partners
              or supply chain structure publicly. Key components include: brushless DC motors
              (potentially sourced from European or US motor manufacturers), lithium-ion battery
              packs (cells likely sourced from Samsung SDI, LG Energy, or Chinese equivalents),
              flight control computer (COTS embedded SBC with custom firmware), and proprietary
              fuselage/wing composite structures.

              **Data infrastructure**: Zipline operates cloud-based dispatch and monitoring systems,
              likely on AWS or Google Cloud given investor GV (Google Ventures) involvement. Real-
              time telemetry from all active drones is aggregated in a central operations monitoring
              center. The logistics system integrates with Walmart's order management API via a
              purpose-built integration layer.

              **Droid delivery mechanism**: Platform 2's most distinctive technical feature is the
              "Droid" — a powered gimbal system that descends from the drone on a tether cable,
              carrying the package payload to ground level (8–10m drop), deposits the package,
              and retracts before the drone flies away. This mechanism enables precise indoor/
              outdoor delivery without requiring drone landing — a safety and regulatory advantage
              over competitors that require drone landing at the delivery address.
            claimRefs:
              - CE008
              - CE009
              - CE010
              - CE011
              - CE012
