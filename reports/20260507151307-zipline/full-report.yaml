      - number: '1.3'
        title: Funding, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: |
              Zipline has raised approximately $932M in primary equity across 7 rounds from 2014 through
              2023 (Series G). The company's valuation trajectory: ~$20M (Seed, 2014) → ~$1.2B (Series C,
              2019, first unicorn) → ~$4.2B (Series F, 2021, confirmed) → ~$4.2B (Series G, 2023,
              sustained valuation through difficult market). The Series G of ~$330M closed in April 2023
              with a $4.2B post-money valuation — sustaining unicorn-and-above status. Lead investors
              include Andreessen Horowitz, Sequoia Capital, Baillie Gifford, GV (Google Ventures),
              Katalyst Health, and 2Africa Partners. The investor base spans Tier-1 US VC, long-only
              institutional (Baillie Gifford), strategic/impact (Katalyst, 2Africa), and Google. Zipline
              has not publicly disclosed any secondary transactions, but private secondary market activity
              is likely given the number of rounds and time since IPO. No publicly reported debt
              or credit facilities. CEO Keller Cliffton has publicly signaled an IPO ambition for
              2025–2027.
