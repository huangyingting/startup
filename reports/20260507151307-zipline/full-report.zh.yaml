      - number: '4.4'
        title: 公开牵引指标与私有财务缺口
        blocks:
          - type: paragraph
            body: |
              Zipline 公开披露了若干运营指标，可作为收入和规模代理；但其核心财务指标（收入、ARR、毛利率、EBITDA、现金）
              作为私营公司仍完全未披露。

              **公开牵引指标**：
              - 1B+ 累计配送里程（公司披露的 2024 年里程碑）
              - 非洲 1M+ 次医疗重点配送（由新闻稿推断）
              - 8 个国家拥有活跃商业无人机配送运营
              - 美国服务 36+ 个 Walmart 配送中心
              - Platform 2 于 2024 年在日本商业化启动
              - 99.9% 配送正常运行时间（公司声明的 SLA）

              **收入代理估计**：按医疗和零售平均混合单次收入 $10–15、2024 年所有市场总配送量估计 5–15M 次计算，
              Zipline 的收入可能在 $50–225M 之间——区间极宽，反映出缺少公开披露。2023 年 Series E 的 $4.2B 估值
              意味着 20–80x 收入倍数，与配送技术领域早期高增长估值相符。

              **私有指标缺口**：Zipline 未披露收入、ARR、毛利率、EBITDA、现金余额或烧钱速度。这种财务不透明度对未提交
              S-1、也没有公开债券发行的私营独角兽来说很典型。重大尽调需要在 NDA 下获取经审计财务数据。

              **USAID 与政府合同规模**：USASpending.gov 记录显示，美国政府通过 USAID 子赠款机制向 Zipline International LLC
              支付了数百万美元，用于支持非洲医疗配送项目——这确认了政府收入，但金额低于 Zipline 总合同组合的规模。
            claimRefs:
              - CI014
              - CI015
              - CI016
              - CI017
          - type: table
