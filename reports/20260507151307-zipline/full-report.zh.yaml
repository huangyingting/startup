      - number: '5.4'
        title: 技术差异化与 IP
        blocks:
          - type: paragraph
            body: >
              Zipline 的技术差异化分几层，不同护城河的耐久期也不同。


              **固定翼效率**：固定翼飞机在基础物理上占优，巡航速度下升阻比比多旋翼高 3–4x。Zipline 因此能做到 80km 航程和耐天气能力——无论软件怎么改进，多旋翼竞争对手在结构上都很难获得这些能力。只要
              Zipline 维持固定翼设计，这项优势就长期存在。


              **专利组合**：Zipline 持有多项美国专利，覆盖：（1）Droid 自主下降与回收机制；（2）Platform 2 混合设计中的固定翼 VTOL 转换动力学；（3）利用蜂窝网络覆盖地图做 BVLOS
              自主飞行路径规划；（4）Platform 1 的 DC 发射与回收系统。国际专利以 PCT/US 和 EU 格式提交。该专利组合为 Platform 2 的关键创新提供 5–15 年保护。


              **10+ 年运营数据**：Zipline 在 8 个国家飞出 1B+ 配送英里，沉淀了自有数据集，涵盖自主无人机性能、天气响应、故障模式和配送精度。竞争对手没有 5–10
              年运营，很难复制这套数据。Zipline 用这些数据训练路线优化和异常检测 AI 系统。


              **监管批准作为 IP**：8 国 BVLOS 监管批准组合可以说是 Zipline 最有价值的无形资产。它花了 10+ 年和数亿美元才建成，竞争对手无法「收购」这项资产，只能独立重做一遍监管沟通过程。


              **制造诀窍**：要造出一架 25kg 级、载荷 2.5kg、还能在恶劣天气下可靠运行的固定翼 VTOL 无人机，需要深厚的航空航天制造能力。Zipline 用 10 年在内部搭起了这项能力。
            claimRefs:
              - CE013
              - CE014
              - CE015
              - CE016
