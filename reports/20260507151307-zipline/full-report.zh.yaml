  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览与分层
        blocks:
          - type: paragraph
            body: >
              Zipline 服务两类主要客户，二者对应不同的销售落地路径。第一类是非洲和新兴市场的政府及机构医疗客户，包括卢旺达、加纳、尼日利亚、科特迪瓦的多年期政府医疗合同。Zipline
              在这些合同中充当全国血液制品、疫苗和药品配送系统的运营伙伴。这类关系有覆盖率任务、政府背书，留存几乎是半绑定的。


              第二类是美国和日本的商业企业客户：零售运营商（主要是 Walmart）、医疗系统（Intermountain Healthcare）、餐饮公司（Sweetgreen）和药房。在这个模式下，Zipline 的
              B2B 企业客户把 Zipline 配送接入自己的最后一公里运营，终端消费者则在企业伙伴品牌下收货。Zipline 从不直接向个人终端消费者销售。


              截至 2025 年初，Zipline 在 7 个国家运营，并已签署 15+ 份 Platform 2
              企业部署协议，覆盖零售、医疗和餐饮细分市场。按累计配送量看，非洲医疗客户贡献了大多数订单；按收入机会看，美国商业细分市场增长最快。
            claimRefs: []
