      - number: '1.4'
        title: 关键里程碑
        blocks:
          - type: paragraph
            body: |
              Zipline 的发展轨迹分为三个阶段：开创期（2014–2018，非洲医疗概念验证）、扩张期
              （2019–2022，非洲多国 + 美国规划）和消费端转向（2023 至今，Platform 2 与 Walmart）。
              最关键的拐点包括：（1）2016 年 10 月——首个全国性无人机配送服务（Rwanda）；
              （2）2019 年 4 月——扩张到 Ghana，验证多国模式；（3）2021 年 5 月——以 $2.75B 完成
              Series E（首次确认独角兽身份，后修正为 Series F $4.2B）；（4）2023 年 4 月——发布
              Platform 2「Zip」，同时以 $4.2B 估值完成 $330M Series G；（5）2023 年——取得 FAA Part 135
              认证和 BVLOS 授权；（6）2023–2024 年——Walmart 合作在 North Carolina 启动，并扩至 36+
              个美国城市；（7）2024 年——日本运营启动；（8）2025 年——累计配送突破 1.3M+。
              反向事件：美国郊区部署中，社区对 Platform 2 噪音提出投诉；媒体也持续讨论，在 Walmart 要求的
              利润率结构下，无人机配送能否长期盈利。
            claimRefs:
              - CO019
              - CO020
              - CO022
              - CO023
          - type: table
