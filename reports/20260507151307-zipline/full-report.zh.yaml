      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: |
              Zipline 的财务画像是后期、资本密集型硬件软件混合公司：政府医疗合同带来真实收入可见度，同时叠加一个潜力很高但尚未验证的
              消费配送业务。财务结论是混合的：

              **收入质量**：政府医疗合同质量较高（长期、粘性、多年期），但考虑到配送基础设施的运营成本，利润率可能偏薄。
              与 Walmart 的美国零售收入潜力大，但仍处于早期放量，多数场站的 DC 层面贡献利润率为负或接近零。

              **利润率路径**：基于 McKinsey 无人机配送经济性分析，高 DC 利用率（500+ 单 / DC / 天）下可以实现正毛利率。
              要达到 EBITDA 盈亏平衡，需要在建设新 DC 的同时提高每个 DC 的配送量——这是一个资本密集型增长飞轮，
              尚未在公开数据中证明规模经济性。

              **资本强度**：$2–5M/DC 的建设成本制造了根本张力：Zipline 需要更多 DC 才能产生更多收入，但每个 DC 都需要资本，
              除非既有 DC 达到高利用率，否则这些资本必须来自持续外部融资。这形成了跑步机式动态：资本效率只有在规模化后才会改善。

              **尽调阻塞点**：缺少公开收入、利润率、现金和烧钱数据，使得仅靠公开资料无法完成财务尽调。任何投资人都必须在 NDA 下获取
              经审计财务报表，才能评估 Zipline $4.2B 估值与实际收入轨迹之间的差距。
            claimRefs:
              - CI023
              - CI024
              - CI025
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户流程
        blocks:
          - type: paragraph
            body: |
              Zipline 通过两种不同服务模式向终端客户配送商品和医疗物资，这对应它的两个主要市场。

              **非洲医疗流程**：区医院的卫生部物流经理通过 Zipline 的网页调度系统提交物资请求。Zipline 的物流软件把请求路由到最近的
              配送中心（DC），由该中心将血袋、疫苗或药品装入 Platform 1 无人机来履约。无人机通过弹射器从 DC 自主发射，在巡航高度
              （通常 100–400ft AGL）进行 BVLOS 飞行至目的地医疗机构，并用精准降落伞把载荷投放到指定着陆区。无人机自主返回，
              并降落在 DC 的网或回收表面上。端到端配送时间通常为 20–60 分钟，取决于距离。

              **美国零售（Walmart）流程**：消费者通过 Walmart 应用下单可配送商品（杂货、家居用品、药房商品），并选择无人机配送。
              Zipline 的调度软件收到订单后，将其路由到最近的 Platform 2 DC，并触发自主飞行。Platform 2 用 8 个 VTOL 旋翼从
              DC 垂直起飞，转换为固定翼巡航，并利用 GPS、计算机视觉和 LTE 通信进行 BVLOS 导航至配送地址。抵达后，无人机悬停在
              配送区上方，通过「Droid」机制用系绳把包裹降到地面——无需无人机落地。客户收到通知并取走包裹。配送通常在订单确认后
              15–40 分钟完成。

              **日本流程**：与美国零售类似，但根据日本 CAA 监管和市场条件调整（不同投放区、更高人口密度区域）。
              日本运营于 2024 年启动，处于早期爬坡阶段。

              这些流程凸显了 Zipline 的核心价值主张：在配送中心 10–80km 范围内，针对时间敏感物品（医疗物资、药品、易腐品），
              配送速度显著快于地面物流。
            claimRefs:
              - CE001
              - CE002
              - CE003
