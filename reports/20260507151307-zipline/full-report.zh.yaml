chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Zipline International Inc. 是一家总部位于 South San Francisco 的自主物流公司，
              自主设计、制造并商业化运营无人机配送飞行器。公司的使命是「instant logistics」：
              像收到短信一样快，把货物送到任何地点，不受道路基础设施限制。Zipline 运营两个
              不同的产品平台：Platform 1（P1）是面向农村和医疗配送的远程固定翼 UAV；
              Platform 2「Zip」是面向郊区消费配送的 VTOL 四旋翼飞行器。
              Zipline 的商业模式是配送即服务：在医疗物流上，向政府和医院网络收取多年合同下的
              单次配送费；在消费配送上，向零售伙伴（Walmart）收取单次配送费。公司总部地址为
              South San Francisco, CA 94080。阶段：后期私营、IPO 前。年度收入未公开披露；
              公司已规模化运营，但没有发布经审计财务结果。行业：机器人与自主物流。
              Zipline 与其他所有无人机配送公司的差异在运营规模——自 2016 年以来，已在 8 个国家
              商业化完成超过 1.3 million 次配送，而 Amazon Prime Air、Wing（Alphabet）和其他
              竞争对手仍主要停留在有限试点部署。
            claimRefs:
              - CO001
              - CO002
              - CO005
          - type: table
            tableRef: TO001
            claimRefs: []
          - type: figure
            figureRef: FO002
