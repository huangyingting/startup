  - id: FU001
    title: 客户旅程图
    type: journey-map
    insight: 企业 B2B 客户（医院、零售、餐饮服务）沿着「试点到生产」路径推进；非洲政府客户则直接进入多年期国家项目。消费者体验由企业伙伴的 app 承接。
    data:
      items:
        - id: stage-awareness
          label: 认知
          actor: 企业买方（采购、运营）
          description: 通过行业媒体、监管批准新闻或同行推荐了解 Zipline。消费者兴趣主要由企业合作伙伴营销带动。
          channels:
            - 行业媒体
            - 行业会议
            - 政府卫生部推荐
        - id: stage-evaluation
          label: 评估 / 试点
          actor: 企业买方
          description: 同意部署试点——通常 3-6 个月——测试配送经济性、可靠性以及消费者 / 临床接受度。非洲政府客户会跳过试点，直接全国铺开。
          channels:
            - Zipline 销售团队
            - 监管协调
            - 试点区域 FAA/CAA 授权
        - id: stage-conversion
          label: 生产部署
          actor: 企业买方 + 运营团队
          description: 从试点转为生产：签订合同（3-5 年）、建设基础设施（配送枢纽），并接入企业伙伴的运营 / 物流系统。
          channels:
            - Zipline 运营团队
            - 企业 IT 集成
            - 消费者 app 上线
        - id: stage-expansion
          label: 扩张
          actor: 企业买方 + Zipline 业务拓展
          description: 在客户内部做地域扩张（更多地点）、垂直扩张（新产品类型）或启用新场景。Rwanda 和 Walmart 都是案例——两者后续都扩大了合作范围。
          channels:
            - 续约谈判
            - 新地理区域监管批准
            - 增量枢纽建设
        - id: stage-retention
          label: 留存 / 续约
          actor: 企业客户管理
          description: 多年期合同是否续约，取决于已证明的 ROI 指标、成果记录和竞争替代方案评估。非洲医疗保健合同显示 8+ 年留存；美国企业留存率未公开披露。
          channels:
            - 季度业务复盘
            - 成果报告
            - 合同续约
    sourceRefs:
      - SU001
      - SU005
      - SU016
      - SU024
