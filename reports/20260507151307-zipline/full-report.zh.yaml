  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: |
              Zipline 参与两个主要市场，且二者正在逐步汇合。第一个是医疗末端物流——把血液制品、
              疫苗、药品和医疗物资送到偏远或服务不足的医疗机构。在这一细分市场，Zipline 主要与
              公路快递系统、冷链物流公司和直升机服务竞争。可触达市场是全球性的：WHO 估计，约有
              2 billion 人无法在 4 小时内可靠获得医疗物资，这正是无人机配送要解决的医疗物流缺口。
              撒哈拉以南非洲、东南亚、南亚和拉美部分地区的政府是该细分市场的主要买家，它们为国家医疗体系
              采购多年期配送服务。
              第二个市场是消费和零售末端无人机配送——在 10–15 英里郊区半径内，将零售商品
              （杂货、药品、电子产品）自主送到住宅客户手中。在这一细分市场，Zipline 与地面快递服务
              （UPS、FedEx、USPS、DoorDash）、零售门店自提模式，以及竞品无人机平台
              （Amazon Prime Air、Wing、Joby Delivery）竞争。零售场景的现状替代方案包括传统电商配送
              （1–2 天）和当日地面快递配送（3–8 小时）。被排除的支出包括长途货运物流
              （Zipline 航程太短，无法服务全国货运）和城市中心配送（空域复杂度和密度不允许在密集城市核心运营）。
            claimRefs:
              - CM001
              - CM002
              - CM003
          - type: table
            tableRef: TM001
            claimRefs: []
      - number: '2.2'
        title: 市场规模
        blocks:
          - type: paragraph
            body: |
              Zipline 的市场需要从多个口径估算。全球无人机配送市场（所有垂直场景）：多份分析师报告
              （Grand View Research、MarketsandMarkets、Research and Markets）的估计从 $2.6B（2024）
              到 $14.5B（2030），最高到 $39B（2035）。区间很宽，反映了监管时间表（尤其是欧洲、印度和中国的
              BVLOS 放开）以及消费者采用曲线的不确定性。仅看医疗细分：全球医疗末端物流市场目前约为
              $60–80B，无人机可服务的子集是道路基础设施缺口创造出配送可行窗口的市场。Zipline 估计约
              50+ 个国家落在这一类别。美国消费零售配送细分：Walmart 拥有 4,700+ 家门店，美国年零售收入合计
              $500B+。即使无人机配送只渗透门店销售额的 1%，可触达配送量也极其庞大。McKinsey 对末端配送成本的
              分析显示，无人机配送在规模化后可把单次配送成本降至 $1–10，与当日地面快递（$5–15）具备竞争力。
              2025 年 Zipline 美国运营的可服务市场（SAM）：现有 NC、AR 和 UT Walmart 门店的 Platform 2 航程内
              约有 150–200M 美国家庭。目前这一数字约为 5M 户。
            claimRefs:
              - CM004
              - CM005
              - CM006
              - CM007
          - type: table
            tableRef: TM002
            claimRefs: []
          - type: figure
            figureRef: FM001
            claimRefs:
              - CM004
              - CM005
          - type: figure
            figureRef: FM002
            claimRefs:
              - CM006
              - CM007
      - number: '2.3'
        title: 买家分层
        blocks:
          - type: paragraph
            body: |
              Zipline 的买家分层在结构上差异很大。医疗物流场景：
              预算所有者是政府卫生部或区域卫生主管机关。决策流程是政府采购（5–10 年 RFP 周期），常由国际资金
              （USAID、WHO、GAVI）支持，并由本地政府共同投入。采用前需要国家民航主管机关发放监管许可，
              Zipline 已在 Rwanda、Ghana、Nigeria、Kenya、Ivory Coast 和 Japan 取得许可。在这些市场，
              Zipline 作为政府签约的国家级物流运营商运作，几乎没有来自私营无人机公司的实质竞争
              （后者缺少 Zipline 已具备的监管许可和运营证明）。
              美国零售配送场景：买家是大型零售商（Walmart 是锚定客户）。决策流程是战略性零售技术合作——
              Walmart 的供应链和创新领导层拥有决策权，每个 DC 位置还需要房地产和地方政府的空域批准。
              Zipline 给 Walmart 的价值主张是：用规模化后 $3–8/单的无人机配送，替代 $5–15/单的当日快递成本。
              消费者采用路径：认知 → 试用 → 复购。Walmart 部署的早期美国消费者数据表明满意度较高
              （NPS 未披露），10–30 分钟配送时长是主要价值驱动。
            claimRefs:
              - CM008
              - CM009
              - CM010
          - type: table
            tableRef: TM003
            claimRefs: []
          - type: figure
            figureRef: FM003
            claimRefs:
              - CM008
              - CM009
      - number: '2.4'
        title: 增长驱动与约束
        blocks:
          - type: paragraph
            body: |
              Zipline 市场的主要增长驱动包括：（1）监管放开——FAA 的 BVLOS 规则制定流程正在释放美国无人机规模化
              运营；欧盟、日本（2022 年完成）、印度和加拿大也在推进类似规则变化。每个新的监管框架都会为
              Zipline 打开一个新的国家市场，且不需要重新开发技术。（2）Walmart 级零售采用——当全球最大零售商
              承诺规模化使用无人机配送，其他零售商（Costco、Target、Home Depot）跟进的商业理由会更容易成立。
              网络效应：Zipline 的 DC 基础设施一旦建成，可服务多个零售客户。（3）自主配送经济性——无人机配送的
              单位经济性会随规模快速改善；当每个 DC 每天配送 500+ 单，单次配送成本接近 $3–5，足以与任何地面快递竞争。
              主要约束包括：（1）资本强度——每个 DC 需要 $2–5M+ 基础设施投入；扩张到 1,000+ 个 DC 需要
              $2–5B 资本开支。（2）监管风险——如果监管机构因安全事故反应，BVLOS 规则可能被推迟、限制或逆转。
              任何在美国造成伤人的无人机坠毁都会触发重大监管反应。（3）消费者接受度——噪音、隐私和社区反对是真实的
              采用约束，Zipline 正通过社区沟通项目管理这些问题。
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM014
          - type: table
            tableRef: TM004
            claimRefs: []
          - type: figure
            figureRef: FM004
            claimRefs:
              - CM011
              - CM012
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              Zipline 的竞争格局覆盖四类玩家：直接无人机配送同行、现有物流运营商、相邻的 eVTOL / 货运无人机进入者，
              以及定义无人机配送竞争基线的现状替代方案。

              **直接无人机配送同行**是主要竞争威胁。在医疗细分市场，Zipline 最直接的竞争对手是 Matternet，
              一家瑞士-美国公司，在 Switzerland、Singapore 和非洲部分地区的医院及诊所运营医疗无人机配送。
              Matternet 的运营规模更小——配送量大约是 Zipline 的 1/20——但它建立了 Zipline 缺少的欧盟运营经验。
              Swoop Aero（Australia）和 GLOBHE 在重叠的医疗地理市场（PNG、Malawi、Nepal）运营，但规模更小。
              在消费 / 零售细分市场，Wing（Alphabet/Google）和 Amazon Prime Air 是最可信的直接竞争对手。
              截至 2024 年，Wing 在 Australia、Finland 和美国部分郊区运营，累计完成 1M+ 次配送——高于 Zipline 的
              美国 / 日本消费端配送量，但远落后于 Zipline 的非洲医疗总量。Amazon Prime Air 有无限资本支持和美国
              品牌认知，但尽管自 2013 年以来投入 $2B+，截至 2024 年仍处于有限部署。

              **现有物流运营商**今天还不是无人机竞争对手，但在规模、客户关系和地面配送网络上有结构性优势。
              DHL、FedEx 和 UPS 合计每天在全球完成数百万次配送。UPS 的 Flight Forward 子公司持有自己的
              FAA Part 135 无人机证书，FedEx 也在试点无人机配送合作。如果这些既有企业获得合适的监管许可，
              它们可能比创业公司更快规模化无人机能力——而它们与医疗体系的既有客户关系，长期看尤其威胁 Zipline 的
              医疗细分市场。

              **相邻进入者**包括 Joby Aviation 和 Archer（eVTOL），它们在开发可服务更长航程货运任务的飞行器，
              但主要聚焦城市空中出行 / 客运。Skyports 提供无人机配送基础设施（vertiports、UTM 系统），而不是运营
              自己的配送服务。这些公司今天不是直接竞争对手，但如果货运 eVTOL 实现商业规模，可能进入 Zipline 的市场。

              **现状替代方案**才是 Zipline 真正的竞争基线：医疗物流中是冷链公路运输和社区卫生工作者备货；
              零售中是 DoorDash、Instacart 和 Amazon 当日达。Zipline 必须在成本、可靠性和速度上，与这些成熟且深度嵌入的
              替代方案竞争。
