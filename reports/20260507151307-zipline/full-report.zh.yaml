      - number: '5.5'
        title: 信任、安全、合规与路线图
        blocks:
          - type: paragraph
            body: >
              Zipline 的信任与安全画像，是公开资料中最充分记录的竞争优势。公司主打 99.9% 配送可用性 SLA，也反复引用 1B+ 配送英里的安全记录。


              **安全记录**：10+ 年、1B+ 配送英里中，尚无人员死亡或重伤被归因于 Zipline 配送无人机事故。这项记录跨越了多种环境：非洲农村、美国郊区空域，以及日本城市周边运营。安全记录来自 Zipline
              自主飞行系统的可靠性、冗余通信链路，以及避免无人机贴近地面的 Droid 配送机制。


              **FAA 安全管理体系**：作为 FAA Part 135 Air Carrier，Zipline
              必须维护安全管理体系（SMS）——一套正式、有文档记录的安全协议系统，包含危险识别、风险评估和安全保证项目。FAA 会审计这套 SMS；它也是 Zipline 持续获得 BVLOS 运营权限的正式基础。


              **隐私与数据合规**：Zipline 的 Platform 2
              搭载摄像头，用于导航和避障。配送飞行会经过私人住宅上空，摄像头处于开启状态，因此在州级无人机隐私法律（California、Texas、Florida）和新兴市政规则下，可能带来隐私合规问题。Zipline
              尚未公开披露飞行中摄像头数据的保留或删除政策。


              **网络安全**：通过 LTE 控制 BVLOS 无人机，会带来短程无人机没有的网络安全攻击面。LTE 指挥控制链路必须防范信号欺骗、干扰和未授权访问。Zipline 尚未公开披露网络安全架构或渗透测试项目。


              **产品路线图**：基于专利申请和媒体报道：

              - 2024–2025：将 Platform 2 扩展到更多 Walmart DC（100+ 目标）

              - 2025–2026：日本市场规模化；可能启动 EU 监管沟通

              - 2026–2027：Platform 3 开发（推测：更高载荷、更长航程）

              - 2025–2027：美国医院系统医疗合作（相邻市场进入）

              - 2025–2028：通过 Saudi Aramco 合作进入中东部署（沙特阿拉伯、阿联酋）
