      - number: '3.3'
        title: 能力、定价与 GTM 对比
        blocks:
          - type: paragraph
            body: |
              Zipline 的技术差异化集中在固定翼设计。Platform 2 具备 80km 航程、2.5kg 载荷，并可在 20+ 节风和雨中配送——
              多旋翼竞争对手（Wing 12km、Prime Air 约 8km）无法匹配。这个航程优势对 Zipline 的非洲医疗项目具有决定性
              （诊所距离配送中心常超过 50km），对美国郊区部署也有用，因为 DC 需要覆盖大范围地理区域。

              **监管姿态**是 Zipline 最强的差异化。Zipline 持有 FAA Part 135 航空承运人认证和 BVLOS 运营批准——
              与 UPS Flight Forward 和 Wing 同一级别。Prime Air 在多数美国场站仍缺少完整 BVLOS 覆盖。没有竞争对手像
              Zipline 一样持有跨 8+ 个国家的多国监管批准。这一监管先发相当于 2–4 年领先时间，竞争对手必须花这段时间走完自己的审批流程。

              **定价**方面，所有无人机配送运营商都未向公众披露。普遍报道显示，Wing 单次配送成本为 $3–6
              （由 Alphabet 补贴）。Zipline 非洲医疗费用估计在政府合同下按成本回收定价。美国消费配送定价尚未公开披露，
              但早期部署中预计与 $5–10 的地面快递服务持平或更高。

              **GTM 与分销**：Zipline 通过企业 B2B 关系切入政府卫生部门和大型零售锚定伙伴（Walmart）。Wing 与本地零售商和餐厅合作，
              面向郊区消费市场。Amazon Prime Air 被整合进 Amazon 物流平台。Matternet 面向医院采购和医疗体系合作。
              这些 GTM 路径反映了完全不同的买家类型和销售周期，在大多数市场减少了直接 GTM 竞争。

              **信任与逆风**：Zipline 的 99.9% 正常运行时间 SLA，以及 1B+ 配送里程且无人员死亡，是对政府医疗买家的强信任信号。
              竞争对手没有匹配的运营安全记录，这也是卫生部采购决策的关键标准。
            claimRefs:
              - CP011
              - CP012
              - CP013
              - CP014
              - CP015
