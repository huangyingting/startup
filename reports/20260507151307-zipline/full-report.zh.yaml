  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: |
              Zipline 通过三条主要路径产生收入：（1）非洲政府医疗合同下的单次配送费；（2）通过零售合作产生的单次配送费
              （美国 Walmart、日本未披露零售伙伴）；（3）长期政府合同带来的平台和物流管理费。

              **非洲医疗收入**是最成熟的收入流。Zipline 与 Rwanda、Ghana、Nigeria、Côte d'Ivoire、Kenya 和 Zambia 的
              卫生部门签署国家级物流合同——通常按单次配送收费，并由国际援助（USAID、WHO、GAVI）部分共同资助。
              基于配送量和援助共同资助水平，估计每个国家每年合同价值在 $1–10M。按非洲年配送量 1M+ 次估算
              （由 10 年累计 1B+ 配送里程推断），非洲医疗年收入估计为 $7–50M，不过实际费率结构未披露。

              **美国零售收入**来自 Walmart 合作，更新（2022–2024）且不确定性更高。Zipline 向 Walmart 收取单次配送费——
              据报道与地面快递费率（$5–15/单）具备竞争力，或高于该水平。随着 36+ 个 Walmart DC 在 North Carolina、
              Arkansas 和 Utah 部署 Platform 2，美国年配送量估计为 500K–5M 次，对应美国零售收入 $2.5–75M，
              取决于量和定价——区间很宽，反映了真实不确定性。

              **日本零售收入**于 2024 年启动，估计第一年可忽略；随着监管批准和消费者采用发展，预计 2025–2026 年逐步爬坡。

              零售业务按单次配送服务收入确认；政府合同收入可能包括在合同期内确认的固定费用部分。Zipline 是私营公司，
              公开领域没有经审计财务数据。
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
