          label: 从配送枢纽部署
        - from: d6
          to: d7
          label: 枢纽服务 Walmart 覆盖区域
        - from: d7
          to: d8
          label: 主要美国收入来源
        - from: d9
          to: d10
          label: 政府合同 → 配送收入
    sourceRefs:
      - SR001
      - SR002
      - SR014
      - SR018
      - SR028
  - id: FV001
    title: 推荐逻辑
    type: flow
    insight: 有条件正面推荐来自三个收敛输入：运营记录（强）、美国商业证据（正在出现）和估值 / 财务风险（高）。若要升级为无条件正面推荐，估值入场纪律和单位经济模型确认是门槛。
    data:
      nodes:
        - id: f1
          label: 运营记录（高）
          description: 1.3M 次配送、Rwanda 8 年、零消费者伤害、获得 Part 135 认证
        - id: f2
          label: 美国商业证据（正在出现）
          description: Walmart 锚定客户、Intermountain HC、Sweetgreen，截至 2025 年 4 月活跃于 4 个美国都会市场
        - id: f3
          label: 估值与财务风险（高）
          description: $4.2B 定价押注尚未验证的美国消费者单位经济模型；未披露收入
        - id: f4
          label: 有条件正面信号
          description: 技术和监管护城河强；市场领先；过往记录有说服力
        - id: f5
          label: 所需投资条件
          description: 以低于上一轮价格进入；验证单位经济模型为正；审查股权结构表
        - id: f6
          label: 有条件正面推荐
          description: 在 $2.9-3.4B 估值入场，且单位经济模型和监管路线图已验证时投资
        - id: f7
          label: 放弃标准
          description: FAA 暂停；消费者伤害；Walmart 流失；单位经济模型长期为负
    sourceRefs:
      - SV001
      - SV010
      - SV016
      - SV023
  - id: FV002
    title: 估值敏感性
    type: bar
    insight: >-
      Zipline 的 $4.2B 估值对收入倍数很敏感——从 $1.4B（熊市，按当前估算 $350M 收入的 4x）到 $34B+（牛市，按 2030 年 $2.25B 收入的 15x）。按 $4.2B
      入场，只有在牛市情形且倍数处于当前至中等区间时才跑得通。
    data:
      items:
        - label: 熊市：4x $350M 收入（2030）
          value: 1.4
          unit: $B
        - label: 基准：8x $450M 收入（2030）
          value: 3.6
          unit: $B
        - label: Series F 入场（$4.2B）
          value: 4.2
          unit: $B
        - label: 基准高位：12x $500M 收入（2030）
          value: 6
          unit: $B
        - label: 牛市：10x $1.5B 收入（2030）
          value: 15
          unit: $B
        - label: 牛市高位：15x $2.25B 收入（2030）
          value: 33.75
          unit: $B
    sourceRefs:
      - SV005
      - SV008
      - SV015
      - SV016
  - id: FV003
    title: 估值 / 回报区间
    type: range
    insight: 相对 Series F 入场，熊市到牛市的退出估值横跨 $400M-$34B；基准情形（概率最高，为 40%）只带来 0.6-1.4x 的温和回报。区间拉得这么宽，根源在于美国消费者配送的单位经济性仍高度不确定。
    data:
      items:
        - label: 熊市情形退出价值
          low: 0.4
          high: 1.2
          mid: 0.8
          unit: $B
        - label: 基准情形退出价值
          low: 2.4
          high: 6
          mid: 4
          unit: $B
        - label: 牛市情形退出价值
          low: 7.5
          high: 34
          mid: 15
          unit: $B
        - label: Series F 入场（$4.2B）
          low: 4.2
          high: 4.2
          mid: 4.2
          unit: $B
        - label: 建议入场（折价）
          low: 2.9
          high: 3.4
          mid: 3.15
          unit: $B
    sourceRefs:
      - SV010
      - SV015
      - SV027
  - id: FV004
    title: 投资 KPI
    type: kpi
    insight: 关键投资 KPI 一边确认 Zipline 的规模领先，一边凸显最关键的财务指标缺口：收入、利润率和烧钱速度仍未披露，构成投资论证里的核心证据缺口。
    data:
      items:
        - label: 最近一轮估值
          value: $4.2B
          status: confirmed
          note: Series F，2023 年 5 月
        - label: 累计融资
          value: $1.2B+
          status: confirmed
          note: 从种子轮到 Series F（PitchBook）
        - label: 运营国家
          value: '7'
          status: confirmed
          note: 卢旺达、加纳、尼日利亚、科特迪瓦、美国、日本、沙特阿拉伯
        - label: 累计配送量
          value: 1.3M+
          status: confirmed
          note: 截至 2025 年累计
        - label: 收入（2024）
          value: Undisclosed
          status: missing
          note: 估算为 $50-150M；未公开确认
        - label: 毛利率
          value: Undisclosed
          status: missing
          note: 未披露；按当前规模估算，美国消费者业务为负
        - label: 活跃美国都市市场
          value: 4+
          status: confirmed
          note: 截至 2025 年 4 月：湾区、达拉斯、盐湖城、洛杉矶
        - label: 隐含收入倍数
          value: 28-84x est.
          status: estimated
          note: 基于 $4.2B EV 和 $50-150M 收入估算
    sourceRefs:
      - SV001
      - SV007
      - SV023
      - SV025
