      - number: '5.3'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Zipline 的技术架构把硬件、嵌入式软件、云基础设施和线下运营绑成一个紧耦合系统。核心技术组件包括：


              **自主飞行系统**：Platform 2 的自主飞行系统采用多层导航架构。主导航依靠 GNSS（GPS + GLONASS）和气压高度基准；二级导航用计算机视觉完成末段定位和障碍物检测。通信上，LTE 4G
              蜂窝网络是主要 BVLOS 指挥通道，并用多张 SIM 卡跨运营商做冗余，同时保留自研 RF 备用链路。飞行管理软件根据 ATC 空域数据流（经由 FAA 的 UTM 网络）做路径规划、天气规避和实时航线调整。


              **LTE BVLOS 架构**：监管上最关键的技术，是 Zipline 基于 LTE 的 BVLOS 指挥控制链路。它在整个飞行过程中，让无人机与 DC 地面站保持连续双向通信。FAA 要求这条链路用于
              BVLOS 认证；Zipline 使用多家运营商 SIM（美国为 Verizon、AT&T、T-Mobile）来确保接近 100% 的覆盖。这也带来 LTE 网络依赖：Zipline 只能在 LTE
              覆盖足够密集的地区运营，没有 4G 覆盖的农村地区会受限。


              **制造**：Platform 2 在 Zipline 的 San Francisco 工厂和合同制造商处生产。Zipline 尚未公开制造伙伴或供应链结构。关键部件包括：无刷 DC
              电机（可能来自欧洲或美国电机制造商）、锂离子电池包（电芯可能来自 Samsung SDI、LG Energy 或中国同类供应商）、飞控计算机（搭载定制固件的 COTS 嵌入式 SBC），以及自研机身 /
              机翼复合材料结构。


              **数据基础设施**：Zipline 运营基于云的调度和监控系统。考虑到投资人 GV（Google Ventures）的参与，底层很可能在 AWS 或 Google Cloud
              上。所有活跃无人机的实时遥测会汇总到中央运营监控中心。物流系统通过专门搭建的集成层接入 Walmart 的订单管理 API。


              **Droid 配送机制**：Platform 2 最有辨识度的技术特征是「Droid」——一个带动力的云台系统，从无人机上通过系绳下降，携带包裹到地面高度（8–10m
              下放），投放后在无人机离开前收回。这个机制让 Zipline 能做到精确的室内 / 室外配送，无需无人机降落；相比必须在收货地址降落的竞争对手，它在安全和监管上都有优势。
            claimRefs:
