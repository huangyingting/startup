      - number: '6.4'
        title: 集中度风险与扩张路径
        blocks:
          - type: paragraph
            body: >
              Walmart 在美国商业收入中的占比过高，是最常被提及的客户集中度风险。WSJ 2024 年 7 月分析将 Walmart 识别为实质性的单点收入风险；Bloomberg 2025 年 2 月确认
              Zipline 正在积极推进客户多元化。对美国商业细分市场而言，这是有记录且实质性的结构性风险。


              Zipline 在美国的地理扩张路径（湾区、达拉斯、盐湖城、洛杉矶）显示，增长策略更偏向高密度都市覆盖，而不是稀疏全国铺开。2025 年签署的 15+
              份新企业协议说明管线在增长，但签约和实现生产收入是两个不同里程碑。


              温控配送限制压缩了餐饮服务客户选择。Bloomberg 记录称，多家大型 QSR 连锁因 Zipline 只能常温配送而拒绝合作。这把餐饮客户 TAM
              收窄到适合常温商品的餐饮品牌（沙拉、寿司、包装食品），降低了餐饮服务扩张机会。
            claimRefs: []
          - type: table
            tableRef: TU004
            claimRefs: []
          - type: figure
            figureRef: FU004
            claimRefs: []
      - number: '6.5'
        title: 展项
        blocks:
          - type: callout
            title: Walmart 集中度风险
            body: WSJ 将 Walmart 识别为 Zipline 在美国最大的商业收入来源。失去该合作或未能续约，会显著削弱美国收入轨迹。Zipline 正在积极多元化，但尚未签下任何规模相当的单一替代客户。
            calloutType: insight
            claimRefs:
              - CU013
              - CU023
          - type: callout
            title: 非洲政府医疗：最强留存证据
            body: 卢旺达（8+ 年）、加纳（5+ 年）和尼日利亚（多年扩张）构成 Zipline 客户组合中最强的公开留存证据。非洲政府医疗合同提供持久收入，流失风险低，并且有记录的影响成果。
            calloutType: insight
            claimRefs:
              - CU027
              - CU005
          - type: callout
            title: 消费者投诉和噪音摩擦可能约束城市扩张
            body: 社区噪音投诉、HOA 反对，以及消费者事务报告中的配送失败，说明 Zipline 扩入美国高密度郊区和城市市场时面临真实的运营和声誉风险。这些风险可能触发地方监管行动，限制企业伙伴的配送区域。
            calloutType: insight
            claimRefs:
              - CU011
              - CU012
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Zipline 的美国商业运营根本依赖 FAA 监管批准，而这些批准可能被暂停或撤销。公司持有 Part 135 Air Carrier
              证书——商用无人机配送的必要条件——并且每进入一个新的运营地理区域，都必须取得针对该地点的 BVLOS 豁免。地点特定豁免是关键的扩张速度限制器：没有 FAA 对该地点的单独审查和授权，Zipline
              不能进入新的美国都市市场。


              待定的 FAA BVLOS 最终规则，是最重要的监管风险。该规则目前处于 NPRM 阶段，已超过原定 2024 年目标时间；最终规则可能新增探测并避让硬件要求、Remote ID
              合规要求和运营规范变化。任何追溯性合规要求都会适用于 Zipline 既有机队和基础设施，可能带来显著资本开支。


              法律侧，Law360 记录了 Zipline 与 Wing（Alphabet 的无人机子公司）围绕配送系统设计的专利纠纷，使 Zipline 的实施自由存在 IP 不确定性。Bloomberg Law
              指出，无人机配送的产品责任框架仍不清晰：美国尚无消费者无人机伤害的既定判例。Zipline 作为最活跃的美国消费者运营商，承担先行者责任暴露。
            claimRefs: []
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
              - CR003
              - CR005
              - CR010
              - CR006
              - CR011
