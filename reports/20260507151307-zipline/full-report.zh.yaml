      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: |
              **Wing（Alphabet）**是 Zipline 在消费无人机配送中最可信的直接竞争对手。Wing 于 2019 年公开推出，
              运营多旋翼 VTOL 无人机，配送航程约 12km、载荷 1.5kg——航程和载荷都低于 Zipline 的 Platform 2。
              Wing 持有 FAA Part 135 航空承运人认证，并自 2019 年起在 Australia、自 2022 年起在 Finland、
              自 2023 年起在 Dallas-Fort Worth 和 Virginia 商业运营。Wing 全球已完成 1M+ 次配送，并受益于
              Alphabet 几乎无限的 R&D 预算和 Google Maps 物流数据。Wing 的战略弱点在于多旋翼设计：相比 Zipline 的
              固定翼平台，航程更短、天气耐受性更弱、单次配送能耗更高。

              **Amazon Prime Air**是资金最充足、潜在零售触达最大的竞争对手。Amazon 于 2013 年开始测试无人机配送，
              并在 2020 年取得 FAA 认证。尽管投入 $2B+，Prime Air 在 California 的 Lockeford、Texas 的
              College Station 以及英国的部署仍规模很小（每周数百次配送）。Amazon 近期的扩张挑战——包括据报道
              2023 年无人机项目重组和裁员——说明即使是 Amazon，也发现无人机配送经济性很难跑通。Prime Air 的
              战略优势是与 Amazon 物流平台整合；弱点是多旋翼航程 / 载荷约束，以及美国空域整合带来的监管负担。

              **Matternet**是医疗细分市场的领先竞争对手。Matternet 成立于 2011 年，总部在 Menlo Park, CA，
              在瑞士医院（与 DHL 和 Swiss Post 合作）、Singapore 的 National University Hospital，以及撒哈拉以南非洲的
              医疗项目中运营医疗无人机配送网络。Matternet 累计融资约 $50M——远低于 Zipline 的 $900M+——并聚焦医院到医院的
              医疗样本配送，而不是末端社区卫生工作者配送，因此与 Zipline 非洲医疗项目的直接重叠较小。

              **DroneUp**在美国零售配送中与 Zipline 直接竞争，和 Walmart 合作在 Arkansas、Virginia 和 Tennessee
              开展无人机配送。DroneUp 使用多旋翼无人机，已完成 100K+ 次配送，是 Walmart 生态中最接近 Zipline 的竞争对手——
              但 Zipline 的 Platform 2 服务不同的 Walmart DC 和地理区域，目前直接重叠有限。

              **Manna Aero**在 Ireland 运营商业无人机配送网络，为 Tesco 和其他零售商配送杂货及便利零售商品，
              自 2020 年以来完成 100K+ 次配送。Manna 的欧盟运营基础给了它 Zipline 缺少的欧洲市场监管经验，
              Manna 也在推进英国和欧盟扩张。

              **Swoop Aero**在 Papua New Guinea、Malawi、Nepal 和其他新兴市场，为 WHO 和政府项目提供医疗无人机物流。
              Swoop 获 Australia 政府支持的模式类似 Zipline 的非洲模式，但规模小得多，也并非在所有地理市场都有固定翼航程优势。
