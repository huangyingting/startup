              - CO008
      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: |
              Zipline 由三位核心成员于 2014 年共同创立。Keller Cliffton（CEO）曾在 Yale 学习哲学，
              后在 Google 的 X moonshot 实验室工作，再共同创立 Zipline。他是公司最主要的外部代表，
              推动商业合作和融资。Will Hetzler（CTO）是首席飞行器与系统工程师，负责 Zipline 自研的
              Platform 1 和 Platform 2 飞行器设计。Joshua Hetzler（创立时任首席运营官；当前头衔因报道而异）
              共同创立公司并管理运营扩张。作为后期私营公司，Zipline 未公开披露董事会构成；已知董事包括
              Andreessen Horowitz 和 Sequoia Capital 投资轮的代表。关键人物依赖明显：Keller Cliffton 的
              公众形象和投资人关系对融资与政府合作至关重要。公开报道中没有重大领导层变动。Zipline 约有
              1,000–1,500 名员工（LinkedIn 估计），工程团队集中在 South San Francisco，运营员工分布在
              非洲、美国和日本的 8 个国家。
            claimRefs:
              - CO003
              - CO004
              - CO016
