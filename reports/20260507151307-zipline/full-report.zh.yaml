            tableRef: TU001
            claimRefs: []
          - type: table
            tableRef: TU005
            claimRefs: []
          - type: figure
            figureRef: FU001
            claimRefs: []
      - number: '6.2'
        title: 具名客户证据与生产部署
        blocks:
          - type: paragraph
            body: >
              Zipline 的客户组合包含多个细分市场中已公开确认的生产部署。Walmart 是美国零售旗舰客户，商业运营已落地湾区和达拉斯，并将在 2025 年扩展到盐湖城和洛杉矶。上市餐饮连锁 Sweetgreen 于
              2024 年 8 月宣布商业合作，把 Zipline 带入餐饮服务。Intermountain Healthcare 是最明确被确认的美国医院客户，在其犹他州网络内用无人机配送药品和医疗物资。


              在非洲，卢旺达（自 2016 年起）、加纳（5+ 年）和尼日利亚（36 州覆盖）是旗舰政府医疗客户，公开资料也记录了业务成效。AP News、The Guardian
              和多篇医疗政策出版物独立验证了客户影响，包括服务医疗机构的血液缺货率下降 60-80%，配送提前期从数小时缩短到数分钟。


              2024 年 6 月，日本商业启动加入了本地零售商和药房，成为首批亚洲 B2B 客户群；本地 Nikkei 报道确认业务已在运行。
            claimRefs: []
          - type: table
            tableRef: TU002
            claimRefs: []
          - type: figure
            figureRef: FU002
            claimRefs: []
      - number: '6.3'
        title: 留存、流失与客户健康信号
        blocks:
          - type: paragraph
            body: >
              Zipline 未公开披露正式留存指标（NRR、GRR、流失率）。但两个细分市场都有很强的隐性留存证据。在非洲，卢旺达连续使用 8+ 年，未见任何合同不续约报道；加纳将合作延长到 5+ 年，并把覆盖扩展到全部
              16 个地区。尼日利亚项目扩展到全部 36 个州，更像增购 / 扩张动作，而不是流失风险。


              在美国，Walmart 合作于 2023 年 10 月被扩展，而不只是续约，从试点走向多城市铺开。这个扩展信号，是目前公开资料中最强的 B2B 留存和 ROI 满意度指标之一。Intermountain
              Healthcare 自首次上线以来持续且有记录的部署，是第二个正面指标。


              消费者满意度信号更混合。据 CNBC，Zipline 内部 NPS 据称高于 70；但消费者事务报告也记录了随着消费者部署规模扩大出现的服务故障和漏送。Modern Healthcare
              报道，美国医院客户从试点到生产的转化率超过 80%——这强烈表明试用客户看到了足够价值，愿意投入生产部署。
