      - number: '5.2'
        title: 平台模块与资产图谱
        blocks:
          - type: paragraph
            body: |
              Zipline 的产品组合覆盖两代平台和三类运营资产：无人机飞行器、DC 基础设施和软件系统。

              **Platform 1（非洲医疗）**是公司的第一款商业无人机：
              - 固定翼机身，翼展约 2.5m，总重量约 10kg
              - 从 DC 弹射发射；在目的地用降落伞投放载荷
              - 载荷能力：1.8kg（约 1–3 袋血，或等量药品）
              - 航程：80km+ 单程（DC 到目的地再回 DC 的 160km 往返能力）
              - 巡航速度：~110 km/h
              - 天气：可在雨中和最高 20 节风中运行
              - 自主性：全自主飞行，在 6+ 个非洲国家取得 BVLOS 认证
              - 当前在 Rwanda、Ghana、Nigeria、Côte d'Ivoire、Kenya、Zambia 运营

              **Platform 2（美国零售和日本）**是 Zipline 的第二代系统，于 2022–2023 年在美国商业化推出：
              - 固定翼 / VTOL 混合设计：8 个旋翼负责垂直起降，固定翼负责高效前飞
              - 翼展约 4m；总重量约 25kg
              - 载荷：通过自研「Droid」自主下放机制承载 2.5kg
              - 航程：80km+ 往返
              - 配送精度：目的地精度在 0.5m 内
              - 噪音：巡航时明显安静于多旋翼竞争对手
              - 全自动化：无人工飞手；仅远程监控

              **DC 基础设施**：每个配送中心包括：
              - Platform 2 VTOL 起降发射台
              - 用于平台维护的机库
              - 载荷处理和装载站（自动或半自动）
              - LTE 无线电基础设施和 BVLOS 通信系统
              - 与零售商订单管理系统集成的物流软件

              **软件系统**：Zipline 的自研软件包括：
              - 自主飞行管理系统（路径规划、避障、天气）
              - 物流调度和路线优化系统
              - 面向客户的配送追踪界面（移动应用 / 网页）
              - 用于库存和载荷处理的 DC 管理软件
