      - number: '1.3'
        title: 融资、估值与投资人基础
        blocks:
          - type: paragraph
            body: |
              2014 至 2023 年间，Zipline 通过 7 轮新股融资约 $932M（Series G）。公司的估值路径为：
              ~$20M（Seed，2014）→ ~$1.2B（Series C，2019，首次成为独角兽）→ ~$4.2B
              （Series F，2021，已确认）→ ~$4.2B（Series G，2023，在困难市场中维持估值）。2023 年 4 月，
              约 $330M 的 Series G 以 $4.2B 投后估值完成——维持独角兽以上状态。主要投资人包括
              Andreessen Horowitz、Sequoia Capital、Baillie Gifford、GV（Google Ventures）、
              Katalyst Health 和 2Africa Partners。投资人基础覆盖一线美国 VC、长期持有型机构
              （Baillie Gifford）、战略 / 影响力资本（Katalyst、2Africa）以及 Google。
              Zipline 未公开披露任何老股交易，但考虑到融资轮数和距离 IPO 的时间，私募二级市场活动可能存在。
              公开报道中没有债务或信贷额度。CEO Keller Cliffton 曾公开释放 2025–2027 年 IPO 目标。
            claimRefs:
              - CO013
