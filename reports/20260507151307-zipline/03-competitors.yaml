      statement: "Walmart operates both Zipline Platform 2 (at NC, UT, and AR DCs) and DroneUp (at AR, VA, TN DCs) simultaneously — confirming multi-homing at the fleet level. This dual-vendor approach limits Zipline's retail lock-in and signals Walmart's intent to maintain competitive pressure on drone delivery partners."
