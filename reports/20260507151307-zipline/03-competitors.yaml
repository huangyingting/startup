      answersQuestionRefs: [QP018, QP025]
    - id: CP017
      statement: "Zipline's government healthcare customers have co-invested in distribution center infrastructure, national civil aviation authority airspace integration, and healthcare staff training — creating estimated switching costs of $5–10M per country if a government wished to migrate to a competitor platform."
