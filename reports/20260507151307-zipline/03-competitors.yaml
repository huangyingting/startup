      statement: "DHL, FedEx, and UPS collectively operate 100,000+ daily delivery vehicles and have existing customer relationships with hospital systems, pharmaceutical companies, and retail chains — providing a distribution power advantage that drone-only startups including Zipline do not have and cannot easily replicate."
