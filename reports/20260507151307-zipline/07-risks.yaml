callouts:
  - id: CR-CALL-01
    type: risk
    title: 'FAA BVLOS Rulemaking: Zipline''s Biggest Regulatory Overhang'
    body: >-
      The pending FAA BVLOS final rule is the single most important regulatory event for Zipline. Delayed beyond its
      2024 target, the rule could retroactively impose detect-and-avoid hardware requirements that necessitate fleet
      upgrades. The compliance cost and timeline are unknown, creating material capex risk for any 2025-2027 investment
      thesis.
    severity: major
    claimRefs:
      - CR003
      - CR004
      - CR027
    sourceRefs:
      - SR004
      - SR011
  - id: CR-CALL-02
    type: risk
    title: 'Consumer Injury: Low Probability, High Consequence'
    body: >-
      Zipline's safety record is exceptional (1B+ miles, zero consumer injuries) but a first significant injury event
      would be non-linear in consequence — triggering FAA operational holds, congressional scrutiny, and potential
      enterprise partner suspension. This is a fat-tail risk that insurance coverage partially addresses but does not
      eliminate.
    severity: major
    claimRefs:
      - CR006
      - CR032
    sourceRefs:
      - SR009
      - SR010
  - id: CR-CALL-03
    type: finding
    title: Community Opposition Is Growing — Monitor Closely
    body: >-
      The escalation of community noise complaints from informal grumbling to organized HOA resolutions and municipal
      ordinance proposals represents a qualitative risk shift. The legal question of FAA preemption over local noise
      ordinances is unsettled — and if municipalities successfully restrict drone flight times or altitudes, Zipline's
      urban delivery zone economics break.
    severity: moderate
    claimRefs:
      - CR010
      - CR011
      - CR030
    sourceRefs:
      - SR012
      - SR013
