chapter:
  order: 7
  number: 7
  title: Risks
  letter: R
  summary: |
    Zipline's principal risk cluster is regulatory: its US commercial operations depend on site-specific
    FAA BVLOS authorizations and a Part 135 air carrier certificate, both of which require ongoing FAA
    compliance and can be suspended on safety or operational grounds. Beyond regulatory risk, Zipline
    faces significant technology/safety risks (drone failure causing personal injury, triggering regulatory
    suspension), commercial risks (Walmart concentration and government contract renewal), financial risks
    (high capital intensity, uncertain path to profitability), and people risks (CEO/founder dependency,
    talent competition from Alphabet and Amazon). Mitigations are mature in the Africa healthcare segment
    but less proven in the US consumer deployment context.
