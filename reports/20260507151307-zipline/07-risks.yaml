  evidenceGaps:
    - type: no-public-evidence
      topic: Financial metrics and burn rate not disclosed
      missingEvidence: >-
        Zipline does not publicly disclose revenue, gross margin, EBITDA, or cash burn rate. The financial risk profile
        cannot be independently assessed without access to private financial statements.
      whyItMatters: >-
        Capital intensity and runway are material risks for a late-stage private company in a capital-intensive hardware
        sector. Without financial disclosure, investors cannot independently assess funding risk.
      relatedQuestionRefs:
        - QR017
      severity: major
    - type: no-public-evidence
      topic: CEO succession planning and board governance not documented
      missingEvidence: >-
        Zipline has not published any succession plan for CEO Keller Rinaudo Cliffton. The board composition and
        governance structure are not publicly disclosed.
      whyItMatters: >-
        Key-person risk is unmitigated without a documented succession plan. Founder departure would be particularly
        disruptive during the US consumer scaling phase.
      relatedQuestionRefs:
        - QR024
      severity: moderate
    - type: no-public-evidence
      topic: Incident reporting completeness and safety database
      missingEvidence: >-
        FAA ASRS and NTSB safety databases do not publicly show a complete Zipline incident record. The Intercept raises
        concerns but the complete incident record is not independently verifiable.
      whyItMatters: >-
        Safety incident completeness is a material regulatory risk factor. Any underreporting creates FAA enforcement
        exposure that could result in Part 135 suspension.
      relatedQuestionRefs:
        - QR006
      severity: moderate
    - type: no-public-evidence
      topic: Competitor risk profile comparison data not public
      missingEvidence: >-
        Detailed operational, financial, and regulatory risk profiles for Wing (Alphabet) and Amazon Prime Air are not
        publicly disclosed. A direct risk comparison requires primary or regulatory source data not available.
      whyItMatters: >-
        Without competitor risk comparison, relative advantage/disadvantage assessment in regulatory standing, safety
        record, and capital efficiency cannot be verified.
      relatedQuestionRefs:
        - QR027
      severity: minor
    - type: no-public-evidence
      topic: Burn rate and financial runway details withheld
      missingEvidence: >-
        Zipline's actual cash burn rate, quarterly revenue, and explicit fundraising timeline are not publicly
        disclosed. PitchBook and WSJ provide high-level indicators but not verifiable financial metrics.
      whyItMatters: >-
        Investors cannot independently assess the fundraising risk timeline or whether Zipline's current runway supports
        the 2025-2027 US consumer scaling plan without disclosure.
      relatedQuestionRefs:
        - QR011
      relatedTableRefs:
        - TR001
      severity: major
sections:
  - id: SR-S01
    title: Regulatory and Legal Risk
    body: >
      Zipline's US commercial operations are fundamentally dependent on FAA regulatory approvals that can be suspended
      or revoked. The company holds a Part 135 Air Carrier certificate — required for commercial drone delivery — and
      must obtain site-specific BVLOS waivers for each new operating geography. The site-specific waiver requirement is
      a critical expansion rate limiter: Zipline cannot enter a new US metro market without a separate FAA review and
      authorization for that location.


      The pending FAA BVLOS final rule represents the most significant regulatory risk. Currently in NPRM stage and
      delayed beyond its original 2024 target, the final rule may impose new detect-and-avoid hardware requirements,
      remote ID compliance, and operational specifications changes. Any retroactive compliance requirements would apply
      to Zipline's existing fleet and infrastructure, potentially requiring significant capital expenditure.


      On the legal side, Law360 documents a patent dispute with Wing (Alphabet's drone subsidiary) covering delivery
      system designs — creating IP uncertainty about Zipline's freedom-to-operate. Bloomberg Law identifies an ambiguous
      product liability framework for drone delivery: no established US case law on consumer drone injury exists,
      creating first-mover liability exposure for Zipline as the most active US consumer operator.
    tableRefs:
      - TR001
      - TR005
    figureRefs:
      - FR001
  - id: SR-S02
    title: Operational and Safety Risk
    body: >
      Zipline's safety record is strong by any measurable standard: 8+ years of African healthcare operations, 1
      billion+ flight miles, and zero recorded consumer injuries. However, the operational risk context for US consumer
      delivery is materially different from the government-supervised healthcare programs where this record was built.
      Consumer delivery involves more unpredictable delivery addresses, denser suburban environments, and end-users who
      may interact unexpectedly with delivery areas.


      Hardware supply chain risks center on battery technology (20-35% of drone BOM, Chinese supply concentration) and
      semiconductor availability for flight computers. Weather restrictions (winds >25mph, heavy rain, icing) create
      service availability limitations that could affect 20-30 days per year in northern and northwestern US markets.
      Cybersecurity risks including GPS spoofing and C2 link jamming are documented by Wired, and are amplified in
      consumer-facing deployments versus controlled healthcare logistics.


      Community noise opposition has escalated, with The Guardian documenting HOA resolutions and Politico reporting
      municipal interest in drone noise ordinances. The legal question of whether FAA preemption blocks local noise
      regulation is unresolved, creating a risk that urban delivery zones could face fragmentation from local
      restrictions.
    tableRefs:
      - TR002
    figureRefs:
      - FR002
  - id: SR-S03
    title: Commercial, Financial, and People Risk
    body: >
      Customer concentration risk is the primary commercial risk: Walmart represents a disproportionate share of US
      commercial revenue per WSJ. Loss or non-renewal of the Walmart contract would materially impair US revenue
      trajectory. Zipline is actively diversifying (Bloomberg, 2025) but the pace of alternative customer revenue
      ramping is not publicly disclosed.


      Financially, Zipline does not disclose revenue, margin, burn rate, or runway — creating a fundamental opacity in
      financial risk assessment. The company's hardware-centric model requires continuous capital investment for drone
      manufacturing, hub infrastructure, and fleet deployment. WSJ documents that the path to profitability in US
      consumer delivery has not been demonstrated, and PitchBook implies significant ongoing capital requirements.


      Key-person risk centers on CEO Keller Rinaudo Cliffton, a co-founder who is central to fundraising, government
      relationships, and public narrative. TechCrunch confirms talent competition for drone engineers from Amazon Prime
      Air, Wing, Waymo, and Tesla. Both the CEO dependency and engineering talent market represent people risks
      consistent with a rapidly scaling hardware startup.
    tableRefs:
      - TR003
    figureRefs:
      - FR003
  - id: SR-S04
    title: Risk Mitigations and Kill Criteria
    body: >
      Zipline's principal mitigations are: (1) mature Safety Management System with redundant C2 links, emergency
      parachute, and lost-link procedures; (2) 8+ years of operational track record as demonstrated safety evidence; (3)
      active customer diversification away from Walmart; (4) Part 135 compliance infrastructure with dedicated aviation
      regulatory expertise; and (5) early engagement with FAA on the BVLOS rulemaking process.


      Thesis-break conditions that would warrant re-evaluation include: a first significant US consumer drone injury
      triggering FAA operational suspension; successful municipal noise ordinances fragmenting delivery coverage areas;
      FAA BVLOS final rule imposing retroactive hardware requirements that require major fleet upgrades; loss of the
      Walmart contract without replacement revenue; or inability to raise follow-on capital at acceptable terms.


      Key monitoring indicators: FAA rulemaking publication timeline and compliance window; community opposition
      escalation in active delivery zones; Zipline's public disclosures on customer diversification progress; incident
      reporting compliance signals from FAA enforcement actions; and any Wing/Amazon patent litigation developments that
      could constrain Zipline's technical approach.
    tableRefs:
      - TR004
