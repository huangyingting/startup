sections:
  - id: SV-S01
    title: Valuation Context and Financing History
    body: >
      Zipline raised its most recent disclosed round — a $330M Series F — in May 2023 at an implied $4.2B post-money
      valuation, confirmed by TechCrunch, Business Wire, and SEC Form D regulatory filing. Total financing has exceeded
      $1.2B across Seed through Series F, with investors including Andreessen Horowitz, Sequoia Capital, Dragoneer
      Investment Group, Google Ventures, and Tiger Global. The investor quality is top-tier, providing governance and
      strategic support quality signal consistent with the premium valuation.


      The financing context shows a company that has consistently raised at increasing valuations from sub-$100M (Series
      B) to $4.2B (Series F) — a 40x+ progression over 6-7 years. This trajectory reflects the company's operational
      maturation from Africa healthcare operations to US consumer delivery commercialization. The Series F was set in
      May 2023, during the early phase of recovery from the 2021-2022 growth-stage valuation compression, meaning the
      price may or may not reflect the current clearing price for comparable assets.
    tableRefs:
      - TV001
      - TV005
    figureRefs:
      - FV001
  - id: SV-S02
    title: Comparable Valuation Analysis
    body: >
      Direct drone delivery comparables trade at dramatic discounts to Zipline's $4.2B: Manna Aero (~$45M), Matternet
      (~$50M), DroneUp (~$40M), and Swoop Aero are all valued at 8-80x below Zipline — reflecting Zipline's dramatically
      larger delivery scale (1.3M+ deliveries vs. peers' hundreds of thousands).


      Public market comparables for autonomous aviation hardware include Joby Aviation ($6-8B market cap, pre-revenue
      eVTOL), Archer Aviation (~$1.5-2.5B, pre-revenue), and Symbotic ($8-12B, warehouse automation with Walmart
      anchor). Joby's $6-8B for a pre-revenue eVTOL platform suggests the public market places meaningful optionality
      value on leading autonomous aviation companies — with Zipline's $4.2B looking reasonable by that comparison,
      though Zipline operates in a different segment with different unit economics.


      PitchBook data shows 15-30x projected revenue multiples for leading drone delivery companies in 2023 venture
      rounds — consistent with Zipline's $4.2B if 2025-2027 projected revenue reaches $140-280M. Whether Zipline can
      achieve this range depends on US consumer delivery economics that have not yet been demonstrated.
    tableRefs:
      - TV002
      - TV006
    figureRefs:
      - FV002
  - id: SV-S03
    title: Bull, Base, and Bear Cases
    body: >
      The bull case (probability 25%): Zipline captures 0.5-1.5% of US last-mile delivery by 2030, generating
      $750M-2.25B in revenue at 20-30% gross margin. A 10-15x revenue exit multiple implies $7.5B-34B valuation,
      yielding 2-8x return from Series F. This scenario requires favorable BVLOS rulemaking, Walmart partnership
      expansion, and demonstration of positive unit economics by 2026.


      The base case (probability 40%): Zipline achieves positive unit economics in select markets by 2027, grows to
      $300-500M revenue by 2030 at 15-20% gross margin, exits at 8-12x revenue ($2.4B-6B). Series F return ranges from
      0.6-1.4x, with risk of dilution from 1-2 intervening rounds. This scenario requires some US regulatory success and
      customer diversification beyond Walmart.


      The bear case (probability 35%): Regulatory friction, negative unit economics in US consumer delivery, or Walmart
      contract loss causes Zipline to pivot to a narrower B2G model. Revenue is capped at $100-200M by 2030, exit
      multiple compresses to 4-6x ($400M-1.2B), resulting in a loss for Series F investors after preference overhang.
    tableRefs:
      - TV003
    figureRefs:
      - FV003
  - id: SV-S04
    title: Recommendation, Diligence Asks, and Kill Criteria
    body: >
      Recommendation: Conditional positive for investors with a 5-7 year horizon, deep regulatory risk tolerance, and
      the ability to participate in follow-on rounds. The case for investment rests on Zipline's uniquely demonstrated
      operational track record (1.3M deliveries, 8 years, zero injuries), defensible regulatory position (Part 135,
      BVLOS authorizations), and the optionality on the largest last-mile delivery TAM in history.


      Valuation discipline: The $4.2B entry price is aggressive without positive US unit economics. A 20-30% discount to
      last round ($2.9-3.4B) would be required in a follow-on to achieve attractive risk-adjusted returns given
      regulatory, competitive, and capital intensity risks. The preference overhang from $1.2B+ in prior preferred is a
      material dilution factor.


      Final diligence asks: (1) Audited or management-confirmed revenue for 2023 and 2024; (2) per-delivery contribution
      margin by segment; (3) BVLOS compliance roadmap for the anticipated FAA final rule; (4) customer concentration as
      percentage of revenue; (5) board composition and succession planning for CEO.


      Kill criteria: US consumer drone injury event triggering FAA operational hold; FAA BVLOS final rule imposing
      retroactive fleet upgrades; Walmart contract non-renewal without replacement; inability to raise follow-on at
      acceptable terms; or Wing/Amazon making drone delivery economics unworkable through capital-intensive predatory
      pricing.
    tableRefs:
      - TV004
    figureRefs:
      - FV004
