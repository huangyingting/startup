chapter:
  order: 8
  number: 8
  title: Valuation
  letter: V
  summary: |
    Zipline raised a $330M Series F in 2023 at an implied $4.2B post-money valuation — marking it as
    a confirmed unicorn with one of the highest valuations in the commercial drone delivery sector. The
    valuation reflects a growth-stage premium on unproven US consumer delivery economics, with no publicly
    disclosed revenue, margin, or path-to-profitability metrics. The bull case rests on Zipline capturing a
    meaningful share of the US last-mile delivery market ($150B+ TAM) through its Walmart partnership and
    Platform 2 consumer expansion. The bear case centers on regulatory friction, capital intensity, and the
    structural difficulty of reaching profitability in asset-heavy drone delivery. At $4.2B, Zipline
    trades at a significant premium to public hardware-delivery comparables on any revenue metric.
    A conditional positive recommendation is warranted only for investors with multi-year horizon, high
    regulatory risk tolerance, and access to the follow-on round necessary to fund the scaling phase.
