callouts:
  - id: CV-CALL-01
    type: finding
    title: Conditional Positive — Entry Discipline Required
    body: >-
      Zipline has the most compelling operational track record in commercial drone delivery and a defensible US market
      position. However, the $4.2B Series F valuation prices in US consumer delivery unit economics that have not yet
      been demonstrated. A conditional positive recommendation requires: (1) 20-30% entry discount to last round; (2)
      verified positive unit economics in at least 2 US markets; (3) cap table and preference stack transparency.
    severity: positive
    claimRefs:
      - CV035
      - CV037
    sourceRefs:
      - SV001
      - SV016
  - id: CV-CALL-02
    type: risk
    title: Wing/Alphabet — Structural Competitive Risk That Cannot Be Valued
    body: >-
      Wing (Alphabet) does not need to raise external capital and operates indefinitely at negative unit economics if
      Alphabet chooses to support it. This creates a structural competitor that Zipline cannot outspend. Investors must
      accept this asymmetric competitive risk as a permanent feature of the drone delivery market.
    severity: major
    claimRefs:
      - CV012
      - CV029
    sourceRefs:
