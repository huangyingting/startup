    topic: Revenue and financial performance entirely non-public
    missingEvidence: >-
      Zipline has not disclosed revenue, gross margin, burn rate, or unit economics. The $4.2B valuation cannot be
      verified against fundamental financial metrics.
    whyItMatters: >-
      Without financials, the investment case rests entirely on operational signals and investor brand rather than
      verifiable unit economics.
    diligencePath: Request audited FY2022–FY2024 financials including DC-level P&L under NDA.
