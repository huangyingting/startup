companyProfile:
  summary: Zipline International Inc. is the world's largest commercial drone delivery operator, having executed over 1.3 million autonomous deliveries across 7 countries. Founded in 2014 by CEO Keller Rinaudo Cliffton, Zipline pioneered medical drone logistics in Rwanda in 2016 and has since expanded to a dual-model business — long-range medical/government delivery in Africa and consumer last-mile delivery in the US via Platform 2. The $4.2B Series F valuation (May 2023) reflects investor conviction in the US consumer delivery opportunity, but positive unit economics in that segment have not yet been demonstrated publicly.
  foundedDate: "2014-01-01"
  founders:
    - name: Keller Rinaudo Cliffton
      role: CEO and co-founder
      background: Co-founder of Romotive robotics company; Brown University graduate; central figure in Zipline's government partnerships, fundraising, and strategic direction since founding.
      claimRefs: [CO005]
    - name: Will Hetzler
      role: CTO and co-founder
      background: Co-founder and chief technology officer; leads aircraft and systems engineering for both Platform 1 (African operations) and Platform 2 (US consumer delivery).
      claimRefs: [CO005]
  foundingLocation: South San Francisco, California
  headquarters: South San Francisco, California
  productSummary: "Zipline operates two commercial platforms: Platform 1 is a fixed-wing autonomous aircraft for long-range (50-80km) medical delivery to rural healthcare facilities. Platform 2 (P2) is a fixed-wing VTOL hybrid with a tethered Droid delivery mechanism enabling doorstep delivery within 10-mile radius at 70mph+ speeds with 30-minute delivery windows. The company holds FAA Part 135 Air Carrier certification and site-specific BVLOS waivers for US commercial operations."
  customerFocus: "Government healthcare systems in Africa (Rwanda, Ghana, Nigeria, Ivory Coast) and enterprise commercial customers in the US (Walmart, Intermountain Healthcare, Sweetgreen) and Japan. End consumers receive delivery through enterprise partner apps rather than directly from Zipline."
  businessModel: "B2B enterprise subscription model: government healthcare contracts in Africa (multi-year, country-scale programs) and commercial enterprise partnerships in the US (3-5 year contracts with retail, healthcare, and food service operators). End-consumer delivery is priced through the enterprise partner relationship."
  stage: late-stage private
  fundingStatus: "$1.2B+ total raised across Seed through Series F. Series F: $330M at $4.2B post-money valuation (May 2023) with participation from Andreessen Horowitz, Sequoia Capital, Dragoneer, Google Ventures, and Tiger Global."
  claimRefs: [CO001, CO002, CO003, CO005]
