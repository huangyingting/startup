            title: 所有留存、流失、NRR / GRR 和客户集中度指标均为私有——这是主要投资判断障碍
            body: >
              截至 2026 年 5 月，ShipBob 没有公开披露 NRR、GRR、流失率、合同期限、续约率、客户集中度或分层收入。这些是私募融资或收购的主要投资判断障碍，必须在 NDA
              下取得。公开代理（评论渠道评分、案例队列、Shopify App Store 评论）方向一致，但不能替代这些指标。
            calloutType: risk
