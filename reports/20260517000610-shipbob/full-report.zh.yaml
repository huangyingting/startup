  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >
              相较 ShipBob 的运营足迹，2026 年 5 月可见的监管与法律表面偏轻。CourtListener
              搜索（https://www.courtlistener.com/?q=shipbob+inc&type=r 以及更宽的 ?q=shipbob 查询）截至 2026 年 5 月访问日，没有返回将 ShipBob
              Inc 列为主要当事人的活跃联邦案卷。美国司法部反垄断局运营页面没有列出 ShipBob 相关反垄断程序；Consumer Product Safety Commission Recalls
              登记册也没有出现归因于 ShipBob 的召回活动。Federal Register（unblock.federalregister.gov）和 USPTO
              商标搜索都返回与私营商业实体相符的普通行政记录——ShipBob Inc 名下有商标申请，但看不到有实质影响的异议或撤销。SEC EDGAR 全文和公司名搜索（efts.sec.gov +
              cgi-bin/browse-edgar 端点）返回了与历史 Series A–E 融资事件相关的 ShipBob Form D 文件，但没有注册声明，也没有 2022 年后的融资事件，这与 2022 年
              Series E 是最后一轮公开披露的新股融资一致。Bureau of Labor Statistics 的 NAICS 493 行业登记（Warehousing and Storage;
              bls.gov/iag/tgs/iag493.htm）、FMCSA SAFER（safer.fmcsa.dot.gov/CompanySnapshot.aspx）和 OSHA
              机构搜索（osha.gov/ords/imis/establishment.html）端点呈现的是行业基线劳工、机动车承运人与工作场所安全登记，但公开搜索看不到 ShipBob
              特定执法条目。整体读数是：公司处在受监管行业，但当前公开表面安静——没有公开诉讼、没有联邦执法行动、没有 SEC 注册风险。主要剩余尽调问题包括：（a）州层面商业诉讼（配送丢失索赔、雇佣索赔，以及考虑
              Moreno Valley 和 Ontario FC 足迹带来的 California 工资工时风险），（b）是否向州总检察长提交过隐私或数据泄露通知文件，及（c）劳动密集型 FC 运营是否有非公开 DOL /
              OSHA 发现；OSHA 公共 IMIS 接口需要按机构层级查询，本次 2026 年 5 月抓取没有穷尽枚举。
