      - number: '3.4'
        title: 图表要点
        blocks:
          - type: callout
            title: DTC 取向 3PL 中最大的独立多区域 FC 网络
            body: >
              ShipBob 在美国、英国、欧盟、澳大利亚和加拿大运营 40+ 个自有及合作伙伴履约中心，是独立科技型 DTC 3PL
              中地理覆盖最广的网络。该网络复制成本高，支撑美国两日达覆盖和国际扩张；ShipMonk、Stord 和 Red Stag 分别服务的商家类型，只能部分覆盖这一需求。
            calloutType: strength
            claimRefs:
              - CP002
              - CP015
          - type: callout
            title: Shopify Fulfillment Network 打包风险是最尖锐的竞争威胁
            body: >
              Shopify 2023 年将 SFN 资产转给 Flexport，加上 Flexport 收购 Deliverr，使一家与 Shopify 结盟的履约运营商进入 Shopify 商家入驻流程。如果
              Shopify 把 SFN/Flexport 打包进核心商家计划，或在结账配置中优先展示它，ShipBob 成本最低的获客渠道——Shopify App
              Store——可能快速被侵蚀。尽调应跟踪会影响履约应用可发现性的 Shopify 产品变化，以及 SFN 商家数量。
            calloutType: risk
            claimRefs:
