chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与概览
        blocks:
          - type: paragraph
            body: >
              ShipBob, Inc. 是一家营利性私营科技公司，总部位于 120 N Racine Ave, Suite 100, Chicago, IL 60607。公司成立于 2014
              年，提供端到端电商履约服务——仓储、拣货打包、发货和退货处理——并由自研软件平台支撑。公司的核心产品是一张覆盖美国全国并延伸海外的履约中心网络，与商家的电商店铺（Shopify、Amazon、WooCommerce、TikTok
              Shop、eBay 以及其他 250+ 平台）集成，用来自动化订单路由、库存优化和最后一公里配送。ShipBob 的价值主张是：商家无需自建或运营仓库，也能在美国本土实现任意地点两日达。作为技术前置的
              3PL（第三方物流服务商），ShipBob 与传统 3PL 的差异在于面向商家的 SaaS 仪表盘、开放 API 生态和实时分析。公司瞄准每月约 400–50,000 单的 DTC 品牌，企业和 B2B
              项目则把覆盖进一步拉宽。ShipBob 是特拉华 C 类公司。运营总部和主要技术团队在 Chicago，同时在全球分布工程和运营人员。
