  - id: TV004
    title: 可比估值表
    columns:
      - 可比对象
      - 类型
      - 指标 / 倍数
      - 状态
      - 对 ShipBob 的参照价值
      - 局限
    enumerationScope:
      coverage: exhaustive
      basis: >
        Comparable set was built from the public 3PL / shipping-software peer universe (NYSE/NASDAQ-listed asset-light
        logistics names, the largest 2021–2023 take-private precedent, and the most-cited venture-tier peers) and
        verified by cross-checking Macrotrends, StockAnalysis, Wikipedia, and CB Insights to ensure no peer with > $1B
        trailing revenue or > $1B last-mark was omitted.
      scope: >
        Public-comp set restricted to asset-light 3PL / shipping-software peers with disclosed 2024–2026 trading data
        plus one strategic take-private precedent and one venture-tier peer.
      excludedItems: >
        Excludes asset-heavy ocean / air freight carriers (Maersk, DSV, Kuehne+Nagel) where comparability is limited by
        capital intensity.
    rows:
      - - 'GXO Logistics（NYSE: GXO）'
        - 上市可比公司
        - EV/Revenue 约 0.4–0.8x（TTM）
        - 上市公司，收入基数 $10B+
        - 最干净的纯合同物流可比对象
        - 规模更大；合同物流并非纯电商 3PL
      - - 'XPO Logistics（NYSE: XPO）'
        - 上市可比公司
        - EV/Revenue 约 0.5–1.0x（TTM）
        - 上市公司，收入基数 $8B+
        - 规模化物流倍数锚点
        - 以 LTL 货运为主；运输模式组合不同
      - - Stamps.com（Thoma Bravo 私有化案例）
        - 私有化先例
        - 约 6x TTM 收入、作价 $6.6B
        - 2021 年 10 月完成私有化
        - 发货软件估值天花板；财务赞助方主导先例
        - 2021 年交易；周期峰值倍数
      - - Flexport（私人公司）
        - 创投同业
        - Wikipedia 显示上一轮估值约 $8B（2022 年）
        - 2022 年后被下调估值
        - 创投级物流平台同业
        - 商业模式不同（数字货代）
      - - ShipMonk（私人公司）
        - 创投同业
        - CB Insights 显示上一披露估值约 $1B（2021 年）
        - 2021 年后无公开刷新
        - 最接近的直接电商 3PL 创投同业
        - 私人公司可比；无公开交易数据
    notes: |
      2026 年 5 月投资测算重新搭建可比组；ShipBob 2022 年估值标记相对上市可比中点溢价 4–8x，相对创投同业中位数溢价 1.0–1.5x。
