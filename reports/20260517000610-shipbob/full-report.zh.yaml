      - number: '5.4'
        title: 图表要点
        blocks:
          - type: callout
            title: WMS 双重部署（内部运营 + 商家授权）在品类中少见
            body: >
              ShipBob 在 40+ 个自有及合作伙伴 FC 中运行自研 WMS，并将同一软件以 ShipBob WMS / Merchant Plus 名义授权给商家。双重部署很少见——ShipMonk、Stord 和
              Red Stag 并不把自有 WMS 产品化为商家侧授权，Extensiv / ShipHero 则是纯软件，没有 ShipBob 自有网络运营经验。双重部署创造了软件收入杠杆，也让 WMS
              作为产品而不只是内部工具，拥有可信度护城河。
