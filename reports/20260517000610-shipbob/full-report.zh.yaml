      - number: '4.3'
        title: 公开牵引力、资本充足性与融资路径
        blocks:
          - type: paragraph
            body: >
              公开牵引力信号支持累计订单 >250M（ShipBob 营销资料）、美国、英国、欧盟、澳大利亚和加拿大 40+ 个履约中心，以及第三方跟踪方（Growjo、LinkedIn）报告的 1,000+
              员工数。ShipBob 未披露收入、ARR、GMV、按层级商家数、FC 利用率或活跃商家流失——这些全部是私有信息。资本充足性取决于 $200M E 轮（2022 年 1 月，投后
              $1.075B；公司概况章节已列出逐轮时间线，此处不重复这些 id）尚未分配的余额，并由任何后续债务工具补充（资产抵押贷款方、设备租赁额度或发起方支持的风险债）。2022–2024 年，更广泛的物流科技群体经历了
              Deliverr / SFN 估值下调、Convoy 破产，以及 Stord 依据 Carta 隐含估值的二级市场折价 30–60%。考虑 ShipBob 上一轮定价在 2022
              年且资本开支偏重资产，最可能的下一次融资事件是：（a）估值持平至下调的新股融资加老股资本重组；（b）发起方牵头、债务融资的跑道延长；或（c）出售给运输既有企业（Ryder、Maersk、FedEx）或平台（Shopify、Amazon——即便存在反垄断担忧）。应跟踪两个监管锚点：ShipBob
