  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品模块与运营界面
        blocks:
          - type: paragraph
            body: >
              ShipBob 的产品组合分为四个界面。（1）商家仪表盘——一个 Web 应用，为跨一个或多个 ShipBob FC
              运营的商家提供库存可见性、订单管理、退货流程、账单对账和分析。它是商家运营人员的主要日活界面，也是所有多 DC 分配、异常管理和补货流程发生的渠道。（2）自研仓库管理系统（WMS），在 FC
              内通过工业级手持终端和操作员工作站运行收货、上架、拣货、打包、发货、退货和循环盘点流程；同一套 WMS 现在以 ShipBob WMS / Merchant Plus 形式对外授权，供运营自有仓库、想用
              ShipBob 软件但不购买履约服务的品牌使用。（3）开发者界面——公开 REST API、webhooks 和 developer.shipbob.com 上文档化的 SDK，外加跨
              Shopify、Amazon、Walmart、TikTok Shop、BigCommerce、WooCommerce、Squarespace、EDI 平台和 ERP 的 250+
              个预构建集成。（4）增值模块——B2B / EDI / 零售路由履约、货运（LTL / FTL）、退货（Happy Returns 和自有退货）、组合装配 / 组装、ShipBob Promise（AI
              送达日期引擎；Spring 2026 GA）和 Express 两日达。这些模块要么作为按单定价的加价项变现，要么作为独立 SaaS /
              按次收费线变现。把各模块串起来的资产，是统一的库存和订单账本；品牌无需为每个仓库管理单独 WMS 实例，就能在任意 FC 和销售渠道组合上补货、分配、发货和报表。
