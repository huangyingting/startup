        - from: evaluation
          to: onboarding
          label: 签署合同
        - from: onboarding
          to: retention
          label: 订单流转
        - from: retention
          to: expansion
          label: 增长触发更多产品
        - from: retention
          to: churn
          label: 负面体验 / 更好替代方案
