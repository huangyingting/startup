  - id: FM004
    title: ShipBob 的 DTC 品牌采用漏斗
    type: flow
    summary: |
      DTC 品牌如何发现、评估、上线并扩大使用 ShipBob，覆盖从发现到多区域履约的完整客户生命周期。
    data:
      nodes:
        - id: discovery
          label: 发现
          detail: Shopify App Store、DTC 社群、Google 搜索、同行推荐
        - id: evaluation
          label: 评估
          detail: 报价请求、定价计算器、销售电话、集成审查
        - id: onboarding
          label: 上线
          detail: 库存运至 ShipBob FC；技术集成设置；首批订单处理
        - id: retention
          label: 活跃客户
          detail: 持续履约；使用仪表盘；按月计费
        - id: expansion
          label: 扩张
          detail: 增加 FC（多节点）、B2B 履约、WMS 授权、国际业务
        - id: churn
          label: 流失风险
          detail: G2 投诉率高；账单争议；订单准确率问题
      edges:
        - from: discovery
          to: evaluation
