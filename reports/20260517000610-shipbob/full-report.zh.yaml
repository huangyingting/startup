      - number: '1.5'
        title: 产品与商业模式
        blocks:
          - type: paragraph
            body: >
              ShipBob 的商业模式把交易型物流收入与经常性 SaaS 元素结合起来。收入来自按单履约费、按托盘或料箱收取的月度仓储费、入库库存收货费，以及增值服务（定制包装、组合装配、B2B
              履约、国际运输、当日达）。定价透明且按量计费：收货约 $35/hour，仓储约 $40/pallet/month，拣货打包从每件 $0.30 加材料费起。公司最近新增 WMS 即服务产品，让商家在自有设施使用
              ShipBob 自研仓库管理软件，形成一条不依赖履约量的 SaaS 收入流。ShipBob 与 Shopify、Amazon、TikTok、BigCommerce 等 250+
              平台的集成伙伴关系构成分销护城河，尤其让 Shopify 商家把 ShipBob 视作阻力最小的 3PL 选择。公司也从零售合规项目（面向 Target、Walmart 等基于 EDI 的 B2B
              履约）和国际运输附加费中获得收入。ShipBob 未披露单位经济性，但模式本身把高量、低毛利履约与较高毛利的 SaaS 和增值服务组合在一起。
            claimRefs:
