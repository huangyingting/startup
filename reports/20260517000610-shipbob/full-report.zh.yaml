  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              ShipBob
              处在两个大型且增长的市场交汇处：（1）面向电商商家的第三方物流（3PL）服务；（2）物流科技软件（WMS、订单管理、承运商集成）。最宽口径的总可用市场（TAM）涵盖全球所有电商履约服务——仓储、拣货打包、最后一公里、退货——估计全球为
              $300–450B。可服务市场（SAM）收窄到美国和国际 DTC/SMB 电商品牌把履约外包给科技型 3PL，估计为 $50–100B。ShipBob 的可获取市场（SOM）是其中 ShipBob
              凭当前网络覆盖和商家画像可现实拿下的部分；基于商家数和平均每商家收入假设，估计为 $5–15B。美国人口普查局报告称，2025 年美国电商总销售额为 $1.23T，同比增长 5.4%。2025
              年电商占美国零售总额 16.4%，高于 2024 年的 16.1%。这种长期渗透率提升是履约服务市场的主要结构性顺风。ShipBob 的核心买家——每月发货 400–50,000 单的独立 DTC
              品牌——规模大、分散，且 Amazon（太贵 / 太复杂）和传统 3PL（太手工、软件差）都服务不足。ShipBob 的技术优先打法让它在这一群体中像履约版 Shopify。
