      - number: '1.3'
        title: 融资与资本结构
        blocks:
          - type: paragraph
            body: >
              ShipBob 已通过五轮融资累计获得约 $390M 风险投资。最近一轮是 2022 年 1 月 $200M E 轮，由 Bain Capital Ventures 领投，估值约 $1.075B，使
              ShipBob 成为独角兽。此前轮次包括 2021 年 1 月 $68M D 轮、2019 年 $40M C 轮、2018 年 $17.5M B 轮和 2017 年 $8.25M A 轮。知名投资方包括
              SoftBank Vision Fund 2、Bain Capital Ventures、Hyde Park Venture Partners 和 Menlo Ventures。E
              轮资金指定用于国际扩张、产品投入和履约网络建设。作为 E 轮后的后期私营公司，ShipBob 未公开推进 IPO，也未披露 SPAC 讨论。收入、EBITDA
              和盈利路径完全不公开。公司的资本结构包含所有轮次的股权，并带有标准清算优先权。公开资料未披露可转债或结构化信贷额度，不过这类工具在此阶段的重资本开支运营公司中很常见。按累计融资额计，ShipBob
              位居全球资本化程度最高的物流科技公司前 10。
