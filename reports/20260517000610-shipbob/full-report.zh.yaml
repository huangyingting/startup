      - number: '2.5'
        title: 图表要点
        blocks:
          - type: callout
            title: 长期 DTC 顺风贴合 ShipBob 核心细分
            body: |
              2025 年美国电商占零售 16.4%，并继续扩张。DTC 品牌——ShipBob 的主要客户——属于增长最快的电商细分之一。长期结构性迁移带来自然需求，ShipBob 无需改变客户原型。
            calloutType: strength
            claimRefs:
              - CM008
              - CM009
          - type: callout
            title: Shopify Fulfillment Network 带来生存级分销风险
            body: >
              Shopify 收购 Deliverr（现为 Flexport 的一部分）并发展自有 Shopify Fulfillment Network（SFN），带来一个风险：Shopify 可能把履约原生打包进平台，让
              ShipBob 对其核心 SMB DTC 客户变成不必要的中介。
            calloutType: risk
            claimRefs:
              - CM016
              - CM017
          - type: callout
            title: 分析机构的市场规模口径分歧很大
            body: >
              Grand View Research、Mordor Intelligence 和 IBISWorld 发布的电商履约 TAM/SAM 估计彼此冲突，从 $96B 到 $450B
              不等。这些差异反映的是定义分歧，而不是彼此独立的市场测量。投资人应把所有分析机构市场规模数字视为方向性估计，而非精确事实。
