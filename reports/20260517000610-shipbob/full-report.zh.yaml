      - number: '5.3'
        title: 路线图、质量信号与技术差异化
        blocks:
          - type: paragraph
            body: >
              ShipBob 公布的 2026 年路线图以 ShipBob Promise（结账时 AI 送达日期预测）、扩展 WMS / Merchant Plus 能力（组合装配流程、夹层和多 FC
              支持、承运商比价）、TikTok Shop 和 BigCommerce 高级集成，以及在澳大利亚、加拿大和欧盟继续扩张国际 FC 为中心。Spring 2026
              发布说明（shipbob.com/blog/spring-26-release/）记录了新的分析仪表盘、改进后的账单对账视图和 AI 辅助库存补货建议。G2（约 4.1 / 5，约 330
              条评论）、Capterra（约 4.2 / 5，约 140 条评论）、Software Advice 和 GetApp 的独立客户体验评测收敛出一致模式：集成广度、入驻容易度和仪表盘 UX
              是优势；账单对账透明度和旺季订单准确率是主要产品改进机会。Reddit 和 BBB 投诉集群强化了这一模式，尤其针对旺季小体量商家。ShipBob 相对于主要替代方案的技术差异化可以概括为：（a）公开文档化
              API 加 250+ 个集成的组合，比任何单一直接 DTC 3PL 同行更广，且大致与 Extensiv（纯软件）持平；（b）WMS 的双重部署——内部运营加商家可授权使用——在品类中少见；（c）Shopify
              应用商店分销位置（4.7/5，300+ 评论）是品类最强，并直接转化为更低 CAC；（d）AI
              交付承诺引擎是真实产品投入，只要在规模上兑现准确性，就会成为商家可衡量的消费者转化杠杆。主要产品缺口是：（i）账单呈现不透明；（ii）商家分布尾部在旺季运营准确性不足；（iii）截至本次抓取，AI
              送达日期命中率和 Promise 采用指标公开证据有限。
