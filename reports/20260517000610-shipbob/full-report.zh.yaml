      - number: '7.2'
        title: 运营、技术与安全风险
        blocks:
          - type: paragraph
            body: >
              运营风险是 ShipBob 的主要投资判断关注点，也是第 6
              章反向证据聚类浮出的最大单一驱动。风险表面有四层。第一，旺季产能与订单准确率风险：独立评论渠道（G2、Capterra、Trustpilot、BBB）和 Reddit 线程在 Q4 / 旺季订单准确率与 SLA
              违约报告上持续聚集，尤其针对低体量 SMB 商家。ShipBob 没有公开披露按 FC 划分的订单准确率、准时发货率、错拣率或旺季相对基线的 SLA 退化。第二，状态 / 可用性风险：公司在
              status.shipbob.com 维护一个公开状态页面，这是主要运营透明度资料，但页面不发布历史 SLA 指标或事故复盘日志。第三，安全与数据风险：ShipBob 处理商家
              PII、终端客户地址和库存财务数据，覆盖数百个商家 Shopify、Amazon 和 TikTok Shop 集成，还在第三方仓库运营 Merchant Plus
              WMS，攻击面明显扩大。trust.shipbob.com 记录了 SOC 2 / ISO 27001 级别姿态，但州总检察长数据泄露数据库里看不到公开泄露通知条目，2026 年也没有针对 ShipBob
              平台的公开 CVE 分配。第四，仓库安全与劳工风险：FC 运营使 ShipBob 暴露于仓储运营商常见的 OSHA 可记录伤害风险（BLS NAICS 493
              基线事故率显著高于全行业平均），但公开看不到机构层级的 ShipBob OSHA 处罚条目。整体运营图景是有意义、且大多未披露的剩余风险：大多数运营 SLA、安全和安全生产证据都需要 NDA 级披露，2026
              年春季 Promise / WMS GA 周期又是正在发生的执行事件，会在投资判断窗口内放大运营风险。这四层运营风险在表 TR005 中都绑定了可衡量的否决标准，投资者不用等 ShipBob
              单方面发布运营数据，也能把不透明风险转化为可追踪的投资逻辑破裂触发器。
