      - number: '3.2'
        title: 能力与定价对比
        blocks:
          - type: paragraph
            body: >
              在能力广度上，ShipBob、ShipMonk 和 Stord 同属全栈科技型 3PL 集群：都有自研 WMS、美国加国际覆盖（ShipBob 和 ShipMonk
              在独立公司中拥有最广的国际网络）、Shopify 认证应用，并明确垂直定位 DTC。Amazon MCF 拥有最深的美国网络，对存放在 FBA 的库存给出最低单件价格，但缺少商家侧品牌化包装、随箱物定制和 DTC
              级软件；商家需要品牌化开箱体验、Amazon Prime 网络之外的两日达 SLA，以及跨渠道单一分析面板时，会明确选择 ShipBob 而不是 MCF。Red Stag 是高价值、重货或易碎
              SKU（体育用品、电子产品）的差异化专家，并发布零损耗 SLA；它不在服装或消费品上正面竞争。Extensiv 和 ShipHero 是软件优先玩家：Extensiv 向商家和 3PL 销售
              WMS、订单管理和库存规划（这使 ShipBob WMS 在商家 WMS 授权上成为直接竞争者），ShipHero 则运营有限的自有履约，并向其他 3PL 提供 SaaS
              WMS。定价上，这一细分的每个竞争者都采用类似混合模式——月度最低消费、按箱收货费、按立方英尺或托盘 / 料箱收仓储费、每单拣货打包费加额外件费用，以及以协商折扣转嫁的承运商费率。ShipBob
              不发布标准费率卡，而是要求报价；ShipMonk 发布订单最低量和基础区间；Amazon MCF 发布单件费率表（2026 年标准尺寸按重量为 $3.78–$10.61）；Red Stag
              发布含保险的固定每单价格。独立评测一致指出，实际价格随组合而变，表面最简单的费率卡在加上附加费后很少是最便宜的。
