  - id: FI001
    title: 收入模型桥：从商家活动到毛利
    type: flow
    summary: |
      商家订单活动如何转化为 ShipBob 交易、增值服务和软件业务线的收入与毛利，并扣除主要成本项。
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
    data:
      nodes:
        - id: merchant
          label: 商家上线
          detail: Shopify App Store、付费搜索、外呼；SMB 和中端市场
          tone: positive
        - id: inventory
          label: 入库收货
          detail: 收取入库费；仓储计费开始计时
          tone: neutral
        - id: order
          label: 消费者下单
          detail: 触发拣货打包 + 承运商面单 + 品牌化包装
          tone: neutral
        - id: fulfillment-revenue
          label: 履约 + 承运商收入
          detail: 拣货 + 打包费 + 承运商转嫁收费（可能加价）+ 仓储消耗
          tone: positive
        - id: vas-revenue
          label: 增值服务收入
          detail: 组套、货运、B2B、退货、专项项目
          tone: positive
        - id: wms-revenue
          label: WMS / Merchant Plus 收入
          detail: 面向自营仓商家的 SaaS 许可
          tone: positive
        - id: cogs
          label: 扣除 COGS
          detail: 仓库人工 + FC 租赁 + 耗材 + 退货 + 承运商转嫁成本
          tone: negative
        - id: gp
          label: 毛利
          detail: 未披露；资产重运营使其结构上低于纯软件
          tone: neutral
      edges:
        - from: merchant
          to: inventory
          label: 将库存发往 FC
        - from: inventory
          to: order
          label: 消费者需求
        - from: order
          to: fulfillment-revenue
          label: 拣货 + 发货
        - from: order
          to: vas-revenue
          label: 组套 / 货运 / 退货
        - from: merchant
          to: wms-revenue
          label: 商家授权使用 WMS
        - from: fulfillment-revenue
          to: cogs
          label: 扣除人工 + 承运商成本
        - from: vas-revenue
          to: cogs
          label: 扣除项目成本
        - from: wms-revenue
          to: cogs
          label: 扣除托管 + 支持
        - from: cogs
          to: gp
          label: 毛利（未公开）
  - id: FI002
    title: 单位经济桥：从价格到贡献利润率的定性路径
    type: flow
    summary: |
      以 ShipBob 一笔代表性订单为例的定性单位经济桥；每个数值节点都标为尽调追问，因为 ShipBob 未披露底层输入。
    approximationNotes: |
      所有节点值均为定性；ShipBob 未披露任何单位经济数据。因此该图是尽调目标图，而非定量桥。
    claimRefs:
      - CI007
      - CI008
      - CI012
      - CI021
    data:
      nodes:
        - id: ticket
          label: 每单向客户收费
          detail: 拣货 + 打包 + 仓储消耗 + 承运商邮费 + 附加费
          tone: neutral
        - id: carrier
          label: 承运商转嫁成本
          detail: ShipBob 谈定的 UPS / FedEx / USPS / DHL 费率
          tone: negative
        - id: labor
          label: 仓库人工 + 耗材
          detail: 拣货 + 打包 + 包装材料 + 填充物
          tone: negative
        - id: facility
          label: 分摊设施成本
          detail: FC 租赁 + 水电 + MHE 折旧 + 保险
          tone: negative
        - id: returns
          label: 退货 + 调整准备金
          detail: 退货处理 + 账单调整 + 服务水平赔付
          tone: negative
        - id: contribution
          label: 每单贡献利润率（未公开）
          detail: 票价 − 承运商 − 人工 − 设施 − 退货；ShipBob 未披露
          tone: warning
        - id: scale
          label: 规模化带来经营杠杆的路径
          detail: 多 FC 利用率 + WMS 附着 + AI 配送准确率降低每单成本
          tone: positive
      edges:
        - from: ticket
          to: carrier
          label: 扣除承运商转嫁
        - from: carrier
          to: labor
          label: 扣除人工
        - from: labor
          to: facility
          label: 扣除分摊设施
        - from: facility
          to: returns
          label: 扣除退货准备金
        - from: returns
          to: contribution
          label: '= 贡献利润率（未公开）'
        - from: contribution
          to: scale
          label: 随规模 + 利用率改善
