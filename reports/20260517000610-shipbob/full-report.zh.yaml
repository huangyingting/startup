      - number: '1.4'
        title: 里程碑与规模
        blocks:
          - type: paragraph
            body: >
              自 2014 年在 Chicago 一处联合办公空间起步，ShipBob 已从单个履约中心扩张为 60+ 个全球设施，覆盖美国、加拿大、英国、欧盟、澳大利亚和印度。公司已为数千家商家履约超过 250M 订单；截至
              2026 年，订单准确率 99.97%，准时发货率 99.6%。关键里程碑包括：在美国实现两日达覆盖（2020）、启动国际履约（2021）、活跃商家超过 10,000 家、完成 E
              轮独角兽融资（2022）、扩张至印度和澳大利亚，以及发布 Spring 2026 产品版本，其中包括 AI 驱动的 ShipBob Promise 送达日期引擎和 TrackBob 品牌化追踪门户。公司接入
              250+ 个平台和零售伙伴。2026 年春，ShipBob 宣布举办 “Fulfilled” 商家大会，显示其品牌和商家社区建设更成熟。按履约中心、集成、服务商家数和处理订单量衡量，ShipBob
              的运营规模使其成为北美服务 DTC 细分市场的三大独立 3PL 之一，与 Shopify Fulfillment Network 和 ShipMonk 并列。公司未公开披露员工数里程碑、收入增长或历年单位经济性。
