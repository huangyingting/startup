      - number: '6.3'
        title: 留存、扩张、集中度与反向信号
        blocks:
          - type: paragraph
            body: >
              公开证据里，ShipBob 的客户留存、扩张和集中度都很薄。2026 年抓取材料中，ShipBob 没有公开披露
              NRR、GRR、流失率、续约率、合同期限或客户集中度；这些私有指标是客户侧尽调评估的主要投资判断障碍，也是明确尽调问题。公开可观察的扩张驱动包括：（1）模块挂载——Promise AI 送达日期引擎、货运、B2B
              / EDI、套装、Express 2-day、退货——把客户从基础平台定价带到多线变现；（2）地理 FC 挂载——商家增加额外 FC（如 Our Place 从 2 → 4 → 6 个 FC
              扩张），以结构性耐久方式提高单商家收入和单位经济；（3）自营仓库但采用 ShipBob WMS 的品牌挂载 Merchant Plus WMS 许可证；（4）通过 TikTok
              Shop、BigCommerce、Walmart、EDI / B2B 零售路由做渠道挂载。反向信号集中在三个独立表面：G2 低分层评论（以及 Capterra / Software Advice / GetApp
              的类似反馈）提示账单对账不透明和旺季订单准确率失败；Trustpilot 和 BBB 投诉聚类与这一模式一致，尤其是小体量商家；r/ecommerce 和 r/shopify 上讨论从 ShipBob 流失到
              ShipMonk 或自建履约的 Reddit 线程。2026 年抓取材料中，任何反向表面都没有给出可绑定到具体分层的量化流失信号——反向信号是定性且一致的，不是灾难性的。客户集中度风险未知，但受 SMB
              与中端市场画像约束：考虑到长尾 SMB 画像，ShipBob 不太可能对单一客户集中度 ≥20%，但垂直集中度（如健康保健、宠物）可能重要，属于尽调问题。
