              URL、公开漏洞赏金计划、公开 API SLO，或已发布的订单准确率 SLA。企业级和中端市场商家的采购团队会在 NDA 尽调中要求这些材料——可以假设 ShipBob 能私下提供，但公开缺席本身应列为尽调问题。
