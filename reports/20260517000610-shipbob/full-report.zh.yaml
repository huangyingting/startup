            title: 量化案例结果真实且重要——Our Place 和 Spikeball 锚定证据清单
            body: >
              Our Place 案例（货运节省 $1.5M，通过 2 → 4 个 FC 扩张将配送时间从 5–6 天缩至 2.5 天）和 Spikeball 案例（通过 WMS 比价自动化使履约成本下降约 40%、邮资节省
              $400K+）都有量化、可归因，并绑定到具名运营负责人（COO Ali Shahid；全球仓储总监 Adam LaGesse）。这是案例库中最强的客户证据，也能持续验证 ShipBob 的价值主张。
            calloutType: strength
            claimRefs:
              - CU010
