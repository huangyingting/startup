    sections:
      - number: '8.1'
        title: 上次估值标记 vs. 公开可比公司倍数
        blocks:
          - type: paragraph
            body: >
              ShipBob 上次公开披露的新股估值是 2022 年 1 月 Series E，投后 $1.075B；该轮融资据报道约 $200M，由 Bain Capital Ventures 领投，Menlo
              Ventures、Hyde Park Venture Partners 和 SoftBank 参与（Fortune、TechCrunch、Business Insider、Bain Capital
              Ventures 组合页面）。2022 年估值标记资本化的是 2021 年收入基数，公开来源将其放在 $100M–$200M 区间（Latka、Growjo、PitchBook 资料页），意味着峰值时期企业价值
              / 收入倍数约 5–10x。此后，公开的轻资产物流可比公司已显著重定价：GXO Logistics（NYSE: GXO，2021 年从 XPO 分拆，且是最干净的 3PL 纯业务可比，过去 12 个月收入
              ~$10B+）截至 2026 年 5 月按 Macrotrends 和 StockAnalysis 数据，交易在低于过去 12 个月收入 0.8x；XPO Logistics（NYSE: XPO，主要是 LTL
              货运承运商，但作为规模化物流倍数锚点相关，过去 12 个月收入 ~$8B+）按 StockAnalysis 数据，交易在相近的低个位数 EV/Revenue
              区间；Stamps.com（最接近的软件化航运可比，2021 年 10 月被 Thoma Bravo 以 $6.6B 私有化，见 Wikipedia）交易价约为过去 12 个月收入
              6x，如今是该品类高水位。Maersk 2022 年收购 Pilot Freight Services（Wikipedia: Maersk）以及更广泛战略买家足迹（Flexport 2023 年收购
              Shopify Logistics / Deliverr，见 Wikipedia: Flexport；Saddle Creek 的私有规模化 3PL 足迹，见
              Wikipedia），把轻资产履约平台的战略收购方倍数锚在 0.8–1.5x 收入区间。综合读数是，ShipBob 2022 年 5–10x 估值标记相较 2026 年公开可比公司中点有 4–8
              倍溢价，这是本报告最大的单一投资判断张力。2026 年 SEC EDGAR 记录确认 ShipBob 2022 年后没有 Form D 文件（efts.sec.gov
              全文搜索），意味着这个缺口要么由经营现金支撑——这是能证明维持估值标记的正面证据——要么是避免 down-round；若是后者，入场价格需要折价 30–50% 才能清算。没有 NDA
              级股权结构表刷新和收入轨迹披露，尽调无法区分两者；这是最终最核心的尽调问题。
