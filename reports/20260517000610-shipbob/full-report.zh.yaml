      - - 地域 FC 叠加 — 新增区域 FC
        - 按单量看，美国 FC 集中度较轻；UK / EU / AU / CA 在增长
        - 多 FC 商户贡献 2–3× 更多收入，流失率更低（案例研究证据）
        - 索取客户群中多 FC 占比，以及单个 FC 收入贡献
      - - Merchant Plus WMS 许可加购
        - 新产品；集中度尚未形成
        - 增加 SaaS 毛利率收入线；承诺期更长
        - 索取 Merchant Plus 许可数量、ARR、流失率
      - - 渠道接入 — TikTok Shop、BigCommerce、Walmart、EDI
        - Shopify 是主导入站渠道，也带来平台集中度
        - 渠道扩张降低单个客户对 Shopify 的依赖
        - 索取商户群渠道结构，以及渠道结构随时间的变化
      - - 垂直品类集中（健康保健、宠物、美妆、家居、食品）
        - 案例库中健康保健和宠物占比很高；集中度可能具有实质影响
        - 垂直品类下行（如补充剂遭 FDA 执法、宠物食品召回）可能对收入造成不成比例冲击
        - 索取头部垂直品类收入占比；前 10 大客户收入占比
      - - 客户规模集中（SMB 长尾 vs. 扩张期队列）
        - SMB 长尾降低单一客户集中度，但尾部 CAC 和流失率较高
        - SMB 尾部是反向评价信号的主要来源；扩张期客户队列贡献收入
        - 索取按 ARPA 档位划分的收入；按档位划分的 CAC 和回本周期
      - - 跨境 DTC（UK、EU、AU、CA）
        - 集中在区域 FC；任何地区都有承运商中断风险
        - 相比只做 Amazon FBA 的竞争对手，跨境能力是结构性护城河
        - 索取按地区划分的收入贡献和 FC 利用率
      - - Shopify 渠道集中
        - 渠道集中在 Shopify（最低 CAC 入站）
        - 如果 Shopify 调整 App Store 机制或推出竞争性履约服务，风险具有实质影响
        - 索取按年度划分的 Shopify 渠道新客户占比；合作条款
