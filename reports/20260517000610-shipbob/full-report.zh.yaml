      - number: '2.3'
        title: 买家分层与决策机制
        blocks:
          - type: paragraph
            body: >
              ShipBob 的市场可以按商家规模、品类和履约复杂度划分。主力细分——核心 DTC SMB——每月发货 400–10,000 单，通过 Shopify 或同类平台直面消费者销售，需要带集成软件的全服务
              3PL。该细分对成本敏感，看重透明度、速度和集成。第二细分——中端市场和企业级 DTC——每月发货 10,000–250,000+ 单，可能跨多个渠道运营（Amazon、零售、DTC），看重定制、SLA
              保证和专属客户经理。ShipBob 的 B2B 履约项目服务需要零售分销的品牌（与 Target、Walmart 等做 EDI 合规），构成第三细分。购买决策主要由技术驱动：商家按集成深度（尤其
              Shopify）、软件质量（商家仪表盘、分析）和两日达承诺所需的地理覆盖来选择 3PL。可靠性比价格更重要。SMB 决策周期为 2–8 周，企业客户为 3–6 个月。关键影响者包括 Shopify
              应用商店推荐、DTC 创始人社区（Twitter/X、Slack 群）和行业媒体。商家一旦把技术栈接入 ShipBob，250+ 个集成就会形成切换成本。潜在 ShipBob 客户池（在 Shopify
              或同类平台上每月发货 400+ 单的 DTC 商家）估计全球为 50,000–200,000 家。
            claimRefs:
