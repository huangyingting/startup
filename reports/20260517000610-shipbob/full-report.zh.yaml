      - number: '8.3'
        title: 退出路径、可投资性与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              ShipBob 可投资的退出路径包括：（a）2026–2028 年窗口 IPO，前提是证明收入 $500M+ 且 EBITDA 为正且达到两位数；（b）被规模化物流玩家（GXO、XPO、Maersk、DHL
              Supply Chain，或 Saddle Creek / Ryder 式私营运营商）战略收购，或被平台伙伴（Shopify、Amazon、TikTok / Bytedance
              commerce）收购；（c）由成长股权 / 私募股权发起的资本重组或老股大宗交易（Bain Capital Ventures 滚存、Thoma Bravo、Vista 等），与 2021 年
              Stamps.com 先例一致。未来 24 个月最现实路径是（c）——财务赞助方主导的老股交易或资本重组，刷新估值标记并为早期投资者和员工提供流动性——因为公开市场倍数压缩使（a）在 2022 年估值标记下
              IPO 不划算，而（b）战略收购通常会按公开可比区间折价。可投资性评估为继续研究（跟踪 / 有条件）。放弃触发器包括：（1）任何公开 down-round 相较 2022 年 $1.075B 估值标记下调
              >40%；（2）Shopify SFN 扩张或 App Store 重新排序，实质侵蚀 ShipBob 获客渠道；（3）G2 / Trustpilot / BBB 上公开 Q4 SLA 违约聚类超过基线量
              >2x；（4）披露 top-10 客户集中度高于 25%；或（5）任何安全或数据泄露披露。买入触发器包括：（1）NDA 级收入轨迹确认 2026 年收入 $400M+ 且 YoY 增长
              >25%；（2）毛利率披露达到或优于行业基线（≥15%）；（3）股权结构表刷新确认 2022 年估值标记由经营现金支撑，而非避免 down-round；（4）出现相较 2022 年投后估值折价 30%+
              的老股大宗机会。最终尽调问题集中在财务披露（NDA
              级收入、毛利率、EBITDA、现金、债务、客户集中度、留存队列）、股权结构表刷新（当前投后估值、优先股堆叠、稀释瀑布、员工期权池）和战略渠道耐久性（Shopify SFN 风险、TikTok Shop 爬坡、国际
              FC 利用率）。
