      - number: '2.4'
        title: 增长驱动与市场约束
        blocks:
          - type: paragraph
            body: >
              ShipBob 市场的主要增长驱动，是 DTC 电商继续成为消费品牌偏好的销售渠道。2020 年疫情期间线上购物加速，形成了永久性结构转变；美国零售电商渗透率从 2019 年约 11% 升至 2025 年
              16.4%。ShipBob 特有的顺风包括：（1）Shopify 平台增长——Shopify 商家基础是主要获客池；（2）AI 驱动的物流优化——ShipBob 的 Spring 2026 ShipBob
              Promise AI 送达日期引擎回应了商家对预测性物流的需求；（3）跨境电商扩张；（4）消费者对两日达的期待上升（由 Amazon Prime 设定）；（5）商家复杂度提高——品牌同时运营
              Shopify、Amazon、TikTok Shop 和零售，需要统一履约层。关键约束和逆风包括：（1）Amazon 通过 MCF 和 FBA 形成强大竞争地位；（2）Shopify 收购 Flexport
              并发展 SFN（Shopify Fulfillment Network），带来潜在去中介化风险；（3）宏观敏感性——2023–2024 年可选消费收缩，复苏不均衡；（4）承运商成本上升（UPS、FedEx
              加价）；（5）商家最低要求（美国 $400/month，欧洲 $1,000/month）限制了超小商家细分。
            claimRefs:
              - CM014
