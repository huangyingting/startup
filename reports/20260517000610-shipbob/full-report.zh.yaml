      - number: '2.2'
        title: 市场规模与增长动力
        blocks:
          - type: paragraph
            body: >
              多家分析机构估计，2024–2025 年全球电商履约服务市场在 $90–150B 区间，到 2030 年 CAGR 为 8–12%。Grand View Research 估计，2022 年全球电商履约服务市场约
              $96.7B，到 2030 年预计 CAGR 为 13.7%。IBISWorld 跟踪的美国第三方物流行业规模约 $200B+，包含所有货运和非电商物流，其中电商专属 3PL 细分约占
              30–40%。Shopify 作为平台快速增长（承载数百万 DTC 商家）与 ShipBob 服务需求直接相关：ShipBob 是 Shopify 商家的优选履约伙伴，应用商店评分 4.7 星，来自 300+
              条已验证评论。DTC 商务渠道增速快于整体电商：品牌通过自有渠道（网站、App）直接向消费者销售，而不是依赖 Amazon 或零售中介，这一子板块增长最快，也是 ShipBob 的主要获客池。Shopify 报告
              2025 年商家增长 10%+，直接扩大了 ShipBob 需求。跨境电商带来额外市场机会：向国际市场（英国、欧盟、澳大利亚）销售的美国商家，是 ShipBob 全球履约网络的高价值细分。
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
          - type: figure
            figureRef: FM002
