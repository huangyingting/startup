            body: >
              三个杠杆最高的尽调问题是：（1）新 Shopify 商家中有多少比例入驻 SFN/Flexport、ShipBob 或其他应用；（2）ShipBob 过去 8 个季度的净美元留存、总美元留存和队列流失；（3）评估
              ShipBob 但最终选择 Amazon MCF 的商家的原因代码。这三个数据点会实质改变对竞争耐久性的评估。
