      - number: '8.2'
        title: 收入倍数框架与情景构建
        blocks:
          - type: paragraph
            body: >
              估值框架以 EV/Revenue 倍数为锚，区间由 2026 年公开可比公司集合夹定（GXO 0.4–0.8x、XPO 0.5–1.0x、Stamps.com 2021 年私有化 6x 作为上限，CB
              Insights 所称 ShipMonk 私有 down-round 作为下限），再应用到根据公开代理（Latka、Growjo）和分析师市场数据轨迹（CB Insights 电商物流报告、Grand View
              电商履约市场规模、IBIS 3PL 行业报告）推断的 ShipBob 2026 年收入基数。悲观情景假设 2026 年收入基数为 $250M（与 Latka 低端轨迹和 Q4 SLA
              聚类导致客户流失一致）、公开可比倍数 0.6x，以及较 2022 年 $1.075B 估值标记 down-round 40%——对应 $150M EV 和新一轮投后 $600M。基准情景假设收入基数为
              $350M–$450M（与 2021 年 $100M–$200M Latka 代理后的中阶段增长一致，并考虑 2026 年春季 Promise / WMS GA 执行），相较公开可比中点给予 1.0–1.5x
              的风投溢价倍数，估值标记持平至下调 30%——对应 $350M–$700M EV 和 $750M– $1.1B 投后。乐观情景假设收入基数 $500M+、YoY 增长持续 30%+，收入倍数 2–3x，反映
              Shopify 渠道溢价和国际 FC 足迹，估值标记维持或小幅上调——对应 $1.0B–$1.5B EV 和 $1.2B–$1.8B 投后。情景概率锚定于公开反向证据聚类（G2 / Trustpilot /
              BBB 上的 Q4 SLA 评论）、股权结构表缺口信号，以及 McKinsey 对物流科技平台整合的观点。估值对两个输入高度敏感：（1）2026 年过去 12 个月收入，它线性推动 EV；（2）毛利率轨迹，3PL
              行业基线（IBIS、CB Insights）把它锚在 12–18%，但 ShipBob 未公开披露。两个输入都需要 NDA 级尽调才能定稿。
