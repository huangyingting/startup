      - number: '3.3'
        title: 护城河耐久性、切换成本与替代风险
        blocks:
          - type: paragraph
            body: >
              ShipBob 可防守的护城河包括：（1）自有 FC 实体网络——美国、英国、欧盟、澳大利亚和加拿大 40+ 个中心，复制需要大量资本；（2）Shopify App Store 位置（300+ 条已验证评论给出
              4.7/5）及其带来的自然获客管线；（3）支撑第一方履约和授权 Merchant Plus 产品的自研 WMS；（4）集成广度（250+ 个应用和销售渠道，包括
              Shopify、Amazon、Walmart、eBay、TikTok Shop、BigCommerce、WooCommerce、Squarespace），品牌一旦把 ShipBob
              接入技术栈，就会提高切换成本。这些护城河被明显替代风险部分抵消。最尖锐的是平台权力：Shopify 如今在 SFN 上与 Flexport 运营协同，能够在商家入驻时优先展示或打包自有履约网络，侵蚀
              ShipBob 成本最低的商家获客渠道；Shopify 过去选择不去中介化受信任的应用商店伙伴，但战略选项仍在。第二个风险是商品化：ShipHero、Extensiv 和风投支持的同行正在缩小软件质量差距，AI
              辅助运营（自动分配、动态承运商选择、预测 ETA）也通过开源和云服务在品类内扩散。第三个风险是 Amazon MCF 对 Amazon 原生卖家用价格压制——这是 ShipBob
              有意放弃的细分。第四，多归属在结构上很常见：许多商家并行使用 ShipBob、Amazon FBA 和区域 3PL，因此即使商家在技术上是“活跃”的，ShipBob 的钱包份额也没有排他性保护。G2（约 330
              条评论，4.1/5）、Capterra（约 140 条评论，4.2/5）和 Trustpilot（评价混杂；有关于账单对账和旺季超卖的投诉记录）上的独立客户证据表明，ShipBob
              的软件体验优势真实但有边界；如果运营执行相对价格滑坡，优势就会承压。
