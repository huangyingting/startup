  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与买方画像
        blocks:
          - type: paragraph
            body: >
              ShipBob 的可服务客户，是原生在 Shopify、Amazon 和 TikTok Shop 上经营的 DTC 品牌，向美国、英国、欧盟、澳大利亚或加拿大终端消费者发消费包裹。买方通常是 SMB
              或中端电商品牌的创始人经营者，或 COO / 运营负责人；用户是同一角色，加上商家组织里的仓库 / 履约运营人员（当 ShipBob WMS / Merchant Plus
              部署在商家自有仓库时）；付款方是商家品牌。按买方 / 用户 / 付款方拆分，ShipBob 收敛到几个反复出现的画像。（1）Shopify 上的 DTC SMB——通过 Shopify App Store
              获得的长尾客户（4.7 / 5，300+ 条已验证评论），月订单量从数百到数千不等，年收入从高六位数到低八位数。（2）DTC 扩张期品牌——$10M–$200M ARR 的高增长品牌，在 2–6 个 FC 之间用
              ShipBob 整合履约，并使用多 FC 分配、退货、套装和 Promise 模块。（3）全渠道中端市场——使用 ShipBob Plus 和 / 或 B2B / EDI 零售路由模块，同时履约 DTC
              和批发订单的品牌。（4）Merchant Plus WMS 许可证客户——自营仓库但采用 ShipBob WMS 管理仓库的品牌。（5）国际 / 跨境——英国、欧盟、澳大利亚、加拿大品牌，使用区域 ShipBob
              FC 做本地化履约。ShipBob 案例库的垂直行业集中度显示，健康与保健、运动用品、美妆、服装与配饰、家居用品、宠物产品、食品饮料出现最多，这与 DTC Shopify GMV
              中占比最高的品类一致。主要分层缺口在于：公司没有公开披露按分层划分的收入结构、客户数，以及 ARPU / ARPA 分布；这些都应列入尽调问题。
