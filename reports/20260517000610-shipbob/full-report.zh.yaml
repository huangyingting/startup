      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >
              ShipBob 由 Dhruv Saxena（CEO）和 Divey Gulati（总裁兼 COO）共同创立；两人在 MBA 就读期间相识，并在亲身踩过电商履约痛点后启动公司。Saxena
              负责公司整体战略、投资者关系和公开定位，Gulati 负责运营、技术和产品。两位创始人仍积极参与日常领导；对 ShipBob
              这一阶段的公司来说，这种留任并不常见。公司已扩充领导团队，覆盖工程、产品、销售和营销高管，但除两位创始人外，公开文件或新闻稿并不稳定披露具体高管层姓名。董事会包括 Bain Capital Ventures 的
              Ajay Agarwal；他在领投 E 轮后加入董事会。Hyde Park Venture Partners 参与早期轮次，据理解因这些投资持有董事会观察员或董事席位。作为私营公司，ShipBob
              不披露完整董事会构成、高管薪酬或治理文件。双创始人结构叠加创始人对品牌、客户关系和产品愿景持续居中，关键人风险偏高。根据 LinkedIn 和公司沟通资料，截至 2026 年，ShipBob 员工数为
              501–1,000 人，产品和工程人员 300+。
