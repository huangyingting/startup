      - number: '6.2'
        title: 具名客户证据与采用轨迹
        blocks:
          - type: paragraph
            body: >
              ShipBob 的 shipbob.com/case-studies/ 案例库是具名客户证据的主要来源，里面有若干具名品牌公开证明的量化结果。Our Place 称，通过从 2 个仓扩至 4 个 ShipBob
              仓库，货运成本节省 $1.5M，配送时间减半（从 5–6 天缩至约 2.5 天），并在美国、加拿大、澳大利亚共使用 6 个 ShipBob FC。Spikeball 称，使用 ShipBob 自动化 WMS
              比价后，总履约成本下降约 40%，邮资节省 $400K+。Bloom Nutrition 称，依靠 ShipBob 作为唯一履约伙伴，仅用 3 名运营人员就支撑 9 位数收入的电商业务。PetLab Co.
              证明品牌一致性与客户体验可与商家自营运营保持相当。ShipBob 案例库中还可见的其他具名客户（已在案例索引核验）包括 Boie
              USA、Touchland、Synchro、Bezoar、Wagsy、Manscaped 的 DTC 履约，以及一长串美妆、健康、宠物和家居品牌。独立评论渠道（G2、Capterra、Software
              Advice、GetApp、Shopify App Store）也佐证了规模化采用：300+ 条已验证 Shopify App Store 评论和 470+ 条聚合独立评论，显示 SMB
