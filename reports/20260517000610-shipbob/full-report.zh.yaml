  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流与变现模式
        blocks:
          - type: paragraph
            body: >
              ShipBob 的收入模型由交易驱动，分三层。主导收入流是按单履约费，按月计费：收货费、按托盘或料箱计的月度仓储费、每单拣货打包费及额外件附加费，以及按 ShipBob
              协商费率转嫁、带未披露加价的承运商邮费。第二层是增值服务——组合装配和组装、B2B 零售路由履约、货运、退货处理（Happy Returns
              和自有退货）、旺季附加费和专项项目——通常按发生次数计费。第三层较小但有战略意义，是软件：ShipBob WMS / Merchant Plus，这一授权产品让商家用 ShipBob WMS
              运行自有仓库空间，另有集成高级套餐。ShipBob 不发布费率卡；所有定价都基于报价，并随 SKU 画像、订单速度和季节性变化，因此标价参考只能作为指示性信息。ShipBob 未披露履约、增值服务和 WMS
              之间的收入结构，也未披露入驻费、多年承诺或阶梯返点的收入确认政策。独立评论者指出，实际账单与初始报价存在重大差异——这一反复出现的投诉模式同时影响客户体验和收入确认。
