      - number: '5.2'
        title: 架构、集成与可靠性控制
        blocks:
          - type: paragraph
            body: >
              ShipBob 的运营架构是云托管多租户 SaaS，用来编排由自营或合作伙伴运营的 40+ 个 FC 实体网络。核心平台开放 REST API、webhooks 和 OAuth 授权，并在
              developer.shipbob.com 文档化，支持产品、库存、订单、履约、收货单、退货、地点和 webhooks 等端点。与电商平台的集成是双向的（订单摄取加追踪 / 库存同步），分为 ShipBob
              自建的一方连接器（Shopify、Amazon、Walmart、eBay、BigCommerce 等）和伙伴构建渠道。平台支持用于零售路由履约的 EDI，也支持面向中端市场和企业商家的 ERP
              集成（NetSuite、SAP / 其他）。承运商集成覆盖 UPS、FedEx、USPS、DHL、Canada Post、Royal Mail、Australia Post
              和区域邮政，并按成本、服务等级和目的地动态选择承运商。平台通过公开状态页（status.shipbob.com）展示可靠性，通过信任门户（trust.shipbob.com）沟通安全 /
              合规姿态。可靠性和安全披露达到中期 SaaS 公司应有水平——正常运行时间统计、计划维护通知，以及覆盖 SOC 2 和其他框架的鉴证合规项目。Spring 2026 版本增加 ShipBob Promise AI
              送达日期引擎，为 Shopify 店铺提供结账 组件，显示根据 FC 库存、承运商运输时间模型和订单截单窗口计算出的承诺送达日期。公开 API
              文档带来的独立开发者体验证据与品类常态一致；本次抓取未浮现公开漏洞赏金计划披露、信任门户页面上的 SOC 2 Type 2 报告 URL，也没有发布 API 延迟或 webhook
              投递的服务等级目标，只有一般正常运行时间信息。
