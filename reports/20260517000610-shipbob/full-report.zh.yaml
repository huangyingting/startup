      - CR033
      - CR034
      - CR035
      - CR036
  - id: TR005
    title: 缓释措施与否决标准表
    columns:
      - 风险
      - 可监测触发信号
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 股权结构刷新（融资）
        - 下一次披露的一级融资轮或二级市场估值标记
        - 相比 2022 年 $1.075B 投后估值出现降估值轮
        - 重新定价或放弃；重谈优先权结构
      - - Shopify 渠道集中
        - Shopify SFN 扩张，或 ShipBob 在 App Store 排名重排
        - ShipBob 应用评分跌破 4.5，或排名跌出履约应用前 5
        - 重调情景概率；若出现冲击且没有缓释证据则放弃
      - - 承运商冲击
        - UPS / FedEx / USPS 劳工行动，或费率上调 >5%
        - 承运商罢工 >7 天，或费率同比上调 >5%
        - 压测利润率模型；要求提供成本转嫁证据
      - - 旺季 SLA 失守
        - Q4 负面评论集群数量
        - '>2x 基准投诉量（最近一个 Q4 季度的 G2 / Trustpilot / BBB）'
        - 触发运营尽调会议；要求按 FC 提供 SLA
      - - 网络安全 / 数据泄露
        - 任何州检察长通知或公开事件披露
        - 单次泄露影响 >100K 商家或 >1M 终端消费者
        - 暂停尽调；按尾部风险重新定价
      - - 高管流失
        - CEO、CFO、COO、CTO、CRO 在 90 天内离职
        - 任何 C-suite 高管离职，且同季度未任命继任者
        - 触发高管稳定性尽调；暂停
      - - 客户集中度披露
        - 披露时的前十大客户收入占比
        - '>25% 收入来自前十大客户'
        - 对估值施加集中度折价
      - - 2026 年春季 Promise / WMS GA 落地
        - beta 测试客户渠道反馈的缺陷数量
        - '>10 家具名客户报告回滚或重大缺陷'
        - 下调产品路线图论点权重；重新定价
      - - 监管 / 诉讼
        - 任何联邦案卷记录或州检察长执法行动
        - 任何单条案卷记录将 ShipBob 列为主要当事方
        - 暂停尽调；重新定价
      - - 利润率压缩
        - 披露的毛利率或单位经济模型
        - 毛利率低于 3PL 行业基准 12–15% 区间
        - 重新定价；要求提供利润率改善路线图
    notes: |
      本表把否决标准拆成可跟踪触发信号，绑定两类证据：公开可观察信号（评论平台、EDGAR、新闻），或 NDA 下可披露指标（利润率、SLA、流失率）。每个触发信号都对应明确行动。
    claimRefs:
      - CR037
      - CR038
      - CR039
      - CR040
  - id: TV001
