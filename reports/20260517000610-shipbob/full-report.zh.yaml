      - number: '8.4'
        title: 证据展品
        blocks:
          - type: callout
            title: 2022 年估值标记比 2026 年公开可比公司中点高 4–8 倍——这是约束性的投资判断张力
            body: >
              ShipBob 2022 年 1 月 Series E 的投后估值标记为 $1.075B，资本化了公开来源给出的 $100M–$200M 收入基数（Latka、PitchBook、Growjo），意味着峰值
              EV/Revenue 倍数为 5–10x。公开轻资产物流可比公司此后大幅重定价：按 Macrotrends 和 StockAnalysis 数据，GXO 交易在过去 12 个月收入的 0.4–0.8x，XPO 在
              0.5–1.0x。Stamps.com 2021 年以 $6.6B / 约 6x 收入私有化，是该品类高水位，也是 2021 年周期峰值。投资判断必须把这个 4–8 倍溢价张力明确定价。
            calloutType: insight
            claimRefs:
              - CV001
              - CV004
              - CV005
              - CV011
          - type: callout
            title: 四年 SEC Form D 缺口是最大单一股权结构表风险信号
            body: >
              SEC EDGAR 全文搜索（efts.sec.gov）显示，自 2022 年 1 月 Series E 以来四年里没有 ShipBob Form D
              文件。这要么是正面信号（由经营现金支撑），要么是负面信号（通过桥轮 / 可转债 / SAFE 而非定价新股来主动避免 down-round）。没有 NDA
              级股权结构表刷新，尽调无法区分两者；这应成为任何新股承诺的先决条件。
            calloutType: risk
            claimRefs:
              - CV007
              - CV008
              - CV024
              - CV025
          - type: callout
            title: 多地域 + 约 40 个 FC 足迹叠加 Shopify 渠道，锚定了有防守性的基准情景收入底线
            body: >
              横跨五个地理区域的约 40 个 FC 足迹，以及耐久的 Shopify App Store + Bain Capital Ventures 组合背书，锚定了基准情景的 2026 年收入底线，公开代理将其放在
              $350M–$450M 区间。如果 NDA 级收入轨迹确认这一点，基准情景 1.0–1.5x 的风投溢价 倍数会得出 $350M–$700M EV，对应 $750M–$1.1B
              投后、相较上轮持平至小幅折价的估值标记——这是可行的老股大宗入场区间。
            calloutType: strength
            claimRefs:
              - CV013
              - CV014
              - CV017
              - CV020
          - type: callout
            title: 财务赞助方主导的资本重组 / 老股交易是未来 24 个月最现实的退出路径
            body: >
              公开市场倍数压缩，使 2022 年估值标记下的干净 IPO 不划算，战略收购通常也会按公开可比区间折价。未来 24 个月最现实的路径，是一次财务赞助方主导的 老股交易或资本重组——与 2021 年
              Stamps.com 私有化先例一致——刷新估值标记，为早期投资者和员工提供流动性，同时让平台保持独立。
            calloutType: assumption
            claimRefs:
              - CV021
              - CV022
              - CV026
              - CV029
