    data:
      items:
        - label: 悲观（$250M × 0.6x）
          value: 150
          detail: Latka 低端；GXO 底部倍数
        - label: 基准低位（$350M × 1.0x）
          value: 350
          detail: 中位收入；可比公司中点倍数
        - label: 基准高位（$450M × 1.5x）
          value: 675
          detail: 中位收入；风险投资溢价
        - label: 乐观（$500M × 2.5x）
          value: 1250
          detail: 强收入；渠道溢价
        - label: 2022 年标记锚点
          value: 1075
          detail: Series E 投后估值
  - id: FV003
    title: 估值 / 回报区间——低 / 基准 / 高投后估值情景
    type: range
    summary: |
      下一个披露的新股或老股交易标记的低 / 基准 / 高投后估值区间，以 2022 年 $1.075B 投后估值标记为锚。
    claimRefs:
      - CV001
      - CV011
      - CV022
    data:
      items:
        - label: 悲观投后估值
          low: 500
          base: 600
          high: 750
          detail: 较 2022 年标记下调估值 30–50%
        - label: 基准投后估值
          low: 750
          base: 900
          high: 1100
          detail: 持平至小幅折价；现金支撑
        - label: 乐观投后估值
          low: 1100
          base: 1500
          high: 1800
          detail: Promise GA + 国际利用率推动上调估值轮
  - id: FV004
    title: 投资 KPI——IC 评分卡，覆盖市场 / 证明 / 护城河 / 经济性 / 风险 / 估值 / 证据
    type: kpi
    summary: |
      面向 IC 的 KPI 评分卡覆盖七个主要承保维度，每项都以上一章的证据基础为锚。
    claimRefs:
      - CV008
      - CV014
      - CV020
      - CV022
      - CV023
      - CV026
    data:
      items:
        - label: 市场规模
          value: Strong
          detail: $80B+ TAM；电商结构性增长
        - label: 渠道证明
          value: Moderate
          detail: Shopify + BCV 投资组合；SFN 风险
        - label: 护城河深度
          value: Moderate
          detail: ~40 个 FC + Plus WMS；并非独有
        - label: 单位经济性
          value: Unknown (NDA-gated)
          detail: 毛利率和 EBITDA 未披露
        - label: 风险画像
          value: Medium-High
          detail: 运营 + 股权结构表不透明
        - label: 估值纪律
          value: Below 2022 mark
          detail: 老股交易 30–50% 折价区间
        - label: 证据质量
          value: Public-thin / NDA-required
          detail: 大多数财务证据未公开
