  - id: TP003
    title: 定价 / 方案对比
    columns:
      - 供应商
      - 定价模式
      - 指示性价格（2026）
      - 包含能力
      - 关键未知项 / 加价项
      - 对买方的含义
    rows:
      - - ShipBob
        - 报价制混合模式：收货 + 仓储 + 拣货 / 打包 + 承运商费用转嫁
        - 收货约 $25–35/hr；仓储约 $40/pallet/mo 或约 $10/bin/mo；首件拣货费约 $1.30，每件追加约 $0.30；承运商费用按 ShipBob 谈定费率转嫁
        - 入驻、仪表盘、250+ 个集成、退货；国际业务另行报价
        - 超过标准 SKU 数后的入驻项目费；B2B 费用；Express-2-day 加价；超过标准托盘数的收货费
        - 总成本高度随 SKU 数量、组合和季节性波动；需报价
      - - ShipMonk
        - 混合模式；宣传“简单阶梯式”定价
        - 首件拣货费约 $2.50，其后每件追加约 $0.50；仓储约 $40/pallet/mo；收货按小时计费
        - DTC 履约、订阅盒组装、退货
        - 众筹订单处理溢价；国际 FC 价差；高级档软件费
        - 表观费率与 ShipBob 接近；评论者对加价项的投诉较多且重要
      - - Stord
        - 报价制企业合同；按量分层
        - 定制；通常有 $5–10K/month 最低消费
        - OMS + WMS + 货运 + 包裹；分析
        - 入驻和实施费用可能不小
        - 中端市场和企业客户经济性；SMB 相比 ShipBob 会多付
      - - Red Stag Fulfillment
        - 按订单固定收费，含保险
        - 标准订单约 $5–10/order；仓储 $0.65/cu ft/mo；收货在阈值内包含
        - 保险、零损耗 SLA、重货 / 大件专长
        - 危险品、超阈值大件加收
        - 高价值 SKU 可承受溢价；不适合低 AOV 消耗品
      - - Amazon MCF
        - 按尺寸档逐件收费
        - 标准尺寸 $3.78–$10.61/unit（2026 价目表）；超大件更高
        - 在 Amazon 站外渠道使用 FBA 库存
        - FBA 仓储费；长期仓储加价；无品牌包装
        - 若库存已在 FBA，成本最低；品牌化 DTC 开箱体验上吃亏
      - - Shopify Fulfillment Network（Flexport 运营）
        - 通过 Shopify 入驻报价
        - 未公开披露；据报与中端 3PL 价格接近
        - 原生 Shopify 结账、退货、多 DC 分配
        - SFN 2023 年重构后仍有覆盖缺口；据报商户入驻存在等待时间
        - 集成前景不错，但运营记录仍在重建
      - - Extensiv (3PL Central / Skubana)
        - 按用户 / 订单档收取 SaaS 许可费
        - Skubana 入门约 $1,000+/month；3PL Central WMS 每个 FC 约 $1,500+/month
        - WMS、OMS、库存与订单管理软件
        - 实施服务；集成开发；不含仓库人工 / 租赁
        - 纯软件——买方仍要自己承担仓库和人工
      - - ShipHero
        - 混合模式：自营履约按订单收费；WMS 许可按发货单收 SaaS 费
        - WMS 基础费约 $1,995/month + 按发货单收费
        - 在部分美国站点提供自有 FC 履约，或提供 WMS 许可
        - 若只买许可，仓库人工另计；非支持渠道需要集成开发
        - 混合模式：网络小于 ShipBob；适合同时想要履约和 WMS 的商户
    notes: |
      除 Amazon MCF 外，所有费率都是指示性区间，来自官方定价页、供应商销售页、独立评论网站和运营商报价；实际价格需要书面报价。ShipBob 不发布标准价目表。价格资料截至 2026 年 5 月访问时点。
    claimRefs:
      - CP010
      - CP011
      - CP012
      - CP013
      - CP022
      - CP023
      - CP024
