      - number: '4.2'
        title: GTM 模式、单位经济性与成本结构
        blocks:
          - type: paragraph
            body: >
              ShipBob 的 GTM 主要由 Shopify App Store 主导（300+ 条已验证评论给出 4.7 / 5）——这是 DTC 原生 3PL
              获客成本最低的商家获客渠道——并由付费搜索、入站内容营销（ShipBob Blog 在数十个履约相关关键词上排名靠前）、中端市场外呼销售和伙伴驱动集成补充。SMB 商家销售周期较短（2–8
              周），中端市场较长（3–6 个月）。ShipBob 不披露 CAC、回本周期、毛利率、贡献利润率或净收入留存，因此尽调中的单位经济性必须用公开定价参考和可比公司基准自上而下建模。成本栈重在
              COGS：仓库劳动力、40+ 个 FC 的租赁费用（多数租赁而非自有）、收货和上架、拣货 / 打包耗材、退货处理，以及扣除 ShipBob 协商折扣后的转嫁承运商成本。资本开支很大程度上通过租赁融资，但新 FC
              装修（货架、MHE、传送带、夹层、月台设备）以及 WMS / 网络工程会资本化。营运资本对旺季库存爬坡和商家应收款周期敏感。平台软件成本结构（WMS、集成、AI 交付承诺）具备 SaaS
              经济性——增量毛利高——但它嵌在一家重资产运营公司里，因此混合毛利率显著低于纯软件可比公司。用于单位经济性三角验证的上市公司可比包括 Stamps.com（传统）、ShipStation（现 Auctane /
              Stamps.com）、Flexport-Deliverr、FedEx Fulfillment 旧业务，以及全球侧的 Coupang Fulfillment 和 JD Logistics 等物流科技同行。
