slug: "shipbob"
runDate: "2026-05-17"
company:
  name: "ShipBob"
chapter:
  number: 7
  title: "Risks"
  summary: >
    ShipBob's risk profile is shaped by its position as a private, mid-stage,
    capital-intensive 3PL operating ~40 fulfillment centers across five
    geographies and depending on freight carriers, software platforms, labor
    pools, and channel partners (Shopify, Amazon). Public regulatory and legal
    surface is light — no active federal litigation, recall, or enforcement
    action is publicly visible across CourtListener, DOJ ATR, CPSC, OSHA, BLS
    or FMCSA registers as of May 2026 — but operational and dependency risks
    are material and almost entirely undisclosed in public material. The
    binding underwriting risks are: (1) carrier and Shopify channel
    concentration, (2) labor and peak-season operational accuracy, (3) data
    security and PCI exposure across merchant integrations, (4) cap-table and
    financing risk given the 2022 $1.075B mark and a four-year gap to the next
    disclosed round, and (5) execution risk on the Spring 2026 Promise / WMS
    GA. Mitigations are partially evidenced (trust.shipbob.com, status page,
    SOC posture) but quantitative thresholds (SLA breach rates, incident MTTR,
    accident frequency, lost-customer rates) are not publicly disclosed and
    must be obtained under NDA.

sections:
  - id: "regulatory-legal"
    title: "Regulatory, Legal, and Compliance Risk"
    body: >
      Public regulatory and legal surface for ShipBob in May 2026 is light
      relative to the company's operating footprint. A CourtListener search
      (https://www.courtlistener.com/?q=shipbob+inc&type=r and the broader
      ?q=shipbob query) returns no active federal docket entries naming
      ShipBob Inc as a principal party in litigation as of the May 2026 access
      date. The US Department of Justice Antitrust Division operations page
      lists no ShipBob-related antitrust proceeding, and the Consumer Product
      Safety Commission Recalls register surfaces no ShipBob-attributed recall
      activity. The Federal Register (unblock.federalregister.gov) and USPTO
      trademark search both return ordinary administrative records consistent
      with a private commercial entity — trademark filings under ShipBob Inc
      are present but no oppositions or cancellations of consequence are
      visible. SEC EDGAR full-text and company-name searches
      (efts.sec.gov + the cgi-bin/browse-edgar endpoints) return ShipBob Form
      D filings tied to historical Series A–E financing events but no
      registration statement and no post-2022 financing event, consistent
      with the 2022 Series E being the last publicly disclosed primary round.
      The Bureau of Labor Statistics industry register for NAICS 493
      (Warehousing and Storage; bls.gov/iag/tgs/iag493.htm) and the FMCSA
      SAFER (safer.fmcsa.dot.gov/CompanySnapshot.aspx) and OSHA
      establishment-search (osha.gov/ords/imis/establishment.html) endpoints
      surface industry-baseline labor, motor-carrier, and workplace-safety
      registers but no ShipBob-specific enforcement entries visible from a
      public search. The aggregate read is a regulated-but-currently-quiet
      surface: no public litigation, no federal enforcement action, no SEC
      registration risk. The principal residual diligence asks are (a) state-
      level commercial litigation (delivery-loss claims, employment claims,
      and California wage-and-hour exposure given the Moreno Valley and
      Ontario FC footprint), (b) any privacy or breach-notification filings
      to state attorneys general, and (c) any non-public DOL/OSHA findings on
      the labor-intensive FC operations, since OSHA's public IMIS interface
      requires establishment-level lookups that the May 2026 fetch did not
      enumerate exhaustively.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007, CR008, CR009, CR010]
    tableRefs: [TR001]
    figureRefs: [FR001]

  - id: "operational-tech-security"
    title: "Operational, Technology and Security Risk"
    body: >
      Operational risk is the principal underwriting concern for ShipBob and
      the single largest driver of the adverse evidence cluster surfaced in
      Chapter 6. The risk surface has four layers. First, peak-season
      capacity and order-accuracy risk: independent reviewer surfaces
      (G2, Capterra, Trustpilot, BBB) and Reddit threads cluster consistently
      on Q4 / peak-season order accuracy and SLA breach reports, particularly
      for low-volume SMB merchants. ShipBob does not publicly disclose
      per-FC order accuracy, on-time-ship rate, mis-pick rate, or peak-vs-
      baseline SLA degradation. Second, status / uptime risk: the company
      maintains a public status surface at status.shipbob.com, which is the
      principal operational-transparency artifact, but the page does not
      publish historical SLA metrics or post-mortem incident logs. Third,
      security and data risk: ShipBob handles merchant-PII, end-customer-
      address, and inventory-financial data across hundreds of merchant
      Shopify, Amazon and TikTok-Shop integrations, plus operates Merchant
      Plus WMS in third-party warehouses, which materially expands the
      attack surface. trust.shipbob.com documents SOC 2 / ISO 27001-class
      posture but no public breach-notification entries are visible in
      state-AG breach databases and no public CVE assignment is recorded
      against the ShipBob platform in 2026. Fourth, warehouse-safety and
      labor risk: the FC operations expose ShipBob to ordinary OSHA
      recordable-injury risk for warehouse-and-storage operators (BLS NAICS
      493 baseline incident rate is materially above the all-industry
      average), but no establishment-level ShipBob OSHA citation entries are
      publicly visible. The aggregate operational picture is a meaningful,
      mostly-undisclosed residual risk: most operational SLA, security, and
      safety evidence requires NDA-level disclosure and the Spring 2026
      Promise / WMS GA cycle is an active execution event that compounds
      operational risk during the underwriting window. Each of these four
      operational layers also has a measurable kill-criterion attached in
      Table TR005, so investors can convert opaque risks into trackable
      thesis-break triggers without waiting for ShipBob to publish operating
      data unilaterally.
    claimRefs: [CR011, CR012, CR013, CR014, CR015, CR016, CR017, CR018, CR019, CR020, CR021, CR022]
    tableRefs: [TR002, TR005]
    figureRefs: [FR002]

  - id: "partner-people-financial"
    title: "Partner, People and Financial Risk"
    body: >
      Partner, people, and financial risks are the third risk cluster and the
      area where dependency concentration is most material. On the partner
      side, ShipBob's operating model depends on a small number of structural
      counterparties: parcel and freight carriers (UPS, USPS, FedEx,
      DHL, regional LTL carriers); cloud platforms (AWS or equivalent
      hyperscaler hosting the platform, observable indirectly via DNS and
      developer documentation at developer.shipbob.com); the Shopify channel
      (which Chapter 6 identifies as the dominant inbound acquisition channel
      and a structural concentration risk if Shopify alters App Store
      mechanics or launches a competing fulfillment service); and Amazon
      Multi-Channel Fulfillment, which functions both as competitor and as
      partner for FBA-supplement merchants. ShipBob does not publicly
      disclose carrier mix, hyperscaler dependency, or Shopify channel
      revenue share. On the people side, ShipBob's senior leadership is
      relatively visible — CEO Dhruv Saxena, CFO/operating leadership, and
      named product leads (e.g., on the Promise launch) — but the company
      has not publicly disclosed CTO continuity, board composition, or
      key-person succession; LinkedIn and press signals indicate ongoing
      executive turnover during the 2024–2026 window which is normal for a
      late-stage private company but is a diligence ask. Headcount is
      estimated at ~600–1,000 based on LinkedIn-and-press triangulation; the
      labor pool for FC operations is hourly and exposed to local labor-
      market tightness in Cicero IL, Moreno Valley CA, Ontario CA,
      Pennsylvania, and the international FCs. On the financial side, the
      principal underwriting risk is cap-table opacity: the 2022 Series E
      valued ShipBob at $1.075B post-money, but no subsequent primary round,
      secondary mark, or down-round adjustment has been publicly disclosed in
      a four-year window through May 2026. Public Form D filings document
      historical financing but do not refresh the valuation mark. Capital
      intensity is structurally high for a 3PL — leased FC capex, WMS
      software amortization, working-capital float on inventory-and-freight
      receivables — and ShipBob does not publicly disclose burn rate, cash
      runway, or unit-economics. Bain Capital Ventures and other named
      investors continue to list ShipBob on portfolio pages but provide no
      mark refresh. The aggregate financial-risk picture is a
      materially-disclosable-but-undisclosed surface — the central financing
      and unit-economics evidence required to discount valuation properly
      is private, and the 2022-mark-to-2026-no-mark gap is itself a risk
      signal. Diligence should treat this gap as evidence of either
      successful operating cash generation (positive) or active down-round
      avoidance (negative) and request a 2026 cap-table refresh as a
      condition precedent.
    claimRefs: [CR023, CR024, CR025, CR026, CR027, CR028, CR029, CR030, CR031, CR032, CR033, CR034, CR035, CR036, CR037, CR038, CR039, CR040]
    tableRefs: [TR003, TR004]
    figureRefs: [FR003]

