callouts:
  - id: "KR001"
    calloutType: "risk"
    title: "Cap-table opacity — 4-year gap to last public valuation mark is itself the largest single underwriting risk"
    body: >
      ShipBob's last publicly disclosed primary financing event is the
      January 2022 Series E at a $1.075B post-money mark. No subsequent
      primary round, secondary mark, or down-round adjustment has been
      publicly disclosed through May 2026 — SEC EDGAR shows no post-2022
      Form D filing and CB Insights / PitchBook do not surface a refreshed
      mark. This gap is either evidence of operating cash generation
      sufficient to avoid dilution (positive) or evidence of active
      down-round avoidance (negative); diligence cannot disambiguate
      without an NDA-level cap-table refresh, which should be a condition
      precedent for any underwriting.
    claimRefs: [CR007, CR028, CR037, CR038]
  - id: "KR002"
    calloutType: "risk"
    title: "Operational SLA evidence is private and adverse-review cluster is the principal public proxy"
    body: >
      Per-FC SLA, on-time-ship, mis-pick, and peak-vs-baseline accuracy
      metrics are not publicly disclosed. The only public proxies are the
      adverse review cluster on G2 / Trustpilot / BBB / Reddit (concentrated
      on Q4 / peak-season failures and billing-reconciliation opacity) and
      the status.shipbob.com uptime page (which does not publish historical
      metrics). Diligence should request per-FC SLA history and complaint-
      volume trend; the absence of a public SLA disclosure regime is
      a meaningful negative signal.
    claimRefs: [CR011, CR012, CR013, CR014]
  - id: "KR003"
    calloutType: "insight"
    title: "Public regulatory and litigation surface is genuinely quiet — no active federal docket / recall / OSHA / SEC issue visible"
    body: >
      CourtListener, DOJ ATR, CPSC, OSHA IMIS, FMCSA SAFER, BLS NAICS 493,
      SEC EDGAR full-text, USPTO, and Federal Register searches surface no
      ShipBob-specific active enforcement, litigation, recall, or
      registration concern as of May 2026. This is genuinely a positive
      signal for a private 3PL of ShipBob's scale; residual risk
      concentrates in state-level commercial / employment exposure that the
      public search cannot enumerate exhaustively.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006]
  - id: "KR004"
    calloutType: "assumption"
    title: "Carrier + Shopify concentration is structural and partially mitigated, but neither dependency can be fully hedged"
    body: >
      ShipBob's two structural counterparty risks — parcel carriers (UPS,
      FedEx, USPS, DHL) and the Shopify acquisition channel — are
      partially mitigated through multi-carrier rate-shop in the WMS and
      diversification into TikTok Shop, BigCommerce, Walmart, and EDI / B2B
      respectively. Neither dependency can be fully hedged: a multi-carrier
      industry shock affects every US 3PL, and Shopify-channel diversion
      cannot be unwound in under 12–24 months. These are accept-the-risk
      dependencies that should be priced into the valuation discount.
    claimRefs: [CR023, CR024, CR025, CR026]

