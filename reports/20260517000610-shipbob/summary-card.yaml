  topStrengths:
    - >-
      Multi-geo 60+ FC footprint and 250+ ecommerce/retail integrations anchor a defensible operational base for SMB and
      mid-market DTC merchants.
    - >-
      Durable Shopify App Store presence (4.7/5 with 300+ reviews) and Bain Capital Ventures portfolio framing support
      channel-proof and investor-base continuity.
    - >-
      January 2022 $200M Series E at $1.075B led by Bain Capital Ventures provides a credible last-mark anchor and a
      public investor roster spanning Bain, Menlo, Hyde Park, and SoftBank.
  topRisks:
    - >-
      Four-year SEC Form D gap since the January 2022 Series E is the largest cap-table risk signal; 2026 public comps
      have repriced 4–8x below the implied 2022 multiple.
    - >-
      Q4 / peak-season SLA, mis-pick, and billing-reconciliation adverse-review cluster on G2, Trustpilot, BBB, and
      Reddit is the principal operational anti-thesis; per-FC SLA metrics are not publicly disclosed.
    - >-
      Revenue, gross margin, EBITDA, customer concentration, and Shopify-channel share are undisclosed, blocking price
      discipline against the 2022 mark.
  unresolvedGaps:
    - Current post-money valuation, preference stack, and dilution waterfall post-2022 Series E.
    - 2024–2026 revenue actuals, 2027 plan, gross margin baseline, EBITDA path, and cash burn.
    - >-
