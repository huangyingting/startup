company:
  name: "ShipBob"
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    ShipBob is a technology-first, Chicago-headquartered e-commerce fulfillment company
    founded in 2014 by Dhruv Saxena (CEO) and Divey Gulati (President/COO). The company
    operates 60+ global fulfillment centers across the US, Canada, UK, EU, Australia, and
    India, and has fulfilled over 250 million orders for thousands of direct-to-consumer
    brands. Backed by $390M+ in total capital—including a $200M Series E in January 2022
    at a $1.075B valuation led by Bain Capital Ventures—ShipBob sits at the intersection
    of logistics infrastructure and SaaS, offering a proprietary warehouse management
    system, merchant dashboard, and carrier integrations alongside physical fulfillment.
    As of spring 2026, ShipBob launched AI-powered features (ShipBob Promise, TrackBob)
    signaling continued product investment. Revenue and profitability remain undisclosed
    as a private company.

sections:
  - id: "identity-and-overview"
    title: "Identity and Overview"
    body: >
      ShipBob, Inc. is a private, for-profit technology company headquartered at
      120 N Racine Ave, Suite 100, Chicago, IL 60607. Founded in 2014, ShipBob
      provides end-to-end e-commerce fulfillment services—warehousing, pick-and-pack,
      shipping, and returns processing—backed by a proprietary software platform. The
      company's core product is a nationwide (and international) network of fulfillment
      centers that integrates with merchants' e-commerce storefronts (Shopify, Amazon,
      WooCommerce, TikTok Shop, eBay, and 250+ others) to automate order routing,
      inventory optimization, and last-mile shipping. ShipBob's value proposition is
      2-day delivery anywhere in the continental US without merchants needing to own
      or operate their own warehouses. As a tech-forward 3PL (third-party logistics
      provider), ShipBob differentiates from traditional 3PLs through its merchant-facing
      SaaS dashboard, open API ecosystem, and real-time analytics. The company targets
      direct-to-consumer (DTC) brands shipping roughly 400–50,000 orders per month,
      though enterprise and B2B programs extend that reach. ShipBob is incorporated as
      a Delaware C-corporation. Its operational headquarters and primary technology
      teams reside in Chicago, with distributed engineering and operations globally.
    claimRefs: [CO001, CO002, CO003, CO004]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: "leadership-and-governance"
    title: "Leadership and Governance"
    body: >
      ShipBob was co-founded by Dhruv Saxena (CEO) and Divey Gulati (President and COO),
      who met as MBA students and launched the company after experiencing e-commerce
      fulfillment pain points firsthand. Saxena leads overall company strategy, investor
      relations, and public positioning, while Gulati oversees operations, technology,
      and product. Both founders remain actively involved in day-to-day leadership, an
      unusual retention for a company at ShipBob's stage. The company has grown its
      leadership team to include engineering, product, sales, and marketing executives,
      though individual C-suite names beyond the two founders are not consistently
      disclosed in public filings or press. The board includes Ajay Agarwal of Bain
      Capital Ventures, who joined as a board member after leading the Series E investment.
      Hyde Park Venture Partners participated in early rounds and is understood to hold
      a board observer or director seat from those investments. As a private company,
      ShipBob does not disclose full board composition, executive compensation, or
      governance documents. Key-person risk is elevated given the dual-founder structure
      and the founders' continued centrality to the brand, customer relationships, and
      product vision. ShipBob employed 501–1,000 people as of 2026, with 300+ in
      product and engineering, per LinkedIn and company communications.
    claimRefs: [CO005, CO006, CO007, CO008, CO009]
    tableRefs: [TO002]
    figureRefs: []

  - id: "funding-and-capital"
    title: "Funding and Capital Structure"
    body: >
      ShipBob has raised approximately $390 million in total venture capital across
      five rounds. The company's most recent round—a $200 million Series E in January
      2022—was led by Bain Capital Ventures and valued ShipBob at approximately
      $1.075 billion, making it a unicorn. Prior rounds include a Series D of $68 million
      (January 2021), a Series C of $40 million (2019), a Series B of $17.5 million
      (2018), and a Series A of $8.25 million (2017). Notable investors include
      SoftBank Vision Fund 2, Bain Capital Ventures, Hyde Park Venture Partners,
      and Menlo Ventures. The Series E capital was earmarked for international expansion,
      product investment, and fulfillment network build-out. As a late-stage private
      company operating post-Series E, ShipBob has not publicly pursued an IPO or
      disclosed SPAC discussions. Revenue, EBITDA, and path-to-profitability remain
      entirely private. The company's capital structure includes equity from all rounds
      with standard liquidation preferences. No convertible debt or structured credit
      facilities have been publicly disclosed, though such instruments are common at
      this stage for capex-heavy operations. Total funding to date places ShipBob
      among the top 10 most capitalized logistics-tech companies globally.
    claimRefs: [CO010, CO011, CO012, CO013, CO014]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: "milestones-and-scale"
    title: "Milestones and Scale"
    body: >
      Since its 2014 founding in a Chicago co-working space, ShipBob has grown from
      a single fulfillment center to 60+ global facilities spanning the US, Canada,
      UK, EU, Australia, and India. The company has fulfilled over 250 million orders
      for thousands of merchants, maintaining a 99.97% order accuracy rate and 99.6%
      on-time shipping rate as of 2026. Key milestones include achieving 2-day delivery
      coverage across the US (2020), launching international fulfillment (2021),
      crossing 10,000 active merchants, raising its Series E unicorn round (2022),
      expanding to India and Australia, and launching its Spring 2026 product release
      featuring the AI-powered ShipBob Promise delivery date engine and TrackBob
      branded tracking portal. The company integrates with 250+ platforms and retail
      partners. In spring 2026, ShipBob announced its "Fulfilled" merchant conference,
      signaling maturity as a brand and community builder. ShipBob's operational
      scale—measured in fulfillment centers, integrations, merchants served, and
      orders processed—positions it as one of the three largest independent 3PLs
      serving the DTC segment in North America alongside Shopify Fulfillment Network
      and ShipMonk. The company has not publicly disclosed employee count milestones,
      revenue growth, or unit economics over time.
    claimRefs: [CO015, CO016, CO017, CO018, CO019, CO020]
    tableRefs: [TO004]
    figureRefs: [FO003]

  - id: "product-and-business-model"
    title: "Product and Business Model"
    body: >
      ShipBob's business model combines transactional logistics revenue with recurring
      SaaS elements. Revenue is generated through per-order fulfillment fees, monthly
      storage fees per pallet or bin, receiving fees for inbound inventory, and
      add-on services (custom packaging, kitting, B2B fulfillment, international
      shipping, same-day delivery). Pricing is transparent and volume-based: receiving
      runs approximately $35/hour, storage approximately $40/pallet/month, and
      pick-and-pack begins at $0.30 per unit plus materials. The company recently
      added a WMS-as-a-service product that allows merchants to use ShipBob's
      proprietary warehouse management software in their own facilities, creating a
      SaaS revenue stream independent of fulfillment volume. ShipBob's 250+ integration
      partnerships with Shopify, Amazon, TikTok, BigCommerce, and others function as
      a distribution moat, making it the path-of-least-resistance 3PL for Shopify
      merchants in particular. The company also earns revenue from retail compliance
      programs (EDI-based B2B fulfillment for Target, Walmart, etc.) and international
      shipping surcharges. ShipBob's unit economics are not disclosed, but the model
      combines high-volume, lower-margin fulfillment with higher-margin SaaS and
      value-added services.
    claimRefs: [CO021, CO022, CO023, CO024, CO025]
    tableRefs: []
    figureRefs: []

