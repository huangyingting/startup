callouts:
  - calloutType: "strength"
    title: "Technology-First 3PL with Proprietary WMS"
    body: >
      ShipBob's proprietary warehouse management system (WMS) differentiates it from
      traditional asset-heavy 3PLs. The WMS handles real-time inventory tracking,
      order routing optimization, and now serves as a licensable SaaS product for
      external warehouses—creating a second revenue stream beyond fulfillment volume.
    claimRefs: [CO020, CO022]
  - calloutType: "strength"
    title: "Unicorn Validation with Top-Tier Investors"
    body: >
      A $200M Series E at $1.075B valuation led by Bain Capital Ventures and backed
      by SoftBank Vision Fund 2 validates ShipBob's market positioning and technology
      thesis at the highest tier of private market validation.
    claimRefs: [CO010, CO013]
  - calloutType: "risk"
    title: "Key-Person Concentration in Dual Co-Founders"
    body: >
      Both CEO Dhruv Saxena and President/COO Divey Gulati remain operationally central
      after 11 years. Departure of either founder would create significant strategic,
      operational, and investor-confidence disruption with no clear successor identified
      in public communications.
    claimRefs: [CO005, CO006]
  - calloutType: "risk"
    title: "Mixed Customer Satisfaction Signals"
    body: >
      Despite strong Shopify App Store ratings (4.7/5), ShipBob's G2 score is notably
      lower at 3.7/5, with reviewers citing billing disputes, order errors, and
      inconsistent customer support. FitSmallBusiness review confirms these concerns,
      representing a meaningful adverse signal for enterprise customer expansion.
    claimRefs: [CO026, CO027]
  - calloutType: "insight"
    title: "Revenue and Profitability Entirely Undisclosed"
    body: >
      As a private company, ShipBob has disclosed no revenue, ARR, EBITDA, or
      path-to-profitability data since its founding. This is the most material
      evidence gap in the diligence and prevents any assessment of financial
      sustainability or exit readiness.
    claimRefs: [CO028]

