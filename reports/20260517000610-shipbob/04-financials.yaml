          detail: "Racking, MHE, conveyors, dock equipment, WMS engineering; lease-amortized"
          tone: negative
        - id: "wc"
          label: "Working capital"
          detail: "Receivables cycle + carrier pre-funding + peak-season inventory"
          tone: negative
        - id: "opex"
