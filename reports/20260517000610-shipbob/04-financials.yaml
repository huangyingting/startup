      - ["Long-term storage surcharges", "Typically charged after 6–12 months inventory aging", "Indicative", "Industry-standard for 3PLs", "Likely list-priced", "Confirm whether ShipBob applies LTS surcharges and contribution"]
    notes: >
      ShipBob does not publish a standard rate card. All "list / indicative price" values are reviewer-reported,
      sales-material-inferred, or industry-standard for the tech-enabled 3PL category, and effective realized
