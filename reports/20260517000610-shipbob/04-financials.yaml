callouts:
  - id: "KI001"
    calloutType: "risk"
    title: "Every meaningful unit-economic input is private — judgment is gated by management diligence"
    body: >
      ShipBob has not disclosed revenue, ARR, gross margin, contribution margin, CAC, payback, NRR, GRR,
      active merchant count, FC utilization, cash, burn, or runway. The only public anchors are the
      $200M Series E at $1.075B (January 2022), the 2016 SEC Form D, and operating-scale proxies
      (~$390M+ raised, 40+ FCs, >250M cumulative orders, ~1,000+ headcount). An investor cannot
      underwrite without a CFO-level data room.
    claimRefs: [CI017, CI018, CI019]
  - id: "KI002"
    calloutType: "assumption"
    title: "List pricing is not realized economics"
    body: >
      ShipBob does not publish a standard rate card; the indicative figures in TI002 are
      reviewer-reported and sales-material-inferred. Effective price varies materially by SKU
      profile, order velocity, seasonality and merchant tier. Independent reviewers consistently
      note that billing reconciliation differs from initial quotes. Use list pricing only as a
      directional anchor, never as a margin proxy.
    claimRefs: [CI001, CI021]
  - id: "KI003"
    calloutType: "insight"
    title: "Capital-structure clock favors a 2026–2027 financing event"
    body: >
      The January 2022 Series E is now four years old; the broader logistics-tech cohort has seen
      30–60% Carta-implied secondary discounts; ShipBob's FC capex is structurally capital-hungry.
      The most likely next financing event is either (a) a sponsor-led debt-financed runway
      extension, (b) a primary plus secondary recap at a flat-to-down mark, or (c) a strategic
      sale to a transportation incumbent (Ryder, Maersk) or e-commerce platform.
    claimRefs: [CI015, CI016, CI020]
  - id: "KI004"
    calloutType: "recommendation"
    title: "Pull every SEC Form D and Form D/A as audit anchor"
    body: >
      ShipBob filed an original Form D in May 2016 (CIK 0001675807, accession 0001675807-16-000001).
      EDGAR is the only public, primary, time-stamped filing for ShipBob's capital raises. Reconciling
      every Form D amount to press-release totals is a low-cost, high-leverage diligence step that
      catches over-claimed equity raised, hidden secondary, or unannounced extensions.
    claimRefs: [CI018]
  - id: "KI005"
    calloutType: "strength"
    title: "Three monetization layers reduce single-stream concentration"
    body: >
      ShipBob earns transaction revenue (per-order fulfillment + carrier pass-through), value-added
      services revenue (B2B / freight / returns / kitting), and software revenue (WMS / Merchant
      Plus). Even without disclosed mix, the layered model insulates ShipBob from pure pick-and-pack
      pricing pressure and creates a software ARR lever investors should size in diligence.
    claimRefs: [CI002, CI003, CI004]

