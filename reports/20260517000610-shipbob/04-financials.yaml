company:
  name: "ShipBob"
chapter:
  number: 4
  title: "Financials"
  summary: >
    ShipBob is a private, undisclosed company with a transaction-based revenue model layered over
    a capital-intensive owned-and-partner fulfillment-center footprint. Public evidence supports
    three monetization streams — per-order fulfillment fees (the dominant revenue line), monthly
    storage and value-added services (kitting, returns, freight) and an emerging WMS / Merchant
    Plus software license. ShipBob does not publicly disclose revenue, ARR, gross margin, customer
    count or unit economics; the strongest public anchors are (a) the $200M Series E led by Bain
    Capital Ventures in January 2022 at a reported $1.075B post-money valuation (chronology
    discussed in detail in Company Overview) and (b) the May 2016 Form D filing by Shipbob, Inc.
    on EDGAR (CIK 0001675807). For underwriting, every meaningful financial input — gross margin,
    contribution margin per order, FC utilization, CAC payback, cash burn, runway — is private
    and gated by management diligence. ShipBob's published pricing (receiving + storage + pick &
    pack + carrier pass-through with no listed standard rate card) is list pricing, not realized
    economics. The capital structure is private-equity-style with a large preferred stack from
    Bain Capital Ventures, SoftBank Vision Fund 2, Menlo Ventures, Hyde Park Venture Partners and
    earlier investors; given the 2022 vintage of the last priced round, a markdown, primary-plus-
    secondary recap, debt-financed runway extension, or strategic sale is the most likely next
    financing event. Diligence should focus on cash on hand, monthly burn, the path from 2024–2025
    cost actions to break-even, and lender or sponsor covenants tied to FC capex.

sections:
  - id: "revenue-streams"
    title: "Revenue Streams and Monetization Model"
    body: >
      ShipBob's revenue model is transaction-led with three layered components. The dominant
      stream is per-order fulfillment fees billed monthly: receiving fees, monthly storage by
      pallet or bin, pick-and-pack per order with surcharges for additional units, and pass-through
      carrier postage at ShipBob-negotiated rates with an undisclosed mark-up. The second stream
      is value-added services — kitting and assembly, B2B retail-routing fulfillment, freight,
      returns processing (Happy Returns and native), peak-season surcharges and special projects
      — typically billed per occurrence. The third, smaller but strategic, stream is software:
      ShipBob WMS / Merchant Plus, a license offering that lets merchants run their own warehouse
      space on ShipBob's WMS, plus integration premium tiers. ShipBob does not publish its rate
      card; all pricing is quote-based and varies by SKU profile, order velocity and seasonality,
      so list pricing references should be treated as indicative only. ShipBob has not disclosed
      revenue mix between fulfillment, value-added services, and WMS, nor any rev-rec policy on
      onboarding fees, multi-year commitments or volume-tier rebates. Independent reviewers note
      that effective billing materially differs from initial quotes — a recurring complaint
      pattern that has both customer-experience and rev-rec implications.
    claimRefs: [CI001, CI002, CI003, CI004, CI005]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: "gtm-unit-economics"
    title: "GTM Motion, Unit Economics, and Cost Structure"
    body: >
      ShipBob's go-to-market is dominated by the Shopify App Store (4.7 / 5 from 300+ verified
      reviews) — the lowest-CAC merchant acquisition channel for DTC-native 3PLs — supplemented
      by paid search, inbound content marketing (ShipBob Blog ranks on dozens of fulfillment-
      related keywords), outbound mid-market sales, and partner-led integrations. The merchant
      sales cycle is short for SMBs (2–8 weeks) and longer for mid-market (3–6 months). ShipBob
      does not disclose CAC, payback, gross margin, contribution margin or net-revenue retention,
      so unit-economics work for diligence must be modeled top-down using publicly available
      pricing references and comparable-company benchmarks. The cost stack is heavy on COGS:
      warehouse labor, lease expense across 40+ FCs (mostly leased not owned), receiving and
      put-away, pick / pack consumables, returns processing, and pass-through carrier cost net
      of ShipBob's negotiated discount. Capex is largely lease-financed but new FC fit-outs
      (racking, MHE, conveyors, mezzanines, dock equipment) plus WMS / network engineering are
      capitalized. Working capital is sensitive to peak-season inventory ramp and merchant-
      receivables cycle. The platform-software cost structure (WMS, integrations, AI delivery
      promise) is SaaS-economic — high incremental margin — but it sits inside an asset-heavy
      operating company, so the blended gross margin is materially lower than a pure-software
      comp. Public-company comps for unit-economics triangulation include Stamps.com (legacy),
      ShipStation (now Auctane / Stamps.com), Flexport-Deliverr, FedEx Fulfillment legacy, and
      logistics-tech peers such as Coupang Fulfillment and JD Logistics on the global side.
    claimRefs: [CI006, CI007, CI008, CI009, CI010, CI011, CI012]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: "traction-capital-adequacy"
    title: "Public Traction, Capital Adequacy and Financing Path"
    body: >
      Public traction signals support a >250 million cumulative orders figure (ShipBob marketing),
      a fulfillment-center count of 40+ across US, UK, EU, Australia, and Canada, and headcount
      reported above 1,000 by third-party trackers (Growjo, LinkedIn). ShipBob has not disclosed
      revenue, ARR, GMV, merchant count by tier, FC utilization, or active-merchant churn —
      every one of these is private. Capital adequacy turns on the unallocated balance from the
      $200M Series E (January 2022, $1.075B post; Company Overview details the round-by-round
      chronology and we do not duplicate those ids here), supplemented by any subsequent debt
      facility (asset-based lender, equipment lease lines, or sponsor-backed venture debt). In
      the 2022–2024 window, the broader logistics-tech cohort saw markdowns at Deliverr / SFN,
      Convoy bankruptcy, and Stord secondary discounts of 30–60% on Carta-implied marks. Given
      the 2022 vintage of ShipBob's last priced round and the asset-heavy capex profile, the
      most likely next financing event is either (a) a flat-to-down primary plus secondary
      recap, (b) a sponsor-led debt-financed runway extension, or (c) a strategic sale to a
      transportation incumbent (Ryder, Maersk, FedEx) or platform (Shopify, Amazon — antitrust
      concerns notwithstanding). Two regulatory anchors should be tracked: ShipBob filed an
      original Form D on SEC EDGAR in May 2016 (CIK 0001675807, accession 0001675807-16-000001)
      and has periodically updated exempt-offering filings; an investor should pull every Form D
      and Form D/A amendment to triangulate disclosed capital raised vs. press-release totals.
    claimRefs: [CI013, CI014, CI015, CI016, CI017, CI018, CI019, CI020]
    tableRefs: [TI004, TI005]
    figureRefs: [FI003, FI004]

