company:
  name: "ShipBob"
chapter:
  number: 8
  title: "Valuation"
  summary: >
    Underwriting ShipBob in May 2026 is fundamentally an exercise in pricing
    a stale 2022 mark against four years of public-comparable multiple
    compression. The last publicly disclosed primary financing event was the
    January 2022 Series E at a $1.075B post-money valuation (Fortune,
    TechCrunch, BI; SEC EDGAR shows no post-2022 Form D). Since then, public
    asset-light logistics comparables have re-rated sharply: GXO Logistics
    and XPO Logistics now trade at single-digit EV/Revenue multiples
    (~0.4–0.8x trailing revenue per Macrotrends and StockAnalysis,
    referencing GXO's $10B+ revenue base and XPO's $8B+ trailing revenue),
    Stamps.com transacted at $6.6B in the 2021 Thoma Bravo take-private
    (Wikipedia / Thoma Bravo press) at a high single-digit EV/Revenue
    multiple, and venture-tier 3PL peers (ShipMonk, Flexport) have absorbed
    visible markdowns. The base case is that ShipBob's $1.075B mark is
    materially above where a 2026 primary round would clear absent a fresh
    capital event, and that the realistic entry zone for a secondary block
    or growth round is a 30–50% discount to the 2022 post-money. The
    recommendation is RESEARCH-MORE (track / conditional) pending a cap-
    table refresh, NDA-level revenue and gross margin disclosure, and
    confirmation that the gap is operating-cash funded rather than down-
    round avoidance. Three thesis-break triggers — a public down-round, a
    Shopify SFN expansion, or a Q4 SLA-breach cluster — would shift the call
    to pass.

sections:
  - id: "last-mark-vs-public-comps"
    title: "Last Mark vs. Public Comparable Multiples"
    body: >
      ShipBob's last publicly disclosed primary valuation is the January
      2022 Series E at $1.075B post-money on a reported ~$200M Series E
      financing led by Bain Capital Ventures with Menlo Ventures, Hyde Park
      Venture Partners, and SoftBank participation (Fortune, TechCrunch,
      Business Insider, Bain Capital Ventures portfolio page). The 2022
      mark capitalized a 2021 revenue base that public sources placed in
      the $100M–$200M range (Latka, Growjo, PitchBook profile), implying an
      enterprise-value-to-revenue multiple of roughly 5–10x at the peak.
      Public asset-light logistics comparables have repriced materially
      since: GXO Logistics (NYSE: GXO, the 2021 XPO spin-off and the
      cleanest 3PL pure-play comp at ~$10B+ trailing revenue) trades at
      under 0.8x trailing revenue per Macrotrends and StockAnalysis as of
      May 2026; XPO Logistics (NYSE: XPO, primarily an LTL freight carrier
      but a relevant scaled logistics multiple anchor at ~$8B+ trailing
      revenue) trades in a comparable low-single-digit EV/Revenue band per
      StockAnalysis; Stamps.com (the closest software-shipping comp, taken
      private by Thoma Bravo at $6.6B in October 2021 per Wikipedia)
      transacted at ~6x trailing revenue, which is now the high-water mark
      for the category. Maersk's 2022 acquisition of Pilot Freight Services
      (Wikipedia: Maersk) and the broader strategic-buyer footprint
      (Flexport's 2023 acquisition of Shopify Logistics / Deliverr per
      Wikipedia: Flexport; Saddle Creek's privately held scaled-3PL
      footprint per Wikipedia) anchor a strategic-acquirer multiple in the
      0.8–1.5x revenue range for asset-light fulfillment platforms. The
      composite read is that the 2022 5–10x ShipBob mark sits at a 4–8x
      premium to the 2026 public comp midpoint, which is the single largest
      underwriting tension in this report. The 2026 SEC EDGAR record
      confirms no post-2022 ShipBob Form D filing (efts.sec.gov full-text
      search), meaning the gap is either operating-cash funded — a positive
      that would justify holding the mark — or down-round avoidance, in
      which case the entry price needs to be discounted by 30–50% to clear.
      Diligence cannot disambiguate without an NDA-level cap-table refresh
      and revenue trajectory disclosure, which is the principal final
      diligence ask.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV007, CV008, CV009, CV010]
    tableRefs: [TV001, TV004]
    figureRefs: [FV003]

  - id: "revenue-multiple-framework"
    title: "Revenue Multiple Framework and Scenario Construction"
    body: >
      The valuation framework anchors on an EV/Revenue multiple bracketed
      by the 2026 public comparable set (GXO 0.4–0.8x, XPO 0.5–1.0x,
      Stamps.com 2021 take-private 6x as ceiling, ShipMonk private down-
      round per CB Insights as floor) and applied to a 2026 ShipBob
      revenue base inferred from public proxies (Latka, Growjo) and the
      analyst-market-data trajectory (CB Insights ecommerce logistics
      report, Grand View ecommerce fulfillment market sizing, IBIS 3PL
      industry report). The bear case assumes a $250M 2026 revenue base
      (consistent with low-end Latka trajectory and Q4 SLA-cluster customer
      churn), a 0.6x public-comp multiple, and a 40% down-round vs. the
      2022 $1.075B mark — implying a $150M EV and a $600M post-money on a
      new round. The base case assumes a $350M–$450M revenue base
      (consistent with mid-stage growth from the 2021 $100M–$200M Latka
      proxy, accounting for Spring 2026 Promise / WMS GA execution), a
      1.0–1.5x venture-premium multiple over the public comp midpoint, and
      a flat-to-30%-down mark — implying a $350M–$700M EV and a $750M–
      $1.1B post-money. The bull case assumes a $500M+ revenue base with
      sustained 30%+ YoY growth, a 2–3x revenue multiple reflecting
      Shopify channel premium and international FC footprint, and a held-
      at-mark or modest-mark-up scenario — implying $1.0B–$1.5B EV and a
      $1.2B–$1.8B post-money. The scenario probabilities are anchored on
      the public adverse-evidence cluster (Q4 SLA reviews on G2 / Trustpilot
      / BBB), the cap-table-gap signal, and the McKinsey logistics-tech
      perspective on platform consolidation. The valuation is highly
      sensitive to two inputs: (1) 2026 trailing revenue, which moves the
      EV linearly, and (2) gross margin trajectory, which the 3PL industry
      baseline (IBIS, CB Insights) anchors at 12–18% but ShipBob has not
      publicly disclosed. Both inputs require NDA-level diligence to
      finalize.
    claimRefs: [CV011, CV012, CV013, CV014, CV015, CV016, CV017, CV018, CV019, CV020]
    tableRefs: [TV002, TV003]
    figureRefs: [FV002]

  - id: "exit-paths-and-investability"
    title: "Exit Paths, Investability, and Final Diligence Asks"
    body: >
      ShipBob's investable exit paths are (a) IPO at the 2026–2028 window,
      contingent on demonstrated $500M+ revenue and double-digit positive
      EBITDA; (b) strategic-buyer acquisition by a scaled logistics player
      (GXO, XPO, Maersk, DHL Supply Chain, or a Saddle Creek / Ryder-style
      private operator) or by a platform partner (Shopify, Amazon, or
      TikTok / Bytedance commerce); or (c) sponsor-led recapitalization or
      secondary block by growth equity / private equity (Bain Capital
      Ventures roll-over, Thoma Bravo, Vista, etc.) consistent with the
      Stamps.com 2021 precedent. The most realistic 24-month path is (c) —
      a sponsor-led secondary or recap that clears a refreshed mark and
      provides liquidity to early-stage investors and employees — given the
      public-market multiple compression that makes (a) IPO uneconomic at
      the 2022 mark and (b) strategic acquisition typically discounts to
      the public comp band. The investability assessment is RESEARCH-MORE
      (track / conditional). The pass triggers are: (1) any public down-
      round vs. the 2022 $1.075B mark of >40%, (2) Shopify SFN expansion or
      App Store re-ranking that meaningfully erodes the ShipBob acquisition
      channel, (3) a public Q4 SLA-breach cluster of >2x baseline volume on
      G2 / Trustpilot / BBB, (4) any disclosed customer concentration
      above 25% from top-10, or (5) any security or data-breach disclosure.
      The buy triggers are: (1) NDA-level revenue trajectory confirming
      $400M+ 2026 revenue with >25% YoY growth, (2) gross margin
      disclosure at industry baseline or better (≥15%), (3) cap-table
      refresh confirming the 2022 mark is operating-cash funded rather than
      down-round avoidance, and (4) a secondary-block opportunity at a
      30%+ discount to the 2022 post-money mark. The final diligence asks
      are concentrated on financial disclosure (NDA-level revenue, gross
      margin, EBITDA, cash, debt, customer concentration, retention
      cohorts), cap-table refresh (current post-money, preference stack,
      dilution waterfall, employee option pool), and strategic-channel
      durability (Shopify SFN risk, TikTok Shop ramp, international FC
      utilization).
    claimRefs: [CV021, CV022, CV023, CV024, CV025, CV026, CV027, CV028, CV029, CV030]
    tableRefs: [TV005, TV006]
    figureRefs: [FV001, FV004]

