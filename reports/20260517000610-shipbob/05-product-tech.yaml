callouts:
  - id: "KE001"
    calloutType: "strength"
    title: "Dual-deployment WMS (in-house operations + merchant-licensable) is rare in the category"
    body: >
      ShipBob runs its proprietary WMS in 40+ owned and partner FCs and also licenses the same
      software to merchants under ShipBob WMS / Merchant Plus. This dual deployment is rare —
      ShipMonk, Stord and Red Stag do not productize their WMS as a merchant-side license, and
      Extensiv / ShipHero are software-only without ShipBob's owned-network operating
      experience. The dual deployment creates a software-revenue lever and a credibility moat
      around the WMS as a product, not just an internal tool.
    claimRefs: [CE003, CE004, CE020]
  - id: "KE002"
    calloutType: "strength"
    title: "Public developer surface plus 250+ integrations broaden distribution and reduce CAC"
    body: >
      developer.shipbob.com documents a structured REST + webhook surface, and the 250+
      integration breadth means most merchants do not have to write code to integrate ShipBob
      with their commerce stack. Combined with the Shopify App Store position (4.7/5, 300+
      reviews), this is the principal reason merchant CAC is presumed favorable vs. mid-market
      software peers — a product investment with direct go-to-market consequences.
    claimRefs: [CE008, CE010, CE021]
  - id: "KE003"
    calloutType: "risk"
    title: "Independent reviews flag billing reconciliation and peak-season accuracy as the principal product gaps"
    body: >
      G2 (4.1/5), Capterra (4.2/5), Software Advice and GetApp converge on a "good
      integrations + onboarding, mixed billing reconciliation + peak-season accuracy" pattern.
      Reddit and BBB complaint clusters reinforce that pattern, particularly for small-volume
      merchants at peak season. The Spring 2026 release notes reference billing and analytics
      improvements, indicating ShipBob is investing in this area, but independent evidence of
      improvement is not yet available.
    claimRefs: [CE018, CE019, CE022]
  - id: "KE004"
    calloutType: "insight"
    title: "ShipBob Promise is a real product investment, but adoption and accuracy data are not public"
    body: >
      The Spring 2026 launch of ShipBob Promise — an AI delivery-date engine attached to
      Shopify checkout — is a meaningful product differentiation versus ShipMonk, Stord and
      SFN. However, public evidence of merchant adoption percentage, delivery-date hit rate,
      and the consumer-conversion lift from Promise is not yet available. Diligence should
      explicitly ask for these three metrics to validate the moat narrative.
    claimRefs: [CE017, CE023]
  - id: "KE005"
    calloutType: "assumption"
    title: "Trust and compliance disclosures are present but light vs. enterprise SaaS norms"
    body: >
      ShipBob publishes a trust portal (trust.shipbob.com) and a public status page
      (status.shipbob.com), and references SOC 2 in customer materials. However, this fetch
      did not surface a published SOC 2 Type 2 report URL, a public bug-bounty program, a
      published API SLO, or a published order-accuracy SLA. Enterprise-mid-market merchant
      procurement teams will require these in NDA diligence — assume ShipBob can provide them
      privately, but treat their public absence as a diligence ask.
    claimRefs: [CE014, CE015, CE016, CE024]

