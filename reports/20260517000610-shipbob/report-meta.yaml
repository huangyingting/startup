  productSummary: >-
    ShipBob's core product is a tech-enabled ecommerce fulfillment platform combining a 60+ FC network with proprietary
    software (warehouse management, order orchestration, ShipBob Promise AI delivery-date prediction, TrackBob branded
    tracking, Merchant Plus licensable WMS for third-party warehouses, and B2B / EDI / freight services), integrated
    with 250+ ecommerce and retail platforms including Shopify, Amazon, TikTok Shop, WooCommerce, BigCommerce, and eBay.
  customerFocus: Direct-to-consumer and SMB ecommerce brands shipping 400 to 50,000+ orders per month across US, Canada, UK, EU, Australia, and India.
  businessModel: Tech-enabled 3PL with usage-based fulfillment pricing (receiving, storage, pick-and-pack) plus a licensable WMS for third-party warehouse operators and B2B / EDI / freight services.
  stage: Series E private company
