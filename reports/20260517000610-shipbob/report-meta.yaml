companyProfile:
  summary: >-
    ShipBob is a Chicago-headquartered, Y Combinator-backed (W2015) ecommerce fulfillment platform that operates a 60+
    fulfillment-center network across the United States, Canada, United Kingdom, European Union, Australia, and India,
    serving direct-to-consumer and SMB merchants shipping 400 to 50,000+ orders per month. Public evidence supports the
    operational scale and channel-partner footprint (Shopify, Amazon, TikTok Shop, BigCommerce, 250+ integrations) and a
    durable 2014–2022 financing history culminating in the January 2022 $200M Series E at a $1.075B post-money mark led
    by Bain Capital Ventures; revenue, gross margin, EBITDA, and any post-2022 valuation refresh are not publicly
    disclosed.
