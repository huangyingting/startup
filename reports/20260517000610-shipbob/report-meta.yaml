summary:
  headline: ShipBob has real operational scale and durable Shopify channel proof, but the stale 2022 mark against repriced 2026 public comps and undisclosed financials support research-more rather than a price-sensitive buy call.
  overallScore: 6.0
  recommendation: research-more
