callouts:
  - calloutType: "strength"
    title: "Secular DTC Tailwind Aligns with ShipBob's Core Segment"
    body: >
      US e-commerce grew to 16.4% of retail in 2025 and continues expanding. DTC brands—ShipBob's
      primary customers—are among the fastest-growing e-commerce segments. This secular shift creates
      organic demand without requiring ShipBob to change customer archetypes.
    claimRefs: [CM008, CM009]
  - calloutType: "risk"
    title: "Shopify Fulfillment Network Creates Existential Distribution Risk"
    body: >
      Shopify's acquisition of Deliverr (now part of Flexport) and development of its own Shopify
      Fulfillment Network (SFN) creates the risk that Shopify could bundle fulfillment natively,
      making ShipBob an unnecessary intermediary for its core SMB DTC customer segment.
    claimRefs: [CM016, CM017]
  - calloutType: "insight"
    title: "Market Size Figures Vary Widely Across Analysts"
    body: >
      Grand View Research, Mordor Intelligence, and IBISWorld publish conflicting TAM/SAM estimates
      for e-commerce fulfillment ranging from $96B to $450B. These differences reflect definitional
      disagreements, not independent market measurement. Investors should treat all analyst market
      size figures as directional estimates, not precise facts.
    claimRefs: [CM001, CM006]

