      - number: '1.4'
        title: Milestones and Scale
        blocks:
          - type: paragraph
            body: >
              Since its 2014 founding in a Chicago co-working space, ShipBob has grown from a single fulfillment center
              to 60+ global facilities spanning the US, Canada, UK, EU, Australia, and India. The company has fulfilled
              over 250 million orders for thousands of merchants, maintaining a 99.97% order accuracy rate and 99.6%
              on-time shipping rate as of 2026. Key milestones include achieving 2-day delivery coverage across the US
              (2020), launching international fulfillment (2021), crossing 10,000 active merchants, raising its Series E
              unicorn round (2022), expanding to India and Australia, and launching its Spring 2026 product release
              featuring the AI-powered ShipBob Promise delivery date engine and TrackBob branded tracking portal. The
              company integrates with 250+ platforms and retail partners. In spring 2026, ShipBob announced its
              "Fulfilled" merchant conference, signaling maturity as a brand and community builder. ShipBob's
              operational scale—measured in fulfillment centers, integrations, merchants served, and orders
              processed—positions it as one of the three largest independent 3PLs serving the DTC segment in North
              America alongside Shopify Fulfillment Network and ShipMonk. The company has not publicly disclosed
              employee count milestones, revenue growth, or unit economics over time.
