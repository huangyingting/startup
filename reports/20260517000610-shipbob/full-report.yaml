              subsequent debt facility (asset-based lender, equipment lease lines, or sponsor-backed venture debt). In
              the 2022–2024 window, the broader logistics-tech cohort saw markdowns at Deliverr / SFN, Convoy
              bankruptcy, and Stord secondary discounts of 30–60% on Carta-implied marks. Given the 2022 vintage of
              ShipBob's last priced round and the asset-heavy capex profile, the most likely next financing event is
              either (a) a flat-to-down primary plus secondary recap, (b) a sponsor-led debt-financed runway extension,
