  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Last Mark vs. Public Comparable Multiples
        blocks:
          - type: paragraph
            body: >
              ShipBob's last publicly disclosed primary valuation is the January 2022 Series E at $1.075B post-money on
              a reported ~$200M Series E financing led by Bain Capital Ventures with Menlo Ventures, Hyde Park Venture
              Partners, and SoftBank participation (Fortune, TechCrunch, Business Insider, Bain Capital Ventures
              portfolio page). The 2022 mark capitalized a 2021 revenue base that public sources placed in the
              $100M–$200M range (Latka, Growjo, PitchBook profile), implying an enterprise-value-to-revenue multiple of
              roughly 5–10x at the peak. Public asset-light logistics comparables have repriced materially since: GXO
              Logistics (NYSE: GXO, the 2021 XPO spin-off and the cleanest 3PL pure-play comp at ~$10B+ trailing
              revenue) trades at under 0.8x trailing revenue per Macrotrends and StockAnalysis as of May 2026; XPO
              Logistics (NYSE: XPO, primarily an LTL freight carrier but a relevant scaled logistics multiple anchor at
              ~$8B+ trailing revenue) trades in a comparable low-single-digit EV/Revenue band per StockAnalysis;
              Stamps.com (the closest software-shipping comp, taken private by Thoma Bravo at $6.6B in October 2021 per
              Wikipedia) transacted at ~6x trailing revenue, which is now the high-water mark for the category. Maersk's
              2022 acquisition of Pilot Freight Services (Wikipedia: Maersk) and the broader strategic-buyer footprint
              (Flexport's 2023 acquisition of Shopify Logistics / Deliverr per Wikipedia: Flexport; Saddle Creek's
              privately held scaled-3PL footprint per Wikipedia) anchor a strategic-acquirer multiple in the 0.8–1.5x
              revenue range for asset-light fulfillment platforms. The composite read is that the 2022 5–10x ShipBob
              mark sits at a 4–8x premium to the 2026 public comp midpoint, which is the single largest underwriting
              tension in this report. The 2026 SEC EDGAR record confirms no post-2022 ShipBob Form D filing
              (efts.sec.gov full-text search), meaning the gap is either operating-cash funded — a positive that would
              justify holding the mark — or down-round avoidance, in which case the entry price needs to be discounted
              by 30–50% to clear. Diligence cannot disambiguate without an NDA-level cap-table refresh and revenue
              trajectory disclosure, which is the principal final diligence ask.
            claimRefs:
