      - number: '8.2'
        title: Revenue Multiple Framework and Scenario Construction
        blocks:
          - type: paragraph
            body: >
              The valuation framework anchors on an EV/Revenue multiple bracketed by the 2026 public comparable set (GXO
              0.4–0.8x, XPO 0.5–1.0x, Stamps.com 2021 take-private 6x as ceiling, ShipMonk private down- round per CB
              Insights as floor) and applied to a 2026 ShipBob revenue base inferred from public proxies (Latka, Growjo)
              and the analyst-market-data trajectory (CB Insights ecommerce logistics report, Grand View ecommerce
              fulfillment market sizing, IBIS 3PL industry report). The bear case assumes a $250M 2026 revenue base
              (consistent with low-end Latka trajectory and Q4 SLA-cluster customer churn), a 0.6x public-comp multiple,
              and a 40% down-round vs. the 2022 $1.075B mark — implying a $150M EV and a $600M post-money on a new
              round. The base case assumes a $350M–$450M revenue base (consistent with mid-stage growth from the 2021
              $100M–$200M Latka proxy, accounting for Spring 2026 Promise / WMS GA execution), a 1.0–1.5x
              venture-premium multiple over the public comp midpoint, and a flat-to-30%-down mark — implying a
              $350M–$700M EV and a $750M– $1.1B post-money. The bull case assumes a $500M+ revenue base with sustained
              30%+ YoY growth, a 2–3x revenue multiple reflecting Shopify channel premium and international FC
              footprint, and a held- at-mark or modest-mark-up scenario — implying $1.0B–$1.5B EV and a $1.2B–$1.8B
              post-money. The scenario probabilities are anchored on the public adverse-evidence cluster (Q4 SLA reviews
              on G2 / Trustpilot / BBB), the cap-table-gap signal, and the McKinsey logistics-tech perspective on
              platform consolidation. The valuation is highly sensitive to two inputs: (1) 2026 trailing revenue, which
              moves the EV linearly, and (2) gross margin trajectory, which the 3PL industry baseline (IBIS, CB
              Insights) anchors at 12–18% but ShipBob has not publicly disclosed. Both inputs require NDA-level
              diligence to finalize.
