      - number: '1.3'
        title: Funding and Capital Structure
        blocks:
          - type: paragraph
            body: >
              ShipBob has raised approximately $390 million in total venture capital across five rounds. The company's
              most recent round—a $200 million Series E in January 2022—was led by Bain Capital Ventures and valued
              ShipBob at approximately $1.075 billion, making it a unicorn. Prior rounds include a Series D of $68
              million (January 2021), a Series C of $40 million (2019), a Series B of $17.5 million (2018), and a Series
              A of $8.25 million (2017). Notable investors include SoftBank Vision Fund 2, Bain Capital Ventures, Hyde
              Park Venture Partners, and Menlo Ventures. The Series E capital was earmarked for international expansion,
              product investment, and fulfillment network build-out. As a late-stage private company operating
              post-Series E, ShipBob has not publicly pursued an IPO or disclosed SPAC discussions. Revenue, EBITDA, and
              path-to-profitability remain entirely private. The company's capital structure includes equity from all
              rounds with standard liquidation preferences. No convertible debt or structured credit facilities have
              been publicly disclosed, though such instruments are common at this stage for capex-heavy operations.
              Total funding to date places ShipBob among the top 10 most capitalized logistics-tech companies globally.
