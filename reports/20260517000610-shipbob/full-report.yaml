      - number: '7.3'
        title: Partner, People and Financial Risk
        blocks:
          - type: paragraph
            body: >
              Partner, people, and financial risks are the third risk cluster and the area where dependency
              concentration is most material. On the partner side, ShipBob's operating model depends on a small number
              of structural counterparties: parcel and freight carriers (UPS, USPS, FedEx, DHL, regional LTL carriers);
              cloud platforms (AWS or equivalent hyperscaler hosting the platform, observable indirectly via DNS and
              developer documentation at developer.shipbob.com); the Shopify channel (which Chapter 6 identifies as the
              dominant inbound acquisition channel and a structural concentration risk if Shopify alters App Store
              mechanics or launches a competing fulfillment service); and Amazon Multi-Channel Fulfillment, which
              functions both as competitor and as partner for FBA-supplement merchants. ShipBob does not publicly
              disclose carrier mix, hyperscaler dependency, or Shopify channel revenue share. On the people side,
              ShipBob's senior leadership is relatively visible — CEO Dhruv Saxena, CFO/operating leadership, and named
              product leads (e.g., on the Promise launch) — but the company has not publicly disclosed CTO continuity,
              board composition, or key-person succession; LinkedIn and press signals indicate ongoing executive
              turnover during the 2024–2026 window which is normal for a late-stage private company but is a diligence
              ask. Headcount is estimated at ~600–1,000 based on LinkedIn-and-press triangulation; the labor pool for FC
              operations is hourly and exposed to local labor- market tightness in Cicero IL, Moreno Valley CA, Ontario
              CA, Pennsylvania, and the international FCs. On the financial side, the principal underwriting risk is
              cap-table opacity: the 2022 Series E valued ShipBob at $1.075B post-money, but no subsequent primary
              round, secondary mark, or down-round adjustment has been publicly disclosed in a four-year window through
              May 2026. Public Form D filings document historical financing but do not refresh the valuation mark.
              Capital intensity is structurally high for a 3PL — leased FC capex, WMS software amortization,
              working-capital float on inventory-and-freight receivables — and ShipBob does not publicly disclose burn
              rate, cash runway, or unit-economics. Bain Capital Ventures and other named investors continue to list
              ShipBob on portfolio pages but provide no mark refresh. The aggregate financial-risk picture is a
              materially-disclosable-but-undisclosed surface — the central financing and unit-economics evidence
              required to discount valuation properly is private, and the 2022-mark-to-2026-no-mark gap is itself a risk
              signal. Diligence should treat this gap as evidence of either successful operating cash generation
              (positive) or active down-round avoidance (negative) and request a 2026 cap-table refresh as a condition
              precedent.
