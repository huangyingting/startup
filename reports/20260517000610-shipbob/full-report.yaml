  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              ShipBob operates at the intersection of two large and growing markets: (1) third-party logistics (3PL)
              services for e-commerce merchants, and (2) logistics-technology software (WMS, order management, carrier
              integration). The broadest total addressable market (TAM) encompasses all global e-commerce fulfillment
              services—warehousing, pick-and-pack, last-mile, returns—estimated at $300–450B globally. The serviceable
              addressable market (SAM) narrows to US and international DTC/SMB e-commerce brands outsourcing fulfillment
              to technology-enabled 3PLs, estimated at $50–100B. ShipBob's serviceable obtainable market (SOM) is the
              subset of this that ShipBob can realistically win given its current network coverage and merchant
              profile—estimated at $5–15B based on merchant count and average revenue-per-merchant assumptions. The US
              Census Bureau reported total US e-commerce sales of $1.23 trillion in 2025, growing 5.4% year-over-year.
              E-commerce represented 16.4% of all US retail in 2025, up from 16.1% in 2024. This secular penetration
              growth is the primary structural tailwind for the fulfillment services market. ShipBob's core buyer—the
              independent DTC brand shipping 400–50,000 orders per month—represents a segment that is large, fragmented,
              and underserved by both Amazon (too expensive/complex) and legacy 3PLs (too manual, poor software).
              ShipBob's technology-first approach positions it as the Shopify of fulfillment for this cohort.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
