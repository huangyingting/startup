      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              ShipBob was co-founded by Dhruv Saxena (CEO) and Divey Gulati (President and COO), who met as MBA students
              and launched the company after experiencing e-commerce fulfillment pain points firsthand. Saxena leads
              overall company strategy, investor relations, and public positioning, while Gulati oversees operations,
              technology, and product. Both founders remain actively involved in day-to-day leadership, an unusual
              retention for a company at ShipBob's stage. The company has grown its leadership team to include
              engineering, product, sales, and marketing executives, though individual C-suite names beyond the two
              founders are not consistently disclosed in public filings or press. The board includes Ajay Agarwal of
              Bain Capital Ventures, who joined as a board member after leading the Series E investment. Hyde Park
              Venture Partners participated in early rounds and is understood to hold a board observer or director seat
              from those investments. As a private company, ShipBob does not disclose full board composition, executive
              compensation, or governance documents. Key-person risk is elevated given the dual-founder structure and
              the founders' continued centrality to the brand, customer relationships, and product vision. ShipBob
              employed 501–1,000 people as of 2026, with 300+ in product and engineering, per LinkedIn and company
              communications.
            claimRefs:
