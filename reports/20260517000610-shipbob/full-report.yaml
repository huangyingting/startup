  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, Legal, and Compliance Risk
        blocks:
          - type: paragraph
            body: >
              Public regulatory and legal surface for ShipBob in May 2026 is light relative to the company's operating
              footprint. A CourtListener search (https://www.courtlistener.com/?q=shipbob+inc&type=r and the broader
              ?q=shipbob query) returns no active federal docket entries naming ShipBob Inc as a principal party in
              litigation as of the May 2026 access date. The US Department of Justice Antitrust Division operations page
              lists no ShipBob-related antitrust proceeding, and the Consumer Product Safety Commission Recalls register
              surfaces no ShipBob-attributed recall activity. The Federal Register (unblock.federalregister.gov) and
              USPTO trademark search both return ordinary administrative records consistent with a private commercial
              entity — trademark filings under ShipBob Inc are present but no oppositions or cancellations of
              consequence are visible. SEC EDGAR full-text and company-name searches (efts.sec.gov + the
              cgi-bin/browse-edgar endpoints) return ShipBob Form D filings tied to historical Series A–E financing
              events but no registration statement and no post-2022 financing event, consistent with the 2022 Series E
              being the last publicly disclosed primary round. The Bureau of Labor Statistics industry register for
              NAICS 493 (Warehousing and Storage; bls.gov/iag/tgs/iag493.htm) and the FMCSA SAFER
              (safer.fmcsa.dot.gov/CompanySnapshot.aspx) and OSHA establishment-search
              (osha.gov/ords/imis/establishment.html) endpoints surface industry-baseline labor, motor-carrier, and
              workplace-safety registers but no ShipBob-specific enforcement entries visible from a public search. The
              aggregate read is a regulated-but-currently-quiet surface: no public litigation, no federal enforcement
              action, no SEC registration risk. The principal residual diligence asks are (a) state- level commercial
              litigation (delivery-loss claims, employment claims, and California wage-and-hour exposure given the
              Moreno Valley and Ontario FC footprint), (b) any privacy or breach-notification filings to state attorneys
              general, and (c) any non-public DOL/OSHA findings on the labor-intensive FC operations, since OSHA's
              public IMIS interface requires establishment-level lookups that the May 2026 fetch did not enumerate
              exhaustively.
