      - number: '6.3'
        title: Retention, Expansion, Concentration and Adverse Signal
        blocks:
          - type: paragraph
            body: >
              Public evidence on ShipBob's customer retention, expansion and concentration is thin. ShipBob has not
              publicly disclosed net revenue retention, gross revenue retention, churn, renewal rate, contract length,
              or customer concentration in 2026 fetch material; these private metrics are the principal underwriting
              blockers for a customer-side diligence assessment and are explicit diligence asks. The publicly observable
              expansion drivers are: (1) module attach — Promise AI delivery-date engine, freight, B2B / EDI, kitting,
              Express 2-day, returns — which take a customer from base-platform pricing to multi-line monetization; (2)
              geographic FC attach — merchants adding additional FCs (e.g., Our Place's 2 → 4 → 6 FC expansion) increase
              per-merchant revenue and unit economics in a structurally durable way; (3) Merchant Plus WMS license
              attach for brands that operate their own warehouse but adopt ShipBob's WMS; (4) channel attach via TikTok
              Shop, BigCommerce, Walmart, EDI / B2B retail routing. Adverse signal is concentrated in three independent
              surfaces: G2's lower-tier reviews (and Capterra / Software Advice / GetApp parallels) that flag
              billing-reconciliation opacity and peak-season order-accuracy failures; Trustpilot and BBB complaint
              clusters consistent with the same pattern, particularly for small-volume merchants; Reddit threads in
              r/ecommerce and r/shopify discussing churn from ShipBob to ShipMonk or to in-house fulfillment. None of
              the adverse surfaces produce a quantified churn signal that can be tied to a specific segment in 2026
              fetch material — adverse signal is qualitative and consistent rather than catastrophic. Customer
              concentration risk is unknown but bounded by the SMB-and-mid-market profile: ShipBob is unlikely to be
              ≥20% concentrated on a single customer given the long-tail SMB profile, but vertical concentration (e.g.,
              health-wellness, pet) could be material and is a diligence ask.
