      - number: '1.5'
        title: Product and Business Model
        blocks:
          - type: paragraph
            body: >
              ShipBob's business model combines transactional logistics revenue with recurring SaaS elements. Revenue is
              generated through per-order fulfillment fees, monthly storage fees per pallet or bin, receiving fees for
              inbound inventory, and add-on services (custom packaging, kitting, B2B fulfillment, international
              shipping, same-day delivery). Pricing is transparent and volume-based: receiving runs approximately
              $35/hour, storage approximately $40/pallet/month, and pick-and-pack begins at $0.30 per unit plus
              materials. The company recently added a WMS-as-a-service product that allows merchants to use ShipBob's
              proprietary warehouse management software in their own facilities, creating a SaaS revenue stream
              independent of fulfillment volume. ShipBob's 250+ integration partnerships with Shopify, Amazon, TikTok,
              BigCommerce, and others function as a distribution moat, making it the path-of-least-resistance 3PL for
              Shopify merchants in particular. The company also earns revenue from retail compliance programs (EDI-based
              B2B fulfillment for Target, Walmart, etc.) and international shipping surcharges. ShipBob's unit economics
              are not disclosed, but the model combines high-volume, lower-margin fulfillment with higher-margin SaaS
              and value-added services.
            claimRefs:
              - CO021
              - CO022
              - CO023
              - CO024
              - CO025
