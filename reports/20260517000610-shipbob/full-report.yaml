      - number: '3.2'
        title: Capability and Pricing Comparison
        blocks:
          - type: paragraph
            body: >
              On capability breadth, ShipBob, ShipMonk and Stord cluster as full-stack tech-enabled 3PLs with
              proprietary WMS, US plus international footprints (ShipBob and ShipMonk have the broadest international
              networks among independents), Shopify-certified apps, and explicit DTC vertical positioning. Amazon MCF
              offers the deepest US network and lowest per-unit pricing for FBA-resident inventory but lacks
              merchant-side branded packaging, slip-included customization, and DTC-grade software—merchants explicitly
              choose ShipBob over MCF when they need branded unboxing, two-day SLAs outside Amazon's Prime grid, and a
              single analytics pane across channels. Red Stag is the differentiated specialist for high-value, heavy, or
              fragile SKUs (sporting goods, electronics) with a published zero-shrinkage SLA; it does not compete
              head-to-head on apparel or consumables. Extensiv and ShipHero are software-first plays: Extensiv sells
              WMS, order management and inventory planning to both merchants and 3PLs (positioning ShipBob WMS as a
              direct competitor on the merchant-WMS license), while ShipHero operates limited owned fulfillment plus a
              SaaS WMS offered to other 3PLs. On pricing, every competitor in this segment uses a similar hybrid
              model—monthly minimums, receiving fees per box, storage fees per cubic foot or per pallet/bin,
              pick-and-pack fees per order plus per-additional-unit, and pass-through carrier rates with negotiated
              discounts. ShipBob does not publish a standard rate card and instead requires a quote; ShipMonk publishes
              order minimums and basic ranges; Amazon MCF publishes a per-unit rate sheet ($3.78–$10.61 standard size
              depending on weight in 2026); Red Stag publishes flat per-order pricing with included insurance.
              Independent reviews consistently note that effective price varies by mix, and that the simplest-looking
              rate card is rarely the cheapest after surcharges.
            claimRefs:
              - CP007
              - CP008
              - CP009
              - CP010
