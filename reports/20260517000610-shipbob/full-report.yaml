      - number: '8.3'
        title: Exit Paths, Investability, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              ShipBob's investable exit paths are (a) IPO at the 2026–2028 window, contingent on demonstrated $500M+
              revenue and double-digit positive EBITDA; (b) strategic-buyer acquisition by a scaled logistics player
              (GXO, XPO, Maersk, DHL Supply Chain, or a Saddle Creek / Ryder-style private operator) or by a platform
              partner (Shopify, Amazon, or TikTok / Bytedance commerce); or (c) sponsor-led recapitalization or
              secondary block by growth equity / private equity (Bain Capital Ventures roll-over, Thoma Bravo, Vista,
              etc.) consistent with the Stamps.com 2021 precedent. The most realistic 24-month path is (c) — a
              sponsor-led secondary or recap that clears a refreshed mark and provides liquidity to early-stage
              investors and employees — given the public-market multiple compression that makes (a) IPO uneconomic at
              the 2022 mark and (b) strategic acquisition typically discounts to the public comp band. The investability
              assessment is RESEARCH-MORE (track / conditional). The pass triggers are: (1) any public down- round vs.
              the 2022 $1.075B mark of >40%, (2) Shopify SFN expansion or App Store re-ranking that meaningfully erodes
              the ShipBob acquisition channel, (3) a public Q4 SLA-breach cluster of >2x baseline volume on G2 /
              Trustpilot / BBB, (4) any disclosed customer concentration above 25% from top-10, or (5) any security or
              data-breach disclosure. The buy triggers are: (1) NDA-level revenue trajectory confirming $400M+ 2026
              revenue with >25% YoY growth, (2) gross margin disclosure at industry baseline or better (≥15%), (3)
              cap-table refresh confirming the 2022 mark is operating-cash funded rather than down-round avoidance, and
              (4) a secondary-block opportunity at a 30%+ discount to the 2022 post-money mark. The final diligence asks
              are concentrated on financial disclosure (NDA-level revenue, gross margin, EBITDA, cash, debt, customer
              concentration, retention cohorts), cap-table refresh (current post-money, preference stack, dilution
              waterfall, employee option pool), and strategic-channel durability (Shopify SFN risk, TikTok Shop ramp,
              international FC utilization).
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
