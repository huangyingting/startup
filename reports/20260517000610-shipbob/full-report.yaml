      - number: '4.2'
        title: GTM Motion, Unit Economics, and Cost Structure
        blocks:
          - type: paragraph
            body: >
              ShipBob's go-to-market is dominated by the Shopify App Store (4.7 / 5 from 300+ verified reviews) — the
              lowest-CAC merchant acquisition channel for DTC-native 3PLs — supplemented by paid search, inbound content
              marketing (ShipBob Blog ranks on dozens of fulfillment- related keywords), outbound mid-market sales, and
              partner-led integrations. The merchant sales cycle is short for SMBs (2–8 weeks) and longer for mid-market
              (3–6 months). ShipBob does not disclose CAC, payback, gross margin, contribution margin or net-revenue
              retention, so unit-economics work for diligence must be modeled top-down using publicly available pricing
              references and comparable-company benchmarks. The cost stack is heavy on COGS: warehouse labor, lease
              expense across 40+ FCs (mostly leased not owned), receiving and put-away, pick / pack consumables, returns
              processing, and pass-through carrier cost net of ShipBob's negotiated discount. Capex is largely
              lease-financed but new FC fit-outs (racking, MHE, conveyors, mezzanines, dock equipment) plus WMS /
              network engineering are capitalized. Working capital is sensitive to peak-season inventory ramp and
              merchant- receivables cycle. The platform-software cost structure (WMS, integrations, AI delivery promise)
              is SaaS-economic — high incremental margin — but it sits inside an asset-heavy operating company, so the
              blended gross margin is materially lower than a pure-software comp. Public-company comps for
              unit-economics triangulation include Stamps.com (legacy), ShipStation (now Auctane / Stamps.com),
              Flexport-Deliverr, FedEx Fulfillment legacy, and logistics-tech peers such as Coupang Fulfillment and JD
              Logistics on the global side.
