chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Overview
        blocks:
          - type: paragraph
            body: >
              ShipBob, Inc. is a private, for-profit technology company headquartered at 120 N Racine Ave, Suite 100,
              Chicago, IL 60607. Founded in 2014, ShipBob provides end-to-end e-commerce fulfillment
              services—warehousing, pick-and-pack, shipping, and returns processing—backed by a proprietary software
              platform. The company's core product is a nationwide (and international) network of fulfillment centers
              that integrates with merchants' e-commerce storefronts (Shopify, Amazon, WooCommerce, TikTok Shop, eBay,
              and 250+ others) to automate order routing, inventory optimization, and last-mile shipping. ShipBob's
              value proposition is 2-day delivery anywhere in the continental US without merchants needing to own or
              operate their own warehouses. As a tech-forward 3PL (third-party logistics provider), ShipBob
              differentiates from traditional 3PLs through its merchant-facing SaaS dashboard, open API ecosystem, and
              real-time analytics. The company targets direct-to-consumer (DTC) brands shipping roughly 400–50,000
              orders per month, though enterprise and B2B programs extend that reach. ShipBob is incorporated as a
              Delaware C-corporation. Its operational headquarters and primary technology teams reside in Chicago, with
              distributed engineering and operations globally.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
