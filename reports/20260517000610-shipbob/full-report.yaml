            Merchant finds ShipBob via Shopify App Store, content (shipbob.com/blog), Google search, podcasts, referral,
            or sales outreach
          tone: positive
        - id: evaluation
          label: Evaluation
          detail: >-
            Merchant compares ShipBob vs. ShipMonk / Stord / Extensiv / FBA / in-house; reads case studies, requests
            quote
          tone: neutral
        - id: onboarding
          label: Onboarding
          detail: >-
            Merchant integrates Shopify / Amazon / channel, ships inventory to FC, configures dashboard, runs first
            orders
