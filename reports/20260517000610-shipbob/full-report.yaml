  - id: FU001
    title: Customer journey map — discovery → onboarding → operations → expansion
    type: journey-map
    summary: >
      End-to-end customer journey from initial discovery (Shopify App Store, content marketing, sales-led outreach)
      through onboarding, steady-state operations, and expansion via module / geographic / WMS attach.
    claimRefs:
      - CU002
      - CU003
      - CU024
      - CU026
      - CU027
    data:
      nodes:
        - id: discovery
          label: Discovery
