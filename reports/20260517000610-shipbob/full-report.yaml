      - number: '6.2'
        title: Named Customer Proof and Adoption Trajectory
        blocks:
          - type: paragraph
            body: >
              ShipBob's case-study library at shipbob.com/case-studies/ is the principal source of named customer proof,
              with publicly attested quantified outcomes for several named brands. Our Place reports $1.5M in
              freight-cost savings and a halving of delivery time (from 5–6 days to ~2.5 days) by expanding from 2 to 4
              ShipBob warehouses and uses 6 ShipBob FCs across US, Canada and Australia. Spikeball reports ~40%
              reduction in total fulfillment costs and $400K+ in postage savings by using ShipBob's automated WMS
              rate-shop. Bloom Nutrition reports operating a 9-figure-revenue ecommerce business with just 3 people on
              operations by relying on ShipBob as its single fulfillment partner. PetLab Co. attests to brand-
              consistency and customer-experience parity with the merchant's own operation. Additional named customers
              visible in ShipBob's library (verified at the case- studies index) include Boie USA, Touchland, Synchro,
              Bezoar, Wagsy, Manscaped's DTC fulfillment, and a long roster of beauty, wellness, pet and home-goods
              brands. Independent review surfaces (G2, Capterra, Software Advice, GetApp, Shopify App Store) corroborate
              adoption at scale: 300+ verified Shopify-App-Store reviews and 470+ aggregated independent reviews
              indicate active merchant adoption across the SMB and mid-market segments. Public adoption-trajectory
              metrics are not disclosed at the level of customer count, monthly merchant adds, or order volume in 2026;
              these are private metrics that must be requested under NDA. The 7,000+ merchant count and >1B units
