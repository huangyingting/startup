  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Modules and Operating Surface
        blocks:
          - type: paragraph
            body: >
              ShipBob's product portfolio is organized into four surfaces. (1) The merchant dashboard — a web app
              delivering inventory visibility, order management, returns workflow, billing reconciliation and analytics
              for a merchant operating across one or many ShipBob FCs. It is the primary daily-active surface for the
              merchant operator and the channel through which all multi-DC allocation, exception management and reorder
              workflows happen. (2) The proprietary warehouse-management system (WMS), which runs the in-FC receiving,
              putaway, pick, pack, ship, returns and cycle-count workflows on rugged handhelds plus operator
              workstations; the same WMS is now licensed externally as ShipBob WMS / Merchant Plus to brands that
              operate their own warehouse and want ShipBob's software without the fulfillment service. (3) The developer
              surface — public REST API, webhooks and SDKs documented at developer.shipbob.com, plus 250+ pre-built
              integrations across Shopify, Amazon, Walmart, TikTok Shop, BigCommerce, WooCommerce, Squarespace, EDI
              platforms and ERPs. (4) The value-added modules — B2B / EDI / retail-routing fulfillment, freight (LTL /
              FTL), returns (Happy Returns and native), kitting / assembly, ShipBob Promise (AI delivery-date engine;
              Spring 2026 GA), and Express 2-day shipping. These modules are monetized as either uplift to per-order
              pricing or as separate SaaS / per-occurrence lines. The asset that ties the modules together is a unified
              inventory and order ledger that lets a brand reorder, allocate, ship and report across any combination of
              FCs and sales channels without managing separate WMS instances per warehouse.
