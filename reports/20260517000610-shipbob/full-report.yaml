      - number: '5.3'
        title: Roadmap, Quality Signals, and Technical Differentiation
        blocks:
          - type: paragraph
            body: >
              ShipBob's stated 2026 roadmap centers on ShipBob Promise (AI delivery-date prediction at checkout),
              expanded WMS / Merchant Plus capabilities (kitting workflow, mezzanine and multi-FC support,
              carrier-rate-shop), TikTok Shop and BigCommerce premium integrations, and continued international FC
              expansion in Australia, Canada and the EU. The Spring 2026 release notes
              (shipbob.com/blog/spring-26-release/) document new analytics dashboards, improved billing reconciliation
              views, and AI-assisted inventory reorder recommendations. Independent customer-experience review data on
              G2 (~4.1 / 5, ~330 reviews), Capterra (~4.2 / 5, ~140 reviews), Software Advice and GetApp converge on a
              consistent pattern: integration breadth, onboarding ease and dashboard UX are strengths; billing
              reconciliation transparency and peak-season order-accuracy are the principal opportunity for product
              improvement. Reddit and BBB complaint clusters reinforce that pattern, particularly for small-volume
              merchants at peak season. ShipBob's technical differentiation versus the principal alternatives can be
              summarized as: (a) the combination of a publicly documented API plus 250+ integrations is broader than any
              single direct DTC 3PL peer and roughly on par with Extensiv (software-only); (b) the dual deployment of
              the WMS — in-house operations plus merchant-licensable — is rare in the category; (c) the
              Shopify-app-store distribution position (4.7/5, 300+ reviews) is the strongest in the category and
              translates directly to lower CAC; (d) the AI delivery promise engine is a real product investment that, if
              it executes on accuracy at scale, becomes a measurable consumer-conversion lever for merchants. The
              principal product gaps are (i) opaque billing presentation, (ii) peak-season operational accuracy at the
              tail of the merchant distribution, and (iii) limited public evidence of AI delivery-date hit-rate and
              Promise adoption metrics as of this fetch.
