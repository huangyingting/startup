  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Buyer Profile
        blocks:
          - type: paragraph
            body: >
              ShipBob's addressable customer is a Shopify-, Amazon- and TikTok-Shop-native DTC brand that ships consumer
              parcels to US, UK, EU, Australian or Canadian end customers. The buyer is typically the founder-operator
              or the COO / Head of Operations at an SMB or mid-market e-commerce brand; the user is the same role plus
              warehouse / fulfillment-operations staff in the merchant's organization (when ShipBob WMS / Merchant Plus
              is deployed in the merchant's own warehouse); the payer is the merchant brand. ShipBob's segmentation by
              buyer / user / payer converges on a small set of recurring profiles. (1) DTC SMB on Shopify — the long
              tail of customers acquired through the Shopify App Store (4.7 / 5, 300+ verified reviews), with monthly
              volumes ranging from low-hundreds to low-thousands of orders and revenue in the high-six to low-eight
              figures annually. (2) DTC scale-up — high-growth brands with $10M–$200M ARR that consolidate fulfillment
              with ShipBob across 2–6 FCs and use the multi-FC allocation, returns, kitting and Promise modules. (3)
              Omnichannel mid-market — brands using ShipBob Plus and / or B2B / EDI retail-routing modules to fulfill
              both DTC and wholesale orders. (4) Merchant Plus WMS licensee — brands that operate their own warehouse
              but adopt ShipBob's WMS to run it. (5) International / cross-border — UK, EU, AU, CA brands using regional
              ShipBob FCs to localize fulfillment. Vertical concentration in ShipBob's case-study library shows health
              and wellness, sporting goods, beauty, apparel and accessories, home goods, pet products, and
