      - number: '7.2'
        title: Operational, Technology and Security Risk
        blocks:
          - type: paragraph
            body: >
              Operational risk is the principal underwriting concern for ShipBob and the single largest driver of the
              adverse evidence cluster surfaced in Chapter 6. The risk surface has four layers. First, peak-season
              capacity and order-accuracy risk: independent reviewer surfaces (G2, Capterra, Trustpilot, BBB) and Reddit
              threads cluster consistently on Q4 / peak-season order accuracy and SLA breach reports, particularly for
              low-volume SMB merchants. ShipBob does not publicly disclose per-FC order accuracy, on-time-ship rate,
              mis-pick rate, or peak-vs- baseline SLA degradation. Second, status / uptime risk: the company maintains a
              public status surface at status.shipbob.com, which is the principal operational-transparency artifact, but
              the page does not publish historical SLA metrics or post-mortem incident logs. Third, security and data
              risk: ShipBob handles merchant-PII, end-customer- address, and inventory-financial data across hundreds of
              merchant Shopify, Amazon and TikTok-Shop integrations, plus operates Merchant Plus WMS in third-party
              warehouses, which materially expands the attack surface. trust.shipbob.com documents SOC 2 / ISO
              27001-class posture but no public breach-notification entries are visible in state-AG breach databases and
              no public CVE assignment is recorded against the ShipBob platform in 2026. Fourth, warehouse-safety and
              labor risk: the FC operations expose ShipBob to ordinary OSHA recordable-injury risk for
              warehouse-and-storage operators (BLS NAICS 493 baseline incident rate is materially above the all-industry
              average), but no establishment-level ShipBob OSHA citation entries are publicly visible. The aggregate
              operational picture is a meaningful, mostly-undisclosed residual risk: most operational SLA, security, and
              safety evidence requires NDA-level disclosure and the Spring 2026 Promise / WMS GA cycle is an active
              execution event that compounds operational risk during the underwriting window. Each of these four
              operational layers also has a measurable kill-criterion attached in Table TR005, so investors can convert
              opaque risks into trackable thesis-break triggers without waiting for ShipBob to publish operating data
              unilaterally.
