      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Largest independent multi-region FC network among DTC-focused 3PLs
            body: >
              ShipBob operates 40+ owned and partner fulfillment centers across the US, UK, EU, Australia and Canada —
              the broadest geographic footprint among independent tech-enabled DTC 3PLs. This footprint is
              capital-intensive to replicate and supports two-day US coverage plus international expansion for the kind
              of merchant ShipMonk, Stord and Red Stag each address only partially.
            calloutType: strength
            claimRefs:
              - CP002
              - CP015
          - type: callout
            title: Shopify Fulfillment Network bundling risk is the most acute competitive threat
            body: >
              Shopify's 2023 SFN-to-Flexport asset transfer and Flexport's Deliverr acquisition put a Shopify-aligned
              fulfillment operator inside Shopify's merchant onboarding flow. If Shopify bundles SFN/Flexport into core
              merchant plans or preferentially surfaces it in checkout configuration, ShipBob's lowest-cost acquisition
              channel — the Shopify App Store — could erode quickly. Diligence should monitor Shopify product changes
              that affect fulfillment-app discoverability and SFN merchant counts.
            calloutType: risk
            claimRefs:
              - CP016
              - CP021
          - type: callout
            title: No competitor wins on every buying axis — ShipBob's best edge is breadth
            body: >
              ShipMonk matches ShipBob on geographic spread but trails on software depth and reviews. Amazon MCF wins on
              per-unit cost but loses on branded DTC experience. Red Stag wins on heavy/bulky but cannot serve
              high-velocity consumables. Stord wins on enterprise. ShipBob's durable advantage is the combination of
              full-stack software, owned international FCs, Shopify-app distribution and licensable WMS — but each
              individual capability is contested.
            calloutType: insight
            claimRefs:
              - CP007
              - CP015
              - CP019
          - type: callout
            title: Independent reviews are a usable but imperfect proxy for service quality
            body: >
              G2 (4.1/5), Capterra (4.2/5) and Trustpilot (mixed) ratings consistently surface billing and peak-season
              accuracy complaints alongside positive integration and onboarding feedback. Reviews are biased toward
              extreme experiences and small-account merchants, but the complaint pattern is consistent across sources
              and across competitors (ShipMonk has similar issues), suggesting ShipBob is at category-typical service
              quality rather than meaningfully better or worse.
            calloutType: assumption
            claimRefs:
              - CP018
              - CP019
              - CP020
          - type: callout
            title: 'Diligence asks: SFN onboarding share, ShipBob NRR/GRR, and MCF loss-reason codes'
            body: >
              The three highest-leverage diligence questions are (1) what percentage of new Shopify merchants are
              onboarding into SFN/Flexport vs. ShipBob vs. other apps; (2) ShipBob's net and gross dollar retention plus
              cohort churn over the past 8 quarters; and (3) reason codes for merchants who evaluate ShipBob but choose
              Amazon MCF instead. These three data points would materially change the competitive durability assessment.
            calloutType: recommendation
            claimRefs:
