      - number: '5.2'
        title: Architecture, Integrations and Reliability Controls
        blocks:
          - type: paragraph
            body: >
              ShipBob's operating architecture is a cloud-hosted multi-tenant SaaS that orchestrates a physical network
              of 40+ FCs operated either directly or through partners. The core platform exposes a REST API, webhooks
              and OAuth authorization documented at developer.shipbob.com, supporting endpoints for products, inventory,
              orders, fulfillment, receiving orders, returns, locations and webhooks. Integrations into commerce
              platforms are bidirectional (order ingest plus tracking / inventory sync) and are split between
              ShipBob-built first-party connectors (Shopify, Amazon, Walmart, eBay, BigCommerce, etc.) and partner-built
              channels. The platform supports EDI for retail-routing fulfillment and ERP integrations (NetSuite, SAP /
              others) for mid-market and enterprise merchants. Carrier integrations span UPS, FedEx, USPS, DHL, Canada
              Post, Royal Mail, Australia Post and regional regional posts, with dynamic carrier selection based on
              cost, service level and destination. The platform's reliability is advertised via a public status page
              (status.shipbob.com) and security / compliance posture is communicated via a trust portal
              (trust.shipbob.com). Reliability and security disclosures are at the level expected for a mid-stage SaaS
              company — uptime statistics, planned-maintenance notices, and an attested compliance program covering SOC
              2 and other frameworks. The Spring 2026 release adds the ShipBob Promise AI delivery-date engine, which
              exposes a checkout widget for Shopify stores that displays a promised arrival date computed from FC
              inventory, carrier transit-time models and order-cutoff windows. Independent developer-experience evidence
              from public API documentation is consistent with category norms; there is no public bug- bounty program
              disclosure, no SOC 2 Type 2 report URL on the trust portal page surfaced in this fetch, and no published
              service-level objective for API latency or webhook delivery beyond general uptime.
