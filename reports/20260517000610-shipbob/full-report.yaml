      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The 2022 mark sits 4–8x above the 2026 public-comp midpoint — this is the binding underwriting tension
            body: >
              ShipBob's January 2022 Series E mark of $1.075B post-money capitalized a revenue base public sources put
              at $100M–$200M (Latka, PitchBook, Growjo), implying an EV/Revenue multiple of 5–10x at the peak. Public
              asset-light logistics comps have repriced sharply since: GXO trades at 0.4–0.8x and XPO at 0.5–1.0x
              trailing revenue per Macrotrends and StockAnalysis. The Stamps.com 2021 take-private at $6.6B / ~6x
              revenue is the high-water mark and is a 2021-vintage cycle peak. Underwriting must price this 4–8x premium
              tension explicitly.
            calloutType: insight
            claimRefs:
              - CV001
              - CV004
              - CV005
              - CV011
          - type: callout
            title: Four-year SEC Form D gap is the single largest cap-table risk signal
            body: >
              The SEC EDGAR full-text search (efts.sec.gov) returns no ShipBob Form D filing in the four years since the
              January 2022 Series E. This is either positive (operating-cash funded) or negative (active down-round
              avoidance via bridge / convertible / SAFE rather than priced primary). Diligence cannot disambiguate
              without an NDA-level cap-table refresh; this should be a condition precedent for any primary commitment.
            calloutType: risk
            claimRefs:
              - CV007
              - CV008
              - CV024
              - CV025
          - type: callout
            title: Multi-geo + ~40 FC footprint plus Shopify channel anchor a defensible base-case revenue floor
            body: >
              The ~40-FC footprint across five geographies and the durable Shopify App Store + Bain Capital Ventures
              portfolio framing anchor a base- case 2026 revenue floor that public proxies place in the $350M–$450M
              range. If the NDA-level revenue trajectory confirms this, the base- case 1.0–1.5x venture-premium multiple
              yields a $350M–$700M EV, consistent with a flat-to-modest-discount mark of $750M–$1.1B post- money — a
              viable secondary-block entry zone.
            calloutType: strength
            claimRefs:
              - CV013
              - CV014
              - CV017
              - CV020
          - type: callout
            title: Sponsor-led recap / secondary is the most realistic 24-month exit path
            body: >
              Public-market multiple compression makes a clean IPO uneconomic at the 2022 mark and strategic acquisition
              typically discounts to the public comp band. The most realistic 24-month path is a sponsor-led secondary
              or recap — consistent with the Stamps.com 2021 take-private precedent — that clears a refreshed mark and
              provides liquidity to early-stage investors and employees while keeping the platform independent.
            calloutType: assumption
            claimRefs:
              - CV021
              - CV022
              - CV026
              - CV029
