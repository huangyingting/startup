  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Monetization Model
        blocks:
          - type: paragraph
            body: >
              ShipBob's revenue model is transaction-led with three layered components. The dominant stream is per-order
              fulfillment fees billed monthly: receiving fees, monthly storage by pallet or bin, pick-and-pack per order
              with surcharges for additional units, and pass-through carrier postage at ShipBob-negotiated rates with an
              undisclosed mark-up. The second stream is value-added services — kitting and assembly, B2B retail-routing
              fulfillment, freight, returns processing (Happy Returns and native), peak-season surcharges and special
              projects — typically billed per occurrence. The third, smaller but strategic, stream is software: ShipBob
              WMS / Merchant Plus, a license offering that lets merchants run their own warehouse space on ShipBob's
              WMS, plus integration premium tiers. ShipBob does not publish its rate card; all pricing is quote-based
              and varies by SKU profile, order velocity and seasonality, so list pricing references should be treated as
              indicative only. ShipBob has not disclosed revenue mix between fulfillment, value-added services, and WMS,
              nor any rev-rec policy on onboarding fees, multi-year commitments or volume-tier rebates. Independent
              reviewers note that effective billing materially differs from initial quotes — a recurring complaint
              pattern that has both customer-experience and rev-rec implications.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
