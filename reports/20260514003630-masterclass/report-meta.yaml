companyProfile:
  summary: >
    MasterClass is a San Francisco-based online education platform founded in October 2014 by David Rogier and Aaron Rasmussen.
    It differentiates itself through celebrity and world-class instructor-led video courses spanning 11 categories including arts,
    business, music, and culinary. The platform raised $461M through a Series F at a $2.75B peak valuation in May 2021,
    but has faced significant headwinds since the post-COVID EdTech correction, including two rounds of layoffs in 2022-2023.
    The company is expanding into B2B (MasterClass at Work) and AI-powered features (MasterClass On Call) to diversify revenue.
