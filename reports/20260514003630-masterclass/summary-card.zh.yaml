  topStrengths:
    - 明星导师品牌无可比拟，消费者认知度高
    - 高品质内容与大众化平台拉开差异
    - B2B 扩张（MasterClass at Work）让收入不再只靠 B2C 订阅
    - AI 创新（MasterClass On Call）延展了导师价值主张
    - 多语言和全球覆盖能力强（15 种语言）
  topRisks:
    - 估值包袱沉重：2021 年峰值 $2.75B，对比当前估计 $275M-$1.1B 区间（Fidelity 减记）
    - 内容制作成本和明星费用高，挤压利润率并限制规模化
    - 后 COVID EdTech 调整：两轮裁员（20% + 13%）释放财务压力信号
    - 订阅者完课率低、自动续费投诉多，威胁留存和声誉
    - AI 冲击，以及 LinkedIn Learning（Premium 免费附带）、Coursera（证书）等竞争
    - IPO 路径不清晰；投资流动性差，退出时间线不确定
