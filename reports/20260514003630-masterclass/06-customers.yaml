figures:
  - id: FU001
    title: "Customer journey map"
    type: journey-map
    summary: >
      Six-stage customer journey for a MasterClass B2C subscriber, from celebrity-driven
      awareness through evaluation, subscription, onboarding, active learning, and renewal
      or churn decision. The journey highlights key acquisition surfaces, product experience
      moments, and the auto-renewal friction point that drives Trustpilot complaints.
    claimRefs: [CU001, CU002, CU003, CU006, CU018, CU019]
    data:
      nodes:
        - id: "awareness"
          label: "Awareness"
          detail: "Celebrity social media, gift from friend/family, word of mouth, organic search (instructor name), targeted digital ads"
        - id: "evaluation"
          label: "Evaluation"
          detail: "Browse instructor roster and course previews; read reviews on PCMag, TechRadar, or editorial sources; consider 30-day money-back guarantee"
        - id: "subscription"
          label: "Subscription"
          detail: "Choose tier: Standard ($120/yr), Plus ($180/yr), or Premium ($240/yr); enter payment details; auto-renewal enabled by default"
        - id: "onboarding"
          label: "Onboarding"
          detail: "Select first course; download iOS/Android app; optionally enable audio mode for commuting; access PDF workbook materials"
        - id: "active-learning"
          label: "Active Learning"
          detail: "Watch video lessons (6–20 min each); take notes; explore related instructors; try On Call AI (add-on); share account with household (Plus/Premium)"
        - id: "renewal-or-churn"
          label: "Renewal or Churn"
          detail: "Auto-renewal triggers at 12 months; satisfied learners renew passively; dissatisfied subscribers face cancellation friction — dominant Trustpilot complaint driver"

  - id: FU002
    title: "Adoption / deployment funnel"
    type: funnel
    summary: >
      Estimated B2C subscriber acquisition and retention funnel for MasterClass, from monthly
      website visitors through active subscribers to likely annual renewals. Values are order-of-
      magnitude estimates based on SimilarWeb traffic data and industry conversion benchmarks;
      MasterClass has not disclosed subscriber count or conversion rates. Funnel illustrates
      the significant drop-off at each stage and the scale of the retention challenge.
    claimRefs: [CU007, CU009, CU027, CU029]
    data:
      items:
        - label: "Monthly Website Visitors (est.)"
          value: 9000000
          detail: "SimilarWeb estimate; celebrity instructor brand drives organic search volume"
        - label: "Trial / Evaluation Intent (est.)"
          value: 450000
          detail: "~5% of visitors actively evaluate subscription; browse courses, read reviews"
        - label: "New Subscribers per Month (est.)"
          value: 90000
          detail: "~1% visitor-to-subscriber conversion estimated; annual subscription commitment lowers conversion"
        - label: "Active Engaged Learners (est.)"
          value: 54000
          detail: "~60% of new subscribers complete at least one course; engagement rate consistent with subscription entertainment norms"
        - label: "Annual Renewals (est.)"
          value: 36000
          detail: "~40% annual renewal rate estimated; consistent with Trustpilot complaint severity and industry subscription churn benchmarks"

  - id: FU003
    title: "Customer proof matrix"
    type: matrix
    summary: >
      Evidence quality assessment across four MasterClass customer categories on four
      diligence dimensions: evidence quality, outcome specificity, retention visibility,
      and deployment maturity. Ratings are qualitative based on available public documentation
      as of May 2026. The Deloitte enterprise case is the strongest but still relies on
      self-reported ROI. The B2C and gift categories have engagement signals but no
      longitudinal retention data.
    claimRefs: [CU011, CU012, CU014, CU015, CU021, CU027]
    data:
      columns:
        - "Evidence Quality"
        - "Outcome Specificity"
        - "Retention Visibility"
        - "Deployment Maturity"
      rows:
        - label: "Deloitte (Enterprise B2B)"
          values: ["Testimonial (company-claimed)", "High — 353% ROI claimed", "Opaque — no renewal or NRR data", "Production — deployed at scale"]
        - label: "Fortune 500 (unnamed, B2B)"
          values: ["Anecdotal — no names or cases", "None — no outcomes cited", "Opaque — no data", "Claimed production — unverified"]
        - label: "B2C Consumer (engaged)"
          values: ["Review aggregate (App Store 4.6/5, PCMag 4.5/5)", "Low — satisfaction, not skill outcomes", "Partial — app rating trend only", "Production — core consumer market"]
        - label: "Gift Subscription (B2C gifted)"
          values: ["No systematic evidence", "None — no outcome tracking", "Not visible — gifted accounts untracked", "Production — purchase flow active"]

  - id: FU004
    title: "Retention / repeat cohort"
    type: cohort
    summary: >
      Estimated B2C subscriber retention cohort for MasterClass across four time buckets,
      compared to a B2B At Work segment estimate and an industry eLearning benchmark. All
      values are estimates based on Trustpilot complaint severity, app store engagement data,
      industry benchmarks for subscription entertainment, and eLearning platform norms.
      MasterClass has not disclosed cohort retention data. These estimates are presented
      for diligence modeling and should be validated with actual company data.
    claimRefs: [CU018, CU019, CU027, CU028, CU029]
    data:
      columns:
        - "Month-1"
        - "Month-3"
        - "Month-6"
        - "Year-1 (Renewal)"
      rows:
        - label: "B2C Consumer (Estimated)"
          values: [88, 68, 52, 38]
        - label: "B2C Gift Subscription (Estimated)"
          values: [80, 55, 38, 22]
        - label: "B2B At Work (Estimated)"
          values: [93, 80, 68, 55]
        - label: "eLearning Industry Benchmark"
          values: [85, 65, 50, 40]

