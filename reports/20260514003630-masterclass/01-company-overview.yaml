  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: revenue and ARR
      missingEvidence: >
        MasterClass does not publicly disclose revenue, ARR, gross margin, or subscriber count.
        No analyst estimate with sufficient credibility has been found for 2026 figures.
      whyItMatters: >
        Without revenue trajectory data, it is impossible to assess growth rates, unit economics,
        or valuation multiples, which are the core inputs to any investment or M&A analysis.
      diligencePath: >
        Request management presentation with audited or reviewed financials; cross-reference with
        investor materials from known backers; seek secondary data from Pitchbook or Bloomberg estimates.
      relatedQuestionRefs: [QO018]

    - type: private-evidence-only
      severity: material
      topic: IPO plans and capital markets timeline
      missingEvidence: >
        No S-1 filing, no banker engagement, and no public commentary from MasterClass about IPO
        or liquidity event plans as of May 2026. Valuation has not been updated since May 2021.
      whyItMatters: >
        Investors holding equity from the 2021 Series F at $2.75B need a credible path to liquidity.
        The absence of an IPO signal combined with EdTech multiples contraction implies a potentially
        extended hold or below-peak exit.
      diligencePath: >
        Engage management directly; review shareholder agreements for redemption rights or forced
        registration provisions; check secondary market pricing via Forge, EquityZen, or Carta.
      relatedQuestionRefs: [QO019]

    - type: stale
      severity: minor
      topic: employee headcount post-layoff 2026
      missingEvidence: >
        The most recent reliable employee count is from CNBC's June 2022 report (~480 before
        the first layoff). After two layoff rounds (20% in June 2022 and ~13% in January 2023),
        estimated headcount is 300–400, but no official or news-source figure has been found for 2026.
      whyItMatters: >
        Headcount is a proxy for organizational capability, R&D investment, and cost structure;
        accuracy matters for operating leverage analysis and competitive bench-marking.
      diligencePath: >
        Check LinkedIn headcount data; request company disclosure; cross-reference job postings
        on MasterClass Careers page for active hiring areas.
      relatedQuestionRefs: [QO017]

    - type: missing-source
      severity: minor
      topic: AI product roadmap beyond MasterClass On Call
      missingEvidence: >
        Beyond the launch of MasterClass On Call ($15/month AI add-on using instructor voice models),
        no public roadmap, strategy document, or detailed press coverage of MasterClass's AI development
        plans has been identified for 2026.
      whyItMatters: >
        AI product differentiation is increasingly central to EdTech competitive positioning; understanding
        the roadmap is important for assessing whether On Call is a sustainable moat or a feature addition.
      diligencePath: >
        Review product release notes and press interviews with CEO David Rogier; check TechCrunch
        MasterClass tag for recent AI announcements; examine job postings for AI engineering roles.
      relatedQuestionRefs: [QO024]

    - type: enumeration-incomplete
      severity: minor
      topic: leadership and founder table governance undisclosed
      missingEvidence: >
        MasterClass's board composition, independent directors, investor board seats (especially for
        Series F and Series E investors), and detailed governance rights are not publicly disclosed.
        The leadership table is therefore partial.
      whyItMatters: >
        Board governance structure affects decision-making authority, strategic oversight, and exit
        mechanics; undisclosed board composition is a diligence gap for any investor or acquirer.
      diligencePath: >
        Request organizational and governance documents in a formal data room; check Delaware corporate
        filings for officer and director records; review investor rights agreements.
      relatedTableRefs: [TO002]
      relatedQuestionRefs: []

    - type: enumeration-incomplete
      severity: material
      topic: stakeholder or investor map cap table undisclosed
      missingEvidence: >
        The full cap table for MasterClass — including all early-round investors (Series A, B, C leads
        and participants), exact ownership percentages, and governance rights — is not publicly disclosed.
        The investor map can only reflect confirmed publicly named participants.
      whyItMatters: >
        Without cap table visibility, it is impossible to determine effective control, liquidation
        preferences, anti-dilution provisions, or the alignment of economic and governance interests
        among shareholders.
      diligencePath: >
        Request full capitalization table from management in data room; review shareholder agreements
        and investor rights agreements; cross-reference Pitchbook, Crunchbase for disclosed investor names.
      relatedTableRefs: [TO003]
      relatedQuestionRefs: []

