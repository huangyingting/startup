company:
  name: MasterClass
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    MasterClass is a San Francisco-based online education platform founded in October 2014 (incorporated
    as Yanka Industries Inc.) by David Rogier and Aaron Rasmussen. The platform offers video-based courses
    taught by world-renowned celebrities and domain experts across 11 content categories, available via
    annual subscriptions ($120–$240/yr for consumers; $180/seat for enterprise). The company raised
    approximately $461M through a $2.75B Series F in May 2021 and subsequently navigated two rounds of
    significant layoffs in 2022 and 2023 as the post-pandemic EdTech market contracted. As of May 2026,
    MasterClass remains privately held with no confirmed IPO timeline, an estimated post-layoff headcount
    of 300–400 employees, and an expanding AI-assisted product (MasterClass On Call) alongside its flagship
    subscription catalog of 200+ instructors and 3,500+ lessons.

sections:
  - id: identity-business-model
    title: "Identity and Business Model"
    body: |
      MasterClass is an online education platform headquartered at 660 4th Street, San Francisco, California
      94107. The company was incorporated in October 2014 as Yanka Industries Inc. and publicly launched its
      website on May 12, 2015, initially featuring classes from Dustin Hoffman, Serena Williams, and James
      Patterson. The core business model is a direct-to-consumer subscription: learners pay an annual fee to
      access an unlimited catalog of on-demand video lessons taught by recognized experts, celebrities, and
      public figures—ranging from Gordon Ramsay on cooking to Neil deGrasse Tyson on scientific thinking.

      Content spans 11 categories including arts and entertainment, business, culinary arts, film and TV,
      music, science and technology, sports and gaming, wellness, and writing. The platform features more
      than 200 instructors and more than 3,500 lessons as of 2025. MasterClass differentiates on production
      quality: courses are filmed cinematographically rather than in standard webcam format, which PCMag
      described as giving the platform a "near-perfect" visual and audio experience. However, The Atlantic
      and independent reviewers have raised whether the aspiration-heavy, entertainment-influenced format
      translates to measurable skill acquisition for subscribers.

      Three subscription tiers are available: Standard ($120/year), Plus ($180/year), and Premium ($240/year),
      with the Plus and Premium tiers offering expanded access and additional features. The platform is
      available in 15 languages, supporting international reach. MasterClass expanded its revenue streams
      beyond consumer subscriptions with MasterClass at Work, an enterprise B2B product priced at $180 per
      seat per year targeting corporate learning and development teams. In 2024–2025, the company introduced
      MasterClass On Call, an AI-powered product offering interactive question-and-answer sessions using
      audio modeled after instructor voices, available at $15 per month as an add-on.
    claimRefs: [CO001, CO002, CO003, CO004, CO007, CO008, CO025, CO026, CO027, CO028, CO029, CO030, CO031, CO032, CO033, CO034, CO035]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: founders-leadership
    title: "Founders, Leadership, and Governance"
    body: |
      MasterClass was co-founded by David Rogier and Aaron Rasmussen in October 2014. Rogier, who holds
      degrees from Stanford University and Harvard Business School, has served as CEO since the company's
      inception and remains in that role as of May 2026. Rasmussen, who brought technical and design
      expertise to the founding team, departed the company in January 2017, approximately two years after
      the public platform launch, citing personal reasons. The departure did not trigger any publicly
      reported disruption to operations or fundraising.

      As of 2026, the executive leadership team is led by David Rogier as CEO, Valen Tong as Chief Financial
      Officer, David Schriber as Chief Marketing Officer, and Len Amato as Chief Content Officer. Amato, a
      former HBO Films president, brings significant entertainment-industry relationships that are critical
      to recruiting high-profile instructors. Key-person dependency is concentrated in Rogier (strategy,
      vision, investor relationships) and Amato (instructor recruitment pipeline). MasterClass is a
      privately held company and does not publicly disclose its board composition, investor governance
      rights, or cap table. No material adverse executive departures have been publicly reported beyond
      Rasmussen's 2017 exit. The company's governance structure remains opaque to outside observers,
      which is characteristic of private companies at this stage.
    claimRefs: [CO005, CO006, CO009, CO010, CO011, CO012]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding-capital
    title: "Funding History, Investors, and Capital Structure"
    body: |
      MasterClass has raised approximately $461 million in equity financing across six rounds from 2014
      through May 2021. The earliest disclosed financing was a seed round of approximately $1.9 million.
      The company then raised a $15 million Series A in 2016, a $35 million Series B in 2017, and an
      $80 million Series C in 2018 as it expanded its instructor roster and invested in production infrastructure.
      In May 2020, MasterClass raised a $100 million Series E led by Fidelity Investments, benefiting from
      elevated demand for at-home digital entertainment and learning during the COVID-19 pandemic. The Series E
      valued the company at approximately $800 million, reflecting rapid subscription growth.

      The culminating round was a $225 million Series F in May 2021, announced via GlobeNewswire press release,
      which valued MasterClass at $2.75 billion and positioned it among the most highly valued EdTech companies
      globally at that time. The Series F was led by institutional investors with Fidelity Investments
      participating as a continuing backer. As of May 2026, no re-valuation event, secondary transaction, or
      additional fundraising round has been publicly disclosed, meaning the $2.75 billion figure remains the
      most recent public valuation, though the EdTech market contraction of 2022–2023 likely compressed
      implied multiples. Pitchbook tracks MasterClass as a private company with total disclosed equity
      financing of approximately $461 million. The company has not disclosed debt financing, credit facilities,
      or revenue figures publicly.
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO036, CO037]
    tableRefs: [TO003, TO004]
    figureRefs: [FO001]

  - id: milestones-market-adverse
    title: "Milestones, Market Context, and Adverse Events"
    body: |
      MasterClass's operational history includes several significant adverse events alongside its growth
      milestones. In late 2017, the company removed a class taught by actor Kevin Spacey following credible
      sexual assault allegations, marking one of the first high-profile instances of celebrity instructor
      controversy for the platform. This established a precedent for content governance risk inherent to
      MasterClass's instructor-dependent model. In June 2022, the company laid off approximately 20% of its
      workforce—roughly 96 employees from a base of approximately 480—as CNBC reported, citing a pullback
      in subscription growth following the pandemic-era demand surge. In January 2023, MasterClass conducted
      an additional reduction of approximately 13% of its remaining staff, as reported by The Guardian,
      reflecting ongoing cost pressure in a challenging fundraising environment for EdTech companies.

      Despite these challenges, MasterClass won Webby Awards in both 2020 and 2021, recognizing the quality
      of its digital experience. The global EdTech market, estimated by HolonIQ at significant multi-billion
      dollar scale with strong growth projections, provides a favorable long-term backdrop, though near-term
      competitive intensity is high. Key competitors include Coursera (148M+ learners globally), Udemy
      (large skill-based library), LinkedIn Learning (exceeded 1 billion learner hours in 2024), and
      Skillshare (creative skills focus). MasterClass is differentiated by celebrity-brand instructors and
      premium production but is competitively disadvantaged on breadth of vocational and certification
      content. Trustpilot reviews are mixed, with some users praising content quality but others criticizing
      subscription value relative to price. SimilarWeb tracks significant monthly web traffic to
      masterclass.com, though specific figures fluctuate and are estimates.
    claimRefs: [CO020, CO021, CO022, CO023, CO024, CO038, CO039, CO040, CO041, CO042, CO043, CO044, CO045]
    tableRefs: []
    figureRefs: [FO002]

