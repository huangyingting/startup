  callouts:
    - type: risk
      title: "FTC Negative Option Rule — Immediate Compliance Risk"
      body: >
        MasterClass's Trustpilot complaint pattern (1.6/5, 1,000+ reviews, dominant themes: auto-renewal,
        cancellation friction, refund denial) maps directly to practices prohibited under the FTC's 2023
        Negative Option Rule (effective 2024). The penalty exposure — up to $51,744 per violation per day
        — and class-action overlay under California ARL make this the most operationally urgent risk.
        A legal UX audit of the cancellation and renewal disclosure flow should be a pre-investment condition.

    - type: risk
      title: "Valuation: Investor Marks Imply 80–90%+ Write-Down From 2021 Peak"
      body: >
        Fidelity NPORT-P SEC filings from early 2026 value Yanka Industries preferred shares at
        approximately $58–96M combined — compared to a $2.75B peak valuation in 2021, this implies
        write-downs of 80–90% or more at investor fair value. Combined with no new funding since 2021
        and two rounds of layoffs, the company appears to be managing through a significant post-peak
        correction. Any new investment entry should be price-disciplined relative to current investor marks,
        not the 2021 headline.

    - type: risk
      title: "AI Substitution: MasterClass's Moat Requires Re-Underwriting"
      body: >
        MasterClass's core differentiation — exclusive celebrity-instructor content at Hollywood
        production quality — is increasingly replicable by generative AI. MasterClass itself launched
        AI On Call (voice-based AI instructor simulation) in 2024, which signals the company understands
        the threat. But the same tools available to well-funded AI EdTech startups could approximate
        the form factor without the exclusivity contracts. The celebrity moat requires active assessment
        against the AI competitive trajectory over any 3–5 year hold period.
