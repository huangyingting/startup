  evidenceGaps:
    - id: EGR001
      type: private-evidence-only
      severity: blocking
      topic: "Cash runway and burn rate as of 2026"
      description: >
        MasterClass has not disclosed its current cash balance, monthly burn rate, or runway.
        The last confirmed external funding was the May 2021 Series F ($225M). Without audited
        financials or a voluntary disclosure, burn rate and runway cannot be independently verified.
        This is the most critical financial diligence gap.
      diligencePath: >
        Request audited or reviewed financial statements for FY2022–2025; request CFO presentation
        on runway and capital adequacy; review board minutes for capital-allocation decisions.
      relatedTableRefs: [TR004]

    - id: EGR002
      type: private-evidence-only
      severity: blocking
      topic: "FTC and California AG complaint history and any pending enforcement actions"
      description: >
        No confirmed FTC enforcement action or civil investigative demand against MasterClass has
        been identified, but the FTC Consumer Sentinel complaint database is not fully public.
        The company has not disclosed any pending regulatory investigation. Given the Trustpilot
        complaint profile and BBB 'F' rating, the absence of evidence is not evidence of absence.
      diligencePath: >
        Request legal counsel to run FTC Consumer Sentinel search for MasterClass (Yanka Industries);
        PACER search for federal civil filings; CA AG enforcement database search; confirm no CID received.
      relatedTableRefs: [TR001]

    - id: EGR003
      type: private-evidence-only
      severity: material
      topic: "Instructor contract terms — morality clauses, exclusivity, and AI voice usage rights"
      description: >
        The terms of MasterClass's instructor contracts — including morality clause provisions,
        exclusivity periods, content removal triggers, and AI voice synthesis rights — are not
        publicly disclosed. The Kevin Spacey precedent established that content can be removed
        rapidly, but no formal protocol or insurance arrangement has been confirmed.
      diligencePath: >
        Request sample instructor contract for legal review; confirm morality clause scope and
