figures:
  - id: FR001
    title: "Risk Heatmap"
    type: matrix
    layout: wide
    summary: >
      Likelihood versus impact assessment of MasterClass's primary risks as of May 2026, based on
      public evidence. Risks are placed by qualitative scoring: likelihood reflects observable signals
      (complaint volume, layoff depth, regulatory enforcement trends); impact reflects revenue, brand,
      regulatory, and investor consequences. Cells in the upper-right quadrant (high likelihood, high
      impact) represent the most urgent investment risks.
