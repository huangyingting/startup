      as of May 2026. Valuation has not been updated since May 2021.
    whyItMatters: >
      Investors holding equity from the 2021 Series F at $2.75B need a credible path to liquidity. The absence of an IPO
      signal combined with EdTech multiples contraction implies a potentially extended hold or below-peak exit.
    diligencePath: >
