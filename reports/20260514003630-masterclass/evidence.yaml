  - type: private-evidence-only
    severity: material
    topic: revenue and ARR
    missingEvidence: >
      MasterClass does not publicly disclose revenue, ARR, gross margin, or subscriber count. No analyst estimate with
      sufficient credibility has been found for 2026 figures.
    whyItMatters: >
      Without revenue trajectory data, it is impossible to assess growth rates, unit economics, or valuation multiples,
      which are the core inputs to any investment or M&A analysis.
    diligencePath: >
      Request management presentation with audited or reviewed financials; cross-reference with investor materials from
      known backers; seek secondary data from Pitchbook or Bloomberg estimates.
