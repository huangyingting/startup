  - type: financial
    title: No Public ARR or Revenue Disclosure Since May 2021
    relatedQuestionRefs:
      - QV003
      - QV018
      - QV017
    body: >
      MasterClass has not disclosed annual recurring revenue, subscriber count, churn rate, or any financial operating
      metrics in any public document since the May 2021 Series F press release. This is the single most material gap in
      the valuation analysis; all revenue estimates in this chapter are triangulated from pricing, headcount benchmarks,
      and comparable company data. Direct disclosure would narrow the base case valuation range from $400M+ to
      approximately $100M.
  - type: financial
    title: Cap Table and Preference Stack Undisclosed
    relatedQuestionRefs:
      - QV021
    body: >
      The full capitalization table — including number of shares per round, liquidation preferences, anti-dilution
      provisions, and participation rights — has not been publicly disclosed. With $461 million raised across multiple
      rounds, the preference overhang is likely significant. Without this information, return modeling for any exit
      scenario below $800 million is highly uncertain.
  - type: risk
    title: 'Valuation: Investor Marks Imply 80-90%+ Write-Down From 2021 Peak'
    relatedQuestionRefs:
      - QV005
      - QV026
    body: >
      Fidelity NPORT-P SEC filings from early 2026 for CIK 722574 and CIK 819118 reflect Yanka Industries (MasterClass)
      at a significantly marked-down carrying value from the $2.75 billion Series F peak. This implies write-downs of
      80-90% or more at investor fair value. Combined with no new funding since May 2021 and two rounds of layoffs
      totaling approximately 33% of peak headcount, the company appears to be managing through a significant post-peak
      correction. Any new investment entry should be price-disciplined relative to current investor marks, not the 2021
      headline.
  - type: financial
    title: MasterClass at Work B2B Traction Data Unavailable
    relatedQuestionRefs:
      - QV018
      - QV030
    body: >
      MasterClass at Work (enterprise B2B product, launched 2022) has not disclosed customer count, enterprise ARR, or
      any revenue contribution in any public document. No analyst firm has published a confirmed estimate. LinkedIn job
      postings suggest an active B2B sales team, but conversion data, deal size, and retention are entirely unknown.
      Given that B2B ARR above $50 million is the primary driver of the bull case, this gap is material to valuation.
  - type: risk
    title: 'AI Substitution: MasterClass''s Moat Requires Re-Underwriting'
    relatedQuestionRefs:
      - QV023
    body: >
      MasterClass's core differentiation — exclusive celebrity-instructor content at high production quality — faces
      medium-term pressure from generative AI. MasterClass itself launched AI On Call (voice-based AI instructor
      simulation) in 2024, signaling awareness of the threat. The same tools available to well-funded AI EdTech startups
      could approximate the form factor without exclusivity contracts. The celebrity moat requires active assessment
      against the AI competitive trajectory over any 3-5 year hold period.
  - type: data-gap
    title: 'Comparable Valuation Table: Private Company Data Estimated or Stale'
    relatedTableRefs:
      - TV004
    relatedQuestionRefs:
      - QV014
      - QV028
    body: >
      The comparable valuation table (TV004) includes private company estimates (Skillshare, MasterClass current) and
      one distressed/bankrupt company (2U/edX) for which no current trading data exists. Skillshare's last disclosed
      valuation was in 2021 and has not been updated; its actual current implied value is unknown. MasterClass's current
      estimated valuation is derived from Fidelity NPORT-P filings and revenue triangulation, not from a direct market
      transaction. The table presents partial coverage of the full EdTech competitive landscape and excludes Indian and
      Chinese EdTech companies (Byju's, BYJU's successors, NetEase Youdao) which operate in different regulatory and
      market contexts.
