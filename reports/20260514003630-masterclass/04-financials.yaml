  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: ARR and subscriber count
      missingEvidence: >
        MasterClass has never disclosed revenue, ARR, or subscriber count publicly. The $125–165M ARR
        estimate for 2022 is derived from independent analyst research; no official confirmation exists.
        2026 figures remain entirely undisclosed.
      whyItMatters: >
        Without confirmed revenue and subscriber trajectory, it is impossible to compute growth rates,
        validate the pricing model, or assess whether the B2C subscription business is scaling or
        declining. This is the single most significant gap in Chapter 4.
      diligencePath: >
        Request audited financials or management-prepared financials; obtain board-approved financial
        plan or investor materials; cross-reference with Pitchbook consensus estimates or Bloomberg
        Secondary Research if available.
      relatedQuestionRefs: [QI005]

    - type: private-evidence-only
      severity: material
      topic: customer acquisition cost (CAC)
      missingEvidence: >
        MasterClass does not disclose marketing spend, customer acquisition cost, or new subscriber
        count per period. CAC estimates of $40–$100 are inferred from industry benchmarks and
        anecdotal reports; no primary source confirms this range.
      whyItMatters: >
        CAC is a core LTV/CAC ratio input; without it, the fundamental unit economics of the business
        are unverifiable. High celebrity marketing spend could make the CAC uneconomical even at $120+
        ARPU.
      diligencePath: >
        Request S&M expense line from financials; review Facebook/Google Ads attribution data if
        accessible; seek commentary from former MasterClass marketers or growth leads via LinkedIn.
      relatedQuestionRefs: [QI006]

    - type: private-evidence-only
      severity: material
      topic: annual subscriber churn rate
      missingEvidence: >
        MasterClass has not disclosed annual subscriber churn, renewal rates, or cohort retention.
        Category-level estimates for aspirational learning platforms suggest 30–50%+ annual churn,
        but no primary data confirms MasterClass's actual rate.
      whyItMatters: >
        Churn is the denominator in LTV calculations; high churn would compress the recurring revenue
        model and force continuous re-acquisition spend, undermining the economics of the $800M+
        raised to date.
      diligencePath: >
        Request cohort retention data in data room; review NPS scores or subscriber testimonials in
        press coverage; seek former employee disclosure via diligence interviews.
      relatedQuestionRefs: [QI007]

    - type: missing-source
      severity: minor
      topic: Series F round lead investor
      missingEvidence: >
        The Series F investor syndicate is not fully confirmed. Fidelity's NPORT-P filings confirm
        Fidelity held Series F preferred shares, but the identity of the lead investor and complete
        syndicate terms (interest, warrants, ratchets) have not been publicly disclosed.
      whyItMatters: >
        Knowing the lead investor helps assess governance influence, potential board composition,
        and whether liquidation preferences were structured with investor-favorable ratchets that
        affect common equity in a down-round scenario.
      diligencePath: >
        Check Delaware Secretary of State filings for Series F preferred stock certificate of
        incorporation amendments; review SEC EDGAR for any additional NPORT-P filings from other
        mutual fund families; consult Pitchbook or CB Insights for deal-level data.
      relatedQuestionRefs: [QI010]

    - type: private-evidence-only
      severity: material
      topic: cash position and monthly burn rate
      missingEvidence: >
        MasterClass has not disclosed any balance sheet data, cash position, or burn rate. Estimates
        of $30–60M annual burn and 6–24 months runway are highly speculative; the company's actual
        financial position is unknown as of May 2026.
      whyItMatters: >
        A company that has burned through most of its $461M+ raised without achieving profitability
        faces a binary outcome: raise more capital (potentially at lower valuation) or achieve
        cash flow break-even. Investors need this data to assess existential risk.
      diligencePath: >
        Request most recent management accounts; review bank covenant disclosures if any credit
        facility exists; seek guidance from former CFO or finance team via diligence interviews.
      relatedQuestionRefs: [QI011]

