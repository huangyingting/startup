      - number: '7.4'
        title: 技术、AI 颠覆与平台风险
        blocks:
          - type: paragraph
            body: >
              从长期看，生成式 AI 是对 MasterClass 竞争护城河最具结构性威胁的风险。MasterClass
              的差异化建立在两根支柱上：（1）独家触达在各自领域拥有真实造诣的名人讲师；（2）电影化制作质量，创造沉浸式学习环境。AI On Call 产品（late 2023/early 2024
              推出，$15/month）说明 MasterClass 自己也在用 AI 模拟讲师声音和对话式 Q&A——同一技术一旦落到竞争对手或开源模型手中，就可能以近零边际成本逼近 MasterClass 体验。声音克隆和
              AI 数字人工具（如 ElevenLabs、HeyGen、D-ID）进步很快。即便品牌无法复制，复制产品形态的门槛也在每个季度下降。


              平台依赖风险重要且未披露。MasterClass 在全球流式传输视频；其基础设施几乎肯定依赖一家大型云服务商（最可能是 AWS）和 CDN。重大云宕机、CDN 中断，或 Apple App Store 与
              Google Play 政策单方面变化（例如更高收入分成或内容审核动作），都可能立即损害服务交付或收入收取。Apple App Store 对应用内购买抽取 30% 收入分成；如果 MasterClass
              订阅中有实质部分通过 iOS 获得，这将形成显著利润率拖累和单一交易对手集中风险。公司没有公开披露基础设施供应商、应用内购买占比或平台风险暴露。


              关键人物风险集中在 David Rogier 身上。自联合创始人 Aaron Rasmussen 在 January 2017 离开后，Rogier 是唯一仍在的联合创始人和 CEO。近十年来，Rogier
              一直是 MasterClass 的公众面孔和战略架构师。没有公开的继任计划、COO 或具名二号位。裁员后的领导团队（Rogier 之外）没有公开识别，造成尽调不透明：公司是否仍保有执行 B2B 转型和 AI
              产品战略所需的工程、内容和商业领导力，无法确认。GDPR 和 CCPA 合规义务——包括删除权请求、与企业客户的数据处理协议，以及数据主体访问请求处理——对一家工程员工数在 2022–2023
              裁员中大幅缩减的公司构成持续运营和声誉风险。
