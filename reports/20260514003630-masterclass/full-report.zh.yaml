      - number: '8.2'
        title: 收入倍数与情景分析
        blocks:
          - type: paragraph
            body: >
              MasterClass 自 May 2021 Series F 公告以来，没有公开披露收入、订阅者数量、流失率或运营指标。所有收入估计都来自第三方分析师追踪、已披露定价数据，以及围绕裁员后员工数（约
              300–400 人）、订阅型 EdTech 每员工收入行业基准、可比公司披露模式的交叉推算。


              2024–2025 的核心收入估计为 $150–175 million 年经常性收入（ARR）。该区间与以下假设一致：（a）约 500,000–700,000 名活跃付费订阅者，平均每用户年收入
              $200（个人和家庭计划的混合）；（b）估计 $20–30 million B2B 企业收入（MasterClass at Work，2022 推出），仍处早期扩张阶段；（c）2024 引入的 AI On
              Call 功能增购虽小但在增长。该估计意味着自 Series F 时估计的约 $130 million 以来，ARR 增长约 10–20%；这是一轮显著减速，与 2022–2023 裁员以及影响所有 EdTech
              平台的消费者订阅增长修正一致。


              套用适合行业的收入倍数后，出现三种估值情景。乐观情景（15% 概率）下，MasterClass 实现有意义的 B2B 渗透，企业 ARR 超过 $60 million，AI On Call
              产生增量变现，高质量私有 EdTech 品牌的市场倍数修复。到 2026，收入可达 $220 million，以 8–12x 倍数计算，股权价值为 $1.5–2.1 billion——仍低于 2021
              峰值。基准情景（60% 概率）下，订阅者增长稳定在低个位数，B2B 贡献 $30–40 million ARR，4–7x 收入倍数（并叠加 30–40% 私有公司流动性折价）对应 $680
              million–$1.1 billion 股权价值。悲观情景（25% 概率）下，订阅者流失加速，B2B 无法规模化，收入停滞在约 $130 million；困境 1.5–3x 倍数对应 $195–390
              million 股权价值——低于 $461 million 累计融资，意味着除最早轮投资者外都将亏损。
            claimRefs: []
