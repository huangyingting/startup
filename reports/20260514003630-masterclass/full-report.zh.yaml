      - number: '3.2'
        title: 相邻与专业竞争者
        blocks:
          - type: paragraph
            body: |
              在企业市场，LinkedIn Learning 或许是 MasterClass 最具战略危险性的相邻竞争者。LinkedIn Learning 归
              Microsoft 所有，并与 LinkedIn 拥有 1 billion 会员的职业网络深度整合；截至 March
              2024，其学习时长超过 1 billion 小时，这一规模里程碑同时反映企业采纳和 LinkedIn Premium 打包策略。LinkedIn
              Learning 的竞争优势是分发：平台完成的课程可作为凭证展示在 LinkedIn 个人资料上，将学习和职业结果直接连接起来，这是
              MasterClass 从未提供过的能力。平台提供 21,000+ 门专家主讲课程，覆盖商业、技术和创意技能，范围可比
              Udemy，而机构分发能力压过所有其他竞争者。

              2021 年 edX/2U 合并，在正规学习细分造就了一个有大学背书的重要竞争者。Two Sigma 旗下 2U 以约
              $800 million 收购 edX，将 edX 品牌和 150M+ 注册用户与 2U
              的学位项目基础设施结合。合并后实体同时提供数千门课程的免费旁听和顶尖大学的付费学位项目——这是一条 MasterClass
              无法复制的阶梯式路径。对寻求可叠加凭证的企业学习者而言，edX/2U
              从免费预览到认证证书再到学位的路径，为 MasterClass 目标客群的高端部分提供了竞争性价值主张。

              Khan Academy 是拥有 150 million+ 注册用户的非营利组织，在 K-12 免费教育上大规模运营——它不是直接竞争者，但构成行为基准。免费模式压低了用户对内容可访问性的预期。Domestika
              面向西语创意学习者，以低价提供项目制课程；在这个利基中，MasterClass 的英语名人模式天然触达有限。Brilliant.org 以
              $299/year 服务 STEM 学习者，提供互动、问题驱动课程，吸引的学习方式与 MasterClass
              被动观看模型完全不同。Wondrium（原名 The Great Courses）以 $299/year
              提供由真实学者主讲的高端纪录片式讲座目录，是最接近 MasterClass 制作投入和愿景包装的类比，但没有名人导师。

              Duolingo 的游戏化语言学习模式和 Pluralsight 的 B2B
              技术技能平台，展示了竞争格局的多样性。两者都不直接威胁 MasterClass 的消费者利基，但都说明，差异化学习模型可以在规模和参与度上取得
              MasterClass 在娱乐相邻内容之外尚未复制的结果。
