  - id: TV005
    title: 投资逻辑破坏与否决触发项
    notes: >
      触发项按严重性和紧迫性排序。任何单一 Tier-1 触发项都应促成立即重新评估投资逻辑，并可能退出。Tier-2 触发项是方向性信号，需要积累证据后再行动。所有触发项都锚定公开可观察证据来源（SEC
      文件、新闻稿、员工数据库），便于无需内部访问即可监控。
    claimRefs:
      - CV004
      - CV005
      - CV011
      - CV015
      - CV016
      - CV017
      - CV019
      - CV034
      - CV039
      - CV040
    columns:
      - 层级
      - 触发项
      - 可观察阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Tier 1（否决）
        - 第三轮重大裁员
        - 公开宣布员工数减少 >10%
        - 确认收入放缓超出基准情景；运营困境升级
        - 退出或暂停追加投资；将风险评级调至危急
      - - Tier 1（否决）
        - 确认收入低于 $100M ARR
        - 任何经审计或第三方报告的 ARR 低于 $100M
        - 悲观情景被确认；基准情景出局；M&A 价值跌破 $200M
        - 立即退出或谈判困境出售
      - - Tier 1（否决）
        - Fidelity 被迫清算或零价值标记
        - SEC NPORT-P 文件显示 Yanka Industries 持仓为 $0 或名义价值
        - 暗示接近资不抵债或股权价值完全归零
        - 立即否决投资逻辑；记录 LP 报告流程
      - - Tier 2（预警）
        - 流失 top-5 最高互动名人导师
        - 顶级互动队列导师公开宣布不续约或离开
        - 品牌资产受损；订阅用户流失加速风险
        - 未来两个季度监控流失证据；收紧退出触发条件
      - - Tier 2（预警）
        - GenAI 竞争对手推出 <$30/year 的名人声音模拟
        - YouTube、Netflix 或专门 GenAI 平台推出可比声音 / 风格模拟产品
        - 核心品牌护城河承受直接替代压力；AI 反向逻辑被激活
        - 加快尽调 AI On Call ARR 数据；重新评估乐观情景概率
  - id: TV006
    title: 最终尽调问题清单
    notes: |
      所有项目代表截至 May 2026 公开来源未提供的信息。按对估值模型的重要性排序。缺少这些信息时，估值分析只能依赖三角测算，且不确定区间明显。责任方栏标识最适合提供信息的一方；尽调路径列出主数据不可得时可公开访问的代理证据。
    claimRefs:
      - CV003
      - CV018
      - CV019
      - CV033
      - CV034
      - CV040
    columns:
      - 优先级
      - 主题
      - 缺失证据
      - 重要性
      - 责任方 / 尽调路径
    rows:
      - - P1 — 关键
        - 当前 ARR 及增长率
        - May 2021 Series F 以来无公开收入披露
        - 最重要的单一估值输入；ARR 变化 1x 会让基准股权价值变动 $150–700M
        - CFO（主要）；代理指标包括 LinkedIn 员工数变化、App Store 排名趋势、Sensor Tower 下载量
      - - P1 — 关键
        - 股权结构表和优先股堆叠
        - 未披露；6+ 轮累计融资 $461M，意味着清算优先权显著
        - 决定各退出价格下哪些投资人先拿到回款；回报建模关键
        - 法律顾问（主要）；代理证据为 SEC Form D 历史文件（部分数据可用）
      - - P1 — 关键
        - 订阅用户数和流失率
        - 未公开披露总订阅用户数、月活或年度续约率
        - ARPU × 订阅用户 = ARR；流失驱动 LTV 和适用估值倍数
        - CFO/数据团队（主要）；代理指标包括 Sensor Tower DAU 趋势、App Store 评论量
      - - P2 — 高
        - B2B 企业 ARR 和客户数
        - MasterClass at Work 于 2022 上线；未公开披露收入贡献
        - B2B 是主要乐观逻辑；若无法规模化，基准情景价值将少 $400M+
        - 销售/CRO（主要）；代理指标包括 LinkedIn 上 B2B 销售岗位、客户公告
      - - P2 — 高
        - 现金跑道和当前烧钱速度
        - 未披露资产负债表；$225M Series F 于 May 2021 完成，此后未确认后续轮次
        - 决定退出时间压力；若跑道 <18 个月，困境出售风险升高
        - CFO（主要）；代理指标为员工数 × 估计全包成本、办公租约公开记录
      - - P3 — 中等
        - Fidelity NPORT-P 对 Yanka Industries 的精确标记价值
        - SEC NPORT-P 显示基金持仓；无法从汇总数据中单独提取 MasterClass/Yanka Industries 标记
        - 当前公允价值最佳公开代理；可显著收窄 $275–550M 悲观 / 基准区间
        - SEC EDGAR（公开）；若在 EU 注册的基金持仓，则看 FCA 等价文件
