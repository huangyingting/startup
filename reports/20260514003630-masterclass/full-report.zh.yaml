      - - CEO David Rogier 离任
        - LinkedIn 个人资料变化；新闻稿搜索；SEC Form D 修订文件（若有新轮次）；Yanka Industries EDGAR 文件
        - 任何已确认的离任公告，且 30 天内没有具名、经验丰富的继任者到位
        - 暂停所有新增投资，等待新领导层评估；把董事会构成作为持有期风险来评估
      - - 以较 $2.75B 大幅折价进行降价轮融资
        - Yanka Industries 新闻稿和 EDGAR 上的 SEC Form D 文件；PitchBook/Crunchbase 数据更新
        - 股权轮定价 < $1.4B（较 2021 峰值折价 50%）；或条款高度惩罚性的过桥票据
        - 触发优先股堆叠分析；建模困境情景；评估新资本改善还是恶化股权结构表位置
      - - Fidelity SEC 文件中合计估值低于 $10M
        - SEC EDGAR 上 Fidelity NPORT-P 季度文件（Fidelity Advisor Series I；Concord Street Trust）
        - Fidelity NPORT-P 文件中 Yanka Industries 合计公允价值低于 $10M（相较 Feb 2026 的 ~$58–96M）
        - 投资人几乎全额减值信号；触发困境 / 清算情景建模
      - - 消费者大规模向 FTC 或州 AG 提交执法投诉
        - FTC Consumer Sentinel Network 季度数据报告；BBB 投诉量趋势；CA AG 新闻稿
        - 12 个月内 FTC Consumer Sentinel 中点名 MasterClass 的投诉超过 500 件
        - 将监管风险上调至“投资逻辑破坏”级别；进一步投资前要求法律顾问评估执法概率
