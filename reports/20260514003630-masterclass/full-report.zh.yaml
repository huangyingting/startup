        comparables with disclosed round data as of May 2026. Excludes Byju's (Indian market, regulatory investigation,
        near-insolvent), Pluralsight (acquired by Vista Equity, no public data), and LinkedIn Learning (Microsoft
        subsidiary, no standalone disclosure). Includes all primary public-market EdTech peers used by sell-side
        analysts in EdTech coverage universes.
