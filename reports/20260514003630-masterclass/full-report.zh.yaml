      - - 现金余额和月度烧钱速度
        - 资本充足性和现金跑道在分析师估计之外完全不透明
        - 无法评估偿付风险、距离下一轮融资的时间，或公司是否接近现金流盈亏平衡
        - 要求提供经审计资产负债表（或银行证明）、月度现金流量表和董事会批准预算
      - - 债务工具和可转债
        - 隐藏杠杆会带来股权分析看不见的下行风险
        - 未披露债务或可转债可能触发优先权瀑布或反稀释，改变投资者经济性
        - 要求提供完整债务明细、授信协议、可转债条款（如有）和契约状态
