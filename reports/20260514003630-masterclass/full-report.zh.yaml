  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 直接竞争者：高端与平台型学习
        blocks:
          - type: paragraph
            body: >
              MasterClass 最直接的竞争来自面向成人学习者、提供丰富在线内容目录并采用订阅或单课购买模式的平台。Coursera

              是最大的上市纯在线学习平台，2023 财年收入 $522.4 million，全球注册学习者超过 148

              million。Coursera 的差异化来自深度大学和机构合作——超过 300

              所大学和公司提供认证凭证和学位项目——形成 MasterClass 无法匹配的学习路径。Coursera 的 Coursera for Business 产品在企业

              L&D 市场直接与 MasterClass at Work 竞争。


              Udemy 运营点对点导师市场，与 MasterClass 策划式名人模式有根本差异。Udemy 拥有约 210,000+

              门课程、75,000+ 名导师，FY2023 收入据报约 $729 million，拿下更大的实用技能建设市场份额。Udemy

              定价模式是单门课程促销价 $10–$30，使其成为学习者进行定向职业提升的首选。Udemy Business 以订阅目录服务企业，与

              MasterClass at Work 竞争。Udemy 的广度和可负担性，让它站在 MasterClass 高端策划目录的另一端。


              Skillshare 是创意技能细分中与 MasterClass 最接近的订阅模式竞争者。Skillshare
              提供社区型学习环境，统一年费订阅（~$168/year）即可无限访问由在职专业人士讲授的短篇、项目制创意课程。不同于

              MasterClass，Skillshare 强调同伴社区、动手项目和迭代反馈，而不是愿景型、电影化教学。Skillshare

              估计约 3.5 million 学习者，小于 Coursera 或 Udemy，但服务的利基与 MasterClass

              创意内容类别重叠。Skillshare 缺少 MasterClass 的名人吸引力，却提供更多互动功能和社区参与工具。


              总体看，这三家直接竞争者对应不同购买动机——凭证（Coursera）、职业广度（Udemy）和创意社区（Skillshare）——没有一家完全复制

              MasterClass 的愿景娱乐模型。不过，Coursera 和 Udemy 的企业产品正在加大 MasterClass 试图进入的企业

              L&D 细分压力。
