      - number: '6.3'
        title: 客户满意度与情绪
        blocks:
          - type: paragraph
            body: >
              MasterClass 呈现显著的双信号满意度格局：深度消费内容的用户评价很高，抱怨订阅流程的用户评价很低。PCMag 在 2026 评测中给平台 4.5/5 和 Editors'
              Choice，称赞制作质量、讲师人才，以及名人驱动的向往型内容价值。Apple App Store 有超过 19,600 个评分，平均 4.6/5，说明活跃移动用户满意度较强。TechRadar 也把
              MasterClass 评为顶级在线学习平台。


              形成尖锐对比的是，截至 December 2025，Trustpilot 汇总 1,059 条评价，评级为 1.6/5「Bad」。Trustpilot 的 AI
              生成摘要抓住了主导主题：自动续费在缺少明确同意或通知的情况下发生；取消按钮被描述为消失或不可用；即便在扣款后很快申请，退款也被拒绝；客服主要由 AI 聊天机器人处理，无法接入人工客服。Sitejabber
              评价也呼应了这些模式。BBB 收到消费者投诉，称存在未经授权扣款和退款困难，与 Trustpilot 数据一致。The Atlantic 的 2023 调查提出了更根本的问题：MasterClass
              是否真正兑现教育承诺，还是主要提供无法转化为可衡量技能建设的「向往型娱乐」。


              App Store 与 Trustpilot 评分分化并不意外：App Store 评分者是已经从产品中获得价值的参与型学习者；Trustpilot
              评分者往往受到负面订阅体验驱动，而这种体验不需要实际消费内容。两个信号都有信息量。Trustpilot 记录的消费者体验和计费问题构成实质性监管和声誉风险，尤其是在自动续费规则更严格、暗黑模式投诉可被追责的 EU
              市场。
