    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: |
              MasterClass 是一家在线教育平台，总部位于 660 4th Street, San Francisco, California
              94107。公司于 October 2014 以 Yanka Industries Inc. 名义注册成立，并在 May 12, 2015
              正式上线网站，首批课程来自 Dustin Hoffman、Serena Williams 和 James
              Patterson。核心商业模式是直接面向消费者订阅：学习者支付年费，即可无限访问点播视频课程库，授课者包括知名专家、名人和公众人物——从
              Gordon Ramsay 讲烹饪，到 Neil deGrasse Tyson 讲科学思维。

              内容覆盖 11 个类别，包括艺术与娱乐、商业、烹饪艺术、电影与电视、音乐、科学与技术、体育与游戏、健康、写作等。截至
              2025，平台拥有超过 200 位导师、超过 3,500 节课。MasterClass 的差异化来自制作质量：课程以电影化方式拍摄，而不是标准
              网络摄像头形式；PCMag 称这让平台获得 "near-perfect" 的视听体验。不过，The Atlantic
              和独立评测者质疑，这种强调愿景、受娱乐内容影响的形式，能否转化为订阅用户可衡量的技能提升。

              平台提供三档订阅：Standard ($120/year)、Plus ($180/year)、Premium
              ($240/year)，Plus 和 Premium 提供更广访问和附加功能。平台支持 15
              种语言，具备国际触达能力。MasterClass 通过 MasterClass at Work 将收入来源扩展到消费者订阅之外；这是面向企业学习与发展团队的企业
              B2B 产品，价格为 $180 per seat per year。2024–2025，公司推出 MasterClass On Call：一款
              AI 产品，可使用基于导师声音建模的音频提供互动问答，作为附加服务，价格为 $15 per month。
