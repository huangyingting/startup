        - label: 创立（Yanka Industries Inc.）
          date: 2014-10
          details: David Rogier 和 Aaron Rasmussen 在 San Francisco, CA 注册 Yanka Industries Inc.。商业概念：名人授课视频课程。
          tone: positive
        - label: 网站上线
          date: 2015-05
          details: MasterClass.com 公开上线，Dustin Hoffman、Serena Williams 和 James Patterson 担任首批导师。
          tone: positive
        - label: Series A — $15M
          date: '2016'
          details: $15M Series A 融资；机构投资人未披露。资金用于早期团队增长和导师扩张。
          tone: positive
        - label: 联合创始人离任
          date: 2017-01
          details: Aaron Rasmussen 以联合创始人身份离开公司。David Rogier 继续担任唯一创始高管。
          tone: neutral
        - label: Kevin Spacey 课程下架
          date: 2017-10
          details: 在可信性侵指控后，MasterClass 下架 Kevin Spacey 的表演课程，建立内容治理先例。
          tone: warning
        - label: Series B — $35M
          date: '2017'
          details: $35M Series B 融资扩充资本基础，用于营销和导师阵容增长。
          tone: positive
        - label: Series C — $80M
          date: '2018'
          details: $80M Series C 进一步扩展平台；推动公司进入主流 EdTech 定位。
          tone: positive
        - label: Series E — $100M（Fidelity）
          date: 2020-05
          details: 疫情驱动需求激增期间，Fidelity Investments 领投 $100M Series E，估值 ~$800M。
          tone: positive
        - label: Webby Award 2020
          date: '2020'
          details: MasterClass 获得最佳教育网站 Webby Award，验证其高端制作质量。
          tone: positive
        - label: Series F 轮 — $225M，估值 $2.75B
          date: 2021-05
          details: $225M Series F 融资，估值 $2.75 billion——估值峰值；全球估值最高的 EdTech 公司之一。
          tone: positive
        - label: Webby Award 2021
          date: '2021'
          details: 连续第二年获得最佳教育平台 Webby Award。
          tone: positive
        - label: 裁员 20%
          date: 2022-06
          details: 疫情后需求回归常态，MasterClass 裁撤约 96 名员工（约占 ~480 名员工的 ~20%）。
          tone: warning
        - label: 追加裁员 13%
          date: 2023-01
          details: 第二轮收缩裁撤剩余员工约 13%；EdTech 下行周期中，公司重整成本结构。
          tone: warning
        - label: MasterClass On Call 上线
          date: '2024'
          details: AI 驱动的互动问答附加产品（$15/month），使用导师语音模型；公司转向对话式学习。
