          value: 2.6
  - id: FV003
    title: MasterClass 估值情景区间（USD Millions）
    type: range
    layout: standard
    summary: >
      截至 May 2026，MasterClass 乐观、基准和悲观情景下的股权价值区间，基于估计 ARR $130–230M 和符合行业水平的收入倍数。悲观情景低于累计融资额（$461M），意味着后期投资人亏损。乐观情景需要
      B2B 放量、AI 变现和市场倍数修复同时发生。
    claimRefs:
      - CV003
      - CV023
      - CV024
      - CV025
      - CV026
      - CV033
      - CV043
      - CV044
    data:
      items:
        - label: 乐观情景（8-12x 收入；B2B + AI 放量；15% 概率）
          low: 1500
          high: 2100
        - label: 基准情景（4-7x 收入；温和增长；60% 概率）
          low: 680
          high: 1100
        - label: 悲观情景（1.5-3x 收入；停滞 / 困境；25% 概率）
          low: 195
          high: 390
        - label: Fidelity 隐含当前区间（较 $2.75B 下调 80-90%）
          low: 275
          high: 550
  - id: FV004
    title: 投资 KPI 记分卡 — MasterClass May 2026
    type: kpi
    layout: compact
    summary: >
      面向 IC 的评分，覆盖截至 May 2026 MasterClass 的七个投资维度。分数综合所有尽调章节；缺少审计财务和订阅用户数据，拉低证据质量评分。总分 4.5/10 支持 CAUTIOUS
      HOLD，而不是高确信买入或立即卖出。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV018
      - CV024
      - CV035
      - CV036
      - CV041
    data:
      items:
        - label: 市场机会（TAM/SAM 质量）
          value: 6/10 — Large TAM ($166B) but EdTech premium segment small and contested
        - label: 产品 / 品牌护城河
          value: 7/10 — Celebrity catalog genuinely difficult to replicate; AI moat unproven
        - label: 商业模式质量
          value: 5/10 — Subscription ARPU solid; B2B early; no credentials; no free tier
        - label: 财务健康
          value: 3/10 — No disclosure; 33% headcount cuts; Fidelity 80-90% markdown implied
        - label: 风险画像（分数越低风险越高）
          value: 3/10 — High AI substitution; sector distress; closed IPO window; cap table opacity
        - label: 估值 / 入场吸引力
          value: 5/10 — Fidelity-implied $275-550M offers secondary entry opportunity; but base case uncertain
        - label: 证据质量
          value: 3/10 — No audited revenue; no subscriber data; no cap table; all estimates
        - label: IC 总分
          value: 4.5/10 — CAUTIOUS HOLD; secondary entry below $400M only
