      倍数使用企业价值（市值减净现金）除以过去十二个月收入。MasterClass 2021 峰值倍数基于 Series F 时估计 $130M ARR。MasterClass 2026 估计倍数基于估计 $160M ARR 及
      Fidelity 隐含估值区间。
