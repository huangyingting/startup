      - number: '2.4'
        title: 市场趋势与顺风
        blocks:
          - type: paragraph
            body: |
              几条宏观趋势为整体在线学习市场、以及中长期的 MasterClass 提供结构性顺风。

              AI 融入 e-learning 是最重要的短期扰动。自适应学习、AI 教练和个性化课程生成正在成为头部平台的基本配置。LinkedIn
              Learning 提供 AI 驱动的教练和角色扮演。Coursera 使用 AI 技能发展工具。MasterClass 推出 MasterClass On
              Call——一款使用导师语音模型的 AI 问答附加服务——说明公司看到了这条趋势，但相较更成熟的 AI-native 学习工具，它仍处早期。

              企业 L&D 市场增长快于消费者细分，动力来自组织迫切需要为 AI 和数字化转型重训员工。LinkedIn Learning 报告称，49% 的
              人才发展负责人提到 "growing AI-driven skills crisis"。如果 MasterClass
              能在企业技能发展中证明可衡量结果，而不只是愿景型内容消费，MasterClass at Work 就有即时机会。

              终身学习运动正在扩大可触达消费者市场。在线教育兴趣显著增长：过去五年，"eLearning" 搜索量增加 271%（Exploding Topics）。90%
              的公司提供数字学习，68% 的员工更愿意在工作中学习。疫情永久改变了态度——57% 的美国学生比 COVID-19 前更看好在线学习，近四分之三希望继续在线课程。

              微学习、移动优先内容和游戏化正在成为主流交付形态，尤其是在企业培训中。MasterClass 的长视频形式（通常 60–90 分钟课程，单节课
              3–10 分钟）部分契合微学习趋势，但平台缺少企业买家越来越要求的互动、评估和认证路径。EdTech VC 投资在 2018 为
              $8.2 billion，2020 达到 $16 billion，2021 进一步见顶，随后在 2022–2023 急剧下滑。HolonIQ
              预计到 2025，将有超过 100 家教育公司市值超过 $1 billion，显示尽管短期回调，投资者对该板块仍有长期信念。
