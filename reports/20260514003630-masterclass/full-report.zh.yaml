  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: B2C 客户画像与分层
        blocks:
          - type: paragraph
            body: >
              MasterClass 的核心客户是自驱型成人学习者，他们寻求灵感和技能接触，而不是正式证书。平台用名人讲师定位吸引受众：Gordon Ramsay 讲烹饪，Serena Williams
              讲网球，Margaret Atwood 讲写作，Bob Iger 讲领导力。这些受众更偏 25–55 岁、高收入、受教育程度较高的专业人士；他们把讲师与向往型身份认同连接起来，而不是与职业训练连接起来。这使
              MasterClass 区别于 Coursera、LinkedIn Learning 和 Udemy，后者主要围绕职业相关性和证书价值竞争。


              三个 B2C 订阅层级服务这一市场：Standard（$120/yr，仅流媒体，1 台设备）、Plus（$180/yr，离线下载，2 台设备）和 Premium（$240/yr，6
              台设备家庭共享）。所有层级都能完整访问超过 200 名讲师、超过 3,500 个短课时的目录，覆盖 11 个内容类别。平台没有免费层；新订阅者适用 30
              天退款保证。礼品订阅可购买，并被明确营销为向往型消费品；企业礼品买家可一次批量赠送最多 50 个会员资格。


              15 种语言本地化支撑国际触达，把可服务市场扩展到英语地区之外。SimilarWeb 数据显示，MasterClass.com 每月大约吸引 9 million
              或更多访问，发现入口很大，但转化率未知。初始好奇心之后的学习者参与度是已知弱点：订阅娱乐平台的行业模式显示，课程完成率为 20–30%；MasterClass 没有披露平台层面的完成数据。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
