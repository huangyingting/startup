      - number: '1.4'
        title: 里程碑、市场背景与负面事件
        blocks:
          - type: paragraph
            body: |
              MasterClass 的运营历史既有增长里程碑，也有多起重大负面事件。late 2017，公司在演员 Kevin Spacey
              面临可信性侵指控后下架其课程，成为平台最早出现的高知名度名人导师争议之一。该事件为 MasterClass
              依赖导师的模式确立了内容治理风险先例。June 2022，公司裁员约 20%——以约 480 人基数计算约 96
              名员工；CNBC 报道称，原因是疫情期间需求激增后订阅增长回落。January 2023，The Guardian 报道
              MasterClass 又裁减剩余员工约 13%，反映 EdTech 公司在艰难融资环境中持续承受成本压力。

              尽管如此，MasterClass 在 2020 和 2021 连续获得 Webby Awards，认可其数字体验质量。HolonIQ
              估计全球 EdTech 市场已达显著的数十亿美元规模，并预计强劲增长，提供有利长期背景；但短期竞争强度很高。关键竞争对手包括
              Coursera（全球 148M+ 学习者）、Udemy（大型技能型课程库）、LinkedIn Learning（2024 年学习时长超过 1
              billion 小时）和 Skillshare（聚焦创意技能）。MasterClass 凭名人品牌导师和高端制作做出差异化，但在职业和认证内容广度上处于劣势。Trustpilot
              评价分化，一些用户肯定内容质量，另一些则批评相对于价格的订阅价值。SimilarWeb 跟踪到 masterclass.com
              有可观月度网站流量，但具体数字波动且属于估计。
