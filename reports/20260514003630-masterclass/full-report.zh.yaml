      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: |
              MasterClass 由 David Rogier 和 Aaron Rasmussen 于 October 2014 共同创立。Rogier 拥有
              Stanford University 和 Harvard Business School 学位，自公司创立以来担任 CEO；截至 May 2026
              仍在任。Rasmussen 为创始团队带来技术和设计能力，在平台公开上线约两年后的 January 2017
              因个人原因离职。公开资料没有显示这次离职扰乱运营或融资。

              截至 2026，执行团队由 CEO David Rogier、首席财务官 Valen Tong、首席营销官
              David Schriber、首席内容官 Len Amato 组成。Amato 曾任 HBO Films
              总裁，拥有重要娱乐行业关系，对招募高知名度导师很关键。关键人物依赖集中在 Rogier（战略、愿景、投资人关系）和
              Amato（导师招募管线）。MasterClass 是私营公司，不公开披露董事会构成、投资人治理权或股权结构表。除 Rasmussen 在
              2017 离开外，公开资料没有显示重大负面高管离职。公司治理结构对外部观察者仍不透明，这符合该阶段私营公司的典型状态。
