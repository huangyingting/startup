      - number: '5.2'
        title: 技术平台与 AI 功能
        blocks:
          - type: paragraph
            body: >
              MasterClass 的技术栈围绕高带宽视频流、推荐引擎和跨平台交付架构搭建。平台覆盖 Web 浏览器（Chrome、Firefox、Safari），也覆盖 iOS、iPad、Mac 和 Apple TV
              原生应用。iOS 和 Android 应用包含音频模式，可在课程交付中剥离视频，支持通勤场景下的播客式消费；离线下载功能仅面向 Plus 和 Premium
              计划订阅者开放，允许下载完整课程，在断网时播放。移动端支持最早在 April 2018 加入，此后一直是产品核心。


              公司没有公开披露技术基础设施，包括云服务商、CDN 合作伙伴、AI/ML
              平台或视频编码流水线；这与其私营公司身份、没有公开投资者披露相一致。推荐引擎确实存在，并会个性化呈现课程，但算法方法论没有文档披露。MasterClass
              的视频生产流水线不是普通网页托管路线：课程在受控影棚里以电影化方式拍摄，MasterClass 制作团队与讲师密切协作，打磨课程结构、顺序和视觉呈现。


              MasterClass On Call 是近期技术上最新颖的产品。On Call 提供一个 AI 助手，模仿少数入选讲师的语音模式，用符合该讲师领域和表达节奏的风格回答开放式问题。Beta 测试期间，PCMag
              评测者与 Chris Voss 的 On Call AI 互动超过一小时，发现它虚构了一本书，并在不同会话之间自相矛盾；以 $15/month 的价格看，这是实质性的质量问题。技术上，On Call
              是独立于核心订阅之外的产品，需要单独付费。


              MasterClass Certificates 接入 AI 评分的书面练习，学习者围绕自己的工作回答提示问题。AI 使用可见评分标准。PCMag
              评测发现，重复关键词就能轻松满足评分要求，引发对数据隐私的担忧（练习要求填写具体项目名称和业务细节），也削弱了证书的实际价值。企业买家评估 MasterClass at Work
              并将其与证书平台并列比较时，这些弱点都与尽调直接相关。
