        - 订阅用户流失 >20% YoY；B2B 止步试点；第三轮裁员；进入困境出售节奏
        - 25% — Fidelity 减记证据和赛道破产先例（2U、Chegg）使概率抬高
        - 被迫以低于累计融资额清算；创始人 / 早期投资人在退出条款上冲突
  - id: TV004
    title: 可比估值表
