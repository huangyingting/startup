        - 向公司索取订阅用户留存队列数据、每订阅用户平均会话数和 12 个月续约率
      - - 国际扩张（15 种语言）
        - 竞争对手（Coursera、Udemy）有更深的多语言课程库和本地合作伙伴
        - 中
