        - 危急 — 若 Rogier 离任且无继任计划，所有业务线和投资人信心都会出现不确定性
        - N/A — 未公开继任计划；董事会构成和独立性未披露
        - 访谈董事会，核实继任规划；确认 Rogier 持股和锁定期；评估 VP 级直报梯队
      - - 联合创始人离任 — Aaron Rasmussen（January 2017 离任）
        - 联合创始人约 3 年后离任；说明早期领导层集中风险
        - 历史事件 — 已发生，本身不是前瞻风险；但可作为先例
        - 高（历史）— Rasmussen 离任后领导权集中到 Rogier；当前没有联合创始人形成制衡
        - Rogier 自 2017 起已成功领导公司；该先例距今 9 年，但仍值得注意
        - 确认 Rasmussen 离任条款和背景；评估 Rogier 的个人股权状况
      - - 内容负责人 / 内容合作
        - 名人导师招募是核心差异化引擎；内容负责人具备战略重要性
        - 中 — 裁员后的团队重组可能改变或取消该岗位
        - 高 — 若无法招募下一代名人导师，课程目录老化和订阅用户流失会加速
        - 现有课程目录具备常青属性；工作室关系提供一定连续性
        - 识别当前内容 SVP/VP；确认人才管线；评估裁员后内容团队员工数
      - - CTO / 工程领导层
        - AI 产品战略、平台可靠性和 B2B 功能路线图都依赖技术领导层；裁员后岗位归属不清
        - 中 — 裁员后技术人才流失普遍存在；CTO 身份未公开
        - 高 — 技术领导层流失会削弱 On Call 开发、平台扩展和企业产品路线图
        - 云基础设施提供韧性；工程承包商可提供临时扩容能力
        - 确认 CTO/VP Engineering 身份和任期；审查 GitHub 提交活动作为间接信号；比较工程员工数与 2021 水平
      - - B2B / 企业销售领导层
        - MasterClass at Work 上线（~2023）需要专门的企业销售打法；销售负责人身份未知
        - 中 — B2B 推进是战略核心；销售领导缺口会拖慢企业收入爬坡
        - 高 — 若没有有效的 B2B 销售领导，多元化投资逻辑会延后，公司仍依赖周期性 B2C
        - B2B 产品已存在并在营销；已确认部分企业牵引力（Deloitte）
        - 识别 B2B 销售 VP/负责人；评估团队规模、管线质量，以及 Deloitte 以外具名企业客户数
      - - 财务 / CFO
        - 资本配置、现金跑道管理、投资人关系，以及未来任何融资或退出流程，都需要财务领导；裁员后 CFO 身份未知
        - 中 — 以公司当前阶段（可能需要融资、无收入披露）看，财务领导质量很关键
        - 高 — 在估值已压缩的情况下，现金跑道管理不善或融资执行失误都会造成损害
        - 董事会监督财务；Rogier 可能参与投资人沟通
        - 识别当前 CFO；确认董事会审计委员会构成；若推进投资，要求经审计或审阅的财务资料
  - id: TR005
