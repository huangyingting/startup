      - 投资逻辑（乐观）
      - 反向逻辑（悲观）
      - 会改变判断的证据
    rows:
      - - 品牌与内容护城河
        - 独家 200+ 名人课程目录确实难以替代；电影级制作质量是 MOOC 竞争对手难以匹敌的
        - The Atlantic（2020, 2023）：'aspirational entertainment' 不是教育；课程目录不能产生证书；切换成本低
        - 独立结果数据研究，证明相较对照组存在可衡量的技能迁移和留存
      - - 商业模式
        - ARPU $120–$240/yr，数字交付 COGS 低；B2B（MasterClass at Work，$180/seat）打开 $360B 企业培训市场
        - 2022–2023 员工数削减 33%，暗示收入从未撑住成本结构；Series F 2021 之后未公开披露 ARR
        - 经审计 ARR 披露超过 $200M，且 EBITDA 为正或有可信盈亏平衡路径
      - - AI 机会
        - MasterClass On Call（2024）基于课程目录提供交互式 AI 辅导；无需重新制作名人内容，可能打开新增收入流
        - GenAI 工具（GPT-4o、Gemini）已能低成本模拟专家建议；MasterClass 的 AI 层可能把用户训练到期待 AI 级个性化，反而加速替代
        - 证据显示 AI On Call 相较非 AI 队列带来可衡量 ARPU 提升或降低流失
      - - 估值进入
        - Fidelity 减记意味着当前隐含价格约 $275–550M，远低于 2021 峰值；按困境倍数从老股进入，提供非对称回报
        - 累计融资 $461M 意味优先权负担；以 $400M 进入，后期投资人几乎全损；未确认公开老股交易
        - 透明披露股权结构表，揭示优先股堆叠和当前投资人成本基础
      - - 退出路径
        - 并购买方（Netflix、Apple、LinkedIn/MSFT、Disney）可基于订阅用户基础和课程目录支付娱乐 / 内容倍数
        - EdTech IPO 窗口自 2022 起关闭；战略买方面临整合风险；未公开出现 LOI 或 M&A 进程
        - 已确认 M&A 进程，或 EdTech IPO 可比重新打开（post-2025 高端 EdTech 上市）
      - - 竞争位置
        - 定位高于证书工厂（Coursera）和价格战型市场（Udemy）；B2B 通过名人 / 向往型品牌做差异化
        - LinkedIn Learning（随 Premium 免费）、Coursera（可免费旁听）、YouTube（免费）、Duolingo（免费层）都挤压漏斗顶部；MasterClass 没有免费层
        - 任何监管文件确认订阅用户持续增长 >15% YoY 或 B2B ARR >$50M
