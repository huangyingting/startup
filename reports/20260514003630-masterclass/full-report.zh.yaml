  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >
              MasterClass 采用订阅优先收入模式，以三档年度会员为核心：Standard ($120/year)、Plus ($180/year) 和 Premium
              ($240/year)。订阅可无限访问完整目录，包括 3,500+ 节课和 200+ 位导师。自平台早期以来，定价大体稳定；不过公司会定期推出促销折扣（观察到最高 50%
              off），模糊了每名订阅用户实际收入。礼品订阅产品提供一次性收入线，但不是经常性收入流。


              2020–2021，MasterClass 推出 MasterClass at Work，这是一款企业 B2B 产品，定价 $180/seat/year，面向企业学习与发展团队。公司官网和 New York
              Times 均确认该产品，但企业渗透率、合同数量以及对总收入的贡献仍未披露。B2B 转向是有意为之，目标是在消费者基础之外分散收入来源；在消费者业务中，高营销成本和名人合同费用压低单位经济。


              2024–2025，公司推出 MasterClass On Call，一款 $15/month 的 AI 产品，提供基于导师声音建模的互动 Q&A。On Call
              是增量附加收入流，复用既有内容投资。收入贡献和采用率没有公开披露。年度订阅的收入确认遵循递延收入模式（预收款，按期确认），这是订阅软件的标准做法；但没有公开财务报表确认公司采用该处理。


              B2C 订阅、B2B 席位和 AI 附加服务组合在一起，让 MasterClass 拥有三条经济性明显不同的收入流：B2C 高量低价，B2B 中量中价并需要企业销售动作，AI 仍处萌芽。各收入流占比未公开披露。
