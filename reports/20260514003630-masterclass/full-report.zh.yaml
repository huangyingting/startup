      - number: '1.3'
        title: 融资历史、投资人与资本结构
        blocks:
          - type: paragraph
            body: >
              MasterClass 从 2014 到 May 2021 跨六轮股权融资约 $461 million。最早披露的是约 $1.9 million 种子轮。

              随后，公司在 2016 完成 $15 million Series A，2017 完成 $35 million Series B，2018 完成 $80 million Series
              C，用于扩充导师阵容并投入制作基础设施。

              May 2020，MasterClass 完成由 Fidelity Investments 领投的 $100 million Series E，受益于 COVID-19
              疫情期间居家数字娱乐和学习需求抬升。Series E 对公司的估值约为 $800 million，反映订阅增长快速。


              顶点轮次是 May 2021 的 $225 million Series F，通过 GlobeNewswire 新闻稿宣布，将 MasterClass 估值推至 $2.75
              billion，使其跻身当时全球估值最高的 EdTech 公司之一。Series F 由机构投资者领投，Fidelity Investments 作为持续支持者参投。截至 May
              2026，公开资料没有披露重新估值事件、老股交易或新增融资轮，因此 $2.75 billion 仍是最近一次公开估值；不过 2022–2023 年 EdTech 市场收缩很可能压低隐含倍数。Pitchbook 将
              MasterClass 跟踪为私营公司，披露股权融资总额约 $461 million。公司没有公开披露债务融资、信贷额度或收入数据。
