      - number: '5.4'
        title: 信任、安全与质量控制
        blocks:
          - type: paragraph
            body: >
              MasterClass 的信任画像明显分裂：产品质量口碑较强，订阅管理实践较弱。产品侧，它一直维持严格内容标准：2017 年，Kevin Spacey
              遭多项性侵指控后，公司下架了其课程，显示出愿意针对讲师行为采取行动。高制作质量和讲师筛选流程构成了隐含质量底线，使 MasterClass 区别于 Udemy 这类讲师质量高度分散的开放市场平台。内容由
              MasterClass 自有团队与每位讲师合作审阅、结构化并制作。


              订阅侧的情况明显更差。Trustpilot 汇总 1,059 条评价，平均 1.6/5（评级为「Bad」），主导投诉主题包括：未获明确同意即自动续费；取消订阅困难；客服只有
              AI，没有转人工路径；即便在自动续费后不久申请，也拒绝退款。评论者描述的 UX 设计会主动遮蔷取消步骤。这些投诉构成系统性信任缺口，对企业采购方以及 EU 和 US 监管者都重要，因为自动续费监管已变得更严格。


              MasterClass 没有公开披露数据安全实践、隐私认证（SOC 2、ISO 27001）或企业合规文档。对 MasterClass at Work 而言，公开可见合规文档缺失，是受监管行业采购的障碍。On
              Call 的 AI 评分练习明确要求填写业务项目名称和具体工作语境，可能把商业机密信息暴露给一个 AI 系统；该功能没有发布专门的数据保留或隐私政策。


              MasterClass 不提供免费试用，而是提供 30 天退款保证。访客通行证（由现有订阅者分享的 14 天访问权）存在，但要求输入信用卡，增加了试用用户摩擦。这些信任信号是混合的：保证退款是正面承诺，但取消订阅
              UX 和客服设计在实际中削弱了它。
