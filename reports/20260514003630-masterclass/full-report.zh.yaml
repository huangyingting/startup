      - number: '4.2'
        title: 资本结构与融资充足性
        blocks:
          - type: paragraph
            body: >
              MasterClass 从 2014 到 May 2021 跨六轮股权融资约 $461M。Series F 于 May 27, 2021 通过 GlobeNewswire 宣布，规模 $225M，估值 $2.75
              billion，使其进入当时全球估值最高的 EdTech 公司行列。Fidelity Investments 被确认领投 Series E（$100M，May 2020），公司也提到 Fidelity 继续参与
              Series F。根据公开投资人记录，IVP 和 Javelin Venture Partners 是已确认机构支持者。


              截至 May 2026，公开资料没有披露新增股权融资，也没有 IPO 申请。Fidelity 的季度 NPORT-P SEC 文件（最新文件于 April 2026 提交，覆盖截至 February 28,
              2026 的期间）将 "Yanka Industries Inc Series E" 和 "Yanka Industries Inc Series F" 列为 Fidelity Advisor Series I
              投资组合持仓，且 Fidelity 评估的公允价值合计约 $27.4M（Series E）和 $31.2M（Series F），成本基础显著更高——意味着相较峰值出现重大减记。另一个 Fidelity
              基金（Concord Street Trust / Founders Fund，January 2026 quarter）同样列示 Yanka Industries 持仓，公允价值约 $3.9M（Series
              E）和 $33.5M（Series F）。这些估值标记提供了罕见第三方证据，表明 MasterClass 优先股的投资人层面价格自 2021 以来大幅下跌。


              截至 May 2026，现金、月度烧钱速度和现金跑道均未公开披露。分析师基于员工数代理（裁员后约 ~300–400 人，估计全成本年薪 $200K）、内容和基础设施支出，以及营销预算，估计月度烧钱在 $8–15M
              区间。如果公司在 May 2021 融资 $225M，并以低端 $8M/month 烧钱，那么理论剩余现金约 $185M，意味着从 May 2021 起还有 23+ 个月现金跑道（即到
              2023）。降本动作（两轮裁员）说明公司在谨慎管理资本。公开资料没有披露债务工具或信贷额度。
