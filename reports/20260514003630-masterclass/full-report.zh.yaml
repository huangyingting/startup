      - number: '6.2'
        title: B2B 与企业客户基础
        blocks:
          - type: paragraph
            body: >
              MasterClass at Work 是公司的 B2B 产品。2022 和 2023 两轮裁员约砍掉 MasterClass 三分之一员工之后，公司将其作为转向企业 L&D 的战略支点推出。企业层级对少于 50
              个席位的团队定价为 $180/seat/yr，更大组织需通过销售联系获取定制企业价格。B2B 产品提供与消费者层级相同的目录，但增加 L&D
              专用功能：向群组或个人分配内容、用于追踪热门技能和学习者参与度的分析仪表盘，以及消费者目录中没有的独家 L&D 资产。


              Deloitte 是唯一公开点名的企业客户。MasterClass 引用了「销售和利润增长 353%」的结果，并展示一位 Deloitte 负责人的证言，称培训 ROI「巨大」。企业产品营销页称「Fortune
              500 公司信任我们」，但没有提供其他具名客户。公司还提供企业礼品层级，每人起价 $120，用于员工福利项目，允许批量赠送会员，而无需承诺持续企业许可。


              基于公司仍然关注消费者渠道、企业推进也相对较新（~2023），到 2025–2026，B2B 部门几乎肯定仍是总收入少数。不过，企业账户的每席位客户终身价值（LTV）高于个人 B2C 消费者，收入也更耐久。缺少
              LMS 集成、没有认证证书，以及 The Atlantic（2023）对「向往型娱乐」的批评，是其在 B2B 扩张中对抗 Coursera for Business 和 LinkedIn Learning
              的主要障碍。
