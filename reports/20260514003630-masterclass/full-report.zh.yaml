      - number: '7.2'
        title: 运营与财务风险
        blocks:
          - type: paragraph
            body: >
              MasterClass 的成本结构与标准 SaaS 公司根本不同。每门课程都需要 Hollywood 级制作——估计每门
              $100,000–$500,000+——再加上名人讲师费用，后者可能包含预付保底和收入分成。这些内容制作成本在制作完成后基本固定且沉没；如果订阅者增长停滞，单订阅者成本就会上升。行业估计将 2022
              年经常性收入（ARR）放在 $125–$165M，意味着如果没有持续增长，成本收入比不可持续；两轮裁员也印证了这一点。

              June 2022 的裁员（当时约 500 人团队的 ~20%）由 Bloomberg、CNBC、EdTech Digest 和 Hollywood Reporter 同时报导，原因被归为 COVID
              后订阅者增长正常化，以及需要「专注于最有影响力的工作」。January 2023 的裁员（剩余员工的 ~13%）由 EdSurge、Variety 和 Hollywood Reporter 报导。两轮合计在 18
              个月内裁掉约三分之一总员工数——这一幅度说明的是实质性财务压力，不是常规优化。

              Fidelity 的季度 NPORT-P SEC 文件（最近为 February 2026 和 January 2026 季度）将 Yanka Industries（MasterClass
              的法定实体）优先股在两只基金中的合计公允价值列为约 $58–96M；相较以 $2.75B 峰值估值为锚的成本基础，这意味着投资者评估的公允价值减记 80–90% 或更多。May 2021
              以来没有宣布新的股权融资，也没有公开已知债务工具。现金跑道没有公开披露；基于裁员后员工数的分析师估计显示，月度烧钱可能在 $6–12M 区间，但距上次融资已经 5+ 年，公司当前现金位置是关键且未确认的尽调事项。

              B2C 订阅模式本身带来结构性财务风险：年度预付和 30 天退款保证会在第一天创造正营运资本，但 Trustpilot
              投诉模式所暗示的高退款量会侵蚀已实现收入。自动续费争议产生的拒付会同时带来收入成本和运营成本。公司没有免费试用（多数同业有），会降低漏斗顶部转化；当订阅者觉得获得的价值不足时，还可能加速流失。
