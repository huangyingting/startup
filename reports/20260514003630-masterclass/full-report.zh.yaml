        - 严重 — 失去头部讲师会损害发现、获客和订阅续订价值
        - 内容目录具备常青属性；合同有期限；持续招募新讲师
        - 高 — 未披露独家条款、morality clause 条款或继任内容计划
      - - 云基础设施（视频托管、CDN、计算）
        - AWS（推断为主要提供商）；CDN 提供商未披露
        - 视频交付、应用托管、On Call AI 计算、全球延迟管理
        - 很高 — 没有稳定云和 CDN，流媒体平台无法运转
        - 主要云服务商宕机；CDN 路由故障；成本上升（AWS 价格变化）
        - 高 — 高峰使用期长时间宕机会导致订阅取消和媒体报道
        - 假设标准云 HA 多 AZ 架构；备用 CDN 提供商状态未知
        - 中 — 云宕机罕见但有系统性；无公开 SLA 或事件响应协议
      - - 应用商店分发（iOS 和 Android）
        - Apple App Store（30% Y1 / 15% Y2 抽成）；Google Play（同结构）
        - 主要移动订阅分发渠道；捕获应用内购买收入
        - 高 — 移动订阅用户占总量显著份额；iOS 在高端人群中尤其重要
        - 应用商店政策变化；30% 抽成上调；内容审核下架行动
        - 高 — 抽成上升或从应用商店下架会带来重大且即时收入影响
        - masterclass.com 提供 Web 直订；缓释但不消除应用商店风险
        - 中 — Apple App Store 已对订阅服务施加限制；应用内占比未披露
      - - 支付处理
        - Stripe（推断）或 Braintree / PayPal；具体处理商未披露
        - 年度订阅计费、续订处理、退款处理、chargeback 管理
        - 高 — 单一计费基础设施故障会中断全部订阅收入
        - 处理商欺诈 / 宕机；chargeback 率超过处理商阈值导致账户终止
        - 高 — 订阅 SaaS 对支付处理商连续性高度敏感
        - 标准做法：备用第二处理商；但实施未确认
        - 低 — 支付处理商故障罕见；chargeback 率阈值是更现实风险向量
      - - On Call 产品 AI 基础设施
        - OpenAI、AWS Bedrock 或类似（未披露）；语音克隆供应商未披露
        - 支撑 MasterClass On Call AI 交互式 Q&A，模拟讲师声音和专业知识
        - 中 — On Call 是 $15/month 附加产品；核心订阅不依赖它
        - API 废弃；成本上升；供应商对语音复制的合同限制；版权挑战
        - 中 — On Call 产品失败会削弱新收入流，但不影响核心订阅
        - 多供应商 AI 架构可行；语音复制许可条款需要独立审查
        - 中 — 如果合同未覆盖 AI 使用，讲师语音复制会引发版权和肖像权问题
      - - 营销和获客渠道（Meta、Google、联盟）
        - Meta（Facebook/Instagram）；Google（搜索 / YouTube）；联盟发布商
        - 新 B2C 订阅用户的付费获客；品牌认知投放；内容分发
        - 高 — 名人内容营销的自然传播价值高，但要扩大规模，付费渠道仍然关键
        - 平台政策变化（Meta 广告限制、Google 算法变化）；获客成本（CAC）通胀
        - 中 — CAC 通胀会压缩 B2C 订阅增长的单位经济
        - 假设渠道组合分散；名人驱动内容的自然传播让公司对付费渠道有一定独立性
        - 中 — 全行业数字广告成本已上升；MasterClass 的具体 CAC 走势未披露
