          detail: SimilarWeb 估计；名人导师品牌拉动自然搜索量
        - label: 试用 / 评估意向（估计）
          value: 450000
          detail: ~5% 访问者主动评估订阅；浏览课程、阅读评测
        - label: 每月新增订阅用户（估计）
          value: 90000
          detail: 访客到订阅用户转化率估计为 ~1%；年度订阅承诺压低转化
        - label: 活跃参与学习者（估计）
          value: 54000
          detail: ~60% 新订阅用户至少完成一门课程；参与率符合订阅娱乐品类常态
        - label: 年度续费（估计）
          value: 36000
          detail: ~40% 年度续费率估计；与 Trustpilot 投诉严重程度和行业订阅流失基准一致
  - id: FU003
    title: 客户证据矩阵
    type: matrix
    summary: >
      围绕四个尽调维度——证据质量、结果具体性、留存可见度和部署成熟度——评估 MasterClass 四类客户的证据质量。评级为定性判断，基于截至 2026 年 5 月的公开文档。Deloitte 企业案例最强，但仍依赖自报
      ROI。B2C 和礼品类别有互动信号，但没有纵向留存数据。
    claimRefs:
      - CU011
      - CU012
      - CU014
      - CU015
      - CU021
      - CU027
    data:
      columns:
        - 证据质量
        - 结果具体性
        - 留存可见度
        - 部署成熟度
      rows:
        - label: Deloitte（企业 B2B）
          values:
            - 客户证言（公司自称）
            - 高 — 声称 ROI 为 353%
            - 不透明 — 无续约或 NRR 数据
            - 生产环境 — 已大规模部署
        - label: Fortune 500（未具名，B2B）
          values:
            - 轶事性 — 未披露名称或案例
            - 无 — 未引用结果
            - 不透明 — 无数据
            - 声称生产环境 — 未验证
        - label: B2C 消费者（活跃）
          values:
            - 评价汇总（App Store 4.6/5，PCMag 4.5/5）
            - 低 — 满意度，不是技能结果
            - 部分 — 仅应用评分趋势
            - 生产环境 — 核心消费市场
        - label: 礼品订阅（B2C 赠送）
          values:
            - 无系统性证据
            - 无 — 无结果追踪
            - 不可见 — 赠送账户未追踪
            - 生产环境 — 购买流程可用
  - id: FU004
    title: 留存 / 复购队列
    type: cohort
    summary: >
      估计 MasterClass B2C 订阅用户在四个时间桶的留存队列，并与 B2B At Work 细分估计值和 eLearning 行业基准对照。所有数值均为估计，依据 Trustpilot
      投诉严重度、应用商店互动数据、订阅娱乐行业基准和 eLearning 平台常规水平。MasterClass 未披露队列留存数据。上述估计仅用于尽调建模，应以公司实际数据验证。
    claimRefs:
      - CU018
      - CU019
      - CU027
      - CU028
      - CU029
    data:
      columns:
        - 第 1 个月
        - 第 3 个月
        - 第 6 个月
        - 第 1 年（续约）
      rows:
        - label: B2C 消费者（估计）
          values:
            - 88
            - 68
            - 52
            - 38
        - label: B2C 礼品订阅（估计）
          values:
            - 80
            - 55
            - 38
            - 22
        - label: B2B At Work（估计）
          values:
            - 93
            - 80
            - 68
            - 55
        - label: eLearning 行业基准
          values:
            - 85
            - 65
            - 50
            - 40
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: >
      基于公开证据，评估截至 May 2026 MasterClass
      主要风险的发生可能性与影响。风险位置来自定性打分：可能性反映可观察信号（投诉量、裁员幅度、监管执法趋势）；影响反映收入、品牌、监管和投资人后果。右上象限（高可能性、高影响）的单元格代表最紧迫的投资风险。
    claimRefs:
      - CR001
      - CR005
      - CR009
      - CR015
      - CR021
      - CR022
      - CR023
      - CR031
      - CR032
      - CR037
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 极高影响
      rows:
        - label: 高可能性
          values:
            - 营销渠道成本上升
            - 订阅用户留存下降（完课弱）
            - 客服失灵（仅 AI，Trustpilot 1.6/5）
            - 自动续费引发 FTC 投诉风险敞口
        - label: 中等可能性
          values:
            - 内容制作放缓
            - B2B 销售执行不达预期
            - AI 替代侵蚀护城河
            - 明星讲师丑闻
        - label: 低可能性
          values:
            - COPPA 未成年人访问违规
            - 支付处理商中断
            - GDPR 执法行动（EU）
            - FTC 正式执法行动
        - label: 极低可能性
          values:
            - 应用商店下架
            - 平台数据泄露（重大）
            - 云基础设施中断（持续）
            - CEO 离任且无继任者
  - id: FR002
    title: 风险传导图
    type: dag
    summary: |
      有向无环图，展示 MasterClass 主要风险类别如何传导到下游业务结果。根风险是上游触发点；叶节点是对投资逻辑的影响。核心传导路径从讲师风险和消费者投诉出发，经收入传到估值。
    claimRefs:
      - CR001
      - CR005
      - CR011
      - CR015
      - CR021
      - CR023
      - CR031
      - CR032
      - CR037
    data:
      nodes:
        - id: instructor-risk
          label: 讲师风险
          detail: 头部明星讲师丑闻、离开或去世
        - id: ai-substitution
          label: AI 替代风险
          detail: 生成式 AI 以近乎零边际成本复制明星声音和专业能力
        - id: consumer-complaints
          label: 消费者投诉升级
          detail: 自动续费、取消订阅和退款争议（Trustpilot 1.6/5）
        - id: ftc-enforcement
          label: FTC / 监管执法
          detail: 违反 FTC Negative Option Rule；California ARL 执法；CCPA/GDPR
        - id: cost-structure
          label: 高固定成本结构
          detail: Hollywood 制作成本 + 明星费用；不像 UGC 平台那样可扩展
        - id: subscriber-churn
          label: 订阅用户流失 / 停滞
          detail: 疫情后 B2C 订阅用户基数收缩或停滞
        - id: revenue-decline
          label: 收入下滑
          detail: 年度订阅收入收缩；B2B 规模仍不足以抵消
        - id: capital-exhaustion
          label: 资金耗尽风险
          detail: 2021 之后未新增融资；现金跑道不透明；烧钱速度与现金头寸未知
        - id: valuation-compression
          label: 估值压缩
          detail: 投资人账面标记已较 2021 峰值低 80–90%；存在降价轮或减值风险
        - id: brand-damage
          label: 品牌与声誉受损
          detail: 负面媒体（The Atlantic 2023）、BBB 'F'、Trustpilot 1.6/5
        - id: b2b-execution-risk
          label: B2B 执行风险
          detail: 企业转型需要 LMS 集成、资质证明和销售团队——这些要么部分到位，要么未披露
        - id: thesis-break
          label: 投资逻辑断裂
          detail: EdTech 品牌护城河 + B2B 多元化这一核心假设被推翻
      edges:
        - from: instructor-risk
          to: brand-damage
          label: 丑闻 / 离开损害品牌
        - from: instructor-risk
          to: subscriber-churn
          label: 课程库受损推动流失
        - from: ai-substitution
          to: subscriber-churn
          label: 更便宜的 AI 替代品降低付费意愿
        - from: ai-substitution
          to: b2b-execution-risk
          label: AI 工具让企业 L&D 内容商品化
        - from: consumer-complaints
          to: ftc-enforcement
          label: 投诉量触发监管审查
        - from: consumer-complaints
          to: brand-damage
          label: Trustpilot/BBB 负面评分放大声誉风险
        - from: ftc-enforcement
          to: revenue-decline
          label: 取消订阅摩擦被移除后流失上升；罚款消耗现金
        - from: cost-structure
          to: capital-exhaustion
          label: 高烧钱速度加快现金跑道耗尽
        - from: subscriber-churn
          to: revenue-decline
          label: 直接冲击收入
        - from: revenue-decline
          to: capital-exhaustion
          label: 收入下降加快现金消耗
        - from: capital-exhaustion
          to: valuation-compression
          label: 被迫以惩罚性条款融资
        - from: b2b-execution-risk
          to: revenue-decline
          label: B2B 未能抵消 B2C 下滑
        - from: brand-damage
          to: b2b-execution-risk
          label: 企业买方避开 Trustpilot 1.6/5 的供应商
        - from: valuation-compression
          to: thesis-break
          label: 回报受损
        - from: capital-exhaustion
          to: thesis-break
          label: 现金跑道耗尽
  - id: FR003
    title: 依赖关系图
    type: dag
    summary: |
      MasterClass 关键外部关系的依赖图。每个节点代表一个关键伙伴、平台、监管方或基础设施供应商。边标签标明依赖性质。标记为「single-source」的节点代表集中风险，即没有已确认的已知替代方。
    claimRefs:
      - CR003
      - CR007
      - CR025
      - CR032
      - CR033
      - CR034
      - CR035
    data:
      nodes:
        - id: masterclass-core
          label: MasterClass（核心平台）
          detail: 订阅流媒体平台；B2C 和 B2B；AI On Call 附加产品
        - id: celebrity-instructors
          label: 明星讲师（200+）
          detail: 品牌护城河和内容供给；头部 20 位讲师贡献不成比例的获客和续约价值
        - id: cloud-provider
          label: 云服务商（AWS — 推断）
          detail: 视频托管、计算、数据存储、CDN 集成；single-source 集中风险
        - id: apple-google
          label: Apple App Store / Google Play 应用商店
          detail: 移动分发和应用内订阅计费；Y1 收入分成 30%；政策风险
        - id: payment-processor
          label: 支付处理商（Stripe — 推断）
          detail: 年度订阅计费、续约、退款；拒付管理
        - id: ai-vendors
          label: AI 基础设施供应商
          detail: On Call 语音和 LLM API；讲师声音复制；供应商未披露
        - id: regulators
          label: FTC / CA AG / CCPA 监管方
          detail: FTC Negative Option Rule；California ARL；CCPA 执法——均直接适用
        - id: enterprise-customers
          label: 企业客户（B2B）
          detail: MasterClass at Work；Deloitte 是唯一具名案例；集中在少量具名客户
      edges:
        - from: masterclass-core
          to: celebrity-instructors
          label: 品牌和内容供给 — 按讲师姓名形成 single-source
        - from: masterclass-core
          to: cloud-provider
          label: 基础设施依赖 — single-source（推断）
        - from: masterclass-core
          to: apple-google
          label: 移动分发 — 收入分成 30%；下架风险
        - from: masterclass-core
          to: payment-processor
          label: 计费和续约 — 若单一处理商则有集中风险
        - from: masterclass-core
          to: ai-vendors
          label: On Call 产品 — 供应商未披露；声音授权风险
        - from: masterclass-core
          to: regulators
          label: 合规义务 — FTC、CA AG、CCPA 均有直接管辖权
        - from: masterclass-core
          to: enterprise-customers
          label: B2B 收入依赖 — 仅 Deloitte 具名；集中度高
        - from: celebrity-instructors
          to: enterprise-customers
          label: 企业 L&D 的品牌可信度 — 讲师阵容验证 B2B 价值主张
  - id: FV001
    title: 推荐逻辑链
    type: flow
    layout: standard
    summary: |
      有向逻辑链，展示五大证据支柱——市场地位、产品护城河、财务健康、行业估值和风险画像——如何共同推导出截至 May 2026 的 CAUTIOUS HOLD / SELECTIVE SECONDARY 建议。
    claimRefs:
      - CV001
      - CV004
      - CV005
      - CV022
      - CV024
      - CV025
      - CV026
      - CV033
      - CV034
      - CV040
    data:
      nodes:
        - id: market
          label: 市场：$166B+ TAM；高端 EdTech 细分承压
          type: input
        - id: product
          label: 产品：200+ 明星课程库；AI On Call；B2B 早期
          type: input
        - id: financials
          label: 财务：估计 ARR ~$160M；2022-23 员工削减 33%；未披露
          type: input
        - id: risks
          label: 风险：AI 替代；行业困境；Fidelity 下调 80-90%
          type: input
        - id: valuation
          label: 估值：悲观 $195-390M | 基准 $680M-$1.1B | 乐观 $1.5-2.1B
          type: process
        - id: recommendation
          label: 隐含股权价值低于 $400M 时，CAUTIOUS HOLD / SELECTIVE SECONDARY
          type: output
      edges:
        - from: market
          to: valuation
          label: TAM 支撑溢价，但撑不起 21x
        - from: product
          to: valuation
          label: 品牌护城河支撑 4-8x 底部
        - from: financials
          to: valuation
          label: 披露薄弱放大不确定性
        - from: risks
          to: valuation
          label: 行业重估压缩倍数
        - from: valuation
          to: recommendation
          label: 基准情景 <$400M 入场 = 2-4x M&A 回报
  - id: FV002
    title: EdTech 收入倍数格局（2024–2025）
    type: bar
    layout: standard
    summary: >
      2024–2025 年公开 EdTech 公司企业价值 / 滚动收入倍数，以及私有可比公司的估计倍数。图中列出 MasterClass 2021 年峰值（21x）和当前 Fidelity
      隐含估计（1.7–3.4x）作为参照。公开市场数据来自 SEC 文件和截至 mid-2025 的市场数据。
