      - - FTC 执法行动或民事调查要求
        - FTC 执法数据库（ftc.gov/enforcement）；PACER 民事法院文件；FTC 新闻稿
        - 任何正式 FTC 投诉、CID 或点名 MasterClass（Yanka Industries）的同意令
        - 投资逻辑破坏触发项 — 重大法律责任、禁令整改成本和声誉伤害；重新评估或启动退出审查
      - - 订阅用户增长停滞或下滑
        - SimilarWeb 月度流量估计；App Store 评论量增长；Trustpilot 评论量轨迹
        - SimilarWeb 访问量连续两个季度下降，或 App Store 评分低于 4.0（目前 4.6）
        - 启动深度流失分析；重新评估 LTV/CAC 假设；可能下调对 B2C 增长的信心
      - - AI 内容替代 — 竞争对手以更低价格复制 MasterClass 形态
        - 资金充足的 AI EdTech 创业公司产品公告；Andreessen/Sequoia 被投公司上线；App Store 类目新进入者
        - 任何竞争对手推出可信的名人声音 AI 教学平台，定价 <$5/month 或免费层
