  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值基准与可比公司
        blocks:
          - type: paragraph
            body: >
              评估 MasterClass 需要在一组公开和私有 EdTech 同业之间交叉校准。它们的规模、商业模式和增长轨迹不同，但 2021 以来的市场重估，为行业倍数压缩提供了最直接可观察证据。


              公开可比公司中，Duolingo（DUOL）仍是突出的高溢价异类。公司过去 12 个月收入约 $531 million，市值接近 $6 billion，对应约 11x 企业价值 / 收入倍数；支撑因素包括
              40%+ 的同比收入增长、超过 500 million 注册用户的免费到付费转化漏斗，以及已证明的经营杠杆。MasterClass 无法匹配这种增长画像；其订阅者基础小了几个数量级，可寻址免费层漏斗基本为零。把
              Duolingo 的溢价倍数套到 MasterClass 上，在分析上站不住脚。


              Coursera（COUR）是更诚实的结构性同业：订阅加证书模式、大学内容合作、消费者和企业两个部门。Coursera 过去 12 个月收入约 $635 million，mid-2025 交易倍数约为 1.9x
              EV/Revenue——较 2021 IPO 时的 ~10x 倍数严重压缩。Udemy（UDMY）是最大的公开市场型 EdTech，年销售额约 $743 million，交易倍数约为过去 12 个月收入的
              1.5x。


              困境可比公司对下行情景很有参考价值。2U Inc. 在 2021 以 $800 million 从 MIT 和 Harvard 收购 edX，随后因收入模型在高内容获取成本和弱学习者留存下崩溃，于 July
              2023 申请 Chapter 11 破产保护。Chegg 曾是市值 $12 billion 的公司，但到 early 2026 跌至 $200 million 以下，因为 ChatGPT
              对其作业帮助核心业务造成实质性冲击。这些案例说明，EdTech 估值没有地板——一旦关键变现假设破裂，价值可能快速毁灭。


              MasterClass 在 $2.75 billion Series F 时隐含收入倍数约为 21x（基于当时估计 $130 million ARR），这是 2021 零利率流动性泡沫的产物。订阅型 EdTech
              全行业重估至 1.5–5x 收入，定义了今天的公允价值区间；只有增长高且单位经济性扩张可证明的公司，才应保留最高 8–12x 的溢价。
            claimRefs: []
