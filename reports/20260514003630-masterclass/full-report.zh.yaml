  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与内容供给
        blocks:
          - type: paragraph
            body: >
              MasterClass 是面向消费者和 B2B 的订阅平台，通过名人和专家导师提供视频学习。产品基础架构包括三档消费者订阅和一个企业产品，均可访问同一共享目录：超过

              200 位导师、超过 3,500 节短课，横跨 11 个内容类别。订阅档位差异不在目录访问，而在设备并发和离线下载：Standard

              ($120/yr) 提供完整目录流媒体、单设备使用且不支持离线；Plus ($180/yr) 增加离线下载和两台并发设备；Premium

              ($240/yr) 将设备并发扩至六台，支持家庭共享。MasterClass at Work ($180/seat/yr)

              以企业授权方式为企业团队提供访问。


              11
              个内容类别包括表演艺术、艺术与设计、商业与创业、社区与政府、电影与电视、食品与饮品、游戏与数字媒体、健康与养生、音乐、户外探险与活动，以及科学与技术。各类别规模并不均衡：电影与电视以及写作（艺术的一个子集）导师阵容尤其丰富，包括

              Martin Scorsese、Spike Lee、Helen Mirren、Samuel L. Jackson、Amy Poehler、Margaret

              Atwood、Malcolm Gladwell、James Patterson 等。烹饪艺术课程包括 Gordon Ramsay、Thomas Keller、Wolfgang

              Puck 和 Massimo Bottura。音乐类别包括 Alicia Keys、Christina Aguilera、Usher 和 Hans Zimmer。体育类别包括

              Serena Williams、Steph Curry、Lewis Hamilton 和 Wayne Gretzky。


              2024–2025 推出的两条新产品线扩展了供给：MasterClass Certificates 是与机构合作伙伴（Navy

              SEAL Foundation、The Moonshot
              Factory、Microsoft、Nvidia）共同制作的凭证课程。除视频外，它加入阅读材料、互动测验和书面练习，结构上不同于标准的纯讲座课程。MasterClass

              On Call 是 AI 附加服务（$15/month 或 $95/year），可与基于精选导师声音建模的 AI 进行互动 Q&A；截至

              mid-2026，该产品仍处 beta。礼品订阅和 15 种语言支持，补足了产品的国际可访问性。
