  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: |
              全球在线学习市场在 2023 估值约 $263.5 billion，预计到 2032 达到 $933.5 billion，对应
              14.8% 复合年增长率（Allied Market Research）。短期估计认为 2025 市场规模至少 $315
              billion，多家市场研究公司独立预计将保持快速双位数增长。Global Market Insights 预测该市场到 2032 可能达到
              $1 trillion，与 Allied Market Research 的上限预测一致。这些数字说明，在线教育是更广义技术与信息服务板块中增长最快的细分之一。

              增长的结构性逻辑很强：教育是一个全球 $7 trillion-plus 行业（HolonIQ），但当前数字化交付的教育活动不到
              4%（HolonIQ）。HolonIQ 预计全球数字教育支出将从 2020 的 $227 billion 增长到 2025 的
              $404 billion。疫情把十年行为变化压缩到短时间内完成，调查数据显示，73% 的美国学生希望疫情后继续在线学习（Exploding
              Topics 引用 Inside Higher Ed 数据），说明采纳增益具备粘性。

              就 MasterClass 而言，总可用市场（TAM）可宽泛定义为整个全球在线学习市场，规模 $263–315 billion。可服务市场（SAM）收窄到高端成人消费者学习和企业
              L&D，基于全球企业 e-learning 估计 $22.5 billion（2021，预计 2028 增至 $44.6
              billion）及更广高端消费者细分，估计约 $40–50 billion。可获取市场（SOM）是高端名人主导、专家策划在线内容这一利基，估计为
              $5–10 billion；考虑其高端定价、有限职业深度和娱乐相邻定位，这是 MasterClass 近中期现实可触达机会。

              疫情红利之后，EdTech 风险投资在 2021 达到峰值；全球 VC 在该板块的部署额 2020 已达 $16
              billion，2021 更高。峰值过后，2022–2023 出现剧烈回调：学习者参与度正常化、估值收缩，许多 EdTech
              公司（包括 MasterClass）裁员。这场 "EdTech 寒冬" 不否定长期增长故事，但已重置市场对短期增长轨迹和渗透速度的预期。
