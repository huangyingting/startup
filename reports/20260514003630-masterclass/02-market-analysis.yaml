  evidenceGaps:
    - type: estimate-only
      severity: moderate
      topic: MasterClass SAM and SOM precise sizing
      missingEvidence: >
        No primary market research report has been found that precisely segments the global online
        learning market into MasterClass's specific SAM (premium adult consumer + corporate L&D) or
        SOM (premium celebrity/expert content niche). The $40–50B SAM and $5–10B SOM figures are
        analyst estimates derived by combining publicly available sub-segment data from Exploding
        Topics, Allied Market Research, and Training Magazine reports.
      whyItMatters: >
        Precise SAM/SOM sizing is important for validating MasterClass's growth runway and market
        penetration rate, which in turn drives forward revenue and valuation assumptions.
      diligencePath: >
        Commission a bespoke market research study targeting the premium consumer learning and
        aspiration-based online education niche; engage HolonIQ or Holon EdTech Intelligence for
        a custom segmentation of the adult lifelong learning market.
      relatedQuestionRefs: [QM003, QM004, QM009, QM027]

    - type: stale
      severity: minor
      topic: EdTech VC investment 2025–2026 precise figures
      missingEvidence: >
        The most current EdTech VC data available in public sources covers through 2023 and early
        2024. Precise 2025 and 2026 year-to-date EdTech investment figures, including the specific
        contribution of AI-native EdTech deals, have not been found in accessible public sources.
      whyItMatters: >
        Whether EdTech funding has genuinely recovered in 2025–2026 affects MasterClass's ability
        to raise new capital, its potential valuation at exit, and the competitive intensity from
        well-funded new entrants in the AI learning space.
      diligencePath: >
        Access HolonIQ EdTech Intelligence annual reports for 2024–2025; review Crunchbase and
        Pitchbook for 2025–2026 EdTech deal data; check CB Insights EdTech state-of-the-market
        reports for current year investment trends.
      relatedQuestionRefs: [QM014, QM015]

    - type: missing-source
      severity: minor
      topic: Corporate vs. consumer EdTech investment split 2026
      missingEvidence: >
        No publicly accessible source has been found that specifically disaggregates 2025–2026
        EdTech VC investment between corporate L&D platforms (like LinkedIn Learning competitors)
        and consumer learning platforms (like MasterClass). This split is important for assessing
        whether MasterClass's enterprise pivot (MasterClass at Work) aligns with where capital is
        flowing in the current funding environment.
      whyItMatters: >
        Understanding the corporate versus consumer split in EdTech investment would help assess
        whether MasterClass's enterprise product (at Work) is entering a well-capitalized segment
        or a capital-scarce one, which affects competitive intensity and partner availability.
      diligencePath: >
        Review HolonIQ's corporate learning sub-segment reports; check Gartner research on L&D
        technology investment; contact EdSurge or Holon EdTech analysts for custom breakdowns.
      relatedQuestionRefs: [QM028]

