      - number: '5.2'
        title: Technology Platform and AI Features
        blocks:
          - type: paragraph
            body: |
              MasterClass's technology stack is built around high-bandwidth video streaming, a recommendation
              engine that surfaces relevant courses, and a multi-platform delivery architecture. The platform
              serves web browsers (Chrome, Firefox, Safari) as well as native apps on iOS, iPad, Mac, and
              Apple TV. The iOS and Android apps include an audio mode that strips video from lesson delivery,
              enabling podcast-style consumption on the go, and an offline download feature (restricted to
              Plus and Premium plan subscribers) that allows full course download for disconnected playback.
              Mobile support was first added in April 2018 and has been a core part of the product since.

              The company has not publicly disclosed its technical infrastructure—cloud provider, CDN
              partner, AI/ML platform, or video encoding pipeline—consistent with its status as a private
              company with no public investor disclosures. The recommendation engine exists and personalizes
              course surfacing, but its algorithmic methodology is not documented. MasterClass's video
              production pipeline is not a commodity web-hosting approach: courses are shot cinematographically
              in controlled studio environments, with MasterClass's production team working closely with
              instructors on course structure, sequencing, and visual presentation.

              MasterClass On Call is the most technically novel recent addition. On Call provides an AI
              assistant that mimics the voice patterns of a small set of selected instructors, responding to
              open-ended questions with advice styled to that instructor's domain and cadence. During beta
              testing, PCMag's reviewer spent over an hour with Chris Voss's On Call AI and found it
              hallucinated a book and contradicted itself between sessions—a material quality concern for
              the $15/month price point. On Call is technically a separate product from the core subscription
              and requires independent payment.

              MasterClass Certificates integrates AI-graded written exercises where learners submit answers
              to prompts about their work. The AI uses a visible rubric. PCMag's review found the grading
              easily satisfied by repeating keywords, raising concerns about data privacy (exercises ask
              for specific project names and business details) and the practical value of the credential.
              These are diligence-relevant weaknesses for enterprise buyers evaluating MasterClass at Work
              alongside credentialing platforms.
