  - id: TR005
    title: Mitigation and Kill Criteria Table
    notes: >
      Kill criteria are operationalizable triggers, not qualitative judgments. Each trigger is defined so it can be
      monitored via publicly available signals (SEC filings, press releases, app store ratings, news searches) without
      requiring non-public information. Thesis-break triggers indicate events that would materially undermine the
