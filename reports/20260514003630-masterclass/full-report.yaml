  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: B2C Customer Profile and Segments
        blocks:
          - type: paragraph
            body: |
              MasterClass's primary customer is a self-directed adult learner seeking inspiration and skill
              exposure rather than formal credentials. The platform's celebrity-instructor positioning—Gordon
              Ramsay on cooking, Serena Williams on tennis, Margaret Atwood on writing, and Bob Iger on
              leadership—attracts an audience that skews toward higher-income, educated professionals aged
              25–55 who associate the instructors with aspirational identity, not occupational training. This
              distinguishes MasterClass from Coursera, LinkedIn Learning, and Udemy, which compete primarily
              on vocational relevance and credential value.

              Three B2C subscription tiers serve this market: Standard ($120/yr, streaming only, one device),
              Plus ($180/yr, offline downloads, two devices), and Premium ($240/yr, six-device household
              sharing). All tiers provide full access to a catalog of more than 200 instructors and over
              3,500 bite-sized lessons across 11 content categories. No free tier exists; a 30-day money-back
              guarantee applies to new subscribers. Gift subscriptions are available and marketed explicitly
              as an aspirational consumer purchase, with bulk gifting of up to 50 memberships at a time
              offered to corporate gift buyers.

              International reach is supported through 15-language localization, broadening the addressable
              market beyond English-speaking regions. SimilarWeb data suggests MasterClass.com attracts
              approximately 9 million or more monthly visits, representing a substantial discovery surface
              but with an unknown conversion rate. Learner engagement beyond initial curiosity is a known
              weakness: industry patterns for subscription entertainment platforms suggest course completion
              rates of 20–30%, and MasterClass has not published platform-level completion data.
