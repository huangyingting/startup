        - >-
          Thesis-break trigger — material legal liability, injunctive remediation cost, and reputational harm;
          re-underwrite or initiate exit review
      - - Subscriber growth stagnation or decline
        - SimilarWeb monthly traffic estimates; App Store review volume growth; Trustpilot review volume trajectory
        - Two consecutive quarters of declining SimilarWeb visits OR App Store rating below 4.0 (currently 4.6)
