      - - Down-round financing at material discount to $2.75B
        - Press release and SEC Form D filings on EDGAR for Yanka Industries; PitchBook/Crunchbase data updates
        - Equity round priced at < $1.4B (50% discount to 2021 peak); or bridge note with highly punitive terms
