          value: 7/10 — Celebrity catalog genuinely difficult to replicate; AI moat unproven
        - label: Business Model Quality
          value: 5/10 — Subscription ARPU solid; B2B early; no credentials; no free tier
        - label: Financial Health
          value: 3/10 — No disclosure; 33% headcount cuts; Fidelity 80-90% markdown implied
        - label: Risk Profile (lower = riskier)
          value: 3/10 — High AI substitution; sector distress; closed IPO window; cap table opacity
        - label: Valuation / Entry Attractiveness
          value: 5/10 — Fidelity-implied $275-550M offers secondary entry opportunity; but base case uncertain
        - label: Evidence Quality
          value: 3/10 — No audited revenue; no subscriber data; no cap table; all estimates
        - label: Overall IC Score
          value: 4.5/10 — CAUTIOUS HOLD; secondary entry below $400M only
