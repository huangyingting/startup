      - number: '5.4'
        title: Trust, Safety, and Quality Controls
        blocks:
          - type: paragraph
            body: |
              MasterClass's trust posture has a meaningful split between its product-quality reputation
              and its subscription-management practices. On the product side, it has maintained rigorous
              content standards: in 2017, it removed a course by Kevin Spacey following multiple sexual
              assault allegations, demonstrating willingness to act on instructor conduct. The high
              production quality and instructor vetting process create an implicit quality floor that
              distinguishes MasterClass from open-marketplace platforms where instructor quality varies
              widely (as on Udemy). Content is reviewed, structured, and produced by MasterClass's own
              team in partnership with each instructor.

              On the subscription side, the picture is significantly worse. Trustpilot aggregates 1,059
              reviews at a 1.6/5 average (rated "Bad"), with the dominant complaint themes being: automatic
              renewal without clear consent; difficulty canceling subscriptions; AI-only customer service
              with no pathway to a human agent; and denial of refunds even when requested shortly after
              auto-renewal. Reviewers describe a UX design that actively obscures cancellation steps.
              These complaints represent a systemic trust gap that is relevant to enterprise purchasers
              and regulators in the EU and US, where auto-renewal regulations have become more stringent.

              MasterClass does not publicly disclose data-security practices, privacy certifications (SOC 2,
              ISO 27001), or enterprise compliance documentation. For MasterClass at Work, the absence of
              publicly visible compliance documentation is a procurement obstacle in regulated industries.
              On Call's AI-graded exercises explicitly ask for business project names and specific work
              context, creating potential exposure of confidential business information to an AI system
              with no published data-retention or privacy policy for this specific feature.

              MasterClass offers a 30-day money-back guarantee in lieu of a free trial. Guest passes
              (14-day access shared by existing subscribers) exist but require credit card entry,
              adding friction for trial users. These trust signals are mixed: the guarantee is a positive
              commitment, but the cancellation UX and customer service design undermine it in practice.
