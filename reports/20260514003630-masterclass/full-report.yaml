      - number: '7.4'
        title: Technology, AI Disruption, and Platform Risks
        blocks:
          - type: paragraph
            body: |
              Generative AI represents the most structurally threatening long-term risk to MasterClass's competitive
              moat. MasterClass's differentiation rests on two pillars: (1) exclusive access to celebrity instructors
              who possess genuine mastery in their fields, and (2) cinematic production quality that creates an
              immersive learning environment. The AI On Call product (launched late 2023/early 2024 at $15/month)
              demonstrates that MasterClass itself is using AI to simulate instructor voices and conversational
              Q&A — the same technology that, in the hands of a competitor or an open-source model, could approximate
              the MasterClass experience at near-zero marginal cost. Voice cloning and AI avatar tools (such as
              ElevenLabs, HeyGen, D-ID) are advancing rapidly. The barrier to replicating the form factor — if not
              the brand — is declining each quarter.

              Platform dependency risks are material and undisclosed. MasterClass streams video globally; its
              infrastructure almost certainly relies on a major cloud provider (most likely AWS) and a CDN. A
              significant cloud outage, a CDN disruption, or a unilateral change in Apple App Store or Google Play
              policies (such as a higher revenue share or content moderation action) could immediately impair service
              delivery or revenue collection. Apple's App Store takes a 30% revenue share on in-app purchases; if a
              material portion of MasterClass subscriptions are captured through iOS, this represents a substantial
              margin drag and a single-counterparty concentration risk. The company has not publicly disclosed its
              infrastructure providers, in-app purchase share, or platform exposure.

              Key person risk is concentrated in David Rogier, the sole surviving co-founder and CEO since co-founder
              Aaron Rasmussen's departure in January 2017. Rogier has been the public face and strategic architect of
              MasterClass for nearly a decade. No public succession plan, COO, or named second-in-command is documented.
              The post-layoff leadership team (beyond Rogier) is not publicly identified, creating diligence opacity
              around whether the company retains the engineering, content, and commercial leadership required to execute
              the B2B pivot and AI product strategy. GDPR and CCPA compliance obligations — including right-to-erasure
              requests, data processing agreements with enterprise customers, and data subject access request handling —
              create ongoing operational and reputational risk for a company whose engineering headcount was materially
              reduced in the 2022–2023 cuts.
