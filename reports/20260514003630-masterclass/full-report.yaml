      - number: '7.2'
        title: Operational and Financial Risks
        blocks:
          - type: paragraph
            body: >
              MasterClass's cost structure is fundamentally different from a standard SaaS company. Each course

              requires Hollywood-grade production — estimated at $100,000 to $500,000+ per course — plus celebrity

              instructor fees that may include upfront guarantees and revenue-share components. These content production

              costs are largely fixed and sunk once production is complete; if subscriber growth stalls, the cost per

              subscriber rises. Industry estimates place 2022 annual recurring revenue at $125–$165M, implying a

              cost-to-revenue ratio that was not sustainable without continued growth, as confirmed by two rounds of

              layoffs.


              The June 2022 reduction (~20% of the then ~500-person workforce) was reported simultaneously by Bloomberg,

              CNBC, EdTech Digest, and Hollywood Reporter and attributed to post-COVID subscriber growth normalization

              and a need to "focus on our most impactful work." The January 2023 reduction (~13% of remaining staff)

              was reported by EdSurge, Variety, and Hollywood Reporter. Together these two rounds cut approximately

              one-third of the total workforce over 18 months — a magnitude that indicates material financial stress,

              not routine optimization.


              Fidelity's quarterly NPORT-P SEC filings (most recent: February 2026 and January 2026 quarters) list

              Yanka Industries (MasterClass's legal entity) preferred shares at combined fair values of approximately

              $58–96M across two funds — compared to a cost basis anchored to the $2.75B peak valuation, this implies

              write-downs of 80–90% or more at investor-assessed fair value. No new equity fundraise has been announced

              since May 2021, and no debt facility is publicly known. Cash runway is not publicly disclosed; analyst

              estimates based on post-layoff headcount suggest monthly burn in the $6–12M range, but with 5+ years

              since the last fundraise, the company's current cash position is a critical and unconfirmed diligence
              item.


              The B2C subscription model itself introduces a structural financial risk: annual prepayment with 30-day

              money-back guarantee creates positive working capital on day one, but high refund volumes (signalled by

              Trustpilot complaint patterns) would erode realized revenue. Auto-renewal dispute chargebacks impose

              both revenue and operational costs. The company's lack of a free trial (versus most peers) reduces

              top-of-funnel conversion and may accelerate churn when subscribers feel they didn't get enough value.
