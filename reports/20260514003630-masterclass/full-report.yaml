    title: Investment KPI Scorecard — MasterClass May 2026
    type: kpi
    layout: compact
    summary: >
      IC-ready scoring of MasterClass across seven investment dimensions as of May 2026. Scores reflect synthesis of all
      diligence chapters; Evidence Quality penalised for absence of audited financials and subscriber data. Overall
      score of 4.5/10 supports CAUTIOUS HOLD rather than conviction buy or immediate sell.
