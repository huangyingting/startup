      - number: '4.3'
        title: Unit Economics and Estimated Cost Structure
        blocks:
          - type: paragraph
            body: >
              MasterClass's unit economics are substantially opaque because the company does not disclose revenue,
              subscriber counts,

              churn rates, or cost of goods sold. Analyst estimates suggest 2022 ARR in the $125–165M range, based on
              reported

              subscriber growth signals and comparisons to market peers. The consumer subscription average revenue per
              unit (ARPU) is

              directly observable from list pricing ($120–$240/year), but the tier mix — which determines blended ARPU —
              is unknown.

              If the majority of subscribers are on Standard ($120/year), blended ARPU is near $120; if Plus and Premium
              dominate,

              it could exceed $180. No disclosed cohort data allows LTV calculation.


              Customer acquisition cost (CAC) is a critical unknown. MasterClass's marketing model relies heavily on
              celebrity-brand

              content as advertising — high-profile instructors generate earned media that reduces explicit digital CAC
              relative to

              a pure ad-spend model. However, instructor contract costs and cinematic production expenses are
              substantial (estimated

              $100K–$500K+ per course) and must be amortized against subscriber volumes. Industry analogs for
              direct-to-consumer EdTech

              platforms suggest CAC in the $40–100/subscriber range, but MasterClass's premium positioning and high
              marketing spend

              could push this higher.


              Gross margin for a subscription video-on-demand platform like MasterClass is theoretically high (no
              physical COGS),

              but content production, instructor fees (including revenue-share components), platform hosting, and
              customer support

              introduce meaningful costs that may compress gross margin to 40–70% — below pure SaaS peers (65–80%).
              Marketing

              and sales expense as a share of revenue is likely elevated (30–50%), consistent with the celebrity-driven
              growth model.

              The two layoff rounds in 2022–2023 suggest management recognized the model was not scaling efficiently and
              sought to

              right-size OpEx relative to revenue trajectory.


              MasterClass On Call introduces a new cost item (AI inference costs) but also creates an incremental
              revenue line that

              leverages existing instructor content with near-zero marginal COGS — potentially a margin-accretive add-on
              if adoption scales.
