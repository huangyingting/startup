    title: Recommendation Logic Chain
    type: flow
    layout: standard
    summary: >
      Directed logic chain showing how the five evidence pillars — market position, product moat, financial health,
      sector valuation, and risk profile — combine to drive the CAUTIOUS HOLD / SELECTIVE SECONDARY recommendation as of
      May 2026.
