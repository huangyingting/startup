  - id: FR001
    title: Risk Heatmap
    type: matrix
    layout: wide
    summary: >
      Likelihood versus impact assessment of MasterClass's primary risks as of May 2026, based on public evidence. Risks
      are placed by qualitative scoring: likelihood reflects observable signals (complaint volume, layoff depth,
      regulatory enforcement trends); impact reflects revenue, brand, regulatory, and investor consequences. Cells in
      the upper-right quadrant (high likelihood, high impact) represent the most urgent investment risks.
    claimRefs:
      - CR001
      - CR005
      - CR009
      - CR015
      - CR021
      - CR022
      - CR023
      - CR031
      - CR032
      - CR037
    data:
      columns:
        - Low Impact
        - Moderate Impact
        - High Impact
        - Critical Impact
      rows:
        - label: High Likelihood
          values:
            - Marketing channel cost inflation
            - Subscriber retention decline (weak completion)
            - Customer service failure (AI-only, Trustpilot 1.6/5)
            - Auto-renewal FTC complaint exposure
        - label: Medium Likelihood
          values:
            - Content production slowdown
            - B2B sales execution shortfall
            - AI substitution erodes moat
            - Celebrity instructor scandal
        - label: Low Likelihood
          values:
            - COPPA minor-access violation
            - Payment processor disruption
            - GDPR enforcement action (EU)
            - FTC formal enforcement action
        - label: Very Low Likelihood
          values:
            - App store deplatforming
            - Platform data breach (major)
            - Cloud infrastructure outage (sustained)
            - CEO departure without successor
  - id: FR002
    title: Risk Transmission Map
    type: dag
    summary: >
      Directed acyclic graph showing how primary risk categories flow into downstream business outcomes for MasterClass.
      Root risks are upstream initiators; leaf nodes are investment-thesis impacts. The central transmission path runs
      from instructor risk and consumer complaints through revenue and ultimately to valuation.
    claimRefs:
      - CR001
      - CR005
      - CR011
      - CR015
      - CR021
      - CR023
      - CR031
      - CR032
      - CR037
    data:
      nodes:
        - id: instructor-risk
          label: Instructor Risk
          detail: Scandal, departure, or death of a top celebrity instructor
        - id: ai-substitution
          label: AI Substitution Risk
          detail: Generative AI replicates celebrity voice/expertise at near-zero marginal cost
        - id: consumer-complaints
          label: Consumer Complaint Escalation
          detail: Auto-renewal, cancellation, and refund disputes (Trustpilot 1.6/5)
        - id: ftc-enforcement
          label: FTC / Regulatory Enforcement
          detail: FTC Negative Option Rule violation; California ARL enforcement; CCPA/GDPR
        - id: cost-structure
          label: High Fixed Cost Structure
          detail: Hollywood production costs + celebrity fees; not scalable like UGC platforms
        - id: subscriber-churn
          label: Subscriber Churn / Stagnation
          detail: B2C subscriber base shrinks or stagnates post-pandemic
        - id: revenue-decline
          label: Revenue Decline
          detail: Annual subscription revenue contracts; B2B not yet large enough to offset
        - id: capital-exhaustion
          label: Capital Exhaustion Risk
          detail: No new funding since 2021; runway opaque; burn rate vs. cash position unknown
        - id: valuation-compression
          label: Valuation Compression
          detail: Investor marks already 80–90% below 2021 peak; down-round or impairment risk
        - id: brand-damage
          label: Brand and Reputational Damage
          detail: Adverse media (The Atlantic 2023), BBB 'F', Trustpilot 1.6/5
        - id: b2b-execution-risk
          label: B2B Execution Risk
          detail: Enterprise pivot requires LMS integration, credentials, and sales team — all partial or undisclosed
        - id: thesis-break
          label: Investment Thesis Break
          detail: Core hypothesis of EdTech brand moat + B2B diversification invalidated
      edges:
        - from: instructor-risk
          to: brand-damage
          label: scandal/departure damages brand
        - from: instructor-risk
          to: subscriber-churn
          label: catalog impairment drives churn
        - from: ai-substitution
          to: subscriber-churn
          label: cheaper AI alternative reduces willingness to pay
        - from: ai-substitution
          to: b2b-execution-risk
          label: AI tools commoditize enterprise L&D content
        - from: consumer-complaints
          to: ftc-enforcement
          label: complaint volume triggers regulatory scrutiny
        - from: consumer-complaints
          to: brand-damage
          label: Trustpilot/BBB adverse scores amplify reputational risk
        - from: ftc-enforcement
          to: revenue-decline
          label: cancellation friction removal increases churn; fines reduce cash
        - from: cost-structure
          to: capital-exhaustion
          label: high burn rate accelerates runway depletion
        - from: subscriber-churn
          to: revenue-decline
          label: direct revenue impact
        - from: revenue-decline
          to: capital-exhaustion
          label: lower revenue accelerates cash depletion
        - from: capital-exhaustion
          to: valuation-compression
          label: distressed funding needed at punitive terms
        - from: b2b-execution-risk
          to: revenue-decline
          label: B2B fails to offset B2C decline
        - from: brand-damage
          to: b2b-execution-risk
          label: enterprise buyers avoid 1.6/5 Trustpilot vendor
        - from: valuation-compression
          to: thesis-break
          label: returns impaired
        - from: capital-exhaustion
          to: thesis-break
          label: runway exhaustion
  - id: FR003
    title: Dependency Map
    type: dag
    summary: >
      Dependency graph of MasterClass's critical external relationships. Each node represents a key partner, platform,
      regulator, or infrastructure provider. Edge labels indicate the nature of the dependency. Nodes marked as
      "single-source" represent concentration risks where no known alternative is confirmed.
    claimRefs:
      - CR003
      - CR007
      - CR025
      - CR032
      - CR033
      - CR034
      - CR035
    data:
      nodes:
        - id: masterclass-core
          label: MasterClass (Core Platform)
          detail: Subscription streaming platform; B2C and B2B; AI On Call add-on
        - id: celebrity-instructors
          label: Celebrity Instructors (200+)
          detail: Brand moat and content supply; top-20 names drive disproportionate acquisition and renewal value
        - id: cloud-provider
          label: Cloud Provider (AWS — inferred)
          detail: Video hosting, compute, data storage, CDN integration; single-source concentration risk
        - id: apple-google
          label: Apple App Store / Google Play
          detail: Mobile distribution and in-app subscription billing; 30% Y1 revenue share; policy risk
        - id: payment-processor
          label: Payment Processor (Stripe — inferred)
          detail: Annual subscription billing, renewals, refunds; chargeback management
        - id: ai-vendors
          label: AI Infrastructure Vendors
          detail: On Call voice and LLM APIs; instructor voice replication; undisclosed vendor(s)
        - id: regulators
          label: FTC / CA AG / CCPA Regulators
          detail: FTC Negative Option Rule; California ARL; CCPA enforcement — all directly applicable
        - id: enterprise-customers
          label: Enterprise Customers (B2B)
          detail: MasterClass at Work; Deloitte as sole named reference; concentration in small named set
      edges:
        - from: masterclass-core
          to: celebrity-instructors
          label: brand and content supply — single-source by name
        - from: masterclass-core
          to: cloud-provider
          label: infrastructure dependency — single-source (inferred)
        - from: masterclass-core
          to: apple-google
          label: mobile distribution — 30% revenue share; deplatform risk
        - from: masterclass-core
          to: payment-processor
          label: billing and renewals — concentration risk if single processor
        - from: masterclass-core
          to: ai-vendors
          label: On Call product — undisclosed vendor; voice licensing risk
        - from: masterclass-core
          to: regulators
          label: compliance obligation — FTC, CA AG, CCPA all have direct jurisdiction
        - from: masterclass-core
          to: enterprise-customers
          label: B2B revenue dependency — Deloitte only named; concentration high
        - from: celebrity-instructors
          to: enterprise-customers
          label: brand credibility for enterprise L&D — instructor roster validates B2B value prop
