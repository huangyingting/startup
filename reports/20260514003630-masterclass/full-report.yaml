          terminal value assumption
      - - CEO David Rogier departure
        - >-
          LinkedIn profile changes; press release search; SEC Form D amendment (if new round); EDGAR filing for Yanka
          Industries
        - Any confirmed departure announcement without a named, experienced successor in place within 30 days
