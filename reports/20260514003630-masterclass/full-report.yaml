  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Architecture and Content Offering
        blocks:
          - type: paragraph
            body: |
              MasterClass is a direct-to-consumer and B2B subscription platform that delivers video-based
              learning from celebrity and expert instructors. The product's foundational architecture consists
              of three consumer subscription tiers and an enterprise offering, all granting access to a shared
              catalog of more than 200 instructors and over 3,500 bite-sized lessons organized across 11 content
              categories. Subscription tiers differ on device concurrency and offline-download access rather
              than catalog access—Standard ($120/yr) provides full catalog streaming on one device with no
              offline capability; Plus ($180/yr) adds offline downloads and two concurrent devices; Premium
              ($240/yr) extends device concurrency to six for household sharing. MasterClass at Work ($180/seat/yr)
              provides access for corporate teams as an enterprise licensing arrangement.

              The 11 content categories span Acting and Performing Arts, Art and Design, Business and
              Entrepreneurship, Community and Government, Film and TV, Food and Drink, Games and Digital
              Media, Health and Wellness, Music, Outdoor Adventures and Events, and Science and Technology.
              Categories are not uniform in size: Film and TV as well as Writing (a subset of Arts) carry a
              particularly rich instructor roster that includes Martin Scorsese, Spike Lee, Helen Mirren,
              Samuel L. Jackson, Amy Poehler, Margaret Atwood, Malcolm Gladwell, James Patterson, and many
              others. Culinary arts courses feature Gordon Ramsay, Thomas Keller, Wolfgang Puck, and Massimo
              Bottura. Music features Alicia Keys, Christina Aguilera, Usher, and Hans Zimmer. Sports includes
              Serena Williams, Steph Curry, Lewis Hamilton, and Wayne Gretzky.

              Two new product lines launched in 2024–2025 expand the offering:
              MasterClass Certificates are credentialing courses produced with institutional partners (Navy
              SEAL Foundation, The Moonshot Factory, Microsoft, Nvidia). They add reading material, interactive
              quizzes, and written exercises alongside video—a structural departure from the standard
              lecture-only course. MasterClass On Call is an AI-powered add-on ($15/month or $95/year) that
              enables interactive Q&A with AI modeled on selected instructor voices, with the product still
              in beta as of mid-2026. The gift subscription offering and support for 15 languages round out
              the product's international accessibility.
