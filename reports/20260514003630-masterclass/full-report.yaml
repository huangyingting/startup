      - number: '6.3'
        title: Customer Satisfaction and Sentiment
        blocks:
          - type: paragraph
            body: |
              MasterClass exhibits a pronounced dual-signal satisfaction pattern: highly positive ratings
              from engaged content consumers and highly negative ratings from subscription-process complainers.
              PCMag awarded the platform 4.5/5 and Editors' Choice status in its 2026 review, praising
              production quality, instructor talent, and the value of celebrity-driven aspirational content.
              The Apple App Store shows 4.6/5 from over 19,600 ratings, indicating strong satisfaction
              among active mobile users. TechRadar similarly recognized MasterClass as a top online learning
              platform.

              In sharp contrast, Trustpilot aggregates 1,059 reviews at a 1.6/5 "Bad" rating as of
              December 2025. Trustpilot's AI-generated summary captures the dominant themes: automatic
              renewals occurring without clear consent or notification, cancellation buttons described as
              disappearing or non-functional, refund denials even when requested shortly after billing,
              and customer service operated primarily by AI chatbot with no accessible human agent.
              Sitejabber reviews echo these patterns. The BBB has received complaints from consumers
              alleging unauthorized charges and difficulty obtaining refunds, consistent with the Trustpilot
              data. The Atlantic's 2023 investigation raised a more fundamental question: whether
              MasterClass delivers on its educational promises at all, or primarily provides "aspirational
              entertainment" that does not translate to measurable skill building.

              The divergence between App Store and Trustpilot ratings is expected: App Store raters are
              engaged learners who have found value in the product; Trustpilot raters are often motivated
              by a negative subscription experience that does not require content engagement. Both signals
              are informative. The consumer-experience and billing problems documented in Trustpilot
              represent a material regulatory and reputational risk, particularly in EU markets where
              auto-renewal rules are stricter and dark-pattern complaints are actionable.
