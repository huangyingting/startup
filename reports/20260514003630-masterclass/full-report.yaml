      - number: '6.2'
        title: B2B and Enterprise Customer Base
        blocks:
          - type: paragraph
            body: |
              MasterClass at Work is the company's B2B product, launched as a strategic pivot to enterprise
              L&D following the 2022 and 2023 layoff cycles that cut approximately one-third of MasterClass's
              workforce. The enterprise tier is priced at $180/seat/yr for teams fewer than 50 seats, with
              custom enterprise pricing for larger organizations obtained through sales outreach. The B2B
              product provides the same catalog as consumer tiers but adds L&D-specific features: content
              assignment to groups or individuals, analytics dashboards for top skills and learner engagement
              tracking, and exclusive L&D-oriented assets not in the consumer catalog.

              Deloitte is the only publicly named enterprise customer, with MasterClass citing a "353%
              Increased Sales and Profit" outcome and a testimonial from a Deloitte leader describing the
              ROI on training as "tremendous." MasterClass's marketing page for the enterprise product
              states that "Fortune 500 companies trust us" but provides no additional named customers.
              The company also offers a corporate gifting tier starting at $120/individual for employee
              perks and benefits programs, allowing bulk gift memberships without a recurring enterprise
              license commitment.

              The B2B segment is almost certainly a minority of total revenue as of 2025–2026, based on
              the company's continued focus on consumer channels and the relatively recent (~2023) enterprise
              push. However, enterprise accounts provide higher LTV per seat and more durable revenue than
              individual B2C consumers. The lack of LMS integration, the absence of accredited credentials,
              and the "aspirational entertainment" criticism from The Atlantic (2023) are the primary
              obstacles to B2B expansion against Coursera for Business and LinkedIn Learning.
