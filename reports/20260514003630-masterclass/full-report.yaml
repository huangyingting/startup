      - number: '4.4'
        title: Financial Risks, Valuation Context, and Diligence Verdict
        blocks:
          - type: paragraph
            body: >
              MasterClass faces several financial risks that a prospective investor must evaluate against its growth
              narrative.

              First, the $2.75B valuation from May 2021 is stale and almost certainly impaired. Fidelity's SEC filings
              as of

              early 2026 mark Yanka Industries shares at a fraction of acquisition cost, consistent with the broader
              70–90%

              collapse in EdTech public-market multiples (2022–2023). Even if MasterClass achieved $150M ARR, a 10×
              multiple

              implies $1.5B — well below the 2021 peak — and current EdTech multiples are closer to 3–8× for growing but

              unprofitable companies.


              Second, without a new funding round since May 2021, the company may be operating on diminishing cash
              reserves.

              Absent evidence of profitability (which would relieve cash dependency), the company is likely approaching
              a decision

              point: raise additional capital (potentially at a down round), achieve cash-flow breakeven, or pursue
              strategic

              alternatives including acquisition or secondary liquidity. The two layoff rounds are consistent with a
              cost-reduction

              program aimed at extending runway without new capital.


              Third, the subscriber retention model is untested in adverse conditions. The pandemic-era surge in
              subscriptions

              likely included many trial and gifted subscribers who did not renew at full price. If annual churn
              exceeded 40–50%

              (common for consumer EdTech), the company would require significant new subscriber acquisition just to
              maintain ARR —

              an expensive proposition given CAC levels and celebrity marketing spend.


              Fourth, the B2B pivot to MasterClass at Work introduces enterprise sales complexity, longer sales cycles,
              and

              customer concentration risk. If a handful of enterprise accounts represent a significant share of B2B
              revenue, loss

              of any one could have outsized impact.


              The financial verdict is cautious: MasterClass has a credible brand, a differentiated product, and a real
              subscriber

              base, but the combination of undisclosed financials, a stale peak valuation, two layoff cycles, and no
              disclosed

              new funding represents a pattern consistent with a company operating under financial pressure. Investors
              should

              treat any engagement as requiring full audited financials, a cap table disclosure, and management guidance
              on

              path to profitability or next funding before forming a view.
