      - number: '4.2'
        title: Capital Structure and Funding Adequacy
        blocks:
          - type: paragraph
            body: >
              MasterClass raised approximately $461M in equity across six rounds from 2014 through May 2021. The Series
              F,

              announced via GlobeNewswire on May 27, 2021, totaled $225M and valued the company at $2.75 billion,
              placing it

              among the most highly valued EdTech companies globally at the time. Fidelity Investments was confirmed as
              the lead

              investor in the Series E ($100M, May 2020), and the company has noted continued Fidelity participation in
              Series F.

              IVP and Javelin Venture Partners are among confirmed institutional backers per public investor records.


              As of May 2026, no additional equity fundraise has been publicly announced, and no IPO filing has been
              made. Fidelity's

              quarterly NPORT-P SEC filings (the most recent filed April 2026 for the period ending February 28, 2026)
              list "Yanka

              Industries Inc Series E" and "Yanka Industries Inc Series F" among Fidelity Advisor Series I portfolio
              holdings, with

              combined Fidelity-assessed fair values of approximately $27.4M (Series E) and $31.2M (Series F) at cost
              basis

              significantly higher — implying material write-downs from peak. A second Fidelity fund (Concord Street
              Trust / Founders

              Fund, January 2026 quarter) similarly lists Yanka Industries holdings with fair values of approximately
              $3.9M (Series E)

              and $33.5M (Series F). These valuation marks provide rare third-party evidence that investor-level prices
              for MasterClass

              preferred shares have declined materially since 2021.


              Cash on hand, monthly burn, and runway as of May 2026 are not publicly disclosed. Analyst estimates based
              on headcount

              proxies (~300–400 post-layoff employees at estimated $200K fully loaded annual cost), content and
              infrastructure spend,

              and marketing budget suggest monthly burn in the $8–15M range. If the company raised $225M in May 2021 and
              has been

              burning at the low end ($8M/month), approximately $185M in theoretical remaining cash would imply a
              further runway of

              23+ months from May 2021 (i.e., through 2023). Cost-reduction actions (two layoff rounds) suggest the
              company was

              managing capital carefully. No debt instruments or credit facilities have been publicly disclosed.
