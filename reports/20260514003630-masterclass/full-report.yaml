  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >
              MasterClass operates a subscription-first revenue model anchored by annual memberships in three tiers:
              Standard

              ($120/year), Plus ($180/year), and Premium ($240/year). The subscription gives unlimited access to the
              full catalog

              of 3,500+ lessons and 200+ instructors. Pricing has remained broadly stable since the platform's early
              years, though

              the company offers periodic promotional discounts (observed at up to 50% off) that obscure realized
              revenue per

              subscriber. A gift-subscription product serves as a one-time revenue line but is not a recurring stream.


              In 2020–2021, MasterClass launched MasterClass at Work, an enterprise B2B product priced at $180/seat/year
              targeting

              corporate learning and development teams. The company's official website and the New York Times have
              confirmed this

              product, but enterprise penetration, contract counts, and contribution to total revenue remain
              undisclosed. The B2B

              pivot represents a deliberate effort to diversify beyond the consumer base, where high marketing costs and
              celebrity

              contract fees weigh on unit economics.


              In 2024–2025, the company launched MasterClass On Call, an AI-powered product at $15/month that offers
              interactive

              Q&A sessions modeled on instructor voices. On Call is an incremental add-on revenue stream that leverages
              existing

              content investment. Revenue contribution and adoption are not publicly reported. Revenue recognition for
              annual

              subscriptions follows a deferred revenue model (payment received upfront, recognized ratably), which is
              standard for

              subscription software; however, no public financial statements confirm this treatment.


              The combination of B2C subscriptions, B2B seats, and AI add-ons gives MasterClass three distinct revenue
              streams

              with materially different economics: B2C is high-volume/low-price, B2B is medium-volume/medium-price with
              enterprise

              sales motion, and AI is emerging. Revenue mix between streams is not publicly disclosed.
