        - USA — Federal
        - Final rule; in effect
        - High — complaint profile matches prohibited practices
        - Critical — up to $51,744/violation/day; class action exposure
        - Cancel-flow UX changes; disclosure improvements (unconfirmed)
        - High — Trustpilot complaint pattern is direct evidence of prima facie violations
        - Obtain independent UX audit of cancel flow; legal counsel opinion on FTC compliance
      - - FTC Act Section 5 — Deceptive / Unfair Trade Practices
        - USA — Federal
        - Always-on statute; no current enforcement action confirmed
        - Medium — pattern of consumer complaints could trigger investigation
        - High — injunctive relief; civil monetary penalties; reputational damage
        - Terms of service disclosure; refund policy posting (adequacy unconfirmed)
        - Medium — no confirmed complaint; risk elevated by Trustpilot/BBB pattern
        - Request legal counsel compliance memo; confirm FTC complaint database absence
      - - California Automatic Renewal Law (Cal. Bus. & Prof. Code §17600–17606)
        - California, USA
        - In force; actively enforced by CA AG and private plaintiff bar
        - High — MasterClass is headquartered in San Francisco; CA ARL is directly applicable
        - High — class action exposure; AG enforcement; restitution + penalties
        - Annual renewal disclosure in checkout flow (format/adequacy unconfirmed)
        - High — CA ARL violations trigger per-subscriber damages; class action economics are asymmetric
        - Audit California-specific checkout disclosures and cancellation UX against ARL checklist
      - - CCPA / CPRA (California Consumer Privacy Act and its 2023 amendments)
        - California, USA
        - In force; CPRA amendments effective 2023; CPPA enforcement active
        - Medium — applicable to MasterClass's subscriber data at scale; no confirmed CPPA action
        - High — civil penalties up to $7,500/intentional violation; CPPA audit authority
        - Privacy policy published; opt-out link present (completeness unconfirmed)
        - Medium — no reported enforcement; risk is endemic to all consumer subscription platforms in CA
        - Confirm data mapping, DSAR process, opt-out mechanisms, and data retention policies
