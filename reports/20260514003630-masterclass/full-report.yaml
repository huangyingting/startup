    notes: >
      Triggers are ranked by severity and immediacy. Any single Tier-1 trigger should prompt immediate thesis
      reassessment and potential exit. Tier-2 triggers are directional signals requiring evidence accumulation before
      action. All triggers are defined against publicly observable evidence sources (SEC filings, press releases,
      employee databases) to enable monitoring without requiring insider access.
