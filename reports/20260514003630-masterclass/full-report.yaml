  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Benchmarks and Comparable Companies
        blocks:
          - type: paragraph
            body: |
              Valuing MasterClass requires triangulating across a set of public and private EdTech peers whose
              fundamentals differ in scale, business model, and growth trajectory, but whose market re-rating
              since 2021 provides the most directly observable evidence of sector multiple compression.

              Among public comparables, Duolingo (DUOL) remains the standout premium outlier. With approximately
              $531 million in trailing revenue and a market capitalization near $6 billion, Duolingo commands
              roughly an 11x enterprise value-to-revenue multiple — justified by 40%+ year-over-year revenue
              growth, a free-to-paid conversion funnel of over 500 million registered users, and demonstrated
              operating leverage. MasterClass cannot match this growth profile; its subscriber base is orders of
              magnitude smaller and its addressable free-tier funnel is effectively zero. Applying Duolingo's
              premium multiple to MasterClass would be analytically indefensible.

              Coursera (COUR) is a more honest structural peer: subscription-plus-credentials model, university
              content partnerships, consumer and enterprise segments. At approximately $635 million in trailing
              revenue, Coursera traded at roughly 1.9x EV/Revenue in mid-2025 — a severe compression from the
              ~10x multiple at its 2021 IPO. Udemy (UDMY), the largest public marketplace EdTech, trades at
              approximately 1.5x trailing revenue on ~$743 million in annual sales.

              The distress comparables are informative for downside framing. 2U Inc., which acquired edX from
              MIT and Harvard for $800 million in 2021, filed Chapter 11 bankruptcy in July 2023 after its
              revenue model collapsed under high content acquisition costs and weak learner retention. Chegg,
              once a $12 billion market cap company, traded below $200 million by early 2026 after ChatGPT
              materially disrupted its homework-help core. These cases establish that EdTech valuations carry
              no floor — rapid value destruction is possible when a key monetization assumption breaks.

              The implied MasterClass revenue multiple of approximately 21x at the $2.75 billion Series F
              (based on estimated $130 million ARR at the time) was a product of the 2021 zero-interest-rate
              liquidity bubble. The sector-wide re-rating to 1.5–5x revenue for subscription EdTech defines
              the fair-value range today, with a premium of up to 8–12x reserved for companies with
              demonstrable high growth and expanding unit economics.
