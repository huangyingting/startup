  evidenceGaps:
    - type: not-found
      severity: moderate
      topic: "MasterClass subscriber count and retention data"
      relatedQuestionRefs: [QP025]
      missingEvidence: >
        MasterClass does not publicly disclose subscriber counts, monthly active users, annual renewal
        rates, or engagement metrics. As a private company, this data is unavailable without direct
        due diligence access. The absence prevents direct comparisons with Coursera's 148M+ registered
        users or Udemy's 73M+ learners.
      whyItMatters: >
        Subscriber scale and retention are key indicators of MasterClass's competitive traction and
        unit economics. Without this data, assessing whether MasterClass at Work can reach enterprise
        scale and whether consumer churn is sustainable is not possible from public sources.
      diligenceAsk: >
        Request subscriber cohort retention data, monthly active subscriber rate, 12-month renewal
        rate, and average sessions-per-subscriber from company during due diligence.

    - type: estimate-only
      severity: moderate
      topic: "Premium consumer online learning niche sizing"
      relatedQuestionRefs: [QP019]
      missingEvidence: >
        No primary market research report precisely segments the online learning market into the
        aspirational/celebrity/premium consumer niche that MasterClass targets. Market estimates in
        this segment ($5-10 billion SOM) are derived synthetically from broader market data and
        should not be treated as independently verified.
      whyItMatters: >
        Accurate TAM/SAM/SOM for MasterClass's specific niche is needed to assess long-term growth
        potential and the attractiveness of the premium consumer learning segment relative to the
        broader $263B online learning market.
      diligenceAsk: >
        Commission or request custom market segmentation for the premium aspirational-learning
        consumer niche; cross-check against MasterClass's own disclosed or estimated subscriber
        demographics.

    - type: not-found
      severity: low
      topic: "Competitor enterprise win/loss rates against MasterClass at Work"
      missingEvidence: >
        No public win/loss data or enterprise case study evidence was found indicating how often
        MasterClass at Work displaces LinkedIn Learning, Coursera for Business, or Udemy Business
        in enterprise procurement decisions.
      whyItMatters: >
        Enterprise win rates would clarify whether MasterClass at Work is gaining traction or whether
        the credential gap is preventing enterprise adoption at scale.
      diligenceAsk: >
        Request MasterClass at Work pipeline data, closed-won enterprises, average deal size, and
        renewal rate from company management.

