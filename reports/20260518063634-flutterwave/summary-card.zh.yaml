summary:
  headline: Flutterwave 是非洲最重要的支付基础设施 franchise，年 TPV 超过 $26B；但上一轮 $3B 估值相对当前可比倍数偏高， 公司还背着未解决的监管、安全和 IPO 准备度风险。
