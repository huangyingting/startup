  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >
              Flutterwave's revenue is generated primarily from transaction fees charged as a percentage of the payment
              value processed through its platform. The gateway product (Rave) is the dominant revenue driver, charging
              Nigerian merchants 1.4% of the transaction value plus NGN 45 flat for domestic card payments;
              international Mastercard and Visa payments attract a 3.8% fee. These published rates represent list
              pricing — the actual blended take rate across Flutterwave's full portfolio of transaction types,
              geographies, and volume tiers is lower, reflecting negotiated bulk rates for enterprise clients and
              competitive domestic pricing. Analysts and observers estimate the effective blended take rate at 1–2%
              across the $26B+ TPV the company disclosed in 2022. At the low end (1% take rate), implied gross revenue
              is approximately $260M/year; at the high end (2%), approximately $520M/year. These are analyst-constructed
              proxies, not company-published figures.

              Beyond the gateway, Flutterwave operates four additional revenue-generating products: Send (remittance),
              which earns on FX spread and corridor fees on diaspora transfers from the US, Canada, and other markets
              into Africa; Barter (virtual card issuance), which captures interchange on card transactions; Store and
              Afritickets (SME storefront and event-ticketing), which generate SaaS-style subscription and marketplace
              commission revenue. The relative contribution of each stream has not been publicly disclosed and is not
              available for underwriting without data-room access.

              Revenue recognition for payment transactions is straightforward and event-driven: fees are earned at the
              time of transaction completion. Remittance revenue recognition follows the corridor transaction event plus
              FX spread crystallisation. Subscription and SaaS components from Store/Afritickets, if material, would
              recognise ratably. FX translation is a material recognition issue: Flutterwave earns significant
              naira-denominated revenue in Nigeria (its largest market), and the naira depreciated more than 40% against
              the USD in 2023–2024, compressing dollar-reported revenue and gross margin even with flat local-currency
              growth.

              The CBN microlender license obtained in April 2026 adds a potential lending revenue stream — interest
              income on merchant cash advances or working-capital loans disbursed through the Flutterwave merchant
              portal. This is a new and unquantified revenue line as of the report date. The stablecoin wallet
              partnership with Turnkey (January 2026) could introduce asset-custody and cross-border crypto-settlement
              fees if adopted at scale.
