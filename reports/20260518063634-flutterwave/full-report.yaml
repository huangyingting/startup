  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Customer Workflow Context
        blocks:
          - type: paragraph
            body: >
              Flutterwave for Business (F4B) is an API-first payment platform that enables businesses of all sizes to
              accept and disburse payments across Africa and globally. The platform is structured around five principal
              product modules — Checkout (Rave), Send App, Store, Barter, and Afritickets — each targeting a distinct
              customer workflow: merchant payment acceptance, cross-border diaspora remittance, no-code e-commerce
              storefront creation, virtual card issuance for international purchases, and event ticketing respectively.
              Two capabilities in active expansion round out the portfolio as of early 2026: the Mono open banking layer
              (acquired January 2026) and stablecoin wallets via the Turnkey/Nuvion partnership (launched in beta,
              January 2026). The platform serves 900,000+ business customers across 34+ countries.

              For a Nigerian e-commerce merchant, the typical workflow begins with API or SDK integration of the
              Checkout product. Once live, Flutterwave's smart payment ordering system dynamically selects the optimal
              payment rail — from among cards, bank transfers, mobile money (MTN MoMo, Airtel, M-Pesa), USSD, VISA QR,
              and others — to maximise success rate and minimise cost. Settlement flows through the merchant's
              Flutterwave dashboard and is disbursed to their bank account on the settlement cycle. For a diaspora
              consumer, the Send App provides a parallel workflow: download the iOS/Android app, authenticate, specify
              amount and recipient country, and execute a remittance from the US, Canada, or UK to an African
              destination. The Store product serves micro-merchants and creators who lack engineering resources; setup
              takes minutes, products list automatically on Flutterwave Market, and payments are accepted across all
              supported methods.
