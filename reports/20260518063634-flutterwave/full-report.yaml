      - number: '2.2'
        title: Market Sizing — TAM, SAM, SOM
        blocks:
          - type: paragraph
            body: >
              Precise market sizing for African digital payments requires multiple lenses because there is no single
              authoritative dataset covering the continent. The broadest lens is total annual payment flows: Africa
              processes an estimated $800 billion or more per year, of which digital and semi-digital channels account
              for a growing share. A narrower fintech-revenue lens is used by research firms and consultancies: McKinsey
              and industry consensus estimate Africa fintech market revenues could reach $65 billion annually by 2030
              from a base of approximately $6 billion in 2020, implying a 15–20% CAGR. Africa.com projects the total
              Africa payments market (including mobile money) to reach $146 billion by 2030 using a broader definition.

              Flutterwave's serviceable addressable market (SAM) is best defined as the payment flows of businesses and
              consumers in the 34+ countries where it holds operational licenses or local partnerships, weighted by the
              digital payment penetration in each market. Applying the company's own $26 billion TPV against Africa's
              estimated total formal digital payment market of roughly $200–400 billion suggests Flutterwave currently
              captures 3–4% of formal volume. The SAM in terms of reachable payment flows — those commercially
              addressable with current product and licensing — is estimated at $50–80 billion in annual payment flows
              given geographic coverage and product mix.

              The serviced obtainable market (SOM) at this stage is defined by TPV-driven fee revenue of approximately
              $350–500 million annually, based on Flutterwave's industry-standard 1.4–1.9% effective take rate on $26
              billion TPV. TAM expansion will depend on geographic penetration of new African markets, e-commerce growth
              (projected 38% CAGR for African e-commerce from $8 billion in 2019 to $46 billion in 2026), and growth in
              remittance corridors serving the African diaspora ($49 billion in 2022 remittances to Sub-Saharan Africa
              per World Bank). Critically, Africa's 781 million mobile money accounts (GSMA 2022) create both
              competition and partnership opportunity that expands the TAM of digital commerce broadly but fragments the
              payments stack.
            claimRefs:
              - CM004
              - CM005
              - CM006
              - CM007
