      - number: '5.2'
        title: API Architecture and Technology Stack
        blocks:
          - type: paragraph
            body: >
              Flutterwave's technical architecture is built around an API-first design, exposing payment initiation,
              status checking, transfer execution, and webhook-based event notification through RESTful API endpoints
              documented at developer.flutterwave.com. The platform currently maintains two concurrent API versions, v3
              and v4, both supported and documented in the official developer portal. Client-side SDKs are published as
              open-source repositories under the github.com/Flutterwave organisation in six programming languages:
              Node.js, PHP, Python, iOS (Swift), Android (Java/Kotlin), and React Native. The Node.js SDK counts 47
              stars and 41 forks on GitHub; the PHP SDK 24 stars and 22 forks. Developer documentation covers quickstart
              guides, API basics, payment methods, and integration recipes for key verticals including travel,
              e-commerce, fintech, banking, and remittance.

              Platform scale metrics disclosed in company materials: 500,000+ payments per day, over 20 million API
              calls per day, peak throughput of 231 requests per second, and over one billion cumulative transactions
              since the 2016 founding. The infrastructure is described as cloud-based and multi-region; specific cloud
              provider(s), regional deployment topology, and failover architecture are not publicly disclosed,
              representing a diligence gap. The smart payment routing engine is a core architectural differentiator: it
              dynamically selects among card networks, mobile money operators, bank transfer infrastructure, and USSD
              channels based on real-time signals optimising success rates and cost. The algorithm's specifics — data
              sources, ML components, and fallback logic — are proprietary and undisclosed.

              The Mono open banking acquisition adds a bank-data API layer connecting to 50+ banks in Nigeria, providing
              account aggregation, account-to-account payment initiation, and identity/account-ownership verification.
              Flutterwave views this as the foundation for "authenticated payment flows" reducing reliance on card
              rails. The Turnkey/Nuvion stablecoin integration adds blockchain wallet infrastructure (USDC/USDT) on
              Polygon network rails, with Nuvion bridging fiat and stablecoin settlement.
