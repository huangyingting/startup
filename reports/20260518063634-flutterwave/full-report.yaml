  - id: FR003
    title: Dependency map
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph of Flutterwave's critical external dependencies, mapping regulatory bodies, infrastructure
      providers, key partners, and competitive pressures. Nodes marked in warning or adverse tone identify the
      highest-risk dependency relationships. The CBK node (Kenya regulator, license pending) and CEO node (key-person,
      no succession) are the two most exposed dependency vectors.
    data:
      nodes:
        - id: n1
          label: Flutterwave
          role: focal company — African payments infrastructure
          tone: neutral
        - id: n2
          label: CBN (Central Bank of Nigeria)
          role: primary Nigerian regulator; switching license and microlender license holder
          tone: positive
        - id: n3
          label: CBK (Central Bank of Kenya)
          role: Kenyan regulator — payment license pending; directed banks to stop dealings 2022
          tone: warning
        - id: n4
          label: Nigerian banking / NIBSS
          role: settlement infrastructure; interbank transfer counterparty for fraud recovery
          tone: neutral
        - id: n5
          label: MTN Mobile Money
          role: key mobile-money integration partner; also potential competitor
          tone: warning
        - id: n6
          label: Cloud infrastructure (AWS / hosting)
          role: compute and storage dependency; no disclosed SLA
          tone: warning
        - id: n7
          label: CEO (Olugbenga Agboola)
          role: key-person dependency — regulatory, investor, and partnership relationships
          tone: warning
        - id: n8
          label: EFCC (Nigeria)
          role: AML enforcement oversight; cybercrime research center consortium partner
          tone: neutral
        - id: n9
          label: Paystack / Stripe
          role: primary Nigerian competitor; developer-first positioning; competitive pricing pressure
          tone: adverse
        - id: n10
          label: US state regulators (29 of 50 states)
          role: money transmission authorization; 21 states uncovered
          tone: warning
