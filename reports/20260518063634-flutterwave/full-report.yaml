      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Kill Criterion 1 — Kenya CBK license denial would eliminate East Africa and signal contagion risk
            body: >-
              Flutterwave has operated in Kenya since at least 2020 without a Central Bank of Kenya payment services
              license. As of May 2026, the CBK governor has publicly confirmed the licensing framework for fintechs is
              under revision and no timeline for Flutterwave's application has been disclosed. A formal rejection — or
              the absence of a license by the time the revised National Payment Systems Act is enacted — would prohibit
              Flutterwave from legally operating as a payment provider in Kenya, eliminating what is likely a material
              East Africa revenue stream. More critically, a CBK rejection would send a regulatory-contagion signal to
              other frontier-market regulators in Uganda, Tanzania, and Ethiopia who are observing Kenya's treatment of
              unlicensed fintechs. Investors should treat the CBK licensing resolution as a condition precedent to any
              commitment.
            calloutType: risk
            claimRefs:
              - CR001
              - CR005
              - CR006
              - CR041
          - type: callout
            title: Kill Criterion 2 — Two fraud incidents in 12 months with no disclosed independent security audit
            body: >-
              The February 2023 ₦2.9B unauthorized transfer and the October 2023 ₦19B POS glitch together exposed
              approximately $28 million and required two sets of court orders to recover funds spread across 35+
              financial institutions. Flutterwave denied any hack in the first incident and attributed the second to a
              technical glitch, but provided no root-cause analysis, penetration test report, or third-party security
              audit for either event. The EFCC partnership for a cybercrime research center is a public-private
              collaboration, not a technical security certification. Any third incident exceeding $5M within twelve
              months of October 2023 would confirm that controls have not improved and would likely trigger regulatory
              review in Nigeria. Pre-commitment diligence must include review of internal security architecture,
              fraud-control KPIs, and at minimum a SOC 2 Type II audit covering the platform's most recent 12-month
              period.
            calloutType: risk
            claimRefs:
              - CR011
              - CR013
              - CR015
              - CR016
          - type: callout
            title: Kill Criterion 3 — 3+ years without equity raise; IPO timeline undefined as of May 2026
            body: >-
              Flutterwave last raised equity capital in February 2022 ($250M Series D at >$3B valuation). As of May
              2026, more than three years have elapsed with no confirmed equity round, secondary sale, or IPO. The
              48-month kill-criterion threshold was reached in February 2026. An IPO was announced in April 2024
              targeting the Nasdaq but no S-1 has been filed and no listing date confirmed. Late-stage African fintech
              valuations have broadly compressed 30-60% from 2021-2022 peaks. Burn rate, runway, and cash position are
              private. Without disclosed financial data, investors cannot determine whether the fundraising gap reflects
              a deliberate hold-off strategy (building toward better IPO metrics) or genuine financing difficulty. A
              down-round, bridge financing on punitive terms, or a forced IPO at a depressed valuation would materially
              impair existing investor economics.
            calloutType: risk
