companyProfile:
  summary: >-
    Flutterwave is a Nigerian-American fintech company founded in 2016 by Olugbenga 'GB' Agboola (CEO) and Adeleke
    Adekoya. Headquartered in San Francisco with operational presence in Lagos, Flutterwave provides API-driven payment
    infrastructure enabling enterprises, SMBs, and developers to accept payments, make transfers, and build financial
    products across more than 34 African countries. Its platform processes $26B+ in annual transaction value and has
