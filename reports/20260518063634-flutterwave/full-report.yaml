      - number: '6.3'
        title: Retention signals, geographic concentration, and growth trajectory
        blocks:
          - type: paragraph
            body: >-
              Flutterwave has processed $26B+ in total payment volume and 200M+ transactions across 34+ African
              countries and 30+ currencies as of early 2022 disclosures. These figures imply a substantial, multi-year
              base of recurring merchant customers, but no cohort data, NRR, GRR, churn rate, or NPS score has been
