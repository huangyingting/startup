chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, business model, and geographic footprint
        blocks:
          - type: paragraph
            body: |
              Flutterwave was founded in 2016 in Nigeria with the mission of simplifying payments for
              businesses across Africa and connecting African economies to global commerce. The company
              is best described as a payments infrastructure layer: it provides the APIs, checkout flows,
              and compliance scaffolding that allow merchants, enterprises, and financial institutions to
              accept and disburse money across 34+ African countries and into global corridors. Its
              corporate headquarters is in San Francisco, California, positioning it to fundraise in US
              capital markets and engage global enterprise customers, while its operational heartbeat
              remains in Lagos, Nigeria. The dual-headquarters model is a deliberate strategic choice
              common among high-growth African technology companies that must simultaneously manage US
              investor relations and local African regulatory relationships.

              The core product thesis is that Africa's fragmented payment rails — multiple currencies,
              central banks, and local-wallet ecosystems — are best unified by a single API-based
              abstraction layer. Flutterwave's Rave product serves as the primary checkout and gateway
              engine; Send extends the platform into consumer-facing remittances; Store enables
              e-commerce storefronts for SMEs; Barter provides virtual-card issuance; and Afritickets
              covers event-ticketing payments. This multi-product strategy gives Flutterwave a broader
              revenue surface than pure-play gateway providers and reduces single-product concentration.

              Business-model stage and classification as of this report are straightforward: Flutterwave
              is a post-Series D private company that last raised capital publicly in February 2022 at a
              $3 B+ valuation. No subsequent primary rounds have been publicly disclosed as of the
              May 2026 run date. The company is active across both B2B (merchant processing, enterprise
              API sales) and B2B2C (consumer remittance via Send, event tickets via Afritickets) revenue
              channels, which differentiates it from pure infrastructure providers and supports the
              argument that it is building toward a vertically integrated payments stack rather than
              remaining a toll-road API business.
