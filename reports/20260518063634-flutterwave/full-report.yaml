      - number: '5.5'
        title: Security, Reliability and Technical Risk
        blocks:
          - type: paragraph
            body: >
              Flutterwave publicly discloses two security certifications: PCI-DSS compliance for payment card data and
              ISO 27001 certification for information security management. The CBN Switching and Processing License
              required the most rigorous regulatory review in Nigeria's payment licensing framework, including detailed
              operational audits across security, compliance, and financial controls. In the US, 13 money transmission
              licences in 29 states require state-level examination of security and financial controls. The company also
              established a consortium-led cybercrime research centre in partnership with the EFCC (Economic and
              Financial Crimes Commission), signalling active government engagement on security.

              However, the company's security record reveals material incidents that represent technical risk signals.
              In February 2023, hackers transferred approximately ₦2.9 billion (circa $3.7M at 2023 exchange rates) from
              Flutterwave accounts in 63 transactions across 28 accounts; Flutterwave successfully obtained court orders
              to freeze accounts at 27 Nigerian financial institutions for recovery. In October 2023, a separate
              technical glitch in the operating system triggered unauthorised transfers of approximately ₦19 billion
              ($24M) to over 6,000 POS merchant accounts. A Mareva injunction in February 2024 authorised recovery
              efforts across 35 financial institutions. Flutterwave stated no customer funds were permanently lost, but
              the events expose systemic operational risk in the transfer-authorisation and POS subsystems.

              The Mono integration introduces a new attack surface: open banking APIs connecting 50+ banks expand the
              authentication and data-access flows requiring security coverage. The stablecoin wallet layer adds
              blockchain key-management risk, particularly around Turnkey's custody infrastructure. Diligence on
              incident response procedures, penetration testing cadence, third-party security audit reports, and Mono's
              security posture post-acquisition is required before enterprise deployment of these newer components.
            claimRefs:
              - CE016
