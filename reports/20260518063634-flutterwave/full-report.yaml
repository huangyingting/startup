      - number: '4.5'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: >
              Flutterwave's financial profile is consistent with a high-revenue-potential payments infrastructure
              business operating at scale in a structurally attractive market, but the complete absence of public
              financial disclosure makes it impossible to underwrite from external sources alone. The revenue quality is
              structurally sound — transaction fees on completed payments are transparent, event-driven, and
              high-frequency — but the mix of domestic and international transactions, FX exposure, and undisclosed take
              rates mean the revenue figure remains a wide-band estimate. At a $3B+ Series D valuation and with
              $260M–$520M implied revenue, the implied revenue multiple is approximately 6–11x — plausible for a
              high-growth African fintech with platform characteristics if the upper revenue band is supportable. At the
              lower band ($260M), the multiple stretches to 11x and demands high confidence in future growth.

              The margin path is challenged by FX headwinds (persistent naira weakness), multi-jurisdiction compliance
              overhead, and a history of fraud/unauthorized-transfer events that impose ongoing cost. Capital intensity
              is low by absolute standards (software infrastructure, no hardware capex), but regulatory expansion across
              34+ countries requires continuous compliance investment. The CBN microlender license introduces a new risk
              dimension — credit risk — that does not exist in pure payments and will require capital provisioning if
              the product scales materially.

              The most material diligence blockers are: (1) no audited P&L, balance sheet, or cash position; (2) no
              confirmed revenue, ARR, gross margin, or EBITDA for any year post-2021; (3) no take-rate or TPV-mix data;
              (4) no burn rate or runway; (5) unknown headcount post-2022 (~900 is a stale press estimate); (6)
              unconfirmed full cap table, preference stack, and investor rights; and (7) incomplete multi-jurisdiction
              licensing inventory. Without a data room resolving at minimum items (1)–(4), Flutterwave cannot be
              financially underwritten and valuation modelling rests on comparables and revenue proxies rather than
              audited fundamentals.
            claimRefs:
