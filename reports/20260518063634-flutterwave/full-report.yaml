      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural Demand Tailwinds Are Unusually Durable for African Digital Payments
            body: >
              Africa's digital payments TAM is underpinned by three structural conversion tailwinds that have no
              near-term ceiling: a 52% unbanked adult population that is actively being onboarded through mobile-first
              financial services, an e-commerce market growing at 38% CAGR, and the world's most expensive remittance
              corridor ($49B annually at 6–8% cost). Unlike mature markets where share gain is zero-sum, Flutterwave is
              operating in a greenfield conversion environment where the primary competition is still cash and
              correspondent banking. The $26B TPV at approximately 3–4% of formal digital payment volume leaves the SOM
              expansion path credible for a decade of compound growth without requiring displacement of incumbents.
            calloutType: strength
            claimRefs:
              - CM003
              - CM008
              - CM009
              - CM013
          - type: callout
            title: FX Fragmentation and Regulatory Fragmentation Are Structural Margin Compressors
            body: >
              Africa's 54-country regulatory landscape and persistent currency volatility (NGN lost 40%+ in 2023) impose
              a structural tax on Flutterwave's business model that has no quick remedy. Building and maintaining
              payment licenses, compliance teams, and banking relationships in each new country typically costs $1–5M
              per market upfront plus ongoing regulatory headcount. FX volatility compresses USD-reported revenues from
              naira-denominated transactions — a material risk given that Nigeria is Flutterwave's home market and the
              largest African digital economy. The combination means that market expansion is capital-intensive and
              margin-dilutive in the short term, creating tension between growth ambition and path-to-profitability.
            calloutType: risk
