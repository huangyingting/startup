      - number: '8.2'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: >
              Flutterwave's canonical valuation anchor is its Series D: $250M raised in February 2022 at a post-money
              valuation exceeding $3B, with B Capital Group, Visa, Mastercard, YC Continuity, and Tiger Global
              participating. Total capital raised across all rounds approaches $474M. No subsequent primary equity round
              has been publicly disclosed as of May 2026, representing more than 36 months without a new valuation mark,
              an unusual interval for a company of this scale and profile. The absence of a new round carries several
              implications for investability. First, the $3B mark may reflect 2022 peak conditions (rate environment,
              Africa fintech premium, growth-at-any-cost multiples) rather than 2026 market-clearing prices. Second, the
              company appears to be in a deliberate pre-IPO capital-discipline posture, conserving its last round of
              capital for growth rather than raising at a down-round price. Third, without a secondary market
              transaction or internal re-mark, investors cannot independently verify current fair value without a data
              room. The April 2026 CBN microlender license and the January 2026 Mono all-stock acquisition suggest the
              company is actively investing in expanding its revenue surface, consistent with an IPO preparation
              narrative rather than distress. IPO signals emerged in April 2024 through CNBC and TechCabal reporting,
              but no confirmed timeline or exchange had been announced as of the May 2026 run date. Entry discipline for
              new investors should be referenced to a comparable-company multiple rather than the stale $3B anchor.
              Preference and liquidation overhang from Series D is unconfirmed, introducing a further diligence
              requirement before committing capital.
