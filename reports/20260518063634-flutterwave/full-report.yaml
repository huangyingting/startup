      - number: '7.3'
        title: Financial and FX risk — currency devaluation, fundraising gap, and valuation compression
        blocks:
          - type: paragraph
            body: >-
              Flutterwave's financial risk profile is dominated by three structural concerns: the Nigerian naira's
              devaluation, a multi-year fundraising gap, and late-stage valuation compression in the African fintech
              sector. Nigeria accounts for a substantial share of Flutterwave's total payment volume (TPV), which
              exceeded $26 billion as of 2024. The Nigerian naira depreciated by more than 40% against the US dollar in
              2023, driven by the removal of the CBN's official FX peg following the election of a new administration.
              This devaluation directly compresses the USD-equivalent value of NGN-denominated revenue and TPV, creating
              a structural wedge between gross transaction volume growth and actual USD-revenue growth. The company
              processes payments in multiple currencies but has not disclosed its hedging strategy or the percentage of
              its cost base denominated in USD versus local currencies.

              Flutterwave raised $250 million in a Series D round in February 2022 at a post-money valuation exceeding
              $3 billion. As of May 2026, no new equity round has been completed — a gap of more than three years.
              Late-stage African fintech valuations have broadly declined 30-60% from their 2021-2022 peaks; comparable
              transactions and public market performance suggest Flutterwave's implied value may be materially below the
              $3 billion marker. The company announced IPO intentions targeting the Nasdaq in April 2024 but has not set
              a firm listing date; the public market environment for African-focused fintechs has been challenging
              throughout 2024-2026, with no peer completing a major listing in that window. Burn rate, runway, and
              current profitability are not publicly disclosed, making it impossible to independently assess the urgency
              of the next financing event. If fundraising conditions do not improve, Flutterwave faces the twin risk of
              a down-round or dilutive IPO at a time when its operational track record carries unresolved adverse
              events.
