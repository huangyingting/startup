      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Dominant pan-African payment infrastructure position with strategic investor endorsement
            body: |
              Flutterwave occupies a difficult-to-replicate position as a multi-country, multi-rail payment
              infrastructure platform across 34+ African countries. The simultaneous investment by Visa
              Ventures and Mastercard — the two dominant global payment networks — is the strongest possible
              third-party endorsement of Flutterwave's regulatory navigation capability and merchant network
              depth. No other African fintech has been able to secure strategic backing from both global
              networks simultaneously, and this creates a meaningful competitive moat that is both
              commercial and reputational.
            calloutType: strength
            claimRefs:
              - CO008
              - CO009
              - CO013
          - type: callout
            title: Three financial-control incidents in three years and concentrated CEO key-person risk
            body: |
              The combination of three distinct financial-control adverse events — the Kenya ARA money-
              laundering freeze (2022–2023), the ₦2.9 B security breach (2023), and the $24 M unauthorized
              POS incident (2024) — creates a pattern that diligence cannot dismiss as isolated noise. Each
              incident individually would be manageable; together, they suggest systemic risk-management
              and controls maturity gaps for a company at $3 B+ valuation. This risk is compounded by
              CEO key-person concentration: Agboola is the company's regulatory voice, fundraising engine,
              and external face with no named C-suite successors or board members identified in public sources.
            calloutType: risk
            claimRefs:
              - CO021
              - CO022
              - CO032
              - CO035
              - CO036
          - type: callout
            title: Capital formation substantially outpaced public financial disclosure
            body: |
              Flutterwave has raised $474 M+ across multiple rounds from top-tier investors and achieved
              a $3 B+ valuation without disclosing revenue, ARR, take rate, or margin publicly. This capital-
              ahead-of-disclosure pattern is not unique to Flutterwave in African fintech, but it means that
              any valuation estimate or benchmarking exercise is working from operational proxies rather than
              fundamental financial metrics. Investors entering at secondary prices or in a future primary
              round must treat financial diligence as the highest-priority workstream before any entry decision.
