  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Flutterwave competes in one of the world's most fragmented payment ecosystems. Africa's
              payments infrastructure remains divided by currency regimes, central-bank licensing
              requirements, and entrenched mobile-money networks — and competitors can be mapped into
              four distinct tiers.

              **Tier 1 – Direct African fintech peers** are the most closely overlapping rivals.
              Paystack (Nigeria, acquired by Stripe 2020) serves a similar developer and SME audience
              with a Nigeria-first API checkout. Interswitch is the legacy switching infrastructure
              provider that processes roughly 90% of ATM transactions in Nigeria and has expanded into
              card issuance and POS terminals. Chipper Cash targets consumer cross-border remittances
              but suffered multiple layoff rounds following FTX's 2022 collapse. Wave operates a
              near-zero-fee mobile money platform in Francophone West Africa (Senegal, Côte d'Ivoire).

              **Tier 2 – Telecom-backed mobile money operators** hold structural distribution
              advantages. M-Pesa (Safaricom/Vodacom) dominates Kenya and East Africa with 51M+
              registered users. MTN Mobile Money (MoMo) operates across 17 African markets. These
              operators are embedded into SIM infrastructure and USSD rails that fintech platforms
              cannot replicate directly, but their geographic and product scope is narrower than
              Flutterwave's enterprise API ambition.

              **Tier 3 – Adjacent and substitute providers** include Yellow Card (crypto on/off-ramp
              across 20 African markets), DPO Group (Mastercard-owned SME payment gateway), and
              MNT-Halan (Egypt-based lending + payments platform serving MENA). These operators
              overlap on specific corridors or geographies but not across Flutterwave's full product
              and geography matrix.

              **Tier 4 – Latent global entrants** represent a longer-term competitive horizon.
              Stripe's ownership of Paystack and its own unreleased global payment product could
              result in a direct Stripe-branded entry in Africa. PayPal's expanding African
              partnerships and 400M+ global user base make it a credible substitute for consumer
              cross-border payment corridors. Status-quo substitutes — cash, bank wires, informal
              hawala networks — define the real competitive baseline that all these players are
              simultaneously converting.
