figures:
  - id: FO001
    title: Company milestone timeline
    type: timeline
    layout: wide
    summary: >-
      Flutterwave's publicly corroborated milestone trajectory runs from a 2016 Nigeria founding through a 2021 unicorn
      crossing, a 2022 Series D at $3B+ and simultaneous Kenya asset freeze, through a series of 2023–2024 regulatory
      clearances and adverse incidents, to 2026 product and licensing expansions.
    data:
      items:
        - date: '2016-01-01'
          label: Founded
          detail: Flutterwave founded in Nigeria by Agboola and Adekoya; exact founding day not publicly disclosed.
          tone: positive
        - date: '2017-06-01'
          label: Y Combinator
          detail: Joins Y Combinator cohort; first institutional validation and US network access.
          tone: positive
        - date: '2021-03-01'
          label: Series C unicorn ($170M, $1B+ valuation)
          detail: Tiger Global leads $170M Series C; Flutterwave becomes Africa's first major fintech unicorn.
          tone: positive
        - date: '2022-02-01'
          label: Series D ($250M, $3B+ valuation)
          detail: B Capital Group leads $250M Series D; valuation exceeds $3B; largest Africa fintech round on record.
          tone: positive
        - date: '2022-07-01'
          label: Kenya ARA asset freeze
          detail: Kenya Asset Recovery Agency freezes Flutterwave accounts on money-laundering allegations.
          tone: warning
        - date: '2023-02-01'
          label: ₦2.9B security incident
          detail: Unauthorized transfers of approximately ₦2.9B reported by TechPoint; attributed to hackers.
          tone: warning
        - date: '2023-11-09'
          label: Kenya clearance
          detail: Kenyan court releases frozen assets after ~14-month freeze; Flutterwave cleared.
          tone: positive
        - date: '2024-03-01'
          label: Fast Company Most Innovative 2024
          detail: Named to Fast Company's Most Innovative Companies list; third-party category validation.
          tone: positive
        - date: '2024-05-14'
          label: CNBC Disruptor 50
          detail: Named to CNBC Disruptor 50; high-profile North American investor-audience recognition.
          tone: positive
        - date: '2024-06-01'
          label: $24M unauthorized POS transfers
          detail: Flutterwave reports $24M in unauthorized POS transactions and seeks recovery.
          tone: warning
        - date: '2026-01-01'
          label: Mono acquisition + stablecoin wallet
          detail: Acquires Mono (open banking, all-stock ~$25–40M) and launches stablecoin wallet with Turnkey.
          tone: positive
        - date: '2026-04-02'
          label: CBN microlender license
          detail: Obtains Central Bank of Nigeria microlender license; enables embedded lending for merchants.
          tone: positive
    approximationNotes: >-
      Founding is anchored to 2016-01-01 because reviewed sources confirm the year but not the exact day. Kenya freeze
      start date is approximate (mid-2022). The $24M POS incident is assigned June 2024 as a proxy; exact date is not
      confirmed.
