  - id: FV001
    title: Recommendation Logic
    description: >
      Logical chain from evidence inputs through scoring dimensions to the final investment recommendation for
      Flutterwave as of May 2026.
    type: flow
    layout: standard
    summary: >
      The recommendation chain flows from four evidence domains (market, product moat, financials, valuation) through a
      scoring layer to generate a TRACK call at $3B and a BUY signal at $1.5-2B entry. The valuation node is the primary
      constraint preventing a higher conviction call.
    data:
      nodes:
        - id: market
          label: Market evidence
          detail: >-
            Africa digital payments growing at 20%+ CAGR; World Bank 57% unbanked adults; GSMA largest mobile-money
            market globally.
        - id: product
          label: Product and moat evidence
          detail: >-
            34-country license portfolio; 900K+ customers; 5-8 year replication time; enterprise logos Uber Netflix
            Bolt; CBN microlender 2026.
        - id: financials
          label: Financial evidence
          detail: >-
            $26B+ TPV; analyst-estimated $260-520M revenue; no audited disclosure; three financial-control incidents;
            naira FX headwind.
        - id: valuation
          label: Valuation evidence
          detail: >-
            $3B last mark (Feb 2022, stale 36+ months); dLocal comps imply $800M-$2.4B; 30-60% private fintech
            compression; implied 5.8-11.5x EV/Revenue.
        - id: scoring
          label: Scores - Market 9, Moat 8, Proof 5, Valuation 3
          detail: >-
            Market and moat score high; financial proof and valuation score low due to opacity and stretched price.
            Composite signal is high quality at wrong price.
        - id: recommendation
          label: TRACK (BUY at up to $2B entry)
          detail: >-
            Final call is TRACK at current $3B anchor. BUY threshold $1.5-2B. Confidence MEDIUM. Risk HIGH. Valuation
            stance STRETCHED.
      edges:
        - from: market
          to: scoring
          label: informs
        - from: product
          to: scoring
          label: informs
        - from: financials
          to: scoring
          label: constrains
        - from: valuation
          to: scoring
          label: limits
        - from: scoring
          to: recommendation
          label: produces
    approximationNotes: null
