  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: 'Customer base and segmentation: enterprise anchors, developers, SMBs, and diaspora consumers'
        blocks:
          - type: paragraph
            body: >-
              Flutterwave serves five overlapping customer segments across the African payments stack. At the enterprise
              end, the company counts Uber among its named, publicly quoted clients, with PayPal, MTN, and Airtel Africa
              cited as strategic integration partners for cross-border and mobile-money payment flows. These enterprise
              relationships form the anchor of Flutterwave's proof of production deployment, though no contract values,
              SLAs, or renewal timelines have been disclosed. Below the enterprise tier, a large SME and developer
              segment accesses the platform through the v3/v4 REST API, the Rave checkout product, and the Node.js SDK.
              The developer community integrates Flutterwave into their own applications, effectively extending the
              platform's reach without a direct Flutterwave sales relationship.

              A third segment — African diaspora consumers — is addressed by the Send remittance application, which
              relaunched in August 2023 with corridors from the US, Canada, and the UK into Nigeria, Egypt, and Sénégal.
              The company cites 160M+ African diaspora individuals as the addressable market. Fourth, Flutterwave Store
              enables any merchant to create an online storefront and sell globally "within minutes," targeting
              micro-merchants and solo entrepreneurs who need no-code commerce infrastructure. Finally, Flutterwave
              secured 13 US money transmission licences covering 29 states, signalling intent to serve diaspora
              consumers and cross-border enterprise clients from the United States.

              Customer count growth from 290,000 merchants at Series C (March 2021) to 900,000+ businesses at Series D
              (February 2022) — a ~3× increase in under one year — is the most concrete public signal of rapid adoption
              trajectory. No figure has been formally updated beyond the Series D disclosure, and the company has not
              disclosed any segment-level breakdowns (enterprise vs SME, API vs checkout, domestic vs cross-border) that
              would allow investors to evaluate product-line concentration. Flutterwave's pricing page confirms domestic
              and cross-border fee structures for multiple merchant categories. TechCabal's Series D coverage cited 300+
              technology partners across banking, telco, and fintech, reinforcing the breadth of the enterprise network.
