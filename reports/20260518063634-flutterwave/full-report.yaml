      - number: '7.5'
        title: Kill criteria, monitoring triggers, and diligence paths
        blocks:
          - type: paragraph
            body: >-
              Three risks qualify as kill criteria — events or confirmed states that would require a fundamental
              re-evaluation of investment thesis sustainability. First, a formal CBK license denial without a credible
              alternative pathway would confirm that Flutterwave cannot legally operate as a payment provider in Kenya,
              eliminating an entire East Africa revenue stream and damaging the company's credibility with other
              regulators in frontier markets considering similar actions. Second, a third material security incident
              (greater than $5M) within 12 months of the October 2023 POS glitch would confirm that controls have not
              improved despite two remediation cycles, threatening enterprise customer trust and regulatory tolerance in
              Nigeria. Third, a failure to complete any liquidity event (equity raise, IPO, or secondary sale) by a
              fourth year after the Series D (i.e., beyond February 2026) would indicate potential runway constraints
              and/or a market that has definitively re-rated Flutterwave below investable.

              Below kill-criterion level, twelve additional monitoring triggers span regulatory, operational, financial,
              and execution dimensions. Each is captured in the Mitigation and kill criteria table (TR005). Investors
              should request from the data room: the CBK formal license application status and correspondence;
              post-incident security audit reports for the 2023 hack and POS glitch; the current burn rate, runway, and
              any bridge financing terms; and copies of data-processing agreements for EU/UK corridors. The cumulative
              regulatory picture — Kenya licensing unresolved, 21 US states uncovered, EU/UK GDPR exposure undisclosed,
              GDPR data processor status unknown — creates a multi-jurisdiction compliance gap that diligence must close
              before commitment. At current information levels, investors cannot independently confirm whether
              Flutterwave is compliant with data protection law in any jurisdiction it serves.
            claimRefs:
              - CR031
              - CR043
