  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner and Diligence Path
    rows:
      - - Audited financial statements
        - FY2022, FY2023, FY2024 P&L, balance sheet, and cash-flow statement
        - Underwriting the $3B valuation requires verified revenue, margin, burn, and working capital
        - Request data room; require big-4 audit opinion as a condition of any investment
      - - Revenue and ARR disclosure
        - Confirmed annual net revenue and ARR with take-rate by corridor and product
        - Revenue range $260-520M has a $260M uncertainty band; affects multiple by plus or minus 3-5x
        - CFO call and data room; minimum requirement is management-confirmed FY2024 net revenue
      - - Series D preference and cap-table structure
        - Full pro-forma cap table; liquidation preference terms; participating vs non-participating
        - Preference overhang could make common equity worth well below the $3B headline in downside scenarios
        - Legal review of Series D term sheet; request cap-table model with waterfall at multiple exit prices
      - - IPO timeline, exchange, and underwriter confirmation
        - Formal IPO mandate, target exchange, underwriter selection, and expected pricing window
        - Timeline uncertainty is the primary risk to the bull case; no confirmed filing means no exit visibility
        - Management call; monitor S-1 filing on SEC EDGAR; track financial PR announcements
      - - Regulatory status across top-5 revenue markets
        - CBN, CBK, Ghana BoG, Rwanda BNR, and South Africa SARB — current license status and pending proceedings
        - License loss in Nigeria alone would be thesis-breaking; Kenya clearance confirmed but monitoring required
        - Direct outreach to counsel; check central-bank license registers; require compliance certificate in DD
      - - Fraud and security incident remediation
        - Independent security audit post-2023 incidents; confirmation of $24M POS recovery status
        - Three incidents in 36 months suggest systemic control weakness rather than isolated events
        - Require independent security audit letter; confirm recovery amount and remaining exposure
    notes: >-
      Diligence asks are prioritised in order of materiality. Items 1 and 2 are blocking: the investment cannot be
      underwritten without audited financials and confirmed revenue. Items 3-6 are material and should be resolved
      before close. No item is minor given the $3B entry context.
