      - number: '3.3'
        title: Capability, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: |
              Flutterwave's capability differentiation is most evident in four dimensions: geographic
              coverage, API product depth, enterprise GTM, and regulatory diversification.

              **Geographic coverage**: Flutterwave holds active licenses or operational partnerships
              in 34+ African countries — the broadest coverage of any African-founded fintech
              payments platform. Paystack operates in 4-5 countries (Nigeria, Ghana, South Africa,
              Côte d'Ivoire, Kenya in beta). Interswitch is primarily Nigeria-focused. Chipper Cash
              serves approximately 7-8 African markets. For a multinational enterprise client needing
              a single API layer across Africa, Flutterwave has no comparable all-in-one alternative.

              **API product depth and developer experience**: Paystack is frequently cited as
              superior to Flutterwave on developer documentation quality, onboarding speed, and
              API simplicity for Nigerian SMEs. Flutterwave's API surface area is broader (supporting
              mobile money, bank transfers, card payments, virtual accounts, USD collections, and
              USSD) but historically more complex. Flutterwave's developer portal and API
              documentation improvements are ongoing, and its GitHub repository demonstrates
              active SDK maintenance across multiple languages.

              **Pricing models**: Flutterwave charges approximately 1.4% per transaction for local
              payments and 3.8% for international cards in Nigeria — broadly comparable to Paystack's
              published rates. Interswitch's switching fees are regulated at the infrastructure level
              and not directly comparable to gateway pricing. M-Pesa's Kenyan business-payment charges
              vary by transaction size (0.5–3%) and are embedded in Safaricom service agreements.
              Wave's near-zero fee model is the outlier — it is subsidized by investor capital and
              unsuitable for a profitable standalone business at current transaction volumes.

              **Enterprise GTM vs consumer GTM**: Flutterwave's primary acquisition channel is
              enterprise B2B — large multinational merchants, banks, and fintechs integrating its
              API. Paystack focuses on developer-led bottom-up adoption (similar to Stripe's US
              model) but is beginning to move upmarket. Chipper Cash and Wave are primarily consumer
              mobile apps. This GTM divergence means that competitive pressure from Wave or Chipper
              Cash is most acute in the consumer-to-business (C2B) and P2P remittance corridors, not
              in enterprise gateway revenue.

              **Trust and regulatory posture**: Flutterwave's US Money Transmission Licenses across
              29 states and its FinCEN compliance framework provide regulatory legitimacy for
              US-Africa corridors that most African competitors lack. Paystack is backed by Stripe,
              which carries implicit US regulatory credibility. Chipper Cash's FTX-linked adverse
              history is the sector's clearest negative trust signal. Interswitch's quasi-public
              infrastructure role in Nigeria gives it regulator relationships that startups cannot
              replicate.
