  - id: s4
    title: Capital Adequacy, Burn Rate, and Runway
    body: >
      Flutterwave's capital base across all disclosed rounds totals approximately $474M: a ~$1M Seed in 2016
      (Y Combinator), ~$10M Series A in 2017, ~$20M Series B in 2019 (Visa Ventures, Mastercard), $170M Series C
      in March 2021 (Tiger Global), and $250M Series D in February 2022 (B Capital Group at $3B+ valuation). The
      Series D was the last publicly disclosed primary equity round; more than 36 months elapsed between the
      Series D close and the May 2026 report date with no announced follow-on primary. The Mono acquisition in
      January 2026 was structured as an all-stock transaction estimated at $25–40M, making it a dilutive but
      non-cash-consuming capital deployment. No public debt or credit facility disclosures have been identified.

      No cash-on-hand, monthly burn rate, or runway figure has been publicly disclosed by Flutterwave. For
      a company with estimated revenue in the $260M–$520M/year range and typical payment-processor gross margins
      of 45–55%, the gross profit pool is approximately $115M–$285M/year — in principle sufficient to support
      operations without further primary equity if operating leverage has been achieved. However, headcount costs,
      multi-jurisdiction compliance buildout, and ongoing product investment (stablecoin, embedded lending) impose
      a real operating expenditure that is completely opaque from public sources. The 36-month gap since the last
      primary raise is consistent with two scenarios: (a) the company is approaching breakeven or is cash-flow
      positive, or (b) the company is managing toward a near-term IPO and is maintaining a clean cap table. IPO
      signals from 2022 and 2024 have not been followed by any S-1 filing or exchange selection as of May 2026.

      The use of proceeds stated for the Series D included African market expansion, M&A, and product development.
      The Mono all-stock acquisition and CBN microlender license both align with those stated objectives. The
      Series D investor syndicate — spanning B Capital Group, Alta Park Capital, Whale Rock Capital, Lux Capital,
      Glynn Capital, Avenir Growth Capital, Tiger Global, Green Visor Capital, and Salesforce Ventures — includes
      crossover funds (Whale Rock, Alta Park) that typically invest close to public market comps, reinforcing
      the pre-IPO narrative. No new-round trigger or liquidity-event timeline has been publicly confirmed.
