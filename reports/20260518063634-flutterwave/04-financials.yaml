  - id: s2
    title: GTM Motion and Sales Efficiency Proxies
    body: >
      Flutterwave's go-to-market architecture is developer-led and API-first, a design choice that minimises upfront
      customer-acquisition cost for the SMB segment while enabling self-serve onboarding. Merchants integrate
      Flutterwave through its API documentation at developer.flutterwave.com, which offers sandbox access, SDKs,
      and payment-link generation with no sales interaction required. This PLG (product-led growth) foundation is
      the structural driver of the 900,000+ business customer count — the overwhelming majority of these merchants
      onboarded without a dedicated sales motion. The PLG channel has the lowest CAC per merchant, though it also
      generates the lowest ARPU in the early stages before volume ramps.

      For enterprise and large-merchant segments, Flutterwave layers a traditional B2B sales motion on top of the
      developer infrastructure. Enterprise customers — including multinational corporations, global platforms such
      as Uber, Netflix, and Bolt operating across Africa — require custom API integration, multi-currency settlement,
      dedicated account management, and compliance support across multiple African jurisdictions. The enterprise
      sales cycle is estimated at 3–9 months based on the complexity of multi-jurisdiction payment stack integration,
      though no precise cycle length has been publicly confirmed. CAC for enterprise is unquantified but structurally
      higher than PLG due to the sales and compliance overhead; payback is plausibly faster at higher TPV per customer.

      Channel economics for the remittance product (Send) operate differently: customer acquisition in the consumer
      diaspora segment requires brand awareness investment in diaspora communities (US, Canada, UK) plus digital
      marketing, reflecting a more traditional consumer fintech acquisition model. The US expansion to 29 states via
      13 new money-transmission licenses increases the addressable base but also increases compliance overhead,
      suggesting rising CAC per US consumer. No unit-level retention data (repeat send rate, cohort LTV, or NPS) is
      publicly available. The net result is a composite CAC/LTV profile that cannot be underwritten from public data.
    claimRefs:
