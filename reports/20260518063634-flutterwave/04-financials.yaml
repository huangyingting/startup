company:
  name: Flutterwave
chapter:
  number: 4
  title: Financials
  summary: >
    Flutterwave's financials are characterised by deep opacity — a private company that has raised ~$474M across five
    rounds through February 2022 but has disclosed no audited P&L, balance sheet, cash position, or ARR. The revenue
    model is transaction-fee-based: 1.4% + NGN 45 for domestic Nigerian card payments and 3.8% for international
    Mastercard/Visa transactions, translating to a blended take rate analysts estimate at 1–2% on the company's own
    stated $26B+ annual TPV. That implies gross revenue of $260M–$520M/year — a range wide enough to preclude
    underwriting without a data room. TechCrunch and Bloomberg cited ~$180M+ for 2021; no confirmed figure exists
    for 2022–2026. Gross margin for payment processors of this profile is typically 40–60%; Flutterwave's is
    estimated at 45–55%, subject to FX drag (NGN depreciated 40%+ in 2023–2024) and working-capital incidents
    (Kenya ARA freeze, $52M, 2022–2023; $24M unauthorized POS transfers, 2024). The GTM is developer-led and
    API-first for SMBs, with enterprise overlay for large merchants; no CAC or payback figures have been publicly
    disclosed. Post-Series D at $3B+ (February 2022), there has been no disclosed primary equity round in over
    36 months, implying either strong organic cash generation or deliberate pre-IPO cap-table discipline. The Mono
    acquisition (all-stock, January 2026) and CBN microlender license (April 2026) introduce non-cash M&A capital
    use and a new lending revenue stream respectively. Key diligence blockers: no audited financials, no ARR,
    no disclosed burn or runway, and no confirmed net revenue or take-rate figures.

sections:
  - id: s1
    title: Revenue Streams and Pricing Model
    body: >
      Flutterwave's revenue is generated primarily from transaction fees charged as a percentage of the payment
      value processed through its platform. The gateway product (Rave) is the dominant revenue driver, charging
      Nigerian merchants 1.4% of the transaction value plus NGN 45 flat for domestic card payments; international
      Mastercard and Visa payments attract a 3.8% fee. These published rates represent list pricing — the actual
      blended take rate across Flutterwave's full portfolio of transaction types, geographies, and volume tiers is
      lower, reflecting negotiated bulk rates for enterprise clients and competitive domestic pricing. Analysts and
      observers estimate the effective blended take rate at 1–2% across the $26B+ TPV the company disclosed in
      2022. At the low end (1% take rate), implied gross revenue is approximately $260M/year; at the high end
      (2%), approximately $520M/year. These are analyst-constructed proxies, not company-published figures.

      Beyond the gateway, Flutterwave operates four additional revenue-generating products: Send (remittance), which
      earns on FX spread and corridor fees on diaspora transfers from the US, Canada, and other markets into Africa;
      Barter (virtual card issuance), which captures interchange on card transactions; Store and Afritickets
      (SME storefront and event-ticketing), which generate SaaS-style subscription and marketplace commission
      revenue. The relative contribution of each stream has not been publicly disclosed and is not available for
      underwriting without data-room access.

      Revenue recognition for payment transactions is straightforward and event-driven: fees are earned at the
      time of transaction completion. Remittance revenue recognition follows the corridor transaction event plus FX
      spread crystallisation. Subscription and SaaS components from Store/Afritickets, if material, would recognise
      ratably. FX translation is a material recognition issue: Flutterwave earns significant naira-denominated
      revenue in Nigeria (its largest market), and the naira depreciated more than 40% against the USD in 2023–2024,
      compressing dollar-reported revenue and gross margin even with flat local-currency growth.

      The CBN microlender license obtained in April 2026 adds a potential lending revenue stream — interest income
      on merchant cash advances or working-capital loans disbursed through the Flutterwave merchant portal. This
      is a new and unquantified revenue line as of the report date. The stablecoin wallet partnership with Turnkey
      (January 2026) could introduce asset-custody and cross-border crypto-settlement fees if adopted at scale.
