  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: audited-financials
      missingEvidence: >-
        No audited P&L, balance sheet, income statement, or cash-flow statement has been publicly disclosed
        for Flutterwave for any fiscal year 2016–2025. Revenue, gross margin, operating loss, and net income
        are entirely absent from the public record.
      whyItMatters: >-
        Without audited financials, valuation modelling rests on analyst proxies with ±100% error bands;
        investment or acquisition underwriting is not possible from public data alone.
      diligencePath: >-
        Request audited financial statements for FY2022, FY2023, and FY2024 from the data room under NDA;
        include revenue by product line, geography, and transaction type.
      relatedTableRefs:
        - TI005
      relatedQuestionRefs:
        - QI015
        - QI022

    - type: private-evidence-only
      severity: material
      topic: burn-rate-and-runway
      missingEvidence: >-
        No burn rate, monthly cash consumption, or runway estimate has been publicly disclosed by Flutterwave.
        The 36-month gap since the Series D provides an ambiguous signal but does not resolve cash position.
      whyItMatters: >-
        Runway determines whether the company needs new capital before a potential IPO or exit; without it,
        investment timing cannot be assessed.
      diligencePath: >-
        Request monthly net cash burn for 2023–2025 and current cash position, together with a 24-month
        operating model under base and stress assumptions.
      relatedTableRefs:
        - TI004
        - TI005
      relatedQuestionRefs:
        - QI021

    - type: stale
      severity: moderate
      topic: tpv-vintage
      missingEvidence: >-
        The $26B+ TPV figure is 2022-vintage (disclosed around the Series D). No subsequent annual TPV update
        has been publicly confirmed for 2023, 2024, or 2025.
      whyItMatters: >-
        If TPV has grown (or contracted) materially since 2022, the implied revenue range shifts proportionally;
        a stale TPV anchor could misrepresent the revenue base by 50% or more in either direction.
      diligencePath: >-
        Request annual TPV by product line and geography for 2022–2025 from the data room; cross-check
        against payment-network settlement data if available.
      relatedTableRefs:
        - TI003
      relatedQuestionRefs:
        - QI004
        - QI003

    - type: private-evidence-only
      severity: material
      topic: take-rate
      missingEvidence: >-
        Flutterwave's actual blended net take rate has never been publicly disclosed. Published list rates
        (1.4%–3.8%) are gross rates; realized rates after enterprise discounts and volume tiers are lower and
        unknown.
      whyItMatters: >-
        The revenue range ($260M–$520M) is entirely a function of the take-rate assumption; every 0.5pp shift
        moves annual revenue by approximately $130M on a $26B TPV base.
