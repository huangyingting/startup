  - id: FI002
    title: Unit economics bridge
    description: >
      Qualitative flow illustrating the inputs, transformation steps, and output gaps in Flutterwave's unit
      economics. Most intermediate nodes are unknown from public sources; this is a diligence-gap map rather
      than a quantified bridge.
    type: flow
    layout: standard
    summary: >
      Flutterwave's unit economics begin with a published fee rate applied to a transaction, produce an estimated
      per-transaction net revenue, then disappear into an opaque cost structure. No CAC, payback period, LTV,
      or cohort-level retention metric is publicly available.
    data:
      nodes:
        - id: list-price
          label: List fee rate (1.4%–3.8% per transaction)
          type: input
        - id: volume-discount
          label: "Less: volume / enterprise discount (unknown magnitude)"
          type: process
        - id: realized-rate
          label: Realized blended take rate (~1–2% estimated; not confirmed)
          type: process
        - id: network-fee
          label: "Less: network / interchange / fraud costs (unknown breakdown)"
          type: process
        - id: per-txn-gp
          label: Per-transaction gross profit (unknown; ~0.5–1.5% estimated)
          type: process
        - id: cac
          label: CAC by channel (unknown; PLG SMB structurally low; enterprise high)
          type: process
        - id: ltv
          label: LTV (unknown; no cohort data published)
          type: process
        - id: ltv-cac
          label: LTV/CAC ratio (unknown — key underwriting gap)
          type: output
      edges:
        - from: list-price
          to: volume-discount
        - from: volume-discount
          to: realized-rate
        - from: realized-rate
          to: network-fee
        - from: network-fee
          to: per-txn-gp
        - from: per-txn-gp
          to: ltv
        - from: cac
          to: ltv-cac
        - from: ltv
          to: ltv-cac
    approximationNotes: >
      All intermediate values are estimated or unknown. This figure illustrates the conceptual structure of
      the unit economics; none of the quantitative inputs or outputs has been publicly confirmed by Flutterwave.
      Diligence requirement: per-channel CAC, cohort LTV, blended take rate, and gross margin at the
      transaction level are needed to fill this bridge with real numbers.
    sourceRefs:
      - SI002
      - SI013
    claimRefs:
      - CI002
      - CI027
      - CI015

  - id: FI003
    title: Financial estimate range
    description: >
      Wide-bound financial estimates for Flutterwave, reflecting the structural opacity of a private company that
      has disclosed no audited financials. All ranges are analyst-constructed proxies; the company has not
      confirmed any of these figures.
    type: range
    layout: standard
    summary: >
      Revenue, margin, and valuation multiples for Flutterwave span wide ranges due to the absence of any
      public financial disclosure. Every input is an analyst proxy; actual figures require a data room.
