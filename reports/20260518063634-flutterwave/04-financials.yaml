figures:
  - id: FI001
    title: Revenue model bridge
    description: >
      Illustrative flow showing how Flutterwave customer activity converts into distinct revenue streams and
      ultimately into gross profit. All revenue flows are based on published pricing and company-stated TPV;
      gross-profit node uses analyst-estimated gross margin range (45–55%).
    type: flow
    layout: standard
    summary: >
      Merchant and consumer activity enters the Flutterwave platform through five product channels. Each channel
      applies a fee mechanism to convert transaction activity into revenue. After network and interchange costs are
      deducted, an estimated gross profit of $115M–$285M/year emerges — subject to FX drag from naira depreciation.
    data:
      nodes:
        - id: merchant-activity
          label: Merchant / consumer transaction activity ($26B+ TPV)
          type: input
        - id: rave-domestic
          label: Rave domestic gateway (1.4% + NGN 45)
          type: process
        - id: rave-international
          label: Rave international gateway (3.8%)
          type: process
        - id: send-remittance
          label: Send remittance (FX spread + corridor fee)
          type: process
        - id: barter-cards
          label: Barter virtual cards (interchange)
          type: process
        - id: store-afritickets
          label: Store / Afritickets (SaaS / commission)
          type: process
        - id: gross-revenue
          label: Gross transaction revenue (~$260M–$520M/year estimated)
          type: process
        - id: network-costs
          label: "Less: network / interchange / settlement costs (~45–55% gross margin implied)"
          type: process
        - id: gross-profit
          label: Gross profit (~$115M–$285M/year estimated)
          type: output
      edges:
        - from: merchant-activity
          to: rave-domestic
        - from: merchant-activity
          to: rave-international
        - from: merchant-activity
          to: send-remittance
        - from: merchant-activity
          to: barter-cards
        - from: merchant-activity
          to: store-afritickets
        - from: rave-domestic
          to: gross-revenue
        - from: rave-international
          to: gross-revenue
        - from: send-remittance
          to: gross-revenue
        - from: barter-cards
          to: gross-revenue
        - from: store-afritickets
          to: gross-revenue
        - from: gross-revenue
          to: network-costs
        - from: network-costs
          to: gross-profit
    approximationNotes: >
      All gross-revenue and gross-profit figures are analyst estimates derived from company-stated TPV ($26B+,
      2022 vintage) and industry-comparable take rates (1–2% blended). No company-published revenue, take-rate,
      or gross-profit figure has been confirmed. FX drag from naira depreciation (40%+ in 2023–2024) is not
      modelled in these estimates but would compress the dollar-denominated gross profit.
