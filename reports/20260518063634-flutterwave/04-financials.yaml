  - id: s3
    title: Cost Structure and Gross Margin Analysis
    body: >
      Flutterwave's cost structure has never been publicly disclosed; the following analysis is constructed from
      industry comparables and operational inference. For payment processors in African and emerging-market contexts,
      gross margin (after payment network fees, settlement costs, and direct fraud losses) typically ranges from
      40–60%. Analysts estimate Flutterwave's gross margin at 45–55%, reflecting its mix of local and international
      transactions, its reliance on card network rails (Mastercard, Visa) which carry interchange and assessment
      fees, and its in-house compliance and settlement infrastructure. The domestic Nigerian gateway transaction
      (1.4% + NGN 45) carries a narrower margin than international transactions (3.8%) because domestic interchange
      fees are proportionally larger relative to the lower fee take. This creates a gross margin sensitivity to
      the international/domestic transaction mix.

      Primary cost categories are estimated to include: (1) network and interchange fees paid to card schemes and
      acquirers (typically 0.3–1.0% of TPV, the largest direct cost); (2) engineering and technology infrastructure
      (cloud compute, API serving, security tooling); (3) regulatory compliance and KYC/AML operations across 34+
      jurisdictions; (4) customer support and operations (merchant onboarding, fraud investigations, chargebacks);
      (5) sales and marketing (enterprise sales, diaspora consumer acquisition); and (6) FX hedging and treasury
      management. The FX cost line is uniquely elevated for Flutterwave relative to single-currency processors:
      the 40%+ NGN depreciation in 2023–2024 is both a revenue compression (naira revenue converts to fewer USD)
      and a hedging cost driver.

      The Kenya ARA asset freeze (July 2022 – November 2023) was a significant working-capital event: approximately
      $52M was encumbered for approximately 14 months, constraining liquidity and incurring legal and compliance
      costs. The ₦2.9B (~$6.3M at exchange rates at the time) unauthorized-transfer incident in February 2023 and
      the $24M POS fraud in 2024 represent direct fraud losses or recovery costs that flow through the operating
      cost structure. These are adverse signals for fraud prevention maturity and contribute to margin uncertainty.
      Capex is expected to be low relative to revenue given the software-infrastructure model; no physical
      manufacturing, significant hardware, or owned-network infrastructure has been publicly documented.
