  - id: FI004
    title: Capital intensity / cash-flow map
    description: >
      Waterfall illustration of Flutterwave's capital deployment trajectory: total capital raised, key adverse
      working-capital events, non-cash M&A, and estimated remaining capital position (with wide uncertainty).
    type: waterfall
    layout: standard
    summary: >
      Starting from $474M raised across five rounds, Flutterwave has absorbed significant working-capital shocks
      (Kenya freeze, fraud losses) and made a non-cash acquisition (Mono). Cash position is unknown; implied
      operating spend over 4+ years is the largest unknown in the waterfall.
    data:
      items:
        - label: Total capital raised (Seed through Series D)
          value: 474
          detail: Estimated cumulative; ~$1M Seed, ~$10M Series A, ~$20M Series B, $170M Series C, $250M Series D
        - label: Kenya ARA asset freeze (Jul 2022 – Nov 2023)
          value: -52
          detail: ~$52M (KES ~6.6B) encumbered for ~14 months; funds later released; legal costs not quantified
        - label: ₦2.9B unauthorized transfer incident (Feb 2023)
          value: -6
          detail: ~$6M equivalent at 2023 exchange rates; fraud loss or recovery cost; magnitude uncertain
        - label: $24M unauthorized POS transfers (2024)
          value: -24
          detail: Flutterwave seeking recovery; may be partially recoverable; included as worst-case outflow
        - label: Operating expenditure (cumulative, estimated, 4 years)
          value: -320
          detail: >-
            Rough estimate: ~$80M/year average opex × 4 years; highly uncertain; could be lower if approaching
            breakeven; illustrative only
        - label: Mono acquisition (Jan 2026, all-stock)
          value: 0
          detail: Non-cash; structured as stock swap; no cash impact on treasury; dilutive to shareholders
        - label: Implied remaining cash (rough estimate)
          value: 72
          detail: >-
            Highly speculative residual; assumes no other major untracked outflows and the opex estimate is
            reasonable; actual position unknown; treat as illustrative only
    approximationNotes: >
      This waterfall is illustrative and built from public disclosures and estimates; it is NOT a verified
      cash-flow statement. The largest single item (operating expenditure) is an analyst estimate with no
      grounding in confirmed payroll, infrastructure, or cost data. The Mono all-stock item is confirmed as
      non-cash by press reporting but the full dilution impact on the cap table is not confirmed. The remaining
      cash figure is highly speculative and should not be treated as a reliable data point.
    sourceRefs:
