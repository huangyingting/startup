summary:
  headline: >-
    Flutterwave is Africa's most significant payments infrastructure franchise with $26B+ annual TPV, but the $3B
    last-round valuation is stretched relative to current comparable multiples and the company carries unresolved
    regulatory, security, and IPO-readiness risk.
