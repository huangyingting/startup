      - number: '4.2'
        title: GTM 动作与销售效率替代指标
        blocks:
          - type: paragraph
            body: >
              Flutterwave 的获客架构由开发者驱动、API 优先。这一设计降低了中小商户前期获客成本，也支持自助入驻。商户通过 developer.flutterwave.com 的 API 文档接入
              Flutterwave，文档提供 sandbox、SDK 和支付链接生成，无需销售介入。这个产品驱动增长（PLG）基础，是 900,000+
              企业客户数的结构性来源——绝大多数商户没有经过专门销售流程就完成入驻。PLG 渠道的单商户 CAC 最低，但在交易量爬坡前，早期 ARPU 也最低。

              面向企业和大型商户，Flutterwave 在开发者基础设施之上叠加传统 B2B 销售动作。企业客户——包括 Uber、Netflix、Bolt 等在非洲运营的跨国公司和全球平台——需要定制 API
              集成、多币种结算、专属客户管理，并在多个非洲司法辖区获得合规支持。基于多司法辖区支付栈集成的复杂度，企业销售周期估计为 3–9 个月，但公开资料尚未确认精确周期。企业 CAC
              未量化，但因销售和合规开销，结构上高于 PLG；若单客户 TPV 更高，回本周期可能更快。

              汇款产品 Send 的渠道经济性不同：面向侨民消费者的获客，需要在美国、加拿大、英国等侨民社区投入品牌认知，再叠加数字营销，更接近传统消费金融科技获客模型。通过 13 张新增汇款牌照扩展至美国 29
              个州，扩大了可服务用户基础，也增加了合规开销，意味着美国单消费者 CAC 上升。公司没有公开单元级留存数据（复汇率、队列 LTV 或 NPS）。最终呈现的是一组无法凭公开数据承销的综合 CAC/LTV 画像。
