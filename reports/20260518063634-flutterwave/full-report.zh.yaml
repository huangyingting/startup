  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Flutterwave 所处的是非洲数字支付生态，广义上指由在非洲大陆运营的技术平台处理的电子支付交易总流量——银行卡、移动钱包、银行转账和跨境汇款。非洲年度总支付量估计至少 $800
              billion，覆盖正式和非正式渠道；不过多数估算只统计有银行账户和半银行账户人群的支付流。与 Flutterwave 最相关的窄口径，是面向商户的 B2B 数字支付基础设施，帮助商户把收款能力接入网站、App
              或线下渠道；更宽口径还包括消费者汇款、银行间转账、POS 银行卡网络和政府拨款。

              非洲非正规经济规模很大，估计占撒哈拉以南经济体 GDP 的 40% 到 60%，但转化难度也有结构性。现状替代方案包括现金（超过一半零售交易的主要支付方式）、直接银行电汇、跨境支付中的代理行网络，以及
              M-Pesa（Kenya / East Africa）和 MTN Mobile Money 等根深蒂固的移动钱包平台。这些替代方案让市场碎片化，但也定义了 Flutterwave
              的转化机会：当企业规模超过现金和直接银行转账的承载能力，就需要一层软件 API，把多个支付渠道和监管辖区聚合到一次集成里。

              关键相邻市场包括电商平台赋能、企业银行服务（虚拟账户、FX）、薪资发放和跨境发票融资。Flutterwave 核心 TAM 中排除的支出包括纯移动钱包 P2P 转账（由电信平台主导）、其 API
              覆盖之外的政府福利发放，以及由银行处理的大额机构 FX。
