      - CV024
      - CV039
      - CV043
figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: >-
      Flutterwave 公开可佐证的里程碑轨迹，从 2016 年在尼日利亚创立，到 2021 年跨过独角兽门槛、2022 年以 $3B+ 完成 Series D 并同时遭遇肯尼亚资产冻结，再到 2023–2024
      年一系列监管放行和负面事件，最后延伸至 2026 年的产品和牌照扩张。
    data:
      items:
        - date: '2016-01-01'
          label: 成立
          detail: Flutterwave 由 Agboola 和 Adekoya 在尼日利亚创立；确切成立日期未公开披露。
          tone: positive
        - date: '2017-06-01'
          label: Y Combinator
          detail: 加入 Y Combinator 批次；获得首个机构背书和美国网络入口。
          tone: positive
        - date: '2021-03-01'
          label: Series C 独角兽（$170M，估值 $1B+）
          detail: Tiger Global 领投 $170M Series C；Flutterwave 成为非洲首个大型金融科技独角兽。
          tone: positive
        - date: '2022-02-01'
          label: Series D（$250M，估值 $3B+）
          detail: B Capital Group 领投 $250M Series D；估值超过 $3B；创下非洲金融科技最大融资轮纪录。
          tone: positive
        - date: '2022-07-01'
          label: Kenya ARA 资产冻结
          detail: Kenya Asset Recovery Agency 因洗钱指控冻结 Flutterwave 账户。
          tone: warning
        - date: '2023-02-01'
          label: ₦2.9B 安全事件
          detail: TechPoint 报道约 ₦2.9B 未授权转账；事件归因于黑客。
          tone: warning
        - date: '2023-11-09'
          label: 肯尼亚放行
          detail: 约 14 个月冻结后，肯尼亚法院解除资产冻结；Flutterwave 获得放行。
          tone: positive
        - date: '2024-03-01'
          label: Fast Company 2024 最具创新力公司
          detail: 入选 Fast Company Most Innovative Companies 榜单；获得第三方品类验证。
          tone: positive
        - date: '2024-05-14'
          label: CNBC Disruptor 50
          detail: 入选 CNBC Disruptor 50；获得面向北美投资者受众的高知名度认可。
          tone: positive
        - date: '2024-06-01'
          label: $24M 未授权 POS 转账
          detail: Flutterwave 报告 $24M 未授权 POS 交易并寻求追回。
          tone: warning
        - date: '2026-01-01'
          label: Mono 收购 + 稳定币钱包
          detail: 收购 Mono（开放银行，全股票，约 $25–40M），并与 Turnkey 推出稳定币钱包。
          tone: positive
        - date: '2026-04-02'
          label: CBN 小额贷款牌照
          detail: 获得 Central Bank of Nigeria 小额贷款牌照；可为商户做嵌入式放贷。
          tone: positive
    approximationNotes: 成立日锚定为 2016-01-01，因为审阅来源只确认年份，未确认具体日期。肯尼亚冻结开始日期为近似值（2022 年中）。$24M POS 事件以 2024 年 6 月作为代理日期；确切日期未确认。
