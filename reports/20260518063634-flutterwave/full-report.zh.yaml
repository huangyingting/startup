      - number: '7.2'
        title: 运营与网络安全风险——欺诈事件、基础设施与账户控制
        blocks:
          - type: paragraph
            body: >-
              Flutterwave 在 12 个月内经历两起重大安全和运营事件，合计暴露约 $28M，并让平台欺诈控制是否充分留下未解问题。2023 年 2 月，约 ₦2.9B（$3.7M）未经授权从 Flutterwave
              相关账户转出。Flutterwave 否认遭黑客攻击，并表示没有客户资金损失，但同时取得单方（ex-parte）法院命令，冻结 27 家尼日利亚金融机构的账户——TechPoint 和 TechCabal
              在同期报道中指出了这一矛盾。公司法律顾问将资金路径扩大归咎于商业银行在取得冻结令上的延误。

              2023 年 10 月，一次技术故障导致约 ₦19B（按当时汇率约 $24M）被分发到 35 家金融机构约 6,000 名银行账户持有人。2024 年 2 月，Flutterwave 取得 Mareva
              injunction，要求 35 家机构提供联系方式以协助追偿。公司再次表示没有客户资金永久损失。针对任一事件，公司都没有公开披露事后根因分析、独立安全审计或 SOC 2/ISO 27001
              认证。Flutterwave 博客宣布的 EFCC 合作——建立由财团牵头的网络犯罪研究中心——是主动缓释信号，但不能替代技术控制证据。

              基础设施风险更难评估：Flutterwave 是云托管平台，提供 test 和 live API 环境，但没有公开 SLA、uptime
              承诺或灾难恢复文档。非洲互联网基础设施——尤其在尼日利亚、肯尼亚和加纳——会发生间歇性中断，可能实质影响支付处理。Rave 传统产品和较新的 checkout
              集成表面扩大了攻击面，而公司没有披露任何渗透测试节奏。按上述规模，12 个月内发生两起事件，是任何投资者承销 Flutterwave 合规和技术风险画像时的黄色预警。
