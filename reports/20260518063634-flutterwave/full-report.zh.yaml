            - 早期 — 仅 A2A 和银行数据；不直接支持卡 / MoMo
            - 早期 — 尼日利亚 50+ 家银行；其他市场未确认
            - 早期 — CBN 开放银行监管；Mono 牌照待确认
            - 早期 — Mono 有自有文档；F4B SDK 对外开放仍待落地
        - label: 稳定币钱包
          values:
            - 早期 — beta 版；商户访问有限；Turnkey 基础设施
            - 早期 — 仅 USDC/USDT；Polygon 网络；Nuvion 桥
            - 早期 — 商户集合有限；计划覆盖整个非洲
            - 早期 — 非洲稳定币监管仍不确定
            - 早期 — 无公开 SDK；Turnkey 文档；集成待确认
        - label: Barter（虚拟卡）
          values:
            - 中 — 发卡 API；虚拟 USD/GBP 发卡
            - 低 — 仅卡基对外支付；不是入站收款
            - 中 — 全球可用（Visa/Mastercard）
