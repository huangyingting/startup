  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流场景
        blocks:
          - type: paragraph
            body: >
              Flutterwave for Business（F4B）是 API 优先的支付平台，让各种规模的企业在非洲及全球范围内收款和付款。平台围绕五个主要产品模块组织——Checkout（Rave）、Send
              App、Store、Barter 和 Afritickets——分别对应不同客户工作流：商户收单、跨境侨民汇款、无代码电商店铺创建、国际消费虚拟发卡和活动票务。截至 2026
              年初，两个正在扩张的能力补足了产品组合：Mono 开放银行层（2026 年 1 月收购）和通过 Turnkey/Nuvion 合作提供的稳定币钱包（2026 年 1 月 beta 上线）。平台服务 34+
              个国家的 900,000+ 企业客户。

              对尼日利亚电商商户而言，典型工作流从接入 Checkout 产品的 API 或 SDK 开始。上线后，Flutterwave 的智能支付排序系统会在银行卡、银行转账、移动钱包（MTN
              MoMo、Airtel、M-Pesa）、USSD、VISA QR 等支付 rail 中动态选择最优路径，以最大化成功率并压低成本。结算通过商户的 Flutterwave dashboard
              流转，并按结算周期打款至其银行账户。对侨民消费者而言，Send App 提供一条并行流程：下载 iOS/Android app、完成认证、填写金额和收款国家，再从美国、加拿大或英国向非洲目的地汇款。Store
              产品服务缺少工程资源的微型商户和创作者；设置只需几分钟，商品会自动上架 Flutterwave Market，并可接受所有支持的支付方式。
