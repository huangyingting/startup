            - 低 — 公开开发者文档有限
        - label: Afritickets
          values:
            - 低 — 嵌入 Flutterwave 生态；独立 API
            - 中 — 继承 Checkout 支付方式
            - 中 — 非洲活动；地域范围未披露
            - 中 — 继承 Checkout 合规
            - 低 — 无专用开发者 SDK 或公开 API 文档
    approximationNotes: >
      成熟度评分是基于公开开发者文档、新闻稿和官方产品页面作出的定性评估。「高」表示有文档支撑、达到生产级能力且公开证据充分；「中」表示确认存在但文档不完整；「低」表示确认存在但公开开发者表面有限；「早期」表示已宣布或新近发布，生产规模的公开证据有限。
