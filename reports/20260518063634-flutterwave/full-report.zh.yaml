      - number: '3.4'
        title: 切换成本、锁定效应与分发权力
        blocks:
          - type: paragraph
            body: >
              Flutterwave 的竞争防御很大程度上建立在集成锁定和地理广度上，但这些护城河的耐久度随客户分层而变。


              **开发者和 SME 锁定**：一旦商户集成 Flutterwave 的 Rave 结账，或把 SDK 嵌入移动 App / 网站，切换到 Paystack
              或本地替代方案就需要重新工程化集成。这一切换成本中等（技术团队需要数天到数周），和 Stripe 等开发者支付平台依赖的锁定同属一类。Flutterwave 投入的开发者工具——官方 SDK、Postman
              collections、API 版本管理——会逐步加深这种锁定。


              **企业 B2B 锁定**：大型企业客户（航空公司、电信公司、零售连锁）若已集成 Flutterwave 的对账 API、FX
              收款账户和多国付款基础设施，切换成本会显著更高。替换一层泛非支付层，需要在每个国家重新签约、重新集成本地银行关系，并重建合规框架。Flutterwave 与 Visa、Mastercard
              的合作协议提供网络级服务（虚拟 Visa 发卡、收单协议），公司可以把这些服务打包进企业合同。


              **存量巨头的分发权力**：Interswitch 的银行卡交换基础设施造成一种独特依赖：Flutterwave 的尼日利亚银行卡交易要经过 Interswitch 的 Verve
              交换网络。理论上，Interswitch 可以提高交换费，或优先支持自有支付产品，从而给 Flutterwave 的尼日利亚业务带来供应链风险。M-Pesa 在 Kenya
              的闭环生态制造了类似分发卡点：Flutterwave 可以接受 M-Pesa 作为支付方式，但无法在 Kenya C2B 通道中压低 M-Pesa 的零售费率结构。


              **多归属行为**：非洲企业商户普遍会在多个支付处理商之间多归属——例如以 Flutterwave 为主网关、Paystack
              作备份。这种多归属限制了交易层面的真实锁定，但也意味着所谓切换往往是失去备份服务，而不是替换主服务。面向消费者的商户（电商、票务）使用 Flutterwave 品牌结账时，也可能提供 M-Pesa、Wave
              等替代支付方式，而不是完全通过 Flutterwave 路由。
