      - number: '8.2'
        title: 估值背景与融资历史
        blocks:
          - type: paragraph
            body: >
              Flutterwave 的标准估值锚点是 Series D：2022 年 2 月融资 $250M，投后估值超过 $3B，B Capital Group、Visa、Mastercard、YC Continuity
              和 Tiger Global 参与。所有轮次累计融资接近 $474M。截至 2026 年 5 月，公司未公开披露后续新股融资，意味着 36
              个月以上没有新的估值标记；对这种规模和画像的公司来说，这个间隔并不寻常。没有新一轮融资，会影响可投资性。第一，$3B 估值可能反映的是 2022 年峰值环境（利率环境、非洲金融科技溢价、不计成本增长倍数），而不是
              2026 年市场出清价格。第二，公司似乎有意进入 IPO 前资本纪律状态，把上一轮资本留给增长，而不是以降估值融资。第三，没有老股市场交易或内部重估，投资者无法在没有资料室的情况下独立验证当前公允价值。2026
              年 4 月 CBN 小额贷款牌照和 2026 年 1 月 Mono 全股票收购表明，公司正在主动扩展收入面，更符合 IPO 准备叙事，而不是陷入困境。2024 年 4 月 CNBC 和 TechCabal
              报道释放 IPO 信号，但截至 2026 年 5 月报告日，尚无确认时间表或交易所。新投资者的入场纪律应锚定可比公司倍数，而不是过期的 $3B 锚点。Series D
              的优先权和清算压力尚未确认，投资前还需要进一步尽调。
