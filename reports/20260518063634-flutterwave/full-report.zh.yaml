      - number: '5.2'
        title: API 架构与技术栈
        blocks:
          - type: paragraph
            body: >
              Flutterwave 的技术架构围绕 API 优先设计搭建，通过 developer.flutterwave.com 上记录的 RESTful API 端点开放支付发起、状态查询、转账执行和基于 webhook
              的事件通知。平台目前并行维护两个 API 版本 v3 和 v4，均在官方开发者门户提供支持和文档。客户端 SDK 以开源仓库形式发布在 github.com/Flutterwave
              组织下，覆盖六种编程语言：Node.js、PHP、Python、iOS（Swift）、Android（Java/Kotlin）和 React Native。Node.js SDK 在 GitHub 上有 47 个
              star、41 个 fork；PHP SDK 有 24 个 star、22 个 fork。开发者文档覆盖 quickstart 指南、API
              基础、支付方式，以及旅游、电商、金融科技、银行和汇款等重点垂直行业的集成方案。

              公司材料披露的平台规模指标包括：每天 500,000+ 笔支付、每天超过 2000 万次 API 调用、峰值吞吐量 231 requests per second，以及自 2016 年创立以来累计超过 10
              亿笔交易。基础设施被描述为云端和多区域部署；具体云服务商、区域部署拓扑和故障切换架构未公开，构成尽调缺口。智能支付路由引擎是核心架构差异化点：它基于实时信号，在卡组织、移动钱包运营商、银行转账基础设施和 USSD
              通道之间动态选择，以优化成功率和成本。算法细节——数据来源、ML 组件和 fallback 逻辑——均为专有且未披露。

              Mono 开放银行收购增加了银行数据 API 层，连接尼日利亚 50+ 家银行，提供账户聚合、账户到账户支付发起，以及身份 / 账户所有权验证。Flutterwave
              将这视为“已认证支付流”的基础，用来降低对银行卡 rails 的依赖。Turnkey/Nuvion 稳定币集成在 Polygon 网络 rails 上加入区块链钱包基础设施（USDC/USDT），由 Nuvion
              桥接法币和稳定币结算。
