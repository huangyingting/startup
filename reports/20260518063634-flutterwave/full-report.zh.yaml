      - number: '4.4'
        title: 资本充足性、烧钱速度与现金跑道
        blocks:
          - type: paragraph
            body: >
              Flutterwave 已披露各轮融资累计约 $474M：2016 年约 $1M 种子轮（Y Combinator）、2017 年约 $10M Series A、2019 年约 $20M Series
              B（Visa Ventures、Mastercard）、2021 年 3 月 $170M Series C（Tiger Global）、2022 年 2 月 $250M Series D（B Capital
              Group 领投，估值 $3B+）。Series D 是最后一次公开披露的一级股权融资；从 Series D 完成到 2026 年 5 月报告日期，已超过 36 个月且没有宣布后续一级融资。2026 年 1 月的
              Mono 收购采用全股票交易，估值约 $25–40M，是摊薄性但不消耗现金的资本部署。未发现公开债务或信贷额度披露。

              Flutterwave 没有公开现金余额、月度烧钱速度或现金跑道。对于一家估计年收入在 $260M–$520M、支付处理商典型毛利率为 45–55% 的公司，毛利润池约为
              $115M–$285M/年——原则上，如果运营杠杆已经跑出，足以支撑运营而无需进一步一级股权融资。但员工成本、多司法辖区合规建设和持续产品投入（稳定币、嵌入式贷款）都是真实运营开支，公开资料完全看不见。上一轮一级融资后的
              36 个月空窗，与两种情景相容：（a）公司接近盈亏平衡或已实现现金流为正；或（b）公司正为近期 IPO 管理资本结构，希望保持干净的股权结构。截至 2026 年 5 月，2022 年和 2024 年释放的 IPO
              信号没有跟进任何 S-1 文件或交易所选择。

              Series D 披露的募资用途包括非洲市场扩张、M&A 和产品开发。Mono 全股票收购和 CBN 小额贷款牌照都与上述目标一致。Series D 投资者财团——包括 B Capital Group、Alta
              Park Capital、Whale Rock Capital、Lux Capital、Glynn Capital、Avenir Growth Capital、Tiger Global、Green Visor
              Capital 和 Salesforce Ventures——包含 Whale Rock、Alta Park 这类通常贴近公开市场可比公司出手的 crossover funds，强化了 pre-IPO
              叙事。公司尚未公开确认新一轮融资触发条件或流动性事件时间表。
