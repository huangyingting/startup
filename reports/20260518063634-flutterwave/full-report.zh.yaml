      - number: '3.3'
        title: 能力、定价与 GTM 对比
        blocks:
          - type: paragraph
            body: >
              Flutterwave 的能力差异最明显体现在四个维度：地理覆盖、API 产品深度、企业 GTM 和监管多元化。


              **地理覆盖**：Flutterwave 在 34+ 个非洲国家拥有有效牌照或运营合作伙伴，是非洲创立的金融科技支付平台中覆盖最广的一家。Paystack 覆盖 4–5
              个国家（Nigeria、Ghana、South Africa、Côte d'Ivoire，以及 Kenya beta 阶段）。Interswitch 主要聚焦 Nigeria。Chipper Cash 服务约
              7–8 个非洲市场。对需要一层 API 覆盖非洲的跨国企业客户而言，Flutterwave 没有可比的一站式替代方案。


              **API 产品深度和开发者体验**：Paystack 经常被认为在开发者文档质量、接入速度和面向尼日利亚 SME 的 API 简洁度上优于 Flutterwave。Flutterwave 的 API
              面更宽（支持移动钱包、银行转账、银行卡支付、虚拟账户、USD 收款和 USSD），但历史上也更复杂。Flutterwave 正持续改进开发者门户和 API 文档，其 GitHub 仓库显示公司仍在积极维护多语言
              SDK。


              **定价模型**：Flutterwave 在 Nigeria 对本地支付收约 1.4% 每笔交易，对国际银行卡收 3.8%——与 Paystack 公布费率大致可比。Interswitch
              的交换费在基础设施层受监管，不能直接与网关定价相比。M-Pesa 的 Kenya 商业支付费用随交易规模变化（0.5–3%），并嵌入 Safaricom 服务协议。Wave
              的近零费率模式是例外——它由投资者资本补贴，在当前交易量下不适合独立盈利业务。


              **企业 GTM vs 消费者 GTM**：Flutterwave 的主要获客渠道是企业 B2B——大型跨国商户、银行和金融科技公司接入其 API。Paystack 聚焦开发者主导的自下而上采用（类似
              Stripe 在美国的模式），但也开始上探大客户。Chipper Cash 和 Wave 主要是消费者移动 App。这种 GTM 分化意味着，来自 Wave 或 Chipper Cash 的竞争压力主要集中在
              C2B 和 P2P 汇款通道，而不是企业网关收入。


              **信任与监管姿态**：Flutterwave 在美国 29 个州的货币转移牌照，以及 FinCEN 合规框架，为美国-非洲通道提供了多数非洲竞争对手缺少的监管正当性。Paystack 背靠
              Stripe，也带有隐含的美国监管可信度。Chipper Cash 与 FTX 相关的不利历史，是行业中最清晰的负面信任信号。Interswitch
              在尼日利亚的准公共基础设施角色，让它拥有初创公司无法复制的监管关系。
