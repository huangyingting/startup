      - number: '1.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: 泛非支付基础设施地位领先，并获得战略投资方背书
            body: >
              Flutterwave 在 34+ 个非洲国家搭建了多国、多轨道支付基础设施平台，这一位置很难复制。Visa Ventures 和 Mastercard 两大全球主导支付网络同时投资，是对 Flutterwave
              监管穿行能力和商户网络深度最强的第三方背书。没有其他非洲金融科技公司同时拿到两大全球网络的战略支持，这形成了兼具商业和声誉价值的护城河。
            calloutType: strength
            claimRefs:
              - CO008
              - CO009
              - CO013
          - type: callout
            title: 三年三起财务控制事件，叠加 CEO 关键人物风险
            body: >
              三起不同的财务控制不利事件叠在一起——Kenya ARA 洗钱冻结（2022–2023）、₦2.9 B 安全漏洞（2023）、$24 M 未授权 POS
              事件（2024）——形成了尽调不能当作孤立噪音忽略的模式。单看每起事件都可管理；合在一起，则指向一家估值 $3 B+ 公司在系统性风险管理和控制成熟度上的缺口。CEO 关键人物集中又放大了这一风险：Agboola
              是公司的监管声音、融资引擎和外部形象，公开资料中没有具名的 C-suite 继任者或董事会成员。
            calloutType: risk
            claimRefs:
              - CO021
              - CO022
              - CO032
              - CO035
              - CO036
          - type: callout
            title: 融资形成明显跑在公开财务披露前面
            body: >
              Flutterwave 多轮累计融资 $474 M+，投资方层级很高，估值达到 $3 B+，却没有公开披露收入、ARR、take rate 或利润率。资本先于披露的模式并非 Flutterwave
              在非洲金融科技中独有，但它意味着任何估值估算或基准比较都只能基于运营代理指标，而不是基本财务指标。投资者若以老股价格入场，或参与未来新股融资，必须把财务尽调列为入场决策前的最高优先级工作流。
