      - number: '7.5'
        title: 终止条件、监控触发项与尽调路径
        blocks:
          - type: paragraph
            body: >-
              三类风险构成一票否决条件——一旦发生或被确认，就必须重新评估投资逻辑能否持续。第一，CBK 正式拒发牌照且没有可信替代路径，将确认 Flutterwave
              无法在肯尼亚合法作为支付服务商运营，等于切断整条东非收入线，也会削弱公司在其他前沿市场监管者面前的可信度；这些监管者可能采取类似动作。第二，若在 2023 年 10 月 POS 故障后的 12
              个月内再发生第三起重大安全事件（超过 $5M），将说明两轮整改后控制仍未改善，并威胁尼日利亚企业客户信任和监管容忍度。第三，若 Series D 后第四年仍未完成任何流动性事件（股权融资、IPO
              或老股交易，即超过 2026 年 2 月），将指向潜在现金跑道压力，或说明市场已明确把 Flutterwave 下调到不可投资区间。

              低于一票否决条件的层级，还有十二个监控触发点，覆盖监管、运营、财务和执行维度；每一项都列入缓释措施与一票否决条件表（TR005）。投资者应向资料室索取：CBK 正式牌照申请状态和往来函件；2023 年黑客事件和
              POS 故障后的安全审计报告；当前烧钱速度、现金跑道和任何桥接融资条款；以及 EU/UK 通道的数据处理协议副本。监管图景叠加起来——肯尼亚牌照未决、21 个美国州尚未覆盖、EU/UK GDPR
              风险未披露、GDPR 数据处理方身份未知——形成一个跨辖区合规缺口，投资前必须补上。按目前信息，投资者无法独立确认 Flutterwave 在其服务的任何辖区是否遵守数据保护法。
