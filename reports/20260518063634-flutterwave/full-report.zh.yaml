  - id: FU001
    title: 客户旅程地图
    type: journey-map
    layout: standard
    summary: 从开发者发现，到 API 集成、上线、产品扩展和流失风险的六阶段旅程，展示 Flutterwave 开发者和商户客群的主要采用路径。
    data:
      nodes:
        - id: n1
          label: 发现
          detail: 开发者或商户通过 TechCabal 报道、GitHub SDK 搜索、CNBC Disruptors 画像，或 developer.flutterwave.com 自然搜索接触 Flutterwave。
          tone: neutral
        - id: n2
          label: 评估
          detail: 下载 Node.js SDK，查阅 v3/v4 API 文档，创建沙盒账户，并在测试环境里测试支付流程。
          tone: neutral
        - id: n3
          label: 集成
          detail: 为卡、移动钱包、USSD 或银行转账接入 Rave checkout 或直接 API；完成合规和 KYB 入驻。
          tone: positive
        - id: n4
          label: 上线
          detail: 启用生产环境；处理第一批客户交易；使用 Flutterwave 支持解决结算和对账问题。
          tone: positive
        - id: n5
          label: 扩展
          detail: 增加支付方式（Apple Pay、Google Pay、MTN mobile money）；进入更多非洲市场；通过企业级交易量承诺提升 TPV。
          tone: positive
        - id: n6
          label: 流失风险
          detail: 反复发生的欺诈事件（2023 年黑客攻击、POS 故障）、账户冻结、肯尼亚监管不确定性，或 Paystack / Stripe 的竞品定价，都会触发重新评估。
          tone: negative
