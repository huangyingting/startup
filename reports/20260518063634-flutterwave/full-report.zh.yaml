companyProfile:
  summary: >-
    Flutterwave 是一家尼日利亚-美国金融科技公司，2016 年由 Olugbenga 'GB' Agboola（CEO）和 Adeleke Adekoya 创立。公司总部在 San Francisco，运营重心在
    Lagos，提供 API 驱动的支付基础设施，帮助企业、SMB 和开发者在 34+ 个非洲国家收款、转账并搭建金融产品。平台每年处理 $26B+ 交易额，累计处理交易超过 1 billion 笔。公司在 2022 年 2 月完成
    $250M Series D，估值 $3B+，是当时非洲金融科技最大一轮融资。2024–2026 年，Flutterwave 宣布 IPO 计划，获得多项监管牌照（Ghana、CBN 小额贷款机构），收购开放银行服务商
    Mono，并推出稳定币钱包能力。投资方包括 B Capital Group、Tiger Global、Avenir Growth Capital、Salesforce Ventures、Visa Ventures 和 Y
    Combinator。
  foundedDate: '2016-01-01'
  founders:
    - name: Olugbenga 'GB' Agboola
