      - number: '1.2'
        title: 创始人、领导层与关键人物依赖
        blocks:
          - type: paragraph
            body: >
              Flutterwave 创始团队由两位具名核心人物支撑。CEO Olugbenga 'GB' Agboola 是公司最主要的外部形象，曾在 US Chamber of Commerce 演讲，也出现在
              CNN、CNBC 等主流媒体。Agboola 在联合创立 Flutterwave 之前曾负责 Standard Bank 和 Ecobank
              的银行技术，对非洲代理行银行和移动钱包基础设施理解很深，这直接塑造了产品架构。Adeleke Adekoya 公开资料中列为联合创始人，并曾与 CTO
              职能关联；但截至报告日期，公开资料未确认其近期头衔和董事会状态。创始人的领域经验——银行轨道、企业支付、跨多个非洲央行的监管穿行——是公司竞争定位的核心，也体现了有意义的创始人-市场匹配。


              关键人物风险高，且集中在 CEO Agboola 身上。已审阅资料中没有正式 COO、CFO 或其他 C-suite 梯队的公开任命，也没有找到独立董事会构成披露。对于一家估值 $3 B+
              的公司，这是实质性治理缺口：同一位 CEO 同时承担公司最可信的公开声音、主要融资人和监管沟通人，这种关键人物依赖并不符合该阶段公司的常态。


              2022 年 Series D 到 2026 年 5
              月运行日期之间，公开资料未披露重大领导层变动或离职。没有披露变动可能意味着稳定，也可能只是公司对内部事项一贯低公开披露。任何此阶段的投资流程，都应先尽调治理结构、董事会构成和继任规划。
