      - 概率信号
      - 核心假设
      - 隐含估值区间
      - 入场决策
    rows:
      - - 乐观
        - 25%
        - 2026-2027 年完成 IPO；收入 $400-600M；8-10x 倍数；小额贷款业务和 Mono 贡献 $50M+；监管记录干净
        - $3.2-6.0B
        - IPO 前最高 $2.5B 可买入；若已按 Series D 价格投资则持有
      - - 基准
        - 50%
        - IPO 延至 2027-2028 年；收入 $280-450M；可比倍数 5-7x；监管状态维持现状
        - $1.5-3.0B
        - 最高 $2.0B 可买入；$2.0-2.5B 观察；无资料室时 $2.5B+ 回避
      - - 悲观
        - 25%
        - 降价轮或困境融资；第四起财务控制事件；IPO 延至 2029 年以后；FX 继续恶化
        - $0.7-1.2B
        - 回避；仅在低于 $1B 时供战略买家观察
    notes: >-
      情景概率是作者判断，基于来源证据，并非 Monte Carlo 输出。悲观情景以第四起财务控制事件或被迫融资为条件；截至运行日，两者均未确认。乐观情景需要执行
      IPO；公司已有信号但尚未确认。所有估值区间均为稀释前，且未调整优先股清算瀑布。
