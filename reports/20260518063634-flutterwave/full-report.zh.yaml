      - number: '2.2'
        title: 市场规模——TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >
              要精确测算非洲数字支付市场，需要多重视角，因为没有一个权威数据集能覆盖整个大陆。最宽视角是年度总支付流：非洲每年处理估计至少 $800
              billion，其中数字和半数字渠道占比不断提高。研究机构和咨询公司常用更窄的金融科技收入视角：McKinsey 和行业共识估计，非洲金融科技市场收入可从 2020 年约 $6 billion 增至 2030
              年每年 $65 billion，隐含 15–20% CAGR。Africa.com 用更宽定义预计，非洲支付市场总规模（含移动钱包）到 2030 年将达 $146 billion。

              Flutterwave 的可服务市场（SAM）最适合定义为其拥有运营牌照或本地合作伙伴的 34+ 个国家中的企业和消费者支付流，并按各市场数字支付渗透率加权。把公司自身 $26 billion TPV
              放到非洲正式数字支付市场估计约 $200–400 billion 的背景下，说明 Flutterwave 目前捕获正式交易量的
              3–4%。按可触达支付流——即当前产品和牌照可以商业化覆盖的流量——估算，考虑地理覆盖和产品组合，SAM 约为每年 $50–80 billion 支付流。

              现阶段可获取市场（SOM）由 TPV 驱动的手续费收入定义，约每年 $350–500 million，基于 Flutterwave 在 $26 billion TPV 上行业标准的 1.4–1.9% 有效
              take rate。TAM 扩张取决于新非洲市场的地理渗透、电商增长（非洲电商预计从 2019 年 $8 billion 增至 2026 年 $46 billion，CAGR
              38%），以及服务非洲侨民的汇款通道增长（World Bank 数据显示，2022 年流向撒哈拉以南非洲的汇款为 $49 billion）。关键在于，非洲 781 million 个移动钱包账户（GSMA
              2022）既带来竞争，也带来合作机会：它们总体上扩大了数字商业 TAM，却也让支付栈更碎片化。
