  productSummary: >-
    Flutterwave 提供 API 优先的支付网关（Rave/Checkout）、跨境汇款（Send App）、无代码电商（Flutterwave Store）、虚拟卡（Barter）、活动票务（Afritickets），以及通过
    2026 年收购 Mono 获得的开放银行数据层。平台支持 15+ 种支付方式，包括银行卡、移动钱包、USSD、银行转账和 M-Pesa，覆盖 34+ 个非洲国家及部分全球通道。
  customerFocus: 需要进入非洲市场的跨国企业（如 Uber、Booking.com、航空公司）、接受数字支付的非洲 SMB、收发汇款的个人消费者，以及基于 API 平台搭建产品的开发者和金融科技公司。
