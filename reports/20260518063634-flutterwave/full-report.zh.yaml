            - 高 — 15+ 种方式（卡、MoMo、银行、USSD、VISA QR）
            - 高 — 34+ 个非洲国家
            - 高 — PCI-DSS；ISO 27001；CBN Switching Licence
            - 高 — 文档门户；快速入门；示例配方；webhooks
        - label: Send App
          values:
            - 中 — 移动 App；B2B API 暴露范围有限
            - 低 — 仅法币走廊；Send 流程不含稳定币
            - 中 — 美国 / 加拿大 / 英国发起；尼日利亚 + 有限非洲覆盖
            - 高 — 13 个美国 MTL；29 个州；尼日利亚 IMTO 牌照
            - 低 — 聚焦消费者 App；开发者接口范围有限
        - label: Store / Market
          values:
            - 低 — 无代码；没有店铺管理 API
            - 中 — 通过嵌入式网关继承 Checkout 支付方式
            - 中 — 借 Flutterwave 收款能力触达全球
            - 中 — 继承 Checkout 合规；市场业务待确认
            - 低 — 无公开 Store SDK；嵌入 Checkout SDK
        - label: Mono（开放银行）
