          type: process
        - id: bank-transfer-path
          label: 银行转账 / USSD 通道
          type: process
        - id: transaction-confirmed
          label: 交易确认；向商户发送 webhook
          type: process
        - id: merchant-settlement
          label: 资金结算至商户 Flutterwave 钱包；再拨付至银行
          type: output
