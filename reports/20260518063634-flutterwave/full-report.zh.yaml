  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >
              Flutterwave 的收入主要来自交易手续费，按平台处理支付金额的一定比例收取。网关产品 Rave 是核心收入引擎：尼日利亚商户的本地银行卡支付收费为交易额的 1.4% 加 NGN 45 固定费；国际
              Mastercard 和 Visa 支付收费为 3.8%。这些公开费率只是标价——Flutterwave
              覆盖多种交易类型、地域和交易量阶梯，实际综合抽成率更低，反映企业客户的批量议价和本地市场竞争性定价。分析师和观察者估计，在公司 2022 年披露的 $26B+ 总支付量（TPV）上，实际综合抽成率为
              1–2%。按低端 1% 计算，隐含总收入约为 $260M/年；按高端 2% 计算，约为 $520M/年。这些是分析师构建的替代估算，不是公司发布的数字。

              除网关外，Flutterwave 还有四条创收产品线：Send（汇款）从美国、加拿大和其他市场向非洲的侨民汇款中赚取外汇点差和通道费用；Barter（虚拟发卡）从银行卡交易中获得交换费；Store 和
              Afritickets（中小商户店铺与活动票务）产生类 SaaS 订阅收入和 marketplace 佣金。各收入流的相对贡献尚未公开，若没有 data-room 访问权，无法用于承销。

              支付交易的收入确认较直接，由交易事件触发：交易完成时赚取手续费。汇款收入确认跟随通道交易事件及外汇点差落定。Store/Afritickets 的订阅和 SaaS
              组件若达到重要规模，应按期确认。外汇折算是重要确认问题：Flutterwave 在尼日利亚（最大市场）赚取大量以奈拉计价的收入，奈拉在 2023–2024 年对美元贬值超过
              40%，即便本币收入持平，也会压缩美元口径收入和毛利率。

              2026 年 4 月取得的 CBN 小额贷款牌照增加了一条潜在贷款收入线——通过 Flutterwave 商户门户发放商户现金垫款或营运资金贷款所产生的利息收入。截至报告日期，这仍是新的、未量化的收入线。与
              Turnkey 的稳定币钱包合作（2026 年 1 月）若规模化采用，可能引入资产托管费和跨境加密结算费。
