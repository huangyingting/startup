  - id: FI001
    title: 收入模型桥
    description: |
      示意流展示 Flutterwave 客户活动如何转化为不同收入流，并最终转为毛利。所有收入流基于公开定价和公司披露 TPV；毛利节点使用分析师估算的毛利率区间（45–55%）。
    type: flow
    layout: standard
    summary: |
      商户和消费者活动通过五个产品渠道进入 Flutterwave 平台。每个渠道用一种收费机制把交易活动转成收入。扣除网络和交换费成本后，估计每年产生 $115M–$285M 毛利——但会受到奈拉贬值带来的 FX 拖累。
    data:
      nodes:
        - id: merchant-activity
          label: 商户 / 消费者交易活动（$26B+ TPV）
          type: input
        - id: rave-domestic
          label: Rave 国内网关（1.4% + NGN 45）
          type: process
        - id: rave-international
          label: Rave 国际网关（3.8%）
          type: process
        - id: send-remittance
          label: Send 汇款（FX 点差 + 走廊费用）
          type: process
        - id: barter-cards
          label: Barter 虚拟卡（交换费）
          type: process
        - id: store-afritickets
          label: Store / Afritickets（SaaS / 佣金）
          type: process
        - id: gross-revenue
          label: 交易总收入（估计约 $260M–$520M/年）
          type: process
        - id: network-costs
          label: 减：网络 / 交换费 / 结算成本（隐含毛利率约 45–55%）
          type: process
        - id: gross-profit
          label: 毛利（估计约 $115M–$285M/年）
          type: output
      edges:
        - from: merchant-activity
          to: rave-domestic
        - from: merchant-activity
          to: rave-international
        - from: merchant-activity
          to: send-remittance
        - from: merchant-activity
          to: barter-cards
        - from: merchant-activity
          to: store-afritickets
        - from: rave-domestic
          to: gross-revenue
        - from: rave-international
          to: gross-revenue
        - from: send-remittance
          to: gross-revenue
        - from: barter-cards
          to: gross-revenue
        - from: store-afritickets
          to: gross-revenue
        - from: gross-revenue
          to: network-costs
        - from: network-costs
          to: gross-profit
    approximationNotes: >
      所有总收入和毛利数字都是分析师估算，来自公司披露 TPV（$26B+，2022 年口径）和行业可比 take rate（混合 1–2%）。公司未确认任何公开收入、take rate
      或毛利数字。估算未计入奈拉贬值（2023–2024 年 40%+）带来的 FX 拖累，但它会压缩美元计毛利。
    sourceRefs:
      - SI002
      - SI004
      - SI001
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI006
      - CI015
      - CI026
  - id: FI002
    title: 单位经济桥
    description: |
      定性流图展示 Flutterwave 单位经济的输入、转换步骤和输出缺口。多数中间节点在公开来源中未知；这是一张尽调缺口图，不是量化桥。
    type: flow
    layout: standard
    summary: |
      Flutterwave 的单位经济以公开费率乘以一笔交易开始，产出估算的单笔交易净收入，随后进入不透明成本结构。CAC、回本周期、LTV 或队列级留存指标均未公开。
    data:
      nodes:
        - id: list-price
          label: 标价费率（每笔交易 1.4%–3.8%）
          type: input
        - id: volume-discount
          label: 减：交易量 / 企业折扣（幅度未知）
          type: process
        - id: realized-rate
          label: 实际混合 take rate（估计约 1–2%；未确认）
          type: process
        - id: network-fee
          label: 减：网络 / 交换费 / 欺诈成本（拆分未知）
          type: process
        - id: per-txn-gp
          label: 单笔交易毛利（未知；估计约 0.5–1.5%）
          type: process
        - id: cac
          label: 分渠道 CAC（未知；PLG SMB 结构上较低；企业较高）
          type: process
        - id: ltv
          label: LTV（未知；未公布 cohort 数据）
          type: process
        - id: ltv-cac
          label: LTV/CAC 比率（未知——关键承销缺口）
          type: output
      edges:
        - from: list-price
          to: volume-discount
        - from: volume-discount
          to: realized-rate
        - from: realized-rate
          to: network-fee
        - from: network-fee
          to: per-txn-gp
        - from: per-txn-gp
          to: ltv
        - from: cac
          to: ltv-cac
        - from: ltv
          to: ltv-cac
    approximationNotes: |
      所有中间值均为估计或未知。本图展示单位经济的概念结构；Flutterwave 未公开确认任何量化输入或输出。尽调要求：需要分渠道 CAC、队列 LTV、混合 take rate 和交易层面毛利率，才能用真实数字填充此桥。
