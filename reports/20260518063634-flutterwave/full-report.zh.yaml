      - number: '1.5'
        title: 里程碑、监管事件与不利历史
        blocks:
          - type: paragraph
            body: >
              Flutterwave 的里程碑很丰富，横跨五类重大事件：融资拐点、产品扩张、监管推进、合作伙伴验证，以及不利 / 风险事件。创立到独角兽的弧线（2016–2021）推进很快：Y Combinator
              种子轮、快速后续轮次、Visa Ventures 和 Mastercard 投资，随后在 2021 年 3 月以 $170 M Series C 跨过独角兽门槛。2022 年 2 月的 Series D
              又把此前估值翻了一倍以上。2020–2022 年的产品里程碑包括 Send 汇款服务上线和更名，以及 Barter 虚拟卡发行的正式化。


              2022–2026 年的监管里程碑同时有明显正面和负面方向。负面一侧，Kenya 的 Asset Recovery Agency 2022 年因洗钱指控冻结 Flutterwave 资产；直到 2023 年 11
              月，肯尼亚法院释放资金后才完全解决。事件持续约 14 个月，并带来大量负面报道。另一起事件发生在 2023 年 2 月，一笔未授权转账导致约 ₦2.9 B 被转走——TechPoint
              将其报道为黑客导致的安全漏洞。2024 年，Flutterwave 公开寻求追回因未授权 POS 交易损失的 $24 M。正面一侧，公司在 2023–2024 年获得 13 张新的美国货币转移牌照，2024 年
              5 月入选 CNBC Disruptor 50，进入 Fast Company 2024 年 Most Innovative Companies 榜单，获得 African Banker Awards
              Fintech of the Year，取得 Ghana 支付牌照，与 EFCC 合作设立网络犯罪研究中心，并在 2026 年收购 Mono（尼日利亚开放银行服务商），与 Turnkey
              合作推出稳定币钱包，获得尼日利亚 CBN 小额贷款机构牌照。重大不利事件与加速推进的公司发展并存，说明 Flutterwave 已在品类定义级规模上运营，但仍要处理实质性执行和合规风险。
