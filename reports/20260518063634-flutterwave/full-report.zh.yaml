      - number: '6.4'
        title: 反向客户信号——欺诈事件、账户冻结与声誉影响
        blocks:
          - type: paragraph
            body: >-
              2022 至 2024 年间，三起重大反向事件影响了 Flutterwave 的客户基础。第一，2022 年肯尼亚 Asset Recovery Agency 冻结了与 Flutterwave 实体相关的账户，称
              10+ 家公司存在超过 $200M 的可疑交易和潜在洗钱。另一起事件中，肯尼亚法院冻结了与 86 Football Technology 庞氏骗局中 2,468
              名投诉人相关的账户。两项肯尼亚行动最终均获解决：ARA 案件于 2023 年 11 月撤回，Flutterwave 被澄清；Football Technology 事项则不同于 Flutterwave
              核心产品。但这些事件让通过 Flutterwave 相关肯尼亚账户运营的商户长期处于不确定状态。

              第二，2023 年 2 月，黑客从 Flutterwave 相关账户转走 ₦2.9B。公司取得法院命令，冻结 27
              家尼日利亚金融机构的账户。关键在于，冻结影响了通过漏洞收款的无辜第三方账户持有人——这种模式让客户受到直接伤害，也让声誉损害超出最初安全事件本身。

              第三，2023 年 10 月，一次技术故障导致约 ₦19B（$24M）被转入 35 家机构约 6,000 名银行账户持有人。Flutterwave 于 2024 年 2 月 1 日取得 Mareva
              injunction，强制 35
              家机构分享受影响持有人的联系方式并协助追偿。公司表示没有客户资金损失，但追偿流程——事件发生三个多月后才提交银行禁令——意味着受影响账户持有人经历了显著运营扰动。公司在这些事件后没有发布公开流失研究、NPS
              影响评估或商户调查。
