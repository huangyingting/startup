      - number: '7.3'
        title: 财务与外汇风险——货币贬值、融资空窗与估值压缩
        blocks:
          - type: paragraph
            body: >-
              Flutterwave 的财务风险画像由三项结构性问题主导：尼日利亚奈拉贬值、多年融资空窗，以及非洲金融科技后期估值压缩。尼日利亚贡献 Flutterwave 总支付量（TPV）的相当大份额；截至 2024
              年，TPV 超过 $26B。2023 年，尼日利亚新政府上任后取消 CBN 官方汇率 peg，奈拉对美元贬值超过 40%。这次贬值直接压缩以 NGN 计价收入和 TPV
              的美元等值，在总交易量增长与实际美元收入增长之间制造结构性裂口。公司处理多币种支付，但没有披露对冲策略，也没有披露成本基数中美元与本地货币的比例。

              Flutterwave 于 2022 年 2 月完成 $250M Series D，投后估值超过 $3B。截至 2026 年 5 月，没有新的股权融资完成——空窗超过三年。非洲金融科技后期估值已较
              2021–2022 年峰值普遍下滑 30–60%；可比交易和公开市场表现显示，Flutterwave 的隐含价值可能显著低于 $3B 标记。公司于 2024 年 4 月宣布瞄准 Nasdaq 的 IPO
              意向，但尚未设定确定上市日期；2024–2026
              年，面向非洲的金融科技公司公开市场环境一直具有挑战性，同期没有同行完成大型上市。烧钱速度、现金跑道和当前盈利能力都未公开披露，无法独立评估下一次融资事件的紧迫性。如果融资环境不改善，Flutterwave
              将面临双重风险：在运营记录仍有未解决反向事件的情况下，下调估值融资或以摊薄性 IPO 上市。
