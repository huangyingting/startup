      - number: '8.4'
        title: 情景分析
        blocks:
          - type: paragraph
            body: >
              乐观情景要求三个条件同时成立：非洲数字支付 CAGR 到 2028 年仍高于 18%，Flutterwave 在 2026-2028 年于主要交易所成功 IPO 并取得 IPO 溢价，且 CBN
              小额贷款和开放银行收入实质扩大收入倍数。在这些条件下，$400-600M 收入运行率和 8-10x EV/Revenue 倍数会给出 $3.2-6B 估值区间。以 $3B 入场的投资者在稀释前可获得 1.1-2x
              回报。乐观情景依赖 IPO 执行；公司已释放信号，但尚未确认。基准情景反映当前可比市场证据。$300-450M 收入乘以 5-7x 倍数，得到 $1.5-3B。按 Series D
              价格（$3B）入场，在该情景下大致合理到略贵；若以 $1.8-2B 入场，成功 IPO 可带来有意义的上行。基准情景给 2026-2028 年 IPO 赋予 50% 概率。悲观情景来自不利触发：如果
              Flutterwave 需要新资本而被迫降估值融资、关键市场监管审查延续、进一步欺诈或安全事件损害企业品牌，或后期私营金融科技倍数继续压缩到 3-4x。在这些条件下，$700M-$1.2B 估值区间是可能的。按
              $3B 入场的投资者在任何优先权分配瀑布前会面临 60-75% 损失。各情景的主要价值驱动因素是：（1）确认收入和 ARR 轨迹；（2）IPO
              时间和交易所选择；（3）肯尼亚及其他战略市场保持干净监管记录；（4）新小额贷款账本的信贷表现；（5）Mono 整合带来可衡量的开放银行收入。价值毁灭因素包括：第四起财务控制事件、CBN 不利执法行动，或到
              2028 年仍未执行 IPO 路线图。
