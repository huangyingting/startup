      高影响（严重）单元，确认它们是本章两个达到否决标准的运营和监管风险。四项风险总体严重度为高或中；没有风险被评为低 - 低。
    data:
      columns:
        - 低影响
        - 中影响
        - 高影响
      rows:
        - label: 高可能性（>50%）
          values:
            - label: —
            - label: —
            - label: 网络安全 / 欺诈复发（H-H · 严重）；肯尼亚 CBK 牌照被拒（H-H · 严重）
        - label: 中等可能性（20–50%）
          values:
            - label: —
            - label: M&A 集成失败 — Mono（M-M · 中）
            - label: NGN FX 贬值（H-M · 高）；融资缺口 + 估值压缩（M-H · 高）；CEO 关键人物离职（M-H · 高）；GDPR / 英国执法（M-H · 高）
        - label: 低可能性（<20%）
          values:
            - label: —
            - label: 重大云 / 基础设施中断（L-M · 中）
            - label: —
