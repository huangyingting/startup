  - id: TV005
    title: 投资逻辑破裂与终止触发项表
    columns:
      - 触发项
      - 阈值或可衡量事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 第四起重大财务控制事件
        - 新欺诈、资产冻结或监管执法导致 $10M+ 损失或资产受限
        - 摧毁企业信任；将估值倍数压到困境水平；阻断 IPO
        - 回避；如有可能，退出现有头寸
      - - IPO 延至 2029 年之后且缺少战略理由
        - 到 2028 年 Q4 仍未提交 S-1，且没有可信的交易所公告
        - 引发对财务健康和治理的担忧；老股流动性枯竭
        - 减持；以任何可得折价寻求老股出售；下调至回避
      - - 新一轮股权融资估值低于 $2B
        - 新股融资条款清单或公开公告显示估值不高于 $2B
        - 证实 $3B 标记无法被市场支撑；释放内部人认输信号
        - 以 $3B 估值回避；低于 $2B 时继续观察以控制进场纪律；监测困境信号
      - - 失去 CBN 或主要监管牌照
        - CBN 撤销、暂停或实质限制 Flutterwave 在尼日利亚的运营牌照
        - 尼日利亚是核心收入市场；牌照丧失会摧毁商业模式
        - 立即回避
      - - 奈拉汇率全年持续低于 2500 NGN/USD
        - NGN/USD 在完整财年内持续低于 2500
        - 进一步压缩美元计收入；IPO 路演数字失去吸引力
        - 下调至观察；按修订后的汇率假设重新承销；若收入跌破 $200M，则升级为回避
    notes: 触发项均为分析师示意性判断，不是公司指引。第四次财务控制事件门槛（$10M+）按此前事件模式校准。牌照丧失和深度 FX 贬值是生存性威胁， 不只是投资逻辑调整。
