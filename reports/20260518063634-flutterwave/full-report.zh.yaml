      - number: '6.2'
        title: 具名客户证明与企业伙伴验证
        blocks:
          - type: paragraph
            body: >-
              Flutterwave 最强的具名客户证明，是 Uber 发布在其开发者文档门户上的背书。该引语——“支付是 Uber 神奇体验的核心。Flutterwave
              与我们一样以客户为中心；双方合作让我们能打造兼具支付创新、摩擦更低、成本更省的支付体验”——直接归属于 Uber，并得到 CNBC 2024 年 Disruptor 50 画像的佐证；该画像将
              Flutterwave 描述为大规模服务企业客户。Uber 之外，Series D 报道列出了三家一线伙伴：PayPal（支持非洲 / 全球跨境支付）、MTN Mobile Money（非洲移动钱包）和
              Airtel Africa（电信移动钱包集成）。这些伙伴均未在合作公告之外发布公开声明、联合案例研究或可核验的结果指标。

              Flutterwave 的开发者文档（developer.flutterwave.com）开放 v3/v4 API，提供 test 和 live 环境，支持银行卡、移动钱包、银行转账、USSD、Apple Pay
              和 Google Pay。GitHub 上的 Node.js SDK（Flutterwave/Node-v3）提供了开发者采用的公开信号。支付方式文档确认其集成表面横跨非洲及全球支付
              rails，意味着企业和开发者客户基础多元。Flutterwave 的 Store 产品进一步扩大商户触达，让 SMB 能面向全球销售。公司在 Ghana 的支付牌照扩张，以及 FastCompany（Most
              Innovative Companies 2024）的认可，佐证其企业和监管互动仍然活跃。

              证据质量矩阵暴露了持续缺口：Uber 引语是直接且暗示生产环境使用的证明，但其他所有合作证据均来自公司自身声明，没有独立佐证。PayPal、MTN 和 Airtel Africa
              没有发布联合新闻稿或结果指标。具名客户证明表被有意标为 partial；仅凭公开来源，Flutterwave 企业客户名单的完整范围仍然未知。
