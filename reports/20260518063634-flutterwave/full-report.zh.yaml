  - id: FE002
    title: 客户工作流 / 运营流
    description: |
      在线商户支付通过 Flutterwave 平台的分步交易流，从客户发起支付到商户结算。展示智能路由决策点，以及通往结算的多轨道路径。
    type: flow
    layout: standard
    summary: >
      客户在商户结账页选择支付方式后，一笔支付开始。Flutterwave 的智能路由引擎评估可用轨道并选择最优路径。支付经选定轨道（银行卡、移动货币、银行转账或 USSD）处理、确认，商户随后收到结算款，进入其
      Flutterwave 钱包和银行账户。
    data:
      nodes:
        - id: customer-initiates
          label: 客户在商户结账页选择支付方式
          type: input
        - id: flutterwave-checkout
          label: Flutterwave Checkout SDK / API 接收支付请求
          type: process
        - id: smart-routing
          label: 智能支付路由引擎选择最优通道
          type: process
        - id: card-path
          label: 卡组织通道（Visa / Mastercard）
          type: process
        - id: mobile-money-path
