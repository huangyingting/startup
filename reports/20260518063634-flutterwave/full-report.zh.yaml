chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、商业模式与地理覆盖
        blocks:
          - type: paragraph
            body: >
              Flutterwave 2016 年创立于尼日利亚，使命是简化非洲企业的收付款，并把非洲经济接入全球商业。更准确地说，它是一层支付基础设施：提供 API、结账流程和合规脚手架，让商户、企业和金融机构在 34+
              个非洲国家以及全球通道中收款和付款。公司总部设在 California 州 San Francisco，便于进入美国资本市场融资并服务全球企业客户；运营心脏仍在尼日利亚
              Lagos。这种双总部模式是有意为之，也常见于高增长非洲科技公司：一边管理美国投资者关系，一边维护非洲本地监管关系。


              核心产品逻辑是，非洲支付轨道高度碎片化——多币种、多央行、多本地钱包生态——最好由单一 API 抽象层统一起来。Flutterwave 的 Rave 是主要结账和网关引擎；Send
              把平台延伸到面向消费者的汇款；Store 帮 SME 搭建电商店面；Barter 提供虚拟卡发行；Afritickets 覆盖活动票务支付。多产品策略让 Flutterwave
              的收入面比纯网关服务商更宽，也降低了单一产品集中度。


              截至本报告，业务阶段和分类并不复杂：Flutterwave 是一家 Series D 后的私营公司，最近一次公开融资为 2022 年 2 月，估值 $3 B+。截至 2026 年 5
              月运行日期，公开资料未披露之后的新股融资轮次。公司同时跑 B2B（商户处理、企业 API 销售）和 B2B2C（Send 消费者汇款、Afritickets
              活动票）收入渠道。这一点把它和纯基础设施服务商区分开，也支撑了一个判断：公司在向纵向整合的支付栈推进，而不是停留在 API 过路费业务。
