      - number: '1.4'
        title: 封面指标与披露质量
        blocks:
          - type: paragraph
            body: >
              Flutterwave 披露的运营规模信号足以证明品类领导地位，但不足以仅靠公开资料支撑估值。最强的可交叉验证规模指标包括：（1）年度总支付额（TPV）为 $26 B+，披露于 2022 年初 Series D
              公告前后；（2）900,000+ 企业客户，也大致来自 2022 年 Series D 时点；（3）开发者文档支持的 34+ 个非洲国家覆盖；（4）官方开发者文档显示每天 500,000+ 笔支付和 20 M+
              次 API 调用；（5）成立以来累计交易 1 B+ 笔。这些指标呈现出真实规模，但应被视为 2022 年版本数据；公开资料没有更新，无法确认此后四年这些数字是增长、停滞还是下滑。


              收入和 ARR 完全未披露。Flutterwave 没有在任何已审阅来源中公布收入增速、take-rate 利润率或 GMV
              到收入的转换指标。即便对后期私营公司而言，这也不常见；许多公司至少会披露方向性增长，以支撑员工和投资者叙事。缺少收入披露，意味着 Series D
              估值只能用可比公司和运营代理指标来校准，而无法依靠基本财务指标。尽调中最关键的索取材料，是 FY2022–FY2025 经审计财务报表。


              员工数也不确定。媒体报道和有限公开信号显示，2022 年员工约 900 人，但之后任何年份都没有官方确认口径。公司 2022 年以来的地理和产品扩张，按逻辑会支撑员工增长，但公开资料无法验证。没有
              ARR、没有收入、也没有当前员工数，这使 Flutterwave 的公开披露姿态在同估值非洲金融科技公司中处于最低一档。
