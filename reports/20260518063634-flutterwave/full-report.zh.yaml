  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Flutterwave 所在的是全球最碎片化的支付生态之一。非洲支付基础设施仍被币制、央行牌照要求和根深蒂固的移动钱包网络切开，竞争对手可以分成四个层级。


              **第一层——直接非洲金融科技同业** 是重叠度最高的竞争者。Paystack（Nigeria，2020 年被 Stripe 收购）服务类似的开发者和 SME 客群，主打 Nigeria 优先的 API
              结账。Interswitch 是传统交换基础设施提供商，处理尼日利亚约 90% 的 ATM 交易，并扩展到发卡和 POS 终端。Chipper Cash 瞄准消费者跨境汇款，但在 FTX 2022
              年倒闭后经历多轮裁员。Wave 在法语西非（Senegal、Côte d'Ivoire）运营近零费率移动钱包平台。


              **第二层——电信支持的移动钱包运营商** 拥有结构性分发优势。M-Pesa（Safaricom/Vodacom）以 51M+ 注册用户主导 Kenya 和 East Africa。MTN Mobile
              Money（MoMo）覆盖 17 个非洲市场。这些运营商嵌入 SIM 基础设施和 USSD 轨道，金融科技平台无法直接复制；但它们的地理和产品范围比 Flutterwave 的企业 API 野心更窄。


              **第三层——相邻和替代服务商** 包括 Yellow Card（覆盖 20 个非洲市场的加密货币出入金通道）、DPO Group（Mastercard 旗下 SME 支付网关）和 MNT-Halan（Egypt
              的借贷 + 支付平台，服务 MENA）。这些运营商在特定通道或地理市场与 Flutterwave 重叠，但不覆盖其完整产品和地理矩阵。


              **第四层——潜在全球进入者** 代表更长期的竞争边界。Stripe 持有 Paystack，且自身尚未发布的全球支付产品，可能带来 Stripe 品牌在非洲直接入场。PayPal 不断扩展的非洲合作伙伴关系和
              400M+ 全球用户基础，使其成为消费者跨境支付通道的可信替代。现状替代方案——现金、银行电汇、非正式 hawala 网络——定义了所有这些玩家同时试图转化的真实竞争基线。
