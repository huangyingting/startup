        title: 图表与证据
        blocks:
          - type: callout
            title: 非洲数字支付的结构性需求顺风异常持久
            body: >
              非洲数字支付 TAM 由三股没有近期天花板的结构性转化顺风支撑：52% 成年人没有银行账户、正通过移动优先金融服务被接入；电商市场以 38% CAGR 增长；全球最昂贵汇款通道每年 $49B、成本
              6–8%。成熟市场的份额争夺往往是零和，但 Flutterwave 运营的是绿地转化环境，主要竞争对手仍是现金和代理行银行。$26B TPV 约占正式数字支付交易量的 3–4%，这让 SOM
              扩张路径在未来十年的复合增长中仍可信，而且不需要取代存量巨头。
