      - number: '1.3'
        title: 融资形成、投资方与估值轨迹
        blocks:
          - type: paragraph
            body: >
              对一家非洲私营科技公司来说，Flutterwave 的融资形成史记录得异常完整。公司先通过 Y Combinator 获得种子轮，随后在 2018–2020 年完成 Series A 和 B，引入 Visa
              Ventures、Mastercard 等战略投资方及成长型资本。拐点出现在 2021 年 3 月：Flutterwave 完成 Tiger Global 领投的 $170 M Series C，估值达到 $1
              B+，成为非洲最早的金融科技独角兽之一。CNN、Disrupt Africa 和区域媒体广泛报道了这一里程碑，Flutterwave 也因此成为全球可识别的公司。不到一年后的 2022 年 2 月，公司完成 B
              Capital Group 领投的 $250 M Series D，跟投方覆盖成长基金和 crossover 投资者，包括 Alta Park Capital、Whale Rock Capital、Lux
              Capital、Glynn Capital、Avenir Growth Capital、Tiger Global（继续投资）、Green Visor Capital 和 Salesforce
              Ventures。该轮把投后估值推高到 $3 B 以上。


              公开来源对累计融资额的估计大致收敛在 $474 M，但没有单一官方新闻稿或公司声明一次性确认这一累计数字。Visa Ventures 和 Mastercard 两大战略投资方与主流成长基金同时出现，说明
              Flutterwave 已被两大全球支付网络存量巨头评估并背书。这是重要的商业和声誉信号。公开资料未披露二级交易、债务融资或授信额度，给股权结构和财务灵活性尽调留下缺口。


              估值从 $1 B+（2021 年 Series C）到 $3 B+（2022 年 Series D），前后约 11 个月，正处在 2021–2022 年全球金融科技估值高峰。2022
              年后，这一估值在机构投资组合中是维持、上调还是下调，公开资料无从得知；任何入场投资或老股购买之前，这都是关键尽调问题。
