  - id: TV004
    title: 可比估值表
    columns:
      - 公司
      - 地理重点
      - 最近估值
      - 收入估计
      - EV/Revenue 倍数
      - 适用性
    enumerationScope:
      coverage: partial
      basis: >-
        Sourced from public market data for publicly listed or recently marked private payment processors with
        meaningful emerging-market or African exposure. Excludes pure-play consumer-wallet companies and domestic card
        issuers. Coverage is partial because several direct private comparables (Interswitch, Network International
        post-acquisition) do not have current public filings accessible. The partial coverage reflects genuine data
        availability constraints rather than selective exclusion.
    rows:
      - - dLocal（NASDAQ DLO 上市公司）
        - 非洲、拉美、亚洲，覆盖 40+ 市场
        - $1.5-2B 市值（2024-2025）
        - 2023-2024 年净收入估计 $300-400M
        - 4-6x EV/Revenue 倍数
        - 适用性最高；聚焦新兴市场（EM）的跨境处理商；API 驱动；企业客户结构相近
      - - Adyen (AMS ADYEN)
        - 全球布局，以欧洲为主
        - EUR 30B 市值（2024-2025）
        - 2024 年净收入估计 EUR 1.6B
        - 15-20x EV/Revenue 倍数
        - 仅作乐观情景上限；Adyen 利润率更优，且有上市公司记录
      - - Stripe（未上市）
        - 全球，TPV 估计约 $1T
        - 2024 年要约估值 $65B，低于 $95B 峰值
        - 2024 年收入估计 $3-4B
        - 要约交易隐含 16-22x EV/Revenue
        - 规模大一个数量级；仅适合做 TPV 比率基准
      - - Nuvei (TSX/NASDAQ NVEI)
        - 全球布局，拉美和新兴市场为次要重点
        - 2024 年 $4B 私有化
        - 2023 年收入估计 $1.2B
        - 私有化 3-4x EV/Revenue
        - 可比性中等；新兴市场敞口小于 dLocal；私有化限制可见度
      - - Network International（Brookfield 未上市）
        - 中东与非洲
        - 2023 年 GBP 1B 收购
        - 2022 年收入估计 $350M
        - 收购 2-3x EV/Revenue
        - 适用性中等；非洲 / 中东和北非（MENA）B2B 处理商；收购情境压低倍数
      - - Interswitch（Helios/Visa 未上市）
        - 聚焦尼日利亚与非洲本土市场
        - 2021 年未上市标记估值约 $1B
        - 2022 年收入估计 $200-350M
        - 未上市 3-5x EV/Revenue
        - 与非洲高度贴合，但聚焦尼日利亚本土，限制向泛非规模外推
      - - Paystack（被 Stripe 收购）
        - 尼日利亚，2020 年被收购
        - 2020 年 $200M 收购
        - 收购时 ARR $10-25M
        - 收购 8-20x ARR
        - 历史锚点，收购时规模小得多；不是 $3B 标记估值的当前可比
    notes: >-
      所有倍数和估值都是分析师估计或公开报道的标记。dLocal 数据来自公开 NASDAQ 文件和 Wikipedia。Stripe、Nuvei、Interswitch 和 Network International
