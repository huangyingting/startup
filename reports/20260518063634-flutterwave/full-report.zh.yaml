      - number: '8.5'
        title: 建议、退出准备度与最终尽调事项
        blocks:
          - type: paragraph
            body: >
              建议：观察。置信度：中。风险评级：高。估值立场：$3B 偏高；$1.5-2B 有吸引力。Flutterwave 是一家高质量的非洲金融科技基础设施公司，拥有可防守的监管护城河、大且增长中的 TAM，以及可信的
              IPO 选择权。不过，当前可比公司倍数并不支撑 $3B 上一轮估值，且没有公开财务披露；没有资料室就无法承销。观察判断让投资者保留快速行动能力：一旦通过降估值融资、折价老股交易，或调整条款的 IPO
              前配售拿到有吸引力的入场价，就可以出手。退出准备度部分具备，且在改善。2024 年 4 月 IPO 信号之后，截至 2026 年 5 月仍没有正式 S-1 文件或交易所公告。CBN 小额贷款牌照、Mono
              收购和稳定币钱包扩张有利于 IPO 叙事，但公司还需要完整一年干净监管记录、经审计财务和确认交易所，才能推进流程。若 Flutterwave 吸引 Mastercard、Visa
              或寻求非洲市场份额的全球一线处理商，战略 M&A 是替代退出路径；先例（Stripe/Paystack，2020 年约 $200M）意味着战略收购方会支付控制权溢价，但上一轮估值压缩了这个选项。按 $3B 折价
              20-40% 的老股交易，是最接近的流动性路径。TV006 中的尽调事项，是从观察转向买入所需的最低信息集。TV005 中的投资逻辑破裂触发条件，定义了判断转向回避的情形。只要公司保住牌照组合、继续准备
              IPO，并避免第四起重大财务控制事件，观察判断维持不变。
