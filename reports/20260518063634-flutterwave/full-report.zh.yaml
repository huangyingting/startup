  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与分层：企业锚点、开发者、中小商户和侨民消费者
        blocks:
          - type: paragraph
            body: >-
              Flutterwave 服务非洲支付栈中的五类重叠客户。企业端，公司将 Uber 列为具名且公开引用的客户；PayPal、MTN 和 Airtel Africa
              则被列为跨境和移动钱包支付流的战略集成伙伴。这些企业关系构成 Flutterwave 生产环境部署证明的锚点，但公司没有披露合同金额、SLA 或续约时间。企业层以下，是庞大的中小企业和开发者群体，他们通过
              v3/v4 REST API、Rave checkout 产品和 Node.js SDK 使用平台。开发者社区把 Flutterwave 集成进自己的应用，事实上在没有 Flutterwave
              直接销售关系的情况下扩大了平台触达。

              第三类客户是非洲侨民消费者，由 Send 汇款应用服务。该应用于 2023 年 8 月重新上线，覆盖从美国、加拿大、英国到尼日利亚、埃及和 Sénégal 的汇款通道。公司称 160M+
              非洲侨民是可触达市场。第四，Flutterwave Store 让任何商户都能“几分钟内”创建在线店铺并面向全球销售，目标客户是需要无代码商业基础设施的微型商户和个体创业者。最后，Flutterwave
              拿下覆盖美国 29 个州的 13 张汇款牌照，显示其有意从美国服务侨民消费者和跨境企业客户。

              客户数从 Series C 时的 290,000 个商户（2021 年 3 月）增长到 Series D 时的 900,000+ 家企业（2022 年 2 月）——不到一年约
              3×——是快速采用轨迹中最具体的公开信号。Series D 披露之后，公司没有正式更新该数字，也没有披露任何分层拆分（企业 vs 中小企业、API vs checkout、本地 vs
              跨境），因此投资者无法评估产品线集中度。Flutterwave 定价页确认了多类商户的本地和跨境费率结构。TechCabal 的 Series D 报道提到银行、电信和金融科技领域 300+
              技术合作伙伴，进一步印证企业网络的广度。
