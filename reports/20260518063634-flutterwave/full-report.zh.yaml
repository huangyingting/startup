  - id: FV003
    title: 估值回报区间
    description: |
      截至 2026 年 5 月，Flutterwave 的乐观、基准和悲观情景估值区间，以可比公司倍数和各情景假设为锚。
    type: range
    layout: standard
    summary: |
      基准情景（$1.5-3B）跨过 $3B 上轮价格；以 $3B 入场位于基准情景的乐观端。乐观情景（$3.2-6B）需要 IPO 成功且定价溢价。悲观情景（$0.7-1.2B）反映被迫融资或降价轮。
    data:
      items:
        - label: 悲观情景（M USD）被迫降价轮或困境
          low: 700
          mid: 950
          high: 1200
        - label: 基准情景（M USD）可比倍数，IPO 按计划推进
          low: 1500
          mid: 2000
          high: 3000
        - label: 乐观情景（M USD）IPO 溢价，小额放贷牌照和 Mono 带来上行
          low: 3200
          mid: 4000
          high: 6000
        - label: 上轮锚点（M USD）2022 年 2 月 Series D 投后估值
          low: 3000
          mid: 3000
          high: 3000
    approximationNotes: 所有区间都是分析师基于可比公司倍数和情景假设作出的判断，并不代表公司指引或已确认估值。Series D 优先权、Mono 全股票对价以及任何新一轮融资造成的稀释，均未建模。
