      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              Flutterwave 客户群覆盖五个主要分层，各自经济性、决策流程和采用路径不同。企业和大型商户客户（跨国公司、大型非洲企业，以及 Uber、Netflix、Bolt 等在非洲运营的全球平台）贡献了不成比例的
              TPV，需要定制 API 集成、专属客户经理，以及跨多辖区监管合规支持。预算归 CTO 和 CFO 管；采用路径通常从开发者评估和沙盒测试，走向采购批准，再到生产部署。

              中小企业（SMB）商户按客户数是最大分层，也是 Flutterwave 增长最快的队列，服务产品包括 Flutterwave Checkout、Payment Links
              和店面产品。决策集中在企业主手里；支付摩擦（无法在线收银行卡，或无法收侨民客户付款）和低初始成本会触发采用。

              消费者分层由 Flutterwave Send App 服务，这是一款面向美国和加拿大非洲侨民的消费者汇款产品。Flutterwave 获得 13 张美国货币转移牌照，可覆盖 29 个州。开发者分层——API
              优先的构建者和把支付嵌入自身平台的 SaaS 公司——有战略价值，因为它推动平台分发。金融机构是第五个分层，需要白标或合作伙伴基础设施。非洲约 570 million
              台智能手机是跨分层采用的主要驱动因素；移动钱包渗透则形成竞合动态：Flutterwave 把移动钱包接入为支付方式，同时又争夺同一个商户钱包份额。
