      - number: '6.3'
        title: 留存信号、地理集中度与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              根据 2022 年初披露，Flutterwave 已在 34+ 个非洲国家、30+ 种货币中处理 $26B+ 总支付量和 200M+
              笔交易。这些数字暗示其拥有一个多年积累、规模可观的经常性商户客户基础，但公司没有公开队列数据、NRR、GRR、流失率或 NPS 分数。290K→900K 商户轨迹（约 12 个月内约
              3×）是有吸引力的采用信号，但分母——非洲可触达企业总数——以及 900K 口径的构成（活跃 vs 注册）仍然未知。

              从地理上看，尼日利亚是 Flutterwave 历史客户基础的锚点，也是公司创立市场和早期增长主引擎。34+
              个国家的足迹从监管和货币角度提供了显著多元化，但考虑市场规模和先发优势，尼日利亚很可能仍贡献大部分交易量。公司没有披露尼日利亚专项收入拆分。两项产品扩张——2026 年 1 月面向商户推出稳定币钱包，以及
              Mono 开放银行收购（全股票）——表明 Flutterwave 正通过产品深度而非公开指标来投资留存。稳定币产品向现有商户提供新的结算选项；Mono 的账户连接工具为企业客户提供 API
              级银行账户分析，可能提高切换成本。截至研究日期，两项产品都没有客户采用数据。
