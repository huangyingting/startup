  - id: FR003
    title: 依赖地图
    type: dag
    layout: wide
    summary: >-
      有向无环图呈现 Flutterwave 的关键外部依赖，覆盖监管机构、基础设施提供商、核心合作伙伴和竞争压力。标记为警示或反向语气的节点指出风险最高的依赖关系。CBK 节点（肯尼亚监管方，牌照待定）和 CEO
      节点（关键人物，无继任安排）是敞口最大的两条依赖向量。
    data:
      nodes:
        - id: n1
          label: Flutterwave
          role: focal company — African payments infrastructure
          tone: neutral
        - id: n2
          label: CBN（尼日利亚中央银行）
          role: primary Nigerian regulator; switching license and microlender license holder
          tone: positive
        - id: n3
          label: CBK（肯尼亚中央银行）
          role: Kenyan regulator — payment license pending; directed banks to stop dealings 2022
          tone: warning
        - id: n4
          label: 尼日利亚银行 / NIBSS
          role: settlement infrastructure; interbank transfer counterparty for fraud recovery
          tone: neutral
        - id: n5
          label: MTN Mobile Money
          role: key mobile-money integration partner; also potential competitor
          tone: warning
        - id: n6
          label: 云基础设施（AWS / 托管）
          role: compute and storage dependency; no disclosed SLA
          tone: warning
        - id: n7
          label: CEO（Olugbenga Agboola）
          role: key-person dependency — regulatory, investor, and partnership relationships
          tone: warning
        - id: n8
          label: EFCC（尼日利亚）
          role: AML enforcement oversight; cybercrime research center consortium partner
          tone: neutral
        - id: n9
          label: Paystack / Stripe
          role: primary Nigerian competitor; developer-first positioning; competitive pricing pressure
          tone: adverse
        - id: n10
          label: 美国州级监管机构（50 个州中的 29 个）
          role: money transmission authorization; 21 states uncovered
          tone: warning
      edges:
        - from: n1
          to: n2
          label: 受其监管；CBN switching license（2022 年 9 月）+ microlender license（2026 年 4 月）
        - from: n1
          to: n3
          label: 未取得牌照；2022 年 CBK 指示银行停止往来；牌照路径不清晰
        - from: n1
          to: n4
          label: 依赖结算和跨行转账；2023 年 2 月有 27 家机构被冻结
        - from: n1
          to: n5
          label: 移动钱包收款集成；既是合作伙伴，也出现竞争重叠
        - from: n1
          to: n6
          label: 基础设施托管和计算；没有公开 SLA 或可用性承诺
        - from: n7
          to: n1
          label: 推动 CBK/CBN 监管沟通、投资者关系和美国-非洲政策露出
        - from: n8
          to: n1
          label: AML/网络犯罪监管；联合体网络犯罪研究中心（2024）
        - from: n9
          to: n1
          label: 竞争压力；Paystack 有 Stripe 支持；开发者优先市场份额争夺
        - from: n1
          to: n10
          label: 资金传输：29 个州获授权；21 个州待定；尚未覆盖全国
    claimRefs:
      - CR005
      - CR007
      - CR009
      - CR015
      - CR027
      - CR029
      - CR030
      - CR040
  - id: FV001
    title: 推荐逻辑
    description: |
      从证据输入，经评分维度，到截至 2026 年 5 月 Flutterwave 最终投资建议的逻辑链。
    type: flow
    layout: standard
    summary: |
      推荐链从四个证据域（市场、产品护城河、财务、估值）流向评分层，生成在 $3B 估值下的观察结论，以及在 $1.5-2B 入场时的买入信号。估值节点是阻止更高确信度建议的主要约束。
    data:
      nodes:
        - id: market
          label: 市场证据
          detail: 非洲数字支付以 20%+ CAGR 增长；World Bank 显示 57% 成年人没有银行账户；GSMA 认定其为全球最大移动钱包市场。
        - id: product
          label: 产品和护城河证据
          detail: 34 国牌照组合；900K+ 客户；复制需要 5-8 年；企业标识包括 Uber、Netflix、Bolt；2026 年取得 CBN 小额放贷牌照。
        - id: financials
          label: 财务证据
          detail: $26B+ TPV；分析师估计收入 $260-520M；无经审计披露；三起财务控制事件；奈拉 FX 逆风。
        - id: valuation
          label: 估值证据
          detail: 上轮估值 $3B（2022 年 2 月，已滞后 36+ 个月）；dLocal 可比公司隐含 $800M-$2.4B；私营金融科技公司压缩 30-60%；隐含 5.8-11.5x EV/Revenue。
        - id: scoring
          label: 评分 - 市场 9，护城河 8，证据 5，估值 3
          detail: 市场和护城河得分高；财务证据和估值得分低，原因是透明度不足、价格偏高。综合信号是优质资产、价格不对。
        - id: recommendation
          label: 观察（入场价最高 $2B 时买入）
          detail: 当前 $3B 锚点下的最终结论是观察。买入门槛为 $1.5-2B。确信度中。风险高。估值立场偏高。
      edges:
        - from: market
          to: scoring
          label: 提供依据
        - from: product
          to: scoring
          label: 提供依据
        - from: financials
          to: scoring
          label: 形成约束
        - from: valuation
          to: scoring
          label: 限制
        - from: scoring
          to: recommendation
          label: 生成
    approximationNotes: null
    sourceRefs:
      - SV001
      - SV007
      - SV009
      - SV011
      - SV017
      - SV029
    claimRefs:
      - CV004
      - CV005
      - CV015
      - CV023
      - CV028
      - CV030
  - id: FV002
    title: 估值敏感性
    description: |
      比较 Flutterwave 可比公司集合的 EV/Revenue 倍数，以及在 $3B 上轮估值和分析师收入估计下的隐含倍数。
    type: bar
    layout: standard
    summary: |
      在 $3B 上轮估值和估计 $390M 净收入下，Flutterwave 的隐含 EV/Revenue 倍数约为 7.7x。该水平高于 dLocal 可比区间（4-6x），确认相对于最适用的公开可比公司，估值立场偏高。
