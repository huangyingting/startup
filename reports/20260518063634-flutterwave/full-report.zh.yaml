      - number: '8.3'
        title: 可比公司分析与倍数基准
        blocks:
          - type: paragraph
            body: >
              最站得住脚的上市可比公司是 dLocal（NASDAQ: DLO），其在非洲、拉美和亚洲处理跨境支付。dLocal 在 2024-2025 年市值约为 $1.5-2B，估计年净收入 $300-400M，隐含
              EV/Revenue 倍数约 4-6x。Flutterwave 和 dLocal 共享可比性的关键特征：两者都运营非洲和新兴市场通道，都通过基于 API 的支付轨道服务企业和 SMB
              客户，也都面对多币种监管复杂性。把 4-6x 套到 Flutterwave 分析师估计收入 $260-520M 上，隐含估值区间为 $800M-$2.4B，低于上一轮
              $3B。这就是核心估值张力。Adyen（AMS: ADYEN）是最突出的全球支付处理商，但其交易倍数结构性更高（2024-2025 年约 15-20x
              EV/Revenue），反映更强的利润率、成熟的上市公司记录和全球企业客户覆盖。Adyen 更适合作为乐观情景上沿：如果 Flutterwave 成功 IPO 并证明利润率改善，未来 3-5 年可能重新定价到
              10-12x。Stripe 2024 年 $65B 要约估值（低于 $95B 峰值）锚定私营独角兽参照；Flutterwave 的 $26B TPV 大约相当于 Stripe 估计 $1T TPV 的
              2.6%。Network International（Brookfield 约 GBP 1B 收购，聚焦中东和非洲）和 Interswitch（约 $1B 私营，聚焦尼日利亚）提供区域锚点。Nuvei（上一轮估值
              $4B，全球处理商但新兴市场暴露较小）在规模和地理光谱上介于 Flutterwave 和 Adyen 之间。可比公司组合整体支持 Flutterwave 的基准情景区间为 $1.5-2.5B；上沿由成功 IPO
              溢价锚定，下沿由困境情景或被迫降估值融资锚定。
