      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >
              **Paystack** 是 Flutterwave 最直接的开发者生态竞争对手。Paystack 2015 年创立于 Lagos，搭建了开发者友好的结账 API，吸引了 Nigeria 的 SME
              和电商商户群。Stripe 2020 年 10 月以约 $200M 收购 Paystack；在当时，这是尼日利亚金融科技的标志性估值。截至 2026 年，Paystack 服务 60,000+ 家企业，主要分布在
              Nigeria、Ghana 和 South Africa。Paystack 的开发者文档、Shopify 集成和顺滑接入体验，被广泛认为是尼日利亚商户中的同类最佳。它的关键限制是地理集中：它没有像
              Flutterwave 一样扩张到 34 个国家，母公司 Stripe 也尚未加速 Paystack 的泛非扩张。Paystack 约 $200M 的 Stripe 收购价，相对于 Flutterwave
              $3B+ 估值，为投资者提供了有用的定价参照：Flutterwave 声称企业客户数约为 Paystack 的 15 倍，产品面也定性更宽，这部分解释了估值倍数扩张。


              **Interswitch** 是尼日利亚主导型支付基础设施存量巨头，创立于 2002 年。它运营 Verve 本土银行卡体系，处理尼日利亚绝大多数 ATM 交易，并运营 Quickteller
              消费者支付平台。Helios Investment Partners 和 TA Associates 是主要私募股权支持方；公司也长期有 IPO 计划，包括曾计划在 London Stock Exchange
              上市。Interswitch 估值估计超过 $1B。它的战略优势是不可替代的基础设施深度：它位于尼日利亚银行卡处理轨道中心，连 Flutterwave 交易也依赖这些轨道。不过，Interswitch
              的产品创新节奏慢于更灵活的金融科技公司，尼日利亚之外的地理覆盖也有限。


              **M-Pesa**（Kenya 由 Safaricom 运营，Tanzania / South Africa 由 Vodacom 运营）是全球最成功的移动钱包平台，注册用户 51M+。自 2007
              年推出以来，M-Pesa 的 SIM 绑定钱包已成为 East Africa 零售支付、账单收款和小企业现金流的关键基础设施。Safaricom 通过肯尼亚政府部分国有，这给 M-Pesa
              带来竞争对手无法匹配的准监管护盾。从 Flutterwave 视角看，M-Pesa 的结构性限制在于互操作性：M-Pesa 基本仍是 Safaricom 生态内的闭环，缺少企业商户需要的跨境 API
              基础设施。Flutterwave 把 M-Pesa 当作集成伙伴（接受 M-Pesa 作为支付方式），而不是纯对手。


              **Chipper Cash** 2018 年作为跨境消费者汇款 App 创立，业务覆盖非洲。它累计融资约 $300M，FTX Ventures 是知名支持方。FTX 2022 年 11 月倒闭后，Chipper
              Cash 受到实质影响：公司进行了两轮大规模裁员（2022 年末和 2023 年初），压缩员工数，并从产品扩张计划中后退。Bloomberg 报道称，FTX 倒闭后，Chipper Cash 在 2022 年
              11 月裁掉约 12.5% 员工。Chipper Cash 的轨迹，是该行业最清晰的负面信号：如果没有企业基础设施来产生经常性 B2B 收入，纯消费者跨境汇款模式的可行性存疑。


              **Wave**（2018 年创立）在法语西非运营颠覆性移动钱包平台，重点是 Senegal 和 Côte d'Ivoire，采用近零交易费模式。它融资约 $200M，背后有 Sequoia 等投资方。Wave
              用免费或超低价 P2P 转账直接替代 Orange Money 和 MTN MoMo；在 Senegal 等 Flutterwave 也处理支付的市场，这与 Flutterwave 直接竞争。Wave
              的弱点是只面向消费者：它缺少 Flutterwave B2B 客户需要的企业 API、商户网关和全球通道能力。


              **Yellow Card** 是泛非加密货币交易所和出入金通道，2019 年创立，覆盖 20 个非洲市场。它融资 $58M，并把加密轨道定位为高费率传统汇款通道的替代方案。在 Zimbabwe 和
              Nigeria 等高通胀市场（naira 贬值严重），Yellow Card 的美元计价稳定币交易提供了纯法币支付处理商无法匹配的 FX 保护优势。
