  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险——牌照、法院程序与执法
        blocks:
          - type: paragraph
            body: >-
              Flutterwave 最具生存性影响的监管敞口在肯尼亚。截至 2026 年 5 月，Central Bank of Kenya（CBK）尚未向 Flutterwave 颁发支付服务牌照。2022 年，CBK
              正式要求当地银行和金融机构停止与 Flutterwave 交易，理由是其未经授权运营。该指令迫使 Flutterwave CEO Olugbenga Agboola 于 2023 年初前往 Nairobi
              与监管机构沟通，以恢复运营。2024 年 6 月，CBK 行长向 TechCabal 确认，肯尼亚仍在修订 National Payment Systems Act，Flutterwave
              这类金融科技公司取得牌照的路径仍不清晰。据报道，另一名投资者承诺的 $50M 投资以牌照发放为条件，在监管批准和增长资本之间形成循环依赖。

              肯尼亚 Asset Recovery Agency（ARA）于 2022 年 7 月冻结 Flutterwave 账户中超过 $52M，指控洗钱和银行卡欺诈。ARA 撤回案件后，肯尼亚法院于 2023 年 2
              月释放这些资金。2022 年 9 月，ARA 追加冻结 $3.3M。2023 年 6 月，Nairobi 另一家法院冻结了与 2,468 名投资者相关的 45 个 Flutterwave 账户，这些投资者称自己在
              86 Football Technology 庞氏骗局中遭受损失。所有肯尼亚相关程序最终在 2023 年 11 月以有利于 Flutterwave 的方式解决，当时法院批准 ARA 撤案动议。Rest of
              World 同期调查报道发现 Flutterwave 交易对手（包括由 CEO 部分共同持有的 Berrywood Capital）与 ARA 标记公司之间存在关联——这些关联 Flutterwave
              未公开回应。

              在尼日利亚，Flutterwave 于 2022 年 9 月取得 CBN Switching and Processing License——CBN 最严格的支付牌照类别——并于 2026 年 4 月取得额外
              CBN 小额贷款牌照。CBN 牌照记录强劲，但持续监管义务要求专门的监管事务职能。在美国，Flutterwave 于 2024 年 1 月取得 13 张新增牌照后，持有 29 个州的汇款牌照。仍有 21
              个州未覆盖，阻止其提供全国性服务。取得 Bank of Ghana 支付牌照后，Ghana 覆盖较扎实。欧盟和英国则通过 Send 汇款应用的 EU/UK 侨民通道带来未解决的 GDPR 与 UK GDPR
              敞口；公司没有披露公开数据保护协议、ICO 备案或处理者注册。
