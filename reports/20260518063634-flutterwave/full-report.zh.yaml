  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人和尽调路径
    rows:
      - - 经审计财务报表
        - FY2022、FY2023、FY2024 损益表、资产负债表和现金流量表
        - 承销 $3B 估值需要核验收入、利润率、烧钱速度和营运资本
        - 索取数据室；把 Big 4 审计意见设为任何投资的前置条件
      - - 收入和 ARR 披露
        - 按走廊和产品拆分 take-rate 的已确认年度净收入和 ARR
        - 收入区间 $260-520M 存在 $260M 不确定带；影响估值倍数上下 3-5x
        - CFO 电话和数据室；最低要求是管理层确认 FY2024 净收入
      - - Series D 优先权和股权结构
        - 完整备考股权结构表；清算优先权条款；参与型 vs 非参与型
        - 在下行情景中，优先权悬挂可能让普通股价值远低于 $3B 表面估值
        - 法律审阅 Series D 条款清单；索取含多个退出价格瀑布的股权结构模型
      - - IPO 时间表、交易所和承销商确认
        - 正式 IPO 委任、目标交易所、承销商选择和预期定价窗口
        - 时间不确定是乐观情景的核心风险；没有确认申报就没有退出可见性
        - 管理层电话；监测 SEC EDGAR 上的 S-1 申报；跟踪财务公关公告
      - - 前五大收入市场监管状态
        - CBN、CBK、Ghana BoG、Rwanda BNR 和 South Africa SARB——当前牌照状态和待决程序
        - 仅尼日利亚牌照丧失就会击穿投资逻辑；肯尼亚已确认放行，但仍需监测
        - 直接联系法律顾问；核查央行牌照登记簿；在尽调中要求合规证书
      - - 欺诈和安全事件整改
        - 2023 年事件后的独立安全审计；确认 $24M POS 追回状态
        - 36 个月内三起事件指向系统性控制弱点，而非孤立事件
        - 要求独立安全审计函；确认追回金额和剩余风险敞口
    notes: 尽调问题按重要性排序。第 1 和第 2 项是阻断项：没有经审计财务和确认收入，就无法承销投资。第 3–6 项重大，交割前应解决。在 $3B 入场背景下，没有一项是次要问题。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV021
