          score: 9
          note: 非洲数字支付 20%+ CAGR；World Bank 确认 TAM；结构性渗透不足
        - label: 监管护城河
          score: 8
          note: 34 国牌照组合（需 8 年搭建）；29 个美国州 MTL；2026 年 CBN 小额放贷牌照
        - label: 产品和技术
          score: 7
          note: API 优先型开发者基础设施；多产品套件；Mono 开放银行补充能力
        - label: 客户证据
          score: 8
          note: 900K+ 家企业；企业标识 Uber、Netflix、Bolt；累计 1B+ 笔交易
        - label: 管理层和治理
          score: 5
          note: CEO 关键人物集中；2022-2024 年三起财务控制事件；无审计披露
        - label: 财务证据
          score: 4
          note: 无经审计 P&L；收入估计 $260-520M 区间很宽；抽佣率未确认；需要数据室
        - label: 竞争定位
          score: 7
          note: 泛非覆盖最强；Paystack 在尼日利亚竞争激烈；dLocal 是资金最充足的直接可比公司
