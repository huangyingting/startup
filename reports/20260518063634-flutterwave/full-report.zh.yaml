      - number: '5.5'
        title: 安全、可靠性与技术风险
        blocks:
          - type: paragraph
            body: >
              Flutterwave 公开披露了两项安全认证：面向支付卡数据的 PCI-DSS 合规，以及面向信息安全管理的 ISO 27001 认证。CBN Switching and Processing License
              要求经过尼日利亚支付牌照框架中最严格的监管审查，包括对安全、合规和财务控制的详细运营审计。在美国，覆盖 29 个州的 13 张汇款牌照也要求州级机构审查安全和财务控制。公司还与 EFCC（Economic and
              Financial Crimes Commission）合作建立由财团牵头的网络犯罪研究中心，显示其在安全议题上与政府保持主动互动。

              但公司的安全记录暴露了重大事件，构成技术风险信号。2023 年 2 月，黑客通过 63 笔交易、28 个账户，从 Flutterwave 账户转走约 ₦2.9B（按 2023 年汇率约
              $3.7M）；Flutterwave 成功取得法院命令，冻结 27 家尼日利亚金融机构的账户以便追偿。2023 年 10 月，操作系统中的另一项技术故障触发了向 6,000 多个 POS 商户账户转出约
              ₦19B（$24M）的未授权转账。2024 年 2 月的 Mareva injunction 授权在 35 家金融机构范围内展开追偿。Flutterwave 表示没有客户资金永久损失，但这些事件暴露了转账授权和
              POS 子系统中的系统性运营风险。

              Mono 集成引入新的攻击面：连接 50+ 家银行的开放银行 API 扩大了需要安全覆盖的认证和数据访问流程。稳定币钱包层增加了区块链密钥管理风险，特别是 Turnkey
              托管基础设施相关风险。在将这些较新组件部署到企业客户前，需要尽调事件响应流程、渗透测试节奏、第三方安全审计报告，以及 Mono 收购后的安全状态。
