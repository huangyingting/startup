      Checkout / Rave 在所有维度上得分最高，反映其十年生产环境成熟度。Send App 的合规能力强（美国 MTL），但地域覆盖有限。Mono 和稳定币因仍处于 2026
      年发布阶段，多数维度为早期。Store、Barter、Afritickets 的集成深度为中，开发者工具成熟度为低。
