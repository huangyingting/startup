evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: headcount
    missingEvidence: >-
      Flutterwave has not publicly disclosed employee count for any year post-2022. The ~900 figure is press-estimated
      and may be stale by three or more years.
    whyItMatters: >-
      Headcount is a critical proxy for burn rate, R&D investment, and operational scale; without it, financial
      modelling of Flutterwave's cost structure is purely speculative.
    diligencePath: Request official current headcount by department and geography under NDA.
    relatedQuestionRefs:
      - QO012
  - type: stale
    severity: minor
    topic: ipo-status
    missingEvidence: >-
      IPO plans were publicly signaled in late 2022 and again in April 2024, but no S-1 filing, exchange selection, or
      formal IPO timeline has been confirmed as of May 2026.
    whyItMatters: >-
      IPO readiness affects secondary pricing, employee equity value, and the company's ability to retain talent; an
      ambiguous or stalled IPO narrative is a governance and stakeholder-alignment signal.
    diligencePath: >-
      Engage management directly on IPO timeline and whether external advisors have been appointed; request any
      registration or prospectus preparatory documents.
    relatedQuestionRefs:
      - QO019
  - type: private-evidence-only
    severity: material
    topic: board-composition
    missingEvidence: >-
      No board members, board committee structure, investor board seats, or independent directors have been publicly
      confirmed for Flutterwave in reviewed sources.
    whyItMatters: >-
      Board composition determines governance quality, investor alignment, and oversight of the CEO; a company at $3B+
      valuation without a disclosed board is a governance red flag for institutional investment.
    diligencePath: >-
      Request a current board roster, committee structure, and any investor rights agreement from the company directly
      as part of due-diligence engagement.
