  evidenceGaps:
    - type: access-blocked
      severity: material
      topic: McKinsey Africa fintech $65B revenue projection methodology
      missingEvidence: >-
        McKinsey's full report on Africa fintech market sizing (the source of the $65B by 2030 projection) returned
        HTTP 403 during this research run. The figure is widely cited in industry but the underlying methodology,
        assumptions, and confidence interval are not verifiable without access to the full report.
      whyItMatters: >-
        The $65B figure is the most widely cited institutional TAM estimate for Africa fintech; its corroboration
        methodology affects how much confidence to place in the revenue-pool sizing for Flutterwave's market.
      diligencePath: >-
        Access McKinsey report through institutional subscription or request via McKinsey.com; cross-reference with
        IFC, GSMA, and World Bank payment volume data for triangulation.
      relatedQuestionRefs:
        - QM006
        - QM021
      relatedTableRefs:
        - TM002
    - type: conflicting-data
      severity: material
      topic: Africa digital payments market sizing methodological variance
      missingEvidence: >-
        Multiple sources project Africa's digital payment or fintech market at materially different values ($25–50B
        to $146B by 2030) with no common methodology or scope. Definitional boundaries between mobile money volume,
        fintech revenue, and total payment flows are inconsistently applied.
      whyItMatters: >-
        Wide variance in market size estimates creates uncertainty in Flutterwave's TAM claim and SAM derivation.
        A diligence buyer cannot reliably size the opportunity without knowing which definition is correct.
      diligencePath: >-
        Commission a bottom-up market sizing using GSMA, World Bank, and central bank data for each of
        Flutterwave's 34+ markets; cross-reference with Statista transaction volume data for consistency.
      relatedQuestionRefs:
        - QM022
      relatedTableRefs:
        - TM002
