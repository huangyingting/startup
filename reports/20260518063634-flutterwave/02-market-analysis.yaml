  - id: s3
    title: Buyer Segmentation and Adoption Paths
    body: >
      Flutterwave's customer base spans five primary segments with distinct economics, decision-making processes, and
      adoption paths. Enterprise and large-merchant customers (multinational corporations, large African enterprises,
      global platforms like Uber, Netflix, and Bolt operating in Africa) account for a disproportionate share of TPV
      and require custom API integration, dedicated account management, and regulatory compliance support across
      multiple jurisdictions. Budget ownership sits with CTOs and CFOs; the adoption path typically moves from
      developer evaluation and sandbox testing to procurement approval to production deployment.

      Small and medium business (SMB) merchants are the largest segment by customer count and are Flutterwave's
      fastest-growing cohort, served by products including Flutterwave Checkout, Payment Links, and its storefront
      product. Decision-making is centralized with the business owner; adoption is triggered by payment friction
      (inability to accept cards online or from diaspora customers) and low initial cost.

      The consumer segment is served by the Flutterwave Send App, a consumer remittance product targeting the African
      diaspora in the US and Canada. Flutterwave secured 13 US money transmission licenses enabling service to 29
      states. The developer segment — API-first builders and SaaS companies integrating payment into their platforms —
      is strategically important as it drives platform distribution. Financial institutions are a fifth segment requiring
      white-label or partner infrastructure. Smartphone penetration at approximately 570 million devices in Africa is
      the primary cross-segment adoption driver, while mobile money penetration creates a co-opetition dynamic
      (Flutterwave integrates mobile money wallets as a payment method while competing for the same merchant wallet share).
    claimRefs:
      - CM014
