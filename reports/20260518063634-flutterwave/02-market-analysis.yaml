      severity: minor
      topic: 2026 Africa regulatory licensing landscape and market openings
      missingEvidence: >-
        Only Kenya's 2024 licensing reform has specific current-year documentation. The regulatory status of
        Flutterwave's license applications or expansions in South Africa, Egypt, Ethiopia, and other target markets
        as of 2026 is not documented from fetched sources.
      whyItMatters: >-
        Regulatory access is the binding constraint on Flutterwave's SAM expansion; new market openings or
        reversals directly affect the 3–5 year addressable market.
      diligencePath: >-
        Review each target country central bank's published 2026 payment service provider registry; confirm
        Flutterwave's license status with management and local counsel.
