  - id: s4
    title: Cover metrics and disclosure quality
    body: |
      Flutterwave discloses enough operational scale signals to establish category leadership but
      not enough to underwrite a valuation from public sources alone. The strongest corroborated
      scale metrics are: (1) $26 B+ annual Total Payment Volume, disclosed around the Series D
      announcement in early 2022; (2) 900,000+ business customers, also circa-2022 Series D
      timing; (3) 34+ African country presence supported by the developer documentation; (4)
      500,000+ payments per day and 20 M+ API calls per day, sourced from official developer docs;
      and (5) 1 B+ cumulative transactions since founding. These metrics paint a picture of
      genuine scale but should be treated as 2022-vintage data; no public update has confirmed
      whether these figures have grown, stagnated, or declined in the subsequent four years.

      Revenue and ARR remain entirely undisclosed. Flutterwave has not published revenue growth
      rates, take-rate margins, or GMV-to-revenue conversion metrics in any reviewed source. This
      is unusual even for late-stage private companies, which often disclose at least directional
      growth to support employee and investor narratives. The absence of revenue disclosures
      means the valuation at Series D must be benchmarked against comparables and operational
      proxies rather than fundamental financial metrics. For diligence purposes, audited
      financials for FY2022–FY2025 are the most critical ask.

      Headcount is also uncertain. Press reports and limited public signals suggest approximately
      900 employees as of 2022, but no official count has been confirmed for any subsequent year.
      The company's geographic and product expansion since 2022 would logically support headcount
      growth, but this cannot be verified from public sources. The combination of no ARR, no
      revenue, and no current headcount data means Flutterwave's public disclosure posture is
      among the lowest of any company at comparable valuation in the African fintech cohort.
    claimRefs:
