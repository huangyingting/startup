  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: headcount
      missingEvidence: >-
        Flutterwave has not publicly disclosed employee count for any year post-2022. The ~900 figure is
        press-estimated and may be stale by three or more years.
      whyItMatters: >-
        Headcount is a critical proxy for burn rate, R&D investment, and operational scale; without it, financial
        modelling of Flutterwave's cost structure is purely speculative.
      diligencePath: Request official current headcount by department and geography under NDA.
      relatedQuestionRefs:
        - QO012

    - type: stale
      severity: minor
      topic: ipo-status
      missingEvidence: >-
        IPO plans were publicly signaled in late 2022 and again in April 2024, but no S-1 filing, exchange selection,
        or formal IPO timeline has been confirmed as of May 2026.
      whyItMatters: >-
        IPO readiness affects secondary pricing, employee equity value, and the company's ability to retain talent;
        an ambiguous or stalled IPO narrative is a governance and stakeholder-alignment signal.
      diligencePath: >-
        Engage management directly on IPO timeline and whether external advisors have been appointed; request
        any registration or prospectus preparatory documents.
      relatedQuestionRefs:
        - QO019

    - type: private-evidence-only
      severity: material
      topic: board-composition
      missingEvidence: >-
        No board members, board committee structure, investor board seats, or independent directors have been
        publicly confirmed for Flutterwave in reviewed sources.
      whyItMatters: >-
        Board composition determines governance quality, investor alignment, and oversight of the CEO; a company
        at $3B+ valuation without a disclosed board is a governance red flag for institutional investment.
      diligencePath: >-
        Request a current board roster, committee structure, and any investor rights agreement from the company
        directly as part of due-diligence engagement.
      relatedTableRefs:
        - TO002
      relatedQuestionRefs:
        - QO023

    - type: missing-source
      severity: minor
      topic: leadership-changes
      missingEvidence: >-
        No public announcements of C-suite hires, promotions, or departures (CFO, COO, CRO, General Counsel) have
        been located for the period 2022–2026 in reviewed sources.
      whyItMatters: >-
        The absence of any leadership disclosure for a four-year period at a $3B+ valuation company creates
        uncertainty about institutional depth and operational succession capability.
      diligencePath: >-
        Request a full executive team roster and any material officer changes for 2022–2026 under NDA.
      relatedTableRefs:
        - TO002
      relatedQuestionRefs:
        - QO024

    - type: enumeration-incomplete
      severity: minor
      topic: african-regulatory-licenses
      missingEvidence: >-
        Only Nigeria (CBN) and Ghana licenses have been confirmed in reviewed public sources. The full inventory
        of country-by-country regulatory authorizations across the 34+ countries Flutterwave claims to serve
        is not publicly documented.
      whyItMatters: >-
        Operating without proper licenses in any country creates enforcement risk; a full regulatory inventory
        is essential for assessing compliance risk concentration and jurisdictional tail risk.
      diligencePath: >-
        Request a country-by-country regulatory authorization register from compliance team under NDA.
      relatedTableRefs:
        - TO004
      relatedQuestionRefs:
        - QO025

    - type: private-evidence-only
      severity: material
      topic: cap-table-investor-rights
      missingEvidence: >-
        Full cap table, round-by-round investor ownership percentages, liquidation preferences, anti-dilution
        provisions, board-seat rights, and any secondary transaction activity are not publicly available.
      whyItMatters: >-
        Preference overhang, pro-rata rights, and secondary dilution directly affect the economics of any new
        investment or acquisition; unknown cap table structure is a blocking diligence gap.
      diligencePath: >-
        Request audited cap table, shareholder agreement, and any investor rights agreement from corporate counsel
        as part of formal due-diligence process.
