      severity: blocking
      topic: revenue-and-financial-disclosures
      missingEvidence: >-
        Flutterwave has not disclosed revenue, ARR, gross margin, take rate, burn rate, cash position, or audited
        financial statements in any publicly available source reviewed.
      whyItMatters: >-
        A $3B+ valuation cannot be underwritten from public sources without fundamental financial metrics; all
        downstream valuation analysis in this report rests on operational proxies rather than verified financials.
