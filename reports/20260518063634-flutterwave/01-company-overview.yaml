  - id: s5
    title: Milestones, regulatory events, and adverse history
    body: |
      Flutterwave's milestone history is rich and spans five major event categories: financing
      inflection points, product expansion, regulatory advancement, partnership validation, and
      adverse/risk events. The founding-to-unicorn arc (2016–2021) proceeded at speed: Y
      Combinator seed, fast follow-on rounds, Visa Ventures and Mastercard investment, and then
      the $170 M Series C unicorn crossing in March 2021. The Series D in February 2022 then
      more than doubled the prior valuation. Product milestones between 2020 and 2022 included
      the launch and rebranding of the Send remittance service and the formalization of Barter
      for virtual card issuance.

      Regulatory milestones between 2022 and 2026 are significant in both positive and negative
      directions. On the negative side, Kenya's Asset Recovery Agency froze Flutterwave's assets
      in 2022 on money-laundering allegations, a freeze that was only fully resolved in November
      2023 when Kenyan courts released the funds. The incident lasted roughly 14 months and drew
      substantial negative press. Separately, in February 2023, an unauthorized transfer incident
      resulted in approximately ₦2.9 B being moved without authorization — TechPoint reported
      this as a security breach attributed to hackers. In 2024, Flutterwave publicly sought to
      recover $24 M in funds lost to unauthorized POS transactions. On the positive side, the
      company secured 13 new US money-transmission licenses in 2023–2024, was listed on CNBC
      Disruptor 50 in May 2024, was recognized on Fast Company's Most Innovative Companies list
      in 2024, won the African Banker Awards Fintech of the Year, received a Ghana payment
      license, partnered with the EFCC for a cybercrime research center, and in 2026 acquired
      Mono (Nigerian open banking provider), launched a stablecoin wallet in partnership with
      Turnkey, and obtained a CBN microlender license in Nigeria. This combination of significant
      adverse events and accelerating corporate development signals a company operating at
      category-defining scale but still managing meaningful execution and compliance risk.
