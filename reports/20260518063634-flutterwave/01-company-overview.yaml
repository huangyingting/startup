  - id: s2
    title: Founders, leadership, and key-person dependence
    body: |
      Flutterwave's founding team is anchored by two named principals. Olugbenga 'GB' Agboola,
      the CEO, is the company's primary external face, having presented at the US Chamber of
      Commerce and appearing in major press including CNN and CNBC. Agboola's background spans
      banking technology at Standard Bank and Ecobank before co-founding Flutterwave, giving him
      deep understanding of Africa's correspondent-banking and mobile-money infrastructure, which
      directly informs the product architecture. Adeleke Adekoya is publicly listed as co-founder
      and has been associated with the CTO role, though his recent title and board status are not
      confirmed in public sources as of the report date. The founders' domain expertise — banking
      rails, corporate payments, and regulatory navigation across multiple African central banks
      — is central to the company's competitive positioning and represents a meaningful
      founder-market fit.

      Key-person risk is high and concentrated around CEO Agboola. No public announcement of a
      formal COO, CFO, or other C-suite bench has been made in the reviewed sources, and no
      independent board composition disclosure has been located. This is a material governance
      gap for a company at $3 B+ valuation: a single CEO who is simultaneously the company's
      most credible public voice, primary fundraiser, and regulatory interlocutor represents a
      key-person dependency that is atypical for a company at this stage.

      No material leadership changes or departures have been disclosed publicly between the 2022
      Series D and the May 2026 run date. The absence of disclosed leadership changes could mean
      stability, or it could reflect the company's general posture of low public disclosure on
      internal matters. Diligence on governance structures, board composition, and succession
      planning is a prerequisite for any investment process at this stage.
    claimRefs:
      - CO003
      - CO032
      - CO033
      - CO034
    tableRefs:
      - TO002

  - id: s3
    title: Capital formation, investors, and valuation trajectory
    body: |
      Flutterwave's capital formation history is unusually well documented for an African
      private technology company. The company raised a seed round through Y Combinator, followed
      by a Series A and B in 2018–2020 drawing in Visa Ventures and Mastercard as strategic
      investors alongside growth-focused capital. The inflection point came in March 2021 when
      Flutterwave raised a $170 M Series C led by Tiger Global, achieving a $1 B+ valuation and
      becoming one of Africa's first fintech unicorns. That milestone was widely covered by CNN,
      Disrupt Africa, and regional press, establishing Flutterwave as a globally recognized
      company. Less than a year later, in February 2022, the company closed a $250 M Series D
      led by B Capital Group alongside a broad syndicate of growth and crossover investors that
      included Alta Park Capital, Whale Rock Capital, Lux Capital, Glynn Capital, Avenir Growth
      Capital, Tiger Global (continuing), Green Visor Capital, and Salesforce Ventures. This
      round pushed the post-money valuation above $3 B.

      Total public-source capital raised estimates converge around $474 M across all primary
      rounds, though no single official press release or company statement has confirmed the
      cumulative total in one place. The presence of strategic investors — Visa Ventures and
      Mastercard — alongside mainstream growth funds signals that Flutterwave has been evaluated
      and endorsed by the two global payment-network incumbents, which is a meaningful commercial
      and reputational signal. No secondary transactions, debt facilities, or credit lines have
      been publicly disclosed, representing a gap for diligence on capital structure and
      financial flexibility.

      The valuation trajectory from $1 B+ (2021 Series C) to $3 B+ (2022 Series D) over roughly
      11 months reflects the peak of global fintech valuations in 2021–2022. Whether that
      valuation has been maintained, revised upward, or marked down in institutional portfolios
      post-2022 is not publicly known and is a critical diligence ask before any entry investment
      or secondary purchase.
