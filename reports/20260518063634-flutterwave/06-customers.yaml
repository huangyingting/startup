  - id: TU002
    title: Customer segmentation table
    columns:
      - segment
      - buyer / user / payer
      - primary use case
      - evidence-backed scale
      - strategic value
      - gap
    rows:
      - - Enterprise / large business
        - 'Buyer: procurement / treasury; user: payments / operations team; payer: enterprise budget'
        - Cross-border payments, bulk disbursements, and multi-currency settlement across Africa
        - Uber (named and quoted); PayPal, MTN, Airtel Africa (partnerships); no total enterprise count
        - Highest revenue per customer; builds platform credibility and enables partner integrations
        - No enterprise headcount, revenue contribution, NRR, or contract structure has been disclosed.
      - - Developer / fintech builder
        - 'Buyer: CTO / product lead; user: engineers; payer: engineering budget or usage-based billing'
        - API and SDK integration to build payment flows into third-party applications
        - Node.js SDK on GitHub with active community; developer portal with test and live environments
        - High switching cost once integrated; drives long-tail volume through embedded payments
        - No API call volume, SDK download stats, or developer cohort retention data available.
      - - SME merchant
        - 'Buyer / payer / user: business owner'
        - Online payment acceptance for goods and services using Rave checkout or direct API
        - 290K merchants (March 2021), 900K+ businesses (February 2022); no post-2022 figure
        - Largest segment by count; primary driver of TPV and core brand equity in Africa
        - No segment-level breakdown between SME and enterprise; no churn or ARPU data.
      - - SMB / micro-merchant (Store)
        - 'Buyer / user / payer: solo entrepreneur or micro-business'
        - No-code online store creation and global sales enablement
        - Store product is live at flutterwave.com/us/store; no merchant count or GMV disclosed
        - Lowers barrier for first-time digital merchants; expands total addressable market
        - No active-store count, GMV, or conversion rate available from public sources.
      - - Diaspora consumer (Send app)
        - 'Buyer / user / payer: African diaspora individual'
        - Inbound remittance from US, Canada, UK, EU to Nigeria, Egypt, and Sénégal
        - Company cites 160M+ addressable diaspora; no disclosed active user count or Send volume
        - Diversifies from B2B revenue into B2C remittance; opens new corridor growth vector
        - No active user count, corridor volume, or compete-adjusted CAC for Send disclosed.
    notes: >-
      Segment boundaries are constructed by the analyst from product surface, pricing pages, and public
      announcements. Flutterwave has not publicly disclosed a segment revenue or volume breakdown.
    claimRefs:
      - CU001
      - CU003
      - CU005
      - CU006
      - CU008
