figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: standard
    summary: >-
      Six-stage journey from developer discovery through API integration, go-live, product expansion, and
      churn risk, illustrating the primary adoption path for Flutterwave's developer and merchant segments.
    data:
      nodes:
        - id: n1
          label: Discover
          detail: >-
            Developer or merchant encounters Flutterwave via TechCabal coverage, GitHub SDK search,
            CNBC Disruptors profile, or developer.flutterwave.com organic search.
          tone: neutral
        - id: n2
          label: Evaluate
          detail: >-
            Downloads Node.js SDK, reviews v3/v4 API documentation, creates sandbox account,
            and tests payment flows in the test environment.
          tone: neutral
        - id: n3
          label: Integrate
          detail: >-
            Implements Rave checkout or direct API for card, mobile money, USSD, or bank transfer;
            completes compliance and KYB onboarding.
          tone: positive
        - id: n4
          label: Go Live
          detail: >-
            Activates live environment; processes first customer transactions; accesses Flutterwave
            support for settlement and reconciliation.
          tone: positive
        - id: n5
          label: Expand
          detail: >-
            Adds payment methods (Apple Pay, Google Pay, MTN mobile money); expands into additional
            African markets; increases TPV via enterprise volume commitments.
          tone: positive
        - id: n6
          label: Churn Risk
          detail: >-
            Recurring fraud incidents (2023 hack, POS glitch), account freezes, regulatory uncertainty
            in Kenya, or competitor pricing from Paystack or Stripe trigger re-evaluation.
          tone: negative
    claimRefs:
      - CU003
      - CU014
      - CU015
      - CU031

