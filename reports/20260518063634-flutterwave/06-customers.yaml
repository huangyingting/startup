  - id: s2
    title: Named customer proof and enterprise partner validation
    body: >-
      Flutterwave's strongest named customer proof is the Uber endorsement published on its developer
      documentation portal. The quote — "Payments are central to Uber's magical experience. Flutterwave shares
      our commitment to customer centricity and our partnership allows us to create payments experiences that
      combine payments innovation, reduced friction, and cost savings" — is attributed directly to Uber and
      corroborated by CNBC's 2024 Disruptor 50 profile, which profiles Flutterwave as serving enterprise
      clients at scale. Beyond Uber, three tier-one partners are named in Series D coverage: PayPal (enabling
      cross-border Africa/global payments), MTN Mobile Money (mobile money across Africa), and Airtel Africa
      (telecom mobile money integration). None of these partners has issued a public statement, joint case
      study, or verifiable outcome metric alongside the partnership announcement.

      Flutterwave's developer documentation (developer.flutterwave.com) exposes a v3/v4 API with test and live
      environments, supporting card, mobile money, bank transfer, USSD, Apple Pay, and Google Pay. The Node.js
      SDK on GitHub (Flutterwave/Node-v3) provides a public signal of developer adoption. The payment methods
      documentation confirms breadth of integration surface across African and global payment rails, implying a
      diverse enterprise and developer customer base. Flutterwave's Store product further extends merchant reach,
      enabling SMBs to sell globally. The company's Ghana payment licence expansion and recognition by
      FastCompany (Most Innovative Companies 2024) corroborate active enterprise and regulatory engagement.

      The proof quality matrix reveals a persistent gap: while Uber's quote is direct and production-implied,
      all other partnership evidence is company-claimed with no independent corroboration. PayPal, MTN, and
      Airtel Africa have not issued joint press releases or outcome metrics. The named customer proof table
      is intentionally marked partial; the full scope of Flutterwave's enterprise roster is unknown from
      public sources alone.
    claimRefs:
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
