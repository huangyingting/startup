  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: named customer proof
      missingEvidence: >-
        Full list of Flutterwave enterprise customers with production deployment evidence, outcome metrics,
        and contract or SLA details. TU001 covers only publicly verifiable named customers; the complete
        enterprise roster is private.
      whyItMatters: >-
        Named customer proof quality and breadth are central to underwriting the durability of Flutterwave's
        revenue. Relying on a single publicly quoted customer (Uber) and three unverified partnerships is
        insufficient for a Series D-stage company with $26B+ TPV.
      diligencePath: >-
        Request full customer list with NPS, ACV, and contract tenure from data room; conduct reference
        calls with at least three named enterprise customers across different markets.
      relatedTableRefs:
        - TU001

    - type: private-evidence-only
      severity: blocking
      topic: retention metrics
      missingEvidence: >-
        NRR, GRR, merchant churn rate, NPS, and cohort-level retention data by segment (enterprise, SME,
        developer, consumer) for at least the last 24 months.
      whyItMatters: >-
        Three material adverse events (Kenya ARA freeze, 2023 hack, POS glitch) each froze merchant
        accounts. Without retention data, it is not possible to determine whether these events triggered
        merchant exits or whether the customer base is durable.
      diligencePath: >-
        Request monthly NRR and GRR cohorts, churn waterfall by segment, and any post-incident merchant
        survey data from the data room.
      relatedQuestionRefs:
        - QU020

    - type: missing-source
      severity: material
      topic: competitive customer count benchmarking
      missingEvidence: >-
        Comparable disclosed customer counts, active user figures, or TPV benchmarks from Paystack,
        Interswitch, Lemfi, Chipper Cash, and Wise for Africa corridors to contextualise Flutterwave's
        290K→900K growth trajectory.
      whyItMatters: >-
        Without a competitive reference frame it is difficult to assess whether 900K businesses is a
        market-leading position or in line with peer platforms at similar funding stages.
      diligencePath: >-
        Research Paystack's post-Stripe acquisition customer count disclosures; review Interswitch IPO
        filings for active merchant data; request Chipper Cash or Lemfi user counts from public sources.
      relatedQuestionRefs:
        - QU014
        - QU017

    - type: missing-source
      severity: minor
      topic: stablecoin and open-banking customer adoption
      missingEvidence: >-
        Adoption data for the January 2026 stablecoin wallet (Turnkey partnership) and Mono open-banking
        integration among Flutterwave's existing merchant base.
      whyItMatters: >-
        If stablecoin and open-banking products are being adopted by existing merchants, they raise
        switching costs and improve retention. Without data the upsell contribution is speculative.
      diligencePath: >-
        Request merchant onboarding pipeline for stablecoin wallet and Mono API from the data room; track
        product launch announcements for any public adoption disclosures.
      relatedQuestionRefs:
        - QU023

    - type: missing-source
      severity: material
      topic: East Africa regulatory risk and merchant churn
      missingEvidence: >-
        Evidence of merchant churn, account losses, or revenue impact in Kenya and East Africa attributable
        to the 2022 ARA freeze and 2023 Football Technology court action.
      whyItMatters: >-
        Two separate regulatory freezes in Kenya over 12 months could have materially eroded Flutterwave's
        East African customer base. Without merchant-level data, the concentration risk from Kenya and
        broader East Africa cannot be quantified.
      diligencePath: >-
        Request Kenya merchant count before and after the 2022–2023 freeze period; confirm all frozen
        accounts were restored and no merchant relationship losses resulted; interview Kenyan partner banks.
      relatedQuestionRefs:
        - QU027
