    figureRefs:
      - FU002
      - FU003

  - id: s3
    title: 'Retention signals, geographic concentration, and growth trajectory'
    body: >-
      Flutterwave has processed $26B+ in total payment volume and 200M+ transactions across 34+ African
      countries and 30+ currencies as of early 2022 disclosures. These figures imply a substantial, multi-year
      base of recurring merchant customers, but no cohort data, NRR, GRR, churn rate, or NPS score has been
      publicly released. The 290K→900K merchant trajectory (~3× in ~12 months) provides a compelling adoption
      signal, but the denominator — total addressable African businesses — and the composition of the 900K
      figure (active vs. registered) are unknown.

      Geographically, Nigeria anchors Flutterwave's historical customer base as the company's founding market
      and primary early-growth engine. The 34+ country footprint represents significant diversification from a
      regulatory and currency perspective, but Nigeria likely still accounts for a majority of transaction
      volume given market size and first-mover advantage. No Nigeria-specific revenue breakdown has been
      disclosed. Two product expansions — the January 2026 stablecoin wallet launch for merchants and the Mono
      open-banking acquisition (all-stock) — suggest that Flutterwave is investing in retention through product
      depth rather than disclosed metrics. The stablecoin product targets existing merchants with a new
      settlement optionality; Mono's account connectivity tools offer enterprise customers API-level bank
      account analytics, creating potential for increased switching costs. No customer adoption data for either
      product was available as of the research date.
    claimRefs:
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
