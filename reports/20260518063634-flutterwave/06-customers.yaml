callouts:
  - calloutType: strength
    title: Uber enterprise anchor provides unique proof of global brand alignment
    body: >-
      Uber's direct testimonial — "Payments are central to Uber's magical experience. Flutterwave shares
      our commitment to customer centricity" — published on the developer portal is Flutterwave's strongest
      single piece of named customer proof. Uber operates in 70+ countries and processes billions in ride
      transactions; having Uber as a production payment partner in Africa validates Flutterwave's ability to
      meet enterprise-grade SLA, compliance, and integration requirements.
    claimRefs:
      - CU010

  - calloutType: risk
    title: Zero public retention or cohort data makes underwriting opaque
    body: >-
      Flutterwave has disclosed no NRR, GRR, churn rate, NPS score, or merchant cohort retention data from
      any public source. The 290K→900K growth narrative is compelling but unsupported by an active-user
      definition or segment breakdown. Three adverse incidents (Kenya freeze, 2023 hack, POS glitch) each
      froze customer accounts; their effect on merchant churn is entirely unknown. Investors cannot underwrite
      retention without data-room access.
    claimRefs:
      - CU021
      - CU025
      - CU031
      - CU032
      - CU033

  - calloutType: insight
    title: Three-times merchant growth in 12 months signals product-led virality
    body: >-
      The 290,000→900,000+ merchant trajectory (Series C to Series D, March 2021 to February 2022) represents
      approximately 3× growth in under 12 months. For reference, Paystack — Flutterwave's primary Nigerian
      competitor — reported ~60,000 businesses at the time of its Stripe acquisition (October 2020). While
      Flutterwave's definition of "businesses" may differ from Paystack's, the scale gap signals meaningful
      developer and SME adoption driven by API-first product design and aggressive market expansion.
    claimRefs:
      - CU001
      - CU002

acknowledgedWarnings:
