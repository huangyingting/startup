    rows:
      - - Nigeria home-market concentration
        - Concentration risk
        - High — majority of TPV likely still Nigeria-denominated given founding market and NGN rails dominance
        - 34+ country footprint and multi-currency API partially diversify away from single-market shock
        - Request Nigeria as % of TPV, merchants, and gross revenue from data room.
      - - East Africa regulatory freeze (Kenya)
        - Concentration risk / adverse
        - Medium — two separate Kenyan court actions (2022 ARA, 2023 Football Technology) froze accounts for 12+ months
        - ARA case withdrawn November 2023; Football Technology matter resolved separately
        - Confirm all Kenyan accounts restored; quantify merchant churn from the freeze period.
      - - Enterprise customer concentration
