      by other fetched sources: the US MTL count (SU008) is consistent with Series D coverage in SU002;
      the Send app corridors (SU009) are also referenced in TechCabal and CNBC profiles; and the 290K
      merchant figure (SU015) is cited in Series C press coverage at SU023. Removing these sources would
      not alter any high-confidence claims.

