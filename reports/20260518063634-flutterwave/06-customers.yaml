  - id: s4
    title: 'Adverse customer signals — fraud incidents, account freezes, and reputational impacts'
    body: >-
      Three material adverse events affected Flutterwave's customer base between 2022 and 2024. First, in 2022
      Kenya's Asset Recovery Agency froze accounts linked to Flutterwave entities, citing over $200M in
      suspicious transactions and potential money laundering across 10+ companies. Separately, a Kenyan court
      froze accounts linked to 2,468 complainants in the 86 Football Technology Ponzi scheme. Both Kenyan
      actions were eventually resolved: the ARA case was withdrawn in November 2023 with Flutterwave cleared,
      and the Football Technology matter was distinct from Flutterwave's core product. These events created
      prolonged uncertainty for merchants operating through Flutterwave-linked Kenyan accounts.

      Second, in February 2023 hackers transferred ₦2.9B from Flutterwave-linked accounts. The company
      obtained a court order freezing accounts across 27 Nigerian financial institutions. Critically, the
      freeze affected innocent third-party account holders who received funds through the breach — a pattern
      that creates direct customer harm and reputational damage beyond the initial security incident.

      Third, in October 2023 a technical glitch resulted in ₦19B ($24M) being transferred to approximately
      6,000 bank account holders across 35 institutions. Flutterwave obtained a Mareva injunction on
      February 1, 2024 to compel 35 institutions to share contact details of affected holders and facilitate
      recovery. The company stated no customer funds were lost, but the recovery process — requiring bank
      injunctions filed over three months after the incident — implies significant operational disruption for
      affected account holders. No public churn study, NPS impact assessment, or merchant survey has been
      released by the company following any of these events.
    claimRefs:
      - CU027
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
      - CU033
      - CU034
      - CU035

