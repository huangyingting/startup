  - id: s3
    title: Comparable Company Analysis and Multiple Benchmarking
    body: >
      The most defensible public comparable is dLocal (NASDAQ: DLO), which processes cross-border
      payments in Africa, Latin America, and Asia. dLocal's market capitalisation was approximately
      $1.5-2B in 2024-2025, with estimated annual net revenue of $300-400M and an implied EV/Revenue
      multiple of roughly 4-6x. Flutterwave and dLocal share the key characteristics that drive
      comparability: both operate in African and emerging-market corridors, both serve enterprise and
      SMB customers via API-based payment rails, and both face multi-currency regulatory complexity.
      At 4-6x applied to Flutterwave's analyst-estimated revenue of $260-520M, the implied valuation
      range is $800M-$2.4B, below the $3B last round. This is the central valuation tension.
      Adyen (AMS: ADYEN) is the most prominent global payment processor but trades at a structurally
      higher multiple (roughly 15-20x EV/Revenue in 2024-2025) reflecting its superior margin profile,
      established public-company track record, and global enterprise footprint. Adyen is best used as
      a bull-case ceiling: if Flutterwave successfully IPOs and demonstrates margin improvement, it
      could re-rate toward 10-12x over 3-5 years. Stripe's $65B 2024 tender valuation (down from $95B
      peak) anchors the private unicorn reference; Flutterwave's $26B TPV represents roughly 2.6% of
      Stripe's estimated $1T TPV. Network International (approximately GBP 1B acquisition by Brookfield,
      Middle East and Africa focused) and Interswitch (approximately $1B private, Nigeria-focused) provide
      regional anchors. Nuvei ($4B last valuation, global processor with smaller EM exposure) sits between
      Flutterwave and Adyen on the scale and geography spectrum. The comparable set collectively supports
      a base-case range of $1.5-2.5B for Flutterwave, with the upper bound anchored to a successful IPO
      premium and the lower bound to a distress scenario or forced down-round.
