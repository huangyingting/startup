  - id: s5
    title: Recommendation, Exit Readiness, and Final Diligence Asks
    body: >
      Recommendation: TRACK. Confidence: MEDIUM. Risk rating: HIGH. Valuation stance: STRETCHED at
      $3B; ATTRACTIVE at $1.5-2B. Flutterwave is a high-quality African fintech infrastructure
      franchise with a defensible regulatory moat, large and growing TAM, and credible IPO optionality.
      However, the $3B last-round valuation is not supported by current comparable-company multiples,
      and the absence of public financial disclosure makes underwriting impossible without a data room.
      A TRACK call positions an investor to move quickly if the entry price becomes attractive through
      a down-round, secondary sale at discount, or pre-IPO allocation at adjusted terms.
      Exit readiness is partial but improving. The April 2024 IPO signals have not been followed by a
      formal S-1 filing or exchange announcement as of May 2026. The CBN microlender license, Mono
      acquisition, and stablecoin wallet expansion are constructive for the IPO narrative, but the
      company needs a full year of clean regulatory record, audited financials, and a confirmed exchange
      to advance the process. Strategic M&A is an alternative exit if Flutterwave attracts interest from
      Mastercard, Visa, or a global tier-1 processor seeking African market share; the precedent
      (Stripe/Paystack at approximately $200M, 2020) implies a strategic acquirer would pay a control
      premium, but the last-round valuation compresses this option. Secondary market sales at a 20-40%
      discount to $3B would be the most near-term liquidity path.
      The diligence asks in TV006 represent the minimum information set needed to move from TRACK to BUY.
      The thesis-break triggers in TV005 define the conditions under which the call would shift to AVOID.
      TRACK is maintained as long as the company retains its license portfolio, continues its IPO
      preparation, and avoids a fourth material financial-control incident.
