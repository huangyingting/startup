        - Global with Europe primary
        - EUR 30B market cap (2024-2025)
        - EUR 1.6B net revenue est. 2024
        - 15-20x EV/Revenue
        - Bull-case ceiling only; Adyen has superior margin profile and public-company track record
      - - Stripe (private)
        - Global approx $1T TPV est.
        - $65B tender 2024, down from $95B peak
        - $3-4B revenue est. 2024
        - 16-22x EV/Revenue tender-implied
        - Order-of-magnitude larger; useful for TPV ratio benchmarking only
      - - Nuvei (TSX/NASDAQ NVEI)
