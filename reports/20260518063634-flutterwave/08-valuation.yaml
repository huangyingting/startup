  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: financial-statements
      missingEvidence: >-
        Flutterwave FY2022, FY2023, and FY2024 audited P&L, balance sheet, and cash-flow
        statements; confirmed net revenue, ARR, gross margin, EBITDA, and working-capital position.
      whyItMatters: >-
        Without audited financials, the revenue range has a $260M uncertainty band, the EV/Revenue
        multiple spans 5.8-11.5x at the $3B anchor, and the investment cannot be underwritten;
        the TRACK recommendation cannot be converted to BUY without this disclosure.
      diligencePath: >-
        Request full data room; require big-4 audit opinion as a condition of any investment;
        at minimum request management-confirmed FY2024 net revenue before any formal engagement.
      relatedQuestionRefs:
        - QV010
        - QV011
        - QV025

    - type: private-evidence-only
      severity: material
      topic: cap-table-preference-stack
      missingEvidence: >-
        Full pro-forma cap table, Series D liquidation preference terms, participation rights,
        anti-dilution features, and common-stock waterfall model at multiple exit prices.
      whyItMatters: >-
        Preference overhang could significantly reduce the economic value available to common
        equity holders in bear-case exit scenarios; the TRACK recommendation cannot confirm
        BUY until the waterfall is modelled.
      diligencePath: >-
        Legal review of the Series D term sheet; request a cap-table model with waterfall at
        $1B, $2B, $3B, and $5B exit prices; confirm any anti-dilution triggered by a down-round.
      relatedQuestionRefs:
        - QV025

    - type: missing-source
      severity: material
      topic: IPO-timeline-confirmation
      missingEvidence: >-
