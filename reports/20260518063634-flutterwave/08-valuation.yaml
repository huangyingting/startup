        Sourced from public market data for publicly listed or recently marked private payment processors
        with meaningful emerging-market or African exposure. Excludes pure-play consumer-wallet companies
        and domestic card issuers. Coverage is partial because several direct private comparables
        (Interswitch, Network International post-acquisition) do not have current public filings
        accessible. The partial coverage reflects genuine data availability constraints rather than
        selective exclusion.
    rows:
