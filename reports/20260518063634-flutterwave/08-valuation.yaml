        - Africa digital payments TAM growing at 20%+ CAGR
        - GSMA mobile money report; World Bank financial inclusion; Africa.com market data
        - Structural slowdown in smartphone adoption or regulatory fragmentation
      - - Thesis
        - Flutterwave holds a 34-country license moat that is expensive and slow to replicate
        - 900K+ business customers; 8 years to build; comparable Paystack acquired at far smaller scale
        - New Pan-African entrant with superior technology funded by Stripe or similar
      - - Thesis
        - 2026 catalysts expand revenue surface materially
        - Bloomberg microlender report; FintechFutures Mono acquisition; TechCabal stablecoin article
        - Catalysts fail to generate material revenue within 12 months post-announcement
      - - Thesis
