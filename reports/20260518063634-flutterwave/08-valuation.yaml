  - id: s4
    title: Scenario Analysis
    body: >
      The bull case requires three conditions to be simultaneously true: African digital payments CAGR
      remains above 18% through 2028, Flutterwave executes a successful IPO on a major exchange in
      2026-2028 at an IPO premium, and the CBN microlender and open-banking revenues materially expand
      the revenue multiple. Under these conditions, a revenue run rate of $400-600M and an 8-10x
      EV/Revenue multiple produce a $3.2-6B valuation range. Investors entering at $3B would earn a
      1.1-2x return before dilution. The bull case depends on IPO execution, which has been signalled
      but not confirmed.
      The base case reflects the current comparable-market evidence. Revenue of $300-450M at a 5-7x
      multiple yields $1.5-3B. Entry at the Series D price ($3B) would be approximately fair to
      slightly rich in this scenario; entry at $1.8-2B would provide meaningful upside to a successful
      IPO. The base case assigns 50% probability to an IPO in 2026-2028.
      The bear case triggers from adverse scenarios: a forced down-round if Flutterwave needs new
      capital, continued regulatory scrutiny in key markets, further fraud or security incidents that
      damage the enterprise brand, or multiple compression extending to 3-4x for late-stage private
      fintechs. Under these conditions, a $700M-$1.2B valuation range is plausible. Investors at $3B
      would face a 60-75% loss before any preference waterfall.
      The primary value drivers across scenarios are: (1) confirmation of revenue and ARR trajectory;
      (2) IPO timing and exchange selection; (3) regulatory clean record in Kenya and other strategic
      markets; (4) credit performance of the new microlending book; and (5) Mono integration delivering
      measurable open-banking revenue. Destroyers include: a fourth financial-control incident, an
      adverse CBN enforcement action, or failure to execute the IPO roadmap by 2028.
