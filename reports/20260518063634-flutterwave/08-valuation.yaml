      - - Network International (private Brookfield)
        - Middle East and Africa
        - GBP 1B acquisition 2023
        - $350M revenue est. 2022
        - 2-3x EV/Revenue acquisition
        - Moderate applicability; Africa/MENA B2B processor; acquisition context compresses multiple
