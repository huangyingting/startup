  - id: FE002
    title: Customer workflow / operating flow
    description: >
      Step-by-step transaction flow through Flutterwave's platform for an online merchant payment, from the
      customer initiating payment to merchant settlement. Illustrates the smart routing decision point and the
      multi-rail path to settlement.
    type: flow
    layout: standard
    summary: >
      A payment begins when the customer selects a payment method on the merchant checkout page. Flutterwave's
      smart routing engine evaluates available rails and selects the optimal path. The payment is processed
      through the chosen rail (card, mobile money, bank transfer, or USSD), confirmed, and the merchant
      receives settlement to their Flutterwave wallet and bank account.
    data:
      nodes:
        - id: customer-initiates
          label: Customer selects payment method at merchant checkout
          type: input
        - id: flutterwave-checkout
          label: Flutterwave Checkout SDK / API receives payment request
          type: process
        - id: smart-routing
          label: Smart payment routing engine selects optimal rail
          type: process
        - id: card-path
          label: Card network path (Visa / Mastercard)
          type: process
        - id: mobile-money-path
          label: Mobile money path (MTN MoMo / Airtel / M-Pesa)
          type: process
        - id: bank-transfer-path
          label: Bank transfer / USSD path
          type: process
        - id: transaction-confirmed
          label: Transaction confirmed; webhook sent to merchant
          type: process
        - id: merchant-settlement
          label: Funds settle to merchant Flutterwave wallet; disbursed to bank
          type: output
    approximationNotes: >
      Flow is based on official developer documentation describing the payment lifecycle. The specific
      routing criteria and weighting used by the smart payment routing engine are proprietary and not
      publicly disclosed. Settlement cycle timing (T+1, T+2, or real-time) varies by corridor and is
      not uniformly published.
