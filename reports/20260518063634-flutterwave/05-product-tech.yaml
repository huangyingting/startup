  - id: FE004
    title: Critical dependency map
    description: >
      Directed acyclic graph showing Flutterwave's critical external dependencies across payment rails,
      regulatory bodies, infrastructure partners, and acquired/integrated technology layers. Each node
      represents a dependency; edges represent reliance relationships. Risk concentrations are visible
      where multiple platform components depend on a single node.
    type: dag
    layout: wide
    summary: >
      Flutterwave's F4B core depends on Visa/Mastercard for card processing, MTN/Airtel for mobile money
      coverage, CBN and state-level US regulators for licence maintenance, and its cloud provider (undisclosed)
      for all infrastructure. Mono and Turnkey add new third-party dependencies with blockchain and open
      banking concentration risks.
