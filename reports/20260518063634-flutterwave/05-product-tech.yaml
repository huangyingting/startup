          type: input
        - id: bank-partners
          label: Nigerian and pan-African banking partners
          type: input
        - id: cbn-regulator
          label: CBN (Central Bank of Nigeria) — Switching, PSSP, IMTO licences
          type: input
        - id: us-regulators
          label: US state regulators — 13 MTLs in 29 states
          type: input
        - id: cloud-infra
          label: Cloud infrastructure provider (undisclosed) — multi-region
          type: input
