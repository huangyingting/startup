    layout: standard
    summary: >
      The Flutterwave F4B API platform sits at the centre of the architecture, receiving merchant and consumer
      requests and routing them through a smart payment ordering engine to the appropriate rail. Product modules
      (Checkout, Send, Store, Barter, Afritickets) connect inbound from the client layer. Rail providers
      (card networks, mobile money operators, banks, USSD) connect outbound. The Mono and stablecoin layers
      integrate into the core platform as recently added infrastructure nodes.
