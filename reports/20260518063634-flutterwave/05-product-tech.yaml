  - id: FE003
    title: Product maturity / capability map
    description: >
      Matrix mapping Flutterwave's product modules against five capability dimensions: API integration depth,
      payment method breadth, geographic coverage, regulatory compliance, and developer tooling maturity.
      Each cell is scored High/Medium/Low/Early based on available evidence.
    type: matrix
    layout: standard
    summary: >
      Checkout/Rave scores highest across all dimensions, reflecting its decade of production maturity. Send
      App is strong on compliance (US MTLs) but limited in geographic coverage. Mono and stablecoin score
      Early across most dimensions due to their 2026 launch stage. Store/Barter/Afritickets score medium on
      integration depth and low on developer tooling maturity.
    data:
      columns:
        - API integration depth
        - Payment method breadth
        - Geographic coverage
        - Regulatory compliance
        - Developer tooling maturity
      rows:
        - label: "Checkout (Rave)"
          values: ["High — v3/v4 APIs; 6-language SDKs; sandbox", "High — 15+ methods (card, MoMo, bank, USSD, VISA QR)", "High — 34+ African countries", "High — PCI-DSS; ISO 27001; CBN Switching Licence", "High — docs portal; quickstart; recipes; webhooks"]
        - label: "Send App"
          values: ["Medium — mobile app; limited B2B API surface", "Low — fiat corridors only; no stablecoin in Send flow", "Medium — US/Canada/UK origin; Nigeria + limited Africa", "High — 13 US MTLs; 29 states; IMTO licence Nigeria", "Low — consumer app focus; limited developer surface"]
        - label: "Store / Market"
          values: ["Low — no-code; no storefront management API", "Medium — inherits Checkout methods via embedded gateway", "Medium — global reach via Flutterwave payment acceptance", "Medium — inherits Checkout compliance; marketplace TBD", "Low — no public Store SDK; Checkout SDK embedded"]
        - label: "Mono (Open Banking)"
          values: ["Early — post-acquisition F4B integration in progress", "Early — A2A and bank data only; no card/MoMo direct", "Early — Nigeria 50+ banks; other markets unconfirmed", "Early — CBN open banking regulation; Mono licences TBC", "Early — Mono has own docs; F4B SDK exposure pending"]
        - label: "Stablecoin Wallets"
          values: ["Early — beta; limited merchant access; Turnkey infra", "Early — USDC/USDT only; Polygon network; Nuvion bridge", "Early — limited merchant set; Africa-wide rollout planned", "Early — stablecoin regulation in Africa uncertain", "Early — no public SDK; Turnkey docs; integration TBD"]
        - label: "Barter (Virtual Cards)"
          values: ["Medium — card-issuing API; virtual USD/GBP issuance", "Low — card-based outbound only; not inbound acceptance", "Medium — usable globally (Visa/Mastercard)", "Medium — PCI-DSS implied; card scheme rules apply", "Low — limited public developer documentation"]
        - label: "Afritickets"
          values: ["Low — embedded Flutterwave ecosystem; standalone API", "Medium — inherits Checkout payment methods", "Medium — African events; geographic scope undisclosed", "Medium — inherits Checkout compliance", "Low — no dedicated developer SDK or public API docs"]
    approximationNotes: >
      Maturity scores are qualitative assessments based on publicly available developer documentation,
      press releases, and official product pages. "High" indicates documented, production-grade capability
      with public evidence; "Medium" indicates confirmed existence with partial documentation; "Low"
      indicates confirmed existence but limited public developer surface; "Early" indicates announced or
