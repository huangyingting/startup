chapter:
  number: 5
  title: Product & Technology
  summary: >
    Flutterwave's product portfolio is built around an API-first payment infrastructure platform, Flutterwave for
    Business (F4B), which enables merchants and developers to accept and disburse payments across 34+ African
    countries and globally. The core Checkout (Rave) gateway is the most mature product, processing 500,000+
    payments per day with smart payment routing across 15+ payment methods. Surrounding the gateway are five
    adjacent modules — Send App (remittance), Store (no-code e-commerce), Barter (virtual cards), Afritickets
    (ticketing), and Market (marketplace) — each at varying maturity stages. Two capabilities launched in January
    2026 materially extend the stack: the Mono open banking acquisition (50+ bank connections for A2A payments
    and identity verification, ~$25–40M all-stock) and the Turnkey/Nuvion stablecoin wallet partnership (USDC/USDT
    embedded wallets, initially beta). Technical infrastructure is cloud-based and multi-region; SDKs cover six
    languages (Node.js, PHP, Python, iOS, Android, React Native); and the developer portal at
    developer.flutterwave.com maintains concurrent v3 and v4 API documentation. Security certifications (PCI-DSS,
    ISO 27001) and the CBN Switching and Processing License underpin regulatory credibility, but two material
    security incidents — the 2023 ₦2.9B unauthorized transfer hack and the 2023/2024 ₦19B POS technical glitch —
    expose operational risk in the transfer and POS subsystems. Key technical diligence gaps include undisclosed
    cloud topology, routing algorithm efficacy, Mono's multi-market bank coverage, stablecoin rollout timeline,
    penetration-testing records, and independent security audit reports.

sections:
  - id: s1
    title: Product Portfolio and Customer Workflow Context
    body: >
      Flutterwave for Business (F4B) is an API-first payment platform that enables businesses of all sizes to
      accept and disburse payments across Africa and globally. The platform is structured around five principal
      product modules — Checkout (Rave), Send App, Store, Barter, and Afritickets — each targeting a distinct
      customer workflow: merchant payment acceptance, cross-border diaspora remittance, no-code e-commerce
      storefront creation, virtual card issuance for international purchases, and event ticketing respectively.
      Two capabilities in active expansion round out the portfolio as of early 2026: the Mono open banking layer
      (acquired January 2026) and stablecoin wallets via the Turnkey/Nuvion partnership (launched in beta,
      January 2026). The platform serves 900,000+ business customers across 34+ countries.

      For a Nigerian e-commerce merchant, the typical workflow begins with API or SDK integration of the Checkout
      product. Once live, Flutterwave's smart payment ordering system dynamically selects the optimal payment rail
      — from among cards, bank transfers, mobile money (MTN MoMo, Airtel, M-Pesa), USSD, VISA QR, and others —
      to maximise success rate and minimise cost. Settlement flows through the merchant's Flutterwave dashboard
      and is disbursed to their bank account on the settlement cycle. For a diaspora consumer, the Send App
      provides a parallel workflow: download the iOS/Android app, authenticate, specify amount and recipient
      country, and execute a remittance from the US, Canada, or UK to an African destination. The Store product
      serves micro-merchants and creators who lack engineering resources; setup takes minutes, products list
      automatically on Flutterwave Market, and payments are accepted across all supported methods.
