company:
  name: Flutterwave

chapter:
  number: 7
  title: Risks
  summary: >-
    Flutterwave carries six interlocking risk categories that investors must weight against its $26B+
    TPV growth narrative. The single most acute risk is Kenya's Central Bank of Kenya (CBK) license —
    which Flutterwave has not yet obtained as of May 2026 despite operating there since at least 2020,
    having its accounts frozen twice by the Asset Recovery Agency (ARA, 2022-2023), and having the CBK
    formally direct banks to stop dealings in 2022. A $50M investment commitment is conditional on
    licensing, and the CBK governor's June 2024 comments confirm the regulatory pathway remains unclear.
    Operationally, two material security incidents within 12 months — a ₦2.9B ($3.7M) unauthorized
    transfer (February 2023) and a ₦19B ($24M) POS technical glitch (October 2023) — exposed inadequate
    internal controls that no disclosed post-incident audit has remedied. Financially, the company has
    not raised equity since its $250M Series D (February 2022); with late-stage African fintech
    valuations broadly compressed 30-60% from 2021-2022 peaks and an IPO announced in April 2024 but
    without a firm timeline, funding risk is material. Currency risk is structural: the Nigerian naira
    devalued over 40% in 2023, directly eroding USD-equivalent TPV and revenue. Key-person concentration
    in CEO Olugbenga Agboola — who drives regulatory approvals, investor relations, and flagship
    partnerships — is unhedged by any disclosed succession plan. The chapter identifies three
    kill-criterion risks (Kenya CBK license denial, third major security incident, and 48+ months
    without liquidity event) and maps 14 monitorable thresholds to investment-decision triggers.

sections:
  - id: s1
    title: Regulatory and legal risk — licenses, court proceedings, and enforcement
    body: >-
      Flutterwave's most existential regulatory exposure is in Kenya. The Central Bank of Kenya (CBK)
      has not issued Flutterwave a payment services license as of May 2026. In 2022, the CBK formally
      directed local banks and financial institutions to cease dealings with Flutterwave on grounds
      that it was operating without authorization. That directive forced Flutterwave's CEO, Olugbenga
      Agboola, to travel to Nairobi in early 2023 to engage the regulator and unblock operations. In
      June 2024, the CBK governor confirmed to TechCabal that Kenya is still in the process of revising
      its National Payment Systems Act and that the pathway for fintechs like Flutterwave to obtain
      licenses remains unclear. A reported $50 million investment commitment from a separate investor is
      conditionally tied to license issuance, creating a circular dependency between regulatory approval
      and growth capital.

      The Asset Recovery Agency (ARA) of Kenya froze over $52 million in Flutterwave accounts in July
      2022, alleging money laundering and card fraud. A Kenyan court released those funds in February
      2023 after the ARA withdrew its case. In September 2022, the ARA froze an additional $3.3 million.
      In June 2023, a separate Nairobi court froze 45 Flutterwave accounts linked to 2,468 investors
      who claimed losses in the 86 Football Technology Ponzi scheme. All Kenya-related proceedings were
      ultimately resolved in Flutterwave's favor in November 2023, when the court granted the ARA's
      motion to withdraw its case. Rest of World's contemporaneous investigative reporting identified
      connections between Flutterwave counterparties (including Berrywood Capital, partly co-owned by
      the CEO) and companies flagged by the ARA — connections Flutterwave did not publicly address.

      In Nigeria, Flutterwave obtained a CBN Switching and Processing License in September 2022 — the
      CBN's most rigorous payment license category — and an additional CBN microlender license in April
      2026. The CBN licensing record is strong, though ongoing supervisory obligations require a
      dedicated regulatory affairs function. In the United States, Flutterwave holds money transmission
      licenses in 29 states after securing 13 new licences in January 2024. Twenty-one states remain
      uncovered, preventing nationwide service. Ghana coverage is solid following a Bank of Ghana payment
      license. The European Union and United Kingdom present unresolved GDPR and UK GDPR exposure via the
      Send remittance app's EU/UK diaspora corridors; no public data protection agreement, ICO filing,
      or processor registration has been disclosed.
