  - id: s2
    title: Operational and cybersecurity risk — fraud incidents, infrastructure, and account controls
    body: >-
      Flutterwave experienced two material security and operational incidents within a twelve-month
      period, which collectively exposed approximately $28 million and raised unresolved questions about
      the adequacy of the platform's fraud controls. In February 2023, approximately ₦2.9 billion
      ($3.7 million) was transferred out of Flutterwave-linked accounts without authorization. Flutterwave
      denied a hack and stated no customer funds were lost, but it simultaneously obtained an ex-parte
      court order freezing accounts at 27 Nigerian financial institutions — a contradiction that TechPoint
      and TechCabal noted in contemporaneous coverage. The company's legal counsel blamed commercial banks
      for widening the money trail due to delays in obtaining the freeze order.

      In October 2023, a technical glitch caused approximately ₦19 billion ($24 million at the prevailing
      exchange rate) to be distributed across approximately 6,000 bank account holders at 35 financial
      institutions. In February 2024, Flutterwave obtained a Mareva injunction compelling the 35 institutions
      to provide contact details to facilitate recovery. The company again stated no customer funds were
      permanently lost. No post-incident root-cause analysis, independent security audit, or SOC 2/ISO 27001
      certification has been publicly disclosed for either event. The EFCC partnership for a
      consortium-led cybercrime research center, announced on Flutterwave's blog, represents a proactive
      mitigation signal but is not a substitute for technical controls evidence.

      Infrastructure risk is harder to evaluate: Flutterwave is a cloud-hosted platform with test and live
      API environments, but no public SLA, uptime commitment, or disaster recovery documentation has been
      published. African internet infrastructure — particularly in Nigeria, Kenya, and Ghana — is subject
      to intermittent disruptions that can materially impair payment processing. The Rave legacy product
      and the newer checkout integration surface expand the attack surface without any disclosed penetration
      testing cadence. Two incidents in twelve months at the scale described are a yellow flag for any
      investor underwriting Flutterwave's compliance and technology risk profile.
