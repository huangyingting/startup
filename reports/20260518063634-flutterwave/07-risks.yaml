    - type: private-evidence-only
      severity: blocking
      topic: post-incident security audit for 2023 fraud and POS glitch events
      missingEvidence: >-
        No public SOC 2 Type II report, ISO 27001 certificate, independent penetration test summary,
        or root-cause analysis has been published for either the February 2023 unauthorized transfer
        or the October 2023 POS glitch. Flutterwave's EFCC partnership does not constitute a technical
        security certification.
      whyItMatters: >-
        Two incidents in 12 months with combined exposure of ~$28M constitute a material pattern risk.
        Without independent assurance, investors cannot evaluate whether controls have been strengthened
        or whether a third incident is likely within the risk horizon.
      diligencePath: >-
        Request from data room: (1) SOC 2 Type II report for the most recent 12-month audit period;
        (2) root-cause analysis for both 2023 incidents; (3) internal controls self-assessment; (4)
        any EFCC audit output; (5) insurance coverage for cyber/fraud losses.
      relatedQuestionRefs:
