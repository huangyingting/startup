  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold / event
      - action implication
    rows:
      - - Kenya CBK license denial (Kill Criterion 1)
        - CBK issues formal rejection of license application or publicly clarifies Flutterwave cannot operate under revised NPS Act
        - Rejection letter or CBK press statement; no alternative regulatory pathway communicated within 90 days
        - "Thesis break: East Africa revenue stream eliminated; license risk contagion to other frontier markets; require immediate commercial re-scoping"
      - - Third major security or fraud incident (Kill Criterion 2)
        - Third incident of >$5M unauthorized transfer or platform failure within 12 months of the October 2023 POS glitch
        - Public disclosure, court filing, or credible press report of new incident
        - Pause due diligence; require independent security audit (SOC 2 or equivalent) completed and findings reviewed before any closing
      - - No equity raise or IPO by February 2026 (Kill Criterion 3)
        - Flutterwave fails to close Series E, complete IPO, or execute secondary sale within 48 months of Feb 2022 Series D
        - February 2026 passes with no liquidity event; any bridge financing at punitive terms
        - Require current burn rate, runway, and bank balance disclosure; assess whether dilutive down-round risk impairs investor economics
      - - CEO departure or incapacitation
        - Olugbenga Agboola announces departure, extended leave, or material reputational event affecting regulatory relationships
        - Public announcement or credible press report confirmed by third-party source
        - Downside protection required; re-underwrite all CEO-dependent regulatory approvals (especially Kenya CBK) and flagship partnerships; require board succession plan before closing
      - - NGN:USD rate exceeds 2,000:1
        - CBN published market rate falls below ₦2,000 per US dollar
        - "CBN published market rate: ₦2,000/USD or worse"
        - Rebuild financial model under new FX assumption; recalculate USD-equivalent TPV and gross margin contribution of Nigerian operations; assess whether unit economics remain viable at 2,000:1
    notes: >-
      Kill Criterion 3 threshold (48 months from Feb 2022 Series D) was technically reached in February
      2026. As of the run date (May 2026) no liquidity event has been publicly confirmed. This row should
      be treated as a live monitoring item. All threshold values are expressed in measurable, observable
      terms; no subjective qualitative judgement is required to trigger the action implication.
