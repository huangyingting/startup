    - type: private-evidence-only
      severity: material
      topic: burn rate, runway, and current financial position
      missingEvidence: >-
        No public disclosure of Flutterwave's burn rate, runway, cash or cash-equivalent position,
        EBITDA margin, net revenue, or unit economics since the Series D in February 2022. Without
        audited financials, the urgency of the next financing event cannot be independently assessed.
      whyItMatters: >-
        A company that has not raised equity in 3+ years and has not confirmed an IPO timeline carries
        undisclosed financing risk. If runway is constrained, employees face liquidity pressure; bridge
        financing on punitive terms could impair investor economics; and a forced IPO in a down market
        would compress exit multiples for all stakeholders.
      diligencePath: >-
        Request from data room: (1) audited financial statements for FY2022, FY2023, FY2024, FY2025;
        (2) monthly burn rate and runway in months; (3) current cash position and any bridge or
        convertible notes outstanding; (4) gross margin and take-rate by geography and product.
      relatedQuestionRefs:
