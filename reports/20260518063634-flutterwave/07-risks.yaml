        - QR023
        - QR024

    - type: missing-source
      severity: material
      topic: GDPR / UK GDPR compliance programme and ICO registration
      missingEvidence: >-
        No public evidence of GDPR data protection impact assessment, ICO (UK Information Commissioner's
        Office) registration, EU data processor agreement with partner banks, or privacy policy addressing
        GDPR subject rights for EU/UK-based Send app users.
      whyItMatters: >-
        The Send remittance app processes personal data (PII, financial transaction data) for individuals
        in the EU and UK. GDPR non-compliance could expose Flutterwave to fines of up to 4% of global
        annual revenue or EUR 20 million — whichever is higher. The UK ICO has separately enforced GDPR
        on non-UK companies processing UK-resident data.
      diligencePath: >-
        Request from data room: (1) GDPR DPA (Data Processing Agreement) with EU/UK banking partners;
        (2) ICO registration number if processing UK data; (3) privacy policy confirming GDPR-compliant
        data retention and deletion practices; (4) any EU supervisory authority correspondence.
      relatedQuestionRefs:
