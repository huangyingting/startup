  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: CBK license application status and correspondence
      missingEvidence: >-
        No public access to Flutterwave's formal CBK license application, CBK response letters,
        or any written timeline for approval under the revised National Payment Systems Act. The
        CBK governor's June 2024 public remarks are the most recent authoritative signal, but they
        do not confirm Flutterwave's application status, pending conditions, or fee structure.
      whyItMatters: >-
        The Kenya CBK license is the chapter's primary kill criterion. Without written confirmation
        of application status, investors cannot assess the probability or timeline of resolution.
        A formal rejection would trigger a fundamental thesis re-evaluation.
      diligencePath: >-
        Request from Flutterwave data room: (1) copy of CBK license application; (2) all CBK
        correspondence since 2022; (3) any conditional approval terms; (4) confirmation of whether
        the revised National Payment Systems Act creates a clear pathway.
