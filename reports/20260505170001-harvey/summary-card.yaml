summary:
  headline: >-
    Harvey is the defining legal AI franchise at an aggressive but potentially defensible $11B valuation — with elite
    customer anchors, deepening data moats, and a credible path to $1B+ ARR, but meaningful dependency, audit, and
    multiple-compression risks.
