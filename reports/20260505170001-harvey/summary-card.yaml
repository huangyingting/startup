  topStrengths:
    - >-
      Elite customer anchor base (Am Law 10 + Magic Circle + Big Four) creates durable social proof and high switching
      costs via Harvey Knowledge's firm-specific legal data personalization.
    - >-
      Harvey Knowledge's proprietary corpus of firm-specific work product and know-how represents a genuine 12-24 month
      data moat that deepens with each engagement year.
    - >-
      Legal AI TAM is large ($50B+ globally) and structurally underserved; Harvey is first to crack the trust and
      compliance requirements that blocked prior SaaS entrants.
  topRisks:
    - >-
      Structural dependency on OpenAI for frontier model capability creates single-point-of-failure risk if OpenAI
      pivots pricing, restricts access, or becomes a direct competitor through its own legal products.
    - >-
      No audited financials are publicly available; all ARR and margin estimates are analyst-derived and could
      materially misstate actual economics, especially given unclear cost-of-revenue structure.
    - >-
      At $11B valuation with estimated $150M ARR, Harvey trades at approximately 73x ARR — requiring sustained
      hyper-growth (60-85% CAGR) and margin expansion to eventually justify the entry price, with limited margin for
      error.
  unresolvedGaps:
    - >-
      Audited revenue, gross margin, net burn, and ARR growth rate remain non-public; all financials are third-party
      estimates.
    - >-
      Full commercial terms of the OpenAI partnership — pricing, exclusivity, model access rights, and any
      right-of-first-refusal — are not disclosed.
    - Preference stack, liquidation rights, ratchets, and secondary mechanics for the $11B financing are not public.
    - >-
      Regulatory trajectory for generative AI in legal proceedings remains uncertain; several jurisdictions are
      developing bar rules that could restrict or mandate AI disclosure by practitioners.
