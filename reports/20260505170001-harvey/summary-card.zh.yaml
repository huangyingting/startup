summary:
  headline: Harvey 是法律 AI 的定义性资产，$11B 估值激进但可能站得住；它有顶级客户锚点、不断加深的数据护城河和通往 $1B+ ARR 的可信路径，但依赖、审计和倍数压缩风险都不轻。
