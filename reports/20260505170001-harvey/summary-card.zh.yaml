summary:
  headline: Harvey 是定义法律 AI 的核心 franchise，$11B 估值激进但可能说得通：顶级客户锚定、数据护城河加深，并有可信路径冲到 $1B+ ARR；但模型依赖、审计缺口和倍数压缩风险都不轻。
