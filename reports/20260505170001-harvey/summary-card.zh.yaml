  topStrengths:
    - 顶级客户锚（Am Law 10 + Magic Circle + Big Four）提供耐久社会证明；Harvey Knowledge 的律所专属法律数据个性化，也抬高了切换成本。
    - Harvey Knowledge 的专有语料库沉淀了律所专属工作成果和 know-how，形成真实的 12-24 个月数据护城河，并会随每一年的客户合作继续加深。
    - 法律 AI TAM 很大（全球 $50B+），且结构性供给不足；此前 SaaS 进入者卡在信任和合规门槛上，Harvey 是第一个打穿的公司。
  topRisks:
    - 前沿模型能力结构性依赖 OpenAI，一旦 OpenAI 调整定价、限制访问，或用自有法律产品直接竞争，就会形成单点失效风险。
    - 没有公开经审计财务；所有 ARR 和利润率估计都来自分析师，可能明显误判真实经济性，尤其是在收入成本结构不清的情况下。
    - 在 $11B 估值和估计 $150M ARR 下，Harvey 约按 73x ARR 交易；要最终证明入场价格合理，必须持续超高速增长（60-85% CAGR）并扩大利润率，容错空间很小。
  unresolvedGaps:
    - 经审计收入、毛利率、净烧钱速度和 ARR 增速仍未公开；所有财务数据都是第三方估计。
    - OpenAI 合作的完整商业条款——定价、排他性、模型访问权和任何优先购买权——均未披露。
    - $11B 融资的优先股堆叠、清算权、ratchet 和老股机制未公开。
    - 生成式 AI 在法律程序中的监管路径仍不确定；多个司法辖区正在制定律师协会规则，可能限制从业者使用 AI，或强制披露 AI 使用。
