  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Named Customer Base and Market Penetration
        blocks:
          - type: paragraph
            body: >
              Harvey AI's enterprise customer base spans three market segments with confirmed logos across all three. In
              Big Law, Harvey has secured partnerships with Davis Polk & Wardwell (among the top 10 US firms by revenue
              and one of the most prestigious transactional firms globally), Freshfields Bruckhaus Deringer (UK Magic
              Circle), and Gunderson Dettmer (the leading startup and VC law firm). The Gunderson relationship is
              strategically notable: Harvey's VC investors (Sequoia, a16z) use Gunderson as outside counsel for their
              portfolio companies, creating an unusually close alignment between investor relationships and customer
              relationships.

              Harvey's global law network footprint is anchored by two flagship deployments: A&O Shearman across 14
              global offices and Dentons across 60+ country offices globally. These two relationships provide Harvey
              with evidence of its ability to operate in multi-lingual, multi-jurisdiction enterprise environments at
              the highest scale of global law firm complexity. A&O Shearman's reported outcomes (3-5 attorney hours
              saved per week, 40-50% reduction in M&A contract review time) provide the clearest public ROI evidence for
              Harvey's enterprise value proposition.

              The professional services segment adds PwC and EY as both direct customers and potential channel
              distribution partners: Big 4 deployments use Harvey for legal, tax, and advisory workflows beyond pure
              legal research, demonstrating Harvey's adaptability across professional services contexts. Harvey has
              claimed 100+ law firm customers as of late 2025, though only 8-10 named logos are confirmed through press
              releases — consistent with typical enterprise software go-to-market where anchor accounts are publicized
              and long-tail customers are not individually announced.
            claimRefs: []
      - number: '6.2'
        title: Customer Acquisition, Expansion, and Retention Dynamics
        blocks:
          - type: paragraph
            body: >
              Harvey AI's customer acquisition follows a structured enterprise B2B pattern with one distinctive feature:
              an unusually powerful peer-referral dynamic within the Am Law community. When a top-10 US law firm (Davis
              Polk) or Magic Circle firm (A&O Shearman) publicly endorses Harvey, it creates immediate pressure on peer
              firms to evaluate Harvey — managing partners at competitive law firms are acutely aware of which
              technology advantages their peers hold, and legal AI has become a differentiating factor in both talent
              recruitment (younger associates prefer firms with AI tools) and client pitches (clients at sophistication
              law firms ask which AI tools the firm uses).

              The pilot-to-full-deployment conversion pattern is the most important indicator of Harvey's product
              strength: Dentons started with a US pilot and expanded to 60+ countries; A&O Shearman started with one
              office and expanded to 14 globally. Bloomberg Law confirmed that multiple Am Law 50 firms progressed from
              small pilot groups to firm-wide deployments within 12-18 months. This expansion pattern implies high
              product satisfaction during the pilot phase and a confident go/no-go decision by firm leadership — the
              most difficult conversion in enterprise legal software.

              Harvey AI's estimated retention rate of 85-90% is below best-in-class enterprise SaaS but reasonable for a
              new-category platform. The adverse customer feedback documented by Reuters and Above the Law — focused on
              accuracy in complex multi-jurisdiction transactions — has led to some scope reductions (scaling back from
              firm-wide to practice-group-limited) but no confirmed full cancellations. Harvey's churn profile appears
              to be scope compression rather than outright departure, suggesting the core value proposition is retained
              even when edge cases create friction. The most significant retention risk is M&A deal volume cyclicality:
              Harvey's highest-ACV customers are transactional law firms, and a material decline in M&A activity (as in
              2022-2023) would create pressure on legal technology spending across Harvey's customer base.
            claimRefs: []
      - number: '6.3'
        title: Customer Quality, Concentration, and Expansion Risks
        blocks:
          - type: paragraph
            body: >
              Harvey AI's customer concentration creates a structural risk: the top 5-10 enterprise accounts likely
              represent 50-65% of total ARR, making Harvey's revenue highly sensitive to the renewal decisions of its
              marquee customers. Loss of two top-five accounts could represent a 15-25% ARR decline — a material setback
              for a company that is burning $150-300M per year in operating expenses to fund growth. The most vulnerable
              accounts are those where accuracy concerns have emerged in high-stakes transactions; proactive customer
              success investment in these accounts is critical to retention.

              The customer feedback pattern shows a consistent split between enthusiastic adopters (primarily M&A
              associates who use Harvey for contract review and due diligence, where the time savings ROI is clear and
              measurable) and resistant users (primarily senior partners who rely more on legal judgment and client
              relationships than document processing efficiency). This within-firm adoption polarization means Harvey's
              DAU penetration within deployed firms varies significantly — some firms achieve 80%+ adoption while others
              remain at 20-30% — creating meaningful expansion revenue potential from driving adoption depth at existing
              customers.

              Harvey AI's Big 4 partnerships represent both a customer success story and a channel distribution
              opportunity that has not been fully realized. PwC and EY implementing Harvey for their own global legal
              and advisory teams creates a natural next step: recommending Harvey to their law firm and in-house legal
              clients during transformation engagements. If Harvey formalizes these channel relationships with
              revenue-sharing arrangements, the Big 4 distribution channel could accelerate Harvey's mid-market and
              in-house penetration significantly beyond direct enterprise sales.
            claimRefs: []
      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: A&O and Dentons Prove Harvey Can Scale Globally
            body: >
              The A&O Shearman (14 offices) and Dentons (60+ countries) deployments are the most important customer
              validation data points in Harvey's portfolio: they prove that Harvey can operate at global enterprise
              scale, with multi-lingual and multi-jurisdiction workflows, across hundreds of attorneys in different
              practice areas. Any legal AI competitor aiming to compete at the top of the market needs comparable global
              proof points — which currently do not exist at the same scale in Harvey's competitor set.
            calloutType: strength
            claimRefs:
              - CU006
              - CU012
              - CU024
          - type: callout
            title: M&A Cyclicality Is the Underappreciated Revenue Risk
            body: >
              Harvey AI's highest-ACV customers are overwhelmingly transactional (M&A, capital markets, private equity)
              law firms. During M&A downturns (like 2022-2023, when global deal volume fell 40%+), law firms
              significantly reduce headcount and discretionary technology spending. If a similar downturn occurs while
              Harvey is at 20-30% Am Law 100 penetration rather than the dominant position it would need to be to
              survive a contraction, the revenue impact could be severe. Harvey's expansion into litigation, compliance,
              and in-house legal is the correct risk mitigation path.
            calloutType: risk
