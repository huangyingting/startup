  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Product Platform and Module Architecture
        blocks:
          - type: paragraph
            body: >
              Harvey AI has evolved from a single AI legal assistant into a multi-module enterprise platform spanning
              six core product lines. Harvey Assistant remains the entry point: a conversational AI interface that
              handles legal research, document summarization, contract drafting, regulatory analysis, and litigation
              preparation across five primary practice areas (M&A, litigation, compliance, corporate, and IP). The
              assistant is accessed via a web interface, through a Microsoft Word add-in that embeds AI assistance
              directly into document drafting, and via an Outlook integration for email-based legal queries.

              Harvey Vault extends the platform into document review and due diligence: attorneys can upload a deal room
              or matter file and perform AI-native contract review, clause extraction, risk flagging, and condition
              tracking against Harvey's standard positions library. Unlike traditional eDiscovery platforms (Relativity,
              Everlaw), Vault is purpose-built for transactional workflows rather than mass document production — a
              focused scope that enables higher accuracy in M&A and capital markets contexts.

              Harvey Knowledge adds firm-specific intelligence: it ingests a firm's proprietary precedent documents,
              internal memos, and research notes to create a private organizational memory layer. This enables queries
              like "what positions has our New York M&A team historically agreed to on material adverse change clauses?"
              — grounding AI output in firm-specific institutional knowledge rather than just general legal principles.
              This is Harvey's most defensible product from a competitive moat perspective, as each firm's Knowledge
              base becomes unique to them.

              Harvey Agents (launched October 2025) is the most significant product advancement: it enables autonomous
              multi-step workflows that can independently execute sequences of legal tasks — reviewing a set of
              agreements for regulatory flags, extracting specific clauses, comparing to standard positions, and
              generating a summary memorandum — without requiring attorney input at each step. Agents include audit
              trail logging that records every action taken, a critical feature for the legally accountable professional
              services environment where AI actions must be auditable.
            claimRefs: []
      - number: '5.2'
        title: Technology Architecture and Engineering Depth
        blocks:
          - type: paragraph
            body: >
              Harvey AI's technical architecture is a multi-model system built on top of OpenAI's GPT-4 family as the
              primary inference engine, supplemented by Anthropic Claude for tasks requiring long context windows, and
              increasingly augmented by Harvey's own purpose-built legal foundation models. CTO Gabriel Pereyra
              (ex-DeepMind, Google Brain) has invested significantly in proprietary model development since 2024, with
              The Information reporting in August 2025 that Harvey is building legal-domain foundation models to reduce
              OpenAI API dependency and improve accuracy on specialized tasks like contract clause extraction and legal
              citation verification.

              Harvey's domain fine-tuning on large legal corpora (contracts, case law, regulatory documents) produces
              meaningfully better performance on legal reasoning tasks than base GPT-4, as validated by improved
              performance on Stanford's LegalBench benchmark framework. The firm-level customization layer (Harvey
              Knowledge) adds a second layer of personalization that compounds over time as more attorneys use the
              system and contribute implicit feedback through usage patterns.

              The integration architecture (Harvey Ecosystem) embeds Harvey into enterprise legal technology: iManage
              and NetDocuments integrations ensure Harvey can access documents from firms' DMS without manual upload;
              Microsoft Word and Outlook add-ins reduce adoption friction by meeting attorneys in their primary work
              environments. This integration depth is a product advantage that generic AI tools lack and creates
              switching costs for firms that have integrated Harvey into their workflows.

              Harvey AI's security infrastructure — SOC 2 Type II certification, GDPR-compliant EU data residency,
              encrypted vector stores for Vault, and a strict no-training-on-customer-data policy — addresses the core
              concerns that initially made enterprise law firms hesitant to adopt AI. The firm deploys on AWS and Azure
              with data residency options for US, EU, and UK markets; the absence of fully on-premises deployment limits
              Harvey's addressable market for government legal departments and some European firms with strict data
              residency requirements.
            claimRefs: []
      - number: '5.3'
        title: Product Quality, Risks, and Competitive Position
        blocks:
          - type: paragraph
            body: >
              Harvey AI's quality framework includes citation verification, supervised review prompts for high-stakes
              legal conclusions, and audit trail logging for Agent actions — all designed to ensure attorney
              accountability is preserved even as the platform handles increasingly autonomous legal tasks. This design
              is structurally consistent with bar association guidance requiring attorney supervision of AI-generated
              work, which prevents Harvey from being used as a fully autonomous legal practitioner but is appropriate
              for the regulated professional services context.

              The most significant product risk is accuracy in high-stakes complex transactions. Reuters reported in May
              2025 that some law firms experienced accuracy issues in complex cross-border transactions, including
              incorrect citations and mischaracterized governing law provisions. Harvey responded with enhanced citation
              verification and human-in-the-loop confirmation prompts, but the underlying risk of LLM hallucination in
              legally consequential outputs remains a fundamental limitation of the technology that cannot be fully
              engineered away.

              Harvey AI's competitive position versus Thomson Reuters CoCounsel and LexisNexis Lexis+ AI is
              differentiated by reasoning depth and M&A workflow strength (Harvey advantages), while incumbents lead on
              live case law citation integration (Westlaw, LexisNexis databases) and regulated industry compliance
              workflows where deep database access is critical. Harvey's lack of native case law database integration is
              its most significant product gap relative to incumbents — one that can be addressed through partnerships
              or acquisition but requires effort.
            claimRefs: []
      - number: '5.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Harvey Knowledge Is the Deepest Competitive Moat
            body: >
              Harvey's firmographic personalization layer (Knowledge) is structurally the most defensible product
              element: once a firm has ingested years of its own precedents, memos, and internal research into Harvey
              Knowledge, replacing Harvey with a competitor requires re-creating that institutional memory elsewhere — a
              switching cost that increases with every query processed. No competitor currently offers equivalent
              firm-specific knowledge base customization at enterprise scale, giving Harvey a potential 2-3 year
              advantage in this dimension.
            calloutType: strength
            claimRefs:
              - CE001
              - CE021
              - CE025
          - type: callout
            title: OpenAI Dependency Is the Primary Technical Risk
            body: >
              Harvey AI's estimated 60-70% routing of model inference through OpenAI APIs creates a three-dimensional
              risk: (1) pricing risk — OpenAI can raise API prices, compressing Harvey's gross margin; (2) competitive
              risk — OpenAI is building its own enterprise legal AI products and may ultimately compete with Harvey
              directly; and (3) service disruption risk — a major OpenAI outage would incapacitate Harvey's core
              product. Harvey's investment in proprietary legal models is the correct strategic response, but model
              independence is 2-4 years away at current development velocity.
            calloutType: risk
