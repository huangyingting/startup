  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Harvey AI operates at the intersection of two of the most heavily regulated domains: artificial
              intelligence (increasingly regulated in EU, US, and UK) and legal practice (regulated by bar associations
              in every jurisdiction). The EU AI Act's potential classification of legal AI tools as 'high-risk AI
              systems' represents the most significant near-term regulatory burden: if Harvey must comply with mandatory
              conformity assessments, technical documentation requirements, and mandatory human oversight obligations
              for all EU deployments, this creates meaningful compliance cost and may delay product launches in EU
              markets. Harvey's UK Magic Circle customers (A&O, Freshfields) and global network customers (Dentons) are
              subject to both EU and UK regulatory frameworks simultaneously.

              The ABA's Formal Opinion 512 (2024) and state bar guidance from California, New York, and other major
              legal markets establishes a clear framework: attorneys bear personal responsibility for all AI-generated
              outputs and must supervise AI use consistent with their duty of competence. Harvey's design aligns with
              this framework (it requires attorney review of all outputs), but the growing number of attorney sanctions
              cases involving AI hallucinations (including the landmark Mata v. Avianca case) creates reputational
              overhang for all legal AI tools including Harvey. Any high-profile accuracy failure in a consequential
              case attributed to Harvey outputs could trigger industry-wide re-evaluation of legal AI adoption.

              Harvey AI faces no disclosed material legal proceedings as of May 2026. The legal risk register is based
              on systemic legal AI industry risk — AI training data copyright exposure, unauthorized practice of law
              risk in non-attorney contexts, GDPR compliance complexity for global deployments, and potential future FTC
              oversight of AI in legal services. Harvey's copyright risk from training data (analogous to cases against
              other AI companies) is a longer-term exposure that depends on how courts resolve the AI training data
              copyright debate currently proceeding through the courts.
            claimRefs: []
      - number: '7.2'
        title: Operational, Competitive, and Technology Risks
        blocks:
          - type: paragraph
            body: >
              Harvey AI's most acute operational risk is a high-profile accuracy failure: a publicly reported incident
              where Harvey-generated content caused a material error in a significant legal matter would trigger
              customer re-evaluation across the entire customer base simultaneously. Harvey's introduction of autonomous
              Agents workflows creates an elevated version of this risk — multi-step autonomous workflows that execute
              legal tasks without attorney input at each step introduce more complex failure modes than single-query AI
              assistance. The Agents product must be deployed with exceptional quality guardrails to prevent this
              scenario.

              The competitive risk landscape has three dimensions: (1) model commoditization — as foundation models
              improve, Harvey's fine-tuning advantage narrows; (2) incumbent response — Thomson Reuters committed $4.3B+
              to AI development and LexisNexis has comparable programs, both leveraging massive distribution advantages;
              and (3) big tech bundling — Microsoft Copilot for Legal could offer comparable AI legal capabilities
              bundled with Microsoft 365 at significantly lower incremental cost. Harvey's defense against all three is
              the Harvey Knowledge layer (firm-specific personalization), which creates switching costs that are hardest
              for commoditized or bundled alternatives to replicate.

              Harvey AI's cybersecurity posture is a critical operational risk factor: law firms are increasingly
              targeted by nation-state actors seeking legal intelligence (per CrowdStrike 2025), and a breach of
              attorney-client privileged communications stored in Harvey would be catastrophic for both the affected
              clients and Harvey's reputation. Harvey's SOC 2 Type II certification and encrypted vector stores provide
              meaningful baseline protection, but the security bar must continuously escalate as the threat landscape
              evolves.
            claimRefs: []
      - number: '7.3'
        title: Partner, People, and Execution Risks
        blocks:
          - type: paragraph
            body: >
              Harvey AI's OpenAI API dependency is its most structural risk: approximately 60-70% of Harvey's model
              inference routes through OpenAI, creating single-vendor concentration across pricing, service continuity,
              and competitive risk dimensions. Harvey's mitigation path — developing proprietary legal foundation models
              — is the correct strategic response but is 2-4 years from creating meaningful model independence. In the
              interim, Harvey is highly exposed to OpenAI's commercial decisions, including the potential for OpenAI to
              enter the legal AI market directly.

              Key person risk at Harvey AI is significant but manageable: CEO Winston Weinberg and CTO Gabriel Pereyra
              are the company's most critical personnel, but Harvey has built sufficient team depth (150-250 engineers)
              that the company would not immediately fail upon founder departure — the greater risk is the loss of
              confidence signals that founder continuity provides to large enterprise customers whose partnership
              decisions are partly based on relationship trust with Harvey leadership.

              Execution risk as Harvey expands beyond Big Law transactional work is material: the product is optimized
              for Am Law 100 M&A deployments, and expansion into litigation, government, in-house, and smaller law firm
              segments requires meaningful product and go-to-market adaptations. The mitigation for M&A cyclicality risk
              (expanding into less cyclical segments) is strategically correct but operationally complex, requiring
              Harvey to serve different customer profiles with different workflows, IT infrastructure, and price
              sensitivities simultaneously.
            claimRefs: []
      - number: '7.4'
        title: Exhibits
        blocks:
          - type: callout
            title: OpenAI Entry Is Harvey's Single Largest Existential Risk
            body: >
              Harvey's most critical risk is the scenario where OpenAI decides to compete directly in enterprise legal
              AI — packaging a Harvey-equivalent product into OpenAI Enterprise at  substantially lower cost. OpenAI
              already builds GPT models that power Harvey; entering  the legal market would remove Harvey's largest cost
              advantage (favorable API access) while leveraging OpenAI's existing enterprise sales relationships.
              Harvey's defense must rest on the Harvey Knowledge personalization layer, which OpenAI cannot replicate
              without the same firm-specific data — but this moat requires 12-24 months to establish at each customer.
            calloutType: risk
            claimRefs:
              - CR006
              - CR016
              - CR025
          - type: callout
            title: Data Breach Would Be Catastrophic and Irreversible
            body: >
              Unlike most SaaS security incidents, a data breach at Harvey AI exposing attorney-client privileged
              communications would not be recoverable through standard remediation. Attorney-client privilege is the
              foundation of the legal system's confidentiality guarantee; courts and bar associations would have no
              choice but to compel affected clients to disclose the breach to opposing parties in active litigation,
              creating litigation advantage for adversaries and professional misconduct inquiries for the attorneys at
              breached firms. Harvey's security investment must treat data breach prevention as an absolute priority,
              not just a compliance checkbox.
            calloutType: risk
            claimRefs:
              - CR005
              - CR011
              - CR014
