chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Founding
        blocks:
          - type: paragraph
            body: >
              Harvey AI Corporation is a San Francisco-based legal artificial intelligence company founded in late 2022
              by Winston Weinberg and Gabriel Pereyra. Weinberg brings rare founder-market fit as a former practicing
              attorney at Goldman Sachs with deep understanding of legal workflows; Pereyra brings frontier ML research
              expertise from Google Brain and DeepMind. Together, they form a leadership dyad uniquely credentialed to
              build AI for high-stakes legal environments where hallucination risk, privilege protection, and
              professional liability create procurement barriers that generalist AI tools cannot clear.

              Harvey's product is an AI platform built for legal and professional services firms. The platform
              encompasses six core modules: Harvey Assistant (AI chat for legal tasks), Harvey Vault (secure document
              storage and bulk analysis), Harvey Knowledge (legal research across case law, regulations, and tax
              domains), Harvey Workflow Agents (agentic multi-step task automation), Harvey Mobile (on-the-go access),
              and Harvey Ecosystem (integrations with iManage, Microsoft 365, Clio, HighQ, NetDocuments). The company
              launched Harvey Agents in 2025, marking a strategic transition from query-answer AI to full agentic legal
              workflow automation capable of planning, adapting mid-task, and interacting with attorneys to complete
              complex matters.

              Harvey AI received early backing from the OpenAI Fund in 2023, providing privileged access to GPT-4 before
              its public availability. Harvey has since developed a proprietary legal-domain training stack and
              citation-grounded response architecture designed for attorney-level accountability — differentiating from
              general-purpose LLMs that lack the hallucination safeguards and privilege protections required for
              professional legal work. The company is SOC 2 Type II certified and does not train on customer data.
            claimRefs: []
      - number: '1.2'
        title: Funding and Investor Backing
        blocks:
          - type: paragraph
            body: >
              Harvey AI's funding history is among the most aggressive in enterprise software: four major rounds in
              approximately 13 months, with valuation growing from $3B (February 2025) to $11B (March 2026) — a 3.7x
              increase driven by rapid ARR growth and expanding enterprise deployments. Total capital raised exceeded
              $1B as of March 2026, a landmark milestone for any legal technology company and a strong signal of
              investor conviction in the legal AI category.

              Sequoia Capital is the anchor investor, having co-led three rounds since the Series A. Sequoia partner Pat
              Grady acknowledged this as "an unusually large show of faith," reflecting deep conviction in Harvey's
              category leadership. The March 2026 round was co-led by GIC (Singapore's sovereign wealth fund), bringing
              international institutional capital and Asia-Pacific distribution access to Harvey's international
              expansion strategy. Other key investors include Andreessen Horowitz (led the $8B round), Kleiner Perkins,
              Coatue, Conviction Partners, Elad Gil, and the OpenAI Fund — the most elite investor constellation in
              enterprise AI outside of the foundation model companies themselves.

              The investor constellation creates three types of strategic value: (1) enterprise distribution networks
              through Sequoia, KP, and a16z portfolio relationships with major law firms and financial institutions; (2)
              AI model access and credibility through the OpenAI Fund strategic relationship; and (3) international
              expansion infrastructure through GIC's Asia-Pacific sovereign network.
            claimRefs: []
      - number: '1.3'
        title: Customer Base and Market Position
        blocks:
          - type: paragraph
            body: >
              Harvey AI has established itself as the leading enterprise legal AI platform with deployment across 100+
              law firms (company-claimed) as of 2025, including multiple Am Law 100 firms — the highest-revenue legal
              practices globally. Named anchor clients include A&O Shearman (merger of Allen & Overy and Shearman &
              Sterling, one of the world's largest global law firms), Davis Polk & Wardwell, Dentons, PwC, and EY. The
              geographic footprint spans US, EU, and Asia-Pacific through global firm partnerships.

              Harvey's Big Law penetration creates a powerful reference dynamic: as peer firms see competitors deploying
              Harvey, the switching cost argument inverts — firms that do NOT adopt AI risk being outperformed in
              efficiency, cost, and client service quality. This peer-pressure adoption mechanism is analogous to how
              Salesforce captured enterprise CRM or how GitHub captured enterprise engineering. McKinsey estimates AI
              could automate 20-40% of attorney hours in standard legal tasks, generating $50,000-$200,000 per attorney
              per year in productivity value at Big Law billing rates.

              The enterprise market dynamics are further amplified by the economics of law: partners billing
              $1,000-$2,000+ per hour mean that even modest productivity gains — two to three hours saved per attorney
              per day — generate $500K-$1M+ annual value per senior associate. Harvey's ROI proposition is therefore
              economically compelling without requiring large-scale workforce reduction, making it an easier enterprise
              procurement decision than traditional cost-cutting technology.
            claimRefs: []
      - number: '1.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 3.7x Valuation in 13 Months Signals Category-Defining Position
            body: >
              Harvey AI's progression from $3B to $11B in approximately 13 months (February 2025 to March 2026) is one
              of the most aggressive valuation escalations in enterprise software history. Unlike many AI startups that
              raise at inflated multiples, Harvey's repeat investors (Sequoia co-led three rounds) suggests the growth
              is grounded in genuine ARR momentum. The GIC sovereign wealth fund co-investment at $11B is particularly
              significant — institutional capital of this type typically requires revenue performance that justifies the
              entry price, not just growth potential.
            calloutType: strength
            claimRefs:
              - CO003
              - CO004
              - CO027
          - type: callout
            title: Winston Weinberg's Legal Background Is a Core Moat
            body: >
              Most AI companies building for legal are founded by engineers or product managers who learned legal domain
              from the outside. Winston Weinberg's background as a practicing Goldman Sachs attorney provides Harvey
              with an unusual founder-market fit: direct understanding of what attorneys need, what they fear
              (malpractice, privilege breach), and how legal workflows actually work. This insider perspective has
              shaped Harvey's privilege-protective architecture and its citation-grounded response system — features
              that drive enterprise trust in a market where trust is the primary purchasing criterion.
            calloutType: strength
            claimRefs:
              - CO011
              - CO017
              - CO010
          - type: callout
            title: ABA and Regulatory Uncertainty Is a Real Risk
            body: >
              The legal AI market faces meaningful regulatory risk: ABA Formal Opinion 512 (2024) addresses
              confidentiality in AI tool usage but does not comprehensively resolve issues like attorney competence
              obligations, unauthorized practice of law, or hallucination liability. As Harvey's agentic products move
              toward automated legal work product (not just assisted drafting), state bar associations may impose new
              requirements that increase Harvey's compliance costs or restrict certain automated workflows. Harvard Law
              Review (2025) flagged hallucination liability and unauthorized practice as the two most significant
              regulatory exposure areas for legal AI platforms.
            calloutType: risk
            claimRefs:
              - CO019
              - CO025
              - CO021
