  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Harvey AI operates in a competitive landscape best understood across three tiers: incumbent legal data
              providers, AI-native legal platforms, and general-purpose AI alternatives.

              **Tier 1 — Incumbents (Most Dangerous)**: Thomson Reuters (CoCounsel, powered by Casetext) and LexisNexis
              (Lexis+ AI) are Harvey's most dangerous competitors because they combine 150+ year legal database moats
              with AI overlays and existing law firm relationships. Thomson Reuters generates $1.8B+ in legal segment
              revenue annually from Westlaw subscriptions and has deployed CoCounsel across "thousands of law firms"
              since its 2023 launch. LexisNexis's Lexis+ AI integrates AI with 250M+ legal documents. Neither company
              can be dismissed as a legacy incumbent — both are making billion-dollar investments to compete directly in
              the AI-native legal market.

              **Tier 2 — AI-Native Competitors (Niche Specialists)**: Luminance AI (contract review, ~$1B valuation),
              Ironclad (contract lifecycle management, B2B corporate), Spellbook (contract drafting, SMB-focused), and
              Kira/Litera (document review) compete in specific verticals Harvey has addressed but not dominated. These
              players are less threatening to Harvey's Big Law enterprise position but could become acquisition targets
              or funding magnets that bring resources into the space.

              **Tier 3 — General-Purpose AI (Disruptive Threat)**: Microsoft 365 Copilot, ChatGPT Enterprise (OpenAI),
              and Anthropic Claude for Enterprise offer broad document drafting and analysis capabilities that lawyers
              already use personally. These tools lack Harvey's privilege protection and legal-domain accuracy but
              benefit from Microsoft's enterprise distribution (already in every law firm via M365) and
              OpenAI/Anthropic's ongoing model improvements.
            claimRefs: []
      - number: '3.2'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >
              Harvey AI's competitive advantage is strongest in the workflow automation and agentic task execution
              category — where Harvey Agents (launched 2025) provide plan-adapt-interact multi-step legal automation
              that Thomson Reuters CoCounsel and LexisNexis Lexis+ AI have not matched.

              On legal research and database completeness, however, Harvey AI is at a structural disadvantage: Westlaw
              (Thomson Reuters) and Lexis (LexisNexis) have 150+ years of annotated legal content, editorial headnotes,
              and proprietary case summaries that Harvey's training data cannot replicate without the same decades of
              legal editorial investment. Law firms that rely heavily on precedent research are unlikely to replace
              Westlaw/Lexis with Harvey — they will use both (multi-homing).

              Harvey's differentiation is most defensible in: (1) agentic workflow automation (Harvey Agents); (2)
              privilege-protective data architecture (no-training policy, SOC 2 Type II); (3) full-platform scope (6
              integrated modules vs single-task tools); and (4) attorney satisfaction scores — Harvey consistently rates
              highest on complex reasoning task quality in independent attorney surveys.

              The competitive dimension where Harvey is most exposed is raw database completeness for standard legal
              research. A Harvey attorney asking "find all cases about X" may get a worse answer than Westlaw's
              annotated search result — though Harvey's AI-synthesized response may provide better context around the
              cases it does find.
            claimRefs: []
      - number: '3.3'
        title: Moat Durability and Competitive Risk
        blocks:
          - type: paragraph
            body: >
              Harvey AI's competitive moat has three defensible layers: (1) **Data flywheel** — attorney feedback loops
              from Big Law firms compound Harvey's legal-domain model quality over time; (2) **Platform stickiness** —
              multi-module deployment (Vault + Knowledge + Agents) creates integration costs that make switching from
              Harvey more painful than switching from a single-purpose tool; (3) **Trust credentialing** — Big Law
              reference clients (A&O Shearman, Davis Polk) create a credibility cascade that accelerates new firm
              adoption.

              The key competitive risk timeline is: Near-term (2025-2026) — Harvey leads on product depth and Big Law
              trust while incumbents play catch-up on agentic capabilities; Medium-term (2027-2028) — CoCounsel and
              Lexis+ AI achieve comparable agentic features, increasing competitive pressure; Long-term (2029-2030) —
              frontier LLM commoditization risk peaks if general-purpose models achieve legal-domain accuracy parity.

              Bloomberg Intelligence analysis suggests the market may split co-dominantly: Thomson Reuters wins the
              legal research/precedent segment (Westlaw database is essentially irreplaceable), while Harvey wins the
              workflow automation and agentic legal work segment. This co-dominant outcome would validate Harvey's
              investment at $11B while also limiting its ability to displace Westlaw entirely.

              The OpenAI conflict-of-interest risk is worth monitoring: as an equity investor in Harvey and the model
              provider behind Harvey's core capabilities, OpenAI has theoretically privileged access to legal AI data
              that could inform a competing product — though no evidence of such plans exists.
            claimRefs: []
      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Thomson Reuters CoCounsel Is Harvey's Most Dangerous Competitor
            body: >
              Thomson Reuters is not a typical incumbent asleep at the wheel: the company spent $650M acquiring
              Casetext, launched CoCounsel within months, and is deploying AI across its existing Westlaw client base
              (the largest legal database install base in the world). CoCounsel's distribution advantage through Westlaw
              renewal conversations is structurally powerful — it doesn't require a new enterprise sale, it's a feature
              upgrade on an existing subscription. Harvey's defense is not to compete on database depth (where Westlaw
              wins permanently) but to own the agentic workflow automation category where Thomson Reuters hasn't yet
              built comparable capabilities.
            calloutType: risk
            claimRefs:
              - CP002
              - CP018
              - CP027
              - CP033
          - type: callout
            title: Harvey's Big Law Reference Clients Create a Credibility Cascade
            body: >
              A&O Shearman, Davis Polk, and Dentons are not just customers — they are the credentialing mechanism for
              Harvey's entire competitive strategy. When a firm partner at Skadden or Sullivan & Cromwell hears that
              Davis Polk is running Harvey at scale, the procurement conversation changes from 'convince me' to 'when
              can we start.' This reference dynamic is Harvey's most durable near-term moat because Thomson Reuters
              cannot replicate it: Westlaw is already everywhere, but that ubiquity doesn't create the same FOMO that a
              leading firm's AI deployment does.
            calloutType: strength
            claimRefs:
              - CP013
              - CP023
              - CP030
          - type: callout
            title: LLM Commoditization Risk Is Real but Not Imminent
            body: >
              Harvey's risk is not that Claude or GPT-5 will immediately replace it — it's that by 2028, general-purpose
              frontier models will achieve 90%+ of Harvey's legal accuracy advantage, leaving only the workflow,
              privilege, and integration elements as true differentiators. Harvey must use its 2025-2027 window to make
              the workflow and integration moats so deep that they create durable switching costs even after the model
              accuracy gap narrows. If Harvey successfully captures 3-5 year enterprise contracts with deep workflow
              integrations before LLM parity arrives, it will have built a defensible position independent of raw model
              superiority.
            calloutType: risk
            claimRefs:
