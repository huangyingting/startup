  claims:
    - id: C001
      statement: >-
        The global legal AI software market was valued at approximately $1.4-2B in 2024 and is projected to grow to
        $7-15B by 2030, with CAGR estimates ranging from 20% to 35% depending on the scope of services included (legal
        research only vs. full workflow automation).
      type: third-party-reported
      topic: legal AI TAM projection
      sourceRefs:
        - S001
        - S002
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ001
    - id: C002
      statement: >-
        The global legal services market generates approximately $950B-$1T in annual revenue as of 2024, with the US
        market representing ~$350-400B (35-40% of global total) — establishing a massive underlying market from which AI
        software can capture 1-3% in software spend.
      type: third-party-reported
      topic: global legal services TAM context
      sourceRefs:
        - S007
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ018
    - id: C003
      statement: >-
        Harvey AI's primary beachhead market is the Am Law 100 and Am Law 200 (top 100-200 US law firms by revenue),
        which collectively generate ~$150-200B in annual revenue; Harvey's per-seat pricing creates a SAM of
        approximately $500M-$1B from this segment alone, assuming 50-100% penetration at $3,000-$5,000 per seat
        annually.
      type: estimated
      topic: Harvey SAM from Big Law
      sourceRefs:
        - S006
        - S015
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ002
        - RQ006
    - id: C004
      statement: >-
        The US has approximately 1.3 million licensed attorneys (Bureau of Labor Statistics 2024); of these, roughly
        60,000-80,000 work in Am Law 100 firms (top-tier segment), ~200,000 in mid-size firms, and the remainder in
        small firms, government, or in-house roles — defining the buyer segments for Harvey AI's different product
        tiers.
      type: third-party-reported
      topic: US attorney workforce segmentation
      sourceRefs:
        - S020
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ003
