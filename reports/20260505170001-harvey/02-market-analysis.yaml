callouts:
  - title: Bloomberg Terminal Analogy Points to $2-4B ARR at Scale
    body: >
      The Bloomberg Terminal ($6,000-$25,000/seat, $5-6B ARR, 350,000+ seats in finance) is the closest analogue for
      Harvey's market opportunity: a high-value professional services vertical, concentrated in elite institutions,
      where the productivity value of real-time information and AI-assisted workflows far exceeds the software
      subscription cost. If Harvey achieves similar seat depth in legal (400,000+ attorneys globally in target segments
      at $3,000-$15,000/seat), the implied ARR range of $1-6B fully justifies an $11B valuation at maturity.
    claimRefs:
      - C062
      - C041
      - C069
    calloutType: insight
  - title: Structural Barriers Are Real But Harvey's Architecture Directly Addresses Them
    body: >
      The three primary legal AI adoption barriers (privilege breach, hallucination liability, bar compliance) are not
      generic technology adoption friction — they are specific risks unique to law that require specific product
      solutions. Harvey's SOC 2 Type II certification and no-training policy directly addresses privilege risk; its
      citation-grounded response architecture reduces hallucination liability; and its enterprise pricing model and
      compliance documentation enable ABA/bar compliance review. These aren't features — they're the price of entry into
      Big Law procurement, and Harvey designed its product around them from day one.
    claimRefs:
      - C046
      - C059
      - C047
    calloutType: strength
  - title: LLM Commoditization Could Compress Harvey's Pricing Power by 2027-2028
    body: >
      Harvey's current pricing power depends on maintaining meaningful legal-domain accuracy advantages over generalist
      LLMs (ChatGPT, Claude). As frontier model providers continue training on legal data, the accuracy gap may narrow,
      reducing Harvey's ability to charge a premium over enterprise ChatGPT licenses. Harvey must use its current window
      (2025-2027) to entrench workflow integrations, data network effects, and enterprise relationships that create
      switching costs independent of raw model performance.
    claimRefs:
      - C052
      - C053
      - C048
    calloutType: risk
