sections:
  - title: Legal AI Market Definition and Sizing
    body: >
      The legal AI market encompasses software tools that apply artificial intelligence to tasks performed by legal
      professionals, including legal research, contract analysis, document drafting, due diligence, discovery, and
      workflow automation. As of 2025, the market is best understood at three levels of scope.

      At the broadest level, the global legal services market generates approximately $950B-$1T annually, with the US
      representing $350-400B. AI software tools have historically captured 0.5-1% of a services market's revenue as
      software subscriptions; at 1-3% capture, the legal AI total addressable market would reach $9-30B in annual
      software revenue. More conservative near-term estimates — restricting to current AI-specific tooling categories —
      put the legal AI TAM at $1.4-2B in 2024, growing to $7-15B by 2030 at a 20-35% CAGR depending on analyst
      methodology.

      Harvey AI's serviceable addressable market (SAM) is defined by: (1) Am Law 100/200 law firms (~$130B combined
      revenue, 60,000-80,000 attorneys at the highest billing rates); (2) UK Magic Circle and EU global firms (~200-300
      additional firms); and (3) Fortune 500 in-house legal departments (~$50-100B market). Assuming 50,000 Harvey seats
      at $5,000-$15,000 annually, the SAM from these segments alone exceeds $500M-$750M ARR — well within Harvey's reach
      at current growth rates.
  - title: Market Segmentation and Buyer Analysis
    body: >
      Harvey AI's go-to-market operates across four buyer segments, each with distinct procurement dynamics:

      1. **Big Law (Am Law 100/200)**: The highest-value segment — 400-500 US firms with $130-140B combined revenue.
      Associates bill $300-600/hour, partners $600-2,000+/hour. AI tools with 10:1 ROI clear any reasonable procurement
      threshold. Committee-based approval creates 3-9 month sales cycles but also drives firm-wide rollouts rather than
      individual license purchases. Harvey has deep penetration here through anchor clients (A&O Shearman, Davis Polk).

      2. **UK/EU Magic Circle Firms**: Comparable in prestige and billing economics to US Big Law; 200-300 global-scale
      firms. Harvey's A&O Shearman partnership establishes London and EU presence. The Magic Circle represents a natural
      expansion market with similar procurement profiles to US Big Law.

      3. **In-House Legal Departments**: Fortune 500 companies with legal operations teams. This segment is earlier in
      AI adoption (65% budget allocated as of 2025) but growing rapidly. Harvey's PwC and EY partnerships provide
      conduit distribution into large corporate legal buyers.

      4. **Professional Services Networks**: Big 4 accounting firms (PwC, EY, Deloitte, KPMG) and global consulting
      firms that employ legal professionals. These firms have high AI sophistication, strong IT procurement
      infrastructure, and global scale — enabling Harvey to land enterprise deals covering thousands of seats across
      international networks.

      Mid-market and small firms represent a longer-term expansion market; Harvey's current focus on Big Law reflects a
      deliberate land-and-expand strategy where enterprise reference customers build credibility for downstream market
      tiers.
  - title: Growth Drivers, Barriers, and Competitive Dynamics
    body: >
      Five structural forces are accelerating legal AI adoption in 2024-2026, creating a favorable market environment
      for Harvey's expansion:

      1. **Profitability pressure**: Am Law 100 partner profitability grew only 3-5% in 2023-2024; firms need efficiency
      tools that increase associate productivity without proportional headcount growth.

      2. **Peer competitive pressure**: As Kirkland, Davis Polk, and A&O Shearman deploy Harvey publicly, peer firms
      face procurement pressure — the risk of being seen as technologically behind is a compelling GTM lever that
      creates FOMO-driven deal urgency.

      3. **Client fee pressure**: Major corporate clients are pushing back on law firm billing rate increases; AI tools
      that reduce hours billed can actually improve client satisfaction while maintaining or improving firm revenue per
      matter.

      4. **Gen AI mainstreaming**: Attorneys who use ChatGPT personally are pushing for firm-licensed tools that provide
      the same convenience with the privilege protections required for professional work.

      5. **Regulatory clarity emerging**: ABA Formal Opinion 512 (2024) and NYSBA guidance (2024) provide a legal
      framework for AI tool use, reducing compliance uncertainty that had blocked procurement.

      The primary adoption barriers are: privilege breach risk (Harvey's SOC 2 certification and no-training policy
      directly addresses this), hallucination liability (Harvey's citation-grounded architecture mitigates but does not
      eliminate), and client pushback on AI use in specific matters. LLM commoditization is a medium-term risk if
      generalist models achieve legal-domain accuracy parity with Harvey's fine-tuned approach, but Harvey's workflow
      integration depth and enterprise trust relationships create a durable switching cost even if the underlying model
      quality converges.
