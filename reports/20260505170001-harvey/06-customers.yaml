callouts:
  - title: A&O and Dentons Prove Harvey Can Scale Globally
    body: >
      The A&O Shearman (14 offices) and Dentons (60+ countries) deployments are the most important customer validation
      data points in Harvey's portfolio: they prove that Harvey can operate at global enterprise scale, with
      multi-lingual and multi-jurisdiction workflows, across hundreds of attorneys in different practice areas. Any
      legal AI competitor aiming to compete at the top of the market needs comparable global proof points — which
      currently do not exist at the same scale in Harvey's competitor set.
    claimRefs:
      - CU006
      - CU012
      - CU024
    calloutType: strength
  - title: M&A Cyclicality Is the Underappreciated Revenue Risk
    body: >
      Harvey AI's highest-ACV customers are overwhelmingly transactional (M&A, capital markets, private equity) law
      firms. During M&A downturns (like 2022-2023, when global deal volume fell 40%+), law firms significantly reduce
      headcount and discretionary technology spending. If a similar downturn occurs while Harvey is at 20-30% Am Law 100
      penetration rather than the dominant position it would need to be to survive a contraction, the revenue impact
      could be severe. Harvey's expansion into litigation, compliance, and in-house legal is the correct risk mitigation
      path.
    claimRefs:
      - CU032
      - CU013
    calloutType: risk
