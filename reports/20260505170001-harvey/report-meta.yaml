companyProfile:
  summary: >
    Harvey AI Corporation is an AI-native legal and professional services platform founded in late 2022 by Winston Weinberg (CEO, ex-Goldman Sachs attorney) and Gabriel Pereyra (CTO, ex-Google Brain / DeepMind). The company builds AI applications for complex knowledge work — beginning with legal, expanding to tax, finance, and consulting. Harvey has rapidly become the de-facto AI layer for elite law firms, anchoring deployments at A&O Shearman, Davis Polk, Dentons, Freshfields, PwC, and EY within three years of founding.
  foundedDate: "2022-11-01"
  founders:
    - name: Winston Weinberg
      role: CEO and Co-Founder
      background: Harvard Law JD, former Goldman Sachs attorney; brings legal domain depth and enterprise sales credibility.
      claimRefs: []
    - name: Gabriel Pereyra
      role: CTO and Co-Founder
      background: PhD-level ML researcher from Google Brain and DeepMind; leads model architecture, fine-tuning, and AI safety work.
      claimRefs: []
  foundingLocation: San Francisco, California
  headquarters: San Francisco, California
  productSummary: >
    Harvey's platform comprises six modules: Harvey Assistant (AI-powered research, drafting, and review), Harvey Vault (secure document storage and bulk analysis), Harvey Knowledge (legal research across case law, regulations, contracts, and tax), Harvey Workflow Agents (agentic pipelines for multi-step legal tasks), Harvey Mobile (iOS/Android access), and Harvey Ecosystem (API and integration layer for iManage, Microsoft 365, and partner tools).
  customerFocus: Am Law 200 law firms, Magic Circle and Clifford Chance-tier global law firms, Big Four accounting firms (PwC, EY) for legal-adjacent work, and professional services firms seeking AI-assisted complex knowledge workflows.
  businessModel: Enterprise SaaS with per-seat licensing; large global deployments reportedly exceed $1M ACV. Expansion revenue comes from additional module adoption and seat count growth as firms roll out Harvey to more practitioners.
  stage: late-stage private
  fundingStatus: >
    $11B valuation (March 2026, GIC + Sequoia co-lead); $1B+ total raised across Seed, Series A through Series E equivalent. Sequoia co-led three rounds; investors include a16z, Kleiner Perkins, Coatue, Conviction, and the OpenAI Fund.
  disclosureProfile: private-undisclosed
  claimRefs: []
summary:
  headline: Harvey is the defining legal AI franchise at an aggressive but potentially defensible $11B valuation — with elite customer anchors, deepening data moats, and a credible path to $1B+ ARR, but meaningful dependency, audit, and multiple-compression risks.
