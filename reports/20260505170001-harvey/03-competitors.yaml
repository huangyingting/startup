  claims:
    - id: CP001
      statement: >-
        Harvey AI's primary direct competitors in the enterprise Big Law market are Thomson Reuters CoCounsel (Westlaw
        AI), LexisNexis Lexis+ AI, and to a lesser extent Luminance; indirect competitors include Microsoft 365 Copilot
        for Legal, general-purpose LLMs (Claude, GPT-4), and point-solution tools like Spellbook and Kira/Litera.
      type: third-party-reported
      topic: competitive landscape overview
      sourceRefs:
        - SP002
        - SP003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP001
      contradictsClaimRefs: []
    - id: CP002
      statement: >-
        Thomson Reuters CoCounsel (launched 2023, powered by Casetext technology acquired for $650M) is Harvey AI's most
        dangerous incumbent competitor: it has Westlaw's comprehensive legal database integration, 150+ year brand
        trust, existing law firm relationships via Westlaw, and enterprise distribution at scale — advantages no startup
        can easily replicate.
      type: third-party-reported
      topic: Thomson Reuters CoCounsel competitive threat
      sourceRefs:
        - SP004
        - SP001
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QP002
        - QP005
      contradictsClaimRefs: []
    - id: CP003
      statement: >-
        LexisNexis Lexis+ AI integrates AI query capabilities with LexisNexis's proprietary legal research database
        (250M+ legal documents), giving it a comparable data moat to Thomson Reuters; however, attorney reviews in 2025
        consistently rate Harvey's response quality higher for complex multi-step legal reasoning tasks.
      type: third-party-reported
      topic: LexisNexis Lexis+ AI competitive profile
      sourceRefs:
        - SP005
        - SP002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP003
      contradictsClaimRefs: []
    - id: CP004
      statement: >-
        Luminance AI is a Cambridge-based contract review and M&A due diligence AI company founded in 2015; it raised
        ~$120M at approximately $1B valuation (2023), focuses narrowly on document review and contract intelligence (not
        full legal research), and has 500+ enterprise customers — making it a niche competitor to Harvey in the contract
        review segment.
      type: third-party-reported
      topic: Luminance AI profile
      sourceRefs:
        - SP006
        - SP003
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QP006
        - QP012
      contradictsClaimRefs: []
    - id: CP005
      statement: >-
        Microsoft 365 Copilot for Legal Teams offers generic document drafting, email summarization, and Teams
        integration for legal teams but lacks: (1) hallucination-mitigated legal citation, (2) privilege-protective data
        architecture, and (3) legal-domain fine-tuned models — the three elements Big Law procurement requires.
      type: third-party-reported
      topic: Microsoft Copilot legal team limitations vs Harvey
      sourceRefs:
