  researchQuestions:
    - id: QP001
      type: enumeration
      question: >-
        What are all the named legal AI competitors Harvey faces in its core market segments (Big Law research, contract
        review, agentic legal workflows) as of May 2026?
      targets:
        - contentRequirements/0
        - plannedTables/competitor-profile-table
      status: answered
    - id: QP002
      type: verification
      question: >-
        What is Thomson Reuters CoCounsel's product scope, distribution advantage, data moat, and pricing structure as
        Harvey's most significant incumbent competitor?
      targets:
        - contentRequirements/1
        - plannedTables/competitor-profile-table
      status: answered
    - id: QP003
      type: verification
      question: >-
        How does LexisNexis Lexis+ AI differ from Harvey in product capabilities, data assets, and target customer
        profile?
      targets:
        - contentRequirements/1
      status: answered
    - id: QP004
      type: comparison
      question: >-
        How do Harvey AI's product features compare to Thomson Reuters CoCounsel and LexisNexis AI on the key dimensions
        that matter to enterprise law firm buyers — accuracy, citation quality, privilege protection, and workflow
        integration?
      targets:
        - contentRequirements/2
        - plannedTables/feature-capability-matrix
      status: answered
    - id: QP005
      type: adverse
      question: >-
        What advantages do Thomson Reuters and LexisNexis have over Harvey AI that could prevent Harvey from displacing
        them as the primary legal research and workflow tool at Big Law firms?
      targets:
        - contentRequirements/4
        - plannedTables/moat-durability-competitive-risk-register
      status: answered
    - id: QP006
      type: verification
      question: >-
        How does Luminance AI (contract review specialist) compete with Harvey and what market segments has it captured
        that Harvey has not?
      targets:
        - contentRequirements/1
        - plannedTables/competitor-profile-table
      status: answered
    - id: QP007
      type: mechanism
      question: >-
        Why does Microsoft 365 Copilot for Legal Teams not directly displace Harvey despite Microsoft's distribution
        advantage — what does Harvey do that M365 Copilot cannot?
      targets:
