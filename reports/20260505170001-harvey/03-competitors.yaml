      status: answered
    - id: QP008
      type: comparison
      question: >-
        How does Harvey AI's pricing compare to Thomson Reuters CoCounsel and LexisNexis AI subscriptions — is Harvey
        more expensive, cheaper, or comparable per attorney per year?
      targets:
