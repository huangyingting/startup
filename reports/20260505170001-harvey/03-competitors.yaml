callouts:
  - title: Thomson Reuters CoCounsel Is Harvey's Most Dangerous Competitor
    body: >
      Thomson Reuters is not a typical incumbent asleep at the wheel: the company spent $650M acquiring Casetext,
      launched CoCounsel within months, and is deploying AI across its existing Westlaw client base (the largest legal
      database install base in the world). CoCounsel's distribution advantage through Westlaw renewal conversations is
      structurally powerful — it doesn't require a new enterprise sale, it's a feature upgrade on an existing
      subscription. Harvey's defense is not to compete on database depth (where Westlaw wins permanently) but to own the
      agentic workflow automation category where Thomson Reuters hasn't yet built comparable capabilities.
    claimRefs:
      - CP002
      - CP018
      - CP027
      - CP033
    calloutType: risk
  - title: Harvey's Big Law Reference Clients Create a Credibility Cascade
    body: >
      A&O Shearman, Davis Polk, and Dentons are not just customers — they are the credentialing mechanism for Harvey's
      entire competitive strategy. When a firm partner at Skadden or Sullivan & Cromwell hears that Davis Polk is
      running Harvey at scale, the procurement conversation changes from 'convince me' to 'when can we start.' This
      reference dynamic is Harvey's most durable near-term moat because Thomson Reuters cannot replicate it: Westlaw is
      already everywhere, but that ubiquity doesn't create the same FOMO that a leading firm's AI deployment does.
    claimRefs:
      - CP013
      - CP023
      - CP030
    calloutType: strength
  - title: LLM Commoditization Risk Is Real but Not Imminent
    body: >
      Harvey's risk is not that Claude or GPT-5 will immediately replace it — it's that by 2028, general-purpose
      frontier models will achieve 90%+ of Harvey's legal accuracy advantage, leaving only the workflow, privilege, and
      integration elements as true differentiators. Harvey must use its 2025-2027 window to make the workflow and
      integration moats so deep that they create durable switching costs even after the model accuracy gap narrows. If
      Harvey successfully captures 3-5 year enterprise contracts with deep workflow integrations before LLM parity
      arrives, it will have built a defensible position independent of raw model superiority.
    claimRefs:
      - CP011
      - CP019
      - CP029
    calloutType: risk
