        - plannedTables/pricing-packaging-comparison
      status: answered
    - id: QP009
      type: mechanism
      question: >-
        What are Harvey AI's primary sources of switching cost and competitive lock-in that prevent a law firm from
        switching to CoCounsel or LexisNexis once deployed on Harvey?
      targets:
        - contentRequirements/3
        - plannedTables/moat-durability-competitive-risk-register
      status: answered
    - id: QP010
      type: adverse
      question: >-
        Has Harvey AI lost any named enterprise accounts to competitors, and what does the competitive win/loss dynamic
        look like versus Thomson Reuters and LexisNexis?
      targets:
        - contentRequirements/4
