callouts:
  - title: 3.7x Valuation in 13 Months Signals Category-Defining Position
    body: >
      Harvey AI's progression from $3B to $11B in approximately 13 months (February 2025 to March 2026) is one of the
      most aggressive valuation escalations in enterprise software history. Unlike many AI startups that raise at
      inflated multiples, Harvey's repeat investors (Sequoia co-led three rounds) suggests the growth is grounded in
      genuine ARR momentum. The GIC sovereign wealth fund co-investment at $11B is particularly significant —
      institutional capital of this type typically requires revenue performance that justifies the entry price, not just
      growth potential.
    claimRefs:
      - C003
      - C004
      - C027
    calloutType: strength
  - title: Winston Weinberg's Legal Background Is a Core Moat
    body: >
      Most AI companies building for legal are founded by engineers or product managers who learned legal domain from
      the outside. Winston Weinberg's background as a practicing Goldman Sachs attorney provides Harvey with an unusual
      founder-market fit: direct understanding of what attorneys need, what they fear (malpractice, privilege breach),
      and how legal workflows actually work. This insider perspective has shaped Harvey's privilege-protective
      architecture and its citation-grounded response system — features that drive enterprise trust in a market where
      trust is the primary purchasing criterion.
    claimRefs:
      - C011
      - C017
      - C010
    calloutType: strength
  - title: ABA and Regulatory Uncertainty Is a Real Risk
    body: >
      The legal AI market faces meaningful regulatory risk: ABA Formal Opinion 512 (2024) addresses confidentiality in
      AI tool usage but does not comprehensively resolve issues like attorney competence obligations, unauthorized
      practice of law, or hallucination liability. As Harvey's agentic products move toward automated legal work product
      (not just assisted drafting), state bar associations may impose new requirements that increase Harvey's compliance
      costs or restrict certain automated workflows. Harvard Law Review (2025) flagged hallucination liability and
      unauthorized practice as the two most significant regulatory exposure areas for legal AI platforms.
    claimRefs:
      - C019
      - C025
      - C021
    calloutType: risk
