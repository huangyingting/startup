  claims:
    - id: C001
      statement: >-
        Harvey AI Corporation was founded in late 2022 in San Francisco, CA by Winston Weinberg (CEO, former Goldman
        Sachs attorney and Y Combinator alumnus) and Gabriel Pereyra (CTO, former Google Brain and DeepMind researcher);
        the company builds AI-native legal and professional services software.
      type: third-party-reported
      topic: founding and founders
      sourceRefs:
        - S011
        - S003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ001
        - RQ005
    - id: C002
      statement: >-
        Harvey AI's funding history shows four major rounds in approximately 13 months: $300M at $3B (February 2025,
        Sequoia-led), $100M at $5B (June 2025, Kleiner Perkins and Coatue), $150M at $8B (October-December 2025,
        a16z-led), and $200M at $11B (March 2026, GIC and Sequoia co-led); total raised exceeded $1B as of March 2026.
      type: third-party-reported
      topic: funding history and valuation trajectory
      sourceRefs:
        - S003
        - S004
        - S005
        - S006
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ002
        - RQ024
    - id: C003
      statement: >-
        Harvey AI's valuation grew 3.7x in approximately 13 months (from $3B in February 2025 to $11B in March 2026),
        driven by rapidly growing ARR in legal AI — one of the fastest valuation escalation trajectories for an
        enterprise AI company at this scale.
      type: inferred
      topic: valuation growth velocity
      sourceRefs:
        - S003
        - S004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ004
    - id: C004
      statement: >-
        Sequoia Capital has co-led three of Harvey AI's investment rounds since the Series A (Series B, Series D at $3B,
        and the latest round at $11B); Sequoia partner Pat Grady publicly acknowledged this as an 'unusually large show
        of faith' for the firm.
      type: third-party-reported
      topic: Sequoia strategic investment thesis
      sourceRefs:
        - S003
        - S004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ010
    - id: C005
      statement: >-
        Harvey AI's investor base includes Sequoia Capital, GIC (Singapore sovereign wealth fund), Andreessen Horowitz,
        Kleiner Perkins, Coatue, Conviction Partners, Elad Gil, Evantic, and the OpenAI Fund — a highly credentialed set
