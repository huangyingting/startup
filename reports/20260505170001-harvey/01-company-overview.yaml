      type: third-party-reported
      topic: investor base composition
      sourceRefs:
        - S003
        - S016
        - S024
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ002
    - id: C006
      statement: >-
        Harvey AI's products as of May 2026 include: Harvey Assistant (AI chat for legal tasks), Harvey Vault (document
        storage and bulk analysis), Harvey Knowledge (legal research across case law, regulations, and tax domains),
        Harvey Workflow Agents (agentic pipelines for complex legal tasks), and Harvey Mobile (on-the-go legal AI
        access).
      type: observed
      topic: product portfolio
      sourceRefs:
        - S001
        - S009
        - S010
      confidence: high
      freshness: current
      answersQuestionRefs:
