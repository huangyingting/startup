callouts:
  - title: 'Conditional Buy: Audited Financials Are the Gating Requirement'
    body: >
      Harvey AI is a compelling investment on qualitative dimensions — the market, the product, the customers, and the
      investor syndicate quality are all exceptional. The quantitative case at $11B depends entirely on the ARR
      trajectory being in the $150-200M range analyst estimates suggest, growing at 100%+ annually. At confirmed $150M+
      ARR and 75%+ gross margins, the investment at $11B is aggressive but defensible. At $100M ARR and 60% margins, the
      valuation is materially stretched. No sophisticated investor should commit capital at this valuation without
      obtaining audited financials first — this is the single non-negotiable condition.
    claimRefs:
      - CV035
      - CV029
      - CV040
    calloutType: recommendation
  - title: Harvey Is Priced as an Institutional Asset, Not a VC Bet
    body: >
      The probability-weighted return of 1.7x at $11B entry, with a realistic ceiling of 2.7-3x in the bull case, makes
      Harvey AI an institutional investment — appropriate for GIC, growth equity funds, or large family offices seeking
      exposure to the legal AI category with downside protection from Harvey's elite customer base and Sequoia board
      support. For traditional VC funds expecting 10x+ returns on individual positions, Harvey at $11B is not the right
      instrument — the valuation has already captured most of the speculative upside that early-stage investors
      received.
    claimRefs:
      - CV039
      - CV032
    calloutType: insight
  - title: OpenAI Competitive Entry Represents a Probability-Weighted Discount
    body: >
      The 40-50% 3-year probability of OpenAI entering the legal AI market directly is the single most important risk
      discount in Harvey's valuation. If this probability is priced into Harvey's $11B (which sophisticated investors
      like Sequoia and GIC would have modeled), it implies that insiders believe Harvey's Knowledge moat and platform
      breadth are sufficient to sustain significant value even in a world where OpenAI competes directly. External
      investors must independently assess whether Harvey's switching costs are durable enough to justify this.
    claimRefs:
      - CV006
      - CV008
      - CV037
    calloutType: risk
