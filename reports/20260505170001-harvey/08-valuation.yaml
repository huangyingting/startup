  researchQuestions:
    - id: QV001
      type: quantification
      question: >-
        What is Harvey AI's $11B valuation as a multiple of estimated ARR ($100-200M), and how does this compare to
        public enterprise SaaS multiples and comparable AI unicorn multiples?
      targets:
        - contentRequirements/0
        - plannedTables/comparable-valuation-table
      status: answered
    - id: QV002
      type: mechanism
      question: >-
        What is the investment thesis for Harvey AI at $11B — what must the company achieve in terms of ARR, market
        share, and strategic position to generate a positive return from the current valuation?
      targets:
        - contentRequirements/0
        - contentRequirements/1
      status: answered
    - id: QV003
      type: quantification
      question: >-
        What are the bull, base, and bear ARR scenarios for Harvey AI over 3-5 years (2026-2030), and what are the
        implied exit valuations under each scenario at reasonable exit multiples?
      targets:
        - contentRequirements/1
        - plannedTables/bull-base-bear-scenario-table
      status: answered
    - id: QV004
      type: comparison
      question: >-
        How does Harvey AI's valuation compare to public legal technology comparables (Thomson Reuters, RELX/LexisNexis)
        and to comparable vertical SaaS IPOs (Veeva, Workday, Datadog) on revenue multiples?
      targets:
        - contentRequirements/4
        - plannedTables/comparable-valuation-table
      status: answered
    - id: QV005
      type: mechanism
      question: >-
        What is Harvey AI's strategic acquisition value to potential buyers (Thomson Reuters, Microsoft, LexisNexis,
        Salesforce) and what strategic premium might a buyer pay over the current $11B valuation?
      targets:
        - contentRequirements/3
      status: answered
    - id: QV006
      type: adverse
      question: >-
        What is the anti-thesis for Harvey AI at $11B — what specific scenarios, competitive dynamics, or execution
        failures would cause the investment to significantly underperform?
      targets:
        - contentRequirements/2
        - plannedTables/thesis-anti-thesis-table
      status: answered
    - id: QV007
      type: adverse
      question: >-
        How does Harvey AI's $11B valuation hold up under a scenario where OpenAI enters the legal AI market directly,
        or where LLM commoditization erodes Harvey's technology differentiation within 2-3 years?
      targets:
        - contentRequirements/2
      status: answered
    - id: QV008
      type: quantification
      question: >-
        What total addressable market (TAM) does Harvey AI face in legal AI, and does the market size justify Harvey's
        current valuation — what market share would Harvey need to capture to be worth $11B?
      targets:
        - contentRequirements/0
      status: answered
    - id: QV009
      type: mechanism
      question: >-
        What is Harvey AI's path to public market liquidity — is an IPO more likely than a strategic acquisition, and
        what metrics would Harvey need to achieve for a successful IPO at or above $11B?
      targets:
        - contentRequirements/3
      status: answered
    - id: QV010
      type: adverse
      question: >-
        What is Harvey AI's valuation risk if AI private market multiples compress by 40-60% as occurred in the 2022
