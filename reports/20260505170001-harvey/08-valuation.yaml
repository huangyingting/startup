sections:
  - title: Valuation Framework and Comparable Analysis
    body: >
      Harvey AI's $11B valuation must be assessed against three reference points: its own ARR trajectory, comparable
      enterprise SaaS companies in public markets, and comparable AI unicorn private market valuations. At an estimated
      $100-200M ARR, Harvey trades at 55-110x trailing ARR — a multiple that has no direct equivalent in mature public
      markets (public vertical SaaS companies like Veeva, ServiceNow, and Datadog trade at 8-16x ARR at similar growth
      phases) but does find precedent in high-growth AI companies during their peak growth windows: Snowflake IPO'd at
      ~100x ARR on 124% growth.

      The key valuation question is whether Harvey is currently in a Snowflake-like window where extraordinarily high
      ARR multiples are justified by explosive growth, or whether the $11B represents an overshoot that will compress as
      growth moderates. The available evidence — Sequoia co-leading three rounds with board-level ARR visibility, GIC
      institutional due diligence, and The Information reporting Harvey is "growing into its valuation" — suggests the
      growth trajectory is real but the multiple is at the high end of what is defensible. A fair value range, based on
      analyst ARR estimates and high-growth SaaS comparable analysis, is approximately $6-15B for an informed outside
      investor without audited financial access.

      Comparable AI unicorn valuations reinforce the assessment: Harvey commands a 2-3x premium over Glean ($4.6B) and
      Cohere ($5B), justified by Harvey's more specialized vertical focus, clearer per-attorney ROI, and superior
      enterprise customer quality. The Thomson Reuters $650M acquisition of Casetext (2023) at ~3.25x ARR provides the
      strategic M&A floor: at that multiple on Harvey's $150M ARR, a TR acquisition would value Harvey at ~$490M —
      demonstrating that Harvey's $11B represents a 22x premium over strategic M&A comparable multiples, reflecting
      Harvey's higher growth rate and platform breadth.
    tableRefs:
      - TV001
      - TV004
    figureRefs:
      - FV001
      - FV004
  - title: Investment Thesis, Scenarios, and Return Analysis
    body: >
      The investment thesis for Harvey AI at $11B is predicated on category leadership in a massive, underpenetrated
      market: the global legal services AI TAM is $50-100B+ and Harvey currently captures less than 0.5% of theoretical
      TAM. The combination of elite customer anchor accounts (Am Law 10, UK Magic Circle, Big 4), a platform with six
      distinct product modules, and the Harvey Knowledge layer that creates increasing switching costs over time makes
      Harvey the most compelling legal AI investment candidate available. Andreessen Horowitz's thesis that Harvey could
      be a $50-100B company over 10 years, while speculative, is grounded in the scale of the legal services market.

      The return scenarios, however, are less exciting than the absolute opportunity: under the base case ($450-680M ARR
      by 2028-2029, 20x exit multiple), Harvey at $15B implies only a 1.4x return from $11B entry — below typical
      institutional return thresholds. The bull case ($800M+ ARR, $30B exit) delivers a 2.7x return — respectable for a
      sovereign fund or large institutional but below typical VC expectations. The bear case ($300M ARR, $8B M&A exit)
      is a 30% capital loss. The probability-weighted expected value (1.7x) indicates Harvey is priced as a quality
      asset with moderate upside rather than a venture-style lottery ticket.

      GIC's co-investment rationale is the most clarifying institutional signal: sovereign wealth funds deploy capital
      at lower expected returns than venture funds but with longer horizons; GIC investing at $11B alongside Sequoia
      signals that the combined institutional confidence in Harvey's financial trajectory is sufficient to justify
      deployment of long-duration institutional capital at a 1.5-2.5x expected return over a 7-10 year horizon —
      consistent with the base and bull scenario analysis above.
    tableRefs:
      - TV002
      - TV005
    figureRefs:
      - FV002
  - title: Diligence Gaps, Kill Criteria, and Final Recommendation
    body: >
      Harvey AI's most significant diligence gap is the complete absence of audited GAAP financial statements. All
      valuation analysis in this chapter rests on analyst estimates with potentially 50%+ error bands. The $11B is a
      market-clearing price set by Harvey's fundraising process among informed insider investors (Sequoia, with
      board-level ARR visibility) — but external investors have no way to independently verify the ARR trajectory
      without demanding audited financials as a prerequisite. This is not a fatal flaw in a private company context, but
      it does mean the investment decision at $11B requires high trust in the investor syndicate's assessment.

      The kill criteria are binary: (1) OpenAI announces a direct legal AI enterprise product in Harvey's core market —
      this event would trigger an immediate reassessment of Harvey's model dependency risk and competitive durability;
      (2) a material data breach exposing attorney-client privileged communications — irreversible reputational damage
      in a profession where confidentiality is non-negotiable; (3) ARR growth confirmed at <50% CAGR for two consecutive
      quarters — would indicate the market saturation thesis is playing out.

      Final recommendation: CONDITIONAL BUY for institutional investors (sovereign funds, large growth equity) who can
      demand and receive audited financials as a prerequisite. Harvey AI represents the highest-quality enterprise legal
      AI investment available: exceptional customer anchors, real market opportunity, and a credible platform story. The
      $11B valuation is aggressive but not indefensible for confirmed ARR of $150M+ growing at 100%+ annually. The
      conditional aspect is unambiguous: no investment commitment should be made without audited GAAP financials
      confirming the revenue trajectory and gross margin structure. At confirmed $150M+ ARR and 75%+ gross margins, the
      investment case is strong; at confirmed $100M ARR and 60% gross margins, the valuation is materially stretched.
    tableRefs:
      - TV003
      - TV006
    figureRefs:
      - FV003
