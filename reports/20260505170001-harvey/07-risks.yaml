callouts:
  - title: OpenAI Entry Is Harvey's Single Largest Existential Risk
    body: >
      Harvey's most critical risk is the scenario where OpenAI decides to compete directly in enterprise legal AI —
      packaging a Harvey-equivalent product into OpenAI Enterprise at  substantially lower cost. OpenAI already builds
      GPT models that power Harvey; entering  the legal market would remove Harvey's largest cost advantage (favorable
      API access) while leveraging OpenAI's existing enterprise sales relationships. Harvey's defense must rest on the
      Harvey Knowledge personalization layer, which OpenAI cannot replicate without the same firm-specific data — but
      this moat requires 12-24 months to establish at each customer.
    claimRefs:
      - C216
      - C226
      - C235
    calloutType: risk
  - title: Data Breach Would Be Catastrophic and Irreversible
    body: >
      Unlike most SaaS security incidents, a data breach at Harvey AI exposing attorney-client privileged communications
      would not be recoverable through standard remediation. Attorney-client privilege is the foundation of the legal
      system's confidentiality guarantee; courts and bar associations would have no choice but to compel affected
      clients to disclose the breach to opposing parties in active litigation, creating litigation advantage for
      adversaries and professional misconduct inquiries for the attorneys at breached firms. Harvey's security
      investment must treat data breach prevention as an absolute priority, not just a compliance checkbox.
    claimRefs:
      - C215
      - C221
      - C224
    calloutType: risk
