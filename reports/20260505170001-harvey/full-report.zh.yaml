          - type: callout
            title: 证明 $11B 合理性，需要以 70-90% CAGR 走向 IPO
            body: >
              Harvey AI 的 $11B 估值需要二选一：（1）在 3-5 年内以相当或更高倍数 IPO 或被收购；或（2）通过 ARR 扩张长进估值，达到 $400-600M 后，20-30x ARR
              估值对类别领导者可以防守。这要求持续 70-90% CAGR——可以做到，但没有保证，尤其是在达到关键 ARR 规模前，如果 LLM 商品化压缩 Harvey 的定价权。$1B+ 现金头寸让 Harvey
              有时间执行增长，不必近期依赖外部资本，这是一项有意义的优势。
