      - number: '1.3'
        title: 客户基础与市场地位
        blocks:
          - type: paragraph
            body: >
              截至 2025 年，Harvey AI 已确立其企业级法律 AI 平台的领先地位，据公司披露，部署律所超过 100 家，其中包括多家 Am Law 100 律所——即全球收入最高的法律机构。具名核心客户包括
              A&O Shearman（Allen & Overy 与 Shearman & Sterling 合并后的全球最大律所之一）、Davis Polk & Wardwell、Dentons、PwC 及
              EY。通过与全球律所的合作，公司业务版图已覆盖美国、欧盟及亚太地区。

              Harvey 在顶级大所的深度渗透形成了强大的参照效应：当同行看到竞争对手部署 Harvey 时，转换成本的逻辑发生逆转——不跟进 AI
              的律所反而面临在效率、成本和客户服务质量上落后的风险。这种同伴压力驱动的采购机制，类似于 Salesforce 攻占企业 CRM 或 GitHub 占领企业工程领域的路径。麦肯锡估计，AI
              可将律师在标准法律任务上 20%–40% 的工时实现自动化，按大所计费率折算，每位律师每年的生产力价值高达 5 万至 20 万美元。

              企业市场动态还受到法律行业经济学的进一步放大：合伙人每小时计费 1,000–2,000 美元以上，意味着即使是适度的效率提升——每位律师每天节省两到三小时——也能为每位高级律师创造 50 万至 100
              万美元以上的年度价值。Harvey 的 ROI 价值主张因此具有强大的经济吸引力，无需大规模裁员即可实现，使其成为比传统降本技术更易推进的企业采购决策。
