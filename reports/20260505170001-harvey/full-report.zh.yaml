      - number: '3.3'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的竞争护城河有三层可守：（1）**数据飞轮**——来自大型律所的律师反馈循环，随时间复利提升 Harvey 的法律领域模型质量；（2）**平台粘性**——多模块部署（Vault +
              Knowledge + Agents）带来集成成本，让从 Harvey 切换比从单用途工具切换更痛；（3）**信任背书**——大型律所参考客户（A&O Shearman、Davis
              Polk）形成可信度级联，加速新律所采用。

              关键竞争风险时间线是：近期（2025-2026）——Harvey 在产品深度和大型律所信任上领先，既有巨头追赶智能体能力；中期（2027-2028）——CoCounsel 和 Lexis+ AI
              做出可比智能体功能，竞争压力上升；长期（2029-2030）——若通用模型达到法律领域准确率同等水平，前沿 LLM 商品化风险见顶。

              Bloomberg Intelligence 分析认为，市场可能分裂为共同主导：Thomson Reuters 赢下法律研究 / 判例环节（Westlaw 数据库本质上不可替代），Harvey
              赢下工作流自动化和智能体式法律工作环节。这种共同主导结果会验证 Harvey 在 $11B 估值下的投资逻辑，但也会限制其完全取代 Westlaw 的能力。

              OpenAI 的利益冲突风险值得跟踪：OpenAI 既是 Harvey 的股权投资人，也是 Harvey 核心能力背后的模型提供商，理论上可优先接触法律 AI
              数据，并据此启发竞争产品——尽管目前没有证据显示此类计划存在。
