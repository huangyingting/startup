      - number: '1.2'
        title: 融资与投资方背书
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的融资节奏在企业软件里也算最激进：约 13 个月完成四轮主要融资，估值从 $3B（February 2025）升至 $11B（March 2026）——增长
              3.7x，背后是快速的年经常性收入（ARR）增长和企业部署扩张。到 March 2026，累计融资超过 $1B；对任何法律科技公司而言都是里程碑，也强烈表明投资人相信法律 AI 这个类别。

              Sequoia Capital 是锚定投资人，自 Series A 以来联合领投三轮。Sequoia 合伙人 Pat Grady 称这是“异乎寻常的大手笔信任票”，反映其对 Harvey
              类别领导地位的深度信心。March 2026 轮由 GIC（新加坡主权财富基金）联合领投，为 Harvey 的国际扩张策略带来国际机构资本和亚太分销通道。其他关键投资人包括 Andreessen
              Horowitz（领投 $8B 轮）、Kleiner Perkins、Coatue、Conviction Partners、Elad Gil 和 OpenAI Fund——在基础模型公司之外，这是企业 AI
              里最顶级的投资人阵容。

              这组投资人带来三类战略价值：（1）靠 Sequoia、KP 和 a16z 投资组合与大型律所、金融机构的关系，打开企业分销网络；（2）通过 OpenAI Fund 的战略关系，获得 AI
              模型访问和可信度；（3）借助 GIC 的亚太主权网络，搭建国际扩张基础设施。
