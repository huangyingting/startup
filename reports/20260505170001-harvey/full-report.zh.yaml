      - number: '1.3'
        title: 客户基础与市场地位
        blocks:
          - type: paragraph
            body: >
              Harvey AI 已站上企业法律 AI 平台的领先位置：截至 2025，公司称已部署到 100+ 律所，包括多家 Am Law 100 律所——也就是全球收入最高的法律执业机构。具名锚点客户包括 A&O
              Shearman（Allen & Overy 与 Shearman & Sterling 合并后形成，是全球最大律所之一）、Davis Polk & Wardwell、Dentons、PwC 和
              EY。借助全球律所合作，地理覆盖延伸到美国、EU 和亚太。

              Harvey 在大型律所的渗透带来强参考效应：同业看到竞争对手部署 Harvey 后，切换成本的论点反而倒过来——不采用 AI 的律所，可能在效率、成本和客户服务质量上落后。这种同业压力驱动的采用机制，类似
              Salesforce 拿下企业 CRM，或 GitHub 拿下企业工程。McKinsey 估计，AI 可在标准法律任务中自动化 20-40% 的律师工时，按大型律所计费费率，每名律师每年可创造
              $50,000-$200,000 的生产率价值。

              律所经济学进一步放大了企业市场动力：合伙人每小时收费 $1,000-$2,000+，即便只是温和提升生产率——每名律师每天省 2-3 小时——也能为每位高级律师创造 $500K-$1M+
              年价值。因此，Harvey 的 ROI 命题在经济上很有说服力，而且不必要求大规模裁员，比传统降本技术更容易通过企业采购。
