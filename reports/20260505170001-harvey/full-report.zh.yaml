      - number: '7.2'
        title: 运营、竞争与技术风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 最紧迫的运营风险是高知名度的准确性事故：若 Harvey 生成内容在重大法律事务中造成实质性错误并被公开报道，将同时触发整个客户群的重新评估。Harvey 推出的自主 Agents
              工作流使这一风险进一步升级——多步骤自主工作流在各环节无需律师介入即可执行法律任务，其失败模式比单次查询 AI 辅助更为复杂。Agents 产品必须配备严格的质量防护机制，以防范上述场景发生。

              竞争风险涵盖三个维度：（1）模型商品化——基础模型持续进步，Harvey 的微调优势将随之收窄；（2）现有巨头反击——Thomson Reuters 承诺投入 43 亿美元以上进行 AI
              开发，LexisNexis 有类似布局，双方均可借助巨大的分发优势；（3）大型科技公司捆绑销售——Microsoft Copilot for Legal 可能以远低于 Harvey 的增量成本，随
              Microsoft 365 捆绑提供同等 AI 法律能力。Harvey 对抗上述三类威胁的防线是 Harvey Knowledge 层（律所专属个性化），它形成的迁移成本是商品化或捆绑替代方案最难复制的壁垒。

              Harvey AI 的网络安全态势是关键的运营风险因素：律所越来越多地成为寻求法律情报的国家级行为者的攻击目标（据 CrowdStrike 2025 年报告），一旦存储在 Harvey
              中的律师-客户特权通信遭到泄露，将对受影响客户和 Harvey 声誉造成灾难性打击。Harvey 的 SOC 2 Type II
              认证和加密向量存储提供了有意义的基础防护，但随着威胁形势演变，安全标准必须持续升级。
