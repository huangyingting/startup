  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Harvey AI 所处竞争格局最宜从三个层次理解：传统法律数据提供商、AI 原生法律平台及通用 AI 替代方案。

              **第一层——传统巨头（威胁最大）**：Thomson Reuters（CoCounsel，由 Casetext 驱动）和 LexisNexis（Lexis+ AI）是 Harvey
              最具威胁的竞争对手，因为它们将逾 150 年的法律数据库护城河与 AI 叠加层及现有律所关系融为一体。Thomson Reuters 每年从 Westlaw 订阅中获取超过 18 亿美元的法律板块收入，并自
              2023 年推出以来已在"数千家律所"部署 CoCounsel。LexisNexis 的 Lexis+ AI 将 AI 与超过 2.5 亿份法律文件整合。两家公司均不可等闲视之——双方正投入数十亿美元直接竞争
              AI 原生法律市场。

              **第二层——AI 原生竞争对手（细分专家）**：Luminance AI（合同审阅，估值约 10 亿美元）、Ironclad（合同生命周期管理，面向企业
              B2B）、Spellbook（合同起草，面向中小企业）以及 Kira/Litera（文档审阅），均在 Harvey 已涉足但尚未主导的具体垂直领域展开竞争。这些参与者对 Harvey
              在大型律所的企业地位威胁较小，但可能成为并购标的或吸引资本涌入赛道的融资磁石。

              **第三层——通用 AI（颠覆性威胁）**：Microsoft 365 Copilot、ChatGPT Enterprise（OpenAI）及 Anthropic Claude for Enterprise
              提供律师个人已在使用的广泛文档起草与分析能力。这些工具缺乏 Harvey 的特权保护和法律领域准确性，但受益于 Microsoft 的企业分发渠道（通过 M365 已覆盖每家律所）以及
              OpenAI/Anthropic 持续的模型改进。
