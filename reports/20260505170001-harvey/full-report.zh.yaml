      - - OpenAI 推出直接面向法律 AI 的企业产品
        - OpenAI 发布与 Harvey 竞争、价格相同或更低的产品
        - 40-50%
        - 加速 Harvey Knowledge 锁定；重新评估估值
      - - A&O Shearman / Dentons 同时不续约
        - 两家锚点客户合同到期时拒绝续约
        - <10%
        - 立即启动客户成功干预；考虑下行情景规划
      - - 审计账目确认 ARR 增速低于年复合 50%
        - 连续两个季度 ARR 同比增速低于 40%
        - 20-30%
        - 投资逻辑破坏；重新评估退出时间表与估值
      - - 重大数据泄露致律师-客户通信外泄
        - Harvey 系统内任何已确认的律所客户数据泄露
        - <5%
        - 细分市场受损；考虑退出或减记
      - - 欧盟《AI 法案》禁止 Harvey 在法律领域使用
        - 监管裁定将 Harvey 列为欧盟禁止使用的 AI 系统
        - <5%
        - 25–30% 客户群面临营收风险；需要法律应对策略
      - - 估值倍数收缩（AI 倍数下降 50%）
        - AI 私募市场估值倍数普遍压缩 40–60%
        - 25-35%
        - 下行融资风险；考虑加速 IPO 或并购
    claimRefs:
      - CV008
      - CV016
      - CV024
      - CV031
  - id: TV006
    title: 最终尽调清单表
    columns:
      - 尽调要求
      - 优先级
      - 理由
      - 未提供的影响
    rows:
      - - 经审计 GAAP 财务报表（2024 年及 2025 年）
        - 阻断
        - 确认 ARR、毛利率、运营费用——目前均为估算
        - 无法确认估值倍数；不建议投资
      - - 客户队列 ARR 分析（按客户细分的 NDR）
        - 阻断
        - 确认收入质量；验证扩张收入叙述
        - 无法评估流失 / 扩张比率；基础情景无法确认
      - - 毛利率成本分解（OpenAI API 费用）
        - 高
        - 量化模型依赖的财务风险；毛利率估算
        - 利润率假设可能存在重大偏差
      - - 含优先清算权的股权结构表
        - 高
        - 明确优先清算权对普通股回报的影响
        - 回报计算可能存在重大误差
      - - 5 个以上客户参考电话（具名客户）
        - 高
        - 独立验证产品质量、满意度及续约意愿
        - 客户满意度信号未经核实
      - - Harvey-1 模型与基础 GPT-4 的基准对比
        - 中
        - 验证自研模型声明；量化模型独立化进展
        - 技术差异化叙述无法核实
      - - 重要合同（OpenAI、AWS、Microsoft）
        - 中
        - 确认 API 定价、服务条款、独占权及数据权利
        - 缺乏合同条款则合作伙伴风险无法量化
      - - 安全审计报告（SOC 2 完整版）
        - 中
        - 验证安全声明；识别控制缺口
        - 缺乏完整审计则数据泄露风险无法量化
    claimRefs:
