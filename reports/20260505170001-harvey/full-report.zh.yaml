      - number: '8.3'
        title: 尽调缺口、终止标准与最终建议
        blocks:
          - type: paragraph
            body: >
              Harvey AI 最重大的尽调缺口是完全缺失经过审计的 GAAP 财务报表。本章所有估值分析均依赖误差幅度可能超过 50% 的分析师估算。110 亿美元是 Harvey 融资过程中由知情内部投资者（具备董事会级
              ARR 可见度的 Sequoia）确定的市场出清价——但外部投资者在未事先要求审计财务报表的情况下，无法独立核实 ARR 轨迹。这在私有公司语境下并非致命缺陷，但确实意味着在 110
              亿美元估值下的投资决策需要对投资人团体的判断给予高度信任。

              终止标准是明确的三项：（1）OpenAI 宣布在 Harvey 核心市场推出直接竞争的企业级法律 AI 产品——该事件将触发对 Harvey
              模型依赖风险和竞争持久性的即时重新评估；（2）律师-客户特权通信遭受实质性数据泄露——在保密性不可妥协的行业中造成不可逆的声誉损害；（3）ARR 增速连续两个季度确认低于 50%
              CAGR——将表明市场饱和论断正在兑现。

              最终建议：对能够要求并获取审计财务报表的机构投资者（主权基金、大型成长股基金）给予有条件买入。Harvey AI 是现有最高质量的企业级法律 AI 投资标的：客户锚点卓越、市场机会真实、平台叙事可信。110
              亿美元估值激进，但对已确认 ARR 1.5 亿美元以上且增速超 100% 的标的而言并非不可辩护。条件本身毫无歧义：在未获审计 GAAP 财务报表确认营收轨迹和毛利结构之前，不应作出任何投资承诺。如确认 ARR
              1.5 亿美元以上且毛利率 75% 以上，投资论据充分；如确认 ARR 1 亿美元且毛利率 60%，估值则存在实质性高估。
