      - number: '6.2'
        title: 客户获取、扩张与留存动态
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的客户获取遵循标准企业级 B2B 模式，但有一个鲜明特点：Am Law 圈内罕见的同行引荐效应。顶级美国律所（Davis Polk）或魔术圈律所（A&O
              Shearman）公开背书后，竞争对手律所立即承压——管理合伙人对同行握有哪些技术优势了如指掌，法律 AI 已成为人才招聘（年轻律师倾向选择配备 AI 工具的律所）和客户提案（高端律所的客户会直接问律所用了哪些
              AI 工具）两条线上的差异化因素。

              试点到全面部署的转化率是衡量 Harvey 产品力最重要的指标：Dentons 从美国试点扩展至 60 多个国家；A&O Shearman 从一个办公室扩展至全球 14 个。Bloomberg Law 确认，多家
              Am Law 50 律所在 12–18 个月内完成从小型试点到全所部署的跃升。 这一扩张模式意味着试点阶段产品满意度较高，且律所管理层做出了明确的推进决定——这是企业法律软件中最难攻克的转化关口。

              Harvey AI 估计的留存率为 85–90%，低于一流企业 SaaS，但对新品类平台而言尚属合理。Reuters 和 Above the Law
              记录的负面客户反馈——集中于复杂跨司法管辖交易中的准确性问题——已导致部分使用范围收缩（从全所部署缩减至特定业务组），但无已确认的完整合同取消案例。Harvey
              的客户流失形态更像是范围压缩而非直接离场，说明核心价值主张即便在边缘场景产生摩擦时仍被保留。最大的留存风险在于并购交易量的周期性波动：Harvey 最高 ACV 客户集中于交易型律所，并购市场的实质性萎缩（如
              2022–2023 年）将对 Harvey 整个客户群的法律科技支出形成压力。
