      - number: '2.2'
        title: 市场细分与买方分析
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的市场进入策略覆盖四类买方细分市场，各具独特的采购特性：

              1. **大型律所（Am Law 100/200）**：最高价值细分市场——美国 400–500 家律所，合计收入 1,300 亿至 1,400 亿美元。律师助理计费 300–600 美元/小时，合伙人
              600–2,000 美元以上/小时。ROI 达 10:1 的 AI 工具可轻松跨越任何合理的采购门槛。委员会审批制度导致 3–9 个月的销售周期，但同时也推动律所全员铺开，而非零散个人授权。Harvey
              通过核心客户（A&O Shearman、Davis Polk）在此实现了深度渗透。

              2. **英国/欧盟 Magic Circle 律所**：声誉与计费经济学与美国大型律所相当，全球规模约 200–300 家。Harvey 与 A&O Shearman
              的合作确立了其在伦敦和欧盟的业务存在。Magic Circle 是采购特征与美国大所高度相似的自然扩张市场。

              3. **企业内部法律部门**：拥有法律运营团队的财富 500 强企业。该细分市场的 AI 采用起步较早（截至 2025 年已分配 65% 预算），且增长迅速。Harvey 与 PwC 和 EY
              的合作为其进入大型企业法律买家提供了渠道分发路径。

              4. **专业服务网络**：四大会计师事务所（PwC、EY、Deloitte、KPMG）及雇用法律专业人员的全球咨询公司。这类机构 AI 成熟度高、IT 采购基础设施完善、全球规模庞大——有助于 Harvey
              落地覆盖国际网络数千席位的企业级合同。

              中小型律所代表更长期的扩张市场；Harvey 目前聚焦大型律所，体现了蓄意为之的"落地-扩张"战略——企业级标杆客户为下游市场层次建立公信力。
