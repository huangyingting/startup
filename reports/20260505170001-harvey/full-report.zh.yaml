      - number: '5.3'
        title: 产品质量、风险与竞争地位
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的质量框架包含引文核验、高风险法律结论的有监督审阅提示以及 Agent 操作的审计追踪日志——均旨在确保即使平台处理日益自主的法律任务，律师责任也得以保留。这一设计在结构上与律师协会要求律师对
              AI 生成工作进行监督的指导方针保持一致——这防止了 Harvey 被用作完全自主的法律执业者，但对受监管的专业服务场景而言是恰当的。

              最重大的产品风险是高风险复杂交易中的准确性问题。路透社 2025 年 5 月报道，部分律所在复杂跨境交易中遭遇准确性问题，包括错误引文和对适用法律条款的错误描述。Harvey
              随即强化了引文核验并增加了人工确认提示，但 LLM 在具有法律后果的输出中产生幻觉的底层风险，仍是无法通过工程手段完全消除的技术根本性局限。

              与 Thomson Reuters CoCounsel 和 LexisNexis Lexis+ AI 相比，Harvey AI 的竞争差异化在于推理深度和 M&A 工作流优势（Harvey
              的长处），而传统巨头在实时判例法引文集成（Westlaw、LexisNexis 数据库）和深度数据库访问至关重要的受监管行业合规工作流方面居于领先。Harvey
              缺乏原生判例法数据库集成，是相对传统巨头最显著的产品短板——可通过合作或收购加以弥补，但需要付出相应努力。
            claimRefs: []
