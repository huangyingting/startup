      - number: '8.4'
        title: 展品
        blocks:
          - type: callout
            title: 有条件买入：审计财务是准入门槛
            body: >
              Harvey AI 在定性维度上很有吸引力——市场、产品、客户和投资人财团质量都非常出色。$11B 的定量投资逻辑，完全取决于 ARR 轨迹是否处在分析师估计的 $150-200M 区间，并且年增
              100%+。若确认 $150M+ ARR 和 75%+ 毛利率，以 $11B 投资虽激进但可辩护。若是 $100M ARR 和 60%
              毛利率，估值明显偏紧。成熟投资者不应在未取得经审计财务前按此估值投入资本——这是唯一不可谈判的条件。
            calloutType: recommendation
            claimRefs:
              - CV035
              - CV029
              - CV040
          - type: callout
            title: Harvey 被定价为机构资产，而不是 VC 赌注
            body: >
              以 $11B 进入时，概率加权回报为 1.7x，牛市情景下现实上限为 2.7-3x，这让 Harvey AI 更像一笔机构投资——适合 GIC、成长股权基金或大型家族办公室获取法律 AI 类别敞口，并通过
              Harvey 的精英客户基础和 Sequoia 董事会支持获得下行保护。对期望单个头寸 10x+ 回报的传统 VC 基金而言，$11B 的 Harvey
              不是合适工具——估值已经吸收了早期投资者拿到的大部分投机性上行。
            calloutType: insight
            claimRefs:
              - CV039
              - CV032
          - type: callout
            title: OpenAI 竞争入场形成概率加权折价
            body: >
              OpenAI 在 3 年内直接进入法律 AI 市场的概率为 40-50%，这是 Harvey 估值中最重要的单一风险折价。若这个概率已经计入 Harvey 的 $11B（Sequoia 和 GIC
              等成熟投资者会建模），就意味着内部人相信，即便 OpenAI 直接竞争，Harvey 的 Knowledge 护城河和平台广度也足以维持显著价值。外部投资者必须独立评估 Harvey 的切换成本是否足够耐久。
            calloutType: risk
            claimRefs:
              - CV006
