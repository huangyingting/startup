  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与可比分析
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的 $11B 估值必须放在三个参照点下评估：自身 ARR 轨迹、公开市场可比企业 SaaS 公司、以及私募市场可比 AI 独角兽估值。按估计 $100-200M
              年经常性收入（ARR）计算，Harvey 交易在 55-110x 过往 ARR——这个倍数在成熟公开市场没有直接对应（Veeva、ServiceNow、Datadog 等公开垂直 SaaS
              公司在相似增长阶段交易在 8-16x ARR），但在高增长 AI 公司增长峰值窗口中能找到先例：Snowflake IPO 时，在 124% 增长下约 100x ARR。

              核心估值问题是：Harvey 现在是否处在类似 Snowflake 的窗口，爆发式增长足以支撑异常高的 ARR 倍数；还是 $11B 已经超调，随着增长放缓会被压缩。现有证据——Sequoia
              连续三轮共同领投且具备董事会层面的 ARR 可见性、GIC 的机构尽调，以及 The Information 报道 Harvey 正在“长进估值里”——说明增长轨迹真实，但倍数处在可辩护区间的高端。基于分析师
              ARR 估计和高增长 SaaS 可比分析，对没有审计财务访问权的知情外部投资者而言，公平价值区间约为 $6-15B。

              可比 AI 独角兽估值强化了这一判断：Harvey 相对 Glean（$4.6B）和 Cohere（$5B）有 2-3x 溢价，这由 Harvey 更专注的垂直领域、更清晰的单律师
              ROI，以及更优质的企业客户质量支撑。Thomson Reuters 以 $650M 收购 Casetext（2023），约 3.25x ARR，给出了战略 M&A 底部：若按该倍数套用 Harvey 的
              $150M ARR，TR 收购将给 Harvey 约 $490M 估值——这说明 Harvey 的 $11B 相对战略 M&A 可比倍数有 22x 溢价，反映 Harvey 更高的增长率和更宽的平台广度。
