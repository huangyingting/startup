      - number: '2.3'
        title: 增长驱动因素、壁垒与竞争格局
        blocks:
          - type: paragraph
            body: >
              2024–2026 年，五大结构性力量正加速法律 AI 的采用，为 Harvey 的扩张创造有利市场环境：

              1. **盈利压力**：2023–2024 年 Am Law 100 合伙人盈利仅增长 3%–5%；律所亟需在不按比例扩编的情况下提升律师助理生产力的效率工具。

              2. **同行竞争压力**：随着 Kirkland、Davis Polk 和 A&O Shearman 公开部署 Harvey，同行律所承受采购压力——被视为技术落后的风险是强效的市场进入杠杆，制造了 FOMO
              驱动的成交紧迫性。

              3. **客户费用压力**：主要企业客户正在抵制律所计费率上调；能够减少计费工时的 AI 工具，实际上可在维持或提升每件事务所收入的同时提高客户满意度。

              4. **生成式 AI 主流化**：个人使用 ChatGPT 的律师正在推动引入律所授权工具，以同等便捷性满足专业工作所需的特权保护要求。

              5. **监管框架逐步明朗**：ABA 正式意见第 512 号（2024 年）及 NYSBA 指引（2024 年）为 AI 工具使用提供了法律框架，降低了此前阻碍采购的合规不确定性。

              主要采购障碍包括：特权泄露风险（Harvey 的 SOC 2 认证和禁止训练政策直接应对此问题）、幻觉责任（Harvey 的引文架构能缓解但无法完全消除）以及客户对特定事务使用 AI 的抵触情绪。LLM
              商品化是中期风险——若通用模型在法律领域的准确性与 Harvey 微调方案持平，则价格优势将受压缩；但 Harvey 深度的工作流集成与企业信任关系，即使在底层模型质量趋同后仍能形成持久的转换成本。
