  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 处在两个监管最重的领域交汇处：人工智能（EU、美国、UK 的监管都在加强）和法律执业（每个司法辖区都由律师协会监管）。EU AI Act 可能将法律 AI 工具归类为“高风险 AI
              系统”，这是近期最重的监管负担：如果 Harvey 必须为所有 EU 部署满足强制合格评定、技术文档要求和强制人工监督义务，合规成本会明显上升，也可能推迟 EU 市场的产品发布。Harvey 的 UK Magic
              Circle 客户（A&O、Freshfields）和全球网络客户（Dentons）同时受 EU 与 UK 监管框架约束。

              ABA 的 Formal Opinion 512（2024）以及 California、New York 等主要法律市场的州律师协会指引，确立了清晰框架：律师对所有 AI
              生成输出承担个人责任，并且必须按照胜任义务监督 AI 使用。Harvey 的设计与该框架一致（所有输出都要求律师审阅），但涉及 AI 幻觉的律师制裁案例越来越多（包括里程碑式的 Mata v. Avianca
              案），给包括 Harvey 在内的所有法律 AI 工具留下声誉阴影。任何归因于 Harvey 输出、且发生在重大案件中的高调准确性失败，都可能触发行业重新评估法律 AI 采用。

              截至 May 2026，Harvey AI 未披露重大法律程序。法律风险清单基于法律 AI 行业的系统性风险——AI 训练数据版权暴露、非律师场景下的未授权法律执业风险、全球部署中的 GDPR
              合规复杂性，以及未来 FTC 可能对法律服务中的 AI 进行监督。Harvey 来自训练数据的版权风险（与针对其他 AI 公司的案件类似）是更长期的暴露，取决于法院如何裁决目前正在推进的 AI 训练数据版权争议。
