      - number: '5.2'
        title: 技术架构与工程深度
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的技术架构是多模型系统，以 OpenAI 的 GPT-4 系列作为主要推理引擎，辅以 Anthropic Claude 处理需要长上下文窗口的任务，并越来越多接入 Harvey
              自研的法律基础模型。CTO Gabriel Pereyra（DeepMind、Google Brain 前员工）自 2024 起大幅投入自有模型开发；The Information 在 August 2025
              报道，Harvey 正在构建法律领域基础模型，以降低 OpenAI API 依赖，并提高合同条款抽取、法律引用验证等专门任务的准确率。

              Harvey 在大型法律语料（合同、判例法、监管文件）上的领域微调，使其在法律推理任务上明显优于基础 GPT-4；Stanford 的 LegalBench
              基准框架改进表现验证了这一点。律所级定制层（Harvey Knowledge）增加第二层个性化；随着更多律师使用系统，并通过使用模式贡献隐性反馈，这一层会随时间复利。

              集成架构（Harvey Ecosystem）把 Harvey 嵌入企业法律技术栈：iManage 和 NetDocuments 集成确保 Harvey 可访问律所 DMS
              中的文档，无需手动上传；Microsoft Word 和 Outlook 插件让律师在主要工作环境中使用 Harvey，降低采用摩擦。这种集成深度是通用 AI 工具没有的产品优势，也会为已把 Harvey
              集成进工作流的律所制造切换成本。

              Harvey AI 的安全基础设施——SOC 2 Type II 认证、符合 GDPR 的 EU 数据驻留、Vault 的加密向量存储，以及严格不使用客户数据训练的政策——处理了企业律所最初不愿采用 AI
              的核心顾虑。公司部署在 AWS 和 Azure 上，并为美国、EU 和 UK 市场提供数据驻留选项；缺少完全本地部署，限制了 Harvey 面向政府法律部门和部分有严格数据驻留要求的欧洲律所的可服务市场。
