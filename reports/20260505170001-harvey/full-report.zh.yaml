  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 具名客户基础与市场渗透
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的企业客户基础横跨三类市场，并在三类中都有已确认客户。在大型律所，Harvey 已与 Davis Polk & Wardwell（按收入位列美国前 10
              律所，也是全球最负盛名的交易律所之一）、Freshfields Bruckhaus Deringer（UK Magic Circle）和 Gunderson Dettmer（领先的初创公司和 VC
              律所）建立合作。Gunderson 关系具有战略意义：Harvey 的 VC 投资人（Sequoia、a16z）使用 Gunderson
              作为其投资组合公司的外部法律顾问，让投资人关系与客户关系形成罕见的紧密对齐。

              Harvey 的全球法律网络足迹由两项旗舰部署锚定：A&O Shearman 覆盖 14 个全球办公室，Dentons 覆盖全球 60+ 个国家办公室。这两项关系证明 Harvey
              有能力在多语言、多司法辖区、全球律所最高复杂度的企业环境中运行。A&O Shearman 报告的成果（每名律师每周节省 3-5 小时、M&A 合同审阅时间减少 40-50%）提供了 Harvey
              企业价值主张最清晰的公开 ROI 证据。

              专业服务细分又加入 PwC 和 EY，它们既是直接客户，也可能成为渠道分销伙伴：四大部署将 Harvey 用于法律、税务和咨询 工作流，不限于纯法律研究，证明 Harvey 可适应专业服务场景。截至 late
              2025，Harvey 声称拥有 100+ 律所客户，但只有 8-10 个具名客户通过新闻稿确认——这符合典型企业软件市场进入动作：公开锚点账户，长尾客户不逐一宣布。
