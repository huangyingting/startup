    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与创立
        blocks:
          - type: paragraph
            body: >
              Harvey AI Corporation 是一家位于 San Francisco 的法律人工智能公司，late 2022 由 Winston Weinberg 和 Gabriel Pereyra
              创立。Weinberg 曾在 Goldman Sachs 执业，深懂法律工作流，创始人与市场匹配度罕见；Pereyra 来自 Google Brain 和
              DeepMind，带来前沿机器学习研究能力。两人组成的领导组合资历很特别，适合在高风险法律场景里做 AI：幻觉风险、保密特权保护和职业责任会抬高采购门槛，通用 AI 工具跨不过去。

              Harvey 的产品是面向律所和专业服务公司的 AI 平台。平台覆盖六个核心模块：Harvey Assistant（面向法律任务的 AI 聊天）、Harvey Vault（安全文档存储和批量分析）、Harvey
              Knowledge（覆盖判例法、法规和税务领域的法律研究）、Harvey Workflow Agents（智能体式多步骤任务自动化）、Harvey Mobile（移动访问）和 Harvey Ecosystem（与
              iManage、Microsoft 365、Clio、HighQ、NetDocuments 集成）。公司在 2025 推出 Harvey Agents，标志着战略从问答式 AI
              转向完整的智能体式法律工作流自动化：系统能规划、在任务中途调整，并与律师互动以完成复杂事项。

              Harvey AI 在 2023 获得 OpenAI Fund 早期支持，因此在 GPT-4 公开发布前就拿到优先访问。此后，Harvey
              搭建了自有法律领域训练栈，以及基于引用的响应架构，目标是达到律师级问责——这让它有别于通用 LLM；后者缺少专业法律工作所需的幻觉防护和保密特权保护。公司已通过 SOC 2 Type II
              认证，并且不使用客户数据训练。
