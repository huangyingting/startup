      - number: '8.4'
        title: 数据亮点
        blocks:
          - type: callout
            title: 有条件买入：审计财务报表是先决条件
            body: >
              Harvey AI 在定性维度上是令人信服的投资标的——市场、产品、客户以及投资人团体质量均属一流。110 亿美元下的定量论据完全取决于 ARR 轨迹是否落在分析师估算的 1.5–2 亿美元区间、且年增速超
              100%。如确认 ARR 1.5 亿美元以上且毛利率 75% 以上，110 亿美元下的投资激进但可辩护。如 ARR 仅 1 亿美元且毛利率
              60%，估值则存在实质性高估。任何成熟投资者在未事先获取审计财务报表的情况下，不应在此估值下投入资本——这是唯一不可妥协的条件。
            calloutType: recommendation
            claimRefs:
              - CV035
              - CV029
              - CV040
          - type: callout
            title: Harvey 被定价为机构资产，而非风险投资赌注
            body: >
              以 110 亿美元入场，概率加权回报 1.7 倍、牛市上限 2.7–3 倍，Harvey AI 是一项机构投资——适合 GIC、成长股基金或大型家族办公室，寻求以 Harvey 精英客户群和 Sequoia
              董事会支持作为下行保护、获取法律 AI 品类敞口。对于期望单笔仓位达 10 倍以上回报的传统 VC 基金，Harvey 在 110 亿美元下并非合适的投资工具——估值已消化了早期投资者获得的大部分投机上行空间。
            calloutType: insight
            claimRefs:
              - CV039
              - CV032
          - type: callout
            title: OpenAI 竞争入场构成概率加权折扣
            body: >
              OpenAI 在 3 年内直接进入法律 AI 市场的概率为 40–50%，是 Harvey 估值中最重要的单一风险折扣。若这一概率已被 Harvey 的 110 亿美元所消化（Sequoia 和 GIC
              等成熟投资者应已建模），则意味着内部人士相信，即便 OpenAI 直接竞争，Harvey 的知识护城河和平台广度也足以维持相当大的价值。外部投资者须独立评估 Harvey 的迁移成本是否足够持久，以支撑上述判断。
            calloutType: risk
            claimRefs:
              - CV006
              - CV008
              - CV037
