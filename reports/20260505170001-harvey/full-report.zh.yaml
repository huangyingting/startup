  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 运营于两大监管最严格领域的交叉处：人工智能（在欧盟、美国和英国监管日趋收紧）与法律执业（每个司法管辖区均由律师公会监管）。欧盟《人工智能法案》将法律 AI 工具列为"高风险 AI
              系统"的潜在分类是最显著的近期监管压力：若 Harvey 须就所有欧盟部署完成强制合规评估、技术文档要求及强制人工监督义务，将带来实质性的合规成本，并可能延迟在欧盟市场的产品发布。Harvey
              的英国魔术圈客户（A&O、Freshfields）和全球网络客户（Dentons）须同时遵守欧盟和英国双重监管框架。

              ABA 2024 年 Formal Opinion 512 及加利福尼亚州、纽约州等主要法律市场的州律师公会指引确立了清晰框架：律师对所有 AI 生成输出承担个人责任，须按其胜任义务监督 AI
              的使用。Harvey 的设计与此框架一致（要求律师审查所有输出），但涉及 AI 幻觉的律师处分案件不断增多——包括标志性的 Mata v. Avianca 案——为所有法律 AI 工具（包括
              Harvey）积累了声誉风险。Harvey 输出一旦在重大案件中引发高知名度的准确性事故，可能触发行业范围内对法律 AI 采用的重新评估。

              截至 2026 年 5 月，Harvey AI 未披露任何重大法律程序。法律风险清单基于法律 AI 行业的系统性风险——AI 训练数据版权风险、非律师使用场景中的非法律执业风险、全球部署的 GDPR
              合规复杂性，以及潜在的未来 FTC 对法律服务 AI 的监管。Harvey 的训练数据版权风险（类似于其他 AI 公司面临的案件）属于长期敞口，最终取决于法院如何裁决目前仍在审理中的 AI 训练数据版权争议。
