      - number: '7.4'
        title: 展品
        blocks:
          - type: callout
            title: OpenAI 入场是 Harvey 最大的生存风险
            body: >
              Harvey 最关键的风险场景，是 OpenAI 决定直接竞争企业级法律 AI——把 Harvey 等价产品打包进 OpenAI Enterprise，并以显著更低成本提供。OpenAI 已经构建驱动
              Harvey 的 GPT 模型；一旦进入法律市场，Harvey 最大的成本优势（有利 API 访问）会被拿走，同时 OpenAI 还能利用既有企业销售关系。Harvey 的防线必须落在 Harvey
              Knowledge 个性化层上；没有相同的律所特定数据，OpenAI 无法复制它。但这道护城河需要在每个客户处花 12-24 个月建立。
            calloutType: risk
            claimRefs:
              - CR006
              - CR016
              - CR025
          - type: callout
            title: 数据泄露将是灾难性且不可逆的
            body: >
              不同于多数 SaaS 安全事件，Harvey AI
              一旦发生数据泄露、暴露律师-客户特权通信，无法靠标准补救措施恢复。律师-客户特权是法律系统保密承诺的基础；法院和律师协会别无选择，只能迫使受影响客户在进行中的诉讼里向对方披露泄露事件，给对手创造诉讼优势，并让被攻破律所的律师面临职业不当行为调查。Harvey
              的安全投入必须把防止数据泄露作为绝对优先级，而不是合规勾选项。
            calloutType: risk
