      - number: '8.3'
        title: 尽调缺口、否决标准与最终建议
        blocks:
          - type: paragraph
            body: >
              Harvey AI 最大的尽调缺口，是完全没有经审计的 GAAP 财务报表。本章所有估值分析都依赖分析师估计，误差带可能超过 50%。$11B 是 Harvey
              融资过程中由知情内部投资者（Sequoia，具备董事会层面的 ARR 可见性）给出的市场出清价格——但外部投资者若不把经审计财务作为前置条件，就无法独立验证 ARR
              轨迹。在私营公司语境下，这不是致命缺陷，但意味着在 $11B 做投资决策，需要高度信任投资人财团的判断。

              否决标准是二元的：（1）OpenAI 在 Harvey 核心市场宣布直接面向企业的法律 AI 产品——该事件会立即触发对 Harvey
              模型依赖风险和竞争耐久性的重新评估；（2）发生重大数据泄露，暴露律师-客户特权通信——在保密性不可谈判的职业里，声誉损害不可逆；（3）ARR 增长连续两个季度确认低于 50%
              CAGR——这将表明市场饱和论正在兑现。

              最终建议：适合能够要求并取得经审计财务作为前置条件的机构投资者（主权基金、大型成长股权基金）有条件买入。Harvey AI 是当前质量最高的企业级法律 AI
              投资标的：锚定客户极强、市场机会真实、平台故事可信。$11B 估值激进，但若确认 ARR 为 $150M+ 且年增 100%+，并非不可辩护。条件部分非常明确：在没有经审计 GAAP
              财务确认收入轨迹和毛利率结构前，不应承诺投资。若确认 $150M+ ARR 和 75%+ 毛利率，投资逻辑强；若确认 $100M ARR 和 60% 毛利率，估值明显偏紧。
            claimRefs: []
