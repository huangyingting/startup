        title: 展项
        blocks:
          - type: callout
            title: 没有经审计财务是核心尽调风险
            body: >
              Harvey AI 完全没有公开财务披露，这是任何投资人或收购方最重要的风险因素：所有估值分析都建立在无法独立审计的投资人联盟数据之上。$11B 这个数字由 Harvey 自身融资流程定出，不是市场力量或
              GAAP 收入倍数给出的。任何严肃尽调都应把经审计 GAAP 财务作为继续推进的前置条件，尤其聚焦毛利率（验证模型 API 成本结构）和净美元留存率（验证扩张收入主张）。
            calloutType: risk
            claimRefs:
              - CI033
              - CI013
              - CI020
          - type: callout
            title: Sequoia 第三次联合领投是目前最强收入验证
            body: >
              对无法接触 Harvey 内部财务的外部投资人来说，Sequoia 连续三轮联合领投，是公开可得的最可信信号：ARR 增长真实且正在加速。Sequoia 能在董事会层面看到 Harvey
              的实际收入指标；公司愿意把仓位加到三倍——内部也承认这不寻常——相当于 Pat Grady 在说：这些数字支撑这份信念。GIC 主权基金以 $11B 共同投资，提供了第二个机构验证信号。
            calloutType: insight
