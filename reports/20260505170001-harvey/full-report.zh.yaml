      - number: '7.4'
        title: 数据亮点
        blocks:
          - type: callout
            title: OpenAI 直接入场是 Harvey 最大的生存威胁
            body: >
              Harvey 面临的最关键风险场景：OpenAI 决定直接进军企业法律 AI 市场，将与 Harvey 同等的产品以大幅低价打包进 OpenAI Enterprise。OpenAI 已在构建驱动 Harvey 的
              GPT 模型；一旦进入法律市场，既能剥夺 Harvey 最大的成本优势（优惠 API 访问权），又能调动 OpenAI 现有的企业销售关系。Harvey 的防线必须落脚于 Harvey Knowledge
              个性化层——这是 OpenAI 在没有同等律所专属数据的情况下无法复制的优势——但在每个客户侧建立这一护城河需要 12–24 个月。
            calloutType: risk
            claimRefs:
              - CR006
              - CR016
              - CR025
          - type: callout
            title: 数据泄露将是灾难性且不可逆的
            body: >
              与大多数 SaaS 安全事件不同，Harvey AI
              若发生泄露律师-客户特权通信的数据安全事故，无法通过标准补救措施恢复。律师-客户特权是法律体系保密保证的基石；法院和律师公会将别无选择，强制要求受影响客户在进行中的诉讼中向对方披露泄露事实，这将为对手提供诉讼优势，并引发对受影响律所律师的职业不当行为调查。Harvey
              的安全投入必须将数据泄露防护视为绝对优先事项，而非合规清单上的一个勾项。
            calloutType: risk
