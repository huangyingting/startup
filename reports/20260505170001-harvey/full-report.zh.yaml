              Harvey AI 最高 ACV 客户几乎清一色是交易型律所（并购、资本市场、私募股权）。并购低谷期（如 2022–2023 年全球交易量下滑超
              40%），律所会大幅削减人员和可自由支配的技术支出。若类似下行周期在 Harvey 对 Am Law 100 渗透率仅达 20–30% 时出现，而非其所需的主导地位，营收冲击可能极为严峻。Harvey
