      - number: '7.3'
        title: 合作伙伴、人员与执行风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 对 OpenAI API 的依赖是其最核心的结构性风险：约 60–70% 的模型推理通过 OpenAI 路由，在定价、服务连续性和竞争风险三个维度形成单一供应商集中。Harvey
              的应对路径——开发专有法律基础模型——是正确的战略选择，但距离形成有意义的模型独立性还需 2–4 年。在此期间，Harvey 高度暴露于 OpenAI 的商业决策，包括 OpenAI 直接进入法律 AI
              市场的可能性。

              Harvey AI 的关键人员风险显著但可控：CEO Winston Weinberg 和 CTO Gabriel Pereyra 是公司最核心的人员，但 Harvey 已构建足够的团队纵深（150–250
              名工程师），创始人离职不会导致公司立即崩溃——更大的风险在于：大型企业客户的合作决策部分建立在与 Harvey 领导层的信任关系之上，创始人持续在位本身是重要的信心信号。

              Harvey 向大型律所交易业务之外扩张的执行风险是实质性的：产品针对 Am Law 100
              并购部署做了优化，向诉讼、政府、企业法务和中小律所市场扩张，需要在产品和市场拓展策略上做出有意义的调整。缓解并购周期性风险的举措（扩张至周期性较低的细分市场）战略方向正确，但在运营层面颇为复杂——Harvey
              须同时服务具有不同工作流、IT 基础设施和价格敏感度的多类客户群。
