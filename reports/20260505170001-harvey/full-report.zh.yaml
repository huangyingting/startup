      - number: '5.4'
        title: 展项
        blocks:
          - type: callout
            title: Harvey Knowledge 是最深的竞争护城河
            body: >
              Harvey 的律所画像个性化层（Knowledge）在结构上是最可防守的产品元素：一旦律所把多年自有先例、备忘录和内部研究摄入 Harvey
              Knowledge，换成竞争对手就必须在别处重建这套机构记忆——每处理一次查询，切换成本都会上升。目前没有竞争对手能在企业规模上提供同等的律所专属知识库定制，这让 Harvey 在该维度上可能拥有 2-3
              年优势。
            calloutType: strength
            claimRefs:
              - CE001
              - CE021
              - CE025
          - type: callout
            title: OpenAI 依赖是主要技术风险
            body: >
              估计 Harvey AI 60-70% 的模型推理通过 OpenAI APIs 路由，带来三维风险：（1）定价风险——OpenAI 可以提高 API 价格，压缩 Harvey
              毛利率；（2）竞争风险——OpenAI 正在打造自己的企业法律 AI 产品，并可能最终直接与 Harvey 竞争；（3）服务中断风险——OpenAI 大规模宕机会让 Harvey 核心产品瘫痪。Harvey
              投入自有法律模型是正确的战略回应，但按当前开发速度，模型独立还需要 2-4 年。
