      - number: '8.2'
        title: 投资论点、情景与回报分析
        blocks:
          - type: paragraph
            body: >
              以 $11B 投资 Harvey AI 的论点，建立在其对一个巨大且渗透不足市场的类别领导上：全球法律服务 AI 总可用市场（TAM）为 $50-100B+，Harvey 目前获取的理论 TAM 不到
              0.5%。精英锚定客户（Am Law 10、UK Magic Circle、Big 4）、包含六个独立产品模块的平台，以及随时间推高切换成本的 Harvey Knowledge 层，共同使 Harvey
              成为当前最有吸引力的法律 AI 投资标的。Andreessen Horowitz 认为 Harvey 10 年内可能成为 $50-100B 公司，这一判断虽带投机性，但建立在法律服务市场规模之上。

              不过，回报情景没有绝对机会那么令人兴奋：基础情景（2028-2029 年 $450-680M ARR、20x 退出倍数）下，Harvey 若以 $15B 退出，从 $11B 进入仅意味着 1.4x
              回报——低于典型机构回报门槛。牛市情景（$800M+ ARR、$30B 退出）给出 2.7x 回报——对主权基金或大型机构尚可，但低于典型 VC 预期。熊市情景（$300M ARR、$8B M&A 退出）是
              30% 资本损失。概率加权期望值（1.7x）表明，Harvey 被定价为一个适度上行的优质资产，而不是风险投资式彩票。

              GIC 的共同投资逻辑，是最清晰的机构信号：主权财富基金配置资本时，预期回报低于风险基金，但期限更长；GIC 与 Sequoia 一起在 $11B 投资，说明机构整体对 Harvey
              财务轨迹的信心足以支撑长期机构资本部署，在 7-10 年周期内追求 1.5-2.5x 预期回报——这与上述基础和牛市情景分析一致。
