  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与可比分析
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的 110 亿美元估值须参照三个锚点评估：自身 ARR 轨迹、公开市场可比企业 SaaS 公司，以及私有市场可比 AI 独角兽估值。以估计 ARR 1–2 亿美元计，Harvey 当前交易于
              55–110 倍追溯 ARR——这一倍数在成熟公开市场没有直接对标（Veeva、ServiceNow、Datadog 等上市垂直 SaaS 公司在类似增长阶段的 ARR 倍数为 8–16 倍），但在高增长 AI
              公司的峰值增长窗口内有先例：Snowflake 在 124% 增速下以约 100 倍 ARR 完成 IPO。

              核心估值问题在于：Harvey 目前是否处于 Snowflake 式的窗口期——极高 ARR 倍数由爆炸性增长支撑——还是 110 亿美元代表了一个随增速放缓而将被压缩的高估。现有证据——Sequoia
              共同领投三轮并具备董事会层面的 ARR 可见度、GIC 的机构级尽职调查，以及 The Information 报道 Harvey
              正在"成长进入其估值"——显示增长轨迹是真实的，但倍数已处于可辩护区间的高端。基于分析师 ARR 估算和高增长 SaaS 可比分析，未获审计财务数据的外部投资者合理价值区间约为 60–150 亿美元。

              可比 AI 独角兽估值印证了上述判断：Harvey 对 Glean（46 亿美元）和 Cohere（50 亿美元）享有 2–3 倍溢价，原因在于其更专注的垂直定位、更清晰的单律师 ROI
              以及更优质的企业客户。Thomson Reuters 以 6.5 亿美元收购 Casetext（2023 年，约 3.25 倍 ARR）提供了战略并购的下限：以该倍数乘以 Harvey 1.5 亿美元
              ARR，TR 的并购估值约为 4.9 亿美元——这说明 Harvey 的 110 亿美元相较战略并购可比倍数存在 22 倍溢价，反映了其更高增速和平台广度。
