      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的竞争优势在工作流自动化和智能体式任务执行上最强——Harvey Agents（2025 推出）提供“计划—调整—交互”的多步骤法律自动化，Thomson Reuters CoCounsel
              和 LexisNexis Lexis+ AI 还没追上。

              但在法律研究和数据库完整性上，Harvey AI 有结构性劣势：Westlaw（Thomson Reuters）和 Lexis（LexisNexis）拥有 150+
              年注释法律内容、编辑撰写的判例摘要和专有案例总结；Harvey 的训练数据无法复制同样数十年的法律编辑投入。重度依赖判例研究的律所不太可能用 Harvey 取代
              Westlaw/Lexis——它们会两边都用（多栖使用）。

              Harvey 最可防守的差异化在于：（1）智能体式工作流自动化（Harvey Agents）；（2）保密特权保护数据架构（不训练政策、SOC 2 Type II）；（3）全平台范围（6
              个集成模块，而不是单任务工具）；（4）律师满意度得分——在独立律师调查中，Harvey 在复杂推理任务质量上持续得分最高。

              Harvey 暴露最明显的竞争维度，是标准法律研究所需的原始数据库完整性。律师问 Harvey“找到所有关于 X 的案例”时，答案可能不如 Westlaw 的注释搜索结果——不过 Harvey 的 AI
              综合回答可能围绕它找到的案例给出更好的上下文。
