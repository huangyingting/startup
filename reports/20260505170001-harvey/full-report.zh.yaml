      - number: '7.3'
        title: 伙伴、人员与执行风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 对 OpenAI API 的依赖是最结构性的风险：约 60-70% 的 Harvey 模型推理经由 OpenAI，形成定价、服务连续性和竞争风险上的单一供应商集中。Harvey
              的缓释路径——开发自有法律基础模型——是正确的战略回应，但距离形成有意义的模型独立性还需要 2-4 年。过渡期内，Harvey 对 OpenAI 的商业决策高度暴露，包括 OpenAI 直接进入法律 AI
              市场的可能性。

              Harvey AI 的关键人物风险显著但可控：CEO Winston Weinberg 和 CTO Gabriel Pereyra 是公司最关键人员，但 Harvey 已经建立了足够的团队厚度（150-250
              名工程师），创始人离开不会立刻让公司失效——更大的风险，是创始人连续性向大型企业客户传递的信心信号消失；这些客户的合作决策部分基于对 Harvey 管理层的关系信任。

              Harvey 从大型律所交易型工作向外扩张时，执行风险实质存在：产品针对 Am Law 100 M&A 部署优化，进入诉讼、政府、企业法务和小型律所细分市场，需要重要的产品和商业化调整。缓释 M&A
              周期性风险的路径（扩张到周期性更低的细分市场）在战略上正确，但运营上复杂，要求 Harvey 同时服务工作流、IT 基础设施和价格敏感度都不同的客户画像。
