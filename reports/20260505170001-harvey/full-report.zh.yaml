  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心产品平台与模块架构
        blocks:
          - type: paragraph
            body: >
              Harvey AI 已从单一 AI 法律助手演进为覆盖六条核心产品线的多模块企业平台。Harvey Assistant 仍是入口：一个对话式 AI 界面，覆盖五个主要执业领域（M&A、诉讼、合规、公司和
              IP）的法律研究、文档总结、合同起草、监管分析和诉讼准备。律师可通过网页界面访问，也可通过把 AI 辅助直接嵌入文档起草的 Microsoft Word 插件，以及用于邮件式法律查询的 Outlook
              集成来使用。

              Harvey Vault 将平台延伸到文档审阅和尽职调查：律师可以上传交易资料室或事项文件，围绕 Harvey 的标准立场库执行 AI 原生合同审阅、条款抽取、风险标记和条件跟踪。不同于传统 eDiscovery
              平台（Relativity、Everlaw），Vault 专为交易工作流而不是大规模文档生产打造——聚焦范围让它在 M&A 和资本市场场景中具备更高准确率。

              Harvey Knowledge 加入律所专属智能：它摄取律所自有先例文档、内部备忘录和研究笔记，形成私有组织记忆层。律师可以问：“我们 New York M&A
              团队过去在重大不利变化条款上接受过哪些立场？”——AI 输出由律所特有的机构知识落地，而不只是一般法律原则。从竞争护城河看，这是 Harvey 最可防守的产品，因为每家律所的 Knowledge
              知识库都会变得独一无二。

              Harvey Agents（October 2025
              推出）是最重要产品进展：它支持自主多步骤工作流，可独立执行一连串法律任务——审阅一组协议中的监管标记、抽取特定条款、与标准立场比较并生成摘要备忘录——无需律师在每一步输入。Agents
              包含审计轨迹日志，记录每个已执行动作；在 AI 动作必须可审计的法律问责专业服务环境中，这是关键功能。
