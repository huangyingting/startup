chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司概况与创立背景
        blocks:
          - type: paragraph
            body: >
              Harvey AI Corporation 是一家总部位于旧金山的法律人工智能公司，由 Winston Weinberg 和 Gabriel Pereyra 于 2022 年底联合创立。Weinberg
              曾在高盛担任执业律师，对法律工作流有深刻理解，具备罕见的创始人与市场契合度；Pereyra 来自 Google Brain 和
              DeepMind，具备前沿机器学习研究功底。两人共同构成一个资历独特的领导组合，专为高风险法律场景打造 AI——幻觉风险、特权保护与职业责任所构筑的采购壁垒，正是通用 AI 工具难以跨越的门槛。

              Harvey 的产品是专为法律及专业服务机构打造的 AI 平台，涵盖六大核心模块：Harvey Assistant（法律任务 AI 助手）、Harvey Vault（安全文档存储与批量分析）、Harvey
              Knowledge（跨判例法、法规及税务领域的法律研究）、Harvey Workflow Agents（多步骤任务智能体自动化）、Harvey Mobile（移动端访问）及 Harvey Ecosystem（与
              iManage、Microsoft 365、Clio、HighQ、NetDocuments 的集成）。2025 年，公司正式推出 Harvey Agents，标志着战略转型——从问答式 AI
              迈向全面的智能体法律工作流自动化，可自主规划、任务中途调整并与律师协作完成复杂事务。

              Harvey AI 于 2023 年获得 OpenAI Fund 的早期支持，在 GPT-4 公开发布前即获得优先访问权。此后，Harvey
              构建了专有的法律领域训练技术栈和以引文为基础的响应架构，专为律师级别的责任追溯而设计——与缺乏幻觉防护和特权保护的通用 LLM 形成本质区别。公司已通过 SOC 2 Type II
              认证，且不将客户数据用于模型训练。
