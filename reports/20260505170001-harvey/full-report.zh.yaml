  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 法律 AI 市场定义与规模测算
        blocks:
          - type: paragraph
            body: >
              法律 AI 市场涵盖将人工智能应用于法律专业人员工作任务的软件工具，包括法律研究、合同分析、文件起草、尽职调查、证据收集及工作流自动化。截至 2025 年，该市场可从三个层面加以理解。

              从最宏观层面看，全球法律服务市场年创收约 9,500 亿至 1 万亿美元，其中美国市场规模为 3,500 亿至 4,000 亿美元。历史上，AI 软件工具通常能获取服务市场收入的 0.5%–1%
              作为软件订阅收入；若渗透率达到 1%–3%，法律 AI 的可触及市场规模将达到每年 90 亿至 300 亿美元。更为保守的近期估算——仅限于当前 AI 专项工具类别——将法律 AI TAM 定于 2024 年的
              14 亿至 20 亿美元，并以 20%–35% 的复合年增长率增长至 2030 年的 70 亿至 150 亿美元（因分析方法不同而有所差异）。

              Harvey AI 的可服务市场（SAM）由以下部分构成：（1）Am Law 100/200 律所（合计收入约 1,300 亿美元，拥有 6 万至 8 万名计费率最高的律师）；（2）英国 Magic Circle
              及欧盟全球律所（约 200–300 家）；（3）财富 500 强企业内部法律部门（市场规模约 500 亿至 1,000 亿美元）。假设 Harvey 拥有 5 万个席位、每席年费 5,000–15,000
              美元，仅上述细分市场的 SAM 即超过 5 亿至 7.5 亿美元 ARR——以 Harvey 当前增速完全可及。
