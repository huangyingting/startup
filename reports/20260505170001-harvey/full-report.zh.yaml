          - type: callout
            title: 结构性壁垒真实存在，但 Harvey 的架构直接针对性应对
            body: >
              三大主要法律 AI 采用障碍（特权泄露、幻觉责任、律师协会合规）并非泛泛的技术采用摩擦，而是法律行业特有的具体风险，需要针对性的产品解决方案。Harvey 的 SOC 2 Type II
              认证和禁止训练政策直接应对特权风险；引文架构降低幻觉责任；企业定价模型与合规文档则为 ABA 及律师协会合规审查提供支撑。这些不是产品功能——而是进入大型律所采购的门槛，Harvey
