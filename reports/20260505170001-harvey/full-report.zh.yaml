      - number: '1.4'
        title: 展项
        blocks:
          - type: callout
            title: 13 个月内估值增长 3.7x，显示类别定义者地位
            body: >
              Harvey AI 在约 13 个月（February 2025 至 March 2026）从 $3B 升至 $11B，是企业软件史上最激进的估值跃迁之一。不同于许多以膨胀倍数融资的 AI 初创公司，Harvey
              的重复投资人（Sequoia 联合领投三轮）说明增长扎根于真实的年经常性收入（ARR）动能。GIC 主权财富基金以 $11B 共同投资尤其关键——这类机构资本通常需要收入表现支撑入场价格，而不只是增长潜力。
            calloutType: strength
            claimRefs:
              - CO003
              - CO004
              - CO027
          - type: callout
            title: Winston Weinberg 的法律背景是核心护城河
            body: >
              多数面向法律的 AI 公司由工程师或产品经理创立，他们从外部学习法律领域。Winston Weinberg 曾在 Goldman Sachs 执业，这给 Harvey
              带来罕见的创始人与市场匹配：他直接知道律师需要什么、害怕什么（职业过失、保密特权泄露），也知道法律工作流如何运转。这种内部视角塑造了 Harvey
              的保密特权保护架构和基于引用的响应系统——在信任是首要采购标准的市场里，这些功能推动企业信任。
            calloutType: strength
            claimRefs:
              - CO011
              - CO017
              - CO010
          - type: callout
            title: ABA 和监管不确定性是真实风险
            body: >
              法律 AI 市场面临实质监管风险：ABA Formal Opinion 512（2024）处理了使用 AI 工具时的保密问题，但没有全面解决律师胜任义务、无授权法律执业或幻觉责任等问题。随着 Harvey
              的智能体产品走向自动化法律工作成果（不只是辅助起草），州律师协会可能提出新要求，抬高 Harvey 的合规成本，或限制某些自动化工作流。Harvard Law
              Review（2025）将幻觉责任和无授权法律执业列为法律 AI 平台两大最重要监管暴露。
            calloutType: risk
            claimRefs:
