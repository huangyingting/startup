      - number: '8.2'
        title: 投资逻辑、情景预测与回报分析
        blocks:
          - type: paragraph
            body: >
              Harvey AI 在 110 亿美元估值下的投资逻辑，建立在一个巨大、渗透率极低的市场中的品类领导地位上：全球法律服务 AI TAM 超过 500–1000 亿美元，Harvey 目前占理论 TAM 不足
              0.5%。精英客户锚点（Am Law 10、英国魔术圈、四大）、六个独立产品模块构成的平台，加上随时间持续增加迁移成本的 Harvey Knowledge 层，使 Harvey 成为现有最具吸引力的法律 AI
              投资标的。Andreessen Horowitz 认为 Harvey 在 10 年内可成为 500–1000 亿美元公司的论断虽属推测，但确有法律服务市场规模的支撑。

              然而，回报情景不如绝对机会那么令人兴奋：基准情景下（2028–2029 年 ARR 4.5–6.8 亿美元，20 倍退出倍数），Harvey 以 150 亿美元退出，从 110 亿美元入场仅获 1.4
              倍回报——低于典型机构回报门槛。牛市情景（ARR 8 亿美元以上，300 亿美元退出）带来 2.7 倍回报——对主权基金或大型机构投资者尚属合理，但低于 VC 典型预期。熊市情景（ARR 3 亿美元，80
              亿美元并购退出）意味着 30% 的本金亏损。概率加权期望值（1.7 倍）表明 Harvey 被定价为具有适度上行空间的优质资产，而非风险投资式的彩票。

              GIC 的联合投资理由是最具说明意义的机构信号：主权财富基金以低于 VC 的预期回报部署资本，但持有期更长；GIC 与 Sequoia 共同在 110 亿美元估值下投资，说明两家机构联合对 Harvey
              财务轨迹的信心，足以支持以 1.5–2.5 倍预期回报、7–10 年周期部署长期限机构资本——与上述基准及牛市情景分析一致。
