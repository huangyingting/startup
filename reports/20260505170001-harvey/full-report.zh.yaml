            body: >
              Harvey AI 在约 13 个月内（2025 年 2 月至 2026 年 3 月）估值从 30 亿美元攀升至 110 亿美元，堪称企业软件史上最激进的估值跃升之一。与许多以虚高倍数融资的 AI
              初创公司不同，Harvey 的复投股东（Sequoia 三度联合领投）表明其增长以真实的 ARR 动能为支撑。GIC 主权财富基金以 110
              亿美元估值跟投尤为关键——此类机构资本通常要求有经得起检验的收入表现来支撑入场价格，而非仅凭增长潜力。
