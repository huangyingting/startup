      - number: '3.4'
        title: 展项
        blocks:
          - type: callout
            title: Thomson Reuters CoCounsel 是 Harvey 最危险的竞争对手
            body: >
              Thomson Reuters 不是坐在方向盘前睡着的典型既有巨头：公司花 $650M 收购 Casetext，几个月内推出 CoCounsel，并正在把 AI 部署到既有 Westlaw
              客户基础（全球最大的法律数据库安装基础）中。CoCounsel 通过 Westlaw 续约对话获得分销优势，结构上很强——它不需要新的企业销售，只是现有订阅上的功能升级。Harvey
              的防守不是比拼数据库深度（Westlaw 永久胜出），而是拿下 Thomson Reuters 尚未做出可比能力的智能体式工作流自动化类别。
