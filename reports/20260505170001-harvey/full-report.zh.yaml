  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 具名客户群与市场渗透
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的企业客户群横跨三个市场细分，三者均有具名客户确认。在大型律所领域，Harvey 已与 Davis Polk &
              Wardwell（美国按收入排名前十之一，全球最负盛名的交易律所之一）、Freshfields Bruckhaus Deringer（英国 Magic Circle 律所）及 Gunderson
              Dettmer（领先的初创公司和 VC 律所）建立合作。Gunderson 关系具有重要战略意义：Harvey 的 VC 投资方（Sequoia、a16z）将 Gunderson
              作为其投资组合公司的外部法律顾问，形成了投资方关系与客户关系之间罕见的高度重叠。

              Harvey 的全球律所网络版图以两个旗舰部署为锚点：A&O Shearman 的 14 个全球办公室和 Dentons 遍布全球 60 余个国家的办公室。这两段合作关系为 Harvey
              证明了在最高复杂度的全球律所环境中跨语言、多司法管辖区企业级运营的能力。A&O Shearman 报告的成果（每周节省 3–5 个律师工时、M&A 合同审阅时间缩短 40%–50%）提供了 Harvey
              企业价值主张最清晰的公开 ROI 证据。

              专业服务细分市场还引入 PwC 和 EY，既作为直接客户，又作为潜在渠道分发合作方：四大部署将 Harvey 用于纯法律研究之外的法律、税务及咨询工作流，展示了 Harvey
              在各类专业服务场景下的适应性。Harvey 宣称截至 2025 年底已有 100 家以上律所客户，但通过新闻稿确认的具名客户仅有 8–10
              家——这与典型企业软件市场进入模式一致：标杆账户公开宣传，长尾客户不逐一披露。
