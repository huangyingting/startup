      - number: '1.2'
        title: 融资与投资方背书
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的融资历程堪称企业软件领域最为激进之一：约 13 个月内完成四轮主要融资，估值从 30 亿美元（2025 年 2 月）攀升至 110 亿美元（2026 年 3 月），增长 3.7 倍，背后是
              ARR 的快速增长与企业部署规模的持续扩张。截至 2026 年 3 月，累计融资超过 10 亿美元，创下法律科技公司的里程碑，也是投资方对法律 AI 赛道坚定信心的强烈信号。

              Sequoia Capital 是核心投资方，自 Series A 起已三度联合领投。Sequoia 合伙人 Pat Grady 将此称为"异乎寻常的高度信任"，折射出对 Harvey
              赛道领导地位的深度认可。2026 年 3 月的融资轮由 GIC（新加坡主权财富基金）联合领投，为 Harvey 的国际化扩张战略引入机构资本与亚太分发渠道。其他主要投资方包括 Andreessen
              Horowitz（领投 80 亿美元估值轮）、Kleiner Perkins、Coatue、Conviction Partners、Elad Gil 及 OpenAI Fund——构成基础模型公司之外企业 AI
              领域最顶级的投资方阵容。

              这一投资方阵容创造三类战略价值：（1）通过 Sequoia、KP 及 a16z 与主要律所和金融机构的投资组合关系，构建企业级分发网络；（2）借助 OpenAI Fund 战略关系，获取 AI
              模型资源与公信力；（3）依托 GIC 的亚太主权网络，搭建国际扩张基础设施。
