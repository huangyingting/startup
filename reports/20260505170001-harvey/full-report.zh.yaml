  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心产品平台与模块架构
        blocks:
          - type: paragraph
            body: >
              Harvey AI 已从单一 AI 法律助手演进为涵盖六大核心产品线的多模块企业平台。Harvey Assistant 依然是入口：一个处理法律研究、文件摘要、合同起草、合规分析及诉讼准备的对话式 AI
              界面，覆盖五大主要业务领域（M&A、诉讼、合规、公司及知识产权）。助手可通过网页界面访问，也可通过直接嵌入文档起草的 Microsoft Word 插件使用，或通过 Outlook 集成处理基于邮件的法律查询。

              Harvey Vault 将平台延伸至文档审阅与尽职调查：律师可上传交易文件库或事务文件，执行 AI 原生合同审阅、条款提取、风险标记及对照 Harvey
              标准条款库的条件追踪。与传统电子发现平台（Relativity、Everlaw）不同，Vault 专为交易工作流而非海量文档生产而设计——这一聚焦范围在 M&A 和资本市场场景中实现了更高的准确性。

              Harvey Knowledge 增添了律所专属智能：它摄取律所的专有先例文件、内部备忘录和研究笔记，构建一个私有的组织记忆层。这使得"我们纽约 M&A
              团队在重大不利变化条款上历史上同意过哪些立场？"此类查询成为可能——将 AI 输出植根于律所专属机构知识，而非仅凭通用法律原则。从竞争护城河角度，这是 Harvey 最具防御性的产品，因为每家律所的
              Knowledge 库都是独一无二的。

              Harvey Agents（2025 年 10
              月推出）是最重要的产品进展：它支持自主的多步骤工作流，可独立执行一系列法律任务——审阅一批协议的监管标记、提取特定条款、与标准立场对比并生成摘要备忘录——无需律师在每个步骤介入。Agents
              包含审计追踪日志，记录每一项操作，对于 AI 行为必须可审计的专业服务合规环境而言，这是至关重要的功能。
