  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 法律 AI 市场定义与规模测算
        blocks:
          - type: paragraph
            body: >
              法律 AI 市场包括将人工智能用于法律专业人士任务的软件工具，任务包括法律研究、合同分析、文档起草、尽职调查、证据开示和工作流自动化。截至 2025，该市场最好按三个范围层级理解。

              最宽口径下，全球法律服务市场每年约产生 $950B-$1T 收入，美国贡献 $350-400B。AI 软件工具历史上能以软件订阅形式拿到服务市场收入的 0.5-1%；若渗透率为 1-3%，法律 AI
              的总可用市场（TAM）将达到每年 $9-30B 软件收入。更保守的近期估计——仅限当前 AI 专属工具类别——将 2024 法律 AI 总可用市场（TAM）放在 $1.4-2B，到 2030 按分析师方法不同以
              20-35% CAGR 增至 $7-15B。

              Harvey AI 的可服务可获得市场（SAM）由三块定义：（1）Am Law 100/200 律所（合计收入约 $130B，60,000-80,000 名最高计费律师）；（2）UK Magic Circle 和
              EU 全球律所（额外约 200-300 家）；（3）Fortune 500 公司内部法律部门（约 $50-100B 市场）。假设 50,000 个 Harvey 席位、每年
              $5,000-$15,000，单这些细分市场带来的 SAM 就超过 $500M-$750M 年经常性收入（ARR）——按当前增长率，Harvey 完全够得着。
