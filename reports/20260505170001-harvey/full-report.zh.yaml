      - number: '6.2'
        title: 客户获取、扩张与留存动态
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的获客遵循典型企业级 B2B 路径，但有一个突出变量：Am Law 圈层里异常强的同侪推荐效应。美国前 10 律所 Davis Polk 或 Magic Circle 律所 A&O
              Shearman 一旦公开背书 Harvey，同行立刻会承压并启动评估——竞争律所的管理合伙人非常清楚同业掌握哪些技术优势；法律 AI 已经成了人才招聘和客户推介里的差异化因素：年轻律师更偏好配有 AI
              工具的律所，成熟客户也会追问律所使用哪些 AI 工具。

              从试点到全面部署的转化，是判断 Harvey 产品强度最关键指标：Dentons 从美国试点起步，扩展到 60+ 个国家；A&O Shearman 从一个办公室起步，扩展到全球 14 个办公室。Bloomberg
              Law 证实，多家 Am Law 50 律所在 12-18 个月内从小规模试点组推进到全所部署。这个扩张模式意味着试点期产品满意度高，也说明律所管理层能果断拍板去留——这是企业级法律软件最难跨过的一次转化。

              Harvey AI 估计 85-90% 的留存率低于顶尖企业 SaaS，但对一个新类别平台来说合理。Reuters 和 Above the Law
              记录的负面客户反馈集中在复杂多司法辖区交易的准确性上，导致部分客户收缩范围（从全所铺开缩到仅限业务组），但没有确认的完整取消。Harvey
              的流失画像更像范围压缩，而不是彻底离开，说明即便边缘场景带来摩擦，核心价值主张仍被保留。最重要的留存风险是 M&A 交易量周期性：Harvey ACV 最高的客户是交易型律所，如果 M&A 活动大幅下滑（如
              2022-2023 年），Harvey 客户群的法律科技支出会承压。
