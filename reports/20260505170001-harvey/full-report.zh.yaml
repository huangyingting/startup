      - number: '7.2'
        title: 运营、竞争与技术风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 最尖锐的运营风险，是一次高调的准确性失败：如果公开报道显示 Harvey 生成内容在重大法律事项中造成实质性错误，整个客户群会同步重新评估。Harvey 引入自主 Agents
              工作流后，这一风险进一步抬升——多步骤自主工作流在每一步都无需律师输入即可执行法律任务，比单次查询式 AI 辅助有更复杂的故障模式。Agents 产品必须配备极高质量的护栏，才能避免这种场景。

              竞争风险有三层：（1）模型商品化——随着基础模型提升，Harvey 的微调优势会收窄；（2）既有巨头反击——Thomson Reuters 已承诺投入 $4.3B+ 做 AI 开发，LexisNexis
              也有可比项目，二者都能利用巨大的分销优势；（3）大科技捆绑——Microsoft Copilot for Legal 可能把可比的 AI 法律能力与 Microsoft 365
              捆绑，以显著更低的增量成本提供。Harvey 抵御三者的关键是 Harvey Knowledge 层（律所特定个性化），它创造的切换成本，是商品化或捆绑替代方案最难复制的。

              Harvey AI 的网络安全态势是关键运营风险因素：律所越来越多地成为寻求法律情报的国家级攻击者目标（据 CrowdStrike 2025），如果 Harvey 存储的律师-客户特权通信被攻破，对受影响客户和
              Harvey 声誉都将是灾难性的。Harvey 的 SOC 2 Type II 认证和加密向量存储提供了有意义的基线保护，但随着威胁格局演化，安全标准必须持续抬高。
            claimRefs: []
