            title: Sequoia 第三次联合领投是现有最强的收入验证信号
            body: >
              对于无法获取 Harvey 内部财务数据的外部投资方而言，Sequoia 三度联合领投是目前最具公信力的公开信号，表明 ARR 增长真实且持续加速。Sequoia 在董事会层面可见 Harvey
              的实际收入指标；其将持仓增加至三倍的意愿——内部也承认属于异常举动——实际上是 Pat Grady 在以行动表示数字支撑这份信念。GIC 主权基金以 110 亿美元估值跟投提供了第二个机构验证信号。
            calloutType: insight
            claimRefs:
              - CI012
              - CI030
          - type: callout
            title: 支撑 110 亿美元估值的路径需要 70%–90% CAGR 增速至 IPO
            body: >
              Harvey AI 的 110 亿美元估值要求以下任一情形实现：（1）在 3–5 年内以可比或更高倍数完成 IPO 或被收购；（2）通过 ARR 扩张至 4 亿至 6 亿美元来消化倍数，届时 20–30 倍
              ARR 估值对赛道领导者具有可辩护性。这需要持续 70%–90% 的 CAGR——可实现但非有把握，尤其是若 LLM 商品化在 Harvey 达到关键 ARR 规模前已压缩其定价权。逾 10 亿美元的现金储备为
              Harvey 提供了在无需近期外部资本的情况下执行这一增长的时间，这是一项切实的优势。
            calloutType: risk
            claimRefs:
