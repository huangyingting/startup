            title: Winston Weinberg 的法律从业背景构成核心护城河
            body: >
              大多数面向法律领域的 AI 公司由工程师或产品经理创立，他们对法律的理解来自外部视角。Winston Weinberg 作为高盛执业律师的从业背景，赋予 Harvey
              罕见的创始人与市场契合度：对律师的实际需求、核心顾虑（执业过失、特权泄露）以及法律工作流的真实运作方式具有第一手的深刻理解。这种内部人视角塑造了 Harvey
              的特权保护架构及以引文为基础的响应系统——而信任，正是这个市场的首要采购标准。
