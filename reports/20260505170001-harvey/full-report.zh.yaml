            body: >
              A&O Shearman、Davis Polk 和 Dentons 不只是客户——它们是 Harvey 整个竞争策略的资质背书机制。当 Skadden 或 Sullivan & Cromwell 的律所合伙人听说
              Davis Polk 已经规模化运行 Harvey，采购对话会从“说服我”变成“什么时候开始”。这种参考效应是 Harvey 最持久的近期护城河，因为 Thomson Reuters 无法复制：Westlaw
              已经无处不在，但这种普及度不会像领先律所的 AI 部署那样制造同等错失恐惧（FOMO）。
