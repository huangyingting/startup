  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与 ARR 轨迹
        blocks:
          - type: paragraph
            body: >
              Harvey AI 采用企业 SaaS 模式，按席位授权是主要收入流。估计 Am Law 100 律所的企业账户每年为全所访问支付 $500K-$3M+，较小专业服务账户起步 ACV 为
              $50K-$500K。模块加购（Harvey Vault、Knowledge、基础 Assistant 层之外的 Workflow
              Agents）以及自定义智能体开发的专业服务费，在核心授权之上提供扩张收入。Harvey 还可能从希望把 Harvey 能力嵌入自身内部工具和工作流的律所获得部分 API
              访问收入，但该收入流仍属推测，现阶段可能不大。

              Harvey 估计年经常性收入（ARR）已从 2022 的近乎零增长到 Q1 2026 分析师估计的 $100-200M。这代表 200-400% 的同比增长，主要由大型律所企业部署推动。公司没有披露准确
              ARR，所有估计都来自分析师对投资人增长信号、估值持续抬升的融资公告（暗示基于 ARR 的承销）以及匿名管理层评论的三角测算。

              Sequoia 在估值快速上升时连续三轮联合领投——即便对 Sequoia 来说也不寻常——是目前最强信号：Sequoia 作为董事会层面投资人能看到的专有 ARR 数据，正在验证增长轨迹。GIC 以 $11B
              共同投入机构资本，也提供了额外信号，因为主权财富基金通常要求经审计财务指标后才会按这一规模投资。公司的企业定价为大规模多席位承诺提供批量折扣；估计 Am Law 100 律所若承诺 2-3
              年全所部署，每席价格相对较小账户可获得 30-50% 折扣。
