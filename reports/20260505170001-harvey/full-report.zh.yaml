      - number: '2.4'
        title: 展项
        blocks:
          - type: callout
            title: Bloomberg Terminal 类比指向规模化后的 $2-4B 年经常性收入（ARR）
            body: >
              Bloomberg Terminal（每席 $6,000-$25,000、$5-6B ARR、金融业 350,000+ 席位）是 Harvey
              市场机会最接近的类比：高价值专业服务垂直市场，集中在顶级机构，实时信息和 AI 辅助工作流带来的生产率价值远高于软件订阅成本。如果 Harvey 在法律领域达到类似席位深度（目标细分中全球 400,000+
              名律师，每席 $3,000-$15,000），隐含的 ARR 区间为 $1-6B，足以在成熟阶段支撑 $11B 估值。
            calloutType: insight
            claimRefs:
              - CM027
              - CM006
              - CM034
          - type: callout
            title: 结构性壁垒真实存在，但 Harvey 的架构正面处理
            body: >
              三个主要法律 AI 采用壁垒（保密特权泄露、幻觉责任、律师协会合规）不是通用技术采用摩擦——它们是法律行业独有的具体风险，需要具体产品方案。Harvey 的 SOC 2 Type II
              认证和不训练政策直接处理保密特权风险；基于引用的响应架构降低幻觉责任；企业定价模型和合规文档支持 ABA/律师协会合规审查。这些不是功能——而是进入 大型律所采购的门票，Harvey
              从第一天起就围绕它们设计产品。
            calloutType: strength
            claimRefs:
              - CM011
              - CM024
              - CM012
          - type: callout
            title: 到 2027-2028，LLM 商品化可能压缩 Harvey 的定价权
            body: >
              Harvey 当前的定价权取决于它能否相对通用 LLM（ChatGPT、Claude）维持有意义的法律领域准确率优势。随着前沿模型提供商继续用法律数据训练，准确率差距可能收窄，Harvey 相对企业
              ChatGPT 许可证收取溢价的能力会下降。Harvey 必须利用当前窗口（2025-2027）把工作流集成、数据网络效应和企业关系嵌牢，形成不依赖原始模型表现的切换成本。
            calloutType: risk
            claimRefs:
              - CM017
              - CM018
              - CM013
  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Harvey AI 所处竞争格局最好按三层理解：既有法律数据供应商、AI 原生法律平台和通用 AI 替代品。

              **第一层——既有巨头（最危险）**：Thomson Reuters（CoCounsel，由 Casetext 驱动）和 LexisNexis（Lexis+ AI）是 Harvey 最危险的竞争对手，因为它们把
              150+ 年法律数据库护城河、AI 叠加层和既有律所关系放在一起。Thomson Reuters 每年来自 Westlaw 订阅的法律部门收入超过 $1.8B，并自 2023 推出以来已将 CoCounsel
              部署到“数千家律所”。LexisNexis 的 Lexis+ AI 将 AI 与 250M+ 法律文档整合。不能把两家公司当成传统老牌公司轻视——它们都在投入数十亿美元，直接竞争 AI 原生法律市场。

              **第二层——AI 原生竞争对手（细分专家）**：Luminance AI（合同审阅，估值约 $1B）、Ironclad（合同生命周期管理，B2B 企业法务）、Spellbook（合同起草，聚焦
              中小企业（SMB））和 Kira/Litera（文档审阅）在 Harvey 已覆盖但尚未统治的具体垂直上竞争。这些玩家对 Harvey 的大型律所
              企业位置威胁较小，但可能成为收购目标或融资磁铁，把更多资源带入该领域。

              **第三层——通用 AI（颠覆性威胁）**：Microsoft 365 Copilot、ChatGPT Enterprise（OpenAI）和 Anthropic Claude for Enterprise
              提供广泛的文档起草和分析能力，律师个人已经在使用。这些工具缺少 Harvey 的保密特权保护和法律领域准确率，但受益于 Microsoft 的企业分销（M365 已在每家律所内）以及
              OpenAI/Anthropic 持续的模型改进。
