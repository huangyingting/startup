      - number: '2.2'
        title: 市场细分与买方分析
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的市场进入动作覆盖四类买方，每类都有不同采购动力：

              1. **大型律所（Am Law 100/200）**：最高价值细分市场——400-500 家美国律所，合计收入 $130-140B。非合伙人律师 每小时收费 $300-600，合伙人
              $600-2,000+/小时。ROI 达 10:1 的 AI 工具可以通过任何合理采购门槛。委员会式审批带来 3-9 个月销售周期，但也推动全所铺开，而不是购买个人许可证。Harvey 通过锚点客户（A&O
              Shearman、Davis Polk）在这里渗透很深。

              2. **UK/EU Magic Circle 律所**：声望和计费经济性与美国大型律所相近；全球规模律所 200-300 家。Harvey 与 A&O Shearman 的合作确立了伦敦和 EU
              存在感。Magic Circle 与美国大型律所采购画像相似，是自然的扩张市场。

              3. **公司内部法律部门**：拥有法律运营团队的 Fortune 500 公司。该细分市场的 AI 采用更早期（截至 2025，65% 预算已分配），但增长很快。Harvey 与 PwC、EY
              的合作为进入大型企业法务买方提供了渠道分销。

              4. **专业服务网络**：四大会计师事务所（PwC、EY、Deloitte、KPMG）和雇用法律专业人士的全球咨询公司。这些公司 AI 成熟度高，IT 采购基础设施强，且具备全球规模——让 Harvey
              能拿下覆盖国际网络中数千席位的企业交易。

              中端市场和小型律所是更长期的扩张市场；Harvey 当前聚焦大型律所，是有意的先落地再扩张策略：用企业参考客户为下游市场层级建立可信度。
