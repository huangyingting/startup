      - number: '4.2'
        title: 单位经济与财务结构
        blocks:
          - type: paragraph
            body: >
              Harvey AI 估计毛利率为 55-75%，反映成本结构主要由三部分主导：OpenAI 模型 API 成本（约占 COGS 10-20%）、AWS/Azure 云基础设施（约
              10-15%）以及工程支持和部署成本（约 10-15%）。规模化后，随着 OpenAI 在更高用量下按 token 降价，模型成本应会下降；Harvey
              对自有微调模型的投入，也可能随时间降低第三方模型依赖。Harvey 最近发布了首批专门构建的法律 AI 模型，显示其发展模型独立性的战略意图。

              可比的上市垂直 SaaS 公司（Veeva 72%、ServiceNow 78%、Atlassian 82%）报告的毛利率比 Harvey 估计区间高 5-20
              个百分点，主要因为它们拥有自己的基础设施，不支付第三方模型 API 费用。相对既有巨头（Thomson Reuters 拥有自有基础设施），这种结构性劣势是中期风险，Harvey
              必须靠模型多元化或自有模型投入来处理。

              Harvey AI 的净美元留存率估计为 115-130%，由三类扩张推动：初始试点群组之外的律师加入律所许可证带来的席位扩张；律所在 Assistant 订阅之上叠加 Vault 和 Agents
              等模块；续约时 Harvey 向现有客户证明 ROI，带来 ACV 抬升。这套扩张机制对长期财务逻辑至关重要：120%+ 的 NDR 意味着，即便不增加新客户，Harvey 也能从现有客户显著拉动 ARR 增长。

              Harvey AI 的资本充足度很强：累计融资 $1B+，即便按激进的 $200-300M 年运营费用估计，也可支撑 2-4 年资金续航。资本分配估计为 40-50% 投向
              R&D（模型开发、产品工程）、30-35% 投向销售与市场（企业销售团队、法律专家招聘）、15-20% 投向 G&A。最近一轮按 $11B 估值融资 $200M，带来增量续航；GIC
              的机构共同投资，也为必要时追加成长资本建立了关系。
