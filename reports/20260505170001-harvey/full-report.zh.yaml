            title: ABA 及监管不确定性构成切实风险
            body: >
              法律 AI 市场面临切实的监管风险：ABA 正式意见第 512 号（2024 年）涉及 AI 工具使用中的保密义务，但未能全面厘清律师胜任力义务、非法律实践行为或幻觉责任等问题。随着 Harvey
              的智能体产品向自动化法律成果（而非仅是辅助起草）迈进，各州律师协会可能出台新要求，推高 Harvey 的合规成本或限制特定自动化工作流。《哈佛法律评论》（2025 年）将幻觉责任和非法律执业列为法律 AI
              平台最重大的两类监管敞口。
