      - number: '4.3'
        title: 估值背景与财务缺口
        blocks:
          - type: paragraph
            body: >
              按 $11B 估值和估计 $100-200M ARR 计算，Harvey AI 的交易倍数约为 55-110x 过去 12 个月 ARR——明显高于上市企业 AI SaaS 8-15x
              的中位数，但仍在私人市场对高确定性 AI 公司估值区间（20-100x）内，前提是公司 ARR 年增长达到 100%+。牛市情形是，Harvey 在 3 年内达到 $400-600M ARR（以 50-60%
              CAGR 可行）；届时 $11B 估值对应 18-28x 远期 ARR 倍数，对法律 AI 类别领导者而言可以防守。可比企业 AI 公司在高增长阶段也拿到过类似倍数：Snowflake IPO 时约为 100x
              ARR；高增长垂直 SaaS 公司在达到足够规模后，也曾在公开市场维持 20-40x ARR 倍数。

              熊市情形是，ARR 增长在竞争对手追上时放缓到 75% CAGR 以下，把 Harvey 可实现的退出倍数压缩到 15-20x ARR；若 $300M ARR 配 15x 倍数，退出价值约 $4.5B——相对
              $11B 入场是重大损失。Wall Street Journal 曾将 Harvey 列入融资节奏快于收入证据的 AI 初创公司，指出外部投资人对真实 ARR 轨迹能见度有限。前 20-30 个 Am Law
              100 企业账户收入集中，是结构性脆弱点：即便只有少数最大账户流失或缩小范围，对 ARR 的影响也会很大。

              最大财务证据缺口是完全没有公开 GAAP 财务披露；Harvey 作为私营公司没有义务发布经审计财务，任何按该估值做出的投资决定，都高度依赖投资人联盟 的专有数据。未来 IPO 的公开市场投资人会要求
              Harvey 在可审计 GAAP 口径下持续证明毛利率高于 65%、净美元留存率高于 120%、ARR 增长高于
              60%，才能支撑显著的公开市场估值溢价。在此之前，财务尽调只能依赖独立分析师估计和投资人信号，而不是一手来源。
