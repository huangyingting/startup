      - number: '5.2'
        title: 技术架构与工程深度
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的技术架构是以 OpenAI GPT-4 系列为主要推理引擎的多模型系统，辅以 Anthropic Claude 处理需要长上下文窗口的任务，并日益以 Harvey
              自研的法律专用基础模型加以增强。CTO Gabriel Pereyra（前 DeepMind、Google Brain）自 2024 年起大力投入专有模型开发；据 The Information 2025 年 8
              月报道，Harvey 正在构建法律领域基础模型，以降低对 OpenAI API 的依赖，并提升合同条款提取、法律引文核验等专项任务的准确性。

              Harvey 在大规模法律语料库（合同、判例法、监管文件）上的领域微调，使其在法律推理任务上的表现显著优于基础 GPT-4，这已通过斯坦福大学 LegalBench
              基准框架的性能提升得到验证。律所级定制化层（Harvey Knowledge）增加了第二层个性化，随着更多律师使用系统并通过使用模式贡献隐性反馈，这一优势会随时间持续复合叠加。

              集成架构（Harvey Ecosystem）将 Harvey 嵌入企业法律技术生态：iManage 和 NetDocuments 集成确保 Harvey
              可直接访问律所文档管理系统中的文件，无需手动上传；Microsoft Word 和 Outlook 插件通过在律师的主要工作环境中提供服务，降低了采用摩擦。这种集成深度是通用 AI 工具所缺乏的产品优势，并为已将
              Harvey 整合至工作流的律所形成了转换成本。

              Harvey AI 的安全基础设施——SOC 2 Type II 认证、GDPR 合规的欧盟数据本地化、Vault 的加密向量存储，以及严格的禁止使用客户数据训练政策——正面应对了最初令企业律所对采用 AI
              持犹豫态度的核心顾虑。公司在 AWS 和 Azure 上部署，提供美国、欧盟及英国市场的数据本地化选项；缺乏完全本地部署方案，限制了 Harvey
              在政府法律部门和部分有严格数据本地化要求的欧洲律所中的可触及市场。
