  - number: 4
    title: 财务分析
    sections:
      - number: '4.1'
        title: 收入模型与 ARR 轨迹
        blocks:
          - type: paragraph
            body: >
              Harvey AI 采用企业级 SaaS 商业模式，以按席位授权为主要收入来源。Am Law 100 律所的企业账户估计每年支付 50 万至 300 万美元以上的全所访问费用，较小的专业服务账户 ACV 起点为
              5 万至 50 万美元。模块附加件（Harvey Vault、Knowledge、基础 Assistant 层之上的 Workflow
              Agents）及定制智能体开发的专业服务费，在核心许可收入之上提供扩张收入。Harvey 还可能从希望将 Harvey 能力嵌入自有内部工具和工作流的律所中获取部分 API
              访问收入，但该收入流目前属于推测性质，在现阶段可能较为有限。

              Harvey 的估算 ARR 已从 2022 年的接近零增长至分析师估计的 2026 年第一季度 1 亿至 2 亿美元，代表 200%–400% 的同比增长，主要由大型律所企业部署驱动。公司未披露确切 ARR
              数字，所有估算均为分析师依据投资方增长信号、不断攀升估值的融资公告（隐含基于 ARR 的定价逻辑）及匿名管理层评论综合推算所得。

              Sequoia 在快速攀升估值下三度联合领投——即便对 Sequoia 而言也属异常——是目前最强的信号，表明其作为董事会级别投资方掌握的专有 ARR 数据正在验证增长轨迹。GIC 以 110
              亿美元估值的机构跟投提供了额外信号，因为主权财富基金通常要求在此规模投资前审阅经审计的财务指标。公司的企业定价包含大规模多席位承诺的批量折扣，Am Law 100 律所相对于较小账户可获得估计 30%–50%
              的席位折扣，以换取涵盖 2–3 年期限的全所部署承诺。
