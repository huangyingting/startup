              Harvey 的风险不是 Claude 或 GPT-5 会立刻取代它——而是到 2028，通用前沿模型会达到 Harvey 法律准确率优势的 90%+，只留下工作流、保密特权和集成元素作为真正差异。Harvey
              必须利用 2025-2027 窗口，把工作流和集成护城河挖到足够深，确保模型准确率差距收窄后仍能形成持久切换成本。如果 Harvey 能在 LLM 同等水平到来前，用深度工作流集成拿下 3-5
