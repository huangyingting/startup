      - number: '6.3'
        title: 客户质量、集中度与扩张风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的客户集中度构成结构性风险：前 5-10 个企业级账户可能贡献总年经常性收入（ARR）的 50-65%，使 Harvey 的收入对头部客户续约决策高度敏感。失去两个前五大账户，可能带来
              15-25% 的 ARR 下滑——对一家每年烧掉 $150-300M
              运营费用来支撑增长的公司，这是实质性打击。最脆弱的是那些在高风险交易中已经出现准确性担忧的账户；这些账户需要主动加码客户成功投入，才能守住留存。

              客户反馈呈现稳定分化：热情采用者主要是 M&A 律师，他们用 Harvey 做合同审阅和尽调，节省时间的 ROI
              清晰且可衡量；抵触用户主要是资深合伙人，他们更依赖法律判断和客户关系，而不是文档处理效率。这种所内采用分化意味着，已部署律所的 DAU 渗透率差异很大——有些律所达到 80%+ 采用率，另一些仍停留在
              20-30%——也为在现有客户中做深采用、撬动扩张收入留下了可观空间。

              Harvey AI 的 Big 4 合作既是客户成功案例，也是尚未完全兑现的渠道分销机会。PwC 和 EY 将 Harvey 部署给自己的全球法律与咨询团队，下一步天然就是在转型项目中向律所和企业法务客户推荐
              Harvey。若 Harvey 以收入分成安排正式化这些渠道关系，Big 4 分销渠道可能显著加速 Harvey 在中端市场和企业法务场景的渗透，超过直销企业客户能达到的速度。
