              Harvey AI 约 60%–70% 的模型推理经由 OpenAI API 路由，带来三维风险：（1）定价风险——OpenAI 可提高 API 价格，压缩 Harvey 毛利率；（2）竞争风险——OpenAI
              正在构建自己的企业级法律 AI 产品，最终可能直接与 Harvey 竞争；（3）服务中断风险——OpenAI 重大故障将使 Harvey 核心产品瘫痪。Harvey
