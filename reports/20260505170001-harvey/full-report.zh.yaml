      - number: '3.3'
        title: 护城河持久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的竞争护城河具有三个可防御层次：（1）**数据飞轮**——来自大型律所的律师反馈循环持续提升 Harvey 法律领域模型质量；（2）**平台粘性**——多模块部署（Vault +
              Knowledge + Agents）形成集成成本，使脱离 Harvey 的切换代价远高于单一功能工具；（3）**信任背书**——大型律所标杆客户（A&O Shearman、Davis
              Polk）创造公信力的瀑布效应，加速新律所采用。

              关键竞争风险时间轴：近期（2025–2026 年）——Harvey 在产品深度和大型律所信任方面领先，传统巨头追赶智能体能力；中期（2027–2028 年）——CoCounsel 和 Lexis+ AI
              实现可比的智能体功能，竞争压力上升；长期（2029–2030 年）——若通用模型达到法律领域准确性对等，前沿 LLM 商品化风险达到顶峰。

              Bloomberg Intelligence 分析认为，市场可能形成共同主导格局：Thomson Reuters 赢得法律研究/判例细分市场（Westlaw 数据库实际上不可替代），Harvey
              则赢得工作流自动化和智能体法律工作细分市场。这一双强格局将验证 Harvey 110 亿美元估值的合理性，同时也限制了其彻底取代 Westlaw 的可能性。

              OpenAI 利益冲突风险值得关注：作为 Harvey 的股权投资方，同时也是 Harvey 核心能力背后的模型提供商，OpenAI 理论上对法律 AI
              数据具有特权访问，可能为竞争性产品提供参考——尽管目前尚无此类计划的证据。
