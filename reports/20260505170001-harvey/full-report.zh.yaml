      - number: '5.3'
        title: 产品质量、风险与竞争位置
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的质量框架包括引用验证、高风险法律结论的监督式审阅提示，以及 Agent 动作的审计轨迹日志——这些设计都为了确保平台处理越来越自主的法律任务时，律师问责仍被保留。该设计与律师协会要求律师监督
              AI 生成工作的指引在结构上一致；它阻止 Harvey 被当作完全自主的法律从业者使用，但适合受监管的专业服务场景。

              最大产品风险是高风险复杂交易中的准确性。Reuters 在 May 2025 报道，一些律所在复杂跨境交易中遇到准确性问题，包括错误引用和对管辖法律条款的误读。Harvey
              以强化引用验证和人机协同确认提示回应，但在具有法律后果的输出中，LLM 幻觉这个底层风险仍是技术的根本限制，无法完全靠工程消除。

              相比 Thomson Reuters CoCounsel 和 LexisNexis Lexis+ AI，Harvey AI 的竞争位置由推理深度和 M&A 工作流强度（Harvey
              优势）来区分；既有巨头则在实时判例引用集成（Westlaw、LexisNexis 数据库）以及深度数据库访问至关重要的受监管行业合规工作流上领先。相对既有巨头，Harvey
              缺少原生判例法数据库集成，这是最重要产品缺口——可通过合作或收购处理，但需要投入。
