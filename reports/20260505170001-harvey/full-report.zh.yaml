      - number: '4.2'
        title: 单元经济学与财务结构
        blocks:
          - type: paragraph
            body: >
              Harvey AI 估算毛利率为 55%–75%，反映出由三个主要成本构成主导的成本结构：OpenAI 模型 API 成本（占销货成本约 10%–20%）、AWS/Azure 云基础设施（约
              10%–15%）以及工程支持与部署成本（约 10%–15%）。随着规模扩大，模型成本应随 OpenAI 高用量优惠而下降，Harvey 对专有微调模型的投资也可逐步降低对第三方模型的依赖。Harvey
              近期宣布推出首批专门构建的法律 AI 模型，传递出发展模型独立性的战略意图。

              可比的上市垂直 SaaS 公司（Veeva 72%、ServiceNow 78%、Atlassian 82%）的毛利率比 Harvey 估算区间高出 5–20
              个百分点，主要原因是其拥有自有基础设施，无需支付第三方模型 API 费用。与传统巨头相比（Thomson Reuters 拥有自有基础设施），这一结构性劣势是 Harvey
              须通过模型多元化或专有模型投资加以应对的中期风险。

              Harvey AI 的净收入留存率（NDR）估算为 115%–130%，主要由以下因素驱动：初始试点群体以外的律师加入律所授权带来的席位扩张、律所在 Assistant 订阅基础上叠加 Vault 和
              Agents 带来的模块附加收入，以及 Harvey 向现有客户证明 ROI 后续约时的 ACV 提升。这一扩张机制对长期财务案例至关重要：NDR 达到 120% 以上，意味着 Harvey
              即使不增加新客户，也可从现有客户中显著拉动 ARR 增长。

              Harvey AI 的资本充裕度较强：逾 10 亿美元的融资即使在激进的每年 2 亿至 3 亿美元运营支出水平下，也可提供约 2–4 年的现金储备。资本分配估算为：40%–50%
              用于研发（模型开发、产品工程），30%–35% 用于销售与市场（企业销售团队、法律专家招募），15%–20% 用于一般及行政开支。最近一轮以 110 亿美元估值融资的 2 亿美元提供了增量现金储备，GIC
              的机构跟投则在需要时为进一步增长融资建立了合作关系。
