      - number: '6.4'
        title: 数据亮点
        blocks:
          - type: callout
            title: A&O 与 Dentons 验证 Harvey 的全球规模化能力
            body: >
              A&O Shearman（14 个办公室）与 Dentons（60 多个国家）的部署，是 Harvey 客户验证数据集中最重要的两个节点：它们证明 Harvey
              能在全球企业规模下运作，跨多语言、多司法管辖的工作流，覆盖数百名不同业务领域的律师。任何意图在市场顶端竞争的法律 AI 对手，都需要同等量级的全球落地验证——而这在 Harvey 现有竞争对手中目前并不存在。
