      - number: '6.3'
        title: 客户质量、集中度与扩张风险
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的客户集中度构成结构性风险：前 5–10 家企业客户可能占总 ARR 的 50–65%，使公司收入高度依赖头部客户的续约决策。损失两家前五客户即可能造成 15–25% 的 ARR
              下滑——对于年运营支出高达 1.5–3 亿美元、依靠烧钱驱动增长的公司而言，这是重大打击。准确性问题出现在高风险交易中的客户最为脆弱，对其投入主动的客户成功资源对留存至关重要。

              客户反馈呈现一致的分化：热情采用者（主要是将 Harvey 用于合同审查和尽职调查的并购律师助理，节省时间的 ROI
              直观可量化）与抵触用户（主要是更依赖法律判断和客户关系而非文档处理效率的资深合伙人）之间存在明显分裂。这种律所内部的采用极化意味着 Harvey 在已部署律所中的 DAU 渗透率差异显著——部分律所达到 80%
              以上的采用率，另一些则停留在 20–30%——由此形成从现有客户挖掘采用深度、驱动扩张收入的可观潜力。

              Harvey AI 与四大的合作既是客户成功案例，也是一个尚未充分兑现的渠道分发机会。PwC 和 EY 在其全球法律和咨询团队中部署 Harvey，自然引出下一步：在转型项目中向其律所和企业法务客户推荐
              Harvey。若 Harvey 将这些渠道关系正式化并引入收入分成安排，四大分发渠道有望大幅加速其在中端市场和企业法务领域的渗透，超越直销企业的范畴。
