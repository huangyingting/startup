      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              Harvey AI 的竞争优势在工作流自动化和智能体任务执行领域最为突出——Harvey Agents（2025 年推出）提供的"规划-适应-交互"多步骤法律自动化能力，是 Thomson Reuters
              CoCounsel 和 LexisNexis Lexis+ AI 尚未实现的。

              然而，在法律研究和数据库完整性方面，Harvey AI 处于结构性劣势：Westlaw（Thomson Reuters）和 Lexis（LexisNexis）拥有逾 150
              年的注释法律内容、编辑摘要及专有判例总结，Harvey 的训练数据若无同等年限的法律编辑积累，根本无法复制。高度依赖判例研究的律所不太可能以 Harvey 取代
              Westlaw/Lexis——双方将并行使用（多平台策略）。

              Harvey 差异化优势最具防御性的领域在于：（1）智能体工作流自动化（Harvey Agents）；（2）特权保护数据架构（禁止训练政策、SOC 2 Type II）；（3）全平台覆盖（6
              个集成模块，对比竞品的单一任务工具）；（4）律师满意度评分——Harvey 在独立律师调查的复杂推理任务质量评级中持续居首。

              Harvey 最为薄弱的竞争维度是标准法律研究的原始数据库完整性。律师通过 Harvey 询问"查找所有关于 X 的案例"，所得结果可能逊于 Westlaw 的注释检索结果——尽管 Harvey 的 AI
              综合响应在其所找到的案例上可能提供更好的上下文。
