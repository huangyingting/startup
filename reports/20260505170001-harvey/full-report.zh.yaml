      - number: '5.4'
        title: 附图
        blocks:
          - type: callout
            title: Harvey Knowledge 是最深的竞争护城河
            body: >
              Harvey 的律所个性化层（Knowledge）在结构上是最具防御性的产品要素：一旦律所将多年的先例文件、备忘录和内部研究摄入 Harvey Knowledge，以竞品替换 Harvey
              就需要在别处重建这一机构记忆——这是随每次查询处理而不断增加的转换成本。目前没有竞争对手在企业规模提供同等的律所专属知识库定制化，使 Harvey 在这一维度具有潜在的 2–3 年领先优势。
