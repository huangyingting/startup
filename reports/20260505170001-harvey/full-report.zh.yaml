      - number: '2.3'
        title: 增长驱动、壁垒与竞争动态
        blocks:
          - type: paragraph
            body: >
              2024-2026 有五股结构性力量在加速法律 AI 采用，为 Harvey 扩张创造了有利市场环境：

              1. **盈利压力**：Am Law 100 合伙人盈利能力在 2023-2024 仅增长 3-5%；律所需要效率工具，在不按比例增加员工数的情况下提高律师生产率。

              2. **同业竞争压力**：Kirkland、Davis Polk 和 A&O Shearman 公开部署 Harvey 后，同业律所面临采购压力——被视为技术落后本身就是有力的
              市场进入杠杆，会制造错失恐惧（FOMO）驱动的交易紧迫感。

              3. **客户费用压力**：大型企业客户在反推律所计费费率上涨；减少计费小时的 AI 工具，反而能在维持或提高单案收入的同时改善客户满意度。

              4. **生成式 AI 主流化**：个人使用 ChatGPT 的律师正在推动律所采购正式授权的工具，既要同样便利，也要具备专业工作所需的保密特权保护。

              5. **监管清晰度浮现**：ABA Formal Opinion 512（2024）和 NYSBA 指引（2024）为 AI 工具使用提供法律框架，降低此前阻挡采购的合规不确定性。

              主要采用壁垒是：保密特权泄露风险（Harvey 的 SOC 2 认证和不训练政策直接处理这一点）、幻觉责任（Harvey 的基于引用架构可缓释但不能消除）以及客户对特定事项中使用 AI
              的反对。如果通用模型在法律领域准确率上追平 Harvey 的微调方法，LLM 商品化会成为中期风险；但即便底层模型质量趋同，Harvey 的工作流集成深度和企业信任关系仍会形成持久切换成本。
