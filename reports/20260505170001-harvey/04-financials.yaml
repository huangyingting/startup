callouts:
  - title: No Audited Financials Is the Central Diligence Risk
    body: >
      Harvey AI's complete lack of public financial disclosure is the single most important risk factor for any investor
      or acquirer: all valuation analysis rests on investor-syndicate data that is not independently auditable. The $11B
      number was set by Harvey's own fundraising process, not by market forces or GAAP revenue multiples. Any serious
      due diligence should require audited GAAP financials as a prerequisite before proceeding, with particular focus on
      gross margin (to validate the model API cost structure) and net dollar retention (to validate expansion revenue
      claims).
    claimRefs:
      - CI033
      - CI013
      - CI020
    calloutType: risk
  - title: Sequoia's Third Co-Lead Is the Strongest Revenue Validation Available
    body: >
      For external investors without access to Harvey's internal financials, Sequoia co-leading three rounds is the most
      credible publicly available signal that ARR growth is real and accelerating. Sequoia has board-level visibility
      into Harvey's actual revenue metrics; the firm's willingness to triple its position — acknowledged internally as
      unusual — is Pat Grady effectively saying the numbers justify the conviction. GIC's sovereign fund co-investment
      at $11B provides a second institutional validation signal.
    claimRefs:
      - CI012
      - CI030
    calloutType: insight
  - title: Path to $11B Justification Requires 70-90% CAGR to an IPO
    body: >
      Harvey AI's $11B valuation requires either: (1) an IPO or acquisition at a comparable or higher multiple within
      3-5 years; or (2) growing into the multiple through ARR expansion to $400-600M at which point 20-30x ARR valuation
      is defensible for a category leader. This requires sustained 70-90% CAGR — achievable but not guaranteed,
      especially if LLM commoditization compresses Harvey's pricing power before it reaches critical ARR mass. The $1B+
      cash position gives Harvey time to execute this growth without needing near-term external capital, which is a
      meaningful advantage.
    claimRefs:
      - CI014
      - CI019
      - CI035
    calloutType: risk
