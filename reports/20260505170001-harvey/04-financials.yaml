sections:
  - title: Revenue Model and ARR Trajectory
    body: >
      Harvey AI operates an enterprise SaaS business model with per-seat licensing as the primary revenue stream.
      Enterprise accounts at Am Law 100 firms are estimated to pay $500K-$3M+ per year for firm-wide access, with
      smaller professional services accounts starting at $50K-$500K ACV. Module add-ons (Harvey Vault, Knowledge,
      Workflow Agents beyond the base Assistant tier) and professional services fees for custom agent development
      provide expansion revenue on top of core licensing. Harvey also likely generates some API access revenue for firms
      that want to embed Harvey capabilities within their own internal tools and workflows, though this revenue stream
      is speculative and likely modest at this stage.

      Harvey's estimated ARR has grown from near-zero in 2022 to an analyst-estimated $100-200M by Q1 2026. This
      represents 200-400% year-over-year growth, driven primarily by Big Law enterprise deployments. The company has not
      disclosed exact ARR figures, and all estimates are analyst triangulations from investor growth signals,
      fundraising announcements at escalating valuations (which imply ARR-based underwriting), and anonymous management
      commentary.

      The Sequoia pattern of co-leading three rounds at rapidly escalating valuations — while unusual even for Sequoia —
      is the strongest available signal that proprietary ARR data (visible to Sequoia as a board-level investor) is
      validating the growth trajectory. GIC's institutional co-investment at $11B provides additional signal, as
      sovereign wealth funds typically require audited financial metrics before investing at this scale. The firm's
      enterprise pricing includes volume discounts for large multi-seat commitments, with Am Law 100 firms receiving
      estimated 30-50% per-seat discounts relative to smaller accounts in exchange for firm-wide deployment commitments
      spanning 2-3 year terms.
    tableRefs:
      - TI001
      - TI004
    figureRefs:
      - FI001
      - FI004
  - title: Unit Economics and Financial Structure
    body: >
      Harvey AI's estimated gross margin of 55-75% reflects a cost structure dominated by three components: OpenAI model
      API costs (~10-20% of COGS), cloud infrastructure on AWS/Azure (~10-15%), and engineering support and deployment
      costs (~10-15%). At scale, model costs should decline as OpenAI charges less per token at higher volumes, and
      Harvey's investment in proprietary fine-tuned models could reduce third-party model dependency over time. Harvey
      recently announced its first purpose-built legal AI models, signaling a strategic intent to develop model
      independence.

      Comparable public vertical SaaS companies (Veeva at 72%, ServiceNow at 78%, Atlassian at 82%) report gross margins
      5-20 points above Harvey's estimated range, primarily because they own their infrastructure and don't pay
      third-party model API fees. This structural disadvantage vs. incumbents (Thomson Reuters owns its own
      infrastructure) is a medium-term risk that Harvey must address through model diversification or proprietary model
      investment.

      Harvey AI's net dollar retention is estimated at 115-130%, driven by seat expansion as attorneys beyond the
      initial pilot cohort are added to firm licenses, module add-ons as firms layer Vault and Agents on top of
      Assistant subscriptions, and ACV escalation at renewal as Harvey demonstrates ROI to existing customers. This
      expansion mechanism is critical to the long-term financial case: an NDR of 120%+ means Harvey can grow ARR
      significantly from existing customers even without adding new logos.

      Harvey AI's capital adequacy is strong: $1B+ raised provides an estimated 2-4 year runway even at aggressive
      $200-300M annual operating expense levels. Capital allocation is estimated at 40-50% to R&D (model development,
      product engineering), 30-35% to sales and marketing (enterprise sales team, legal specialist hires), and 15-20% to
      G&A. The most recent $200M raise at $11B valuation provides incremental runway, and the GIC institutional
      co-investment creates a relationship for additional growth capital if needed.
    tableRefs:
      - TI002
      - TI005
    figureRefs:
      - FI002
  - title: Valuation Context and Financial Gaps
    body: >
      At $11B valuation on an estimated $100-200M ARR, Harvey AI trades at approximately 55-110x trailing ARR — well
      above the median public enterprise AI SaaS multiple of 8-15x but within the range of high-conviction private
      market AI valuations (20-100x) for companies growing at 100%+ ARR annually. The bull case is that Harvey reaches
      $400-600M ARR in 3 years (feasible at 50-60% CAGR) at which point the $11B valuation implies a 18-28x forward ARR
      multiple — defensible for a category leader in legal AI. Comparable enterprise AI companies at high-growth stages
      have commanded similar multiples: Snowflake at IPO traded at ~100x ARR, while high-growth vertical SaaS companies
      have sustained 20-40x ARR multiples in public markets at sufficient scale.

      The bear case is that ARR growth decelerates below 75% CAGR while competitors catch up, compressing Harvey's
      achievable exit multiple to 15-20x ARR; at $300M ARR with a 15x multiple, the exit value is ~$4.5B — a substantial
      loss from $11B entry. The Wall Street Journal has flagged Harvey among AI startups where fundraising pace
      outstrips revenue evidence, noting that external investors have limited visibility into the actual ARR trajectory.
      Revenue concentration in the top 20-30 Am Law 100 enterprise accounts is a structural vulnerability: if even a
      handful of the largest accounts churn or reduce scope, the ARR impact would be material.

      The most significant financial gap is the complete absence of public GAAP financial disclosure; Harvey has no
      obligation to publish audited financials as a private company, and any investment decision at this valuation rests
      heavily on trust in the investor syndicate's proprietary data. For public market investors in a future IPO, Harvey
      will need to demonstrate auditable gross margins above 65%, net dollar retention above 120%, and ARR growth above
      60% on a consistent GAAP basis to justify a meaningful public market valuation premium. Until then, financial due
      diligence must rely on independent analyst estimates and investor signaling rather than primary sources.
    tableRefs:
      - TI003
    figureRefs:
      - FI003
