callouts:
  - title: Harvey Knowledge Is the Deepest Competitive Moat
    body: >
      Harvey's firmographic personalization layer (Knowledge) is structurally the most defensible product element: once
      a firm has ingested years of its own precedents, memos, and internal research into Harvey Knowledge, replacing
      Harvey with a competitor requires re-creating that institutional memory elsewhere — a switching cost that
      increases with every query processed. No competitor currently offers equivalent firm-specific knowledge base
      customization at enterprise scale, giving Harvey a potential 2-3 year advantage in this dimension.
    claimRefs:
      - CE001
      - CE021
      - CE025
    calloutType: strength
  - title: OpenAI Dependency Is the Primary Technical Risk
    body: >
      Harvey AI's estimated 60-70% routing of model inference through OpenAI APIs creates a three-dimensional risk: (1)
      pricing risk — OpenAI can raise API prices, compressing Harvey's gross margin; (2) competitive risk — OpenAI is
      building its own enterprise legal AI products and may ultimately compete with Harvey directly; and (3) service
      disruption risk — a major OpenAI outage would incapacitate Harvey's core product. Harvey's investment in
      proprietary legal models is the correct strategic response, but model independence is 2-4 years away at current
      development velocity.
    claimRefs:
      - CE016
      - CE005
      - CE034
    calloutType: risk
