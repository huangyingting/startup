  claims:
    - id: CE001
      statement: >-
        Harvey AI's product platform comprises six core modules: (1) Harvey Assistant — AI-powered legal research,
        drafting, summarization, and analysis; (2) Harvey Vault — AI-native document review and due diligence; (3)
        Harvey Knowledge — private knowledge base using firm proprietary documents; (4) Harvey Agents — autonomous
        multi-step agentic workflows; (5) Harvey Mobile — iOS and Android app for on-the-go access; and (6) Harvey
        Ecosystem — partner API and integrations layer.
      type: third-party-reported
      topic: Harvey product platform modules overview
      sourceRefs:
        - SE001
        - SE002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
        - QE023
      contradictsClaimRefs: []
    - id: CE002
      statement: >-
        Harvey Agents, launched in late 2025, enables autonomous multi-step legal workflows that can independently
        execute sequential tasks such as: reviewing a set of agreements for regulatory compliance flags, extracting
        clauses, cross-referencing with firm standard positions, and generating a summary memorandum — all without
        attorney input at each step.
      type: third-party-reported
      topic: Harvey Agents product capabilities
      sourceRefs:
        - SE002
        - SE003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE002
      contradictsClaimRefs: []
    - id: CE003
      statement: >-
        Harvey AI supports legal workflows across five primary practice areas: (1) M&A and transactional — due
        diligence, contract review, signing memoranda; (2) litigation — case research, brief drafting, deposition prep;
        (3) compliance and regulatory — policy analysis, regulatory review; (4) corporate — board materials, governance
        documents; and (5) IP — trademark searches, patent analysis.
      type: observed
      topic: Harvey AI supported practice areas and use cases
      sourceRefs:
        - SE001
        - SE011
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE003
      contradictsClaimRefs: []
    - id: CE004
      statement: >-
        Harvey AI's core technology architecture is a multi-model approach: it uses OpenAI's GPT-4 family as the primary
        foundation model for most tasks, supplemented by Anthropic Claude for specific tasks requiring long context
        windows, and has begun deploying its own purpose-built legal foundation models for high-frequency specialized
        tasks such as contract clause extraction and legal citation verification.
      type: inferred
      topic: Harvey AI technology architecture and model stack
      sourceRefs:
        - SE004
        - SE009
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QE004
      contradictsClaimRefs: []
    - id: CE005
      statement: >-
        Harvey AI has invested in proprietary model development since at least 2024, including fine-tuning on a large
        corpus of legal documents, contracts, and case law; The Information reported in August 2025 that Harvey is
        building its own legal foundation model to reduce OpenAI API dependency and improve task accuracy for
        specialized legal use cases.
      type: third-party-reported
      topic: Harvey proprietary legal model development
      sourceRefs:
        - SE009
        - SE016
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QE005
      contradictsClaimRefs: []
    - id: CE006
      statement: >-
        Harvey AI holds SOC 2 Type II certification, the enterprise security compliance standard that verifies security,
        availability, and confidentiality controls are audited by an independent third party and meet AICPA trust
        service criteria; Harvey's security page explicitly states it does not train AI models on customer data, a
        critical differentiator for law firms with client confidentiality obligations.
      type: observed
      topic: Harvey security compliance certifications and data policy
