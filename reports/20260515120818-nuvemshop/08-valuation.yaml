- id: exit-readiness-and-diligence
  title: Exit Readiness, Final Diligence Asks, and Thesis-Break Triggers
  body: 'Exit scenarios: (1) IPO on Nasdaq or NYSE: Nuvemshop is a natural candidate
    for a US-listed IPO once it demonstrates consistent 20%+ growth and 110%+ NRR.
    The precedent of VTEX''s 2021 NYSE IPO (at $4.6B peak market cap) establishes
    LatAm e-commerce platform IPO feasibility. A Nuvemshop Nasdaq IPO in 2027–2028
    at $250–350M ARR and 8–10× revenue multiple would yield a $2.0–3.5B market cap.
    (2) Strategic acquisition: Shopify, Global-e, or MercadoLibre are potential strategic
    buyers. Shopify acquiring Nuvemshop would provide instant LatAm SMB market leadership
    and BCB payment institution credentials; estimated strategic M&A premium: 1.5–2.0×
    base valuation ($3.0–5.0B). (3) Private secondary / continuation fund: A private
    secondary transaction or GP continuation fund offers liquidity for early investors
    at current base valuation without requiring IPO readiness. Final diligence asks
    (priority ordered): (1) Data room: NRR, gross merchant churn, and cohort retention
    tables by year and product tier (BLOCKING—cannot complete diligence without this);
    (2) Nuvem Crédito loan book: default rate, vintage analysis, provisioning (BLOCKING
    for financial model); (3) Audited 2023 and 2024 financial statements (BLOCKING
    for valuation model); (4) BCB regulatory correspondence review and payment institution
    license details; (5) LGPD compliance audit report; (6) Mexico CNBV payment product
    regulatory analysis; (7) Management accounts showing path to profitability and
    EBITDA trajectory; (8) Engineering team: headcount, comp structure, attrition
    rate. Thesis-break triggers (per Chapter 7 risk analysis): BCB PIX merchant fee
    introduction, Shopify Brazil payment institution launch, annual churn >25%, ANPD
    LGPD enforcement action, or Nuvem Crédito default rate >10%.'
