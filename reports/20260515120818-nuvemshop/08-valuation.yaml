- id: scenario-analysis
  title: Bull / Base / Bear Scenario Analysis
  body: 'Three investment scenarios are modeled based on discrete assumptions about
    NRR, growth rate, multiple at exit, and regulatory environment. Bear case ($800M–$1.5B):
    BCB introduces PIX merchant fees (compressing Nuvem Pago take rate), annual merchant
    churn rises to 22%+, NRR falls below 100%, revenue growth decelerates to 8–10%,
    exit multiple of 5× revenue at $200–250M ARR = $1.0–1.25B exit. Bear case scenario
    is a significant loss from 2021 round entry. Base case ($2.0–$2.5B): No BCB PIX
    fee, merchant churn remains at 15–18%, NRR at 100–108%, revenue growth at 15–18%,
    exit multiple of 8× revenue at $250–300M ARR = $2.0–2.4B exit. Base case represents
    0% to −35% return from 2021 round entry (flat to modest loss); breakeven to modest
    gain for new investors at $2.0B entry. Bull case ($3.0–$4.0B): Nuvem Pago attach
    rate scales to 80%+, Nuvem Crédito and AI suite generate incremental ARR, Mexico
    revenue doubles, NRR achieves 115–120% driven by financial services expansion,
    exit multiple of 12× revenue at $280–340M ARR = $3.4–4.1B exit. Bull case generates
    0–30% gain from 2021 round entry and attractive returns for new investors at $2.0B
    entry ($200–250M ARR at 12× multiple = $2.5–3.0B → 1.25–1.5× MOIC). Return profile
    to investors at $2.0B entry: bear 0.4–0.75×, base 1.0–1.25×, bull 1.5–2.0×. The
    asymmetric risk/return profile favors conditional investment at a significant
    discount to 2021 round price.'
