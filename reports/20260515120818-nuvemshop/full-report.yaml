  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop operates at the intersection of three heavily regulated domains: e-commerce, fintech (Nuvem
              Pago), and consumer data protection (LGPD)—each carrying distinct regulatory risk. The most material
              regulatory risk is BCB payment institution oversight. Nuvem Pago is registered as a payment institution
              with the Banco Central do Brasil, subject to BCB Resolution 4282/2013 (payment institution framework),
              ongoing capital reserve requirements, and anti-money laundering (AML/KYC) compliance under COAF rules. Any
              BCB revision to PIX fee policy—for example, introducing a merchant-side PIX transaction fee—could reduce
              Nuvem Pago's economic advantage (currently zero MDR for PIX transactions to merchants) and compress the
              incremental economics of the ~70% payment product attach rate. BCB has publicly considered a PIX merchant
              fee structure in 2023; any such policy change would be a material negative for Nuvemshop's financial
              services revenue model. LGPD (Lei Geral de Proteção de Dados) enforcement risk is growing: the Autoridade
              Nacional de Proteção de Dados (ANPD) gained full enforcement powers in 2023 and has the authority to
              impose fines of up to 2% of total Brazil revenue (capped at R$50M per violation). Nuvemshop processes
              sensitive personal and payment data for 150,000+ merchants and their end-customers; a data breach or LGPD
              non-compliance finding would expose the company to multi-million-reais penalties and reputational damage.
              CADE (Brazil's anti-trust authority) could initiate a market dominance investigation if Nuvemshop's
              estimated 30–40% market share in Brazilian SMB e-commerce platforms attracts scrutiny under Brazil's
              Competition Law (Lei 12529/2011). This is a latent risk with low near-term probability but material
              medium-term concern if market share continues to consolidate. Mexico financial regulation (CNBV fintech
              law—Lei Fintech, Lei 9.2/2018) creates compliance uncertainty for Tiendanube Pay in Mexico: the regulatory
              status of payment collection by non-licensed entities in Mexico is ambiguous, and CNBV fintech license
              requirements may apply to Nuvemshop's Mexico payment product. No enforcement action has been disclosed.
              PCI DSS Level 1 certification requires annual on-site assessment by a QSA (Qualified Security Assessor);
              failure to maintain certification would prohibit Nuvem Pago from processing card transactions and would be
              a critical operational failure.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
