      - number: '4.3'
        title: Financial Position and Capital Adequacy
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's last disclosed funding round was its Series E in June 2021, raising an estimated $90 million
              at a $3.1 billion valuation (led by Accel Partners, Tiger Global, and existing investors). Total capital
              raised is approximately $119 million across all rounds. No new round has been announced through the report
              date (2026-05-15), suggesting either: (a) the company has achieved cash flow neutrality or profitability;
              or (b) market conditions have made new equity raises unattractive. Press reports citing CEO statements in
              2023–2024 indicate the company achieved operational profitability by late 2023 or early 2024, consistent
              with the absence of a new capital raise. Capital adequacy risk is assessed as low-to-medium in the
              12-month horizon if profitability claims are accurate, but rises materially if the company is
              cash-consuming at an undisclosed rate. Key capital considerations: (1) Nuvem Pago requires regulatory
              capital as a payment institution registered with Banco Central do Brasil; BCB regulations require minimum
              capital reserves for payment processors; (2) Nuvem Crédito (merchant lending) may require balance-sheet
              capital or warehouse credit facilities; (3) LatAm expansion (Mexico, Colombia) requires incremental
              market-entry investment. The Tiger Global writedown of its private portfolio in 2022–2023 does not
              directly indicate Nuvemshop distress but signals reduced secondary market valuation and less favorable
              environment for growth-stage raises. The company's path to liquidity (IPO or M&A) is undisclosed; the 2021
              $3.1B valuation implies significant investor expectation of continued growth and eventual public market or
              acquisition exit.
