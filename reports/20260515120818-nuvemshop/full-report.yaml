      - number: '7.2'
        title: Operational and Technical Risks
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's primary operational risk is platform reliability during peak traffic events. Customer reviews
              on G2 and Trustpilot Brazil cite checkout downtime during Black Friday as a recurring issue—a critical
              failure mode for a platform where an estimated 25–30% of annual merchant GMV is processed in a 4-week
              window. The ongoing monolith-to-microservices migration introduces temporary reliability risk: during the
              transition period, partial microservices architecture creates complex failure modes that may be harder to
              diagnose and recover from than a single monolith. A platform outage during Black Friday could result in
              merchant claims for lost sales, reputational damage, and elevated churn in the cohort experiencing the
              outage. PIX infrastructure dependency is a second operational risk: Nuvemshop's Nuvem Pago relies on
              BCB-operated PIX infrastructure, which is a government-run system subject to periodic maintenance windows
              and, historically, two significant BCB PIX system incidents (November 2020 launch issues, 2022
              intermittent slowdowns). A BCB PIX infrastructure failure during a peak sales window would be outside
              Nuvemshop's technical control. AWS cloud single-provider concentration creates a third operational risk:
              all Nuvemshop storefront delivery, backend processing, and data analytics run on AWS. An AWS us-east-1 or
              sa-east-1 (São Paulo) regional failure would impact all Brazilian merchant storefronts. Cybersecurity
              risk: Nuvemshop processes card data, PIX keys, and CPF/CNPJ (Brazilian tax IDs) for millions of consumer
              transactions. A data breach or credential compromise would trigger LGPD 72-hour ANPD notification
              requirements, potential PCI DSS de-certification, and reputational damage. No breach has been disclosed.
              Carrier API reliability is an operational dependency risk: Correios (Brazilian postal service) has
              experienced labor strikes historically; a Correios strike during peak season would disrupt Nuvem Envio
              shipping label generation for a significant share of Brazilian merchants.
            claimRefs:
