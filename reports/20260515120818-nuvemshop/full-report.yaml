      - number: '4.2'
        title: Unit Economics and Monetization Depth
        blocks:
          - type: paragraph
            body: >-
              Unit economics for Nuvemshop are not publicly disclosed and must be estimated from comparable SaaS and
              payments platforms. The platform's land-and-expand model begins with merchant acquisition (often through
              its free tier), monetizes via subscription upgrades, then adds payment and logistics attach to increase
              revenue per merchant. An estimated blended annual revenue per merchant of R$1,200–2,500 (across the full
              merchant base including free tier) implies a revenue-weighted average that skews heavily toward the 25–30%
              of merchants on paid tiers. Key unit economic drivers include: (1) Net Revenue Retention (NRR)—estimated
              at 100–120% based on upsell assumptions from free→paid and payment attach; (2) Customer Acquisition Cost
              (CAC)—not disclosed; comparable SMB SaaS platforms report CAC of $150–500/merchant; (3) Gross margin on
              subscription—estimated at 65–80%, typical for SMB SaaS; (4) Gross margin on payments—estimated at 20–35%,
              typical for payment processing (interchange + revenue minus processing costs). The bundled offering
              creates a higher LTV-to-CAC ratio than pure-subscription or pure-payments businesses by monetizing the
              same merchant across two high-frequency touchpoints. Nuvemshop's path to sustainable unit economics
              depends critically on Nuvem Pago maintaining above-market take-rates as PIX penetration grows and
              card-alternative instant payment infrastructure matures in Brazil. Comparable platform metrics from
              MercadoLibre's Mercado Pago business (published) and VTEX (public filings) provide benchmarking anchors
              but do not directly translate to Nuvemshop's SMB mix.
