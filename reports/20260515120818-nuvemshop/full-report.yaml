              incapacitation would create market uncertainty, especially given Nuvemshop's unlisted/private status.
              Engineering talent retention is an increasing risk: LatAm's software engineering talent market has become
              significantly more competitive since 2020, with US-based technology companies (including Shopify, GitHub,
              MercadoLibre) offering USD-denominated remote compensation to Brazilian engineers. Nuvemshop's
              BRL-denominated compensation structure creates a structural talent competition disadvantage versus
              dollar-paying remote-first companies. Executing across 5 LatAm markets requires localized product,
              compliance, marketing, and operations capabilities; premature market expansion or under-investment in
              non-Brazil markets creates a multi-front execution risk where Nuvemshop could be caught between Brazil
              over-dependence and insufficient execution in Mexico/Colombia. The AI product roadmap requires building
              ML/AI engineering capability that Nuvemshop currently lacks at the depth of Shopify, which has a dedicated
              AI team and materially larger engineering budget.
