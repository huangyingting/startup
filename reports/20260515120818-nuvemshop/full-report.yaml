      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's expansion economics follow a classic land-and-expand SaaS motion: merchants start on a basic
              plan, then expand into financial products (Nuvem Pago, Nuvem Crédito), logistics (Nuvem Envio), and app
              marketplace usage—each contributing incremental revenue. Company-disclosed data suggests merchants who
              adopt Nuvem Pago generate ~40% more GMV than those who don't, implying higher-quality merchants
              self-select into the payment product, or that the payment integration itself accelerates merchant growth.
              The key customer concentration risks are: (1) Geographic concentration—Brazil generates an estimated 80%+
              of total revenue; a Brazil-specific macro shock (currency devaluation, consumer credit tightening) would
              disproportionately impact Nuvemshop vs. a more globally diversified platform; (2) Brazil Black Friday
              concentration—a significant share of annual GMV is processed in the 4-week Black Friday window, creating
              revenue seasonality and technical stress; (3) SMB vulnerability—Nuvemshop's merchant base skews toward
              businesses with thin margins and high sensitivity to interest rate and consumer spending cycles; Brazil's
              2023–2024 high-interest-rate environment increased SMB financial stress and potential churn; (4) No
              disclosed individual customer accounting for >5% of revenue; platform economics prevent single-customer
              concentration risk at the merchant level; (5) App marketplace partner concentration—if a leading app
              partner (e.g., a major ERP integration) migrates to a competitor ecosystem, it would reduce platform
              stickiness for merchants in that vertical.
            claimRefs:
