      - number: '7.3'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's business model has deep external dependencies that create correlated risk if a key partner
              changes pricing, policy, or availability. AWS cloud dependency is the broadest single-vendor risk: AWS
              sa-east-1 downtime, pricing changes, or contractual renegotiation would impact Nuvemshop's entire
              technical stack. While AWS is a mission-critical enterprise cloud provider with a 99.99%+ SLA commitment,
              the absence of multi-cloud redundancy means Nuvemshop has no fallback. Meta WhatsApp Business API
              dependency is a strategic risk: Nuvemshop's WhatsApp Commerce integrations rely on Meta's WhatsApp
              Business API policies and pricing. Meta has incrementally changed WhatsApp Business API pricing multiple
              times (introducing per-message fees in 2023); further policy changes could increase the cost or reduce the
              functionality of Nuvemshop's native WhatsApp commerce features. Carrier API dependencies: Nuvem Envio
              aggregates Correios, Jadlog, and Total Express APIs. Correios renegotiating commercial terms or changing
              API access could impact Nuvem Envio economics; a government decision to privatize or restructure Correios
              (ongoing Brazilian political discussion as of 2024) introduces contract uncertainty. Capital market
              dependency: Nuvemshop has raised approximately $1.1B+ in venture capital and has not disclosed
              profitability. Dependency on continued venture or growth equity financing introduces fundraising risk in a
              tight 2023–2025 growth equity market. Key app partner concentration: if leading ERP integrations (Bling,
              Tiny ERP, TOTVS) were to develop competing native storefronts, it would reduce app marketplace stickiness.
              LLM provider dependency for Nuvem AI: the undisclosed LLM API provider (likely OpenAI or Anthropic)
              controls pricing and capability access; a material price increase to LLM APIs could reduce the economics
              of AI feature investment.
