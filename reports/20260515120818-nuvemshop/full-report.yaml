            body: >-
              Nuvemshop's deepest moat is multi-layered lock-in: merchants who activate Nuvem Pago, Nuvem Envio, and
              domain hosting face high switching costs given integrated payment history, shipping contract rates, and
              customer data stored in the platform. The 70% payment adoption rate serves as a proxy for this ecosystem
              depth—each incremental financial service added raises the migration hurdle. Network effects are limited
              (the platform is not a marketplace), but supplier ecosystem effects operate through Nuvemshop's 8,000+ app
              store integrations that create partner dependency on Nuvemshop's merchant base. Brand-new entrants face a
              cold-start problem replicating Brazilian carrier integrations, PIX compliance, and NF-e fiscal
