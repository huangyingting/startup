  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's ~150,000 active merchants (2024) break down along three segmentation axes—geography, size, and
              vertical—each with distinct diligence implications. By geography: Brazil accounts for ~70% of active
              merchants (~105,000) and an estimated 80%+ of GMV given higher average order values and more developed
              payment infrastructure. Mexico is the second market at ~20% of merchants (~30,000), growing at a faster
              absolute rate than Brazil following the 2021 Tiger Global raise. Argentina (~5%), Colombia (~3%), and
              Chile (~2%) are smaller and operationally more complex given local currency controls, payment
              infrastructure differences, and regulatory environments. By merchant size: approximately 85% of merchants
              are micro or small businesses generating under R$500K annual GMV (roughly $100K USD); 12% are
