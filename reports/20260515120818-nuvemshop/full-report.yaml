      - number: '6.2'
        title: Adoption Trajectory and Usage Depth
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's active merchant count has grown from approximately 70,000 in 2020 to 130,000 in 2023 and an
              estimated 150,000+ in 2024—an average annual growth rate of approximately 21% over four years,
              decelerating from the 2020–2021 e-commerce boom period. Product adoption depth is a stronger signal than
              headline merchant count: Nuvem Pago has achieved approximately 70% merchant attach rate
              (company-disclosed), meaning roughly 105,000 merchants actively use Nuvemshop's own payment processor
              rather than a third-party. This attach rate is materially above Shopify Payments' equivalent attach rate
