      - number: '8.2'
        title: Current Financing Context and Valuation Entry
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's last primary financing was a $500M Series C in July 2021 led by Tiger Global Management and
              Baillie Gifford, implying a $3.1B post-money valuation. This round was priced at peak growth equity
              multiples (2021 SaaS median revenue multiple: 15–20× for high-growth companies). Since 2022, growth equity
              multiples have compressed significantly: the BVP Nasdaq Emerging Cloud Index declined ~60% from peak
              (2021) to trough (2022–2023), with partial recovery in 2024–2025. For Nuvemshop at an estimated $200–250M
              ARR (2025), the 2021 $3.1B valuation implied 12–15× forward ARR—a premium that requires 20%+ growth and
              110%+ NRR to sustain in a compressed multiple environment. A Series E financing at flat or down-round
              pricing from 2021 would value Nuvemshop at $2.5–3.1B. New investors at $3.1B entry with base case
              assumptions would achieve 0–50% total return over 5 years—insufficient for venture return requirements.
              New investors at $2.0–2.5B entry with base case assumptions achieve 100–150% return over 5 years with an
              IPO exit at 8–10× revenue, approaching venture minimum return thresholds. Dilution/preference
              consideration: Nuvemshop has approximately 10–15 investors with $1.1B+ invested; preference stack analysis
              requires data room review but total liquidation preference likely exceeds $800M, meaning the company must
              achieve $2.5B+ exit valuation for common equity and employee options to receive meaningful value.
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
