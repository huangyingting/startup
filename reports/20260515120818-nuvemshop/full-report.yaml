      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Conditional Buy at ≤$2.0B Entry — Do Not Close Without NRR and Churn Data
            body: >-
              Invest conditionally: the thesis is sound if NRR is verified at 100–110% and gross merchant churn is below
              20%. Do not close an investment at or above the 2021 $3.1B round price without verifying these metrics
              from audited data room materials. At $2.0B entry with confirmed base-case metrics, the risk-adjusted
              return profile is acceptable (1.0–2.0× MOIC at exit). At $3.1B entry with unverified metrics, the downside
              case produces a significant loss.
            calloutType: recommendation
            claimRefs:
              - CV008
              - CV013
              - CV025
          - type: callout
            title: 2021 Round Price Implies Negative Return at Base Case
            body: >-
              At the 2021 Series C price ($3.1B), a base-case exit at $2.0–2.5B (8× ARR) implies a 0.6–0.8× MOIC—a
              material loss. Only the bull case ($3.5–4.0B exit) breaks even with the 2021 round price. Investors should
              either negotiate a material discount to 2021 pricing or demonstrate with verified metrics that the bull
              case is the expected scenario.
            calloutType: risk
            claimRefs:
              - CV007
              - CV012
          - type: callout
            title: Shopify Comparable Validates $2.0B+ at Equivalent Stage Metrics
            body: >-
              Shopify at equivalent ARR stage ($200M ARR, 2015–2016) was valued at $1.5–2.0B while growing 40%+ with
              dominant SMB market position. Nuvemshop's slower growth (15–18% vs Shopify's 40%+) and higher regulatory
              risk discount this comp by 0.7–0.9×, but the structural market opportunity and fintech attach are
              incrementally valuable vs. a pure SaaS model—supporting a $2.0–3.0B fair value range.
            calloutType: insight
            claimRefs:
              - CV017
              - CV018
