  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop is a commerce operating system—not just a website builder—that covers the end-to-end operational
              workflow of a LatAm SMB merchant: from store setup and product cataloging, through order management and
              checkout, payment processing, shipping label generation, customer communication, and post-sale analytics.
              A typical merchant journey begins with Nuvemshop's no-code store builder (with mobile-responsive templates
              pre-optimized for Brazilian e-commerce norms), progresses through catalog management with product
              variants, then activates Nuvem Pago for payment collection (accepting PIX, credit cards with installments,
              Boleto, and debit), dispatches orders through Nuvem Envio with automated carrier rate comparison, and
              tracks performance via the merchant analytics dashboard. The 8,000+ app marketplace extends this core
              workflow with integrations for WhatsApp Business API, ERP systems (Bling, Tiny ERP), marketing platforms
              (RD Station, Klaviyo), and the emerging Nuvem AI product for automated product description generation.
              Nuvemshop's differentiation lies not in any single feature but in the depth of integration across the full
              merchant workflow at the SMB cost point—PIX native checkout, NF-e fiscal note automation, installment
              payment display (a Brazilian retail norm), and Portuguese/Spanish localization that global platforms
              cannot match without third-party plugins. The platform is mobile-first by design, reflecting LatAm's 70%+
              mobile browsing share, and supports both standalone iOS/Android merchant management apps and
              mobile-optimized storefronts.
            claimRefs:
