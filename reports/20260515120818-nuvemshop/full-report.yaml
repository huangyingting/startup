        title: Financial Gaps and Diligence Blockers
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's private company status creates fundamental financial underwriting limitations. The absence of
              audited financial statements, disclosed ARR, or verifiable unit economics means investor judgment depends
              heavily on estimated cross-checks against disclosed operational metrics. Five diligence blockers must be
              resolved before any financial underwriting can be completed: (1) actual ARR and revenue mix disclosure;
              (2) audited or reviewed gross margin by revenue segment (subscription vs. payments vs. logistics); (3)
              verified merchant churn rate and NRR; (4) BCB payment institution capital requirement disclosure; (5)
              merchant lending (Nuvem Crédito) balance sheet exposure and credit loss history. The operational traction
              data—180K+ merchants, R$6.5B Nuvem Pago GMV, 70% payment adoption—supports a plausible ARR range of
              R$230–420M but this estimate carries ±40% uncertainty. Financial red flags that would require explanation
              in due diligence: below-market NRR (<90%), gross margins below 50% at the consolidated level, or
              undisclosed regulatory capital deficiencies at Nuvem Pago. The Argentina exposure adds currency
              translation risk to the P&L that could be material given peso devaluation, though Brazil represents an
