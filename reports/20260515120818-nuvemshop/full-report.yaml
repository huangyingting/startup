      - number: '7.5'
        title: Mitigations, Kill Criteria, and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Primary mitigations in place: (1) BCB regulatory risk is partially mitigated by Nuvemshop's long-standing
              compliance investment, BCB relationship, and the fact that BCB has structural incentives to maintain PIX
              as a growth driver for financial inclusion—PIX fee introduction faces political resistance; (2) LGPD risk
              is partially mitigated by self-reported compliance investment (DPO appointment, privacy policy, security
              certifications), but is not fully verified; (3) Platform reliability risk is partially mitigated by CDN
              architecture (AWS CloudFront), PCI DSS Level 1 requiring quarterly security scans, and historical Black
              Friday preparation; (4) Macro concentration risk is partially mitigated by Mexico and Colombia growth,
              although Brazil revenue share remains high. Thesis-break triggers—conditions that would materially impair
              the investment thesis—include: (A) BCB introduces a merchant-side PIX transaction fee that reduces Nuvem
              Pago MDR economics by 50%+; (B) Shopify launches a native Brazil payment product (Shopify Payments Brazil)
              with PIX integration, eliminating Nuvemshop's primary technical moat; (C) ANPD issues a material
              enforcement action or fine against Nuvemshop for LGPD violations; (D) Annual gross merchant churn exceeds
              25%, indicating competitive or product quality deterioration; (E) A debt or equity financing round fails,
              triggering a liquidity event or down-round. Diligence asks: (1) Data room: NRR, gross churn, cohort
              retention by year and product tier; (2) BCB regulatory correspondence and payment institution license
              review; (3) Nuvem Crédito loan book metrics: default rate, provision coverage, outstanding balance; (4)
              LGPD compliance audit report and ANPD correspondence; (5) Engineering team headcount, compensation
