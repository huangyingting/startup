            body: >-
              Nuvemshop was co-founded in 2010 by Santiago Sosa (CEO) and Alejandro Alfonso (CPO/CTO), who remain the
              primary strategic and technical leaders. Co-founder dependence is moderate: the company has built an
              executive team over its 14-year history, but the founders remain the primary public faces and strategic
