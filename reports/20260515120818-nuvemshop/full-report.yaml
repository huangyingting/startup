      - number: '3.4'
        title: Competitive Risk Assessment and Diligence Gaps
        blocks:
          - type: paragraph
            body: >-
              Three competitive risks warrant close tracking: (1) Shopify LatAm localization—should Shopify acquire a
              Brazilian payments provider or build PIX/Nuvem Pago-equivalent rails, its global scale and developer
              ecosystem would pose an existential threat to Nuvemshop's mid-market; (2) VTEX mid-market descent—VTEX's
              enterprise focus has largely moved it upmarket but its pricing compression in Brazil mid-market could
              re-enter SMB territory; (3) MercadoLibre vertical integration—MercadoLibre's Mercado Shops is currently a
              low-feature toolkit but MercadoLibre has the financial scale and merchant relationships to build a true
              full-stack e-commerce platform. Key diligence gaps include: precise churn rates by competitive scenario,
              Nuvemshop's win/loss data against Shopify for merchants above R$500K ARR, and whether Nuvemshop has
              developer mindshare defensibility as Shopify's developer ecosystem grows in LatAm. Beyond these three
              primary threats, status-quo substitutes—most notably WhatsApp-based social commerce and informal order
              management through spreadsheets—continue to represent a meaningful friction point for Nuvemshop's user
              acquisition funnel. Approximately 70% of LatAm SMEs begin selling through social commerce before migrating
              to a dedicated storefront, meaning Nuvemshop must continuously compete for the attention of merchants who
              have not yet experienced dedicated platform benefits. Nuvemshop's free tier strategy directly addresses
              this cold-start problem by reducing the migration barrier.
