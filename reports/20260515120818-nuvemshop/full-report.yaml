  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop competes in the Latin American SMB independent e-commerce platform market, which sits below the
              enterprise tier (VTEX, Salesforce Commerce Cloud) and above informal social commerce. The market contains
              four competitive layers: (1) direct SMB platform competitors—Loja Integrada, Yampi, and Shopify—vying for
              the same independent-storefront SMB wallet; (2) enterprise-heritage platforms that occasionally land SMB
              (VTEX); (3) global self-hosted tools (WooCommerce, PrestaShop) that require technical sophistication; and
              (4) marketplace-adjacent options (MercadoShops) that cannibalize stand-alone brand development.
              Nuvemshop's 180,000+ active brand count and R$6.5 billion Nuvem Pago GMV (2025) represent the largest
              scale among native LatAm SMB platform vendors. VTEX's 2021 20-F risk factors explicitly identify Nuvemshop
