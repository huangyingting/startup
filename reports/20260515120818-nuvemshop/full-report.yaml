      - number: '5.2'
        title: Technology Architecture and Infrastructure
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop's backend is built on a microservices architecture deployed on Amazon Web Services (AWS), with
              core services including catalog/inventory management, order processing, checkout, payment gateway (Nuvem
              Pago), shipping calculation (Nuvem Envio), and the app marketplace API. The storefront layer uses React
              with server-side rendering for SEO optimization, combined with a Liquid-inspired theme templating system
              that allows merchants to customize layouts without code. Nuvemshop exposes a REST API (and a newer GraphQL
              API for partners) for its app marketplace, enabling the 8,000+ integrations to connect merchant data with
              external tools. Nuvem Pago is a separate payment institution registered with the Banco Central do Brasil;
              it processes PIX, cards (Visa/Mastercard/Elo/Amex), Boleto, BNPL, and installment credit card
              transactions. Nuvem Pago holds PCI DSS Level 1 certification, the highest tier for payment card industry
              security, which is essential for credit card processing at scale. The data infrastructure supports
              real-time analytics for merchant dashboards and cohort analysis, with data stored in AWS services (S3,
              RDS, Redshift). Nuvemshop has published open-source SDKs on GitHub in Node.js and PHP for app developers,
              reflecting a developer-first API strategy. NF-e (electronic fiscal invoice) automation is built into the
              checkout layer for Brazil, generating fiscal notes automatically upon order completion—a capability that
              requires deep integration with the Brazilian Receita Federal fiscal system. The technical stack has
              evolved from a monolithic Rails application (early 2010s) toward microservices, with ongoing migration
              work that represents both architectural debt and an investment in future scalability.
            claimRefs:
