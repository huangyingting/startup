    status: answered
    answer: Not disclosed. Estimated 70–80% based on SMB SaaS comparable benchmarks.
      Shopify subscription GM is ~80%; VTEX reports ~65–70%.
  - id: QI006
    question: What is Nuvemshop's estimated gross margin for Nuvem Pago payment processing?
    type: quantification
    targets:
    - contentRequirements/2
    status: answered
    answer: Not disclosed. Estimated 20–35% net after interchange, BCB capital, and
      chargeback reserves. Comparable to Mercado Pago (~35%) and Square (~40%).
  - id: QI007
    question: What regulatory capital does Nuvemshop hold as a BCB-registered payment
      institution?
    type: verification
    targets:
    - contentRequirements/4
    status: unresolved
  - id: QI008
    question: What is Nuvemshop's estimated Customer Acquisition Cost per paid merchant?
    type: quantification
    targets:
    - contentRequirements/1
    status: answered
    answer: Not disclosed. SMB SaaS peers report CAC of $150–500/merchant. Nuvemshop's
      free-tier acquisition model likely implies lower CAC for volume but higher CAC
      for paid upgrades.
  - id: QI009
    question: What is the size and credit loss history of Nuvem Crédito's merchant
      loan book?
    type: adverse
    targets:
    - contentRequirements/4
    status: unresolved
  - id: QI010
    question: How has Argentina's peso devaluation affected Nuvemshop's USD-denominated
      financials?
    type: adverse
    targets:
    - contentRequirements/3
    - contentRequirements/5
    status: answered
    answer: Not formally disclosed. Argentina accounts for an estimated 10–15% of
      Nuvemshop's merchant base. Peso devaluation reduces USD revenue contribution
      from Argentina and may require ARR adjustments.
  - id: QI011
    question: What are the details of Nuvemshop's Series E funding round including
      all co-investors?
    type: verification
    targets:
    - contentRequirements/4
    status: answered
    answer: Series E closed June 2021, led by Accel Partners with Tiger Global Management,
      Kaszek Ventures, and existing investors. Amount estimated at $90M for $3.1B
      post-money valuation. Confirmed by multiple press sources.
  - id: QI012
    question: What is the blended average revenue per merchant (ARPU) for Nuvemshop
      in 2025?
    type: quantification
    targets:
    - contentRequirements/1
    status: answered
    answer: Estimated R$1,200–2,500/yr per active merchant (blended across all paid
      and free tiers). Higher for merchants using Nuvem Pago and Nuvem Envio.
  - id: QI013
    question: Has Nuvemshop disclosed any net revenue retention or merchant churn
      metrics?
    type: adverse
    targets:
    - contentRequirements/3
    status: unresolved
  - id: QI014
    question: What is VTEX's disclosed gross margin as a public company comparable
      to Nuvemshop?
    type: comparison
    targets:
    - contentRequirements/2
    status: answered
    answer: VTEX FY2023 20-F reports gross margin of approximately 69%, reflecting
      enterprise SaaS margins. Higher than estimated Nuvemshop blended margin due
      to enterprise mix without payment processing cost.
  - id: QI015
    question: What is Shopify's disclosed gross margin and payment segment margin
      for benchmarking?
    type: comparison
    targets:
    - contentRequirements/2
    status: answered
    answer: Shopify FY2024 reports overall gross margin of ~57%, with subscription
      solutions ~79% and merchant solutions (payments) ~40%. Merchant solutions gross
      margin is lower due to payment processing costs.
  - id: QI016
    question: What are Nuvemshop's disclosed total funds raised to date?
    type: quantification
    targets:
    - contentRequirements/4
    status: answered
    answer: Approximately $119M total raised per press and Crunchbase, though pre-2019
      round details are estimates. Series E ($90M, 2021) is the largest and best-documented
      round.
  - id: QI017
    question: What is Nuvemshop's current estimated valuation, adjusted for 2022-2023
      growth-stage repricing?
    type: quantification
    targets:
    - contentRequirements/5
    status: answered
    answer: No secondary transaction or new round has been disclosed. Tiger Global's
      portfolio markdowns (2022–2023) imply broad valuation compression for growth-stage
      companies. Current fair value estimate is speculative without transaction evidence.
  - id: QI018
    question: How does PIX adoption threaten Nuvem Pago's payment revenue stream?
    type: mechanism
    targets:
    - contentRequirements/0
    - contentRequirements/5
    status: answered
    answer: PIX charges zero MDR for most consumer transactions in Brazil. As PIX
      penetration grows, card-linked payment volume (which carries MDR) may shift
      to free PIX, compressing Nuvem Pago revenue. Nuvemshop has integrated PIX within
      Nuvem Pago to maintain gateway attachment, but the blended MDR will likely decline
      over time.
  - id: QI019
    question: What are the working capital requirements for Nuvemshop's logistics
      business?
    type: quantification
    targets:
    - contentRequirements/2
    status: answered
    answer: Not disclosed. Logistics businesses typically require float for carrier
      pre-payment and working capital. Nuvem Envio likely requires R$5–20M in carrier
      float depending on volume timing.
  - id: QI020
    question: What is MercadoLibre's Mercado Pago take rate as a comparable LatAm
      payments benchmark?
    type: comparison
    targets:
    - contentRequirements/0
    status: answered
    answer: MercadoLibre's 2024 20-F discloses Mercado Pago TPV of approximately $209B
      and net revenue from payments of ~$3.0B, implying ~1.4% blended take rate. This
      provides a relevant LatAm payments benchmark for estimating Nuvem Pago economics.
  - id: QI021
    question: Has Nuvemshop disclosed any capex or infrastructure investment requirements?
    type: quantification
    targets:
    - contentRequirements/2
    status: unresolved
  - id: QI022
    question: What is the revenue impact of Nuvemshop's free tier on gross margin
      dilution?
    type: mechanism
    targets:
    - contentRequirements/2
    status: answered
    answer: Free tier merchants generate zero subscription revenue but do incur hosting
      and support costs. Estimated ~30% of active 180K merchants are on free tier,
      contributing to gross margin dilution. Free-tier serves as an acquisition channel,
      with conversion to paid tiers justifying the cost.
  - id: QI023
    question: What is the financial impact of Nuvemshop's LatAm expansion beyond Brazil
      on revenue and margins?
    type: quantification
    targets:
    - contentRequirements/3
    status: answered
    answer: Brazil accounts for an estimated 60%+ of Nuvemshop's revenue. Mexico is
      growing but smaller. Argentina contribution is diminished by peso devaluation.
      LatAm expansion diversifies revenue geography but at lower blended ARPU outside
      Brazil.
  - id: QI024
    question: What is the financial verdict on Nuvemshop's revenue quality and diligence
      blockers?
    type: verification
    targets:
    - contentRequirements/5
    status: answered
    answer: 'Revenue quality is medium: subscription and payment revenues are recurring;
      logistics is recurring-transactional. Key diligence blockers: ARR not disclosed,
      gross margins by segment unavailable, NRR and churn undisclosed, BCB capital
      requirements undisclosed, Nuvem Crédito loan book unexposed.'
  - id: QI025
    question: What is Nuvemshop's current cash burn rate or estimated operating cash
      flow?
    type: adverse
    targets:
    - contentRequirements/4
    status: unresolved
