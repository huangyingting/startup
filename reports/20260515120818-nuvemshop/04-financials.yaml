callouts:
- calloutType: insight
  title: Multi-Layer Revenue Model with Embedded Payment Lock-In
  body: Nuvemshop's monetization architecture is structurally superior to pure-SaaS
    or pure-payments competitors because it earns subscription AND payment take-rate
    AND logistics fees from the same merchant. Each layer added increases total revenue
    per merchant while simultaneously raising switching costs, creating a virtuous
    cycle of ARPU expansion and retention.
  claimRefs:
  - CI001
  - CI002
- calloutType: risk
  title: PIX Zero-Fee Threat to Payment Take-Rate
  body: Brazil's PIX instant payment system charges zero merchant fees for most transactions.
    As PIX penetration grows, merchants may shift payment volume away from card-linked
    Nuvem Pago to zero-cost PIX, compressing Nuvemshop's most important revenue stream.
    Nuvemshop has addressed this by integrating PIX within Nuvem Pago, but the blended
    take-rate will likely decline over time.
  claimRefs:
  - CI006
  - CI029
- calloutType: insight
  title: No New Capital Round Since June 2021
  body: Five years without a disclosed equity round is unusual for a growth-stage
    company at $3.1B valuation. Either profitability has made new equity unnecessary
    (positive), or the company has been unable to raise at an acceptable valuation
    given Tiger Global portfolio repricing (neutral/negative). Management confirmation
    of profitability status is a priority diligence question.
  claimRefs:
  - CI017
  - CI018
