callouts:
- calloutType: risk
  title: BCB PIX Merchant Fee — Thesis-Break Regulatory Trigger
  body: BCB has publicly discussed introducing a merchant-side PIX transaction fee
    (as of 2023). Any such fee—even a modest 0.1–0.2% MDR equivalent—would reduce
    Nuvem Pago's zero-MDR PIX advantage and compress Nuvemshop's payment economics
    on its ~70% attach rate product. This is a policy risk that investors cannot hedge
    and represents the single regulatory event with highest potential impact on unit
    economics.
  claimRefs:
  - CR002
  - CR024
- calloutType: risk
  title: Shopify Brazil Payment Product — Competitive Thesis-Break
  body: If Shopify launches a native Brazil payment institution (Shopify Payments
    Brazil) with PIX integration, it would eliminate Nuvemshop's primary technical
    moat. Shopify has the financial resources and market incentive to pursue Brazilian
    payment institution registration. The 18–24 month regulatory lead time provides
    a window, but this is not a permanent structural barrier.
  claimRefs:
  - CR006
  - CR026
- calloutType: recommendation
  title: LGPD Compliance and Nuvem Crédito Loan Book Require Independent Verification
  body: 'Two risk areas require independent third-party verification before completing
    diligence: (1) LGPD compliance—obtain the ANPD correspondence log and any pending
    regulatory inquiries; commission a LGPD technical audit from a Brazilian privacy
    law firm; (2) Nuvem Crédito loan book—request default rates, loss provision coverage,
    outstanding balance, and credit policy documentation. Both are binary risk areas
    that could significantly alter valuation.'
  claimRefs:
  - CR003
  - CR019
  - CR030
