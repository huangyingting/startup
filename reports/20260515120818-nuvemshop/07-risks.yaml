  researchQuestions:
  - id: QR001
    question: Has BCB publicly proposed or implemented a merchant-side PIX transaction
      fee?
    type: verification
    targets:
    - contentRequirements/1
    status: answered
    answer: BCB published a regulatory consultation in 2023 exploring whether PIX
      merchant fees should be introduced to support smaller payment institution economics.
      As of 2025, no merchant fee has been implemented; BCB has maintained the free-for-merchants
      model for PIX. Political and financial inclusion considerations constrain a
      reversal, but the risk is not zero.
  - id: QR002
    question: Has ANPD issued any enforcement actions against e-commerce platforms
      for LGPD violations?
    type: adverse
    targets:
    - contentRequirements/1
    status: answered
    answer: ANPD has issued enforcement actions against multiple Brazilian companies
      since gaining full enforcement power in 2023, including fines against financial
      institutions and health platforms. No specific enforcement action against Nuvemshop
      has been found in ANPD public records as of April 2025.
  - id: QR003
    question: Has CADE opened any investigation into Nuvemshop or the Brazilian SMB
      e-commerce platform market?
    type: adverse
    targets:
    - contentRequirements/1
    status: answered
    answer: No CADE investigation against Nuvemshop found in CADE public records.
      CADE has investigated B2W/Americanas and MercadoLibre for marketplace dominance
      concerns; Nuvemshop SMB platform market share (~30–35%) is below the typical
      threshold for dominance investigations in Brazil.
  - id: QR004
    question: Has Shopify registered or applied to be a payment institution with BCB
      in Brazil?
    type: verification
    targets:
    - contentRequirements/1
    status: answered
    answer: No BCB payment institution registration for Shopify found in BCB public
      records as of April 2025. Shopify Payments is not available in Brazil; Shopify
      Brazil merchants must use third-party payment gateways. This confirms Nuvemshop's
      PIX moat is intact as of the report date.
  - id: QR005
    question: Has Nuvemshop disclosed any cybersecurity incidents or data breaches?
    type: adverse
    targets:
    - contentRequirements/2
    status: answered
    answer: No disclosed cybersecurity incidents or LGPD data breach notifications
      from Nuvemshop found in public records. PCI DSS Level 1 certification requires
      ongoing security controls, providing a baseline assurance framework.
  - id: QR006
    question: What is the current status of Nuvemshop's Nuvem Crédito merchant lending
      default rate?
    type: quantification
    targets:
    - contentRequirements/4
    status: unresolved
  - id: QR007
    question: What is Nuvemshop's current cash runway and burn rate?
    type: quantification
    targets:
    - contentRequirements/4
    status: unresolved
  - id: QR008
    question: What is the mechanism through which a BCB PIX merchant fee would affect
      Nuvem Pago economics?
    type: mechanism
    targets:
    - contentRequirements/1
    status: answered
    answer: 'Nuvem Pago currently charges zero MDR for PIX transactions to merchants,
      enabling zero-cost payment acceptance. If BCB introduced a 0.1–0.2% merchant-side
      PIX fee, Nuvemshop would face a choice: absorb the cost (compressing Nuvem Pago
      margin), pass through to merchants (reducing competitive advantage vs. other
      PIX acceptors), or exit PIX zero-MDR (losing key differentiator). All scenarios
      negatively impact unit economics.'
  - id: QR009
    question: Has Meta changed WhatsApp Business API pricing in ways that affect commerce
      integrations?
    type: verification
    targets:
    - contentRequirements/3
    status: answered
    answer: Yes. Meta transitioned WhatsApp Business API to a conversation-based pricing
      model in February 2022, introducing per-conversation fees that increased costs
      for high-volume notification use cases. This affected Nuvemshop's native WhatsApp
      order notification features and increased merchant communication costs.
  - id: QR010
    question: What compliance framework does Nuvemshop apply for AML/KYC on Nuvem
      Pago?
    type: verification
    targets:
    - contentRequirements/1
    status: answered
    answer: As a BCB-registered payment institution, Nuvem Pago is subject to COAF
      (Financial Intelligence Unit) AML reporting requirements and BCB Resolution
      4595/2017 (AML program for payment institutions). Nuvemshop has not disclosed
      details of its AML/KYC compliance program in public sources.
  - id: QR011
    question: How significant is Correios to Nuvemshop's Nuvem Envio logistics product,
      and what is the history of Correios strikes?
    type: verification
    targets:
    - contentRequirements/2
    status: answered
    answer: Correios is the dominant carrier for Brazilian e-commerce due to nationwide
      coverage and CEP (zip code) system integration. Correios had significant labor
      strikes in 2023, 2019, and 2015. Each strike disrupted e-commerce logistics
      industry-wide. Nuvemshop has Jadlog and Total Express as alternatives, but Correios
      handles the majority of Brazilian last-mile e-commerce deliveries.
  - id: QR012
    question: What are the PCI DSS v4.0 requirements that Nuvemshop must maintain
      for Nuvem Pago?
    type: verification
    targets:
    - contentRequirements/1
    status: answered
    answer: 'PCI DSS Level 1 certification (required for >6M transactions/year) mandates:
      annual on-site audit by a QSA, quarterly network scans, penetration testing,
      card data environment controls, and 12 security requirement domains. PCI DSS
      v4.0 (effective April 2024) introduces new requirements including multi-factor
      authentication extensions and stronger encryption standards.'
  - id: QR013
    question: What is Nuvemshop's regulatory status in Mexico under the Fintech Law
      (Lei Fintech)?
    type: verification
    targets:
    - contentRequirements/1
    status: unresolved
  - id: QR014
    question: Has Argentina's BCRA imposed constraints on Nuvemshop's Argentina operations?
    type: verification
    targets:
    - contentRequirements/1
    status: answered
    answer: Argentina's BCRA foreign exchange controls have created operational complexity
      for digital platform businesses; Nuvemshop press reports indicate Argentina
      GMV declined in USD terms due to peso devaluation but Nuvemshop has not specifically
      disclosed regulatory constraints. Argentina is a small share of total revenue.
  - id: QR015
    question: What level of engineering talent competition does Nuvemshop face from
      US remote employers?
    type: adverse
    targets:
    - contentRequirements/4
    status: answered
    answer: 'Significant: GitHub, Shopify, MercadoLibre, Nubank, and remote-first
      US companies offer USD-denominated packages to Brazilian engineers. An experienced
      Brazilian backend engineer earning R$15,000/month from a local company can earn
      $80,000–$120,000/year USD remotely—4–6× more. Nuvemshop''s equity program partially
      compensates, but the talent gap is structural.'
  - id: QR016
    question: What is the threat from free-tier e-commerce platforms (WooCommerce,
      Wix free tier) to Nuvemshop's downmarket SMB base?
    type: adverse
    targets:
    - contentRequirements/0
    status: answered
    answer: WooCommerce (free open-source) and Wix free tier create downmarket pressure
      among the smallest Brazilian merchants (micro-enterprises). The key distinction
      is that WooCommerce requires hosting and technical setup that Nuvemshop's no-code
      offering eliminates; Wix free tier lacks Brazilian PIX/NF-e integration. Downmarket
      competition is real but limited by localization depth gap.
  - id: QR017
    question: Has Nuvemshop disclosed the default rate or credit loss provisioning
      for Nuvem Crédito?
    type: verification
    targets:
    - contentRequirements/4
    status: answered
    answer: No default rate or provisioning data for Nuvem Crédito has been disclosed
      in public sources. Merchant lending to SMBs in Brazil carries historical default
      rates of 5–15% in adverse macro environments. Without data room access, this
      is a material unquantified risk.
  - id: QR018
    question: What is Nuvemshop's potential exposure to LGPD fines given its data
      processing volume?
    type: quantification
    targets:
    - contentRequirements/1
    status: answered
    answer: LGPD allows ANPD to fine up to 2% of total Brazil gross revenue for the
      prior fiscal year, capped at R$50M per violation. Given estimated Brazil revenue
      of R$500M–R$1B, a maximum fine would be R$10M–R$20M—material but not company-threatening;
      reputational damage from enforcement would be more impactful.
  - id: QR019
    question: Is there any disclosed litigation or pending legal action against Nuvemshop?
    type: verification
    targets:
    - contentRequirements/1
    status: answered
    answer: No material disclosed litigation found in public records. Consumer claims
      via Reclame Aqui and Procon channels are operational (not court litigation).
      No employment tribunal or IP litigation against Nuvemshop found in public sources.
  - id: QR020
    question: What monitoring indicators can be used to detect early signs of PIX
      regulatory risk?
    type: mechanism
    targets:
    - contentRequirements/5
    status: answered
    answer: 'Key leading indicators: (1) BCB public consultation on PIX merchant fee
      posted on bcb.gov.br; (2) Central bank speeches mentioning PIX sustainability
      or cost recovery; (3) Payment institution trade body (ABIPAG) lobbying against
      fees; (4) Congressional bill discussions on digital payments regulation.'
  - id: QR021
    question: What is the documented history of BCB PIX infrastructure reliability
      incidents?
    type: adverse
    targets:
    - contentRequirements/2
    status: answered
    answer: BCB PIX had a significant system incident at launch in November 2020 (overload
      on the first day of operation) and intermittent slowdowns in 2022. BCB reports
      PIX availability as 99.9%+ since 2021, but periodic incidents occur. Nuvemshop
      has no control over BCB PIX infrastructure; downtime during peak events would
      be unmitigatable.
  - id: QR022
    question: What is the risk that Nuvem Crédito merchant lending creates systemic
      credit exposure during a Brazilian macro downturn?
    type: adverse
    targets:
    - contentRequirements/4
    status: answered
    answer: Nuvem Crédito targets active merchants with GMV-backed credit scoring.
      In a Brazilian macro downturn, merchant GMV declines simultaneously with credit
      quality—creating correlated default risk where merchant income falls at the
      same time loan repayment capacity falls. Outstanding loan book balance is undisclosed;
      this risk is unquantifiable without data room access.
  - id: QR023
    question: What thesis-break triggers should investors monitor post-investment?
    type: enumeration
    targets:
    - contentRequirements/5
    status: answered
    answer: 'Six thesis-break triggers: (1) BCB PIX merchant fee; (2) Shopify Brazil
      payment institution launch; (3) annual merchant churn >25%; (4) ANPD LGPD enforcement
      action; (5) fundraising failure/down-round; (6) Nuvem Crédito default rate >10%.'
  - id: QR024
    question: How does Nuvemshop's risk profile compare to Shopify at its equivalent
      stage (Series E)?
    type: comparison
    targets:
    - contentRequirements/0
    status: answered
    answer: Shopify at Series E (2015) had lower regulatory risk (Canada/US payment
      regulation simpler than BCB/LGPD regime), lower geographic concentration (North
      American multi-market), but comparable operational risk (single cloud). Nuvemshop's
      fintech regulatory risk is higher than Shopify was at equivalent stage due to
      Brazil's more complex payment institution regulatory environment.
  - id: QR025
    question: What is the aggregate risk-adjusted residual exposure for Nuvemshop's
      identified risk universe?
    type: quantification
    targets:
    - contentRequirements/0
    status: answered
    answer: 'Analyst risk-adjusted view: high residual exposure on BCB PIX fee risk
      (probability × impact = highest risk score) and on Nuvem Crédito credit loss
      (unquantified); medium residual on LGPD enforcement, talent attrition, and platform
      reliability; low residual on CADE anti-trust, PCI DSS failure, and single-customer
      concentration. Overall risk profile is moderate-high versus comparable global
      SaaS platforms due to LatAm regulatory complexity.'
  - id: QR026
    question: How does Nuvemshop manage its AML and KYC obligations for Nuvem Pago
      under COAF rules?
    type: verification
    targets:
    - contentRequirements/1
    status: answered
    answer: As a BCB-registered payment institution, Nuvem Pago operates under BCB
      AML/KYC requirements (BCB Resolution 4595/2017) and COAF reporting obligations.
      Nuvemshop has not disclosed details of its AML program publicly; compliance
      with BCB licensing implies an AML program is in place, but the depth and effectiveness
      require data room verification.
  - id: QR027
    question: What is the estimated BCB capital reserve requirement for Nuvem Pago
      and how does it affect capital allocation?
    type: quantification
    targets:
    - contentRequirements/4
    status: answered
    answer: BCB requires payment institutions to maintain minimum net worth capital
      (Patrimônio Líquido Mínimo) proportional to transaction volumes and risk exposure.
      Specific reserve amounts for Nuvem Pago are not publicly disclosed but increase
      as PIX and card transaction volumes grow—creating a capital allocation constraint
      as payment volumes scale.
  - id: QR028
    question: What operational mitigations does Nuvemshop have in place for Black
      Friday traffic spikes?
    type: verification
    targets:
    - contentRequirements/2
    status: answered
    answer: 'From public signals: CloudFront CDN for static content delivery, microservices
      migration to enable horizontal scaling, and pre-Black Friday capacity planning
      (standard for mature e-commerce platforms). The ongoing G2 and Trustpilot complaints
      about Black Friday downtime suggest these mitigations are partial but not fully
      effective at current scale.'
  - id: QR029
    question: Has Nuvemshop experienced any regulatory enforcement action from BCB
      related to Nuvem Pago operations?
    type: adverse
    targets:
    - contentRequirements/1
    status: answered
    answer: No BCB enforcement actions against Nuvemshop or Nuvem Pago found in BCB
      public records or press as of April 2025. BCB maintains a public register of
      payment institution enforcement actions; Nuvemshop is not listed as of the review
      date.
  - id: QR030
    question: What is the risk that Nuvemshop's NF-e SEFAZ integration creates compliance
      exposure if Receita Federal changes technical standards?
    type: mechanism
    targets:
    - contentRequirements/2
    status: answered
    answer: Receita Federal periodically updates NF-e technical standards (e.g., NF-e
      4.0 in 2018). Each update requires Nuvemshop to update its SEFAZ API integration
      within mandated deadlines (typically 6–12 months). Failure to update would expose
      merchants to fiscal non-compliance. This is an ongoing operational cost but
      not an existential risk given Nuvemshop's 14-year integration track record.
