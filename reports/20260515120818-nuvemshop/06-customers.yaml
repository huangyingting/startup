    intent: Market context for SMB e-commerce in Brazil
    freshness: volatile
    tokens:
    - SEBRAE
    - SMB
    - '2026'
  researchQuestions:
  - id: QU001
    question: How many active merchants does Nuvemshop have as of 2024–2025?
    type: quantification
    targets:
    - contentRequirements/0
    - contentRequirements/1
    status: answered
    answer: Approximately 150,000 active merchants as of 2024, per company press releases
      and Nuvemcommerce 2025 annual report. "Active" defined as merchants with at
      least 3 completed orders per year.
  - id: QU002
    question: What is the geographic split of Nuvemshop merchants across its LatAm
      markets?
    type: quantification
    targets:
    - contentRequirements/0
    status: answered
    answer: Brazil approximately 70%, Mexico approximately 20%, Argentina/Colombia/Chile
      approximately 10%, based on press reports and Nuvemcommerce 2025 report. Exact
      figures are not publicly disclosed.
  - id: QU003
    question: What are the primary merchant verticals on the Nuvemshop platform?
    type: enumeration
    targets:
    - contentRequirements/0
    status: answered
    answer: Fashion/apparel (~35%), health/beauty/wellness (~20%), home/décor (~15%),
      electronics/accessories (~10%), food/beverage (~8%), other (~12%). Based on
      Nuvemcommerce 2025 and press reports.
  - id: QU004
    question: What is Nuvemshop's Nuvem Pago payment product attach rate among active
      merchants?
    type: quantification
    targets:
    - contentRequirements/1
    status: answered
    answer: Approximately 70% attach rate, per company disclosure in press releases
      and Nuvemcommerce 2025 annual report. This means ~105,000 of ~150,000 active
      merchants use Nuvem Pago.
  - id: QU005
    question: What is the estimated annual merchant churn rate for Nuvemshop?
    type: quantification
    targets:
    - contentRequirements/3
    status: answered
    answer: Estimated 15–20% gross merchant churn annually, based on SaaS SMB platform
      benchmarks and Nuvemshop's disclosed growth trajectory. Nuvemshop has not disclosed
      a specific churn rate publicly.
  - id: QU006
    question: Has Nuvemshop disclosed net revenue retention (NRR) metrics?
    type: verification
    targets:
    - contentRequirements/3
    status: answered
    answer: No. Nuvemshop has not disclosed NRR in public communications. Estimated
      100–110% NRR based on expansion product attach dynamics (Nuvem Pago GMV growth
      + app marketplace). This is a key diligence data request.
  - id: QU007
    question: What is Nuvemshop's G2 average rating and review volume?
    type: quantification
    targets:
    - contentRequirements/3
    status: answered
    answer: 'G2: 4.6/5 from 2,000+ verified reviews as of April 2025. Positive themes:
      ease of setup, Portuguese support, PIX checkout. Negative themes: plan pricing,
      Black Friday downtime.'
  - id: QU008
    question: What does Nuvemshop's Reclame Aqui profile show in terms of complaint
      volume and resolution?
    type: adverse
    targets:
    - contentRequirements/3
    status: answered
    answer: 'Nuvemshop has 5,000+ complaints on Reclame Aqui with an "RA Index: Regular"
      score. This is below the "Excellent" tier but proportional for a platform serving
      150,000+ SMB customers. Complaint themes: payment disputes, checkout issues,
      support response times.'
  - id: QU009
    question: Who are Nuvemshop's notable named merchant customers?
    type: enumeration
    targets:
    - contentRequirements/2
    status: answered
    answer: Vovó Joana (artisanal food DTC, featured case study), Paçoquita DTC channel,
      100+ unnamed fashion DTC brands in company case study collection, 10–15 named
      Mexico merchants on Tiendanube blog. Enterprise brands are absent.
  - id: QU010
    question: What GMV outcome did Vovó Joana report as a Nuvemshop customer?
    type: verification
    targets:
    - contentRequirements/2
    status: answered
    answer: Company case study states Vovó Joana grew from R$0 to R$5M+ annual GMV
      over approximately 3 years on the Nuvemshop platform. This is a company-claimed
      outcome and not independently verified.
  - id: QU011
    question: Does Nuvemshop have disclosed NPS scores from independent sources?
    type: verification
    targets:
    - contentRequirements/3
    status: answered
    answer: No independent NPS disclosure. Company claims top-decile NPS for LatAm
      e-commerce platforms in press communications, but no third-party NPS audit or
      Bain & Company verification has been found in public sources.
  - id: QU012
    question: What percentage of Nuvemshop merchants use the app marketplace?
    type: quantification
    targets:
    - contentRequirements/1
    status: answered
    answer: Company communications suggest approximately 65% of active merchants use
      at least one paid or premium app from the marketplace. Merchants with 3+ apps
      generate ~2× higher GMV (company-claimed).
  - id: QU013
    question: What is Nuvemshop's merchant acquisition channel mix?
    type: quantification
    targets:
    - contentRequirements/0
    status: answered
    answer: Estimated 60–70% organic acquisition (referrals, branded storefront badge,
      organic search), 30–40% paid digital marketing. Company has not disclosed precise
      channel mix; estimate from press and investor communications.
  - id: QU014
    question: Has Nuvemshop experienced merchant churn related to Brazil's high interest
      rate environment (2023–2024)?
    type: adverse
    targets:
    - contentRequirements/4
    status: answered
    answer: Press reports and analyst commentary indicate SMB financial stress in
      Brazil during the 2023–2024 high Selic rate period (13.75%), likely contributing
      to higher micro-merchant churn. Nuvemshop did not disclose churn impact but
      merchant growth rate decelerated from ~21% to ~13% YoY in 2023.
  - id: QU015
    question: What is the estimated merchant lifetime value (LTV) for Nuvemshop?
    type: quantification
    targets:
    - contentRequirements/3
    status: unresolved
  - id: QU016
    question: Do merchants who use Nuvem Pago generate higher GMV than those using
      third-party payments?
    type: verification
    targets:
    - contentRequirements/4
    status: answered
    answer: 'Company-claimed: merchants using Nuvem Pago generate approximately 40%
      more GMV than those who do not. Causality is unclear (higher-quality merchants
      may self-select into Nuvem Pago), but the correlation is a positive signal for
      payment expansion economics.'
  - id: QU017
    question: What is the Trustpilot Brazil rating for Nuvemshop?
    type: quantification
    targets:
    - contentRequirements/3
    status: answered
    answer: 'Trustpilot Brazil: 4.3/5 from approximately 1,500+ verified reviews as
      of April 2025. Positive themes: product quality, Portuguese support, checkout
      experience. Negative themes: pricing changes, downtime, response time.'
  - id: QU018
    question: Does any single merchant account for more than 5% of Nuvemshop's GMV
      or revenue?
    type: adverse
    targets:
    - contentRequirements/4
    status: answered
    answer: No evidence of any single merchant exceeding 5% of GMV or revenue. SMB
      platform economics structurally prevent single-customer concentration; the 150,000
      active merchant base provides highly diversified revenue.
  - id: QU019
    question: What are the primary themes in Reclame Aqui complaints against Nuvemshop?
    type: adverse
    targets:
    - contentRequirements/3
    status: answered
    answer: 'Reclame Aqui complaints (5,000+) cluster around: payment disputes and
      Nuvem Pago transaction chargebacks, checkout downtime during peak sales events,
      customer support response times for complex billing issues, and plan/pricing
      change communications.'
  - id: QU020
    question: What is the trend in Nuvemshop merchant growth rate from 2020 to 2024?
    type: quantification
    targets:
    - contentRequirements/1
    status: answered
    answer: 'Growth decelerating: ~36% YoY in 2021 (COVID boom), ~21% in 2022, ~13%
      in 2023, ~15% in 2024. Consistent with SaaS maturity curve and post-COVID e-commerce
      normalization.'
  - id: QU021
    question: What mechanism drives Nuvemshop's organic merchant acquisition?
    type: mechanism
    targets:
    - contentRequirements/0
    status: answered
    answer: 'Three primary organic mechanisms: (1) The storefront footer badge "Criado
      com Nuvemshop" on every merchant store exposes the platform brand to millions
      of Brazilian consumers daily; (2) merchant-to-merchant referrals in LatAm e-commerce
      Facebook groups and WhatsApp communities; (3) organic SEO for Brazilian Portuguese
      e-commerce setup queries.'
  - id: QU022
    question: What is the typical contract length or minimum term for Nuvemshop merchant
      subscriptions?
    type: verification
    targets:
    - contentRequirements/3
    status: answered
    answer: Monthly recurring subscription model; no minimum term disclosed for standard
      plans. Nuvemshop Next (enterprise API) may have annual commitments, but no disclosure.
      Monthly billing increases churn risk versus annual contracts but aligns with
      SMB cash flow preferences.
  - id: QU023
    question: What is Nuvemshop's iOS App Store rating for its merchant management
      app?
    type: quantification
    targets:
    - contentRequirements/1
    status: answered
    answer: 'iOS App Store: 4.5/5 from 5,000+ ratings (Nuvemshop admin app) as of
      April 2025. Google Play: 4.3/5 from 5,000+ ratings. Combined indicates strong
      mobile merchant engagement.'
  - id: QU024
    question: What share of Nuvemshop's active merchant base is in the "Next" (mid-market)
      tier?
    type: quantification
    targets:
    - contentRequirements/0
    status: answered
    answer: Estimated fewer than 5,000 merchants (under 3% of active merchants) on
      the Nuvemshop Next or headless API tier, generating disproportionate ARPU (estimated
      5–10× core plan pricing).
  - id: QU025
    question: How does SEBRAE data characterize the Brazilian SMB e-commerce adoption
      opportunity relevant to Nuvemshop's addressable customer base?
    type: mechanism
    targets:
    - contentRequirements/0
    status: answered
    answer: SEBRAE reports ~20 million active micro and small enterprises in Brazil;
      only ~30–35% had active online presence in 2023. This implies 13–14 million
      Brazilian SMBs without a proper online store, representing Nuvemshop's long-run
      greenfield TAM.
