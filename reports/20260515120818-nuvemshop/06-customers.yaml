company:
  name: Nuvemshop
chapter:
  number: 6
  title: Customers
  summary: 'Nuvemshop''s customer base of approximately 150,000 active merchants (2024,
    company-claimed) is concentrated in Brazil (~70%), with Mexico (~20%) as the fastest-growing
    market and Argentina, Colombia, and Chile comprising the remainder. The customer
    base is overwhelmingly SMB: ~85% of merchants generate under R$500K annual GMV.
    Core verticals are fashion/apparel (~35%), health/beauty (~20%), and home/décor
    (~15%). Merchant acquisition is largely organic—driven by the storefront''s branded
    footer badge, word-of-mouth referrals, and LatAm-focused social media communities.
    Retention is a relative strength: estimated annual revenue churn of 10–15%, with
    strong expansion dynamics driven by financial product attach (Nuvem Pago ~70%
    adoption rate) and app marketplace usage (65%+ with ≥1 paid app). Named customer
    proof is limited in the public domain; most evidence is aggregated platform-level
    metrics or anonymous review data from G2, Trustpilot, and Reclame Aqui. Primary
    risks are customer concentration in Brazil (currency/macro risk), competitive
    downmarket pressure from free-tier competitors, and the absence of enterprise/mid-market
    proof (VTEX territory).'
sections:
- id: customer-base-segmentation
  title: Customer Base Segmentation
  body: 'Nuvemshop''s ~150,000 active merchants (2024) break down along three segmentation
    axes—geography, size, and vertical—each with distinct diligence implications.
    By geography: Brazil accounts for ~70% of active merchants (~105,000) and an estimated
    80%+ of GMV given higher average order values and more developed payment infrastructure.
    Mexico is the second market at ~20% of merchants (~30,000), growing at a faster
    absolute rate than Brazil following the 2021 Tiger Global raise. Argentina (~5%),
    Colombia (~3%), and Chile (~2%) are smaller and operationally more complex given
    local currency controls, payment infrastructure differences, and regulatory environments.
    By merchant size: approximately 85% of merchants are micro or small businesses
    generating under R$500K annual GMV (roughly $100K USD); 12% are small-to-medium
    businesses in the R$500K–R$5M band; and ~3% are mid-market or emerging brands
    generating R$5M+ in GMV—the so-called ''Next'' tier targeted by Nuvemshop''s headless
    API. By vertical: fashion and apparel is the dominant category at an estimated
    35% of active stores, followed by health, beauty, and wellness at 20%, home and
    décor at 15%, electronics and accessories at 10%, food and beverage at 8%, and
    general merchandise/other at 12%. By acquisition channel: Nuvemshop estimates
    that approximately 60–70% of new merchant activations are organic (referrals,
    branded storefront badge, LatAm e-commerce communities) with the remainder from
    digital marketing. This organic acquisition ratio is a structural cost advantage,
    keeping blended CAC below peers.'
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU006
  tableRefs:
  - TU001
  figureRefs: []
- id: adoption-trajectory
  title: Adoption Trajectory and Usage Depth
  body: 'Nuvemshop''s active merchant count has grown from approximately 70,000 in
    2020 to 130,000 in 2023 and an estimated 150,000+ in 2024—an average annual growth
    rate of approximately 21% over four years, decelerating from the 2020–2021 e-commerce
    boom period. Product adoption depth is a stronger signal than headline merchant
    count: Nuvem Pago has achieved approximately 70% merchant attach rate (company-disclosed),
    meaning roughly 105,000 merchants actively use Nuvemshop''s own payment processor
    rather than a third-party. This attach rate is materially above Shopify Payments''
    equivalent attach rate in comparable markets (~50–60% globally) and drives significant
    take-rate improvement. App marketplace usage is similarly deep: company communications
    indicate approximately 65% of merchants use at least one paid or premium app,
    with merchants using 3+ apps generating an estimated 2× higher GMV than single-app
    merchants. Nuvem Envio''s adoption is estimated at 40–50% of active merchants
    for at least some shipments. The Nuvemshop Next (headless/API) tier is estimated
    to serve fewer than 5,000 merchants but at materially higher ARPU (5–10× core
    plan pricing). Mobile adoption of merchant management: Nuvemshop''s iOS and Android
    apps have accumulated 10,000+ combined reviews on app stores with 4.3–4.6 ratings,
    indicating substantial mobile merchant engagement.'
  claimRefs:
  - CU007
