callouts:
- calloutType: strength
  title: Organic Merchant Acquisition — Structural CAC Advantage
  body: Approximately 60–70% of Nuvemshop merchant activations come through organic
    channels (storefront badge referrals, word-of-mouth, LatAm e-commerce communities).
    This structural organic CAC compares favorably to competitors relying heavily
    on paid digital acquisition, providing a durable cost advantage in merchant acquisition
    that compounds as the installed base grows.
  claimRefs:
  - CU006
  - CU008
- calloutType: risk
  title: Brazil Geographic Concentration (~80% of Revenue)
  body: 'Approximately 80% of Nuvemshop''s estimated revenue originates in Brazil,
    creating material exposure to Brazil-specific macro risk: BRL currency depreciation
    against USD (relevant to dollar-denominated investor returns), consumer credit
    tightening (Selic rate cycles), and regulatory changes to PIX or BCB payment infrastructure.
    This concentration limits upside/downside scenario range.'
  claimRefs:
  - CU023
  - CU024
- calloutType: insight
  title: Nuvem Pago Attach Rate Is a Retention Signal
  body: The ~70% Nuvem Pago attach rate among active merchants is both a revenue driver
    (MDR take-rate) and a retention signal—merchants who have integrated their payment
    infrastructure with Nuvemshop face meaningfully higher switching costs than those
    using third-party processors. This creates a retention tier within the merchant
    base that should be analyzed separately in investor diligence.
  claimRefs:
  - CU009
  - CU021
