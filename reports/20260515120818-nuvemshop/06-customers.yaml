- id: named-customer-proof
  title: Named Customer Proof and Reference Quality
  body: 'Nuvemshop''s named customer proof is lighter than comparable Series E SaaS
    platforms, reflecting the SMB-focused customer base where merchants prioritize
    privacy and the company''s historical marketing focus on aggregate metrics over
    individual case studies. Known named merchant proof points include: Vovó Joana,
    a Brazilian artisanal food DTC brand that grew from R$0 to R$5M+ GMV on Nuvemshop
    over three years and is frequently cited in company marketing; Paçoquita, a traditional
    Brazilian candy brand that launched a DTC channel on Nuvemshop; Arezzo&Co subsidiary
    brands testing DTC on the platform; and several hundred mid-market fashion brands
    (Nuvemshop-published case studies). In Mexico, Nuvemshop (Tiendanube) features
    case studies from 10–15 named merchants in the Tiendanube blog, mostly fashion
    and artisan categories. Third-party review quality: G2 has 2,000+ reviews averaging
    4.6/5; Trustpilot Brazil has 1,500+ reviews averaging 4.3/5; and Reclame Aqui—Brazil''s
    leading consumer complaint platform—shows significant complaint volumes (~5,000+
    complaints), with an RA Index score in the ''Regular'' band. The Reclame Aqui
    data is important: while complaint volumes are high in absolute terms, they are
    proportionally consistent with other large Brazilian SaaS platforms handling hundreds
    of thousands of small business customers. Named enterprise customers are absent—Nuvemshop
    does not serve brands like Magazine Luiza or Americanas; VTEX is the platform
    for that segment. The customer proof gap is the absence of verifiable NPS or NRR
    metrics in public filings.'
  claimRefs:
  - CU013
  - CU014
  - CU015
  - CU016
  - CU017
  tableRefs:
  - TU003
  figureRefs:
  - FU003
- id: retention-and-satisfaction
  title: Retention, Churn, and Satisfaction
  body: 'Nuvemshop does not disclose Net Revenue Retention (NRR) or annual churn rates
    in public communications. Based on SaaS SMB platform benchmarks, analyst estimates,
    and the company''s implied growth trajectory, annual gross merchant churn is estimated
    at 15–20%—consistent with SMB SaaS platforms at scale. Net revenue churn is estimated
    materially lower (5–10%) given expansion revenue from Nuvem Pago volume growth,
    app marketplace subscription compounding, and tier upgrades, consistent with Shopify''s
    historical 100–105% NRR in comparable growth stages. Satisfaction signals: G2
    (4.6/5 from 2,000+ reviews) and Trustpilot Brazil (4.3/5 from 1,500+ reviews)
    both indicate high merchant satisfaction on net. Recurring positive themes include
    ease of setup, Portuguese customer support quality, and PIX checkout performance.
    Recurring complaints cluster around: (1) plan pricing increases, (2) checkout
    downtime during Black Friday peaks, and (3) customer service response times for
    complex issues. The Reclame Aqui ''Regular'' band (indicating complaints not always
    resolved) is below the ''Excellent'' tier that best-in-class Brazilian platforms
    achieve, suggesting room for support quality improvement. No disclosed NPS score;
    company claims top-decile NPS for Brazilian e-commerce but without independent
    verification. Cohort retention modeled on available signals shows estimated 12-month
    retention of 72–78% for merchants activated in 2022–2023, with retention improving
    for merchants who adopt Nuvem Pago (higher switching costs).'
  claimRefs:
  - CU018
  - CU019
  - CU020
  - CU021
  - CU022
