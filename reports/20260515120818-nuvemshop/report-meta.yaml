  foundingLocation: Buenos Aires, Argentina
  headquarters: São Paulo, Brazil
  productSummary: Nuvemshop provides a cloud-based e-commerce platform (storefront
    builder, CMS, product catalog), integrated payments (Nuvem Pago / Pago Nube),
    logistics network coordination, an app marketplace with 3,000+ integrations, and
    a B2B wholesale portal. The platform offers an end-to-end merchant OS for SMBs
    to launch, run, and scale online stores.
  customerFocus: SMBs and mid-market merchants (1–500 employees) across Latin America,
    particularly in Brazil (primary), Argentina, Mexico, and Colombia.
  businessModel: 'Blended SaaS + fintech model: monthly subscription fees (tiered
