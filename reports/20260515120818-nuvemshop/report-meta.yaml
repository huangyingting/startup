companyProfile:
  summary: Nuvemshop (branded Tiendanube in Spanish-speaking markets) is the largest
    e-commerce platform purpose-built for Latin American SMBs, with over 140,000 active
    merchants across Brazil, Argentina, Mexico, and Colombia. Founded in 2010 by Santiago
    Sosa, Alejandro Alfonso, Martín Palombo, and José Abuchaem, the company offers
    a full-stack commerce OS including storefront, payments (Nuvem Pago), logistics,
    and an app marketplace with 3,000+ integrations. Backed by Tiger Global, Baillie
    Gifford, and Accel at a $3.1B Series C valuation, Nuvemshop competes primarily
    with VTEX, Shopify, and local players while commanding a dominant NPS advantage
    in its home markets.
  foundedDate: '2010-01-01'
