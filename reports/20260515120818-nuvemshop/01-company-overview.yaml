chapter:
  number: 1
  title: Company Overview
  summary: Nuvemshop (Tiendanube in Spanish-speaking markets) is Latin America's leading
    e-commerce platform for SMBs, founded in 2011 in Buenos Aires and now headquartered
    primarily in São Paulo. The company reached unicorn status with a $3.1B valuation
    in June 2021 after raising $500M in a Series E led by Tiger Global, and has since
    expanded to five LatAm countries with 180,000+ active merchant brands as of 2025,
    while building an integrated ecosystem of payments (Nuvem Pago), logistics (Nuvem
    Envio), marketing automation, and AI tools.
sections:
- id: identity-and-overview
  title: Identity and Business Overview
  body: 'Nuvemshop, known as Tiendanube in Spanish-speaking Latin American markets,
    is a SaaS e-commerce platform that enables small and medium-sized businesses (SMBs)
    to create, manage, and grow online stores. The company was founded in 2011 in
    Buenos Aires, Argentina, by Santiago Sosa (CEO), Alejandro Vázquez (co-founder
    and President), Martin Palombo, and Gonzalo Filgueira. Over 14 years, Nuvemshop
    has grown to become the region''s largest dedicated SMB e-commerce platform, and
    its primary operational and revenue hub is now São Paulo, Brazil.


    The company''s core product is a hosted storefront builder with integrated checkout,
    inventory management, multi-channel selling (social commerce, marketplaces, WhatsApp),
    and analytics. Beyond the core platform, Nuvemshop has built a vertically integrated
    ecosystem: Nuvem Pago (own payments gateway), Nuvem Envio (logistics aggregator
    with 30+ carriers), Nuvem Marketing (email and marketing automation, incorporating
    the Perfit acquisition), and Nuvem Chat (AI-powered WhatsApp sales assistant).
    As of May 2026, the company describes itself as ''#1 e-commerce platform in the
    world that enables checkout directly within WhatsApp,'' highlighting its 2026
    Agentic Commerce product strategy launched at the InovA 2026 event.


    Nuvemshop''s platform addresses a critical gap in LatAm markets: local payment
    integrations (Mercado Pago, Pix, boleto bancário, tarjetas de crédito locales),
    local logistics, Portuguese and Spanish language support, and price points accessible
    to SMBs operating in volatile currency environments. This localization moat differentiates
    it from global players like Shopify that have found LatAm expansion challenging.'
