- id: funding-and-investors
  title: Funding History and Investor Roster
  body: 'Nuvemshop completed a landmark $500 million Series E round in June 2021,
    led by Tiger Global Management, which valued the company at approximately $3.1
    billion — doubling its prior valuation of around $1.5B. Participation included
    Accel Partners, Global Founders Capital, Qualcomm Ventures, Kaszek Ventures, and
    others. Total disclosed funding as of that round was approximately $720 million
    across five disclosed rounds (Seed, Series A, B, C, D, and E).


    The $3.1B valuation was achieved during a period of peak global tech valuations
    (2020–2021 pandemic-era e-commerce boom) driven by Tiger Global''s highly competitive
    term sheet approach across many emerging market platforms. No new disclosed equity
    rounds have been reported since June 2021, which is notable given the general
    VC market contraction in 2022–2024. The company has not provided updates on current
    valuation, which — consistent with many 2021 unicorns — may be below the $3.1B
    peak given changed interest rate and revenue multiple environments.


    As of the 2026 run date, no new primary equity round has been publicly announced.
    The company''s continued expansion into new markets (Chile 2024 with a $10M investment),
    AI product development (R$100M Lumi AI investment announced May 2025), and logistics
    infrastructure build-out suggest ongoing capital deployment, which may be funded
    from existing cash reserves, debt, or undisclosed financing facilities. The absence
    of a new disclosed round since 2021 — over four years — is an evidence gap requiring
    diligence.'
