- id: founders-leadership
  title: Founders and Leadership Team
  body: 'The founding team has remained intact and in leadership roles, which is notable
    for a 14-year-old startup. Santiago Sosa serves as CEO; Alejandro Vázquez holds
    the President/Co-founder role and has been the primary external spokesperson.
    Martin Palombo and Gonzalo Filgueira round out the founding quartet, though their
    specific current operational roles have not been publicly detailed beyond their
    co-founder titles. The founding team''s longevity provides strategic continuity
    but also raises key-person risk concentration around the CEO and president.


    Beyond the founders, Nuvemshop has built a professional management layer. Key
    executive additions include: Otávio Alves (Director General Brazil, promoted January
    2024), who holds an MBA from HEC Paris and has experience at Amazon and GE; Guilherme
    Pedroso (Global Director of New Business, promoted January 2024), MBA from MIT,
    previously at Salesforce and BCG; Bernardo Brandão (CMO); Vivian Raphael (Head
    of Brand & Communications Brazil, hired July 2025), formerly at Mercado Livre,
    ISDIN, and Johnson & Johnson; Thammer Manzoni (Director, Nuvem Envio Brazil);
    and Marco Inglesi and Matheus Machado (Finance and Events, April 2025). Marina
    Engler (ex-Nubank) joined as Senior Manager of Projects and Operations for fintech
    initiatives (April 2024). The leadership team reflects a maturing company with
    professional hires from global tech companies operating in Brazil.


    Adverse note: As a private company, board composition, investor governance rights,
    and details of any leadership disputes or executive departures are not publicly
    disclosed. The departure of any founding member or key executive could represent
    a material governance risk given the company''s brand identity tied closely to
    its founders.'
