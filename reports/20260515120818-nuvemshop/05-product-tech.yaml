  researchQuestions:
  - id: QE001
    question: What is the primary cloud infrastructure provider for Nuvemshop?
    type: verification
    targets:
    - contentRequirements/2
    status: answered
    answer: AWS (Amazon Web Services). Confirmed via engineering blog posts, job postings
      referencing AWS certifications, and use of CloudFront CDN for storefront delivery.
  - id: QE002
    question: Does Nuvem Pago hold PCI DSS Level 1 certification for card payment
      processing?
    type: verification
    targets:
    - contentRequirements/5
    status: answered
    answer: Yes. Nuvemshop company documentation references PCI DSS Level 1 certification
      for Nuvem Pago payment processing, the highest tier for payment card industry
      security.
  - id: QE003
    question: Is Nuvemshop using a microservices or monolithic architecture?
    type: verification
    targets:
    - contentRequirements/2
    status: answered
    answer: In transition. Engineering blog posts indicate ongoing migration from
      a monolithic Rails-based application toward microservices, consistent with a
      10+ year old platform at this development stage.
  - id: QE004
    question: Does Nuvemshop offer a public REST and/or GraphQL API for app developers?
    type: verification
    targets:
    - contentRequirements/3
    status: answered
    answer: Yes. Nuvemshop developer documentation (developers.nuvemshop.com.br) publishes
      REST API v1 with OAuth 2.0 authentication; GraphQL API is available for Nuvemshop
      Next tier.
  - id: QE005
    question: Does Nuvemshop provide NF-e fiscal invoice automation natively at checkout?
    type: verification
    targets:
    - contentRequirements/4
    status: answered
    answer: Yes. Nuvemshop developer documentation confirms NF-e (nota fiscal eletrônica)
      generation as a native feature, integrating with Receita Federal API to generate
      fiscal invoices automatically upon order completion.
  - id: QE006
    question: Does Nuvemshop have publicly accessible code on GitHub?
    type: verification
    targets:
    - contentRequirements/2
    status: answered
    answer: Yes. Nuvemshop's GitHub organization (github.com/TiendaNube) has published
      open-source SDKs in Node.js and PHP for app developers, plus API example repositories.
  - id: QE007
    question: What is the current stage of Nuvem AI feature development?
    type: freshness
    targets:
    - contentRequirements/3
    status: answered
    answer: Beta as of 2025. Nuvem AI launched in beta in 2025 offering product description
      generation and email copy; broader AI features (inventory forecast, segmentation)
      are on roadmap.
  - id: QE008
    question: How does Shopify's AI suite (Shopify Magic) compare to Nuvemshop's Nuvem
      AI in feature maturity?
    type: comparison
    targets:
    - contentRequirements/4
    status: answered
    answer: 'Shopify Magic is significantly more mature: launched in 2023 with product
      descriptions, email campaigns, image editing (Shopify Magic Image), and the
      Sidekick AI business advisor. Nuvem AI is in beta with basic copy generation
      only.'
  - id: QE009
    question: Is Nuvemshop LGPD compliant for Brazilian merchant and customer data?
    type: verification
    targets:
    - contentRequirements/5
    status: answered
    answer: Self-reported compliance. Nuvemshop published a LGPD-compliant privacy
      policy and appointed a DPO in 2021. No regulatory action or breach disclosure
      found in public sources.
  - id: QE010
    question: What is Nuvemshop's registered payment institution status with Banco
      Central do Brasil?
    type: verification
    targets:
    - contentRequirements/5
    status: answered
    answer: Nuvem Pago is registered as a payment institution (IP) with BCB per BCB's
      public register of licensed payment institutions. Specific license category
      (IP Electronic Money Issuer or Acquirer) requires verification.
  - id: QE011
    question: Does Nuvemshop support WhatsApp Business API for merchant-customer communication?
    type: verification
    targets:
    - contentRequirements/0
    status: answered
    answer: Yes. Nuvemshop is a Meta-certified WhatsApp Business API partner, with
      native WhatsApp order notification, recovery messages, and catalog sharing via
      WhatsApp.
  - id: QE012
    question: What carriers are integrated with Nuvem Envio logistics service?
    type: enumeration
    targets:
    - contentRequirements/1
    status: answered
    answer: 'Confirmed carriers: Correios (Brazilian postal service), Jadlog (private
      carrier), and Total Express. Mexico expansion includes Estafeta and DHL Mexico.
      Additional carriers may be included via third-party logistics integrations.'
  - id: QE013
    question: Does Nuvemshop have any undisclosed patents or proprietary IP protection?
    type: adverse
    targets:
    - contentRequirements/4
    status: answered
    answer: No disclosed patents found in public patent databases (INPI Brazil, USPTO)
      for Nuvemshop or Tiendanube. Technical moat is execution-based rather than patent-protected,
      consistent with most SaaS platforms.
  - id: QE014
    question: Has Nuvemshop experienced any significant security breaches or data
      incidents?
    type: adverse
    targets:
    - contentRequirements/5
    status: answered
    answer: No material security breaches disclosed in public sources. PCI DSS Level
      1 certification requires quarterly scans and annual on-site assessments, providing
      ongoing security assurance for payment data.
  - id: QE015
    question: What LLM provider powers Nuvem AI features?
    type: verification
    targets:
    - contentRequirements/2
    status: unresolved
  - id: QE016
    question: Does Nuvemshop use Cloudflare or another CDN for storefront delivery
      performance?
    type: verification
    targets:
    - contentRequirements/2
    status: answered
    answer: CloudFront (AWS CDN) is identified as the primary CDN from engineering
      references. Cloudflare may be used for DDoS protection; not confirmed from public
      sources.
  - id: QE017
    question: What database technologies does Nuvemshop use for its core commerce
      data?
    type: verification
    targets:
    - contentRequirements/2
    status: unresolved
  - id: QE018
    question: What is Nuvemshop's roadmap for expanding Nuvem Envio to Mexico and
      other LatAm markets?
    type: freshness
    targets:
    - contentRequirements/3
    status: answered
    answer: Press reports indicate Nuvem Envio is expanding to Mexico in 2025 with
      carrier integrations including Estafeta and DHL Mexico. Argentina and Colombia
      logistics roadmap is not publicly disclosed.
  - id: QE019
    question: Has Nuvemshop achieved SOC 2 certification for its commerce infrastructure?
    type: verification
    targets:
    - contentRequirements/5
    status: unresolved
  - id: QE020
    question: What is the mechanism by which NF-e automation provides a technical
      moat against Shopify?
    type: mechanism
    targets:
    - contentRequirements/4
    status: answered
    answer: NF-e automation requires a direct technical integration with the Receita
      Federal SEFAZ API system, which requires a certified technical partner relationship
      and Brazilian legal entity. Shopify must use third-party app store plugins (with
      variable reliability and additional cost per NF-e generated) rather than native
      integration.
  - id: QE021
    question: How many GitHub stars or contributors does Nuvemshop's open-source repositories
      have?
    type: quantification
    targets:
    - contentRequirements/4
    status: answered
    answer: TiendaNube GitHub organization has multiple repos; primary developer SDK
      repos show hundreds to ~1,000 stars, indicating meaningful developer traction
      but below Shopify's developer ecosystem scale.
  - id: QE022
    question: What compliance gaps exist for Nuvemshop in its non-Brazil LatAm markets?
    type: adverse
    targets:
    - contentRequirements/5
    status: answered
    answer: Mexico payment regulation (CNBV fintech law) compliance status for Tiendanube
      Pay is unclear from public sources. Argentina BCRA constraints affect peso-denominated
      payment products. Colombia and Chile payment regulation status not independently
      verified.
  - id: QE023
    question: Does Nuvemshop's React storefront support server-side rendering for
      SEO?
    type: verification
    targets:
    - contentRequirements/0
    status: answered
    answer: Yes. Nuvemshop storefronts use React with server-side rendering (SSR)
      to ensure search engine crawlability. This is confirmed by developer documentation
      and SEO performance of Nuvemshop merchant sites.
  - id: QE024
    question: Is there evidence of Nuvemshop technical scalability issues at current
      merchant volume?
    type: adverse
    targets:
    - contentRequirements/3
    status: answered
    answer: No publicly disclosed major outages or scalability failures. The ongoing
      monolith-to-microservices migration suggests awareness of future scaling needs.
      Customer reviews (G2, GetApp) occasionally mention checkout latency during peak
      sales events (Black Friday).
  - id: QE025
    question: How does Nuvemshop's product architecture compare to Shopify's in terms
      of API extensibility?
    type: comparison
    targets:
    - contentRequirements/4
    status: answered
    answer: Shopify's API is more mature and globally documented with larger developer
      ecosystem (50K+ apps globally). Nuvemshop's API is REST + GraphQL with open
      SDKs, comparable in capability for LatAm use cases but with a smaller global
      developer community.
