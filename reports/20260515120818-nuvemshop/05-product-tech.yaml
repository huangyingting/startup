- id: roadmap-and-technical-risks
  title: Roadmap, Technical Risks, and Compliance
  body: 'Nuvemshop''s publicly signaled product roadmap focuses on three areas: (1)
    AI acceleration—expanding Nuvem AI from copy generation to inventory forecasting,
    customer segmentation, and personalized promotions; (2) financial services depth—expanding
    Nuvem Crédito (merchant lending) and potentially launching merchant debit cards
    or multi-currency accounts; and (3) headless/API-first enhancement for the mid-market
    ''Next'' tier customers who require custom front-ends. Key technical risks include:
    (a) the monolith-to-microservices migration creates temporary reliability risk
    and engineering debt during the transition period; (b) maintaining compliance
    across 5 LatAm regulatory environments (Brazil BCB, Mexico CNBV, Argentina BCRA,
    Colombia SFC, Chile CMF) requires significant compliance engineering investment;
    (c) Shopify''s AI features (Shopify Magic, Sidekick) are more mature and may erode
    Nuvemshop''s appeal to AI-curious merchants; (d) PIX API reliability dependence
    on BCB infrastructure introduces a third-party downtime risk. On compliance: Nuvemshop''s
    Brazil operations are subject to LGPD (data protection), Marco Civil da Internet,
    and BCB payment regulations. The PCI DSS Level 1 certification is maintained for
    Nuvem Pago. No material regulatory violations or security breaches have been disclosed
    in public sources. Multi-country compliance complexity is a long-run cost driver
    that may limit margin expansion outside Brazil.'
