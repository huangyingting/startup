callouts:
- calloutType: strength
  title: BCB Payment Institution Registration — Non-Replicable Moat
  body: Nuvem Pago's BCB-registered payment institution status and PCI DSS Level 1
    certification represent an 18–24 month compliance and regulatory lead time for
    any foreign competitor attempting to replicate native Brazilian payment processing.
    This is the single hardest technical moat to replicate quickly.
  claimRefs:
  - CE009
  - CE014
- calloutType: risk
  title: Shopify AI Feature Acceleration
  body: Shopify's Shopify Magic AI suite (launched 2023) and Sidekick AI assistant
    represent a materially more mature AI product than Nuvemshop's Nuvem AI beta.
    For AI-attracted merchants in the R$1M+ GMV segment, Shopify's AI advantage combined
    with growing PIX plugin ecosystem could influence migration decisions.
  claimRefs:
  - CE019
  - CE022
- calloutType: insight
  title: NF-e Automation Is Underappreciated Operational Moat
  body: Brazilian NF-e (nota fiscal eletrônica) automation—automatically generating
    fiscal invoices upon each order completion per Receita Federal requirements—eliminates
    a major compliance burden for Brazilian merchants. Building this integration requires
    years of Receita Federal technical relationship management. Shopify merchants
    must use third-party apps with inconsistent reliability and cost.
  claimRefs:
  - CE015
