- id: feature-differentiation-and-pricing
  title: Feature Differentiation and Pricing
  body: Nuvemshop's primary differentiators are (1) Nuvem Pago—a Brazil-native payment
    processor achieving 70% merchant adoption, a feat no competing platform has replicated
    at scale among LatAm SMBs; (2) Nuvem Envio—integrated logistics with carrier partnerships
    enabling shipping at the storefront layer; and (3) deep Portuguese/Spanish localization
    including PIX instant payment support, Brazil-specific NF-e invoicing, and installment
    credit-card display. Shopify offers a broad global app store but lacks native
    Brazilian payment processing, PIX support, and NF-e compliance. Loja Integrada
    and Yampi offer competitive free and entry-tier pricing but have significantly
    thinner ecosystems—Loja Integrada does not have a native payments product and
    Yampi's merchant base remains well below Nuvemshop's scale. WooCommerce is highly
    customizable but requires hosting, security, and plugin management that price
    out most LatAm micro-SMBs. Nuvemshop's pricing runs from free to R$279/month (Plus),
    undercutting VTEX at every tier while offering more LatAm-specific functionality
    than Shopify at equivalent price points.
