    status: partial
    answer: Self-reported. The 70% figure comes exclusively from Nuvemshop's own nuvemcommerce
      report. No independent auditor or third party has verified this figure. The
      R$6.5B Nuvem Pago GMV implies a plausible range when cross-checked against Brazil
