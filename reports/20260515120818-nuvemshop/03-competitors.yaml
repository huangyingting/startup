callouts:
- calloutType: strength
  title: Dominant Native Payment Adoption
  body: Nuvemshop's 70% Nuvem Pago adoption rate represents the platform's deepest
    competitive moat—no LatAm SMB competitor has matched this payment-to-storefront
    integration depth. Each merchant using Nuvem Pago faces high friction to switch
    platforms due to payment history, chargeback records, and PIX key binding.
  claimRefs:
  - CP007
  - CP018
- calloutType: risk
  title: Shopify LatAm Localization Risk
  body: Shopify's 27% international revenue growth (2024) and stated LatAm focus represent
    the most well-resourced competitive threat. If Shopify acquires a Brazilian payments
    fintech or builds native PIX support, it would neutralize Nuvemshop's primary
    differentiator for merchants above R$100K annual GMV who value Shopify's global
    app ecosystem.
  claimRefs:
  - CP006
  - CP025
  - CP030
- calloutType: insight
  title: VTEX Has De-Risked SMB Competitive Threat
  body: VTEX's public market repositioning since its 2021 IPO has pushed it firmly
    into enterprise territory ($1M+ GMV merchants). Its 20-F names Nuvemshop as a
    competitor but VTEX's minimum viable customer has migrated above Nuvemshop's sweet
    spot, making near-term SMB share battle less probable than commonly assumed.
  claimRefs:
  - CP003
  - CP022
