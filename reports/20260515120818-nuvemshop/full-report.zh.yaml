  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础细分
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 约 150,000 个活跃商户（2024 年）可以沿三个维度拆分：地域、规模和垂直品类，每一维都对应不同尽调含义。按地域看，巴西占活跃商户约 70%（约 105,000
              个）；由于客单价更高、支付基础设施更成熟，估计贡献 80% 以上 GMV。墨西哥是第二大市场，占商户约 20%（约 30,000 个），2021 年 Tiger Global 融资后，绝对增速快于巴西。阿根廷（约
              5%）、哥伦比亚（约 3%）和智利（约 2%）规模更小，受本币管制、支付基础设施差异和监管环境影响，运营复杂度更高。按商户规模看，约 85% 是年 GMV 低于 R$500K（约
              $100K）的微型或小型企业；12% 是 R$500K–R$5M 区间的中小企业；约 3% 是 GMV 超过 R$5M 的中端市场或新兴品牌，也就是 Nuvemshop headless API
              瞄准的所谓「Next」层级。按垂直品类看，时尚服饰是最大类别，估计占活跃店铺 35%；健康、美妆与健康生活占 20%，家居与装饰占 15%，电子与配件占 10%，食品饮料占 8%，综合商品 / 其他占
              12%。按获客渠道看，Nuvemshop 估计约 60–70% 的新商户激活来自自然渠道（店铺页徽章引荐、口碑、LatAm 电商社区），其余来自数字营销。自然获客占比构成结构性成本优势，使混合 CAC 低于同业。
