      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >-
              创始团队保持完整且仍在领导岗位，这对一家 14 年的创业公司并不常见。Santiago Sosa 担任 CEO；Alejandro Vázquez 任总裁 / 联合创始人，也是主要对外发言人。Martin
              Palombo 和 Gonzalo Filgueira 组成四人创始团队的另外两位，但除联合创始人身份外，他们当前具体运营职责未公开披露。创始团队长期稳定带来战略连续性，也把关键人物风险集中在 CEO
              和总裁身上。


              创始人之外，Nuvemshop 已搭起职业经理人层。关键高管补强包括：Otávio Alves（Brazil 总经理，2024 年 1 月晋升），拥有 HEC Paris MBA，曾任职 Amazon 和
              GE；Guilherme Pedroso（全球新业务总监，2024 年 1 月晋升），MIT MBA，曾任职 Salesforce 和 BCG；Bernardo Brandão（CMO）；Vivian
              Raphael（Brazil 品牌与传播负责人，2025 年 7 月加入），曾任职 Mercado Livre、ISDIN 和 Johnson & Johnson；Thammer Manzoni（Nuvem
              Envio Brazil 总监）；以及 Marco Inglesi 和 Matheus Machado（财务与活动，2025 年 4 月）。Marina Engler（Nubank 前员工）于 2024 年 4
              月加入，担任 fintech 项目的项目与运营高级经理。领导团队显示公司正在成熟化，并从在 Brazil 运营的全球科技公司引入专业人才。


              反向提示：作为私营公司，Nuvemshop 未公开董事会构成、投资人治理权，以及任何领导层争议或高管离职细节。公司品牌身份与创始人绑定很深，任何创始成员或关键高管离开，都可能构成实质性治理风险。
