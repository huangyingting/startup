      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 最主要的运营风险，是高峰流量事件下的平台可靠性。G2 和 Trustpilot Brazil 的客户评价反复提到 Black Friday 期间结账宕机；对一个估计 25–30% 年度商户
              GMV 都在 4 周窗口处理的平台来说，这是关键故障模式。正在推进的单体到微服务迁移会带来临时可靠性风险：过渡期内，部分微服务架构会形成复杂故障模式，诊断和恢复可能比单一单体更难。Black Friday
              期间若平台宕机，可能引发商户索赔销售损失、声誉损害，并推高经历宕机 cohort 的流失。PIX 基础设施依赖是第二个运营风险：Nuvemshop 的 Nuvem Pago 依赖 BCB 运营的 PIX
              基础设施；这是政府运行系统，会有定期维护窗口，历史上也发生过两次显著 BCB PIX 系统事件（2020 年 11 月上线问题、2022 年间歇性放缓）。高峰销售窗口如果发生 BCB PIX 基础设施故障，将超出
              Nuvemshop 技术控制范围。AWS 云单一供应商集中带来第三个运营风险：Nuvemshop 的所有店铺前端交付、后端处理和数据分析都运行在 AWS。AWS us-east-1 或 sa-east-1（São
              Paulo）区域故障会影响全部巴西商户店铺。网络安全风险方面，Nuvemshop 在数百万消费者交易中处理银行卡数据、PIX key 和 CPF/CNPJ（巴西税号）。数据泄露或凭证被攻破会触发 LGPD 规定的
              72 小时 ANPD 通知义务、潜在 PCI DSS 取消认证，以及声誉损害。公司未披露任何泄露事件。承运商 API 可靠性也是运营依赖风险：Correios（巴西邮政）历史上发生过罢工；旺季若 Correios
              罢工，会扰乱 Nuvem Envio 为相当一部分巴西商户生成运单标签。
