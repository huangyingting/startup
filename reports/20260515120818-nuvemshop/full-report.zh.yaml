  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 所处市场是拉美中小企业（SMB）独立电商平台。该市场包括 SaaS 托管式店铺方案，让商户创建、运营并做大独立在线店铺；它不同于
              平台型交易（MercadoLibre、Amazon）、企业级电商（VTEX、Salesforce Commerce Cloud）以及 DIY
              开源方案（WooCommerce、Magento）。市场边界覆盖平台订阅费、自有支付（Nuvem Pago）抽佣、物流中介利润（Nuvem Envio）以及增值服务收入，服务
              Brazil、Argentina、Mexico、Colombia 和 Chile 的商户。


              市场不包括：（a）通过 MercadoLibre 或 Amazon 平台处理的平台型交易 GMV，那是独立的买卖双方生态；（b）面向大型零售商的企业级电商平台（VTEX 的目标客群）；（c）Instagram 或
              TikTok 上的社交电商 GMV，除非涉及托管结账工具；（d）线下零售交易。现状替代方案要么是用 交易平台（MercadoLibre、Shopee）充当店面，要么继续线下经营 / 用 WhatsApp
              目录链接做基础社媒电商。


              Brazil 在该区域占主导，约占独立电商 GMV 的 50–60%。Argentina 是第二大市场，但面临结构性汇率风险。Mexico 排第三，中小企业基础庞大且电商渗透率低于 Brazil。Colombia
              和 Chile 规模较小但在增长，补齐了 Nuvemshop 的五国版图。MercadoLibre 2024 年总 GMV 约 USD $47B，体现交易平台的主导地位；Nuvemshop 的 R$6.5B
              Nuvem Pago GMV 则代表独立渠道电商，在总零售中占比仍小。
