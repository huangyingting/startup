      - number: '4.4'
        title: 财务缺口与尽调阻断项
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 的私营公司身份造成根本性的财务承销限制。缺少经审计财务报表、披露 ARR
              或可验证单位经济，意味着投资判断必须高度依赖对披露运营指标的估算交叉验证。完成任何财务承销前，必须解决五个尽调阻断项：（1）实际 ARR 和收入结构披露；（2）按收入分部（订阅 vs. 支付 vs.
              物流）审计或审阅后的毛利率；（3）经验证的商户流失率和 NRR；（4）BCB 支付机构资本要求披露；（5）商户贷款（Nuvem Crédito）资产负债表敞口和信贷损失历史。运营牵引数据——180K+
              商户、R$6.5B Nuvem Pago GMV、70% 支付采用率——支撑 R$230–420M 的合理 ARR 区间，但该估计带有 ±40% 不确定性。尽调中需要解释的财务红旗包括：NRR
              低于市场水平（<90%）、合并层面毛利率低于 50%，或 Nuvem Pago 存在未披露的监管资本缺口。Argentina 敞口给 P&L 带来汇率折算风险；考虑到 peso 贬值，即便 Brazil 估计贡献
              60%+ 收入，该风险仍可能具有实质性。
