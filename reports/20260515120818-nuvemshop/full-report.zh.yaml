      - number: '6.6'
        title: 附录材料
        blocks:
          - type: callout
            title: 自然商户获客——结构性 CAC 优势
            body: >-
              Nuvemshop 约 60–70% 的商户激活来自自然渠道（店铺页徽章引荐、口碑、LatAm 电商社区）。相比高度依赖付费数字获客的竞争对手，这种结构性自然 CAC
              更有利；安装基础越大，商户获客的耐久成本优势越能复利。
            calloutType: strength
            claimRefs:
              - CU006
              - CU008
          - type: callout
            title: 巴西地域集中（约 80% 收入）
            body: >-
              Nuvemshop 估计约 80% 收入来自巴西，因此对巴西特定宏观风险暴露较大：BRL 对 USD 贬值（影响美元计价投资者回报）、消费信贷收紧（Selic 利率周期），以及 PIX 或 BCB
              支付基础设施监管变化。这种集中度限制了上行 / 下行情景区间。
            calloutType: risk
            claimRefs:
              - CU023
              - CU024
          - type: callout
            title: Nuvem Pago 渗透率是留存信号
            body: >-
              活跃商户中约 70% 的 Nuvem Pago 渗透率既是收入驱动因素（MDR take-rate），也是留存信号——已把支付基础设施接入 Nuvemshop
              的商户，切换成本显著高于使用第三方处理器的商户。这在商户基础内部形成一个留存层级，投资人尽调应单独分析。
            calloutType: insight
            claimRefs:
              - CU009
              - CU021
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 处在三个高度监管领域的交叉点：电商、金融科技（Nuvem Pago）和消费者数据保护（LGPD），每个领域都有不同监管风险。最实质的监管风险是 BCB 对支付机构的监督。Nuvem Pago
              已在 Banco Central do Brasil 注册为支付机构，需遵守 BCB Resolution 4282/2013（支付机构框架）、持续资本储备要求，以及 COAF
              规则下的反洗钱（AML/KYC）合规。BCB 若调整 PIX 费率政策——例如引入商户侧 PIX 交易费——会削弱 Nuvem Pago 的经济优势（目前商户 PIX 交易零 MDR），并压缩约 70%
              支付产品渗透率带来的增量经济性。BCB 在 2023 年曾公开考虑 PIX 商户收费结构；任何此类政策变化，都会对 Nuvemshop 的金融服务收入模型构成重大负面。LGPD（Lei Geral de
              Proteção de Dados）执法风险正在上升：Autoridade Nacional de Proteção de Dados（ANPD）在 2023 年获得完整执法权，可处以最高为巴西总收入 2%
              的罚款（每次违规上限 R$50M）。Nuvemshop 为 150,000+ 商户及其终端客户处理敏感个人和支付数据；数据泄露或 LGPD
              不合规认定，会让公司面临数百万雷亚尔罚款和声誉损害。CADE（巴西反垄断机构）若认为 Nuvemshop 在巴西 SMB 电商平台市场估计 30–40% 的份额值得审查，可能依据巴西竞争法（Lei
              12529/2011）发起市场支配地位调查。这是一个潜在风险，短期概率低；但如果市场份额继续集中，中期影响不小。墨西哥金融监管（CNBV 金融科技法——Lei Fintech，Lei 9.2/2018）给
              Tiendanube Pay 在墨西哥带来合规不确定性：非持牌实体在墨西哥收款的监管状态并不明确，CNBV 金融科技牌照要求可能适用于 Nuvemshop 的墨西哥支付产品。公司未披露执法行动。PCI DSS
              Level 1 认证要求每年由 QSA（Qualified Security Assessor）现场评估；若无法维持认证，Nuvem Pago 将不得处理银行卡交易，这会是关键运营故障。
