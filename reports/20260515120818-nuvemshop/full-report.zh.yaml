  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 采用多层变现模式，锚点是平台订阅、支付抽佣、物流费用以及应用市场 / 应用生态收入。基础订阅层（从免费到 Nuvemshop Plus 的 R$279/月）带来可预测的经常性 SaaS
              收入；Nuvem Pago 被约 70% 活跃商户采用，可在估计 R$6.5 billion GMV 基础上贡献支付处理抽佣。按保守的 1.0–1.5% 综合 MDR（商户折扣率）计算，仅 Nuvem Pago
              每年就贡献估计 R$65–100 million 支付收入。Nuvem Envio 物流费用是第三项收入流，按发货量假设估计每年 R$20–40 million。公司还从 8,000+
              应用市场售出的应用、融资产品（BNPL、通过 Nuvem Crédito 提供的商户信用额度）以及广告 / 赞助位产品中收取佣金。收入质量为中等——订阅和支付收入高度经常性，但支付抽佣受到 PIX
              零费率采用和潜在监管压缩的结构性压力。Brazil 即时支付强制推广（PIX）既是增长催化剂（无摩擦结账采用），也是长期变现风险：如果商户从绑定银行卡的 Nuvem Pago 转向免费 PIX
              支付，收入会承压。Nuvemshop 声称 2024 年达到盈利里程碑；若得到确认，将标志其从增长期资本消耗转向自我供血。不过，没有经审计账目，这一说法无法独立验证。
