      - number: '6.3'
        title: 具名客户证明与背书质量
        blocks:
          - type: paragraph
            body: >-
              与可比 Series E SaaS 平台相比，Nuvemshop 的具名客户证明偏轻。这反映出其客户基础偏
              SMB，商户更重视隐私，公司历史营销也更强调汇总指标，而不是单个案例。已知的具名商户证明包括：巴西手工食品 DTC 品牌 Vovó Joana，三年内在 Nuvemshop 上从 R$0 做到 R$5M+
              GMV，并常被公司营销材料引用；传统巴西糖果品牌 Paçoquita，在 Nuvemshop 上上线 DTC 渠道；Arezzo&Co 子品牌在该平台测试 DTC；以及数百个中端市场时尚品牌（Nuvemshop
              发布的案例研究）。在墨西哥，Nuvemshop（Tiendanube）在 Tiendanube 博客展示了 10–15 个具名商户案例，主要集中在时尚和手工艺品类。第三方评价质量方面，G2 有 2,000+
              条评价，均分 4.6/5；Trustpilot Brazil 有 1,500+ 条评价，均分 4.3/5；Reclame Aqui——巴西领先的消费者投诉平台——显示投诉量较大（约 5,000+ 起），RA
              Index 得分处于「Regular」区间。Reclame Aqui 数据很重要：尽管绝对投诉量高，但按比例看，与其他服务数十万小企业客户的大型巴西 SaaS 平台一致。具名企业级客户缺席——Nuvemshop
              并不服务 Magazine Luiza 或 Americanas 这类品牌；该细分市场由 VTEX 覆盖。客户证明的缺口在于，公开文件里没有可验证的 NPS 或 NRR 指标。
