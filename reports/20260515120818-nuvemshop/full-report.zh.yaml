    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与业务概览
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 在西语拉美市场称为 Tiendanube，是一家 SaaS 电商平台，帮助中小企业（SMB）创建、管理并做大在线店铺。公司由 Santiago Sosa（CEO）、Alejandro
              Vázquez（联合创始人兼总裁）、Martin Palombo 和 Gonzalo Filgueira 于 2011 年在 Argentina Buenos Aires 创立。14 年来，Nuvemshop
              已成长为拉美最大的 SMB 专用电商平台，当前运营和收入重心已转到 Brazil São Paulo。


              公司核心产品是托管式店铺搭建器，内置结账、库存管理、多渠道销售（社交电商、交易平台、WhatsApp）和分析。围绕核心平台，Nuvemshop 搭出一个纵向整合生态：Nuvem
              Pago（自有支付网关）、Nuvem Envio（连接 30+ 承运商的物流聚合器）、Nuvem Marketing（邮件和营销自动化，整合 Perfit 收购资产）以及 Nuvem Chat（AI 驱动的
              WhatsApp 销售助手）。截至 2026 年 5 月，公司自称为“全球第一家支持直接在 WhatsApp 内完成结账的电商平台”，凸显其在 InovA 2026 活动上发布的 2026 年 Agentic
              Commerce 产品策略。


              Nuvemshop 的平台补上了拉美市场的关键缺口：本地支付集成（Mercado Pago、Pix、boleto bancário、本地信用卡）、本地物流、葡语和西语支持，以及适合在币值剧烈波动环境中经营的
              SMB 价位。这道本地化护城河把 Nuvemshop 与 Shopify 等全球玩家拉开距离；后者在拉美扩张一直不轻松。
