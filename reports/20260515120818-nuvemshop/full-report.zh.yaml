      - number: '4.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 多层收入模式叠加嵌入式支付锁定
            body: Nuvemshop 的变现架构在结构上优于纯 SaaS 或纯支付竞争对手，因为它从同一商户同时赚订阅费、支付抽佣和物流费。每叠加一层，就提高每商户总收入，同时抬高切换成本，形成 ARPU 扩张与留存的正循环。
            calloutType: insight
            claimRefs:
              - CI001
              - CI002
          - type: callout
            title: PIX 零费率威胁支付抽佣
            body: >-
              Brazil 的 PIX 即时支付系统对大多数交易不收商户费用。随着 PIX 渗透率上升，商户可能把支付量从绑定银行卡的 Nuvem Pago 转向零成本 PIX，压缩 Nuvemshop
              最重要的收入流。Nuvemshop 已把 PIX 集成进 Nuvem Pago，但综合抽佣率很可能随时间下降。
            calloutType: risk
            claimRefs:
              - CI006
              - CI029
          - type: callout
            title: 自 2021 年 6 月以来未有新资本轮
            body: >-
              对一家估值 $3.1B 的成长期公司来说，五年没有披露股权融资并不寻常。要么盈利让新股融资变得不必要（正面），要么在 Tiger Global 组合重估后，公司无法以可接受估值融资（中性 /
              负面）。管理层确认盈利状态是优先级很高的尽调问题。
            calloutType: insight
            claimRefs:
              - CI017
              - CI018
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 是商业操作系统，不只是建站工具；它覆盖拉美 SMB 商户端到端运营流程：从店铺搭建、商品建档，到订单管理和结账、支付处理、运单生成、客户沟通以及售后分析。典型商户旅程从 Nuvemshop
              的无代码店铺搭建器开始（移动端响应式模板已按 Brazil 电商习惯预优化），再进入包含商品变体的目录管理；随后启用 Nuvem Pago 收款（接受 PIX、可分期信用卡、Boleto 和借记卡），通过
              Nuvem Envio 自动比较承运商价格并发货，最后在商户分析仪表盘跟踪表现。8,000+ 应用市场把核心工作流延伸到 WhatsApp Business API、ERP 系统（Bling、Tiny
              ERP）、营销平台（RD Station、Klaviyo），以及用于自动生成商品描述的新兴 Nuvem AI 产品。Nuvemshop 的差异化不在某个单点功能，而在 SMB
              可承受成本下把完整商户工作流深度打通——PIX 原生结账、NF-e 财税票据自动化、分期付款展示（Brazil 零售惯例）以及葡语 /
              西语本地化，这些都是全球平台无法不借助第三方插件就匹配的能力。平台设计上以移动端为先，顺应拉美 70%+ 移动浏览占比，并同时支持独立 iOS/Android 商户管理应用和移动优化店铺。
