            body: >-
              三类竞争风险需要密切跟踪：（1）Shopify 拉美本地化——如果 Shopify 收购 Brazil 支付 fintech，或自建与 PIX / Nuvem Pago 等效的轨道，其全球规模和开发者生态将对
              Nuvemshop 中端市场构成生存级威胁；（2）VTEX 下探中端市场——VTEX 的企业级重心总体推动其上移，但如果其在 Brazil 中端市场压价，可能重新进入 SMB 地带；（3）MercadoLibre
              纵向整合——MercadoLibre 的 Mercado Shops 目前还是低功能工具包，但 MercadoLibre
              具备资金规模和商户关系，可以打造真正的全栈电商平台。关键尽调缺口包括：按竞争场景划分的精确流失率、Nuvemshop 在 R$500K ARR 以上商户中对 Shopify 的赢单 / 输单数据，以及当
              Shopify 开发者生态在拉美增长时，Nuvemshop 是否有开发者心智防御力。除这三类主要威胁外，现状替代品——尤其是基于 WhatsApp 的社交电商和用电子表格管理非正式订单——仍是 Nuvemshop
              用户获取漏斗中的明显摩擦点。约 70% 拉美 SME 在迁移到专用店铺前先通过社交电商卖货，这意味着 Nuvemshop 必须持续争夺尚未体验专用平台优势的商户注意力。Nuvemshop
              的免费档策略正是通过降低迁移门槛来处理这一冷启动问题。
