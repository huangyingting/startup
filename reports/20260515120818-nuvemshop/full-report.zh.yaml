            body: >-
              Nuvemshop 最深的护城河是多层锁定效应：启用 Nuvem Pago、Nuvem Envio 和域名托管的商户，因支付历史、物流合同价格和平台内客户数据，切换成本很高。70%
              支付采用率可作为生态深度的代理指标——每增加一项金融服务，迁移门槛都会更高。网络效应有限（平台不是交易平台），但供应商生态效应通过 Nuvemshop 的 8,000+ 应用商店集成发挥作用，让合作伙伴依赖
