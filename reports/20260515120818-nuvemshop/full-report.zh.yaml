  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 竞争的市场是拉美 SMB 独立电商平台，位于企业级平台（VTEX、Salesforce Commerce Cloud）之下、非正式社交电商之上。市场包含四层竞争：（1）直接的 SMB
              平台竞争对手——Loja Integrada、Yampi 和 Shopify——争夺同一批独立店铺 SMB 预算；（2）企业级出身、偶尔下探 SMB
              的平台（VTEX）；（3）需要技术能力的全球自托管工具（WooCommerce、PrestaShop）；（4）交易平台相邻选项（MercadoShops），会蚕食独立品牌建设。Nuvemshop 的
              180,000+ 活跃品牌数和 R$6.5 billion Nuvem Pago GMV（2025）代表了拉美本土 SMB 平台供应商中的最大规模。VTEX 2021 年 20-F 风险因素明确点名
              Nuvemshop 为竞争对手，验证了 Nuvemshop 的市场定位。Shopify 2024 年国际收入增长 27%，并将拉美 列为关键增长重点，意味着最有资源的竞争威胁正在逼近。
