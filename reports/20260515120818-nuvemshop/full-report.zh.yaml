      - number: '5.4'
        title: 路线图、技术风险与合规
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 公开释放的产品路线图聚焦三块：（1）AI 加速——把 Nuvem AI 从文案生成扩展到库存预测、客户分群和个性化促销；（2）金融服务深度——扩展 Nuvem
              Crédito（商户贷款），并可能推出商户借记卡或多币种账户；（3）面向需要定制前端的中端 “Next” 档客户，强化 headless / API-first
              能力。关键技术风险包括：（a）从单体迁移到微服务，在过渡期会带来临时可靠性风险和工程债；（b）同时维持 5 个拉美监管环境合规（Brazil BCB、Mexico CNBV、Argentina
              BCRA、Colombia SFC、Chile CMF），需要大量合规工程投入；（c）Shopify 的 AI 功能（Shopify Magic、Sidekick）更成熟，可能削弱 Nuvemshop 对 AI
              好奇型商户的吸引力；（d）PIX API 对 BCB 基础设施的依赖引入第三方宕机风险。合规方面：Nuvemshop 的 Brazil 业务受 LGPD（数据保护）、Marco Civil da Internet
              和 BCB 支付监管约束。Nuvem Pago 维持 PCI DSS Level 1 认证。公开资料未披露重大监管违规或安全事件。多国合规复杂度是长期成本驱动因素，可能限制 Brazil 以外的利润率扩张。
