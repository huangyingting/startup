      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 的商业模式深度依赖外部伙伴；关键伙伴一旦调整价格、政策或可用性，风险就会联动。AWS 云依赖是最广的单一供应商风险：AWS sa-east-1 宕机、调价或合同重谈，都会影响
              Nuvemshop 的整个技术栈。虽然 AWS 是承诺 99.99%+ SLA 的关键企业云服务商，但缺少多云冗余意味着 Nuvemshop 没有后备方案。Meta WhatsApp Business API
              依赖是战略风险：Nuvemshop 的 WhatsApp Commerce 集成依赖 Meta 的 WhatsApp Business API 政策和定价。Meta 已多次逐步调整 WhatsApp
              Business API 定价（2023 年引入按消息收费）；进一步政策变化可能抬高成本，或削弱 Nuvemshop 原生 WhatsApp commerce 功能。承运商 API 依赖方面，Nuvem
              Envio 聚合 Correios、Jadlog 和 Total Express API。Correios 重谈商业条款或修改 API 访问，可能影响 Nuvem Envio 经济性；巴西政府若决定私有化或重组
              Correios（截至 2024 年仍是巴西政治讨论议题），会带来合同不确定性。资本市场依赖方面，Nuvemshop 已累计募集约 $1.1B+ 风险资本，但未披露盈利能力。2023–2025
              年成长股权市场偏紧，继续依赖风险资本或成长股权融资会带来募资风险。关键应用伙伴集中方面，如果领先 ERP 集成（Bling、Tiny ERP、TOTVS）开发竞争性原生店铺，会降低应用市场黏性。Nuvem AI
              的 LLM 供应商依赖方面，未披露的 LLM API 供应商（可能是 OpenAI 或 Anthropic）控制定价和能力访问；LLM API 大幅涨价会削弱 AI 功能投入的经济性。
