      - number: '2.2'
        title: TAM、SAM 与市场规模测算
        blocks:
          - type: paragraph
            body: >-
              多个独立估计都指向一个区间：2024–2025 年拉美整体电商商品交易总额为 USD $130–180 billion，CAGR 约 15–22%，取决于来源和纳入的地理范围。Statista 估计 2024
              年拉美电商收入约 USD $157 billion，并预计到 2029 年达到 USD $260 billion。Americas Market Intelligence（AMI）和 eMarketer
              给出的区间估计基本一致。仅 Brazil 就约占区域电商的 30–35%，即 2024 年 USD $47–57 billion。


              SMB 独立电商可服务市场——剔除交易平台中介 GMV 和企业级平台——估计占拉美电商总量的 20–30%，即 USD $30–50 billion。这是与 Nuvemshop 平台即服务模式相关的
              TAM。Nuvemshop 的 SAM 进一步受五国版图和 SMB 定位限制，约为 USD $25–40 billion。公司通过支付渠道报告的 GMV（R$6.5B，约 USD $1.3B，Brazil
              2025）意味着其当前约渗透 Brazil SMB 电商可服务市场的 3–15%，增长空间仍相当大。


              Brazil 的 ABCOMM 跟踪国内电商规模，2023 年为 R$204 billion，2025 年估计增至 R$240–260 billion。其中可服务的独立店铺细分市场约为 R$40–60
              billion。按 R$6.5B 支付 GMV 计算，Nuvemshop 通过自有支付轨道已拿下 Brazil 可服务独立电商支出的约 10–15%；考虑到只有 10 个商户中约 7 个使用 Nuvem
              Pago，这一份额明显高于原始品牌数所显示的水平。真实平台 GMV（包括使用第三方支付处理商的商户）高得多，在 Brazil 可能达到 R$20–40 billion。


              反向背景：Nuvemshop 具体细分市场（非交易平台、非企业级托管 SaaS）的规模测算需要分析师推导，不确定性很高。没有独立分析师发布过拉美 SMB 托管电商平台子市场的专门估计。所有 SAM/SOM
              数字都由更宽泛的市场数据推导而来，置信度为低到中等。
