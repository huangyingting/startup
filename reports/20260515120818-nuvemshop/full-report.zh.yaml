      - number: '8.6'
        title: 附录材料
        blocks:
          - type: callout
            title: ≤ $2.0B 入场可有条件买入——没有 NRR 和流失数据不得交割
            body: >-
              有条件投资：如果 NRR 经验证为 100–110%，且商户总流失率低于 20%，投资论点成立。若无法从经审计数据室材料验证这些指标，不应以 2021 年 $3.1B 轮次价格或更高价格完成投资。以 $2.0B
              入场且基准指标确认后，风险调整回报可以接受（退出时 1.0–2.0× MOIC）。以 $3.1B 入场且指标未验证，下行情景会带来重大损失。
            calloutType: recommendation
            claimRefs:
              - CV008
              - CV013
              - CV025
          - type: callout
            title: 2021 年轮次价格在基准情景下意味着负回报
            body: >-
              按 2021 年 Series C 价格（$3.1B）计算，基准情景 $2.0–2.5B 退出（8× ARR）意味着 0.6–0.8× MOIC，属于实质亏损。只有牛市情景（$3.5–4.0B 退出）才能与
              2021 年轮次价格打平。投资人要么谈判获得相对 2021 年定价的实质折扣，要么用已验证指标证明牛市情景才是预期情景。
            calloutType: risk
            claimRefs:
              - CV007
              - CV012
          - type: callout
            title: Shopify 可比验证同等阶段指标下 $2.0B+ 价值
            body: >-
              Shopify 在同等 ARR 阶段（$200M ARR，2015–2016 年）估值为 $1.5–2.0B，当时增速 40%+，并拥有主导性 SMB 市场地位。Nuvemshop 增速更慢（15–18%，低于
              Shopify 的 40%+），监管风险更高，因此该可比需要打 0.7–0.9× 折扣；但结构性市场机会和金融科技渗透，相比纯 SaaS 模型带来增量价值，支撑 $2.0–3.0B 公允价值区间。
            calloutType: insight
            claimRefs:
              - CV017
              - CV018
