      - number: '4.2'
        title: 单位经济与变现深度
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 未公开披露单位经济，只能用可比 SaaS 和支付平台估计。平台的“先落地再扩张”模式从获取商户开始（常通过免费档），通过订阅升级变现，再叠加支付和物流绑定 来提高每商户收入。估计综合年收入 /
              商户为 R$1,200–2,500（覆盖包括免费档在内的完整商户基础），意味着按收入加权的平均值严重偏向 25–30%
              付费档商户。关键单位经济驱动因素包括：（1）净留存率（NRR）——基于免费转付费和支付绑定假设，估计为 100–120%；（2）获客成本（CAC）——未披露；可比 SMB SaaS 平台报告 CAC 为
              $150–500/商户；（3）订阅毛利率——估计 65–80%，符合 SMB SaaS 典型水平；（4）支付毛利率——估计 20–35%，符合支付处理典型水平（交换费 +
              收入减处理成本）。捆绑式产品用两个高频触点反复变现同一商户，相比纯订阅或纯支付业务，能拉高 LTV-to-CAC。Nuvemshop 能否跑出可持续单位经济，关键取决于随着 PIX 渗透率上升、Brazil
              卡以外即时支付基础设施成熟，Nuvem Pago 能否维持高于市场的抽佣率。MercadoLibre 旗下 Mercado Pago（已披露）和 VTEX（公开文件）的可比平台指标可提供基准，但不能直接套用于
              Nuvemshop 的 SMB 组合。
