      - number: '1.3'
        title: 融资历史与投资人名单
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 于 2021 年 6 月完成标志性的 $500 million Series E 轮，由 Tiger Global Management 领投，公司估值约 $3.1 billion——较此前约
              $1.5B 的估值翻倍。参投方包括 Accel Partners、Global Founders Capital、Qualcomm Ventures、Kaszek Ventures 等。该轮后披露的累计融资约为
              $720 million，覆盖五个已披露阶段（Seed、Series A、B、C、D 和 E）。


              $3.1B 估值出现在全球科技估值高点（2020–2021 疫情期电商繁荣），背后是 Tiger Global 在多个新兴市场平台上高强度出价的投资条款书策略。自 2021 年 6
              月后，公司未再披露新的股权融资；考虑到 2022–2024 年 VC 市场普遍收缩，这一点值得注意。公司也未更新当前估值。与许多 2021 年独角兽一样，在利率和收入倍数环境变化后，当前估值可能低于 $3.1B
              峰值。


              截至 2026 年报告生成日，公司未公开宣布新一轮新股融资。公司持续扩张到新市场（2024 年 Chile，投入 $10M）、开发 AI 产品（2025 年 5 月宣布 R$100M Lumi AI
              投资）并建设物流基础设施，说明仍在投入资本；资金来源可能是既有现金储备、债务或未披露融资额度。自 2021 年以来超过四年没有披露新轮次，是需要尽调核实的证据缺口。
