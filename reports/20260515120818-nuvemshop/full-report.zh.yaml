  - id: FV001
    title: 投资建议逻辑流程
    type: flow
    layout: standard
    summary: 决策树展示市场机会如何先被验证，再通过资料室门槛，最后落到投资建议结果。
    data:
      nodes:
        - label: 已验证：拉美 SMB TAM + Nuvemshop 市场领导地位（第 2+3 章）
        - label: 已确认：BCB PIX 护城河 + NF-e 自动化仍然稳固（第 5 章）
        - label: 门槛 1：NRR 是否 ≥100%？（需资料室核验）
        - label: 门槛 2：商户总流失率是否 ≤20%？（需资料室核验）
        - label: 门槛 3：入场价格是否 ≤$2.0B？（谈判）
        - label: 门槛 4：是否不存在待决的 BCB PIX 收费提案？（监管监测）
        - label: 投资 — 指标核验后，以 ≤$2.0B 入场可条件买入
        - label: 放弃 — 回报结构不足或风险未核验
      edges:
        - from: 'Verified: LatAm SMB TAM + Nuvemshop market leadership (Chapter 2+3)'
          to: 'Confirmed: BCB PIX moat + NF-e automation intact (Chapter 5)'
        - from: 'Confirmed: BCB PIX moat + NF-e automation intact (Chapter 5)'
          to: 'Gate 1: Is NRR ≥100%? (Data room required)'
        - from: 'Gate 1: Is NRR ≥100%? (Data room required)'
          to: 'Gate 2: Is gross merchant churn ≤20%? (Data room required)'
        - from: 'Gate 2: Is gross merchant churn ≤20%? (Data room required)'
          to: 'Gate 3: Entry price ≤$2.0B? (Negotiation)'
        - from: 'Gate 3: Entry price ≤$2.0B? (Negotiation)'
          to: 'Gate 4: No BCB PIX fee proposal pending? (Regulatory monitoring)'
        - from: 'Gate 4: No BCB PIX fee proposal pending? (Regulatory monitoring)'
          to: INVEST — Conditional Buy at ≤$2.0B entry with verified metrics
        - from: 'Gate 1: Is NRR ≥100%? (Data room required)'
          to: PASS — Insufficient return profile or unverified risk
        - from: 'Gate 3: Entry price ≤$2.0B? (Negotiation)'
          to: PASS — Insufficient return profile or unverified risk
    approximationNotes: 投资建议逻辑基于分析师对回报要求和风险阈值的评估。资料室核验门槛由分析师设定；实际投委会流程会不同。
