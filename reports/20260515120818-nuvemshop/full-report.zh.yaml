  - id: TV006
    title: 最终尽调要求表
    columns:
      - 优先级
      - 尽调要求
      - 阻断 / 非阻断
      - 估值影响
      - 预期来源
    rows:
      - - '1'
        - 经审计的 2023 年和 2024 年财务报表（P&L、资产负债表、现金流）
        - 阻断项
        - 没有审计财报，无法建模收入、利润率和烧钱
        - 四大会计师事务所（PwC、Deloitte、EY、KPMG）
      - - '2'
        - 按年份和产品层级拆分的 NRR、商户总流失率和分群留存表
        - 阻断项
        - NRR 是最关键的 SaaS 质量指标；所有情景都依赖 NRR
        - CFO 资料室；BI / 分析团队
      - - '3'
        - Nuvem Crédito 贷款组合：违约率、放款批次分析、拨备覆盖率
        - 阻断项
        - 信贷损失风险尚未量化；熊市情形依赖这项数据
        - CFO 资料室；信用风险团队
      - - '4'
        - BCB 支付机构牌照审查及全部 BCB 监管往来函件
        - 重大
        - PIX 监管风险评估需要审查正式往来函件
        - 法务资料室；BCB 往来函件文件
      - - '5'
        - 本地律师出具的墨西哥 CNBV 支付监管分析
        - 重大
        - Tiendanube Pay 在墨西哥的监管状态可能带来产品责任
        - 墨西哥法律顾问聘用文件
      - - '6'
        - LGPD 合规审计报告和 ANPD 往来日志
        - 重大
        - LGPD 执法风险需要独立验证合规状态
        - 隐私律所；DPO 披露
      - - '7'
        - 工程团队人数、薪酬结构和过去 12 个月流失率
        - 非阻断项
        - 人才风险评估和 AI 路线图可信度
        - HR 资料室
      - - '8'
        - 显示盈利路径的管理账（2025–2027 年 EBITDA 轨迹）
        - 重大
        - 资本充足性和退出时间线建模需要盈利路线图
        - CFO / 管理账
    notes: 阻断项必须在投资承诺前解决。非阻断项应在交割前解决。优先顺序反映风险调整后的重要性。
    claimRefs:
      - CV025
      - CV026
