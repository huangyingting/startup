      - number: '1.4'
        title: 规模指标与关键里程碑
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 的规模指标显示底层增长强劲，但因公司为私营企业，缺乏完整独立验证。公司主页（截至 2026 年 5 月）在 Brazil 标注 “+180 mil marcas”（180,000
              个品牌），Tiendanube 站点也为整个拉美组合标注 “+180 mil marcas”。公司自有支付方案 Nuvem Pago 据其 NuvemCommerce 年报称，2025 年在 Brazil 处理了
              R$6.5 billion 销售额。Nuvem Envio 在 2025 年 Q1 处理超过 2.7 million 件发货，公司披露同比增长 60%。公司报告 2025 年整体增长 75%。


              关键运营里程碑包括：2020–2021 年电商在全区域爆发式增长；2021 年 6 月完成 $500M 融资，获得加速产品和地域扩张的资本；2023 年收购 Perfit（Argentina
              营销自动化公司，3,500+ 客户）；2024 年 1 月高管重组，增加职业管理深度；2024 年 4 月进入 Chile，投入 $10M，并预计首年获得 15,000+ SME 客户；2025 年 5 月发布
              Lumi AI，投入 R$100M，目标是每名商户每月节省 80 小时；以及 InovA 2026 产品活动宣布 100+ 项功能，包括 Nuvem Chat（WhatsApp AI）、TikTok Shop
              集成和订阅电商。公司的数字钱包已积累 15+ million 注册消费者。


              反向背景：2022–2023 年全球电商减速影响了整个行业。Shopify 的 GMV 增速在 2022 年降至十几个百分点。Nuvemshop 未披露可比减速数据，但行业动态说明 2020–2021
              年的增长率属于异常高点，无法持续。公司 2025 年 75% 增长的说法很有吸引力，但来自公司口径，且未经审计。
