      - number: '7.5'
        title: 缓释措施、终止条件与尽调要求
        blocks:
          - type: paragraph
            body: >-
              现有主要缓释措施包括：（1）BCB 监管风险部分由 Nuvemshop 长期合规投入、BCB 关系，以及 BCB 维持 PIX 作为普惠金融增长引擎的结构性激励缓释——引入 PIX
              费用会面临政治阻力；（2）LGPD 风险部分由公司自述的合规投入缓释（任命 DPO、隐私政策、安全认证），但尚未完全验证；（3）平台可靠性风险部分由 CDN 架构（AWS CloudFront）、PCI DSS
              Level 1 要求季度安全扫描，以及历史 Black Friday
              准备工作缓释；（4）宏观集中风险部分由墨西哥和哥伦比亚增长缓释，但巴西收入占比仍高。破坏论点触发项——会实质削弱投资论点的条件——包括：（A）BCB 引入商户侧 PIX 交易费，使 Nuvem Pago MDR
              经济性下降 50%+；（B）Shopify 推出带 PIX 集成的原生巴西支付产品（Shopify Payments Brazil），消除 Nuvemshop 的主要技术护城河；（C）ANPD 因 LGPD
              违规对 Nuvemshop 采取重大执法行动或罚款；（D）年度商户总流失率超过
              25%，表明竞争或产品质量恶化；（E）债务或股权融资失败，引发流动性事件或估值下调轮。尽调要求包括：（1）数据室：NRR、总流失率、按年份和产品层级拆分的 cohort 留存；（2）BCB
              监管往来和支付机构牌照审阅；（3）Nuvem Crédito 贷款账本指标：违约率、拨备覆盖率、未偿余额；（4）LGPD 合规审计报告和 ANPD
              往来；（5）工程团队人数、薪酬结构和离职率；（6）本地律师出具的墨西哥支付监管分析。
