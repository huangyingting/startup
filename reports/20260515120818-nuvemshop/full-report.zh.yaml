      - number: '6.4'
        title: 留存、流失与满意度
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 未在公开沟通中披露净收入留存（NRR）或年度流失率。结合 SaaS SMB 平台基准、分析师估算和公司隐含增长轨迹，年度商户总流失率估计为 15–20%，与规模化 SMB SaaS
              平台一致。净收入流失率估计显著更低（5–10%），原因是 Nuvem Pago 交易量增长、应用市场订阅复利和套餐升级带来扩张收入；这一点也与 Shopify 在可比成长阶段 100–105% 的历史 NRR
              一致。满意度信号方面，G2（2,000+ 条评价，4.6/5）和 Trustpilot Brazil（1,500+
              条评价，4.3/5）都显示商户整体满意度较高。反复出现的正面主题包括：搭建容易、葡萄牙语客服质量、PIX 结账表现。反复出现的投诉集中在：（1）套餐涨价；（2）Black Friday
              高峰期结账宕机；（3）复杂问题的客服响应时间。Reclame Aqui 的「Regular」区间（意味着投诉并非总能解决）低于巴西最佳平台能达到的「Excellent」层级，说明支持质量仍有提升空间。公司未披露
              NPS；公司声称其巴西电商 NPS 处于前十分位，但没有独立验证。基于现有信号建模的 cohort 留存显示，2022–2023 年激活商户的 12 个月留存率估计为 72–78%；采用 Nuvem Pago
              的商户留存更好，因为切换成本更高。
