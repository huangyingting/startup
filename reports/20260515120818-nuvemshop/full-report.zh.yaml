      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              拉美电商的结构性增长逻辑建立在几项持久驱动因素上：（1）相对发达市场的电商渗透率较低——拉美约占零售的 10–15%，而 US 和 UK 为
              20–30%；（2）智能手机快速普及，互联网行为以移动端为先（拉美互联网渗透率 75%，移动端 70%+）；（3）Brazil 的 PIX 即时支付基础设施，2024 年完成 60 billion
              笔交易，占全部零售支付交易 40%+，大幅降低结账摩擦；（4）DTC 品牌文化兴起；（5）AI 驱动的生产力工具降低商户运营负担。


              增长约束包括：（1）Brazil 高利率（SELIC 13%+）压制 SMB 融资可得性；（2）Argentina 持续外汇危机降低阿根廷商户贡献的美元等值 ARR；（3）MercadoLibre
              的主导地位形成强惯性——许多拉美 SMB 的大部分收入来自交易平台，未必优先投资自有渠道；（4）Shopify 重新聚焦拉美并本地化支付，对 Nuvemshop 客群高端部分形成竞争压力（Shopify 国际收入
              2024 年增长 27%）；（5）Colombia 和 Chile 的物流基础设施仍不如 Brazil 发达，限制 Nuvem Envio 的扩张价值；（6）TikTok Shop 进入拉美，可能打乱
              Nuvemshop 获取新商户所依赖的“社交电商迁移到店铺”漏斗。


              反向背景：2022–2023 年拉美电商减速很明显——Reuters 报道称，随着疫情期需求正常化，Brazil 电商行业在 2022 年显著降速。VTEX 2023 年年报在风险因素中点名 Nuvemshop
              为竞争对手，确认平台层竞争强度。支付机构在 Brazil 运营必须向 Banco Central 注册并满足合规要求——这是 Nuvem Pago 持续运营的监管合规成本。
