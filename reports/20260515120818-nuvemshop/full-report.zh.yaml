      - number: '8.3'
        title: 牛市 / 基准 / 熊市情景分析
        blocks:
          - type: paragraph
            body: >-
              三个投资情景基于 NRR、增长率、退出倍数和监管环境的离散假设建模。熊市情景（$800M–$1.5B）：BCB 引入 PIX 商户费用（压缩 Nuvem Pago take rate），年度商户流失率升至
              22%+，NRR 降至 100% 以下，收入增速放缓到 8–10%，按 $200–250M ARR、5× 收入倍数退出 = $1.0–1.25B 退出。熊市情景相对 2021
              年轮次入场会造成重大损失。基准情景（$2.0–$2.5B）：无 BCB PIX 收费，商户流失率维持 15–18%，NRR 为 100–108%，收入增速 15–18%，按 $250–300M ARR、8×
              收入倍数退出 = $2.0–2.4B 退出。基准情景相对 2021 年轮次入场回报为 0% 至 −35%（持平到小幅亏损）；对 $2.0B
              入场的新投资人则是盈亏平衡到小幅收益。牛市情景（$3.0–$4.0B）：Nuvem Pago 渗透率扩大到 80%+，Nuvem Crédito 和 AI 套件贡献增量 ARR，墨西哥收入翻倍，金融服务扩张推动
              NRR 达到 115–120%，按 $280–340M ARR、12× 收入倍数退出 = $3.4–4.1B 退出。牛市情景相对 2021 年轮次入场产生 0–30% 收益；对 $2.0B
              入场的新投资人有吸引力（$200–250M ARR，12× 倍数 = $2.5–3.0B → 1.25–1.5× MOIC）。$2.0B 入场投资人的回报画像：熊市 0.4–0.75×，基准
              1.0–1.25×，牛市 1.5–2.0×。这种非对称风险 / 回报，更支持在相对 2021 年轮次价格大幅折价时进行有条件投资。
            claimRefs:
