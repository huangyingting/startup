      - number: '7.4'
        title: 人才与执行风险
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 由 Santiago Sosa（CEO）和 Alejandro Alfonso（CPO/CTO）在 2010 年共同创立，两人仍是主要战略和技术领导者。联合创始人依赖程度中等：公司在 14
              年历史中已搭建管理团队，但创始人仍是主要公众面孔和战略裁决者。关键人物风险符合创始人领导的成长公司在这一阶段的典型状态；如果创始人离任或失去履职能力，会造成市场不确定性，尤其是 Nuvemshop
              仍未上市、仍为私人公司。工程人才留存风险正在上升：自 2020 年以来，LatAm 软件工程人才市场竞争明显加剧，美国科技公司（包括
              Shopify、GitHub、MercadoLibre）向巴西工程师提供美元计价的远程薪酬。Nuvemshop 以 BRL 计价的薪酬结构，相比支付美元的远程优先公司存在结构性人才竞争劣势。跨 5 个 LatAm
              市场执行，需要本地化产品、合规、营销和运营能力；过早扩张市场或对非巴西市场投入不足，会造成多线作战执行风险，Nuvemshop 可能卡在过度依赖巴西与墨西哥 / 哥伦比亚执行不足之间。AI 产品路线图需要搭建
              ML/AI 工程能力；Nuvemshop 目前在这方面的深度不及 Shopify，后者有专门 AI 团队和显著更大的工程预算。
            claimRefs:
