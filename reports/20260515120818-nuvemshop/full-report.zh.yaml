      - number: '8.5'
        title: 退出准备度、最终尽调要求与破坏论点触发项
        blocks:
          - type: paragraph
            body: >-
              退出情景：（1）在 Nasdaq 或 NYSE IPO：一旦 Nuvemshop 证明持续 20%+ 增长和 110%+ NRR，它就是美国上市 IPO 的自然候选。VTEX 2021 年 NYSE
              IPO（峰值市值 $4.6B）的先例，证明 LatAm 电商平台具备 IPO 可行性。若 Nuvemshop 于 2027–2028 年在 Nasdaq IPO，ARR 达 $250–350M、收入倍数
              8–10×，市值可达 $2.0–3.5B。（2）战略收购：Shopify、Global-e 或 MercadoLibre 都是潜在战略买家。Shopify 收购 Nuvemshop 可立即获得 LatAm SMB
              市场领导地位和 BCB 支付机构资质；估计战略 M&A 溢价为基准估值的 1.5–2.0×（$3.0–5.0B）。（3）私募二级交易 / 延续基金：私募二级交易或 GP
              延续基金，可让早期投资人在当前基准估值下获得流动性，而不必等待 IPO 准备就绪。最终尽调要求（按优先级）：（1）数据室：按年份和产品层级拆分的 NRR、商户总流失率、cohort
              留存表（阻断项——没有这些数据无法完成尽调）；（2）Nuvem Crédito 贷款账本：违约率、vintage 分析、拨备（财务模型阻断项）；（3）经审计的 2023 和 2024
              年财务报表（估值模型阻断项）；（4）BCB 监管往来审阅和支付机构牌照细节；（5）LGPD 合规审计报告；（6）墨西哥 CNBV 支付产品监管分析；（7）显示盈利路径和 EBITDA
              轨迹的管理账；（8）工程团队：人数、薪酬结构、离职率。破坏论点触发项（见第 7 章风险分析）：BCB 引入 PIX 商户收费、Shopify 推出巴西支付机构、年度流失率超过 25%、ANPD 发起 LGPD
              执法行动，或 Nuvem Crédito 违约率超过 10%。
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
