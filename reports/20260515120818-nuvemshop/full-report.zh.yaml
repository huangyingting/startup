      - number: '2.3'
        title: 买方与细分客群分析
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 的主要买方是准备上线或扩大独立在线店铺的中小企业创业者。买方、用户和付款人通常是同一个人，或 1–5 人的小团队。核心客群分三类：（1）个人创业者和微品牌（少于 10 名员工、年收入低于
              R$500K），占 Nuvemshop 180,000+ 商户的大多数；（2）小型企业（10–50 名员工、收入 R$500K–R$5M），使用平台的 Scale 或 Pro 档位，并贡献不成比例的
              GMV；（3）新兴 DTC 品牌（50–200 名员工、收入 R$5M+），在可能迁移到 VTEX 前会使用 Nuvemshop Next（企业级产品）。


              关键买方心理是：技术能力不强，高度依赖葡语 / 西语支持，需要本地支付方式（Pix、boleto、本地信用卡），并且更偏好可负担的月费，而不是高 GMV
              抽佣。采用触发点包括：（a）从只做社交电商转向自有渠道；（b）希望降低对 MercadoLibre 费用的依赖；（c）跨境诉求；（d）获得嵌入式金融服务。AMI 数据显示，超过 70% 在线销售的拉美 SME
              先从社交电商起步，之后才迁移到专用平台。


              平台通过分层 SaaS 订阅（Brazil 从免费到 R$449/月）、Nuvem Pago 支付交易抽佣（估计每笔 1.5–3%）、Nuvem Envio 发货物流利润，以及高级应用 /
              合作伙伴集成变现。这形成一座变现金字塔：少数商户贡献大部分收入。
