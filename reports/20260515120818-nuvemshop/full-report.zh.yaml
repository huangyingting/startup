      - number: '5.2'
        title: 技术架构与基础设施
        blocks:
          - type: paragraph
            body: >-
              Nuvemshop 后端基于部署在 Amazon Web Services（AWS）上的微服务架构，核心服务包括目录 / 库存管理、订单处理、结账、支付网关（Nuvem Pago）、运费计算（Nuvem
              Envio）和应用市场 API。店铺层使用 React 并做服务端渲染以优化 SEO，同时结合借鉴 Liquid 的主题模板系统，让商户无需写代码即可自定义布局。Nuvemshop 为其应用市场开放 REST
              API（以及面向合作伙伴的新 GraphQL API），让 8,000+ 集成把商户数据接入外部工具。Nuvem Pago 是在 Banco Central do Brasil 注册的独立支付机构；它处理
              PIX、银行卡（Visa/Mastercard/Elo/Amex）、Boleto、BNPL 和信用卡分期交易。Nuvem Pago 持有 PCI DSS Level 1
              认证，这是支付卡行业安全的最高级别，对规模化处理信用卡至关重要。数据基础设施支持商户仪表盘实时分析和队列分析，数据存储在 AWS 服务（S3、RDS、Redshift）中。Nuvemshop 在 GitHub
              发布了面向应用开发者的 Node.js 和 PHP 开源 SDK，体现开发者优先的 API 策略。NF-e（电子财税发票）自动化内置在 Brazil 结账层，订单完成后自动生成财税票据——这项能力需要与
              Brazil Receita Federal 财税系统深度集成。技术栈从早期 2010 年代的 Rails 单体应用演进到微服务，仍在迁移中；迁移既代表架构债，也代表对未来可扩展性的投入。
