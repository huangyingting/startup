- calloutType: risk
  title: Market sizing uncertainty and marketplace competition
  body: No independent analyst has sized the LatAm SMB hosted e-commerce platform
    sub-market. Nuvemshop's addressable SAM must be derived from broader market data,
    carrying significant uncertainty. MercadoLibre's ~USD $47B marketplace GMV reflects
    structural inertia that constrains independent-store adoption across the region.
  claimRefs:
  - CM002
  - CM003
  - CM010
- calloutType: insight
  title: PIX as a structural moat for Nuvemshop's payments revenue
  body: PIX's adoption as 40%+ of Brazilian retail payment transactions enables real-time,
    low-cost checkout. Nuvemshop's WhatsApp-first Nuvem Chat AI checkout strategy
    (InovA 2026) directly leverages PIX's real-time settlement as a differentiation
    layer — a moat that Shopify and VTEX lack without native Brazilian financial infrastructure.
  claimRefs:
  - CM017
  - CM033
