- id: buyer-segmentation
  title: Buyer and Segment Analysis
  body: 'Nuvemshop''s primary buyers are SMB entrepreneurs launching or scaling an
    independent online store. The buyer, user, and payer are typically the same person
    or a small team of 1–5 people. The core segment breakdown is: (1) solo entrepreneurs
    and micro-brands (less than 10 employees, less than R$500K/year revenue), who
    represent the majority of Nuvemshop''s 180,000+ merchants; (2) small businesses
    (10–50 employees, R$500K–R$5M revenue) who use the platform''s Scale or Pro tiers
    and drive disproportionate GMV; and (3) emerging DTC brands (50–200 employees,
    R$5M+ revenue) who may use Nuvemshop Next (enterprise offering) before potentially
    migrating to VTEX.


    Key buyer psychology: low technical sophistication, high sensitivity to Portuguese/Spanish
    language support, need for local payment methods (Pix, boleto, tarjetas de crédito
    locais), and strong preference for affordable monthly pricing versus high GMV
    take-rates. Adoption triggers include: (a) pivot from social-commerce-only to
    owned-channel; (b) desire to reduce MercadoLibre fee dependency; (c) cross-border
    aspiration; (d) access to embedded financial services. Over 70% of LatAm SMEs
    that sell online began with social commerce before migrating to a dedicated platform
    (AMI data).


    The platform monetizes through a tiered SaaS subscription (free through R$449/month
    in Brazil), a take-rate on Nuvem Pago payment transactions (estimated 1.5–3% per
    transaction), a logistics margin on Nuvem Envio shipments, and premium app/partner
    integrations. This creates a monetization pyramid where a small share of merchants
    drive a majority of revenue.'
