- calloutType: strength
  title: Structural LatAm e-commerce tailwind with low penetration
  body: Latin American e-commerce penetration at ~10–15% of retail versus 20–30% in
    developed markets, combined with 75% internet penetration and a PIX-enabled payment
    infrastructure, creates a durable multi-year growth runway for Nuvemshop's addressable
    market.
