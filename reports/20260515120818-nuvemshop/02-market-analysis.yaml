- id: market-sizing
  title: TAM, SAM, and Market Sizing
  body: 'Multiple independent estimates converge on Latin American total e-commerce
    at USD $130–180 billion in 2024–2025 gross merchandise value, growing at a 15–22%
    CAGR depending on source and geography included. Statista estimates LatAm e-commerce
    revenue at approximately USD $157 billion in 2024, with projections reaching USD
    $260 billion by 2029. Americas Market Intelligence (AMI) and eMarketer provide
    consistent range estimates. Brazil alone represents approximately 30–35% of regional
    e-commerce, or USD $47–57 billion in 2024.


    The SMB independent e-commerce addressable segment — excluding marketplace-mediated
    GMV and enterprise platforms — is estimated at 20–30% of total LatAm e-commerce,
    or USD $30–50 billion. This represents the TAM relevant to Nuvemshop''s platform-as-a-service
    model. Nuvemshop''s SAM is further constrained by its five-country footprint and
    SMB focus: approximately USD $25–40 billion. The company''s reported GMV through
    its payments channel (R$6.5B, ~USD $1.3B Brazil 2025) implies a current penetration
    of approximately 3–15% of the Brazilian SMB e-commerce addressable market — indicating
    substantial growth headroom.


    Brazil''s ABCOMM tracks domestic e-commerce at R$204 billion in 2023, growing
    to an estimated R$240–260 billion in 2025. The addressable independent-store segment
    within this is approximately R$40–60 billion. At R$6.5B in payments GMV, Nuvemshop
    has captured roughly 10–15% of Brazil''s addressable independent e-commerce spend
    through its own payments rails — a meaningfully higher share than the raw brand-count
    data suggests, given that only 7 in 10 merchants use Nuvem Pago. True platform
    GMV (including merchants using third-party payment processors) is substantially
    higher, likely R$20–40 billion in Brazil.


    Adverse context: Market sizing for Nuvemshop''s specific segment (non-marketplace,
    non-enterprise hosted SaaS) requires analyst derivation with significant uncertainty.
    No independent analyst has published a specific SMB hosted e-commerce platform
    sub-market estimate for LatAm. All SAM/SOM figures are derived from broader market
    data and carry low to medium confidence.'
