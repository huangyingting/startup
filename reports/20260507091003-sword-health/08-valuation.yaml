chapter:
  number: 8
  title: Valuation & Investment Recommendation
  summary: >
    Sword Health's June 2025 Series F valued the company at $4 billion on ~$240M ARR (16.7x ARR multiple), with cash-flow positive operations and strong net revenue retention. Hinge Health's February 2025 IPO at $6.4 billion is the primary public comparable. The base case is a 2028 IPO at $400M ARR and 15x = $6B (1.5x Series F return); bull case is $12B at $600M ARR (3x); bear case is $2.7B at $300M ARR (0.7x). Recommendation: track — the valuation is stretched at 16.7x ARR with limited margin of safety, but the clinical proof, cash-flow positive status, and enterprise base support a re-entry thesis at ARR >$350M with independent outcome validation.

