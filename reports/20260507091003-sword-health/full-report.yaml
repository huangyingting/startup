      - number: '6.4'
        title: Adoption Dynamics and Member Engagement
        blocks:
          - type: paragraph
            body: >
              A central challenge for Sword Health and all digital MSK providers is conversion of eligible employees to
              active users. Employer contract value is driven by eligible headcount, but outcomes and ROI are driven by
              member activation and completion. Industry data suggests digital wellness program enrollment rates of
              15-25% among eligible employees, meaning the majority of contracted employees never engage with the
              platform. Sword Health has not publicly disclosed its enrollment penetration or program completion rates.
              Member experience on Trustpilot and G2 skews positive (4+ star average) with praise for sensor-guided
              exercises and PT availability, but common complaints include sensor hardware calibration issues and desire
              for more live video sessions. Member dropout risk is real: if members disengage before achieving clinical
              outcomes, the employer's perceived program ROI declines at renewal time, increasing churn risk. The 37% of
              large US employers who had already adopted digital MSK programs by 2025 (Willis Towers Watson) suggests
              rapid market adoption has moved Sword Health from pioneering category creation to competing for renewals
              and new logos against Hinge Health and others in an increasingly contested market.
