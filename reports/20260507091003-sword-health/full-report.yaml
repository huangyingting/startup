      - number: '4.2'
        title: Pricing and Monetization Models
        blocks:
          - type: paragraph
            body: >-
              Sword Health uses three primary pricing structures for its musculoskeletal and mental health programs. The
              traditional per-member-per-month model is the most common arrangement for employer contracts: employers
              are billed a PMPM fee for enrolled members regardless of session activity, estimated at $15–$45 PMPM
              depending on program scope, employer size, and contract duration. Outcome-based pricing was launched in
              2024 and provides tiered payment based on measured clinical outcomes including pain reduction, functional
              improvement, and surgery avoidance. This model aligns Sword's revenue to clinical performance and
              represents a competitive differentiator, though it introduces revenue timing risk and outcome-attribution
              complexity. Enterprise flat-fee contracts for large national accounts provide a third pricing variant with
              volume-committed pricing and multi-program bundling.

              Sword claims $1B+ in cumulative cost savings delivered to employer clients and a 3.7:1 ROI ratio, which
              forms the basis of its sales narrative and supports PMPM pricing above undifferentiated telehealth
              alternatives. In Germany, Sword holds DiGA (Digital Health Application) certification, which entitles
              statutory health insurance payers to reimburse at a fixed government-set rate of approximately €500–600
              per 90-day prescription per patient. In the UK, Sword maintains an NHS partnership for MSK care delivery.
              These reimbursement channels provide revenue diversification and payer validation, but volumes outside the
              United States employer market are not disclosed. Pricing for the Kaia Health mental health and respiratory
              programs follows a similar PMPM structure for the employer channel, with statutory reimbursement available
              in additional European markets where Kaia holds regulatory approvals.
