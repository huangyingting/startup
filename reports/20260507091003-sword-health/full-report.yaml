appendices:
  - id: A
    title: Sword Health Funding History and Valuation Trajectory
    blocks:
      - type: paragraph
        title: null
        body: >
          Sword Health's valuation trajectory reflects digital health market cycles: founded 2015 in Porto; raised
          Series A (Khosla Ventures, 2019); grew to unicorn status by 2021-2022 digital health boom; sustained growth
          through the 2022-2023 digital health funding correction; reached $4B Series F in June 2025 on $240M ARR at
          16.7x multiple. The small $40M primary Series F raise against a $4B valuation indicates the company did not
          require significant primary capital — it raised at a high valuation to establish a reference price for
          secondary liquidity and pre-IPO positioning. Total raised $500M+ from Khosla Ventures (Series A lead), General
          Catalyst (Series D, E, F lead), Transformation Capital (healthcare VC), IVP (growth equity), Comcast Ventures
          (strategic/media), and Founders Fund (Thiel-affiliated). All are digital health-experienced investors who
          understand the clinical proof standard required for premium exits.
        claimRefs: []
  - id: B
    title: Hinge Health Comparison and Competitive Context
    blocks:
      - type: paragraph
        title: null
        body: >
          Hinge Health's February 2025 IPO established the definitive public-market benchmark for digital MSK platforms.
          Key comparative metrics: Hinge Health at $6.4B / ~25x ARR with 500+ employers, 4M+ members, and actuarially
          validated outcome disclosures in the S-1. Sword Health at $4B / 16.7x ARR with 2,500+ employers and 400K
          members. Sword Health has a dramatically higher employer client count per dollar of valuation ($1.6M per
          employer client vs. Hinge Health's $12.8M per employer client) — suggesting Sword Health's employers may be
          smaller on average or contracted at lower PMPM. The member scale gap (400K vs. 4M) represents a 10x difference
          in longitudinal training data for AI models — a compounding disadvantage as both companies invest in
          next-generation AI PT capabilities. Hinge Health's post-IPO capital, SEC-audited disclosures, and actuarially
          validated outcome claims create a competitive credibility gap that Sword Health must close through independent
          clinical validation before its 2028 IPO filing.
        claimRefs: []
  - id: C
    title: Re-entry Criteria and Monitoring Framework
    blocks:
      - type: paragraph
        title: null
        body: >
          Conditions for upgrading recommendation from track to buy: (1) ARR exceeds $350M with YoY growth above 35% —
          demonstrated on two consecutive quarterly updates; (2) independent actuarial firm validates ROI at ≥3:1 and
          pain reduction at ≥65%, published in peer-reviewed or actuary-signed report; (3) no Hinge Health competitive
          displacement events (loss of 3+ named Fortune 500 accounts in a single quarter); (4) BLOOM/MIND ARR
          contributing >10% of total ARR, confirming platform cohesion; (5) EBITDA positive for two consecutive
          quarters. If all five are met, re-enter at Series G or pre-IPO at ≤15x ARR. If only (1) and (2) are met,
          initiate diligence process but do not commit capital. If (3) occurs, reassess to avoid. Monitor quarterly:
          employer renewal announcements, Hinge Health competitive wins, FDA AI/ML guidance updates, and independent MSK
          clinical study publications citing Sword Health outcome data.
        claimRefs: []
