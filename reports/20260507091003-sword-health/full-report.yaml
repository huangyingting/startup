      - number: '5.3'
        title: Technology Architecture and AI Stack
        blocks:
          - type: paragraph
            body: >-
              Sword's technology stack is organized around three layers of proprietary infrastructure: the Phoenix
              wearable IoT device, the Arbor LLM orchestration framework, and a multimodal data pipeline integrating
              wearable sensor data, patient-reported outcomes, and claims data.

              The Phoenix wearable uses inertial measurement unit (IMU) sensors to capture full three-dimensional joint
              motion at clinical precision, transmitting data via Bluetooth to the companion iOS/Android app. The Kaia
              Health platform provides a complementary computer-vision approach — using a standard smartphone camera and
              pose estimation algorithms to guide exercise without a wearable device, relevant for global markets and
              accessibility use cases. These two different sensor modalities represent a major integration challenge
              following the January 2026 acquisition.

              The Arbor LLM framework is Sword's proprietary multi-agent orchestration stack, powering conversational AI
              therapy across Thrive, Bloom, Move, and Mind. Arbor coordinates specialized sub-agents for intake,
              exercise prescription, motivational support, clinical escalation flagging, and outcomes measurement.
              MindGuard is the safety sub-system within the Mind platform, implementing real-time filtering and clinical
              escalation rules for sensitive mental health interactions.

              Cloud infrastructure runs on AWS with HIPAA Business Associate Agreements in place. Sword reports 45+
              patents pending or granted covering AI therapy methods, wearable sensor designs, and clinical protocols.
              SOC 2 Type II certification covers the US-facing platform. FDA regulatory classification remains an open
              question: the Phoenix wearable and AI-guided therapy features could qualify as General Wellness devices or
              as Software as a Medical Device (SaMD) under 21 CFR Part 880, materially affecting labeling, clinical
              validation, and post-market surveillance obligations. Sword does not maintain a public GitHub organization
              and has not published developer-facing API documentation as of May 2026.
