          - type: callout
            title: Key-Person Concentration — Virgílio Bento
            body: >
              All material announcements, media appearances, and strategic pivots are channeled through founder-CEO
              Virgílio Bento. There is no disclosed succession plan, no public deputy CEO, and his departure could
              materially impair fundraising, enterprise partnerships, and clinician trust. This is amplified by the
              company's phase of multi-vertical expansion where vision coherence is critical.
