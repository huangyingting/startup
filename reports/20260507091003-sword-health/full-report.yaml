      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Sword Health has completed multiple funding rounds since its 2018 seed raise, accumulating more
              than $500 million in total capital as of the January 2026 Kaia Health acquisition announcement.
              Early rounds were led by Khosla Ventures (Series A, 2019), which has participated in every major
              round. General Catalyst emerged as lead investor in the Series D (December 2021) and has led
              the two most recent rounds (Series E, June 2024; Series F, June 2025).

              Milestones: Seed $4.6M (2018) → Series A $8M at undisclosed valuation (2019, Khosla Ventures)
              → Series B $25M (2020) → Series C $85M at $1.8B valuation (June 2021) → Series D $163M at $2B
              valuation (December 2021, General Catalyst, BOND, Khosla) → Series E $130M at $3B valuation
              (June 2024) → Series F $40M at $4B valuation (June 2025, General Catalyst lead; Khosla Ventures,
              Comcast Ventures, Lince Capital, Oxy Capital, Armilar, Indico Capital, Shilling participating).
              Total equity raised exceeds $500M (including primary + secondary proceeds from Series E).

              The June 2025 Series F was notable for being a relatively small primary raise ($40M) paired with
              the launch of the Mind mental health platform, suggesting the company is not capital-constrained
              but sought a valuation step-up and strategic partner alignment. CEO Bento has stated the company
              is cash-flow positive and that an IPO is deferred to at least 2028. The company's Series E press
              release described the $130M as a mix of primary and secondary proceeds, indicating some insider
              liquidity. Transformation Capital, Founders Fund, and Comcast Ventures are also listed as
              investors in company materials.
