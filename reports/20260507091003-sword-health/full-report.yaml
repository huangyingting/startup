            body: >-
              Sword Health's private status means that every financial metric of underwriting significance is either
              CEO-stated without external verification or simply unknown. Audited revenue, gross margin, EBITDA, CAC,
              LTV, NRR, cohort retention, and burn rate are all undisclosed. ARR figures are CEO-stated and
              press-reported; no independent verification exists. The company's claim of cash-flow positive status since
              2024 is plausible given the absence of large-scale primary fundraising between the June 2024 Series E and
              June 2025 Series F, but cannot be confirmed from public materials.

              For comparative context, Hinge Health — the primary publicly traded comparable — reported $123.8M in Q1
              2025 revenue and its first profitable quarter at $17M net income. Hinge's annualized Q1 2025 revenue run
              rate of approximately $495M implies a significantly larger revenue base than Sword at roughly half the
              valuation per revenue dollar, which either reflects Sword's premium for growth trajectory, the
              private-market valuation discount, or both. The A2 Academy equity lawsuit filed July 2024 claiming a 5%
              stake represents a material contingent liability of approximately $200M at the current $4B valuation and
              must be treated as an open item in any capital adequacy analysis. Without management data access including
              audited financials, ARR by segment, gross margin by product, and cash position, this chapter supports a
              high-level revenue narrative but cannot close a traditional financial diligence case. The financial
              verdict is that revenue growth is real and the capital structure appears adequate, but margin path, burn,
              and earnings quality remain unverifiable from public sources alone.
