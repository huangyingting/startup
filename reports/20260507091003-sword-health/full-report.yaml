      - number: '5.2'
        title: Care Delivery Workflow and Clinical Integration
        blocks:
          - type: paragraph
            body: >-
              Sword's care delivery model replaces the traditional synchronous in-person physical therapy episode with a
              structured AI-augmented digital pathway. The patient journey begins with employer or health plan
              enrollment, followed by an AI-administered musculoskeletal assessment that produces a personalized
              8-to-12-week exercise program. Members complete daily AI-guided exercise sessions using the Phoenix
              wearable, which feeds real-time motion data to Sword's AI engine for form correction, rep counting, and
              progression adjustment. Licensed physical therapists review session data asynchronously — typically weekly
              — and intervene when the AI flags pain escalation, form breakdown, or clinical risk signals. The pathway
              closes with outcomes measurement: pain reduction scores, functional assessments, and surgery avoidance
              confirmation.

              Sword publishes 43 peer-reviewed clinical studies supporting this model, including reported average 73%
              pain reduction across enrolled populations and surgery avoidance rates cited in employer contracts. The
              Surgery Hero acquisition integrated a perioperative prehabilitation pathway operating within 18 UK NHS
              Trusts, extending clinical integration beyond the employer channel. The Predict module feeds into the same
              pathway as a clinical decision support layer, stratifying members into conservative-care vs.
              surgery-appropriate cohorts before enrollment.

              Clinical escalation runs from AI-detected risk signals to asynchronous PT review to on-call clinician
              intervention when acute risk is confirmed. The Mind platform mirrors this structure with MindGuard
              providing real-time safety filtering for mental health interactions, with escalation protocols for
              suicidality or crisis indicators. This shared escalation architecture is a key regulatory and
              liability-management design choice across both the MSK and behavioral health product lines.
