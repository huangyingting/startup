      - number: '4.4'
        title: Capital Structure and Funding History
        blocks:
          - type: paragraph
            body: >-
              Sword Health has raised more than $500M in total equity financing across seven rounds from 2018 through
              2025. The seed round in 2018 raised $4.6M; Series A of $8M closed in April 2019 with Khosla Ventures as
              lead; Series B of $25M closed in 2020; Series C of $85M at a $1.8B valuation closed in June 2021; Series D
              of $163M at a $2B valuation closed in December 2021 with General Catalyst, BOND Capital, and Khosla
              Ventures participating; Series E of $130M at a $3B valuation closed in June 2024 with General Catalyst as
              lead; and Series F of $40M at a $4B valuation closed in June 2025 with General Catalyst again leading.
              General Catalyst has participated in every round since Series C and is the dominant institutional
              investor. Khosla Ventures and BOND Capital hold meaningful but smaller stakes.

              The Kaia Health acquisition closed in January 2026 for $285M, a price funded from the company's balance
              sheet supplemented by possible additional financing, though the specific payment mix has not been
              disclosed publicly. The Surgery Hero acquisition in 2025 at an undisclosed price represents additional
              M&A-related capital deployment. Management has deferred IPO plans, with signals pointing to no public
              offering before 2028. At the $4B Series F valuation and with over $500M raised, Sword carries a meaningful
              burn-implied track record: the total capital deployed across the company's operating history plus the Kaia
              acquisition appears substantial, making cash-flow positive claims material to the forward capital adequacy
              story. No debt facilities, convertible notes, or project-finance obligations are known from public
              disclosure. The primary contingent liability is the A2 Academy equity lawsuit, which claims a 5% equity
              stake and at $4B valuation represents a potential $200M exposure that has not been settled or resolved as
