  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context and Financing Framework
        blocks:
          - type: paragraph
            body: >
              Sword Health's June 2025 Series F established a $4 billion post-money valuation on approximately $240
              million ARR — an implied 16.7x ARR multiple. This round was led by General Catalyst and Khosla Ventures,
              both citing the company's cash-flow positive status, 2,500+ employer client base, and strong net revenue
              retention as key valuation drivers. For context, Pitchbook's private market data indicates top-quartile
              AI-enabled care platforms traded at 18-20x ARR multiples in mid-2025, placing Sword Health's round
              slightly below the private market median — suggesting investors priced in either caution about the public
              market IPO window or acknowledgment of the hardware cost model's gross margin ceiling relative to
              pure-software SaaS peers. S&P Global's 2025 digital therapeutics survey placed Sword Health's 16.7x ARR
              within the median range of 14-18x for employer-facing digital health platforms with 100+ named enterprise
              clients. The company's total capital raised exceeds $500 million across six rounds, implying a burn
              efficiency (ARR per dollar raised) of approximately $0.48 — below the top-decile SaaS benchmark of
              $0.60-$0.80. This reflects the structural cost of Sword Health's hardware-dependent model: each enrolled
              member requires a motion sensor kit, creating per-unit manufacturing and logistics costs absent from
              software-native competitors. However, reaching cash-flow positive in mid-2025 demonstrates the business
              model has found a profitable unit economics structure, even if structurally different from pure-SaaS
              peers. Wall Street Journal's September 2025 profile confirmed CEO Bento's target of $500M ARR before IPO
              to position the debut as a scaled, profitable platform rather than a high-growth pre-profit story — a
              deliberate contrast to Hinge Health's earlier-stage IPO approach that resulted in only a flat valuation
              step-up from its last private round.
            claimRefs:
              - CV001
              - CV004
              - CV011
              - CV014
              - CV019
              - CV034
              - CV036
      - number: '8.2'
        title: Public-Market Comparables and Multiple Framework
        blocks:
          - type: paragraph
            body: >
              Three public-market reference points bracket Sword Health's valuation. First, Hinge Health's February 2025
              IPO at $6.4 billion is the primary comparable — a direct MSK digital health peer at approximately 25x ARR,
              with the amended S-1/A disclosing 500+ enterprise employer clients, 4M+ enrolled members, and actuarially
              validated outcome metrics. Healthcare Dive reported that Hinge Health's IPO valuation represented only a
              flat-to-minimal step-up versus its last private round, consistent with digital health multiple compression
              and suggesting that Sword Health's current $4B private valuation similarly faces limited upside from
              private-to-public re-rating alone. Forbes reported that Sword Health investors view the
              per-employer-client valuation as more attractive than Hinge Health's: $1.6M per employer client for Sword
              Health versus $12.8M per employer client for Hinge Health at their respective valuations. Second, Teladoc
              serves as the negative trajectory comparable — a digital health platform whose market cap declined from
              $16B to $900M between 2021 and 2024, representing the permanent de-rating risk for platforms that fail to
              sustain growth. Third, Accolade Health at 2x ARR sets the floor scenario for employer health navigation
              SaaS without clinical differentiation. Morgan Stanley's Q2 2025 digest noted that employer-facing
              platforms with 3+ years of named client longevity and verified 3:1+ ROI case studies command a 30-40%
              valuation premium, making Sword Health's Walmart, Boeing, and Delta references material to the premium
              case. Bessemer's 2025 State of the Cloud benchmarks suggest top-decile SaaS at 20-30x ARR for companies
              with >50% YoY growth and >120% NRR — a range that Sword Health could access if its growth metrics are
              independently verified.
            claimRefs:
              - CV002
              - CV008
              - CV009
              - CV010
              - CV012
              - CV013
              - CV022
              - CV031
          - type: table
            tableRef: TV004
            claimRefs:
              - CV002
              - CV008
              - CV009
              - CV010
              - CV019
      - number: '8.3'
        title: Scenario Analysis and Return Math
        blocks:
          - type: paragraph
            body: >
              The probability-weighted expected return for a Series F entry at $4B is approximately 1.7x gross,
              calculated by weighting bull (25% × 3.0x), base (50% × 1.5x), and bear (25% × 0.7x) scenarios. The bull
              case (25% probability) assumes Sword Health achieves $600M ARR by 2027 through MSK acceleration plus
              successful BLOOM and MIND commercial adoption, IPOs at 20x ARR = $12B — a 3.0x return from $4B. This
              requires sustaining 55%+ ARR CAGR for two years and demonstrating that BLOOM/MIND can expand the TAM
              thesis from $100B MSK to a $300B+ platform. The base case (50% probability) assumes $400M ARR by 2028,
              sustained 40% YoY growth, IPO at 15x ARR = $6B — a 1.5x return, assuming no material thesis-break events
              and manageable Hinge Health competition. The bear case (25% probability) assumes growth decelerates below
              25% YoY as Hinge Health's post-IPO capital wins dominant enterprise market share, digital health multiples
              compress to 8-10x, and IPO is delayed to 2030+ at $2.7B — a 0.7x below-par outcome. The critical
              distinction between base and bear is whether Hinge Health's post-IPO advantages translate into material
              revenue displacement at Sword Health, or whether the MSK market is large enough to sustain dual market
              leaders. Stat News and Modern Healthcare have both highlighted the risk that self-reported clinical
              outcome metrics will face increasing employer scrutiny as Hinge Health's actuarially-validated IPO
              disclosures set a new evidence quality standard for the sector — potentially compressing Sword Health's
              renewal rates if it cannot match that validation level before 2026-2027 employer contract renewal cycles.
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV016
              - CV017
              - CV027
              - CV028
              - CV040
