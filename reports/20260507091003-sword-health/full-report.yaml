  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and B2B2C Model
        blocks:
          - type: paragraph
            body: >
              Sword Health serves 2,500+ self-insured employer clients and 17+ Blue Cross Blue Shield health plan
              affiliates, covering 400,000+ enrolled members as of mid-2025. The company's B2B2C model positions
              employers as the payer and procurement decision-maker, while individual employees are the end users of the
              virtual MSK treatment platform. Employers fund access through their annual health benefits budget,
              typically managed by HR/total rewards and benefits administration teams. Members access the platform at no
              out-of-pocket cost via their employer benefits portal, eliminating the principal barrier to consumer
              health technology adoption. This model is structurally aligned with the US self-insured employer system,
              where approximately 65% of covered workers are on self-insured plans — making the US the primary target
              market. Geographic concentration is a risk: the US employer health benefit structure is unique, and Sword
              Health's international presence (UK expansion underway) has not yet scaled to material revenue
              contribution.
