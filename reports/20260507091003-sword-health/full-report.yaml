companyProfile:
  summary: >
    Sword Health is the leading AI-first virtual physical therapy platform, serving self-insured employers and health
    plans with FDA-cleared AI-guided MSK care at scale. The company's clinical proof set — 74% pain reduction, 85%
    member satisfaction, 3.7:1 ROI, $1B+ cumulative savings — across named Fortune 500 employers provides strong
    commercial credibility. The Phoenix AI platform (Qualcomm chip-based motion sensor + AI coaching) received FDA
    510(k) clearance and is the core clinical product, differentiated by AI adaptability, autonomous session delivery,
    and longitudinal member data (400K+ enrolled). BLOOM (pelvic health for women) and MIND (mental health-pain
    comorbidity) are expanding the platform beyond MSK into adjacent $200B+ markets. Sword Health reached cash-flow
    positive operations in mid-2025, reducing capital urgency and validating unit economics ahead of the planned 2028
    IPO. Key risks include Hinge Health's post-IPO competitive advantages, the absence of independent actuarial outcome
    validation, digital health multiple compression precedent, and the hardware-dependent gross margin structure.
  foundedDate: '2015-01-01'
  founders:
    - name: Virgílio Bento
      role: CEO and Co-Founder
      background: >
        PhD Electrical Engineering, University of Porto; personal motivation from brother's MSK injury. Modern
        Healthcare Top 100 Most Influential People (2024). Sole public face of Sword Health; drives all strategic
        communications, investor relations, and clinical vision. Key-person risk: no public succession plan disclosed.
      claimRefs: []
    - name: Márcio Colunas
      role: Co-Founder and Chief Science Officer
      background: >
        Co-developed the original wearable sensor platform with Bento. Leads R&D in Porto engineering center (75+ PhDs
        and ML engineers). Academic background in signal processing and biomechanics.
      claimRefs: []
  foundingLocation: Porto, Portugal
  headquarters: New York, NY, USA
  productSummary: >
    Phoenix AI: FDA 510(k)-cleared AI PT platform; Qualcomm Snapdragon motion sensor hardware + mobile app; 30+ AI
    models for real-time exercise form correction, session adaptation, and pain tracking. Autonomous PT sessions without
    licensed PT for each session. BLOOM: pelvic health program for women's MSK conditions; expanding into
    prenatal/postnatal care. MIND: integrated mental health and pain comorbidity program combining CBT, mindfulness, and
    AI coaching. Predict: employer analytics platform for outcomes forecasting, utilization, and ROI reporting.
    Distribution: direct employer sales (2,500+ clients) plus health plan partnerships (17+ BCBS plans).
  customerFocus: >
    Two primary channels: (1) Self-insured employers — 2,500+ enterprise clients including Walmart, Target, Boeing,
    Delta Air Lines, Delta Faucet; benefits managers and CFOs as economic buyers; annual contracts. (2) Health plans —
    17+ Blue Cross Blue Shield plans; population health management and employer benefits partners. 400K+ enrolled
    members generating longitudinal clinical data for AI model improvement.
  businessModel: >
    Per-member-per-month (PMPM) pricing to employers and health plans, with outcome- based components in some contracts.
    Hardware (motion sensor kits) included in program fee or subsidized. Reported 70%+ net revenue retention on employer
    accounts. Cash-flow positive since mid-2025. IPO target 2028 at $500M+ ARR after 2-3 years demonstrated profitable
    growth.
  stage: Late-stage private; cash-flow positive; pre-IPO 2028 target
  fundingStatus: >
    Total raised $500M+ across 6 rounds. Series A (2019, Khosla Ventures), Series B (2021), Series C, Series D, Series
    E, Series F ($40M, June 2025 at $4B post-money). Investors: General Catalyst, Khosla Ventures, Transformation
    Capital, IVP, Comcast Ventures, Founders Fund. Small Series F size ($40M) vs. large valuation ($4B) reflects strong
    unit economics — company did not need a large primary raise.
