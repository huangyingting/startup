      - number: '4.3'
        title: Unit Economics and Capital Efficiency
        blocks:
          - type: paragraph
            body: >-
              Sword Health has not disclosed gross margin, EBITDA, customer acquisition cost, lifetime value, or net
              revenue retention. For reference, digital health physical therapy platforms comparable to Sword typically
              achieve 60–75% gross margin, which is lower than pure-software SaaS due to clinical oversight costs,
              sensor hardware, and care management labor. Sword's AI-first delivery model — the Phoenix wearable sensor
              combined with AI physical therapy sessions and human PT oversight at the population level rather than per
              session — is explicitly designed to reduce marginal cost of care delivery relative to human-intensive
              competitors such as Hinge Health. The Phoenix platform has processed more than 10 million AI sessions,
              which management presents as evidence of operational leverage in delivery cost.

              The October 2024 workforce reduction of approximately 17% (roughly 170 employees) brought headcount from
              approximately 1,200 to 1,000 and was described by management as a restructuring toward AI-driven
              efficiency rather than a financial distress signal, though no financial detail was provided to
              substantiate that framing. Management's claim of cash-flow positive status since 2024 is consistent with
              the absence of a new primary financing round between the June 2024 Series E and June 2025 Series F, but
              the $40M Series F was small enough relative to the existing capital base that it may have been defensive
              financing rather than growth capital. Net revenue retention is estimated likely above 100% for enterprise
              accounts given the program expansion model, but no disclosed NRR data exists. Customer acquisition cost is
              unknown. The Kaia acquisition's $285M price, paid from the balance sheet and possibly supplemented by
              financing, suggests Sword had meaningful cash reserves prior to the deal and limited near-term liquidity
              pressure.
