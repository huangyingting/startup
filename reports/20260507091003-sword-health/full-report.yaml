      - number: '1.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Cash-Flow Positivity at $4B Valuation Is Rare in Digital Health
            body: >
              Sword Health claims cash-flow positivity alongside $240M ARR — a rare combination for a private digital
              health company at this scale. This financial posture supports the deferred IPO strategy, reduces dilution
              pressure, and provides leverage for the capital-intensive Kaia acquisition ($285M). If verified through
              audit, this would substantially de-risk the investment thesis relative to peers.
            calloutType: strength
            claimRefs:
