            body: >
              Sword Health's IPO deferral to 2028+ creates financial risk: the investor return math requires substantial
              ARR growth from $240M to $500-800M with valuation expansion to justify the $4B Series F entry price.
              Digital health funding markets tightened 25% in H1 2025, and precedent market corrections (Teladoc,
              Alignment Healthcare) demonstrate that digital health valuations can compress dramatically. The GLP-1
              market disruption scenario is a medium-term tail risk: GLP-1 drugs are demonstrably reducing
              obesity-related joint pain, and if 15-20% of the obese US population achieves significant weight loss by
              2030, obesity-related MSK condition incidence could decline meaningfully. Sword Health's mitigation is to
              expand into acute injury, post-surgical rehab, and non-obesity MSK conditions — but this requires clinical
              scope expansion that carries its own regulatory and product development risk. Employer benefit cost
              pressure in an economic downturn is the most proximate financial risk: digital health benefits are among
              the first supplemental benefits reduced in a recession cycle, directly impacting ARR retention without
              churn visibility until annual renewal cycles.
