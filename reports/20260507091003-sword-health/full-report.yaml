  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Positioning
        blocks:
          - type: paragraph
            body: >-
              Sword Health's product portfolio spans eight distinct product lines built around a shared AI clinical
              infrastructure, targeting musculoskeletal health, pelvic health, mental health, prevention, and global
              access. The flagship product, Thrive, addresses chronic MSK pain, acute injury, and surgery recovery — the
              highest-volume cost driver in employer health benefits. Bloom serves pelvic floor dysfunction, postpartum
              recovery, prenatal care, and — since March 2026 — menopause care, extending the women's health addressable
              market. Move is positioned as a preventive MSK wellness product for active employees to avoid injury
              before clinical intervention becomes necessary.

              The June 2025 launch of Mind expanded Sword into behavioral health, offering CBT-based coaching and
              licensed clinician support through the Arbor LLM framework with MindGuard clinical safety filters. Mind
              competes directly with Spring Health and Lyra Health in the employer mental health benefits market.
              Predict provides AI-driven surgery risk stratification, allowing employers and payers to divert members
              from elective MSK surgery toward conservative care. Atlas is Sword's direct-to-consumer and international
              channel operating in 150+ countries. On-Call provides 24/7 acute injury triage for employer populations.
              Academy offers physical therapist training and certification, though it is the subject of an ongoing
              equity lawsuit from accelerator firm A2 Academy (filed July 2024).

              Underpinning all programs is the Phoenix wearable sensor — an IMU-based device launched June 2024 that
              tracks motion, range of motion, and exercise quality in real time via Bluetooth and a companion mobile
              app. The Arbor LLM framework orchestrates multi-agent conversational AI across all product lines and
              surpassed the 10 million AI sessions milestone in February 2026. The January 2026 acquisition of Kaia
              Health added computer-vision exercise guidance (camera-based, no wearable required), Germany's DiGA
              reimbursement certification, and CE Mark coverage for European markets.
