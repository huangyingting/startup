              Sword Health's net revenue retention is not publicly disclosed, but the trajectory of $100M ARR in
              mid-2023 to $240M ARR in mid-2025 implies a blended growth rate that combines new logo acquisition, member
              enrollment expansion within existing accounts, and cross-sell of add-on programs (BLOOM, MIND, Predict).
