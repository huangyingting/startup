      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Vast Underlying MSK Burden Provides Durable Demand
            body: >
              U.S. MSK healthcare spending alone exceeds $380 billion annually — the single largest disease category by
              spend. Digital solutions have penetrated less than 1% of this total. Sword's $240M ARR, while impressive
              for a private company, represents <0.1% of the analog MSK cost pool, illustrating the scale of demand
              available even if market share gains are modest.
            calloutType: strength
            claimRefs:
              - CM009
              - CM010
              - CM011
          - type: callout
            title: Utilization Rates Remain the Market's Achilles Heel
            body: >
              Digital MSK programs industry-wide typically achieve only 10–30% enrollment among eligible employees. Low
              utilization directly caps employer ROI claims, weakens retention logic, and creates a persistent
              commercial objection at procurement. If Sword cannot demonstrate materially higher engagement rates than
              the sector average, its Outcome Pricing model's economic claims face credibility challenges.
            calloutType: risk
            claimRefs:
              - CM023
              - CM022
          - type: callout
            title: Germany DiGA Is a Structurally Different and Underappreciated Channel
            body: >
              Kaia Health's DiGA certification provides Sword access to a government-mandated reimbursement pathway
              covering 70M+ insured Germans — without a traditional enterprise sales cycle. Unlike the U.S. model (which
              requires annual broker-led benefits decisions), the German model allows physician-prescribed digital
              health tools to be reimbursed automatically. This represents a meaningfully different revenue model with
              lower sales cost, potentially higher retention, and a replicable template for other European markets.
            calloutType: insight
            claimRefs:
              - CM017
              - CM018
          - type: callout
            title: Independent Evidence Gap Limits Premium Pricing Power
            body: >
              Sword cites 43 peer-reviewed clinical studies, but a significant portion are vendor-sponsored. Large
              self-insured employers increasingly require independent actuarial evidence of claims reduction. Without
              large-scale, independent RCT evidence, Sword competes partially on price and relationships rather than
              purely on differentiated outcomes — limiting its ability to sustain premium pricing versus Hinge Health
              and emerging competitors.
            calloutType: risk
            claimRefs:
              - CM022
              - CM025
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Sword Health operates in a competitive market spanning five competitor classes: direct digital MSK peers,
              incumbent physical therapy chains, adjacent digital health platforms, substitutes (in-person PT, primary
              care, pain management), and the status quo (employees bearing pain and reduced productivity). The direct
              digital MSK segment is dominated by Hinge Health and Sword Health, with Omada Health and smaller entrants
              such as RecoveryOne and Reflexion Health occupying lower tiers. Incumbent PT chains — ATI Physical Therapy
              (NYSE: ATIP), Select Medical/Select PT, and regional provider networks — represent the traditional
              substitute and an indirect competitive threat as they develop telehealth offerings. Adjacent competitors
              include Teladoc Health/Livongo (chronic condition management), Spring Health, and Lyra Health (both
              competing for the mental health component of Sword's expanding Mind platform). The status quo — an
              employee enduring chronic back or joint pain without intervention — remains the most common effective
              competitor by volume, as employer digital MSK program utilization rates typically run 5–30% of enrolled
              populations.

              In the employer benefits channel, the buying decision is typically made during the annual benefits renewal
              cycle (September–December). Sword and Hinge both target self-insured employers with 5,000+ employees,
              creating significant head-to-head competition in enterprise sales and broker/consultant channels. Key
              differentiators evaluated by benefits buyers include clinical outcomes data (randomized controlled trials,
              peer-reviewed studies), pricing model transparency, member engagement and utilization rates, integration
              with health plan partners (Aetna, Blue Cross, UnitedHealth), and administrative ease. Both Sword (43
              clinical studies, Outcome Pricing) and Hinge (large PT network, NYSE listing) have invested heavily in
              these proof points. Omada Health competes on chronic condition breadth (diabetes, hypertension, MSK)
              rather than MSK depth, sometimes packaged as a bundled solution by large health plans.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
      - number: '3.2'
        title: Direct Competitor Deep Dives
        blocks:
          - type: paragraph
            body: >
              Hinge Health is Sword Health's primary direct competitor. Founded in 2012 and headquartered in San
              Francisco, Hinge Health completed its IPO on NYSE (ticker: HNGE) in May 2025. In Q1 2025, Hinge reported
              revenue of $123.8 million, representing approximately $495 million annualized — nearly double Sword's $240
              million ARR. Q1 2025 was Hinge's first profitable quarter, with a reported profit of approximately $17
              million. Pre-IPO, Hinge carried a valuation of approximately $6.2 billion and had raised over $1 billion
              in venture funding. Hinge's clinical model is human-led: approximately 1,000 physical therapists and
              health coaches staff the platform alongside AI tools. Core products include Balance (wearable sensor),
              Guide (AI coaching), and Care (human PT sessions). Hinge is primarily US-focused, with limited
              international expansion compared to Sword's Atlas platform (150 countries) and Kaia's European DiGA
              footprint.

              Omada Health (founded 2011, San Francisco) offers digital chronic condition programs covering MSK, type 2
              diabetes prevention and management, hypertension, and behavioral health. Omada completed its IPO on NASDAQ
              (ticker: OMDA) in June 2025. Omada's revenue for fiscal 2024 was approximately $81 million per its S-1,
              with bundled chronic condition strategy. Omada competes with Sword in enterprise health plan and employer
              channels but leads with its diabetes program, making it a partial rather than primary threat in the core
              MSK segment.

              For Sword's Mind mental health platform (launched June 2025), key competitors are Spring Health (raised
              $500M+, valued at $3.3B in 2024) and Lyra Health (raised $900M+, valued at $5.1B in 2021). Both offer
              employer-facing mental health benefit programs with coach, therapist, and medication management services.
              Sword's differentiation in mental health is cross-platform integration: members already using Thrive MSK
              can access Mind within the same app, improving engagement. However, Mind is early-stage; Sword lacks the
              mental health clinical network depth of Spring Health or Lyra Health. ATI Physical Therapy, with ~900
              in-person clinics and ~$725M FY2023 revenue, represents the incumbent in-person substitute that digital
              MSK platforms must displace on economics and outcomes.
