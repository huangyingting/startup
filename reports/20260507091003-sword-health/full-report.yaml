  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Competitive Risk — Hinge Health and Market Consolidation
        blocks:
          - type: paragraph
            body: >
              Hinge Health's February 2025 US IPO at $6.4 billion valuation is the most significant near-term
              competitive threat to Sword Health. As a publicly-traded company, Hinge Health gains enterprise
              credibility benefits: SEC-audited financial disclosures, actuarially-validated outcome claims (per S-1),
              and public-market capital access for competitive pricing and M&A. Hinge Health's scale advantage is also
              material: the S-1 discloses 500+ enterprise employer clients, 4M+ enrolled members, and deeper clinical
              data for AI model training — creating a widening data flywheel advantage over Sword Health's 400K enrolled
              members. In concurrent enterprise RFPs, Sword Health now competes against a public-company peer with
              independently audited ROI claims, putting pressure on Sword Health to invest in actuarial validation of
              its own outcome metrics. Separately, the 2025 employer digital health vendor rationalization trend (WTW:
              40% of large employers reduced vendor count) creates displacement risk where employers opt for platform
              solutions (Teladoc, Accolade) that bundle MSK with broader mental health and chronic condition management,
              reducing standalone MSK vendor opportunities.
