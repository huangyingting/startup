      - number: '6.2'
        title: Named Customer Proof and Clinical Outcomes
        blocks:
          - type: paragraph
            body: >
              Sword Health's most credible customer evidence comes from anchor enterprise accounts with published case
              studies. The Walmart partnership — covering one of the largest self-insured workforces in the US — reports
              a 47% reduction in MSK-related surgical rates, the single most impactful clinical outcome metric in the
              digital MSK category. Delta Air Lines outcomes validate Sword Health's applicability to physically
              demanding, hourly-worker aviation and maintenance populations. The Boeing partnership extends this
              validation to aerospace manufacturing environments. The Target case study documents reductions in
              absenteeism and workers' compensation claims among retail associates. Across the full client base, Sword
              Health reports 74% average pain reduction, 85% member satisfaction, and a 3.7:1 employer ROI. However, the
              ROI methodology relies on internal program data and modeled cost-avoidance calculations; independent
              actuarial validation at scale has not been published. The peer-reviewed medical literature (American
              Journal of Preventive Medicine and comparable journals) does support the general finding that digital
              physical therapy achieves non-inferior outcomes to in-person PT for mild-to-moderate MSK conditions,
              providing partial scientific validation for the underlying model.
