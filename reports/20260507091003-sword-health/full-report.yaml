      - number: '7.2'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Sword Health's FDA regulatory posture involves ongoing compliance with the 510(k) predicate clearance for
              Phoenix AI as a Software as a Medical Device (SaMD). The FDA's 2025 AI/ML Software Guidance requires
              predetermined change control plans (PCCP) for material AI model updates, creating regulatory overhead that
              constrains the speed of AI model iteration. State physical therapy licensing creates a patchwork
              compliance requirement: Sword Health must maintain licensed PT coverage in the 30+ state Physical
              Therapist Licensure Compact states and separately manage non-compact states — any gap in licensed coverage
              creates a compliance exposure and potential care delivery interruption. Clinical AI liability is an
              emerging and unsettled legal frontier: the applicable standard of care for AI-generated physical therapy
              recommendations versus licensed PT recommendations has not been established in US courts, and a
              high-profile adverse patient outcome under Sword Health's AI PT could generate litigation, regulatory
              scrutiny, and insurance premium increases regardless of ultimate legal outcome. HIPAA data breach risk is
              elevated for employer-sponsored health data, and any breach involving member clinical data would trigger
              employer contract termination provisions and regulatory penalties.
