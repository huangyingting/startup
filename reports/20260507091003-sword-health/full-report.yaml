    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: |
              Sword Health was founded in 2015 in Porto, Portugal, by Virgílio Bento, a biomedical/electrical
              engineer whose personal motivation traces to his younger brother's severe rehabilitation challenges
              following a 1994 accident. Bento earned a PhD in Electrical Engineering, during which he and
              colleagues developed the early wearable sensor and AI platform that became Sword Health. The
              founding team also included Márcio Colunas (now CSO), Fernando Correia, and André Eiras Dos Santos.

              The company's stated mission is to "free the world from pain" — making clinical-grade virtual MSK
              treatment globally accessible without in-person visits. In practice, Sword combines proprietary
              wearable motion sensors, AI physical therapy software (the Phoenix AI care specialist), and licensed
              human clinicians to deliver guided, personalized rehabilitation remotely. The business model targets
              self-insured employers and health plans, charging on a per-member or outcomes-based basis under its
              "Outcome Pricing" model introduced in 2024.

              Sword Health Technologies, Inc. is incorporated in Delaware and registered as a foreign corporation
              in New York (registered April 24, 2019). The company's primary U.S. operational headquarters is
              New York City (offices at 150 W 43rd St and 511 W 25th Street). Additional offices are maintained
              in Porto, Portugal (R&D and engineering), and Dublin, Ireland. In 2025 Sword entered the UK market
              via the Surgery Hero acquisition. The company is still private as of the report date (May 2026),
              with an IPO deferred to at least 2028 per CEO statements. It describes itself as "the world's
              leading AI Health company" following its January 2026 acquisition of Kaia Health.
