      - number: '5.4'
        title: Trust, Quality, and Compliance Posture
        blocks:
          - type: paragraph
            body: >-
              Sword's trust posture is built on HIPAA compliance (BAA executed with all enterprise customers), SOC 2
              Type II certification for the US platform, and an expanding portfolio of 43 peer-reviewed clinical studies
              spanning Thrive, Bloom, and Move programs. The clinical advisory board includes academic medical center
              affiliations that lend credibility to published outcomes claims and support payer contracting.

              The Kaia Health acquisition materially upgraded European regulatory standing. Kaia's Back Pain app carries
              DiGA certification in Germany — one of fewer than 50 apps certified under the German Digital Health
              Application framework, enabling direct insurance reimbursement across the statutory health insurance
              system covering 70 million people. CE Mark coverage extends to broader EU markets. Surgery Hero's NHS
              registration in 18 UK Trusts adds a separate regulated-market pathway.

              The most significant compliance uncertainty is the US FDA classification of the Phoenix wearable and
              Arbor-powered AI clinical features. As of the report date, Sword has not publicly disclosed a 510(k)
              clearance or De Novo authorization for any product, suggesting the company has classified products under
              General Wellness guidance. If regulators reclassify any feature as SaMD — for example, Predict's surgery
              risk stratification or Arbor's clinical escalation triggering — Sword could face material pre-market
              submission, post-market surveillance, and labeling obligations. This remains an unresolved regulatory gap
              for US diligence.
