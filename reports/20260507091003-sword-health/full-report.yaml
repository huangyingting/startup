      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - ARR growth deceleration
        - Two consecutive quarters below 30% YoY
        - Undermines base case; reduces exit multiple; delays IPO
        - Reassess to watch/avoid; no new investment
      - - Hinge Health competitive displacement
        - 3+ named Fortune 500 wins from Sword Health in one quarter
        - Validates Hinge post-IPO dominance; weakens Sword enterprise positioning
        - Downgrade to avoid; raise bear case probability to 40%+
      - - FDA AI-PT reclassification
        - FDA requires prospective RCT evidence for AI PT SaMD re-clearance
        - Regulatory pathway blocked; material compliance cost; delays BLOOM/MIND
        - Hold; assess FDA timeline and cost before new investment
      - - Digital health multiple collapse
        - Public market AI-care ARR multiples fall below 8x
        - IPO window closes; base returns fall below 1x
        - Sell secondary if available; halt new investment
      - - Clinical audit failure
        - Independent actuarial review finds <2.5:1 ROI vs. claimed 3.7:1
        - Employer renewal risk elevated; premium valuation unjustified
        - Downgrade to research-more; demand full audit before investment
