        title: Exhibits
        blocks:
          - type: callout
            title: AI-First Moat and Outcome Pricing Differentiation
            body: >
              Sword Health's Phoenix AI wearable and AI physical therapist represent the most advanced AI-first clinical
              delivery model in the digital MSK segment. Combined with 43 clinical studies, 45+ patents, and a
              proprietary dataset of 10M+ AI sessions, Sword has built a clinical evidence portfolio that would take 3–7
              years for a new entrant to replicate. Outcome Pricing aligns Sword's commercial incentives with employer
              interests in a way that Hinge's PMPM model does not, and the Kaia Health acquisition provides a unique
              European regulatory moat via DiGA Germany certification covering 70M+ statutory health insurance lives.
            calloutType: strength
            claimRefs:
              - CP021
              - CP022
              - CP023
          - type: callout
            title: Hinge Health IPO Creates a Well-Capitalized, Credentialed Rival
            body: >
              Hinge Health's May 2025 NYSE IPO transforms the competitive landscape. Hinge now has public equity as
              acquisition currency, enhanced enterprise credibility, and first-mover public-company status that matters
              in risk-averse Fortune 500 benefits decisions. With ~$495M annualized revenue (approximately twice Sword's
              ARR), Hinge can outspend Sword in sales, marketing, and AI R&D. The October 2024 Sword workforce reduction
              may provide Hinge with a sales narrative advantage. If Hinge acquires an international MSK platform or a
              European DiGA-certified competitor, Sword's geographic moat could narrow materially.
            calloutType: risk
            claimRefs:
              - CP027
              - CP028
              - CP029
          - type: callout
            title: AI Commoditization and EHR Displacement Risk
            body: >
              As AI-based physical therapy becomes increasingly standardized, the risk of commoditization rises. Large
              health plans (UnitedHealth OptumHealth, CVS/Aetna) and EHR vendors (Epic, Oracle Health) have data assets,
              clinical relationships, and distribution power to embed digital MSK into standard care pathways at
              near-zero marginal cost. If this occurs, standalone digital MSK platforms — Sword and Hinge alike — could
              face pricing compression and channel disintermediation within 5–7 years. FDA SaMD regulatory scrutiny adds
              execution risk on top of the commoditization threat.
            calloutType: risk
            claimRefs:
              - CP030
              - CP031
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Architecture and ARR Trajectory
        blocks:
          - type: paragraph
            body: >-
              Sword Health is a private company and has not published audited financial statements. The primary ARR data
              point comes from CEO Virgílio Bento, who stated $240M ARR as of 2025. Management has also claimed
              cash-flow positive status since 2024, but this has not been independently verified. Media and analyst
              estimates reconstruct an ARR trajectory of roughly $100M in 2022, $160M in 2023, $200M in 2024, and $240M
              in 2025, implying a compound annual growth rate of approximately 34% over the three-year period. These
              figures are CEO-stated and press-reported only and carry meaningful uncertainty given the absence of
              audited disclosure.

              Revenue is predominantly B2B SaaS in structure: self-insured employer contracts account for the majority
              of revenue, with health plan partnerships, government payer contracts, and direct-to-consumer segments
              providing supplemental streams. The January 2026 Kaia Health acquisition at $285M adds an estimated $35M
              in additional ARR and expands Sword's addressable payer mix to include mental health and respiratory
              chronic-condition management. Post-acquisition, total ARR may exceed $275M if integration proceeds without
              material churn. The Surgery Hero acquisition in 2025 at an undisclosed price adds surgical navigation
              capabilities but its revenue contribution to consolidated ARR has not been disclosed. Revenue quality is
              difficult to assess from public information because customer-level cohort data, net revenue retention, and
              contract duration data are all private.
