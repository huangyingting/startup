      - number: '5.5'
        title: Product Roadmap and Development Stage
        blocks:
          - type: paragraph
            body: >-
              Sword's recent product releases show a rapid expansion cadence: the Phoenix wearable AI Care platform
              launched June 2024, Mind launched June 2025, Bloom expanded to full Women's Health Platform in March 2026,
              and the Kaia Health integration began following deal close in January 2026. Atlas has progressively
              expanded to 150 countries over 2023 to 2025. The 10 million AI session milestone reached February 2026
              demonstrates operating scale and platform throughput.

              Near-term product development signals cluster around three themes. First, deeper Kaia Health integration —
              consolidating Phoenix wearable and Kaia's camera-based exercise guidance into a unified clinical platform,
              and leveraging DiGA certification to pursue German statutory reimbursement at scale. Second, MindGuard
              enterprise hardening — clinical safety certifications for the Mind platform to support large-employer
              mental health benefit contracts. Third, Predict MSK expansion — extending surgery risk stratification from
              spine to knee and shoulder procedures, broadening the addressable surgical intervention market.

              Key technical risks include LLM hallucination in clinical safety contexts (Arbor and MindGuard operate in
              high-stakes environments where a single erroneous clinical response creates liability); wearable device
              quality and regulatory risk (device recalls or regulatory reclassification would disrupt the core Thrive
              workflow); and integration complexity between Phoenix (IMU wearable) and Kaia (camera-based vision)
              approaches, which use fundamentally different sensor modalities and will require significant engineering
              to merge into a seamless clinical experience. The October 2024 layoff of 17% of treatment-facing
              clinicians signaled an accelerated AI-for-clinician substitution strategy with attendant safety risks.
