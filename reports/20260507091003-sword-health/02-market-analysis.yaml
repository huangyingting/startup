callouts:
  - calloutType: strength
    title: Vast Underlying MSK Burden Provides Durable Demand
    body: >
      U.S. MSK healthcare spending alone exceeds $380 billion annually — the single largest disease category by spend.
      Digital solutions have penetrated less than 1% of this total. Sword's $240M ARR, while impressive for a private
      company, represents <0.1% of the analog MSK cost pool, illustrating the scale of demand available even if market
      share gains are modest.
    claimRefs:
      - CM009
      - CM010
      - CM011
  - calloutType: risk
    title: Utilization Rates Remain the Market's Achilles Heel
    body: >
      Digital MSK programs industry-wide typically achieve only 10–30% enrollment among eligible employees. Low
      utilization directly caps employer ROI claims, weakens retention logic, and creates a persistent commercial
      objection at procurement. If Sword cannot demonstrate materially higher engagement rates than the sector average,
      its Outcome Pricing model's economic claims face credibility challenges.
    claimRefs:
      - CM023
      - CM022
  - calloutType: insight
    title: Germany DiGA Is a Structurally Different and Underappreciated Channel
    body: >
      Kaia Health's DiGA certification provides Sword access to a government-mandated reimbursement pathway covering
      70M+ insured Germans — without a traditional enterprise sales cycle. Unlike the U.S. model (which requires annual
      broker-led benefits decisions), the German model allows physician-prescribed digital health tools to be reimbursed
      automatically. This represents a meaningfully different revenue model with lower sales cost, potentially higher
      retention, and a replicable template for other European markets.
    claimRefs:
      - CM017
      - CM018
  - calloutType: risk
    title: Independent Evidence Gap Limits Premium Pricing Power
    body: >
      Sword cites 43 peer-reviewed clinical studies, but a significant portion are vendor-sponsored. Large self-insured
      employers increasingly require independent actuarial evidence of claims reduction. Without large-scale,
      independent RCT evidence, Sword competes partially on price and relationships rather than purely on differentiated
      outcomes — limiting its ability to sustain premium pricing versus Hinge Health and emerging competitors.
    claimRefs:
      - CM022
      - CM025
