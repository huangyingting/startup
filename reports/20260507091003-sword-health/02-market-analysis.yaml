  - id: S2
    title: TAM, SAM, and Market Sizing
    body: |
      Multiple independent market research publishers have estimated the global digital MSK care market.
      Grand View Research sized the 2024 global market at $4.44 billion with a 17.7% CAGR to approximately
      $11.6 billion by 2030. Strategic Market Research estimated the 2024 market at $4.1 billion with a
      22.4% CAGR. Emergen Research and MediTech Insights produce compatible estimates in the $4.1–4.5B
      range. These estimates reflect software, platform, and wearable hardware revenue from digital MSK
      solutions, primarily in North America and Europe.

      A bottom-up SAM lens using the U.S. employer market: approximately 17,000 U.S. self-insured
      employers with 100+ employees represent the target addressable base for digital MSK platforms.
      With a large self-insured employer paying $5–15 PMPM for a digital MSK benefit covering ~40% of
      affected employees, the U.S. employer self-insured segment alone represents a multi-billion dollar
      SAM. Hinge Health's S-1 cited that MSK is the single largest cost driver for self-insured employers,
      representing approximately $693 in annual medical costs per employee. Sword's claimed SOM capture —
      1,000+ enterprise clients and $240M ARR — implies roughly 5–6% revenue share of the current global
      digital MSK market.

      The broader "analog" MSK market (total MSK healthcare spend) is orders of magnitude larger: AHRQ
      data estimated U.S. MSK direct healthcare spending at $380.9 billion in 2016, the single largest
      spending category. Adding lost productivity and indirect costs brings total U.S. MSK burden to
      an estimated $600 billion annually. This illustrates the potential TAM if digital MSK platforms
      captured a meaningful share of in-person care displacement — a multi-hundred-billion dollar
      opportunity that remains largely untapped.

      Importantly, contradictory estimates exist: some analyst reports (Research and Markets) size the
      global digital health MSK market higher, at $6–8B in 2023 with broader scope including wearables
      and orthopedic digital tools. Others (Technavio) focus on narrower sub-segments. Investors should
      triangulate across methodologies rather than rely on any single estimate.
