  - id: S3
    title: Buyer, User, and Payer Segmentation
    body: |
      Sword Health's commercial model addresses three primary buyer archetypes. The largest and most
      developed is the self-insured employer channel: large U.S. corporations (typically 1,000+
      employees) that bear their own employee health claims. HR benefits managers, Chief HR Officers,
      and Chief Medical Officers (in large companies) drive these purchasing decisions. The employer
      is the buyer, but the employee is the user. The payer is the employer's self-insured health
      fund. Adoption trigger: high MSK claims costs exceeding $10M+ annually, typically surfaced in
      annual benefits broker review or direct outreach by Sword's CCO-led enterprise sales team.

      The second channel is health plans / managed care organizations: commercial insurers and
      self-insured health plans (e.g., Aetna, UnitedHealth, Blue Cross Blue Shield plans) that
      purchase or white-label digital MSK tools to offer as a covered benefit to their employer
      clients or individual members. Health plan partnerships scale faster than direct employer
      sales but introduce intermediary margin pressure. Sword's Outcome Pricing model is particularly
      valuable here as it aligns incentives with actuarial risk reduction.

      The third and emerging channel is national health systems and government payers: the UK's NHS
      (Sword entered via Surgery Hero, now 18 NHS Trust partnerships) and Germany's DiGA reimbursement
      pathway (entered via Kaia Health acquisition, January 2026). Germany's DiGA pathway covers
      70M+ insured people and provides a regulatory-reimbursed channel absent in the U.S. This
      international government payer segment represents a structurally distinct growth vector with
      different pricing and evidence requirements (Germany requires certification as a Digitale
      Gesundheitsanwendung).

      A small direct-to-consumer segment exists through the Atlas platform (available in 150 countries)
      and On-Call 24/7 access, but this is not a primary revenue driver given the enterprise-first
      commercial model.
