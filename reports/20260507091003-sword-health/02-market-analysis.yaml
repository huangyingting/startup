  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Sword's actual program utilization / enrollment rates by product
      missingEvidence: >-
        Sword does not publicly disclose per-product enrollment rates, member engagement metrics, or dropout rates;
        industry averages (10-30%) may or may not apply to Sword's actual programs.
      whyItMatters: >-
        Utilization rates directly determine employer ROI claims validity and contract renewal rates — the foundation of
        Sword's commercial model.
      diligencePath: >-
        Request product-level engagement dashboards and cohort retention data directly from Sword Health during formal
        due diligence.
      relatedQuestionRefs:
        - QM009
    - type: unresolved-question
      severity: material
      topic: Independent actuary validation of employer claims cost reduction from Sword programs
      missingEvidence: >-
        Sword's clinical studies are primarily vendor-sponsored; no large-scale independent actuarial study validating
        claims reduction for Sword's specific programs across diverse employer populations is publicly documented.
      whyItMatters: >-
        Without independent evidence, premium pricing power is limited and contract renewals depend more on relationship
        and switching costs than hard ROI data.
      diligencePath: >-
        Request independent actuary reports from Sword's largest employer clients; review peer-reviewed publications for
        independence disclosures.
      relatedQuestionRefs:
        - QM017
    - type: enumeration-incomplete
      severity: minor
      topic: Sizing lens for digital pelvic/women's health and digital mental health TAMs
      missingEvidence: >-
        Published market sizing for the specific digital pelvic health and digital mental health sub-markets that Bloom
        and Mind target is limited; Bloom's women's health TAM and Mind's mental health TAM are not independently
        estimated in the sources reviewed.
      whyItMatters: >-
        Multi-vertical expansion market size is critical to assessing whether Sword's product roadmap materially expands
        total addressable opportunity.
      diligencePath: >-
        Obtain digital behavioral health and digital women's health market sizing from major analyst firms (Grand View
        Research, Frost & Sullivan); review company presentations for Sword's own market size claims.
      relatedQuestionRefs:
        - QM015
        - QM016
      relatedTableRefs:
        - TM002
    - type: enumeration-incomplete
      severity: minor
      topic: 'Segment / Buyer Map: PMPM pricing benchmarks and per-segment unit economics'
      missingEvidence: >-
        Typical PMPM pricing for digital MSK programs, health plan vs. employer pricing differentials, and Germany DiGA
        reimbursement rate for Kaia's products are not publicly documented.
      whyItMatters: >-
        Unit economics at the segment level inform whether Sword's revenue mix supports its Outcome Pricing model and
        margin expansion claims.
      diligencePath: >-
        Obtain digital MSK pricing benchmarks from benefits consultants (Mercer, Aon); request representative contract
        terms from Sword during diligence.
      relatedQuestionRefs:
        - QM023
      relatedTableRefs:
        - TM003
    - type: unresolved-question
      severity: minor
      topic: CMS/government payer expansion path for digital MSK reimbursement in the U.S.
      missingEvidence: >-
        Whether CMS will extend Medicare Advantage or traditional Medicare coverage to digital MSK programs is unclear;
        Sword has no disclosed government payer strategy for U.S. public payers.
      whyItMatters: >-
        Government payer coverage would dramatically expand Sword's SAM beyond self-insured employers to the 65M+
        Medicare population, but current model excludes this.
      diligencePath: Monitor CMS coverage determinations for digital health; review Sword's government affairs disclosures if any.
      relatedQuestionRefs:
        - QM026
