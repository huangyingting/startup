callouts:
  - calloutType: strength
    title: Anchor Enterprise Proof Drives Credible Pipeline
    body: >
      Sword Health's anchor client relationships with Walmart, Target, Boeing, and Delta Air Lines provide credible,
      brand-name social proof that is critical for winning Fortune 500 employer procurement evaluations. The 47%
      surgical reduction outcome at Walmart is the most impactful published metric in the digital MSK category, creating
      a reference anchor that competitors have not matched.
    claimRefs:
      - CU004
      - CU006
  - calloutType: risk
    title: Outcome Evidence Depends on Unaudited Self-Reported Data
    body: >
      All of Sword Health's key customer proof metrics (74% pain reduction, 3.7:1 ROI, $1B+ savings) are derived from
      proprietary program data and employer surveys rather than independently audited actuarial studies. As the market
      matures and employers become more sophisticated buyers, procurement teams increasingly require
      actuarially-validated ROI evidence — creating pressure on Sword Health to publish independent third-party
      validation to sustain renewal rates.
    claimRefs:
      - CU018
      - CU028
      - CU029
