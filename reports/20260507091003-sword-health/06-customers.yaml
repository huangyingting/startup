    - id: CU001
      statement: >
        Sword Health serves 2,500+ self-insured employer clients as of mid-2025, including Walmart, Target, Delta Air
        Lines, Boeing, and Delta Faucet, with 400,000+ enrolled members across these employers — making it one of the
        largest virtual MSK platforms by employer client count.
      type: company-claimed
      topic: Employer client count and size
      sourceRefs:
