  title: Customers
  summary: >
    Sword Health serves 2,500+ self-insured employer clients and 17+ Blue Cross Blue Shield health plans covering
    400,000+ enrolled members as of mid-2025. Anchor clients include Walmart, Target, Delta Air Lines, Boeing, and Delta
    Faucet. The company uses a B2B2C model where employers fund access as an employee health benefit; members use the
    virtual platform at no out-of-pocket cost. Clinical outcomes evidence — 74% pain reduction, 85% member satisfaction,
    3.7:1 employer ROI — drives renewals and expansion into add-on programs (BLOOM women's health, MIND mental health).
    Customer concentration is not publicly disclosed but employer self-insurance scale (Walmart 2.3M+ employees) implies
    material exposure to top accounts.
