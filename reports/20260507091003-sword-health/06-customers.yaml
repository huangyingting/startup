sections:
  - id: BU001
    type: body
    title: Customer Base and B2B2C Model
    body: >
      Sword Health serves 2,500+ self-insured employer clients and 17+ Blue Cross Blue Shield health plan affiliates,
      covering 400,000+ enrolled members as of mid-2025. The company's B2B2C model positions employers as the payer and
      procurement decision-maker, while individual employees are the end users of the virtual MSK treatment platform.
      Employers fund access through their annual health benefits budget, typically managed by HR/total rewards and
      benefits administration teams. Members access the platform at no out-of-pocket cost via their employer benefits
      portal, eliminating the principal barrier to consumer health technology adoption. This model is structurally
      aligned with the US self-insured employer system, where approximately 65% of covered workers are on self-insured
      plans — making the US the primary target market. Geographic concentration is a risk: the US employer health
      benefit structure is unique, and Sword Health's international presence (UK expansion underway) has not yet scaled
      to material revenue contribution.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU012
      - CU030
    tableRefs:
      - TU001
      - TU002
  - id: BU002
    type: body
    title: Named Customer Proof and Clinical Outcomes
    body: >
      Sword Health's most credible customer evidence comes from anchor enterprise accounts with published case studies.
      The Walmart partnership — covering one of the largest self-insured workforces in the US — reports a 47% reduction
      in MSK-related surgical rates, the single most impactful clinical outcome metric in the digital MSK category.
      Delta Air Lines outcomes validate Sword Health's applicability to physically demanding, hourly-worker aviation and
      maintenance populations. The Boeing partnership extends this validation to aerospace manufacturing environments.
      The Target case study documents reductions in absenteeism and workers' compensation claims among retail
      associates. Across the full client base, Sword Health reports 74% average pain reduction, 85% member satisfaction,
      and a 3.7:1 employer ROI. However, the ROI methodology relies on internal program data and modeled cost-avoidance
      calculations; independent actuarial validation at scale has not been published. The peer-reviewed medical
      literature (American Journal of Preventive Medicine and comparable journals) does support the general finding that
      digital physical therapy achieves non-inferior outcomes to in-person PT for mild-to-moderate MSK conditions,
      providing partial scientific validation for the underlying model.
    claimRefs:
      - CU004
      - CU005
      - CU007
      - CU014
      - CU006
      - CU018
      - CU029
      - CU034
    tableRefs:
      - TU003
    figureRefs:
      - FU003
  - id: BU003
    type: body
    title: Retention, Expansion, and Concentration Risk
    body: >
      Sword Health's net revenue retention is not publicly disclosed, but the trajectory of $100M ARR in mid-2023 to
      $240M ARR in mid-2025 implies a blended growth rate that combines new logo acquisition, member enrollment
      expansion within existing accounts, and cross-sell of add-on programs (BLOOM, MIND, Predict). The estimated NRR of
      110-120% reflects strong baseline expansion mechanics. BLOOM (women's pelvic health) and MIND (mental health/pain
      comorbidity) add-on programs enable employer account expansion without requiring new employer sales cycles — a
      capital-efficient revenue expansion lever. Customer concentration is a key unknown: the top 10 employers
      (including Walmart, Boeing, Delta) likely represent 20-35% of ARR given their disproportionate employee count and
      PMPM revenue potential. Employer contract length is typically annual, creating regular re-evaluation pressure from
      CFOs who benchmark program ROI annually. The 12-18 month employer sales cycle creates natural switching cost
      dynamics post-implementation, since ripping out an embedded benefits platform requires re-procurement, employee
      communication, and transition management that employers prefer to avoid when program outcomes are satisfactory.
    claimRefs:
      - CU011
      - CU017
      - CU022
      - CU027
      - CU008
      - CU009
      - CU031
    tableRefs:
      - TU005
    figureRefs:
      - FU004
  - id: BU004
    type: body
    title: Adoption Dynamics and Member Engagement
    body: >
      A central challenge for Sword Health and all digital MSK providers is conversion of eligible employees to active
      users. Employer contract value is driven by eligible headcount, but outcomes and ROI are driven by member
      activation and completion. Industry data suggests digital wellness program enrollment rates of 15-25% among
      eligible employees, meaning the majority of contracted employees never engage with the platform. Sword Health has
      not publicly disclosed its enrollment penetration or program completion rates. Member experience on Trustpilot and
      G2 skews positive (4+ star average) with praise for sensor-guided exercises and PT availability, but common
      complaints include sensor hardware calibration issues and desire for more live video sessions. Member dropout risk
      is real: if members disengage before achieving clinical outcomes, the employer's perceived program ROI declines at
      renewal time, increasing churn risk. The 37% of large US employers who had already adopted digital MSK programs by
      2025 (Willis Towers Watson) suggests rapid market adoption has moved Sword Health from pioneering category
      creation to competing for renewals and new logos against Hinge Health and others in an increasingly contested
      market.
    claimRefs:
      - CU010
      - CU013
      - CU015
      - CU016
      - CU019
      - CU028
      - CU032
    tableRefs:
      - TU004
    figureRefs:
      - FU001
      - FU002
