callouts:
  - calloutType: strength
    title: Cash-Flow Positivity at $4B Valuation Is Rare in Digital Health
    body: >
      Sword Health claims cash-flow positivity alongside $240M ARR — a rare combination for a
      private digital health company at this scale. This financial posture supports the deferred
      IPO strategy, reduces dilution pressure, and provides leverage for the capital-intensive
      Kaia acquisition ($285M). If verified through audit, this would substantially de-risk
      the investment thesis relative to peers.
    claimRefs: [CO024, CO025, CO026, CO032]

  - calloutType: risk
    title: Key-Person Concentration — Virgílio Bento
    body: >
      All material announcements, media appearances, and strategic pivots are channeled through
      founder-CEO Virgílio Bento. There is no disclosed succession plan, no public deputy CEO,
      and his departure could materially impair fundraising, enterprise partnerships, and
      clinician trust. This is amplified by the company's phase of multi-vertical expansion
      where vision coherence is critical.
    claimRefs: [CO009, CO010]

  - calloutType: risk
    title: A2 Academy Equity Lawsuit — Undisclosed Value Claim
    body: >
      A2 Academy filed suit in July 2024 asserting a 5% ownership stake in Sword Health based
      on a 2014-2015 accelerator agreement. At a $4B current valuation, a 5% claim represents
      ~$200M. The case outcome is unknown, and it is unclear whether this liability is accrued
      in any financial statements. This constitutes a material diligence item before any
      institutional transaction.
    claimRefs: [CO034, CO035]

  - calloutType: insight
    title: Multi-Vertical Expansion Creates Platform Optionality but Execution Stretch
    body: >
      Sword's simultaneous expansion into women's health (Bloom), mental health (Mind), and
      global geographies (Germany via Kaia, UK via Surgery Hero) creates multiple TAM vectors
      but also expands complexity. Integrating Kaia Health's technology stack and member base
      while launching Mind and scaling MSK is an ambitious operational agenda for a company
      of ~650-1,000 employees.
    claimRefs: [CO027, CO036, CO037, CO038]

