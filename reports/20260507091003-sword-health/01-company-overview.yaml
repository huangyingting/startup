company:
  name: Sword Health

chapter:
  number: 1
  title: Company Overview
  summary: |
    Sword Health is an AI-powered digital musculoskeletal (MSK) health company founded in 2015 in Porto,
    Portugal by Virgílio Bento (CEO) and co-founders Márcio Colunas, Fernando Correia, and André Eiras Dos
    Santos. The company's mission is to "free the world from pain" by delivering clinically-validated virtual
    physical therapy via wearable sensors, AI, and licensed clinicians — eliminating barriers of cost,
    geography, and access. Sword entered the U.S. market in 2020 and has since grown to serve 1,000+
    enterprise clients across employers and health plans. Its legal entity, Sword Health Technologies, Inc.,
    is incorporated in Delaware and headquartered in New York City. As of the report date, Sword has raised
    more than $500 million in total funding, achieved a $4 billion valuation (June 2025), reports $240M ARR,
    is cash-flow positive, and has deferred an IPO to at least 2028. In January 2026, Sword acquired Kaia
    Health for $285 million, its largest acquisition to date, adding a German market foothold. Products span
    MSK (Thrive), pelvic/women's health (Bloom), injury prevention (Move), mental health (Mind), and
    AI-first care (Phoenix).

sections:
  - id: S1
    title: Company Identity and Mission
    body: |
      Sword Health was founded in 2015 in Porto, Portugal, by Virgílio Bento, a biomedical/electrical
      engineer whose personal motivation traces to his younger brother's severe rehabilitation challenges
      following a 1994 accident. Bento earned a PhD in Electrical Engineering, during which he and
      colleagues developed the early wearable sensor and AI platform that became Sword Health. The
      founding team also included Márcio Colunas (now CSO), Fernando Correia, and André Eiras Dos Santos.

      The company's stated mission is to "free the world from pain" — making clinical-grade virtual MSK
      treatment globally accessible without in-person visits. In practice, Sword combines proprietary
      wearable motion sensors, AI physical therapy software (the Phoenix AI care specialist), and licensed
      human clinicians to deliver guided, personalized rehabilitation remotely. The business model targets
      self-insured employers and health plans, charging on a per-member or outcomes-based basis under its
      "Outcome Pricing" model introduced in 2024.

      Sword Health Technologies, Inc. is incorporated in Delaware and registered as a foreign corporation
      in New York (registered April 24, 2019). The company's primary U.S. operational headquarters is
      New York City (offices at 150 W 43rd St and 511 W 25th Street). Additional offices are maintained
      in Porto, Portugal (R&D and engineering), and Dublin, Ireland. In 2025 Sword entered the UK market
      via the Surgery Hero acquisition. The company is still private as of the report date (May 2026),
      with an IPO deferred to at least 2028 per CEO statements. It describes itself as "the world's
      leading AI Health company" following its January 2026 acquisition of Kaia Health.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008]

  - id: S2
    title: Founders, Leadership, and Governance
    body: |
      Virgílio Bento (CEO and Chairman) is the dominant strategic voice at Sword Health, widely recognized
      as the sole Portuguese national on Modern Healthcare's 2024 list of the 100 most influential
      people in global healthcare. Bento holds a PhD in Electrical Engineering and is the public face
      of all major product and financing announcements. His personal story — a brother's accident — is
      the founding narrative used in media coverage and investor pitches, creating strong brand identity
      but also key-person concentration risk.

      Valentina Longo joined as CFO in 2022, bringing prior experience from Cerberus Capital Management
      and J.P. Morgan Chase, signaling preparation for institutional capital markets and potential IPO
      readiness. Jorge Meireles serves as CTO. Vijay Yanamadala is the Chief Medical Officer, providing
      clinical credibility for FDA interactions and employer contracting. Beth Stevens is Chief Legal
      Officer. Márcio Colunas, a co-founder, serves as Chief Strategy Officer. Kyle Spackman leads
      commercial operations (CCO), and Michael Krueger leads marketing.

      The board of directors includes Virgílio Bento (founder/CEO), Bruce Armstrong (Operating Partner,
      Khosla Ventures), Karin Ajmani (former President & CSO at Progyny), and Chris Bischoff (Managing
      Director, General Catalyst), who publicly cited board membership in the June 2025 funding
      announcement. Cathy Gao of Sapphire Ventures and Scott Rotermund are listed in CB Insights
      people data. The full board composition and committee structure are not publicly disclosed in
      detail; this constitutes a diligence gap.

      Leadership depth beyond the C-suite includes Marta Cardeano (SVP, AI Care Delivery Solutions),
      Neil Sharma (EVP, Partnerships), Natasha Prasad (Chief Experience Officer), and Pavle Stojkovic
      (Chief People Officer). The company underwent a 17% workforce reduction in October 2024,
      disproportionately affecting treatment-facing clinicians as Sword shifted to greater AI-led
      care delivery — underscoring the company's transition from headcount-intensive care to scalable
      AI models and compressing the clinician-to-member ratio.
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO016, CO017, CO018]

  - id: S3
    title: Funding History and Capital Structure
    body: |
      Sword Health has completed multiple funding rounds since its 2018 seed raise, accumulating more
      than $500 million in total capital as of the January 2026 Kaia Health acquisition announcement.
      Early rounds were led by Khosla Ventures (Series A, 2019), which has participated in every major
      round. General Catalyst emerged as lead investor in the Series D (December 2021) and has led
      the two most recent rounds (Series E, June 2024; Series F, June 2025).

      Milestones: Seed $4.6M (2018) → Series A $8M at undisclosed valuation (2019, Khosla Ventures)
      → Series B $25M (2020) → Series C $85M at $1.8B valuation (June 2021) → Series D $163M at $2B
      valuation (December 2021, General Catalyst, BOND, Khosla) → Series E $130M at $3B valuation
      (June 2024) → Series F $40M at $4B valuation (June 2025, General Catalyst lead; Khosla Ventures,
      Comcast Ventures, Lince Capital, Oxy Capital, Armilar, Indico Capital, Shilling participating).
      Total equity raised exceeds $500M (including primary + secondary proceeds from Series E).

      The June 2025 Series F was notable for being a relatively small primary raise ($40M) paired with
      the launch of the Mind mental health platform, suggesting the company is not capital-constrained
      but sought a valuation step-up and strategic partner alignment. CEO Bento has stated the company
      is cash-flow positive and that an IPO is deferred to at least 2028. The company's Series E press
      release described the $130M as a mix of primary and secondary proceeds, indicating some insider
      liquidity. Transformation Capital, Founders Fund, and Comcast Ventures are also listed as
      investors in company materials.
    claimRefs: [CO019, CO020, CO021, CO022, CO023, CO024, CO025, CO026]

  - id: S4
    title: Scale, Products, and Milestones
    body: |
      Sword Health's product portfolio has expanded from a single MSK program to a multi-vertical AI
      Care platform. Core offerings include: Thrive (chronic MSK pain and physical therapy), Bloom
      (pelvic and women's health, launched March 2022, expanded to full Women's Health Platform March
      2026 including menopause), Move (injury prevention and movement health), Predict (AI-based MSK
      surgery risk assessment, launched May 2023), Atlas (global pain management platform across 150
      countries, launched late 2023), On-Call (24/7 clinical specialist access), Academy (digital pain
      education), Phoenix (conversational AI care specialist, launched June 2024), and Mind (mental
      health platform with M-band wearable, launched June 2025).

      As of January 2026, Sword reports 700,000+ members across three continents have completed more
      than 10 million AI sessions; the 10 million milestone was celebrated in February 2026. The company
      claims 1,000+ enterprise clients, $1 billion in unnecessary healthcare costs avoided, and clinical
      validation from 43 peer-reviewed studies and 45+ patents. The company achieved $240M ARR and
      cash-flow positivity, with CEO Bento stating the IPO is deferred to at least 2028.

      Major acquisitions: Surgery Hero (UK prehabilitation startup, 2025, integrating with 18 NHS
      Trusts) and Kaia Health (digital MSK and pulmonary platform, $285M, January 28, 2026). The
      Kaia deal expanded Sword's U.S. member base and opened Germany's digital health reimbursement
      pathway (covering 70M+ people). An adverse event: in October 2024 Sword cut 17% of its
      workforce (treatment-facing clinicians). In July 2024, accelerator firm A2 Academy filed a
      lawsuit asserting it was owed a 5% equity stake from a 2014–2015 accelerator agreement with
      Sword.
    claimRefs: [CO027, CO028, CO029, CO030, CO031, CO032, CO033, CO034, CO035, CO036, CO037, CO038]

