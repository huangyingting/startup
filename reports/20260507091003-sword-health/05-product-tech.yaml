company:
  name: Sword Health

chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Sword Health operates an eight-product AI-powered musculoskeletal and behavioral health platform anchored by
    the Thrive MSK rehabilitation program, the Phoenix wearable sensor (launched June 2024), and the Arbor
    proprietary LLM orchestration framework. Core clinical differentiation comes from replacing synchronous
    in-person physical therapy with autonomous AI-guided exercise sessions augmented by asynchronous licensed
    PT oversight, validated across 43 peer-reviewed studies. The June 2025 launch of Mind (behavioral health)
    and the January 2026 acquisition of Kaia Health (German DiGA certification, computer-vision exercise
    guidance) extended the platform into mental health and European regulated markets. Key open questions
    include FDA regulatory classification of the Phoenix wearable and AI clinical features, Kaia integration
    depth, and LLM safety in clinical contexts.

sections:
  - id: SE-S1
    title: Product Portfolio and Positioning
    body: >-
      Sword Health's product portfolio spans eight distinct product lines built around a shared AI clinical
      infrastructure, targeting musculoskeletal health, pelvic health, mental health, prevention, and global
      access. The flagship product, Thrive, addresses chronic MSK pain, acute injury, and surgery recovery —
      the highest-volume cost driver in employer health benefits. Bloom serves pelvic floor dysfunction,
      postpartum recovery, prenatal care, and — since March 2026 — menopause care, extending the women's
      health addressable market. Move is positioned as a preventive MSK wellness product for active employees
      to avoid injury before clinical intervention becomes necessary.

      The June 2025 launch of Mind expanded Sword into behavioral health, offering CBT-based coaching and
      licensed clinician support through the Arbor LLM framework with MindGuard clinical safety filters. Mind
      competes directly with Spring Health and Lyra Health in the employer mental health benefits market.
      Predict provides AI-driven surgery risk stratification, allowing employers and payers to divert members
      from elective MSK surgery toward conservative care. Atlas is Sword's direct-to-consumer and international
      channel operating in 150+ countries. On-Call provides 24/7 acute injury triage for employer populations.
      Academy offers physical therapist training and certification, though it is the subject of an ongoing
      equity lawsuit from accelerator firm A2 Academy (filed July 2024).

      Underpinning all programs is the Phoenix wearable sensor — an IMU-based device launched June 2024 that
      tracks motion, range of motion, and exercise quality in real time via Bluetooth and a companion mobile
      app. The Arbor LLM framework orchestrates multi-agent conversational AI across all product lines and
      surpassed the 10 million AI sessions milestone in February 2026. The January 2026 acquisition of Kaia
      Health added computer-vision exercise guidance (camera-based, no wearable required), Germany's DiGA
      reimbursement certification, and CE Mark coverage for European markets.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008, CE009, CE010]

  - id: SE-S2
    title: Care Delivery Workflow and Clinical Integration
    body: >-
      Sword's care delivery model replaces the traditional synchronous in-person physical therapy episode with
      a structured AI-augmented digital pathway. The patient journey begins with employer or health plan
      enrollment, followed by an AI-administered musculoskeletal assessment that produces a personalized
      8-to-12-week exercise program. Members complete daily AI-guided exercise sessions using the Phoenix
      wearable, which feeds real-time motion data to Sword's AI engine for form correction, rep counting, and
      progression adjustment. Licensed physical therapists review session data asynchronously — typically
      weekly — and intervene when the AI flags pain escalation, form breakdown, or clinical risk signals. The
      pathway closes with outcomes measurement: pain reduction scores, functional assessments, and surgery
      avoidance confirmation.

      Sword publishes 43 peer-reviewed clinical studies supporting this model, including reported average 73%
      pain reduction across enrolled populations and surgery avoidance rates cited in employer contracts. The
      Surgery Hero acquisition integrated a perioperative prehabilitation pathway operating within 18 UK NHS
      Trusts, extending clinical integration beyond the employer channel. The Predict module feeds into the
      same pathway as a clinical decision support layer, stratifying members into conservative-care vs.
      surgery-appropriate cohorts before enrollment.

      Clinical escalation runs from AI-detected risk signals to asynchronous PT review to on-call clinician
      intervention when acute risk is confirmed. The Mind platform mirrors this structure with MindGuard
      providing real-time safety filtering for mental health interactions, with escalation protocols for
      suicidality or crisis indicators. This shared escalation architecture is a key regulatory and
      liability-management design choice across both the MSK and behavioral health product lines.
    claimRefs: [CE011, CE012, CE013, CE014, CE015, CE016, CE017, CE018]

  - id: SE-S3
    title: Technology Architecture and AI Stack
    body: >-
      Sword's technology stack is organized around three layers of proprietary infrastructure: the Phoenix
      wearable IoT device, the Arbor LLM orchestration framework, and a multimodal data pipeline integrating
      wearable sensor data, patient-reported outcomes, and claims data.

      The Phoenix wearable uses inertial measurement unit (IMU) sensors to capture full three-dimensional
      joint motion at clinical precision, transmitting data via Bluetooth to the companion iOS/Android app.
      The Kaia Health platform provides a complementary computer-vision approach — using a standard smartphone
      camera and pose estimation algorithms to guide exercise without a wearable device, relevant for global
      markets and accessibility use cases. These two different sensor modalities represent a major integration
      challenge following the January 2026 acquisition.

      The Arbor LLM framework is Sword's proprietary multi-agent orchestration stack, powering conversational
      AI therapy across Thrive, Bloom, Move, and Mind. Arbor coordinates specialized sub-agents for intake,
      exercise prescription, motivational support, clinical escalation flagging, and outcomes measurement.
      MindGuard is the safety sub-system within the Mind platform, implementing real-time filtering and
      clinical escalation rules for sensitive mental health interactions.

      Cloud infrastructure runs on AWS with HIPAA Business Associate Agreements in place. Sword reports 45+
      patents pending or granted covering AI therapy methods, wearable sensor designs, and clinical protocols.
      SOC 2 Type II certification covers the US-facing platform. FDA regulatory classification remains an open
      question: the Phoenix wearable and AI-guided therapy features could qualify as General Wellness devices
      or as Software as a Medical Device (SaMD) under 21 CFR Part 880, materially affecting labeling, clinical
      validation, and post-market surveillance obligations. Sword does not maintain a public GitHub
      organization and has not published developer-facing API documentation as of May 2026.
    claimRefs: [CE019, CE020, CE021, CE022, CE023, CE024, CE025, CE026, CE027, CE043, CE044]

  - id: SE-S4
    title: Trust, Quality, and Compliance Posture
    body: >-
      Sword's trust posture is built on HIPAA compliance (BAA executed with all enterprise customers), SOC 2
      Type II certification for the US platform, and an expanding portfolio of 43 peer-reviewed clinical
      studies spanning Thrive, Bloom, and Move programs. The clinical advisory board includes academic medical
      center affiliations that lend credibility to published outcomes claims and support payer contracting.

      The Kaia Health acquisition materially upgraded European regulatory standing. Kaia's Back Pain app
      carries DiGA certification in Germany — one of fewer than 50 apps certified under the German Digital
      Health Application framework, enabling direct insurance reimbursement across the statutory health
      insurance system covering 70 million people. CE Mark coverage extends to broader EU markets. Surgery
      Hero's NHS registration in 18 UK Trusts adds a separate regulated-market pathway.

      The most significant compliance uncertainty is the US FDA classification of the Phoenix wearable and
      Arbor-powered AI clinical features. As of the report date, Sword has not publicly disclosed a 510(k)
      clearance or De Novo authorization for any product, suggesting the company has classified products under
      General Wellness guidance. If regulators reclassify any feature as SaMD — for example, Predict's surgery
      risk stratification or Arbor's clinical escalation triggering — Sword could face material pre-market
      submission, post-market surveillance, and labeling obligations. This remains an unresolved regulatory gap
      for US diligence.
    claimRefs: [CE028, CE029, CE030, CE031, CE032, CE033, CE034, CE035]

  - id: SE-S5
    title: Product Roadmap and Development Stage
    body: >-
      Sword's recent product releases show a rapid expansion cadence: the Phoenix wearable AI Care platform
      launched June 2024, Mind launched June 2025, Bloom expanded to full Women's Health Platform in March
      2026, and the Kaia Health integration began following deal close in January 2026. Atlas has progressively
      expanded to 150 countries over 2023 to 2025. The 10 million AI session milestone reached February 2026
      demonstrates operating scale and platform throughput.

      Near-term product development signals cluster around three themes. First, deeper Kaia Health integration —
      consolidating Phoenix wearable and Kaia's camera-based exercise guidance into a unified clinical platform,
      and leveraging DiGA certification to pursue German statutory reimbursement at scale. Second, MindGuard
      enterprise hardening — clinical safety certifications for the Mind platform to support large-employer
      mental health benefit contracts. Third, Predict MSK expansion — extending surgery risk stratification
      from spine to knee and shoulder procedures, broadening the addressable surgical intervention market.

      Key technical risks include LLM hallucination in clinical safety contexts (Arbor and MindGuard operate in
      high-stakes environments where a single erroneous clinical response creates liability); wearable device
      quality and regulatory risk (device recalls or regulatory reclassification would disrupt the core Thrive
      workflow); and integration complexity between Phoenix (IMU wearable) and Kaia (camera-based vision)
      approaches, which use fundamentally different sensor modalities and will require significant engineering
      to merge into a seamless clinical experience. The October 2024 layoff of 17% of treatment-facing
      clinicians signaled an accelerated AI-for-clinician substitution strategy with attendant safety risks.
    claimRefs: [CE036, CE037, CE038, CE039, CE040, CE041, CE042]

