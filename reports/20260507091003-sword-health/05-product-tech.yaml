figures:
  - id: FE001
    title: Technology Stack Architecture
    type: stack
    layout: wide
    summary: >-
      Sword Health's technology stack is organized in five layers from member-facing hardware and apps at the
      top to integration and distribution infrastructure at the base. The Phoenix wearable sensor and mobile
      apps collect real-time motion and symptom data. The AI Care Engine processes that data via the Arbor LLM
      framework and computer-vision models. Clinical operations (async PT review, Predict, On-Call) overlay the
      AI layer. A multimodal data platform stores and analyzes outcomes. An integration layer connects Sword to
      employer HR systems, EHRs, and international regulatory frameworks including DiGA and NHS.
    data:
      layers:
        - label: "Member Interface Layer"
          detail: >-
            Phoenix wearable IMU sensor (Jun 2024); Kaia Health camera-based exercise app (EU); iOS/Android
            companion app; member web dashboard; M-band wearable (Mind platform). Member-facing touchpoints
            for daily exercise sessions, AI coaching interactions, symptom tracking, and progress visualization.
        - label: "AI Care Engine"
          detail: >-
            Arbor LLM framework: proprietary multi-agent orchestration for conversational AI therapy and
            coaching across Thrive, Bloom, Move, and Mind. Computer vision ML for exercise form analysis and
            rep counting. MindGuard clinical safety sub-system for behavioral health interactions. Predict ML
            risk stratification for surgery diversion. 10M+ AI sessions completed as of Feb 2026.
        - label: "Clinical Operations Layer"
          detail: >-
            Asynchronous licensed PT review queue with AI-generated session summaries and risk flags. Clinician
            portal for exercise prescription adjustment and member messaging. On-Call 24/7 acute injury triage
            staffed by licensed PTs. Surgery Hero perioperative pathway integrated with 18 NHS Trusts. Predict
            surgery risk scoring feeding into enrollment decisions.
        - label: "Data and Analytics Platform"
          detail: >-
            Multimodal data pipeline ingesting Phoenix wearable motion data, patient-reported outcomes (pain
            scales, function scores, PROMIS), and claims data. HIPAA-compliant data warehouse on AWS with BAA.
            Outcome analytics engine generating Outcome Pricing proof and clinical study datasets. 43
            peer-reviewed studies produced from this data asset.
        - label: "Integration and Distribution Layer"
          detail: >-
            HRIS integrations (Workday, ADP, SAP SuccessFactors) for employer enrollment. EHR connectors for
            clinical data exchange. Benefits platform APIs (Optum, Aetna, BCBS network). DiGA regulatory
            integration for Germany statutory health insurance via Kaia Health. NHS API integration via Surgery
            Hero across 18 UK Trusts. Atlas global distribution infrastructure covering 150+ countries.
    claimRefs: [CE009, CE010, CE019, CE020, CE021, CE022, CE023, CE025, CE026]

  - id: FE002
    title: Care Delivery Workflow
    type: flow
    layout: wide
    summary: >-
      Sword's care delivery workflow moves a member from employer enrollment through AI-driven initial
      assessment, personalized program generation, daily AI-guided wearable exercise sessions, weekly
      asynchronous PT clinical review, structured outcomes measurement, and optional graduation or ongoing
      maintenance. Clinical escalation exits the linear flow when AI flags risk signals for PT review and
      potential on-call intervention.
    data:
      nodes:
        - id: "enrollment"
          label: "Member Enrollment"
          detail: "Employer or health plan benefit activation; identity verification; eligibility confirmation; HIPAA consent"
        - id: "screening"
          label: "AI Musculoskeletal Screening"
