callouts:
  - id: KE001
    calloutType: strength
    title: AI-First Care Delivery at Scale
    body: >-
      Sword's replacement of synchronous in-person PT with autonomous AI-guided sessions is the core operating
      leverage of the business. Having passed 10 million AI sessions by February 2026, Sword has demonstrated
      this model at employer scale. The clinical validation portfolio (43 peer-reviewed studies) provides a
      substantive evidence base that most digital health competitors cannot match, supporting payer contracting
      and Outcome Pricing credibility.
    claimRefs: [CE001, CE010, CE018]

  - id: KE002
    calloutType: risk
    title: FDA SaMD Classification Is an Unresolved Material Risk
    body: >-
      Sword has not publicly disclosed any FDA 510(k) clearance or De Novo authorization for the Phoenix
      wearable, Arbor AI care engine, Predict surgery risk module, or MindGuard. If FDA reclassifies any of
      these features as Software as a Medical Device — particularly Predict's clinical decision support
      function or MindGuard's crisis escalation triggering — Sword would face pre-market submission
      requirements, QMS obligations, and post-market surveillance costs not currently reflected in pricing or
      operating plans.
    claimRefs: [CE023, CE025, CE030, CE031]

  - id: KE003
    calloutType: risk
    title: Kaia Health Integration Complexity and Execution Risk
    body: >-
      Integrating two fundamentally different sensor modalities — Phoenix's IMU wearable and Kaia's camera-based
      computer vision — into a single clinical platform is a significant engineering challenge. The $285 million
      acquisition price creates financial pressure to realize synergies quickly, but the technical integration
      roadmap is not publicly disclosed and clinical equivalence between the two modalities has not been
      established in published research.
    claimRefs: [CE038, CE039, CE042]

  - id: KE004
    calloutType: insight
    title: DiGA Certification Opens German Statutory Reimbursement at Scale
    body: >-
      The Kaia Health DiGA certification provides Sword with access to Germany's statutory health insurance
      reimbursement system covering 70 million people. DiGA certification requires clinical evidence, security
      audits, and regulatory submissions that take 12–24 months to obtain, creating a competitive moat. Sword's
      ability to leverage this certification post-acquisition could significantly accelerate European revenue.
    claimRefs: [CE032, CE033, CE038]

