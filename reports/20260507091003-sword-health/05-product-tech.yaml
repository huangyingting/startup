  evidenceGaps:
    - id: EGE001
      type: unresolved-question
      severity: material
      topic: "FDA regulatory classification of Phoenix wearable, Arbor AI care engine, Predict, and MindGuard"
      missingEvidence: >-
        Sword Health has not publicly disclosed any FDA 510(k) clearance, De Novo authorization, or Breakthrough
        Device designation for any product. The company appears to rely on FDA General Wellness guidance, but
        Predict's clinical decision support (surgery risk stratification) and MindGuard's crisis escalation
        triggering are plausible SaMD candidates under FDA's 2017 SaMD guidance. No public FDA 510(k) database
        entry for Sword Health Technologies was found as of May 2026.
      whyItMatters: >-
        SaMD reclassification would impose pre-market submission, Quality Management System, and post-market
        surveillance obligations not currently reflected in product pricing or operating cost structure. This is
        a material regulatory risk for enterprise buyers contracting Outcome Pricing and for any IPO prospectus.
      diligencePath: >-
        Request FDA regulatory counsel opinion on Phoenix wearable, Arbor AI care, Predict, and MindGuard
        classifications; search FDA 510(k) and De Novo databases for Sword Health Technologies; request copies
        of any FDA pre-submission meetings or regulatory strategy documents.
      relatedQuestionRefs: [QE010, QE026]
      relatedTableRefs: [TE004]

