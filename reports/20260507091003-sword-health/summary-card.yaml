  sector: healthcare / biotech
  stage: Late-stage private / pre-IPO
  headquarters: 'New York, NY, USA (R&D: Porto, Portugal)'
  shortDescription: >
    Sword Health is the leading AI-powered virtual physical therapy platform for musculoskeletal (MSK) conditions,
    serving 2,500+ self-insured employers and 17+ BCBS health plans. Founded 2015 in Porto, Portugal by Virgílio Bento
    (CEO, PhD EE); HQ New York City; R&D in Porto. Key products: Phoenix AI (FDA 510(k)-cleared AI PT platform), BLOOM
    (women's pelvic health), MIND (mental health and pain integration), and Predict (outcomes analytics). ARR
    approximately $240M as of June 2025 (+50-60% YoY). Series F raised $40M at $4B post-money valuation (June 2025), led
    by General Catalyst and Khosla Ventures. Total raised $500M+. Cash-flow positive since mid-2025. 400K+ enrolled
    members. Named clients include Walmart (47% surgical reduction), Target, Boeing, and Delta Air Lines. IPO targeting
    2028 at $500M+ ARR.
