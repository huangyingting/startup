sections:
  - id: section-revenue-architecture
    title: Revenue Architecture and ARR Trajectory
    body: >-
      Sword Health is a private company and has not published audited financial statements. The primary ARR data point
      comes from CEO Virgílio Bento, who stated $240M ARR as of 2025. Management has also claimed cash-flow positive
      status since 2024, but this has not been independently verified. Media and analyst estimates reconstruct an ARR
      trajectory of roughly $100M in 2022, $160M in 2023, $200M in 2024, and $240M in 2025, implying a compound
      annual growth rate of approximately 34% over the three-year period. These figures are CEO-stated and
      press-reported only and carry meaningful uncertainty given the absence of audited disclosure.

      Revenue is predominantly B2B SaaS in structure: self-insured employer contracts account for the majority of
      revenue, with health plan partnerships, government payer contracts, and direct-to-consumer segments providing
      supplemental streams. The January 2026 Kaia Health acquisition at $285M adds an estimated $35M in additional
      ARR and expands Sword's addressable payer mix to include mental health and respiratory chronic-condition
      management. Post-acquisition, total ARR may exceed $275M if integration proceeds without material churn. The
      Surgery Hero acquisition in 2025 at an undisclosed price adds surgical navigation capabilities but its revenue
      contribution to consolidated ARR has not been disclosed. Revenue quality is difficult to assess from public
      information because customer-level cohort data, net revenue retention, and contract duration data are all private.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008

  - id: section-pricing
    title: Pricing and Monetization Models
    body: >-
      Sword Health uses three primary pricing structures for its musculoskeletal and mental health programs. The
      traditional per-member-per-month model is the most common arrangement for employer contracts: employers are
      billed a PMPM fee for enrolled members regardless of session activity, estimated at $15–$45 PMPM depending on
      program scope, employer size, and contract duration. Outcome-based pricing was launched in 2024 and provides
      tiered payment based on measured clinical outcomes including pain reduction, functional improvement, and surgery
      avoidance. This model aligns Sword's revenue to clinical performance and represents a competitive differentiator,
      though it introduces revenue timing risk and outcome-attribution complexity. Enterprise flat-fee contracts for
      large national accounts provide a third pricing variant with volume-committed pricing and multi-program bundling.

      Sword claims $1B+ in cumulative cost savings delivered to employer clients and a 3.7:1 ROI ratio, which forms the
      basis of its sales narrative and supports PMPM pricing above undifferentiated telehealth alternatives. In Germany,
      Sword holds DiGA (Digital Health Application) certification, which entitles statutory health insurance payers to
      reimburse at a fixed government-set rate of approximately €500–600 per 90-day prescription per patient. In the UK,
      Sword maintains an NHS partnership for MSK care delivery. These reimbursement channels provide revenue
      diversification and payer validation, but volumes outside the United States employer market are not disclosed.
      Pricing for the Kaia Health mental health and respiratory programs follows a similar PMPM structure for the
      employer channel, with statutory reimbursement available in additional European markets where Kaia holds
      regulatory approvals.
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
      - CI016

  - id: section-unit-economics
    title: Unit Economics and Capital Efficiency
    body: >-
      Sword Health has not disclosed gross margin, EBITDA, customer acquisition cost, lifetime value, or net revenue
      retention. For reference, digital health physical therapy platforms comparable to Sword typically achieve 60–75%
      gross margin, which is lower than pure-software SaaS due to clinical oversight costs, sensor hardware, and care
      management labor. Sword's AI-first delivery model — the Phoenix wearable sensor combined with AI physical therapy
      sessions and human PT oversight at the population level rather than per session — is explicitly designed to reduce
      marginal cost of care delivery relative to human-intensive competitors such as Hinge Health. The Phoenix platform
      has processed more than 10 million AI sessions, which management presents as evidence of operational leverage in
      delivery cost.

      The October 2024 workforce reduction of approximately 17% (roughly 170 employees) brought headcount from
      approximately 1,200 to 1,000 and was described by management as a restructuring toward AI-driven efficiency
      rather than a financial distress signal, though no financial detail was provided to substantiate that framing.
      Management's claim of cash-flow positive status since 2024 is consistent with the absence of a new primary
      financing round between the June 2024 Series E and June 2025 Series F, but the $40M Series F was small enough
      relative to the existing capital base that it may have been defensive financing rather than growth capital.
      Net revenue retention is estimated likely above 100% for enterprise accounts given the program expansion model,
      but no disclosed NRR data exists. Customer acquisition cost is unknown. The Kaia acquisition's $285M price,
      paid from the balance sheet and possibly supplemented by financing, suggests Sword had meaningful cash reserves
      prior to the deal and limited near-term liquidity pressure.
    claimRefs:
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021
      - CI022
      - CI023
      - CI024

  - id: section-capital-structure
    title: Capital Structure and Funding History
    body: >-
      Sword Health has raised more than $500M in total equity financing across seven rounds from 2018 through 2025.
      The seed round in 2018 raised $4.6M; Series A of $8M closed in April 2019 with Khosla Ventures as lead;
      Series B of $25M closed in 2020; Series C of $85M at a $1.8B valuation closed in June 2021; Series D of $163M
      at a $2B valuation closed in December 2021 with General Catalyst, BOND Capital, and Khosla Ventures
      participating; Series E of $130M at a $3B valuation closed in June 2024 with General Catalyst as lead; and
      Series F of $40M at a $4B valuation closed in June 2025 with General Catalyst again leading. General Catalyst
      has participated in every round since Series C and is the dominant institutional investor. Khosla Ventures and
      BOND Capital hold meaningful but smaller stakes.

      The Kaia Health acquisition closed in January 2026 for $285M, a price funded from the company's balance sheet
      supplemented by possible additional financing, though the specific payment mix has not been disclosed publicly.
      The Surgery Hero acquisition in 2025 at an undisclosed price represents additional M&A-related capital
      deployment. Management has deferred IPO plans, with signals pointing to no public offering before 2028. At the
      $4B Series F valuation and with over $500M raised, Sword carries a meaningful burn-implied track record: the
      total capital deployed across the company's operating history plus the Kaia acquisition appears substantial,
      making cash-flow positive claims material to the forward capital adequacy story. No debt facilities, convertible
      notes, or project-finance obligations are known from public disclosure. The primary contingent liability is the
      A2 Academy equity lawsuit, which claims a 5% equity stake and at $4B valuation represents a potential $200M
      exposure that has not been settled or resolved as of May 2026.
    claimRefs:
      - CI025
      - CI026
      - CI027
      - CI028
      - CI029
      - CI030
      - CI031
      - CI032
      - CI033

  - id: section-financial-evidence-gaps
    title: Financial Evidence Gaps and Verdict
    body: >-
      Sword Health's private status means that every financial metric of underwriting significance is either
      CEO-stated without external verification or simply unknown. Audited revenue, gross margin, EBITDA, CAC, LTV,
      NRR, cohort retention, and burn rate are all undisclosed. ARR figures are CEO-stated and press-reported; no
      independent verification exists. The company's claim of cash-flow positive status since 2024 is plausible
      given the absence of large-scale primary fundraising between the June 2024 Series E and June 2025 Series F, but
      cannot be confirmed from public materials.

      For comparative context, Hinge Health — the primary publicly traded comparable — reported $123.8M in Q1 2025
      revenue and its first profitable quarter at $17M net income. Hinge's annualized Q1 2025 revenue run rate of
      approximately $495M implies a significantly larger revenue base than Sword at roughly half the valuation per
      revenue dollar, which either reflects Sword's premium for growth trajectory, the private-market valuation
      discount, or both. The A2 Academy equity lawsuit filed July 2024 claiming a 5% stake represents a material
      contingent liability of approximately $200M at the current $4B valuation and must be treated as an open item
      in any capital adequacy analysis. Without management data access including audited financials, ARR by segment,
      gross margin by product, and cash position, this chapter supports a high-level revenue narrative but cannot
      close a traditional financial diligence case. The financial verdict is that revenue growth is real and the
      capital structure appears adequate, but margin path, burn, and earnings quality remain unverifiable from public
      sources alone.
    claimRefs:
      - CI034
      - CI035
      - CI036
      - CI037
      - CI038
      - CI039
      - CI040

