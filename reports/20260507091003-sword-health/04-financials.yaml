  evidenceGaps:
    - id: EGI001
      topic: Gross margin and unit economics undisclosed
      severity: blocking
      impact: >-
        Cannot assess profitability path, margin quality, or perform LTV/CAC modeling without GAAP gross margin,
        COGS breakdown, NRR, or CAC data. All unit economics in this chapter are benchmarks or estimates.
      suggestedApproach: >-
        Request audited P&L with COGS itemized by care delivery (AI sessions, clinician oversight, hardware),
        platform, and G&A. Request NRR by cohort vintage and CAC by channel from management data room.
      relatedQuestionRefs:
        - QI004
        - QI008

    - id: EGI002
      topic: Post-Kaia acquisition burn rate and cash position unknown
      severity: blocking
      impact: >-
        Cannot assess capital adequacy after the $285M Kaia acquisition depleted cash reserves. Burn rate and
        runway are unverifiable from public sources. Cash-flow positive claim is management-stated only.
      suggestedApproach: >-
        Request balance sheet as of Q1 2026, monthly burn rate for 2024–2025, and post-Kaia-close cash position
        from management. Cross-check with Series F use of funds disclosure.
      relatedQuestionRefs:
        - QI019

    - id: EGI003
      topic: Kaia acquisition payment mix and post-close financials
      severity: material
      impact: >-
        Cannot confirm whether $285M was all-cash or included stock/earnout components, which affects dilution
        and future cash obligations. Post-close Kaia revenue contribution and integration costs unknown.
      suggestedApproach: >-
        Request acquisition agreement summary and Kaia stand-alone financials for 2024 and 2025. Confirm payment
        structure and any earnout obligations.
      relatedQuestionRefs:
        - QI026

    - id: EGI004
      topic: A2 Academy lawsuit financial resolution and cap-table impact
      severity: material
      impact: >-
        A claimed 5% equity stake at $4B valuation represents ~$200M potential exposure. Unresolved litigation
        creates contingent dilution risk for all investors.
      suggestedApproach: >-
        Request litigation status report from management and legal counsel. Determine if any reserve or D&O
        insurance coverage applies. Evaluate probability of settlement or dismissal based on counsel opinion.
      relatedQuestionRefs:
        - QI007
        - QI020
