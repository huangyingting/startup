summary:
  headline: >
    Sword Health 是可信的 AI MSK 领跑者，手握 2,500+ 家企业客户、FDA 批准和正现金流运营；但 Hinge Health IPO 后的优势、以及自报结果指标，削弱了 16.7x ARR
    偏高估值下的确定性。观察；ARR 达到 $350M+ 且结果获得独立验证后再进入。
  overallScore: 6.5
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched
  keyMetrics:
    valuationUsdM: 4000
    revenueRunRateUsdM: 240
