      targets:
        - contentRequirements/0
      status: answered
    - id: QP002
      question: >-
        What are typical employer digital MSK program utilization rates, and how does the status quo of untreated
        employee pain function as an effective competitor by member volume?
      type: quantification
      targets:
        - contentRequirements/0
      status: answered
    - id: QP003
      question: >-
        Which employer segment do both Sword Health and Hinge Health primarily target, and how does this create direct
        competitive overlap in enterprise sales and broker channels?
      type: verification
      targets:
        - contentRequirements/0
      status: answered
