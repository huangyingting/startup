  - id: section-competitive-risks
    title: Competitive Risk Assessment
    body: >
      The primary competitive risks for Sword Health include: (1) Hinge Health's public equity enabling acquisitions of
      international MSK platforms or technology assets; (2) commoditization risk as AI-based physical therapy becomes a
      standard digital health feature — UnitedHealth's OptumHealth, CVS/Aetna, or Epic integrations could neutralize
      Sword's AI differentiation; (3) payer/plan market consolidation reducing broker channel power; (4) FDA regulatory
      risk under the Software as a Medical Device (SaMD) framework — a Class II AI device recall or adverse event
      advisory could damage clinical credibility; and (5) talent competition for physical therapists, AI engineers, and
      clinical data scientists.

      An adverse data point: Sword's October 2024 workforce reduction of approximately 17% (primarily clinicians)
      signals either a deliberate shift toward AI-led delivery or margin pressure — competitors could exploit the
      narrative that Sword is reducing clinical quality to cut costs. Hinge's Q1 2025 profitability and IPO provide a
      platform to argue it is the safer, more sustainable partner for multi-year enterprise contracts. The long-term
      risk of EHR-embedded competition (Epic, Oracle Health) is real but likely 5+ years away from meaningful MSK
      program penetration. The near-term risk of a new AI health startup replicating Sword's model is limited by
      clinical evidence and regulatory barriers, but cannot be dismissed given current AI investment levels in
      healthcare.
