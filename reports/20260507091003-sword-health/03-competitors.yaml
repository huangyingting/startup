  - id: section-moats
    title: Competitive Moats and Switching Costs
    body: >
      Sword's competitive moats operate at several levels. Clinical IP: 43 published clinical studies and 45+ patents
      covering the AI PT model, wearable sensor fusion, and clinical algorithms represent a meaningful barrier that
      accumulates over time. A new entrant would require 3–7 years to replicate this clinical evidence portfolio.
      Regulatory moat: DiGA certification in Germany (through Kaia Health) and FDA registration in the US provide
      barriers to entry; DiGA in particular required years of German regulatory engagement and mandates ongoing clinical
      evidence maintenance. Geographic moat: Atlas (150 countries) and the Kaia acquisition create a multinational
      employer moat that competitors have not matched. Switching costs at the employer level are moderate to high:
      implementations take 3–6 months, member data, clinical history, and benefit communication materials must be
      migrated, and benefits decisions are made annually — losing a renewal means losing the relationship for at least
      one year. Data network effect: Sword's AI PT improves with member usage data across 10M+ AI sessions; a competing
      platform without comparable session volume faces an accuracy disadvantage in movement pattern recognition.

      Hinge Health's primary moat post-IPO is its public-company currency: access to equity for acquisitions and
      partnerships, enhanced enterprise procurement credibility, and transparency enabling multi-year contracts with
      risk-averse buyers. Hinge's network of ~1,000 physical therapists is a labor-intensive moat — hard to scale
      quickly but difficult to replicate overnight. The risk for Sword is that Hinge's IPO accelerates its ability to
      acquire regional PT networks, technology assets, or international MSK platforms. The risk for Hinge is that
      Sword's AI-first model commoditizes human PT delivery over time.
    claimRefs:
      - CP021
      - CP022
      - CP023
      - CP024
      - CP025
