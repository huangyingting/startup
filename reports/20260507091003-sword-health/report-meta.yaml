coverageNotes: >
  Report covers public evidence through May 2026 (run date 2026-05-07). Sword Health is
  a private company and has not published audited GAAP financial statements. ARR, gross
  margin, NRR, and unit economics estimates rely on management statements, investor
  communications, analyst estimates, and public press releases — not independently audited.
  Clinical outcome metrics (74% pain reduction, 3.7:1 ROI, $1B+ cumulative savings) are
  company-reported and have not been independently validated by actuaries or academic
  institutions. Cap table and liquidation preference structure are not publicly disclosed.
  Series F terms ($40M at $4B, June 2025) confirmed via Axios, Bloomberg, and official
  press releases by Sword Health, General Catalyst, and Khosla Ventures.

