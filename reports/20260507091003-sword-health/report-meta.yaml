companyProfile:
  summary: >
    Sword Health is the leading AI-first virtual physical therapy platform, serving
    self-insured employers and health plans with FDA-cleared AI-guided MSK care at
    scale. The company's clinical proof set — 74% pain reduction, 85% member
    satisfaction, 3.7:1 ROI, $1B+ cumulative savings — across named Fortune 500
    employers provides strong commercial credibility. The Phoenix AI platform (Qualcomm
    chip-based motion sensor + AI coaching) received FDA 510(k) clearance and is the
    core clinical product, differentiated by AI adaptability, autonomous session
    delivery, and longitudinal member data (400K+ enrolled). BLOOM (pelvic health for
    women) and MIND (mental health-pain comorbidity) are expanding the platform beyond
    MSK into adjacent $200B+ markets. Sword Health reached cash-flow positive operations
    in mid-2025, reducing capital urgency and validating unit economics ahead of the
    planned 2028 IPO. Key risks include Hinge Health's post-IPO competitive advantages,
    the absence of independent actuarial outcome validation, digital health multiple
    compression precedent, and the hardware-dependent gross margin structure.
  foundedDate: "2015-01-01"
  founders:
    - name: Virgílio Bento
      role: CEO and Co-Founder
      background: >
        PhD Electrical Engineering, University of Porto; personal motivation from
        brother's MSK injury. Modern Healthcare Top 100 Most Influential People (2024).
        Sole public face of Sword Health; drives all strategic communications, investor
        relations, and clinical vision. Key-person risk: no public succession plan disclosed.
      claimRefs: []
    - name: Márcio Colunas
      role: Co-Founder and Chief Science Officer
      background: >
        Co-developed the original wearable sensor platform with Bento. Leads R&D
        in Porto engineering center (75+ PhDs and ML engineers). Academic background
        in signal processing and biomechanics.
      claimRefs: []
  foundingLocation: "Porto, Portugal"
  headquarters: "New York, NY, USA"
  productSummary: >
    Phoenix AI: FDA 510(k)-cleared AI PT platform; Qualcomm Snapdragon motion sensor
    hardware + mobile app; 30+ AI models for real-time exercise form correction,
    session adaptation, and pain tracking. Autonomous PT sessions without licensed PT
    for each session. BLOOM: pelvic health program for women's MSK conditions;
    expanding into prenatal/postnatal care. MIND: integrated mental health and pain
    comorbidity program combining CBT, mindfulness, and AI coaching. Predict: employer
    analytics platform for outcomes forecasting, utilization, and ROI reporting.
    Distribution: direct employer sales (2,500+ clients) plus health plan partnerships
    (17+ BCBS plans).
  customerFocus: >
    Two primary channels: (1) Self-insured employers — 2,500+ enterprise clients
    including Walmart, Target, Boeing, Delta Air Lines, Delta Faucet; benefits
    managers and CFOs as economic buyers; annual contracts. (2) Health plans —
    17+ Blue Cross Blue Shield plans; population health management and employer
    benefits partners. 400K+ enrolled members generating longitudinal clinical data
    for AI model improvement.
  businessModel: >
    Per-member-per-month (PMPM) pricing to employers and health plans, with outcome-
    based components in some contracts. Hardware (motion sensor kits) included in
    program fee or subsidized. Reported 70%+ net revenue retention on employer
    accounts. Cash-flow positive since mid-2025. IPO target 2028 at $500M+ ARR after
    2-3 years demonstrated profitable growth.
  stage: "Late-stage private; cash-flow positive; pre-IPO 2028 target"
  fundingStatus: >
    Total raised $500M+ across 6 rounds. Series A (2019, Khosla Ventures), Series B
    (2021), Series C, Series D, Series E, Series F ($40M, June 2025 at $4B post-money).
    Investors: General Catalyst, Khosla Ventures, Transformation Capital, IVP,
    Comcast Ventures, Founders Fund. Small Series F size ($40M) vs. large valuation
    ($4B) reflects strong unit economics — company did not need a large primary raise.
  disclosureProfile: private-disclosed
  claimRefs: []

summary:
  headline: >
    Sword Health is the credible AI MSK leader with 2,500+ enterprise clients,
    FDA clearance, and cash-flow positive operations — but Hinge Health's post-IPO
    advantages and self-reported outcome metrics limit conviction at the stretched
    16.7x ARR valuation. Track; re-enter at $350M+ ARR with independent validation.
  overallScore: 6.5
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched
  keyMetrics:
    valuationUsdM: 4000
    revenueRunRateUsdM: 240
    arrUsdM: 240
    revenueGrowthYoYPct: 55
    grossMarginPct: null
    nrrPct: 70
    totalRaisedUsdM: 500
    customerCount: 2500
    headcount: 825
  topStrengths:
    - "FDA 510(k)-cleared Phoenix AI platform and 400K+ member longitudinal dataset provide durable clinical AI moat that pure-software competitors cannot replicate without hardware"
    - "2,500+ enterprise employer clients with named Fortune 500 references (Walmart 47% surgical reduction, Boeing, Target, Delta) provide commercial proof at scale"
    - "Cash-flow positive operations since mid-2025 at $240M ARR validates unit economics ahead of 2028 IPO without requiring dilutive large-scale raise"
    - "BLOOM and MIND modules expand TAM from $100B MSK to $300B+ women's health and behavioral health, supporting a higher platform valuation ceiling"
    - "17+ BCBS health plan partnerships create a second distribution channel beyond employer-direct, potentially doubling the addressable member base"
  topRisks:
    - "Hinge Health's February 2025 IPO at $6.4B gives the primary competitor public-company capital, actuarially validated S-1 outcome disclosures, and enterprise credibility advantages that are structurally difficult for Sword Health to match as a private company"
    - "All clinical outcome metrics (74% pain reduction, 3.7:1 ROI, $1B+ savings) are company-reported with no independent actuarial validation — inadequate for investment-grade diligence at $4B valuation"
    - "Digital health SaaS multiple compression precedent (Teladoc $16B → $900M, 95% decline) creates severe downside scenario if growth decelerates or macro conditions shift"
    - "Hardware-dependent gross margin structure (motion sensor kits per member) creates unit economics ceiling relative to pure-software MSK competitors like Hinge Health"
    - "IPO timing risk: if the 2028 public market window is unfavorable or ARR growth decelerates to <30%, the $4B valuation may represent an above-market entry requiring extended hold period"
  unresolvedGaps:
    - "Independent actuarial validation of 3.7:1 ROI and 74% pain reduction — without this, premium valuation vs. Teladoc and Accolade rests on self-reported metrics"
    - "Audited GAAP financial statements with gross margin and hardware cost breakdown — required to verify capital efficiency and profitability path"
    - "Employer client renewal cohort by vintage year — self-reported 70%+ NRR requires cohort verification to distinguish upsell from retention"
    - "Cap table and liquidation preference waterfall — required to model common equity value in downside scenarios"
    - "BLOOM and MIND commercial traction — ARR contribution from platform expansion modules not publicly disclosed"

appendices:
  - id: A
    title: "Sword Health Funding History and Valuation Trajectory"
    blocks:
      - type: paragraph
        title: null
        body: >
          Sword Health's valuation trajectory reflects digital health market cycles:
          founded 2015 in Porto; raised Series A (Khosla Ventures, 2019); grew to
          unicorn status by 2021-2022 digital health boom; sustained growth through
          the 2022-2023 digital health funding correction; reached $4B Series F in
          June 2025 on $240M ARR at 16.7x multiple. The small $40M primary Series F
          raise against a $4B valuation indicates the company did not require
          significant primary capital — it raised at a high valuation to establish
          a reference price for secondary liquidity and pre-IPO positioning. Total
          raised $500M+ from Khosla Ventures (Series A lead), General Catalyst
          (Series D, E, F lead), Transformation Capital (healthcare VC), IVP
          (growth equity), Comcast Ventures (strategic/media), and Founders Fund
          (Thiel-affiliated). All are digital health-experienced investors who
          understand the clinical proof standard required for premium exits.
        claimRefs: []

  - id: B
    title: "Hinge Health Comparison and Competitive Context"
    blocks:
      - type: paragraph
        title: null
        body: >
          Hinge Health's February 2025 IPO established the definitive public-market
          benchmark for digital MSK platforms. Key comparative metrics: Hinge Health
          at $6.4B / ~25x ARR with 500+ employers, 4M+ members, and actuarially
          validated outcome disclosures in the S-1. Sword Health at $4B / 16.7x ARR
          with 2,500+ employers and 400K members. Sword Health has a dramatically
          higher employer client count per dollar of valuation ($1.6M per employer
          client vs. Hinge Health's $12.8M per employer client) — suggesting Sword
          Health's employers may be smaller on average or contracted at lower PMPM.
          The member scale gap (400K vs. 4M) represents a 10x difference in longitudinal
          training data for AI models — a compounding disadvantage as both companies
          invest in next-generation AI PT capabilities. Hinge Health's post-IPO
          capital, SEC-audited disclosures, and actuarially validated outcome claims
          create a competitive credibility gap that Sword Health must close through
          independent clinical validation before its 2028 IPO filing.
        claimRefs: []

  - id: C
    title: "Re-entry Criteria and Monitoring Framework"
    blocks:
      - type: paragraph
        title: null
        body: >
          Conditions for upgrading recommendation from track to buy: (1) ARR exceeds
          $350M with YoY growth above 35% — demonstrated on two consecutive quarterly
          updates; (2) independent actuarial firm validates ROI at ≥3:1 and pain
          reduction at ≥65%, published in peer-reviewed or actuary-signed report;
          (3) no Hinge Health competitive displacement events (loss of 3+ named Fortune
          500 accounts in a single quarter); (4) BLOOM/MIND ARR contributing >10% of
          total ARR, confirming platform cohesion; (5) EBITDA positive for two
          consecutive quarters. If all five are met, re-enter at Series G or pre-IPO
          at ≤15x ARR. If only (1) and (2) are met, initiate diligence process but do
          not commit capital. If (3) occurs, reassess to avoid. Monitor quarterly:
          employer renewal announcements, Hinge Health competitive wins, FDA AI/ML
          guidance updates, and independent MSK clinical study publications citing
          Sword Health outcome data.
        claimRefs: []
