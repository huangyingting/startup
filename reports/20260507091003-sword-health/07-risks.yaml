chapter:
  number: 7
  title: Risks
  summary: >
    Sword Health's principal risks are competitive (Hinge Health's US-listed scale and aggressive enterprise expansion),
    clinical evidence (self-reported outcomes without independent actuarial validation may erode employer renewal
    confidence), regulatory (FDA digital health guidance evolution and state telehealth licensure complexity), and
    financial (path to scale profitability on outcomes-based pricing with high member acquisition costs). Additional
    risks include clinical AI liability (adverse patient outcomes from AI physical therapist recommendations),
    outcomes-based pricing model exposure (employer ROI disconfirmation at renewal), and GLP-1 drug market disruption
    (weight loss drugs reducing MSK-related conditions). Sword Health's IPO timeline (deferred to 2028+) limits
    near-term liquidity options.
