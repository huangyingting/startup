callouts:
  - calloutType: risk
    title: Hinge Health IPO Is the Single Biggest Competitive Threat
    body: >
      Hinge Health's public company status gives it SEC-audited outcome claims, capital access, and brand credibility
      that Sword Health's private status cannot match in enterprise RFPs. With Hinge Health reporting 4M+ enrolled
      members vs. Sword Health's 400K+, the data flywheel advantage is real and compounding. Unless Sword Health invests
      in independent actuarial validation of its ROI claims, it will face increasing procurement disadvantage in large
      enterprise evaluations.
    claimRefs:
      - CR001
      - CR026
  - calloutType: risk
    title: Clinical AI Liability Remains Legally Unsettled
    body: >
      No US court has established the standard of care for AI-generated physical therapy recommendations, meaning Sword
      Health operates in an uncertain legal zone. A single high-profile adverse clinical event — regardless of medical
      merit — would generate litigation costs, regulatory attention, and media coverage that disproportionately damages
      the brand relative to the event's clinical significance. Professional liability coverage scope and limits have not
      been publicly disclosed.
    claimRefs:
      - CR005
      - CR019
