  claims:
    - id: CR001
      statement: >
        Hinge Health completed its US IPO in February 2025 at approximately $6.4 billion valuation, establishing it as
        the public-market equivalent and direct comparator for Sword Health's $4B private valuation — with Hinge
        Health's public status giving it greater enterprise credibility, brand visibility, and capital access for
        competitive pricing.
      type: third-party-reported
      topic: Hinge Health IPO competitive impact
      sourceRefs:
        - SR001
        - SR002
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QR001
    - id: CR002
      statement: >
        Hinge Health's public S-1 disclosures reveal similar or greater scale vs. Sword Health on multiple dimensions:
        Hinge Health serves 500+ enterprise clients, 4M+ enrolled members, and has processed more clinical data than
        Sword Health, creating a compounding data and brand advantage in enterprise procurement evaluations.
      type: third-party-reported
      topic: Hinge Health scale vs Sword Health
      sourceRefs:
        - SR001
        - SR003
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR001
        - QR002
    - id: CR003
      statement: >
        Sword Health's Phoenix AI physical therapist holds FDA 510(k) clearance as a Software as a Medical Device
        (SaMD); however, FDA's evolving AI/ML Software Guidance from 2025 requires device makers to implement
        predetermined change control plans for AI model updates, creating ongoing regulatory compliance costs for each
        model iteration.
      type: company-claimed
      topic: FDA 510(k) clearance and AI change control risk
      sourceRefs:
        - SR004
        - SR019
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR005
    - id: CR004
      statement: >
        Physical therapist licensure is state-regulated, not federally standardized, and while the Physical Therapist
        Licensure Compact covers 30+ states, Sword Health's virtual PT delivery model must ensure that supervising
        physical therapists hold active licenses in the states where members reside, creating ongoing compliance
        complexity and potential care delivery gaps in non-compact states.
      type: observed
      topic: State PT licensing compliance risk
      sourceRefs:
        - SR017
        - SR022
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR006
    - id: CR005
      statement: >
        If an adverse clinical outcome (injury aggravation, missed diagnosis, falls from incorrect exercise
        prescription) occurs under AI-guided treatment and a member files a malpractice claim, the legal liability
        framework for AI-generated medical recommendations remains unsettled — creating potential for Sword Health to
        bear direct liability or require expensive professional liability insurance expansion.
      type: observed
      topic: AI physical therapist clinical liability
      sourceRefs:
        - SR008
        - SR018
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR007
    - id: CR006
      statement: >
        GLP-1 drugs (Ozempic, Wegovy, Mounjaro) cause significant weight reduction (15-20% body weight), which reduces
        mechanical stress on joints and has been associated with reduced musculoskeletal pain in peer-reviewed studies;
        if GLP-1 adoption continues to accelerate, the incidence of obesity-related MSK conditions could decline,
        reducing the addressable patient population for virtual MSK programs.
      type: observed
      topic: GLP-1 market disruption to MSK incidence
      sourceRefs:
        - SR006
        - SR007
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR009
    - id: CR007
      statement: >
        The 2025 employer digital health benefits rationalization trend (Willis Towers Watson survey: 40% of large
        employers reduced vendor count in 2025) creates risk for Sword Health: as employers consolidate to fewer health
        tech vendors, they may choose Hinge Health (public, established credibility) over Sword Health (private,
        self-reported outcomes), or opt for platform vendors like Teladoc that offer broad mental+MSK combined benefits.
      type: third-party-reported
      topic: Employer vendor rationalization risk
      sourceRefs:
        - SR009
        - SR010
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR003
    - id: CR008
      statement: >
        Sword Health's CEO explicitly deferred the IPO timeline to at least 2028 at the June 2025 Series F. With $500M+
        total raised and General Catalyst/Khosla/IVP as investors, the IPO delay creates investor holding-period
        extension risk and limits Sword Health's ability to use public equity as a currency for acquisitions or
        competitive talent compensation.
      type: company-claimed
      topic: IPO delay and liquidity risk
      sourceRefs:
        - SR011
        - SR012
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QR011
    - id: CR009
      statement: >
        Self-reported pain outcome scores (the basis for Sword Health's 74% pain reduction claim) are subject to social
        desirability bias and response bias in employer-sponsored programs where employees may feel subtle pressure to
        rate the program positively. JAMA Internal Medicine (2024) identified systematic overstatement in self-reported
        digital MSK outcomes across multiple platforms, creating a potential credibility risk if employers or regulators
        demand actuarially-validated claims data.
      type: third-party-reported
      topic: Self-reported outcomes validity risk
      sourceRefs:
        - SR014
        - SR013
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR008
    - id: CR010
      statement: >
        NCQA's 2025 digital health evidence standards require that digital health programs seeking accreditation
        demonstrate outcomes via objectively-measured clinical data (not solely patient-reported outcomes),
        peer-reviewed publication, or actuarial analysis — a regulatory trend that could require Sword Health to invest
        significantly in third-party validation studies.
      type: observed
      topic: NCQA evidence standards creating compliance cost
      sourceRefs:
        - SR023
        - SR025
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR006
        - QR008
    - id: CR011
      statement: >
        Sword Health's outcomes-based and per-member pricing model creates financial risk if employers challenge program
        ROI claims at renewal; if a large anchor account (e.g., a top-5 employer representing 5-10% of ARR) decides not
        to renew based on ROI disconfirmation, the revenue impact would be significant relative to Sword Health's $240M
        ARR base.
      type: estimated
      topic: Outcomes-based pricing renewal risk
      sourceRefs:
        - SR009
        - SR013
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR010
    - id: CR012
      statement: >
        Sword Health's dependency on AWS for cloud infrastructure, Tyria motion sensor hardware manufacturing (primarily
        in Asia), and OpenAI/proprietary LLMs for the AI physical therapist creates supply chain and technology
        dependency risks; a prolonged sensor manufacturing disruption would limit new member onboarding at a critical
        growth inflection.
      type: inferred
      topic: Technology and supply chain dependency
      sourceRefs:
        - SR003
        - SR016
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR012
    - id: CR013
      statement: >
        Physician and physical therapist professional organizations have raised concerns about AI-generated clinical
        decisions that may substitute for human clinical judgment in complex musculoskeletal cases — creating adoption
        friction at large health system partners and potential regulatory pushback from physical therapy licensing
        boards seeking to protect licensed PT practice scopes.
      type: third-party-reported
      topic: Physician/PT pushback on AI clinical decisions
      sourceRefs:
        - SR021
        - SR008
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR007
    - id: CR014
      statement: >
        Kaia Health (European MSK leader) and other European-market digital PT platforms represent growing competitive
