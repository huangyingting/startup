  - id: FE003
    title: AI 与数据管道 DAG
    type: dag
    layout: wide
    summary: >-
      AI 与数据管道 DAG 展示数据如何从两类传感方式（Phoenix IMU 可穿戴设备和 Kaia 摄像头系统）以及患者报告结果流入 Sword 的 AI 护理引擎，再由它把输出路由到临床人员审核、Predict
      手术风险评分和结果分析。管道产生三类下游输出：调整后的护理方案、手术分流决策和 Outcome Pricing 结算数据。
