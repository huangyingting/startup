companyProfile:
  summary: >
    Sword Health 是领先的 AI 优先虚拟物理治疗平台，面向自保雇主和健康险计划，大规模提供获 FDA 许可、由 AI 引导的 MSK 护理。公司在有名可查的 Fortune 500 雇主中积累了一组临床证明——疼痛降低
    74%、会员满意度 85%、ROI 3.7:1、累计节省 $1B+——商业可信度较强。Phoenix AI 平台（基于 Qualcomm 芯片的运动传感器 + AI 教练）获得 FDA 510(k) 许可，是核心临床产品；差异化来自
    AI 自适应能力、自主课程交付，以及纵向会员数据（400K+ 已加入）。BLOOM（女性盆底健康）和 MIND（心理健康 - 疼痛共病）把平台从 MSK 推向相邻的 $200B+ 市场。Sword Health 在 mid-2025
    实现经营现金流转正，降低了融资紧迫性，也在计划中的 2028 IPO 前验证了单位经济模型。关键风险包括 Hinge Health IPO 后的竞争优势、缺少独立精算结果验证、数字健康估值倍数压缩的先例，以及依赖硬件的毛利率结构。
