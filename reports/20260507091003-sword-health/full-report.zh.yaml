      - number: '4.5'
        title: 财务证据缺口与结论
        blocks:
          - type: paragraph
            body: >-
              Sword Health 仍是私营公司，凡是对投资判断有意义的财务指标，要么仅由 CEO
              声称且无外部验证，要么干脆未知。经审计收入、毛利率、EBITDA、获客成本（CAC）、客户终身价值（LTV）、净留存率（NRR）、队列留存和烧钱速度均未披露。年经常性收入（ARR）数字来自 CEO
              表述和媒体报道；没有独立验证。公司声称自 2024 起现金流为正；考虑 June 2024 Series E 与 June 2025 Series F
              之间没有大规模新股融资，该说法有一定可信度，但公开材料无法确认。

              对比来看，主要公开可交易可比公司 Hinge Health 在 Q1 2025 报告收入 $123.8M，并以 $17M 净利润实现首次季度盈利。Hinge 的 Q1 2025 年化收入运行率约
              $495M，意味着其收入基数明显大于 Sword，而单位收入估值约只有 Sword 的一半；这可能反映市场给予 Sword 增长轨迹的溢价、私人市场估值折扣，或二者兼有。A2 Academy 于 July
              2024 提起股权诉讼并主张 5% 股权，按当前 $4B 估值约为 $200M 的重大或有负债，在任何资本充足性分析中都必须列为未决事项。若拿不到管理层数据，包括经审计财务、分业务
              ARR、分产品毛利率和现金头寸，本章只能支撑高层收入叙事，无法完成传统财务尽调闭环。财务结论是：收入增长真实、资本结构看起来足够，但利润率路径、烧钱速度和盈利质量仅凭公开来源仍无法验证。
