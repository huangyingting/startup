        - 连续两个季度 YoY 低于 30%
        - 削弱基准情景；压低退出倍数；推迟 IPO
        - 重新评估为观察 / 回避；不再新增投资
      - - Hinge Health 竞争替代
        - 单季度从 Sword Health 手中赢下 3+ 个具名 Fortune 500 客户
        - 证实 Hinge IPO 后主导地位；削弱 Sword 企业市场定位
        - 下调至回避；将悲观情景概率提高到 40%+
      - - FDA AI-PT 重新分类
        - FDA 要求 AI PT SaMD 重新批准提供前瞻性 RCT 证据
        - 监管路径受阻；合规成本重大；BLOOM / MIND 延期
        - 持有；新增投资前评估 FDA 时间表和成本
      - - 数字健康倍数崩塌
        - 公开市场 AI 护理 ARR 倍数跌破 8x
        - IPO 窗口关闭；基准回报跌破 1x
