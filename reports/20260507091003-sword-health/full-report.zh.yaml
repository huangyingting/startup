      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: AI 优先的照护交付已达到规模
            body: >-
              Sword 用自主 AI 指导会话替代同步线下 PT，这是公司核心运营杠杆。到 February 2026 AI 会话超过 10 million 次，Sword 已在雇主规模上证明该模式可运行。临床验证组合（43
              篇同行评审研究）提供了大多数数字健康竞争对手难以匹配的实质性证据基础，支撑支付方签约和 Outcome Pricing 可信度。
            calloutType: strength
            claimRefs:
              - CE001
              - CE010
              - CE018
          - type: callout
            title: FDA SaMD 分类是未解决的重大风险
            body: >-
              Sword 尚未公开披露 Phoenix 可穿戴设备、Arbor AI 照护引擎、Predict 手术风险模块或 MindGuard 取得任何 FDA 510(k) clearance 或 De Novo
              authorization。如果 FDA 将这些功能中的任何一项重新归为 Software as a Medical Device——尤其是 Predict 的临床决策支持功能或 MindGuard
              的危机升级触发——Sword 将面对上市前提交要求、QMS 义务和上市后监测成本；这些目前并未体现在定价或运营计划中。
            calloutType: risk
            claimRefs:
              - CE023
              - CE025
              - CE030
              - CE031
          - type: callout
            title: Kaia Health 整合复杂度与执行风险
            body: >-
              要把 Phoenix 的 IMU 可穿戴设备和 Kaia 基于摄像头的计算机视觉这两种根本不同的传感器模态整合进单一临床平台，是重大工程挑战。$285 million
              收购价格带来快速兑现协同的财务压力，但技术整合路线图没有公开披露，两种模态之间的临床等效性也尚未在已发表研究中建立。
            calloutType: risk
            claimRefs:
              - CE038
              - CE039
              - CE042
          - type: callout
            title: DiGA 认证打开德国法定报销规模化入口
            body: >-
              Kaia Health 的 DiGA 认证让 Sword 可以进入覆盖 70 million 人的德国法定健康保险报销体系。取得 DiGA 认证需要临床证据、安全审计和监管提交，通常耗时 12–24
              months，形成竞争护城河。Sword 若能在收购后撬动该认证，欧洲收入可能显著提速。
