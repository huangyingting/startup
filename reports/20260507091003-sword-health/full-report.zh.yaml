      - number: '4.2'
        title: 定价与变现模式
        blocks:
          - type: paragraph
            body: >-
              Sword Health 对肌骨和心理健康项目采用三种主要定价结构。传统每成员每月模式是雇主合同中最常见的安排：无论课程活动如何，雇主都为已加入会员支付 PMPM 费用，估计为 $15–$45
              PMPM，取决于项目范围、雇主规模和合同期限。基于结果的定价于 2024 推出，按衡量到的临床结果分层付款，包括疼痛降低、功能改善和避免手术。该模式让 Sword
              的收入与临床表现挂钩，构成竞争差异化，但也引入收入时点风险和结果归因复杂度。面向大型全国账户的企业固定费用合同，是第三种定价变体，带有量承诺定价和多项目打包。

              Sword 声称已为雇主客户累计节省 $1B+ 成本，ROI 比率为 3.7:1；这是其销售叙事的基础，也支撑其 PMPM 定价高于无差异远程医疗替代方案。在德国，Sword 持有 DiGA（Digital
              Health Application）认证，法定医保付款方可按政府设定的固定费率报销，约为每名患者每个 90-day 处方 €500–600。在英国，Sword 维持 NHS 合作，用于 MSK
              护理交付。这些报销渠道带来收入多元化和付款方验证，但美国雇主市场之外的量级未披露。Kaia Health 心理健康和呼吸项目在雇主渠道采用类似 PMPM 结构；在 Kaia
              持有监管批准的其他欧洲市场，还可获得法定报销。
