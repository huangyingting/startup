chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >
              Sword Health 由 Virgílio Bento 于 2015 年在葡萄牙波尔图创立。Bento 是生物医学 / 电气工程师，个人创业动机可追溯到 1994 年一次事故后弟弟面临的艰难康复。Bento
              获得电气工程博士学位，读博期间，他和同事开发了早期可穿戴传感器和 AI 平台，后来演化为 Sword Health。创始团队还包括 Márcio Colunas（现任 CSO）、Fernando Correia
              和 André Eiras Dos Santos。


              公司宣称的使命是「让世界远离疼痛」——让临床级虚拟 MSK 治疗无需线下就诊也能在全球触达。落地做法上，Sword 将自研可穿戴运动传感器、AI 物理治疗软件（Phoenix AI
              护理专家）和持证人类临床医生结合起来，远程交付有指导、个性化的康复服务。商业模式面向自保雇主和健康险计划，按成员收费，或按 2024 推出的「Outcome Pricing」模式基于结果收费。


              Sword Health Technologies, Inc. 注册于 Delaware，并在 New York 以外州公司身份登记（登记日期 April 24, 2019）。公司在美国的主要运营总部位于 New
              York City（办公室地址为 150 W 43rd St 和 511 W 25th Street）。公司还在葡萄牙波尔图（研发和工程）以及爱尔兰都柏林设有办公室。2025，Sword 通过收购 Surgery
              Hero 进入英国市场。截至报告日期（May 2026），公司仍为私营企业；根据 CEO 表述，IPO 至少推迟到 2028。January 2026 收购 Kaia Health 后，公司自称为「全球领先的
              AI Health 公司」。
