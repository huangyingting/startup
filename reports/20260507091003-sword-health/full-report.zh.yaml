              A2 Academy 于 July 2024 提起诉讼，主张基于 2014-2015 年加速器协议持有 Sword Health 5% 股权。按当前 $4B 估值计算，5% 索赔约为
              $200M。案件结果未知，也不清楚该负债是否已计入任何财务报表。任何机构交易前，这都是重大尽调事项。
