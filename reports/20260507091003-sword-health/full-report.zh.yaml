            body: >
              美国法院尚未确立 AI 生成物理治疗建议的护理标准，这意味着 Sword Health
              处在不确定法律地带。一次高关注度不良临床事件——无论医学实质如何——都会带来诉讼成本、监管关注和媒体报道；相对于事件本身的临床意义，品牌受损会被放大。专业责任保险的覆盖范围和限额尚未公开披露。
