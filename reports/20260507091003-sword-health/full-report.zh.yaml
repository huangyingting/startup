      - number: '5.4'
        title: 信任、质量与合规状态
        blocks:
          - type: paragraph
            body: >-
              Sword 的信任基础由 HIPAA 合规（已与所有企业客户签署 BAA）、美国平台的 SOC 2 Type II 认证，以及覆盖 Thrive、Bloom 和 Move 项目的 43
              篇同行评审临床研究构成。临床顾问委员会包含学术医疗中心关联人士，为已发布结果说法增加可信度，也支撑支付方签约。

              Kaia Health 收购实质性提升了欧洲监管地位。Kaia 的 Back Pain app 持有德国 DiGA 认证——这是德国 Digital Health Application 框架下不到 50
              款获认证 app 之一，可在覆盖 70 million 人的法定健康保险体系内直接获得保险报销。CE Mark 覆盖范围延伸至更广泛的 EU 市场。Surgery Hero 在 18 家 UK Trusts 的
              NHS 注册，增加了另一条受监管市场路径。

              最大合规不确定性，是美国 FDA 如何分类 Phoenix 可穿戴设备和 Arbor 驱动的 AI 临床功能。截至报告日期，Sword 尚未公开披露任何产品获得 510(k) clearance 或 De
              Novo authorization，暗示公司按 General Wellness guidance 对产品分类。如果监管机构把任何功能重新归为 SaMD——例如 Predict 的手术风险分层，或 Arbor
              触发临床升级的功能——Sword 可能面临重大的上市前提交、上市后监测和标签义务。这仍是美国尽调中的未解决监管缺口。
