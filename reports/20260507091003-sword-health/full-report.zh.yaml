  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争风险——Hinge Health 与市场整合
        blocks:
          - type: paragraph
            body: >
              Hinge Health 在 February 2025 以 $6.4 billion 估值完成美国 IPO，是 Sword Health 近期最重要的竞争威胁。作为上市公司，Hinge Health
              获得了企业可信度优势：SEC 审计的财务披露、经过精算验证的结果主张（见 S-1），以及用于竞争性定价和 M&A 的公开市场资本通道。Hinge Health 的规模优势同样重大：S-1 披露其拥有 500+
              家企业雇主客户、4M+ 已注册成员，以及更深的 AI 模型训练临床数据——这让它相对 Sword Health 的 400K 已注册成员，形成正在扩大的数据飞轮优势。在并行企业 RFP 中，Sword
              Health 现在要面对一家拥有独立审计 ROI 主张的上市公司同行，迫使 Sword Health 投资自身结果指标的精算验证。另一个压力来自 2025 年雇主数字健康供应商精简趋势（WTW：40%
              大型雇主减少供应商数量）：雇主可能转向 Teladoc、Accolade 等平台型方案，把 MSK 与更广泛的心理健康和慢病管理打包，压缩独立 MSK 供应商机会。
            claimRefs:
