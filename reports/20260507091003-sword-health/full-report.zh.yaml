      - number: '5.5'
        title: 产品路线图与开发阶段
        blocks:
          - type: paragraph
            body: >-
              Sword 近期产品发布显示扩张节奏很快：Phoenix 可穿戴 AI Care 平台于 June 2024 推出，Mind 于 June 2025 推出，Bloom 在 March 2026
              扩展为完整女性健康平台，Kaia Health 整合则在 January 2026 交易交割后启动。Atlas 在 2023 to 2025 期间逐步扩展到 150 个国家。February 2026 达成的
              10 million 次 AI 会话里程碑，证明了运营规模和平台吞吐量。

              短期产品开发信号集中在三条主线上。第一，更深的 Kaia Health 整合——把 Phoenix 可穿戴设备与 Kaia 基于摄像头的运动指导整合到统一临床平台，并借助 DiGA
              认证大规模争取德国法定报销。第二，MindGuard 企业级加固——为 Mind 平台取得临床安全认证，以支撑大型雇主心理健康福利合同。第三，Predict MSK
              扩张——把手术风险分层从脊柱扩展到膝和肩部手术，扩大可触达手术干预市场。

              关键技术风险包括临床安全场景中的 LLM 幻觉（Arbor 和 MindGuard 运行在高风险环境，单次错误临床回复就会产生责任）；可穿戴设备质量与监管风险（设备召回或监管重新分类会扰乱核心 Thrive
              工作流）；以及 Phoenix（IMU 可穿戴设备）与 Kaia（基于摄像头的视觉）两种方案之间的整合复杂度。二者使用根本不同的传感器模态，要合并成无缝临床体验，需要大量工程投入。October 2024 裁撤
              17% 面向治疗的临床人员，释放出加速用 AI 替代临床医生的策略信号，也伴随安全风险。
