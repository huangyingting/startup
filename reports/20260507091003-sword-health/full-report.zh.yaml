    sections:
      - number: '5.1'
        title: 产品组合与定位
        blocks:
          - type: paragraph
            body: >-
              Sword Health 的产品组合覆盖 8 条不同产品线，底层共用一套 AI 临床基础设施，面向肌肉骨骼（MSK）健康、盆底健康、心理健康、预防和全球访问。旗舰产品 Thrive 覆盖慢性 MSK
              疼痛、急性损伤和术后恢复——这是雇主健康福利里量最大、成本最高的驱动项。Bloom 服务盆底功能障碍、产后恢复、产前护理，并自 March 2026 起覆盖更年期护理，扩大了女性健康可触达市场。Move
              定位为预防型 MSK 健康产品，面向活跃员工，在需要临床干预前降低受伤风险。

              June 2025 推出的 Mind 将 Sword 扩展到行为健康，通过 Arbor LLM 框架和 MindGuard 临床安全过滤器提供基于 CBT 的教练服务与持证临床医生支持。Mind
              在雇主心理健康福利市场直接对标 Spring Health 和 Lyra Health。Predict 提供 AI 驱动的手术风险分层，让雇主和支付方把成员从选择性 MSK 手术转向保守治疗。Atlas 是
              Sword 的直面消费者和国际渠道，覆盖 150+ 个国家。On-Call 为雇主人群提供 24/7 急性损伤分诊。Academy 提供物理治疗师培训和认证，但它正处于加速器机构 A2 Academy
              提起的股权诉讼中（July 2024 提起）。

              所有项目的底座是 Phoenix 可穿戴传感器——这是一款基于 IMU 的设备，于 June 2024 推出，通过 Bluetooth 和配套移动 app 实时追踪动作、关节活动度和运动质量。Arbor LLM
              框架在所有产品线中编排多智能体对话式 AI，并于 February 2026 突破 10 million 次 AI 会话里程碑。January 2026 收购 Kaia Health 后，Sword
              获得了计算机视觉运动指导能力（基于摄像头、无需可穿戴设备）、德国 DiGA 报销认证，以及面向欧洲市场的 CE Mark 覆盖。
