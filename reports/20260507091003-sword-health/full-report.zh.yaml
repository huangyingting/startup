      - number: '8.4'
        title: 投资建议与确信度框架
        blocks:
          - type: paragraph
            body: >
              对 Sword Health 的投资建议是观察——公司已经展示出可信的临床证明、现金流为正的运营和强企业客户基础，但当前 $4B 估值、16.7x ARR 的入场价偏高，安全边际有限。确信度框架列出 4
              个升级为买入前必须满足的条件。第一：对 3.7:1 ROI 和 74% 疼痛降低主张进行独立精算验证——否则，相对 Teladoc 和 Accolade 的估值溢价建立在自报指标上，而 Modern
              Healthcare 分析师警告称，在独角兽估值水平做投资级尽调时，这类指标不足够。第二：公司从 $240M 扩到 $350M+ ARR 时，仍能维持 35-40% YoY 以上 ARR
              增长——这是扩张过程中第一次高增长更难维持的拐点。第三：有证据表明 Hinge Health 上市后的竞争优势没有转化为实质性企业账户流失。第四：BLOOM 和 MIND 商业牵引贡献超过总 ARR 的
              >10%，验证平台扩张逻辑，并支撑更高估值上限。如果上述标准达成，建议在 Series G 或 IPO 前条款重新进入；如果悲观情景风险升高，则应等待二级市场价格隐含低于 12x ARR。$4B
              估值立场偏高：16.7x ARR 留下的下行保护有限，而 2x 回报需要 $8B 退出，要求连续 3 年维持 40%+ 增长。风险评级高：Hinge Health
              获得融资支持的竞争威胁、未经审计的临床主张、数字健康倍数压缩先例和 IPO 时点风险叠加成多因素风险画像，尽管公司运营成绩存在，仍需谨慎。
