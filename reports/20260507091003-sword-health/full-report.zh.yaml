      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Sword Health 的 FDA 监管状态涉及 Phoenix AI 作为 Software as a Medical Device（SaMD）的 510(k) predicate clearance
              的持续合规。FDA 2025 AI/ML Software Guidance 要求重大 AI 模型更新具备 predetermined change control
              plans（PCCP），这增加了监管开销，也限制了 AI 模型迭代速度。州级物理治疗执照形成碎片化合规要求：Sword Health 必须在 30+ 个 Physical Therapist Licensure
              Compact 州维持持证 PT 覆盖，并单独管理非 compact 州——任何持证覆盖缺口都会产生合规风险和潜在照护交付中断。临床 AI 责任是新兴且未定型的法律前沿：美国法院尚未确立 AI
              生成的物理治疗建议与持证 PT 建议之间适用何种护理标准；一旦 Sword Health 的 AI PT 出现高关注度不良患者结果，无论最终法律结果如何，都可能引发诉讼、监管审查和保险费上涨。雇主赞助健康数据的
              HIPAA 数据泄露风险较高，任何涉及成员临床数据的泄露都会触发雇主合同终止条款和监管处罚。
            claimRefs:
              - CR003
              - CR004
              - CR005
              - CR017
              - CR020
              - CR029
