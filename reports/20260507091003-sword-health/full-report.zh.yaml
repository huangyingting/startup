        - 聘请独立健康经济学家；向管理层索取
      - - 经审计财务
        - 含毛利率与硬件成本拆分的 GAAP 报表
        - 没有审计，无法验证资本效率、真实毛利率或盈利路径
        - 在 NDA 下向 CFO 索取；数据室
      - - 雇主留存队列
        - 按 2020-2024 队列年份划分的客户续约率
        - 自报 NRR 需要队列验证，才能区分增购与留存
        - 向客户成功 VP 索取；数据室
      - - 股权结构表与分配瀑布
        - 完全摊薄股数、期权池、各轮清算优先权
        - 缺少优先权堆叠细节，就无法测算下行情景下的普通股价值
        - 向总法律顾问索取；数据室
      - - Phoenix AI 的 FDA PCCP
        - AI 模型更新无需重新批准的预定变更控制计划
        - 验证 AI 模型迭代的监管清晰度；关键产品速度关口
