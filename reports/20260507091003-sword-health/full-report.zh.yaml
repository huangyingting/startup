            title: 多垂直扩张带来平台可选性，也拉长执行半径
            body: >
              Sword 同时扩张到女性健康（Bloom）、心理健康（Mind）和全球地域（通过 Kaia 进入德国、通过 Surgery Hero 进入英国），打开了多条 TAM 向量，也扩大了复杂度。对一家约
              650-1,000 名员工的公司来说，一边整合 Kaia Health 的技术栈和会员基础，一边上线 Mind 并扩大 MSK，是一张雄心很强的运营议程。
