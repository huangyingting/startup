  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    description: Investment thesis and anti-thesis pillars for Sword Health.
    claimRefs:
      - CV005
      - CV006
      - CV007
      - CV017
      - CV018
    columns:
      - 支柱
      - 投资逻辑（乐观）
      - 反向逻辑（悲观）
      - 什么会改变判断
    rows:
      - - 临床证明
        - 覆盖 Walmart、Boeing 等 2,500+ 家雇主，满意度 85%、疼痛降低 74%、ROI 为 3.7:1
        - 所有结果指标均由公司自报；缺少 Hinge Health S-1 同等级别的独立精算验证
        - 独立精算机构在同行评议研究或雇主审计中验证 ROI
      - - 竞争地位
        - AI 优先、获 FDA 批准的平台；BLOOM / MIND 扩张；葡萄牙研发成本效率
        - Hinge Health IPO 后资本（$6.4B）、更大会员规模（4M vs 400K）、结果经精算验证
        - Sword Health 单季度从 Hinge Health 手中赢下 3+ 个具名 Fortune 500 客户
      - - 市场动态
        - $100B+ MSK TAM；BLOOM / MIND 平台扩张再增加 $200B+；雇主数字健康 CAGR 为 18%
        - 雇主数字健康供应商整合，压缩独立 MSK 供应商机会
        - BLOOM / MIND ARR 超过总 ARR 的 10%，证明平台协同
      - - 退出路径
        - 2028 年以 $500M+ ARR IPO；15-20x ARR = $7.5-10B；Series F 回报 2x+
        - 数字健康 IPO 市场到 2028 年仍不友好；老股交易只能以持平至下行估值完成
        - 以 $500M+ ARR、40%+ 增长、2+ 年 EBITDA 为正记录提交 IPO
      - - 单位经济
        - 2025 年现金流为正；NRR 70%+；无需稀释性融资即可走向盈利
        - 相比纯 SaaS，硬件成本模型限制毛利率；累计融资 $500M+ 暗示资本效率低于基准
        - 在 $400M ARR 规模维持毛利率 >70%，硬件单位成本随规模下降
