      - number: '5.2'
        title: 照护交付流程与临床整合
        blocks:
          - type: paragraph
            body: >-
              Sword 的照护交付模式，用结构化、AI 增强的数字路径替代传统同步线下物理治疗疗程。患者旅程从雇主或健康计划注册开始，随后由 AI 执行肌肉骨骼评估，生成个性化 8-to-12 周锻炼方案。成员每天使用
              Phoenix 可穿戴设备完成 AI 指导的锻炼；设备把实时动作数据传回 Sword 的 AI 引擎，用于纠正动作、计数和调整进阶。持证物理治疗师异步审阅训练数据——通常每周一次——并在 AI
              标记疼痛加剧、动作失准或临床风险信号时介入。路径最后以结果测量收尾：疼痛降低评分、功能评估和避免手术确认。

              Sword 发布了 43 篇同行评审临床研究来支持该模式，包括披露的参保人群平均 73% 疼痛降低，以及雇主合同中引用的避免手术率。Surgery Hero 收购整合了一条围手术期预康复路径，该路径已在 18 家
              UK NHS Trusts 中运行，把临床整合从雇主渠道延伸出去。Predict 模块作为临床决策支持层接入同一路径，在注册前把成员分层为适合保守治疗或适合手术的队列。

              临床升级路径从 AI 检出的风险信号开始，到异步 PT 审阅，再到急性风险确认后的值班临床医生介入。Mind 平台沿用同一结构，由 MindGuard
              为心理健康互动提供实时安全过滤，并针对自杀意念或危机指标设置升级协议。这套共享升级架构，是 MSK 和行为健康两条产品线共同的关键监管与责任管理设计选择。
