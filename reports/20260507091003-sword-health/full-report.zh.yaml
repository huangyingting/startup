  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Sword Health 主要服务的市场是数字化肌骨（MSK）护理——由 AI 驱动的虚拟物理治疗、伤害预防、盆底健康和手术风险评估项目——通过雇主和健康险计划福利渠道交付。该市场由数字软件、可穿戴设备和 AI
              支持的临床监督界定，用于替代或补充线下物理治疗和骨科护理。


              直接相关市场包括：面向慢性和急性 MSK 病症（背部、颈部、膝盖、肩部、髋部、四肢疼痛）的虚拟 / 数字物理治疗项目；盆底康复和女性盆底健康项目（Bloom）；伤害预防和运动健康项目（Move）；AI
              驱动的手术风险评估（Predict）；以及截至 2025 正在扩展的数字心理健康护理（Mind）和女性健康（扩展后的 Bloom）。收购 Kaia Health 后，公司增加了肺部康复这一相邻产品领域，以及德国
              DiGA 报销路径。


              核心数字 MSK 市场定义排除以下领域：线下物理治疗和骨科手术（现状替代方案）；缺少临床结果的传统员工健康项目；没有数字 PT 内容的健康教练平台（如 Virgin Pulse）；以及急性医院康复。与 Sword
              扩张路径相关的相邻市场包括数字心理健康（规模大：数字行为健康 TAM 约 $7B+）和女性健康。


              现状替代方案是线下物理治疗（每次 $40–150，通常每个疗程 8–15 次）、骨科专科门诊和手术（典型脊柱手术 $20K–$150K+）。给付款方的经济说法是：按每成员每月收费的数字 PT
              项目，通常通过减少手术、影像检查和专科转诊，带来 2–4x ROI。这套成本规避叙事是核心商业主张，也驱动雇主采购决策。
