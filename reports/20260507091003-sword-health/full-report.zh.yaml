  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入架构与 ARR 轨迹
        blocks:
          - type: paragraph
            body: >-
              Sword Health 是一家私营公司，尚未发布经审计财务报表。核心 ARR 数据点来自 CEO Virgílio Bento，他称截至 2025 ARR 为 $240M。管理层还声称自 2024
              起现金流为正，但尚未获得独立验证。媒体和分析师估计重建出的 ARR 轨迹大致为：2022 为 $100M、2023 为 $160M、2024 为 $200M、2025 为 $240M，意味着三年期复合年增长率约为
              34%。这些数字仅来自 CEO 表述和媒体报道；由于缺少经审计披露，不确定性较高。

              收入结构以 B2B SaaS 为主：自保雇主合同贡献大部分收入，健康险计划合作、政府付款方合同和直接面向消费者细分提供补充收入流。January 2026 以 $285M 收购 Kaia Health，估计新增
              $35M ARR，并将 Sword 可触达付款方组合扩展到心理健康和呼吸系统慢病管理。收购后，若整合没有造成实质流失，总 ARR 可能超过 $275M。2025 收购 Surgery
              Hero（价格未披露）增加了手术导航能力，但其对合并 ARR 的收入贡献未披露。公开信息不足以评估收入质量，因为客户层面队列数据、净收入留存率和合同期限数据均为私有。
