        - label: 退出时 ARR（$M）
          low: 300
          mid: 400
          high: 600
        - label: 退出 ARR 倍数（x）
          low: 9
          mid: 15
          high: 20
        - label: Series F 回报倍数（x）
          low: 0.7
          mid: 1.5
          high: 3
  - id: FV004
    type: kpi
    title: 投资 KPI
    summary: 围绕市场、证据、护城河、经济性、风险、估值和证据质量，对 Sword Health 做 IC 可用评分。
    layout: standard
    approximationNotes: 评分为基于章节综合的 1-5 分定性判断；不是公司披露评级。
    claimRefs:
      - CV001
      - CV010
      - CV020
      - CV024
      - CV025
    data:
      items:
        - label: 市场机会
          value: 4 / 5
          unit: score
          detail: $100B+ MSK TAM；BLOOM/MIND 带来 $300B+ 平台扩张空间；雇主数字健康 18% CAGR 顺风
        - label: 临床证据
          value: 3 / 5
          unit: score
          detail: 自报结果强（疼痛降低 74%，ROI 3.7:1），但没有独立精算验证
        - label: 竞争护城河
          value: 3 / 5
          unit: score
          detail: FDA 许可、400K 会员数据、NRR 强劲——Hinge Health IPO 后成了资金充足的强劲对手
        - label: 单位经济性
          value: 3 / 5
          unit: score
          detail: 现金流转正，雇主 NRR 70%+——相较纯 SaaS，硬件成本模型限制毛利率
        - label: 风险画像
          value: 2 / 5
          unit: score
          detail: 高：竞争替代、临床验证缺口、倍数压缩、IPO 时点
        - label: 估值纪律
          value: 2 / 5
          unit: score
          detail: 16.7x ARR 偏高；2x 回报需要 $8B 退出；概率加权毛回报 ~1.7x
        - label: 证据质量
          value: 3 / 5
          unit: score
          detail: 公开信息覆盖较好；关键指标（财务、股权结构表、临床审计）需要进资料室验证
appendices:
  - id: A
    title: Sword Health 融资历史与估值轨迹
    blocks:
      - type: paragraph
        title: null
        body: >
          Sword Health 的估值轨迹映射了数字健康市场周期：2015 创立于 Porto；2019 获得 Khosla Ventures 领投的 Series A；在 2021-2022 数字健康热潮中成长为独角兽；穿过
          2022-2023 数字健康融资修正仍保持增长；在 June 2025 以 $240M ARR、16.7x 倍数达到 $4B Series F。Series F 在 $4B 估值下只融了 $40M
          新股，说明公司并不需要大量一级资本——高估值融资更多是为了给老股流动性和 pre-IPO 定位树一个参考价。累计融资 $500M+，投资方包括 Khosla Ventures（Series A 领投）、General
          Catalyst（Series D、E、F 领投）、Transformation Capital（医疗 VC）、IVP（成长股权）、Comcast Ventures（战略 / 媒体）和 Founders
          Fund（Thiel 关联）。这些投资人都有数字健康经验，理解高溢价退出需要达到什么临床证据标准。
        claimRefs: []
  - id: B
    title: Hinge Health 对比与竞争背景
    blocks:
      - type: paragraph
        title: null
        body: >
          Hinge Health 的 February 2025 IPO，为数字化 MSK 平台立下了明确的公开市场基准。关键对比指标：Hinge Health 估值 $6.4B / ~25x ARR，拥有 500+
          雇主、4M+ 会员，并在 S-1 中披露了经精算验证的结果；Sword Health 为 $4B / 16.7x ARR，拥有 2,500+ 雇主和 400K 会员。按雇主客户数 / 估值看，Sword Health
          明显更高（估值折合每个雇主客户 $1.6M，Hinge Health 为 $12.8M），这意味着 Sword Health 的雇主平均可能更小，或 PMPM 合约价更低。会员规模差距（400K vs. 4M）意味着
          AI 模型的纵向训练数据相差 10x；两家公司都在投入下一代 AI PT 能力，这个劣势会复利放大。Hinge Health 的 IPO 后 资本、SEC 审计披露、经精算验证的结果主张，形成了竞争可信度缺口；Sword
          Health 必须在 2028 IPO 申报前靠独立临床验证补上。
        claimRefs: []
  - id: C
    title: 重新入场标准与监控框架
    blocks:
      - type: paragraph
        title: null
        body: >
          把建议从观察上调到买入，需要同时满足：(1) ARR 超过 $350M，YoY 增长高于 35%，并在连续两个季度更新中得到证明；(2) 独立精算机构验证 ROI ≥3:1、疼痛降低
          ≥65%，并发表在同行评议报告或由精算师签署的报告中；(3) 没有发生 Hinge Health 竞争替代事件（单季度流失 3+ 个具名 Fortune 500 账户）；(4) BLOOM/MIND ARR 贡献总
          ARR 的 >10%，证明平台协同成立；(5) EBITDA 连续两个季度为正。五项全部满足时，可在 Series G 或 pre-IPO、≤15x ARR 重新入场。若只满足 (1) 和
          (2)，启动尽调但不投入资本。若发生 (3)，重新评估并转为回避。按季度监控：雇主续约公告、Hinge Health 赢单、FDA AI/ML 指引更新，以及引用 Sword Health 结果数据的独立 MSK
          临床研究发表。
        claimRefs: []
