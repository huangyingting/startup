      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Virgílio Bento（CEO 兼董事长）是 Sword Health 最主要的战略声音；他是 Modern Healthcare 2024 年全球医疗健康 100
              位最具影响力人物榜单上唯一的葡萄牙籍人士，知名度较高。Bento
              拥有电气工程博士学位，是所有重大产品和融资公告的公开代言人。他围绕弟弟事故建立的个人故事，是媒体报道和投资者推介中的创始叙事，塑造了强品牌身份，也带来关键人物集中风险。


              Valentina Longo 于 2022 加入担任 CFO，此前曾在 Cerberus Capital Management 和 J.P. Morgan Chase 任职，释放出公司为机构资本市场和潜在
              IPO 做准备的信号。Jorge Meireles 担任 CTO。Vijay Yanamadala 是首席医疗官，为 FDA 沟通和雇主签约提供临床可信度。Beth Stevens 是首席法务官。联合创始人
              Márcio Colunas 担任首席战略官。Kyle Spackman 负责商业运营（CCO），Michael Krueger 负责市场营销。


              董事会成员包括 Virgílio Bento（创始人 / CEO）、Bruce Armstrong（Khosla Ventures Operating Partner）、Karin Ajmani（Progyny
              前总裁兼 CSO）和 Chris Bischoff（General Catalyst Managing Director）；Bischoff 在 June 2025 融资公告中公开提及其董事身份。CB
              Insights 人员数据还列出 Sapphire Ventures 的 Cathy Gao 和 Scott Rotermund。完整董事会构成和委员会结构未详细公开披露；这是一个尽调缺口。


              C-suite 之外的管理层深度包括 Marta Cardeano（AI Care Delivery Solutions SVP）、Neil Sharma（Partnerships EVP）、Natasha
              Prasad（Chief Experience Officer）和 Pavle Stojkovic（Chief People Officer）。公司在 October 2024 裁员
              17%，受影响更重的是面向治疗的临床人员；Sword 正转向更多由 AI 主导的护理交付，这也凸显公司从依赖人头的护理模式转向可扩展 AI 模型，并压缩临床医生与会员的比例。
