      - number: '3.4'
        title: 竞争护城河与切换成本
        blocks:
          - type: paragraph
            body: >
              Sword 的竞争护城河分几个层次。临床 IP：43 项已发表临床研究和 45+ 项专利覆盖 AI PT 模型、可穿戴传感器融合和临床算法，构成会随时间累积的有意义壁垒。新进入者需要 3–7 years
              才能复制这一临床证据组合。监管护城河：通过 Kaia Health 获得德国 DiGA 认证，以及在美国获得 FDA 注册，形成进入壁垒；DiGA
              尤其需要多年德国监管沟通，并要求持续维护临床证据。地理护城河：Atlas（150 个国家）和 Kaia 收购创造出竞争者尚未匹配的跨国雇主护城河。雇主层面的切换成本中到高：实施需要 3–6
              months，会员数据、临床历史和福利沟通材料必须迁移，而福利决策按年做出——失去续约意味着至少一年失去这段关系。数据网络效应：Sword 的 AI PT 会随 10M+ 次 AI
              课程积累的会员使用数据改善；没有相当课程量的竞争平台，在运动模式识别准确性上处于劣势。

              Hinge Health IPO 后的主要护城河，是其上市公司货币：可用股权做收购和合作，企业采购可信度提升，透明度也支持与风险厌恶买方签署多年合同。Hinge 约 1,000
              名物理治疗师网络是一种劳动密集型护城河——很难快速扩张，但也难以一夜复制。Sword 的风险在于，Hinge IPO 会加速其收购区域 PT 网络、技术资产或国际 MSK 平台的能力。Hinge
              的风险在于，Sword 的 AI 优先模式会随时间把真人 PT 交付商品化。
            claimRefs:
              - CP021
              - CP022
              - CP023
              - CP024
              - CP025
              - CP026
      - number: '3.5'
        title: 竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Sword Health 面临的主要竞争风险包括：（1）Hinge Health 的公开股权使其能够收购国际 MSK 平台或技术资产；（2）AI
              物理治疗成为标准数字健康功能后，出现商品化风险——UnitedHealth 的 OptumHealth、CVS/Aetna 或 Epic 集成可能中和 Sword 的 AI 差异化；（3）付款方 /
              保险计划市场整合削弱经纪人渠道权力；（4）Software as a Medical Device（SaMD） 框架下的 FDA 监管风险——Class II AI
              设备召回或不良事件公告可能损害临床可信度；（5）物理治疗师、AI 工程师和临床数据科学家的人才竞争。

              一个反向数据点：Sword 在 October 2024 裁员约 17%（主要是临床人员），可能是有意转向 AI 主导交付，也可能反映利润率压力——竞争者可借此讲述 Sword
              为降成本而降低临床质量的叙事。Hinge 在 Q1 2025 实现盈利并 IPO，让它有平台去主张自己是多年期企业合同中更安全、更可持续的合作伙伴。EHR 嵌入式竞争（Epic、Oracle
              Health）的长期风险真实存在，但距离有意义渗透 MSK 项目可能还有 5+ years。鉴于当前医疗 AI 投资水平，新的 AI 健康初创公司复制 Sword
              模式的近期风险受临床证据和监管壁垒限制，但不能排除。
