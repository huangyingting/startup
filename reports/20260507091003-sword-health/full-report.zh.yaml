      - number: '8.3'
        title: 情景分析与回报测算
        blocks:
          - type: paragraph
            body: >
              按 $4B Series F 入场的概率加权预期回报约为 1.7x 总回报，算法是加权乐观情景（25% × 3.0x）、基准情景（50% × 1.5x）和悲观情景（25% × 0.7x）。乐观情景（25%
              概率）假设 Sword Health 通过 MSK 加速增长以及 BLOOM 和 MIND 成功商业化采用，到 2027 实现 $600M ARR，并以 20x ARR IPO = $12B——相对 $4B 获得
              3.0x 回报。这要求未来两年维持 55%+ ARR CAGR，并证明 BLOOM/MIND 能把 TAM 逻辑从 $100B MSK 扩展到 $300B+ 平台。基准情景（50% 概率）假设到 2028 ARR
              为 $400M，维持 40% YoY 增长，以 15x ARR IPO = $6B——带来 1.5x 回报，前提是没有重大投资逻辑破裂事件，且 Hinge Health 竞争可控。悲观情景（25% 概率）假设
              Hinge Health 上市后的资本优势赢得主导企业市场份额，Sword Health 增长降至 25% YoY 以下，数字健康倍数压缩到 8-10x，IPO 延迟到 2030+ 且估值 $2.7B——对应
              0.7x、低于成本的结果。基准与悲观的关键差别，在于 Hinge Health 上市后优势是否转化为 Sword Health 的实质性收入流失，或 MSK 市场是否足够大，能支撑双寡头。Stat News 和
              Modern Healthcare 都强调了一个风险：随着 Hinge Health 经精算验证的 IPO 披露为行业设定新的证据质量标准，自报临床结果指标会受到雇主越来越严格的审视；如果 Sword
              Health 无法在 2026-2027 雇主合同续约周期前达到同等验证水平，续约率可能被压缩。
            claimRefs:
              - CV005
              - CV006
