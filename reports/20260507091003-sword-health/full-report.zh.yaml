  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与 B2B2C 模式
        blocks:
          - type: paragraph
            body: >
              截至 mid-2025，Sword Health 服务 2,500+ 家自保雇主客户和 17+ 家 Blue Cross Blue Shield 健康计划附属机构，覆盖 400,000+ 名已注册成员。公司的
              B2B2C 模式把雇主放在支付方和采购决策者位置，个体员工则是虚拟 MSK 治疗平台的终端用户。雇主通过年度健康福利预算支付访问费用，通常由
              HR/全面薪酬和福利管理团队管理。成员通过雇主福利门户免费使用平台，消除了消费者健康科技采用的主要障碍。该模式与美国自保雇主制度结构一致；约 65%
              受保员工处于自保计划下，因此美国是主要目标市场。地理集中是风险：美国雇主健康福利结构具有特殊性，Sword Health 的国际业务（UK 扩张正在推进）尚未扩大到实质性收入贡献。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU012
              - CU030
