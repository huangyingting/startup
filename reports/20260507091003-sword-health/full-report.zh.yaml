        - $4B / 16.7x ARR 已计入增长；升级到买入前，先观察 ARR >$350M 以及精算结果验证
      - - 置信度
        - 中
        - 临床证据可信、现金流为正；关键指标（毛利率、股权结构表）缺乏独立审计
      - - 风险评级
        - 高
        - Hinge Health IPO 后竞争、数字健康倍数压缩、临床验证未经审计
      - - 估值立场
        - 偏高
        - 16.7x ARR 安全边际有限；2x 回报需要以 $500M+ ARR、$8B 估值退出
      - - 决策含义
