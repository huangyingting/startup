  - id: FE001
    title: 技术栈架构
    type: stack
    layout: wide
    summary: >-
      Sword Health 技术栈分为五层：顶部是面向成员的硬件和应用，底部是集成与分销基础设施。Phoenix 可穿戴传感器和移动应用采集实时动作与症状数据。AI 护理引擎借助 Arbor LLM
      框架和计算机视觉模型处理数据。临床运营层（异步 PT 审核、Predict、On-Call）叠加在 AI 层之上。多模态数据平台存储并分析结果。集成层把 Sword 连接到雇主 HR 系统、EHR，以及 DiGA、NHS
      等国际监管框架。
    data:
      layers:
        - label: 成员交互层
          detail: >-
            Phoenix 可穿戴 IMU 传感器（Jun 2024）；Kaia Health 基于摄像头的运动应用（EU）；iOS/Android 配套应用；成员网页仪表盘；M-band 可穿戴设备（Mind
            平台）。这些面向成员的触点覆盖每日运动课程、AI 教练互动、症状追踪和进度可视化。
        - label: AI 护理引擎
          detail: >-
            Arbor LLM 框架：自研多智能体编排，支撑 Thrive、Bloom、Move、Mind 的对话式 AI 治疗和教练。计算机视觉 ML 分析动作姿态并计次数。MindGuard
            临床安全子系统用于行为健康互动。Predict ML 风险分层用于手术分流。截至 Feb 2026，已完成 10M+ 次 AI 会话。
        - label: 临床运营层
          detail: >-
            异步持证 PT 审核队列，包含 AI 生成的会话摘要和风险标记。临床人员门户用于调整运动处方并向成员发送消息。On-Call 24/7 急性损伤分诊由持证 PT 值守。Surgery Hero 围手术期路径已集成
            18 家 NHS Trusts。Predict 手术风险评分纳入注册决策。
        - label: 数据与分析平台
          detail: >-
            多模态数据管道摄取 Phoenix 可穿戴动作数据、患者报告结果（疼痛量表、功能评分、PROMIS）和理赔数据。AWS 上的数据仓库符合 HIPAA，并签有 BAA。结果分析引擎生成 Outcome Pricing
            证明材料和临床研究数据集。该数据资产已产出 43 项同行评议研究。
        - label: 集成与分销层
          detail: >-
            HRIS 集成（Workday、ADP、SAP SuccessFactors）用于雇主注册。EHR 连接器用于临床数据交换。福利平台 API（Optum、Aetna、BCBS network）。通过 Kaia
            Health 接入德国法定医保的 DiGA 监管集成。通过 Surgery Hero 覆盖 18 家 UK Trusts 的 NHS API 集成。Atlas 全球分销基础设施覆盖 150+ 个国家。
    claimRefs:
      - CE009
      - CE010
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
      - CE025
      - CE026
  - id: FE002
    title: 护理交付工作流
    type: flow
    layout: wide
    summary: >-
      Sword 的护理交付工作流把成员从雇主注册带到 AI 驱动初评、个性化方案生成、每日 AI 引导的可穿戴运动训练、每周异步 PT 临床审核、结构化结果测量，并可选择结业或持续维护。当 AI 标记风险信号，需要 PT
      审核和可能的 On-Call 干预时，临床升级会跳出线性流程。
    data:
      nodes:
        - id: enrollment
          label: 成员注册
          detail: 雇主或健康计划福利激活；身份验证；资格确认；HIPAA 同意
        - id: screening
          label: AI 肌骨筛查
          detail: AI 通过移动应用完成初始评估；采集疼痛位置、严重程度、功能受限、手术史、红旗症状
        - id: program
          label: 个性化方案生成
          detail: AI 生成个体化 8–12 周运动方案；计算 Predict 手术风险评分；高风险成员激活前会标记给 PT 审核
        - id: sessions
          label: 每日 AI 引导训练
          detail: 成员佩戴 Phoenix 可穿戴设备完成练习；AI 引擎通过 Arbor LLM 提供实时姿态反馈、计次数和激励式教练；会话数据传至云端
        - id: pt_review
          label: 每周异步 PT 审核
          detail: 持证 PT 审核 AI 生成的会话摘要和风险标记；需要时调整方案；向成员发送异步消息；发现急性风险时升级到 On-Call
        - id: outcomes
          label: 结果测量
          detail: 在方案里程碑收集 PROMIS 和病种特异 PRO；测量疼痛降低和功能改善；确认手术避免；触发 Outcome Pricing 合同结算
        - id: graduation
          label: 结业 / 维护
