      - number: '6.3'
        title: 留存、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              Sword Health 没有公开披露净留存率（NRR），但从 mid-2023 的 $100M ARR 到 mid-2025 的 $240M
              ARR，轨迹隐含了一个混合增长率：它同时来自新客户获取、现有账户内成员注册扩张，以及附加项目（BLOOM、MIND、Predict）的交叉销售。估计 NRR 为
              110-120%，反映出较强的基线扩张机制。BLOOM（女性盆底健康）和 MIND（心理健康 /
              疼痛共病）等附加项目，使雇主账户无需启动新的雇主销售周期也能扩张，是省资本的收入扩张杠杆。客户集中度是关键未知：考虑 Walmart、Boeing、Delta 等大客户员工数和 PMPM 收入潜力不成比例，前
              10 大雇主可能贡献 20-35% ARR。雇主合同通常为年度合同，CFO 每年都会用项目 ROI 做基准比较，因此续约时存在定期重新评估压力。12-18
              个月的雇主销售周期，在实施后自然形成切换成本；移除嵌入式福利平台需要重新采购、员工沟通和迁移管理，只要项目结果令人满意，雇主通常不愿承担这些成本。
