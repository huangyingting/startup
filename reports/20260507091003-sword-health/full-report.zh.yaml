      - number: '3.3'
        title: 比较分析
        blocks:
          - type: paragraph
            body: >
              Sword 和 Hinge 根本的战略分歧，在于 AI 优先（Sword）还是人类主导（Hinge）的临床交付模式。Sword 的 Phoenix 可穿戴设备和 AI 物理治疗师，尽量减少每名会员每个疗程需要真人
              PT 实时互动的次数——临床医生审核 AI 标记，而不是主持每次课程。这一模式瞄准更低的单会员成本和更高可扩展性。Hinge 的模式保留更厚的真人 PT
              层，主张真实临床医生保持中心地位时，临床结果和会员满意度更好。两家公司正面对比的公开临床证据有限；双方都引用各自赞助研究中的有利结果。

              定价上，Sword 的 Outcome Pricing 按记录下来的临床结果（疼痛降低、功能改善）向雇主收费，而不是固定 PMPM 订阅。这有差异化，但也带来收入确认复杂度——Sword
              必须证明结果才能开票，收入更具波动性。Hinge 采用传统 PMPM 模式（经纪人估计每名符合条件会员每月 $3–$6），可预测性更强，但内在上并不让激励与结果对齐。福利买方越来越偏好与结果挂钩的合同，这构成
              Sword 模式的商业优势。

              GTM 上，两家公司都依赖福利经纪人和顾问（Mercer、AON、Willis Towers Watson）作为大型自保雇主的中介。地理上，Sword 拥有显著国际优势：Atlas（150 个国家）和 Kaia
              Health（德国 DiGA 报销，覆盖 70M+ 人）让 Sword 触达 Hinge 尚未规模进入的欧洲市场。对寻求单一全球数字 MSK 供应商的跨国雇主来说，Sword
              是主要可行选择。监管姿态上，Hinge 和 Sword 的设备都作为 Class II 在 FDA 注册；Kaia Health 在德国的 DiGA
              状态代表欧洲最严格的数字健康监管批准之一——对竞争者是有意义的进入壁垒。
