      - number: '7.4'
        title: 财务、模式与市场扰动风险
        blocks:
          - type: paragraph
            body: >
              Sword Health 将 IPO 推迟到 2028+，带来财务风险：投资者回报测算要求 ARR 从 $240M 大幅增长到 $500-800M，并伴随估值扩张，才能支撑 $4B Series F
              入场价。数字健康融资市场在 H1 2025 收紧 25%，Teladoc、Alignment Healthcare 等先例市场调整说明，数字健康估值可以大幅压缩。GLP-1 市场扰动是中期尾部风险：GLP-1
              药物已被证明会降低肥胖相关关节疼痛，如果到 2030 年有 15-20% 的美国肥胖人群实现显著减重，肥胖相关 MSK 疾病发生率可能明显下降。Sword Health
              的应对方式是扩展到急性损伤、术后康复和非肥胖 MSK
              疾病——但这要求临床范围扩张，也带来自身的监管和产品开发风险。经济下行时，雇主福利成本压力是最接近的财务风险：数字健康福利是衰退周期中最早被削减的补充福利之一，会直接冲击 ARR
              留存，而流失可见性要等到年度续约周期才出现。
