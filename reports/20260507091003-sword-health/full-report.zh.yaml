      - number: '2.5'
        title: 图表
        blocks:
          - type: callout
            title: 庞大的底层 MSK 负担支撑持久需求
            body: >
              仅美国 MSK 医疗支出每年就超过 $380B——是按支出计最大的单一疾病类别。数字解决方案渗透率不到总量的 1%。Sword 的 $240M ARR 对私营公司而言亮眼，但只占模拟 MSK 成本池的
              <0.1%，说明即使市场份额提升有限，可用需求规模仍然很大。
            calloutType: strength
            claimRefs:
              - CM009
              - CM010
              - CM011
          - type: callout
            title: 使用率仍是市场的阿喀琉斯之踵
            body: >
              全行业数字 MSK 项目通常只能在符合条件员工中取得 10–30% 的加入率。低使用率直接限制雇主 ROI 主张，削弱留存逻辑，并在采购中形成持续商业异议。如果 Sword 无法证明参与率显著高于行业平均，其
              Outcome Pricing 模式的经济主张会面临可信度挑战。
            calloutType: risk
            claimRefs:
              - CM023
              - CM022
          - type: callout
            title: 德国 DiGA 是结构不同且被低估的渠道
            body: >
              Kaia Health 的 DiGA 认证让 Sword 进入政府强制报销路径，覆盖 70M+
              德国参保人——无需传统企业销售周期。不同于美国模式（需要经纪人主导的年度福利决策），德国模式允许医生处方的数字健康工具自动报销。它代表一种明显不同的收入模式：销售成本更低、留存可能更高，也可作为进入其他欧洲市场的复制模板。
            calloutType: insight
            claimRefs:
              - CM017
              - CM018
          - type: callout
            title: 独立证据缺口限制溢价定价能力
            body: >
              Sword 引用 43 项同行评审临床研究，但其中相当一部分由供应商赞助。大型自保雇主越来越要求独立精算证据来证明理赔下降。没有大规模独立 RCT 证据时，Sword
              在竞争中会部分依赖价格和关系，而不完全是差异化结果——这限制了它相对于 Hinge Health 和新兴竞争者维持溢价定价的能力。
            calloutType: risk
            claimRefs:
              - CM022
              - CM025
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Sword Health 所处竞争市场横跨五类对手：直接数字 MSK 同行、传统物理治疗连锁、相邻数字健康平台、替代方案（线下 PT、初级保健、疼痛管理）和现状（员工忍受疼痛、生产力下降）。直接数字 MSK
              细分由 Hinge Health 和 Sword Health 主导，Omada Health 以及 RecoveryOne、Reflexion Health 等小型进入者处于更低梯队。传统 PT 连锁——ATI
              Physical Therapy（NYSE: ATIP）、Select Medical/Select PT 以及区域服务商网络——代表传统替代方案；当它们开发远程医疗产品时，也构成间接竞争威胁。相邻竞争者包括
              Teladoc Health/Livongo（慢病管理）、Spring Health 和 Lyra Health（两者都在争夺 Sword 正在扩展的 Mind
              平台中的心理健康部分）。按规模看，最常见的有效竞争者仍是现状——员工在没有干预的情况下忍受慢性背痛或关节痛；雇主数字 MSK 项目的使用率通常只有已加入人群的 5–30%。

              在雇主福利渠道，采购决策通常发生在年度福利续约周期（September–December）。Sword 和 Hinge 都瞄准 5,000+ 名员工的自保雇主，因此在企业销售和经纪人 /
              顾问渠道形成显著正面竞争。福利买方评估的关键差异化因素包括临床结果数据（随机对照试验、同行评审研究）、定价模型透明度、会员参与度和使用率、与健康险计划合作伙伴（Aetna、Blue
              Cross、UnitedHealth）的集成，以及行政落地便利性。Sword（43 项临床研究、Outcome Pricing）和 Hinge（大型 PT 网络、NYSE
              上市）都在这些证明点上投入很重。Omada Health 以慢病覆盖广度竞争（糖尿病、高血压、MSK），而不是 MSK 深度；大型健康险计划有时把它打包成组合解决方案。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
      - number: '3.2'
        title: 直接竞争者深潜
        blocks:
          - type: paragraph
            body: >
              Hinge Health 是 Sword Health 最主要的直接竞争者。Hinge Health 成立于 2012，总部位于 San Francisco，并于 May 2025 在 NYSE 完成
              IPO（代码: HNGE）。Q1 2025，Hinge 报告收入 $123.8M，年化约 $495 million——接近 Sword $240M ARR 的两倍。Q1 2025 是 Hinge
              首个盈利季度，报告利润约 $17 million。IPO 前，Hinge 估值约 $6.2 billion，累计风险融资超过 $1 billion。Hinge 的临床模式由人主导：平台配备约 1,000
              名物理治疗师和健康教练，并辅以 AI 工具。核心产品包括 Balance（可穿戴传感器）、Guide（AI 教练）和 Care（真人 PT 课程）。Hinge 主要聚焦美国；相比 Sword 的 Atlas
              平台（150 个国家）和 Kaia 的欧洲 DiGA 覆盖，其国际扩张有限。

              Omada Health（成立于 2011，San Francisco）提供数字慢病项目，覆盖 MSK、2 型糖尿病预防和管理、高血压以及行为健康。Omada 于 June 2025 在 NASDAQ 完成
              IPO（代码: OMDA）。根据其 S-1，Omada 2024 财年收入约 $81 million，战略是打包慢病项目。Omada 在企业健康险计划和雇主渠道与 Sword 竞争，但以糖尿病项目切入，因此在核心
              MSK 细分中是部分威胁，而非主要威胁。

              对于 Sword 的 Mind 心理健康平台（June 2025 上线），关键竞争者是 Spring Health（融资 $500M+，2024 估值 $3.3B）和 Lyra Health（融资
              $900M+，2021 估值 $5.1B）。两者都提供面向雇主的心理健康福利项目，服务包括教练、治疗师和药物管理。Sword 在心理健康上的差异化在于跨平台集成：已经使用 Thrive MSK
              的会员可在同一应用中访问 Mind，从而提升参与度。不过 Mind 仍处早期；Sword 缺少 Spring Health 或 Lyra Health 那样深的心理健康临床网络。ATI Physical
              Therapy 拥有约 900 家线下诊所，FY2023 收入约 $725M，是数字 MSK 平台必须用经济性和结果去替代的传统线下替代者。
