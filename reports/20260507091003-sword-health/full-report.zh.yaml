      - number: '7.3'
        title: 临床证据与结果验证风险
        blocks:
          - type: paragraph
            body: >
              Sword Health 的核心商业叙事——74% 疼痛降低、3.7:1 ROI、为雇主节省 $1B+——依赖成员自报调查数据和模型化成本避免测算，尚未由精算师独立验证，也未发表在同行评审文献中。JAMA
              Internal Medicine 2024 年研究明确指出，自报数字 MSK 结果存在系统性夸大风险；Hinge Health 的 S-1 也明确把其精算认证 ROI 作为竞争差异化卖点。NCQA 的 2025
              数字健康证据标准，正把结果主张推向客观数据支持。如果大型雇主采购团队要求独立精算验证，而 Sword Health 无法提供，相比 Hinge Health 的竞争劣势会很明显。估计 15-25%
              的注册渗透率进一步增加了结果报告复杂度：选择注册的成员可能本来就有更高健康动机，因此结果好于总体符合资格员工人群，从而抬高项目有效性指标。
            claimRefs:
              - CR009
