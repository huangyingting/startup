      - number: '1.5'
        title: 图表
        blocks:
          - type: callout
            title: $4B 估值下实现现金流转正，在数字健康领域并不常见
            body: >
              Sword Health 声称在 $240M ARR 的同时实现现金流转正——对这一规模的私营数字健康公司来说，这一组合少见。这种财务状态支撑推迟 IPO 的策略，降低稀释压力，也为资本密集的 Kaia
              收购（$285M）提供筹码。如果经审计验证，投资逻辑相对于同行将明显降风险。
            calloutType: strength
            claimRefs:
              - CO024
              - CO025
              - CO026
              - CO032
          - type: callout
            title: 关键人物集中——Virgílio Bento
            body: >
              所有重大公告、媒体露出和战略转向都由创始人兼 CEO Virgílio Bento 统一对外。公司未披露继任计划，也没有公开的副
              CEO；一旦他离开，融资、企业合作和临床医生信任都可能受到实质损害。公司正处在多垂直扩张阶段，愿景一致性很关键，这会放大该风险。
