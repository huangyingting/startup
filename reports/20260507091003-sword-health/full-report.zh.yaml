      - number: '1.4'
        title: 规模、产品与里程碑
        blocks:
          - type: paragraph
            body: >
              Sword Health 的产品组合已从单一 MSK 项目扩展为多垂直的 AI Care 平台。核心产品包括：Thrive（慢性 MSK 疼痛和物理治疗）、Bloom（盆底和女性健康，March 2022
              上线，March 2026 扩展为完整 Women's Health Platform，覆盖更年期）、Move（伤害预防和运动健康）、Predict（基于 AI 的 MSK 手术风险评估，May 2023
              上线）、Atlas（覆盖 150 个国家的全球疼痛管理平台，late 2023 上线）、On-Call（24/7 临床专家访问）、Academy（数字疼痛教育）、Phoenix（对话式 AI 护理专家，June
              2024 上线）和 Mind（配备 M-band 可穿戴设备的心理健康平台，June 2025 上线）。


              截至 January 2026，Sword 报告三大洲已有 700,000+ 名会员完成超过 10 million 次 AI 课程；10 million 里程碑于 February 2026 庆祝。公司称拥有
              1,000+ 企业客户，避免了 $1 billion 不必要医疗成本，并获得 43 项同行评审研究和 45+ 项专利的临床验证。公司实现 $240M ARR 和现金流转正，CEO Bento 表示 IPO
              至少推迟到 2028。


              重大收购：Surgery Hero（英国术前康复初创公司，2025，与 18 家 NHS Trusts 整合）和 Kaia Health（数字 MSK 和肺部平台，$285M，January 28,
              2026）。Kaia 交易扩大了 Sword 的美国会员基数，并打开了德国数字健康报销路径（覆盖 70M+ 人）。一个反向事件：October 2024，Sword 裁员 17%（面向治疗的临床人员）。July
              2024，加速器公司 A2 Academy 提起诉讼，称根据 2014–2015 年与 Sword 签署的加速器协议，其应获得 5% 股权。
