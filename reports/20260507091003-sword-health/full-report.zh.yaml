      - number: '6.2'
        title: 具名客户证明与临床结果
        blocks:
          - type: paragraph
            body: >
              Sword Health 最可信的客户证据来自发布案例研究的锚定企业账户。Walmart 合作覆盖美国最大的自保劳动力之一，报告 MSK 相关手术率下降 47%，这是数字 MSK
              类别中影响最大的单一临床结果指标。Delta Air Lines 的结果验证了 Sword Health 适用于体力要求高、以小时工为主的航空和维修人群。Boeing
              合作把这一验证延伸到航空航天制造环境。Target 案例研究记录了零售员工缺勤和工伤赔偿索赔的下降。放到整个客户基础看，Sword Health 报告平均疼痛降低 74%、成员满意度 85%、雇主 ROI 为
              3.7:1。但 ROI 方法依赖内部项目数据和模型化成本避免测算；尚未发布规模化独立精算验证。同行评审医学文献（American Journal of Preventive Medicine
              及可比期刊）确实支持一个总体结论：对于轻中度 MSK 疾病，数字物理治疗可取得不劣于线下 PT 的结果，为底层模式提供了部分科学验证。
