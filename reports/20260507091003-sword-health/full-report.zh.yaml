      claimRefs: []
  foundingLocation: Porto, Portugal
  headquarters: New York, NY, USA
  productSummary: >
    Phoenix AI：获 FDA 510(k) 许可的 AI 物理治疗平台；Qualcomm Snapdragon 运动传感器硬件 + 移动应用；30+ 个 AI
    模型，用于实时纠正运动姿势、调整课程和追踪疼痛。每次课程无需持证物理治疗师参与即可自主完成。BLOOM：面向女性 MSK 病症的盆底健康项目；正在扩展到产前 / 产后护理。MIND：整合心理健康与疼痛共病的项目，结合 CBT、正念和
    AI 教练。Predict：雇主分析平台，用于结果预测、使用率和 ROI 报告。分销：直接雇主销售（2,500+ 客户）加健康险计划合作（17+ 个 BCBS 计划）。
  customerFocus: >
    两条主要渠道：（1）自保雇主——2,500+ 企业客户，包括 Walmart、Target、Boeing、Delta Air Lines、Delta Faucet；福利负责人和 CFO
    是经济买方；合同按年签。（2）健康险计划——17+ 个 Blue Cross Blue Shield 计划；合作对象包括人群健康管理和雇主福利伙伴。400K+ 已加入会员产生纵向临床数据，用于改进 AI 模型。
  businessModel: >
    面向雇主和健康险计划采用每成员每月（PMPM）定价，部分合同带有基于结果的组成部分。硬件（运动传感器套件）包含在项目费用中或由公司补贴。雇主账户报告净收入留存率（NRR）为 70%+。自 mid-2025 起现金流转正。IPO
    目标是在 2028、ARR 超过 $500M，并已展示 2-3 years 盈利增长后推进。
  stage: Late-stage private; cash-flow positive; pre-IPO 2028 target
  fundingStatus: >
    6 轮累计融资 $500M+。Series A（2019，Khosla Ventures）、Series B（2021）、Series C、Series D、Series E、Series F（$40M，June 2025，$4B
    投后估值）。投资者包括 General Catalyst、Khosla Ventures、Transformation Capital、IVP、Comcast Ventures、Founders Fund。Series F
    规模较小（$40M）但估值较高（$4B），反映单位经济模型强劲——公司不需要大规模新股融资。
