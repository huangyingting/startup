      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              自 2018 种子轮融资以来，Sword Health 已完成多轮融资。截至 January 2026 宣布收购 Kaia Health 时，公司累计融资超过 $500 million。早期轮次由 Khosla
              Ventures 领投（Series A, 2019），该机构参与了此后每一轮主要融资。General Catalyst 在 Series D（December
              2021）中成为领投方，并领投了最近两轮（Series E, June 2024；Series F, June 2025）。


              里程碑：Seed $4.6M（2018）→ Series A $8M，估值未披露（2019，Khosla Ventures）→ Series B $25M（2020）→ Series C $85M，估值
              $1.8B（June 2021）→ Series D $163M，估值 $2B（December 2021，General Catalyst、BOND、Khosla）→ Series E $130M，估值
              $3B（June 2024）→ Series F $40M，估值 $4B（June 2025，General Catalyst 领投；Khosla Ventures、Comcast Ventures、Lince
              Capital、Oxy Capital、Armilar、Indico Capital、Shilling 参投）。累计股权融资超过 $500M（包括 Series E 的新股和老股交易所得）。


              June 2025 Series F 值得注意：新股融资规模相对较小（$40M），同时发布 Mind 心理健康平台，说明公司并不缺资本，更像是寻求估值上台阶和战略伙伴对齐。CEO Bento
              表示公司现金流为正，IPO 至少推迟到 2028。公司 Series E 新闻稿称 $130M 由新股和老股交易所得混合构成，表明部分内部股东获得流动性。Transformation
              Capital、Founders Fund 和 Comcast Ventures 也出现在公司材料的投资者名单中。
