      - number: '6.4'
        title: 采用动态与成员参与度
        blocks:
          - type: paragraph
            body: >
              Sword Health 和所有数字 MSK 提供商的核心挑战，是把符合资格的员工转化为活跃用户。雇主合同价值由符合资格的人头数驱动，但结果和 ROI
              取决于成员激活和完成。行业数据表明，数字健康项目在符合资格员工中的注册率为 15-25%，也就是说，大多数已签约员工从未真正使用平台。Sword Health
              尚未公开披露注册渗透率或项目完成率。Trustpilot 和 G2 上的成员体验偏正面（平均 4+ 星），用户称赞传感器指导的锻炼和 PT
              可获得性，但常见投诉包括传感器硬件校准问题，以及希望增加实时视频会话。成员流失风险真实存在：如果成员在取得临床结果前停止参与，雇主续约时感知到的项目 ROI 会下降，流失风险上升。到 2025 年，37%
              的美国大型雇主已采用数字 MSK 项目（Willis Towers Watson），这表明市场快速采用已把 Sword Health 从开创品类，推向一个竞争加剧的市场，需要与 Hinge Health
              等玩家争夺续约和新客户。
