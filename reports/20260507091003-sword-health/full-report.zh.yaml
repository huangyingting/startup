      - number: '5.3'
        title: 技术架构与 AI 栈
        blocks:
          - type: paragraph
            body: >-
              Sword 的技术栈由三层自研基础设施组成：Phoenix 可穿戴 IoT 设备、Arbor LLM 编排框架，以及整合可穿戴传感器数据、患者报告结果和理赔数据的多模态数据管线。

              Phoenix 可穿戴设备使用惯性测量单元（IMU）传感器，以临床精度捕捉完整的三维关节运动，并通过 Bluetooth 把数据传输到配套 iOS/Android app。Kaia Health
              平台提供互补的计算机视觉方案——使用标准智能手机摄像头和姿态估计算法，在没有可穿戴设备的情况下指导运动；这对全球市场和无障碍使用场景有意义。January 2026 收购后，这两种不同传感器模态构成主要整合挑战。

              Arbor LLM 框架是 Sword 自研的多智能体编排栈，支撑 Thrive、Bloom、Move 和 Mind 的对话式 AI 治疗。Arbor
              协调专门子智能体，分别处理初始评估、运动处方、动机支持、临床升级标记和结果测量。MindGuard 是 Mind 平台内的安全子系统，为敏感心理健康互动执行实时过滤和临床升级规则。

              云基础设施运行在 AWS 上，并已签署 HIPAA Business Associate Agreements。Sword 报告有 45+ 项专利已申请或获批，覆盖 AI
              治疗方法、可穿戴传感器设计和临床协议。SOC 2 Type II 认证覆盖面向美国的平台。FDA 监管分类仍是未决问题：Phoenix 可穿戴设备和 AI 指导治疗功能可能被归为 General Wellness
              设备，也可能根据 21 CFR Part 880 被归为 Software as a Medical Device（SaMD），这会实质性影响标签、临床验证和上市后监测义务。截至 May 2026，Sword
              没有公开 GitHub 组织，也未发布面向开发者的 API 文档。
