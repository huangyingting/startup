      - number: '4.4'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >-
              2018 through 2025 期间，Sword Health 通过 7 轮股权融资累计融到超过 $500M。2018 种子轮融资 $4.6M；April 2019 完成 $8M Series
              A，Khosla Ventures 领投；2020 完成 $25M Series B；June 2021 以 $1.8B 估值完成 $85M Series C；December 2021 以 $2B 估值完成
              $163M Series D，General Catalyst、BOND Capital 和 Khosla Ventures 参投；June 2024 以 $3B 估值完成 $130M Series
              E，General Catalyst 领投；June 2025 以 $4B 估值完成 $40M Series F，General Catalyst 再次领投。General Catalyst 自 Series C
              起每轮都参与，是主导机构投资者。Khosla Ventures 和 BOND Capital 持有有意义但较小的股份。

              Kaia Health 收购于 January 2026 以 $285M 交割，资金来自公司资产负债表，并可能辅以额外融资，但具体支付组合未公开披露。2025 年 Surgery Hero
              收购价格未披露，代表又一笔 M&A 相关资本投入。管理层已推迟 IPO 计划，信号指向 2028 年前不会公开上市。按 $4B Series F 估值和超过 $500M 累计融资看，Sword
              具备一段能从烧钱速度反推的经营历史：公司运营史中部署的总资本加上 Kaia 收购金额看起来相当可观，因此现金流为正的说法对未来资本充足性叙事很关键。公开披露中未见债务工具、可转债或项目融资义务。主要或有负债是
              A2 Academy 股权诉讼，该诉讼主张 5% 股权；按 $4B 估值，对应潜在 $200M 风险敞口，截至 May 2026 仍未和解或解决。
