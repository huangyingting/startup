      - number: '4.3'
        title: 单位经济模型与资本效率
        blocks:
          - type: paragraph
            body: >-
              Sword Health 未披露毛利率、EBITDA、获客成本、客户终身价值或净收入留存率。作为参照，与 Sword 类似的数字健康物理治疗平台通常可实现 60–75% 毛利率，低于纯软件
              SaaS，因为存在临床监督成本、传感器硬件和护理管理人工。Sword 的 AI 优先交付模式——Phoenix 可穿戴传感器结合 AI 物理治疗课程，并由真人 PT
              在人群层面而非每次课程层面监督——明确设计为相较 Hinge Health 等人力密集型竞争者降低护理交付边际成本。Phoenix 平台已处理超过 10 million 次 AI
              课程，管理层将其作为交付成本运营杠杆的证据。

              October 2024 约 17% 的裁员（约 170 名员工）将员工数从约 1,200 降至 1,000。管理层称这是向 AI 驱动效率重组，而不是财务压力信号，但没有提供财务细节来证明该说法。管理层称自
              2024 起现金流为正，这与 June 2024 Series E 到 June 2025 Series F 之间没有新一轮新股融资相吻合；但相对于既有资本基础，$40M Series F
              规模足够小，也可能是防御性融资而非增长资本。考虑到项目扩展模式，企业账户净收入留存率估计可能高于 100%，但没有已披露 NRR 数据。获客成本未知。Kaia 收购价格为
              $285M，由资产负债表支付并可能辅以融资，这说明交易前 Sword 现金储备可观，近期流动性压力有限。
