      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              Sword Health 的商业模式面向三类主要买方。最大且最成熟的是自保雇主渠道：大型美国企业（通常 1,000+ 名员工）自行承担员工健康理赔。HR
              福利经理、首席人力资源官和（大型公司中的）首席医疗官推动采购决策。雇主是买方，员工是用户。付款方是雇主的自保健康基金。采用触发点：MSK 理赔成本高，每年超过 $10M+，通常在年度福利经纪人复盘中浮现，或由
              Sword 的 CCO 领导的企业销售团队直接触达。


              第二条渠道是健康险计划 / 管理式医疗组织：商业保险公司和自保健康险计划（如 Aetna、UnitedHealth、Blue Cross Blue Shield 计划）购买或白标数字 MSK
              工具，把它作为覆盖福利提供给其雇主客户或个人会员。健康险计划合作比直接雇主销售扩张更快，但会带来中介利润压力。Sword 的 Outcome Pricing 模式在这里尤其有价值，因为它让激励与精算风险降低对齐。


              第三条且正在兴起的渠道是国家医疗系统和政府付款方：英国 NHS（Sword 通过 Surgery Hero 进入，目前有 18 家 NHS Trust 合作）和德国 DiGA 报销路径（通过 January
              2026 收购 Kaia Health 进入）。德国 DiGA 路径覆盖 70M+ 参保人，提供了美国不存在的监管报销渠道。国际政府付款方细分是一个结构上不同的增长向量，定价和证据要求也不同（德国要求认证为
              Digitale Gesundheitsanwendung）。


              通过 Atlas 平台（覆盖 150 个国家）和 On-Call 24/7 访问，公司也有一小块直接面向消费者的业务，但在企业优先商业模式下，这不是主要收入驱动因素。
