      - number: '3.6'
        title: 图表
        blocks:
          - type: callout
            title: AI 优先护城河与 Outcome Pricing 差异化
            body: >
              Sword Health 的 Phoenix AI 可穿戴设备和 AI 物理治疗师，是数字 MSK 细分中最先进的 AI 优先临床交付模式。结合 43 项临床研究、45+ 项专利和 10M+ 次 AI
              课程的自有数据集，Sword 已搭起临床证据组合，新进入者需要 3–7 years 才能复制。Outcome Pricing 让 Sword 的商业激励以 Hinge 的 PMPM
              模式无法做到的方式与雇主利益对齐；收购 Kaia Health 还通过德国 DiGA 认证提供独特的欧洲监管护城河，覆盖 70M+ 法定医保人群。
            calloutType: strength
            claimRefs:
              - CP021
              - CP022
              - CP023
          - type: callout
            title: Hinge Health IPO 造就资金充足、资质更强的对手
            body: >
              Hinge Health May 2025 NYSE IPO 改变了竞争格局。Hinge 现在拥有可作为收购货币的公开股权、更强的企业可信度，以及在风险厌恶型 Fortune 500
              福利决策中重要的先发上市公司身份。Hinge 年化收入约 $495M（约为 Sword ARR 的两倍），可在销售、市场和 AI R&D 上比 Sword 投入更多。Sword October 2024
              裁员可能给 Hinge 带来销售叙事优势。如果 Hinge 收购一家国际 MSK 平台或欧洲 DiGA 认证竞争者，Sword 的地理护城河可能明显收窄。
            calloutType: risk
            claimRefs:
              - CP027
              - CP028
              - CP029
          - type: callout
            title: AI 商品化与 EHR 替代风险
            body: >
              随着 AI 物理治疗越来越标准化，商品化风险上升。大型健康险计划（UnitedHealth OptumHealth、CVS/Aetna）和 EHR 供应商（Epic、Oracle
              Health）拥有数据资产、临床关系和分销能力，可以用接近零边际成本把数字 MSK 嵌入标准护理路径。如果发生，独立数字 MSK 平台——Sword 和 Hinge 都包括在内——可能在 5–7 years
              内面临定价压缩和渠道去中介化。FDA SaMD 监管审查又在商品化威胁之上增加了执行风险。
            calloutType: risk
