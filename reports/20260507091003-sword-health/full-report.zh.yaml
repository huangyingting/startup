      - number: '2.2'
        title: TAM、SAM 与市场规模
        blocks:
          - type: paragraph
            body: >
              多家独立市场研究出版商估算了全球数字 MSK 护理市场。Grand View Research 将 2024 年全球市场规模定为 $4.44B，并预计以 17.7% CAGR 增长，到 2030 年约达
              $11.6B。Strategic Market Research 估计 2024 年市场为 $4.1B，CAGR 为 22.4%。Emergen Research 和 MediTech Insights
              给出的估计也在 $4.1–4.5B 区间内。这些估计反映数字 MSK 解决方案的软件、平台和可穿戴硬件收入，主要集中在北美和欧洲。


              用美国雇主市场做自下而上的 SAM 视角：约 17,000 家拥有 100+ 名员工的美国自保雇主，是数字 MSK 平台的目标可触达基数。若大型自保雇主按 $5–15 PMPM 为数字 MSK 福利付费，并覆盖约
              40% 受影响员工，仅美国雇主自保细分市场就是数十亿美元级 SAM。Hinge Health 的 S-1 提到，MSK 是自保雇主最大的单一成本驱动因素，约占每名员工每年 $693 的医疗成本。Sword 声称的
              SOM 获取——1,000+ 企业客户和 $240M ARR——意味着其约占当前全球数字 MSK 市场收入份额的 5–6%。


              更广义的「模拟」MSK 市场（MSK 医疗总支出）大几个数量级：AHRQ 数据估计，美国 MSK 直接医疗支出在 2016 为 $380.9B，是最大的单一支出类别。加上生产力损失和间接成本，美国 MSK
              总负担估计每年达 $600 billion。这说明，如果数字 MSK 平台能替代线下护理并拿下有意义份额，潜在 TAM 是数千亿美元级机会，当前仍大多未被开发。


              重要的是，市场估计存在矛盾：一些分析师报告（Research and Markets）将全球数字健康 MSK 市场按更宽口径估得更高，2023 为
              $6–8B，纳入可穿戴设备和骨科数字工具。其他机构（Technavio）则聚焦更窄子细分市场。投资者应跨方法交叉校验，而不是依赖任何单一估计。
