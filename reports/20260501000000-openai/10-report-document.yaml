  - number: '9.5'
    title: Public and private comparables plus valuation framework
    blocks:
    - type: paragraph
      title: Public and private comparables plus valuation framework
      body: The most defensible valuation method available in the retained ledger is to start with the last closed financing mark and cross-check it against the best public revenue anchor [C014][C017][C046]. That yields an implied value-to-revenue multiple of about 46.2x at the $157B October 2024 round. The reported January 2025 discussions at $340B are useful as sentiment data, but because the evidence does not show that round as closed, they should not be used as the primary underwriting mark [C016][C046]. Public comparable analysis remains intentionally partial because the retained evidence does not provide a fully defensible peer-multiple dataset; Microsoft is strategically relevant but not quantitatively sufficient as a single comp bridge [C011][C013][C017]. The correct discipline is therefore to keep precision low, use sensitivity tables rather than false target prices, and default to track over forced conviction.
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C011
      - C013
      - C014
      - C016
      - C017
      - C046
  - number: '9.6'
    title: Final recommendation and kill criteria
    blocks:
    - type: paragraph
      title: Final recommendation and kill criteria
      body: 'Recommendation: track. OpenAI is one of the strongest strategic AI assets visible in the retained evidence, but the latest closed valuation already embeds a premium outcome and the unresolved risk stack is too large to ignore [C014][C017][C019][C022][C046]. The investment becomes more attractive if the company provides definitive governance/control documentation, board-level financials, and a cleaner view of Microsoft contractual concentration and litigation exposure [C011][C017][C041][C045]. The kill criteria are explicit: fail diligence if control rights remain opaque, if Microsoft dependence worsens materially, or if regulatory or copyright matters take a meaningfully adverse turn without valuation re-pricing [C011][C036][C037][C038][C039][C040][C045]. Until then, the right stance is to monitor closely rather than chase premium valuation momentum.'
