  - number: '7.3'
    title: Segmentation, use cases, and customer proof
    blocks:
    - type: paragraph
      title: Segmentation, use cases, and customer proof
      body: 'OpenAI''s customer surface is best understood across four evidence-backed segments: consumers, paid corporate users, developers, and the education/community ecosystem [C008][C019][C022][C052]. Consumers use ChatGPT for search, voice, image, learning, and professional workflows according to official app descriptions [C047]. Corporate users buy Team, Enterprise, and Edu access and can move into custom-model or assisted fine-tuning engagements [C019][C020][C021]. Developers access the Responses API and official SDKs, while ecosystem programs around Codex and student credits aim to deepen future platform attachment [C022][C028][C029][C030][C031][C052]. What the retained ledger does not provide is named customer case-study evidence or customer lists, so reference-account diligence remains a critical next step.'
      calloutType: null
      tableRef: null
      figureRef: null
