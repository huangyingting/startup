  - number: '6.2'
    title: Product platform overview
    blocks:
    - type: paragraph
      title: Product platform overview
      body: The retained evidence supports viewing OpenAI as a broad AI product platform with multiple entry points [C006][C007][C022][C026][C027][C050]. End users interact through ChatGPT web and mobile; developers build through the Responses API and official SDKs; software teams can adopt Codex for coding workflows; and third parties can distribute through ChatGPT apps and adjacent commerce surfaces [C007][C008][C022][C026][C027][C050]. This breadth matters because it lets OpenAI compete simultaneously for direct usage, developer standardization, workflow ownership, and ecosystem distribution.
