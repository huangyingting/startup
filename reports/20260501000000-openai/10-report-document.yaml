startupIntroduction:
  summary: OpenAI is a late-stage private AI company founded on 2015-12-08 and headquartered in San Francisco, California [C002][C004]. Public sources describe a hybrid nonprofit/for-profit structure and a founding group centered on Sam Altman, Greg Brockman, Ilya Sutskever, Elon Musk, and other early researchers/operators [C003][C005]. Its current commercial surface spans ChatGPT, the OpenAI API, Codex, image generation, realtime voice, and Sora video tooling, monetized through subscriptions, in-app purchases, enterprise offerings, and API usage [C006][C008][C022][C025][C043]. OpenAI remains strategically intertwined with Microsoft, which is described in official partner materials and filings as OpenAI's long-term partner and exclusive cloud provider [C011][C012][C013]. The latest closed valuation supported by fetched evidence is the October 2024 $157B post-money financing, while larger 2025 valuation figures remain reported discussions rather than closed rounds in the retained evidence
    set [C014][C016][C046].
