  - number: '8.6'
    title: Mitigation summary and investor monitoring
    blocks:
    - type: paragraph
      title: Mitigation summary and investor monitoring
      body: The evidence does show real mitigants. OpenAI has strong financing access, broad investor support, visible enterprise adoption, and a deep Microsoft relationship that provides scale support [C014][C015][C019][C011][C013]. Those mitigants, however, do not neutralize the need for strict investor monitoring. The most important pre-close gates are definitive governance/control documentation, Microsoft contractual clarity, litigation and regulatory case updates, and board-level financial disclosure [C017][C037][C039][C040][C045][C046]. If any of those gates deteriorate rather than improve, the appropriate response is to pause diligence or tighten valuation expectations rather than average through uncertainty.
