    - '[C011][C013][C017][C037]'
    - Request infrastructure, exclusivity, pricing, capacity, termination, and change-of-control terms.
  - - Legal and regulatory overhang
    - EU, FTC, and copyright matters remain unresolved and could affect economics, flexibility, or exit timing.
    - '[C036][C037][C038][C039][C040]'
    - Request counsel memo, reserves and scenario analysis, plus board-level monitoring cadence.
