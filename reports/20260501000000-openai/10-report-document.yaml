    - type: paragraph
      title: Unit economics, margin trajectory, and what remains unknowable
      body: 'Public pricing proves that OpenAI has strong monetization surfaces, but pricing alone does not resolve unit economics [C020][C023][C024]. The retained ledger does not disclose gross margin, contribution margin, CAC, LTV, payback, burn multiple, churn, or NRR, so none of those should be filled with proxy numbers in an investor memo [C017][C043]. Margin trajectory is also hard to underwrite from public evidence alone: OpenAI likely benefits from software-style scale on seat expansion and developer adoption, yet that potential is counterbalanced by heavy compute dependence on Azure and undisclosed inference costs [C011][C013][C017]. The right diligence posture is therefore to distinguish reported pricing power from unverified profitability.'
