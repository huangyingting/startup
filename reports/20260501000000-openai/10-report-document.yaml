  - number: '7.6'
    title: Exact diligence asks
    blocks:
    - type: paragraph
      title: Exact diligence asks
      body: 'To move from adoption proof to retention underwriting, investors should request: monthly active users and paid conversion by consumer cohort; enterprise customer counts by contract size and vertical; GRR and NRR by segment; logo churn and expansion bridges; top-customer concentration; developer usage-retention cohorts; and at least several reference calls covering Team, Enterprise, API, and custom-model deployments. The retained evidence is strong enough to justify those asks because it already shows large-scale usage and paid adoption, but not enough to answer them directly [C009][C010][C019][C022][C028][C052].'
