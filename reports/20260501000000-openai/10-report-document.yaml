- id: T302
  title: Evidence-led feature matrix
  columns:
  - Capability dimension
  - OpenAI evidence
  - Microsoft comparison
  - Substitute-class comparison
  - Assessment
  rows:
  - - Consumer distribution
    - ChatGPT has official mobile apps and company-claimed hundreds of millions of users; the iOS app showed 6.9 million ratings [C008][C009][C010].
    - Retained evidence shows Microsoft embedding OpenAI-backed AI into multiple Microsoft products, but does not provide comparable end-user adoption figures in this ledger [C013].
    - Frontier-model and self-hosted substitutes may lack equivalent evidence-backed consumer reach in the retained set.
    - Advantage OpenAI on available evidence [C008][C009][C010][C013].
  - - Enterprise monetization
    - Team pricing, customization offerings, and 1 million paid corporate users are explicit in the retained evidence [C019][C020][C021].
    - Microsoft has major enterprise channels and Azure resale exposure to OpenAI revenue, but the ledger does not isolate a direct seat-for-seat benchmark [C013][C017].
    - Embedded-suite substitutes are structurally credible, but the ledger does not support quantified parity claims.
    - Advantage OpenAI on disclosed traction; direct incumbent parity remains unknown [C017][C019][C020][C021].
  - - Developer platform depth
    - OpenAI exposes official SDKs, pricing, tools, and a large GitHub/PyPI footprint [C007][C022][C023][C024][C028][C029][C030][C031].
    - Microsoft comparison is strongest at infrastructure/distribution, not in an independently benchmarked developer-tool stack within this ledger [C011][C013].
    - Open-source or self-hosted substitutes are strategically relevant where portability matters, but the ledger does not provide a named competitor feature-by-feature fact set.
    - Strong OpenAI moat signal in developer mindshare and platform completeness [C007][C022][C028][C031].
  - - Workflow breadth beyond base models
    - OpenAI shows coding agents, apps, commerce, image, video, and tool use in current docs [C022][C025][C026][C027][C050].
    - Microsoft has product embedding via Azure/OpenAI integration, but the ledger does not document an equivalent end-to-end app/store/commerce stack for direct comparison [C013].
