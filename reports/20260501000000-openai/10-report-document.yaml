  - number: '9.4'
    title: IPO and exit readiness
    blocks:
    - type: paragraph
      title: IPO and exit readiness
      body: 'On scale, product breadth, and market visibility, OpenAI already looks like a public-market-scale asset [C019][C022][C049]. On governance, audited disclosure, and legal cleanliness, it does not yet look public-market ready from the retained evidence alone [C017][C036][C037][C038][C039][C040][C041][C045]. That distinction matters for exit framing: an IPO is strategically plausible, but the company would still need to clear material disclosure and governance hurdles before it would deserve a traditional public-software underwriting framework.'
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
