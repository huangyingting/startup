  - number: '5.3'
    title: Reported financial anchors and what can be derived
    blocks:
    - type: paragraph
      title: Reported financial anchors and what can be derived
      body: 'The best public financial anchor in the retained ledger is the June 2024 report that OpenAI was on track for about $3.4B of 2024 revenue, including about $200M from Microsoft''s Azure resale share [C017]. That enables a narrow but useful disclosed-component calculation: Azure resale would represent about 5.9% of that reported revenue pace if both numbers are measured on the same basis [C017]. Separately, Team pricing creates a clean list-price unit anchor of $300 to $360 per seat-year depending on billing cadence [C020]. Combining that list price with the reported 1M paid corporate users yields a low-confidence illustrative range of $300M to $360M of annualized revenue only under the simplifying assumption that every paid corporate user sits on Team list pricing, which the evidence does not support because the user base spans Team, Enterprise, and Edu with unknown discounting [C019][C020]. This is therefore a directional floor exercise, not an estimate of actual ARR.'
