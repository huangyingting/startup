  - number: '8.2'
    title: Risk overview
    blocks:
    - type: paragraph
      title: Risk overview
      body: OpenAI's risk profile is best understood as a combination of structural concentration risk and unresolved external-overhang risk [C011][C036][C037][C038][C039][C040][C041][C045]. On one side, the company has unusually strong evidence of product breadth, enterprise demand, and financing access, which lowers ordinary startup risks around market adoption and capital availability [C014][C017][C019][C022]. On the other side, the company remains exposed to concentrated dependence on Microsoft, unresolved antitrust review, active copyright litigation, and incomplete public visibility into governance and control terms [C011][C037][C039][C040][C045]. The resulting investor conclusion is not that OpenAI is too risky to own, but that it requires more explicit downside gating than a typical late-stage software investment [C014][C046].
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C011
      - C014
      - C017
      - C019
      - C022
