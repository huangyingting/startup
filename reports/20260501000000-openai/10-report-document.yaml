  - number: '7.2'
    title: Customer base overview
    blocks:
    - type: paragraph
      title: Customer base overview
      body: The evidence base supports a very large but heterogeneous customer footprint [C009][C010][C019]. On the consumer side, OpenAI claims ChatGPT serves hundreds of millions of users, and the iOS app rating volume adds a credible external signal of scale [C009][C010]. On the enterprise side, Bloomberg via The Verge reported 1M paid corporate users across Team, Enterprise, and Edu by September 2024, which is unusually strong paid-adoption proof for a private software company at this stage [C019]. The developer base is also strategically important, with official SDKs, a broad API/tool stack, and high-adoption GitHub assets indicating meaningful ecosystem reach even without disclosed customer counts [C007][C022][C028][C029][C030][C031].
