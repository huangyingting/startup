  - number: '3.3'
    title: TAM / SAM / SOM analysis under evidence constraints
    blocks:
    - type: paragraph
      title: TAM / SAM / SOM analysis under evidence constraints
      body: 'A conventional VC diligence chapter would normally include top-down dollar TAM, serviceable segments, and near-term share capture. The retained OpenAI evidence does not justify that level of numeric specificity, so the correct diligence posture is to separate market framing from unsupported market math [C045][C046]. In that framework, TAM is broad and clearly multi-segment, but unquantified in the ledger [C006][C019][C022][C043][C049][C050]. SAM is narrower and anchored to the product surfaces OpenAI demonstrably sells today: consumer subscriptions, enterprise seats/customization, and usage-priced APIs/tools [C020][C022][C023][C024][C043]. SOM is best expressed as an already-served footprint rather than a share estimate, with 1 million paid corporate users by September 2024 and company-claimed hundreds of millions of users overall serving as the strongest available anchors [C010][C019]. This is a strong adoption picture, but not a defensible public market-share calculation [C019][C045].'
