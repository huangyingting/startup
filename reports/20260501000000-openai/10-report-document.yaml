  - number: '7.4'
    title: Retention, churn, and satisfaction
    blocks:
    - type: paragraph
      title: Retention, churn, and satisfaction
      body: 'Satisfaction and reach are better evidenced than retention [C009][C010][C019]. The strongest direct satisfaction signal is the ChatGPT iOS rating of 4.8/5 across 6.9M ratings as of 2026-05-01 [C009]. The strongest enterprise-traction signal is the 1M paid corporate-user figure [C019]. But none of the classic retention metrics needed for full SaaS underwriting are disclosed in the retained evidence: no logo churn, GRR, NRR, cohort retention, expansion by cohort, or customer concentration. As a result, it is reasonable to say OpenAI has strong adoption and promising satisfaction, but not to claim proven retention efficiency from public evidence alone.'
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C009
      - C010
      - C019
  - number: '7.5'
    title: Distribution loops and ecosystem retention
    blocks:
    - type: paragraph
      title: Distribution loops and ecosystem retention
      body: OpenAI's retention story may ultimately be driven as much by ecosystem depth as by classical seat renewals [C026][C027][C028][C031][C052]. Codex, ChatGPT apps distribution, official SDKs, and provider-agnostic agent tooling all increase the odds that developers and enterprises build repeat workflows around the platform [C026][C027][C029][C030][C031]. Community programs such as meetups, student credits, and OSS-oriented initiatives provide additional stickiness at the edge of the ecosystem [C052]. These are meaningful positives, but they should be viewed as qualitative retention supports until backed by renewal, expansion, and churn data.
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C026
      - C027
      - C028
      - C029
      - C030
