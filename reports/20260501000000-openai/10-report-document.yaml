  - number: '6.4'
    title: Architecture, infrastructure, and integrations
    blocks:
    - type: paragraph
      title: Architecture, infrastructure, and integrations
      body: 'Architecturally, the evidence points to a stack that begins with end-user clients and third-party apps, flows through first-party APIs and SDKs, adds tool and agent abstractions, and ultimately runs on Azure-backed infrastructure [C007][C011][C013][C022][C027][C029][C030][C031]. The strategic upside is obvious: Azure scale and the Azure OpenAI commercial channel give OpenAI a powerful infrastructure and enterprise-distribution backbone [C011][C013]. The corresponding risk is equally important: public evidence confirms exclusive cloud concentration, while the ledger does not disclose fallback architecture, multi-cloud optionality, or cost-performance benchmarks [C011][C013]. Integrations are stronger at the workflow and protocol layers than at a disclosed third-party enterprise-app list, with MCP, apps distribution, and official SDKs serving as the main explicit integration evidence [C022][C027][C029][C030].'
