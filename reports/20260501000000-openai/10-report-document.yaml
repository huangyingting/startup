- id: T801
  title: Investment thesis summary
  columns:
  - Pillar
  - Evidence-backed support
  - Key caveat
  - Investor read
  rows:
  - - Distribution and category leadership
    - ChatGPT catalyzed generative-AI adoption and OpenAI now spans consumer, enterprise, developer, coding, app, and commerce surfaces [C019][C022][C026][C027][C049][C050].
    - Distribution strength does not eliminate platform-dependence or litigation risk.
    - Core long thesis remains strong.
  - - Enterprise monetization
    - OpenAI reported 1M paid corporate users by September 2024, with Team pricing and enterprise customization visible in the ledger [C019][C020][C021].
    - Cohort retention, discounting, and gross margin remain undisclosed.
    - Strong traction, incomplete quality-of-revenue proof.
  - - Developer and platform moat
    - Current docs show a broad tool and API stack around GPT-5.5, apps, and coding workflows [C022][C026][C027][C050].
    - Workflow value may migrate up-stack into downstream applications.
    - Attractive moat, but not obviously permanent.
  - - Financing access
    - OpenAI closed a $6.6B round at $157B post-money and has been discussed for even larger financing [C014][C016][C044][C046].
    - High capital-market access can also entrench elevated valuation expectations.
    - Positive for survivability, mixed for new-entry upside.
  - - Governance and legal cleanliness
    - Current evidence shows governance crisis history, unresolved control terms, and active regulatory and copyright matters [C036][C037][C038][C039][C040][C041][C045].
    - These are not minor diligence gaps; they are central underwriting variables.
    - Main reason recommendation stops at track.
  notes: Investor reads are analytic judgments based on the retained evidence, not company-provided scoring.
