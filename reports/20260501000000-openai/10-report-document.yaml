- id: T301
  title: Competitive landscape map using only evidence-backed entities and substitute classes
  columns:
  - Competitor or substitute
  - Category
  - Why it matters
  - Evidence-backed read
  rows:
  - - Microsoft
    - Named incumbent / coopetitor
    - Microsoft supplies the infrastructure, resells OpenAI via Azure, embeds OpenAI models in Microsoft products, and therefore sits on the critical path of enterprise AI demand [C011][C013][C017].
    - Strongest clearly evidenced named competitive pressure point; also a major moat enabler [C011][C013][C037].
  - - Frontier-model API substitutes
    - Clearly labeled substitute class
    - Buyers can compare OpenAI against other closed-model APIs on capability, price, and workflow fit.
    - Retained evidence proves OpenAI faces model-tiering and pricing comparison behavior, but does not provide an evidence-complete factual matrix for each named rival, so this class is treated structurally rather than by unsupported company ranking [C022][C023][C024][C048].
  - - Open-source or self-hosted model stacks
    - Clearly labeled substitute class
    - Some customers may prefer portability, provider-agnostic orchestration, or more direct control over evaluation and tooling.
    - OpenAI itself promotes provider-agnostic agent tooling and open-source-adjacent developer assets, which implies that substitute stacks can be credible in some buyer workflows [C028][C031][C032][C033][C034].
  - - Enterprise software suites with embedded AI
    - Clearly labeled substitute class
    - Budget owners may buy AI capability inside broader productivity or workflow suites rather than via standalone frontier-model vendors.
    - The evidence for OpenAI's enterprise traction and Microsoft's product embedding supports this as a meaningful substitute path even where the ledger lacks a named vendor-by-vendor fact set [C013][C018][C019].
  - - In-house application layers built on top of OpenAI
    - Clearly labeled substitute / partial disintermediation risk
    - Customers and partners can capture more value at the workflow layer even when OpenAI remains the underlying model provider.
    - OpenAI's own ecosystem, apps, commerce, and SDK strategy signals that value is shifting up-stack into application and orchestration layers [C027][C031][C050][C052].
  notes: This table avoids unsupported rival claims by separating named, evidence-backed entities from substitute classes that are strategically relevant but not fully benchmarked in the ledger.
