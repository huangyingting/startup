  - number: '6.5'
    title: Roadmap signals and development velocity
    blocks:
    - type: paragraph
      title: Roadmap signals and development velocity
      body: The retained evidence gives several concrete roadmap signals without justifying speculative forecasting [C021][C022][C025][C051][C052]. GPT-5.5 is positioned as the flagship family today, the Responses API now exposes a richer set of tools, and the company has expanded both enterprise customization and product-distribution surfaces [C021][C022][C027][C050]. Open-source development velocity also appears high, with OpenAI reporting a step-up in merged PRs for the Agents SDK repositories [C051]. At the same time, Sora 2 API documentation already carries a specific deprecation date, which is a useful reminder that platform breadth and rapid product iteration can also create lifecycle-management complexity for customers [C025].
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
