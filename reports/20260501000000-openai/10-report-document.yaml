- id: T203
  title: Market growth drivers and limiting factors
  columns:
  - Factor
  - Why it matters
  - Evidence signal
  - Implication for OpenAI
  rows:
  - - Category creation after ChatGPT
    - Early market leaders often benefit from habit formation and mindshare before category boundaries stabilize.
    - ChatGPT's 2022 release is described as catalyzing widespread interest in generative AI [C049].
    - OpenAI benefits from category-defining awareness, which can lower acquisition friction and aid pricing power [C049][C010].
  - - Enterprise willingness to pay
    - Sustainable AI markets require conversion from curiosity to budgeted software spend.
    - Team pricing, customization features, and 1 million paid corporate users indicate enterprise willingness to pay [C019][C020][C021].
    - Enterprise remains the strongest evidence-backed expansion vector [C017][C018][C019].
  - - Developer ecosystem adoption
    - Platform markets deepen when third parties build integrations, apps, and workflows on top of the core API.
    - OpenAI maintains official SDKs, tools, and a large GitHub/PyPI footprint [C007][C022][C028][C029][C030][C031].
    - This supports ecosystem lock-in and multi-product monetization [C028][C050][C052].
  - - Multimodal and workflow expansion
    - New modalities can expand wallet share beyond pure text generation.
    - OpenAI exposes image, video, tool use, coding, app, and commerce surfaces in current docs [C022][C025][C026][C027][C050].
    - The practical addressable market expands as OpenAI moves up the workflow stack [C022][C026][C050].
  - - Regulation, litigation, and concentration risk
    - Large new software categories can be slowed by legal uncertainty and concentrated infrastructure dependencies.
    - EU scrutiny, FTC inquiry, copyright cases, and Azure exclusivity are all explicit in the retained evidence [C011][C036][C037][C038][C039][C040].
    - These factors can constrain growth velocity, margins, or strategic flexibility even if demand stays strong [C011][C037][C038][C045].
  notes: The final row is a market limiter, included because investor-grade macro analysis should balance growth vectors against adoption constraints.
