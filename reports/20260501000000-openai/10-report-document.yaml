  - number: '6.6'
    title: Product diligence gaps
    blocks:
    - type: paragraph
      title: Product diligence gaps
      body: 'The main technical diligence asks are not about whether OpenAI has a broad platform; the ledger already shows that it does [C006][C022][C026][C027][C031][C050]. The important open questions are operational: model-routing logic across tiers, reliability and uptime by product, enterprise security certifications, eval pass rates for critical workloads, migration policy across rapidly changing APIs, and the degree of portability away from Azure if economics or regulation change. None of those items are sufficiently disclosed in retained public materials, so a technical diligence session should request architecture reviews, SLA histories, safety/quality scorecards, and roadmap-deprecation governance.'
