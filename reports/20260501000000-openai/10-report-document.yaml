    - type: callout
      title: Risk rating is significant
      body: OpenAI remains investable only with explicit diligence gates around governance rights, Microsoft contractual dependence, litigation exposure, and audited financial visibility; absent those materials, risk should be rated significant rather than moderate [C011][C017][C041][C045][C046].
