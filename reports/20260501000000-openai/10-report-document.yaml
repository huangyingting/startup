- number: 5
  title: Financial & Unit Economics
  sections:
  - number: '5.1'
    title: Overview
    blocks:
    - type: paragraph
      title: Chapter Summary
      body: OpenAI's monetization breadth is well evidenced, but revenue quality remains only moderately underwritable from public materials because the retained ledger contains pricing, paid-user, and reported top-line anchors rather than audited financial statements or cost disclosures [C017][C019][C020][C023][C024][C043]. The strongest reported revenue anchor is a June 2024 report that OpenAI was on track for about $3.4B of 2024 revenue, including about $200M tied to Microsoft's Azure resale share [C017]. Beyond that, investor-grade unit-economics metrics such as CAC, gross margin, LTV, churn, NRR, payback, and burn are not publicly disclosed in the retained evidence, so this chapter keeps those values null and converts them into explicit diligence asks rather than invented estimates [C017][C043].
