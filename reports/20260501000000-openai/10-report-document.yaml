  - number: '4.3'
    title: Primary competitors and incumbent competitors
    blocks:
    - type: paragraph
      title: Primary competitors and incumbent competitors
      body: 'The only named incumbent competitor that is directly and clearly evidenced in the ledger is Microsoft [C011][C013][C017][C037][C038]. Microsoft matters because it controls OpenAI''s exclusive cloud layer, resells OpenAI through Azure, embeds OpenAI-backed capabilities into Microsoft products, and is important enough to attract EU and FTC scrutiny around the relationship [C011][C013][C017][C036][C037][C038]. Beyond Microsoft, the prudent evidence-first framing is to discuss substitute classes rather than overstate unsupported company-by-company rankings: frontier-model API alternatives, self-hosted or open-source stacks, enterprise suites with built-in AI, and in-house application layers built on top of model providers [C022][C023][C024][C028][C031][C050][C052]. This approach meets diligence rigor because it preserves strategic relevance without inventing unsupported rival facts [C045][C046].'
