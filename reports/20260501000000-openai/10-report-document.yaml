    - type: paragraph
      title: Revenue model overview
      body: The retained evidence supports a multi-stream revenue model rather than a single subscription business [C017][C020][C023][C024][C043]. OpenAI monetizes through ChatGPT subscriptions and in-app purchases, enterprise seats and custom-model work, usage-priced API consumption, and Azure-linked resale economics through Microsoft [C008][C017][C020][C021][C023][C024][C043]. Product-surface expansion into Codex, ChatGPT apps distribution, and commerce suggests additional monetization optionality, but the ledger does not disclose revenue contribution from those newer surfaces [C026][C027][C050]. For diligence purposes, the monetization breadth is a strength; the missing segment mix is the main analytical constraint [C017][C043].
