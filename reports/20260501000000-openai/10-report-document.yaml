- number: 6
  title: Product & Technology
  sections:
  - number: '6.1'
    title: Overview
    blocks:
    - type: paragraph
      title: Chapter Summary
      body: 'OpenAI presents as a full-stack AI platform rather than a single-model vendor: the retained evidence supports a product surface spanning ChatGPT, the Responses API, Codex, image generation, realtime voice, Sora video tooling, ChatGPT apps distribution, commerce surfaces, and provider-agnostic agent tooling [C006][C007][C022][C025][C026][C027][C031][C050]. The technology stack is reinforced by official Python and Node SDKs plus widely adopted open-source assets such as Whisper, tiktoken, and Evals [C028][C029][C030][C032][C033][C034]. The main technical strength is breadth across application, tooling, and ecosystem layers; the main technical risk is infrastructure concentration around Azure and limited public visibility into roadmap sequencing, reliability metrics, and cost-performance tradeoffs [C011][C013][C022].'
