  - number: '5.5'
    title: Scenario modeling discipline and diligence asks
    blocks:
    - type: paragraph
      title: Scenario modeling discipline and diligence asks
      body: 'This chapter intentionally leaves bear, base, and bull projection outputs as null because the retained evidence does not contain the minimum inputs required for a defensible operating model: segment revenue mix, customer concentration, discounting, renewal rates, compute cost curves, capex or committed capacity, and historical margins. The exact diligence asks are straightforward: obtain audited or board-level financials; monthly revenue by product and segment; gross-margin waterfalls by SKU; enterprise pipeline and renewal data; CAC by channel; and committed compute-spend schedules with Microsoft and any other infrastructure counterparties. Until those materials are available, financial quality should be rated as moderate rather than strong.'
