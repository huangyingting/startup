    - Exclusivity changes, compute access tightens, or economics worsen.
    - Re-cut valuation and require contractual downside protection.
  - - Litigation and policy risk
    - No evidence-backed resolution exists yet for the major legal and regulatory matters [C036][C037][C038][C039][C040].
    - High
    - Adverse ruling, injunction signal, or formal remedy proposal.
    - Move recommendation toward avoid unless pricing fully compensates.
