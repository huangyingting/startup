  - number: '6.3'
    title: Modules, automation, and workflow depth
    blocks:
    - type: paragraph
      title: Modules, automation, and workflow depth
      body: The core product modules visible in the ledger are increasingly workflow-oriented rather than model-only [C022][C026][C031]. OpenAI's API platform exposes web search, file search, image generation, hosted shell, computer use, and MCP through the Responses API, which suggests an effort to package multi-step automation primitives rather than leaving orchestration entirely to customers [C022]. Codex extends that approach into software development workflows, while assisted fine-tuning and custom models extend it into higher-touch enterprise deployments [C021][C026]. The provider-agnostic Agents SDK further indicates that OpenAI wants a share of the orchestration layer even in environments where customers may not be fully provider-locked [C031].
