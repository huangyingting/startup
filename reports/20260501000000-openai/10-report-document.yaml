- number: 7
  title: Customer & Retention
  sections:
  - number: '7.1'
    title: Overview
    blocks:
    - type: paragraph
      title: Chapter Summary
      body: 'OpenAI''s customer footprint is clearly large, but retention quality is only weak-to-moderate under public-evidence standards because the ledger contains strong adoption signals and very limited cohort metrics [C009][C010][C018][C019][C028][C052]. The strongest customer facts are company-claimed hundreds of millions of ChatGPT users, a reported 1M paid corporate users across Team, Enterprise, and Edu by September 2024, and a 4.8/5 iOS rating across 6.9M ratings as of 2026-05-01 [C009][C010][C019]. What remains missing are the investor-grade retention metrics: logo churn, NRR, GRR, cohort retention, expansion by segment, customer concentration, and named case-study detail.'
