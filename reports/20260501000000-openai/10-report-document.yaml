    - type: callout
      title: The asset is high quality, but the underwriting file is incomplete
      body: OpenAI has strong product breadth, enterprise traction, and financing support, yet public evidence still leaves major gaps around audited economics, governance rights, and legal outcomes [C014][C017][C019][C022][C041][C045].
