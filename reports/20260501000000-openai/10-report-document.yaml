- number: 8
  title: Risk & Regulatory
  sections:
  - number: '8.1'
    title: Overview
    blocks:
    - type: paragraph
      title: Chapter Summary
      body: 'OpenAI''s risk profile is significant rather than existential: demand, financing access, and product breadth are all strong, but regulatory scrutiny, active copyright litigation, governance opacity, and Microsoft concentration create multiple high-severity downside paths [C011][C014][C017][C036][C037][C038][C039][C040][C041][C045][C046]. The most material distinction for investors is that severity and likelihood are not the same. Governance opacity and Microsoft dependence are structurally important and already visible today, while the largest legal and antitrust outcomes are still unresolved and therefore probabilistic rather than realized [C011][C037][C041][C045]. The appropriate diligence stance is to underwrite OpenAI as a high-quality but policy- and partner-constrained platform asset, with explicit kill criteria if governance, litigation, or partner-dependence risks worsen [C019][C022][C045][C046].'
