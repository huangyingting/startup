  - number: '9.2'
    title: Investment thesis summary
    blocks:
    - type: paragraph
      title: Investment thesis summary
      body: 'The core long case for OpenAI is straightforward: it has category-defining brand, broad product coverage, visible enterprise demand, and unusually strong platform expansion across APIs, tools, coding, apps, and commerce [C019][C022][C026][C027][C049][C050]. Those factors make OpenAI one of the strongest strategic assets in the retained evidence set. The reason the recommendation does not move higher is not business quality; it is underwriting quality. Public evidence still leaves material gaps around audited economics, governance/control terms, and legal downside boundaries [C017][C041][C045][C046]. That mismatch between business strength and file completeness is the central investment conclusion.'
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
