  rows:
  - - Consumer AI assistants
    - Broad end-user demand for chat, search, voice, image, and learning workflows delivered through consumer apps and subscriptions.
    - Official app listings reference hundreds of millions of users, while the iOS app page showed 6.9 million ratings and a 4.8/5 score as of 2026-05-01 [C009][C010][C047].
    - ChatGPT mobile and web distribution make this a core top-of-funnel and monetization surface [C008][C043][C047].
  - - Enterprise AI software and workflow automation
    - Paid software adoption by teams, enterprises, and education institutions using managed AI seats, custom models, and workflow tooling.
    - Team pricing launched in January 2024, enterprise customization expanded in April 2024, and paid corporate users reportedly reached 1 million by September 2024 [C019][C020][C021].
    - This is the clearest evidence-backed revenue expansion lane in the retained ledger [C017][C018][C019][C043].
  - - Developer API and agent infrastructure
    - Usage-based model access, tools, SDKs, and agent workflows purchased by developers and software companies.
    - OpenAI operates official SDKs, pricing pages, tool guides, and a broad developer distribution footprint across GitHub, PyPI, and docs [C007][C022][C023][C024][C028][C029][C030][C031].
    - This layer expands monetization from seats to compute- and workflow-based usage [C023][C024][C043].
  - - Multimodal generation, coding, and app-distribution adjacencies
    - Spend tied to code generation, image/video generation, app ecosystems, and AI-mediated commerce.
    - Current docs show Codex, image generation, Sora-related workflows, ChatGPT app distribution, and commerce tooling [C006][C025][C026][C027][C050].
    - These adjacencies enlarge the practical market envelope around the core model business [C022][C026][C027][C050].
