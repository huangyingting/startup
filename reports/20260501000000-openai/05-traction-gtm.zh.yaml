    quantifiedOutcome: '在完成培训与治理落地后，月活用户率达到 93%。'
    revenueImpactUsd: null
    independentlyVerified: false
    claimRefs: [C023, C025]
  - customer: Choco
    industry: '食品分销软件'
    deploymentScope: '将 AI 驱动的订货与语音工作流嵌入分销商运营'
    quantifiedOutcome: '每年处理超过 880 万笔订单，将人工录单工作最多减少 50%，且在不增加人员的情况下使销售生产率翻倍。'
