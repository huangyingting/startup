    revenueImpactUsd: null
    independentlyVerified: true
    claimRefs: [C023, C026, C027]
gtmMotion:
  primaryMotion: hybrid
  buyer: 'CIO、CTO、CDO、工程负责人、个人用户以及公共部门采购或任务负责人'
  user: '知识工作者、开发者、分析师、支持团队、运营团队、学生与政府工作人员'
  channels:
    - 消费者自助订阅
    - ChatGPT Business 自助席位销售
    - 直接企业销售
    - 开发者 API 与编码工具采用
    - 通过 Azure 和 AWS 进行的云伙伴分发
    - GSA OneGov 等政府采购通道
  salesCycleHypothesis: medium
  pipelineHealth: '从消费者拉动、自助定价、企业使用声明、政府采购方案以及伙伴云分发中，可以看到强劲的漏斗顶端需求，但付费转化、流失率与分部结构并未公开披露。'
  claimRefs: [C007, C013, C014, C018, C040, C041, C050]
pricingAndPackaging:
  observedPricing: 'ChatGPT 提供免费与付费消费者档位，ChatGPT Business 的公开价格为按年计费每用户每月 SGD 25，Enterprise 为定制定价，API 采用按量计费，而美国联邦机构还可通过 OneGov 获得 ChatGPT Enterprise 首年 1 美元的准入方案。'
  pricingModel: hybrid
  packagingNotes: 'OpenAI 对消费者、中小企业、企业、教育、政府与开发者提供分离的产品界面。企业价值绑定在共享工作区、连接器、管理控制、留存设置与部署支持上，而不只是原始模型访问。'
  claimRefs: [C008, C009, C013, C015, C018]
retentionExpansionSignals:
  evidence:
    - 'Morgan Stanley 报告几乎所有顾问团队都实现了日常使用，在财富管理中的采用率超过 98%。'
    - 'CyberAgent 报告几乎所有部门的月活用户率达到 93%。'
    - '企业产品打包强调连接器、共享工作区、应用和管理控制，有利于席位扩张和更深的工作流嵌入。'
  concerns:
    - 'OpenAI 并未按分部公开 GRR、NRR、logo 留存或付费席位流失。'
    - '最大规模的用户与收入指标由公司自行披露，而非独立审计。'
    - '公共部门的促销定价与宽泛的周活用户数字，无法揭示稳态商业化质量。'
  confidence: low
  claimRefs: [C013, C022, C023, C025, C038, C039]
gtmRisks:
  - risk: '由于 OpenAI 未公开披露经审计的收入结构、留存或客户集中度，分部级付费转化、流失与商业化质量仍难以承销。'
    severity: high
    claimRefs: [C038, C039]
  - risk: '企业与公共部门扩张依赖采购、安全审查、合规打包与变更管理，这可能拉长销售周期并延后收入确认。'
    severity: high
    claimRefs: [C019, C025, C042, C050]
  - risk: '即便分发已扩展至 Azure 之外，OpenAI 仍在相当程度上依赖大型云与渠道伙伴。'
    severity: medium
    claimRefs: [C031, C032, C033, C050]
  - risk: '使用政策限制与人工复核要求，在部分受监管或高风险工作流中限制了完全自动化。'
    severity: medium
    claimRefs: [C021, C024, C026]
