schemaVersion: startup-diligence-v3
artifact: traction-gtm
slug: openai
runDate: 2026-05-01
company:
  name: OpenAI
tractionSummary:
  overallSignal: strong
  rationale: 'OpenAI 在消费者、企业、开发者与政府渠道中展现出异常广泛的需求。最强证据来自两部分：一是公司自报的规模声明，例如超过 500 万企业用户、超过 9 亿周活用户、超过 5000 万订阅者以及约 20 亿美元月收入；二是被独立印证的客户部署证据，以及通过 GSA、AWS 与 Azure 相关渠道进行的采购或分发扩张。由于最大的使用与收入数字均为公司自行披露，且分部级商业化仍不透明，因此置信度受到限制。'
  confidence: medium
  claimRefs: [C018, C022, C023, C031, C038, C050]
tractionSignals:
  - signalType: revenue
    signal: 'OpenAI 在 2026 年 3 月的融资文章中声称，月收入约为 20 亿美元，且企业收入占总收入 40% 以上。'
    strength: high
    freshness: current
    independentValidation: false
    claimRefs: [C038]
  - signalType: users
    signal: 'OpenAI 在 2026 年 3 月的融资文章中声称，周活用户超过 9 亿，订阅者超过 5000 万。'
    strength: high
    freshness: current
    independentValidation: false
    claimRefs: [C038]
  - signalType: customers
    signal: 'OpenAI 表示，ChatGPT Enterprise 服务的企业用户已超过 500 万。'
    strength: high
    freshness: current
    independentValidation: false
    claimRefs: [C022]
  - signalType: usage
    signal: 'Morgan Stanley 报告其顾问团队采用率超过 98%，CyberAgent 报告几乎所有部门的月活用户率达到 93%，表明部署正在超越试点阶段。'
    strength: medium
    freshness: recent
    independentValidation: true
    claimRefs: [C023]
  - signalType: partnerships
    signal: 'OpenAI 当前的分发已覆盖 Azure 相关渠道、AWS Bedrock 受管交付以及 GSA OneGov 采购，扩大了企业与公共部门触达。'
    strength: high
    freshness: current
    independentValidation: true
    claimRefs: [C018, C031, C050]
  - signalType: usage
    signal: 'ChatGPT Gov 相关材料声称，自 2024 年以来，已有超过 3500 家美国机构中的 9 万多名用户发送了超过 1800 万条消息。'
    strength: medium
    freshness: recent
    independentValidation: false
    claimRefs: [C016]
  - signalType: hiring
    signal: '截至 2026-05-01，OpenAI 招聘页面列出 669 个开放职位，覆盖研究、基础设施、安全、政府与商业化职能，意味着公司仍在为需求持续加大投入。'
    strength: medium
    freshness: current
    independentValidation: false
    claimRefs: [C011]
kpiSnapshot:
  asOf: 2026-03-31
  arrUsdM: null
  revenueUsdM: 24000
  revenueGrowthYoYPct: null
  grossMarginPct: null
  nrrPct: null
  grrPct: null
  magicNumber: null
  burnMultiple: null
  ruleOf40: null
  cacPaybackMonths: null
  ltvToCac: null
  weeklyActiveUsers: 900000000
  monthlyActiveUsers: null
  payingCustomers: 50000000
  netPromoterScore: null
  estimateBasis: 'RevenueUsdM 以公司在 2026 年 3 月自报的约 20 亿美元月收入为基础，按 $2 billion × 12 = $24 billion 年化得到 24000。WeeklyActiveUsers 采用“超过 9 亿周活用户”这一披露下限。PayingCustomers 采用“超过 5000 万订阅者”这一披露下限。其余字段均保持为 null，因为当前来源集合未披露经审计的增长、毛利率、留存、CAC 或 cohort 经济性。'
