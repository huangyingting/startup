        - Re-underwrite growth durability before any follow-on capital.
      - - Governance risk
        - "Current leadership roles are publicly identified after the 2023 crisis, but control rights remain unresolved [C041][C042][C045]."
        - High
        - Company cannot provide definitive board/control documentation.
        - Pause or fail diligence.
      - - Platform dependency risk
        - "Microsoft partnership provides infrastructure and distribution support [C011][C013][C017]."
        - High
        - Exclusivity changes, compute access tightens, or economics worsen.
        - Re-cut valuation and require contractual downside protection.
