company:
  name: OpenAI
chapter:
  number: 7
  title: Risk & Regulatory
  summary: |-
    OpenAI's risk profile is significant rather than existential: demand, financing access, and product breadth are all strong, but regulatory scrutiny, active copyright litigation, governance opacity, and Microsoft concentration create multiple high-severity downside paths [C011][C014][C017][C036][C037][C038][C039][C040][C041][C045][C046]. The most material distinction for investors is that severity and likelihood are not the same. Governance opacity and Microsoft dependence are structurally important and already visible today, while the largest legal and antitrust outcomes are still unresolved and therefore probabilistic rather than realized [C011][C037][C041][C045]. The appropriate diligence stance is to underwrite OpenAI as a high-quality but policy- and partner-constrained platform asset, with explicit kill criteria if governance, litigation, or partner-dependence risks worsen [C019][C022][C045][C046].
callouts:
  - type: key-insight
    title: The main risks are external-constraint risks, not demand risks
    body: OpenAI's public evidence shows strong user adoption, enterprise uptake, and financing support, but the biggest downside vectors come from regulators, courts, governance structure, and partner concentration rather than lack of market demand [C014][C017][C019][C036][C037][C038][C039][C040][C041][C045].
    claimRefs:
      - C014
      - C017
      - C019
      - C036
      - C037
      - C038
      - C039
      - C040
      - C041
      - C045
  - type: risk-alert
    title: Microsoft is both moat and single largest concentration risk
    body: Azure powers all OpenAI workloads and Microsoft is also a revenue channel, which supports scale but concentrates infrastructure, distribution, and regulatory exposure in one relationship [C011][C013][C017][C037][C038].
    claimRefs:
      - C011
      - C013
      - C017
      - C037
      - C038
  - type: risk-alert
    title: Legal and antitrust overhang remains unresolved
    body: EU and FTC scrutiny plus active copyright suits from The New York Times and the Authors Guild create material uncertainty around future economics, remedies, and exit readiness [C036][C037][C038][C039][C040].
    claimRefs:
      - C036
      - C037
      - C038
      - C039
      - C040
  - type: final-recommendation
    title: Risk rating is significant
    body: OpenAI remains investable only with explicit diligence gates around governance rights, Microsoft contractual dependence, litigation exposure, and audited financial visibility; absent those materials, risk should be rated significant rather than moderate [C011][C017][C041][C045][C046].
    claimRefs:
      - C011
      - C017
      - C041
      - C045
      - C046
