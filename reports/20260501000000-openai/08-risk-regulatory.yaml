sections:
  - number: '7.1'
    title: Risk overview
    body: |-
      OpenAI's risk profile is best understood as a combination of structural concentration risk and unresolved external-overhang risk [C011][C036][C037][C038][C039][C040][C041][C045]. On one side, the company has unusually strong evidence of product breadth, enterprise demand, and financing access, which lowers ordinary startup risks around market adoption and capital availability [C014][C017][C019][C022]. On the other side, the company remains exposed to concentrated dependence on Microsoft, unresolved antitrust review, active copyright litigation, and incomplete public visibility into governance and control terms [C011][C037][C039][C040][C045]. The resulting investor conclusion is not that OpenAI is too risky to own, but that it requires more explicit downside gating than a typical late-stage software investment [C014][C046].
    claimRefs:
      - C011
      - C014
      - C017
      - C019
      - C022
      - C036
      - C037
      - C038
      - C039
      - C040
      - C041
      - C045
      - C046
  - number: '7.2'
    title: Regulatory and legal risk
    body: |-
      The clearest external risks are regulatory and legal. European authorities first checked whether Microsoft's investment might be reviewable under merger rules and later examined AI partnership exclusivity clauses, explicitly including Microsoft/OpenAI [C036][C037]. In the United States, the FTC opened a Section 6(b) inquiry into generative-AI investments and partnerships involving Microsoft and OpenAI [C038]. Separately, the New York Times and the Authors Guild each brought material copyright claims against OpenAI and Microsoft, creating uncertainty around training-data economics, settlement cost, and legal precedent [C039][C040]. None of these items proves a negative final outcome, but together they make legal/regulatory exposure too material to treat as background noise in valuation work [C036][C037][C038][C039][C040].
    claimRefs:
      - C036
      - C037
      - C038
      - C039
      - C040
  - number: '7.3'
    title: Governance, credit, operational, and security risk
    body: |-
      Governance remains a first-order diligence issue because OpenAI's 2023 leadership crisis was real and public, while the current post-restructuring control framework is still not fully transparent in fetched public sources [C041][C045]. Operationally, Azure powers all OpenAI workloads and also serves as a major enterprise channel, which means infrastructure, channel, and counterparty concentration sit inside the same relationship [C011][C013][C017]. In credit-style terms, the public risk is not leverage but dependence on continued access to large-scale compute and large-scale private capital, both of which appear available today but remain concentrated in a small set of counterparties and financing conditions [C011][C014][C016][C044][C046]. Security is a disclosure-gap issue rather than an evidenced breach issue: the retained ledger does not provide investor-grade visibility into certifications, incident history, or contractual controls, so diligence must request primary materials before assuming enterprise-grade compliance [C045].
    claimRefs:
      - C011
      - C013
      - C014
      - C016
      - C017
      - C041
      - C044
      - C045
      - C046
  - number: '7.4'
    title: Competitive and strategic risk
    body: |-
      OpenAI's product expansion into APIs, tools, coding, apps, and commerce is a strength, but it also confirms that competition is moving upward into workflow ownership and application-layer distribution [C022][C026][C027][C050]. The retained evidence supports a broad model lineup and active tool surface, which helps OpenAI defend relevance across many use cases [C022][C048]. The strategic risk is that value capture may not remain concentrated at the model layer: if downstream application owners or provider-agnostic orchestration layers capture more of the workflow, model pricing power can compress even while demand remains high [C027][C048][C050]. That risk is meaningful, but still secondary to legal, regulatory, and partner-concentration risks based on the current ledger [C037][C039][C040].
    claimRefs:
      - C022
      - C026
      - C027
      - C037
      - C039
      - C040
      - C048
      - C050
  - number: '7.5'
    title: Mitigation summary and investor monitoring
    body: |-
      The evidence does show real mitigants. OpenAI has strong financing access, broad investor support, visible enterprise adoption, and a deep Microsoft relationship that provides scale support [C014][C015][C019][C011][C013]. Those mitigants, however, do not neutralize the need for strict investor monitoring. The most important pre-close gates are definitive governance/control documentation, Microsoft contractual clarity, litigation and regulatory case updates, and board-level financial disclosure [C017][C037][C039][C040][C045][C046]. If any of those gates deteriorate rather than improve, the appropriate response is to pause diligence or tighten valuation expectations rather than average through uncertainty.
    claimRefs:
      - C011
      - C013
      - C014
      - C015
      - C017
      - C019
      - C037
      - C039
      - C040
      - C045
      - C046
