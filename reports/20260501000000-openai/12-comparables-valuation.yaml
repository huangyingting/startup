valuationVerdict:
  stance: stretched
  rationale: Even granting strong traction, the disclosed March 2026 financing implies about 35.5 times annualized run-rate revenue on self-reported figures, while public visibility into margins, retention, burn, and concentration remains limited. That can still be defensible for uniquely strategic frontier-AI exposure, but it leaves little room for conventional venture-style returns unless OpenAI materially outgrows already extraordinary expectations.
  confidence: medium
  claimRefs: [C038, C039, C044, C048]
