schemaVersion: startup-diligence-v1
artifact: comparables-valuation
slug: openai
runDate: 2026-05-01
company:
  name: OpenAI
publicComparables:
  - compId: K001
    company: CoreWeave
    ticker: CRWV
    category: AI infrastructure cloud
    relevance: Public market proxy for AI compute infrastructure economics and OpenAI supplier exposure, not a direct model-platform comp.
    revenueUsdM: 1915
    revenuePeriod: FY2024
    valuationUsdM: null
    revenueMultiple: null
    marginSignal: 2024 cost of revenue was 26% of revenue, technology and infrastructure expense was 50% of revenue, and net loss was $863M.
    notes: CoreWeave disclosed $15.1B RPO, 32 active data centers, more than 250,000 GPUs, and an OpenAI commitment of up to approximately $11.9B through October 2030.
    claimRefs: [C061, C062]
privateOrTransactionComparables:
  - compId: K002
    company: Anthropic
    transaction: Series F
    date: 2025-09-02
    postMoneyValuationUsdM: 183000
    roundSizeUsdM: 13000
    revenueRunRateUsdM: 5000
    impliedRevenueMultiple: 36.6
    relevance: Closest private frontier-model platform comp with disclosed valuation and run-rate revenue.
    notes: Anthropic also disclosed more than 300,000 business customers and nearly 7x growth in large accounts, but figures are company-disclosed rather than audited.
    claimRefs: [C063]
  - compId: K003
    company: OpenAI
    transaction: March 2025 financing
    date: 2025-03-31
    postMoneyValuationUsdM: 300000
    roundSizeUsdM: 40000
    revenueRunRateUsdM: 10000
    impliedRevenueMultiple: 30
    relevance: Prior OpenAI market-clearing financing anchor with independent reporting and a later ARR cross-check.
    notes: CNBC reported $40B in financing at $300B post-money and later described the valuation as about 30x revenue at June 2025 metrics.
    claimRefs: [C052, C055, C056]
  - compId: K004
    company: OpenAI
    transaction: SoftBank 2026 follow-on investment
    date: 2026-02-27
    postMoneyValuationUsdM: 760000
    roundSizeUsdM: 30000
    revenueRunRateUsdM: 24000
    impliedRevenueMultiple: 31.7
    relevance: Investor-disclosed preferred-share financing anchor before the company-reported March 2026 $852B post-money round.
    notes: Based on SoftBank's $730B pre-money disclosure plus planned $30B investment; uses OpenAI's later $24B annualized revenue run-rate as a rough cross-period denominator.
    claimRefs: [C038, C058, C059]
  - compId: K005
    company: Anthropic / AWS
    transaction: Strategic compute and investment expansion
    date: 2026-04-20
    postMoneyValuationUsdM: null
    roundSizeUsdM: 5000
    revenueRunRateUsdM: 30000
    impliedRevenueMultiple: null
    relevance: Compute-commitment and strategic-financing comparable, not a pure valuation comp.
    notes: Anthropic disclosed a more than $100B ten-year AWS technology commitment for up to 5GW and Amazon investing $5B immediately with up to $20B more in the future.
    claimRefs: [C064]
valuationFramework:
  preferredApproach: revenue-multiple
  rationale: "The refresh adds usable but imperfect market anchors: CNBC's March 2025 OpenAI financing at about 30x June 2025 reported ARR, SoftBank's 2026 follow-on at roughly 31.7x the later annualized revenue run-rate, and Anthropic's September 2025 Series F at about 36.6x disclosed run-rate revenue. CoreWeave is a public AI-infrastructure comp for compute economics rather than a model-platform multiple. Using OpenAI's low-confidence $24 billion annualized revenue run-rate from the company-reported March 2026 monthly revenue claim, the disclosed $852 billion post-money valuation implies about 35.5x revenue, broadly consistent with frontier-AI private comps but still demanding given missing audited margins, retention, burn, and customer concentration."
  impliedValueLowUsdM: 600000
  impliedValueMidUsdM: 852000
  impliedValueHighUsdM: 1200000
  keyAssumptions:
    - Uses a low-confidence $24 billion annualized revenue run-rate derived from the company-reported March 2026 figure of about $2 billion monthly revenue.
    - Cross-checks OpenAI's current anchor against CNBC's 2025 financing/ARR reporting, SoftBank's 2026 preferred-share follow-on disclosure, and Anthropic's disclosed Series F valuation and run-rate revenue.
    - Treats CoreWeave as an infrastructure-cost and supplier-exposure comparable rather than a clean valuation multiple for OpenAI's model/application platform.
    - Applies a wide 25 times to 50 times revenue sensitivity band because public evidence still does not disclose audited segment mix, gross margin, retention, burn, or customer concentration.
  sensitivityNotes: A small change in confidence about revenue durability, enterprise mix, Microsoft revenue-share burden, compute commitments, or capital intensity can move fair value materially because the observed round already implies a demanding multiple on a partially self-reported revenue base.
  confidence: low
  claimRefs: [C038, C039, C044, C048, C052, C055, C056, C058, C061, C063]
valuationBridge:
  currentValuationUsdM: 852000
  annualizedRevenueRunRateUsdM: 24000
  impliedRevenueMultiple: 35.5
  publicCompsMedianMultiple: null
  privateCompsMedianMultiple: 35.5
  growthPremiumPct: null
  marginDiscountPct: null
  governanceDiscountPct: null
  liquidityDiscountPct: null
  fairValueRangeUsdM:
    low: 600000
    mid: 852000
    high: 1200000
  bridgeSteps:
    - step: "2025 independently reported ARR anchor"
      value: "$10B ARR and $300B post-money"
      interpretation: "CNBC's 2025 reporting implies roughly 30x revenue and establishes a less promotional pre-2026 valuation baseline."
      claimRefs: [C052, C055, C056]
    - step: "Company-reported March 2026 revenue run-rate"
      value: "$24B annualized"
      interpretation: "Uses $2B monthly revenue × 12; low confidence because it is self-reported and not segmented."
      claimRefs: [C038]
    - step: "SoftBank preferred-share follow-on anchor"
      value: "$730B pre-money / approximately $760B post-money"
      interpretation: "Investor-disclosed 2026 pricing implies a valuation level close to OpenAI's later $852B company-reported post-money anchor."
      claimRefs: [C058, C059]
    - step: "Private frontier-AI comp"
      value: "Anthropic at about 36.6x disclosed run-rate revenue"
      interpretation: "Anthropic supports that frontier-AI private rounds can clear at very high revenue multiples, though company-disclosed figures and compute obligations limit comparability."
      claimRefs: [C063, C064]
    - step: "Observed post-money valuation"
      value: "$852B"
      interpretation: "Treats the March 2026 financing as the clearest current market-clearing anchor."
      claimRefs: [C038]
    - step: "Implied revenue multiple"
      value: "35.5x"
      interpretation: "Consistent with private frontier-AI comp multiples but still very demanding unless revenue quality, gross margin, and retention prove exceptional."
      claimRefs: [C038, C039, C063]
    - step: "Risk-adjusted sensitivity range"
      value: "$600B to $1.2T"
      interpretation: "Wide range reflects exceptional strategic position offset by limited public evidence on unit economics, governance, and compute obligations."
      claimRefs: [C039, C044, C048, C057, C060, C062]
  conclusion: "The valuation bridge still supports a research-more stance: the price is now better triangulated by private frontier-AI comps, but it requires evidence that revenue quality, compute economics, and investor rights are far stronger than currently visible."
  claimRefs: [C038, C039, C044, C048, C052, C055, C056, C058, C063]
dealConsiderations:
  recommendedCheckUsdM: 85
  ownershipTargetPct: 0.01
  proRataRightsImportance: high
  preferredStructureNotes: If participating, favor a small access position with strong information rights, pro rata rights, and clarity on governance and economic alignment. Traditional governance influence is likely limited because the Foundation controls the board and Microsoft already holds a large stake.
  alignmentRisks:
    - Mission-first governance gives the OpenAI Foundation unusually strong control rights relative to ordinary commercial investors.
    - Microsoft already holds roughly 27% of OpenAI Group, which can shape strategic alignment and economics.
    - OpenAI disclosed ongoing revenue-share payments to Microsoft through 2030, subject to a cap.
    - SoftBank's 2026 follow-on uses automatically converting preferred shares, but full preference and investor-rights terms remain undisclosed.
    - Public disclosure on margins, burn, and customer concentration is thin for the current valuation level.
    - Key-person dependence and leadership continuity remain material considerations.
  claimRefs: [C002, C003, C004, C005, C039, C045, C046, C057, C058]
ownershipSensitivity:
  - entryValuationUsdM: 600000
    checkSizeUsdM: 85
    impliedOwnershipPct: 0.0142
    requiredExitUsdMFor3x: 1800000
    interpretation: "A materially lower entry valuation creates a plausible path to venture-style upside if OpenAI reaches public-market mega-cap scale."
  - entryValuationUsdM: 852000
    checkSizeUsdM: 85
    impliedOwnershipPct: 0.01
    requiredExitUsdMFor3x: 2556000
    interpretation: "At the disclosed anchor, a 3x gross outcome requires roughly $2.6T of exit value before dilution."
  - entryValuationUsdM: 1200000
    checkSizeUsdM: 85
    impliedOwnershipPct: 0.0071
    requiredExitUsdMFor3x: 3600000
    interpretation: "Upside entry pricing would require extraordinary long-term public-market outcomes to justify new-money risk."
expectedReturns:
  exitScenarios:
    - name: downside
      exitValueUsdM: 600000
      exitYear: 2030
      exitType: writedown
      grossMoM: 0.704
      grossIrrPct: -8.4
      assumptions: Assumes the current round proves too aggressive relative to durable margins and growth, leading to multiple compression even if OpenAI remains strategically important.
      confidence: low
      claimRefs: [C038, C039, C044, C046]
    - name: base
      exitValueUsdM: 1200000
      exitYear: 2030
      exitType: ipo
      grossMoM: 1.408
      grossIrrPct: 8.9
      assumptions: Assumes OpenAI sustains leadership and grows meaningfully from the current run-rate, but valuation expansion is limited because margins and governance remain contentious for public investors.
      confidence: low
      claimRefs: [C022, C031, C038, C039, C048]
    - name: upside
      exitValueUsdM: 2000000
      exitYear: 2030
      exitType: ipo
      grossMoM: 2.347
      grossIrrPct: 23.8
      assumptions: Assumes OpenAI compounds leadership across consumer, enterprise, developer, and government channels while proving better monetization quality than public evidence currently shows.
      confidence: low
      claimRefs: [C018, C022, C031, C038, C041, C048, C050]
valuationVerdict:
  stance: stretched
  rationale: Even granting strong traction and now having better comp triangulation, the disclosed March 2026 financing implies about 35.5 times annualized run-rate revenue on partly self-reported figures, while public visibility into margins, retention, burn, concentration, and investor rights remains limited. That can still be defensible for uniquely strategic frontier-AI exposure, and Anthropic's disclosed round shows private comps can clear at similar multiples, but it leaves little room for conventional venture-style returns unless OpenAI materially outgrows already extraordinary expectations.
  confidence: medium
  claimRefs: [C038, C039, C044, C048, C052, C055, C056, C058, C063, C064]
exitPathAnalysis:
  likelyExitPaths:
    - path: ipo
      likelihood: medium
      earliestYear: 2030
      blockers:
        - "Governance complexity and Foundation control may require clearer public-market narrative."
        - "Audited margin, retention, and capex profile would need to support a mega-cap valuation."
        - "Compute commitments, Microsoft revenue-share economics, and investor preferences would need transparent public-market disclosure."
      claimRefs: [C002, C003, C038, C039, C057, C058, C060, C062]
    - path: strategic-acquisition
      likelihood: low
      earliestYear: null
      blockers:
        - "Scale, national-security salience, and competition scrutiny make acquisition by a major platform difficult."
        - "Microsoft ownership and partnership terms would complicate any alternative strategic process."
      claimRefs: [C004, C032, C033, C034, C035]
    - path: secondary-liquidity
      likelihood: high
      earliestYear: 2027
      blockers:
        - "Pricing may depend heavily on continued access demand despite limited financial disclosure."
        - "Information rights and transfer restrictions could constrain buyer universe."
      claimRefs: [C038, C039]
  publicMarketReadiness:
    revenueScale: strong
    growthNarrative: strong
    governance: weak
    profitability: unknown
    disclosureQuality: weak
  verdict: "IPO is the cleanest long-term liquidity path, but public-market readiness depends on converting strategic importance into audited financial quality and a governance story public investors can underwrite."
