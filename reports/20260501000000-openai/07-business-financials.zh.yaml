  operatingLeverageHypothesis: '数字化分发与自助式界面可以高效扩张，但 OpenAI 的重招聘、基础设施扩张以及安全/治理负担意味着，其中短期经营杠杆可能落后于收入增长。'
  claimRefs: [C007, C009, C011, C013, C038, C044, C046, C055, C057, C060, C062]
