      capitalNeed: '2026 年 3 月融资可能足以支撑基准情景，但持续的基础设施与伙伴云承诺仍会使资本需求保持实质性。'
      keyAssumptions:
        - '起点仍是同样低置信度的 240 亿美元年化收入运行率。'
        - '假设企业、开发者与公共部门采用继续扩张，从而带来约 20% 到 31% 的年化收入增长。'
        - '假设向企业和更高价值工作流的结构性倾斜，使商业化改善速度快于运营成本上升。'
