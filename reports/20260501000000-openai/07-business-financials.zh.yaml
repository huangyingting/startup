scenarioModel:
  note: '这些情景是低置信度的方向性估计，以公司自报的 2026 年 3 月收入运行率为锚，并根据执行、竞争、监管与资本强度结果进行调整，而非基于经审计的财务历史。'
  scenarios:
    - name: downside
      revenueRangeYear3: $32 billion to $39 billion
      revenueYear3UsdMLow: 32000
      revenueYear3UsdMHigh: 39000
      marginDirection: deteriorating
      capitalNeed: '如果增长放缓而基础设施承诺仍居高不下，则可能需要额外外部资本、结构化算力融资，或更严格的支出控制。'
      keyAssumptions:
        - '起点是以公司自报的 2026 年 3 月 20 亿美元月收入推导出的低置信度 240 亿美元年化收入运行率。'
        - '假设未来三年年化收入增长约为 10% 到 18%，因为竞争、监管与商业化质量都不如头条式采用数字那样有利。'
        - '假设算力、安全与部署成本相对于收入增长仍保持高位。'
      confidence: low
      claimRefs: [C038, C039, C044, C046, C048]
    - name: base
      revenueRangeYear3: $41 billion to $54 billion
      revenueYear3UsdMLow: 41000
      revenueYear3UsdMHigh: 54000
      marginDirection: improving
      capitalNeed: '2026 年 3 月融资可能足以支撑基准情景，但持续的基础设施与伙伴云承诺仍会使资本需求保持实质性。'
      keyAssumptions:
        - '起点仍是同样低置信度的 240 亿美元年化收入运行率。'
        - '假设企业、开发者与公共部门采用继续扩张，从而带来约 20% 到 31% 的年化收入增长。'
        - '假设向企业和更高价值工作流的结构性倾斜，使商业化改善速度快于运营成本上升。'
      confidence: low
      claimRefs: [C018, C022, C030, C038, C048, C050]
    - name: upside
      revenueRangeYear3: $59 billion to $79 billion
      revenueYear3UsdMLow: 59000
      revenueYear3UsdMHigh: 79000
      marginDirection: improving
      capitalNeed: '即便在上行情景下，OpenAI 仍可能持续消耗极大规模的算力与部署支出，只是更强的收入可部分为扩张自我供血。'
      keyAssumptions:
        - '起点仍是同样低置信度的 240 亿美元年化收入运行率。'
        - '假设如果 OpenAI 能在消费者、企业、开发者与政府渠道上维持类目领先，则可实现约 35% 到 49% 的年化增长。'
        - '假设工作流深度与企业收入占比的改善，足以抵消部分算力强度与伙伴经济压力。'
      confidence: low
      claimRefs: [C018, C022, C031, C038, C041, C048, C050]
financialVerdict:
  assessment: uncertain
  rationale: 'OpenAI 看起来已经在订阅、企业席位与 API 使用上实现了真实且异常大的商业化规模，但公开财务透明度仍不足以支持高置信度承销。收入规模声明很有吸引力，但毛利率、烧钱、留存、资本效率与分部结构仍不透明，而前沿模型开发在结构上看仍高度资本密集。'
  confidence: medium
  claimRefs: [C007, C038, C039, C044, C046, C048]
