      capitalNeed: '如果增长放缓而基础设施承诺仍居高不下，则可能需要额外外部资本、结构化算力融资，或更严格的支出控制。'
      keyAssumptions:
        - '起点是以公司自报的 2026 年 3 月 20 亿美元月收入推导出的低置信度 240 亿美元年化收入运行率。'
