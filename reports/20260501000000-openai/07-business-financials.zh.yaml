      revenueYear3UsdMHigh: 79000
      grossMarginPct: null
      operatingMarginPct: null
      fcfMarginPct: null
      marginDirection: improving
      capitalNeed: '即便在上行情景下，OpenAI 仍可能持续消耗极大规模的算力与部署支出，只是更强的收入可部分为扩张自我供血。'
      keyAssumptions:
        - '起点仍是同样低置信度的 240 亿美元年化收入运行率。'
        - '假设如果 OpenAI 能在消费者、企业、开发者与政府渠道上维持类目领先，则可实现约 35% 到 49% 的年化增长。'
