financialVerdict:
  assessment: uncertain
  rationale: 'OpenAI 看起来已经在订阅、企业席位与 API 使用上实现了真实且异常大的商业化规模，现在还受到独立报道的 100 亿美元 ARR 里程碑与付费企业用户增长支持。但公开财务透明度仍不足以支持高置信度承销：毛利率、当前烧钱、留存、资本效率、客户集中度与分部结构仍不透明，而前沿模型和 AI 基础设施承诺在结构上看仍高度资本密集。'
  confidence: medium
  claimRefs: [C007, C038, C039, C044, C046, C048, C054, C055, C056, C057, C060, C062]
