technologyStack:
  coreTechnology: Public materials indicate a layered platform of frontier models delivered through ChatGPT SaaS surfaces, usage-based APIs, coding tools, realtime interfaces, and managed-agent products.
  proprietaryElements:
    - Integrated product surface spanning ChatGPT workspaces, APIs, Codex, managed agents, and government-specific variants
    - Enterprise connectors, shared workspaces, admin controls, and agentic workflow features
    - Realtime and multimodal workflow support used in embedded operational use cases
  thirdPartyDependencies:
    - Microsoft Azure remains the primary cloud partner and first-ship destination for OpenAI products under current commercial terms
    - AWS Bedrock and related AWS distribution now provide OpenAI models, Codex, and managed agents inside AWS environments
  dataDependencies:
    - Customer inputs and outputs across ChatGPT and API workflows
    - Connected internal company data and tools accessed through enterprise connectors and workspace apps
    - Operational and transactional data inside customer systems for support and operations automation
  integrationSurface:
    - ChatGPT shared workspaces and admin-managed business products
    - APIs for model access, coding, agentic, and realtime use cases
    - Enterprise identity and lifecycle controls such as SAML and SCIM
    - Internal-data connectors and apps for company tools
    - Partner-cloud deployment paths through Azure, Azure Government, AWS, and AWS GovCloud
    - Embedded integrations with customer operational systems such as ERP-linked voice ordering flows
  architectureNotes: 'The public architecture reads as a layered platform rather than a single model endpoint: direct ChatGPT products sit above developer APIs and coding or agent surfaces, while enterprise value depends on connecting customer data and tools under admin, retention, and compliance controls. The stack is becoming more multi-cloud in distribution, but it still carries meaningful partner-cloud dependence because Microsoft remains the primary cloud partner even as AWS-based delivery expands.'
  claimRefs: [C010, C012, C013, C015, C017, C029, C031, C033, C050]
