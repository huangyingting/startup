  postureNotes: OpenAI says business and API customer data is not used for training by default and is protected with encryption, retention controls, admin features, and enterprise identity support. Public materials also cite DPA or BAA support, audit visibility, explicit usage-policy restrictions for sensitive deployments, and board-level safety and security oversight; at the same time, trust disclosures show moderation and legal-process obligations are already material at scale.
  claimRefs: [C010, C017, C020, C021, C036, C042]
