        - If management cannot provide board-level financials, keep recommendation at track or research-more.
        - Not decision-ready from public evidence.
      - - Public-comparable multiple method
        - Missing evidence-backed peer-multiple set in retained ledger
        - null
        - Do not force false precision; build only after true peer set is supplied.
        - Secondary method deferred.
      - - Kill criterion: governance and control
        - "Current public sources do not fully resolve ownership, board rights, or nonprofit control terms [C045]."
        - Fail diligence if definitive control documentation is unavailable.
        - Hard stop before committing capital.
        - Pre-close gating item.
      - - Kill criterion: Microsoft concentration shock
        - "Azure powers all workloads and Microsoft is also a major revenue/distribution counterparty [C011][C013][C017]."
        - Re-cut or stop if exclusivity, economics, or capacity terms materially worsen.
        - Immediate review if partnership structure changes under regulatory or commercial pressure.
        - Ongoing monitoring gate.
      - - Kill criterion: legal or regulatory adverse turn
        - "EU, FTC, and copyright matters remain unresolved [C036][C037][C038][C039][C040]."
        - Move toward avoid if remedies, injunction risk, or large mandatory licensing costs emerge.
        - Do not average through major adverse legal change at premium valuation.
        - Downside-control gate.
