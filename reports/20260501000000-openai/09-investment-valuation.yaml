company:
  name: OpenAI
chapter:
  number: 8
  title: Investment & Valuation
  summary: |-
    OpenAI screens as a category-leading platform company with exceptional demand evidence, platform breadth, and financing access, but the public evidence base supports only a cautious investment posture at current marks [C014][C017][C019][C022][C046]. The last closed valuation in the retained ledger is $157B post-money in October 2024, and the strongest public revenue anchor is a reported 2024 pace of about $3.4B, implying roughly 46.2x value-to-revenue on a same-period cross-check [C014][C017][C046]. Because the ledger does not provide audited standalone financials, a true peer-multiple set, or resolved governance/control terms, the most defensible recommendation is track rather than buy: the business quality is strong, but current valuation support is stretched relative to the evidence certainty available publicly [C041][C045][C046].
callouts:
  - type: key-insight
    title: The asset is high quality, but the underwriting file is incomplete
    body: OpenAI has strong product breadth, enterprise traction, and financing support, yet public evidence still leaves major gaps around audited economics, governance rights, and legal outcomes [C014][C017][C019][C022][C041][C045].
    claimRefs:
      - C014
      - C017
      - C019
      - C022
      - C041
      - C045
  - type: key-insight
    title: Last closed valuation implies a premium multiple
    body: Using the last closed $157B post-money round and the reported $3.4B 2024 revenue pace yields an implied value-to-revenue cross-check of about 46.2x, which leaves limited room for error without stronger disclosure [C014][C017][C046].
    claimRefs:
      - C014
      - C017
      - C046
  - type: risk-alert
    title: Unclosed 2025 valuation discussions should not anchor the model
    body: The reported $340B January 2025 financing discussions are useful as sentiment data, but the retained evidence does not show that round as closed, so it should not replace the $157B closed mark in underwriting [C016][C046].
    claimRefs:
      - C016
      - C046
  - type: final-recommendation
    title: Recommendation is track with stretched valuation stance
    body: OpenAI remains strategically attractive, but the combination of significant risk and a premium last closed valuation argues for tracking the company or engaging only with stronger disclosure, downside protection, or a more favorable entry point [C014][C017][C037][C039][C041][C045][C046].
    claimRefs:
      - C014
      - C017
      - C037
      - C039
      - C041
      - C045
      - C046
