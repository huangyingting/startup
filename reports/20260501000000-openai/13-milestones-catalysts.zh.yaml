schemaVersion: startup-diligence-v3
artifact: milestones-catalysts
slug: openai
runDate: 2026-05-01
company:
  name: OpenAI
horizons:
  next6Months:
    - id: M001
      milestone: '提供投资者级别的分部收入结构、毛利率、烧钱与留存披露。'
      type: financial
      bullishIfAchieved: '若实现，将通过揭示企业与 API 收入占比及单位经济学是否支撑当前估值叙事，实质性降低承销风险。'
      bearishIfMissed: '若继续不透明，市场将只能依赖公司自报的规模声明，下行中的倍数压缩风险也会维持高位。'
      claimRefs: [C038, C039]
    - id: M002
      milestone: '证明多云分发能够在 Azure 相关渠道之外，实质性扩大付费企业部署。'
      type: partnership
      bullishIfAchieved: '将表明 OpenAI 正在提升议价能力，并把 AWS 可得性转化为真实的商业多元化。'
      bearishIfMissed: '将意味着云可选性更多停留在叙事层面，而非经济现实，伙伴集中度仍顽固偏高。'
      claimRefs: [C031, C033, C050]
    - id: M003
      milestone: '将 OneGov、FedRAMP 定位与 GovCloud 部署等公共部门准入路径，转化为可持续的付费使用，而不主要是低摩擦试用。'
      type: gtm
      bullishIfAchieved: '将验证政府确实是有意义的商业化渠道，而不只是信誉背书和采购切入口。'
      bearishIfMissed: '将表明政策与采购复杂性正在稀释当前公共部门叙事的价值。'
      claimRefs: [C016, C018, C019, C050]
  next12Months:
    - id: M004
      milestone: '在大型企业内部，通过连接器、共享工作区、编码与智能体场景展示更深的工作流嵌入。'
      type: product
      bullishIfAchieved: '将强化 OpenAI 正在成为工作流基础设施而非可替换助手界面的证据。'
      bearishIfMissed: '将支持这样一种观点：采用虽广但浅，因而更容易被替代方案攻击。'
      claimRefs: [C013, C023, C025, C030]
    - id: M005
      milestone: '通过维持高级领导层稳定，并明确研究、安全、基础设施与商业职能的归属，降低关键人物与班子风险。'
      type: hiring
      bullishIfAchieved: '将提升外界对执行能够在不过度依赖少数创始层领导者的情况下持续推进的信心。'
      bearishIfMissed: '将加剧市场担忧：人员流动或组织模糊性会在扩张过程中成为瓶颈。'
      claimRefs: [C011, C045, C046]
    - id: M006
      milestone: '证明合规与安全治理能够扩展，而不会实质拖慢产品交付或削弱企业信任。'
      type: regulatory
      bullishIfAchieved: '将支持这样一种判断：OpenAI 可以在保持商业进取的同时，继续被受监管买方接受。'
      bearishIfMissed: '将表明监督、审核或政策负担正在拖累增长或采用。'
      claimRefs: [C020, C021, C036, C042]
  next24Months:
    - id: M007
      milestone: '证明 OpenAI 的护城河正在通过留存、扩张与工作流锁定加深，而不只是品牌与分发广度。'
      type: gtm
      bullishIfAchieved: '如果客户变得更深度嵌入且更难替换，这将为更高的长期软件倍数提供依据。'
      bearishIfMissed: '将强化市场对该业务仍易受云原生、垂直型或内部自建替代方案冲击的担忧。'
      claimRefs: [C023, C030, C048]
    - id: M008
      milestone: '在前沿 AI 算力强度背景下，维持收入增长的同时，改善商业化质量与资本纪律的证据。'
      type: financial
      bullishIfAchieved: '将增强市场对 OpenAI 能将类目领先转化为持久价值捕获，而非昂贵规模扩张的信心。'
      bearishIfMissed: '即便使用量依旧很高，当前估值也会更难自圆其说。'
      claimRefs: [C038, C039, C044, C046]
    - id: M009
      milestone: '将直销产品、AWS、Azure 相关路径与政府采购上的多渠道触达，转化为更强韧的议价能力和更低的伙伴集中度。'
      type: partnership
      bullishIfAchieved: '将表明 OpenAI 的渠道广度正在演化为结构性杠杆，而非战术性分发。'
      bearishIfMissed: '将使公司继续暴露于由伙伴塑造的经济模式之中，其战略灵活性也会比表面叙事更窄。'
      claimRefs: [C031, C032, C033, C050]
leadingIndicators:
  - indicator: '任何经审计或有可靠来源支持的分部收入、毛利率、烧钱、留存或客户集中度披露。'
    cadence: episodic
    sourceToWatch: '公司融资披露、可信媒体，或数据室材料'
    claimRefs: [C038, C039]
  - indicator: 'OpenAI 的信任与透明度指标，包括法律流程与安全报告数量。'
    cadence: quarterly
    sourceToWatch: 'OpenAI trust and transparency 页面'
    claimRefs: [C020, C046]
  - indicator: '展示可复制采用深度、工作流扩张或量化结果的企业客户证据。'
    cadence: monthly
    sourceToWatch: 'OpenAI 案例研究与独立客户引用'
    claimRefs: [C023, C025]
  - indicator: '安全、基础设施、部署与商业化岗位的招聘势头与领导层稳定性。'
    cadence: monthly
    sourceToWatch: 'OpenAI 招聘搜索与高管公告'
    claimRefs: [C011, C045]
  - indicator: '通过 AWS、Azure、GovCloud 与 GSA 采购渠道实现付费扩张的证据。'
    cadence: quarterly
    sourceToWatch: '伙伴公告、采购通知与政府更新'
    claimRefs: [C018, C031, C033, C050]
  - indicator: '影响高风险受监管场景的定价、打包或政策变化。'
    cadence: episodic
    sourceToWatch: 'OpenAI 定价与使用政策页面'
    claimRefs: [C008, C021]
killCriteria:
  - criterion: '有可信证据表明，2026 年 3 月的收入、用户或订阅者声明，显著高估了可持续的付费需求。'
    severity: critical
    detectionMethod: '经审计报表、董事会审阅指标或可信调查报道'
  - criterion: '毛利率、烧钱或算力承诺显示，在当前估值下该业务模型在结构上较差。'
    severity: critical
    detectionMethod: '财务披露或尽调材料'
  - criterion: '治理变化实质削弱了安全监督，或进一步降低了投资者透明度与一致性。'
    severity: high
    detectionMethod: '结构、董事会或委员会变化'
  - criterion: '进一步的高层流失，实质削弱了研究、基础设施、安全或企业销售的执行深度。'
    severity: high
    detectionMethod: '高管离职与关键岗位长期空缺'
  - criterion: '重大监管、安全或信任事件，实质损害企业或公共部门部署。'
    severity: high
    detectionMethod: '监管行动、客户流失或事件披露'
catalystCalendar:
  - event: '2026 年 3 月融资后潜在的经审计或投资者级披露'
    expectedDate: null
    impact: high
  - event: '证明 AWS 分发与多云权利正在转化为新增企业赢单的证据'
    expectedDate: null
    impact: medium
  - event: 'OneGov、FedRAMP 或 GovCloud 渠道下政府采购采用情况的更新'
    expectedDate: null
    impact: medium
  - event: '影响控制权与透明度的董事会、安全监督或结构更新'
    expectedDate: null
    impact: high
