schemaVersion: startup-diligence-v3
artifact: research-plan
slug: openai
runDate: 2026-05-01
company:
  name: OpenAI
  requestedName: OpenAI
  requestedUrl: null
researchScope:
  focus: '按 v3 schema 对 OpenAI 开展全面公司尽调，重点覆盖实体核验、法律实体、治理与控制、领导层连续性、董事会与顾问结构，以及团队构成。'
  depth: standard
  geography: Global
  sectorHypothesis: '一家覆盖消费者应用、企业软件、开发者平台以及高算力前沿模型基础设施的 AI 研究与部署公司'
keyResearchQuestions:
  - id: Q001
    question: '当官方材料将 OpenAI 描述为非营利基金会、营利性公益公司以及多个运营附属实体时，正确的尽调目标实体究竟是什么？'
    whyItMatters: '若研究对象实体选错，法律、治理、所有权和财务结论都会受到污染。'
  - id: Q002
    question: '目前，OpenAI Foundation、OpenAI Group PBC、OpenAI OpCo, LLC 与 OpenAI Ireland Limited 之间，哪些法律实体分别负责使命监督、融资、隐私控制、合同签署与国际业务？'
    whyItMatters: '要评估控制权、监管边界与收入归属，必须厘清实体层面的分工。'
  - id: Q003
    question: '谁创立了 OpenAI，如今由谁领导，以及当前最重要的董事会、委员会和顾问关系是什么？'
    whyItMatters: '对于由使命控制的前沿 AI 组织而言，领导层连续性与治理质量是核心风险因素。'
  - id: Q004
    question: '关于创始人留任、高管流动，以及当前技术、运营与政策领导层深度，现有证据有哪些？'
    whyItMatters: '当产品方向与融资依赖少数领导者时，团队韧性与继任深度的重要性会被放大。'
  - id: Q005
    question: '当前招聘信号透露出 OpenAI 在研究、产品、安全、基础设施、政府事务与商业化方面的哪些运营优先级？'
    whyItMatters: '招聘重点是识别战略方向与组织瓶颈最清晰的近实时指标之一。'
  - id: Q006
    question: '后续尽调应如何区分公司层面的表述，与具体属于 ChatGPT、API 平台、OpenAI Foundation 或其他业务单元的表述？'
    whyItMatters: '产品与品牌混淆会导致增长被夸大、风险误归因，以及竞争定位错误。'
  - id: Q007
    question: '在 2025 年资本重组及后续委员会调整之后，当前真正生效的治理与安全监督机制是什么？'
    whyItMatters: '使命锁定、董事会任命权与安全监督，是 OpenAI 不寻常但具有实质意义的差异化因素。'
  - id: Q008
    question: '在身份与团队范围厘清后，后续尽调应优先关注哪些角度？'
    whyItMatters: '后续阶段应把时间投入到实体结构与团队证据最能产生决策价值的地方。'
priorityAngles:
  - angle: identity
    priority: high
    rationale: 'OpenAI 是一个横跨多个法律实体与产品界面的伞形品牌，因此实体精确性是首个门槛问题。'
  - angle: legal
    priority: high
    rationale: '治理、隐私控制、合同与所有权，最终都取决于某项事实归属于哪个法律实体。'
  - angle: governance
    priority: high
    rationale: '非营利控制、PBC 结构、董事会构成与委员会权利，是尽调质量的核心。'
  - angle: team
    priority: high
    rationale: '创始人留任、高管连续性与领导层深度，对执行能力和关键人物风险具有实质影响。'
  - angle: risk
    priority: high
    rationale: '治理复杂性与领导层集中度带来投资风险，应尽早揭示。'
  - angle: funding
    priority: medium
    rationale: '近期资本重组与资金密集度很重要，但可在实体映射厘清后由后续阶段量化。'
  - angle: business-model
    priority: medium
    rationale: 'OpenAI 在多个界面上实现商业化，但准确的模式分析首先依赖于区分公司层面与产品层面的陈述。'
  - angle: product
    priority: medium
    rationale: '产品界面映射很重要，但应在尽调目标与法律结构明确之后展开。'
  - angle: technology
    priority: medium
    rationale: '前沿模型与基础设施定位固然重要，但本阶段的首要任务仍是身份与治理。'
  - angle: traction
    priority: medium
    rationale: '采用与增长声明很重要，但后续研究者应先校正实体与产品归因，再进行验证。'
  - angle: competition
    priority: low
    rationale: '竞争定位的重要性在后续阶段更高，而本阶段主要是避免做成错误公司、错误实体的分析。'
sourceStrategy:
  sourceTarget: 30
  mustHaveSourceTypes:
    - 官方网站
    - 法律与政策页面
    - 公司公告
    - 可信商业媒体
    - 企业数据库
    - 创始人与高管资料
    - 招聘与岗位页面
  disconfirmingEvidencePlan: '对每一条公司层面陈述，都要检验其是否实际上属于 OpenAI Foundation、OpenAI Group PBC、OpenAI OpCo, LLC、OpenAI Ireland Limited、ChatGPT，或其他产品/业务单元，而不是整个 OpenAI 组织；优先采用明确指明治理实体、董事会、控制方或合同相对方的来源。'
  handoffNotes: '后续阶段在涉及治理、所有权、合同、隐私控制、雇佣或区域运营的陈述时，应标注准确法律实体。团队指标在没有一级来源或高信誉独立核验来源支持前应保持为 null；官方招聘页面能提供强招聘信号，但并未披露总员工数。'
