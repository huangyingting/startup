schemaVersion: startup-diligence-v1
artifact: risk-governance
slug: openai
runDate: 2026-05-01
company:
  name: OpenAI
riskRegister:
  - id: R001
    category: financial
    risk: "Public valuation and revenue narrative are far easier to observe than underlying unit economics, leaving investors exposed to multiple compression or margin disappointment."
    severity: critical
    likelihood: high
    timeHorizon: near
    mitigation: "Require audited or otherwise credible disclosure of segment revenue, gross margin, burn, retention, and customer concentration before underwriting price."
    claimRefs: [C038, C039]
  - id: R002
    category: governance
    risk: "Foundation control and mission-first duties limit ordinary investor influence over board composition, strategy, and downside management."
    severity: high
    likelihood: high
    timeHorizon: long
    mitigation: "Treat this as a governance-light position and seek strong information rights and pro rata rather than expecting conventional control."
    claimRefs: [C002, C003, C004, C005]
  - id: R003
    category: execution
    risk: "Key-person dependence remains high because leadership credibility, fundraising, and external trust are concentrated in Sam Altman and a small senior bench amid recent turnover."
    severity: high
    likelihood: medium
    timeHorizon: near
    mitigation: "Test succession depth, delegated operating ownership, and retention plans across research, product, safety, and go-to-market."
    claimRefs: [C045, C046]
  - id: R004
    category: platform
    risk: "Cloud and channel dependence remain material even after AWS expansion because Microsoft is still the primary cloud partner and first-ship destination."
    severity: high
    likelihood: medium
    timeHorizon: medium
    mitigation: "Monitor whether multi-cloud execution materially diversifies revenue, deployment, and bargaining power."
    claimRefs: [C031, C032, C033, C050]
  - id: R005
    category: regulatory
    risk: "Moderation load, usage-policy limits, and past antitrust scrutiny show regulatory and policy obligations can shape product scope and go-to-market."
    severity: high
    likelihood: medium
    timeHorizon: medium
    mitigation: "Prioritize regulated-use-case governance, documented evals, and periodic review of transparency, policy, and competition disclosures."
    claimRefs: [C020, C021, C034, C035, C042, C046]
  - id: R006
    category: gtm
    risk: "Enterprise and public-sector adoption depend on procurement, compliance, connectors, and change management, which can slow monetization even when demand is strong."
    severity: high
    likelihood: high
    timeHorizon: near
    mitigation: "Track paid expansion, procurement conversion, and deployment depth rather than top-of-funnel usage alone."
    claimRefs: [C019, C025, C042, C050]
  - id: R007
    category: competition
    risk: "OpenAI's breadth is strong, but much of its moat appears to come from distribution and packaging rather than an unassailable isolated product advantage."
    severity: medium
    likelihood: high
    timeHorizon: medium
    mitigation: "Look for evidence that connectors, workflow embedment, and multi-channel distribution are producing durable retention or higher share of wallet."
    claimRefs: [C030, C031, C033, C048]
  - id: R008
    category: funding
    risk: "Frontier-model development remains structurally capital intensive, so even very large revenue can coexist with heavy ongoing capital needs."
    severity: high
    likelihood: medium
    timeHorizon: medium
    mitigation: "Obtain visibility into compute commitments, infrastructure financing, and scenario-level cash needs."
    claimRefs: [C044, C046]
governance:
  controlStructure: "OpenAI operates through a Foundation-plus-PBC structure in which the OpenAI Foundation governs OpenAI Group PBC, appoints all Group directors, and oversees safety through an independent board committee."
  keyPersonRisk: high
  investorAlignment: "Economic upside exists for investors, but governance is explicitly mission-first and board control does not follow ordinary venture norms; Microsoft also already holds a large stake."
  transparencyConcerns:
    - "Public disclosures do not provide audited segment revenue, gross margin, burn, retention, or customer concentration."
    - "The largest 2026 user, subscriber, revenue, and valuation figures are company-reported rather than independently validated."
    - "Leadership continuity and day-to-day operating ownership remain less transparent than the headline board structure."
  claimRefs: [C002, C003, C004, C005, C036, C038, C039, C045]
legalRegulatory:
  knownIssues:
    - "The CMA scrutinized the Microsoft/OpenAI relationship before deciding it did not qualify for investigation under UK merger provisions."
    - "OpenAI's own usage policies restrict certain licensed, sensitive, and national-security uses without additional approval or human oversight."
    - "Trust disclosures show material ongoing moderation and legal-process obligations at scale."
  regulatoryExposure: high
  compliancePosture: "OpenAI has credible enterprise compliance packaging, including SOC 2 Type 2, ISO certifications, data residency, DPAs or BAAs, and no-training defaults for business data, but regulated deployments remain policy- and process-heavy."
  claimRefs: [C010, C020, C021, C034, C035, C042]
redFlags:
  - flag: "The March 2026 financing and scale narrative are strategically important but rely on unusually large self-reported figures with thin independent validation."
    severity: critical
    evidenceQuality: medium
    claimRefs: [C038, C039]
  - flag: "Board control resides with the Foundation, which can replace directors at any time, reducing ordinary investor governance leverage."
    severity: high
    evidenceQuality: high
    claimRefs: [C002, C003, C005]
  - flag: "Recent senior-executive and founder departures show real continuity risk beneath the headline brand strength."
    severity: high
    evidenceQuality: high
    claimRefs: [C045]
  - flag: "Compute and infrastructure intensity may stay high even if topline continues to grow."
    severity: high
    evidenceQuality: medium
    claimRefs: [C044, C046]
riskVerdict:
  overallRisk: high
  rationale: "OpenAI looks operationally strong but institutionally complex. The biggest risks are not lack of demand; they are valuation paid against opaque economics, mission-controlled governance with limited investor leverage, leadership concentration, and the capital intensity of frontier AI."
  confidence: medium
  claimRefs: [C002, C003, C005, C038, C039, C044, C045, C046]
