company:
  name: OpenAI
chapter:
  number: 6
  title: Customer & Retention
  summary: |-
    OpenAI's customer footprint is clearly large, but retention quality is only weak-to-moderate under public-evidence standards because the ledger contains strong adoption signals and very limited cohort metrics [C009][C010][C018][C019][C028][C052]. The strongest customer facts are company-claimed hundreds of millions of ChatGPT users, a reported 1M paid corporate users across Team, Enterprise, and Edu by September 2024, and a 4.8/5 iOS rating across 6.9M ratings as of 2026-05-01 [C009][C010][C019]. What remains missing are the investor-grade retention metrics: logo churn, NRR, GRR, cohort retention, expansion by segment, customer concentration, and named case-study detail.
callouts:
- type: key-insight
  title: OpenAI has both mass-market reach and meaningful paid enterprise adoption
  body: The retained ledger supports company-claimed hundreds of millions of users overall and a reported 1M paid corporate users across Team, Enterprise, and Edu, indicating breadth across consumer and enterprise segments [C010][C019].
  claimRefs:
  - C010
  - C019
- type: key-insight
  title: Satisfaction signals are strong on the consumer side
  body: As of 2026-05-01, the ChatGPT iOS app showed a 4.8/5 rating across 6.9M ratings, which is one of the strongest direct user-sentiment signals in the retained evidence [C009].
  claimRefs:
  - C009
- type: opportunity
  title: Ecosystem programs can reinforce developer and workflow retention
  body: Open-source adoption, official SDKs, and community programs around Codex, student credits, and OSS-oriented initiatives suggest retention can deepen through ecosystem participation rather than product usage alone [C028][C029][C030][C031][C052].
  claimRefs:
  - C028
  - C029
  - C030
  - C031
  - C052
- type: risk-alert
  title: Retention underwriting is limited by absent cohort metrics
  body: The retained public evidence does not disclose churn, NRR, GRR, renewal rates, customer concentration, or segment-level expansion, so customer quality cannot yet be underwritten at mature-SaaS standards [C018][C019].
  claimRefs:
  - C018
  - C019
