sections:
- number: '6.1'
  title: Customer base overview
  body: |-
    The evidence base supports a very large but heterogeneous customer footprint [C009][C010][C019]. On the consumer side, OpenAI claims ChatGPT serves hundreds of millions of users, and the iOS app rating volume adds a credible external signal of scale [C009][C010]. On the enterprise side, Bloomberg via The Verge reported 1M paid corporate users across Team, Enterprise, and Edu by September 2024, which is unusually strong paid-adoption proof for a private software company at this stage [C019]. The developer base is also strategically important, with official SDKs, a broad API/tool stack, and high-adoption GitHub assets indicating meaningful ecosystem reach even without disclosed customer counts [C007][C022][C028][C029][C030][C031].
  claimRefs:
  - C007
  - C009
  - C010
  - C019
  - C022
  - C028
  - C029
  - C030
  - C031
- number: '6.2'
  title: Segmentation, use cases, and customer proof
  body: |-
    OpenAI's customer surface is best understood across four evidence-backed segments: consumers, paid corporate users, developers, and the education/community ecosystem [C008][C019][C022][C052]. Consumers use ChatGPT for search, voice, image, learning, and professional workflows according to official app descriptions [C047]. Corporate users buy Team, Enterprise, and Edu access and can move into custom-model or assisted fine-tuning engagements [C019][C020][C021]. Developers access the Responses API and official SDKs, while ecosystem programs around Codex and student credits aim to deepen future platform attachment [C022][C028][C029][C030][C031][C052]. What the retained ledger does not provide is named customer case-study evidence or customer lists, so reference-account diligence remains a critical next step.
  claimRefs:
  - C008
  - C019
  - C020
  - C021
  - C022
  - C028
  - C029
  - C030
  - C031
  - C047
  - C052
- number: '6.3'
  title: Retention, churn, and satisfaction
  body: |-
    Satisfaction and reach are better evidenced than retention [C009][C010][C019]. The strongest direct satisfaction signal is the ChatGPT iOS rating of 4.8/5 across 6.9M ratings as of 2026-05-01 [C009]. The strongest enterprise-traction signal is the 1M paid corporate-user figure [C019]. But none of the classic retention metrics needed for full SaaS underwriting are disclosed in the retained evidence: no logo churn, GRR, NRR, cohort retention, expansion by cohort, or customer concentration. As a result, it is reasonable to say OpenAI has strong adoption and promising satisfaction, but not to claim proven retention efficiency from public evidence alone.
  claimRefs:
  - C009
  - C010
  - C019
- number: '6.4'
  title: Distribution loops and ecosystem retention
  body: |-
    OpenAI's retention story may ultimately be driven as much by ecosystem depth as by classical seat renewals [C026][C027][C028][C031][C052]. Codex, ChatGPT apps distribution, official SDKs, and provider-agnostic agent tooling all increase the odds that developers and enterprises build repeat workflows around the platform [C026][C027][C029][C030][C031]. Community programs such as meetups, student credits, and OSS-oriented initiatives provide additional stickiness at the edge of the ecosystem [C052]. These are meaningful positives, but they should be viewed as qualitative retention supports until backed by renewal, expansion, and churn data.
  claimRefs:
  - C026
  - C027
  - C028
  - C029
  - C030
  - C031
  - C052
- number: '6.5'
  title: Exact diligence asks
  body: |-
    To move from adoption proof to retention underwriting, investors should request: monthly active users and paid conversion by consumer cohort; enterprise customer counts by contract size and vertical; GRR and NRR by segment; logo churn and expansion bridges; top-customer concentration; developer usage-retention cohorts; and at least several reference calls covering Team, Enterprise, API, and custom-model deployments. The retained evidence is strong enough to justify those asks because it already shows large-scale usage and paid adoption, but not enough to answer them directly [C009][C010][C019][C022][C028][C052].
  claimRefs:
  - C009
  - C010
  - C019
  - C022
  - C028
  - C052
