sections:
- number: '4.1'
  title: Revenue model overview
  body: |-
    The retained evidence supports a multi-stream revenue model rather than a single subscription business [C017][C020][C023][C024][C043]. OpenAI monetizes through ChatGPT subscriptions and in-app purchases, enterprise seats and custom-model work, usage-priced API consumption, and Azure-linked resale economics through Microsoft [C008][C017][C020][C021][C023][C024][C043]. Product-surface expansion into Codex, ChatGPT apps distribution, and commerce suggests additional monetization optionality, but the ledger does not disclose revenue contribution from those newer surfaces [C026][C027][C050]. For diligence purposes, the monetization breadth is a strength; the missing segment mix is the main analytical constraint [C017][C043].
  claimRefs:
  - C008
  - C017
  - C020
  - C021
  - C023
  - C024
  - C026
  - C027
  - C043
  - C050
- number: '4.2'
  title: Reported financial anchors and what can be derived
  body: |-
    The best public financial anchor in the retained ledger is the June 2024 report that OpenAI was on track for about $3.4B of 2024 revenue, including about $200M from Microsoft's Azure resale share [C017]. That enables a narrow but useful disclosed-component calculation: Azure resale would represent about 5.9% of that reported revenue pace if both numbers are measured on the same basis [C017]. Separately, Team pricing creates a clean list-price unit anchor of $300 to $360 per seat-year depending on billing cadence [C020]. Combining that list price with the reported 1M paid corporate users yields a low-confidence illustrative range of $300M to $360M of annualized revenue only under the simplifying assumption that every paid corporate user sits on Team list pricing, which the evidence does not support because the user base spans Team, Enterprise, and Edu with unknown discounting [C019][C020]. This is therefore a directional floor exercise, not an estimate of actual ARR.
  claimRefs:
  - C017
  - C019
  - C020
- number: '4.3'
  title: Unit economics, margin trajectory, and what remains unknowable
  body: |-
    Public pricing proves that OpenAI has strong monetization surfaces, but pricing alone does not resolve unit economics [C020][C023][C024]. The retained ledger does not disclose gross margin, contribution margin, CAC, LTV, payback, burn multiple, churn, or NRR, so none of those should be filled with proxy numbers in an investor memo [C017][C043]. Margin trajectory is also hard to underwrite from public evidence alone: OpenAI likely benefits from software-style scale on seat expansion and developer adoption, yet that potential is counterbalanced by heavy compute dependence on Azure and undisclosed inference costs [C011][C013][C017]. The right diligence posture is therefore to distinguish reported pricing power from unverified profitability.
  claimRefs:
  - C011
  - C013
  - C017
  - C020
  - C023
  - C024
  - C043
- number: '4.4'
  title: Scenario modeling discipline and diligence asks
  body: |-
    This chapter intentionally leaves bear, base, and bull projection outputs as null because the retained evidence does not contain the minimum inputs required for a defensible operating model: segment revenue mix, customer concentration, discounting, renewal rates, compute cost curves, capex or committed capacity, and historical margins. The exact diligence asks are straightforward: obtain audited or board-level financials; monthly revenue by product and segment; gross-margin waterfalls by SKU; enterprise pipeline and renewal data; CAC by channel; and committed compute-spend schedules with Microsoft and any other infrastructure counterparties. Until those materials are available, financial quality should be rated as moderate rather than strong.
  claimRefs:
  - C011
  - C017
  - C019
  - C043
  - C046
