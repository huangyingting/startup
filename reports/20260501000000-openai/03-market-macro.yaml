chapter:
  number: 2
  title: Market Sizing & Macro Analysis
  summary: |-
    OpenAI is participating in at least three large adjacent markets visible in the retained evidence set: consumer AI assistants, enterprise AI software/workflows, and developer API/agent infrastructure [C006][C007][C019][C022][C043][C047][C050]. The evidence set is strong on demand signals and product-surface breadth, but it does not provide a defensible public dollar TAM for those markets, so this chapter keeps market-size numerics explicitly null rather than inventing unsupported figures [C017][C019][C045][C046]. Market attractiveness still screens high because ChatGPT catalyzed category formation, enterprise adoption reached 1 million paid corporate users by September 2024, and OpenAI continues expanding into multimodal, coding, app-distribution, and commerce surfaces [C019][C022][C026][C027][C049][C050].
