- type: key-insight
  title: Demand evidence is stronger than public market-size evidence
  body: Public evidence clearly supports user adoption, enterprise uptake, and monetization surfaces, but not a fully reliable top-down dollar TAM; sizing discipline therefore requires null numeric placeholders where the ledger is silent [C017][C019][C043][C045][C046].
