sections:
- number: '2.1'
  title: Market definition and investable scope
  body: |-
    The retained evidence supports treating OpenAI as a participant in multiple overlapping markets rather than a single monolithic "LLM market" [C006][C007][C022][C043][C050]. First, ChatGPT and the official mobile apps place OpenAI squarely in consumer AI assistants, where usage spans search, voice, image, learning, and everyday professional tasks [C008][C047]. Second, Team, Enterprise, Edu, and custom-model workflows place the company in enterprise AI software and workflow automation [C018][C019][C020][C021]. Third, the Responses API, official SDKs, pricing, and tool stack position OpenAI in developer infrastructure and agent platforms [C007][C022][C023][C024][C031]. Finally, Codex, Sora-related APIs, ChatGPT apps, and commerce tooling widen the effective market boundary into coding, multimodal generation, distribution, and transaction-enablement layers [C025][C026][C027][C050].
  claimRefs:
