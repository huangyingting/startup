- number: '2.3'
  title: Growth drivers by segment
  body: |-
    The most important macro growth driver is category formation itself: the release of ChatGPT in late 2022 is described as catalyzing widespread interest in generative AI, creating a large awareness tailwind that still benefits early leaders [C049]. The second driver is enterprise conversion, where the evidence is notably concrete: Team pricing, customization capabilities, and 1 million paid corporate users indicate that AI demand is not limited to experimentation [C018][C019][C020][C021]. The third driver is developer ecosystem depth. OpenAI's SDKs, tool guides, pricing pages, and large GitHub/PyPI footprint suggest that the company is participating in a platform market where third parties build on top of its infrastructure [C007][C022][C023][C024][C028][C029][C030][C031]. A fourth driver is modality and workflow expansion, because current docs show OpenAI moving from pure text generation into image, video, coding, apps, and commerce surfaces [C022][C025][C026][C027][C050]. Together, these signals argue for a widening practical market even though the ledger does not contain a published dollar TAM [C022][C043][C050].
