- type: opportunity
  title: Enterprise AI is the clearest near-term monetization wedge
  body: OpenAI leadership and reporting both point to strong enterprise momentum, with Team pricing, enterprise customization, and 1 million paid corporate users providing concrete evidence of paid demand [C018][C019][C020][C021].
  claimRefs:
