- number: '2.4'
  title: Macro constraints and what investors should still ask for
  body: |-
    The same evidence that supports high market attractiveness also highlights why investors should avoid overconfidence. Azure exclusivity gives OpenAI unusual scale support, but also concentrates infrastructure dependency [C011]. EU and FTC scrutiny of Microsoft/OpenAI arrangements show that policymakers view these AI markets as strategically important and potentially competition-sensitive [C036][C037][C038]. Copyright litigation from The New York Times and the Authors Guild adds uncertainty around training-data economics and downside scenarios [C039][C040]. Because public evidence does not resolve governance terms, compute economics, or audited standalone financials, investors should request primary data before converting broad market promise into precise underwriting assumptions [C017][C045][C046].
