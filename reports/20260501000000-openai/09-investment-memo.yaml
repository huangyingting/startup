schemaVersion: startup-diligence-v3
artifact: investment-memo
slug: openai
runDate: 2026-05-01
company:
  name: OpenAI
memo:
  oneLine: "OpenAI is the leading multi-surface frontier AI platform in this source set, but current underwriting is constrained more by valuation, governance, and economic opacity than by product or demand."
  recommendation: research-more
  confidence: medium
  whyNow: "OpenAI is benefiting from the convergence of stronger agentic products, enterprise-grade controls, multi-channel distribution, and expanding government procurement paths."
  claimRefs: [C013, C018, C030, C031, C042]
scorecard:
  market:
    score: 5
    rationale: "OpenAI is exposed to overlapping consumer, developer, enterprise, education, and public-sector budgets, giving it unusually broad surface area for demand capture."
    claimRefs: [C012, C014, C041, C048]
  customerPull:
    score: 4
    rationale: "Customer cases and government and commercial adoption signals suggest demand extends well beyond experimentation, though the biggest user counts remain company-reported."
    claimRefs: [C016, C022, C023, C025]
  productQuality:
    score: 4
    rationale: "The product stack spans ChatGPT workspaces, APIs, Codex, agents, and sector packaging with meaningful security and admin hardening."
    claimRefs: [C010, C012, C013, C042]
  traction:
    score: 4
    rationale: "Traction breadth is strong across subscriptions, enterprise usage, customer case studies, and partner and procurement channels, but core revenue and user figures lack independent validation."
    claimRefs: [C018, C022, C023, C031, C038, C050]
  differentiation:
    score: 3
    rationale: "OpenAI appears somewhat differentiated through distribution, brand, workflow breadth, and procurement readiness, but the moat is not clearly unassailable."
    claimRefs: [C013, C019, C031, C042, C048, C050]
  businessQuality:
    score: 2
    rationale: "Business model breadth is attractive, yet public visibility into segment mix, margins, retention, burn, and concentration is too limited for strong business-quality confidence."
    claimRefs: [C007, C009, C038, C039, C044]
  teamAndGovernance:
    score: 2
    rationale: "Leadership quality and board depth are real positives, but mission-first control, recent turnover, and key-person dependence limit governance comfort for outside investors."
    claimRefs: [C002, C003, C005, C036, C045, C046]
  riskAdjustedAttractiveness:
    score: 2
    rationale: "At the disclosed 2026 financing, upside may still exist, but conventional venture return asymmetry looks compressed relative to the remaining economic and governance unknowns."
    claimRefs: [C038, C039, C045, C046, C048]
thesis:
  bullCase: "OpenAI converts its broad product footprint, strong brand pull, and enterprise and government distribution into a deeper workflow platform that compounds across consumer, developer, enterprise, and public-sector budgets."
  baseCase: "OpenAI remains strategically important and continues to grow, but governance complexity, cloud dependence, and incomplete economic disclosure keep valuation multiples from expanding meaningfully beyond an already elevated base."
  bearCase: "The company sustains impressive usage but disappoints on monetization quality or cost structure, while governance constraints and competition reduce flexibility just as the current valuation leaves little margin for error."
  keyAssumptions:
    - "Reported scale roughly reflects underlying demand rather than transient promotional usage."
    - "Enterprise mix and workflow depth improve faster than compute and safety costs."
    - "Multi-cloud distribution increases bargaining power without destabilizing key partnerships."
    - "Leadership continuity remains sufficient to execute across research, product, safety, and go-to-market."
  claimRefs: [C013, C018, C022, C030, C031, C033, C038, C039, C042, C045, C048, C050]
preMortem:
  topFailureModes:
    - failureMode: "Unit economics prove materially weaker than implied by the March 2026 valuation anchor."
      probability: high
      timeHorizon: near
      earlySignals:
        - "Audited or well-sourced disclosures show weaker gross margin, heavier burn, or lower enterprise mix than expected."
        - "Revenue growth decelerates without corresponding improvement in retention or ARPA."
        - "New financings occur on less favorable terms despite continued usage growth."
      claimRefs: [C038, C039, C044]
    - failureMode: "Mission-first governance and concentrated control limit corrective action when strategic or financial trade-offs worsen."
      probability: medium
      timeHorizon: medium
      earlySignals:
        - "Outside investors receive limited incremental disclosure."
        - "Board or committee changes reduce perceived independence."
        - "Major strategic decisions appear driven by partnership or mission constraints rather than shareholder value optimization."
      claimRefs: [C002, C003, C005, C036]
    - failureMode: "Leadership turnover or bench weakness slows product, safety, or commercial execution."
      probability: medium
      timeHorizon: near
      earlySignals:
        - "Additional senior departures."
        - "Roles remain open across critical safety, infrastructure, or deployment functions."
        - "Public messaging around ownership of research, product, or Foundation priorities becomes more fragmented."
      claimRefs: [C011, C045, C046]
    - failureMode: "Competition and partner dependence compress pricing power or distribution leverage."
      probability: medium
      timeHorizon: medium
      earlySignals:
        - "Key workloads migrate to customer-cloud alternatives."
        - "OpenAI's multi-cloud expansion fails to broaden procurement win rates."
        - "Customer evidence emphasizes cloud-boundary fit over OpenAI-specific workflow value."
      claimRefs: [C031, C032, C033, C050]
  rationale: "The pre-mortem centers on economics, governance, execution depth, and partner-shaped market structure because demand itself is not the primary weak point in this file set."
mindChangers:
  - evidence: "Audited disclosure of segment revenue, gross margin, burn, retention, and customer concentration showing strong economics at scale."
    direction: upgrade
    impact: high
  - evidence: "Independent confirmation that enterprise revenue mix, paid conversion, and cohort durability support the March 2026 scale claims."
    direction: upgrade
    impact: high
  - evidence: "Evidence that governance reforms materially improve investor transparency or downside protections without weakening safety oversight."
    direction: upgrade
    impact: medium
  - evidence: "Credible reporting that large reported usage is materially less monetizable than implied or heavily subsidized by promotions."
    direction: downgrade
    impact: high
  - evidence: "Further leadership attrition or a major regulatory, safety, or security failure affecting enterprise trust."
    direction: downgrade
    impact: high
expectedReturns:
  baseCaseGrossMoM: 1.408
  baseCaseGrossIrrPct: 8.9
  upsideGrossMoM: 2.347
  downsideGrossMoM: 0.704
  notes: "Convenience copy from the current valuation framework. Confidence is low because it is anchored to self-reported revenue and a single disclosed financing round."
decisionDrivers:
  positives:
    - point: "OpenAI has unusually broad product and channel coverage across consumer, enterprise, APIs, AWS, Azure-linked paths, and government procurement."
      importance: high
      claimRefs: [C012, C031, C050]
    - point: "Customer and procurement evidence suggests deployment is moving beyond pilots in finance, internet, operations, and U.S. government."
      importance: high
      claimRefs: [C018, C023, C029]
    - point: "Enterprise trust packaging is materially more mature than lightweight AI tools, with no-training defaults, compliance artifacts, and admin controls."
      importance: medium
      claimRefs: [C010, C015, C042]
    - point: "Hiring intensity suggests the company is still investing heavily against research, infrastructure, safety, and monetization demand."
      importance: medium
      claimRefs: [C011]
  concerns:
    - point: "The most important revenue, user, and valuation figures are self-reported, while audited economics remain undisclosed."
      importance: high
      claimRefs: [C038, C039]
    - point: "Governance is unusually mission-controlled and gives outside investors limited conventional leverage."
      importance: high
      claimRefs: [C002, C003, C005]
    - point: "Key-person dependence and 2024 turnover indicate nontrivial execution fragility."
      importance: high
      claimRefs: [C045, C046]
    - point: "Capital intensity and cloud-partner dependence can keep value capture below headline usage growth."
      importance: medium
      claimRefs: [C031, C033, C044]
nextDiligence:
  mustAnswer:
    - question: "What are audited or board-reviewed segment revenue, gross margin, burn, and customer concentration across consumer, enterprise, API, and government?"
      owner: company
      priority: high
    - question: "How much of the reported scale is paid, retained, and expansion-driven rather than promotional or low-monetization usage?"
      owner: company
      priority: high
    - question: "What are the exact governance, information, and pro rata rights available to new investors under the Foundation-plus-PBC structure?"
      owner: legal
      priority: high
    - question: "What are OpenAI's current compute commitments, cloud concentration, and infrastructure financing obligations?"
      owner: company
      priority: high
    - question: "How is day-to-day executive ownership distributed across research, applications, safety, infrastructure, government, and Foundation programs?"
      owner: company
      priority: medium
    - question: "How do major enterprise customers evaluate switching cost and substitute risk versus cloud-native or internal alternatives?"
      owner: customer
      priority: medium
  dataRoomRequests:
    - "Board-approved or auditor-reviewed revenue bridge by segment and geography."
    - "Gross margin and contribution margin by major product surface."
    - "Burn, capex or compute commitments, and cash runway scenario planning."
    - "Top-customer concentration, churn, NRR or GRR, and expansion cohorts."
    - "Current cap-table details, investor rights, and any partnership-related governance constraints."
    - "Org chart showing ownership across research, product, safety, infrastructure, sales, government, and Foundation activities."
  expertCalls:
    - "Former or current enterprise buyers who evaluated OpenAI against cloud-native alternatives."
    - "Government procurement specialists familiar with OneGov, FedRAMP, and GovCloud deployment friction."
    - "AI infrastructure experts who can benchmark likely compute intensity and bargaining power under a multi-cloud strategy."
    - "Governance counsel or public-benefit-corporation experts who can assess downside protection under Foundation control."
