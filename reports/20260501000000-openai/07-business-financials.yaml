    - stream: business and enterprise seats
      disclosedRevenueUsdM: null
      qualitySignal: high-potential
      notes: "Enterprise pages, customer cases, and CNBC's report of 3M paying business users suggest workflow adoption, security controls, and seat-based expansion, but NRR and contract quality remain undisclosed."
