    - stream: usage-based API
      disclosedRevenueUsdM: null
      qualitySignal: mixed
      notes: "Usage-based API pricing is included in the reported ARR definition and can scale with developer demand, but it may carry volatile usage, model substitution risk, and compute-cost sensitivity."
