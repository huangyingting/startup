scenarioModel:
  note: Scenarios are low-confidence directional estimates anchored to the company-reported March 2026 revenue run-rate and adjusted for execution, competitive, regulatory, and capital-intensity outcomes rather than audited financial history.
  scenarios:
    - name: downside
      revenueRangeYear3: $32 billion to $39 billion
      revenueYear3UsdMLow: 32000
      revenueYear3UsdMHigh: 39000
      marginDirection: deteriorating
      capitalNeed: Potential need for additional external capital, structured compute financing, or tighter spending controls if growth slows while infrastructure commitments remain elevated.
      keyAssumptions:
        - Starts from a low-confidence $24 billion annualized revenue run-rate derived from the company-reported March 2026 $2 billion monthly revenue figure.
        - Assumes roughly 10% to 18% annualized topline growth over three years because competition, regulation, and monetization quality are less favorable than headline adoption suggests.
        - Assumes compute, safety, and deployment costs remain heavy relative to revenue growth.
      confidence: low
      claimRefs: [C038, C039, C044, C046, C048]
    - name: base
      revenueRangeYear3: $41 billion to $54 billion
      revenueYear3UsdMLow: 41000
      revenueYear3UsdMHigh: 54000
      marginDirection: improving
      capitalNeed: The March 2026 financing could support the base case, but ongoing infrastructure and partner-cloud commitments would still keep capital needs material.
      keyAssumptions:
        - Starts from the same low-confidence $24 billion annualized revenue run-rate anchor.
        - Assumes roughly 20% to 31% annualized topline growth as enterprise, developer, and public-sector adoption keep expanding.
        - Assumes some mix shift toward enterprise and higher-value workflows improves monetization faster than operating costs.
      confidence: low
      claimRefs: [C018, C022, C030, C038, C048, C050]
    - name: upside
      revenueRangeYear3: $59 billion to $79 billion
      revenueYear3UsdMLow: 59000
      revenueYear3UsdMHigh: 79000
      marginDirection: improving
      capitalNeed: Even in the upside case, OpenAI would likely continue absorbing very large compute and deployment spend, though stronger revenue could partially self-fund expansion.
      keyAssumptions:
        - Starts from the same low-confidence $24 billion annualized revenue run-rate anchor.
        - Assumes roughly 35% to 49% annualized growth if OpenAI sustains category leadership across consumer, enterprise, developer, and government channels.
        - Assumes workflow depth and enterprise mix improve enough to offset some compute intensity and partner economics.
      confidence: low
      claimRefs: [C018, C022, C031, C038, C041, C048, C050]
financialVerdict:
  assessment: uncertain
  rationale: OpenAI appears to have real and unusually large monetization across subscriptions, enterprise seats, and API usage, but public financial transparency is still too limited for high-confidence underwriting. Revenue scale claims are compelling, yet gross margin, burn, retention, capital efficiency, and segment mix remain opaque while frontier-model development appears structurally capital intensive.
  confidence: medium
  claimRefs: [C007, C038, C039, C044, C046, C048]
