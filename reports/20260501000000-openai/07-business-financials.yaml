  knownPreferences: SoftBank disclosed a 2026 follow-on investment in automatically converting preferred shares; CNBC reported that 2025 venture backers received convertible notes that would turn into equity. Full liquidation preferences, conversion triggers, and investor rights are not publicly disclosed.
  notes: The current structure page says the OpenAI Foundation owns 26% of OpenAI Group, Microsoft holds roughly 27%, and current or former employees and investors hold the remaining 47%. Public evidence in this source set does not isolate founder ownership or option-pool size, while SoftBank disclosures help but do not fully define preferred terms.
