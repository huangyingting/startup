knownFinancials:
  revenue: OpenAI claimed about $2 billion in monthly revenue in March 2026, implying roughly $24 billion annualized run-rate; CNBC separately reported $10 billion ARR in June 2025 on a consumer, business, and API revenue definition that excluded Microsoft licensing and large one-time deals.
  arr: '$10 billion reported ARR in June 2025; later 2026 monthly revenue claim implies roughly $24 billion annualized revenue run-rate but is not audited ARR.'
  grossMargin: Not publicly disclosed in the current source set.
  burnRate: CNBC reported OpenAI lost about $5 billion in 2024, but current public sources do not provide audited current burn rate or product-level cash burn.
  cashRunway: Not publicly disclosed in the current source set.
  valuation: OpenAI claimed an $852 billion post-money valuation for the March 2026 financing.
  claimRefs: [C038, C039, C055, C056]
revenueQuality:
  disclosureLevel: limited-public
  qualityVerdict: mixed-unknown
  rationale: "Public evidence now includes an independently reported $10B ARR milestone with a disclosed revenue definition across consumer, business, and API surfaces, plus paying business-user growth. However, the file still lacks audited segment revenue, gross margin, retention, customer concentration, and paid-cohort data. Treat revenue quality as promising but not underwritable without company materials."
  revenueMix:
