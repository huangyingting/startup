  - gap: 'Audited segment revenue, gross margin, retention, and customer concentration across consumer, enterprise, API, and government remain undisclosed.'
    impact: high
    suggestedSource: 'Audited financial statements, lender documents, or credible independently sourced investor diligence materials'
  - gap: 'Independent validation of the largest 2026 scale claims on users, subscribers, revenue, and valuation is still limited.'
    impact: high
    suggestedSource: 'Tier-one reporting with named sources, financing documents, or public investor disclosures'
  - gap: 'Current public evidence does not cleanly map day-to-day executive ownership across research, products, infrastructure, safety, government, and Foundation activities.'
    impact: medium
    suggestedSource: 'Executive bios, organization charts, major conference appearances, or verified management profiles'
  - gap: 'Compute economics, cloud commitments, and capex intensity by product line remain too opaque for strong unit-economics underwriting.'
    impact: high
    suggestedSource: 'Credit agreements, partner disclosures, or detailed management commentary with product-level granularity'
  - gap: 'Non-U.S. public-sector procurement scale and recurring revenue contribution remain much less visible than U.S. evidence.'
    impact: medium
    suggestedSource: 'International procurement databases, contract notices, or agency budget documents outside the United States'