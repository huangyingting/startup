evidenceGaps:
- gap: No standalone audited OpenAI financial statements were available in fetched public sources, limiting revenue quality, margin, burn, and cash runway analysis.
  impact: high
  diligencePath: Request audited or board-level financials plus current operating plan and capex forecasts.
- gap: Exact post-restructuring governance, nonprofit control rights, and current cap table could not be verified from fetched official company pages or public filings.
  impact: high
  diligencePath: Obtain current charter/bylaws, intercompany agreements, and post-2024 cap table from counsel/company.
- gap: Customer concentration, cohort retention, and enterprise contract metrics were not publicly disclosed in fetched sources beyond high-level paid-user counts.
  impact: high
  diligencePath: Request cohort, NRR, logo concentration, pipeline, and churn data by segment.
- gap: Compute economics, GPU commitments, and data-center obligations were only partially visible via partner/news reporting.
  impact: high
  diligencePath: Request compute contracts, committed spend, and capacity roadmap including Stargate/third-party commitments.
- gap: Current official pricing and plan detail for ChatGPT Enterprise, Business, Edu, and custom-model services remain incompletely public.
  impact: medium
  diligencePath: Request current rate cards, discounting corridors, and mix by plan/product.
- gap: Open legal exposure from copyright litigation, competition scrutiny, and safety/governance disputes remains dynamic and not fully quantifiable from public materials alone.
  impact: high
  diligencePath: Review litigation tracker, counsel assessments, reserves, insurance, and settlement scenarios.
