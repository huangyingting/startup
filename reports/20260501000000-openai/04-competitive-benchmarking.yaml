- number: '3.5'
  title: Investor takeaway
  body: |-
    Based on the retained evidence, OpenAI is best described as a leader: it combines category-defining brand, strong enterprise traction, broad developer tooling, and expanding workflow surfaces in a way that few companies can match on this evidence set [C019][C022][C026][C028][C049][C050]. The most important diligence question is not whether OpenAI has competitive strength today, but how much of that strength is durable once Microsoft dependence, policy scrutiny, and up-stack application disintermediation are fully underwritten [C011][C031][C037][C038][C045]. Investors should therefore underwrite OpenAI as a platform leader with real dependency risk, not as a fully unconstrained winner-take-all asset [C011][C017][C037][C045][C046].
