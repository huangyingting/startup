- id: T303
  title: Moat assessment
  columns:
  - Moat vector
  - Evidence
  - Durability read
  - Vulnerability
  rows:
  - - Distribution breadth
    - ChatGPT apps, enterprise plans, APIs, coding agents, app distribution, and commerce surfaces create multiple go-to-market loops [C006][C019][C026][C027][C050].
    - High
    - Can still be attacked if value shifts to downstream application owners [C027][C050][C052].
  - - Enterprise traction
    - 1 million paid corporate users and enterprise packaging/customization provide paid-adoption proof [C019][C020][C021].
    - High
    - Lack of public retention, concentration, and margin data limits confidence in durability quality [C045].
  - - Developer ecosystem
    - Official SDKs plus large GitHub/PyPI footprint support mindshare and implementation familiarity [C007][C028][C029][C030][C031].
    - Medium to high
    - Provider-agnostic orchestration can reduce lock-in over time [C031].
  - - Compute and distribution leverage through Microsoft
    - Azure exclusivity and Microsoft embedding provide scale and enterprise access [C011][C013][C017].
    - Medium
    - Same relationship concentrates dependency and draws regulatory scrutiny [C036][C037][C038].
  - - Brand/category leadership
    - ChatGPT catalyzed broad generative-AI adoption and retains mass-market visibility [C009][C010][C049].
    - Medium to high
    - Category leadership can erode if differentiation compresses or legal/regulatory outcomes weaken trust [C039][C040][C041].
  notes: Durability ratings are evidence-led investment judgments rather than audited facts.
