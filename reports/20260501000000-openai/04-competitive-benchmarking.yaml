sections:
- number: '3.1'
  title: Competitive overview
  body: |-
    The retained evidence suggests OpenAI should be benchmarked as a multi-surface platform company rather than as a single-model vendor [C006][C022][C026][C027][C050]. Consumer distribution comes through ChatGPT web/mobile, enterprise distribution through Team/Enterprise/Edu, and developer distribution through official SDKs, APIs, tools, and ecosystem assets [C007][C008][C019][C020][C022][C028]. This matters because competitive advantage in AI is not only about model quality; it is also about who owns the user relationship, the workflow layer, the developer surface, and the monetization paths [C019][C022][C027][C043][C050]. On that basis, OpenAI appears to have unusually broad competitive coverage in the retained evidence set [C006][C019][C022][C026][C028][C050].
  claimRefs:
  - C006
  - C007
  - C008
  - C019
  - C020
