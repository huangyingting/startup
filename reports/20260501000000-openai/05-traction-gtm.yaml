tractionSummary:
  overallSignal: strong
  rationale: OpenAI shows unusually broad demand across consumer, enterprise, developer, and government channels. The strongest evidence is a mix of company-reported scale claims such as more than 5 million business users, more than 900 million weekly users, more than 50 million subscribers, and about $2 billion of monthly revenue, plus independently corroborated customer deployment evidence and procurement or distribution expansion through GSA, AWS, and Azure-linked channels. Confidence is capped because the largest usage and revenue figures are self-reported and segment-level monetization remains opaque.
  confidence: medium
  claimRefs: [C018, C022, C023, C031, C038, C050]
