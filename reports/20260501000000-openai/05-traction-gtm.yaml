gtmMotion:
  primaryMotion: hybrid
  buyer: CIOs, CTOs, CDOs, engineering leaders, individual users, and public-sector procurement or mission owners
  user: Knowledge workers, developers, analysts, support teams, operations teams, students, and government staff
  channels:
    - consumer self-serve subscriptions
    - ChatGPT Business self-serve seat sales
    - direct enterprise sales
    - developer API and coding-tool adoption
    - cloud-partner distribution through Azure and AWS
    - government procurement vehicles such as GSA OneGov
  salesCycleHypothesis: medium
  pipelineHealth: Strong top-of-funnel demand is visible through consumer pull, self-serve pricing, enterprise usage claims, government procurement offers, and partner-cloud distribution, but paid conversion, churn, and segment mix are not publicly disclosed.
  claimRefs: [C007, C013, C014, C018, C040, C041, C050]
pricingAndPackaging:
  observedPricing: ChatGPT offers free and paid consumer tiers, ChatGPT Business is publicly listed at SGD 25 per user per month billed annually, Enterprise is custom priced, API pricing is usage based, and U.S. federal agencies have a $1 first-year OneGov entry offer for ChatGPT Enterprise.
  pricingModel: hybrid
  packagingNotes: OpenAI packages separate consumer, SMB, enterprise, education, government, and developer surfaces. Enterprise value is bundled with shared workspaces, connectors, admin controls, retention settings, and deployment support rather than raw model access alone.
  claimRefs: [C008, C009, C013, C015, C018]
retentionExpansionSignals:
  evidence:
    - Morgan Stanley reported daily usage across nearly all advisor teams and over 98% adoption in wealth management.
    - CyberAgent reported a 93% monthly active user rate across nearly all departments.
    - Enterprise packaging emphasizes connectors, shared workspaces, apps, and admin controls that can support seat expansion and deeper workflow embedment.
  concerns:
    - OpenAI does not publicly disclose GRR, NRR, logo retention, or paid-seat churn by segment.
    - The largest user and revenue metrics are company reported rather than independently audited.
    - Promotional public-sector pricing and broad weekly-user figures do not reveal steady-state monetization quality.
  confidence: low
  claimRefs: [C013, C022, C023, C025, C038, C039]
gtmRisks:
  - risk: Segment-level paid conversion, churn, and monetization quality remain hard to underwrite because OpenAI does not publicly disclose audited revenue mix, retention, or customer concentration.
    severity: high
    claimRefs: [C038, C039]
  - risk: Enterprise and public-sector expansion depends on procurement, security review, compliance packaging, and change management, which can lengthen sales cycles and delay revenue recognition.
    severity: high
    claimRefs: [C019, C025, C042, C050]
  - risk: OpenAI still depends meaningfully on major cloud and channel partners even as distribution broadens beyond Azure.
    severity: medium
    claimRefs: [C031, C032, C033, C050]
  - risk: Usage-policy constraints and human-review requirements limit full automation in some regulated or high-stakes workflows.
    severity: medium
    claimRefs: [C021, C024, C026]
