sourceStrategy:
  minimumRetainedSources: 75
  priorities:
  - Official developer/product docs
  - Partner filings and partner official posts
  - Regulatory and legal sources
  - Tier-one and trade press for funding/traction
  - App/review/developer-signal sources
  - Disconfirming governance/legal/regulatory evidence
  notes: |-
    Prefer fetched official or quasi-official material whenever possible. Use third-party reporting for funding, traction, and legal context when official company pages are unavailable or blocked. Preserve uncertainty explicitly rather than smoothing over conflicts.
  disconfirmingTracks:
  - Competition scrutiny in EU/FTC
  - Copyright litigation from The New York Times and Authors Guild
  - Governance instability from the 2023 leadership crisis
  - Opacity around current ownership/control and standalone financials
  claimLedgerDependency: All downstream artifacts must cite claimRefs from 01-evidence-ledger.yaml.
