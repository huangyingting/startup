schemaVersion: startup-diligence-v1
artifact: research-plan
slug: openai
runDate: 2026-05-01
company:
  name: OpenAI
  requestedName: OpenAI
  requestedUrl: null
researchScope:
  focus: Full company diligence on OpenAI with emphasis on entity verification, legal entities, governance and control, leadership continuity, board and advisory structure, and team composition under the v1 schema.
  depth: standard
  geography: Global
  sectorHypothesis: AI research and deployment company spanning consumer applications, enterprise software, developer platform, and compute-intensive frontier-model infrastructure
keyResearchQuestions:
  - id: Q001
    question: What is the correct diligence target when official materials describe OpenAI as a nonprofit foundation, a for-profit public benefit corporation, and several operating affiliates?
    whyItMatters: Wrong-entity research would contaminate legal, governance, ownership, and financial conclusions.
  - id: Q002
    question: Which legal entities currently govern mission oversight, fundraising, privacy control, contracting, and international operations across OpenAI Foundation, OpenAI Group PBC, OpenAI OpCo, LLC, and OpenAI Ireland Limited?
    whyItMatters: Entity-level clarity is necessary to assess control rights, regulatory perimeter, and revenue capture.
  - id: Q003
    question: Who founded OpenAI, who leads it now, and what are the most important current board, committee, and advisor relationships?
    whyItMatters: Leadership continuity and governance quality are central risk factors for a mission-controlled frontier AI organization.
  - id: Q004
    question: What evidence exists on founder retention, executive turnover, and the current depth of technical, operational, and policy leadership?
    whyItMatters: Team durability and succession depth matter disproportionately where product direction and fundraising depend on a small leadership group.
  - id: Q005
    question: What do current hiring signals reveal about OpenAI's operating priorities across research, product, safety, infrastructure, government, and commercialization?
    whyItMatters: Hiring focus is one of the clearest near-real-time indicators of strategy and organizational bottlenecks.
  - id: Q006
    question: How should downstream diligence distinguish company-level claims from claims that belong specifically to ChatGPT, the API platform, OpenAI Foundation, or another business unit?
    whyItMatters: Product-brand confusion can lead to overstated traction, misattributed risks, and incorrect competitive framing.
  - id: Q007
    question: What governance and safety-oversight mechanisms are actually in force after the 2025 recapitalization and subsequent committee changes?
    whyItMatters: Mission lock, board appointment rights, and safety oversight are unusual but material differentiators for OpenAI.
  - id: Q008
    question: Which downstream diligence angles should receive the most weight once identity and team scoping are settled?
    whyItMatters: Later stages should spend time where entity structure and team evidence suggest the highest decision value.
priorityAngles:
  - angle: identity
    priority: high
    rationale: OpenAI is an umbrella brand spanning multiple legal entities and product surfaces, so entity precision is the first gating item.
  - angle: legal
    priority: high
    rationale: Governance, privacy control, contracting, and ownership all turn on which legal entity a fact belongs to.
  - angle: governance
    priority: high
    rationale: Nonprofit control, PBC structure, board composition, and committee rights are central to diligence quality.
  - angle: team
    priority: high
    rationale: Founder retention, executive continuity, and leadership depth are material to execution and key-person risk.
  - angle: risk
    priority: high
    rationale: Governance complexity and leadership concentration create investment risks that should be surfaced early.
  - angle: funding
    priority: medium
    rationale: Recent recapitalization and capital intensity matter, but downstream stages can quantify them after entity mapping is settled.
  - angle: business-model
    priority: medium
    rationale: OpenAI monetizes across multiple surfaces, but accurate model analysis depends on separating company and product claims first.
  - angle: product
    priority: medium
    rationale: Product-surface mapping is important, but only after the diligence target and legal structure are clear.
  - angle: technology
    priority: medium
    rationale: Frontier-model and infrastructure positioning matter, but identity and governance are the main priorities for this stage.
  - angle: traction
    priority: medium
    rationale: Adoption claims are important, but downstream researchers should validate them only after correcting for entity and product attribution.
  - angle: competition
    priority: low
    rationale: Competitive framing matters later, but this stage is primarily about preventing wrong-company and wrong-entity analysis.
sourceStrategy:
  sourceTarget: 30
  mustHaveSourceTypes:
    - official websites
    - legal and policy pages
    - company announcements
    - trusted business press
    - corporate databases
    - founder and executive profiles
    - careers and hiring pages
  disconfirmingEvidencePlan: Test every company-level claim against the possibility that it belongs to OpenAI Foundation, OpenAI Group PBC, OpenAI OpCo, LLC, OpenAI Ireland Limited, ChatGPT, or another product or business unit rather than to the OpenAI organization as a whole; prefer sources that specify the governing entity, board, controller, or contracting party.
  handoffNotes: Downstream stages should cite the exact legal entity whenever a claim concerns governance, ownership, contracts, privacy control, employment, or regional operations. Team metrics should remain null unless supported by a primary or reputable independently verified source; the official careers page provides strong hiring signals but not a disclosed total headcount.
