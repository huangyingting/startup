sections:
- number: '1.1'
  title: Verified identity and startup profile
  body: |-
    OpenAI is a private AI company founded on 2015-12-08 and headquartered in San Francisco, California [C002][C004]. Public sources describe a hybrid nonprofit/for-profit setup, but the exact current ownership/control design is still not fully transparent in fetched public materials [C005][C045]. What is clear is the operating surface: ChatGPT, official mobile apps, developer APIs and SDKs, Codex, image generation, realtime voice, and Sora-related video tooling [C006][C007][C008][C022][C025][C026][C047].
  claimRefs:
  - C002
  - C004
  - C005
  - C006
