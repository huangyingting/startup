- number: '1.4'
  title: Leadership, governance, and strategic posture
  body: |-
    Retained public sources identify Bret Taylor, Sam Altman, Greg Brockman, Sarah Friar, and Fidji Simo as the key current leadership references most relevant to investors [C042]. The company's 2023 governance crisis remains important context because it demonstrated both board fragility and employee/ecosystem leverage during a pivotal scale-up period [C041]. Strategically, OpenAI is increasingly positioning itself as a platform company, not just a model company, with visible expansion into Codex, apps, commerce, and community programs on the current docs surface [C026][C027][C050][C052].
  claimRefs:
  - C026
  - C027
  - C041
  - C042
  - C050
  - C052
- number: '1.5'
  title: Open identity questions for downstream diligence
  body: |-
    The biggest unresolved questions are governance and economics. The retained evidence does not fully resolve the current cap table, nonprofit control rights, board composition/rights, compute commitments, customer concentration, margin profile, or legal reserve exposure [C045][C046]. These gaps are material enough that later valuation work should treat public market-style certainty as unavailable until the company provides primary documents.
  claimRefs:
  - C045
  - C046
