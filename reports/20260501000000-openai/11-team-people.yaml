  hiringFocusAreas:
    - frontier research and post-training
    - ChatGPT, Codex, and consumer product engineering
    - model deployment and forward-deployed enterprise engineering
    - safety, security, trust, and investigations
    - datacenter, compute, and Stargate infrastructure
    - government, policy, and public-sector operations
    - monetization, ads, finance, and growth
  attritionSignals:
    - 2024 senior-leadership turnover included departures cited by CNBC and TechCrunch across CTO, research, and founder ranks.
    - TechCrunch reported in August 2024 that only three of OpenAI's 11 original founders remained active at the company at that time.
  claimRefs: []
keyPersonRisk:
  level: high
  rationale: Leadership, fundraising, product direction, and external trust appear concentrated in Sam Altman and a relatively small group of founder-level and board-level leaders. OpenAI has added governance depth, but the 2023 board crisis and 2024 executive turnover show material sensitivity to leadership discontinuity.
  claimRefs: []
organizationalGaps:
  - gap: Current public materials do not cleanly map day-to-day executive ownership across research, applications, infrastructure, policy, and foundation activities after the 2025 recapitalization and 2026 foundation buildout.
    severity: high
    claimRefs: []
  - gap: OpenAI does not provide a primary-source total headcount or functional mix in the fetched materials, limiting visibility into depth, management leverage, and succession planning.
    severity: medium
    claimRefs: []
  - gap: Public evidence shows extensive hiring in safety and investigations, but the current depth of senior alignment and safety leadership is less transparent than the board-level oversight structure.
    severity: medium
    claimRefs: []
teamVerdict:
  assessment: credible
  rationale: OpenAI presents a high-caliber founder and board mix and unusually broad active hiring across research, product, deployment, safety, infrastructure, and government functions. However, investor-grade visibility into the operating org chart, total headcount, and succession depth remains incomplete, and key-person dependence on Sam Altman and a narrow senior bench remains a material consideration.
  confidence: medium
  claimRefs: []
