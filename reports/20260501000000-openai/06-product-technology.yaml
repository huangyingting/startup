company:
  name: OpenAI
chapter:
  number: 5
  title: Product & Technology
  summary: |-
    OpenAI presents as a full-stack AI platform rather than a single-model vendor: the retained evidence supports a product surface spanning ChatGPT, the Responses API, Codex, image generation, realtime voice, Sora video tooling, ChatGPT apps distribution, commerce surfaces, and provider-agnostic agent tooling [C006][C007][C022][C025][C026][C027][C031][C050]. The technology stack is reinforced by official Python and Node SDKs plus widely adopted open-source assets such as Whisper, tiktoken, and Evals [C028][C029][C030][C032][C033][C034]. The main technical strength is breadth across application, tooling, and ecosystem layers; the main technical risk is infrastructure concentration around Azure and limited public visibility into roadmap sequencing, reliability metrics, and cost-performance tradeoffs [C011][C013][C022].
callouts:
- type: key-insight
  title: OpenAI competes as a platform, not only as a model lab
  body: Current docs show a layered product stack spanning end-user interfaces, APIs, agent tooling, coding, app distribution, and commerce, broadening both user reach and developer lock-in vectors [C006][C022][C026][C027][C031][C050].
  claimRefs:
  - C006
  - C022
  - C026
  - C027
  - C031
  - C050
- type: key-insight
  title: Developer tooling is a meaningful technical moat
  body: OpenAI supports developers through the Responses API, official SDKs, the Agents SDK, and open-source assets with broad GitHub adoption, indicating ecosystem depth beyond proprietary model endpoints [C007][C028][C029][C030][C031][C034].
  claimRefs:
  - C007
  - C028
  - C029
  - C030
  - C031
  - C034
- type: opportunity
  title: Built-in tools and agent abstractions move OpenAI up the workflow stack
  body: Web search, file search, image generation, hosted shell, computer use, MCP, and provider-agnostic multi-agent support indicate a push from raw inference toward higher-level task automation [C022][C031].
  claimRefs:
  - C022
  - C031
- type: risk-alert
  title: Platform breadth is strong, but architecture and roadmap transparency are incomplete
  body: Azure is the exclusive cloud provider, Sora 2 APIs already carry a dated deprecation notice, and public materials do not disclose reliability, model-routing economics, or long-range roadmap commitments at investor-grade depth [C011][C022][C025].
  claimRefs:
  - C011
  - C022
  - C025
