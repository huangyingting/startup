sections:
- number: '5.1'
  title: Product platform overview
  body: |-
    The retained evidence supports viewing OpenAI as a broad AI product platform with multiple entry points [C006][C007][C022][C026][C027][C050]. End users interact through ChatGPT web and mobile; developers build through the Responses API and official SDKs; software teams can adopt Codex for coding workflows; and third parties can distribute through ChatGPT apps and adjacent commerce surfaces [C007][C008][C022][C026][C027][C050]. This breadth matters because it lets OpenAI compete simultaneously for direct usage, developer standardization, workflow ownership, and ecosystem distribution.
  claimRefs:
  - C006
  - C007
  - C008
  - C022
  - C026
  - C027
  - C050
- number: '5.2'
  title: Modules, automation, and workflow depth
  body: |-
    The core product modules visible in the ledger are increasingly workflow-oriented rather than model-only [C022][C026][C031]. OpenAI's API platform exposes web search, file search, image generation, hosted shell, computer use, and MCP through the Responses API, which suggests an effort to package multi-step automation primitives rather than leaving orchestration entirely to customers [C022]. Codex extends that approach into software development workflows, while assisted fine-tuning and custom models extend it into higher-touch enterprise deployments [C021][C026]. The provider-agnostic Agents SDK further indicates that OpenAI wants a share of the orchestration layer even in environments where customers may not be fully provider-locked [C031].
  claimRefs:
  - C021
  - C022
  - C026
  - C031
- number: '5.3'
  title: Architecture, infrastructure, and integrations
  body: |-
    Architecturally, the evidence points to a stack that begins with end-user clients and third-party apps, flows through first-party APIs and SDKs, adds tool and agent abstractions, and ultimately runs on Azure-backed infrastructure [C007][C011][C013][C022][C027][C029][C030][C031]. The strategic upside is obvious: Azure scale and the Azure OpenAI commercial channel give OpenAI a powerful infrastructure and enterprise-distribution backbone [C011][C013]. The corresponding risk is equally important: public evidence confirms exclusive cloud concentration, while the ledger does not disclose fallback architecture, multi-cloud optionality, or cost-performance benchmarks [C011][C013]. Integrations are stronger at the workflow and protocol layers than at a disclosed third-party enterprise-app list, with MCP, apps distribution, and official SDKs serving as the main explicit integration evidence [C022][C027][C029][C030].
  claimRefs:
  - C007
  - C011
  - C013
  - C022
  - C027
  - C029
  - C030
  - C031
- number: '5.4'
  title: Roadmap signals and development velocity
  body: |-
    The retained evidence gives several concrete roadmap signals without justifying speculative forecasting [C021][C022][C025][C051][C052]. GPT-5.5 is positioned as the flagship family today, the Responses API now exposes a richer set of tools, and the company has expanded both enterprise customization and product-distribution surfaces [C021][C022][C027][C050]. Open-source development velocity also appears high, with OpenAI reporting a step-up in merged PRs for the Agents SDK repositories [C051]. At the same time, Sora 2 API documentation already carries a specific deprecation date, which is a useful reminder that platform breadth and rapid product iteration can also create lifecycle-management complexity for customers [C025].
  claimRefs:
  - C021
  - C022
  - C025
  - C027
  - C050
  - C051
  - C052
- number: '5.5'
  title: Product diligence gaps
  body: |-
    The main technical diligence asks are not about whether OpenAI has a broad platform; the ledger already shows that it does [C006][C022][C026][C027][C031][C050]. The important open questions are operational: model-routing logic across tiers, reliability and uptime by product, enterprise security certifications, eval pass rates for critical workloads, migration policy across rapidly changing APIs, and the degree of portability away from Azure if economics or regulation change. None of those items are sufficiently disclosed in retained public materials, so a technical diligence session should request architecture reviews, SLA histories, safety/quality scorecards, and roadmap-deprecation governance.
  claimRefs:
  - C006
  - C011
  - C022
  - C025
  - C026
  - C027
  - C031
  - C050
