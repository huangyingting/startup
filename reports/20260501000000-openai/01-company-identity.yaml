  identityNotes: Official OpenAI materials describe OpenAI as an umbrella organization composed of the nonprofit OpenAI Foundation and the for-profit OpenAI Group PBC. Entity-specific policy pages also identify OpenAI OpCo, LLC and OpenAI Ireland Limited for service and privacy purposes. Historically, OpenAI launched as a nonprofit in 2015, created OpenAI LP in 2019, and now presents its current structure through the Foundation-plus-PBC model. ChatGPT is a flagship product surface, not the company itself, so downstream diligence should attribute claims to the precise legal entity wherever possible.
