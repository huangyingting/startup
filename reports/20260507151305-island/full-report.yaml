      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Island was founded in August 2020 by Mike Fey and Dan Amiga, who met when Symantec
              acquired Amiga's previous company, Fireglass, in 2017. Fey served as President and Chief
              Operating Officer of Symantec (now Broadcom) and as General Manager and Chief Technology
              Officer of McAfee (now Trellix), accumulating more than two decades of enterprise security
              leadership. Amiga invented remote browser isolation technology at Fireglass — a category-
              defining Israeli security startup — and has served as a founding investor or adviser in
              multiple Israeli cybersecurity companies including Axis Security, Cycode, and
              Build.Security.

              The two founders identified a structural gap: as enterprise work shifted to SaaS and web
              applications, the browser became the primary attack surface and data-exfiltration vector,
              yet enterprises universally deployed consumer browsers that provided no enterprise controls.
              Their insight was to leverage the open-source Chromium engine — standardised across the
              industry — to build a browser indistinguishable to end users but fully manageable by IT
              and security teams. Two years of stealth product development followed the August 2020
              founding before the February 2022 public launch.

              Island's leadership team beyond the founders includes senior hires from enterprise
              security, identity, and SaaS ecosystems; the company has not publicly disclosed the
              names of its extended C-suite. The board includes representation from Sequoia Capital
              (Doug Leone, who led Series A through D participation) and Coatue Management (David
              Schneider, lead investor in Series D and E). No independent directors have been publicly
              named as of the report date. Key-person risk is concentrated in the two founders, who
              retain de-facto technical and commercial leadership. The R&D hub in Tel Aviv employs more
              than 200 engineers and is the primary product-development centre.
            claimRefs:
              - CO007
              - CO008
              - CO009
              - CO010
              - CO011
              - CO012
      - number: '1.3'
        title: Funding History, Valuation, and Investors
        blocks:
          - type: paragraph
            body: |
              Island has executed six priced rounds since its 2020 founding, raising approximately
              $730 million in cumulative outside investment as of the March 2025 Series E. The company
              reached unicorn status with its March 2022 Series B at a $1.3 billion post-money
              valuation, only one month after emerging from stealth. Subsequent rounds substantially
              re-rated the business: Series C (October 2023) at $1.5 billion; Series D (April 2024) at
              $3 billion; and Series E (March 2025) at $4.85 billion — a 3.2x valuation step-up in
              under twelve months.

              The Series A (January 2022, approximately $100 million) was led by Insight Partners and
              Sequoia Capital. The Series B (March 2022, $115 million at $1.3 billion) was led by
              Insight Partners and joined by Stripes and Sequoia. Additional B-round capital came from
              Cisco Investments (approximately $10 million strategic, July 2022) and Georgian
              (approximately $60 million, November 2022). The Series C (October 2023, $100 million at
              $1.5 billion) was led by Prysm Capital, with Canapi Ventures joining as a new financial-
              sector specialist investor. The Series D (April 2024, $175 million at $3 billion) was
              co-led by Coatue Management and Sequoia; total raised reached $487 million at closing.
              The Series E (March 2025, $250 million at $4.85 billion) was led again by Coatue, with
              Insight Partners, Sequoia, and Canapi Ventures participating.

              Strategic corporate investors across rounds include Capital One Ventures, Citi Ventures,
              Cisco Investments, EDBI (Singapore), and ServiceNow Ventures. There is no public record
              of secondary transactions, tender offers, or structured liquidity events. CEO Mike Fey
              stated in April 2024 that Island intends to become a "strong IPO candidate someday," but
              the company has not filed for a public offering or set a timeline.
