figures:
  - id: FO001
    title: Island Valuation Milestone Timeline
    type: timeline
    layout: standard
    summary: |
      Island's post-money valuation has grown from unicorn entry at $1.3 billion (March 2022) to
      $4.85 billion (March 2025) across six financing events in three years. The cadence
      accelerated in 2024–2025, with two rounds eleven months apart re-rating the company by 60%.
      Each milestone confirms escalating investor conviction in the enterprise-browser category.
    data:
      items:
        - date: 2020-08
          label: Founded
          detail: Island incorporated in Dallas; R&D launched in Tel Aviv by Mike Fey and Dan Amiga
          tone: neutral
        - date: 2022-01
          label: Series A — pre-launch
          detail: $100M raised from Insight Partners and Sequoia ahead of product launch
          tone: positive
        - date: '2022-02-01'
          label: Stealth exit — product launch
          detail: Island Enterprise Browser publicly launched; world's first enterprise browser
          tone: positive
        - date: 2022-03
          label: Series B — $1.3B valuation
          detail: $115M raised; unicorn status achieved six weeks after launch
          tone: positive
        - date: 2023-10
          label: Series C — $1.5B valuation
          detail: $100M raised; 2M+ browser seats sold; multiple Fortune 100 top-20 customers
          tone: positive
        - date: 2023-12
          label: Palo Alto acquires Talon (adverse)
          detail: Rival enterprise browser absorbed by Palo Alto for ~$458M; free-bundle risk emerges
          tone: risk
        - date: 2024-04
          label: Series D — $3.0B valuation
          detail: $175M raised; $487M total; valuation doubled from Series C in 6 months
          tone: positive
        - date: 2025-03
          label: Series E — $4.85B valuation
          detail: $250M raised; $730M total; 450 customers; ARR ~$87M; 500 employees
          tone: positive
        - date: 2025-04
          label: Gartner SEB adoption forecast
          detail: Gartner predicts 25% of orgs will use SEB by 2028; currently <10% adoption
          tone: opportunity
    approximationNotes: Seed/Pre-A valuation not disclosed; excluded. B-extension rounds excluded for clarity.
    claimRefs:
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO026
  - id: FO002
    title: Island Enterprise Browser — Business Logic Flow
    type: flow
    layout: wide
    summary: |
      Island's business model connects founding team expertise through a Chromium-based enterprise
      browser platform to a set of converging enterprise security use cases that replace adjacent
      point-products (VPN, VDI, DLP, SWG) and drive demonstrable ROI. The flow illustrates how
      product architecture creates stickiness through governance and visibility.
    data:
      nodes:
        - id: founders
          label: Founding Team
          detail: Mike Fey (enterprise security ops) + Dan Amiga (browser isolation inventor)
        - id: chromium
          label: Chromium Core
          detail: Open-source standard browser engine; familiar UX; no app re-testing required
        - id: platform
          label: Island Enterprise Browser Platform
          detail: SaaS management console + locally-installed managed browser; per-seat subscription
        - id: security
          label: Security Controls
          detail: DLP, web isolation, phishing prevention, zero-trust network access, exploit prevention
        - id: visibility
          label: IT Visibility & Governance
          detail: Full audit log, RBAC enforcement, real-time policy, contractor onboarding, BYOD
        - id: roi
          label: ROI & Consolidation
          detail: Replaces VDI, VPN, DLP agents, SWG; Forrester TEI documents 344% ROI
        - id: customers
          label: 450+ Enterprise Customers
          detail: Pfizer, Swiss Life, Mattress Firm, Fiverr, TaskUs; every major vertical
    approximationNotes: null
