  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: |
              Island's primary revenue stream is a subscription SaaS model: per-seat annual recurring
              revenue (ARR) billed to enterprise customers for licensing the Island Enterprise Browser
              and its management console. The browser itself is the core SaaS product; add-on features
              (extended session recording, workflow automation modules, premium support) are believed
              to represent upsell tiers, though Island has not publicly disclosed its packaging or tier
              pricing. LATKA analyst data estimates Island's ARR at ~$87M in calendar 2024, with
              compounding annual growth exceeding 100% since the February 2022 launch.

              AWS Marketplace lists Island enterprise browser 12-month contracts at approximately
              $250,000/year as a reference point, implying average enterprise contract value in the
              $100K–500K+ range depending on seat count and selected features. Island has 450+ enterprise
              customers as of March 2025; at $87M ARR across 450 customers, the implied average revenue
              per customer is approximately $193K/year — consistent with an enterprise-focused motion.

              There is no evidence of hardware, professional services, or non-subscription revenue.
              All known revenue references relate to software subscription. This creates a high-gross-margin
              business model typical of SaaS cybersecurity vendors (estimated 70–85% gross margins,
              though not confirmed by Island).
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
      - number: '4.2'
        title: Unit Economics
        blocks:
          - type: paragraph
            body: |
              Island's unit economics are not publicly disclosed. Key metrics — NRR (net revenue
              retention), gross margin, CAC (customer acquisition cost), and LTV (lifetime value) —
              must be estimated from available public proxies. NRR is implied to exceed 100% based on
              ARR growing faster than customer count growth (ARR doubled while customer count grew
              from ~200 to 450+ between April 2024 and March 2025 — implying seat expansion within
              existing accounts). If true, Island's net revenue retention is consistent with a top-quartile
              enterprise SaaS business (industry benchmarks: >120% NRR for top-performing cybersecurity SaaS).

              Gross margins are estimated at 70–85% based on industry benchmarks for Chromium-based
              SaaS security products with no hardware component. Customer acquisition cost is unknown;
              Island has 450 customers and ~300 non-R&D employees (estimated sales, marketing, G&A),
              suggesting a sales-heavy GTM appropriate for an enterprise motion. Payback period is
              estimated at 12–24 months given enterprise ACV in the $150–300K range.

              Forrester's 2024 Total Economic Impact (TEI) report commissioned by Island documented
              a 344% ROI for a composite enterprise customer — a strong ROI benchmark used in sales cycles.
            claimRefs:
              - CI006
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
      - number: '4.3'
        title: Capital Structure and Adequacy
        blocks:
          - type: paragraph
            body: |
              Island has raised $730M in total equity across six financing events through March 2025.
              The Series E ($250M at $4.85B, March 2025) and Series D ($175M at $3B, April 2024)
              alone contributed $425M over approximately 11 months. If Island's monthly burn rate is
              in the $10–25M range (typical for a 500-person enterprise SaaS company scaling at >100%),
              the $730M total raised (less estimated cumulative spend) implies 3–5+ years of runway
              from the March 2025 close. Capital adequacy appears strong.

              Island's capital structure includes investors across multiple preferred stock classes.
              Coatue Management is the lead investor in both Series D and E (most recent, most senior
              preferred). Sequoia Capital has participated from Series A through E. No secondary transactions
              or tender offers have been publicly disclosed, suggesting limited liquidity has been
              distributed to employees or early investors. Island has not disclosed its option pool size,
              total fully diluted share count, or preferred liquidation preference stack.
            claimRefs:
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
      - number: '4.4'
        title: Financial Evidence Gaps
        blocks:
          - type: paragraph
            body: >
              Material financial metrics are unavailable from public sources. Island has not published

              audited financial statements, revenue figures, gross margin, burn rate, NRR, churn rate,

              CAC, or LTV. The $87M ARR figure comes from LATKA, an unverified third-party data aggregator,

              not from Island management. All financial estimates in this chapter carry inherent uncertainty

              due to the private nature of Island's disclosures. The valuation multiple of ~55x ARR

              (at $4.85B valuation / $87M ARR) is among the highest for private cybersecurity companies

              and implies significant execution risk if ARR growth slows or a public market re-rating occurs.

              Prospective investors should request audited statements and management commentary before relying on these
              estimates.
