  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Competitive and Market Risk
        blocks:
          - type: paragraph
            body: |
              Island's most existential risk is a defensive move by Google or Microsoft to harden their
              own enterprise browser products (Chrome Enterprise and Edge for Business) to the point where
              Island's differentiation becomes marginal. Both incumbents have free distribution advantages,
              existing enterprise relationships, and the ability to bundle enterprise browser security into
              Microsoft 365 or Google Workspace at no incremental licensing cost. Google's Chrome Enterprise
              Premium (formerly BeyondCorp Enterprise) already adds some policy and DLP features; Microsoft
              Edge for Business integrates with Microsoft Purview for data governance. If either company
              significantly deepens its enterprise browser security capabilities — particularly DLP, ZTNA,
              and device posture — Island's per-seat premium faces direct price pressure. The enterprise
              browser market is also at risk of SASE vendor consolidation: Palo Alto Networks, Zscaler,
              and Netskope all have strategic incentives to bundle browser security with their existing
              network security products, undercutting Island's SASE displacement thesis. The risk that the
              enterprise browser category remains niche — unable to achieve broad market adoption beyond
              security-obsessed financial services — would cap Island's TAM and growth multiple.
            claimRefs:
              - CR001
              - CR002
              - CR003
      - number: '7.2'
        title: Technology and Security Risk
        blocks:
          - type: paragraph
            body: |
              Island's product is built on Google's open-source Chromium engine — an architecture that
              provides rendering compatibility and developer ecosystem benefits but creates a persistent
              vulnerability maintenance challenge. When Google's Chrome security team discloses and patches
              a Chromium CVE, Island must fork and test the patch before shipping it to enterprise customers.
              During this lag period, Island customers may be exposed to publicly known vulnerabilities that
              Chrome users have already patched. Google ships Chrome security patches roughly every 4 weeks
              (sometimes faster for critical CVEs), and Island's 21-day feature cadence may not always align
              with emergency patch timelines. A high-severity Chromium zero-day that Island is slow to patch
              would be a significant reputational and security incident. Beyond Chromium vulnerabilities,
              Island's own policy engine, management plane, and cloud infrastructure introduce proprietary
              attack surfaces. A breach of Island's management console — which holds enterprise-wide security
              policy configurations — would be a critical incident for all 450+ enterprise customers
              simultaneously. AWS as the sole cloud provider creates single-point-of-failure risk for
              the management plane, though AWS's high availability SLAs (99.99%) mitigate most operational
              concerns. The concentration of 200+ R&D engineers in Tel Aviv creates geopolitical risk:
              regional instability (as demonstrated by the October 2023 Hamas attack on Israel) could
              disrupt engineering operations in ways that affect product delivery timelines.
            claimRefs:
              - CR004
              - CR005
              - CR006
              - CR007
      - number: '7.3'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: |
              Island's most material regulatory risk is the FedRAMP High authorization timeline. Operating
              in the U.S. federal market at scale requires a FedRAMP High Authority to Operate (ATO), which
              is not yet granted despite Island's "In Process" status. FedRAMP authorization processes
              regularly take 18–36 months and cost $1–3M in compliance activities; delays would push
              federal ARR contributions well beyond Island's current planning horizon. GDPR and CCPA
              compliance presents latent risk: Island's browser captures rich telemetry about user
              behavior, application usage, and data access patterns — data that, if not properly scoped
              and consented, could trigger regulatory enforcement from EU data protection authorities.
              Island's healthcare customers' use of the browser for HIPAA PHI workflows creates a Business
              Associate Agreement (BAA) exposure: Island must be designated as a BAA signatory for covered
              entities, and any breach of PHI accessed through Island's browser could trigger joint HIPAA
              enforcement liability. Export control (EAR/ITAR) risk is present for Island's government
              vertical: browser security technology with data interception capabilities may have dual-use
              classification concerns, particularly for international sales to non-allied countries. Patent
              litigation risk is latent: Island's modifications to Chromium and its proprietary policy
              engine could be challenged by competitors (or patent trolls) claiming prior art on browser-
              level security controls. The narrow scope of US Patent 12,235,922 (data deletion by URL
              hostname) leaves most of Island's technology portfolio unpatented and potentially exposed.
            claimRefs:
              - CR008
              - CR009
              - CR010
              - CR011
      - number: '7.4'
        title: Operational and Execution Risk
        blocks:
          - type: paragraph
            body: |
              Island's operational risk is concentrated in three areas. First, key-person dependency:
              CEO Mike Fey and CTO Dan Amiga are the primary drivers of Island's strategy and technical
              vision respectively. Fey brings Symantec/Broadcom enterprise relationships and credibility;
              Amiga brings deep browser security IP lineage from Fireglass. Loss of either executive
              would be a material execution risk given the company's stage. Second, talent risk in Tel Aviv:
              Island's 200+ R&D engineers are concentrated in Israel, a market that experienced significant
              disruption from the October 2023 conflict. While Israeli tech companies have demonstrated
              resilience, extended regional instability could affect hiring, retention, and product velocity.
              Third, the management plane single-tenant risk: if Island's SaaS management console
              experiences downtime, enterprise customers lose the ability to update policies — creating
              operational risk for organizations that rely on Island as a security control plane. Island's
              uptime SLAs and incident response posture are not publicly disclosed. Financial model opacity
              is a fourth operational risk: with burn rate, runway, and unit economics undisclosed, diligence
              cannot confirm whether the $730M raised through Series E is sufficient to reach profitability
              or whether Island will need another capital raise in an environment where late-stage SaaS
              multiples have compressed significantly from 2021 peaks.
            claimRefs:
              - CR012
              - CR013
              - CR014
              - CR015
      - number: '7.5'
        title: Risk Mitigations and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: |
              Island has implemented several mitigations against its key risk dimensions. On competitive
              risk, Island's financial services moat (7 of 10 largest banks) creates reference-customer
              lock-in that is difficult for new entrants or incumbents to displace quickly. The 21-day
              feature delivery cadence is structurally faster than Microsoft's and Google's enterprise
              browser update cycles, providing ongoing product differentiation. On technical risk, Island's
              SOC 2 Type II and ISO/IEC 27001 certifications provide process discipline around security
              incident response. FedRAMP High In Process engagement with a Third-Party Assessment
              Organization (3PAO) requires demonstrable security controls before authorization. On
              regulatory risk, Island is actively engaged in HIPAA BAA program and GDPR data minimization
              frameworks, though details are not publicly disclosed. On operational risk, the company's
              $730M in total funding provides runway for 3+ years of investment at reasonable burn rates.
              Thesis-break triggers — factors that would fundamentally undermine the Island investment
              thesis — include: (1) Google or Microsoft shipping enterprise browser security features
              at feature parity within 18 months; (2) a public security breach of Island's management
              console; (3) FedRAMP authorization denial or multi-year delay; and (4) departure of
              both Fey and Amiga within 12 months of a liquidity event.
            claimRefs:
              - CR016
              - CR017
              - CR018
              - CR019
