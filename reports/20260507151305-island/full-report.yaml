        title: Cover Metrics and Evidence Gaps
        blocks:
          - type: paragraph
            body: |
              Island's publicly disclosed metrics as of the report date: approximately $730 million
              total raised; $4.85 billion post-money valuation (March 2025); 450+ enterprise customers;
              approximately 500 employees; and ARR approximately doubling each year since launch,
              reaching an estimated $87 million in 2024 per LATKA analyst data. Island has not publicly
