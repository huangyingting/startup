  - id: FE001
    title: Product architecture map
    description: Island's enterprise browser product stack from client layer to cloud infrastructure.
    type: stack
    data:
      layers:
        - id: L1
          label: End-User Layer
          detail: >-
            Browser clients running on managed and unmanaged devices across Windows, macOS, Linux, ChromeOS, iOS,
            iPadOS, and Android.
          items:
            - label: Island Enterprise Browser
              description: Chromium fork with embedded policy engine; runs on Windows, macOS, Linux, iOS, Android
            - label: Island Mobile Browser
              description: iOS/iPadOS/Android native app with enterprise policy parity
        - id: L2
          label: Policy and Control Layer
          detail: >-
            Proprietary Island enforcement layer — DLP, ZTNA, and device posture controls natively embedded in the
            browser; no network proxy required.
          items:
            - label: Policy Engine
              description: Proprietary Island IP; enforces per-app, per-user, per-device rules natively in browser
            - label: Last-Mile DLP 360
              description: Controls print, download, paste, screenshot, upload at browser layer
            - label: Zero Trust Network Access
              description: Agent-free private app access; replaces VPN client
        - id: L3
          label: Management and Analytics Layer
          detail: >-
            SaaS-hosted management console and analytics layer enabling centralized IT policy administration, audit
            logging, DEX monitoring, and SIEM integration.
          items:
            - label: Management Console (SaaS)
              description: AWS-hosted admin plane for policy, device, and user management
            - label: Island DEX
              description: Digital employee experience analytics; app performance and device health
            - label: SIEM Integration
              description: Splunk, Sentinel export of audit logs and UBA events
        - id: L4
          label: Cloud Infrastructure Layer
          detail: >-
            AWS-based cloud infrastructure providing scalable microservices, secure storage, global CDN, and GovCloud
            isolation for FedRAMP High-eligible federal deployments.
          items:
            - label: AWS EKS
              description: Kubernetes microservices for management plane scalability
            - label: AWS S3 / CloudFront
              description: Audit log storage and global CDN delivery
            - label: AWS GovCloud
              description: FedRAMP High-eligible isolated region for federal customers
    sourceRefs:
      - SE006
      - SE008
      - SE010
  - id: FE002
    title: Customer workflow / operating flow
    description: How an enterprise deploys Island and what workflow changes result.
    type: flow
    data:
      nodes:
        - id: N1
          label: IT Admin configures policies
          description: CISO/IT uses management console to define per-app, per-user, and per-device access and DLP rules
        - id: N2
          label: Browser deployed to employees
          description: End users download Island browser; IT-administered policies apply automatically on first sign-in
        - id: N3
          label: Device posture assessed
          description: Island checks OS patch level, disk encryption, active MDM/EDR agents, and network context
        - id: N4
          label: Application access granted
          description: User accesses SaaS and private apps within policy boundaries; no VPN or proxy hop required
        - id: N5
          label: Activity monitored and logged
          description: All actions are captured in high-fidelity audit log; exported to SIEM for SOC review
        - id: N6
          label: Alerts and enforcement
          description: >-
            Policy violations (e.g., paste attempt of PII, screen capture of PHI) trigger real-time enforcement and
            alerting
    sourceRefs:
      - SE010
      - SE011
