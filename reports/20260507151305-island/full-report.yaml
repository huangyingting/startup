  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Buyer Profile
        blocks:
          - type: paragraph
            body: |
              Island targets large enterprises — primarily organizations with 500+ employees, high
              security postures, and complex access challenges arising from BYOD workforces, regulated
              data environments, or contractor-heavy operating models. The dominant buyer segment is
              financial services (banking, asset management, insurance) driven by PCI/SOX compliance
              requirements, VDI reduction mandates, and the financial sector's long history of strict
              endpoint security investment. Healthcare is the second major vertical, where HIPAA PHI
              access on BYOD devices creates a use case that standard MDM and VPN solutions handle
              poorly. Government (federal civilian, DoD adjacent) is a growing segment enabled by the
              Carahsoft GSA Schedule listing and FedRAMP High In Process status. Education (higher
              education and K-12) and retail/BPO are smaller but emerging verticals. The buyer persona
              is typically the CISO or VP of IT Security, with IT infrastructure teams as implementers.
              Island sells primarily direct through its enterprise sales force, with government channel
              through Carahsoft and cloud distribution through AWS Marketplace.
            claimRefs:
              - CU001
              - CU002
              - CU003
      - number: '6.2'
        title: Adoption Trajectory and Growth Indicators
        blocks:
          - type: paragraph
            body: |
              Island launched publicly in February 2022 after emerging from stealth. Customer count
              grew from effectively zero to 450+ in approximately three years — a trajectory consistent
              with 50–100 new customers per quarter in the 2023–2025 growth phase. ARR is estimated
              at approximately $87M (LATKA data, 2024, unverified by Island) with doubling implied by
              the company's public statements. The per-seat SaaS pricing model drives adoption expansion
              within accounts as BYOD and contractor populations grow. Seat count per customer varies
              widely: smaller customers may deploy 500–2,000 seats, while large financial institutions
              deploying Island across their contractor and employee populations likely represent 10,000+
              seat accounts. Geographic expansion has followed funding: early adoption was US-centric,
              with Series E capital earmarked for international expansion into Europe and Asia-Pacific.
              The rapid adoption in regulated industries validates Island's compliance-first positioning
              and suggests the market for enterprise browser replacement is real and accelerating.
            claimRefs:
              - CU004
              - CU005
              - CU006
              - CU007
      - number: '6.3'
        title: Named Customer Proof and Reference Quality
        blocks:
          - type: paragraph
            body: |
              Island's named customer proof is limited in public disclosures — a pattern common in
              enterprise security, where clients prefer not to disclose their security tooling. Island
              claims seven of the ten largest global financial institutions as customers (CEO Mike Fey,
              March 2025 press release), which would represent most of the top-tier US and European
              universal banks. The Gartner Peer Insights platform has 238 verified reviews with a 4.9/5
              average, with reviewers self-identified as VP IT Security, CISO, and IT Operations roles
              at large enterprises (1,000+ employees predominant). Customer stories on island.io present
              use cases without naming the specific enterprise in most cases, with outcome statements
              focusing on VDI reduction cost savings, BYOD deployment speed, and DLP compliance gaps
              closed. The Carahsoft GSA listing confirms government purchasing activity and implies
              active federal pilot or production deployments, although specific agency names are not
              disclosed. Healthcare use case coverage (PHI boundary enforcement, device posture for
              BYOD clinicians) is described in customer-persona terms suggesting active deployments
              rather than concept-stage pilots.
            claimRefs:
              - CU008
              - CU009
              - CU010
              - CU011
      - number: '6.4'
        title: Retention, Durability, and Customer Satisfaction
        blocks:
          - type: paragraph
            body: |
              Island has not publicly disclosed net revenue retention (NRR), gross revenue retention
              (GRR), or churn rates. The per-seat, per-year SaaS subscription model creates natural
              renewal cycles and expansion dynamics: as organizations grow their BYOD workforce or
              extend Island to new contractor populations, seat counts increase. The Gartner Peer
              Insights score of 4.9/5 (238 reviews) and G2 ratings corroborate high satisfaction in
              the early customer base. Customer reviews cite positive factors including ease of
              deployment, security granularity, IT control without user friction, and responsiveness
              of Island's support team. Negative reviews note performance lag on lower-spec devices,
              occasional crashes, and complexity in managing policy for hybrid environments. Churn risk
              is concentrated in smaller enterprises where the browser's overhead may not justify the
              cost, and in organizations that acquire enterprise agreements from competing SASE vendors
              (Netskope, Zscaler) with bundled browser security. Contract lengths are not publicly
              disclosed but enterprise SaaS norms suggest 1–3 year initial terms with renewal upsell.
            claimRefs:
              - CU012
              - CU013
              - CU014
              - CU015
      - number: '6.5'
        title: Expansion, Concentration Risk, and Channel Dynamics
        blocks:
          - type: paragraph
            body: |
              Island's land-and-expand motion drives account expansion through three vectors: (1) seat
              growth as BYOD programs extend to more employees and contractors; (2) product-line upsell
              from core Enterprise Browser to Enterprise AI and Enterprise Network; and (3) vertical
              expansion within accounts (e.g., a financial services customer adding the healthcare
              compliance module). The concentration risk is significant: financial services is Island's
              dominant vertical and likely represents 50–60% of ARR (inferred from the 7-of-10 largest
              financial institution claim). A macroeconomic contraction in financial services IT spend
              would disproportionately impact Island. Channel dependence is moderate: Carahsoft anchors
              the government channel; the AWS Marketplace listing adds a procurement vehicle; but most
              revenue flows direct. Procurement friction exists in highly regulated sectors — government
              FedRAMP authorization delays, healthcare vendor risk assessment cycles, and financial
              institution security review processes all extend sales cycles relative to unregulated
              enterprise software. Enterprise budget pressure from technology consolidation mandates
              (particularly government) creates both an opportunity (consolidating VPN/VDI/DLP into one
              browser) and a risk (CISOs being asked to rationalize rather than expand vendor footprint).
            claimRefs:
              - CU016
              - CU017
              - CU018
              - CU019
