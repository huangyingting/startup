    Island is the enterprise browser category pioneer — the first company to deploy a managed Chromium-based browser as
    a primary enterprise security control plane. Founded in 2020 by ex-Symantec President Mike Fey and Fireglass founder
    Dan Amiga, Island has achieved significant enterprise adoption with 450+ customers and critical financial services
    penetration (7 of 10 largest global banks). Its $4.85B Series E valuation (March 2025) reflects sophisticated
    investor conviction, but NRR and unit economics remain undisclosed — the key diligence uncertainty for any new
    investor.
