      - number: '1.4'
        title: Product Launch, Customer Traction, and Key Milestones
        blocks:
          - type: paragraph
            body: |
              Island spent approximately eighteen months in stealth product development before publicly
              launching the Island Enterprise Browser on February 1, 2022. Within one month of launch
              the company raised its $115 million Series B. By October 2023 (Series C close) Island had
              sold over 2 million licensed browser seats across its customer base, including multiple
              companies ranked in the Fortune 100 top 20. By April 2024 (Series D) it had grown to
              approximately 200 enterprise customers and 280 employees. By March 2025 (Series E) it
              expanded to 450+ customers and approximately 500 employees, with ARR more than doubling
              each year since launch and reaching an estimated $87 million in calendar 2024.

              The product was recognised by Fast Company as one of the "Next Big Things in Tech 2025,"
              appeared on the Forbes Cloud 100 in 2024 and 2025, won the TechForward Award 2025 for
              Zero Trust Architecture, and has been listed on the Fortune Cyber60 in 2023, 2024, and
              2025. Gartner Peer Insights rates Island at 4.9/5 from 238 reviews as of 2026, placing
              it first in user satisfaction in the Secure Enterprise Browser market category. G2 rates
              Island at 4.7/5 from 21 verified enterprise reviews.

              Notable enterprise customer proof points include: Pfizer (global biopharmaceutical,
              87,000+ employees), whose Head of Insider Risk states Island is the company's single most
              important security tool; Mattress Firm; Swiss Life; Fiverr; TaskUs; Hendrick Motorsports;
              and Brightline. Use cases span BYOD enablement, contractor onboarding, VDI replacement,
              SaaS data-leakage prevention, zero-trust network access, and M&A transition security.
              One CEO-cited customer saved $300 million annually by replacing VDI rack infrastructure.

              Key adverse event: Palo Alto Networks completed its acquisition of rival enterprise-
              browser startup Talon Cyber Security in December 2023 for approximately $458 million,
              immediately offering a free enterprise browser to qualifying SASE AI customers —
              intensifying competition through platform bundling.
