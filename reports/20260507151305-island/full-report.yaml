          description: Primary cloud provider for management plane, storage, and federal GovCloud isolation
        - id: D3
          label: Identity Providers
          description: Okta, Azure AD, Ping — required for user authentication and SAML/OIDC federation
        - id: D4
          label: MDM Platforms
