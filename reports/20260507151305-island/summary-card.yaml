  topStrengths:
    - >-
      Category pioneer status with the deepest financial services penetration in enterprise browser (7/10 largest global
      banks).
    - >-
      $4.85B Series E led by sophisticated investors (Coatue, Sequoia, Stripes) signals verified internal growth
      metrics.
    - >-
      Enterprise browser TAM expanding rapidly — Gartner projects 25% of enterprise web security decisions will involve
      enterprise browsers by 2025.
    - Regulatory tailwind (CISA Zero Trust, FedRAMP High In Process) pulls Island into compliance-driven sales cycles.
    - Multi-product expansion (Enterprise AI, Enterprise Network) expands TCV per account beyond the core browser SKU.
  topRisks:
    - >-
      Google and Microsoft can bundle competitive enterprise browser features at zero incremental cost to enterprise
      customers.
    - >-
      NRR, burn rate, and unit economics are entirely undisclosed — the $4.85B valuation cannot be justified from public
      fundamentals alone.
    - >-
      Management console security breach risk is existential for a security-positioned company with centralized policy
      enforcement for 450+ enterprises.
    - >-
      Patent portfolio limited to one narrow patent — most competitive moat depends on execution speed and customer
      relationships.
    - Key-person concentration: Mike Fey and Dan Amiga are the primary trust anchors with enterprise customers and investors.
  unresolvedGaps:
    - NRR and GRR for FY2023–2025 are entirely non-public — the single most important missing financial health metric.
    - Burn rate and cash runway from $730M total raised are undisclosed — cannot model dilutive raise risk before IPO.
    - Management console penetration test results and security incident history are not public.
    - Chromium CVE patch SLA and historical patch timing for critical CVEs are not disclosed.
    - Preference stack and liquidation overhang from $730M preferred are not public — affects return calculations.
