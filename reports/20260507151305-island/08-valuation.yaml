  claims:
    - id: CV001
      statement: "Island's five-pillar investment thesis: (1) category-defining enterprise browser; (2) multi-tool replacement with large TCV; (3) financial services moat (7/10 largest banks); (4) sophisticated investor validation (Coatue/Sequoia); and (5) regulatory tailwind (CISA Zero Trust, FedRAMP)."
      type: inferred
      topic: investment-thesis
      sourceRefs: [SV001, SV002]
      confidence: high
      freshness: current
      answersQuestionRefs: [QV010, QV003]
    - id: CV002
      statement: "Island's four-pillar anti-thesis: (1) Google/Microsoft free-distribution competitive threat; (2) 56x ARR is fully priced with no margin for deceleration; (3) NRR undisclosed — ARR quality unverifiable; (4) thin patent portfolio leaves most IP unprotected."
      type: inferred
      topic: anti-thesis
      sourceRefs: [SV016, SV002]
      confidence: high
      freshness: current
      answersQuestionRefs: [QV011, QV027]
    - id: CV003
      statement: "Gartner projects enterprise browsers will factor into 25% of enterprise web security decisions by 2025 (vs. 5% in 2022) — implying a rapidly expanding TAM that supports the enterprise browser category investment thesis."
      type: third-party-reported
      topic: market-size-validation
      sourceRefs: [SV004, SV005]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV021, QV024]
    - id: CV004
      statement: "Island's Series E implies approximately 56x trailing ARR ($4.85B / $87M estimated ARR) — at the upper end of the 15–60x range for high-growth cybersecurity SaaS companies with 50%+ ARR growth rates."
      type: estimated
      topic: valuation-multiple
      sourceRefs: [SV001, SV006]
      confidence: low
      freshness: current
      answersQuestionRefs: [QV001, QV008]
    - id: CV005
      statement: "Public comparable Zscaler (ZS) trades at approximately 20x trailing ARR with 23% YoY growth; CrowdStrike (CRWD) at 18x ARR with 25% growth; Palo Alto (PANW) at 10x with 14% growth — Island's 56x premium is justified only by 2x+ ARR growth and category leadership assumptions."
      type: observed
      topic: comparable-multiples
      sourceRefs: [SV007, SV008, SV009]
      confidence: high
      freshness: current
      answersQuestionRefs: [QV006, QV007]
    - id: CV006
      statement: "Island's IPO return math requires reaching $250–300M ARR (base case) at a 20x public market multiple to deliver $5–7B market cap from a $4.85B Series E post-money — achievable in 2027–2028 if Island sustains 50%+ ARR growth."
      type: estimated
      topic: ipo-return-math
      sourceRefs: [SV001, SV006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV002, QV004]
    - id: CV007
      statement: "Comparable private security round: Netskope was valued at approximately $7.5B at ~$300M ARR (~25x) — Island's 56x at $87M ARR is a much higher premium, justified by higher growth but with less evidence of durability given undisclosed NRR."
      type: estimated
      topic: private-comparable
      sourceRefs: [SV010, SV012]
      confidence: low
      freshness: historical
      answersQuestionRefs: [QV018]
    - id: CV008
      statement: "Bull case ($10–15B exit): Island becomes enterprise browser standard, reaches $500M ARR by 2028, FedRAMP High authorized, NRR >120%, IPO at 25x forward ARR. Probability: 20–25%."
      type: estimated
      topic: bull-case
      sourceRefs: [SV001, SV003]
      confidence: low
      freshness: current
      answersQuestionRefs: [QV003, QV023]
    - id: CV009
      statement: "Base case ($5–7B exit): Island grows to $250–300M ARR by 2028 at 50% CAGR, NRR 110–120%, IPO at 20x trailing ARR. Return from $4.85B: 1.2–1.8x. Probability: 45–50%."
      type: estimated
      topic: base-case
      sourceRefs: [SV001, SV006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV004, QV023]
    - id: CV010
      statement: "Bear case ($3–4B exit, below Series E price): Google/Microsoft reach feature parity, NRR disappoints below 100%, ARR stalls at $120–150M, exit via acquisition at 25–30x stalled ARR. Return from $4.85B: 0.6–0.85x. Probability: 25–30%."
      type: estimated
      topic: bear-case
      sourceRefs: [SV016, SV012]
      confidence: low
      freshness: current
      answersQuestionRefs: [QV005, QV023]
    - id: CV011
      statement: "Overall recommendation: Conditionally constructive. Island has category leadership, real customers, and sophisticated investor validation. But the $4.85B Series E is fully priced — NDA diligence on NRR, burn rate, and management console security is non-negotiable before any investment."
      type: inferred
      topic: recommendation
      sourceRefs: [SV001, SV021]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV010, QV020]
    - id: CV012
      statement: "A 15–20% discount to the $4.85B Series E post-money (entry at $3.9–4.1B) is recommended for secondary market buyers — improving the risk-adjusted return distribution without fundamentally changing the investment thesis."
      type: inferred
      topic: entry-price-recommendation
      sourceRefs: [SV006, SV011]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV019]
    - id: CV013
      statement: "Island's IPO readiness is 12–24 months away, contingent on: (1) audited financials prepared to SEC standards; (2) predictable unit economics (NRR, gross margin, CAC payback); (3) management console security validation; and (4) a public market window with compressed multiples normalizing."
      type: inferred
      topic: ipo-readiness
      sourceRefs: [SV001, SV022]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV016]
    - id: CV014
      statement: "The probability-weighted expected return from Island's Series E post-money is estimated at approximately 1.4x (MOIC) — driven by: 45% × 1.5x (base) + 22% × 2.6x (bull) + 28% × 0.72x (bear) = ~1.4x MOIC over 3–4 years — a 12–15% IRR, which is below the 20%+ target for growth-stage venture."
      type: estimated
      topic: probability-weighted-return
      sourceRefs: [SV006, SV003]
      confidence: low
      freshness: current
      answersQuestionRefs: [QV023, QV029]
    - id: CV015
      statement: "Island's financial model risk is compounded by valuation compression: the cybersecurity SaaS median ARR multiple has declined from 30–50x (2021 peak) to 10–20x (2024), meaning Island's $4.85B pricing already reflects a recovery-scenario multiple that may not materialize at IPO."
      type: inferred
      topic: multiple-compression-risk
      sourceRefs: [SV006, SV012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV022]
    - id: CV016
      statement: "Island's strongest investment argument is the financial services moat: if 7/10 of the world's largest banks are production customers, each new financial services CISO evaluating an enterprise browser product will encounter Island as the reference standard, creating compounding network effects."
      type: inferred
      topic: moat-quality
      sourceRefs: [SV001, SV021]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV012]
    - id: CV017
      statement: "Coatue, Sequoia, and Stripes co-led the $250M Series E — a sophisticated investor consortium that typically deploys only into companies with verified growth metrics and a credible IPO timeline within 24–36 months of the round."
      type: inferred
      topic: investor-signal
      sourceRefs: [SV001, SV003]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV012]
    - id: CV018
      statement: "Zscaler SEC filings (10-K FY2024) show ~$2.2B ARR at 23% growth and ~20x ARR public multiple — the most direct public comparable for Island's SASE displacement thesis in Enterprise Network. Island must reach similar ARR at competitive growth rates to justify its private premium."
      type: observed
      topic: zscaler-comparable
      sourceRefs: [SV007, SV014]
      confidence: high
      freshness: current
      answersQuestionRefs: [QV028, QV006]
    - id: CV019
      statement: "Palo Alto Networks' acquisition of Talon (enterprise browser, 2023) demonstrates that SASE incumbents view enterprise browser as a strategic product category worth acquiring — validating the M&A exit path for Island in the bear-to-base case scenario."
      type: third-party-reported
      topic: m-and-a-exit-path
      sourceRefs: [SV025, SV009]
      confidence: medium
      freshness: historical
      answersQuestionRefs: [QV018, QV024]
    - id: CV020
      statement: "Island's per-seat SaaS model (vs. Palo Alto's platform subscription) is less defensible against SASE bundling but creates a simpler go-to-market and a clear seat-expansion land-and-expand motion — appropriate for an early-stage category leader building installed base."
      type: inferred
      topic: business-model-comparison
      sourceRefs: [SV009, SV020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QV031]
    - id: CV021
