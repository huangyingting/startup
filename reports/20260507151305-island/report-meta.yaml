companyProfile:
  summary: Island is the enterprise browser category pioneer — the first company to deploy a managed Chromium-based browser as a primary enterprise security control plane. Founded in 2020 by ex-Symantec President Mike Fey and Fireglass founder Dan Amiga, Island has achieved significant enterprise adoption with 450+ customers and critical financial services penetration (7 of 10 largest global banks). Its $4.85B Series E valuation (March 2025) reflects sophisticated investor conviction, but NRR and unit economics remain undisclosed — the key diligence uncertainty for any new investor.
  foundedDate: "2020-08-01"
  founders:
    - name: Mike Fey
      role: CEO and co-founder
      background: Former President and COO of Symantec (now Broadcom Security); 20+ years enterprise security leadership; primary commercial, fundraising, and external-trust figure.
      claimRefs: [CO005]
    - name: Dan Amiga
      role: CTO and co-founder
      background: Founder of Fireglass (acquired by Symantec 2017); browser isolation pioneer; owns technical architecture and product roadmap.
      claimRefs: [CO005]
  foundingLocation: Tel Aviv, Israel (with Dallas HQ established)
  headquarters: Dallas, Texas
  productSummary: Island Enterprise Browser is a managed Chromium-based enterprise browser that enforces zero-trust access policies, data loss prevention, and ZTNA natively in the browser layer — eliminating the need for separate VPN, VDI, DLP, and proxy deployments. The product suite has expanded to Enterprise AI (governing AI tool access and data governance) and Enterprise Network (competing with SASE vendors).
  customerFocus: Large enterprises with regulated data environments — primarily financial services (banks, insurance, wealth management), healthcare, and government. 450+ enterprise customers including 7 of 10 largest global banks.
  businessModel: Per-seat SaaS subscription (1–3 year enterprise contracts) with land-and-expand motion (start with core browser, expand to AI governance and network modules).
  stage: late-stage private
  fundingStatus: "$730M total raised across 5 rounds (A–E). Series E: $250M at $4.85B post-money valuation led by Coatue, with participation from Sequoia Capital, Stripes, and others (March 2025)."
  claimRefs: [CO001, CO003, CO005, CO007, CO011, CO014]
summary:
  headline: Island has category leadership and a financial services moat, but the $4.85B Series E prices in near-perfect execution — NDA diligence on NRR and burn is required before any investment.
