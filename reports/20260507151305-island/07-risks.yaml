      type: company-claimed
      topic: soc2-iso-mitigation
      sourceRefs: [SR015, SR025]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR025]
    - id: CR017
      statement: "Island's 21-day feature delivery cadence provides a structural competitive moat against incumbents (Microsoft and Google) whose enterprise browser updates follow longer enterprise IT cycle times — sustaining product lead in the near term."
      type: company-claimed
      topic: cadence-mitigation
      sourceRefs: [SR013, SR010]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR017]
    - id: CR018
      statement: "CISA's Zero Trust Maturity Model v2.0 explicitly recommends device and user identity-based access controls — validating Island's core architecture alignment with federal zero trust mandates and supporting the regulatory compliance value proposition."
      type: third-party-reported
      topic: cisa-validation
      sourceRefs: [SR003, SR004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR015, QR020]
    - id: CR019
      statement: "Island's thesis-break triggers include: (1) Google/Microsoft shipping enterprise browser DLP/ZTNA at parity within 18 months; (2) a public management console breach; (3) FedRAMP High denial or 24+ month delay; and (4) loss of both founding executives before an IPO."
      type: inferred
      topic: thesis-break-triggers
      sourceRefs: [SR010, SR006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR018]
    - id: CR020
      statement: "The National Vulnerability Database (NVD) tracks hundreds of Chromium CVEs annually — the open-source browser engine has a broad attack surface by virtue of its complexity (6+ million lines of code), and any enterprise Chromium-based fork inherits this exposure."
      type: observed
      topic: chromium-attack-surface
      sourceRefs: [SR005, SR004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR016]
    - id: CR021
      statement: "Carahsoft's federal channel relationship creates a partner dependency risk: if Carahsoft's GSA Schedule vehicle is challenged, or if Carahsoft's margins make Island's federal pricing uncompetitive, Island's government revenue path is constrained without an alternative federal channel."
      type: inferred
      topic: carahsoft-dependency
      sourceRefs: [SR030, SR016]
