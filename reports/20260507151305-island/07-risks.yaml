      type: inferred
      topic: idp-integration-risk
      sourceRefs: [SR020, SR025]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR030]
    - id: CR027
      statement: "The cybersecurity SaaS valuation multiple compression of 2022–2024 (from 30–50x ARR to 10–20x for growth-stage companies) creates a financial risk for Island's investors: a delayed IPO in a multiple-compressed environment could significantly reduce returns relative to the $4.85B Series E valuation."
      type: third-party-reported
      topic: valuation-compression-risk
      sourceRefs: [SR024, SR019]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR031]
    - id: CR028
      statement: "Island's browser regression risk — the risk that a rapid feature update breaks existing enterprise policies or creates compatibility issues — is elevated by the 21-day release cadence, particularly as the product expands to include Enterprise AI and Enterprise Network modules."
      type: inferred
      topic: regression-risk
      sourceRefs: [SR009, SR006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR022]
    - id: CR029
      statement: "Island's competitive risk from CrowdStrike Falcon Go Browser, Lookout Mobile Security, and other endpoint security vendors adding browser-layer controls is lower than the Google/Microsoft risk — but these vendors could bundle browser security into existing EDR/UEM contracts at no incremental cost."
