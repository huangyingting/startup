  claims:
    - id: CR001
      statement: "Island's highest-severity competitive risk is a defensive move by Google (Chrome Enterprise) or Microsoft (Edge for Business) to offer native ZTNA, DLP 360, and device posture controls at no incremental license cost — directly undercutting Island's per-seat premium."
      type: inferred
      topic: competitive-risk
      sourceRefs: [SR010, SR021, SR022]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR006]
    - id: CR002
      statement: "Palo Alto Networks acquired Talon (enterprise browser) in 2023, signaling that SASE incumbents will bundle browser security with existing platform contracts — creating a structural pricing threat to Island's standalone browser model."
      type: third-party-reported
      topic: sase-bundling-risk
      sourceRefs: [SR022, SR010]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR013]
    - id: CR003
      statement: "Island's financial services customer moat (7/10 largest global banks, 4.9/5 Gartner score) creates switching cost protection — displacement requires a competitor to win a reference account in the same vertical, which takes years."
      type: inferred
      topic: competitive-mitigation
      sourceRefs: [SR026, SR011]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR017]
    - id: CR004
      statement: "Island's Chromium-based architecture creates a persistent vulnerability maintenance risk: when Google patches a Chromium CVE, Island must fork, test, and re-deploy the patch before customers are protected — creating a lag window during which Island customers are exposed to known exploits."
      type: inferred
      topic: chromium-cve-lag
      sourceRefs: [SR005, SR006]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR002, QR016]
    - id: CR005
      statement: "A breach of Island's SaaS management console would be a cross-customer incident: all 450+ enterprise policy configurations are hosted in one platform, meaning a console compromise could simultaneously expose security settings for hundreds of enterprise customers."
      type: inferred
      topic: management-plane-breach-risk
      sourceRefs: [SR006, SR015]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR007, QR027]
    - id: CR006
      statement: "Island's AWS cloud dependency creates a single-cloud availability risk for the management plane. While AWS's 99.99% SLA mitigates most operational concerns, Island does not publicly disclose its multi-region or multi-cloud disaster recovery posture."
      type: inferred
      topic: aws-dependency
      sourceRefs: [SR016, SR015]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR008]
    - id: CR007
      statement: "Island's concentration of 200+ R&D engineers in Tel Aviv is a geopolitical risk factor demonstrated by the October 2023 Hamas conflict, which disrupted Israeli technology operations. Extended regional instability could affect product delivery timelines and talent retention."
      type: inferred
      topic: geopolitical-risk
      sourceRefs: [SR009, SR012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR009]
    - id: CR008
      statement: "Island's FedRAMP High authorization is In Process but not yet granted — a status that limits Island's ability to sign production federal contracts in environments requiring FedRAMP High, potentially delaying federal ARR by 12–24 months beyond current expectations."
      type: observed
      topic: fedramp-delay
      sourceRefs: [SR001, SR002]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR001]
    - id: CR009
      statement: "Island's browser captures rich telemetry about user behavior, application access patterns, and data interactions — data that, if not GDPR-compliant under Article 6 lawful basis or Article 5 data minimization, could trigger enforcement actions from EU data protection authorities."
      type: inferred
      topic: gdpr-risk
      sourceRefs: [SR007, SR003]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR003]
    - id: CR010
      statement: "Island's healthcare deployments create HIPAA Business Associate Agreement (BAA) liability: healthcare providers using Island to access PHI through the browser may require Island to execute a BAA, making Island jointly liable for HIPAA breach notification and enforcement."
      type: inferred
      topic: hipaa-baa-risk
      sourceRefs: [SR007, SR016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR004]
    - id: CR011
      statement: "Island holds only one US patent (US 12,235,922 — browser data deletion by URL hostname grouping). Most of Island's technology — the policy engine, management console, ZTNA architecture, and DLP controls — is unpatented and potentially exposed to imitation by well-funded competitors."
      type: observed
      topic: ip-protection-gap
      sourceRefs: [SR014, SR015]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR005, QR028]
    - id: CR012
      statement: "CEO Mike Fey and CTO Dan Amiga represent Island's highest key-person dependencies. Fey's enterprise network (7/10 largest banks, Symantec relationships) and Amiga's browser security IP (Fireglass lineage) are not easily replaceable in the near term."
      type: inferred
      topic: key-person-risk
      sourceRefs: [SR011, SR028]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR010]
    - id: CR013
      statement: "Island's financial model opacity — no disclosed burn rate, runway, CAC, NRR, or unit economics — prevents diligence validation of whether the $730M raised across five funding rounds is sufficient to reach cash-flow breakeven without a dilutive capital raise."
      type: observed
      topic: financial-opacity
      sourceRefs: [SR018, SR019]
      confidence: high
      freshness: current
      answersQuestionRefs: [QR012, QR031]
    - id: CR014
      statement: "Island's uptime SLA for the management console, incident response runbook, and security breach notification process are not publicly disclosed — creating operational risk opacity for enterprise customers evaluating Island as a security control plane."
      type: observed
      topic: uptime-sla-opacity
      sourceRefs: [SR015, SR006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR019]
    - id: CR015
      statement: "Financial services customer concentration (inferred at ~50–60% of ARR) creates a single-vertical dependency risk: a financial crisis, bank consolidation wave, or IT budget compression in the financial sector would disproportionately impact Island's ARR growth."
