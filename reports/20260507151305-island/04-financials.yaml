  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "ARR, gross margin, NRR, burn rate, and profitability not publicly confirmed"
      missingEvidence: "Island has not confirmed ARR, gross margin, NRR, burn rate, or any path to profitability. LATKA $87M ARR is third-party unverified. Audited financials do not exist in the public record."
      whyItMatters: "Without confirmed ARR and margin data, valuation multiple and unit economics cannot be independently validated. The 55x ARR multiple is only meaningful if ARR is accurate."
      diligencePath: "Request management-confirmed ARR letter, P&L summary, and monthly cash burn from Island CFO or CEO under NDA. Commission independent financial diligence with access to Quickbooks or NetSuite export."
