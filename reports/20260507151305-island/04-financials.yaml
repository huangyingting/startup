    - type: private-evidence-only
      severity: material
      topic: "Cap table, preference stack, and liquidation waterfall not disclosed"
      missingEvidence: "Island has not disclosed its fully diluted share count, liquidation preference terms, pro-rata rights, or economic waterfall between preferred and common shareholders."
      whyItMatters: "Without preference stack data, economic outcomes for employees (common holders) at various exit valuations cannot be calculated. Preference overhang is a risk for exit economics below $5B."
      diligencePath: "Obtain complete cap table and investor rights agreement from Island legal counsel or lead investors (Coatue, Sequoia) under NDA."
