  - id: S-metrics
    title: "Cover Metrics and Evidence Gaps"
    body: |
      Island's publicly disclosed metrics as of the report date: approximately $730 million
      total raised; $4.85 billion post-money valuation (March 2025); 450+ enterprise customers;
      approximately 500 employees; and ARR approximately doubling each year since launch,
      reaching an estimated $87 million in 2024 per LATKA analyst data. Island has not publicly
      disclosed gross margin, net revenue retention (NRR), burn rate, free cash flow, or
      specific revenue guidance. No audited financial statements are publicly available.

      The Israeli R&D concentration (200+ engineers in Tel Aviv out of approximately 500 total
      employees) represents both a talent advantage and a geopolitical risk factor. Island has
      not disclosed any business-continuity or geographic-diversification plans for its R&D
      operations. The company's valuation of $4.85 billion at an estimated $87 million ARR
      implies an ARR multiple of approximately 55x — exceptionally high even by cybersecurity
      SaaS standards — making independent financial validation critical for any investor.

      No adverse events — including data breaches, regulatory actions, or lawsuits — involving
      Island were identified in public research conducted for this chapter.
    claimRefs:
      - CO028
      - CO029
      - CO030
      - CO031
      - CO033
      - CO036

