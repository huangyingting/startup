company:
  name: Island

chapter:
  number: 1
  title: Company Overview
  summary: |
    Island is a Dallas-headquartered, Tel Aviv R&D-led cybersecurity company that created and
    commercialised the enterprise browser category. Founded in August 2020 by veteran security
    executives Mike Fey (CEO, ex-Symantec President/COO, ex-McAfee CTO) and Dan Amiga (CTO,
    founder of Fireglass, acquired by Symantec for $250 million in 2017), Island builds a
    Chromium-based browser purpose-built for enterprise needs: native data-loss prevention,
    zero-trust network access, web isolation, granular policy enforcement, and workforce
    visibility — all without plugins or bolt-ons. The company emerged from stealth in February
    2022, has grown to 450 enterprise customers (Pfizer, Swiss Life, Fiverr, Mattress Firm,
    TaskUs) and approximately 500 employees with ARR roughly doubling each year since launch,
    reaching an estimated $87 million in 2024. Island raised $250 million in a Series E round
    at a $4.85 billion valuation in March 2025, bringing cumulative outside investment to
    approximately $730 million. Investors include Coatue, Sequoia Capital, Insight Partners,
    Canapi Ventures, Cyberstarts, Cisco Investments, Citi Ventures, Capital One Ventures,
    Georgian, Prysm Capital, ServiceNow Ventures, and Stripes.

sections:
  - id: S-identity
    title: "Identity, Headquarters, and Business Model"
    body: |
      Island Technology Inc. is incorporated in Delaware and headquartered in Dallas, Texas,
      with its primary research-and-development centre in Tel Aviv, Israel. The company defines
      itself as the creator of the enterprise browser category — a purpose-built, Chromium-based
      browser that embeds security, IT governance, and productivity controls natively, replacing
      consumer browsers that were never designed for corporate environments. Island's product is
      delivered as a managed SaaS subscription: enterprises pay per seat for the Island
      Enterprise Browser, receiving continuous updates, policy management tooling, and a cloud-
      based management console. The browser itself runs locally on endpoints and supports
      Windows, macOS, and select Linux distributions.

      The business model targets chief information security officers (CISOs), chief information
      officers (CIOs), and IT and security teams in mid-market and enterprise accounts. Revenue
      is subscription-based (annual contracts), with pricing tiers tied to seat count and
      feature module selection. Island positions itself as a platform that consolidates and
      replaces spending on several adjacent security products — virtual desktop infrastructure
      (VDI), data-loss-prevention (DLP) agents, web-isolation gateways, and secure web gateways
      — enabling demonstrable return-on-investment. The Forrester Total Economic Impact study
      commissioned by Island documented a 344% ROI for a composite enterprise customer.

      Island serves customers across every major vertical: financial services, healthcare,
      pharmaceutical, retail, manufacturing, government, and higher education. As of March 2025
      the company reported 450 enterprise customers, including multiple Fortune 100 accounts
      and government agencies. Island is based in Dallas with R&D led from Tel Aviv; it has no
      published geographic segment revenue disclosures.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006

  - id: S-founding
    title: "Founders, Leadership, and Governance"
    body: |
      Island was founded in August 2020 by Mike Fey and Dan Amiga, who met when Symantec
      acquired Amiga's previous company, Fireglass, in 2017. Fey served as President and Chief
      Operating Officer of Symantec (now Broadcom) and as General Manager and Chief Technology
      Officer of McAfee (now Trellix), accumulating more than two decades of enterprise security
      leadership. Amiga invented remote browser isolation technology at Fireglass — a category-
      defining Israeli security startup — and has served as a founding investor or adviser in
      multiple Israeli cybersecurity companies including Axis Security, Cycode, and
      Build.Security.

      The two founders identified a structural gap: as enterprise work shifted to SaaS and web
      applications, the browser became the primary attack surface and data-exfiltration vector,
      yet enterprises universally deployed consumer browsers that provided no enterprise controls.
      Their insight was to leverage the open-source Chromium engine — standardised across the
      industry — to build a browser indistinguishable to end users but fully manageable by IT
      and security teams. Two years of stealth product development followed the August 2020
      founding before the February 2022 public launch.

      Island's leadership team beyond the founders includes senior hires from enterprise
      security, identity, and SaaS ecosystems; the company has not publicly disclosed the
      names of its extended C-suite. The board includes representation from Sequoia Capital
      (Doug Leone, who led Series A through D participation) and Coatue Management (David
      Schneider, lead investor in Series D and E). No independent directors have been publicly
      named as of the report date. Key-person risk is concentrated in the two founders, who
      retain de-facto technical and commercial leadership. The R&D hub in Tel Aviv employs more
      than 200 engineers and is the primary product-development centre.
    claimRefs:
