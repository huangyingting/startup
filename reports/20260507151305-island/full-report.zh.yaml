            body: >
              竞争分析的关键证据缺口包括：（1）Talon 被收购后，Prisma Browser 的企业赢单率和客户数量未公开披露；（2）Seraphic 的 ARR 和融资未公开披露，难以评估威胁级别；（3）Island
              对各竞争对手的具体赢 / 输记录属于专有信息；（4）Palo Alto 在共同潜在客户中主动替换 Island 的程度无法从公开来源判断。（5）没有具名企业公开披露从 Island 切换到竞争对手，Island
              也未披露流失率或净收入留存——这些是评估竞争捆绑威胁是否兑现的关键指标。（6）企业浏览器品类的专利版图尚未全面梳理；Island、Palo Alto 或其他厂商是否持有可能影响竞争产品开发的阻断性专利，仍不清楚。
            claimRefs:
