      - number: '2.3'
        title: 买方与细分分析
        blocks:
          - type: paragraph
            body: >
              Island 的主要买方是受监管行业中的大型企业（>5,000 名员工）。金融服务（银行、保险、财富管理）是领先垂直行业，驱动因素是监管对 DLP、访问控制和可审计性的要求。医疗健康和生命科学紧随其后，HIPAA
              合规和临床工作流访问是主要驱动因素。专业服务（法律、咨询）和企业技术（B2B SaaS 公司）构成核心早期多数细分的其余部分。


              经济买方是 CISO 或信息安全 VP，掌握网络安全工具预算并对合规负责。技术评估者是安全架构师。终端用户体验 Island 时，功能上与 Chrome 无差别——零培训摩擦是设计要求。BYOD
              环境和第三方承包商访问是价值最高的场景，传统终端代理无法安装。


              地域上，Island 集中在北美和西欧。CEO Mike Fey 将 APAC 扩张列为 Series E 资金的关键用途。政府和国防是新兴细分，因 FedRAMP 要求，采购周期更长。
            claimRefs:
              - CM012
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
