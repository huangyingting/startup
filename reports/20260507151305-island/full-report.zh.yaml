            claimRefs: []
          - type: figure
            figureRef: FI001
            claimRefs: []
      - number: '4.2'
        title: 单位经济
        blocks:
          - type: paragraph
            body: >
              Island 未公开披露单位经济。关键指标——NRR（净收入留存）、毛利率、CAC（获客成本）和 LTV（生命周期价值）——只能用公开代理指标估算。基于 ARR 增速快于客户数增速（2024 年 4 月至
              2025 年 3 月，ARR 翻倍，而客户数从约 200 增至 450+，暗示现有账户内席位扩张），NRR 被推断为超过 100%。若这一点成立，Island 净收入留存符合顶级四分位企业 SaaS
              水平（行业基准：表现最好的网络安全 SaaS NRR >120%）。


              根据无硬件组件、基于 Chromium 的 SaaS 安全产品行业基准，毛利率估算为 70–85%。获客成本未知；Island 有 450 家客户和约 300 名非 R&D
              员工（估算为销售、营销、G&A），说明其 GTM 偏销售驱动，符合企业客户打法。考虑企业 ACV 在 $150–300K 区间，回本周期估算为 12–24 个月。


              Island 委托 Forrester 于 2024 年完成的 Total Economic Impact（TEI）报告显示，综合企业客户实现 344% ROI——这是销售周期中的强 ROI 基准。
            claimRefs:
              - CI006
