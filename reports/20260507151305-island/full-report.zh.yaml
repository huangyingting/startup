      - number: '2.5'
        title: 市场尽调缺口
        blocks:
          - type: paragraph
            body: >
              公开记录中存在重大证据缺口。主要分析师机构（Gartner、Forrester、IDC）没有发布过带透明、同行评审方法论的独立企业浏览器
              TAM。现有估算（$2.1–15B）来自规模较小的研究机构，对范围假设披露有限。Gartner 关于 25%
              采用率的预测是最可信的参照点，但衡量的是“至少一个使用场景部署”，不是全企业浏览器替换；从完整替代视角看，这低估了市场规模。


              Island 未披露 ACV、赢单率、销售周期长度或获客成本，导致自下而上测算市场规模具有推测性。Microsoft 和 Palo Alto Networks 免费或捆绑提供浏览器安全能力，可能压缩 Island
              在 Microsoft 中心型和 Palo Alto 中心型企业账户中的可触达市场；这种压缩幅度目前无法从公开来源判断。
            claimRefs:
              - CM028
              - CM029
              - CM030
  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              截至 2026 年，安全企业浏览器市场包含五类竞争形态。第一类是替代消费级浏览器的专用企业浏览器（Island、Palo Alto Prisma Browser/Talon、Surf
              Security）。第二类是为现有浏览器叠加安全能力、但不替换浏览器的扩展 / 代理覆盖层（Seraphic、LayerX、Red Access）。第三类是带增强企业策略的通用浏览器（Chrome
              Enterprise、Microsoft Edge for Business）。第四类是把浏览器隔离作为功能提供的 SASE/SWG 平台（Zscaler、Netskope）。第五类是现状：未托管的
              Chrome/Edge，没有专用安全能力。


              Island 的主要竞争优势在于控制整个浏览器，因此能在渲染引擎层做细粒度执行——扩展或网络代理无法做到。Palo Alto Prisma Browser（基于 Talon，2023 年 12
              月收购）是技术上最可比的竞争对手，也因随 SASE 免费捆绑而威胁最大。Microsoft Edge for Business 因 M365 无处不在，是覆盖最广的竞争对手。Gartner 基于 238
              条评论给予 Island 4.9/5 评分，高于品类平均，确认当前用户对其市场领导者的认知。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
          - type: table
            tableRef: TP001
            claimRefs: []
          - type: figure
            figureRef: FP001
            claimRefs: []
      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              Island 最深的技术差异化在渲染引擎层执行：DLP 控制（剪贴板、截图、复制 / 粘贴、文件上传 / 下载）在应用层之下执行，终端用户无法绕过。Palo Alto Prisma Browser 在多数 DLP
              能力上与 Island 相当，但增加了由 WildFire 驱动的威胁情报和基于 LLM 的数据分类。Seraphic 以浏览器无关扩展形态运行，可以不换浏览器就部署，但控制深度受限。Chrome
              Enterprise 和 Edge for Business 缺少浏览器内专用 DLP，数据保护依赖网络层或 CASB 集成。


              在零信任访问上，Island 和 Prisma 都提供浏览器原生 ZTNA，可替代内部 Web 应用的 VPN。Chrome Enterprise 需要额外集成 Chrome Enterprise Premium
              或 BeyondCorp。Edge for Business 借助 Microsoft 的 Entra Conditional Access。Island 的 SIEM
              集成、会话录制和自定义工作流自动化能力（支持在浏览器内定制 Web 应用 UX）是独特差异化，截至 2026 年竞争对手尚未复制。
            claimRefs:
              - CP006
              - CP007
              - CP008
              - CP009
              - CP010
              - CP011
              - CP012
          - type: table
            tableRef: TP002
            claimRefs: []
          - type: figure
            figureRef: FP002
            claimRefs: []
      - number: '3.3'
        title: 定价与包装对比
        blocks:
          - type: paragraph
            body: >
              Island 采用定制化按席位企业定价，没有公开标价。AWS Marketplace 列出的企业部署参考 12 个月合同约为每年 $250,000。Palo Alto Prisma Browser 向符合条件的
              SASE AI 客户免费提供——对现有 Palo Alto 客户而言，实际增量成本为零。Microsoft Edge for Business 随任何 Microsoft 365 商业许可证免费包含。Chrome
              Enterprise 基础版免费；高级管理附加组件（Chrome Enterprise Premium）为 $6/user/month。


              这种定价结构让 Island 在已大规模押注 Palo Alto SASE 或 Microsoft 365 的企业账户中处于结构性劣势。面对免费替代品，Island
              必须证明每席位数百美元的价值溢价——通常靠展示工具整合节省（减少 VDI、DLP、SWG）或独特能力缺口（BYOD 承包商访问、AI 治理）。
            claimRefs:
