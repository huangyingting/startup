  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              安全企业浏览器（SEB）市场包含一类专用浏览器软件：它用企业级安全、数据治理和访问控制替代或增强消费级浏览器层。Island 对边界定义较宽：任何发生在浏览器中的企业工作流——访问 SaaS
              应用（Salesforce、Workday、M365）、内部 Web 应用或第三方合作伙伴门户——都属于该市场。网络层安全工具（防火墙、网络边缘的 SASE）和原生移动应用相邻，但不纳入 SEB 边界。


              Island 取代的主要替代品和现状既有方案包括：用于远程访问的 VPN/ZTNA 代理（全球约 $10B 市场）、用于应用交付的 VDI 平台（约 $15B）、用于云流量检查的安全 Web 网关（SWG）和
              CASB 工具（约 $12B），以及用于数据保护的终端 DLP 代理（约 $5B）。Island 将其浏览器定位为单一控制平面，在用户实际工作的浏览器层整合上述所有功能。


              基于扩展的安全产品（Seraphic、LayerX）在不替换现有浏览器的情况下增加安全能力，是局部替代品，切换成本更低，但控制平面更窄。Gartner 的 Innovation Insight 验证了 SEB
              品类定义，并将 Island、Palo Alto Networks（Talon/Prisma）、Citrix 和 Seraphic 列为代表性厂商。
            claimRefs:
              - CM001
              - CM002
              - CM005
              - CM006
              - CM009
