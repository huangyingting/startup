      - number: '3.4'
        title: 护城河与竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Island 的竞争护城河由四部分构成：（1）技术深度——渲染引擎层控制，扩展或网络代理难以复制；（2）品类创造者优势——Island
              提出“企业浏览器”品类，拥有最长记录，并构建了该平台独有的专有工作流自动化工具；（3）客户切换成本——企业浏览器策略一旦配置好，员工把 Island 当作日常浏览器，切换就需要跨全员的 IT
              变更管理；（4）人才护城河——Tel Aviv 深厚的以色列顶级 Chromium 工程人才难以复制。


              竞争风险：（a）Palo Alto 和 Microsoft 以零成本平台捆绑，可能封顶 Island 在各自装机基数中的可触达市场；（b）Chromium 是开源的，任何资源充足的玩家都能 fork
              它来做竞争性企业浏览器；（c）Palo Alto 和 Google 拥有大得多的安全 R&D 预算；（d）如果基础浏览器安全功能成为默认企业浏览器的一部分，市场存在商品化风险。
            claimRefs:
