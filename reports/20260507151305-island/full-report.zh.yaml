chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              Island Technology Inc. 在 Delaware 注册，总部位于 Texas 州 Dallas，主要研发中心在以色列 Tel
              Aviv。公司将自己定义为企业浏览器品类的创造者：一款专为企业打造、基于 Chromium 的浏览器，把安全、IT 治理和生产力控制原生嵌入浏览器，替代从未为企业环境设计的消费级浏览器。Island 产品以托管式
              SaaS 订阅交付：企业按席位为 Island Enterprise Browser 付费，获得持续更新、策略管理工具和云端管理控制台。浏览器本身在终端本地运行，支持 Windows、macOS 和部分
              Linux 发行版。


              商业模式瞄准中端市场和大型企业账户中的 CISO、CIO 以及 IT 和安全团队。收入来自订阅（年度合同），价格层级与席位数和所选功能模块绑定。Island
              将自己定位为一套平台，能够整合并替代多项相邻安全产品支出——虚拟桌面基础设施（VDI）、数据防泄漏（DLP）代理、Web 隔离网关和安全 Web 网关——从而给出可量化 ROI。Island 委托
              Forrester 开展的 Total Economic Impact 研究显示，一个综合企业客户实现了 344% ROI。


              Island 覆盖各主要垂直行业：金融服务、医疗健康、制药、零售、制造、政府和高等教育。截至 2025 年 3 月，公司披露拥有 450 家企业客户，包括多家 Fortune 100 客户和政府机构。Island
              总部在 Dallas，R&D 由 Tel Aviv 牵头；公司未披露按地理区域划分的收入。
