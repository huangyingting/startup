      - number: '2.2'
        title: 市场规模测算
        blocks:
          - type: paragraph
            body: >
              SEB TAM 的分析师估算从 $2.1B 到 $15B 不等，取决于定义范围。GrowthMarketReports 估计，市场 2025 年为 $5.5B，到 2033 年增长至 $14–15B，CAGR 为
              21–22%。WiseGuyReports 估计，2024 年市场为 $2.1–5B，CAGR 类似。区间很宽，反映出市场是否应纳入 VDI、SWG 和 CASB 替代支出仍有分歧。


              按 Gartner 约束口径测算，SAM 更保守：如果到 2028 年全球 25% 企业采用 SEB，且企业平均 ACV 为每年 $150K–300K，则约 1,250 家 Fortune 5000 公司、每家
              $200K ACV，对应美国 SAM 约 $250M。若扩展至欧洲和 APAC 企业并按 2 倍放大，到 2028 年 SOM 为 $500M–1.5B。


              Island 的替代叙事意味着机会更大：企业浏览器所瞄准的相邻市场包括 VPN（$10B）+ VDI（$15B）+ SWG（$12B），若获取其中 10%，即对应 $3.7B 收入池。实际兑现的 TAM
              高度取决于每个客户部署中替换技术栈的深度。
            claimRefs:
