      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              主要增长驱动因素是结构性的，并且仍在加速：（1）远程和混合办公让浏览器成为企业访问主入口——90% 知识工作发生在基于浏览器的应用中。（2）SaaS
              普及意味着网络边界控制无法保护通过浏览器交付的应用；浏览器是安全的最后一公里。（3）零信任架构要求把执行点推到应用层，与浏览器原生 ZTNA 对齐。（4）GenAI 普及带来新的数据泄漏风险，员工把敏感数据粘贴进
              ChatGPT、Copilot 和 Gemini，迫使企业尽快建立 AI 治理。（5）2024 年，基于浏览器的威胁同比增长 40%。


              采用约束同样显著：（a）替换 Chrome/Edge 存在组织惯性——IT 部署周期可能长达多年；（b）ROI
              论证复杂，需要把多个现有工具许可证的整合收益算清；（c）缺少已成型的预算品类；（d）Microsoft 将 Edge for Business 随 M365 免费捆绑；（e）Palo Alto 在以 $458M
              收购 Talon 后，将 Prisma Browser 随 SASE 免费提供。
            claimRefs:
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
              - CM027
