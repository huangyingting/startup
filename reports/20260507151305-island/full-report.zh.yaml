  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模型与来源
        blocks:
          - type: paragraph
            body: >
              Island 的主要收入来源是订阅 SaaS 模式：企业客户按席位支付年度经常性收入（ARR），获得 Island Enterprise Browser 及其管理控制台许可证。浏览器本身是核心 SaaS
              产品；附加功能（扩展会话录制、工作流自动化模块、高级支持）被认为构成追加销售层级，尽管 Island 未公开披露包装或分层定价。LATKA 分析师数据估计，Island 2024 日历年 ARR 约为
              $87M，自 2022 年 2 月发布以来复合年增长超过 100%。


              AWS Marketplace 将 Island 企业浏览器 12 个月合同列为约每年 $250,000，可作为参考点，暗示平均企业合同价值在 $100K–500K+ 区间，取决于席位数和所选功能。截至 2025
              年 3 月，Island 拥有 450+ 企业客户；若 $87M ARR 分摊到 450 家客户，隐含平均每客户年收入约 $193K，与企业客户导向打法一致。


              没有硬件、专业服务或非订阅收入证据。所有已知收入表述都与软件订阅有关。这形成了网络安全 SaaS 厂商典型的高毛利商业模式（估算毛利率 70–85%，但 Island 未确认）。
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
