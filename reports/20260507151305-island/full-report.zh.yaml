            body: >
              公开来源拿不到关键财务指标。Island 未发布经审计财务报表、收入数字、毛利率、烧钱速度、NRR、流失率、CAC 或 LTV。$87M ARR 来自 LATKA 这个未经核验的第三方数据聚合方，并非
              Island 管理层。鉴于 Island 披露仍是私营公司口径，本章所有财务估算都带有内在不确定性。约 55 倍 ARR 的估值倍数（$4.85B 估值 / $87M
