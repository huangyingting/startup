  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品线与模块架构
        blocks:
          - type: paragraph
            body: >
              Island 提供三条正在汇合的产品线。Enterprise Browser 是核心 SKU——一款由 Chromium 衍生、重建后原生嵌入企业策略执行的浏览器。不同于消费级 Chrome 或
              Edge，每个标签页、会话和交互都由 IT 管理的管理控制台治理。该浏览器替代或整合 VPN 客户端、VDI 平台、Web 过滤代理、DLP 点解决方案和远程浏览器隔离等传统工具。Enterprise AI
              在浏览器上扩展出对生成式 AI 工具（ChatGPT、Copilot、Gemini）的安全访问，并强制执行数据防泄漏策略，防止提示注入、IP 泄漏和影子 AI 采用。Enterprise Network 是一层
              SASE 覆盖，为私有和内部应用提供零信任网络访问（ZTNA），无需单独 VPN 代理。管理控制台是集中式 SaaS 平台，用于跨三条产品线管理策略、用户和设备姿态。所有 SKU 中，Island
              面向拥有受监管数据或 BYOD 复杂性的 500+ 席位企业中的 IT 管理员和 CISO。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
          - type: table
            tableRef: TE001
            claimRefs: []
          - type: figure
            figureRef: FE001
            claimRefs: []
      - number: '5.2'
        title: 企业使用场景与工作流集成
        blocks:
          - type: paragraph
            body: >
              Island 的市场定位围绕六类高价值部署模式。第一，BYOD 和承包商访问：Island 允许非 GFE 设备访问 SaaS 和私有应用，无需 MDM 注册或整机管理——浏览器在应用层执行策略边界。第二，VDI
              缩减：组织用 Island 浏览器替代昂贵的 Citrix 或 VMware Horizon 部署，在没有服务端基础设施的情况下复刻 VDI 访问控制。第三，M&A 入职：Island
              的策略级访问配置加速不同身份域之间的员工入职。第四，特权访问管理：共享账户和管理员控制台可通过浏览器会话控制访问，而不暴露凭证。第五，受监管行业合规：医疗机构用 Island 对 PHI 访问执行 HIPAA
              控制；金融服务公司用它满足 PCI/SOX DLP 要求。第六，AI 治理：Island 为 ChatGPT、Copilot 和其他 AI 工具设置护栏，防止数据泄漏到模型训练管线。
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
              - CE009
          - type: table
            tableRef: TE002
            claimRefs: []
          - type: figure
            figureRef: FE002
            claimRefs: []
      - number: '5.3'
        title: 技术栈与云架构
        blocks:
          - type: paragraph
            body: >
              Island 的核心技术基础是开源 Chromium 浏览器引擎的企业 fork。Google 的 Chromium 项目支撑 Chrome、Edge、Arc、Brave 和多数企业浏览器；Island
              在这个共享底座上叠加专有策略引擎、管理平面和安全控制。Island 后端运行在 AWS 上，使用 Elastic Kubernetes Service 承载微服务，RDS 存储管理平面数据，S3
              存储审计日志和会话，CloudFront 做全球内容分发。需要 FedRAMP High 等效隔离的联邦客户使用 AWS GovCloud。关键差异化 IP
              位于管理平面：集中式策略引擎把按用户、应用和设备粒度设定的控制推送到浏览器终端，无需经由中央代理转发流量。Island 持有美国专利 12,235,922，覆盖按 URL 主机名分组删除企业浏览器数据。R&D
              中心位于 Tel Aviv，拥有 200+ 名工程师；工程文化沿袭以色列军工相邻技术传统，这一传统也孕育了 Fireglass（2017 年被 Symantec 以约 $250M 收购，联合创始人 Dan
              Amiga 的前公司）。
            claimRefs:
              - CE010
              - CE011
              - CE012
              - CE013
              - CE014
          - type: table
            tableRef: TE003
            claimRefs: []
