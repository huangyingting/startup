        - label: 中等影响
          values:
            - 出口管制；以色列地缘政治扰动；关键人物离职
            - AWS 依赖；浏览器回归问题
            - 移动端功能对齐缺口；Tel Aviv 人才流失
        - label: 低影响
          values:
            - 无
            - 无
            - 传统应用兼容性缺口
    sourceRefs:
      - SR001
      - SR005
      - SR007
  - id: FR002
    title: 风险传导图
    description: 关键风险事件如何在 Island 的业务系统中级联。
    type: dag
    data:
      nodes:
        - id: R1
          label: Google 加固 Chrome Enterprise
        - id: R2
          label: Island 定价压力
        - id: R3
          label: ARR 增速放缓
        - id: R4
          label: Chromium 零日漏洞被利用
        - id: R5
          label: Island 声誉受损
        - id: R6
          label: 客户流失加速
        - id: R7
          label: FedRAMP 授权延迟
        - id: R8
          label: 联邦 ARR 推迟 12–24 个月
        - id: R9
          label: 估值倍数压缩
        - id: R10
          label: 金融服务客户整合
      edges:
        - from: R1
          to: R2
          label: 让浏览器安全商品化
        - from: R2
          to: R3
          label: 压低 ACV 或赢单率
        - from: R4
          to: R5
          label: 触发事件披露
        - from: R5
          to: R6
          label: 削弱客户对企业安全态势的信任
        - from: R7
          to: R8
          label: 推迟进入联邦市场
        - from: R3
          to: R9
          label: 压缩增长溢价
        - from: R8
          to: R9
          label: 短期压低 TAM
        - from: R10
          to: R3
          label: 降低金融服务 ARR 集中度
    sourceRefs:
      - SR005
      - SR006
      - SR009
  - id: FR003
    title: 依赖关系图
    description: Island 的关键技术和运营依赖，以及背后的风险来源。
    type: dag
    data:
      nodes:
        - id: D1
          label: Island 策略引擎（自研）
        - id: D2
          label: Google Chromium（OSS 分叉）
        - id: D3
          label: AWS 云（EKS、S3、GovCloud）
        - id: D4
