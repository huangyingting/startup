figures:
  - id: FO001
    title: Island 估值里程碑时间线
    type: timeline
    layout: standard
    summary: |
      Island 的投后估值从 2022 年 3 月进入独角兽时的 $1.3 billion，增至
      2025 年 3 月的 $4.85 billion；三年内完成六次融资事件。2024–2025 年节奏明显加快，
      两轮融资相隔 11 个月，把公司重估了 60%。每个里程碑都在确认投资人对企业浏览器品类的信心持续升温。
    data:
      items:
        - date: 2020-08
          label: 创立
          detail: Island 在 Dallas 注册成立；Mike Fey 和 Dan Amiga 在 Tel Aviv 启动研发
          tone: neutral
        - date: 2022-01
          label: Series A——发布前
          detail: 产品发布前，从 Insight Partners 和 Sequoia 融资 $100M
          tone: positive
        - date: '2022-02-01'
          label: 结束隐身——产品发布
          detail: Island Enterprise Browser 公开发布；全球首款企业浏览器
          tone: positive
        - date: 2022-03
          label: Series B——估值 $1.3B
          detail: 融资 $115M；发布六周后达成独角兽地位
          tone: positive
        - date: 2023-10
          label: Series C——估值 $1.5B
          detail: 融资 $100M；售出 2M+ 个浏览器席位；多个 Fortune 100 前 20 大客户
          tone: positive
        - date: 2023-12
          label: Palo Alto 收购 Talon（反向）
          detail: 竞争对手企业浏览器被 Palo Alto 以约 $458M 吸收；免费捆绑风险浮现
          tone: risk
        - date: 2024-04
          label: Series D——估值 $3.0B
          detail: 融资 $175M；累计 $487M；估值较 Series C 在 6 个月内翻倍
          tone: positive
        - date: 2025-03
          label: Series E——估值 $4.85B
          detail: 融资 $250M；累计 $730M；450 家客户；ARR 约 $87M；500 名员工
          tone: positive
        - date: 2025-04
          label: Gartner SEB 采用率预测
          detail: Gartner 预计 2028 年 25% 组织将使用 SEB；当前采用率 <10%
          tone: opportunity
