      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Island 由 Mike Fey 和 Dan Amiga 于 2020 年 8 月创立。两人相识于 2017 年 Symantec 收购 Amiga 前公司 Fireglass 之时。Fey 曾任
              Symantec（现 Broadcom）总裁兼 COO，也曾任 McAfee（现 Trellix）总经理兼 CTO，累积了 20 多年企业安全领导经验。Amiga 在 Fireglass
              发明远程浏览器隔离技术，Fireglass 是定义品类的以色列安全创业公司；他还在 Axis Security、Cycode、Build.Security 等多家以色列网络安全公司担任创始投资人或顾问。


              两位创始人看到一个结构性缺口：企业工作转向 SaaS 和 Web 应用后，浏览器成了主要攻击面和数据外泄通道，但企业普遍部署的仍是缺乏企业控制能力的消费级浏览器。他们的判断是，借助行业已标准化的开源
              Chromium 引擎，做出一款终端用户感觉无差别、但 IT 和安全团队可以全面管理的浏览器。2020 年 8 月创立后，公司经历了两年隐身产品开发，直到 2022 年 2 月公开发布。


              创始人之外，Island 领导层还包括来自企业安全、身份和 SaaS 生态的资深高管；公司尚未公开披露扩展 C-suite 名单。董事会包括 Sequoia Capital（Doug Leone，牵头
              Series A 至 D 参投）和 Coatue Management（David Schneider，Series D 和 E
              领投方）代表。截至报告日，公司未公开任命独立董事。关键人风险集中在两位创始人，他们事实上仍掌握技术和商业领导权。Tel Aviv 的 R&D 中心拥有 200 多名工程师，是主要产品开发中心。
