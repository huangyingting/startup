      - number: '4.3'
        title: 资本结构与充足性
        blocks:
          - type: paragraph
            body: >
              截至 2025 年 3 月，Island 通过六次融资事件累计融入 $730M 股权资本。仅 Series E（2025 年 3 月，$250M，估值 $4.85B）和 Series D（2024 年 4
              月，$175M，估值 $3B）就在约 11 个月内贡献 $425M。若 Island 月度烧钱速度在 $10–25M 区间（500 人企业 SaaS 公司以 >100% 增速扩张的典型水平），$730M
              累计融资扣除估算累计支出后，意味着自 2025 年 3 月交割起有 3–5+ 年资金续航。资本充足性看起来很强。


              Island 资本结构包括多个优先股类别的投资人。Coatue Management 是 Series D 和 E 的领投方（最新、层级最高的优先股）。Sequoia Capital 从 Series A 到 E
              一直参投。公司未公开披露二级交易或要约回购，意味着员工或早期投资人获得的流动性有限。Island 未披露期权池规模、完全稀释后总股数或优先清算权结构。
            claimRefs:
