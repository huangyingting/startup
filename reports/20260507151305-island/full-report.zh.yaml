  - id: FE001
    title: 产品架构图
    description: Island 企业浏览器从客户端层到云基础设施的产品栈。
    type: stack
    data:
      layers:
        - id: L1
          label: 终端用户层
          detail: 浏览器客户端运行在受管和非受管设备上，覆盖 Windows、macOS、Linux、ChromeOS、iOS、 iPadOS 和 Android。
          items:
            - label: Island Enterprise Browser（企业浏览器）
              description: Chromium 分支，内嵌策略引擎；运行于 Windows、macOS、Linux、iOS、Android
            - label: Island Mobile Browser
              description: iOS/iPadOS/Android 原生 app，具备同等企业策略能力
        - id: L2
          label: 策略与控制层
          detail: Island 自研执行层——DLP、ZTNA 和设备态势控制原生嵌入浏览器；无需网络代理。
          items:
            - label: 策略引擎
              description: Island 自研 IP；在浏览器内原生执行按应用、按用户、按设备的规则
            - label: 最后一公里 DLP 360
              description: 在浏览器层控制打印、下载、粘贴、截图、上传
            - label: 零信任网络访问
              description: 无代理访问私有应用；替代 VPN 客户端
        - id: L3
          label: 管理与分析层
          detail: SaaS 托管的管理控制台和分析层，支持 IT 集中管理策略、记录审计日志、监控 DEX，并接入 SIEM。
          items:
            - label: 管理控制台（SaaS）
              description: AWS 托管的管理平面，用于策略、设备和用户管理
            - label: Island DEX
              description: 数字员工体验分析；应用性能和设备健康
            - label: SIEM 集成
              description: 向 Splunk、Sentinel 导出审计日志和 UBA 事件
        - id: L4
          label: 云基础设施层
          detail: 基于 AWS 的云基础设施，提供可扩展微服务、安全存储、全球 CDN，并为具备 FedRAMP High 资格的联邦部署提供 GovCloud 隔离。
          items:
            - label: AWS EKS
              description: 支撑管理平面扩展的 Kubernetes 微服务
            - label: AWS S3 / CloudFront
              description: 审计日志存储和全球 CDN 分发
            - label: AWS GovCloud
              description: 面向联邦客户、具备 FedRAMP High 资格的隔离区域
    sourceRefs:
      - SE006
      - SE008
      - SE010
