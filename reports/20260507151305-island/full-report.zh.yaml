      - number: '1.4'
        title: 产品发布、客户牵引与关键里程碑
        blocks:
          - type: paragraph
            body: >
              Island 在隐身状态下做了约 18 个月产品开发，随后于 2022 年 2 月 1 日公开发布 Island Enterprise Browser。发布后一个月内，公司完成 $115M Series B。到
              2023 年 10 月（Series C 交割），Island 已在客户群中售出超过 200 万个授权浏览器席位，包括多家 Fortune 100 前 20 名公司。到 2024 年 4 月（Series
              D），公司增长至约 200 家企业客户和 280 名员工。到 2025 年 3 月（Series E），公司扩展至 450+ 客户和约 500 名员工；自发布以来 ARR 每年翻倍以上，按估算在 2024
              日历年达到 $87M。


              产品被 Fast Company 评为“Next Big Things in Tech 2025”之一，入选 2024 和 2025 年 Forbes Cloud 100，获得 2025 年
              TechForward Award 的 Zero Trust Architecture 奖，并在 2023、2024、2025 年列入 Fortune Cyber60。截至 2026 年，Gartner Peer
              Insights 对 Island 的评分为 4.9/5（238 条评论），在安全企业浏览器市场类别中用户满意度第一。G2 对 Island 的评分为 4.7/5（21 条已验证企业评论）。


              有代表性的企业客户证据包括：Pfizer（全球生物制药公司，87,000+ 员工），其内部风险负责人称 Island 是公司最重要的一项安全工具；Mattress Firm；Swiss
              Life；Fiverr；TaskUs；Hendrick Motorsports；Brightline。使用场景覆盖 BYOD 启用、承包商入职、VDI 替代、SaaS 数据泄漏防护、零信任网络访问和 M&A
              过渡安全。一位 CEO 引述的客户通过替换 VDI 机架基础设施，每年节省 $300M。


              关键负面事件：Palo Alto Networks 于 2023 年 12 月以约 $458M 完成对竞争性企业浏览器创业公司 Talon Cyber Security 的收购，并立即向符合条件的 SASE AI
              客户免费提供企业浏览器——通过平台捆绑加剧竞争。
