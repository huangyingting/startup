  - id: FV001
    title: 建议逻辑
    description: 从投资逻辑评估到最终立场的 Island 投资建议决策流程。
    type: flow
    data:
      nodes:
        - id: N1
          label: 品类领导地位已验证？
          description: 450+ 家企业客户；十大银行中的 7 家；Gartner 评分 4.9/5 —— 是
        - id: N2
          label: 估值有溢价（56x ARR）
          description: 相比上市可比公司昂贵；需要 2x 增长持续到 2026 年
        - id: N3
          label: NRR 已验证？
          description: 未披露 —— 投资前必须在 NDA 下验证
        - id: N4
          label: 安全态势已验证？
          description: SOC 2/ISO 27001 已具备；CVE 补丁 SLA 和渗透测试结果需在 NDA 下查看
        - id: N5
          label: 竞争护城河能守住 18–36 个月？
          description: 金融服务锁定效应强；Google/Microsoft 威胁是中期风险
        - id: N6
          label: 建议：有条件看多
          description: 以 15–20% Series E 折价投资；NRR、烧钱速度和安全态势必须在 NDA 下完成硬性尽调
    sourceRefs:
      - SV001
      - SV002
  - id: FV002
    title: 估值敏感性
    description: 在不同 ARR 和收入倍数假设下，Island IPO 时的隐含估值。
    type: bar
    data:
      items:
        - label: 悲观情景：$150M ARR × 20x
          value: 3000
        - label: 基准情景：$275M ARR × 22x
          value: 6050
        - label: 乐观情景：$500M ARR × 25x
          value: 12500
        - label: Series E 投后估值（参考）
          value: 4850
    sourceRefs:
      - SV001
      - SV006
      - SV007
  - id: FV003
    title: 估值 / 回报区间
    description: 从 Series E 投后估值（$4.85B）出发，Island 在悲观 / 基准 / 乐观情景下的回报分布。
    type: range
    data:
      items:
        - label: 悲观情景回报（较 $4.85B 为 0.6–0.85x）
          low: 0.6
          high: 0.85
          mid: 0.72
        - label: 基准情景回报（较 $4.85B 为 1.2–1.8x）
          low: 1.2
          high: 1.8
          mid: 1.5
        - label: 乐观情景回报（较 $4.85B 为 2.1–3.1x）
          low: 2.1
          high: 3.1
          mid: 2.6
        - label: 加权平均预期回报（按概率加权）
          low: 1.1
          high: 1.9
          mid: 1.4
    sourceRefs:
      - SV001
      - SV002
      - SV006
  - id: FV004
    title: 投资 KPI
    description: Island 必须达成这些关键绩效指标，才能支撑 $4.85B 的 Series E 估值。
    type: kpi
    data:
      items:
        - label: IPO ARR 目标（基准情景）
          value: $250–300M
          unit: USD
          status: target
          note: 以 2024 年 $87M 估计值为起点，到 2027 年保持 50% CAGR
        - label: NRR 门槛（最低可接受）
          value: 110%
          unit: '%'
          status: unverified
          note: 未披露；必须在 NDA 下验证；<100% 会打破投资逻辑
        - label: 毛利率（网络安全 SaaS 目标）
          value: 75–80%
          unit: '%'
          status: unverified
          note: SaaS 安全的典型水平；交付模型应能支撑；必须在 NDA 下验证
        - label: IPO 时间线（基准情景）
          value: 12–24 months
          unit: months
          status: estimated
          note: 需要经审计财务报表和可预测的单位经济模型
        - label: FedRAMP High ATO（联邦 ARR 门槛）
          value: 2026–2027
          unit: year
          status: in-progress
          note: 正在推进；联邦市场贡献取决于 ATO 签发
        - label: Series E 入场折价（建议）
          value: 15–20%
          unit: '%'
          status: recommendation
          note: 将入场估值降至 $3.9–4.1B 投后；改善风险 / 回报结构
    sourceRefs:
      - SV001
      - SV002
      - SV003
