  - id: TV002
    title: 正方 / 反方论点表
    description: Island's investment thesis vs. anti-thesis organized by key diligence dimensions.
    columns:
      - 维度
      - 正方论点
      - 反方论点
      - 关键问题
    rows:
      - - 市场
        - 企业浏览器确实是一个全新的 $10B+ TAM 品类；Gartner 预计到 2025 年 Web 安全采用率达 25%
        - 品类可能仍是小众市场；SASE 厂商可能以更低价格吸收用例
        - 市场会长到 $10B+，还是停留在 $2B 的高端小众市场？
      - - 产品
        - 基于 Chromium 的浏览器架构优于插件式产品；21 天发布节奏领先现有厂商
        - Google/Microsoft 能以零增量成本向企业补齐关键功能
        - 面对 Google Chrome Enterprise，差异化能守住 18–36 个月吗？
      - - 客户
        - 450+ 家企业客户，包括全球 10 大银行中的 7 家；Gartner 满意度 4.9/5
        - 未披露 NRR、logo 流失或具名企业客户背书 — 主张未验证
        - 金融服务细分市场的实际 NRR 和单客户 ACV 是多少？
      - - 财务
        - $4.85B 估值反映成熟投资者（Coatue、Sequoia、Stripes）已把高确信增长计入价格
        - 估算 ARR $87M、56x 倍数已定价充分；增长一旦放缓就没有余地
        - NDA 下的实际 ARR、NRR 和烧钱速度是多少？
      - - 竞争
        - 金融服务护城河（10 家银行中 7 家）让竞争对手需要多年才能替换；网络效应正在形成
        - Palo Alto 收购 Talon；SASE 现有厂商打包浏览器安全；Google 加强 Chrome Enterprise
        - 现有厂商何时做到同等功能？Island 还有多少窗口期？
      - - 风险
