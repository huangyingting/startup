      - number: '1.3'
        title: 融资历史、估值与投资人
        blocks:
          - type: paragraph
            body: >
              Island 自 2020 年创立以来完成六次定价融资；截至 2025 年 3 月 Series E，累计外部融资约 $730M。公司在 2022 年 3 月 Series B 以 $1.3B
              投后估值跻身独角兽，距离走出隐身仅一个月。后续轮次大幅重估公司价值：2023 年 10 月 Series C 估值 $1.5B；2024 年 4 月 Series D 估值 $3B；2025 年 3 月
              Series E 估值 $4.85B——不到 12 个月估值提升 3.2 倍。


              Series A（2022 年 1 月，约 $100M）由 Insight Partners 和 Sequoia Capital 领投。Series B（2022 年 3 月，$115M，估值 $1.3B）由
              Insight Partners 领投，Stripes 和 Sequoia 参投。B 轮后续资本来自 Cisco Investments（2022 年 7 月，约 $10M 战略投资）和
              Georgian（2022 年 11 月，约 $60M）。Series C（2023 年 10 月，$100M，估值 $1.5B）由 Prysm Capital 领投，金融行业专项投资人 Canapi
              Ventures 新加入。Series D（2024 年 4 月，$175M，估值 $3B）由 Coatue Management 和 Sequoia 共同领投；交割时累计融资达到 $487M。Series
              E（2025 年 3 月，$250M，估值 $4.85B）再次由 Coatue 领投，Insight Partners、Sequoia 和 Canapi Ventures 参投。


              跨轮次企业战略投资人包括 Capital One Ventures、Citi Ventures、Cisco Investments、EDBI（Singapore）和 ServiceNow
              Ventures。公开记录中没有二级交易、要约回购或结构化流动性事件。CEO Mike Fey 在 2024 年 4 月表示，Island 打算“有朝一日成为强劲的 IPO
              候选公司”，但公司尚未提交公开上市申请，也未设定时间表。
