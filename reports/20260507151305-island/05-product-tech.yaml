    - type: private-evidence-only
      severity: minor
      topic: "Island's exact Chromium version lag and patch SLA not publicly disclosed"
      missingEvidence: "Island has not publicly disclosed how quickly it patches Chromium CVEs relative to Google Chrome's patch releases. For a security-positioned product, the Chromium version lag is a material security question."
