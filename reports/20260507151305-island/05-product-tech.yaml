company:
  name: Island
chapter:
  number: 5
  title: Product and Technology
  summary: |
    Island delivers the Enterprise Browser — a Chromium-based, enterprise-hardened browser
    built natively for security, IT control, and productivity. The product has three converging
    lines: Enterprise Browser (core), Enterprise AI (secure generative AI access), and Enterprise
    Network (SASE). The technology stack runs on AWS (EKS, S3, CloudFront, GovCloud) with a
    Chromium-derived rendering engine modified by 200+ Tel Aviv engineers. Island holds SOC 2
    Type II and ISO/IEC 27001:2022 certifications; FedRAMP High is In Process. The browser
    integrates with IdP, MDM, EDR, and SIEM tools and supports Windows, macOS, Linux, ChromeOS,
    iOS, iPadOS, and Android. A 21-day feature delivery cadence and patent IP in browser data
    deletion underpin its differentiation claim. Known challenges include performance overhead
    from the isolation architecture, legacy-app compatibility gaps, and BYOD management complexity.

sections:
  - id: SE-product
    title: Product Lines and Module Architecture
    body: |
      Island ships three converging product lines. The Enterprise Browser is the core SKU — a
      Chromium-derived browser rebuilt with enterprise policy enforcement natively embedded. Unlike
      consumer Chrome or Edge, every tab, session, and interaction is governed by an IT-administered
      management console. The browser replaces or consolidates legacy tools including VPN clients,
      VDI platforms, web-filtering proxies, DLP point solutions, and remote browser isolation.
      Enterprise AI extends the browser with secure access to generative AI tools (ChatGPT, Copilot,
      Gemini) under enforced data-loss prevention policies — preventing prompt injection, IP leakage,
      and shadow AI adoption. Enterprise Network is a SASE overlay providing zero trust network
      access (ZTNA) to private and internal apps without a separate VPN agent. The management console
      is a centralized SaaS platform for administering policies, users, and device posture across all
      three product lines. Across all SKUs, Island targets IT administrators and CISOs in enterprises
      of 500+ seats with regulated data or BYOD complexity.
    claimRefs: [CE001, CE002, CE003, CE004]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: SE-usecase
    title: Enterprise Use Cases and Workflow Integration
    body: |
      Island's market positioning clusters around six high-value deployment patterns. First, BYOD
      and contractor access: Island allows non-GFE devices to access SaaS and private apps without
      requiring MDM enrollment or full-device management — the browser enforces policy boundaries at
      the application layer. Second, VDI reduction: organizations replace costly Citrix or VMware
      Horizon deployments with Island's browser, which replicates VDI access controls without the
      server-side infrastructure. Third, merger and acquisition onboarding: Island's policy-level
      access provisioning accelerates employee onboarding across different identity domains. Fourth,
      privileged access management: shared accounts and admin consoles are accessible via browser
      session control without exposing credentials. Fifth, regulated industry compliance: healthcare
      organizations use Island to enforce HIPAA controls for PHI access; financial services firms use
      it for PCI/SOX DLP requirements. Sixth, AI governance: Island creates guardrails around
      ChatGPT, Copilot, and other AI tools, preventing data leakage into model training pipelines.
    claimRefs: [CE005, CE006, CE007, CE008, CE009]
    tableRefs: [TE002]
    figureRefs: [FE002]

  - id: SE-tech
    title: Technology Stack and Cloud Architecture
    body: |
      Island's core technical foundation is an enterprise fork of the open-source Chromium browser
      engine. Google's Chromium project powers Chrome, Edge, Arc, Brave, and most enterprise
      browsers — Island layers its proprietary policy engine, management plane, and security controls
      on top of this shared base. The Island back-end runs on AWS, using Elastic Kubernetes Service
      for microservices, RDS for management-plane data, S3 for audit-log and session storage, and
      CloudFront for global content delivery. AWS GovCloud is used for federal customers requiring
      FedRAMP High-equivalent isolation. Key differentiating IP sits in the management plane: a
      centralized policy engine that pushes per-user, per-app, per-device controls to browser
      endpoints without requiring routing through a central proxy. Island holds U.S. Patent
      12,235,922 covering enterprise browser data deletion by URL hostname grouping. The R&D center
      is in Tel Aviv with 200+ engineers, and the engineering culture is modeled on the Israeli
      military-adjacent tech tradition that produced Fireglass (acquired by Symantec for ~$250M
      in 2017 — co-founder Dan Amiga's prior company).
    claimRefs: [CE010, CE011, CE012, CE013, CE014]
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: SE-roadmap
    title: Deployment, Integration, and Roadmap
    body: |
      Island delivers new browser features on an approximately 21-day cadence — a cadence confirmed
      by CEO Mike Fey in ISMG's GovInfoSecurity interview. The browser integrates with identity
      providers (Okta, Azure AD, Ping Identity) via SAML/OIDC, with MDM platforms (Jamf, Intune,
      VMware Workspace ONE) for device posture signals, and with SIEM systems (Splunk, Microsoft
      Sentinel) for activity log export. Deployment is end-user driven (browser download and install),
      with IT-administered policies pushed from the management console; no network appliance or proxy
      is required. For mobile, Island ships iOS, iPadOS, and Android apps that enforce browser
      policies on personal devices. The near-term roadmap, inferred from public statements, focuses
      on: (1) building deeper SASE integrations to displace Netskope, Zscaler, and Palo Alto
      Prisma; (2) expanding the Enterprise AI module to cover more AI platforms; and (3) achieving
      FedRAMP High authorization, which would open the federal civilian and DoD market. The company
      ships customers as "design partners" who co-develop features, reducing requirements-discovery
      lag and accelerating product-market fit iteration.
    claimRefs: [CE015, CE016, CE017, CE018]
    tableRefs: [TE005]
    figureRefs: []

  - id: SE-trust
    title: Trust, Compliance, and Quality Controls
    body: |
      Island has achieved SOC 2 Type II certification (since mid-2022, just four months after
      emerging from stealth — an unusually fast compliance trajectory for a startup). It achieved
      ISO/IEC 27001:2022 certification in May 2025. FedRAMP High authorization is In Process,
      which would enable deployment across US federal civilian agencies and DoD environments. The
      trust.island.io portal serves as the public compliance disclosure portal. Island's browser
      blog documents how the SOC 2 framework maps to Island's product capabilities across all nine
      AICPA common criteria, including CC6 logical access, CC4 monitoring activities, and CC8 change
      management. For healthcare, Island's browser provides HIPAA audit trail capability, PHI
      boundary enforcement, and device posture assessment. For financial services, DLP 360 controls
      govern PCI and SOX compliance. A zero-knowledge password manager is integrated into the
      browser, ensuring credentials are encrypted client-side. Gartner Peer Insights rates Island
      4.9/5 from 238 reviews as of early 2026, with users citing security granularity and deployment
      speed as top strengths. Known weaknesses include performance lag on resource-constrained
      devices and legacy-application compatibility gaps, as documented by third-party analysts.
    claimRefs: [CE019, CE020, CE021, CE022, CE023]
    tableRefs: [TE004]
    figureRefs: [FE004]

