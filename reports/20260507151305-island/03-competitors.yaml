figures:
  - id: FP001
    title: Competitive positioning map
    type: quadrant
    layout: wide
    summary: |
      Island's competitive positioning in the secure enterprise browser market on two axes:
      security depth (browser-native controls depth) vs. enterprise reach (install base and
      sales capacity). Island leads on security depth with moderate enterprise reach; Microsoft
      and Google lead on reach but lag on security depth. Palo Alto is the closest competitor
      on both dimensions.
    data:
      points:
        - label: "Island"
          x: 9
          y: 5
          note: "Deepest browser-native security; 450 enterprise customers; growing fast"
        - label: "Palo Alto (Prisma Browser)"
          x: 8
          y: 8
          note: "Strong security depth via Talon; massive SASE sales channel; bundled free"
        - label: "Microsoft Edge for Business"
          x: 4
          y: 10
          note: "Ubiquitous via M365; moderate security depth; zero cost"
        - label: "Chrome Enterprise"
          x: 3
          y: 10
          note: "Largest install base; good management; limited dedicated security"
        - label: "Seraphic"
          x: 7
          y: 2
          note: "Good DLP via extension; no browser replacement; limited enterprise reach"
        - label: "Surf Security"
          x: 7
          y: 1
          note: "Pure-play zero-trust browser; early stage; minimal enterprise penetration"
        - label: "LayerX"
          x: 5
          y: 1
          note: "Extension-based; fast deployment; limited control depth"
    sourceRefs: [SP001, SP002, SP003]

