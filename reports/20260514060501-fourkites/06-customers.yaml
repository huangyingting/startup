figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    description: "The end-to-end customer lifecycle for a FourKites enterprise shipper from initial contact to multi-module expansion."
    layout: wide
    claimRefs: [CU001, CU002, CU003]
    data:
      nodes:
        - label: "Initial Contact / Evaluation"
          detail: "Enterprise shipper evaluates FourKites for real-time TL tracking. RFP process competes with project44, Descartes MacroPoint, and TMS native tracking. Key evaluation criteria: carrier network breadth, TMS integration, ETA accuracy."
          tone: neutral
        - label: "Pilot / Proof of Concept"
          detail: "90-day pilot typically covers one lane or carrier segment. Integration with TMS/ERP via API or EDI. Carrier onboarding begins. Customer Success assigns dedicated team. First exception alerts generated."
          tone: neutral
        - label: "Production Go-Live (Core Tracking)"
          detail: "Full TL tracking deployment. Annual subscription contract signed. Carrier compliance program activated with FourKites CS support. Dynamic ETA active. Customer trains operations team on exception workflow."
          tone: positive
        - label: "Cross-Modal Expansion"
          detail: "After TL production, shipper adds Ocean, Rail, or Yard modules. IdeaExchange engagement begins. Advisory board invitation for qualifying Fortune 500 accounts. Annual business reviews. Upsell of FourSight Analytics."
          tone: positive
        - label: "Agentic AI Adoption (Loft)"
          detail: "Shipper deploys first pre-built Digital Worker (typically appointment scheduling or carrier follow-up). Sophie custom agent development for proprietary SOPs. AOP library builds institutional knowledge. Response time reductions documented."
          tone: positive
        - label: "Strategic Platform Anchor"
          detail: "FourKites integrated into core TMS and ERP workflows. Vertical advisory board participation. Multi-year renewal. Loft expansion into procurement/finance workflows (FY2026 roadmap). High switching cost achieved."
          tone: positive

