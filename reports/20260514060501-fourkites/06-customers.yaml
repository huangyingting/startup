  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: nrr-grr-and-churn-rates
      missingEvidence: "FourKites does not publicly disclose NRR, GRR, logo churn rate, or NPS. These are the primary quantitative indicators of retention health for a SaaS business and are standard VC/PE diligence disclosures."
      whyItMatters: "Without NRR, it is impossible to assess whether FourKites is growing revenue within its existing customer base or experiencing net contraction. A NRR below 100% would indicate the company must acquire new logos simply to maintain ARR. Industry benchmarks for top-tier SaaS: NRR >120% is excellent; <100% is a red flag."
      diligencePath: "Request NRR, GRR, and logo churn for FY2022, FY2023, FY2024, and H1 FY2025. Require cohort-level breakdown if available. Request NPS score and methodology."
      relatedQuestionRefs: [QU007, QU008, QU009]

    - type: private-evidence-only
      severity: material
      topic: customer-revenue-concentration
      missingEvidence: "FourKites has not disclosed what percentage of ARR comes from its top 5 or top 10 customers. Given 9/10 CPG penetration and Fortune 500 dominance, the Herfindahl-Hirschman Index of customer concentration is likely high."
      whyItMatters: "If the top 5 customers represent >30% of ARR, losing a single anchor account (Walmart, Coca-Cola) would be materially adverse. High customer concentration amplifies churn risk per individual account."
      diligencePath: "Request top-10 customer ARR concentration; multi-year contract status for top 5 accounts; renewal probability assessment; SAP or Oracle replacement risk per anchor account."
      relatedQuestionRefs: [QU015, QU022]

    - type: missing-source
      severity: informational
      topic: mid-market-customer-evidence
      missingEvidence: "No named mid-market ($100M–$1B revenue) customers were found in public sources. The SMB expansion initiative under Rocky Subramanian (2022–2023) produced no publicly visible results."
      whyItMatters: "If FourKites' growth thesis depends on expanding beyond Fortune 500, mid-market traction data is essential. Current evidence suggests near-saturation of the Fortune 500 CPG/F&B ICP."
      diligencePath: "Request customer count breakdown: Fortune 500 / Fortune 500–1000 / $100M–$1B revenue / below $100M. Request ARR split by segment. Request SMB product-market fit assessment."
      relatedQuestionRefs: []

    - type: missing-source
      severity: informational
      topic: loft-production-adoption-scale
      missingEvidence: "Only US Cold Storage and Coca-Cola are publicly named Loft Digital Worker deployments as of May 2026. Total Digital Worker deployment count across the 1,600+ customer base is undisclosed."
      whyItMatters: "FourKites' premium valuation thesis requires Loft to become a material revenue contributor. If Loft has fewer than 20–30 production deployments 3 months after launch, adoption velocity may be below what the $1B valuation requires."
      diligencePath: "Request Loft customer deployment count; average ACV uplift for Loft modules vs tracking-only customers; pipeline for Loft upsells in FY2026."
      relatedTableRefs: [TU002]
      relatedQuestionRefs: [QU021]

    - type: private-evidence-only
      severity: material
      topic: contract-lengths-and-renewal-terms
      missingEvidence: "FourKites does not disclose average contract length, multi-year renewal rates, or pricing escalation clauses. These terms determine the predictability of recurring revenue."
      whyItMatters: "Enterprise SaaS with 1-year contracts has much lower visibility than multi-year agreements. In a competitive market (project44, SAP TMS), shorter contracts create more frequent churn windows."
      diligencePath: "Request weighted average contract length; percentage of ARR under multi-year agreements; pricing structure (flat, usage-based, tiered); most recent price increase and customer reaction."
      relatedQuestionRefs: [QU015]

    - type: missing-source
      severity: informational
      topic: independent-customer-outcome-verification
      missingEvidence: "All quantified outcome data (US Cold Storage 87%, Coca-Cola 90-min→seconds) comes from FourKites press releases without independent verification. No third-party audited case studies were found."
      whyItMatters: "Self-reported customer outcome metrics are common in SaaS marketing and may not reflect average case results or controlled study conditions. Pilot conditions vs production scale may differ significantly."
      diligencePath: "Request direct customer interviews with US Cold Storage, Coca-Cola, and 3 additional reference accounts with permission to discuss quantified outcomes. Seek independent case study from analyst firm."
      relatedTableRefs: [TU003]
      relatedQuestionRefs: [QU025]

callouts:
  - title: "NRR and Churn Disclosure Are the #1 Customer Diligence Gap"
    calloutType: risk
    body: >
      FourKites' most significant investor-facing gap is the complete absence of publicly disclosed NRR,
      GRR, logo churn, or NPS metrics. The customer base of 1,600+ brands and strong advisory board
      engagement are positive signals, but they cannot substitute for quantitative retention data.
      The 2022–2023 workforce reductions and CEO's 'near-zero burn' statement in 2023 suggest a period
      of growth deceleration; without NRR data from 2021–2025, it is impossible to assess whether
      customer revenue expanded or contracted through that period. Requesting NRR should be the first
      data ask in formal due diligence.
    claimRefs: [CU014, CU027, CU031]

  - title: "1,600 Brands With Deep Fortune 500 Penetration Is a Double-Edged Signal"
    calloutType: insight
    body: >
      9/10 top CPG and 18/20 top F&B is a remarkable market penetration achievement, but it also
      means FourKites is approaching saturation in its initial core ICP. Future growth must come from
      three vectors: (1) cross-sell/upsell within existing 1,600 accounts via Loft AI and Booking
      Connect, (2) geographic expansion in APAC and LatAm beyond Mitsui/MKI channel, or (3) downmarket
      entry into the mid-market and SMB segment. Loft is the primary upsell vehicle and its adoption
      rate among existing customers is the most important near-term growth indicator.
    claimRefs: [CU002, CU017, CU019]

  - title: "CEO Legal Dispute With Project44 Is a Governance Risk Data Point"
    calloutType: risk
    body: >
      The 2022 legal resolution between FourKites and project44 — stemming from emails allegedly authored
      by FourKites CEO Mathew Elenjickal under pseudonyms accusing project44 of financial misconduct and
      organized crime links — is a governance data point that warrants attention. While the dispute was
      resolved, the Illinois Supreme Court found such emails 'can harm a company's reputation among its
      employees.' The CEO's behavior in the competitive dispute should be considered in leadership and
      governance assessment as part of due diligence.
    claimRefs: [CU022]

