    - id: QU010
      type: mechanism
      question: "How does FourKites' land-and-expand model work for existing accounts?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "FourKites lands with core TL tracking, then expands: (1) cross-modal (Ocean, Rail, Yard modules), (2) analytics (FourSight), (3) AI/agentic (Loft Digital Workers), (4) new workflows (Booking Connect Ocean). Each expansion deepens workflow integration, increasing switching cost and ACV per account."
      sourceRefs: [SU006, SU007, SU001]
      claimRefs: [CU017, CU018]

    - id: QU011
      type: quantification
      question: "What is FourKites' estimated revenue concentration in top accounts?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "Revenue concentration is not publicly disclosed. The 9/10 CPG and 18/20 F&B penetration suggests the top 30–50 Fortune 500 accounts likely account for a disproportionate share of ARR. No specific top-10 customer ARR concentration data is available."
      sourceRefs: [SU007, SU003]
      claimRefs: [CU019]

