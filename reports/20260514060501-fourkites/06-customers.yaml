      targets: ["contentRequirements/4"]
      status: answered
      answer: "Mitsui/MKI is the exclusive reseller in Japan (announced 2022). FedEx was a strategic investor (2022 Series D-1) with implied distribution potential. SAP/Oracle/JDA integration partnerships create indirect channel through SI ecosystem. No other exclusive regional resellers documented."
      sourceRefs: [SU020, SU008]
      claimRefs: [CU020]

