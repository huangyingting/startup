      - number: '2.5'
        title: 市场规模与采用尽调缺口
        blocks:
          - type: paragraph
            body: >
              RTTV 和 SCV 的市场规模估算存在显著定义差异。同一年份的公开估计从约 $1.5B 到 $20B+ 不等，取决于分析师是否纳入 TMS 能力、场院管理、订单管理或 AI 编排。这种跨度使分析报告之间的
              TAM 比较变得不可靠，除非先调和边界定义。自下而上的 TAM 方法比自上而下估计更扎实，但需要 FourKites 未公开的机密 ARR 数据。 对 FourKites
              投资人来说，有三个具体尽调问题具备实质性：第一，大型企业中的 SAM 渗透率是多少？北美还能达到何种增长率，而国际市场货运量增长 240% 又暗示多大空白？第二，中端市场买方（收入 $100M–$500M
              的公司）是否是现实扩张机会，还是产品对没有专职供应链技术团队的买方过于昂贵且复杂？ 第三，Loft AI 平台代表 SAM 扩张（新增支出类别），还是会蚕食核心可视化订阅？这些未知数都会实质影响 2022
              年独角兽估值及以上的定价。
            claimRefs:
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
      - number: '2.6'
        title: 展示项
        blocks:
          - type: callout
            title: TAM 大，增长向量多
            body: >
              SCV/RTTV 市场处在监管合规（OTIF、FSMA、CSRD）、供应链韧性投资、AI 转型和物流持续数字化的交汇点。多重长期顺风同向：2025–2026
              年关税波动加速近岸化，新增需要可视化的新运输线路。MarketsandMarkets 对 SCM 市场 8.7% CAGR 的预测给增长提供了保守下限；如果 FourKites 的 Loft 平台能捕捉 AI
              支出中的实质份额，AI in Supply Chain 市场（$13.93B → $50.41B，20.2% CAGR）定义了上行空间。
            calloutType: strength
            claimRefs:
