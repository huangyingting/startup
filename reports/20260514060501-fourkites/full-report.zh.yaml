          - type: callout
            title: TMS 存量地位与市场饱和可能限制北美增长
            body: >
              FourKites 已服务约 50% 的 Fortune 500。在这一渗透率下，北美新增大型企业 logo 获取越来越难，TMS 存量厂商（SAP、Oracle、Blue
              Yonder、e2open）也在主动增加原生可视化模块。北美核心 RTTV 的增量 SAM 可能正在收缩。收入增长必须越来越依赖增售（Loft AI 层级）、国际扩张（EU、APAC）和中端市场渗透；这些路径在
              FourKites 身上验证更少，且成本结构不同。
