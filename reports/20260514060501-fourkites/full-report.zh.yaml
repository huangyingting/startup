        - 约束
        - 早期显现
        - FourKites 称已覆盖 50% Fortune 500；北美企业未来增长可能主要来自替换和增购，而不是新 logo
        - 将国际管线（EU、APAC）评估为增长逃生阀；检查 Mitsui / 日本合同表现
