      - number: '3.3'
        title: 定价与包装格局
        blocks:
          - type: paragraph
            body: >
              所有专门的 RTTV 和 SCV 平台供应商——包括 FourKites 和 project44——都采用年度企业 SaaS 订阅模式，价格逐合同谈判，并取决于货运量、承运商网络使用、运输模式复杂度和模块选择。
              FourKites 与 project44 均不公布标价；评测平台数据和分析师估计一致显示，FourKites 的企业年度合同价值大约从 $100,000 到超过 $1 million
              ARR，最大型全球货主更接近上限；AI 附加模块（Loft Digital Workers、Inventory Twin、Dynamic Ocean、Booking Connect
              Ocean）在基础平台费之外增量定价。 project44 的定价结构大体可比。Descartes Systems Group
              采用混合模式，将订阅费与按承运商、按交易量收费结合；对承运商足迹高度可变的客户，这种模式可能更有经济吸引力。 Oracle TMS 和 SAP TM 通常作为既有 ERP
              合同中的增量附加模块授权；对已经运行这些系统的企业来说，这相对独立 RTTV 平台形成结构性价格优势。 在更广泛的 ERP 现代化项目中评估总拥有成本时，采购团队看到的有效增量成本似乎较低。Blue Yonder
              可视化同样打包在其 TMS 和 WMS 平台许可中，目标客户是已经运行 Blue Yonder 的大型零售和 CPG 制造商。 FourKites 面临的长期挑战不是绝对价格水平，而是与 ERP
              存量厂商在边际上为可视化定价时的相对成本感知问题。
