        - SAP/Oracle 可以零边际成本捆绑基础可视化；Descartes 已盈利，能长期承受价格竞争；project44 绝对融资额更高（$420M+）
        - 确认前 5 大客户多年合约状态；评估 SAP AppHub 认证续期；评估与 project44 竞争 RFP 的输赢比
