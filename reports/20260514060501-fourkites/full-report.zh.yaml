          tone: neutral
        - id: D6
          label: FedEx（战略投资者）
          detail: $30M D-1 轮投资者；同时也是承运商，与独立网络成员竞争。
          tone: risk
        - id: D7
          label: SAP / Oracle TMS 生态
          detail: 集成伙伴和潜在竞争威胁；FourKites 已通过 AppHub 和 Oracle Marketplace 认证。
          tone: risk
        - id: D8
          label: 1,600+ 品牌客户
          detail: 企业托运人贡献订阅 ARR；集中在 CPG / F&B / Fortune 500。
          tone: positive
        - id: D9
          label: Fortune 500 顾问委员会
          detail: 来自 CPG、F&B、制造业的 25 位高管提供产品路线图指导。
          tone: positive
        - id: D10
          label: project44（竞争对手）
          detail: 主要对手；累计融资 $420M+；有法律纠纷历史；争夺同一批 Fortune 500 客户。
          tone: risk
      edges:
        - from: D1
          to: D2
          label: 托管于
        - from: D3
          to: D1
          label: 向其提供数据
        - from: D4
          to: D1
          label: 出资 / 治理
        - from: D5
          to: D1
          label: 在 APAC 分销
        - from: D6
          to: D1
          label: 投资于（潜在冲突）
        - from: D7
          to: D1
          label: 集成 / 威胁
        - from: D1
          to: D8
          label: 服务
        - from: D8
          to: D9
          label: 参与
        - from: D9
          to: D1
          label: 指导路线图
        - from: D10
          to: D8
          label: 争夺
  - id: FV001
    title: 投资建议逻辑
    type: flow
    description: 决策树，展示从证据评估到 FourKites 投资建议的逻辑路径。
    layout: wide
    claimRefs:
      - CV001
      - CV002
      - CV004
    data:
      nodes:
        - label: FourKites 投资决策
          detail: 评估：市场地位、财务健康、Loft AI 采用、治理和竞争护城河。
          tone: neutral
        - label: 关卡 1：市场地位
          detail: 9/10 CPG + 18/20 F&B + 4 年 Gartner 领导者 + 1.1M 承运商护城河 = 通过。Fortune 500 ICP 近饱和是警示。
          tone: positive
        - label: 关卡 2：财务健康
          detail: NRR 和烧钱速度未披露。估计 ARR $110-140M（基准）。两轮裁员 + 47 个月融资空窗 = 有条件。
          tone: neutral
        - label: 关卡 2 失败：财务红旗
          detail: 若尽调发现 NRR <100% 或烧钱 >$10M/月且现金跑道 <12 个月 → 退出尽调。估值无法支撑。
          tone: risk
        - label: 关卡 3：Loft AI 采用
          detail: 发布 3 个月后有 2 个具名 Fortune 500 部署。若尽调发现 <15 个客户 → 降至基准情景时间线。若 >30 个客户 → 上调至乐观情景。
          tone: neutral
        - label: 关卡 4：CEO 治理
          detail: 2022 年诽谤邮件事件已解决。若董事会记录了 2022 年后的治理框架 → 通过。若无整改 → 标记 IPO / M&A 风险。
          tone: neutral
        - label: 有条件推进，$700-850M 进入
          detail: 若关卡 2-4 通过：以 $700-850M（估计 ARR 的 6-7x）进入，并设置 Loft ACV 棘轮机制。$750M 进入时，概率加权回报约 1.3-1.5x。
          tone: positive
        - label: 未获确认则放弃 $1B 进入
          detail: 若财务关卡未解决：不要按 $1B 参考价推进。概率加权回报约 0.95x——对私募股权而言，风险调整后回报不足。
          tone: risk
      edges:
        - from: FourKites Investment Decision
          to: 'Gate 1: Market Position'
          label: 评估
        - from: 'Gate 1: Market Position'
          to: 'Gate 2: Financial Health'
          label: 通过 → 下一关
        - from: 'Gate 2: Financial Health'
          to: 'Gate 2 FAIL: Financial Red Flags'
          label: 若 NRR <100% 或烧钱不可持续
        - from: 'Gate 2: Financial Health'
          to: 'Gate 3: Loft AI Adoption'
          label: 若 NRR ≥100% 且现金跑道 ≥18 个月
        - from: 'Gate 3: Loft AI Adoption'
          to: 'Gate 4: CEO Governance'
          label: 已评估 → 下一关
        - from: 'Gate 4: CEO Governance'
          to: CONDITIONAL PROCEED at $700-850M
          label: 若治理有记录
        - from: 'Gate 4: CEO Governance'
          to: PASS at $1B without confirmation
          label: 若 $1B 时仍未解决
  - id: FV002
    title: 估值敏感性
    type: bar
    description: 在不同 ARR 水平和 EV/ARR 倍数组合下估算 FourKites 企业价值。
    layout: wide
    claimRefs:
      - CV007
      - CV008
      - CV009
    data:
      items:
        - label: 悲观：$85M ARR × 4x
          value: 340
          detail: 悲观 ARR 情景，配受压 SaaS 倍数。意味着较 $1B 参考估值显著降轮。
          tone: risk
        - label: 悲观：$85M ARR × 5x
          value: 425
          detail: 悲观 ARR，倍数小幅恢复。相对 $1B 参考仍有约 57% 减值。
          tone: risk
        - label: 基准：$120M ARR × 7x
          value: 840
          detail: 基准 ARR，按当前供应链 SaaS 可比公司估值。意味着较 $1B 参考估值小幅下调。
          tone: neutral
        - label: 基准：$130M ARR × 8x
          value: 1040
          detail: 高端基准情景。若能达到 Descartes 级别倍数（8x），可支撑 $1B 进入。
          tone: positive
        - label: 基准：$140M ARR × 8x
          value: 1120
          detail: 基准情景上沿。可支撑 $1B 进入并有温和上行。需要确认 ARR 增长。
          tone: positive
        - label: 乐观：$170M ARR × 10x
          value: 1700
          detail: 乐观情景：Loft 采用强劲 + 确认 NRR 115%+。$1B 进入可获得 1.7x 回报。
          tone: positive
        - label: 乐观：$200M ARR × 12x
          value: 2400
          detail: 高乐观：Loft 带来 $20M+ 增量 ARR，IPO 级倍数。相对 $1B 产生 2.4x 回报。
          tone: positive
  - id: FV003
    title: 估值 / 回报区间
    type: range
    description: FourKites 以 $1B 进入时，在 2027-2028 年悲观、基准和乐观退出情景下的回报区间。
    layout: standard
    claimRefs:
      - CV007
      - CV008
      - CV009
    data:
      items:
        - label: 悲观退出（$1B 进入）
          low: 340
          mid: 450
          high: 570
          displayValue: 0.34x–0.57x MOIC
          detail: 悲观 ARR $85-95M；2027-2028 年退出倍数 4-6x。相对 $1B 进入显著减值。
          tone: risk
        - label: 基准退出（$1B 进入）
          low: 840
          mid: 980
          high: 1260
          displayValue: 0.84x–1.26x MOIC
          detail: 基准 ARR $120-140M；退出倍数 7-9x。相对 $1B 进入接近盈亏平衡到温和回报。
          tone: neutral
        - label: 乐观退出（$1B 进入）
          low: 1700
          mid: 2200
          high: 2800
          displayValue: 1.7x–2.8x MOIC
          detail: 乐观 ARR $170M+；Loft AI 增加 $20M+ ARR；2027-2028 年 IPO 或战略出售，退出倍数 10-14x。
          tone: positive
        - label: 悲观退出（$750M 进入）
          low: 450
          mid: 600
          high: 760
          displayValue: 0.60x–1.01x MOIC
          detail: 同一悲观情景，但以 $750M 进入。风险画像明显优于 $1B 进入。
          tone: neutral
        - label: 基准退出（$750M 进入）
          low: 1120
          mid: 1300
          high: 1680
          displayValue: 1.49x–2.24x MOIC
          detail: 以 $750M 进入的基准情景。风险 / 回报更好；建议进入纪律区间。
          tone: positive
  - id: FV004
    title: 投资 KPI
    type: kpi
    description: 若在尽调中披露，可确认 FourKites 投资逻辑的关键绩效指标。
    layout: wide
    claimRefs:
      - CV019
      - CV020
      - CV021
    data:
      items:
        - label: ARR（2025 年估计）
          value: $110-140M (est.)
          detail: 由 CBInsights 2021 年基线（$65M）+ 12-18% CAGR 估算。必须在尽调中确认。低于 $90M = 悲观信号；高于 $150M = 乐观信号。
          tone: neutral
        - label: NRR（未披露）
          value: 'Target: ≥105%'
          detail: 净留存率（NRR）是最重要的单一财务指标。未公开披露。低于 100% 会打破投资逻辑；105-115% 支撑基准情景；115%+ 支撑乐观情景。
          tone: risk
        - label: Loft 生产部署
          value: 2 named (as of May 2026)
          detail: 发布 3 个月后仅确认 2 个 Fortune 500 部署。投资确认目标：2026 年中达到 ≥20 个，2026 年底达到 ≥50 个。
          tone: risk
        - label: Gartner MQ 位置
          value: Leader (4 consecutive years)
          detail: 四年 Gartner 领导者地位确认了企业采购认可。预计 2025 MQ 不变（结果待定）。持续领导地位是 Fortune 500 销售周期的先决条件。
          tone: positive
        - label: 承运商网络规模
          value: 1.1M+ carriers
          detail: 按公司披露数量，是全球最大承运商合规网络。竞争护城河指标。目标：维持 >1M，并到 2027 年增至 1.5M+，扩大防御性。
          tone: positive
        - label: 客户顾问委员会高管
          value: 25 Fortune 500 executives
          detail: 三个活跃顾问委员会（CPG、F&B、制造业）。客户满意度和战略关系深度的代理指标。目标：25 位成员每年全部续任顾问委员会。
          tone: positive
        - label: G2 客户评分
          value: 4.5/5 (269 reviews)
          detail: 满意度信号强，但评论节奏放缓。目标：到 2026 年底 >300 条评论；维持 ≥4.3/5 评分。低于 4.0 将指向质量下滑。
          tone: positive
        - label: 上一轮融资间隔
          value: 47 months (June 2022)
          detail: 这是 $1B 估值供应链 SaaS 中最长静默期。确认目标：截至 2026 年 Q3，现金跑道 ≥24 个月。若现金跑道 <12 个月且无融资计划，即为终止触发因素。
          tone: risk
