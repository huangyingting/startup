      - number: '6.2'
        title: 采用轨迹与增长证据
        blocks:
          - type: paragraph
            body: >
              FourKites 最具体的采用指标是 1,600+ 品牌客户和每天处理 3.2M 个供应链事件。2014 年拿下首个客户 Smithfield，到 2022 年以 $1B 估值完成 $200M Series
              E，FourKites 按承运商数量（1.1M+）建成了最大的实时供应链网络。2022 年和 2023 年分别裁员 8% 和 15%，暗示疫情期高增长后出现放缓。自 CBInsights 2021 年估算 ARR
              为 $65M 之后，公司未再公布明确 ARR 增速。截至 2026 年 2 月，G2 有 269 条客户评价，显示企业用户群仍活跃。公司先后在制造业（2025 年 1 月）、F&B（2025 年 11 月）和
              CPG（2025 年 12 月）成立垂直客户顾问委员会，代表与 Fortune 500 客户保持高质量互动。IdeaExchange 平台显示活跃应用用户参与率达 90%，且每 4 条建议中就有 1
              条进入产品路线图，说明用户深度押注平台未来。Loft Digital Worker 的采用率（US Cold Storage 是 2025 年 10
              月公开具名的试点）显示智能体采用仍处早期，但已有第一批先行者。2026 年 5 月发布的 Booking Connect for Ocean 把 Coca-Cola 等 Fortune 500 CPG
              名称纳入智能体 AI 部署参考池。平台从单纯追踪扩展到完整智能体 AI，说明现有客户内的追加销售是主要增长路径。
            claimRefs: []
          - type: table
            tableRef: TU002
            claimRefs: []
          - type: figure
            figureRef: FU002
            claimRefs:
              - CU002
              - CU004
              - CU005
      - number: '6.3'
        title: 具名客户证明与参考质量
        blocks:
          - type: paragraph
            body: >
              FourKites 的具名客户证明集中在 CPG 和 F&B Fortune 500 品牌。质量最高的证明点，是带有可量化结果的数据。US Cold Storage 的 Loft 试点（2025 年 10
              月）交付了这些结果：预约预订成功率 87%，按请求配送日期锁定的准确率 96%，8 周处理 600+ 票货运，同时处理 150 个预约而不是人工串行处理，试点期间节省 36–40 小时。Coca-Cola 部署
              Tracy Digital Worker 做客户服务，把响应时间从 90 分钟缩短到数秒。大型 CPG 公司部署
              Polly，用于自动收集交付证明。这些是目前找到的唯一带结果量化的案例研究；多数具名参考（Walmart、Cardinal Health、Dow、Chevron、Best Buy）只被列为客户，没有公开 ROI
              指标。垂直顾问委员会（CPG、F&B、制造业，共 25 位 Fortune 500 供应链高管）提供了隐性背书信号：这些高管愿意让公司品牌公开关联 FourKites 的产品方向。Golden Kite
              Awards（年度客户卓越表彰计划）也通过获奖故事产生额外客户证明。旗舰客户参考质量高，但公开案例研究覆盖面有限；多数证明仍停留在客户对话而非公开文件中。FourKites 首个客户 Smithfield
              Foods 展示了 10+ 年留存，这是目前可见的最强长期账户耐久性证据。
            claimRefs: []
          - type: table
            tableRef: TU003
            claimRefs:
              - CU007
              - CU015
              - CU022
          - type: figure
            figureRef: FU003
            claimRefs:
              - CU007
              - CU008
              - CU009
              - CU010
      - number: '6.4'
        title: 留存、满意度与耐久性
        blocks:
          - type: paragraph
            body: >
              FourKites 未公开披露净收入留存率（NRR）、总收入留存率（GRR）、客户流失率或净推荐值（NPS）。这是本章最大的证据缺口。可用代理信号包括：G2 评分 4.5/5（269 条评价），Gartner
              Peer Insights 评价整体正面但承运商合规是主要抱怨，以及创始客户 Smithfield 的 10+ 年合作。三个垂直顾问委员会（25 位 Fortune 500
              高管）说明客户顶部群体参与度强。负面信号包括：(1) 两轮裁员（2022 年约 8%、2023 年约 15%）暗示商业模式承压；(2) CEO 在 2023 年提出“接近零烧钱”目标，显示现金管理压力；(3)
              两位 Gartner Peer Insights 评价者指出，除核心追踪外，产品“相当基础”。IdeaExchange 参与度（活跃用户 90%）是强留存指标——客户把 FourKites 嵌入 TMS
              工作流、建设承运商合规计划、积累历史分析后，转换成本会上升。平均合同期限未披露，但企业 SaaS 惯例和集成深度暗示多年期协议是标准做法。公开来源未发现具体具名客户流失，不过与 project44
              的法律纠纷（2022 年解决）涉及 FourKites CEO 向董事会成员散布关于 project44 的无根据指控，说明当时客户留存面临竞争压力。
            claimRefs: []
          - type: table
            tableRef: TU004
            claimRefs: []
          - type: figure
            figureRef: FU004
            claimRefs:
