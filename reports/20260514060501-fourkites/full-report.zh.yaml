        - 中——FourKites 招聘页面确认 500+；裁员前峰值约 700+
        - 员工数是烧钱的代理指标；500 名员工、平均成本 $150K，对应约 $75M/年薪酬
        - 索取按职能拆分的员工数；工程、销售、G&A 占比
      - - 现金跑道（月）
        - 未披露；若已降低烧钱，2022 年融资后可能有 24–48 个月
        - 极低——基于已融资本、裁员信号和 CEO 表态估计
        - 关键风险：若 FourKites 在 2025–2026 年需要新股融资，市场环境偏艰难
        - 索取现金余额；季度烧钱；计划触发下一轮融资的条件
