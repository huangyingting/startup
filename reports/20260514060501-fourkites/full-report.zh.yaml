      - number: '4.5'
        title: 财务缺口与尽调结论
        blocks:
          - type: paragraph
            body: >-
              FourKites 存在多个重大的财务披露缺口，阻碍标准承销。最关键的 5 项是：（1）ARR 和收入未披露——公司不公布 ARR、经常性收入或总收入；唯一第三方估计是 CBInsights 给出的 2021
              年收入 $65M，之后没有公开更新；（2）毛利率未披露——缺少毛利率数据，无法评估单位经济、订阅与服务毛利组合，或 AI 推理成本对 SaaS 利润率的影响；（3）烧钱速度和现金跑道未披露——两轮裁员和 CEO
              的“接近零烧钱”表态说明 Series E 后公司曾大幅烧钱，但规模和改善路径未知；（4）NRR 未披露——净留存率是集成锁定效应和竞争替代风险的主要信号；没有它，尽调无法验证切换成本护城河；（5）客户 ARR
              集中度未披露——前 10 大客户可能贡献过高 ARR 份额，形成客户集中风险。 从公开证据能拼出的财务图景是：公司处于收入增长阶段（2024 年可能为 $80M–$150M ARR），2022
              年融资带来可观现金储备，并正从高增长模式转向资本效率。 两轮裁员是这一转型的领先指标，但结果尚未公开。FourKites 必须证明通往类似 Descartes 利润率（77% 毛利、29%
              营业利润率）或战略退出的可信路径；否则一旦市场环境恶化，可能面临 down round 或被战略收购。
