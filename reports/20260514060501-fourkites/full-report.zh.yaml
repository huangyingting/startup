        - 增长驱动
        - 当前（2025–2026）
        - 企业正跨运输模式和地区重排货运线路；新增承运商连接和可视化线路的需求更急
        - FourKites 产品响应检查：Loft 是否已加入关税 / 贸易情景模块，用于改线决策？
      - - EU CSRD Scope 3 排放跟踪要求
        - 增长驱动
        - 分阶段：2024–2027
        - 大型 EU 公司必须报告 Scope 3 物流排放；FourKites 的碳追踪功能是合规工具
        - 确认 FourKites 的 Scope 3 方法符合 CSRD 标准；评估欧洲客户采用碳追踪的赢单率
      - - 超越跟踪的 AI / 智能体自动化 ROI
        - 增长驱动
        - 早期显现：2025–2028
        - Loft 这类 AI 智能体创造新的 ROI 品类：自动处理货运发票、预约和异常，把人力成本降下来
        - 评估 Loft 赢单率和相对传统 RTTV 档位的 ACV 溢价；验证客户案例
      - - 电商 OTFD 预期
        - 增长驱动
