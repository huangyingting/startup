  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >-
              FourKites 采用订阅 SaaS 模式，企业年度合同通常为 1–3
              年。收入分为几类：（1）核心可视化订阅费，按追踪线路数、货运量或用户席位定价，覆盖公路货运的实时运输可视化；（2）海运可视化，FourKites 2021 年收购 Haven Inc.
              后需要通过附加模块提供；（3）Dynamic Yard（YMS 模块），2020 年推出的独立授权场院管理产品；（4）Loft AI Agent Platform，2026 年 2 月商业化发布，面向供应链定制
              AI 智能体开发，定价独立于核心 RTTV；（5）专业服务和实施费，用于接入与集成。 承运商可免费接入，使 FourKites 成为双边市场：一侧（承运商）获得补贴以建立网络密度，让平台对付费侧（货主）更有价值。
              这种承运商补贴会提高相对于收入的毛利率，因为承运商侧成本由货主订阅承担。FourKites 不公开披露定价；基于行业知识和分析师估计，大型部署中每个货主账户的企业 ARR 约为每年 $200,000 至超过
              $1,000,000，并可通过模块扩展。 CBInsights 估计 FourKites 2021 年收入约 $65 million。基于 2022 年 6 月 Series E 的 $1 billion
              估值和当时 10–15x ARR 的 SaaS 倍数，Series E 时 ARR 很可能为 $67M–$100M。 收入组合以订阅为主，专业服务在接入周期中占比小但并非无关紧要。
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
