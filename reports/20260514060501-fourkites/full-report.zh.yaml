  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与 Intelligent Control Tower
        blocks:
          - type: paragraph
            body: >
              FourKites 的旗舰产品是 Intelligent Control Tower® (ICT)。公司把它定位为首个配备 AI 驱动 Digital Workers、能够自主执行的控制塔。平台分为三层：(1)
              实时网络——持续摄取来自 200+ 国家、1.1M+ 承运商的位置和事件数据，每天处理 3M+ 票货运；(2) 数字孪生——对订单、货运、库存、资产和设施建立实时更新的动态模型；(3) Loft——AI
              智能体平台，自动处理异常管理、预约排程、单证处理和承运商跟进等流程。核心模块覆盖五种货运模式：整车（Dynamic ETA、实时追踪）、海运（集装箱追踪、单证管理、基于 AIS 的
              ETA）、铁路和多式联运、Dynamic Yard（闸口 / 码头排程、堆场可视化）以及包裹追踪。FourSight Analytics 在所有模式上叠加预测性和处方性洞察。平台以企业级 SaaS
              订阅销售，按模块授权，使 Fortune 2000 货主能够先小范围部署，再逐步扩大范围。产品套件统一归入 FourKites Intelligent Control Tower 品牌，Loft
              则被定位为智能体自动化层，用来区分 ICT 与 SAP Event Management、Oracle GTM 等传统控制塔工具。
            claimRefs: []
          - type: table
            tableRef: TE001
            claimRefs: []
          - type: figure
            figureRef: FE001
            claimRefs:
              - CE001
              - CE002
              - CE003
      - number: '5.2'
        title: 承运商连接与数据网络
        blocks:
          - type: paragraph
            body: >
              FourKites 的承运商网络是最具防御性的基础设施资产。平台连接 200+ 国家、1.1M+ 承运商，为货主提供一个预先搭好的承运商生态；复制这一生态要花数年时间。承运商连接方式包括 GPS/ELD
              车载远程信息设备（直接硬件集成）、移动应用（FourKites Carrier app）、EDI/X12 状态消息（214/990 交易）、API 集成，以及基于邮件 / 电话的人工查验。海运方面，平台接入
              AIS（Automatic Identification System）数据流和承运商 API（MSC、Maersk、CMA-CGM），追踪集装箱状态、港口事件和预测到达时间，粒度精细到泊位级。Dynamic
              ETA 每 15 分钟摄取 150+ 个预测变量，包括天气、交通、历史滞留时间、承运商行为模式和港口拥堵，持续刷新到达时间预估。FourKites Global Premier Carrier List
              每半年更新一次，认证跟踪合规率最高的承运商，并以此激励承运商参与。承运商合规率，也就是通过电子方式主动跟踪的货运占比，仍是最主要的产品质量杠杆，也是客户投诉的首要来源：部分承运商抗拒电子集成，导致可视化覆盖出现缺口。FourKites
              客户成功团队持续推动承运商上线并提高合规率，但这也意味着产品天然依赖第三方连接意愿。
            claimRefs: []
          - type: table
