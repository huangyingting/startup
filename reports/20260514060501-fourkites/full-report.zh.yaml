chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              FourKites, Inc. 由 Mathew (Matt) Elenjickal 于 2014 年创立。Elenjickal 曾在 Oracle 做供应链顾问，
              发现大型企业长期缺少基本的货运可视化能力，这成为创业起点。公司注册于 Delaware，总部位于 Illinois 州 Chicago 的 500 W. Madison Street。FourKites
              开创了实时运输可视化（RTTV）品类，让货主和物流服务商可以跨公路、铁路、海运、空运和包裹追踪货运，并用机器学习动态预测到达时间。
              公司的商业模式是面向企业货主、第三方物流服务商（3PL）和承运商销售软件即服务（SaaS）订阅平台。到 2026 年，FourKites 已把价值主张重塑为以 Intelligent Control Tower
              为核心的“AI 供应链编排”平台：平台结合庞大承运商网络中的实时数据、持续更新的客户运营数字孪生，以及由 AI 驱动的数字员工（品牌名 Loft），自动处理异常管理、预约排程、单证处理和客户沟通等物流工作流。
              平台早期曾以 CloudQwest, Inc. 为名运营，后更名为 FourKites。FourKites 将业务延展到物流、财务、采购和客户服务，定位已经远超传统货运可视化。
