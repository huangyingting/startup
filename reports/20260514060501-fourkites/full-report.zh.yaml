      - number: '4.2'
        title: 单位经济与 GTM 动作
        blocks:
          - type: paragraph
            body: >-
              FourKites 的市场进入路径是直销企业客户，瞄准 CPG、食品饮料、制药、化工和零售垂直领域的 Fortune 500 货主。 截至 2026 年，公司 1,600+ 品牌客户中包括前 10 大 CPG
              公司中的 9 家、前 20 大食品饮料公司中的 18 家。CAC（获客成本）未公开披露。 企业 SaaS 基准显示，FourKites 这种规模和细分市场的公司回本周期应为 18–30 个月；考虑到 RTTV
              部署需要复杂的 TMS/ERP 集成，CAC 很可能处于高端。 FourKites 与 FedEx 有战略联盟（2022 年 8 月起为投资方），并与 Mitsui / MKI
              签署日本和亚太地区分销协议（2022 年 10 月起），说明直销企业客户之外还有渠道销售成分。 净留存率（NRR）未披露——这是 RTTV 最重要的单位经济指标，也是主要尽调缺口。NRR 高于 120%
              将表明现有客户扩张速度超过任何流失，从而验证集成护城河；NRR 低于 100% 则会显示，即使获得新 logo，整体仍在净收缩。 FourKites
              在承运商接入上的开源式定位（承运商免费，生成数据密度）会在网络扩张时降低每票追踪货运的可变成本。 如果 AI 推理成本（Dynamic ETA、FourSight AI 和 Loft）随货运量放大，AI
              优先收入模式可能压缩毛利率。企业 SaaS 公司的专业服务毛利率通常为 20–40%；成熟规模 SaaS 公司的订阅毛利率通常为 70–80%。
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
