companyProfile:
  summary: >
    FourKites 是一家总部位于芝加哥的供应链可视化和智能体 AI 平台，由 Matt Elenjickal 于 2014 年创立。 公司每天在 200 多个国家追踪 3.2 million
    票货运，覆盖整车、铁路、海运和包裹等运输模式，服务 1,600+ 个全球品牌，其中包括前 10 大 CPG 公司中的 9 家、前 20 大食品饮料公司中的 18 家。2026 年 2 月， FourKites 发布 Loft AI
    Agent Platform，包含 Sophie（AI 开发者智能体）和 5 个数字员工，把公司定位到实时可视化与自主供应链运营的交叉点。 FourKites 已连续 4 年入选 Gartner Real-Time
    Transportation Visibility Platforms Magic Quadrant 领导者。
