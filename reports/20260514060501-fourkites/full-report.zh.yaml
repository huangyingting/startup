      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              FourKites 建模三种情景，每一种都取决于财务不透明缺口能否解决。所有情景都假设 2026–2028 年退出窗口（IPO 或战略出售）。乐观情景（25% 概率）：ARR 从 2021 年 $65M 以
              20%+ CAGR 增长到 2026 年 $170M+，由企业新客户和 Loft AI ACV 扩张驱动。NRR 确认为 115%+。Loft 有 50+ 个 Fortune 500 生产部署，贡献
              $15–25M ARR 上行。盈利路径清晰：毛利率 70%+，到 2024 年接近零烧钱，2025 年自由现金流转正。2027–2028 年退出倍数为 10–14x 远期 ARR，对应 $1.7B–$2.8B
              估值。以 $1B 进入，回报为 1.7–2.8x MOIC，周期 3–4 年。基准情景（50% 概率）：ARR $120–140M（15–17% CAGR），NRR 105–110%，Loft
              采用温和（20–30 个客户）。毛利率 70%，EBITDA 接近零。2027–2028 年以 7–9x ARR 退出，对应 $840M–$1.26B。以 $1B 进入，回报为 0.84–1.26x
              MOIC——基本打平到小幅亏损。悲观情景（25% 概率）：ARR 停滞在 $85–95M（5–10% CAGR），NRR 90–95%，显示收入被侵蚀；Loft 采用缓慢，存在降价轮压力和 CEO
              治理干扰。2027–2028 年以 4–5x ARR 退出，对应 $340–$475M。以 $1B 进入，回报为 0.34–0.48x——显著减值。按概率加权，$1B 进入的预期回报约为
              0.95x，扣除费用前接近打平，符合当前参考估值下高风险、回报不确定的投资。若以 $700–750M 进入，风险 / 回报会明显改善（概率加权约 1.3–1.5x），但这要求相对 2022 年参考估值有实质下调。
