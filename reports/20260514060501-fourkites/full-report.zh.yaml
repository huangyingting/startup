              - CE012
              - CE013
      - number: '5.3'
        title: AI、机器学习与 Loft 智能体平台
        blocks:
          - type: paragraph
            body: >
              FourKites 的 AI 策略已从预测分析（Dynamic ETA 机器学习模型）演进到自主智能体执行（Loft，2026 年 2 月推出）。Loft 平台引入 Sophie，这是一个 AI
              开发者智能体，能够把客户描述的运营流程在数天内转成可上线的自动化，省掉数月工程工作。Sophie 会构建智能体操作流程（AOP），不仅记录流程步骤，也记录决策背后的推理，让组织知识沉淀并复用。预置 Digital
              Workers 覆盖五类企业职能：承运商跟进（联系有风险货运的承运商、升级延误）、预约排程（自动预订码头 / 闸口）、单证处理（处理没有标准格式的
              BOL、发票、海关文件）、异常管理（主动处理扰动）和客户服务（向终端客户自动更新状态）。每个 Digital Worker 都在 FourKites Intelligent Network 上训练，吸收来自
              500K+ 交易伙伴和数百万供应链事件的情报，因此具备通用 AI 平台没有的内置领域知识。FourKites 称，部署 Digital Workers 最多可减少 95%
              的手工任务。平台设计成可跨任何企业系统工作，包括 ERP、ITSM、TMS、WMS 和 CRM，这也是关键架构差异：不同于只建立在内部数据上的 AI 工具，Loft 既编排内部系统，也接入 FourKites
              Intelligent Network 的外部实时情报。FourKites 与 ABI Research 2025 年 10 月的联合调查（490 名受访者）显示，只有 27% 的企业允许 AI 自主执行，52%
              仍把 AI 限制在决策支持层面——这说明 FourKites 的智能体定位还面临采用阻力和市场教育需求。
            claimRefs: []
          - type: table
            tableRef: TE003
            claimRefs: []
