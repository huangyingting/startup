      - number: '1.4'
        title: 规模、网络与客户牵引力
        blocks:
          - type: paragraph
            body: >
              FourKites 运营着公司所称的全球最大实时供应链数据网络。截至 2026 年，平台每天在 200 多个国家和地区追踪超过 3.2 million 票货运，连接 1.1 million 多家承运商，覆盖全球
              98% 的海运流量。客户群从 2014–2015 年的首个客户 Smithfield Foods 增长到 2026 年的 1,600 多个全球品牌，其中包括前 10 大消费品公司中的 9 家、前 20
              大食品饮料公司中的 18 家。 客户包括 Best Buy、Dow、Coca-Cola、AB InBev、Walmart、SpaceX、Chevron、American Eagle
              Outfitters、Bacardi 和 Molson Coors。 公司披露 2022 年同比增长接近 50%，其中新客户增长 70%、总货运量增长 46%、海运客户同比增长
              80%。欧洲市场方面，FourKites 披露货运量增长 2x、新客户增长 40%；亚太市场货运量增长超过 240%、新客户增长 91%。软件评测平台 G2 基于截至 2026 年的 269 条已验证评论，给
              FourKites 打出 4.5/5 星；用户称赞实时追踪和易用性，同时指出承运商合规仍有改进空间。FourKites 在 Chicago、Amsterdam、Munich、Chennai 和 Singapore
              等办公室合计拥有 475 至 500 名员工。
