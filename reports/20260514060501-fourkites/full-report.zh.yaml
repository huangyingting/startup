  - id: FU001
    title: 客户旅程图
    type: journey-map
    description: FourKites 企业货主从初次接触到多模块扩张的端到端客户生命周期。
    layout: wide
    claimRefs:
      - CU001
      - CU002
      - CU003
    data:
      nodes:
        - label: 初次接触 / 评估
          detail: >-
            企业货主评估 FourKites 的实时 TL 跟踪能力。RFP 流程中，竞争对象包括 project44、Descartes MacroPoint 和 TMS 原生跟踪。关键评估标准：承运商网络广度、TMS
            集成、ETA 准确度。
          tone: neutral
        - label: 试点 / 概念验证
          detail: 90 天试点通常覆盖一条线路或一个承运商分段。通过 API 或 EDI 与 TMS/ERP 集成。承运商入驻启动。Customer Success 指派专属团队。首次异常警报生成。
          tone: neutral
        - label: 生产上线（核心跟踪）
          detail: 部署完整 TL 跟踪。签署年度订阅合同。FourKites CS 支持激活承运商合规计划。Dynamic ETA 启用。客户培训运营团队使用异常工作流。
          tone: positive
        - label: 跨模式扩张
          detail: >-
            TL 投产后，货主增加 Ocean、Rail 或 Yard 模块。IdeaExchange 互动开始。符合条件的 Fortune 500 账户会收到顾问委员会邀请。年度业务回顾启动。加售 FourSight
            Analytics。
          tone: positive
        - label: Agentic AI 采用（Loft）
          detail: 货主部署第一个预置 Digital Worker（通常是预约排程或承运商跟进）。Sophie 为专有 SOPs 开发自定义 agent。AOP 库沉淀机构知识。响应时间缩短被记录下来。
          tone: positive
        - label: 战略平台锚点
          detail: FourKites 已接入核心 TMS 和 ERP 工作流。参与垂直顾问委员会。多年续约。Loft 向采购 / 财务工作流扩展（FY2026 路线图）。高切换成本已经形成。
          tone: positive
