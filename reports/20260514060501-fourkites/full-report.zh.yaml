          tone: positive
        - label: Digital Twins 引擎（预测智能）
          detail: 订单、货运、库存、资产和设施的动态模型——由 Intelligent Network 事件持续更新。供应链中断发生时，可即时分析影响。
          tone: positive
        - label: FourSight Analytics 与 Dynamic ETA（洞察层）
