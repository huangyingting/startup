      - number: '1.3'
        title: 融资历史与投资方支持
        blocks:
          - type: paragraph
            body: >
              FourKites 已完成 8 轮有记录的融资，累计股权融资约 $400 million。最重要的是 2022 年 6 月完成的 $200 million Series E 轮，由 Thomas H. Lee
              Partners 领投，据报道估值约 $1 billion，使 FourKites 成为独角兽。 根据 SEC 记录，Series E 于 2022 年 6 月 13 日完成。2022 年 8 月，约 60
              名员工被裁后不久，FourKites 又向 SEC 提交一份 Form D，披露新一轮融资中已募得 $30 million，公司目标规模为 $80 million；TechCrunch
              报道称，这笔资金中一部分来自 FedEx，是 2022 年 6 月公布的战略联盟的一部分。 同样在 2022 年 10 月，Mitsui & Co. 进行 $10 million 战略投资，用于支持
              FourKites 在亚太扩张，并指定 MKI 为日本独家经销商。早期投资方包括 Bain Capital Ventures、August Capital、8VC、Qualcomm Ventures
              及其他机构风险基金。 公司在 2022 年末表示，融资重心正从不惜代价增长转向盈利能力，这反映了风险投资支持的供应链初创公司面对的更广泛宏观压力。 收入和 ARR 未公开披露；FourKites
              仍是私营公司，没有报告财务数据的义务。公开证据无法看清盈利路径，这对投资者是实质性证据缺口。
