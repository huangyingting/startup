      - number: '8.2'
        title: 估值背景与进入纪律
        blocks:
          - type: paragraph
            body: >
              FourKites 上一次披露估值为 $1B（2022 年 6 月）。此后 47 个月，SaaS 估值环境剧烈变化：2021–2022 年峰值期 15–25x 远期 ARR 倍数，到 2023 年中压缩至
              5–8x，并在 2025 年对高质量 SaaS 业务部分恢复到 6–10x。供应链技术子集以 Descartes Systems（NASDAQ: DSGX）为锚，约以 8x 过去十二个月收入交易，毛利率
              77%、经营利润率 29%——代表成熟盈利供应链 SaaS 公司的可达上市结局。E2open（NASDAQ: ETWO）更接近企业供应链平台可比公司，约以 3–4x 过去十二个月收入 交易；由于
              2021–2022 年收购潮带来的集成债和 EBITDA 偏弱，它被大幅折价。FourKites 的私募市场位置介于两者之间：估算毛利率（约 70%+）好于 E2open，但成熟度尚未达到
              Descartes。进入纪律的核心问题是，潜在投资人或收购方在接近 $1B 参考价时是否拿到公平交易。若估值 $1B、基准 ARR 估计为 $120M，隐含倍数约为 8.3x 过去十二个月
              ARR——对于一家私有、未盈利 SaaS 公司，这是可辩护区间的高端。若进入估值为 $700–800M，倍数为 5.8–6.7x；只要 NRR 确认高于 100% 且 Loft 采用加速，这更有防御性。若悲观情景
              ARR 为 $85M，$500M 进入约为 5.9x——公平，但只有在 Loft 追加销售论点有强证据、足以证明相对无增长情景享有增长溢价时才成立。因此，进入纪律要求：(a) 确认 NRR
              ≥100%，验证收入质量；(b) Loft 生产部署客户数 ≥20，验证 AI 追加销售；(c) 确认现金续航期 ≥18 个月；(d) 取得 2022 年 CEO 事件后的治理整改文件。
