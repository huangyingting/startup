        depending on entry price and diligence findings.
    rows:
      - - NRR 确认低于 90%
        - 净留存率低于 90%，意味着现有客户群收入在收缩；FourKites 必须获取新增 logo 才能维持 ARR
        - 低-中（若疫情期 ACV 下调未恢复，则可能）
        - G2 评论量下降；顾问委员会参与度降低；客户顾问委员会高管流动
      - - 现金跑道低于 12 个月
        - 在 47 个月未披露新融资的情况下，若现金只能支撑不到 12 个月且没有清晰融资路径，就意味着困境融资风险
        - 低（缺少私有数据无法评估）
        - 大幅折价的紧急老股交易；宣布债务融资；出现超过 2023 年规模的重大裁员
      - - 三家或更多 Fortune 500 锚定客户流失
        - >-
          若 3 家以上具名 CPG/F&B Fortune 500 客户（Coca-Cola、Walmart、Cardinal Health 量级）流向 project44 或 SAP TMS
          捆绑方案，就说明最高价值账户层已被竞争对手替换
        - 低-中（未记录客户流失）
        - 竞争对手新闻稿点名 FourKites 客户；project44 新闻稿出现 CPG/F&B 名称
      - - 重大 GDPR 执法行动
        - GDPR 罚款达到 €10M+，或客户数据泄露导致 EU 数据处理暂停，会触发客户合同审查条款，并损害 Fortune 500 企业品牌声誉
        - 低
        - EU 监管调查披露；客户违约通知；供应商安全审计失败
      - - CEO 第二次不当行为事件
        - Elenjickal 若再次出现行为事件（类似 2022 年诽谤邮件案），很可能需要董事会介入，动摇 Fortune 500 客户关系，并让 IPO 或干净 M&A 退出变得不可能
        - 低
        - 关于竞争对手互动的媒体报道；法律文件；员工 Glassdoor 投诉提到领导层行为
      - - Loft AI 在 Fortune 500 造成供应链中断
        - 若 Loft Digital Worker 错误在具名 Fortune 500 客户造成重大且公开记录的供应链中断（FDA 召回、CPG 规模交付 SLA 未达标），会带来责任和客户流失风险
        - 低（已记录试点错误；生产规模风险更高）
        - 社交媒体供应链中断报告；客户法律索赔；AI 导致物流故障的新闻报道
  - id: TV006
    title: 最终尽调要求表
    description: Prioritized list of diligence requests required to confirm or refute the investment thesis at any entry valuation.
    columns:
      - 优先级
      - 尽调请求
      - 为什么关键
      - 不利结果对决策的影响
    claimRefs:
      - CV016
      - CV017
      - CV018
    notes: 优先级反映尽调事项的处理顺序：P1 事项必须先满足；P1 出现不利发现时，无论 P2-P5 结果如何，都应终止尽调。
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence asks derived from evidence gaps across all 8 chapters; order reflects sequential decision gates rather
        than exhaustive coverage.
    rows:
      - - P1 — 财务资料包
        - 经审计 FY2022-2025 P&L；按年份列示 NRR、GRR、logo 流失；月度烧钱速度；现金余额；ARR 队列瀑布图
        - NRR 和烧钱速度是任何估值模型的两个主要输入；没有这些，无法为任何入场价格辩护
        - NRR <100% 或烧钱 >$10M/月且没有清晰盈利路径 → 终止尽调
      - - P1 — Loft AI 商业牵引
        - 生产部署数量；Loft 相比仅追踪版的 ACV；按阶段划分管线；平均试点到生产时间；拒绝率
        - Loft 是主要增长逻辑；若发布 3 个月后采用客户 <15 家且 ARR < $5M，退出时间窗口会被拉长
        - Loft 部署数 <10 或每客户 ACV 提升 <$30K → 估值下调至基准情景；6 个月后复核
      - - P2 — 董事会治理文件
        - 完整董事会构成；独立董事人数和履历；董事会章程；2022 年后的行为治理框架；D&O 保险；Elenjickal 留任和薪酬条款
        - IPO S-1 风险因素和 M&A 买方尽调都需要 CEO 治理披露；清晰治理框架可把风险从拦路虎降为历史脚注
        - 2022 年后缺少任何成文的行为治理回应 → 重大 IPO 和干净 M&A 风险标记
      - - P2 — 前 10 大客户合约
        - 前 10 大客户的多年合约状态；续约概率；扩张承诺；过去 12 个月是否有客户发起的审查或 RFP
        - 前 10 大客户可能贡献 40%+ ARR；头部客户合约不确定性会产生不成比例的影响
        - 任一前 5 大客户剩余合约 <12 个月且无续约承诺 → 集中度风险标记
      - - P3 — 技术和安全审计
        - SOC 2 Type II 报告；云架构审查；所有生产部署中的 Loft AI 错误率；API SLA 和正常运行时间数据；GDPR 数据处理评估
        - 企业采购要求 SOC 2 认证；缺失可能触发客户续约条件；GDPR 不合规会留下监管尾部风险
        - 缺少 SOC 2 → 谈判认证时间表契约；缺少 GDPR DPA → 要求有时间表的 EU 数据架构整改计划
      - - P3 — 竞争输赢分析
        - 近 24 个月竞争 RFP 中对 project44 的赢/输率；SAP AppHub 认证续期状态；近 24 个月是否有客户流失至 project44 或 SAP TMS
        - Fortune 500 层面的竞争替代风险为中等可能性；RFP 输赢数据是衡量竞争健康度最直接的指标
        - 竞争 RFP 中对 project44 胜率 <50% → 竞争护城河弱于投资逻辑假设；提高估值折价
