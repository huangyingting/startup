      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              RTTV 和 SCV 市场最强的结构性增长驱动，是大型零售商带来的 OTIF 合规压力。Walmart 于 2017 年引入 OTIF 罚款，并持续收紧标准；Target、Kroger 和 Amazon
              也有类似计划。 对面临这些要求的货主来说，可视化平台给出最直接的 ROI 路径：FourKites 客户报告称，通过降低滞留成本、改善 OTIF 率、压低承运商费率溢价，可获得 15-to-1 ROI。 后
              COVID 时期的供应链韧性投资，是第二个结构性驱动：2020–2021 年疫情暴露了大多数企业供应链中的灾难性可视化缺口，董事会层面的关注也抬升了各垂直行业的供应链技术投资。 2025
              年美国关税周期（Trump 政府在 2025 年 Q1–Q2
              征收的普遍关税和行业专项税）正在创造当前阶段特有的新驱动：公司积极调整贸易路线、改道运输、近岸生产，并新增承运商关系；这些变化都需要更强的多式联运实时可视化。 ESG 和 Scope 3
              排放追踪正成为日益重要的合规驱动，尤其适用于 2024–2025 年开始分阶段执行 EU Corporate Sustainability Reporting Directive（CSRD）的欧洲客户。
              FourKites 已在平台中增加碳追踪能力以覆盖这一需求。采用上的最大约束是承运商合规率和 TMS 存量地位。承运商无法提供 GPS 或 ELD 更新时，可视化会断裂；FourKites 投入预测 ETA
              算法来补偿，但缺口仍是实质限制。 传统 TMS 厂商（SAP TM、Oracle OTM、Blue Yonder、e2open）正主动增加原生可视化模块，压缩独立 RTTV 平台与打包 TMS
              产品之间的功能差异。 COVID 后供应链投资浪潮退去后，2022–2024 年的预算压缩形成逆风；FourKites 自身 2023 年裁员表明增长率已明显放缓。
