  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与分类
        blocks:
          - type: paragraph
            body: >
              与 FourKites 相关的市场有三层同心定义。最窄一层是实时运输可视化（RTTV）平台，为货主和物流服务商提供在途追踪、机器学习动态 ETA、异常管理，以及覆盖公路、铁路、海运、空运和包裹的承运商网络连接。
              Gartner 在 2019 年首个 Real-Time Transportation Visibility Platforms Magic Quadrant 中正式确立这一品类，2021 年评估 14
              家供应商，并截至 2024 年已连续 4 年将 FourKites 评为该象限领导者。中间一层是供应链可视化（SCV），在 RTTV
              之外还包括端到端采购订单追踪、供应商可视化、库存定位和场院管理（FourKites 以 Dynamic Yard 和 YardWorks 切入这一品类）。
              最宽一层是完整的供应链管理（SCM）软件市场，包括计划、采购和物流执行；MarketsandMarkets 估计该市场 2025 年为 $38.51B，到 2030 年增长至 $58.42B。FourKites
              主要竞争于 RTTV/SCV 细分市场，但正借助 Loft AI 平台扩大可服务范围，后者更广泛地瞄准供应链自动化，并延伸到财务、采购和客户服务工作流。 RTTV
              的现状替代方案包括：直接致电承运商查询货运状态（人工方式）、在 TMS 中抽取承运商 EDI/214 数据、基于 SAP 或 Oracle TMS 自建可视化层，或购买 SAP Transportation
              Management、Oracle OTM、Blue Yonder TMS、e2open 等传统供应链平台厂商打包的可视化模块。 这些替代方案共同构成 FourKites 面临的竞争威胁，也构成扩张机会。
