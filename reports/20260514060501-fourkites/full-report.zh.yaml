  - id: FR001
    title: 风险热力图
    type: matrix
    description: 按发生可能性与业务影响绘制 FourKites 关键风险严重度矩阵。
    layout: wide
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
      rows:
        - label: 高可能性
          values:
            - label: （此处风险较少）
              tone: neutral
              detail: 高可能性、低影响风险多为常规运营问题。
            - label: Loft AI 规模化后错误率；SMB 客户中承运商不合规
              tone: risk
              detail: 高可能性运营风险；若由 Human-in-the-Loop 工作流缓释，影响可控在中等水平。
            - label: 小型卡车承运商合规依赖；SAP / Oracle TMS 套件带来的竞争性价格压力
              tone: risk
              detail: 高可能性、高影响风险，需要主动缓释。承运商合规是第一大客户投诉，直接侵蚀核心产品价值。企业客户减少供应商数量时，SAP / Oracle TMS 绑定销售风险上升。
        - label: 中等可能性
          values:
            - label: 中端市场扩张失败；技术债拖慢速度
              tone: neutral
              detail: 中等可能性、低影响风险。中端市场失败会限制战略空间，但不损害核心 Fortune 500 业务。
            - label: CEO 离任；Mitsui 合作关系承压；CCPA / 州隐私合规缺口；裁员后人才流失
              tone: risk
              detail: 中等可能性、中等影响风险。单项都可控，但若同时发生会很严重。CEO 关键人风险具有结构性，因为没有具名继任者。
            - label: 降估值融资；GDPR 执法行动；project44 挖走 3+ 个锚定 Fortune 500 客户；AWS 服务中断
              tone: risk
              detail: 中等可能性、高影响风险。若以 $400–600M 进行降估值融资，会打击员工士气、人才留存和客户信心。GDPR 执法可能触发企业客户审查条款。
        - label: 低可能性
          values:
            - label: IP 专利蟑螂暴露；AIS 欺骗影响海运 ETA
              tone: positive
              detail: 低可能性、低影响风险。可通过标准企业法务安排管理。
            - label: FedEx 投资者利益冲突显性化；Rocky Subramanian 同级领导缺口
              tone: neutral
              detail: 低可能性、中等影响风险。FedEx 投资一致性错位有可能出现，但大概率会先在董事会动态中显现，早于客户影响。
            - label: 重大客户数据泄露；通过供应链数据触犯 OFAC 制裁；SEC 证券披露异常；Elenjickal 第二起法律事件
              tone: risk
              detail: 低可能性但高严重性风险。这些尾部风险会立即对 IPO 前景和 Fortune 500 客户信任构成重大影响。尽调应逐项明确排除。
  - id: FR002
