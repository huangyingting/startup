  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 直接竞争者画像
        blocks:
          - type: paragraph
            body: >
              2026 年，实时运输可视化（RTTV）和供应链可视化（SCV）竞争格局分为三层。第一层是专门的 RTTV 平台领导者——FourKites 和 project44——二者总部都在 Chicago，都成立于
              2014 年，并在 2024 年版 Gartner Magic Quadrant 中都被列为领导者。 FourKites 累计股权融资约 $440 million，并披露拥有 1,600
              多家企业品牌客户。project44 累计融资约 $840 million，其中包括 2021 年 10 月 $420 million Series
              F，并通过三次收购扩展平台：Convey（最后一英里可视化，2022 年）、ClearMetal（海运 AI，2022 年）和 Tive（实时 IoT 传感器，2023 年）。 第二层是合规和路径规划专业厂商，以
              Descartes Systems Group（NASDAQ/TSX: DSGX）为代表；这是一家盈利的上市公司，2022 年收购 MacroPoint，将 RTTV 能力加入其核心海关清关、EDI 和货运代理
              TMS 组合；Descartes 披露 FY2024 收入约 $600 million。 第三层是全栈 ERP 和 SCM 平台存量厂商——Oracle Transportation Management、SAP
              Transportation Management 和 Blue Yonder（2021 年起由 Panasonic 持有）——它们把运输可视化作为模块打包进既有企业平台合同。 第四个区域层级包括
              Shippeo，这家 Amsterdam 平台已被 Greenbriar Equity Group 收购，在欧洲公路和多式联运承运商连接上位置较强。 4 家专门 RTTV 厂商均进入 Gartner Magic
              Quadrant for RTTVP；FourKites 和 project44 位居领导者，Descartes 和 Shippeo 分别位于挑战者和利基玩家位置。
