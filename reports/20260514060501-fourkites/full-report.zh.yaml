      - number: '2.3'
        title: 买方、用户与付款方细分
        blocks:
          - type: paragraph
            body: >
              RTTV 和 SCV 平台的主要付款方是企业货主，也就是把商品从工厂或配送中心发给客户的公司。大型企业内部，预算负责人通常是供应链或物流副总裁 /
              高级总监，首席供应链官（CSCO）或物流副总裁会赞助重大企业平台决策。 接入 TMS、WMS 和 ERP 系统需要 IT 参与，但 IT 很少是主要预算持有人。FourKites
              在三个企业垂直领域展现出特别强的采用率。 消费品与食品饮料在其 1,600 个品牌客户中占比过高，前 10 大 CPG 公司中的 9 家、前 20 大食品饮料公司中的 18
              家都是客户；这些垂直领域的采用动力来自大型零售商（Walmart、Target、Kroger）施加的 OTIF（On-Time, In-Full）合规罚款，大品牌每次重大违规罚款可达 $100,000 或更高。
              零售既是买方（采购来自供应商的入库货运），也是 CPG 货主的合规压力来源。制药和生命科学买方看重温控合规和监管链路文档。 工业、汽车和化工买方看重 JIT 生产支持和危化品合规。3PL 服务商（UPS
              Supply Chain、XPO、CH Robinson）既是用户——代表货主客户追踪货运——也是 FourKites 能力向自有客户的转售方。
              承运商（卡车、铁路、海运、空运）主要是网络参与者而非付款方；FourKites 提供免费或低价承运商产品（CarrierLink），激励承运商共享数据。
              大多数企业买方的采用触发点，是一次高调供应链中断（工厂火灾、港口罢工、天气事件），或一个超过年度软件成本的 OTIF 罚款周期。 Food Shippers of America（FSA）与 FourKites
              在 2022 年联合发布的调查发现，75% 的食品行业货主对供应链中断影响 2022 年 Q4 表现感到“担忧”或“非常担忧”。
