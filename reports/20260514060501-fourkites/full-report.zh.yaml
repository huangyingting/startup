      - number: '3.5'
        title: 竞争风险登记
        blocks:
          - type: paragraph
            body: >
              FourKites 面临 5 类实质竞争风险。最直接的是 project44 AI 功能趋同：project44 的 Autopilot AI 智能体平台（2025/2026）直接瞄准支撑 Loft
              的工作流自动化用例，project44 通过 ClearMetal 和 Tive 收购获得的多式联运数据深度也超过 FourKites 原生能力。 第二个风险是企业续约周期中的 ERP 打包替代：Oracle
              OTM 和 SAP TM 装机客户面对 RISE with SAP 或 Oracle Cloud 迁移项目时，会进入一个决策点，独立 RTTV 将与边际增量成本较低的打包可视化竞争。
              第三，欧洲覆盖缺口：FourKites 的欧洲公路承运商网络相对薄弱，在欧洲总部货主、且欧盟内部货运密集的采购决策中处于结构性劣势。 第四，Descartes
              在受监管垂直领域的合规替代：制药、化工和跨境贸易客户越来越要求集成海关清关和 EDI，Descartes 的平台投入让独立 RTTV 供应商短期内难以跨越这一缺口。 第五，新 AI
              原生进入者风险：原生构建在大语言模型上的智能体供应链 AI 平台，构成更长期的结构性威胁，尚未出现在 Gartner Magic Quadrant 覆盖中。 FourKites 与 project44
              的法律纠纷（上诉法院 2024 年恢复 project44 的诽谤诉讼；2024 年 12 月解决）消除了竞争销售周期中的重大不利干扰；纠纷解决对 FourKites 面向买方的声誉是正面进展。
