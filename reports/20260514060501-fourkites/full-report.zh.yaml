          tone: risk
        - id: R6
          label: 降估值融资风险
          detail: 下一轮融资定价低于 $1B 估值；带来稀释和士气影响。
          tone: risk
        - id: R7
          label: CEO 治理事件
          detail: Elenjickal 第二起行为事件（法律、伦理或声誉）公开化。
          tone: risk
        - id: R8
