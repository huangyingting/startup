      - number: '1.5'
        title: 关键里程碑与创新时间线
        blocks:
          - type: paragraph
            body: >
              FourKites 的演进跨越 12 年持续产品扩张：从 2014 年的基础整车追踪器，发展为 2026 年的多式联运 AI 编排平台。 核心里程碑包括：2016–2017 年扩展至
              LTL、铁路和包裹追踪；2018 年推出 Advanced Analytics；2019 年引入机器学习驱动的 Dynamic ETA 算法；2020 年推出 Dynamic Yard（下一代
              YMS）、多式联运采购订单追踪，以及扩展后的海运和空运追踪。 2021 年，FourKites 收购 Haven Inc. 并推出 Dynamic Ocean，又在欧洲收购
              NIC-place，打造欧洲大陆最大的多式联运承运商网络。 2022 年 6 月的 Series E 为加速增长提供资金；同年 FourKites 与 FedEx 结成战略联盟并获得 ISO 27001 认证。
              2023 年，公司推出 Fin AI（生成式 AI 界面）、Carrier Connect、Data Connector 和 Inbound Visibility 等新功能。 2024 年，FourKites 第
              7 次连续获得 FreightTech 25 奖，并第 4 次连续入选 Gartner Magic Quadrant 领导者。 2025 年，FourKites 宣布 AI 数字员工，构成 Intelligent
              Control Tower 的主干。2026 年初，公司商业化发布 Loft，这是一个 AI 原生平台，让企业能在数天而非数月内部署自主供应链智能体。 整体轨迹显示公司持续保持创新领导力；但 2022–2023
              年的裁员和领导层重组也暴露了财务纪律挑战。
