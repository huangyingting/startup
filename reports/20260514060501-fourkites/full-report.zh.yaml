      - number: '4.6'
        title: 展示项
        blocks:
          - type: callout
            title: 两轮裁员显示资本效率压力
            body: >-
              FourKites 在 $200M Series E（2022 年 6 月）后的 12 个月内进行了两轮明显裁员：2022 年 8 月裁撤约 60 名员工（~8%），2023 年初裁撤全球员工约 15%。
              这种成本削减节奏——在公司史上最大融资完成仅两个月后就开始——说明 Series E 后的增长计划未达到预期收入速度。CEO 在 2023 年公开提出接近零烧钱目标，反映公司从不惜代价增长转向保全资本。 截至
              2026 年 5 月没有新的主要融资、2023 年 5 月有二级市场活动、员工数稳定在 500+，这些组合说明公司已经企稳，但盈利路径仍未确认。
            calloutType: risk
            claimRefs:
              - CI016
              - CI017
              - CI018
              - CI029
              - CI030
              - CI031
          - type: callout
            title: NRR 不透明是最大的单一财务尽调缺口
            body: >-
              FourKites 未披露 NRR。企业级 SaaS 集成复杂，又依赖 TMS/ERP，NRR 因此是最关键的财务指标：它决定集成锁定能否真正转化为收入扩张。NRR 高于 120%，才验证护城河；低于
              100%，则说明 FourKites 因流失丢掉收入的速度快过获取新客户。没有这一指标，所有关于转换成本护城河的说法都无法验证。尽调建议把 NRR 披露列为任何投资流程的 gate-2 要求。
            calloutType: risk
            claimRefs:
              - CI010
              - CI011
              - CI028
              - CI029
          - type: callout
            title: Descartes 提供可信的长期利润率基准
            body: >-
              Descartes Systems Group (DSGX) 展示了成熟企业物流 SaaS 平台的财务形态：FY2024 收入 $729M，毛利率 77%、经营利润率 29%、FCF 利润率
              36%。FourKites 的商业模式在结构上相近，都是订阅 SaaS、承运商网络和多边平台，但收入规模大约只有 Descartes 的 1/5 到 1/10。未来 5–8 年，如果 FourKites 能把
              ARR 做到 $500M+，同时继续承担承运商侧补贴和 AI 投入，Descartes 的利润率曲线就是一个可信目标。关键风险在于，FourSight 和 Loft 的 AI 推理成本可能形成永久 COGS
              拖累，而 Descartes 是数据网络业务，不是 AI 推理业务，并不面对同样成本。
