      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              相比 project44，FourKites 的核心竞争优势在于承运商网络广度（1.1 million 家已连接承运商、每日 3.2 million 票货运）、更强的场院和设施管理（Dynamic
              Yard、YardWorks、集成预约排程）、更深的 CPG 和食品饮料垂直经验（前 10 大 CPG 公司中的 9 家、前 20 大食品饮料公司中的 18 家为客户），以及 2026 年 2 月率先推出
              Loft 平台带来的 AI 数字员工先发优势——Tracy、Polly 和 Alan AI 智能体先于任何竞争对手落地。 面对 project44，FourKites 最弱的是海运可视化深度：project44
              收购 ClearMetal 后拥有更丰富的海运 AI 和预测性海运 ETA 能力，收购 Tive 后又增加冷链监控所需的实时 IoT 硬件，FourKites 纯软件的 Dynamic Ocean
              当前还无法匹配。 面对 Shippeo，FourKites 在欧洲公路承运商密度上落后，限制了其争取欧洲总部货主的竞争位置。面对 Descartes，FourKites 缺少集成海关清关、EDI
              网络服务和货运代理 TMS；这些功能在制药、化工和跨境贸易垂直领域至关重要。 面对 Oracle 和 SAP，FourKites 无法提供这些平台原生给装机客户的打包 TMS、WMS 和 ERP
              集成足迹；当采购决策由 ERP 整合而非可视化能力驱动时，吸引力受限。 Nucleus Research 在 2025 年 Control Tower Technology Value Matrix 中将
              FourKites 评为 Accelerator，把它放在右上象限，在产品价值和实施易用性两个评分上均领先竞争对手。
