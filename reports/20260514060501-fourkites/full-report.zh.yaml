  - id: TE002
    title: 工作流 / 用例表
    description: >-
      Key supply chain user jobs, how FourKites addresses them, measured benefit claims, and known limitations per use
      case.
    columns:
      - 用户任务
      - 当前流程（未用 FourKites）
      - FourKites 方案
      - 可衡量收益（声称）
      - 关键限制
    enumerationScope:
      coverage: sample
      basis: >-
        Use cases drawn from official customer success stories, G2/Capterra/Gartner user reviews, and ABI Research
        survey data; full enterprise workflow map has not been independently published.
    notes: 用例来自官方客户成功材料、G2/Gartner Peer Insights 评价和 ABI Research 调查数据。收益指标为公司自称；未找到独立验证。
    rows:
      - - 实时跟踪入库 / 出库货运
        - 人工致电承运商查单、邮件状态更新、TMS 轮询
        - 持续 GPS/ELD/车联网跟踪，ETA 每 15 分钟刷新
        - 人工查单电话显著减少；准时交付可视性更高
        - 承运商合规缺口会让未集成承运商形成可视性盲区
      - - 预测并预防交付异常
        - 延误发生后再响应；手工分析根因
        - 动态 ETA 纳入 150+ 个因素；延误成形前先发异常预警
        - 自主 AI 执行能帮助企业避免滞留费和加急成本
        - 部分用户反馈告警疲劳；需要调校异常阈值
      - - 月台预约排程自动化
        - 承运商与仓库团队靠电话 / 邮件协调
        - Loft Digital Worker：跨企业排程系统自动预订月台
        - 手工预约排程任务最多减少 95%（公司说法）
        - 需要接入 WMS / 堆场排程系统；上线前要配置
      - - 管理高风险货运的承运商跟进
        - 调度员手工致电承运商跟进高风险载货
        - Loft Digital Worker：自动联系承运商、记录回复、升级处理
        - 减少手工跟进工作量；更快处理异常
        - 承运商对自动触达的响应意愿不一；配合完全自愿
      - - 处理海运单证
        - 通过邮件和门户手工审核 BOL、海关文件和发票
        - Loft Digital Worker：无需标准格式，也能处理杂乱邮件和格式不一的 BOL
        - 单证周转更快；减少手工录入
        - 复杂多国报关流程可能需要配置；覆盖深度尚未验证
      - - 生成供应链绩效报告
        - 从 TMS、WMS 和承运商门户手工拉取 Excel / BI 数据
        - FourSight Analytics：统一数据平台生成跨运输方式 KPI
        - 为 OTD、停留时间和承运商绩效提供单一事实源
        - 分析模块定价及相对独立 BI 工具的深度未披露
  - id: TE003
    title: 技术 / 运营架构表
    description: Key architecture layers, roles, dependencies, and technical risks.
    columns:
      - 层级 / 组件
      - 作用
      - 依赖
      - 技术风险
    enumerationScope:
      coverage: partial
      basis: >-
        Architecture inferred from developer portal, platform marketing pages, G2 feature descriptions, and press
        releases; FourKites has not published an architecture white paper or public system diagram.
    notes: 架构根据开发者门户、平台营销材料和用户评价重构；FourKites 尚未发布架构白皮书。依赖项根据产品描述和已知 SaaS 模式推断。
    rows:
      - - FourKites Intelligent Network
        - 聚合来自 200+ 个国家 1.1M+ 承运商的实时位置和事件数据
        - GPS/ELD 硬件供应商、车联网 API、AIS 数据提供商、承运商移动应用采用率
        - 承运商合规上限：未集成承运商会造成覆盖缺口；AIS 盲区影响海运准确性
      - - Dynamic ETA ML Engine
        - 用 150+ 个变量持续更新到达时间预测
        - 历史货运数据、实时交通 / 天气 API、承运商行为模型
        - 新线路、新承运商或极端天气下，模型准确性会下降；准确性未经过独立基准测试
      - - Digital Twins Engine
        - 维护实时实体模型（订单、货运、库存、资产、设施）
        - 来自 Intelligent Network 的实时事件摄取；ERP / TMS 数据馈送
        - 大规模扰动或摄取管道滞后时，孪生数据会变旧；多实体一致性难度高
      - - Loft AI Agent Platform（AI 智能体平台）
        - 通过 Digital Workers 和 Sophie 智能体构建器执行自动化工作流
        - LLM 提供商（基础模型依赖）、FourKites Intelligent Network 提供领域数据、企业系统 API（ERP、WMS、CRM）
        - 依赖外部 LLM 提供商带来模型漂移风险；Gartner 估计，到 2027 年 40% 的智能体 AI 项目会被放弃
      - - API / 集成层
        - 提供 REST API、EDI 连接器和预置 TMS / ERP 集成
        - SAP、Oracle、Salesforce、JDA/Blue Yonder、Manhattan Associates API 合约
        - TMS / ERP 厂商破坏性变更需要持续维护集成；承运商 EDI 映射按承运商定制
      - - 云基础设施
        - 多租户 SaaS 托管；数据存储与处理
        - 超大规模云厂商（技术上下文暗示 AWS；公开信息未确认）
        - 云服务商宕机风险；欧盟 / 亚太数据驻留要求可能需要区域化架构
      - - 开发者门户
        - 支持客户侧集成和自定义应用开发
        - developer.fourkites.com（REST API 文档、沙盒）
        - 公开 API 文档深度有限；仅 1 个公开 GitHub 仓库，显示开发者生态相比 project44 更薄
