            EDI/X12；面向事件驱动工作流的 webhooks。
          tone: neutral
        - label: FourKites Intelligent Network（数据基础）
          detail: >-
            覆盖 200+ 个国家的 1.1M+ 承运商；每日 3M+ 票货运；数据来自 GPS/ELD 车载远程信息、承运商移动 app、AIS（海运）、EDI（状态）和承运商 API。网络数据是主要护城河，也是所有 AI
            模型的训练语料。
          tone: positive
  - id: FE002
    title: 客户工作流 / 运营流
    type: flow
    description: 货主从创建货运到异常解决和报告，端到端使用 FourKites 的运营流程。
    layout: standard
    claimRefs:
      - CE010
      - CE011
      - CE012
      - CE013
    data:
      nodes:
        - label: 在 TMS/ERP 中创建货运
          detail: 货主在 TMS（SAP TM、Oracle OTM、JDA）中创建货运。FourKites 通过 API 或 EDI 集成摄取数据。为订单和货运实例化 Digital Twin。
          tone: neutral
        - label: 指派承运商并激活跟踪
          detail: FourKites 通过 GPS/ELD 车载远程信息、移动 app 或 EDI 向承运商发送跟踪请求。承运商合规率决定跟踪质量。Premier Carriers 合规率最高。
          tone: neutral
        - label: Dynamic ETA 持续更新
          detail: 每 15 分钟，ML 模型重新打分 150+ 个因素（天气、交通、历史停留、承运商行为）。ETA 通过 webhook/API 推送到货主门户和 TMS。
          tone: positive
        - label: 生成异常警报
          detail: 如果 ETA 偏差超过阈值或风险分数飙升，Digital Twin 会标记异常。Loft Digital Worker（承运商跟进 agent）自动联系承运商、记录回复，并在无人回应时升级。
          tone: positive
        - label: 解决或改线决策
          detail: 运营团队审查 AI 推荐动作（改线、通知客户、调整码头预约）。如果 WMS 集成处于激活状态，Loft 可以自动执行码头重新排程。
          tone: positive
        - label: 通过 FourSight 报告绩效
          detail: 货后数据流入 FourSight Analytics：OTD 率、承运商绩效分数、线路停留时间、异常率。在统一看板中跨模式做全模式基准对比。
          tone: positive
