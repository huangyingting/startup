      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >
              FourKites 由创始人 Mathew Elenjickal 担任首席执行官，自公司创立以来一直任职。2026 年的高管团队包括： Priya Rajagopalan，产品、技术与运营总裁；Ron
              Richardson，首席营收官；Bill Maw，首席财务官； Sriram Nagaswamy，技术执行副总裁；Chris Brown，人力执行副总裁；Michelle Meller，总法律顾问。 公司在
              2023 年出现明显的领导层波动：曾加入公司担任总裁的 Rocky Subramanian 离任；Rajagopalan 先接任首席客户官，随后又回到总裁头衔；战略副总裁 Glenn Koepke 也在 15%
              裁员期间离开。董事会包括各主要投资方的风险投资代表： Ajay Agarwal（Bain Capital Ventures 董事总经理）、Eric Carlborg（August Capital 普通合伙人）、
              Gaurav Mittal（Thomas H. Lee Partners 董事总经理）、Ira Weiss（教授兼风险投资人）、Joe Beatty（顾问）以及 Jai Shekhawat（Fieldglass
              创始人兼前 CEO）。 Samuel Rives 和 Mike Kaczmarek 也在 SEC 文件中以公司高管身份出现。创始人主导、外部投资人占据多个董事席位，形成了晚期风险投资支持公司常见的治理格局。
              Elenjickal 同时是创始人，也是公司愿景和市场定位唯一的公开代表，对他的关键人依赖构成实质风险。
