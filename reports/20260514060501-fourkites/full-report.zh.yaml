      - number: '4.3'
        title: 资本充足性与融资历史
        blocks:
          - type: paragraph
            body: >-
              2014–2022 年间，FourKites 在 8 轮已披露融资中累计募得约 $430 million。两轮最大融资是 $200 million Series E（2022 年 6 月，由 Thomas H.
              Lee Partners 领投，估值 $1 billion）和 2022 年 8 月增加 FedEx 作为战略投资方的 $30 million 延伸轮。 这笔 $30 million 延伸轮由 SEC Form
              D 证明（2022 年 8 月 25 日提交，accession number 0001625230-22-000001），文件披露出售 2,500,000 股 Series D-1 Preferred
              Stock，募集 $30,000,000，另附 907,068 股普通股认股权证，行权价 $0.01（认股权证总购买价 $9,070.68）。 Mitsui & Co. 在 2022 年 10 月又进行了单独的
              $10 million 战略投资。FourKites 最近一次披露的二级市场交易发生在 2023 年 5 月。 自 2022 年 8 月以来，公司未宣布新的主要股权融资，说明 FourKites 正依靠 2022
              年募得资本运营。在 Series E 之后估计可用资金为 $230 million（扣除早期提款后，来自 Series E 约 $200 million 净新增资金、$30M 延伸轮和 $10M
              Mitsui），且经历两轮裁员（2022 年 8 月约 60 名员工、2023 年初约 15% 员工），FourKites 看起来在朝盈利目标保全资本。 CEO Matt Elenjickal 于 2023
              年公开表示，FourKites 目标是接近零烧钱。截至 2026 年 5 月没有新融资，意味着两种可能：（a）FourKites 已达到可持续现金位置；或（b）2022 年后 SaaS
              倍数压缩，使再融资在市场环境下变难。 CBInsights 提到 2023 年 5 月的二级市场活动，说明存在部分投资人流动性活动，但没有新的主要融资。最新确认员工数是 FourKites 2026
              年招聘页面显示的“500+”，与裁员后员工规模一致。
