        - 要求 FourKites 按运输模式提供实际承运商配合率；与 project44 的说法对比
      - - 预算收缩与 ROI 审查（2022–2025）
        - 约束
        - 近期（2023–2025）
        - 供应链技术买家收紧续约条款，并要求证明 ROI；这也促成 FourKites 裁员，且 ARR 未知
