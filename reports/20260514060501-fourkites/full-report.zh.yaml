        - 2022 年诽谤邮件行为带来 IPO 披露风险和 M&A 治理审查；公开资料未记录董事会治理整改；Subramanian 离职后未见具名 COO/CPO 接班人
        - 要求提供董事会章程、独立董事名单、2022 年后的行为治理框架、D&O 保险覆盖
      - - 竞争防御
