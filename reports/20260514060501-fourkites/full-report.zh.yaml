      - number: '7.4'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              FourKites 是云原生 SaaS 平台。它的运营风险包括：(1) 承运商合规依赖——承运商伙伴不提供电子追踪数据时，平台核心价值（实时 ETA 准确度）会下降。这是客户最常提到的抱怨（G2、Gartner
              Peer Insights）。提升承运商合规需要积极的客户成功计划，运营成本高。FourKites 只报告全球 1.1M+ 已连接承运商；缺少远程信息系统的小型卡车司机长尾，仍然难以打穿。(2) Loft
              Digital Workers 的 AI 可靠性——US Cold Storage 试点的 87% 成功率令人鼓舞，但也意味着 13% 的异常率需要人工介入。在企业规模下，即便自动预约排程或单证处理的错误率只有
              5%，也会给供应链敏感运营造成重大扰动。(3) 基础设施集中：AWS 托管 FourKites 平台（AWS Marketplace 条目 已确认）。AWS 服务中断或价格变化会带来可用性和成本结构风险。(4)
              数据质量依赖：FourKites 的预测 ETA 模型依赖历史货运数据、承运商表现记录和实时远程信息数据。数据模型漂移（例如 COVID
              后承运商行为变化）、远程信息硬件故障或承运商侧数据造假，都会造成准确性风险。(5) 网络安全：FourKites 为 Fortune 500
              公司处理敏感物流数据。若泄露货运路线、承运商关系或客户供应链结构，可能严重损害客户信任，并影响公司在 GDPR 下的监管地位。未找到公开 SOC 2 报告、渗透测试摘要或漏洞赏金计划。(6) 技术债：平台始建于
              2014 年，已从 TL 追踪扩展到海运 / 铁路 / 堆场 / AI。多模式数据摄取管线里的架构技术债，是 10 年历史 SaaS 平台的典型问题，可能让功能迭代速度慢于新进入者。
            claimRefs: []
