        - 核心估值输入；$1B 估值意味着 Series E 时 ARR 倍数为 10–15x
        - 索取当前 ARR 及按细分市场拆分的 ARR 增长率
      - - NRR（净留存率）
        - 未披露
        - 不适用——未披露
        - 最重要指标：NRR>120% 可验证护城河；NRR<100% 预示被替代风险
        - 索取按客户队列和垂直行业拆分的 NRR；过去 24 个月口径
      - - 毛利率
        - 订阅估计约 70–80%；服务约 20–40%
        - 低——由 Descartes（77%）和 SaaS 基准外推
        - 毛利率决定 FCF 路径和 AI 投资能力
        - 索取按收入流拆分的毛利率；AI 推理成本占 COGS 比例
      - - CAC（获客成本）
        - 未披露
        - 不适用——未披露
        - 企业 SaaS CAC 通常为每账户 $50K–$500K；回本 18–30 个月
        - 索取按细分市场拆分的 CAC；销售周期；配额达成数据
      - - LTV / CAC 比率
        - 未披露
        - 不适用——未披露
        - 对企业 SaaS 而言，LTV/CAC > 3x 属健康；低于 1x 预示增长不可持续
        - 拿到底层数据后，用 CAC + NRR + 毛利率计算
      - - 烧钱速度（月度）
        - 未披露；2023 年裁员前可能为每月 $5M–$15M
        - 极低——基于 Series E 消耗速度和裁员信号估计
        - CEO 在 2023 年称目标是「接近零烧钱」；当前实际烧钱未知
        - 索取月度现金消耗；过去 12 个月；最近季度末现金余额
      - - 员工数
