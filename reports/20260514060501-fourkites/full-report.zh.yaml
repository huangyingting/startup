      - number: '2.2'
        title: TAM、SAM 与受证据约束的 SOM
        blocks:
          - type: paragraph
            body: >
              估算 FourKites 的可服务市场需要在多个分析机构来源之间三角校验，因为各机构采用不同的市场边界和方法。MarketsandMarkets 是该领域引用最多的研究机构，2026 年 1
              月发布的报告估计，整体 SCM 软件市场 2025 年为 $38.51B，并以 8.7% CAGR 增至 2030 年的 $58.42B。同一机构估计，AI in Supply Chain 市场 2025 年为
              $13.93B，并以 20.2% CAGR 增至 2032 年的 $50.41B。收窄到 SCV/RTTV 细分市场后，多家二级分析机构估计（Technavio、Mordor
              Intelligence、Allied Market Research）将供应链可视化软件市场置于 2022 年约 $2.3B 至 $5.5B，并以 14% 至 20% 的复合年增长率增长至 2028–2031
              年。 这些区间估计需要谨慎解读：区间高端通常采用更宽定义，纳入 TMS 功能；低端则反映纯 RTTV 平台。用 FourKites 自身牵引力数据做自下而上的 TAM 视角也有信息量：FourKites 服务
              1,600 个品牌，覆盖 Fortune 500 的 50%，客户群集中在收入 $500M+ 的企业分部。如果 Fortune 2000 企业货主总宇宙约有 2,000 个潜在采购组织（Fortune 2000
              加大型 3PL），且每份合同价值为 $200,000–$1,000,000 ARR，则大型企业 RTTV 的 SAM 约为 $0.4B–$2B。 中端市场和国际扩张大致可让这一数字翻倍，总 SAM 达到
              $1–4B。FourKites 目前在 Fortune 500 中约 50% 的客户渗透率，以及向 AI 编排（Loft）的战略转向，支撑一个 SOM 扩张逻辑：增长更可能来自向现有客户增售 AI
              平台层级，以及中端市场国际扩张，而不是在北美获取新的大型企业 logo。 这里存在重大尽调缺口：FourKites 不公开披露 ARR，因此无法验证其收入运行率是否与上述市场规模估计一致，也无法计算隐含市场份额。
