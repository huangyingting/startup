  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: market-share
      missingEvidence: "FourKites' actual market share within the RTTV/SCV category is unknown because the company does not disclose ARR or revenue, and no independent analyst has published a vendor revenue share analysis for RTTV."
      whyItMatters: "Without market share data, it is impossible to assess whether FourKites is the market leader (as it claims) or whether project44 or another vendor has overtaken it in revenue or customer count since 2022."
      diligencePath: "Request ARR and NRR data from FourKites; ask Gartner or Forrester for vendor revenue share analysis as part of a formal due-diligence engagement."
      relatedQuestionRefs: [QM019]

    - type: contradictory-evidence
      severity: material
      topic: market-sizing
      missingEvidence: "Multiple analyst firms cite RTTV/SCV market sizes that differ by 5x to 10x ($1.5B to $20B+) for the same year, reflecting different boundary definitions. No single authoritative, reconciled estimate exists."
      whyItMatters: "The wide range makes TAM-based valuation analysis unreliable; an investor who relies on $20B TAM will reach very different conclusions from one using $1.5B TAM."
      diligencePath: "Request market boundary definitions used by each analyst; reconcile using the narrowest (RTTV-only) definition before building a bottom-up TAM."
      relatedQuestionRefs: [QM016, QM027]

    - type: missing-source
      severity: moderate
      topic: mid-market-sizing
      missingEvidence: "No evidence on the size of the mid-market SCV opportunity (companies with $100M–$500M revenue) or FourKites' traction in this segment."
      whyItMatters: "If North American enterprise is saturating, mid-market is the most natural expansion path; but product complexity and ACV may not support mid-market economics."
      diligencePath: "Ask FourKites for ARR breakdown by company revenue segment; assess whether product roadmap includes mid-market-specific tiers."
      relatedQuestionRefs: [QM026]

    - type: missing-source
      severity: moderate
      topic: loft-market-expansion
      missingEvidence: "No independent evidence on whether Loft creates a net-new addressable market or cannibalizes existing RTTV subscription revenue."
      whyItMatters: "If Loft is additive (a new higher-tier SKU), it expands ARR per customer; if it cannibalizes (replaces legacy tier), churn risk increases during platform migration."
      diligencePath: "Request contract data showing Loft adoption rates, ACV premium over legacy RTTV contracts, and any evidence of legacy-to-Loft migration."
      relatedQuestionRefs: [QM021]

    - type: missing-source
      severity: low
      topic: geographic-market-data
      missingEvidence: "No data on fastest-growing geographic markets for supply chain visibility in 2026; APAC and EMEA growth rates are asserted but not quantified with independent sources."
      whyItMatters: "FourKites' international expansion strategy (200+ countries, 98% ocean traffic) needs to be validated against actual market growth rates by region to assess whether international TAM is incremental."
      diligencePath: "Request regional ARR breakdown from FourKites; obtain region-specific SCV market sizing from Gartner, IDC, or similar analysts as part of formal due diligence."
      relatedQuestionRefs: [QM022]

