callouts:
  - calloutType: strength
    title: "Large TAM with Multiple Growth Vectors"
    body: >
      The SCV/RTTV market sits at the intersection of regulatory compliance (OTIF, FSMA,
      CSRD), supply chain resilience investment, AI transformation, and ongoing logistics
      digitization. Multiple secular tailwinds are aligned: tariff volatility in 2025-2026
      accelerates near-shoring, which adds new transport lanes that need visibility. The
      MarketsandMarkets SCM market forecast of 8.7% CAGR provides a conservative floor for
      growth; the AI in Supply Chain market ($13.93B → $50.41B at 20.2% CAGR) defines the
      upside if FourKites' Loft platform captures meaningful share of AI spend.
    claimRefs: [CM005, CM006, CM007, CM019, CM020]

  - calloutType: risk
    title: "TMS Incumbency and Market Saturation May Cap North American Growth"
    body: >
      FourKites already serves approximately 50 percent of the Fortune 500. At this
      penetration rate, new North American enterprise logo acquisition is increasingly
      difficult, and TMS incumbents (SAP, Oracle, Blue Yonder, e2open) are actively adding
      native visibility modules. The incremental SAM for core RTTV in North America may
      be shrinking. Revenue growth must increasingly come from upsell (Loft AI tiers),
      international expansion (EU, APAC), and mid-market penetration—all of which are
      less proven for FourKites and carry different cost structures.
    claimRefs: [CM022, CM023, CM024, CM030]

  - calloutType: insight
    title: "Tariff Volatility as a Near-Term Demand Catalyst"
    body: >
      The 2025 tariff cycle has introduced significant supply chain reconfiguration pressure.
      Companies are adding new carrier relationships across Asia-Pacific, Mexico, and Europe
      as they diversify sourcing away from China. Each new trade lane represents a potential
      FourKites carrier onboarding and visibility contract expansion. This is a time-bound
      opportunity: the elevated disruption window of 2025-2026 may accelerate otherwise
      slow buying cycles, particularly in industrial and manufacturing verticals.
    claimRefs: [CM019, CM020, CM021]

