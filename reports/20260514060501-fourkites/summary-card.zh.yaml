summary:
  headline: |
    FourKites 是经验证的供应链可视化龙头，企业客户关系稳，agentic AI 转向也有可信度；但财务透明度有限，加上 2022 年末估值锚点压力大，在出现流动性事件或重估前，更适合保持观察。
