artifact: financials
slug: fourkites
runDate: "2026-05-14"
company:
  name: FourKites
chapter:
  number: 4
  title: Financials
  summary: >
    FourKites is a late-stage private company that has raised approximately $430M across eight rounds,
    with a last known valuation of $1 billion (June 2022 Series E). The company does not disclose
    revenue, ARR, gross margin, or burn rate publicly. Third-party estimates place 2021 revenue at
    approximately $65M (CBInsights). Based on the $1B valuation at Series E and typical enterprise SaaS
    multiples of 10–15x ARR, revenue at the time of the round was likely $67M–$100M. Two workforce
    reductions (August 2022 and 2023) totaling approximately 22–23% of peak headcount signal that the
    post-Series-E cost structure was not sustainably covered by recurring revenue. The CEO publicly
    stated a goal of reaching near-zero burn rate by end of 2023. With no subsequent equity round since
    August 2022 and secondary market activity reported in May 2023, FourKites' capital adequacy and
    path to profitability are material diligence gaps. A comparable public company — Descartes Systems
    Group (DSGX) — operates at 77% gross margin and 29% operating margin on $729M revenue, providing
    a ceiling benchmark for what a mature enterprise supply chain SaaS looks like.

sections:
  - id: revenue-model-and-streams
    title: Revenue Model and Revenue Streams
    body: >-
      FourKites operates a subscription SaaS model with enterprise annual contracts typically ranging
      from one to three years. Revenue is segmented into several streams: (1) a core visibility
      subscription fee, priced by the number of tracked lanes, shipment volume, or user seats, that
      covers real-time transportation visibility for road freight; (2) ocean visibility, which requires
      an add-on module after FourKites' acquisition of Haven Inc. (2021); (3) Dynamic Yard (YMS
      module), a separately licensed yard management product launched in 2020; (4) Loft AI Agent
      Platform, commercially launched in February 2026 as a platform for custom AI agent development
      in supply chains — pricing separate from core RTTV; and (5) professional services and
      implementation fees for onboarding and integration. Carriers are onboarded free of charge,
      making FourKites a two-sided marketplace where one side (carriers) is subsidized to build
      network density that makes the platform more valuable for the paying side (shippers). This
      carrier subsidy increases gross margins relative to revenue, since carrier-side costs are
      funded by shipper subscriptions. FourKites does not disclose pricing publicly; based on
      industry knowledge and analyst estimates, enterprise ARR per shipper account ranges from
      approximately $200,000 to over $1,000,000 per year for large deployments, with module-based
      expansion available. CBInsights estimates FourKites' 2021 revenue at approximately $65 million.
      Based on the June 2022 Series E at a $1 billion valuation and SaaS multiples of 10–15x ARR
      at the time, ARR at the time of the Series E was likely $67M–$100M. Revenue mix is dominated
      by subscription, with professional services representing a small but non-trivial component
      during onboarding cycles.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006]
    tableRefs: [TI001, TI002]

  - id: unit-economics-and-gtm
    title: Unit Economics and GTM Motion
    body: >-
      FourKites' go-to-market is direct enterprise sales, targeting Fortune 500 shippers in CPG,
      food and beverage, pharmaceutical, chemical, and retail verticals. The company counts 9 of the
      top 10 CPG companies and 18 of the top 20 food and beverage companies among its 1,600+ brand
      customers as of 2026. CAC (customer acquisition cost) is not publicly disclosed. Enterprise
      SaaS benchmarks suggest payback periods of 18–30 months for companies at FourKites' scale and
      segment; given the complexity of TMS/ERP integration for RTTV deployments, CAC is likely at
      the higher end. FourKites has a strategic alliance with FedEx (investor since August 2022) and
      a distribution agreement with Mitsui / MKI for Japan and the Asia Pacific region (since October
      2022), suggesting a channel sales component alongside direct enterprise sales. Net revenue
      retention (NRR) is not disclosed — this is the most important unit economics metric for RTTV
      and represents the primary diligence gap. An NRR above 120% would indicate that existing
      customers expand faster than any churn, validating the integration moat; an NRR below 100%
      would signal net contraction despite new logo acquisition. FourKites's open-source positioning
      on carrier onboarding (carriers are free, generating data density) reduces variable cost per
      tracked shipment as the network scales. If AI inference costs (for Dynamic ETA, FourSight AI,
      and Loft) scale with shipment volume, this could compress gross margins in an AI-first revenue
      model. Professional services margins are typically 20–40% for enterprise SaaS companies;
      subscription margins at mature SaaS companies at scale are typically 70–80% gross margin.
    claimRefs: [CI007, CI008, CI009, CI010, CI011, CI012]
    tableRefs: [TI003]

  - id: capital-adequacy-and-financing
    title: Capital Adequacy and Financing History
    body: >-
      FourKites has raised approximately $430 million across eight disclosed funding rounds between
      2014 and 2022. The two largest rounds are the $200 million Series E (June 2022, led by Thomas
      H. Lee Partners at a $1 billion valuation) and the $30 million extension in August 2022 that
      added FedEx as a strategic investor. The $30 million extension was evidenced by SEC Form D
      (filed August 25, 2022, accession number 0001625230-22-000001), which reported the sale of
      2,500,000 shares of Series D-1 Preferred Stock for $30,000,000, plus a warrant for 907,068
      shares of common stock at $0.01 exercise price ($9,070.68 total warrant purchase price). A
      separate $10 million strategic investment from Mitsui & Co. was made in October 2022.
      FourKites' last disclosed secondary market transaction was in May 2023. No new primary equity
      round has been announced since August 2022, suggesting FourKites is operating on the capital
      raised in 2022. With an estimated $230 million available post-Series E (after approximately
      $200 million net new proceeds from Series E, $30M extension, and $10M Mitsui, net of earlier
      draws), and two workforce reductions (approximately 60 employees in August 2022 and approximately
      15% of headcount in early 2023), FourKites appears to be conserving capital toward a profitability
      target. CEO Matt Elenjickal publicly stated in 2023 that FourKites was targeting a near-zero burn
      rate. The absence of new funding as of May 2026 suggests either (a) FourKites has reached a
      sustainable cash position, or (b) market conditions have made re-financing difficult given the
      compressed SaaS multiples environment post-2022. CBInsights noted secondary market activity in
      May 2023, suggesting some investor liquidity activity without a new primary round. The most
      recent confirmed employee count is "500+" per FourKites careers page in 2026, consistent with
      post-reduction headcount.
    claimRefs: [CI013, CI014, CI015, CI016, CI017, CI018, CI019]
    tableRefs: [TI004]

  - id: financial-comparables-and-benchmarks
    title: Financial Comparables and Industry Benchmarks
    body: >-
      Because FourKites does not report financial results, comparable public companies provide context
      for what financially healthy enterprise supply chain SaaS looks like. Descartes Systems Group
      (NASDAQ: DSGX) is the most directly comparable public company — a logistics software platform
      with subscription SaaS revenue from carrier connectivity, customs compliance, routing, and
      transportation visibility. In its fiscal year ending January 2024, Descartes reported revenue
      of $728.99 million (11.98% year-over-year growth), gross profit of $561.93 million (gross
      margin 77.1%), operating income of $209.98 million (operating margin 28.8%), and net income
      of $163.77 million (net margin 22.5%). Descartes trades at approximately 15–20x forward
      revenue, reflecting the market's view of mission-critical logistics software with high
      switching costs. E2open (ETWO, now private) was another comparable, but it has been taken
      private and is not comparable at current size. For enterprise SaaS benchmarks, OpenView
      Partners' annual SaaS benchmarks report and Chargebee's data indicate that companies growing
      at 30–50% ARR annually with $50M–$200M ARR should target gross margins of 70–80%, CAC
      payback of 12–24 months, and NRR of 110–130%. At FourKites' scale ($65M 2021 revenue,
      likely $100M+ ARR by 2023), a path to Descartes-like margins (77% gross, 29% operating)
      over a 5–7 year horizon is plausible if carrier-side infrastructure costs are managed and AI
      inference costs do not erode subscription margins. The FourKites business model is capital-
      efficient in customer acquisition (once a customer signs and integrates, switching cost is
      high) but capital-intensive in network building (carrier onboarding, global operations,
      multimodal infrastructure).
    claimRefs: [CI020, CI021, CI022, CI023, CI024, CI025]
    figureRefs: [FI003]

  - id: financial-gaps-and-verdict
    title: Financial Gaps and Diligence Verdict
    body: >-
      FourKites has multiple material financial disclosure gaps that prevent standard underwriting.
      The five most critical are: (1) ARR and revenue not disclosed — the company does not publish
      ARR, recurring revenue, or total revenue; the only third-party estimate places 2021 revenue
      at $65M (CBInsights), with no public update; (2) gross margin not disclosed — without gross
      margin data, it is impossible to assess unit economics, subscription vs. services margin mix,
      or the impact of AI inference costs on SaaS margins; (3) burn rate and runway not disclosed —
      the two workforce reductions and the CEO's "near-zero burn" statement indicate the company was
      burning cash significantly post-Series E, but the magnitude and improvement path are unknown;
      (4) NRR not disclosed — net revenue retention is the primary signal of integration lock-in and
      competitive displacement risk; without it, diligence cannot validate the switching cost moat
      claim; and (5) customer ARR concentration not disclosed — the top 10 customers may represent
      an outsized share of ARR, creating customer concentration risk. The financial picture that can
      be assembled from public evidence suggests: revenue growth stage (likely $80M–$150M ARR by
      2024), meaningful cash reserves from the 2022 raises, and a company transitioning from high-
      growth mode to capital efficiency. The two layoffs are a leading indicator of this transition
      but the outcome is not yet public. FourKites must demonstrate a credible path to Descartes-
      level margins (77% gross, 29% operating) or a strategic exit, or it risks a down round or
      strategic acquisition scenario if market conditions deteriorate.
    claimRefs: [CI026, CI027, CI028, CI029, CI030, CI031, CI032, CI033, CI034, CI035, CI036, CI037, CI038]
    tableRefs: [TI005]
    figureRefs: [FI001, FI002, FI004]

