  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: arr-and-revenue-disclosure
      missingEvidence: "FourKites does not disclose ARR, total revenue, or revenue growth rate publicly. The only available external estimate is CBInsights' $65M for 2021. All revenue analysis in this chapter is estimated."
      whyItMatters: "Without ARR, it is impossible to validate the $1B valuation, assess growth trajectory, or project a path to profitability. This is the single most important missing data point."
      diligencePath: "Request ARR schedule by product, segment, and geography; require quarterly ARR update as a gate-2 condition; benchmark against CBInsights estimate."
      relatedQuestionRefs: [QI001, QI016, QI031]

    - type: private-evidence-only
      severity: critical
      topic: NRR-and-unit-economics
      missingEvidence: "FourKites does not disclose NRR, GRR, CAC, or LTV. These metrics are required to validate the switching-cost moat and unit economics thesis."
      whyItMatters: "NRR is the most important financial metric for enterprise SaaS with integration lock-in claims. An NRR below 100% would disconfirm the moat thesis entirely."
      diligencePath: "Request NRR by cohort, vertical, and contract vintage; CAC by segment; LTV/CAC ratio; require gate-2 NDA disclosure as a prerequisite for term sheet."
      relatedQuestionRefs: [QI003, QI013, QI023]

    - type: private-evidence-only
      severity: material
      topic: burn-rate-and-runway
      missingEvidence: "FourKites does not disclose monthly burn rate, cash on hand, or runway. The two layoffs and CEO statement about near-zero burn are the only signals available."
      whyItMatters: "Capital adequacy risk: if FourKites needs a new primary round at or below the $1B valuation, down-round provisions could affect existing investors and employee option value."
      diligencePath: "Request P&L with monthly burn; cash balance as of most recent quarter; venture debt schedule; 18-month runway projection."
      relatedQuestionRefs: [QI004, QI022]

    - type: missing-source
      severity: moderate
      topic: revenue-streams-completeness
      missingEvidence: "Revenue stream breakdown by module (road vs. ocean vs. yard vs. Loft AI) is not available. Module-level ARR would reveal whether FourKites' expansion strategy is succeeding."
      whyItMatters: "Module expansion is the primary upsell thesis; if ocean and yard modules have low adoption, the expansion ARR story is weaker than the total customer count suggests."
      diligencePath: "Request ARR by module; module attach rate by customer cohort; module NRR separately."
      relatedQuestionRefs: [QI016, QI026]
      relatedTableRefs: [TI001]

    - type: missing-source
      severity: moderate
      topic: pricing-data
      missingEvidence: "No public pricing data exists for FourKites; the pricing/monetization table is based entirely on industry estimates."
      whyItMatters: "Without pricing confirmation, it is impossible to assess whether FourKites' ACV is competitive, whether discounting is eroding revenue quality, or whether the carrier subsidy creates margin drag."
      diligencePath: "Request sample contract with pricing redacted for structure only; ask reference customers for ACV guidance."
      relatedTableRefs: [TI002]

    - type: missing-source
