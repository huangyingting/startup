callouts:
  - calloutType: strength
    title: "Unicorn with Deep Enterprise Penetration"
    body: >
      FourKites has achieved unicorn status ($1B+ valuation) with 1,600+ enterprise customers
      including 9 of the top-10 CPG companies, underpinned by the world's largest real-time
      supply chain carrier network. Seven consecutive FreightTech 25 awards and four consecutive
      Gartner Magic Quadrant Leader recognitions validate its technology leadership position.
    claimRefs: [CO003, CO009, CO019, CO020]

  - calloutType: risk
    title: "Material Adverse Events: Layoffs, Legal Dispute, and Profitability Uncertainty"
    body: >
      FourKites has undergone two workforce reductions (8% in August 2022 and 15% in 2023),
      a high-profile defamation lawsuit with project44 (now resolved), and leadership reshuffles.
      The CEO has publicly stated a target of zero burn rate, indicating the company is not yet
      profitable. Revenue and ARR are not publicly disclosed, limiting diligence confidence on
      financial health.
    claimRefs: [CO025, CO026, CO027, CO028, CO038, CO039]

  - calloutType: insight
    title: "Platform Expansion from Visibility to Autonomous AI Execution"
    body: >
      FourKites' 2026 launch of Loft marks a deliberate pivot from passive freight tracking
      toward autonomous AI-driven supply chain execution. This expands both the addressable
      market and competitive set, with the company now competing beyond RTTV specialists to
      broader supply chain automation platforms and enterprise AI providers.
    claimRefs: [CO030, CO031, CO049, CO050]

