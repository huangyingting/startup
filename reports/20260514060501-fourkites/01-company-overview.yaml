company:
  name: FourKites
chapter:
  number: 1
  title: Company Overview
  summary: >
    FourKites is a Chicago-based AI supply chain visibility platform founded in 2014 by Mathew
    Elenjickal, tracking over 3.2 million shipments daily across 200-plus countries for more
    than 1,600 global brands. Having raised approximately $400 million—including a $200 million
    Series E at a $1 billion valuation in June 2022—the company has evolved from a freight
    tracking tool into an AI-powered Intelligent Control Tower, while navigating material
    headwinds including workforce reductions and a resolved legal dispute with rival project44.

sections:
  - id: identity-and-business-model
    title: Identity and Business Model
    body: >
      FourKites, Inc. was founded in 2014 by Mathew (Matt) Elenjickal, who developed the idea
      for the company from his time as a supply chain consultant at Oracle, where he observed
      that large enterprises chronically lacked basic freight visibility. Incorporated in Delaware
      and headquartered in Chicago, Illinois at 500 W. Madison Street, FourKites pioneered the
      real-time transportation visibility (RTTV) category by enabling shippers and logistics
      providers to track freight across all modes—road, rail, ocean, air, and parcel—with
      dynamic estimated times of arrival powered by machine learning. The company's business
      model is a software-as-a-service (SaaS) subscription platform sold to enterprise shippers,
      third-party logistics providers (3PLs), and carriers. As of 2026, FourKites has rebranded
      its value proposition as an "AI Supply Chain Orchestration" platform centered on its
      Intelligent Control Tower—combining real-time data from its massive carrier network, a
      continuously updated digital twin of each customer's operations, and AI-powered Digital
      Workers (branded Loft) that automate logistics workflows including exception management,
      appointment scheduling, document processing, and customer communications. The platform
      formerly operated under the name CloudQwest, Inc., before becoming FourKites. By operating
      in logistics, finance, procurement, and customer service, FourKites positions its
      addressable scope well beyond traditional freight visibility.
    claimRefs: [CO001, CO002, CO003, CO004, CO030, CO031, CO032, CO033]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: leadership-and-governance
    title: Leadership and Governance
    body: >
      FourKites is led by founder Mathew Elenjickal as Chief Executive Officer, who has held
      that role continuously since the company's founding. The executive team as of 2026 includes
      Priya Rajagopalan as President of Product, Technology, and Operations; Ron Richardson as
      Chief Revenue Officer; Bill Maw as Chief Financial Officer; Sriram Nagaswamy as Executive
      Vice President of Technology; Chris Brown as Executive Vice President of People; and
      Michelle Meller as General Counsel. The company experienced notable leadership turbulence
      in 2023: Rocky Subramanian, who had joined as President, departed, and Rajagopalan assumed
      the role of Chief Customer Officer before later returning to the President title; Glenn
      Koepke, Vice President of Strategy, departed alongside the 15 percent workforce reduction.
      The board of directors includes venture capital representatives from each major investor:
      Ajay Agarwal (Managing Director, Bain Capital Ventures), Eric Carlborg (General Partner,
      August Capital), Gaurav Mittal (Managing Director, Thomas H. Lee Partners), Ira Weiss
      (Professor and VC), Joe Beatty (Advisor), and Jai Shekhawat (Founder and former CEO of
      Fieldglass). Samuel Rives and Mike Kaczmarek also appear in SEC filings as officers.
      The founder-led structure and multiple board seats held by external investors create a
      governance dynamic typical of late-stage venture-backed companies. Key-person dependency
      on Elenjickal is a material risk given his dual role as founder and sole public face of the
      company's vision and market positioning.
    claimRefs: [CO011, CO012, CO013, CO014, CO015, CO017, CO025, CO026, CO027, CO028, CO041, CO042]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding-and-investors
    title: Funding History and Investor Backing
    body: >
      FourKites has completed eight documented funding rounds, raising a total of approximately
      $400 million in equity capital. The most significant was a $200 million Series E closed in
      June 2022, led by Thomas H. Lee Partners at a reported valuation of approximately $1 billion,
      making FourKites a unicorn. The Series E closed on June 13, 2022, per SEC records. In
      August 2022—shortly after laying off approximately 60 employees—FourKites filed an
      additional Form D with the SEC, disclosing a $30 million raise as part of a new round that
      the company targeted at $80 million; TechCrunch reported that part of this capital came from
      FedEx as part of a strategic alliance announced in June 2022. Also in October 2022, Mitsui
      & Co. made a $10 million strategic investment to fund FourKites' expansion across Asia-Pacific,
      with MKI designated as exclusive Japanese reseller. Earlier investors include Bain Capital
      Ventures, August Capital, 8VC, Qualcomm Ventures, and other institutional venture funds.
      The company stated in late 2022 that its fundraising focus was shifting from growth-at-any-cost
      to profitability, reflecting broader macroeconomic pressure on venture-backed supply chain
      startups. Revenue and ARR figures are not publicly disclosed; FourKites remains a privately
      held company with no obligation to report financials. The path to profitability remains
      unclear from public evidence, representing a material evidence gap for investors.
    claimRefs: [CO003, CO004, CO005, CO006, CO035, CO036, CO037, CO038, CO039, CO043, CO044]
    tableRefs: [TO003]
    figureRefs: []

  - id: scale-and-traction
    title: Scale, Network, and Customer Traction
    body: >
      FourKites operates what it describes as the world's largest real-time supply chain data
      network. As of 2026, it tracks over 3.2 million shipments daily across 200-plus countries
      and territories, with more than 1.1 million connected carriers and coverage of 98 percent
      of global ocean traffic. The customer base has grown from the company's first customer,
      Smithfield Foods, in 2014-2015 to more than 1,600 global brands as of 2026, including 9
      of the top-10 consumer packaged goods companies and 18 of the top-20 food and beverage
      companies. Customers include Best Buy, Dow, Coca-Cola, AB InBev, Walmart, SpaceX, Chevron,
      American Eagle Outfitters, Bacardi, and Molson Coors. The company reported nearly 50 percent
      year-over-year growth in 2022, including 70 percent new customer growth, 46 percent growth
      in total shipments, and 80 percent YoY growth in ocean customers. In Europe, FourKites
      reported 2x shipment growth and 40 percent new customer growth in 2022; in Asia-Pacific,
      240-plus percent shipment growth and 91 percent new customer growth. G2, the software review
      platform, rates FourKites 4.5 out of 5 stars based on 269 verified reviews as of 2026,
      with users praising real-time tracking and ease of use, while noting carrier compliance as
      an area of improvement. FourKites has 475 to 500 employees globally across offices in
      Chicago, Amsterdam, Munich, Chennai, and Singapore.
    claimRefs: [CO007, CO008, CO009, CO010, CO016, CO018, CO019, CO029, CO040, CO045, CO046, CO047]
    tableRefs: []
    figureRefs: [FO002]

  - id: milestones-and-innovation
    title: Key Milestones and Innovation Timeline
    body: >
      FourKites' evolution spans twelve years of continuous product expansion, from a basic
      full-truckload tracker in 2014 to a multimodal AI orchestration platform in 2026. Core
      milestones include the 2016-2017 expansion into LTL, rail, and parcel tracking; the 2018
      launch of Advanced Analytics; the 2019 introduction of the machine-learning-powered Dynamic
      ETA algorithm; and the 2020 launch of Dynamic Yard (next-generation YMS), multimodal
      purchase order tracking, and expanded ocean and air tracking. In 2021, FourKites acquired
      Haven Inc. to launch Dynamic Ocean and acquired NIC-place in Europe to create the
      continent's largest multimodal carrier network. The June 2022 Series E funded accelerated
      growth, and FourKites formed a strategic FedEx alliance and received ISO 27001 certification
      that same year. The 2023 period brought Fin AI (generative AI interface), Carrier Connect,
      Data Connector, and Inbound Visibility as new features. In 2024, FourKites earned its
      seventh consecutive FreightTech 25 award and its fourth consecutive Gartner Magic Quadrant
      Leader recognition. In 2025, FourKites announced AI Digital Workers forming the backbone
      of its Intelligent Control Tower. In early 2026, the company commercially launched Loft,
      its AI-native platform enabling enterprises to build and deploy autonomous supply chain
      agents in days rather than months. The overall trajectory demonstrates consistent innovation
      leadership, even as the workforce reduction and leadership reshuffles in 2022-2023 flagged
      financial discipline challenges.
    claimRefs: [CO020, CO021, CO022, CO023, CO024, CO025, CO026, CO048, CO049, CO050]
    tableRefs: [TO004]
    figureRefs: [FO001]

