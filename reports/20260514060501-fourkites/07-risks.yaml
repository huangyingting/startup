figures:
  - id: FR001
    title: Risk heatmap
    type: matrix
    description: "Risk severity matrix plotting FourKites' key risks by likelihood versus business impact."
    layout: wide
    claimRefs: [CR001, CR002, CR003, CR004, CR005]
    data:
      columns: ["Low Impact", "Medium Impact", "High Impact"]
      rows:
        - label: "High Likelihood"
          values:
            - label: "(few risks here)"
              tone: neutral
              detail: "High-likelihood, low-impact risks are routine operational issues."
            - label: "Loft AI error rate at scale; carrier non-compliance in SMB accounts"
              tone: risk
              detail: "High likelihood operational risks with manageable medium impact if mitigated by Human-in-the-Loop workflows."
            - label: "Carrier compliance dependency on small truckers; competitive pricing pressure from SAP/Oracle TMS bundles"
              tone: risk
              detail: "High-likelihood, high-impact risks requiring active mitigation. Carrier compliance is the #1 customer complaint and directly erodes core product value. SAP/Oracle TMS bundling risk grows as enterprise customers reduce vendor count."
        - label: "Medium Likelihood"
          values:
            - label: "Mid-market expansion failure; technical debt slowing velocity"
              tone: neutral
              detail: "Medium-likelihood, low-impact risks. Mid-market failure is strategically limiting but does not impair the core Fortune 500 business."
            - label: "CEO departure; Mitsui partnership strain; CCPA/state privacy compliance gaps; talent attrition post-layoffs"
              tone: risk
              detail: "Medium-likelihood, medium-impact risks. Each is manageable individually but concurrent occurrence would be severe. CEO key-person risk is structural given lack of named successor."
            - label: "Down-round financing; GDPR enforcement action; project44 poaches 3+ anchor Fortune 500 accounts; AWS service disruption"
              tone: risk
              detail: "Medium-likelihood, high-impact risks. A down-round at $400–600M would impair employee morale, talent retention, and customer confidence. GDPR enforcement could trigger enterprise customer review clauses."
        - label: "Low Likelihood"
          values:
            - label: "IP patent troll exposure; AIS spoofing affecting ocean ETAs"
              tone: positive
              detail: "Low-likelihood, low-impact risks. Manageable through standard enterprise legal posture."
            - label: "FedEx investor conflict of interest crystallizing; Rocky Subramanian-equivalent leadership gap"
              tone: neutral
              detail: "Low-likelihood, medium-impact risks. FedEx investment alignment misalignment is possible but would likely surface in board dynamics before customer impact."
            - label: "Major customer data breach; OFAC sanctions violation via supply chain data; SEC securities disclosure irregularity; Elenjickal second legal incident"
              tone: risk
              detail: "Low-likelihood but high-severity risks. These are tail risks that would be immediately material to IPO prospects and Fortune 500 customer trust. Due diligence should explicitly clear each."

