  researchQuestions:
    - id: QR001
      type: enumeration
      question: "What legal proceedings involving FourKites are documented in public sources as of May 2026?"
      targets: ["contentRequirements/1"]
      status: answered
      answer: "Two legal proceedings resolved Aug 2022: (1) FourKites sued project44 for employee poaching; (2) project44 sued FourKites CEO Elenjickal for defamatory emails sent under pseudonyms to project44 investors. Both resolved amicably with no disclosed financial terms. No other litigation was found."
      sourceRefs: [SR001, SR003]
      claimRefs: [CR001]

    - id: QR002
      type: adverse
      question: "What is the governance risk from the CEO defamatory email incident with project44?"
      targets: ["contentRequirements/1"]
      status: answered
      answer: "Elenjickal allegedly sent emails under pseudonyms to project44 board members alleging financial misconduct. Illinois court found such emails 'can harm reputation.' Governance risk: pre-IPO disclosure of CEO misconduct history; no public board response to establish conduct governance framework post-incident."
      sourceRefs: [SR001, SR002, SR003]
      claimRefs: [CR001, CR002]

    - id: QR003
      type: verification
      question: "Has FourKites been subject to any GDPR enforcement actions or data privacy fines?"
      targets: ["contentRequirements/1"]
      status: answered
      answer: "No GDPR enforcement actions against FourKites were found in public sources. FourKites has not published a GDPR compliance statement, DPA processing agreement, or Privacy Shield/SCCs documentation. Absence of enforcement does not confirm compliance."
      sourceRefs: [SR022, SR010]
      claimRefs: [CR003]

    - id: QR004
      type: quantification
      question: "What is FourKites' current cash burn rate and estimated cash runway as of May 2026?"
      targets: ["contentRequirements/4"]
      status: unresolved
      answer: null
      sourceRefs: [SR007]
      claimRefs: []

    - id: QR005
      type: quantification
      question: "What were the headcount reductions in 2022 and 2023, and what was their rationale?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "2022: ~60 employees (~8%) laid off in August 2022 (TechCrunch, Supply Chain Dive confirmed). Rationale: post-pandemic growth normalization. 2023: ~15% global workforce reduction; CEO stated 'near-zero burn' target. 2023 figure from FreightWaves. Total: approximately 23% of workforce reduced in 2 years."
      sourceRefs: [SR004, SR005, SR006]
      claimRefs: [CR004, CR005]

    - id: QR006
      type: verification
      question: "Is FourKites SOC 2 Type II certified or ISO 27001 certified as of 2026?"
      targets: ["contentRequirements/2"]
      status: unresolved
      answer: null
      sourceRefs: [SR010]
      claimRefs: []

    - id: QR007
      type: adverse
      question: "What is the carrier compliance failure rate and how does it affect customer outcomes?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "Carrier compliance failure is the #1 customer complaint across G2 (269 reviews, 4.5/5), Gartner Peer Insights, Capterra, and TrustRadius. When carriers don't provide electronic tracking, FourKites' real-time ETA value proposition collapses. FourKites does not publish a system-wide carrier compliance rate. The Premier Carrier program is designed to address this but covers only the carrier tier that already complies."
      sourceRefs: [SR016, SR017, SR015]
      claimRefs: [CR010, CR011]

    - id: QR008
      type: quantification
      question: "What is FourKites' current estimated ARR or revenue run-rate as of 2025-2026?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "No current ARR is publicly disclosed. CBInsights estimated 2021 ARR at ~$65M. FourKites raised at $1B valuation (June 2022) implying ~15x forward ARR multiple typical of 2022 peaks — suggesting ~$65-80M ARR at time of raise. Current ARR requires diligence request. No proxy data found beyond the 2021 estimate."
      sourceRefs: [SR007, SR008, SR009]
      claimRefs: [CR006]

    - id: QR009
      type: verification
      question: "Is project44 a material competitive threat to FourKites' Fortune 500 customer base?"
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Yes. project44 and FourKites target identical Fortune 500 CPG/F&B/retail accounts. The 2022 legal dispute (employee poaching + defamatory emails) demonstrates competitive intensity. project44 raised $420M+ at $2.7B valuation (2021 Series F). project44 has stronger European footprint; FourKites is stronger in North American CPG. Both are in Gartner Real-Time Visibility MQ."
      sourceRefs: [SR013, SR014, SR015]
      claimRefs: [CR013]

    - id: QR010
      type: adverse
      question: "Could SAP or Oracle native TMS visibility modules displace FourKites in existing accounts?"
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Yes, this is a medium-term risk. SAP TM and Oracle TMS both have native shipment tracking modules. Large enterprises already on these platforms have incentive to consolidate vendors. FourKites' defense is deeper real-time visibility (vs batch ERP data), carrier network breadth (1.1M+), and Loft AI capabilities. SAP and Oracle cannot easily replicate FourKites' carrier compliance tooling. But if SAP/Oracle acquires a standalone visibility provider, the risk escalates."
      sourceRefs: [SR013, SR014]
      claimRefs: [CR013, CR014]

    - id: QR011
      type: quantification
      question: "How much cash did FourKites raise in total and what is the implied funding gap since June 2022?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "FourKites raised ~$430M total across 8 rounds (Seed through Series E, plus $10M Mitsui, $30M FedEx D-1). Last disclosed round: $200M Series E (June 2022). As of May 2026, 47 months without new disclosed financing. No IPO or M&A announced. This is a significant financing gap for a $1B-valued private SaaS company."
      sourceRefs: [SR007, SR008, SR009, SR024]
      claimRefs: [CR007]

    - id: QR012
      type: mechanism
      question: "How does FourKites' Premier Carrier program reduce carrier compliance risk?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "The Premier Carrier program recognizes carriers with consistently high FourKites tracking compliance. Carriers with 2+ consecutive Premier periods see 22% volume growth per 6-month period from FourKites customer network. This creates a behavioral incentive: carrier compliance → more business. The program is FourKites' primary structural mitigation for carrier non-compliance."
      sourceRefs: [SR016, SR017]
      claimRefs: [CR011]

    - id: QR013
      type: verification
      question: "Is Mitsui/MKI the exclusive distributor for all APAC or only Japan?"
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Mitsui/MKI is described as the exclusive reseller for Japan specifically, not all APAC. The $10M strategic investment (2022) accompanied the Japan-exclusive reseller agreement. FourKites' APAC coverage outside Japan may be through direct sales, but no named APAC regional sales leadership was found in public sources."
      sourceRefs: [SR018, SR019]
      claimRefs: [CR018]

    - id: QR014
      type: adverse
      question: "Are there any documented customer supply chain disruptions or operational failures attributable to FourKites platform errors?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "No documented customer supply chain disruptions attributable to FourKites platform failures were found in public sources. The 13% exception rate in the US Cold Storage Loft pilot is the only quantified error signal. Platform uptime SLA is not disclosed. No public incident reports or status page findings were found."
      sourceRefs: [SR015, SR016]
      claimRefs: [CR012]

    - id: QR015
      type: quantification
      question: "What is FourKites' current headcount and total employee count as of 2026?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "Pre-2022: ~700 employees. After 2022 cut (~8%) and 2023 cut (~15%): approximately 500-550 employees. Builtin.com profile confirms ~500 employees as of 2026. No precise figure published."
      sourceRefs: [SR020, SR021]
      claimRefs: [CR025]

    - id: QR016
      type: enumeration
      question: "What data privacy regulations apply to FourKites' operations across its customer geographies?"
      targets: ["contentRequirements/1"]
      status: answered
      answer: "EU: GDPR (location data of carriers = personal data in some jurisdictions); UK: UK DPA 2018; US: CCPA (California, 2020), CPRA (2023), 17+ US states; China: PIPL (2021) requires data localization for Chinese citizen data; Russia: Federal Law No. 242-FZ requires server localization; India: PDPB pending. Key risk: FourKites processes driver location data for EU carriers, which may qualify as GDPR-sensitive."
      sourceRefs: [SR022, SR023, SR010]
      claimRefs: [CR003, CR008]

    - id: QR017
      type: verification
      question: "Has FourKites made any public cybersecurity disclosures, SOC reports, or security commitments?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "No public SOC 2 Type II report, ISO 27001 certificate, or security scorecard was found in public sources. StackShare shows technology stack (AWS, Java, PostgreSQL, React). No bug bounty program, security advisory page, or penetration test disclosure was found. For enterprise customers, SOC 2 is a standard procurement requirement; absence of public disclosure does not mean absence of certification."
      sourceRefs: [SR012, SR011]
      claimRefs: [CR009]

    - id: QR018
      type: comparison
      question: "How does FourKites' financial risk profile compare to publicly-traded Descartes Systems?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "Descartes (DSGX): $729M FY2024 revenue, 77% gross margin, 29% operating margin, public company. FourKites: ~$65M+ ARR (2021 est.), private, unknown margin. Descartes' profitability demonstrates the supply chain SaaS model can achieve strong margins at scale. FourKites' inability to reach comparable margins (implied by 2023 near-zero burn target) suggests it has not yet achieved Descartes-level operational leverage."
      sourceRefs: [SR024, SR025]
      claimRefs: [CR007]

    - id: QR019
      type: adverse
      question: "What signals suggest FourKites may be struggling to reach profitability?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "Signals: (1) Two layoff rounds (2022: 8%, 2023: 15%) totaling ~23% workforce; (2) CEO 'near-zero burn' statement 2023 indicates significant pre-reduction burn; (3) No funding round disclosed in 47 months; (4) G2 review cadence slowing (no new reviews for 2 months as of Feb 2026) suggests slower customer acquisition. Mitigating signals: Loft AI upsell opportunity for ACV expansion within existing base."
      sourceRefs: [SR004, SR005, SR006, SR007]
      claimRefs: [CR004, CR005, CR006]

    - id: QR020
      type: verification
      question: "Does FedEx's strategic investment create a conflict of interest in FourKites' carrier network neutrality?"
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Structurally yes: FedEx is a $30M strategic investor (Series D-1) AND a carrier on the FourKites network competing with independent carriers. However, no public evidence of FedEx receiving preferential treatment on the platform was found. Enterprise customers who use both FedEx and independent carriers may perceive a neutrality concern. FourKites has not issued a carrier-neutrality governance statement."
      sourceRefs: [SR018, SR019]
      claimRefs: [CR019]

    - id: QR021
      type: enumeration
      question: "What NIST cybersecurity framework risks apply to FourKites as a supply chain data platform?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "NIST RMF Categories for FourKites: Identify (asset inventory of carrier data feeds), Protect (access controls for Fortune 500 supply chain data), Detect (anomaly detection for carrier data spoofing or API abuse), Respond (incident response for data breach), Recover (business continuity for platform outages). Supply chain software is designated a Critical Infrastructure Sector by CISA. FourKites as supply chain infrastructure is subject to NIST SP 800-161 supply chain risk management."
      sourceRefs: [SR022, SR023]
      claimRefs: [CR008]

    - id: QR022
      type: freshness
      question: "What are the most recent disclosed risk events at FourKites in 2025-2026?"
      targets: ["contentRequirements/0"]
      status: answered
      answer: "2025: No new legal, financial, or regulatory incidents found. 2026: No new risk events. The most recent adverse signals are: (1) G2 review cadence deceleration (Feb 2026); (2) No new funding disclosed (47 months running); (3) Loft AI 13% exception rate in USCS pilot (Oct 2025). No new material risk events found in 2025-2026."
      sourceRefs: [SR005, SR006, SR007]
      claimRefs: [CR027]

    - id: QR023
      type: adverse
      question: "What is the risk that Loft AI Digital Workers fail to meet enterprise expectations at scale?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "High likelihood of adoption friction: (1) Enterprise AI deployment is typically 6-18 months for full production; (2) 13% exception rate at USCS implies human oversight required at scale; (3) Only 2 named Fortune 500 deployments after 3 months post-launch; (4) Coca-Cola outcome (customer service only) is narrower than core supply chain tracking value. Risk: Loft is a growth thesis driver but monetization timeline is uncertain."
      sourceRefs: [SR015, SR016]
      claimRefs: [CR028, CR029]

    - id: QR024
      type: verification
      question: "Is FourKites at risk of a down-round in its next financing event?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "The $1B valuation (June 2022) was set at SaaS peak multiples (~15x ARR). As of 2026, comparable public SaaS multiples are 5-7x revenue. For FourKites to maintain a $1B valuation in 2026, it would need to demonstrate ~$140-200M ARR. CBInsights estimated $65M ARR in 2021. Even with 20% CAGR, 2026 ARR would be ~$160M — a plausible range. Down-round risk is real but not certain; depends on execution of Loft upsell and NRR."
      sourceRefs: [SR024, SR025, SR009]
      claimRefs: [CR007, CR030]

    - id: QR025
      type: mechanism
      question: "How do FourKites' switching costs function as a risk mitigation for competitive displacement?"
      targets: ["contentRequirements/5"]
      status: answered
      answer: "Switching costs: (1) carrier compliance programs take 6-12 months to fully build with FourKites' CS team; (2) IdeaExchange engagement means internal champions depend on FourKites' roadmap; (3) custom integrations with TMS/ERP via FourKites API require re-engineering; (4) Loft Digital Workers with trained SOPs create process-level lock-in; (5) historical ETA performance data and carrier scorecards are proprietary to FourKites. These create high switching cost that project44 cannot easily neutralize through price competition alone."
      sourceRefs: [SR013, SR014, SR017]
      claimRefs: [CR014, CR015]

    - id: QR026
      type: adverse
      question: "What is the risk that FourKites' 1,600+ brand customer count is overstated or declining?"
      targets: ["contentRequirements/4"]
      status: answered
      answer: "No evidence of customer count decline found. The figure is company-stated; no independent verification exists. G2 review cadence deceleration (2 months without new review as of Feb 2026) is a weak adverse signal. FourKites has used the '1,600+' figure consistently from 2022 Series E through May 2026 — the lack of update to a higher number may itself indicate limited net new customer growth."
      sourceRefs: [SR015, SR007]
      claimRefs: [CR027]

    - id: QR027
      type: enumeration
      question: "What are the kill criteria for the FourKites investment thesis?"
      targets: ["contentRequirements/5"]
      status: answered
      answer: "Thesis breakers: (1) NRR confirmed below 90% in diligence; (2) Cash runway below 12 months; (3) ≥3 Fortune 500 anchor customers publicly defect to project44 or SAP native; (4) Material GDPR enforcement action; (5) Second CEO misconduct incident; (6) Loft AI causing supply chain disruption at named Fortune 500; (7) Down-round at valuation below $500M. Any one of these would require significant diligence re-assessment."
      sourceRefs: [SR007, SR001, SR013]
      claimRefs: [CR030, CR031, CR032]

    - id: QR028
      type: comparison
      question: "How does FourKites' risk profile compare to project44 as a category peer?"
      targets: ["contentRequirements/3"]
      status: answered
      answer: "project44 risk profile: $420M+ raised (last round 2021, also aging); similar governance challenges; German-founded with better EU regulatory posture; broader customer definition (30K+ vs 1,600+); similar carrier compliance dependency. FourKites advantage: deeper Fortune 500 CPG/F&B lock-in; Loft AI differentiation; CEO is founder (stronger vision but also key-person risk). Both companies face the same competitive and financial timing risks in 2025-2026."
      sourceRefs: [SR013, SR014]
      claimRefs: [CR013]

    - id: QR029
      type: freshness
      question: "Are there any 2026 risk events or signals beyond those already documented?"
      targets: ["contentRequirements/0"]
      status: answered
      answer: "New 2026 risk signals: (1) Inventory Twin and Booking Connect expansion (May 2026) indicate continued R&D investment despite unknown burn — positive for product but adds cost; (2) Three advisory board launches (2025) indicate customer engagement investment cost; (3) No new funding round, IPO filing, or M&A announced through May 2026. Overall risk posture is unchanged from late 2023: cost-conscious but still investing in growth via AI platform."
      sourceRefs: [SR006, SR007]
      claimRefs: [CR027]

    - id: QR030
      type: adverse
      question: "Is there IP litigation risk from Descartes' acquisition of MacroPoint (FourKites competitor)?"
      targets: ["contentRequirements/1"]
      status: answered
      answer: "No evidence of IP litigation between Descartes/MacroPoint and FourKites was found. Descartes acquired MacroPoint in 2017. MacroPoint and FourKites both hold freight visibility patents. No patent infringement claims were found in public court records. The risk is latent: if Descartes chooses to monetize MacroPoint IP defensively, FourKites' 27+ patents provide a deterrent but not immunity."
      sourceRefs: [SR013, SR025]
      claimRefs: [CR016]

    - id: QR031
      type: verification
      question: "Has FourKites disclosed any SEC formal investigations, FINRA actions, or securities enforcement related to its fundraising?"
      targets: ["contentRequirements/1"]
      status: answered
      answer: "No SEC formal investigations or FINRA enforcement actions against FourKites were found. EDGAR Form D filings for FourKites appear complete and consistent with disclosed round sizes. The Series D-1 (FedEx, $30M at $12/share) was unusual for a private round but was properly disclosed on EDGAR."
      sourceRefs: [SR026, SR010]
      claimRefs: [CR017]

    - id: QR032
      type: mechanism
      question: "What mitigations does FourKites have in place for AWS infrastructure concentration risk?"
      targets: ["contentRequirements/5"]
      status: answered
      answer: "No public multi-cloud strategy or disaster recovery plan was found. FourKites' AWS Marketplace listing confirms deep AWS integration. Enterprise SaaS typically has active-active or active-passive DR using AWS regions. The absence of a disclosed multi-cloud strategy does not mean absence of regional DR, but cannot be confirmed from public sources."
      sourceRefs: [SR011, SR012]
      claimRefs: [CR021]

