  evidenceGaps:
    - id: EGP001
      type: private-evidence-only
      severity: material
      topic: pricing-packaging-comparison
      missingEvidence: >
        Neither FourKites nor project44 publicly discloses enterprise contract pricing, list prices, or
        per-module add-on rates. Indicative ranges ($100K-$1M+ ARR) are derived from review platform
        disclosures and analyst estimates, not confirmed contract data.
      whyItMatters: >
        Without verified pricing data, it is impossible to assess FourKites' revenue per customer, pricing
        power relative to project44, or the precise magnitude of Oracle/SAP's bundled pricing advantage.
        This materially constrains competitive win/loss analysis and unit economics assessment.
      diligencePath: >
        Request FourKites and project44 contract pricing schedules and sample MSAs in formal due-diligence.
        Review customer references for actual ACV ranges. Cross-check with Gartner Magic Quadrant peer data.
      relatedQuestionRefs:
        - QP013
        - QP014
      relatedTableRefs:
        - TP003

    - id: EGP002
      type: private-evidence-only
      severity: material
      topic: project44-revenue
      missingEvidence: >
        project44's ARR, revenue growth rate, gross margin, and current cash position are not publicly
        disclosed. The company has not filed for an IPO and does not publish financial statements.
      whyItMatters: >
        Without project44's financials, it is difficult to assess the sustainability of its $840M+ funding
        spend, the ROI of its three acquisitions, or the competitive engineering intensity it can sustain.
      diligencePath: >
        Request project44's audited financials and ARR metrics through investment banker channel. Commission
        a primary survey of enterprise procurement contacts for RTTV contract values and renewal patterns.
      relatedQuestionRefs: []

    - id: EGP003
      type: missing-source
      severity: minor
      topic: shippeo-post-acquisition-strategy
      missingEvidence: >
        Shippeo's strategic roadmap, funding level under Greenbriar ownership, and product investment
        direction are not publicly documented. Pre-acquisition product pages are the primary source.
      whyItMatters: >
        PE ownership typically targets exit within three to five years; Shippeo may pursue a strategic sale
        to a logistics incumbent (Descartes, Oracle) or US expansion that would intensify FourKites competition.
      diligencePath: >
        Monitor Shippeo press releases, LinkedIn hiring patterns, and European freight trade publications
        for product and partnership announcements signaling geographic or capability expansion.
      relatedQuestionRefs: []

    - id: EGP004
      type: private-evidence-only
      severity: material
      topic: competitive-win-loss-rate
      missingEvidence: >
        No publicly available data on FourKites' head-to-head win/loss rate against project44. G2 and
        TrustRadius reviews contain qualitative comparisons but no structured competitive displacement data.
      whyItMatters: >
        Win/loss rates against project44 are the most direct leading indicator of whether FourKites'
        competitive moat is holding or eroding as project44 scales its AI platform.
      diligencePath: >
        Request FourKites CRM win/loss data by competitor and deal stage. Conduct reference checks with
        five to ten prospects that evaluated both vendors within the last 24 months.
      relatedQuestionRefs: []

