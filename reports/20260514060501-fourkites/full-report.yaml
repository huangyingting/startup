      - number: '6.3'
        title: Named Customer Proof and Reference Quality
        blocks:
          - type: paragraph
            body: >
              FourKites' named customer proof is concentrated in CPG and F&B Fortune 500 brands. The highest-quality
              proof points are those with measurable outcome data. US Cold Storage's Loft pilot (Oct 2025) delivered:
              87% success rate in booking appointments, 96% accuracy in securing requested delivery dates, 600+
              shipments processed in 8 weeks, 150 appointments simultaneously vs sequential manual processing, and 36–40
              hours saved during the pilot. Coca-Cola deployed the Tracy Digital Worker for customer service (response
              time from 90 minutes to seconds). Large CPG companies deployed Polly for automated proof-of-delivery
              collection. These are the only outcome-quantified case studies found; most named references (Walmart,
              Cardinal Health, Dow, Chevron, Best Buy) are cited as customers without published ROI metrics. The
              vertical advisory boards (CPG, F&B, Manufacturing — totaling 25 Fortune 500 supply chain executives) serve
              as implicit reference signals: these executives have agreed to publicly associate their company brands
              with FourKites' product direction. The Golden Kite Awards (annual customer excellence recognition program)
              generate additional customer proof via award submission stories. Reference quality is high for flagship
              customers but the breadth of published case study evidence is limited; most proof remains in customer
              conversations rather than public documents. FourKites' first customer, Smithfield Foods, demonstrates 10+
              year retention — the strongest evidence of long-term account durability available.
            claimRefs: []
          - type: table
            tableRef: TU003
            claimRefs:
