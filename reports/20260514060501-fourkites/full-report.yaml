      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The most powerful structural growth driver for the RTTV and SCV market is OTIF compliance pressure from
              large retailers. Walmart introduced OTIF fines in 2017 and has progressively tightened standards; similar
              programs exist at Target, Kroger, and Amazon. Visibility platforms provide the most direct ROI path for
              shippers facing these mandates: FourKites customers report 15-to-1 ROI through detention cost reduction,
              improved OTIF rates, and lower carrier rate premiums. Post-COVID supply chain resilience investment
              represents a second structural driver: the 2020-2021 pandemic revealed catastrophic visibility gaps in
              most enterprise supply chains, and board-level attention elevated supply chain technology investment
              across verticals. The 2025 U.S. tariff cycle (Trump administration universal tariffs and sector-specific
              levies imposed in Q1-Q2 2025) is creating a new driver specific to the current period: companies are
              actively shifting trade lanes, re-routing shipments, near-shoring production, and adding new carrier
              relationships—all of which require enhanced multi-modal real-time visibility. ESG and Scope 3 emissions
              tracking represents a growing compliance driver, particularly for European customers under the EU
              Corporate Sustainability Reporting Directive (CSRD) which began phased enforcement in 2024-2025. FourKites
              added carbon tracking capabilities to its platform to address this driver. The most significant adoption
              constraints are carrier compliance rates and TMS incumbency. When carriers fail to provide GPS or ELD
              updates, visibility breaks down; FourKites has invested in predictive ETA algorithms to compensate, but
              the gap remains a material limitation. Incumbent TMS vendors (SAP TM, Oracle OTM, Blue Yonder, e2open) are
              actively adding native visibility modules, which narrows the feature differentiation between standalone
              RTTV platforms and bundled TMS products. Budget compression in 2022-2024 following the post-COVID supply
              chain investment wave created headwinds; FourKites' own 2023 layoffs signal that growth rates slowed
              materially.
