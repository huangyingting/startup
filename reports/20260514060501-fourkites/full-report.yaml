            tableRef: TI004
            claimRefs: []
      - number: '4.4'
        title: Financial Comparables and Industry Benchmarks
        blocks:
          - type: paragraph
            body: >-
              Because FourKites does not report financial results, comparable public companies provide context for what
              financially healthy enterprise supply chain SaaS looks like. Descartes Systems Group (NASDAQ: DSGX) is the
              most directly comparable public company — a logistics software platform with subscription SaaS revenue
              from carrier connectivity, customs compliance, routing, and transportation visibility. In its fiscal year
              ending January 2024, Descartes reported revenue of $728.99 million (11.98% year-over-year growth), gross
              profit of $561.93 million (gross margin 77.1%), operating income of $209.98 million (operating margin
              28.8%), and net income of $163.77 million (net margin 22.5%). Descartes trades at approximately 15–20x
              forward revenue, reflecting the market's view of mission-critical logistics software with high switching
              costs. E2open (ETWO, now private) was another comparable, but it has been taken private and is not
              comparable at current size. For enterprise SaaS benchmarks, OpenView Partners' annual SaaS benchmarks
              report and Chargebee's data indicate that companies growing at 30–50% ARR annually with $50M–$200M ARR
              should target gross margins of 70–80%, CAC payback of 12–24 months, and NRR of 110–130%. At FourKites'
              scale ($65M 2021 revenue, likely $100M+ ARR by 2023), a path to Descartes-like margins (77% gross, 29%
              operating) over a 5–7 year horizon is plausible if carrier-side infrastructure costs are managed and AI
              inference costs do not erode subscription margins. The FourKites business model is capital- efficient in
              customer acquisition (once a customer signs and integrates, switching cost is high) but capital-intensive
              in network building (carrier onboarding, global operations, multimodal infrastructure).
            claimRefs:
              - CI020
              - CI021
              - CI022
              - CI023
              - CI024
              - CI025
