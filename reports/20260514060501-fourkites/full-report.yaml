  - id: TE002
    title: Workflow / use-case table
    description: >-
      Key supply chain user jobs, how FourKites addresses them, measured benefit claims, and known limitations per use
      case.
    columns:
      - User Job
      - Current Workflow (Without FourKites)
      - FourKites Solution
      - Measurable Benefit (Claimed)
      - Key Limitation
    enumerationScope:
      coverage: sample
      basis: >-
        Use cases drawn from official customer success stories, G2/Capterra/Gartner user reviews, and ABI Research
        survey data; full enterprise workflow map has not been independently published.
    notes: >-
      Use cases drawn from official customer success materials, G2/Gartner Peer Insights reviews, and ABI Research
      survey data. Benefit metrics are company-stated claims; no independent validation was found.
    rows:
      - - Track inbound/outbound shipments in real time
        - Manual carrier check-calls, email status updates, TMS polling
        - Continuous GPS/ELD/telematics tracking with 15-min ETA refresh
        - Significant reduction in manual check-calls; higher on-time delivery visibility
        - Carrier compliance gaps create visibility holes for non-integrated carriers
      - - Predict and prevent delivery exceptions
        - React to delays after they occur; manual root-cause analysis
        - Dynamic ETA with 150+ factors; exception alerts before delays materialize
        - Companies with autonomous AI execution prevent detention fees and expedited costs
        - Alert fatigue reported by some users; exception threshold tuning required
      - - Automate dock appointment scheduling
        - Phone/email coordination between carrier and warehouse teams
        - 'Loft Digital Worker: automated dock booking across enterprise scheduling systems'
        - Up to 95% reduction in manual appointment-scheduling tasks (company claim)
        - Requires integration with WMS/yard scheduling system; configuration lead time
      - - Manage carrier follow-up on at-risk shipments
        - Dispatcher calls carriers manually for at-risk loads
        - 'Loft Digital Worker: automated carrier outreach, response logging, escalation'
        - Reduced manual follow-up workload; faster exception resolution
        - Carrier willingness to respond to automated outreach varies; compliance is voluntary
      - - Process ocean freight documentation
        - Manual BOL, customs, and invoice review across email and portals
        - 'Loft Digital Worker: processes messy emails and inconsistent BOLs without standardized formats'
        - Faster document turnaround; reduced manual data entry
        - Complex multi-country customs workflows may require configuration; coverage depth unverified
      - - Generate supply chain performance reports
        - Manual Excel/BI pulls from TMS, WMS, and carrier portals
        - 'FourSight Analytics: cross-modal KPIs from unified data platform'
        - Single source of truth for OTD, dwell, and carrier performance
        - Analytics module pricing and depth vs standalone BI tools not disclosed
