          APIs (ERP, WMS, CRM)
        - >-
          Dependence on external LLM providers introduces model drift risk; Gartner estimates 40% of agentic AI projects
          abandoned by 2027
      - - API / Integration Layer
        - Provides REST API, EDI connectors, and pre-built TMS/ERP integrations
        - SAP, Oracle, Salesforce, JDA/Blue Yonder, Manhattan Associates API contracts
        - >-
          Breaking changes from TMS/ERP vendors require ongoing integration maintenance; carrier EDI mapping is
          carrier-specific
      - - Cloud Infrastructure
        - Multi-tenant SaaS hosting; data storage and processing
        - Hyperscale cloud provider (AWS implied from tech context; not confirmed publicly)
        - Cloud provider outage risk; data residency requirements in EU/APAC may require regional architecture
      - - Developer Portal
        - Enables customer-side integrations and custom application development
        - developer.fourkites.com (REST API docs, sandbox)
        - >-
          Limited public API documentation depth; only 1 public GitHub repo suggests thin developer ecosystem vs
          project44
