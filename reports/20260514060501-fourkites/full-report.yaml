  - id: TV005
    title: Thesis-break and kill triggers table
    description: Conditions that would break the investment thesis at any valuation entry point for FourKites.
    columns:
      - Kill Trigger
      - Description
      - Likelihood (current est.)
      - Early Warning Signal
    claimRefs:
      - CV013
      - CV014
      - CV015
    notes: >-
      Kill triggers represent conditions that would make the investment thesis untenable regardless of entry price.
      Early warning signals are observable before triggers materialize.
    enumerationScope:
      coverage: sample
      basis: >-
        Kill triggers represent the highest-conviction thesis breakers; other adverse scenarios may also be material
        depending on entry price and diligence findings.
    rows:
      - - NRR confirmed below 90%
        - >-
          Net revenue retention below 90% implies the existing customer base is shrinking in revenue terms; FourKites
          must acquire new logos just to maintain ARR
        - Low-medium (possible if pandemic ACV cuts not restored)
        - Declining G2 review volume; lower advisory board participation; customer advisory board executive turnover
      - - Cash runway below 12 months
        - >-
          With no disclosed new funding in 47 months, a cash position below 12 months without a clear financing path
          would indicate distress financing risk
        - Low (cannot assess without private data)
        - Emergency secondary round at deep discount; debt financing announcement; major headcount reduction beyond 2023
      - - Three or more Fortune 500 anchor defections
        - >-
          Loss of 3+ named CPG/F&B Fortune 500 customers (Coca-Cola, Walmart, Cardinal Health tier) to project44 or SAP
          TMS bundle would signal competitive displacement at the highest-value account tier
        - Low-medium (no defections documented)
        - Competitor press releases naming FourKites customers; project44 press releases with CPG/F&B names
      - - Material GDPR enforcement action
        - >-
          GDPR fine of €10M+ or customer data breach requiring suspension of EU data processing would trigger customer
          contract review clauses and reputational damage to Fortune 500 enterprise brand
        - Low
        - EU regulatory investigation disclosure; customer breach notification; supplier security audit failure
      - - Second CEO misconduct incident
        - >-
          A second conduct incident by Elenjickal (similar to 2022 defamatory email case) would likely require board
          intervention, destabilize Fortune 500 customer relationships, and make an IPO or clean M&A exit impossible
        - Low
        - >-
          Media reports on competitor interactions; legal filings; employee Glassdoor complaints mentioning leadership
          conduct
      - - Loft AI supply chain disruption at Fortune 500
        - >-
          A material, publicly documented supply chain disruption caused by Loft Digital Worker error at a named Fortune
          500 customer (FDA recall, missed delivery SLA at CPG scale) would create liability and customer churn risk
        - Low (pilot errors documented; production scale risk higher)
        - >-
          Social media supply chain disruption reports; customer legal claims; news coverage of AI-caused logistics
          failures
  - id: TV006
    title: Final diligence asks table
    description: Prioritized list of diligence requests required to confirm or refute the investment thesis at any entry valuation.
    columns:
      - Priority
      - Diligence Request
      - Why Critical
      - Decision Impact if Unfavorable
    claimRefs:
      - CV016
      - CV017
      - CV018
    notes: >-
      Priority reflects sequence in which diligence items should be addressed: Priority 1 items must be satisfied before
      any others; unfavorable findings at P1 would terminate diligence regardless of P2-P5 findings.
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence asks derived from evidence gaps across all 8 chapters; order reflects sequential decision gates rather
        than exhaustive coverage.
    rows:
      - - P1 — Financial package
        - Audited FY2022-2025 P&L; NRR, GRR, logo churn by year; monthly burn rate; cash balance; ARR cohort waterfall
        - NRR and burn are the two primary inputs to any valuation model; without these, no entry price can be defended
        - NRR <100% or burn >$10M/month without clear profitability path → EXIT diligence
      - - P1 — Loft AI commercial traction
        - >-
          Production deployment count; ACV for Loft vs. tracking-only; pipeline by stage; time-from-pilot-to-production
          average; rejection rate
        - >-
          Loft is the primary growth thesis driver; if adoption is <15 customers with <$5M ARR after 3 months, the
          timeline is longer than the exit window
        - >-
          Loft deployment count <10 or ACV lift <$30K per customer → reduce valuation to base case; reassess at 6-month
          re-check
      - - P2 — Board governance documentation
        - >-
          Full board composition; independent director count and CVs; board charter; conduct governance framework
          post-2022; D&O insurance; Elenjickal retention and compensation terms
        - >-
          CEO governance disclosure is required for IPO S-1 risk factors and M&A buyer diligence; a clean governance
          framework reduces this risk from a showstopper to a historical footnote
        - Absence of any documented conduct governance response post-2022 → significant IPO and clean M&A risk flag
      - - P2 — Top-10 customer contracts
        - >-
          Multi-year contract status for top 10 customers; renewal probability; expansion commitments; any
          customer-initiated review or RFP in last 12 months
        - Top-10 customers likely represent 40%+ of ARR; contract uncertainty at the top is disproportionately impactful
        - Any top-5 customer with <12-month contract remaining and no renewal commitment → concentration risk flag
      - - P3 — Technology and security audit
        - >-
          SOC 2 Type II report; cloud architecture review; Loft AI error rate across all production deployments; API SLA
          and uptime data; GDPR data processing assessment
        - >-
          Enterprise procurement requires SOC 2 certification; absence could trigger customer renewal conditions; GDPR
          non-compliance creates regulatory tail risk
        - >-
          Absent SOC 2 → negotiate certification timeline covenant; absent GDPR DPA → require EU data architecture
          remediation plan with timeline
      - - P3 — Competitive win/loss analysis
        - >-
          Win/loss rates vs. project44 in competitive RFPs (last 24 months); SAP AppHub certification renewal status;
          any customer defection to project44 or SAP TMS in last 24 months
        - >-
          Competitive displacement risk is medium-likelihood at Fortune 500 level; RFP win/loss data is the most direct
          measure of competitive health
        - >-
          Win rate <50% vs. project44 in competitive RFPs → competitive moat weaker than thesis assumes; increase
          discount to valuation
