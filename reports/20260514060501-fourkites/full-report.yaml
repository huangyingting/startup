      nodes:
        - id: R1
          label: Carrier Compliance Failure
          detail: Carriers fail to provide electronic tracking data for FourKites-monitored shipments.
          tone: risk
        - id: R2
          label: ETA Prediction Accuracy Degrades
          detail: Real-time ETA quality falls below customer SLA thresholds when carrier data is unavailable.
          tone: risk
        - id: R3
          label: Customer Value Perception Drops
          detail: Enterprise customers see reduced ROI from FourKites subscription when key lanes are dark.
          tone: risk
        - id: R4
          label: Churn / Contract Non-Renewal
          detail: Customer decides not to renew contract or initiates competitive RFP.
          tone: risk
        - id: R5
          label: ARR Erosion
          detail: Net revenue declines; NRR falls below 100%; growth stalls.
          tone: risk
        - id: R6
          label: Down-Round Risk
          detail: Next financing round priced below $1B valuation; dilution and morale impact.
          tone: risk
        - id: R7
          label: CEO Governance Incident
          detail: Elenjickal second conduct incident (legal, ethical, or reputational) becomes public.
          tone: risk
        - id: R8
          label: Board-Level Intervention
          detail: THL Partners or board calls for CEO management changes or external CEO search.
          tone: risk
        - id: R9
          label: Enterprise Customer Trust Erosion
          detail: Fortune 500 customers freeze expansion budgets or initiate competitive reviews.
          tone: risk
        - id: R10
          label: SAP/Oracle Bundle Displacement
          detail: Large ERP vendor includes native visibility module in TMS suite at lower marginal cost.
          tone: risk
        - id: R11
          label: ICP Saturation + New Logo Drought
          detail: Fortune 500 CPG/F&B near-full penetration; no new name logos to replace churn.
          tone: risk
        - id: R12
