      - number: '1.3'
        title: Funding History and Investor Backing
        blocks:
          - type: paragraph
            body: >
              FourKites has completed eight documented funding rounds, raising a total of approximately $400 million in
              equity capital. The most significant was a $200 million Series E closed in June 2022, led by Thomas H. Lee
              Partners at a reported valuation of approximately $1 billion, making FourKites a unicorn. The Series E
              closed on June 13, 2022, per SEC records. In August 2022—shortly after laying off approximately 60
              employees—FourKites filed an additional Form D with the SEC, disclosing a $30 million raise as part of a
              new round that the company targeted at $80 million; TechCrunch reported that part of this capital came
              from FedEx as part of a strategic alliance announced in June 2022. Also in October 2022, Mitsui & Co. made
              a $10 million strategic investment to fund FourKites' expansion across Asia-Pacific, with MKI designated
              as exclusive Japanese reseller. Earlier investors include Bain Capital Ventures, August Capital, 8VC,
              Qualcomm Ventures, and other institutional venture funds. The company stated in late 2022 that its
              fundraising focus was shifting from growth-at-any-cost to profitability, reflecting broader macroeconomic
              pressure on venture-backed supply chain startups. Revenue and ARR figures are not publicly disclosed;
              FourKites remains a privately held company with no obligation to report financials. The path to
              profitability remains unclear from public evidence, representing a material evidence gap for investors.
