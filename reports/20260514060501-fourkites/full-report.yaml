      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              The primary payer in RTTV and SCV platforms is the enterprise shipper—the company that ships goods from
              factories or distribution centers to customers. Within large enterprises, the budget owner is typically
              the supply chain or logistics Vice President or Senior Director, with the Chief Supply Chain Officer
              (CSCO) or VP of Logistics sponsoring major enterprise platform decisions. IT involvement is required for
              integration with TMS, WMS, and ERP systems, but is rarely the primary budget owner. FourKites has
              demonstrated particularly strong adoption in three enterprise verticals. Consumer Packaged Goods and Food
              and Beverage account for a disproportionate share of its 1,600-brand customer base, with 9 of the 10 top
              CPG companies and 18 of the 20 top food and beverage companies as customers; adoption in these verticals
              is driven by OTIF (On-Time, In-Full) compliance penalties imposed by major retailers (Walmart, Target,
              Kroger), which can run $100,000 or more per major violation for large brands. The Retail segment is both a
              buyer (for inbound freight from suppliers) and a compliance pressure source for CPG shippers. Pharma and
              Life Sciences buyers value temperature compliance and regulatory chain-of-custody documentation.
              Industrial, Automotive, and Chemical buyers value JIT production support and hazmat compliance. 3PL
              providers (UPS Supply Chain, XPO, CH Robinson) are both users—tracking freight on behalf of shipper
              clients— and resellers of FourKites capabilities to their own customers. Carriers (trucking, rail, ocean,
              air) are primarily network participants rather than payers; FourKites offers free or low-cost carrier
              products (CarrierLink) that incentivize data sharing. The adoption trigger for most enterprise buyers is a
              high-profile supply chain disruption (factory fire, port strike, weather event) or an OTIF penalty cycle
              that exceeds the annual software cost. A Food Shippers of America (FSA) survey released jointly with
              FourKites in 2022 found that 75 percent of food industry shippers were "concerned" or "very concerned"
              about supply chain disruptions affecting Q4 2022 performance.
            claimRefs:
