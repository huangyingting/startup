      - number: '1.4'
        title: Scale, Network, and Customer Traction
        blocks:
          - type: paragraph
            body: >
              FourKites operates what it describes as the world's largest real-time supply chain data network. As of
              2026, it tracks over 3.2 million shipments daily across 200-plus countries and territories, with more than
              1.1 million connected carriers and coverage of 98 percent of global ocean traffic. The customer base has
              grown from the company's first customer, Smithfield Foods, in 2014-2015 to more than 1,600 global brands
              as of 2026, including 9 of the top-10 consumer packaged goods companies and 18 of the top-20 food and
              beverage companies. Customers include Best Buy, Dow, Coca-Cola, AB InBev, Walmart, SpaceX, Chevron,
              American Eagle Outfitters, Bacardi, and Molson Coors. The company reported nearly 50 percent
              year-over-year growth in 2022, including 70 percent new customer growth, 46 percent growth in total
              shipments, and 80 percent YoY growth in ocean customers. In Europe, FourKites reported 2x shipment growth
              and 40 percent new customer growth in 2022; in Asia-Pacific, 240-plus percent shipment growth and 91
              percent new customer growth. G2, the software review platform, rates FourKites 4.5 out of 5 stars based on
              269 verified reviews as of 2026, with users praising real-time tracking and ease of use, while noting
              carrier compliance as an area of improvement. FourKites has 475 to 500 employees globally across offices
              in Chicago, Amsterdam, Munich, Chennai, and Singapore.
