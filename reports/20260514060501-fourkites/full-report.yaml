      - number: '2.2'
        title: TAM, SAM, and Evidence-Constrained SOM
        blocks:
          - type: paragraph
            body: >
              Estimating the addressable market for FourKites requires triangulation across multiple analyst sources
              because each uses a different market boundary and methodology. MarketsandMarkets, the most cited research
              firm in this space, estimates the total SCM software market at $38.51B in 2025, growing at an 8.7% CAGR to
              reach $58.42B by 2030, in a report published in January 2026. The same firm estimates the AI in Supply
              Chain market at $13.93B in 2025 growing to $50.41B by 2032 at a 20.2% CAGR. Narrowing to the SCV/RTTV
              segment, multiple secondary analyst estimates (Technavio, Mordor Intelligence, Allied Market Research)
              place the supply chain visibility software market at approximately $2.3B to $5.5B in 2022, growing at
              compound annual rates of 14% to 20% through 2028 to 2031. These range estimates should be interpreted
              cautiously: the high end of the range typically reflects broader definitions that include TMS
              functionality, while the lower end reflects pure-play RTTV platforms. A bottom-up TAM lens using
              FourKites' own traction data is also informative: FourKites serves 1,600 brands across 50 percent of the
              Fortune 500, with a customer base concentrated in the $500M+ revenue enterprise segment. If the total
              Fortune 2000 enterprise shipper universe has approximately 2,000 potential buying organizations (adding
              the Fortune 2000 plus large 3PLs) and each contract is valued at $200,000–$1,000,000 ARR, the SAM for RTTV
              among large enterprises is roughly $0.4B–$2B. Mid-market and international expansion would roughly double
              that figure for a total SAM of $1–4B. FourKites' current customer penetration of the Fortune 500
              (approximately 50%) and its strategic move into AI orchestration (Loft) suggest a SOM expansion thesis:
              growth is more likely to come from upselling existing customers to AI platform tiers and from mid-market
              international expansion than from new enterprise logo acquisition in North America. A significant
              diligence gap exists: FourKites does not publicly disclose ARR, making it impossible to validate whether
              its revenue run-rate is consistent with the market sizing estimates cited above or to calculate implied
              market share.
            claimRefs:
