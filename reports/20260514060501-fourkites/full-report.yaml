      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Carrier Compliance Is the Primary Product Quality Risk
            body: >
              Every major review platform (G2, Gartner Peer Insights, Capterra, TrustRadius) surfaces the same customer
              concern: FourKites visibility quality is directly dependent on whether carrier partners activate
              electronic tracking. When carriers don't track, the product's core value proposition (real-time ETA)
              degrades. FourKites invests significantly in Customer Success and Premier Carrier incentive programs to
              address this, but carrier compliance remains a third-party behavioral dependency that FourKites cannot
              fully control.
            calloutType: risk
            claimRefs:
              - CE007
              - CE017
          - type: callout
            title: Loft Is a Strategic Bet With Real Adoption Risk
            body: >
              Loft's agentic AI positioning is forward-looking but faces significant adoption headwinds. Gartner
              predicts 40% of agentic AI projects will be abandoned by 2027. FourKites' ABI Research survey found 52% of
              enterprises limit AI to decision support. Sophie's 'days not months' deployment claim is unvalidated by
              independent parties. The FY2026 roadmap expands Loft into procurement, finance, and ITSM — a
              horizontalization that broadens the market but invites competition from general-purpose AI platforms
              (ServiceNow, Microsoft Copilot, Salesforce Einstein). Diligence should validate actual customer AOP
              deployment counts and agentic workflow production uptime.
            calloutType: risk
            claimRefs:
              - CE008
              - CE024
              - CE034
          - type: callout
            title: Network Data Moat Is the Core Defensible Asset
            body: >
              FourKites' most defensible competitive asset is the Intelligent Network: 3M+ daily shipments, 1.1M+
              carriers, 500K+ trading partners, and 10+ years of historical supply chain event data. This dataset powers
              Dynamic ETA accuracy, Digital Twin quality, and Loft's domain-trained Digital Workers. Competitors
              building new carrier networks face multi-year onboarding timelines. The network data advantage becomes
              more valuable as AI training requirements increase — FourKites' proprietary supply chain corpus
              differentiates Loft from generic AI platforms trained on public internet data alone.
            calloutType: strength
            claimRefs:
              - CE006
              - CE012
              - CE021
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Segmentation
        blocks:
          - type: paragraph
            body: >
              FourKites' stated customer count of 1,600+ global brands encompasses the broadest Fortune 500 enterprise
              segments in supply chain management. The company has exceptional penetration in Consumer Packaged Goods (9
              of the top 10 CPG companies are customers) and Food & Beverage (18 of the top 20 F&B companies).
              Additional verticals include retail (Walmart, Best Buy), healthcare and pharmaceutical (Cardinal Health),
              chemical and materials (Dow, Chevron), automotive, and third-party logistics (3PL) providers.
              Geographically, FourKites is strongest in North America (where it began), with expansion in Europe (strong
              ocean and multimodal coverage) and APAC (Mitsui/MKI as exclusive reseller in Japan announced 2022). The
              platform was launched targeting large domestic shippers moving truckload freight, with Smithfield Foods as
              its first signed customer in 2014 when it introduced predictive TL tracking. Since then, FourKites has
              expanded modal coverage (ocean, rail, yard) and geographic reach to serve global supply chains. The
              customer segment can be broadly described as: enterprise Fortune 500 and Global 2000 shippers managing
              multi-modal, multi-geography supply chains who require unified visibility. Mid-market and SMB expansion
              was a stated goal under former President Rocky Subramanian (2022–2023), but the current profile remains
              heavily skewed to large brands. Channel partnerships (Mitsui/MKI in Japan, strategic alliances with
              SAP/Oracle ecosystem implementers) add incremental market coverage beyond direct sales.
            claimRefs: []
          - type: table
            tableRef: TU001
            claimRefs: []
