              - CI029
              - CI030
              - CI031
          - type: callout
            title: NRR opacity is the single greatest financial diligence gap
            body: >-
              FourKites does not disclose net revenue retention. For an enterprise SaaS company with high integration
              complexity and TMS/ERP dependencies, NRR is the most important financial metric — it determines whether
              integration lock-in translates to actual revenue expansion. An NRR above 120% would validate the moat. An
              NRR below 100% would signal that FourKites is losing revenue to churn faster than it acquires new logos.
              Without this metric, all claims about the switching-cost moat are unverifiable. The diligence
              recommendation is to make NRR disclosure a gate-2 requirement for any investment process.
            calloutType: risk
            claimRefs:
              - CI010
