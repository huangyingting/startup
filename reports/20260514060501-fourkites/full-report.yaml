      - number: '4.3'
        title: Capital Adequacy and Financing History
        blocks:
          - type: paragraph
            body: >-
              FourKites has raised approximately $430 million across eight disclosed funding rounds between 2014 and
              2022. The two largest rounds are the $200 million Series E (June 2022, led by Thomas H. Lee Partners at a
              $1 billion valuation) and the $30 million extension in August 2022 that added FedEx as a strategic
              investor. The $30 million extension was evidenced by SEC Form D (filed August 25, 2022, accession number
              0001625230-22-000001), which reported the sale of 2,500,000 shares of Series D-1 Preferred Stock for
              $30,000,000, plus a warrant for 907,068 shares of common stock at $0.01 exercise price ($9,070.68 total
              warrant purchase price). A separate $10 million strategic investment from Mitsui & Co. was made in October
              2022. FourKites' last disclosed secondary market transaction was in May 2023. No new primary equity round
              has been announced since August 2022, suggesting FourKites is operating on the capital raised in 2022.
              With an estimated $230 million available post-Series E (after approximately $200 million net new proceeds
              from Series E, $30M extension, and $10M Mitsui, net of earlier draws), and two workforce reductions
              (approximately 60 employees in August 2022 and approximately 15% of headcount in early 2023), FourKites
              appears to be conserving capital toward a profitability target. CEO Matt Elenjickal publicly stated in
              2023 that FourKites was targeting a near-zero burn rate. The absence of new funding as of May 2026
              suggests either (a) FourKites has reached a sustainable cash position, or (b) market conditions have made
              re-financing difficult given the compressed SaaS multiples environment post-2022. CBInsights noted
              secondary market activity in May 2023, suggesting some investor liquidity activity without a new primary
              round. The most recent confirmed employee count is "500+" per FourKites careers page in 2026, consistent
              with post-reduction headcount.
            claimRefs:
              - CI013
              - CI014
              - CI015
              - CI016
              - CI017
              - CI018
              - CI019
