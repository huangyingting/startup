  - id: FV001
    title: Recommendation logic
    type: flow
    description: Decision tree showing the logic path from evidence assessment to investment recommendation for FourKites.
    layout: wide
    claimRefs:
      - CV001
      - CV002
      - CV004
    data:
      nodes:
        - label: FourKites Investment Decision
          detail: 'Evaluate: market position, financial health, Loft AI adoption, governance, and competitive moat.'
          tone: neutral
        - label: 'Gate 1: Market Position'
          detail: >-
            9/10 CPG + 18/20 F&B + 4-year Gartner Leader + 1.1M carrier moat = PASS. Fortune 500 ICP near-saturation is
            a caution.
          tone: positive
        - label: 'Gate 2: Financial Health'
          detail: >-
            NRR and burn rate UNDISCLOSED. Estimated ARR $110-140M (base). Two layoffs + 47-month funding gap =
            CONDITIONAL.
          tone: neutral
        - label: 'Gate 2 FAIL: Financial Red Flags'
          detail: >-
            If diligence reveals NRR <100% or burn >$10M/month with <12 months runway → EXIT diligence. Valuation
            unsupportable.
          tone: risk
        - label: 'Gate 3: Loft AI Adoption'
          detail: >-
            2 named Fortune 500 deployments after 3 months. If diligence reveals <15 customers → reduce to base case
            timeline. If >30 customers → upgrade to bull case.
          tone: neutral
        - label: 'Gate 4: CEO Governance'
          detail: >-
            2022 defamatory email incident resolved. If board has documented governance framework post-2022 → PASS. If
            no remediation → flag for IPO / M&A risk.
          tone: neutral
        - label: CONDITIONAL PROCEED at $700-850M
          detail: >-
            If Gates 2-4 pass: enter at $700-850M (6-7x estimated ARR) with Loft ACV ratchet mechanism.
            Probability-weighted return ~1.3-1.5x at $750M entry.
          tone: positive
        - label: PASS at $1B without confirmation
          detail: >-
            If financial gates unresolved: do not proceed at $1B reference. Probability-weighted return ~0.95x —
            insufficient risk-adjusted return for private equity.
          tone: risk
      edges:
        - from: FourKites Investment Decision
          to: 'Gate 1: Market Position'
          label: evaluate
        - from: 'Gate 1: Market Position'
          to: 'Gate 2: Financial Health'
          label: PASS → next gate
        - from: 'Gate 2: Financial Health'
          to: 'Gate 2 FAIL: Financial Red Flags'
          label: if NRR <100% or burn unsustainable
        - from: 'Gate 2: Financial Health'
          to: 'Gate 3: Loft AI Adoption'
          label: if NRR ≥100% and runway ≥18m
        - from: 'Gate 3: Loft AI Adoption'
          to: 'Gate 4: CEO Governance'
          label: assessed → next gate
        - from: 'Gate 4: CEO Governance'
          to: CONDITIONAL PROCEED at $700-850M
          label: if governance documented
        - from: 'Gate 4: CEO Governance'
          to: PASS at $1B without confirmation
          label: if unresolved at $1B
  - id: FV002
    title: Valuation sensitivity
    type: bar
    description: Estimated FourKites enterprise value under different ARR levels and EV/ARR multiple combinations.
    layout: wide
    claimRefs:
      - CV007
      - CV008
      - CV009
    data:
      items:
        - label: 'Bear: $85M ARR × 4x'
          value: 340
          detail: Bear ARR scenario with distressed-SaaS multiple. Implies significant down-round from $1B reference.
          tone: risk
        - label: 'Bear: $85M ARR × 5x'
          value: 425
          detail: Bear ARR with slight multiple recovery. Still a ~57% impairment from $1B reference.
          tone: risk
        - label: 'Base: $120M ARR × 7x'
          value: 840
          detail: Base ARR at current supply chain SaaS comps. Implies slight markdown from $1B reference.
          tone: neutral
        - label: 'Base: $130M ARR × 8x'
          value: 1040
          detail: High-end base case. Justifies $1B entry if Descartes-level multiple (8x) is achievable.
          tone: positive
        - label: 'Base: $140M ARR × 8x'
          value: 1120
          detail: Upper base case. Would support $1B entry with modest upside. Requires confirmed ARR growth.
          tone: positive
        - label: 'Bull: $170M ARR × 10x'
          value: 1700
          detail: 'Bull case: strong Loft adoption + confirmed NRR 115%+. 1.7x return from $1B entry.'
          tone: positive
        - label: 'Bull: $200M ARR × 12x'
          value: 2400
          detail: 'High bull: Loft generates $20M+ incremental ARR, IPO-grade multiple. 2.4x return from $1B.'
          tone: positive
  - id: FV003
    title: Valuation / return range
    type: range
    description: Return range for a $1B entry in FourKites across bear, base, and bull exit scenarios in 2027-2028.
    layout: standard
    claimRefs:
      - CV007
      - CV008
      - CV009
    data:
      items:
        - label: Bear exit ($1B entry)
          low: 340
          mid: 450
          high: 570
          displayValue: 0.34x–0.57x MOIC
          detail: Bear ARR $85-95M; exit multiple 4-6x in 2027-2028. Significant impairment from $1B entry.
          tone: risk
        - label: Base exit ($1B entry)
          low: 840
          mid: 980
          high: 1260
          displayValue: 0.84x–1.26x MOIC
          detail: Base ARR $120-140M; exit multiple 7-9x. Near-breakeven to modest return from $1B entry.
          tone: neutral
        - label: Bull exit ($1B entry)
          low: 1700
          mid: 2200
          high: 2800
          displayValue: 1.7x–2.8x MOIC
          detail: Bull ARR $170M+; Loft AI adds $20M+ ARR; exit multiple 10-14x in 2027-2028 IPO or strategic sale.
          tone: positive
        - label: Bear exit ($750M entry)
          low: 450
          mid: 600
          high: 760
          displayValue: 0.60x–1.01x MOIC
          detail: Same bear scenario but $750M entry. Materially better risk profile than $1B entry.
          tone: neutral
        - label: Base exit ($750M entry)
          low: 1120
          mid: 1300
          high: 1680
          displayValue: 1.49x–2.24x MOIC
          detail: Base scenario at $750M entry. Better risk/return; recommended entry discipline range.
          tone: positive
  - id: FV004
    title: Investment KPIs
    type: kpi
    description: Key performance indicators that would confirm the investment thesis for FourKites if disclosed in diligence.
    layout: wide
    claimRefs:
      - CV019
      - CV020
      - CV021
    data:
      items:
        - label: ARR (2025 estimate)
          value: $110-140M (est.)
          detail: >-
            Estimated from CBInsights 2021 baseline ($65M) + 12-18% CAGR. Must be confirmed in diligence. Below $90M =
            bear signal; above $150M = bull signal.
          tone: neutral
        - label: NRR (undisclosed)
          value: 'Target: ≥105%'
          detail: >-
            Net Revenue Retention is the single most important financial metric. Not publicly disclosed. Below 100% is
            thesis-breaking; 105-115% supports base case; 115%+ supports bull case.
          tone: risk
        - label: Loft Production Deployments
          value: 2 named (as of May 2026)
          detail: >-
            Only 2 Fortune 500 deployments confirmed 3 months post-launch. Target for investment confirmation: ≥20 by
            mid-2026, ≥50 by end-2026.
          tone: risk
        - label: Gartner MQ Position
          value: Leader (4 consecutive years)
          detail: >-
            Four-year Gartner Leader status confirms enterprise procurement recognition. No change expected in 2025 MQ
            (result pending). Sustained leadership is a prerequisite for Fortune 500 sales cycles.
          tone: positive
        - label: Carrier Network Scale
          value: 1.1M+ carriers
          detail: >-
            Largest carrier compliance network globally by stated count. Competitor moat metric. Target: maintain >1M
            and grow to 1.5M+ by 2027 to widen defensibility.
          tone: positive
        - label: Customer Advisory Board Executives
          value: 25 Fortune 500 executives
          detail: >-
            Three active advisory boards (CPG, F&B, Manufacturing). Proxy for customer satisfaction and strategic
            relationship depth. Target: all 25 renew advisory board membership annually.
          tone: positive
        - label: G2 Customer Rating
          value: 4.5/5 (269 reviews)
          detail: >-
            Strong satisfaction signal but review cadence decelerating. Target: >300 reviews by end-2026; maintain
            ≥4.3/5 rating. Below 4.0 would signal quality degradation.
          tone: positive
        - label: Last Funding Round Gap
          value: 47 months (June 2022)
          detail: >-
            Longest quiet period for a $1B-valued supply chain SaaS. Target confirmation: cash runway ≥24 months as of
            Q3 2026. If runway <12 months without a financing plan, this is a kill trigger.
          tone: risk
