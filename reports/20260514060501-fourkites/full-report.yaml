      - number: '6.2'
        title: Adoption Trajectory and Growth Evidence
        blocks:
          - type: paragraph
            body: >
              FourKites' most concrete adoption metric is the 1,600+ brand count and 3.2 million daily supply chain
              events processed. From 2014 (first customer, Smithfield) to 2022 when FourKites raised its $200M Series E
              at a $1B valuation, the company built the largest real-time supply chain network by carrier count (1.1M+).
              The 2022 and 2023 workforce reductions (8% and 15% respectively) suggest growth deceleration from the
              pandemic-era surge. No explicit Annual Recurring Revenue (ARR) growth rate has been published since
              CBInsights' 2021 estimate of $65M. G2 shows 269 customer reviews as of February 2026, indicating an active
              enterprise user base. Vertical Customer Advisory Boards launched across Manufacturing (Jan 2025), F&B (Nov
              2025), and CPG (Dec 2025) represent high-quality engagement with Fortune 500 customers. The IdeaExchange
              platform reports 90% participation among active app users, with 1 in 4 suggestions making the product
              roadmap — suggesting deep user investment in the platform's future. The Loft Digital Worker adoption rate
              (US Cold Storage in Oct 2025 being a publicly named pilot) indicates early-stage agentic adoption with
              first movers. Booking Connect for Ocean (announced May 2026) brings Fortune 500 CPG names like Coca-Cola
              into the reference pool for agentic AI deployment. Platform expansion from tracking-only to full agentic
              AI suggests upsell opportunity within existing customers as the primary growth vector.
            claimRefs: []
          - type: table
            tableRef: TU002
            claimRefs: []
          - type: figure
            figureRef: FU002
            claimRefs:
              - CU002
              - CU004
