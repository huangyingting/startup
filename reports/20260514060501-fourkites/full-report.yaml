    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              FourKites, Inc. was founded in 2014 by Mathew (Matt) Elenjickal, who developed the idea for the company
              from his time as a supply chain consultant at Oracle, where he observed that large enterprises chronically
              lacked basic freight visibility. Incorporated in Delaware and headquartered in Chicago, Illinois at 500 W.
              Madison Street, FourKites pioneered the real-time transportation visibility (RTTV) category by enabling
              shippers and logistics providers to track freight across all modes—road, rail, ocean, air, and parcel—with
              dynamic estimated times of arrival powered by machine learning. The company's business model is a
              software-as-a-service (SaaS) subscription platform sold to enterprise shippers, third-party logistics
              providers (3PLs), and carriers. As of 2026, FourKites has rebranded its value proposition as an "AI Supply
              Chain Orchestration" platform centered on its Intelligent Control Tower—combining real-time data from its
              massive carrier network, a continuously updated digital twin of each customer's operations, and AI-powered
              Digital Workers (branded Loft) that automate logistics workflows including exception management,
              appointment scheduling, document processing, and customer communications. The platform formerly operated
              under the name CloudQwest, Inc., before becoming FourKites. By operating in logistics, finance,
              procurement, and customer service, FourKites positions its addressable scope well beyond traditional
              freight visibility.
