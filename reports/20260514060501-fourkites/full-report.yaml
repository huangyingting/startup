      - number: '4.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Two workforce reductions signal capital efficiency pressure
            body: >-
              FourKites conducted two notable workforce reductions within twelve months of its $200M Series E (June
              2022): approximately 60 employees cut in August 2022 (~8%) and approximately 15% of global headcount cut
              in early 2023. This pace of cost-cutting — beginning just two months after the largest funding round in
              company history — suggests that the post-Series-E growth plan did not materialize at the expected revenue
              velocity. The CEO's public statement targeting near-zero burn in 2023 reflects a shift from
              growth-at-all-costs to capital preservation. The combination of no new primary funding round (as of May
              2026), secondary market activity (May 2023), and a stable headcount of 500+ suggests the company has
              stabilized, but the path to profitability remains unconfirmed.
            calloutType: risk
            claimRefs:
