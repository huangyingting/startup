      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              FourKites is led by founder Mathew Elenjickal as Chief Executive Officer, who has held that role
              continuously since the company's founding. The executive team as of 2026 includes Priya Rajagopalan as
              President of Product, Technology, and Operations; Ron Richardson as Chief Revenue Officer; Bill Maw as
              Chief Financial Officer; Sriram Nagaswamy as Executive Vice President of Technology; Chris Brown as
              Executive Vice President of People; and Michelle Meller as General Counsel. The company experienced
              notable leadership turbulence in 2023: Rocky Subramanian, who had joined as President, departed, and
              Rajagopalan assumed the role of Chief Customer Officer before later returning to the President title;
              Glenn Koepke, Vice President of Strategy, departed alongside the 15 percent workforce reduction. The board
              of directors includes venture capital representatives from each major investor: Ajay Agarwal (Managing
              Director, Bain Capital Ventures), Eric Carlborg (General Partner, August Capital), Gaurav Mittal (Managing
              Director, Thomas H. Lee Partners), Ira Weiss (Professor and VC), Joe Beatty (Advisor), and Jai Shekhawat
              (Founder and former CEO of Fieldglass). Samuel Rives and Mike Kaczmarek also appear in SEC filings as
              officers. The founder-led structure and multiple board seats held by external investors create a
              governance dynamic typical of late-stage venture-backed companies. Key-person dependency on Elenjickal is
              a material risk given his dual role as founder and sole public face of the company's vision and market
              positioning.
