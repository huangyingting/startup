      - number: '4.2'
        title: Unit Economics and GTM Motion
        blocks:
          - type: paragraph
            body: >-
              FourKites' go-to-market is direct enterprise sales, targeting Fortune 500 shippers in CPG, food and
              beverage, pharmaceutical, chemical, and retail verticals. The company counts 9 of the top 10 CPG companies
              and 18 of the top 20 food and beverage companies among its 1,600+ brand customers as of 2026. CAC
              (customer acquisition cost) is not publicly disclosed. Enterprise SaaS benchmarks suggest payback periods
              of 18–30 months for companies at FourKites' scale and segment; given the complexity of TMS/ERP integration
              for RTTV deployments, CAC is likely at the higher end. FourKites has a strategic alliance with FedEx
              (investor since August 2022) and a distribution agreement with Mitsui / MKI for Japan and the Asia Pacific
              region (since October 2022), suggesting a channel sales component alongside direct enterprise sales. Net
              revenue retention (NRR) is not disclosed — this is the most important unit economics metric for RTTV and
              represents the primary diligence gap. An NRR above 120% would indicate that existing customers expand
              faster than any churn, validating the integration moat; an NRR below 100% would signal net contraction
              despite new logo acquisition. FourKites's open-source positioning on carrier onboarding (carriers are
              free, generating data density) reduces variable cost per tracked shipment as the network scales. If AI
              inference costs (for Dynamic ETA, FourSight AI, and Loft) scale with shipment volume, this could compress
              gross margins in an AI-first revenue model. Professional services margins are typically 20–40% for
              enterprise SaaS companies; subscription margins at mature SaaS companies at scale are typically 70–80%
              gross margin.
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
