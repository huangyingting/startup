              detail: >-
                Medium-likelihood, medium-impact risks. Each is manageable individually but concurrent occurrence would
                be severe. CEO key-person risk is structural given lack of named successor.
            - label: >-
                Down-round financing; GDPR enforcement action; project44 poaches 3+ anchor Fortune 500 accounts; AWS
                service disruption
              tone: risk
              detail: >-
                Medium-likelihood, high-impact risks. A down-round at $400–600M would impair employee morale, talent
                retention, and customer confidence. GDPR enforcement could trigger enterprise customer review clauses.
        - label: Low Likelihood
          values:
            - label: IP patent troll exposure; AIS spoofing affecting ocean ETAs
              tone: positive
              detail: Low-likelihood, low-impact risks. Manageable through standard enterprise legal posture.
            - label: FedEx investor conflict of interest crystallizing; Rocky Subramanian-equivalent leadership gap
              tone: neutral
              detail: >-
                Low-likelihood, medium-impact risks. FedEx investment alignment misalignment is possible but would
                likely surface in board dynamics before customer impact.
            - label: >-
                Major customer data breach; OFAC sanctions violation via supply chain data; SEC securities disclosure
                irregularity; Elenjickal second legal incident
              tone: risk
              detail: >-
                Low-likelihood but high-severity risks. These are tail risks that would be immediately material to IPO
                prospects and Fortune 500 customer trust. Due diligence should explicitly clear each.
  - id: FR002
    title: Risk transmission map
    type: dag
    description: Causal dependency map showing how primary risks at FourKites can trigger secondary and tertiary consequences.
    layout: wide
    claimRefs:
      - CR006
      - CR007
      - CR008
      - CR009
