      - number: '3.3'
        title: Pricing and Packaging Landscape
        blocks:
          - type: paragraph
            body: >
              All dedicated RTTV and SCV platform vendors—including FourKites and project44—use annual enterprise SaaS
              subscription models with pricing negotiated per contract and dependent on shipment volume, carrier network
              usage, mode complexity, and module selection. Neither FourKites nor project44 publishes list pricing;
              review platform data and analyst estimates consistently indicate FourKites enterprise annual contract
              values range from approximately $100,000 to over $1 million ARR for the largest global shippers, with AI
              add-ons (Loft Digital Workers, Inventory Twin, Dynamic Ocean, Booking Connect Ocean) priced incrementally
              above the base platform fee. project44's pricing structure is broadly comparable. Descartes Systems Group
              employs a mixed model combining subscription fees with per-carrier and per-transaction volume charges,
              which can be economically attractive for customers with highly variable carrier footprints. Oracle TMS and
              SAP TM are typically licensed as incremental add-on modules within existing ERP contracts, creating a
              structural pricing advantage versus standalone RTTV platforms for enterprises already running those
              systems; the effective incremental cost appears low for procurement teams evaluating total cost of
              ownership within a broader ERP modernization program. Blue Yonder visibility is similarly bundled within
              its TMS and WMS platform licenses, targeting large retail and CPG manufacturers already running Blue
              Yonder. The persistent challenge for FourKites is not its absolute pricing level but the relative cost
              perception problem it faces against ERP incumbents pricing visibility at the margin.
            claimRefs:
