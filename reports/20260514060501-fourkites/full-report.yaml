              Descartes Systems Group (DSGX) demonstrates what a mature enterprise logistics SaaS platform looks like
              financially: 77% gross margin, 29% operating margin, 36% FCF margin on $729M revenue (FY2024). FourKites'
              business model is structurally similar (subscription SaaS, carrier network, multi-sided platform), but
              operates at roughly 1/5 to 1/10 of Descartes' revenue scale. If FourKites can reach $500M+ ARR over 5–8
              years while maintaining carrier- side subsidy and AI investment, the Descartes margin profile is a
              plausible target. The key risk is that AI inference costs for FourSight and Loft create a permanent COGS
              drag that Descartes (a data-network, not AI-inference, business) does not face.
