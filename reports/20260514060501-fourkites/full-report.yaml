      - number: '1.5'
        title: Key Milestones and Innovation Timeline
        blocks:
          - type: paragraph
            body: >
              FourKites' evolution spans twelve years of continuous product expansion, from a basic full-truckload
              tracker in 2014 to a multimodal AI orchestration platform in 2026. Core milestones include the 2016-2017
              expansion into LTL, rail, and parcel tracking; the 2018 launch of Advanced Analytics; the 2019
              introduction of the machine-learning-powered Dynamic ETA algorithm; and the 2020 launch of Dynamic Yard
              (next-generation YMS), multimodal purchase order tracking, and expanded ocean and air tracking. In 2021,
              FourKites acquired Haven Inc. to launch Dynamic Ocean and acquired NIC-place in Europe to create the
              continent's largest multimodal carrier network. The June 2022 Series E funded accelerated growth, and
              FourKites formed a strategic FedEx alliance and received ISO 27001 certification that same year. The 2023
              period brought Fin AI (generative AI interface), Carrier Connect, Data Connector, and Inbound Visibility
              as new features. In 2024, FourKites earned its seventh consecutive FreightTech 25 award and its fourth
              consecutive Gartner Magic Quadrant Leader recognition. In 2025, FourKites announced AI Digital Workers
              forming the backbone of its Intelligent Control Tower. In early 2026, the company commercially launched
              Loft, its AI-native platform enabling enterprises to build and deploy autonomous supply chain agents in
              days rather than months. The overall trajectory demonstrates consistent innovation leadership, even as the
              workforce reduction and leadership reshuffles in 2022-2023 flagged financial discipline challenges.
