  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >-
              FourKites operates a subscription SaaS model with enterprise annual contracts typically ranging from one
              to three years. Revenue is segmented into several streams: (1) a core visibility subscription fee, priced
              by the number of tracked lanes, shipment volume, or user seats, that covers real-time transportation
              visibility for road freight; (2) ocean visibility, which requires an add-on module after FourKites'
              acquisition of Haven Inc. (2021); (3) Dynamic Yard (YMS module), a separately licensed yard management
              product launched in 2020; (4) Loft AI Agent Platform, commercially launched in February 2026 as a platform
              for custom AI agent development in supply chains — pricing separate from core RTTV; and (5) professional
              services and implementation fees for onboarding and integration. Carriers are onboarded free of charge,
              making FourKites a two-sided marketplace where one side (carriers) is subsidized to build network density
              that makes the platform more valuable for the paying side (shippers). This carrier subsidy increases gross
              margins relative to revenue, since carrier-side costs are funded by shipper subscriptions. FourKites does
              not disclose pricing publicly; based on industry knowledge and analyst estimates, enterprise ARR per
              shipper account ranges from approximately $200,000 to over $1,000,000 per year for large deployments, with
              module-based expansion available. CBInsights estimates FourKites' 2021 revenue at approximately $65
              million. Based on the June 2022 Series E at a $1 billion valuation and SaaS multiples of 10–15x ARR at the
              time, ARR at the time of the Series E was likely $67M–$100M. Revenue mix is dominated by subscription,
              with professional services representing a small but non-trivial component during onboarding cycles.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
