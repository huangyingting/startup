  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Taxonomy
        blocks:
          - type: paragraph
            body: >
              The market relevant to FourKites has three concentric definitions. At the narrowest level, Real-Time
              Transportation Visibility (RTTV) platforms provide shippers and logistics service providers with
              in-transit tracking, machine-learning dynamic ETAs, exception management, and carrier network connectivity
              across road, rail, ocean, air, and parcel modes. Gartner formalized this category in its first Magic
              Quadrant for Real-Time Transportation Visibility Platforms in 2019, evaluating 14 vendors in 2021, and has
              recognized FourKites as a Leader in that quadrant for four consecutive years through 2024. At the middle
              level, Supply Chain Visibility (SCV) encompasses RTTV plus end-to-end purchase order tracking, supplier
              visibility, inventory positioning, and yard management (the category FourKites targets with Dynamic Yard
              and YardWorks). At the widest level, the full Supply Chain Management (SCM) software market includes
              planning, procurement, and logistics execution, estimated by MarketsandMarkets at $38.51B in 2025 growing
              to $58.42B by 2030. FourKites competes in the RTTV/SCV segment but is now expanding its addressable scope
              through the Loft AI platform, which targets supply chain automation more broadly and includes adjacencies
              in finance, procurement, and customer service workflows. Status-quo substitutes for RTTV include: calling
              carriers directly for shipment status (manual), extracting carrier EDI/214 data in TMS, building in-house
              visibility layers on top of SAP or Oracle TMS, or purchasing bundled visibility modules from incumbent
              supply chain platform vendors like SAP Transportation Management, Oracle OTM, Blue Yonder TMS, or e2open.
              These substitutes collectively represent both the competitive threat and the expansion opportunity for
              FourKites.
            claimRefs:
              - CM001
              - CM002
              - CM003
