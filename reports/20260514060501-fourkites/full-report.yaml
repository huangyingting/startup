  - id: TI005
    title: Public financial gaps table
    notes: >-
      All gaps represent information FourKites does not disclose publicly. Diligence paths require NDA-gated access to
      FourKites internal data.
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Enumerates all eight standard financial disclosure dimensions for pre-IPO enterprise SaaS due diligence;
        exhaustiveness based on standard SaaS diligence framework.
    columns:
      - Missing Metric
      - Why It Matters
      - Diligence Path
      - Adversity Level
    rows:
      - - ARR / Total Revenue
        - Primary valuation input; all DCF and comps analyses require this
        - Request ARR schedule by product, customer segment, and geography
        - High — without ARR, valuation is speculative
      - - Gross Margin
        - Determines FCF path; AI inference costs could compress margins
        - Request P&L with gross margin by revenue stream; COGS breakdown
        - High — margin compression risk is unknown
      - - NRR / GRR
        - Most important indicator of moat durability and competitive displacement
        - Request NRR by cohort, vertical, and contract vintage; trailing 24 months
        - Critical — NRR<100% would invalidate core thesis
      - - Burn Rate / Cash on Hand
        - Determines capital adequacy and next-round trigger
        - Request monthly P&L; cash balance as of most recent quarter; runway projection
        - High — two layoffs suggest material prior burn
      - - CAC and Sales Efficiency
        - Determines scalability of GTM and ROI on sales investment
        - Request CAC by segment; average sales cycle; quota attainment; fully-loaded CAC
        - Medium — high CAC is expected for enterprise; ratio vs. LTV matters more
      - - Customer ARR Concentration
        - Top 10 customers may represent >50% of ARR; concentration creates churn cliff risk
        - Request ARR by customer decile; top 10 customer names and ARR with NDA
        - High — 1,600 brands implies long tail; top logos may dominate economics
      - - Debt / Credit Facility
        - Venture debt or credit facilities would increase financial risk
        - Request debt schedule; any venture lending facilities; covenants
        - Medium — not expected for a VC-backed SaaS at this stage
      - - Loft ARR Contribution
        - New AI platform is strategic pivot; ARR contribution determines whether it's material or aspirational
        - Request Loft ARR, customer count, pipeline, and bookings separately from core RTTV
        - Medium — Loft is early stage; ARR likely negligible in 2026
