      - number: '2.5'
        title: Sizing and Adoption Diligence Gaps
        blocks:
          - type: paragraph
            body: >
              Market sizing for RTTV and SCV is subject to significant definitional variability. Published estimates
              range from approximately $1.5B to $20B+ for the same year depending on whether the analyst includes TMS
              capabilities, yard management, order management, or AI orchestration. This breadth makes TAM comparisons
              between analyst reports unreliable without reconciling boundary definitions. The bottom-up TAM methodology
              is more grounding than top-down estimates, but requires confidential ARR data from FourKites that is not
              publicly available. Three specific diligence areas are material for an investor in FourKites: First, what
              is the SAM penetration rate among large enterprises, and what growth rate can still be achieved in North
              America versus international markets where 240% shipment growth suggests significant whitespace? Second,
              are mid-market buyers (companies with revenues of $100M–$500M) a realistic expansion opportunity, or is
              the product too expensive and complex for buyers without a dedicated supply chain technology team? Third,
              does the Loft AI platform represent an expansion of the SAM (new categories of spend) or cannibalization
              of the core visibility subscription? Each of these unknowns materially affects a valuation at or above the
              2022 unicorn mark.
            claimRefs:
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Large TAM with Multiple Growth Vectors
            body: >
              The SCV/RTTV market sits at the intersection of regulatory compliance (OTIF, FSMA, CSRD), supply chain
              resilience investment, AI transformation, and ongoing logistics digitization. Multiple secular tailwinds
              are aligned: tariff volatility in 2025-2026 accelerates near-shoring, which adds new transport lanes that
              need visibility. The MarketsandMarkets SCM market forecast of 8.7% CAGR provides a conservative floor for
              growth; the AI in Supply Chain market ($13.93B → $50.41B at 20.2% CAGR) defines the upside if FourKites'
              Loft platform captures meaningful share of AI spend.
            calloutType: strength
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM019
              - CM020
          - type: callout
            title: TMS Incumbency and Market Saturation May Cap North American Growth
            body: >
              FourKites already serves approximately 50 percent of the Fortune 500. At this penetration rate, new North
              American enterprise logo acquisition is increasingly difficult, and TMS incumbents (SAP, Oracle, Blue
              Yonder, e2open) are actively adding native visibility modules. The incremental SAM for core RTTV in North
              America may be shrinking. Revenue growth must increasingly come from upsell (Loft AI tiers), international
              expansion (EU, APAC), and mid-market penetration—all of which are less proven for FourKites and carry
              different cost structures.
            calloutType: risk
            claimRefs:
              - CM022
              - CM023
              - CM024
              - CM030
          - type: callout
            title: Tariff Volatility as a Near-Term Demand Catalyst
            body: >
              The 2025 tariff cycle has introduced significant supply chain reconfiguration pressure. Companies are
              adding new carrier relationships across Asia-Pacific, Mexico, and Europe as they diversify sourcing away
              from China. Each new trade lane represents a potential FourKites carrier onboarding and visibility
              contract expansion. This is a time-bound opportunity: the elevated disruption window of 2025-2026 may
              accelerate otherwise slow buying cycles, particularly in industrial and manufacturing verticals.
            calloutType: insight
            claimRefs:
              - CM019
              - CM020
              - CM021
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              The real-time transportation visibility (RTTV) and supply chain visibility (SCV) competitive landscape in
              2026 divides into three tiers. The first tier consists of dedicated RTTV platform leaders—FourKites and
              project44—both headquartered in Chicago, both founded in 2014, and both designated Gartner Magic Quadrant
              Leaders as of the 2024 edition. FourKites has raised approximately $440 million in total equity and
              reports 1,600-plus enterprise brand customers. project44 has raised approximately $840 million—including a
              $420 million Series F in October 2021—and expanded its platform through three acquisitions: Convey
              (last-mile visibility, 2022), ClearMetal (ocean AI, 2022), and Tive (real-time IoT sensors, 2023). The
              second tier is compliance and routing specialists, led by Descartes Systems Group (NASDAQ/TSX: DSGX), a
              profitable public company that acquired MacroPoint in 2022 to add RTTV capability to its core customs
              clearance, EDI, and freight-forwarding TMS portfolio; Descartes reported approximately $600 million in
              FY2024 revenue. The third tier is full-stack ERP and SCM platform incumbents—Oracle Transportation
              Management, SAP Transportation Management, and Blue Yonder (Panasonic-owned since 2021)—which bundle
              transportation visibility as a module within existing enterprise platform contracts. A fourth regional
              tier includes Shippeo, an Amsterdam-based platform acquired by Greenbriar Equity Group, which holds a
              strong position in European road and multimodal carrier connectivity. All four dedicated RTTV specialists
              appear in the Gartner Magic Quadrant for RTTVP; FourKites and project44 hold the Leader positions while
              Descartes and Shippeo occupy Challenger and Niche Player positions respectively.
