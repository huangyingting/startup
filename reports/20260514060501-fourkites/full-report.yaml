companyProfile:
  summary: >
    FourKites is a Chicago-based supply chain visibility and agentic AI platform founded in 2014 by Matt Elenjickal. The
    company tracks 3.2 million shipments daily across truckload, rail, ocean, and parcel modes in 200+ countries,
    serving 1,600+ global brands including 9 of the top-10 CPG companies and 18 of the top-20 food & beverage companies.
    In February 2026, FourKites launched the Loft AI Agent Platform — featuring Sophie (an AI developer agent) and five
    Digital Workers — positioning the company at the intersection of real-time visibility and autonomous supply chain
    operations. FourKites has been a Gartner Magic Quadrant Leader for Real-Time Transportation Visibility Platforms for
    four consecutive years.
