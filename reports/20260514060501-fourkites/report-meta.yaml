companyProfile:
  summary: >
    FourKites is a Chicago-based supply chain visibility and agentic AI platform
    founded in 2014 by Matt Elenjickal. The company tracks 3.2 million shipments
    daily across truckload, rail, ocean, and parcel modes in 200+ countries, serving
    1,600+ global brands including 9 of the top-10 CPG companies and 18 of the top-20
    food & beverage companies. In February 2026, FourKites launched the Loft AI Agent
    Platform — featuring Sophie (an AI developer agent) and five Digital Workers —
    positioning the company at the intersection of real-time visibility and autonomous
    supply chain operations. FourKites has been a Gartner Magic Quadrant Leader for
    Real-Time Transportation Visibility Platforms for four consecutive years.
  foundedDate: "2014-01-01"
  founders:
    - name: "Matt Elenjickal"
      role: "CEO & Founder"
      background: >
        Former Oracle supply chain product manager; founded FourKites in 2014 with
        Smithfield Foods as the first customer.
      claimRefs: [CO001, CO002]
  foundingLocation: "Chicago, IL"
  headquarters: "Chicago, IL"
  productSummary: >
    Real-time supply chain visibility SaaS with multi-modal tracking (TL, LTL, ocean,
    parcel, rail), predictive ETAs, the Loft AI Agent Platform (autonomous Digital
    Workers for carrier follow-up, appointment scheduling, document processing,
    exception management, and customer service), and the Inventory Twin for in-transit
    inventory analytics. Customers integrate via API, EDI, or pre-built connectors to
    TMS, ERP, and WMS systems.
  customerFocus: >
    Large enterprise shippers in CPG, food & beverage, manufacturing, retail, and
    life sciences; primarily Fortune 500 and Global 2000 with complex multi-modal
    supply chains.
  businessModel: >
    Annual SaaS subscription based on shipment volume and module breadth; strategic
    partnerships with Mitsui/MKI (Japan exclusivity) and FedEx (Series D-1 investor).
    Revenue from platform licenses, professional services, and carrier network fees.
  stage: "Late-stage private (Series E)"
  fundingStatus: >
    $200M Series E closed June 2022 led by THL Partners at ~$1B valuation; total
    ~$430M raised across 8 rounds. No new round disclosed as of May 2026; CEO
    stated near-zero burn target in January 2023.
  disclosureProfile: "private-undisclosed"
  claimRefs: [CO001, CO002, CO003, CO004, CV002, CV003]

summary:
  headline: >
    FourKites is a proven supply chain visibility leader with durable enterprise
    relationships and a credible agentic AI pivot, but limited financial transparency
    and a challenging late-2022 valuation anchor make a watchful track posture
    appropriate until a liquidity event or re-rate materializes.
