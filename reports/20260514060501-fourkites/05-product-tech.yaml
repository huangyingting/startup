    title: Critical dependency map
    type: dag
    description: "Key suppliers, platforms, data rights, and integration partners that FourKites depends on for platform operation."
    layout: wide
    claimRefs: [CE020, CE021, CE022, CE023]
    data:
      nodes:
        - id: fk
          label: "FourKites Platform"
          detail: "Core SaaS platform and Intelligent Control Tower."
          tone: neutral
        - id: carriers
          label: "Carriers (1.1M+)"
          detail: "GPS/ELD telematics providers, mobile app adoption, EDI connectivity. Primary dependency — carrier compliance determines data quality."
          tone: risk
        - id: ais
          label: "AIS Data Providers"
          detail: "Automatic Identification System feeds for ocean container tracking. FourKites licenses AIS data from third-party aggregators."
          tone: risk
        - id: llm
          label: "LLM Providers"
          detail: "Foundation model providers powering Sophie and Loft Digital Workers. Dependency on external AI infrastructure for agentic capabilities."
          tone: risk
        - id: cloud
          label: "Cloud Infrastructure"
          detail: "Hyperscale cloud provider (AWS implied). Multi-tenant SaaS platform hosting and data processing."
          tone: neutral
        - id: tms_erp
          label: "TMS / ERP Vendors (SAP, Oracle, JDA)"
          detail: "Pre-built integration connectors enable shipper-side data ingestion. API contract changes require ongoing maintenance."
          tone: neutral
        - id: telematics
          label: "Telematics Platforms"
          detail: "GPS hardware vendors (Samsara, Verizon Connect, Geotab) whose APIs feed FourKites carrier tracking."
          tone: neutral
        - id: regulators
          label: "Data Regulators (GDPR, CCPA)"
          detail: "Privacy regulations governing shipment recipient and driver location data collection and processing."
          tone: risk
      edges:
        - from: carriers
          label: "tracking data (GPS/ELD/EDI/mobile)"
          to: fk
        - from: ais
          label: "ocean container positions"
          to: fk
        - from: llm
          label: "AI inference for Loft/Sophie"
          to: fk
        - from: cloud
          label: "compute/storage"
          to: fk
        - from: tms_erp
          label: "shipment creation events"
          to: fk
        - from: telematics
          label: "GPS feeds via carrier"
          to: carriers
        - from: regulators
          label: "compliance obligations"
          to: fk

