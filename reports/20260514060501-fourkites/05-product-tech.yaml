  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: security-certification-status
      missingEvidence: "FourKites has not published SOC 2 Type II or ISO 27001 attestations on its public website. Enterprise customers imply these certifications exist, but no public trust center or security overview page was found."
      whyItMatters: "Security certification status is a standard enterprise procurement gate. Without confirmed SOC 2 Type II, regulated industries (healthcare, pharma, financial services) face compliance risk in deploying FourKites for sensitive supply chain data."
      diligencePath: "Request SOC 2 Type II report (Type II required, not Type I); ISO 27001 certificate if held; penetration testing summary; data residency documentation for EU operations."
      relatedQuestionRefs: [QE009]

    - type: private-evidence-only
      severity: material
      topic: platform-uptime-sla
      missingEvidence: "FourKites does not publish platform uptime SLA, RTO (Recovery Time Objective), or RPO (Recovery Point Objective) on its public website. For 24/7 supply chain operations, SLA terms are critical for vendor risk assessment."
      whyItMatters: "Supply chain disruptions have direct revenue impact; a platform outage during peak shipping periods (Q4, holiday season) without contractual SLA protection creates unquantified operational risk."
      diligencePath: "Request master service agreement (MSA) with SLA terms; historical uptime track record; incident response playbook; redundancy architecture documentation."
      relatedQuestionRefs: [QE020]

    - type: private-evidence-only
      severity: informational
      topic: api-volume-and-platform-scale
      missingEvidence: "FourKites does not disclose daily API call volumes, platform processing throughput, or technical scale metrics. With 3M+ daily shipments and 1.1M+ carriers, platform architecture must handle significant real-time event volume."
      whyItMatters: "Platform scalability under peak load (Q4, post-hurricane disruption events) determines reliability for enterprise customers. API rate limits and platform capacity constraints affect integration design."
      diligencePath: "Request platform capacity metrics; API rate limits documentation; peak load incident history; infrastructure scaling architecture."
      relatedQuestionRefs: [QE010]

    - type: missing-source
      severity: informational
      topic: carrier-compliance-rate-data
      missingEvidence: "FourKites does not disclose the percentage of shipments tracked electronically vs requiring manual check-call fallback. Premier Carrier List and Customer Success investment imply a meaningful portion of shipments still require manual handling."
      whyItMatters: "If carrier compliance rates are low (below 80%), the product's value proposition depends heavily on FourKites' Customer Success intervention rather than automated network connectivity — a scaling cost risk."
      diligencePath: "Request average carrier electronic tracking compliance rate by mode (TL, ocean, rail); percentage of shipments requiring manual check-call intervention; trend data over last 3 years."
      relatedQuestionRefs: [QE027]

    - type: missing-source
      severity: informational
      topic: roadmap-delays
      missingEvidence: "No public evidence documents specific product features that were delayed or cancelled as a result of FourKites' 2022 and 2023 workforce reductions. Internal roadmap continuity post-layoffs is unverifiable from public sources."
      whyItMatters: "Workforce reductions of ~8% (2022) and ~15% (2023) likely affected engineering team size and could have delayed product development; understanding which capabilities were deprioritized informs future roadmap credibility assessment."
      diligencePath: "Request product release history comparing announced roadmap items vs actual delivery dates for FY2022–2024; ask for post-layoff engineering headcount and R&D investment as a percentage of revenue."
      relatedQuestionRefs: [QE026]

    - type: missing-source
      severity: material
      topic: product-module-completeness
      missingEvidence: "FourKites has not published an exhaustive product module catalog or feature matrix. Loft Digital Worker sub-agents are not individually documented publicly, making comprehensive module enumeration impossible from public sources."
      whyItMatters: "Understanding the full product scope is necessary to assess competitive differentiation, TAM coverage, and where premium module pricing applies. Incomplete module documentation creates uncertainty in customer value mapping."
      diligencePath: "Request full product catalog with module descriptions, GA dates, and pricing structure; list of all Loft Digital Workers available as of May 2026."
      relatedTableRefs: [TE001]

callouts:
  - title: "Carrier Compliance Is the Primary Product Quality Risk"
    calloutType: risk
    body: >
      Every major review platform (G2, Gartner Peer Insights, Capterra, TrustRadius) surfaces the same
      customer concern: FourKites visibility quality is directly dependent on whether carrier partners
      activate electronic tracking. When carriers don't track, the product's core value proposition
      (real-time ETA) degrades. FourKites invests significantly in Customer Success and Premier Carrier
      incentive programs to address this, but carrier compliance remains a third-party behavioral
      dependency that FourKites cannot fully control.
    claimRefs: [CE007, CE017]

  - title: "Loft Is a Strategic Bet With Real Adoption Risk"
    calloutType: risk
    body: >
      Loft's agentic AI positioning is forward-looking but faces significant adoption headwinds.
      Gartner predicts 40% of agentic AI projects will be abandoned by 2027. FourKites' ABI Research
      survey found 52% of enterprises limit AI to decision support. Sophie's 'days not months'
      deployment claim is unvalidated by independent parties. The FY2026 roadmap expands Loft into
      procurement, finance, and ITSM — a horizontalization that broadens the market but invites
      competition from general-purpose AI platforms (ServiceNow, Microsoft Copilot, Salesforce Einstein).
      Diligence should validate actual customer AOP deployment counts and agentic workflow production uptime.
    claimRefs: [CE008, CE024, CE034]

  - title: "Network Data Moat Is the Core Defensible Asset"
    calloutType: strength
    body: >
      FourKites' most defensible competitive asset is the Intelligent Network: 3M+ daily shipments,
      1.1M+ carriers, 500K+ trading partners, and 10+ years of historical supply chain event data.
      This dataset powers Dynamic ETA accuracy, Digital Twin quality, and Loft's domain-trained
      Digital Workers. Competitors building new carrier networks face multi-year onboarding timelines.
      The network data advantage becomes more valuable as AI training requirements increase —
      FourKites' proprietary supply chain corpus differentiates Loft from generic AI platforms
      trained on public internet data alone.
    claimRefs: [CE006, CE012, CE021]

