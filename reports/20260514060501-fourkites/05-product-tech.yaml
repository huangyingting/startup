figures:
  - id: FE001
    title: Product architecture map
    type: stack
    description: "Layered architecture of the FourKites Intelligent Control Tower platform from data ingestion to agentic execution."
    layout: standard
    claimRefs: [CE001, CE002, CE003]
    data:
      layers:
        - label: "Loft AI Agent Platform (Agentic Execution)"
          detail: "Sophie developer agent + pre-built Digital Workers (carrier follow-up, appointment scheduling, document processing, exception management); Agent Operating Procedures (AOPs) store decision logic for reuse across workflows."
          tone: positive
        - label: "Digital Twins Engine (Predictive Intelligence)"
          detail: "Living models of orders, shipments, inventory, assets, and facilities — continuously updated from Intelligent Network events. Enables instant impact analysis when supply chain disruptions occur."
          tone: positive
        - label: "FourSight Analytics & Dynamic ETA (Insight Layer)"
          detail: "ML models analyzing 150+ variables every 15 minutes across all freight modes; predictive, prescriptive, and descriptive analytics for supply chain KPIs. ETA accuracy driven by historical carrier behavior patterns."
          tone: positive
        - label: "Integration & API Layer (System Connectivity)"
          detail: "REST API developer portal; pre-built TMS/ERP connectors (SAP, Oracle, Salesforce, JDA/Blue Yonder, Manhattan Associates); EDI/X12 for carrier status; webhooks for event-driven workflows."
          tone: neutral
        - label: "FourKites Intelligent Network (Data Foundation)"
          detail: "1.1M+ carriers across 200+ countries; 3M+ daily shipments; data from GPS/ELD telematics, mobile carrier app, AIS (ocean), EDI (status), and carrier APIs. Network data is the primary moat and training corpus for all AI models."
          tone: positive

  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    description: "End-to-end operational flow of how a shipper uses FourKites from shipment creation to exception resolution and reporting."
    layout: standard
    claimRefs: [CE010, CE011, CE012, CE013]
    data:
      nodes:
        - label: "Shipment Created in TMS/ERP"
          detail: "Shipper creates shipment in TMS (SAP TM, Oracle OTM, JDA). FourKites ingests via API or EDI integration. Digital Twin instantiated for order and shipment."
          tone: neutral
        - label: "Carrier Assigned & Tracking Activated"
          detail: "FourKites sends tracking request to carrier via GPS/ELD telematics, mobile app, or EDI. Carrier compliance rate determines tracking quality. Premier Carriers have highest compliance."
          tone: neutral
        - label: "Dynamic ETA Updated Continuously"
          detail: "Every 15 minutes, ML model re-scores 150+ factors (weather, traffic, historical dwell, carrier behavior). ETA pushed to shipper portal and TMS via webhook/API."
          tone: positive
        - label: "Exception Alert Generated"
          detail: "If ETA deviation exceeds threshold or risk score spikes, Digital Twin flags exception. Loft Digital Worker (carrier follow-up agent) automatically contacts carrier, logs response, and escalates if no reply."
          tone: positive
        - label: "Resolution or Reroute Decision"
          detail: "Operations team reviews AI-recommended action (reroute, notify customer, adjust dock appointment). Loft can execute dock rescheduling automatically if WMS integration is active."
          tone: positive
        - label: "Performance Reporting via FourSight"
          detail: "Post-shipment data feeds FourSight Analytics: OTD rate, carrier performance score, lane dwell time, exception rate. Cross-modal benchmarking across all modes in unified dashboard."
          tone: positive

