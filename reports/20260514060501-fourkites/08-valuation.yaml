callouts:
  - title: "CONDITIONAL PROCEED at $700-850M — NRR and Loft Adoption Are the Gates"
    calloutType: recommendation
    body: >
      The investment recommendation is CONDITIONAL PROCEED at a $700-850M entry price (5.8-7x
      estimated ARR), NOT at the $1B reference price without financial confirmation. At $750M,
      the probability-weighted MOIC is approximately 1.5x — meeting growth equity hurdle rates.
      At $1B without NRR and ARR confirmation, the probability-weighted return is ~0.95x —
      insufficient risk-adjusted return. The two gates that unlock a favorable recommendation are:
      (1) NRR confirmed at ≥100% (ideally ≥110%); and (2) Loft AI production deployment count
      confirmed at ≥20 Fortune 500 customers with ≥$5M incremental ARR. Both must be confirmed
      before any binding commitment at any price.
    claimRefs: [CV029, CV023, CV024]

  - title: "Descartes Is the Most Likely Strategic Acquirer"
    calloutType: insight
    body: >
      The most actionable exit path for FourKites within the 2027-2028 THL Partners liquidity window
      is a strategic acquisition by Descartes Systems. The logic: Descartes already acquired
      MacroPoint (FourKites' original TL competitor); adding FourKites would create the dominant
      North American supply chain visibility platform with $1.5B+ combined revenue. The Blue Yonder
      precedent (7.7x ARR M&A multiple) supports a $840M-$1.3B offer at estimated base-case ARR
      ($120-140M). For a financial investor entering at $750M, a $1B-$1.2B Descartes exit in 2027
      yields 1.3-1.6x MOIC — modest but achievable without requiring the bull case.
    claimRefs: [CV013, CV028, CV012]

  - title: "Financial Opacity Is the Primary Valuation Blocker"
    calloutType: risk
    body: >
      The fundamental limitation of this valuation analysis is that the most critical inputs — ARR,
      NRR, burn rate, and cash runway — are not publicly disclosed. This creates a $340M-$2.8B
      valuation range that cannot be narrowed from public sources alone. The investment cannot be
      made without clearing the P1 diligence gates: full financial package and Loft commercial
      traction data. Any party engaging FourKites for M&A or secondary financing should require
      these disclosures as a condition of LOI, not post-LOI.
    claimRefs: [CV037, CV016, CV025]

