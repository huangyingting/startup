  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: current-arr-and-nrr
      missingEvidence: "FourKites has not disclosed current ARR, NRR, GRR, or logo churn. All valuation scenarios are based on estimates derived from a 4-year-old CBInsights estimate ($65M, 2021). The investment recommendation cannot be made with confidence without these disclosures."
      whyItMatters: "ARR and NRR are the two fundamental inputs to a SaaS valuation model. ARR determines the revenue base; NRR determines the quality and growth trajectory of that base. Without both, valuation is a range of $340M to $2.8B — too wide to be actionable."
      diligencePath: "Request audited FY2022-2025 ARR and revenue. Request NRR waterfall by year (2021-2025). Request ARR cohort analysis showing logo retention, expansion, and contraction. These three items resolve the single largest valuation uncertainty."
      relatedTableRefs: [TV001, TV003]
      relatedQuestionRefs: [QV001, QV007]

    - type: private-evidence-only
      severity: material
      topic: loft-commercial-traction
      missingEvidence: "Only 2 named Fortune 500 Loft Digital Worker deployments documented (US Cold Storage, Coca-Cola). Total contract count, ACV per Loft module, and pipeline are not disclosed. The Loft upsell is the primary growth thesis beyond core tracking — its traction is the most uncertain variable in the bull case."
      whyItMatters: "If Loft has fewer than 15 production contracts 3 months after launch, the $16-32M incremental ARR estimate is not achievable within the 2027-2028 exit window. This would collapse the bull case probability and shift the distribution toward base/bear."
      diligencePath: "Request total Loft production contract count; ACV per Digital Worker module type; average time from pilot to production; rejection rate (pilots that did not convert); pipeline by stage."
      relatedTableRefs: [TV001]
      relatedQuestionRefs: [QV016]

    - type: private-evidence-only
      severity: material
      topic: preference-stack-and-dilution
      missingEvidence: "FourKites has raised ~$430M with standard private equity and venture preferences. The liquidation preference stack (1x or 2x participating preferred), conversion ratios, and anti-dilution provisions are not publicly disclosed. These directly affect common equity recovery in M&A or IPO scenarios."
      whyItMatters: "At a $700M exit, the $430M preference stack likely absorbs most of the proceeds before common equity holders (employees, founders) receive value. At $1B, common equity likely receives meaningful proceeds. Understanding the preference waterfall is essential for structuring an acquisition or secondary transaction."
