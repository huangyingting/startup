company:
  name: FourKites
chapter:
  number: 8
  title: Valuation
  summary: >
    FourKites was last valued at $1B in June 2022 ($200M Series E led by THL Partners), implying
    approximately 15x estimated 2021 ARR of ~$65M — consistent with 2022 SaaS peak multiples.
    As of May 2026, 47 months have elapsed since that round with no new public financing, IPO filing,
    or M&A announcement. The investment thesis rests on four conviction pillars: (1) dominant position
    in the Fortune 500 CPG/F&B segment with high switching costs; (2) Loft AI platform as a
    monetizable upsell expanding ACV within existing accounts; (3) a defensible carrier data moat
    (1.1M+ connected carriers) that is expensive to replicate; and (4) a path to profitability via
    cost restructuring (near-zero burn 2023 target) that sets up an eventual IPO or strategic sale.
    The anti-thesis centers on financial opacity (NRR/burn not disclosed), ICP saturation in Fortune
    500, and CEO governance risk. In our base case, we estimate FourKites has grown ARR from ~$65M
    (2021) to approximately $110-140M (2025-2026) at a 12-18% CAGR post-pandemic normalization.
    At current supply chain SaaS multiples (6-8x forward ARR), the base case valuation is $660M-$1.1B
    — a wide range reflecting the financial opacity. A bull case (strong Loft adoption, ARR $170M+)
    yields $1.4-2.0B at 8-12x. A bear case (stagnant growth, ARR $85M) yields $340-510M at 4-6x,
    implying a significant down-round. The recommendation is: CONDITIONAL PROCEED — warrant only if
    key diligence gates are cleared, particularly NRR ≥100%, burn rate sustainable, and Loft
    production deployment count exceeding 20 customers.

sections:
  - id: investment-thesis
    title: Investment Thesis and Anti-Thesis
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]
    body: >
      FourKites' investment thesis as of May 2026 rests on three principal pillars. First, market
      position: 9/10 top CPG and 18/20 top F&B enterprise penetration in a growing $14.4B supply
      chain visibility market (2026 estimate) with 4-consecutive Gartner Magic Quadrant Leader
      recognition (2021-2024). This is a defensible position that took 10 years to build and is
      difficult for any single competitor to displace in 12-24 months. Second, AI platform
      differentiation: The Loft AI Agent Platform (launched February 2026) with 5 pre-built
      Digital Workers and the Sophie custom agent development environment represents a credible
      AI-native expansion beyond pure tracking. US Cold Storage's 87% scheduling automation
      and Coca-Cola's customer service latency reduction from 90 minutes to seconds demonstrate
      real enterprise utility. If Loft captures even 20% of the existing 1,600+ customer base
      at a $50-100K ACV uplift per customer, that implies $16-32M incremental ARR — a 12-24%
      expansion of estimated current ARR. Third, defensible moat: 1.1M+ connected carriers,
      carrier compliance programs, and 10 years of shipment data create a network effect and
      data asset that would cost a new entrant $100M+ and 5+ years to replicate. The anti-thesis
      rests on four concerns. (1) Financial opacity: NRR, burn rate, and current ARR are undisclosed.
      If the 2022-2023 workforce reductions reflected customer churn rather than pure cost correction,
      the financial trajectory is worse than implied. (2) ICP saturation: 9/10 top CPG
      penetration means the highest-value acquisition targets are already captured; future growth
      requires moving down-market (where FourKites has limited traction) or cross-selling Loft AI
      (which is unproven at scale). (3) Competitive timeline: project44 and SAP/Oracle native
      TMS bundles are advancing. If SAP acquires a standalone visibility vendor in the next 24
      months, the competitive moat narrows significantly. (4) CEO governance: The 2022 defamatory
      email incident is a pre-IPO governance liability. Any institutional acquirer conducting
      M&A due diligence will probe this intensively.

  - id: valuation-context
    title: Valuation Context and Entry Discipline
    tableRefs: [TV003, TV004]
    figureRefs: [FV002, FV003]
    body: >
      FourKites' last disclosed valuation is $1B (June 2022). In the 47 months since, the SaaS
      valuation landscape has changed dramatically: peak 2021-2022 multiples of 15-25x forward
      ARR compressed to 5-8x by mid-2023 and have partially recovered to 6-10x for high-quality
      SaaS businesses in 2025. The supply chain technology subset, anchored by Descartes Systems
      (NASDAQ: DSGX), trades at approximately 8x trailing revenue with 77% gross margins and 29%
      operating margins — representing the achievable public-company outcome for a mature,
      profitable supply chain SaaS business. E2open (NASDAQ: ETWO), the more direct comp as an
      enterprise supply chain platform, trades at approximately 3-4x trailing revenue — heavily
      discounted due to integration debt from its 2021-2022 acquisition binge and weak EBITDA.
      FourKites' private market position sits between these outcomes: better gross margins than
      E2open (estimated ~70%+) but not yet at Descartes' maturity level. For entry discipline,
      the critical question is whether a potential investor or acquirer is getting a fair deal
      at or near the $1B reference price. At $1B and estimated base-case ARR of $120M, the
      implied multiple is ~8.3x trailing ARR — at the high end of justifiable for a private,
      unprofitable SaaS business. At $700-800M entry, the multiple would be 5.8-6.7x — more
      defensible if NRR is confirmed above 100% and Loft adoption is accelerating. At bear
      case ARR of $85M, a $500M entry would be ~5.9x — fair, but only if the Loft upsell
      thesis has strong evidence to justify the growth premium over a no-growth scenario.
      Entry discipline therefore requires: (a) confirmed NRR ≥100% to validate revenue
      quality; (b) Loft production deployment count ≥20 to validate AI upsell; (c) confirmed
      cash runway ≥18 months; and (d) governance remediation documentation post-2022 CEO incident.

  - id: scenarios
    title: Bull, Base, and Bear Scenarios
    tableRefs: []
    figureRefs: [FV004]
    body: >
      Three scenarios are modeled for FourKites, each contingent on resolution of the financial
      opacity gap. All scenarios assume a 2026-2028 exit window (IPO or strategic sale).
      Bull case (25% probability): ARR has grown at 20%+ CAGR from $65M (2021) to $170M+ (2026),
      driven by net new enterprise logos and Loft AI ACV expansion. NRR is confirmed at 115%+.
      Loft has 50+ Fortune 500 production deployments generating $15-25M ARR uplift. Profitability
      path is clear: 70%+ gross margins, near-zero burn achieved by 2024, free cash flow positive
      by 2025. Exit multiple in 2027-2028 at 10-14x forward ARR = $1.7B-$2.8B valuation. Return
      on $1B entry: 1.7-2.8x MOIC in 3-4 years. Base case (50% probability): ARR of $120-140M
      (15-17% CAGR), NRR at 105-110%, modest Loft adoption (20-30 customers). Gross margins 70%,
      EBITDA near-zero. Exit in 2027-2028 at 7-9x ARR = $840M-$1.26B. Return on $1B entry:
      0.84-1.26x MOIC — effectively breakeven to slight loss. Bear case (25% probability): ARR
      stagnant at $85-95M (5-10% CAGR), NRR 90-95% indicating revenue erosion, Loft adoption
      slow, potential down-round pressure, and CEO governance distraction. Exit in 2027-2028 at
      4-5x ARR = $340-$475M. Return on $1B entry: 0.34-0.48x — significant impairment.
      The probability-weighted expected return on a $1B entry is approximately 0.95x — nearly
      breakeven before fees, consistent with a high-risk, uncertain-return investment at the
      current reference valuation. The risk/return is improved significantly at $700-750M entry
      (probability-weighted ~1.3-1.5x), which requires a meaningful markdown from the 2022
      reference valuation.

  - id: comparable-analysis
    title: Comparable Company Analysis
    tableRefs: []
    figureRefs: []
    body: >
      FourKites sits at a specific intersection in the supply chain technology landscape: it is more
      specialized than a full TMS/ERP suite (SAP, Oracle) but more focused on visibility than a
      broad control tower play (Blue Yonder, E2open). The most instructive comparables are:
      (1) Descartes Systems (DSGX): The gold standard outcome for supply chain visibility SaaS.
      $729M FY2024 revenue; 77% gross margins; 29% operating margins; NASDAQ-listed; ~$6B market
      cap (May 2026); ~8x trailing revenue. Descartes acquired MacroPoint (FourKites' direct TL
      tracking competitor) in 2017. If FourKites achieves Descartes-comparable metrics at $200M
      ARR, it could command a $1.6B valuation at 8x. (2) project44: FourKites' primary private
      peer. Last disclosed valuation $2.7B (2021 Series F). Like FourKites, project44 has not
      announced new funding or IPO through May 2026. The private market reset likely brought
      project44's mark-to-market valuation to $1-1.5B in 2024-2025. The project44/FourKites
      private comp suggests FourKites at $700-900M is plausible. (3) E2open (ETWO): Cautionary
      tale. Acquired via SPAC in 2021; built through acquisitions; $600M ARR; but trades at 3-4x
      due to integration complexity and weak EBITDA. FourKites' organic-only growth differentiates
      it from E2open but also limits revenue scale. (4) Blue Yonder: Acquired by Panasonic in 2021
      for ~$8.5B at ~$1.1B ARR (7.7x) — a precedent for large-scale supply chain SaaS M&A.
      (5) Körber Supply Chain (private): $1B ARR, acquired multiple logistics software companies.
      These comps suggest a $600M-$1.4B valuation for FourKites is the reasonable range in the
      current market, with the bull case approaching $2B if Loft AI delivers on its ACV expansion
      promise and the IPO market opens for supply chain SaaS.

  - id: exit-readiness
    title: Exit Readiness and Final Diligence Asks
    tableRefs: [TV005, TV006]
    figureRefs: []
    body: >
      FourKites' exit readiness as of May 2026 is assessed as follows. For an IPO path: The company
      would need to demonstrate $150M+ ARR, NRR >110%, EBITDA-positive (or clear path), and resolve
      the CEO governance disclosure. The IPO market for SaaS businesses has been selective since
      2022; the window is reopening for profitable or near-profitable SaaS businesses with clear
      differentiation in 2025-2026. FourKites is not yet IPO-ready on publicly available evidence.
      For a strategic acquisition: The most likely acquirers are SAP, Oracle, Kinaxis, Descartes,
      or a private equity rollup. SAP/Oracle would likely bundle FourKites into TMS suites at a
      discount multiple; FourKites leadership would resist this given the standalone AI platform
      thesis. Descartes is the most strategic fit (MacroPoint + FourKites would create the
      dominant North American TL/ocean visibility platform), with potential 8-10x synergy multiple
      justifying a $1-1.5B offer. Private equity secondary: THL Partners as lead investor has a
      typical 5-7 year investment timeline; the Series E closed June 2022. A PE secondary
      recapitalization at 2024-2025 marks could provide liquidity at a markdown from $1B.
      The five final diligence priorities are: (1) full financial package (ARR, NRR, GRR, churn,
      burn, cash); (2) Loft AI commercial traction (contract count, ACV, pipeline); (3) board
      governance documentation post-2022 CEO incident; (4) top-10 customer contract analysis
      (tenure, renewal status, expansion commitment); and (5) technology due diligence (SOC 2,
      cloud architecture, AI error rate at production scale). These five gates determine whether
      the investment thesis is fundable at any price point, let alone the $1B reference.

