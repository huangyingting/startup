      answer: "As of May 2026: (1) Loft AI launched (Feb 2026) and Booking Connect Ocean (May 2026) — continued R&D investment signals operating cash flow; (2) Gartner Supply Chain Symposium presence (May 2026) — continued enterprise sales investment; (3) Three advisory board formations (2025) — continued customer success investment. These signal a company still investing in growth, not harvesting. No revenue disclosure, fundraising, or M&A was announced."
      sourceRefs: [SV013, SV024, SV014]
      claimRefs: [CV001]

    - id: QV030
      type: adverse
      question: "What is the probability that Descartes acquires FourKites and at what valuation?"
      targets: ["contentRequirements/5"]
      status: answered
      answer: "Low but increasing probability (est. 10-20%). Descartes would create the dominant NA supply chain visibility platform by combining MacroPoint (TL) + FourKites (TL/ocean/AI). Strategic rationale is strong. Descartes' acquisition strategy (multiple bolt-on deals at 5-9x ARR) and balance sheet ($1B+ in acquired assets) support ability. Estimated offer range: $800M-$1.3B at 6.5-9.5x estimated ARR. This would represent a fair acquisition outcome for THL Partners but not the 2x MOIC required for bull case return."
      sourceRefs: [SV007, SV022, SV013]
      claimRefs: [CV013]

    - id: QV031
      type: quantification
      question: "What discount rate should an investor apply to FourKites' cash flows given its risk profile?"
      targets: ["contentRequirements/3"]
      status: answered
      answer: "For a private equity investor in a high-risk, late-stage venture SaaS: 20-25% IRR hurdle is standard. At a 22% IRR, 4-year hold, 1.0x entry investment requires 2.15x exit value ($2.15B on $1B entry). This is achievable only in the bull case ($1.7-2.8B). For a strategic acquirer using strategic synergy (cost of capital ~8-10%): the IRR hurdle is much lower — a $1-1.2B acquisition price is justifiable even at base case ARR."
      sourceRefs: [SV005, SV016]
      claimRefs: [CV009]

    - id: QV032
      type: verification
      question: "Is THL Partners' 2022 Series E investment thesis still intact as of 2026?"
      targets: ["contentRequirements/2"]
      status: answered
      answer: "Partially. THL's 2022 investment thesis was based on: (1) visibility market growth (intact — RTTV market still growing); (2) FourKites market leadership (intact — 4-year Gartner Leader); (3) platform expansion opportunity (partially intact — Loft AI is live but unproven at scale); (4) profitability path (partially intact — near-zero burn stated 2023 but unconfirmed). The 47-month timeline without new financing suggests THL is waiting for better exit conditions rather than indicating thesis failure."
      sourceRefs: [SV018, SV019, SV007]
      claimRefs: [CV022]

