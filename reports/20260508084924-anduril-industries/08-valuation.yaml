chapter:
  number: 8
  title: Valuation
  summary: |
    Anduril's implied valuation of ~$30B (June 2025 secondary transactions) and ~$14B (Series F,
    August 2024) reflects a 20-30x trailing revenue multiple against an estimated $1.0-1.5B ARR.
    Comparable analysis shows Palantir (the closest public comp) trades at 55-65x NTM revenue —
    suggesting Anduril could command a premium if it achieves Palantir-level software margin
    disclosure at IPO. Bear-case risk is repricing to hardware-company multiples (3-5x revenue
    for companies like Kratos). Our base-case intrinsic valuation is $18-25B on a 15-20x forward
    revenue multiple applied to $1.3B 2025E ARR, implying the current $30B secondary market
    price reflects either (a) a well-justified premium for Lattice OS optionality, or (b)
    a speculative overhang that would be corrected at IPO. The valuation stance is stretched
    at current implied price but justified if Anduril achieves $2B+ ARR and demonstrates
    software-dominant margin structure before going public.
