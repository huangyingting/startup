  claims:
    - id: CV001
      statement: >-
        Anduril's primary valuation anchor is the Series F (August 2024): $1.5B raised at a $14B post-money valuation,
        implying a ~12-14x trailing revenue multiple at the time against an estimated $1.0-1.1B ARR. This was co-led by
        Founders Fund and Andreessen Horowitz with participation from Valor Equity Partners, 8VC, Lux Capital, Elad Gil,
        General Catalyst, and others.
      type: observed
      topic: series-f-primary-valuation-anchor
      sourceRefs:
        - SV002
        - SV003
        - SV005
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV001
        - QV002
    - id: CV002
      statement: >-
        Secondary market transactions in June 2025 implied an Anduril valuation of ~$30B — approximately 2.1x the August
        2024 Series F post-money valuation within 10 months. This reflects: (a) Replicator program momentum, (b) CCA
        contract announcement, (c) Arsenal-1 groundbreaking, and (d) continued defense AI investment enthusiasm. At $30B
        with ~$1.3B estimated 2025 ARR, the implied multiple is ~23x trailing revenue.
      type: observed
      topic: secondary-market-valuation-30b-2025
      sourceRefs:
        - SV001
        - SV006
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV001
        - QV003
    - id: CV003
      statement: >-
        Total capital raised: Anduril has raised approximately $3.7B in equity financing across all rounds (Seed through
        Series F), per SEC Form D filings. The most recent Form D (August 2024) documented the $1.5B Series F. This
        capital has been deployed into: Arsenal-1 ($2B committed construction and equipment), R&D headcount (~4,500
        employees), and working capital for government contract execution.
      type: observed
      topic: total-capital-raised-structure
      sourceRefs:
        - SV005
        - SV021
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV002
        - QV004
    - id: CV004
      statement: >-
        Palantir (PLTR) is the most relevant public comparable for Anduril valuation. As of early 2026, Palantir trades
        at approximately 50-65x NTM (next twelve months) revenue with $2.5-3.0B TTM revenue and ~27% government revenue
        growth. Palantir's premium reflects: AI platform narrative, government-software-sticky revenue, improving
        commercial mix, and 20%+ FCF margin. Anduril's government-software-plus-hardware mix is less favorable for
        software multiples but its growth rate (40-60% CAGR estimated) is significantly higher than Palantir's 20-25%.
      type: observed
      topic: palantir-primary-comparable
      sourceRefs:
        - SV009
        - SV011
        - SV012
        - SV013
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV005
        - QV006
    - id: CV005
      statement: >-
        Kratos Defense & Security (KTOS) provides the bear-case multiple anchor: Kratos trades at 3-4x trailing revenue
        with attritable UAV and satellite products. If Anduril's IPO is priced as a hardware-heavy defense manufacturer
        rather than a software-plus-systems company, the public market would reprice Anduril toward Kratos-like
        multiples — implying a $4-6B valuation at current revenue levels, or roughly 80-85% below the $30B secondary
        implied valuation.
      type: observed
      topic: kratos-bear-case-comp
      sourceRefs:
        - SV034
        - SV014
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV005
        - QV007
    - id: CV006
      statement: >-
        Traditional defense primes (Lockheed Martin, Northrop Grumman, L3Harris) trade at 1-2x revenue with 8-12%
        operating margins. These are hardware-dominant companies with cost-plus revenue structures. Anduril's
        significantly higher implied multiple vs. defense primes reflects: (a) growth premium (40-60% vs. 5-10% for
        primes), (b) software optionality via Lattice OS, (c) venture-style exit premium in private markets, and (d)
        lower-cost structure potential as a tech-first company.
      type: observed
      topic: defense-prime-low-multiple-comps
      sourceRefs:
        - SV030
        - SV031
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV005
        - QV008
    - id: CV007
      statement: >-
        Revenue estimate triangulation: three independent sources suggest Anduril's 2024-2025 ARR of $1.0-1.5B.
        PitchBook estimates ~$1.3B ARR in 2024. USASpending contract awards data shows >$1B in cumulative contract
        awards but these lag revenue by 12-24 months. The Axios $30B valuation article implies ~$1.3-1.5B ARR at 20-23x
        multiple. We use $1.25B as the base-case 2024 ARR estimate with 40% YoY growth implying $1.75B 2025E ARR.
      type: inferred
      topic: revenue-estimate-triangulation
      sourceRefs:
        - SV006
        - SV029
        - SV001
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV003
        - QV009
    - id: CV008
      statement: >-
        Bull-case DCF scenario: Anduril achieves $4B ARR by 2028, maintains 65% gross margin (software-dominant),
        reaches 20% EBITDA margins, and IPOs at 30x NTM revenue in 2028. Implied IPO market cap: ~$120B. Net present
        value (discounting back at 25% hurdle rate): ~$60-70B, implying a 2x return on today's $30B implied valuation.
        This requires sustained 40% ARR growth through 2028 and margin structure improvement to software levels.
