sections:
  - id: SV-S1
    title: Valuation Anchors and Capital Structure
    body: |
      Anduril's valuation history reflects the rapid re-rating of the defense AI sector. The Series F
      (August 2024) established the primary anchor at $14B post-money on $1.5B raised, implying
      12-14x trailing revenue. By June 2025, secondary transactions implied ~$30B — a 2.1x step-up
      in 10 months driven by Replicator program momentum, CCA contract announcement, and continued
      defense AI investment enthusiasm. Total equity capital raised exceeds $3.7B across all rounds
      per SEC Form D filings, deployed primarily into Arsenal-1 manufacturing ($2B) and headcount
      (4,500+ employees at estimated $150-200K total compensation = $675M-900M/year).

      The capital structure remains private-company opaque: the specific preferred share terms
      (liquidation preferences, anti-dilution ratchets, participation rights) for each round are
      not publicly available. Series F investors ($14B entry) are marginally above their entry
      at $30B secondary implied valuation, but need a successful IPO above $14B to realize returns.
      Series A/B/C investors (2018-2020, sub-$2B entry) are sitting on 15-65x unrealized gains.

      Anduril's $30B secondary implied valuation of 23x trailing $1.25B estimated ARR reflects
      rational market optimism for a structurally unique defense platform. Comparable primary
      evidence from SEC Form D filings, PitchBook, and press confirms both the capital structure
      and the secondary market pricing.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV021
      - CV037
    tableRefs:
      - TV003
    figureRefs:
      - FV001
      - FV004
  - id: SV-S2
    title: Comparable Analysis and Multiple Framework
    body: |
      The valuation comparison set spans four tiers: (1) Palantir (PLTR) — the closest public comp
      at 55-65x NTM revenue for defense AI software with 22% revenue growth and 20%+ EBITDA margins;
      (2) Shield AI — closest private comp at ~7-14x estimated revenue for defense autonomy software;
      (3) Kratos Defense — bear-case hardware comp at 3-4x revenue for attritable UAV hardware;
      (4) Defense primes (Lockheed, Northrop) — floor comps at 1-2x revenue for hardware-dominant
      defense manufacturers.

      Anduril at 23x trailing revenue sits appropriately between the software comps (Palantir) and
      the hardware comps (Kratos/primes), reflecting its hybrid business model. On a growth-adjusted
      basis, Anduril appears less expensive than Palantir: 23x revenue at 40% growth vs. 55x at
      22% growth implies Anduril is priced at 0.57x revenue/growth vs. Palantir's 2.5x revenue/growth.
      This growth-adjusted analysis supports the argument that the private market is appropriately
      pricing — not overpricing — Anduril relative to its public software comp.

      Joby Aviation and IronNet Cybersecurity provide cautionary IPO precedents: both went public
      at high pre-IPO multiples and faced severe post-IPO compression. The key differentiator for
      Anduril is the requirement to disclose GAAP financials at IPO — if gross margins reveal
      hardware-dominance (30-40% gross margin vs. software-typical 65-75%), the market will reprice
      toward Kratos-like multiples regardless of growth rate. Anduril's preparation for this
      disclosure is the single most important pre-IPO risk management action.
    claimRefs:
      - CV004
      - CV005
      - CV006
      - CV011
      - CV012
      - CV014
      - CV015
