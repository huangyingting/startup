  - id: SV-S3
    title: Intrinsic Value, Scenarios, and Investment Recommendation
    body: |
      Our base-case sum-of-the-parts intrinsic value estimate is $21-23B, 30% below the $30B
      secondary implied valuation, derived from: Lattice OS software segment ($375M NTM at 40x) =
      $15B; autonomous weapons hardware ($875M NTM at 5x) = $4.4B; Arsenal-1 tangible asset value
      ($1.5B); and net cash ($0.75B). This analysis is highly sensitive to the software/hardware
      revenue split, which is not publicly disclosed.

      DCF scenario analysis yields: bull case ($4B ARR, 2028 IPO at 30x NTM) = $60-80B market cap
      with 2-3x return from $30B entry; base case ($2.5B ARR, 2028 IPO at 20x NTM) = $35-40B
      with flat to modest return from $30B entry; bear case ($1.8B ARR, hardware multiple repricing)
      = $18B with 40% loss from $30B entry. Probability-weighted intrinsic value: ~$26-30B, suggesting
      the current $30B secondary price reflects a narrow margin of safety but is not obviously in
      bubble territory.

      Investment recommendation: TRACK at current pricing. The $14B Series F represented an
      ATTRACTIVE entry. The $30B secondary market price represents a STRETCHED but not unreasonable
      valuation for a patient investor with a 5-7 year horizon who believes in the bull case scenario.
      Near-term catalysts to watch: CCA Phase 2 downselect (binary), Arsenal-1 first deliveries
      (execution proof), and any IPO S-1 filing (full margin disclosure). The valuation stance moves
      to BUY if any major catalyst confirms the bull case, and moves to AVOID if CCA is lost or
      margins disappoint at IPO.
