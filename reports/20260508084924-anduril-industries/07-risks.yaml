chapter:
  number: 7
  title: Risk Analysis
  summary: |
    Anduril faces a distinctive risk profile shaped by its position as a defense tech startup
    selling autonomous weapons to a single-sector customer base. Key risks include: (1) regulatory
    and legal exposure under international humanitarian law (LAWS debate), ITAR restrictions, and
    DoD policy changes; (2) political risk from the civil society and Congressional movement against
    lethal autonomous weapons; (3) execution risk on Arsenal-1 manufacturing scale-up; (4) customer
    concentration risk (3-4 programs = 60-70% revenue); (5) competitive risk from defense prime
    buildup of AI/autonomy capabilities; (6) financial risk of high cash burn and capital market
    dependency; and (7) talent and organizational risk of rapid scale. The risk profile is high but
    partially offset by structural demand tailwinds and a strong moat in deployed Lattice OS programs.
