  claims:
    - id: CR001
      statement: >-
        Anduril faces direct legal risk from international moves to regulate or ban lethal autonomous weapons systems
        (LAWS). The UN Convention on Certain Conventional Weapons (CCW) has held multilateral discussions on LAWS since
        2014, with France, Germany, and the UK calling for binding regulation. If binding treaty restrictions on LAWS
        pass, Anduril's strike-capable systems (ALTIUS, Roadrunner, Fury, YFQ-44A) could be restricted or banned.
      type: observed
      topic: laws-international-legal-risk
      sourceRefs:
        - SR001
        - SR004
        - SR031
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
        - QR002
    - id: CR002
      statement: >-
        DoD Directive 3000.09 requires that autonomous and semi-autonomous weapon systems be designed to allow
        commanders and operators to exercise appropriate levels of human judgment over the use of force. The directive
        was last updated in 2023, and further revision — potentially adding stricter latency or authorization
        requirements — could require Anduril to modify its systems at significant cost.
      type: observed
      topic: dod-directive-3000-09-risk
      sourceRefs:
        - SR004
        - SR002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
        - QR003
    - id: CR003
      statement: >-
        ITAR (International Traffic in Arms Regulations) legal risk is structural for Anduril. Any inadvertent transfer
        of technical data, personnel movements, or sales to non-ITAR-exempt nations can trigger criminal and civil
        penalties under 22 U.S.C. §§ 2778-2780 and 22 CFR Parts 120-130. The complexity of Anduril's international
        partnerships (AUKUS, potential future partners) increases the probability of ITAR compliance errors as the
        company scales.
      type: inferred
      topic: itar-compliance-legal-risk
      sourceRefs:
        - SR004
        - SR032
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR002
        - QR004
    - id: CR004
      statement: >-
        The Human Rights Watch 'Stop Killer Robots' campaign has singled out Anduril by name in reports and advocacy,
        calling for a ban on fully autonomous weapons. HRW works directly with UN member states and Congressional
        offices. If their advocacy succeeds in passing binding legislation or forcing DoD to adopt a stricter LAWS
        definition, Anduril's autonomous strike systems would face procurement restrictions.
      type: observed
      topic: hrw-stop-killer-robots-campaign
      sourceRefs:
        - SR001
        - SR003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR003
        - QR001
    - id: CR005
      statement: >-
        The ACLU and civil liberties organizations have raised legal challenges around Anduril's Sentry Tower deployment
        with CBP. While no federal court has yet enjoined the program, potential Fourth Amendment challenges to
        warrantless autonomous surveillance of border areas represent a legal risk that could result in program
        modification requirements or reputational damage to Anduril's CBP customer relationship.
      type: observed
      topic: aclu-cbp-legal-challenge-risk
      sourceRefs:
        - SR003
        - SR031
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR003
        - QR002
    - id: CR006
      statement: >-
        Customer concentration risk is the most quantifiable risk: 3-4 programs (SOCOM, CBP, Replicator, CCA) likely
        represent 60-70% of total revenue. Loss of the SOCOM relationship — estimated at 20-30% of ARR — would be a
        material adverse event. The Replicator program's continued funding is subject to annual congressional
        appropriation and OSD priority shifts.
      type: inferred
      topic: customer-concentration-revenue-risk
      sourceRefs:
        - SR011
        - SR018
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR005
        - QR006
    - id: CR007
      statement: >-
        Traditional defense primes are building autonomous systems and AI capabilities specifically to compete with
        Anduril. Lockheed Martin's Skunk Works AI programs, Northrop Grumman's autonomous air system (X-47B successors),
        and Raytheon's AI-enabled weapons all represent existing prime capability that could close the technology gap
        with Anduril over a 3-5 year development timeline.
      type: observed
      topic: prime-competitive-buildup-risk
      sourceRefs:
        - SR028
        - SR027
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR007
        - QR008
    - id: CR008
      statement: >-
        The CCA (Collaborative Combat Aircraft) competition presents a binary risk for Anduril: losing to General
        Atomics' YFQ-42A would not only eliminate a potential $5-10B production program but also signal to the DoD
        acquisition community that Anduril cannot compete on the largest Air Force platform programs. This reputational
        risk has cascading effects on other program competitions.
      type: inferred
      topic: cca-competition-loss-risk
      sourceRefs:
        - SR006
        - SR007
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR007
        - QR005
    - id: CR009
      statement: >-
        Arsenal-1 manufacturing scale-up risk is significant: Anduril has never before operated a manufacturing facility
        at the scale required to produce Fury cruise missiles, Roadrunner interceptors, and Barracuda drones
        simultaneously. Hardware manufacturing execution failures (supply chain delays, quality defects, cost overruns)
        are common for first-time defense prime manufacturers, and could delay production schedules and impair revenue
        recognition.
      type: inferred
      topic: arsenal-1-manufacturing-execution-risk
      sourceRefs:
        - SR015
        - SR006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR009
        - QR010
    - id: CR010
      statement: >-
        Financial risk: Anduril's estimated burn rate of $1.2-1.8B annually requires continuous external capital access.
        The Series F ($1.5B, Aug 2024) provides estimated 12-24 months of runway. If market conditions deteriorate
        (risk-off IPO environment, defense tech valuation compression, or program setbacks) before Anduril achieves
        profitability or completes an IPO, the company could face a funding gap — a classic 'valley of death' for
        capital-intensive defense hardware companies.
      type: inferred
      topic: capital-dependency-funding-risk
      sourceRefs:
        - SR010
        - SR014
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR011
        - QR006
    - id: CR011
      statement: >-
        Talent risk is heightened by Anduril's defense mission: a meaningful percentage of Silicon Valley software
        engineers oppose working on lethal defense systems. Google's 2018 Project Maven employee protest (which led
        Google to exit the contract) is the canonical example of tech talent ethics conflicts. Anduril has deliberately
        positioned itself as pro-defense, but this filters the talent pool and creates ongoing attrition risk from
        employees who change their views over time.
      type: observed
      topic: talent-ethics-attrition-risk
