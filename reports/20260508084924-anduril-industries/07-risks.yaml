sections:
  - id: SR-S1
    title: Legal, Regulatory, and Policy Risks
    body: |
      Anduril faces the most complex legal and regulatory risk profile of any current defense tech
      startup. Three distinct legal frameworks create material exposure: (1) International Humanitarian
      Law (IHL) / LAWS regulation — the CCW process and HRW 'Stop Killer Robots' campaign create
      treaty-level risk for Anduril's autonomous strike systems; (2) ITAR enforcement — scaling
      international operations under AUKUS and potential future partnerships increases the probability
      of inadvertent transfer violations, subject to civil and criminal penalties; and (3) DoD
      Directive 3000.09 — further revisions requiring stricter human control latency thresholds could
      require expensive system modifications.

      HRW has specifically named Anduril's Roadrunner and ALTIUS systems in its LAWS advocacy
      targeting CCW member states. If the UN CCW achieves binding treaty language — a non-trivial
      probability given France, Germany, and UK support — Anduril's strike platforms could face
      procurement restrictions even from US government customers under treaty compliance obligations.
      The ACLU's targeted killing and autonomous surveillance litigation track record shows that
      legal challenges can succeed even against established government programs.

      The OTA-to-FAR compliance transition also creates legal risk: production contracts (FAR)
      require cost accounting standards (CAS), TINA certification, and DFARS compliance that OTA
      prototype contracts do not. Anduril must build FAR-compliant financial systems before its
      production revenue base exceeds OTA revenue — a transition that has caused compliance problems
      for other first-time defense production contractors. DDTC has levied penalties of $8-$79M on
      defense companies for ITAR violations, a cost that would be material relative to Anduril's
      estimated operating budget.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR029
      - CR031
      - CR032
    tableRefs:
      - TR001
      - TR003
      - TR006
    figureRefs:
      - FR001
      - FR004
  - id: SR-S2
    title: Execution, Competitive, and Financial Risks
    body: |
      Arsenal-1 manufacturing scale-up is Anduril's most proximate execution risk. Transitioning
      from a software-first startup to a multi-platform weapons manufacturer is a qualitatively
      different operating challenge: quality control, supply chain coordination, production scheduling,
      and cost structure all change when building hardware at volume. The COTS supply chain approach
      reduces some costs but introduces geopolitical risk: Taiwan-sourced semiconductors and sensors
      are critical to Ghost, Roadrunner, and Fury production. A semiconductor shortage or export
      restriction event could delay production schedules and impair revenue recognition milestones.

      Competitive risk from defense prime buildup is real but slow-moving: Lockheed, Northrop,
      and Raytheon all have autonomous systems programs, but their development cycles (5-10 years)
      give Anduril time to establish switching-cost moats via Lattice OS deployments. Peer defense
      tech startups (Shield AI's Hivemind, Epirus's Leonidas, Kratos's UTAP-22) are more immediate
      threats in specific niches. The CCA competition is Anduril's highest-stakes near-term competitive
      test: losing to General Atomics would have cascading reputational and revenue effects.

      Financial risk is structural at current burn rates: estimated $1.2-1.8B annual cash consumption
      requires either successful capital markets access (IPO or debt) or continued VC support. Defense
      tech IPO windows are seasonal and market-dependent — if rates rise, defense tech multiples
      compress, or Anduril suffers a program setback before IPO, the capital gap risk becomes acute.
      Government shutdown exposure adds a cash flow shock risk unique to 100%-government-revenue companies.
