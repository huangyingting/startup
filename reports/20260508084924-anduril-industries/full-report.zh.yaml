      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              仅美国在 FY2025 的防务支出约 $886B，其中 RDT&E 预算约 $145B。该预算中属于自主系统和 AI 的子集估计每年 $9-12B，并以 12-18% CAGR 增长。全球军费在 2023 年达到
              $2.44 trillion（SIPRI），其中自主系统估计占 5-8%——各国合计年支出约 $120-200B，美国占 35-40%。


              就 Anduril 而言：自主空中系统（到 2030 年，美国 + 盟国每年 $15-20B）、反 UAS（到 2030 年 $7B）、AI C2 软件（$8-12B）和水下系统（$3-5B）合计 TAM
              每年超过 $40-50B。SAM——Anduril 以现有产品能够可信竞争的项目——估计每年 $10-15B。3-5 年维度的 SOM（考虑产能、合同管线和竞争位置）估计每年 $2-4B，与一家到
              2028-2030 年可能实现 $2-4B ARR 的公司相符。


              市场规模测算差异很大：分析师估计会因范围定义和增长假设不同而相差 50%+。保守估算对 Anduril $30B+ 的隐含估值仍有吸引力，因为即便 2028 年只做到 $2B ARR，也能支撑 15x
              远期收入倍数，与高增长政府 SaaS 先例相符。
