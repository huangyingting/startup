      - number: '7.2'
        title: 执行、竞争与财务风险
        blocks:
          - type: paragraph
            body: >
              Arsenal-1 制造规模化是 Anduril
              最近在眼前的执行风险。从软件优先创业公司转向多平台武器制造商，是性质完全不同的运营挑战：质量控制、供应链协同、生产排程和成本结构，都会在硬件规模化生产时改变。COTS
              供应链路径降低了部分成本，但引入地缘政治风险：来自台湾的半导体和传感器对 Ghost、Roadrunner 和 Fury 生产至关重要。半导体短缺或出口限制事件，可能推迟生产进度并损害收入确认里程碑。


              防务主承包商加码带来的竞争风险真实存在，但移动较慢：Lockheed、Northrop 和 Raytheon 都有自主系统项目，但它们 5-10 年的开发周期，让 Anduril 有时间通过 Lattice OS
              部署建立切换成本护城河。同类防务科技创业公司（Shield AI 的 Hivemind、Epirus 的 Leonidas、Kratos 的 UTAP-22）在特定细分上威胁更近。CCA 竞争是 Anduril
              近期风险最高的竞争测试：输给 General Atomics 将引发声誉和收入的连锁影响。


              以当前烧钱速度看，财务风险是结构性的：估计每年 $1.2-1.8B 现金消耗，需要成功进入资本市场（IPO 或债务）或持续 VC 支持。防务科技 IPO
              窗口具有季节性，也受市场环境影响——如果利率上升、防务科技倍数压缩，或 Anduril 在 IPO 前遭遇项目挫折，资本缺口风险会变得尖锐。政府停摆暴露也给 100% 政府收入公司带来独有的现金流冲击风险。
