  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与获客
        blocks:
          - type: paragraph
            body: >
              Anduril 的客户基础完全是美国和盟国政府防务机构。已确认客户包括：SOCOM（Ghost UAS、ALTIUS 弹药）、CBP（Sentry
              Tower）、美国陆军（ALTIUS、反无人机企业级工具）、美国海军 / DIU（Dive-LD、Dive-XL）、美国空军（CCA YFQ-44A 竞争、Fury/FAMM）、DoD
              Replicator（大批量 Ghost）、Space Force（ExoAnalytic）、Royal Australian Navy（Ghost Shark）以及经 AUKUS 接入的 UK
              MoD。未发现商业客户或非防务政府客户。


              获客沿着防务采购路径推进：用 DIU OTA 合同进入原型阶段，通过竞争性 RFP 或有限竞争获得量产授标，再用企业级合同工具获取经常性任务订单。Anduril
              没有入站营销或自助式管线——所有获客都靠关系驱动，并由大量前军方和采购官员组成的业务开发团队支持。从首次接触到第一份合同授标，典型销售周期为 18-36 个月。


              美国政府作为客户类别有结构性优势：零违约风险、正式项目的多年期承诺、国会对自主系统的法定授权，以及 DoD 预算中专门面向 AI 和自主能力且持续增长的预算线（FY2025 防务预算超过
              $2B）。这形成了一条客户资金流，比商业市场周期性更弱，并随每个 NDAA 周期结构性扩张。
