      - number: '8.2'
        title: 可比分析与倍数框架
        blocks:
          - type: paragraph
            body: >
              估值可比集分为四层：（1）Palantir（PLTR）——最接近的上市可比，防务 AI 软件，NTM 收入 55-65x，收入增长 22%，EBITDA 利润率 20%+；（2）Shield
              AI——最接近的私营可比，防务自主软件，估计收入约 7-14x；（3）Kratos Defense——悲观情景硬件可比，可消耗 UAV 硬件，收入
              3-4x；（4）防务主承包商（Lockheed、Northrop）——以硬件为主的防务制造商，收入 1-2x，是下限可比。


              Anduril 23x 过去 12 个月收入的位置，合理落在软件可比（Palantir）和硬件可比（Kratos / 主承包商）之间，反映其混合商业模式。按增长调整后，Anduril 看起来低于
              Palantir：40% 增长对应 23x 收入，而 Palantir 22% 增长对应 55x，意味着 Anduril 的收入 / 增长定价为 0.57x，而 Palantir 为
              2.5x。该增长调整分析支持一个观点：私募市场对 Anduril 是合理定价，而非相对上市软件可比过度定价。


              Joby Aviation 和 IronNet Cybersecurity 提供了警示性 IPO 先例：二者都以高 IPO 前倍数上市，之后遭遇严重 IPO 后压缩。Anduril 的关键差异，是 IPO
              时必须披露 GAAP 财务——如果毛利率显示公司由硬件主导（30-40% 毛利率，而非软件典型的 65-75%），无论增长率如何，市场都会向 Kratos 类倍数重定价。为这项披露做好准备，是 Anduril
              最重要的 IPO 前风险管理动作。
            claimRefs:
              - CV004
