  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Anduril 的竞争格局独特地分成两端：它同时面对全球最大的防务公司（Lockheed Martin、Northrop Grumman、Boeing、RTX、General
              Dynamics、L3Harris——年收入均为 $20-60B+）和一批新兴 VC 支持的防务科技创业公司（Palantir、Shield AI、Kratos Defense）。对 Anduril
              所处阶段的防务公司来说，这种双向竞争没有先例——多数防务创业公司要么直接替代传统主承包商（罕见，因为后者拥有 DoD 关系），要么作为分包商与其合作（常见，但利润率弱）。


              Anduril
              的战略位置避开了传统主承包商的核心项目（F-35、航空母舰、战略轰炸机）的正面竞争，同时在主承包商未能做出有竞争力产品的新项目类别里激进竞争：自主可消耗无人机（Ghost、Roadrunner，对手主承包商没有可信产品）、AI
              C2 软件（Lattice，对比外包的 Microsoft/Palantir 方案）和反 UAS 动能拦截（Menace+Roadrunner，对比 L3Harris、Dedrone 的仅干扰系统）。


              竞争动态在演化：传统主承包商正靠收购回应（L3Harris 收购传感器公司，Boeing 在澳大利亚投资 Loyal Wingman/MQ-28），但尚未部署任何能在 DoD 项目竞争中取代 Anduril
              系统的产品。在防务科技创业公司中，Palantir 是唯一一家政府关系和收入规模可与 Anduril 相比的公司——但 Palantir 不能制造实体自主系统，而这项能力最终为 Anduril 客户交付战场效果。
