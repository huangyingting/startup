      - number: '1.3'
        title: 里程碑与市场位置
        blocks:
          - type: paragraph
            body: >
              Anduril 的里程碑显示，公司在 7 年内完成了从 VC 支持的创业公司到可运营部署防务承包商的切换——在通常需要数十年才接纳新进入者的防务采购体系里，这条时间线没有历史先例。


              关键里程碑包括：交付 CBP Sentry Tower 合同（2019-2020 年，第一个运营项目）、SOCOM 部署 Ghost 无人机（2021 年，第一个接近作战场景的 ISR 行动）、收购 Area-I
              获得 ALTIUS 弹药（2021 年，把空射弹药纳入组合）、以 $8.48B 估值完成 Series D（2022 年，在乌克兰战后验证防务科技投资逻辑）、发布 Roadrunner 产品（2023 年）、入选
              Replicator 项目（2023-2024 年，为美国 DoD 提供 450+ 套自主系统），以及以 $14B 估值完成 Series F（2024 年，防务科技 VC 史上最大轮次）。2025 年 6 月
              $30B+ 估值报道，标志公司跻身全球最有价值的私营防务科技公司之一。


              自主系统和反 UAS 市场背景验证了 Anduril 的产品组合：乌克兰战场证明，廉价无人机蜂群和复杂反无人机系统已是现代战争的决定性能力，直接推动美国 DoD 同时加速投资进攻型和防御型自主系统。Anduril
              的产品覆盖 DoD 认定为自主优先事项的全部四类能力：ISR（Ghost、Sentry Tower）、打击（Roadrunner、ALTIUS）、水下（Dive-LD）和反
              UAS（Menace）。没有其他私营公司能同时覆盖四类。
