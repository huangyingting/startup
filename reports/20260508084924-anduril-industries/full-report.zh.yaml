chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与创立
        blocks:
          - type: paragraph
            body: >
              Anduril Industries 是一家总部位于加州 Costa Mesa 的防务科技公司，2017 年 10 月由 Palmer Luckey、Matt Grimm、Trae Stephens、Brian
              Schimpf 和 Joseph Chen 创立。公司的创立假设很直接：硅谷的软件与硬件工程能力，可以比传统采购模式更有效地改造美国防务能力——用消费科技的速度和成本结构，打造自主、AI 驱动的系统，而不是沿着
              Lockheed Martin、Northrop Grumman 和 Boeing 那种十年周期、成本加成式的采购路径。


              Palmer Luckey 的个人叙事和 Anduril 品牌绑在一起：2014 年他以 $2B 将 Oculus VR 卖给 Facebook，2017 年又有争议地离开
              Meta。之后，他把这段经历转化为一家自己所称「不讨厌美国的防务公司」——在 Google、Amazon 等大型硅谷公司因防务合同遭遇员工抗议时，明确押注爱国主义技术开发。Luckey
              担任收购战略负责人；Palantir 老将 Brian Schimpf 担任 CEO，负责日常运营。


              公司的产品组合横跨四类：自主空中系统（Ghost UAV、Roadrunner 自主喷气机、ALTIUS 弹药）、水下系统（Dive-LD UUV）、边境 / 监视基础设施（Sentry Tower），以及把所有
              Anduril 硬件和第三方传感器连起来的统一 C2/ISR 软件平台 Lattice OS。Lattice OS 是 Anduril
              的战略软件护城河——一个实时网状联网的指挥控制系统，在整个硬件组合上制造切换成本和生态锁定。
