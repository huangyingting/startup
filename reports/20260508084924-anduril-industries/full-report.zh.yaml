      - number: '8.3'
        title: 内在价值、情景与投资建议
        blocks:
          - type: paragraph
            body: >
              我们的基准情景分部估值内在价值为 $21-23B，比 $30B 老股隐含估值低 30%。构成包括：Lattice OS 软件分部（$375M NTM，40x）= $15B；自主武器硬件（$875M
              NTM，5x）= $4.4B；Arsenal-1 有形资产价值（$1.5B）；净现金（$0.75B）。该分析对软件 / 硬件收入拆分高度敏感，而这一拆分未公开披露。


              DCF 情景分析结果：乐观情景（$4B ARR，2028 年 IPO，30x NTM）= $60-80B 市值，从 $30B 入场可获 2-3x 回报；基准情景（$2.5B ARR，2028 年 IPO，20x
              NTM）= $35-40B，从 $30B 入场回报持平到小幅正收益；悲观情景（$1.8B ARR，按硬件倍数重定价）= $18B，从 $30B 入场亏损 40%。概率加权内在价值约 $26-30B，说明当前
              $30B 老股价格安全边际很窄，但并不明显处在泡沫区间。


              投资建议：按当前价格观察。$14B Series F 是有吸引力的入场点。$30B 二级市场价格，对相信乐观情景、持有周期 5-7 年的耐心投资人而言，估值偏高但并非不合理。近期需要跟踪的催化剂：CCA
              Phase 2 downselect（二元结果）、Arsenal-1 首批交付（执行证明）以及任何 IPO S-1 文件（完整利润率披露）。若任何重大催化剂确认乐观情景，估值立场上调为买入；若 CCA 失利或
              IPO 时利润率不及预期，则下调为回避。
