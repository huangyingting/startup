      - number: '5.2'
        title: 制造、部署与技术执行
        blocks:
          - type: paragraph
            body: >
              位于俄亥俄州 Columbus 的 Arsenal-1，是 Anduril 对外界质疑的制造规模化答案：一家硅谷软件公司能否以防务相关产量制造硬件？该设施将在 2026 年底前生产
              Fury、Roadrunner、Barracuda 和一个机密平台。基于 COTS
              的供应链路径——使用商业传感器、计算和通信组件，再按军用加固要求改造——比军规供应链迭代更快、材料成本更低，但也引入网络安全和可得性风险。


              部署渠道包括 DIU-OTA 合同（Ghost、Dive-LD、ALTIUS）、直接 DoD 项目合同（CBP 的 Sentry Tower）和企业级合同工具（陆军 $20B 反无人机合同上限）。Anduril
              的企业级合同工具路径尤其值得注意：陆军 $20B 反无人机工具让 Anduril 预先具备未来任务订单资格，无需重新竞争，形成传统逐合同销售者难以匹配的管线结构。澳大利亚 Ghost Shark 项目验证了
              Anduril 执行跨盟国生产项目的能力。


              GitHub 的开发者信号确认，公司采用闭源 IP 策略——没有公开仓库。由于缺少公开失败数据，产品可靠性评估受限；不过，DoD 项目经理在媒体报道中一致称，其从原型到实地部署的周期快于传统防务采购项目。CCA
              竞争（YFQ-44A 对 General Atomics YFQ-42A）将是关键执行测试：若获胜，将验证 Anduril 在最大、最复杂空军平台项目中竞争的能力。
