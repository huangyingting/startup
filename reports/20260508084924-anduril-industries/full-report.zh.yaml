  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律、监管与政策风险
        blocks:
          - type: paragraph
            body: >
              在当前防务科技创业公司中，Anduril 面临最复杂的法律与监管风险。三套不同法律框架制造了实质性暴露：（1）国际人道法（IHL）/ LAWS 监管——CCW 进程和 HRW「Stop Killer
              Robots」运动给 Anduril 自主打击系统带来条约层面风险；（2）ITAR 执法——在 AUKUS 和潜在未来伙伴关系下扩张国际运营，会提高无意转移违规概率，并面临民事和刑事处罚；（3）DoD
              Directive 3000.09——若进一步修订并要求更严格的人类控制延迟阈值，可能迫使公司进行昂贵系统改造。


              HRW 在其面向 CCW 成员国的 LAWS 倡议中，已经明确点名 Anduril 的 Roadrunner 和 ALTIUS 系统。如果 UN CCW
              达成有约束力的条约文字——考虑到法国、德国和英国的支持，这一概率并不低——Anduril 的打击平台即便面向美国政府客户，也可能因条约合规义务遭遇采购限制。ACLU
              在定点清除和自主监视诉讼上的记录表明，法律挑战即便面对成熟政府项目也可能成功。


              OTA 向 FAR 的合规转换也带来法律风险：量产合同（FAR）要求成本会计准则（CAS）、TINA 认证和 DFARS 合规，而 OTA 原型合同不要求。Anduril 必须在量产收入基础超过 OTA
              收入前，建立 FAR 合规财务系统——其他首次进入防务量产的承包商已经在这一转换中遭遇合规问题。DDTC 曾因 ITAR 违规对防务公司处以 $8-$79M 罚款；相对 Anduril
              估计运营预算，这一成本具有实质性影响。
