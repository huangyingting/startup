      - number: '5.3'
        title: 差异化、IP、合规与路线图
        blocks:
          - type: paragraph
            body: >
              Anduril
              相对传统主承包商（Lockheed、Raytheon、Northrop）的核心技术差异，是开发速度——软件优先架构让能力可以按季度更新，而不是按多年项目周期升级。相对同类防务科技创业公司，Lattice OS
              的多域覆盖和垂直硬件集成，把它同 Palantir AIP（仅数据分析）和 Shield AI Hivemind（仅空域）区分开。Lattice
              平台飞轮——每一个新硬件节点都会提高整体传感器网格价值——在已部署舰队 / 机队内形成网络效应护城河。


              遵守 DoD Directive 3000.09（LAWS 政策）在运营上至关重要。Anduril 的政策立场是由人类授权交战包线，这满足当前 DoD 政策；但 Human Rights Watch
              和民间社会倡导者质疑，在授权包线内由终端阶段自主瞄准，是否达到 IHL「有意义的人类控制」标准。ITAR 合规管辖所有国际销售，并对 Five Eyes 伙伴采取分层披露。IP
              完全自研——本次未审阅到公开专利或开源信号；这一缺口限制了外部技术深度评估。


              产品路线图——ISR（2019 年）→ 反 UAS（2022 年）→ 自主打击（2024 年）→ CCA 无人僚机（2025 年）→ 太空域（2026
              年）——沿着更高价值项目有意升级。这一进程类似防务主承包商的能力扩建，但速度是创业公司节奏。若 CCA 项目获胜，将巩固 Anduril 作为一线防务主承包商竞争者的位置。借 ExoAnalytic
              进入太空域，也打开了导弹防御跟踪这一额外高增长细分。
