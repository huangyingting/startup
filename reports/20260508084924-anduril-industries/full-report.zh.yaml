      - number: '3.2'
        title: 竞品画像与能力缺口
        blocks:
          - type: paragraph
            body: >
              对 Anduril 市场位置构成最大威胁的五个竞争者，按近期风险排序如下：


              Palantir（对 Lattice OS 风险最高）：政府 ARR 约 $1.5B（2024 年），拥有深厚的机密项目关系，AIP 平台瞄准与 Lattice OS 相同的 AI 决策支持用例。风险被
              Palantir 无法制造硬件所缓释——DoD 越来越需要软硬件一体化系统，而非独立分析工具。


              L3Harris（对 Sentry Tower 和 Menace 风险最高）：收入 $20B+，已有反 UAS 产品线（VAMPIRE、MPQ-64 雷达），在传感器和信号领域拥有深厚 DoD 关系。风险被
              L3Harris 较慢的开发周期和相对 Anduril 更弱的 AI 集成所缓释。


              Kratos Defense（对 Roadrunner 有风险）：上市的可消耗无人机竞争者，拥有 XQ-58A Valkyrie 和 UTAP-22 Mako 项目。Kratos 已证明具备 DoD
              主承包关系，并能规模化制造。风险被其缺少 Lattice OS 等价软件集成所缓释。


              Boeing（对 Dive-LD 有风险）：Boeing 的 Orca XLUUV 项目直接竞争大排水量 UUV 市场。Boeing 的规模和海军关系很强。风险被 Boeing 的软件弱项和 MQ-25
              交付进度问题所缓释。


              Shield AI（近期风险有限）：纯软件自主驾驶 AI 竞争自主载具 AI 栈合同，但交付不了 Anduril 提供的硬件 + AI 一体化系统。它在特定 DoD 项目上更可能成为伙伴而非竞争对手。
