      - number: '7.3'
        title: 人才、声誉、ESG 与估值风险
        blocks:
          - type: paragraph
            body: >
              人才风险偏高但有边界：Anduril 有意筛选支持防务的员工，但从多元招聘池快速扩张到 4,500+ 人，会提高内部伦理争议概率。Google Project Maven
              先例显示，少数高声量员工可以迫使公司政策变化——不过 Anduril 的任务优先文化比消费者科技公司有更强的制度免疫力。Palmer Luckey
              直言不讳的公众形象带来关键人物风险：如果在敏感项目节点出现个人争议，可能影响客户关系或安全许可状态。


              ESG 排除风险会影响 Anduril IPO 的机构投资者范围：防务武器制造商被许多 ESG 和影响力投资授权排除。这可能压低 IPO 需求，尤其来自欧洲机构投资者和注重可持续性的美国基金。由此产生的 IPO
              折价，可能转化为员工期权价值减损，也会在 $30B+ 估值水平下造成投资人回报缺口。硬件-软件倍数重定价风险同样显著：如果审计财务显示硬件收入占比高于预期，公开市场很可能向硬件倍数重定价（3-4x，而非软件
              20-30x），形成重大估值缺口。


              综合风险结论：Anduril 的风险画像高但内在一致——集中在监管、执行和财务领域，而不是散落在无关方向。结构性需求顺风、客户切换成本护城河，以及增长里程碑达成后的清晰 IPO 路径，部分抵消了这些风险。对
              5-7 年周期、风险承受能力高的投资人而言，以当前风险投资阶段价格看，风险收益具备吸引力；若在没有审计利润率确认的情况下按 >$30B 公开市场估值买入，逻辑会变弱。
