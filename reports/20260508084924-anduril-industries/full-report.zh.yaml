      - number: '4.2'
        title: 成本结构、利润率与资本充足性
        blocks:
          - type: paragraph
            body: >
              Anduril 的成本结构由人力主导：4,500+ 名员工，按完全加载成本 $250-300K 估算，仅年度人力成本就达 $1.1-1.35B——大致等于估计收入基础。额外成本包括制造资本开支（Columbus
              设施和计划扩张）、硬件项目的材料和组件，以及公司管理开销。由此推算，FY2024 年度经营亏损约 $200-600M，由 $3B+ 股权资本池提供资金。


              混合毛利率估计为 30-45%——高于纯硬件防务同业（Kratos 为 22-26%），但明显低于纯软件同业（Palantir 为 45-50%）。关键利润率驱动因素包括：（1）Lattice OS
              软件在硬件项目中的附加率（附加率越高，混合毛利率越高）；（2）硬件平台产量效率（Ghost 利润率应随单位规模提升）；（3）新技术项目 R&D 合同定价溢价。


              Series F（$1.5B，2024 年 8 月）按当前烧钱速度估计提供 12-24 个月现金跑道。资本投放优先级包括制造规模化、R&D 和国际扩张。IPO 或 Series G 预计出现在 2026-2028
              年窗口，前提是收入达到 $2B+、利润率改善，且市场环境支持防务科技溢价估值。债务义务未公开披露；可能存在 $100-300M 的风险债。
