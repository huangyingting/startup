  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与平台架构
        blocks:
          - type: paragraph
            body: >
              Anduril 是一家多域防务平台公司，产品覆盖空中、海上、水下、地面和太空领域。统一架构是 Lattice OS——一个 AI
              驱动的指挥控制软件层，吸收异构传感器数据，用机器学习检测和分类目标，并向操作员呈现共同作战图。Lattice OS 遵循「融合-分类-行动」模式：传感器接入共同网格，基于 ML 进行实体分类（友方 / 中立 /
              威胁），再把任务规划建议提交给人类操作员授权。


              当前产品线包括：Ghost（Group 2 固定翼 ISR/打击 UAS，已与 SOCOM 部署）、Roadrunner（用于反 UAS 的 VTOL 可重复使用拦截器，在 Arsenal-1
              量产）、ALTIUS-600M（筒射巡飞弹药，处于 SOCOM 量产）、Sentry Tower（自主地面监视，已由 CBP 部署）、Dive-LD（水下 ISR 大型
              AUV）、Fury（空射巡航导弹，Arsenal-1 产能爬坡）、YFQ-44A（CCA 无人僚机，飞行测试中）和 Menace（反蜂群系统，原型）。2026 年收购 ExoAnalytic
              后，公司获得全球太空态势感知传感器网络，把 Lattice 扩展到太空域。


              Anduril 的软件优先产品理念，意味着所有硬件平台都被设计为运行 Lattice OS 的「边缘节点」，共享同一套传感器融合、通信和任务管理框架。这让跨域能力开发更快——一种新传感器接入 Ghost 上的
              Lattice 后，会自动供 Sentry Tower 和 Dive-LD 操作员使用。
