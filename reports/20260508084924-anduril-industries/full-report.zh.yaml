  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值锚点与资本结构
        blocks:
          - type: paragraph
            body: >
              Anduril 的估值历史反映了防务 AI 板块的快速重估。Series F（2024 年 8 月）以 $14B 投后估值、融资 $1.5B 建立了主要锚点，隐含 12-14x 过去 12 个月收入。到 2025
              年 6 月，老股交易隐含约 $30B——10 个月内提升 2.1x，驱动因素是 Replicator 项目动能、CCA 合同公告和防务 AI 投资热情延续。根据 SEC Form D 文件，累计股权融资超过
              $3.7B，资金主要投向 Arsenal-1 制造（$2B）和员工扩张（4,500+ 名员工，估计总薪酬 $150-200K = 每年 $675M-900M）。


              资本结构仍然有私营公司式不透明：每轮优先股的具体条款（清算优先权、反稀释棘轮、参与权）未公开。Series F 投资人（$14B 入场）在 $30B 老股隐含估值下仅略高于入场价，但需要 IPO 成功且估值高于
              $14B 才能实现回报。Series A/B/C 投资人（2018-2020 年，低于 $2B 入场）则账面拥有 15-65x 未实现收益。


              Anduril 的 $30B 老股隐含估值，相当于对 $1.25B 估计过去 12 个月 ARR 给出 23x，反映市场对一个结构独特防务平台的理性乐观。来自 SEC Form D 文件、PitchBook
              和媒体报道的可比主要证据，同时确认了资本结构和二级市场定价。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV021
              - CV037
