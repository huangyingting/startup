      - number: '3.3'
        title: 护城河耐久性与竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Anduril 的竞争护城河是多层的，相对公司阶段有高于平均水平的耐久性，但并非永久。护城河建立在几件事上：Lattice OS 切换成本（2-4 年再训练周期）、数据飞轮效应（跨产品传感器数据改进 AI
              模型）、监管合规基础设施（ITAR、DCSA 许可——新进入者需要 1-2 年复制）和创始人政治资本（Luckey、Thiel 关系在早期项目竞争中形成软壁垒）。


              主要护城河风险包括：（1）Palantir 通过战略收购扩张到硬件；（2）传统主承包商收购 Anduril 后失去创业公司敏捷性；（3）DoD 通过 CDAO（首席数字与 AI 办公室）投资在内部构建
              Lattice 等价能力；（4）如果 Anduril 股权价值相对 BigTech 薪酬包表现不佳，人才流失加剧。


              监管护城河（ITAR 合规、DCSA 许可、OTA 合同关系）尤其耐久：外国竞争者不能向美国 DoD 销售受 ITAR 管制的系统，美国新创业公司也无法复制 Anduril 与 DoD 项目办公室 7
              年建立起来的关系。即便技术领先被侵蚀，这层监管保护仍能提供 5-10 年可防守的市场位置。


              现有竞争证据压倒性地来自 Anduril 自有新闻室和友好媒体。反向证据——丢失的项目、客户投诉、技术失败——无法从公开来源获得，因此本评估存在正向选择偏差。
