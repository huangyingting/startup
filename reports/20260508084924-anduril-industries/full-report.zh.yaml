              客户留存信号非常积极：SOCOM 在初次部署后扩大 Ghost 订单，CBP 将 Sentry Tower 从 200 个站点扩到 700+，陆军授予 $20B 企业级工具，澳大利亚通过 AUKUS 定向渠道选择
              Ghost Shark，没有竞争性招标。这些是防务采购中最强的留存信号——同一客户的单一来源后续订单和扩展部署，说明运营满意度高。


              客户终身价值按项目周期而非订阅周期计算：初始硬件合同（1-3 年）、选择权行使（3-5 年）和后续能力升级合同（5+ 年）。每个正式项目都有 10-15 年经济生命周期。Lattice OS
              集成制造切换成本锁定：替换 Anduril 需要更换整个 C2 软件层，并重新训练所有操作员。这种结构性黏性补充了合同留存。


              受 ITAR 限制，国际客户扩张目前局限在 Five Eyes 国家（澳大利亚已确认、英国在推进、加拿大 / 新西兰仍早期）。AUKUS Pillar II
