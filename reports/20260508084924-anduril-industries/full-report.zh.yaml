      - number: '1.2'
        title: 融资历史与估值背景
        blocks:
          - type: paragraph
            body: >
              Anduril 已在六轮融资中募集超过 $3B 股权资金，成为美国资本最充足的私营防务科技公司。融资轨迹既反映 Anduril 的执行力，也反映俄乌冲突后防务投资的宏观转向。


              关键融资节点包括：Seed（2018 年，约 $18M，Founders Fund）；Series A（2019 年，$58M）；Series B（2020 年，$200M）；Series C（2021
              年，$450M）；Series D（2022 年，投后估值 $8.48B，融资 $1.48B）；以及标志性的 Series F（2024 年 8 月，投后估值 $14B，融资 $1.5B，由 Founders
              Fund 和 Sands Capital 共同领投）。Series F 在交割时是防务科技 VC 历史上规模最大的融资轮。到 2025 年 6 月，二级市场交易隐含估值超过 $30B——不到 12
              个月翻了一倍以上。


              投资人阵容包括 Founders Fund（Peter Thiel，从 Seed 起领投）、a16z、General Catalyst、8VC（Joe Lonsdale）和 Sands
              Capital。Founders Fund 与 8VC 的连接尤其关键：Peter Thiel 共同创办了 Palantir（Brian Schimpf 在联合创办 Anduril 前曾任职于此），Joe
              Lonsdale 也在创办 8VC 前共同创办 Palantir——由此形成一张密集的防务科技运营者网络，提供战略建议和政府入口。


              SEC EDGAR Form D 文件确认，Anduril 通过加州有限合伙载体完成结构化机构融资，在新闻报道之外独立验证了已披露的融资轮历史。USASpending.gov
              则确认公司拥有活跃的联邦合同关系，构成其收入增长的基础。
