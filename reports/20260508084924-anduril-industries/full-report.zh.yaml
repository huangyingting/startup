  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与结构
        blocks:
          - type: paragraph
            body: >
              Anduril Industries
              面向一组碎片化但高增长的防务采购市场，边界由人工智能、自主系统和军事行动的交集定义。公司的相关市场横跨四个领域：自主无人空中系统（UAS——Ghost、Roadrunner、ALTIUS）、自主水下系统（Dive-LD）、AI
              驱动的指挥控制软件（Lattice OS）和反无人机系统（C-UAS——Menace）。共同主线是自主运行和 AI 驱动决策——这些细分市场里，传统防务主承包商缺少有竞争力的产品。


              结构性市场边界，是美国及盟国围绕「新域」自主能力的防务采购——它明确区别于 Lockheed Martin 和 General Dynamics 主导的传统项目（F-35 战机、航空母舰、Abrams
              坦克升级）。Anduril 不竞争 F-35 生产批次；它争夺的是自主可消耗系统、AI 平台和反无人机系统——这些新预算线的增速高于基础防务预算。


              Anduril 产品的现状替代品包括：人工驾驶 UAV（Predator/Reaper）、传统雷达 C2 系统（Link 16、ATAK）、指挥控制软件（Palantir AI
              Platform）和用于打击任务的常规弹药。每一类里，Anduril 都提供一个由自主能力加持的替代方案：单价更低（可消耗而非精贵平台）、部署更快（OTA 而非 FAR）、也更贴合乌克兰战场和中国无人机 /
              反介入投资定义的威胁环境。公司垂直整合硬件平台和统一的 Lattice 软件，是关键差异点；纯软件公司（Palantir）或纯硬件公司（传统主承包商）都无法在没有多年组织转型的情况下复制。
            claimRefs:
