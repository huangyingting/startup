  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与变现模式
        blocks:
          - type: paragraph
            body: >
              Anduril 的收入完全来自美国及盟国政府的防务采购合同。公司没有商业收入、消费者收入，也没有防务场景之外的纯授权收入。收入流可以分为三类：（1）硬件平台项目（Ghost
              无人机部署、Roadrunner、Dive-LD、ALTIUS、Sentry Tower）；（2）集成系统项目（作为更大传感器 / 自主系统项目的一部分部署 Lattice OS）；（3）R&D 合同（OTA
              原型、SBIR/STTR 早期技术开发授标）。


              FY2024 总收入估计为 $1.0–1.5B，高于 FY2022 估计的 $400-600M 和 FY2023 的 $700M-$1B。这意味着 2021-2024 年年收入增速超过 2x，与
              Replicator 项目入选、CBP 合同增长和 SOCOM 部署扩张相符。收入集中度高：前 3-4 个项目可能贡献总收入的 50-60%。


              Lattice OS 软件层——利润率最高的部分——被打包进硬件项目定价，而不是作为独立订阅销售。这种捆绑模式限制了近期利润率可见度，但制造了长期切换成本护城河。公开来源无法把软件利润率从硬件中拆出来；对试图用
              SaaS 倍数给 Anduril 软件平台估值的投资人来说，这是关键尽调缺口。
