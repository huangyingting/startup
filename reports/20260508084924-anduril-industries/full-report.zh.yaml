    type: monitoring-table
    coverage: partial
    notes: IPO 前后需要跟踪的尽调问题与推翻投资假设的触发点。
    claimRefs:
      - CV022
      - CV040
      - CV031
    enumerationScope:
      coverage: partial
      basis: >-
        Based on key risk factors identified across all 8 research chapters and standard pre-IPO diligence requirements
        for defense tech companies.
    columns:
      - 领域
      - 尽调问题
      - 推翻投资假设的触发点
      - 状态
    rows:
      - - 财务
        - 按分部披露 GAAP 毛利率（软件 / 硬件）
        - IPO 时毛利率 <40% → 套用硬件倍数
        - 未披露（私有公司）
      - - 收入
        - GAAP 收入与 ARR 的桥接
        - GAAP 收入比 ARR 低 >20% → IPO 时爆雷
        - 未披露（私有公司）
      - - 烧钱速度
        - 月度现金消耗与 12 个月现金续航
        - 未 IPO 且月烧钱 >$200M → 资本缺口风险
        - 未披露（私有公司）
      - - 股权结构
        - 各轮清算优先权瀑布
        - 瀑布分走 IPO 募资额 >30% → 普通股受损
        - 未披露（私有公司）
      - - 竞争
        - CCA Phase 2 筛选结果
        - YFQ-44A 在 CCA 中输给 General Atomics → 估值砍掉 $5-8B
        - 预计 2025-2027 决定
      - - 制造
        - Arsenal-1 首次交付里程碑
        - 交付延期 >12 个月 → 执行风险兑现
        - 预计 2026 决定
      - - 法务
        - 是否有 ITAR 执法行动或 DDTC 审计
        - 执法行动 → 合同暂停风险
        - 未公开披露
      - - 监管
        - CCW 的 LAWS 条约文本进展
        - 约束性条约措辞指向 Anduril 产品 → 监管限制
        - CCW 年度会议
      - - IPO
        - S-1 提交日期与计划上市交易所
        - IPO 延至 2029+ → 若无 Series G，会出现资本缺口
        - 尚未宣布
