      - number: '2.3'
        title: 买方地图、增长驱动与约束
        blocks:
          - type: paragraph
            body: >
              Anduril 的主要买方，是拥有防务权限的美国联邦政府项目办公室：SOCOM（特种作战）、CBP（DHS 下属边境安全）、USAF（反 UAS 与
              ISR）、陆军（自主地面和空中载具项目）以及海军（水下自主载具）。预算权掌握在国会拨款和 DoD 项目办公室手中；采购原型走 OTA，量产走 FAR。Five Eyes（英国、澳大利亚、加拿大、新西兰）和
              NATO 盟国市场构成二级买方，由 AUKUS Pillar II 加速。


              增长驱动包括：（1）俄乌冲突经验验证自主系统；（2）DoD Replicator 倡议为可消耗自主系统创造具体预算线；（3）中国 PLA 自主系统投资制造紧迫竞争叙事；（4）AUKUS
              协议打开盟国采购通道；（5）防务科技投资热潮显示，资本市场愿意以溢价估值支持防务科技。


              采用约束包括：（1）国会持续决议将合同授标推迟 6-12 个月；（2）国会和担心竞争的传统防务承包商抵制 OTA 扩张；（3）LAWS 国际禁令倡议给出口市场制造尾部风险；（4）Anduril 需要把
              Roadrunner 和 Dive-LD 的产能从原型扩到正式项目数量。
