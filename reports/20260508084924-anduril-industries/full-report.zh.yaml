      - number: '4.3'
        title: 估值分析与财务结论
        blocks:
          - type: paragraph
            body: >
              Anduril 的 $30B+ 隐含估值（2025 年 6 月）基于估计 $1.0-1.5B ARR，对应 20-30x 过去 12 个月收入——这一溢价与高增长防务科技软件平台相符，但相对成熟防务主承包商
              1-3x 收入倍数偏贵。增长率（年增速 2x+）和商业模式中的软件成分支撑了该倍数，但它仍对三类变量高度敏感：（1）增长减速；（2）制造规模化期间利润率压缩；（3）项目取消风险。


              收入质量高（政府交易对手、多年期合同），但集中度令人担忧（前 3-4 个项目贡献 50-60%）。近期资本充足性尚可（Series F 提供 12-24
              个月现金跑道），但需要持续融资能力。财务披露稀少——公开市场没有审计财务数据，这是主要尽调阻碍。财务结论：收入基础质量高、增长异常强，但利润率叙事未经验证，资本强度也很高；公司需要成功 IPO 才能验证
              $30B+ 隐含估值。Replicator 和 OTA 合同带来的政府 R&D 补贴部分抵消私人烧钱，相比纯商业同业改善了资本效率。最终财务考验在
              IPO：届时审计财务数据将首次让投资人验证或重估软件溢价逻辑。财务成熟度需要透明度。
