          - type: paragraph
            body: >
              客户集中是最重要的客户侧风险：3-4 个项目（SOCOM、CBP、Replicator、CCA）可能贡献总收入的 60-70%。任何单一项目取消——预算削减、政策变化或竞争性替换——都会构成重大收入事件。以
              Anduril 当前规模和防务采购 18-36 个月销售周期看，这种集中风险是结构性的，无法快速分散。


              监管与声誉风险既影响客户，也直接影响 Anduril。HRW 的致命自主武器运动给 DoD 项目办公室施压，要求限制采购自主打击系统。CBP Sentry Tower 项目面临 ACLU
              和移民倡导者的公民自由批评。国会防务优先级变化或新一届政府，可能减少仍处原型或早期量产阶段的自主系统项目支出。Anduril 只暴露于单一行业，放大了这些风险。


              正向抵消因素：DoD 预算结构性增加自主系统线，NDAA 已连续三年要求加速自主能力，CCA 若获胜将把美国空军加入量产级客户群，显著分散客户基础。现有项目从 OTA 向 FAR 转换的状态显示，随着
              Replicator、海军和 CCA 项目从原型走向量产授标，收入存在明显上行空间。国会拨款风险仍在——每个项目都需要年度重新授权——但多年期采购承诺和纳入 FYDP 明显降低单年波动。
