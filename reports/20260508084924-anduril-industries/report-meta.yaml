  investmentThesis: |
    Anduril Industries is the most strategically positioned defense technology startup globally,
    having built the first vertically integrated autonomous weapons platform (Lattice OS + hardware
    fleet) with deep DoD customer relationships, $3.7B+ in raised capital, and a dedicated
    manufacturing facility (Arsenal-1). The company is executing on the U.S. government's own
    stated autonomous systems modernization priorities (Replicator, CCA, SOCOM), making it
    uniquely aligned with multi-decade structural defense demand tailwinds. For patient investors
    with a 5-7 year horizon, the bull case scenario ($4B ARR, 2028 IPO at 30x NTM) could deliver
    2-3x returns from the June 2025 secondary implied valuation of ~$30B.
  antiThesis: |
    Anduril is priced for perfection at 23x trailing revenue with zero margin of safety. Key
    risks that could materially impair returns: (1) CCA competition loss to General Atomics
    would eliminate a $5-10B program and signal prime competitive vulnerability; (2) UN CCW
    binding LAWS treaty language would restrict autonomous strike systems procurement; (3) GAAP
    margin disclosure at IPO could reveal hardware-heavy margins (35-45% gross margin vs. software
    expectations of 65-75%), triggering repricing toward Kratos-level multiples ($5-8B vs. $30B);
    (4) Arsenal-1 manufacturing delays could impair revenue recognition milestones; (5) the 100%
    government revenue dependency creates shutdown-induced cash flow volatility and concentration
    risk. At $30B, the risk-adjusted return is unattractive for new capital allocations on a
    3-year horizon.
