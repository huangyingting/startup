summary:
  headline: "Vertically integrated autonomous weapons platform with deep DoD relationships; priced for perfection at $30B but uniquely positioned for defense AI secular tailwind."
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched
