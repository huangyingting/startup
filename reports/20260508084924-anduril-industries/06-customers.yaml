sections:
  - id: SU-S1
    title: Customer Base and Customer Acquisition
    body: |
      Anduril's customer base is exclusively US and allied-nation government defense agencies.
      Confirmed customers include: SOCOM (Ghost UAS, ALTIUS munitions), CBP (Sentry Tower),
      US Army (ALTIUS, counter-drone enterprise vehicle), US Navy/DIU (Dive-LD, Dive-XL),
      US Air Force (CCA YFQ-44A competition, Fury/FAMM), DoD Replicator (Ghost at volume),
      Space Force (ExoAnalytic), Royal Australian Navy (Ghost Shark), and UK MoD via AUKUS.
      No commercial or non-defense government customers have been identified.

      Customer acquisition follows the defense procurement pathway: DIU OTA contracts for
      prototype entry, competitive RFPs or limited competitions for production awards, and
      enterprise contract vehicles for recurring task orders. Anduril has no inbound marketing
      or self-serve pipeline — all customer acquisition is relationship-driven and supported by
      a substantial business development team of former military and acquisition officials.
      The typical sales cycle from first engagement to first contract award is 18-36 months.

      The structural advantage of the US government as a customer class: zero default risk,
      multi-year commitments on programs of record, statutory mandates from Congress for
      autonomous systems, and growing DoD budget line items specifically for AI and autonomy
      ($2B+ in FY2025 defense budget). This creates a customer funding stream that is less
      cyclical than commercial markets and structurally expanding with each NDAA cycle.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU008
      - CU009
      - CU013
      - CU018
      - CU019
      - CU028
    tableRefs:
      - TU001
    figureRefs:
      - FU001
      - FU004
  - id: SU-S2
    title: Customer Retention, Expansion, and Lifetime Value
    body: |
      Customer retention signals are strongly positive: SOCOM expanded Ghost orders after initial
      deployment, CBP scaled Sentry Tower from 200 to 700+ sites, the Army awarded a $20B enterprise
      vehicle, and Australia selected Ghost Shark through a directed AUKUS channel without competitive
      bidding. These are the strongest defense procurement retention signals available — sole-source
      follow-ons and expanded deployments by the same customer indicate high operational satisfaction.

      Customer lifetime value is program-cycle-based rather than subscription-based: initial contract
      hardware (1-3 years), options exercise (3-5 years), and follow-on capability upgrade contracts
      (5+ years). Each program of record has a 10-15 year economic lifecycle. The Lattice OS integration
      creates switching-cost lock-in: replacing Anduril requires swapping the entire C2 software layer
      and retraining all operators. This structural stickiness supplements contractual retention.

      International customer expansion is currently limited to Five Eyes nations (Australia confirmed,
      UK developing, Canada/New Zealand nascent) due to ITAR restrictions. The AUKUS Pillar II framework
      creates a near-monopoly channel in Australia for specific technology areas. Japan, South Korea,
      and others require State Department licenses and Congressional notification — materially slower
      sales cycles than domestic US programs.
    claimRefs:
      - CU006
      - CU007
      - CU010
      - CU012
      - CU015
      - CU016
      - CU020
      - CU023
      - CU027
      - CU030
      - CU035
    tableRefs:
      - TU002
      - TU004
      - TU005
    figureRefs:
      - FU002
  - id: SU-S3
    title: Customer Risk and Concentration Assessment
    body: |
      Customer concentration is the most significant customer-side risk: 3-4 programs (SOCOM, CBP,
      Replicator, CCA) likely represent 60-70% of total revenue. Any single program cancellation —
      budget cut, policy change, or competitive replacement — would be a material revenue event.
      This concentration risk is structural for Anduril's current scale and cannot be rapidly
      diversified given the 18-36 month sales cycles in defense procurement.

      Regulatory and reputational risks affect customers as well as Anduril directly. HRW's
      lethal autonomous weapons campaign pressures DoD program offices to restrict procurement
      of autonomous strike systems. The CBP Sentry Tower program faces civil liberties criticism
      from ACLU and immigration advocates. Congressional shifts in defense priorities or a new
      administration could reduce spending on autonomous systems programs that are still in
      prototype or early production phase. Anduril's single-sector exposure amplifies these risks.

      Positive offsets: the DoD budget structurally grows the autonomous systems line, the NDAA
      has mandated autonomous acceleration for three consecutive years, and the CCA win (if achieved)
      would add the Air Force as a production-scale customer, substantially diversifying the base.
      The OTA-to-FAR transition status of existing programs suggests significant revenue upside
      as Replicator, Navy, and CCA programs mature from prototype to production awards. Congressional
      appropriations risk remains — each program requires annual re-authorization — but multi-year
      procurement commitments and FYDP inclusion reduce single-year volatility materially.
    claimRefs:
      - CU004
      - CU005
      - CU011
      - CU014
      - CU021
      - CU022
      - CU024
      - CU025
      - CU026
      - CU031
      - CU032
      - CU033
      - CU034
    tableRefs:
      - TU003
    figureRefs:
      - FU003
