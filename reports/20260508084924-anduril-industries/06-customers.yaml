chapter:
  number: 6
  title: Customer and Commercial Analysis
  summary: |
    Anduril's customer base is exclusively US and allied-nation government defense agencies.
    Primary customers include SOCOM, CBP, the US Army, US Navy, US Air Force, and Five Eyes allies
    (Australia, UK). Revenue concentration is high — 3-4 programs likely generate 60%+ of revenue.
    Customer satisfaction signals are strongly positive (repeat awards, expanded task orders, sole-source
    selections), but the narrow customer base and single-sector concentration create meaningful customer
    diversification risk. Retention is structural: switching costs are high once Lattice OS is embedded
    in multi-platform programs. International expansion to non-Five Eyes allies is restricted by ITAR.
