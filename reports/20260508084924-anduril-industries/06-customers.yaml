  claims:
    - id: CU001
      statement: >-
        Anduril's primary customer is the United States Special Operations Command (SOCOM), which has deployed the Ghost
        UAS and ALTIUS-600M loitering munition across multiple operational theaters. SOCOM relationships established
        Anduril as a proven operational vendor — the highest trust tier for DoD procurement — and have generated
        cumulative contract value estimated at $250M+.
      type: observed
      topic: socom-primary-customer
      sourceRefs:
        - SU007
        - SU013
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU003
    - id: CU002
      statement: >-
        US Customs and Border Protection (CBP) is Anduril's longest-standing production customer, deploying Sentry Tower
        autonomous surveillance systems along the US-Mexico border. The CBP program was Anduril's first full production
        contract and has generated cumulative revenues estimated at $200M+. It was also the proof point that converted
        Anduril from prototype stage to operational deployment status.
      type: observed
      topic: cbp-border-customer
      sourceRefs:
        - SU006
        - SU001
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU003
    - id: CU003
      statement: >-
        The US Army awarded Anduril a position on a $20B counter-drone enterprise contract vehicle — one of the largest
        single contract vehicles in Army procurement history. The contract is a ceiling vehicle with no money attached
        at award; it pre-qualifies Anduril to receive future task orders without re-competing, creating a structural
        pipeline advantage for Anduril in the US Army counter-UAS market.
      type: observed
      topic: army-20b-enterprise-vehicle
      sourceRefs:
        - SU004
        - SU010
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU002
    - id: CU004
      statement: >-
        The US Navy and DIU have awarded Anduril contracts for the Dive-LD autonomous underwater vehicle and the Dive-XL
        prototype program. The Navy represents Anduril's entry into the undersea domain and is an emerging customer
        relationship — smaller in current revenue but strategically important given the submarine and undersea ISR
        budget expansion in the FY2025-2030 defense program.
      type: observed
      topic: navy-undersea-customer
      sourceRefs:
        - SU008
        - SU021
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU004
    - id: CU005
      statement: >-
        The US Air Force is pursuing the Collaborative Combat Aircraft (CCA) program, for which Anduril's YFQ-44A is in
        competition with General Atomics' YFQ-42A. If Anduril wins the CCA competition, the Air Force would become
        Anduril's largest potential single customer, with program-of-record volumes estimated at thousands of units over
        the 2026-2040 timeframe.
      type: observed
      topic: air-force-cca-customer
      sourceRefs:
        - SU009
        - SU004
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU004
    - id: CU006
      statement: >-
        The Royal Australian Navy (RAN) is Anduril's lead international customer, with the Ghost Shark XL-AUV program in
        production delivery. The Ghost Shark program represents the first major international production contract for
        Anduril and validates the Five Eyes partner expansion strategy. Australia's defence relationship with the US and
        Anduril's ITAR authorization for the program were prerequisites for this international sale.
      type: observed
      topic: australia-international-customer
      sourceRefs:
        - SU011
        - SU025
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU006
    - id: CU007
      statement: >-
        The UK Ministry of Defence (UK MoD) has engaged Anduril as part of AUKUS Pillar II programs, which focus on
        advanced autonomous and AI capabilities shared among Australia, UK, and US. UK procurement of Anduril systems is
        in early stages as of 2025, representing a developing rather than established customer relationship.
      type: observed
      topic: uk-mod-aukus-customer
      sourceRefs:
        - SU014
        - SU015
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU006
        - QU001
    - id: CU008
      statement: >-
        DoD's Replicator initiative — a program to deploy thousands of attritable autonomous systems to deter
        adversaries in the Pacific — selected Anduril as a primary vendor. The Replicator program represents a new
        customer relationship with the OSD-level (Office of the Secretary of Defense) rather than a single service
        branch, potentially creating a cross-service demand signal that bypasses traditional service-branch procurement
        politics.
      type: observed
      topic: replicator-customer-osd
      sourceRefs:
        - SU013
        - SU003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU002
    - id: CU009
      statement: >-
        Anduril's customer acquisition model is fundamentally different from commercial SaaS: there is no self-serve
        pipeline, no inbound marketing, and no PLG (product-led growth). All customers are identified through personal
        relationships, program office engagement, and DoD acquisition channels (DIU OTA, SBIR, competitive RFPs). The
        average customer sales cycle is estimated at 18-36 months from first engagement to first contract award.
      type: inferred
      topic: government-customer-acquisition-model
      sourceRefs:
        - SU021
        - SU023
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU008
        - QU009
    - id: CU010
      statement: >-
        Customer switching costs for Anduril are structurally high once Lattice OS is deployed in a multi-platform
        operational environment. The integration of Ghost UAS, Sentry Tower, and Lattice into a shared operational mesh
        creates dependency on Anduril's software platform for C2 continuity — switching to a competitor would require
        replacing the entire software layer, retraining operators, and re-integrating all hardware platforms.
      type: inferred
      topic: switching-cost-lattice-lock-in
      sourceRefs:
        - SU013
        - SU016
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU007
        - QU003
    - id: CU011
      statement: >-
        Customer concentration is Anduril's primary customer-side risk: the top 3-4 programs (SOCOM, CBP, Replicator,
        CCA) likely account for 60-70% of total revenue. The loss of any single program — due to budget cuts, contract
        cancellation, or competitive replacement — would be a material revenue event. SOCOM alone likely represents
        20-30% of total revenue.
      type: inferred
      topic: customer-concentration-risk
      sourceRefs:
        - SU019
        - SU020
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU010
        - QU003
    - id: CU012
      statement: >-
        Anduril's Net Promoter Score equivalent — inferred from the pattern of sole-source follow-on awards, expanded
        task orders, and public statements from program managers — is strongly positive. SOCOM's second and third Ghost
        procurement rounds after the initial deployment, CBP's expansion from 200 to 700+ Sentry Tower sites, and the
        Army's $20B enterprise vehicle are all repeat business signals indicating high customer satisfaction.
      type: inferred
      topic: customer-satisfaction-repeat-awards
      sourceRefs:
        - SU013
        - SU001
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU005
        - QU003
    - id: CU013
      statement: >-
        US government procurement law allows sole-source contracts when: (1) the vendor has demonstrated unique
        capability, (2) time constraints prohibit competition, or (3) national security demands limit disclosure.
        Anduril has benefited from sole-source or limited-competition awards particularly in the SOCOM context, where
        operational requirements can justify non-competitive procurement.
      type: observed
      topic: sole-source-awards
      sourceRefs:
        - SU007
        - SU023
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU002
        - QU003
    - id: CU014
      statement: >-
        The Space Force is an emerging Anduril customer following the ExoAnalytic acquisition. ExoAnalytic's existing
        contracts with the Space Force (space situational awareness) become Anduril contracts post-acquisition, adding a
        new service branch to the customer base. The Golden Dome space-based interceptor program is an additional Space
        Force customer opportunity where Anduril's space domain capabilities may apply.
      type: observed
      topic: space-force-emerging-customer
      sourceRefs:
        - SU004
        - SU005
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU001
        - QU004
    - id: CU015
      statement: >-
        CBP's Sentry Tower program has expanded from an initial pilot (2019) to 700+ deployed sites along the US-Mexico
        border as of 2024. This expansion history demonstrates Anduril's ability to scale from prototype to
        national-scale deployment with a single customer, validating both product reliability and the customer's
        willingness to increase commitment — the strongest form of customer retention signal in defense procurement.
      type: observed
      topic: cbp-sentry-expansion
      sourceRefs:
        - SU006
        - SU001
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU005
        - QU007
    - id: CU016
      statement: >-
        International customer expansion beyond Five Eyes is severely constrained by ITAR export controls. Anduril's
        autonomous weapons systems are Category I items (defense articles) under the US Munitions List — requiring State
        Department export licenses for any non-US, non-ITAR-exempt nation. This effectively limits near-term
        international expansion to Australia, UK, Canada, and New Zealand, with limited near-term access to the broader
        100+ nation market.
      type: observed
      topic: itar-international-expansion-limit
      sourceRefs:
        - SU023
        - SU025
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QU006
        - QU010
    - id: CU017
      statement: >-
        Anduril's customer feedback loop — from field deployment back to product development — is faster than
        traditional defense primes. Press accounts indicate SOCOM operators have been directly involved in Ghost UAS
        feature requests, and CBP agents have contributed to Sentry Tower improvement cycles. This co-development model
        with key customers creates product stickiness beyond contractual lock-in.
      type: inferred
      topic: customer-feedback-codevelopment
      sourceRefs:
        - SU013
        - SU016
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU005
        - QU009
    - id: CU018
      statement: >-
        The US defense budget provides structural customer demand certainty: the DoD requests $900B+ annually, with
        autonomous systems, C-UAS, and AI investment growing 15-20% annually in recent budget submissions. This means
        Anduril's addressable customer budget is structurally expanding regardless of individual program success,
        reducing the macro customer risk that would exist in a contracting or static market.
      type: inferred
      topic: dod-budget-structural-demand
      sourceRefs:
        - SU003
        - SU023
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QU011
        - QU001
    - id: CU019
      statement: >-
        Anduril's customer acquisition through DIU specifically targets 'commercial technology insertion' — the pathway
        where non-traditional defense vendors bring commercial capabilities into DoD use. DIU's mandate is to reduce
        procurement timelines and access venture-backed companies like Anduril. This creates a dedicated institutional
        customer acquisition channel that traditional defense primes (who primarily use FAR contracts) cannot easily
        replicate.
      type: observed
      topic: diu-customer-channel-advantage
      sourceRefs:
        - SU021
