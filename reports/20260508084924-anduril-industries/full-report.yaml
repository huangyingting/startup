      - number: '1.2'
        title: Funding History and Valuation Context
        blocks:
          - type: paragraph
            body: |
              Anduril has raised over $3B in equity financing across six rounds, establishing itself as the
              best-capitalized private defense technology company in the US. The funding trajectory reflects
              both Anduril's execution excellence and the macroeconomic shift in defense investment following
              the Russia-Ukraine conflict.

              Key funding milestones: Seed (2018, ~$18M, Founders Fund); Series A (2019, $58M); Series B (2020,
              $200M); Series C (2021, $450M); Series D (2022, $1.48B at $8.48B post-money valuation); and
              the landmark Series F (August 2024, $1.5B at $14B post-money valuation, co-led by Founders Fund
              and Sands Capital). The Series F was the largest defense tech VC round in history at the time of
              closing. By June 2025, secondary market transactions implied a valuation exceeding $30B — more
              than doubling in under 12 months.

              The investor syndicate includes Founders Fund (Peter Thiel, lead investor from Seed), a16z,
              General Catalyst, 8VC (Joe Lonsdale), and Sands Capital. The Founders Fund and 8VC connection
              is particularly strategic: Peter Thiel co-founded Palantir (which Brian Schimpf worked at before
              co-founding Anduril), and Joe Lonsdale co-founded Palantir before founding 8VC — creating a
              dense network of defense tech operators providing strategic advice and government access.

              SEC EDGAR Form D filings confirm structured institutional fundraising through California-based
              limited partnership vehicles, independently validating the disclosed round history beyond press
              reporting. USASpending.gov confirms active federal contract relationships that form the revenue
              foundation for the company's growth.
