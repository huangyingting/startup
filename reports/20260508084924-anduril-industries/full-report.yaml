      - number: '1.3'
        title: Milestones and Market Position
        blocks:
          - type: paragraph
            body: |
              Anduril's milestone trajectory shows a company that has successfully navigated the transition from
              venture-backed startup to operationally-deployed defense contractor in 7 years — a timeline without
              historical precedent in the defense acquisition system that typically requires decades for new entrants.

              Key milestones include: CBP Sentry Tower contract delivery (2019-2020, first operational program),
              SOCOM Ghost drone deployment (2021, first combat-adjacent ISR operation), Area-I acquisition for
              ALTIUS munition (2021, adds air-launched munition to portfolio), Series D at $8.48B (2022, validates
              defense tech investment thesis post-Ukraine), Roadrunner product reveal (2023), Replicator program
              selection (2023-2024, 450+ autonomous systems for US DoD), and Series F at $14B (2024, largest defense
              tech VC round in history). The June 2025 $30B+ valuation report marks the company's emergence as
              one of the most valuable private defense technology companies in the world.

              The autonomous systems and counter-UAS market context validates Anduril's product portfolio: Ukraine
              demonstrated that cheap drone swarms and sophisticated counter-drone systems are decisive modern
              warfare capabilities, directly driving the US DoD's accelerated investment in both offensive and
              defensive autonomous systems. Anduril's products serve all four capability categories the DoD has
              identified as autonomy priorities: ISR (Ghost, Sentry Tower), strike (Roadrunner, ALTIUS), undersea
              (Dive-LD), and counter-UAS (Menace). No other private company covers all four categories simultaneously.
