      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: |
              The US alone spends approximately $886B on defense in FY2025, with RDT&E budget of ~$145B. The
              autonomous systems and AI-specific subset of this budget is estimated at $9-12B annually and
              growing at 12-18% CAGR. Globally, military expenditure reached $2.44 trillion in 2023 (SIPRI),
              of which autonomous systems represent an estimated 5-8% — approximately $120-200B total annual
              spend across all countries, of which the US represents 35-40%.

              For Anduril specifically: the combined TAM across autonomous air systems ($15-20B annually by
              2030 US+allies), counter-UAS ($7B by 2030), AI C2 software ($8-12B), and undersea systems
              ($3-5B) exceeds $40-50B annually. The SAM — programs that Anduril could credibly compete for
              with current products — is estimated at $10-15B annually. The SOM on a 3-5 year horizon
              (given production capacity, contract pipeline, and competitive position) is estimated at
              $2-4B annually, consistent with a company that could achieve $2-4B ARR by 2028-2030.

              Market sizing variance is significant: analyst estimates differ by 50%+ depending on scope
              definition and growth assumptions. Conservative estimates remain compelling for Anduril's
              $30B+ implied valuation, given that even a $2B ARR by 2028 would support a 15x forward revenue
              multiple consistent with high-growth government SaaS precedents.
