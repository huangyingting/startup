      - number: '2.3'
        title: Buyer Map, Growth Drivers, and Constraints
        blocks:
          - type: paragraph
            body: |
              Anduril's primary buyers are US federal government program offices with defense authority:
              SOCOM (special operations), CBP (border security under DHS), USAF (counter-UAS and ISR),
              Army (autonomous ground and air vehicle programs), and Navy (undersea autonomous vehicles).
              Budget authority sits with Congressional appropriations and DoD program offices; procurement
              follows OTA for prototypes and FAR for production. The Five Eyes (UK, Australia, Canada,
              NZ) and NATO allied markets represent secondary buyer segments, accelerated by AUKUS Pillar II.

              Growth drivers include: (1) Russia-Ukraine conflict lessons validating autonomous systems,
              (2) DoD Replicator initiative creating specific budget lines for attritable autonomous systems,
              (3) China's PLA autonomous systems investments creating urgent competition narrative,
              (4) AUKUS agreement opening allied procurement channels, and (5) defense tech sector investment
              boom signaling that capital markets will support defense tech at premium valuations.

              Adoption constraints: (1) Congressional continuing resolutions delaying contract awards by
              6-12 months, (2) OTA expansion resistance from Congress and traditional defense contractors
              worried about competition, (3) LAWS international prohibition advocacy creating tail risk on
              export markets, and (4) Anduril's production capacity scaling from prototype to program-of-record
              quantities for Roadrunner and Dive-LD.
