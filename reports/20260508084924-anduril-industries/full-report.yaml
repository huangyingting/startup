      - number: '6.2'
        title: Customer Retention, Expansion, and Lifetime Value
        blocks:
          - type: paragraph
            body: |
              Customer retention signals are strongly positive: SOCOM expanded Ghost orders after initial
              deployment, CBP scaled Sentry Tower from 200 to 700+ sites, the Army awarded a $20B enterprise
              vehicle, and Australia selected Ghost Shark through a directed AUKUS channel without competitive
              bidding. These are the strongest defense procurement retention signals available — sole-source
              follow-ons and expanded deployments by the same customer indicate high operational satisfaction.

              Customer lifetime value is program-cycle-based rather than subscription-based: initial contract
              hardware (1-3 years), options exercise (3-5 years), and follow-on capability upgrade contracts
              (5+ years). Each program of record has a 10-15 year economic lifecycle. The Lattice OS integration
              creates switching-cost lock-in: replacing Anduril requires swapping the entire C2 software layer
              and retraining all operators. This structural stickiness supplements contractual retention.

              International customer expansion is currently limited to Five Eyes nations (Australia confirmed,
              UK developing, Canada/New Zealand nascent) due to ITAR restrictions. The AUKUS Pillar II framework
              creates a near-monopoly channel in Australia for specific technology areas. Japan, South Korea,
              and others require State Department licenses and Congressional notification — materially slower
              sales cycles than domestic US programs.
