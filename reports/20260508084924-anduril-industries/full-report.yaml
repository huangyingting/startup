  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Legal, Regulatory, and Policy Risks
        blocks:
          - type: paragraph
            body: |
              Anduril faces the most complex legal and regulatory risk profile of any current defense tech
              startup. Three distinct legal frameworks create material exposure: (1) International Humanitarian
              Law (IHL) / LAWS regulation — the CCW process and HRW 'Stop Killer Robots' campaign create
              treaty-level risk for Anduril's autonomous strike systems; (2) ITAR enforcement — scaling
              international operations under AUKUS and potential future partnerships increases the probability
              of inadvertent transfer violations, subject to civil and criminal penalties; and (3) DoD
              Directive 3000.09 — further revisions requiring stricter human control latency thresholds could
              require expensive system modifications.

              HRW has specifically named Anduril's Roadrunner and ALTIUS systems in its LAWS advocacy
              targeting CCW member states. If the UN CCW achieves binding treaty language — a non-trivial
              probability given France, Germany, and UK support — Anduril's strike platforms could face
              procurement restrictions even from US government customers under treaty compliance obligations.
              The ACLU's targeted killing and autonomous surveillance litigation track record shows that
              legal challenges can succeed even against established government programs.

              The OTA-to-FAR compliance transition also creates legal risk: production contracts (FAR)
              require cost accounting standards (CAS), TINA certification, and DFARS compliance that OTA
              prototype contracts do not. Anduril must build FAR-compliant financial systems before its
              production revenue base exceeds OTA revenue — a transition that has caused compliance problems
              for other first-time defense production contractors. DDTC has levied penalties of $8-$79M on
              defense companies for ITAR violations, a cost that would be material relative to Anduril's
              estimated operating budget.
