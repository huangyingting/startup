    type: monitoring-table
    coverage: partial
    notes: Diligence asks and thesis-break triggers to monitor pre- and post-IPO.
    claimRefs:
      - CV022
      - CV040
      - CV031
    enumerationScope:
      coverage: partial
      basis: >-
        Based on key risk factors identified across all 8 research chapters and standard pre-IPO diligence requirements
        for defense tech companies.
    columns:
      - Area
      - Diligence Ask
      - Thesis-Break Trigger
      - Status
    rows:
      - - Financials
        - GAAP gross margin by segment (software vs. hardware)
        - Gross margin <40% at IPO → hardware multiple
        - Not disclosed (private)
      - - Revenue
        - GAAP revenue vs. ARR reconciliation
        - GAAP revenue >20% below ARR → surprise at IPO
        - Not disclosed (private)
      - - Burn rate
        - Monthly cash burn and 12-month runway
        - Burn >$200M/month without IPO → capital gap risk
        - Not disclosed (private)
      - - Cap table
        - Liquidation preference waterfall by round
        - Waterfall >30% of IPO proceeds → common stock impaired
        - Not disclosed (private)
      - - Competition
        - CCA Phase 2 downselect outcome
        - YFQ-44A loses CCA to General Atomics → $5-8B haircut
        - Decision expected 2025-2027
      - - Manufacturing
        - Arsenal-1 first delivery milestone
        - Deliveries delayed >12 months → execution risk realized
        - Decision expected 2026
      - - Legal
        - Any ITAR enforcement action or DDTC audit
        - Enforcement action → contract suspension risk
        - Not publicly disclosed
      - - Regulatory
        - LAWS treaty text progress at CCW
        - Binding treaty language targeting Anduril products → regulatory restriction
        - Annual CCW sessions
      - - IPO
        - S-1 filing date and planned exchange
        - IPO delayed to 2029+ → capital gap without Series G
        - Not yet announced
