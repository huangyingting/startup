  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Structure
        blocks:
          - type: paragraph
            body: |
              Anduril Industries addresses a fragmented but high-growth set of defense procurement markets defined
              by the intersection of artificial intelligence, autonomous systems, and military operations. The
              company's relevant market spans four domains: autonomous unmanned air systems (UAS — Ghost, Roadrunner,
              ALTIUS), autonomous undersea systems (Dive-LD), AI-enabled command-and-control software (Lattice OS),
              and counter-unmanned aerial systems (C-UAS — Menace). The common thread is autonomous operation and
              AI-driven decision-making — market segments where legacy defense primes lack competitive products.

              The structural market boundary is US and allied defense procurement for "new domain" autonomous
              capabilities — explicitly distinct from the legacy programs (F-35 fighters, aircraft carriers,
              Abrams tank upgrades) that Lockheed Martin and General Dynamics dominate. Anduril is not a
              competitor for F-35 production runs; it competes for autonomous attritable systems, AI platforms,
              and counter-drone systems — new budget lines growing faster than the base defense budget.

              Status-quo substitutes for Anduril's products include: manually-piloted UAVs (Predator/Reaper), 
              legacy radar-based C2 systems (Link 16, ATAK), command-and-control software (Palantir AI Platform),
              and conventional munitions for strike missions. In each category, Anduril offers an autonomy-enabled
              alternative that is cheaper per unit (attritable vs. exquisite), faster to field (OTA vs. FAR), and
              more relevant for the threat environment defined by Ukraine and China's drone/anti-access investments.
              The company's vertical integration — building both the hardware platforms and the unifying Lattice
              software — is a key differentiator that neither pure-software (Palantir) nor pure-hardware (legacy
              primes) competitors can replicate without multi-year organizational transformation.
