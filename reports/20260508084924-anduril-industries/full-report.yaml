      - number: '3.2'
        title: Competitor Profiles and Capability Gaps
        blocks:
          - type: paragraph
            body: |
              The five most significant competitive threats to Anduril's market position, ranked by near-term risk:

              Palantir (highest risk for Lattice OS): Government ARR of ~$1.5B (2024), deep classified program
              relationships, AIP platform targeting same AI decision-support use cases as Lattice OS. Risk mitigated
              by Palantir's inability to manufacture hardware — the DoD increasingly wants integrated hardware+software
              systems, not standalone analytics.

              L3Harris (highest risk for Sentry Tower and Menace): $20B+ revenue, established counter-UAS product
              line (VAMPIRE, MPQ-64 radar), deep DoD relationships in the sensor and signals domain. Risk mitigated
              by L3Harris's slower development cycles and weaker AI integration relative to Anduril.

              Kratos Defense (risk for Roadrunner): Publicly traded attritable drone competitor with XQ-58A Valkyrie
              and UTAP-22 Mako programs. Kratos has proven DoD prime relationships and can manufacture at scale.
              Risk mitigated by lack of Lattice OS-equivalent software integration.

              Boeing (risk for Dive-LD): Boeing's Orca XLUUV program directly competes for the large-displacement
              UUV market. Boeing's scale and Navy relationships are formidable. Risk mitigated by Boeing's software
              weakness and MQ-25 delivery schedule struggles.

              Shield AI (limited near-term risk): Software-only pilot AI competes for autonomous vehicle AI stack
              contracts but cannot deliver the integrated hardware+AI systems that Anduril offers. Most likely
              to be a partner than a competitor for specific DoD programs.
