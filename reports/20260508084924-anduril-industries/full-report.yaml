      - number: '6.3'
        title: Customer Risk and Concentration Assessment
        blocks:
          - type: paragraph
            body: |
              Customer concentration is the most significant customer-side risk: 3-4 programs (SOCOM, CBP,
              Replicator, CCA) likely represent 60-70% of total revenue. Any single program cancellation —
              budget cut, policy change, or competitive replacement — would be a material revenue event.
              This concentration risk is structural for Anduril's current scale and cannot be rapidly
              diversified given the 18-36 month sales cycles in defense procurement.

              Regulatory and reputational risks affect customers as well as Anduril directly. HRW's
              lethal autonomous weapons campaign pressures DoD program offices to restrict procurement
              of autonomous strike systems. The CBP Sentry Tower program faces civil liberties criticism
              from ACLU and immigration advocates. Congressional shifts in defense priorities or a new
              administration could reduce spending on autonomous systems programs that are still in
              prototype or early production phase. Anduril's single-sector exposure amplifies these risks.

              Positive offsets: the DoD budget structurally grows the autonomous systems line, the NDAA
              has mandated autonomous acceleration for three consecutive years, and the CCA win (if achieved)
              would add the Air Force as a production-scale customer, substantially diversifying the base.
              The OTA-to-FAR transition status of existing programs suggests significant revenue upside
              as Replicator, Navy, and CCA programs mature from prototype to production awards. Congressional
              appropriations risk remains — each program requires annual re-authorization — but multi-year
              procurement commitments and FYDP inclusion reduce single-year volatility materially.
