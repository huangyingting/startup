  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Monetization Model
        blocks:
          - type: paragraph
            body: |
              Anduril's revenue comes exclusively from US and allied government defense procurement contracts.
              The company does not have commercial revenue, consumer revenue, or licensing-only revenue outside
              the defense context. Revenue streams can be categorized as: (1) hardware platform programs (Ghost
              drone deployments, Roadrunner, Dive-LD, ALTIUS, Sentry Tower), (2) integrated system programs
              (Lattice OS deployed as part of larger sensor/autonomous system programs), and (3) R&D contracts
              (OTA prototypes, SBIR/STTR awards for early-stage technology development).

              Total estimated revenue for FY2024 is $1.0–1.5B, up from an estimated $400-600M in FY2022
              and $700M-$1B in FY2023. This implies a 2x+ annual revenue growth rate from 2021-2024,
              consistent with the Replicator program selection, CBP contract growth, and SOCOM deployment
              expansion. Revenue concentration is high: the top 3-4 programs likely account for 50-60%
              of total revenue.

              The Lattice OS software layer — the highest-margin component — is bundled into hardware program
              pricing rather than sold as a standalone subscription. This bundled model limits near-term margin
              visibility but creates long-term switching cost moat. Disaggregating the software margin from
              hardware is not possible from public sources, representing a critical diligence gap for investors
              attempting to value Anduril's software platform at SaaS multiples.
