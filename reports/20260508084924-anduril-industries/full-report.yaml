      - number: '5.3'
        title: Differentiation, IP, Compliance, and Roadmap
        blocks:
          - type: paragraph
            body: |
              Anduril's core technical differentiation vs. traditional primes (Lockheed, Raytheon, Northrop)
              is development velocity — software-first architecture enables quarterly capability updates vs.
              multi-year program cycle upgrades. Vs. peer defense tech startups, Lattice OS's multi-domain
              coverage and vertical hardware integration distinguishes it from Palantir AIP (data analytics
              only) and Shield AI Hivemind (air domain only). The Lattice platform flywheel — where each new
              hardware node increases the total sensor mesh value — creates network-effect moat within deployed
              fleets.

              Compliance with DoD Directive 3000.09 (LAWS policy) is operationally critical. Anduril's policy
              position that humans authorize engagement envelopes satisfies current DoD policy, but Human Rights
              Watch and civil society advocates challenge whether terminal-phase autonomous targeting within an
              authorized envelope meets the IHL 'meaningful human control' standard. ITAR compliance governs all
              international sales, with tiered disclosure for Five Eyes partners. IP is entirely proprietary —
              no public patents or open-source signals reviewed; this gap limits external technical depth
              assessment.

              The product roadmap trajectory — ISR (2019) → counter-UAS (2022) → autonomous strike (2024) →
              CCA drone wingman (2025) → space domain (2026) — follows deliberate escalation toward higher-value
              programs. This progression mirrors a defense prime's capabilities build-out but at startup cadence.
              The CCA program win, if achieved, would cement Anduril's position as a top-tier defense prime
              competitor. Space domain entry via ExoAnalytic opens missile defense tracking as an additional
              high-growth segment.
