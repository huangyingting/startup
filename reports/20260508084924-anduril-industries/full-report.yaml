      - number: '7.3'
        title: Talent, Reputational, ESG, and Valuation Risks
        blocks:
          - type: paragraph
            body: |
              Talent risk is elevated but bounded: Anduril has deliberately filtered for pro-defense employees,
              but rapid scaling to 4,500+ from diverse hiring pools increases the probability of internal
              ethics controversies. The Google Project Maven precedent shows that a vocal minority of employees
              can force corporate policy changes — though Anduril's mission-first culture provides stronger
              institutional immunity than a consumer tech company would have. Palmer Luckey's outspoken public
              persona creates key-person risk: a personal controversy at a sensitive program moment could
              affect customer relationships or security clearance status.

              ESG exclusion risk affects Anduril's IPO institutional investor universe: defense-weapons
              manufacturers are excluded from many ESG and impact-investing mandates. This could reduce
              demand at IPO, particularly from European institutional investors and sustainability-focused
              US funds. The resulting IPO discount could translate to employee option value impairment and
              investor return shortfalls at the $30B+ valuation level. Hardware-software multiple repricing
              risk is also significant: if audited financials reveal a higher-than-expected hardware revenue
              proportion, public markets would likely reprice toward hardware multiples (3-4x vs. software
              20-30x), creating a material valuation gap.

              The aggregate risk verdict: Anduril's risk profile is high but coherent — concentrated in
              regulatory, execution, and financial domains rather than scattered across unrelated areas.
              The risks are partially offset by structural demand tailwinds, customer switching cost moat,
              and a clear IPO path if growth milestones are met. For investors with a 5-7 year time horizon
              and high risk tolerance, the risk-reward profile is favorable at current venture-stage pricing;
              it would be challenged at a >$30B public market valuation without audited margin confirmation.
