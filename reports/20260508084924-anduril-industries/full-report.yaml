  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Platform Architecture
        blocks:
          - type: paragraph
            body: |
              Anduril operates as a multi-domain defense platform company with products spanning air, maritime
              surface, subsurface, ground, and space domains. The unifying architecture is Lattice OS — an
              AI-powered command-and-control software layer that ingests data from heterogeneous sensors,
              applies machine learning for target detection and classification, and presents a common operating
              picture to operators. Lattice OS follows a 'fuse-classify-act' pattern: sensor ingestion into
              a common mesh, ML-based entity classification (friendly/neutral/threat), and mission planning
              recommendations presented to human operators for authorization.

              The current product lineup includes: Ghost (Group 2 fixed-wing ISR/strike UAS, deployed with
              SOCOM), Roadrunner (VTOL reusable interceptor for counter-UAS, in production at Arsenal-1),
              ALTIUS-600M (tube-launched loitering munition, in SOCOM production), Sentry Tower (autonomous
              ground surveillance, CBP deployed), Dive-LD (large AUV for undersea ISR), Fury (air-launched
              cruise missile, Arsenal-1 production ramp), YFQ-44A (CCA drone wingman, in flight test), and
              Menace (counter-swarm system, prototype). The ExoAnalytic acquisition in 2026 added a global
              space situational awareness sensor network, extending Lattice into the space domain.

              Anduril's software-first product philosophy means all hardware platforms are designed as 'edge
              nodes' running Lattice OS, sharing the same sensor fusion, communications, and mission management
              framework. This enables rapid cross-domain capability development — a new sensor type integrated
              into Lattice on Ghost automatically becomes available to Sentry Tower and Dive-LD operators.
