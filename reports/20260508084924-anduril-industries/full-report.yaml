  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Customer Acquisition
        blocks:
          - type: paragraph
            body: |
              Anduril's customer base is exclusively US and allied-nation government defense agencies.
              Confirmed customers include: SOCOM (Ghost UAS, ALTIUS munitions), CBP (Sentry Tower),
              US Army (ALTIUS, counter-drone enterprise vehicle), US Navy/DIU (Dive-LD, Dive-XL),
              US Air Force (CCA YFQ-44A competition, Fury/FAMM), DoD Replicator (Ghost at volume),
              Space Force (ExoAnalytic), Royal Australian Navy (Ghost Shark), and UK MoD via AUKUS.
              No commercial or non-defense government customers have been identified.

              Customer acquisition follows the defense procurement pathway: DIU OTA contracts for
              prototype entry, competitive RFPs or limited competitions for production awards, and
              enterprise contract vehicles for recurring task orders. Anduril has no inbound marketing
              or self-serve pipeline — all customer acquisition is relationship-driven and supported by
              a substantial business development team of former military and acquisition officials.
              The typical sales cycle from first engagement to first contract award is 18-36 months.

              The structural advantage of the US government as a customer class: zero default risk,
              multi-year commitments on programs of record, statutory mandates from Congress for
              autonomous systems, and growing DoD budget line items specifically for AI and autonomy
              ($2B+ in FY2025 defense budget). This creates a customer funding stream that is less
              cyclical than commercial markets and structurally expanding with each NDAA cycle.
