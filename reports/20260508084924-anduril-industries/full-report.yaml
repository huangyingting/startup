      - number: '4.2'
        title: Cost Structure, Margins, and Capital Adequacy
        blocks:
          - type: paragraph
            body: |
              Anduril's cost structure is dominated by labor: 4,500+ employees at an estimated $250-300K
              fully-loaded cost implies $1.1-1.35B in annual labor expense alone — roughly equal to the
              estimated revenue base. Additional costs include manufacturing capital expenditure (Columbus
              facility and planned expansion), materials and components for hardware programs, and corporate
              overhead. The resulting operating loss is estimated at $200-600M annually in FY2024, funded
              by the $3B+ equity capital pool.

              Gross margins are estimated at 30-45% blended — above hardware-only defense peers (Kratos
              at 22-26%) but well below software-only peers (Palantir at 45-50%). The key margin drivers
              are: (1) Lattice OS software attach rate on hardware programs (higher attach = higher blended
              margin), (2) production volume efficiency on hardware platforms (Ghost margin should improve
              as units scale), and (3) R&D contract pricing premiums on new technology programs.

              The Series F ($1.5B, August 2024) provides estimated 12-24 months of runway at current burn
              rates. Capital deployment priorities include manufacturing scale-up, R&D, and international
              expansion. An IPO or Series G is expected in the 2026-2028 window, contingent on revenue
              reaching $2B+, margins improving, and market conditions supporting defense tech premium
              valuations. Debt obligations are not publicly disclosed; venture debt of $100-300M may exist.
