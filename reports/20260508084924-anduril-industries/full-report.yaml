chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Founding
        blocks:
          - type: paragraph
            body: |
              Anduril Industries is a Costa Mesa, California-based defense technology company founded in October 2017
              by Palmer Luckey, Matt Grimm, Trae Stephens, Brian Schimpf, and Joseph Chen. The company's founding
              hypothesis was that Silicon Valley software and hardware engineering could transform US defense
              capability more effectively than legacy procurement models — building autonomous, AI-driven systems
              at consumer technology speed and economics rather than the decade-long, cost-plus procurement cycles
              of Lockheed Martin, Northrop Grumman, and Boeing.

              Palmer Luckey's personal narrative is inseparable from Anduril's brand: after selling Oculus VR to
              Facebook for $2B in 2014 and being controversially fired from Meta in 2017, Luckey channeled the
              experience into building what he described as a "defense company that doesn't hate America" —
              explicitly patriotic technology development at a time when major Silicon Valley companies (Google,
              Amazon) were facing employee revolts over defense contracts. Luckey serves as Chief of Acquisitions
              Strategy; Brian Schimpf (Palantir veteran) serves as CEO for day-to-day operations.

              The company's product portfolio spans four categories: autonomous air systems (Ghost UAV, Roadrunner
              autonomous jet, ALTIUS munition), undersea systems (Dive-LD UUV), border/surveillance infrastructure
              (Sentry Tower), and the Lattice OS AI platform that provides the unified C2/ISR software connecting
              all Anduril hardware and third-party sensors. The Lattice OS is Anduril's strategic software moat
              — a real-time mesh-networked command and control system that creates switching costs and ecosystem
              lock-in across the entire hardware portfolio.
