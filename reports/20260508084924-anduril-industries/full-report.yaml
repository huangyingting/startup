      - number: '7.2'
        title: Execution, Competitive, and Financial Risks
        blocks:
          - type: paragraph
            body: |
              Arsenal-1 manufacturing scale-up is Anduril's most proximate execution risk. Transitioning
              from a software-first startup to a multi-platform weapons manufacturer is a qualitatively
              different operating challenge: quality control, supply chain coordination, production scheduling,
              and cost structure all change when building hardware at volume. The COTS supply chain approach
              reduces some costs but introduces geopolitical risk: Taiwan-sourced semiconductors and sensors
              are critical to Ghost, Roadrunner, and Fury production. A semiconductor shortage or export
              restriction event could delay production schedules and impair revenue recognition milestones.

              Competitive risk from defense prime buildup is real but slow-moving: Lockheed, Northrop,
              and Raytheon all have autonomous systems programs, but their development cycles (5-10 years)
              give Anduril time to establish switching-cost moats via Lattice OS deployments. Peer defense
              tech startups (Shield AI's Hivemind, Epirus's Leonidas, Kratos's UTAP-22) are more immediate
              threats in specific niches. The CCA competition is Anduril's highest-stakes near-term competitive
              test: losing to General Atomics would have cascading reputational and revenue effects.

              Financial risk is structural at current burn rates: estimated $1.2-1.8B annual cash consumption
              requires either successful capital markets access (IPO or debt) or continued VC support. Defense
              tech IPO windows are seasonal and market-dependent — if rates rise, defense tech multiples
              compress, or Anduril suffers a program setback before IPO, the capital gap risk becomes acute.
              Government shutdown exposure adds a cash flow shock risk unique to 100%-government-revenue companies.
