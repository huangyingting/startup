chapter:
  number: 5
  title: Product and Technology Analysis
  summary: |
    Anduril Industries operates a multi-domain autonomous defense platform with Lattice OS as the
    unifying AI software layer across all hardware platforms. The product portfolio spans air (Ghost
    UAS, ALTIUS munitions, Roadrunner interceptor, YFQ-44A CCA, Fury cruise missile), ground
    (Sentry Tower), subsurface (Dive-LD, Dive-XL, Ghost Shark), and space (ExoAnalytic). Arsenal-1
    in Columbus, Ohio anchors the hardware manufacturing scale-up. Technical differentiation centers
    on the software-first 'edge node' architecture — all platforms run Lattice OS, sharing sensor
    fusion, classification, and mission planning logic. Civil society organizations raise IHL concerns
    about autonomous weapons; Anduril maintains human authorization compliance with DoD Directive 3000.09.

