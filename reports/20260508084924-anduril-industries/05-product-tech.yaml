  claims:
    - id: CE001
      statement: "Anduril's core product is Lattice, an AI-powered software operating system that fuses data from multiple sensors (radar, optical, acoustic, space-based), applies machine learning for target detection and classification, and presents a common operating picture to operators. Lattice runs on commercial cloud and edge hardware and connects to all Anduril hardware platforms as well as third-party systems."
      type: observed
      topic: lattice-os-architecture
      sourceRefs: [SE001, SE019, SE023]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001, QE003]

    - id: CE002
      statement: "Ghost is Anduril's Group 2 fixed-wing ISR and strike-capable UAS. It is electrically powered, features an Anduril-designed compute stack running Lattice autonomy algorithms, carries multiple EO/IR sensors, and can fly fully autonomous missions with optional human-in-the-loop override. Ghost is Anduril's most widely deployed platform, with confirmed use by SOCOM."
      type: observed
      topic: ghost-uas-specs
      sourceRefs: [SE011, SE022, SE024]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE003
      statement: "Roadrunner is Anduril's VTOL interceptor for counter-UAS missions. It can take off vertically, intercept incoming drones or missiles at high speed, and return to land and be reused — unlike conventional expendable interceptors. This reusability is a core cost advantage over single-use kinetic interceptors in high-sortie counter-UAS scenarios."
      type: observed
      topic: roadrunner-cuav-specs
      sourceRefs: [SE012, SE003]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE004
      statement: "Dive-LD is Anduril's large displacement autonomous underwater vehicle (AUV). It is designed for long-duration undersea missions including ISR, mine countermeasures, and payload delivery. The US Navy has awarded contracts for Dive-LD, and Anduril is also developing the Dive-XL, an extra-large AUV similar to Australia's Ghost Shark program."
      type: observed
      topic: dive-ld-xuv-specs
      sourceRefs: [SE013, SE003]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE005
      statement: "The ALTIUS family of loitering munitions (ALTIUS-600M and variants) are Anduril's tube-launched, GPS/EO-guided attack munitions designed for standoff strike, SEAD, and anti-armor. The ALTIUS-600M weighs approximately 13 lbs, folds out after tube launch, and can carry multiple warhead types. It has been procured by SOCOM and tested by the US Army."
      type: observed
      topic: altius-munition-specs
      sourceRefs: [SE001, SE018]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE006
      statement: "Anduril's Arsenal-1 facility in Columbus, Ohio is designed to scale production of Fury (air-launched cruise missile), Roadrunner (VTOL interceptor), and Barracuda (next-generation CCA drone), plus a classified platform. Breaking Defense confirmed that Arsenal-1 will produce all four by end of 2026."
      type: observed
      topic: arsenal-1-production-facility
      sourceRefs: [SE002, SE003]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE004, QE006]

    - id: CE007
      statement: "Anduril's YFQ-44A is its entry into the US Air Force's Collaborative Combat Aircraft (CCA) program — a competition to produce AI-controlled drone wingmen for crewed fighter jets. The YFQ-44A competes against General Atomics' YFQ-42A. Breaking Defense confirmed the YFQ-44A is in active flight testing as of 2025, including testing with inert missile payloads."
      type: observed
      topic: yfq-44a-cca-program
      sourceRefs: [SE003, SE004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE008
      statement: "Anduril acquired ExoAnalytic Solutions in 2025-2026, a company that tracks space objects, satellites, and missile trajectories using a global network of optical sensors. This acquisition extends Lattice OS's data fusion capabilities into the space domain, enabling space situational awareness and missile defense applications."
      type: observed
      topic: exoanalytic-acquisition-space
      sourceRefs: [SE003, SE004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE007, QE001]

    - id: CE009
      statement: "Anduril's GitHub organization (github.com/anduril-industries) has no public repositories, reflecting the company's closed-source IP strategy. Unlike commercial software companies that build developer communities through open source, Anduril keeps its core autonomy algorithms, Lattice OS software stack, and hardware designs proprietary — consistent with defense classification requirements and competitive moat maintenance."
      type: observed
      topic: closed-source-ip-strategy
      sourceRefs: [SE005, SE015]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE005, QE008]

    - id: CE010
      statement: "Lattice OS's architecture follows a 'fuse-classify-act' pattern: (1) data ingestion from heterogeneous sensors into a common mesh, (2) machine learning-based classification of entities (friendly, neutral, threat), (3) mission planning algorithms that present recommended actions to operators. The operator retains final decision authority under current DoD policy, satisfying Directive 3000.09 requirements for LAWS."
      type: inferred
      topic: lattice-architecture-flow
      sourceRefs: [SE001, SE007, SE019]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE003, QE009]

    - id: CE011
      statement: "Anduril's Sentry Tower is a modular, rapidly deployable surveillance and detection system that integrates radar, optical sensors, and RF detection with Lattice OS to detect and track intruders, drones, and vehicles. Deployed by CBP at the US-Mexico border, the Sentry Tower was Anduril's first program to transition from OTA prototype to full production contract."
      type: observed
      topic: sentry-tower-border-deployment
      sourceRefs: [SE001, SE018, SE021]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE002, QE004]

    - id: CE012
      statement: "Anduril's partnership with Kraken Robotics combines Kraken's small unmanned surface vehicles (USVs) with Anduril's manufacturing, Lattice OS integration, and DoD customer relationships. The partnership exemplifies Anduril's platform strategy: rather than building every platform internally, Lattice OS is extended to third-party hardware, expanding the addressable market."
      type: observed
      topic: kraken-usv-partnership
      sourceRefs: [SE003]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE007, QE003]

    - id: CE013
      statement: "DIU (Defense Innovation Unit) is a key Anduril customer and commercialization channel. DIU uses OTA (Other Transaction Authority) contracts to accelerate commercial technology into the DoD, reducing procurement timelines from years to months. Anduril has used DIU contracts for Dive-LD, Ghost, and ALTIUS programs, with DIU serving as the 'on-ramp' to full production contracts."
      type: observed
      topic: diu-customer-channel
      sourceRefs: [SE006, SE018]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE004, QE002]

    - id: CE014
      statement: "Fury is Anduril's long-range air-launched cruise missile being developed for the US Air Force's Family of Affordable Mass Missiles (FAMM) program. The Air Force envisions ~30,000 copies of the FAMM class, representing a potential multi-billion dollar production program. Arsenal-1 in Columbus is designed specifically to support Fury's production scale."
      type: observed
      topic: fury-cruise-missile-famm
      sourceRefs: [SE003, SE002]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE015
      statement: "Anduril's enterprise contracts with the DoD — large-ceiling, multi-year contract vehicles that allow flexible task ordering — represent a new procurement model that reduces per-acquisition friction. The Army's $20B counter-drone contract vehicle (awarded to Anduril) is a prime example: no cash is attached at award, but it pre-approves Anduril as a supplier for all future counter-drone task orders, dramatically reducing the sales cycle."
      type: observed
      topic: enterprise-contract-vehicle-model
      sourceRefs: [SE003, SE004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE004, QE002]

    - id: CE016
      statement: "Human Rights Watch and other civil society organizations have specifically called out Anduril's Roadrunner and ALTIUS systems as potentially falling within the category of Lethal Autonomous Weapons Systems (LAWS) subject to international legal scrutiny. Anduril maintains that all systems require human authorization for lethal force, but critics argue that the authorization latency and automation level may not satisfy IHL's meaningful human control standard."
      type: observed
      topic: laws-human-rights-criticism
      sourceRefs: [SE020, SE019]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE009, QE010]

    - id: CE017
      statement: "Anduril's product development philosophy prioritizes software-first design: hardware platforms are designed as 'edge nodes' that run Lattice OS rather than purpose-built single-function systems. This means a Ghost UAS, a Sentry Tower, and a Dive-LD UUV all share the same sensor fusion, communications, and mission management software framework, enabling rapid cross-domain capability development."
      type: inferred
      topic: software-first-product-philosophy
      sourceRefs: [SE001, SE019, SE023]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE003, QE005]

    - id: CE018
      statement: "The CCA (Collaborative Combat Aircraft) program is one of the largest defense acquisition programs of the 2020s, with potential for thousands of drone wingmen for F-35, F-22, and Next-Gen Air Dominance platforms. Anduril's YFQ-44A competes with General Atomics' YFQ-42A. The contract could be worth $5-10B+ over a production lifecycle, making it Anduril's largest potential single program."
      type: inferred
      topic: cca-program-size-potential
      sourceRefs: [SE003, SE004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE019
      statement: "Anduril's Menace counter-UAS system is its ground-based directed energy and kinetic solution for defeating drone swarms. While Ghost and Roadrunner address individual threats, Menace is designed for high-density swarm scenarios. The system is in prototype/testing phase as of 2025, representing an early-stage product that may take 2-3 years to reach production."
      type: observed
      topic: menace-c-uas-swarm
      sourceRefs: [SE001, SE016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE002, QE001]

    - id: CE020
      statement: "The Anduril products that have crossed from prototype to production include: Ghost (SOCOM, deployed), Sentry Tower (CBP, in production), ALTIUS-600M (SOCOM, in production), Roadrunner (in production at Arsenal-1). Fury, YFQ-44A, Dive-XL, and Menace are in prototype/development. This production-to-prototype ratio reflects an active product pipeline with near-term revenue upside."
      type: inferred
      topic: production-vs-prototype-pipeline
      sourceRefs: [SE002, SE003, SE018]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE004, QE002]

    - id: CE021
      statement: "Anduril's products span five combat domains: air (Ghost, Fury, YFQ-44A, ALTIUS), maritime surface (Sentry Tower maritime variant, Kraken USV), subsurface (Dive-LD, Dive-XL), ground (Sentry Tower, Menace), and space (ExoAnalytic). This multi-domain coverage is unique among defense tech startups and enables Anduril to pursue Joint All-Domain Command and Control (JADC2) use cases that competitors cannot."
      type: inferred
      topic: multi-domain-product-coverage
      sourceRefs: [SE001, SE003, SE004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE001, QE007]

    - id: CE022
      statement: "Anduril's quality and reliability approach follows a 'build-test-iterate' model adapted from Silicon Valley software development, with higher cadence hardware testing than traditional defense primes. Multiple anecdotal accounts from DoD program managers (per press coverage) indicate faster prototype-to-field cycles for Anduril programs than traditional acquisition programs — 12-24 months vs. 5-10 years for comparable systems."
      type: inferred
      topic: quality-build-test-iterate
      sourceRefs: [SE022, SE019]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QE008, QE004]

    - id: CE023
      statement: "Anduril's ITAR compliance and export control framework is required for all its defense products. Products exported to UK, Australia (Five Eyes partners) and potentially other allies operate under government-negotiated information sharing agreements that allow Anduril to share technical details and source code not permitted with non-partner nations — creating a tiered international product offering."
      type: inferred
      topic: itar-export-compliance
      sourceRefs: [SE006, SE018]
      confidence: medium
      freshness: current
