sections:
  - id: SE-S1
    title: Product Portfolio and Platform Architecture
    body: |
      Anduril operates as a multi-domain defense platform company with products spanning air, maritime
      surface, subsurface, ground, and space domains. The unifying architecture is Lattice OS — an
      AI-powered command-and-control software layer that ingests data from heterogeneous sensors,
      applies machine learning for target detection and classification, and presents a common operating
      picture to operators. Lattice OS follows a 'fuse-classify-act' pattern: sensor ingestion into
      a common mesh, ML-based entity classification (friendly/neutral/threat), and mission planning
      recommendations presented to human operators for authorization.

      The current product lineup includes: Ghost (Group 2 fixed-wing ISR/strike UAS, deployed with
      SOCOM), Roadrunner (VTOL reusable interceptor for counter-UAS, in production at Arsenal-1),
      ALTIUS-600M (tube-launched loitering munition, in SOCOM production), Sentry Tower (autonomous
      ground surveillance, CBP deployed), Dive-LD (large AUV for undersea ISR), Fury (air-launched
      cruise missile, Arsenal-1 production ramp), YFQ-44A (CCA drone wingman, in flight test), and
      Menace (counter-swarm system, prototype). The ExoAnalytic acquisition in 2026 added a global
      space situational awareness sensor network, extending Lattice into the space domain.

      Anduril's software-first product philosophy means all hardware platforms are designed as 'edge
      nodes' running Lattice OS, sharing the same sensor fusion, communications, and mission management
      framework. This enables rapid cross-domain capability development — a new sensor type integrated
      into Lattice on Ghost automatically becomes available to Sentry Tower and Dive-LD operators.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE007, CE010, CE017, CE021]

  - id: SE-S2
    title: Manufacturing, Deployment, and Technology Execution
    body: |
      Arsenal-1 in Columbus, Ohio is Anduril's manufacturing scale-up answer to critics who questioned
      whether a Silicon Valley software company could produce hardware at defense-relevant volumes. The
      facility will produce Fury, Roadrunner, Barracuda, and a classified platform by end of 2026. The
      COTS-based supply chain approach — using commercial sensors, compute, and communication components
      modified for military ruggedization — enables faster production iteration and lower material costs
      than mil-spec supply chains, though it introduces cybersecurity and availability risks.

      Deployment channels include DIU-OTA contracts (Ghost, Dive-LD, ALTIUS), direct DoD program
      contracts (Sentry Tower with CBP), and enterprise contract vehicles (Army's $20B counter-drone
      ceiling). Anduril's enterprise contract vehicle approach is particularly notable: the $20B Army
      counter-drone vehicle pre-qualifies Anduril for future task orders without re-competition, creating
      a pipeline structure that traditional contract-by-contract sellers cannot match. The Ghost Shark
      program for Australia validates Anduril's ability to execute cross-allied production programs.

      Developer signal from GitHub confirms a closed-source IP strategy — no public repositories exist.
      Product reliability assessment is limited by absence of public failure data, though press accounts
      from DoD program managers uniformly report faster prototype-to-field cycles than traditional
      defense acquisition programs. The CCA competition (YFQ-44A vs. General Atomics YFQ-42A) will be
      a critical execution test: winning would validate Anduril's ability to compete on the largest and
      most complex Air Force platform programs.
    claimRefs: [CE006, CE009, CE011, CE013, CE014, CE015, CE020, CE022, CE026, CE030, CE033]

  - id: SE-S3
    title: Differentiation, IP, Compliance, and Roadmap
    body: |
      Anduril's core technical differentiation vs. traditional primes (Lockheed, Raytheon, Northrop)
      is development velocity — software-first architecture enables quarterly capability updates vs.
      multi-year program cycle upgrades. Vs. peer defense tech startups, Lattice OS's multi-domain
      coverage and vertical hardware integration distinguishes it from Palantir AIP (data analytics
      only) and Shield AI Hivemind (air domain only). The Lattice platform flywheel — where each new
      hardware node increases the total sensor mesh value — creates network-effect moat within deployed
      fleets.

      Compliance with DoD Directive 3000.09 (LAWS policy) is operationally critical. Anduril's policy
      position that humans authorize engagement envelopes satisfies current DoD policy, but Human Rights
      Watch and civil society advocates challenge whether terminal-phase autonomous targeting within an
      authorized envelope meets the IHL 'meaningful human control' standard. ITAR compliance governs all
      international sales, with tiered disclosure for Five Eyes partners. IP is entirely proprietary —
      no public patents or open-source signals reviewed; this gap limits external technical depth
      assessment.

      The product roadmap trajectory — ISR (2019) → counter-UAS (2022) → autonomous strike (2024) →
      CCA drone wingman (2025) → space domain (2026) — follows deliberate escalation toward higher-value
      programs. This progression mirrors a defense prime's capabilities build-out but at startup cadence.
      The CCA program win, if achieved, would cement Anduril's position as a top-tier defense prime
      competitor. Space domain entry via ExoAnalytic opens missile defense tracking as an additional
      high-growth segment.
    claimRefs: [CE008, CE012, CE016, CE017, CE018, CE023, CE024, CE025, CE027, CE028, CE031, CE032, CE034, CE035]

