    - id: CM007
      statement: >-
        Defense technology venture investment grew from ~$500M in 2019 to >$5B in 2022 and >$10B in 2023, representing a
        20x increase in four years. This investment boom is concentrated in five subsectors: autonomous systems, cyber,
        space tech, AI/C2, and directed energy. Anduril operates across autonomous systems and AI/C2 — the two largest
        subsectors. The investment growth reflects institutional capital's embrace of defense tech as a premium
        valuation category, not just a defense budget proxy.
      type: third-party-reported
      topic: defense-tech-investment-boom
      sourceRefs:
        - SM011
        - SM009
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM007
    - id: CM008
      statement: >-
        The Russia-Ukraine conflict (2022-present) has been the single most important market validation event for
        defense autonomous systems since the Gulf War validated precision-guided munitions. Key lessons: cheap
        commercial drones (Bayraktar TB2, FPV swarms) achieved decisive tactical effects; counter-drone capability
        became an existential requirement; attritable (low-cost, expendable) systems proved more operationally
        sustainable than high-cost precision systems in attritional warfare. All three lessons favor Anduril's product
        portfolio.
      type: observed
      topic: ukraine-war-market-driver
      sourceRefs:
        - SM010
        - SM008
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM008
    - id: CM009
      statement: >-
        Anduril's primary buyer segment is the US federal government: DoD (Army, Navy, Air Force, SOCOM), DHS (CBP),
        intelligence community agencies, and allied nation defense ministries. Budget ownership sits with DoD program
        offices and congressional appropriations. The acquisition pathway is primarily through Other Transaction
        Authority (OTA) contracts and direct DoD procurement — faster than traditional FAR-regulated procurement but
        still subject to Congressional budget cycles.
      type: observed
      topic: buyer-segmentation
      sourceRefs:
        - SM012
        - SM013
        - SM023
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM009
    - id: CM010
      statement: >-
        The Five Eyes defense market (UK, Australia, Canada, New Zealand) represents a $15-20B annual autonomous systems
        opportunity outside the US market. AUKUS (the US-UK-Australia defense technology pact) specifically includes
        provisions for autonomous undersea vehicles (where Dive-LD competes) and AI-enabled defense technology, creating
        an explicit procurement pathway for Anduril systems in allied markets with reduced ITAR export barriers versus
        non-Five-Eyes partners.
      type: observed
      topic: international-market
      sourceRefs:
        - SM007
        - SM009
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM010
    - id: CM011
      statement: >-
        Legacy defense primes (Lockheed Martin, Northrop Grumman, RTX, Boeing, General Dynamics) collectively control
        approximately 60% of the US defense prime contractor market by revenue. However, they control <20% of the
        emerging autonomous systems market because: (1) their cost-plus business models are misaligned with autonomy
        software economics, (2) they lack in-house AI capability at scale, and (3) their acquisition-culture
        bureaucracies move too slowly to compete with commercial tech development cycles. This creates the structural
        white space Anduril occupies.
      type: estimated
      topic: competitive-white-space
      sourceRefs:
        - SM014
        - SM006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM011
    - id: CM012
      statement: >-
        The adoption constraint for defense autonomous systems is not technical capability but procurement reform
        velocity. The DoD's average cycle from requirement definition to contract award runs 5-7 years under FAR-based
        procurement. OTA (Other Transaction Authority) contracts enable 12-24 month prototype-to-production timelines —
        the mechanism Anduril and other defense tech startups exploit to bypass legacy procurement timelines.
        Congressional resistance to OTA expansion is the primary regulatory adoption constraint.
      type: observed
      topic: procurement-adoption-constraint
      sourceRefs:
        - SM023
        - SM001
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM012
