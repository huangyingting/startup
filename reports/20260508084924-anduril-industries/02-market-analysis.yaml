    - id: CM006
      statement: >-
        Anduril's total addressable market (TAM) across four categories: (1) US DoD autonomous systems procurement
        ($15-20B annually by 2030), (2) C2/ISR software ($8-12B annually), (3) counter-UAS ($7B by 2030), and (4) Five
        Eyes + NATO allied markets (~$15-20B). The combined TAM exceeds $50B annually, with Anduril's current estimated
