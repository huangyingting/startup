sections:
  - id: SM-S1
    title: Market Boundary and Structure
    body: |
      Anduril Industries addresses a fragmented but high-growth set of defense procurement markets defined
      by the intersection of artificial intelligence, autonomous systems, and military operations. The
      company's relevant market spans four domains: autonomous unmanned air systems (UAS — Ghost, Roadrunner,
      ALTIUS), autonomous undersea systems (Dive-LD), AI-enabled command-and-control software (Lattice OS),
      and counter-unmanned aerial systems (C-UAS — Menace). The common thread is autonomous operation and
      AI-driven decision-making — market segments where legacy defense primes lack competitive products.

      The structural market boundary is US and allied defense procurement for "new domain" autonomous
      capabilities — explicitly distinct from the legacy programs (F-35 fighters, aircraft carriers,
      Abrams tank upgrades) that Lockheed Martin and General Dynamics dominate. Anduril is not a
      competitor for F-35 production runs; it competes for autonomous attritable systems, AI platforms,
      and counter-drone systems — new budget lines growing faster than the base defense budget.

      Status-quo substitutes for Anduril's products include: manually-piloted UAVs (Predator/Reaper), 
      legacy radar-based C2 systems (Link 16, ATAK), command-and-control software (Palantir AI Platform),
      and conventional munitions for strike missions. In each category, Anduril offers an autonomy-enabled
      alternative that is cheaper per unit (attritable vs. exquisite), faster to field (OTA vs. FAR), and
      more relevant for the threat environment defined by Ukraine and China's drone/anti-access investments.
      The company's vertical integration — building both the hardware platforms and the unifying Lattice
      software — is a key differentiator that neither pure-software (Palantir) nor pure-hardware (legacy
      primes) competitors can replicate without multi-year organizational transformation.
    claimRefs:
      - CM001
      - CM011
      - CM014
      - CM021
    tableRefs:
      - TM001
    figureRefs:
      - FM001
      - FM004
  - id: SM-S2
    title: Market Sizing — TAM, SAM, and SOM
    body: |
      The US alone spends approximately $886B on defense in FY2025, with RDT&E budget of ~$145B. The
      autonomous systems and AI-specific subset of this budget is estimated at $9-12B annually and
      growing at 12-18% CAGR. Globally, military expenditure reached $2.44 trillion in 2023 (SIPRI),
      of which autonomous systems represent an estimated 5-8% — approximately $120-200B total annual
      spend across all countries, of which the US represents 35-40%.

      For Anduril specifically: the combined TAM across autonomous air systems ($15-20B annually by
      2030 US+allies), counter-UAS ($7B by 2030), AI C2 software ($8-12B), and undersea systems
      ($3-5B) exceeds $40-50B annually. The SAM — programs that Anduril could credibly compete for
      with current products — is estimated at $10-15B annually. The SOM on a 3-5 year horizon
      (given production capacity, contract pipeline, and competitive position) is estimated at
      $2-4B annually, consistent with a company that could achieve $2-4B ARR by 2028-2030.

      Market sizing variance is significant: analyst estimates differ by 50%+ depending on scope
      definition and growth assumptions. Conservative estimates remain compelling for Anduril's
      $30B+ implied valuation, given that even a $2B ARR by 2028 would support a 15x forward revenue
      multiple consistent with high-growth government SaaS precedents.
    claimRefs:
      - CM002
      - CM004
      - CM006
      - CM013
      - CM015
      - CM016
      - CM033
    tableRefs:
      - TM002
    figureRefs:
      - FM002
  - id: SM-S3
    title: Buyer Map, Growth Drivers, and Constraints
    body: |
      Anduril's primary buyers are US federal government program offices with defense authority:
      SOCOM (special operations), CBP (border security under DHS), USAF (counter-UAS and ISR),
      Army (autonomous ground and air vehicle programs), and Navy (undersea autonomous vehicles).
      Budget authority sits with Congressional appropriations and DoD program offices; procurement
      follows OTA for prototypes and FAR for production. The Five Eyes (UK, Australia, Canada,
      NZ) and NATO allied markets represent secondary buyer segments, accelerated by AUKUS Pillar II.

      Growth drivers include: (1) Russia-Ukraine conflict lessons validating autonomous systems,
      (2) DoD Replicator initiative creating specific budget lines for attritable autonomous systems,
      (3) China's PLA autonomous systems investments creating urgent competition narrative,
      (4) AUKUS agreement opening allied procurement channels, and (5) defense tech sector investment
      boom signaling that capital markets will support defense tech at premium valuations.

      Adoption constraints: (1) Congressional continuing resolutions delaying contract awards by
      6-12 months, (2) OTA expansion resistance from Congress and traditional defense contractors
      worried about competition, (3) LAWS international prohibition advocacy creating tail risk on
      export markets, and (4) Anduril's production capacity scaling from prototype to program-of-record
      quantities for Roadrunner and Dive-LD.
