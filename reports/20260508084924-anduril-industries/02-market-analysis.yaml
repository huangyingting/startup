    - id: CM002
      statement: >-
        Global military expenditure reached $2.44 trillion in 2023 (SIPRI data), the highest level since the Cold War.
        The US accounts for approximately 37% of global military spending ($886B FY2025), followed by China (~$296B),
        Russia (~$109B), India, Saudi Arabia, and European NATO. This spending base defines the structural demand
        ceiling for defense technology across all capability areas including autonomous systems.
      type: observed
      topic: global-defense-market
      sourceRefs:
        - SM002
        - SM001
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM001
