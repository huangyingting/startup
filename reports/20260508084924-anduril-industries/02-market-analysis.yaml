        The counter-UAS (C-UAS) market is projected to reach $7B by 2030 (Grand View Research), growing at ~20% CAGR
        from approximately $1.5-2B in 2023. Growth drivers include: drone proliferation among state and non-state
        actors, demonstrated UAS effectiveness in Ukraine/Middle East conflicts, and US DoD mandatory C-UAS integration
        across all forward-deployed forces. Anduril's Menace system addresses this market through Roadrunner intercept
        and Lattice-integrated detection/tracking.
      type: third-party-reported
      topic: counter-uas-market
