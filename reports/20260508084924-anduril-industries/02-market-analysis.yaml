  title: Market Analysis
  summary: |
    Anduril operates at the intersection of three distinct but overlapping defense markets: autonomous
    unmanned systems (UAS/UUV/UGV), AI-enabled command-and-control (C2) and ISR software, and counter-
    unmanned aerial systems (C-UAS). Together these segments constitute a multi-hundred-billion-dollar
    total opportunity across the full US and allied defense procurement budgets. The combined US DoD
    budget for autonomous systems R&D and procurement is estimated at $20B–$30B annually (FY2025),
    growing at 12–18% CAGR through 2030 driven by great-power competition, Russia-Ukraine lessons
    learned, and the DoD's Replicator autonomous drone initiative.

    The US defense budget provides the structural demand floor: at $886B for FY2025, the US spends
    approximately 3x all NATO allies combined on defense. The autonomous systems and AI integration
    budget share is growing disproportionately within total defense spending — from ~2% of defense R&D
    in 2019 to an estimated 6-8% in 2025. Globally, defense autonomous systems spending is estimated
    at $60B–$80B annually (SIPRI military expenditure data), with the US representing ~35–40% of global
    spend. The counter-UAS market alone is projected at $7B by 2030 (Grand View Research), driven by
    drone proliferation across state and non-state actors.

    Anduril's addressable market is further expanded by Five Eyes and NATO allied defense markets,
    adding an estimated $15–20B in annual autonomous systems procurement outside the US. The UK MoD,
    Royal Australian Air Force, and NATO eastern flank countries are accelerating autonomous systems
    acquisition programs following Russian drone and loitering munition use in Ukraine. Within this
    market, Anduril is positioned as a full-stack provider across air, surface, and undersea domains —
    a differentiation that enables it to capture system-of-systems integration contracts rather than
    just individual platform wins.
