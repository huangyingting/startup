  claims:
    - id: CO001
      statement: "Anduril Industries was founded in October 2017 in Costa Mesa, California, by Palmer Luckey (founder of Oculus VR, acquired by Facebook in 2014 for $2B), Matt Grimm, Trae Stephens, Brian Schimpf, and Joseph Chen. The company's founding thesis was that Silicon Valley technology expertise could fundamentally transform defense procurement by building autonomous, AI-driven systems at the speed and economics of consumer technology rather than the cost-plus procurement model of legacy defense contractors."
      type: observed
      topic: founding-overview
      sourceRefs: [SO004, SO003]
      confidence: high
      freshness: historical
      answersQuestionRefs: [QO001, QO002]

    - id: CO002
      statement: "Palmer Luckey serves as founder and Chief of Acquisitions Strategy; Brian Schimpf serves as CEO and co-founder. Schimpf previously worked at Palantir Technologies before co-founding Anduril — a founding team that deliberately mixed Silicon Valley software culture (Luckey, Stephens from Founders Fund) with defense-insider experience (Schimpf's Palantir background includes classified government contracting)."
      type: observed
      topic: founding-team
      sourceRefs: [SO004, SO005]
      confidence: high
      freshness: current
      answersQuestionRefs: [QO003]

    - id: CO003
      statement: "Anduril's Series F round ($1.5B at $14B post-money valuation, August 2024) was co-led by Founders Fund and Sands Capital, with participation from existing investors including General Catalyst, 8VC, Andreessen Horowitz (a16z), and others. This was the largest defense tech VC round in history at the time of closing and established Anduril as the best-capitalized private defense technology company."
      type: third-party-reported
      topic: series-f-valuation
      sourceRefs: [SO001, SO002, SO003]
      confidence: high
      freshness: current
      answersQuestionRefs: [QO004, QO005]

    - id: CO004
      statement: "In June 2025, multiple sources reported Anduril's implied valuation exceeding $30B — more than doubling from the $14B Series F price in under 12 months. This re-rating reflects the rapid growth of the US defense tech sector following Russia-Ukraine war demand signals, the US DoD Replicator autonomous drone program, and Anduril's growing contract backlog."
      type: third-party-reported
      topic: valuation-2025
      sourceRefs: [SO009, SO002]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QO004, QO006]

