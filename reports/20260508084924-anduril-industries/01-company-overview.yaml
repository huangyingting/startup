sections:
  - id: SO-S1
    title: Company Identity and Founding
    body: |
      Anduril Industries is a Costa Mesa, California-based defense technology company founded in October 2017
      by Palmer Luckey, Matt Grimm, Trae Stephens, Brian Schimpf, and Joseph Chen. The company's founding
      hypothesis was that Silicon Valley software and hardware engineering could transform US defense
      capability more effectively than legacy procurement models — building autonomous, AI-driven systems
      at consumer technology speed and economics rather than the decade-long, cost-plus procurement cycles
      of Lockheed Martin, Northrop Grumman, and Boeing.

      Palmer Luckey's personal narrative is inseparable from Anduril's brand: after selling Oculus VR to
      Facebook for $2B in 2014 and being controversially fired from Meta in 2017, Luckey channeled the
      experience into building what he described as a "defense company that doesn't hate America" —
      explicitly patriotic technology development at a time when major Silicon Valley companies (Google,
      Amazon) were facing employee revolts over defense contracts. Luckey serves as Chief of Acquisitions
      Strategy; Brian Schimpf (Palantir veteran) serves as CEO for day-to-day operations.

      The company's product portfolio spans four categories: autonomous air systems (Ghost UAV, Roadrunner
      autonomous jet, ALTIUS munition), undersea systems (Dive-LD UUV), border/surveillance infrastructure
      (Sentry Tower), and the Lattice OS AI platform that provides the unified C2/ISR software connecting
      all Anduril hardware and third-party sensors. The Lattice OS is Anduril's strategic software moat
      — a real-time mesh-networked command and control system that creates switching costs and ecosystem
      lock-in across the entire hardware portfolio.
    claimRefs: [CO001, CO002, CO006, CO007, CO015, CO026]

  - id: SO-S2
    title: Funding History and Valuation Context
    body: |
      Anduril has raised over $3B in equity financing across six rounds, establishing itself as the
      best-capitalized private defense technology company in the US. The funding trajectory reflects
      both Anduril's execution excellence and the macroeconomic shift in defense investment following
      the Russia-Ukraine conflict.

      Key funding milestones: Seed (2018, ~$18M, Founders Fund); Series A (2019, $58M); Series B (2020,
      $200M); Series C (2021, $450M); Series D (2022, $1.48B at $8.48B post-money valuation); and
      the landmark Series F (August 2024, $1.5B at $14B post-money valuation, co-led by Founders Fund
      and Sands Capital). The Series F was the largest defense tech VC round in history at the time of
      closing. By June 2025, secondary market transactions implied a valuation exceeding $30B — more
      than doubling in under 12 months.

      The investor syndicate includes Founders Fund (Peter Thiel, lead investor from Seed), a16z,
      General Catalyst, 8VC (Joe Lonsdale), and Sands Capital. The Founders Fund and 8VC connection
      is particularly strategic: Peter Thiel co-founded Palantir (which Brian Schimpf worked at before
      co-founding Anduril), and Joe Lonsdale co-founded Palantir before founding 8VC — creating a
      dense network of defense tech operators providing strategic advice and government access.

      SEC EDGAR Form D filings confirm structured institutional fundraising through California-based
      limited partnership vehicles, independently validating the disclosed round history beyond press
      reporting. USASpending.gov confirms active federal contract relationships that form the revenue
      foundation for the company's growth.
    claimRefs: [CO003, CO004, CO005, CO011, CO012, CO016, CO020, CO023, CO025]

  - id: SO-S3
    title: Milestones and Market Position
    body: |
      Anduril's milestone trajectory shows a company that has successfully navigated the transition from
      venture-backed startup to operationally-deployed defense contractor in 7 years — a timeline without
      historical precedent in the defense acquisition system that typically requires decades for new entrants.

      Key milestones include: CBP Sentry Tower contract delivery (2019-2020, first operational program),
      SOCOM Ghost drone deployment (2021, first combat-adjacent ISR operation), Area-I acquisition for
      ALTIUS munition (2021, adds air-launched munition to portfolio), Series D at $8.48B (2022, validates
      defense tech investment thesis post-Ukraine), Roadrunner product reveal (2023), Replicator program
      selection (2023-2024, 450+ autonomous systems for US DoD), and Series F at $14B (2024, largest defense
      tech VC round in history). The June 2025 $30B+ valuation report marks the company's emergence as
      one of the most valuable private defense technology companies in the world.

      The autonomous systems and counter-UAS market context validates Anduril's product portfolio: Ukraine
      demonstrated that cheap drone swarms and sophisticated counter-drone systems are decisive modern
      warfare capabilities, directly driving the US DoD's accelerated investment in both offensive and
      defensive autonomous systems. Anduril's products serve all four capability categories the DoD has
      identified as autonomy priorities: ISR (Ghost, Sentry Tower), strike (Roadrunner, ALTIUS), undersea
      (Dive-LD), and counter-UAS (Menace). No other private company covers all four categories simultaneously.
    claimRefs: [CO008, CO009, CO014, CO019, CO021, CO022, CO027, CO031, CO034]

