chapter:
  number: 1
  title: Company Overview
  summary: |
    Anduril Industries is a Costa Mesa, California-based defense technology company founded in October 2017
    by Palmer Luckey (creator of the Oculus Rift VR headset) and co-founders Matt Grimm, Trae Stephens,
    Brian Schimpf, and Joseph Chen. The company builds autonomous defense systems combining AI, robotics,
    sensors, and software to replace legacy platforms and enable asymmetric advantage for US and allied
    forces. Anduril's product portfolio spans four categories: autonomous air vehicles (Ghost drone,
    Roadrunner autonomous jet, ALTIUS munition), undersea systems (Dive-LD UUV), counter-UAS systems
    (Menace), border/surveillance infrastructure (Sentry Tower), and the Lattice OS AI platform that
    integrates all sensor and autonomous system data into a unified command-and-control mesh.

    As of August 2024, Anduril closed a $1.5B Series F at a $14B post-money valuation — the largest
    defense tech VC round in history at the time. Total equity raised exceeds $3B across six rounds.
    In June 2025, reports cited a valuation exceeding $30B, reflecting a secondary market re-rating and
    substantial new contract momentum. Revenue is estimated at $1B+ ARR by 2024 driven by US DoD, US
    Customs and Border Protection, SOCOM, and Five Eyes allies. Headcount exceeded 4,500 employees as
    of early 2026. The company has won multiple major DoD programs including the replicator drone program
    (450+ autonomous systems), a $250M SOCOM contract for ALTIUS munitions, and is a finalist for the
    NGAD air dominance program.

