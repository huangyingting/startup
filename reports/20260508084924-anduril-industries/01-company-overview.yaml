      type: third-party-reported
      topic: autonomous-weapons-controversy
      sourceRefs: [SO019, SO004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QO013]

    - id: CO018
      statement: "Anduril's business model is government contract revenue with fixed-price contract structures (unlike traditional cost-plus defense contractors). Fixed-price contracts incentivize Anduril to deliver within cost and schedule to retain margin; this model is more favorable for the government customer but creates execution risk for Anduril on large-scale production contracts if costs exceed projections."
      type: inferred
      topic: business-model
      sourceRefs: [SO010, SO012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QO010, QO014]

