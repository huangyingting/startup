  claims:
    - id: CI001
      statement: "Anduril's total contract revenue is estimated at $1.0–1.5B for fiscal year 2024 based on the sum of known program values from USASpending.gov and SAM.gov. This estimate includes: CBP Sentry Tower program (~$200M cumulative), multiple SOCOM Ghost drone deployments (~$250M+), Replicator-related awards (~$200-400M), ALTIUS program (~$100M+), and various other DoD R&D and prototype contracts. The estimate excludes classified programs, which could materially increase the true revenue total."
      type: estimated
      topic: revenue-estimate
      sourceRefs: [SI001, SI002]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI001, QI002]

    - id: CI002
      statement: "Anduril's primary revenue stream is fixed-price US government contracts — predominantly Other Transaction Authority (OTA) agreements for R&D and prototype stages, transitioning to FAR-based production contracts for operational programs. This revenue structure differs from legacy defense primes' cost-plus model: fixed-price contracts put execution risk on Anduril but also enable higher margins when costs are controlled. Government contracts typically have multi-year periods of performance, providing revenue visibility 2-4 years ahead."
      type: observed
      topic: revenue-model
      sourceRefs: [SI001, SI015]
      confidence: high
      freshness: current
      answersQuestionRefs: [QI003, QI004]

    - id: CI003
      statement: "Anduril's cost structure is dominated by labor (estimated 60-70% of costs): with 4,500+ employees at an average fully-loaded compensation package (salary + benefits + equity + facilities) of $250-300K per person, total annual labor cost is approximately $1.1-1.35B. This labor cost estimate is comparable to or above estimated 2024 revenue ($1.0-1.5B), which strongly implies the company is operating at or near breakeven or modest operating loss before accounting for capital expenditures on manufacturing scale-up."
      type: estimated
      topic: cost-structure
      sourceRefs: [SI012, SI006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI005, QI006]

    - id: CI004
      statement: "Total equity raised by Anduril exceeds $3B across six rounds as independently confirmed by SEC Form D filings. With the August 2024 Series F adding $1.5B and estimated 2024 annual burn rate of $1.2-1.8B (based on headcount + capital expenditure estimates), the runway on Series F capital alone is approximately 10-15 months. Anduril will likely need to either achieve cash flow breakeven from operations, access debt financing, or raise a Series G / IPO within 18-24 months of the Series F close."
      type: estimated
      topic: capital-adequacy
      sourceRefs: [SI003, SI004, SI005]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI007, QI008]

    - id: CI005
      statement: "Anduril's gross margin profile is estimated at 30-45% blended across hardware and software revenue. The basis for this estimate: Palantir's government software business operates at ~75% gross margins (publicly disclosed); Kratos Defense (public) reports gross margins of ~22-26% on hardware programs; an Anduril blended margin of 30-45% assumes roughly 40% of revenue is higher-margin Lattice OS software services and 60% is hardware program revenue. This estimate has wide uncertainty bands given the absence of audited financial data."
      type: estimated
      topic: gross-margin-estimate
      sourceRefs: [SI007, SI018]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI009]

    - id: CI006
      statement: "Anduril's reported use of Series F proceeds ($1.5B) includes: (1) scaling manufacturing for Roadrunner, ALTIUS, and Dive-LD production (capital intensive at estimated $200-400M for factory buildout); (2) R&D for next-generation products and Lattice AI model development; (3) international expansion (UK, Australia offices and local defense relationships); and (4) working capital to fund government contract performance cycles (government contracts are often front-loaded in cost but back-loaded in award/payment timelines)."
      type: third-party-reported
      topic: use-of-proceeds
      sourceRefs: [SI005, SI013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI008]

    - id: CI007
      statement: "Defense government contracts create working capital intensity: Anduril must often spend on manufacturing and R&D before receiving payment (milestone-based payment structures). CBP and DoD contracts typically have 30-90 day payment terms on milestone deliveries, but large capital outlays for prototype builds can precede payment by 6-12 months. This working capital dynamic is partially funded by the $3B+ in equity capital raised to date, and is a key reason why defense startups require more capital than software-only companies at equivalent revenue scale."
      type: observed
      topic: working-capital
      sourceRefs: [SI001, SI002]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI010]

    - id: CI008
      statement: "Anduril's valuation trajectory — from $14B at Series F (August 2024) to $30B+ implied (June 2025) — implies a trailing revenue multiple of ~20-30x at $14B and ~20-30x at $30B+, consistent with high-growth defense tech software-hardware companies. For reference: Palantir trades at ~30-35x forward revenue (public market, as of 2025); Kratos Defense trades at ~3-4x revenue (public market). Anduril's blended multiple reflects its positioning between pure software (Palantir premium) and pure hardware (Kratos discount)."
      type: estimated
      topic: valuation-multiples
      sourceRefs: [SI009, SI007]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI011]

    - id: CI009
      statement: "Anduril's IPO timing is uncertain but is expected in the 2026-2028 window based on investor expectations implicit in the Series F valuation. The company would need to demonstrate: (1) revenue growth to $2B+ ARR, (2) improving gross margins trending toward 40%+, (3) a credible path to operating breakeven within 2-3 years post-IPO, and (4) absence of major program failures or political controversy. The IPO would follow the defense tech sector's re-rating at premium multiples — analogous to Palantir's trajectory but with hardware+software premium dynamics."
      type: estimated
      topic: ipo-pathway
      sourceRefs: [SI009, SI011]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI012]

    - id: CI010
      statement: "Anduril's revenue concentration risk is material: estimated top 3 programs (Replicator, CBP Sentry Tower, SOCOM Ghost) account for approximately 50-60% of estimated revenue. If any of these programs faces cancellation, budget reduction, or program restructuring, revenue could decline by 20-30% in a single fiscal year. This concentration is common in defense startups at early stages but becomes a material risk as the company pursues higher valuation multiples that require revenue diversification."
      type: estimated
      topic: revenue-concentration
      sourceRefs: [SI001, SI002]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI013]

    - id: CI011
      statement: "Anduril's GTM (go-to-market) motion is direct government engagement — the company has no commercial distribution channel, reseller network, or system integrator partnership for its primary products. Sales cycles are 12-24 months for OTA prototype awards and 18-36 months for production contract awards. Customer acquisition cost (CAC) in defense procurement is extremely high (hundreds of thousands of dollars in BD/proposal costs per contract win) but customer lifetime value (LTV) is very long (5-10 year programs once established), providing favorable LTV/CAC ratios at maturity."
      type: observed
      topic: gtm-efficiency
      sourceRefs: [SI001, SI021]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI014]

    - id: CI012
      statement: "Anduril's capital expenditure requirements for manufacturing scale are substantial: building out production lines for Roadrunner (reusable jet aircraft, complex manufacturing), Dive-LD (large UUV, demanding tolerances), and ALTIUS (precision munitions, explosive hazard handling requirements) each require industrial-scale facilities. The Columbus, Ohio manufacturing facility is a first step; reaching program-of-record production quantities will likely require $500M-$1B+ in capital expenditure over the 2024-2028 period, consuming a significant portion of the Series F proceeds."
      type: estimated
      topic: capex-intensity
      sourceRefs: [SI013, SI014]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI010, QI015]

    - id: CI013
      statement: "Palantir's public financial disclosures provide the best financial comparable for Anduril's Lattice OS software business: Palantir's US government segment generated ~$1.5B ARR in 2024 at approximately 45-50% adjusted gross margins, after 15+ years of investment. Anduril's Lattice OS is approximately 6-7 years old; if it follows Palantir's trajectory, the software margin inflection could be 5-8 years away. This comparative timeline supports the long-horizon investor thesis but limits near-term cash generation."
      type: observed
      topic: palantir-financial-comparable
      sourceRefs: [SI018, SI007]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QI009, QI011]

    - id: CI014
      statement: "Anduril's debt/project-finance profile is not publicly disclosed. The company does not appear to have significant public bond debt, and its SEC filings are limited to equity Form D filings. It is possible that Anduril has used venture debt (common for defense startups) to extend runway between equity rounds. Venture debt at Anduril's scale would typically be $100-300M, adding to total capital deployed. The absence of disclosed debt obligations is a modest positive signal for balance sheet flexibility."
      type: estimated
      topic: debt-financing
      sourceRefs: [SI003, SI004]
      confidence: low
      freshness: current
      answersQuestionRefs: [QI007]

