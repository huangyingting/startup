chapter:
  number: 4
  title: Financial Analysis
  summary: |
    Anduril Industries is a private company that does not publicly disclose financial statements.
    Revenue, margins, and cash position must be estimated from government contract databases
    (USASpending.gov, SAM.gov), press reporting on funding rounds, analogous company comparables
    (Palantir government segment, Kratos Defense public financials), and headcount/hiring signals.

    The best available evidence indicates Anduril crossed $1B in annual contract revenue during
    2024 — estimated at $1.0–1.5B based on the sum of known DoD program values, CBP contracts,
    and allied nation programs. With 4,500+ employees at an estimated average fully-loaded cost of
    ~$250-300K per person, total annual labor cost alone is $1.1–1.35B — implying the company may
    be operating at or near breakeven or modest loss, not yet profitable. The $1.5B Series F provides
    estimated 12-24 months of runway to the next equity or debt financing event.

    Gross margins for defense hardware companies typically range from 15-25%; software platforms
    (like Lattice OS) command 60-80% gross margins. Anduril's blended gross margin is estimated at
    30-45% — better than pure hardware defense contractors but below pure software peers. The capital
    intensity of scaling Roadrunner, Dive-LD, and ALTIUS production lines is the primary margin
    headwind; the Lattice OS software layer is the primary margin tailwind. Achieving profitability
    requires growing the Lattice software revenue faster than hardware scaling costs — the financial
    challenge central to the company's path to a successful IPO.

