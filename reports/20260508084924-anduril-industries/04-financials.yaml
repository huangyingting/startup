sections:
  - id: SI-S1
    title: Revenue Streams and Monetization Model
    body: |
      Anduril's revenue comes exclusively from US and allied government defense procurement contracts.
      The company does not have commercial revenue, consumer revenue, or licensing-only revenue outside
      the defense context. Revenue streams can be categorized as: (1) hardware platform programs (Ghost
      drone deployments, Roadrunner, Dive-LD, ALTIUS, Sentry Tower), (2) integrated system programs
      (Lattice OS deployed as part of larger sensor/autonomous system programs), and (3) R&D contracts
      (OTA prototypes, SBIR/STTR awards for early-stage technology development).

      Total estimated revenue for FY2024 is $1.0–1.5B, up from an estimated $400-600M in FY2022
      and $700M-$1B in FY2023. This implies a 2x+ annual revenue growth rate from 2021-2024,
      consistent with the Replicator program selection, CBP contract growth, and SOCOM deployment
      expansion. Revenue concentration is high: the top 3-4 programs likely account for 50-60%
      of total revenue.

      The Lattice OS software layer — the highest-margin component — is bundled into hardware program
      pricing rather than sold as a standalone subscription. This bundled model limits near-term margin
      visibility but creates long-term switching cost moat. Disaggregating the software margin from
      hardware is not possible from public sources, representing a critical diligence gap for investors
      attempting to value Anduril's software platform at SaaS multiples.
    claimRefs: [CI001, CI002, CI010, CI015, CI019]

  - id: SI-S2
    title: Cost Structure, Margins, and Capital Adequacy
    body: |
      Anduril's cost structure is dominated by labor: 4,500+ employees at an estimated $250-300K
      fully-loaded cost implies $1.1-1.35B in annual labor expense alone — roughly equal to the
      estimated revenue base. Additional costs include manufacturing capital expenditure (Columbus
      facility and planned expansion), materials and components for hardware programs, and corporate
      overhead. The resulting operating loss is estimated at $200-600M annually in FY2024, funded
      by the $3B+ equity capital pool.

      Gross margins are estimated at 30-45% blended — above hardware-only defense peers (Kratos
      at 22-26%) but well below software-only peers (Palantir at 45-50%). The key margin drivers
      are: (1) Lattice OS software attach rate on hardware programs (higher attach = higher blended
      margin), (2) production volume efficiency on hardware platforms (Ghost margin should improve
      as units scale), and (3) R&D contract pricing premiums on new technology programs.

      The Series F ($1.5B, August 2024) provides estimated 12-24 months of runway at current burn
      rates. Capital deployment priorities include manufacturing scale-up, R&D, and international
      expansion. An IPO or Series G is expected in the 2026-2028 window, contingent on revenue
      reaching $2B+, margins improving, and market conditions supporting defense tech premium
      valuations. Debt obligations are not publicly disclosed; venture debt of $100-300M may exist.
    claimRefs: [CI003, CI004, CI005, CI006, CI007, CI012, CI014, CI020, CI026]

  - id: SI-S3
    title: Valuation Analysis and Financial Verdict
    body: |
      Anduril's implied $30B+ valuation (June 2025) implies a trailing revenue multiple of 20-30x
      on estimated $1.0-1.5B ARR — a premium consistent with high-growth defense tech software
      platforms but expensive relative to mature defense prime multiples of 1-3x revenue. The
      multiple is justified by the growth rate (2x+ annually) and the software component of
      the business model, but remains highly sensitive to: (1) growth deceleration, (2) margin
      compression during manufacturing scale-up, and (3) program cancellation risk.

      Revenue quality is high (government counterparty, multi-year contracts) but concentration
      is concerning (50-60% from top 3-4 programs). Capital adequacy is adequate for the near
      term (12-24 months runway from Series F) but requires continued capital access. Financial
      disclosures are sparse — audited financials do not exist publicly, representing the primary
      diligence blocker. The financial verdict: a high-quality revenue base with exceptional growth,
      but an unverified margin story and significant capital intensity that requires successful IPO
      execution to validate the $30B+ implied valuation. Government R&D subsidies via Replicator
      and OTA contracts partially offset private burn, improving capital efficiency relative to
      commercial-only peers. The ultimate financial test is whether Anduril can grow into its
      multiple at IPO, where audited financials will for the first time allow investors to
      verify or reprice the software-premium thesis. Financial maturity requires transparency.
    claimRefs: [CI008, CI009, CI013, CI018, CI021, CI023, CI024, CI025, CI028, CI034]

