      topic: boeing-orca-comparison
      sourceRefs: [SP004, SP009]
      confidence: low
      freshness: current
      answersQuestionRefs: [QP004]

    - id: CP027
      statement: "General Atomics Aeronautical Systems (GA-ASI, private, majority-owned by General Atomics) is the most operationally proven autonomous aircraft company in the US, with 500+ Predator and Reaper aircraft deployed across US DoD and 25+ allied nations since the late 1990s. GA-ASI has established maintenance networks, pilot training infrastructure, and spare parts chains that Anduril does not yet have at scale. For mission profiles where long-endurance MALE (medium altitude, long endurance) surveillance is the requirement, GA-ASI is a stronger competitor than Kratos."
