      topic: supply-chain-advantage
      sourceRefs: [SP011, SP021]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP007]

    - id: CP025
      statement: "Anduril's competitive trust posture with DoD program offices is unusually strong for a 7-year-old company: the CBP Sentry Tower delivery, Ghost drone SOCOM deployments, and Replicator selection have created a track record of delivery and operational effectiveness that reduces procurement risk for DoD buyers. In defense contracting, trust built through demonstrated operational performance is the most durable competitive advantage — Lockheed Martin's F-35 relationship with the Air Force is built on 20+ years of F-16 operations history. Anduril is building this trust layer faster than any defense startup in history."
      type: observed
      topic: trust-competitive-moat
      sourceRefs: [SP022, SP021]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP007, QP014]

    - id: CP026
      statement: "Anduril's competitive advantage in the autonomous undersea vehicle (UUV) market relative to Boeing's Orca XLUUV is primarily time-to-delivery and software: Boeing's Orca program has faced schedule delays and the Navy has reportedly expressed concern about Boeing's ability to deliver on time and within cost. Anduril's Dive-LD, as a smaller startup program with less bureaucratic overhead, may be able to deliver operational UUVs faster despite Boeing's larger scale and established Navy relationships."
