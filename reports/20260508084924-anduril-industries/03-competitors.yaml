  claims:
    - id: CP001
      statement: "Palantir's AI Platform (AIP) is Anduril's most credible software-layer competitor in the defense AI and C2 market: Palantir's government segment generated ~$1.5B in ARR by 2024, with the US government segment growing at 25-30% CAGR. Palantir has deep CIA, NSA, and Army relationships built over 15+ years; its Gotham platform is embedded in classified intelligence workflows that Lattice OS would need to displace or integrate with, rather than replace."
      type: observed
      topic: palantir-competitor
      sourceRefs: [SP001, SP008]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP002]

    - id: CP002
      statement: "Shield AI (Hivemind autonomous pilot platform) is Anduril's most direct competitor in the autonomous vehicle AI stack: Shield AI raised $500M+ at ~$2.7B valuation (2023) to build AI that can pilot existing aircraft (F-16, V-22) and drones without GPS or communications. Shield AI is software-only — it does not design hardware — which differentiates it from Anduril but also limits its moat: any hardware platform could eventually adopt Hivemind, while Anduril's Lattice + hardware ecosystem creates multi-layer lock-in."
      type: observed
      topic: shield-ai-competitor
      sourceRefs: [SP002, SP008]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP003]

    - id: CP003
      statement: "Kratos Defense & Security Solutions is Anduril's primary hardware-layer competitor for attritable autonomous aircraft: Kratos builds the UTAP-22 Mako and XQ-58A Valkyrie (jointly with AFRL) — low-cost jet-powered drones designed for expendable missions. Kratos is publicly traded (~$2B market cap), revenue of ~$700M annually, and has the advantage of being a proven DoD prime contractor with established production lines. Anduril's Roadrunner is longer-endurance and reusable; Kratos drones are expendable at lower unit cost."
      type: observed
      topic: kratos-competitor
      sourceRefs: [SP003, SP009]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP004]

    - id: CP004
      statement: "Boeing's autonomous systems division (MQ-25 Stingray carrier drone, Loyal Wingman/MQ-28 Ghost Bat in Australia, Orca XLUUV) represents the most direct large-prime competitor to Anduril's air and undersea autonomous systems. Boeing's MQ-25 was awarded the carrier-based tanker contract in 2018 ($805M), demonstrating that Boeing can win autonomous systems programs. Boeing's disadvantage vs. Anduril is its cost-plus business model, slow development cycles, and software-layer weakness — the MQ-25 is hardware-centric without Anduril's AI/software integration."
      type: observed
      topic: boeing-competitor
      sourceRefs: [SP004, SP009]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP004, QP005]

    - id: CP005
      statement: "Northrop Grumman's MQ-4C Triton (broad-area maritime surveillance drone) and B-21 Raider (stealth bomber) represent legacy prime autonomous programs that compete for budget allocation rather than direct product overlap with Anduril. Northrop's autonomous capabilities are concentrated in high-end exquisite systems ($100M+ per unit) while Anduril targets the attritable ($500K-$5M) and modular drone categories — a different price point and lifecycle model."
      type: observed
      topic: northrop-competitor
      sourceRefs: [SP005, SP009]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP006
      statement: "Anduril's competitive moat rests on four reinforcing pillars: (1) Lattice OS as a sticky C2 software platform creating multi-year switching costs once integrated into government workflows; (2) multi-product hardware ecosystem where each product generates sensor data that improves Lattice AI models — a data flywheel effect; (3) OTA contracting relationships that accelerate re-award without competitive re-bid; and (4) founder network and political capital (Luckey, Thiel connection) creating informal barriers to competitive entry in early-stage DoD programs."
      type: inferred
      topic: competitive-moat
      sourceRefs: [SP011, SP001]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP006, QP007]

    - id: CP007
      statement: "Legacy defense primes' competitive response to Anduril has been through acquisition rather than organic development: L3Harris acquired Aerojet Rocketdyne (for propulsion systems critical to autonomous munitions), Lockheed Martin acquired Sikorsky for rotary-wing autonomy. However, no legacy prime has successfully built an AI C2 platform competitive with Lattice OS — they have responded with software partnerships (Microsoft Azure for DoD, AWS GovCloud) rather than internal development, suggesting they recognize the gap and are attempting to bridge it through third-party software rather than internal capability."
      type: observed
      topic: legacy-prime-response
      sourceRefs: [SP006, SP007]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP005, QP008]

    - id: CP008
      statement: "Anduril's competitive pricing structure is not publicly disclosed, but the company's OTA contract pricing with DoD is reported to be significantly lower per unit than legacy prime equivalents. For context: a Predator/Reaper (General Atomics, publicly traded at ~$3B) costs $25-30M per aircraft; Ghost drone is estimated at $100K-$500K per unit. This 50-100x price difference positions Anduril in a 'attritable' price band that enables swarm concepts impossible at legacy platform pricing."
      type: estimated
      topic: pricing-comparison
      sourceRefs: [SP009, SP021]
      confidence: low
      freshness: current
      answersQuestionRefs: [QP009]

    - id: CP009
      statement: "Anduril's distribution advantage over defense tech startups is its established OTA contracting relationship with DoD, which provides a faster re-award pathway than competitive procurement. Legacy primes have full and open competition advantages — their installed base of long-term contracts (IDIQ vehicles, sole-source follow-ons) creates distribution moats that Anduril cannot overcome in mature program areas. Anduril's distribution advantage is specifically in new program areas where no legacy prime is yet entrenched."
      type: observed
      topic: distribution-advantage
      sourceRefs: [SP021, SP022]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP010]

    - id: CP010
      statement: "Anduril faces an emerging competitive threat from Chinese-origin commercial drone technology adapted for military use: DJI's drone platforms (though under US export restrictions since 2020) and their derivatives built by Chinese manufacturers continue to proliferate among state and non-state actors at $500-$5,000 per unit. While these are not direct defense sector competitors to Anduril's $50K+ DoD systems, they create a 'good enough' lower-cost alternative for allies and partners with limited defense budgets who cannot afford Anduril's premium systems."
      type: observed
      topic: chinese-competitor-threat
      sourceRefs: [SP018, SP016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP011]

    - id: CP011
      statement: "L3Harris Technologies ($20B+ revenue) is Anduril's most direct large-company competitor in the sensor and ISR layer: L3Harris builds the VAMPIRE counter-UAS system, the MPQ-64 Sentinel radar (used for drone detection), and the Integrated Weapon System (IWS) for counter-UAS. These products compete directly with Anduril's Sentry Tower and Menace products. L3Harris's competitive advantage is scale, established supply chains, and DoD program office relationships; Anduril's advantage is AI/software integration and faster development cycles."
      type: observed
      topic: l3harris-competitor
      sourceRefs: [SP010, SP023]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP005]

    - id: CP012
      statement: "Anduril's moat durability is strengthened by regulatory posture: the company is fully compliant with ITAR (International Traffic in Arms Regulations) and operates as a registered defense contractor under the US DCSA (Defense Counterintelligence and Security Agency) framework. This compliance infrastructure creates a barrier for new entrants: a VC-funded startup cannot simply build a drone and sell to DoD; it requires 1-2 years to establish the security clearance, ITAR registration, and federal acquisition eligibility that Anduril has spent 7 years building."
      type: observed
      topic: regulatory-moat
      sourceRefs: [SP012, SP011]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP007]

    - id: CP013
      statement: "Displacement risk for Anduril's competitive position comes from three directions: (1) a legacy prime could acquire Anduril (removing it as independent competitor), (2) Lattice OS could be disrupted by a Microsoft/Palantir joint offering combining Azure GovCloud with Palantir's C2 software stack, or (3) the DoD could create an internal autonomous systems program office that internalizes Lattice-like capability (analogous to how DoD's JAIC/CDAO emerged as internal AI capability). None of these displacement scenarios is near-term likely, but all represent 5-10 year strategic risks."
      type: inferred
      topic: displacement-risk
      sourceRefs: [SP009, SP008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP012]

    - id: CP014
      statement: "General Atomics (private, manufacturer of Predator/Reaper drones) is a structural competitor to Anduril's Ghost drone and Roadrunner: GA has manufactured 500+ Predator/Reaper aircraft for US DoD and 25+ allied nations, building one of the deepest autonomous aircraft production and maintenance ecosystems in the defense industry. GA's competitive weakness is its high per-unit cost and limited AI software integration; its strength is the proven operational track record that Anduril's newer systems have yet to match at scale."
      type: observed
      topic: general-atomics-competitor
      sourceRefs: [SP009, SP021]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP015
      statement: "Anduril's competitive position in the counter-UAS market is challenged by multiple established players: L3Harris (VAMPIRE), Dedrone (RF detection, acquired by Axon), Fortem Technologies (DroneHunter), SRC Inc. (Gryphon UAS system), and CACI International (counter-UAS suite). The market is more fragmented than Anduril's UAS and software segments; no single competitor holds >20% share, and Anduril's Menace + Roadrunner system differentiates through kinetic intercept capability (drones destroyed by Roadrunner) rather than jamming/spoofing (which does not destroy the threat)."
      type: observed
      topic: counter-uas-competitive
      sourceRefs: [SP010, SP023]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP001, QP005]

    - id: CP016
      statement: "The competitive risk from employee poaching is material for Anduril: with $3B+ in funding, Anduril has attracted 4,500+ of the best defense-capable engineers from Google, SpaceX, and Palantir. The same hiring market applies inversely — Google DeepMind, OpenAI, and non-defense tech companies continuously poach Anduril's talent. The equity-dependent retention model means that any significant Anduril valuation decline would trigger talent loss to competitors with active equity packages."
      type: inferred
      topic: talent-competition
      sourceRefs: [SP015, SP017]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP013]

    - id: CP017
      statement: "Anduril's competitive advantage relative to Palantir in defense is hardware integration: Palantir cannot manufacture or operate the physical autonomous systems that deliver the battlefield effects customers want. Anduril's advantage relative to Kratos/General Atomics in hardware is software intelligence: Kratos drones do not have Lattice OS-equivalent C2 and AI integration. This positioning in the 'full-stack gap' between pure software and pure hardware competitors is Anduril's most durable strategic position."
      type: inferred
      topic: full-stack-positioning
      sourceRefs: [SP001, SP003, SP011]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP006, QP007]

    - id: CP018
      statement: "Anduril has won competitive head-to-head procurements against legacy primes for the CBP Sentry Tower (initially competed vs. Boeing and Elbit), SOCOM Ghost drone deployments (against multiple UAV vendors), and selected Replicator drone program applications. These competitive wins validate Anduril's ability to defeat established primes in open competition — a capability rare among defense tech startups that typically serve as subcontractors rather than prime contractors."
      type: observed
      topic: competitive-wins
      sourceRefs: [SP021, SP022]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP014]

    - id: CP019
      statement: "The 'five-eyes plus NATO' regulatory environment creates a significant distribution moat for Anduril: ITAR compliance limits Chinese and Russian competitors from these markets entirely; European competitors (MBDA, Airbus Defence) face a political preference for US-origin defense technology in the context of NATO's US-oriented procurement. This regulatory protection of Anduril's home and allied markets provides a durable barrier that non-US competitors cannot readily overcome."
      type: observed
      topic: regulatory-distribution-moat
      sourceRefs: [SP016, SP012]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP007, QP010]

    - id: CP020
      statement: "The multi-homing risk for Anduril's DoD customers is low for established programs but moderate for new program starts: once a DoD program office integrates Lattice OS and standardizes on Ghost drone operations, switching costs are 2-4 years of retraining and re-procurement. However, for new program starts (new command areas, new mission requirements), DoD program offices are not locked in to Anduril and will run OTA competitions. Anduril must continuously win new programs to sustain growth, not just retain existing ones."
      type: inferred
      topic: multi-homing-risk
      sourceRefs: [SP021, SP022]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP015]

    - id: CP021
      statement: "Adversarial competitive intelligence from HRW, Stop Killer Robots, and the CCW discussions reveals that LAWS prohibition advocacy is growing among allied nations: Belgium, Spain, and several non-NATO nations have called for binding LAWS restrictions at the UN. If allied-nation opposition to LAWS grows, some of Anduril's Five Eyes market opportunities could be constrained by domestic political pressure in partner nations even without a binding treaty, creating a 'soft' market restriction on Anduril's export ambitions."
      type: third-party-reported
      topic: adverse-competitive-regulation
      sourceRefs: [SP014, SP016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP016]

    - id: CP022
      statement: "Anduril's competitive position relative to the emerging IVAS (Integrated Visual Augmentation System) AR goggles program — where Microsoft was the prime contractor ($21B IVAS contract with the Army, eventually restructured) — illustrates both opportunity and risk: Anduril's Lattice OS could integrate with IVAS as the shared C2 layer, creating a Microsoft/Anduril partnership rather than competition. The IVAS program's struggles (cost overruns, soldier discomfort reports) create an opportunity for Anduril to propose Lattice-integrated alternatives."
      type: inferred
      topic: ivas-opportunity
      sourceRefs: [SP015, SP011]
      confidence: low
      freshness: current
      answersQuestionRefs: [QP008]

    - id: CP023
      statement: "Anduril's ability to command premium pricing relative to Kratos and General Atomics (on hardware) and relative to Palantir (on software) depends on maintaining its current AI/autonomy technology lead. If Palantir adds hardware integration capability or if Kratos adds AI autonomy software to its drones, Anduril's full-stack premium could compress. The 2-3 year technology lead Anduril currently holds is not permanent — it requires continuous R&D investment to sustain, which is partially why the $1.5B Series F was needed despite existing revenue."
      type: inferred
      topic: technology-lead-sustainability
      sourceRefs: [SP008, SP009]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP012]

    - id: CP024
      statement: "Supply chain competitive advantage: Anduril's vertical integration (designing and manufacturing its own hardware in US facilities) provides supply chain control that pure software competitors lack and that legacy primes with complex global supply chains struggle to maintain. The US political preference for domestically manufactured defense systems (Buy American provisions, NDAA domestic manufacturing requirements) benefits Anduril's US-manufactured products versus foreign-sourced competitors."
