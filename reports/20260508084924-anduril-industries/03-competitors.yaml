sections:
  - id: SP-S1
    title: Competitive Landscape Overview
    body: |
      Anduril's competitive landscape is uniquely bifurcated: it simultaneously competes against the world's
      largest defense companies (Lockheed Martin, Northrop Grumman, Boeing, RTX, General Dynamics, L3Harris
      — all $20-60B+ annual revenue) and a new wave of VC-backed defense tech startups (Palantir,
      Shield AI, Kratos Defense). This dual-sided competition is unprecedented for a defense company at
      Anduril's stage — most defense startups either displace legacy primes directly (rare, given the
      former's DoD relationships) or partner with them as subcontractors (common, but margins are weak).

      Anduril's strategic position avoids direct head-to-head competition with legacy primes in their
      core programs (F-35, aircraft carriers, strategic bombers) while competing aggressively in the new
      program categories where primes have failed to develop competitive products: autonomous attritable
      drones (Ghost, Roadrunner vs. nothing credible from primes), AI C2 software (Lattice vs. outsourced
      Microsoft/Palantir solutions), and counter-UAS kinetic intercept (Menace+Roadrunner vs. jamming-only
      systems from L3Harris, Dedrone).

      The competitive dynamic is evolving: legacy primes are responding through acquisitions (L3Harris
      acquiring sensor companies, Boeing investing in Loyal Wingman/MQ-28 in Australia) but have not yet
      fielded a product that displaces any Anduril system in a DoD program competition. Among defense tech
      startups, Palantir is the only one with comparable government relationships and revenue scale to
      Anduril — but Palantir cannot manufacture physical autonomous systems, the capability that ultimately
      delivers battlefield effect for Anduril's customers.
    claimRefs: [CP001, CP003, CP004, CP006, CP007, CP011, CP017]

  - id: SP-S2
    title: Competitor Profiles and Capability Gaps
    body: |
      The five most significant competitive threats to Anduril's market position, ranked by near-term risk:

      Palantir (highest risk for Lattice OS): Government ARR of ~$1.5B (2024), deep classified program
      relationships, AIP platform targeting same AI decision-support use cases as Lattice OS. Risk mitigated
      by Palantir's inability to manufacture hardware — the DoD increasingly wants integrated hardware+software
      systems, not standalone analytics.

      L3Harris (highest risk for Sentry Tower and Menace): $20B+ revenue, established counter-UAS product
      line (VAMPIRE, MPQ-64 radar), deep DoD relationships in the sensor and signals domain. Risk mitigated
      by L3Harris's slower development cycles and weaker AI integration relative to Anduril.

      Kratos Defense (risk for Roadrunner): Publicly traded attritable drone competitor with XQ-58A Valkyrie
      and UTAP-22 Mako programs. Kratos has proven DoD prime relationships and can manufacture at scale.
      Risk mitigated by lack of Lattice OS-equivalent software integration.

      Boeing (risk for Dive-LD): Boeing's Orca XLUUV program directly competes for the large-displacement
      UUV market. Boeing's scale and Navy relationships are formidable. Risk mitigated by Boeing's software
      weakness and MQ-25 delivery schedule struggles.

      Shield AI (limited near-term risk): Software-only pilot AI competes for autonomous vehicle AI stack
      contracts but cannot deliver the integrated hardware+AI systems that Anduril offers. Most likely
      to be a partner than a competitor for specific DoD programs.
    claimRefs: [CP002, CP005, CP008, CP011, CP014, CP015, CP018, CP024]

  - id: SP-S3
    title: Moat Durability and Competitive Risk Assessment
    body: |
      Anduril's competitive moat is multi-layered and above-average durability for its stage, but not
      permanent. The moat rests on: Lattice OS switching costs (2-4 year retraining cycles), data flywheel
      effects (cross-product sensor data improving AI models), regulatory compliance infrastructure (ITAR,
      DCSA clearances — 1-2 years for new entrants to replicate), and founder political capital (Luckey,
      Thiel connections create soft barriers in early program competitions).

      The primary moat risks are: (1) Palantir expanding into hardware through strategic acquisitions,
      (2) a legacy prime acquiring Anduril and losing its startup agility, (3) the DoD internally building
      Lattice-equivalent capability through CDAO (Chief Digital and AI Office) investments, and (4) talent
      attrition if Anduril's equity value disappoints relative to BigTech packages.

      The regulatory moat (ITAR compliance, DCSA clearances, OTA contracting relationships) is particularly
      durable: no foreign competitor can sell ITAR-controlled systems to US DoD, and no new US startup can
      replicate Anduril's 7-year relationship-building with DoD program offices. This regulatory protection
      layer provides 5-10 years of defensible market positioning even if technology leads are eroded.

      The competitive evidence available overwhelmingly comes from Anduril's own newsroom and friendly press.
      Adverse evidence — programs lost, customer complaints, technology failures — is not available from
      public sources, creating a positive selection bias in this assessment.
    claimRefs: [CP006, CP007, CP009, CP010, CP012, CP013, CP016, CP019, CP020, CP021, CP025]

