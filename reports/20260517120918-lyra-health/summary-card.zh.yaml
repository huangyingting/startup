summary:
  headline: Lyra Health 是雇主心理健康福利赛道龙头，覆盖 20M+ 人群、品牌认知强；但上一轮 $5.58B 估值需要 20-30x ARR 倍数支撑，而当前市场环境和竞争格局让这个倍数很难守住。
