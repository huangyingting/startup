    - type: no-public-evidence
      severity: critical
      topic: "Revenue, gross margin, burn rate, and cash position not publicly disclosed"
      missingEvidence: >-
        Lyra has not filed an S-1 or disclosed audited financials. No public revenue, gross margin, burn, or
