    - type: no-public-evidence
      severity: major
      topic: "Competitor ROI comparison — Lyra vs. EAP and other digital mental health PEPY providers"
      missingEvidence: >-
        No publicly available head-to-head ROI comparison between Lyra and EAP providers (Beacon Health,
        Spring Health, Modern Health) has been independently verified. Lyra's own outcome metrics are
        company-published and not benchmarked against competitors in a third-party study.
      whyItMatters: >-
        Without competitor ROI data, the premium PEPY pricing rationale cannot be fully assessed. If competing
        products offer comparable clinical outcomes at lower cost, Lyra's renewal and expansion case may be weaker
        than company materials suggest.
      diligencePath: >-
        Request independent third-party outcome comparison study or RFP evaluation data from existing enterprise
        customers comparing Lyra to evaluated alternatives.
