callouts:
  - calloutType: insight
    title: PEPY model provides durable, ratable revenue with strong employer ROI
    body: >-
      Lyra's employer subscription model, combined with peer-reviewed clinical outcomes (26% healthcare cost reduction,
      2x faster recovery, $4,806 in annual productivity gains per employee), creates a compelling renewal and expansion
      argument. The model avoids the utilization volatility of traditional EAPs and generates measurable ROI that HR
      leaders can present internally.
    claimRefs:
      - CI001
      - CI010
      - CI014
      - CI015
      - CI017
  - calloutType: risk
    title: All key financial metrics are privately held; margin path requires management data
    body: >-
      Revenue, gross margin, burn rate, cash on hand, CAC, payback, and NRR are all undisclosed. The digital health
      valuation correction of 2022–2024 means the $5.58B Series F valuation cannot be assumed as a current floor.
      No new public raise since January 2022 creates runway ambiguity.
    claimRefs:
      - CI033
      - CI034
      - CI035
      - CI045
      - CI046
      - CI047
  - calloutType: recommendation
    title: Require management-provided financials before completing financial diligence
    body: >-
      Public evidence confirms the revenue model, product scale, and capital history, but cannot close the margin,
      burn, runway, or NRR analysis. Request three years of audited financials, current ARR with retention cohorts,
      and an operating expense waterfall before finalizing the financial verdict.
    claimRefs:
      - CI033
      - CI034
      - CI035
      - CI046
