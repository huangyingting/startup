  - id: section-5
    title: 'Capital adequacy and financing history: $851M raised, runway unconfirmed'
    body: >-
      SEC Form D filings independently confirm Lyra's capital raise history, which totals approximately $851M across
      six documented rounds. The most recent and largest was the Series F filed January 2022: SEC Form D
      (acc-no. 0001733914-22-000001) reports total amount sold of $234,999,956 with 4 investors and the date of first
      sale as January 7, 2022. Prior filings recorded: $199,999,931 (Series E, June 2021, 28 investors), $186.7M
      (Series D extension, January 2021, 33 investors), $110M (Series D, August 2020, 23 investors), $75M (Series C,
      March 2020, 19 investors), and $45M (Series B, June 2018, 19 investors). See the Company Overview chapter for
      the full round-by-round chronology; this chapter mints local claims for each confirmed SEC filing amount to
      support capital adequacy analysis.


      The Series F at $5.58B valuation (January 2022) positions Lyra among the most valuable private mental health
      companies globally. With approximately $235M raised in the Series F, and assuming a burn rate in the $80–120M
      annual range needed to staff a clinical network at Lyra's scale, the post-Series F runway would nominally extend
      through 2024–2026 without additional external capital—but this depends heavily on actual revenue, clinical
      delivery costs, and S&M investment levels, none of which are public.


      Investor composition signals sophistication and stage: Dragoneer led the Series F and was joined by Coatue,
      Fidelity, BlackRock, and others. These are growth and crossover investors who typically underwrite based on
      revenue scale and retention, not pure clinical outcomes. The 2022 investor mix—4 total per SEC Form D—suggests a
      focused institutional round rather than a broad syndication. No debt, project finance, or public capital market
      activity is observable in public filings. Lyra has not announced any down round or distressed financing, but the
      absence of a new public raise since January 2022 (over three years as of the run date) raises the question of
      whether the company is approaching profitability, preparing for a liquidity event, or operating on extended
      runway from the Series F.
