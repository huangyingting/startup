callouts:
  - calloutType: strength
    title: "Clinical Evidence Depth Is Lyra's Most Defensible Moat"
    body: >-
      Lyra's published peer-reviewed outcomes data—26% reduction in overall health care claims
      costs, 81% of members maintaining gains at 12-month follow-up, and a JAMA Open publication
      backing its AI matching methodology—constitute a compounding moat. Competitor claims of
      outcomes improvement typically lack equivalent longitudinal rigor, independent audit, or
      peer-reviewed publication, giving Lyra a credibility advantage in sophisticated enterprise
      procurement. Spring Health is the only direct competitor with comparable JAMA-level
      evidence, narrowing the duopoly at the clinical-evidence tier.
    claimRefs:
      - CP016
      - CP017
      - CP018
      - CP035

  - calloutType: risk
    title: "PEPM Pricing Commoditization and Insurer Bundling Are the Highest-Severity Risks"
    body: >-
      Two forces threaten Lyra's revenue model. First, insurer-bundled EAP alternatives (Optum,
      Cigna/Evernorth) can offer behavioral health services near zero incremental cost for
      employers already on those health plans, making Lyra's $4–10 PEPM premium difficult to
      justify to cost-constrained HR buyers. Second, digital-native challengers (Spring Health,
      Modern Health) are rapidly converging on Lyra's feature set, reducing the feature-gap
      justification for any price premium. The 2025–2026 corporate cost-cutting environment
      may accelerate procurement pressure on PEPM-based mental health benefits.
    claimRefs:
      - CP038
      - CP039
      - CP040
      - CP042
      - CP043

  - calloutType: insight
    title: "Spring Health's Scale Convergence Is the Critical Competitive Signal"
    body: >-
      Spring Health's $3.3B valuation (January 2023), 20M+ covered lives, JAMA-published
      outcomes, and same-day appointment guarantee indicate it is tracking toward Lyra's
      competitive position in clinical credibility. The remaining differentiation points
      for Lyra—family and youth coverage depth, acute-care in-house management, and
      the 26% claims cost reduction metric—need to be maintained and expanded to preserve
      pricing and retention advantages in enterprise renewals where Spring Health is
      increasingly the challenger.
    claimRefs:
      - CP001
      - CP005
      - CP006
      - CP016

