  evidenceGaps:
    - type: missing-source
      severity: minor
      topic: spring-health-series-d-valuation
      missingEvidence: >-
        TechCrunch and Bloomberg articles confirming Spring Health's January 2023 $190M Series D
        at $3.3B valuation returned 404 errors during this research cycle. The valuation figure
        is widely cited in industry sources but could not be independently verified via primary
        press release retrieval.
      whyItMatters: >-
        Spring Health's valuation benchmark is central to the competitive positioning analysis;
        an outdated or inflated valuation would affect the competitive gravity assessment.
      diligencePath: >-
        Request Spring Health investor relations materials or verify via Pitchbook/Crunchbase
        data; check for any subsequent funding rounds or down-round activity in 2024–2025.
      relatedQuestionRefs: [QP001]

    - type: missing-source
      severity: minor
      topic: gartner-g2-lyra-competitor-reviews
      missingEvidence: >-
        Gartner Peer Insights and G2 vendor pages returned limited content in this
        research cycle due to JavaScript-rendering requirements. Structured buyer
        satisfaction ratings and head-to-head comparison data for Lyra vs. Spring Health
        vs. Modern Health were not retrievable via static fetch.
      whyItMatters: >-
        Buyer sentiment and third-party review data (QP019) are important corroborating
        evidence for Lyra's clinical-outcomes differentiation claims.
      diligencePath: >-
        Access Gartner Peer Insights with authenticated access; request G2 enterprise
        category data for Lyra Health; conduct third-party employer reference checks.
      relatedQuestionRefs: [QP019]

    - type: missing-source
      severity: minor
      topic: global-wellness-institute-roi-uncertainty
      missingEvidence: >-
        The Global Wellness Institute's 2025–2026 employer wellness ROI reports were
        not fully accessible via static fetch in this research cycle. Quantitative data
        on employer wellness benefit ROI uncertainty (QP024) was not retrieved.
      whyItMatters: >-
        Evidence of employer wellness ROI skepticism would strengthen the risk assessment
        for Lyra's PEPM pricing premium in cost-cutting environments.
      diligencePath: >-
        Access Global Wellness Institute paid research reports; review Mercer/WTW employer
        wellness ROI meta-analyses published in 2024–2026.
      relatedQuestionRefs: [QP024]

    - type: missing-source
      severity: minor
      topic: digital-mental-health-commoditization-evidence
      missingEvidence: >-
        Quantitative evidence on PEPM pricing trends and commoditization dynamics in
        the digital employer mental health benefits market (QP027) was not available
        from publicly accessible primary sources during this research cycle.
      whyItMatters: >-
        Direct pricing benchmark data would enable a more precise assessment of the
        commoditization risk to Lyra's PEPM premium model.
      diligencePath: >-
        Request Lyra win/loss analysis by competitor; obtain industry pricing benchmarks
        from Mercer, Willis Towers Watson, or Sutter Health employer benefits surveys.
      relatedQuestionRefs: [QP027]

    - type: missing-source
      severity: minor
      topic: employer-eap-to-digital-switch-reasons
      missingEvidence: >-
        Primary data on employer-reported reasons for switching from legacy EAP to
        digital-native mental health benefits platforms (QP029) was not available from
        publicly accessible sources during this research cycle. Vendor testimonials
        provide partial evidence but are not independent.
      whyItMatters: >-
        Understanding the primary purchase and switch drivers informs how Lyra should
        position its differentiation narrative relative to Spring Health and Modern Health.
      diligencePath: >-
        Request Lyra's customer success data on onboarding drivers; review Mercer and
        KFF employer surveys for mental health benefit investment rationale.
      relatedQuestionRefs: [QP029]

    - type: missing-source
      severity: minor
      topic: incumbent-eap-market-share
      missingEvidence: >-
        Granular market share data for Optum, Magellan, and Beacon by employer segment or
        lives under management was not available from publicly accessible sources during this
        research cycle.
      whyItMatters: >-
        Without accurate incumbent market share data, the competitive risk from inertia and
        bundling cannot be precisely quantified.
      diligencePath: >-
        Request managed behavioral health market reports from Milliman, IBIS World, or IBD;
        ask for Optum/Magellan/Beacon contract counts in data room during diligence.
