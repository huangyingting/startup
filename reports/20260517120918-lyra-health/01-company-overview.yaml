company:
  name: Lyra Health
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Lyra Health, Inc. is a Burlingame, California-based employer mental health and wellbeing platform founded in 2015
    by David Ebersman (former Facebook/Meta CFO). The company operates a B2B SaaS model charging per-employee-per-year
    fees to large enterprise employers and reported serving 20 million or more covered lives globally as of 2026. Lyra
    has raised approximately $910 million across six or more financing rounds — most recently a $235 million Series F
    at a $5.58 billion post-money valuation in January 2022 led by Dragoneer Investment Group — making it one of the
    most well-capitalized private behavioral health companies. SEC Form D filings confirm incremental rounds totaling
    $851.7 million across six closings from early 2018 through early 2022, with total raised estimated at approximately
    $910 million when early seed and Series A rounds are included. Lyra's network exceeds 30,000 providers globally,
    and outcomes data from the company shows 9 in 10 members improving and recovery at twice the rate of traditional
    care. Privacy and employer-data-access concerns apply broadly to employer-sponsored behavioral health platforms and
    represent a material diligence topic for every downstream chapter.
sections:
  - id: identity-and-business-model
    title: Identity, headquarters, and business model
    body: >
      Lyra Health, Inc. is a mental health and wellbeing technology platform incorporated in Delaware and headquartered
      in Burlingame, California. Its principal mailing address on file with the SEC is 287 Lorton Avenue, Burlingame,
      CA 94010, though the company's HIPAA privacy notice lists a clinical operations address at 270 E. Lane,
      Burlingame, CA 94010 for its clinical subsidiary, Lyra Clinical Associates P.C. (LCA). The company has operated
      from Burlingame continuously since its 2015 founding based on all available public filings.


      Lyra's core product is an employer-sponsored mental health benefits platform that connects employees to
      therapists, coaches, and psychiatrists through a curated, outcomes-focused provider network. The company
      additionally offers digital therapeutic programs, self-paced wellness tools, and an HR analytics dashboard
      that gives employers aggregated population health insights. The business model is per-employee-per-year
      (PEPY) SaaS, sold directly to large enterprise employers who replace their legacy Employee Assistance Program
      (EAP) with Lyra's comprehensive solution.


      The company's full-service offering spans: preventive support (self-paced resources and evidence-based
      coaching), clinical care (therapy and medication management), in-house specialty services addressing acute and
      complex mental health needs through its Centers of Excellence, family support for children, teens, couples and
      families including 6,500-plus children's mental health specialists, and coordinated medical-behavioral care for
      health system partners. As of 2026, Lyra serves both employers as its primary revenue channel and health plan
      and health system partners. The Lyra website describes the company as serving more than 20 million people
      globally through direct employer contracts, with pathways for more than 200 million people through partners
      and plans.


      Lyra Clinical Associates P.C. is the independently owned professional practice entity through which licensed
      clinicians deliver clinical care. Lyra Health, Inc. provides administrative, technology, and related services
      to LCA; it does not itself provide mental health, medical, or other healthcare provider services. This
      structure is material for liability analysis and HIPAA compliance. The company is a HIPAA covered entity and
      holds HITRUST CSF certification, which is a meaningful compliance signal in enterprise behavioral health sales.
