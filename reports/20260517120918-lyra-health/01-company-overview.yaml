callouts:
  - calloutType: strength
    title: SEC Form D filing trail provides unusually strong capital history
    body: >-
      Lyra's six SEC Form D filings from 2018 to 2022 give primary-source confirmation of closing amounts,
      dates, investor counts, and company legal details that are often unavailable for private companies.
      This makes the financing history more reliably documented than most comparably-sized private health tech
      companies.
    claimRefs:
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
      - CO024
  - calloutType: risk
    title: Key-person concentration in founder-CEO David Ebersman
    body: >-
      Ebersman is the sole named Executive Officer across all available SEC filings, the public face of the
      company's vision, and the primary capital-raising contact. No public announcement of a president, COO,
      or succession plan has been identified in available sources. Any leadership disruption would create
      material uncertainty for investors, enterprise customers, and the provider network.
    claimRefs:
      - CO011
      - CO012
      - CO018
  - calloutType: risk
    title: Employer-sponsored mental health raises structural privacy concerns
    body: >-
      Mental health data is among the most sensitive personal information. Privacy advocates, academic
      researchers, and media outlets have scrutinized whether employer-sponsored mental health platforms
      allow employers to infer behavioral health risks from usage patterns even when individual records are
      nominally protected. Lyra's HIPAA notice prohibits individual PHI disclosure to employers, but the
      structural tension between the employer-payer relationship and employee-beneficiary privacy remains
      a live reputational and regulatory risk.
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO044
      - CO045
  - calloutType: insight
    title: $5.58B valuation is a 2022 peak-market data point
    body: >-
      Lyra's Series F at $5.58B closed in January 2022, at the height of private mental health platform
      valuations. Public comparables (e.g., Cerebral, Spring Health, Modern Health) have experienced
      significant valuation resets since 2022. Lyra's current implied enterprise value relative to
      estimated $200M ARR cannot be confirmed from available sources and should be evaluated against the
      post-2022 repricing environment for mental health unicorns.
    claimRefs:
      - CO024
      - CO025
      - CO034
  - calloutType: assumption
    title: Revenue and headcount estimates are unverified
    body: >-
      The $200M ARR and 1,100–1,200 headcount figures used in this chapter are estimates from background
      research and have not been confirmed in any public filing, company announcement, or third-party
      data source captured in this run. These numbers should be treated as order-of-magnitude references
      only.
    claimRefs:
      - CO034
      - CO035
