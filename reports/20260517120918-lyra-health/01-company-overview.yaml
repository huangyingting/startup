  - id: founding-team-and-leadership
    title: Founders, leadership, and governance
    body: >
      David Ebersman is the founder and CEO of Lyra Health. Before founding Lyra, Ebersman served as Chief Financial
      Officer of Facebook (now Meta) from 2009 to 2014, where he oversaw the company's 2012 initial public offering.
      The company background describes him as a "former Facebook CFO/CCO." His decision to apply technology and
      data to behavioral health access was motivated by observed mental health challenges among technology employees,
      and his operator experience at a large consumer technology company directly informs Lyra's enterprise SaaS
      design. Ebersman is listed as Executive Officer and Director on all SEC Form D filings from 2018 through 2022
      and signed the 2020 and 2021 filings as CEO.


      The Lyra Health board of directors, as disclosed in the January 2022 SEC Form D filing, includes David
      Ebersman (CEO and Director), Bryan Roberts, Bob Kocher, James Slavet, Somesh Dash, Kerry Chandler, Elaine
      Yang, Danielle Gray, Robynne Sisco, and Hubert Lin. Board composition has expanded materially across rounds:
      the 2018 filing listed only Ebersman, Roberts, Kocher, Slavet, and Yang, while the 2022 filing added Dash,
      Chandler, Gray, Sisco, and Lin. Kerry Chandler and Danielle Gray first appeared in the 2021 filings, suggesting
      board additions associated with the Series E and Series F processes. Lisa Caccavo is identified in the 2022
      filing as General Counsel and Assistant Secretary, the authorized signatory for that Form D.


      Key-person dependence is meaningful. Ebersman's dual role as founder-CEO and the sole named Executive Officer
      in SEC filings, combined with his public identification as the company's vision-setter, creates single-leader
      concentration risk. The company has not publicly disclosed a president, COO, or named successor plan in
      available sources. Board diversity has improved across the funding history, with Chandler and Gray joining
      later in the company's development, but governance depth outside the CEO role remains a diligence gap.
