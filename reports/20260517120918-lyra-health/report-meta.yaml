companyProfile:
  summary: >-
    Lyra Health, Inc. is a Burlingame, California-based mental health and wellbeing
    platform founded in 2015 by David Ebersman, former CFO of Facebook. The company
    sells a per-employee-per-year (PEPY) subscription to large enterprise employers,
    providing their workforces access to a curated network of 4,000+ therapists, coaches,
    and psychiatrists matched by an AI/ML engine to the right care type. Lyra's platform
    includes digital programs (evidence-based CBT, mindfulness, sleep), a member mobile
    app, and an employer analytics dashboard. As of 2023, Lyra covers over 20 million
    lives at 700+ enterprise customers including Morgan Stanley, Uber, Starbucks, and
    Zoom. The company raised a $235M Series F in January 2022 at a $5.58B valuation,
    bringing total capital raised to approximately $910M. Revenue is estimated at $200M+
    ARR (not publicly disclosed). Lyra differentiates on clinical outcomes measurement,
    evidence-based care, and therapist network quality, but faces intensifying competition
    from Spring Health, Modern Health, and insurer-bundled EAP alternatives.
  foundedDate: "2015-01-01"
  founders:
    - name: "David Ebersman"
      role: "Co-Founder & CEO"
      background: >-
        Former CFO of Facebook (2009–2014) and prior CFO of Genentech; brings deep
        healthcare and technology finance experience to the company.
      claimRefs: [CO012]
  foundingLocation: "Burlingame, CA"
  headquarters: "Burlingame, CA"
  productSummary: >-
    Employer mental health benefits platform offering therapist/coach/psychiatrist
    matching, digital therapeutic programs, psychiatric medication management, and
    employer analytics via a PEPY SaaS subscription.
  customerFocus: >-
    Large enterprise employers (1,000–100,000+ employees), primarily in the US, across
    technology, finance, retail, and healthcare verticals. HR/Benefits leaders are the
    primary buyers.
  businessModel: >-
    Per-employee-per-year (PEPY) SaaS subscription charged to employer; typical range
    $200–$400 PEPY for covered employee population. Revenue mix primarily subscription
    with utilization-linked components.
  stage: "Series F"
  fundingStatus: >-
    Series F: $235M at $5.58B valuation (January 2022), led by Dragoneer Investment
    Group. Total raised: approximately $910M across six confirmed SEC Form D rounds.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO006, CO024, CO025, CO030]

summary:
  headline: >-
    Lyra Health is the category leader in employer mental health benefits with 20M+
    covered lives and strong brand recognition, but its $5.58B last-round valuation
    requires 20-30x ARR multiple justification that current market conditions and
    competitive dynamics make difficult to sustain.
