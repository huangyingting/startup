  rows:
  - - HIPAA Privacy and Security Rule - mental health PHI handling, cloud safeguards, BAA compliance
    - USA (Federal)
    - Active - BAAs with employer customers required; cloud HIPAA compliance obligations ongoing
    - Medium
    - High
    - HIPAA BAA executed with each employer customer; encryption at rest/transit; access controls; audit
      logging; minimum-necessary access; incident response plan
    - OCR enforcement action if PHI breach occurs; class-action liability if mental health records exposed;
      mental health data sensitivity amplifies reputational damage beyond typical HIPAA breach
    - Verify BAA template scope with legal; confirm cloud infrastructure HIPAA certification; review PHI
      data flow mapping; confirm therapist access controls; test incident response plan currency
  - - Mental Health Parity NQTL Final Rule (88 FR 78707, Nov 2023) - employer comparative analysis obligations
    - USA (Federal - DOL / HHS / Treasury)
    - Active - Final Rule effective February 2024; employer clients must document NQTL comparative analyses
    - Medium
    - High
    - Lyra Health's benefit design (unlimited sessions, broad network, access standards) supports employer
      MHPAEA compliance; DOL guidance alignment maintained
    - Employer clients face ERISA enforcement if Lyra's benefit design inadvertently creates NQTL violations;
      regulatory changes could require Lyra to modify session structures or network standards
    - Audit Lyra's session design against NQTL comparative analysis requirements; confirm employer contract
      language assigns compliance responsibility; verify DOL enforcement guidance alignment
  - - FTC Health Breach Notification Rule - unauthorized disclosure of mental health data
    - USA (Federal - FTC)
    - Active - FTC expanded HBNR scope in 2021; BetterHelp $7.8M settlement June 2023 establishes precedent
    - Medium
    - High
    - Data handling policy; consent infrastructure; no confirmed third-party advertising SDK use; BetterHelp
      enforcement precedent as deterrent and compliance benchmark
    - FTC enforcement action if mental health data sharing with advertisers or analytics platforms without
      consent; $7.8M BetterHelp precedent sets baseline settlement scale
    - Conduct data-flow audit for all third-party SDKs and pixels; verify no Meta Pixel or Google Ads SDKs
      present; confirm FTC HBNR compliance posture; review consent documentation
  - - California CMIA - Confidentiality of Medical Information Act
    - California, USA
    - Active - Lyra HQ in San Francisco; California employer customers are primary segment
    - Low-Medium
    - Medium
    - Compliance program for California operations; HIPAA compliance provides baseline; CMIA-specific legal
      review required
    - Statutory damages of $1,000 per violation plus actual damages and attorney fees; class-action risk
      amplified by California consumer protection framework
    - Obtain CMIA compliance memo from legal; confirm privacy policy covers CMIA requirements; audit all
      mental health data disclosures against CMIA stricter-than-HIPAA standards
  - - 50-state telehealth licensure - therapist contractor license compliance in member states
    - USA (All 50 states + DC)
    - Active - distinct licensing boards per state; interstate compact (PSYPACT) covers psychology only
    - Medium
    - Medium
    - Licensure verification and monitoring for contractor therapists; PSYPACT reduces psychology burden;
      LCSW and LPC multi-state licensure remains fragmented
    - Unlicensed practice claims if therapist provides services in state where unlicensed; member
      relocation creates real-time compliance monitoring requirement
    - Request therapist credentialing database and license monitoring vendor contract; verify PSYPACT
      participation; confirm process for member state-change events
  - - BetterHelp FTC enforcement precedent - mental health data sharing class-action risk
    - USA (Federal)
    - Precedent established - $7.8M FTC settlement June 2023; plaintiffs bar active in digital health
    - Low-Medium
    - Medium
    - Lyra's enterprise B2B model differs from BetterHelp DTC model reducing direct applicability;
      no confirmed advertising SDK use
    - Plaintiffs bar may pursue Lyra under same theory if health data sharing with advertisers documented;
      state AG investigations possible even for B2B model
    - Confirm zero advertising SDK use in platform; obtain legal analysis distinguishing Lyra from
      BetterHelp DTC model; review employer SSO and consent framework
  notes: >-
    Likelihood and severity are qualitative assessments based on FTC enforcement records, DOL/HHS rulemaking,
    and industry precedent as of May 2026. No material legal proceedings are publicly disclosed against Lyra
    Health. HIPAA and MHPAEA represent the highest-severity active obligations. The FTC Health Breach
    Notification Rule and California CMIA are active enforcement risks amplified by the BetterHelp settlement.
    50-state telehealth licensure is operationally material but manageable with appropriate compliance
    infrastructure.
