- id: mitigations-and-kill-criteria
  title: Mitigations, Monitoring, and Kill Criteria
  body: >-
    Lyra Health's primary risk mitigations include HIPAA BAA compliance infrastructure with employer
    customers, state licensure monitoring programs for contracted therapists, outcomes measurement
    frameworks using PHQ-9 and GAD-7, evidence-based therapy protocols (CBT, DBT, MBSR), and executive-
    level employer relationship management. The company's clinical model - combining AI-based matching,
    measurement-based care, and a curated therapist network - provides product differentiation relative
    to commodity EAP alternatives, creating stickiness with HR and benefits leaders who have invested
    in implementation.

    Three thesis-break triggers requiring investment re-evaluation: (1) a material HIPAA enforcement
    action, FTC settlement, or class-action data breach settlement of $50M or greater, indicating a
    systemic data practice failure analogous to BetterHelp; (2) evidence of systematic therapist quality
    or access failure visible in employer-reported NPS below 50 or annual employer customer churn
    exceeding 15%; (3) a confirmed down-round financing at more than 40% below the 2022 $5.58B
    valuation, indicating structural business model impairment or investor confidence loss.

    Key monitoring indicators on a quarterly basis: FTC enforcement docket for mental health app actions;
    DOL/state MHPAEA audit activity against Lyra employer clients; therapist contractor network wait-time
    transparency; employer customer renewal rate and net new logo count; capital raise announcements or
    extended fundraising absence as a proxy for runway; and Spring Health/Modern Health competitive win
    signals in employer RFP news and industry publications. Annual diligence asks: updated audited
    financials, therapist network density report, employer NPS score, and data-flow privacy audit.
