  evidenceGaps:
  - id: lyra-health-third-party-tracking-pixels-unconfirmed
    title: Third-Party Analytics and Advertising SDK Usage by Lyra Health Not Publicly Confirmed
    type: private-evidence-only
    severity: material
    topic: ftc-hbnr-compliance
    missingEvidence: >-
      Whether Lyra Health's web platform or member mobile app currently uses Meta Pixel, Google Ads
      conversion tracking, advertising SDKs, or third-party analytics platforms that receive any mental
      health data; no public technical audit or FTC compliance certification has been disclosed.
    whyItMatters: >-
      The BetterHelp $7.8M FTC settlement established that sharing mental health data with advertising
      platforms without consent violates the Health Breach Notification Rule. If Lyra Health uses similar
      tracking technologies, it faces identical enforcement risk. This is the highest-priority diligence
      ask in the regulatory and legal risk category.
    diligencePath: >-
      Commission a technical privacy audit (Blacklight tool scan, mobile app static analysis) to identify
      all third-party SDKs and data flows; request legal opinion on FTC HBNR compliance posture; review
      privacy policy for consent disclosures; confirm no advertising network relationships.
    relatedQuestionRefs:
    - QR006
    relatedTableRefs:
    - TR001
  - id: lyra-health-burn-rate-runway-unknown
    title: Lyra Health Burn Rate and Cash Runway Not Publicly Disclosed
    type: private-evidence-only
    severity: material
    topic: financial-risk-runway
    missingEvidence: >-
      Lyra Health's annual revenue, operating loss, cash burn rate, and remaining runway are not
      publicly disclosed. The company is private with no SEC filings. The last known financing was
      January 2022 Series F ($235M); cash status 3+ years later is unknown.
    whyItMatters: >-
      The runway to next financing is the most critical unresolved financial risk. If the company is
      within 12 months of needing capital and the sector is repriced 40-60%, any down-round creates
      anti-dilution clause triggers, employee equity impairment, and strategic pressure.
    diligencePath: >-
      Request audited financial statements for FY2023, FY2024, and FY2025; obtain board-approved
      operating plan and 24-month cash flow forecast; review capital structure and anti-dilution
      provisions; model down-round scenarios at 40%, 50%, and 60% valuation reduction.
    relatedQuestionRefs:
    - QR021
    - QR024
    relatedTableRefs:
    - TR003
  - id: therapist-network-size-churn-undisclosed
    title: Therapist Network Size, Geographic Density, and Contractor Churn Rate Not Publicly Disclosed
    type: private-evidence-only
    severity: material
    topic: operational-supply-risk
    missingEvidence: >-
      Total credentialed therapist contractors, geographic distribution by state, wait-time metrics for
      new member matching, therapist churn rate by cohort, and contractor pay structure benchmarked
      against private practice economics are all not publicly disclosed.
    whyItMatters: >-
      Therapist supply risk is rated High likelihood and High severity; without network density and churn
      data, the operational risk cannot be sized. If churn exceeds 25% annually or specific states have
      inadequate provider panels, the employer NPS guarantee underpinning Lyra's enterprise value is
      threatened.
    diligencePath: >-
      Request therapist network database by license type, state, and availability; obtain contractor
      churn rate by cohort and tenure; review contractor compensation vs. private practice benchmarks;
      audit wait-time SLAs and historical performance; conduct reference calls with 5+ employer HR
      contacts asking specifically about therapist access and quality.
    relatedQuestionRefs:
    - QR011
    - QR013
    relatedTableRefs:
    - TR002
  - id: employer-customer-concentration-undisclosed
    title: Top Employer Customer Revenue Concentration Not Publicly Disclosed
    type: private-evidence-only
    severity: material
    topic: enterprise-concentration-risk
    missingEvidence: >-
      Revenue or covered-lives attributable to Lyra Health's top 5 and top 10 employer customers
      individually and as a percentage of total ARR; contract term lengths, renewal provisions, and
      termination notice periods are not publicly available.
    whyItMatters: >-
      With a PEPM enterprise model, if the top 3 employer customers represent more than 30% of ARR,
      a competitive displacement by Spring Health in one flagship account could cause a material
      revenue shortfall and create investor confidence risk in the same period as a capital raise.
    diligencePath: >-
      Request employer customer cohort data showing covered lives, ARR contribution, and contract terms
      for top 20 accounts; review termination notice periods; assess Spring Health competitive overlap;
      model revenue impact of top-3 account loss at renewal.
    relatedQuestionRefs:
    - QR020
    relatedTableRefs:
    - TR003
  - id: ai-matching-algorithm-design-undisclosed
    title: AI Therapist Matching Algorithm Design and HIPAA De-identification Approach Not Publicly Disclosed
    type: private-evidence-only
    severity: material
    topic: ai-matching-clinical-risk
    missingEvidence: >-
      Lyra Health has not publicly disclosed the technical architecture of its AI therapist matching
      algorithm, the specific input data categories used (intake PHI vs. de-identified data), the
      methodology for demographic bias testing, or the HIPAA de-identification standard applied to
      any PHI processed by the model.
    whyItMatters: >-
      If the matching model processes identifiable mental health PHI without proper de-identification,
      it creates HIPAA and FTC exposure. If it creates demographic disparities in match quality by race,
      gender, or socioeconomic status, it creates regulatory and reputational risk. Without transparency,
      the clinical quality and compliance risk cannot be assessed.
    diligencePath: >-
      Request technical documentation of the matching algorithm architecture; confirm HIPAA de-identification
      standard applied (Safe Harbor or Expert Determination); request demographic bias audit results;
      confirm independent third-party review of algorithm fairness; review any published research on
      matching methodology.
    relatedQuestionRefs:
    - QR014
    relatedTableRefs:
    - TR002
  - id: modern-health-pepm-pricing-benchmarks-unavailable
    title: Modern Health and Competitive PEPM Pricing Benchmarks Not Publicly Available
    type: not-publicly-available
    severity: moderate
    topic: competitive-pricing-risk
    missingEvidence: >-
      PEPM contract pricing for Lyra Health, Spring Health, and Modern Health in enterprise employer
      deals is not publicly disclosed; no analyst reports with specific PEPM benchmarks by company
      tier or employer size were identified in the research conducted for this chapter.
    whyItMatters: >-
      Without pricing benchmarks, the degree of PEPM compression risk in competitive RFPs cannot be
      quantified. If Lyra's PEPM is 30-50% higher than Spring Health's due to premium clinical model
      costs, benefits rationalization risk is higher than if pricing is comparable.
    diligencePath: >-
      Interview HR benefits consultants and brokers who see competitive bids; obtain management guidance
      on average PEPM by account size; benchmark against Modern Health public pricing if available;
      review employer case studies for cost-per-session or PEPM disclosures.
    relatedQuestionRefs:
    - QR018
    relatedTableRefs:
    - TR003
  - id: lyra-health-executive-changes-2024-2026-unconfirmed
    title: Lyra Health Executive Team Changes and Organizational Structure 2024-2026 Not Confirmed
    type: not-publicly-available
    severity: moderate
    topic: people-execution-risk
