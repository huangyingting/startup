- id: people-execution-risks
  title: People and Execution Risks
  body: >-
    CEO David Ebersman (former Facebook CFO, 2009-2014) is founder and primary strategic architect of
    Lyra Health's employer go-to-market model. His direct relationships with Fortune 500 HR and CFO
    leaders are core revenue drivers. His departure would risk strategic continuity, major enterprise
    account relationships, and investor confidence during a critical capital-raise period. No public
    succession plan has been disclosed.

    Clinical leadership retention is a dual-axis risk: the Chief Clinical Officer and clinical supervisors
    carry both quality assurance accountability (HIPAA compliance, APA telepsychology standards, outcomes
    measurement) and competitive differentiation value (clinical methodology, therapist training, evidence
    base). Turnover in clinical leadership could trigger employer-customer trust erosion and regulatory
    compliance gaps. Engineering talent retention is challenged by competition from larger tech employers
    offering more liquid equity; the AI/ML team responsible for matching algorithms and HIPAA-compliant
    platform architecture requires dual competency in machine learning and healthcare compliance.

    BLS data confirms that median annual wages for mental health counselors were $49,710 in 2022; Lyra
    Health's therapist contractor value proposition must consistently exceed private practice economics
    to maintain network stability, particularly during periods of tightening supply. If platform economics
    compare unfavorably - lower pay, higher administrative burden, less scheduling flexibility - contractor
    attrition accelerates and compounds the supply-side operational risk.

    Lyra's equity compensation is anchored to the $5.58B January 2022 valuation; in a down-round financing
    scenario, employees holding options at strike prices reflecting the 2022 mark would face underwater
    equity, creating attrition incentives that compound key-person and engineering talent retention risks.
    The combination of underwater equity, sector repricing headwinds, and capital raise uncertainty creates
    a challenging retention environment for the engineering and clinical leadership teams.
