- id: TR005
  title: Mitigation and Kill Criteria Table
  columns:
  - Risk
  - Monitorable Trigger
  - Threshold / Event
  - Action Implication
  rows:
  - - HIPAA / FTC data breach or privacy enforcement action
    - FTC enforcement docket; HHS OCR breach notification portal; class-action filings against Lyra Health
    - Any HIPAA OCR enforcement action; FTC settlement; class-action complaint alleging mental health data
      misuse; or confirmed breach of >500 individuals requiring public notification per HIPAA
    - Immediate investment thesis re-evaluation; reassess privacy governance; if settlement >=50M,
      thesis-break trigger requiring exit consideration
  - - Therapist quality or access failure
    - Employer NPS reporting; industry analyst coverage of Lyra wait times; employer non-renewal news
    - Average therapist wait time >14 days; employer customer churn >15% in any annual period; or
      published employer case study citing quality concerns or access failures
    - Thesis deterioration signal; increase monitoring frequency; require management remediation plan
      with concrete timelines; request therapist network density report
  - - Competitive displacement by Spring Health or insurer bundling
    - Spring Health employer client announcements; Optum/Cigna behavioral health bundling news; enterprise
      HR publication competitive win coverage
    - Spring Health announced as replacement vendor in 3+ Fortune 500 accounts; or major insurer announces
      Lyra exclusion from recommended vendor list or preferred partner status
    - Competitive risk escalation; accelerate differentiation diligence; assess pricing power and
      outcomes evidence sustainability; evaluate whether product roadmap addresses gap
  - - Financial distress - down-round or failed financing
    - Capital raise announcement; news of financing at below $3.35B (>40% below 2022 mark); secondary
      market pricing if available; material headcount reduction announcements
    - Confirmed financing at >40% discount to 2022 $5.58B valuation; extended fundraising timeline >18
      months; or material headcount reduction >20% indicating cash conservation mode
    - Thesis-break trigger; reassess business model sustainability; model dilution impact and employee
      retention implications; evaluate whether strategic sale is preferred outcome
  - - CEO or clinical leadership departure
    - LinkedIn profile changes; press releases; industry newsletter executive change coverage
    - CEO David Ebersman departure announcement; concurrent CCO and senior leadership departures; three
      or more C-suite changes in 12-month period
    - Key-person risk trigger; assess succession plan depth; evaluate whether investor relationships
      survive leadership change; hold position pending strategic clarity
  notes: >-
    These are observable external signals that would cause re-evaluation of the investment thesis.
    Thresholds are calibrated to material but not catastrophic deterioration, allowing graduated response
    rather than binary exit decisions. All triggers should be monitored quarterly alongside financial and
    operational metrics from management presentations and annual diligence reviews.
  claimRefs:
  - CR046
  - CR047
  - CR048
