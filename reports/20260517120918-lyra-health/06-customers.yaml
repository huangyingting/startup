  - id: SU004
    title: Retention, Durability, and Customer Satisfaction
    body: >
      Lyra does not publicly disclose net revenue retention (NRR), gross revenue retention (GRR), or
      annual renewal rates—a common pattern for private enterprise SaaS companies. The estimated NRR
      of 115–130% (from industry analyst estimates included in the company background) reflects a
      combination of base renewal (~90%+ implied by the absence of announced contract losses among named
      customers) and expansion revenue from upsells (additional modules, covered-lives growth within
      existing accounts). No named Lyra employer customer has publicly announced a departure or
      non-renewal as of the run date.

      Provider-side member retention: 97% of members stick with their first provider—a platform-level
      metric that indicates strong provider-matching quality and reduces member dropout from the care
      journey. This is a strong proxy for member satisfaction and reduces the "revolving door" problem
      common to EAP referral networks where members quit after failing to connect with an appropriate
      therapist. Clinical improvement outcome of "9 out of 10 members get better" and 81% maintaining
      gains at 12 months post-treatment indicate durable outcomes, not just transient satisfaction.

      Employer-side: Employer testimonials on Lyra's customer stories page are qualitatively strong and
      span multiple industries and customer tenures, suggesting ongoing relationship durability. The
      multi-year contract structure (2–3 year PEPY agreements) inherently reduces annual churn risk
      within contract terms. The Workday Preferred Mental Health Partner designation (March 2026) and
      Carelon health plan partnership (April 2026) indicate that major enterprise platform owners are
      endorsing Lyra as a trusted vendor, which typically follows demonstrated customer retention
      performance from their member organizations.

      Adverse signals: Glassdoor employee reviews of Lyra Health mention some operational and cultural
      concerns from the workforce perspective, which are not directly related to employer customer
      satisfaction but indicate internal organizational pressures. The G2 reviews corpus is small (the
      2020 Wayback capture shows only 1 review, 4-star), and no major employer has submitted a public
      negative testimonial. The absence of NRR disclosure, however, means that a diligence team cannot
      independently verify retention without data-room access.
