figures:
  - id: FU001
    title: Lyra Health Customer Journey Flow – From Employer Decision to Member Outcome
    type: flow
    description: >
      The end-to-end customer journey for a Lyra employer deployment, from initial benefits procurement
      decision through employee enrollment, care matching, treatment, and outcome measurement.
      Illustrates the multi-stakeholder nature of the product and the key handoffs that determine
      utilization and clinical results.
    data:
      nodes:
        - id: n1
          label: Employer Procurement Decision
          note: HR/benefits leader selects Lyra; multi-year PEPY contract signed; typical sales cycle 6–12 months
        - id: n2
          label: Onboarding and Launch
          note: Open enrollment communications; Lyra app available to all covered employees and dependents; no copay
        - id: n3
          label: Employee Enrollment
          note: Employee creates Lyra account; AI-assisted intake questionnaire; provider matching within 2–4 days
        - id: n4
          label: Provider Matching
          note: 97% first-provider retention; 30K+ provider network; specialty care routing for complex needs
        - id: n5
          label: Active Care Sessions
          note: Therapy, coaching, psychiatry, or self-guided digital programs; 20–25% of covered lives engage
        - id: n6
          label: Outcome Measurement
