  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Net revenue retention (NRR), gross revenue retention (GRR), and annual churn rate
      missingEvidence: >-
        Lyra Health has not disclosed any NRR, GRR, renewal rate, or churn cohort data as of the
        run date. The 115–130% NRR estimate in the company background is an analyst inference, not
        a disclosed figure. Without these metrics, the long-term commercial durability of the
        700+ employer customer base cannot be independently assessed.
      whyItMatters: >-
        A company with 700 clients growing via new logos but losing 20–30% annually would have
        fundamentally different economics and valuation than one with 90%+ GRR and 115%+ NRR.
        Enterprise SaaS viability at $5.58B valuation depends critically on retention cohorts.
      diligencePath: >-
        Request cohort retention analysis by contract year (waterfall format), annual renewal rate
        by employer size tier, and revenue churn attribution from the data room.
      relatedQuestionRefs:
        - QU012
        - QU013
      relatedTableRefs:
        - TU004
    - type: private-evidence-only
      severity: material
      topic: Top-account revenue concentration (Starbucks, Morgan Stanley, AT&T)
      missingEvidence: >-
        No contract values, PEPY rates, or account-level revenue data are publicly disclosed. Given
        that Starbucks (~350K employees) and AT&T (~140K employees) are likely among the largest
        accounts, the revenue concentration in the top 3–5 accounts could represent 20–35% of ARR—
        a material single-account risk if any flagship customer departs.
      whyItMatters: >-
        Concentration above 20% in a single account creates meaningful risk to ARR stability.
        If Starbucks or Morgan Stanley represent $30–50M+ in annual contract value, non-renewal
        would be a material adverse event.
      diligencePath: >-
        Request top-10 account revenue concentration analysis, contract end dates, and renewal
        probability assessments from the data room.
      relatedQuestionRefs:
        - QU010
        - QU019
        - QU020
      relatedTableRefs:
        - TU003
        - TU005
    - type: missing-source
      severity: moderate
      topic: Independent validation of the 3:1 ROI and 26% longitudinal savings claims
      missingEvidence: >-
        Lyra states its ROI study is "independently verified" but does not publicly identify the
        verifying institution, methodology, or sample characteristics. The longitudinal study (26%
        annual savings over 4 years) is referenced but not published in a peer-reviewed journal
        accessible to the public. Unlike Spring Health (which has a JAMA Network Open study), Lyra's
        quantitative ROI evidence relies on non-transparent verification.
      whyItMatters: >-
        If the ROI methodology uses a biased control group (self-selected users vs. non-users rather
        than randomized or matched controls), the 3:1 ROI may overstate the expected return for
        average employers. Employers and investors cannot independently reproduce or validate the
        savings estimate without the underlying study.
      diligencePath: >-
        Request the full text of the independently verified ROI study, including the verifier's
        identity, sample size, employer characteristics, and control group methodology.
      relatedQuestionRefs:
        - QU006
        - QU007
      relatedTableRefs:
        - TU004
    - type: missing-source
      severity: moderate
      topic: International revenue and customer count outside the US
      missingEvidence: >-
        Lyra claims to serve 20M+ people globally and has published global workforce mental health
        research, but no international revenue figure, employer count, or country-specific customer
        disclosure has been made public. The US enterprise employer market is assumed to be the
        dominant revenue source.
      whyItMatters: >-
        If international revenue is a material share of the $5.58B valuation-implied ARR, diligence
        should assess whether international deployment is supported by local regulatory compliance,
        clinical licensing, and data residency—all of which are operationally complex.
      diligencePath: >-
        Request US vs. international revenue breakdown, employer customer count by country, and
        regulatory/compliance status for all international markets from the data room.
      relatedQuestionRefs:
        - QU023
        - QU024
      relatedTableRefs:
        - TU001
    - type: missing-source
      severity: low
      topic: Independent customer review sentiment (Glassdoor, G2, Trustpilot)
      missingEvidence: >-
        Glassdoor review data for Lyra Health as an employer and G2 review data for the product as
        a mental health platform were not fully accessible during the research run. The web-archived
        G2 reviews (2020) showed positive sentiment but represent a limited historical snapshot.
        Independent user-generated review platforms provide an important signal for employer
        satisfaction that is not controllable by the company.
      whyItMatters: >-
        Adverse employee or member reviews on Glassdoor or G2 could indicate service quality issues,
        provider quality problems, or employer dissatisfaction that is not reflected in company-curated
        customer testimonials. The partial evidence from G2 (2020) is too dated to be definitive.
      diligencePath: >-
        Review current Glassdoor, G2, and Trustpilot ratings; seek employee testimonials in
        benefits management forums; interview HR leaders at named reference customers off-record.
      relatedQuestionRefs:
        - QU021
        - QU022
      relatedTableRefs:
        - TU004
