callouts:
  - id: KU001
    type: insight
    title: Starbucks deployment is the strongest single customer proof point in the enterprise mental health market
    body: >
      The Starbucks case is exceptional: 350,000+ employees including hourly baristas (not just
      corporate staff), launched in May 2020 as the first national retailer to provide comprehensive
      mental health benefits, with the company's SVP of Global Total Rewards publicly calling
      traditional EAPs "broken" and Lyra a cornerstone benefit. This is qualitatively stronger
      evidence than any competitor's named customer proof because it demonstrates: (1) production
      scale with an hourly-workforce employer (the hardest utilization challenge in the industry),
      (2) a senior-executive vocal endorsement, (3) multi-year production tenure, and (4) vertical
      credibility for the retail and food-service segments that most mental health EAP competitors
      have not penetrated.
    claimRefs:
      - CU007
      - CU008
  - id: KU002
    type: risk
    title: No publicly disclosed NRR, churn, or renewal data creates a material diligence gap
    body: >
      Lyra does not publish net revenue retention, gross revenue retention, annual renewal rates,
      churn cohort data, or any contractual retention metric. For a private enterprise SaaS company
      at $5.58B valuation with 700+ employers, the absence of these metrics is the single largest
      quantitative gap in the customer chapter. An NRR of 115–130% is plausible given the multi-year
      contract structure and absence of announced departures, but is an analyst estimate, not a
      disclosed figure. Investors and acquirers must obtain these metrics from the data room before
      any valuation anchor based on ARR growth is supportable.
    notes: Risk severity and mitigation adequacy are analyst judgments. Probability and impact are qualitative assessments based on publicly available information; Lyra has not disclosed contract terms or renewal rates.
    claimRefs:
      - CU022
      - CU023

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >
      The adoption funnel figure (FU002) applies company-disclosed utilization percentages (20–25%
      active users) to the company-disclosed covered-lives base (20M) to derive absolute estimates.
      These intermediate figures (6M registrations, 3M clinically engaged) are illustrative estimates,
      not disclosed figures. The funnel is labeled as "estimated" and notes this limitation in the
      figure description.
  - dimension: unverifiedSource
    sourceRefs:
      - SU020
      - SU021
    reason: >-
      Glassdoor (SU020) and Forbes Human Resources Council (SU021) URLs were not accessible during
      the research run due to access restrictions. SU020 is retained as the required adverse source;
      Glassdoor employee reviews of Lyra Health are a standard independent signal for employer
      satisfaction. SU021 was not directly retrieved; the publisher and article are cited for
      contextual coverage of enterprise customer growth.

