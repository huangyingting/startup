  - id: SU002
    title: Named Customer Production Evidence
    body: >
      Lyra Health has a significantly larger set of publicly confirmed named customers than most
      competitors at comparable scale, spanning retail, financial services, technology, construction,
      healthcare, law, and transportation. The anchor customer is Starbucks—the first national retailer
      to deploy a comprehensive mental health benefit at scale when it launched Lyra in 2020. Starbucks
      covers 350,000+ employees (including hourly baristas, not just corporate staff), and SVP of Global
      Total Rewards Ron Crawford has publicly stated that "traditional EAPs are broken" and that Lyra
      has become one of the most valued benefits by Starbucks partners. This anchor represents a
      high-credibility, high-visibility production deployment.

      In financial services, Morgan Stanley (~80,000 employees) and Fidelity (a disclosed customer) and
      TD Cowen (customer testimonial on Lyra's website) represent blue-chip finance logos. President
      Jeff Solomon of TD Cowen has stated that mental health support is "never felt more critical to
      retain and attract the best possible talent." The tech vertical includes Uber (40,000+ employees,
      disclosed 2021), Zoom (~9,000 employees), eBay (~12,000 employees), Lyft (~6,000 employees), and
      Robinhood (~3,000 employees). Healthcare and pharmaceutical customers include Genentech/Roche
      (~15,000 US employees). Industrial customers include JE Dunn Construction (a featured case study
      on Lyra's homepage), Levi Strauss (~15,000 employees), and Cummins (Kate Fisher, Sr. Director
      Total Rewards, is quoted on the customer page). Newer additions visible from press coverage include
      AT&T (employee caregiver benefits as of Dec 2025), Walmart (wellness enhancements Dec 2025),
      United Airlines (2025 webinar partnership), School District of Philadelphia (education sector
      flagship), and Peraton (security and technology, Amy Rall quote on Lyra site).

      The breadth of named customer evidence across industries and employee size ranges indicates that
      Lyra has achieved penetration beyond its founding tech-sector base and has credible production
      deployments in hourly-workforce employers (Starbucks), regulated industries (Genentech, Morgan
      Stanley), construction (JE Dunn), and the public sector (School District of Philadelphia).
      Most named customers are confirmed in production status (multi-year contracts) rather than pilots.
