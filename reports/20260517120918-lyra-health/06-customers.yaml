  - id: TU005
    title: Expansion and Customer Concentration Risk Table
    description: >
      Assessment of Lyra Health's key concentration, expansion, and procurement friction risks from
      a customer diligence perspective. Each row identifies a risk dimension, its severity, the
      supporting evidence, and the recommended diligence path.
    columns:
      - Risk Dimension
      - Severity
      - Evidence / Basis
      - Lyra Mitigation
      - Diligence Path
    rows:
      - - Large-account revenue concentration (Starbucks, Morgan Stanley, AT&T)
        - High
        - Starbucks covers 350,000 employees at a multi-year PEPY rate; top 3–5 accounts may represent 20–35% of ARR
        - Multi-year contracts; product stickiness via clinical outcomes and data integration
        - Request top-10 account revenue concentration waterfall from data room
      - - Sector concentration in tech / finance
        - Medium
        - Early customer base was predominantly tech companies (Uber, Zoom, Lyft, eBay, Robinhood)
        - Diversified vertical expansion (education, retail, construction, manufacturing) visible in 2024–2026 customers
        - Ask for revenue breakdown by vertical and segment cohort
      - - Channel partner dependency (Workday, Carelon)
        - Medium
        - Workday Preferred Mental Health Partner (March 2026) and Carelon health plan deal (April 2026) create single-platform concentrations
        - Multiple channels (direct sales, benefits brokers, health plans, Workday) reduce single-channel dependency
        - Review terms of Workday and Carelon partnership agreements for exclusivity clauses and termination rights
      - - Geographic concentration in US
        - Medium
        - 20M+ global lives claimed, but US employer market is the primary revenue driver; no international revenue disclosure
        - Global provider network (30K+ providers in multiple countries); global reports published (Economist Impact)
        - Request US vs. international revenue and covered-lives breakdown
      - - Annual enterprise benefits procurement cycle
        - Low-Medium
        - Benefits decisions typically made Q2–Q3 for January plan year; creates seasonal win/loss concentration
        - Multi-year contracts reduce annual renewal exposure; Workday integration smooths inbound lead timing
        - Review average contract length distribution and renewal cadence from data room
    notes: Risk severity and mitigation adequacy are analyst judgments. Probability and impact are qualitative assessments based on publicly available information; Lyra has not disclosed contract terms or renewal rates.
