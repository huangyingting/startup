  - id: TU004
    title: Retention, Outcome, and Member Satisfaction Metrics
    description: >
      Key publicly disclosed metrics related to member-level outcomes, provider retention, and
      employer-side satisfaction signals. All metrics are self-reported by Lyra unless otherwise noted;
      the 3:1 ROI and longitudinal cost savings are described as independently verified.
    columns:
      - Metric
      - Value
      - Source / Context
      - Independence
      - Confidence
    rows:
      - - Member clinical improvement rate
        - 9 out of 10 members (approx. 90%)
        - Lyra homepage and employer marketing; standardized clinical assessment tools (PHQ-9, GAD-7)
        - Company-reported
        - Medium (self-reported; methodology not fully published)
      - - First-provider retention rate
        - 97%
        - 'Lyra homepage: "97% of members stick with their first provider"'
        - Company-reported
        - Medium (verifiable operationally if clinical data reviewed)
      - - 12-month gains maintenance
        - 81% of members maintained treatment gains at 12-month follow-up
        - Lyra homepage longitudinal outcome metric
        - Company-reported
        - Medium (longitudinal design strengthens claim; sample characteristics not disclosed)
      - - Clinical recovery speed
        - 2× faster recoveries vs. traditional care
        - Lyra homepage comparative claim; references peer-reviewed research basis
        - Semi-independent (references published literature)
        - Medium (comparison group methodology not fully disclosed)
      - - ROI per $1 spent
        - $3.04 saved per $1 spent (3:1 ROI)
        - Independently verified ROI analysis; also see 26% avg annual savings over 4 years longitudinal study
        - Independently verified (third-party verification disclosed, details in executive summary)
        - High (independent verification claim is stated; reviewer identity and methodology not publicly detailed)
      - - Productivity gain per recovering employee
        - ~4 hours per week gained; ~$4,800/year per employee in savings
        - 'Lyra blog: "The ROI of Mental Health Care" (Nov 2025); based on presenteeism reduction research'
