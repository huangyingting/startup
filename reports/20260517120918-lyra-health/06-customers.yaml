  - id: SU005
    title: Expansion Dynamics, Land-and-Expand, and Concentration Risks
    body: >
      Lyra's expansion model operates on two axes: (1) within existing employer accounts via upsell to
      additional benefit tiers and family members, and (2) across new employer accounts via direct sales
      and emerging distribution channels. The existing-account axis is visible in the product
      architecture: the core EAP replacement has been extended to Lyra Empower (coaching and self-paced
      programs), specialty care centers of excellence (pediatric/teen, neurodiversity, complex conditions),
      Manager Coaching (launched May 2026), and the AI-assisted matching layer. Each of these can be
      added to existing employer contracts, driving higher PEPY revenue from existing customers.

      Concentration risks: The large-employer sweet spot (5,000–100,000+ employees) creates natural
      concentration in a relatively small number of employers. If the top 10 employers represent 30%+
      of total ARR—likely given that Morgan Stanley (~80K employees), Starbucks (~350K employees), and
      AT&T (140,000+ employees) could each be multi-million-dollar PEPY accounts—then the loss of any
      single mega-account would be a material revenue event. Lyra has not disclosed top-account
      revenue concentration.

      Channel dependence risk: An emerging dependence on the Workday Wellness channel (Preferred Mental
      Health Partner) concentrates acquisition in a single platform ecosystem. If Workday shifts
      partnerships, this could reduce inbound lead flow. Similarly, the Carelon health plan channel
      (April 2026) introduces a payer intermediary with pricing leverage and enrollment control. Partner
      dependency creates new counterparty risks that are different from direct enterprise customer churn.

      Procurement friction: Enterprise mental health benefit decisions are made annually during benefits
      open enrollment planning (typically Q2-Q3 for January plan year), creating a seasonal procurement
      cycle with concentrated win/loss periods. Multi-year contracts reduce churn risk but also delay
      competitive displacement in both directions. New enterprise wins require sign-off from HR,
      finance, legal, and procurement teams, with a typical sales cycle of 6–12 months for mid-to-large
      accounts—a meaningful CAC burden that necessitates large direct sales teams.

      International expansion is an emerging dimension. Lyra has referenced serving members globally
      and has published reports on scaling global mental health strategies, but revenue and customer
      count outside the US are not publicly disclosed. The Workday Wellness partnership and Carelon deal
      suggest primarily US-dominated revenue concentration despite global provider network build-out.
