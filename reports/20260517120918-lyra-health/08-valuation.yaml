chapter:
  order: 8
  number: 8
  title: Valuation
  letter: V
  summary: 'Lyra Health''s most recent financing was a $235M Series F in January 2022 at a $5.58B post-money
    valuation, confirmed by SEC Form D (CIK 0001733914). Total capital raised across seven rounds is approximately
    $910M. Public comparables (Teladoc 0.8-1.5x revenue, LifeStance 1-2x, Accolade 1-2x, Talkspace 2-2.5x)
    imply a normalized enterprise value of $2-4B for Lyra — a 28-64% markdown from the last-round price.
    The recommendation is Track: monitor for re-entry at a materially lower price or a positive catalyst
    such as a confirmed profitability path, strategic acquisition engagement, or a down-round at $2-3B.
    Risk rating is High, driven by illiquidity, $910M preference overhang, uncertain profitability timeline,
    therapist supply constraints, and competition from Spring Health and Modern Health. Bull case ($4-6B,
    20% probability) requires market recovery and 2x ARR growth; base case ($2-3B, 45%) reflects current
    market reality with M&A as the most likely exit; bear case ($0.8-1.5B, 35%) reflects funding difficulty
    and further multiple compression.

    '
