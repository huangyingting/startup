sections:
- id: SV-S01
  title: Valuation Context and Financing History
  body: 'Lyra Health most recent financing event was a $235M Series F closed in January 2022 at a $5.58B
    post-money valuation, confirmed by the SEC Form D regulatory filing (CIK 0001733914, adsh: 0001733914-22-000001,
    file date 2022-01-19, file_num: 021-429972) and reported by Axios. Seven total Form D filings on EDGAR
    span the company''s fundraising from Series B (June 2018) through Series F (January 2022), confirming
    total capital raised of approximately $910M. The company is incorporated in Delaware and headquartered
    in Burlingame, CA. Investors include General Catalyst, Casdin Capital, and Dragoneer Investment Group.


    The Series F occurred at the peak of the digital health bull market. Rock Health 2022 and 2023 year-end
    digital health reports document that total sector funding fell from $29.1B (2021) to $15.3B (2022)
    to $10.7B (2023), with late-stage median valuations contracting 40%+ from 2021 peaks. The $5.58B last-round
    price implied a 22-28x ARR multiple on an estimated $200-250M ARR base, substantially above the 5-12x
    ARR that comparable public and private companies traded at in 2024-2025. Lyra Health has not disclosed
    a follow-on financing round since January 2022, a four-year gap consistent with management avoiding
    a market-clearing down-round price.

    '
  tableRefs:
  - TV001
  figureRefs:
  - FV001
  - FV004
- id: SV-S02
  title: Comparable Valuation Analysis
  body: 'Public company comparables provide a direct market signal for Lyra Health''s implied fair value.
    Teladoc Health (TDOC), the most broadly analogous public telehealth platform with a dedicated mental
    health segment (BetterHelp), traded at approximately 0.8-1.5x trailing revenue as of 2025-2026 on
    a $3-4B market cap with ~$2.5-2.7B revenue. Teladoc 90%+ stock decline from its 2021 peak is the most
    salient illustration of digital health multiple compression. LifeStance Health (LFST) traded at 1-2x
    revenue with a $1-2B market cap. Accolade (ACCD) traded at 1.3-2x revenue with a $400-600M market
    cap. Talkspace (TALK) traded at 2-2.5x revenue with a $300-400M market cap.


    Applying the public comp range of 1-3x revenue to Lyra''s estimated $200-250M ARR, with a 50-100%
    private market premium for clinical quality and employer market leadership, implies an estimated current
    fair value range of $2-4B, a 28-64% markdown from the $5.58B Series F price. The Spring Health 2023
    Series D at $3.3B on $100-150M ARR provides a more favorable private market anchor. Blending public
    and private comp sets, the midpoint fair value estimate is approximately $3B, equivalent to 12-15x
    ARR.

    '
  tableRefs:
  - TV004
  figureRefs:
  - FV002
- id: SV-S03
  title: Bull Base and Bear Scenarios
  body: 'The bull case (20% probability) assumes Lyra Health ARR grows 2x to $400-500M by 2027-2028 via
    continued Fortune 500 employer expansion. Digital health multiples partially recover to 10-15x ARR.
    Valuation reaches $4-6B, approximately 0.7-1.1x return on the $5.58B Series F entry price. A successful
    IPO becomes possible in 2027 if the company nears EBITDA breakeven. This scenario requires no major
    employer churn, therapist supply stabilization, favorable MHPAEA regulatory enforcement momentum,
    and broader market multiple recovery.


    The base case (45% probability) assumes 15-25% ARR growth to $250-300M by 2026-2027, retention of
    core enterprise accounts, and an eventual strategic acquisition at $2-3B, a 0.36-0.54x return on the
    Series F basis. One to two additional financing rounds at $2-3B implied valuation are likely, introducing
    further dilution. The bear case (35% probability) assumes funding difficulty, therapist supply constraints,
    and competitive pressure from Spring Health and Headspace Care, leading to ARR plateau at $150-200M,
    multiple compression to 4-6x ARR, and an exit at $0.8-1.5B, an 86-73% loss from the Series F price.

    '
  tableRefs:
  - TV003
  figureRefs:
  - FV003
- id: SV-S04
  title: Investment Thesis and Anti-thesis
  body: 'The investment thesis rests on four pillars: (1) Lyra Health licensed-clinician delivery model
    provides demonstrably higher clinical outcomes and employer satisfaction than legacy EAP programs,
    creating switching costs and pricing power; (2) the 500+ employer customer base with Fortune 500 anchors
    creates a durable revenue foundation; (3) the 2024 MHPAEA parity rule creates structural demand for
    network-adequate EAP alternatives, a regulatory tailwind that strengthens Lyra''s competitive position;
    and (4) strategic acquirer interest from large insurers creates a credible exit path at $3-5B even
    absent an IPO.


    The anti-thesis is equally compelling. The $5.58B last-round price priced in all thesis pillars at
    the market''s most optimistic point in January 2022. Public mental health company multiples have since
    reset to 1-3x revenue from 20-30x, creating a permanent re-rating risk for companies still carrying
    peak-era valuations. Spring Health ($3.3B, 2023) and Headspace Care compete directly at lower implied
    valuations. Lyra''s therapist-dependent delivery model creates a structural capacity constraint that
    technology investments cannot easily eliminate. And the preference overhang from $910M raised means
    that common and late-stage preferred holders bear a disproportionate share of downside risk.

    '
  tableRefs:
  - TV002
  figureRefs: []
- id: SV-S05
  title: Recommendation Exit Readiness and Final Diligence Asks
  body: 'The investment recommendation is Track: monitor for re-entry at a materially lower price or definitive
    positive catalyst. The current valuation context — $5.58B last round (January 2022), estimated $2-4B
    fair value as of 2026, no confirmed IPO timeline, no publicly disclosed follow-on financing — does
    not support new investment at the last-round price. Confidence is Medium. Risk rating is High: illiquidity,
    preference overhang, uncertain profitability, and structural competition from Spring Health and Headspace
    Care. Valuation stance is Stretched.


    Re-entry conditions that would trigger upgrade to Conditional Positive: (1) confirmed down-round at
    $2-3B creating an attractive entry multiple; (2) audited ARR confirming $250M+ with 20%+ growth and
    improving unit economics; or (3) strategic acquisition engagement at a price within the base-to-bull
    range. IPO readiness is limited, with 2-3 additional years likely required. Strategic M&A by a large
    insurer at $3-5B remains the most plausible exit within a 3-5 year horizon. Final diligence asks:
    (1) audited revenue/ARR; (2) full cap table with preference terms; (3) employer customer concentration
    data; (4) path-to-profitability plan and burn rate; (5) NRR by employer cohort; (6) board composition
    and governance documents.

    '
  tableRefs:
  - TV005
  - TV006
  figureRefs: []
