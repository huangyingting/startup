- id: FV001
  title: Recommendation logic
  type: flow
  insight: 'The Track recommendation flows from three converging inputs: a stretched last-round price
    ($5.58B vs. $2-4B fair value), a high-risk profile (illiquidity, preference overhang, profitability
    uncertainty), and conditional commercial strength (500+ employer customers, MHPAEA tailwind, strategic
    acquirer interest). Upgrade to Conditional Positive requires entry at $2-3B, revenue confirmation,
    and profitability visibility.'
  data:
