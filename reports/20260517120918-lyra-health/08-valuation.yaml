callouts:
- id: CV-CALL-01
  type: finding
  title: Track at Current Price — Re-entry Requires Down-Round or Catalyst
  claimRefs:
  - CV015
  - CV016
  - CV026
  body: 'Lyra Health $5.58B Series F price (January 2022) reflects the peak of the digital health bull
    market and is 40-64% above the estimated $2-4B fair value implied by normalized market multiples as
    of 2026. New investment at the last-round basis delivers a negative expected return in both the base
    and bear cases. The appropriate posture is Track: monitor for a down-round entry at $2-3B, confirmed
    revenue growth trajectory, or strategic M&A engagement that validates the base-to-bull valuation range.'
  sourceRefs:
  - SV006
  - SV015
  - SV021
- id: CV-CALL-02
  type: risk
  title: Preference Overhang — $910M Raised Creates Downside Priority Risk
  claimRefs:
  - CV034
  - CV035
  body: Lyra Health $910M+ cumulative fundraising across seven rounds creates a layered liquidation preference
    stack that senior preferred holders receive ahead of Series F preferred in downside exit scenarios.
    In a base-case exit at $2-3B, effective return to Series F holders may be substantially below headline
    value depending on preference terms, participation rights, and anti-dilution provisions. Full cap
    table review with preference waterfall modeling is a critical pre-investment requirement.
  sourceRefs:
  - SV001
  - SV002
  - SV021
- id: CV-CALL-03
  type: risk
  title: Therapist Supply Constraint — Structural Ceiling on Clinical Scaling
  claimRefs:
  - CV024
  body: Lyra Health licensed-clinician delivery model creates a structural capacity ceiling that technology
    investments cannot easily overcome. CB Insights documents 8,000-12,000+ unfilled licensed therapist
    positions in the U.S. as of 2023. Scaling clinical quality at the rates required for the bull case
    ($400-500M ARR) would require significant therapist compensation increases, compressing margins and
    extending the path to profitability. This constraint is the primary structural risk differentiating
    Lyra from pure tech-platform mental health models.
  sourceRefs:
  - SV011
  - SV021
  - SV024
