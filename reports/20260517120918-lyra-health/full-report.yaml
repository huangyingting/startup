  - id: FV001
    title: Recommendation logic
    type: flow
    insight: >-
      The Track recommendation flows from three converging inputs: a stretched last-round price ($5.58B vs. $2-4B fair
      value), a high-risk profile (illiquidity, preference overhang, profitability uncertainty), and conditional
      commercial strength (500+ employer customers, MHPAEA tailwind, strategic acquirer interest). Upgrade to
      Conditional Positive requires entry at $2-3B, revenue confirmation, and profitability visibility.
    data:
      nodes:
        - id: f1
          label: Market Compression (High)
          description: Digital health multiples down 40-70% from peak; public comps at 1-3x revenue; Teladoc down 90%+
        - id: f2
          label: Last-Round Price Stretched ($5.58B)
          description: 22-28x ARR at Series F; estimated fair value $2-4B; 28-64% markdown implied; 4-year gap since round
        - id: f3
          label: Commercial Strengths (Positive)
          description: 500+ employer customers; MHPAEA regulatory tailwind; insurer acquirer interest; outcomes data
        - id: f4
          label: Risk Profile (High)
          description: Illiquidity; $910M preference overhang; no confirmed profitability path; therapist supply constraint
        - id: f5
          label: Track Recommendation
          description: Monitor for down-round entry at $2-3B or strategic catalyst; do not invest at $5.58B basis
        - id: f6
          label: Upgrade Conditions
          description: Confirmed ARR $250M+; profitability roadmap; down-round at $2-3B; or M&A engagement confirmed
        - id: f7
          label: Exit Monitoring Criteria
          description: Down-round below $3B; major employer churn; therapist supply crisis; strategic acquirer withdrawal
    sourceRefs:
      - SV001
      - SV006
      - SV015
      - SV026
  - id: FV002
    title: Valuation sensitivity
    type: bar
    insight: >-
      Lyra Health implied fair value is highly sensitive to the ARR multiple applied. At bear-case multiples (4-6x ARR),
      fair value is $0.8-1.5B. At normalized base-case multiples (8-12x ARR), fair value is $2-3.4B. The $5.58B Series F
      entry price is only justified in the bull scenario at 10-15x ARR on $400-500M ARR.
    data:
      items:
        - label: Bear low 4x $200M ARR
          value: 0.8
          unit: $B
        - label: Bear high 6x $250M ARR
          value: 1.5
          unit: $B
        - label: Base low 8x $250M ARR
          value: 2
          unit: $B
        - label: Base high 12x $280M ARR
          value: 3.4
          unit: $B
        - label: Series F Entry $5.58B
          value: 5.58
          unit: $B
        - label: Bull 12x $400M ARR
          value: 4.8
          unit: $B
    sourceRefs:
      - SV006
      - SV015
      - SV026
      - SV027
  - id: FV003
    title: Valuation and return range
    type: range
    insight: >-
      Exit valuation spans $0.8B-$6B from bear to bull. The base case exit ($2-3B) implies a material loss for Series F
      investors at the $5.58B entry price. The wide range reflects fundamental uncertainty about Lyra Health's revenue,
      unit economics, and the timeline to liquidity.
    data:
      items:
        - label: Bear Case Exit Value
          low: 0.8
          high: 1.5
          mid: 1.15
          unit: $B
        - label: Base Case Exit Value
          low: 2
          high: 3
          mid: 2.5
          unit: $B
        - label: Bull Case Exit Value
          low: 4
          high: 6
          mid: 5
          unit: $B
        - label: Series F Entry $5.58B
          low: 5.58
          high: 5.58
          mid: 5.58
          unit: $B
        - label: Estimated Fair Value 2026
          low: 2
          high: 4
          mid: 3
          unit: $B
    sourceRefs:
      - SV006
      - SV015
      - SV021
      - SV026
  - id: FV004
    title: Investment KPIs
    type: kpi
    insight: >-
      Key investment KPIs confirm Lyra Health's scale leadership and regulatory capital position while highlighting
      critical missing financial metrics. Revenue and profitability remain undisclosed, creating the core evidence gap
      for investment decision-making.
    data:
      items:
        - label: Last Round Valuation
          value: $5.58B
          status: confirmed
          note: Series F January 2022 (SEC Form D 0001733914-22-000001)
        - label: Total Funding Raised
          value: ~$910M
          status: confirmed
          note: Seed through Series F (7 SEC Form D filings; Tracxn/Axios)
        - label: Employer Customers
          value: 500+
          status: confirmed
          note: As of 2022-2023 per Axios and company press releases
        - label: Estimated ARR
          value: $200-250M
          status: estimated
          note: Unconfirmed; estimate based on employer count and market benchmarks
        - label: Implied ARR Multiple Series F
          value: 22-28x ARR
          status: estimated
          note: Based on $200-250M ARR estimate at $5.58B EV
        - label: Estimated Current Fair Value
          value: $2-4B
          status: estimated
          note: Normalized multiples vs. public comps; midpoint ~$3B (~12-15x ARR)
        - label: Comparable Public Trading Range
          value: 1-3x revenue
          status: confirmed
          note: TDOC 0.8-1.5x; LFST 1-2x; ACCD 1.3-2x; TALK 2-2.5x (Yahoo Finance)
        - label: IPO Readiness 2026
          value: Not Ready
          status: confirmed
          note: 2-3 years pending profitability; public comp underperformance argues for delay
    sourceRefs:
      - SV001
      - SV006
      - SV014
      - SV026
      - SV027
appendices:
  - id: A
    title: Coverage Notes and Methodology
    blocks:
      - type: paragraph
        body: >-
          This report is based on public sources fetched between 2025 and 2026-05-17. Financial metrics (ARR, gross
          margin, NRR, burn rate) are analyst estimates derived from funding announcements, comparable company analysis,
          and industry benchmarks — not audited financials. Lyra Health has not filed for an IPO and does not disclose
          financials publicly. All estimates should be treated as directional proxies subject to material revision upon
          access to private financials.
        claimRefs: []
      - type: paragraph
        body: >-
          Valuation analysis is based on comparable public company trading multiples (Teladoc, Accolade, Talkspace,
          LifeStance Health) as of 2024-2025, and comparable private round data (Spring Health Series D, Modern Health
          Series D). The report uses 2026-05-17 as the canonical run date for all freshness assessments.
        claimRefs: []
