      - number: '4.2'
        title: 'GTM motion and sales efficiency: direct enterprise sales with ecosystem distribution'
        blocks:
          - type: paragraph
            body: >-
              Lyra's go-to-market model is enterprise-direct. No self-serve purchasing path exists; employers must
              engage a partnerships team. This is consistent with an enterprise SaaS motion targeting HR and benefits
              decision-makers at companies with hundreds to tens of thousands of employees. Sales cycles for enterprise
              benefits contracts typically run 6–18 months, driven by benefits renewal calendars, legal and security
              review, clinical vetting, and procurement approval. Lyra's sales cost structure is therefore front-loaded
              with significant CAC that is only recovered over multi-year contract periods.


              The company has invested in ecosystem distribution to reduce per-deal friction. The March 2026 Workday
              Wellness partnership—creating Lyra as the preferred mental health partner in Workday's AI-powered benefits
              ecosystem—addresses a structural GTM bottleneck: Workday automates benefit plan setup using APIs, reducing
              the implementation overhead that deters smaller HR teams. This partnership, alongside earlier health plan
              and carrier relationships, creates a second GTM channel that does not require Lyra to initiate each sale.


              Public evidence for unit economics is limited. No CAC, payback period, NRR, or churn statistics are
              disclosed. The best available proxies are adoption and outcome metrics that support the retention
              argument: 9 in 10 members improve with care, 81% maintained gains at 12-month follow-up, and recovery
              speed is 2x that of traditional care. These clinical outcomes, combined with a 26% reduction in annual
              overall healthcare claims costs, support the employer expansion narrative—employers that see measurable
              cost savings have strong incentives to renew and expand coverage to more employee populations. NRR is
              estimated in the 115–130% range by analysts covering comparable employer-health SaaS companies, but this
              figure is unconfirmed by Lyra.


              The ROI case for buyers is quantified. Lyra's own study using the Lam Employment Absence and Productivity
              Scale (LEAPS) found members gaining four productive hours per week—equivalent to $4,806 in annual
              productivity gains per employee per year—and a 31% reduction in work impairment. Employees with severe
              challenges regained 17+ productive hours weekly, valued at $20,882 per employee per year. These figures
              function as sales enablement materials, but they also create a factual basis for renewal conversations
              when HR leaders can point to measurable outcomes from prior cohorts.
