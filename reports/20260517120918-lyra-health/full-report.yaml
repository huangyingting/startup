  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The employer mental health benefits market divides into three structurally distinct competitive tiers,
              each with different distribution vectors, buyer personas, and pricing anchors.

              Digital-native challengers (Spring Health, Modern Health, Headspace Health) compete directly for the same
              enterprise HR and Total Rewards buyer that Lyra targets. These vendors share the EAP-replacement
              narrative, emphasize measurable outcomes over session counts, and price on a per-employee-per-month (PEPM)
              or engaged-employee basis. Spring Health is the closest competitive analog—founded 2016, headquartered in
              New York City, with ML-driven precision matching, a published JAMA Open outcomes study, and coverage
              exceeding 20 million lives globally as of 2026. The company's claim that it delivers a 2.2× ROI on health
              plan spend and 10× engagement versus traditional EAPs directly contests Lyra's outcomes positioning.
              Modern Health (founded 2017, San Francisco) differentiates on coaching-first access and international
              reach, with an Adaptive Care Model connecting guidance, therapy, and coaching through one platform without
              requiring re-enrollment when needs escalate. Headspace Health (the 2021 merger of Headspace's mindfulness
              app and Ginger's clinical platform) reaches 4,000+ organizations through a prevention-to-treatment
              spectrum anchored in its globally recognized meditation brand.

              Legacy managed behavioral health and EAP incumbents—Optum Behavioral Health (UnitedHealth subsidiary),
              Magellan Health (now part of Centene), Beacon Health Options (Elevance/Carelon), and Cigna's Evernorth
              EAP—command large lives-under-management bases through insurer relationships. These vendors rarely win in
              head-to-head modern RFPs but defend installed bases through contract bundling, insurer channel lock-in,
              and administrative integration into benefits platforms. SilverCloud Health, acquired by AmWell, offers
              digital CBT programs targeted at health systems and payers rather than direct employer sales.

              Teletherapy networks (Talkspace Enterprise, ~$871M market cap as of May 2026; BetterHelp Enterprise via
              Teladoc, ~$1.1B market cap) compete primarily on therapist access, consumer familiarity, and per-session
              pricing. Their positioning as teletherapy marketplaces rather than comprehensive benefit managers limits
              their ability to serve complex clinical needs or drive systemic employer cost savings.

              Status-quo alternatives include legacy EAPs (often 3–5 sessions, limited clinical quality controls),
              employee wellness programs (resilience training, mindfulness apps), and primary care mental health
              referrals—all of which Lyra's EAP replacement pitch displaces. Likely new entrants include AI-native
              mental health platforms leveraging LLMs for autonomous coaching (several venture-backed startups as of
              2026) and general-purpose telehealth platforms extending into behavioral health as a features bundle.
