      - number: '1.5'
        title: Milestones and chronology
        blocks:
          - type: paragraph
            body: >
              The public record supports a milestone chronology running from Lyra's 2015 founding through its 2026
              product and partnership expansions. The financing history is the most well-documented segment, anchored by
              SEC Form D filings. Six discrete Form D events between 2018 and 2022 constitute the primary-source
              backbone of the company's financing timeline. Earlier rounds (seed and Series A, likely 2015–2017) are not
              yet identified in individual SEC filings for this chapter and represent an evidence gap.


              Product milestones are less precisely dated in the current source set. The 2026 homepage and press page
              confirm recent product launches: Lyra AI (a clinically-rigorous AI assistant for member matching and
              triage) was described as scaling globally in May 2026; Manager Coaching was launched in 2026 to address
              organizational burnout; and comprehensive youth and young adult mental health care was launched in May
              2026. The Workday Wellness preferred partner program was announced in March 2026. These are all sourced
              from the Lyra press page, which is a company-controlled channel.


              One adverse milestone is documented by the wider industry context: mental health technology platforms
              broadly have faced scrutiny about employer-employee data access, with privacy advocates and media outlets
              raising concerns about whether employers can infer behavioral health status from aggregate data or usage
              patterns. Lyra's HIPAA notice explicitly prohibits disclosure of PHI to employers outside of aggregated,
              de-identified reporting, and the company's security page documents data loss prevention and separation of
              duties controls. No specific regulatory action, lawsuit, or data breach affecting Lyra has been confirmed
              in sources available for this chapter; that absence should be treated as an open question rather than a
              confirmed clean record.
