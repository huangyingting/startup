            title: No publicly disclosed NRR, churn, or renewal data creates a material diligence gap
            body: >
              Lyra does not publish net revenue retention, gross revenue retention, annual renewal rates, churn cohort
              data, or any contractual retention metric. For a private enterprise SaaS company at $5.58B valuation with
              700+ employers, the absence of these metrics is the single largest quantitative gap in the customer
              chapter. An NRR of 115–130% is plausible given the multi-year contract structure and absence of announced
              departures, but is an analyst estimate, not a disclosed figure. Investors and acquirers must obtain these
              metrics from the data room before any valuation anchor based on ARR growth is supportable.
