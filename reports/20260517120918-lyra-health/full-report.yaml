  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              Lyra Health operates at the intersection of two markets: the traditional employer-sponsored behavioral
              health and EAP market, and the emerging digital mental health platform market. The primary revenue
              mechanism is a per-employee-per-year (PEPY) subscription paid by employers on behalf of their covered
              workforce, placing Lyra firmly in the employer benefits channel rather than the consumer or clinical
              direct-pay channel [CM001].


              The relevant market boundary encompasses employer-sponsored mental health and substance use disorder (SUD)
              benefits delivered through digital platforms, including therapy, coaching, psychiatry, and self-guided
              care tools [CM002]. Included spend covers EAP contracts, standalone digital mental health point solutions,
              behavioral health carve-outs managed alongside medical benefits, and employee wellbeing platforms with
              clinical-grade mental health components. Excluded from Lyra's core addressable market are: consumer-facing
              mental health apps without employer contracts (e.g., BetterHelp direct-to-consumer), clinical behavioral
              health delivered exclusively through commercial insurance, government-funded Medicaid/Medicare behavioral
              health programs, and hospital-based inpatient psychiatric services.


              The primary status-quo substitute is the traditional EAP, a flat-fee commodity service historically
              offering three to eight counseling sessions per year at approximately $15–25 PEPY with 3–6% utilization
              [CM003]. Secondary substitutes include commercial health plan behavioral health carve-outs (Optum
              Behavioral Health, Magellan Health), telehealth platforms with mental health capacity (Teladoc/BetterHelp
              for Work), and employer-sponsored internal wellness programs. The Global Wellness Institute estimated the
              global wellness economy at $6.8 trillion in 2024 [CM004], with workplace wellness as a fast-growing
              sub-sector that overlaps Lyra's adjacency opportunities in preventive mental health and resilience
              programs.


              The Mental Health Parity and Addiction Equity Act (MHPAEA) and its 2023 final rule (effective January
              2025) are pivotal market boundary drivers. The rule requires self-insured and fully-insured employer
              health plans to ensure mental health and SUD benefits are no more restrictive than analogous
              medical/surgical benefits on a non-quantitative treatment limitation (NQTL) basis [CM005]. This regulatory
              requirement effectively mandates employer investment in qualifying mental health benefit infrastructure,
              expanding the market boundary to include compliance-driven spend that did not exist before the 2023 rule
              [CM006].


              Lyra's platform integrates: (a) employer-sponsored access to a curated network of therapists, coaches, and
              psychiatrists, (b) digital tools for between-session skill development, (c) analytics dashboards for
              HR/benefits teams, and (d) a benefits navigation service to match employees to the right care level
              [CM007]. This integrated model positions Lyra above commodity EAP (on the price/quality curve) and below
              full behavioral health carve-outs (on scope and cost), occupying a differentiated niche in what the
              industry increasingly calls the "comprehensive digital mental health" segment.
            claimRefs:
