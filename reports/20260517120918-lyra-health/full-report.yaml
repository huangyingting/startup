              valuations. Public comparables (e.g., Cerebral, Spring Health, Modern Health) have experienced significant
              valuation resets since 2022. Lyra's current implied enterprise value relative to estimated $200M ARR
              cannot be confirmed from available sources and should be evaluated against the post-2022 repricing
