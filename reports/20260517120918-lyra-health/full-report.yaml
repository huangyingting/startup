      - number: '4.4'
        title: 'Public traction and disclosed metrics: member scale, outcome claims, financial opacity'
        blocks:
          - type: paragraph
            body: >-
              Lyra's public traction evidence is strong on clinical reach and outcome quality, but silent on financial
              metrics. The company's official materials and press releases as of 2026 state: more than 20 million people
              served globally through direct employer contracts, more than 100 million accessible through health plan
              and partner relationships, and a provider network including 6,500+ children's mental health specialists
              and 15,500+ pediatric providers globally. These figures represent a significant operational scale—and a
              meaningful cost base—but Lyra does not translate member counts or provider network size into revenue, ARR,
              or retention figures.


              Industry and analyst estimates place Lyra's ARR in the $200M+ range as of 2022–2023, based on rough
              extrapolation from disclosed employer counts and PEPY pricing assumptions. This estimate is not confirmed
              by Lyra. The prior funding rounds and growth trajectory (roughly doubling customers in 2020) imply
              meaningful revenue scale, but the precision required for underwriting is unavailable from public sources.


              The Crunchbase article covering the Series E noted Lyra expected to serve more than 2 million members
              following the round in mid-2021. By March 2026, this has grown to 20 million—a tenfold increase in
              approximately five years—suggesting either a substantially broader definition of "members" (including
              health plan lives) or rapid organic growth in direct employer covered lives. This discrepancy matters for
              revenue underwriting because PEPY revenue accrues only on direct employer contracts, not on health plan
              partnerships where Lyra's economics may differ.


              The 2026 State of Workforce Mental Health Report, Lyra's sixth annual publication, surveyed 500 benefits
              leaders and 7,500 employees worldwide, documenting demand-side pressure: more than one-third of employees
              say they are surviving rather than thriving, and serious mental health needs have risen 67% in the past
              year per Lyra's report. These findings serve a dual commercial purpose—supporting the need for Lyra's
              products while positioning Lyra as the evidence-based authority in the category.
