      - number: '7.4'
        title: Financial and Model Risks
        blocks:
          - type: paragraph
            body: >-
              Lyra Health's $235M January 2022 Series F at a $5.58B valuation is the company's last public financing as
              of May 2026. In the 3+ years since, digital health has repriced substantially: CNBC documented 40-60%
              valuation declines from 2021-2022 peaks, and STAT News reported multiple digital mental health startup
              down-rounds in 2023. A Lyra financing at current sector multiples would likely occur materially below the
              2022 mark, creating a down-round that would dilute early investors, potentially trigger anti-dilution
              provisions, and create employee equity compensation headwinds.

              The company's burn rate and cash runway are not publicly disclosed. Based on estimated workforce size,
              clinical quality infrastructure costs, therapist contractor payments, and enterprise sales overhead,
              annual cash consumption is substantial. The runway to next financing is the single most critical financial
              risk variable not quantifiable from public sources. CNBC documented a marked 2023 slowdown in mental
              health startup funding, with investors requiring stronger unit economics, profitability timelines, and
              outcomes validation.

              Lyra's PEPM contract model creates enterprise concentration risk: employer churn or failure to expand
              within existing accounts reduces ARR without real-time visibility, as benefits contracts renew annually. A
              concentrated December-January renewal window creates lumpy revenue patterns and high- stakes annual
              retention risk. Therapist cost inflation is a structural margin risk: as the nationwide therapist shortage
              intensifies competition for contractor talent, session-based compensation will increase. Lyra's ability to
              pass these costs through to employers depends on pricing power relative to lower-cost alternatives -
              pricing power that is eroding as competitive intensity increases.

              TechCrunch's digital health layoff tracker documented dozens of mental health companies reducing headcount
              in 2023 during the funding crunch. Any similar cost reduction at Lyra would create both execution risk and
              talent confidence impairment. STAT News confirmed that companies that raised at peak 2021-2022 valuations
              faced the steepest repricing given investor focus on profitability timelines.
