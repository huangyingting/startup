      - number: '3.4'
        title: Feature, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: >-
              Feature differentiation across the enterprise mental health benefits landscape has converged
              substantially. All major digital challengers now offer coaching, therapy, self-guided programs, and some
              form of assessment-driven matching. The dimensions where Lyra maintains demonstrable differentiation are:
              (1) clinical depth and complexity of care—Lyra offers medication management, intensive outpatient support,
              and complex case navigation in-house, whereas Spring Health and Modern Health rely more on network
              referrals for high-acuity needs; (2) family and youth coverage, with over 6,500 children's specialists—an
              underserved segment where competitors have thinner networks; (3) outcomes transparency, backed by
              peer-reviewed research (26% reduction in overall health care claims costs for participants) and 12-month
              follow-up data (81% maintaining gains); and (4) AI-powered matching validated by JAMA Open publication,
              distinct from Spring Health's ML matching (also JAMA-published) and Modern Health's Adaptive Care Model,
              which relies on assessment routing rather than predictive matching.

              Pricing models across the category remain opaque. All major vendors price on a PEPM (per employee per
              month) or engaged-member model, with typical ranges of $3–7 PEPM for mid-market and negotiated enterprise
              pricing well below list for large accounts. Legacy EAPs anchor expectations at $1–3 PEPM (basic EAP, 3–5
              sessions). Digital-native challengers command premiums of 3–5× legacy EAP pricing when demonstrating ROI.
              The KFF 2023 Employer Health Benefits Survey found that 95% of employers plan to invest in total rewards,
              including mental health—validating demand but also intensifying competition for wallet share. Lyra, Spring
              Health, and Modern Health all decline to publish list prices, requiring custom procurement conversations
              that favor vendors with established relationships and reference customers.

              GTM and distribution power differs materially. Lyra has built direct employer relationships with companies
              across healthcare, construction, retail, and professional services, and expanded its reach through health
              plan partnerships (200M+ reachable through partners and plans per company disclosure). Spring Health's
              2026 Workday integration announcement (Lyra Health joined Workday Wellness as a Preferred Partner in March
              2026; Spring Health also integrates with Workday) illustrates the strategic importance of HR platform
              distribution. Modern Health emphasizes integration with existing HR and benefits workflows as a core
              feature. Legacy incumbents (Optum, Magellan) maintain dominant distribution through insurer channels but
              lack the digital product moat to win new RFPs.

              Trust and regulatory posture matters in procurement. NAMI's mental health parity advocacy and the 2008
              Mental Health Parity and Addiction Equity Act (MHPAEA) create a regulatory tailwind for employer
              investment in mental health—but also mandate minimum coverage standards that partly commoditize the basic
              EAP layer. Vendors differentiating on clinical outcomes and parity compliance (demonstrated network
              adequacy, outcomes reporting) benefit disproportionately. Lyra's March 2026 Workday Preferred Partner
              announcement and May 2026 youth care expansion signal continued investment in distribution reach and
              clinical breadth.
