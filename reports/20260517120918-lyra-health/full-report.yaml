              Spring Health's $3.3B valuation (January 2023), 20M+ covered lives, JAMA-published outcomes, and same-day
              appointment guarantee indicate it is tracking toward Lyra's competitive position in clinical credibility.
              The remaining differentiation points for Lyra—family and youth coverage depth, acute-care in-house
              management, and the 26% claims cost reduction metric—need to be maintained and expanded to preserve
              pricing and retention advantages in enterprise renewals where Spring Health is increasingly the
