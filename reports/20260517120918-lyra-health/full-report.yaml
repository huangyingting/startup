      items:
        - date: '2015'
          label: Founded by David Ebersman
          detail: >-
            Delaware corporation established in Burlingame, CA; former Facebook CFO builds employer mental health
            platform.
          tone: positive
          claimRefs:
            - CO001
            - CO011
        - date: 2018-02
          label: $45M round closes
          detail: 19 investors; earliest SEC Form D on record; likely Series B.
          tone: positive
          claimRefs:
            - CO019
        - date: 2020-02
          label: $75M round closes
          detail: 19 investors; SEC Form D filed March 2020; demand accelerating into COVID period.
          tone: positive
          claimRefs:
            - CO020
        - date: 2020-08
