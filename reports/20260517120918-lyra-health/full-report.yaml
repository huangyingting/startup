      - number: '6.3'
        title: Adoption Trajectory and Utilization Metrics
        blocks:
          - type: paragraph
            body: >
              Lyra's most differentiating customer metric is its utilization rate: 20–25% of covered employees actually
              engage with Lyra's services, compared to the traditional EAP industry benchmark of 3–6%. This 4–8×
              utilization uplift is central to Lyra's ROI argument—more employees treated means more total health
              outcomes improvement and a lower per-outcome cost when amortized across the full PEPY subscription. The
              homepage states employees "regain ≈4 hours of productivity per week, translating to $4,800 in annual
              savings per employee."

              Covered-lives trajectory: Lyra reached 10M covered lives in 2021 (as announced via PRNewswire), grew to
              10M+ by 2023 (per company background data), and expanded to 20M+ globally by 2026 (company homepage claim
              as of the run date). This trajectory implies an approximate doubling in covered lives between 2021 and
              2026, reflecting both new enterprise customer additions and expansion within existing accounts via upsell
              to additional benefit tiers (Lyra Empower, specialty care add-ons, pediatric/teen mental health). The
              employer count grew from fewer than 100 employers in 2019 to 700+ direct employer customers by 2023.

              Independently verified ROI data: Lyra's 2025 ROI study (independently verified, details accessible via
              executive summary) documents a 3:1 ROI ($3.04 saved per $1 spent). The underlying longitudinal study shows
              26% average annual savings on total healthcare costs for multiple customers over four years. These claims
              are supported by a study published in JAMA Psychiatry (referenced in Lyra's blog) and corroborate the
              directional outcome evidence across Lyra's platform. At the member level: 9 out of 10 Lyra members get
              better; 2× faster recoveries than traditional care; 81% of members maintained treatment gains at a
              12-month follow-up. These are company-reported outcomes based on standardized clinical assessment tools
              (PHQ-9, GAD-7) administered to members, though the independent verification of the specific methodology is
              partially disclosed.
