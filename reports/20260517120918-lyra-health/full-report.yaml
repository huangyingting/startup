  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: 'Revenue model and pricing: PEPY subscription with custom employer pricing'
        blocks:
          - type: paragraph
            body: >-
              Lyra Health generates revenue through a per-employee-per-year (PEPY) subscription model sold to large
              employers. Employers pay a negotiated annual fee for access to Lyra's platform and clinical network on
              behalf of covered employees. The company's own website states pricing is "tailored to your organization's
              needs" and requires direct engagement with a partnerships team, meaning no public list price exists for
              any tier. Industry estimates for comparable comprehensive mental health solutions place employer PEPY
              rates in the $200–$400 range for the active covered population, though actual contract values depend on
              scope of services, utilization guarantees, and employee count.


              Beyond the core employer subscription, Lyra has expanded its revenue surface through health plan and
              partner relationships. As of March 2026, Lyra serves more than 20 million people globally through direct
              employer contracts and more than 100 million through health plan and partner relationships. The Workday
              partnership announced in March 2026, which designates Lyra as Workday Wellness's Preferred Mental Health
              Partner, exemplifies how distribution partnerships extend reach without requiring full direct-sales
              investment per account.


              Revenue recognition for a PEPY model is relatively clean: fees are typically recognized ratably over the
              contract term on a subscription basis. Utilization-based add-ons—sessions, specialist referrals,
              medication management consults—may carry a per-event recognition component, introducing some volatility.
              Lyra's product portfolio now spans preventive well-being tools, clinical therapy, medication management,
              family and pediatric care, and manager coaching, each potentially priced as separate modules or bundled
              into a comprehensive PEPY rate. Public materials do not disclose the revenue mix across these segments.
