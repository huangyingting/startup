      - number: '1.3'
        title: Funding history and capital stack
        blocks:
          - type: paragraph
            body: >
              Lyra Health has raised capital across six disclosed Form D financing events documented in SEC EDGAR, plus
              earlier seed and Series A rounds not yet confirmed by individual filings in the available public record.
              The six events account for approximately $851.7 million in aggregate; the company's total raised is
              estimated at approximately $910 million when earlier rounds are included, consistent with the $910 million
              figure cited in public reporting.


              SEC Form D chronology (all CIK 0001733914, Delaware incorporation confirmed in each filing): The earliest
              filing (June 2018, sale date February 2018) shows $45 million raised from 19 investors. A second round
              (filed March 2020, sale date February 2020) shows $75 million raised from 19 investors. A third round
              (filed August 2020, sale date August 2020) shows $110 million raised from 23 investors. A fourth round
              (filed January 2021, sale date December 2020) shows $186.7 million raised from 33 investors; public
              reporting associated with this event described a valuation of $2.25 billion and labeled it as a Series D
              or the initial close of Series E. A fifth round (filed June 2021, sale date June 2021) shows $200 million
              raised from 28 investors; PR Newswire described this as "Series E Funding." The sixth and most recent Form
              D (filed January 2022, sale date January 7, 2022) shows $234,999,956 raised from 4 investors,
              corresponding to the widely reported $235 million Series F at a post-money valuation of $5.58 billion.


              The Series F was led by Dragoneer Investment Group. Public reporting at the time named Sequoia Capital,
              Coatue Management, BlackRock, and Fidelity Investments as continuing or new investors across the company's
              later rounds, though the SEC Form D does not identify individual investors by name. The company also
              reported that its own employees participated as investors. The Series F's investor count of only 4
              (compared to 33 for the prior round) is consistent with a concentrated institutional syndicate or a small
              group of large-check participants.


              No debt facility, convertible notes, or secondary transaction data has been confirmed from available
              sources. The company has not disclosed a path to liquidity (IPO or acquisition), and its valuation
              reflects late-2021/early-2022 peak private market pricing that has not been updated in a publicly
              available source since January 2022.
