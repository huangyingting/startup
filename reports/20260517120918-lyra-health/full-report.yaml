  - id: FE002
    title: Customer workflow / operating flow
    type: journey-map
    layout: wide
    summary: >-
      The Lyra member journey flows from employer benefit enrollment through AI-powered intake and matching, into
      structured care delivery with standardized outcome measurement, and ultimately to graduation or ongoing
      maintenance — with Lyra AI providing between-session support throughout.
    data:
      items:
        - label: Enrollment
          detail: >-
            Employer activates Lyra benefit; employee registers via app or web portal; SSO authentication against
            employer HRIS confirms eligibility. Employer-specific branding and session allowances configured by HR.
          touchpoints:
            - Employer benefits portal and HRIS/SSO integration
            - Lyra mobile app (iOS/Android) or lyrahealth.com web portal
            - EAP migration support for organizations transitioning from legacy programs
        - label: Intake and Assessment
          detail: >-
            Member completes a short intake assessment using standardized and custom questions; Lyra AI free-text option
            (in pilot as of 2026) allows natural-language self-description; PHQ-9/GAD-7 baseline established.
          touchpoints:
            - AI-powered free-text intake or guided dropdown assessment
            - Baseline standardized outcome assessments (PHQ-9, GAD-7, AUDIT)
            - Crisis screening for immediate safety needs
        - label: AI-Powered Matching
          detail: >-
            Proprietary algorithm analyzes intake data, member preferences, and provider availability to recommend care
            modality (coaching/therapy/medication/digital program) and specific providers; member confirms match.
          touchpoints:
            - AI matching engine processing intake responses and historical outcomes data
            - Provider profile pages with clinical specialties and availability
            - First appointment typically available within days
        - label: Care Delivery
          detail: >-
            Member attends video or in-person sessions; coach or therapist delivers evidence-based care (CBT, DBT,
            mindfulness, or other modalities); provider documents sessions in Lyra Engage EHR; psychiatric medication
            management handled by network psychiatrists where needed.
          touchpoints:
            - Lyra Engage EHR for provider documentation and scheduling
            - Video telehealth platform for remote sessions
            - Digital programs and skills exercises between sessions
            - Lyra AI 24/7 between-session support (coaching pilot, expanding 2026)
        - label: Outcome Measurement
          detail: >-
            Standardized assessments (PHQ-9, GAD-7) repeated at regular intervals throughout care; results fed to
            provider dashboard and employer analytics; Clinical Managers use Care Insights Hub insights to support
            provider quality improvement.
          touchpoints:
            - Longitudinal outcomes database
            - Provider-facing Care Insights Hub analytics (Lyra Engage EHR)
            - Employer utilization and outcomes dashboard
        - label: Graduation or Ongoing Support
          detail: >-
            Member achieves symptom reduction goals and graduates from structured care; transitions to self-paced
            digital programs or Lyra AI maintenance support; option to return to care if needed; employer sees aggregate
            cohort outcomes in analytics dashboard.
          touchpoints:
            - Digital programs and Lyra AI for maintenance and relapse prevention
            - Employer ROI reporting (turnover, productivity, medical cost reduction)
            - Re-engagement pathway if symptoms recur
    approximationNotes: >-
      Specific session counts, session-to-graduation timelines, and exact employer configuration options are not
      publicly disclosed; this flow reflects publicly available product descriptions.
    claimRefs:
      - CE001
      - CE004
      - CE005
      - CE006
      - CE013
      - CE018
      - CE020
  - id: FE003
    title: Critical dependency map
    type: dag
    layout: wide
    summary: >-
      Lyra's platform is critically dependent on AWS cloud infrastructure, a curated provider network, and HIPAA/
      HITRUST compliance. The AI matching engine depends on the proprietary outcomes database, which itself depends on
      the network and EHR systems — creating a flywheel where network scale drives outcome data quality and matching
      accuracy.
    data:
      nodes:
        - id: aws
          label: AWS Cloud Infrastructure
          detail: Hosts all compute, storage, and networking; HIPAA-compliant; GuardDuty/Inspector/KMS/ZTNA
          tone: positive
        - id: hipaa
          label: HIPAA / HITRUST Compliance Framework
          detail: Annual HITRUST CSF audit; HIPAA BAA with employer partners; governs all PHI handling
          tone: warning
        - id: network
          label: Therapist / Coach / Psychiatrist Network
          detail: 4,000+ curated providers; network quality is a core product claim
          tone: positive
        - id: outcomes
          label: Proprietary Outcomes Database
          detail: Millions of sessions of PHQ-9/GAD-7 data; training data for matching algorithm
          tone: positive
        - id: matching
          label: AI / ML Matching Engine
          detail: Routes members to care type and provider; trained on outcomes data; black-box architecture
          tone: warning
        - id: ehr
          label: Lyra Engage EHR
          detail: Provider clinical documentation, scheduling, Care Insights Hub analytics layer
          tone: positive
        - id: app
          label: Employee App and Web Portal
          detail: Member-facing access surface; SSO authentication; Lyra AI embedded (pilot)
          tone: positive
        - id: hris
          label: HRIS / SSO Integration Layer
          detail: Eligibility verification; member authentication; Workday/SAP connectors
          tone: neutral
      edges:
        - from: aws
          to: matching
          label: Hosts and scales matching engine
        - from: aws
          to: ehr
          label: Hosts Lyra Engage EHR and Care Insights Hub
        - from: aws
          to: outcomes
          label: Hosts and encrypts outcomes database
        - from: aws
          to: app
          label: Serves member-facing application
        - from: hipaa
          to: aws
          label: Compliance requirements govern infrastructure config
        - from: hipaa
          to: ehr
          label: PHI handling standards govern EHR design
        - from: network
          to: ehr
          label: Providers generate session and outcome data
        - from: outcomes
          to: matching
          label: Historical outcomes data trains and informs algorithm
        - from: matching
          to: app
          label: Match results surfaced to members via app
        - from: ehr
          to: outcomes
          label: Session data and assessments feed outcomes DB
        - from: hris
          to: app
          label: Member eligibility and authentication
        - from: network
          to: outcomes
          label: Provider network scale drives outcome data volume
