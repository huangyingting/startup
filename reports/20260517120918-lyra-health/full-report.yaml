              The most defensible product asset is the longitudinal outcomes database built from millions of
              standardized assessments (PHQ-9, GAD-7, AUDIT) across therapy and coaching sessions. This dataset drives
              matching algorithm training, supports the peer-reviewed outcomes research that validates the 2x recovery
              and 26% cost-reduction claims, and differentiates Lyra from traditional EAPs that do not measure clinical
              outcomes systematically. The moat deepens as more sessions generate more outcome data.
