      - number: '7.6'
        title: Mitigations, Monitoring, and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Lyra Health's primary risk mitigations include HIPAA BAA compliance infrastructure with employer
              customers, state licensure monitoring programs for contracted therapists, outcomes measurement frameworks
              using PHQ-9 and GAD-7, evidence-based therapy protocols (CBT, DBT, MBSR), and executive- level employer
              relationship management. The company's clinical model - combining AI-based matching, measurement-based
              care, and a curated therapist network - provides product differentiation relative to commodity EAP
              alternatives, creating stickiness with HR and benefits leaders who have invested in implementation.

              Three thesis-break triggers requiring investment re-evaluation: (1) a material HIPAA enforcement action,
              FTC settlement, or class-action data breach settlement of $50M or greater, indicating a systemic data
              practice failure analogous to BetterHelp; (2) evidence of systematic therapist quality or access failure
              visible in employer-reported NPS below 50 or annual employer customer churn exceeding 15%; (3) a confirmed
              down-round financing at more than 40% below the 2022 $5.58B valuation, indicating structural business
              model impairment or investor confidence loss.

              Key monitoring indicators on a quarterly basis: FTC enforcement docket for mental health app actions;
              DOL/state MHPAEA audit activity against Lyra employer clients; therapist contractor network wait-time
              transparency; employer customer renewal rate and net new logo count; capital raise announcements or
              extended fundraising absence as a proxy for runway; and Spring Health/Modern Health competitive win
              signals in employer RFP news and industry publications. Annual diligence asks: updated audited financials,
              therapist network density report, employer NPS score, and data-flow privacy audit.
            claimRefs:
              - CR046
              - CR047
              - CR048
          - type: table
            tableRef: TR005
            claimRefs:
              - CR046
              - CR047
              - CR048
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: >
              Lyra Health most recent financing event was a $235M Series F closed in January 2022 at a $5.58B post-money
              valuation, confirmed by the SEC Form D regulatory filing (CIK 0001733914, adsh: 0001733914-22-000001, file
              date 2022-01-19, file_num: 021-429972) and reported by Axios. Seven total Form D filings on EDGAR span the
              company's fundraising from Series B (June 2018) through Series F (January 2022), confirming total capital
              raised of approximately $910M. The company is incorporated in Delaware and headquartered in Burlingame,
              CA. Investors include General Catalyst, Casdin Capital, and Dragoneer Investment Group.


              The Series F occurred at the peak of the digital health bull market. Rock Health 2022 and 2023 year-end
              digital health reports document that total sector funding fell from $29.1B (2021) to $15.3B (2022) to
              $10.7B (2023), with late-stage median valuations contracting 40%+ from 2021 peaks. The $5.58B last-round
              price implied a 22-28x ARR multiple on an estimated $200-250M ARR base, substantially above the 5-12x ARR
              that comparable public and private companies traded at in 2024-2025. Lyra Health has not disclosed a
              follow-on financing round since January 2022, a four-year gap consistent with management avoiding a
              market-clearing down-round price.
            claimRefs: []
          - type: table
            tableRef: TV001
            claimRefs: []
          - type: figure
            figureRef: FV001
            claimRefs: []
          - type: figure
            figureRef: FV004
            claimRefs: []
      - number: '8.2'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Public company comparables provide a direct market signal for Lyra Health's implied fair value. Teladoc
              Health (TDOC), the most broadly analogous public telehealth platform with a dedicated mental health
              segment (BetterHelp), traded at approximately 0.8-1.5x trailing revenue as of 2025-2026 on a $3-4B market
              cap with ~$2.5-2.7B revenue. Teladoc 90%+ stock decline from its 2021 peak is the most salient
              illustration of digital health multiple compression. LifeStance Health (LFST) traded at 1-2x revenue with
              a $1-2B market cap. Accolade (ACCD) traded at 1.3-2x revenue with a $400-600M market cap. Talkspace (TALK)
              traded at 2-2.5x revenue with a $300-400M market cap.


              Applying the public comp range of 1-3x revenue to Lyra's estimated $200-250M ARR, with a 50-100% private
              market premium for clinical quality and employer market leadership, implies an estimated current fair
              value range of $2-4B, a 28-64% markdown from the $5.58B Series F price. The Spring Health 2023 Series D at
              $3.3B on $100-150M ARR provides a more favorable private market anchor. Blending public and private comp
              sets, the midpoint fair value estimate is approximately $3B, equivalent to 12-15x ARR.
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
          - type: figure
            figureRef: FV002
            claimRefs: []
      - number: '8.3'
        title: Bull Base and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              The bull case (20% probability) assumes Lyra Health ARR grows 2x to $400-500M by 2027-2028 via continued
              Fortune 500 employer expansion. Digital health multiples partially recover to 10-15x ARR. Valuation
              reaches $4-6B, approximately 0.7-1.1x return on the $5.58B Series F entry price. A successful IPO becomes
              possible in 2027 if the company nears EBITDA breakeven. This scenario requires no major employer churn,
              therapist supply stabilization, favorable MHPAEA regulatory enforcement momentum, and broader market
              multiple recovery.


              The base case (45% probability) assumes 15-25% ARR growth to $250-300M by 2026-2027, retention of core
              enterprise accounts, and an eventual strategic acquisition at $2-3B, a 0.36-0.54x return on the Series F
              basis. One to two additional financing rounds at $2-3B implied valuation are likely, introducing further
              dilution. The bear case (35% probability) assumes funding difficulty, therapist supply constraints, and
              competitive pressure from Spring Health and Headspace Care, leading to ARR plateau at $150-200M, multiple
              compression to 4-6x ARR, and an exit at $0.8-1.5B, an 86-73% loss from the Series F price.
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs: []
          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.4'
        title: Investment Thesis and Anti-thesis
        blocks:
          - type: paragraph
            body: >
              The investment thesis rests on four pillars: (1) Lyra Health licensed-clinician delivery model provides
              demonstrably higher clinical outcomes and employer satisfaction than legacy EAP programs, creating
              switching costs and pricing power; (2) the 500+ employer customer base with Fortune 500 anchors creates a
              durable revenue foundation; (3) the 2024 MHPAEA parity rule creates structural demand for network-adequate
              EAP alternatives, a regulatory tailwind that strengthens Lyra's competitive position; and (4) strategic
              acquirer interest from large insurers creates a credible exit path at $3-5B even absent an IPO.


              The anti-thesis is equally compelling. The $5.58B last-round price priced in all thesis pillars at the
              market's most optimistic point in January 2022. Public mental health company multiples have since reset to
              1-3x revenue from 20-30x, creating a permanent re-rating risk for companies still carrying peak-era
              valuations. Spring Health ($3.3B, 2023) and Headspace Care compete directly at lower implied valuations.
              Lyra's therapist-dependent delivery model creates a structural capacity constraint that technology
              investments cannot easily eliminate. And the preference overhang from $910M raised means that common and
              late-stage preferred holders bear a disproportionate share of downside risk.
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs: []
      - number: '8.5'
        title: Recommendation Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              The investment recommendation is Track: monitor for re-entry at a materially lower price or definitive
              positive catalyst. The current valuation context — $5.58B last round (January 2022), estimated $2-4B fair
              value as of 2026, no confirmed IPO timeline, no publicly disclosed follow-on financing — does not support
              new investment at the last-round price. Confidence is Medium. Risk rating is High: illiquidity, preference
              overhang, uncertain profitability, and structural competition from Spring Health and Headspace Care.
              Valuation stance is Stretched.


              Re-entry conditions that would trigger upgrade to Conditional Positive: (1) confirmed down-round at $2-3B
              creating an attractive entry multiple; (2) audited ARR confirming $250M+ with 20%+ growth and improving
              unit economics; or (3) strategic acquisition engagement at a price within the base-to-bull range. IPO
              readiness is limited, with 2-3 additional years likely required. Strategic M&A by a large insurer at $3-5B
              remains the most plausible exit within a 3-5 year horizon. Final diligence asks: (1) audited revenue/ARR;
              (2) full cap table with preference terms; (3) employer customer concentration data; (4)
              path-to-profitability plan and burn rate; (5) NRR by employer cohort; (6) board composition and governance
              documents.
            claimRefs: []
          - type: table
            tableRef: TV005
            claimRefs: []
          - type: table
            tableRef: TV006
            claimRefs: []
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Track at Current Price — Re-entry Requires Down-Round or Catalyst
            body: >-
              Lyra Health $5.58B Series F price (January 2022) reflects the peak of the digital health bull market and
              is 40-64% above the estimated $2-4B fair value implied by normalized market multiples as of 2026. New
              investment at the last-round basis delivers a negative expected return in both the base and bear cases.
              The appropriate posture is Track: monitor for a down-round entry at $2-3B, confirmed revenue growth
              trajectory, or strategic M&A engagement that validates the base-to-bull valuation range.
            calloutType: insight
            claimRefs:
              - CV015
              - CV016
              - CV026
          - type: callout
            title: Preference Overhang — $910M Raised Creates Downside Priority Risk
            body: >-
              Lyra Health $910M+ cumulative fundraising across seven rounds creates a layered liquidation preference
              stack that senior preferred holders receive ahead of Series F preferred in downside exit scenarios. In a
              base-case exit at $2-3B, effective return to Series F holders may be substantially below headline value
              depending on preference terms, participation rights, and anti-dilution provisions. Full cap table review
              with preference waterfall modeling is a critical pre-investment requirement.
            calloutType: insight
            claimRefs:
              - CV034
              - CV035
          - type: callout
            title: Therapist Supply Constraint — Structural Ceiling on Clinical Scaling
            body: >-
              Lyra Health licensed-clinician delivery model creates a structural capacity ceiling that technology
              investments cannot easily overcome. CB Insights documents 8,000-12,000+ unfilled licensed therapist
              positions in the U.S. as of 2023. Scaling clinical quality at the rates required for the bull case
              ($400-500M ARR) would require significant therapist compensation increases, compressing margins and
              extending the path to profitability. This constraint is the primary structural risk differentiating Lyra
              from pure tech-platform mental health models.
            calloutType: insight
            claimRefs:
              - CV024
