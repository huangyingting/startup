      - number: '5.5'
        title: Trust, safety, privacy, and compliance
        blocks:
          - type: paragraph
            body: >-
              Lyra's security posture is documented on a dedicated security page that is unusually detailed for a
              digital-health startup. The program covers organizational controls (policies, procedures, security
              training, background checks), infrastructure controls (AWS-native tooling, WAF, network segmentation,
              ZTNA), endpoint controls (full-disk encryption, MDM, EDR, application denylisting), identity and access
              management (least privilege, RBAC, MFA, monthly key-access reviews), and an incident response program
              aligned to HIPAA and HITRUST CSF.


              Lyra is HIPAA compliant and CCPA/CPRA compliant. It undergoes annual HITRUST CSF audits, which is a
              rigorous integrated security and privacy framework that incorporates HIPAA, HITECH, NIST, ISO, PCI, FTC,
              and COBIT standards. Lyra also maintains SOC 2 Type II certification (referenced in the company
              background), although the full audit report is not publicly accessible — only a letter of attestation can
              be provided upon request. Third-party annual penetration tests are conducted on Lyra's web application,
              with a letter of attestation also available upon request.


              Data encryption follows a minimum standard of TLS 1.2 in transit and AES-256 at rest, implemented using
              AWS KMS with customer-specific encryption keys for database-level protection. All employee accounts
              require MFA. Administrative access to production systems is restricted to authorized personnel connected
              via ZTNA. Data loss prevention (DLP) controls monitor communication and collaboration platforms, and
              portable media (USB) is prohibited.


              The Lyra AI deployment is governed by the Polaris Principles, which include safety and ethics as paramount
              and human provider oversight throughout. The Care Insights Hub similarly positions human Clinical Managers
              as decision-makers with AI surfacing insights rather than making clinical determinations. This layered
              human-in-the-loop design is consistent with emerging standards for AI in clinical settings, but specific
              third-party audits of the AI governance framework have not been publicly disclosed.
