      - number: '1.4'
        title: Scale metrics and market position
        blocks:
          - type: paragraph
            body: >
              Lyra's 2026 public homepage is the most current available scale indicator for this chapter. As of 2026,
              the company describes itself as "the leading provider of mental health care, serving more than 20 million
              people globally through direct employer contracts." The homepage also cites pathways for more than 200
              million people through partners and plans. The 30,000-plus global provider network and 100,000-plus hours
              of annual clinical oversight figures appear on the current homepage as network depth metrics.


              Outcomes data cited by Lyra on its own website includes: 9 in 10 members improve; recoveries happen twice
              as fast as with traditional care; 81 percent of members maintain gains at 12-month follow-up; workers
              regain approximately 4 hours of productivity per week, translating to $4,800 in annual savings per
              employee; and a 26 percent reduction in overall health care claims costs for participants annually. These
              figures are company self-reported and most relevant as marketing benchmarks; independent peer-reviewed
              validation would require access to Lyra's published research. The company does reference "extensive
              peer-reviewed published research" confirming the care model on its homepage, but specific citations and
              study links are not captured from the homepage alone.


              Revenue, headcount, and individual customer details remain private. Background research for this chapter
              estimates annual recurring revenue at approximately $200 million and headcount at roughly 1,100 to 1,200
              employees, but neither figure is confirmed from public filings or independent sources in the current run.
              Named customers cited in public media coverage include Morgan Stanley, Uber, Starbucks, Zoom, and
              Genentech, but specific contract terms, revenue contribution, and renewal status are not publicly
              available. The 2026 press page confirms a Workday Wellness preferred partner announcement in March 2026,
              which extends Lyra's distribution into the Workday HR ecosystem.
