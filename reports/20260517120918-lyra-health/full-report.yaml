      - number: '4.6'
        title: 'Financial verdict: revenue model validated, margin and runway require management data'
        blocks:
          - type: paragraph
            body: >-
              The positive financial case rests on four confirmed pillars. First, the PEPY employer subscription model
              is commercially mature: Lyra has contracts at enterprise scale, meaningful clinical outcomes that drive
              renewal, and a growing distribution ecosystem via Workday and health plan partnerships. Second, the ROI
              case for buyers is clinically documented and quantified—26% reduction in overall healthcare claims costs
              and $4,806 in annual productivity gains per employee per employee receiving care are defensible public
              figures. Third, the capital raise history (six rounds, $851M confirmed via SEC filings) implies sustained
              institutional confidence. Fourth, product investment continues into 2026 with AI care search, manager
              coaching, and pediatric acute care expansion, each of which has market logic as a premium upsell or
              customer retention driver.


              The negative case centers on three structural opacity risks. First, no revenue, gross margin, cash, burn,
              or runway figure is public—meaning the quality and sustainability of Lyra's financial position cannot be
              independently assessed. Second, the no-public-raise period since January 2022 creates ambiguity about
              capital adequacy: Lyra could be profitable or near-profitable, or it could be extending runway while
              preparing a transaction. Third, while clinical outcomes data is strong, the cost of delivering those
              outcomes at scale (clinical staffing, care coordination, pediatric specialty networks) is inherently
              expensive and difficult to model without segment-level margin disclosure.


              Digital health valuations as a category came under significant pressure from 2022 through 2024, with many
              2021- 2022 mega-round recipients facing down rounds or flat rounds in subsequent fundraises. Lyra has not
              publicly disclosed a down round or restructuring, but the sector-wide correction makes the $5.58B Series F
              valuation a data point that requires verification against current business performance before relying on
              it as a floor.


              The underwriting conclusion: Lyra's demand signal is strong, its product investment is visible, and its
              capital history is independently confirmed. However, revenue quality, margin path, and capital adequacy
              all require management-supplied data before this chapter can support a full financial diligence
              conclusion.
