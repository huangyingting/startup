  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, Legal, and Privacy Risks
        blocks:
          - type: paragraph
            body: >-
              Lyra Health operates at the intersection of healthcare privacy, employment benefits regulation, and mental
              health parity enforcement. HIPAA compliance is foundational: Lyra operates as a Business Associate (BA) to
              its self-insured employer customers, requiring HIPAA Business Associate Agreements with every employer
              contract. Mental health records including psychotherapy notes, substance use disorder records, and
              suicidal ideation documentation are among the most sensitive PHI categories, subject to both HIPAA and
              enhanced state protections. HHS Office for Civil Rights enforces HIPAA with civil monetary penalties up to
              $1.9M per violation category annually; cloud-based platforms require encryption at rest and in transit,
              access controls, audit logging, and minimum-necessary access protocols per HHS and HealthIT.gov guidance.

              The November 2023 Mental Health Parity Final Rule (88 FR 78707) significantly expanded MHPAEA obligations:
              employer health plans must now conduct and document comparative NQTL analyses showing mental health
              benefit design is no more restrictive than medical/surgical benefits, enforced by DOL, HHS, and Treasury.
              NAMI's policy analysis confirms enforcement is accelerating. While this regulation binds Lyra's employer
              customers primarily, it creates downstream pressure on Lyra's session limits, provider network adequacy,
              and access standard design.

              FTC enforcement in digital mental health has escalated sharply. The FTC's September 2023 report on mental
              health apps documented widespread data sharing with advertising platforms. The $7.8M BetterHelp FTC
              settlement (June 2023) for sharing data with Facebook and Snapchat established direct precedent: any
              digital mental health platform using third-party tracking pixels or advertising SDKs without consent faces
              parallel FTC Health Breach Notification Rule and HIPAA exposure. Wired, the Washington Post, Mozilla
              Foundation's Privacy Not Included review, TechCrunch, and the Wall Street Journal have all documented
              industry-wide data-sharing practices that create the enforcement context.

              California's CMIA prohibits unauthorized medical information disclosure and imposes statutory damages of
              $1,000 per violation plus actual damages and attorney fees. Lyra's San Francisco headquarters and
              substantial California employer customer base make CMIA compliance a material ongoing obligation with
              class-action risk. The 50-state telehealth licensure patchwork requires every Lyra contractor therapist to
              hold a valid license in the member's state; CCHPCA confirms continuing state-by-state variation in
              telehealth parity and interstate compact coverage (PSYPACT covers psychology but not all license types).
              APA telepsychology guidelines require platform-level enforcement of consent, emergency protocols, and
              documentation standards.

              Wrongful denial-of-care claims are a structural legal risk if access barriers prevent medically necessary
              care. Therapist malpractice risk is partly mitigated by the independent contractor structure, but
              platform-level liability for negligent credentialing, poor matching, or failure to escalate crisis
              situations remains. No material HIPAA enforcement actions or lawsuits against Lyra Health are publicly
              disclosed as of May 2026.
