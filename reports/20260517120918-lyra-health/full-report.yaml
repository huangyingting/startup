      - number: '2.3'
        title: Buyer and Segment Analysis
        blocks:
          - type: paragraph
            body: >
              Lyra Health's commercial model creates a three-party structure: the employer (buyer and payer), the
              employee (user and beneficiary), and the licensed clinician within Lyra's network (service provider)
              [CM022]. The buying decision rests with VP-level or Director-level HR and Benefits leadership, typically
              reporting to the CHRO, with PEPY rates ranging from $50 (legacy EAP-grade) to $500 (premium integrated
              platforms) [CM023].


              The typical enterprise procurement cycle is 12–18 months, with annual open enrollment driving natural
              replacement windows. Key buying criteria include: clinical outcomes data, employee utilization rates,
              HIPAA compliance, integration with existing EAP and health plan infrastructure, and CFO-accessible ROI
              quantification [CM024].


              **Large Enterprise (10,000+ employees)** is Lyra's primary commercial focus. Named confirmed customers
              include Starbucks (2020), Lyft, and Stanford University [CM025]. The 2023 MHPAEA final rule compliance
              requirements favor platforms with clinical oversight and outcomes data, giving Lyra a structural advantage
              in compliance-driven procurement at large self-insured employers [CM026].


              **Mid-Market (1,000–10,000 employees)** is a growing but less penetrated segment. CNBC reported in May
              2022 that Lyra was expanding its employer base, but the majority of confirmed customers remain enterprise
              accounts [CM027]. Mid-market employers have tighter PEPY budgets of $75–150 and greater cost sensitivity
              [CM028].


              **Public sector and union segments** are not confirmed current Lyra priorities; no public case studies
              feature these segments [CM029].


              **Employee/User dynamics:** Traditional EAP utilization averages 3–6%; Lyra claims significantly higher
              utilization through its care navigation model, though independent audits of this figure are not available.
              G2 user reviews of Lyra Health are generally positive on therapist quality and care navigation, with some
              reviewers noting geographic coverage gaps in the therapist network [CM030].
