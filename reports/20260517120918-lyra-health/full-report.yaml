      - number: '4.3'
        title: 'Cost structure and gross margin: clinical workforce dominates, technology scales'
        blocks:
          - type: paragraph
            body: >-
              Lyra's cost structure reflects a clinical services delivery model layered on a technology platform. The
              largest cost component is the clinical workforce: therapists, coaches, medication management providers,
              and care coordinators employed or contracted through Lyra Clinical Associates P.C. and affiliated
              professional practices. A company of Lyra's scale—supporting 20 million members globally—carries a
              significant variable cost base tied directly to session volume and clinical staffing. Bureau of Labor
              Statistics data shows mental health counselors and therapists earn median annual wages of roughly
              $50,000–$80,000 depending on credential and specialization, and Lyra's clinical delivery likely involves
              both in-house professionals and a contractor marketplace, each with distinct cost profiles.


              A second major cost category is technology development and infrastructure. Lyra has invested in AI-powered
              matching, care search, provider management, outcomes measurement, and now the Lyra Empower platform. The
              2025 launch of free-text AI care search—adopted by 37% of members who were offered it in early
              pilots—signals ongoing investment in the AI layer that drives platform differentiation and reduces manual
              care-navigation overhead.


              Sales, marketing, and G&A represent the third cost bucket. Enterprise benefits sales requires a direct
              field force, benefits consultant partnerships, and deep account management. G&A includes the legal,
              compliance, and insurance costs of operating in a regulated clinical services environment.


              Gross margin for comparable PEPY/clinical delivery companies typically sits in the 50–70% range. Lyra's
              comprehensive model—including medication management, acute care coordination, and pediatric
              services—likely compresses margin toward the lower end of that range relative to pure software models, but
              still meaningfully above traditional behavioral health provider economics. The 54% reduction in pediatric
              healthcare spend ($3,307 average savings per child) illustrates the cost-offset logic Lyra sells to
              employers, but it does not expose Lyra's own clinical delivery costs. No gross margin figure has been
              disclosed publicly.
