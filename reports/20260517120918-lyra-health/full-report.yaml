      - number: '2.5'
        title: Sizing and Diligence Gaps
        blocks:
          - type: paragraph
            body: >
              Several structural data gaps affect confidence in the market analysis and should be addressed in formal
              diligence.


              **Gap 1 — No Authoritative Market Size.** No independent market research firm publishes a clean, auditable
              estimate for "US employer-sponsored digital mental health platforms" as a discrete category. IBISWorld's
              EAP figure (~$7B) undercounts the digital segment; Grand View/Allied Market Research "digital mental
              health" figures overcount by including consumer apps. Lyra's management-cited "$15B+" TAM is unverified
              [CM043].


              **Gap 2 — PEPY Revenue Verification.** Lyra's contracted PEPY rates are not publicly disclosed; published
              benchmarks range from $100 to $500, and the blended rate across Lyra's customer base — the key SOM input —
              is unknown [CM044]. Customer-level PEPY validation via reference calls is the definitive diligence step.


              **Gap 3 — Utilization and Renewal Rates.** Lyra's claimed utilization rates above EAP industry averages
              have not been independently audited. If measurement includes non-clinical coaching or digital tool
              engagement, headline figures may overstate clinical engagement [CM045].


              **Gap 4 — Valuation Currency.** Lyra raised $235M at a $5.58B valuation in January 2022; CNBC reported in
              November 2023 that digital health valuations had declined significantly, with multiple companies accepting
              down rounds. No subsequent Lyra funding has been announced, leaving the 2022 mark as the only reference
              point [CM046]. Competitor Spring Health was valued at $2.5B in September 2023, Headspace/Ginger at ~$3B
              upon their 2021 merger, and Modern Health has not disclosed its current valuation [CM047].
