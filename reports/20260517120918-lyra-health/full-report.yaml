      - number: '5.2'
        title: Platform architecture and operating model
        blocks:
          - type: paragraph
            body: >-
              Lyra's platform is organized around three front-end portals — member-facing app, provider-facing EHR, and
              employer-facing dashboard — all running on a HIPAA-compliant cloud built on Amazon Web Services. The
              security page published by Lyra explicitly confirms AWS as the cloud provider and lists specific
              AWS-native security services in use: GuardDuty for anomaly detection, Inspector for vulnerability
              scanning, IAM Access Analyzer for access governance, and Security Hub as the unified security posture
              dashboard. Lyra states it follows the AWS Well-Architected Framework as its configuration baseline.


              The matching layer is a central AI/ML engine that routes incoming members to the appropriate care modality
              (coaching, therapy, medication management, or digital program) and then to a specific provider based on
              clinical fit, availability, and member preferences. Lyra does not publicly disclose the algorithmic
              details of this matching engine, which is a material diligence gap given that it is positioned as the
              platform's core intellectual property.


              Lyra Engage EHR is the provider-side clinical management system. Within Lyra Engage, the Care Insights Hub
              (launched May 2026) is described as an AI-powered capability that uses client interaction data and
              clinician-scored evaluations, with human oversight at every step, to surface session-level patterns for
              providers and their assigned Clinical Managers. This positions Lyra Engage beyond basic scheduling and
              documentation into a continuous quality-improvement loop that could differentiate its provider retention
              and care consistency.


              The outcomes database aggregates standardized assessment scores — including PHQ-9 (depression), GAD-7
              (anxiety), and AUDIT (alcohol use) — collected longitudinally across sessions. This dataset, representing
              millions of therapy sessions, is Lyra's claimed basis for both the matching algorithm's training data and
              the published peer-reviewed outcomes research. The provenance, size, and independent auditability of this
              dataset are not disclosed publicly.
