      - number: '2.2'
        title: Market Sizing — Multiple Lens Approach
        blocks:
          - type: paragraph
            body: >
              No single authoritative market research publication defines "employer-sponsored digital mental health
              platforms" as a discrete, auditable market category [CM008]. This chapter triangulates across five sizing
              lenses to bracket the opportunity and surface contradictions.


              **Lens 1 — Bottom-up workforce coverage model:** The US employed workforce is approximately 160 million
              workers. KFF's 2023 Employer Health Benefits Survey found that 90% of large firms (200+ workers) offer
              behavioral health benefits through their health plan [CM009]. Applying a blended PEPY rate of $100–150
              across 160 million covered lives yields an implied annual market of $15–25 billion for digital and
              clinical mental health employer benefits [CM010]. This bottom-up approach is the primary TAM figure cited
              for Lyra Health.


              **Lens 2 — EAP market proxy:** The US EAP market was approximately $7 billion annually as of 2022–2023,
              representing the incumbent benefit digital platforms displace [CM011]. Transitioning even a portion of EAP
              spend from $15–25 PEPY to $75–200 PEPY represents a 3–8x revenue expansion per employee [CM012],
              supporting the $15–25B TAM range.


              **Lens 3 — Global digital mental health market:** Multiple analyst reports estimate the global digital
              mental health market at $5–6B in 2023, growing toward $70–89B by 2033 at 17–23% CAGR [CM013]. These
              figures conflate employer-sponsored and consumer channels and cannot be used as the sole employer TAM
              basis.


              **Lens 4 — Commercial behavioral health context:** Commercial health insurers process approximately
              $150–200B annually in behavioral health claims, of which employer-sponsored commercial insurance is 40–50%
              [CM014]. Lyra's PEPY benefit layer is additive to this figure.


              **Lens 5 — Employer intent surveys:** The Business Group on Health's 2023 Large Employer Survey found 89%
              of large employers planned to expand mental health benefits in 2023, with average mental health benefit
              spend growing at double digits annually [CM015]. The BLS projects mental health counselor employment to
              grow 17% by 2031, indicating sustained demand growth [CM016].


              **Contradictions and gaps:** Lyra management has cited a "$15B+" TAM in press coverage [CM017], aligning
              with the bottom-up model but unverified independently. Analyst estimates vary widely due to inconsistent
              category scope. The SAM for Lyra, constrained to 500+ employee employers willing to pay $100–200 PEPY, is
              estimated at $5–8B [CM018]. The SOM is estimated at $1–2B based on reported ~10M covered lives at $100–150
              PEPY [CM019].


              Digital health funding trends signal market stress: US mental health startup funding reached ~$5.5B in
              2022 (record high) before declining 50%+ in 2023 [CM020]. This funding correction is a constraint on
              competitive capital deployment, not a demand reduction — employer mental health benefit spending continued
              growing in 2023 even as venture investment declined [CM021].
