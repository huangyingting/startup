          - type: callout
            title: Employer-sponsored mental health raises structural privacy concerns
            body: >-
              Mental health data is among the most sensitive personal information. Privacy advocates, academic
              researchers, and media outlets have scrutinized whether employer-sponsored mental health platforms allow
              employers to infer behavioral health risks from usage patterns even when individual records are nominally
              protected. Lyra's HIPAA notice prohibits individual PHI disclosure to employers, but the structural
              tension between the employer-payer relationship and employee-beneficiary privacy remains a live
              reputational and regulatory risk.
