  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation and Buyer Profile
        blocks:
          - type: paragraph
            body: >
              Lyra Health's customer base is organized around three distinct role layers: the employer buyer (HR,
              benefits, and total rewards leaders), the covered employee (the member who receives care), and, in health
              plan channel contracts, the health plan as an intermediary payer. The primary commercial relationship is
              B2B—employers purchase PEPY (per-employee-per-year) subscriptions that cover all eligible employees and
              their dependents at no direct charge to the member.

              The target employer segment is large organizations with 1,000 or more employees, with the primary sweet
              spot at 5,000–100,000+ employees. As of 2026, Lyra's website categorizes its customer stories into three
              size tiers: under 5,000, 5,000–10,000, and over 10,000 employees. Verticals explicitly represented in
              Lyra's public customer roster include education, beverage/retail, construction, finance and banking,
              healthcare, law and professional services, data science and technology, manufacturing, pharmaceuticals and
              biotech, retail, and security and technology—a broad cross-industry distribution that mitigates vertical
              concentration risk.

              Geographically, the customer base is primarily US-based, with growing international reach: Lyra states it
              now serves "more than 20 million people globally" and offers care in multiple countries through its
              30,000+ provider network. The second channel—health plans—is represented by partnerships with carriers
              like Carelon (announced April 2026) and positions Lyra for access to 200M+ insured lives, though health
              plan channel revenue per life is materially lower than direct employer PEPY. A third emerging channel is
              the Workday Wellness integration (Lyra named Preferred Mental Health Partner in March 2026), which creates
              inbound discovery across Workday's 10,000+ enterprise HR customers. The channel mix creates distinct
              acquisition economics: direct employer sales carry the highest PEPY and the most direct employer
              relationship; health plan channel provides scale but thinner economics; Workday and benefits consultant
              channels reduce CAC via warm referrals.
