companyProfile:
  summary: >-
    Lyra Health, Inc. is a Burlingame, California-based mental health and wellbeing platform founded in 2015 by David
    Ebersman, former CFO of Facebook. The company sells a per-employee-per-year (PEPY) subscription to large enterprise
    employers, providing their workforces access to a curated network of 4,000+ therapists, coaches, and psychiatrists
    matched by an AI/ML engine to the right care type. Lyra's platform includes digital programs (evidence-based CBT,
    mindfulness, sleep), a member mobile app, and an employer analytics dashboard. As of 2023, Lyra covers over 20
    million lives at 700+ enterprise customers including Morgan Stanley, Uber, Starbucks, and Zoom. The company raised a
    $235M Series F in January 2022 at a $5.58B valuation, bringing total capital raised to approximately $910M. Revenue
    is estimated at $200M+ ARR (not publicly disclosed). Lyra differentiates on clinical outcomes measurement,
    evidence-based care, and therapist network quality, but faces intensifying competition from Spring Health, Modern
    Health, and insurer-bundled EAP alternatives.
  foundedDate: '2015-01-01'
  founders:
    - name: David Ebersman
      role: Co-Founder & CEO
      background: >-
        Former CFO of Facebook (2009–2014) and prior CFO of Genentech; brings deep healthcare and technology finance
