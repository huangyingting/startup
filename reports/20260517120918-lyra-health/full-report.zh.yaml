      - number: '4.5'
        title: 资本充足性与融资历史：已融资 $851M，现金跑道未确认
        blocks:
          - type: paragraph
            body: >-
              SEC Form D 文件独立确认了 Lyra 的融资历史，六轮有记录融资合计约 $851M。最近且最大的一轮是 2022 年 1 月提交的 Series F：SEC Form D（acc-no.
              0001733914-22-000001）显示出售总额为 $234,999,956，4 名投资者，首次出售日期为 2022 年 1 月 7 日。此前文件记录了：$199,999,931（Series E，2021
              年 6 月，28 名投资者）、$186.7M（Series D extension，2021 年 1 月，33 名投资者）、$110M（Series D，2020 年 8 月，23
              名投资者）、$75M（Series C，2020 年 3 月，19 名投资者）和 $45M（Series B，2018 年 6 月，19 名投资者）。完整逐轮时间线见公司概况章节；本章为每笔经 SEC
              确认的文件金额单独形成本地证据主张，以支撑资本充足性分析。

              2022 年 1 月 Series F 对应 $5.58B 估值，使 Lyra 跻身全球估值最高的私营心理健康公司。该轮融资约 $235M；若假设 Lyra 为支撑其规模的临床网络，需要每年 $80–120M
              的烧钱速度，则 Series F 之后的现金跑道名义上可覆盖至 2024–2026 年，无需额外外部资本——但这高度取决于实际收入、临床交付成本和销售与市场（S&M）投入水平，而这些都未公开。

              投资者构成释放出成熟度和阶段信号：Dragoneer 领投 Series F，Coatue、Fidelity、BlackRock
              等跟投。这些是增长型和跨阶段投资者，通常按收入规模和留存承销，而不是只看临床结果。按 SEC Form D，2022 年投资者总数为 4
              名，说明这是一轮聚焦的机构融资，而非广泛银团化。公开文件中看不到债务、项目融资或公开资本市场活动。Lyra 未宣布任何降估值融资或困境融资，但自 2022 年 1
              月以来（截至运行日期已超过三年）没有新的公开融资，带来一个问题：公司是在接近盈利、准备流动性事件，还是依靠 Series F 延长现金跑道继续运营。
