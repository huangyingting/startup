  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与买方画像
        blocks:
          - type: paragraph
            body: >
              Lyra Health 的客户群围绕三个清晰角色层组织：雇主买方（HR、福利和整体回报负责人）、被覆盖员工（接受照护的成员），以及在健康计划渠道合同中充当中介付款方的健康计划。主要商业关系是
              B2B——雇主购买按员工每年（PEPY）订阅，覆盖所有符合条件的员工及其家属，成员无需直接付费。

              目标雇主是拥有 1,000 名或更多员工的大型组织，核心区间为 5,000–100,000+ 名员工。截至 2026 年，Lyra 官网把客户故事分成三个规模层级：低于 5,000、5,000–10,000
              和高于 10,000 名员工。Lyra 公开客户名单明确覆盖的垂直行业包括教育、饮料 /
              零售、建筑、金融与银行、医疗健康、法律与专业服务、数据科学与技术、制造、制药与生物技术、零售，以及安全与技术——这种广泛跨行业分布降低了垂直集中风险。

              从地域看，客户群主要位于美国，同时国际覆盖在扩大：Lyra 称其现在“在全球服务超过 20 million 人”，并通过 30,000+ 服务者网络在多个国家提供照护。第二渠道是健康计划，Carelon（2026
              年 4 月宣布）等承保方伙伴关系代表这一渠道，并让 Lyra 有机会触达 200M+ 参保人群，但健康计划渠道的单人收入明显低于直接雇主 PEPY。第三个新兴渠道是 Workday Wellness
              集成（Lyra 于 2026 年 3 月被指定为 Preferred Mental Health Partner），可在 Workday 的 10,000+ 企业 HR
              客户中带来入站发现。渠道组合对应不同获客经济：直接雇主销售的 PEPY 最高，雇主关系也最直接；健康计划渠道提供规模但经济性更薄；Workday 和福利顾问渠道通过暖线转介绍降低 CAC。
