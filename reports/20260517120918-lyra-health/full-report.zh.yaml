  - id: FO002
    title: 公司快照逻辑
    type: flow
    layout: standard
    summary: Lyra 的运营逻辑从雇主需求出发，经由护理平台和服务提供者网络，落到会员结果；HIPAA 和数据治理则是架构上的硬约束。
    data:
      nodes:
        - id: employers
          label: 企业雇主（客户）
          detail: 购买 PEPY SaaS 访问权；用 Lyra 的综合心理健康方案替代 EAP；获得汇总分析仪表盘。
          tone: positive
        - id: platform
          label: Lyra Health 平台
          detail: AI 驱动匹配、数字项目、健康工具；把会员路由到合适护理层级，从教练到自有专科服务。
          tone: positive
        - id: providers
          label: 服务提供者网络（30K+）
          detail: 精选全球治疗师、教练、精神科医生网络；每年接受 100K+ 小时临床监督。
          tone: positive
        - id: lca
          label: Lyra Clinical Associates P.C.（LCA 临床实体）
          detail: 独立专业执业实体；向会员提供持牌临床服务；Lyra Health, Inc. 仅提供行政支持。
          tone: neutral
        - id: members
          label: 覆盖员工及家庭
          detail: 全球覆盖 20M+ 人；可使用治疗、教练、精神科、数字项目、专科和家庭护理。
          tone: positive
        - id: hipaa
          label: HIPAA / HITRUST 合规约束
          detail: 约束平台、服务提供者和雇主之间的数据流；禁止向雇主披露 PHI；赞助雇主无法获取个人会员数据。
          tone: warning
      edges:
        - from: employers
          to: platform
          label: PEPY 合同；福利访问
        - from: platform
          to: providers
          label: 会员匹配与转诊
        - from: platform
          to: lca
          label: 行政与技术支持
        - from: lca
          to: members
          label: 持牌临床护理交付
        - from: providers
          to: members
          label: 教练、治疗、精神科
        - from: hipaa
          to: platform
          label: 数据流合规约束
        - from: hipaa
          to: employers
          label: 雇主只能访问汇总 / 去标识化数据
