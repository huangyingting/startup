  - id: FU001
    title: Lyra Health 客户旅程流——从雇主决策到会员效果
    type: flow
    description: |
      Lyra 雇主部署的端到端客户旅程，从最初的福利采购决策，到员工注册、护理匹配、治疗和效果衡量。图中呈现产品的多利益相关方属性，以及决定使用率和临床结果的关键交接点。
    data:
      nodes:
        - id: n1
          label: 雇主采购决策
          note: HR/福利负责人选择 Lyra；签署多年期 PEPY 合同；典型销售周期 6–12 个月
        - id: n2
          label: 上线准备和发布
          note: 开放注册沟通；Lyra App 面向所有覆盖员工和家属开放；无需共付额
        - id: n3
          label: 员工注册
          note: 员工创建 Lyra 账户；AI 辅助摄取问卷；2–4 天内完成服务方匹配
        - id: n4
          label: 服务方匹配
          note: 首位服务方留存率 97%；30K+ 服务方网络；复杂需求转入专科护理
        - id: n5
          label: 主动护理会话
          note: 治疗、教练、精神科或自助式数字化项目；覆盖人群中 20–25% 参与
        - id: n6
          label: 效果衡量
          note: 执行 PHQ-9/GAD-7；9/10 会员临床改善；81% 在 12 个月后保持改善
        - id: n7
          label: 雇主报告和续约
          note: 汇总效果与 HR 共享；记录 3:1 ROI；多年续约或增购模块
  - id: FU002
    title: Lyra Health 采用和部署漏斗（估计，20M 覆盖人群）
    type: funnel
    description: |
      估计的会员转化漏斗，从符合资格的总覆盖人群到临床参与，基于公开披露的使用率（20–25% 活跃用户）和效果指标。数字为将公司披露比例套用到 20M 覆盖人群基数后的四舍五入估计。
    data:
      items:
        - label: 符合资格的总覆盖人群
          value: 20000000
          note: Lyra 主页 2026 主张；覆盖已注册雇主账户中的所有员工和家属
        - label: 创建 Lyra 账户的会员
          value: 6000000
          note: 估计注册率 30%（介于符合资格和活跃之间）；准确数字未披露
        - label: 活跃用户（完成护理参与）
          value: 4500000
          note: 按公司背景资料，20–25% 覆盖员工积极使用服务；取中点估计
        - label: 临床参与（治疗 / 精神科会话）
          value: 3000000
          note: 活跃用户中进入多会话临床护理的子集
        - label: 实现临床改善
          value: 2700000
          note: 将 ~90% 临床改善率套用于临床参与人群
  - id: FU003
    title: 客户证据矩阵——按证据维度列出的 Lyra 具名雇主
    type: matrix
    description: |
      对 10 个最突出的 Lyra Health 具名雇主客户，按五个证据维度评估：官方生产确认、量化 ROI 效果、雇主证言、媒体报道和员工规模。支持枚举章节。
    data:
