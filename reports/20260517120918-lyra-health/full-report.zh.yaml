      - number: '7.4'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >-
              Lyra Health January 2022 Series F 融资 $235M、估值 $5.58B；截至 May 2026，这是公司最后一次公开融资。 之后 3+ 年里，数字健康明显重定价：CNBC
              记录估值较 2021–2022 峰值下跌 40–60%，STAT News 报道多家数字心理健康创业公司在 2023 出现降价融资。若 Lyra 按当前行业倍数融资，价格很可能显著低于 2022
              标记，形成降价融资，稀释早期投资者， 可能触发反稀释条款，并给员工股权激励带来阻力。

              公司烧钱速度和现金跑道没有公开披露。按估计员工规模、临床质量基础设施成本、治疗师承包商付款和企业销售开销看， 年度现金消耗相当可观。下一轮融资前的现金跑道，是公共来源无法量化的最关键财务风险变量。CNBC
              记录，2023 年心理健康创业融资明显放缓， 投资者要求更强单位经济、盈利时间表和结果验证。

              Lyra 的 PEPM 合同模型带来企业集中度风险：福利合同按年续约，雇主流失或现有账户扩张失败会降低 ARR，但公司没有实时可见性。 December–January
              集中的续约窗口造成收入波动，也带来高风险年度留存节点。治疗师成本通胀是结构性利润率风险： 全国治疗师短缺加剧了承包商人才竞争，按疗程计酬会提高。Lyra
              能否把这些成本转嫁给雇主，取决于它相对低成本替代方案的定价权—— 而随着竞争强度上升，这一定价权正在被侵蚀。

              TechCrunch 的数字健康裁员追踪记录，融资寒冬中有数十家心理健康公司在 2023 年裁员。Lyra 若进行类似成本削减， 会同时带来执行风险和人才信心受损。STAT News
              确认，由于投资者关注盈利时间表，在 2021–2022 估值峰值融资的公司面临最剧烈重定价。
