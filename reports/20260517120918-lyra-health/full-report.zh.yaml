      - type: paragraph
        body: >-
          本报告基于 2025 年至 2026-05-17 期间抓取的公开来源。财务指标（ARR、毛利率、NRR、烧钱速度）为分析师估计，来自融资公告、可比公司分析和行业基准，并非经审计财务数据。 Lyra Health 尚未提交
          IPO 申请，也未公开披露财务数据。所有估计都应视为方向性代理值；一旦取得私有财务数据，可能需要重大修订。
        claimRefs: []
      - type: paragraph
        body: >-
          估值分析基于 2024-2025 年上市可比公司的交易倍数（Teladoc、Accolade、Talkspace、LifeStance Health），以及可比私募轮次数据（Spring Health Series
          D、Modern Health Series D）。本报告将 2026-05-17 作为所有新鲜度评估的标准运行日期。
        claimRefs: []
