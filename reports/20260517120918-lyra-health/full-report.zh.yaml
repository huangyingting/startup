      - number: '2.2'
        title: 市场规模测算——多镜头法
        blocks:
          - type: paragraph
            body: >
              没有单一权威市场研究出版物把「雇主赞助数字心理健康平台」定义为一个离散、可审计的市场类别 [CM008]。本章用五个规模测算镜头三角定位机会，并暴露其中矛盾。


              **镜头 1——自下而上的劳动力覆盖模型：** 美国就业人口约 1.6 亿。KFF 2023 年 Employer Health Benefits Survey 发现，90% 的大型公司（200+
              名员工）通过其健康计划提供行为健康福利 [CM009]。对 1.6 亿覆盖人群套用 $100–150 的混合 PEPY 费率，可得数字和临床心理健康雇主福利的隐含年市场规模为 $15–25B
              [CM010]。这一自下而上的方法是 Lyra Health 最主要引用的 TAM 数据。


              **镜头 2——EAP 市场代理：** 截至 2022–2023 年，美国 EAP 市场每年约 $7B，代表数字平台正在替代的既有福利 [CM011]。哪怕只把一部分 EAP 支出从 $15–25 PEPY
              迁移到 $75–200 PEPY，也意味着每名员工收入扩张 3–8 倍 [CM012]，支撑 $15–25B 的 TAM 区间。


              **镜头 3——全球数字心理健康市场：** 多份分析师报告估计，2023 年全球数字心理健康市场为 $5–6B，并将以 17–23% CAGR 增长至 2033 年的 $70–89B
              [CM013]。这些数字混合了雇主赞助和消费者渠道，不能单独作为雇主 TAM 的依据。


              **镜头 4——商业行为健康背景：** 商业健康保险公司每年处理约 $150–200B 行为健康索赔，其中雇主赞助商业保险占 40–50% [CM014]。Lyra 的 PEPY 福利层是在这一数字之上的增量。


              **镜头 5——雇主意向调查：** Business Group on Health 的 2023 年 Large Employer Survey 发现，89% 的大型雇主计划在 2023
              年扩大心理健康福利，平均心理健康福利支出每年以两位数增长 [CM015]。BLS 预计心理健康咨询师就业到 2031 年将增长 17%，显示需求增长具备持续性 [CM016]。


              **矛盾与缺口：** Lyra 管理层曾在媒体报道中引用「$15B+」TAM [CM017]，与自下而上模型一致，但尚未由独立来源验证。由于类别范围不一致，分析师估计差异很大。Lyra 的 SAM 限定为
              500+ 名员工、愿意支付 $100–200 PEPY 的雇主，估计为 $5–8B [CM018]。SOM 依据报道的约 1,000 万覆盖人群和 $100–150 PEPY 估计，为 $1–2B
              [CM019]。


              数字健康融资趋势释放出市场承压信号：美国心理健康创业公司融资在 2022 年达到约 $5.5B（历史高点），随后在 2023 年下降 50%+
              [CM020]。这场融资修正约束的是竞争性资本投放，而不是需求收缩——即使风险投资下降，雇主心理健康福利支出在 2023 年仍继续增长 [CM021]。
