      - number: '6.6'
        title: 展项
        blocks:
          - type: callout
            title: Starbucks 部署是企业心理健康市场最强单一客户证据点
            body: >
              Starbucks 案例很特殊：覆盖 350,000+ 名员工，包括按小时计薪的咖啡师（不只是公司总部员工）；May 2020 上线，是第一家提供综合心理健康福利的全国性零售商；公司全球总奖励高级副总裁公开称传统
              EAP“坏掉了”，并称 Lyra 是核心福利。 这比任何竞争对手已具名客户证据都更强，因为它证明了：（1）按小时计薪员工雇主的生产级规模（行业里最难的使用率挑战）；
              （2）高管公开背书；（3）多年生产环境使用年限；（4）零售和餐饮服务垂直领域的可信度，而大多数心理健康 EAP 竞争对手尚未打入这些领域。
            calloutType: insight
            claimRefs:
              - CU007
              - CU008
          - type: callout
            title: 未公开披露 NRR、流失或续约数据，形成重大尽调缺口
            body: >
              Lyra 不发布净留存率、总留存率、年度续约率、流失队列数据或任何合同留存指标。对于一家估值 $5.58B、 拥有 700+ 家雇主客户的私营企业级 SaaS
              公司，这些指标缺失是客户章节中最大的单一量化缺口。考虑到多年合同结构且未见宣布流失， 115–130% 的 NRR 有合理性，但这只是分析师估计，不是公司披露数字。投资者和收购方必须先从数据室拿到这些指标，
              才能支撑任何基于 ARR 增长的估值锚。
            calloutType: insight
