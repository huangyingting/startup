      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              美国雇主心理健康福利市场有结构性顺风，但也被实质性逆风部分抵消；这些逆风给数字平台供应商的采用带来摩擦 [CM031]。


              **增长驱动：**


              COVID-19 让心理健康服务需求出现阶跃式上升。KFF 记录称，疫情期间 10 名成年人中有 4 名报告焦虑或抑郁症状，疫情前为 10 名中 1 名 [CM032]。CNBC
              报道，雇主对心理健康福利扩张的咨询量较疫情前基线增加约 40% [CM033]。


              2023 年 MHPAEA 最终规则（Federal Register，2023 年 11 月；2025 年 1 月生效）要求自保雇主健康计划开展有记录的 NQTL
              比较分析，形成硬性合规要求，激励雇主投资具备临床结果文档的平台 [CM034]。这是 2008 年原始 MHPAEA 以来最重要的心理健康同等权益监管扩张 [CM035]。


              WHO 和 Mercer 研究记录，投资心理健康治疗每 $1 可通过改善员工健康和生产力带来约 $4 回报 [CM036]。ESG 报告框架越来越多纳入员工心理健康指标，让 HR
              领导层可以在董事会层面获得可见度，以证明福利投资合理 [CM038]。CNBC 报道，Lyra 雇主合作伙伴把降低流失率和改善人才吸引作为主要动机 [CM037]。


              **采用约束：**


              Axios 2023 年 10 月报道称，多家数字心理健康公司裁员，反映雇主需求环境走软，以及 2021–2022 年高点后的预算收紧 [CM039]。大型雇主与 Optum、Magellan 或其他
              carve-out 供应商签有多年 EAP 合同；替换这些合同需要终止合同、集成 HRIS 并沟通员工，形成 12–24 个月转换周期 [CM040]。


              BLS 预计心理健康咨询师就业到 2031 年必须增长 17% 才能满足需求；持证治疗师供给受制于漫长培训管线和城市集中，给使用量增长设置了产能天花板 [CM041]。Politico 2022
              年报道称，心理健康 App 隐私实践受到 FTC 审查；员工担心雇主访问心理健康数据，形成限制使用率的结构性采用障碍 [CM042]。
