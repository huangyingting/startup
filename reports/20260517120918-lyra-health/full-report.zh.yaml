      - number: '5.4'
        title: 集成、部署与可靠性
        blocks:
          - type: paragraph
            body: >-
              Lyra 平台借助 SSO（基于 SAML）、Workday 和 SAP 等 HRIS 系统，以及福利管理平台，与雇主 HR 和福利基础设施集成。EAP
              迁移支持是明确的部署服务，可降低雇主替换传统员工援助计划时的摩擦。help.lyrahealth.com 门户承担成员端支持界面，Lyra 还提供可用于危机和导航支持的 24/7 照护团队。

              Lyra 的安全文档称，所有系统和服务都通过 AWS 交付，并受正式变更管理流程约束；该流程要求独立管理层批准和回滚策略。公司维护独立的生产和开发环境，所有变更在生产部署前都要经过质量保证测试。Lyra
              在软件开发中遵循 OWASP Top 10 实践。

              Lyra 未公开 SLA 承诺和可用性指标；企业买家评估大规模员工部署时，这是尽调缺口。安全页面确认存在业务连续性计划（公开材料提到但未详述），以及与 HIPAA 和 HITRUST CSF
              要求对齐的事件响应政策。本研究未找到公开状态页或事件历史。

              平台被描述为移动优先，同时提供原生 iOS、Android 应用和网页门户。全球覆盖是明确战略重点：2026 Workforce Mental Health Report 覆盖六个国家，说明 Lyra
              正投资多国部署能力，但每个市场的服务者网络深度和监管合规细节没有公开详述。
