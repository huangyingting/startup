  - id: FV001
    title: 投资建议逻辑
    type: flow
    insight: >-
      观察建议来自三条输入的交汇：上一轮价格偏高（$5.58B vs. $2-4B 公允价值）、高风险画像（流动性不足、清算优先权包袱、盈利不确定），以及有条件成立的商业实力（500+ 雇主客户、MHPAEA
      顺风、战略收购方兴趣）。若要上调到有条件正面，需要 $2-3B 入场价格、收入确认和盈利能见度。
    data:
      nodes:
        - id: f1
          label: 市场压缩（高）
          description: 数字健康倍数较峰值下降 40-70%；上市可比公司为 1-3x 收入；Teladoc 跌幅 90%+
        - id: f2
          label: 上一轮价格偏高（$5.58B）
          description: Series F 按 22-28x ARR 定价；估计公允价值 $2-4B；隐含下调 28-64%；距上一轮已有 4 年
        - id: f3
          label: 商业强项（正面）
          description: 500+ 雇主客户；MHPAEA 监管顺风；保险收购方兴趣；疗效数据
        - id: f4
          label: 风险画像（高）
          description: 流动性不足；$910M 清算优先权包袱；无确认盈利路径；治疗师供给受限
        - id: f5
          label: 观察建议
          description: 等待 $2-3B 降价轮入场或战略催化；不要按 $5.58B 基准投资
        - id: f6
          label: 上调条件
          description: 确认 ARR $250M+；盈利路线图；$2-3B 降价轮；或确认 M&A 接触
        - id: f7
          label: 退出监测标准
          description: 降价轮低于 $3B；大客户流失；治疗师供给危机；战略收购方撤回
