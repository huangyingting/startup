      - number: '5.6'
        title: 路线图、缺口与技术风险
        blocks:
          - type: paragraph
            body: >-
              Lyra 的 2026 年路线图在多个方向推进。Lyra AI 这一对话式 AI 层正从辅导试点扩展到完整数字照护体验。Care Insights Hub 于 2026 年 5 月公开，是早期 EHR
              增强功能，依靠 AI 支持服务者质量改进；其准确性、采用率和临床影响仍未被独立研究验证。儿科卓越中心是一项新的组织承诺，释放出公司投资高增长但临床复杂细分市场的信号。全球扩张也是公司明示重点，并由 2026
              年员工心理健康报告的六国覆盖背书。

              公开来源识别出的重大尽调缺口包括：（1）匹配算法只在高层级描述，其训练数据来源、模型架构和偏见测试方法未披露；（2）完整 SOC 2 Type II 报告不公开；（3）面向开发者的 HRIS、SSO
              和福利管理集成 API 文档不公开；（4）支撑 2x 康复和 26% 成本下降主张的临床研究引用，在公开材料中没有直接链接，独立验证难度较高；（5）没有公开 SLA 或可用性数据。

              技术风险包括照护搜索和两次咨询间支持场景中的 AI 幻觉或误分类（考虑到临床人群，后果严重）、大规模服务者网络质量和一致性（Care Insights Hub
              正试图解决但仍处早期）、处理大量敏感受保护健康信息（PHI）带来的 HIPAA 泄露暴露，以及把试点 AI
              功能扩展到数百万用户的成熟度风险。全球扩张还引入按司法辖区不同而变化的监管风险（GDPR、本地医疗法规），公开材料没有处理这些问题。
