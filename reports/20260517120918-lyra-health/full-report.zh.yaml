            title: 收入和员工数估计未经验证
            body: 本章使用的 $200M ARR 和 1,100–1,200 名员工数据来自背景研究估计，尚未在本轮捕捉到的任何公开文件、公司公告或第三方数据源中得到确认。这些数字只能作为量级参考。
            calloutType: assumption
