      - number: '6.4'
        title: 留存、耐久性与客户满意度
        blocks:
          - type: paragraph
            body: >
              Lyra 不公开披露净留存率（NRR）、总留存率（GRR）或年度续约率——这在私营企业级 SaaS 公司中很常见。115–130% 的估计 NRR（来自公司背景中的行业分析师估计）由两部分拼成：基础续约 （约
              90%+，可从已具名客户没有宣布合同流失间接推断）以及增购带来的扩张收入（新增模块、现有账户覆盖人数增长）。 截至报告生成日，Lyra 已具名雇主客户没有公开宣布离开或不续约。

              服务提供者端成员留存：97% 的成员会留在第一位匹配到的服务提供者处——这是平台级指标，说明服务提供者匹配质量强， 也减少成员在护理旅程中流失。这个指标能有力替代成员满意度，并缓解 EAP
              转介网络常见的“旋转门”问题：成员连不上合适治疗师后退出。 “10 名成员中有 9 名好转”的临床改善结果，以及 81% 在治疗后 12 个月仍保持改善，说明结果有持续性， 不只是短暂满意。

              雇主端：Lyra 客户故事页面上的雇主证言质量较强，覆盖多个行业和不同客户合作年限，说明关系有持续性。 多年合同结构（2–3 年 PEPY 协议）本身会降低合同期内的年度流失风险。Workday
              首选心理健康合作伙伴身份 （March 2026）和 Carelon 健康计划合作（April 2026）说明， 主要企业平台所有者认可 Lyra 是可信供应商；这通常需要其成员组织先证明客户留存表现。

              反向信号：Glassdoor 上 Lyra Health 员工评论从员工视角提到一些运营和文化问题；这些问题不直接等同于雇主客户满意度， 但显示组织内部承压。G2 评论样本很小（2020 年 Wayback
              抓取只显示 1 条评论，4 星），也没有大型雇主提交公开负面证言。 但 Lyra 不披露 NRR，意味着尽调团队没有数据室访问权限就无法独立验证留存。
