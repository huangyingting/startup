  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与隐私风险
        blocks:
          - type: paragraph
            body: >-
              Lyra Health 处在医疗隐私、员工福利监管和心理健康平价执法的交叉点。HIPAA 合规是底座：Lyra 面向自保雇主客户担任 业务伙伴（Business Associate，BA），每份雇主合同都需要
              HIPAA 业务伙伴协议（Business Associate Agreement）。心理健康记录包括心理治疗笔记、 物质使用障碍记录和自杀意念文档，属于最敏感的受保护健康信息（PHI）类别，同时受 HIPAA
              和更严格州级保护约束。 HHS Office for Civil Rights 执行 HIPAA，按违规类别每年最高可处 $1.9M 民事罚款；按 HHS 和 HealthIT.gov
              指引，云平台需要静态和传输加密、访问控制、审计日志以及最小必要访问协议。

              November 2023 Mental Health Parity Final Rule（88 FR 78707）显著扩大了 MHPAEA 义务： 雇主健康计划现在必须开展并记录比较性 NQTL
              分析，证明心理健康福利设计不比医疗 / 外科福利更具限制性； DOL、HHS 和 Treasury 负责执法。NAMI 政策分析确认执法正在加速。该规则主要约束 Lyra 的雇主客户， 但会向下游挤压 Lyra
              的疗程限制、服务提供者网络充足性和访问标准设计。

              FTC 对数字心理健康的执法已经明显升级。FTC September 2023 关于心理健康应用的报告记录了行业普遍与广告平台共享数据。 BetterHelp 与 FTC 达成 $7.8M 和解（June
              2023），原因是向 Facebook 和 Snapchat 共享数据； 这树立了直接先例：任何数字心理健康平台若未经同意使用第三方跟踪像素或广告 SDK，都同时面临 FTC Health Breach
              Notification Rule 和 HIPAA 风险。Wired、the Washington Post、Mozilla Foundation 的 Privacy Not Included
              评测、TechCrunch 和 the Wall Street Journal 都记录了行业层面的数据共享做法，构成了当前执法背景。

              California 的 CMIA 禁止未经授权披露医疗信息，并规定每次违规 $1,000 的法定赔偿，另加实际损害赔偿和律师费。 Lyra 总部在 San Francisco，California
              雇主客户基础也很大，因此 CMIA 合规是持续的重大义务，并带有集体诉讼风险。 50 个州的远程医疗执照拼图要求每位 Lyra 合同治疗师在成员所在州持有有效执照；CCHPCA
              确认，远程医疗平价和跨州执照互认覆盖仍按州变化 （PSYPACT 覆盖心理学，但不覆盖所有执照类型）。APA 远程心理学指南要求平台层面执行同意、应急协议和文档标准。

              如果访问障碍阻止成员获得医学必要护理，错误拒绝护理索赔就是结构性法律风险。独立承包商结构部分缓解了治疗师医疗过失风险， 但平台层面的过失资质审核、匹配质量差或未能升级危机场景仍会带来责任。截至 May
              2026，未见公开披露针对 Lyra Health 的重大 HIPAA 执法行动或诉讼。
