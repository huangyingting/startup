        - 确认融资估值较 2022 年 $5.58B 估值折价 >40%；融资时间线延长 >18 个月；或重大裁员 >20%，显示进入现金保全模式
        - 打破投资逻辑的触发项；重新评估商业模式可持续性；建模稀释影响和员工留任含义；评估战略出售是否为优先结果
      - - CEO 或临床领导层离职
        - LinkedIn 资料变动；新闻稿；行业通讯的高管变动报道
        - CEO David Ebersman 离职公告；CCO 与高级领导层同时离职；12 个月内三名或更多 C-suite 变动
        - 关键人风险触发项；评估继任计划深度；评估投资者关系能否经受领导层变动；在战略清晰前持仓观望
    notes: 上述都是可观察的外部信号，会触发对投资逻辑的重新评估。阈值校准为实质性但非灾难性恶化，允许分级响应，而不是二元退出决策。所有触发项都应与管理层演示和年度尽调复盘中的财务、运营指标一起按季度监控。
