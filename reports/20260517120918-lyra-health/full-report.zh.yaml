  - id: FR001
    title: 风险热力图——按风险类别看可能性与影响
    type: matrix
    layout: wide
    summary: >-
      风险热力图将八个 Lyra Health 风险类别映射到可能性（低到高）和影响（中到关键）两个维度，并评估剩余敞口。隐私/数据泄露和治疗师供给短缺严重程度最高，需要上升到投资逻辑层面。
      融资和竞争替代属于高影响、中等可能性风险，需要主动跟踪。CEO 关键人离任和平台危机中断可能性低，但影响高到关键。心理健康平等执法和远程医疗执照是中等影响的监管风险。
