  - id: FE002
    title: 客户工作流 / 运营流程
    type: journey-map
    layout: wide
    summary: Lyra 会员旅程从雇主福利注册开始，经 AI 驱动的摄取和匹配，进入带标准化效果衡量的结构化护理，最终毕业或持续维护——Lyra AI 全程提供会话间支持。
    data:
      items:
        - label: 注册
          detail: 雇主启用 Lyra 福利；员工通过 App 或 Web 门户注册；对接雇主 HRIS 的 SSO 认证确认资格。HR 配置雇主专属品牌和会话额度。
          touchpoints:
            - 雇主福利门户和 HRIS/SSO 集成
            - Lyra 移动 App（iOS/Android）或 lyrahealth.com Web 门户
            - 面向从旧项目迁移组织的 EAP 迁移支持
        - label: 摄取和评估
          detail: 会员用标准化和自定义问题完成简短摄取评估；Lyra AI 自由文本选项（截至 2026 仍处于试点）允许自然语言自我描述；建立 PHQ-9/GAD-7 基线。
          touchpoints:
            - AI 驱动的自由文本摄取或引导式下拉评估
            - 基线标准化效果评估（PHQ-9、GAD-7、AUDIT）
            - 即时安全需求的危机筛查
        - label: AI 驱动匹配
          detail: 自研算法分析摄取数据、会员偏好和服务方可用性，推荐护理模式（教练 / 治疗 / 药物 / 数字化项目）和具体服务方；会员确认匹配。
          touchpoints:
            - AI 匹配引擎处理摄取回答和历史效果数据
            - 带临床专长和可预约时间的服务方资料页
            - 首次预约通常可在数天内获得
        - label: 护理交付
          detail: 会员参加视频或线下会话；教练或治疗师提供循证护理（CBT、DBT、正念或其他模式）；服务方在 Lyra Engage EHR 记录会话；需要时由网络精神科医生处理精神科药物管理。
          touchpoints:
            - 用于服务方文档和排班的 Lyra Engage EHR
            - 远程会话的视频远程医疗平台
            - 会话间数字化项目和技能练习
            - Lyra AI 24/7 会话间支持（教练试点，2026 扩张）
        - label: 效果衡量
          detail: 护理过程中定期重复标准化评估（PHQ-9、GAD-7）；结果进入服务方仪表盘和雇主分析；临床经理使用 Care Insights Hub 洞察支持服务方质量改进。
          touchpoints:
            - 纵向效果数据库
            - 面向服务方的 Care Insights Hub 分析（Lyra Engage EHR）
            - 雇主使用率和效果仪表盘
        - label: 毕业或持续支持
          detail: 会员达到症状减轻目标后从结构化护理毕业；转入自助式数字化项目或 Lyra AI 维护支持；必要时可返回护理；雇主在分析仪表盘查看汇总队列效果。
          touchpoints:
            - 用于维护和防复发的数字化项目与 Lyra AI
            - 雇主 ROI 报告（离职率、生产力、医疗成本下降）
            - 症状复发时的重新参与路径
    approximationNotes: 具体会话次数、从会话到毕业的时间线和确切雇主配置选项未公开；这里的流程反映公开可得的产品描述。
    claimRefs:
      - CE001
      - CE004
      - CE005
      - CE006
      - CE013
      - CE018
      - CE020
  - id: FE003
    title: 关键依赖图
    type: dag
    layout: wide
    summary: Lyra 平台高度依赖 AWS 云基础设施、精选服务方网络，以及 HIPAA / HITRUST 合规。AI 匹配引擎依赖自有效果数据库，后者又依赖网络和 EHR 系统——形成网络规模提升效果数据质量和匹配准确度的飞轮。
    data:
      nodes:
        - id: aws
          label: AWS 云基础设施
          detail: 承载所有计算、存储和网络；符合 HIPAA；GuardDuty/Inspector/KMS/ZTNA
          tone: positive
        - id: hipaa
          label: HIPAA / HITRUST 合规框架
          detail: 年度 HITRUST CSF 审计；与雇主合作伙伴签署 HIPAA BAA；约束所有 PHI 处理
          tone: warning
        - id: network
          label: 治疗师 / 教练 / 精神科医生网络
          detail: 4,000+ 名精选服务方；网络质量是核心产品主张
          tone: positive
        - id: outcomes
          label: 自有效果数据库
          detail: 数百万次会话的 PHQ-9/GAD-7 数据；匹配算法训练数据
          tone: positive
        - id: matching
          label: AI / ML 匹配引擎
          detail: 将会员路由到护理类型和服务方；用效果数据训练；黑箱架构
          tone: warning
        - id: ehr
          label: Lyra Engage EHR
          detail: 服务方临床文档、排班、Care Insights Hub 分析层
          tone: positive
        - id: app
          label: 员工 App 和 Web 门户
          detail: 会员端访问界面；SSO 认证；嵌入 Lyra AI（试点）
          tone: positive
        - id: hris
          label: HRIS / SSO 集成层
          detail: 资格验证；会员认证；Workday/SAP 连接器
          tone: neutral
      edges:
        - from: aws
          to: matching
          label: 托管并扩展匹配引擎
        - from: aws
          to: ehr
          label: 托管 Lyra Engage EHR 和 Care Insights Hub
        - from: aws
          to: outcomes
          label: 托管并加密效果数据库
        - from: aws
          to: app
          label: 服务会员端应用
        - from: hipaa
          to: aws
          label: 合规要求约束基础设施配置
        - from: hipaa
          to: ehr
          label: PHI 处理标准约束 EHR 设计
        - from: network
          to: ehr
          label: 服务方生成会话和效果数据
        - from: outcomes
          to: matching
          label: 历史效果数据训练并辅助算法
        - from: matching
          to: app
          label: 匹配结果通过 App 呈现给会员
        - from: ehr
          to: outcomes
          label: 会话数据和评估流入效果 DB
        - from: hris
          to: app
          label: 会员资格和认证
        - from: network
          to: outcomes
          label: 服务方网络规模推动效果数据量
    approximationNotes: AI 匹配引擎对具体模型基础设施（如 GPU 计算、模型再训练管线）的内部依赖未公开，因此合并进 AWS 节点。Lyra AI 对话层的完整架构未公开，故未单独绘制其依赖链。
