      - number: '3.6'
        title: 证据材料
        blocks:
          - type: callout
            title: 临床证据深度是 Lyra 最可防守的护城河
            body: >-
              Lyra 公开的同行评议结果数据——整体医疗理赔成本下降 26%、81% 的成员在 12 个月随访时维持改善，以及一篇为其 AI 匹配方法背书的 JAMA Open
              论文——构成会复利的护城河。竞争对手也会声称结果改善，但通常缺少同等纵向严谨性、独立审计或同行评议发表；在成熟企业采购中，Lyra 因此拥有可信度优势。只有 Spring Health 具备可比的 JAMA
              级证据，临床证据层因此收窄成双寡头。
            calloutType: strength
            claimRefs:
              - CP016
              - CP017
              - CP018
              - CP035
          - type: callout
            title: PEPM 定价商品化和保险公司捆绑是最高严重度风险
            body: >-
              两股力量威胁 Lyra 的收入模式。第一，保险公司捆绑的 EAP 替代方案（Optum、Cigna/Evernorth）能为已经购买这些健康计划的雇主，以接近零的增量成本提供行为健康服务，让成本受限的 HR
              买家更难证明 Lyra 每人每月 $4–10 的 PEPM 溢价合理。第二，数字原生挑战者（Spring Health、Modern Health）正快速追近 Lyra
              的功能集，任何价格溢价所依赖的功能差距都在收窄。2025–2026 年企业降本环境可能加速对 PEPM 型心理健康福利的采购压力。
            calloutType: risk
            claimRefs:
              - CP038
              - CP039
              - CP040
              - CP042
              - CP043
          - type: callout
            title: Spring Health 的规模追近是关键竞争信号
            body: >-
              Spring Health 的 $3.3B 估值（2023 年 1 月）、20M+ 覆盖人群、JAMA 发表结果以及当天预约保证，说明它正向 Lyra 的临床可信度竞争位置靠近。Lyra
              剩余的差异化点——家庭和青少年覆盖深度、急性照护的内部管理能力，以及 26% 理赔成本下降指标——需要继续守住并扩展，才能在企业续约中保住定价和留存优势；Spring Health
              在这些续约场景里越来越常扮演挑战者。
