companyProfile:
  summary: >-
    Lyra Health, Inc. 是一家总部位于加州 Burlingame 的心理健康与身心健康平台，由 Facebook 前 CFO David Ebersman 于 2015
    年创立。公司向大型企业雇主销售按员工按年（PEPY）订阅服务，让员工接入一张经筛选的 4,000+ 名治疗师、教练和精神科医生网络，并由 AI/ML 引擎匹配合适的照护类型。Lyra 平台包括数字化项目（循证
    CBT、正念、睡眠）、会员移动 App 和雇主分析仪表盘。截至 2023 年，Lyra 覆盖 700+ 家企业客户的 2,000 多万人，包括 Morgan Stanley、Uber、Starbucks 和 Zoom。公司 2022
    年 1 月以 $5.58B 估值完成 $235M F 轮，累计融资约 $910M。收入估计为 $200M+ ARR（未公开披露）。Lyra 以临床结果测量、循证照护和治疗师网络质量形成差异化，但面临 Spring
    Health、Modern Health 以及保险公司捆绑 EAP 替代方案越来越激烈的竞争。
