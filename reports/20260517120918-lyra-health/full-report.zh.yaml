      - number: '2.3'
        title: 买方与客群分析
        blocks:
          - type: paragraph
            body: >
              Lyra Health 的商业模型形成三方结构：雇主（买方和付款方）、员工（用户和受益人），以及 Lyra 网络内的持证临床人员（服务提供方） [CM022]。购买决策掌握在副总裁级或总监级 HR
              和福利负责人手中，通常向 CHRO 汇报；PEPY 价格从 $50（传统 EAP 级别）到 $500（高端一体化平台）不等 [CM023]。


              典型企业采购周期为 12–18 个月，每年开放注册期形成自然替换窗口。关键购买标准包括：临床结果数据、员工使用率、HIPAA 合规、与现有 EAP 和健康计划基础设施的集成，以及 CFO 能看懂的 ROI 量化
              [CM024]。


              **大型企业（10,000+ 名员工）** 是 Lyra 的主要商业焦点。已确认的具名客户包括 Starbucks（2020）、Lyft 和 Stanford University [CM025]。2023 年
              MHPAEA 最终规则的合规要求有利于具备临床监督和结果数据的平台，因此 Lyra 在大型自保雇主的合规驱动采购中拥有结构性优势 [CM026]。


              **中端市场（1,000–10,000 名员工）** 正在增长，但渗透较低。CNBC 2022 年 5 月报道称 Lyra 正在扩大雇主基础，但已确认客户大多仍是企业级账户 [CM027]。中端雇主 PEPY
              预算更紧，为 $75–150，成本敏感性更高 [CM028]。


              **公共部门和工会客群** 尚未确认是 Lyra 当前优先方向；公开案例研究未展示这些客群 [CM029]。


              **员工 / 用户动态：** 传统 EAP 平均使用率为 3–6%；Lyra 声称其照护导航模型带来显著更高使用率，但没有独立审计可验证。G2 上 Lyra Health
              的用户评价整体肯定治疗师质量和照护导航，也有部分评论者提到治疗师网络存在地理覆盖缺口 [CM030]。
