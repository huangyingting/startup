      - number: '6.2'
        title: 具名客户的正式上线证据
        blocks:
          - type: paragraph
            body: >
              与多数同规模竞争对手相比，Lyra Health 拥有显著更多公开确认的具名客户，横跨零售、金融服务、技术、建筑、医疗健康、法律和交通运输。锚定客户是 Starbucks——2020 年上线 Lyra
              时，它是首个大规模部署综合心理健康福利的全国零售商。Starbucks 覆盖 350,000+ 名员工（包括小时工咖啡师，而不只是公司办公室员工），全球整体回报高级副总裁 Ron Crawford 公开表示“传统
              EAP 已经坏了”，Lyra 已成为 Starbucks 伙伴员工最看重的福利之一。这个锚定客户代表一个高可信、高可见度的正式生产部署。

              金融服务领域，Morgan Stanley（约 80,000 名员工）、Fidelity（披露客户）和 TD Cowen（Lyra 官网客户证言）代表蓝筹金融客户。TD Cowen 总裁 Jeff Solomon
              表示，心理健康支持“对留住并吸引最优秀人才从未如此关键”。技术垂直包括 Uber（40,000+ 名员工，2021 年披露）、Zoom（约 9,000 名员工）、eBay（约 12,000 名员工）、Lyft（约
              6,000 名员工）和 Robinhood（约 3,000 名员工）。医疗健康和制药客户包括 Genentech/Roche（约 15,000 名美国员工）。工业客户包括 JE Dunn
              Construction（Lyra 首页展示案例）、Levi Strauss（约 15,000 名员工）和 Cummins（Kate
              Fisher，整体回报高级总监，在客户页面被引用）。从新闻报道可见的较新客户包括 AT&T（截至 2025 年 12 月的员工照护者福利）、Walmart（2025 年 12 月员工健康增强）、United
              Airlines（2025 年网络研讨会合作）、School District of Philadelphia（教育板块旗舰）和 Peraton（安全与技术，Lyra 网站引用 Amy Rall）。

              具名客户证据覆盖多个行业和员工规模区间，说明 Lyra 已经渗透到创始期技术行业基本盘之外，并在小时工雇主（Starbucks）、受监管行业（Genentech、Morgan Stanley）、建筑（JE
              Dunn）和公共部门（School District of Philadelphia）拥有可信的正式生产部署。多数具名客户确认处于生产状态（多年合同），而非试点。
