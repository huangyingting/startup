      - number: '5.3'
        title: AI 匹配、Lyra AI 与临床差异化
        blocks:
          - type: paragraph
            body: >-
              Lyra 对技术差异化的核心主张有两点。第一，自研 AI/ML 匹配算法会把成员路由到正确照护类型和服务者，并用 Lyra 自有数据集中数百万次咨询的结果数据训练。第二，名为 Lyra AI 的 AI
              层正在扩张；该层于 2025 年 10 月宣布，代表 Lyra 进入临床场景的生成式 AI。

              Lyra AI 设计为贯穿照护旅程的多个节点。初筛阶段，它提供自由文本自然语言选项，替代传统勾选式表单，让成员用自己的话描述需求。Lyra 发布的 2026 年初数据显示，在被提供该选项的成员中，有 37%
              选择使用，说明降低初筛摩擦有实际意义。两次咨询之间，Lyra AI 提供 24/7 对话式支持，并锚定成员与人工服务者练习的技能；同时设置清晰的危机升级路径，可接入 Lyra 的 24/7
              照护团队和真人服务者。截至 2026 年中，该试点仅限于参加 Lyra Coaching 的美国成员；公司称 2026 年路线图会扩展到完整数字照护体验。

              Lyra 的 AI 产品治理框架写入 Polaris Principles：安全和伦理优先级最高；人工服务者至关重要，AI
              被设计为补充而非取代人工；照护必须具备文化响应性；所有创新都由科学驱动，并按临床标准测试。该框架在公司 2025 年 10 月博客文章中公开描述，但尚未经过独立审计。

              测量驱动照护是另一项差异化。标准化评估（PHQ-9、GAD-7、AUDIT）在初筛阶段执行，并在整个照护旅程中纵向执行，把结果数据送入服务者工作流和雇主报告。这使 Lyra 的方法与传统 EAP
              明显不同，后者不会系统化测量临床结果。
