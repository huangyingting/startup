      - number: '7.2'
        title: 运营与临床风险
        blocks:
          - type: paragraph
            body: >-
              Lyra Health 最难结构性化解的运营风险是治疗师供给。SAMHSA 估计，美国最多短缺 31,109 名心理健康专业人员才能满足需求； BLS 预计到 2032，心理健康咨询师就业人数将增长
              19%——如果培训项目没有等比例扩张，需求增长会进一步拉大供给缺口。 AAMC 确认了这一趋势。在供给受限的市场里，Lyra 要与 Spring Health、Modern Health、LifeStance 和
              EAP 网络争夺有限的持证合同治疗师。California Health Line 特别记录了 California 治疗师短缺的严重程度。承包商流失会让成员治疗中断， 增加重新匹配开销，并削弱临床质量一致性。

              平台可靠性是行为健康特有的安全关键型运营风险。成员寻求危机支持时，长时间宕机会带来人身安全风险和法律责任， 超过典型 SaaS 宕机暴露。HIPAA 云架构要求满足业务伙伴协议（Business
              Associate Agreement）的可用性标准。心理健康需求在压力高峰期集中， 会放大宕机影响。Lyra Health 不公开披露正常运行时间 SLA，也不发布状态页。

              规模化临床质量控制是核心执行挑战。KFF 跟踪显示，2020 年美国 52.9% 的精神疾病成人未接受治疗；SAMHSA 的 2021 NSDUH 确认，47.1 million
              名成人（18.7%）经历精神疾病，其中只有 24.3 million 人接受治疗。Lyra 扩张到大型雇主人群后， 要维持治疗师质量一致性，必须有强资质审核、督导、持续培训和结果监测。Lyra 发布汇总
              PHQ-9 改善数据， 但尚未公开确认有按病情严重程度划分的独立第三方临床验证。The Atlantic 记录了对应用型治疗营销说法与同行评审证据之间差距的担忧。

              AI 驱动匹配算法风险有双重性质：模型表现差会造成治疗师与成员匹配不佳，压低参与度和结果；如果匹配模型处理采集阶段 PHI 超出 HIPAA
              去标识化标准，或产生人口统计偏差，还会带来额外监管暴露。Politico 调查和 The Atlantic 分析都记录了数字心理健康平台主张与循证实践标准之间的差距。

              要保持质量一致，治疗师与成员比例本身会形成结构性增长天花板。随着雇主覆盖范围扩大，持证合同治疗师管线会限制容量。 如果等待名单时间变长，显示网络密度恶化，这就是运营压力的先行指标，也会直接预示雇主客户不满。
