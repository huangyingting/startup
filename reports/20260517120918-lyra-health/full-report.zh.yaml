      - number: '1.6'
        title: 关键证据
        blocks:
          - type: callout
            title: SEC Form D 备案轨迹为资本历史提供了异常扎实的支撑
            body: >-
              Lyra 2018 年至 2022 年的六份 SEC Form D
              文件，以一手来源确认了交割金额、日期、投资者数量和公司法律细节；这些信息在私营公司中往往不可得。因此，相比大多数同等规模的私营医疗科技公司，Lyra 的融资历史文件支撑更可靠。
            calloutType: strength
            claimRefs:
              - CO019
              - CO020
              - CO021
              - CO022
              - CO023
              - CO024
          - type: callout
            title: 创始人兼 CEO David Ebersman 的关键人集中
            body: >-
              在所有可取得的 SEC 文件中，Ebersman 是唯一具名的高管，也是公司愿景的公共代表和主要融资联系人。现有来源未发现总裁、COO
              或继任计划的公开公告。任何领导层扰动都会给投资者、企业客户和服务方网络带来重大不确定性。
            calloutType: risk
            claimRefs:
              - CO011
              - CO012
              - CO018
          - type: callout
            title: 雇主赞助心理健康存在结构性隐私担忧
            body: >-
              心理健康数据属于最敏感的个人信息之一。隐私倡导者、学术研究者和媒体一直审视雇主赞助心理健康平台是否会让雇主即便在个人记录名义上受保护时，仍能从使用模式推断行为健康风险。Lyra 的 HIPAA
              通知禁止向雇主披露个人 PHI，但雇主付款方关系与员工受益人隐私之间的结构性张力，仍是现实的声誉和监管风险。
            calloutType: risk
            claimRefs:
              - CO008
              - CO009
              - CO010
              - CO044
              - CO045
          - type: callout
            title: $5.58B 估值是 2022 年市场高点的数据点
            body: >-
              Lyra 在 2022 年 1 月完成 $5.58B 估值的 F 轮，当时正值私人心理健康平台估值高点。公开可比公司（如 Cerebral、Spring Health、Modern Health）自 2022
              年以来经历了显著估值重置。Lyra 当前相对估计 $200M ARR 的隐含企业价值，无法从现有来源确认，应放在 2022 年后心理健康独角兽重定价环境中评估。
            calloutType: insight
            claimRefs:
              - CO024
              - CO025
              - CO034
