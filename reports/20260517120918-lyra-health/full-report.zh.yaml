      - number: '3.5'
        title: 护城河分析与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Lyra Health 的竞争护城河靠四个互相强化的维度支撑。第一，有同行评议研究（JAMA Open）背书的公开临床结果数据，在企业采购中形成可防守的差异化：参与者整体医疗理赔成本下降 26%，12
              个月随访数据显示 81% 的改善得以维持；没有同等数据基础设施和纵向队列的供应商很难复制。直接竞争对手中，只有 Spring Health 拥有可比的 JAMA 发表证据，临床证据层形成双寡头。第二，Lyra
              的连续照护谱系足够宽，从预防性辅导到急性和复杂个案管理，能覆盖雇主员工的多类需求，企业因此不必维护多个单点方案，切换成本随之上升。第三，Lyra
              覆盖家庭和青少年，形成家庭层面的黏性，只面向成人的竞争产品难以追平。第四，NAMI 支持的同等保障执法和雇主合规要求抬高了最低可行 EAP 方案的门槛，利好具备结果测量基础设施的供应商。

              雇主的切换成本处于中高水平：实施通常要接入福利体系（健康计划、HRIS、EAP 替换）、开展员工沟通活动，并完成服务提供者资质审核。Lyra 的多年期企业合同和测量驱动照护报告带来行政黏性——雇主若依赖 Lyra
              的员工心理健康分析来制定 HR 策略，切换时会面临数据损失和重新实施成本。多栖使用风险为中等：雇主可能在 Lyra 的临床层之上叠加竞争对手的辅导方案，尤其是 Modern Health、BetterHelp
              等辅导平台提供低成本入口后，这一风险更明显。

              关键竞争风险包括：（1）Spring Health 结果追平——Spring Health 的 JAMA 证据和结果主张几乎追上 Lyra 的临床可信度；如果 Spring Health
              补齐家庭覆盖和照护复杂度，Lyra 的临床差异化会弱化；（2）PEPM 商品化——更多数字挑战者进入市场后，雇主采购团队越来越把心理健康福利当作商品，推动 PEPM 压缩；（3）保险公司捆绑——Optum 和
              Cigna 能把行为健康服务捆进健康计划合同，边际增量成本接近零，形成 Lyra 在没有保险公司伙伴时难以匹配的定价压力；（4）AI 颠覆——生成式 AI
              原生心理健康平台可能以大幅更低的单位经济，提供近乎即时的辅导和分诊，威胁 PEPM 模式；（5）反向运营证据——Global Wellness Institute 关于雇主员工健康项目 ROI
              不确定性的数据，再叠加 2025–2026 年宏观环境下的企业降本压力，可能促使雇主削减心理健康 PEPM 支出。

              Lyra 在 2026 年 5 月推出青少年 / 青年成人照护，并上线可规模化的 AI 向导，显示公司正主动扩大临床宽度领先。2026 年 3 月获得 Workday Preferred Partner
              身份，以及新增经理辅导模块，则表明公司在 GTM 上加码，以深化与雇主平台的集成。这些动作说明，Lyra 已经意识到商品化风险，也看到了 HR 平台集成带来的分发权优势。
