          detail: PEPY 雇主合同和健康计划渠道费用；规模估计 ARR $200M+，但未确认。
          tone: positive
        - id: clinical-opex
          label: 临床人力和交付 OpEx
          detail: 最大运营成本；覆盖全球治疗师、教练、护理协调员和临床管理。
