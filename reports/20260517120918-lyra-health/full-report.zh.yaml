  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Lyra Health 处在两个市场的交汇处：传统雇主赞助行为健康和 EAP 市场，以及新兴数字心理健康平台市场。主要收入机制是雇主代表覆盖员工支付按员工按年（PEPY）订阅费，这把 Lyra
              明确放在雇主福利渠道，而不是消费者或临床直接付费渠道 [CM001]。


              相关市场边界包括通过数字平台交付的雇主赞助心理健康和物质使用障碍（SUD）福利，覆盖治疗、教练、精神科和自助式照护工具 [CM002]。纳入的支出包括 EAP
              合同、独立数字心理健康点解决方案、与医疗福利一同管理的行为健康 carve-out，以及带有临床级心理健康组件的员工身心健康平台。Lyra 核心可服务市场排除：没有雇主合同的消费者端心理健康 App（如
              BetterHelp 直面消费者）、完全通过商业保险交付的临床行为健康、政府资助的 Medicaid/Medicare 行为健康项目，以及医院住院精神科服务。


              主要现状替代品是传统 EAP，即按固定费用收费的商品化服务，历史上每年提供三到八次咨询，价格约 $15–25 PEPY，使用率为 3–6% [CM003]。次级替代品包括商业健康计划的行为健康
              carve-out（Optum Behavioral Health、Magellan Health）、具备心理健康能力的远程医疗平台（Teladoc/BetterHelp for
              Work），以及雇主赞助的内部身心健康项目。Global Wellness Institute 估计 2024 年全球健康经济规模为 $6.8T [CM004]，其中职场健康是快速增长的子行业，与 Lyra
              在预防性心理健康和韧性项目上的相邻机会重叠。


              Mental Health Parity and Addiction Equity Act（MHPAEA）及其 2023 年最终规则（2025 年 1
              月生效）是关键的市场边界驱动因素。该规则要求自保和全保雇主健康计划在非数量治疗限制（NQTL）层面，确保心理健康和 SUD 福利不比类似医疗 / 外科福利更严格
              [CM005]。这一监管要求实际上强制雇主投资合格的心理健康福利基础设施，把市场边界扩展到 2023 年规则之前不存在的合规驱动支出 [CM006]。


              Lyra 平台整合了：(a) 通过经过筛选的治疗师、教练和精神科医生网络提供雇主赞助访问，(b) 支持会话之间技能训练的数字工具，(c) 面向 HR / 福利团队的分析仪表盘，以及 (d)
              将员工匹配到合适照护层级的福利导航服务 [CM007]。这种一体化模型把 Lyra 放在商品化 EAP 之上（价格 / 质量曲线）和完整行为健康 carve-out
              之下（范围和成本），占据行业越来越称为「综合数字心理健康」细分的差异化位置。
