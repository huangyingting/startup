      - number: '6.5'
        title: 扩张动态、先落地再扩张及集中度风险
        blocks:
          - type: paragraph
            body: >
              Lyra 的扩张模型沿两条轴推进：（1）在现有雇主账户内，向更高福利层级和家庭成员增购；（2）通过直销和新兴分销渠道拿下新雇主账户。 现有账户这条轴能从产品架构看出来：核心 EAP 替代方案已经延伸到 Lyra
              Empower（教练和自定节奏项目）、 专科护理卓越中心（儿童 / 青少年、神经多样性、复杂病症）、Manager Coaching（May 2026 推出） 以及 AI
              辅助匹配层。这些都可以加进现有雇主合同，提高现有客户的 PEPY 收入。

              集中度风险：大雇主主战场（5,000–100,000+ 名员工）天然会让收入集中在相对少数雇主身上。如果前 10 大雇主贡献总 ARR 的 30%+——考虑到 Morgan Stanley（约 80K
              名员工）、Starbucks（约 350K 名员工）和 AT&T（140,000+ 名员工）各自都可能是数百万美元级 PEPY 账户，这一情形很可能成立——任何单一超大账户流失都会成为重大收入事件。 Lyra
              没有披露头部账户收入集中度。

              渠道依赖风险：Lyra 对 Workday Wellness 渠道（首选心理健康合作伙伴）的新依赖， 会把获客集中在单一平台生态里。如果 Workday 调整合作伙伴，入站线索流可能减少。类似地，Carelon
              健康计划渠道（April 2026） 引入了一个拥有定价杠杆和参保控制权的支付方中介。合作伙伴依赖带来新的交易对手风险，性质不同于直接企业客户流失。

              采购摩擦：企业心理健康福利决策每年在福利开放注册规划期做出（January 计划年通常在 Q2–Q3 规划），
              形成季节性采购周期，赢单和丢单集中发生。多年合同降低流失风险，也会在两个方向上延后竞争替换。新企业客户赢单需要 HR、财务、 法务和采购团队签批；中大型账户典型销售周期为 6–12 个月，形成有意义的 CAC
              压力，也要求公司维持大型直销团队。

              国际扩张是一个新维度。Lyra 提到过服务全球成员，也发布过关于扩展全球心理健康战略的报告，但美国以外收入和客户数没有公开披露。 Workday Wellness 合作和 Carelon 交易说明，尽管 Lyra
              在建设全球服务提供者网络，收入集中度仍主要由美国市场主导。
