      - number: '5.2'
        title: 平台架构与运营模式
        blocks:
          - type: paragraph
            body: >-
              Lyra 的平台围绕三个前端门户组织——成员端应用、服务者端 EHR 和雇主端仪表盘——全部运行在基于 Amazon Web Services、符合 HIPAA 的云上。Lyra 发布的安全页面明确确认 AWS
              是云服务商，并列出正在使用的 AWS 原生安全服务：GuardDuty 用于异常检测，Inspector 用于漏洞扫描，IAM Access Analyzer 用于访问治理，Security Hub
              作为统一安全态势仪表盘。Lyra 称其以 AWS Well-Architected Framework 作为配置基线。

              匹配层是核心 AI/ML 引擎，负责把新进入的成员路由到合适的照护方式（辅导、治疗、药物管理或数字项目），再根据临床契合度、可用性和成员偏好匹配具体服务者。Lyra
              没有公开披露这一匹配引擎的算法细节；鉴于公司把它定位为平台核心知识产权，这是重大尽调缺口。

              Lyra Engage EHR 是服务者侧临床管理系统。在 Lyra Engage 中，2026 年 5 月推出的 Care Insights Hub 被描述为一项 AI
              驱动的能力：它使用客户互动数据和临床人员评分评估，并在每一步保留人工监督，为服务者及其指派的 Clinical Managers 浮现单次咨询层面的模式。这让 Lyra Engage
              不止于基础排期和文档，而是进入持续质量改进闭环，可能强化服务者留存和照护一致性。

              结果数据库汇总标准化评估分数，包括 PHQ-9（抑郁）、GAD-7（焦虑）和 AUDIT（酒精使用），这些分数在多次咨询中纵向收集。该数据集代表数百万次治疗咨询，Lyra
              称其既是匹配算法训练数据的基础，也是公开同行评议结果研究的基础。该数据集的来源、规模和独立可审计性没有公开披露。
