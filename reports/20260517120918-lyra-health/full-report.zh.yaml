      - number: '3.4'
        title: 功能、定价与 GTM 对比
        blocks:
          - type: paragraph
            body: >-
              企业心理健康福利领域的功能差异已经大幅收敛。所有主要数字挑战者如今都提供教练、治疗、自助项目，以及某种由评估驱动的匹配。Lyra 仍保有可证明差异化的维度包括：（1）临床深度和复杂照护能力——Lyra
              在内部提供药物管理、强化门诊支持和复杂个案导航，而 Spring Health 和 Modern Health 在高急性需求上更多依赖网络转诊；（2）家庭和青少年覆盖，拥有超过 6,500
              名儿童专家——这是竞争对手网络更薄弱的未充分服务细分；（3）结果透明度，由同行评审研究（参与者整体医疗索赔成本下降 26%）和 12 个月随访数据（81% 维持收益）支撑；以及（4）由 JAMA Open
              发表研究验证的 AI 驱动匹配，区别于 Spring Health 的 ML 匹配（同样有 JAMA 发表）和 Modern Health 的 Adaptive Care
              Model，后者依靠评估路由，而不是预测匹配。

              这一类别的定价模型仍不透明。所有主要供应商都按 PEPM（每名员工每月）或参与会员模型定价，中端市场典型区间为 $3–7 PEPM，大客户谈判企业价远低于标价。传统 EAP 把预期锚在 $1–3 PEPM（基础
              EAP，3–5 次会话）。数字原生挑战者在证明 ROI 时，可收取传统 EAP 价格 3–5 倍的溢价。KFF 2023 年 Employer Health Benefits Survey 发现，95%
              的雇主计划投资 Total Rewards，包括心理健康——这验证了需求，也加剧了对预算份额的竞争。Lyra、Spring Health 和 Modern Health
              都拒绝公布标价，需要定制采购沟通；这有利于已有关系和参考客户的供应商。

              GTM 和分销能力存在实质差异。Lyra 已与医疗健康、建筑、零售和专业服务等行业公司建立直接雇主关系，并通过健康计划合作伙伴扩大覆盖（公司披露可通过合作伙伴和计划触达 200M+ 人）。Spring
              Health 的 2026 年 Workday 集成公告（Lyra Health 于 2026 年 3 月加入 Workday Wellness，成为 Preferred Partner；Spring
              Health 也与 Workday 集成）说明 HR 平台分销具有战略重要性。Modern Health 把与现有 HR
              和福利工作流集成作为核心功能。传统在位者（Optum、Magellan）通过保险公司渠道维持主导分销，但缺乏赢得新 RFP 的数字产品护城河。

              信任和监管姿态会影响采购。NAMI 的心理健康同等权益倡导以及 2008 年 Mental Health Parity and Addiction Equity
              Act（MHPAEA）为雇主投资心理健康提供监管顺风——但也规定了最低覆盖标准，部分商品化基础 EAP 层。凭临床结果和同等权益合规形成差异化的供应商（可证明网络充足性、结果报告）获益更大。Lyra 2026 年
              3 月 Workday Preferred Partner 公告和 2026 年 5 月青少年照护扩张，显示公司仍在投入分销触达和临床广度。
