      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              CEO David Ebersman（Facebook 前 CFO，2009–2014）是 Lyra Health 雇主商业化模型的创始人和主要战略设计者。 他与 Fortune 500 HR 和 CFO
              领导者的直接关系是核心收入驱动因素。他若离开，会在关键融资期冲击战略连续性、大型企业账户关系和投资者信心。 公司没有公开披露接班计划。

              临床领导层留任有两条风险轴：首席临床官（Chief Clinical Officer）和临床督导既承担质量保证责任（HIPAA 合规、APA 远程心理学标准、结果测量），
              也承载竞争差异化价值（临床方法、治疗师培训、证据基础）。临床领导层流失可能削弱雇主客户信任，并造成监管合规缺口。 工程人才留任面临大型科技雇主竞争，后者提供流动性更强的股权；负责匹配算法和 HIPAA
              合规平台架构的 AI/ML 团队， 需要同时具备机器学习和医疗合规能力。

              BLS 数据确认，2022 年心理健康咨询师年薪中位数为 $49,710；Lyra Health 面向治疗师承包商的价值主张必须持续优于私人执业经济账，
              才能维持网络稳定，尤其是在供给收紧阶段。如果平台经济性不利——薪酬更低、行政负担更重、排班灵活性更差——承包商流失会加速， 并放大供给端运营风险。

              Lyra 的股权激励锚定 January 2022 的 $5.58B 估值；在降价融资场景下，持有行权价反映 2022 标记的期权员工会面临水下股权，
              由此产生离职动机，叠加关键人物和工程人才留任风险。水下股权、行业重定价逆风和融资不确定性叠加，让工程和临床领导团队面临艰难留任环境。
            claimRefs:
              - CR041
              - CR042
              - CR043
              - CR044
              - CR045
