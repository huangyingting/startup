      - number: '5.5'
        title: 信任、安全、隐私与合规
        blocks:
          - type: paragraph
            body: >-
              Lyra 的安全态势记录在专门安全页面上；以数字健康初创公司标准看，该页面细节异常充分。项目覆盖组织控制（政策、程序、安全培训、背景调查）、基础设施控制（AWS
              原生工具、WAF、网络分段、ZTNA）、终端控制（全盘加密、MDM、EDR、应用拒绝列表）、身份与访问管理（最小权限、RBAC、MFA、每月关键访问审查），以及与 HIPAA 和 HITRUST CSF
              对齐的事件响应项目。

              Lyra 符合 HIPAA，也符合 CCPA/CPRA。公司每年接受 HITRUST CSF 审计；这是一个严格的综合安全与隐私框架，纳入 HIPAA、HITECH、NIST、ISO、PCI、FTC 和
              COBIT 标准。Lyra 还维持 SOC 2 Type II 认证（公司背景中提到），但完整审计报告不公开；只可按要求提供证明函。第三方每年对 Lyra 的 Web 应用进行渗透测试，同样可按要求提供证明函。

              数据加密的最低标准是传输中 TLS 1.2、静态 AES-256，并使用 AWS KMS 和客户专属加密密钥实现数据库级保护。所有员工账户都要求 MFA。生产系统管理访问仅限经授权人员通过 ZTNA
              连接。数据防泄漏（DLP）控制监控通信和协作平台，并禁止便携介质（USB）。

              Lyra AI 部署受 Polaris Principles 约束，其中包括把安全和伦理置于最高优先级，并在全流程保留人工服务者监督。Care Insights Hub 也同样把人类 Clinical
              Managers 定位为决策者，AI 只负责浮现洞察而非做出临床判断。这种分层人在回路设计符合临床 AI 的新兴标准，但具体第三方 AI 治理审计尚未公开披露。
