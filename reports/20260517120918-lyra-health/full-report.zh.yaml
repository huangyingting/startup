      - number: '4.4'
        title: 公开牵引力与披露指标：成员规模、结果主张、财务不透明
        blocks:
          - type: paragraph
            body: >-
              Lyra 的公开牵引力证据在临床覆盖和结果质量上很强，但财务指标几乎空白。截至 2026 年，公司官方材料和新闻稿披露：通过直接雇主合同在全球服务超过 20 million 人，通过健康计划和合作伙伴关系触达超过
              100 million 人；服务者网络包括全球 6,500+ 名儿童心理健康专科人士和 15,500+ 名儿科服务者。这些数字代表显著运营规模，也意味着可观成本基础，但 Lyra
              没有把成员数量或服务者网络规模转化为收入、ARR 或留存数据。

              行业和分析师估算认为，Lyra 在 2022–2023 年的 ARR 处于 $200M+ 区间，依据是披露雇主数量和 PEPY 定价假设的粗略外推。Lyra 未确认这一估算。此前融资轮次和增长轨迹（2020
              年客户数大约翻倍）暗示公司已有显著收入规模，但承销所需的精确度无法从公开来源获得。

              Crunchbase 关于 Series E 的文章提到，Lyra 预计在 2021 年中该轮融资后服务超过 2 million 成员。到 2026 年 3 月，这一数字已增至 20 million，约五年增长
              10 倍；这可能意味着“成员”的定义大幅变宽（包括健康计划覆盖人群），也可能意味着直接雇主覆盖人群快速自然增长。这一差异对收入承销很重要，因为 PEPY
              收入只来自直接雇主合同，不来自经济模型可能不同的健康计划伙伴关系。

              2026 State of Workforce Mental Health Report 是 Lyra 第六份年度报告，调研了全球 500 名福利负责人和 7,500
              名员工，记录需求侧压力：超过三分之一员工称自己只是勉强撑住，而非真正状态良好；按 Lyra 报告，严重心理健康需求在过去一年上升 67%。这些发现承担双重商业目的——既支撑 Lyra 产品的必要性，也把 Lyra
              塑造成该品类中以证据为基础的权威。
