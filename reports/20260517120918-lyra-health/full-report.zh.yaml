  - id: FR002
    title: 风险传导图——财务和竞争风险级联
    type: dag
    layout: wide
    summary: >-
      有向风险传导图，展示宏观和竞争触发因素如何级联进入 Lyra Health 的财务模型。治疗师供给短缺和竞争替代是上游驱动因素，会造成服务质量恶化和雇主流失，进而压低 ARR
      并削弱融资。融资失败或降价轮是核心财务风险节点：它会级联引发人才流失、产品投入不足和竞争劣势加速。隐私执法是另一条风险链，从数据实践传导到 FTC
      行动，再到品牌受损和雇主信任侵蚀。雇主客户流失和下一轮融资是最需要监控的两个前置指标。
    claimRefs:
      - CR015
      - CR027
      - CR034
      - CR035
      - CR037
      - CR038
      - CR041
    data:
      nodes:
        - id: r1
          label: 治疗师供给短缺
          detail: 全国 31,109 个岗位空缺；结构性劳动力缺口
        - id: r2
          label: 承包治疗师流失
          detail: 治疗连续性中断；重新匹配增加开销；质量恶化
        - id: r3
          label: 竞争替代（Spring Health / 保险方）
          detail: Spring Health $190M Series D；保险方捆绑；EAP 升级
        - id: r4
          label: 雇主客户流失
          detail: 年度续约周期；福利合理化；CFO 成本压力
        - id: r5
          label: ARR 下降 / 收入停滞
          detail: PEPM 合同模式；企业客户集中；实时 ARR 能见度有限
        - id: r6
          label: 融资失败或降价轮
          detail: $5.58B 2022 年估值；行业 40-60% 重定价；现金跑道未知
        - id: r7
          label: 员工股权价值受损
          detail: 降价轮压低股权薪酬价值；关键人才流失诱因
        - id: r8
          label: 工程和临床人才流失
          detail: 股权价值低于行权价；其他公司薪酬更有竞争力
        - id: r9
          label: 产品和临床投入缺口
          detail: AI 匹配、平台可靠性、临床工具投入不足
        - id: r10
