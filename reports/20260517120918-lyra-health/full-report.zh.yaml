      - number: '2.5'
        title: 规模测算与尽调缺口
        blocks:
          - type: paragraph
            body: >
              几个结构性数据缺口影响市场分析的信心，需要在正式尽调中解决。


              **缺口 1——没有权威市场规模。** 没有独立市场研究机构对「美国雇主赞助数字心理健康平台」这一离散类别发布干净、可审计的估计。IBISWorld 的 EAP 数字（约 $7B）低估数字细分；Grand
              View / Allied Market Research 的「数字心理健康」数字纳入消费者 App，因此高估。Lyra 管理层引用的「$15B+」TAM 未经验证 [CM043]。


              **缺口 2——PEPY 收入验证。** Lyra 签约 PEPY 费率没有公开披露；已发布基准从 $100 到 $500 不等，而 Lyra 客户基础的混合费率——关键 SOM 输入——仍未知
              [CM044]。通过客户访谈验证客户级 PEPY，是最终尽调步骤。


              **缺口 3——使用率和续约率。** Lyra 声称使用率高于 EAP 行业平均水平，但尚未经过独立审计。如果测量口径包括非临床教练或数字工具互动，标题数据可能夸大临床参与 [CM045]。


              **缺口 4——估值时点。** Lyra 2022 年 1 月以 $5.58B 估值融资 $235M；CNBC 2023 年 11 月报道称，数字健康估值已显著下降，多家公司接受估值下调轮。Lyra
              之后没有宣布融资，因此 2022 年估值成为唯一参照点 [CM046]。竞争对手 Spring Health 2023 年 9 月估值为 $2.5B，Headspace/Ginger 在 2021 年合并时约
              $3B，Modern Health 没有披露当前估值 [CM047]。
            claimRefs:
              - CM043
              - CM044
              - CM045
              - CM046
              - CM047
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              雇主心理健康福利市场分成三个结构上不同的竞争层级；每一层的分销路径、买方画像和定价锚点都不同。

              数字原生挑战者（Spring Health、Modern Health、Headspace Health）直接争夺 Lyra 瞄准的企业 HR 和全面薪酬 买方。这些供应商都讲 EAP
              替代故事，强调可衡量结果而不是会话次数，并按员工按月（PEPM）或参与员工计价。Spring Health 是最接近的竞争类比——2016 年创立，总部位于 New York City，采用 ML
              驱动的精准匹配，发表过 JAMA Open 结果研究，截至 2026 年全球覆盖人群超过 2,000 万。公司声称可在健康计划支出上实现 2.2× ROI，并较传统 EAP 提升 10× 参与度，直接挑战
              Lyra 的结果定位。Modern Health（2017 年创立，San Francisco）以教练优先访问和国际覆盖形成差异化，其 Adaptive Care Model
              把引导、治疗和教练接在同一平台上，需求升级时无需重新注册。Headspace Health（2021 年由 Headspace 的正念 App 与 Ginger
              临床平台合并而来）依托全球知名冥想品牌，从预防到治疗覆盖 4,000+ 家组织。

              传统管理型行为健康和 EAP 在位者——Optum Behavioral Health（UnitedHealth 子公司）、Magellan Health（现属 Centene）、Beacon Health
              Options（Elevance/Carelon）以及 Cigna 的 Evernorth EAP——通过保险公司关系掌握庞大的在管人群。这些供应商在现代 RFP
              正面竞争中很少胜出，但靠合同捆绑、保险公司渠道锁定和福利平台行政集成守住既有客户。SilverCloud Health 已被 AmWell 收购，提供面向医疗系统和付款方而非直接雇主销售的数字 CBT 项目。

              远程治疗网络（Talkspace Enterprise，2026 年 5 月市值约 $871M；BetterHelp Enterprise 通过 Teladoc，市值约
              $1.1B）主要围绕治疗师可及性、消费者熟悉度和按会话定价竞争。它们定位为远程治疗市场，而不是综合福利管理者，因此服务复杂临床需求或推动雇主系统性降本的能力受限。

              现状替代方案包括传统 EAP（通常 3–5 次会话、临床质量控制有限）、员工身心健康项目（韧性训练、正念 App）和初级保健心理健康转诊——这些都是 Lyra 的 EAP
              替代叙事要取代的对象。潜在新进入者包括借助 LLM 做自主教练的 AI 原生心理健康平台（截至 2026 年已有多家风险投资支持的创业公司），以及把行为健康作为功能包延伸进去的通用远程医疗平台。
