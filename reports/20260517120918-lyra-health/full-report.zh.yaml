      - number: '7.6'
        title: 缓释措施、监控指标与终止条件
        blocks:
          - type: paragraph
            body: >-
              Lyra Health 的主要风险缓释包括：与雇主客户配套的 HIPAA BAA 合规基础设施、合同治疗师州执照监控项目、 使用 PHQ-9 和 GAD-7
              的结果测量框架、循证治疗协议（CBT、DBT、MBSR），以及高管级雇主关系管理。 公司临床模型结合 AI 匹配、基于测量的护理和精选治疗师网络，相对商品化 EAP 替代方案形成产品差异化， 也让已投入实施的
              HR 和福利领导者更难切换。

              三个需要重新评估投资的投资逻辑破裂触发器：（1）重大 HIPAA 执法行动、FTC 和解，或金额达到 $50M 或以上的集体数据泄露和解， 表明出现类似 BetterHelp
              的系统性数据实践失败；（2）出现系统性治疗师质量或访问失败证据，表现为雇主报告 NPS 低于 50， 或年度雇主客户流失超过 15%；（3）确认降价融资价格较 2022 年 $5.58B 估值低超过 40%，
              表明商业模型结构性受损或投资者信心流失。

              关键季度监控指标：FTC 心理健康应用执法案卷；DOL / 州级针对 Lyra 雇主客户的 MHPAEA 审计活动；
              治疗师承包商网络等待时间透明度；雇主客户续约率和净新增客户数；融资公告或长期缺席融资公告，作为现金跑道代理指标； 以及雇主 RFP 新闻和行业出版物中 Spring Health / Modern Health
              的竞争赢单信号。年度尽调问题： 更新后的经审计财务、治疗师网络密度报告、雇主 NPS 分数，以及数据流隐私审计。
            claimRefs:
              - CR046
              - CR047
              - CR048
