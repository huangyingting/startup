      - number: '1.4'
        title: 规模指标与市场位置
        blocks:
          - type: paragraph
            body: >
              Lyra 的 2026 年公开首页是本章可取得的最新规模指标。截至 2026 年，公司称自己是「领先的心理健康照护提供商，通过直接雇主合同在全球服务超过 2,000
              万人」。首页还提到，可通过合作伙伴和计划触达超过 2 亿人。目前首页列出的 30,000+ 全球服务方网络和每年 100,000+ 小时临床监督，反映其网络深度。


              Lyra 官网引用的结果数据包括：10 名会员中有 9 名改善；康复速度为传统照护的两倍；81% 的会员在 12 个月随访时维持收益；员工每周恢复约 4 小时生产力，折合每名员工每年节省
              $4,800；参与者每年整体医疗索赔成本下降 26%。这些数据由公司自报，最适合作为营销基准；独立同行评审验证需要取得 Lyra
              发表的研究。公司首页确实提到有「大量同行评审发表研究」确认其照护模型，但仅从首页无法捕捉具体引用和研究链接。


              收入、员工数和单个客户细节仍未公开。本章背景研究估计年经常性收入约 $200M、员工数约 1,100 至 1,200 人，但这两个数字均未由本轮公共文件或独立来源确认。公开媒体报道点名的客户包括 Morgan
              Stanley、Uber、Starbucks、Zoom 和 Genentech，但具体合同条款、收入贡献和续约状态没有公开资料。2026 年新闻页确认了 2026 年 3 月 Workday Wellness
              优选合作伙伴公告，说明 Lyra 正把分销延伸进 Workday HR 生态。
