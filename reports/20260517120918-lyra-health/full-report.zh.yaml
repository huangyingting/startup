  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价：PEPY 订阅，雇主定制报价
        blocks:
          - type: paragraph
            body: >-
              Lyra Health 的收入来自面向大型雇主销售的按员工每年（PEPY）订阅模式。雇主代表覆盖员工支付协商后的年费，换取 Lyra
              平台和临床网络的使用权。公司官网称定价会“按贵组织需求定制”，且需要直接联系合作伙伴团队；因此任何层级都没有公开标价。行业对可比综合心理健康方案的估算显示，活跃覆盖人群的雇主 PEPY 费率在 $200–$400
              区间，但实际合同金额取决于服务范围、使用量保证和员工数。

              核心雇主订阅之外，Lyra 还借助健康计划和合作伙伴关系扩大收入面。截至 2026 年 3 月，Lyra 通过直接雇主合同在全球服务超过 20 million 人，并通过健康计划和合作伙伴关系触达超过 100
              million 人。2026 年 3 月宣布的 Workday 合作，将 Lyra 指定为 Workday Wellness 的 Preferred Mental Health
              Partner，体现分发合作如何在不为每个账户投入完整直销资源的情况下扩大覆盖。

              PEPY 模式的收入确认相对清晰：费用通常按订阅方式在合同期内均匀确认。按使用计费的附加项——诊疗咨询、专科转诊、药物管理咨询——可能按事件确认，带来一定波动。Lyra
              的产品组合如今覆盖预防性身心健康工具、临床治疗、药物管理、家庭和儿科照护，以及经理辅导；这些都可能作为单独模块定价，也可能打包进综合 PEPY 费率。公开材料没有披露各板块的收入结构。
