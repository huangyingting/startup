chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              Lyra Health, Inc. 是一家心理健康与身心健康技术平台，注册地为 Delaware，总部位于加州 Burlingame。公司在 SEC 备案的主要邮寄地址是 287 Lorton Avenue,
              Burlingame, CA 94010；但公司的 HIPAA 隐私通知将其临床子公司 Lyra Clinical Associates P.C.（LCA）的临床运营地址列为 270 E. Lane,
              Burlingame, CA 94010。根据所有可取得的公开文件，公司自 2015 年成立以来一直在 Burlingame 运营。


              Lyra 的核心产品是雇主赞助的心理健康福利平台，通过一张经过筛选、重视结果的服务方网络，把员工连接到治疗师、教练和精神科医生。公司还提供数字化治疗项目、自助式身心健康工具，以及给雇主展示汇总人群健康洞察的 HR
              分析仪表盘。商业模式是按员工按年（PEPY）SaaS，直接卖给大型企业雇主，帮助其用 Lyra 的综合方案替代传统员工援助计划（EAP）。


              公司的全服务方案覆盖：预防性支持（自助资源和循证教练）、临床照护（治疗和药物管理）、通过卓越中心 处理急性与复杂心理健康需求的内部专科服务、面向儿童、青少年、伴侣和家庭的家庭支持（包括 6,500+
              名儿童心理健康专家），以及面向医疗系统合作伙伴的医心协同照护。截至 2026 年，Lyra 的主要收入渠道仍是雇主，同时也服务健康计划和医疗系统合作伙伴。Lyra 官网称，公司通过直接雇主合同在全球服务超过
              2,000 万人，并通过合作伙伴和计划触达超过 2 亿人。


              Lyra Clinical Associates P.C. 是由独立所有者持有的专业执业实体，持证临床人员通过该实体交付临床照护。Lyra Health, Inc. 向 LCA 提供行政、技术和相关服务；Lyra
              Health, Inc. 本身不提供心理健康、医疗或其他医疗服务。这一结构对责任分析和 HIPAA 合规具有实质意义。公司是 HIPAA 覆盖实体，并持有 HITRUST CSF
              认证；在企业行为健康销售中，这是有分量的合规信号。
