      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Lyra Health 已完成六次披露的 Form D 融资事件，均有 SEC EDGAR 文件记录；此外还有更早的种子轮和 A 轮，但在现有公开记录中尚未由单独文件确认。这六次事件合计约
              $851.7M；计入早期轮次后，公司累计融资估计约 $910M，与公开报道引用的 $910M 数据一致。


              SEC Form D 时间线（全部 CIK 0001733914，每份文件均确认 Delaware 注册）：最早文件（2018 年 6 月提交，销售日期为 2018 年 2 月）显示从 19 名投资者融资
              $45M。第二轮（2020 年 3 月提交，销售日期为 2020 年 2 月）显示从 19 名投资者融资 $75M。第三轮（2020 年 8 月提交，销售日期为 2020 年 8 月）显示从 23 名投资者融资
              $110M。第四轮（2021 年 1 月提交，销售日期为 2020 年 12 月）显示从 33 名投资者融资 $186.7M；与该事件相关的公开报道称估值为 $2.25B，并将其标注为 D 轮或 E
              轮首次交割。第五轮（2021 年 6 月提交，销售日期为 2021 年 6 月）显示从 28 名投资者融资 $200M；PR Newswire 将其称为「Series E Funding」。第六次、也是最近一次
              Form D（2022 年 1 月提交，销售日期为 2022 年 1 月 7 日）显示从 4 名投资者融资 $234,999,956，对应广泛报道的 $235M F 轮，投后估值 $5.58B。


              F 轮由 Dragoneer Investment Group 领投。当时的公开报道提到，Sequoia Capital、Coatue Management、BlackRock 和 Fidelity
              Investments 在公司后期轮次中继续投资或新进入，但 SEC Form D 没有逐名披露单个投资者。公司还报告称员工也以投资者身份参与。F 轮投资者数量只有 4 名（上一轮为 33
              名），与集中机构财团或少数大额支票参与者的特征一致。


              现有来源未确认任何债务融资、可转债或老股交易数据。公司未披露流动性路径（IPO 或并购），其估值仍是 2021 年末 / 2022 年初私人市场高点定价；自 2022 年 1
              月以来，没有公开可取得来源更新这一估值。
