      - number: '6.3'
        title: 采用轨迹与使用率指标
        blocks:
          - type: paragraph
            body: >
              Lyra 最具差异化的客户指标是使用率：20–25% 的覆盖员工实际使用 Lyra 服务，而传统 EAP 行业基准为 3–6%。这 4–8× 的使用率提升是 Lyra ROI
              论据的核心——接受治疗的员工越多，总体健康结果改善越多；把完整 PEPY 订阅摊开后，单个结果改善的成本也更低。官网称员工“每周恢复约 4 小时生产力，折合每名员工每年节省 $4,800”。

              覆盖人群轨迹：Lyra 在 2021 年达到 10M 覆盖人群（通过 PRNewswire 宣布），到 2023 年增至 10M+（按公司背景数据），并在 2026 年扩展到全球
              20M+（截至运行日期的公司首页主张）。该轨迹意味着 2021–2026 年覆盖人群约翻倍，反映出新增企业客户，也反映出既有账户向更多福利层级增购（Lyra Empower、专科照护附加项、儿科 /
              青少年心理健康）。直接雇主客户数从 2019 年不足 100 家，增长到 2023 年 700+ 家。

              独立验证的 ROI 数据：Lyra 2025 年 ROI 研究（独立验证，细节可见于执行摘要）记录了 3:1 ROI（每花 $1 节省 $3.04）。底层纵向研究显示，多个客户四年内总医疗成本平均每年节省
              26%。这些主张由发表于 JAMA Psychiatry 的研究支持（Lyra 博客引用），并佐证 Lyra 平台上的方向性结果证据。成员层面：10 名 Lyra 成员中有 9 名变好；康复速度比传统照护快
              2×；81% 的成员在 12 个月随访时维持治疗改善。这些是公司报告的结果，基于对成员执行的标准化临床评估工具（PHQ-9、GAD-7），但具体方法的独立验证只做了部分披露。
