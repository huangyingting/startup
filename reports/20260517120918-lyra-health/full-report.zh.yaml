      - number: '7.3'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Spring Health 在 September 2023 Series D 融资 $190M，扩张到 4,000+ 家雇主客户；其精准精神科模型包括基于测量的护理、 药物管理和 AI 驱动匹配。Axios
              将这轮融资记录为：在融资环境收紧时，机构投资者验证了 Spring Health 的竞争耐久性—— 这直接缩窄了 Lyra Health 的差异化窗口。Modern Health 和 Headspace
              Health（据 CNBC，Headspace/Ginger 在 2021 以 $3B 合并）争夺同一批企业 HR 和福利合同，使大型雇主通常会评估 3–4 份竞标方案。竞争强度压缩 PEPM 定价，
              并推高获客成本。

              保险公司打包式行为健康是结构上威胁最大的竞争方向。United Health Group 的 Optum Behavioral Health 和 Cigna 的 Evernorth/MDLive
              部门把心理健康福利整合进主要医疗覆盖。与这些保险公司合作的自保雇主，可能把打包式行为健康纳入更广泛的成本控制策略；
              多产品折扣结构是点解决方案无法匹配的，因而会绕开独立供应商。保险公司能访问整合索赔数据，进一步强化打包价值主张。

              EAP 既有厂商——ComPsych、Magellan Health、Optum EAP——长期掌握 HR 和福利管理者关系，也有成型治疗师网络。 其更低的单疗程成本结构（限制疗程、雇主付费）会让 Lyra
              的无限疗程高端模式在福利优化审查中处于比较劣势。 Fierce Healthcare 确认，既有 EAP 正在升级平台，以对抗 Lyra 的数字体验。

              KFF 的 2023 Employer Health Benefits Survey 记录，总福利成本上升是 CFO 的主要担忧；在福利优化中， 点解决方案心理健康供应商最先被审查。CNBC
              对数字健康融资的分析确认，雇主新增补充心理健康合同的意愿较 2021–2022 高峰明显降温，CFO 要求更强 ROI 证据和更具竞争力的定价。The Atlantic 的竞争分析记录，Lyra、Spring
              Health、 Modern Health 和 Headspace Health 定位重叠，在 RFP 中带来商品化风险。
