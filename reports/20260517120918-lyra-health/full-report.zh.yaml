  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 按客户工作流拆解的产品界面与照护方式
        blocks:
          - type: paragraph
            body: >-
              Lyra Health 的产品是雇主购买并部署给员工及其家庭的员工心理健康福利。员工端体验从移动应用（iOS 和
              Android）或网页门户开始：成员注册，完成一份简短初筛评估，然后匹配到合适的照护类型和服务者。Lyra
              官网描述了完整产品谱系：借助自助节奏数字项目和循证辅导提供预防性支持；临床照护覆盖治疗、个性化服务者支持和药物管理；针对复杂或严重心理健康状况提供专门急性支持；为儿童、青少年、伴侣和成人提供家庭支持，并接入
              6,500+ 名儿童心理健康专科人士；还提供与初级和专科医疗服务者闭环转诊的医行为协同照护。

              面向雇主，Lyra 提供福利管理门户和 HR 端分析仪表盘，覆盖使用情况、结果和 ROI 指标。面向临床服务者，Lyra 的 Lyra Engage EHR 平台处理咨询排期、临床文档和结果收集；2026 年 5
              月宣布的 AI 驱动的 Care Insights Hub 层会浮现有临床依据的模式，帮助服务者及其 Clinical Managers 提升全网络的照护质量。

              经理辅导是产品组合中新加入的独立 B2B 产品：为经理提供 1:1 认证辅导，采用循证框架，聚焦职业倦怠、困难反馈、团队动态等职场挑战，并设置清晰的升级路径，将需要更多支持的个案导入 Lyra 的心理健康平台。

              Lyra 自称，该平台通过直接雇主合同在全球服务超过 20 million 人，并且超过 200 million 人可通过合作伙伴和健康计划获得照护路径。超过 300 家领先机构已与 Lyra 签约，包括
              Meta、Pinterest 和 Starbucks。公司引用同行评议研究，称成员康复速度达到 2x，参与者年度整体医疗理赔成本下降 26%。这些数字来自公司主张；确切同行评议研究及其方法是否成立，仍是尽调要求。
