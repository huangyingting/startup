      - number: '1.5'
        title: 里程碑与时间线
        blocks:
          - type: paragraph
            body: >
              公开记录支持一条从 Lyra 2015 年创立延伸到 2026 年产品和合作扩张的里程碑时间线。融资历史最有文件支撑，由 SEC Form D 备案锚定。2018 年至 2022 年之间六次离散的 Form D
              事件，构成公司融资时间线的一手来源骨架。更早的轮次（种子轮和 A 轮，可能在 2015–2017 年）尚未在本章的单独 SEC 文件中识别，构成证据缺口。


              现有来源对产品里程碑的日期标注不够精确。2026 年首页和新闻页确认了近期产品发布：Lyra AI（面向会员匹配和分诊、临床严谨的 AI 助手）在 2026 年 5 月被描述为全球扩展；Manager
              Coaching 于 2026 年推出，用于应对组织倦怠；全面的青少年和年轻成人心理健康照护于 2026 年 5 月推出。Workday Wellness 优选合作伙伴计划于 2026 年 3
              月公布。这些信息均来自 Lyra 新闻页，属于公司控制渠道。


              一个反向里程碑来自更广泛的行业背景：心理健康技术平台整体面临围绕雇主—员工数据访问的审视，隐私倡导者和媒体担心雇主能否从汇总数据或使用模式中推断行为健康状态。Lyra 的 HIPAA
              通知明确禁止在汇总、去标识化报告之外向雇主披露 PHI，公司安全页面也记录了数据丢失防护和职责分离控制。现有本章来源未确认任何影响 Lyra
              的具体监管行动、诉讼或数据泄露；这一缺失应视为开放问题，而不是已确认的清白记录。
