  - id: TP004
    title: 护城河耐久性 / 竞争风险登记表
    columns:
      - 护城河主张
      - 竞争威胁
      - 严重性
      - 尽调问题
    rows:
      - - 临床结果证据（JAMA；理赔成本降低 26%；12 个月收益保持 81%）
        - Spring Health 拥有可比的 JAMA 发表证据；如果 Spring Health 扩大临床广度和结果透明度，Lyra 的证据护城河会收窄到平局
        - 高
        - 确认 Lyra 的理赔成本降低指标已由独立方审计（Validation Institute）；评估 Spring Health 的 ROI 指标是否同样严谨；跟踪 Spring Health 未来发表 JAMA 的管线
      - - 护理连续体广度（教练 → 急性护理；药物；IOP）
        - Modern Health 和 Headspace Health 正在扩展临床层级；有保险公司背书的既有玩家已能以更低 PEPM 提供完整临床网络
        - 中高
        - 跟踪 Spring Health、Modern Health 在急性护理和药物管理扩张上的路线图；评估 Lyra 的自营与网络方式到底带来质量差异，还是只是增加成本开销
      - - 家庭和儿童心理健康（6,500+ 儿童专科人员）
        - 截至 2026 年，没有数字原生挑战者匹配 Lyra 的儿童专科深度；这是清晰差异点，但长期复制成本不高
        - 中
        - 监测 Spring Health 和 Modern Health 的家庭层级扩张；评估由家庭覆盖而非仅会员本人覆盖驱动的雇主续约率
      - - AI 匹配与个性化（JAMA 验证）
        - Spring Health 的 ML 匹配同样有 JAMA 发表；生成式 AI 原生平台可能在 2–3 年内以更低单位经济性把个性化匹配商品化
        - 中高
        - 评估 Lyra 的 AI 匹配优势在算法本身，还是在纵向临床数据资产；评估相对 Spring Health 的数据网络效应规模
      - - 雇主切换成本（多年期合同；结果分析；HR 集成）
        - 雇主降本周期（2025–2026 宏观环境）可能加速合同中期复盘；Optum/Cigna 的保险公司捆绑可能在续约时抵消 Lyra 的 ROI 逻辑
        - 中
        - 跟踪企业账户流失率；评估多年期合同期限是在拉长还是缩短；监测 Workday 集成深度相对 Spring Health HR 集成的差距
      - - 相较传统 EAP 和保险公司捆绑方案的 PEPM 溢价
        - 传统 EAP 既有玩家以 $1–3 PEPM 与保险公司合同捆绑定价，让成本承压的采购团队觉得增加 Lyra 的增量成本很高
        - 高
        - 跟踪与保险公司捆绑 EAP 替代方案竞争时的赢单 / 输单率；评估 Lyra 的 ROI 文档是否足以在下行周期支撑 3–5× 溢价
    notes: >-
      护城河主张和威胁严重性评级是分析师基于截至 2026 年 5 月的公司披露、竞争产品分析和市场研究作出的定性评估。严重性评级（高 / 中高 /
      中）反映评估的近期竞争影响，并非来自定量模型。所有护城河主张都需要持续尽调验证能否保持；心理健康福利市场仍在快速演变。
