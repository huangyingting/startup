      - number: '3.3'
        title: 在位者、平台型与远程治疗竞争者
        blocks:
          - type: paragraph
            body: >-
              传统管理型行为健康在位者主要靠保险公司分销渠道和行政集成守住位置。Optum Behavioral Health 是 UnitedHealth Group 的一个部门，而 UnitedHealth Group
              是美国最大的管理式医疗组织；Optum 提供完整行为健康服务连续体，包括员工援助计划（Emotional Wellbeing Solutions）、临床网络管理，以及用于正念和筛查的 Calm Health
              集成。Optum 的竞争护城河不是产品更强，而是深度嵌入 UnitedHealth 的健康计划管理，使其在雇主健康计划采购中天然进入考虑名单。Optum 的临床指导框架——个性化、循证照护导航——与 Lyra
              定位相似，但 Optum 的数字体验和结果透明度落后于数字原生挑战者。Optum 可以把行为健康捆进更广泛的健康保险包，形成定价和切换壁垒。

              Magellan Health（2022 年被 Centene 收购）和 Beacon Health Options（被 Elevance Health/Carelon 收购）代表传统 EAP
              和管理型行为健康范式。Magellan 通过与健康计划和大型雇主的风险合同，管理超过 3,500 万会员的行为健康。Magellan 和 Beacon 都围绕价格（基础 EAP 通常 $1–3
              PEPM）、网络访问广度和行政效率竞争，而不是临床结果测量或数字参与度。追求循证结果的成熟雇主在竞争性 RFP 中很少选择这些供应商，但它们依靠惯性和保险公司捆绑保留大量客户。Magellan
              官网强调组织劳动力心理健康项目、危机支持和职业健康服务，并列临床 EAP。

              SilverCloud Health（现以 silvercloud.amwell.com 名义在 AmWell 旗下运营）提供面向抑郁、焦虑、压力和睡眠的数字
              iCBT（互联网交付认知行为疗法）项目。SilverCloud 最初定位为医疗系统和付款方临床照护的补充，后来被 AmWell 收购，显示数字心理健康正在并入虚拟照护平台。AmWell/SilverCloud
              的组合主张更多瞄准付款方和医疗系统，而不是直接雇主销售，因此更像临床合作伙伴，而不是 EAP 替代品。

              Talkspace（NASDAQ: TALK）运营企业心理健康项目，通过自有治疗师市场，以视频、文字和音频消息提供治疗。Talkspace 市值约 $871M（2026 年 5 月）、股价
              $5.20，年初至今股价显著上涨（YTD 43%，1 年 74%）。公司把企业产品定位为面对面治疗的可及、可负担替代方案，主要围绕便利性和治疗师多样性竞争，而不是临床结果测量严谨性。Talkspace
              面向消费者的品牌和广泛治疗师网络带来认知度，可能吸引寻找熟悉、具成本效益选项的企业买方。

              BetterHelp（Teladoc Health 子公司，NYSE: TDOC）是全球最大的在线治疗市场，主要面向消费者，但正在向雇主 / 企业渠道扩张。截至 2026 年 5 月，Teladoc 整体市值约
              $1.1B，较峰值大幅下滑，反映市场怀疑 BetterHelp 消费者模型能否可持续扩张。BetterHelp 的企业推进让雇主可通过 B2B 平台接入其治疗师网络，但其消费者优先
              DNA、有限的临床结果报告，以及隐私担忧（FTC 对心理健康 App 数据实践的审查）限制了其与 Lyra 企业优先定位竞争的能力。LifeStance Health（NASDAQ:
              LFST）是一家门诊心理健康提供商，2026 年 5 月市值约 $2.9B（127× 市盈率），代表另一种竞争模型——实体和虚拟门诊诊所，而不是雇主福利产品。
