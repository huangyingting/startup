      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              David Ebersman 是 Lyra Health 的创始人兼 CEO。创立 Lyra 前，Ebersman 于 2009 年至 2014 年担任 Facebook（现 Meta）首席财务官，负责公司
              2012 年首次公开募股。公司背景资料称他为「前 Facebook
              CFO/CCO」。他之所以把技术和数据用于改善行为健康可及性，源于他观察到科技员工面临的心理健康挑战；他在大型消费科技公司的运营经验，也直接塑造了 Lyra 的企业 SaaS 设计。2018 年至 2022
              年所有 SEC Form D 文件均将 Ebersman 列为高管兼董事，他还以 CEO 身份签署了 2020 年和 2021 年文件。


              2022 年 1 月 SEC Form D 文件披露的 Lyra Health 董事会包括 David Ebersman（CEO 兼董事）、Bryan Roberts、Bob Kocher、James
              Slavet、Somesh Dash、Kerry Chandler、Elaine Yang、Danielle Gray、Robynne Sisco 和 Hubert Lin。董事会阵容随融资轮次明显扩张：2018
              年文件只列出 Ebersman、Roberts、Kocher、Slavet 和 Yang，而 2022 年文件新增 Dash、Chandler、Gray、Sisco 和 Lin。Kerry Chandler 和
              Danielle Gray 首次出现在 2021 年文件中，显示董事会扩容与 E 轮和 F 轮流程相关。2022 年文件将 Lisa Caccavo 标识为总法律顾问兼助理秘书，并由她作为该 Form D
              的授权签署人。


              关键人依赖值得重视。Ebersman 同时是创始人兼 CEO，也是 SEC 文件中唯一具名的高管，再加上外界将他视为公司愿景设定者，形成单一领导人集中风险。在可取得来源中，公司没有公开披露总裁、COO
              或具名继任计划。随着 Chandler 和 Gray 在公司发展后期加入，融资历史中的董事会多元性有所改善，但 CEO 角色之外的治理厚度仍是尽调缺口。
