      - number: '4.3'
        title: 成本结构与毛利率：临床人力主导，技术层可扩展
        blocks:
          - type: paragraph
            body: >-
              Lyra 的成本结构体现了一个叠加技术平台的临床服务交付模式。最大成本项是临床人力：治疗师、辅导员、药物管理服务者和照护协调员，或由 Lyra Clinical Associates P.C.
              及关联专业执业机构雇佣，或以合同方式接入。Lyra 这种规模的公司——全球支持 20 million
              成员——背负着与咨询量和临床排班直接挂钩的可变成本。美国劳工统计局数据显示，心理健康咨询师和治疗师的年薪中位数约为 $50,000–$80,000，具体取决于资质和专长；Lyra
              的临床交付很可能同时使用内部专业人员和承包者市场，两者成本曲线不同。

              第二大成本类别是技术开发和基础设施。Lyra 已经投入 AI 驱动匹配、照护搜索、服务者管理、结果测量，以及现在的 Lyra Empower 平台。2025 年推出的自由文本 AI
              照护搜索，在早期试点中被提供该功能的成员有 37% 采用，说明公司持续投入 AI 层；该层推动平台差异化，并降低人工照护导航负担。

              销售、营销和 G&A 构成第三个成本池。企业福利销售需要直销团队、福利顾问伙伴关系和深度客户管理。G&A 包括在受监管临床服务环境中运营所需的法律、合规和保险成本。

              可比 PEPY / 临床交付公司的毛利率通常在 50–70% 区间。Lyra
              的综合模式包含药物管理、急性照护协调和儿科服务，相比纯软件模式，毛利率可能被压到该区间低端，但仍明显高于传统行为健康服务机构的经济模型。儿科医疗支出下降 54%（每名儿童平均节省 $3,307）展示了 Lyra
              向雇主销售的成本抵消逻辑，但没有披露 Lyra 自身的临床交付成本。公司未公开任何毛利率数字。
