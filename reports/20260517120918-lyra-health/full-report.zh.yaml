      - number: '4.2'
        title: GTM 动作与销售效率：企业直销叠加生态分发
        blocks:
          - type: paragraph
            body: >-
              Lyra 的 GTM 模式是企业直销。公司没有自助购买路径；雇主必须联系合作伙伴团队。这符合企业级 SaaS 销售打法，目标买方是拥有数百到数万名员工公司的 HR 和福利决策者。企业福利合同的销售周期通常为
              6–18 个月，受福利续约日历、法律和安全审查、临床评估以及采购审批驱动。因此，Lyra 的销售成本结构前置，CAC 显著，只有在多年合同期内才能回收。

              公司已经投资生态分发，以降低单笔交易摩擦。2026 年 3 月的 Workday Wellness 合作，让 Lyra 成为 Workday AI 驱动的福利生态中的首选心理健康伙伴，直击一个结构性 GTM
              瓶颈：Workday 用 API 自动化福利计划设置，降低让小型 HR 团队却步的实施负担。该合作叠加更早的健康计划和承保方关系，形成第二条 GTM 渠道，不要求 Lyra 发起每一笔销售。

              单位经济的公开证据有限。公司没有披露 CAC、回本周期、净留存率（NRR）或流失率。最好的公开代理指标是支持留存叙事的采用和结果数据：10 名成员中有 9 名在照护后改善，81% 在 12
              个月随访时维持改善，康复速度达到传统照护的 2x。这些临床结果再加上年度整体医疗理赔成本下降 26%，支撑雇主扩张叙事——看到可测量成本节约的雇主，有强动机续约并把覆盖扩展到更多员工群体。覆盖可比雇主健康
              SaaS 公司的分析师估计，Lyra 的 NRR 在 115–130% 区间，但 Lyra 未确认这一数字。

              买方 ROI 已经量化。Lyra 使用 Lam Employment Absence and Productivity Scale（LEAPS）的自有研究发现，成员每周增加 4 个高产小时，相当于每名员工每年
              $4,806 的生产力收益，工作受损程度下降 31%。挑战严重的员工每周恢复 17+ 个高产小时，价值为每名员工每年 $20,882。这些数字可用作销售赋能材料；当 HR
              负责人能指向既有队列的可测量结果时，也为续约沟通提供事实基础。
