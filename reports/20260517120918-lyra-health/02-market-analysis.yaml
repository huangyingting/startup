  claims:
    - id: CM001
      statement: "Lyra Health's primary commercial model is a per-employee-per-year (PEPY) subscription paid by employers on behalf of their covered workforce, placing it in the employer benefits channel rather than the direct-to-consumer market."
      type: company-claimed
      topic: "business model"
      sourceRefs: [SM008, SM013]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM008]

    - id: CM002
      statement: "Employer-sponsored mental health and substance use disorder benefits delivered through digital platforms — including therapy, coaching, psychiatry, and self-guided tools — constitute the core market boundary for Lyra Health's addressable opportunity."
      type: inferred
      topic: "market definition"
      sourceRefs: [SM001, SM008]
      confidence: medium
      freshness: current

    - id: CM003
      statement: "Traditional employee assistance programs offer three to eight counseling sessions annually at approximately $15–25 per-employee-per-year with typical utilization of 3–6%, representing the primary status-quo substitute that digital mental health platforms displace or augment."
      type: third-party-reported
      topic: "EAP market"
      sourceRefs: [SM025, SM026, SM014]
      confidence: medium
      freshness: historical
      answersQuestionRefs: [QM002, QM020]

    - id: CM004
      statement: "The Global Wellness Institute estimated the global wellness economy at $6.8 trillion in 2024, with workplace wellness representing a fast-growing sub-sector that encompasses Lyra Health's adjacent opportunities in preventive mental health and resilience programs."
      type: third-party-reported
      topic: "wellness economy"
      sourceRefs: [SM006]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QM024]

    - id: CM005
      statement: "The 2023 MHPAEA final rule (effective January 2025) requires self-insured employer health plans to document and demonstrate that non-quantitative treatment limitations applied to mental health and SUD benefits are no more restrictive than those applied to analogous medical and surgical benefits."
      type: observed
      topic: "MHPAEA regulation"
      sourceRefs: [SM016, SM002]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM004, QM025]

    - id: CM006
      statement: "The 2023 MHPAEA final rule represents the most significant mental health parity regulatory expansion since the original MHPAEA was enacted in 2008, creating new compliance-driven spending incentives for employers to invest in qualifying mental health benefit infrastructure."
      type: inferred
      topic: "MHPAEA regulation"
      sourceRefs: [SM016, SM005]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM004, QM025]

    - id: CM007
      statement: "Lyra Health occupies a 'comprehensive digital mental health' niche above commodity EAP (on price and clinical quality) and below full behavioral health carve-outs (on scope and cost), integrating employer analytics, therapist network, coaching, and digital tools in a single platform."
      type: inferred
      topic: "competitive positioning"
      sourceRefs: [SM008, SM014, SM030]
      confidence: medium
      freshness: current

