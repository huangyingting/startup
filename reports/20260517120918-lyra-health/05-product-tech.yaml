  evidenceGaps:
    - type: missing-source
      severity: material
      topic: 'Product & Technology: Adverse signals for Lyra AI matching algorithm bias or accuracy gaps'
      missingEvidence: >-
        No public evidence found documenting adverse signals, bias audits, or accuracy limitations
        in Lyra Health's AI-powered provider-matching algorithm. Public sources describe the matching
        capability but provide no independent validation of bias risk or coverage gaps.
      whyItMatters: >-
        Algorithmic matching is central to Lyra's value proposition; undisclosed accuracy or bias
        issues could create regulatory exposure under anti-discrimination law and erode employer trust.
      diligencePath: >-
        Request independent audit reports, internal bias assessments, and coverage-gap metrics from
        Lyra management; review any EEOC or state-level AI-bias regulatory filings.
      relatedQuestionRefs:
        - QE019
      relatedTableRefs:
        - TE003
    - type: private-evidence-only
      severity: material
      topic: 'Product & Technology: SOC 2 Type II certification currency and audit scope'
      missingEvidence: >-
        Lyra's public security page claims SOC 2 Type II compliance but does not publish the audit
        report, current certification letter, or audit scope boundary. Independent verification of
        currency and full-production coverage is not possible from public sources.
      whyItMatters: >-
        An out-of-scope or lapsed SOC 2 audit would materially affect enterprise procurement decisions
        and could indicate undisclosed security control gaps.
      diligencePath: >-
        Request the most recent SOC 2 Type II report and auditor letter from Lyra; confirm the scope
        covers all production AWS environments, Lyra Engage EHR, and third-party sub-processors.
      relatedQuestionRefs:
        - QE020
      relatedTableRefs:
