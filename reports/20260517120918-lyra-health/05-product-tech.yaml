chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Lyra Health operates a cloud-native behavioral health platform that combines an employee-facing mobile and web app,
    an AI-powered care-matching engine, a curated provider network of more than 4,000 therapists and coaches, a
    provider-facing EHR (Lyra Engage), and an employer analytics dashboard. The platform's differentiation lies in
    measurement-based care with longitudinal outcomes tracking, a proprietary matching algorithm trained on millions of
    therapy sessions, and a HIPAA/HITRUST CSF-certified infrastructure running on AWS. In 2025-2026 Lyra launched Lyra
    AI — natural-language care search and 24/7 between-session conversational support — governed by the company's
    Polaris Principles safety framework, with plans to expand across its full digital care experience in 2026. Key
    diligence gaps include the undisclosed specifics of the matching algorithm, the full SOC 2 Type II audit report
    (attestation only is publicly available), thin public developer-API documentation for enterprise integration teams,
    and limited independent verification of clinical outcomes claims.
sections:
  - id: section-1
    title: Product surface and care modalities in customer workflow terms
    body: >-
      Lyra Health's product is a workforce mental health benefit that an employer purchases and deploys to employees
      and their families. The employee-facing experience begins in a mobile app (iOS and Android) or web portal where
      a member registers, completes a short intake assessment, and is matched to the right care type and provider.
      Lyra's homepage describes the full product spectrum: preventive support via self-paced digital programs and
      evidence-based coaching; clinical care encompassing therapy, personalized provider support, and medication
      management; specialized acute support for complex or severe mental health conditions; family support for
      children, teens, couples, and adults with access to more than 6,500 children's mental health specialists; and
      coordinated medical-behavioral care with closed-loop referrals to primary and specialty care providers.


      For employers, Lyra delivers a benefits administration portal and HR-facing analytics dashboard covering
      utilization, outcomes, and ROI metrics. For clinical providers, Lyra's Lyra Engage EHR platform handles session
      scheduling, clinical documentation, and outcome collection; an AI-powered Care Insights Hub layer (announced
      May 2026) surfaces clinically grounded patterns to help providers and their Clinical Managers strengthen care
      quality across the network.


      Manager coaching is a distinct B2B product added to the portfolio: 1:1 certified coaching for managers using
      an evidence-based framework focused on workplace challenges such as burnout, difficult feedback, and team
      dynamics, with clear escalation pathways into Lyra's mental health platform.


      Lyra's own claim is that the platform serves more than 20 million people globally through direct employer
      contracts, and that pathways exist for more than 200 million people to access care through partners and health
      plans. More than 300 leading organizations have contracted with Lyra, including Meta, Pinterest, and Starbucks.
      The company cites peer-reviewed research confirming 2x faster recovery rates and a 26% reduction in overall
      healthcare claims costs for participants annually. These are company-claimed figures; independent verification
      of the exact peer-reviewed study and its methodology is a diligence requirement.
