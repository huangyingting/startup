  - id: section-6
    title: Roadmap, gaps, and technology risk
    body: >-
      Lyra's 2026 roadmap is active on multiple fronts. Lyra AI — the conversational AI layer — is expanding from
      a coaching pilot to the full digital care experience. The Care Insights Hub, which became public in May 2026,
      is an early-stage EHR enhancement that relies on AI to support provider quality improvement; its accuracy,
      adoption, and clinical impact remain unverified by independent research. The pediatric center of excellence
      is a new organizational commitment signaling investment in a high-growth but clinically complex market
      segment. Global expansion is also a stated priority, backed by the six-country coverage in the 2026
      workforce report.


      Material diligence gaps identified from public sources include: (1) the matching algorithm is described at
      a high level but its training data provenance, model architecture, and bias-testing methodology are not
      disclosed; (2) the full SOC 2 Type II report is not publicly available; (3) developer-facing API
      documentation for HRIS, SSO, and benefits admin integrations is not publicly accessible; (4) the clinical
      research citations underlying the 2x recovery and 26% cost reduction claims are not directly linked in
      public materials, making independent validation difficult; (5) no public SLA or uptime data is available.


      Technology risks include AI hallucination or misclassification in the care-search and between-session
      support context (high consequence given the clinical population), provider network quality and consistency
      at scale (the Care Insights Hub addresses this but is nascent), HIPAA breach exposure from the volume of
      sensitive PHI processed, and the maturity risk of expanding a piloted AI feature to millions of users.
      The global expansion also introduces jurisdiction-specific regulatory risks (GDPR, local healthcare
      regulations) that are not addressed in public materials.
