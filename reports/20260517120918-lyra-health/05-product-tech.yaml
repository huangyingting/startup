  - id: section-4
    title: Integration, deployment, and reliability
    body: >-
      Lyra's platform integrates with employer HR and benefits infrastructure through SSO (SAML-based), HRIS systems
      including Workday and SAP, and benefits administration platforms. EAP migration support is an explicit
      deployment offering, reducing friction for employers replacing legacy Employee Assistance Programs. The
      help.lyrahealth.com portal serves as the member-facing support surface, with Lyra also offering a 24/7 care
      team accessible for crisis and navigation support.


      Lyra's security documentation states that all systems and services are delivered through AWS and governed by
      a formal change management process requiring independent management approval and rollback strategies. Separate
      production and development environments are maintained, with all changes passing through quality assurance
      testing before production deployment. Lyra follows OWASP Top 10 practices in software development.


      Public SLA commitments and uptime metrics are not published by Lyra, representing a diligence gap for
      enterprise buyers evaluating the platform for large-scale workforce deployments. The security page confirms
      the presence of a business continuity program (referenced but not detailed in public materials), and an
      incident response policy aligned to HIPAA and HITRUST CSF requirements. No public status page or incident
      history was located during this research.


      The platform is described as mobile-first with native iOS and Android apps alongside a web portal. Global
      coverage is an explicit strategic priority: the 2026 Workforce Mental Health Report covers six countries,
      signaling that Lyra is investing in multi-country deployment capabilities, though the specific depth of
      provider network and regulatory compliance in each market is not publicly detailed.
