callouts:
  - calloutType: strength
    title: Measurement-based care creates a proprietary data moat
    body: >-
      The most defensible product asset is the longitudinal outcomes database built from millions of standardized
      assessments (PHQ-9, GAD-7, AUDIT) across therapy and coaching sessions. This dataset drives matching algorithm
      training, supports the peer-reviewed outcomes research that validates the 2x recovery and 26% cost-reduction
      claims, and differentiates Lyra from traditional EAPs that do not measure clinical outcomes systematically.
      The moat deepens as more sessions generate more outcome data.
    claimRefs:
      - CE004
      - CE005
      - CE006
      - CE007
      - CE008
  - calloutType: strength
    title: HIPAA/HITRUST security posture is unusually transparent for a digital-health startup
    body: >-
      Lyra's public security page discloses specific AWS-native tooling (GuardDuty, Inspector, Security Hub, KMS),
      ZTNA for admin access, annual HITRUST CSF audits, annual third-party penetration tests, and a six-person
      security team — a level of detail that exceeds most EAP and digital-health competitors and provides a
      credible baseline for enterprise CISO review.
    claimRefs:
      - CE021
      - CE022
      - CE023
      - CE024
      - CE025
      - CE026
      - CE027
      - CE029
  - calloutType: insight
    title: Lyra AI represents a high-optionality but high-risk technology bet
    body: >-
      Lyra AI's conversational approach to intake and between-session support is clinically differentiated by the
      Polaris Principles framework, human-in-the-loop design, and crisis escalation architecture. The early signal
      that 37% of coached members choose natural-language intake over form-based options is meaningful adoption
      evidence. However, expanding a mental health AI from a coaching pilot to the full clinical population in 2026
      carries material safety, regulatory, and reputation risks that are not yet addressed by independent audits.
    claimRefs:
      - CE011
      - CE013
      - CE014
      - CE015
      - CE017
      - CE018
      - CE019
      - CE020
  - calloutType: risk
    title: Key technical architecture components remain black boxes
    body: >-
      Three material diligence gaps persist: the matching algorithm's model architecture, training data provenance,
      and bias-testing methodology are not disclosed; the Care Insights Hub's accuracy and clinical impact have no
      independent validation; and public API documentation for enterprise integrations is absent. These are
      solvable gaps in a structured diligence process but are not yet addressable from public sources alone.
    claimRefs:
      - CE011
      - CE031
      - CE032
      - CE033
