        or SLA commitments for Lyra's enterprise integration layer. Integration capability is claimed
        but not publicly substantiated.
      whyItMatters: >-
        Enterprise buyers require reliable HRIS/SSO integrations; shallow or unreliable integrations
        would increase IT friction and stall deployment at large accounts.
