  - id: section-3
    title: AI matching, Lyra AI, and clinical differentiation
    body: >-
      Lyra's primary technology differentiation claims rest on two pillars. First, a proprietary AI/ML matching
      algorithm that routes members to the right care type and provider, trained on outcomes data from millions of
      sessions in Lyra's proprietary dataset. Second, a growing AI layer branded Lyra AI, which was announced in
      October 2025 and represents Lyra's entry into generative AI for clinical contexts.


      Lyra AI is designed to work at multiple points in the care journey. At intake, it offers a free-text
      natural-language option — replacing traditional checkbox-driven forms — so members can describe their needs
      in their own words. Early 2026 data published by Lyra shows that 37% of members offered this option choose to
      use it, a signal that friction reduction in intake is meaningful. Between sessions, Lyra AI provides 24/7
      conversational support anchored to the skills a member practices with their human provider, with clear crisis
      escalation pathways to Lyra's 24/7 care team and live providers. As of mid-2026, the pilot is limited to U.S.
      members enrolled in Lyra Coaching, with expansion across the full digital care experience stated as a 2026
      roadmap item.


      Lyra's governance framework for its AI products is codified in its Polaris Principles: safety and ethics are
      paramount; human providers are critical and AI is designed to complement not replace them; care must be
      culturally responsive; and all innovation is driven by science and tested against clinical standards. This
      framework is publicly described in a company blog post from October 2025; it has not been independently audited.


      Measurement-based care is a further differentiator. Standardized assessments (PHQ-9, GAD-7, AUDIT) are
      administered at intake and longitudinally throughout the care journey, feeding outcome data into provider
      workflows and employer reporting. This positions Lyra's approach as materially different from traditional EAPs
      that do not systematically measure clinical outcomes.
