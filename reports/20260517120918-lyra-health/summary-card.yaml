summary:
  headline: >-
    Lyra Health is the category leader in employer mental health benefits with 20M+ covered lives and strong brand
    recognition, but its $5.58B last-round valuation requires 20-30x ARR multiple justification that current market
    conditions and competitive dynamics make difficult to sustain.
