summary:
  headline: >
    Semperis is the definitive identity-resilience platform for Active Directory and Entra ID, with $100M+ ARR, 1,000+
    enterprise customers, and a durable AD-specific moat — but the $1B+ valuation at ~10x ARR is priced for continued
    high growth, and Microsoft bundling, opaque financials, and platform-consolidation pressure from CrowdStrike and
    SentinelOne make this a research-more rather than an outright buy at current price.
  overallScore: 6.8
  recommendation: research-more
  confidence: medium
  riskRating: medium
  valuationStance: stretched
