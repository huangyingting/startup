company:
  name: Semperis
chapter:
  number: 1
  title: Company Overview
  summary: >
    Semperis is a US-based cybersecurity company founded approximately 2013–2014 and headquartered in Hoboken,
    New Jersey, specializing in identity threat detection and response (ITDR) and Active Directory (AD) security.
    Its Identity Resilience Platform — comprising Directory Services Protector (DSP), Active Directory Forest
    Recovery (ADFR), Purple Knight, and Forest Druid — protects 1,000+ enterprise customers including American
    Airlines, ADP, and Starbucks, covering 100M+ user identities. Backed by J.P. Morgan Asset Management and
    Hercules Capital in a $125M June 2024 growth round at a $1B+ unicorn valuation, Semperis has raised ~$368M
    total, surpassed $100M ARR in early 2025, and is preparing for a potential IPO.

sections:
  - id: company-identity
    title: Company Identity, Headquarters, and Business Model
    body: >
      Semperis is a private cybersecurity company headquartered in Hoboken, New Jersey, USA, with additional
      offices in the United Kingdom, the Netherlands, Israel, and Australia. Founded approximately 2013–2014,
      Semperis was purpose-built to address a critical gap in enterprise security: the protection of Microsoft
      Active Directory (AD) and cloud identity infrastructure. AD underpins authentication and authorization for
      the vast majority of enterprise IT environments globally, yet had historically lacked dedicated, real-time
      threat detection and recovery capabilities. Semperis was created to fill that gap.

      The company's core product family is branded as the Identity Resilience Platform, an umbrella encompassing
      four main offerings. Directory Services Protector (DSP) delivers real-time threat detection, automated
      remediation, and forensic analysis for on-premises AD and hybrid Azure AD (Entra ID) deployments. Active
      Directory Forest Recovery (ADFR) enables organizations to recover from catastrophic AD attacks in hours.
      Purple Knight is a free community AD security assessment tool that drives pipeline generation. Forest Druid
      is an attack-path analysis tool that maps privilege escalation routes through AD and Azure AD. Together,
      these products address the full AD security lifecycle: assess, detect, respond, and recover.

      Semperis operates a B2B enterprise SaaS business model with subscription-based licensing. Its go-to-market
      strategy combines a direct enterprise sales force with channel partners. Purple Knight — offered free —
      functions as a top-of-funnel tool; organizations that discover AD weaknesses through Purple Knight
      frequently convert to paid DSP subscriptions. The company primarily serves regulated industries including
      financial services, healthcare, government/defense, and critical infrastructure.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
    tableRefs:
      - TO001
    figureRefs:
      - FO002

  - id: founders-leadership
    title: Founders, Leadership, and Governance
    body: >
      Semperis was co-founded by Mickey Bresman (CEO), Matan Liberman (EVP Business Development), and Guy
      Teverovsky (Chief Technology Officer). Bresman serves as the public face and chief executive, frequently
      cited in press releases and customer announcements. Liberman drives business development strategy and
      partnership activity. Teverovsky leads the technical architecture and product engineering teams that built
      the AD-specialized platform. The founding team has maintained stable leadership since the company's
      inception — an important differentiator in a market where key-person continuity is critical to customer
      trust in security-critical infrastructure products.

      Semperis has augmented its leadership team with experienced enterprise software and public-market executives
      as the company prepares for a potential IPO. Per Security Week reporting, the company has specifically
      hired executives with experience in navigating public market transitions. This pattern — recruiting CFO
      and CRO-level talent with public-company backgrounds — is characteristic of companies in the 12–24 month
      pre-IPO stage.

      Key-person risk is moderate and concentrated primarily on CEO Mickey Bresman, whose identity as the
      company's external spokesperson and strategic decision-maker is tightly coupled to investor relations,
      customer confidence, and market positioning. No public succession plan has been disclosed. The founding
      team's continued involvement across CEO, EVP BD, and CTO roles provides institutional knowledge
      continuity, but also means that any simultaneous departure of multiple co-founders would represent a
      material adverse signal for the company's stability.
    claimRefs:
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
    tableRefs:
      - TO002

  - id: funding-investors
    title: Funding History, Valuation, and Investor Base
    body: >
      Semperis has raised approximately $368 million across five disclosed funding rounds from its founding
      through June 2024. The company's most recent raise was a $125 million growth financing round closed in
      June 2024, led by J.P. Morgan Asset Management and Hercules Capital, which established Semperis as a
      unicorn with a valuation exceeding $1 billion. The prior major round was a $200 million Series C in early
      2022, which constituted the majority of the company's pre-unicorn capital stack.

      The $125 million June 2024 round was structured as a combination of equity and debt (growth financing),
      consistent with Hercules Capital's typical lending model for high-growth technology companies. J.P. Morgan's
      asset management arm co-led alongside Hercules, signaling institutional validation of Semperis's market
      position and financial trajectory. The round was accompanied by announcements of surpassing $100M ARR
      trajectory and explicit signals of IPO preparation, with Security Week reporting that Semperis was
      "eyeing an IPO" and had "hired experienced executives with public market experience."

      Earlier rounds included a Series B (approximately 2019–2021) and seed and Series A rounds from earlier
      institutional venture capital investors. Total funding of approximately $368 million positions Semperis as
      one of the more substantially funded pure-play ITDR companies in the market. Full investor names and
      economics from earlier rounds are not publicly disclosed in full detail, creating a diligence gap around
      cap table structure and liquidation preferences.
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
    tableRefs:
      - TO003
    figureRefs:
