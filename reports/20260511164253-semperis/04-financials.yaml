  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: unit-economics-table
    missingEvidence: 'Customer acquisition cost (CAC), payback period, net revenue retention (NRR), and gross revenue retention
      (GRR) have not been publicly disclosed by Semperis. These metrics are the primary inputs for LTV/CAC ratio and growth
      efficiency underwriting.

      '
    whyItMatters: 'Without CAC, LTV, and NRR, it is impossible to determine whether Semperis'' growth is capital-efficient
      or requires escalating sales and marketing spend to sustain ARR growth. NRR above 120% would meaningfully change the
      valuation thesis.

      '
    diligencePath: 'Request data room access including cohort-level NRR/GRR analysis, blended CAC by channel (direct vs. partner),
      and payback period by customer vintage. Compare against CyberArk and SentinelOne benchmarks.

      '
    relatedQuestionRefs:
    - QI006
    - QI018
    relatedTableRefs:
    - TI003
  - type: private-evidence-only
    severity: material
    topic: capital-adequacy-table
    missingEvidence: 'Monthly burn rate and exact cash on hand are not publicly disclosed. The structure of the Hercules Capital
      debt tranche within the $125M financing including amount, interest rate, covenants, and maturity is unknown.

      '
    whyItMatters: 'Investors cannot assess cash runway or risk of dilutive financing before an IPO without burn rate data.
      Debt covenants could restrict Semperis'' operational flexibility or trigger acceleration events.

      '
    diligencePath: 'Request monthly management P&L and cash flow statement for the trailing 12 months; request the full Hercules
      Capital credit agreement including covenant schedule and amortization terms.

      '
    relatedQuestionRefs:
    - QI012
    - QI013
    - QI025
    relatedTableRefs:
    - TI004
  - type: private-evidence-only
    severity: material
    topic: product-level ARR split and revenue mix
    missingEvidence: 'Product-level ARR breakdown across DSP, ADFR, Lightning IRP, and professional services has never been
      publicly disclosed. The $100M+ ARR figure is a company-wide aggregate only.

      '
    whyItMatters: 'Product-level ARR mix determines growth acceleration or deceleration in each SKU, and signals which products
      face saturation vs. early-stage growth. A high professional services mix would reduce ARR quality below what the headline
      $100M+ figure implies.

      '
    diligencePath: 'Request product-level ARR, bookings, and renewal rate from management; confirm whether Lightning IRP has
      crossed a material ARR threshold and whether ADFR renewal rates are above 90%.

      '
    relatedQuestionRefs:
    - QI002
    relatedTableRefs:
    - TI001
    - TI005
