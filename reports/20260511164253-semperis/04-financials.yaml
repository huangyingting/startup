company:
  name: Semperis
chapter:
  number: 4
  title: Financials
  summary: 'Semperis is a high-growth enterprise SaaS company that surpassed $100M in annual recurring revenue (ARR) in January
    2025, representing more than 3,000% growth over five years. Revenue is almost entirely subscription-based, anchored by
    the Directory Services Protector (DSP) and Active Directory Forest Recovery (ADFR) products, with Purple Knight''s 75,600+
    downloads providing a near-zero-CAC top-of-funnel. The company raised $125M in growth financing in June 2024 from J.P.
    Morgan Asset Management and Hercules Capital, complementing a $200M Series C led by KKR in 2022, for a total of approximately
    $368-373M raised at a $1B+ valuation. Key financial metrics including gross margin, burn rate, NRR, CAC, and exact product-level
    ARR splits remain undisclosed as a private company. The June 2024 hiring of CFO Jeff Bray (Rapid7, Imprivata) and CRO
    Mike DeGaetano (Zscaler pre/post-IPO) alongside growth financing signals IPO preparation within 12-24 months. Capital
    position appears strong; diligence must resolve unit economics and margin trajectory before underwriting any growth multiple.

    '
sections:
- id: revenue-model
  title: Revenue Streams and Pricing Model
  body: 'Semperis operates a subscription-first SaaS revenue model anchored by two flagship products: Directory

    Services Protector (DSP) and Active Directory Forest Recovery (ADFR). DSP is licensed on a per-node or

    per-user basis as an annual recurring subscription, covering on-premises Active Directory, hybrid Azure AD

    (Entra ID), and Okta environments. ADFR is licensed at the enterprise forest level and targets customers

    who need automated, malware-free AD recovery within hours rather than days. Together, these two products

    account for the vast majority of Semperis'' $100M+ ARR base, though the company has not disclosed an

    explicit product-level revenue split.


    Purple Knight, Semperis'' free AD security assessment tool, has achieved 75,600+ downloads and serves as

    the principal demand-generation funnel feeding paid DSP conversions. Forest Druid, another free

    attack-path analysis tool, performs a similar function in the Tier 0 attack surface segment. This

    freemium-to-enterprise motion creates high-quality pipeline at near-zero incremental acquisition cost.

    Lightning IRP (Identity Incident Response Platform) is a newer revenue stream targeting AD-specific

    incident response engagements, expanding the addressable buyer beyond prevention into active response.


    Professional services including incident response retainers, deployment engagements, and training

    represent a minority share of total revenue. The Forrester 2024 Total Economic Impact study commissioned

    by Semperis quantified potential savings for deploying enterprises including 90% reduction in downtime and

    40% reduction in manual monitoring time. These productivity metrics underpin enterprise justification for

    premium subscription pricing. Semperis does not publish a public pricing page; all pricing is transacted

    through direct enterprise sales engagements or channel partner quotes.


    UK ARR grew over 200% in the two years preceding January 2025, demonstrating strong international

    expansion of the subscription base. Deloitte Technology Fast 500 recognition for four consecutive years

    further corroborates rapid, sustained revenue growth. Revenue quality is high: the mission-critical nature

    of Active Directory protection implies low voluntary churn, multi-year enterprise contracts, and expansion

    potential as customer AD environments grow. The primary revenue recognition risk is a shift toward more

    professional services revenue which would dilute ARR quality, but no such shift has been observed.

    '
