figures:
  - id: FP001
    title: Competitive Positioning Map
    type: quadrant
    layout: wide
    summary: >-
      Ordinal competitive positioning of Semperis vs. primary competitors on two axes: (1) AD /
      identity specialization depth (x-axis: generalist platform → AD specialist) and (2) recovery /
      resilience capability (y-axis: detection only → full recovery). Semperis occupies a unique
      position combining high specialization with the only full-recovery capability. Axis scores
      are evidence-backed ordinal ratings (1–5 scale) based on product documentation and analyst
      assessments; numeric precision should not be inferred.
    data:
      points:
        - label: "Semperis"
          x: 5
          y: 5
          note: "Highest AD specialization; only full forest recovery (ADFR); 150+ detections (DSP)"
        - label: "Microsoft MDI"
          x: 3
          y: 1
          note: "Broad coverage but generalist platform; no recovery; bundled at zero incremental cost"
        - label: "CrowdStrike Identity"
          x: 2
          y: 1
          note: "Endpoint-first platform; growing AD signals; no recovery capability"
        - label: "Quest RMAD"
          x: 4
          y: 3
          note: "High AD specialization; object-level recovery; no full-forest recovery"
        - label: "SentinelOne Identity"
          x: 2
          y: 1
          note: "Early-stage AD detection; no recovery; endpoint platform base"
        - label: "Netwrix"
