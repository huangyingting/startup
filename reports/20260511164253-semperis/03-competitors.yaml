  - id: moat-switching-costs
    title: "Moat Durability, Switching Costs, and Competitive Risk Register"
    body: >-
      Semperis' strongest competitive moat is its Active Directory Forest Recovery (ADFR) capability —
      the only purpose-built, tested, automated full-forest recovery product for Active Directory.
      Recovering a 500-node AD forest from a ransomware attack without Semperis typically requires
      24–72 hours of manual effort by AD specialists following complex runbooks, with significant
      risk of reinfection from backup media. Semperis ADFR reduces this to sub-15-minute automated
      recovery from forensically clean images. This is a qualitatively different capability from
      anything Microsoft MDI, CrowdStrike, or Quest RMAD provides. The moat is strongest for
      customers who have invested in tested recovery plans and runbooks with Semperis — replacing
      the tool requires rebuilding the entire DR framework, creating high switching costs.

      Semperis' depth of AD-specific attack technique coverage — 10+ years of AD security engineering
      yielding detection for 150+ attack techniques across on-premises AD and Entra ID — is a second
      moat dimension. This detection depth and the associated threat intelligence infrastructure
      (Semperis Research Lab, Purple Knight scoring models) is difficult to replicate quickly.
      However, this is a narrowing moat: Microsoft is rapidly expanding MDI's detection catalog,
      and CrowdStrike is absorbing AD telemetry through its Graph integration. Both platform vendors
      have engineering resources far exceeding Semperis, and both are investing in identity security.

      Multi-homing behavior is observed: many large Semperis customers maintain both MDI (bundled)
      and Semperis DSP/ADFR, using MDI for baseline detection and Semperis for recovery and advanced
      detection. This co-existence model is both a validation of Semperis' incremental value and a
      risk: if MDI improves significantly, co-existence justification erodes. Semperis acknowledges
      this dynamic in its sales materials and positions MDI as complementary rather than competitive
      in marketing — but this framing is increasingly strained as MDI adds features.

      Distribution power is a significant asymmetry: Microsoft has 95%+ market share in enterprise
      identity infrastructure and bundles MDI into its dominant productivity suite. CrowdStrike has
      29,000+ enterprise endpoint customers. Semperis must win each account through direct sales or
      partner channel against these distribution advantages. Semperis' government contract vehicles
      and FedRAMP authorization create a partial distribution moat in the US federal market.

      Adverse evidence on moat durability: independent analyst reviews in 2025–2026 note that
      Semperis' pricing premium (estimated $300–700K ARR for large enterprise deployments) is
      increasingly hard to justify in accounts where MDI is deployed and 80%+ of common AD attack
      scenarios are covered. The non-recovery use cases for DSP (threat detection, attack-path
      visualization) face the most commoditization pressure. The recovery use case remains protected.
