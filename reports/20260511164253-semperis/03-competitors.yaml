  evidenceGaps:
    - id: EGP001
      description: >-
        Semperis has not disclosed win/loss rate data against Microsoft Defender for Identity,
        CrowdStrike Falcon Identity Protection, or Quest in any public filing or press release.
        Without this data it is impossible to verify whether Semperis' competitive win rate is
        improving or deteriorating as Microsoft MDI expands its detection catalog. This is the
        single most important competitive diligence data point to request in management sessions.
      relatedQuestionRefs:
        - QP020

    - id: EGP002
      description: >-
        A direct pricing comparison between Semperis ADFR+DSP and Microsoft MDI for a specific
        enterprise account (e.g., 5,000 employees, 100 domain controllers) is not possible from
        public data because Semperis does not disclose pricing and Microsoft E5 bundle pricing
        obscures MDI's standalone value. Diligence must request Semperis' actual pricing schedules
        and average deal size by product line.
      relatedQuestionRefs:
        - QP024

