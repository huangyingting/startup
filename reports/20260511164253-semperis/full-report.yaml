      - number: '7.4'
        title: People and Execution Risks
        blocks:
          - type: paragraph
            body: >-
              Semperis's people risk is anchored by two interdependent vulnerabilities: CEO key-person concentration and
              Israel R&D geopolitical exposure. CEO Mickey Bresman is the primary external face of Semperis — he
              conducts the majority of public speaking engagements, investor communications, and strategic partnership
              discussions. Co-founders Guy Teverovsky and Matan Hart hold critical institutional AD security domain
              knowledge accumulated over 15+ years; this expertise is not easily transferred or replicated. No public
              disclosure of a formal succession plan, key-man insurance, or documented leadership transition framework
              has been identified. The co-founders' departure would impair both product direction and enterprise
              customer trust in ways that exceed standard executive transition risk.

              The Israel R&D center in Tel Aviv, with an estimated 150+ engineers, represents Semperis's primary
              engineering concentration. The October 2023 Hamas attack and subsequent Israel-Gaza conflict demonstrated
              concrete operational impacts on Israeli tech sector companies through military reservist mobilization (IDF
              reserve call-up affects roughly 10% of Israeli tech workers), employee displacement, and travel
              disruption. Semperis has not disclosed any material operational disruption from the conflict, but the
              structural risk of a prolonged or escalating regional conflict impairing engineering productivity remains
              elevated as of May 2026. A partial or full disruption of Israel R&D operations — through sustained
              mobilization, infrastructure damage, or talent exodus — could delay the product roadmap (Entra ID
              expansion, cloud ITDR) at a critical competitive inflection point.

              Talent acquisition risk is the third people vector. Active Directory security specialists represent a
              scarce engineering population: the community of practitioners who understand AD attack techniques,
              Kerberos protocol internals, and AD replication at depth is globally small. Semperis competes for this
              talent against Microsoft, CrowdStrike, SentinelOne, and major financial institutions with dedicated red
              teams. Wage inflation for AD security expertise has been structurally elevated since 2020. IPO execution
              risk is the fourth people vector: transitioning from growth-stage private company to public company
              requires significant investment in IR, FP&A, SEC compliance, and audit infrastructure. Mis-timed IPO
              execution, pricing below intrinsic value, or post-IPO quarterly miss would impair Semperis's ability to
              use public equity as an M&A currency and would establish a damaging comparator for future fundraises.
