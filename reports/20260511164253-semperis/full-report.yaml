      - number: '7.3'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: >-
              Semperis's partner and dependency risk register is anchored by a single existential dependency: Microsoft
              Active Directory and Entra ID APIs. Semperis DSP and ADFR are architecturally built on Microsoft's AD
              replication protocol (MS-DRSR), LDAP/LDAPS directory access, and Windows Volume Shadow Copy Service. If
              Microsoft restricts third-party access to AD replication metadata — which Microsoft has competitive
              incentive to do as it expands native Defender for Identity capabilities — DSP's real-time change detection
              and ADFR's backup framework would require fundamental rearchitecting with no guaranteed timeline. Unlike
              typical API deprecations in SaaS ecosystems, Microsoft AD API changes affect on-premises Windows Server
              deployments where update cadence is customer-controlled, making a clean API cutover particularly complex.
              Microsoft's expanding Entra ID native backup and recovery roadmap (announced features in 2025) represents
              the strategic manifestation of this dependency risk: Microsoft is building its own AD recovery capability,
              which reduces Semperis's moat while simultaneously controlling the underlying API.

              The June 2024 $125M growth financing from J.P. Morgan and Hercules Capital introduces financial covenant
              risk. Growth debt from Hercules Capital typically includes minimum ARR, minimum cash balance, and maximum
              leverage covenants. Semperis has disclosed the $125M principal amount but not the specific covenant terms,
              interest rate, or maturity. If ARR growth decelerates materially from current trajectory (announced 2024
              surpass of $100M ARR), covenant compliance risk increases. A covenant breach could trigger acceleration
              clauses requiring early repayment, constraining strategic flexibility at a critical pre-IPO moment.

              Channel partner concentration is a third risk. Semperis's go-to-market relies on a combination of direct
              enterprise sales and VAR/MSSP channel partners. Without disclosed partner concentration data, the risk
              that a top-1 or top-3 VAR partner shifts preferred referrals to CrowdStrike Identity or Microsoft MDI
              cannot be quantified. Key customer ARR concentration is similarly opaque: without NRR and top-20 ARR share
              disclosures, a high-ARR-concentration scenario (e.g., top-20 customers >30% of total ARR) represents a
              revenue-cliff risk if any large account churns to a bundled Microsoft MDI deployment.
