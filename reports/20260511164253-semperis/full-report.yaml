  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape — Direct Peers, Platforms, and Status Quo
        blocks:
          - type: paragraph
            body: >-
              Semperis competes in a market landscape that segments into four distinct competitive layers of materially
              different strategic significance. The first layer — direct AD security specialists — includes Quest
              Software (Change Auditor and Recovery Manager for Active Directory), Netwrix (AD Auditing Edition,
              acquired Stealthbits in 2021), and Cayosoft (AD management and recovery for smaller enterprises). These
              vendors address overlapping use cases in AD auditing, hardening, and to varying degrees, backup and
              recovery. Quest is the most formidable direct peer by revenue scale, with an estimated $500M+ in IT
              management revenue (AD products representing a fraction of that), and a large installed base in mid-market
              and government accounts. Netwrix competes primarily on audit and compliance use cases, with lighter
              detection and no purpose-built forest recovery. Cayosoft is a smaller vendor targeting mid-market
              organizations with an integrated AD/Azure AD management suite that includes limited recovery features.

              The second competitive layer — and the most materially threatening to Semperis' go-to-market — consists of
              platform vendors who bundle identity threat detection with broader security products: Microsoft Defender
              for Identity (MDI) is included in M365 E5 at no incremental cost and detects common AD attacks including
              pass-the-hash, DCSync, and lateral movement. CrowdStrike Falcon Identity Protection bundles AD-adjacent
              identity telemetry with its dominant endpoint agent. SentinelOne Singularity Identity, Palo Alto Networks
              Cortex Identity, and IBM QRadar UEBA all offer identity behavioral analytics that partially overlap with
              Semperis DSP capabilities.

              The third layer — adjacent vendors with partial overlap — includes CyberArk (PAM leader with its Identity
              Security Platform increasingly including ITDR-adjacent detection), Okta (workforce identity platform with
              identity anomaly detection in Okta Privileged Access), and Microsoft's own Entra ID Protection
              (conditional access and risk-based identity signals built into Entra ID). These vendors are primarily
              bought for different primary use cases but can serve as budget displacement in accounts that consolidate.

              The fourth layer — status quo and free tools — represents the most prevalent actual alternative: most
              enterprise IT teams manage AD security primarily through native Windows event logs, Microsoft's free
              BloodHound (Active Directory security assessment open-source tool), and manual processes. BloodHound
              Community Edition is widely deployed and performs attack-path analysis that Semperis Forest Druid also
              addresses. The status quo is the primary alternative Semperis displaces, particularly in mid-market
              accounts entering their first structured ITDR purchase.
