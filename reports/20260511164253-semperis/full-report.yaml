      - number: '2.2'
        title: TAM, SAM, and SOM — Sizing the Identity Threat Detection and Response Opportunity
        blocks:
          - type: paragraph
            body: >-
              Published analyst estimates for the ITDR market in 2026 range from $2.32B (Fortune Business Insights,
              narrowly scoped) to $5.0B+ (MarketsandMarkets, broader identity detection scope), with a mid-point
              consensus of approximately $3.0–4.0B for a software-only ITDR TAM. The dispersion reflects genuine
              boundary disagreement: narrower definitions focus on AD-specific threat detection tools, while broader
              definitions include cloud identity protection, workforce identity security, and identity-driven XDR
              capabilities. KuppingerCole estimated the ITDR market at $3.2B in 2025, growing at roughly 20% annually —
              a figure that aligns with the mid-consensus view.

              The broader identity security market, which includes IAM, PAM, IGA, and ITDR, is estimated at $22–26B
              globally in 2026 per IDC and Grand View Research. ITDR currently represents approximately 13–18% of that
              total; the category is growing materially faster than the broader IAM base, as organizations that already
              have IAM platforms installed are now layering ITDR atop them.

              Semperis' serviceable addressable market (SAM) is the subset of ITDR and AD security spend in
              organizations above approximately 2,000 employees with on-premises or hybrid AD environments. This
              excludes pure-cloud Entra-ID-only organizations, organizations below the threshold for enterprise AD
              complexity, and consumers of commodity Microsoft-native-only tooling. Based on published segment-size
              data, this enterprise segment represents approximately 55–65% of the ITDR TAM, yielding a SAM of
              approximately $1.8–2.8B in 2026. Semperis' SOM over a 3-year planning horizon is estimated at $350–650M —
              15–25% of SAM — directionally consistent with its current $100M+ ARR at approximately 4–6% current SAM
              penetration.

              Key estimation caveats: No analyst publishes an "enterprise AD-centric ITDR" segment as a distinct
              research category. All SAM and SOM estimates are derived from secondary research and Semperis-disclosed
              ARR. Market growth at 17–26% CAGR suggests the addressable envelope is expanding rapidly, which is both an
              opportunity and a risk if the category definition shifts toward platform-bundled identity security.
