  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Enterprise Mix, Buyer Profile, and Channel Breakdown
        blocks:
          - type: paragraph
            body: >-
              Semperis serves a base of 1,000+ enterprise customers anchored in organizations with complex Active
              Directory environments — typically 10,000+ employees, 100+ domain controllers, and a security operations
              team capable of procuring and deploying a dedicated AD security platform. The primary buyer is the CISO or
              VP of Security, working with AD administration and IT security operations teams; the primary payer is the
              enterprise security or IT operations budget, not the identity and access management team. The customer mix
              is heavily weighted toward regulated verticals: financial services is the estimated largest vertical
              (25–30% of customer base), driven by regulatory mandates for identity security and resilience. Healthcare
              accounts for an estimated 15–20%, driven by ransomware exposure and HIPAA-related compliance mandates.
              Government and federal agencies represent 10–15%, with FedRAMP Moderate authorization enabling Semperis to
              compete in civilian federal procurement. Critical infrastructure sectors — energy, utilities, and
              transportation — represent a further 10–15%, motivated by CISA mandates and the role of Active Directory
              in operational technology network authentication. Fortune 500 and large-enterprise general accounts
              account for the remainder, but likely represent a disproportionately large share of ARR given per-seat
              deal sizes. Geographic mix is estimated at approximately 60% North America (US and Canada) and 40%
              international (primarily EMEA), with APAC still a modest minority of the installed base. Channel mix spans
              a direct enterprise sales motion for accounts above approximately $250K in annual contract value and a
              growing VAR/MSP partner network for mid-enterprise accounts. Semperis has publicly disclosed a formal MSP
              program and reseller partnerships with major security distributors, but has not provided partner- sourced
              ARR as a share of total ARR. No segment-level revenue concentration data has been publicly disclosed.
