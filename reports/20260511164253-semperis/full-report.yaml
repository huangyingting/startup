      - number: '4.4'
        title: Public Financial Gaps and Diligence Blockers
        blocks:
          - type: paragraph
            body: |
              As a private company, Semperis has not disclosed the financial metrics that underwriters and growth
              investors require for precise valuation. The following gaps represent the primary diligence blockers
              for any investor seeking to assign a revenue multiple or assess capital adequacy. Each gap is material
              and requires direct access to management financials, audited statements, or detailed data room disclosure.

              The most critical gap is the absence of gross margin data. Without gross margin, it is impossible to
              assess the quality of the $100M+ ARR, the company's margin expansion potential, or the credibility of
              path-to-profitability projections. Enterprise SaaS companies at this scale typically operate at 70-85%
              gross margins, but Semperis' actual cost of revenue is unknown.

              Net revenue retention (NRR) and gross revenue retention (GRR) are similarly unavailable. NRR above 120%
              would signal that the $100M+ ARR base is expanding through upsell and cross-sell, reducing the growth
              capital required to maintain ARR growth rates. NRR below 110% would indicate meaningful churn pressure
              despite the mission-critical positioning, a material adverse finding.

              Customer concentration risk is a further unknown. If a small number of large enterprises represent a
              disproportionate share of ARR, the business carries meaningful concentration risk not visible in
              aggregate figures. Product-level ARR splits between DSP, ADFR, and Lightning IRP would clarify which
              products drive growth and which face saturation.

              Burn rate and cash runway cannot be precisely determined without access to management accounts. The
              financial estimate range figure in this chapter provides source-backed bounds for key financial metrics,
              but all figures beyond the $100M+ ARR threshold are estimates derived from comparables and inference.
              Community practitioner discussions raise concerns about Semperis pricing being expensive relative to
              free and lower-cost alternatives in SME segments, representing a potential competitive risk factor.
