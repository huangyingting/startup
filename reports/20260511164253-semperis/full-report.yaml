      - number: '1.5'
        title: Adverse Signals, Key Risks, and Diligence Flags
        blocks:
          - type: paragraph
            body: >
              Semperis's most significant structural risk is its dependence on Microsoft Active Directory remaining the
              dominant enterprise identity infrastructure. Microsoft is actively promoting Microsoft Entra ID (formerly
              Azure Active Directory) as a cloud-native replacement for on-premises AD — a migration path that, if
              accelerated, could reduce the installed base of legacy AD environments that DSP and ADFR primarily
              protect. Semperis has responded by extending DSP coverage to hybrid Entra ID environments, and by
              positioning as an ITDR platform that is identity-infrastructure-agnostic, but the long-term TAM risk of AD
              sunset is real.

              A compounding risk is Microsoft itself competing directly through Microsoft Defender for Identity (MDI)
              and Microsoft Entra ID Protection, both of which provide some overlapping AD threat detection capabilities
              at no incremental cost for Microsoft 365 E5 subscribers. Enterprises with large Microsoft licensing
              commitments may perceive MDI as "good enough" and resist additional ITDR spending on third-party
              platforms. Semperis differentiates on depth of forensics, attack-path analysis (Forest Druid), and forest
              recovery (ADFR) — capabilities that MDI does not replicate — but pricing pressure from the bundled
              Microsoft offering is a persistent headwind.

              Additional risks include enterprise customer concentration, private company financials with no SEC
              reporting obligation creating information asymmetry, key-person risk concentrated on the CEO and
              co-founding team, potential IPO timing risk if public market conditions deteriorate, and competitive
              pressure from CrowdStrike Falcon Identity, Varonis, and Netwrix.
            claimRefs:
              - CO032
              - CO033
              - CO034
              - CO035
              - CO036
              - CO037
