  - id: FR002
    title: Risk transmission map
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing how primary risk events propagate to investment-relevant outcomes at Semperis.
      Microsoft MDI bundling and FedRAMP authorization lapse both flow through ARR compression to eventual valuation
      multiple compression. Semperis software compromise flows through customer trust erosion to valuation impact and
      IPO disruption. Control nodes partially intercept specific risk vectors. All paths ultimately converge on IPO
      delay or disruption as the investor exit risk outcome.
    data:
      nodes:
        - id: risk-microsoft
          label: Microsoft MDI Bundling
          detail: >-
            Free MDI in M365 E5 displaces DSP at renewal; most probable ARR compression vector for Semperis enterprise
            segment
          type: risk
        - id: risk-security-breach
          label: Semperis Software Compromise
          detail: >-
            Agent deployed on domain controllers; supply-chain compromise would enable catastrophic customer AD access
            and produce regulatory liability and brand destruction
          type: risk
        - id: risk-export-control
          label: EAR/ITAR Export Exposure
          detail: >-
            Israel-US dual operations; cybersecurity dual-use technology classification; US federal customer base
            creates ITAR sensitivity for classified data handling scenarios
          type: risk
        - id: risk-fedramp
          label: FedRAMP Authorization Lapse
          detail: >-
            Loss of FedRAMP Moderate authorization eliminates civilian federal procurement eligibility; government ARR
            at risk; High authorization gap limits DoD and IC revenue
          type: risk
        - id: risk-israel
          label: Israel R&D Geopolitical Risk
          detail: >-
            Majority engineering concentrated in Tel Aviv; sustained conflict-driven disruption impairs product delivery
            velocity and roadmap execution for all Semperis products
          type: risk
        - id: impact-arr
          label: ARR Compression
          detail: >-
            Renewal losses from Microsoft bundling, FedRAMP lapse, or platform consolidation reduce topline growth rate
            below investor expectations and IPO comparables
          type: impact
        - id: impact-trust
          label: Customer Trust Erosion
          detail: >-
            Security vendor breach or regulatory enforcement action damages brand credibility in enterprise identity
            security market; customer churn accelerates on renewals
          type: impact
        - id: impact-valuation
          label: Valuation Multiple Compression
          detail: >-
            Revenue growth deceleration and trust erosion compress ITDR multiples toward commodity infrastructure
            levels; IPO pricing window narrows
          type: impact
        - id: impact-ipo
          label: IPO Delay or Disruption
          detail: >-
            Material regulatory action, breach, revenue miss, or R&D disruption forces IPO delay or down-round; Insight
            Partners exit pressure increases with each delay cycle
          type: impact
        - id: control-fedramp
          label: FedRAMP Compliance Controls
          detail: >-
            Existing Moderate authorization actively maintained; High authorization process to be initiated; annual
            assessment calendar managed by dedicated compliance team
          type: control
        - id: control-sdlc
          label: Secure SDLC and Code Signing
          detail: >-
            SOC 2 Type II attestation; code signing pipeline; security trust center program; partially intercepts
            supply-chain compromise risk vector but cannot eliminate it
          type: control
      edges:
        - from: risk-microsoft
          to: impact-arr
