  - id: TV005
    title: Thesis-break and kill triggers table
    enumeration: false
    columns:
      - Risk
      - Trigger Event
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Microsoft MDI free bundling displaces DSP
        - >-
          Microsoft announces M365 E5 ITDR expansion explicitly positioning MDI as DSP replacement; or Semperis
          discloses DSP renewal rate below threshold
        - DSP renewal rate drops below 70% in any two consecutive fiscal quarters
        - ARR growth decelerates to < 20% YoY; multiple compression to < 6x; bear case probability rises above 60%
        - >-
          Exit position within 60 days of trigger confirmation; thesis is broken — no mitigation restores the core DSP
          revenue thesis
      - - ADFR switching cost erosion via Microsoft native AD recovery
        - >-
          Microsoft releases native Active Directory forest recovery in Entra ID or Windows Server Update with
          equivalent forensically clean restore capability
        - ≥ 2 publicly named Semperis enterprise customers cite ADFR displacement in any 12-month window
        - Retention moat thesis fails; bear case probability rises above 60%; ADFR premium revenue at risk
        - Exit or hedge position; re-evaluate Entra ID product revenue contribution before any continued hold
      - - Key-person departure (CEO or CTO)
        - CEO Mickey Bresman or CTO Guy Teverovsky announces departure without planned 6-month successor overlap
        - Unplanned departure announced within 24 months of initial investment; no successor named within 90 days
        - Investor confidence shock; IPO delay likely; R&D continuity risk given CTO concentration of AD security IP
        - >-
          Place hold on follow-on investment; await succession clarity and new leadership 180-day track record before
          resuming
      - - Regulatory enforcement action
        - >-
          CISA, BIS, or SEC formal investigation, notice of violation, or enforcement action issued against Semperis or
          its Israel R&D operations
        - Any formal written regulatory notice or announced investigation
        - >-
          Federal customer attrition; FedRAMP authorization review risk; reputation damage accelerates enterprise sales
          cycle extension
        - Initiate exit review within 30 days; convene legal counsel assessment before further capital commitment
      - - Down-round or financing failure
        - >-
          Next Semperis equity round priced below $900M post-money valuation, or announced financing fails to close
          within 90 days of announcement
        - Confirmed term sheet below $900M or failed financing close
        - >-
          Signals operating underperformance vs. disclosed milestones; liquidation preference overhang likely impairs
          common equity value
        - Exit position immediately if confirmed; do not participate in down-round without full cap table restructuring
    notes: >-
      Trigger thresholds are set to detect material deterioration in the thesis drivers, not normal business volatility.
      DSP renewal rate and ADFR displacement data are not publicly disclosed and must be obtained via management
      disclosure in the diligence process or through investor reporting rights post-investment. Regulatory triggers
      apply to both US (SEC, BIS) and Israeli-US dual-operation compliance events. All action implications assume a
      minority investment position without board control; majority investors may have additional remedies.
    claimRefs:
      - CV016
      - CV023
      - CV032
      - CV037
      - CV038
  - id: TV006
    title: Final diligence asks table
    enumeration: false
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Net Revenue Retention (NRR) and Gross Revenue Retention (GRR)
        - NRR and GRR not publicly disclosed for any period; no proxy available from public sources
        - >-
          Primary empirical test of the switching cost thesis; without NRR, the ADFR retention moat is asserted but
          unverified; base case ARR growth assumes > 100% NRR
        - >-
          Request directly from Semperis CFO in management meeting; require disclosure of trailing-4-quarter NRR and GRR
          by product line (DSP vs. ADFR)
      - - Customer Concentration and ARR Waterfall
        - Top-10 customer ARR share and contract expiration schedule not publicly disclosed
        - >-
          Customer concentration above 30% in top-10 creates material churn risk in any 12-month window; contract
          renewal schedule affects IPO revenue predictability narrative
        - >-
          Request ARR concentration waterfall, contract expiration schedule, and top-10 customer industry and renewal
          status from Semperis finance team
      - - Cap Table, Preference Stack, and Debt Covenants
        - >-
          Insight Partners Series C liquidation preference terms and Hercules Capital debt covenant structure not
          publicly disclosed
        - >-
          Preference overhang may materially reduce common equity value at exit; Hercules Capital covenants may restrict
          operational flexibility and trigger forced events
        - >-
          Request from Insight Partners lead partner; review Hercules Capital loan agreement, including financial
          maintenance covenants, minimum liquidity thresholds, and cross-default provisions
      - - FedRAMP High Authorization Roadmap
        - No public disclosure of FedRAMP High authorization timeline, sponsoring agency, or progress milestones
        - >-
          FedRAMP High unlocks DoD and Intelligence Community opportunity estimated at $50–100M incremental ARR; absence
          of a confirmed roadmap suggests this revenue is speculative over the investment horizon
        - >-
          Request FedRAMP High authorization roadmap, confirmed sponsoring agency, and estimated authorization timeline
          from Semperis CISO and federal sales team
      - - Export Control and EAR Compliance Program
        - >-
          No public disclosure of EAR Part 730 compliance posture, license exception coverage, or active compliance
          program for Israel-developed cryptographic software
        - >-
          Semperis's Israel R&D developing cryptographic AD security software for US federal customers creates material
          EAR compliance obligation; non-compliance fines up to $1M per violation and debarment risk
        - >-
          Request export control compliance documentation from Semperis General Counsel; confirm active classification
          reviews, license exception elections, and ITAR assessment for classified federal data processing
    notes: >-
      All five diligence asks represent information that is structurally unavailable from public sources due to
      Semperis's private company status. Items 1 (NRR) and 2 (concentration) are investment-blocking asks: absence of
      satisfactory responses should pause commitment. Items 3 (cap table), 4 (FedRAMP High), and 5 (export control) are
      material risk qualifiers that affect terms and structuring but do not independently block commitment if adequately
      mitigated. Negotiated information rights post-investment should include quarterly ARR and NRR reporting, FedRAMP
      milestone reporting, and notification of any regulatory inquiry within 10 business days.
    claimRefs:
      - CV028
      - CV030
      - CV039
      - CV042
      - CV044
