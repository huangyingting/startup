      - number: '8.2'
        title: Valuation Framework and Scenarios
        blocks:
          - type: paragraph
            body: >-
              Semperis is best valued using ARR multiples because it is a high-growth SaaS company with no publicly
              disclosed EBITDA margin or free cash flow profile. ARR of $100-120M as of early 2026 (estimated from the
              January 2025 confirmed milestone and 40-60% YoY growth trajectory inferred from disclosed milestones)
              anchors the valuation range. Multiple selection draws from three benchmarks: CrowdStrike's public market
              valuation at approximately 16-19x forward ARR as the security platform ceiling; Rubrik's IPO precedent at
              12-15x trailing ARR for a security plus recovery narrative; and SailPoint at 10-12x and Ping Identity at
              7-8x for identity sector M&A comparables. Multiple compression across cybersecurity SaaS from 2022 peak
              (20-30x ARR) to 2026 (8-15x ARR for growth-stage private companies) is a structural reality that must be
              discounted into any entry price.

              Bull case (20% probability signal): ARR reaches $150-180M on ITDR market acceleration, AI identity
              security demand, and successful Entra ID expansion. At 12-18x ARR, implied EV is $1.8-3.2B, reflecting an
              IPO pre-premium. Key upside assumptions include NRR above 120%, federal ARR expansion through FedRAMP High
              authorization, and CrowdStrike remaining a complementary platform partner rather than a head-on ITDR
              competitor.

              Base case (55% probability signal): ARR reaches $110-130M at 8-12x ARR, yielding implied EV of
              $880M-$1.56B. This scenario assumes moderate growth continuation, DSP renewal rates above 80%, and
              Microsoft MDI competition manageable at the enterprise tier where ADFR differentiation is most compelling.
              Current market conditions from the June 2024 growth round ($1B+ valuation) support the base floor.

              Bear case (25% probability signal): ARR reaches $80-100M as Microsoft MDI bundling drives material DSP
              displacement and ARR growth decelerates below 20%. At 5-7x ARR, implied EV is $400-700M, below the $1B+
              June 2024 round valuation, implying a down-round scenario. This case is triggered by declining DSP renewal
              rates, loss of federal customers, or an Insight Partners forced-exit at an adverse point in the market
              cycle.

              Valuation sensitivity confirms that every 2x increase in ARR multiple adds $200-300M in EV at base ARR
              assumptions. Entry discipline at or below $1.3B captures meaningful upside to the bull case while
              providing 30-40% downside buffer to the bear floor, justifying the BUY thesis with protective structuring
              requirements.
