  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio & Module Architecture
        blocks:
          - type: paragraph
            body: >-
              Semperis organizes its commercial offerings under the Identity Resilience Platform umbrella, comprising
              six principal product modules as of the 2026-05-11 run date. Directory Services Protector (DSP) is the
              flagship paid product, providing continuous real-time monitoring of on-premises Active Directory and
              hybrid Entra ID environments. DSP captures every AD change through patented agent-free replication log
              (DFS/USN journal) analysis and can automatically roll back unauthorized changes to AD objects. It includes
              compliance report templates aligned to GDPR, HIPAA, PCI, and SOX, supports multi-forest deployments, and
              assigns a risk score to each security indicator based on exploitation likelihood and impact.

              Purple Knight is a free community tool that scans AD and Entra ID environments for Indicators of Exposure
              (IOEs) and Indicators of Compromise (IOCs). Version 4.2, released in 2026, shifted scoring to focus
              exclusively on "failed" indicators rather than all indicators, sharpening its signal. Purple Knight now
              supports Microsoft Government cloud, extending its reach to US federal agencies. Forest Druid, also free,
              takes an inside-out approach to attack path management: rather than enumerating all attacker paths, it
              begins with Tier 0 asset definition and maps ownership relationships back from those assets. Forest Druid
              debuted at Black Hat USA.

              Active Directory Forest Recovery (ADFR) is the premium recovery product, enabling cyber-first malware-free
              AD forest restoration. ADFR orchestrates every step of forest recovery—metadata cleanup, Global Catalog
              rebuild, site topology restructuring—on new, clean hardware, preventing the reintroduction of malware that
              bare-metal recovery would carry. ADFR also offers an object-level recovery wizard and stores backups in
              Azure Blob Storage with AES-256 encryption. Lightning Identity Runtime Protection (Lightning IRP) adds
              runtime attack detection—DCSync, Golden Ticket forgery, Kerberoasting—complementing DSP's change-based
              detection with behavioral signals. The February 2026 acquisition of MightyID extended the platform to
              cover Okta and Ping Identity environments, making Semperis the only vendor claiming full hybrid AD + Entra
              ID + cloud IdP defense-in-depth in a single platform.
