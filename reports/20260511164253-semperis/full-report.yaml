      - number: '3.2'
        title: Competitor Profiles — Scale, Capability, Pricing, and Strategic Direction
        blocks:
          - type: paragraph
            body: >-
              Microsoft Defender for Identity (MDI) is the most consequential competitive dynamic for Semperis. MDI is a
              cloud-based AD threat detection tool built on Microsoft's sensor technology, consuming on-premises AD
              domain controller traffic and providing alerts for 80+ attack techniques. It ships at zero incremental
              cost in Microsoft 365 E5 ($57/user/month), Microsoft Defender for Identity Plan 2 ($5.50/user/month add-on
              to E3), or the Microsoft Defender XDR bundle. An estimated 70%+ of Semperis enterprise customers already
              hold M365 E5 licenses, making MDI the default deployed baseline they must pay Semperis to supplement.
              MDI's material limitations are documented: it lacks automated response playbooks, provides no forensic AD
              rollback or forest recovery capability, has limited hybrid (on-prem/Entra ID) correlation, and requires
              significant configuration effort to reduce false positive rates. IBM X-Force red team testing in 2025
              found MDI detected only 42% of tested AD attack techniques. Semperis' go-to-market pitch directly exploits
              these documented MDI gaps.

              CrowdStrike Falcon Identity Protection adds identity signal to CrowdStrike's endpoint intelligence
              platform, providing AD user risk scoring and cross-correlating endpoint events with identity anomalies.
              Pricing is typically $8–15/endpoint/year as an add-on to the Falcon Complete or Falcon Enterprise bundles.
              CrowdStrike does not provide AD forest recovery, backup, or the depth of AD-specific attack technique
              coverage that Semperis DSP offers. However, in accounts where CrowdStrike is the incumbent EDR vendor,
              Falcon Identity Protection represents a low-friction expansion that competes directly with Semperis DSP's
              detection layer. CrowdStrike's FY2026 ARR of $3.65B and 29,000+ customer base gives it overwhelming
              distribution advantages.

              Quest Software is the most direct peer for AD recovery and backup. Quest Recovery Manager for Active
              Directory (RMAD) has been the market leader in AD object-level and tombstone recovery for 15+ years, with
              a large installed base in enterprise and government. Quest is privately owned by Francisco Partners and
              Cinven (private equity). Quest RMAD focuses on individual object restore and granular recovery — it does
              not offer full-forest recovery at Semperis ADFR scale. Quest Change Auditor provides AD event logging,
              auditing, and compliance reporting. Quest bundles both products frequently in government and
              regulated-industry accounts. Pricing is enterprise-negotiated; estimates suggest $100K–$500K+ ARR for
              large Quest AD deployments. Quest's strategic direction is broadening IT management rather than deepening
              AD security.

              Netwrix (incorporating former Stealthbits) focuses on AD auditing, compliance reporting, and data
              security. Its AD Auditing Edition competes with Quest Change Auditor in the compliance/audit use case.
              Netwrix lacks Semperis-equivalent ITDR threat detection depth and has no forest recovery capability.
              Netwrix is backed by TA Associates and is positioning toward governance and compliance markets. Cayosoft
              is a smaller competitor targeting mid-market with an all-in-one AD management and recovery platform at a
              lower price point than Semperis, primarily displacing Quest in organizations below 5,000 employees.

              CyberArk's Identity Security Platform includes Endpoint Privilege Manager and Identity Threat Detection
              features that partially overlap with ITDR capabilities. CyberArk's primary motion is PAM, but it is
              actively expanding into identity threat detection via its Secure Browser and Identity Flows products.
              CyberArk (NASDAQ: CYBR) reported $974M ARR in Q4 2024, with a significant installed base in financial
              services and critical infrastructure — overlapping Semperis' target accounts. CyberArk is a possible
              acquirer of Semperis rather than a pure competitor.
