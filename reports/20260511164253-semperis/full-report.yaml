  - id: TM004
    title: Growth Drivers and Constraints Table
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: >-
        Enumeration of material demand drivers and adoption constraints for the ITDR and AD security market based on
        CrowdStrike, Verizon DBIR, IBM X-Force, KuppingerCole, Gartner, and Forrester publications retrieved May 2026,
        and CISA/NIST regulatory documents. Macroeconomic budget cycle effects and geopolitical supply-chain risks are
        excluded. Quantification of constraint severity is estimated; no analyst publishes a ranked constraint model for
        ITDR specifically.
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Semperis
      - Diligence Ask
    rows:
      - - AD targeted in >90% of ransomware attacks; identity-based attacks +71% YoY (CrowdStrike 2025)
        - POSITIVE driver
        - Ongoing / structural (2022–2028+)
        - Creates urgent, evidence-backed demand for ITDR and AD recovery; Semperis' strongest selling point
        - Verify attack prevalence data is current (2025–2026) and not declining due to attacker shifts
      - - 'US Zero Trust mandates: EO 14028, CISA ZT Maturity Model v2, M-21-31 logging requirements'
        - POSITIVE driver
        - 2022–2025 rollout; ongoing compliance cycle
        - Federal procurement pipeline for ITDR; Semperis' government vertical benefits directly
        - Confirm Semperis FedRAMP authorization status and contract vehicle coverage
      - - NIS2 Directive (EU, effective Oct 2024) and DORA (EU, effective Jan 2025)
        - POSITIVE driver
        - Effective now; 2025–2027 enforcement ramp
        - EMEA demand acceleration; Semperis' London office and EMEA sales expansion aligned to this catalyst
        - Assess breadth of NIS2-in-scope customer case in Semperis EMEA pipeline; NIS2 fine exposure modeling
      - - 'Cloud/hybrid AD expansion: Entra ID + on-prem AD synchronization doubles attack surface'
        - POSITIVE driver
        - Ongoing structural (2024–2028)
        - Hybrid environments require Semperis to protect both AD and Entra ID; expands product scope
        - Track Semperis Entra ID support roadmap; verify cloud ITDR is not ceded to Microsoft MDI
      - - CMMC 2.0 Defense Industrial Base mandate (DoD suppliers, effective Dec 2023)
        - POSITIVE driver
        - Active enrollment / certification cycle; 2024–2027
        - Defense contractor segment buying ITDR for CMMC compliance; Semperis FedRAMP status relevant
        - Size the defense contractor addressable market; confirm CMMC assessor requirements align to DSP features
      - - Microsoft Defender for Identity bundled in M365 E5 at zero incremental cost
        - NEGATIVE constraint
        - Immediate / structural competitive threat
        - Microsoft MDI provides basic AD threat detection; erodes greenfield opportunity at Microsoft-heavy accounts
        - Obtain win/loss data showing % wins against MDI baseline; assess pricing pressure in E5-licensed accounts
      - - CrowdStrike and SentinelOne expanding identity protection within endpoint platforms
        - NEGATIVE constraint
        - Accelerating (2024–2026)
        - Platform vendors bundling lightweight ITDR into endpoint SKUs compresses Semperis' land-and-expand motion
        - Quantify win-rate vs. CrowdStrike Falcon Identity Protection; track CrowdStrike ITDR capability roadmap
      - - Enterprise budget consolidation reducing point-solution spend
        - NEGATIVE constraint
        - Cyclical / moderate (2024–2026)
        - CISOs under vendor-rationalization pressure may prefer bundled platform over standalone ITDR
        - Analyze Semperis NRR and churn data; assess how frequently Semperis loses to consolidation vs. competitors
      - - ITDR market defined only since 2022 — buyer education lag and category immaturity
        - NEGATIVE constraint
        - 2022–2026 (diminishing as category matures)
        - Semperis must invest in demand generation; lengthens sales cycles in greenfield accounts
        - Quantify average sales cycle length and track year-over-year trend as proxy for category maturation
      - - Security skills shortage — limited AD security expertise in buyer organizations
        - MIXED / uncertain
        - Structural (2023–2028+)
        - Skills gap drives demand for automated tooling (positive) but also for broad MSSP/MDR platforms (negative)
        - Assess whether Semperis' MSP channel program captures skills-short mid-market buyers effectively
    notes: >-
      Driver/constraint severity ratings are qualitative assessments based on analyst commentary and available attack
      statistics. No analyst publishes a ranked constraint model specific to the ITDR market. Macroeconomic effects
      (interest rates, IT budget freeze) excluded.
