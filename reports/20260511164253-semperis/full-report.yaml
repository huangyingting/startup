      - number: '7.5'
        title: Mitigations, Monitoring Indicators, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              Semperis's most effective mitigations are product-level, not procedural. The ADFR switching-cost moat —
              tested recovery runbooks, documented recovery plans, and institutional familiarity — is the primary
              customer retention mechanism and provides genuine insulation against competitive bundling. DSP's 150+
              technique detection catalog represents accumulated IP that cannot be replicated overnight even by
              Microsoft. The FedRAMP Moderate authorization demonstrates regulatory process competence. An active
              compliance program (trust center, DPA templates, SOC 2 certifications) reduces but does not eliminate GDPR
              exposure. Export-control compliance is managed through export counsel; the Israel R&D center operates
              under ENC license exceptions which are well-understood for commercial software.

              The weakest mitigations are in people risks and financial risk transparency. No public succession plan
              exists for CEO or co-founders. No Israel R&D continuity plan has been disclosed. The $125M debt covenant
              terms are not public, making covenant-compliance monitoring impossible from outside. Customer ARR
              concentration is not disclosed, preventing independent assessment of revenue-cliff risk. These gaps
              constitute specific diligence asks for management sessions.

              Thesis-break triggers — conditions that would require immediate re-evaluation of investment thesis — are:
              (1) Microsoft announces and ships native AD forest recovery functionality in Windows Server or Azure at no
              incremental cost, directly commoditizing ADFR; (2) a Semperis platform breach is publicly disclosed,
              destroying customer trust in an identity security vendor; (3) a material Israel R&D disruption (>25%
              engineering headcount lost for >3 months) delays the Entra ID roadmap, ceding cloud ITDR momentum to
              CrowdStrike; (4) Hercules debt covenant breach triggered by ARR deceleration, requiring early repayment
              and limiting operating flexibility; (5) a competitive win-rate collapse (below 40% win rate against
              Microsoft MDI in greenfield accounts) suggesting price-point commoditization. Monitoring KPIs: Microsoft
              Entra ID backup and recovery feature releases (quarterly cadence), FedRAMP High authorization progress
              (public marketplace tracker), Semperis ARR growth announcements versus public $100M ARR milestone
              (disclosed January 2025), Israel IDF reserve call-up rates affecting tech sector (monthly), and Hercules
              Capital Form D amendments on SEC EDGAR for covenant changes.
