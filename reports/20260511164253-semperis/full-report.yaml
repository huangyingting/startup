      basis: >-
        Enumeration of Semperis' claimed competitive moats and corresponding threat scenarios based on KuppingerCole
        ITDR Leadership Compass 2025, Wavestone AD security tools report 2026, IBM X-Force threat intelligence 2026,
        Forrester Now Tech ITDR Q1 2025, and SecurityWeek competitive analysis. Severity ratings are qualitative analyst
        assessments. Excludes macro-level market exit scenarios.
    columns:
      - Moat Claim
      - Primary Threat
      - Severity
      - Mitigation / Diligence Ask
    rows:
      - - AD Forest Recovery (ADFR) — only purpose-built automated forest recovery product
        - Microsoft builds native AD forest recovery into Azure Site Recovery or BCDR Suite
        - Medium — not imminent but plausible 3–5 year Microsoft roadmap item
        - Monitor Microsoft BCDR roadmap; assess ADFR customer retention and renewal rates; test recovery RTO claims
      - - AD security engineering depth — 150+ attack technique detections, 12+ years R&D
        - >-
          Microsoft MDI expands detection catalog to cover all Semperis DSP techniques; CrowdStrike Graph absorbs AD
          telemetry
        - High — Microsoft and CrowdStrike are actively expanding; this moat is narrowing
        - Track MDI release notes quarterly; obtain win/loss data post-MDI expansion; measure detection parity gap trend
      - - Purple Knight free tool — 4M+ downloads as top-of-funnel demand generator
        - BloodHound CE and Microsoft Secure Score provide free alternatives; Purple Knight conversion rate may decline
        - Low-Medium — Purple Knight retains unique AD scoring model; MDI/Secure Score not equivalent
        - >-
          Track Purple Knight download-to-paid conversion rate; compare Purple Knight scoring with MDI/Secure Score
          outputs
      - - FedRAMP Moderate authorization — government market access moat
        - >-
          CrowdStrike (FedRAMP High) and Microsoft (FedRAMP High) have superior federal authorization; DISA IL4+
          requirement excludes Semperis from highest-classified work
        - Medium — Semperis FedRAMP Moderate limits upside in classified and IL4+ federal accounts
        - Confirm Semperis FedRAMP High roadmap; assess contract vehicles coverage (GSA, CIO-SP3, SEWP)
      - - Switching costs — AD recovery runbooks and tested DR plans built around ADFR
        - Customer consolidates to Microsoft BCDR or moves to manual DR following cost pressures
        - Low-Medium — switching costs are real but not contractual; organization can rebuild DR plan
        - Measure NRR and churn disaggregated by ADFR-only vs DSP+ADFR customers; analyze churn reasons
      - - Semperis Research Lab — published AD threat intelligence and researcher credibility
        - CrowdStrike Intelligence and Microsoft threat research publish equivalent AD attack intelligence
        - Low — research credibility helps in security community but does not create defensible revenue moat
        - Track Semperis Research Lab publication frequency and citation rate vs CrowdStrike/Microsoft
