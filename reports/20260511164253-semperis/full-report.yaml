      - number: '8.5'
        title: Recommendation and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              The recommended investment stance on Semperis is research-more and conditional favorable. The company has
              demonstrated genuine product-market fit at enterprise scale with $100M+ ARR, 1,000+ enterprise customers,
              Fortune 500 named accounts, and more than 3,000% five-year growth — in a high-urgency market where the
              cost of an Active Directory compromise or ransomware-driven forest failure is existential for enterprise
              buyers in regulated sectors. The ITDR market 25-30% CAGR growth rate, combined with Semperis structural
              moat through deep AD infrastructure integration, multi-product expansion options, and Purple Knight
              top-of-funnel pipeline, supports a positive medium-term growth outlook that warrants formal due diligence.

              However, four critical diligence items must be resolved before investment commitment can be recommended
              with conviction. First, net revenue retention: NRR above 120% would confirm land-and-expand dynamics and
              validate the premium ARR multiple; NRR has not been publicly disclosed and is the single most important
              unresolved financial indicator for the investment case. Second, burn rate and gross margin: without
              audited financial statements, the path to profitability and capital efficiency cannot be assessed;
              enterprise SaaS companies at $100M+ ARR should be approaching operating leverage, and if Semperis is
              burning heavily, Hercules Capital debt obligations could force premature financing events. Third,
              competitive displacement rate: the percentage of competitive RFPs involving CrowdStrike or Microsoft and
              Semperis win rate in those situations is critical to calibrating the platform threat quantitatively.
              Fourth, FedRAMP authorization status: if pursuing or achieved, the government and defense market
              represents a material TAM expansion potentially worth 15-20% of total enterprise identity security spend.

              Thesis-break triggers include net revenue retention below 100% indicating net churn, gross margin below
              65%, ARR growth deceleration to below 15% for two consecutive quarters, or evidence of Microsoft
              enterprise-wide MDI bundling at scale disrupting Semperis new logo acquisition motion. No litigation,
              regulatory investigation, or material adverse event has been identified as of May 2026.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV039
              - CV040
