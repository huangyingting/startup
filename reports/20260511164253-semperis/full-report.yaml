          label: Platform delivered to enterprise customers
    approximationNotes: >-
      Dependency types reflect publicly observable relationships from press releases, FedRAMP marketplace, and product
      documentation. Financial covenant specifics for Hercules Capital are estimated as typical for BDC portfolio
