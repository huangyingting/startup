  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Net Revenue Retention Below 100%
        - NRR falls below 100% for two consecutive quarters
        - >-
          Indicates net churn in enterprise customer base; undermines switching-cost moat and land-and-expand thesis
          core assumption
        - >-
          Exit or abort investment; NRR below 100% in enterprise security is a disqualifying signal for the investment
          case
      - - ARR Growth Deceleration
        - ARR growth falls below 15% annually for two consecutive quarters
        - >-
          At 10x ARR entry multiple, sub-15% growth implies the multiple is unsustainable; peer median multiples for
          slower-growth SaaS compress to 5-8x ARR
        - Re-evaluate at lower entry multiple or exit position; initiate down-round scenario analysis immediately
      - - Microsoft MDI Enterprise Displacement
        - Evidence that Microsoft MDI is displacing Semperis in 20%+ of enterprise renewals
        - Platform bundling threat materializes; Semperis loses pricing power; standalone ITDR TAM contracts materially
        - Trigger immediate strategic review; assess M&A exit urgency before competitive moat erodes further
      - - Gross Margin Below 65%
        - Audited or disclosed gross margin falls below 65%
        - >-
          Inconsistent with software SaaS positioning; indicates services or hardware diluting economics; compresses
          achievable exit multiple
        - >-
          Reduce target valuation multiple to 6-8x ARR; reassess return scenario; request detailed cost structure
          breakdown
      - - Hercules Debt Covenant Breach or Stress
        - Evidence of covenant breach, forced amendment, or accelerated repayment demand in Hercules Capital debt terms
        - >-
          Signals financial stress or revenue underperformance; could trigger dilutive equity issuance or forced M&A at
          unfavorable terms
        - >-
          Immediate diligence escalation; assess runway and renegotiation options; potential for material equity
          dilution at next event
    notes: >
      Thesis-break triggers are illustrative thresholds based on judgment about evidence that would materially weaken or
      invalidate the investment thesis. Thresholds are not derived from Semperis management disclosure. Actual Hercules
      Capital covenant thresholds are not publicly known.
    claimRefs:
      - CV021
      - CV024
      - CV026
      - CV027
      - CV028
      - CV031
      - CV034
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - Net Revenue Retention
        - NRR has not been publicly disclosed by Semperis at any point
        - >-
          NRR above 120% validates land-and-expand dynamics and justifies premium multiple; NRR below 110% would
          compress the achievable multiple significantly
        - Request from management under NDA; compare against CyberArk and SentinelOne peer NRR benchmarks above 120%
      - - Burn Rate and Cash Runway
        - Monthly burn rate and cash runway are not publicly disclosed
        - >-
          Determines whether Semperis requires additional financing before IPO or M&A; Hercules debt obligations may
          accelerate effective burn
        - >-
          Request 24-month cash flow model; confirm Hercules repayment schedule and remaining runway under base-case ARR
          growth assumptions
      - - Gross Margin Profile
        - Gross margin not disclosed; enterprise SaaS peers range from 70-85% gross margin
        - >-
          Gross margin below 70% would compress achievable revenue multiple and indicate services or hardware diluting
          software economics
        - >-
          Request GAAP income statement or management accounts under NDA; decompose software versus professional
          services revenue
      - - FedRAMP Authorization Status
        - No public disclosure of FedRAMP Moderate or High authorization progress or timeline
        - >-
          Government and DoD segment represents 15-20% of enterprise identity security spending; FedRAMP authorization
          unlocks this TAM materially
        - >-
          Confirm with Semperis management; check fedramp.gov marketplace for listing; assess cost and timeline if
          authorization not yet achieved
      - - Full Cap Table and Liquidation Preferences
        - Full cap table from seed through June 2024 including liquidation preferences is not public
        - >-
          Liquidation preferences from $200M Series C and $125M growth round could significantly affect equity waterfall
          at various exit scenarios
        - >-
          Request cap table under NDA; model equity waterfall at $750M, $1B, $1.5B, and $2B exit scenarios to assess
          actual investor return
    notes: >
      Diligence asks are prioritized by investment-decision relevance. NRR and gross margin are most critical and should
      be resolved first. FedRAMP status is an upside catalyst rather than a downside risk. Cap table diligence is
      standard practice and should run in parallel with financial diligence.
    claimRefs:
      - CV030
      - CV031
      - CV032
      - CV033
      - CV034
