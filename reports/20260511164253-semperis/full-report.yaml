      - number: '5.3'
        title: Trust, Quality & Compliance
        blocks:
          - type: paragraph
            body: >-
              Semperis's trust posture is anchored in product-level compliance alignment and third-party review ratings.
              DSP includes built-in compliance report bundles for GDPR, HIPAA, PCI, and SOX; these templates can be
              scheduled for recurring generation and distribution, enabling customers in regulated industries to
              generate audit evidence directly from DSP. The company positions DSP as covering the most
              compliance-critical AD security controls without requiring separate reporting infrastructure. SOC 2 Type
              II and FIPS 140-2 compliance are cited in company materials for its cloud-managed and federal-sector
              offerings, but publicly accessible attestation documents were not located during research, representing a
              verification gap for regulated buyers conducting formal vendor assessments.

              On third-party review platforms, Semperis DSP shows strong scores: G2 comparisons indicate a proactive
              threat hunting score of 9.7, quality of support 9.6, ease of use 9.2, risk scoring 9.0, and automated
              scans 8.1. The company reports a Net Promoter Score of 81 based on customer survey data. Peerspot
              reviewers highlight ease of installation, reliability in production, and the quality of Semperis's support
              team, while noting that cloud environment integration depth could be improved—a gap partially addressed by
              the MightyID acquisition. KuppingerCole named Semperis a Leader in the Identity Threat Detection and
              Response category in 2025. The company was also included on Fortune's Cyber 60 list of the fastest-growing
              cybersecurity companies in 2024 and was shortlisted as a finalist for the 2026 Australian Cyber Awards
              Ransomware Security Provider of the Year. MITRE ATT&CK framework coverage is referenced in product
              positioning but specific technique-level coverage depth has not been independently verified from external
