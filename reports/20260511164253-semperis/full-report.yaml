      - number: '2.3'
        title: Segment and Buyer Analysis — Who Buys ITDR and Why
        blocks:
          - type: paragraph
            body: >-
              ITDR and AD security purchasing is concentrated in three primary buyer archetypes that differ by
              organizational size, regulatory exposure, and technical sophistication. In large enterprises (above 10,000
              employees), the primary buyer is the CISO or VP Security, with strong influence from the identity
              architecture team and sign-off from the CIO. Budget comes from the security operations or identity
              infrastructure budget line. The adoption trigger in this segment is most commonly a post-incident mandate
              after a breach or near-miss, followed by board-level pressure for cyber resilience frameworks. Financial
              services, healthcare, and critical infrastructure dominate large-enterprise ITDR spend.

              In the mid-market segment (2,000–10,000 employees), the buyer is typically the IT Security Director or IT
              Director reporting to a CTO or CIO. Budget ownership is shared between IT operations and security, and
              purchase is more frequently triggered by compliance requirements (CMMC, HIPAA, PCI-DSS supplemental
              controls, NIS2 for European organizations) than by breach experience. This segment is the fastest-growing
              for Semperis based on disclosed win patterns.

              Government and defense buyers operate on longer sales cycles (12–24 months) but provide larger per-deal
              values and high retention. CISA's SCuBA guidance and M-21-31 federal memorandum have created
              compliance-driven demand among federal civilian agencies. The Department of Defense CMMC 2.0 mandate has
              catalyzed demand among defense industrial base contractors in the 10,000+ employee tier. Managed Service
              Providers (MSPs) serving mid-market clients represent an important indirect channel — Semperis disclosed
              an MSP partner program in 2024, and MSP adoption creates recurring revenue without direct sales cost.

              Healthcare is notable for having high urgency (ransomware attacks on hospital AD have disrupted clinical
              operations repeatedly, including the Change Healthcare incident in early 2024), regulatory HIPAA
              obligations, and typically underinvested IT security postures — making the ROI case for ITDR compelling.
              Critical infrastructure (energy, utilities, water) is an emerging buyer segment accelerating under CISA
              advisories and TSA directives.

              Geographic concentration: North America represents approximately 50% of ITDR spend; Europe 30%
              (accelerating under NIS2); APAC 15% (growth markets with limited regulatory push). Semperis has disclosed
              EMEA expansion as a strategic priority and opened a London office in 2024.
