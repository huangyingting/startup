      - number: '7.2'
        title: Operational and Security Risks
        blocks:
          - type: paragraph
            body: >-
              Semperis's most catastrophic operational risk is a cybersecurity breach of its own platform and
              customer-facing infrastructure. Semperis is an identity security vendor that holds real-time access to
              customer Active Directory environments and hosts forensically clean AD backup copies. A breach of
              Semperis's own systems would expose some of the most sensitive enterprise directory data in existence,
              enabling attackers to compromise customer AD environments at scale. Precedents from peer cybersecurity
              vendors — SolarWinds (2020 supply-chain backdoor), Okta (2022 Lapsus$ breach and 2023 HAL breach affecting
              5,000 customers), and CrowdStrike (2024 Falcon sensor update causing global outage) — demonstrate that
              identity and endpoint security vendors are high-value attack targets and that breach events produce
              catastrophic reputational and customer-loss outcomes. Semperis's identity security market position makes a
              breach disproportionately damaging relative to the base rate of enterprise software breaches. No publicly
              disclosed security incidents at Semperis have been identified through BleepingComputer, Dark Reading, or
              court record searches as of May 2026.

              The second major operational risk is Microsoft Active Directory and Entra ID API dependency. Semperis
              Directory Services Protector uses AD replication metadata (DRSReplicaSync-based change detection) to
              monitor directory changes in real time. Semperis ADFR uses AD backup APIs and Volume Shadow Copy Service
              integration for forensically clean backup creation. Microsoft has historically changed AD replication
              protocols, Entra ID REST API endpoints, and authentication flows with varying advance notice. An
              undocumented API deprecation or breaking change could impair DSP change detection or ADFR backup
              functionality within a short remediation window, creating a critical product incident.

              SaaS platform reliability presents a third operational risk. Enterprise customers with active Semperis
              deployments expect 99.9%+ uptime; real-time AD protection requires continuous sensor operation. Extended
              platform outages during active threat scenarios could trigger contractual SLA penalties and breach
              notification obligations. Support quality at scale is a fourth risk: scaling from approximately 500
              employees in 2024 to 1,000+ post-financing requires maintaining the deep AD domain expertise required for
              incident response, which is a scarce capability. Quality degradation in enterprise support could
              accelerate churn in high-value accounts that rely on Semperis for active directory resilience.
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
              - CR016
              - CR039
