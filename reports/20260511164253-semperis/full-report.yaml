  - id: FV001
    title: Recommendation logic
    type: flow
    layout: standard
    summary: >-
      Decision chain from Semperis's verified scale and moat strength through risk assessment and valuation check to the
      BUY recommendation with protective structuring requirements. Each node represents a distinct diligence gate that
      must pass before proceeding to the next decision stage. The flow confirms that despite the Microsoft bundling
      risk, the combination of ADFR switching costs, FedRAMP credibility, and entry price discipline supports a
      conditional BUY.
    data:
      nodes:
        - id: scale-proof
          label: Scale & Proof
          detail: >-
            $100M+ ARR confirmed January 2025; 1,000+ enterprise customers; Fortune 500 named accounts (AA, ADP, Lenovo,
            United, Starbucks) — scale threshold confirmed at unicorn-class level
          type: process
        - id: moat-strength
          label: Moat Durability
          detail: >-
            ADFR switching costs embedded in DR runbooks; Purple Knight 65K+ community users create organic pipeline
            moat; FedRAMP Moderate barrier to federal competitor entry
          type: process
        - id: market-position
          label: Market Position
          detail: >-
            Only pure-play ITDR vendor with detection (DSP) + recovery (ADFR); KuppingerCole Leader 2025; $6–8B TAM
            growing 25–30% CAGR; no directly comparable standalone pure-play at enterprise scale
          type: process
        - id: risk-assessment
          label: Risk Assessment
          detail: >-
            Microsoft MDI bundling is primary structural threat; ADFR DR integration partially mitigates; Israel R&D
            geopolitical risk is real but manageable; NRR non-disclosure is the primary evidence gap
          type: process
        - id: valuation-check
          label: Valuation Check
          detail: >-
            Base case $880M–$1.56B (8–12x ARR of $110–130M); 2024 growth round at $1B+ confirms floor; down from $1.4B
            2022 peak reflecting 30–50% sector multiple compression
          type: process
        - id: recommendation
          label: 'Recommendation: BUY'
          detail: >-
            Initiate at entry below $1.3B with protective structuring (NRR covenant, anti-dilution, downside
            provisions); identity security is critical infrastructure investment theme with 18–36 month IPO exit window
          type: process
    approximationNotes: >-
      Flow logic is an analytic construct synthesizing evidence from multiple sources; individual node assertions are
      supported by claims CV001–CV044. Node sequence reflects diligence priority order, not causal temporal sequence.
      The BUY recommendation is conditional on pre-investment satisfaction of the five diligence asks in TV006.
    claimRefs:
      - CV001
      - CV012
      - CV014
      - CV026
      - CV029
      - CV040
  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: >-
      Implied enterprise value at eight ARR multiple scenarios applied to Semperis estimated ARR, ranging from the bear
      floor (5x on $100M ARR = $500M EV) to the bull ceiling (18x on $150M ARR = $2.7B EV). The chart illustrates that
      every 2–3x increase in ARR multiple adds $200–450M to EV at base ARR assumptions, confirming that multiple
      selection — not just ARR growth — is the primary valuation lever at this stage.
    data:
      items:
        - label: Bear 5x ARR ($100M base)
          value: 500
        - label: Bear 7x ARR ($100M base)
          value: 700
        - label: Base 8x ARR ($120M est.)
          value: 960
        - label: Base 10x ARR ($120M est.)
          value: 1200
        - label: Base 12x ARR ($120M est.)
          value: 1440
        - label: Bull 15x ARR ($150M est.)
          value: 2250
        - label: Bull 18x ARR ($150M est.)
          value: 2700
        - label: CrowdStrike public analog 17x
          value: 2040
    approximationNotes: >-
      ARR figures are estimates: $100M is the confirmed floor (January 2025 announcement); $120M is the base estimate
      for early 2026 based on 20–30% growth applied to confirmed floor; $150M is the bull estimate based on 40–60%
      growth YoY. Multiples are derived from comparable set (TV004). The CrowdStrike analog applies CrowdStrike's
      approximate 17x forward multiple to Semperis $120M ARR as an illustrative ceiling. All values are in USD millions.
    claimRefs:
      - CV017
      - CV020
      - CV021
      - CV022
      - CV036
      - CV041
  - id: FV003
    title: Valuation / return range
    type: range
    layout: standard
    summary: >-
      Enterprise value ranges across six reference points spanning Semperis bear scenario, base scenario, bull scenario,
      the 2022 Series C valuation anchor, the June 2024 growth round floor, and the Ping Identity strategic M&A
      comparable. The chart confirms that entry below $1.3B captures meaningful upside to base and bull scenarios while
      providing buffer to the bear floor of $400–700M.
    data:
      items:
        - label: Bear scenario EV range
          low: 400
          high: 700
        - label: Base scenario EV range
          low: 880
          high: 1560
        - label: Bull scenario EV range
          low: 1800
          high: 3200
        - label: 2022 Series C valuation anchor
          low: 1400
          high: 1400
        - label: 2024 growth round anchor
          low: 1000
          high: 1200
        - label: Identity sector M&A comp (Ping Identity)
          low: 1500
          high: 3000
    approximationNotes: >-
      All ranges are estimates derived from ARR multiple sensitivity analysis (TV003) and comparable transaction values
      (TV004). The 2022 Series C anchor is the confirmed post-money valuation of $1.4B per SEC Form D and GlobeNewsWire
      reporting. The 2024 growth round anchor is publicly reported as "$1B+" — low end is $1.0B, high end of $1.2B is an
      estimate reflecting typical growth round valuation step-up from prior round. Ping Identity comparable range
      represents Thales acquisition price ($2.8B) at low end and implied bull scenario for an equivalent company at
      comparable ITDR market multiples. All values in USD millions.
    claimRefs:
      - CV006
      - CV020
      - CV021
      - CV022
      - CV033
      - CV038
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      Investment committee scoring across seven dimensions — market position, customer proof, moat strength, unit
      economics, primary risk, valuation stance, and evidence quality — provides an IC-ready snapshot of Semperis
      investment readiness. Strengths dominate at market, proof, and moat; unit economics and evidence quality are the
      gap dimensions that diligence asks must resolve before commitment.
    data:
      nodes:
        - id: kpi-market
          label: Market Position
          detail: >-
            Only pure-play ITDR with detection + recovery; $6–8B TAM growing 25–30% CAGR; FedRAMP Moderate;
            KuppingerCole Leader 2025; Gartner ITDR recognition
          type: strength
        - id: kpi-proof
          label: Customer Proof
          detail: >-
            1,000+ enterprise customers; Fortune 500 named accounts confirmed; $100M ARR milestone crossed January 2025;
            confirmed US federal customer base
          type: strength
        - id: kpi-moat
          label: Moat Strength
          detail: >-
            ADFR DR runbook switching costs; Purple Knight 65K+ community creates organic enterprise pipeline; FedRAMP
            Moderate barrier to federal competitor entry; 3–5 year replacement cycle in regulated verticals
          type: strength
        - id: kpi-economics
          label: Unit Economics
          detail: >-
            ARR ~$100–120M estimated; growth 40–60% YoY estimated; NRR not disclosed (key gap); gross margin estimated >
            70% (SaaS comparable) but unconfirmed; burn rate unknown
          type: risk
        - id: kpi-risk
          label: Primary Risk
          detail: >-
            Microsoft MDI bundled in M365 E5 creates zero-cost DSP alternative; AD market obsolescence on 5–10 year
            cloud migration horizon; Israel R&D geopolitical concentration; Hercules Capital debt covenants
          type: risk
        - id: kpi-valuation
          label: Valuation Stance
          detail: >-
            Fair value $880M–$1.56B (base 8–12x ARR); last round at $1.0B+ June 2024; entry discipline critical at or
            below $1.3B; down from $1.4B 2022 peak on sector multiple compression
          type: neutral
        - id: kpi-evidence
          label: Evidence Quality
          detail: >-
            Medium — $100M ARR confirmed, named Fortune 500 customers confirmed; NRR not disclosed, gross margin not
            disclosed, cap table opaque, export control posture unknown
          type: neutral
    approximationNotes: >-
      Strength / risk / neutral ratings are analytic judgments based on the totality of public evidence; they do not
      represent numerical scores. Unit economics node is rated risk not because the economics are definitively poor, but
      because absence of NRR and margin data makes independent verification impossible from public evidence. Valuation
      stance reflects base case range only; bull and bear case ranges are in TV003 and FV003.
    claimRefs:
      - CV003
      - CV004
      - CV005
      - CV019
      - CV026
      - CV028
      - CV036
      - CV039
