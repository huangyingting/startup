      - number: '1.4'
        title: Scale Metrics, Customers, and Market Position
        blocks:
          - type: paragraph
            body: >
              As of early 2025, Semperis surpassed $100 million in annual recurring revenue (ARR), a milestone the
              company publicly announced in a January 2025 press release and PR Newswire distribution. Revenue growth
              has been exceptional: Semperis reported 3,000% revenue growth over the five years preceding the
              announcement, underpinned by rapid enterprise adoption of ITDR solutions following a series of
              high-profile AD attacks (Colonial Pipeline, SolarWinds, and other ransomware events that exploited AD
              credentials). ARR is estimated at approximately $151 million in 2026 based on analyst projections,
              reflecting continued double-digit growth.

              The company serves 1,000+ enterprise customers including named Fortune 500 accounts: American Airlines,
              ADP, Lenovo, United Airlines, and Starbucks. Semperis claims to protect more than 100 million user
              identities across its customer base. The customer concentration in regulated industries — aviation,
              financial services, technology — reflects both the higher security budgets and the higher regulatory
              consequences of AD compromise in those sectors.

              Headcount is approximately 500 employees in conservative estimates, with some databases tracking closer to
              637 employees, and the company has maintained approximately 24% annual headcount growth. The Forrester
              Total Economic Impact (TEI) study commissioned by Semperis identified $9.5 million in three-year value for
              a composite customer, supporting the business case for enterprise purchasing decisions at the executive
