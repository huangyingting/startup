      - number: '6.4'
        title: Switching Costs, Contract Durability, and NRR Evidence Gaps
        blocks:
          - type: paragraph
            body: >-
              Semperis has not publicly disclosed any net revenue retention (NRR), gross revenue retention (GRR), or
              churn rate data — representing the single most significant information gap in the customer diligence
              picture. Structural analysis of the product architecture, however, strongly supports a high switching cost
              thesis, particularly for ADFR-anchored customers. ADFR is embedded into enterprise disaster recovery
              runbooks, tested and validated recovery playbooks, and operational tabletop exercise programs. Replacing
              ADFR requires not merely switching software but rebuilding the DR framework, retesting recovery
              procedures, and re-certifying the recovery process with the information security team and often external
              auditors. These switching costs are real but not contractual — a cost-conscious CFO can mandate
              replacement. DSP-only threat detection customers carry lower switching costs, as Microsoft Defender for
              Identity and CrowdStrike Falcon Identity Protection provide alternative detection paths at lower or zero
              incremental cost. Customer satisfaction data from independent review platforms supports a high retention
              thesis: G2 ratings average 4.7/5.0 across 240+ reviews, with Gartner Peer Insights at 4.4/5.0. Common
              satisfaction drivers include recovery capability, support quality, and detection depth. Common complaints
              include high pricing relative to bundled alternatives and complexity of deployment in large hybrid
              environments — signals consistent with DSP-only customers facing renewal scrutiny. Contract structures are
              estimated at one to three years for large enterprise based on peer review disclosures. An estimated gross
              retention above 85% for ADFR-anchored accounts is consistent with the structural switching cost analysis,
              but this estimate has not been confirmed through management disclosure. Key diligence ask: NRR
              disaggregated by product line (ADFR-anchored vs. DSP-only) and by customer size.
