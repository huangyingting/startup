      - number: '8.3'
        title: Bull Base and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              Three scenarios capture the valuation and return range for a hypothetical Semperis investment at the June
              2024 $1B+ valuation mark, based on ARR trajectory, public market multiples, and exit timing assumptions
              extending through 2028-2030.

              In the bull scenario, Semperis sustains 25-30% ARR growth through 2027, reaching $150-180M ARR, with net
              revenue retention above 120% confirming strong land-and-expand dynamics across its 1,000+ enterprise
              customer base. At 15x ARR — consistent with a premium assigned to category-leader identity security
              companies at IPO — the implied valuation would be approximately $1.5-2.0 billion. This scenario assumes no
              material competitive displacement by Microsoft Defender for Identity or CrowdStrike Falcon Identity, gross
              margins above 75% consistent with software SaaS economics, FedRAMP authorization opening the government
              and defense market, and a favorable IPO window in 2027-2028. Return multiple from the June 2024 unicorn
              entry would be approximately 1.5-2.0x.

              In the base scenario, Semperis grows ARR at 20% annually to reach approximately $130-150M by 2026-2027. At
              the implied 10x ARR multiple — matching the cybersecurity SaaS peer median — the implied exit valuation
              would be approximately $1.3-1.5 billion at IPO or strategic M&A event, consistent with peer comparables
              for high-growth software security companies not yet at operating profitability. Return from the June 2024
              entry would be approximately 1.3-1.5x, representing positive but modest appreciation relative to the entry
              valuation.

              In the bear scenario, ARR growth decelerates below 15% annually due to competitive pressure from Microsoft
              bundling or CrowdStrike platform consolidation, or macroeconomic headwinds compress enterprise security
              budgets. Public market multiples for slower-growth security SaaS compress to 6-7.5x ARR as occurred in the
              2022-2023 cybersecurity correction, implying a bear-case valuation of approximately $600-750M — a
              down-round from the June 2024 unicorn mark and a gross return of approximately 0.6-0.75x, representing a
              material capital loss scenario for investors entering at the current unicorn valuation.
            claimRefs:
              - CV025
              - CV026
