      - number: '5.2'
        title: Technology Architecture & Infrastructure
        blocks:
          - type: paragraph
            body: >-
              The core technical architecture of Semperis DSP is agent-free. Rather than deploying software agents on
              domain controllers, DSP passively reads the AD replication stream—the DFS/USN journal— capturing every
              change as it propagates across the AD fabric. This approach is non-intrusive: it does not modify AD,
              install kernel-mode drivers, or affect DC stability. According to official product documentation, DSP is
              purpose-built to handle the change volume of even the world's largest AD environments, with processing
              optimized for high-frequency daily and hourly AD updates in multi-forest deployments.

              Deployment options span on-premises, cloud (Azure), and hybrid modes. ADFR extends cloud coverage further
              by offering Azure Blob Storage as an encrypted backup target (AES-256), so recovery points are available
              even if on-premises storage is destroyed. For multi-forest organizations, ADFR provisions a single
              management server and portal that orchestrates recovery across multiple forests and geographic
              distribution points simultaneously. Lightning IRP complements DSP with runtime behavioral detection, using
              ML-based anomaly detection to identify in-progress attacks that change- log analysis alone would miss—such
              as DCSync impersonation and Golden Ticket forgery patterns that occur entirely in memory.

              Semperis integrates with major SIEM/SOAR platforms including Microsoft Sentinel, Splunk, and ServiceNow,
              via REST APIs, allowing security operations teams to route DSP alerts into existing response workflows
              without additional middleware. The platform's Entra ID coverage mirrors its on-premises AD coverage: DSP
              monitors Entra ID configuration changes, and Purple Knight scans Entra ID for the same IOE/IOC categories
              it applies to on-premises AD. The February 2026 MightyID acquisition adds Okta and Ping Identity into the
              same continuous exposure management and tamper- proof change tracking framework, creating a unified hybrid
              identity security fabric.
