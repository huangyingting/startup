  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary — Identity Security, ITDR, and AD Hardening
        blocks:
          - type: paragraph
            body: >-
              The identity security market encompasses tools and platforms that discover, protect, detect threats in,
              and recover compromised identity systems — primarily Microsoft Active Directory (on-premises), Microsoft
              Entra ID (cloud/hybrid), and adjacent identity stores including LDAP directories and Okta/Ping identity
              fabrics. Gartner formally introduced "Identity Threat Detection and Response" (ITDR) as an emerging
              security category in its 2022 IAM Hype Cycle, recognizing that attackers have shifted from
              endpoint-focused intrusions to identity-centric lateral movement.

              The market boundary most relevant to Semperis encompasses three interlocking sub-segments. First, AD
              Security and Hardening includes tools that continuously assess and harden AD configurations, detect
              misconfigurations, and identify attack paths — Semperis Purple Knight and Forest Druid sit here. Second,
              ITDR for AD and Hybrid Identity includes real-time detection and automated response to identity-based
              attacks including pass-the-hash, DCSync, Kerberoasting, and password spraying — Semperis Directory
              Services Protector (DSP) is the flagship product in this layer. Third, AD Disaster Recovery and Cyber
              Resilience covers purpose-built backup, forensic rollback, and full-forest recovery from ransomware —
              Semperis Active Directory Forest Recovery (ADFR) is the primary solution. No other vendor competes across
              all three sub-segments at enterprise scale.

              Adjacent markets that are typically excluded from Semperis' direct TAM but represent substitution risk
              include: Privileged Access Management (PAM, e.g., CyberArk, BeyondTrust), which controls privileged
              account usage but does not perform real-time AD threat detection; Identity Governance and Administration
              (IGA), which manages the access lifecycle but lacks attack-detection capability; broader SIEM/SOAR
              platforms that ingest AD telemetry as one data source among many; and Cloud Infrastructure Entitlement
              Management (CIEM), which focuses on cloud resource permissions rather than on-premises directory security.
              Microsoft's own tools — Defender for Identity (MDI) and Entra ID Protection — represent the primary
              included-market substitutes that Semperis must displace or complement.

              The global installed base of Active Directory is estimated at more than 95% of Fortune 500 enterprises and
              90%+ of organizations above 1,000 employees globally, making AD persistence effectively co-extensive with
              enterprise identity infrastructure. This breadth of installed base means Semperis' TAM shares the same
              geographic and vertical distribution as enterprise IT spend more broadly — concentrated in North America
              (45–55%), Europe (25–35%), and APAC (15–20%).
