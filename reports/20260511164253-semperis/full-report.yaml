      - number: '7.2'
        title: Operational and Security Risks
        blocks:
          - type: paragraph
            body: >-
              Semperis's most catastrophic operational risk is a cybersecurity breach of its own platform and
              customer-facing infrastructure. Semperis deploys lightweight agents on customer domain controllers and
              hosts forensically clean AD backup copies in its cloud infrastructure. A breach of Semperis's own systems
              would expose some of the most sensitive enterprise directory data in existence, potentially enabling
              attackers to compromise customer AD environments at scale. Precedents from peer cybersecurity vendors —
              SolarWinds (2020 supply-chain backdoor affecting 18,000 installations), Okta (2022-2023 breaches affecting
              thousands of customers), and CrowdStrike (2024 Falcon sensor update causing global IT outage affecting 8.5
              million Windows systems) — demonstrate that identity and endpoint security vendors are high-value attack
              targets and that breach consequences extend far beyond direct customers. Semperis maintains SOC 2 Type II
              attestation and a security and trust program per its security trust center, but these controls cannot
              fully eliminate the risk.

              The Microsoft MDI bundling threat is the highest-likelihood material operational risk. Microsoft Defender
              for Identity (MDI) is included at no additional cost in Microsoft 365 E5 and E5 Security subscriptions,
              which are already widely adopted across the Semperis enterprise customer base. At renewal, IT procurement
              teams under budget pressure routinely evaluate whether MDI meets their AD monitoring requirements. While
              Semperis DSP offers deeper forensic investigation, Active Directory Forest Recovery, and Purple Knight
              audit capabilities that MDI does not replicate, the zero-cost MDI alternative creates significant pricing
              pressure at every enterprise renewal cycle.

              Agent-based deployment on domain controllers creates a distinct operational risk: DSP agents process
              real-time AD change events and require compatibility with Windows Server and domain controller patch
              levels. Incompatibility between agent updates and customer patch cycles can produce customer AD
              operational incidents. Semperis manages this through staged deployment, but domain controller sensitivity
              makes any agent-layer incident disproportionately damaging to customer trust.

              The medium-term structural risk is Active Directory market obsolescence. Microsoft's Entra ID represents
              the cloud-native successor to on-premises AD; as enterprises complete cloud identity migration to Entra ID
              and reduce reliance on on-premises AD, the addressable market for on-premises AD security tooling
              contracts. Semperis has invested in Entra ID security product capabilities, but the long-term TAM
              trajectory depends on how completely and how quickly enterprises migrate. Analyst estimates suggest this
              risk is primarily a five to ten year horizon risk rather than immediate, but its structural
              irreversibility warrants ongoing monitoring.
